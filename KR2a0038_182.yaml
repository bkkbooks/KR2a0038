body:
  text: 明史卷一百八十二列傳第七十王恕子承裕馬文升劉大夏王恕字宗貫三原人正統十三年進士由庶吉士授大理左評事進左寺副嘗條刑罰不中者六事皆議行之遷揚州知府發粟振飢不待報作資政書院以課士天順四年以治行最超遷江西右布政使平贛州寇憲宗嗣位詔大臣嚴核天下方面官乃黜河南左布政使侯臣等十三人而以恕代臣成化元年南陽荊襄流民嘯聚為亂擢恕右副都御史撫治之會丁母憂詔奔喪兩月即起視事恕辭不許與尚書白圭共平大盜劉通復討破其黨石龍嚴束所部毋濫殺流民復業移撫河南論功進左副都御史稍遷南京刑部右侍郎父憂服除以原官總督河道浚高郵邵伯諸湖修雷公上下句城陳公四塘水閘因災變請講求弭災策帝為賜山東租一年畿輔亦多減免旋改南京戶部左侍郎十二年大學士商輅等以雲南遠在萬里西控諸夷南接交址而鎮守中官錢能貪恣甚議遣大臣有威望者為巡撫鎮壓之乃改恕左副都御史以行就進右都御史初能遣指揮郭景奏事京師言安南捕盜兵闌入雲南境帝即命景齎敕戒約之舊制使安南必由廣西而景直自雲南往能因景遺安南王黎灝玉帶寶縧蟒衣珍奇諸物灝遣將率兵送景還欲遂通雲南道景懼後禍紿先行白守關者因脫歸揚言安南寇至關吏戒嚴黔國公沐琮遣人諭其帥始返而諸臣畏能匿不奏能又頻遣景及指揮盧安蘇本等交通干崖孟密諸土官納其金寶無算恕皆廉得之遣騎執景景懼自殺因劾能私通外國罪當死詔遣刑部郎中潘蕃往按之能又以其間驛進黃鸚鵡恕請禁絶且盡發能貪暴狀言昔交址以鎮守非人致一方陷沒今日之事殆又甚焉陛下何惜一能不以安邊徼能大懼急屬貴近請召恕還而是時商輅項忠諸正人方以忤汪直罷遂改恕掌南京都察院參贊守備機務能事立解蕃勘上得實置不問恕居雲南九月威行徼外黔國以下咸惕息奉令疏凡二十上直聲動天下當是時安南納江西叛人王姓者為謀主潛遣諜入臨安又於蒙自市銅鑄兵器將伺間襲雲南恕請增設副使二員以飭邊備謀遂沮還南京數月遷兵部尚書參贊如故考選官屬嚴拒請託同事者咸不悅而錢能歸屢譖恕於帝帝亦銜恕數直言遂命兼右副都御史巡撫南畿舊制應天鎮江太平寧國廣德官田徵半租民田全免其後民田率歸豪右而官田纍貧民恕乃量減官田耗稍增之民田常州時有羡米乃奏以六萬石補夏稅又補他府戶口鹽鈔六百萬貫公私便焉所部水災奏免秋糧六十餘萬石周行振貸全活二百餘萬口江南歲輸白糧民多至破産而光祿概以給庖人賤工又中官暴橫四方輸上供物監收者率要羡入織造繒綵及採花卉禽鳥者絡繹道路恕先後論列皆不納中官王敬挾妖人千戶王臣南行採藥物珍玩所至騷然長吏多被辱至蘇州召諸生寫妖書諸生大譁敬奏諸生抗命恕亟疏言當此凶歲宜遣使振濟顧乃橫索玩好昔唐太宗諷梁州獻名鷹明皇令益州織半臂褙子進琵琶桿撥鏤牙合子諸物李大亮蘇頲不奉詔臣雖無似有慕斯人因盡列敬等罪狀敬亦誣奏恕並及常州知府孫仁仁被逮仁新淦人由進士歷知府為人方峻敬至不為禮以是見忤恕抗章救三疏劾敬會中官尚銘亦發敬姦狀乃下敬等獄戍其黨十九人而棄臣市傳首南京仁亦得釋歸後積官至巡撫寧夏右副都御史二十年復改恕南京兵部尚書時錢能亦守備南京語人曰王公天人也吾敬事而已恕坦懷待之能卒斂戢林俊之下獄也恕言天地止一壇祖宗止一廟而佛至千餘寺一寺立而移民居且數百家費內帑且數十萬此舛也俊言當不宜罪帝得疏不懌恕侃侃論列無少避先後應詔陳言者二十一建白者三十九皆力阻權幸天下傾心慕之遇朝事有不可必曰王公胡不言也則又曰公疏且至矣已恕疏果至時為謠曰兩京十二部獨有一王恕於是貴近皆側目帝亦頗厭苦之二十二年起用傳奉官恕諫尤切帝愈不悅恕先加太子少保會南京兵部侍郎馬顯乞罷忽附批落恕宮保致仕朝野大駭恕數為巡撫歷侍郎至尚書皆在留都以好直言終不得立朝既歸名益高臺省推薦無虛月工部主事仙居王純比恕汲黯至豫杖謫思南推官孝宗即位始用廷臣薦召入為吏部尚書尋加太子太保先是中外劾大學士劉吉者必薦恕吉以是大恚凡恕所推舉必陰撓之弘治元年閏正月言官劾兩廣總督宋旻漕運總督丘鼐等三十七人宜降黜中多素有時望者吉竟取中旨允之章不下吏部恕以不得其職拜疏乞去不許陝西缺巡撫恕推河南布政使蕭禎詔別推恕執奏曰陛下不以臣不肖任臣銓部倘所舉不效臣罪也今陛下安知禎不才而拒之是必左右近臣意有所屬臣不能承望風指以固祿位且陛下既以禎為不可用是臣不可用也願乞骸骨帝乃卒用禎時言官多稱恕賢且老不當任劇職宜置內閣參大政最後南京御史吳泰等復言之帝曰朕用蹇義王直故事官恕吏部有謀議未嘗不聽何必內閣也恕嘗侍經筵見帝困熱暑請依故事大寒暑暫停仍進講義於宮中進士董傑御史湯鼐給事中韓重等遂交章論駁恕待罪請解職優詔不許恕上言臣蒙國厚恩日夕思報人見陛下任臣過重遂望臣太深欲臣盡取朝政更張之如宋司馬光故事無論臣才遠不及光即今亦豈元祐時且六卿分職各有攸司臣豈敢越而謀之但傑等責臣良是臣無所逃罪惟乞放還帝復優詔勉留之恕感激眷遇益以身任國事方以疾在告聞帝頗擢用宦官至有賜蟒衣給莊田者具疏切諫中官黃順請起復匠官潘俊供役恕言不可以小臣壞重典再執奏竟報許劉吉既憾恕吉所陷壽州知州劉概及言官周紘張昺湯鼐薑綰等恕又抗章力救吉以是益恨乃合私人魏璋等共排之恕先後推用羅明熊懷強珍陳壽丘鼐白思明等咸諷璋等糾駁恕知志不得行連章求去帝輒慰留且以其老特免午朝遇大風雨雪早朝亦免徽王見沛乞歸德州田已得旨恕言王國懿親不當爭尺寸地使小民失業帝婉辭報焉盧溝橋成中官李興乞進文思院副使潘俊等官恕言營造常職安得録功成化季始有此事陛下初政幸已革汰奈何復行且山陵大工未聞升職援例奏乞將何詞拒之帝納其言已修京城河橋帝復從興請授四人官許五人冠帶恕執奏不從再疏爭曰臣職掌銓選義當盡言而再疏莫回天聽以為業已許之不可易夫事求其當設未當雖十易何害不然流弊有不可救者報聞先後以災異條七事以星變陳二十事咸切時弊壽寧伯張巒請勳號誥券恕言錢王兩太后正位中宮數十年錢承宗王源始邀封爵今皇后立甫三年巒已封伯遽有此請纍聖德不可許通政經歷高祿巒妹壻也超遷本司參議恕言天下之官以待天下之士勿私貴戚妨公議中旨以次等御醫徐生超補院判恕請選上考者不納文華殿中書舍人杜昌等夤緣遷秩御醫王玉自陳乞進官恕皆力爭寢之是時劉吉已罷而丘濬入閣亦與恕不相能初濬以禮部尚書掌詹事與恕同為太子太保恕長六卿位濬上及濬入閣恕以吏部弗讓也濬由是不悅恕考察天下庶官已黜而濬調旨留之者九十餘人恕屢爭不能得因力求罷不許太醫院判劉文泰者故往來濬家以求遷官為恕所沮銜恕甚恕里居日嘗屬人作傳鏤板以行濬謂其沽直謗君上聞罪且不小文泰心動乃自為奏草示除名都御史吳禎潤色之訐恕變亂選法且傳中自比伊周於奏疏留中者概云不報以彰先帝拒諫無人臣禮欲中以奇禍恕以奏出濬指抗言臣傳作於成化二十年致仕在二十二年非有望於先帝也且傳中所載皆足昭先帝納諫之美何名彰過文泰無賴小人此必有老於文學多陰謀者主之帝下文泰錦衣獄鞫之得實因請逮濬恕及禎對簿帝心不悅恕乃貶文泰御醫責恕沽名焚所鏤版置濬不問恕再疏請辨理不從遂力求去聽馳驛歸不賜敕月廩歲隸亦頗減廷論以是不直濬及濬卒文泰往弔濬妻叱之出曰以若故使相公齮王公負不義名何弔為恕揚歷中外四十餘年剛正清嚴始終一致所引薦耿裕彭韶何喬新周經李敏張悅倪嶽劉大夏戴珊章懋等皆一時名臣他賢才久廢草澤者拔擢之恐後弘治二十年間衆正盈朝職業修理號為極盛者恕力也武宗嗣位遣行人齎敕存問賚羊酒益廩隸且諭以讜論無隱恕陳國家大政數事帝優詔報之正德三年四月卒年九十三平居食噉兼人卒之日小減閉戶獨坐忽有聲若雷白氣瀰漫瞰之瞑矣訃聞輟朝贈特進左柱國太師諡端毅五子十三孫多賢且顯少子承裕字天宇七歲能詩弱冠著太極動靜圖説恕官吏部令日接賓客以是周知天下賢才選用無不當舉弘治六年進士恕致政承裕即告歸侍養起授兵科給事中出理山東河南屯田減登萊糧額三畝徵一斗還青州彰德軍田先賜王府者三百六十餘頃武宗立屢遷吏科都給事中以言事忤劉瑾罰米輸塞上再遷太僕卿嘉靖六年纍官南京戶部尚書清逋稅一百七十萬石積羡銀四萬八千餘兩帝手書清平正直褒之在部三年致仕卒贈太子少保諡康僖馬文升字負圖鈞州人貌瓌奇多力登景泰二年進士授御史歷按山西湖廣風裁甚著還領諸道章奏母喪除超遷福建按察使成化初召為南京大理卿以父喪歸滿四之亂陝西巡撫陳價下吏即家起文升右副都御史代價馳至軍與總督項忠討平之事具忠傳録功進左副都御史巡撫如故文升數條奏便宜務選將練兵修安邊營至鐵鞭城烽堠剪除劇賊西固番族不即命者悉滅之修茶政易番馬八千有奇以給士卒振鞏昌臨洮飢民撫安流移績甚著是時孛羅忽滿都魯癿加思蘭比歲犯邊文升請駐兵韋州而設伏諸堡待之遂敗寇黑水口擒其平章迭烈孫又敗之湯羊嶺斬首二百名其嶺曰得勝坡勒石紀之而還文升軍功甚盛奏捷不為誇張中亦無主之者以是賞薄至九年冬總制王越以大捷奏文升亦遣子琇報功廷臣勘奏不實坐停俸三月十一年春代越總制三邊軍務尋入為兵部右侍郎明年八月整飭遼東軍務巡撫陳鉞貪而狡將士小過輒罰馬馬價騰踴文升上邊計十五事因請禁之鉞由是嗛文升文升還部轉左十四年春鉞以掩殺冒功激變中官汪直欲自往定之帝令司禮太監懷恩等七人詣內閣會兵部議恩欲遣大臣往撫以沮直行文升疾應曰善恩入白帝即命文升往直不悅欲令其私人王英與俱文升謝絶之疾馳至鎮宣璽書撫慰無不聽撫者又請前以也先亂失授官璽書者十餘人得襲官事定直欲攘其功請於帝挾王英馳至開原再下令招撫文升乃推功與直然直內慚文升又與直抗禮奴視其左右直益不喜而陳鉞益諂事直得直歡日夜譖文升思中之未有以發也文升還賜牢醴明年春以遼東屢失事遣直偕定西侯蔣琬尚書林聰等按之會余子俊劾鉞鉞疑出文升意傾之益急直因奏文升行事乖方禁邊人市農器致怨叛乃下文升詔獄謫戍重慶衛直既傾文升則與鉞大發兵徼功鉞以是驟遷至尚書十九年直敗文升復官明年起為左副都御史巡撫遼東文升凡三至遼軍民聞其來皆鼓舞益禁抑中官總兵使不得朘削衆益大喜二十一年進右都御史總督漕運淮徐和飢移江南糧十萬石鹽價銀五萬兩振之是年冬召為兵部尚書明年以李孜省譖調南京孝宗即位召拜左都御史弘治元年上言憲宗朝嶽鎮海瀆諸廟用方士言置石函周以符篆貯金書道經金銀錢寶石及五穀為厭勝具宜毀從之又上言十五事悉議行帝耕藉田教坊以雜戲進文升正色曰新天子當使知稼穡艱難此何為者即斥去御史徐瑁賀霖失承旨下獄文升言初政不宜輒罪言官遂得釋尋命提督十二團營明年代余子俊為兵部尚書督團營如故承平既久兵政廢弛西北部落時伺塞下文升嚴核諸將校黜貪懦者三十餘人姦人大怨夜持弓矢伺其門或作謗書射入東長安門內帝聞詔錦衣緝捕給騎士十二衛文升出入文升乞休優詔不許小王子以數萬騎牧大同塞下勢洶洶文升以疾在告帝使中官挾醫視因就問計文升謂彼方敗於他部無能為請密為備而揚聲逼之必徙去已而果然遭繼母憂詔起復再疏辭不許西北別部野乜克力其長曰亦剌思王曰滿哥王曰亦剌因王各遣使款肅州塞乞貢且互市巡撫許進總兵官劉寧為請文升言互市可許入貢不可許乃却之土魯番既襲執陝巴而令牙蘭據守哈密僭稱可汗侵沙州迫罕東諸部附己文升議此寇桀驁不大創終不知畏宜用漢陳湯故事襲斬之察指揮楊翥熟番情召詢以方略翥備陳罕東至哈密道路請調罕東兵三千為前鋒漢兵三千繼之持數日糧間道兼程進可得志文升喜遂請於帝敕發罕東赤斤哈密兵令副總兵彭清將之隸巡撫許進往討果克之語詳進傳團營軍不足請於錦衣及騰驤四衛中選補已得請矣中官寧瑾阻之文升及兵科蔚春等言詔旨宜信不納陝西地大震文升言此外寇侵凌之兆今火篩方跳梁而海內民困財竭將懦兵弱宜行仁政以養民講武備以固圉節財用停齋醮止傳奉冗員禁奏乞間地日視二朝以勤庶政且撤還陝西織造內臣振恤被災者家帝納其言內臣立召還文升為兵部十三年盡心戎務於屯田馬政邊備守禦數條上便宜國家事當言者即非職守亦言無不盡嘗以太子年及四齡當早諭教請擇醇謹老成知書史如衛聖楊夫人者保抱扶持凡言語動止悉導之以正若內庭曲宴鐘鼓司承應元宵鼇山端午競渡諸戲皆勿令見至於佛老之教尤宜屏絶恐惑眩心志山東久旱浙江及南畿水災文升請命所司振恤練士卒以備不虞帝皆深納之民困賦役文升極陳其害謂今民田十稅四五其輸邊塞者糧一石費銀一兩以上豐年用糧八九石方易一兩若絲綿布帛之輸京師者交納之費過於所輸南方轉漕通州至有三四石致一石者中州歲役五六萬人治河山東河南修塞決口夫不下二十萬蘇松治水亦如之湖廣建吉興岐雍四王府江西益壽二府山東衡府通計役夫不下百萬諸王之國役夫供應亦四十萬加以湖廣征蠻山陝防邊供餽餉給軍旅者又不知凡幾賦重役繁未有甚於此時者也宜嚴敕內外諸司省煩費寬力役毋擅有科率王府之工宜速竣庶令困敝少蘇更乞崇正學抑邪術以清聖心節財用省工作以培邦本詔下所司詳議他所論奏者甚衆在班列中最為耆碩帝亦推心任之自太子太保屢加至少保兼太子太傅歲時賜賚諸大臣莫敢望也吏部尚書屠滽罷廷推文升御史魏英等言兵部非文升不可帝亦以為然乃命倪嶽代滽而加文升少傅以慰之嶽卒以文升代南京鳳陽大風雨壞屋拔木文升請帝減膳撤樂修德省愆御經筵絶遊宴停不急務止額外織造振飢民捕盜賊已又上吏部職掌十事帝悉褒納一品九載滿加少師兼太子太師帝以將考察特召文升及都御史戴珊史琳至暖閣諭以秉公黜陟又以文升年高重聽再呼告之命左右掖之下階始文升為都御史王恕在吏部兩人皆以正直任天下事疏出天下傳誦恕去人望皆歸文升逮為吏部年已八十修髯長眉遇事侃侃不少衰孝宗崩文升承遺詔請汰傳奉官七百六十三人命留太僕卿李綸等十七人餘盡汰之正德元年御用監中官王瑞復請用新汰者七人文升不奉詔給事中安奎刺得瑞納賄狀劾之瑞恚誣文升抗旨更下廷議皆是文升帝終不聽文升因乞歸不許是時朝政已移於中官文升老日懷去志會兩廣缺總督文升推兵部侍郎熊繡繡怏怏不欲出其鄉人御史何天衢遂劾文升徇私欺罔文升連疏求去許之賜璽書乘傳月廩歲隸有加家居非事未嘗入州城語及時事輒顰蹙不答居三年劉瑾亂政坐文升前用雍泰為朋黨除其名五年六月卒年八十五瑾誅復官贈特進光祿大夫太傅諡端肅文升有文武才長於應變朝端大議往往待之決功在邊鎮外國皆聞其名尤重氣節厲廉隅直道而行雖遭讒詬屢起屢仆迄不少貶子璁以鄉貢士待選吏部文升使請外曰必大臣子而京秩誰當外者卒後踰年大盜趙鐩等剽河南至鈞州以文升家在捨之去攻泌陽燬焦芳家束草若芳像裂之嘉靖初加贈文升左柱國太師劉大夏字時雍華容人父仁宅由鄉舉知瑞昌縣流民千餘家匿山中邏者索賂不得誣民反衆議加兵仁宅單騎招之民爭出訴遂罷兵擢廣西副使大夏年二十舉鄉試第一登天順八年進士改庶吉士成化初館試當留自請試吏乃除職方主事再遷郎中明習兵事曹中宿弊盡革所奏覆多當上意尚書倚之若左右手汪直好邊功以安南黎灝敗於老撾欲乘間取之言於帝索永樂間討安南故牘大夏匿弗豫密告尚書余子俊曰兵釁一開西南立糜爛矣子俊悟事得寢朝鮮貢道故由鴉鶻關至是請改由鴨緑江尚書將許之大夏曰鴨緑道徑祖宗朝豈不知顧紆回數大鎮此殆有微意不可許乃止中官阿九者其兄任京衛經歷以罪為大夏所笞憲宗入其譖捕繫詔獄令東廠偵之無所得會懷恩力救乃杖二十而釋之十九年遷福建右參政以政績聞聞父訃一宿即行弘治二年服闋遷廣東右布政使田州泗城不靖大夏往諭遂順命後山賊起承檄討之令獲賊必生致驗實乃坐得生者過半改左移浙江六年春河決張秋詔博選才臣往治吏部尚書王恕等以大夏薦擢右副都御史以行乃自黃陵岡浚賈魯河復浚孫家渡四府營上流以分水勢而築長隄起胙城歷東明長垣抵徐州亙三百六十里水大治更名張秋鎮曰安平鎮孝宗嘉之賜璽書褒美語詳河渠志召為左副都御史歷戶部左侍郎十年命兼左僉都御史往理宣府兵餉尚書周經謂曰塞上勢家子以市糴為私利公毋以剛賈禍大夏曰處天下事以理不以勢俟至彼圖之初塞上糴買必粟千石芻萬束乃得告納以故中官武臣家得操利權大夏令有芻粟者自百束十石以上皆許勢家欲牟利無所得不兩月儲積充羡邊人蒙其利明年秋三疏移疾歸築草堂東山下讀書其中越二年廷臣交薦起右都御史總制兩廣軍務敕使及門攜二僮行廣人故思大夏鼓舞稱慶大夏為清吏治捐供億禁內外鎮守官私役軍士盜賊為之衰止十五年拜兵部尚書屢辭乃拜命既召見帝曰朕數用卿數引疾何也大夏頓首言臣老且病竊見天下民窮財盡脫有不虞責在兵部自度力不辦故辭耳帝默然南京鳳陽大風拔木河南湖廣大水京師苦雨沈陰大夏請凡事非祖宗舊而害軍民者悉條上釐革十七年二月又言之帝命事當興革者所司具實以聞乃會廷臣條上十六事皆權幸所不便者相與力尼之帝不能決下再議大夏等言事屬外廷悉蒙允行稍涉權貴復令察核臣等至愚莫知所以久之乃得旨傳奉官疏名以請幼匠廚役減月米三斗增設中官司禮監核奏四衛勇士御馬監具數以聞餘悉如議織造齋醮皆停罷光祿省浮費巨萬計而勇士虛冒之弊亦大減制下舉朝歡悅先是外戚近幸多干恩澤帝深知其害政奮然欲振之因時多災異復宣諭羣臣令各陳缺失大夏乃復上數事其年六月再陳兵政十害且乞歸帝不許令弊端宜革者更詳具以聞於是大夏舉南北軍轉漕番上之苦及邊軍困敝邊將侵剋之狀極言之帝乃召見大夏於便殿問曰卿前言天下民窮財盡祖宗以來徵斂有常何今日至此對曰正謂不盡有常耳如廣西歲取鐸木廣東取香藥費固以萬計他可知矣又問軍對曰窮與民等帝曰居有月糧出有行糧何故窮對曰其帥侵剋過半安得不窮帝太息曰朕臨御久乃不知天下軍民困何以為人主遂下詔嚴禁當是時帝方鋭意太平而劉健為首輔馬文升以師臣長六卿一時正人充布列位帝察知大夏方嚴且練事尤親信數召見決事大夏亦隨事納忠大同小警帝用中官苗逵言將出師內閣劉健等力諫帝猶疑之召問大夏曰卿在廣知苗逵延綏搗巢功乎對曰臣聞之所俘婦稚十數耳賴朝廷威德全師以歸不然未可知也帝默然良久問曰太宗頻出塞今何不可對曰陛下神武固不後太宗而將領士馬遠不逮且淇國公小違節制舉數十萬衆委沙漠奈何易言之度今上策惟守耳都御史戴珊亦從旁贊決帝遽曰微卿曹朕幾誤由是師不果出莊浪土帥魯麟為甘肅副將求大將不得恃其部衆強徑歸莊浪廷臣懼生變欲授以大帥印又欲召還京處之散地大夏請奬其先世忠順而聽麟就間麟素貪虐失衆心兵柄已去無能為竟怏怏病死帝欲宿兵近地為左右輔大夏言保定設都司統五衛祖宗意當亦如此請遣還操軍萬人為西衛納京東兵密雲薊州為東衛帝報可中官監京營者恚失兵揭飛語宮門帝以示大夏曰宮門豈外人能至必此曹不利失兵耳由是間不得行帝嘗諭大夏曰臨事輒思召卿慮越職而止後有當行罷者具揭帖以進大夏頓首曰事之可否外付府部內咨閣臣可矣揭帖滋弊不可為後世法帝稱善又嘗問天下何時太平對曰求治亦難太急但用人行政悉與大臣面議當而後行久之天下自治嘗乘間言四方鎮守中官之害帝問狀對曰臣在兩廣見諸文武大吏供億不能敵一鎮守其煩費可知帝曰然祖宗來設此久安能遽革第自今必廉如鄧原麥秀者而後用不然則已之大夏頓首稱善大夏每被召跪御榻前帝左右顧近侍輒引避嘗對久憊不能興呼司禮太監李榮掖之出一日早朝大夏固在班帝偶未見明日諭曰卿昨失朝耶恐御史糾不果召卿其受眷深如此特賜玉帶麒麟服所賚金幣上尊歲時不絶未幾孝宗崩武宗嗣位承詔請撤四方鎮守中官非額設者帝止撤均州齊元大夏復議上應撤者二十四人又奏減皇城京城守視中官皆不納頃之列上傳奉武臣當汰者六百八十三人報可大漢將軍薛福敬等四十八人亦當奪官福敬等故不入侍以激帝怒帝遽命復之而責兵部對狀欲加罪中官寧瑾頓首曰此先帝遺命陛下列之登極詔書不宜罪帝意乃解中官韋興者成化末得罪久廢至是夤緣守均州言官交諫大夏等再三爭皆不聽正德元年春又言鎮守中官如江西董讓薊州劉琅陝西劉雲山東朱雲貪殘尤甚乞按治帝不悅大夏自知言不見用數上章乞骸骨其年五月詔加太子太保賜敕馳驛歸給廩隸如制給事中王翊張襘請留之吏部亦請如翊襘言不報大夏忠誠懇篤遇知孝宗忘身徇國於權幸多所裁抑嘗請嚴核勇士為劉瑾所惡劉宇亦憾大夏遂與焦芳譖於瑾曰籍大夏家可當邊費十二三年九月假田州岑猛事逮繫詔獄瑾欲坐以激變律死都御史屠滽持不可瑾謾罵曰即不死可無戍耶李東陽為婉解且瑾詗大夏家實貧乃坐戍極邊初擬廣西芳曰是送若歸也遂改肅州大夏年巳七十三布衣徒步過大明門下叩首而去觀者歎息泣下父老攜筐送食所至為罷市焚香祝劉尚書生還比至戍所諸司憚瑾絶餽問儒學生徒傳食之遇團操輒荷戈就伍所司固辭大夏曰軍固當役也所攜止一僕或問何不挈子姓曰吾宦時不為子孫乞恩澤今垂老得罪忍令同死戍所耶大夏既遣戍瑾猶托他事罰米輸塞上者再五年夏赦歸瑾誅復官致仕清軍御史王相請復廩隸録其子孫中官用事者終嗛之不許大夏歸教子孫力田謀食稍贏散之故舊宗族預自為壙志曰無使人飾美俾懷愧地下也十一年五月卒年八十一贈太保諡忠宣大夏嘗言居官以正己為先不獨當戒利亦當遠名又言人生蓋棺論定一日未死即一日憂責未巳其被逮也方鋤菜園中入室攜數百錢跨小驢就道赦歸有門下生為巡撫者枉百里謁之道遇扶犁者問孰為尚書家引之登堂即大夏也朝鮮使者在鴻臚寺館遇大夏邑子張生因問起居曰吾國聞劉東山名久矣安南使者入貢曰聞劉尚書戍邊今安否其為外國所重如此贊曰王恕砥礪風節馬文升練達政體劉大夏篤棐自將皆具經國之遠猷蘊畜君之正志綢繆庶務數進讜言迹其居心行己磊落光明剛方鯁亮有古大臣節概歷事纍朝享有眉壽朝野屬望名重遠方詩頌老成書稱黃髮三臣者近之矣恕昧遠名之戒以作傳見疏而文升大夏被遇孝宗之朝明良相契荃宰一心逮至宦豎乘權耆舊擯斥進退之際所係詎不重哉
