body:
  text: 明史卷一百九十二列傳第八十楊慎王元正王思王相張翀劉濟安磐張漢卿張原毛玉裴紹宗王時柯余翺鄭本公張曰韜胡瓊楊淮申良張澯仵瑜臧應奎胡璉余禎李可登安璽殷承郭楠俞敬李繼先王懋楊慎字用修新都人少師廷和子也年二十四舉正德六年殿試第一授翰林修撰丁繼母憂服闋起故官十二年八月武宗微行始出居庸關慎抗疏切諫尋移疾歸世宗嗣位起充經筵講官常講舜典言聖人設贖刑乃施於小過俾民自新若元惡大奸無可贖之理時大璫張鋭于經論死或言進金銀獲宥故及之嘉靖三年帝納桂萼張璁言召為翰林學士慎偕同列三十六人上言臣等與萼輩學術不同議論亦異臣等所執者程頤朱熹之說也萼等所執者冷褒段猶之餘也今陛下既超擢萼輩不以臣等言為是臣等不能與同列願賜罷斥帝怒切責停俸有差踰月又偕學士豐熙等疏諫不得命偕廷臣伏左順門力諫帝震怒命執首事八人下詔獄於是慎及檢討王元正等撼門大哭聲徹殿庭帝益怒悉下詔獄廷杖之閲十日有言前此朝罷羣臣已散慎元正及給事中劉濟安磐張漢卿張原御史王時柯實糾衆伏哭乃再杖七人於廷慎元正濟並謫戍餘削籍慎得雲南永昌衛先是廷和當國盡斥錦衣冒濫官及是伺諸途將害慎慎知而謹備之至臨清始散去扶病馳萬里憊甚抵戍所幾不起五年聞廷和疾馳至家廷和喜疾愈還永昌聞尋甸安銓武定鳳朝文作亂率僮奴及步卒百餘馳赴木密所與守臣擊敗賊八年聞廷和訃奔告巡撫歐陽重請於朝獲歸葬葬訖復還自是或歸蜀或居雲南會城或留戍所大吏咸善視之及年七十還蜀巡撫遣四指揮逮之還嘉靖三十八年七月卒年七十有二慎幼警敏十一歲能詩十二擬作古戰場文過秦論長老驚異入京賦黃葉詩李東陽見而嗟賞令受業門下在翰林時武宗問欽天監及翰林星有注張又作汪張是何星也衆不能對慎曰柳星也歷舉周禮史記漢書以復預修武宗實録事必直書總裁蔣冕費宏盡付草俾削定嘗奉使過鎮江謁楊一清閲所藏書叩以疑義一清皆成誦慎驚異益肆力古學既投荒多暇書無所不覽嘗語人曰資性不足恃日新德業當自學問中來故好學窮理老而彌篤世宗以議禮故惡其父子特甚每問慎作何狀閣臣以老病對乃稍解慎聞之益縱酒自放明世記誦之博著作之富推慎為第一詩文外雜著至一百餘種並行於世隆慶初贈光祿少卿天啓中追諡文憲王元正字舜卿盩厔人與慎同年進士由庶吉士授檢討武宗幸宣大元正述五子之歌以諷竟以爭大禮謫戍茂州卒隆慶初贈修撰王思字宜學太保直曾孫也正德六年進士改庶吉士授編修九年春乾清宮災思應詔上疏曰天下之治賴紀綱紀綱之立係君身而已私恩不偏於近習政柄不移於左右則紀綱立而宰輔得行其志六卿得專其職今者內閣執奏方堅而或撓於傳奉六卿擬議已定而或阻於內批此紀綱所由廢也惟陛下抑私恩端政本用舍不以讒移刑賞不以私拒則體統正而朝廷尊矣祖宗故事正朝之外日奏事左順門又不時召對便殿今每月御朝不過三五日每朝進奉不踰一二事其養德之功求治之實宰輔不得而知也聞見之非嗜好之過宰輔不得而知也天下之大四海之遠生民愁苦之狀盜賊縱橫之由豈能一一上達伏願陛下悉遵舊典凡遇宴閒少賜召問勿以遇災而懼災過而弛然後可以享天心保天命其年九月帝狎虎而傷閲月不視朝思復上封事曰孝宗皇帝之子惟陛下一人當為天下萬世自重近者道路傳言虎逸於柙驚及聖躬臣聞之且駭且懼陛下即位以來於茲九年朝寧不勤政太廟不親享兩宮曠於問安經筵倦於聽講揆厥所自蓋有二端嗜酒而荒其志好勇而輕其身由是戒懼之心日忘縱恣之欲日進好惡由乎喜怒政令出於多門紀綱積弛國是不立士氣摧折人心危疑上天示警日食地震宗社之憂凜若朝夕夫勇不可好陛下已薄有所懲矣至於荒志廢業惟酒為甚書曰甘酒嗜音峻宇雕牆有一於此未或不亡陛下露處外宮日湎於酒厮養雜侍禁衛不嚴即不幸變起倉卒何以備之此臣所大憂也疏入留中者數日忽傳旨降遠方雜職遂謫潮州三河驛丞思年少氣鋭每衆中指切人是非已悔之自斂為質訥及被謫怡然就道夜過瀧水舟飄巨石上緣石坐浩歌家人後至聞歌聲乃檥舟以濟王守仁講學贛州思從之遊及守仁討宸濠檄思贊軍議世宗嗣位召復故官仍加俸一級思疏辭且言陛下欲作敢言之氣以防壅蔽之奸莫若省覽奏章召見大臣勿使邪僻阿徇之說蠱惑聖聽則堯舜之治可成不然縱加恩於先朝譴責之臣抑末矣帝不允因命近日遷俸者皆不得辭尋充經筵講官嘉靖三年與同官屢爭大禮不報時張璁桂萼方獻夫為學士思羞與同列疏乞罷歸不許其年七月偕廷臣伏左順門哭諫帝大怒繫之詔獄杖三十踰旬再杖之思與同官王相給事中張原毛玉裴紹宗御史張曰韜胡瓊郎中楊淮胡璉員外郎申良張澯主事安璽仵瑜臧應奎余禎殷承敘司務李可登凡十有七人皆病創先後卒隆慶初各廕一子贈官有差思贈右諭德思志行邁流俗與李中鄒守益善高陵呂柟亟稱之嘗曰聞過而喜似季路欲寡未能似伯玉則改齊其人也改齊者思別號也王相字懋卿鄞人正德十六年進士由庶吉士授編修豪邁尚志節事親篤孝家貧屢空晏如仕僅四年而卒張翀字習之潼川人正德六年進士選庶吉士改刑科給事中引疾歸起戶科世宗即位詔罷天下額外貢獻其明年中都鎮守內官張陽復貢新茶禮部請遵詔禁不許翀言陛下詔墨未乾旋即反汗人將窺測朝廷玩侮政令且陽名貢茶實雜致他物四方效尤何所抵極願守前詔無墮奸謀不聽寧夏歲貢紅花大為軍民害內外鎮守官涖任率貢馬謝恩翀皆請罷之帝雖是其言不能從尋言中官出鎮非太祖太宗舊制景帝遭國家多故偶一行之謂內臣是朝廷家人但有急事令其來奏乃往歲宸濠謀叛鎮守太監王宏反助為逆內臣果足恃耶時平則坐享尊榮肆毒百姓遇變則心懷顧望不恤封疆不可不亟罷後張孚敬為相竟罷諸鎮守其論實自翀發之屢遷禮科都給事中又言頃聞紫禁之內禱祠繁興乾清宮內官十數輩究習經典講誦科儀賞賚踰涯寵幸日密此由先朝罪人遺黨若太監崔文輩挾邪術為嘗試計陛下為其愚弄而已得肆其奸欺干撓政事牽引羣邪傷太平之業失四海之望竊計陛下寧遠君子而不忍斥其徒寧棄讜言而不欲違其教亦謂可以延年已疾耳側聞頃來嬪御女謁充塞閨幃一二黠慧柔曼者為惑尤甚由是怠日講疏召對政令多僻起居愆度小人窺見間隙遂以左道蠱惑夫以齊醮為足恃而恣欲宮壼之間以荒淫為無傷而邀福邪妄之術甚非古帝王求福不回之道也嘉靖二年四月以災異偕六科諸臣上疏曰昔成湯以六事自責曰政不節歟民失職歟宮壼崇歟女謁盛歟苞苴行歟讒夫昌歟今誠以近事較之快船方減而輒允戴保奏添鎮戍方裁而更聽趙榮分守詔核馬房矣隨格于閻洪之一言詔汰軍匠矣尋奪於監門之羣咻是政不可謂節也末作競於奇巧遊手半於閭閻耕桑時廢缺俯仰之資教化未聞成偷薄之習是民不可謂不失職也兩宮營建採運艱辛或一木而役夫萬千或一椽而廢財十百死亡枕藉之狀呻吟號嘆之聲陛下不得而見聞是宮壼不可謂不崇也奉聖保聖之後先女寵於冊后莊奉肅奉之名聯殊稱於乳母或承恩漸鄰於飛燕或黠慧不下於婉兒內以移主上之性情外以開近習之負倚是女謁不可謂不盛也窮奸之鋭雄公肆賂遺而逃籍沒之律極惡之鵬鎧密行請託而逋三載之誅錢神靈而王英改問於錦衣關節通而于喜竟漏於禁網是苞苴不可謂不行也獻廟主祀屈府部之議而用王槐諛佞之謀重臣批答乏體貌之宜而入羣小惎間之論或譖發於內陰肆毒螫或讒行於外顯逞擠排上以汨朝廷之是非下以亂人物之邪正是讒夫不可謂不昌也凡此皆成湯之所無而今日之所有是以不避斧鉞之誅用附責難之義望陛下採納其年冬命中官督蘇杭織造舉朝阻之不能得翀復偕同官張原等力爭時世宗初政楊廷和等在內閣羣小雖已用事正論猶伸翀前後指斥無所避帝雖不見用然亦嘗報聞不罪也及明年三月帝以桂萼言鋭欲考獻帝且欲立廟禁中翀復偕同官力諫帝於是責以朋言亂政命奪俸既又助尚書喬宇等再疏爭內殿建室之議被詔切讓呂柟鄒守益下獄翀等抗疏救及張璁桂萼召至翀與給事三十餘人連章言兩人賦性奸邪立心憸佞變亂宗廟離間宮闈詆毀詔書中傷善類望亟出之為人臣不忠之戒皆不納帝愈欲考獻帝改孝宗為伯考翀等憂之會給事中張漢卿劾席書振荒不法戶部尚書秦金請命官往勘帝是之翀等乃取廷臣劾萼等章疏送刑部令上請且私相語曰倘上亦云是者即撲殺之璁等以其語聞帝留疏不下而責刑部尚書趙鑑等朋邪害正翀等陷義罔忠而進璁萼學士廷臣相顧駭歎諸曹乃各具一疏力言孝宗不可稱伯考署名者凡二百二十餘人帝皆留中不報七月戊寅諸臣相率伏左順門懇請帝兩遣中官諭之不退遂震怒先逮諸曹為首者八人於詔獄翀與焉尋杖於廷謫戍瞿塘衛而璁萼寵益盛翀居戍所十餘年以東宮冊立恩放還卒劉濟字汝楫騰驤衛人正德六年進士由庶吉士授吏科給事中山西巡撫李鉞劾左右布政使倪天民陳達吏部請黜之帝不許濟疏爭不省帝幸宣府榆林濟皆疏請回鑾詔封許泰江彬伯爵又與諸給事中力爭皆不報世宗即位出核甘肅邊餉奏革涼州分守中官及永昌新添遊兵再遷工科左給事中嘉靖改元進刑科都給事中主事陳嘉言坐事下獄濟疏救不許廖鵬父子及錢寧黨王欽等皆以從逆論斬鵬等夤緣中人冀脫死濟上言自來死囚臨斬鼓下猶受訴詞奏上得報已及日旰再請而後行刑則已薄暮殊非與衆棄之之意乞自三請後鼓下不得受詞鵬欽等罪甚當幸陛下勿疑詔自今以申酉行刑鵬等竟緩決欽後以中旨免死濟力爭不聽故事廠衛有所逮必取原奏情事送刑科簽發駕帖千戶白壽齎帖至濟索原奏壽不與濟亦不肯簽發兩人列詞上帝先入壽言竟詘濟議中官崔文僕李陽鳳坐罪已下刑部帝受文訴移之鎮撫濟率六科爭之不聽都督劉暉以奸黨論戍有詔復官甘肅總兵官李隆嗾亂軍殺巡撫許銘逮入都營免赴鞫濟皆力陳不可帝從其言暉奪職隆受訊伏辜定國公徐光祚規占民田嗾灤州民訐前永平知府郭九皋太監芮景賢主之緹騎逮訊濟請並治光祚章下所司給事中劉最以劾中官崔文調外任景賢復劾其違禁與御史黃國用皆逮下詔獄戍最而謫國用法司爭不得濟言國家置三法司專理刑獄或主質成或主平反權臣不得以恩怨為出入天子不得以喜怒為重輕自錦衣鎮撫之官專理詔獄而法司幾成虛設如最等小過耳羅織於告密之門鍛鍊於詔獄之手旨從內降大臣初不與知為聖政纍非淺且李洪陳宣罪至殺人降級而已王欽兄弟黨奸亂政謫戍而已以最等視之奚啻天淵而罪顧一律何以示天下帝怒奪濟俸一月后父陳萬言奴何璽毆人死帝命釋之濟執奉曰萬言縱奴殺人得免為幸乃並釋璽等是法不行於戚畹奴也濟在諫垣久言論侃侃多與權幸相枝柱直聲甚震帝滋不能堪大禮議起廷臣爭者多得罪濟疏救修撰呂柟編修鄒守益給事中鄧繼曾御史馬明衡朱浙陳逅季本郎中林應驄不聽既而遮諸朝臣於金水橋伏哭左順門受杖闕廷越十二日再杖謫戍遼東十六年冊立皇太子赦諸謫戍者濟不與卒於戍所隆慶初復官贈太常少卿安磐字公石嘉定州人弘治十八年進士改庶吉士正德時歷吏兵二科給事中乞假去世宗踐阼起故官帝手詔欲加興獻帝皇號磐言興藩國也不可加於帝號之上獻諡法也不可加於生存之母本生所後勢不俱尊大義私恩自有輕重會廷臣多力爭事得且止嘉靖元年主事霍韜言科道官褻服受詔大不敬磐偕同官論韜先以議禮得罪名教恐言官發其奸故托拾細事意在傾排帝置不問尋因事言先朝內外巨奸若張忠劉養韋霦魏彬王瓊寧杲等漏網得全要領其貨賂可以通神未嘗不夤緣覬復用宜嚴察預防天下事毋令若輩再壞帝納其言命錦衣官密訪緝之中官張欽家人李賢者帝許任為錦衣指揮磐極言不可不聽錦衣千戶張儀以附中官張鋭黜革御史楊百之忽為訟冤言儀當宸濠逆謀時首倡大義勸鋭卻其餽遺今鋭以是免死儀功不録無以示報磐疏言百之憸邪陽為儀遊說而陰與鋭交關為鋭再起地百之情得乃誣磐因請屬不行挾私行謗吏部尚書喬宇等議黜百之刑部謂情狀未明宜俱逮治帝兩宥之奪百之俸三月磐一月帝頻興齊醮磐又抗言曩武宗為左右所蠱命番僧鎖南綽吉出入豹房內官劉允迎佛西域十數年間糜費大官流謗道路自劉允放而鎖南囚供億減小人伏奈何甫及二年遽襲舊轍不齊則醮月無虛日此豈陛下本意實太監崔文等為之文鐘鼓厮役夤緣冒遷既經降革乃營求還職導陛下至此使貽譏天下後世文可斬也文嘗試陛下欲行香則從之欲登壇則從之欲拜疏則又從之無已則導以遊幸土木導以征伐方且連類以進伺便以逞臣故曰文可斬也疏入報聞戶部主事羅洪載以杖錦衣百戶張瑾下詔獄磐與同官張漢卿張逵葛等請付之法司不聽永福長公主下嫁擇昏於七月下旬磐言長公主於孝惠皇太后為在室孫女期服未滿宜更其期舊儀駙馬見公主行兩拜禮公主坐受乖夫婦之分亦當革正帝以遺旨格之相見禮如故錦衣革職旗校王邦奇屢乞復職磐言邦奇等在正德世貪叨搏噬有若虎狼其捕奸盜也或以一人而牽十餘人或以一家而連數十家鍛鍊獄詞付之司寇謂之鑄銅板其緝妖言也或用番役四出搜愚民詭異之書或購奸僧潛行誘愚民彌勒之教然後從而掩之無有解脫謂之種妖言數十年內死者填獄生者冤號今不追正其罪使得保首領亦已幸矣尚敢肆然無忌屢瀆天聽何為者哉且陛下收已渙之人心奠將危之國脈實在登極一詔若使此輩攘臂一朝壞之則奸人環立𧔧起隄防潰決不知所紀極矣宜嚴究治絶禍源帝不能從其後邦奇卒為大厲如磐言帝驛召席書桂萼等磐請斥之以謝天下且言今欲別立一廟於大內是明知恭穆不可入太廟矣夫孝宗既不得考恭穆又不得入是無考也世豈有無考之太廟哉此其說之自相矛盾者也不聽歷兵科都給事中以率衆伏闕再受杖除名為民卒於家張漢卿字元傑儀封人正德六年進士授魏縣知縣徵拜刑科給事中嘗陳杜僥幸廣儲積慎刑獄三事深切時弊不報武宗將南巡偕同官伏闕諫世宗嗣位從巡撫李鐸言發帑金二十萬優恤宣府軍民以漢卿言併發十三萬於大同屢遷戶科都給事中嘉靖元年冬與同官上言陛下軫念畿輔莊田之害遣官會勘敕自正德以後投獻及額外侵占者盡以給民王言一布天下孰不誦陛下之仁乃者給事中夏言御史樊繼祖主事張希尹勘上涿州薰皮廠安州鷹房草場詔旨留用所司執奏迄不肯從非所以全大信昭至公也皮廠起於馬永成鷹房創於谷大用皆奪民業為之今馬俊趙霦恃藩邸舊恩妄求免革是復蹈永成大用故轍也乞盡還之民而嚴罪俊霦為欺罔者戒后父陳萬言請營新第既又乞莊田內官吳勳等請督蘇州織造漢卿皆極諫不納應天諸府大旱帝將鬻淮浙餘鹽及所沒産易銀振之漢卿言易銀緩非發帑金不可帝為發銀十五萬未幾復偕同官言今天下一歲之供不給一歲之用加以水旱頻仍物力殫屈陛下方躬行節儉而中官梁棟等奏營造缺珠寶是欲括戶部之銀也梁政等又以蠲免三分之數欲行京倉撥補是欲耗太倉之粟也夫內庫不足取之計部計部不足取之郡邑小民郡邑小民將安取哉今東南洊饑民至骨肉相食而搜括之令頻行臣等竊以為不可報聞已又劾席書振濟乖方乞遣官往勘正其欺罔罪帝方眷書甚驛召為禮部尚書不罪也初興獻帝議加皇號漢卿力爭至是又倡衆伏闕兩受杖斥為民二十年言官邢如默賈準等會薦天下遺賢及漢卿終不召張原字士元三原人正德九年進士授吏科給事中疏陳汰冗食慎工作禁貢獻明賞罰廣言路進德學六事中言天下幅員萬里一舉事而計臣輒告匱民貧故也民何以貧守令之裒斂中臣之貢獻為之也比年軍需雜輸十倍前制皆取辦守令守令假以自殖又十倍於上供民既困矣而貢獻者復巧立名目爭新競異號曰孝順取於民者十百進於上者一二朝廷何樂於此而受之人君馭下惟賞與罰邇者庸才厮養莫不封侯腰玉或足不出門而受賞身不履陳而奏功禦敵者竟未沾恩覆軍者多至逃罪此士卒所由解體也疏入權幸惡之傳旨謫新添驛丞嘉靖初召復兵科仍加俸一級南寧伯毛良殺其子錦衣掌印指揮朱震等多違縱原先後論之皆奪職閒住帝進張鶴齡昌國公封陳萬言泰和伯世襲授萬言子紹祖尚寶丞又以外戚蔣泰等五人為錦衣千百戶原抗疏極言請行裁節未幾劾建昌侯張延齡強占民地定國公徐光祚子外戚玉田伯蔣輪昌化伯邵蕙家人擅作威福事雖不盡行權貴皆震懾進戶科右給事中撼門哭再被杖創重卒貧不能歸葬久之都御史陳洪謨備陳原與毛玉裴紹宗王思王相胡瓊等妻子流離狀請恤於朝不許隆慶元年贈光祿少卿毛玉字國珍更字用成雲南右衛軍家子也其先良鄉人弘治十八年進士正德五年由行人擢南京吏科給事中劉瑾既敗大盜𧔧起玉言大學士焦芳劉宇實亂天下請顯僇以謝萬姓羣盜擾山東河南玉請備留都已而盜果渡江以備嚴不敢犯外艱去起南京兵科御史林有年諫迎佛烏思藏下獄玉抗疏救之有年得薄罰又以繼母艱去服闋除吏科世宗即位逾年興邸諸內官怙帝寵漸驕佚又故太監谷大用魏彬等相次謀復起事有萌芽玉即抗疏歷武宗時事勸帝戒嗜欲杜請託以破僥幸之門塞蠱惑之隙帝嘉納焉御史曹嘉素輕險倣宋范仲淹百官圖分廷臣四等加以品題給事中安磐疏駁之言唐王圭之論房玄齡等本朝解縉之論黃福等皆承君命而品藻之未有漫然恣其口吻如嘉者也玉復言嘉背違成法變亂國是乞斥帝從其言貶嘉於外御史許宗魯為嘉訟請斥玉其同官倫以謀亦助為言給事中張原以庶僚聚訟朝廷為之多事重損國體乞身先斥罷玉亦上疏求去言宗魯等知朋友私恩不顧朝廷大體臣一身所係絶微公論所關甚大乞罷臣以謝御史帝皆慰留之時宸濠戚屬連逮者數百人玉奉命往訊多所全活且言宸濠稱亂由左右貪賂釀成之因劾守臣不死事者而禁天下有司與藩府交通帝俱從之再遷左給事中尋伏闕爭大禮下獄受杖竟卒後贈光祿少卿裴紹宗字伯修渭南人正德十二年進士除海門知縣武宗南巡受檄署江都事權幸憚之供億大省世宗即位召入為兵科給事中即疏請法祖定制言太祖貽謀盡善如重大臣勤視朝親歷田野服浣濯衣種蔬宮中毀鏤金牀碎水晶漏造觀心亭揭大學衍義之類陛下所當繹思祖述而二三大臣尤宜朝夕納誨以輔養聖德陛下日御便殿親儒臣使耳目不蔽於淫邪左右不惑於險佞則君志素定治功可成帝嘉納之帝欲加興獻帝皇號紹宗力諫嘉靖二年冬帝以災異頻仍欲罷明年郊祀慶成宴紹宗言祭祀之禮莫重於郊丘君臣之情必通於宴享往以國戚廢大禮今且從吉宜即舉行豈可以災傷復免修撰唐皋亦言之竟得如禮明年以伏闕受杖卒贈官如毛玉王時柯字敷英萬安人正德十二年進士授行人嘉靖三年擢御史疏言桂萼輩以議禮迎合傳升美官薛蕙陳相段續胡侍等連章論劾實出至公今佞人超遷而羣賢獲罪恐海內聞之謂陛下好諛惡直願採忠讜之言消朋比之禍特寬蕙等而聽席書方獻夫辭職除張璁桂萼別任則是非不謬人情悅服忤旨切責未幾有伏闕之事再豫杖除名時御史疏爭大禮居首者余翺字大振定遠人正德中進士嘉靖二年為御史嘗劾司禮太監張佐蒙蔽罪明年七月與時柯等被杖戍邊居戍所十四年皇子生赦還穆宗即位時柯翱皆復官贈時柯光祿少卿鄭本公朔州衛人正德九年進士歷御史武宗不豫國本未建本公請慎選宗室親賢者正位東宮繫天下望不報世宗嗣位及冬而乾清宮成帝由文華殿入居之本公上言事之可思者有六是宮八年營搆一旦告成陛下居安思危當遠羣小節燕遊以防一朝之患重妃配廣繼嗣以為萬世之計慎終如始兢兢業業常若天祖之臨求言益切訪政益勤用防壅蔽之患持聖心遠貨色毋溺于鴆毒重興作惜財力永鑒于先朝帝嘉納之踰月帝欲加興獻帝皇號本公力言不可嘉靖改元出按遼東劾罷副總兵張銘都指揮周輔還朝論救給事中劉最忤旨切責二年十月時享太廟帝不親行本公與同官彭占祺極言遣代非宜報聞明年三月帝欲考興獻帝立廟禁中本公偕同官力爭謂陛下潛邸之日則為孝宗之姪興獻王之子臨御之日則為孝宗之子興獻帝之姪可兩言決也至立廟大內實為不經獻帝之靈既不得入太廟又空去一國之祀而託享于大內焉陛下享太廟其文曰嗣皇帝於獻帝之廟又當何稱愛敬精誠兩無所屬獻帝將蹙然不安帝怒責其朋言亂政奪俸三月其年六月以席書為禮部尚書召張璁桂萼入京本公偕同官四十四人連章言萼首為亂階璁再肆欺罔黃綰黃宗明方獻夫席書連彙接踵尚書之命由中而下行取之旨已罷再頒大臣因此被逐言官由之得罪雖往日瑾彬之奸流禍不若是酷也不納已偕廷臣伏闕哭諫繫獄廷杖還職當是時爭大禮者諸御史中本公言最切中尋遷通政參議九年不調以疾請改南京乃授大理寺丞稍遷南京太僕少卿謝病歸二十年言官邢如默賈準等會薦詔用不赴卒張曰韜字席珍莆田人正德十二年進士授常州推官武宗南巡江彬縱其黨橫行州縣將抵常州民爭欲亡匿時知府暨武進知縣咸入覲曰韜兼綰府縣印召父老約曰彬黨至若等力與格又釋囚徒令與丐者各具瓦石待已彬黨果纍騎來父老直遮之境上曰常州比歲災物力大屈無可啖若曹府中惟一張推官一錢不入即欲具芻亦無以辦言已彬黨疑有他變乃稍退馳使告彬曰韜即上書巡按御史言狀御史東郊行部過常州謂曰事迫矣彬將以他事縛君命曰韜登己舟先發自以小舟尾之彬黨果大至索曰韜誤截御史舟郊使嚴捕截舟者而陰令緩之其黨恐御史上聞咸散去曰韜遂免彬亦戒其黨毋擾由是常以南諸府得安世宗即位召為御史楊廷和等之爭織造也曰韜亦上言陛下既稱閣臣所奏惟愛主惜民是明知織造之害矣既知之而猶不已實由信任大臣弗專而羣小為政也自古未有羣小蒙蔽於內而大臣能盡忠於外者崔文輩二三小人嘗濁亂先朝今復蒙惑聖衷竊弄威福陛下奈何任其逞私不早加斥逐哉臣聞織造一官行金數萬方得之既營之以重資而欲其不責償於下此必無之事也帝不能用席書以中旨拜尚書曰韜與同官胡瓊各抗疏力爭既受杖猶占疏劾奸人陳洸罪未幾竟死隆慶初追贈光祿少卿胡瓊字國華南平人正德六年進士由慈溪知縣入為御史歷按貴州浙江有聲哭諫受杖卒後贈官如曰韜楊淮字東川無錫人正德十二年進士授戶部主事再遷郎中始監京倉革胥徒積弊殆盡繼監淮通二倉罷中官茶果之供除囤基及額外席草費最後監內庫奄人例有供餽淮悉絶之公勤廉慎為尚書孫交秦金所重伏闕受杖月餘卒囊無一物家人賣屋以斂金與淮同里為經紀歸其喪後贈太常少卿申良字延賢高平人登鄉薦授招遠知縣山東盜起良豫為戰守具盜至追擊至黃縣俘斬數百人已復至再破走之歷知諸城良鄉權貴人往來要索良悉拒之進安吉知州錦衣葉瓊倚錢寧勢奪民田良讞還之民瓊因嗾奸人誣奏良事竟得白稍遷常州同知入為戶部員外郎與淮俱杖死贈太僕少卿招遠民懷其政繪像祀之張澯字景川廣東順德人祖善昭四川僉事謫臨江通判先是練子寧親黨戍臨江者八十餘人善昭上書曰子寧忠貫日月太宗謂若使子寧在朕固當用之仁宗亦謂方孝孺等忠臣夫既忠之矣何外親末屬尚以奸惡賜配百年不宥哉疏雖不行中外皆壯之澯登正德九年進士授建平知縣忤巡江御史賀洪改調廣昌訟洪罪洪坐削籍澯自廣昌遷禮部主事監督會同館尚書王瓊與都御史彭澤有隙以澤遣使土魯番許金幣贖哈密城印為澤罪嗾番人在館者暴澤過惡誘澯為署牒且曰澤所為南宋覆轍也事成當顯擢澯力拒曰王公誤矣澤與土魯番檄具在豈宋和戎比昔范仲淹亦嘗致書元昊寧獨澤也不肯署尋進員外郎受杖死仵瑜字忠父蒲圻人父紳工部主事瑜少有志操正德十二年釋褐即謝病去起補禮部主事復引疾歸世宗踐阼起故官疏陳勤聖學篤親親開言路敬大臣選諍臣去浮屠拯困窮重守令修武備儲人材十事已竟死杖下臧應奎字賢徵長興人正德十二年進士授南京車駕主事進貢中官索舟踰額力裁損之中官遣卒譁於部叱左右執之遁去父所生母卒法不得承重執私喪三年入為禮部主事未幾杖死應奎受業湛若水之門以聖賢自期嘗過文廟慨然謂其友曰吾輩歿亦當俎豆其間其立志如此郎中胡璉字重器新喻人正德六年進士官刑部嘗諫武宗南巡受杖主事余禎字興邦奉新人正德九年進士司務李可登字思善輝縣人弘治末鄉薦俱官兵部可登素慷慨以忠義自許竟如其志戶部主事安璽宛平人正德十六年進士刑部主事殷承江夏人正德九年進士穆宗嗣位贈璉太常少卿澯太僕少卿瑜應奎承璽禎光祿少卿可登寺丞郭楠字世重晉江人正德九年進士授浦江知縣課最入為御史世宗即位請召還直臣舒芬王思黃鞏張衍瑞等從之嘉靖元年核餉兩廣劾總兵官撫寧侯朱麒貪懦詔為戒飭尋上章請退朝之暇延見大臣如祖宗故事且言主事陳嘉言忤中官不宜逮繫帝怒奪其俸諸臣伏闕爭大禮皆得罪楠方巡按雲南馳疏言人臣事君阿意者未必忠犯顏者未必悖今羣臣伏闕呼號或榜掠殞身或間關謫戍不意聖明之朝而忠良獲罪若此乞復生者之職恤死者之家庶以收納人心全君臣之義帝大怒遣緹騎逮治言官論救皆不納既至下鎮撫獄掠治復廷杖之削其籍先是諸人既死廷臣莫敢上聞後府經歷俞敬奏言學士豐熙等皆以冒觸宸嚴繫獄拷訊諸臣跡雖狂悖心實忠誠今聞給事裴紹宗編修王相主事余禎等俱已死熙等在獄者亦垂亡矣其呻吟袵席創重不能起者又不知凡幾竊惟獻皇帝神主已奉迎入廟正宜赦過宥罪章大孝於天下望霽雷霆之威施雨露之澤已死者恤其後垂亡者宥其身使人臣無復以言為諱宗社之幸也通政司經歷李繼先亦上言陛下追崇尊號乃人子至情誠不容已羣臣一時冒觸天威重得罪譴死者遂十餘人大臣紛紛去位小臣苟默自容今日大同告變曾無一人進一疏畫一策者則小大之臣志不奮而氣不揚亦可見矣乞録恤已死赦還謫戍追復去國諸臣而在位者委任寬假之使各陳邊計臣愚不勝惓惓帝皆不省明年三月御史王懋言廷臣以議禮死杖下者十有七人其父母妻子顛沛可憫乞賜優恤贈官録廕帝大怒謫懋四川高縣典史逾數日而楠疏至帝益怒遂逮治削籍六年春以災變修省從吏部言量與楠一官得吉水教諭終南寧知府贊曰大禮之爭羣臣至撼門慟哭亦過激且戇矣然再受廷杖或死或斥廢錮終身抑何慘也楊慎博物洽聞於文學為優王思張翀諸人或納諫武宗之朝或抗論世宗初政侃侃鑿鑿死節官下非徒意氣奮發立效一時已也
