body:
  text: 明史卷一百七十一列傳第五十九王驥孫瑾徐有貞楊善李實趙榮霍瑄沈固王越王驥字尚德束鹿人長身偉幹便騎射剛毅有膽曉暢戎略中永樂四年進士為兵科給事中使山西奏免鹽池逋課二十餘萬尋遷山西按察司副使洪熙元年入為順天府尹宣德初擢兵部右侍郎代顧佐署都察院久之署兵部尚書九年命為真正統元年奉詔議邊事越五日未奏帝怒執驥與侍郎鄺野下之獄尋得釋阿台朵兒只伯數寇甘涼邊將屢失利侍郎柴車徐晞都御史曹翼相繼經理邊務未能制二年五月命驥往許便宜行事驥疾驅至軍大會諸將問往時追敵魚兒海子先退敗軍者誰僉曰都指揮安敬驥先承密旨戮敬遂縛敬斬轅門並宣敕責都督蔣貴諸將皆股栗驥乃大閲將士分兵畫地使各自防禦邊境肅然閲軍甘涼汰三之一定更番法兵得休息而轉輸亦省俄阿台復入寇帝以任禮為平羌將軍蔣貴趙安為副驥督軍三年春偕諸將出塞以貴為前鋒而自與任禮帥大軍後繼與貴約曰不捷無相見也貴擊敵石城敵走兀魯乃貴帥輕騎二千五百人出鎮夷間道兼行三日夜及之擒左丞脫羅斬首三百餘獲金銀印各一駝馬兵甲千計驥與禮自梧桐林至亦集乃擒樞密同知僉院十五人萬戶二人降其部落窮進至黑泉而趙安等出昌寧至刁力溝亦擒右丞達魯花赤三十人分道夾擊轉戰千餘里朵兒只伯遠遁論功貴禮皆封伯而驥兼大理卿支二俸尋召還理部事久之麓川之役起麓川宣慰使思任發叛數敗王師黔國公沐晟討之不利道卒以沐昂代昂條上攻取策徵兵十二萬人中官王振方用事喜功名以驥可屬思大舉驥亦欲自效六年正月遂拜蔣貴平蠻將軍李安劉聚為副而驥總督軍務大發東南諸道兵十五萬討之刑部侍郎何文淵侍講劉球先後疏諫不納瀕行賜驥貴金兜鍪細鎧蟒繡緋衣朱弓矢驥請得以便宜從事馳傳至雲南部署諸將遣參將冉保由東路趨孟定大軍由中路至騰衝分道夾擊是年十一月與貴以二萬人趨上江圍其寨五日不下會大風縱火焚柵拔之斬首五萬餘級進自夾象石渡下江通高黎貢山道閏月至騰衝長驅抵杉木籠山賊乘高據險築七壘相救驥遣參將宮聚副將劉聚分左右翼緣嶺上而自將中軍奮擊之賊大潰乘勝至馬鞍山踰月抵賊巢山陡絶深塹環之東南面江壁立不可上驥遣前軍覘賊敗其伏兵賊更自間道立柵馬鞍山出大軍後驥戒軍中無動而令都指揮方瑛以六千人突賊寨斬首數百復誘敗其象陳會東路軍冉保等已合木邦車里大侯諸土軍破烏木弄戞邦諸寨遣別將守西渡防賊軼刻期與大軍會驥乃督諸將環攻其七門積薪縱火風大作賊焚死無算溺江死者數萬人思任發攜二子走孟養獲其虎符金牌宣慰司印及所掠騰衝諸衛所印章三十有奇犁其巢穴留兵守之而還明年四月遣偏師討維摩土司韋郎羅郎羅走安南俘其妻子傳檄安南縛之以獻五月師還帝遣戶部侍郎王質齎羊酒迎勞賜宴奉天門封推誠宣力武臣特進榮祿大夫上柱國靖遠伯歲祿千二百石世襲指揮同知賜貂蟬冠玉帶貴進侯劉聚等遷賞有差從征少卿李蕡郎中侯璡楊寧皆擢侍郎士卒賜豫加等府庫為竭思任發之竄緬甸也其子思機發復帥餘衆居者藍乞入朝謝罪廷議因而撫之王振不可是年八月復命驥總督雲南軍務帥參將冉保毛福壽以往未至而思機發遣弟招賽入貢緬甸亦奏獲思任發要麓川地朝廷不納其貢且敕驥圖緬甸驥因請濟師八年五月復命蔣貴為平蠻將軍調土兵五萬往發卒轉餉五十萬人驥初檄緬甸送思任發緬人陽聽命持兩端是年冬大軍逼緬甸緬人以樓船載思任發覘官軍而潛以他舟載之歸驥知緬人資木邦水利為唇齒且慮思機發將以獻其父故仇之故終不肯獻思任發驥乃趨者藍破思機發巢得其妻子部落而思機發獨脫去明年召還加祿三百石命與都御史陳鎰巡延綏寧夏甘肅諸邊初寧夏備邊軍半歲一更後邊事亟三年乃更軍士日久疲罷又益選軍餘防冬家有五六人在邊者軍用重困驥請歲一更當代者以十月至而代者留至來年正月乃遣歸邊備足而軍不勞帝善其議行之諸邊當是時緬人已以思任發來獻而思機發竊駐孟養地屢遣使入貢謝罪中外咸願罷兵振意終未慊要思機發躬入朝謝沐斌帥師至金沙江招之不至諭孟養執之以獻亦不聽命於是振怒欲盡滅其種類十三年春復命驥總督軍務宮聚為平蠻將軍帥師十五萬人往明年造舟浮金沙江蠻人柵西岸拒守官軍聯舟為浮橋以濟拔其柵進破鬼哭山連下十餘寨墜溺死者無算而思機發終脫去不可得是時官軍踰孟養至孟海地在金沙江西去麓川千里自古兵力所不至諸蠻見大軍皆震怖而大軍遠涉驥慮餽餉不繼亟謀引還時思機發雖遁匿而思任發少子思陸復擁衆據孟養驥度賊終不可滅乃與思陸約立石表誓金沙江上曰石爛江枯爾乃得渡遂班師驥凡三征麓川卒不得思機發議者咎驥等老師費財以一隅騷動天下而會川衛訓導詹英抗疏劾之大略謂驥等多役民夫舁綵繒散諸土司以邀厚利擅用腐刑詭言進御實充私役師行無紀十五萬人一日起行互相蹂踐每軍負米六斗跋陟山谷自縊者多抵金沙江倣徨不敢渡既渡不敢攻攻而失都指揮路宣翟亨等俟賊解多捕魚戶為俘以地分木邦緬甸掩敗為功此何異李宓之敗而楊國忠以捷聞也奏下法司王振左右之得不問而命英從驥軍自效英知往且獲罪匿不去當是時湖廣貴州諸苗所在蜂起圍平越及諸城堡貴州東路閉驥至武昌詔還軍討苗會英宗北狩羣臣劾王振並及驥以驥方在軍且倚之平苗置弗問命佩平蠻將軍印充總兵官侍郎侯璡總督軍務已而苗益熾衆至十餘萬平越被圍半歲巡按御史黃鎬死守糧盡掘草根食之而驥頓軍辰沅不進景泰元年鎬草疏置竹筒中募人自間道出聞於朝更命保定伯梁珤為平蠻將軍益兵二萬人侯璡自雲南督之前疾戰大破賊盡解諸城圍而驥亦俘剗平王蟲富等以獻驥還命總督南京機務其冬乞世券與之南畿軍素偷惰驥至以所馭軍法教之于謙弗重也朝廷以其舊臣寵禮之三年四月賜敕解任奉朝請驥年七十餘躍馬食肉盛聲伎如故久之石亨徐有貞等奉英宗復辟驥與謀賞稍後上章自訟言臣子祥入南城為諸將所擠墮地幾死今論功不及疑有蔽之者帝乃官祥指揮僉事而命驥仍兵部尚書理部事加號奉天翊衛推誠宣力守正文臣光祿大夫餘如故數月請老又三年乃卒年八十三贈靖遠侯諡忠毅傳子瑺及孫添添尚嘉善長公主再傳至孫瑾嘉靖初提督三千營協守南京還掌左府久之佩征蠻將軍印鎮兩廣廣東新寧新興思平間多高山叢箐亡命者輒入諸瑤中吏不得問衆至萬餘人流劫高要陽江諸縣官軍討之輒失利三十五年春瑾與巡撫都御史談愷檄諸路土兵誅其魁陳以明悉平諸巢捷聞加太子太保而扶藜葵梅諸山洞馮天恩等據險為寇者亦數十年瑾復督軍分道進剿破巢二百餘復以功廕一子錦衣百戶言官劾其暴橫召還爵傳至明亡乃絶徐有貞字元玉初名珵吳人宣德八年進士選庶吉士授編修為人短小精悍多智數喜功名凡天官地理兵法水利陰陽方術之書無不諳究時承平既久邊備偷惰而西南用兵不息珵以為憂正統七年疏陳兵政五事帝善之而不能用十二年進侍講十四年秋熒惑入南斗珵私語友人劉溥曰禍不遠矣亟命妻子南還及土木難作郕王召廷臣問計珵大言曰驗之星象稽之曆數天命已去惟南遷可以紓難太監金英叱之胡濙陳循咸執不可兵部侍郎于謙曰言南遷者可斬也珵大沮不敢復言景帝即位遣科道官十五人募兵於外珵行監察御史事往彰德寇退召還仍故官珵急於進取自創南遷議為內廷訕笑久不得遷因遺陳循玉帶且用星術言公帶將玉矣無何循果加少保大喜因屢薦之而是時用人多決於少保于謙珵屬謙門下士遊説求國子祭酒謙為言於帝帝曰此議南遷徐珵邪為人傾危將壞諸生心術珵不知謙之薦之也以為沮己深怨謙循勸珵改名因名有貞景泰三年遷右諭德河決沙灣七載前後治者皆無功廷臣共舉有貞乃擢左僉都御史治之至張秋相度水勢條上三策一置水門一開支河一濬運河議既定督漕都御史王竑以漕渠淤淺滯運艘請急塞決口帝敕有貞如竑議有貞守便宜言臨清河淺舊矣非因決口未塞也漕臣但知塞決口為急不知秋冬雖塞來春必復決徒勞無益臣不敢邀近功詔從其言有貞於是大集民夫躬親督率治渠建閘起張秋以接河沁河流之旁出不順者為九堰障之更築大堰楗以水門閲五百五十五日而工成名其渠曰廣濟閘曰通源方工之未成也帝以轉漕為急工部尚書江淵等請遣中書偕文武大臣督京軍五萬人往助役期三月畢工有貞言京軍一出日費不資遇漲則束手坐視無所施力今泄口已合決堤已堅但用沿河民夫自足集事議遂寢事竣召還佐院事帝厚勞之復出巡視漕河濟寧十三州縣河夫多負官馬及他雜辦所司趣之亟有貞為言免之七年秋山東大水河堤多壞惟有貞所築如故有貞乃修舊隄決口自臨清抵濟寧各置減水閘水患悉平還朝帝召見獎勞有加進左副都御史八年正月景帝不豫石亨張軏等謀迎上皇以告太常卿許彬彬曰此不世功也彬老矣無能為徐元玉善奇策盍與圖之亨即夜至有貞家聞之大喜曰須令南城知此意軏曰陰達之矣令太監曹吉祥入白太后辛巳夜諸人復會有貞所有貞升屋覽乾象亟下曰時至矣勿失時方有邊警有貞令軏詭言備非常勒兵入大內亨掌門鑰夜四鼓開長安門納之既入復閉以遏外兵時天色晦冥亨軏皆惶惑謂有貞曰事當濟否有貞大言必濟趣之行既薄南城門錮毀牆以入上皇燈下獨出問故有貞等俯伏請登位乃呼進輿兵士惶懼不能舉有貞率諸人助挽以行星月忽開朗上皇各問諸人姓名至東華門門者拒弗納上皇曰朕太上皇帝也遂反走乃升奉天門有貞等常服謁賀呼萬歲景帝明當視朝羣臣咸待漏闕下忽聞殿中呼噪聲方驚愕俄諸門畢啓有貞出號於衆曰太上皇帝復位矣趣入賀即日命有貞兼學士入內閣參預機務明日加兵部尚書有貞謂亨曰願得冠側注從兄後亨為言於帝封武功伯兼華蓋殿大學士掌文淵閣事賜號奉天翊衛推誠宣力守正文臣祿千一百石世錦衣指揮使給誥券有貞遂誣少保于謙大學士王文殺之內閣諸臣斥逐略盡陳循素有德於有貞亦弗救也事權盡歸有貞中外咸側目而有貞愈益發舒進見無時帝亦傾心委任有貞既得志則思自異於曹石窺帝於二人不能無厭色乃稍稍裁之且微言其貪橫狀帝亦為之動御史楊瑄奏劾亨吉祥侵占民田帝問有貞及李賢皆對如瑄奏有詔獎瑄亨吉祥大怨恨日夜謀搆有貞帝方眷有貞時屏人密語吉祥令小豎竊聽得之故泄之帝帝驚問曰安所受此語對曰受之有貞某日語某事外間無弗聞帝自是疏有貞會御史張鵬等欲糾亨他罪未上而給事中王鉉泄之亨吉祥二人乃泣訴於帝謂內閣實主之遂下諸御史獄併逮繫有貞及李賢忽雷雹交作大風折木帝感悟重違亨意乃釋有貞出為廣東參政亨等憾未已必欲殺之令人投匿名書指斥乘輿云有貞怨望使其客馬士權者為之遂追執有貞於德州並士權下詔獄榜治無驗會承天門災肆赦亨吉祥慮有貞見釋言於帝曰有貞自撰武功伯券辭云纘禹成功又自擇封邑武功禹受禪為帝武功者曹操始封也有貞志圖非望帝出以示法司刑部侍郎劉廣衡等奏當棄市詔徙金齒為民亨敗帝從容謂李賢王翺曰徐有貞何大罪為石亨輩所陷耳其釋歸田里成化初復冠帶間住有貞既釋歸猶冀帝復召時時仰觀天象謂將星在吳益自負常以鐵鞭自隨數起舞及聞韓雍征兩廣有功乃擲鞭太息曰孺子亦應天象邪遂放浪山水間十餘年乃卒有貞初出獄時拊士權背曰子義士也他日一女相託金齒歸士權時往候之絶不及婚事士權辭去終身不言其事人以是薄有貞而重士權楊善字思敬大興人年十七為諸生成祖起兵預城守有勞授典儀所引禮舍人永樂元年改鴻臚寺序班善偉風儀音吐洪亮工進止每朝謁引進奏時上目屬之纍進右寺丞仁宗即位擢本寺卿宣德六年被劾下獄褫冠帶踰月正統六年子容詐作中官書假金於尚書吳中事覺謫戍威遠衛置善不問久之擢禮部左侍郎仍視鴻臚事十四年八月扈駕北征及土木師潰善間行得脫也先將入寇改左副都御史與都督王通提督京城守備寇退進右都御史視鴻臚如故景泰元年廷臣朝正畢循故事相賀於朝房善獨流涕曰上皇在何所而我曹自相賀乎衆愧為之止是年夏李實羅綺使瓦剌議罷兵未還而也先使至言朝廷遣使報阿剌知院而不遣大臣報可汗及太師事必不濟尚書王直等奏其言廷議簡四人為正副使與偕行帝命俟李實還議之已而實將至乃命善及侍郎趙榮為使齎金銀書幣往先是袁敏者請齎服御物問上皇安不納及是尚書胡濙等言上皇蒙塵久御用服食宜付善等隨行亦不報時也先欲還上皇而敕書無奉迎語自齎賜也先外善等無他賜善乃出家財悉市彼中所需者攜以往既至其館伴與飲帳中詫善曰土木之役六師何怯也善曰彼時官軍壯者悉南征王司禮邀大駕幸其里不為戰備故令汝得志耳今南征將士歸可二十萬又募中外材官技擊可三十萬悉教以神鎗火器藥弩百步外洞人馬腹立死又用策士言緣邊要害隱鐵椎三尺馬蹄踐輒穿又刺客林立夜度營幕若猿猱伴色動善曰惜哉今皆置無用矣問何故曰和議成歡好且若兄弟安用此因以所齎遺之其人喜悉以語也先明日謁也先亦大有所遺也先亦喜善因詰之曰太上皇帝朝太師遣貢使必三千人歲必再賚金幣載途乃背盟見攻何也也先曰奈何削我馬價豫帛多剪裂前後使人往多不歸又減歲賜善曰非削也太師馬歲增價難繼而不忍拒故微損之太師自度價比前孰多也帛剪裂者通事為之事露誅矣即太師貢馬有劣弱貂或敝亦豈太師意耶且使者多至三四千人有為盜或犯他法歸恐得罪故自亡耳留若奚為貢使受宴賜上名或浮其人數朝廷核實而豫之所減乃虛數有其人者固不減也也先屢稱善善復曰太師再攻我屠戮數十萬太師部曲死傷亦不少矣上天好生太師好殺故數有雷警今還上皇和好如故中國金幣日至兩國俱樂不亦美乎也先曰敕書何以無奉迎語善曰此欲成太師令名使自為之若載之敕書是太師迫於朝命非太師誠心也也先大喜問上皇歸將復得為天子乎善曰天位已定難再移也先曰堯舜如何善曰堯讓舜今兄讓弟正相同也其平章昂克問善何不以重寶來購善曰若齎貨來人謂太師圖利今不爾乃見太師仁義為好男子垂史策頌揚萬世也先笑稱善知院伯顏帖木耳勸也先留使臣而遣使要上皇復位也先懼失信不可竟許善奉上皇還時舉朝競奇善功而景帝以非初遣旨薄其賞遷左都御史仍蒞鴻臚事二年廷臣朝正旦畢修賀朝房善又曰上皇不受賀我曹何相賀也三年正月加太子太保六年以衰老乞致仕優詔不許善狀貌魁梧應對捷給然無學術滑稽對客鮮莊語家京師治第郭外園多善果歲時饋公卿戚里中貴無不得其歡心王振用事善媚事之至是又與石亨曹吉祥結天順元年正月亨吉祥奉上皇復辟善以預謀封奉天翊衛推誠宣力武臣特進光祿大夫柱國興濟伯歲祿千二百石賜世券掌左軍都督府事尚書胡濙頌善迎駕功命兼禮部尚書尋改守正文臣善使瓦剌攜子四人行至是並得官又為從子養子乞恩得官者復十數人氣勢烜赫招權納賄亨輩嫉而間之以是漸疏外二年五月卒贈興濟侯諡忠敏善負才辨以巧取功名而憸忮為士論所棄其為序班坐事與庶吉士章朴同繫獄久之相狎時方窮治方孝孺黨朴言家有孝孺集未及燬善從借觀密奏之朴以是誅死而善得復官于謙王文之戮陳循之竄善亦有力焉子宗襲爵後革奪門功降金吾指揮使孫增尚公主李實字孟誠合州人正統七年進士為人恣肆無拘檢有口辨景泰初為禮科給事中也先令完者脫歡議和實請行擢禮部右侍郎以往少卿羅綺為副至則見上皇頗得也先要領還言也先請和無他意及楊善往上皇果還是年十月進右都御史巡撫湖廣五年召還掌院事初實使謁上皇請還京引咎自責失上皇意後以居鄉暴橫斥為民趙榮字孟仁其先西域人元時入中國家閩縣舅薩琦官翰林從入都以能書授中書舍人正統十四年十月也先擁上皇至大同知府霍瑄謁見慟哭而返也先遂犯京師奉上皇登土城邀大臣出迓榮慨然請行大學士高穀拊其背曰子忠義人也解所佩犀帶贈之即擢大理右少卿充鴻臚卿偕右通政王復出城朝見進羊酒諸物也先以非大臣遣之還而邀于謙石亨王直胡濙出景帝不遣改榮太常少卿仍供事內閣景泰元年七月擢工部右侍郎偕楊善等往敕書無奉迎語善口辨榮左右之竟奉上皇歸進左侍郎行人王晏請開沁河通漕運再下廷議言不便遣榮往勘還亦言不便尋奉敕會山東河南三司相度河道衆以榮不由科目慢之榮怒多所撻辱又自攝衣探水深淺三司各上章言榮單馬馳走驚駭軍民杖傷縣官鬻廩米多取其直撫按薛希璉張琛亦以聞章下治河僉都御史徐有貞核奏法司言榮雖失大體終為急於國事鬻米從人所為諸臣侮大臣抗敕旨宜逮治希璉琛亦宜罪帝令按臣責取諸臣供狀宥之天順元年進尚書曹欽反榮策馬大呼於市曰曹賊作逆壯士同我討罪果有至者即率之往賊平英宗與李賢言歎榮忠命兼大理寺卿食其俸七年以疾罷成化十一年卒賜恤如制霍瑄字廷璧鳳翔人由鄉舉入國學授大同通判正統十二年以武進伯朱冕薦就擢知府也先擁英宗至城下瑄與理餉侍郎沈固等出謁叩馬號泣衆露刃叱之不為動上皇命括城內金帛瑄悉所有獻之上皇嘉歎寇數出沒大同渾源伺軍民樵棌輒驅掠或幸脫歸率殘傷肢體遺民相率入城無所棲又乏食瑄俱為奏之老弱聽暫徙發粟振而所留城守丁壯除賦役秩滿當遷鎮巡諸臣乞留詔加山西右參政仍治府事英宗復位徵拜瑄工部右侍郎而固亦以石亨薦起為戶部尚書既而巡撫上瑄治行賜誥旌異初瑄在大同巡撫年富被逮瑄資其家還里為鎮守太監韋力轉所惡撻之十餘至是瑄以聞且言力轉每宴輒用妓樂服御僭侈如王者強取部民女為妾力轉亦訐瑄違法事帝兩釋焉其年轉左賜二品服成化初屢為言官所劾命致仕卒於京師瑄初治郡有聲晚節不檢特以艱危時見知天子遂久列顯位沈固丹陽人永樂中起家鄉舉積官至尚書石亨敗乞休去王越字世昌濬人長身多力善射涉書史有大略登景泰二年進士廷試日旋風起揚其卷去更給卷乃畢事授御史出按陝西聞父訃不俟代輒歸為都御史所劾帝特原之天順初起掌諸道章奏超拜山東按察使七年大同巡撫都御史韓雍召還帝難其代喟然曰安得如雍者而任之李賢薦越召見越偉服短袂進止便利帝喜擢右副都御史以行甫至遭母憂奪情視事越乃繕器甲簡卒伍修堡寨減課勸商為經久計成化三年撫寧侯朱永征毛里孩以越贊理軍務其秋兼巡撫宣府五年冬寇入河套延綏巡撫王鋭請濟師詔越帥師赴之河套者周朔方秦河南地土沃豐水草東距山西偏頭關西距寧夏可二千里三面阻河北拊榆林之背唐三受降城在河外故內地明初阻河為守延綏亦無事自天順間毛里孩等三部始入為寇然時出沒不敢久駐至是始屯牧其中屢為邊患越至榆林遣遊擊將軍許寧出西路龍州鎮靖諸堡范瑾出東路神木鎮羌諸堡而自與中官秦剛按榆林城為聲援寧戰黎家澗瑾戰崖窰川皆捷右參將神英又破敵於鎮羌寇乃退明年正月以捷聞越引還抵偏頭關延綏告警兵部劾越擅還詔弗罪而令越屯延綏近地為援寇萬餘騎五路入掠越令寧等擊退之進右副都御史是年三月朝廷以阿羅出等擾邊不止拜撫寧侯朱永為將軍與越共圖之破敵開荒川諸將追奔至牛家寨阿羅出中流矢走論功進右都御史又明年越以方西征辭大同巡撫詔聽之加總督軍務專辦西事然是時寇數萬而官軍堪戰者僅萬人又分散防守勢不敵永越乃條上戰守二策尚書白圭亦難之請敕諸將守其年寇復連入懷遠諸堡永越禦却之圭復請大舉搜套明年遣侍郎葉盛至軍議時永已召還越以士卒衣裝盡壞馬死過半請且休兵與盛偕還而廷議以套不滅三邊終無寧歲先所調諸軍已踰八萬將權不一迄無成功宜專遣大將調度乃拜武靖侯趙輔為平虜將軍敕陝西寧夏延綏三鎮兵皆受節制越總督軍務比至寇方深入環慶固原飽掠軍竟無功越輔以滿都魯孛羅忽癿加思蘭方強盛勢未可破乃奏言欲窮搜河套非調精兵十五萬不可今餽餉煩勞公私困竭重加科斂內釁可虞宜姑事退守散遣士馬量留精鋭就糧鄜延沿邊軍民悉令內徙其寇所出沒之所多置烽燧鑿塹築牆以為保障奏上廷議不決越等又奏寇知我軍大集移營近河潛謀北渡殆不戰自屈但山陝荒旱芻糧缺供邊地早寒凍餒相繼以時度之攻取實難請從防守之策臣等亦暫還朝於是部科諸臣劾越輔欺謾會輔有疾召還以寧晉伯劉聚代明年越與聚敗寇漫天嶺進左都御史是時三遣大將皆以越總督軍務寇每入小擊輒去軍罷即復來率一歲數入將士益玩寇而寇勢轉熾其年九月滿都魯及孛羅忽癿加思蘭留妻子老弱於紅鹽池大舉深入直抵秦州安定諸州縣越策寇盡鋭西不備東偏乃率延綏總兵官許寧遊擊將軍周玉各將五千騎為左右哨出榆林踰紅兒山涉白鹽灘兩晝夜行八百里將至暴風起塵翳目一老卒前曰天贊我也去而風使敵不覺還軍遇歸寇處下風乘風擊之蔑不勝矣越遽下馬拜之擢為千戶分兵千為十覆而身率寧玉張兩翼薄其營大破之擒斬三百五十獲駝馬器械無算焚其廬帳而還及滿都魯等飽掠歸則妻子畜産已蕩盡相顧痛哭自是遠徙北去不敢復居河套西陲息肩者數年初文臣視師者率從大軍後出號令行賞罰而已越始多選跳蕩士為腹心將親與寇搏又以間覘敵纍重邀劫之或剪其零騎用是數有功十年春廷議設總制府於固原舉定西侯蔣琬為總兵官越提督軍務控制延綏寧夏甘肅三邊總兵巡撫而下並聽節制詔罷琬即以越任之三邊設總制自此始論功加太子少保增俸一級紀功郎中張謹兵科給事中郭鏜等論劉聚等濫殺冒功並劾越妄奏越方自以功大賞薄遂怏怏稱疾還朝明年與左都御史李賓同掌院事兼督十二團營越素以才自喜不修小節為朝議所齮至是乃破名檢與群小關通姦人韋英者以官奴從征延綏冒功得百戶汪直掌西廠用事英為爪牙越因英自結於直內閣論罷西廠越遇大學士劉吉劉珝於朝顯謂之曰汪直行事亦甚公如黃賜專權納賂非直不能去商萬在事久是非多有所忌憚二公入閣幾日何亦為此珝曰吾輩所言非為身謀使直行事皆公朝廷置公卿大夫何為越不能對兵部尚書項忠罷越當遷而朝命豫陝西巡撫余子俊越彌不平請解營務優詔不許因自陳搗巢功為故尚書白圭所抑從征將士多未録乞移所加官酬之子俊亦言越賞不酬功乃進兵部尚書仍掌院事尋加太子太保越急功名汪直初東征越望督師為陳鉞所沮鉞驟寵心益豔之十六年春延綏守臣奏寇潛渡河入靖虜越乃説直出師詔拜保國公朱永為平虜將軍直監軍而越提督軍務越説直令永率大軍由南路己與直將輕騎循塞垣而西俱會榆林越至大同聞敵帳在威寧海子則盡選宣大兩鎮兵二萬出孤店潛行至貓兒莊分數道值大風雨雪晦冥進至威寧寇猶不覺掩擊大破之斬首四百三十餘級獲馬牛羊六千師不至榆林而還永所出道迂不見敵無功由是封越威寧伯世襲歲祿千二百石越受封不當復領都察院而越不欲就西班御史許進等頌其功引王驥楊善例請仍領院事提督團營從之明年復與直永帥師出大同適寇入掠追擊至黑石崖擒斬百二十餘人獲馬七百匹進太子太傅增歲祿四百石明制文臣不得封公侯越從勳臣例改掌前軍都督府總五軍營兵督團營如故自是真為武人且望侯矣其年五月宣府告警命佩平胡將軍印充總兵官復以直監督軍務率京軍萬人赴之比至寇已去因留屯其地至冬而直為其儕所間寵衰越等再請班師不許陳鉞居兵部亦代直請帝切責之兩人始懼已大同總兵官孫鉞卒即命越代之而以直總鎮大同宣府悉召京營將士還明年寇犯延綏越等調兵援之頗有斬獲益祿五十石帝是時益知越直交結狀大學士萬安等以越有智計恐誘直復進乃請調越延綏以離之兩人勢益衰明年直得罪言官並劾越詔奪爵除名謫居安陸三子以功廕得官者皆削籍且使使齎敕諭之越聞使至欲自裁見敕有從輕語乃稍自安越既為禮法士所疾自負豪傑驁然自如飲食供奉擬王者射獵聲樂自恣雖謫徙不少衰故其得罪時議頗謂太過而竟無白之者孝宗立赦還弘治七年越屢疏訟冤詔復左都御史致仕越年七十耄矣復結中官李廣以中旨召掌都察院事給事中季源御史王一言等交章論乃寢十年冬寇犯甘肅廷議復設總制官先後會舉七人不稱旨吏部尚書屠滽以越名上乃詔起原官加太子太保總制甘涼邊務兼巡撫越言甘鎮兵弱非籍延寧兩鎮兵難以克敵請兼制兩鎮解巡撫事從之明年越以寇巢賀蘭山後數擾邊乃分兵三路進剿斬四十三級獲馬駝百餘加少保兼太子太傅遂條上制置哈密事宜會李廣得罪死言官連章劾廣黨皆及越越聞憂恨其冬卒於甘州贈太傅諡襄敏越姿表奇偉議論飆舉久歷邊陲身經十餘戰知敵情偽及將士勇怯出奇制勝動有成算奬拔士類籠罩豪俊用財若流水以故人樂為用又嘗薦楊守隨鍾屠滽輩皆有名於世睦族敦舊振窮恤貧如恐不及其膽智過絶於人嘗與朱永帥千人巡邊寇猝至永欲走越止之列陳自固寇疑未敢前薄暮令騎皆下馬銜枚魚貫行自率驍勇為殿從山後行五十里抵城謂永曰我一動寇追擊無噍類矣示暇以惑之也下馬行無軍聲令寇不覺耳性故豪縱嘗西行謁秦王王開筵奏妓越語王下官為王吠犬久矣寧無以相酬者因盡乞其妓女以歸一夕大雪方圍爐飲諸妓擁琵琶侍一小校詗敵還陳敵情未竟越大喜酌金卮飲之命彈琵琶侑酒即以金卮賜之語畢益喜指妓絶麗者目之曰若得此何如校惶恐謝越大笑立豫之校所至為盡死力越在時人多咎其貪功及死而將餒卒惰冒功糜餉滋甚邊臣竟未有如越者贊曰人非有才之難而善用其才之難王驥王越之將兵楊善之奉使徐有貞之治河其才皆有過人者假使隨流平進以幹略自奮不失為名卿大夫而顧以躁於進取依附攀援雖剖符受封在文臣為希世之遇而譽望因之隳損甚亦不免削奪名節所繫可不重哉
