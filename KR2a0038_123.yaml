body:
  text: 明史卷一百二十三列傳第十一陳友諒張士誠方國珍明玉珍陳友諒沔陽漁家子也本謝氏祖贅於陳因從其姓少讀書略通文義有術者相其先世墓地曰法當貴友諒心竊喜嘗為縣小吏非其好也徐壽輝兵起友諒往從之依其將倪文俊為簿掾壽輝羅田人又名真一業販布元末盜起袁州僧彭瑩玉以妖術與麻城鄒普勝聚衆為亂用紅巾為號奇壽輝狀貌遂推為主至正十一年九月陷蘄水及黃州路敗元威順王寬徹不花遂即蘄水為都稱皇帝國號天完建元治平以普勝為太師未幾陷饒信明年分兵四出連陷湖廣江西諸郡縣遂破昱嶺關陷杭州別將趙普勝等陷太平諸路勢大振然無遠志所得不能守明年為元師所破壽輝走免已而復熾遷都漢陽為其丞相倪文俊所制十七年九月文俊謀弒壽輝不克奔黃州時友諒隸文俊麾下數有功為領兵元帥遂乘釁殺文俊並其兵自稱宣慰使尋稱平章政事明年陷安慶又破龍興瑞州分兵取邵武吉安而自以兵入撫州已又破建昌贛汀信衢當是時江以南惟友諒兵最強太祖之取太平也與為鄰友諒陷元池州太祖遣常遇春擊取之由是數相攻擊趙普勝者故驍將號雙刀趙初與俞通海等屯巢湖同歸太祖叛去歸壽輝至是為友諒守安慶數引兵爭池州太平往來掠境上太祖患之啖普勝客使潛入友諒軍間普勝普勝不之覺見友諒使者輒訴功悻悻有德色友諒銜之疑其二於己以會師為名自江州猝至普勝以燒羊逆於雁汊甫登舟友諒即殺普勝並其軍乃以輕兵襲池州為徐達等擊敗師盡覆始友諒破龍興壽輝欲徙都之友諒不可未幾壽輝遽發漢陽次江州江州友諒治所也伏兵郭外迎壽輝入即閉城門悉殺其所部即江州為都奉壽輝以居而自稱漢王置王府官屬遂挾壽輝東下攻太平太平城堅不可拔乃引巨舟薄城西南士卒緣舟尾攀堞而登遂克之志益驕進駐采石磯遣部將陽白事壽輝前戒壯士挾鐵撾擊碎其首壽輝既死以采石五通廟為行殿即皇帝位國號漢改元大義太師鄒普勝以下皆仍故官會大風雨羣臣班沙岸稱賀不能成禮友諒性雄猜好以權術馭下既僭號盡有江西湖廣之地恃其兵強欲東取應天太祖患友諒與張士誠合乃設計令其故人康茂才為書誘之令速來友諒果引舟師東下至江東橋呼茂才不應始知為所紿戰於龍灣大敗潮落舟膠死者無算亡戰艦數百乘輕舸走張德勝追敗之慈湖焚其舟馮國勝以五翼軍蹙之友諒出皂旗軍迎戰又大敗遂棄太平走江州太祖兵乘勝取安慶其將于光歐普祥皆降明年友諒遣兵復陷安慶太祖自將伐之復安慶長驅至江州友諒戰敗夜挈妻子奔武昌其將吳宏以饒降王溥以建昌降胡廷瑞以龍興降友諒忿疆土日蹙乃大治樓船數百艘皆高數丈飾以丹漆每船三重置走馬棚上下人語聲不相聞櫓箱皆裹以鐵載家屬百官盡鋭攻南昌飛梯衝車百道並進太祖從子文正及鄧愈堅守三月不能下太祖自將救之友諒聞太祖至撤圍東出鄱陽湖遇於康郎山友諒集巨艦連鎖為陳太祖兵不能仰攻連戰三日幾殆已東北風起乃縱火焚友諒舟其弟友仁等皆燒死友仁號五王眇一目有勇略既死友諒氣沮是戰也太祖舟雖小然輕駛友諒軍俱艨艟巨艦不利進退以是敗太祖所乘舟檣白友諒約軍士明日併力攻白檣舟太祖知之令舟檣盡白翌日復戰自辰至午友諒軍大敗友諒欲退保山太祖已先扼湖口邀其歸路持數日友諒謀於衆右金吾將軍曰出湖難宜焚舟登陸直趨湖南圖再舉左金吾將軍曰此示弱也彼以步騎躡我進退失所據大事去矣友諒不能決既而曰右金吾言是也左金吾以言不用舉所部來降右金吾知之亦降友諒益困太祖凡再移友諒書其略曰吾欲與公約從各安一方以俟天命公失計肆毒於我我輕師間出奄有公龍興十一郡猶不自悔禍復搆兵端一困於洪都再敗於康郎骨肉將士重罹塗炭公即幸生還亦宜却帝號坐待真主不則喪家滅姓悔晚矣友諒得書忿恚不報久之乏食突圍出湖口諸將自上流邀擊之大戰涇江口漢軍且鬬且走日暮猶不解友諒從舟中引首出有所指撝驟中流矢貫睛及顱死軍大潰太子善兒被執太尉張定邊夜挾友諒次子理載其尸遁還武昌友諒豪侈嘗造鏤金牀甚工宮中器物類是既亡江西行省以牀進太祖歎曰此與孟七寶溺器何異命有司毀之友諒僭號凡四年子理既還武昌嗣僞位改元德壽是冬太祖親征武昌明年二月再親征其丞相張必先自嶽州來援次洪山常遇春擊擒之徇於城下必先驍將也軍中號潑張倚為重及被擒城中大懼由是欲降者衆太祖乃遣其故臣羅復仁入城招理理遂降入軍門俯伏不敢視太祖見理幼弱掖之起握其手曰吾不汝罪也府庫財物恣理取旋應天授爵歸德侯友諒之從徐壽輝也其父普才止之不聽及貴往迎之普才曰汝違吾命吾不知死所矣普才五子長友富次友直又次友諒又次友仁友貴友仁友貴前死鄱陽太祖平武昌封普才承恩侯友富歸仁伯友直懷恩伯贈友仁康山王命所司立廟祀之以友貴祔理居京師邑邑出怨望語帝曰此童孺小過耳恐細人蠱惑不克全朕恩宜處之遠方洪武五年理及歸義侯明升並徙高麗遣元降臣樞密使延安答理護行賜高麗王羅綺俾善視之亦徙普才等滁陽熊天瑞者本荊州樂工從徐壽輝抄略江湘間後受陳友諒命攻陷臨江吉安又陷贛州友諒俾以參知政事守贛兼統吉安南安南雄韶州諸路久之陽言東下署其幟曰無敵自稱金紫光祿大夫司徒平章軍國重事友諒不能制陰圖取廣東造戰艦於南雄帥數萬衆趨廣州元將何真以兵迎於胥江會天大雷雨震其艦檣折天瑞懼而還太祖兵克臨江遣常遇春等攻贛天瑞拒守五越月二十五年正月乃帥其養子元震肉袒詣軍門降太祖宥之授指揮使明年從攻浙西叛降於張士誠教士誠飛炮擊外軍城中木石俱盡外軍多傷者士誠滅天瑞伏誅有周時中者龍泉人嘗為壽輝平章後帥所部降策天瑞必叛後果如其言時中纍官吏部尚書出為鎮江知府歷福建鹽運副使元震本姓田氏善戰有名遇春之圍贛也元震竊出覘兵遇春亦引數騎出猝與遇元震不知為遇春也過之及遇春還始覺遂單騎前襲遇春遇春遣從騎揮刀擊之元震奮鐵撾且鬬且走遇春曰壯男子也舍之由是喜其才勇既從天瑞降薦以為指揮使天瑞誅復故姓云張士誠小字九四泰州白駒場亭人有弟三人並以操舟運鹽為業緣私作姦利頗輕財好施得羣輩心常鬻鹽諸富家富家多陵侮之或負其直不酬而弓手丘義尤窘辱士誠甚士誠忿即帥諸弟及壯士李伯升等十八人殺義並滅諸富家縱火焚其居入旁郡場招少年起兵鹽丁方苦重役遂共推為主陷泰州高郵守李齊諭降之復叛殺行省參攻趙璉並陷興化結寨德勝湖有衆萬餘元以萬戶告身招之不受紿殺李齊襲據高郵自稱誠王僭號大周建元天祐是歲至正十三年也明年元右丞相脫脫總大軍出討數敗士誠圍高郵隳其外城城且下順帝信讒解脫脫兵柄削官爵以他將代之士誠乘間奮擊元兵潰去由是復振踰年淮東饑士誠乃遣弟士德由通州渡江入常熟十六年二月陷平江並陷湖州松江及常州諸路改平江為隆平府士誠自高郵來都之即承天寺為府第踞坐大殿中射三矢於棟以識是歲太祖亦下集慶遣楊憲通好於士誠其書曰昔隗囂稱雄於天水今足下亦擅號於姑蘇事勢相等吾深為足下喜睦鄰守境古人所貴竊甚慕焉自今信使往來毋惑讒言以生邊釁士誠得書留憲不報已遣舟師攻鎮江徐達敗之於龍潭太祖遣達及湯和攻常州士誠兵來援大敗失張湯二將乃以書求和請歲輸粟二十萬石黃金五百兩白金三百斤太祖答書責其歸楊憲歲輸五十萬石士誠復不報初士誠既得平江即以兵攻嘉興元守將苗帥楊完者數敗其兵乃遣士德間道破杭州完者還救復敗歸明年耿炳文取長興徐達取常州吳良等取江陰士誠兵不得四出勢漸蹙亡何徐達兵徇宜興攻常熟士德迎戰敗為前鋒趙德勝所擒士德小字九六善戰有謀能得士心浙西地皆其所略定既被擒士誠大沮太祖欲留士德以招士誠士德間道貽士誠書俾降元士誠遂決計請降江浙右丞相達識帖睦邇為言於朝授士誠太尉官其將吏有差士德在金陵竟不食死士誠雖去僞號擅甲兵土地如故達識帖睦邇在杭與楊完者有隙陰召士誠兵士誠遣史文炳襲殺完者遂有杭州順帝遣使徵糧賜之龍衣御酒士誠自海道輸糧十一萬石於大都歲以為常既而益驕令其下頌功德邀王爵不許二十三年九月士誠復自立為吳王尊其母曹氏為王太妃置官屬別治府第於城中以士信為浙江行省左丞相幽達識帖睦邇於嘉興元徵糧不復與參軍俞思齊者字中孚泰州人諫士誠曰向為賊可無貢今為臣不貢可乎士誠怒抵案仆地思齊即引疾去當是時士誠所據南抵紹興北踰徐州達於濟寧之金溝西距汝潁濠泗東薄海二千餘里帶甲數十萬以士信及女夫潘元紹為腹心左丞徐義李伯升呂珍為爪牙參軍黃敬夫蔡彥文葉德新主謀議元學士陳基右丞饒介典文章又好招延賓客所贈遺輿馬居室什器甚具諸僑寓貧無籍者爭趨之士誠為人外遲重寡言似有器量而實無遠圖既據有吳中吳承平久戶口殷盛士誠漸奢縱怠於政事士信元紹尤好聚斂金玉珍寶及古法書名畫無不充牣日夜歌舞自娛將帥亦偃蹇不用命每有攻戰輒稱疾邀官爵田宅然後起甫至軍所載婢妾樂器踵相接不絶或大會遊談之士樗蒲蹴踘皆不以軍務為意及喪師失地還士誠概置不問已復用為將上下嬉娛以至於亡太祖與士誠接境士誠數以兵攻常州江陰建德長興諸全輒不利去而太祖遣邵榮攻湖州胡大海攻紹興常遇春攻杭州亦皆不能下廖永安被執謝再興叛降士誠會太祖與陳友諒相持未暇及也友諒亦遣使約士誠夾攻太祖而士誠欲守境觀變許使者卒不行太祖既平武昌師還即命徐達等規取淮東克泰州通州圍高郵士誠以舟師溯江來援太祖自將擊走之達等遂拔高郵取淮安悉定淮北地於是移檄平江數士誠八罪徐達常遇春帥兵自太湖趨湖州吳人迎戰於毗山又戰於七里橋皆敗遂圍湖州士誠遣朱暹五太子等以六萬衆來援屯於舊館築五寨自固達遇春築十壘以遮之斷其糧道士誠知事急親督兵來戰敗於皂林其將徐志堅敗於東遷潘元紹敗於烏鎮升山水陸寨皆破舊館援絶五太子朱暹呂珍皆降五太子者士誠養子短小精悍能平地躍丈餘又善沒水珍暹皆宿將善戰至是降達等以徇於湖州守將李伯升等以城降嘉興松江相繼降潘原明亦以杭州降於李文忠二十六年十一月大軍進攻平江築長圍困之士誠距守數月太祖貽書招之曰古之豪傑以畏天順民為賢以全身保族為智漢竇融宋錢俶是也爾宜三思勿自取夷滅為天下笑士誠不報數突圍決戰不利李伯升知士誠困甚遣所善客踰城說士誠曰初公所恃者湖州嘉興杭州耳今皆失矣獨守此城恐變從中起公雖欲死不可得也莫若順天命遣使金陵稱公所以歸義救民之意開城門幅巾待命當不失萬戶侯且公之地譬如博者得人之物而復失之於公何損士誠仰觀良久曰吾將思之乃謝客竟不降士誠故有勇勝軍號十條龍者皆驍猛善鬬每被銀鎧錦衣出入陳中至是亦悉敗溺萬里橋下死最後丞相士信中炮死城中洶洶無固志二十七年九月城破士誠收餘衆戰於萬壽寺東街衆散走倉皇歸府第拒戶自縊故部將趙世雄解之大將軍達數遣李伯升潘元紹等諭意士誠瞑目不答舁出葑門入舟不復食至金陵竟自縊死年四十七命具棺葬之方士誠之被圍也語其妻劉曰吾敗且死矣若曹何為劉答曰君無憂妾必不負君積薪齊雲樓下城破驅羣妾登樓令養子辰保縱火焚之亦自縊有二幼子匿民間不知所終先是黃敬夫等三人用事吳人知士誠必敗有黃菜葉十七字之謠其後卒驗云莫天祐者元末聚衆保無錫州士誠招之不從以兵攻之亦不克士誠既受元官天祐乃降士誠纍表為同僉樞密院事及平江既圍他城皆下惟天祐堅守士誠破胡廷瑞急攻之乃降太祖以其多傷我兵誅之李伯升仕士誠至司徒既降命仍故官進中書平章同知詹事府事嘗將兵討平湖廣慈利蠻又為征南右副將軍同吳良討靖州蠻後坐胡黨死潘元明以平章守杭州降仍為行省平章與伯升俱歲食祿七百五十石不治事雲南平以元明署布政司事卒官士誠自起至亡凡十四年方國珍黃巖人長身黑面體白如瓠力逐奔馬世以販鹽浮海為業元至正八年有蔡亂頭者行剽海上有司發兵捕之國珍怨家告其通寇國珍殺怨家遂與兄國璋弟國瑛國珉亡入海聚衆數千人劫運艘梗海道行省參政𩽆兒只班討之兵敗為所執脅使請於朝授定海尉尋叛寇溫州元以孛羅帖木兒為行省左丞督兵往討復敗被執乃遣大司農達識帖睦邇招之降已而汝潁兵起元募舟師守江國珍疑懼復叛誘殺台州路達魯花赤泰不華亡入海使人潛至京師賂諸權貴仍許降授徽州路治中國珍不聽命陷台州焚蘇之太倉元復以海道漕運萬戶招之乃受官尋進行省參政俾以兵攻張士誠士誠遣將禦之崑山國珍七戰七捷會士誠亦降乃罷兵先是天下承平國珍兄弟始倡亂海上有司憚於用兵一意招撫惟都事劉基以國珍首逆數降數叛不可赦朝議不聽國珍既授官據有慶元溫台之地益強不可制國珍之初作亂也元出空名宣敕數十道募人擊賊海濱壯士多應募立功所司邀重賄不輒與有一家數人死事卒不得官者而國珍之徒一再招諭皆至大官由是民慕為盜從國珍者益衆元既失江淮資國珍舟以通海運重以官爵羈縻之而無以難也有張子善者好縱橫術說國珍以師泝江窺江東北略青徐遼海國珍曰吾始志不及此謝之去太祖已取婺州使主簿蔡元剛使慶元國珍謀於其下曰江左號令嚴明恐不能與抗況為我敵者西有吳南有閩莫若姑示順從藉為聲援以觀變衆以為然於是遣使奉書進黃金五十斤白金百斤文綺百匹太祖復遣鎮撫孫養浩報之國珍請以溫台慶元三郡獻且遣次子關為質太祖却其質厚賜而遣之復使博士夏煜往拜國珍福建行省平章事弟國瑛參知政事國珉樞密分院僉事國珍名獻三郡實陰持兩端煜既至乃詐稱疾自言老不任職惟受平章印誥而已太祖察其情以書諭曰吾始以汝豪傑識時務故命汝專制一方汝顧中懷叵測欲覘我虛實則遣侍子欲却我官爵則稱老病夫智者轉敗為功賢者因禍成福汝審圖之是時國珍歲歲治海舟為元漕張士誠粟十餘萬石於京師元纍進國珍官至江浙行省左丞相衢國公分省慶元國珍受之如故特以甘言謝太祖絶無內附意及得所諭書竟不省太祖復以書諭曰福基於至誠禍生於反覆隗囂公孫述故轍可鑒大軍一出不可虛辭解也國珍詐窮復陽為惶懼謝罪以金寶飾鞍馬獻太祖復却之已而苗帥蔣英等叛殺胡大海持首奔國珍國珍不受自台州奔福建國璋守台邀擊之為所敗被殺太祖遣使弔祭踰年溫人周宗道以平陽來降國珍從子明善守溫以兵爭參軍胡深擊敗之遂下瑞安進兵溫州國珍恐請歲輸白金三萬兩給軍俟杭州下即納土來歸太祖詔深班師吳元年克杭州國珍據境自如遣間諜假貢獻名覘勝負又數通好於擴廓帖木兒及陳友定圖為掎角太祖聞之怒貽書數其十二罪復責軍糧二十萬石國珍集衆議郎中張本仁左丞劉庸等皆言不可從有丘楠者獨爭曰彼所言均非公福也惟智可以決事惟信可以守國惟直可以用兵公經營浙東十餘年矣遷延猶豫計不早定不可謂智既許之降抑又倍焉不可謂信彼之徵師則有詞矣我實負彼不可謂直幸而扶服請命庶幾可視錢俶乎國珍不聽惟日夜運珍寶治舟楫為航海計九月太祖已破平江命參政朱亮祖攻台州國瑛迎戰敗走進克溫州征南將軍湯和以大軍長驅抵慶元國珍帥所部遁入海追敗之盤嶼其部將相次降和數令人示以順逆國珍乃遣子關奉表乞降曰臣聞天無所不覆地無所不載王者體天法地於人無所不容臣荷主上覆載之德舊矣不敢自絶於天地故一陳愚衷臣本庸才遭時多故起身海島非有父兄相藉之力又非有帝制自為之心方主上霆擊電掣至於婺州臣愚即遣子入侍固已知主上有今日矣將以依日月之末光望雨露之餘潤而主上推誠布公俾守鄉郡如故吳越事臣遵奉條約不敢妄生節目子姓不戒潛搆釁端猥勞問罪之師私心戰兢用是俾守者出迎然而未免浮海何也孝子之於親小杖則受大杖則走臣之情事適與此類即欲面縛待罪闕廷復恐嬰斧鉞之誅使天下後世不知臣得罪之深將謂主上不能容臣豈不纍天地大德哉蓋幕下士詹鼎詞也太祖覽而憐之賜書曰汝違吾諭不即斂手歸命次且海外負恩實多今者窮蹙無聊情詞哀懇吾當以汝此誠為誠不以前過為過汝勿自疑遂促國珍入朝面讓之曰若來得毋晚乎國珍頓首謝授廣西行省左丞食祿不之官數歲卒於京師子禮官廣洋衛指揮僉事關虎賁衛千戶所鎮撫關弟行字明敏善詩承旨宋濂嘗稱之劉仁本字德元國珍同縣人元末進士乙科歷官浙江行省郎中與張本仁俱入國珍幕數從名士趙俶謝理朱右等賦詩有稱於時國珍海運輸元實仁本司其事朱亮祖之下溫州也獲仁本太祖數其罪鞭背潰爛死餘官屬從國珍降者皆徙滁州獨赦丘楠以為韶州知府詹鼎者寧海人有才學為國珍府都事判上虞有治聲既至京未見用草封事萬言候駕出獻之帝為立馬受讀命丞相官鼎楊憲忌其才沮之憲敗除留守經歷遷刑部郎中坐纍死明玉珍隨州人身長八尺餘目重瞳子徐壽輝起玉珍與里中父老團結千餘人屯青山及壽輝稱帝使人招玉珍曰來則共富貴不來舉兵屠之玉珍引衆降以元帥守沔陽與元將哈麻禿戰湖中飛矢中右目遂眇久之玉珍帥斗船五十艘掠糧川峽間將引還時元右丞完者都募兵重慶義兵元帥楊漢應募至欲殺之而並其軍不克漢走出峽遇玉珍為言重慶無重兵完者都與右丞哈麻禿不相能若回船出不意襲之可取而有也玉珍意未決部將戴壽曰機不可失也可分船為二半貯糧歸沔陽半因漢兵攻重慶不濟則掠財物而還玉珍從其策襲重慶走完者都執哈麻禿獻壽輝壽輝授玉珍隴蜀行省右丞至正十七年也已而完者都自果州來會平章朗革歹參政趙資謀復重慶屯嘉定之大佛寺玉珍遣萬勝禦之勝黃陂人有智勇玉珍寵愛之使從己姓衆呼為明二後乃復姓名勝攻嘉定半年不下玉珍帥衆圍之遣勝以輕兵襲陷成都虜朗革歹及資妻子朗革歹妻自沉於江以資妻子徇嘉定招資降資引弓射殺妻俄城破執資及完者都朗革歹歸於重慶館諸治平寺欲使為己用三人者執不可乃斬於市以禮葬之蜀人謂之三忠於是諸郡縣相次來附二十年陳友諒弒徐壽輝自立玉珍曰與友諒俱臣徐氏顧悖逆如此命以兵塞瞿塘絶不與通立壽輝廟於城南隅歲時致祀自立為隴蜀王以劉楨為參謀楨字維周瀘州人元進士嘗為大名路經歷棄官家居玉珍之攻重慶也道瀘部將劉澤民薦之玉珍往見與語大悅即日延至舟中尊禮備至次年楨屏人說曰西蜀形勝地大王撫而有之休養傷殘用賢治兵可以立不世業不於此時稱大號以係人心一旦將士思鄉土瓦解星散大王孰與建國乎玉珍善之乃謀於衆以二十二年春僭即皇帝位於重慶國號夏建元天統立妻彭氏為皇后子升為太子效周制設六卿以劉楨為宗伯分蜀地為八道更置府州縣官名蜀兵視諸國為弱勝兵不滿萬人玉珍素無遠略然性節儉頗好學折節下士既即位設國子監教公卿子弟設提舉司教授建社稷宗廟求雅樂開進士科定賦稅以十分取一蜀人悉便安之皆劉楨為之謀也明年遣萬勝由界首鄒興由建昌又指揮李某者由八番分道攻雲南兩路皆不至惟勝兵深入元梁王走營金馬山踰年王挾大理兵擊勝勝以孤軍無繼引還復遣興取巴州久之復更六卿為中書省樞密院改冢宰戴壽司馬萬勝為左右丞相司寇向大亨司空張文炳知樞密院事司徒鄒興鎮成都吳友仁鎮保寧司寇莫仁壽鎮夔關皆平章事是歲遣勝取興元使參政江儼通好於太祖太祖遣都事孫養浩報聘遺玉珍書曰足下處西蜀豫處江左蓋與漢季孫劉相類近者王保保以鐵騎徑兵虎踞中原其志殆不在曹操下使有謀臣如攸彧猛將如遼郃豫兩人能高枕無憂乎豫與足下實唇齒邦願以孫劉相吞噬為鑒自後信使往返不絶二十六年春玉珍病革召壽等諭曰西蜀險固若協力同心左右嗣子則可以自守不然後事非所知也遂卒凡立五年年三十六子升嗣改元開熙葬玉珍於江水之北號永昌陵廟號太祖尊母彭氏為皇太后同聽政升甫十歲諸大臣皆粗暴不肯相下而萬勝與張文炳有隙勝密遣人殺之文炳所善玉珍養子明昭復矯彭氏旨縊殺勝勝於明氏功最多其死蜀人多憐之吳友仁自保寧移檄以清君側為名升命戴壽討之友仁遺壽書謂不誅昭則國必不安衆必不服昭朝誅吾當夕至壽乃奏誅昭友仁入朝謝罪於是諸大臣用事而友仁尤專恣國柄旁落遂益不振萬勝既死劉楨為右丞相後三年卒是歲升遣使告哀於太祖已又遣使入聘太祖亦遣侍御史蔡哲報之洪武元年太祖克元都升奉書稱賀明年太祖遣使求大木升遂並獻方物帝答以璽書其冬遣平章楊璟諭升歸命升不從璟復遺升書曰古之為國者同力度德同德度義故能身家兩全流譽無窮反是者輒敗足下幼沖席先人業據有巴蜀不咨至計而聽羣下之議以瞿塘劍閣之險一夫負戈萬人無如之何此皆不達時變以誤足下之言也昔據蜀最盛者莫如漢昭烈且以諸葛武侯佐之綜核官守訓練士卒財用不足皆取之南詔然猶朝不謀夕僅能自保今足下疆埸南不過播州北不過漢中以此準彼相去萬萬而欲藉一隅之地延命頃刻可謂智乎我主上仁聖威武神明響應順附者無不加恩負固者然後致討以足下先人通好之故不忍加師數使使諭意又以足下年幼未歷事變恐惑於狂瞽失遠大計故復遣璟面諭禍福深仁厚德所以待明氏者不淺足下可不深念乎且向者如陳張之屬竊據吳楚造舟塞江河積糧過山嶽強將徑兵自謂無敵然鄱陽一戰友諒授首旋師東討張氏面縛此非人力實天命也足下視此何如友諒子竄歸江夏王師致伐勢窮銜璧主上宥其罪愆剖符錫爵恩榮之盛天下所知足下無彼之過而能翻然覺悟自求多福則必享茅土之封保先人之祀世世不絶豈不賢智矣哉若必欲崛強一隅假息頃刻魚遊沸鼎燕巢危幕禍害將至恬不自知璟恐天兵一臨凡今為足下謀者他日或各自為身計以取富貴當此之時老母弱子將安所歸禍福利害瞭然可覩在足下審之而已升終不聽又明年興元守將以城降吳友仁數往攻之不克是歲太祖遣使假道征雲南升不奉詔四年正月命征西將軍湯和帥副將軍廖永忠等以舟師由瞿塘趨重慶前將軍傅友德帥副將軍顧時等以步騎由秦隴趨成都伐蜀初壽言於升曰以王保保李思齊之強猶莫能與明抗況吾蜀乎一旦有警計安出友仁曰不然吾蜀襟山帶江非中原比莫若外交好而內修備升以為然遣莫仁壽以鐵索橫斷瞿塘峽口至是又遣壽友仁鄒興等益兵為助北倚羊角山南倚南城寨鑿兩岸石壁引鐵索為飛橋用木板置炮以拒敵和軍至不能進傅友德覘階文無備進破之又破綿州壽乃留興等守瞿塘而自與友仁還會向大亨之師以援漢州數戰皆大敗壽大亨走成都友仁走保寧時永忠亦破瞿塘關飛橋鐵索皆燒斷興中矢死夏兵皆潰遂下夔州師次銅羅峽升大懼右丞劉仁勸奔成都升母彭泣曰成都可到亦僅延旦夕命大軍所過勢如破竹不如早降以活民命於是遣使齎表乞降升面縛銜璧輿櫬與母彭及官屬降於軍門和受璧永忠解縛承旨撫慰下令諸將不得有所侵擾而壽大亨亦以成都降於友德升等悉送京師禮臣奏言皇帝御奉天殿明升等俯伏待罪午門外有司宣制赦如孟降宋故事帝曰升幼弱事由臣下與孟異宜免其伏地上表待罪之儀是日授升爵歸義侯賜第京師冬十月和等悉定川蜀諸郡縣執友仁於保寧遂班師壽大亨仁壽皆鑿舟自沉死丁世貞者文州守將也友德攻文州據險力戰汪興祖死焉文州破遁去已復以兵破文州殺朱顯忠友德擊走之夏亡復集餘衆圍秦州五十日兵敗夜宿梓潼廟為其下所殺友仁至京師帝以其寇漢中首造兵端令明氏失國僇於市戍他將校於徐州明年徙升於高麗贊曰友諒士誠起刀筆負販因亂僭竊恃其富強而卒皆敗於其所恃迹其始終成敗之故太祖料之審矣國珍首亂反覆無信然竟獲良死玉珍乘勢割據一隅僭號二世皆不可謂非幸也國珍又名谷珍蓋降後避明諱云
