body:
  text: 明史卷一百三十六列傳第二十四陶安錢用壬詹同朱升崔亮牛諒答祿與權張籌朱夢炎劉仲質陶凱曾魯任昂李原名樂韶鳳陶安字主敬當塗人少敏悟博涉經史尤長於易元至正初舉江浙鄉試授明道書院山長避亂家居太祖取太平安與耆儒李習率父老出迎太祖召與語安進曰海內鼎沸豪傑並爭然其意在子女玉帛非有撥亂救民安天下心明公渡江神武不殺人心悅服應天順人以行弔伐天下不足平也太祖問曰吾欲取金陵何如安曰金陵古帝王都取而有之撫形勝以臨四方何向不克太祖曰善留參幕府授左司員外郎以習為太平知府習字伯羽年八十餘矣卒於官安從克集慶進郎中及聘劉基宋濂章溢葉琛至太祖問安四人者何如對曰臣謀略不如基學問不如濂治民之才不如溢琛太祖多其能讓黃州初下思得重臣鎮之無逾安者遂命知黃州寬租省徭民以樂業坐事謫知桐城移知饒州陳友定兵攻城安召吏民諭以順逆嬰城固守援兵至敗去諸將欲盡戮民之從寇者安不可太祖賜詩褒美州民建生祠事之吳元年初置翰林院首召安為學士時徵諸儒議禮命安為總裁官尋與李善長劉基周禎滕毅錢用壬等刪定律令洪武元年命知制誥兼修國史帝嘗御東閣與安及章溢等論前代興亡本末安言喪亂之源由於驕侈帝曰居高位者易驕處佚樂者易侈驕則善言不入而過不聞侈則善道不立而行不顧如此者未有不亡卿言甚當又論學術安曰道不明邪說害之也帝曰邪說害道猶美味之悅口美色之眩目邪說不去則正道不興天下何從治安頓首曰陛下所言可謂深探其本矣安事帝十餘歲視諸儒最舊及官侍從寵愈渥御製門帖子賜之曰國朝謀略無雙士翰苑文章第一家時人榮之御史或言安隱過帝詰曰安寧有此且若何從知曰聞之道路帝大怒立黜之洪武元年四月江西行省參政闕帝以命安諭之曰朕渡江卿首謁軍門敷陳王道及參幕府裨益良多繼入翰林益聞讜論江西上游地撫綏莫如卿安辭帝不許至任政績益著其年九月卒於官疾劇草上時務十二事帝親為文以祭追封姑孰郡公子晟洪武中為浙江按察使以貪賄誅其兄昱亦坐死發家屬四十餘人為軍後死亡且盡所司復至晟家勾補安繼妻陳詣闕訴帝念安功除其籍初安之裁定諸禮也廣德錢用壬亦多所論建用壬字成夫元南榜進士第一授翰林編修出使張士誠留之授以官大軍下淮揚來歸纍官御史臺經歷預定律令尋與陶安等博議郊廟社稷諸儀其議釋奠藉田皆援據經文及漢魏以來故事以定其制詔報可語詳禮志洪武元年分建六部官拜用壬禮部尚書凡禮儀祭祀宴享貢舉諸政皆專屬禮官又詔與儒臣議定乘輿以下冠服諸式時儒生多習古義而用壬考證尤詳確然其後諸典禮亦多有更定云其年十二月請告歸詹同字同文初名書婺源人幼穎異學士虞集見之曰才子也以其弟槃女妻之至正中舉茂才異等除郴州學正遇亂家黃州仕陳友諒為翰林學士承旨太祖下武昌召為國子博士賜名同時功臣子弟教習內府諸博士治一經不盡通貫同學識淹博講易春秋最善應教為文才思泉湧一時莫與並遷考功郎中直起居注會議祫禘禮同議當遂用之洪武元年與侍御史文原吉起居注魏觀等循行天下訪求賢才還進翰林直學士遷侍讀學士帝御下峻御史中丞劉基曰古者公卿有罪盤水加劍詣請室自裁所以勵廉恥存國體也同時侍側遂取戴記及賈誼疏以進復剴切言之帝嘗與侍臣言聲色之害甚於鴆毒創業之君為子孫所承式尤不可不謹同因舉成湯不邇聲色垂裕後昆以對其因事納忠如此四年進吏部尚書六年兼學士承旨與學士樂韶鳳定釋奠先師樂章又以渡江以來征討平定之蹟禮樂治道之詳雖有紀載尚未成書請編日曆帝從之命同與宋濂為總裁官吳伯宗等為纂修官七年五月書成自起兵臨濠至洪武六年共一百卷同等又言日曆祕天府人不得見請仿唐貞觀政要分輯聖政宣示天下帝從之乃分四十類凡五卷名曰皇明寶訓嗣後凡有政蹟史官日記録之隨類增入焉是年賜敕致仕語極褒美未行帝復命與濂議大祀分獻禮久之起承旨卒同以文章結主知應制占對靡勿敏贍帝嘗言文章宜明白顯易通道術達時務無取浮薄同所為多稱旨而操行尤耿介故至老眷注不衰子徽字資善洪武十五年舉秀才官至太子少保兼吏部尚書有才智剛決不可犯勤於治事為帝所奬任然性險刻李善長之死徽有力焉藍玉下獄語連徽及子尚寶丞紱並坐誅同從孫希原為中書舍人善大書宮殿城門題額往往皆希原筆也朱升字允升休寧人元末舉鄉薦為池州學正講授有法蘄黃盜起棄官隱石門數避兵逋竄卒未嘗一日廢學太祖下徽州以鄧愈薦召問時務對曰高築牆廣積糧緩稱王太祖善之吳元年授侍講學士知制誥同修國史以年老特免朝謁洪武元年進翰林學士定宗廟時享齊戒之禮尋命與諸儒修女誡采古賢后妃事可法者編上之大封功臣制詞多升撰時稱典核踰年請老歸卒年七十二升自幼力學至老不倦尤邃經學所作諸經旁注辭約義精學者稱楓林先生子同官禮部侍郎坐事死崔亮字宗明藁城人元浙江行省掾明師至舊館亮降授中書省禮曹主事遷濟南知府以母憂歸洪武元年冬禮部尚書錢用壬請告去起亮代之初亮居禮曹時即位大祀諸禮皆其所條畫丞相善長上之朝由是知名及為尚書一切禮制用壬先所議行者亮皆援引故實以定其議考證詳確逾於用壬二年議上仁祖陵曰英陵復請行祭告禮太常博士孫吾與以漢唐未有行者駁之亮曰漢光武加先陵曰昌宋太祖亦加高祖陵曰欽曾祖陵曰康祖陵曰定考陵曰安蓋創業之君尊其祖考則亦尊崇其陵既尊其陵自應祭告禮固緣人情而起者也廷議是亮頃之亮言禮運曰禮行於郊則百神受職今宜增天下神祇壇於圜丘之東方澤之西又言郊特牲器用陶匏周禮疏外祀用瓦今祭祀用瓷與古意合而槃盂之屬與古尚異宜皆易以瓷惟籩用竹又請大祀前七日陪祀官詣中書受誓戒戒辭如唐禮又依周禮定五祀及四時薦新祼禮圭瓚鬱鬯之制並言旗纛月朔望致祭煩而瀆宜止行於當祭之月皆允行帝嘗謂亮先賢有言見其生不忍見其死聞其聲不忍食其肉今祭祀省牲於神壇甚邇心殊未安亮乃奏考古省牲之儀遠神壇二百步帝大喜帝慮郊社諸祭壇而不屋或驟雨沾服亮引宋祥符九年南郊遇雨於太尉廳望祭及元經世大典壇垣內外建屋避風雨故事奏之遂詔建殿於壇南遇雨則望祭而靈星諸祠亦皆因亮言建壇屋焉時仁祖已配南北郊而郊祀禮成後復詣太廟恭謝亮言宜罷惟先祭三日詣太廟以配享告詔可帝以日中有黑子疑祭天不順所致欲增郊壇從祀之神亮執奏漢唐煩瀆不宜取法乃止帝一日問亮曰朕郊祀天地拜位正中而百官朝參則班列東西何也亮對曰天子祭天升自午陛北向答陽之義也祭社升自子陛南向答陰之義也若羣臣朝參當避君上之尊故升降皆由卯陛朝班分列東西以避馳道其義不同亮倉卒占對必傅經義多此類自郊廟祭祀外朝賀山呼百司箋奏上下冠服殿上坐墩諸儀及大射軍禮皆亮所酌定惟言大祀帝親省牲中祀小祀之牲當遣官代帝命親祭者皆親省又請依唐制令郡國奏祥瑞帝以災異所係尤重命有司驛聞與亮議異焉三年九月卒於官其後牛諒答祿與權張籌朱夢炎劉仲質之屬亦各有所論建牛諒字士良東平人洪武元年舉秀才為典簿與張以寧使安南還稱旨三遷至禮部尚書更定釋奠及大祀分獻禮與詹同等議省牲冠服御史答祿與權請祀三皇太祖下其議禮官併命考歷代帝王有功德者廟祀之七年正月諒奏三皇立廟京師春秋致祭漢唐以下就陵立廟帝為更定行之亦詳禮志是年怠職降主事未幾復官後仍以不任職罷諒著述甚多為世傳誦答祿與權字道夫蒙古人仕元為河南北道廉訪司僉事入明寓河南永寧洪武六年用薦授秦府紀善改御史請重刊律令盱眙民進瑞麥與權請薦宗廟帝曰以瑞麥為朕德所致朕不敢當其必歸之祖宗御史言是也明年出為廣西按察僉事未行復為御史上書請祀三皇下禮官議遂並建帝王廟且遣使者巡視歷代諸陵寢設守陵戶二人三年一祭其制皆由此始又請行禘禮議格不行改翰林修撰坐事降典籍尋進應奉十一年以年老致仕禘禮至嘉靖中始定張籌字惟中無錫人父翼嘗勸張士誠將莫天佑降復請於平章胡美勿僇降人城中人得完以詹同薦授翰林應奉改禮部主事奉詔與尚書陶凱編集漢唐以來藩王事蹟為昭鑑録洪武九年由員外郎進尚書與學士宋濂定諸王妃喪服之制籌記誦淹博在禮曹久諳於歷代禮文沿革然頗善附會初陶安等定圜丘方澤宗廟社稷諸儀行數年矣洪武九年籌為尚書乃更議合社稷為一壇罷勾龍棄配位奉仁祖配饗以明祖社尊而親之之道遂以社稷與郊廟祀並列上祀識者竊非之已出為湖廣參政十年坐事罰輸作十二年仍起禮部員外郎後復官以事免朱夢炎字仲雅進賢人元進士為金溪丞太祖召居賓館命與熊鼎集古事為質直語教公卿子弟名曰公子書洪武十一年自禮部侍郎進尚書帝方稽古右文夢炎援古證今剖析源流如指諸掌文章詳雅有根據帝甚重之卒於官劉仲質字文質分宜人洪武初以宜春訓導薦入京擢翰林典籍奉命校正春秋本末十五年拜禮部尚書命與儒臣定釋奠禮頒行天下學校每歲春秋仲月通祀孔子如儀時國子學新成帝將行釋菜侍臣有言孔子雖聖人臣也禮宜一奠再拜帝曰昔周太祖如孔子廟左右謂不宜拜周太祖曰孔子百世帝王師何敢不拜今朕有天下敬禮百神於先師禮宜加崇乃命仲質詳議仲質請帝服皮辨執圭詣先師位前再拜獻爵又再拜退易服乃詣彝倫堂命講庶典禮隆重詔曰可又立學規十二條合欽定九條頒賜師生已復奉命頒劉向說苑新序於學校令生員講讀是年冬改華蓋殿大學士帝為親製誥文坐事貶御史後以老致仕仲質為人厚重篤實博通經史文體典確常當帝意焉陶凱字中立臨海人領至正鄉薦除永豐教諭不就洪武初以薦徵入同修元史書成授翰林應奉教習大本堂授楚王經三年七月與崔亮並為禮部尚書各有敷奏軍禮及品官墳塋之制凱議也其年亮卒凱獨任定科舉式明年會試以凱充主考官取吳伯宗等百二十人程文進御凱序其首簡遂為定例帝嘗諭凱曰事死如事生朕養已不逮宜盡追遠之道凱以太廟已有常祀乃請於乾清宮左別建奉先殿以奉神御明奉先殿之制自此始五年凱言漢唐宋時皆有會要紀載時政今起居注雖設其諸司所領諭旨及奏事簿籍宜依會要編類為書庶可以垂法後世下臺省府者宜各置銅匱藏之以備稽考俾無遺闕從之明年二月出為湖廣參政致仕八年起為國子祭酒明年改晉王府左相凱博學工詩文帝嘗厭前代樂章多諛辭或未雅馴命凱與詹同更撰甚稱旨長至侍齊宮言宜有篇什以紀慶成遂命凱首唱諸臣俱和而宋濂為之序其後扈行陪祀有所獻帝輒稱善一時詔令封冊歌頌碑志多出其手云凱嘗自號耐久道人帝聞而惡之坐在禮部時朝使往高麗主客曹誤用符驗論死曾魯字得之新淦人年七歲能暗誦五經一字不遺稍長博通古今凡數千年國體人才制度沿革無不能言者以文學聞於時元至正中魯帥里中豪集少壯保鄉曲數具牛酒為開陳順逆衆皆遵約束無敢為非義者人號其里曰君子鄉洪武初修元史召魯為總裁官史成賜金帛以魯居首乞還山會編類禮書復留之時議禮者蜂起魯衆中揚言曰某禮宜據某說則是從某說則非有辨詰者必歷舉傳記以告尋授禮部主事開平王常遇春薨高麗遣使來祭魯索其文視之外襲金龍黃帕文不署洪武年號魯讓曰龍帕誤耳納貢稱藩而不奉正朔於義何居使者謝過即令易去安南陳叔明篡立懼討遣使入貢以覘朝廷意主客曹已受其表魯取副封視之白尚書詰使者曰前王日熞今何驟更名使者不敢諱具言其實帝曰島夷乃狡獪如此耶卻其貢由是器重魯五年二月帝問丞相魯何官對曰主事耳即日超六階拜中順大夫禮部侍郎魯以順字犯其父諱辭就朝請下階吏部持典制不之許戍將捕獲倭人帝命歸之儒臣草詔上閲魯藁大悅曰頃陶凱文已起人意魯復如此文運其昌乎未幾命主京畿鄉試甘露降鍾山羣臣以詩賦獻帝獨褒魯是年十二月引疾歸道卒淳安徐尊生嘗曰南京有博學士二人以筆為舌者宋景濂以舌為筆者曾得之也魯屬文不留藁其徒間有所輯録亦未成書云洪武中禮部侍郎二十餘人其知名者自曾魯外有劉嵩秦約陳思道張衡數人嵩自有傳約崇明人字文仲博學工辭章洪武初以文學舉召試慎獨針約文第一立擢禮部侍郎母老乞歸已召入陳三事皆切直仍乞歸卒思道山陰人字執中以進士授刑部主事帝賞其執法超拜兵部侍郎益勵風節人莫敢干以私改禮部乞歸居家不殖生産守令造門不得見久之卒衡事別載任昂字伯顒河陰人元末舉進士除知寧晉縣不赴洪武初薦起為襄垣訓導擢御史十五年拜禮部尚書帝加意太學罷祭酒李敬吳顒命昂增定監規八條遂以曹國公李文忠大學士宋訥兼領國子監事會司諫關賢上言邇來郡邑所司非人師道不立歲選士多缺甚至俊秀生員點充承差乖朝廷育賢意昂乃奏定天下歲貢士從翰林院考試以為殿最明年命科舉與薦舉並行昂條上科場成式視前加詳取士制始定廣東都指揮狄崇王臻以妾為繼室乞封下廷議昂持不可從之遂命昂及翰林院定嫡妾封贈例因詔偕吏部定文官封贈例十一廕例五頒示中外尋請更定冕服之制及朝參坐次又奏毀天下淫祠正祀典稱號蜀祀秦守李冰附以漢守文翁宋守張詠密縣祀太傅卓茂鈞州祀丞相黃霸彭澤祀丞相狄仁傑皆遺愛在民李龍遷祀於隆州謝夷甫祀於福州皆為民捍患吳丞相陸遜以勞定國宜祀於吳以子抗從子凱配元總管李黼立祀江州元帥余闕立廟安慶皆以死勤事從闕守皖全家殉義者有萬戶李宗可宜配享闕廟皆報可明年命以鄉飲酒禮頒天下復令制大成樂器分頒學宮是時以八事考課外吏及次第雲南功賞事不隸禮部帝皆令昂主其議尋豫告歸李原名字資善安州人洪武十五年以通經儒士舉為御史二十年使平緬歸言思倫發懷詐窺伺宜嚴邊備靖江王以大理印行令旨非法為遠人所輕稱旨擢禮部尚書自是遠方之事多咨之高麗奏遼東文高和定州皆其國舊壤乞就鐵嶺屯戍原名言數州皆入元版圖屬於遼高麗地以鴨緑江為界今鐵嶺已置衛不宜復有陳請帝命諭其國守分土無生釁安南歲貢方物帝念其勞民原名以帝意諭之令三年一貢自是為定制又以帝命行養老之政申明府州縣歲貢多寡之數定官民巾服之式皆著為令初以答祿與權言建歷代帝王廟至是原名請以風后力牧等三十六人侑享帝去趙普安童阿术而增陳平馮異潘美木華黎餘悉如原名奏魯王薨定喪服之制進士王希曾請喪出母原名謂非禮宜禁凡郊祀宗廟社稷嶽瀆諸制先後儒臣論定時有詳略帝悉令原名更正之諸禮臣惟原名在任久二十三年以老致仕樂韶鳳字舜儀全椒人博學能文章謁太祖於和陽從渡江參軍事洪武三年授起居注數遷六年拜兵部尚書與中書省御史臺都督府定教練軍士法改侍講學士與承旨詹同正釋奠先師樂章編集大明日曆七年帝以祭祀駕還應用樂舞前導命韶鳳等撰詞因撰神降祥神貺惠酣酒色荒禽荒諸曲以進凡三十九章曰回鑾樂歌皆寓規諫禮部具樂舞圖以上命太常肄習之明年帝以舊韻出江左多失正命與廷臣參考中原雅音正之書成名洪武正韻又命考陵寢朔望祭祀及登壇脫舄諸禮儀皆詳稽故實俱從之尋病免未幾復起為祭酒奉詔定皇太子與諸王往復書劄禮考據精詳屢被褒答十三年致仕歸以壽終弟暉禮毅皆知名贊曰明初之議禮也宋濂方家居諸儀率多陶安裁定大祀禮專用安議其餘參彙諸說從其所長祫禘用詹同時享用朱升釋奠耕藉用錢用壬五祀用崔亮朝會用劉基祝祭用魏觀軍禮用陶凱皆能援據經義酌古準今郁然成一代休明之治雖折中斷制裁自上心諸臣之功亦曷可少哉
