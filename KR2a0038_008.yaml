body:
  text: 明史卷八本紀第八仁宗仁宗敬天體道純誠至德弘文欽武章聖達孝昭皇帝諱高熾成祖長子也母仁孝文皇后夢冠冕執圭者上謁寤而生帝幼端重沉靜言動有經稍長習射發無不中好學問從儒臣講論不輟洪武二十八年册為燕世子嘗命與秦晉周三世子分閲衛士還獨後問之對曰旦寒甚俟朝食而後閲故後又命分閲章奏獨取切軍民利病者白之或文字謬誤不以聞太祖指示之曰兒忽之耶對曰不敢忽顧小過不足瀆天聽又嘗問堯湯時水旱百姓奚恃對曰恃聖人有恤民之政太祖喜曰孫有君人之識矣成祖舉兵世子守北平善拊士卒以萬人拒李景隆五十萬衆城賴以全先是郡王高煦高燧俱以慧黠有寵於成祖而高煦從軍有功宦寺黃儼等復黨高燧陰謀奪嫡譖世子會朝廷賜世子書為離間世子不啓緘馳上之而儼先潛報成祖曰世子與朝廷通使者至矣無何世子所遣使亦至成祖發書視之乃歎曰幾殺吾子成祖踐阼以北平為北京仍命居守永樂二年二月始召至京立為皇太子成祖數北征命之監國裁決庶政四方水旱飢饉輒遣振恤仁聞大著而高煦高燧與其黨日伺隙讒構或問太子亦知有讒人乎曰不知也吾知盡子職而已十年北征還以太子遣使後期且書奏失辭悉徵宮僚黃淮等下獄十五年高煦以罪徙樂安明年黃儼等復譖太子擅赦罪人宮僚多坐死者侍郎胡濙奉命察之密疏太子誠敬孝謹七事以聞成祖意乃釋其後黃儼等謀立高燧事覺伏誅高燧以太子力解得免自是太子始安二十二年七月成祖崩於榆木川八月甲辰遺詔至遣皇太孫迎喪開平丁未出夏原吉等於獄丁巳即皇帝位大赦天下以明年為洪熙元年罷西洋寶船迤西市馬及雲南交址採辦戊午復夏原吉吳中官己未武安侯鄭亨鎮大同保定侯孟瑛鎮交址襄城伯李隆鎮山海武進伯朱榮鎮遼東復設三公三孤官以公侯伯尚書兼之進楊榮太常寺卿金幼孜戶部侍郎兼大學士如故楊士奇為禮部左侍郎兼華蓋殿大學士黃淮通政使兼武英殿大學士俱掌內制楊溥為翰林學士辛酉鎮遠侯顧興祖充總兵官討廣西叛蠻甲子汰冗官乙丑召漢王高煦赴京戊辰官吏謫隸軍籍者放還鄉己巳詔文臣年七十致仕九月癸酉交址都指揮方政與黎利戰於茶籠州敗績指揮同知伍雲力戰死丙子召尚書黃福於交址庚辰河溢開封免稅糧遣右都御史王彰撫恤之壬午敕自今官司所用物料於所産地計直市之科派病民者罪不宥癸未禮部尚書呂震請除服不許乙酉增諸王歲祿丙戌以風憲官備外任命給事中蕭奇等三十五人為州縣官丁亥黎利寇清化都指揮同知陳忠戰死戊子始設南京守備以襄城伯李隆為之乙未散畿內民所養官馬於諸衛所戊戌賜吏部尚書蹇義及楊士奇楊榮金幼孜銀章各一曰繩愆糾繆諭以協心贊務凡有闕失當言者用印密封以聞冬十月壬寅罷市民間金銀革兩京戶部行用庫癸卯詔天下都司衛所修治城池戊申通政使請以四方雨澤章奏送給事中收貯帝曰祖宗令天下奏雨澤欲知水旱以施恤民之政積之通政司既失之矣今又令收貯是欲上之人終不知也自今奏至即以聞己酉册妃張氏為皇后壬子立長子瞻基為皇太子封子瞻埈為鄭王瞻墉越王瞻墡襄王瞻缸荊王瞻墺淮王瞻塏滕王瞻梁王瞻埏衛王乙卯詔中外官舉賢才嚴舉主連坐法丁巳令三法司會大學士府部通政六科於承天門録囚著為令庚申增京官及軍士月廩丁卯擢監生徐永溍等二十人為給事中十一月壬申朔詔禮部建文諸臣家屬在教坊司錦衣衛浣衣局及習匠功臣家為奴者悉宥為民還其田土言事謫戍者亦如之癸酉詔有司條政令之不便民者以聞凡被災不即請振者罪之阿魯台來貢馬甲戌詔羣臣言時政闕失乙亥赦兀良哈罪始命近畿諸衛官軍更番詣京師操練丙子遣御史巡察邊衛癸未遣御史分巡天下考察官吏丙戌賜戶部尚書夏原吉繩愆糾繆銀章己丑禮部奏冬至節請受賀不許庚寅敕諸將嚴邊備辛卯禁所司擅役屯田軍士壬辰都督方政同榮昌伯陳智鎮交址是月諭蹇義楊士奇夏原吉楊榮金幼孜曰前世人主或自尊大惡聞直言臣下相與阿附以至於敗朕與卿等當用為戒又諭士奇曰頃羣臣頗懷忠愛朕有過方自悔而進言者已至良愜朕心十二月癸卯宥建文諸臣外親全家戍邊者留一人餘悉放還辛亥揭天下三司官姓名於奉天門西序癸丑免被災稅糧庚申葬文皇帝於長陵丙寅鎮遠侯顧興祖破平樂潯州蠻是年于闐琉球占城哈密古麻剌朗滿剌加蘇祿瓦剌入貢洪熙元年春正月壬申朔御奉天門受朝不舉樂乙亥敕內外羣臣修舉職業己卯享太廟建弘文閣命儒臣入直楊溥掌閣事癸未以時雪不降敕羣臣修省丙戌大祀天地於南郊奉太祖太宗配壬辰朝臣豫告歸省者賜鈔有差著為令己亥布政使周幹按察使胡概參政葉春巡視南畿浙江二月辛丑頒將軍印於諸邊將戊申祭社稷命太監鄭和守備南京丙辰耕藉田丙寅太宗神主祔太廟是月南京地屢震三月壬申前光祿署丞權謹以孝行擢文華殿大學士丁丑求直言戊子隆平飢戶部請以官麥貸之帝曰即振之何貸為己丑詔曰刑者所以禁暴止邪導民於善非務誅殺也吏或深文傅會以致冤濫朕深憫之自今其悉依律擬罪或朕過於嫉惡法外用刑法司執奏五奏不允同三公大臣執奏必允乃已諸司不得鞭囚背及加人宮刑有自宮者以不孝論非謀反勿連坐親屬古之盛世採聽民言用資戒警今姦人往往托拾誣為誹謗法吏刻深鍛鍊成獄刑之不中民則無措其除誹謗禁有告者一切勿治庚寅陽武侯薛祿為鎮朔大將軍率師巡開平大同邊辛卯參將安平伯李安與榮昌伯陳智同鎮交址戊戌將還都南京詔北京諸司悉稱行在復北京行部及行後軍都督府是月南京地屢震夏四月壬寅帝聞山東及淮徐民乏食有司徵夏稅方急乃御西角門詔大學士楊士奇草詔免今年夏稅及秋糧之半士奇言上恩至矣但須戶工二部預聞帝曰救民之窮當如救焚拯溺不可遲疑有司慮國用不足必持不決之意趣命中官具楮筆令士奇就門樓書詔帝覽畢即用璽付外行之顧士奇曰今可語部臣矣設北京行都察院壬子命皇太子謁孝陵遂居守南京戊午如天壽山謁長陵己未還宮是月振河南及大名飢南京地屢震五月己卯侍讀李時勉侍講羅汝敬以言事改御史尋下獄庚辰帝不豫遣使召皇太子於南京辛巳大漸遺詔傳位皇太子是日崩於欽安殿年四十有八秋七月己巳上尊諡廟號仁宗葬獻陵贊曰當靖難師起仁宗以世子居守全城濟師其後成祖乘輿歲出北征東宮監國朝無廢事然中遘媒孽瀕於危疑者屢矣而終以誠敬獲全善乎其告人曰吾知盡子職而已不知有讒人也是可為萬世子臣之法矣在位一載用人行政善不勝書使天假之年涵濡休養德化之盛豈不與文景比隆哉
