body:
  text: 明史卷一百三十一列傳第十九顧時吳禎薛顯郭興陳德王志梅思祖金朝興唐勝宗陸仲亨費聚陸聚鄭遇春黃彬葉升顧時字時舉濠人倜儻好奇略從太祖渡江積功由百夫長授元帥取安慶南昌廬州泰州擢天策衛指揮同知李濟據濠州時從平章韓政討降之攻張士誠升山水寨引小舫繞敵舟舟中多俯視而笑時乘其懈帥壯士數人大呼躍入舟衆大亂餘舟競進五太子來援薛顯又敗之五太子等降遂從大將軍平吳旋師取山東洪武元年拜大都督府副使兼同知率府事從大將軍定河南北浚閘以通舟師自臨清至通州下元都與諸將分邏古北諸隘口從大軍取平陽克崞州獲逃將王信等四十六人取蘭州圍慶陽張良臣耀兵城下擊敗之獲其徑將九人良臣乃不敢復出慶陽平徐達還京令時將騎兵略靜寧州走賀宗哲西邊悉平三年進大都督同知封濟寧侯祿千五百石豫世券四年為左副將軍副傅友德帥河南陝西步騎伐蜀自興元進克階文敗蜀兵於漢州遂克成都明年副李文忠北征分道入沙漠迷失道糧且盡遇寇士疲不能戰時帥麾下數百人躍馬衝擊敵衆引去獲其輜重糧畜以歸軍聲大振六年從徐達鎮北平踰年召還八年復出鎮十二年卒年四十六葬鍾山追封滕國公諡襄靖祔祭功臣廟時能以少擊衆沉鷙不伐帝甚重之子敬金吾衛鎮撫十五年嗣侯為左副將軍平龍泉山寇有功二十三年追論胡惟庸黨榜列諸臣以時為首敬坐死爵除吳禎江國襄烈公良弟也初名國寶賜名禎與良俱從克滁和渡江克采石從定集慶下鎮江廣德常州宣城江陰皆有功又從常遇春自銅陵取池州以舟師毀其北門入城敵艦百餘至復大敗之遂克池州積功由帳前都先鋒纍遷為天興翼副元帥以千人助良守江陰數敗吳兵破士誠水寨擒其驍將朱定授英武衛親軍指揮使又大破吳兵於浮子門從大將軍徐達帥馬步舟師取湖州勒奇兵出舊館大捷湖州平遂戍之從圍平江破葑胥二門進僉大都督府事撫平江尋副征南將軍湯和討方國珍乘潮入曹娥江毀壩通道出不意直抵軍國珍亡入海追及之盤嶼合戰自申至戌敗之盡獲其戰艦士卒輜重國珍降復自海道進取福州圍其西南水部三門一鼓克之洪武元年進兵破延平擒陳友定閩海悉平還次昌國會海寇劫蘭秀山剿平之兼率府副使尋為吳王左相兼僉大都督府事二年大將軍平陝西還禎與副將軍馮勝駐慶陽三年討平沂州答山賊命為靖海將軍練軍海上其冬封靖海侯食祿千五百石豫世券與秦晉二王傅金朝興汪興祖並專傅王解都督府事仇成戍遼陽命禎總舟師數萬由登州餉之海道險遠經理有方兵食無乏完城練卒盡收遼海未附之地降平章高家奴等坐事謫定遼衛指揮使尋召還七年海上有警復充總兵官同都督僉事於顯總江陰四衛舟師出捕倭至琉球大洋獲其兵船獻俘京師自是常往來海道總理軍務數年海上無寇十一年奉詔出定遼得疾輿還京師明年卒追封海國公諡襄毅與良俱肖像功臣廟子忠嗣侯二十三年追論禎胡惟庸黨爵除薛顯蕭人趙均用據徐州以顯為元帥守泗州均用死以泗州來降授親軍指揮從征伐南昌平命顯從大都督朱文正守之陳友諒寇南昌顯守章江新城二門友諒攻甚急顯隨方禦之間出鋭卒搏戰斬其平章劉進昭擒副樞趙祥固守三月乃解武昌既平鄧仲謙據新淦不下顯討斬之因徇下未附諸郡縣以功擢江西行省參政從徐達等收淮東遂伐張士誠與常遇春攻湖州別將游軍取德清攻升山水寨士誠遣其五太子盛兵來援遇春與戰小却顯帥舟師奮擊燒其船衆大潰五太子及朱暹呂珍等以舊館降得兵六萬人遇春謂顯曰今日之戰將軍功遇春弗如也五太子等既降吳人震恐湖州遂下進圍平江與諸將分門而軍吳平進行省右丞命從大將軍徐達取中原瀕行太祖諭諸將謂薛顯傅友德勇略冠軍可當一面進克兗沂青濟取東昌棣州樂安還收河南搗關陝渡河取衛輝彰德廣平臨清帥馬步舟師取德州長蘆敗元兵於河西務又敗之通州遂克元都分兵邏古北諸隘口略大同獲喬右丞等三十四人進征山西次保定取七垛寨追敗脫因帖木兒與友德將鐵騎三千略平定西取太原走擴廓降豁鼻馬邀擊賀宗哲於石州拔白崖桃花諸山寨與大將軍達會平陽以降將杜旺等十一人見遂從入關中抵臨洮別將攻馬鞍山西番寨大獲其畜産襲走元豫王敗擴廓於寧夏復與達會師取平涼張良臣僞以慶陽降顯往納之良臣蒲伏道迎夜劫顯營突圍免良臣據城叛達進圍之擴廓遣韓扎兒攻原州以撓明師顯駐兵靈州遏之良臣援絶遂敗追賀宗哲於六盤山逐擴廓出塞外陝西悉平洪武三年冬大封功臣以顯擅殺胥吏獸醫火者馬軍及千戶吳富面數其罪封永城侯勿豫券謫居海南分其祿為三一以贍所殺吳富及馬軍之家一以給其母妻令功過無相掩顯居海南踰年帝念之召還豫世券食祿一千五百石復從大將軍征漠北數奉命巡視河南屯田北平練軍山西從魏國公巡北邊從宋國公出金山二十年冬召還次山海衛卒贈永國公諡桓襄無子弟綱幼二十三年追坐顯胡惟庸黨以死不問爵除郭興一名子興濠人滁陽王郭子興據濠稱元帥興隸麾下太祖在甥館興歸心焉軍行嘗備宿衛纍功授管軍總管進統軍元帥圍常州晝夜不解甲者七月城下受上賞從攻寧國江陰宜興婺州安慶衢州皆下之戰於鄱陽陳友諒連巨艦以進我師屢却興獻計以火攻之友諒死從征武昌斬獲多進鷹揚衛指揮使從徐達取廬州援安豐大敗張士誠兵平襄陽衡澧還克高郵淮安轉戰湖州圍平江軍於婁門吳平擢鎮國將軍大都督府僉事洪武元年從達取中原克汴梁守禦河南馮勝取陝州請益兵守潼關達曰無如興者遂調守之潼關三秦門戶時哈麻圖據奉元李思齊張思道等與為掎角日窺伺欲東向興悉力捍禦王左丞來攻大敗之從徐達帥輕騎直搗奉元大軍繼進遂克之移鎮鞏昌邊境帖然三年為秦王武傅兼陝西行都督府僉事其冬封功臣興以不守紀律止封鞏昌侯食祿一千五百石豫世券四年伐蜀克漢州成都六年從徐達鎮北平同陳德敗元兵於答剌海口十一年練兵臨清十六年巡北邊召還踰年卒贈陝國公諡宣武二十三年追坐胡惟庸黨爵除興女弟為寧妃弟英武定侯季弟德成性通敏嗜酒兩兄積功至列侯而德成止驍騎舍人太祖以寧妃故欲貴顯之德成辭帝不悅頓首謝曰臣性耽麥曲糵庸暗不能事事位高祿重必任職司事不治上殆殺我人生貴適意但多得錢飲醇酒足矣餘非所望帝稱善賜酒百罌金幣稱之寵遇益厚嘗侍宴後苑醉匍匐脫冠謝帝顧見德成髮種種笑曰醉風漢髮如此非酒過耶德成仰首曰臣猶厭之盡剃始快帝默然既醒大懼佯狂自放剃髮衣僧衣唱佛不已帝謂寧妃曰始以汝兄戲言今實為之真風漢也後黨事起坐死者相屬德成竟得免陳德字至善濠人世農家有勇力從太祖於定遠以萬夫長從戰皆有功為帳前都先鋒同諸將取寧徽衢婺諸城擢元帥李伯升寇長興德往援擊走之從援南昌大戰鄱陽湖擒水寨姚平章太祖舟膠淺德力戰身被九矢不退從平武昌大敗張士誠兵於舊館擢天策衛親軍指揮使吳平進僉大都督府事從大將軍北取中原克元汴梁立河南行都督府以德署府事討平羣盜征山西破澤州磨盤寨獲參政喻仁遂會大軍克平陽太原大同渡河取奉元鳳翔至秦州元守將呂國公遁追擒之徐達圍張良臣於慶陽良臣恃其兄思道為外援間使往來德悉擒獲慶陽遂下又大破擴廓於古城降其卒八萬洪武三年封臨江侯食祿一千五百石豫世券明年從潁川侯傅友德伐蜀分道入綿州破龍德大敗吳友仁之衆乘勝拔漢州向大亨戴壽等走成都追敗之遂與友德圍成都蜀平賜白金綵幣復還汴五年為左副將軍與馮勝征漠北破敵於別篤山俘斬萬計克甘肅取亦集乃路留兵扼關而還明年復總兵出朔方敗敵三岔山擒其副樞失剌罕等七十餘人其秋再出戰於答剌海口斬首六百級獲其同僉欣都等五十四人凡三戰三捷七年練兵北平十年還鳳陽十一年卒追封杞國公諡定襄子鏞襲封十六年為征南左副將軍討平龍泉諸山寇練兵汴梁十九年與靖海侯吳禎城會州二十年從馮勝征納哈出將至金山與大軍異道相失敗沒二十三年追坐德胡惟庸黨詔書言其征西時有過被鐫責遂與惟庸通謀爵除王志臨淮人以鄉兵從太祖於濠下滁和從渡江屢騰柵先登身冒矢石授右副元帥從取常州寧國江陰復宜興攻高郵搗九江下黃梅鏖戰鄱陽從平武昌還克廬州敗張士誠兵追奔四十里以親軍衛指揮使改六安衛守六安從幸汴梁渡河取懷慶澤潞留守平陽大將軍徐達西伐會師克興元洪武三年進同知都督府事封六安侯歲祿九百石豫世券移守漢中帥兵出察罕腦兒塞還鎮平陽復從大將軍征沙漠其後用兵西南皆以偏將軍從雖無首功然持重未嘗敗衄其攻合肥敗樓兒張擒吳副使為戰功第一領山西都司衛所軍務帝稱其處置得宜十六年督兵往雲南品甸繕城池立屯堡置驛傳安輯其民十九年卒追封許國公諡襄簡子威二十二年嗣侯明年坐事謫安南衛指揮使卒無子弟嗣改清平衛世襲志亦追坐胡惟庸黨以死不問梅思祖夏邑人初為元義兵元帥叛從劉福通擴廓醢其父尋棄福通歸張士誠為中書左丞守淮安徐達兵至迎降並獻四州士誠殺其兄弟數人太祖擢思祖大都督府副使從大軍伐吳克升山水寨下湖州圍平江皆有功吳平遷浙江行省右丞從大將軍伐中原克山東取汴洛破陝州下潼關旋師徇河北至衛輝元平章龍二棄城走彰德師從之龍二復出走遂降其城守之略定北平未下州郡從大軍平晉冀復從平陝西別將克邠州獲元參政毛貴等三十人從大將軍破擴廓於定西還自秦州破略陽入沔州取興元洪武三年論功封汝南侯食祿九百石豫世券四年伐蜀五年征甘肅還命巡視山陝遼東城池十四年四川水盡源通塔平散毛諸洞長官作亂命思祖為征南副將軍與江夏侯周德興帥兵討平之十五年復與傅友德平雲南置貴州都司以思祖署都指揮使尋署雲南布政司事與平章潘元明同守雲南思祖善撫輯遠人安之是年卒賜葬鍾山之陰子義遼東都指揮使二十三年追坐思祖胡惟庸黨滅其家思祖從子殷為駙馬都尉別有傳金朝興巢人淮西亂聚衆結寨自保俞通海等既歸太祖朝興亦帥衆來附從渡江征伐皆預有功克常州為都先鋒復宜興為左翼副元帥平武昌進龍驤衛指揮同知平吳改鎮武衛指揮使克大同改大同衛指揮使取東勝州獲元平章劉麟等十八人洪武三年論功為都督僉事兼秦王左相未幾解都督府事專傅王四年從大軍伐蜀七年帥師至黑城獲元太尉盧伯顏平章帖兒不花並省院等官二十五人遂從李文忠分領東道兵取和林語具文忠傳朝興沉勇有智略所至以偏師取勝雖未為大帥而功出諸將上十一年從沐英西征收納鄰七站地明年論功封宣德侯祿二千石世襲指揮使十五年從傅友德征雲南駐師臨安元右丞兀卜台元帥完者都土酋楊政等俱降朝興撫輯有方軍民咸悅進次會川卒追封沂國公諡武毅十七年論平雲南功改錫世侯券增祿五百石長子鎮嗣封二十三年追坐朝興胡惟庸黨降鎮平壩衛指揮使從征有功進都指揮使其後世襲衛指揮使嘉靖元年命立傅友德梅思祖及朝興廟於雲南額曰報功唐勝宗濠人太祖起兵勝宗年十八來歸從渡江積功為中翼元帥從徐達克常州進圍寧國扼險力戰敗其援兵城遂降從征婺州克之從征池州力戰敗陳友諒兵擢龍驤衛指揮僉事從征友諒至安慶敵固守勝宗為陸兵疑之出不意搗克其水寨從下南昌略定江西諸郡援安豐攻廬州戰鄱陽邀擊涇江口皆有功擢驃騎衛指揮同知從定武昌徇長沙沅陵澧陽從徐達取江陵還定淮東穴城克安豐追獲元將欣都為安豐衛指揮使守之從大將軍伐中原克汴梁歸德許州輒留守從大軍克延安進都督府同知洪府三年冬封延安侯食祿千五百石豫世券坐擅馳驛騎奪爵降指揮捕代縣反者久之復爵十四年浙東山寇葉丁香等作亂命總兵討之擒賊首併其黨三千餘人分兵平安福賊至臨安降元右丞兀卜台等十五年巡視陝西督屯田簡軍士明年鎮遼東奉敕勿通高麗高麗使至察其奸表聞賜敕褒美比魏田豫却烏桓賂稱名臣在鎮七年威信大著召還帥師討平貴州蠻練兵黃平二十三年坐胡惟庸黨誅爵除陸仲亨濠人歸太祖從征滁州取大柳樹諸寨克和陽擊敗元兵逐青山羣盜從渡江取太平定集慶從徐達下諸郡縣授左翼統軍元帥從征陳友諒功多進驃騎衛指揮使從常遇春討贛州降熊天瑞為贛州衛指揮使節制嶺南北新附諸郡調兵克梅州會昌湘鄉悉平諸山寨洪武元年帥衛軍與廖永忠等征廣東略定諸郡縣會永忠於廣州降元將盧左丞廣東平改美東衛指揮使擢江西行省平章代鄧愈鎮襄陽改同知都督府事三年冬封吉安侯祿千五百石豫世券與唐勝宗同坐事降指揮使捕寇雁門同復爵十二年與周德興黃彬等從湯和練兵臨清未幾即軍中逮三人至京既而釋之移鎮成都平巨津州叛蠻烏撒諸蠻復叛從傅友德討平之二十三年治胡惟庸逆黨家奴封帖木告仲亨與勝宗費聚趙庸皆與通謀下吏訊獄具帝曰朕每怪其居貴位有憂色遂誅仲亨籍其家初仲亨年十七為亂兵所掠父母兄弟俱亡持一升麥伏草間帝見之呼曰來遂從征伐至封侯帝嘗曰此我初起時腹心股肱也竟誅死費聚字子英五河人父德興以材勇為游徼卒聚少習技擊太祖遇於濠偉其貌深相結納定遠張家堡有民兵無所屬郭子興欲招之念無可使者太祖力疾請行偕聚騎而往步卒九人俱至寶公河望其營甚整弓弩皆外向步卒懼欲走太祖曰彼以騎蹴我走將安往遂前抵其營招諭已定約三日太祖先歸留聚俟之其帥欲他屬聚還報太祖復偕聚以三百人往計縛其帥收卒三千人豁鼻山有秦把頭八百餘人聚復招降之遂從取靈璧克泗滁和州授承信校尉既定江東克長興立永興翼元帥府以聚副耿炳文為元帥張士誠入寇擊敗之召領宿衛授安豐兩定江西克武昌皆從改永興翼元帥府為永興親軍指揮司仍副炳文為指揮同知士誠復入寇獲其帥宋興祖再敗之士誠奪氣不敢復窺長興隨征淮安湖州平江皆有功進指揮使湯和討方國珍聚以舟師從海道邀擊浙東平復由海道取福州破延平歸次昌國剿海寇葉陳二姓於蘭秀山至是聚始獨將洪武二年會大軍取西安改西安衛指揮使進都督府僉事鎮守平涼三年封平涼侯歲祿千五百石豫世券時諸將在邊屯田募伍歲有常課聚頗耽酒色無所事事又以招降無功召還切責之明年從傅友德征雲南大戰白石江擒達里麻雲南平進取大理未幾諸蠻復叛命副安陸侯吳復為總兵授以方略分攻關索嶺及阿咱等寨悉下之蠻地始定置貴州都指揮使司以聚署司事十八年命為總兵官帥指揮丁忠等征廣南擒火立達俘其衆萬人還鎮雲南二十三年召還李善長敗語連聚帝曰聚曩使姑蘇不稱旨朕嘗詈責遂欲反耶竟坐黨死爵除子超征方國珍沒於陳璿以人材舉官江西參政孫宏從征雲南積功為右衛指揮使坐奏對不實戍金齒陸聚不知何許人元樞密院同知脫脫敗芝麻李於徐州彭大等奔濠聚撫戢流亡繕城保境寇不敢犯徐達經理江淮聚以徐宿二州降太祖嘗詔諭二州吾桑梓地未忍加兵及歸附大悅以聚為江南行省參政仍守徐州遣兵略定沛魚臺邳蕭宿遷睢寧擴廓遣李左丞侵徐駐陵子村聚遣指揮傅友德擊之俘其衆擒李左丞又敗元兵於宿州擒僉院邢端等從定山東平汴梁還鎮改山東行省參政從平元都略大同保定真定攻克車子山及鳳山城山鐵山諸寨分守井陘故關會師陝西克承天寨聚所部皆淮北徑卒雖燕趙精騎不及也北征沂邳山民乘間作亂召聚還討平之洪武三年封河南侯歲祿九百石豫世券八年同衛國公愈屯田陝西置衛戍守十二年同信國公和練兵臨清尋理福建軍務召還賜第鳳陽二十三年坐胡惟庸黨死爵除鄭遇春濠人與兄遇霖俱以勇力聞遇霖與里人有郤欲殺之遇春力護得解衆皆畏遇霖而以遇春為賢太祖下滁州遇霖為先鋒取鐵佛岡三義河大柳等寨遇春亦纍功至總管攻蕪湖遇霖戰死遇春領其衆時諸將所部不過千人遇春兼兩隊而所部尤驍果纍戰功多授左翼元帥從平陳友諒身先士卒未嘗自言功太祖異之取六安為六安衛指揮僉事從大將軍定山東河南北克朔州改朔州衛指揮副使洪武三年進同知大都督府事封滎陽侯歲祿九百石豫世券明年命駐臨濠開行大都督府坐纍奪爵尋復之復守朔州從傅友德平雲南帥楊文等經略城池屯堡還京督金吾諸衛造海船百八十艘運餉遼東籍陝西岷州諸衛官馬二十三年坐胡惟庸黨死爵除黃彬江夏人從歐普祥攻陷袁吉屬縣徐壽輝以普祥守袁州及陳友諒殺壽輝僭僞號彬言於普祥曰公與友諒比肩奈何下之友諒驕恣非江東敵也保境候東師當不失富貴普祥遂遣使納友諒遣弟友仁攻之彬與普祥敗其衆獲友仁友諒懼約分界不相犯乃釋友仁時江楚諸郡皆為陳氏有袁扼其要害潭嶽贛兵不得出友諒勢大蹙太祖兵臨之遂棄江州彬力也太祖至龍興令普祥仍守袁州而以彬為江西行省參政未幾普祥死彬領其衆普祥故殘暴彬盡反所為民甚安之從常遇春征贛州饒鼎臣據吉安為熊天瑞聲援遇春兵至鼎臣走安福彬以兵躡之鼎臣走茶陵天瑞乃降永新守將周安叛彬從湯和執安鼎臣亦殪移鎮袁州招集諸山寨江西悉定進江淮行省中書左丞洪武三年封宜春侯歲祿九百石豫世券四年贛州上猶山寇叛討平之五年古州等洞蠻叛以鄧愈為征南將軍三道出師彬與營陽侯璟出澧州師還賜第中都明年從徐達鎮北平出練兵沂州臨清二十三年坐胡惟庸黨死爵除葉升合肥人左君弼據廬升自拔來歸以右翼元帥從征江州以指揮僉事從取吳以府軍衛指揮使從定明州洪武三年論功僉大都督府事明年從征西將軍湯和以舟師取蜀越二年出為都指揮使鎮守西安討平慶陽叛寇十二年復僉大都督府事西番叛與都督王弼征之降乞失迦平其部落復討平延安伯顏帖木兒擒洮州番酋論功封靖寧侯歲祿二千石世指揮使鎮遼東修海蓋復三城在鎮六年邊備修舉外寇不敢犯發高麗賂遺帝屢賜敕與唐勝宗同褒二十年命同普定侯陳桓總制諸軍於雲南定邊姚安立營屯田經理畢節衛明年東川龍海諸蠻叛升以參將從沐英討平之已而湖廣安福所千戶夏德忠誘九溪洞蠻為寇升同胡海等討之潛兵出賊後掩擊擒德忠立永定九溪二衛因留屯襄陽贛州山賊復結湖廣峒蠻為寇升為副將軍同胡海等討平之俘獲萬七千人升凡三平叛蠻再出練兵甘肅河南二十五年八月坐交通胡惟庸事覺誅死涼國公藍玉升姻也玉敗復連及升以故名隸兩黨云贊曰諸將當草昧之際上觀天命委心明主戰勝攻取克建殊勳皆一時之智勇也及海內寧謐乃名隸黨籍或追論或身坐鮮有能自全者圭裳之錫固足酬功而礪帶之盟不克再世亦可慨矣夫
