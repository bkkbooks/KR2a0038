黑餅豆又減脾析豚胉用四者籩則止實以形鹽薧魚棗栗豆則止實以芹葅兔醢菁葅鹿醢各二者籩實栗鹿脯豆實菁葅鹿臡簠簋各二者實以黍稷稻粱各一者實以稷粱登實以太羹鉶實以和羹洪武三年禮部言禮記郊特牲曰郊之祭也器用陶匏尚質也周禮籩人凡祭祀供簠簋之實疏曰外祀用瓦簠今祭祀用瓷合古意惟盤盂之屬與古簠簋登鉶異制今擬凡祭器皆用瓷其式皆倣古簠簋登豆惟籩以竹詔從之酒齊倣周制用新舊醅以備五齊三酒其實於尊之名數各不同祭祀雜議諸儀其祭祀雜議諸儀凡版位皇帝位方一尺二寸厚三寸紅質金字皇太子位方九寸厚二寸紅質青字陪祀官位並白質黑字拜褥初用緋洪武三年定制郊丘席為表蒲為𩹉宗廟社稷先農山川紅文綺為表紅木棉布為𩹉贊唱凡皇帝躬祀入就位時太常寺奏中嚴奏外辦盥洗升壇飲福受胙各致贊辭又凡祀各設爵洗位滌爵拭爵初升壇唱再拜及祭酒唱賜福胙洪武七年禮部奏其煩瀆悉刪去上香禮明初祭祀皆行洪武七年以翰林詹同言罷嘉靖九年復行拜禮初每節皆再拜洪武九年禮臣奏禮記一獻三獻五獻七獻之文皆不載拜禮唐宋郊祀每節行禮皆再拜然亞獻終獻天子不行禮而使臣下行之今議大祀中祀自迎神至飲福送神宜各行再拜禮帝命節為十二拜迎神飲福受胙送神各四拜云登壇脫舄初未行洪武八年詔翰林院臣考定大祀登壇脫舄之禮學士樂韶鳳雜考漢魏以來朝祭儀議於郊祀廟享前期一日有司以席藉地設御幕於壇東南門外設執事官脫履之次於壇門外西階側祭日大駕入幕次脫舄升壇其升壇執事導駕贊禮讀祝並分獻陪祀官皆脫舄於外以次升壇供事協律郎樂舞生依前跣襪就位祭畢降壇納舄從之嘉靖十七年罷其禮祭祀日期欽天監選擇太常寺預於十二月朔至奉天殿具奏蓋古卜法不存而擇干支之吉以代卜也洪武七年命太常卿議祭祀日期書之於版依時以祭著為式其祭日遣官監祭不敬失儀者罪之習儀凡祭祀先期三日及二日百官習儀於朝天宮嘉靖九年更定郊祀冬至習儀於先期之七日及六日齊戒洪武二年學士朱升等奉敕撰齊戒文曰戒者禁止其外齊者整齊其內沐浴更衣出宿外舍不飲酒不茹葷不問疾不弔喪不聽樂不理刑名此則戒也專一其心嚴畏謹慎苟有所思即思所祭之神如在其上如在其左右精白一誠無須臾間此則齊也大祀七日前四日戒後三日齊太祖曰凡祭祀天地社稷宗廟山川等神為天下祈福宜下令百官齊戒若自有所禱於天地百神不關民事者不下令又曰致齊以五日七日為期太久人心易怠止臨祭齊戒三日務致精專庶可格神明遂著為令是年從禮部尚書崔亮奏大祀前七日陪祀官詣中書省受誓戒各揚其職不共其事國有常刑宗廟社稷致齊三日不誓戒三年諭禮部尚書陶凱曰人心操舍無常必有所警而後無所放乃命禮部鑄銅人一高尺有五寸手執牙簡大祀則書致齊三日中祀則書致齊二日於簡上太常司進置齊所四年定天子親祀齊五日遣官代祀齊三日降香齊一日五年命諸司各置木牌以警褻慢刻文其上曰國有常憲神有鑒焉凡祭祀則設之又從陶凱奏凡親祀皇太子宮中居守親王戎服侍從皇太子親王雖不陪祀一體齊戒六年建陪祀官齊房於北郊齊宮之西南復定齊戒禮儀凡祭天地正祭前五日午後沐浴更衣處外室次早百官於奉天門觀誓戒牌次日告仁祖廟退處齊宮致齊三日享宗廟正祭前四日午後沐浴更衣處外室次日為始致齊三日祭社稷朝日夕月周天星辰太歲風雲雷雨嶽鎮海瀆山川等神致齊二日如前儀凡傳制降香遣官代祀先一日沐浴更衣處外室次日遣官七年定制凡大祀前期四日太常卿至天下神祇壇奠告中書丞相詣京師城隍廟發咨次日皇帝詣仁祖廟請配享二十一年定制齊戒前二日太常司官宿於本司次日奏請致齊又次日進銅人傳制諭文武百官齊戒是日禮部太常司官檄城隍神遍請天下當祀神祇仍於各廟焚香三日二十六年定傳制誓戒儀凡大祀前三日百官詣闕如大朝儀傳制官宣制云某年月日祀於某所爾文武百官自某日為始致齊三日當敬慎之傳制訖四拜奏禮畢宣德七年大祀南郊帝御齊宮命內官內使飲酒食葷入壇唾地者皆罪之司禮監縱容者同罪齊之日御史檢視各官於齊次仍行南京一體齊戒弘治五年鴻臚少卿李燧言分獻陪祭等官借居道士房榻貴賤雜處且宣召不便乞於壇所隙地倣天壽山朝房體制建齊房從之嘉靖九年定前期三日帝御奉天殿百官朝服聽誓戒萬曆四年十一月禮部以二十三日冬至祀天十八日當奏祭十九日百官受誓戒是日皇太后聖旦百官宜吉服賀一日兩遇禮文服色不同請更奏祭誓戒皆先一日帝命奏祭誓戒如舊而以十八日行慶賀禮遣官祭祀洪武二十六年定傳制特遣儀是日皇帝升座如常儀百官一拜禮畢獻官詣拜位四拜傳制官由御前出宣制如祭孔子則曰某年月日祭先師孔子大成至聖文宣王命卿行禮祭歷代帝王則曰某年月日祭先聖歷代帝王命卿行禮俯伏興四拜禮畢出其降香遣官儀前祀一日清晨皇帝皮辨服升奉天殿捧香者以香授獻官獻官捧由中陛降中道出至午門外置龍亭內儀仗鼓吹導引至祭所後定祭之日降香如常儀中嚴以待獻官祭畢復命解嚴還宮嘉靖九年定大祀遣官不行飲福禮分獻陪祀凡分獻官大常寺豫請旨洪武七年太祖謂學士詹同曰大祀終獻方行分獻禮未當同乃與學士宋濂議以上初獻奠玉帛將畢分獻官即行初獻禮亞獻終獻皆如之嘉靖九年四郊工成帝諭太常寺曰大祀分獻官豫定方可習儀乃用大學士張璁等於大明夜明星辰風雲雷雨四壇舊制分獻用文武大臣及近侍官共二十四人今定四人法司官仍舊例不與凡陪祀洪武四年太常寺引周禮及唐制擬用武官四品文官五品以上其老疾瘡疥刑餘喪過體氣者不與從之後定郊祀六科都給事中皆與陪祀餘祭不與又定凡南北郊先期賜陪祀執事官明衣布樂舞生各給新衣制陪祀官入壇牙牌凡天子親祀則佩以入其制有二圓者與祭官佩之方者執事人佩之俱藏內府遇祭則給無者不得入壇洪武二十九年初祀山川諸神流官祭服未入流官公服洪武二十九年從禮臣言未入流官凡祭皆用祭服與九品同
