body:
  text: 明史卷四十七志第二十三禮一吉禮一周官儀禮尚已然書缺簡脫因革莫詳自漢史作禮志後皆因之一代之制始的然可考歐陽氏云三代以下治出於二而禮樂為虛名要其用之郊廟朝廷下至閭里州黨者未嘗無可觀也惟能修明講貫以實意行乎其間則格上下感鬼神教化之成即在是矣安見後世之禮必不可上追三代哉明太祖初定天下他務未遑首開禮樂二局廣徵耆儒分曹究討洪武元年命中書省暨翰林院太常司定擬祀典乃歷沿革之由酌定郊社宗廟議以進禮官及諸儒臣又編集郊廟山川等儀乃古帝王祭祀感格可垂鑒戒者名曰存心録二年詔諸儒臣修禮書明年告成賜名大明集禮其書準五禮而益以冠服車輅儀仗鹵簿字學音樂凡升降儀節制度名數纖悉畢具又屢敕議禮臣李善長傅瓛宋濂詹同陶安劉基魏觀崔亮牛諒陶凱朱升樂韶鳳李原名等編輯成集且詔郡縣舉高潔博雅之士徐一夔梁寅周子諒胡行簡劉宗弼董彝蔡深滕公琰至京同修禮書在位三十餘年所著書可考見者曰孝慈録曰洪武禮制曰禮儀定式曰諸司職掌曰稽古定制曰國朝制作曰大禮要議曰皇朝禮制曰大明禮制曰洪武禮法曰禮制集要曰禮制節文曰太常集禮曰禮書若夫釐正祀典凡天皇太乙六天五帝之類皆為革除而諸神封號悉改從本稱一洗矯誣陋習其度越漢唐遠矣又詔定國恤父母並斬衰長子降為期年正服旁服以遞而殺斟酌古今蓋得其中永樂中頒文公家禮於天下又定巡狩監國及經筵日講之制後宮罷殉始於英宗陵廟嫡庶之分正於孝宗暨乎世宗以制禮作樂自任其更定之大者如分祀天地復朝日夕月於東西郊罷二祖並配以及祈穀大雩享先蠶祭聖師易至聖先師號皆能折衷於古獨其排衆議祔睿宗太廟躋武宗上徇本生而違大統以明察始而以豐昵終矣當時將順之臣各為之說今其存者若明倫大典則御製序文以行之祀儀成典則李時等奉敕而修郊祀考議則張孚敬所進者也至大明會典自孝宗朝集纂其於禮制尤詳世宗神宗時數有增益一代成憲略具是焉今以五禮之序條為品式而隨時損益者則依類編入以識沿革云壇壝之制神位祭器玉帛牲牢祝冊之數籩豆之實祭祀雜議諸儀祭祀日期習儀齊戒遣官祭祀分獻陪祀五禮一曰吉禮凡祀事皆領於太常寺而屬於禮部明初以圜丘方澤宗廟社稷朝日夕月先農為大祀太歲星辰風雲雷雨嶽鎮海瀆山川歷代帝王先師旗纛司中司命司民司祿壽星為中祀諸神為小祀後改先農朝日夕月為中祀凡天子所親祀者天地宗廟社稷山川若國有大事則命官祭告其中祀小祀皆遣官致祭而帝王陵廟及孔子廟則傳制特遣焉每歲所常行者大祀十有三正月上辛祈穀孟夏大雩季秋大享冬至圜丘皆祭昊天上帝夏至方丘祭皇地祇春分朝日於東郊秋分夕月於西郊四孟季冬享太廟仲春仲秋上戊祭太社太稷中祀二十有五仲春仲秋上戊之明日祭帝社帝稷仲秋祭太歲風雲雷雨四季月將及嶽鎮海瀆山川城隍霜降日祭旗纛於教場仲秋祭城南旗纛廟仲春祭先農仲秋祭天神地祇於山川壇仲春仲秋祭歷代帝王廟春秋仲月上丁祭先師孔子小祀八孟春祭司戶孟夏祭司竈季夏祭中霤孟秋祭司門孟冬祭司井仲春祭司馬之神清明十月朔祭泰厲又於每月朔望祭火雷之神至京師十廟南京十五廟各以歲時遣官致祭其非常祀而間行之者若新天子耕藉而享先農視學而行釋奠之類嘉靖時皇后享先蠶祀高禖皆因時特舉者也其王國所祀則太廟社稷風雲雷雨封內山川城隍旗纛五祀厲壇府州縣所祀則社稷風雲雷雨山川厲壇先師廟及所在帝王陵廟各衛亦祭先師至於庶人亦得祭里社穀神及祖父母父母並祀竈載在祀典雖時稍有更易其大要莫能踰也至若壇壝之制神位祭器玉帛牲牢祝冊之數籩豆之實酒齊之名析其彼此之異同訂其初終之損益臚於首簡略於本條庶無缺遺亦免繁復云爾壇壝之制明初建圜丘於正陽門外鍾山之陽方丘於太平門外鍾山之陰圜丘壇二成上成廣七丈高八尺一寸四出陛各九級正南廣九尺五寸東西北八尺一寸下成周圍壇面縱橫皆廣五丈高視上成陛皆九級正南廣一丈二尺五寸東西北殺五寸五分甃磚闌楯皆以琉璃為之壝去壇十五丈高八尺一寸四面靈星門南三門東西北各一外垣去壝十五丈門制同天下神祇壇在東門外神庫五楹在外垣北南向廚房五楹在外壇東北西向庫房五楹南向宰牲房三楹天池一又在外庫房之北執事齊舍在壇外垣之東南坊二在外門外橫甬道之東西燎壇在內壝外東南丙地高九尺廣七尺開上南出戶方丘壇二成上成廣六丈高六尺四出陛南一丈東西北八尺皆八級下成四面各廣二丈四尺高六尺四出陛南丈二尺東西北一丈皆八級壝去壇十五丈高六尺外垣四面各六十四丈餘制同南郊有浴室瘞坎在內壝外壬地洪武四年改築圜丘上成廣四丈五尺高五尺二寸下成每面廣一丈六尺五寸高四尺九寸二成通徑七丈八尺壇至內壝牆四面各九丈八尺五寸內壝牆至外壝牆南十三丈九尺四寸北十一丈東西各十一丈七尺方丘上成廣三丈九尺四寸高三尺九寸下成每面廣丈五尺五寸高三尺八寸通徑七丈四寸壇至內壝牆四面皆八丈九尺五寸內壝牆至外壝牆四面各八丈二尺十年改定合祀之典即圜丘舊制而以屋覆之名曰大祀殿凡十二楹中石臺設上帝皇地祇座東西廣三十二楹正南大祀門六楹接以步廊與殿廡通殿後天庫六楹瓦皆黃琉璃廚庫在殿東北宰牲亭井在廚東北皆以步廊通殿兩廡後繚以圍牆南為石門三洞以達大祀門謂之內壇外周垣九里三十步石門三洞南為甬道三中神道左御道右王道道兩旁稍低為從官之地齊宮在外垣內西南東向其後殿瓦易青琉璃二十一年增修壇壝壇後樹松柏外壝東南鑿池二十區冬月伐冰藏凌陰以供夏秋祭祀之用成祖遷都北京如其制嘉靖九年復改分祀建圜丘壇於正陽門外五里許大祀殿之南方澤壇於安定門外之東圜丘二成壇面及欄俱青琉璃邊角用白玉石高廣尺寸皆遵祖制而神路轉遠內門四南門外燎爐毛血池西南望燎臺外門亦四南門外左具服臺東門外神庫神廚祭器庫宰牲亭北門外正北泰神殿正殿以藏上帝太祖之主配殿以藏從祀諸神之主外建四天門東曰泰元南曰昭亨西曰廣利又西鑾駕庫又西犧牲所其北神樂觀北曰成貞北門外西北為齊宮迤西為壇門壇北舊天地壇即大祀殿也十七年撤之又改泰神殿曰皇穹宇二十四年又即故大祀殿之址建大享殿方澤亦二成壇面黃琉璃陛增為九級用白石圍以方坎內北門外西瘞位東燈臺南門外皇祇室外西門外迤西神庫神廚宰牲亭祭器庫北門外西北齊宮又外建四天門西門外北為鑾駕庫遣官房內陪祀官房又外為壇門門外為泰折街牌坊護壇地千四百餘畝太社稷壇在宮城西南東西峙明初建廣五丈高五尺四出陛皆五級壇土五色隨其方黃土覆之壇相去五丈壇南皆樹松二壇同一壝方廣三十丈高五尺甃磚四門飾色隨其方周垣四門南靈星門三北戟門五東西戟門三戟門各列戟二十四洪武十年改壇午門右社稷共一壇為二成上成廣五丈下成廣五丈三尺崇五尺外壝崇五尺四面各十九丈有奇外垣東西六十六丈有奇南北八十六丈有奇垣北三門門外為祭殿其北為拜殿外復為三門垣東西南門各一永樂中建壇北京如其制帝社稷壇在西苑壇址高六寸方廣二丈五尺甃細磚實以淨土壇北樹二坊曰社街王國社稷壇高廣殺太社稷十之三府州縣社稷壇廣殺十之五高殺十之四陛三級後皆定同壇合祭如京師朝日夕月壇洪武三年建朝日壇高八尺夕月壇高六尺俱方廣四丈兩壝壝各二十五步二十一年罷嘉靖九年復建壇各一成朝日壇紅琉璃夕月壇用白朝日壇陛九級夕月壇六級俱白石各建天門二先農壇高五尺廣五丈四出陛御耕藉位高三尺廣二丈五尺四出陛山川壇洪武九年建正殿拜殿各八楹東西廡二十四楹西南先農壇東南具服殿殿南藉田壇東旗纛廟後為神倉周垣七百餘丈垣內地歲種穀蔬供祀事嘉靖十年改名天神地祇壇分列左右太歲壇與嶽瀆同嶽鎮海瀆山川城隍壇據高阜南向高二尺五寸方廣十倍四出陛南向五級東西北三級王國山川壇高四尺四出陛方三丈五尺天下山川所在壇高三尺四出陛三級方二丈五尺神位祭器玉帛牲牢祝冊之數神位圜丘洪武元年冬至正壇第一成昊天上帝南向第二成東大明星辰次之西夜明太歲次之二年奉仁祖配位第一成西向三年壇下壝內增祭風雲雷雨七年更定內壝之內東西各三壇星辰二壇分設於東西其次東則太歲五嶽西則風雲雷雨五鎮內壝之外東西各二壇東四海西四瀆次天下神祇壇東西分設方丘洪武二年夏至正壇第一成皇地祇南向第二成東五嶽次四海西五鎮次四瀆三年奉仁祖配位第一成西向壇下壝內增祭天下山川七年更定內壝之內東西各二壇東四海西四瀆次二壇天下山川內壝之外東西各設天下神祇壇一十二年正月合祀大祀殿正殿三壇上帝皇地祇並南向仁祖配位在東西向從祀十四壇丹陛東一壇曰大明西一壇曰夜明兩廡壇各六星辰二壇次東太歲五嶽四海次西風雲雷雨五鎮四瀆二壇又次天下山川神祇二壇俱東西向二十一年增修丹墀內石臺四大明夜明各一星辰二內壝外石臺二十東十壇北嶽北鎮東嶽東鎮東海太歲帝王山川神祇四瀆西十壇北海西嶽西鎮西海中嶽中鎮風雲雷雨南嶽南鎮南海俱東西向臺高三尺有奇周以石欄陟降為磴道臺上琢石鑿龕以置神位建文時撤仁祖改奉太祖配位第一成西向洪熙元年增文皇帝於太祖下嘉靖九年復分祀之典圜丘則東大明西夜明次東二十八宿五星周天星辰次西風雲雷雨共四壇方丘則東五嶽基運翊聖神烈三山西五鎮天壽純德二山次東四海次西四瀆南北郊皆獨奉太祖配太社稷配位別見先農正位南向后稷配位西向凡神位天地祖宗曰神版餘曰神牌圜丘神版長二尺五寸廣五寸厚一寸趺高五寸以栗木為之正位題曰昊天上帝配位題曰某祖某皇帝並黃質金字從祀風雲雷雨位版赤質金字神席上帝用龍椅龍案上施錦褥配位同從祀位置於案不設席方丘正位曰皇地祇配位及從祀制並同圜丘奉先殿帝后神主高尺二寸廣四寸趺高二寸用木飾以金鏤以青字龕高二尺廣二尺趺高四寸朱漆鏤金龍鳳花版開二窗施紅紗側用金銅環內織金文綺為藉社稷社主用石高五尺廣五尺上微鋭立於壇上半在土中近南北向稷不用主洪武十年皆設木主丹漆之祭畢貯於庫仍用石主埋壇中微露其末後奉祖配其位製塗金牌座如先聖櫝用架罩嘉靖中藏於寢廟帝社稷神位以木高一尺八寸廣三寸朱漆質金書壇南置石龕以藏神位王府州縣社主皆用石長二尺五寸廣尺五寸日月壇神位以松柏為之長二尺五寸廣五寸趺高五寸朱漆金字餘倣此祭器南郊洪武元年定正位登一籩豆各十二簠簋各二爵三壇上太尊二著尊犧尊山罍各一壇下太尊一山罍二從祀位登一籩豆各十簠簋各二東西各設著尊二犧尊二北郊同七年增圜丘從祀共設酒尊六於壇西大明夜明位各三天下神祇鉶三籩豆各八簠簋各二壝內外東西各設酒尊三每位爵三方丘嶽鎮各設酒尊三壝內東西各設酒尊三壝外東西各設酒尊三每位爵三神祇與圜丘同八年圜丘從祀更設登一鉶二