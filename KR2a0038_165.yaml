body:
  text: 明史卷一百六十五列傳第五十三陶成子魯陳敏丁瑄王得仁子一夔葉禎伍驥毛吉林錦郭緒薑昂子龍陶成字孔思鬱林人永樂中舉於鄉除交址鳳山典史尚書黃福知其賢命署諒江府教授交人化之秩滿遷山東按察司檢校用薦擢大理評事正統中以劉中敷薦超擢浙江僉事成有智略遇事敢任倭犯桃渚成密布釘板海沙中倭至艤舟躍上釘洞足背倭畏之遠去秩滿進副使處州賊葉宗留陳鑑胡陶得二等寇蘭溪成擊斬數百人進屯武義立木城以守誘賊黨為內應前後斬首數百生擒百餘人又自抵賊巢諭降者三千餘人賊勢漸衰惟得二尚在久之勢復熾擁衆來犯先遣其黨十餘輩偽為鄉民避賊者以敝縕裹薪闌入城及成出戰賊持薪縱火焚木城官軍驚潰成與都指揮僉事崔源戰死時景泰元年五月也事聞贈成左參政録其子魯為八品官魯字自強廕授新會丞當是時廣西瑤流劫高廉惠肇諸府破城殺吏無虛月香山順德間土寇蜂起新會無賴子羣聚應之魯召父老語曰賊氣吞吾城不早備且陷若輩能率子弟捍禦乎皆曰諾乃築堡寨繕甲兵練技勇以孤城捍賊衝建郭掘濠布鐵蒺藜刺竹于外城守大固賊來犯輒擊破之天順七年秩滿巡撫葉盛上其績就遷知縣尋以破賊功進廣州同知仍知縣事成化二年從總督韓雍征大藤峽雍在軍嚴重獨於魯未嘗不虛己用其策輒有功雍請擢魯為僉事專治新會陽江陽春瀧水新興諸縣兵其冬會參將王瑛破劇賊廖婆保等於欽化二州大獲璽書嘉勞明年賊首黃公漢等猖獗偕參將夏鑑等連破之思恩潯州未幾賊陷石康執知縣羅紳復偕鑑追擊至六菊山敗之兩廣自韓雍去罷總督不設帥臣觀望相推諉寇盜滋蔓魯奏請重臣仍開府梧州遂為永制秩滿課最進副使兵部尚書余子俊奏其撫輯勞賚銀幣魯治兵久賊剽兩粵大者會剿小者專征所向奏捷賊讐之次骨劫其鬱林故居焚誥命發先塋戕其族黨魯聞大慟詔徙籍廣東補給封誥慰勞有加益奮志討賊二十年以征荔浦瑤功增俸一級又九載課最進湖廣按察使治兵兩廣如故鬱林陸川賊黃公定胡公明等為亂與參將歐磐分五路進討大破之毀賊巢一百三十弘治四年總督秦紘遣平德慶瑤進湖廣右布政使魯言身居兩廣而官以湖廣為名於事體非便乃改湖廣左布政使兼廣東按察副使領嶺西道事人稱之為三廣公十一年總督鄧廷瓚請官其子俾統魯所募健卒備征討乃授其子荊民錦衣百戶是年魯卒荊民復陳父功遂進副千戶世襲魯善撫士多智計謀定後戰鑿池公署後為亭其中不置橋夜則召部下計事以版度一人語畢令退如是凡數人乃擇其長而參伍用之故常得勝算而機不泄羽書狎至戎裝宿戒聲色不動審賊可乘潛師出城中夜合圍曉輒奏凱賊善偵終不能得要領歷官四十五年始終不離兵事大小數十戰凡斬馘二萬一千四百有奇奪還被掠及撫安復業者十三萬七千有奇兩廣人倚之如長城然魯將兵不專尚武嘗言治寇賊化之為先不得已始殺之耳每平賊率置縣建學以興教化魯初為丞年才弱冠知縣王重勉之學重故老儒魯遂請執弟子禮每晨授經史講解而後視事後重卒官魯執喪如父禮且資其二子又敬事名儒陳獻章獻章亦重之宋陸秀夫張世傑盡節崖山未有廟祀特為建祠請祠額賜名大忠嘉靖初魯歿三十載矣新會人思其德頌於朝賜祠祀之陳敏陝西華亭人宣德時為四川茂州知州遭喪去官所部諸長官司及番民百八十人詣闕奏言州僻處邊徼萬山中與松潘疊溪諸番鄰歲被其患自敏涖州撫馭有方民得安業今以憂去職軍民失所依乞矜念遠方還此良牧帝立報可正統中九載滿軍民復請留進成都府同知視茂州事都司徐甫言敏及指揮孫敬在職公勤羣番信服章下都御史王翺等核實進敏右參議仍視州事以監司秩涖州前此未有也黑虎寨番掠近境為官軍所獲敏從其俗與誓而遣之既復出掠為巡按御史陳員韜所劾詔貰之提督都御史寇深器其才言敏往來撫恤番人贊理軍政乞別除知州俾敏專戎務吏部以敏涖茂久別除恐未悉番情猝難馴服宜增設同知一人佐之報可敏既以參議治州其體儷監司遂劾按察使陳泰無故杖死番人泰亦訐敏帝不問而泰下獄論罪景泰改元參議滿九載進右參政視州事如前涖州二十餘年威信大行番民胥悅秩漸高諸監司郡守反位其下同事多忌之者為按察使張淑所劾罷去丁瑄不知何許人正統間為御史初福建多礦盜命御史柳華捕之華令村聚皆置望樓編民為甲擇其豪為長得自置兵仗督民巡徼沙縣佃人鄧茂七素無賴既為甲長益以氣役屬鄉民其俗佃人輸租外例餽田主茂七倡其黨令毋餽而田主自往受粟田主訴於縣縣逮茂七不赴下巡檢追攝茂七殺弓兵數人上官聞遣軍三百捕之被殺傷幾盡巡檢及知縣並遇害茂七遂大剽略偽稱剷平王設官屬黨數萬人陷二十餘縣都指揮范真指揮彭璽等先後被殺時福建參政交址人宋新賄王振得遷左布政使侵漁貪惡民不能堪益相率從亂東南騷動十三年四月茂七圍延平刷卷御史張海登城撫諭賊訴乞貰死免三年徭役即解散為良民海以聞命瑄往招討以都督劉聚僉都御史張楷大軍繼其後瑄既至先令人齎敕往撫茂七不肯降瑄馳赴沙縣圖之賊首林宗政等萬餘人攻後坪欲立寨瑄令通判倪冕等率衆先據要害而身與都指揮雍野等邀其歸路斬賊二百餘級獲其渠陳阿巖明年二月瑄誘賊復攻延平督衆軍分道衝擊賊大敗遁走指揮劉福追之遂斬茂七招脅從復業未幾復擒其黨林子得等尤溪賊首鄭永祖率四千人攻延平瑄偕野等邀擊擒之斬首五百有奇餘黨潰散楷之監大軍討賊也至建寧頓不進日置酒賦詩為樂聞瑄破賊則馳至延平攘其功瑄被脅依違具奏福不能平訴之詔責瑄具狀楷等皆獲罪瑄有功不問功亦竟不録茂七雖死其從子伯孫等復熾朝廷更遣陳懋等以大軍討瑄乃還朝景泰初出為廣東副使卒當是時浙閩盜所在剽掠為民患將帥率玩寇而文吏勵民兵拒賊往往多斬獲閩則有張瑛王得仁之屬浙江則金華知府石瑁擒遂昌賊蘇才於蘭溪處州知府張佑擊敗賊衆擒斬千餘人於是帝降敕數詰讓諸將帥都指揮鄧安等因歸咎於前御史柳華時王振方欲殺朝士威衆命逮華華已出為山東副使聞命仰藥死詔籍其家男戍邊婦女沒入浣衣局而御史汪澄柴文顯亦以是得罪初澄按福建以茂七亂檄浙江江西會討尋以賊方議降止兵毋進既知賊無降意復趣進兵而賊已不可制浙江巡按御史黃英恐得罪具白澄止兵狀兵部因劾澄失機福建三司亦言賊初起按臣柴文顯匿不奏釀成今患遂俱下吏獄成詔磔文顯籍其家澄棄市而宋新及按察使方册等十人俱坐斬遇赦謫驛丞天順初復官論者謂華所建置未為過澄文顯罪不至死武將不能滅賊反罪文吏華文顯至與叛逆同科失刑實由王振云華吳縣人文顯浙江建德人澄仁和人王得仁名仁以字行新建人本謝姓父避讐外家因冒王氏得仁五歲喪母哀號如成人初為衛吏以才薦授汀州府經歷廉能勤敏上下愛之秩滿當遷軍民數千人乞留詔增秩再任居三年推官缺英宗從軍民請就令遷擢數辨冤獄却饋遺抑鎮守內臣苛索政績益著沙縣賊陳政景故鄧茂七黨也糾清流賊藍得隆等攻城得仁與守將及知府劉能擊敗之擒政景等八十四人餘賊驚潰諸將議窮搜得仁恐濫及百姓下令招撫辨釋難民三百人都指揮馬雄得通賊者姓名將按籍行戮得仁力請焚其籍賊復寇寧化率兵往援斬首甚衆民多自拔歸賊勢益衰賊退屯將樂得仁將追滅之俄遘疾衆欲輿歸就醫得仁不可曰吾一動賊必長驅乃起坐帳中諭將吏戮力平賊遂卒時正統十四年夏也軍民哀慟喪還哭奠者道路相屬多繪像祀之天順末吏民乞建祠有司為請詔如廣東楊信民故事春秋致祭子一夔天順四年舉進士第一授修撰進左諭德成化七年彗星見應詔陳五事請正宮闈親大臣開言路慎刑獄戒妄費語極剴摯被旨切責纍遷工部尚書卒贈太子少保正德中諡文莊葉禎字夢吉高要人舉於鄉授潯州府同知補鳳翔調慶遠兩廣瑤賊𧔧起列郡咸被害將吏率縮朒觀望禎誓不與賊俱生募健兒日訓練洞酋韋父強數敗官軍禎生縶之其黨忿悉衆攻城旗山守將擁兵不救禎率健兒出戰賊却去旋躡禎戰相當禎子公榮殲焉頃之賊圍雞刺諸村禎率三百人趨赴道遇賊人頭山下鏖戰禎被數鎗手刃賊一人與從子官慶及三百人皆死時天順三年正月晦也嶺南素無雪是夜大雷電雪深尺許賊釋圍去諸村獲全事聞贈朝列大夫廣西參議守臣為立廟祀之伍驥字德良安福人景泰五年進士授御史莊重寡言笑見義敢為天順七年巡按福建先是上杭賊起都指揮僉事丁泉汶上人善捍禦賊屢攻城皆為所却已而賊轉熾驥聞立馳入汀州調援兵四集驥單騎詣賊壘賊不意御史猝至皆擐甲露刃驥從容立馬諭以禍福賊見其至誠感悟泣下歸附者千七百餘戶給以牛種俾復故業惟賊首李宗政負固不服遂與泉深入破之泉力戰為賊所害驥弔死恤傷激以忠義復與賊戰連破十八寨俘斬八百餘人四境悉平而驥冒瘴癘成疾班師至上杭卒軍民哀之如父母旦夕臨者數千人爭出財立祠成化中以知縣蕭宏請詔與泉並祀賜祠名褒忠毛吉字宗吉餘姚人景泰五年進士除刑部廣東司主事司轄錦衣衛衛卒伺百官陰事以片紙入奏即獲罪公卿大夫莫不惴恐公行請屬狎侮官司即以罪下刑部者亦莫敢捶撻吉獨執法不撓有犯必重懲之其長門達怙寵肆虐百官道遇率避馬吉獨舉鞭拱手過達怒甚吉以疾失朝下錦衣獄達大喜簡健卒用巨梃搒之肉潰見骨不死天順五年擢廣東僉事分巡惠潮二府痛抑豪右民大悅及期當代相率籲留之程鄉賊楊輝者故劇賊羅劉寧黨也已撫復叛與其黨曾玉謝瑩分據寶龍石坑諸洞攻陷江西安遠剽閩廣間已欲攻程鄉吉先其未至募壯士合官軍得七百人抵賊巢先破石坑斬玉次擊瑩馘之復生擒輝諸洞悉破凡俘斬千四百人捷聞憲宗進吉副使璽書嘉勞移巡高雷廉三府時民遭賊躪數百里無人煙諸將悉閉城自守或以賊告反被撻有自賊中逸歸者輒誣以通賊撲殺之吉不勝憤以平賊為己任按部雷州海康知縣王騏雲南太和人也日以義激其民賊至輒奮擊吉壯其勇節奬勵之適報賊掠鄉聚吉與騏各率所部擊敗之薦騏遷雷州通判未聞命戰死贈同知蔭其子為國子生成化元年二月新會告急吉率指揮閻華掌縣事同知陶魯合軍萬人至大磴破賊乘勝追至雲岫山去賊營十餘里時已乙夜召諸將分三哨黎明進兵會陰晦衆失期及進戰賊棄營走上山吉命潘百戶者據其營衆競取財物賊馳下殺百戶華亦馬躓為賊所殺諸軍遂潰吉勒馬大呼止軍吏勸吉避吉曰衆多殺傷我獨生可乎言未已賊持鎗趨吉吉且罵且戰手劍一人斷其臂力絀遂被害是日雷雨大作山谷皆震動又八日始得尸貌如生事聞贈按察使録其子科入國子監尋登進士終雲南副使方吉出軍時賫千金犒委驛丞余文司出入已用十之三吉既死文憫其家貧以所餘金授吉僕使持歸治喪是夜僕婦忽坐中堂作吉語顧左右曰請夏憲長來舉家大驚走告按察使夏塤塤至起揖曰吉受國恩不幸死於賊今余文以所遺官銀付吉家雖無文簿可考吉負垢地下矣願亟還官毋污我言畢仆地頃之始蘇於是歸金於官吉死時年四十後賜諡忠襄林錦字彥章連江人景泰初由鄉貢授合浦訓導瑤寇充斥內外無備錦條具方略悉中機宜巡撫葉盛異之檄署靈山縣事城毀於賊錦因形便為柵以守廣設戰具賊不敢逼滿秩去官民曰公去賊復至誰禦者悉逃入山盛以狀聞詔即以錦為知縣馳驛之官民復來歸適歲飢諸瑤益剽掠無虛日錦單騎詣壘曉以禍福瑤感悟附縣二十五部咸聽命其不服者則討之天順六年破賊羅禾水再破之黃薑嶺又大破之新莊先後斬獲千餘級還所掠人口賊悉平乃去柵築土城盛及監司屢薦其才成化改元會廉州為賊所陷乃以錦為試知府歲復大飢賊四出劫掠錦諭散千餘人誅梗化者而綏輯其流移境內悉平四年上官交薦請改授憲職令專備欽廉羣盜乃以為按察使僉事益勤於政十年賜敕旌異久之進副使錦以所部屢有盜警思為經久計乃設團河營於西設新寮營於南而別設洪崖營以杜諸寇出沒路易靈山土城更築高墉亙五百丈卒為巖邑十四年兵部上其撫輯功被賚錦在兵間以教化為務靈山尚鬼則禁淫祠修學校勸農桑其治廉欽皆飭學宮振起文教為人誠實洞見肺腑瑤蠻莫不愛信其行軍與士卒同甘苦有功輒推以與人以故士多效死所在祠祀郭緒字繼業太康人成化十七年進士使楚府却其饋授戶部主事督餉二十萬於陝西給軍主者以羡告悉還之歷遷雲南參議初孟密宣撫司之設也實割木邦宣慰司地既而孟密思揲復於界外侵木邦地二十七所屢諭之還不聽乃調孟養宣撫思祿兵脅之思揲始還所侵地然多殺孟養兵思祿讐之發兵越金沙江奪木邦故割孟密地十有三所兩酋搆怨不已巡撫陳金承詔遣緒與副使曹玉往諭之旬餘抵金齒參將盧和先統軍距所據地二程而舍遣官馳驛往諭皆留不報和懼還軍至干崖遇緒語故戒勿進緒不可玉以疾辭緒遂單騎從數人行旬日至南甸峻險不可騎乃斬棘徒步引繩以登又旬日至一大澤土官以象輿來緒乘之往行毒霧中泥沙踸踔又旬日至孟賴去金沙江僅二舍手自為檄使持過江諭以朝廷招徠意蠻人相顧驚曰中國使竟至此乎發兵率象馬數萬夜渡江持長槊徑弩環之數重從行者懼請勿進緒拔刀叱曰明日必渡江敢阻者斬思祿既得檄見譬曉禍福甚備又聞至者才數人乃遣酋長來聽令且致饋緒却之出敕諭宣示思祿亦繼至緒先其勞次白其冤狀然後責其叛諸酋聞咸俯伏呼萬歲請歸侵地緒詰前所留使人乃盡出而歸之和及玉聞報馳至則已歸地納款矣時弘治十四年五月也越三年擢緒四川督儲參政武宗即位始以雲南功加俸一級明年致仕歸薑昂字俯太倉人成化八年進士除棗強知縣授御史偕同官劾方士李孜省杖午門外以母老乞改南尋出為河南知府吏白事畢退闔門讀書鞭箠懸不用藩府人有犯立決遣之改知寧波擢福建參政請終養歸服闋而卒昂在官日市少肉供母而自食菜茹子弟學書不聽用官紙筆家居室不蔽風雨子龍字夢賓正德三年進士歷禮部郎中武宗南巡率同官諫罰跪五日杖幾死出為建寧同知尋遷雲南副使備兵瀾滄姚安滇故盜藪龍讓土酋曰爾世官縱盜寧非賄乎酋懼撫諭羣盜悉聽命巨盜方定者既降而貧為妻妾所詬卒不忍負龍竟仰藥死南安大盜千人御史欲徵兵龍檄三日散盡四川鹽井剌馬仁雲南曬江和歌仲讐殺數十年龍撫諭遂解大候州土官猛國恃險肆暴龍擒之在滇四年番漢大治鄧川州立三正人祠祀袁州郭紳莆田林俊及龍贊曰陶成陳敏諸人以監司守令著征剿功而成及毛吉葉禎身死王事勞烈顯著亦可以愧戎帥之畏懦蹜者矣林錦威能臨制材足綏懷邊疆皆得斯人何憂不治郭緒單騎入險諭服兩酋令當洪永間亦何至尚淹常調哉平世秉國者多抑邊功謂恐生事然大帥倚內援録又多踰等適足以長武夫玩寇之心而無以奬勞臣致死之節國家以賞罰馭世曷可不公乎
