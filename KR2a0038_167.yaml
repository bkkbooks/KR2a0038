body:
  text: 明史卷一百六十七列傳第五十五曹鼐張益鄺野王佐丁鉉等孫祥謝澤袁彬哈銘袁敏曹鼐字萬鍾寧晉人少伉爽有大志事繼母以孝聞宣德初由鄉舉授代州訓導願授別職改泰和縣典史七年督工匠至京師疏乞入試復中順天鄉試明年舉進士一甲第一賜宴禮部進士宴禮部自鼐始入翰林為修撰正統元年充經筵講官宣宗實録成進侍講錫三品章服五年以楊榮楊士奇薦入直文淵閣參預機務鼐為人內剛外和通達政體榮既歿士奇常病不視事閣務多決於鼐帝以為賢進翰林學士十年進吏部左侍郎兼學士十四年七月也先入寇中官王振挾帝親征朝臣交章諫不聽鼐與張益以閣臣扈從未至大同士卒已乏糧宋瑛朱冕全軍沒諸臣請班師振不許趣諸軍進大將朱勇膝行聽命尚書鄺野王佐跪草中至暮不得請欽天監正彭德清言天象示警若前恐危乘輿振詈曰爾何知若有此亦天命也鼐曰臣子固不足惜主上繫天下安危豈可輕進振終不從前驅敗報踵至始懼欲還定襄侯郭登言於鼐益曰自此趨紫荊裁四十餘里駕宜從紫荊入振欲邀帝至蔚州幸其第不聽復折而東趨居庸八月辛酉次土木地高掘地二丈不及水瓦剌大至據南河明日佯却且遣使通和帝召鼐草詔答之振遽令移營就水行亂寇騎蹂陳入帝突圍不得出擁以去鼐益等俱及於難景帝立贈鼐少傅吏部尚書文淵閣大學士諡文襄官其子恩大理評事英宗復位加贈太傅改諡文忠復官其孫榮錦衣百戶鼐弟鼎進士歷吏科都給事中張益字士謙江寧人永樂十三年進士由庶吉士授中書舍人改大理評事與修宣宗實録成改修撰博學強記詩文操筆立就三楊雅重之尋進侍讀學士正統十四年入文淵閣未三月遽蒙難以歿景帝立贈學士諡文僖曾孫琮進士嘉靖初歷官南京右都御史鄺野字孟質宜章人永樂九年進士授監察御史成祖在北京或奏南京鈔法為豪民沮壞帝遣野廉視衆謂將起大獄野執一二市豪歸奏曰市人聞令震懼鈔法通矣事遂已倭犯遼東戍守失律者百餘人皆應死命野按問具言可矜狀帝為宥之營造北京執役者巨萬命野稽省病者多不死十六年有言秦民羣聚謀不軌者擢野陝西按察副使敕以便宜調兵剿捕野白其誣詔誅妄言者宣德四年振關中饑在陝久刑政清簡父憂服除擢應天府尹蠲苛急政市征田稅皆酌其平正統元年進兵部右侍郎明年尚書王驥出督軍野獨任部事時邊陲多警將帥乏人野請令中外博舉謀略材武士以備任使六年山東災野請寬民間孳牧馬賠償之令以蘇其力十年進尚書舊例諸衛自百戶以下當代者必就試京師道遠無資者終身不得代野請就令各都司試之人以為便瓦剌也先勢盛野請為備又與廷臣議上方略請增大同兵擇智謀大臣巡視西北邊務尋又請罷京營兵修城之役令休息以備緩急時不能用也先入寇王振主親征不與外廷議可否詔下野上疏言也先入犯一邊將足制之陛下為宗廟社稷主奈何不自重不聽既扈駕出關力請回鑾振怒令與戶部尚書王佐皆隨大營野墜馬幾殆或勸留懷來城就醫野曰至尊在行敢託疾自便乎車駕次宣府朱勇敗沒野請疾驅入關嚴兵為殿不報又詣行在申請振怒曰腐儒安知兵事再言者死野曰我為社稷生靈言何懼振叱左右扶出野與佐對泣帳中明日師覆野死年六十五野為人勤廉端謹性至孝父子輔為句容教官教野甚嚴野在陝久思一見父乃謀聘父為鄉試考官父怒曰子居憲司而父為考官何以防間馳書責之野又嘗寄父褐復貽書責曰汝掌刑名當洗冤釋滯以無忝任使何從得此褐乃以污我封還之野奉書跪誦泣受教景泰初贈野少保官其子儀為主事成化初諡忠肅王佐海豐人永樂中舉於鄉卒業太學以學行聞擢吏科給事中器宇凝重奏對詳雅為宣宗所簡注宣德二年超拜戶部右侍郎以太倉臨清德州淮徐諸倉多積弊敕佐巡視平江伯陳瑄言漕卒十二萬人歲漕艱苦乞僉南方民如軍數更番轉運詔佐就瑄及黃福議之佐還奏東南民力已困議遂寢受命治通州至直沽河道已赴宣府議屯田事宜英宗初立出鎮河南奏言軍衛收納稅糧奸弊百出請變其制廷議自邊衛外皆改隸有司尋召還命督理甘肅軍餉正統元年理長蘆鹽課三年提督京師及通州倉場所至事無不辦六年尚書劉中敷得罪召理部事尋進尚書十一年承詔訊安鄉伯張安兄弟爭祿事坐與法司相諉被劾下吏獲釋時軍旅四出耗費動以巨萬府庫空虛佐從容調劑節縮有方在戶部久不為赫赫名而寬厚有度政務糾紛未嘗廢學人稱其君子土木之變與鄺野丁鉉王永和鄧棨同死難贈少保官其子道戶部主事成化初諡忠簡丁鉉字用濟豐城人永樂中進士授太常博士歷工刑吏三部員外郎進刑部郎中正統三年超拜刑部侍郎九年出理四川茶課奏減其常數以俟豐歲振饑江淮及山東河南民咸賴之平居恂恂若無能臨事悉治辦從征歿贈刑部尚書官其子琥大理評事後諡襄愍王永和字以正崑山人少至孝父病伏枕十八年侍湯藥無少懈永樂中舉於鄉歷嚴州饒州訓導以蹇義薦為兵科給事中嘗劾都督王彧鎮薊州縱寇及錦衣馬順不法事持節冊韓世子妃糾中官蹇傲罪以徑直聞正統六年進都給事中八年擢工部右侍郎從征歿贈工部尚書官其子汝賢大理評事後諡襄敏鄧棨字孟擴南城人永樂末年進士授監察御史奉敕巡按蘇松諸府期滿將代去父老赴闕乞留得請旋以憂去宣德十年陝西闕按察使詔廷臣舉清慎有威望者楊士奇薦棨遂以命之正統十年入為右副都御史北征扈從師出居庸關疏請回鑾以兵事專屬大將至宣府大同復再上章皆不報及遇變同行者語曰吾輩可自脫去棨曰鑾輿失所我尚何歸主辱臣死分也遂死贈右都御史官其子瑺大理評事後諡襄敏英宗之出也備文武百官以行六師覆於土木將相大臣及從官死者不可勝數英國公張輔及諸侯伯自有傳其餘姓氏可考者卿寺則龔全安黃養正戴慶祖王一居劉容淩壽給事御史則包良佐姚銑鮑輝張洪黃裳魏貞夏誠申祐尹竑童存德孫慶林祥鳳庶寮則齊汪馮學明王健程思溫程式逯端俞鑑張瑭鄭瑄俞拱潘澄錢昺馬預尹昌羅如墉劉信李恭石玉景帝立既贈恤諸大臣自給事御史以下皆降敕褒美録其子為國子生一時恤典綦備云龔全安蘭溪人進士授工科給事中纍遷左通政歿贈通政使黃養正名蒙以字行瑞安人以善書授中書舍人纍官太常少卿歿贈太常卿戴慶祖溧陽人王一居上元人俱樂舞生纍官太常少卿歿俱贈太常卿包良佐字克忠慈溪人進士授吏科給事中鮑輝字淑大浙江平陽人進士授工科給事中數有建白張洪安福人黃裳字元吉曲江人俱進士授御史裳嘗言寧紹台三府疫死三萬人死者宜蠲租存者宜振恤巡視兩浙鹽政請恤水災報可魏貞懷遠人進士官御史申祐字天錫貴州婺川人父為虎齧祐持梃奮擊之得免舉於鄉入國學帥諸生救祭酒李時勉旋登進士拜四川道御史以謇諤聞尹竑字太和巴人童存德字居敬蘭溪人俱進士官御史林祥鳳字鳴皋莆田人由鄉舉授訓導擢御史齊汪字源澄天台人以進士歷兵部車駕司郎中程思溫婺源人程式常熟人逯端仁和人俱進士官員外郎俞鑑字元吉桐廬人以進士授兵部職方司主事駕北征郎中胡寧當從以病求代鑑慷慨許諾或曰家遠子幼奈何鑑曰為國臣子敢計身家尚書鄺野知其賢數與計事鑑曰惟力勸班師耳時不能用張瑭字廷玉慈溪人進士授刑部主事尹昌吉水人進士官行人司正羅如墉字本崇廬陵人進士授行人從北征瀕行訣妻子誓以死報國屬翰林劉儼銘其墓儼驚拒之如墉笑曰行當驗耳後數日果死劉容太僕少卿淩壽尚寶少卿夏誠孫慶皆御史馮學明郎中王健員外郎俞拱潘澄錢昺皆中書舍人馬預大理寺副劉信夏官正李恭石玉序班里居悉無考孫祥大同人正統十年進士授兵科給事中擢右副都御史守備紫荊關也先逼關都指揮韓青戰死祥堅守四日也先由間道入夾攻之關破祥督兵巷戰兵潰被殺言官誤劾祥棄城遁寇退有司修關得其尸戰地焚而瘞之不以聞祥弟祺詣闕言冤詔恤其家成化改元録其子紳為大理寺右評事又謝澤者上虞人永樂十六年進士由南京刑部主事出為廣西參政正統末擢通政使守備白羊口王師敗於土木守邊者無固志澤與其子儼訣而行受事未數日也先兵大入守將呂鐸遁澤督兵扼山口大風揚沙不辨人馬或請移他關避敵澤不可寇至衆潰澤按劍厲聲叱賊遂被殺事聞遣官葬祭録儼為大理評事袁彬字文質江西新昌人正統末以錦衣校尉扈帝北征土木之變也先擁帝北去從官悉奔散獨彬隨侍不離左右也先之犯大同宣府逼京師皆奉帝以行上下山坂涉溪澗冒危險彬擁護不少懈帝駐蹕土城欲奉書皇太后貽景帝及諭羣臣以彬知書令代草帝既入沙漠所居止毳帳敝幃旁列一車一馬以備轉徙而已彬周旋患難未嘗違忤夜則與帝同寢天寒甚以脅溫帝足有哈銘者蒙古人幼從其父為通事至是亦侍帝帝宣諭也先及其部下嘗使銘也先輩有所陳請亦銘為轉達帝獨居檳廬南望悒鬱二人時進諧語慰帝帝亦為解顏中官喜寧為也先腹心也先嘗謂帝曰中朝若遣使來皇帝歸矣帝曰汝自送我則可欲中朝遣使徒費往返爾寧聞怒曰欲急歸者彬也必殺之寧勸也先西犯寧夏掠其馬直趨江表居帝南京彬銘謂帝曰天寒道遠陛下又不能騎空取凍飢且至彼而諸將不納奈何帝止寧計寧又欲殺二人皆帝力解而止也先將獻妹於帝彬請駕旋而後聘帝竟辭之也先惡彬銘二人欲殺者屢矣一日縛彬至曠野將支解之帝聞如失左右手急趨救乃免彬嘗中寒帝憂甚以身壓其背汗浹而愈帝居漠北期年視彬猶骨肉也及帝還京景帝僅授彬錦衣試百戶天順復辟擢指揮僉事尋進同知帝眷彬甚奏請無不從內閣商輅既罷彬乞得其居第既又以湫隘乞官為別建帝亦報從彬娶妻命外戚孫顯宗主之賜豫優渥時召入曲宴患難時事歡洽如故時其年十二月進指揮使與都指揮僉事王喜同掌衛事二人嘗受中官夏時囑私遣百戶季福偵事江西福者帝乳媼夫也詔問誰所遣二人請罪帝曰此必有主使者遂下福吏得二人受囑狀所司請治時及二人罪帝宥時二人贖徒還職而詔自今受囑遣官者必殺無赦已而坐失囚喜解職彬遂掌衛事五年秋以平曹欽功進都指揮僉事時門達恃帝寵勢傾朝野廷臣多下之彬獨不為屈達誣以罪請逮治帝欲法行語之曰任汝往治但以活袁彬還我達遂鍛鍊成獄賴漆工楊塤訟冤獄得解然猶調南京錦衣衛帶俸閒住語詳達傳越二月英宗崩達得罪貶官都勻召彬復原職仍掌衛事未幾達徵下獄充軍南丹彬餞之於郊餽以贐成化初進都指揮同知久之進都指揮使先是掌錦衣衛者率張權勢罔財賄彬任職久行事安靜十三年擢都督僉事涖前軍都督府卒於官世襲錦衣僉事哈銘從帝還賜姓名楊銘歷官錦衣指揮使數奉使外蕃為通事孝宗嗣位汰傳奉官銘以塞外侍衛功獨如故以壽卒於官袁敏者金齒衛知事也英宗北征應募從至大同及駕還駐萬全左衛敏見敵騎逼請留精兵三四萬人扼其衝而車駕疾驅入關王振不納六師遂覆敏跳還上書景帝曰上皇曩居九重所服者袞繡所食者珍羞所居者瓊宮瑤室今駕陷沙漠服有袞繡乎食有珍羞乎居有宮室乎臣聞之主辱臣死上皇辱至此臣子何以為心臣不惜碎首刳心乞遣官一人或就令臣齎書及服御物問安塞外以盡臣子之義臣雖萬死心實甘之命禮部議竟報寢贊曰異哉土木之敗也寇非深入之師國非積弱之勢徒以宦豎竊柄狎寇弄兵逆衆心而驅之死地遂致六師撓敗乘輿播遷大臣百官身膏草野夫始之不能制其不出出不能使之早旋枕藉疆埸無益於敗然值倉皇奔潰之時主辱臣死志異偷生亦可無譏於傷勇矣
