body:
  text: 明史卷一百五十八列傳第四十六黃宗載顧佐邵陳勉賈諒嚴升段民吾紳章敞徐琦劉戩吳訥朱與言魏驥魯穆耿九疇軒輗陳復黃孔昭黃宗載一名垕字厚夫豐城人洪武三十年進士授行人奉使四方未嘗受餽遺纍遷司正永樂初以薦為湖廣按察司僉事巨姦宿猾多謫戍銅鼓五開間陰持官吏短長宗載榜數其罪曰不改必置之法衆莫敢犯武陵多戎籍民家慮與為婚姻徭賦將纍己男女至年四十尚不婚宗載以理諭之皆解悟一時婚者三百餘家鄰邑效之其俗遂變徵詣文淵閣修永樂大典書成受賜還任董造海運巨艦數十艘事辦而民不擾車駕北征徵兵湖廣使者貪暴失期宗載坐不舉劾謫楊青驛驛夫尋起御史出按交址時交址新定州縣官多用兩廣雲南舉人及歲貢生員之願仕遠方者皆不善撫字宗載因言有司率不稱職若俟九年黜陟恐益廢弛請任二年以上者巡按御史及兩司核實舉按以聞帝是之及歸行李蕭然不攜交址一物尚書黃福語人曰吾居此久所接御史多矣惟宗載知大體丁祖母憂起復改詹事府丞洪熙元年擢行在吏部侍郎少師蹇義領部事宗載一輔以正宣德元年奉命清軍浙江三年督採木湖湘英宗初以侍郎羅汝敬巡撫陝西坐事戴罪辦事汝敬妄引詔書復職而吏部不言為御史所劾宗載及尚書郭璡俱下獄未幾得釋遷南京吏部尚書居九年乞休章四上乃許九年七月卒於家年七十九宗載持廉守正不矯不隨學問文章俱負時望公卿大夫齒德之盛推宗載云顧佐字禮卿太康人建文二年進士除莊浪知縣端陽日守將集官僚校射以佐文士難之持弓矢一發而中守將大服永樂初入為御史七年成祖在北京命吏部選御史之才者赴行在佐預焉奉命招慶遠蠻督採木四川從北征巡視關隘遷江西按察副使召為應天尹剛直不撓吏民畏服人比之包孝肅北京建改尹順天權貴人多不便之出為貴州按察使洪熙元年召為通政使宣德三年都御史劉觀以貪被黜大學士楊士奇楊榮薦佐公廉有威歷官並著風采為京尹政清弊革帝喜立擢右都御史賜敕奬勉命察諸御史不稱者黜之御史有缺舉送吏部補選佐視事即奏黜嚴暟楊居正等二十人謫遼東各衛為吏降八人罷三人而舉進士鄧棨國子生程富謁選知縣孔文英教官方瑞等四十餘人堪任御史帝使歷政三月而後任之居正等六人辨訴帝怒並諸為吏者悉戍之既而暟自戍所潛還京脅他賄為佐所奏且言暟謀害己詔戮暟於市帝北巡命偕尚書張本等居守還復賜敕令約束諸御史於是糾黜貪縱朝綱肅然居歲餘姦吏奏佐受隸金私遣歸帝密示士奇曰爾不嘗舉佐廉乎對曰中朝官俸薄僕馬薪芻資之隸遣隸半使出資免役隸得歸耕官得資費中朝官皆然臣亦然先帝知之故增中朝官俸帝歎曰朝臣貧如此因怒訴者曰朕方用佐小人敢誣之必下法司治士奇對曰細事不足干上怒帝乃以吏狀付佐曰汝自治之佐頓首謝召吏言上命我治汝汝改行吾當貸汝帝聞之益喜謂佐得大體或告佐不理冤訴帝曰此必重囚教之命法司會鞫果千戶臧清殺無罪三人當死使人誣佐帝曰不誅清則佐法不行磔清於市八年秋佐有疾乞歸不許以南京右都御史熊概代理其事踰年而概卒佐疾良已入見帝慰勞之令免朝賀視事如故正統初考察御史不稱者十五人降黜之邵宗九載滿吏部已考稱亦與焉宗奏辨尚書郭璡亦言宗不應與在任者同考帝遂責佐而御史張鵬等復劾宗微過帝以鵬朋欺並切責佐佐上章致仕去賜敕奬慰賚鈔五十貫命戶部其家十一年九月卒佐孝友操履清白性嚴毅每旦趨朝小憩外廬立雙藤戶外百僚過者皆折旋避之入內直廬獨處小夾室非議政不與諸司羣坐人稱為顧獨坐云然持法深論者以為病時雩都陳勉嶧縣賈諒先後為副都御史與佐同舉臺職而蘭溪邵官南京與佐齊名繁昌嚴升名亦亞於字以先永樂中進士授御史仁宗監國知其廉直每法司缺官即命署有重獄輒付之歷仕中外所過人不敢犯宣德三年由福建按察使入為南京左副都御史奏黜御史不職者十三人簡黜諸司庸懦不肖者八十餘人風紀大振居二年以疾卒官負氣好侮同列治獄頗刻深然持身廉潔內行修事母以孝聞陳勉與同年進士仁宗初以楊士奇薦由廣東副使擢左副都御史信豐諸縣盜起命勉撫之招徠三千六百餘人亂遂定景泰初仕至南京右都御史掌院事致仕卒勉外和內剛精通法律吏不敢欺賈諒字子信永樂中由鄉舉入太學選侍皇太孫説書擢刑科給事中宣德四年劾清軍侍郎金庠受賄罷之郎中胡王玉蕭翔等十一人御史方鼎三人以不職被劾帝未信命諒及張居傑密察之得實悉貶官明年又劾陽武侯薛祿朋比不敬廷中肅然尋拜右副都御史偕錦衣指揮王裕參議黃翰中官張義等巡視四川江西湖廣按治豪強不少假正統二年江北河南大水命諒及工部侍郎鄭辰往振芒碭山盜為患諒捕獲甚衆四年還至德州卒諒內行修當官有風采嚴升建文時進士歷官大理寺右少卿清軍蘇松執法不撓調南京僉都御史與同心治事剛果自信嘗著神羊賦以見志焉段民字時舉武進人永樂二年進士選庶吉士與章敞吾紳輩俱讀書文淵閣又俱授刑部主事民旋進郎中山東妖婦唐賽兒作亂三司官坐縱寇誅擢民左參政當是時索賽兒急盡逮山東北京尼及天下出家婦女先後幾萬人民力為矜宥人情始安車駕北征餉舟由濟寧達潞河陸挽出居庸至塞外民深計曲算下不擾而事集既還敕與巡按御史考所過府縣吏廉墨以聞宣德三年召入京命署南京戶部右侍郎踰年實授又明年改刑部初二部皆以不治聞民至紀綱修舉宿弊以革上元人有為姪毆者憤甚詣通政司告時方令納米贖罪而越訴禁甚嚴犯者戍遼東民上言依定例卑幼之罪得贖而尊長反遠竄揆於理有未安請更擬帝是之帝以民廉介端謹特賜敕令考察南京百官八年詔書罪囚自十惡外並減一等有重囚三十餘人例不得赦民亦減其罪後有旨報決乃復追還而逃已數人民自陳狀給事中年富等劾民帝知民賢不問九年二月卒於官年五十九貧不能殮都御史吳訥裞以衣衾帝聞命有司營葬成化間葉盛請褒恤不果其後百有餘年始追諡襄介吾紳字叔縉衢州人官刑部主事治獄有聲歷郎中拜禮部侍郎成祖謂呂震曰紳出自翰林可佐卿典禮矣既而為震所擠出為廣東參政尋召為南京刑部侍郎奉敕考察兩廣福建方面官有故人官參政素貪黷權要多為之地紳至竟黜之時稱其公復改禮部正統六年卒於官紳清強有執淡於榮利初拜侍郎賀者畢集而一室蕭然了無供具衆笑而起章敞字尚文會稽人由庶吉士授刑部主事山西盜發捕逮數百人敞察其冤留詞色異者一人餘悉遣出明日訊之留者盜餘非也遷郎中改吏部宣德六年擢禮部侍郎偕徐琦使安南命黎利權國事利遣人白相見禮敞曰汝敬使者所以尊朝廷奚白為利聽命趨拜下坐噉以聲色不為動還致厚贐不受利以付貢使及關悉閲貢物封其贐付關吏利死子麟嗣敞復奉詔往却贐如初正統初纂洪武以來條格使諸司參酌吏無能為姦尚書胡濙寬大敞佐以嚴肅二年十二月卒子瑾亦纍官至禮部侍郎徐琦字良玉先世錢塘人其祖謫戍寧夏遂家焉幼力學通經史永樂十三年舉進士授行人歷兵部員外郎明敏有斷居官務持大體宣德六年擢右通政副敞使安南亦不受餽還拜南京兵部右侍郎八年帝以安南貢賦不如額南征士卒未盡返命琦復往時黎利已死其子麟疑未決琦曉以禍福麟懼鑄代身金人貢方物以謝帝悅命落琦戍籍宴賚甚厚正統初與工部侍郎鄭辰考察南畿有司黜不法者三十人時災異屢見琦陳弭災十事悉嘉納五年命參贊南京機務十四年進尚書參贊如故有言往年分調南京軍家屬悉宜北徙朝議欲行之琦奏安土重遷人之情也今驟徙數萬衆人心一搖事或叵測事得寢軍衛無學校琦請天下衛所視府州縣例皆立學從之景泰元年靖遠伯王驥贊機務琦專理部事驥解任琦仍參贊四年三月卒年六十八諡貞襄敞琦皆以使安南不辱命著稱安南多寶貨後使者率從水道挾估客往以為利交人頗輕之弘治時侍講劉戩往頒詔由南寧乘傳抵其國交人大驚戩依舊制受陪臣拜謁不交一語越宿即行餽遺一無所受使人要於途固致之卒麾去與敞琦皆為交人所重戩字景元安福人吳訥字敏德常熟人父遵任沅陵簿坐事繫京師訥上書乞身代事未白而父歿訥感奮力學永樂中以醫薦至京仁宗監國聞其名命教功臣子弟成祖召對稱旨俾日侍禁廷備顧問洪熙元年侍講學士沈度薦訥經明行修授監察御史敬慎廉直不務矯飾宣德初出按浙江以振風紀植綱常為務時軍犯逃者往往令家人妄訴逮繫至千人訥請嚴禁即冤不得越告從之繼按貴州恩威並行蠻人畏服將代還部民詣闕乞留不許五年七月進南京右僉都御史尋進左副都御史正統初光祿丞董正等盜官物訥發之謫戍四十四人右通政李畛者奉使蘇松行事多不謹訥微誡之畛不悅誣訥稽延詔書等事訥疏辨互為臺省所劾俱逮下獄既而釋之英宗初御經筵録所輯小學集解上之四年三月以老致仕以朱與言代訥博覽議論有根柢於性理之奧多有發明所著書皆可垂於後歸家布衣蔬食環堵蕭然周忱撫江南欲新其居不可家居十六年而卒年八十六諡文恪鄉人祀之言偃祠朱與言字一鶚萬安人永樂九年進士授湖廣按察僉事宣德中遷四川副使合州盜起督吏目熊鼎斬六十餘人賊勢遂衰事聞擢鼎合州同知雅州妖人為亂與言執送京師境內以寧正統元年召為南京右副都御史入代訥領院事年老致仕卒與言剛方廉慎為政務大體數建白多切時弊家居門庭清肅鄉人有不善惟恐與言知之魏驥字仲房蕭山人永樂中以進士副榜授松江訓導常夜分攜茗粥勞諸生諸生感奮多成就者召修永樂大典書成還任用師逵薦遷太常博士帝謂曰劉履節為御史九年高皇帝方授是官不輕豫人也宣德初遷吏部考功員外郎歷南京太常寺少卿正統三年召試行在吏部左侍郎踰年實授屢命巡視畿甸遺蝗問民疾苦八年改禮部尋以老請致仕吏部尚書王直言驥未衰如念其老宜令去繁就簡乃改南京吏部復以老辭不允十四年進尚書英宗北狩驥率諸司條上時務多施行景泰元年年七十七致仕驥居官務大體在太常山川壇獲雙白兔圻內生瑞麥皆却不進在吏部有進士未終制求考功同官將許之驥持不可法司旱恤刑有王綱者惡逆當辟或憫其少欲緩之驥曰此婦人之仁天道不時正此故也獄決而雨正統中王振怙寵凌公卿獨嚴重驥呼先生景泰初以請老至京師大學士陳循驥門生也請間曰公雖位冢宰然未嘗立朝願少待事在循輩驥正色曰君為輔臣當為天下進賢才不得私一座主退語人曰渠以朝廷事為一己事安得善終竟致仕去驥端厚祗慎顧徑直好別白君子小人曰無是非之心非人也家居憂國憂民老而彌篤蕭山故多水患有宋時縣令楊時湖隄遺迹驥倡修螺山石巖畢公諸塘堰捍江潮興湖利鄉人賴之居布衣糲食不殖生産事兄教諭騏雖耄益恭時戴笠行田間嘗遇錢塘主簿隸訶之答曰蕭山魏驥也主簿倉皇謝慰而去成化七年御史梁昉言臣先任蕭山見致仕尚書臣魏驥里居與里人稠處教子孫孝弟力田增隄濬湖捍禦災患所行動應禮法倡理學勗後進雖在林野有補治化驥生平學行醇篤心術正大諳世事瞭國體致仕二十餘年年九十八歲四方仰德有如卿雲百年化育滋此人瑞臣讀前史有以歸老賜祿畢其身者有尊養三老五更者有安車蒲輪召者有賜几杖者上齒德也驥齒德有餘爵在上卿可稱達尊乞下所司酌前代故事施行帝覽奏嘉歎遣行人存問賜羊酒命有司月給米三石使命未至而驥卒賜祭葬如禮諡文靖其子完以驥遺言詣闕辭葬乞以其金振飢民帝憮然曰驥臨終遺命猶恐勞民可謂純臣矣許之蕭山民德驥不已詣闕請祀於德惠祠以配楊時制曰可魯穆字希文天台人永樂四年進士家居褐衣蔬食足迹不入州府比謁選有司餽之贐穆曰吾方從仕未能利物乃先厲州里乎弗受除御史仁宗監國屢上封事漢王官校多不法人莫敢言穆上章劾之不報然直聲振朝廷遷福建僉事理冤濫摧豪強泉州人李某調官廣西其姻富民林某遣僕鴆李於道而室其妻李之宗人訴於官所司納林賂坐訴者繫獄久穆廉得其實立正林罪漳民周允文無子以姪為後晚而妾生子因析産與姪屬以妾子允文死姪言兒非叔子逐去盡奪其資妾訴之穆召縣父老及周宗族密置妾子羣兒中咸指兒類允文遂歸其産民呼魯鐵面時楊榮當國家人犯法穆治之不少貸榮顧謂穆賢薦之朝英宗即位擢右僉都御史明年奉命捕蝗大名還以疾卒命給舟歸其喪始穆入為僉都御史所載不過囊衣尚書吳中贈以器用不受至是中為治棺衾乃克殯子崇志歷官應天尹廉直有父風耿九疇字禹範盧氏人永樂末進士宣德六年授禮科給事中議論持大體有清望正統初大臣言兩淮鹽政久壞宜得重名檢者治之於是推擇為鹽運司同知痛革宿弊條奏便宜五事著為令母喪去官場民數千人詢闕乞留十年正月起為都轉運使節儉無他好公退焚香讀書廉名益振婦孺皆知其名以事見誣逮下吏已得白即留為刑部右侍郎屢辨疑獄無所撓屈禮部侍郎章瑾下獄九疇及江淵等議貶其官瑾壻給事中王汝霖銜之與同官葉盛張固林聰等論刑部不公九疇淵遂劾盛等且言汝霖父永和死土木嬉笑自如不宜居職時景帝新立急於用人置汝霖等不問瑾如奏鳳陽歲凶盜且起敕往巡視招撫奏留英武飛熊諸衛軍耕守招來流民七萬戶境內以安兩淮自九疇去鹽政復弛景泰元年仍命兼理尋敕録諸府重囚多所平反十月命兼撫江北諸府三年三月代陳鎰鎮陝西都指揮楊得青等私役操卒九疇劾之詔按治且命諸邊如得青者具劾以聞邊將請增臨洮諸衛戍九疇言邊城士卒非乏將帥能嚴紀律賞罰明信則人人自奮不然徒冗食耳乃不增戍邊民春夏出作田秋冬輒徙入塞九疇言邊將所以禦寇衛民也今使民避寇失業安用將帥因禁民入徙有被寇者治守帥罪四年布政使許資言侍郎出鎮與巡按御史不相統事多拘滯請改授憲職便乃轉右副都御史大臣鎮守巡撫皆授都御史自九疇始有旨市羊角為燈九疇引宋蘇軾諫神宗買浙燈事事乃寢災異求言請帝延儒碩公賞罰擇守令簡將帥優詔報焉天順初議事京師帝顧侍臣曰九疇廉正人也留為右都御史罪人繫都察院獄者不給米九疇為言乃日給一升遂為令已上疏陳崇廉恥清刑獄勸農桑節軍賞重臺憲五事帝皆嘉納是年六月御史張鵬等劾石亨曹吉祥亨等謂九疇實使之遂並下獄謫江西布政使尋調四川明年禮部缺尚書帝問李賢賢曰老成清介無如九疇乃召還既至憐其老改南京刑部尚書四年卒諡清惠子裕自有傳軒輗字惟行鹿邑人永樂末年進士授行人司副宣德六年用薦改御史按福建剔蠹鋤姦風采甚峻正統元年清軍浙江劾不職官四十餘人五年言祖宗設御史官為職綦重今內外諸司有事多擅遣御史非制請禁之立報可是年超擢浙江按察使前使奢汰輗力矯之寒暑一青布袍補綴殆遍居常蔬食妻子親操井臼與僚屬約三日出俸錢市肉不得過一斤僚屬多不能堪故舊至食惟一豆或具雞黍則人驚以為異時鎮守內臣阮隨布政使孫原貞杭州知府陳復仁和知縣許璞居官皆廉一方大治溫處有銀場洪武間歲課僅二千八百餘兩永樂時增至八萬二千兩民不堪命帝即位以大臣議罷之至是參政俞士悅請復開謂利歸於上則礦盜自絶下三司議輗力持不可乃止既而給事中陳傅復請朝廷遽從之遂致葉宗留之變會稽趙伯泰宋苗裔也奏孝宗理宗及福王陵墓俱為豪民侵奪御史王琳謂福王降於元北去山陰安得墓伯泰不平復訴帝命輗及巡按御史歐陽澄覆按輗言福王蓋衣冠之藏伯泰言非誣詔戍豪民於邊停琳等俸遭親喪起復十三年奏陳四事俱切時弊帝悉從之景帝立以右副都御史鎮守浙江景泰元年命兼理兩浙鹽課閩賊吳金八等流劫青田諸縣輗與原貞討平之賊首羅丕廖寧八復自閩抵浙輗等防遏有功進秩一等明年改督南京糧儲五年復改左副都御史掌南院事考黜御史不職者數人天順元年二月召拜刑部尚書數月引疾乞歸帝召見問曰昔浙江廉使考滿歸行李僅一簏乃卿耶輗頓首謝賜白金慰遣之明年南京督理糧儲缺官帝問李賢大臣中誰曾居此職者賢以輗對且稱其廉乃命以左都御史往八年夏以老乞骸骨不待報徑歸抵家趣具浴欠伸而卒輗孤峭遇人無賢否拒不與接為按察使嘗飲同僚家歸撫其腹曰此中有贓物也在南都都御史張純置酒延客輗惡其汰不往徹饌遺之亦不納歲時詣禮部拜表慶賀屏居一室撤燭端坐事竣竟歸未嘗與僚友一語僚友聞其來亦輒避去不樂與之處量頗褊隘御史有訐人陰私者輒奬其能嘗令御史劾南京祭酒吳節節亦發輗私事衆頗不直輗然清操聞天下與耿九疇齊名語廉吏必曰軒耿陳復福建懷安人輗同年進士由戶部主事知杭州廉靜無私獄訟大省日端坐堂皇與曹掾講讀律令而已遭喪部民乞留詔起復未幾卒輗倡僚屬助之乃克斂吏民相率致賻其子盡却之稱貸歸黃孔昭黃巖人初名曜後以字行改字世顯年十四遭父母喪哀毀骨立舉天順四年進士授屯田主事奉使江南却餽弗受進都水員外郎成化五年文選郎中陳雲等為吏所訐盡下獄貶官尚書姚夔知孔昭廉調之文選九年進郎中故事選郎率閉門謝客孔昭曰國家用才猶富家積粟粟不素積豈足贍飢才不預儲安能濟用苟以深居絶客為高何由知天下才俊公退遇客至輒延見訪以人才書之於册除官以其才高下配地繁簡由是銓平允其以私干者悉拒之嘗與尚書尹旻爭至推案盛怒孔昭拱立俟其怒止復言之旻亦信其諒直旻昵通政談倫欲用為侍郎孔昭執不可旻卒用之倫果敗旻欲推故人為巡撫孔昭不應其人入都謁孔昭至屈膝孔昭益鄙之旻令推舉孔昭曰彼所少者大臣體耳旻謂其人曰黃君不離銓曹汝不能遷也為郎中滿九載始擢右通政久之遷南京工部右侍郎有官地十餘區為勢家所侵奏復之奉詔薦舉方面以知府樊瑩僉事章懋應後皆為名臣郎官主藏者以羡銀數千進斥退之掘地得古鼎急命工鐫文廟二字送之廟中俄中貴欲獻諸朝見鐫字而止孔昭嗜學敦行與陳選林鶚謝鐸友善並為士類所宗弘治四年卒嘉靖中贈禮部尚書諡文毅子俌亦舉進士為文選郎中俌子綰以議大禮至禮部尚書自有傳贊曰國家盛時士大夫多以廉節自重豈刻意勵行好為矯飾名譽哉亦其淡嗜欲恥營競介特之性然也仁宣之際懲吏道貪墨登進公廉剛正之士宗載佐銓衡顧佐掌邦憲風紀為之一清段民吳訥魏驥魯穆皭然秉羔羊素絲之節軒耿孔昭矯厲絶俗物不能干章敞徐琦劉戩律己嚴正異域傾心廉之足尚也卓矣
