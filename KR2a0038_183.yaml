body:
  text: 明史卷一百八十三列傳第七十一何喬新彭韶周經耿裕倪嶽閔圭戴珊何喬新字廷秀江西廣昌人父文淵永樂十六年進士授御史歷按山東四川烏蒙奸民什伽私其知府祿昭妻懼誅誣昭反詔發軍討文淵檄止所調軍而白其誣宣德五年用顧佐薦賜敕知溫州府居六年治最增俸賜璽書以胡濙薦擢刑部右侍郎督兩淮鹽課正統三年兩議獄不當與尚書魏源下獄皆得釋朝議征麓川文淵疏諫曰麓川徼外彈丸地不足煩大兵若遣雲南守將屯金齒令三司官撫諭之遠人獲更生而朝廷免調兵轉餉策之善者也帝下其議廷臣多主用兵於是西南騷動僅乃克之而失亡多其冬以疾乞歸景帝即位起吏部左侍郎尋進尚書佐王直理部事東宮建加太子太保災異見給事中林聰等劾文淵憸邪左庶子周旋疏言其枉聰並劾旋御史曹凱復廷爭之遂與旋俱下獄聰疏有囑內臣語太監興安請詰主名聰不敢堅對乃釋文淵命致仕英宗復位削其加官而景泰中易儲詔書父有天下傳之子語出文淵或傳朝命逮捕懼而自縊時喬新已登景泰五年進士官南京禮部主事奔喪歸里里人故侍郎揭稽嘗受業文淵而與喬新兄弟不協奏文淵死實諸子迫之自經又逼嫁父所愛妾喬新亦訐稽為巡撫時嘗薦黃且代草易儲疏皆被徵比對簿父妾斷指為諸郎訟冤獄得少解帝亦以事經赦釋不問已復丁母憂服除改刑部主事歷廣東司郎中錦衣衛卒犯法捕治不少貸都指揮袁彬有所囑執不從彬怒使人捃托無所得由是名大起成化四年遷福建副使所屬壽寧銀礦盜採者聚衆千餘人所過剽掠募兵擊擒其魁福寧豪尤氏殺人出入隨兵甲拒捕者二十年福清薛氏時出諸番互市事覺謀作亂皆捕殺之福安寧德銀礦久絶有司責課民多破産喬新以為言減三之二興化民自洪武初受牛於官至是猶歲課其租奏免之清流歸化里介沙縣將樂間恃險不供賦白都御史置歸化縣其民始奉要束遷河南按察使歲大饑故事振貸迄秋止喬新曰止於秋謂秋成可仰也今秋可但已乎振至明年麥熟乃止都御史原傑以招撫流民至南陽引喬新自助初項忠驅流民過當民聞傑至益竄山谷喬新躬往招之附籍者六萬餘戶遷湖廣右布政使荊州民苦徭役驗丁口貧富列為九等民便之十六年擢右副都御史巡撫山西邊地軍民每出塞伐木捕獸喬新言此輩苟遇敵必輸情求生皆賊導也宜毋聽闌出犯者罪守將詔可敵犯塞偕參將支玉伏兵灰溝營擊斬甚衆進左副都御史歲饑奏免雜辦及戶口鹽鈔十之四劾僉事尚敬劉源稽獄請敕天下斷獄官淹半載以上者悉議罪帝稱善亟從之召拜刑部右侍郎山西大饑人相食命往振活三十餘萬人還流鄒四萬戶還朝會安寧宣撫使楊友欲奪嫡弟播州宣慰使愛爵誣愛有異謀喬新往勘與巡撫劉璋共白愛誣友奪官安置他府播人遂安孝宗嗣位萬安劉吉等忌喬新剛正出為南京刑部尚書沿江蘆洲率為中官占奪託言備進奉費喬新奏還之民初喬新之出中官懷恩不平一日以事詣閣言新君踐阼當用正人胡為出何公安等默然既而刑部尚書杜銘罷羣望屬喬新而吉代安為首輔終忌之久不補弘治改元用王恕薦始召喬新代銘奏言舊制遣官勘事及逮捕必齎精微批文赴所在官司驗視乃行近止用駕帖不合符宜復舊制以防矯詐帝立報許時吉仇正人頻興大獄喬新率據法直之吉愈銜恨數托他事奪俸二年夏京城大水喬新請恤被災者家又慮刑獄失平條上律文當更議者數事吉悉格不行大理丞闕御史鄒魯覬遷而喬新薦郎中魏紳會喬新外家與鄉人訟魯即誣喬新受賕曲庇吉取中旨下其外家詔獄喬新乃拜疏乞歸頃之窮治無驗魯坐停俸喬新亦許致仕喬新性廉介觀政工部時嘗使淮西巢令閻徽少學於文淵以金幣餽喬新卻之閻曰以壽吾師耳喬新曰子欲壽吾親因他人致之則可因吾致之則不可卒不受福建市舶中官死鎮守者分其資遺三司喬新獨固辭不得輸之於庫既家居楊愛遣使厚致贈且獻良材可為櫬者喬新堅却之喬新年十一時侍父京邸修撰周旋過之喬新方讀通鑑續編旋問曰書法何如綱目對曰呂文煥降元不書叛張世傑溺海不書死節曹彬包拯之卒不書其官而紀羲軒多採怪妄似未有當也旋大驚異比長博綜羣籍聞異書輒借鈔積三萬餘帙皆手較讐著述甚富與人寡合氣節友彭韶學問友丘濬而已罷歸後巡按江西御史陳詮奏喬新始終全節中間祇以受親故餽遺之嫌勒令致仕進退黯昧誠為可惜乞行勘本官如無疾則行取任用有疾則加慰勞以存故舊之恩全進退之節不許後中外多論薦竟不復起十五年卒年七十六江西巡撫林俊為彭韶及喬新請諡吏部覆從之有旨令上喬新致仕之由給事中吳世忠言喬新學行政事莫不優忠勤剛介老而彌篤御史鄒魯挾私誣劾一辭不辨恬然退歸杜門著書人事寡接士大夫莫不高其行若必考退身之由疑旌賢之典則如宋蔣之奇嘗誣奏歐陽修矣胡紘輩嘗誣奏朱熹矣未聞以一人私情廢萬世公論也事竟寢正德十一年廣昌知縣張傑復以為言乃贈太子太保豫廕明年賜諡文肅喬新五世孫源萬曆初為刑部右侍郎亦有清節彭韶字鳳儀莆田人天順元年進士授刑部主事進員外郎成化二年疏論僉都御史張岐憸邪宜召王竑李秉葉盛忤旨下詔獄給事中毛弘等救之不聽卒輸贖尋遷郎中錦衣指揮周彧太后弟也奏乞武強武邑民田不及賦額者籍為閒田命韶偕御史季琮覆勘韶等周視徑歸上疏自劾曰真定田自祖宗時許民墾種即為産除租賦以勸力農功臣戚里家與國咸休豈當與民爭尺寸地臣誠不忍奪小民衣食附益貴戚請伏奉使無狀罪疏入詔以田歸民而責韶等邀名方命復下詔獄言官爭論救得釋當是時韶與何喬新同官並有重名一時稱何彭遷四川副使安嶽扈氏焚滅劉某家二十一人定遠曹氏殺其兄一家十二人所司以為疑獄久不決韶一訊得實咸伏辜進按察使盡撤境內淫祠王府祭葬舊遣內官公私煩費奏罷之雲南鎮守太監錢能進金燈擾道路韶劾之不報十四年春遷廣東左布政使中官奉使紛遝鎮守顧市舶韋眷珠池黃福皆以進奉為名所至需求民不勝擾韶先後論奏最後梁芳弟錦衣鎮撫德以廣東其故鄉歸採禽鳥花木害尤酷韶抗疏極論語侵芳芳怒搆於帝調之貴州二十年擢右副都御史巡撫應天明年正月星變上言彗星示災見於歲暮遂及正旦歲暮者天道之終正旦者歲事之始此天心仁愛欲陛下善始善終也陛下嗣位之初家禮正防微周儉德昭用人慎乃邇年以來進奉貴妃加於嫡后褒寵其家幾與先帝后家埒此正家之道未終也監局內臣數以萬計利源兵柄盡以付之犯法縱奸一切容貸此防微之道未終也四方鎮守中官爭獻珍異動稱敕旨科擾小民此持儉之道未終也六卿並加師保監寺兼領崇階及豫告而歸廩食輿夫濫加庸鄙爵賞一輕人誰知勸此用人之道未終也惟陛下慎終如始天下幸甚時方召為大理卿帝得疏不悅命仍故官巡撫順天永平二府均大興宛平昌平諸縣徭役劾奏鎮守中官陶弘罪孝宗即位召為刑部右侍郎嘉興百戶陳輔緣盜販為亂陷府城大掠遁入太湖遣韶巡視韶至賊已滅乃命兼僉都御史整理鹽法尋進左侍郎韶以商人苦抑配為定折價額蠲宿負憫竈戶煎辦徵賠折閲之困繪八圖以獻條利病六事悉允行弘治二年秋還朝明年改吏部與尚書王恕甄人才核功實仕路為清彗星見上言宦官太盛不可不亟裁損因請午朝面議大政毋祇具文已又言濫授官太多乞嚴杜幸門痛為釐正帝是其言然竟不能用四年秋代何喬新為刑部尚書故安遠侯柳景贓敗至數千兩徵僅十一以其母訴免韶執奏曰昔唐宣宗元舅鄭光官租不入京兆尹韋澳械其莊吏宣宗欲寬之澳不奉詔景無元舅之親贓非負租之比獨蒙宥除是臣等守法愧於澳也不從御史彭程以論皇壇器下獄韶疏救因極陳光祿食濫費狀乃命具歲辦數以聞荊王見潚有罪奏上淹旬不下內官王明苗通高永殺人減死遣戍昌國公張巒建墳踰制役軍至數萬畿內民冒充陵廟戶及勇士旗校輒免徭役致見戶不支流亡日衆韶皆抗疏極論但下所司而已韶涖部三年昌言正色秉節無私與王恕及喬新稱三大老而為貴戚近習所疾大學士劉吉亦不之善韶志不能盡行連章乞休乃命乘傳歸月廩歲隸如制明年南京地震御史宗彝等言韶喬新強珍謝鐸陳獻章章懋彭程俱宜召用不報又明年卒年六十六諡惠安贈太子少保韶嗜學公暇手不釋書正德初林俊言韶諡不副行乞如魏驥吳訥葉盛改諡文竟不行周經字伯常刑部尚書瑄子也天順四年進士改庶吉士授檢討成化中歷侍讀中允侍孝宗於東宮講文華大訓太子起立閣臣以為勞議請坐聽經與諸講官皆不可乃已孝宗立進太常少卿兼侍讀弘治二年擢禮部右侍郎中官請修黃村尼寺奉祀孝穆太后土魯番貢獅子不由甘肅假道滿剌加浮海至廣東經倡議毀其寺卻貢不與通改吏部進左侍郎通政經歷沈祿者皇后姑壻也尚書王恕在告中官傳旨擢祿本司參議經言非面承旨又無御札不敢奉詔復與恕疏爭之事雖不能止朝論韙焉靈壽奸民獻地於中官李廣戶部持不得經倡九卿疏爭卒罪獻地者嘗上言外戚家無功求遷無勞乞賞兼齊醮遊宴濫費無紀致帑藏殫虛宜大為撙節近例預備倉積粟多者守令賜誥敕不次遷官遂致剝下干進請如洪武間例悉出官帑平糴毋奪民財考績毋專以積粟為能至清軍之弊洪熙以前在旗校宣德以後在里胥弊在旗校者版籍猶存若里胥則並版籍而淆亂之宜考故冊洗奸弊災傷民乞省恤惜薪司薪炭約支數年災荒郡縣宜盡與停免四方顏料雜辦亦然此救民急務也帝多採納之八年文武大臣以災異陳時政經為具奏草而斥戲樂一事語尤切直帝密令中官廉草奏者尚書耿裕曰疏首吏部裕實具草經曰疏草出經手即有罪罪經世兩賢之明年代葉淇為戶部尚書時孝宗寬仁而戶部尤奸蠹所萃挾勢行私者不可勝紀少不如意讒毀隨之經悉按祖宗成憲無所顧寬逋緩征裁節濫四方告災必覆奏蠲除每委官監稅課入多者與下考苛切之風為之少衰奉御趙瑄獻雄縣地為東宮莊經等劾瑄違制下詔獄而帝復從鎮撫司言遣官勘實經等復爭之曰太祖太宗定制閒田任民開墾若因奸人言而籍之官是土田豫奪盡出奸人口小民無以為生矣既而勘者及巡撫高銓言閒田止七十頃悉與民田錯於是從經言仍賦之民治瑄罪中官何鼎劾外戚張鶴齡下獄經疏救之忤旨切責雍王祐橒乞衡州稅課司及衡陽縣河泊所經言不可許帝納之命自今四方稅課王府不得請中官織造者請增給兩浙鹽課二萬引經等言鹽策佐邊不宜濫給且祖宗朝織染諸局供御有常數若曰取用有加則江南兩浙已例外增造若曰工匠不足則仰食公家不下千餘人所為何事是知供用未必缺而徒導陛下以勞民傷財之事也帝不從經恐歲以為常再疏請斷其後乃命歲豫五千引先是倉場監督內官依成化末年例裁減十一年秋帝復增用少監莫英等三人經上疏力爭帝以已遣不聽內靈臺請錦衣餘丁百人供灑掃經等諫不納經曰祖宗設內臺其地至密今一旦增百人將必有漏泄妄言者帝悟立已之崇王見澤乞河南退灘地二十餘里經言不宜豫興王祐杬前後乞赤馬諸河泊所及近湖地千三百餘頃經三疏爭之竟不許帝以肅寧諸縣地四百餘頃賜壽寧侯張鶴齡其家人因侵民地三倍且毆民至死下巡撫高銓勘報銓言可耕者無幾請仍賦民不許時王府勳戚莊田例畝徵銀三分獨鶴齡奏加徵二分且概加之沙地經抗章執奏命侍郎許進偕太監朱秀覆核經言地已再勘今復遣使徒滋煩擾昔太祖以劉基故減青田賦徵米五合欲使基鄉里子孫世世頌基今興濟篤生皇后正宜恤民減賦俾世世戴德何乃使小民銜怨無已也頃之進等還言此地乃憲廟皇親柏權及民産不可奪帝竟豫鶴齡如其請加稅而命償權直除民租額經等復諫曰東宮親王莊田徵稅自有例鶴齡不宜獨優權先帝妃家亦戚畹也名雖償直實乃奪之天下將謂陛下惟厚椒房親不念先朝外戚帝終不納大同缺戰馬馬文升請太倉銀以市經言糧馬各有司存祖訓六部毋相壓兵部侵戶部權非祖訓帝為改撥太僕銀給之給事中魯昂請盡括稅役金錢輸太倉經曰不節織造賞賚齊醮土木之費而欲括天下財是舛也內官傳旨索太倉銀三萬兩為燈費持不與經剛介方正好強諫雖重忤旨不恤宦官貴戚皆憚而疾之太監李廣死帝得朝臣與餽遺簿籍大怒科道因劾諸臣交通狀有及經者經上疏曰昨科道劾廷臣奔競李廣闌入臣名雖蒙恩不問實含傷忍痛無以自明夫人奔競李廣冀其進言左右圖寵眷耳陛下試思廣在時曾言及臣否且交結餽遺簿籍具在乞檢曾否有臣姓名更嚴鞫廣家人臣但有寸金尺帛即治臣交結之罪斬首市曹以為奔競無恥之戒若無干涉亦乞為臣洗雪庶得展布四體終事聖明若令含汙忍垢即死填溝壑目且不瞑帝慰答之十三年星變自陳乞休報許賜敕馳驛加太子太保以鍾代廷臣爭上章留之中外論薦者至八十餘疏咸報寢武宗即位言官復薦召為南京戶部尚書遭繼母憂未任正德三年服闋經壻兵部尚書曹元方善劉瑾言經雖老可用乃召為禮部尚書固辭不許強赴召受事數月即謝病去五年三月卒年七十一贈太保諡文端子曾進士浙江右參政耿裕字好問刑部尚書九疇子也景泰五年進士改庶吉士授戶科給事中改工科天順初以九疇為右都御史改裕檢討九疇坐劾石亨貶裕亦謫泗州判官終父喪補定州成化初召復檢討歷國子司業祭酒侯伯年幼者皆肄業監中裕采古諸侯貴戚言行可法者為書授之帝聞而稱善歷吏部左右侍郎坐尚書尹旻纍停俸者再已代旻為尚書大學士萬安與裕不協而李孜省私其同鄉李裕欲使代裕相與謀中之坐以事調侍郎黎淳南京而奪裕俸言官復交劾宥之裕入謝既出帝怒曰吾再寬裕罪當再謝今一謝以奪俸故意鞅鞅耶孜省等因而傾之遂調南京禮部而以李裕代踰年孝宗嗣位轉南京兵部參贊機務弘治改元召拜禮部尚書時公私侈靡耗費日廣裕隨事救正因災異條上時事及申理言官先後陳言甚衆大要歸於節儉給事中鄭宗仁疏節光祿供應裕等請納其奏巡視光祿御史田奫以供費不足纍行戶請借太倉銀償之裕等言疑有侵盜弊請敕所司禁防帝皆從之南京守備中官請增奉先殿日供品物裕等不可帝方踐阼斥番僧還本土止留乳奴班丹等十五人其後多濳匿京師轉相招引齊醮復興言官以為言裕等因力請驅斥帝乃留百八十二人餘悉逐之禮部公廨火裕及侍郎倪嶽周經等請罪被劾下獄已釋之停其俸初撒馬兒罕及土魯番皆貢獅子甘肅鎮守太監傅德先圖形以進巡按御史陳瑤請却之裕等乞從瑤請而治德違詔罪帝不從後番使再至留京師頻有宣召裕等言番人不道因朝貢許其自新彼復濳稱可汗興兵犯順陛下優假其使適遇倔強之時彼將謂天朝畏之益長桀驁且獅子野獸無足珍異帝即遣其使還尋代王恕為吏部尚書加太子太保御用監匠人李綸等以內降得官裕言先有詔文官不由臣部推舉傳乞除授者參送法司按治今除用綸等不信前詔不可給事中呂獻等皆論奏裕亦再疏爭終不聽裕為人坦夷諒直諳習朝章秉銓數年無愛憎亦不徇毀譽銓政稱平自奉淡泊兩世貴盛而家業蕭然父子並以名德稱九年正月卒年六十七贈太保諡文恪倪嶽字舜咨上元人父謙奉命祀北嶽母夢緋衣神入室生嶽遂以為名謙終南京禮部尚書諡文僖嶽天順八年進士改庶吉士授編修成化中歷侍讀學士直講東宮二十二年擢禮部右侍郎仍直經筵弘治初改左侍郎嶽好學文章敏捷博綜經世之務尚書耿裕方正持大體至禮文制度率待嶽而決六年裕改吏部嶽遂代為尚書詔召國師領占竹於四川嶽力諫帝不從給事中夏昂御史張禎等相繼爭之事竟寢時營造諸王府規制宏麗踰永樂宣德之舊嶽請頒成式又以四方所報災異禮部於歲終類奏率為具文乃詳次其月日博引經史徵應勸帝勤講學開言路寬賦役慎刑罰黜奸貪進忠直汰冗員停齊醮省營造止濫賞帝頗採納焉左侍郎徐瓊與后家有連謀代嶽九年南京吏部缺尚書廷推瓊詔加嶽太子太保往任之而瓊果代嶽尋改嶽南京兵部參贊機務還代屠滽為吏部尚書嚴絶請托不徇名譽銓政稱平嶽狀貌魁岸風采嚴峻善斷大事每盈廷聚議決以片言聞者悅服同列中最推遜馬文升然論事未嘗苟同前後陳請百餘事軍國弊政剔抉無遺疏出人多傳録之論西北用兵害尤切其略云近歲毛里孩阿羅忽孛羅出癿加思蘭大為邊患蓋緣河套之中水草甘肥易於屯牧故賊頻據彼地擁衆入掠諸將怯懦率嬰城自守苟或遇敵輒至挫衄既莫敢折其前鋒又不能邀其歸路敵進獲重利退無後憂致兵鋒不靖邊患靡寧命將徂征四年三舉絶無寸功或高臥而歸或安行以返析圭擔爵優游朝行輦帛輿金充牣私室且軍旅一動輒報捷音賜豫濫施官秩輕授甚至妄殺平民謬稱首級敵未敗北輒以奔遁為辭功賞所加非私家子弟即權門厮養而什伍之卒轉餉之民則委骨荒城膏血野草天怒人怨禍幾日深非細故也京營素號冗怯留鎮京師猶恐未壯根本顧乃輕於出禦用褻天威臨陳輒奔反墮邊軍之功為敵人所侮且延綏邊也去京師遠宣府大同亦邊也去京師近彼有門庭之喻此無陛楯之嚴可乎頃兵部建議令宣府出兵五千大同出兵一萬併力以援延綏而不慮其相去既遠往返不逮人心苦於轉移馬力疲於奔軼夫聲東擊西者賊寇之奸態也搗虛批亢者兵家之長策也精鋭既盡乎西老弱乃留於北萬一北或有警而西未可離首尾衡決遠近坐困其可為得計哉至於延綏士馬屯集糧糗不資乃以山西河南之民任飛芻轉粟之役徒步千里夫運而妻供父挽而子荷道路愁怨井落空虛幸而得至束芻百錢斗粟倍直不幸遇賊身且斃矣他尚何云輸將不足則有輕齎輕齎不足又有預徵水旱不可先知豐歉未能逆卜徵如何其可預也又令民輸芻粟補官而媚權貴私親故者或出空牒以授倉庾無升合之入至若輸粟給鹽則豪右請託率占虛名鬻之而商賈費且倍蓰官爵日輕鹽法日沮而邊儲之不充如故也又朝廷出帑藏給邊歲為銀數十萬山西河南輸輕齎於邊者歲不下數十萬銀日積而多則銀益賤粟日散而少則粟益貴而不知者遂於養兵之中寓養狙之術或以茶鹽或以銀布名為準折糧價實則侵剋軍需故朝廷有糜廩之虞軍士無果腹之樂至兵馬所經例須應付居平人日米一斗馬日芻一束追逐一日之間或一二堡或三四城豈能俱給哉而典守者巧為竊攘之謀凡所經歷悉有開支罔上行私莫此為甚及訪禦敵之策則又論議紛紜有謂復受降之故險守東勝之舊城使聲援交接掎角易制夫欲復城河北即須塞外屯兵出孤遠之軍涉荒漠之地輜重為纍饋餉惟艱彼或抄掠於前躡襲於後曠日持久軍食乏絶進不得城退不得歸一敗而聲威大損矣又有謂統十萬之衆裹半月之糧奮揚武威掃蕩窟穴使河套一空事非不善也然帝王之兵以全取勝孫吳之法以逸待勞今欲鼓勇前行窮搜遠擊乘危履險覬萬一之幸贏糧遠隨則重不及事提兵深入則孤不可援且其間地方千里無城郭之居委積之守彼或往來遷徙罷我馳驅我則情見勢屈為敵所困既失坐勝之機必蹈覆沒之轍其最無策者又欲棄延綏勿守使兵民息肩不知一民尺土皆受之祖宗不可忽也向失東勝故今日之害萃於延綏而關陝震動今棄延綏則他日之害鍾於關陝而京師震動賊愈近而禍愈大矣因陳重將權增城堡廣斥堠募民壯去客兵明賞罰嚴間諜實屯田復邊漕數事時兵部方主用兵不能盡用也十四年十月卒年五十八贈少保諡文毅明世父子官翰林俱諡文自嶽始閔圭字朝瑛烏程人天順八年進士授御史出按河南以風力聞成化六年擢江西副使進廣東按察使久之以右僉都御史巡撫江西南贛諸府多盜率強宗家僕圭請獲盜連坐其主法司議從之尹直輩謀之李孜省取中旨責圭不能弭盜左遷廣西按察使孝宗嗣位擢右副都御史巡撫順天入為刑部右侍郎進右都御史總督兩廣軍務與總兵官毛鋭討古田僮副總兵馬俊參議馬鉉自臨桂深入敗死軍遂退詔停俸討賊圭復進兵連破七寨他賊悉就撫弘治七年遷南京刑部尚書尋召為左都御史十一年東宮出閣加太子少保十三年代白昂為刑部尚書再加太子太保以災異與都御史戴珊共陳時政八事又陳刑獄四事多報可圭久為法官議獄皆會情比律歸於仁恕宣府妖人李道明聚衆燒香巡撫劉聰信千戶黃珍言株連數十家謂道明將引北寇攻宣府及逮訊無驗圭乃止坐道明一人餘悉得釋而抵珍罪聰亦下獄貶官帝之親鞫吳一貫也將置大辟圭進曰一貫推案不實罪當徒帝不允圭執如初帝怒戴珊從旁解之帝乃霽威令更擬圭終以原擬上帝不悅召語劉大夏對曰刑官執法乃其職未可深罪帝默然久之曰朕亦知圭老成不易得但此事太執耳卒如圭議正德元年六月以年踰七十再疏求退不允及劉瑾用事九卿伏闕固諫韓文被斥圭復連章乞休明年二月詔加少保賜敕馳傳歸六年十月卒年八十二贈太保諡莊懿從孫如霖南京禮部尚書如霖曾孫洪學吏部尚書洪學從弟夢得兵部戎政尚書他為庶僚者復數人戴珊字廷珍浮梁人父哻由鄉舉官嘉興教授有學行富人數輩遣其奴子入學哻不可賄上官強之執愈堅見忤坐他事去珊幼嗜學天順末與劉大夏同舉進士久之擢御史督南畿學政成化十四年遷陝西副使仍督學政正身率教士皆愛慕之歷浙江按察使福建左右布政使終任不攜一土物弘治二年以王恕薦擢右副都御史撫治鄖陽蜀盜野王剛流劫竹山平利珊合川陝兵檄副使朱漢等討擒其魁餘皆以脅從論全活甚衆入歷刑部左右侍郎與尚書何喬新彭韶共事晉府寧化王鍾金丙淫虐不孝勘不得實再遣珊等勘之遂奪爵禁錮進南京刑部尚書久之召為左都御史十七年考察京官珊廉介不苟合給事中吳蕣王蓋自疑見黜連疏詆吏部尚書馬文升並言珊縱妻子納賄珊等乞罷帝慰留之御史馮允中等言文升珊歷事纍朝清德素著不可因浮詞廢計典乃下蕣蓋詔獄命文升珊即舉察事珊等言兩人逆計當黜故先劾臣等今黜之彼必曰是挾私也苟避不黜則負委任而使詐諼者得志帝命上兩人事蹟皆黜之已劉健等因召對力言蓋罪輕宜調用帝方嚮用文升珊卒不納帝晚年召對大臣珊與大夏造膝宴見尤數一日與大夏侍坐帝曰時當述職諸大臣皆杜門如二卿者雖日見客何害袖出白金賚之曰少佐而廉且屬勿廷謝曰恐為他人忌也珊以老疾數求退輒優詔勉留遣醫賜食慰諭有加珊感激泣下私語大夏曰珊老病子幼恐一旦先朝露公同年好友何惜一言乎大夏曰唯唯後大夏燕對畢帝問珊病狀言珊實病乞憫憐聽其歸帝曰彼屬卿言耶主人留客堅客則強留珊獨不能為朕留耶且朕以天下事付卿輩猶家人父子今太平未兆何忍言歸大夏出以告珊珊泣曰臣死是官矣帝既崩珊以新君嗣位不忍言去力疾視事疾作遂卒贈太子太保諡恭簡贊曰孝宗之為明賢君有以哉恭儉自飭而明於任人劉謝諸賢居政府而王恕何喬新彭韶等為七卿長相與維持而匡弼之朝多君子殆比隆開元慶曆盛時矣喬新韶雖未究其用而望著朝野史稱宋仁宗時國未嘗無嬖幸而不足以纍治世之體朝未嘗無小人而不足以勝善類之氣孝宗初政亦略似之不然承憲宗之季而欲使政不旁撓財無濫費滋培元氣中外乂安豈易言哉
