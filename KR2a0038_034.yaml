body:
  text: 明史卷三十四志第十曆四大統曆法二立成立成者以日月五星盈縮遲疾之數預為排定以便推步取用也元志曆經步七政盈縮遲疾皆有二術其一術以三差立算者即布立成法也其又術云以其下盈縮分乘入限分萬約之以加其下盈縮積者用立成法也而遺立成未載無從入算今依大統曆通軌具錄之其目四曰太陽盈縮曰晨昏分曰太陰遲疾曰五星盈縮餘詳法原及推步卷中按元史至正十七年授時曆成十九年王恂卒時曆雖頒然立成之數尚皆未有定藁郭守敬比類編次整齊分秒裁為二卷而今欽天監本載嘉議大夫太史令臣王恂奉敕撰意者王先有藁而郭卒成之歟太陽盈初縮末限立成冬至前後二象限同用積日平立合差盈加分盈積度盈行度十日分十秒十微百十分十秒十微萬千百十分十秒十微度千百十分十秒初四九三八六五一八五六九一五一八五一四九五七二五五九一八三五一八五六九一五五九一二四九七五八五九六一一一一六七七五二一五九六三四九九四四四九五九八五三一五一七七三六三一四九五九八四五一三四九九九九二一三七二一六一四九九九五五三一六四八五九七七九二五四七一二五一四八五九七六五五二四八九四六三二九九六九四一四八九四七五六八八四七五八九六一三四七一六三六七一四七五八九八五八七四四七八二七三三九四七五三二八一四七八二九五一六四六五七三九九四四一八三六一一四六五七三一五一二四六四六六三三九四八八四一一四六六三一一五一四三二四五五五九三五三四四七三三九一四五五五一二五一六一八四五三六六一五八二四三二一四五三六一三五一八四四四五二四三六二五六九三一四四五二一四五一九九四四二三九六六九五八一三六一四四二一五五二一七六四三四八二四九七一三五八三七五一四三四八二一六五二三六二四二九六七三七五七六六二四一四二九六一七五二五四八四二四三七一一八二六九七一四二四三七一八五二七三四四一九一一六三八四二四六四八一四一九一一一九五二九二四一三八四二九八八四三七五七一一四一三八四二五三一六四八五五九九二五七六一四八五五十日分十秒十微百十分十秒十微萬千百十分十秒十微度千百十分十秒二一五三二九二四三二四三九六六六一五九一四三二四二二五三四七八三九七九一一一一六九三九一二一三九七九一二三五三六六四三九二五六三三一四六七三二三一三九二五六二四五三八五三八七一九六九一八五九八六五六一三八七一九二五五四三六三八一八一一九一二二四七六二五一三八一八一二六五四二二二三七六四八三一一六二八八七四四一三七六四二七五四四八三七九八六一一二五二八二七一三七九八二八五四五九四三六五五四五三一二三七六二六八八一三六五五四二九五四七八三六八五九一二七四一八一四一一三六八三五四九六六三五四六七九一三一一九一三五四六三一五五一五二三四九一一一三一三四五六五七九一三四九一一三二五五三三八三四三五九六一一二八五六一九二一三四三五九三三五五五二四三三八六二三一四一四九二一五三一三三八六三四五五七一三三二五九九一四四八七二七七六一三三二五三五五五八九六三二六九三八九一四八一九七八七五一三二六九三三六五六八二三二一三四九三一五一四六七二六四一三二一三四三七五六二六八三一五七四一一一五四六八七五七一三一五七四三八五六四五四三一一一四三一五七八三八一六八一三一一一三九五六六四三四四六八九一六九三九三一一一三四四六四五六八二六二九八八四九一六三九八四一二九八八四一五七一二二九三一二二三一六六九七二四九一二九三一二四二五七一九八二八七四二一一一六九九三二七二一二八七四二四三五七三八四二八一七一三一七二七七七四八三一二八一七十日分十秒十微百十分十秒十微萬千百十分十秒十微度千百十分十秒四四五七五七二七五九六二九一七五五九四四九六一二七五九六四五五七七五六二七二五九一七八三五四一二五一二七二四六五七九四二二六四四三三一八一五六一八四一二六四四三四七五八一二八二五八六三六一一八三七四八七一二五八六三四八五八三一四二五二八二三三一八六二八六八四八一二五二八二四九五八五二四六九九一九一八八八一五八一一二四六九九五五八六八六二四一一四一九一九一二八五一二四一一四五一五八八七二二三五二七三三一九三六九六四一九一二三五二七五二五九五八二二九三八六一一九六四九一五二一二二九三八五三五九二四四二二三四八三一九八三四三一三一二二三四八五四五九四三二一七五五五九二五七七八一六一二一七五五五五五九六一六二一一六一二九二二七五三三七五一二一一六一五六五九八二二五六五一三二四八六九五四一二五六五五七五九九八八一九九六七一一二六九二六一七一一九九六七五八六一七四一九三六七二三二八九二二七二八一一九三六七五九六三六一八七六五四九二一八五九四五一一一八七六五六六五四六一八一六一八九二一二七三六一一八一六一六一六七三二一七五五六四三二一四五五二一八九一一七五五六六二六九一八一六九四九一一二一六三七八三二一一六九四九六三六一一四一六三三九九三二一八二七四