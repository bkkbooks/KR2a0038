body:
  text: 明史卷一百三十列傅第十八吳良康茂才丁德興耿炳文郭英華雲龍韓政仇成張龍吳復周武胡海張赫華高張銓何真吳良定遠人初名國興賜名良雄偉剛直與弟禎俱以勇略聞從太祖起濠梁並為帳前先鋒良能沒水偵探禎每易服為間諜禎別有傅良從取滁和戰采石克太平下溧水溧陽定集慶功多又從徐達克鎮江下常州進鎮撫守丹陽與趙繼祖等取江陰張士誠兵據秦望山良攻奪之遂克江陰即命為指揮使守之時士誠全據吳跨淮東浙西兵食足江陰當其要衝枕大江扼南北襟喉士誠數以金帛啖將士窺釁太祖諭良曰江陰我東南屏蔽汝約束士卒毋外交毋納逋逃毋貪小利毋與爭鋒惟保境安民而已良奉命惟謹備禦修飭以敗敵功進樞密院判官士誠大舉兵來寇艨艟蔽江其將蘇同僉駐君山指畫進兵良遣弟禎出北門與戰而潛遣元帥王子明帥壯士馳出南門合擊大敗之俘斬甚衆敵宵遁尋復寇常州良遣兵從間道殲其援兵於無錫當是時太祖數自將爭江楚上流與陳友諒角大軍屢出金陵空虛士誠不敢北出侵尺寸地以良在江陰為屏蔽也良仁恕儉約聲色貨利無所好夜宿城樓枕戈達旦訓將練兵常如寇至暇則延儒生講論經史新學宮立社學大開屯田均徭省賦在境十年封疆宴然太祖常召良勞曰吳院判保障一方我無東顧憂功甚大車馬珠玉不足旌其勞命學士宋濂等為詩文美之仍遣還鎮尋大發兵取淮東克泰州士誠兵復出馬馱沙侵鎮江巨艦數百泝江而上良戒嚴以待太祖親督大軍禦之士誠兵遁追至浮子門良出兵夾擊獲卒二千太祖詣江陰勞軍周巡壁壘歎曰良今之吳起也吳平加昭勇大將軍蘇州衛指揮使移鎮蘇州武備益修軍民輯睦進都督僉事移守全州洪武三年進都督同知封江陰侯食祿千五百石豫世券四年討靖州綏寧諸蠻五年廣西蠻叛副征南將軍鄧愈帥平章李伯升出靖州討之數月盡平左右兩江及五溪之地移兵入銅鼓五開收潭溪開太平殲清洞崖山之衆於銅關鐵寨諸蠻皆震懾內附粵西遂平八年督田鳳陽十二年齊王封青州王妃良女也遂命良往建王府十四年卒於青年五十八贈江國公諡襄烈子高嗣侯屢出山西北平河南練兵從北征帥蕃軍討百夷二十八年有罪調廣西從征趙宗壽燕師起高守遼東與楊文數出師攻永平燕王謀去高曰高雖怯差密文勇而無謀去高文無能為也乃遺二人書盛譽高極詆文故易其函授之二人得書並以聞建文帝果疑高削爵徙廣西獨文守遼東竟敗永樂初復召高鎮守大同上言備邊方略八年帝北征班師高稱疾不朝被劾廢為庶人奪券洪熙元年帝見高名曰高往年多行無禮其謫戍海南高已死徙其家會赦得釋宣德十年子升乞嗣不許康茂才字壽卿蘄人通經史大義事母孝元末寇亂陷蘄結義兵保鄉里立功自長官纍遷淮西宣慰司都元帥太祖既渡江將士家屬留和州時茂才移戍采石扼江渡太祖遣兵數攻之茂才力守常遇春設伏殲其精鋭茂才復立寨天寧洲又破之奔集慶太祖克集慶乃帥所部兵降太祖釋之命統所部從征明年授秦淮翼水軍元帥守龍灣取江陰馬馱沙敗張士誠兵獲其樓船從廖永安攻池州取樅陽太祖以軍興民失農業命茂才為都水營田使仍兼帳前總制親兵左副指揮使陳友諒既陷太平謀約張士誠合攻應天太祖欲其速來破之知茂才與友諒有舊命遣僕持書紿為內應友諒大喜問康公安在曰守江東木橋使歸太祖易橋以石友諒至見橋愕然連呼老康莫應退至龍灣伏兵四起茂才合諸將奮擊大破之太祖嘉茂才功賜賚甚厚明年太祖親征友諒茂才以舟師從克安慶破江州友諒西遁遂下蘄州興國漢陽沿流克黃梅寨取瑞昌敗友諒八指揮降士卒二萬人遷帳前親兵副都指揮使攻左君弼廬州未下從援南昌戰彭蠡友諒敗死從征武昌皆有功進金吾侍衛親軍都護從大將軍徐達再攻廬州克之取江陵及湖南諸路改神武衛指揮使進大都督府副使士誠攻江陰太祖自將擊之比至鎮江士誠已焚瓜洲遁茂才追北至浮子門吳軍遮海口乘潮來薄茂才力戰大敗之搗淮安馬騾港拔其水寨淮安平尋拔湖州進逼平江士誠遣鋭卒迎鬬大戰尹山橋茂才持大戟督戰盡覆敵衆與諸將合圍其城軍齊門平江下還取無錫遷同知大都督府事兼太子右率府使洪武元年從大將軍經略中原取汴洛留守陝州規運饋餉造浮橋渡師招徠絳解諸州扼潼關秦兵不敢東向茂才善撫綏民立石頌德焉三年復從大將軍征定西取興元還軍道卒追封蘄國公諡武康子鐸年十歲入侍皇太子讀書大本堂以父功封蘄春侯食祿一千五百石豫世券督民墾田鳳陽帥兵征辰州蠻平施疊諸州從大將軍達北征又從征南將軍傅友德征雲南克普定破華楚山諸寨卒於軍年二十三追封蘄國公諡忠愍子淵幼未襲授散騎舍人已坐事革冠服勒居山西遂不得嗣弘治末録茂才後為世襲千戶丁德興定遠人歸太祖於濠偉其狀貌以黑丁呼之從取洪山寨以百騎破賊數千盡降其衆從克滁和敗青山盜從渡江拔采石取太平分兵取溧水溧陽皆先登從破蠻子海牙水寨搗方山營擒陳兆先下集慶取鎮江以功進管軍總管下金壇廣德寧國從平常州擢左翼元帥寧國復叛從胡大海復之分兵下江陰取徽州石埭池州樅陽攻江州移兵擊安慶所向皆捷復援江陰略江西傍近州縣攻雙刀趙挫其鋒時徐達邵榮攻宜興久不下太祖遣使謂曰宜興城西通太湖口士誠餉道所由斷其餉則必破達乃遣德興絶太湖口而並力急攻城遂拔論功授鳳翔衛指揮使陳友諒犯龍江德興軍於石灰山力戰擊敗之遂從征友諒搗安慶克九江援安豐敗呂珍走左君弼從戰鄱陽平武昌克廬州略定湖南衡州諸郡又從大將軍收淮東征浙西敗士誠兵於舊館下湖州圍平江卒於軍贈都指揮使洪武元年追封濟國公列祀功臣廟子忠龍江衛指揮使豫世襲耿炳文濠人父君用從太祖渡江積功為管軍總管援宜興與張士誠兵爭柵力戰死炳文襲職領其軍取廣德進攻長興敗士誠將趙打虎獲戰船三百餘艘擒其守將李福安等遂克長興長興據太湖口陸通廣德與宣歙接壤為江浙門戶太祖既得其地大喜改為長安州立永興翼元帥府以炳文為總兵都元帥守之溫祥卿者多智數避亂來歸炳文引入幕府畫守禦計甚悉張士誠左丞潘元明元帥嚴再興帥師來爭炳文奮擊大敗去久之士誠復遣司徒李伯升帥衆十萬水陸進攻城中兵七千太祖患之命陳德華高費聚往援伯升夜劫營諸將皆潰炳文嬰城固守攻甚急隨方禦之不解甲者月餘常遇春復帥援兵至伯升棄營遁追斬五千餘人其明年改永興翼元帥府為永興衛親軍指揮使司以炳文為使已而士誠大發兵遣其弟士信復來爭炳文又敗之獲其元帥宋興祖士信憤甚益兵圍城炳文與費聚出戰又大敗之長興為士誠必爭地炳文拒守凡十年以寡禦衆大小數十戰戰無不勝士誠迄不得逞大軍伐士誠炳文將所部克湖州圍平江吳平進大都督府僉事從征中原克山東沂嶧諸州下汴梁徇河南扈駕北巡已又從常遇春取大同克晉冀從大將軍徐達征陝西走李思齊張思道即鎮其地浚涇陽洪渠十萬餘丈民賴其利尋拜秦王左相都督僉事洪武三年封長興侯食祿千五百石豫世券十四年從大將軍出塞破元平章乃兒不花於北黃河十九年從潁國公傅友德征雲南討平曲靖蠻二十一年從永昌侯藍玉北征至捕魚兒海二十五年帥兵平陝西徽州妖人之亂三十年以征西將軍擒蜀寇高福興俘三千人始炳文守長興功最高太祖榜列功臣以炳文附大將軍達為一等及洪武末年諸公侯且盡存者惟炳文及武定侯郭英二人而炳文以元功宿將為朝廷所倚重建文元年燕王兵起帝命炳文為大將軍帥副將軍李堅寧忠北伐時年六十有五矣兵號三十萬至者惟十三萬八月次真定分營滹沱河南北都督徐凱軍河間潘忠楊松駐鄚州先鋒九千人駐雄縣值中秋不設備為燕王所襲九千人皆死忠等來援過月漾橋伏發水中忠松俱被執不屈死鄚州陷而炳文部將張保者降燕備告南軍虛實燕王縱保歸使張雄鄚敗狀謂北軍且至於是炳文移軍盡渡河並力當敵軍甫移燕兵驟至循城蹴擊炳文軍不得成列敗入城爭門門塞蹈藉死者不可數計燕兵遂圍城炳文衆尚十萬堅守不出燕王知炳文老將未易下越三日解圍還而帝驟聞炳文敗憂甚太常卿黃子澄遂薦李景隆為大將軍乘傳代炳文比至軍燕師已先一日去炳文歸景隆代將竟至於敗燕王稱帝之明年刑部尚書鄭賜都御史陳瑛劾炳文衣服器皿有龍鳳飾玉帶用紅僭妄不道炳文懼自殺子璿前軍都督僉事尚懿文太子長女江都公主炳文北伐璿嘗勸直搗北平炳文受代歸不復用璿憤甚永樂初杜門稱疾坐罪死璿弟瓛後軍都督僉事與江陰侯吳高都指揮楊文帥遼東兵圍永平不克退保山海關高被間徙廣西文守遼東瓛數請攻永平以動北平文不聽後與弟尚寶司卿瑄皆坐罪死郭英鞏昌侯興弟也年十八與興同事太祖親信令值宿帳中呼為郭四從克滁和采石太平征陳友諒戰鄱陽湖皆與有功從征武昌陳氏驍將陳同僉持槊突入太祖呼英殺之衣以戰袍攻嶽州敗其援兵還克廬州襄陽授驍騎衛千戶克淮安濠州安豐進指揮僉事從徐達定中原又從常遇春攻太原走擴廓下興州大同至沙淨州渡河取西安鳳翔鞏昌慶陽追敗賀宗哲於亂山遷本衛指揮副使進克定西討察罕腦兒克登寧州斬首二千級進河南都指揮使時英女弟為寧妃英將赴鎮命妃餞英於第賜白金二十罌馬二十匹在鎮綏輯流亡申明約束境內大治九年移鎮北平十三年召還進前軍都督府僉事十四年從潁川侯傅友德征雲南與陳桓胡海分道進攻赤水河路久雨河水暴漲英斬木為筏乘夜濟比曉抵賊營賊大驚潰擒烏撒並阿容等攻克曲靖陸涼越州關索嶺椅子寨降大理金齒廣南平諸山寨十六年復從友德平蒙化鄧川濟金沙取北勝麗江前後斬首一萬三千餘級生擒二千餘人收精甲數萬船千餘艘十七年論平雲南功封武定侯食祿二千五百石豫世券十八年加靖海將軍鎮守遼東二十年從大將軍馮勝出金山納哈出降進征虜右副將軍從藍玉至捕魚兒海師還賞賚甚厚遣還鄉明年召入京命典禁兵三十年副征西將軍耿炳文備邊陝西平沔縣賊高福興及還御史裴承祖劾英私養家奴百五十餘人又擅殺男女五人帝弗問僉都御史張春等執奏不已乃命諸戚里大臣議其罪議上竟宥之建文時從耿炳文李景隆伐燕無功靖難後罷歸第永樂元年卒年六十七贈營國公諡威襄英孝友通書史行師有紀律以忠謹見親於太祖又以寧妃故恩寵尤渥諸功臣莫敢望焉子十二人鎮尚永嘉公主銘遼府典寶鏞中軍右都督女九人二為遼郢王妃女孫為仁宗貴妃銘出也以故銘子玹得嗣侯宣德中玹署宗人府事奪河間民田廬又奪天津屯田千畝罪其奴而宥玹英宗初永嘉公主乞以其子珍嗣侯珍英嫡孫也授錦衣衛指揮僉事玹卒子聰與珍爭嗣遂並停襲亦授聰如珍官天順元年珍子昌以詔恩得襲聰爭之不得昌卒子良當嗣聰又言良非昌子復停嗣授指揮僉事以屢乞嗣下獄尋釋復官既而郭宗人共乞擇英孫一人嗣英爵廷臣皆言良本英嫡孫宜嗣侯詔可正德初卒子勛嗣勛桀黠有智數頗涉書史正德中鎮兩廣入掌三千營世宗初掌團營大禮議起勛知上意首右張璁世宗大愛幸之勛怙寵頗驕恣大學士楊一清惡之因其賕請事覺罷營務奪保傅官階一清罷仍總五軍營董四郊興造明年督團營十八年兼領後府從幸承天請以五世祖英侑享太廟廷臣持不可侍郎唐胄爭尤力帝不聽英竟得侑享其明年獻皇稱宗入太廟進勛翊國公加太師先是妖人李福達自言能化藥物為金銀勛與相昵福達敗力持其獄廷臣多得罪者至是復進方士段朝用云以其所化金銀為飲食器可不死帝益以為忠給事中戚賢劾勛擅作威福網利虐民諸事李鳳來等復以為言下有司勘勛京師店舍多至千餘區副都御史胡守中又劾勛以族叔郭憲理刑東廠肆虐無辜帝置勿治會帝用言官言給勛敕與兵部尚書王廷相遂安伯陳譓同清軍役敕具勛不領言官劾其作威植黨勛疏辨有何必更勞賜敕語帝乃大怒責其強悖無人臣禮於是給事中高時盡發勛奸利事且言交通張延齡帝益怒下勛錦衣獄二十年九月也尋諭鎮撫司勿加刑訊奏上當勛死罪帝令法司覆勘而給事中劉大直復勘勛亂政十二罪請併治法司乃盡實諸疏中罪狀當勛罪絞帝令詳議法司更當勛不軌罪斬沒入妻孥田宅奏上留中不下帝意欲寬勛屢示意指而廷臣惡勛甚謬為不喻者更坐勛重辟明年考察言官特旨貶高時二級以風廷臣廷臣終莫為勛請其冬勛死獄中帝憐之責法司淹繫褫刑部尚書吳山職侍郎都御史以下鐫降有差而免勛籍沒僅奪誥券而已自明興以來勳臣不與政事惟勛以挾恩寵擅朝權恣為姦慝致敗勛死數年其子守乾嗣侯傳至曾孫培民崇禎末死於賊華雲龍定遠人聚衆居韭山太祖起兵來歸從克滁和為千夫長從渡江破采石水寨及方山營下集慶路生擒元將得兵萬人克鎮江遷總管攻拔廣德戰舊館擒湯元帥進右副元帥龍江之役雲龍伏石灰山接戰殺傷相當雲龍躍馬大呼搗其中堅遂大敗友諒兵乘勝復太平從下九江南昌分兵攻下瑞州臨江吉安從援安豐戰彭蠡平武昌纍功至豹韜衛指揮使從徐達帥兵取高郵進克淮安遂命守之改淮安衛指揮使尋攻嘉興降吳將宋興圍平江軍於胥門從大軍北征徇下山東郡縣與徐達會師通州進克元都擢大都督府僉事總六衛兵留守兼北平行省參知政事踰年攻下雲州獲平章火兒忽答右丞哈海進都督同知兼燕王左相洪武三年冬論功封淮安侯祿一千五百石豫世券雲龍上言北平邊塞東自永平薊州西至灰嶺下隘口一百二十一相去可二千二百里其王平口至官坐嶺隘口九相去五百餘里俱衝要宜設兵紫荊關及蘆花山嶺尤要害宜設千戶守禦所又言前大兵克永平留故元八翼軍士千六百人屯田人月支糧五斗所得不償費宜入燕山諸衛補伍操練俱從之行邊至雲州襲元平章僧家奴營於牙頭突入其帳擒之盡俘其衆至上都大石崖攻克劉學士諸寨驢兒國公奔漠北自是無內犯者威名大著建燕邸增築北平城皆其經畫洪武七年有言雲龍據元相脫脫第宅僭用故元宮中物召還命何文輝往代未至京道卒子中襲李文忠之卒也中侍疾進藥坐貶死二十三年追論中胡黨爵除韓政睢人嘗為義兵元帥帥衆歸太祖授江淮行省平章政事李濟據濠州名為張士誠守實觀望太祖使右相國李善長以書招之不報太祖歎曰濠吾家也濟如此我有國無家可乎乃命政帥指揮顧時以雲梯炮石四面攻濠濟度不能支始出降政歸濟於應天太祖大悅以時守濠州政從徐達攻安豐扼其四門潛穴城東龍尾壩入其城二十餘丈城壞遂破之元將欣都竹貞左君弼皆走追奔四十餘里擒都俄而貞引兵來援與戰城南門再破走之淮東西悉平已從大軍平吳又從北伐降梁城守將盧斌分兵扼黃河斷山東援軍遂取益都濟寧濟南皆有功克東平功尤多改山東行省平章政事以師會大將軍於臨清檄政守東昌既下大都命政分兵守廣平政遂諭降白土諸寨移守彰德下蟻尖寨蟻尖者在林慮西北二十里為元右丞吳庸王居義小鎖兒所據大將軍之北伐也遣將士收復諸山寨降者相繼蟻尖獨恃險不下至是兵逼之庸誘殺居義及小鎖兒以降得士卒萬餘人尋調征陝西還兵守禦河北洪武三年封東平侯祿千五百石豫世券移鎮山東未幾復移河北招撫流民復業甚衆從左副將軍李文忠搗應昌至臚朐河文忠深入令政守輜重還命巡河南陝西再從信國公湯和練兵於臨清十一年二月卒帝親臨其喪追封鄆國公子勳襲二十六年坐藍黨誅爵除仇成含山人初從軍充萬戶屢遷至秦淮翼副元帥太祖攻安慶敵固守不戰廖永忠張志雄破其水寨成以陸兵乘之遂克安慶初元左丞余闕守安慶陳友諒將趙普勝陷之友諒既殺普勝元帥余某者襲取之張定邊復來犯余帥走死至是以成為橫海指揮同知守其地時左君弼據廬州羅友賢以池州叛無為知州董曾陷死四面皆賊境成撫集軍民守禦嚴密漢兵不敢東下從征鄱陽殲敵涇江口功最征平江敗張士誠兵於城西南洪武三年僉大都督府事鎮遼東久之以屯戍無功降永平衛指揮使尋復官十二年論藍玉等征西功當封帝念成舊勳先封為安慶侯歲祿二千石二十年充征南副將軍討平容美諸峒復從大軍征雲南功多豫世券加祿五百石二十一年七月有疾賜內醞手詔存問卒贈皖國公諡莊襄子正襲爵張龍濠人從渡江定常州寧國婺州皆有功從征江州為都先鋒平武昌授花槍所千戶從平淮東守禦海安與張士誠將戰於海口擒彭元帥俘其卒數百進攻通州擊斬賊將擢威武衛指揮僉事從平山東河南大兵克潼關以龍為副留守洪武三年調守鳳翔改鳳翔衛指揮賀宗哲悉衆圍城龍固守宗哲攻北門龍出兵搏戰矢傷右脅不為動遂大敗之進克鳳州擒李參政等二十餘人大將軍達入沔州遣龍別將一軍由鳳翔入連雲棧攻興元降其守將劉思忠蜀將吳友仁來犯龍擊却之友仁復悉兵薄城大治攻具龍從北門突出繞友仁軍後敵盡棄甲仗走自是不復窺興元召僉大都督府事十一年副李文忠征西番洮州論功封鳳翔侯祿二千石世指揮使復從傅友德征雲南鎮七星關破大理鶴慶平諸洞蠻加祿五百石豫世券二十年從馮勝出金山降納哈出明年勝調降軍征雲南次常德叛去龍追至重慶收捕之二十三年春同延安侯唐勝宗督屯田於平越鎮遠貴州議置龍里衛都勻亂佐藍玉討平之以老疾請告三十年卒子麟尚福清公主授駙馬都尉孫傑侍公主京師永樂初失侯傑子嗣宣德十年援詔恩乞嗣吏部言龍侯不嗣者四十年不許吳復字伯起合肥人少負勇略元末集衆保鄉里歸太祖於濠從克泗滁和采石太平纍官萬戶從破蠻子海牙水寨定集慶從徐達攻鎮江斬元平章定定下丹陽金壇克常州進統軍元帥徇江陰無錫還守常州張士誠兵奄至力戰敗之追奔至長興連敗之於高橋太湖及忠節門士誠奪氣從援安豐平武昌從徐達克廬州下漢沔荊諸郡縣授鎮武衛指揮同知守沔陽從常遇春下襄陽別將破安陸擒元同僉任亮遂守之克汝州魯山洪武元年授懷遠將軍安陸衛指揮使悉平鄖均房竹諸山寨之不附者三年從大將軍征陝西敗擴廓擒其將又敗擴廓於秦州征吐番克河州援漢中拔南鄭明年從傅友德平蜀又明年從鄧愈平九溪辰州諸蠻克四十八洞還守安陸七年進大都督府僉事巡北平還授世襲指揮使十一年從沐英再征西番擒三副使得納鄰哈七站之地明年師還論功封安陸侯食祿二千石十四年從傅友德征雲南克普定城水西充總兵官剿捕諸蠻遂由關索嶺開箐道取廣西十六年克墨定苗至吉剌堡築安莊新城平七百房諸寨斬獲萬計轉餉盤江是年十月金瘡發卒於普定追封黔國公諡威毅加祿五百石豫世券復臨陳奮發衝犯矢石體無完膚平居恂恂口不言征伐事在普定買妾楊氏年十七復死視殮畢沐浴更衣自經死封貞烈淑人子傑嗣屢出山陝河南北平練兵從征二十八年有罪從征龍州建功自贖建文中帥師援真定戰白溝河失律謫南寧衛指揮使永樂元年子璟乞嗣正統間再三乞皆不許弘治六年璟孫鐸援詔乞嗣亦不許十八年録復子孫世職千戶初與復以征西番功侯者又有周武武開州人從定江東滅漢收淮東平吳積功為指揮僉事從定中原進都督僉事洪武十一年以參將從沐英討西番𩽆甘功多師還封雄武侯祿二千石世指揮使出理河南軍務巡撫北邊二十三年卒贈汝國公諡勇襄胡海字海洋定遠人嘗入土豪赤塘王總管營自拔來歸授百戶從敗元將賈魯兵克泗滁進萬戶從渡江拔蠻子海牙水寨破陳野先兵從取集慶鎮江敗元將謝國璽於寧國選充先鋒從大軍圍湖州墮其東南門月城從攻宜興下婺州鏖戰紹興生得賊四百餘人進都先鋒又從戰龍江克安慶與漢人相持八戰皆大捷遂入江州從徐達攻廬州皆有功海驍勇屢戰屢傷手足胸腹間金痍皆遍而鬬益力士卒從之者無不激勵自效太祖壯之授花槍上千戶復從大軍克荊澧衡潭擢寶慶衛指揮僉事遷指揮使命鎮益陽從平章楊璟征湖南廣西未下郡縣由祁陽進圍永州與守兵戰於東鄉橋生得千萬戶四人以夜半先登拔之抵靖江戰南門生得萬戶二人夜四鼓自北門八角亭先登功最命為左副總兵剿平左江上思蠻調征蜀克龍伏隘天門山及溫湯關豫世襲指揮使仍鎮益陽武岡靖州五開諸苗蠻先後作亂悉捕誅首亂而撫其餘衆遷都督僉事十四年從征雲南由永寧趨烏撒進克可渡河與副將軍沐英會師攻大理敵悉衆扼上下關定遠侯王弼自洱水東趨上關英帥大軍趨下關而遣海以夜四鼓取石門間道渡河繞點蒼山後攀大樹緣崖而上立旗幟英士卒望見皆踴躍大呼敵衆驚擾英遂斬關入海亦麾山上軍馳下前後夾攻敵悉潰走十七年論功封東川侯祿二千五百石豫世券踰三年以左參將從征金山又二年以征南將軍討平澧州九溪諸蠻寇師還乞歸鄉里厚賚金帛以行二十四年七月病疽卒年六十三長子斌龍虎衛指揮使從征雲南過曲靖猝遇寇中飛矢卒贈都督同知次玉坐藍黨死次觀尚南康公主為駙馬都尉未嗣卒宣德中公主乞以子忠嗣詔授孝陵衛指揮僉事豫世襲張赫臨淮人江淮大亂團義兵以捍鄉里嘉山繆把頭招之不往聞太祖起帥衆來附授千戶以功進萬戶從渡江所至攻伐皆預以功擢常春翼元帥守禦常州尋從戰鄱陽攻武昌已又從大將軍伐張士誠進圍平江諸將分門而軍赫軍閶門士誠屢出兵突戰屢挫其鋒又從大軍克慶元並下溫台洪武元年擢福州衛都指揮副使進本衛同知復命署都指揮使司事是時倭寇出沒海島中乘間輒傅岸剽掠沿海居民患苦之帝數遣使齎詔書諭日本國王又數絶日本貢使然竟不得倭人要領赫在海上久所捕倭不可勝計最後追寇至琉球大洋與戰擒其魁十八人斬首數十級獲倭船十餘艘收弓刀器械無算帝偉赫功命掌都指揮印尋調興化衛召還擢大都督府僉事會遼東漕運艱軍食後期帝深以為慮以赫習海道命督海運事久之封航海侯豫世券前後往來遼東十二年凡督十運勞勩備至軍中賴以無乏病卒追封恩國公諡莊簡子榮從征雲南有功為水軍右衛指揮使孫鑑福建都指揮使永樂中留鎮交址華高和州人與俞通海等以巢湖水師來附從克太平授總管從破采石方山兵下集慶鎮江遷秦淮翼元帥與鄧愈徇廣德守將嚴兵城下高以數騎挑戰元兵堅壁不動高衝擊大破之遂取其城得兵萬人糧數千斛從平常州進僉行樞密院事副俞通海擊破趙普勝柵江營再敗陳友諒援長興克武昌授湖廣行省左丞帥舟師從克淮東收浙西進行省平章政事洪武三年封廣德侯歲祿六百石高性怯且無子請得宿衛有所征討輒稱疾不行令練水師復以不習辭帝以故舊優容之時諸勳臣多出行邊惟高不遣最後繕廣東邊海城堡高請行帝曰卿復自力甚善四年四月事竣至瓊州卒初有言高殖利者故歲祿獨薄至是貧不能葬帝憐之命補支祿三百石以無子納誥券墓中贈巢國公諡武莊授從子嶽指揮僉事張銓定遠人從取太平定集慶鎮江常州婺州搗江州戰鄱陽湖取鄂渚收淮東平吳纍功為指揮僉事從取中原燕晉秦蜀進都督僉事使建齊王府事竣副江夏侯周德興征五溪蠻已而水盡源通塔平散毛諸洞酋作亂復副德興討平之從征雲南由永寧克烏撒久之復從傅友德平烏撒及曲靖普定龍海孟定諸蠻洪武二十三年封永定侯食祿千五百石世指揮使何真字邦佐東莞人少英偉好書劍元至正初為河源縣務副使轉淡水場管勾棄官歸元末盜起真聚衆保鄉里十四年縣人王成陳仲玉作亂真赴告元帥府帥受賂反捕真逃居泥岡舉兵攻成不克久之惠州人王仲剛與叛將黃常據惠真擊走常殺仲剛以功授惠陽路同知廣東都元帥守惠州海寇邵宗愚陷廣州真以兵破走之復其城擢廣東分省參政尋擢右丞贛州熊天瑞引舟師數萬欲圖真真迎之胥江天大雷雨折天瑞舟檣擊走之廣人賴以完先是真再攻成誅仲玉而成卒固守二十六年復圍成募擒成者豫鈔十千成奴縛成以出真豫之鈔命具湯鑊趨烹奴號於衆曰奴叛主者視此緣海叛者皆降時中原大亂嶺表隔絶有勸真效尉他故事者不聽屢遣使由海道貢方物於朝纍進資德大夫行省左丞洪武元年太祖命廖永忠為征南將軍帥舟師取廣東永忠至福州以書諭真遂航海趨潮州師既至真遣都事劉克佐詣軍門上印章籍所部郡縣戶口兵糧奉表以降永忠聞於朝賜詔褒真曰朕惟古之豪傑保境安民以待有德若竇融李績之屬擁兵據險角立羣雄間非真主不屈此漢唐名臣於今未見爾真連數郡之衆乃不煩一兵保境來歸雖竇李奚讓焉永忠抵東莞真帥官屬迎勞遂奉詔入朝擢江西行省參知政事且諭之曰天下分爭所謂豪傑有三易亂為治者上也保民達變知所歸者次也負固偷安身死不悔斯其下矣卿輸誠納土不逆顏行可謂識時務者真頓首謝在官頗著聲望尤喜儒術讀書綴文已轉山東參政四年命還廣東收集舊卒事竣仍蒞山東九年致仕大軍征雲南命真偕其子兵馬指揮貴往規畫軍餉置郵驛遷山西右布政使再與貴勾軍廣東擢貴鎮南衛指揮僉事尋命真為浙江布政使改湖廣二十年復致仕封東莞伯祿一千五百石豫世券卒子榮嗣與弟貴及尚寶司丞宏皆坐藍黨死真弟迪疑禍及己遂作亂擊殺南海官軍三百餘人遁入海島廣東都司發兵討擒之伏誅贊曰陳友諒之克太平也其鋒甚鋭微茂才則金陵之安危未可知矣吳良守江陰耿炳文守長興而吳人不得肆其志締造之基其力為多至若華雲龍張赫吳復胡海之屬或威著邊疆或功存海運搴旗陷陳所向皆摧揆之前代功臣何多讓焉而又皆能保守祿位以恩禮令終斯其尤足嘉美者歟
