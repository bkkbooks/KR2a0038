body:
  text: 明史卷一百三十三列傳第二十一廖永安俞通海弟通源淵胡大海養子德濟欒鳳耿再成張德勝汪興祖趙德勝南昌康郎山兩廟忠臣附桑世傑劉成茅成楊國興胡深孫興祖曹良臣周顯常榮張耀濮英于光等廖永安字彥敬德慶侯永忠兄也太祖初起永安兄弟偕俞通海等以舟師自巢湖來歸太祖親往收其軍遂以舟師攻元中丞蠻子海牙於馬場河元人駕樓船不利進退而永安輩操舟若飛再戰再破元兵始定渡江策頃之發江口永安舉帆請所向命直指牛渚西北風方驟頃刻達岸太祖急揮甲士鼓勇以登采石鎮兵皆潰遂乘勝取太平授管軍總管以舟師破海牙水柵擒陳兆先入集慶擢建康翼統軍元帥以舟師從取鎮江克常州擢同僉江南行樞密院事又以舟師同常遇春自銅陵趨池州合攻破其北門執徐壽輝守將遂克池州偕俞通海拔江陰之石牌戍降張士誠守將欒瑞擢同知樞密院事又以舟師破士誠兵於常熟之福山港再破之通州之狼山獲其戰艦以歸遂從徐達復宜興乘勝深入太湖遇吳將呂珍與戰後軍不繼舟膠淺被執永安長水戰所至輒有功士誠愛其才勇欲降之不可為所囚太祖壯永安不屈遙授行省平章政事封楚國公永安被囚凡八年竟死於吳吳平喪還太祖迎祭於郊洪武六年帝念天下大定諸功臣如永安及俞通海張德勝耿再成胡大海趙德勝桑世傑皆已前沒猶未有諡號乃下禮部定議議曰有元失馭四海糜沸英傑之士或起義旅或保一方泯泯棼棼莫知所屬真人奮興不期自至龍行而雲虎嘯而風若楚國公臣永安等皆熊羆之士膂力之才非陷堅沒陳即罹變捐軀義與忠俱名耀天壤陛下混一天下追維舊勞爵祿及子孫蒸嘗著祀典易名定諡於禮為宜臣謹按諡法以赴敵逢難諡臣永安武閔殺身克戎諡臣通海忠烈奉上致果諡臣張德勝忠毅勝敵致強諡臣大海武莊闢土斥境武而不遂諡臣再成武壯折衝禦侮壯而有力諡臣趙德勝武桓臣世傑業封永義侯與漢世祖封寇恂景丹相類當即以為諡詔曰可九年皆加贈開國輔運推誠宣力武臣光祿大夫柱國已又改封永安鄖國公無子授其從子升為指揮僉事俞通海字碧泉其先濠人也父廷玉徙巢子三人通海通源淵元末盜起汝潁廷玉父子與趙普勝廖永安等結寨巢湖有水軍千艘數為廬州左君弼所窘遣通海間道歸太祖太祖方駐師和陽謀渡江無舟楫通海至大喜曰天贊我也親往撫其軍而趙普勝叛去元兵以樓船扼馬場河等口瀕湖惟一港可通亦久涸會天大雨水深丈餘乃引舟出江至和陽通海為人沉毅治軍嚴而有恩士樂為用巢湖諸將皆長於水戰而通海為最從破海牙諸水寨授萬戶從渡江克采石取太平徇下諸屬縣海牙復以戰艦截采石而陳兆先合淮兵二十萬屯方山相掎角通海與廖永安等擊之大敗其衆海牙遁進破兆先取集慶路從湯和拔鎮江遷秦淮翼元帥偕諸將取丹陽金壇常州遷行樞密院判官從克寧國下水陽因以舟師略太湖降張士誠守將於馬迹山艤舟胥口呂珍兵暴至諸將欲退通海曰不可彼衆我寡退則情見不如擊之乃身先疾鬬矢下如雨中右目不能戰命帳下士被己甲督戰敵以為通海也不敢逼徐解去由是一目遂眇已偕永安等克石牌戍奪馬馱沙而還普勝既叛歸友諒陷池州遣別將守而自據樅陽水寨太祖方征浙東以樅陽為憂通海往攻大破之普勝陸走盡獲其舟遂復池州遷僉樞密院事陳友諒犯龍灣偕諸將擊走之追焚其舟於慈湖擒七帥逐北至采石功最進樞密院同知從攻友諒下銅陵克九江掠蘄黃從徐達擊叛將祝宗康泰復南昌從援安豐敗士誠兵還攻廬州友諒大圍南昌從太祖擊之遇於康郎山舟小不能仰攻力戰幾不支通海乘風縱火焚其舟二十餘敵少挫太祖舟膠友諒驍將張定邊直前犯太祖舟常遇春射中定邊通海飛舸來援舟驟進水湧太祖舟得脫而通海舟復為敵巨艦所壓兵皆以頭抵艦兜鍪盡裂僅免明日復戰偕廖永忠等以七舟置火藥焚敵舟數百踰二日復以六舟深入敵連大艦力拒太祖登舵樓望久之無所見意已沒有頃六舟繞敵艦出飄颻若遊龍軍士歡譟勇氣百倍戰益力友諒兵大敗師次左蠡通海進曰湖有淺舟難回旋莫若入江據敵上流彼舟入即成擒矣遂移師出湖水陸結柵友諒不敢出居湖中一月食盡引兵突走竟敗死是役也通海功最多師還賜良田金帛明年從平武昌拜中書省平章政事總兵略劉家港進逼通州敗士誠兵擒其將朱瓊陳勝進攝江淮行中書省事鎮廬州從徐達平安豐又從克湖州略太倉秋毫不犯民大悅圍平江戰滅渡橋搗桃花塢中流矢創甚歸金陵太祖幸其第問曰平章知豫來問疾乎通海不能語太祖揮涕而出翼日卒年三十八太祖臨哭甚哀從官衛士皆感涕追封豫國公侑享太廟肖像功臣廟洪武三年改封虢國公諡忠烈通海父廷玉官僉樞密院事先卒追封河間郡公通海無子弟通源嗣其官通源字百川從大將軍征中原偕副將軍馮勝等會兵太原定河中渡河克鹿臺取鳳翔鞏昌涇州守開城會張良臣據慶陽再叛大將軍命諸將分兵蹙之通源自臨洮疾趨至涇略其西顧時略其北傅友德略其東陳德略其南大將軍逼城下良臣援絶糧盡敗死遂克慶陽征定西克興元皆先登洪武三年封南安侯歲祿千五百石豫世券四年從廖永忠伐蜀又從徐達出塞撫甘肅有功徙江南豪民十四萬田鳳陽又攻雲南征廣南蠻俘斬數萬二十二年詔還鄉賜鈔五萬置第於巢未行卒子祖病不能嗣逾年追論胡黨以通源死不問爵除淵以父兄故充參侍舍人從征積功授都督僉事通源既坐黨太祖念廷玉通海功二十五年封淵越巂侯歲祿二千五百石豫世券帥師討建昌叛賊城越巂明年坐纍失侯遣還里建文元年召復爵隨大軍征燕戰沒於白溝河次子靖嗣官胡大海字通甫虹人長身鐵面智力過人太祖初起大海走謁滁陽命為前鋒從渡江與諸將略地以功授右翼統軍元帥宿衛帳下從破寧國副院判鄧愈戍之遂拔徽州略定其境內元將楊完者以十萬衆來攻大海戰城下大破走之遂與鄧愈李文忠自昱嶺關攻建德敗元師於淳安遂克建德再敗楊完者降溪洞兵三萬人進樞密院判官克蘭溪從取婺州遷僉樞密院事下諸暨守將宵遁萬戶沈勝既降復叛大海擊敗之生擒四千餘人改諸暨為諸全州移兵攻紹興再破張士誠兵太祖以寧越重地召大海使守之士誠將呂珍圍諸全大海救之珍堰水灌城大海奪堰反灌珍營珍勢蹙於馬上折矢誓請各解兵許之郎中王愷曰珍猾賊不可信不如因擊之大海曰言出而背之不信既縱而擊之不武師還人皆服其威信尋攻處州走元將石抹宜孫遂定處州七邑陳友諒寇龍江命分軍搗信州以牽制敵大海用王愷言親引兵往遂克信州以為廣信府信方絶糧或勸還師大海曰此閩楚襟喉地也可棄之乎築城浚隍以守之先是軍糧少所得郡縣將士皆徵糧於民名曰寨糧民甚病之大海以為言始命罷去進江南行省參知政事鎮金華初嚴州既下苗將蔣英劉震李福皆自桐廬來歸大海喜其驍勇留置麾下至是三人者謀作亂晨入分省署請大海觀弩於八詠樓大海出英遣其黨跪馬前詐訴英過大海未及答反顧英英出袖中槌擊大海中腦仆地並其子關住郎中王愷皆遇害英等大掠城中奔於吳其後李文忠攻杭州杭人執英以降太祖命誅英刺其血以祭大海大海善用兵每自誦曰吾武人不知書惟知三事而已不殺人不掠婦女不焚毀廬舍以是軍行遠近爭附及死聞者無不流涕又好士所至輒訪求豪雋劉基宋濂葉琛章溢之見聘也大海實薦之追封越國公諡武莊肖像功臣廟配享太廟初太祖克婺州禁釀酒大海子首犯之太祖怒欲行法時大海方征越都事王愷請勿誅以安大海心太祖曰寧可使大海叛我不可使我法不行竟手刃之及關住復被殺大海遂無後養子德濟字世美不知何許人大海帥以歸太祖從攻婺州為誘兵大破元兵於梅花門外擒其將季彌章由是知名既下信州太祖以德濟為行樞密院同僉使守之陳友諒將李明道來寇德濟與力戰大海來援夾擊之擒明道及其宣慰王漢二及大海為蔣英所害處州降將李祐之亦殺院判耿再成以叛張士誠聞浙東亂遣其弟士信寇諸全德濟自信州往救乘懈得入城與知州欒鳳院判謝再興分門守夜半出敵不意砍士信營破走之擢浙江行省參知政事移守新城士誠將李伯升帥步騎大入寇德濟固守乞師於李文忠文忠馳救德濟出兵夾擊大破之詳文忠傳時德濟所部有潛移家入新城者文忠疑德濟使然誅其都事羅彥敬欲微戒德濟將士皆怒走告德濟德濟怡然曰右丞殺彥敬自為廣信作戰衣有弊耳再言者斬於是太祖召德濟褒諭之而責文忠失將士心且曰胡德濟之量汝不及也擢浙江行省右丞賜駿馬未幾改左丞移鎮杭州從大將軍徐達出定西德濟軍失利達斬其部將數人械至京師帝念舊功釋之復以為都指揮使鎮陝西卒欒鳳高郵人知諸全有能聲方士信來攻與謝再興力守數出奇兵挫敵再興使部校鬻貨於杭太祖慮其輸我軍虛實召再興還而以參軍李夢庚總制諸全軍馬既而念再興功為兄子文正娶其長女命徐達娶其幼女復遣守諸全再興忿夢庚出己上鳳復以細故繩之遂叛殺鳳鳳妻王氏以身蔽鳳並殺之執夢庚降於士誠夢庚亦死之太祖以再興數有功叛非其志故鳳與夢庚皆不得恤云耿再成字德甫五河人從太祖於濠克泗滁州元兵圍六合太祖救之與再成軍瓦梁壘力戰度不敵引還元兵尾至太祖設伏澗側令再成誘敵大敗之以鎮撫從渡江下集慶以元帥守鎮江以行樞密院判官守長興再守揚州從取金華為前鋒屯縉雲之黃龍山以遏敵衝與胡大海破石抹宜孫於處州克其城守之宜孫來攻又敗之慶元再成持軍嚴士卒出入民間蔬果無所捐金華苗帥蔣英等叛殺胡大海處州苗帥李祐之等聞之亦作亂再成方對客飯聞變上馬收戰卒不滿二十人迎賊罵曰賊奴國家何負汝乃反賊攢槊刺再成再成揮劍連斷數槊中傷墜馬大罵不絶口死胡深等收其尸藁葬之後改葬金陵聚寶山追封高陽郡公侑享太廟肖像功臣廟洪武十年加贈泗國公諡武壯子天璧聞父難糾部曲殺賊比至李文忠已破賊斬之遂以天璧守處州拒方國珍張士誠皆有功擢指揮副使克浦城搗建寧走陳友定征襄陽進至西安招諭河州臨洮皆下改杭州指揮同知七年出海捕倭深入外洋溺死張德勝字仁輔合肥人才略雄邁與俞通海等以舟師自巢來歸從渡江克采石太平陳野先來攻與湯和等破擒之授太平興國翼總管破蠻子海牙水寨擒陳兆先下集慶克鎮江授秦淮翼元帥取常州擢樞密院判克寧國收長槍兵下太湖略馬迹山攻宜興取馬馱沙及石牌寨進僉樞密院事趙普勝陷池州德勝往援弗及還從徐達拔宜興普勝復掠青陽石埭德勝與戰柵江口破走之已復同通海擊敗其衆遂復池州引兵自無為趨浮山走普勝將胡總管追敗之青山逐北至潛山陳友諒將郭泰逆戰沙河破斬之遂克潛山友諒犯龍江德勝總舟師迎戰殺傷相當德勝大呼麾諸將奮擊友諒軍披靡遂大敗與諸將追及之慈湖縱火焚其舟至采石大戰沒於陳追封蔡國公諡忠毅肖像功臣廟侑享太廟子宣幼養子興祖嗣職興祖巢人本汪姓既嗣職從破安慶克江州拔蘄黃取南昌從援安豐大敗張士誠兵鄱陽之戰與廖永忠等以六舟深入又邀擊友諒於涇江口功最擢湖廣行省參政從平武昌遂克廬州略地至通州而還進大都督府僉事從徐達取淮東下浙西進同知大都督府事大軍北征別將衛軍由徐州克沂青東平乘勝至東阿降元參政陳璧及所部五萬餘人孔子五十六世孫衍聖公希學帥曲阜知縣希舉鄒縣主簿孟思諒等迎謁於軍門興祖禮之兗東州縣聞風皆下遂取濟寧濟南洪武元年以都督兼右率府使從攻樂安克汴梁河洛還守濟寧與大將軍會師德州帥舟師並河進遂克元都徇下永平西取大同將三衛卒守之再敗元兵斬獲無算時德勝子宣已長命為宣武衛指揮同知而興祖復姓為汪三年進克武朔二州獲元知院馬廣等帥兵至大同北口大敗元兵獲擴廓弟金剛奴等四百餘人未幾命為晉王武傅兼山西行都督府僉事四年從前將軍傅友德合兵伐蜀克階文乘勝至五里關中飛石死蜀平詔都督興祖歿於王事優賞其子追封東勝侯豫世券興祖子幼命與宣同居以疾卒爵除趙德勝濠人為元義兵長善馬槊每戰先登隸王忙哥麾下察其必敗太祖取滁陽德勝母在軍中乃棄其妻來從太祖喜賜之名為帳前先鋒從取鐵佛岡攻三汊河破張家寨克全椒後河諸寨援六合中流矢幾殆擊雞籠山搗烏江下和州含山夜襲陳野先營拔板門鐵長官二寨遂取儀真授總管府先鋒從渡江下太平克蕪湖句容溧水溧陽皆有功從常遇春敗蠻子海牙於采石破陳兆先營於方山下集慶功最從徐達取鎮江破苗軍水寨下丹陽金壇平寧國轉領軍先鋒取廣德破張士誠水寨復從遇春攻常州解牛塘圍復廣德寧國取江陰攻常熟擒張士德從攻湖州宜興叛還兵定之擢中翼左副元帥陳友諒犯龍江龍江第一關曰虎口城太祖以屬德勝友諒至力戰伏兵起友諒大敗遂復太平下銅陵臨山寨略黃山橋及馬馱沙征高郵有功進後翼統軍元帥從太祖西征破安慶水寨乘風泝小孤山距九江五里友諒始知倉皇遁去遂克九江徇黃梅廣濟克瑞昌臨江吉安還下安慶進克撫州取新淦討南昌叛將復其城炮傷肩授僉江南行樞密院事與朱文正鄧愈共守南昌平羅友賢於池州破友諒將於西山復臨江吉安撫州未幾友諒大舉兵圍南昌德勝帥所部數千背城逆戰射殺其將敵大沮明日復合環城數匝友諒親督戰晝夜攻城且壞德勝帥諸將死戰且戰且築城壞復完暮坐城門樓指揮士卒弩中腰膂鏃入六寸拔出之歎曰吾自壯歲從軍傷矢石屢矣無重此者丈夫死不恨恨不能掃清中原耳言畢而絶年三十九追封梁國公諡武桓列祀功臣廟配享太廟德勝剛直沉鷙馭下嚴肅未嘗讀書臨機應變動合古法平居篤孝友如修士友諒圍南昌八十五日先後戰死者凡十四人張子明者領兵千戶也洪都圍久內外隔絶朱文正遣子明告急於應天以東湖小漁舟從水關潛出夜行晝止半月始得達太祖問友諒兵勢對曰兵雖盛戰鬬死者不少今江水日涸賊巨艦將不利援至可破也太祖謂子明歸語而帥堅守一月吾自取之還至湖口為友諒所獲令誘城中降子明佯諾至城下大呼我張大舍已見主上令諸公堅守救且至賊怒攢槊殺之追封忠節侯友諒攻撫州樞密院判李繼先乘城戰死左翼元帥牛海龍突圍死左副元帥趙國旺引兵燒戰艦敵追至投橋下死百戶徐明躍馬出射賊賊知明名併力攻被執死軍士張德山夜半潛出城焚賊舟賊覺死夏茂成守城樓中飛炮死右翼元帥同知朱潛統軍元帥許圭俱戰死蔣必勝陷吉安參政劉齊知府朱文華被執不屈死趙天麟守臨江友諒攻之城陷不屈死祝宗康泰叛陷洪都知府葉琛與行省都事萬思誠迎戰皆死事平皆贈爵侯伯以下有差立忠臣廟於豫章並祠十四人以德勝為首而康郎山戰死者三十五人首丁普郎普郎初為陳友諒將守小孤山偕傅友德來降授行樞密院同知數有功及援南昌大戰鄱陽湖自辰至午普郎身被十餘創首脫猶直立執兵作鬬狀敵驚為神時七月己丑也追贈濟陽郡公張志雄亦友諒將素驍勇號長張從趙普勝守安慶友諒殺普勝志雄怨來降為樞密院判至是舟檣折敵攢刺之知不能脫遂自刎元帥余昶右元帥陳弼徐公輔皆以其日戰沒先一日左副指揮韓成元帥宋貴陳兆先戰沒兆先者野先從子既被擒太祖以其兵備宿衛感帝大度效死力至是戰死韓成子觀至都督別有傳越四日辛卯復大戰副元帥昌文貴左元帥李信王勝劉義死八月壬戌扼敵涇江口同知元帥李志高副使王咬住亦戰死其他偏裨死事者千戶薑潤王鳳顯石明王德朱鼎王清常德勝袁華陳沖王喜仙汪澤丁宇史德勝裴軫王理王仁鎮撫常惟德鄭興逯德山羅世榮曹信凡贈公一人侯十二人伯二人子十五人男六人肖像康郎山忠臣廟有司歲致祭又程國勝者徽人以義兵元帥來歸敗楊完者纍功至萬戶守南昌與牛海龍夜劫友諒營海龍中流矢死國勝泅水得脫抵金陵從太祖戰鄱陽張定邊直前犯太祖舟國勝與韓成陳兆先駕舸左右奮擊太祖舟脫國勝等繞出敵艦後援絶力戰死而南昌城中謂國勝已前死故豫章康山兩廟俱得預祀云桑世傑無為人亦自巢湖來歸趙普勝有異志世傑發其謀普勝逸去從渡江以舟師破元水軍授秦淮翼元帥下鎮江徇金壇丹陽攻寧國長槍諸軍克水陽平常州判行樞密院事略地江陰宜興初石牌民朱定販鹽無賴與富民趙氏有隙遂告變滅趙氏授江陰判官尋復為盜元遣兵捕之定聞張士誠據高郵乃導士誠由通州渡江遂陷平江以定為參政而遣元帥欒瑞戍石牌及大兵既取江陰瑞尚據石牌導舟師往來太祖命永安及世傑擊之世傑力戰死瑞亦降張氏窺江路絶太祖念其功贈安遠大將軍輕車都尉永義侯侑享太廟子敬以父死事纍官都督府僉事洪武二十三年封徽先伯歲祿千七百石豫世券明年同徐輝祖等防邊尋令屯軍平陽坐藍玉黨死又劉成者靈璧人以統兵總管從耿炳文定長興為永興翼左副元帥數佐炳文敗士誠兵李伯升以十萬衆來攻城中兵僅七千太祖遣兵援之未至炳文嬰城守成引數十騎出西門擊敗伯升兵擒其將宋元帥轉至東門敵悉兵圍之遂戰死贈懷遠將軍立廟長興茅成定遠人自和州從軍隸常遇春麾下克太平始授萬戶從定常州寧國進總管克衢州授副元帥守金華改太平興國翼元帥從克安慶援安豐戰鄱陽克武昌授武德衛千戶尋進指揮副使取贛州安陸襄陽泰州皆有功從徐達攻平江焚張士誠戰船築長圍困之達攻婁門士誠出兵戰成擊敗之突至外郛中叉死贈東海郡公祀功臣廟同時死者有楊國興亦定遠人以右翼元帥守宜興初常州人陳保二聚衆號黃包軍既降復叛誘執詹李二將國興執斬之授神武衛指揮使至是攻閶門戰死以其子益襲指揮使胡深字仲淵處州龍泉人穎異有智略通經史百家之學元末兵亂嘆曰浙東地氣盡白禍將及矣乃集里中子弟自保石抹宜孫以萬戶鎮處州辟參軍事募兵數千收捕諸山寇溫州韓虎等殺主將叛深往諭之軍民感泣殺虎以城降已偕章溢討龍泉之亂搜旁縣盜以次平之宜孫時已進行省參政承制命深為元帥戊戌十二月太祖親征婺州深帥兵車數百輛往援至松溪不能救敗去婺遂下明年耿再成侵處州宜孫分遣元帥葉琛參謀林彬祖鎮撫陳中真及深帥兵拒戰會胡大海兵至與再成合大破之進抵城下宜孫戰敗與葉琛章溢走建寧處州遂下深以龍泉慶元松陽遂昌四縣降太祖素知深名召見授左司員外郎遣還處州招集部曲從征江西既定命以親軍指揮守吉安處州苗軍叛殺守將耿再成深從平章邵榮討誅之會改中書分省為浙東行中書省遂以深為行省左右司郎中總制處州軍民事時山寇竊發人情未固深募兵萬餘人捕誅渠帥沿海軍素驍誅其尤橫者數人患遂息癸卯九月諸全叛將謝再興以張士誠兵犯東陽左丞李文忠令深引兵為前鋒再興敗走深建議以諸全為浙東藩屏乃度地去諸全五十里並五指山築新城分兵戍守太祖初聞再興叛急馳使詣文忠別為城守計至則工已竣後士誠將李伯升大舉來侵頓新城下不能拔敗去太祖嘉深功賜以名馬太祖稱吳王以深為王府參軍仍守處州溫州豪周宗道聚衆據平陽數為方國珍從子明善所逼以城來歸明善怒攻之深遣兵擊走明善遂下瑞安進兵溫州方氏懼請歲輸銀三萬充軍實乃命深班師復還鎮陳友定兵至破之追至浦城又敗其守兵城遂下進拔松溪獲其守將張子玉因請發廣信撫州建昌三路兵規取八閩太祖喜曰子玉驍將擒之則友定破膽乘勢攻之理無不克因命廣信指揮朱亮祖由鉛山建昌左丞王溥由杉關會深齊進已亮祖等克崇安進攻建寧友定將阮德柔固守深視氛祲不利欲緩之亮祖曰師已至此庸可緩乎且天道幽遠山澤之氣變態無常何足徵也時德柔兵屯錦江逼深陳後亮祖督戰益急深引兵還擊破其二柵德柔軍力戰友定自以鋭師夾擊日已暮深突圍走馬蹶被執遂遇害年五十二追封縉雲郡伯太祖嘗問宋濂曰胡深何如人對曰文武才也太祖曰誠然浙東一障吾方賴之而深以久任鄉郡志圖平閩以報效竟以死徇深馭衆寬厚用兵十餘年未嘗妄戮一人守處州興學造士縉雲田稅重以新沒入田租償其數鹽稅什一請半取之以通商賈軍民皆懷其惠云孫興祖濠人從太祖渡江積功為都先鋒戰龍江遷統軍元帥破瑞昌八陳營擢天策衛指揮使興祖沉毅有謀大將軍徐達雅重之克泰州以達請命守海陵海陵士誠兵入淮要地也興祖整軍令練士伍防禦甚嚴吳兵自海口來侵擊敗之擒彭元帥平江既下命興祖取通州士誠守將已詣徐達降進大都督府副使移鎮彭城達既定關陝旋師北向檄興祖會東昌從克元都置燕山六衛留兵三萬人命興祖守之領大都督分府事大兵西征擴廓由居庸窺北平達謂諸將北平有孫都督不足慮遂直搗太原語詳達傳洪武三年帥六衛卒從達出塞次三不剌川遇敵力戰死年三十五太祖悼惜之追封燕山侯諡忠愍配享通州常遇春祠未幾中書省以都督同知汪興祖兼俸事入奏帝聞奏興祖名歎息命以月俸給故燕山侯興祖家以其長子恪襲武德衛指揮使久之歷都督僉事二十一年以右參將從藍玉北征至捕魚兒海論功封全寧侯歲祿二千石豫世券恪謹敏有儒將風從征楚蜀還駐沔陽簡閲各衛所軍士備邊二十五年進兼太子太保未幾籍兵山西從宋國公勝練兵旋召還賜第中都後坐藍玉黨死曹良臣安豐人潁寇起聚鄉里築堡自固歸太祖於應天為江淮行省參政從取淮東收浙西進行省左丞從大軍取元都略地至澤潞進山西行省平章還守通州時大兵出山西通州守備單弱所部不滿千人元丞相也速將萬騎營白河良臣曰吾兵少不可與戰彼衆雖多亡國之餘敗氣不振當以計走之乃密遣指揮仵勇等於瀕河舟中多立赤幟亙三十餘里鉦鼓聲相聞也速大駭遁去良臣出精騎逐北百餘里元兵自是不敢窺北平復從大將軍達擊擴廓帖木兒於定西敗之洪武三年封宣寧侯歲祿九百石豫世券明年從伐蜀克歸州山寨取容美諸土司會周德興拔茅岡覃垕寨自白鹽山伐木開道出紙坊溪以趨夔州進克重慶明年從副將軍文忠北征至臚朐河收其部落文忠帥良臣持二十日糧兼程進至土剌河哈剌章渡河拒戰少却追至阿魯渾河敵騎大集將士皆殊死戰敵大敗走而良臣與指揮周顯常榮張耀皆戰死事聞贈良臣安國公諡忠壯列祀功臣廟子泰襲侯坐藍玉黨死爵除顯合肥人從渡江纍功至指揮同知洪武三年以收應昌紅羅山寨遷指揮使榮開平王遇春再從弟歷指揮僉事遇春卒於軍榮護喪還從朱亮祖平蜀纍官至振武衛指揮同知耀壽州人初從陳野先建康下始歸附纍功為守禦福建指揮使守興化至是俱戰沒帝厚恤諸臣家命有司各表其墓濮英廬州人初以勇力為百夫長積功至西安衛指揮坐軍政不修召還詰責遣葉升代之升更言其賢令還衛洪武十九年太祖命耿炳文選陝西都司衛所卒備邊惟英所練稱徑旅加都督僉事明年命帥所部隨大將軍馮勝北征抵金山降納哈出遂班師而以英將奇兵三千人為殿納哈出餘衆竄匿者尚數十萬聞師旋設伏於途謀俟大軍過竄取之未發英後至猝為所乘衝突不能出馬踣遂見執敵既得英思挾為質英絶食不言乘間引佩刀剖腹死事聞贈金山侯諡忠襄明年進贈樂浪公封其子璵為西涼侯祿二千五百石豫世券二十三年命練兵東昌又令駐臨清訓練士卒二十五年召還同宋國公勝等簡閲山西士馬璵能修父職帝甚嘉之復令籍山西民兵所籍州縣最多事集而不擾明年坐藍玉黨戍五開死洪武中指揮使死事者又有于光嚴德孫虎光都昌人初事徐壽輝鎮浮梁陳友諒弒壽輝光以浮梁來降授樞密院判積功為鷹揚衛指揮鎮鞏昌擴廓圍蘭州光赴援至馬蘭灘戰敗被執以徇城下光大呼曰公等但堅守徐將軍將大軍旦夕至矣賊怒批其頰遂被殺祀功臣廟嚴德太平人從起兵積功為海寧衛指揮從朱亮祖討方國珍戰歿於台州追封天水郡公孫虎不知何許人從援池州下於潛昌化定建德諸全皆有功授千戶克新城桐廬進海寧衛指揮使平嘉興盜從副將軍李文忠北征由東道入應昌至落馬河與元兵戰死追封康安郡伯又指揮僉事劉廣戍永平禦寇戰死涼州衛百戶劉林戍涼州也先帖木兒叛戰死邊人壯之名其所居竇融臺為劉林臺錢塘衛千戶袁興全椒人從征雲南自請為前鋒陷陳死並褒贈有差贊曰明祖之興自決策渡江始力爭於東南數千里之內摧友諒滅士誠然後北定中原南圖閩粵則廖永安胡大海以下諸人厥功豈細哉計不旋踵效命疆埸雖勳業未竟然褒崇廟祀竹帛爛然以視功成命爵終罹黨籍者其猶幸也夫
