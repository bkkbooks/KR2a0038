body:
  text: 明史卷三本紀第三太祖三十五年春正月辛巳宴羣臣於謹身殿始用九奏樂景川侯曹震定遠侯王弼下威楚路壬午元曲靖宣慰司及中慶澄江武定諸路俱降雲南平己丑減大辟囚乙未大祀天地於南郊庚戌命天下朝覲官各舉所知一人二月壬子河決河南命駙馬都尉李祺振之甲寅以雲南平詔天下閏月癸卯藍玉沐英克大理分兵徇鶴慶麗江金齒俱下三月庚午河決朝邑夏四月甲申遷元梁王把匝剌瓦兒密及威順王子伯伯等家屬於耽羅丙戌詔天下通祀孔子壬辰免畿內浙江江西河南山東稅糧五月乙丑太學成釋奠於先師孔子丙子廣平府吏王允道請開磁州鐵冶帝曰朕聞王者使天下無遺賢不聞無遺利今軍器不乏而民業已定無益於國且重擾民杖之流嶺南丁丑遣行人訪經明行修之士秋七月乙卯河決滎澤陽武辛酉罷四輔官乙亥傅友德沐英擊烏撒蠻大敗之八月丁丑復設科取士三年一行為定制丙戌皇后崩己丑延安侯唐勝宗長興侯耿炳文屯田陝西丁酉擢秀才曾泰為戶部尚書辛丑命徵至秀才分六科試用九月己酉吏部以經明行修之士鄭韜等三千七百餘人入見令舉所知復遣使徵之賜韜等鈔尋各授布政使參政等官有差庚午葬孝慈皇后於孝陵冬十月丙子置都察院丙申録囚甲辰徐達還是月廣東羣盜平詔趙庸班師十一月戊午置殿閣大學士以邵質吳伯宗宋訥吳沉為之十二月辛卯振北平被災屯田士卒己亥永城侯薛顯理山西軍務是年爪哇琉球烏斯藏占城入貢十六年春正月乙卯大祀天地於南郊戊午徐達鎮北平二月丙申初命天下學校歲貢士於京師三月甲辰召征南師還沐英留鎮雲南丙寅復鳳陽臨淮二縣民徭賦世世無所與夏五月庚申免畿內各府田租六月辛卯免畿內十二州縣養馬戶田租一年滁州免二年秋七月分遣御史録囚八月壬申朔日有食之九月癸亥申國公鄧鎮為征南將軍討龍泉山寇平之冬十月丁丑召徐達等還十二月甲午刑部尚書開濟有罪誅是年琉球占城西番打箭爐暹羅須文達那入貢十七年春正月丁未大祀天地於南郊戊申徐達鎮北平壬戌湯和巡視沿海諸城防倭三月戊戌朔頒科舉取士式曹國公李文忠卒甲子大赦天下夏四月壬午論平雲南功進封傅友德潁國公陳桓等侯者四人大賚將士庚寅收陳亡遺骸增築國子學舍五月丙寅涼州指揮宋晟討西番於亦集乃敗之秋七月戊戌禁內官預外事敕諸司毋通內官監文移癸丑詔百官迎養父母者官給舟車丁巳免畿內今年田租之半庚申録囚壬戌盱眙人獻天書斬之八月丙寅河決開封壬申決嵵縣遣官塞之己丑蠲河南諸省逋賦冬十月丙子河南北平大水分遣駙馬都尉李祺等振之閏月癸丑詔天下罪囚刑部都察院詳議大理寺覆讞後奏決是月召徐達還十二月壬子蠲雲南逋賦是年琉球暹羅安南占城入貢十八年春正月辛未大祀天地於南郊癸酉朝覲官分五等考績黜陟有差二月甲辰以久陰雨雷雹詔臣民極言得失己未魏國公徐達卒三月壬戌賜丁顯等進士及第出身有差詔中外官父母歿任所者有司給舟車歸其喪著為令乙亥免畿內今年田租命天下郡縣瘞暴骨丙子初選進士為翰林院承敕監六科庶吉士己丑戶部侍郎郭桓坐盜官糧誅夏四月丁酉吏部尚書余熂以罪誅丙辰思州蠻叛湯和為征虜將軍周德興為副將軍帥師從楚王楨討之六月戊申定外官三年一朝著為令秋七月甲戌封王為高麗國王庚辰五開蠻叛八月庚戌馮勝傅友德藍玉備邊北平是月振河南水災冬十月己丑頒大誥於天下癸卯召馮勝還甲辰詔曰孟子傳道有功名教歷年既久子孫甚微近有以罪輸作者豈禮先賢之意哉其加意詢訪凡聖賢後裔輸作者皆免之是月楚王楨信國公湯和討平五開蠻十一月乙亥蠲河南山東北平田租十二月丙午詔有司舉孝廉癸丑麓川平緬宣慰使思倫發反都督馮誠敗績千戶王升死之是年高麗琉球安南暹羅入貢十九年春正月辛酉振大名及江浦水災甲子大祀天地於南郊是月征蠻師還二月丙申耕藉田癸丑振河南飢夏四月甲辰詔贖河南飢民所鬻子女六月甲辰詔有司存問高年貧民年八十以上月給米五斗酒三斗肉五斤九十以上歲加帛一匹絮一斤有田産者罷給米應天鳳陽富民年八十以上賜爵社士九十以上鄉士天下富民八十以上里士九十以上社士皆與縣官均禮復其家魚衆寡孤獨不能自存者歲給米六石士卒戰傷除其籍賜復三年將校陳亡其子世襲加一秩巖穴之士以禮聘遣丁未振青州及鄭州飢秋七月癸未詔舉經明行修練達時務之士年六十以上者置翰林備顧問六十以下於六部布按二司用之八月甲辰命皇太子修泗州盱眙祖陵葬德祖以下帝后冕服九月庚申屯田雲南冬十月命官軍已亡子女幼或父母老者皆給全俸著為令十二月癸未朔日有食之是月命宋國公馮勝分兵防邊發北平山東山西河南民運糧於大寧是年高麗琉球暹羅占城安南入貢二十年春正月癸丑馮勝為征虜大將軍傅友德藍玉副之率師征納哈出焚錦衣衛刑具以繫囚付刑部甲子大祀天地於南郊禮成天氣清明侍臣進曰此陛下敬天之誠所致帝曰所謂敬天者不獨嚴而有禮當有其實天以子民之任付於君為君者欲求事天必先恤民恤民者事天之實也即如國家命人任守令之事若不能福民則是棄君之命不敬孰大焉又曰為人君者父天母地子民皆職分之所當盡祀天地非祈福於己實為天下蒼生也二月壬午閲武乙未耕藉田三月辛亥馮勝率師出松亭關城大寧寬河會州富峪夏四月戊子江夏侯周德興築福建瀕海城練兵防倭六月庚子臨江侯陳鏞從征失道戰沒癸卯馮勝兵踰金山丁未納哈出降閏月庚申師還次金山都督濮英殿軍遇伏死之秋八月癸酉收馮勝將軍印召還藍玉攝軍事景川侯曹震屯田雲南品甸九月戊寅封納哈出海西侯癸未置大寧都指揮使司丁酉安置鄭國公常茂於龍州丁未藍玉為征虜大將軍延安侯唐勝宗武定侯郭英副之北征沙漠是月城西寧冬十月戊申封朱壽為舳艫侯張赫為航海侯是月馮勝罷歸鳳陽奉朝請十一月壬午普定侯陳桓靖寧侯葉升屯田定邊姚安畢節諸衛己丑湯和還凡築寧海臨山等五十九城十二月振登萊飢是年琉球安南高麗占城真臘𩽆甘烏斯藏入貢二十一年春正月辛巳麓川蠻思倫發入寇馬龍他郎甸都督寧正擊敗之辛卯大祀天地於南郊甲午振青州飢逮治有司匿不以聞者三月乙亥賜任亨泰等進士及第出身有差丙戌振東昌飢甲辰沐英討思倫發敗之夏四月丙辰藍玉襲破元嗣君於捕魚兒海獲其次子地保奴及妃主王公以下數萬人而還五月甲戌朔日有食之六月甲辰信國公湯和歸鳳陽甲子傅友德為征南將軍沐英陳桓為左右副將軍帥師討東川叛蠻秋七月戊寅安置地保奴於琉球八月癸丑徙澤潞民無業者墾河南北田賜鈔備農具復三年丁卯藍玉師還大賚北征將士戊辰封孫恪為全寧侯是月御製八諭飭武臣九月丙戌秦晉燕周楚齊湘魯潭九王來朝癸巳越州蠻阿資叛沐英會傅友德討之冬十月丁未東川蠻平十二月壬戌進封藍玉涼國公是年高麗占城琉球暹羅真臘撒馬兒罕安南入貢詔安南三歲一朝象犀之屬毋獻安南黎季犛弒其主煒二十二年春正月丙戌改大宗正院曰宗人府以秦王樉為宗人令晉王棡燕王棣為左右宗正周王橚楚王楨為左右宗人丁亥大祀天地於南郊乙未傅友德破阿資於普安二月己未藍玉練兵四川壬戌禁武臣預民事癸亥湖廣千戶夏得忠結九溪蠻作亂靖寧侯葉升討平之得忠伏誅是月阿資降三月庚午傅友德帥諸將分屯四川湖廣防西南蠻夏四月己亥徙江南民田淮南賜鈔備農具復三年癸丑魏國公徐允恭開國公常升等練兵湖廣甲寅徙元降王於耽羅是月遣御史按山東官匿災不奏者五月辛卯置泰寧𩽆顏福餘三衛於兀良哈秋七月傅友德等還八月乙卯詔天下舉高年有德識時務者是月更定大明律九月丙寅朔日有食之冬十一月丙寅宣德侯金鎮等練兵湖廣己卯思倫發入貢謝罪麓川平十二月甲辰周王橚有罪遷雲南尋罷徙留居京師定遠侯王弼等練兵山西河南陝西是年高麗安南占城暹羅真臘入貢元也速迭兒弒其主脫古思帖木兒而立坤帖木兒高麗廢其主又廢其主昌安南黎季犛復弒其主日焜二十三年春正月丁卯晉王棡燕王棣帥師征元丞相咬住太尉乃兒不花征虜前將軍潁國公傅友德等皆聽節制己卯大祀天地於南郊庚辰貴州蠻叛延安侯唐勝宗討平之乙酉齊王榑帥師從燕王棣北征贛州賊為亂東川侯胡海充總兵官普定侯陳桓靖寧侯葉升為副將討平之唐勝宗督貴州各衛屯田二月戊申藍玉討平西番叛蠻丙辰耕藉田癸亥河決歸德發諸軍民塞之三月癸巳燕王棣師次迤都咬住等降夏四月吉安侯陸仲亨等坐胡惟庸黨下獄丙申潭王梓自焚死閏月丙子藍玉平施南忠建叛蠻五月甲午遣諸公侯還里賜金幣有差乙卯賜太師韓國公李善長死陸仲亨等皆坐誅作昭示姦黨録布告天下六月乙丑藍玉遣鳳翔侯張龍平都勻散毛諸蠻庚寅授耆民有才德知典故者官秋七月壬辰河決開封振之癸巳崇明海門風雨海溢遣官振之發民二十五萬築隄八月壬申詔毋以吏卒充選舉藍玉還是月振河南北平山東水災九月庚寅朔日有食之冬十月己卯振湖廣飢十一月癸丑免山東被災田租十二月癸亥令殊死以下囚輸粟北邊自贖壬申罷天下歲織文綺是年墨剌哈梅里高麗占城真臘琉球暹羅入貢二十四年春正月癸卯大祀天地於南郊戊申潁國公傅友德為征虜將軍定遠侯王弼武定侯郭英副之備北平邊丁巳免山東田租二月壬申耕藉田三月戊子朔日有食之魏國公徐輝祖曹國公李景隆涼國公藍玉等備邊陝西乙未靖寧侯葉升練兵甘肅丁酉賜許觀等進士及第出身有差夏四月辛未封皇子為慶王權寧王楩岷王橞谷王松韓王模瀋王楹安王桱唐王棟郢王伊王癸未燕王棣督傅友德諸將出塞敗敵而還五月戊戌漢衛谷慶寧岷六王練兵臨清六月己未詔廷臣參考歷代禮制更定冠服居室器用制度甲子久旱録囚秋七月庚子徙富民實京師辛丑免畿內官田租之半八月乙卯秦王樉有罪召還京師乙丑皇太子巡撫陝西乙亥都督僉事劉真宋晟討哈梅里敗之九月乙酉遣使諭西域是月倭寇雷州百戶李玉鎮撫陶鼎戰死冬十月丁巳免北平河間被水田租十一月甲午五開蠻叛都督僉事茅鼎討平之庚戌皇太子還京師晉王棡來朝辛亥振河南水災十二月庚午周王橚復國辛巳阿資復叛都督僉事何福討降之是年天下郡縣賦役黃册成計戶千六十八萬四千四百三十五丁五千六百七十七萬四千五百六十一琉球暹羅別失八里撒馬兒罕入貢以占城有篡逆事却之二十五年春正月戊子周王橚來朝庚寅河決陽武發軍民塞之免被水田租乙未大祀天地於南郊何福討都勻畢節諸蠻平之辛丑令死囚輸粟塞下壬寅晉王棡燕王棣楚王楨湘王柏來朝二月戊午召曹國公李景隆等還京師靖寧侯葉升等練兵於河南及臨鞏甘涼延慶都督茅鼎等平五開蠻丙寅耕藉田庚辰詔天下衛所軍以十之七屯田三月癸未馮勝等十四人分理陝西山西河南諸衛軍務庚寅改封豫王桂為代王漢王楧為肅王衛王植為遼王夏四月壬子涼國公藍玉征罕東癸丑建昌衛指揮月魯帖木兒叛指揮魯毅敗之丙子皇太子標薨戊寅都督聶緯徐司馬瞿能討月魯帖木兒俟藍玉還並聽節制五月辛巳藍玉至罕東寇遁遂趨建昌己丑振陳州原武水災六月丁卯西平侯沐英卒於雲南秋七月庚辰秦王樉復國癸未指揮瞿能敗月魯帖木兒於雙狼寨八月己未江夏侯周德興坐事誅丁卯馮勝傅友德帥開國公常升等分行山西籍民為軍屯田於大同東勝立十六衛甲戌給公侯歲祿歸賜田於官丙子靖寧侯葉升坐胡惟庸黨誅九月庚寅立皇孫允炆為皇太孫高麗李成桂幽其主瑤而自立以國人表來請命詔聽之更其國號曰朝鮮冬十月乙亥沐春襲封西平侯鎮雲南十一月甲午藍玉擒月魯帖木兒誅之召玉還十二月甲戌宋國公馮勝潁國公傅友德等兼東宮師保官閏月戊戌馮勝為總兵官傅友德副之練兵山西河南兼領屯衛是年琉球中山山南高麗哈梅里入貢二十六年春正月戊申免天下耆民來朝辛酉大祀天地於南郊二月丁丑晉王棡統山西河南軍出塞召馮勝傅友德常升王弼等還乙酉蜀王椿來朝涼國公藍玉以謀反並鶴慶侯張翼普定侯陳桓景川侯曹震舳艫侯朱壽東莞伯何榮吏部尚書詹徽等皆坐誅己丑頒逆臣録於天下庚寅耕藉田三月辛亥代王桂率護衛兵出塞聽晉王節制長興侯耿炳文練兵陝西丙辰馮勝傅友德備邊山西北平其屬衛將校悉聽晉王燕王節制庚申詔二王軍務大者始以聞壬戌會寧侯張溫坐藍玉黨誅夏四月乙亥孝感飢遣使乘傳發倉貸之詔自今遇歲飢先貸後聞著為令戊子周王橚來朝庚寅旱詔羣臣直言得失省獄囚丙申以安南擅廢立絶其朝貢秋七月甲辰朔日有食之戊申選秀才張宗濬等隨詹事府官分直文華殿侍皇太孫八月秦晉燕周齊五王來朝九月癸丑代肅遼慶寧五王來朝赦胡惟庸藍玉餘黨冬十月丙申擢國子監生六十四人為布政使等官十二月頒永鑑録於諸王是年琉球爪哇暹羅入貢二十七年春正月乙卯大祀天地於南郊辛酉李景隆為平羌將軍鎮甘肅發天下倉穀貸貧民三月庚子賜張信等進士及第出身有差辛丑魏國公徐輝祖安陸侯吳傑備倭浙江庚戌課民樹桑棗木棉甲子以四方底平收藏甲兵示不復用秋八月甲戌吳傑及永定侯張銓率致仕武臣備倭廣東乙亥遣國子監生分行天下督吏民修水利丙戌階文軍亂都督寧正為平羌將軍討之九月徐輝祖節制陝西沿邊諸軍冬十一月乙丑潁國公傅友德坐事誅阿資復叛西平侯沐春擊敗之十二月乙亥定遠侯王弼坐事誅是年烏斯藏琉球緬朵甘爪哇撒馬兒罕朝鮮入貢安南來貢却之二十八年春正月丙午階文寇平寧正以兵從秦王樉征洮州叛番丁未大祀天地於南郊甲子西平侯沐春擒斬阿資越州平是月周王橚晉王棡率河南山西諸衛軍出塞築城屯田燕王棣帥總兵官周興出遼東塞二月丁卯宋國公馮勝坐事誅己丑諭戶部編民百戶為里婚姻死喪疾病患難里中富者助財貧者助力春秋耕穫通力合作以教民睦夏六月壬申詔諸土司皆立儒學辛巳周興等自開原追敵至甫答迷城不及而還己丑御奉天門諭羣臣曰朕起兵至今四十餘年灼見情偽懲創姦頑或法外用刑本非常典後嗣止循律與大誥不許用黥刺剕劓閹割之刑臣下敢以請者置重典又曰朕罷丞相設府部都察院分理庶政事權歸於朝廷嗣君不許復立丞相臣下敢以請者置重典皇親惟謀逆不赦餘罪宗親會議取上裁法司祇許舉奏毋得擅逮勒諸典章永為遵守秋八月丁卯都督楊文為征南將軍指揮韓觀都督僉事宋晟副之討龍州土官趙宗壽戊辰信國公湯和卒辛巳趙宗壽伏罪來朝楊文移兵討奉議南丹叛蠻九月丁酉免畿內山東秋糧庚戌頒皇明祖訓條章於中外後世有言更祖制者以姦臣論十一月乙亥奉議南丹蠻悉平十二月壬辰詔河南山東桑棗及二十七年後新墾田毋徵稅是年朝鮮琉球暹羅入貢二十九年春正月壬申大祀天地於南郊二月癸卯征虜前將軍胡冕討郴桂蠻平之辛亥燕王棣帥師巡大寧周世子有燉帥師巡北平關隘三月辛酉楚王楨湘王柏來朝甲子燕王敗敵於徹徹兒山又追敗之於兀良哈禿城而還秋八月丁未免應天太平五府田租九月乙亥召致仕武臣二千五百餘人入朝大賚之各進秩一級是年琉球安南朝鮮烏斯藏入貢三十年春正月丙辰耿炳文為征西將軍郭英副之巡西北邊丙寅大祀天地於南郊丁卯置行太僕寺於山西北平陝西甘肅遼東掌馬政己巳左都督楊文屯田遼東是月沔縣盜起詔耿炳文討之二月庚寅水西蠻叛都督僉事顧成為征南將軍討平之三月癸丑賜陳等進士及第出身有差庚辰古州蠻叛龍里千戶吳得鎮撫井孚戰死夏四月己亥都指揮齊讓為平羌將軍討之壬寅水西蠻平五月壬子朔日有食之乙卯楚王楨湘王柏帥師討古州蠻六月辛巳賜禮部覆試貢士韓克忠等進士及第出身有差己酉駙馬都尉歐陽倫有罪賜死秋八月丁亥河決開封甲午李景隆為征虜大將軍練兵河南九月庚戌漢沔寇平戊辰麓川平緬土酋刀幹孟逐其宣慰使思倫發以叛乙亥都督楊文為征虜將軍代齊讓冬十月戊子停遼東海運辛卯耿炳文練兵陝西乙未重建國子監先師廟成十一月癸酉沐春為征虜前將軍都督何福等副之討刀幹孟是年琉球占城朝鮮暹羅烏斯藏泥八剌入貢三十一年春正月壬戌大祀天地於南郊乙丑遣使之山東河南課耕二月乙酉倭寇寧海指揮陶鐸擊敗之辛丑古州蠻平召楊文還甲辰都督僉事徐凱討平麼些蠻夏四月庚辰廷臣以朝鮮屢生釁隙請討不許五月丁未沐春擊刀幹孟大敗之甲寅帝不豫戊午都督楊文從燕王棣武定侯郭英從遼王植備禦開平俱聽燕王節制閏月癸未帝疾大漸乙酉崩於西宮年七十有一遺詔曰朕膺天命三十有一年憂危積心日勤不怠務有益於民奈起自寒微無古人之博知好善惡惡不及遠矣今得萬物自然之理其奚哀念之有皇太孫允炆仁明孝友天下歸心宜登大位內外文武臣僚同心輔政以安吾民喪祭儀物毋用金玉孝陵山川因其故毋改作天下臣民哭臨三日皆釋服毋妨嫁娶諸王臨國中毋至京師諸不在令中者推此令從事辛卯葬孝陵諡曰高皇帝廟號太祖永樂元年諡聖神文武欽明啓運俊德成功統天大孝高皇帝嘉靖十七年增諡開天行道肇紀立極大聖至神仁文義武俊德成功高皇帝帝天授智勇統一方夏緯武經文為漢唐宋諸君所未及當其肇造之初能沉幾觀變次第經略綽有成算嘗與諸臣論取天下之略曰朕遭時喪亂初起鄉土本圖自全及渡江以來觀羣雄所為徒為生民之患而張士誠陳友諒尤為巨蠹士誠恃富友諒恃強朕獨無所恃惟不嗜殺人布信義行節儉與卿等同心共濟初與二寇相持士誠尤逼近或謂宜先擊之朕以友諒志驕士誠器小志驕則好生事器小則無遠圖故先攻友諒鄱陽之役士誠卒不能出姑蘇一步以為之援向使先攻士誠浙西負固堅守友諒必空國而來吾腹背受敵矣二寇既除北定中原所以先山東次河洛止潼關之兵不遽取秦隴者蓋擴廓帖木兒李思齊張思道皆百戰之餘未肯遽下急之則併力一隅猝未易定故出其不意反斾而北燕都既舉然後西征張李望絶勢窮不戰而克然擴廓猶力抗不屈向令未下燕都驟與角力勝負未可知也帝之雄才大略料敵制勝率類此故能戡定禍亂以有天下語云天道後起者勝豈偶然哉贊曰太祖以聰明神武之資抱濟世安民之志乘時應運豪傑景從戡亂摧強十五載而成帝業崛起布衣奄奠海宇西漢以後所未有也懲元政廢弛治尚嚴峻而能禮致耆儒考禮定樂昭揭經義尊崇正學加恩勝國澄清吏治修人紀崇風教正後宮名義內治肅清禁宦豎不得干政五府六部官職相維置衛屯田兵食俱足武定禍亂文致太平太祖實身兼之至於雅尚志節聽蔡子英北歸晚歲憂民益切嘗以一歲開支河暨塘堰數萬以利農桑備旱潦用此子孫承業二百餘年士重名義閭閻充實至今苗裔蒙澤尚如東樓白馬世承先祀有以哉
