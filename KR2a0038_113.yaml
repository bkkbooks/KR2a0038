body:
  text: 明史卷一百十三列傳第一后妃明太祖鑒前代女禍立綱陳紀首嚴內教洪武元年命儒臣修女誡諭翰林學士朱升曰治天下者正家為先正家之道始於謹夫婦后妃雖母儀天下然不可俾預政事至於嬪嬙之屬不過備職事侍巾櫛恩寵或過則驕恣犯分上下失序歷代宮闈政由內出鮮不為禍惟明主能察於未然下此多為所惑卿等其纂女誡及古賢妃事可為法者使後世子孫知所持守升等乃編録上之五年六月命禮臣議宮官女職之制禮臣上言周制後宮設內官以贊內治漢設內官一十四等凡數百人唐設六局二十四司官凡一百九十人女史五十餘人皆選良家女充之帝以所設過多命重加裁定於是折衷曩制立六局一司局曰尚宮尚儀尚服尚食尚寢尚功司曰宮正秩皆正六品每局領四司其屬二十有四而尚宮總行六局之事戒令責罰則宮正掌之官七十五人女史十八人視唐減百四十餘人凡以服勞宮寢祇勤典守而已諸妃位號亦惟取賢淑莊敬惠順康寧為稱閨房雍肅旨寓深遠又命工部制紅牌鐫戒諭后妃之詞懸於宮中牌用鐵字飾以金復著令典自后妃以下至嬪御女史巨細衣食之費金銀幣帛器用百物之供皆自尚宮取旨牒內使監覆奏移部臣取給焉若尚宮不及奏內使監不覆奏而輒領於部者論死或以私書出外罪亦如之宮嬪以下有疾醫者不得入宮以證取藥何其慎也是以終明之代宮壼肅清論者謂其家法之善超軼漢唐爰自孝慈以迄愍后考厥族里次其世代雖所遇不齊顯晦異致而凡居正號者並列於篇其妃嬪有事實者亦附見焉后妃一太祖孝慈高皇后孫貴妃李淑妃郭寧妃惠帝馬皇后成祖仁孝徐皇后王貴妃權賢妃仁宗誠孝張皇后宣宗恭讓胡皇后孝恭孫皇后吳賢妃郭嬪英宗孝莊錢皇后孝肅周太后景帝汪廢后肅孝杭皇后憲宗吳廢后孝貞王皇后孝穆紀太后孝惠邵太后萬貴妃太祖孝慈高皇后馬氏宿州人父馬公母鄭媼早卒馬公素善郭子興遂以后託子興馬公卒子興育之如己女子興奇太祖以后歸焉后仁慈有智鑒好書史太祖有劄記輒命后掌之倉卒未嘗忘子興嘗信讒疑太祖后善事其妻嫌隙得釋太祖既克太平后率將士妻妾渡江及居江寧吳漢接境戰無虛日親緝甲士衣鞋佐軍陳友諒寇龍灣太祖率師禦之后盡發宮中金帛犒士嘗語太祖定天下以不殺人為本太祖善之洪武元年正月太祖即帝位冊為皇后初后從帝軍中值歲大歉帝又為郭氏所疑嘗乏食后竊炊餅懷以進肉為焦居常貯糗糒脯修供帝無所乏絶而己不宿飽及貴帝比之蕪蔞豆粥滹沱麥飯每對羣臣述后賢同於唐長孫皇后退以語后后曰妾聞夫婦相保易君臣相保難陛下不忘妾同貧賤願無忘羣臣同艱難且妾何敢比長孫皇后也后勤於內治暇則講求古訓告六宮以宋多賢后命女史録其家法朝夕省覽或言宋過仁厚后曰過仁厚不愈於刻薄乎一日問女史黃老何教也而竇太后好之女史曰清淨無為為本若絶仁棄義民復孝慈是其教矣后曰孝慈即仁義也詎有絶仁義而為孝慈者哉后嘗誦小學求帝表章焉帝前殿決事或震怒后伺帝還宮輒隨事微諫雖帝性嚴然為緩刑戮者數矣參軍郭景祥守和州人言其子持矟欲殺父帝將誅之后曰景祥止一子人言或不實殺之恐絶其後帝廉之果枉李文忠守嚴州楊憲誣其不法帝欲召還后曰嚴敵境也輕易將不宜且文忠素賢憲言詎可信帝遂已文忠後卒有功學士宋濂坐孫慎罪逮至論死后諫曰民家為子弟延師尚以禮全終始況天子乎且濂家居必不知情帝不聽會后侍帝食不御酒肉帝問故對曰妾為宋先生作福事也帝惻然投箸起明日赦濂安置茂州吳興富民沈秀者助築都城三之一又請犒軍帝怒曰匹夫犒天子軍亂民也宜誅后諫曰妾聞法者誅不法也非以誅不祥民富敵國民自不祥不祥之民天將災之陛下何誅焉乃釋秀戍雲南帝嘗令重囚築城后曰贖罪罰役國家至恩但疲囚加役恐仍不免死亡帝乃悉赦之帝嘗怒責宮人后亦佯怒令執付宮正司議罪帝曰何為后曰帝王不以喜怒加刑賞當陛下怒時恐有畸重付宮正則酌其平矣即陛下論人罪亦詔有司耳一日問帝今天下民安乎帝曰此非爾所宜問也后曰陛下天下父妾辱天下母子之安否何可不問遇歲旱輒率宮人蔬食助祈禱歲凶則設麥飯野羹帝或告以振恤后曰振恤不如蓄積之先備也奏事官朝散會食廷中后命中官取飲食親嘗之味弗甘遂啓帝曰人主自奉欲薄養賢宜厚帝為飭光祿官帝幸太學還后問生徒幾何帝曰數千后曰人才衆矣諸生有廩食妻子將何所仰給於是立紅板倉積糧賜其家太學生家糧自后始諸將克元都俘寶玉至后曰元有是而不能守意者帝王自有寶歟帝曰朕知后謂得賢為寶耳后拜謝曰誠如陛下言妾與陛下起貧賤至今日恐驕縱生於奢侈危亡起於細微故願得賢人共理天下又曰法屢更必弊法弊則奸生民數擾必困民困則亂生帝嘆曰至言也命女史書之冊其規正類如此帝每御膳后皆躬自省視平居服大練浣濯之衣雖敝不忍易聞元世祖后煮故弓弦事亦命取練織為衾裯以賜高年煢獨餘帛纇絲緝成衣裳賜諸王妃公主使知蠶桑艱難妃嬪宮人被寵有子者厚待之命婦入朝待之如家人禮帝欲訪后族人官之后謝曰爵祿私外家非法力辭而止然言及父母早卒輒悲哀流涕帝封馬公徐王鄭媼為王夫人修墓置廟焉洪武十五年八月寢疾羣臣請禱祀求良醫后謂帝曰死生命也禱祀何益且醫何能活人使服藥不效得毋以妾故而罪諸醫乎疾亟帝問所欲言曰願陛下求賢納諫慎終如始子孫皆賢臣民得所而已是月丙戌崩年五十一帝慟哭遂不復立后是年九月庚午葬孝陵諡曰孝慈皇后宮人思之作歌曰我后聖慈化行家邦撫我育我懷德難忘懷德難忘於萬斯年毖彼下泉悠悠蒼天永樂元年上尊諡曰孝慈昭憲至仁文德承天順聖高皇后嘉靖十七年加上尊諡曰孝慈貞化哲順仁徽成天育聖至德高皇后成穆貴妃孫氏陳州人元末兵亂妃父母俱亡從仲兄蕃避兵揚州青軍陷城元帥馬世熊得之育為義女年十八太祖納焉及即位冊封貴妃位衆妃上洪武七年九月薨年三十有二帝以妃無子命周王橚行慈母服三年東宮諸王皆期敕儒臣作孝慈録庶子為生母服三年衆子為庶母期自妃始葬褚岡賜兄瑛田租三百石歲供祀後附葬孝陵淑妃李氏壽州人父傑洪武初以廣武衛指揮北征卒於陳十七年九月孝慈皇后服除冊封淑妃攝六宮事未幾薨寧妃郭氏濠人郭山甫女山甫善相人太祖微時過其家山甫相之大驚曰公相貴不可言因謂諸子興英曰吾相汝曹皆可封侯者以此亟遣從渡江並遣妃侍太祖後封寧妃李淑妃薨妃攝六宮事山甫纍贈營國公興英皆以功封侯自有傳惠帝皇后馬氏光祿少卿全女也洪武二十八年冊為皇太孫妃建文元年二月冊為皇后四年六月城陷崩於火成祖仁孝皇后徐氏中山王達長女也幼貞靜好讀書稱女諸生太祖聞后賢淑召達謂曰朕與卿布衣交也古君臣相契者率為婚姻卿有令女其以朕子棣配焉達頓首謝洪武九年冊為燕王妃高皇后深愛之從王之藩居孝慈高皇后喪三年蔬食如禮高皇后遺言可誦者后一一舉之不遺靖難兵起王襲大寧李景隆乘間進圍北平時仁宗以世子居守凡部分備禦多禀命於后景隆攻城急城中兵少后激勸將校士民妻皆授甲登陴拒守城卒以全王即帝位冊為皇后言南北每年戰鬬兵民疲敝宜與休息又言當世賢才皆高皇帝所遺陛下不宜以新舊間又言帝堯施仁自親始帝輒嘉納焉初后弟增壽常以國情輸之燕為惠帝所誅至是欲贈爵后力言不可帝不聽竟封定國公命其子景昌襲乃以告后后曰非妾志也終弗謝嘗言漢趙二王性不順官僚宜擇廷臣兼署之一日問陛下誰與圖治者帝曰六卿理政務翰林職論思后因請悉召見其命婦賜冠服鈔幣諭曰婦之事夫奚止饋食衣服而已必有助焉朋友之言有從有違夫婦之言婉順易入吾旦夕侍上惟以生民為念汝曹勉之嘗採女憲女誡作內訓二十篇又類編古人嘉言善行作勸善書頒行天下永樂五年七月疾革惟勸帝愛惜百姓廣求賢才恩禮宗室毋驕畜外家又告皇太子曩者北平將校妻為我荷戈城守恨未獲隨皇帝北巡一賚恤之也是月乙卯崩年四十有六帝悲慟為薦大齊於靈谷天禧二寺聽羣臣致祭光祿為具物十月甲午諡曰仁孝皇后七年營壽陵於昌平之天壽山又四年而陵成以后葬焉即長陵也帝亦不復立后仁宗即位上尊諡曰仁孝慈懿誠明莊獻配天齊聖文皇后祔太廟昭獻貴妃王氏蘇州人永樂七年封貴妃妃有賢德事仁孝皇后恭謹為帝所重帝晚年多急怒妃曲為調護自太子諸王公主以下皆倚賴焉十八年七月薨禮視太祖成穆孫貴妃恭獻賢妃權氏朝鮮人永樂時朝鮮貢女充掖庭妃與焉姿質穠粹善吹玉簫帝愛憐之七年封賢朵憐之七年封賢妃命其父永均為光祿卿明年十月侍帝北征凱還葬於臨城葬仁宗誠孝皇后張氏永城人父麒以女貴追封彭城伯具外戚傳洪武二十八年封燕世子妃永樂二年封皇太子妃仁宗立冊為皇后宣宗即位尊為皇太后英宗即位尊為太皇太后后始為太子妃操婦道至謹雅得成祖及仁孝皇后歡太子數為漢趙二王所間體肥碩不能騎射成祖恚至減太子宮膳瀕易者屢矣卒以后故得不廢及立為后中外政事莫不周知宣德初軍國大議多禀聽裁決是時海內寧泰帝入奉起居出奉遊宴四方貢獻雖微物必先上皇太后兩宮慈孝聞天下三年太后遊西苑皇后皇妃侍帝親掖輿登萬歲山奉觴上壽獻詩頒德又明年謁長獻二陵帝親櫜鞬騎導至河橋下馬扶輦畿民夾道拜觀陵旁老稚皆山呼拜迎太后顧曰百姓戴君以能安之耳皇帝宜重念及還過農家召老婦問生業賜鈔幣有獻蔬食酒漿者取以賜帝曰此田家味也從臣英國公張輔尚書蹇義大學士楊士奇楊榮金幼孜楊溥請見行殿太后慰勞之且曰爾等先朝舊人勉輔嗣君他日帝謂士奇曰皇太后謁陵還道汝輩行事甚習言輔武臣也達大義義重厚小心第寡斷汝克正言無避忤先帝或數不樂然終從汝以不敗事又有三事時悔不從也太后遇外家嚴弟升至淳謹然不許預議國事宣宗崩英宗方九歲宮中訛言將召立襄王矣太后趣召諸大臣至乾清宮指太子泣曰此新天子也羣臣呼萬歲浮言乃息大臣請太后垂簾聽政太后曰毋壞祖宗法第悉罷一切不急務時時勖帝向學委任股肱以故王振雖寵於帝終太后世不敢專大政正統七年十月崩當大漸召士奇溥入命中官問國家尚有何大事未辦者士奇舉三事一謂建庶人雖亡當修實録一謂太宗詔有收方孝孺諸臣遺書者死宜弛其禁其三未及奏上而太后已崩遺詔勉大臣佐帝惇行仁政語甚諄篤上尊諡曰誠孝恭肅明德弘仁順天啓聖昭皇后合葬獻陵祔太廟宣宗恭讓皇后胡氏名善祥濟寧人永樂十五年選為皇太孫妃已為皇太子妃宣宗即位立為皇后時孫貴妃有寵后未有子又善病三年春帝令后上表辭位乃退居長安宮賜號靜慈仙師而冊貴妃為后諸大臣張輔蹇義夏原吉楊士奇楊榮等不能爭張太后憫后賢常召居清寧宮內廷朝宴命居孫后上孫后常怏怏正統七年十月太皇太后崩后痛哭不已踰年亦崩用嬪御禮葬金山后無過被廢天下聞而憐之宣宗後亦悔嘗自解曰此朕少年事天順六年孫太后崩錢皇后為英宗言后賢而無罪廢為仙師其沒也人畏太后殮葬皆不如禮因勸復其位號英宗問大學士李賢賢對曰陛下此心天地鬼神實臨之然臣以陵寢享殿神主俱宜如奉先殿式庶稱陛下明孝七年閏七月上尊諡曰恭讓誠順康穆靜慈章皇后修陵寢不祔廟宣宗孝恭皇后孫氏鄒平人幼有美色父忠永城縣主簿也誠孝皇后母彭城伯夫人故永城人時時入禁中言忠有賢女遂得入宮方十餘歲成祖命誠孝后育之已而宣宗婚詔選濟寧胡氏為妃而以孫氏為嬪宣宗即位封貴妃故事皇后金寶金冊貴妃以下有冊無寶妃有寵宣德元年五月帝請於太后製金寶賜焉貴妃有寶自此始妃亦無子陰取宮人子為己子即英宗也由是眷寵益重胡后上表遜位請早定國本妃僞辭曰后病痊自有子吾子敢先后子耶三年三月胡后廢遂冊為皇后英宗立尊為皇太后英宗北狩太后命郕王監國景帝即位尊為上聖皇太后時英宗在迤北數寄禦寒衣裘及還幽南宮太后數入省視石亨等謀奪門先密白太后許之英宗復辟上徽號曰聖烈慈壽皇太后明興宮闈徽號亦自此始天順六年九月崩上尊諡曰孝恭懿憲慈仁莊烈齊天配聖章皇后合葬景陵祔太廟而英宗生母人卒無知之者吳太后景帝母也丹徒人宣宗為太子時選入宮宣德三年封賢妃景帝即位尊為皇太后英宗復辟復稱宣廟賢妃成化中薨郭嬪名愛字善理鳳陽人賢而有文入宮二旬而卒自知死期書楚聲以自哀詞曰修短有數兮不足較也生而如夢兮死則覺也先吾親而歸兮慚豫之失孝也心悽悽而不能已兮是則可悼也正統元年八月追贈皇庶母惠妃何氏為貴妃諡端靜趙氏為賢妃諡純靜吳氏為惠妃諡貞順焦氏為淑妃諡莊靜曹氏為敬妃諡莊順徐氏為順妃諡貞惠袁氏為麗妃諡恭定諸氏為淑妃諡貞靜李氏為充妃諡恭順何氏為成妃諡肅僖冊文曰茲委身而蹈義隨龍馭以上賓宜薦徽稱用彰節行蓋宣宗殉葬宮妃也初太祖崩宮人多從死者建文永樂時相繼優恤若張鳳李衡趙福張璧汪賓諸家皆自錦衣衛所試百戶散騎帶刀舍人進千百戶帶俸世襲人謂之太祖朝天女戶歷成祖仁宣二宗亦皆用殉景帝以郕王薨猶用其制蓋當時王府皆然至英宗遺詔始罷之英宗孝莊皇后錢氏海州人正統七年立為后帝憫后族單微欲侯之后輒遜謝故后家獨無封英宗北狩傾中宮資佐迎駕夜哀泣天倦即臥地損一股以哭泣復損一目英宗在南宮不自得后曲為慰解后無子周貴妃有子立為皇太子英宗大漸遺命曰錢皇后千秋萬歲後與朕同葬大學士李賢退而書之冊憲宗立上兩宮徽號下廷臣議大監夏時希貴妃意傳諭獨尊貴妃為皇太后大學士李賢彭時力爭乃兩宮並尊而稱后為慈懿皇太后及營裕陵賢時請營三壙下廷議夏時復言不可事竟寢成化四年六月太后崩周太后不欲后合葬帝使夏時懷恩召大臣議彭時首對曰合葬裕陵主祔廟定禮也翼日帝召問時對如前帝曰朕豈不知慮他日妨母后耳時曰皇上孝事兩宮聖德彰聞禮之所合孝之所歸也商輅亦言不祔葬損聖德劉定之曰孝從義不從命帝默然久之曰不從命尚得為孝耶時力請合葬裕陵左而虛右以待周太后已復與大臣疏爭帝再下廷議吏部尚書李秉禮部尚書姚夔集廷臣九十九人議皆請如時言帝曰卿等言是顧朕屢請太后未得命乖禮非孝違親亦非孝明日詹事柯潛給事中魏元等上疏又明日夔等合疏上皆執議如初中旨猶諭別擇葬地於是百官伏哭文華門外帝命羣臣退衆叩頭不得旨不敢退自巳至申乃得允衆呼萬歲出事詳時夔傳中是年七月上尊諡曰孝莊獻穆弘惠顯仁恭天欽聖睿皇后祔太廟九月合葬裕陵異隧距英宗玄堂數丈許中窒之虛右壙以待周太后其隧獨通而奉先殿祭亦不設后主弘治十七年周太后崩孝宗御便殿出裕陵圖示大學士劉健謝遷李東陽曰陵有二隧若者窒若者可通往來皆先朝內臣所為此未合禮昨見成化間彭時姚夔等章奏先朝大臣為國如此先帝亦不得已耳欽天監言通隧上干先帝陵堂恐動地脈朕已面折之窒則天地閉塞通則風氣流行健等因力贊帝復問祔廟禮健等言祔二后自唐始也祔三后自宋始也漢以前一帝一后曩者定議合祔孝莊太后居左今大行太皇太后居右且引唐宋故事為證臣等以此不敢復論帝曰二后已非況復三后遷曰宋祔三后一繼立一生母也帝曰事須師古太皇太后鞠育朕躬朕豈敢忘顧私情耳祖宗來一帝一后今並祔壞禮自朕始且奉先殿祭皇祖特座一飯一匙而已夫孝穆皇太后朕生母也別祀之奉慈殿今仁壽宮前殿稍寬朕欲奉太皇太后於此他日奉孝穆皇太后於後歲時祭享如太廟於是命羣臣詳議議上將建新廟欽天監奏年方有礙廷議請暫祀周太后於奉慈殿稱孝肅太皇太后殿在奉先殿西帝以祀孝穆至是中奉孝肅而徙孝穆居左焉帝始欲通隧亦以陰陽家言不果行孝肅周太后英宗妃憲宗生母也昌平人天順元年封貴妃憲宗即位尊為皇太后其年十月太后誕日帝令僧道建齊祭禮部尚書姚夔帥羣臣詣齊所為太后祈福給事中張寧等劾之帝是其言令自後僧道齊醮百官不得行香二十三年四月上徽號曰聖慈仁壽皇太后孝宗立尊為太皇太后先是憲宗在位事太后至孝五日一朝燕享必親太后意所欲惟恐不歡至錢太后合葬裕陵太后殊難之憲宗委曲寬譬乃得請孝宗生西宮母妃紀氏薨太后育之宮中省視萬方及孝宗即位事太后亦至孝太后病瘍久之愈誥諭羣臣曰自英皇厭代豫正位長樂憲宗皇帝以天下養二十四年猶一日茲豫偶患瘍皇帝夜籲天為豫請命春郊罷宴問視惟勤俾老年疾體獲砥康寧以昔視今父子兩世孝同一揆豫甚嘉焉弘治十一年冬清寧宮災太后移居仁壽宮明年清寧宮成乃還居焉太后弟長寧伯彧家有賜田有司請釐正之帝未許也太后曰奈何以我故骫皇帝法使歸地於官弘治十七年三月崩諡孝肅貞順康懿光烈輔天承聖睿皇后合葬裕陵以大學士劉健謝遷李東陽議別祀於奉慈殿不祔廟仍稱太皇太后嘉靖十五年與紀邵二太后並移祀陵殿題主曰皇后不繫帝諡以別嫡庶其後穆宗母孝恪神宗母孝定光宗母孝靖熹宗母孝和莊烈帝母孝純咸遵用其制景帝廢后汪氏順天人正統十年冊為郕王妃十四年冬王即皇帝位冊為皇后后有賢德嘗念京師諸死事及老弱遇害者暴骨原野令官校掩埋之生二女無子景泰三年妃杭氏生子見濟景帝欲立為太子而廢憲宗后執不可以是忤帝意遂廢后立杭氏為皇后七年杭后崩諡肅孝英宗復位削皇后號毀所葬陵而后仍稱郕王妃景帝崩英宗以其後宮唐氏等殉議及后李賢曰妃已幽廢況兩女幼尤可憫帝乃已憲宗復立為太子雅知后不欲廢立事之甚恭因為帝言遷之外王府得盡攜宮中所有而出與周太后相得甚歡歲時入宮家人禮然性剛執一日英宗問太監劉桓曰記有玉玲瓏繫腰今何在桓言當在妃所英宗命索之后投諸井對使者曰無之已而告人曰七年天子不堪消受此數片玉耶已有言后出所攜巨萬計英宗遣使檢取之遂立盡正德元年十二月薨議祭葬禮大學士王鏊曰葬以妃祭以后遂合葬金山明年上尊諡曰貞惠安和景皇后憲宗廢后吳氏順天人天順八年七月立為皇后先是憲宗居東宮萬貴妃已擅寵后既立摘其過杖之帝怒下詔曰先帝為朕簡求賢淑已定王氏育於別宮待期太監牛玉輒以選退吳氏於太后前復選冊立禮成之後朕見舉動輕佻禮度率略德不稱位因察其實始知非預立者用是不得已請命太后廢吳氏別宮立甫踰月耳后父俊先授都督同知至是下獄戍邊謫玉孝陵種菜玉從子太常少卿綸甥吏部員外郎楊琮並除名姻家懷寧侯孫鏜閒住於是南京給事中王徽王淵朱寬李翺李鈞等合疏言玉罪重罰輕因並劾大學士李賢帝怒徽等皆貶邊州判官後孝宗生於西官后保抱惟謹孝宗即位念后恩命服膳皆如母后禮官其姪錦衣百戶正德四年薨劉瑾欲焚之大學士王鏊持不可乃以妃禮葬孝貞皇后王氏上元人憲宗在東宮英宗為擇配得十二人選后及吳氏柏氏留宮中吳氏既立而廢遂冊為皇后天順八年十月也萬貴妃寵冠後宮后處之淡如孝宗即位尊為皇太后武宗即位尊為太皇太后正德五年十二月上尊號曰慈聖康壽十三年二月崩上尊諡曰孝貞莊懿恭靖仁慈欽天輔聖純皇后合葬茂陵祔太廟孝穆紀太后孝宗生母也賀縣人本蠻土官女成化中征蠻俘入掖庭授女史警敏通文字命守內藏時萬貴妃專寵而妬後宮有娠者皆治使墮柏賢妃生悼恭太子亦為所害帝偶行內藏應對稱旨悅幸之遂有身萬貴妃知而恚甚令婢鈎治之婢謬報曰病痞乃謫居安樂堂久之生孝宗使門監張敏溺焉敏驚曰上未有子奈何棄之稍哺粉餌飴蜜藏之他室貴妃日伺無所得至五六歲未敢剪胎髮時吳后廢居西內近安樂堂密知其事往來哺養帝不知也帝自悼恭太子薨後久無嗣中外皆以為憂成化十一年帝召張敏櫛髮照鏡嘆曰老將至而無子敏伏地曰死罪萬歲已有子也帝愕然問安在對曰奴言即死萬歲當為皇子主於是太監懷恩頓首曰敏言是皇子潛養西內今已六歲矣匿不敢聞帝大喜即日幸西內遣使往迎皇子使至妃抱皇子泣曰兒去吾不得生兒見黃袍有鬚者即兒父也衣以小緋袍乘小輿擁至階下髮披地走投帝懷帝置之膝撫視久之悲喜泣下曰我子也類我使懷恩赴內閣具道其故羣臣皆大喜明日入賀頒詔天下移妃居永壽宮數召見萬貴妃日夜怨泣曰羣小紿我其年六月妃暴薨或曰貴妃致之死或曰自縊也諡恭恪莊僖淑妃敏懼亦吞金死敏同安人孝宗既立為皇太子時孝肅皇太后居仁壽宮語帝曰以兒付我太子遂居仁壽一日貴妃召太子食孝肅謂太子曰兒去無食也太子至貴妃賜食曰已飽進羹曰疑有毒貴妃大恚曰是兒數歲即如是他日魚肉我矣因恚而成疾孝宗即位追諡淑妃為孝穆慈慧恭恪莊僖崇天承聖純皇后遷葬茂陵別祀奉慈殿帝悲念太后特遣太監蔡用求太后家得紀父貴紀祖旺兄弟以聞帝大喜詔改父貴為貴授錦衣衛指揮同知祖旺為旺授錦衣衛指揮僉事賜豫第宅金帛莊田奴婢不可勝計追贈太后父為中軍都督府左都督母為夫人其曾祖祖父亦如之遣修太后先塋之在賀者置守墳戶復其家先是太后在宮中嘗自言家賀縣姓紀幼不能知親族也太監郭鏞聞而識之太監陸愷者亦廣西人故姓李蠻中紀李同音因妄稱太后兄令人訪其族人詣京師愷女兄夫韋父成者出冒之有司待以戚畹名所居里曰迎恩里貴旺曰韋猶冒李況我實李氏因詐為宗系上有司有司莫辨也二人既驟貴父成亦詣闕爭辨帝命郭鏞按之鏞逐父成猶令馳驛歸及帝使治后先塋蠻中李姓者數輩皆稱太后家自言於使者使者還奏貴旺不實復遣給事中孫圭御史滕祐間行連賀間微服入瑤僮中訪之盡得其狀歸奏帝謫罰鏞等有差戍貴旺邊海自此帝數求太后家竟不得弘治三年禮部尚書耿裕奏曰粵西當大征之後兵燹饑荒人民奔竄歲月悠遠踪跡難明昔孝慈高皇后與高皇帝同起艱難化家為國徐王親高皇后父當后之身尋求家族尚不克獲然後立廟宿州春秋祭祀今紀太后幼離西粵入侍先帝連賀非徐宿中原之地嬪宮無母后正位之年陛下訪尋雖切安從得其實哉臣愚謂可倣徐王故事定擬太后父母封號立祠桂林致祭帝曰孝穆皇太后早棄朕躬每一思念惄焉如割初謂宗親尚可旁求寧受百欺冀獲一是卿等謂歲久無從物色請加封立廟以慰聖母之靈皇祖既有故事朕心雖不忍又奚敢違於是封后父推誠宣力武臣特進光祿大夫柱國慶元伯諡端僖后母伯夫人立廟桂林府有司歲時祀大學士尹直撰哀冊有云覩漢家堯母之門增宋室仁宗之慟帝燕閒念誦輒欷歔流涕也孝惠邵太后憲宗妃興獻帝母也父林昌化人貧甚鬻女於杭州鎮守太監妃由此入宮知書有容色成化十二年封宸妃尋進封貴妃興王之藩妃不得從世宗入繼大統妃已老目眚矣喜孫為皇帝摸世宗身自頂至踵已尊為皇太后嘉靖元年上尊號曰壽安十一月崩帝欲明年二月遷葬茂陵大學士楊廷和等言祖陵不當數興工作驚動神靈不從諡曰孝惠康肅溫仁懿順協天祐聖皇太后別祀奉慈殿七年七月改稱太皇太后十五年遷主陵殿稱皇后與孝肅孝穆等恭肅貴妃萬氏諸城人四歲選入掖廷為孫太后宮女及長侍憲宗於東宮憲宗年十六即位妃已三十有五機警善迎帝意遂讒廢皇后吳氏六宮希得進御帝每遊幸妃戎服前驅成化二年正月生皇第一子帝大喜遣中使祀諸山川遂封貴妃皇子未期薨妃亦自是不復娠矣當是時帝未有子中外以為憂言者每請溥恩澤以廣繼嗣給事中李森魏元御史康永韶等先後言尤切四年秋彗星屢見大學士彭時尚書姚夔亦以為言帝曰內事也朕自主之然不能用妃益驕中官用事者一忤意立見斥逐掖廷御幸有身飲藥傷墜者無數孝宗之生頂寸許無髮或曰藥所中也紀淑妃之死實妃為之佞幸錢能覃勤汪直梁芳韋興輩皆假貢獻苛斂民財傾竭府庫以結貴妃歡奇技淫巧禱祠宮觀糜費無算久之帝後宮生子漸多芳等懼太子年長他日立將治己罪同導妃勸帝易儲會泰山震占者謂應在東宮帝心懼事乃寢二十三年春暴疾薨帝輟朝七日諡曰恭肅端慎榮靖皇貴妃葬天壽山弘治初御史曹璘請削妃諡號魚臺縣丞徐頊請逮治診視紀太后諸醫捕萬氏家屬究問當時薨狀孝宗以重違先帝意已之
