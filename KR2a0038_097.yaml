body:
  text: 明史卷九十七志第七十三藝文二史類十一曰正史類編年在內二曰雜史類三曰史鈔類四曰故事類五曰職官類六曰儀注類七曰刑法類八曰傳記類九曰地理類十曰譜牒類明太祖實録二百五十七卷建文元年董倫等修永樂元年解縉等重修九年胡廣等復修起元至正辛卯訖洪武三十一年戊寅首尾四十八年萬曆時允科臣楊天民請附建文帝元二三四年事迹於後日曆一百卷洪武中詹同等編具載太祖征討平定之績禮樂治道之詳寶訓十五卷日曆既成詹同等又請分類更輯聖政為書凡五卷其後史官隨類增至十五卷成祖實録一百三十卷寶訓十五卷楊士奇等修仁宗實録十卷寶訓六卷蹇義等修宣宗實録一百十五卷寶訓十二卷楊士奇等修英宗寶録三百六十一卷成化元年陳文等修起宣德十年正月訖天順八年正月首尾三十年附景泰帝事迹於中凡八十七卷寶訓十二卷與實録同修憲宗實録二百九十三卷寶訓十卷劉吉等修孝宗實録二百二十四卷正德元年劉健謝遷等修未幾健遷皆去位焦芳等續修寶訓十卷與實録同修武宗實録一百九十七卷寶訓十卷費宏等修睿宗實録五十卷寶訓十卷嘉靖四年大學士費宏言獻皇帝嘉言懿行舊邸必有成書宜取付史館纂修從之世宗實録五百六十六卷寶訓二十四卷隆慶中徐階等修未竣萬曆五年張居正等續修成之穆宗實録七十卷寶訓八卷張居正等修神宗實録五百九十四卷寶訓二十六卷溫體仁等修光宗實録八卷天啓三年葉向高等修成有熹宗御製序既而霍維華等改修未及上而熹宗崩至崇禎元年始進呈向高原本並貯皇史宬熹宗實録八十四卷溫體仁等修洪武聖政記二卷永樂聖政記三卷永樂年表四卷洪熙年表二卷宣德年表四卷儲巏皇明政要二十卷鄭曉吾學編六十九卷雷禮大政記三十六卷鄧元錫明書四十五卷夏浚皇明大紀三十六卷王世貞國朝紀要十卷天言彙録十卷陳建皇明通紀二十七卷續通紀十卷薛應旗憲章録四十六卷沈越嘉隆聞見紀十二卷唐志大高廟聖政記二十四卷孫宜國朝事迹一百二十卷吳朴洪武大政記二十卷吳瑞登明繩武編三十四卷嘉隆憲章録二十卷黃翔鳳嘉靖大政編年紀一卷嘉靖大政類編二卷陳翼飛史待五十卷何喬遠名山藏三十七卷朱國禎史概一百二十卷輯皇明紀傳三十卷支大倫永昭二陵編年信史六卷尹守衡史竊一百七卷朱睦聖典三十四卷茅維嘉靖大政記二卷吳士奇皇明副書一百卷談希思皇明大紀纂要六十三卷王大綱皇門朝野紀略一千二百卷雷叔聞國史四十卷周永春政紀纂要四卷張銓國史紀聞十二卷馮復京明右史略三十卷陳仁錫皇明世法録九十二卷沈國元天啓從信録三十五卷江旭奇通紀集要六十卷談遷國榷一百卷已上明史元史二百十二卷洪武中宋濂等修續宋元資治通鑑綱目二十七卷成化中商輅等修歷代通鑑纂要九十二卷弘治中李東陽等修周定王橚甲子編年十二卷王禕大事記續編七十七卷梁寅宋史略四卷元史略四卷朱右元史補遺十二卷張九韶元史節要二卷胡粹中元史續編七十七卷丘濬世史正綱三十二卷金濂諸史會編一百十二卷南軒資治通鑑綱目前編二十五卷柯維騏宋史新編二百卷唐順之史纂左編一百四十二卷右編四十卷薛應旗宋元資治通鑑一百五十七卷甲子會紀五卷王宗沐宋元資治通鑑六十四卷安都十九史節定一百七十卷吳珫史類六百卷鄧元錫函史上編九十五卷下編二十卷許誥綱目前編三卷魏國顯史書大全五百十二卷黃佐通曆三十六卷薑寶稽古編大政記綱目八卷資治上編大政記綱目四十卷下編大政記綱目三十二卷邵經邦學史會同三百卷弘簡録二百五十卷楊寅冬歷代史彙二百四十卷饒伸學海君道部二百三十四卷徐師曾世統紀年六卷吳繼安帝王曆祚考八卷馮琦宋史紀事本末二十八卷張溥宋史紀事本末一百九卷元史紀事本末二十七卷陳邦瞻元史紀事本末六卷湯桂禎戰國紀年四十六卷嚴衍資治通鑑補二百七十卷已上通史右正史類一百十部一萬二百三十二卷劉辰國初事迹一卷俞本記事録二卷王禕造邦勳賢略一卷劉基禮賢録一卷翊運録二卷楊儀壟起雜事一卷紀張士誠韓林兒徐壽輝事楊學可明氏實録一卷明玉珍事何榮祖家記一卷何真子紀真事張紞雲南機務鈔黃一卷夏原吉萬乘肇基録一卷卞瑺興濠開基録一卷陸深平元録一卷童承平漢録一卷黃標平夏録一卷姚淶驅除録一卷蔡于穀開國事略十卷孫宜明初略二卷邵相皇明啓運録八卷梁億洪武輯遺二卷范守己造夏略二卷戴重和陽開天記一卷錢謙益開國群雄事略十五卷太祖實録辨證三卷已上皆紀洪武時事袁祥建文私記一卷孫交國史補遺六卷薑清祕史一卷黃佐革除遺事六卷張芹建文備遺録二卷何孟春續備遺録一卷馮汝弼補備遺録一卷許相卿革朝志十卷朱睦遜國記二卷屠叔方建文朝野彙編二十卷朱鷺建文書法擬四卷陳仁錫壬午書二卷曹參芳遜國正氣紀九卷周遠令建文紀三卷已上紀建文時事都穆壬午功臣爵賞録一卷別録一卷袁褧奉天刑賞録一卷郁袞順命録一卷楊榮北征記一卷金幼孜北征前録一卷後録一卷黃福安南事宜一卷丘濬平定交南録一卷楊士奇三朝聖諭録三卷西巡扈從紀行録一卷已上紀永樂洪熙宣德時事袁彬北征事迹一卷楊銘正統臨戎録一卷北狩事迹一卷李實使北録一卷劉定之否泰録一卷劉濟革書一卷塞外無楮以羊皮書之故名革書李賢天順日録二卷湯韶天順實録辨證一卷張楷監國曆略一卷彭時可齋筆記二卷已上紀正統景泰天順時事馬文升西征石城記一卷興復哈密記一卷宋端儀立齋間録四卷梅純損齋備忘録二卷李東陽燕對録二卷劉大夏宣召録一卷陳洪謨治世餘聞四卷弘治繼世紀聞四卷正德許進平番始末一卷朱國祚孝宗大紀一卷費宏武廟初所見事一卷楊廷和視草餘録二卷王鏊震澤紀聞一卷續紀聞一卷震澤長語二卷守溪筆記二卷王瓊雙溪雜記二卷楊一清西征日録一卷車駕幸第録二卷胡世寧桃源建昌征案東鄉撫案共十卷祝允明九朝野記四卷江海殲渠記一卷紀劉六劉七趙風子事夏良勝東戍録一卷謝蕡後鑒録三卷已上紀成化弘治正德時事世宗大禮集議四卷纂要二卷明倫大典二十四卷大狩龍飛録二卷王之垣承天大志紀録事實三十卷費宏宸章集録一卷張孚敬敕諭録三卷諭對録三十四卷大禮要略二卷欽明大獄録二卷李時南城召對録一卷文華盛記一卷夏言聖駕渡黃河記一卷記召對廟廷事一卷扈蹕録一卷嚴嵩嘉靖奏對録十二卷毛澄聖駕臨雍録一卷陸深聖駕南巡録一卷北還録一卷韓邦奇大同紀事一卷孫允中雲中紀變一卷蘇祐雲中事紀一卷張嶽交事紀聞一卷翁萬達平交紀事十卷江美中安南來威輯略三卷談愷前後平粵録四卷王軾平蠻録二卷萬表前後海寇議三卷鄭茂靖海紀略一卷徐宗魯松寇紀略一卷李日華倭變志一卷張鼐吳淞甲乙倭變志二卷朱紈茂邊紀事一卷趙汝謙平黔三記一卷徐學謨世廟識餘録二十六卷高拱邊略五卷劉應箕款塞始末一卷方逢時平惠州事一卷林庭機平曾一本一卷查志隆安慶兵變一卷曹子登甘州紀變一卷王尚文征南紀略一卷張居正召對紀事一卷申時行召見紀事一卷王錫爵召見紀事一卷趙志皋召見紀事一卷方從哲乙卯召對録三卷董其昌萬曆事實纂要三百卷顧憲成寤言寐言一卷陳惟之乞停礦稅疏圖一卷郭子章黔中止榷記一卷西南三征記一卷黔中平播始末三卷王禹聲郢事紀略一卷紀楚中稅監激變事郭正域楚事妖書始末一卷朱賡勘楚始末一卷蔡獻臣勘楚紀事一卷瞿九思萬曆武功録十四卷諸葛元聲兩朝平攘録五卷茅瑞徵萬曆三大征考五卷哱氏關白楊應龍曾偉芳寧夏紀事一卷宋應昌朝鮮復國經略六卷蕭應宮朝鮮征倭紀略一卷王士琦封貢紀略一卷李化龍平播全書十五卷楊寅秋平播録五卷沈德符野獲編八卷李維楨庚申紀事一卷張潑庚申紀事一卷已上紀嘉靖隆慶萬曆時事三朝要典二十四卷天啓中顧秉謙等修崇禎初詔毀之蔡茂才三案記一卷蔡士順傃菴野鈔十一卷李橒全黔紀略一卷張鍵平藺紀事一卷李遜之三朝野記七卷蔣德璟賣心書十卷李日宣枚卜始末一卷楊士聰玉堂薈記四卷孫承宗督師全書一百卷楊嗣昌督師紀事五十卷夏允彝幸存録一卷夏完淳續幸存録一卷吳偉業綏寇紀略十二卷文秉先撥志始六卷烈皇小識四卷彭孫貽流寇志十四卷李清南渡録二卷已上紀天啓崇禎時事黃瑜雙槐歲鈔十卷起洪武訖成化中事倫以訓國朝彝憲二十卷孫宜國朝事迹一百二十卷高岱鴻猷録十六卷鄭曉今言四卷徵吾録二卷吾學編餘一卷潘恩美芹録二卷袁帙皇明獻實二十卷孫繼芳磯園稗史二卷李先芳安攘新編三十卷王世貞弇山堂別集一百卷識小録二十卷少陽叢談二十卷明野史彙一百卷萬曆中董復表彙纂諸集為弇州史料凡一百卷鄧球泳化類編一百三十六卷雜記二卷高鳴鳳今獻彙言二十八卷何棟如皇明四大法十二卷王禪國朝史略四十五卷別集二卷于慎行穀山筆麈十八卷黃汝良野紀矇搜十二卷起洪永訖嘉隆曹育賢皇明類考二十二卷鄒德泳聖朝泰交録八卷張萱西園聞見録一百六卷吳士奇徵信編五卷考信編二卷項鼎鉉名臣寧攘編三十卷范景文昭代武功録十卷已上統紀明代事寧獻王權漢唐祕史二卷洪武中奉敕編次吳源至正近記二卷權衡庚申外史二卷楊循吉遼金小史九卷楊慎滇載記一卷倪輅南詔野史一卷包宗吉古史補二百卷袁祥新舊唐書折衷二十四卷程敏政宋紀受終考一卷李維楨韓范經略西夏紀一卷王士騏苻秦書十五卷李廷機宋賢事彙二卷姚士粦後梁春秋十卷胡震亨靖康盜鑒録一卷陳霆唐餘紀傳二十一卷錢謙益北盟會編鈔三卷已上紀前代事右雜史類二百十七部二千二百四十四卷楊維楨史義拾遺二卷范理讀史備忘八卷陳濟通鑑綱目集覽正誤五十九卷趙弼雪航膚見十卷李裕分類史鈔二十二卷呂柟史約三十七卷許誥宋元史闡幽三卷張寧讀史録六卷李浩通鑑斷義七十卷邵寶學史十三卷王峯通鑑綱目發微三十卷張時泰續通鑑綱目廣義十七卷卜大有史學要義四卷周山師資論統一百卷鄭曉刪改史論十卷柯維騏史記考要十卷王洙宋元史質一百卷戴璟漢唐通鑑品藻三十卷鍾芳續古今紀要十卷歸有光讀史纂言十卷李維楨南北史小識十卷萬廷言經世要略二十卷張之象太史史例一百卷徐明勳史衡二十卷于慎行讀史漫録十四卷李贄藏書六十八卷續藏書二十七卷馬惟銘史書纂略一百卷趙惟寰讀史快編六十卷謝肇浙史鐫二十一卷吳無奇史裁二十六卷張溥史論二編十卷楊以任讀史四集四卷馮尚賢史學彙編十二卷右史鈔類三十四部一千四十三卷太祖御製永鑑録一卷訓親藩紀非録一卷訓周齊潭魯諸王祖訓録一卷洪武中編集太祖製序頒賜諸王祖訓條章一卷封建王國之制宗藩昭鑑録五卷洪武中陶凱等編集歷代公主録一卷洪武中編集世臣總録二卷為政要録一卷醒貪簡要録二卷武士訓戒録一卷臣戒録一卷俱洪武中頒行存心録十八卷吳沉等編集省躬録十卷劉三吾等編集精誠録三卷吳沉等編集國朝制作一卷王叔銘等編集宣宗御製歷代臣鑑三