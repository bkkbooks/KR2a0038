body:
  text: 明史卷一百六十列傳第四十八王彰魏源金濂石璞王卺羅通羅綺張固張瑄張鵬李裕王彰字文昭鄭人洪武二十年舉於鄉補國子生使山東平糴以廉幹稱擢吏科源士踰年革源士改給事中纍遷山西左參政永樂五年召為禮部侍郎父喪服除改戶部陝西大疫奉使祀西嶽新安民鬻子女償賦彰奏為蠲除贖還所鬻改右副都御史陝西僉事馬英激肅州番為變殺御史及都指揮彰劾英置極典又劾御史陳孟旭受賕枉法文獻盜銀課及金吾指揮李嚴逐母不養皆坐死他所論劾甚衆十一年從帝北巡彰有母年八十餘矣命歸省賜其母冠服金幣諭之曰君子居官不忘親居家不忘君凡所過民安否吏賢不肖悉以聞彰還奏事稱旨久之進右都御史十九年帝遣廷臣二十六人巡撫天下彰與給事中王勵往河南終明世大臣得撫鄉土者彰與葉春而已河南水災民多流亡長吏不加恤彰奏黜貪刻者百餘人罷不急之徵十餘事招復流民發廩振貸多所全活還朝命督餉北征仁宗即位河溢開封命彰與都指揮李信往振恤宣德元年五月命彰自良鄉抵南京巡撫軍民尋以所言率常事降敕切責令詳具利病以聞復諭侍臣曰兩京相距數千里驛使往來為擾或遘水旱小民失所朝使還及御史巡歷皆不以告故遣彰往視今所奏多細故大臣如此朕復何望卿等當悉朕意君臣同體勿有所疑尋召還命與都督山雲巡山海至居庸諸關隘踰二月還奏將士擅離者帝命逮治遂命兵部三月一遣御史給事中點閲明年四月卒於官彰嚴介自持請托皆絶然用法過刻其母屢以為言不能改時劉觀為左都御史人謂彰公而不恕觀私而不刻云魏源字文淵建昌縣人永樂四年進士除監察御史辨松江知府黃子威誣奏減浙東瀕海漁課巡按陝西西安大疫療活甚衆奏言諸府倉粟積一千九十餘萬石足支十年今民疫妨農請輸鈔代兩稅之半從之涼州土寇將為變亟請剿亂遂息兩遭喪俱起復洪熙元年出為浙江按察副使宣德三年召署刑部右侍郎五年河南旱荒民多轉徙帝以源廉正有為命為左布政使俾馳驛之任時侍郎許廓往撫輯廷議又起丁憂布政使李昌祺原官源與廓昌祺發倉廩免逋賦雜役流民漸歸雨亦旋降歲大豐居三年召還授刑部左侍郎明年永豐民夏九旭等據大盤山為亂帝以源江西人命撫之都督任禮帥兵隨其後未至官軍擒九旭因命二人採木四川兼飭邊務英宗即位進尚書正統二年五月命整飭大同宣府諸邊許便宜行事源遣都督僉事李謙守獨石楊洪副之劾萬全衛指揮杜衡戍廣西明年奏大同總兵官談廣老帝命黃真楊洪充左右參將協鎮諸將肅然按行天城朔州諸險要令將吏分守設威遠衛增修開平龍門城自獨石抵宣府增置墩堠免屯軍租一年儲火器為邊備諸依權貴避役者悉括歸伍尋以宣大軍務久弛請召還巡撫僉都御史盧睿而薦兵部侍郎于謙為鎮守參贊朝廷以謙方撫山西河南不聽于是言官以臨邊擅易置大臣為源罪合疏劾之且言源為御史嘗犯贓乃冒領誥命帝以源有勞置不問事竣還朝與都御史陳智相詈於直廬智以聞詔兩責之歲旱録上疑獄且請推行於天下報可旋坐決獄不當與侍郎何文淵俱下獄得宥復以上遼王貴烚罪狀不言其內亂事與三司官皆繫詔獄纍月釋還職源在刑部久議獄多平恕陝西僉事計資言武臣雜犯等罪豫半俸謫極邊源以所言深刻奏寢之郎中林厚言禁刁訟告訐及擇理刑官勘重囚務憑贓具四事皆以源議得施行六年以足疾命朝朔望八年致仕卒金濂字宗瀚山陽人永樂十六年進士授御史宣德初巡按廣東廉能最改按江西浙江捕巨盜不獲坐免盜就執乃復官嘗言郡縣吏貪濁宜敕按察司巡按御史察廉能者如洪武間故事遣使勞賚則漬濁分循良勸帝嘉納之用薦遷陝西副使正統元年上書請補衛所缺官益寧夏守兵設漢中鎮守都指揮使多議行三年擢僉都御史參贊寧夏軍務濂有心計善籌畫西陲晏然寧夏舊有五渠而鳴沙洲七星漢伯石灰三渠淤濂請濬之溉蕪田一千三百餘頃時詔富民輸米助邊千石以上褒以璽書濂言邊地粟貴請並旌不及額者儲由此充六年詔僉都御史盧睿與濂更代明年睿召還濂復出鎮尋加右副都御史與睿代者再八年秋拜刑部尚書侍經筵十一年安鄉伯張安與弟爭祿詔逮治法司與戶部相諉言官劾濂及戶部尚書王佐右都御史陳鎰侍郎丁鉉馬昂副都御史丁璿程富等俱下獄數日釋之福建賊鄧茂七等為亂都督劉聚都御史張楷征之不克十三年十一月大發兵命寧陽侯陳懋等為將軍往討以濂參軍務比至御史丁瑄已大破賊茂七死餘賊擁其兄子伯孫據九龍山拒官軍濂與衆謀羸師誘之出伏精兵入其壘遂擒伯孫帝乃移楷討浙寇而留濂擊平餘賊未下者會英宗北狩兵事棘召還言者交劾濂無功景帝不問加濂太子賓客給二俸尋改戶部尚書進太子太保時四方用兵需餉急濂綜核無遺議上撙節便宜十六事國用得無乏未幾上皇還也先請遣使往來如初帝堅意絶之濂再疏諫不聽初帝即位詔免景泰二年天下租十之三濂檄有司但減米麥其折收銀布絲帛者徵如故三年二月學士江淵以為言命部查理濂內慚抵無有給事中李侃等請詰天下有司違詔故濂恐事敗乃言銀布絲帛詔書未載若概減免國用何資於是給事中御史劾濂失信於民為國斂怨且訐其陰事帝欲宥之而侃與御史王允力爭遂下都察院獄越三日釋之削宮保改工部吏部尚書何文淵言理財非濂不可乃復還戶部濂上疏自理遂乞骸骨帝慰留之東宮建復宮保尋復條上節軍匠及僧道冗食共十事五年卒官以軍功追封沭陽伯諡榮襄濂剛果有才所至以嚴辦稱然接下多暴怒在刑部持法稍深及為戶部值兵興財詘頗厚斂以足用云石璞字仲玉臨漳人永樂九年舉於鄉入國學選授御史正統初歷任江西按察使三年坐逸囚降副使璞善斷疑獄民娶婦三日歸寧失之婦翁訟壻殺女誣服論死璞禱於神夢神示以麥字璞曰麥者兩人夾一人也比明械囚趣行刑未出一童子窺門屏間捕入則道士徒也叱曰爾師令爾偵事乎童子首實果二道士匿婦槁麥中立捕論如法在江西數年風紀整肅雖婦豎無不知石憲使者七年遷山西布政使明年以朝廷歲用物料有司科派擾民請于折糧銀內歲存千兩令官買辦庶官用可完民亦不擾從之工部尚書王卺以不能屈意王振十三年致仕去璞為振所善遂召為尚書明年處州賊葉宗留作亂總兵官徐恭等往討以璞參其軍事師未至宗留已為其黨陳鑑胡所殺巡撫張驥招降鑑胡賊勢稍息璞等逗遛無功為御史張洪等所劾詔俟師旋以聞已而景帝嗣位召還論功兼大理寺卿尋出募天下義勇還朝會中官金英下獄法司劾璞嘗賂英遂並下璞獄當斬特宥之出理大同軍餉敵犯馬營命提督宣府軍務至則寇已退還理部事加太子太保給二俸河決沙灣命治之璞以決口未易塞別濬渠自黑洋山至徐州以通漕艘而決口如故乃命內官黎賢等偕御史彭誼助之于沙灣築石堤以禦決河開月河二引水益運河以殺水勢決乃塞璞還言京師盜賊多出軍伍間有獲者輒云糧餉虧減妻孥饑凍故又聞兩畿山東河南被災窮民多事剽掠不及今拊循恐方來之憂甚於邊患口外守軍夜行晝伏艱苦萬狀今邊疆未靖宜增餉以作士氣乃反減其月糧此實啓盜國之端非節財足用之術帝深納其言沙灣復決璞再往治之以母憂歸起復六年改兵部尚書與于謙協理部事明年湖廣苗亂命璞總督軍務與南和伯方瑛討之天順元年以捷聞召還命致仕既而論功賜鈔幣四年冬用李賢薦召為南京左都御史時璞已老聵不能任事七年為錦衣衛指揮僉事門達所劾罷歸卒王卺郿人永樂中鄉薦歷山東左布政使所至有惠政正統六年入為工部侍郎代吳中為尚書歸家十五年卒羅通字學古吉水人永樂十年進士授御史巡按四川都指揮郭贇與清軍御史汪琳中交通為奸利通劾奏逮治之三殿災偕同官何忠等極陳時政闕失忤旨出為交址清化知州宣德元年黎利反王通戰敗擅傳檄割清化迤南畀賊賊方圍清化通與指揮打忠堅守乘間破賊殺傷甚衆賊將遁而檄至通曰吾輩殺賊多出城必無全理與就縛曷若盡忠死乃與忠益固守賊久攻不下令降將蔡福說降通登陴大罵賊知城不可拔引去及還京宣宗大奬勞之改戶部員外郎出理宣府軍餉奏言朝議儲餉開平令每軍運一石又當以騎士護行計所費率二石七斗而致一石今軍民多願輸米易鹽請捐舊例五分之二則人自樂輸餉足而兵不疲帝可之正統初遷兵部郎中從尚書王驥整飭甘肅邊務從破敵于兀魯乃還以貪淫事為驥所覺驥遣通奏邊情即疏通罪下獄謫廣西容山閘官已調東莞河泊所官九年都督僉事曹儉薦其有文武才乞收用吏部執不可景帝監國以于謙陳循薦起兵部員外郎守居庸關俄進郎中帝即位進右副都御史也先犯京師別部攻居庸甚急天大寒通汲水灌城氷堅不得近七日遁走追擊破之景泰元年召還時楊洪督京營命通參軍務兼理院事言諸邊報警率由守將畏徵調飾詐以惑朝廷遇賊數十輒稱殺敗數千向者德勝等門外不知斬馘幾何而獲官者至六萬六千餘人輦下且然何況塞外且韓信起自行伍穰苴拔於寒微宜博搜將士中如信苴者與議軍事若今腰玉珥貂皆苟全性命保爵祿之人憎賢忌才能言而不能行未足與議也意蓋詆謙與石亨輩謙疏辨言概責邊報不實果有警不奏必致誤事德勝門外官軍升級惟武清侯石亨功次冊當先者萬九千八百餘人及陳亡三千餘人而已安所得六萬之多通以為濫宜將臣及亨等升爵削奪有如韓信穰苴者乞即命指薦並罷臣營務俾專治部事疏下廷議廷臣共言謙及石亨楊洪實堪其任又謂通志在滅賊無他帝兩解之尋敕謙録功不得如從前冒濫蓋因通言而發也給事中覃浩等言通本以知兵用不宜理院事乃解其兼職塞上軍民多為寇所掠通請榜諸邊能自歸者軍免戍守三年民復徭役終身又請懸封爵重賞募能擒斬也先伯顏帖木兒喜寧者已又言古之將帥務搜拔衆才如知山川形勢者可使導軍能騰高越險者可使覘敵能風角鳥占者可使備變今軍中未見其人乞敕廷臣各舉所知命總兵官楊洪副將孫鏜同臣考驗詔皆行之宣府有警總兵官朱謙告急廷推都督同知范廣帥兵往以通提督軍務寇退駐師懷來宣府以邊儲不敷召還六月于謙以山西近寇請遣大臣往鎮楊洪亦乞遣重臣從雁門關護餉大同帝以命通通不欲行請得與謙洪俱謙言國家多難非臣子辭勞之日奏乞躬往帝不允卒命通通本謙所舉而每事抵牾人由是不直通二年召還仍贊軍務東宮改建加太子少保上言貢使攜馬四萬餘匹宜量增價酬之價增則後來益衆此亦強中國弱外裔之一策帝以所貢馬率不堪用若增價正墮賊計寢通奏四年進右都御史贊軍務如故通好大言遇人輒談兵自陳殺賊功求世襲武職為給事中王竑所劾帝釋不罪天順初自陳預謀迎駕恐為石亨等所掩乃授其二子所鎮撫三年致仕成化六年卒賜祭葬如例羅綺磁州人宣德五年進士英宗即位授御史按直隸福建有能名正統九年參贊寧夏軍務踰年當代軍民詣鎮守都御史陳鎰乞留以聞命復任尋擢大理右寺丞參贊如故常以事劾指揮任信陳斌二人皆王振黨十一年四月信斌訐綺不法事下總兵官黃真覆核真謂綺常詈宦官為老奴以激怒振召還京法司擬贖振改令錦衣衛再鞫指揮同知馬順鍛鍊成獄謫戍遼東景帝立綺訴冤不聽尋用尚書于謙金濂薦召復故官進右少卿副李實使瓦剌上皇還以勞擢刑部左侍郎明年二月出督雲南四川軍儲已代寇深鎮守松潘賊首卓勞糾他寨阿兒結等頻為寇綺擒斬之土官王永高茂林董敏相讐殺守將不能制綺搗永巢誅之又敗黑虎諸塞番斬馘三百五十在鎮七年威名甚震天順初召為左副都御史以功賜二品祿御史張鵬楊瑄劾石亨亨謂綺與右都御史耿九疇使之並下獄降廣東參政綺鞅鞅未赴明年閏二月綺鄉人告磁州同知龍約自京還與綺言天子仍寵宦官刻香木為王振形以葬綺微笑云朝廷失政致吾輩降黜奏上捕綺下吏坐死籍其家陳所籍財賄于文華門示百官家屬戍邊婦女沒入浣衣局憲宗立赦為民還其資産時與綺先後鎮四川者張固字公正新喻人宣德八年進士正統初授刑科給事中改吏科奉命撫裕州流民景泰改元給事中李實請於四川行都司設鎮守大臣乃遷固大理右少卿鎮建昌有政績三年還理寺事山東盜起奉命督捕適霖潦災流人載道固盡心振恤盜賊弭散還卒於官固在諫職敢言大臣多被彈劾又劾都御史陳鎰等舉屬官出身掾吏者為知府自是掾吏不得歷知府著為例英宗將北征偕同官疏諫復辟追念之已卒遣使諭祭官其一子子黼仕至廣西按察使張瑄字廷璽江浦人正統七年進士授刑部主事歷郎中有能聲景泰時賜敕為吉安知府俗尚巫迎神無休日瑄遇諸途投神水中俄遘危疾父老皆言神為祟請復之瑄怒不許疾亦愈歲大饑陳牒上官不俟報輒發廩振貸居八年用薦擢廣東右布政使廣西賊莫文章等越境陷連山瑄擊斬之又破陽山賊周公轉新興賊鄧李保等既而大藤峽賊頻陷屬邑瑄坐停俸成化初韓雍平賊録瑄轉餉勞賜銀幣給俸如初瑄按行所部督建預備倉六十二修陂塘墟岸四千六百增築廣州新會諸城垣一十二民德瑄惟恐其去既轉左布政使會滿九載當赴京軍民相率乞留巡撫陳濂等為之請乃仍故任八年始以右副都御史巡撫福建平賊林壽六魏懷三等福安壽寧諸縣鄰江浙賊首葉旺葉春等負險瑄捕誅之餘盡解散帝降敕勞之改撫河南議事入都陳撫流民振滯才十八事所司多議行黃河水溢瑄請振且移王府祿米於他所留應輸榆林餉濟荒石取直八錢輸榆林民稱便還理院事尋遷南京刑部侍郎久之進尚書二十年星變被劾帝弗問居三年給事御史復劾之遂落職孝宗立復官致仕張鵬字騰霄淶水人景泰二年進士授御史上疏言懷利事君人臣所戒比每遇聖節或進羊馬錦綺交錯殿廷自非貪賄安有餘財充進奉且陛下富有四海豈藉是足國哉宜一切停罷塞諂諛奔競之途疏凡四事帝頗採用出按大同宣府奏兩鎮軍士敝衣菲食病無藥死無棺乞官給醫藥棺槥設義冢俾饗厲祭死者蒙恩則生者勸帝立報可且命諸邊概行之奏停淮揚征賦給牛種天順元年同官楊瑄劾石亨曹吉祥鵬亦偕劉泰魏瀚康驥論劾俱得罪下詔獄諸御史多謫官而鵬瑄戍遼東頃之赦免復戍南丹憲宗立廷臣交薦召復原官尋超擢福建按察使成化四年以右僉都御史巡撫廣西剿蠻寇有功其冬罷巡撫官命還理南京都察院事改督漕運兼撫淮揚四府尋解漕務專理巡撫事復還南院進副都御史巡撫寧夏召還歷兵部左右侍郎十八年代陳鉞為兵部尚書守珠池宦官韋助乞往來高肇瓊廉會守巡官捕寇鵬執不可帝竟許之南北印馬率遣勛臣內侍後以災傷止遣御史是年帝復欲遣內侍鵬等執不可帝勉從之命俟後仍如故事鎮守大同中官汪直言小王子將大舉請發京兵援鵬等言大同士馬四萬已足用所請宜勿許且京軍困營造精力銷沮猝有急何以作威厲氣請悉停其役詔可尋加太子少保鵬初為御史剛直尚氣節有盛名後揚歷中外惟事安靜羣小竊柄閣臣萬安劉吉輩專營私鵬循職而已不能有所匡救二十一年星變鵬偕僚屬言傳奉武職至八百餘人乞悉令閒住非軍功毋濫授四方鎮守監槍守備內官非正統間原設者悉宜召還廷臣亦交以請下兵部覆核鵬畏中官不敢堅其議帝遂盡留之時論皆咎鵬奸民章瑾獻珍寶得為錦衣鎮撫理刑缺鵬所上不允知帝意屬瑾即推用焉臺諫劾大臣不職者多及鵬鵬力求去遂賜敕給驛以歸弘治四年卒諡懿簡李裕字資德豐城人景泰五年進士授御史天順中巡按陝西上安邊八事石彪濫報首功詔裕核實彪從父亨以書抵裕裕焚之以實聞亨亦旋敗由是有強直聲都御史寇深遇僚屬嚴惟裕不為屈以才擢山東按察使重囚二百餘人或經十餘年未判裕旬月間決遣殆盡大峴山賊寨七十餘裕捕戮其魁縱脅從除其逋負亂遂平成化初遷陝西左布政使入為順天府尹政聲大著進右副都御史總督漕運兼巡撫江北諸府濬白塔孟瀆二河以便漕張秋南旺及淮安西湖舊編木捍衝激勞費無已裕與郎中楊恭等謀易以石遂為永利淮鳳方饑而太僕徵預備馬二萬匹裕論罷之在淮六歲每歲入計事陳利病多施行父憂歸服除留佐院事十九年代戴縉為右都御史縉附汪直嘗請復立西廠者也在臺綱紀不立裕欲振之御史有過或遭箠撻由是得謗汪直敗偕副都御史屠滽請雪諸忤直得罪者帝不悅奪俸又坐纍調南京都察院考績赴都留為工部尚書初吏部尚書尹旻罷耿裕代之以持正不為萬安所喜而李孜省方貴幸用事欲引鄉人乃協謀去耿裕以裕代之裕本廉介負時望以孜省故名頗損其銓亦平故事考察目有四曰老疾曰罷軟曰貪酷曰不謹裕言人材質不同偏執類酷遲鈍類軟乞立才力不及一途以寓愛惜人才之意帝善之遂著為令孝宗立言官交章劾裕進由孜省裕不平為辨誣録連疏乞休去正德中卒年八十八贊曰王彰等或以性行未純為時訾議綜其生平瑕瑜互見然揚歷中外勞績多有可紀書稱與人不求備春秋之義善善長則諸人固不失為國家幹濟材歟
