body:
  text: 明史卷一百六十一列傳第四十九周新李昌祺蕭省身陳士啟應履平林碩況鍾朱勝陳本深羅以禮莫愚趙泰彭勖孫鼎夏時黃潤玉楊瓚王懋葉錫趙亮劉實陳選夏寅陳壯張昺宋端儀周新南海人初名志新字日新成祖常獨呼新遂為名因以志新字洪武中以諸生貢入太學授大理寺評事以善決獄稱成祖即位改監察御史敢言多所彈劾貴戚震懼目為冷面寒鐵京師中至以其名怖小兒輒皆奔匿巡按福建奏請都司衞所不得凌府州縣府衞官相見均禮武人為之戢改按北京時令吏民罪流者耕北京閒田監禁詳擬往復待報多瘐死新請從北京行部或巡按詳允就遣以免淹滯從之且命畿內罪人應決者許收贖帝知新所奏無不允還朝即擢雲南按察使未赴改浙江冤民繫久聞新至喜曰我得生矣至果雪之初新入境羣蚋迎馬頭跡得死人榛中身繫小木印新驗印知死者故布商密令廣市布視印文合者捕鞫之盡獲諸盜一日視事旋風吹葉墜案前葉異他樹詢左右獨一僧寺有之寺去城遠新意僧殺人發樹果見婦人屍鞫實磔僧一商暮歸恐遇劫藏金叢祠石下歸以語其妻旦往求金不得訴於新新召商妻訊之果商妻有所私商驟歸所私尚匿妻所聞商語夜取之妻與所私皆論死其他發奸摘伏皆此類也新微服行部忤縣令令欲拷治之聞廉使且至繫之獄新從獄中詢諸囚得令貪污狀告獄吏曰我按察使也令驚謝罪劾罷之永樂十年浙西大水通政趙居任匿不以聞新奏之夏原吉為居任解帝命覆視得蠲振如新言嘉興賊倪弘三劫旁郡黨數千人累敗官軍新督兵捕之列木柵諸港汊賊陸走追躡之桃源縶以獻當是時周廉使名聞天下錦衣衞指揮紀綱使千戶緝事浙江攫賄作威福新欲按治之遁去頃之新齎文冊入京遇千戶涿州捕繫州獄脫走訴於綱綱誣奏新罪帝怒命逮新旗校皆錦衣私人在道榜掠無完膚既至伏陛前抗聲曰陛下詔按察司行事與都察院同臣奉詔擒奸惡奈何罪臣帝愈怒命戮之臨刑大呼曰生為直臣死當作直鬼竟殺之他日帝悔問侍臣曰周新何許人對曰南海帝嘆曰嶺外乃有此人枉殺之矣後帝若見人緋衣立日中曰臣周新已為神為陛下治奸貪吏云後紀綱以罪誅事益白妻有節操新未遇時縫紉自給及貴偶赴同官妻內讌荊布如田家婦諸婦慚盡易其衣飾新死無子妻歸貧甚廣東巡撫楊信民曰周志新當代第一人可使其夫人終日餒耶時時賙給之妻死浙人仕廣東者皆會葬李昌祺名禎以字行廬陵人永樂二年進士選庶吉士預修永樂大典僻書疑事人多就質擢禮部郎中遷廣西左布政使坐事謫役尋宥還洪熙元年起故官河南與右布政使蕭省身繩豪猾去貪殘疏滯舉廢救災恤貧數月政化大行憂歸宣宗已命侍郎魏源代而是時河南大旱廷臣以昌祺廉潔寬厚河南民懷之請起昌祺命奪喪赴官撫恤甚至正統改元上書言三事皆報可四年致仕家居二十餘年屏跡不入公府故廬裁蔽風雨伏臘不充景泰二年卒蕭省身泰和人與昌祺同舉進士洪熙元年布政考滿當給誥命奏父年八十餘願以給父帝嘉而許之後遂為例居河南十二年治行與昌祺等陳士啟名雷以字行泰和人永樂二年進士選庶吉士擢禮部郎中尚書呂震險忮屬吏皆憚之承奉唯謹士啟獨不少徇十二年三月吏部言布按二司多缺官帝曰布政按察吾方岳臣方數千里地懸數人手其簡廷臣賢能者分別用之於是諸曹郎給事中出為監司者二十餘人而士啟得山東右參政盡心吏事不為察察名督徭賦不峻期約青州饑疏請振之粟使至而饑民倍士啟復上疏先出粟予民謂使者曰有罪吾獨任廷議竟從之坐唐賽兒亂下獄數月釋還職高煦謀不軌士啟自青州暮馳歸語三司密聞於朝高煦既執從薛祿張本錄餘黨撫安人民事竣命清理山東軍籍宣德六年卒於官應履平奉化人建文二年進士授德化知縣歷官吏部郎中出為常德知府宣宗初擢貴州按察使所至祛除奸蠹數論時政舊制都督府遣使於外必領內勘合下都司不敢輒下衞至是軍府寖橫使者挾關文四馳歷諸衞朘軍伍宣德七年履平抗疏言勘合之設所以防詐偽今右軍府遣發至黔者不遵故事小人憑勢橫求詐冒何從省宣宗善其言都督陳政引罪帝令諸司永守之軍府為之戢山雲鎮廣西以備蠻歲調貴州軍萬人春秋更代還多逃亡則取原衞軍以補不逐逃者履平奏貴州四境皆苗蠻軍伍虛有急孰與戰守今衞軍逃於廣西而以在衞者補不數年貴州軍伍盡空邊釁且起帝乃命雲嚴責廣西諸衞追還逃軍俟足用即遣歸罷貴州戍卒雲名將鎮粵有功輕履平書生正統元年履平劾雲弄權擅作威福帝令雲自陳雲大驚引罪帝宥之明年上書言四事一鎮遠六府自湖廣改屬貴州當食川鹽去蜀道遠仍食淮鹽為便一軍衞糧支於重慶舟楫不通易就輕賫多耗費請以鎮遠秋糧輸湖廣者就近支給一停黎平諸府歲辦黃白蠟一貴州初開三司月俸止一石今糧漸充裕請增給並從之時方面以公事行部者例不給驛履平言僦車舟必擾民請給驛便又以軍伍不足請令衞所官旂犯雜死及徒流者俱送鎮將立功期滿還伍邊軍犯盜及土官民與官旂罪輕者入粟缺儲所贖罪並從之三年遷雲南左布政使時麓川用兵屢奏勞績八年致仕歸林碩字懋弘閩縣人永樂十年進士授御史出按山東宣德初按浙江為治嚴肅就擢按察使千戶湯某結中官裴可烈為奸利碩將繩以法中官誣碩毀詔書被逮碩叩頭言臣前為御史官七品今擢按察使官三品日夜淬勵思報上恩小人不便欲去臣唯陛下裁察帝動容曰朕固未之信召汝面訊耳立釋碩復其官敕責可烈碩在浙久人懷其惠正統三年誤引赦例出人死僉事耿定劾之逮訊輸贖還職其冬遷廣東布政使未及任而卒其後寧波知府鄭珞劾可烈不法可烈竟罷去況鍾字伯律靖安人初以吏事尚書呂震奇其才薦授儀制司主事遷郎中宣德五年帝以郡守多不稱職會蘇州等九府缺皆雄劇地命部院臣舉其屬之廉能者補之鍾用尚書蹇義胡濙等薦擢知蘇州賜敕以遣之蘇州賦役繁重豪猾舞文為奸利最號難治鍾乘傳至府初視事羣吏環立請判牒鍾佯不省左右顧問惟吏所欲行止吏大喜謂太守闇易欺越三日召詰之曰前某事宜行若止我某事宜止若強我行若輩舞文久罪當死立捶殺數人盡斥屬僚之貪虐庸懦者一府大震皆奉法鍾乃蠲煩苛立條教事不便民者立上書言之清軍御史李立勾軍暴同知張徽承風指動以酷刑抑配平人鍾疏免百六十人役止終本身者千二百四十人屬縣逋賦四年凡七百六十餘萬石鍾請量折以鈔為部議所格然自是頗蠲減又言近奉詔募人佃官民荒田官田準民田起科無人種者除賦額崑山諸縣民以死徙從軍除籍者凡三萬三千四百餘戶所遺官田二千九百八十餘頃應減稅十四萬九千餘石其他官田沒海者賦額猶存宜皆如詔書從事臣所領七縣秋糧二百七十七萬九千石有奇其中民糧止十五萬三千餘石而官糧乃至二百六十二萬五千餘石有畝徵至三石者輕重不均如此洪永間令出馬役於北方諸驛前後四百餘匹期三歲遣還今已三十餘歲矣馬死則補未有休時工部征三梭闊布八百匹浙江十一府止百匹而蘇州乃至七百乞敕所司處置帝悉報許當是時屢詔減蘇松重賦鍾與巡撫周忱悉心計畫奏免七十餘萬石凡忱所行善政鍾皆協力成之所積濟農倉粟歲數十萬石振荒之外以代民間雜辦及逋租其為政孅悉周密嘗置二簿識民善惡以行勸懲又置通關勘合簿防出納奸偽置綱運簿防運夫侵盜置館夫簿防非理需求興利除害不遺餘力鋤豪強植良善民奉之若神先是中使織造採辦及購花木禽鳥者踵至郡佐以下動遭笞縛而衞所將卒時凌虐小民鍾在斂跡不敢肆雖上官及他省吏過其地者咸心憚之鍾雖起刀筆然重學校禮文儒單門寒士多見振贍有鄒亮者獻詩於鍾鍾欲薦之或為匿名書毀亮鍾曰是欲我速成亮名耳立奏之朝召授吏刑二部司務遷御史初鍾為吏時吳江平思忠亦以吏起家為吏部司務遇鍾有恩至是鍾數延見執禮甚恭且令二子給侍曰非無僕隸欲籍是報公耳思忠家素貧未嘗緣故誼有所干人兩賢之鍾嘗丁母憂郡民詣闕乞留詔起復正統六年秩滿當遷部民二萬餘人走訴巡按御史張文昌乞再任詔進正三品俸仍視府事明年十二月卒於官吏民聚哭為立祠鍾剛正廉潔孜孜愛民前後守蘇者莫能及鍾之後李從智朱勝相繼知蘇州咸奉敕從事然敕書委寄不如鍾矣李從智宜賓人朱勝金華人勝廉靜精敏下不能欺嘗曰吏貪吾不多受牒隸貪吾不行杖獄卒貪吾不繫囚由是公庭清肅民安而化之居七年超遷江南左布政使初與鍾同薦者戶部郎中羅以禮知西安兵部郎中趙豫知松江工部郎中莫愚知常州戶部員外郎邵旻知武昌邢部員外郎馬儀知杭州陳本深知吉安御史陳鼎知建昌何文淵知溫州皆賜敕乘傳行陳本深字有源鄞人永樂初由鄉舉入國子監授刑部主事善發奸畿內盜殺人亡匿有司繫無辜十八人於獄本深以計獲盜十八人皆免遷員外郎與況鍾等同受敕為知府本深知吉安吉安多豪強好訐訟巨猾彭摶等十九人橫閭里本深遣人與相結為具召與飲伏壯士後堂拉殺之皆曳其屍以出一府大驚樂安大盜曾子良據大盤山衆萬餘本深設伏大破之斬子良本深為政舉大綱不屑苛細大猾既殲府中無事晨起鼓而升堂吏無所白輒鼓而休間有所訟呼至榻前析曲直遣之亦不受狀有抑不伸者雖三尺童子皆得往白久之民恥爭訟尤折節士人飾治學宮奏新先儒歐陽修周必大楊邦乂胡銓楊萬里文天祥祠廟正統六年滿九載當遷郡人乞留詔予正三品俸廨前民嫁女本深聞鼓樂聲笑曰吾來時乳下兒也今且嫁我尚留此耶遂請老前後守吉安十八年既去郡人肖像祀之羅以禮桂陽人永樂十三年進士由郎中知西安府遭喪補紹興再以喪去代者不稱職部民追思乞以禮於朝詔起復視事歲滿進秩復任已移知建昌所至皆有惠愛歷三郡凡二十七年乃致仕莫愚臨桂人由鄉舉以郎中出知常州奏請減宜興歲進茶數禁公差官凌虐有司嚴核上官薦劾之實皆報可郡民陳思保年十二世業漁其父兄行劫思保在舟中有司以為從論當斬愚疏言小兒依其父兄非為從比令全家舟居將舉家坐耶宣宗命釋之謂廷臣曰為守能言此可謂有仁心矣正統六年秩滿郡民乞留巡撫周忱以聞詔進二階復任與愚同時為同知時潞城趙泰字熙和由鄉舉入國子監歷事都察院授常州同知濬孟瀆得勝二河作魏村閘周忱況鍾議減蘇州重糧泰亦檢常州官田租請並減之遷工部郎中命塞東昌決河忱薦為協同都運益勤其職亡何疾卒彭勖字祖期永豐人七歲入佛寺不拜僧強之叱曰彼不衣冠而袒跣何拜為永樂十三年舉進士親老乞近地以養除南雄府教授學舍後有祠數現光怪學官弟子率禱祀勖撤而焚之滿考補建寧教授副使王增有疾醫者許宗道誣諸生游亨魘魅以舍旁童五郎祠為徵增怒置亨家七人重罪下近祠居民獄四百家勖抗論游氏非巫者五郎非邪神初捐地築城人也事載郡志中增愕索圖經證之大慚悔事得解建寧朱子故宅有祠無祭勖疏請春秋祭蠲子孫徭又創尊賢堂祀胡安國蔡沈真德秀諸生翕然嚮學正統元年以楊士奇薦召授御史時初設提學官命督南畿學校詳立教條士風大振疏言國朝祠祭載在禮官修齋起梁武帝設醮起宋徽宗宜一切除之禁立庵院罷給僧尼度牒又言真定保定山東民逃鳳陽潁州以萬計皆守令匿災暴斂所致乞厚軫恤守令課績宜以戶口增耗為殿最又請設南京諸衞武學皆報可所至葺治先賢墳祠母憂歸以孫鼎代勖起復改吏部考功郎中出為山東副使土木之變數言兵事以直不容於時致仕歸孫鼎字宜鉉廬陵人永樂間舉人歷松江教授正統八年楊溥薦為御史董南畿學政置本源錄錄諸生善行行部不令人知單輿猝至諸生謁輒閉門試之即日定甲乙諸生試歸榜已揭通衢請託者無所措手通州旱饑奏蠲糧三千四百餘石英宗北狩鼎試罷謂諸生曰故事當簪花宴今臣子枕戈之秋不敢陷諸君不義設茗飲步送諸門既而詣闕上書請隨所用效死不報未幾以親老致仕知府張瑄疏言鼎孝追曾閔學繼朱程宜起居論思之職帝不允天順元年卒於家夏時字以正錢塘人永樂十六年進士授戶科給事中洪熙元年議改鈔法時力言其擾市肆無裨國用疏留中鈔果大沮民多犯禁議竟寢帝思時言命侍皇太子祀孝陵所過有災傷輒白太子發粟以振留署南京戶科宣德初一日三上封事稱旨命署尚寶司兼理吏禮兵刑四科視七篆無留事命覈後湖黃冊陳便宜十四事邳徐濟寧臨清武清旱以時請遣官振之尋擢江西僉事正統三年奏今守令多刻刑無辜傷和干紀乞令御史按察司官遍閱罪囚釋冤滯逮按枉法官吏從之遷參議七年奏恤民六事多議行十二年以大臣薦超擢廣西左布政使前後所上又十餘疏雖不盡用天下壯其敢言年未七十致仕歸卒其為僉事時進知州柯暹所撰教民條約及均徭冊式刊為令人皆便之時為人廉潔好義親歿廬墓有異徵歿而鄉人祀之名其祠曰孝廉黃潤玉字孟清鄞人五歲侍母疾夜不就寢十歲道見遺金不拾永樂初徙南方富民實北京潤玉請代父行官少之對曰父去日益老兒去日益長官異其言許之十八年舉順天鄉試授建昌府學訓導父喪除改官南昌宣德中用薦擢交阯道御史出按湖廣斥兩司以下不職者至百有二十人正統初詔推舉提學官以楊士奇薦擢廣西僉事提督學政時寇起軍興有都指揮妄掠子女萬餘口潤玉劾而歸之副使李立入民死罪至數百人亦為辨釋南丹衞處萬山中戍卒冒瘴多死為奏徙夷曠地母憂歸起官湖廣論罷巡撫李實親故二人實憤奏潤玉不諳刑律坐謫含山知縣以年老歸歸二十年年八十有九卒學者稱南山先生楊瓚蠡縣人永樂末進士知趙城縣課績為山西最超擢鳳陽知府正統十年大計天下羣吏始命舉治行卓異者瓚及王懋葉錫趙亮等與焉鳳陽帝鄉勛臣及諸將子孫多犯令瓚請立戶稽出入由是始遵約束瓚言民間子弟可造者多請增廣生員毋限額禮部採瓚言考取附學天下學校之有附學生由瓚議始擢浙江右布政使與鎮守侍郎孫原貞共平陶得二之亂景泰二年瓚以湖州諸府官田賦重請均之民田賦輕者而嚴禁詭寄之弊詔與原貞督之田賦稱平久之卒官王懋修武人永樂末進士為海豐知縣後超擢西安知府亦有聲葉錫永嘉人宣德五年進士為吳縣知縣舉卓異遷奸民訐於朝將逮繫吳人羣詣闕頌錫乃令視事如故抵誣者罪尋擢寧國知府而趙亮為慶雲典史亦在舉中同被宴賚時人以為榮秩滿擢知本縣劉實字嘉秀安福人宣德五年舉進士居三年選庶吉士正統初授金華府通判仍歲荒旱請蠲租且贖還饑民子女義門鄭氏族大不能自給又買馬出丁供山西郵傳困甚亦以實言獲免母喪歸廬墓三載起順天府治中景泰時侍臣薦其文學召修宋元通鑑綱目實為人耿介意所不可雖達官貴人不稍遜然頗自是見同曹所纂不當輒大笑聲徹廷陛人亦以此忌之天順初還原任四年擢知南雄府商稅巨萬舊皆入守橐實無所私中官至南雄入譖言府僚參謁留實折辱之民競前擁之出中官慚將召謝之實不往中官去至韶州聞韶人言南雄守且訟於朝矣懼馳奏誣實毀敕大不敬逮下詔獄實從獄中上書言臣官三十年未嘗以妻子自隨食麤衣敝為國家愛養小民不忍困之以是忤朝使帝覽書意稍解且釋之而實竟瘐死實苦節自持政務紛未嘗廢書士大夫重其學行其歿也南雄人哀而祠之孫丙自有傳陳選字士賢臨海人父員韜宣德五年進士為御史出按四川黜貪奬廉雪死囚四十餘人正統末大軍征鄧茂七往撫其民釋被誣為賊者千餘家都指揮蔣貴要所部賄都督范雄病不能治軍皆劾罷之歷廣東右參政福建右布政使廣東值黃蕭養亂後而福建亦寇盜甫息員韜所至拊循教養得士民心選自幼端売心寡言笑以聖賢自期天順四年會試第一成進士授御史巡按江西盡黜貪殘吏時人語曰前有韓雍後有陳選廣寇流入贛州奏聞不待報遣兵平之憲宗即位嘗劾尚書馬昂侍郎吳復鴻臚卿齊政救修撰羅倫學士倪謙錢溥言雖不盡行一時憚其風采已督學南畿頒冠婚祭射儀於學宮令諸生以時肄之作小學集註以教諸生按部常止宿學宮夜巡兩廡察諸生誦讀除試牘糊名之陋曰己不自信何以信於人成化六年遷河南副使尋改督學政立教如南畿汪直出巡都御史以下皆拜謁選獨長揖直問何官選曰提學副使直曰大於都御史耶選曰提學何可比都御史但忝人師不敢自詘辱選詞氣嚴正而諸生亦羣集署直氣懾好語遣之久之進按察使決遣輕繫數百人重囚多所平反囹圄為空治尚簡易獨於贓吏無所假然受賂百金以上者坐六七鐶而止或問之曰奸人惜財亦惜命若盡挈所賂以貨要人即法撓矣歷廣東左右布政使肇慶大水不待報輒發粟振之二十一年詔減省貢獻而市舶中官韋眷奏乞均徭戶六十人添辦方物選持詔書爭帝命與其半眷由是怒選番人馬力麻詭稱蘇門答剌使臣欲入貢私市易眷利其厚賄將許之選立逐之去撒馬兒罕使者自甘肅貢獅子將取道廣東浮海歸云欲往滿喇加更市以進選疏言不可許恐遺笑外番輕中國帝納其言而眷憾選甚先是番禺知縣高瑤沒眷通番資鉅萬選移檄奬之且聞於朝至是眷誣奏選瑤朋比為貪墨詔遣刑部員外郎李行會巡按御史徐同愛訊之選有所黜吏張褧眷意其怨選引令誣証選褧堅不從執褧拷掠無異辭行同愛畏眷竟坐選如眷奏與瑤俱被徵士民數萬號泣遮留使者辟除乃得出至南昌病作行阻其醫藥竟卒年五十八編修張元禎為選治喪殮之褧聞選死哀悼乃上書曰臣聞口能鑠金毀足銷骨竊見故罪人選抱孤忠孑處羣邪之中獨立衆憎之地太監眷通番敗露知縣瑤按法持之選移文奬厲以激貪懦固賢監司事也都御史宋旻及同愛怯勢養奸致眷橫行胸臆穢衊清流勘官行頤指鍛煉竟無左証臣本小吏詿誤觸法被選黜罷實臣自取眷意臣憾選厚賂噉臣臣雖胥役敢昧素心眷知臣不可誘嗾行等逮臣致理拷掠彌月臣忍死籲天終無異口行等乃依傍眷語文致其詞劾選勘災不實擅便發倉曲庇屬官意圖報謝必如所云是毀共姜為夏姬詬伯夷為莊蹻也頃年嶺外地震水溢漂民廬舍屬郡交牒報災老弱引領待哺而撫按藩臬若罔聞知選獨抱隱憂食不下咽謂展轉行勘則民命垂絕所以便宜議振志在救民非有他也選故剛正不堪屈辱憤懣旬日嬰疾而殂行幸其殞身阻其醫療訖命之日密走報眷小人佞毒一至於此臣擯黜罪人秉耒田野百無所圖誠痛忠良銜屈而為聖朝累也不報員韜父子皆持操甚潔而員韜量能容物選務克己因自號克菴遇物亦稍峻人謂員韜德性四時皆備選得其秋焉嘗割田百四十贍其族人暨卒族人以選子戴貧還之戴不可而止弘治初主事林沂疏雪選冤詔復官禮葬正德中追贈光祿卿諡忠愍夏寅字正夫松江華亭人正統十三年舉進士授南京吏部主事力學為文以宏奧稱進郎中成化元年考滿入都上言徐州旱澇民不聊生饑餒切身必為盜賊乞特遣大臣鎮撫蠲租發廩沿途貢船丁夫不足役及老稚而所載官物僅一箱餘皆私齎乞嚴禁絕淮徐濟寧軍士赴京操練然其地實南北要衝宜各設文武官鎮守訓兵屯田常使兩京聲勢聯絡倉猝可以制變章下所司行之唯不設文武官遷江西副使提督學校其教務先德行進浙江右參政處州民苦虐政走山谷寅檄招之衆皆解散久之進山東右布政使弘治初致仕歸寅清直無黨援嘗語人曰君子有三惜此生不學一可惜此日閒過二可惜此身一敗三可惜世傳為名言陳壯字直夫其先浙江山陰人祖坐事謫戍交阯後調京衞遂家焉壯舉天順八年進士授南京御史編修章懋等建言得罪抗疏救之帝遣中官采花木復疏諫尚書陳翌請以馬豆代百官俸壯言飼馬之物不可養士大夫事乃寢壯家素寠常祿外一無所取父母歿廬墓側居喪一循古禮歷江西僉事致仕歸家居十餘年弘治中以尚書張悅薦起官福建居二年又乞致仕時倪岳為吏部素賢之擢河南副使歲荒振饑民懷其惠僉都御史林俊謝病舉以自代未及遷而壯又乞致仕巡撫孫需奏留之又二年竟致仕去張昺字仲明慈谿人都御史楷孫也舉成化八年進士授鉛山知縣性剛明善治獄有嫁女者及壻門而失女互以訟於官不能決昺行邑界見大樹妨稼欲伐之民言樹有神巢其巔昺不聽率衆往伐有衣冠三人拜道左昺叱之忽不見比伐樹血流出樹間昺怒手斧之卒仆其樹巢中墮二婦人言狂風吹至樓上其一即前所嫁女也有巫能隱形淫人婦女昺執巫痛杖之無所苦已並巫失去昺馳縛以歸印巫背鞭之立死乃盡毀諸淫祠寡婦惟一子為虎所噬訴於昺昺與婦期五日乃齋戒祀城隍神及期二虎伏庭下昺叱曰孰傷吾民法當死無罪者去一虎起斂尾去一虎伏不動昺射殺之以畀節婦一縣稱神鉛山俗婦人夫死輒嫁有病未死先受聘供湯藥者昺欲變其俗令寡婦皆具牒受判署二木曰羞嫁者跪之曰節不嫁者跪之民傅四妻祝誓死守舅姑紿令跪羞木下昺判從之祝投後園池中死邑大旱昺夢婦人泣拜覺而識其里居姓氏往詰其狀及啟土貌如生昺哭之慟曰殺婦者吾也為文以祭改葬焉天遂大雨諸異政多類此擢南京御史弘治元年七月偕同官上言邇臺諫交章論事矣而扈蹕糾儀者不免錦衣捶楚之辱是言路將塞之漸也經筵既舉矣而封章累進卒不能回寒暑停免之說是聖學將怠之漸也內倖雖斥梁芳而賜祭仍及便辟是復啟寵倖之漸也外戚雖罪萬喜而莊田又賜皇親是驕縱姻婭之漸也左道雖斥而符書尚揭於官禁番僧旋復於京師是異端復興之漸也傳奉雖革而千戶復除張質通政不去張苗是傳奉復啟之漸也織造停矣仍聞有蟒衣牛斗之織淫巧其漸作乎寶石廢矣又聞有戚里不時之賜珍玩其漸崇乎詩云靡不有初鮮克有終願陛下以為戒帝嘉納之先是昺以雷震孝陵柏樹與同官劾大學士劉吉等十餘人給事中周紘亦與同官劾吉吉銜之其冬昺紘奉命閱軍軍多缺伍兩人欲劾奏守備中官蔣琮琮先事劾兩人章下內閣吉修隙擬黜之外尚書王恕抗章曰不治失伍之罪而罪執法之臣何以服天下再疏爭言官亦論救乃調昺南京通政司經歷紘南京光祿寺署丞久之昺用薦遷四川僉事富豪殺人屢以賄免御史檄昺治果得其情尋進副使守備中官某將進術士周慧於朝昺擒慧論徙之極邊歲餘引疾歸環堵蕭然擁經史自娛都御史王璟以振荒至餽昺百金堅拒不得授下戶饑民粟以答其意知縣丁洪昺令鉛山所取士也旦夕候起居為具蔬食昺曰吾誠不自給奈何以此煩令君卒弗受炊烟屢絕處之澹如及卒含斂不具洪為經紀其喪宋端儀字孔時莆田人成化十七年進士官禮部主事雲南缺提學官部議屬端儀吏先期洩之端儀曰啟事未登已喧衆口人其謂我干乞乎力辭之已進主客員外郎貢使以贄見悉却不納初在國學為祭酒丘濬所知及濬柄政未嘗一造其門廣東提學缺部以端儀名上濬竟沮之濬卒始以按察僉事督廣東學校卒官端儀慨建文朝忠臣湮沒乃搜輯遺事為革除錄建文忠臣之有錄自端儀始也贊曰明初重監司守牧之任尚書有出為布政使而侍郎為參政者監司之入為卿貳者比比也守牧稱職增秩或至二品天順而後巡撫之寄專而監司守牧不得自展布重內輕外之勢成矣夫賦政於外於民最親李昌祺陳本深之屬靜以愛民況鍾張昺能於其職所謂承宣德化為天子分憂者非耶周新陳選冤死為可哀讀張褧書又以見公正之服人者至而直道之終不泯也
