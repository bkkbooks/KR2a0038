body:
  text: 明史卷一百二十一列傳第九公主明制皇姑曰大長公主皇姊妹曰長公主皇女曰公主俱授金冊祿二千石壻曰駙馬都尉親王女曰郡主郡王女曰縣主孫女曰郡君曾孫女曰縣君玄孫女曰鄉君壻皆儀賓郡主祿八百石餘遞減有差郡主以下恩禮既殺無足書者今依前史例作公主傳而駙馬都尉附焉仁祖二女太祖十六女福成慶陽二主附興宗四女成祖五女仁宗七女宣宗二女英宗八女景帝一女憲宗五女孝宗三女睿宗二女世宗五女穆宗六女神宗十女光宗九女熹宗二女莊烈帝六女仁祖二女太原長公主淳皇后所生嫁王七一早卒洪武三年追冊并贈七一榮祿大夫駙馬都尉遣使具衣冠改葬於盱眙曹國長公主太原主母妹嫁李貞主性純孝助貞理家尤勤儉早卒貞攜子文忠避兵依太祖於滁陽洪武元年二月追冊主為孝親公主封貞恩親侯駙馬都尉先是兵亂主未葬命有司具禮葬於李氏先墓詔曰公主祠堂碑亭其制悉視功臣之贈爵為王者三年改冊主隴西長公主五年以文忠貴加冊曹國長公主幷進貞右柱國曹國公貞性孝友恭謹初文忠守嚴州屢以征伐事出皆委貞權掌軍務文忠克桐廬以所俘卒送嚴嚴城空虛俘卒謀叛去貞饗其衆醉而縛之以歸應天太祖嘉之累授官如子爵賜甲第西華門玄津橋之西帝數臨幸太子諸王時往起居親重無與比晚歲尤折節謙抑嘗曰富貴而忘貧賤君子不為也十二年冬卒贈隴西王諡恭獻文忠自有傳太祖十六女臨安公主洪武九年下嫁李祺韓國公善長子也是時始定公主婚禮先期賜駙馬冠誥並朝服儀從甚盛主執婦道甚備祺功臣子帝長壻頗委任之四方水旱每命祺往振濟二十三年善長坐事死祺已前卒主至永樂十九年薨寧國公主孝慈皇后生洪武十一年下嫁梅殷殷字伯殷汝南侯思祖從子也天性恭謹有謀略便弓馬太祖十六女諸駙馬中尤愛殷時李文忠以上公典國學而殷視山東學政賜敕褒美謂殷精通經史堪為儒宗當世皆榮之帝春秋高諸王強盛殷嘗受密命輔皇太孫及燕師日逼惠帝命殷充總兵官鎮守淮安悉心防禦號令嚴明燕兵破何福軍執諸將平安等遣使假道於殷以進香為名殷答曰進香皇考有禁不遵者為不孝王大怒復書言今興兵誅君側惡天命有歸非人所能阻殷割使者耳鼻縱之曰留汝口為殿下言君臣大義王為氣沮而鳳陽守徐安亦拆浮橋絕舟檝以遏燕燕兵乃涉泗出天長取道揚州王即帝位殷尚擁兵淮上帝迫公主齧血為書投殷殷得書慟哭乃還京既入見帝迎勞曰駙馬勞苦殷曰勞而無功耳帝默然永樂二年都御史陳瑛奏殷畜養亡命與女秀才劉氏朋邪詛咒帝曰朕自處之因諭戶部考定公侯駙馬伯儀仗從人之數而別命錦衣衞執殷家人送遼東明年冬十月殷入朝前軍都督僉事譚深錦衣衞指揮趙曦擠殷笪橋下溺死以殷自投水聞都督同知許成發其事帝怒命法司治深曦罪斬之籍其家遣官為殷治喪諡榮定而封許成為永新伯初公主聞殷死謂上果殺殷牽衣大哭問駙馬安在帝曰為主跡賊無自苦尋官殷二子順昌為中府都督同知景福為旗手衞指揮使賜公主書曰駙馬殷雖有過失兄以至親不問比聞溺死兄甚疑之都督許成來首已加爵賞謀害之人悉置重法特報妹知之瓦剌灰者降人也事殷久謂深曦實殺殷請於帝斷二人手足剖其腸祭殷遂自經死十二月進封公主為寧國長公主宣德九年八月薨年七十一初主聞成祖舉兵貽書責以大義不答成祖至淮北貽主書命遷居太平門外勿罹兵禍主亦不答然成祖故重主即位後歲時賜與無算諸王莫敢望殷孫純成化中舉進士知定遠縣忤上官棄歸襲武階為中都副留守崇寧公主洪武十七年下嫁牛城未幾薨安慶公主寧國主母妹洪武十四年下嫁歐陽倫倫頗不法洪武末茶禁方嚴數遣私人販茶出境所至繹騷雖大吏不敢問有家奴周保者尤橫輒呼有司科民車至數十輛過河橋巡檢司擅捶辱司吏吏不堪以聞帝大怒賜倫死保等皆伏誅汝寧公主洪武十五年與懷慶大名二主先後下嫁而主下嫁陸賢吉安侯仲亨子也懷慶公主母成穆孫貴妃下嫁王寧寧壽州人既尚主掌後軍都督府事建文中嘗洩中朝事於燕籍其家繫錦衣衞獄成祖即位稱寧孝於太祖忠於國家正直不阿橫遭誣搆封永春侯予世券寧能詩頗好佛嘗侍帝燕語勸帝誦佛經飯僧為太祖資福帝不懌自是恩禮漸衰久之坐事下獄見原卒子貞亮官羽林前衞僉事先寧卒宣德十年貞亮子彝援詔書言公主嫡孫當嗣侯不許命以衞僉事帶俸奉主祀寧又有子貞慶工詩與劉溥等稱十才子大名公主下嫁李堅堅武陟人父英洪武初為驍騎右衞指揮僉事從征雲南陣沒贈指揮使堅有才勇既尚主掌前軍都督府事建文初以左副將軍從伐燕及戰勝負略相當封灤城侯予世券滹沱河之戰燕卒薛祿刺堅墮馬被擒械送北平道卒子莊年七歲嗣侯成祖即位莊父姓名在姦黨中以主故獲宥主懼禍遂納侯誥券宣德元年主薨莊在南京師事劉溥放浪詩酒以壽終福清公主母鄭安妃洪武十八年下嫁張麟鳳翔侯龍子也麟未嗣侯卒永樂十五年主薨壽春公主洪武十九年下嫁傅忠潁國公友德子也先是九年二月定制公主未受封者歲給紵絲紗絹布線已封賜莊田一區歲徵租一千五百石鈔二千貫主為太祖所愛賜吳江縣田一百二十餘頃皆上腴歲入八千石踰他主數倍二十一年薨賜明器儀仗以葬十公主早薨南康公主洪武二十一年下嫁胡觀東川侯海子也海嘗以罪奪祿田及觀尚主詔給田如故觀初在選中帝命黃巖徐宗實教之既婚督課益嚴又為書數千言引古義相戒勸觀執弟子禮甚恭太祖為大喜建文三年觀從李景隆北征為燕兵所執永樂初奉使晉府還科道官劾觀僭乘晉王所賜椶輿詔姑宥之已都御史陳瑛等劾觀強取民間子女又娶娼為妾且言預知李景隆逆謀陛下曲加寬宥絕無悛心宜正其罪遂罷觀朝請尋自經死宣德中主為子忠乞嗣詔授孝陵衞指揮僉事進同知正統三年主薨永嘉公主母郭惠妃洪武二十二年下嫁郭鎮武定侯英子也英卒鎮不得嗣宣德十年主乞以子珍嗣語在英傳景泰六年主薨世宗即位元孫勛有寵為主乞追諡特賜諡貞懿十三公主早薨含山公主母高麗妃韓氏洪武二十七年下嫁尹清建文初清掌後府都督事先主卒主至天順六年始薨年八十有二汝陽公主永嘉主同母妹與含山主同年下嫁謝達達父彥鳳陽人少育於孫氏冒其姓數從征討有功累官前軍都督僉事詔復謝姓選其子尚主仁宗即位主以屬尊與寧國懷慶大名南康永嘉含山寶慶七主皆進稱大長公主自後諸帝即位公主進封長公主大長公主皆如制寶慶公主太祖最幼女下嫁趙輝輝父和以千戶從征安南陣沒輝襲父官先是成祖即位主甫八歲命仁孝皇后撫之如女永樂十一年輝以千戶守金川門年二十餘狀貌偉麗遂選以尚主主既為后所撫裝齎視他主倍渥婚夕特詔皇太子送入邸主性純淑宣德八年薨輝至成化十二年始卒凡事六朝歷掌南京都督及宗人府事家故豪侈姬妾至百餘人享有富貴者六十餘年壽九十福成公主南昌王女母王氏嫁王克恭克恭嘗為福建行省參政後改福州衞指揮使慶陽公主蒙城王女嫁黃琛琛本名寶武昌人以帳前參隨舍人擢兵馬副指揮太祖愛其謹厚配以王女累從征討積功至龍江翼守禦千戶洪武元年冊兩王女為公主授克恭琛為駙馬都尉遷琛淮安衞指揮使四年三月禮官上言皇姪女宜改封郡主克恭琛當上駙馬都尉誥帝曰朕惟姪女二人不忍遽加降奪其稱公主駙馬如故公主歲給祿米五百石視他主減三之二駙馬止食本官俸擢琛中都留守卒官子鉉至都督僉事主至建文時改封慶成郡主燕師南下主嘗詣軍中議和蓋成祖從姊或謂福成慶陽皆太祖從姊者誤也興宗四女江都公主洪武二十七年下嫁耿璿長興侯炳文子也累官前軍都督僉事主為懿文太子長女初稱江都郡主建文元年進公主璿為駙馬都尉炳文之伐燕也璿嘗勸直搗北平會炳文罷歸謀不用永樂初稱疾不出坐罪死主復降為郡主憂卒宜倫郡主永樂十五年下嫁于禮三女無考南平郡主未下嫁永樂十年薨追冊成祖五女永安公主下嫁袁容容壽州人父洪以開國功官都督洪武二十八年選容為燕府儀賓配永安郡主燕兵起有戰守功永樂元年進郡主為公主容駙馬都尉再論功封廣平侯祿一千五百石予世券凡車駕巡幸皆命容居守初都指揮台乘馬過容門容怒其不下箠之幾死帝聞之賜趙王高燧書曰自洪武來往來駙馬門者未聞令下馬也昔晉王敦為駙馬縱恣暴橫卒以滅亡汝其以書示容令械辱台之人送京師容由是斂戢十五年主薨停容侯祿宣宗即位復故卒贈沂國公諡忠穆子禎嗣卒無子庶弟瑄正統初乞嗣帝曰容封以公主恩禎嗣以公主子瑄庶子可長陵衞指揮僉事天順元年詔復侯爵卒弟琇成化十五年嗣卒姪輅乞嗣侯言官持不可帝曰詔書許子孫嗣輅容孫也輅後毋嗣仍世衞僉事輅卒子夔弘治間乞嗣侯不許永平公主下嫁李讓讓舒城人與袁容同歲選為燕府儀賓燕兵起帥府兵執謝貴等取大寧戰白溝河有功署掌北平布政司事佐仁宗居守其父申官留守左衞指揮同知惠帝欲誘致讓曰讓來吾宥爾父讓不從力戰破平安兵帝遂殺申籍其家姻族皆坐死或徙邊永樂元年進讓駙馬都尉封富陽侯食祿千石掌北京行部事卒贈景國公諡恭敏子茂芳嗣侯仁宗即位以茂芳母子在先帝時有逆謀廢為庶人追奪其父讓幷三代誥券毀之是年茂芳死正統九年主薨天順元年詔與茂芳子輿伯爵卒成化間授輿子欽長陵衞指揮僉事安成公主文皇后生成祖即位下嫁宋琥西寧侯晟子也正統八年主薨咸寧公主安成主同母妹永樂九年下嫁宋瑛琥弟也襲西寧侯正統五年主薨十四年瑛與武進伯朱冕禦也先於陽和戰死常寧公主下嫁沐昕西平侯英子主恭慎有禮通孝經女則永樂六年薨年二十二仁宗七女嘉興公主昭皇后生宣德三年下嫁井源正統四年薨後十年源死土木之難慶都公主宣德三年下嫁焦敬正統五年薨清河公主宣德四年下嫁李銘八年薨真定公主母李賢妃與清河主同年下嫁王誼景泰元年薨德安公主早薨仁宗即位之十月與蘄王瞻垠同日追封諡悼簡冊辭謂第四女蓋早殤名次未定也又五女延平公主六女德慶公主俱未下嫁薨宣宗二女順德公主正統二年下嫁石璟璟昌黎人天順五年曹欽反璟帥衆殺賊擒其黨脫脫詔奬勞成化十四年奉祀南京踰年卒常德公主章皇后生正統五年下嫁薛桓成化六年薨英宗八女重慶公主與憲宗同母天順五年下嫁周景景字德彰安陽人好學能書英宗愛之閒燕遊幸多從憲宗立命掌宗人府事居官廉慎詩書之外無所好主事舅姑甚孝衣履多手製歲時拜謁如家人禮景每早朝主必親起視飲食主之賢近世未有也弘治八年景卒又四年主薨年五十四子賢歷官都指揮僉事有聲嘉善公主母王惠妃成化二年下嫁王增兵部尚書驥孫也弘治十三年薨淳安公主成化二年下嫁蔡震震行醇謹正德中劉瑾下獄詔廷訊有問者瑾輒指其人附己廷臣無敢詰雲厲聲曰我皇家至戚應不附爾趣獄卒考掠之瑾乃服罪以是知名嘉靖中卒贈太保諡康僖崇德公主母楊安妃成化二年下嫁楊偉興濟伯善孫也弘治二年薨廣德公主母萬宸妃成化八年下嫁樊凱二十年八月薨宜興公主母魏德妃成化九年下嫁馬誠正德九年薨隆慶公主母高淑妃成化九年下嫁游泰十五年薨嘉祥公主母妃劉氏成化十三年下嫁黃鏞後六年薨景帝一女固安公主英宗復辟降稱郡主成化時年已長憲宗以閣臣奏五年十一月下嫁王憲禮儀視公主以故尚書蹇義賜第賜之憲宗五女仁和公主弘治二年下嫁齊世美嘉靖二十三年薨永康公主弘治六年下嫁崔元元代州人世宗入繼以迎立功封京山侯給誥券禮部言奉迎乃臣子之分遽膺封爵無故事帝曰永樂初年太宗入繼大統駙馬都尉王寧以翊戴功封永春侯何得言無故事給事中底蘊御史高越等連章論其不可皆不聽已坐張延齡事下詔獄尋釋元好交文士播聲譽寵幸優渥勳臣戚畹莫敢望焉嘉靖二十八年卒贈左柱國太傅兼太子太傅諡榮恭駙馬封侯贈官不以軍功自元始主先元薨德清公主弘治九年下嫁林岳岳字鎮卿應天人少習舉子業奉母孝撫弟巒極友愛主亦有賢行事姑如齊民禮岳卒於正德十三年主孀居三十一年始薨長泰公主成化二十三年薨追冊仙遊公主弘治五年薨追冊孝宗三女太康公主弘治十一年薨未下嫁永福公主嘉靖二年下嫁鄔景和景和崑山人嘗奉旨直西苑撰玄文以不諳玄理辭帝不悅時有事清馥殿在直諸臣俱行祝釐禮景和不俟禮成而出已而賞賚諸臣景和與焉疏言無功受賞懼增罪戾乞容辭免俾洗心滌慮以效他日馬革裹尸啣環結草之報帝大怒謂詛咒失人臣禮削職歸原籍時主已薨矣三十五年入賀聖誕畢因言臣自五世祖寄籍錦衣衞世居北地今被罪南徙不勝犬馬戀主之私扶服入賀退而私省公主墳墓丘封翳然荊棘不剪臣切自念狐死尚正首丘臣託命貴主獨與逝者魂魄相弔於數千里外不得春秋祭掃拊心傷悔五內崩裂臣之罪重不敢祈恩惟陛下幸哀故主使得寄籍原衞長與相依死無所恨帝憐而許之隆慶二年復官卒贈少保諡榮簡永淳公主下嫁謝詔睿宗二女長寧公主早薨善化公主早薨嘉靖四年二主同日追冊世宗五女常安公主未下嫁嘉靖二十八年薨追冊思柔公主後常安主二月薨年十二追冊寧安公主嘉靖三十四年下嫁李和歸善公主嘉靖二十三年薨追冊葬祭視太康主嘉善公主嘉靖三十六年下嫁許從誠四十三年薨穆宗六女蓬萊公主早薨太和公主早薨隆慶元年與蓬萊主同日追冊壽陽公主萬曆九年下嫁侯拱辰國本議起拱辰掌宗人府亦具疏力爭卒贈太傅諡榮康永寧公主下嫁梁邦瑞萬曆三十五年薨瑞安公主神宗同母妹萬曆十三年下嫁萬煒崇禎時主累加大長公主所產子及庶子長祚弘祚皆官都督煒官至太傅管宗人府印嘗以親臣侍經筵每文華進講佩刀入直李建泰西征命煒以太牢告廟年七十餘矣國變同子長祚死於賊弘祚投水死長祚妻李氏亦赴井死延慶公主萬曆十五年下嫁王昺昺嘗救御史劉光復觸帝怒削職光宗立復官神宗十女榮昌公主萬曆二十四年下嫁楊春元四十四年春元卒久之主薨壽寧公主二十七年下嫁冉興讓主為神宗所愛命五日一來朝恩澤異他主崇禎時洛陽失守莊烈帝命興讓同太監王裕民給事中葉高標往慰福世子於河北都城陷興讓死於賊靜樂雲和雲夢靈丘仙居泰順香山天台八公主皆早世追冊光宗九女懷淑公主七歲而薨追冊餘五女皆早世未封寧德公主下嫁劉有福遂平公主天啟七年下嫁齊贊元崇禎末贊元奔南京主前薨樂安公主下嫁鞏永固永固字洪圖宛平人好讀書負才氣崇禎十六年二月帝召公侯伯於德政殿言祖制勳臣駙馬入監讀書習武經弓馬諸臣各有子弟否成國公朱純臣定國公徐允禎等皆以幼對而永固獨上疏請肄業太學帝褒答之總督趙光抃以邊事繫獄特疏申救又請復建文皇帝廟諡事雖未行時論韙焉甲申春賊破宣大李邦華請太子南遷為異議所格及事急帝密召永固及新樂侯劉文炳護行叩頭言親臣不藏甲臣等難以空手搏賊皆相向涕泣十九日都城陷時公主已薨未葬永固以黃繩縛子女五人繫柩旁曰此帝甥也不可汙賊手舉劍自刎闔室自焚死熹宗二女皆早世莊烈帝六女坤儀公主周皇后生追諡長平公主年十六帝選周顯尚主將婚以寇警暫停城陷帝入壽寧宮主牽帝衣哭帝曰汝何故生我家以劍揮斫之斷左臂又斫昭仁公主於昭仁殿越五日長平主復甦大清順治二年上書言九死臣妾跼蹐高天願髠緇空王稍申罔極詔不許命顯復尚故主土田邸第金錢車馬錫予有加主涕泣踰年病卒賜葬廣寧門外餘三女皆早世無考
