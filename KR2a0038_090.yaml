所果由千戶所沙里可哈忽的千戶所孛里加思千戶所撒里土兒千戶所參卜郎千戶所剌錯牙千戶所泄里壩千戶所潤則魯孫千戶所班軍者衛所之軍番上京師總為三大營者也初永樂十三年詔邊將及河南山東山西陝西各都司中都留守司江南北諸衛官簡所部卒赴北京以俟臨閲京操自此始仁宗初因英國公張輔等言調直隸及近京軍番上操備諭以畢農而來先農務遣歸既而輔言邊軍比悉放還京軍少請調山東河南中都淮揚諸衛校閲制曰可又敕河南山東山西大寧及中都將領凡軍還取衣裝者以三月畢務七月至京老弱者選代官給之馬歲春秋番上共十六萬人大寧七萬七百餘中都山東遞殺河南最少僅一萬四千有奇定為例後允成國公朱勇等請罷鞏昌諸衛及階文千戶所班軍代以陝西內地卒山東衛士沿海備倭沿海衛士復內調通州衛士漕淮安粟安慶衛士赴京操不便皆更之已並放還陝西班軍正統中京操軍皆戍邊乃遣御史於江北山東北直選卒為京師備景泰初邊事棘班軍悉留京間歲乃放還取衣裝于是于謙石亨議三分之留兩番操備保定河間天津放五十日河南山東九十日淮揚中都百日紫荊倒馬白羊三關及保定諸城戍卒屬山東河南者亦如之逃者官鐫秩三等卒盡室謫邊衛明年謙又言班軍分十營團練久不得休請仍分兩番報可成化間河南秋班軍二千餘不至下御史趣之海內燕安外衛卒在京祇供營繕諸役勢家私占復半之卒多畏苦往往愆期乃定違限罪輕者發居庸密雲山海關罰班六月重者發邊衛罰班至年半令雖具然不能革也弘治中兵部言占役之害罰治如議於是選衛兵八萬團操內外各半外衛四萬兩番迭上李東陽極言工作困軍班軍逾期不至大率坐此帝然之末年歸大寧卒兩班萬人正德中宣府軍及京營互調春秋番換如班軍例迄世宗立乃已嘉靖初尚書李承勛言永樂中調軍番上京師後遂踵為故事衛伍半空而在京者徒供營造不若省行糧之費以募工作御史鮑象賢請分班軍為三二入營操一以赴役通政司陳經復請半放之收其糧募工皆不行久之從翊國公郭勛言寬河南因災不至班軍而諭後犯者罪必如法兵部因條議軍士失期治將領之罪以多寡為差重者至鐫秩戍邊報可其後邊警棘乃併番上軍為一班五月赴京十一月放還每歲秋防見兵十五六萬仇鸞用事抽邊卒入衛凡選士六萬八千餘又免大寧等衛軍京操改防薊鎮班軍遂耗減豐城侯李熙核其數僅四萬人因請改徵銀召募而以見軍四萬歸營操練嚴嵩議以各衛兵雖有折乾之弊然清核令下猶凜凜畏罪若奉旨徵銀恐借為口實祖宗良法深意一旦蕩然帝是之折乾者衛卒納銀將辨以免其行有事則召募以應亡何從平江伯陳圭奏仍令中都山東河南軍分春秋兩班別為一營春以三月至八月還秋以九月至來歲二月還工作毋擅役隆慶初大發卒治河軍人憚久役逃亡多部議於見役軍中簡鋭者著伍而以老弱供畚鍤萬曆二年科臣言班軍非為工作設下兵部止議以小工不得概派而已時積弊已久軍士苦役甚多愆期不至故事失班脫逃者罰工銀追月糈其後額外多徵軍益逃中都尤甚自嘉靖四十三年後積逋工銀至五十餘萬兩巡撫都御史張翀乞蠲額外工價軍三犯者不必罰工竟調邊衛而巡視京營給事中王道成則言凡軍一班不到即係一年脫伍盡扣月糧本軍仍如例解京罰補正班三年脫班仍調邊衛並報可衛軍益大困後二十九年帝以班軍多老弱雇倩令嚴飭之職方主事沈朝煥給班軍餉皆傭諸丐因言班軍本處有大糧到京有行糧又有鹽斤銀所費十餘萬金今皆虛冒請解大糧貯庫有警可召募有工可雇役部議請先申飭俟大工竣行之是時專以班軍為役夫番上之初意盡失矣又五年內庭有小營繕中官陳永壽請仍用班軍可節省給事中宋一韓爭之謂班軍輪操即三大營軍所係甚重今邊鄙多事萬一關吏不謹而京師團練之軍多召募遊徼之役多役占皇城宿衛多白徒四衛扈從多厮役即得三都司健卒三萬猶不能無恐況動以興作朘削名存實亡緩急何賴哉不聽四十年給事中麻僖請恤班操之苦後六年順天巡撫都御史劉曰梧言班軍無濟實用因陳募兵十利是時法益弛軍不營操皆居京師為商販工藝以錢入班將啓禎時邊事洶洶乃移班軍於邊築垣負米無休期而糗糧缺軍多死班將往往逮革特敕兵部右侍郎專督理鑄印給之然已無及
