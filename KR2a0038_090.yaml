body:
  text: 明史卷九十志第六十六兵二衛所班軍太祖下集慶路為吳王罷諸翼統軍元帥置武德龍驤豹韜飛熊威武廣武興武英武鷹揚驍騎神武雄武鳳翔天策振武宣武羽林十七衛親軍指揮使司革諸將襲元舊制樞密平章元帥總管萬戶諸官號而核其所部兵五千人為指揮千人為千戶百人為百戶五十人為總旗十人為小旗天下既定度要害地係一郡者設所連郡者設衛大率五千六百人為衛千一百二十人為千戶所百十有二人為百戶所所設總旗二小旗十大小聯比以成軍其取兵有從征有歸附有謫發從征者諸將所部兵既定其地因以留戍歸附則勝國及僭偽諸降卒謫發以罪遷隸為兵者其軍皆世籍此其大略也洪武三年升杭州江西燕山青州四衛為都衛復置河南西安太原武昌四都衛四年造用寶金符及調發走馬符牌用寶符為小金牌二中書省大都督府各藏其一有詔發兵省府以牌入內府出寶用之走馬符牌鐵為之共四十金字銀字者各半藏之內府有急務調發使者佩以行尋改為金符凡軍機文書自都督府中書省長官外不許擅奏有詔調軍省府同覆奏然後納符請寶五年置親王護衛指揮使司每府三護衛衛設左右中前後五所所千戶二百戶十圍子手所二所千戶一七年申定兵衛之政征調則統於諸將事平則散歸各衛八年改在京留守都衛為留守衛指揮使司在外都衛為都指揮使司凡十三北平陝西山西浙江江西山東四川福建湖廣廣東廣西遼東河南又行都指揮使司二甘州大同俱隸大都督府九年選公侯都督各衛指揮嫡長次子為散騎參侍舍人隸都督府充宿衛或署各衛所事十三年丞相胡惟庸謀反誅革中書省因改大都督府為五分統諸軍司衛所明年復置中都留守司及貴州雲南都指揮使司十五年三月頒軍法定律十六年詔各都司上衛所城池水陸地里圖二十年置大寧都指揮使司是年命兵部置軍籍勘合載從軍履歷調補衛所年月在營丁口之數給內外衛所軍士而藏其副於內府三十年定武官役軍之制指揮同知僉事四千戶三百戶鎮撫二皆取正軍三日一番上下直歸伍操練衛所直廳六守門二守監四守庫一皆任老軍月一更建文帝嗣位置河北都司湖廣行都司文皇入立皆罷之而升燕山三護衛為親軍並建文時所立孝陵衛皆不隸五府後諸陵設衛皆如之移山西行都司所屬諸衛軍於北平設衛屯種永樂元年罷北平都司設留守行後軍都督府遷大寧都司於保定明年更定衛所屯守軍士臨邊險要者守多於屯在內平僻或地雖險要而運輸難至者皆屯多於守七年置調軍勘合以勇敢鋒鋭神奇精壯強毅克勝英雄威猛十六字編百號制敕調軍及遣將比號同方準行十八年北京建在南諸衛多北調宣德五年從平江伯陳瑄言以衛官職漕運東南之卒由是困八年減衛軍餘丁正軍外每軍留一餘悉遣歸已復以幼軍備操者不足三丁至七八丁者選一餘聽治生給軍裝正軍有故即令補伍毋再勾攝當是時都指揮使與布按並稱三司為封疆大吏而專閫重臣文武亦無定職世猶以武為重軍政修飭正德以來軍職冒濫為世所輕內之部科外之監軍督撫疊相彈壓五軍府如贅疣辨帥如走卒總兵官領敕於兵部皆跽間為長揖即謂非體至於末季衛所軍士雖一諸生可役使之積輕積弱重以隱占虛冒諸弊至舉天下之兵不足以任戰守而明遂亡矣崇禎三年范景文以兵部侍郎守通州上言祖制邊腹內外衛所置以軍隸衛以屯養軍後失其制軍外募民為兵屯外賦民出餉使如鱗尺籍不能為衝鋒之事並不知帶甲之人陛下百度振刷豈可令有定之軍數付之不可問有用之軍糈投之不可知因條上清核數事不果行初洪武二十六年定天下都司衛所共計都司十有七留守司一內外衛三百二十九守禦千戶所六十五及成祖在位二十餘年多所增改其後措置不一今區別其名於左以資考鏡上十二衛金吾前衛金吾後衛羽林左衛羽林右衛府軍衛府軍左衛府軍右衛府軍前衛府軍後衛虎賁左衛錦衣衛旗手衛五軍都督府所屬衛所左軍都督府在京凡本府在京屬衛曾經永樂十八年調守北京者各注其下曰調北京其年月不重出後四府同留守左衛調北京鎮南衛調北京水軍左衛驍騎右衛調北京龍虎衛調北京英武衛瀋陽左衛調北京瀋陽右衛調北京在外浙江都司杭州前衛杭州右衛台州衛寧波衛處州衛紹興衛海寧衛昌國衛溫州衛臨山衛松門衛金鄉衛定海衛海門衛盤石衛觀海衛海寧千戶所衢州千戶所嚴州千戶所湖州千戶所遼東都司定遼左衛定遼右衛定遼中衛定遼前衛定遼後衛鐵嶺衛東寧衛瀋陽中衛海州衛蓋州衛金州衛復州衛義州衛遼海衛三萬衛廣寧左屯衛廣寧右屯衛廣寧前屯衛廣寧後屯衛廣寧中護衛後改為屯衛山東都司青州左護衛後為天津右衛青州護衛革兗州護衛革兗州左護衛後為臨清衛登州衛青州左衛萊州衛寧海衛濟南衛平山衛德州衛後改屬後府樂安千戶所後改名武定屬後府膠州千戶所諸城千戶所滕縣千戶所右軍都督府在京虎賁右衛調北京留守右衛調北京水軍右衛武德衛調北京廣武衛在外雲南都司雲南左衛雲南右衛雲南前衛大理衛楚雄衛臨安衛景東衛曲靖衛金齒衛洱海衛蒙化衛馬隆衛改雲南右護衛革平夷衛越州衛六涼衛鶴慶千戶所革貴州都司貴州衛永寧衛普定衛平越衛烏撒衛普安衛層臺衛革赤水衛威清衛興隆衛新添衛清平衛平壩衛安莊衛龍里衛安南衛都勻衛畢節衛黃平千戶所四川都司成都左護衛成都右護衛後為龍虎左衛隸南京左府成都中護衛後為豹韜左衛隸南京前府成都左衛革成都右衛成都前衛成都後衛成都中衛寧川衛茂州衛建昌衛後屬行都司