body:
  text: 明史卷七本紀第七成祖三十二年春正月庚寅思州苗平辛丑發山東山西河南及鳳陽淮安徐邳民十五萬運糧赴宣府二月己酉大閲庚戌親征瓦剌安遠侯柳升領大營武安侯鄭亨領中軍寧陽侯陳懋豐城侯李彬領左右哨成山侯王通都督談青領左右掖都督劉江朱榮為前鋒庚申振鳳翔隴州飢按長吏不言者罪三月癸未張輔俘陳季擴于老撾以獻交址平庚寅發北京皇太孫從夏四月甲辰朔次興和大閲己酉頒軍中賞罰號令庚戌設傳令紀功官丁卯次屯雲谷孛羅不花等來降五月丁丑命尚書光祿卿給事中為督陳官察將士用命不用命者六月甲辰劉江遇瓦剌兵戰於康哈里孩敗之戊申次忽蘭忽失溫馬哈木帥衆來犯大敗之追至土剌河馬哈木宵遁庚戌班師宣捷於阿魯台戊午次三峯山阿魯台遣使來朝己巳以敗瓦剌詔天下秋七月戊子次紅橋詔六師入關有踐田禾取民畜産者以軍法論己亥次沙河皇太子遣使來迎八月辛丑朔至北京御奉天殿受朝賀丙午蠲北京州縣租二年戊午賞從征將士九月癸未郭亮徐亨備開平丙戌靖州苗平甲午費瓛鎮甘肅劉江鎮遼東閏月甲辰以太子遣使迎駕緩徵侍讀黃淮侍講楊士奇正字金問及洗馬楊溥芮善下獄未幾釋士奇復職甲子召吳高還丁卯都督朱榮鎮大同冬十一月甲辰録囚庚戌廢晉王濟熺為庶人庚申蠲蘇松杭嘉湖水災田租四十七萬九千餘石是年泥八剌國沙的新葛來朝封為王彭亨烏斯藏入貢真臘進金縷衣琉球中山王貢馬榜葛剌貢麒麟十三年春正月丙午塞居庸以北隘口丁未馬哈木謝罪請朝貢許之壬子北京午門災戊午敕內外諸司蠲諸宿逋將士軍官犯罪者悉宥之二月癸酉遣指揮劉斌給事中張磐等十二人巡視山西山東大同陝西甘肅遼東軍操練屯政核實以聞甲戌命行在禮部會試天下貢士癸未張輔等師還戊子論平交址功賞賚有差三月己亥策士於北京賜陳循等進士及第出身有差丙午廣西蠻叛指揮同知葛森討平之夏四月戊辰張輔鎮交址五月丁酉朔日有食之乙丑鑿清江浦通北京漕運六月振北京河南山東水災秋七月癸卯鄭和還乙巳四川戎縣山都掌蠻平八月庚辰振山東河南北京順天州縣飢九月壬戌北京地震冬十月甲申獵於近郊壬辰法司奏侵冒官糧者帝怒命戮之及覆奏帝曰朕過矣仍論如律自今死罪者皆五覆奏著為令十二月蠲順天蘇州鳳陽浙江湖廣河南山東州縣水旱田租是年琉球山南山北爪哇西王占城古里柯枝南渤利甘巴里滿剌加忽魯謨斯哈密哈烈撒馬兒罕火州土魯番蘇門答剌俺都淮失剌思入貢麻林及諸番進麒麟天馬神鹿琉球中山入貢者再十四年春正月己酉北京河南山東飢免永樂十二年逋租發粟一百三十七萬石有奇振之辛酉都督金玉討山西廣靈山寇平之三月癸巳都督梁福鎮湖廣貴州壬寅阿魯台敗瓦剌來獻捷夏四月壬申禮部尚書呂震請封禪帝曰今天下雖無事四方多水旱疾疫安敢自謂太平且六經無封禪之文事不師古甚無謂也不聽乙亥胡廣為文淵閣大學士六月丁卯都督同知蔡福等備倭山東秋七月丁酉遣使捕北京河南山東州縣蝗壬寅河決開封乙巳錦衣衛指揮使紀綱有罪伏誅八月癸酉旦壽星見禮臣請上表賀不許丁亥作北京西宮九月癸卯京師地震戊申發北京冬十月丁丑次鳳陽祀皇陵癸未至自北京謁孝陵十一月壬寅詔文武羣臣集議營建北京丙午召張輔還戊申漢王高煦有罪削二護衛徙山東山西湖廣流民於保安州賜復三年十二月丁卯鄭和復使西洋是年占城古里爪哇滿剌加蘇門答剌南巫里浡泥彭亨錫蘭山溜山南渤利阿丹麻林忽魯謨斯柯枝入貢琉球中山入貢者再十五年春正月丁酉大祀天地於南郊壬子平江伯陳瑄督漕運木赴北京二月癸亥谷王橞有罪廢為庶人丁卯豐城侯李彬鎮交址壬申泰寧侯陳圭董建北京柳升王通副之三月丁亥交址始貢士至京師丙申雜犯死罪以下囚輸作北京贖罪丙午漢王高煦有罪徙封樂安州壬子北巡發京師皇太子監國夏四月己巳次邾城申禁軍士毋踐民田稼有傷者除今年租或先被水旱逋租亦除之癸未西宮成五月丙戌至北京六月丁酉李彬討交址賊黎核斬之己亥中官張謙使西洋還敗倭寇於金鄉衛秋八月甲午甌寧人進金丹帝曰此妖人也令自餌之毀其方書九月丁卯曲阜孔子廟成帝親製文勒石冬十月李彬敗交址賊楊進江斬之十一月癸酉禮部尚書趙羾為兵部尚書巡視塞北屯戍軍民利弊是年西洋蘇祿東西洞王來朝琉球中山別失八里琉球山南真臘浡泥占城暹羅哈烈撒馬兒罕入貢十六年春正月甲寅交址黎利反都督朱廣擊敗之甲戌倭陷松門衛按察司僉事石魯坐誅興安伯徐亨都督夏貴備開平二月辛丑交址四忙縣賊殺知縣歐陽智以叛李彬遣將擊走之三月甲寅賜李騏等進士及第出身有差都督僉事劉鑑備邊大同夏五月庚戌重修太祖實録成丁巳胡廣卒秋七月己巳敕責陝西諸司比聞所屬歲屢不登致民流莩有司坐視不恤又不以聞其咎安在其速發倉儲振之贊善梁潛司諫周冕以輔導皇太子有闕皆下獄死冬十二月戊子諭法司朕屢敕中外官潔己愛民而不肖官吏恣肆自若百姓苦之夫良農必去稂莠者為害苗也繼今犯贓必論如法辛丑成山侯王通馳傳振陝西飢是年暹羅占城爪哇蘇門答剌泥八剌滿剌加南渤利哈烈沙哈魯千里達撒馬兒罕入貢琉球中山入貢者再十七年春二月乙酉興安伯徐亨備興和開平大同夏五月丙午都督方政敗黎利於可藍柵六月壬午免順天府去年水災田租戊子劉江殲倭寇於望海堝封江廣寧伯秋七月庚申鄭和還八月中官馬騏激交址乂安土知府潘僚反九月丙辰慶雲見禮臣請表賀不許冬十二月庚辰諭法司曰刑者聖人所慎匹夫匹婦不得其死足傷天地之和召水旱之災甚非朕寬恤之意自今在外諸司死罪咸送京師審録三覆奏然後行刑乙未工部侍郎劉仲廉核實交址戶口田賦察軍民利病是年哈密土魯番失剌思亦思弗罕真臘占城哈烈阿魯南渤利蘇門答剌八答黑商滿剌加入貢琉球中山入貢者四十八年春正月癸卯李彬及都指揮孫霖徐謜敗黎利於磊江閏月丙子翰林院學士楊榮金幼孜為文淵閣大學士庚辰擢人材布衣馬麟等十三人為布政使參政參議二月己酉蒲臺妖婦唐賽兒作亂安遠侯柳升帥師討之三月辛巳敗賊於卸石柵寨都指揮劉忠戰沒賽兒逸去甲申山東都指揮僉事衛青敗賊於安丘指揮王真敗賊於諸城獻俘京師戊子山東布政使儲埏張海按察使劉本等坐縱盜誅戊戌以逗留徵柳升下吏尋釋之夏五月壬午左都督朱榮鎮遼東庚寅交址參政侯保馮貴禦賊戰死六月丙午北京地震秋七月丁亥徐亨備開平八月丁酉朔日有食之九月己巳召皇太子丁亥詔自明年改京師為南京北京為京師冬十月庚申李彬遣指揮使方政敗黎利於老撾十一月戊辰以遷都北京詔天下是月振青萊飢十二月己未皇太子及皇太孫至北京癸亥北京郊廟宮殿成是年始設東廠命中官刺事古麻剌朗王來朝暹羅占城爪哇滿剌加蘇門答剌蘇祿西王入十九年春正月甲子朔奉安五廟神主於太廟御奉天殿受朝賀大宴甲戌大祀天地於南郊戊寅大赦天下癸巳鄭和復使西洋二月辛丑都督僉事胡原帥師巡海捕倭三月辛巳賜曾鶴齡等進士及第出身有差夏四月庚子奉天華蓋謹身三殿災詔羣臣直陳闕失乙巳詔罷不便於民及不急諸務蠲十七年以前逋賦免去年被災田糧己酉萬壽節以三殿災止賀癸丑蹇義等二十六人巡行天下安撫軍民五月乙丑出建言給事中柯暹御史何忠鄭維桓羅通等為知州庚寅令交址屯田秋七月己巳帝將北征敕都督朱榮領前鋒安遠侯柳升領中軍寧陽侯陳懋領御前精騎永順伯薛斌恭順伯吳克忠領馬隊武安侯鄭亨陽武侯薛祿領左右哨英國公張輔成山侯王通領左右掖八月辛卯朔日有食之冬十一月辛酉分遣中官楊實御史戴誠等核天下庫藏出納之數丙子議北征軍餉下戶部尚書夏原吉刑部尚書吳中於獄兵部尚書方賓自殺辛巳下侍讀李時勉於獄甲申發直隸山西河南山東及南畿應天等五府滁和徐三州丁壯運糧期明年二月至宣府是年瓦剌賢義王太平安樂王把禿孛羅來朝忽魯謨斯阿丹祖法兒剌撒不剌哇木骨都束古里柯枝加異勒錫蘭山溜山南渤利蘇門答剌阿魯滿剌加甘巴里蘇祿榜葛剌浡泥古麻剌朗王入貢暹羅入貢者再二十年春正月己未朔日有食之免朝賀詔羣臣修省辛未大祀天地於南郊壬申豐城侯李彬卒於交址二月乙巳隆平侯張信兵部尚書李慶分督北征軍餉役民夫二十三萬五千有奇運糧三十七萬石三月丙寅詔有司遇災先振後聞乙亥阿魯台犯興和都指揮王喚戰死丁丑親征阿魯台皇太子監國戊寅發京師辛巳次雞鳴山阿魯台遁夏四月乙卯次雲州大閲五月乙丑獵於偏嶺丁卯大閲辛未次西涼亭壬申大閲乙酉次開平六月壬辰令軍行出應昌結方陳以進癸巳諜報阿魯台兵攻萬全諸將請分兵還擊帝曰詐也彼慮大軍搗其巢穴欲以牽制我師敢攻城哉甲午次陽和谷寇攻萬全者果遁去秋七月己未阿魯台棄輜重於闊欒海側北遁發兵焚之收其牲畜遂旋師謂諸將曰阿魯台敢悖逆恃兀良哈為羽翼也當還師翦之簡步騎二萬分五道並進庚午遇於屈裂兒河帝親擊敗之追奔三十里斬部長數十人辛未徇河西捕斬甚衆甲戌兀良哈餘黨詣軍門降是月皇太子免南北直隸山東河南郡縣水災糧芻共六十一萬有奇八月戊戌諸將分道者俱獻捷辛丑以班師詔天下壬寅鄭亨薛祿守開平鄭和還九月壬戌至京師癸亥下左春坊大學士楊士奇於獄丙寅下吏部尚書蹇義禮部尚書呂震於獄尋俱釋之辛未録從征功封左都督朱榮武進伯都督僉事薛貴安順伯冬十月癸巳分遣中官及朝臣八十人核天下倉糧出納之數十二月辛卯朱榮鎮遼東閏月戊寅乾清宮災是年暹羅蘇門答剌阿丹等國遺使隨貢方物占城琉球中山卜花兒哈密瓦剌土魯番爪哇入貢二十一年春正月乙未大祀天地於南郊癸卯交址參將榮昌伯陳智追敗黎利於車來二月己巳都指揮使鹿榮討柳州叛蠻平之三月庚子御史王愈等會決重囚誤殺無罪四人坐棄市夏五月癸未免開封南陽衛輝鳳陽等府去年水災田租己丑常山護衛指揮孟賢等謀逆伏誅六月庚戌朔日有食之秋七月戊戌復親征阿魯台安遠侯柳升遂安伯陳英領中軍武安侯鄭亨保定侯孟瑛領左哨陽武侯薛祿新寧伯談忠領右哨英國公張輔安平伯李安領左掖成山侯王通興安伯徐亨領右掖寧陽侯陳懋領前鋒庚子釋李時勉復其官辛丑皇太子監國壬寅發京師戊申次宣府敕居庸關守將止諸司進奉八月己酉大閲庚申塞黑峪長安嶺諸邊險要丁丑皇太子免兩京山東郡縣水災田租九月戊子次西陽河癸巳聞阿魯台為瓦剌所敗部落潰散遂駐師不進冬十月甲寅次上莊堡迤北王子也先土干帥所部來降封忠勇王賜姓名金忠庚午班師十一月甲申至京師是年錫蘭山王來朝又遣使入貢占城古里忽魯謨斯阿丹祖法兒剌撒不剌哇木骨都束柯枝加異勒溜山南渤利蘇門答剌阿魯滿剌加失剌思榜葛剌琉球中山入貢二十二年春正月甲申阿魯台犯大同開平詔羣臣議北征敕邊將整兵俟命丙戌徵山西山東河南陝西遼東五都司及西寧鞏昌洮岷各衛兵期三月會北京及宣府戊子大祀天地於南郊癸巳鄭和復使西洋三月戊寅大閲諭諸將親征命柳升陳英領中軍張輔朱勇領左掖王通徐亨領右掖鄭亨孟瑛領左哨薛祿談忠領右哨陳懋金忠領前鋒己卯賜邢寬等進士及第出身有差夏四月戊申皇太子監國己酉發京師庚午次隰寧諜報阿魯台走答蘭納木兒河遂趨進師五月己卯次開平使使招諭阿魯台諸部乙酉瘞道中遺骸丁酉宴羣臣於應昌命中官歌太祖御製詞五章曰此先帝所以戒後嗣也雖在軍旅何敢忘己亥次威遠州復宴羣臣自製詞五章命中官歌之皇太子令免廣平順德揚州及湖廣河南郡縣水災田租六月庚申前鋒至答蘭納木兒河不見敵命張輔等窮搜山谷三百里無所得進駐河上癸亥陳懋等引兵抵白邙山以糧盡還甲子班師命鄭亨等以步卒西會於開平壬申夜南京地震秋七月庚辰勒石於清水源之崖戊子遣呂震以旋師諭太子詔告天下己丑次蒼崖戍不豫庚寅至榆木川大漸遺詔傳位皇太子喪禮一如高皇帝遺制辛卯崩年六十有五太監馬雲密與大學士楊榮金幼孜謀以六軍在外祕不發喪鎔錫為椑以斂載以龍輿所至朝夕上膳如常儀壬辰楊榮偕御馬監少監海壽馳訃皇太子壬寅次武平鎮鄭亨步軍來會八月甲辰楊榮等至京師皇太子即日遣太孫奉迎於開平己酉次雕鶚谷皇太孫至軍中發喪壬子及郊皇太子迎入仁智殿加殮納梓宮九月壬午上尊諡曰體天弘道高明廣運聖武神功純仁至孝文皇帝廟號太宗葬長陵嘉靖十七年九月改上尊諡曰啓天弘道高明肇運聖武神功純仁至孝文皇帝廟號成祖贊曰文皇少長習兵據幽燕形勝之地乘建文孱弱長驅內向奄有四海即位以後躬行節儉水旱朝告夕振無有壅蔽知人善任表𩹉洞達雄武之略同符高祖六師屢出漠北塵清至其季年威德遐被四方賓服受朝命而入貢者殆三十國幅隕之廣遠邁漢唐成功駿烈卓乎盛矣然而革除之際倒行逆施慙德亦曷可掩哉
