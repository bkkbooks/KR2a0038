body:
  text: 明史卷一百二十四列傳第十二擴廓帖木兒蔡子英陳友定伯顏子中等把匝剌瓦爾密擴廓帖木兒沈丘人本王姓小字保保元平章察罕帖木兒甥也察罕養為子順帝賜名擴廓帖木兒汝潁盜起中原大亂元師久無功至正十二年察罕起義兵戰河南北擊賊關中河東復汴梁走劉福通平山東降田豐滅賊幾盡既而總大軍圍益都田豐叛察罕為王士誠所刺事具元史察罕既死順帝即軍中拜擴廓太尉中書平章政事知樞密院事如察罕官帥兵圍益都穴地而入克之執豐士誠剖其心以祭察罕縛陳猱頭等二十餘人獻闕下東取莒州山東地悉定至正二十二年也初察罕定晉冀孛羅帖木兒在大同以兵爭其地數相攻朝廷下詔和解終不聽擴廓既平齊地引軍還駐太原與孛羅搆難如故會朝臣老的沙禿堅獲罪於太子出奔孛羅孛羅匿之詔削孛羅官解其兵柄孛羅遂舉兵反犯京師殺丞相搠思監自為左丞相老的沙為平章禿堅知樞密院太子求援於擴廓擴廓遣其將白鎖住以萬騎入衛戰不利奉太子奔太原踰年擴廓以太子令舉兵討孛羅入大同進薄大都順帝乃襲殺孛羅於朝擴廓從太子入覲以為太傅左丞相當是時微擴廓太子幾殆擴廓功雖高起行間驟至相位中朝舊臣多忌之者而擴廓久典軍亦不樂在內居兩月即請出治兵南平江淮詔許之封河南王俾總天下兵代皇太子出征分省中官屬之半以自隨鹵簿甲仗亙數十里軍容甚盛時太祖已滅陳友諒盡有江楚地張士誠據淮東浙西擴廓知南軍強未可輕進乃駐軍河南檄關中四將軍會師大舉四將軍者李思齊張思道孔興脫列伯也思齊羅山人與察罕同起義兵齒位略相埒得檄大怒曰吾與若父交若髮未燥敢檄我耶令其下一甲不得出武關思道等亦皆不聽調擴廓歎曰吾奉詔總天下兵而鎮將不受節制何討賊為乃遣其弟脫因帖木兒以一軍屯濟南防遏南軍而自引兵西入關攻思齊等思齊等會兵長安盟於含元殿舊基併力拒擴廓相持經年數百戰未能決順帝使使諭令罷兵專事江淮擴廓欲遂定思齊等然後引軍東乃遣其驍將貊高趨河中欲出不意搗鳳翔覆思齊巢穴貊高所將多孛羅部曲行至衛輝軍變脅貊高叛擴廓襲衛輝彰德據之罪狀擴廓於朝初太子之奔太原也欲用唐肅宗靈武故事自立擴廓不可及還京師皇后諭指令以重兵擁太子入城脅順帝禪位擴廓未至京三十里留其軍以數騎入朝由是太子銜之而順帝亦心忌擴廓廷臣譁言擴廓受命平江淮乃西攻關中今罷兵不奉詔跋扈有狀及貊高奏至順帝乃削擴廓太傅中書左丞相令以河南王就食邑汝南分其軍隸諸將而以貊高知樞密院事兼平章總河北軍賜其軍號忠義功臣太子開撫軍院於京師總制天下兵馬專備擴廓擴廓既受詔退軍澤州其部將關保亦歸於朝朝廷知擴廓勢孤乃詔李思齊等東出關與貊高合攻擴廓而令關保以兵戍太原擴廓憤甚引軍據太原盡殺朝廷所置官吏於是順帝下詔盡削擴廓官爵令諸軍四面討之是時明兵已下山東收大梁梁王阿魯溫察罕父也以河南降脫因帖木兒敗走餘皆望風降遁無一人抗者既迫潼關思齊等倉皇解兵西歸而貊高關保皆為擴廓所擒殺順帝大恐下詔歸罪於太子罷撫軍院悉復擴廓官令與思齊等分道南討詔下一月明兵已逼大都順帝北走擴廓入援不及大都遂陷距察罕死時僅六年云明兵已定元都將軍湯和等自澤州徇山西擴廓遣將禦之戰於韓店明師大敗會順帝自開平命擴廓復大都擴廓乃北出雁門將由保安徑居庸以攻北平徐達常遇春乘虛搗太原擴廓還救部將豁鼻馬潛約降於明明兵夜劫營營中驚潰擴廓倉卒以十八騎北走明兵遂西入關思齊以臨洮降思道走寧夏其弟良臣以慶陽降既而復叛明兵破誅之於是元臣皆入於明唯擴廓擁兵塞上西北邊苦之洪武三年太祖命大將軍徐達總大兵出西安搗定西擴廓方圍蘭州趨赴之戰於沈兒峪大敗盡亡其衆獨與妻子數人北走至黃河得流木以渡遂奔和林時順帝崩太子嗣立復任以國事踰年太祖復遣大將軍徐達左副將軍李文忠征西將軍馮勝將十五萬衆分道出塞取擴廓大將軍至嶺北與擴廓遇大敗死者數萬人劉基嘗言於太祖曰擴廓未可輕也至是帝思其言謂晉王曰吾用兵未嘗敗北今諸將自請深入敗於和林輕信無謀致多殺士卒不可不戒明年擴廓復攻雁門命諸將嚴為之備自是明兵希出塞矣其後擴廓從其主徙金山卒於哈剌那海之衙庭其妻毛氏亦自經死蓋洪武八年也初察罕破山東江淮震動太祖遣使通好元遣戶部尚書張郎中馬合謀浮海如江東授太祖榮祿大夫江西等處行中書省平章政事賜以龍衣御酒甫至而察罕被刺太祖遂不受殺馬合謀以張才留官之及擴廓視師河南太祖乃復遣使通好擴廓輒留使者不遣凡七致書皆不答既出塞復遣人招諭亦不應最後使李思齊往始至則待以禮尋使騎士送歸至塞下辭曰主帥有命請公留一物為別思齊曰吾遠來無所齎騎士曰願得公一臂思齊知不免遂斷與之還未幾死太祖以是心敬擴廓一日大會諸將問曰天下奇男子誰也皆對曰常遇春將不過萬人橫行無敵真奇男子太祖笑曰遇春雖人傑吾得而臣之吾不能臣王保保其人奇男子也竟册其妹為秦王妃張仕明纍官中書省參知政事有才辨明習故事裁決如流甚見信任自以故元臣心嘗戀戀會太祖縱降人北還附私書訪其子存亡楊憲得書稿以聞下吏按問大書牘背曰身在江南心思塞北太祖乃殺之而擴廓幕下士不屈節縱出塞者有蔡子英子英永寧人元至正中進士察罕開府河南辟參軍事纍薦至行省參政元亡從擴廓走定西明兵克定西擴廓軍敗子英單騎走關中亡入南山太祖聞其名使人繪形求得之傳詣京師至江濱亡去變姓名賃舂久之復被獲械過洛陽見湯和長揖不拜抑之跪不肯和怒爇火焚其鬚不動其妻適在洛請與相見子英避不肯見至京太祖命脫械以禮遇之授以官不受退而上書曰陛下乘時應運削平羣雄薄海內外莫不賓貢臣鼎魚漏網假息南山曩者見獲復得脫亡七年之久重煩有司追迹而陛下以萬乘之尊全匹夫之節不降天誅反療其疾易冠裳賜酒饌授以官爵陛下之量包乎天地矣臣感恩無極非不欲自竭犬馬但名義所存不敢輒渝初志自惟身本韋布智識淺陋過蒙主將知薦仕至七命躍馬食肉十有五年愧無尺寸以報國士之遇及國家破亡又復失節何面目見天下士管子曰禮義廉恥國之四維今陛下創業垂統正當挈持大經大法垂示子孫臣民奈何欲以無禮義寡廉恥之俘囚而厠諸維新之朝賢士大夫之列哉臣日夜思維咎往昔之不死至於今日分宜自裁陛下待臣以恩禮臣固不敢賣死立名亦不敢偷生苟祿若察臣之愚全臣之志禁錮海南畢其餘命則雖死之日猶生之年昔王蠋閉戶以自縊李芾闔門以自屠彼非惡榮利而樂死亡顧義之所在雖湯鑊有不得避也渺焉之軀上愧古人死有餘恨惟陛下裁察帝覽其書益重之館之儀曹忽一夜大哭不止人問其故曰無他思舊君耳帝知不可奪洪武九年十二月命有司送出塞令從故主於和林陳友定一名有定字安國福清人徙居汀之清流世業農為人沉勇喜遊俠鄉里皆畏服至正中汀州府判蔡公安至清流募民兵討賊友定應募公安與語奇之使掌所募兵署為黃土寨巡檢以討平諸山寨功遷清流縣尹陳友諒遣其將鄧克明等陷汀邵略杉關行省授友定汀州路總管禦之戰於黃土大捷走克明踰年克明復取汀州急攻建寧守將完者帖木兒檄友定入援連破賊悉復所失郡縣行省上其功第一進參知政事已置分省於延平以友定為平章於是友定盡有福建八郡之地友定以農家子起傭伍目不知書及據八郡數招致文學知名士如閩縣鄭定廬州王翰之屬留置幕下粗涉文史習為五字小詩皆有意理然頗任威福所屬違令者輒承制誅竄不絶漳州守將羅良不平以書責之曰郡縣者國家之土地官司者人主之臣役而廥廩者朝廷之外府也今足下視郡縣如室家驅官僚如圉僕擅廥廩如私藏名雖報國實有鷹揚跋扈之心不知足下欲為郭子儀乎抑為曹孟德乎友定怒竟以兵誅良而福清宣慰使陳瑞孫崇安令孔楷建陽人詹翰拒友定不從皆被殺於是友定威震八閩然事元未嘗失臣節是時張士誠據浙西方國珍據浙東名為附元歲漕粟大都輒不至而友定歲輸粟數十萬石海道遼遠至者嘗十三四順帝嘉之下詔褒美太祖既定婺州與友定接境友定侵處州參政胡深擊走之遂下浦城克松溪獲友定將張子玉與朱亮祖進攻建寧破其二柵友定遣阮德柔以兵四萬屯錦江繞出深後斷其歸路而自帥牙將賴政等以鋭師搏戰德柔自後夾擊深兵敗被執死太祖既平方國珍即發兵伐友定將軍胡廷美何文輝由江西趨杉關湯和廖永忠由明州海道取福州李文忠由浦城取建寧而別遣使至延平招諭友定友定置酒大會諸將及賓客殺明使者瀝其血酒甕中與衆酌飲之酒酣誓於衆曰吾曹並受元厚恩有不以死拒者身磔妻子戮遂往視福州環城作壘距壘五十步輒築一臺嚴兵為拒守計已而聞杉關破急分軍為二以一軍守福而自帥一軍守延平以相掎角及湯和等舟師抵福之五虎門平章曲出引兵逆戰敗明兵緣南臺蟻附登城守將遁去參政尹克仁宣政使𩽆耳麻不屈死僉院柏帖木兒積薪樓下殺妻妾及二女縱火自焚死廷美克建寧湯和進攻延平友定欲以持久困之諸將請出戰不許數請不已友定疑所部將叛殺蕭院判軍士多出降者會軍器局災城中炮聲震地明師知有變急攻城友定呼其屬訣曰大事已去吾一死報國諸君努力因退入省堂衣冠北面再拜仰藥死所部爭開城門納明師師入趨視之猶未絶也舁出水東門適天大雷雨友定復蘇械送京師入見帝詰之友定厲聲曰國破家亡死耳尚何言遂併其子海殺之海一名宗海工騎射亦喜禮文士友定既被執自將樂歸於軍門至是從死元末所在盜起民間起義兵保障鄉里稱元帥者不可勝數元輒因而官之其後或去為盜或事元不終惟友定父子死義時人稱完節焉友定既死興化泉州皆望風納獨漳州路達魯花赤迭里彌實具公服北面再拜引斧斫印章以佩刀剚喉而死時云閩有三忠謂友定柏帖木兒迭里彌實也鄭定字孟宣好擊劍為友定記室及敗浮海入交廣間久之還居長樂洪武末纍官至國子助教王翰字用文仕元為潮州路總管友定敗為黃冠棲永泰山中者十載太祖聞其賢強起之自刎死有子稱知名為友定所辟者又有伯顏子中子中其先西域人後仕江西因家焉子中明春秋五舉有司不第行省辟授東湖書院山長遷建昌教授子中雖儒生慷慨喜談兵江西盜起授分省都事使守贛州而陳友諒兵已破贛子中倉卒募吏民與鬬城下不勝脫身間道走閩陳友定素知之辟授行省員外郎出奇計以友定兵復建昌浮海如元都獻捷纍遷吏部侍郎持節發廣東何真兵救閩至則真已降於廖永忠子中跳墮馬折一足致軍前永忠欲脅降之不屈永忠義而舍之乃變姓名冠黃冠遊行江湖間太祖求之不得簿録其妻子子中竟不出嘗齎鴆自隨久之事寖解乃還鄉里洪武十二年詔郡縣舉元遺民布政使沈立本密言子中於朝以幣聘使者至子中太息曰死晚矣為歌七章哭其祖父師友飲鴆而死當元亡時守土臣仗節死者甚衆明兵克太平總管靳義赴水死攻集慶行臺御史大夫福壽戰敗嬰城固守城破猶督兵巷戰坐伏龜樓指揮左右或勸之遁福壽叱而射之遂死於兵參政伯家奴達魯花赤達尼達思等皆戰死克鎮江守將段武平章定定戰死克寧國百戶張文貴殺妻妾自刎死克徽州萬戶吳訥戰敗自殺克婺州浙東廉訪使楊惠婺州達魯花赤僧住戰死克衢州總管馬浩赴水死石抹宜孫守處州其母與弟厚孫先為明兵所獲令為書招之不聽比克處宜孫戰敗走建寧收集士卒欲復處州攻慶元為耿再成所敗還走建寧半道遇鄉兵被殺部將李彥文葬之龍泉太祖嘉其忠遣使致祭復其處州生祠又祠福壽於應天余闕於安慶李黼於江州闕黼事具元史其後大軍北克益都平章普顏不花不屈死克東昌平章申榮自經死真定路達魯花赤鈒納錫彰聞王師取元都朝服登城西崖北面再拜投崖死克奉元西臺御史桑哥失里與妻子俱投崖死左丞拜泰古逃入終南山郎中王可仰藥死檢校阿失不花自經死三原縣尹朱春謂其妻曰吾當死以報國妻曰君能盡忠妾豈不能盡亦俱投繯死又大軍攻永州右丞鄧祖勝固守食盡力窮仰藥死克梧州吏部尚書普顏帖木兒戰死張翺赴水死克靖江都事趙元隆陳瑜劉永錫廉訪使僉事帖木兒不花元帥元禿蠻萬戶董丑漢府判趙世傑皆自殺至如劉福通徐壽輝陳友諒等所破郡縣守吏將帥多死節者已見元史不具載載其見明實録者又有劉諶江西人為仁壽教官明玉珍入蜀棄官隱瀘州玉珍欲官之不就鳳山趙善璞隱深山明玉珍聘為學士亦不就而張士誠破平江時參軍楊椿挺身戰刃交於胸瞋目怒罵死妻亦自經士誠又以書幣徵故左司員外郎楊乘於松江乘具酒醴告祖禰顧西日晴明曰人生晚節如是足矣夜分自經死其親藩死事最烈者有雲南梁王梁王把匝剌瓦爾密元世祖第五子雲南王忽哥赤之裔也封梁王仍鎮雲南順帝之世天下多故雲南僻遠王撫治有威惠至正二十三年明玉珍僭號於蜀遣兵三道來攻王走營金馬山明年以大理兵迎戰玉珍兵敗退久之順帝北去大都不守中國無元尺寸地而王守雲南自若歲遣使自塞外達元帝行在執臣節如故未幾明師平四川天下大定太祖以雲南險僻不欲用兵明年正月北平守將以所得王遣往漠北使者蘇成來獻太祖乃命待制王禕齎詔偕成往招諭王待禕以禮會元嗣君遣使脫脫來徵餉脫脫疑王有他意因脅以危語王遂殺禕而以禮斂之踰三年太祖復遣湖廣參政吳雲偕大軍所獲雲南使臣鐵知院等往知院以己奉使被執誘雲改制書紿王雲不從被殺王聞雲死收其骨送蜀給孤寺太祖知王終不可以諭降乃命傅友德為征南將軍藍玉沐英為副帥師征之洪武十四年十二月下普定王遣司徒平章達里麻率兵駐曲靖沐英引軍疾趨乘霧抵白石江霧解達里麻望見大驚友德等率兵進擊達里麻兵潰被擒先是王以女妻大理酋段得功嘗倚其兵力後以疑殺之遂失大理援至是達里麻敗失精甲十餘萬王知事不可為走普寧州之忽納寨焚其龍衣驅妻子赴滇池死遂與左丞達的右丞驢兒夜入草舍俱自經太祖遷其家屬於耽羅贊曰洪武九年方谷珍死宋濂奉敕撰墓碑於一時羣雄皆直書其名獨至察罕曰齊國李忠襄王順逆之理昭然可見矣擴廓百戰不屈欲繼先志而齎恨以死友定不作何真之偷生梁王恥為納哈出之背國要皆元之忠臣也詩曰其儀一兮心如結兮易曰苦節悔亡其伯顏子中蔡子英之謂歟嘗謂元歸塞外一時從臣必有賦式微之章於沙漠之表者惜其姓字湮沒不得見於人間然則若子英者又豈非厚幸哉
