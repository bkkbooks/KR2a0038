body:
  text: 明史卷一百四十五列傳第三十三姚廣孝張玉子輗軏從子信朱能丘福李遠王忠王聰火真談淵王真陳亨子懋徐理房寬劉才姚廣孝長洲人本醫家子年十四度為僧名道衍字斯道事道士席應真得其陰陽術數之學嘗游嵩山寺相者袁珙見之曰是何異僧目三角形如病虎性必嗜殺劉秉忠流也道衍大喜洪武中詔通儒書僧試禮部不受官賜僧服還經北固山賦詩懷古其儕宗泐曰此豈釋子語耶道衍笑不答高皇后崩太祖選高僧侍諸王為誦經薦福宗泐時為左善世舉道衍燕王與語甚合請以從至北平住持慶壽寺出入府中跡甚密時時屏人語及太祖崩惠帝立以次削奪諸王周湘代齊岷相繼得罪道衍遂密勸成祖舉兵成祖曰民心向彼奈何道衍曰臣知天道何論民心乃進袁珙及卜者金忠於是成祖意益決陰選將校勾軍卒收材勇異能之士燕邸故元宮也深邃道衍練兵後苑中穴地作重屋繚以厚垣密甃瓴甋瓶缶日夜鑄軍器畜鵝鴨亂其聲建文元年六月燕府護衛百戶倪諒上變詔逮府中官屬都指揮張信輸誠於成祖成祖遂決策起兵適大風雨至簷瓦墮地成祖色變道衍曰祥也飛龍在天從以風雨瓦墮將易黃也兵起以誅齊泰黃子澄為名號其衆曰靖難之師道衍輔世子居守其年十月成祖襲大寧李景隆乘間圍北平道衍守禦甚固擊却攻者夜縋壯士擊傷南兵授師至內外合擊斬首無算景隆平安等先後敗遁成祖圍濟南三月不克道衍馳書曰師老矣請班師乃還復攻東昌戰敗亡大將張玉復還成祖意欲稍休道衍力趣之益募勇士敗盛庸破房昭西水寨道衍語成祖毋下城邑疾趨京師京師單弱勢必舉從之遂連敗諸將於淝河靈璧渡江入京師成祖即帝位授道衍僧録司左善世帝在藩邸所接皆武人獨道衍定策起兵及帝轉戰山東河北在軍三年或旋或否戰守機事皆決於道衍道衍未嘗臨戰陳然帝用兵有天下道衍力為多論功以為第一永樂二年四月拜資善大夫太子少師復其姓賜名廣孝贈祖父如其官帝與語呼少師而不名命蓄髮不肯賜第及兩宮人皆不受常居僧寺冠帶而朝退仍緇衣出振蘇湖至長洲以所賜金帛散宗族鄉人重修太祖實録廣孝為監修又與解縉等纂修永樂大典書成帝褒美之帝往來兩都出塞北征廣孝皆留輔太子於南京五年四月皇長孫出閣就學廣孝侍說書十六年三月入覲年八十有四矣病甚不能朝仍居慶壽寺車駕臨視者再語甚歡賜以金唾壺問所欲言廣孝曰僧溥洽繫久願赦之溥洽者建文帝主録僧也初帝入南京有言建文帝為僧遁去漙洽知狀或言匿溥洽所帝乃以他事禁溥洽而命給事中胡濙等遍物色建文帝久之不可得溥洽坐繫十餘年至是帝以廣孝言即命出之廣孝頓首謝尋卒帝震悼輟視朝二日命有司治喪以僧禮葬追贈推誠輔國協謀宣力文臣特進榮祿大夫上柱國榮國公諡恭靖賜葬房山縣東北帝親製神道碑志其功官其養子繼尚寶少卿廣孝少好學工詩與王賓高啓楊孟載友善宋濂蘇伯衡亦推奬之晚著道餘録頗毀先儒識者鄙焉其至長洲候同産姊姊不納訪其友王賓賓亦不見但遙語曰和尚誤矣和尚誤矣復往見姊姊詈之廣孝惘然洪熙元年加贈少師配享成祖廟庭嘉靖九年世宗諭閣臣曰姚廣孝佐命嗣興勞烈具有顧係釋氏之徒班諸功臣侑食太廟恐不足尊敬祖宗於是尚書李時偕大學士張璁桂萼等議請移祀大興隆寺太常春秋致祭詔曰可張玉字世美祥符人仕元為樞密知院元亡從走漠北洪武十八年來歸從大軍出塞至捕魚兒海以功授濟南衛副千戶遷安慶衛指揮僉事又從征遠順散毛諸洞北逐元人之擾邊者至鴉寒山還調燕山左護衛從燕王出塞至黑松林又從征野人諸部以驍果善謀畫為王所親任建文元年成祖起兵玉帥衆奪北平九門撫諭城內外三日而定師將南玉獻計遣朱能東攻薊州殺馬宣降遵化分兵下永平密雲皆致其精甲以益師擢都指揮僉事是時朝廷遣大兵討燕都督徐凱軍河間潘忠楊松軍鄚州長興侯耿炳文以三十萬衆軍真定玉進說曰潘楊勇而無謀可襲而俘也成祖命玉將親兵為前鋒抵樓桑值中秋南軍方宴會夜半疾馳破雄縣忠松來援邀擊於月漾橋生擒之遂克鄚州自以輕騎覘炳文軍還言軍無紀律其上有敗氣宜急擊成祖遂引兵西至無極顧諸將謀所嚮諸將以南軍盛請屯新樂玉曰彼雖衆皆新集我軍乘勝徑趨真定破之必矣成祖喜曰吾倚玉足濟大事明日抵真定大破炳文軍獲副將李堅寧忠都督顧成等斬首三萬復敗安陸侯吳傑軍燕兵由是大振江陰侯吳高以遼東兵圍永平曹國公李景隆引數十萬衆將攻北平成祖與玉謀先援永平至則高遁走玉追斬甚衆遂從間道襲大寧拔其衆而還次會州初立五軍以玉將中軍時李景隆已圍北平成祖旋師大戰於鄭村壩景隆敗成祖乘勝抵城下城中兵鼓譟出內外夾攻南軍大潰明年從攻廣昌蔚州大同諜報景隆收潰卒號百萬且復至玉曰兵貴神速請先據白溝河以逸待勞駐河上三日景隆至以精騎馳擊復大敗之進拔德州追奔至濟南圍其城三月解圍還尋再出破滄州擒徐凱進攻東昌與盛庸軍遇成祖以數十騎繞出其後庸圍之數重成祖奮擊得出玉不知成祖所在突入陳中力戰格殺數十人被創死年五十八燕兵起轉鬬三年鋒鋭甚至是失大將一軍奪氣師還北平諸將叩頭請罪成祖日勝負常事不足計恨失玉耳艱難之際失吾良輔因泣下不能止諸將皆泣其後談淵沒於夾河王真沒於淝河雖悼惜不如玉也建文四年六月成祖稱帝贈玉都指揮同知九月甲申追贈榮國公諡忠顯洪熙元年三月加封河間王改諡忠武與東平王朱能金鄉侯王真榮國公姚廣孝並侑享成祖廟廷子三人長輔次輗次軏從子信輔自有傳輗以功臣子為神策衛指揮使正統五年英國公輔訴輗毆守墳者斥及先臣詞多悖慢帝命錦衣衛鞫實錮之尋釋三遷至中府右都督領宿衛景泰三年加太子太保英宗復位以軏迎立功並封輗文安伯食祿千二百石天順六年卒贈侯諡忠僖子斌嗣坐詛咒奪爵軏永樂中入宿衛為錦衣衛指揮僉事從宣宗征高煦又從成國公朱勇出塞至氈帽山正統十三年以副總兵征麓川還討貴州叛苗積功為前府右都督總京營兵景泰二年坐驕淫不道下獄尋釋景帝不豫與石亨曹吉祥迎上皇於南城封太平侯食祿二千石于謙王文范廣之死軏有力焉納賄亂政亞于亨天順二年卒贈裕國公諡勇襄子瑾嗣成化元年革奪門功奪侯授指揮使信舉建文二年鄉試第一永樂中歷刑科都給事中數言事擢工部右侍郎奉命視開封決河請疏魚王口至中灤故道二十餘里詔如其議詳宋禮傳出治浙江海塘坐事謫交址洪熙初召為兵部左侍郎帝嘗謂英國公輔有兄弟可加恩者乎輔頓首言輗軏蒙上恩備近侍然皆奢侈獨從兄侍郎信賢可使也帝召見信曰是英國公兄耶趣武冠冠之改錦衣衛指揮同知世襲時去開國未遠武階重故也居職以平恕稱宣德六年遷四川都指揮僉事在蜀十五年致仕朱能字士弘懷遠人父亮從太祖渡江積功至燕山護衛副千戶能嗣職事成祖藩邸嘗從北征降元太尉乃兒不花燕兵起與張玉首謀殺張昺謝貴奪九門授指揮同知帥衆拔薊州殺馬宣下遵化從破雄縣戰月漾穚執楊松潘忠降其衆於鄚州長驅至真定大敗耿炳文軍獨與敢死士三十騎追奔至滹沱河躍馬大呼突南軍軍數萬人皆披靡蹂藉死者甚衆降三千餘人成祖以手札勞之進都指揮僉事從援永平走吳高襲克大寧還將左軍破李景隆於鄭村壩從攻廣昌蔚州大同戰白溝河為前鋒再敗平安軍進攻濟南次鏵山南軍乘高而陳能以奇兵繞其後襲破之降萬餘人從攻滄州破東門入斬首萬餘級東昌之戰盛庸鐵鉉圍成祖數重張玉戰死事急能帥周長等殊死鬬翼成祖潰圍出復從戰夾河談淵死燕師挫能至再戰再捷軍復振與平安戰藁城敗之追奔至真定略地彰德定州破西水寨將輕騎千人掠衡水獲指揮賈榮克東阿東平盡破汶上諸寨既而王真戰死淝河燕軍屢敗諸將議旋師能獨按劍曰漢高十戰九敗終有天下今舉事連得勝小挫輒歸更能北面事人耶成祖亦叱諸將曰任公等所之諸將乃不敢言遂引兵南敗平安銀牌軍都督陳暉來援又敗之遂拔靈璧軍擒平安等降十萬衆纍遷右軍都督僉事進克泗州渡淮敗盛庸兵拔盱眙下揚州渡江入金川門九月甲申論功次丘福授奉天靖難推誠宣力武臣特進榮祿大夫右柱國左軍都督府左都督封成國公祿二千二百石與世券永樂二年兼太子太傅加祿千石四年七月詔能佩征夷將軍印西平侯沐晟為左副將軍由廣西雲南分道討安南帝親送之龍江十月行次龍州卒於軍年三十七能於諸將中年最少善戰張玉善謀帝倚為左右手玉歿後軍中進止悉咨能能身長八尺雄毅開豁居家孝友位列上公未嘗以富貴驕人善撫士卒卒之日將校皆為流涕敕葬昌平追封東平王諡武烈洪熙時配享成祖廟廷子勇嗣以元勳子特見任用歷掌都督府事留守南京永樂二十二年從北征宣宗即位從平漢庶人征兀良哈張輔解兵柄詔以勇代勇以南北諸衛所軍備邊轉運錯互非便請專令南軍轉運北軍備邊又言京軍多遠戍非居重馭輕之道請選精兵十萬益之又請令公侯伯都督子弟操練皆報可正統九年出喜峯口擊𩽆顏諸部至富峪川而還為兵部尚書徐晞所劾詔不問尋論功加太保勇頳面虬鬚狀貌甚偉勇略不足而敬禮士大夫十四年從駕至土木迎戰鷂兒嶺中伏死所帥五萬騎皆沒于謙等追論勇罪奪封景泰元年勇子儀乞葬祭帝以勇大將喪師辱國致陷乘輿不許已請襲禮部尚書胡濙主之又以立東宮恩得嗣減歲祿至千石天順初追封勇平陰王諡武愍儀及子輔皆守備南京又三傳至希忠從世宗幸承天掌行在左府事至衛輝行宮夜火希忠與都督陸炳翼帝出由是被恩遇入直西苑歷掌後右兩府總神機營提督十二團營及五軍營纍加太師益歲祿七百石代郊天者三十九賞賚不可勝紀卒追封定襄王諡恭靖萬曆十一年以給事中余懋學言追奪王爵弟希孝亦至都督加太保卒贈太傅諡忠僖希忠五傳至曾孫純臣崇禎時見倚任李自成薄京師帝手敕純臣總督中外諸軍輔太子敕未下城已陷為賊所殺丘福鳳陽人起卒伍事成祖藩邸積年勞授燕山中護衛千戶燕師起與朱能張玉首奪九門大戰真定突入子城戰白溝河以徑卒搗中堅夾河滄州靈璧諸大戰皆為軍鋒盛庸兵扼淮戰艦數千艘蔽淮岸福與朱能將數百人西行二十里自上流潛濟猝薄南軍庸驚走盡奪其戰艦軍乃得渡纍遷至中軍都督同知福為人朴戇鷙勇謀畫智計不如玉敢戰深入與能埒每戰勝諸將爭前效虜獲福獨後成祖每歎曰丘將軍功我自知之即位大封功臣第福為首授奉天靖難推誠宣力武臣特進榮祿大夫右柱國中軍都督府左都督封淇國公祿二千五百石與世券命議諸功臣封賞每奉命議政皆首福漢王高煦數將兵有功成祖愛之福武人與之善數勸立為太子帝猶豫久之竟立仁宗以福為太子太師六年加歲祿千石尋命與蹇義金忠等輔導皇長孫明年七月將大軍出塞至臚朐河敗沒先是本雅失里殺使臣郭驥帝大怒發兵討之命福佩征虜大將軍印充總兵官武城侯王聰同安侯火真為左右副將靖安侯王忠安平侯李遠為左右參將以十萬騎行帝慮福輕敵諭以兵事須慎重自開平以北即不見寇宜時時如對敵相機進止不可執一一舉未捷俟再舉已行又連賜敕謂軍中有言敵易取者慎勿信之福出塞帥千餘人先至臚朐河南遇遊騎擊敗之遂渡河獲其尚書一人飲之酒問本雅失里所在尚書言聞大兵來惶恐北走去此可三十里福大喜曰當疾馳擒之諸將請俟諸軍集偵虛實而後進福不從以尚書為鄉導直薄敵營戰二日每戰敵輒佯敗引去福鋭意乘之李遠諫曰將軍輕信敵閒懸軍轉鬬敵示弱誘我深入進必不利退則懼為所乘獨可結營自固畫揚旗伐鼓出奇兵與挑戰夜多燃炬鳴炮張軍勢使彼莫測俟我軍畢至併力攻之必捷否亦可全師而還始上與將軍言何如而遂忘之乎王聰亦力言不可福皆不聽厲聲曰違命者斬即先馳麾士卒隨行控馬者皆泣下諸將不得已與俱俄而敵大至圍之數重聰戰死福及諸將皆被執遇害年六十七一軍皆沒敗聞帝震怒以諸將無足任者決計親征奪福世爵徙其家海南李遠懷遠人襲父職為蔚州衛指揮僉事燕兵攻蔚州舉城降南軍駐德州運道出徐沛間遠以輕兵六千詐為南軍袍鎧人插柳一枝於背徑濟寧沙河至沛無覺者焚糧舟數萬河水盡熱魚鱉皆浮死南將袁宇三萬騎來追伏兵擊敗之建文四年正月燕軍駐蠡縣遠分哨至藁城遇德州將葛進步騎萬餘乘冰渡滹沱河遠迎擊之進繫馬林間以步兵接戰遠佯却潛分兵出其後解所繫馬再戰進引退失馬遂大敗斬首四千獲馬千匹成祖以歲首大捷賜書嘉勞曰將軍以輕騎八百破敵數萬出奇應變雖古名將不過也復遣哨淮上敗守淮將士斬千餘級纍功為都督僉事封安平侯祿千石豫世伯券永樂元年偕武安侯鄭亨備宣府遠沈毅有膽略言論慷慨既從丘福出塞至臚朐河諫福不聽師敗遠帥五百騎突陳殺數百人馬蹶被執罵不絶口死年四十六追封莒國公諡忠壯子安嗣伯爵洪熙元年為交址參將失律謫為事官已從王通棄交址還下獄奪券謫赤城立功英宗即位起都督僉事征阿台𩽆兒只伯遷都督同知充總兵官鎮松潘正統六年副定西伯蔣貴征麓川貴令安駐軍潞江護餉而自帥大軍進賊破安恥無功聞有餘賊屯高黎貢山徑往擊之為所敗失士卒千餘人都指揮趙斌等皆死逮下獄謫戍獨石卒詔授子清都指揮同知王忠孝感人與李遠同降於蔚州每戰帥精騎為奇兵多斬獲纍遷都督僉事封靖安侯祿千石出塞戰歿年五十一爵除王聰蘄水人以燕山中護衛百戶從起兵取薊州攻遵化徇涿州轉戰茌平滑口破南軍獲馬千五百還守保定從次江上略南軍舟濟師纍遷都指揮使封武城侯祿千五百石偕同安侯火真備禦宣府屢奉詔巡邊從丘福出塞戰死年五十三追封漳國公諡武毅子琰嗣聰及遠嘗諫福故得褒恤火真蒙古人初名火里火真洪武時歸附為燕山中護衛千戶從攻真定先馳突耿炳文陳大軍乘之遂捷從襲大寧戰鄭村壩日暝天甚寒真斂敝鞍爇火成祖前甲士數人趨附火衛士止之成祖曰吾衣重裘猶寒此皆壯士勿止也聞者感泣真嘗將騎兵每戰輒有斬獲呼噪歸營衆服其勇纍遷都督僉事封同安侯祿千五百石出塞戰歿年六十一爵除子孫世襲觀海衛千戶裔孫斌嘉靖中武舉倭寇浙東帥海舟與賊戰賊然火毬擲斌舟斌輒手接之還燒賊舟賊屯補陀山斌直搗其營多殺傷後軍不繼被擒不屈賊支解之官為建祠曰忠勇談淵清流人嗣父職為燕山右護副千戶燕兵起從奪九門破雄縣潘忠楊松自鄚州來援淵帥壯士千餘人伏月漾橋水中人持茭草一束蒙頭通鼻息南軍已過即出據穚忠等戰敗趨橋不得渡遂被擒纍進都指揮同知淵驍勇善戰引兩石弓射無不中然性嗜殺滄州破成祖命給牒散降卒未遣者三千餘人待明給牒淵一夜盡殺之王怒淵曰此曹皆壯士釋之為後患王曰如爾言當盡殺敵敵可盡乎淵慚而退夾河之戰南軍陳動塵起淵遽前搏戰馬蹶被殺成祖悼惜之即位贈都指揮使追封崇安侯諡壯節立祠祀之子忠從入京師有功又以淵故封新寧伯祿千石永樂二十一年將右哨從征沙漠宣德元年從征樂安三年坐征交址失律下獄論死已得釋卒子璟乞嗣吏部言忠罪死不當襲帝曰券有免死文其豫嗣再傳至孫祐成化中協守南京還掌前府提督團營纍加太傅嗣伯六十九年始卒諡莊僖子綸嗣嘉靖十四年鎮湖廣剿九溪蠻有功益祿坐占役軍士奪爵數傳至弘業國亡死於賊王真咸寧人洪武中起卒伍積功至燕山右護衛百戶燕兵起攻九門戰永平真定下廣昌徇雁門從破滄州追南兵至滑口俘獲七千餘人纍遷都指揮使淝河之戰真與白義劉江各帥百騎誘平安軍縛草置囊中為束帛狀安追擊真等佯棄囊走安軍士競取之伏發兩軍鏖戰真帥壯士直前斬馘無算後軍不繼安軍圍之數匝真被重創連格殺數十人顧左右曰我義不死敵手遂自刎成祖即位追封金鄉侯諡忠壯真勇健有智略成祖每追悼之曰奮武如王真何功不成不死功當冠諸將仁宗時追封寧國公加號效忠子通自有傳陳亨壽州人元末揚州萬戶從太祖於濠為鐵甲長擢千戶從大將軍北征守東昌敵數萬奄至亨固守出奇兵誘敗之復從徇未下諸城洪武二年守大同積功至燕山左衛指揮僉事數從出塞遷北平都指揮使及惠帝即位擢都督僉事燕師起亨與劉真卜萬守大寧移兵出松亭關駐沙河謀攻遵化燕兵至退保關當是時李景隆帥五十萬衆將攻北平北平勢弱而大寧行都司所領興州營州二十餘衛皆西北精鋭𩽆顏泰寧福餘三衛元降將所統番騎彍卒尤驍勇卜萬將與景隆軍合成祖懼以計紿亨囚萬遂從劉家口間道疾攻大寧亨及劉真自松亭回救中道聞大寧破乃與指揮徐理陳文等謀降燕夜二鼓襲劉真營真單騎走廣寧亨等帥衆降成祖盡拔諸軍及三衛騎卒挾寧王以歸自是衝鋒陷陳多三衛兵成祖取天下自克大寧始亨理既降纍從破南軍白溝河之戰亨中創幾死已攻濟南與平安戰鏵山大敗創甚輿還北平進都督同知成祖還軍親詣亨第勞問其年十月卒成祖自為文以祭比即位追封涇國公諡襄敏長子恭嗣都督同知少子懋初以舍人從軍立功為指揮僉事已而將亨兵功多纍進右都督永樂元年封寧陽伯祿千石六年三月佩征西將軍印鎮寧夏善撫降卒明年秋故元丞相咱卜及平章司徒國公知院十餘人皆帥衆相繼來降已而平章都連等叛去懋追檎之黑山盡收所部人口畜牧進侯益祿二百石八年從北征督左掖十一年巡寧夏邊尋命將山西陝西二都司及鞏昌平涼諸衛兵駐宣府明年從北征領左哨戰忽失溫與成山侯王通先登都督朱崇等乘之遂大捷明年復鎮寧夏二十年從北征領御前精騎破敵於屈裂河別將五千騎循河東北捕餘寇殲之山澤中師還武安侯鄭亨將輜重先行懋伏隘以待敵來躡伏起縱擊敵死過半還京賜龍衣玉帶冊其女為麗妃明年將陝西寧夏甘肅三鎮兵從征阿魯台為前鋒又明年復領前鋒從北征成祖之崩於榆木川也六軍在外京師守備虛弱仁宗召懋與陽武侯薛祿帥精騎三千馳歸衛京師命掌前府加太保與世侯宣德元年從討樂安還仍鎮寧夏三年奏徙靈州城得黑白二兔以獻宣宗喜親畫馬賜之懋在鎮久威名震漠北顧恃寵自恣乾沒巨萬屢被劾帝曲宥之命所司徵其贓懋自陳用已盡詔貸免英宗即位命偕張輔參議朝政出為平羌將軍鎮甘肅其冬寇掠鎮番懋遣兵援之解去以斬獲聞參贊侍郎柴車劾懋失律致寇又取所遺老弱冒為都指揮馬亮等功受升賞論斬詔免死奪祿久之還祿奉朝請十三年福建賊鄧茂七反都御史張楷討之無功乃詔懋佩征南將軍印充總兵官帥京營江浙兵往討至浙江有欲分兵扼海口者懋曰是使賊致死於我也明年抵建寧茂七已死餘賊聚尤溪沙縣諸將欲屠之懋曰是堅賊心也乃下令招撫賊黨多降分道逐捕悉平之已而沙縣賊復熾久不定會英宗北狩景帝立遂詔班師言官劾之以賊平不問仍加太保掌中府兼領宗人府事英宗復位益祿二百石天順七年卒年八十四贈濬國公諡武靖懋修髯偉貌聲如洪鐘胸次磊落敬禮士大夫靖難功臣至天順時無在者惟懋久享祿位數廢數起卒以功名終長子晟有罪弟潤嗣潤卒弟瑛嗣減祿之半嗣侯十六年而晟子輔已長乃令輔嗣瑛免為勳衛輔後坐事失侯卒無子復封瑛孫繼祖為侯傳爵至明亡徐理西平人洪武時為永清中護衛指揮僉事改營州衛既降為右軍副將每戰先登有功成祖將襲滄州命理及陳旭潛於直沽造浮橋以濟師纍進都指揮僉事封武康伯還守北平理馭下寬得士卒心永樂六年卒再傳至孫勇無子絶封陳文降後為前軍左副將戰小河死於陳房寬陳州人洪武中以濟寧左衛指揮從徐達練兵北平遂為北平都指揮同知移守大寧寬在邊久凡山川塞殊域情僞莫不畢知然不能撫士卒燕兵奄至城中縛寬以降成祖釋之俾領其衆戰白溝河將右軍失利從克廣昌彰德進都督僉事以舊臣略其過封思恩侯祿八百石世指揮使永樂七年卒劉才字子才霍丘人元末為元帥明興歸附歷營州中護衛指揮僉事燕師襲大寧才降從戰有功封廣恩伯祿九百石世指揮同知永樂八年從北征督右掖失律議罪既而宥之二十一年偕隆平侯張信理永平山海邊務明年復從北征至懷來以疾還才悃愊無華不為苟合亦不輕訾毀人甚為仁宗所重宣德五年卒贊曰惠帝承太祖遺威餘烈國勢初張仁聞昭宣衆心悅附成祖奮起方隅冒不韙以爭天下未嘗有萬全之計也乃道衍首贊密謀發機決策張玉朱能之輩戮力行間轉戰無前隕身不顧於是收徑旅摧雄師四年而成帝業意者天之所興羣策羣力應時並濟諸人之得為功臣首也可不謂厚幸哉
