body:
  text: 明史卷五十六志第三十二禮十嘉禮四賓禮巡狩東宮監國皇長孫監國頒詔儀迎接詔赦儀進書儀進表箋儀鄉飲酒禮蕃王朝貢禮遣使之蕃國儀蕃國遣使進表儀品官相見禮庶人相見禮巡狩之制永樂六年北巡禮部行直省凡有重事及四夷來朝與進表者俱達行在所小事達京師啓聞車駕將發奏告天地社稷太廟孝陵祭大江旗纛等神軷祭於承天門緣塗當祭者遣官祭將至北京設壇祭北京山川等神車駕至奏告天地祭境內山川扈從馬步軍五萬侍從五府都督各一吏戶兵刑四部堂上官各一禮工二部堂上官各二都察院堂上官一御史二十四給事中十九通政大理太常光祿鴻臚堂上官共二十翰林院內閣官三侍講修撰典籍等官六六部郎官共五十四餘不具載車駕將發宴羣臣賜扈從官及軍校鈔至北京宴羣臣耆老賜百官及命婦鈔所過郡縣官吏生員耆老朝見分遣廷臣核守令賢否即加黜陟給事御史存問高年賜幣帛酒肉嘉靖十八年幸承天先期親告上帝於玄極寶殿同日告皇祖及睿宗廟遣官分告北郊及成祖以下諸廟社稷日月神祇駕出正陽門后妃輦轎從錦衣衛設欽製武陳駕衛卒八千奉輿輦執儀仗衛指揮前驅武重臣二員留守兵部尚書參贊機務各賜敕行事分命文武重臣出督宣大薊州山海關行九邊亦各賜敕皇城及京城諸門皆命文武大臣各一員坐守設警備扈駕官軍六千駕發百官吉服送於彰義關外扈從官軍略如永樂時數先發在途者免朝參惟禮兵二部鴻臚太常科道糾儀官及光祿寺從行過真定望祭北嶽帝常服從臣大臣及巡撫都御史吉服行禮衛輝遣官祭濟瀆鈞州望祭中嶽滎澤祭河禮如北嶽南陽遣祭武當山途次古帝王聖賢忠臣烈士祠墓遣官致祭撫按三司迎於境上至行宮吉服朝見生員耆老俱三十里外迎所過王府親王常服候駕隨至行宮冕服朝見賜宴宗室不許出至承天詣獻皇帝廟謁告越四日行告天禮於龍飛殿丹陛上奉獻皇帝配更皮辨服詣國社稷及山川壇行禮次日謁顯陵次日從駕官上表賀遂頒詔如儀回京親謝上帝皇祖皇考分遣官告郊廟社稷羣神行禮如初東宮監國古制太子出曰撫軍守曰監國三代而下惟唐太子監國結雙龍符而其儀不著永樂七年駕幸北京定制凡常朝皇太子於午門左視事左右侍衛及各官啓事如常儀若御文華殿承旨召入者方入凡內外軍機及王府急務悉奏請有邊警即調軍剿捕仍馳奏行在皇城及各門守衛皆增置官軍遇聖節正旦冬至皇太子率百官於文華殿前拜表行十二拜禮表由中門出皇太子由左門送至午門還宮百官導至長安右門外文五品武四品以上及近侍官監察御史俱乘馬導至三山門外以表授進奏官至期告天祝壽行八拜禮其正旦冬至千秋節百官於文華殿慶賀如常儀凡享太廟及社稷諸神之祭先期敕皇太子攝祭其祀典神祇太常寺於行在奏聞遣官行禮凡四夷來朝循例賜宴命禮部遣送行在所凡詔書至設龍亭儀仗大樂百官朝服出三山門外奉迎皇太子冕服迎於午門前至文華殿行五拜三叩頭禮升殿展讀使者捧詔置龍亭中皇太子送至午門外禮部官置詔書雲輿中文武二品以上官迎至承天門開讀如儀以鼓樂送使者詣會同館使者見皇太子行四拜禮賜宴於禮部十二年北征復定制常朝於文華殿視事文武啓事俱達北京嘉靖十八年南巡命皇太子監國時太子幼命輔臣一人居守軍國機務悉聽啓行皇太孫監國永樂八年帝自北京北征時皇太子已監國於南乃命皇長孫居北京監國時宣宗未冠及冠始加稱皇太孫云其制每日皇長孫於奉天門左視事侍衛如常儀諸司有事具啓施行若軍機及王府要務一啓皇太子處分一奏聞行在所聖節設香案於奉天殿行禮如常儀天下諸司表文俱詣北京四夷朝貢俱送南京武選及官民有犯大者啓皇太子小者皇長孫行之皇親有犯啓皇太子所犯情重及謀逆者即時拘執命皇親會問不服乃命公侯伯五府六部都察院大理寺會皇親再問啓皇太子候車駕回京奏請處分頒詔儀凡頒命四方有詔書有赦書有敕符丹符有制諭手詔詔赦先於闕廷宣讀然後頒行敕符等則使者齎付所授官祕不敢發開讀迎接儀各不同洪武二十六年定頒詔儀設御座於奉天殿設寶案於殿東陳中和韶樂於殿內設大樂於午門及承天門外設宣讀案於承天門上西南向清晨校尉擎雲蓋於殿內簾前百官朝服班承天門外公侯班午門外東西向皇帝皮辨服升殿如儀禮部官捧詔書詣案前用寶訖置雲蓋中校尉擎雲蓋由殿東門出大樂作自東陛降由奉天門至金水橋南午門外樂作公侯前導迎至承天門上鳴贊唱排班文武官就位樂作四拜樂止宣讀展讀官升案稱有制衆官跪禮部官捧詔書授宣讀官宣訖禮部官捧置雲蓋中贊禮唱俯伏興樂作四拜樂止舞蹈山呼又四拜儀禮司奏禮畢駕興禮部官捧詔書分授使者百官退嘉靖六年續定鴻臚官設詔案錦衣衛設雲蓋盤於奉天殿內東別設雲盤於承天門上設綵輿於午門外鴻臚官設宣讀案於承天門上百官入丹墀侍立帝冕服升座如朝儀翰林院官捧詔書從至御座前東立百官入班四拜出至承天門外贊頒詔翰林院官捧詔書授禮部官捧至雲盤案上校尉擎雲蓋俱從殿左門出至午門外捧詔置綵輿內公侯伯三品以上官前導迎至承天門上宣讀贊拜俱如上儀禮部官捧詔書授錦衣衛官置雲匣中以綵索繫之龍竿頒降禮部官捧置龍亭內鼓樂迎至禮部授使者頒行隆慶六年詔出至皇極門即奏禮畢駕還迎接詔赦儀洪武中定凡遣使開讀詔赦本處官具龍亭儀仗鼓樂出郭迎使者下馬奉詔書置龍亭中南向本處官朝服行五拜禮衆官及鼓樂前導使者上馬隨龍亭後至公廨門衆官先入文武東西序立候龍亭至排班四拜使者捧詔授展讀官展讀官跪受詣開讀案宣讀訖捧詔授朝使仍置龍亭中衆官四拜舞蹈山呼復四拜畢班首詣龍亭前跪問皇躬萬福使者鞠躬答曰聖躬萬福衆官退易服見使者並行兩拜禮復具鼓樂送詔於官亭如有出使官在則先守臣行禮進書儀進書儀惟實録最重皇帝具袞冕百官朝服進表稱賀其餘纂修書成則以表進重録書及玉牒止捧進茲詳載進實録儀餘可推見云建文時太祖實録成其進儀無考永樂元年重修太祖實録成設香案於奉天殿丹陛正中表案於丹陛之東設寶輿於奉天門設鹵簿大樂如儀史官捧實録置輿中帝御殿如大朝儀百官詣丹墀左右立鴻臚官引寶輿至丹陛上史官舉實録置於案遂入班鴻臚官奏進實録序班舉實録案以次由殿中門入班首由左門入帝興序班以實録案置於殿中班首跪於案前贊史官皆跪序班並內侍官舉實録案入謹身殿置於中帝復座贊俯伏班首俯伏興復位贊四拜贊進表序班舉表案由左門入置於殿中贊宣表贊衆官皆跪宣訖俯伏興四拜進實録官退於東班百官入班鴻臚官奏慶賀各官四拜興贊有制史官仍入班贊跪宣制云太祖高皇帝高皇后功德光華纂述詳實朕心歡慶與卿等同之宣訖俯伏興三舞蹈又四拜禮畢萬曆五年世祖實録成續定進儀設寶輿香亭表亭於史館前帝袞冕御中極殿百官朝服侍班監修總裁纂修等官朝服至館前監修官捧表置表亭中纂修官捧實録置寶輿中鴻臚官導迎用鼓樂傘蓋由會極門下階至橋南由中道行監修總裁等官隨表亭後由二橋行至皇極門實録輿由中門入表亭由左門入至丹墀案前監修官捧表置於案纂修官捧實録置於案俱侍立於石墀東內殿百官行禮訖帝出御皇極殿監修總裁等官入進實録進表俱如永樂儀次日司禮監官自內殿送實録下殿仍置寶輿中用傘蓋與監修總裁官同送皇史宬尊藏進表箋儀明初定制凡王府遇聖節及冬至正旦先期陳設畢王冕服就位四拜詣香案前跪進表訖復位四拜三舞蹈山呼又四拜百官朝服隨班行禮進中宮箋儀如之惟不舞蹈山呼進皇太子箋王皮辨服行八拜禮百官朝服隨班行禮凡進賀表箋皇子封王者於天子前自稱曰第幾子某王某稱天子曰父皇陛下皇后曰母后殿下若孫則自稱曰第幾孫某王某稱天子曰祖父皇帝陛下皇后曰祖母皇后殿下若弟則自稱曰第幾弟某封某稱天子曰大兄皇帝陛下皇后曰尊嫂皇后殿下姪則自稱曰第幾姪某封某稱天子曰伯父皇帝陛下叔父皇帝陛下皇后曰伯母皇后殿下叔母皇后殿下若尊屬則自稱曰某封臣某稱天子曰皇帝陛下皇后曰皇后殿下若從孫以下則稱從孫再從孫三從孫某封某皆稱皇帝皇后曰伯祖叔祖皇帝陛下伯祖母叔祖母皇后殿下至世宗時始令各王府表箋俱用聖號不得用家人禮凡在外百官進賀表箋前一日結綵於公廨及街衢文武官各齊沐宿本署清晨設龍亭於庭中設儀仗鼓樂於露臺設表箋案於龍亭前香案於表箋案前設進表箋官位於龍亭東鼓初嚴各官具服次嚴班首具服詣香案前滌印用印訖以表箋置於案退立幕次三嚴各官入班四拜班首詣香案前贊跪衆官皆跪執事者以表箋跪授班首班首跪授進表官進表官跪受置龍亭中班首復位各官皆四拜三舞蹈山呼四拜金鼓儀仗鼓樂百官前導進表官在龍亭後東至郊外置龍亭南向儀仗鼓樂陳列如前文武官侍立班首取表箋授進表官進表官就於馬上受表即行百官退鄉飲酒禮記曰鄉飲酒之禮廢則爭鬬之獄繁矣故儀禮所記惟鄉飲之禮達於庶民自周迄明損益代殊而其禮不廢洪武五年詔禮部奏定鄉飲禮儀命有司與學官率士大夫之老者行於學校民間里社亦行之十六年詔班鄉飲酒禮圖式於天下每歲正月十五日十月初一日於儒學行之其儀以府州縣長吏為主以鄉之致仕官有德行者一人為賓擇年高有德者為僎賓其次為介又其次為三賓又其次為衆賓教職為司正贊禮贊引讀律皆使能者前期設賓席於堂北兩楹之間少西南面主席於阼階上西面介席於西階上東面僎席於賓東南面三賓席於賓西南面皆專席不屬衆賓六十以上者席於西序東面北上賓多則設席於西階北面東上僚佐席於東序西面北上設衆賓五十以下者位於堂下西階之西當序東面北上賓多則又設位於西階之南北面東上司正及讀律者位於堂下阼階之南北面西上設主之贊者位於阼階之東西面北上設主及僚佐以下次於東廊賓介及衆賓次於庠門之外僎次亦在門外設酒尊於堂上東南隅加勺冪用葛巾爵洗於阼階下東南篚一於洗西實以爵觶盥洗在爵洗東設卓案於堂上下席位前陳豆於其上六十者三豆七十者四豆八十者五豆九十者六豆堂下者二豆主人豆如賓之數皆實以葅醢至期賓將及門執事者進報曰賓至主人率僚屬出迎於門外主西面賓以下皆東面三揖三讓而後升堂相向再拜升坐執事者報僎至迎坐如前儀贊禮唱司正揚觶司正詣盥洗位次詣爵洗位取觶於篚洗觶升自西階詣尊所酌酒進兩楹之間北面立在坐者皆起司正揖僎賓以下皆報揖司正乃舉觶言曰恭惟朝廷率由舊章敦崇禮教舉行鄉飲非為飲食凡我長幼各相勸勉為臣竭忠為子盡孝長幼有序兄友弟恭內睦宗族外和鄉里無或廢墜以忝所生言畢贊禮唱司正飲酒飲畢揖報如初司正復位僎賓以下皆坐贊禮唱讀律令執事舉律令案於堂之中讀律令者詣案前北向立讀皆如揚觶儀有過之人俱赴正席立聽讀畢復位贊禮唱供饌執事者舉饌案至賓前次僎次介次主三賓以下各以次舉訖贊禮唱獻賓主降詣盥洗及爵洗位洗爵酌酒至賓前置於席稍退兩拜賓答拜又詣僎前亦如之主退復位贊禮唱賓酬酒賓起僎從之詣盥洗爵洗位如儀至主前置爵賓僎主皆再拜各就坐執事者於介三賓衆賓以下以次斟酒訖贊禮唱飲酒或三行或五行供湯三品畢贊禮唱徹饌在坐者皆興僎主僚屬居東賓介三賓衆賓居西皆再拜贊禮唱送賓以次下堂分東西行仍三揖出庠門而退里中鄉飲略同二十二年命凡有過犯之人列於外坐同類者成席不許雜於善良之中著為令三曰賓禮以待蕃國之君長與其使者宋政和間詳定五禮取周官司儀掌九儀賓客擯相詔王南鄉以朝諸侯之義故以朝會儀列為賓禮按古之諸侯各君其國子其民待以客禮可也不可與後世之臣下等茲改從其舊而百官庶人相見之禮附焉蕃王朝貢禮蕃王入朝其迎勞宴饗之禮惟唐制為詳宋時蕃國皆遣使入貢所接見惟使臣而已明洪武二年定制凡蕃王至龍江驛遣侍儀通贊二人接伴館人陳蕃王座於廳西北東向應天府知府出迎設座於廳東南西向以賓主接見宴畢知府還蕃王送於門外明日接伴官送蕃王入會同館禮部尚書即館宴勞尚書至蕃王服其國服相見宴饗迎送俱如龍江驛酒行用樂明日中書省奏聞命官一員詣館如前宴勞侍儀司以蕃王及從官具服於天界寺習儀三日擇日朝見設蕃王及從官次於午門外蕃王拜位於丹墀中道稍西從官在其後設方物案於丹墀中道東西知班二位於蕃王拜位北引蕃王舍人二位於蕃王北引蕃王從官舍人二位於蕃王從官北俱東西相向鼓三嚴百官入侍執事舉方物案蕃王隨案由西門入至殿前丹墀西俟立皇帝服通天冠絳紗袍御殿蕃王及從官各就拜位以方物案置拜位前贊四拜訖引班導蕃王升殿宣方物官以方物狀由西陛升入殿西門內贊引至御前贊拜蕃王再拜跪稱賀致詞宣方物官宣狀承制官宣制訖蕃王俯伏興再拜出殿西門復位贊拜蕃王及其從官皆四拜禮畢皇帝興蕃王以下出樂作樂止皆如常見皇太子於東宮正殿設拜位於殿外皇太子皮辨服升座蕃王再拜皇太子立受蕃王跪稱賀致詞訖復位再拜皇太子答拜蕃王出其從官行四拜禮見親王東西相向再拜王答拜俱就座王座稍北禮畢揖而出見丞相三公大都督御史大夫皆鈞禮蕃王陛辭如朝見儀不傳制中書省率禮部官送至龍江驛宴如初二十七年四月以舊儀煩命更定凡蕃國來朝先遣禮部官勞於會同館明日各具其國服如嘗賜朝服者則服朝服於奉天殿朝見行八拜禮畢即詣文華殿朝皇太子行四拜禮見親王亦如之王立受答後二拜從官隨蕃王後行禮凡遇宴會蕃王居侯伯之下凡蕃國遣使朝貢至驛遣應天府同知禮待明日至會同館中書省奏聞命禮部侍郎於館中禮待如儀宴畢習儀三日擇日朝見陳設儀仗及進表俱如儀承制官詣使者前稱有制使者跪宣制曰皇帝問使者來時爾國王安否使者答畢俯伏興再拜承制官稱有後制使者跪宣制曰皇帝又問爾使者遠來勤勞使者俯伏興再拜承制官復命訖使者復四拜禮畢皇帝興樂作止如儀見東宮四拜進方物訖復四拜謁丞相大都督御史大夫再拜獻書復再拜見左司郎中等皆鈞禮凡錫宴陳御座於謹身殿設皇太子座於御座東諸王座於皇太子下西向設蕃王座於殿西第一行東向設文武官座於第二第三行東西向酒九行上食五次大樂細樂間作呈舞隊蕃國從官坐於西廡下酒數食品同不作樂東宮宴蕃王殿上正中設皇太子座設諸王座於旁東西向蕃王座於西偏諸王之下東向三師賓客諭德位於殿上第二行東西向蕃王從官及東宮官位於西廡東向北上和聲郎陳樂光祿寺設酒饌俱如謹身殿儀或宰相請旨宴勞則設席於中書省後堂賓西主東設蕃王從官及左右司官坐於左司教坊司陳樂於堂及左司南楹蕃王至省門外省官迎入從官各從其後升階就坐酒七行食五品作樂雜陳諸戲宴畢省官送至門外都督府御史臺宴如之其宴蕃使禮部奉旨錫宴於會同館館人設坐次及御酒案教坊司設樂舞禮部官陳龍亭於午門外光祿寺官請旨取御酒置龍亭儀仗鼓樂前導至館蕃使出迎於門外執事者捧酒由中道入置酒於案奉旨官立於案東稱有制使者望闕跪聽宣畢贊再拜奉旨官酌酒授使者北面跪飲畢又再拜各就坐酒七行湯五品作樂陳戲如儀宴畢奉旨官出使者送至門外皇太子錫宴則遣宮官禮待之省府臺亦置酒宴會酒五行食五品作樂不陳戲遣使之蕃國儀凡遣使賜璽綬及問遺慶弔自漢始唐使外國謂之入蕃使宋謂之國信使明祖既定天下分遣使者奉詔書往諭諸國或降香幣以祀其國之山川撫柔之意甚厚而不傷國體視前代為得凡遣使翰林院官草詔至期陳設如常儀百官入侍皇帝御奉天殿禮部官捧詔書尚寶司奏用寶以黃銷金袱裹置盤中置於案使者就拜位四拜樂作止如儀承制官至丹陛稱有制使者跪宣制曰皇帝敕使爾某詔諭某國爾宜恭承朕命宣訖使者俯伏興四拜禮部官奉詔降自中陛以授使者使者捧出午門置龍亭內駕興百官出使者入蕃國境先遣人報於王王遣使遠接前期於國門外公館設幄結綵陳龍亭香案備金鼓儀仗大樂又於城內街巷結綵設闕亭於王殿上設香案於其前設捧詔官位殿陛之東北宣詔展詔官以次南俱西向詔使至迎入館王率國中官及耆老出迎於國門外行五拜禮儀仗鼓樂導龍亭入使者隨之至殿上置龍亭於正中使者立香案東蕃王位殿庭中北向衆官隨之使者南向立稱有制蕃王以下皆四拜蕃王升自西階詣香案前跪三上香俯伏興衆官同蕃王復位使者詣龍亭前取詔書授捧詔官捧詔官捧詣開讀案授宣詔官宣詔官受詔展詔官對展蕃王以下皆跪聽宣訖仍以詔置龍亭蕃王以下皆俯伏興四拜三舞蹈復四拜凡拜皆作樂禮畢使者以詔書付所司頒行蕃王與使者分賓主行禮其賜蕃王印綬及禮物宣制曰皇帝敕使爾某授某國王印綬爾其恭承朕命至蕃國宣制曰皇帝敕使某持印賜爾國王某並賜禮物餘如儀蕃國遣使進表儀洪武二年定所司於王宮及國城街巷結綵設闕庭於殿上正中前設表箋案又前設香案使者位於香案東捧表箋二人於香案西設龍亭於殿庭南正中儀仗鼓樂具備清晨司印者陳印案於殿中滌印訖以表箋及印俱置於案王冕服衆官朝服詣案前用印畢用黃袱裹表紅袱裹箋各置於匣中仍各以黃袱裹之捧表箋官捧置於案引禮引王至殿庭正中衆官位其後贊拜樂作再拜樂止王詣香案前跪衆官皆跪三上香訖捧表官取表東向跪進王王授表以進於使者使者西向跪受興置於案贊興王復位贊拜樂作王與衆官皆四拜樂止禮畢捧表箋官捧表前行置於龍亭中金鼓儀仗鼓樂前導王送至宮門外還衆官朝服送至國門外使者乃行品官相見禮凡官員揖拜洪武二十年定公侯駙馬相見各行兩拜禮一品官見公侯駙馬一品官居右行兩拜禮公侯駙馬居左答禮二品見一品亦如之三品以下倣此若三品見一品四品見二品行兩拜禮一品二品答受從宜餘品倣此如有親戚尊卑之分從行私禮三十年令凡百官以品秩高下分尊卑品近者行禮則東西對立卑者西高者東其品越二三等者卑者下尊者上其越四等者則卑者拜下尊者坐受有事則跪白凡文武官公聚各依品級序坐若資品同者照衙門次第若王府官與朝官坐立各照品級俱在朝官之次成化十四年定在外總兵巡撫官位次左右都督與左右都御史並都督同知與副都御史並都督僉事與僉都御史並俱文東武西伯以上則坐於左十五年重定都御史係總督及提督軍務者不分左右副僉俱坐於左總兵官雖伯亦坐於右凡官員相遇回避洪武三十年定駙馬遇公侯分路而行一品二品遇公侯駙馬引馬側立須其過二品見一品趨右讓道而行三品遇公侯駙馬引馬回避遇一品引馬側立遇二品趨右讓道而行四品遇一品以上官引馬回避遇二品引馬側立遇三品趨右讓道而行五品至九品皆視此遞差其後不盡遵行文職雖一命以上不避公侯勳戚大臣而其相回避者亦論官不論品秩矣凡屬官見上司洪武二十年定屬官序立於堂階之上總行一揖上司拱手首領官答揖其公幹節序見上司官皆行兩拜禮長官拱手首領官答禮凡官員公座洪武二十年定大小衙門官員每日公座行肅揖禮佐二官揖長官長官答禮首領官揖長官佐二官長官佐二官拱手庶人相見禮洪武五年令凡鄉黨序齒民間士農工商人等平居相見及歲時宴會謁拜之禮幼者先施坐次之列長者居上十二年令內外官致仕居鄉惟於宗族及外祖妻家序尊卑如家人禮若筵宴則設別席不許坐於無官者之下與同致仕官會則序爵爵同序齒其與異姓無官者相見不須答禮庶民則以官禮謁見凌侮者論如律二十六年定凡民間子孫弟姪甥壻見尊長生徒見其師奴婢見家長久別行四拜禮近別行揖禮其餘親戚長幼悉依等第久別行兩拜禮近別行揖禮平交同
