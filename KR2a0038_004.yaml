body:
  text: 明史卷四本紀第四恭閔帝恭閔惠皇帝諱允炆太祖孫懿文太子第二子也母妃呂氏帝生穎慧好學性至孝年十四侍懿文太子疾晝夜不暫離更二年太子薨居喪毀瘠太祖撫之曰而誠純孝顧不念我乎洪武二十五年九月立為皇太孫二十九年重定諸王見東宮儀制朝見後於內殿行家人禮以諸王皆尊屬也初太祖命太子省決章奏太子性仁厚於刑獄多所減省至是以命太孫太孫亦復佐以寬大嘗請於太祖遍考禮經參之歷朝刑法改定洪武律畸重者七十三條天下莫不頌德焉三十一年閏五月太祖崩辛卯即皇帝位大赦天下以明年為建文元年是日葬高皇帝於孝陵詔行三年喪羣臣請以日易月帝曰朕非效古人亮陰不言也朝則麻冕裳退則齊衰杖絰食則饘粥郊社宗廟如常禮遂命定儀以進丙申詔文臣五品以上及州縣官各舉所知非其人者坐之六月省並州縣革冗員兵部侍郎齊泰為本部尚書翰林院修撰黃子澄為太常卿同參軍國事秋七月召漢中府教授方孝孺為翰林院侍講詔行寬政赦有罪蠲逋賦八月周王橚有罪廢為庶人徙雲南詔興州營州開平諸衛軍全家在伍者免一人天下衛所軍單丁者放為民九月雲南總兵官西平侯沐春卒於軍左副將何福代領其衆冬十一月工部侍郎張昺為北平布政使謝貴張信掌北平都指揮使司察燕陰事詔求直言舉山林才德之士十二月癸卯何福破斬刀幹孟麓川平是月賜天下明年田租之半釋黥軍及囚徒還鄉里是年暹羅占城入貢建文元年春正月癸酉受朝不舉樂庚辰大祀天地於南郊奉太祖配修太祖實録二月追尊皇考曰孝康皇帝廟號興宗妣常氏曰孝康皇后尊母妃呂氏曰皇太后册妃馬氏為皇后封弟允熥為吳王允熞衡王允熙徐王立皇長子文奎為皇太子詔告天下舉遺賢賜民高年米肉絮帛魚衆寡孤獨廢疾者官為牧養重農桑興學校考察官吏振罹災貧民旌節孝瘞暴骨蠲荒田租衛所軍戶絶者除勿勾詔諸王毋得節制文武吏士更定內外大小官制三月釋奠於先師孔子罷天下諸司不急務都督宋忠徐凱耿瓛帥兵屯開平臨清山海關調北平永清二衛軍於彰德順德侍郎暴昭夏原吉等二十四人充採訪使分巡天下甲午京師地震求直言夏四月湘王柏自焚死齊王榑代王桂有罪廢為庶人遣燕王世子高熾及其弟高煦高燧還北平六月岷王楩有罪廢為庶人徙漳州己酉燕山護衛百戶倪諒上變燕旗校於諒等伏誅詔讓燕王棣逮王府官僚北平都指揮張信叛附於燕秋七月癸酉燕王棣舉兵反殺布政使張昺都司謝貴長史葛誠指揮盧振教授余逢辰死之參政郭資副使墨麟僉事呂震等降於燕指揮馬宣走薊州俞瑱走居庸宋忠趨北平聞變退保懷來通州遵化密雲相繼降燕丙子燕兵陷薊州馬宣戰死己卯燕兵陷居庸關甲申陷懷來宋忠俞瑱被執死都指揮彭聚孫泰力戰死永平指揮郭亮等叛降燕壬辰谷王橞自宣府奔京師長興侯耿炳文為征虜大將軍駙馬都尉李堅都督寧忠為左右副將軍帥師討燕祭告天地宗廟社稷削燕屬籍詔曰邦家不造骨肉周親屢謀僭逆去年周庶人橚僭為不軌辭連燕齊湘三王朕以親親故止正橚罪今年齊王榑謀逆又與棣柏同謀柏伏罪自焚死榑已廢為庶人朕以棣於親最近未忍窮治其事今乃稱兵搆亂圖危宗社獲罪天地祖宗義不容赦是用簡發大兵往致厥罰咨爾中外臣民軍士各懷忠守義與國同心掃茲逆氛永安至治尋命安陸侯吳傑江陰侯吳高都督耿瓛都指揮盛庸潘忠楊松顧成徐凱李友陳暉平安分道並進置平燕布政使司於真定尚書暴昭掌司事八月己酉耿炳文兵次真定徐凱屯河間潘忠楊松屯鄚州壬子燕兵陷雄縣潘忠楊松戰於月漾橋被執鄚州陷壬戌耿炳文及燕兵戰於滹沱河北敗績李堅寧忠顧成被執炳文退保真定燕兵攻之不克引去召遼王植寧王權歸京師權不至詔削護衛丁卯曹國公李景隆為征虜大將軍代耿炳文九月戊辰吳高耿瓛楊文帥遼東兵圍永平戊寅景隆兵次河間燕兵援永平吳高退保山海關冬十月燕兵自劉家口間道襲陷大寧守將朱鑑死之總兵官劉真都督陳亨援大寧亨叛降燕燕以寧王權及𩽆顏三衛卒歸北平辛亥李景隆圍北平燕兵還救十一月辛未李景隆及燕兵戰於鄭村壩敗績奔德州諸軍盡潰燕王棣再上書於朝帝為罷齊泰黃子澄官仍留京師二年春正月丙寅朔詔天下來朝官勿賀丁卯釋奠於先師孔子二月燕兵陷蔚州進攻大同李景隆自德州赴援燕兵還北平保定知府雒僉叛降燕甲子復以都察院為御史府均江浙田賦詔曰國家有惟正之供江浙賦獨重而蘇松官田悉準私稅用懲一時豈可為定則今悉與減免畝毋踰一斗蘇松人仍得官戶部三月丙寅朔日有食之賜胡廣等進士及第出身有差夏四月己未李景隆及燕兵戰於白溝河敗之明日復戰敗績都督瞿能越巂侯俞淵指揮滕聚等皆戰死景隆奔德州五月辛未奔濟南燕兵陷德州遂攻濟南庚辰景隆敗績於城下南走參政鐵鉉都督盛庸悉力禦之六月己酉遣尚寶丞李得成諭燕罷兵秋八月癸巳承天門災詔求直言戊申盛庸鐵鉉擊敗燕兵濟南圍解復德州九月詔録洪武中功臣罪廢者後辛未封盛庸歷城侯擢鐵鉉山東布政使參贊軍務尋進兵部尚書以庸為平燕將軍都督陳暉平安副之庸屯德州平安及吳傑屯定州徐凱屯滄州冬十月召李景隆還赦不誅庚申燕兵襲滄州徐凱被執十二月甲午燕兵犯濟寧薄東昌乙卯盛庸擊敗之斬其將張玉丙辰復戰又敗之燕兵走館陶庸軍勢大振檄諸屯軍合擊燕絶其歸路三年春正月辛酉朔凝命神寶成告天地宗廟御奉天殿受朝賀乙丑吳傑平安邀擊燕兵於深州不利辛未大祀天地於南郊丁丑享太廟告東昌捷復齊泰黃子澄官三月辛巳盛庸敗燕兵於夾河斬其將談淵再戰不利都指揮莊得楚智等力戰死壬午復戰敗績庸走德州丁亥都督何福援德州癸巳貶齊泰黃子澄諭燕罷兵閏月己亥吳傑平安及燕戰於藁城敗績還保真定燕兵掠真定順德廣平大名棣上書請召還諸將息兵遣大理少卿薛嵓報之是月禮制成頒行天下夏五月甲寅盛庸以兵扼燕餉道不克棣復遣使上書下其使於獄六月壬申燕將李遠寇沛縣焚糧艘壬午都督袁宇邀擊之敗績秋七月己丑燕兵掠彰德丁酉平安自真定攻北平壬寅大同守將房昭帥兵由紫荊關趨保定駐易州西水寨九月甲辰平安及燕將劉江戰於北平敗績還保真定冬十月丁巳真定諸將遣兵援房昭及燕王戰於齊眉山敗績十一月壬辰遼東總兵官楊文攻永平及劉江戰於昌黎敗績己亥平安敗燕將李彬於楊村十二月癸亥燕兵焚真定軍儲詔中官奉使侵暴吏民者所在有司繫治是月駙馬都尉梅殷鎮淮安太祖實録成四年春正月甲申召故周王橚於蒙化居之京師燕兵連陷東阿東平汶上兗州濟陽東平吏目鄭華濟陽教諭王省皆死之甲申魏國公徐輝祖帥師援山東燕兵陷沛縣知縣顏伯瑋主簿唐子清典史黃謙死之癸丑薄徐州二月甲寅都督何福及陳暉平安軍濟寧盛庸軍淮上己卯更定品官勳階三月燕兵攻宿州平安追及於淝河斬其將王真遇伏敗績宿州陷夏四月丁卯何福平安敗燕兵於小河斬其將陳文甲戌徐輝祖等敗燕兵於齊眉山斬其將李斌燕兵懼謀北歸會帝聞訛言謂燕兵已北召輝祖還何福軍亦孤庚辰諸將及燕兵大戰於靈璧敗績陳暉平安禮部侍郎陳性善大理寺卿彭與明皆被執五月癸未楊文帥遼東兵赴濟南潰於直沽己丑盛庸軍潰於淮上燕兵渡淮趨揚州指揮王禮等叛降燕御史王彬指揮崇剛死之辛丑燕兵至六合諸軍迎戰敗績壬寅詔天下勤王遣御史大夫練子寧侍郎黃觀修撰王叔英分道徵兵召齊泰黃子澄還蘇州知府姚善寧波知府王璡徽州知府陳彥回樂平知縣張彥方各起兵入衛甲辰遣慶成郡主如燕師議割地罷兵六月癸丑盛庸帥舟師敗燕兵於浦子口復戰不利都督僉事陳瑄以舟師叛附於燕乙卯燕兵渡江盛庸戰於高資港敗績戊午鎮江守將童俊叛降燕庚申燕兵至龍潭辛酉命諸王分守都城遣李景隆及兵部尚書茹瑺都督王佐如燕軍申前約壬戌復遣谷王橞安王楹往皆不聽甲子遣使齎蠟書四出促勤王兵乙丑燕兵犯金川門左都督徐增壽謀內應伏誅谷王橞及李景隆叛納燕兵都城陷宮中火起帝不知所終燕王遣中使出帝后尸於火中越八日壬申葬之或云帝由地道出亡正統五年有僧自雲南至廣西詭稱建文皇帝思恩知府岑瑛聞於朝按問乃鈞州人楊行祥年已九十餘下獄閲四月死同謀僧十二人皆戍遼東自後滇黔巴蜀間相傳有帝為僧時往來迹正德萬曆崇禎間諸臣請續封帝後及加廟諡皆下部議不果行大清乾隆元年詔廷臣集議追諡曰恭閔惠皇帝贊曰惠帝天資仁厚踐阼之初親賢好學召用方孝孺等典章制度鋭意復古嘗因病晏朝尹昌隆進諫即深自引咎宣其疏於中外又除軍衛單丁減蘇松重賦皆惠民之大者乃革命而後紀年復稱洪武嗣是子孫臣庶以紀載為嫌草野傳疑不無訛謬更越聖朝得經論定尊名一惠君德用彰懿哉
