body:
  text: 明史卷六十四志第四十儀衛周官王之儀衛分掌於天官春官夏官之屬而蹕事則專屬於秋官漢朝會則衛官陳車騎張旗幟唐沿隋制置衛尉卿掌儀仗帳幕之事宋衛尉領左右金吾衛司左右金吾仗司六軍儀仗司主清道徼巡排列奉引儀仗元置拱衛司領控鶴戶以供其事歷代制度雖有沿革異同總以謹出入之防嚴尊卑之分慎重則尊嚴尊嚴則整肅是故文謂之儀武謂之衛天子出車駕次第謂之鹵簿而唐制四品以上皆給鹵簿則君臣並得通稱也明初詔禮官鹵簿彌文務從省節以示尚質去奢之意凡正至聖節朝會及册拜接見蕃臣儀鸞司陳設儀仗而中宮東宮親王皆有儀仗之制後或隨時增飾要以洪武創制為準則焉茲撮集禮所載大凡以備考核其郡王及皇妃東宮妃以下儀仗載在會典者並著於篇云皇帝儀仗吳元年十二月辛酉中書左相國李善長率禮官以即位禮儀進是日清晨拱衛司陳設鹵簿列甲士於午門外之東西列旗仗於奉天門外之東西龍旗十二分左右用甲士十二人北斗旗一纛一居前豹尾一居後俱用甲士三人虎豹各二馴象六分左右布旗六十四門旗日旗月旗青龍白虎風雲雷雨江河淮濟旗天馬天祿白澤朱雀玄武等旗木火土金水五星旗五嶽旗熊旗鸞旗及二十八宿旗各六行每旗用甲士五人一人執旗四人執弓弩設五輅於奉天門外玉輅居中左金輅次革輅右象輅次木輅俱並列丹墀左右布黃麾仗黃蓋華蓋曲蓋紫方傘紅方傘雉扇朱團扇羽葆幢豹尾龍頭竿信幡傳教幡告止幡絳引幡戟氅戈氅儀鍠氅等各三行丹陛左右陳幢節響節金節燭籠青龍白虎幢班劍吾杖立瓜臥瓜儀刀鐙杖戟骨𩽆朱雀玄武幢等各三行殿門左右設圓蓋一金交椅金腳踏水盆水罐團黃扇紅扇皆校尉擎執洪武元年十月定元旦朝賀儀金吾衛於奉天門外分設旗幟宿衛於午門外分設兵仗衛尉寺於奉天殿門及丹陛丹墀設黃麾仗內使監擎執於殿上凡遇冬至聖節册拜親王及蕃使來朝儀俱同其宣詔赦降香則惟設奉天殿門及丹陛儀仗殿上擎執云其陳布次第午門外刀盾殳叉各置於東西甲士用赤奉天門外中道金吾宿衛二衛設龍旗十二分左右用青甲士十二人北斗旗一纛一居前豹尾一居後俱用黑甲士三人虎豹各二馴象六分左右左右布旗六十四左前第一行門旗二每旗用紅甲士五人內一人執旗旗下四人執弓箭第二行月旗一用白甲士五人內一人執旗旗下四人執弩青龍旗一用青甲士五人內一人執旗旗下四人執弩第三行風雲雷雨旗各一每旗用黑甲士五人內一人執旗旗下四人執弓箭天馬白澤朱雀旗各一每旗用紅甲士五人內一人執旗旗下四人執弓箭第四行木火土金水五星旗各一隨其方色每旗用甲士五人內一人執旗旗下四人執弩其甲木青火紅土黃金白水黑熊旗鸞旗各一每旗用紅甲士五人內一人執旗旗下四人執弩第五行角亢氐房心尾箕旗各一每旗用青甲士五人內一人執旗旗下四人執弓箭第六行斗牛女虛危室壁旗各一每旗用青甲士五人內一人執旗旗下四人執弩右前第一行門旗二每旗用紅甲士五人內一人執旗旗下四人執弓箭第二行日旗一用紅甲士五人內一人執旗旗下四人執弩白虎旗一用白甲士五人內一人執旗旗下四人執弩第三行江河淮濟旗各一隨其方色每旗用甲士五人內一人執旗旗下四人執弓箭其甲江紅河白淮青濟黑天祿白澤玄武旗各一每旗用甲士五人內一人執旗旗下四人執弓箭天祿白澤紅甲玄武黑甲第四行東南中西北五嶽旗各一隨其方色每旗用甲士五人內一人執旗旗下四人執弩其甲東嶽青南嶽紅中嶽黃西嶽白北嶽黑熊旗麟旗各一每旗用紅甲士五人內一人執旗旗下四人執弩第五行奎婁胃昴畢觜參旗各一每旗用青甲士五人內一人執旗旗下四人執弓箭第六行井鬼柳星張翼軫旗各一每旗用青甲士五人內一人執旗旗下四人執弩奉天門外拱衛司設五輅玉輅居中左金輅次革輅右象輅次木輅俱並列典牧所設乘馬於文武樓之南各三東西相向丹墀左右布黃麾仗凡九十分左右各三行左前第一行十五黃蓋一紅大傘二華蓋一曲蓋一紫方傘一紅方傘一雉扇四朱團扇四第二行十五羽葆幢二豹尾二龍頭竿二信幡二傳教幡二告止幡二絳引幡二黃麾一第三行十五戟氅五戈氅五儀鍠氅五右前第一行十五黃蓋一紅大傘二華蓋一曲蓋一紫方傘一紅方傘一雉扇四朱團扇四第二行十五羽葆幢二豹尾二龍頭竿二信幡二傳教幡二告止幡二絳引幡二黃麾一第三行十五戟氅五戈氅五儀鍠氅五皆校尉擎執丹陛左右拱衛司陳幢節等仗九十分左右為四行左前第一行響節十二金節三燭籠三第二行青龍幢一班劍三吾杖三立瓜三臥瓜三儀刀三鐙杖三戟三骨𩽆三朱雀幢一右前第一行響節十二金節三燭籠三第二行白虎幢一班劍三吾杖三立瓜三臥瓜三儀刀三鐙杖三戟三骨𩽆三玄武幢一皆校尉擎執奉天殿門左右拱衛司陳設左行圓蓋一金腳踏一金水盆一團黃扇三紅扇三右行圓蓋一金交椅一金水罐一團黃扇三紅扇三皆校尉擎執殿上左右內使監陳設左拂子二金唾壺一金香合一右拂子二金唾盂一金香爐一皆內使擎執和聲郎陳樂於丹墀文武官拜位之南其器數詳見樂志內三年命製郊丘祭祀拜褥郊丘用席表蒲𩹉為褥宗廟社稷先農山川用紅文綺表紅木棉布𩹉為褥十二年命禮部增設丹墀儀仗黃傘華蓋曲蓋紫方傘紅方傘各二雉扇紅團扇各四羽葆幢龍頭竿絳引傳教告止信幡各六戟氅戈氅儀鍠氅各十永樂元年禮部言鹵簿中宜有九龍車一乘請增置帝曰禮貴得中過為奢不及為儉先朝審之精矣當遵用舊章豈可輒有增益以啓後世之奢哉九龍車既先朝所無其仍舊便宣德元年更造鹵簿儀仗有具服幄殿一座金交椅一金腳踏一金盆一金罐一金馬杌一鞍籠一金香爐一金香合一金唾盂一金唾壺一御杖二擺錫明甲一百副盔一百弓一百箭三千刀一百其執事校尉每人鵝帽只孫衣銅帶鞾履鞋一副常朝各色羅掌扇四十各色羅絹傘十萬壽傘一黃雙龍扇二筵宴銷金羅傘四銷金雨傘四金龍響節二十四皇后儀仗洪武元年定丹陛儀仗三十六人黃麾二戟五色繡幡六戈五色繡幡六鍠五色錦幡六小雉扇四紅雜花團扇四錦曲蓋二紫方傘二紅大傘四丹墀儀仗五十八人班劍四金吾杖四立瓜四臥瓜四儀刀四鐙杖四骨𩽆四斧四響節十二錦花蓋二金交椅一金腳踏一金水盆一金水罐一方扇八宮中常用儀衛二十人內使八人色繡幡二金斧二金骨𩽆二金交椅一金腳踏一宮女十二人金水盆一金水罐一金香爐一金香合一金唾壺一金唾盂一拂子二方扇四永樂元年增製紅杖一對太皇太后皇太后儀仗與皇后同皇太子儀仗洪武元年定門外中道設龍旗六其執龍旗者並戎服黃旗一居中左前青旗一右前赤旗一左後黑旗一右後白旗一每旗執弓弩軍士六人服各隨旗色殿下設三十六人絳引幡二戟氅六戈氅六儀鍠氅六羽葆幢六青方傘二青小方扇四青雜花團扇四皆校尉擎執殿前設四十八人班劍四吾杖四立瓜四臥瓜四儀刀四鐙杖四骨𩽆四斧四響節十二金節四皆校尉擎執殿門設十二人金交椅一金腳踏一金水罐一金水盆一青羅團扇六紅圓蓋二皆校尉擎執殿上設六人金香爐一香合一唾盂一唾壺一拂子二皆內使擎執永樂二年禮部言東宮儀仗有司失紀載視親王差少宜增製金香爐金香合各一殳二叉二傳教告止信幡各二節二幢二夾矟二矟刀盾各二十戟八紅紙油燈籠六紅羅銷金邊圓傘紅羅繡圓傘各一紅羅曲蓋繡傘紅羅素圓傘紅羅素方傘青羅素方傘各二紅羅繡孔雀方扇紅羅繡四季花團扇各四拂子二唾盂唾壺各一鞍籠一誕馬八紅令旗二清道旗四幰弩一白澤旗二弓箭二十副從之親王儀仗洪武六年定宮門外設方色旗二青色白澤旗二執人服隨旗色並戎服殿下絳引幡二戟氅二戈氅二儀鍠氅二皆校尉執殿前班劍二吾杖二立瓜二臥瓜二儀刀二鐙杖二骨𩽆二斧二響節八皆校尉執殿門交椅一腳踏一水罐一水盆一團扇四蓋二皆校尉執殿上拂子二香爐一香合一唾壺一唾盂一十六年詔親王儀仗內交椅盆罐用銀者悉改用金建文四年禮部言親王儀仗合增紅油絹銷金雨傘一紅紗燈籠紅油紙燈籠各四𩽆燈二大小銅角四從之永樂三年命工部親王儀仗內紅銷金傘仍用寶珠龍文凡世子儀仗同郡王儀仗令旗二清道旗二幰弩一刀盾十六弓箭十八副絳引傳教告止信幡各二吾杖儀刀立瓜臥瓜骨𩽆斧各二戟十六矟十六麾一幢一節一響節六紅銷金圓傘一紅圓傘一紅曲柄傘二紅方傘二青圓扇四紅圓扇四誕馬四鞍籠一馬杌一拂子二交椅一腳踏一水盆一水罐一香爐一紅紗燈籠二燈二帳房一座皇妃儀仗紅杖二清道旗二絳引幡二戈氅戟氅儀鍠氅吾杖儀刀班劍立瓜臥瓜鐙杖骨𩽆金鉞各二響節四青方傘四紅繡圓傘一繡方扇四紅花圓扇四青繡圓扇四交椅一腳踏一拂子二水盆一水罐一香爐一香合一唾盂一唾壺一紅紗燈籠四東宮妃儀仗紅杖二清道旗二絳引幡二儀鍠氅戈氅戟氅吾杖儀刀班劍立瓜臥瓜鐙杖骨𩽆金鉞各二響節四青方傘二紅素圓傘二紅繡圓傘一紅繡方扇四紅繡花圓扇四青繡圓扇四交椅一腳踏一拂子二水盆一水罐一香爐一香合一紅紗燈籠四永樂二年禮部言東宮妃儀仗如親王妃惟香爐香合如中宮但亦不用金其水盆水罐皆用銀從之親王妃儀仗紅杖二清道旗二絳引幡二戟氅吾杖儀刀班劍立瓜臥瓜骨𩽆鐙杖各二響節四青方傘二紅綵畫雲鳳傘一青孔雀圓扇四紅花扇四交椅一腳踏一水盆一水罐一紅紗燈籠四拂子二公主世子妃儀仗俱同郡王妃儀仗紅杖二清道旗二絳引幡二戟氅吾杖班劍立瓜骨𩽆各二響節二青方傘二紅圓傘一青圓扇二紅圓扇二交椅一腳踏一拂子二紅紗燈籠二水盆一水罐一郡主儀仗紅杖二清道旗二班劍吾杖立瓜骨𩽆各二響節二青方傘一紅圓傘一青圓扇二紅圓扇二交椅一腳踏一水盆一水罐一紅紗燈籠二拂子二舊例郡王儀仗有交椅馬杌皆木質銀裹水盆水罐及香爐香合皆銀質抹金量折銀三百二十兩郡王妃儀仗有交椅等大器量折銀一百六十兩餘皆自備充用嘉靖四十四年定除親王及親王妃初封儀仗照例頒給外其初封郡王及郡王妃折銀等項併停止萬曆十年定郡王初封係帝孫者儀仗照例全給係王孫者免蓋宗室分封漸多勢難遍給也
