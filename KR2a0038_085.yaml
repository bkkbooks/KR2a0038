body:
  text: 明史卷八十五志第六十一河渠三運河上明成祖肇建北京轉漕東南水陸兼挽仍元人之舊參用海運逮會通河開海陸並罷南極江口北盡大通橋運道三千餘里綜而計之自昌平神山泉諸水匯貫都城過大通橋東至通州入白河者大通河也自通州而南至直沽會衛河入海者白河也自臨清而北至直沽會白河入海者衛水也自汶上南旺分流北經張秋至臨清會衛河南至濟寧天井閘會泗沂洸三水者汶水也自濟寧出天井閘與汶合流至南陽新河舊出茶城會黃沁後出夏鎮循泇河達直口入黃濟運者泗洸小沂河及山東泉水也自茶城秦溝南歷徐呂浮邳會大沂河至清河縣入淮後從直河口抵清口者黃河水也自清口而南至於瓜儀者淮揚諸湖水也過此則長江矣長江以南則松蘇浙江運道也淮揚至京口以南之河通謂之轉運河而由瓜儀達淮安者又謂之南河由黃河達豐沛曰中河由山東達天津曰北河由天津達張家灣曰通濟河而總名曰漕河其踰京師而東若薊州西北若昌平皆嘗有河通轉漕餉軍漕河之別曰白漕衛漕閘漕河漕湖漕江漕浙漕因地為號流俗所通稱也淮揚諸水所匯徐兗河流所經疏瀹決排繄人力是繫故閘河湖於轉漕尤急閘漕者即會通河北至臨清與衛河會南出茶城口與黃河會資汶洸泗水及山東泉源泉源之派有五曰分水者汶水派也泉百四十有五曰天井者濟河派也泉九十有六曰魯橋者泗河派也泉二十有六曰沙河者新河派也泉二十有八曰邳州者沂河派也泉十有六諸泉所匯為湖其浸十五曰南旺東西二湖周百五十餘里運渠貫其中北曰馬踏南曰蜀山曰蘇魯又南曰馬場又南八十里曰南陽亦曰獨山周七十餘里北曰安山周八十三里南曰大小昭陽大湖袤十八里小湖殺三之一周八十餘里由馬家橋留城閘而南曰武家曰赤山曰微山曰呂孟曰張王諸湖連注八十里引薛河由地濱溝出會於赤龍潭並趨茶城自南旺分水北至臨清三百里地降九十尺為閘二十有一南至鎮口三百九十里地降百十有六尺為閘二十有七其外又有積水進水減水平水之閘五十有四又為壩二十有一所以防運河之泄佐閘以為用者也其後開泇河二百六十里為閘十一為壩四運舟不出鎮口與黃河會於董溝河漕者即黃河上自茶城與會通河會下至清口與淮河會其道有三中路曰濁河北路曰銀河南路曰符離河南近陵北近運惟中路去陵遠於運有濟而河流遷徙不常上流苦潰下流苦淤運道自南而北出清口經桃宿溯二洪入鎮口陟險五百餘里自二洪以上河與漕不相涉也至泇河開而二洪避董溝闢而直河淤運道之資河者二百六十里而止董溝以上河又無病於漕也湖漕者由淮安抵揚州三百七十里地卑積水匯為澤國山陽則有管家射陽寶應則有白馬汜光高郵則有石臼甓社武安邵伯諸湖仰受上流之水傍接諸山之源巨浸連亙由五塘以達於江慮淮東侵築高家堰拒其上流築王簡張福二堤禦其分泄慮淮侵而漕敗開淮安永濟高郵康濟寶應弘濟三月河以通舟至揚子灣東則分二道一由儀真通江口以漕上江湖廣江西一由瓜洲通西江嘴以漕下江兩浙本非河道專取諸湖之水故曰湖漕太祖初起大軍北伐開踏場口耐牢坡通漕以餉梁晉定都應天運道通利江西湖廣之粟浮江直下浙西吳中之粟由轉運河鳳泗之粟浮淮河南山東之粟下黃河嘗由開封運粟泝河達渭以給陝西用海運以餉遼卒有事於西北者甚鮮淮揚之間築高郵湖堤二十餘里開寶應倚湖直渠四十里築堤護之他小修築無大利害也永樂四年成祖命平江伯陳瑄督轉運一仍由海而一則浮淮入河至陽武陸挽百七十里抵衛輝浮於衛所謂陸海兼運者也海運多險陸挽亦艱九年二月乃用濟寧州同知潘叔正言命尚書宋禮侍郎金純都督周長濬會通河會通河者元轉漕故道也元末已廢不用洪武二十四年河決原武漫安山湖而東會通盡淤至是復之由濟寧至臨清三百八十五里引汶泗入其中泗出泗水陪尾山四泉並發西流至兗州城東合於沂汶河有二小汶河出新泰宮山下大汶河出泰安仙臺嶺南又出萊蕪原山陰及寨子村俱至靜豐鎮合流繞徂徠山陽而小汶河來會經寧陽北缸城西南流百餘里至汶上其支流曰洸河出缸城西南流三十里會寧陽諸泉經濟寧東與泗合元初畢輔國始於缸城左汶水陰作斗門導汶入洸至元中又分流北入濟由壽張至臨清通漳御入海南旺者南北之脊也自左而南距濟寧九十里合沂泗以濟自右而北距臨清三百餘里無他水獨賴汶禮用汶上老人白英策築壩東平之戴村遏汶使無入洸而盡出南旺南北置閘三十八又開新河自汶上袁家口左徙五十里至壽張之沙灣以接舊河其秋禮還又請疏東平東境沙河淤沙三里築堰障之合馬常泊之流入會通濟運又於汶上東平濟寧沛縣並湖地設水匱陡門在漕河西者曰水匱東者曰陡門匱以蓄泉門以泄漲純復濬賈魯河故道引黃水至塌場口會汶經徐呂入淮運道以定其後宣宗時嘗發軍民十二萬濬濟寧以北自長溝至棗林閘百二十里置閘諸淺濬湖塘以引山泉正統時濬滕沛淤河又於濟寧滕三州縣疏泉置閘易金口堰土壩為石蓄水以資會通景帝時增置濟寧抵臨清減水閘天順時拓臨清舊閘移五十丈憲宗時築汶上濟寧決堤百餘里增南旺上下及安山三閘命工部侍郎杜謙勘治汶泗洸諸泉武宗時增置汶上袁家口及寺前鋪石閘濬南旺淤八十里而閘漕之治詳惟河決則挾漕而去為大害陳瑄之督運也於湖廣江西造平底淺船三千艘二省及江浙之米皆由江以入至淮安新城盤五壩過淮仁義二壩在東門外東北禮智信三壩在西門外西北皆自城南引水抵壩口其外即淮河清江浦者直淮城西永樂二年嘗一修閘其口淤塞則漕船由二壩官民商船由三壩入淮挽輸甚勞苦瑄訪之故老言淮城西管家湖西北距淮河鴨陳口僅二十里與清江口相值宜鑿為河引湖水通漕宋喬維嶽所開沙河舊渠也瑄乃鑿清江浦導水由管家湖入鴨陳口達淮十三年五月工成緣西湖築堤亙十里以引舟淮口置四閘曰移風清江福興新莊以時啓閉嚴其禁並濬儀真瓜洲河以通江湖鑿呂梁百步二洪石以平水勢開泰州白塔河以達大江築高郵河堤堤內鑿渠四十里久之復置呂梁石閘並築寶應汜光白馬諸湖堤堤皆置涵洞互相灌注是時淮上徐州濟寧臨清德州皆建倉轉輸濱河置舍五百六十八所舍置淺夫水澀舟膠俾之導行增置淺船三千餘艘設徐沛沽頭金溝山東穀亭魯橋等閘自是漕運直達通州而海陸運俱廢宣德六年用御史白圭言濬金龍口引河水達徐州以便漕末年至英宗初再濬並及鳳池口水徐呂二洪西小河而會通安流自永宣至正統間凡數十載至十三年河決滎陽東衝張秋潰沙灣運道始壞命廷臣塞之景泰三年五月堤工乃完未匝月而北馬頭復決掣漕流以東清河訓導唐學成言河決沙灣臨清告涸地卑堤薄黃河勢急故甫完堤而復決也臨清至沙灣十二閘有水之日其勢甚陡請於臨清以南濬月河通舟直抵沙灣不復由閘則水勢緩而漕運通矣帝即命學成與山東巡撫洪英相度工部侍郎趙榮則言沙灣抵張秋岸薄故數決請於決處置減水石壩使東入鹽河則運河之水可蓄然後厚堤岸填決口庶無後患明年四月決口方畢工而減水壩及南分水墩先敗已復盡衝墩岸橋梁決北馬頭掣漕水入鹽河運舟悉阻教諭彭塤請立閘以制水勢開河以分上流御史練綱上其策詔下尚書石璞璞乃鑿河三里以避決口上下與運河通是歲漕舟不前者命漕運總兵官徐恭姑輸東昌濟寧倉及明年運河膠淺如故恭與都御史王竑言漕舟蟻聚臨清上下請亟敕都御史徐有貞築塞沙灣決河有貞不可而獻上三策請置水閘開分水河挑運河六年三月詔羣臣集議方略工部尚書江淵等請用官軍五萬以濬運有貞恐役軍費重請復陳瑄舊制置撈淺夫用沿河州縣民免其役五月濬漕工竣七月沙灣決口工亦竣會通復安都御史陳泰一濬淮揚漕河築口置壩黃河嘗灌新莊閘至清江浦三十餘里淤淺阻漕稍稍濬治即復其舊英宗初命官督漕分濟寧南北為二侍郎鄭辰治其南副都御史賈諒治其北成化七年又因廷議分漕河沛縣以南德州以北及山東為三道各委曹郎及監司專理且請簡風力大臣總理其事始命侍郎王恕為總河二十一年敕工部侍郎杜謙浚運道自通州至淮揚會山東河南撫按相度經理弘治二年河復決張秋衝會通河命戶部侍郎白昂相治昂奏金龍口決口已淤河並為一大支由祥符合沁下徐州而去其間河道淺隘宜於所經七縣築堤岸以衛張秋下工部議從其請昂又以漕船經高郵甓社湖多溺請於堤東開復河四十里以通舟越四年河復決數道入運河壞張秋東堤奪汶水入海漕流絶時工部侍郎陳政總理河道集夫十五萬治未效而卒六年春副都御史劉大夏奉敕往治決河夏半漕舟鱗集乃先自決口西岸鑿月河以通漕經營二年張秋決口就塞復築黃陵岡上流於是河復南下運道無阻乃改張秋曰安平鎮建廟賜額曰顯惠神祠命大學士王鏊紀其事勒於石而白昂所開高郵復河亦成賜名康濟其西岸以石甃之又甃高郵堤自杭家閘至張家鎮凡三十里高郵堤者洪武時所築也陳瑄因舊增築延及寶應土人相沿謂之老堤正統三年易土以石成化時遣官築重堤於高郵邵伯寶應白馬四湖老堤之東而王恕為總河修淮安以南諸決堤且濬淮揚漕河重湖壖民盜決溉田之罰造閘以儲湖水及大夏塞張秋而昂又開康濟漕河上下無大患者二十餘年十六年巡撫徐源言濟寧地最高必引上源洸水以濟其口在缸城石瀨之上元時治閘作堰使水盡入南旺分濟南北運成化間易土以石夫土堰之利水小則遏以入洸水大則閉閘以防沙壅聽其漫堰西流自石堰成水遂橫溢石堰既壞民田亦衝洸河沙塞雖有閘門壓不能啓乞毀石復土疏洸口壅塞以至濟寧而築缸城迤西春城口子決岸帝命侍郎李鐩往勘言缸城石堰一可遏淤沙不為南旺湖之害一可殺水勢不慮戴村壩之衝不宜毀近堰積沙宜濬缸城稍東有元時舊閘引洸水入濟寧下接徐呂漕河東平州戴村則汶水入海故道也自永樂初橫築一壩遏汶入南旺湖漕河始通今自分水龍王廟至天井閘九十里水高三丈有奇若洸河更濬而深則汶流盡向濟寧而南臨清河道必涸洸口不可濬缸城口至柳泉九十里無關運道可弗事柳泉至濟寧汶泗諸水會流處宜疏者二十餘里春城口外障汶水內防民田堤卑岸薄宜與戴村壩並修築從之正德四年十月河決沛縣飛雲橋入運尋塞世宗之初河數壞漕嘉靖六年光祿少卿黃綰論泉源之利言漕河泉源皆發山東南旺馬場樊村安山諸湖泉水所鍾亟宜修濬且引他泉並蓄則漕不竭南旺馬場堤外孫村地窪若瀦為湖改作漕道尤可免濟寧高原淺澀之苦帝命總河侍郎章拯議而拯以黃水入運運船阻沛上方為御史吳仲所劾拯言河塞難遽通惟金溝口迤北新衝一渠可令運船由此入昭陽湖出沙河板橋其先阻淺者則西歷雞寺出廟道北口通行下部併議未決給事中張嵩言昭陽湖地庳河勢高引河灌湖必致瀰漫使湖道復阻請罷拯別推大臣部議如嵩言拯再疏自劾乞罷不許卒引運船道湖中其冬詔拯還京別而命擇大臣督理諸大臣多進治河議詹事霍韜謂前議役山東河南丁夫數萬疏濬淤沙以通運然沙隨水下旋濬旋淤今運舟由昭陽湖入雞鳴臺至沙河迂回不過百里若沿湖築堤浚為小河河口為閘以待蓄泄水溢可避風濤水涸易為疏濬三月而土堤成一年而石堤成用力少取效速黃河愈溢運道愈利較之役丁夫以浚淤土勞逸大不侔也尚書李承勛謂於昭陽湖左別開一河引諸泉為運道自留城沙河為尤便與都御史胡世寧議合七年正月總河都御史盛應期奏如世寧策請於昭陽湖東鑿新河自汪家口南出留城口長百四十里刻期六月畢工工未半而應期罷去役遂已其後三十年朱衡始循其遺跡濬而成之是年冬總河侍郎潘希曾加築濟沛間東西兩堤以拒黃河十九年七月河決野雞岡二洪涸督理河漕侍郎王以旗請濬山東諸泉以濟運且築長堤聚水如閘河制遂清舊泉百七十八開新泉三十一以旗復奏四事一請以諸泉分隸守土官兼理其事毋使堙塞一請於境山鎮徐呂二洪之下各建石閘蓄水數尺以行舟旁留月河以泄暴汛築四木閘於武家溝小河口石城匙頭灣而置方船於沙坊等淺以備撈濬一言漕河兩岸有南旺安山馬場昭陽四湖名為水匱所以匯諸泉濟漕河也豪強侵占蓄水不多而昭陽一湖淤成高地大非國初設湖初意宜委官清理添置閘壩斗門培築堤岸多開溝渠濬深河底以復四匱一言黃河南徙舊閘口俱塞惟孫繼一口獨存導河出徐州小浮橋下徐呂二洪此濟運之大者請於孫繼口多開一溝及時疏瀹庶二洪得濟帝可其奏而以管泉專責之部曹徐呂二洪者河漕咽喉也自陳瑄鑿石疏渠正統初復濬洪西小河漕運參將湯節又以洪迅敗舟於上流築堰逼水歸月河河南建閘以蓄水勢成化四年管河主簿郭升以大石築兩堤錮以鐵錠鑿外洪敗船惡石三百而平築𩹉洪堤岸又甃石岸東西四百餘丈十六年增甃呂梁洪石堤石壩二百餘丈以資牽挽及是建閘行者益便之四十四年七月河大決沛縣漫昭陽湖由沙河至二洪浩渺無際運道淤塞百餘里督理河漕尚書朱衡循覽盛應期所鑿新河遺跡請開南陽留城上下總河都御史潘季馴不可衡言是河直秦溝有所束隘伏秋黃水盛昭陽受之不為壑也乃決計開濬身自督工重懲不用命者給事中鄭欽劾衡故興難成之役虐民幸功朝廷遣官勘新舊河孰利給事中何起鳴勘河還言舊河難復有五而新河之難成者亦有三顧新河多舊堤高阜黃水難侵濬而通之運道必利所謂三難者一以夏村迤北地高恐難接水然地勢高低大約不過二丈一視水平加深何患水淺一以三河口積沙深厚水勢湍急不無阻塞然建壩攔截歲一挑濬之何患沙壅一以馬家橋築堤微山取土不便又恐水口投掃勢必不堅然使委任得人培築高厚無必不可措力之理開新河便下廷臣集議言新河已有次第不可止況百中橋至留城白洋淺出境山疏濬補築亦不全棄舊河羣議俱合帝意乃決時大雨黃水驟發決馬家橋壞新築東西二堤給事中王元春御史黃襄皆劾衡欺誤起鳴亦變其說會衡奏新舊河百九十四里俱已流通漕船至南陽出口無滯詔留衡與季馴詳議開上源築長堤之便隆慶元年正月衡請罷上源議惟開廣秦溝堅築南長堤五月新河成西去舊河三十里舊河自留城以北經謝溝下沽頭中沽頭金溝四閘過沛縣又經廟道口湖陵城孟陽八里灣穀亭五閘而至南陽閘新河自留城而北經馬家橋西柳莊滿家橋夏鎮楊莊硃梅利建七閘至南陽閘合舊河凡百四十里有奇又引鮎魚諸泉及薛河沙河注其中而設壩於三河之口築馬家橋堤遏黃水入秦溝運道乃大通未幾鮎魚口山水暴決沒漕艘帝從衡請自東邵開支河三道以分泄之又開支河於東邵之上歷東滄橋以達百中橋鑿豸𩹉溝諸處為渠使水入赤山湖由之以歸呂孟湖下境山而去衡召入為工部尚書都御史翁大立代上言漕河資泉水而地形東高西下非湖瀦之則涸故漕河以東皆有匱非湖泄之則潰故漕河以西皆有壑黃流逆奔則以昭陽湖為散漫之區山水東突則以南陽湖為瀦蓄之地宜由回回墓開通以達鴻溝令穀亭湖陵之水皆入昭陽湖即濬鴻溝廢渠引昭陽湖水沿渠東出留城其湖地退灘者又可得田數千頃大立又言薛河水湍悍今盡注赤山湖入微山湖以達呂孟湖此尚書衡成績也惟呂孟之南為邵家嶺黃流填淤地形高仰秋水時至翕納者小浸淫平野奪民田之利微山之西為馬家橋比草創一堤以開運道土未及堅而時為積水所撼以尋丈之址二流夾攻慮有傾圮宜鑿邵家嶺令水由地濱溝出境山以入漕河則湖地可耕河堤不潰更於馬家橋建減水閘視旱潦為啓閉乃通漕長策也並從之三年七月河決沛縣茶城淤塞糧艘二千餘皆阻邳州大立言臣按行徐州循子房山過梁山至境山入地濱溝直趨馬家橋上下八十里間可別開一河以漕即所謂泇河也請集廷議上即命行之未幾黃落漕通前議遂寢時淮水漲溢自清河至淮安城西淤三十餘里決禮信二壩出海寶應湖堤多壞山東諸水從直河出邳州大立以聞其冬自淮安板閘至清河西湖嘴開濬垂成而𩹉口復塞督漕侍郎趙孔昭言清江一帶黃河五十里宜築堰以防河溢淮河高良澗一帶七十餘里宜築堰以防淮漲帝令亟濬𩹉口與大立商築堰事宜並議海口築塞及寶應月河二事四年六月淮河及鴻溝境山疏濬工竣大立方奏聞諸水忽驟溢決仲家淺與黃河合茶城復淤未幾自泰山廟至七里溝淮河淤十餘里其水從朱家溝旁出至清河縣河南鎮以合於黃河大立請開新莊閘以通回船兼濬古睢河泄二洪水且分河自魚溝下草灣保南北運道帝命新任總河都御史潘季馴區畫頃之河大決邳州睢寧運道淤百餘里大立請開泇口蕭縣二河會季馴築塞諸決河水歸正流漕船獲通大立孔昭皆以遲誤漕糧削籍開泇之議不果行五年四月河復決邳州王家口自雙溝而下南北決口十餘損漕船運軍千計沒糧四十萬餘石而匙頭灣以下八十里皆淤於是膠萊海運之議紛起會季馴奏邳河功成帝以漕運遲遣給事中雒遵往勘總漕陳火介及季馴俱罷官六年從雒遵言修築茶城至清河長堤五百五十里三里一鋪鋪十夫設官畫地而守又接築茶城至開封兩岸堤從朱衡言繕豐沛大黃堤衡又言漕河起儀真訖張家灣二千八百餘里河勢凡四段各不相同清江浦以南臨清以北皆遠隔黃河不煩用力惟茶城至臨清則閘諸泉為河與黃相近清河至茶城則黃河即運河也茶城以北當防黃河之決而入茶城以南當防黃河之決而出防黃河即所以保運河故自茶城至邳遷高築兩堤宿遷至清河盡塞缺口蓋以防黃水之出則正河必淤昨歲徐邳之患是也自茶城秦溝口至豐沛曹單創築增築以接縷水舊堤蓋以防黃水之入則正河必決往年曹沛之患是也二處告竣故河深水束無旁決中潰之虞沛縣之子頭至秦溝口應築堤七十里接古北堤徐邳之間堤逼河身宜於新堤外別築遙堤詔如其議以命總河侍郎萬恭萬曆元年恭言祖宗時造淺船近萬非不知滿載省舟之便以閘河流淺故不敢過四百石也其制底平倉淺底平則入水不深倉淺則負載不滿又限淺船用水不得過六拏伸大指與食指相距為一拏六拏不過三尺許明受水淺也今不務遵行而競雇船搭運雇船有三害搭運有五害皆病河道請悉遵舊制從之恭又請復淮南平水諸閘上言高寶諸湖周遭數百里西受天長七十餘河徒恃百里長堤若障之使無疏泄是潰堤也以故祖宗之法遍置數十小閘於長堤之間又為令曰但許深湖不許高堤故設淺船淺夫取湖之淤以厚堤夫閘多則水易落而堤堅濬勤則湖愈深而堤厚意至深遠也比年畏修閘之勞每壞一閘即堙一閘歲月既久諸閘盡堙而長堤為死障矣畏濬淺之苦每湖淺一尺則加堤一尺歲月既久湖水捧起而高寶為盂城矣且湖漕勿堤與無漕同湖堤勿閘與無堤同陳瑄大置減水閘數十湖水溢則瀉以利堤水落則閉以利漕最為完計積久而減水故迹不可復得湖且沈堤請復建平水閘閘欲密密則水疏無漲悶患閘欲狹狹則勢緩無齧決虞尚書衡覆奏如其請於是儀真江都高郵寶應山陽設閘二十三濬淺凡五十一處各設撈淺船二淺夫十恭又言清江浦河六十里陳瑄濬至天妃祠東注於黃河運艘出天妃口入黃穿清特半餉耳後黃漲逆注入口浦遂多淤議者不制天妃口而遽塞之令淮水勿與黃值開新河以接淮河曰接清流勿接濁流可不淤也不知黃河非安流之水伏秋盛發則西擁淮流數十里並灌新開河彼天妃口一黃水之淤耳今淮黃會於新開河口是二淤也防一淤生二淤又生淮黃交會之淺歲役丁夫千百濬治方畢水過復合又使運艘迂八里淺滯而始達於清河孰與出天妃口者之便且利請建天妃閘俾漕船直達清河運盡而黃水盛發則閉閘絶黃水落則啓天妃閘以利商船新河口勿濬可也乃建天妃廟口石閘恭又言由黃河入閘河為茶城出臨清板閘七百餘里舊有七十二淺自創開新河汶流平衍地勢高下不甚相懸七十淺悉為通渠惟茶黃交會間運盛之時正值黃河水落之候高下不相接是以有茶城黃家閘之淺連年患之祖宗時嘗建境山閘自新河水平閘沒泥淖且丈餘其閘上距黃家閘二十里下接茶城十里因故基纍石為之可留黃家閘外二十里之上流接茶城內十里之下流且挾二十里水勢衝十里之狹流蔑不勝矣乃復境山舊閘恭建三議尚書衡覆行之為運道永利而是時茶城歲淤恭方報正河安流回空船速出給事中朱南雍以回空多阻劾恭隱蔽溺職帝切責恭罷去三年二月總河都御史傅希摯請開泇河以避黃險不果行希摯又請濬梁山以下與茶城互用淤舊則通新而挑舊淤新則通舊而挑新築壩斷流常通其一以備不虞詔從所請工未成而河決崔鎮淮決高家堰高郵湖決清水潭丁志等口淮城幾沒知府邵元哲開菊花潭以泄淮安高寶三城之水東方芻米少通明年春督漕侍郎張翀以築清水潭堤工巨不克就欲令糧船暫由圈子田以行巡按御史陳功不可河漕侍郎吳桂芳言高郵湖老堤陳瑄所建後白昂開月河距湖數里中為土堤東為石堤首尾建閘名為康濟河其中堤之西老堤之東民田數萬畝所謂圈子田也河湖相去太遠老堤缺壞不修遂至水入圈田又成一湖而中堤潰壞東堤獨受數百里湖濤清水潭之決勢所必至宜遵弘治間王恕之議就老堤為月河但修東西二堤費省而工易舉帝命如所請行之是年元哲修築淮安長堤又疏鹽城石口下流入海五年二月高郵石堤將成桂芳請傍老堤十數丈開挑月河因言白昂康濟月河去老堤太遠人心狃月河之安忘老堤外捍之力年復一年不加省視老中二堤俱壞而東堤不能獨存今河與老堤近則易於管攝御史陳世寶論江北河道請於寶應湖堤補石堤以固其外而於石堤之東復築一堤以通月河漕舟行其中並議行其冬高郵湖土石二堤新開漕河南北二閘及老堤加石增護堤木城各工竣事桂芳又與元哲增築山陽長堤自板閘至黃浦亙七十里閉通濟閘不用而建興文閘且修新莊諸閘築清江浦南堤創板閘漕堤南北與新舊堤接板閘即故移風閘也堤閘並修淮揚漕道漸固六年總理河漕都御史潘季馴築高家堰及清江浦柳浦灣以東加築禮智二壩修寶應黃浦等八淺堤高寶減水閘四又拆新莊閘而改建通濟閘於甘羅城南明初運糧自瓜儀至淮安謂之𩹉河自五壩轉黃河謂之外河不相通及開清江浦設閘天妃口春夏之交重運畢即閉以拒黃歲久法弛閘不封而黃水入嘉靖末塞天妃口於浦南三里溝開新河設通濟閘以就淮水已又從萬恭言復天妃閘未幾又從御史劉光國言增築通濟自仲夏至季秋隔日一放回空漕船既而啓閉不時淤塞日甚開朱家口引清水灌之僅通舟至是改建甘羅城南專向淮水使河不得直射十年督漕尚書凌雲翼以運船由清江浦出口多艱險乃自浦西開永濟河四十五里起城南灣歷龍江閘至楊家澗出武家墩折而東合通濟閘出口更置閘三以備清江浦之險是時漕河就治淮揚免水災者十餘年初黃河之害漕也自金龍口而東則會通以淤逮塞沙灣張秋閘漕以安則徐沛間數被其害至崔鎮高堰之決黃淮交漲而害漕乃在淮揚間湖潰則敗漕季馴以高堰障洪澤俾堰東四湖勿受淮侵漕始無敗而河漕諸臣懼湖害日夜常惴惴十三年從總漕都御史李世達議開寶應月河寶應泛光湖諸湖中最湍險者也廣百二十餘里槐角樓當其中形曲如箕瓦店翼其南稱鈎灣翼其北西風鼓浪往住覆舟陳瑄築堤湖東蓄水為運道上有所受下無所宣遂決為八淺匯為六潭興鹽諸場皆沒而淮水又從周家橋漫入溺人民害漕運武宗末年郎中楊最請開月河部覆不從嘉靖中工部郎中陳育賢戶部員外范韶御史聞人詮運糧千戶李顯皆以為言議行未果至是工部郎中許應逵建議世達用其言以奏乃決行之濬河千七百餘丈置石閘三減水閘二築堤九千餘丈石堤三之一子堤五千餘丈工成賜名弘濟尋改石閘為平水閘應逵又築高郵護城堤其後弘濟南北閘夏秋淮漲吞吐不及舟多覆者神宗季年督漕侍郎陳荐於南北各開月河以殺河怒而溜始平十五年督漕侍郎楊一魁請修高家堰以保上流砌范家口以制旁決疏草灣以殺河勢修禮壩以保新城詔如其議一魁又改建古洪閘先是汶泗之水由茶城會黃河隆慶間濁流倒灌稽阻運船郎中陳瑛移黃河口於茶城東八里建古洪內華二閘漕河從古洪出口後黃水發淤益甚一魁既改古洪帝又從給事中常居敬言令增築鎮口閘於古洪外距河僅八十丈吐納益易糧運利之工部尚書石星議季馴居敬條上善後事宜請分地責成接築塔山縷堤清江浦草壩創築寶應西堤石砌邵伯湖堤疏濬𩹉河淤淺當在淮揚興舉察復南旺馬踏蜀山馬場四湖建築坎河滾水壩加建通濟永通二閘察復安山湖地當在山東興舉帝從其議未幾衆工皆成十九年季馴言宿遷以南地形西窪請開縷堤放水沙隨水入地隨沙高庶水患消而費可省又請易高家堰土堤為石築滿家閘西攔河壩使汶泗盡歸新河設減水閘於李家口以泄沛縣積水從之十月淮湖大漲江都淳家灣石堤邵伯南壩高郵中堤朱家墩清水潭皆決郎中黃曰謹築塞僅竣而山陽堤亦決二十一年五月雨漕河泛溢潰濟寧及淮河諸堤岸總河尚書舒應龍議築堽城壩遏汶水之南開馬踏湖月河口導汶水之北開通濟閘放月河土壩以殺洶湧之勢從其奏數年之間會通上下無阻而黃淮並漲高堰及高郵堤數決害漕應龍卒罷去建議者紛紛未有所定楊一魁代應龍為總河尚書力主分黃導淮治逾年工將竣又請決湖水以疏漕渠言高寶諸湖本沃壤也自淮黃逆壅遂成昏墊今入江入海之路既濬宜開治涇河子嬰溝金灣河諸閘及瓜儀二閘大放湖水就湖疏渠與高寶月河相接既避運道風波之險而水涸成田給民耕種漸議起科可充河費命如議行時下流既疏淮水漸帖而河方決黃堌口督漕都御史褚鈇恐泄太多徐邳淤阻力請塞之一魁持不可濬兩河口至小浮橋故道以通漕然河大勢南徙二洪漕屢涸復大挑黃堌下之李吉口挽黃以濟之非久輒淤一魁入掌部事二十六年劉東星繼之守一魁舊議李吉口淤益高歲冬月即其地開一小河春夏引水入徐州如是者三年大抵至秋即淤乃復開趙家圈以接黃開泇河以濟運趙家圈旋淤泇河未復而東星卒於是鳳陽巡撫都御史李三才建議自鎮口閘至磨兒莊倣閘河制三十里一閘凡建六閘於河中節宣汶濟之水聊以通漕漕舟至京不復能如期矣東星在事開邵伯月河長十八里濶十八丈有奇以避湖險又開界首月河長千八百餘丈各建金門石閘二漕舟利焉三十二年總河侍郎李化龍始大開泇河自直河至李家港二百六十餘里盡避黃河之險化龍憂去總河侍郎曹時聘終其事疏泇河之功言舒應龍創開韓家莊以泄湖水而路始通劉東星大開良城侯家莊以試行運而路漸廣李化龍上開李家港鑿都水石下開直河口挑田家莊殫力經營行運過半而路始開故臣得接踵告竣因條上善後六事運道由此大通其後每年三月開泇河壩由直河口進九月開召公壩入黃河糧艘及官民船悉以為準四十四年巡漕御史朱階請修復泉湖言宋禮築壩戴村奪二汶入海之路灌以成河復導洙泗洸沂諸水以佐之汶雖率衆流出全力以奉漕然行遠而竭已自難支至南旺又分其四以南迎淮六以北赴衛力分益薄況此水夏秋則漲冬春而涸無雨即夏秋亦涸禮逆慮其不可恃乃於沿河昭陽南旺馬踏蜀山安山諸湖設立斗門名曰水匱漕河水漲則瀦其溢出者於湖水消則決而注之漕積泄有法盜決有罪故旱潦恃以無恐及歲久禁弛湖淺可耕多為勢豪所占昭陽一湖已作藩田比來山東半年不雨泉欲斷流按圖而索水匱茫無知者乞敕河臣清核亟築堤壩斗門以廣蓄儲帝從其請方議濬泉湖而河決徐州狼矢溝由蛤鰻諸湖入泇河出直口運船迎溜艱險督漕侍郎陳荐開武河等口泄水平溜後二年決口長淤沙河始復故道總河侍郎王佐加築月壩以障之至泰昌元年冬佐言諸湖水匱已復安山湖且復五十五里誠可利漕請以水匱之廢興為河官殿最從之天啓元年淮黃漲溢決𩹉河王公祠淮安知府宋統殷山陽知縣練國事力塞之三年秋外河復決數口尋塞是年冬濬永濟新河自凌雲翼開是河未幾而閉總河都御史劉士忠嘗開壩以濟運已復塞而淮安正河三十年未濬故議先挑新河通運船回空乃濬正河自許家閘至惠濟祠長千四百餘丈復建通濟月河小閘運船皆由正河新河復閉時王家集磨兒莊湍溜日甚漕儲參政朱國盛謀改濬一河以為漕計令同知宋士中自泇口迤東抵宿遷陳溝口復泝駱馬湖上至馬頰河往回相度乃議開馬家洲且疏馬頰河口淤塞上接泇流下避劉口之險又疏三汊河流沙十三里開滔莊河百餘丈濬深小河二十里開王能莊二十里以通駱馬湖口築塞張家等溝數十道束水歸漕計河五十七里名通濟新河五年四月工成運道從新河無劉口磨兒莊諸險之患明年總河侍郎李從心開陳溝地十里以竟前工崇禎二年淮安蘇家嘴新溝大壩並決沒山鹽高泰民田五年又決建義北壩總河尚書朱光祚濬駱馬湖避河險十三處名順濟河六年良城至徐塘淤為平陸漕運愆期奪光祚官劉榮嗣繼之八年駱馬湖淤阻榮嗣開河徐宿引注黃水被劾得重罪侍郎周鼎繼之乃專力於泇河濬麥河支河築王母山前後壩勝陽山東堤馬蹄崖十字河攔水壩挑良城閘抵徐塘口六千餘丈九年夏泇河復通由宿遷陳溝口合大河鼎又修高家堰及新溝漾田營堤增築天妃閘石工去南旺湖彭口沙礓濬劉呂莊至黃林莊百六十里而是時黃淮漲溢日甚倒灌害漕鼎在事五年卒以運阻削職繼之者侍郎張國維甫蒞任即以漕涸被責十四年國維言濟寧運道自棗林閘溯師家莊仲家淺二閘歲患淤淺每引泗河由魯橋入運以濟之伏秋水長足資利涉而挾沙注河水退沙積利害參半旁自白馬河匯鄒縣諸泉與泗合流而出魯橋力弱不能敵泗河身半淤不為漕用然其上源寬處正與仲家淺閘相對導令由此入運較魯橋高下懸殊且易細流為洪流又減沙滲之患而濟仲家淺及師莊棗林有三便又言南旺水本地脊惟藉泰安新泰萊蕪寧陽汶上東平平陰肥城八州縣泉源由汶入運故運河得通今東平平陰肥城淤沙中斷請亟濬之復上疏運六策一復安山湖水匱以濟北閘一改挑滄浪河從萬年倉出口以利四閘一展濬汶河陶河上源以濟邳派一改道沂河出徐塘口以並利邳宿其二即開三州縣淤沙及改挑白馬湖也皆命酌行國維又濬淮揚漕河三百餘里當是時河臣竭力補苴南河稍寧北河數淺阻而河南守臣壅黃河以灌賊河大決開封下流日淤河事益壞未幾而明亡矣
