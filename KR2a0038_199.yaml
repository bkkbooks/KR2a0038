body:
  text: 明史卷一百九十九列傳第八十七李鉞子惠王憲胡世寧子純繼李承勛王以旗范鏓王邦瑞子正國鄭曉李鉞字虔甫祥符人弘治九年進士除御史巡視中城理河東鹽政歷有聲績正德改元天鳴星變偕同官陳數事論中官李興寧謹苗逵高鳳等罪而請斥尚書李孟暘都督神英武宗不能用以喪歸劉瑾惡鉞劾其黨假他事罰米五百石輸邊瑾敗起故官出為鞏昌知府尋遷四川副使巡撫林俊委鉞與副使何珊討敗流賊方四等賜金加俸遷陝西按察使擢右僉都御史巡撫山西寇入白羊口鉞度宣大有備必窺岢嵐五臺間乃亟畫戰守寇果犯岢嵐鉞與延綏援將安國杭雄敗之加俸一級尋討平內寇武廷章等召入理院事世宗即位歷兵部左右侍郎出總制陝西三邊軍務鉞長軍旅料敵多中初至固原寇入犯援兵未集鉞下令大開諸營門晝夜不閉寇疑有備未敢逼乃炮擊之寇引去以其間增築墩堡謹烽堠廣儲蓄選壯勇為備未幾寇復深入平涼邠州鉞令遊擊時陳周尚文等分伏要害遏其歸斬獲多鉞策寇失利必東犯延綏檄諸將設伏待寇果至又敗去已而言官論邠州失事罪請罷總兵官劉淮巡撫王珝等並及鉞詔奪淮職責鉞圖後效鉞自劾乞休不許盜楊錦等剽延綏殺指揮翟相鉞討擒之嘉靖二年以塞上無警召還給事中劉世揚請留鉞陝西而久任諸邊巡撫帝卒召鉞進右都御史總督漕運巡撫鳳陽諸府入掌都察院事四年代金獻民為兵部尚書兼督團營中官刁永等多所陳乞帝皆許之又録司禮扶安家八人官錦衣南京守備已三人復命卜春添注以往御馬監閻洪因軍政請自考騰驤四衛及牧馬所官鉞纍疏力爭帝皆不納至責以抗旨令對狀鉞引罪乃罷武定侯郭勛以會武宴列尚書下疏爭之鉞言中府官之有會武宴猶禮部之有恩榮宴也恩榮禮部為主會武中府為主故皆列諸尚書之次宴圖可徵不得引團營故事帝竟從勛言錦衣革職百戶李全奏乞復任鉞請治其違旨罪帝不問於是官旗鄭彪等皆援全例以請鉞執奏如初而疏有猿攀狐媚語帝惡之復責對狀奪俸一月鉞既屢諫不用失上意且知為近幸所嫉會病遂再疏乞休許馳驛未行卒贈太子少保遣官護喪歸葬久之賜諡恭簡子惠正德十二年進士官行人諫武宗南巡死於廷杖贈監察御史王憲字維綱東平人弘治三年進士歷知阜平滑二縣召拜御史正德初擢大理寺丞遷右僉都御史清理甘肅屯田進右副都御史巡撫遼東歷鄖陽大同以應州禦寇功廕錦衣世百戶遷戶部右侍郎改撫陝西入為兵部右侍郎近畿盜起偕太監張忠都督朱泰捕之復以功廕錦衣武宗南征命率戶兵工三部郎各一人督理軍儲駕旋以中旨代王瓊為兵部尚書世宗即位為給事中史道劾罷嘉靖四年廷推鄧璋及憲為三邊總制言官持不可帝竟用憲部將王宰史經連敗寇璽書褒諭吉囊數萬騎渡河從石臼墩深入憲督總兵官鄭卿杭雄趙瑛等分據要害擊之都指揮卜雲斷其歸路寇至青羊嶺大敗去五日四捷斬首三百餘級獲馬器仗無算帝大喜加憲太子太保復豫一子廕至是凡三廕錦衣世百戶矣中官織花絨於陝憲請罷之又因九廟成請釋還議禮得罪者頗為士大夫所稱張璁桂萼欲用王瓊為總制乃改憲南京兵部尚書已入為左都御史朔州告急廷推憲總督宣大憲不肯行曰我甫入中臺何見驅亟也給事中夏言趙廷瑞劾憲託疾避難復罷歸未幾帝追念憲召為兵部尚書小王子入寇條上平戎及諸邊防禦事宜又請立京營分伍操練法諸將不得藉內府供事規避營操帝皆嘉納舊制軍功論有生擒斬首當先殿後奇功頭功諸等其後濫冒日多憲定軍功襲替格自永樂至正德酌其輕重大小之差臚析以上詔著之會典為成式尋兼督團營西番諸國來貢稱王號者百餘人憲與禮臣夏言等請如成化弘治間例答敕止國王一人仍限貢期人數議乃定大同兵變憲初言首亂當誅餘宜散遣而大學士張孚敬與總督劉源清力主用兵憲乃不敢堅前議源清攻城不能下北寇又內侵請別遣大臣禦北寇己得專攻城憲亦議從其奏論者多尤憲會帝悟大同重鎮不宜破壞乃寢其事亂亦旋定源清竟得罪去居數年憲引年歸卒贈少保諡康毅子汝孝副都御史見丁汝夔傳胡世寧字永清仁和人弘治六年進士性剛直不畏強禦且知兵除德安推官岐王初就藩從官驕世寧裁之他日復請湖田持不可遷南京刑部主事應詔陳邊備十策復上書極言時政闕失時孝宗已不豫猶頷之再遷郎中與李承勛魏校余祐善時稱南都四君子遷廣西太平知府太平知州李濬數殺掠吏民世寧密檄龍英知州趙元瑤擒之思明叛族黃文昌四世殺知府占三州二十七村副總兵康泰偕世寧入思明執其兄弟三人而泰畏文昌夜遁委世寧空城中危甚諸土酋德世寧發兵援乃得還文昌懼歸所侵地降土官承襲長吏率要賄不時奏以故諸酋怨叛世寧令生子即聞府應世及者年十歲以上朔望謁府父兄有故按籍請官於朝土官大悅母喪歸服闋赴京道滄州流寇攻城急世寧即馳入城畫防守計賊攻七日夜不能拔引去再知寶慶府岷王及鎮守中官王潤皆嚴憚之遷江西副使與都御史俞諫畫策擒盜討平王浩八以暇城廣昌南豐新城當是時寧王宸濠驕橫有異志莫敢言世寧憤甚正德九年三月上疏曰江西之盜剿撫二説相持臣愚以為無難決也已撫者不誅再叛者毋赦初起者亟剿如是而已顧江西患非盜賊寧府威日張不逞之徒羣聚而導以非法上下諸司承奉太過數假火災奪民廛地採辦擾旁郡蹂籍遍窮鄉臣恐良民不安皆起為盜臣下畏禍多懷二心禮樂刑政漸不自朝廷出矣請於都御史俞諫任漢中專委一人或別選公忠大臣鎮撫敕王止治其國毋撓有司以靖亂源銷意外變章下兵部尚書陸完議令諫往計賊情撫剿之宜至所言違制擾民疑出偽託宜令王約束之得旨報可宸濠聞大怒列世寧罪遍賂權幸必殺世寧章下都察院右都御史李士實宸濠黨也與左都御史石玠等上言世寧狂率當治命未下宸濠奏復至指世寧為妖言乃命錦衣官校逮捕世寧世寧已遷福建按察使取道還里宸濠遂誣世寧逃馳使令浙江巡按潘鵬執送江西鵬盡繫世寧家人索之急李承勛為按察使保護之世寧乃亡命抵京師自投錦衣獄獄中三上書言宸濠逆狀卒不省繫歲餘言官程啓充徐文華蕭鳴鳳邢寰等交章救楊一清復以危言動錢寧乃謫戍瀋陽居四年宸濠果反世寧起戍中為湖廣按察使尋擢右僉都御史巡撫四川道聞世宗即位疏以司馬光仁明武三言進因薦魏校何瑭邵鋭可講官林俊楊一清劉忠林廷玉可輔弼知府劉蒞徐鈺先為諫官有直聲宜擢用時韙其言松潘所部熟番將吏久不能制率輸貨以假道番殺官軍憚不敢詰官軍殺番輒抵罪世寧陳方略請選將益兵立賞罰格嚴隱匿禁修烽堠時巡徼以振軍威通道路詔悉行之又劾罷副總兵張傑中官趙欽甫兩月召為吏部右侍郎未上以父憂歸既免喪家居朝廷方議大禮異議者多得罪世寧意是張璁等疏乞早定追崇大禮未上語聞京師既有議遷顯陵祔天壽山者世寧極言不可乃並前疏上之帝深嘉歎無何聞廷臣伏闕爭有杖死者馳疏言臣向以仁明武三言進然尤以仁為本仁生成之德明日月之臨皆不可一日無武則雷霆之威但可一震而已今廷臣忤旨陛下赫然示威辱以箠楚體羸弱者輒斃傳之天下書之史册謂鞭撲行殿陛刑辱及士夫非所以光聖德新進一言偶合後難保必當舊德老成一事偶忤後未必皆非望陛下以三無私之心照臨於上無先存適莫於中帝雖不能從亦不忤尋召為兵部左侍郎條戍邊時所見險塞利害二十五事以上又請善保聖躬毋輕餌藥物獻大學秦誓章洪範惟辟威福繫辭節初爻講義並乞留中給事中余經遂劾世寧啓告密之漸世寧乞罷不許大禮成進秩一等復陳用人二十事工匠趙奎等五十四人以中官請悉授職世寧言賞過濫不納屢疏引疾改南京吏部就遷工部尚書已復召為左都御史加太子少保辭宮銜許之世寧故方嚴及掌憲務持大體條上憲綱十餘條末言近士習忌刻一遭讒毀則終身廢棄僉事彭祺發豪強罪受謗奪官諸如此者宜許大臣申理帝採其言惟祺報寢執政請禁私謁世寧曰臣官以察為名人非接其貌聽其言無由悉其才行帝以為然遂弗禁俄改刑部尚書每重獄別白為帝言之帝輒感悟中官剛聰誣漕卒掠御服坐二千人世寧劾其妄已聰情得抵罪帝乃益信世寧王瓊修郤陳九疇將致之死以世寧救得戍兵部尚書王時中罷以世寧代加太子太保再辭不得命乃陳兵政十事曰定武略崇憲職重將權增武備更賞罰馭土夷足邊備絶弊源正謬誤惜人才所言多破常格帝優旨答之土魯番貢使乞歸哈密城易降人牙木蘭王瓊上其事世寧言先朝不惜棄大寧交址何有於哈密況初封忠順為我外藩而自罕慎以來三為土魯番所執遂狎與戎比以疲我中國耗財老師戎得挾以邀索臣以為此與國初所封元孽和順寧順安定三王等耳安定在哈密內近甘肅今存亡不可知我一切不問獨重哈密何也宜專守河西謝絶哈密牙木蘭本曲先衛人反正歸順非納降比彼安得索之唐悉怛謀事可鑑也張璁等皆主瓊議格不用獨留牙木蘭不遣居兵部三月求去帝不許免朝參世寧又上備邊三事固稱疾篤乃聽乘傳歸給釰隸如制歸數月復起南京兵部尚書固辭不拜九年秋卒贈少保諡端敏世寧風格峻整居官廉疾惡若讐而薦達賢士如不及都御史馬昊陳九疇坐纍廢副使施儒楊必進考察被黜御史李潤副使范輅為時所抑連章薦之與人語訥不出口及具疏援據古今洞中窾會與李承勛善而持議不苟合承勛欲授隴勝官復芒部故地世寧言勝非隴氏子芒氏不當復立始以議禮與張璁桂萼合璁萼德之欲援以自助世寧不肯附會論事多抵牾萼議欲銷兵世寧力折之昌化伯以他姓子冒封下廷議世寧言吾輩不得以厚賂故誣朝廷萼為色變萼方為吏部而寧引疾言天變人窮盜賊滋起咎在吏戶兵三部不得人兵部尤重請避賢路又以哈密議語侵璁諸大臣皆忌之帝始終優禮不替子純繼純以父任知肇慶府有才行繼幼不慧不為世寧知世寧在江西出討賊部將入見繼繼為指陳法進退離合甚詳凡三日世寧歸閲大異之知其故嘆曰吾有子不自識何也自是擊賊輒令繼從與策方略世寧十不失三繼十不失一世寧方草疏論宸濠繼請曰是且重得禍世寧曰吾已許國遑恤其他及世寧下獄繼念其父病死李承勛字立卿嘉魚人父田進士官右副都御史巡撫順天有操執為政不苛承勛舉弘治六年進士由太湖知縣遷南京刑部主事歷工部郎中遷南昌知府正德六年贛州賊犯新淦執參政趙士賢靖安賊據越王嶺瑪瑙岸華林賊又陷瑞州諸道兵不敢前承勛督民兵剿數有功華林賊殺副使周憲憲軍大潰承勛單騎入憲營衆乃復集都御史陳金即檄承勛討之賊黨王奇聽撫搜得其衷刃縱使還奇感泣誓以死報承勛令奇密入寨説降其黨為內應而親率所部登山奇夜拔柵官軍奮而前降者自內出賊遂潰已從金斬賊渠羅光權胡雪二華林賊平鎮守中貴黎安誣承勛擅易賊首王浩八獄詞坐下吏大理卿燕忠即訊得白舉治行卓異超遷浙江按察使歷陝西河南左右布政使以右副都御史巡撫遼東邊備久弛開原尤甚士馬才十二牆堡墩臺圮殆盡將士依城塹自守城外數百里悉為諸部射獵地承勛疏請修築會世宗立發帑銀四十餘萬兩承勛命步將四人各一軍守要害身負畚鍤先士卒凡為城塹各九萬一千四百餘丈墩堡百八十有一招逋逃三千二百人開屯田千五百頃又城中固鐵嶺斷陰山遼河之交城蒲河撫順扼要衝邊防甚固録功進秩一等又數陳軍民利病咸報可以疾歸起故官蒞南院三遷刑部尚書加太子少保帝以京營多弊欲振飭之遂加承勛太子太保改兵部尚書兼左都御史專督團營尋兼掌都察院以疾三疏乞休且言山西潞城賊以四道兵討之不統於一人故無功川貴芒部之役措置乖方再勝再叛宜命伍文定深計毋專用兵豐沛河工二年三易大臣工不就宜令知水利者各陳所見而俾侍郎潘希曾度可否其尤要者在決壅蔽患倣唐宋轉對次對故事不時召見大臣帝不允辭下其議於所司時秦晉楚蜀歲祲詔免田賦承勛言有司例十月始徵賦今九月矣恐官吏督趣陰圖乾沒宜及其未徵遣官馳告以所蠲數山陬僻壤俾悉戶曉有司不能奉宣德意者罪之撫按失舉奏並坐帝褒納之奏奪京營把總湯清職郭勛為求復語侵承勛承勛因求退給事中王準等劾勛恣乃敕責勛而下清法司兵部尚書胡世寧致仕詔承勛還部代之疏言朝廷有大政及推舉文武大臣必下廷議議者率相顧不發拱手聽宜及未議前備條所議布告與議者俾先諗其故然後平心商質各盡所懷議苟不合聽其別奏庶足盡諸臣之見而所議者公帝然其言下詔申飭尋命兼督團營言官攻張璁桂萼黨並及承勛承勛連章求退帝復溫旨答之中官出鎮者率暴橫承勛因諫官李鳳毛等言先後裁二十七人又革錦衣官五百人監局冒役數千人獨御馬監未汰復因給事中田秋奏多所裁減而請以騰驤四衛屬部核詭冒制可中官言曩彰義門破也先東市剿曹賊皆四衛功以直內故易集隸兵部不便承勛言彰義門之戰禍由王振東市作賊即曹吉祥也帝卒從承勛議歸兵部寇犯大同議遣大臣督兵衆推都御史王憲憲不肯行給事中夏言謂承勛曰事急公當請行承勛竟不請給事中趙廷瑞並劾之會寇退罷十年春大風晝晦帝憂邊事承勛言去歲冰合敵騎盡入河套廷寧固原皆當警備甘肅軍餉專仰河東宜於蘭州糴貯以備緩急曩河西患土魯番今亦卜喇又深入兩寇雲擾孤危益甚套寇出入並經莊浪急宜繕塞設險斷臂截踵使不得相合兀良哈最近京師不善撫即門庭寇雲南安鳳之叛軍民困敝臨安蒙自盜賊復興曠日淹時恐釀大患交址世子流寓老撾異日歸命請援或據地求封皆未可測惟急用人理財俾邊鄙無虞帝嘉納焉承勛沉毅有大略帝所信任自輔臣外獨承勛與胡世寧大事輒咨訪二人亦孜孜奉國知無不言世寧卒半歲承勛亦卒帝深嗟悼贈少保諡康惠所賚豫常典外特賜白金綵幣米蔬諸物承勛官四十年家無餘資其議大禮亦與世寧相合云王以旗字士招江寧人正德六年進士除上高知縣華林賊方熾以旗訓鄉兵禦之賊不敢犯徵授御史出按河南宸濠反鎮守太監劉璟倡議停鄉試以旗言河南去江西遠罷試無名乃止璟又言帝親征道且出汴牒取供頓銀四萬兩巡撫議豫之以旗執不豫世宗即位欲加興獻帝皇號以旗抗言不可已上弭災要務言司禮取中旨免張漢贓科臣不預聞此啓矯偽之漸也帝不聽纍遷兵部右侍郎徐呂二洪竭漕舟膠命兼右僉都御史總理河漕踰年渠水通進秩一等尋拜南京右都御史召為工部尚書改左都御史代陳經為兵部尚書兼督團營三邊總督曾銑議復河套大學士夏言主之數下優旨奬銑令以旗集廷臣議以旗等力主銑議議上帝意忽變嚴旨咎銑令再議以旗等惶恐盡反前説帝逮銑令以旗代之套寇自西海還肆掠永昌鎮羌總兵官王繼祖禦却之已復來犯並及鎮番山丹部將蔡勳馬宗援三戰皆捷前後斬首一百四十餘級論功廕以旗一子已而寇數萬復屯寧夏塞外將大入官軍擊之斬首六十餘級寇宵遁延綏寧夏開馬市二鎮市五千匹其長狠台吉等約束所部終市無譁以旗以聞詔大賚二鎮文武將吏以旗復賜金幣録延綏將士破敵功再廕一子在鎮六年修延綏城堡四千五百餘所又築蘭州邊垣加官至太子太保比卒軍民為罷市贈少保諡襄敏再豫一子官范鏓字平甫其先江西樂平人遷瀋陽鏓登正德十二年進士授工部主事遷員外郎嘉靖三年伏闕爭大禮下獄廷杖由戶部郎中改長蘆運司同知遷河南知府歲大飢巡撫都御史潘塤駁諸請振文牒候勘實乃發鏓不待報輒開倉振之全活十餘萬民爭謳頌鏓語聞禁中帝為責戶部及塤與巡按御史匿災狀塤歸罪鏓以自解被劾罷去鏓名由此顯遷兩淮鹽運使條上鹺政十要歷四川參政湖廣按察使浙江河南左右布政使二十年擢右副都御史巡撫寧夏鏓為人持重有方略既涖重鎮不上首功一意練步騎廣儲蓄繕治關隘亭障寇為遠徙俘歸者五百人上疏言邊將各有常祿無給田之制自武定侯郭勛奏以軍餘開墾田園給將領委姦軍為莊頭害殊大宜給還軍民任耕種便帝從其請居數年引疾歸起故官撫河南尋召為兵部右侍郎轉左尚書王以旗出督三邊鏓署部事頃之奉詔總理邊關厄隘奉上經略潮河川居庸關諸處事宜請於古道門外蜂窩嶺增墩臺一為外屏濬濠設橋以防衝突川西南兩山對處各設敵臺以控中流分戍兵番直守要害又薊鎮五里垛划車𠾱連口慕田谷等地宜設墩臺惡谷紅土谷香爐石等地宜斬崖塹居庸關外諸口在宣府為內地在居庸則為邊藩宜敕東中路文武臣修築加潮河川提督為守備增副將居庸關領天壽山黃花鎮橫嶺守備塞懷來路增置新軍二千餘人資團練又議紫荊倒馬龍泉等關及山海關古北口經略事宜請於紫荊之桑谷倒馬之中窯關峪龍泉之陡石嶺諸要害創築城垣增設敵樓營舍薊州所轄燕河太平馬蘭密雲四路修築未竟者括諸司贖鍰竣之而浮圖峪插箭嶺尤為紫荊倒馬二關衝移參將分駐石門杜家莊俾保定總兵駐紫荊薊遼懸絶千里移建昌營遊擊於山海關三屯等營缺軍應速募馬不足者補入其常戍之兵介胄不備量給鎧仗番上者悉豫行糧毋俾荷戈枵腹又言諸路緩急以密雲之分守為最各關要害以密雲之迤西為最若燕河之冷口馬蘭之黃崖太平之榆木嶺擦崖子皆所急也宜敕撫鎮督諸將領分各營士馬兼側近按伏之兵迭為戰守兵部言軍戍久戀土猝移置恐他變莫若山海關增置能將一員募軍三千屯駐聽薊遼撫臣調度援燕河餘如鏓言下守臣議帝才鏓甚會兵部尚書趙廷瑞罷即命鏓入代鏓以老辭且言隨事通變乏將順之宜帝怒責鏓不恭削其籍時嚴嵩當國而鏓本由徐階薦天下推為長者惜其去不以罪然鏓罷帝召翁萬達甫至以憂去丁汝夔代之明年俺答逼都城汝夔遂誅死而鏓歸久之乃卒隆慶元年復官王邦瑞字惟賢宜陽人早有器識為諸生山東盜起上剿寇十四策於知府正德十二年成進士改庶吉士與王府有連出為廣德知州嘉靖初祖憂去補滁州屢遷南京吏部郎中出為陝西提學僉事坐歲貢不中式五名以上貶濱州知州再遷固原兵備副使涇邠巨盜李孟春流劫河東西剿平之以祖母憂去服除復提學陝西轉參政母憂解職起擢右僉都御史巡撫寧夏寇乘冰入犯設伏敗之改南京大理卿未上召為兵部右侍郎改吏部進左俺答犯都城命邦瑞總督九門邦瑞屯禁軍郭外以巡捕軍營東西長安街大啓郭門納四郊避寇者兵部尚書丁汝夔下獄命邦瑞攝其事兼督團營寇退請治諸將功罪且濬九門濠塹皆報可邦瑞見營制久弛極陳其弊遂罷十二團營悉歸三大營以咸寧侯仇鸞統之邦瑞亦改兵部左侍郎專督營務復條上興革六事中言宦官典兵古今大患請盡撤提督監槍者帝報從之又舉前編修趙時春工部主事申知兵並改兵部分理京營事未幾帝召兵部尚書翁萬達未至遲之遂命邦瑞代條上安攘十二事仇鸞搆邦瑞於帝帝眷漸移會鸞奏革薊州總兵官李鳳鳴大同總兵官王玉任而薦京營副將成勳代鳳鳴密雲副將徐仁代王玉旨從中下邦瑞言朝廷易置將帥必采之公卿斷自宸衷所以慎防杜漸示臣下不敢專也且京營大將與列鎮將不相統攝何緣京營乃黜陟各鎮今曲徇鸞請臣恐九邊將帥悉奔走托附非國之福也帝不悅下旨譙讓鸞又欲節制邊將罷築薊鎮邊垣邦瑞皆以為不可鸞大憾益肆讒搆會邦瑞復陳安攘大計遂嚴旨落職以冠帶辦事居數日大計自陳竟除名以趙錦代邦瑞去鸞益橫明年誅死錦亦坐黨比遣戍於是帝漸思之踰十年京營缺人帝曰非邦瑞不可乃起故官既至疏便宜數事悉允行踰年卒贈太子少保諡襄毅遣行人護喪歸葬邦瑞嚴毅有識量歷官四十年以廉節著子正國南京刑部侍郎鄭曉字窒甫海鹽人嘉靖元年舉鄉試第一明年成進士授職方主事日披故牘盡知天下厄塞士馬虛實強弱之數尚書金獻民屬撰九邊圖志人爭傳寫之以爭大禮廷杖大同兵變上疏極言不可赦張孚敬柄政器之欲改置翰林及言路曉皆不應父憂歸久之不起許讚為吏部尚書調之吏部歷考功郎中夏言罷相帝惡言官不糾劾詔考察去留大學士嚴嵩因欲去所不悅者而曉去喬佑等十三人多嵩所厚嵩大憾曉調文選嵩欲用趙文華為考功曉言於讚曰昔黃禎為文選調李開先考功皆山東人詔不許今調文華曉避位而已讚以謝嵩嵩欲以子世蕃為尚寶丞曉曰治中遷知府例也遷尚寶丞無故事嵩益怒以推謫降官周鈇等貶曉和州同知稍遷太僕丞歷南京太常卿召拜刑部右侍郎俄改兵部兼副都御史總督漕運大江南北皆中倭漕艘幾阻曉請發帑金數十萬造戰舸築城堡練兵將積芻糗詔從之中國姦民利倭賄多與通通州人顧表者尤桀黠為倭導以故營寨皆據要害盡知官兵虛實曉懸重賞捕戮之募鹽徒驍悍者為兵增設泰州海防副使築瓜洲城廟灣麻洋雲梯諸海口皆增兵設堠遂破倭於通州連敗之如皋海門襲其軍呂泗圍之狼山前後斬首九百餘賊潰去録功再增秩三賚銀幣時賊多中國人曉言武健才諝之徒困無所逞甘心作賊非國家廣行網羅使有出身之階恐有如孫恩盧循輩出乎其間禍滋大矣洪武時倭寇近海州縣以高皇帝威靈兼謀臣宿將築城練兵經略數年猶未乂安乃招漁丁島人鹽徒蛋戶籍為水軍至數萬人又遣使出海宣布威德久之倭始不為患今江北雖平而風帆出沒忽千里倭恃華人為耳目華人借倭為爪牙非詳為區畫後患未易弭也帝頗採納之尋召為吏部左侍郎遷南京吏部尚書帝以曉知兵改右都御史協理戎政尋拜刑部尚書俺答圍大同右衛急帝命兵部尚書楊博往督大師乃以曉攝兵部曉言今兵事方棘而所簡聽征京軍三萬五千人乃令執役赴工何以備戰守乞歸之營伍帝立從之尋還視刑部事嚴嵩勢益熾曉素不善嵩而其時大獄如總督王以失律中允郭希顏以言事曉並豫輕比嵩則置重典南都叛卒周山等殺侍郎黃懋官海寇汪直通倭為亂曉置重典嵩故寬假之惟巡撫阮鶚總督楊順御史路楷以嵩曲庇曉不能盡法議者譏其失出云故事在京軍民訟俱投牒通政司送法司問斷諸司有應鞫者亦參送法司無自決遣者後諸司不復遵守獄訟紛拏曉奏循故事帝報許於是刑部間捕囚畿府而巡按御史鄭存仁謂訟當自下而上檄州縣法司有追取毋輒發曉聞率侍郎趙大祐傅頤守故事爭存仁亦據律執奏章俱下都察院會刑科平議議未上曉疏辨嵩激帝怒切讓遂落曉職兩侍郎亦貶二秩曉通經術習國家典故時望蔚然為權貴所扼志不盡行既歸角巾布衣與鄉里父老遊處見者不知其貴人也既卒子履淳等訟曉禦倭功於朝詔復職隆慶初贈太子少保諡端簡履淳自有傳贊曰李鉞諸人皆以威略幹濟顯於時鉞與王憲王以旗之治軍旅李承勛范鏓之畫邊計才力均有過人者胡世寧奮不顧身首發姦逆危言正色始終一節易稱王臣蹇蹇世寧近之矣王邦瑞抵抗權幸躓而復起鄭曉諳悉掌故博洽多聞兼資文武所在著效亦不愧名臣云
