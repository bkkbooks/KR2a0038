body:
  text: 明史卷五本紀第五成祖一成祖啓天弘道高明肇運聖武神功純仁至孝文皇帝諱棣太祖第四子也母孝慈高皇后洪武三年封燕王十三年之藩北平王貌奇偉美髭髯智勇有大略能推誠任人二十三年同晉王討乃兒不花晉王怯不敢進王倍道趨迤都山獲其全部而還太祖大喜是後屢帥諸將出征並令王節制沿邊士馬王威名大振三十一年閏五月太祖崩皇太孫即位遺詔諸王臨國中毋得至京師王自北平入奔喪聞詔乃止時諸王以尊屬擁重兵多不法帝納齊泰黃子澄謀欲因事以次削除之憚燕王強未發乃先廢周王橚欲以牽引燕於是告訐四起湘代齊岷皆以罪廢王內自危佯狂稱疾泰子澄密勸帝除王帝未決建文元年夏六月燕山百戶倪諒告變逮官校於諒周鐸等伏誅下詔讓王並遣中官逮王府僚王遂稱疾篤都指揮使謝貴布政使張昺以兵守王宮王密與僧道衍謀令指揮張玉朱能潛納勇士八百人入府守衛秋七月癸酉匿壯士端禮門紿貴昺入殺之遂奪九門上書天子指泰子澄為奸臣並援祖訓朝無正臣內有奸惡則親王訓兵待命天子密詔諸王統領鎮兵討平之書既發遂舉兵自署官屬稱其師曰靖難拔居庸關破懷來執宋忠取密雲克遵化降永平二旬衆至數萬八月天子以耿炳文為大將軍帥師致討己酉師至真定前鋒抵雄縣壬子王夜渡白溝河圍雄拔其城屠之甲寅都指揮潘忠楊松自鄚州來援伏兵擒之遂據鄚州還駐白溝大將軍部校張保來降言大將軍軍三十萬先至者十三萬半營滹沱河南半營河北王懼與北軍戰南軍且乘之也乃縱保歸俾揚言王帥兵且至誘其軍盡北渡河壬戌王至真定與張玉談淵等夾擊炳文軍大破之獲其副將李堅寧忠及都督顧成等斬首三萬級進圍真定二日不下乃引去天子聞炳文敗遣曹國公李景隆代領其軍九月戊辰江陰侯吳高以遼東兵圍永平戊寅景隆合兵五十萬進營河間王語諸將曰景隆色厲而中餒聞我在必不敢遽來不若往援永平以致其師吳高怯不任戰我至必走然後還擊景隆堅城在前大軍在後必成擒矣丙戌燕師援永平壬辰吳高聞王至果走追擊敗之遂北趨大寧冬十月壬寅以計入其城居七日挾寧王權拔大寧之衆及𩽆顏三衛卒俱南乙卯至會州始立五軍張玉將中軍鄭亨何壽副之朱能將左軍朱榮李濬副之李彬將右軍徐理孟善副之徐忠將前軍陳文吳達副之房寬將後軍和允中毛整副之丁巳入松亭關景隆聞王征大寧果引軍圍北平築壘九門世子堅守不戰十一月庚午王次孤山邏騎還報曰白河流澌不可渡王禱於神至則冰合乃濟師景隆遣都督陳暉偵敵道左出王軍後王分軍還擊之暉衆爭渡河冰忽解溺死無算辛未與景隆戰於鄭村壩王以精騎先破其七營諸將繼至景隆大敗奔還乙亥復上書自訴十二月景隆調兵德州期以明年春大舉王乃謀侵大同曰攻大同彼必赴救大同苦寒南軍脆弱且不戰疲矣庚申降廣昌二年春正月丙寅克蔚州二月癸丑至大同景隆果由紫荊關來援王已旋軍居庸景隆兵多凍餒死者不見敵而還夏四月景隆進兵河間與郭英吳傑平安期會白溝河乙卯王營蘇家橋己未遇平安兵河側王以百騎前佯却誘安陳動乘之安敗走遂薄景隆軍戰不利暝收軍王以三騎殿夜迷失道下馬伏地視河流乃辨東西渡河去庚申復戰景隆橫陳數十里破燕後軍王自帥精騎橫擊之斬瞿能父子令丘福衝中堅不得入王蕩其左景隆兵乃繞出王後大戰良久飛矢雨注王三易馬矢盡揮劍劍折走登堤佯引鞭若招後繼者景隆疑有伏不敢前高煦救至乃解時南軍益集燕將士皆失色王奮然曰吾不進敵不退有戰耳乃復以徑卒突出其背夾攻之會旋風起折景隆旗王乘風縱火奮擊斬首數萬溺死者十餘萬人郭英潰而西景隆潰而南盡喪其所賜璽書斧鉞走德州五月癸酉王入德州景隆走濟南庚辰攻濟南敗景隆軍城下鐵鉉盛庸堅守不克秋八月戊申解圍還北平九月盛庸代李景隆將復取德州與吳傑平安徐凱相掎角以困北平時徐凱方城滄州王佯出兵攻遼東至通州循河而南渡直沽晝夜兼行冬十月戊午襲執徐凱破其城夜坑降卒三千人遂渡河過德州盛庸遣兵來襲擊敗之十一月壬申至臨清十二月丁酉襲破盛庸將孫霖於滑口乙卯及庸戰於東昌庸以火器徑弩殲王兵會平安軍至合圍數重王大敗潰圍以免亡數萬人張玉戰死三年春正月辛酉敗吳傑平安於威縣又敗之於深州遂還北平二月乙巳復帥師南下三月辛巳與盛庸遇於夾河談淵戰死朱能張武殊死鬬庸軍少却會日暮各斂兵入營王以十餘騎逼庸營野宿及明起視已在圍中乃從容引馬鳴角穿營而去諸將以天子有詔毋使負殺叔父名倉卒相顧愕眙不敢發一矢是日復戰自辰至未兩軍相勝負東北風忽起塵埃蔽天燕兵大呼乘風縱擊庸大敗走德州吳傑平安自真定引軍與庸會未至八十里聞敗引還王以計誘之傑安出兵襲王閏月戊戌遇於藁城己亥與戰大風拔木傑安敗走追至真定城下癸丑至大名聞齊泰黃子澄已罷上書請召還吳傑平安盛庸兵天子使大理少卿薛嵓來報諭王釋甲王不奉詔夏五月傑安庸分兵斷燕餉道王遣指揮武勝上書詰其故天子怒下勝獄王遂遣李遠略沛縣焚糧舟萬計秋七月己丑掠彰德丙申降林縣平安乘虛搗北平王遣劉江迎戰安敗走房昭屯易州西水寨攻保定王引兵圍之冬十月丁巳都指揮花英援昭敗之峨眉山下斬首萬級昭棄寨走己卯還北平十一月乙巳王自為文祭南北陳亡將士當是時王稱兵三年矣親戰陳冒矢石以身先士卒常乘勝逐北然亦屢瀕於危所克城邑兵去旋復為朝廷守僅據有北平保定永平三府而已無何中官被黜者來奔具言京師空虛可取狀王乃慨然曰頻年用兵何時已乎要當臨江一決不復返顧矣十二月丙寅復出師四年春正月乙未由館陶渡河癸丑徇徐州三月壬辰平安以四萬騎躡王軍王設伏淝河大敗之丙午遣談清斷徐州餉道還至大店為鐵鉉軍所圍王引兵馳援清突圍出合擊敗之夏四月丙寅王營小河為橋以濟平安趨爭橋陳文戰死平安軍橋南王軍橋北相持數日平安轉戰遇王於北坂王幾為安槊所及番騎王騏躍入陳掖王逸去王曰南軍饑更一二日餉至猝未易破乃令千餘人守橋夜半渡河而南繞出安軍後比旦安始覺適徐輝祖來會甲戌大戰齊眉山下時燕連失大將淮土盛暑蒸濕諸將請休軍小河東就麥觀釁王曰今敵持久饑疲遮其餉道可以坐困奈何北渡懈將士心乃下令欲渡河者左諸將爭趨左王怒曰任公等所之乃無敢復言丁丑何福等營靈璧燕遮其餉道平安分兵六萬人護之己卯王帥精鋭橫擊斷其軍為二何福空壁來援王軍少却高煦伏兵起福敗走辛巳進薄其壘破之生擒平安陳暉等三十七人何福走免五月己丑下泗州謁祖陵賜父老牛酒辛卯盛庸扼淮南岸朱能丘福潛濟襲走之遂克盱眙癸巳王集諸將議所向或言宜取鳳陽或言先取淮安王曰鳳陽樓櫓完淮安多積粟攻之未易下不若乘勝直趨揚州指儀真則淮鳳自震我耀兵江上京師孤危必有內變諸將皆曰善己亥徇揚州駐軍江北天子遣慶成郡主至軍中許割地以和不聽六月癸丑江防都督僉事陳瑄以舟師叛附於王甲寅祭大江乙卯自瓜州渡盛庸以海艘迎戰敗績戊午下鎮江庚申次龍潭辛酉天子復遣大臣議割地諸王繼至皆不聽乙丑至金川門谷王橞李景隆等開門納王都城遂陷是日王分命諸將守城及皇城還駐龍江下令撫安軍民大索齊泰黃子澄方孝孺等五十餘人榜其姓名曰奸臣丙寅諸王羣臣上表勸進己巳王謁孝陵羣臣備法駕奉寶璽迎呼萬歲王升輦詣奉天殿即皇帝位復周王橚齊王榑爵壬申葬建文皇帝丁丑殺齊泰黃子澄方孝孺並夷其族坐奸黨死者甚衆戊寅遷興宗孝康皇帝主於陵園仍稱懿文太子秋七月壬午朔大祀天地於南郊奉太祖配詔今年以洪武三十五年為紀明年為永樂元年建文中更改成法一復舊制山東北平河南被兵州縣復徭役三年未被兵者與鳳陽淮安徐滁揚三州蠲租一年餘天下州縣悉蠲今年田租之半癸未召前北平按察使陳瑛為左副都御史盡復建文朝廢斥者官甲申復官制癸巳改封吳王允熥廣澤王衡王允熞懷恩王徐王允敷惠王隨母妃呂氏居懿文太子陵園癸卯江陰侯吳高督河南陝西兵備撫安軍民甲辰尚書嚴震直王鈍府尹薛正言等巡視山西山東河南陝西八月壬子侍讀解縉編修黃淮入直文淵閣尋命侍讀胡廣修撰楊榮編修楊士奇檢討金幼孜胡儼同入直並預機務執兵部尚書鐵鉉至不屈殺之左軍都督劉真鎮遼東丁巳分遣御史察天下利弊戊午都督何福為征虜將軍鎮寧夏節制陝西行都司都督同知韓觀練兵江西節制廣東福建甲子西平侯沐晟鎮雲南九月甲申論靖難功封丘福淇國公朱能成國公張武等侯者十三人徐祥等伯者十一人論發附功封駙馬都尉王寧為侯茹瑺陳瑄及都督同知王佐皆為伯甲午定功臣死罪減祿例乙未徙山西民無田者實北平賜之鈔復五年韓觀為征南將軍鎮廣西冬十月丁巳命北平州縣棄官避靖難兵者朱寧等二百一十九人入粟免死戍興州己未修太祖實録丙寅鎮遠侯顧成鎮貴州壬申徙封谷王橞於長沙甲戌詔從征將士掠民間子女者還其家十一月壬辰立妃徐氏為皇后廢廣澤王允熥懷恩王允熞為庶人十二月癸丑蠲被兵州縣明年夏稅
