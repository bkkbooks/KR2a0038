body:
  text: 明史卷八十四志第六十河渠二黃河下萬曆元年河決房村築堤窪子頭至秦溝口明年給事中鄭岳言運道自茶城至淮安五百餘里自嘉靖四十四年河水大發淮口出水之際海沙漸淤今且高與山等自淮而上河流不迅泥水愈淤於是邳州淺房村決呂梁二洪平茶城倒流皆坐此也今不治海口之沙乃日築徐沛間堤岸桃宿而下聽其所之民之為魚未有已時也因獻宋李公義王令圖濬川爬法命河臣勘奏從其所言而是年秋淮河並溢明年八月河決碭山及邵家口曹家莊韓登家口而北淮亦決高家堰而東徐邳淮南北漂沒千里自此桃清上下河道淤塞漕艘梗阻者數年淮揚多水患矣總河都御史傅希摯改築碭山月堤暫留三口為洩水之路其冬並塞之四年二月督漕侍郎吳桂芳言淮揚洪潦奔衝蓋緣海濱汊港久堙入海止雲梯一徑致海擁橫沙河流汎溢而鹽安高寶不可收拾國家轉運惟知急漕而不暇急民故朝廷設官亦主治河而不知治海請設水利僉事一員專疏海道審度地利如草灣及老黃河皆可趨海何必專事雲梯哉帝優詔報可桂芳復言黃水抵清河與淮合流經清江浦外河東至草灣又折而西南過淮安新城外河轉入安東縣前直下雲梯關入海近年關口多壅河流日淺惟草灣地低下黃河衝決駸駸欲奪安東入海以縣治所關屢決屢塞去歲草灣迤東自決一口宜於決口之西開挑新口以迎埽灣之溜而於金城至五港岸築堤束水語云救一路哭不當復計一家哭今淮揚鳳泗邳徐不啻一路矣安東自眾流匯圍祇文廟縣署僅存椽瓦其勢垂陷不如委之以拯全淮帝不欲棄安東而命開草灣如所請八月工竣長萬一千一百餘丈塞決口二十二役夫四萬四千帝以海口開濬水患漸平賚桂芳等有差未幾河決韋家樓又決沛縣縷水堤豐曹二縣長堤豐沛徐州睢寧金鄉魚臺單曹田廬漂溺無算河流齧宿遷城帝從桂芳請遷縣治築土城避之於是御史陳世寶請復老黃河故道言河自桃源三義鎮歷清河縣北至大河口會淮入海運道自淮安天妃廟亂淮而下十里至大河口從三義鎮出口向桃源大河而去凡七十餘里是為老黃河至嘉靖初三義鎮口淤而黃河改趨清河縣南與淮會自此運道不由大河口而徑由清河北上矣近者崔鎮屢決河勢漸趨故道若仍開三義鎮口引河入清河北或令出大河口與淮流合或從清河西別開一河引淮出河上游則運道無恐而淮泗之水不為黃流所漲部覆允行桂芳言淮水向經清河會黃河趨海自去秋河決崔鎮清江正河淤澱淮口梗塞於是淮弱河強不能奪草灣入海之途而全淮南徙橫灌山陽高寶間向來湖水不踰五尺堤僅七尺今堤加丈二而水更過之宜急護湖堤以殺水勢部議以為必淮有所歸而後堤可保請令桂芳等熟計報可開河護堤二說未定而河復決崔鎮宿沛清桃兩岸多壞黃河日淤墊淮水為河所迫徙而南時五年八月也希摯議塞決口束水歸漕桂芳欲衝刷成河以為老黃河入海之路帝令急塞決口而俟水勢稍定乃從桂芳言時給事中湯聘尹議導淮入江以避黃會桂芳言黃水向老黃河故道而去下奔如駛淮遂乘虛湧入清口故道淮揚水勢漸消部議行勘以河淮既合乃寢其議管理南河工部郎中施天麟言淮泗之水不下清口而下山陽從黃浦口入海浦口不能盡洩浸淫高寶邵伯諸湖而湖堤盡沒則以淮泗本不入湖而今入湖故也淮泗之入湖者又緣清口向未淤塞而今淤塞故也清口之淤塞者又緣黃河淤塞日高淮水不得不讓河而南徙也蓋淮水併力敵黃勝負或亦相半自高家堰廢壞而清口內通濟橋朱家等口淮水內灌於是淮泗之力分而黃河得以全力制其敝此清口所以獨淤於今歲也下流既淤則上流不得不決每歲糧艘以四五月畢運而堤以六七月壞水發之時不能為力水落之後方圖堵塞甫及春初運事又迫僅完堤工於河身無與河身不挑則來年益高上流之決必及於徐呂而不止於邳遷下流之涸將盡乎邳遷而不止於清桃須不惜一年糧運不惜數萬帑藏開挑正河寬限責成乃為一勞永逸至高家堰朱家等口宜及時築塞使淮泗併力足以敵黃則淮水之故道可復高寶之大患可減若興鹽海口堙塞亦宜大加疏濬而湖堤多建減水大閘堤下多開支河要未有不先黃河而可以治淮亦未有不疏通淮水而可以固堤者也事下河漕諸臣會議淮之出清口也以黃水由老黃河奔注而老黃河久淤未幾復塞淮水仍漲溢給事中劉鉉請亟開通海口而簡大臣會同河漕諸臣往治乃命桂芳為工部尚書兼理河漕而裁總河都御史官桂芳甫受命而卒六年夏潘季馴代時給事中李淶請多濬海口以導眾水之歸給事中王道成則請塞崔鎮決口築桃宿長堤修理高家堰開復老黃河並下河臣議季馴與督漕侍郎江一麟相度水勢言海口自雲梯關四套以下闊七八里至十餘里深三四丈欲別議開鑿必須深闊相類方可注放工力甚難且未至海口乾地猶可施工其將入海之地潮汐往來與舊口等耳舊口皆係積沙人力雖不可濬水力自能衝刷海無可濬之理惟當導河歸海則以水治水即濬海之策也河亦非可以人力導惟當繕治堤防俾無旁決則水由地中沙隨水去即導河之策也頻年以來日以繕堤為事顧卑薄而不能支迫近而不能容雜以浮沙而不能久是以河決崔鎮水多北潰為無堤也淮決高家堰黃浦口水多東潰堤弗固也不咎制之未備而咎築堤為下策豈通論哉上流既旁潰又岐下流而分之其趨雲梯入海口者譬猶強弩之末耳水勢益分則力益弱安能導積沙以注海故今日濬海急務必先塞決以導河尤當固堤以杜決而欲堤之不決必真土而勿雜浮沙高厚而勿惜鉅費讓遠而勿與爭地則堤乃可固也沿河堤固而崔鎮口塞則黃不旁決而衝漕力專高家堰築朱家口塞則淮不旁決而會黃力專淮黃既合自有控海之勢又懼其分而力弱也必暫塞清江浦河而嚴司啟閉以防其內奔姑置草灣河而專復雲梯以還其故道仍接築淮安新城長堤以防其末流使黃淮力全涓滴悉趨於海則力強且專下流之積沙自去海不濬而闢河不挑而深所謂固堤即以導河導河即以濬海也又言黃水入徐歷邳宿桃清至清口會淮而東入海淮水自洛及鳳歷盱泗至清口會河而東入海此兩河故道也元漕江南粟則由揚州直北廟灣入海未嘗遡淮陳瑄始堤管家諸湖通淮為運道慮淮水漲溢則築高家堰堤以捍之起武家墩經大小澗至阜寧湖而淮不東侵又慮黃河漲溢則堤新城北以捍之起清江浦沿鉢池山柳浦灣迤東而黃不南侵其後堤岸漸傾水從高堰決入淮郡遂同魚鼈而當事者未考其故謂海口壅閉宜亟穿支渠詎知草灣一開西橋以上正河遂至淤阻夫新河闊二十餘丈深僅丈許較故道僅三十之一豈能受全河之水下流既壅上流自潰此崔鎮諸口所由決也今新河復塞故河漸已通流雖深闊未及原河十一而兩河全下沙隨水刷欲其全復河身不難也河身既復闊者七八里狹亦不下三四百丈滔滔東下何水不容匪惟不必別鑿他所即草灣亦可置勿濬矣故為今計惟修復陳瑄故蹟高築南北兩堤以斷兩河之內灌則淮揚昏墊可免塞黃浦口築寶應堤濬東關等淺修五閘復五壩則淮南運道無虞堅塞桃源以下崔鎮口諸決則全河可歸故道黃淮既無旁決並驅入海則沙隨水刷海口自復而桃清淺阻又不足言此以水治水之法也若夫爬撈之說僅可行諸閘河前人屢試無功徒費工料於是條上六議曰塞決口以挽正河曰築堤防以杜潰決曰復閘壩以防外河曰創滾水壩以固堤岸曰止濬海工程以省糜費曰寢開老黃河之議以仍利涉帝悉從其請七年十月兩河工成賚季馴一麟銀幣而遣給事中尹瑾勘實八年春進季馴太子太保工部尚書廕一子一麟等遷擢有差是役也築高家堰堤六十餘里歸仁集堤四十餘里柳浦灣堤東西七十餘里塞崔鎮等決口百三十築徐睢邳宿桃清兩岸遙堤五萬六千餘丈碭豐大壩各一道徐沛豐碭縷堤百四十餘里建崔鎮徐昇季泰三義減水石壩四座遷通濟閘於甘羅城南淮揚間堤壩無不修築費帑金五十六萬有奇其秋擢季馴南京兵部尚書季馴又請復新集至小浮橋故道給事中王道成河南巡撫周鑑等不可而止自桂芳季馴時罷總河不設其後但以督漕兼理河道高堰初築清口方暢流連數年河道無大患至十五年封丘偃師東明長垣屢被衝決大學士申時行言河所決地在三省守臣畫地分修易推委河道未大壞不必設都御史宜遣風力老成給事中一人行河乃命工科都給事中常居敬往居敬請修築大社集東至白茅集長堤百里從之初黃河由徐州小浮橋入運其河深且近洪能刷洪以深河利於運道後漸徙沛縣飛雲橋及徐州大小溜溝至嘉靖末決邵家口出秦溝由濁河口入運河淺迫茶城茶城歲淤運道數害萬曆五年冬河復南趨出小浮橋故道未幾復堙潘季馴之塞崔鎮也厚築堤岸束水歸漕嗣後水發河臣輒加堤而河身日高矣於是督漕僉都御史楊一魁欲復黃河故道請自歸德以下丁家道口濬至石將軍廟令河仍自小浮橋出又言善治水者以疏不以障年來堤上加堤水高凌空不啻過顙濱河城郭決水可灌宜測河身深淺隨處挑濬而於黃河分流故道設減水石門以洩暴漲給事中王士性則請復老黃河故道大略言自徐而下河身日高而為堤以束之堤與徐州城等束益急流益迅委全力於淮而淮不任故昔之黃淮合今黃強而淮益縮不復合矣黃強而一啟天妃通濟諸閘則灌運河如建瓴高寶一梗江南之運坐廢淮縮則退而侵泗為祖陵計不得不建石堤護之堤增河益高根本大可虞也河至清河凡四折而後入海淮安高寶鹽興數百萬生靈之命託之一丸泥決則盡成魚蝦矣紛紛之議有欲增堤泗州者有欲開顏家灌口永濟三河南甃高家堰北築滾水壩者總不如復河故道為一勞永逸之計也河故道由三義鎮達葉家衝與淮合在清河縣北別有濟運河在縣南蓋支河耳河強奪支河直趨縣南而自棄北流之道然河形固在也自桃源至瓦子灘凡九十里窪下不耕無室廬墳墓之礙雖開河費鉅而故道一復為利無窮議皆未定居敬及御史喬璧星皆請復專設總理大臣乃復命潘季馴為右都御史總督河道時帝從居敬言罷老黃河議而季馴抵官言新集故道故老言銅幫鐵底當開但歲儉費繁未能遽行又言黃水濁而強汶泗清且弱交會茶城伏秋黃水發則倒灌入漕沙停而淤勢所必至然黃水一落漕即從之沙隨水去不濬自通縱有淺阻不過旬日往時建古洪內華二閘黃漲則閉閘以遏濁流黃退則啟閘以縱泉水近者居敬復增建鎮口閘去河愈近則吐納愈易但當嚴閘禁如清江浦三閘之法則河渠永賴矣帝方委季馴即從其言罷故道之議未幾水患益甚十七年六月黃水暴漲決獸醫口月堤漫李景高口新堤衝入夏鎮內河壞田廬沒人民無算十月決口塞十八年大溢徐州水積城中者逾年眾議遷城改河季馴濬魁山支河以通之起蘇伯湖至小河口積水乃消十九年九月泗州大水州治淹三尺居民沉溺十九浸及祖陵而山陽復河決江都邵伯又因湖水下注田廬浸傷工部尚書曾同亨上其事議者紛起乃命工科給事中張貞觀往泗州勘視水勢而從給事中楊其休言放季馴歸用舒應龍為工部尚書總督河道二十年三月季馴將去條上辨惑者六事力言河不兩行新河不當開支渠不當濬又著書曰河防一覽大旨在築堤障河束水歸漕築堰障淮逼淮注黃以清刷濁沙隨水去合則流急急則蕩滌而河深分則流緩緩則停滯而沙積上流既急則海口自闢而無待於開其治堤之法有縷堤以束其流有遙堤以寬其勢有滾水壩以洩其怒法甚詳言甚辨然當是時水勢橫潰徐泗淮揚間無歲不受患祖陵被水季馴謂當自消已而不驗於是季馴言詘而分黃導淮之議由此起矣貞觀抵泗州言臣謁祖陵見泗城如水上浮盂盂中之水復滿祖陵自神路至三橋丹墀無一不被水且高堰危如累卵又高寶隱禍也今欲洩淮當以闢海口積沙為第一義然洩淮不若殺黃而殺黃於淮流之既合不若殺於未合但殺於既合者與運無妨殺於未合者與運稍礙別標本究利害必當殺於未合之先至於廣入海之途則自鮑家口黃家營至魚溝金城左右地勢頗下似當因而利導之貞觀又會應龍及總漕陳于陛等言淮黃同趨者惟海而淮之由黃達海者惟清口自海沙開濬無期因而河身日高自河流倒灌無已因而清口日塞以致淮水上浸祖陵漫及高寶而興泰運堤亦衝決矣今議闢清口沙且分黃河之流於清口上流十里地去口不遠不至為運道梗分於上復合於下則衝海之力專合必於草灣之下恐其復衝正河為淮城患也塞鮑家口黃家營二決恐橫衝新河散溢無歸兩岸俱堤則東北清沭海安窪下地不虞潰決計費凡三十六萬有奇若海口之塞則潮汐莫窺其涯難施畚鍤惟淮黃合流東下河身滌而漸深海口刷而漸闢亦事理之可必者帝悉從其請乃議於清口上流北岸開腰鋪支河達於草灣既而淮水自決張福堤直隸巡按彭應參言祖陵度可無虞且方東備倭警宜暫停河工部議令河臣熟計應龍貞觀言為祖陵久遠計支河實必不容已之工請候明春倭警寧息舉行其事遂寢二十一年春貞觀報命議開歸徐達小河口以救徐邳之溢導濁河入小浮橋故道以紓鎮口之患下總河會官集議未定五月大雨河決單縣黃堌口一由徐州出小浮橋一由舊河達鎮口閘邳城陷水中高寶諸湖堤決口無算明年湖堤盡築塞而黃水大漲清口沙墊淮水不能東下於是挾上源阜陵諸湖與山溪之水暴浸祖陵泗城淹沒二十三年又決高郵中堤及高家堰高良澗而水患益急矣先是御史陳邦科言固堤束水未收刷沙之利而反致衝決法當用濬其方有三冬春水涸令沿河淺夫乘時撈淺則沙不停而去一也官民船往來船尾悉繫鈀犁乘風搜滌則沙不寧而去二也倣水磨水碓之法置為木機乘水滾盪則沙不留而去三也至淮必不可不會黃故高堰斷不可棄湖溢必傷堤故周家橋潰處斷不可開已棄之道必淤滿故老黃河草灣等處斷不可復疏下所司議戶部郎中華存禮則請復黃河故道幷濬草灣而是時腰鋪猶未開工部侍郎沈節甫言復黃河未可輕議至諸策皆第補偏救弊而已宜概停罷乃召應龍還工部時二十二年九月也既而給事中吳應明言先因黃河遷徙無常設遙縷二堤束水歸漕及水過沙停河身日高徐邳以下居民盡在水底今清口外則黃流阻遏清口內則淤沙橫截強河橫灌上流約百里許淮水僅出沙上之浮流而瀦蓄於盱泗者遂為祖陵患矣張貞觀所議腰鋪支河歸之草灣或從清河南岸別開小河至駱家營馬廠等地出會大河建閘啟閉一遇運淺即行此河亦策之便者至治泗水則有議開老子山引淮水入江者宜置閘以時啟閉拆張福堤而堤清口使河水無南向部議下河漕諸臣會勘直隸巡按牛應元因謁祖陵目擊河患繪圖以進因上疏言黃高淮壅起於嘉靖末年河臣鑿徐呂二洪巨石而沙日停河身日高潰決由此起當事者計無復之兩岸築長堤以束曰縷堤縷堤復決更於數里外築重堤以防曰遙堤雖歲決歲補而莫可誰何矣黃淮交會本自清河北二十里駱家營折而東至大河口會淮所稱老黃河是也陳瑄以其迂曲從駱家營開一支河為見今河道而老黃河淤矣萬曆間復開草灣支河黃舍故道而趨以致清口交會之地二水相持淮不勝黃則竄入各閘口淮安士民於各閘口築一土埂以防之嗣後黃淮暴漲水退沙停清口遂淤今稱門限沙是也當事者不思挑門限沙乃傍土埂築高堰橫亙六十里置全淮正流之口不事復將從旁入黃之張福口一幷築堤塞之遂倒流而為泗陵患矣前歲科臣貞觀議闢門限沙裁張福堤其所重又在支河腰鋪之開總之全口淤沙未盡挑闢即腰鋪工成淮水未能出也況下流鮑王諸口已決難以施工豈若復黃河故道盡闢清口淤沙之為要乎且疏上流不若科臣應明所議就草灣下流濬諸決口俾由安東歸五港或於周家橋量為疏通而急塞黃堌口挑蕭碭渠道濬符離淺阻至宿遷小河為淮水入黃正路急宜挑闢使有所歸應龍言張福堤已決百餘丈清口方挑沙而腰鋪之開尤不可廢工部侍郎沈思孝因言老黃河自三義鎮至葉家衝僅八千餘丈河形尚存宜亟開濬則河分為二一從故道抵顏家河入海一從清口會淮患當自弭請遣風力科臣一人與河漕諸臣定畫一之計乃命禮科給事中張企程往勘而以水患累年迄無成畫遷延糜費罷應龍職為民常居敬張貞觀彭應參等皆譴責有差御史高舉請疏周家橋裁張福堤闢門限沙建滾水石壩於周家橋大小澗口武家墩綠楊溝上下而壩外濬河築岸使行地中改塘埂十二閘為壩灌閘外十二河以闢入海之路濬芒稻河且多建濱江水閘以廣入江之途然海口日壅則河沙日積河身日高而淮亦不能安流有灌口者視諸口頗大而近日所決蔣家鮑家畀家三口直與相射宜挑濬成河俾由此入海工部主事樊兆程亦議闢海口而言舊海口決不可濬當自鮑家營至五港口挑濬成河令從灌口入海俱下工部請幷委企程勘議是時總河工部尚書楊一魁被論乞罷因言清口宜濬黃河故道宜復高堰不必修石堤不必砌減水閘壩不必用帝不允辭而詔以盡心任事御史夏之臣則言海口沙不可劈草灣河不必濬腰鋪新河四十里不必開雲梯關不必闢惟當急開高堰以救祖陵且言歷年以來高良澗土堤每遇伏秋即衝決大澗口石堤每遇洶湧即崩潰是高堰在為高寶之利小而高堰決則為高寶之害大也孰若明議而明開之使知趨避乎給事中黃運泰則又言黃河下流未洩而遽開高堰周橋以洩淮水則淮流南下黃必乘之高寶間盡為沼而運道月河必衝決矣不如濬五港口達灌口門以入於海之為得也詔幷行勘議企程乃上言前此河不為陵患自隆慶末年高寶淮揚告急當事狃於目前清口既淤又築高堰以遏之堤張福以束之障全淮之水與黃角勝不虞其勢不敵也迨後甃石加築堙塞愈堅舉七十二溪之水匯於泗者僅留數丈一口出之出者什一停者什九河身日高流日壅淮日益不得出而瀦蓄日益深安得不倒流旁溢為泗陵患乎今議疏淮以安陵疏黃以導淮者言人人殊而謂高堰當決者臣以為屏翰淮揚殆不可少莫若於其南五十里開周家橋注草子湖大加開濬一由金家灣入芒稻河注之江一由子嬰溝入廣洋湖達之海則淮水上流半有宣洩矣於其北十五里開武家墩注永濟河由窰灣閘出口直達涇河從射陽湖入海則淮水下流半有歸宿矣此急救祖陵第一義也會是時祖陵積水稍退一魁以聞帝大悅仍諭諸臣急協議宣洩於是企程一魁共議欲分殺黃流以縱淮別疏海口以導黃而督漕尚書褚鈇則以江北歲祲民不堪大役欲先洩淮而徐議分黃御史應元折衷其說言導淮勢便而功易分黃功大而利遠顧河臣所請亦第六十八萬金國家亦何靳於此御史陳煃嘗令寶應慮周家橋既開則以高郵邵伯為壑運道民產鹽場交受其害上疏爭之語甚激大旨分黃為先而淮不必深治且欲多開入海之路令高寶諸湖之水皆東而後周家橋武家墩之水可注而淮安知府馬化龍復進分黃五難之說潁州兵備道李弘道又謂宜開高堰鈇遂據以上聞給事中林熙春駁之言淮猶昔日之淮而河非昔日之河先是河身未高而淮尚安流今則河身既高而淮受倒灌此導淮固以為淮分黃亦以為淮工部乃覆奏云先議開腰鋪支河以分黃流以倭儆災傷停寢遂貽今日之患今黃家壩分黃之工若復沮格淮壅為害誰職其咎請令治河諸臣導淮分黃亟行興舉報可二十四年八月一魁興工未竣復條上分淮導黃事宜十事十月河工告成直隸巡按御史蔣春芳以聞復條上善後事宜十六事乃賞賚一魁等有差是役也役夫二十萬開桃源黃河壩新河起黃家嘴至安東五港灌口長三百餘里分洩黃水入海以抑黃強闢清口沙七里建武家墩高良澗周家橋石閘洩淮水三道入海且引其支流入江於是泗陵水患平而淮揚安矣然是時一魁專力桃清淮泗間而上流單縣黃堌口之決以為不必塞鈇及春芳皆請塞之給事中李應策言漕臣主運河臣主工各自為見宜再令析議一魁言黃堌口一支由虞城夏邑接碭山蕭縣宿州至宿遷出白洋河一小支分蕭縣兩河口出徐州小浮橋相距不滿四十里當疏濬與正河會更通鎮口閘𩹉湖之水與小浮橋二水會則黃堌口不必塞而運道無滯矣從之於是議濬小浮橋沂河口小河口以濟徐邳運道以洩碭蕭漫流培歸仁堤以護陵寢是時徐邳復見清泗運道不利鈇終以為憂二十五年正月復極言黃堌口不塞則全河南徙害且立見議者亦多恐下齧歸仁為二陵患三月小浮橋等口工垂竣一魁言運道通利河徙不相妨已有明驗惟議者以祖陵為慮請徵往事折之洪武二十四年河決原武東南至壽州入淮永樂九年河北入魚臺未幾復南決由渦河經懷遠入淮時兩河合流歷鳳泗以出清口未聞為祖陵患正統十三年河北衝張秋景泰中徐有貞塞之復由渦河入淮弘治二年河又北衝白昂劉大夏塞之復南流一由中牟至潁壽一由亳州至渦河入淮一由宿遷小河口會泗全河大勢縱橫潁亳鳳泗間下溢符離睢宿未聞為祖陵慮亦不聞堤及歸仁也正德三年後河漸北徙由小浮橋飛雲橋穀亭三道入漕盡趨徐邳出二洪運道雖濟而泛溢實甚嘉靖十一年朱裳始有渦河一支中經鳳陽祖陵未敢輕舉之說然當時猶時濬祥符之董盆口寧陵之五里鋪滎澤之孫家渡蘭陽之趙皮寨又或決睢州之地丘店界牌口野雞岡寧陵之楊村鋪俱入舊河從亳鳳入淮南流未絕亦何嘗為祖陵患嘉靖二十五年後南流故道始盡塞或由秦溝入漕或由濁河入漕五十年來全河盡出徐邳奪泗入淮而當事者方認客作主日築堤而窘之以致河流日壅淮不敵黃退而內瀦遂貽盱泗祖陵之患此實由內水之停壅不由外水之衝射也萬曆七年潘季馴始慮黃流倒灌小河白洋等口挾諸河水衝射祖陵乃作歸仁堤為保障計復張大其說謂祖陵命脈全賴此堤習聞其說者遂疑黃堌之決下齧歸仁不知黃堌一決下流易洩必無上灌之虞況今小河不日竣工引河復歸故道去歸仁益遠奚煩過計為報可一魁既開小浮橋築義安山濬小河口引武沂泉濟運及是年四月河復大決黃堌口溢夏邑永城由宿州符離橋出宿遷新河口入大河其半由徐州入舊河濟運上源水枯而義安束水橫壩復衝二十餘丈小浮橋水脈微細二洪告涸運道阻澀一魁因議挑黃堌口迤上埽灣淤嘴二處且大挑其下李吉口北下濁河救小浮橋上流數十里之涸復上言黃河南旋至韓家道盤岔河丁家莊俱岸闊百丈深踰二丈乃銅幫鐵底故道也至劉家窪始強半南流得山西坡永涸湖以為壑出溪口入符離河亦故道也惟徐邳運道淺涸所以首議開小浮橋再加挑闢必大為運道之利乃欲自黃堌挽回全河必須挑四百里淤高之河身築三百里南岸之長堤不惟所費不貲竊恐後患無已御史楊光訓等亦議挑埽灣直渠展濟濁河及築山西坡歸仁堤與一魁合獨鈇異議帝命從一魁言一魁復言歸仁在西北泗州在東南相距百九十里中隔重岡疊嶂且歸仁之北有白洋河朱家溝周家溝胡家溝小河口洩入運河勢如建瓴即無歸仁祖陵無足慮濁河淤墊高出地上曹單間闊一二百丈深二三丈尚不免橫流徐邳間僅百丈深止丈餘徐西有淺至二三尺者而夏永韓家道口至符離河闊深視曹單避高就下水之本性河流所棄自古難復且運河本藉山東諸泉不資黃水惟當倣正統間二洪南北口建閘之制於鎮口之下大浮橋之上呂梁之下洪邳州之沙坊各建石閘節宣汶泗而以小浮橋沂河口二水助之更於鎮口西築壩截黃開唐家口而注之龍溝會小浮橋入運以杜灌淤鎮口之害實萬全計也報可二十六年春從楊光訓等議撤鈇命一魁兼管漕運六月召一魁掌部事命劉東星為工部侍郎總理河漕二十七年春東星上言河自商虞而下由丁家道口抵韓家道口趙家圈石將軍廟兩河口出小浮橋下二洪乃賈魯故道也自元及我朝行之甚利嘉靖三十七年北徙濁河而此河遂淤潘季馴議復開之以工費浩繁而止今河東決黃堌由韓家道口至趙家圈百餘里衝刷成河即季馴議復之故道也由趙家圈至兩河口直接三仙臺新渠長僅四十里募夫五萬濬之踰月當竣而大挑運河小挑濁河俱可節省惟李吉口故道嘗挑復淤去冬已挑數里前功難棄然至鎮口三百里而遙不若趙家圈至兩河口四十里而近況大浮橋已建閘蓄汶泗之水則鎮口濟運亦無藉黃流報可十月功成加東星工部尚書一魁及餘官賞賚有差初給事中楊廷蘭因黃堌之決請開泇河給事中楊應文亦主其說既而直隸巡按御史佴祺復言之東星既開趙家圈復採衆說鑿泇河以地多沙石工未就而東星病河既南徙李吉口淤澱日高北流遂絕而趙家圈亦日就淤塞徐邳間三百里河水尺餘糧艘阻塞二十九年秋工科給事中張問達疏論之會開歸大水河漲商丘決蕭家口全河盡南注河身變為平沙商賈舟膠沙上南岸蒙出方攵寺忽徙置北岸商虞多被淹沒河勢盡趨東南而黃堌斷流河南巡撫曾如春以聞曰此河徙非決也問達復言蕭家口在黃堌上流未有商舟不能行於蕭家口而能行於黃堌以東者運艘大可慮帝從其言方命東星勘議而東星卒矣問達復言運道之壞一因黃堌口之決不早杜塞更因幷力泇河以致趙家圈淤塞斷流河身日高河水日淺而蕭家口遂決全河奔潰入淮勢及陵寢東星已逝宜急補河臣早定長策大學士沈一貫給事中桂有根皆趣簡河臣御史高舉獻三策請濬黃堌口以下舊河引黃水注之東遂塞黃堌口而遏其南俟舊河衝刷深則幷塞新決之口其二則請開泇河及膠萊河而言河漕不宜幷於一人當選擇分任其事江北巡按御史吳崇禮則請自蒙出方攵寺西北黃河灣曲之所開濬直河引水東流且濬李吉口至堅城集淤道三十餘里而盡塞黃堌以南決口使河流盡歸正漕工部尚書一魁酌舉崇禮之議以開直河塞黃堌口濬淤道為正策而以泇河為旁策膠萊為備策帝命急挑舊河塞決口且兼挑泇河以備用下山東撫按勘視膠萊河三十年春一魁覆河撫如春疏言黃河勢趨邳宿請築汴堤自歸德至靈虹以障南徙且疏小河口使黃流盡歸之則瀰漫自消祖陵可無患帝嘉納之已而言者再疏攻一魁帝以一魁不塞黃堌口致衝祖陵斥為民復用崇禮議分設河漕二臣命如春為工部侍郎總理河道如春議開虞城王家口挽全河東歸須費六十萬三十一年春山東巡撫黃克纘言王家口為蒙出方攵上源上流既達則下流不可旁洩宜遂塞蒙出方攵口從之時蒙出方攵決口廣八十餘丈如春所開新河未及其半塞而注之慮不任受有獻策者言河流既回勢若雷霆藉其勢衝之淺者可深也如春遂令放水水皆泥沙流少緩旋淤夏四月水暴漲衝魚單豐沛間如春以憂卒乃命李化龍為工部侍郎代其任給事中宋一韓言黃河故道已復陵運無虞決口懼難塞宜深濬堅城以上淺阻而增築徐邳兩岸使下流有所容則舊河可塞給事中孟成己言塞舊河急而濬新河尤急化龍甫至河大決單縣蘇家莊及曹縣縷堤又決沛縣四鋪口太行堤灌昭陽湖入夏鎮橫衝運道化龍議開泇河屬之邳州直河以避河險給事中侯慶遠因言泇河成則他工可徐圖第毋縱河入淮淮利則洪澤水減而陵自安矣三十二年正月部覆化龍疏大略言河自歸德而下合運入海其路有三由蘭陽道考城至李吉口過堅城集入六座樓出茶城而向徐邳是名濁河為中路由曹單經豐沛出飛雲橋汎昭陽湖入龍塘出秦溝而向徐邳是名銀河為北路由潘家口過司家道口至何家堤經符離道睢寧入宿遷由小河口入運是名符離河為南路南路近陵北路近運惟中路既遠於陵且可濟運前河臣興役未竣而河形尚在因奏開泇有六善帝從其議工部尚書姚繼可言黃河衝徙河臣議於堅城集以上開渠引河使下流疏通復分六座樓苑家樓二路殺其水勢既可移豐沛之患又不至沼碭山之城開泇分黃兩工幷舉乞速發帑以濟允之八月化龍奏分水河成事具泇河志中加化龍太子少保兵部尚書會化龍丁艱候代命曹時聘為工部侍郎總理河道是秋河決豐縣由昭陽湖穿李家港口出鎮口上灌南陽而單縣決口復潰魚臺濟寧間平地成湖三十三年春化龍言豐之失由巡守不嚴單之失由下埽不早而皆由蘇家莊之決南直山東相推諉請各罰防河守臣至年來緩堤防而急挑濬堤壞水溢不咎守堤之不力惟委濬河之不深夫河北岸自曹縣以下無入張秋之路南岸自虞城以下無入淮之路惟由徐邳達鎮口為運道故河北決曹鄆豐沛間則由昭陽湖出李家口而運道溢南決虞夏徐邳間則由小河口及白洋河而運道涸今泇河既成起直河至夏鎮與黃河隔絕山東直隸間河不能制運道之命獨朱旺口以上決單則單沼決曹則曹魚及豐沛徐邳魚碭皆命懸一線堤防何可緩也至中州荊隆口銅瓦廂皆入張秋之路孫家渡野雞岡蒙出方攵寺皆入淮之路一不守則北壞運南犯陵其害甚大請西自開封東至徐邳無不守之地上自司道下至府縣無不守之人庶幾可息河患乃敕時聘申飭焉其秋時聘言自蘇莊一決全河北注者三年初泛豐沛繼沼單魚陳燦之塞不成南陽之堤盡壞今且上灌全濟旁侵運道矣臣親詣曹單上視王家口新築之壩下視朱旺口北潰之流知河之大可憂者三而機之不可失者二河決行堤泛溢平地昭陽日墊下流日淤水出李家口者日漸微緩勢不得不退而上溢溢於南則孫家渡野雞岡皆入淮故道毋謂蒙出方攵已塞而無憂於陵溢於北則芝麻莊荊隆口皆入張秋故道毋謂泇役已成而無憂於運且南之夏商北之曹濮其地益卑其禍益烈其挽回益不易毋謂災止魚濟而無憂於民顧自王家口以達朱旺新導之河在焉疏其下流以出小浮橋則三百里長河暢流機可乘者一自徐而下清黃並行沙隨水刷此數十年所未有因而導水歸徐容受有地機可乘者二臣與諸臣熟計河之中路有南北二支北出濁河嘗再疏再壅惟南出小浮橋地形卑下其勢甚順度長三萬丈有奇估銀八十萬兩公儲虛耗乞多方處給疏上留中時聘乃大挑朱旺口十一月興工用夫五十萬三十四年四月工成自朱旺達小浮橋延袤百七十里渠廣堤厚河歸故道六月河決蕭縣郭煖樓人字口北支至茶城鎮口三十五年決單縣三十九年六月決徐州狼矢溝四十年九月決徐州三山衝縷堤二百八十丈遙堤百七十餘丈棃林鋪以下二十里正河悉為平陸邳睢河水耗竭總河都御史劉士忠開韓家壩外小渠引水由是壩以東始通舟楫四十二年決靈璧陳鋪四十四年五月復決狼矢溝由蛤鰻周柳諸湖入泇河出直口復與黃會六月決開封陶家店張家灣由會城大堤下陳留入亳州渦河四十七年九月決陽武脾沙堽由封丘曹單至考城復入舊河時朝政日弛河臣奏報多不省四十二年劉士忠卒總河閱三年不補四十六年閏四月始命工部侍郎王佐督河道河防日以廢壞當事者不能有為天啟元年河決靈璧雙溝黃舖由永姬湖出白洋小河口仍與黃會故道湮涸總河侍郎陳道亨役夫築塞時淮安霪雨連旬黃淮暴漲數尺而山陽𩹉外河及清河決口匯成巨浸水灌淮城民蟻城以居舟行街巿久之始塞三年決徐州青田大龍口徐邳靈睢河並淤呂梁城南隅陷沙高平地丈許雙溝決口亦滿上下百五十里悉成平陸四年六月決徐州魁山堤東北灌州城城中水深一丈三尺一自南門至雲龍山西北大安橋入石狗湖一由舊支河南流至鄧二莊歷租溝東南以達小河出白洋仍與黃會徐民苦淹溺議集貲遷城給事中陸文獻上徐城不可遷六議而勢不得已遂遷州治於雲龍河事置不講矣六年七月河決淮安逆入駱馬湖灌邳宿崇禎二年春河決曹縣十四舖口四月決睢寧至七月中城盡圮總河侍郎李若星請遷城避之而開邳州壩洩水入故道且塞曹家口匙頭灣逼水北注以減睢寧之患從之四年夏河決原武湖村舖又決封丘荊隆口敗曹縣塔兒灣大行堤六月黃淮交漲海口壅塞河決建義諸口下灌興化鹽城水深二丈村落盡漂沒逡巡踰年始議築塞興工未幾伏秋水發黃淮奔注興鹽為壑而海潮復逆衝壞范公堤軍民及商竈戶死者無算少壯轉徙丐江儀通泰間盜賊千百嘯聚至六年鹽城民徐瑞等言其狀帝憫之命議罰河曹官而是時總河朱光祚方議開高堰三閘淮揚在朝者合疏言建義諸口未塞民田盡沉水底三閘一開高寶諸邑蕩為湖海而漕糧鹽課皆害矣高堰建閘始於萬曆二十三年未幾全塞今高堰日壞方當急議修築可輕言開濬乎帝是其言事遂寢又從御史吳振纓請修宿寧上下西北舊堤以捍歸仁七年二月建義決口工成賜督漕尚書楊一鵬總河尚書劉榮嗣銀幣八年九月榮嗣得罪初榮嗣以駱馬湖運道潰淤創挽河之議起宿遷至徐州別鑿新河分黃水注其中以通漕運計工二百餘里金錢五十萬而其所鑿邳州上下悉黃河故道濬尺許其下皆沙挑掘成河經宿沙落河坎復平如此者數四迨引黃水入其中波流迅急沙隨水下率淤淺不可以舟及漕舟將至而駱馬湖之潰決適平舟人皆不願由新河榮嗣自往督之欲繩以軍法有入者輒苦淤淺弁卒多怨巡漕御史倪于義劾其欺罔誤工南京給事中曹景參復重劾之逮問坐贓父子皆瘐死郎中胡璉分工獨多亦坐死其後駱馬湖復潰舟行新河無不思榮嗣功者當是時河患日棘而帝又重法懲下李若星以修濬不力罷官朱光祚以建義蘇嘴決口逮繫六年之中河臣三易給事中王家彥嘗切言之光祚亦竟瘐死而繼榮嗣者周鼎修泇利運頗有功在事五年竟坐漕舟阻淺用故決河防例遣戍煙瘴給事中沈胤培刑部侍郎惠揚總河侍郎張國維各疏請寬之乃獲宥免云十五年流賊圍開封久守臣謀引黃河灌之賊偵知預為備乘水漲令其黨決河灌城民盡溺死總河侍郎張國維方奉詔赴京奏其狀山東巡撫王永吉上言黃河決汴城直走睢陽東南注鄢陵鹿邑必害亳泗侵祖陵而邳宿運河必涸帝令總河侍郎黃希憲急往捍禦希憲以身居濟寧不能攝汴請特設重臣督理命工部侍郎周堪賡督修汴河十六年二月堪賡上言河之決口有二一為朱家寨寬二里許居河下流水面寬而水勢緩一為馬家口寬一里餘居河上流水勢猛深不可測兩口相距三十里至汴堤之外合為一流決一大口直衝汴城以去而河之故道則涸為平地怒濤千頃工力難施必廣濬舊渠遠數十里分殺水勢然後畚鍤可措顧築濬並舉需夫三萬河北荒旱兗西兵火竭力以供不滿萬人河南萬死一生之餘未審能應募否是不得不借助於撫鎮之兵也乃敕兵部速議而令堪賡刻期興工至四月塞朱家寨決口修堤四百餘丈馬家口工未就忽衝東岸諸埽盡漂沒堪賡請停東岸而專事西岸帝令急竣工六月堪賡言馬家決口百二十丈兩岸皆築四之一中間七十餘丈水深流急難以措手請俟霜降後興工已而言五月伏水大漲故道沙灘壅涸者刷深數丈河之大勢盡歸於東運道已通陵園無恙疏甫上決口再潰帝趣鳩工未奏績而明亡
