body:
  text: 明史卷一百三十四列傳第二十二何文輝徐司馬葉旺馬雲繆大亨武德蔡遷陳文王銘寧正袁義金興旺費子賢花茂丁玉郭雲王溥何文輝字德明滁人太祖下滁州得文輝年十四撫為己子賜姓朱氏太祖初起多蓄義子及長命偕諸將分守諸路周舍守鎮江道舍守寧國馬兒守婺州柴舍真童守處州金剛奴守衢州皆義子也金剛奴後無考周舍即沐英軍中又呼沐舍柴舍者朱文剛與耿再成死處州難又有朱文遜史不傳其小字亦以義子死太平自沐英外最著者唯道舍馬兒馬兒即徐司馬而道舍即文輝也文輝以天寧翼元帥守寧國進江西行省參政數攻江西未下州縣討新淦鄧仲廉斬之援安福走饒鼎臣平山尖寨從徐達取淮東復從下平江賜文綺進行省左丞復其姓以征南副將軍與平章胡美由江西取福建度杉關入光澤徇邵武建陽直趨建寧元同僉達里麻參政陳子琦閉門拒守文輝與美環攻之踰十日達里麻不能支夜潛至文輝營乞降詰旦總管翟也先不花亦以衆降於文輝美怒兩人不詣己欲屠其城文輝馳告美曰與公同受命至此為安百姓耳今既降奈何以私忿殺人美乃止師入城秋毫無所犯汀泉諸州縣聞之皆相次歸附會車駕幸汴梁召文輝扈從因命為河南衛指揮使定汝州餘寇從大將軍取陝西留守潼關洪武三年授大都督府都督僉事豫世襲指揮使復以參將從傅友德等平蜀賜金幣留守成都文輝號令明肅軍民皆德之帝嘗稱其謀略威望遷大都督府同知五年命帥山東兵從李文忠出應昌明年移鎮北平文忠北征文輝督兵巡居庸關以疾召還九年六月卒年三十六遣官營葬滁州東沙河上恤賚甚厚子環成都護衛指揮使征迤北陳歿徐司馬字從政揚州人元末兵亂年九歲無所依太祖得之養為子亦賜姓既長出入侍左右及取婺州除總制命助元帥常遇春守婺吳元年授金華衛指揮同知洪武元年從副將軍李文忠北征擒元宗王慶生擢杭州衛指揮使尋進都指揮使詔復姓九年遷鎮河南時新建北京於汴梁號重地帝素賢司馬特委任之宋國公馮勝方練兵河南會有星變占在大梁帝使使密敕勝且曰並以此語馬兒知之既復敕二人曰天象屢見大梁軍民錯處尤宜慎防今秦晉二王還京當嚴兵宿衛王抵汴時若宋國公出迓則都指揮居守都指揮出迓則宋國公亦然敕書官而不名倚重與宋公等十九年入覲遂擢中軍都督府僉事二十五年以左副總兵從藍玉征建昌討越巂明年正月還至成都卒追坐藍玉黨二子皆獲罪司馬好文學性謙厚所至撫循士卒甚得衆心在河南久尤有惠政公暇退居一室蕭然如寒素雖戰功不及文輝而雅量過之並稱賢將云葉旺六安人與合肥人馬雲同隸長鎗軍謝再興為千戶再興叛二人自拔歸數從征積功並授指揮僉事洪武四年偕鎮遼東初元主北走其遼陽行省參政劉益屯蓋州與平章高家奴相為聲援保金復等州帝遣斷事黃儔齎詔諭益益籍所部兵馬錢糧輿地之數來歸乃立遼陽指揮使司以益為指揮同知未幾元平章洪保保馬彥翬合謀殺益右丞張良佐左丞商皓擒彥翬殺之保保挾儔走納哈出營良佐因權衛事以狀聞且言遼東僻處海隅肘腋皆敵境平章高家奴守遼陽山寨知院哈剌章屯瀋陽古城開元則右丞也先不花金山則太尉納哈出彼此相依時謀入犯今保保逃往釁必起乞留斷事吳立鎮撫軍民而以所擒平章八丹知院僧孺等械送京師帝命立良佐皓俱為蓋州衛指揮僉事既念遼陽重地復設都指揮使司統轄諸衛以旺及雲並為都指揮使往鎮之已知儔被殺納哈出將內犯敕旺等預為備未幾納哈出果以衆至見備禦嚴不敢攻越蓋至金州金州城未完指揮韋富王勝等督士卒分守諸門乃剌吾者敵驍將也率精騎數百挑戰城下中伏弩仆為我兵所獲敵大沮富等縱兵擊敵引退不敢由故道從蓋城南十里沿柞河遁旺先以兵扼柞河自連雲島至窟駝寨十餘里緣河壘冰為牆沃以水經宿凝沍如城布釘板沙中旁設坑穽伏兵以伺雲及指揮周鶚吳立等建大旗城中嚴兵不動寂若無人已寇至城南伏四起兩山旌旗蔽空矢石雨下納哈出倉皇趨連雲島遇冰城旁走悉陷於穽遂大潰雲自城中出合兵追擊至將軍山畢栗河斬獲及凍死者無算乘勝追至猪兒峪納哈出僅以身免第功進旺雲俱都督僉事時洪武八年也十二年命雲征大寧捷聞受賞召還京後數年卒旺留鎮如故會高麗遣使致書及禮物而龍州鄭白等請內附旺以聞帝謂人臣無外交此間諜之漸勿輕信彼特示弱於我以窺邊釁還之使無所藉口明年旺復送高麗使者周誼入京帝以其國中弒逆又詭殺朝使反覆不可信切責旺等絶之而留誼不遣十九年召旺為後軍都督府僉事居三月遼東有警復命還鎮二十一年三月卒旺與雲之鎮遼也翦荊棘立軍府撫輯軍民墾田萬餘頃遂為永利旺尤久先後凡十七年遼人德之嘉靖初以二人有功於遼命有司立祠春秋祀之繆大亨定遠人初糾義兵為元攻濠不克元兵潰大亨獨以衆二萬人與張知院屯橫澗山固守月餘太祖以計夜襲其營破之大亨與子走免比明復收散卒列陳以待太祖遣其叔貞諭降之命將所部從征數有功擢元帥總兵取揚州克之降青軍元帥張明鑑初明鑑聚衆淮西以青布為號稱青軍又以善長鎗稱長鎗軍由含山轉掠揚州元鎮南王孛羅普化招降之以為濠泗義兵元帥踰年食盡謀擁王作亂王走死淮安明鑑遂據城屠居民以食大亨言於太祖賊饑困若掠食四出則難制矣且驍鷙可用無為他人得太祖命大亨亟攻明鑑降得衆數萬馬二千餘匹悉送其將校妻子至應天改淮海翼元帥府為江南分樞密院以大亨為同僉樞密院事總制揚州鎮江大亨有治略寬厚不擾而治軍嚴肅禁暴除殘民甚悅之未幾卒太祖過鎮江嘆曰繆將軍生平端直未嘗有過惜不見矣遣使祭其墓武德安豐人元至正中為義兵千戶知元將亡言於其帥張鑑曰吾輩才雄萬夫今東衄西挫事勢可知不如早擇所依鑑然其言相率歸太祖隸李文忠從赴池州力戰流矢中右股拔去戰自若取於潛昌化克嚴州皆預進萬戶苗帥楊完者軍烏龍嶺德請曰此可襲而取也文忠問故對曰乘高覘之其部曲徙舉不安而聲囂文忠曰善即襲完者覆其營取蘭溪克諸暨攻紹興皆先登陷陳傷右臂不顧文忠嘆曰將士人人如此何戰不捷哉蔣英賀仁德之叛浙東大震從文忠定金華又從攻處州遇仁德於劉山戈中右股德引刀斷戈追擊之仁德再戰再敗走遂為其下所殺德還師守嚴後二年定官制改管軍百戶從文忠破張士誠兵於諸暨與諸將援浦城所過山寨皆下復從文忠下建延汀三州悉定閩溪諸寨進管軍千戶移守衢豫世襲最後從靖海侯吳禎巡海上禎以德可任令守平陽在任八年致仕及征雲南帝以德宿將命與諸大帥偕行張鑑又名明鑑淮西人既歸太祖每攻伐必與德俱先德卒官至江淮行樞密院副使蔡遷不詳其鄉里元末從芝麻李據徐州李敗歸太祖為先鋒從渡江下采石克太平取溧水破蠻子海牙水寨及陳野先皆有功定集慶授千戶從徐達取廣德寧國遷萬戶進攻常州獲黃元帥遂為都先鋒從征馬馱沙克池州攻樅陽從征衢婺二州授帳前左翼元帥敗陳友諒於龍江進復太平取安慶水寨收九江敗友諒八陳指揮於瑞昌遂克南昌從援安豐攻合肥戰鄱陽從征武昌進指揮同知從常遇春討平鄧克明餘黨進攻贛州取南安南雄諸郡還兵追饒鼎臣於茶陵遷龍驤衛同知從徐達克高郵破馬港授武德衛指揮使守淮安移守黃州從下湘潭辰全道永諸州轉荊州衛指揮進克廣西遷廣西行省參政兼靖江王相討平諸叛蠻洪武三年九月卒詔歸葬京師贈安遠侯諡武襄遷為將十五年未嘗獨任多從諸將征討身經數十戰輒奮勇突出橫刀左右擊敵皆披靡不敢近既還金瘡滿體人視之不可堪而遷略不為意為太祖所愛重及卒尤痛惜之親製文祭焉合肥陳文者南北征伐纍立戰功亦遷亞也文少孤奉母至孝元季挈家歸太祖積官都督僉事卒追封東海侯諡孝勇明臣得諡孝者文一人而已王銘字子敬和州人初隸元帥俞通海麾下從攻蠻子海牙於采石以銘驍勇選充奇兵戰方合帥敢死士大譟突之拔其水寨自是數有與吳軍戰太湖流矢中右臂引佩刀出其鏃復戰通海勞之復拔通州之黃橋鵝項諸寨賜白金文綺龍灣之戰逐北至采石銘獨突敵陳敵兵攢刺銘傷頰銘三出三入所殺傷過當賜文綺銀碗選充宿衛從取江州戰康郎山及涇江口復克英山諸寨擢管軍百戶從副將軍常遇春戰湖州之升山再戰舊館已又戰烏鎮前後數十戰功多命守松江移太倉捕斬倭寇千餘人再賜金幣洪武四年都試百戶諸善用槍者率莫能與銘抗纍官至長淮衛指揮僉事移守溫州上疏曰臣所領鎮外控島夷城池樓櫓仍陋襲簡非獨不足壯國威猝有風潮之變捍禦無所勢須改為帝報可於是繕城濬濠悉倍於舊加築外垣起海神山屬郭公山首尾二千餘丈宏敞壯麗屹然東浙巨鎮帝甚嘉之豫世襲銘嘗請告暫還和州溫士女遮道送迎長吏皆相顧歎曰吾屬為天子牧民民視吾屬去來漠然愧王指揮多矣歷右軍都督僉事二十六年坐藍玉黨死寧正字正卿壽州人幼為韋德成養子冒韋姓元末隨德成來歸從渡江德成戰歿宣州以正領其衆積功授鳳翔衛指揮副使從定中原入元都招降元將士八千餘人傅友德自真定略平定州以正守真定已從大軍取陝西馮勝克臨洮留正守之大軍圍慶陽正駐邠州絶敵聲援慶陽下還守臨洮從鄧愈破定西克河州洪武三年授河州衛指揮使上言西民轉粟餉軍甚勞而茶布可易粟請以茶布給軍令自相貿易省挽運之苦詔從之正初至衛城邑空虛勤於勞徠不數年河州遂為樂土璽書嘉勞始復寧姓兼領寧夏衛事修築漢唐舊渠引河水溉田開屯數萬頃兵食饒足十三年從沐英北征擒元平章脫火赤知院愛足取全寧四部十五年遷四川都指揮使討平松茂諸州雲南初定命正與馮誠共守之思倫發作亂正破之於摩沙勒寨斬首千五百已敵衆大集圍定邊沐英分兵三隊正將左軍鏖戰大敗之語在英傳土酋阿資叛復從英討降之英卒詔授正左都督代鎮已復命為平羌將軍總川陝兵討平階文叛寇張者二十八年從秦王討平洮州番還京明年卒又袁義廬江人本張姓德勝族弟也初為雙刀趙總管守安慶敗趙同僉丁普郎於沙子港左君弼招之弗從德勝戰死始來附為帳前親軍元帥賜姓名數從征伐積功為興武衛指揮僉事從大將軍北征敗元平章俺普達等於通州走賀宗哲詹同於澤潞功最復從定陝西敗元豫王兵與諸將合攻慶陽張良臣兵驟薄義營義堅壁不為動俟其懈力擊破之走擴廓軍於定西南取興元進本衛同知調羽林衛移鎮遼東已從沐英征雲南克普定諸城留鎮楚雄蠻人屢叛義積糧高壘且守且戰以功遷楚雄衛指揮使嘗入朝帝厚加慰勞以其老命醫為染鬚鬢俾還任以威遠人且特賜銀印寵異之歷二十年墾田築堰治城郭橋梁規畫甚備軍民德之建文元年徵還為右軍都督府僉事進同知卒官金興旺不詳所始為威武衛指揮僉事進同知洪武元年大將軍徐達自河南至陝西請益兵守潼關以興旺副郭興守之進指揮使明年攻臨洮移興旺守鳳翔轉軍餉未幾賀宗哲攻鳳翔興旺與知府周煥嬰城守敵編荊為大箕形如半舫每箕五人負之攻城矢石不能入投藁焚之輒揚起乃置鉤藁中擲著其隙火遂熾敵棄箕走復為地道薄城城中以矛迎刺敵死甚衆而攻不已興旺與煥謀曰彼謂我援師不至必不敢出乘其不意擊之可敗也潛出西北門奮戰敵少却會百戶王輅自臨洮收李思齊降卒東還即以其衆入城共守敵拔營去衆欲追之輅曰未敗而退誘我也遣騎偵之至五里坡伏果發還師復圍城衆議欲走興旺叱曰天子以城畀我寧可去耶以輅所將皆新附慮生變乃括城中資畜積庭中令曰敵少緩當大犒新兵新兵喜協力固守相持十五日敵聞慶陽下乃引去帝遣使以金綺勞興旺等明年達入沔州遣興旺與張龍由鳳翔入連雲棧合攻興元守將降以興旺守之擢大都督府僉事蜀將吳友仁帥衆三萬寇興元興旺悉城中兵三千禦敵面中流矢拔矢復戰斬數百人敵益衆乃斂兵入城友仁決濠填塹為必克計達聞之令傅友德夜襲木槽關攻斗山寨人持十炬連亙山上友仁驚遁興旺出兵躡之墜崖石死者無算友仁自是氣奪時興旺威鎮隴蜀而國初諸都督中城守功興旺外尤推費子賢子賢亦不詳所始從渡江為廣德翼元帥數有功取武康又取安吉築城守之張士誠兵數來犯輒敗去最後張左丞以兵八萬來攻子賢所部僅三千人而守甚固設車弩城上射殺其梟將二人敵乃解去以功進指揮同知取福建克元都定西俱有功授大都督府僉事世指揮使花茂巢縣人初從陳野先已而來歸從定江左滅陳友諒平中原山西陝西積功授武昌衛副千戶征西蜀克瞿唐關入重慶下左右兩江及田州進神策衛指揮僉事調廣州左衛平陽春清遠英德翁源博羅諸山寨叛蠻及東莞龍川諸縣亂民進指揮同知平電白歸善賊再遷都指揮同知世襲指揮使數剿連州廣西湖廣諸瑤賊上言廣東南邊大海姦宄出沒東莞筍岡諸縣逋逃蛋戶附居海島遇官軍則詭稱捕魚遇番賊則同為寇盜飄忽不常難於訊詰不若籍以為兵庶便約束又請設沿海依山廣海碣石神電等二十四衛所築城浚池收集海島隱料無籍等軍仍於山海要害地立堡屯軍以備不虞皆報可進都指揮使久之卒賜葬安德門長子榮襲職次子英果毅有父風亦以軍功為廣東都指揮使有聲永樂中丁玉初名國珍河中人仕韓林兒為御史才辨有時譽呂珍破安豐玉來歸隨征彭蠡為九江知府大兵還建康彭澤山民叛玉聚鄉兵討平之太祖嘉其武略命兼指揮更名玉從傅友德克衡州以指揮同知鎮其地復調守永州玉有文武才撫輯新附威望甚著洪武元年進都指揮使尋兼行省參政鎮廣西十年召為右御史大夫四川威茂土酋董貼里叛以玉為平羌將軍討之至威州貼里降承制設威州千戶所十二年平松州玉遣指揮高顯等城之請立軍衛帝謂松州山多田少耕種不能贍軍守之非策玉言松州為西羌要地軍衛不可罷遂設官築戍如玉議會四川妖人彭普貴為亂焚掠十四州縣指揮普亮等不能克命玉移軍討滅之帝手敕褒美轉左御史大夫師還拜大都督府左都督十三年坐胡惟庸姻誅郭雲南陽人長八尺餘狀貌魁偉元季聚義兵保裕州泉白寨纍官湖廣行省平章政事元主北奔河南郡縣皆下雲獨堅守大將軍徐達遣指揮曹諒圍之雲出戰被執大將軍呵之跪雲植立嫚罵求死脅以刃不動大將軍壯之繫送京師太祖奇其狀貌釋之時帝方閲漢書問識字否對曰識因以書授之雲誦其書甚習帝大喜厚加賞賜用為溧水知縣有政聲帝益以為賢特擢南陽衛指揮僉事使還鄉收故部曲就戍其地凡數年卒長子洪年甫十三帝為下制曰雲出田間倡義旗保鄉曲崎嶇纍年竭心所事王師北伐人神嚮應而雲數戰不屈勢窮援絶終無異志朕嘉其節概試之有司則閭閻頌德俾鎮故鄉則軍民樂業雖無汗馬之勳倒戈之效治績克著忠義然子洪可入開國功臣列授宣武將軍飛熊衛親軍指揮使司僉事世襲其同時以降將豫世職者有王溥溥安仁人仕陳友諒為平章守建昌太祖命將攻之不克朱亮祖擊於饒之安仁港亦失利友諒將李明道之寇信州也溥弟漢二在軍俱為胡大海擒歸於行省李文忠文忠命二人招溥是歲太祖拔江州友諒走武昌溥乃遣使降命仍守建昌明年太祖次龍興帥其衆來見數慰勞從歸建康賜第聚寶門外號其街曰宰相街以寵異之尋遣取撫州及江西未附郡縣從克武昌進中書右丞洪武元年命兼詹事府副詹事從大將軍北征屢有功賜文幣擢河南行省平章不署事歲祿視李伯升潘元明初溥未仕時奉母葉氏避兵貴溪遇亂與母相失凡十八年嘗夢母若告以所在至是從容言於帝請歸省墳墓許之且命禮官具祭物溥率士卒之貴溪求不得晝夜號泣居人吳海言夫人為賊逼投井中死矣溥求得井有鼠自井出投溥懷中旋復入井汲井索之母尸在焉哀呼不自勝乃具棺斂即其地以葬溥卒子孫世襲指揮同知贊曰文輝司馬任寄股肱葉旺馬雲效著邊域大亨以端直見思郭雲以政績蒙寵他如蔡遷王銘寧正金興旺輩或善戰或善守或善撫綏要皆一時良將也蓋明運初興人材蔚起鐵券丹符之外其可稱者猶如此以視詩人兔罝之詠何多讓哉
