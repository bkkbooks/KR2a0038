body:
  text: 明史卷七十四志第五十職官三太常寺附提督四夷館光祿寺太僕寺鴻臚寺尚寶司六科中書舍人行人司欽天監太醫院上林苑監五城兵馬司順天府附宛平大興二縣武學僧道録司教坊司宦官女官太常寺卿一人正三品少卿二人正四品寺丞二人正六品其屬典簿廳典簿二人正七品博士二人正七品協律郎二人正八品嘉靖中增至五人贊禮郎九人正九品嘉靖中增至三十三人後革二人司樂二十人從九品嘉靖中增至三十九人後革五人天壇地壇朝日壇夕月壇先農壇帝王廟祈穀殿長陵獻陵景陵裕陵茂陵泰陵顯陵康陵永陵昭陵各祠祭署俱奉祀一人從七品祀丞二人從八品犧牲所吏目一人從九品太常掌祭祀禮樂之事總其官屬籍其政令以聽於禮部凡天神地祇人鬼歲祭有常先冬十二月朔奏進明年祭日天子御奉天殿受之乃頒於諸司天子親祭則贊相禮儀大臣攝事亦如之凡國有册立册封冠婚營繕征討大喪諸典禮歲時旱潦大災變則請告宗廟社稷薦新則移光祿寺供其品物祭祀先期請省牲進祝版銅人上殿奏請齋戒親署御名省牲偕光祿卿惟大祀車駕親省大臣日一省之凡祭滌器爨埋香燭玉帛整拂神幄必恭潔掌燎看燎讀祝奏禮對引司香進俎舉麾陳設收支導引設位典儀通贊奉帛執爵司樽司罍洗卿二屬各領其事罔有不共凡玉四等曰蒼璧以祀天曰黃琮以祀地曰赤璋白琥以朝日夕月曰兩圭有邸以祭太社太稷帛五等曰郊祀制帛祀天地曰奉先制帛薦祖考曰禮神制帛祭社稷羣神帝王先師曰展親制帛祭享親王曰報功制帛祭享功臣牲四等曰犢曰牛曰太牢曰少牢色尚騂或黝大祀入滌三月中祀一月小祀一旬樂四等曰九奏用祀天地曰八奏神祇太歲曰七奏大明太社太稷帝王曰六奏夜明帝社帝稷宗廟先師舞二曰文舞曰武舞樂器不徙陵園之祭無樂歲終合祭五祀之神則少卿攝事初吳元年置太常司設卿正三品少卿正四品丞正五品典簿協律郎博士正七品贊禮郎從八品洪武初置各祠祭署設署令署丞十三年更定協律郎等官品秩協律郎正八品贊禮郎正九品司樂從九品二十四年改各署令為奉祀署丞為祀丞三十年改司為寺官制仍舊二十五年已定司丞正六品建文中增設贊禮郎二人太祝一人以及各祠祭署俱有更革天壇祠祭署為南郊祠祭署泗州祠祭署為泗濱祠祭署宿州祠祭署為新豐祠祭署孝陵置鍾山祠祭署各司圃所增神樂觀知觀一人成祖初惟易天壇為天地壇餘悉復洪武間制建文時南郊祠祭署為郊壇祠祭署已又改為天地壇祠祭署洪熙元年置犧牲所吏目典掌文移先是洪武三年置神牲所設廩牲令大使副使等官四年革世宗釐祀典分天地壇為天壇地壇山川壇藉田祠祭署為神祇壇大祀殿為祈穀殿增置朝日夕月二壇各設祠祭署又增設協律郎贊禮郎司樂等員隆慶三年革協律郎等官四十八員萬曆六年復設如嘉靖間制萬曆四年改神祇壇為先農壇提督四夷館少卿一人正四品掌譯書之事自永樂五年外國朝貢特設蒙古女直西番西天回回百夷高昌緬甸八館置譯字生通事通事初隸通政使司通譯語言文字正德中增設八百館八百國蘭者哥進貢萬曆中又增設暹羅館初設四夷館隸翰林院選國子監生習譯宣德元年兼選官民子弟委官教肄學士稽考程課弘治七年始增設太常寺卿少卿各一員為提督遂改隸太常嘉靖中裁卿止少卿一人按太常寺卿在南京者多由科目北寺自永樂間用樂舞生纍資升至寺卿甚或加禮部侍郎尚書掌寺後多沿襲至隆慶初乃重推科甲出身者補任譯字生明初甚重與考者與鄉會試額科甲一體出身後止為雜流其在館者升轉皆在鴻臚寺光祿寺卿一人從三品少卿二人正五品寺丞二人從六品其屬典簿廳典簿二人從七品録事一人從八品大官珍羞良醞掌醢四署各署正一人從六品署丞四人從七品監事四人從八品司牲司大使一人從九品副使一人後革司牧局大使一人從九品嘉靖七年革銀庫大使一人卿掌祭享宴勞酒醴膳羞之事率少卿寺丞官屬辨其名數會其出入量其豐約以聽於禮部凡祭祀同太常省牲天子親祭進飲福受胙薦新循月令獻其品物喪葬供奠饌所用牲果菜物取之上林苑不給市諸民視時估十加一其市直季支天財庫四方貢獻果鮮廚料省納惟謹器皿移工部及募工兼作之歲省其成敗凡筵宴酒食及外使降人俱差其等而供給焉傳奉宣索籍記而覆奏之監以科道官一員察其出入糾禁其姦弊歲四月至九月凡御用物及祭祀之品皆用冰大官供祭品宮膳節令筵席蕃使宴犒之事珍羞供宮膳肴核之事良醞供酒醴之事掌醢供餳油醯醬梅鹽之事司牲養牲視其肥瘠而蠲滌之司牧亦如之初吳元年置宣徽院設院使正三品同知正四品院判正五品典簿正七品以尚食尚醴二局隸之局設大使從六品副使從七品洪武元年改為光祿寺設光祿卿正四品少卿正五品寺丞正六品主簿正八品所屬尚食等局又移太常司供需庫隸之局庫官品仍舊二年設直長四人遇百官賜食御前者則令供事四年置法酒庫設內酒坊大使從八品副使從九品八年改寺為司升卿秩卿從三品少卿從四品以寺丞為司丞從六品主簿為典簿從七品增設録事從八品又置所屬大官珍羞良醞掌醢四署每署令一人從六品丞一人從七品監事一人從八品孳牧所大使一人從九品副使一人未入流十年定光祿司散官品秩時所用光祿司官或內官或流官或庖人出身不同同授散官至是定內官除授者照內官散官給授流官除授者照文官散官給授庖人除授者卿從三品授尚膳大夫少卿正五品授奉膳大夫司丞從六品授司膳郎各署丞從七品授掌膳郎監事從八品授執膳郎尋罷各局庫置司牲司又改孳牧所為司牧司後為司牧局三十年復改為光祿寺官制仍舊少卿已定正五品建文中升少卿寺丞品秩少卿升四品寺丞升五品增設司圃所改司牲司為孳牲所升其品級成祖復舊制正統六年裁四署冗員先是光祿卿奈亨以供應事繁奏增各署官至是復奏裁之裁署正四人署丞五人監事七人嘉靖七年革司牧局萬曆二年添設銀庫大使一人太僕寺卿一人從三品少卿二人正四品正德十一年增設一人寺丞四人正六品其屬主簿廳主簿一人從七品常盈庫大使一人所轄各牧監監正一人正九品監副一人從九品録事一人後監正監副録事俱革各羣羣長一人後革卿掌牧馬之政令以聽於兵部少卿一人佐寺事一人督營馬一人督畿馬寺丞分理京衛畿內及山東河南六郡孳牧寄牧馬匹濟南兗州東昌開封彰德衛輝凡軍民孳牧視其丁産授之種馬牡十之二牝十之八為一羣南方以四牝一牡為羣歲徵其駒曰備用馬齊其力以給將士將士足則寄牧於畿內府州縣肥瘠登耗籍其毛齒而時閲之三歲偕御史一人印烙選其健良而汰其羸劣其草場已墾成田者歲斂其租金災祲則出之以佐市馬其賠償折納則征馬金輸兵部主簿典勾省文移大使典貯庫馬金初洪武四年置羣牧監於答答失里營所隨水草利便立官署專司牧養六年更置羣牧監於滁州旋改為太僕寺秩從三品設卿少卿寺丞又設首領官知事主簿各一人七年增設牧監羣官二十七處隸太僕寺尋定羣牧監品秩令正五品丞正六品鎮撫從六品羣頭十人吏目一人省注十年增置滁陽等各牧監及所屬各羣改牧監令丞為監正監副監正從八品監副正九品御良從九品後又定監正為正九品二十二年定滁陽等十二牧監每監設監正一人監副二人録事一人來安等一百二十七羣每羣設羣長一人初設羣副二人至是革二十三年增置江東當塗二牧監及所屬各羣又罷烏衣等五十四羣改置永安等七羣定為牧監十四滁陽大興香泉儀真定遠天長長淮江都句容溧陽江東溧水當塗舒城羣九十有七大勝關柏子騮興保寧草堂五羣隸滁陽監永安如皋沿海保全朝陽永昌安定七羣隸大興監大錢銅城永豐龍勝龍山永寧新安慶安襄安九羣隸香泉監華陽壽寧廣陵善應四羣隸儀真監龍江龍安萬勝龍泉四羣隸定遠監天長懷德招信得勝武安五羣隸天長監長安白石荊山南山團山草平六羣隸長淮監萬寧廣生萬驥順德大興驥寧崇德七羣隸江都監句容易風仍信福胙通德承仙上容政仁練塘壽安十羣隸句容監舉福從山明義永定福賢崇來永城永泰奉安九羣隸溧陽監開寧泉水惟政清化神泉新亭長泰光澤八羣隸江東監儀鳳仙壇立信歸政豐慶安興遊山永寧八羣隸溧水監石城永保化洽姑熟繁昌多福丹陽德政八羣隸當塗監棗林海亭伏龍龍河會龍九龍萬龍七羣隸舒城監二十八年悉罷羣牧監以其馬隸有司牧養三十年置行太僕寺於北平秩如太僕寺建文中升寺丞品秩舊六品升五品又改其首領官職名增設録事及典典牧二署驌騻等十八羣滁陽等八牧監龍山等九十二羣成祖復舊制永樂元年改北平行太僕寺為北京行太僕寺十八年定都北京遂以行太僕寺為太僕寺洪熙元年復稱北京行太僕寺正統六年定為太僕寺其舊在滁州者改為南京太僕寺寺丞初置四人正統中又增八人共十二人以一人領京衛一人領順德廣平二府一人領開封衛輝彰德三府九人分領順天保定真定河間永平大名濟南兗州東昌九府孳牧寄牧各馬匹弘治六年革四人正德九年復增一人專領寄牧之事嘉靖八年又革三人共六人分領三年更代而以寄牧者令府州縣兼理隆慶三年又革三人止設三人以一人提督庫藏兼協理京邊二人分理東西二路各馬政鴻臚寺卿一人正四品左右少卿各一人從五品左右寺丞各一人從六品其屬主簿廳主簿一人從八品司儀司賓二署各署丞一人正九品鳴贊四人從九品後增設五人序班五十人從九品嘉靖三十六年革八人萬曆十一年復設六人鴻臚掌朝會賓客吉凶儀禮之事凡國家大典禮郊廟祭祀朝會宴饗經筵册封進曆進春傳制奏捷各供其事外吏朝覲諸蕃入貢與夫百官使臣之復命謝恩若見若辭者並鴻臚引奏歲正旦上元重午重九長至賜假賜宴四月賜字扇壽縷十一月賜戴暖耳陪祀畢頒胙賜皆贊百官行禮司儀典陳設引奏外吏來朝必先演儀於寺司賓典外國朝貢之使辨其等而教其拜跪儀節鳴贊典贊儀禮凡內贊通贊對贊接贊傳贊咸職之序班典侍班齊班糾儀及傳贊初吳元年置侍儀司秩從五品洪武四年定侍儀使從七品引進使正八品奉班都知正九品通贊通事舍人從九品俱為七品以下官九年改為殿庭儀禮司設使一人正七品副三人正八品承奉一人從八品鳴贊二人正九品序班十六人從九品九關通事使一人正八品副六人從八品十三年改使為司正分左右司副各一人增序班至四十四人革承奉增設司儀四人二十二年增設左右司丞四人正九品三十年始改為鴻臚寺升秩正四品設官六十二員卿以下員數品級如前所列又設外夷通事隸焉建文中升少卿以下品秩少卿升正五品寺丞升正六品又改其首領官職名與鳴贊序班皆升品級罷司儀司賓二署而以行人隸鴻臚寺成祖初悉復舊制尚寶司卿一人正五品少卿一人從五品司丞三人正六品吳元年但設一人後增二人掌寶璽符牌印章而辨其所用寶二十有四舊寶十有七嘉靖十八年增製者七曰皇帝奉天之寶為唐宋傳璽祀天地用之若詔與赦則用皇帝之寶册封賜勞則用皇帝行寶詔親王大臣及調兵則用皇帝信寶上尊號則用皇帝尊親之寶諭親王則用皇帝親親之寶其