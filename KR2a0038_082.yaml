body:
  text: 明史卷八十二志第五十八食貨六上供採造採造柴炭採木珠池織造燒造俸餉會計採造之事累朝侈儉不同大約靡於英宗繼以憲武至世宗神宗而極其事目繁瑣徵索紛紜最鉅且難者曰採木歲造最大者曰織造曰燒造酒醴膳羞則掌之光祿寺採辦成就則工部四司內監司局或專差職之柴炭則掌之惜薪司而最為民害者率由中官明初上供簡省郡縣貢香米人參葡萄酒太祖以為勞民却之仁宗初光祿卿井泉奏歲例遣正官往南京採玉面貍帝叱之曰小人不達政體朕方下詔盡罷不急之務以息民豈以口腹細故失大信耶宣宗時罷永樂中河州官買乳牛造上供酥油者以其牛給屯軍命御史二人察視光祿寺凡內外官多支及需索者執奏英宗初政三楊當軸減南畿孳牧黃牛四萬糖蜜果品腒脯酥油茶芽竹敕糯粟米藥材皆減省有差撤諸處捕魚官即位數月多所撙節凡上用膳倉器皿三十萬七千有奇南工部造金龍鳳白瓷諸器饒州造硃紅膳盒諸器營膳所造以進宮中食物尚膳監率乾沒之帝令備帖具書如數還給景帝時從于謙言罷真定河間採野味直沽海口造乾魚內使天順八年光祿果品物料凡百二十六萬八千餘斤增舊額四之一成化初詔光祿寺牲口不得過十萬明年寺臣李春請增禮部尚書姚夔言正統間雞鵝羊豕歲費三四萬天順以來增四倍暴殄過多請從前詔後二年給事中陳鉞言光祿市物概以勢取負販遇之如被劫掠夫光祿所供昔皆足用今不然者宣索過額侵漁妄費也大學士彭時亦言光祿寺委用小人買辦假公營私民利盡為所奪請照宣德正統間例斟酌供用禁止買辦於是減魚果歲額十之一弘治元年命光祿減增加供應初光祿俱預支官錢市物行頭吏役因而侵蝕及令各行先報納而後償價遂有游手號為報頭假以供應為名抑價倍取以充私橐御史李鸞以為言帝命禁止十五年光祿卿王珩列上內外官役酒飯及所畜禽獸料食之數凡百二十事乃降旨有仍舊者有減半者有停止者於是放去乾明門虎南海子猫西華門鷹犬御馬監山猴西安門大鴿等減省有差存者減其食料自成化時添坐家長隨八十餘員傳添湯飯中官百五十餘員天下常貢不足於用乃責買於京師鋪戶價直不時給市井負累兵部尚書劉大夏因天變言之乃裁減中官歲省銀八十餘萬武宗之世各宮日進月進數倍天順時廚役之額當仁宗時僅六千三百餘名及憲宗增四之一世宗初減至四千一百名歲額銀撙節至十三萬兩中年復增至四十萬額派不足借支太倉太倉又不足乃令原供司府依數增派於是帝疑其乾沒下禮部問狀責光祿寺具數以奏帝復降旨詰責乃命御史稽覈月進揭帖兩月間省銀二萬餘兩自是歲以為常先是上供之物任土作貢曰歲辦不給則官出錢以市曰採辦其後本折兼收採辦愈繁於是召商置買物價多虧商賈匿迹二十七年戶部言京師召商納貨取直富商規避應役者皆貧弱下戶請覈實編審給事中羅崇奎言諸商所以重困者物價賤則減而貴則不敢增且收納不時一遭風雨遂不可用多致賠累既收之後所司更代不常不即給直或竟沈閣幸給直矣官司折閱於上番役齮齕於下名雖平估所得不能半諸弊若除商自樂赴奚用編審帝雖納其言而仍編審如戶部議穆宗朝光祿少卿李鍵奏十事帝乃可之頗有所減省停止承天香米外域珍禽奇獸罷寶坻魚鮮凡薦新之物領於光祿寺勿遣中官又從太監李芳請停徵加增細竹敕米白青鹽命一依成弘間例御史王宗載請停加派部議悉準原額果品百七萬八千餘斤牲口銀五萬八千餘兩免加派銀二萬餘未行而神宗立詔免之世宗末年歲用止十七萬兩穆宗裁二萬止十五萬餘經費省約矣萬曆初年益減至十三四萬中年漸增幾三十萬而鋪戶之累滋甚時中官進納索賂名鋪墊錢費不訾所支不足相抵民不堪命相率避匿乃僉京師富戶為商令下被僉者如赴死重賄營免官司密鈎若緝姦盜宛平知縣劉曰淑言京民一遇僉商取之不遺毫髮貲本悉罄請厚估先發以甦民困御史王孟震斥其越職曰淑自劾解官去至熹宗時商累益重有輸物於官終不得一錢者洪武時宮禁中市物視時估率加十錢其損上益下如此永樂初斥言採五色石者且以溫州輸礬困民罷染色布然內使之出始於是時工役繁興徵取稍急非土所有民破產購之軍器之需尤無算仁宗時山場園林湖池坑冶果樹𧔧蜜官設守禁者悉予民宣宗罷閘辦金銀其他紙靛紵絲紗羅氁緞香貨銀硃金箔紅花茜草麂皮香蠟藥物果品海味硃紅戧金龍鳳器物多所罷減副都御史弋謙言有司給買辦物料價十不償一無異空取帝嘉納之諭工部察懲又因泰安州稅課局大使郝智言悉召還所遣官敕自今更不許輒遣自軍器軍需外凡買辦者盡停止然寬免之詔屢下內使屢敕撤還而奉行不實宦者輒名採辦虐取於民誅袁琦阮巨隊等十餘人患乃稍息英宗立罷諸處採買及造下西洋船木諸冗費多敕省正統八年以買辦擾民始令於存留錢糧內折納就近解兩京先是仁宗時令中官鎮守邊塞英宗復設各省鎮守又有守備分守中官布列天下及憲宗時益甚購書採藥之使搜取珍玩靡有孑遺抑賣鹽引私採禽鳥糜官帑納私賂動以巨萬計太嶽太和山降真諸香通三歲用七千斤至是倍之內府物料有至五六倍者孝宗立頗有減省甘肅巡撫羅明言鎮守分守內外官競尚貢獻各遣使屬邊衞搜方物名曰採辦實扣軍士月糧馬價或巧取番人犬馬奇珍且設膳乳諸房僉廚役造酥油諸物比及起運沿途騷擾乞悉罷之報可然其後靡費漸多至武宗任劉瑾漁利無厭鎮守中官率貢銀萬計皇店諸名不一歲辦多非土產諸布政使來朝各陳進貢之害皆不省世宗初內府供應減正德什九中年以後營建齋醮採木採香採玉寶石吏民奔命不暇用黃白蠟至三十餘萬斤又有召買有折色視正數三倍沈香降香海漆諸香至十餘萬斤又分道購龍涎香十餘年未獲使者因請海舶入澳久乃得之方澤朝日壇爵用紅黃玉求不得購之陝西邊境遣使覓於阿丹去土魯番西南二千里太倉之銀頗取入承運庫辦金寶珍珠於是猫兒睛祖母碌石綠撤孛尼石紅剌石北河洗石金剛鑽朱藍石紫英石甘黃玉無所不購穆宗承之購珠寶益急給事中李己陳吾德疏諫己下獄吾德削籍自是供億寖多矣神宗初內承運庫太監崔敏請買金珠張居正封還敏疏事遂寢久之帝日黷貨開採之議大興費以鉅萬計珠寶價增舊二十倍戶部尚書陳蕖言庫藏已竭宜加撙節中旨切責而順天府尹以大珠鴉青購買不如旨鐫級至於末年內使雜出採造益繁內府告匱至移濟邊銀以供之熹宗一聽中官採造尤夥莊烈帝立始務釐剔節省而庫藏已耗竭矣永樂中後軍都督府供柴炭役宣府十七衞所軍士採之邊關宣宗初以邊木以扼敵騎且邊軍不宜他役詔免其採伐令歲納銀二萬餘兩後府召商買納四年置易州山廠命工部侍郎督之僉北直山東山西民夫轉運而後府輸銀召商如故初歲用薪止二千萬餘斤弘治中增至四千萬餘斤轉運既艱北直山東山西乃悉輸銀以召商正德中用薪益多增直三萬餘兩凡收受柴炭加耗十之三中官輒私加數倍逋負日積至以三年正供補一年之耗尚書李鐩議令正耗相準而主收者復私加乃以四萬斤為萬斤又有輸納浮費民弗能堪世宗登極乃酌減之隆慶六年後府採納艱苦改屬兵部武庫司萬曆中歲計柴價銀三十萬兩中官得自徵比諸商酷刑悉索而人以惜薪司為陷阱云採木之役自成祖繕治北京宮殿始永樂四年遣尚書宋禮如四川侍郎古朴如江西師逵金純如湖廣副都御史劉觀如浙江僉都御史史仲成如山西禮言有數大木一夕自浮大谷達於江天子以為神名其山曰神木山遣官祠祭十年復命禮採木四川仁宗立已其役宣德元年修南京天地山川壇殿宇復命侍郎黃宗載吳廷用採木湖廣未幾因旱災已之尋復採大木湖廣而諭工部酌省未幾復罷其他處亦時採時罷弘治時發內帑修清寧宮停四川採木正德時採木湖廣川貴命侍郎劉丙督運太監劉養劾其不中梁棟責丙陳狀工部尚書李鐩奪俸嘉靖元年革神木千戶所及衞卒二十年宗廟災遣工部侍郎潘鑑副都御史戴金於湖廣四川採辦大木二十六年復遣工部侍郎劉伯躍採於川湖貴州湖廣一省費至三百三十九萬餘兩又遣官覈諸處遺留大木郡縣有司以遲悞大工逮治褫黜非一並河州縣尤苦之萬曆中三殿工興採楠杉諸木於湖廣四川貴州費銀九百三十餘萬兩徵諸民間較嘉靖年費更倍而採鷹平條橋諸木於南直浙江者商人逋直至二十五萬科臣劾督運官遲延侵冒不報虛糜乾沒公私交困焉廣東珠池率數十年一採宣宗時有請令中官採東莞珠池者繫之獄英宗始使中官監守天順間嘗一採之至弘治十二年歲久珠老得最多費銀萬餘獲珠二萬八千兩遂罷監守中官正德九年又採嘉靖五年又採珠小而嫩亦甚少八年復詔採兩廣巡撫林富言五年採珠之役死者五十餘人而得珠僅八十兩天下謂以人易珠恐今日雖以人易珠亦不可得給事中王希文言雷廉珠池祖宗設官監守不過防民爭奪正德間逆豎用事傳奉採取流毒海濱陛下御極革珠池少監未久旋復驅無辜之民蹈不測之險以求不可必得之物而責以難足之數非聖政所宜有皆不聽隆慶六年詔雲南進寶石二萬塊廣東採珠八千兩神宗立停罷既而以太后進奉諸王皇子公主冊立分封婚禮令歲辦金珠寶石復遣中官李敬李鳳廣東採珠五千一百餘兩給事中包見捷力諫不納至三十二年始停採四十一年以指揮倪英言復開明制兩京織染內外皆置局內局以應上供外局以備公用南京有神帛堂供應機房蘇杭等府亦各有織染局歲造有定數洪武時置四川山西諸行省浙江紹興織染局又置藍靛所於儀真六合種青藍以供染事未幾悉罷又罷天下有司歲織緞匹有賞賚給以絹帛於後湖置局織造永樂中復設歙縣織染局令陝西織造駝正統時置泉州織造局天順四年遣中官往蘇松杭嘉湖五府於常額外增造綵緞七千匹工部侍郎翁世資請減之下錦衣獄謫衡州知府增造坐派於此始孝宗初立停免蘇杭嘉湖應天織造其後復設乃給中官鹽引鬻於淮以供費正德元年尚衣監言內庫所貯諸色紵絲紗羅織金閃色蟒龍斗牛飛魚麒麟獅子通袖膝襴並胸背斗牛飛仙天鹿俱天順間所織欽賞已盡乞令應天蘇杭諸府依式織造帝可之乃造萬七千餘匹蓋成弘時頒賜甚謹自劉瑾用事倖璫陳乞漸廣有未束髮而僭冒章服者濫賞日增中官乞鹽引關鈔無已監督織造威劫官吏至世宗時其禍未訖即位未幾即令中官監織於南京蘇杭陝西穆宗登極詔撤中官巳而復遣萬曆七年蘇松水災給事中顧九思等請取回織造內臣帝不聽大學士張居正力陳年饑民疲不堪催督乃許之未幾復遣中官居正卒添織漸多蘇杭松嘉湖五府歲造之外又令浙江福建常鎮徽寧揚廣德諸府州分造增萬餘匹陝西織造羊絨七萬四千有奇南直浙江紵絲紗羅綾紬絹帛山西潞紬皆視舊制加丈尺二三年間費至百萬取給戶工二部搜括庫藏扣留軍國之需部臣科臣屢爭皆不聽末年復令稅監兼司姦弊日滋矣明初設南北織染局南京供應機房各省直歲造供用蘇杭織造間行間止自萬曆中頻數派造歲至十五萬匹相沿日久遂以為常陝西織造絨袍弘正間偶行嘉隆時復遣亦遂沿為常例燒造之事在外臨清甎廠京師琉璃黑窯廠皆造甎瓦以供營繕宣宗始遣中官張善之饒州造奉先殿几筵龍鳳文白瓷祭器磁州造趙府祭器踰年善以罪誅罷其役正統元年浮梁民進瓷器五萬餘償以鈔禁私造黃紫紅綠青藍白地青花諸瓷器違者罪死宮殿告成命造九龍九鳳膳案諸器既又造青龍白地花缸王振以為有璺遣錦衣指揮杖提督官敕中官往督更造成化間遣中官之浮梁景德鎮燒造御用瓷器最多且久費不貲孝宗初撤回中官尋復遣弘治十五年復撤正德末復遣自弘治以來燒造未完者三十餘萬器嘉靖初遣中官督之給事中陳皐謨言其大為民害請罷之帝不聽十六年新作七陵祭器三十七年遣官之江西造內殿醮壇瓷器三萬後添設饒州通判專管御器廠燒造是時營建最繁近京及蘇州皆有甎廠隆慶時詔江西燒造瓷器十餘萬萬曆十九年命造十五萬九千既而復增八萬至三十八年未畢工自後役亦漸寢國家經費莫大於祿餉洪武九年定諸王公主歲供之數親王米五萬石鈔二萬五千貫錦四十匹紵絲三百匹紗羅各百匹絹五百匹冬夏布各千匹綿二千兩鹽二百引茶千斤皆歲支馬料草月支五十匹其緞匹歲給匠料付王府自造靖江王米二萬石鈔萬貫餘物半親王馬料草二十匹公主未受封者紵絲紗羅各十匹絹冬夏布各三十匹綿二百兩已受封賜莊田一所歲收糧千五百石鈔二千貫親王子未受封視公主女未受封者半之子已受封郡王米六千石鈔二千八百貫錦十匹紵絲五十匹紗羅減紵絲之半絹冬夏布各百匹綿五百兩鹽五十引茶三百斤馬料草十匹女已受封及已嫁米千石鈔千四百貫其緞匹於所在親王國造給皇太子之次嫡子幷庶子既封郡王必俟出閤然後歲賜與親王子已封郡王者同女俟及嫁與親王女已嫁者同凡親王世子與已封郡王同郡王嫡長子襲封郡王者半始封郡王女已封縣主及已嫁者米五百石鈔五百貫餘物半親王女已受封者郡王諸子年十五各賜田六十頃除租稅為永業其所生子世守之後乃令止給祿米二十八年詔以官吏軍士俸給彌廣量減諸王歲給以資軍國之用乃更定親王萬石郡王二千石鎮國將軍千石輔國將軍奉國將軍鎮國中尉以二百石遞減輔國中尉奉國中尉以百石遞減公主及駙馬二千石郡王及儀賓八百石縣主郡君及儀賓以二百石遞減縣君鄉君及儀賓以百石遞減自後為永制仁宗即位增減諸王歲祿非常典也時鄭越襄荊淮滕梁七王未之藩令暫給米歲三千石遂為例正統十二年定王府祿米將軍自賜名受封日為始縣主儀賓自出閤成婚日為始於附近州縣秋糧內撥給景泰七年定郡王將軍以下祿米出閤在前受封在後以受封日為始受封在前出閤在後以出閤日為始宗室有罪革爵者曰庶人英宗初頗給以糧嘉靖中月支米六石萬曆中減至二石或一石初太祖大封宗藩令世世皆食歲祿不授職任事親親之誼甚厚然天潢日繁而民賦有限其始祿米盡支本色既而本鈔兼支有中半者有本多於折者其則不同厥後勢不能給而冒濫轉益多姦弊百出不可究詰自弘治間禮部尚書倪岳即條請節減以寬民力嘉靖四十一年御史林潤言天下之事極弊而大可慮者莫甚於宗藩祿廩天下歲供京師糧四百萬石而諸府祿米凡八百五十三萬石以山西言存留百五十二萬石而宗祿三百十二萬以河南言存留八十四萬三千石而宗祿百九十二萬是二省之糧借令全輸不足供祿米之半況吏祿軍餉皆出其中乎故自郡王以上猶得厚享將軍以下多不能自存饑寒困辱勢所必至常號呼道路聚詬有司守土之臣每懼生變夫賦不可增而宗室日益蕃衍可不為寒心宜令大臣科道集議於朝且諭諸王以勢窮弊極不得不通變之意令戶部會計賦額以十年為率通計兵荒蠲免存留及王府增封之數共陳善後良策斷自宸衷以垂萬世不易之規下部覆議從之至四十四年乃定宗藩條例郡王將軍七分折鈔中尉六分折鈔郡縣主郡縣鄉君及儀賓八分折鈔他冒濫者多所裁減於是諸王亦奏辭歲祿少者五百石多者至二千石歲出為稍紓而將軍以下益不能自存矣明初勳戚皆賜官田以代常祿其後令還田給祿米公五千石至二千五百石侯千五百石至千石伯千石至七百石百官之俸自洪武初定丞相御史大夫以下歲祿數刻石官署取給於江南官田十三年重定內外文武官歲給祿米俸鈔之制而雜流吏典附焉正從一二三四品官自千石至三百石每階遞減百石皆給俸鈔三百貫正五品二百二十石從減五十石鈔皆百五十貫正六品百二十石從減十石鈔皆九十貫正從七品視從六品遞減十石鈔皆六十貫正八品七十五石從減五石鈔皆四十五貫正從九品視從八品遞減五石鈔皆三十貫勒之石吏員月俸一二品官司提控都吏二石五斗掾史令史二石二斗知印承差吏典一石二斗三四品官司令史書吏司吏二石承差吏典半之五品官司司吏一石二斗吏典八斗六品以下司吏一石光祿寺等吏典六斗教官之祿州學正月米二石五斗縣教諭府州縣訓導月米二石首領官之祿凡內外官司提控案牘州吏目縣典史皆月米三石雜職之祿凡倉庫關場司局鐵冶遞運批驗所大使月三石副使月二石五斗河泊所官月米二石閘壩官月米一石五斗天下學校師生廩膳米人日一升魚肉鹽醯之屬官給之宦官俸月米一石二十五年更定百官祿正一品月俸米八十七石從一品至正三品遞減十三石至三十五石從三品二十六石正四品二十四石從四品二十一石正五品十六石從五品十四石正六品十石從六品八石正七品至從九品遞減五斗至五石而止自後為永制洪武時官俸全給米間以錢鈔兼給錢一千鈔一貫抵米一石成祖即位令公侯伯皆全支米文武官俸則米鈔兼支官高者支米十之四五官卑者支米十之六八惟九品雜職吏典知印總小旗軍並全支米其折鈔者每米一石給鈔十貫永樂二年乃命公侯伯視文武官吏米鈔兼支仁宗立官俸折鈔每石至二十五貫宣德八年禮部尚書胡濙掌戶部議每石減十貫而以十分為準七分折絹絹一匹抵鈔二百貫少師蹇義等以為仁宗在春宮久深憫官員折俸之薄故即位特增數倍此仁政也詎可違濙不聽竟請於帝而行之而卑官日用不贍矣正統中五品以上米二鈔八六品以下米三鈔七時鈔價日賤每石十五貫者已漸增至二十五貫而戶部尚書王佐復奏減為十五貫成化二年從戶部尚書馬昂請又省五貫舊例兩京文武官折色俸上半年給鈔下半年給蘇木胡椒七年從戶部尚書楊鼎請以甲字庫所積之布估給布一匹當鈔二百貫是時鈔法不行一貫僅直錢二三文米一石折鈔十貫僅直二三十錢而布直僅二三百錢布一匹折米二十石則米一石僅直十四五錢自古官俸之薄未有若此者十六年又令以三梭布折米每匹抵三十石其後粗闊棉布亦抵三十石梭布極細者猶直銀二兩粗布僅直三四錢而已久之定布一匹折銀三錢於是官員俸給凡二曰本色曰折色其本色有三曰月米曰折絹米曰折銀米月米不問官大小皆一石折絹絹一匹當銀六錢折銀六錢五分當米一石其折色有二曰本色鈔曰絹布折鈔本色鈔十貫折米一石後增至二十貫絹布折鈔絹每匹折米二十石布一匹折米十石公侯之祿或本折中半或折多於本有差文武官俸正一品者本色僅十之三遞增至從九品本色乃十之七武職府衞官惟本色米折銀例每石二錢五分與文臣異餘並同其三大營副將參遊佐員每月米五石巡捕營提督參將亦如之巡捕中軍把總官月支口糧九斗旗牌官半之天下衞所軍士月糧洪武中令京外衞馬軍月支米二石步軍總旗一石五斗小旗一石二斗軍一石城守者如數給屯田者半之民匠充軍者八斗牧馬千戶所一石民丁編軍操練者一石江陰橫海水軍稍班碇手一石五斗陣亡病故軍給喪費一石在營病故者半之籍沒免死充軍者謂之恩軍家四口以上一石三口以下六斗無家口者四斗又給軍士月鹽有家口者二斤無者一斤在外衞所軍士以鈔準永樂中始令糧多之地旗軍月糧八分支米二分支鈔後山西陝西皆然而福建兩廣四川則米七鈔三江西則米鈔中半惟京軍及中都留守司河南浙江湖廣軍仍全支米已而定制衞軍有家屬者月米六斗無者四斗五升餘皆折鈔凡各衞調至京操備軍兼工作者米五斗其後增損不一而本折則例各鎮多寡不同不能具舉凡各鎮兵餉有屯糧有民運有鹽引有京運有主兵年例有客兵年例屯糧者明初各鎮皆有屯田一軍之田足贍一軍之用衞所官吏俸糧皆取給焉民運者屯糧不足加以民糧麥米豆草布鈔花絨運給戍卒故謂之民運後多議折銀鹽引者召商入粟開中商屯出糧與軍屯相表𩹉其後納銀運司名存而實亡京運始自正統中後屯糧鹽糧多廢而京運日益矣主兵有常數客兵無常數初各鎮主兵足守其地後漸不足增以募兵募兵不足增以客兵兵愈多坐食愈衆而年例亦日增云明田稅及經費出入之數見於掌故者皆略可考見洪武二十六年官民田總八百五十萬七千餘頃夏稅米麥四百七十一萬七千餘石錢鈔三萬九千餘錠絹二十八萬八千餘匹秋糧米二千四百七十二萬九千餘石錢鈔五千餘錠弘治時官民田總六百二十二萬八千餘頃夏稅米麥四百六十二萬五千餘石鈔五萬六千三百餘錠絹二十萬二千餘匹秋糧米二千二百十六萬六千餘石鈔二萬一千九百餘錠萬曆時官民田總七百一萬三千餘頃夏稅米麥總四百六十萬五千餘石起運百九十萬三千餘石餘悉存留鈔五萬七千九百餘錠絹二十萬六千餘匹秋糧米總二千二百三萬三千餘石起運千三百三十六萬二千餘石餘悉存留鈔二萬三千六百餘錠屯田六十三萬五千餘頃花園倉基千九百餘所徵糧四百五十八萬四千餘石糧草折銀八萬五千餘兩布五萬匹鈔五萬餘貫各運司提舉大小引鹽二百二十二萬八千餘引歲入之數內承運庫慈寧慈慶乾清三宮子粒銀四萬九千餘兩金花銀一百一萬二千餘兩金二千兩廣惠庫河西務等七鈔關鈔二千九百二十八萬餘貫錢五千九百七十七萬餘文京衞屯鈔五萬六千餘貫天財庫京城九門鈔六十六萬五千餘貫錢二百四十三萬餘文京通二倉幷薊密諸鎮漕糧四百萬石京衞屯豆二萬三千餘石太倉銀庫南北直隸浙江江西山東河南派剩麥米折銀二十五萬七千餘兩絲綿稅絲農桑絹折銀九萬餘兩綿布苧布折銀三萬八千餘兩百官祿米折銀二萬六千餘兩馬草折銀三十五萬三千餘兩京五草場折銀六萬三千餘兩各馬房倉麥豆草折銀二十餘萬兩戶口鹽鈔折銀四萬六千餘兩薊密永昌易遼東六鎮民運改解銀八十五萬三千餘兩各鹽運提舉餘鹽鹽課鹽稅銀一百萬三千餘兩黃白蠟折銀六萬八千餘兩霸大等馬房子粒銀二萬三千餘兩備邊幷新增地畝銀四萬五千餘兩京衞屯牧地增銀萬八千餘兩崇文門商稅牙稅一萬九千餘兩錢一萬八千餘貫張家灣商稅二千餘兩錢二千八百餘貫諸鈔關折銀二十二萬三千餘兩泰山香稅二萬餘兩贓罰銀十七萬餘兩商稅魚課富戶曆日民壯兵幷屯折改折月糧銀十四萬四千餘兩北直隸山東河南解各邊鎮麥米豆草鹽鈔折銀八十四萬二千餘兩諸雜物條目繁瑣者不具載所載歲入但計起運京邊者而存留不與焉歲出之數公侯駙馬伯祿米折銀一萬六千餘兩官吏監生俸米四萬餘石官吏折俸絹布銀四萬四千餘兩錢三千三百餘貫倉庫草場官攢甲斗光祿太常諸司及內府監局匠役本色米八萬六千餘石折色銀一萬三千餘兩錦衣等七十八衞所官