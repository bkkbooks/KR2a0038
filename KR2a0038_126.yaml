body:
  text: 明史卷一百二十六列傳第十四李文忠鄧愈湯和沐英李文忠字思本小字保兒盱眙人太祖姊子也年十二而母死父貞攜之轉側亂軍中瀕死者數矣踰二年乃謁太祖於滁陽太祖見保兒喜甚撫以為子令從己姓讀書穎敏如素習年十九以舍人將親軍從援池州破天完軍驍勇冠諸將別攻青陽石埭太平旌德皆下之敗元院判阿魯灰於萬年街復敗苗軍於於潛昌化進攻淳安夜襲洪元帥降其衆千餘授帳前左副都指揮兼領元帥府事尋會鄧愈胡大海之師取建德以為嚴州府守之苗帥楊完者以苗僚數萬水陸奄至文忠將輕兵破其陸軍取所馘首浮巨筏上水軍見之亦遁完者復來犯與鄧愈擊却之進克浦江禁焚掠示恩信義門鄭氏避兵山谷招之還以兵護之民大悅完者死其部將乞降撫之得三萬餘人與胡大海拔諸暨張士誠寇嚴州禦之東門使別將出小北門間道襲其後夾擊大破之踰月復來攻又破之大浪灘乘勝克分水士誠遣將據三溪復擊敗之斬陸元帥焚其壘士誠自是不敢窺嚴州進同僉行樞密院事胡大海得漢將李明道王漢二送文忠所釋而禮之使招建昌守將王溥溥降苗將蔣英劉震殺大海以金華叛文忠遣將擊走之親撫定其衆處州苗軍亦殺耿再成叛文忠遣將屯縉雲以圖之拜浙東行省左丞總制嚴衢信處諸全軍事吳兵十萬方急攻諸全守將謝再興告急遣同僉胡德濟往援再興復請益兵文忠兵少無以應會太祖使邵榮討處州亂卒文忠乃揚言徐右丞邵平章將大軍刻日進吳軍聞之懼謀夜遁德濟與再興帥死士夜半開門突擊大破之諸全遂完明年再興叛降於吳以吳軍犯東陽文忠與胡深迎戰於義烏將千騎橫突其陣大敗之已用深策去諸全五十里別築一城以相掎角士誠遣司徒李伯昇以十六萬衆來攻不克踰年復以二十萬衆攻新城文忠帥朱亮祖等馳救去新城十里而軍德濟使人告賊勢盛宜少駐以俟大軍文忠曰兵在謀不在衆乃下令曰彼衆而驕我少而銳以銳遇驕必克之矣彼軍輜重山積此天以富汝曹也勉之會有白氣自東北來覆軍上占之曰必勝詰朝會戰天大霧晦冥文忠集諸將仰天誓曰國家之事在此一舉文忠不敢愛死以後三軍乃使元帥徐大興湯克明等將左軍嚴德王德等將右軍而自以中軍當敵衝會處州援兵亦至奮前搏擊霧稍開文忠橫槊引鐵騎數十乘高馳下衝其中堅敵以精騎圍文忠數重文忠手所格殺甚衆縱騎馳突所向皆披靡大軍乘之城中兵亦鼓譟出敵遂大潰逐北數十里斬首數萬級溪水盡赤獲將校六百甲士三千鎧仗芻粟收數日不盡伯昇僅以身免捷聞太祖大喜召歸宴勞彌日賜御衣名馬遣還鎮明年秋大軍伐吳令攻杭州以牽制之文忠帥亮祖等克桐廬新城富陽遂攻餘杭守將謝五再興弟也諭之降許以不死五與再興子五人出降諸將請僇之文忠不可遂趨杭州守將潘元明亦降整軍入元明以女樂迎麾去之營於麗譙下令曰擅入民居者死一卒借民釜斬以徇城中帖然得兵三萬糧二十萬就加榮祿大夫浙江行省平章事復姓李氏大軍征閩文忠別引軍屯浦城以逼之師還餘寇金子隆等聚衆剽掠文忠復討擒之遂定建延汀三州命軍中收養道上棄兒所全活無算洪武二年春以偏將軍從右副將軍常遇春出塞薄上都走元帝語具遇春傳遇春卒命文忠代將其軍奉詔會大將軍徐達攻慶陽行次太原聞大同圍急謂左丞趙庸曰我等受命而來閫外之事苟利於國專之可也今大同甚急援之便遂出雁門次馬邑敗元游兵擒平章劉帖木進至白楊門天雨雪已駐營文忠令移前五里阻水自固元兵乘夜來劫文忠堅壁不動質明敵大至以二營委之殊死戰度敵疲乃出精兵左右擊大破之擒其將脫列伯俘斬萬餘人窮追至莽哥倉而還明年拜征虜左副將軍與大將軍分道北征以十萬人出野狐嶺至興和降其守將進兵察罕腦兒擒平章竹真次駱駝山走平章沙不丁次開平降平章上都罕等時元帝已崩太子愛猷識里達臘新立文忠諜知之兼程趨應昌元嗣君北走獲其嫡子買的立八剌暨后妃宮人諸王將相官屬數百人及宋元玉璽金寶十五玉冊二鎮圭大圭玉帶玉斧各一出精騎窮追至北慶州而還道興州擒國公江文清等降三萬七千人至紅羅山又降楊思祖之衆萬六千餘人獻捷京師帝御奉天門受朝賀大封功臣文忠功最授開國輔運推誠宣力武臣特進榮祿大夫右柱國大都督府左都督封曹國公同知軍國事食祿三千石予世券四年秋傅友德等平蜀令文忠往拊循之築成都新城發軍戍諸郡要害乃還明年復以左副將軍由東道北征出居庸趨和林至口溫元人遁進至臚朐河令部將韓政等守輜重而自帥大軍人齎二十日糧疾馳至土剌河元太師蠻子哈剌章悉衆渡河列騎以待文忠引軍薄之敵稍却至阿魯渾河敵來益衆文忠馬中流矢下馬持短兵鬬指揮李榮以所乘馬授文忠而自奪敵馬乘之文忠得馬益殊死戰遂破敵虜獲萬計追奔至稱海敵兵復大集文忠乃斂兵據險椎牛饗士縱所獲馬畜於野敵疑有伏稍稍引去文忠亦引還失故道至桑哥兒麻乏水渴甚禱於天所乘馬跑地泉湧出三軍皆給乃刑牲以祭遂還是役也兩軍勝負相當而宣寧侯曹良臣指揮使周顯常榮張耀俱戰死以故賞不行六年行北平山西邊敗敵於三角村七年遣部將分道出塞至三不剌川俘平章陳安禮至順寧楊門斬真珠驢至白登擒太尉不花其秋帥師攻大寧高州克之斬宗王𩽆𩽆失里擒承旨百家奴追奔至氈帽山擊斬魯王獲其妃及司徒答海等進師豐州擒元故官十二人馬駝牛羊甚衆窮追至百干兒乃還是後屢出備邊十年命與韓國公李善長議軍國重事十二年洮州十八番族叛與西平侯沐英合兵討平之築城東籠山南川置洮州衞還言西安城中水鹹鹵不可飲請鑿地引龍首渠入城以便汲從之還掌大都督府兼領國子監事文忠器量沉宏人莫測其際臨陣踔厲風發遇大敵益壯頗好學問常師事金華范祖幹胡翰通曉經義為詩歌雄駿可觀初太祖定應天以軍興不給增民田租文忠請之得減額其釋兵家居恂恂若儒者帝雅愛重之家故多客嘗以客言勸帝少誅僇又諫帝征日本及言宦者過盛非天子不近刑人之義以是積忤旨不免譴責十六年冬遂得疾帝親臨視使淮安侯華中護醫藥明年三月卒年四十六帝疑中毒之貶中爵放其家屬於建昌衞諸醫並妻子皆斬親為文致祭追封岐陽王諡武靖配享太廟肖像功臣廟位皆第三父貞前卒贈隴西王諡恭獻文忠三子長景隆次增枝芳英皆帝賜名增枝初授勳衞擢前軍左都督芳英官至中都正留守景隆小字九江讀書通典故長身眉目疎秀顧盼偉然每朝會進止雍容甚都太祖數目屬之十九年襲爵屢出練軍湖廣陝西河南巿馬西番進掌左軍都督府事加太子太傅建文帝即位景隆以肺腑見親任嘗被命執周王橚及燕兵起長興侯耿炳文討燕失利齊泰黃子澄等共薦景隆乃以景隆代炳文為大將軍將兵五十萬北伐賜通天犀帶帝親為推輪餞之江滸令一切便宜行事景隆貴公子不知兵惟自尊大諸宿將多怏怏不為用景隆馳至德州會兵進營河間燕王聞之喜語諸將曰李九江紈綺少年耳易與也遂命世子居守戒勿出戰而自引兵援永平直趨大寧景隆聞之進圍北平都督瞿能攻張掖門垂破景隆忌能功止之及燕師破大寧還軍擊景隆景隆屢大敗奔德州諸軍皆潰明年正月燕王攻大同景隆引軍出紫荊關往救無功而還帝慮景隆權尚輕遣中官齎璽書賜黃鉞弓矢專征伐方渡江風雨舟壞賜物盡失乃更製以賜四月景隆大誓師於德州會武定侯郭英安陸侯吳傑等於真定合軍六十萬進營白溝河與燕軍連戰復大敗璽書斧鉞皆委棄走德州復走濟南斯役也王師死者數十萬人南軍遂不支帝始詔景隆還黃子澄慚憤執景隆於朝班請誅之以謝天下燕師渡江帝旁皇甚方孝孺復請誅景隆帝皆不問使景隆及尚書茹瑺都督王佐如燕軍割地請和燕兵屯金川門景隆與谷王橞開門迎降燕王即帝位授景隆奉天輔運推誠宣力武臣特進光祿大夫左柱國增歲祿千石朝廷有大事景隆猶以班首主議諸功臣咸不平永樂二年周王發其建文時至邸受賂事刑部尚書鄭賜等亦劾景隆包藏禍心蓄養亡命謀為不軌詔勿問已成國公朱能吏部尚書蹇義與文武羣臣廷劾景隆及弟增枝逆謀有狀六科給事中張信等復劾之詔削勳號絕朝請以公歸第奉長公主祀亡何禮部尚書李至剛等復言景隆在家坐受閽人伏謁如君臣禮大不道增枝多立莊田蓄僮僕無慮千百意叵測於是奪景隆爵並增枝及妻子數十人錮私第沒其財產景隆嘗絕食旬日不死至永樂末乃卒正統十三年始下詔令增枝等啟門第得自便弘治初錄文忠後以景隆曾孫璿為南京錦衣衞世指揮使卒子濂嗣卒子性嗣嘉靖十一年詔封性為臨淮侯祿千石踰年卒無子復以濂弟沂紹封卒子庭竹嗣屢典軍府提督操江佩平蠻將軍印鎮湖廣卒子言恭嗣守備南京入督京營累加少保言恭字惟寅好學能詩折節寒素子宗城少以文學知名萬曆中倭犯朝鮮兵部尚書石星主封貢薦宗城才授都督僉事充正使持節往指揮楊方亨副之宗城至朝鮮釜山倭來益衆道路籍籍言且劫二使宗城恐變服逃歸而方亨渡海為倭所辱宗城下獄論戍以其子邦鎮嗣侯明亡爵絕鄧愈虹人初名友德太祖為賜名父順興據臨濠與元兵戰死兄友隆代之復病死衆推愈領軍事愈年甫十六每戰必先登陷陣軍中咸服其勇太祖起滁陽愈自盱眙來歸授管軍總管從渡江克太平破擒陳埜先略定溧陽溧水下集慶取鎮江皆有功進廣興翼元帥出守廣德州破長鎗帥謝國璽於城下俘其總管武世榮獲甲士千人移鎮宣州以其兵取績溪與胡大海克徽州遷行樞密院判官守之苗帥楊完者以十萬衆來攻守禦單弱愈激厲將士與大海合擊破走之進拔休寧婺源獲卒三千徇下高河壘與李文忠胡大海攻建德道遂安破長鎗帥余子貞逐北至淳安又破其援兵遂克建德楊完者來攻破擒其將李副樞降溪洞兵三萬踰月復破完者於烏龍嶺再遷僉行樞密院事略臨安李伯昇來援敗之閑林寨遣使說降饒州守將于光遂移守饒饒濱彭蠡湖與友諒接境數來侵輒擊却之進江南行省參政總制各翼軍馬取浮梁徇樂平餘干建昌皆下友諒撫州守將鄧克明為吳宏所攻遣使偽降以緩師愈知其情卷甲夜馳二百里比明入其城克明出不意單騎走愈號令嚴肅秋毫不犯遂定撫州克明不得已降會友諒丞相胡廷瑞獻龍興路改洪都府以愈為江西行省參政守之而命降將祝宗康泰以所部從二人初不欲降及奉命從徐達攻武昌遂反舟次女兒港趨還乘夜破新城門而入愈倉卒聞變以數十騎走數與賊遇從騎死且盡窘甚連易三馬馬輒踣最後得養子馬乘之始得奪撫州門以出奔還應天太祖弗之罪也既而徐達還師復洪都復命愈佐大都督朱文正鎮之其明年友諒衆六十萬入寇樓船高與城等乘漲直抵城下圍數百重愈分守撫州門當要衝友諒親督衆來攻城壞且三十餘丈愈且築且戰敵攻益急晝夜不解甲者三月太祖自將來援圍始解論功與克敵等太祖已平武昌使愈帥兵徇江西未附州縣鄧克明之弟志清據永豐有卒二萬愈擊破之擒其大帥五十餘人從常遇春平沙坑麻嶺諸寨進兵取吉安圍贛州五月乃克之進江西行省右丞時年二十八兵興諸將早貴未有如愈與李文忠者愈為人簡重慎密不憚危苦將軍嚴善撫降附其徇安福也部卒有虜掠者判官潘樞入謁面責之愈驚起謝趣下令掠民者斬索軍中所得子女盡出之樞因閉置空舍中自坐舍外作糜食之卒有謀乘夜劫取者愈鞭之以徇樞悉護遣還其家民大悅已而遇春克襄陽以愈為湖廣行省平章鎮其地賜以書曰爾戍襄陽宜謹守法度山寨來歸者兵民悉仍故籍小校以下悉令屯種且耕且戰爾所戍地鄰擴廓若爾愛加於民法行於軍則彼所部皆將慕義來歸如脫虎口就慈母我賴爾如長城爾其勉之愈披荊棘立軍府營屯拊循招徠威惠甚著吳元年建御史臺召為右御史大夫領臺事洪武元年兼太子諭德大軍經略中原愈為征戍將軍帥襄漢兵取南陽以北未附州郡遂克唐州進攻南陽敗元兵於瓦店逐北抵城下遂克之擒史國公等二十六人隨葉舞陽魯山諸州縣相繼降攻下牛心光石洪山諸山寨均房金商之地悉定三年以征虜左副副將軍從大將軍出定西擴廓屯車道峴愈直抵其壘立柵逼之擴廓敗走分兵自臨洮進克河州招諭吐蕃諸酋長宣慰何鎖南普等皆納印請降追豫王至西黃河抵黑松林破斬其大將河州以西𩽆甘烏斯藏諸部悉歸附出甘肅西北數千里而還論功授開國輔運推誠宣力武臣特進榮祿大夫右柱國封衞國公同參軍國事歲祿三千石予世券四年伐蜀命愈赴襄陽練軍馬運糧給軍士五年辰澧諸蠻作亂以愈為征南將軍江夏侯周德興江陰侯吳良為副討之愈帥楊璟黃彬出澧州克四十八洞又捕斬房州反者六年以右副將軍從徐達巡西北邊十年吐番川藏為梗剽貢使愈以征西將軍偕副將軍沐英討之分兵為三道窮追至崑崙山俘斬萬計獲馬牛羊十餘萬留兵戍諸要害乃還道病至壽春卒年四十一追封寧河王諡武順長子鎮嗣改封申國公以征南副將軍平永新龍泉山寇再出塞有功其妻李善長外孫也善長敗坐姦黨誅弟銘錦衣衞指揮僉事征蠻卒於軍有子源為鎮後弘治中授源孫炳為南京錦衣衞世指揮使嘉靖十一年詔封炳子繼坤定遠侯五傳至文明崇禎末死流賊之難湯和字鼎臣濠人與太祖同里閈幼有奇志嬉戲嘗習騎射部勒羣兒及長身長七尺倜儻多計略郭子興初起和帥壯士十餘人歸之以功授千戶從太祖攻大洪山克滁州授管軍總管從取和州時諸將多太祖等夷莫肯為下和長太祖三歲獨奉約束甚謹太祖甚悅之從定太平獲馬三百從擊陳埜先流矢中左股拔矢復鬬卒與諸將破擒埜先別下溧水句容從定集慶從徐達取鎮江進統軍元帥徇奔牛呂城降陳保二取金壇常州以和為樞密院同僉守之常與吳接境張士誠間諜百出和防禦嚴密敵莫能窺再寇再擊却之俘斬千計進攻無錫大破吳軍於錫山走莫天祐獲其妻子進中書左丞以舟師徇黃楊山敗吳水軍獲千戶四十九人拜平章政事援長興與張士信戰城下城中兵出夾擊大敗之俘卒八千解圍而還討平江西諸山寨永新守將周安叛進擊敗之連破其十七寨圍城三月克之執安以獻還守常州從大軍伐士誠克太湖水寨下吳江州圍平江戰於閶門飛礮傷左臂召還應天創愈復往攻克之論功賜金帛初建御史臺以和為左御史大夫兼太子諭德尋拜征南將軍與副將軍吳禎帥常州長興江陰諸軍討方國珍渡曹娥江下餘姚上虞取慶元國珍走入海追擊敗之獲其大帥二人海舟二十五艘斬馘無算還定諸屬城遣使招國珍國珍詣軍門降得卒二萬四千海舟四百餘艘浙東悉定遂與副將軍廖永忠伐陳友定自明州由海道乘風抵福州之五虎門駐師南臺使人諭降不應遂圍之敗平章曲出於城下參政袁仁請降遂乘城入分兵徇興化漳泉及福寧諸州縣進拔延平執友定送京師時洪武元年正月也大軍方北伐命造舟明州運糧輸直沽海多颶風輸鎮江而還拜偏將軍從大將軍西征與右副將軍馮勝自懷慶踰太行取澤潞晉絳諸州郡從大將軍拔河中明年渡河入潼關分兵趨涇州使部將招降張良臣既而叛去會大軍圍慶陽執斬之又明年復以右副副將軍從大將軍敗擴廓於定西遂定寧夏逐北至察罕腦兒擒猛將虎陳獲馬牛羊十餘萬徇東勝大同宣府皆有功還授開國輔運推誠宣力武臣榮祿大夫柱國封中山侯歲祿千五百石予世券四年拜征西將軍與副將軍廖永忠帥舟師溯江伐夏夏人以兵扼險攻不克江水暴漲駐師大溪口久不進而傅友德已自秦隴深入取漢中永忠先驅破瞿塘關入夔州和乃引軍繼之入重慶降明昇師還友德永忠受上賞而和不及明年從大將軍北伐遇敵於斷頭山戰敗亡一指揮帝不問尋與李善長營中都宮闕鎮北平甓彰德城征察罕腦兒大捷九年伯顏帖木兒為邊患以征西將軍防延安伯顏乞和乃還十一年春進封信國公歲祿三千石議軍國事數出中都臨清北平練軍伍完城郭十四年以左副將軍出塞征乃兒不花破敵灰山營獲平章別里哥樞密使久通而還十八年思州蠻叛以征虜將軍從楚王討平之俘獲四萬擒其酋以歸和沉敏多智數頗有酒過守常州時嘗請事於太祖不得醉出怨言曰吾鎮此城如坐屋脊左顧則左右顧則右太祖聞而銜之平中原師還論功以和征閩時放遣陳友定餘孽八郡復擾師還為秀蘭山賊所襲失二指揮故不得封公伐蜀還面數其逗撓罪頓首謝乃已其封信國公也猶數其常州時過失鐫之券於時帝春秋寖高天下無事魏國曹國皆前卒意不欲諸將久典兵未有以發也和以間從容言臣犬馬齒長不堪復任驅策願得歸故鄉為容棺之墟以待骸骨帝大悅立賜鈔治第中都並為諸公侯治第既而倭寇上海帝患之顧謂和曰卿雖老強為朕一行和請與方鳴謙俱鳴謙國珍從子也習海事常訪以禦倭策鳴謙曰倭海上來則海上禦之耳請量地遠近置衞所陸聚步兵水具戰艦則倭不得入入亦不得傅岸近海民四丁籍一以為軍戍守之可無煩客兵也帝以為然和乃度地浙西東並海設衞所城五十有九選丁壯三萬五千人築之盡發州縣錢及籍罪人貲給役役夫往往過望而民不能無擾浙人頗苦之或謂和曰民讟矣奈何和曰成遠算者不恤近怨任大事者不顧細謹復有讟者齒吾劍踰年而城成稽軍次定考格立賞令浙東民四丁以上者戶取一丁戍之凡得五萬八千七百餘人明年閩中並海城工竣和還報命中都新第亦成和帥妻子陛辭賜黃金三百兩白金二千兩鈔三千錠彩幣四十有副夫人胡氏賜亦稱是並降璽書褒諭諸功臣莫得比焉自是和歲一朝京師二十三年朝正旦感疾失音帝即日臨視惋嘆久之遣還里疾小間復命其子迎至都俾以安車入內殿宴勞備至賜金帛御膳法酒相屬二十七年病寖篤不能興帝思見之詔以安車入覲手拊摩之與里閈故舊及兵興艱難事甚悉和不能對稽首而已帝為流涕厚賜金帛為葬費明年八月卒年七十追封東甌王諡襄武和晚年益為恭慎入聞國論一語不敢外泄媵妾百餘病後悉資遣之所得賞賜多分遺鄉曲見布衣時故交遺老歡如也當時公侯諸宿將坐姦黨先後麗法稀得免者而和獨享壽考以功名終嘉靖間東南苦倭患和所築沿海城戍皆堅緻久且不圮浙人賴以自保多歌思之巡按御史請於朝立廟以祀和五子長子鼎為前軍都督僉事從征雲南道卒少子醴積功至左軍都督同知征五開卒於軍鼎子晟晟子文瑜皆早世不得嗣英宗時文瑜子傑乞嗣爵竟以歷四十餘年未襲罷之傑無子以弟倫之子紹宗為後孝宗錄功臣後授紹宗南京錦衣衞世指揮使嘉靖十一年封靈璧侯食祿千石傳子至孫世隆隆慶中協守南京兼領後府改提督漕運歷四十餘年以勞加太子太保進少保卒諡僖敏傳爵至明亡乃絕和曾孫胤勣字公讓為諸生工詩負才使氣巡撫尚書周忱使作啟事即席具數萬言忱薦之朝少保于謙召詢古今將略及兵事胤勣應對如響累授錦衣千戶偕中書舍人趙榮通問英宗於沙漠脫脫不花問中朝事慷慨酬答不少屈景泰中用尚書胡濙薦署指揮僉事天順中錦衣偵事者摭胤勣舊事以聞謫為民成化初復故官三年擢署都指揮僉事為延綏東路參將分守孤山堡孤山最當寇衝胤勣奏請築城聚糧增兵戍守未報寇大至胤勣病力疾上馬陷伏死事聞贈祭如例沐英字文英定遠人少孤從母避兵母又死太祖與孝慈皇后憐之撫為子從朱姓年十八授帳前都尉守鎮江稍遷指揮使守廣信已從大軍征福建破分水關略崇安別破閔溪十八寨縛馮谷保始命復姓移鎮建寧節制邵武延平汀州三衞尋遷大都督府僉事進同知府中機務繁積英年少明敏剖決無滯后數稱其才帝亦器重之洪武九年命乘傳詣關陝抵熙河問民疾苦事有不便更置以聞明年充征西副將軍從衞國公鄧愈討吐番西略川藏耀兵崑崙功多封開國輔運推誠宣力武臣榮祿大夫柱國西平侯食祿二千五百石予世券明年拜征西將軍討西番敗之土門峽徑洮州獲其長阿昌失納築城東籠山擊擒酋長三副使癭嗉子等平𩽆甘納兒七站拓地數千里俘男女二萬雜畜二十餘萬乃班師元國公脫火赤等屯和林數擾邊十三年命英總陝西兵出塞略亦集乃路渡黃河登賀蘭山涉流沙七日至其境分四翼夜擊之而自以驍騎衝其中堅擒脫火赤及知院愛足等獲其全部以歸明年又從大將軍北征異道出塞略公主山長寨克全寧四部度臚朐河執知院李宣盡俘其衆尋拜征南右副將軍同永昌侯藍玉從將軍傅友德取雲南元梁王遣平章達里麻以兵十餘萬拒於曲靖英乘霧趨白石江霧霽兩軍相望達里麻大驚友德欲渡江英曰我兵罷懼為所扼乃帥諸軍嚴陳若將渡者而奇兵從下流濟出其陳後張疑幟山谷間人吹一銅角元兵驚擾英急麾軍渡江以善泅者先之長刀斫其軍軍却師畢濟鏖戰良久復縱鐵騎遂大敗之生擒達里麻僵屍十餘里長驅入雲南梁王走死右丞觀音保以城降屬郡皆下獨大理倚點蒼山洱海扼龍首龍尾二關關故南詔築土酋段世守之英自將抵下關遣王弼由洱水東趨上關胡海由石門間道渡河扳點蒼山而上立旗幟英亂流斬關進山上軍亦馳下夾擊擒段世遂拔大理分兵收未附諸蠻設官立衞守之回軍與友德會滇池分道平烏撒東川建昌芒部諸蠻立烏撒畢節二衞土酋楊苴等復煽諸蠻二十餘萬圍雲南城英馳救蠻潰竄山谷中分兵捕滅之斬級六萬明年詔友德及玉班師而留英鎮滇中十七年曲靖亦佐酋作亂討降之因定普定廣南諸蠻通田州糧道二十年平浪穹蠻奉詔自永寧至大理六十里設一堡留軍屯田明年百夷思倫發叛誘羣蠻入寇摩沙勒寨遣都督甯正擊破之二十二年思倫發復寇定邊衆號三十萬英選騎三萬馳救置火礮勁弩為三行蠻敺百象被甲荷欄楯左右挾大竹為筒筒置摽鎗銳甚英分軍為三都督馮誠將前軍甯正將左都指揮同知湯昭將右將戰令曰今日之事有進無退因乘風大呼礮弩並發象皆反走昔剌亦者寇梟將也殊死鬬左軍小却英登高望之取佩刀命左右斬帥首來左帥見一人握刀馳下恐奮呼突陣大軍乘之斬馘四萬餘人生獲三十七象餘象盡殪賊渠帥各被百餘矢伏象背以死思倫發遁去諸蠻震慴麓川始不復梗已會穎國公傅友德討平東川蠻又平越州酋阿資及廣西阿赤部是年冬入朝賜宴奉天殿賚黃金二百兩白金五千兩鈔五百錠綵幣百疋遣還陛辭帝親拊之曰使我高枕無南顧憂者汝英也還鎮再敗百夷於景東思倫發乞降貢方物阿資又叛擊降之南中悉定使使以兵威諭降諸番番部有重譯入貢者二十五年六月聞皇太子薨哭極哀初高皇后崩英哭至嘔血至是感疾卒於鎮年四十八軍民巷哭遠夷皆為流涕歸葬京師追封黔寧王諡昭靖侑享太廟英沉毅寡言笑好賢禮士撫卒伍有恩未嘗妄殺在滇百務具舉簡守令課農桑歲較屯田增損以為賞罰墾田至百萬餘畝滇池隘浚而廣之無復水患通鹽井之利以來商旅辨方物以定貢稅視民數以均力役疎節濶目民以便安居常讀書不釋卷暇則延諸儒生講說經史太祖初起時數養他姓為子攻下郡邑輒遣之出守多至二十餘人惟英在西南勳最大子春晟昂皆鎮雲南昕駙馬都尉尚成祖女常寧公主春字景春材武有父風年十七從英征西番又從征雲南從平江西寇皆先登積功授後軍都督府僉事羣臣請試職帝曰兒我家人勿試也遂予實授嘗命錄烈山囚又命鞫叛黨於蔚州所開釋各數百人英卒命嗣爵鎮雲南洪武二十六年維摩十一寨亂遣瞿能討平之明年平越嶲蠻立瀾滄衞其冬阿資復叛與何福討之春曰此賊積年逋誅者以與諸土酋姻婭輾轉亡匿今悉發諸酋從軍縻繫之而多設營堡制其出入授首必矣遂趨越州分道逼其城伏精兵道左以羸卒誘賊縱擊大敗之阿資亡山谷中春陰結旁近土官詗知所在樹壘斷其糧道賊困甚已出不意擣其巢遂擒阿資並誅其黨二百四十人越州遂平廣南酋儂貞佑糾黨蠻拒官軍破擒之俘斬千計寧遠酋刀拜爛依交阯不順命遣何福討降之三十年麓川宣慰使思倫發為其屬刀幹孟所逐來奔春挾與俱朝受上方略遂拜春為征虜前將軍帥何福徐凱討之先以兵送思倫發於金齒檄幹孟來迎不應乃選卒五千令福與瞿能將踰高良公山直擣南甸大破之斬其酋刀名孟回軍擊景罕寨賊乘高堅守官軍糧且盡福告急春帥五百騎救之夜渡怒江旦抵寨下令騎騁揚塵蔽天賊大驚潰乘勝擊崆峒寨亦潰前後降者七萬人將士欲屠之春不可幹孟乞降帝不許命春總滇黔蜀兵攻之未發而春卒年三十六諡惠襄春在鎮七年大修屯政闢田三十餘萬畝鑿鐵池河灌宜良涸田數萬畝民復業者五千餘戶為立祠祀之無子弟晟嗣晟字景茂少凝重寡言笑喜讀書太祖愛之歷官後軍左都督建文元年嗣侯比就鎮而何福已破擒刀幹孟歸思倫發亡何思倫發死諸蠻分據其地晟討平之以其地為三府二州五長官司又於怒江西置屯衞千戶所戍之麓川遂定初岷王封雲南不法為建文帝所囚成祖即位遣歸藩益驕恣晟稍持之王怒譖晟帝以王故詔誡晟貽書岷王稱其父功毋督過永樂三年八百大甸寇邊遏貢使晟會車里木邦討定之明年大發兵討交阯拜晟征夷左副將軍與大將軍張輔異道自雲南入遂由蒙自徑野蒲斬木通道奪猛烈掤華諸關隘舁舟夜出洮水渡富良江與輔會師共破多邦城擣其東西二都盪諸巢擒偽王黎季犛語在輔傳論功封黔國公歲祿三千石予世券交阯簡定復叛命晟佩征夷將軍印討之戰生厥江敗績輔再出帥師合討擒定送京師輔還晟留捕陳季擴連戰不能下輔復出帥師會晟窮追至占城獲季擴乃班師晟亦受上賞十七年富州蠻叛晟引兵臨之弗攻使人譬曉竟下之仁宗立加太傅鑄征南將軍印給之沐氏繼鎮者輒予印以為常宣德元年交阯黎利勢熾詔晟會安遠侯柳升進討升敗死晟亦退兵羣臣交劾晟帝封其章示之正統三年麓川思任發反晟抵金齒與弟昂及都督方政會兵政為前鋒破賊沿江諸寨大軍逐北至高黎共山下再破之明年復破其舊寨政中伏死官軍敗績晟引還慚懼發病至楚雄卒贈定遠王諡忠敬晟席父兄業用兵非所長戰數不利朝廷以其絕遠且世將寬假之而滇人懾晟父子威信莊事如朝廷片楮下土酋具威儀出郭迎盥而後啟曰此令旨也晟久鎮置田園三百六十區資財充牣善事朝貴賂遺不絕以故得中外聲晟有子斌字文輝幼嗣公爵居京師而以昂代鎮昂字景高初為府軍左衞指揮僉事成祖將使晟南討乃擢昂都指揮同知領雲南都司累遷至右都督正統四年佩將印討麓川抵金齒畏賊盛遷延者久之參將張榮前驅至芒部敗昂不救引還貶秩二級已思任發入寇擊却之又捕斬師宗反者六年兵部尚書王驥定西伯蔣貴將大軍討思任發昂主餽運賊破復昂職命督軍捕思任發不能得十年昂卒贈定邊伯諡武襄斌始之鎮會緬甸執思任發送京師其子思機發來襲斌擊却之思機發復據孟養十三年復大發兵使驥等討之而斌為後拒督餉無乏卒贈太傅諡榮康子琮幼景泰初命昂孫璘以都督同知代鎮璘字廷章素儒雅滇人易之既而號令肅然不可犯天順初卒琮猶幼擢璘弟錦衣副千戶瓚為都督同知往代居七年先後討平霑祿諸寨及土官之搆兵者降思卜發勒還諸蠻侵地功多然頗黷貨成化三年春琮始之鎮而以瓚為副總兵移鎮金齒琮字廷芳通經義能詞章屬夷餽贄無所受尋甸酋殺兄子求為守琮捕誅之廣西土官虐所部為亂琮請更設流官民大便以次討平馬龍麗江劍川順寧羅雄諸叛蠻捕擒橋甸南窩反者卒贈太師諡武僖無子以瓚孫崑嗣崑字元中初襲錦衣指揮僉事琮撫為子朝議以崑西平侯裔孫當嗣侯而守臣爭之謂滇人知黔國公不知西平侯也侯之恐為所輕孝宗以為然令嗣公佩印如故弘治十二年平龜山竹箐諸蠻又平普安賊再益歲祿正德二年師宗民阿本作亂與都御史吳文度督兵分三道進一出師宗一出羅雄一出彌勒而別遣一軍伏盤江截賊巢遂大破之七年安南長官司那代爭襲殺土官復與都御史顧源討擒之再加太子太傅崑初喜文學自矜厲其後通賂權近所請無不得寖驕凌三司使從角門入諸言官論劾者輒得罪去卒贈太師諡莊襄子紹勛嗣尋甸土舍安銓叛都御史傅習討之敗績武定土舍鳳朝文亦叛與銓連兵攻雲南大擾世宗遣尚書伍文定將大軍征之未至而紹勛督所部先進告土官子弟當襲者先予冠帶破賊後當為請衆多奮戰賊大敗朝文絕普渡河走追斬之東川銓還尋甸列砦數十官軍攻破之擒銓於芒部先後擒賊黨千餘人俘斬無算時嘉靖七年也捷聞加太子太傅益歲祿而是時老撾木邦孟養緬甸孟密相仇殺師宗納樓思陀八寨皆亂久不解紹勛使使者徧歷諸蠻諷以武正尋甸事皆慴伏願還侵地而木邦孟養俱貢方物謝罪南中悉定紹勛有勇略用兵輒勝卒贈太師諡敏靖子朝輔嗣都御史劉渠索賂朝輔與之因上章言臣家世守茲土上下相承今有司紛更典制關臣職守率不與聞接見不循故例臣疎遠孤危動作掣肘無以彈壓蠻方乞申敕諸臣悉如其舊詔許之給事中萬虞愷劾朝輔並論渠詔罷渠而令朝輔治事如故卒贈太保諡恭僖二子融鞏皆幼詔視琮璘故事令融嗣公給半祿而授朝輔弟朝弼都督僉事佩印代鎮居三年融卒鞏當嗣朝弼心害之於是朝弼嫡母李請護鞏居京師待其長而還鎮報可鞏未至京卒朝弼遂得嗣嘉靖三十年元江土舍那鑑叛詔朝弼與都御史石簡討之分五軍薄其城城垂拔以瘴發引還詔罷簡將再出師鑑懼仰藥死乃已四十四年討擒叛蠻阿方李向陽隆慶初平武定叛酋鳳繼祖破賊巢三十餘朝弼素驕事母嫂不如禮奪兄田宅匿罪人蔣旭等用調兵火符遣人詗京師乃罷朝弼以其子昌祚嗣給半祿朝弼怏怏益放縱葬母至南京都御史請留之詔許還滇毋得預滇事朝弼恚欲殺昌祚撫按交章言狀並發其殺人通番諸不法事逮繫詔獄論死援功錮之南京卒昌祚初以都督僉事總兵官鎮守久之嗣公爵萬曆元年姚安蠻羅思等叛殺郡守昌祚與都御史鄒應龍發土漢兵討之破向寧鮓摩等十餘寨犁其巢盡得思等十一年隴川賊岳鳳叛附緬甸挾其兵侵旁近土司昌祚壁洱海督裨將鄧子龍劉綎等斬木邦叛酋罕虔以暑瘴退師明年復攻罕虔故巢三道並入擒其酋罕招等又破緬兵於猛臉岳鳳隆論功太子太保悉食故祿復以次平羅雄諸叛蠻再賜銀幣緬兵攻猛廣昌祚會師壁永昌緬人遁追擊至那莫江瘴作而還二十一年緬人復入寇昌祚逐之連戰俱捷遂傅於緬會羣蠻內亂乃還沐氏在滇久威權日盛尊重擬親王昌祚出僉事楊寅秋不避道昌祚笞其輿人寅秋訴於朝下詔切責已以病命子叡代鎮武定土酋阿克叛攻會城脅府印去叡被逮下獄昌祚復理鎮事卒孫啟元嗣卒子天波嗣十餘年而土司沙定洲作亂天波奔永昌亂定復歸於滇永明王由榔入滇天波任職如故已從奔緬甸緬人欲劫之不屈死初沙定洲之亂天波母陳氏妻焦氏自焚死後天波奔緬妾夏氏不及從自縊死踰數十日收葬支體不壞人以為節義所感焉贊曰明興諸將以六王為稱首非獨功茂亦由其忠誠有以契主知焉親莫如岐陽舊莫如東甌而寧河黔寧皆以英年膺腹心之寄汗馬宣勞純勤不二旂常炳燿洵無愧矣岐陽敦詩說禮以儒雅見重東甌乞身歸第以明哲自全皆卓然非人所能及獨黔寧威震遐荒剖符弈世勳名與明相始終而寧河盡瘁馳驅功高齡促後嗣亦少所表見論者謂諸王之遺澤隆替有殊然而中山有增壽與岐陽之有景隆追溯先烈不無遺憾榮遇之弗齊亦安見其有幸有不幸哉
