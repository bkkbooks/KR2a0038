body:
  text: 明史卷八十八志第六十四河渠六直省水利三代疆理水土之制甚詳自井田廢溝遂堙水常不得其治於是穿鑿渠塘井陂以資灌溉明初太祖詔所在有司民以水利條上者即陳奏越二十七年特諭工部陂塘湖堰可蓄泄以備旱潦者皆因其地勢修治之乃分遣國子生及人材遍詣天下督修水利明年冬郡邑交奏凡開塘堰四萬九百八十七處其恤民者至矣嗣後有所興築或役本境或資鄰封或支官料或採山場或農隙鳩工或隨時集事或遣大臣董成終明世水政屢修可具列云洪武元年修和州銅城堰閘周回二百餘里四年修興安靈渠為陡渠者三十六渠水發海陽山秦時鑿溉田萬頃馬援葺之後圮至是始復六年發松江嘉興民夫二萬開上海胡家港自海口至漕涇千二百餘丈以通海船且濬海鹽澉浦八年開登州蓬萊閣河命耿炳文濬涇陽洪渠堰溉涇陽三原醴泉高陵臨潼田二百餘里九年修彭州都江堰十二年李文忠言陝西病鹹鹵請穿渠城中遙引龍首渠東注從其請甃以石十四年築海鹽海塘十七年築磁州漳河決堤決荊州嶽山壩以灌民田十九年築長樂海堤二十三年修崇明海門決堤二萬三千九百餘丈役夫二十五萬人四川永寧宣慰使言所轄水道百九十灘江門大灘八十二皆被石塞詔景川侯曹震往疏之二十四年修臨海橫山嶺水閘寧海奉化海堤四千三百餘丈築上虞海堤四千丈改建石閘濬定海鄞二縣東錢湖灌田數萬頃二十五年鑿溧陽銀墅東壩河道由十字港抵沙子河胭脂壩四千三百餘丈役夫三十五萬九千餘人二十七年濬山陽支家河鬱林州民言州南北二江相去二十餘里乞鑿通設石陡諸閘從之二十九年修築河南洛堤復興安靈渠時尚書唐鐸以軍興至其地圖渠狀以聞請濬深廣通官舟以餉軍命御史嚴震直燒鑿陡澗之石餉道果通三十一年洪渠堰圮復命耿炳文修治之且濬渠十萬三千餘丈建文四年疏吳淞江永樂元年修安陸京山漢水塌岸章丘漯河東堤高密濰決岸安陽河堤福山護城決堤浙江赭山江塘餘干龍窟壩塘岸臨潁褚河決口濰縣白浪河堤潛山懷寧陂堰高要青岐羅婆墟通州徐竈食利等港平遙廣濟渠句容楊家港王旱墟等堤肇慶鳳翔遙頭岡決岸南陽高家屯頭二堰及沙澧等河堤夏縣古河決口三十餘里修築和州保大等墟百二十餘里蓄水陡門九濬昌邑河渠五所鑿嘉定小橫瀝以通秦趙二涇濬崑山葫蘆等河命夏原吉治蘇松嘉興水患濬華亭上海運鹽河金山衛閘及漕涇分水港原吉言浙西諸郡蘇松最居下流嘉湖常頗高環以太湖綿亙五百里納杭湖宣歙溪澗之水散注澱山諸湖以入三泖頃為浦港堙塞漲溢害稼拯治之法在濬吳淞諸浦按吳淞江袤二百餘里廣百五十餘丈西接太湖東通海前代常疏之然當潮汐之衝旋疏旋塞自吳江長橋抵下界浦百二十餘里水流雖通實多窄淺從浦抵上海南倉浦口百三十餘里潮汐淤塞已成平陸灩沙游泥難以施工嘉定劉家港即古婁江徑入海常熟白茆港徑入江皆廣川急流宜疏吳淞南北兩岸安亭等浦引太湖諸水入劉家白茆二港使其勢分松江大黃浦乃通吳淞要道今下流遏塞難濬旁有范家濱至南倉浦口徑達海宜濬深濶上接大黃浦達泖湖之水庶幾復禹貢三江入海之舊水道既通乃相地勢各置石閘以時啓閉每歲水涸時預修墟岸以防暴流則水患可息帝命發民丁開濬原吉晝夜徒步以身先之功遂成二年修泰州河塘萬八千丈興化南北堤泰興沿江墟岸六合瓜步等屯濬丹徒通潮舊江又修象山茭湖塘岸海康徐聞二縣那隱坡調黎等港堤岸黃巖混水等十五閘六陡門孟津河堤分宜湖塘武陟馬田堤岸香山竹徑水陂復興安分水塘興安有江源出海陽山江中橫築石埭分南北渠溉民田甚溥埭上疊石如鱗以防衝溢嚴震直撤石增埭水迫無所泄衝塘岸盡趨北渠南渠淺澀民失利至是修復如舊海門民請發淮安蘇常民丁協修張墩港東明港百餘里潰堤帝曰三郡民方苦水患不可重勞遣官行視以揚州民協築之當塗民言慈湖瀕江上通宣歙東抵丹陽湖西接蕪湖久雨浸淫潮漲傷農宜遣勘修築帝從其請且諭工部安徽蘇松浙江江西湖廣凡湖泊卑下墟岸傾頽亟督有司治之夏原吉復奉命治水蘇松盡通舊河港又濬蘇州千墩浦致和塘安亭顧浦陸皎浦尤涇黃涇共二萬九千餘丈松江大黃浦赤雁浦范家濱共萬二千丈以通太湖下流先是修含山崇義堰未幾和州民言銅城閘上抵巢湖下通揚子江決墟岸七十餘處乞修治其吏目張良興又言水淹麻澧二湖田五萬餘頃宜築墟埂起桃花橋訖含山界三十里俱從之三年修上虞曹娥江壩埂溫縣馱塢村堤堰四千餘丈南海衛蓮塘四會縣餢鵲水等堤岸無為州周興等鄉及鷹揚衛烏江屯江岸築昌黎及歷城小清河決堤應天新河口北岸從大勝關抵江東驛三千三百丈濬海州北舊河上通高橋下接臨洪場及山陽運鹽河十八里四年修築宣城十九墟豐城穆湖墟岸石首臨江萬石堤溧水決墟修懷寧斗潭河彭灘墟岸順天固安保定荊岱樂亭魯家套社河口吉水劉家塘雲陂江都劉家墟港築湖廣廣濟武家穴等江岸新建石頭岡墟岸江浦沿江堤開泰州運鹽河普定秦潼河西溪南儀阡三處河口導流興化鹽城界入海濬常熟福山塘三十六里五年修長洲吳江崑山華亭錢塘仁和嘉興堤岸餘姚南湖壩築高要銀岡金山等潰堤溉田五百餘頃治杭州江岸之淪者六年濬浙江平陽縣河七年修安陸州渲馬灘決岸海鹽石堤築泰興攔江堤三千九百餘丈且濬大港北淤河抵縣南出大江四千五百餘丈八年修丹陽練湖塘汝陽汝河堤岸南陵野塘墟蚌蕩壩松滋張家坑何家洲堤岸平度州濰水浮糠河決口百十二堤堰八千餘丈吳江石塘官路橋梁九年修安福丁陂等塘堰安仁饒家陂壽光堤安陸京山景陵墟岸長樂官塘長洲至嘉興石土塘橋路七十餘里泄水洞百三十一處監利車水堤四千四百餘丈高安華陂屯陂堤仁和海寧海鹽土石塘岸萬餘丈築沂州沭河口決岸并瀹沭陽沭河築直隸新城張村等口決堤仁和黃濠塘岸三百餘丈孫家圍塘岸二十餘里濬濰縣干丹河定襄故渠六十三里引滹沱水灌田六百餘頃疏福山官渠濬江陰青陽河道鄒平白條溝河三十餘里麗水民言縣有通濟渠截松陽遂昌諸溪水入焉上中下三源流四十八派溉田二千餘頃上源民泄水自利下源流絶沙壅渠塞請修堤堰如舊部議從之齊東知縣張升言小清河洪水衝決淹沒諸鹽場及青州田請濬上流修長堤使水行故道皇太子遣官經理之鄜州民言洛水橫決而西衝塌州城東北隅請濬故道循州東山麓南流從之十年修浙江平陽捍潮堤岸黃梅臨江決岸百二十餘里海門捍潮堤百三十里築新會墟岸二千餘丈獻縣饒陽恭儉等岸安丘紅河決岸安州直亭等河決口八十九華容安津等堤決口四十六濬上海蟠龍江濰縣白浪河北京行太僕卿楊砥言吳橋東光興濟交河及天津等衛屯田雨水決堤傷稼德州良店驛東南二十五里有黃河故道與州南土河通穿渠置閘分殺水勢大為民便命侍郎藺芳往理之十一年修蕪湖陶辛政和二墟保定文安二縣河口決岸五十四應天新河墟岸天長福勝戚家莊二塘滎澤大濱河堤濬崑山太平河十二年修鳳陽安豐塘水門十六座及牛角壩新倉鋪塌岸武陟郭村馬曲堤岸聊城龍灣河濮州紅船口范縣曹村河堤岸築三河決堤濬海州官河二百四十里解州民言臨晉涑水河逆流決姚暹渠堰入砂地淹民田將及鹽池尋又言硝池水溢決豁口入鹽池以涑水渠姚暹渠併流故命官修築如其請十三年修興濟決岸南京羽林右衛刁家墟屯田堤吳江縣丞李升言蘇松水患太湖為甚急宜泄其下流若常熟白茆諸港崑山千墩等河長洲十八都港汊吳縣無錫近湖河道皆宜循其故迹濬而深之仍修蔡涇等閘候潮來往以時啓閉則泛濫可免而民獲耕種之利從之十五年修固安孫家口及臨漳固冢堤岸十六年修魏縣決岸十七年蕭山民言境內河渠四十五里溉田萬頃比年淤塞乞疏濬仍置閘錢清小江壩東庶旱潦無憂山東新城民言縣東鄭黃溝源出淄川下流壅沮霖潦妨農陳家莊南有乾河上與溝接下通烏江乞濬治並從之十八年海寧諸縣民言潮沒海塘二千六百餘丈延及吳家等壩通政嶽福亦言仁和海寧壞長降等壩淪海千五百餘丈東岸赭山巖門山蜀山舊有海道淤絶久故西岸潮愈猛乞以軍民修築並從之明年修海寧等縣塘岸二十一年修嘉定抵松江潮圮墟岸五千餘丈交址順化衛決堤百餘丈文水民言文谷山常稔渠分引文谷河流袤三十餘里灌田今河潰泄水從其奏葺治之二十二年修臨海廣濟河閘洪熙元年修黃巖濱海閘壩視永樂初增府判一員專其事修獻縣饒陽恭儉堤及窯堤口宣德二年浙江歸安知縣華嵩言涇陽洪渠堰溉五縣田八千四百餘頃洪武時長興侯耿炳文前後修濬未久堰壞永樂間老人徐齡言於朝遣官修築會營造不果乞專命大臣起軍夫協治從之三年修灌縣都江等堰四十四臨海民言胡巉諸閘瀦水灌田近年閘壞而金鼇大浦湖淶舉嶼等河遂皆壅阻乞為開築帝曰水利急務使民自訴於朝此守令不得人爾命工部即飭郡縣秋收起工仍詔天下凡水利當興者有司即舉行毋緩視巡按江西御史許勝言南昌瑞河兩岸低窪多良田洪武間修築水不為患比年水溢岸圮二十餘處豐城安沙繩灣墟岸三千六百餘丈永樂間水衝改修百三十餘丈近者久雨江漲堤壞乞敕有司募夫修理中書舍人陸伯倫言常熟七浦塘東西百里灌常熟崑山田歲租二十餘萬石乞聽民自濬之皆詔可四年修獻縣柳林口堤岸潛江民言蚌湖陽湖皆臨襄河水漲岸決害荊州三衛荊門江陵諸州縣官民屯田無算乞發軍民築治從之福清民言光賢里官民田百餘頃堤障海水堤壞久田盡荒永樂中嘗命修治迄今未舉民不得耕帝責有司亟治而諭尚書吳中嚴飭郡邑陂池堤堰及時修濬慢者治以罪五年巡撫侍郎成均言海鹽去海二里石嵌土岸二千四百餘丈水齧其石皆已刓敝議築新石於岸內而存其舊者以為外障乞如洪武中令嘉嚴紹三府協夫舉工從之六年修瀏陽廣濟諸縣堤堰豐城西北臨江石堤及西南七墟壩石首臨江三堤濬餘姚舊河池巡撫侍郎周忱言溧水永豐墟周圍八十餘里環以丹陽石臼諸湖舊築埂壩通陟門石塔農甚利之今頽敗請葺治教諭唐敏言常熟耿涇塘南接梅里通昆承湖北達大江洪武中濬以溉田今壅阻請疏導並從之七年修眉州新津通濟堰堰水出彭山分十六渠溉田二萬五千餘畝河東鹽運使言鹽池近地姚暹河流入五星湖轉黃流河兩岸窪下比歲雨溢水漲衝至解州浪益急遂潰南岸沒民田三十餘里鹽池護堤皆壞復因下流涑水河高壅淤逆流姚暹以決乞起民夫疏瀹從之蘇州知府況鍾言蘇松嘉湖湖有六曰太湖龐山陽城沙湖昆承尚湖永樂初夏原吉濬導今復淤乞遣大臣疏濬乃命周忱與鍾治之是歲汾河驟溢敗太原堤鎮守都司李謙巡按御史徐傑以便宜修治然後馳奏帝嘉奬之八年葺湖廣偏橋衛高陂石洞完縣南關舊河復和州銅城堰閘修安陽廣惠等渠磁州滏陽河五爪濟民渠九年修江陵枝江沿江堤岸築薊州決岸毀蘇松民私築堤堰十年築海鹽潮決海塘千五百餘丈主事沈中言山陰西小江上通金嚴下接三江海口引諸暨浦江義烏諸湖水以通舟江口近淤宜築臨浦戚堰障諸湖水俾仍出小江詔部覆奪正統元年修吉安沿江堤築海陽登雲都雲步村等決堤濬陝西西安灞橋河二年築蠡縣王家等決口修新會鸞臺山至瓦塘浦頽岸江陵松滋公安石首潛江監利近江決堤又修湖廣老龍堤以為漢水所潰也三年疏泰興順德鄉三渠引湖溉田潞州永祿等溝渠二十八道通於漳河四年修容城杜村口堤設正陽門外減水河并疏城內溝渠荊州民言城西江水高城十餘丈霖潦壞堤水即灌城請先事修治寧夏巡撫都御史金濂言鎮有五渠資以行溉今明沙州七星漢伯石灰三渠久塞請用夫四萬疏濬溉蕪田千三百餘頃並從之五年修太湖堤海鹽海岸南京上中下新河及濟川衛新江口防水堤漷縣南宮諸堤築順天河間及容城杜村口郎家口決堤塞海寧蠣巖決堤口濬鹽城伍祐新興二場運河初溧水有鎮曰廣通其西固城湖入大江東則三塔堰河入太湖中間相距十五里洪武中鑿以通舟縣地稍窪而湖納寧國廣德諸水遇潦即溢乃築壩於鎮以禦之而堰水不能至壩下是歲改築壩於葉家橋胭脂河者水入秦淮道也蘇松船皆由以達沙石壅塞因并濬之山陽涇河壩上接漕河下達鹽城舊置絞關以通舟歲久且敝又恐盜泄水利遂築塞河口是歲從民請修壩并復絞關六年造宣武門東城河南岸橋修江米巷玉河橋及堤并濬京城西南河築豐城沙月諸河堤蕪湖陶辛墟新埂濬海寧官河及花塘河硤石橋塘河築瓦石堰二所疏南京江洲殺其水勢以便修築塌岸高郵知州韓簡言官河上下二閘皆圮河亦不通且子嬰溝塞減水陰洞閉致旱潦無所濟俱乞濬治詔部核實以行七年修江西廣昌江岸蕭山長山浦海塘彭山通濟堰築南京浦子口大勝關堤九江及武昌臨江塌岸濬江陵荊門潛江淤沙三十餘里八年修蘭溪卸橋浦口堤弋陽官陂三所濬南京城河九年修德州耿家灣等堤岸嵵縣離溝堤築容城杜村堤決口易上虞菱湖土壩為石閘挑無錫里谷蘇塘華港上村李走馬塘諸河東南接蘇州苑山湖塘北通揚子江西接新興河引水灌田濬嵵縣牛墓岡舊河武進太平永興二河疏海鹽永安河茶市院新涇陶涇塘諸河都御史陳鎰言朝邑多沙難耕縣治洛河與渭水通請穿渠灌之新安民言城南長溝河西通徐漕二水東連雄縣直沽沙土淤塞請發丁夫疏濬海陽民蕭瑤言縣有長溪源出山麓流抵海口周袤潮郡故登隆等都俱置溝通溉惟隆津等都陸野絶水歲旱無所賴乞開溝如登隆長樂民劉彥梁言嚴湖二十餘里南接稠菴溪西通倒流溪可備旱溢又有張塘涵塘前涵大塘涵陳塘港其利如嚴湖乞令有司疏濬廣濟民言縣與鄰邑黃梅歲運糧三萬石於望牛墩小車盤剝不堪其勞連城湖港廖家口有溝抵墩前淤淺不能行船請與黃梅合力濬通以便水運並從之十一年修洞庭湖堤築登州河岸濬通州金沙場八里河以通運渠任丘民言凌城港去縣二十五里內有定安橋河北十八里通流東七里沙塞宜疏通與港相接入直沽張家灣巡撫周忱言應天鎮江太平寧國諸府舊有石臼等湖其中溝港歲辦魚課其外平墟淺灘聽民牧放孳畜採掘菱藕不許種耕故山溪水漲有所宣泄近者富豪築墟田遏湖水每遇泛溢害即及民宜悉禁革並從之十二年疏平度州大灣口河道荊州公安門外河以便公安石首諸縣輸納浙江聽選官王信言紹興東小江南通諸暨七十二湖西通錢塘江近為潮水湧塞江與田平舟不能行久雨水溢鄰田輒受其害乞發丁夫疏濬從之十三年築寧夏漢唐壩決口疏山西涑水河南海縣通海泉源鑿宣府城濠引城北山水入南城大河湖廣五開衛言衛與苗接山路峻險去衛三十里有水通靖州江亂石沙灘請疏以便輸運雲南鄧川州言本州民田與大理衛屯田接壤湖畔每歲雨水沙土壅淤禾苗淹沒乞命州衛軍民疏治並從之十四年濬南海潘甬堤岸置水閘和州民言州有姥鎮河上通麻澧二湖下接牛屯大河長七十里許廣八丈又有張家溝連銅城閘通大江長減姥鎮之半廣如之灌溉降福等七十餘墟及南京諸衛屯田近年河潰閘圮率皆淤塞請興役疏濬仍於姥鎮豐山嘴葉公坡各建閘以備旱潦從之景泰元年築丹陽甘露等壩二年修玉河東西堤濬安定門東城河永嘉三十六都河常熟顧新塘南至當湖北至揚子江三年修泰和信豐堤築延安綏德決河綿州西岔河通江堤岸濬常熟七浦塘劍州海子疏孟瀆河濱涇十一工部言海鹽石塘十八里潮水衝決浮土修築不能久詔別築石塘捍之四年濬江陰順塘河十餘里東接永利倉大河西通夏港及揚子江雲南總兵官沐璘言城東有水南流源發邵甸會九十九泉為一抵松花壩分為二支一繞金馬山麓入滇池一從黑窯村流至雲澤橋亦入滇池舊於下流築堰溉軍民田數十萬頃霖潦無所泄請令受利之家自造石閘啓閉以時報可五年疏靈寶黎園莊渠通鴻瀘澗溉田萬頃六年濬華容杜預渠通運船入江避洞庭險修容城白溝河杜村口固安楊家等口決堤七年尚書孫原貞言杭州西湖舊有二閘近皆傾圮湖遂淤塞按宋蘇軾云杭本江海故地水泉鹹苦自唐李泌引湖水入城為六井然後井邑日富不可許人佃種周淙亦言西湖貴深濶因招兵二百專一撈湖其後豪戶復請佃湖日益填塞大旱水涸詔郡守趙與開濬芰荷茭蕩悉去杭民以利此前代經理西湖大略也其後勢豪侵占無已湖小淺狹閘石毀壞今民田無灌溉資官河亦澀阻乞敕有司興濬禁侵占以利軍民從之天順二年修彭縣萬工堰灌田千餘頃五年僉事李觀言涇水出涇陽仲山谷道高陵至櫟陽入渭袤二百里漢開渠溉田宋元俱設官主之今雖有瓠口鄭白二渠而堤堰摧決溝洫壅瀦民弗蒙利乃命有司濬之八年永平民言漆河繞城西南流入海城趾皆石故水不能決其餘則沙土易潰前人於東北築土堤西南甓岸今歲久日塌宜作堤於東流橫以激之使合西流庶無蕩析患都御史項忠言涇陽之瓠口鄭白二渠引涇水溉田數萬頃至元猶溉八千頃其後渠日淺利因以廢宣德初遣官修鑿畝收四三石無何復塞渠旁之田遇旱為赤地涇陽醴泉三原高陵皆患苦之昨請於涇水上源龍潭左側疏濬訖舊渠口尋以詔例停止今宜畢其役西安城西井泉鹹苦飲者輒病龍首渠引水七十里修築不易且利止及城東西南皂河去城一舍許可鑿令引水與龍首渠會則居民盡利邳州知州孟琳言榆行諸社俱臨沂河久雨岸崩二十八處低田盡淹乞與修築並從之成化二年修壽州安豐塘四年疏石州城河六年修平湖周家涇及獨山海塘七年潮決錢塘江岸及山陰會稽蕭山上虞乍浦瀝海二所錢清諸場命侍郎李顒修築八年堤襄陽決岸十年廷臣會議江浦北城墟古溝北通滁河浦子口城東黑水泉古溝南入大江二溝相望岡壠中截宜鑿通成河旱引潦泄從之十一年濬杭州錢塘門故渠左屬湧金門建橋閘以蓄湖水巡撫都御史牟俸言山東小清河上接濟南趵突諸泉下通樂安沿海高家港鹽場大清河上接東平坎河諸泉下通濱州海豐利津沿海富國鹽場淤塞苦盤剝雨水又患淹沒勸農參政唐澞濬河造閘請令兼治水利詔可十二年巡按御史許進言河西十五衛東起莊浪西抵肅州綿互幾二千里所資水利多奪於勢豪宜設官專理詔屯田僉事兼之十四年俸言直隸蘇松與浙西各府頻年旱潦緣周環太湖乃東南最窪地而蘇松尤最下之衝故每逢積雨衆水奔潰湖泖漲漫淹沒無際按太湖即古震澤上納嘉湖宣歙諸州之水下通婁東吳淞三江之流東江今不復見婁淞入海故跡具存其地勢與常熟福山白茆二塘俱能導太湖入江海使民無墊溺而土可耕種歷代開濬具有成法本朝亦常命官修治不得其要而濱湖豪家盡將淤灘栽蒔為利治水官不悉利害率於泄處置石梁壅土為道或慮盜船往來則釘木為柵以致水道堙塞公私交病請擇大臣深知水利者專理之設提督水利分司一員隨時修理則水勢疏通東南厚利也帝即令俸兼領水利聽所濬築功成乃專設分司十五年修南京內外河道十八年濬雲南東西二溝自松華壩黑龍潭抵西南柳壩南村灌田數萬頃修居庸關水關城券及隘口水門四十九樓鋪墩臺百二二十年修嘉興等六府海田堤岸特選京堂官往督之二十二年濬南京中下二新河弘治三年從巡撫都御史丘鼐言設官專領灌縣都江堰六年敕撫民參政朱瑄濬河南伊洛彰德高平萬金懷慶廣濟南陽召公等渠汝寧桃陂等堰七年濬南京天潮二河備軍衛屯田水利七月命侍郎徐貫與都御史何鑑經理浙西水利明年四月告成貫初奉命奏以主事祝萃自隨萃乘小舟究悉源委貫乃令蘇州通判張旻疏各河港水瀦之大壩旋開白茆港沙面乘潮退決大壩水衝激之沙泥刷盡潮水蕩激日益闊深水達海無阻又令浙江參政周季麟修嘉興舊堤三十餘里易之以石增繕湖州長興堤岸七十餘里貫乃上言東南財賦所出而水患為多永樂初命夏原吉疏濬時以吳淞江灩沙浮蕩未克施工逮今九十餘年港浦愈塞臣督官行視濬吳江長橋導太湖散入澱山陽城昆承等湖泖復開吳淞江並大石趙屯等浦泄澱山湖水由吳淞江以達於海開白茆港白魚洪鮎魚口泄昆承湖水由白茆港以注於江開斜堰七鋪鹽鐵等塘泄陽城湖水由七丫港以達於海下流疏通不復壅塞乃開湖州之漊涇泄西湖天目安吉諸山之水自西南入於太湖開常州之百瀆泄溧陽鎮江練湖之水自西北入於太湖又開諸陡門泄漕河之水由江陰以入於大江上流亦通不復堙滯是役也修濬河港涇瀆湖塘陡門堤岸百三十五道役夫二十餘萬祝萃之功多焉巡撫都御史王珣言寧夏古渠三道東漢中唐並通惟西一渠傍山長三百餘里廣二十餘丈兩岸危峻漢唐舊跡俱堙宜發卒濬鑿引水下流即以土築東岸建營堡屯兵以遏寇衝請帑銀三萬兩并靈州六年鹽課以給其費又請於靈州金積山河口開渠灌田給軍民佃種並從之十八年修築常熟塘壩自尚湖口抵江及黃泗等浦新莊等沙三十餘處濬杭州西湖正德七年修廣平滏陽河口堤岸十四年濬南京新江口右河十五年御史成英言應天等衛屯田在江北滁和六合者地勢低屢為水敗從金城港抵濁河達烏江三十餘里因舊跡濬之則水勢泄而屯田利詔可嘉靖元年築濬束鹿肥鄉獻魏堤渠初蘇松水道盡為勢家所據巡撫李充嗣畫水為井地示開鑿法戶占一區計工刻日造濬川爬用巨筏數百曳木齒隨潮進退擊汰泥沙置小艇百餘尾鐵帚以導之濬故道穿新渠巨浦支流罔不灌注帝嘉其勞賚以銀幣二年修德勝門東朝陽門北城垣河道築儀真江都官塘五區十年工部郎中陸時雍言良鄉盧溝河涿州琉璃胡良二河新城雄縣白溝河河間沙河青縣滹沱河下流皆淤宜以時濬使達於海詔巡撫議之十一年太僕卿何棟勘畿封河患有二一論滹沱河其一言真定鴨沙磁三河俱發源五臺會諸支水抵唐河藺家圈合流入河間東南經任丘霸州天津入海此故道也河間東南高東北下故水決藺家口而肅寧新安皆罹其害宜築決口濬故道涿州胡良河自拒馬分流至州東入渾河良鄉琉璃河發源磁家務潛入地中至良鄉東入渾河比者渾河壅塞二河不流然下流淤沙僅四五里請亟濬之部覆允行郎中徐元祉受命振灾上言河本以泄水今反下壅淀本以瀦水今反上溢故畿輔常苦水順天利害相半真定利多於害保定害多於利河間全受其害弘正間嘗築長堤排決口旋即潰敗今惟疏濬可施其策凡六一濬本河俾河身寬邃九河自山西來者南合滹沱而不侵真定諸郡北合白溝而不侵保定諸郡此第一義也一濬支河令九河之流經大清河從紫城口入經文都村從涅槃口入經白洋淀從藺家口入經章哥窪從楊村河入直遂以納細流水力分矣一濬決河九河安流時木支二河可受遇漲則岸口四衝宜每衝量存一口復濬令合成一渠以殺湍急備淫溢一濬淀河令淀淀相通達於本支二河使下有所泄一濬淤河九河東逝悉由故道高者下下者通占據曲防者抵罪一濬下河九河一出青縣一出丁字沽二流相匝於苑家口故施工必自苑家口始漸有成效然後次第舉行庶減諸郡水害帝嘉納之明年香河郭家莊自開新河一道長百七十丈闊五十丈近舊河十里餘詔河官亟繕治十三年巡撫都御史周金言藺家圈決口塞之則東溢病河間不塞則東流漸淤病保定宜存決口而濬廣新河使水東北平流無壅涸患從之二十四年濬南京後湖初胡體乾按吳以松江泛溢進六策曰開川曰濬湖曰殺上流之勢曰決下流之壑曰排潮漲之沙曰立治田之規是年呂光洵按吳復奏蘇松水利五事一曰廣疏濬以備瀦泄三吳澤國西南受太湖諸澤水勢尤卑東北際海岡隴之地視西南特高高苦旱卑苦潦昔人於下流疏為塘浦導諸湖水北入江東入海又引江潮流衍於岡隴外瀦泄有法水旱無患比來縱浦橫塘多堙不治惟黃浦劉河二江頗通然太湖之水源多勢盛二江不足以泄之岡隴支河又多壅絶無以資灌溉於是高下俱病歲常告灾宜先度要害於澱山等茭蘆地導太湖水散入陽城昆承三泖等湖又開吳淞江及大石趙屯等浦泄澱山之水以達於海濬白茆鮎魚諸口泄昆承之水以注於江開七浦鹽鐵等塘泄陽城之水以達於江又導田間之水悉入小浦以納大浦使流者皆有所歸瀦者皆有所泄則下流之地治而潦無所憂矣乃濬艾祁通波以溉青浦濬顧浦吳塘以溉嘉定濬大瓦等浦以溉崑山之東濬許浦等塘以溉常熟之北濬臧村等港以溉金壇濬澡港等河以溉武進凡隴岡支河堙塞不治者皆濬之深廣使復其舊則上流之地亦治而旱無所憂矣此三吳水利之經也一曰修墟岸以固橫流蘇松常鎮東南下流而蘇松又常鎮下流易瀦難泄雖導河濬浦引注江海而秋霖泛漲風濤相薄則河浦之水逆行田間衝齧為患宋轉運使王純臣嘗令蘇湖作田塍禦水民甚便之司農丞郟亶亦云治河以治田為本故老皆云前二三十年民間足食因餘力治墟岸田益完美近皆空乏無暇修繕故田墟漸壞歲多水灾合敕所在官司專治墟岸岸高則田自固雖有霖潦不能為害且足制諸湖之水咸歸河浦中則不待決泄自然湍流而岡隴之地亦因江水稍高又得畝引以資灌溉不特利於低田而已一曰復板閘以防淤澱河浦之水皆自平原流入江海水慢潮急以故沙隨浪湧其勢易淤昔人權其便宜去江海十里許夾流為閘隨潮啓閉以禦淤沙歲旱則長閉以蓄其流歲潦則長啓以宣其溢所謂置閘有三利蓋謂此也近多堙塞惟常熟福山閘尚存故老以為河浦入海之地誠皆置閘自可歷久不壅一曰量緩急以處工費一曰重委任以責成功詔悉如議光洵因請專委巡撫歐陽必進從之二十六年給事中陳斐請仿江南水田法開江北溝洫以祛水患益歲收報可三十八年總督尚書楊博請開宣大荒田水利從之巡撫都御史翁大立言東吳水利自震澤濬源以注江三江導流以入海而蘇州三十六浦松江八匯毗陵十四瀆共以節宣旱潦近因倭寇衝突汊港之交率多釘柵築堤以為捍禦因致水流停瀦淤滓日積渠道之間仰高成阜且具區湖泖並水而居者雜蒔茭蘆積泥成蕩民間又多自起墟岸上流日微水勢日殺黃浦婁江之水又為舟師所居下流亦淤海潮無力水利難興民田漸磽宜於吳淞白茆七浦等處造成石閘啓閉以時挑鎮江常州漕河深廣使輸挽無阻公私之利也詔可四十二年給事中張憲臣言蘇松常嘉湖五郡水患疊見請濬支河通潮水築墟岸禦湍流其白茆港劉家河七浦楊林及凡河渠河蕩壅淤沮洳者悉宜疏導帝以江南久苦倭患民不宜重勞令酌濬支河而已四十五年參政凌雲翼請專設御史督蘇松水利詔巡鹽御史兼之隆慶三年開湖廣竹筒河以泄漢江巡撫都御史海瑞疏吳淞江下流上海淤地萬四千丈有奇江面舊三十丈增開十五丈自黃渡至宋家橋長八十里明年春瑞言三吳入海之道南止吳淞北止白茆中止劉河劉河通達無滯吳淞方在挑疏土人請開白茆計濬五千餘丈役夫百六十四萬餘又言吳淞役垂竣惟東西二壩未開父老皆言崑山夏駕口吳江長橋長洲寶帶橋吳縣胥口及凡可通流下吳淞者逐一挑畢方可開壩並從之是年築海鹽海塘越四年從巡撫侍郎徐栻議復開海鹽秦駐山南至澉浦舊河萬曆二年築荊州采穴承天泗港謝家灣諸決堤口復築荊嶽等府及松滋諸縣老垸堤四年巡撫都御史宋儀望言三吳水勢東南自嘉秀沿海而北皆趨松江循黃浦入海西北自常鎮沿江而東皆趨江陰常熟其中太湖瀦蓄匯為巨浸流注龐山瀆墅澱山三泖陽城諸湖乃開浦引湖北經常熟七浦白茆諸港入於江東北經崑山太倉穿劉家河東南通吳淞江黃浦各入於海諸水聯絡四面環護中如仰盂杭嘉湖常鎮勢繞四隅蘇州居中松江為諸水所受最居下乞專設水利僉事以裨國計部議遣御史董之六年巡撫都御史胡執禮請先濬吳淞江長橋黃浦先是巡按御史林應訓言蘇松水利在開吳淞江中段以通入海之勢太湖入海其道有三東北由劉河即古婁江故道東南由大黃浦即古東江遺意其中為吳淞江經崑山嘉定青浦上海乃太湖正脈今劉河黃浦皆通而中江獨塞者蓋江流與海潮遇海潮渾濁賴江水迅滌之劉河獨受巴陽諸湖又有新洋江夏駕浦從旁以注大黃浦總會杭嘉之水又有澱山泖蕩從上而灌是以流皆清駛足以敵潮不能淤也惟吳淞江源出長橋石塘下經龐山九里二湖而入今長橋石塘已堙龐山九里復為灘漲其來已微又有新洋江夏駕浦掣其水以入劉河勢乃益弱不能勝海潮洶湧之勢而滌濁渾之流日積月纍淤塞僅留一線水失故道時致淫濫支河小港亦復壅滯舊熟之田半成荒畝前都御史海瑞力破羣議挑自上海江口宋家橋至嘉定艾祁八十里幸尚通流自艾祁至崑山慢水港六十餘里則俱漲灘急宜開濬計淺九千五百餘丈闊二十丈此江一開太湖直入於海濱江諸渠得以引流灌田青浦積荒之區俱可開墾成熟矣並從之至是工成應訓又言吳江縣治居太湖正東湖水由此下吳淞達海宋時運道所經畏風阻險乃建長橋石塘以通牽挽長橋百三十丈為洞六十有二石塘小則有竇大則有橋內外浦涇縱橫貫穿皆為泄水計也石塘涇竇半淤長橋內外俱圮僅一二洞門通水若不疏濬雖開吳淞下流終無益也宜開龐山湖口由長橋抵吳家港則湖有所泄江有所歸源盛流長為利大矣松江大黃浦西南受杭嘉之水西北受澱泖諸蕩之水總會於浦而秀州塘山涇港諸處實黃浦來源也澱山湖入黃浦道漸多淤淺宜為疏瀹而自黃浦橫潦洙涇經秀州塘入南泖至山涇港等處萬四千餘丈待濬尤急他如蘇之茜涇楊林白茆七浦諸港松之蒲匯官紹諸塘常鎮之澡港九曲諸河併宜設法開導次第修舉八年又言蘇松諸郡幹河支港凡數百大則泄水入海次則通湖達江小則引流灌田今吳淞江白茆塘秀州塘蒲匯塘孟瀆河舜河青暘港俱已告成支河數十宜盡開濬俱從其請久之用儀望議特設蘇松水利副使以許應逵領之乃濬吳淞八十餘里築塘九十餘處開新河百二十三道濬內河百三十九道築上海李家洪老鴉嘴海岸十八里發帑金二十萬應逵以其半訖工三十七八年間霪雨浸溢水患日熾越數年給事中歸子顧言宋時吳淞江闊九里元末淤塞正統間周忱立表江心疏而濬之崔恭徐貫李充嗣海瑞相繼濬者凡五迄今四十餘年廢而不講宜使江闊水駛塘浦支河分流四達疏入留中巡按御史薛貞復請行之下部議而未行至天啓中巡撫都御史周起元復請濬吳淞白茆崇禎初員外郎蔡懋德巡撫都御史李待問皆以為請久之巡撫都御史張國維請疏吳江長橋七十二谼及九里石塘諸洞御史李謨復請濬吳淞白茆俱下部議未能行也十年增築雄縣橫堤八里禦滹沱暴漲十三年以尚寶少卿徐貞明兼御史領墾田使貞明為給事中嘗請興西北水利如南人墟田之制引水成田工部覆議畿輔諸郡邑以上流十五河之水泄於貓兒一灣海口又極束隘故所在橫流必多開支河挑濬海口而後水勢可平疏濬可施然役大費繁而今以民勞財匱方務省事請罷其議乃已後貞明謫官著潞水客談一書論水利當興者十四條時巡撫張國彥副使顧養謙方開水利於薊永有效於是給事中王敬民薦貞明特召還賜敕勘水利貞明乃先治京東州邑如密雲燕樂莊平谷水峪寺龍家務莊三河塘會莊順慶屯地薊州城北黃崖營城西白馬泉鎮國莊城東馬伸橋夾林河而下別山鋪夾陰流河而下至於陰流遵化平安城夾運河而下沙河鋪西城南鐵廠湧珠湖以下韭菜溝上素河下素河百餘里豐潤之南則大寨剌榆坨史家河大王莊東則榛子鎮西則鴉紅橋夾河五十餘里玉田青莊塢後湖莊三里屯及大泉小泉至於瀕海之地自水道沽關黑巖子墩至開平衛南宋家營東西百餘里南北百八十里墾田三萬九千餘畝至真定將治滹沱近堧地御史王之棟言滹沱非人力可治徒耗財擾民帝入其言欲罪諸建議者申時行言墾田興利謂之害民議甚舛顧為此說者其故有二北方民游惰好間憚於力作水田有耕耨之勞胼胝之苦不便一也貴勢有力家侵占甚多不待耕作坐收蘆葦薪芻之利若開墾成田歸於業戶隸於有司則己利盡失不便二也然以國家大計較之不便者小而便者大惟在斟酌地勢體察人情沙不必盡開黍麥無煩改作應用夫役必官募之不拂民情不失地利乃謀國長策耳於是貞明得無罪而水田事終罷巡撫都御史梁問孟築橫城堡邊牆慮寧夏有黃河患請堤西岔河障水東流從之十九年尚寶丞周弘禴言寧夏河東有漢秦二壩請依河西漢唐壩築以石於渠外疏大渠一道北達鴛鴦諸湖詔可二十三年黃淮漲溢淮揚昏墊議者多請開高家堰以分淮寶應知縣陳煃為御史慮高堰既開害民産鹽場請自興鹽迤東疏白塗河石口廖家港為數河分門出海然後從下而上濬清水子嬰二溝且多開瓜儀閘口以泄水給事中祝世祿亦言議者欲放淮從廣陽射陽二湖入海廣陽闊僅八里射陽僅二十五丈名為湖實河也且離海三百里迂回淺窄高寶七州縣水惟此一線宣泄之又使淮注焉田廬鹽場必無幸矣廣陽湖東有大湖方廣六十里湖北口有舊官河自官蕩至鹽城石口通海僅五十三里此導淮入海一便也下部及河漕官議俱格不行既而總河尚書楊一魁言黃水倒灌正以海口為阻分黃工就則石口廖家港白駒場海口金灣芒稻諸河急宜開刷乃命如議行之三十年保定巡撫都御史汪應蛟言易水可溉金臺滹水可溉山溏水可溉中山滏水可溉襄國漳水可溉鄴下而瀛海當衆河下流故號河中視江南澤國不異至於山下之泉地中之水所在皆有宜各設壩建閘通渠築堤高者自灌下則車汲用南方水田法六郡之內得水田數萬頃畿民從此饒永無旱潦之患不幸濱河有梗亦可改折於南取糴於北此國家無窮利也報可應蛟乃於天津葛沽何家圈雙溝白塘令防海軍丁屯種人授田四畝共種五千餘畝水稻二千畝收多因上言墾地七千頃歲可得穀二百餘萬石此行之而效者也是年真定知府郭勉濬大鳴小鳴泉四十餘穴溉田千頃邢臺達活野狐二泉流為牛尾河百泉流為澧河建二十一閘二堤灌田五百餘頃天啓元年御史左光斗用應蛟策復天津屯田令通判盧觀象管理屯田水利明年巡按御史張慎言言自枝河而西靜海興濟之間萬頃沃壤河之東尚有鹽水沽等處為膏腴之田惜皆蕪廢今觀象開寇家口以南田三千餘畝溝洫蘆塘之法種植疏濬之方皆具而有法人何憚而不為大抵開種之法有五一官種謂牛種器具耕作雇募皆出於官而官亦盡收其田之入也一佃種謂民願墾而無力其牛種器具仰給於官待納稼之時官十而取其四也一民種佃之有力者自認開墾若干逮開荒既熟較數歲之中以為常十一而取是也一軍種即令海防營軍種葛沽之田人耕四畝收二石緣有行月糧故收租重也一屯種祖宗衛軍有屯田或五十畝或百畝軍為屯種者歲入十七於官即以所入為官軍歲支之用國初兵農之善制也四法已行惟屯種則今日兵與軍分而屯僅存其名當選各衛之屯餘墾津門之沃土如官種法行之章下所司命太僕卿董應舉管天津至山海屯田規畫數年開田十八萬畝積穀無算崇禎二年兵部侍郎申用懋言永平濼河諸水逶迤寬衍可疏渠以防旱潦山坡隙地便栽種宜令有司相地察源為民興利從之
