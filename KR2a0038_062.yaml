body:
  text: 明史卷六十二志第三十八樂二樂章一洪武元年圜丘樂章迎神中和之曲昊天蒼兮穹窿廣覆燾兮龐洪建圜丘兮國之陽合衆神兮來臨之同念螻蟻兮微衷莫自期兮感通思神來兮金玉其容馭龍鸞兮乘雲駕風顧南郊兮昭格望至尊兮崇崇奠玉帛肅和之曲聖靈皇皇敬瞻威光玉帛以登承筐是將穆穆崇嚴神妙難量謹茲禮祭功徵是皇進俎凝和之曲祀儀祗陳物不於大敢用純犢告於覆載惟茲菲薦恐未周完神其容之以享以觀初獻壽和之曲眇眇微躬何敢請於九重以煩帝聰帝心矜憐有感而通既俯臨於几筵神繽紛而景從臣雖愚蒙鼓舞歡容乃子孫之親祖宗酌清酒兮在鍾仰至德兮玄功亞獻豫和之曲荷天之寵眷駐紫壇中情彌喜臣庶均歡趨蹌奉承我心則寬再獻御前式燕且安終獻熙和之曲小子於茲惟父天之恩惟恃天之慈內外殷勤何以將之奠有芳齊設有明粢喜極而抃奉神燕娭禮雖止於三獻情悠長兮遠而徹饌雍和之曲烹既陳薦獻斯就神之在位既歆既右羣臣駿奔徹茲俎豆物倘未充尚幸神宥送神安和之曲神之去兮難延想遐袂兮翩翩萬靈從兮後先衛神駕兮回旋稽首兮瞻天雲之衢兮眇然望燎時和之曲焚燎於壇燦爛晶熒幣帛牲黍冀徹帝京奉神於陽昭祀有成肅然望之玉宇光明洪武八年御製圜丘樂章迎神仰惟兮昊穹臣率百職兮迓迎幸來臨兮壇中上下護衛兮景從旌幢繚繞兮四維重悅聖心兮民獲年豐奠玉帛民依時兮用工感帝德兮大化成功臣將兮以奠望納兮微衷進俎庖人兮列鼎殽羞兮以成方俎兮再獻願享兮以歆初獻聖靈兮皇皇穆嚴兮金牀臣令樂舞兮景張酒行初獻兮捧觴亞獻載斟兮再將百辟陪祀兮具張感聖情兮無已拜手稽首兮願享終獻三獻兮樂舞揚殽羞具納兮氣藹而芳光朗朗兮上方況日吉兮時良徹饌粗陳菲薦兮神喜將感聖心兮何以忘民福留兮佳氣昂臣拜手兮謝恩光送神旌幢燁燁兮雲衢長龍車鳳輦兮駕飛揚遙瞻冉冉兮去上方可見蒸民兮永康望燎進羅列兮詣燎方炬焰發兮煌煌神變化兮物全於上感至恩兮無量洪武二年方丘樂章迎神中和之曲坤德博厚物資以生承天時行光大且寧穆穆皇祇功化順成來御方丘嚴恭奉迎奠玉帛肅和之曲地有四維大琮以方土有正色制幣以黃敬存於中是薦是將奠之几筵臨鑒洋洋進俎凝和之曲奉將純牡其牡童犢烹既嚴登俎惟肅升壇昭薦神光下燭眷佑邦家報效惟篤初獻壽和之曲午為盛陽陰德初萌天地相遇品物光榮吉日令辰明祀攸行進以醇醴展其潔清亞獻豫和之曲至廣無邊道全持載山嶽所憑海瀆咸賴民資水土既安且泰酌酒揭虔功德惟大終獻熙和之曲庸眇之資有此疆宇匪臣攸能仰承佑助恩崇父母臣歡鼓舞八音宣揚疊侑明醑徹饌雍和之曲牲牷在俎籩豆有實臨之肸蠁匪惟飲食登歌乃徹薦獻爰畢執事奉承一其嚴栗送神安和之曲神化無方妙用難量其功顯融其祀攸長輪云旋龍控鸞翔拜送稽首瞻禮餘光望瘞時和之曲牲醴制幣餕饌惟馨瘞之於坎以達坤靈奉神於陰典禮是程企而望之厚壤寬平洪武八年御製方丘樂章迎神仰皇祇兮駕來川嶽從迎兮威靈備開香煙繚繞兮神臨御街漸升壇兮穆穆靄瑞氣兮應結樓臺以微衷兮率職幸望聖悅兮心諧但允臣兮固請願嘉蒸民兮永懷奠玉帛臣奏兮以筐玉帛是進兮歲奠以常百辟陪祀兮珮聲琅琅惟南薰兮解慍映燎炎兮煌煌進俎庖人兮淨湯大烹牲兮氣靄而芳以微衷兮獻上曰享兮曰康初獻初獻行兮捧觴聖靈穆穆兮洋洋為蒸民兮永康鑒豐年兮耿光亞獻雜殽羞兮已張法前王兮典章臣固展兮情悃用斟醴兮載觴終獻爵三獻兮禮將終臣心眷戀兮無窮恐殽羞兮未具將何報兮神功徹饌俎豆徹兮神熙鸞輿駕兮旋歸百神翼翼兮雲衣敬奉行兮弗敢違送神祥風興兮悠悠雲衢開兮民福留歲樂蒸民兮大有想洋洋兮舉觴載酒望瘞殽羞玉帛兮瘞坎中遙瞻隱隱兮龍旗從祀事成兮盡微衷感厚德兮民福雍雍洪武十二年合祀天地樂章迎神中和之曲荷蒙天地兮君主華夷欽承踴躍兮備筵而祭誠惶無已兮寸衷微仰瞻俯首兮惟願來期想龍翔鳳舞兮慶雲飛必昭昭穆穆兮降壇壝奠玉帛肅和之曲天垂風露兮雨澤霑黃壞氤氳兮氣化全民勤畝兮束帛鮮臣當設宴兮奉來前進俎以後咸同八年圜丘詞嘉靖九年復定分祀圜丘樂章迎神中和之曲仰惟玄造兮於皇昊穹時當肇陽兮大禮欽崇臣惟蒲柳兮螻蟻之衷伏承眷命兮職統羣工深懷愚昧兮恐負洪德爰遵彝典兮勉竭微衷遙瞻天闕兮寶輦臨壇臣當稽首分祗迓恩隆百辟陪列兮舞拜於前萬神翊衛兮以西以東臣俯伏迎兮敬瞻帝御願垂歆鑒兮拜德曷窮奠玉帛肅和之曲龍輿既降兮奉禮先爰有束帛兮暨瑤瑄臣謹上獻兮進帝前仰祈聽納兮荷蒼乾進俎凝和之曲殽羞珍饌兮薦上玄庖人列鼎兮致精虔臣盍祗獻兮馨醴牷願垂歆享兮民福淵初獻壽和之曲禮嚴初獻兮奉觴臣將上進兮聖皇聖皇垂享兮穆穆臣拜手兮何以忘亞獻豫和之曲禮觴再舉兮薦玉漿帝顏歆悅兮民福昂民生有賴兮感上蒼臣惟鞠拜兮荷恩長終獻熙和之曲三獻兮禮告成一念微衷兮露悃情景張樂舞兮聲鍠鋐仰瞻聖容兮俯錫恩泓徹饌雍和之曲祀禮竣兮精意禋三獻備兮誠已申敬徹弗遲兮肅恭寅恐多弗備兮惟賴洪仁送神清和之曲禋事訖終兮百辟維張帝垂歆鑒兮沐澤汪洋龍車冉冉兮寶駕旋雲靈風鼓舞兮瑞露清瀼洪恩浩蕩兮無以為酬粗陳菲薦兮已感歆嘗香氣騰芳兮上徹帝座仰瞻聖造兮賜福羣方臣同率土兮載歡載感祗回寶輦兮鳳嘯龍翔誠惶誠恐兮仰戀彌切願福生民兮永錫亨昌望燎時和之曲龍駕寶輦兮升帝鄉御羞菲帛兮奉燎方環珮鏗鏘兮羅壇壝炬焰特舉兮氣輝煌生民蒙福兮聖澤霑臣荷眷佑兮拜謝恩光嘉靖九年復定方丘樂章迎神中和之曲俯瞻兮鳳輦來靈風兮拂九垓川嶽從兮後先百辟列兮襄陪臣拜首兮迓迎願臨享兮幸哉奠玉帛廣和之曲祀禮有嚴兮奉虔玉帛在笥兮來前皇靈垂享兮以納蒸民率土兮樂豐年進俎咸和之曲殽羞馨兮氣芳庖人奉役兮和湯奉進兮皇祇歆慰臣稽首兮敬將初獻壽和之曲酒行初獻兮樂舞張齊醴明潔兮馨香願垂享兮以歆生民安兮永康亞獻安和之曲載獻兮奉觴神顏和懿兮以嘗功隆厚載兮配天民感德兮無量終獻時和之曲三進兮玉露清百職奔繞兮佩環鳴鐘鷺鼓兮韻錚鍧願留福兮羣生徹饌貞和之曲禮告終兮徹敢違深惟一念兮誠意微神垂博容兮聽納恐未備兮惟慈依送神寧和之曲禮成兮誠已伸駕還兮法從陳靈祇列兮以隨百辟拜兮恭寅望坤宮兮奉辭願普福兮蒸民望燎曲同寧和洪武三年朝日樂章二十一年罷迎神熙和之曲吉日良辰祀典式陳純陽之精惟是大明濯濯厥靈昭鑒我心以候以迎來格來歆奠幣保和之曲靈旗蒞止有赫其威一念潛通幽明弗違有幣在篚物薄而微神兮安留尚其享之初獻安和之曲神兮我留有薦必受享祀之初奠茲醴酒晨光初升祥徵應候何以侑觴樂陳雅奏亞獻中和之曲我祀維何奉茲犧牲爰酌醴齊二觴載升洋洋如在式燕以寧庶表微衷交於神明終獻肅和之曲執事有嚴品物斯祭黍稷非馨式將其意薦茲酒醴成我常祀神其顧歆永言樂只徹饌凝和之曲春祈秋報率為我民我民之生賴於爾神維神佑之康寧是臻祭祀云畢神其樂欣送神壽和之曲三獻禮終九成樂作神人以和既燕且樂雲車風馭靈光昭灼瞻望以思邈彼寥廓望燎豫和之曲俎豆既徹禮樂已終神之云旋倏將焉從以望以燎庶幾感通時和歲豐維神之功嘉靖九年復定朝日樂章迎神熙和之曲仰瞻兮大明位尊兮王宮時當仲春兮氣融爰遵祀禮兮報功微誠兮祈神昭鑒願來享兮迓神聰奠玉帛凝和之曲神靈壇兮肅其恭有帛在篚兮赤琮奉神兮祈享以納豫躬奠兮欣以顒初獻壽和之曲玉帛方奠兮神歆酒行初獻兮舞呈齊芳馨兮犧色騂神容悅兮鑒豫情亞獻時和之曲二齊升兮氣芬芳神顏怡和兮喜將豫令樂舞兮具張願垂普照兮民康終獻保和之曲殷勤三獻兮告成羣職在列兮周盈神錫休兮福民生萬世永賴兮神功明徹饌安和之曲一誠盡兮豫心懌五福降兮誠民獲禧仰九光兮已申終三獻兮徹敢遲送神昭和之曲祀禮既周兮樂舞揚神享以納兮還青鄉豫當拜首兮奉送願恩光兮普萬方永耀熹明攸賴蒸民咸仰兮恩光望燎之曲覩六龍兮御駕神變化兮鳳翥鸞翔束帛殽羞兮詣燎方佑我皇明兮基緒隆長洪武三年夕月樂章周天星辰附二十一年罷迎神凝和之曲吉日良辰祀典式陳太陰夜明以及星辰濯濯厥靈昭鑒我心以候以迎來格來歆四年星辰別祀改以及星辰句為惟德孔神奠帛以下咸同朝日嘉靖九年復定夕月樂章迎神凝和之曲陰曰配合兮承陽宗式循古典兮齋以恭覩太陰來格兮星辰羅從豫拜首兮迓神容初獻壽和之曲神其來止有嚴其誠玉帛在篚清酤方盈奉而奠之願鑒微情夫祀兮云何祈佑兮羣氓亞獻豫和之曲二觴載斟樂舞雍雍神歆且樂百職惟供願順軌兮五行祈民福兮惟神必從終獻康和之曲一誠以申三舉金觥鐘鼓鍧鍧環珮琤琤鑒豫之情願永保我民生徹饌安和之曲禮樂肅具精意用申位坎居歆納茲藻蘋徹之弗遲儀典肅陳神其鑒之佑我生民送神保和之曲禮備告終兮神喜旋穹碧澄輝兮素華鮮星辰從兮返神鄉露氣清兮霓裳蹁躚望瘞之曲殽羞兮束帛薦之於瘞兮罔敢愆豫拜首兮奉送願永貺兮民樂豐年嘉靖十年定祈穀樂章迎神中和之曲臣惟穹昊兮民物之初為民請命兮祀禮昭諸備筵率職兮祈洪庥臣衷微眇兮悃懇誠攄遙瞻駕降兮霽色輝歡迎鼓舞兮迓龍輿臣愧菲才兮后斯民願福斯民兮聖恩渠奠玉帛肅和之曲蒸民勤職兮農事顓蠶工亦慎兮固桑阡玉帛祗奉兮暨豆籩仰祈大化兮錫以豐年進俎咸和之曲鼎烹兮氣馨香羞兮旨醽帝垂享兮以歆蒸民蒙福兮以寧初獻壽和之曲禮嚴兮初獻行百職趨蹌兮珮琤鳴臣謹進兮玉觥帝心歆鑒兮歲豐亨亞獻景和之曲二觴舉兮致虔清醴載斟兮奉前仰音容兮欣穆臣感聖恩兮實拳拳終獻永和之曲三獻兮一誠微禋禮告成兮帝鑒是依蒸民沐德兮歲豐禨臣拜首兮竭誠祈徹饌凝和之曲三獻周兮肅乃儀俎豆敬徹兮弗敢遲願留福兮丕而曰雨曰暘兮若時送神清和之曲祀禮告備兮帝鑒彰臣情上達兮感昊蒼雲程肅駕兮返帝鄉臣荷恩眷兮何以忘祥風瑞靄兮彌壇壝蒸民率土兮悉獲豐康望燎太和之曲遙睹兮天衢長邈彼廖廓兮去上方束帛薦火兮升聞悃愊通兮沛澤長樂終九奏兮神人以和臣同率土兮咸荷恩光嘉靖十七年定大饗樂章迎神中和之曲於皇穆清兮弘覆惟仁既成萬寶兮惠此蒸民祗受厥明兮報無因爰稽古昔兮式展明禋肅肅廣庭兮遙遙紫旻笙鏞始奏兮祥風導雲臣拜稽首兮中心孔勤爰瞻寶輦兮森羅萬神庶幾昭格兮眷命其申徘徊顧歆兮鑒我恭寅奠玉帛肅和之曲捧圭幣兮瑤堂穆將愈兮聖皇秉豫心兮純一荷帝德兮溥將進俎凝和之曲歲功阜兮庶類成黍稷飶兮濡鼎馨敬薦之兮慙菲輕大禮不煩兮惟一誠初獻壽和之曲金風動兮玉宇澄初獻觴兮交聖靈瞻玄造兮懷鴻禎曷以酬之心怦怦亞獻豫和之曲帝眷我兮居歆紛繁會兮五音再捧觴兮莫殫臣心惟帝欣懌兮生民是任終獻熙和之曲綏萬邦兮屢豐年眇眇豫躬兮實荷昊天酒三獻兮心益虔帝命參輿兮勿遽旋徹饌雍和之曲祀禮既洽兮神人肅雍享帝享親兮勉竭臣衷惟洪恩兮罔極儼連蜷兮聖容送神清和之曲九韶既成兮金玉鏗鏘百辟森立兮戚羽斯藏皇天在上兮昭考在旁嚴父配天兮祗修厥常殷薦既終兮神去無方玄雲上升兮鸞鵠參翔靈光回照兮郁乎芬芳載慕載瞻兮願錫亨昌子孫庶民兮惟帝是將於昭明德兮永懷不忘望燎時和之曲龍輿杳杳兮歸上方金風應律兮燎斯揚達精誠兮合靈光帝廷納兮玉帛將顧下土兮眷不忘願錫吾民兮長阜康嘉靖十八年興都大饗樂章迎神中和之曲仰高高之在上兮皇穹冒九圍之遍覆兮罔止西東王者出王遊衍兮必奉天顧愚臣之此行兮亶荷帡幪初獻壽和之曲於昭帝庥兮臣感恩淵淵巡省舊藩之地兮實止承天下情思報兮此心拳拳瓊卮蒼幣兮捧扣壇前亞獻敷和之曲樂奏兮三成觴舉兮再呈帝鑒幾微兮曰爾誠小臣頓首兮敢不嚴於此精終獻承和之曲臣來茲土本之思親思親伊何昌厥嗣人嗣人克昌匪戴帝之臨汝夫何因徹饌永和之曲肅其具兮祀禮行備彼儀兮樂舞張退省進止兮臣疏且狂沐含仁兮何以量送神感和之曲王之狩兮典有禋望於維柴祀兮首重上蒼臣情罔殫兮夙夜惶惶祗伸愚悃兮允賴恩光遙瞻兮六龍騰翔帝垂祉兮萬世永昌嘉請十一年定雩祀樂章十七年罷迎神中和之曲於穆上帝爰處瑤宮咨爾黎庶覆憫曷窮旗幢戾止委蛇雲龍霖澤斯溥萬寶有終奠帛肅和之曲神之格思奠茲文纁盛樂斯舉香氣氤氳精禋孔熯徹於紫冥懇祈膏澤渥我嘉生進俎咸和之曲百川委潤名山出雲愆暘孔熾膏澤斯屯祈年於天載牲於俎神之格思報以甘雨初獻壽和之曲有嚴崇祀日吉辰良酌彼罍洗椒馨飶香元功溥濟時雨時暘惟神是聽綏以多穰亞獻景和之曲皇皇禋祀孔惠孔明瞻仰來歆拜首欽承有醴維醽有酒維清雲韶侑獻肅雍和鳴聖靈有赫鑒享精誠終獻永和之曲靈承無斁駿奔有容嘉玉以陳酌鬯以供禮三再稱誠一以從備物致志申薦彌恭神昭景貺佑我耕農徹饌凝和之曲有赫旱暵民勞瘁斯於牲於醴載舞載詩禮成三獻敬徹不遲神之聽之雨我公私送神清和之曲爰迪寅清昭事昊穹仰祈甘雨惠我三農既歆既格言歸太空式霑下土萬方其同望燎太和之曲赤龍旋馭禮洽樂成燔燎既舉昭格精禋維帝降康雨施雲行登我黍稌溥受厥明祭畢樂舞童羣歌雲門之曲景龍精兮時見測鶉緯兮宵懸肆廣樂兮鏗鍧列皇舞兮蹁躚祈方社兮不莫薦圭璧兮孔虔需密雲兮六漠霈甘澍兮九玄慰我農兮既渥錫明昭兮有年洪武元年太社稷異壇同壝樂章迎神廣和之曲五土之靈百穀之英國依土而寧民以食而生基圖肇建祀禮修明神其來臨肅恭而迎奠幣肅和之曲有國有人社稷為重昭事云初玉帛虔奉維物匪奇敬實將之以斯為禮冀達明祇進俎凝和之曲崇壇北向明禋方闡有潔犧牲禮因物顯大房載設中情以展景運既承神貺斯衍初獻壽和之曲太社云高為山林深為川澤崇丘廣衍亦有原隰惟神所司百靈效職清醴初陳顒然昭格句龍配云平治水土萬世神功民安物遂造化攸同嘉惠無窮報祀宜豐配食尊嚴國家所崇太稷云黍稷稻粱來牟降祥為民之天豐年穰穰其功甚大其恩正長乃登芳齊以享以將后稷配云皇皇后稷克配於天誕降嘉種樹藝大田生民粒食功垂萬年建壇於京歆茲吉蠲亞獻豫和之曲太社云廣厚無偏其體弘兮德侔坤順萬物生兮錫民地利神化行兮恭祀告虔國之禎兮句龍配云周覽四方偉烈昭彰九州既平五行有常壇位以妥牲醴之將是崇是嚴煥然典章太稷云億兆林林所資者穀雨暘應時家給人足倉庾坻京神介多福祗薦其儀昭事維肅后稷配云躬勤稼穡有相之道不稂不莠實堅實好農事開國王基永保有年自今常奉蘋藻終獻豫和之曲詞同亞獻徹豆雍和之曲禮展其勤樂奏其節庶品苾芬神明是達有嚴執事俎豆乃徹穆穆雍雍均其欣悅送神安和之曲維壇潔清維主堅貞神之所歸依茲以寧土宇靖安年穀順成祀事昭明永致升平望瘞時和之曲晨光將發既侑既歆瘞茲牲幣達於幽陰神人和悅實獲我心永久禋祀其始於今洪武十一年合祭太社稷樂章迎神廣和之曲豫惟土穀兮造化工為民立命兮當報崇民歌且舞兮朝雍雍備筵率職兮候迓迎想聖來兮祥風生欽當稽首兮告年豐初獻壽和之曲氤氳氣合兮物遂蒙民之立命兮荷陰功豫將玉帛兮獻微衷初斟醴薦兮民福洪亞獻豫和之曲豫令樂舞兮再捧觴願神昭格兮軍民康思必穆穆兮靈洋洋感恩厚兮拜祥光終獻熙和之曲干羽飛旋兮酒三行香煙繚繞兮雲旌幢豫今稽首兮欣且惶神顏悅兮霞彩彰徹饌雍和之曲粗陳微禮兮神喜將琅然絲竹兮樂舞揚願祥普降兮遐邇方蒸民率土兮盡安康送神安和之曲氤氳氤氳兮祥光張龍車鳳輦兮駕飛揚遙瞻稽首兮去何方民福留兮時雨暘望瘞時和之曲捧殽羞兮詣瘞方鳴鑾率舞兮聲鏗鏘思神納兮民福昂豫今稽首兮謝恩光嘉靖十年初立帝社稷樂章迎神時和之曲東風兮地脈以融首務兮稼穡之工秋祭云金風兮萬寶以充欣成兮稼穡之工祀神於此兮苑中願來格兮慰豫衷初獻壽和之曲神兮臨止禮薦清醇菲幣在笥初獻式遵神其鑒茲享斯藻蘋我祀伊何祈報是因神兮錫祉則阜吾民亞獻雍和之曲二觴載舉申此殷勤神悅兮以納祥靄兮氤氳終獻寧和之曲禮終兮酒三行喜茂實兮黍稷粱農事待兮豐康豫稽首兮以望徹饌保和之曲祀事告終三獻既周徹之罔遲惠注田疇迓以休貺庇茲有秋送神廣和之曲耕耨伊首秋祭云耕耨告就力事豆籩粢盛賴之於此大田豫將以祀神其少延願留嘉祉副我潔虔肅駕兮雲旋普豫兮有年望瘞曲同洪武二年分祀天神地祇樂章迎天神奏中和之曲吉日良辰祀典式陳太歲尊神雷雨風雲濯濯厥靈昭鑒我心以候以迎來格來歆奠帛以後咸同朝日迎地祇奏中和之曲吉日良辰祀典式陳惟地之祇百靈繽紛嶽鎮海瀆山川城隍內而中國外及四方濯濯厥靈昭鑒我心以候以迎來格來歆奠帛以後咸同朝日洪武六年合祀天神地祇樂章迎神保和之曲吉日良辰祀典式陳太歲尊神雷雨風雲嶽鎮海瀆山川城隍內而中國外及四方濯濯厥靈昭鑒我心以候以迎來格來歆奠帛以後咸同朝日嘉請九年復分祀天神地祇樂章迎天神保和之曲吉日良辰祀典式陳景雲甘雨風雷之神赫赫其靈功著生民參贊玄化宣布蒼仁爰茲報祀鑒斯藻蘋奠帛以後俱如舊迎地祇保和之曲吉日良辰祀典式陳靈嶽方鎮海瀆之神京畿四方山澤羣真育靈分隅福我生民薦斯享報鑒我恭寅奠帛以後亦如舊洪武四年祀周天星辰樂章迎神凝和之曲星辰垂象布列玄穹擇茲吉日祀禮是崇濯濯厥靈昭鑒我心謹候以迎庶幾來歆奠帛保和之曲詞同朝日初獻保和之曲神兮既留品物斯薦奉祀之初醴酒斯奠仰惟靈耀以享以歆何以侑觴樂奏八音亞獻中和之曲神既初享亞獻再升以酌醴齊仰薦於神洋洋在上式燕以寧庶表微衷交於神明終獻肅和之曲神既再享終獻斯備不腆菲儀式將其意薦茲酒醴成我常祀神其顧歆永言樂只徹豆豫和之曲祀事將畢神既歆只徹茲俎豆以成其禮惟神樂欣無間始終樂音再作庶達微悰送神雍和之曲詞同朝日望燎雍和之曲神既享祀靈馭今旋燎煙既升神帛斯焚巍巍霄漢倏焉以適拳拳余衷瞻望弗及嘉靖八年祀太歲月將樂章迎神吉日良辰祀典式陳輔國佑民太歲尊神四時月將功曹司辰濯濯厥靈昭鑒我心以候以迎來格來歆奠帛以後俱同神祇洪武元年宗廟樂章迎神太和之曲慶源發祥世德惟崇致我眇躬開基建功京都之中親廟在東惟我子孫永懷祖風氣體則同呼吸相通來格來崇皇靈顯融奉册寶熙和之曲時享不用維水有源維木有根先世積善福垂後昆册寶鏤玉德顯名尊祗奉禮文仰答洪恩進俎凝和之曲時享不用明明祖考妥神清廟薦以牲牷匪云盡孝願通神明願成治效此帝王之道亦祖考之教初獻壽和之曲德祖廟初獻云思皇高祖穆然深玄其遠歷年其神在天尊臨太室餘慶綿綿歆於几筵有永其傳懿祖廟初獻云思皇曾祖清勤純古田里韜光天篤其祜佑我曾孫弘開土宇追遠竭虔勉遵前矩熙祖廟初獻云維我皇祖淑後貽謀盛德靈長與泗同流發於孫枝明禋載修嘉潤如海恩何以酬仁祖廟初獻云惟我皇考既淳且仁弗耀其身克開嗣人子有天下尊歸於親景運維新則有其因亞獻豫和之曲對越至親儼然如生其氣昭明感格在庭如見其形如聞其聲愛而敬之發乎中情終獻熙和之曲承先人之德化家為國毋曰豫小子基命成績欲報其德昊天罔極殷勤三獻我心悅懌徹豆雍和之曲樂奏具肅神其燕嬉告成於祖亦右皇妣敬徹不遲以終祀禮祥光煥揚錫以嘉祉送神安和之曲顯兮幽兮神運無迹鸞馭逍遙安其所適其靈在天其主在室子子孫孫孝思無斁二十一年更定其初獻合奏餘並同思皇先祖耀靈於天源衍慶流由高逮玄玄孫受命追遠其先明禋世崇億萬斯年永樂以後改迎神章致我眇躬句為助我祖宗又改終獻章首四句為惟前人之功肇膺天曆延及於小子爰受方國餘並同嘉靖十五年孟春九廟特享樂章太祖廟迎神太和之曲於皇於皇兮仰我聖祖乃武乃文攘夷正華為天下大君比隆於古越彼放勛肇造王業佑啓豫子孫功德超邁大室攸尊首稱春祀誠敬用申維神格思萬世如存初獻壽和之曲薦帛於篚潔牲於俎嘉我黍稷酌我清酤愚孫毖祀奠獻初舉翼翼精誠對越我皇祖居然顧歆永錫純祜亞獻豫和之曲籥舞既薦八音洋洋工歌喤喤醇醴載羞齋明其將之永佑於子孫歲事其承之俾嗣續克承百世其保之終獻寧和之曲三爵既崇禮秩有終盈溢孚顒顯相肅雍惟皇祖格哉以繹以融申錫無窮暨於臣民萬福攸同徹饌豫和之曲禮畢樂成神悅人宜籩豆靜嘉敬徹不遲穆穆有容秩秩其儀益祗以嚴矧敢斁於斯還宮安和之曲於皇我祖陟降在天清廟翼翼禋祀首虔明神既留寢祏靜淵介福綏祿錫胤綿綿以惠我家邦於萬斯年成祖廟迎神太和之曲於惟文皇重光是宣克戡內難轉坤旋乾外讋百蠻威行八埏貽典則於子孫不忘不愆聖德神功格於皇天作廟奕奕百世不遷祀事孔明億萬斯年初獻亞獻終獻徹饌還宮俱與太祖廟同仁宗廟迎神太和之曲明明我祖盛德天成至治訏謨遹駿有聲專奠致享惟古經是程春祀有嚴以迓聖靈惟陟降在庭以賚我思成初獻壽和之曲幣牲在陳金石在懸清酒方獻百執事有虔明神洋洋降歆自天俾我孝孫德音孔宣亞獻豫和之曲中誠方殷明神如存醴齊孔醇再舉罍尊福祿穰穰攸介攸臻追遠報酬罔極之恩終獻寧和之曲樂比聲歌佾舞婆娑稱彼玉爵酒旨且多獻享維終神聽以和孝孫在位受福不那徹饌雍和之曲牷牲在俎稷黍在簠孝享多儀格我皇祖稱歌進徹髦士膴膴孝孫受福以敷錫於下土還宮安和之曲犆享孔明物備禮成於昭在天以莫不聽神明即安維華寢是憑肇祀迄今百世祗承宣廟英廟憲廟俱與仁廟同孝廟迎神太和之曲列祖垂統景運重熙於惟孝皇敬德允持用光於大烈化被蒸黎專廟以享經禮攸宜俎豆式陳庶幾來思初獻壽和之曲粢盛孔蠲腯肥牲牷考鼓萬舞躚躚清醑初酌對越在天明神居歆式昭厥虔亞獻豫和之曲祀事孔勤精意未分樂感鳳儀禮虔駿奔醞齊挹清載奠瑤尊神其格思福祿來臻終獻寧和之曲樂舞既成獻享維終明明對越彌篤其恭篤恭維何明德是崇神之聽之萬福來同徹饌雍和之曲牲牢醴陳我享我將黍稷蘋藻潔白馨香徹以告成降禧穰穰神錫無疆祐我萬方還宮安和之曲禮享既洽神御聿興廟寢煌煌以憑以寧維神匪遐上下在庭於寢孔安永底我蒸民之生武廟迎神太和之曲列祖垂統景運重熙於惟武皇昭德敕威用剪除姦凶大業弗隳專廟以享經禮攸宜俎豆式陳庶幾來思初獻亞獻終獻及徹饌還宮俱與孝廟同睿廟迎神太和之曲於穆神皇秉德凝道仁厚積纍配於穹昊流慶顯休萃於眇躬施於無窮以似以續以光紹我皇宗惟茲氣始俎豆是供循厥典禮式敬式崇神其至止以鑒愚衷初獻壽和之曲制帛牲牢庶羞芬膫玉戚朱干協於韶簫清醑在筵中情纏綿神之格思儀形僾然亞獻豫和之曲瑤爵再陳侑以工歌籥舞蹌蹌八音諧和孝思肫肫感格聖靈致賣心則存如聞其聲終獻寧和之曲儀式弗踰奠爵維三樂舞雍容以雅以南仰仁源德澤嶽崇海淵願啓我子孫緝熙光明維兩儀是參徹饌雍和之曲嘉饌甘只亦既歆只登歌迅徹敬終惟始維神孔昭賚永成於孝矣還宮安和之曲幽顯莫測神之無方祀事既成神返諸帝鄉申發休祥俾胤嗣蕃昌宜君兮宜王歷世無疆九廟時祫樂章孟夏迎神太和之曲序屆夏首兮風氣薰禮嚴時祫兮戞擊鐘鼖迎羣主來合享交欣於皇列聖正南面以申崇報皇勳初獻壽和之曲瞻曙色方昕仰列聖在上奠金觥而捧幣紋小孫執盈兮敢不懼殷亞獻豫和之曲思皇祖仰聖神來列主會太宸時祫修循古倫惟聖鑒歆愚孫忱恂終獻寧和之曲齊醴清兮麥熟新籩豆潔兮孝念申仰祖功兮宗德願降祐兮後人徹饌雍和之曲樂終兮禮成告玉振兮訖金聲徹之弗違以肅精誠還宮安和之曲三獻就兮祖宗鑒享一誠露兮念維長思弗盡兮思弗忘深荷德澤之啓佑小孫惟賴以餘光神返宮永安保家國益昌孟秋迎神時兮孟秋火西流感時毖祀兮爽氣回喜金風兮飄來仰祖宗兮永慕哉秋祫是舉兮希鑒歆小孫恭迓兮捧素裁初獻皇祖降筵列聖靈聯執事恐蹎樂舞蹁躚小孫捧盈兮敢弗虔亞獻再酌兮玉漿潔淨兮馨香祖宗垂享兮錫胤昌萬歲兮此禮行終獻進酒三觥歌舞雍韺鐘鼓轟錚皇祖列聖永享愚誠徹饌秋嘗是舉稌黍豐農三獻既周聖靈顯容小孫時思恩德兮惟還宮仰皇祖兮聖神功祀典陳兮報莫窮嘗祫告竣鸞馭旋宮皇靈在天主在室萬祀陟降何有終孟冬迎神時兮孟冬凜以淒感時毖祀兮氣潛回遡朔風兮北來仰祖宗兮永慕哉冬祫是舉兮希鑒歆小孫恭迓兮捧素裁初亞終獻俱同孟秋徹饌冬蒸是舉俎豆維豐三獻既周聖靈顯容小孫時思恩德兮惟還宮同孟秋惟改嘗祫為蒸祫大祫樂章迎神仰慶源兮大發祥惟世德兮深長時惟歲殘大祫洪張祖宗聖神明明皇皇遙瞻兮頓首世德兮何以忘初獻神之格兮慰我思慰我思兮捧玉卮捧來前兮栗栗仰歆納兮是幸已而亞獻再舉瑤漿樂舞羣張小孫在位陪助賢良百工羅從大禮肅將惟我祖宗顯錫恩光終獻思祖功兮深長景宗德兮馨香報歲事之既成兮典則先王惟功德之莫報兮何以量徹饌三酌既終一誠感通仰聖靈兮居歆萬祀是舉兮庶乎酬報之衷還宮顯兮幽兮神運無迹神運無迹兮化無方靈返天兮主返室願神功聖德兮啓佑無終玄孫拜送兮以謝以祈嘉靖十年大禘樂章迎神元和之曲於維皇祖肇創丕基鍾祥有自曰本先之奄有萬方作之君師追報宜隆以申孝思瞻望稽首介我休禧初獻壽和之曲木有本兮水有源人本祖兮物本天思報德兮禮莫先仰希鑒兮敢弗虔亞獻仁和之曲中觴載升於此瑤觥小孫奉前願歆其誠樂舞在列庶職在庭祖鑒孔昭錫祐攸亨終獻德和之曲於維兮先祖延慶兮深高追報兮曷能三進兮香醪徹饌太和之曲芬兮豆籩潔兮黍粢祖垂歆享徹乎敢遲禮云告備以訖陳辭永裕後人億世丕而送神永和之曲禘祀兮具張佳氣兮鬱昂皇靈錫納兮喜將一誠通兮萬載昌祈鑒祐兮天下康仰源仁浩德兮曷以量小孫頓首兮以望遙瞻冉冉兮聖靈皇皇洪武七年御製祀歷代帝王樂章迎神雍和之曲仰瞻兮聖容想鑾輿兮景從降雲衢兮後先來俯鑒兮微衷荷聖臨兮蒼生有崇眷諸帝兮是臨豫頓首兮幸蒙奠帛保和之曲秉微誠兮動聖躬來列坐兮殿庭豫今願兮效勤奉禮帛兮列酒尊鑒豫情兮欣享方旋駕兮雲程初獻保和之曲酒行兮爵盈喜氣兮雍雍重荷蒙兮載瞻載崇羣臣欣兮躍從願覩穆穆兮聖容亞獻中和之曲酒斟兮禮明諸帝熙和兮悅情百職奔走兮滿庭陳籩豆兮數重亞獻兮願成終獻肅和之曲獻酒兮至終早整雲鸞兮將旋宮豫心眷戀兮神聖欲攀留兮無從躡雲衢兮緩行得遙瞻兮達九重徹饌凝和之曲納殽羞兮領陳蒸民樂兮幸生將何以兮崇報惟歲時兮載瞻載迎送神壽和之曲幡幢繚繞兮導來蹤鑾輿冉冉兮歸天宮五雲擁兮祥風從民歌聖佑兮樂年豐望燎豫和之曲神機不測兮造化功珍羞禮帛兮薦火中望瘞庭兮稽首願神鑒兮寸衷洪武六年定祀先師孔子樂章迎神咸和之曲大哉宣聖道德尊崇維持王化斯民是宗典祀有常精純益隆神其來格於昭聖容奠帛寧和之曲自生民來誰底其盛惟王神明度越前聖粢帛具成禮容斯稱黍稷非馨惟神之聽惟王後改曰惟師初獻安和之曲大哉聖王實天生德作樂以崇時祀無斁清酤惟馨嘉牲孔碩薦羞神明庶幾昭格亞終獻景和之曲百王宗師生民物軌瞻之洋洋神其寧止酌彼金罍惟清且旨登獻惟三於戲成禮徹饌咸和之曲犧象在前豆籩在列以享以薦既芬既潔禮成樂備人和神悅祭則受福率遵無越送神咸和之曲有嚴學宮四方來宗恪恭祀事威儀雍雍歆格惟馨神馭旋復明禋斯畢咸膺百福洪武二年享先農樂章迎神永和之曲東風啓蟄地脈奮然蒼龍挂角燁燁天田民命惟食創物有先圜鐘既奏有降斯筵奠帛永和之曲帝出乎震天發農祥神降於筵藹藹洋洋禮神有帛其色惟蒼豈伊具物誠敬之將進俎雍和之曲制帛既陳禮嚴奉牲載之於俎祀事孔明簠簋攸列黍稷惟馨民力普存先穡之靈初獻壽和之曲九穀未分庶草攸同表為嘉種實在先農黍稌斯豐酒醴是供獻奠之初以祈感通配位云厥初生民粒食其天開物惟智邃古奚傳思文后稷農官之先侑神作主初獻惟蠲亞獻壽和之曲倬彼甫田其隰其原耒耜云載驂馭之間報本思享亞獻惟虔神其歆之自古有年配位云后稷配天興於有邰誕降嘉種有栽有培俶載南畝祗事三推佑神再獻歆我尊罍終獻壽和之曲帝藉之典享祀是資潔豐嘉栗咸仰於斯時維親耕享我農師禮成於三以訖陳詞配位云嘉德之薦民和歲豐帝命率育報本之功陳常時夏其德其功齊明有格惟獻之終徹饌永和之曲於赫先農歆此潔修於篚於爵於饌於羞禮成告徹神惠敢留餕及終畝豐年是求送神永和之曲神無不在於昭於天曰迎曰送於享之筵冕衣在列金石在懸往無不之其佩翩翩望瘞太和之曲祝帛牲醴先農既歆不留不褻瘞之厚深有幽其瘞有赫其臨曰禮之常匪今斯今嘉靖九年定享先蠶樂章迎神貞和之曲於穆惟神肇啓蠶桑衣我萬民保我家邦茲舉曠儀春日載陽恭迎霞馭靈氣洋洋奠帛壽和之曲神其臨只有苾有芬乃獻玉乃奠文纁仰祈昭鑒淑氣氤氳顧茲蠶婦祁祁如雲初獻曲同奠帛亞獻順和之曲載舉清觴蠶祀孔明以格以享鼓瑟吹笙陰教用彰坤儀允貞神之聽之鑒此禋誠終獻寧和之曲神之格思桑土是宜三繅七就惟此繭絲獻禮有終神不我遺錫我純服藻繪皇儀徹饌安和之曲俎豆具徹式禮莫愆既匡既敕我祀孔虔我思古人葛覃惟賢明靈歆只永顧桑阡送神恆和之曲神之升矣日霽霞蒸相此女紅杼軸其興茲返玄宮鸞鳳翔騰瞻望弗及永錫嘉徵望燎曲同送神
