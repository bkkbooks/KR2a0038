body:
  text: 明史卷十七本紀第十七世宗一世宗欽天履道英毅聖神宣文廣武洪仁大孝肅皇帝諱厚熜憲宗孫也父興獻王祐杬國安陸正德十四年薨帝年十有三以世子理國事十六年三月辛酉未除服特命襲封丙寅武宗崩無嗣慈壽皇太后與大學士楊廷和定策遣太監谷大用韋彬張錦大學士梁儲定國公徐光祚駙馬都尉崔元禮部尚書毛澄以遺詔迎王於興邸夏四月癸未發安陸癸卯至京師止於郊外禮官具儀請如皇太子即位禮王顧長史袁宗皋曰遺詔以我嗣皇帝位非皇子也大學士楊廷和等請如禮臣所具儀由東安門入居文華殿擇日登極不允會皇太后趣羣臣上箋勸進乃即郊外受箋是日日中入自大明門遣官告宗廟社稷謁大行皇帝几筵朝皇太后出御奉天殿即皇帝位以明年為嘉靖元年大赦天下恤録正德中言事罪廢諸臣賜天下明年田租之半自正德十五年以前逋賦盡免之丙午遣使奉迎母妃蔣氏召費宏復入閣戊申命禮臣集議興獻王封號五月乙卯罷大理銀礦丙辰梁儲致仕壬戌吏部侍郎袁宗皋為禮部尚書兼文淵閣大學士預機務壬申錢寧伏誅六月戊子江彬伏誅乙未縱內苑禽獸令天下毋得進獻丁酉革錦衣衛冒濫軍校三萬餘人戊戌振江西災壬寅革傳升官癸卯振遼東饑秋七月壬子進士張璁言繼統不繼嗣請尊崇所生立興獻王廟於京師初禮臣議考孝宗改稱興獻王皇叔父援宋程頤議濮王禮以進不允至是下璁奏命廷臣集議楊廷和等抗疏力爭皆不聽癸丑命自今親喪不得奪情著為令丁巳小王子犯莊浪指揮劉爵禦却之丙子革錦衣衛所及監局寺廠司庫旗校軍士匠役投充新設者凡十四萬八千餘人丁丑寧津盜起德平知縣龔諒死之九月乙卯袁宗皋卒庚午葬毅皇帝於康陵冬十月己卯朔追尊父興獻王為興獻帝祖母憲宗貴妃邵氏為皇太后母妃為興獻后壬午興獻后至自安陸十一月庚戌振江西災丁巳録平宸濠功封王守仁新建伯甲戌乾清宮成罷廣西貢香諭各鎮巡守備官凡額外之征悉罷之嘉靖元年春正月癸丑享太廟己未大祀天地於南郊清寧宮後殿災命稱孝宗皇考慈壽皇太后聖母興獻帝后為本生父母己巳甘州兵亂殺巡撫都御史許銘二月己卯耕藉田三月辛亥弗提衛獻生豹却之甲寅釋奠於先師孔子丁巳上慈壽皇太后尊號曰昭聖慈壽皇太后武宗皇后曰莊肅皇后戊午上皇太后尊號曰壽安皇太后興獻后曰興國太后夏四月壬辰命各邊巡按御史三年一閲軍馬器械秋七月己酉以南畿浙江江西湖廣四川旱詔撫按官講求荒政九月辛未立皇后陳氏冬十月辛卯振南畿湖廣江西廣西災免稅糧有差壬辰以災傷敕羣臣修省十一月庚申壽安皇太后崩十二月戊寅振陝西被寇及山東礦賊流劫者是年琉球入貢二年春正月乙卯大祀天地於南郊丁卯小王子犯沙河堡總兵官杭雄戰却之二月癸未振遼東饑壬辰總督軍務右都御史俞諫總兵官魯綱討平河南山東賊三月乙巳俺答寇大同甲寅武宗神主祔太廟戊午賜姚淶等進士及第出身有差夏四月壬申以災異敕羣臣修省癸未以宋朱熹裔孫墅為五經博士癸巳命兩京三品以上及撫按官舉堪任守令者五月庚午小王子犯密雲石塘嶺殺指揮使殷隆六月癸丑以災傷免嘉靖元年天下稅糧之半秋八月辛酉小王子犯丁字堡都指揮王綱戰死冬十一月丁卯免南畿被災稅糧己丑振河南饑是年撒馬兒罕土魯番天方入貢三年春正月丙寅朔兩畿河南山東陝西同時地震丁丑大祀天地於南郊丙戌南京刑部主事桂萼請改稱孝宗皇伯考下廷臣議是月𩽆顏入寇二月丙午楊廷和致仕庚戌南京地震三月壬申振淮揚饑辛巳振河南饑夏四月己酉上昭聖皇太后尊號曰昭聖康惠慈壽皇太后庚戌上興國太后尊號曰本生聖母章聖皇太后癸丑追尊興獻帝為本生皇考恭穆獻皇帝大赦辛酉編修鄒守益請罷興獻帝稱考立廟下錦衣衛獄五月乙丑蔣冕致仕修撰呂柟言大禮未正下錦衣衛獄丁丑遣使迎獻皇帝神主於安陸己卯吏部尚書石珤兼文淵閣大學士預機務六月御史段續陳相請正席書桂萼罪吏部員外郎薛蕙上為人後解鴻臚少卿胡侍言張璁等議禮之失俱下獄秋七月乙亥更定章聖皇太后尊號去本生之稱戊寅廷臣伏闕固爭下員外郎馬理等一百三十四人錦衣衛獄癸未杖馬理等於廷死者十有六人甲申奉安獻皇帝神主於觀德殿己丑毛紀致仕辛卯杖修撰楊慎檢討王元正給事中劉濟安磐張漢卿張原御史王時柯於廷原死慎等戍謫有差是月免南畿河南被災稅糧八月癸巳大同兵變殺巡撫都御史張文錦乙卯吏部侍郎賈詠為禮部尚書兼文淵閣大學士預機務九月丙寅定稱孝宗為皇伯考昭聖皇太后為皇伯母獻皇帝為皇考章聖皇太后為聖母丙子詔天下丙戌土魯番入寇圍肅州兵部尚書金獻民總制軍務署都督僉事杭雄充總兵官太監張忠提督軍務禦之冬十一月己卯戶部侍郎胡瓚提督宣大軍務都督魯綱充總兵官討大同叛卒十二月壬子甘涼寇退召金獻民還戊午起致仕大學士楊一清為兵部尚書總制陝西三邊軍務是年琉球入貢魯迷國貢獅子犀牛四年春正月丙寅西海卜兒孩犯甘肅總兵官姜奭擊敗之辛未大祀天地於南郊二月乙卯禁淹獄囚三月壬午仁壽宮災夏五月甲戌賜廬州知府龍誥官秩詔天下倣誥備荒振濟法庚辰作世廟祀獻皇帝八月戊子作仁壽宮冬十月丁亥作玉德殿景福安喜二宮十二月辛丑大禮集議成頒示天下閏月乙卯朔日有食之乙亥振遼東災是年天方入貢五年春正月乙未大祀天地於南郊二月甲寅命道士邵元節為真人庚辰免山西被災稅糧壬午振京師饑三月辛丑賜龔用卿等進士及第出身有差丁未定有司久任法夏五月庚子楊一清復入閣秋七月庚寅免四川被災稅糧八月丙寅振湖廣饑九月己亥章聖皇太后有事於世廟冬十月辛亥朔親享如太廟禮壬子振南畿浙江災免稅糧物料庚午頒御製敬一針於學宮是年暹羅入貢六年春正月癸未命羣臣陳民間利病己丑大祀天地於南郊二月辛亥小王子犯宣府參將王經戰死癸亥費宏石珤致仕庚午召謝遷復入閣三月庚辰寇復犯宣府參將關山戰死甲午禮部侍郎翟鑾為吏部侍郎兼翰林學士入閣預機務夏四月己巳免廣西被災稅糧五月丁丑朔日有食之丁亥前南京兵部尚書王守仁兼左都御史總制兩廣江西湖廣軍務討田州叛蠻秋八月庚戌以議李福達獄下刑部尚書顏頤壽左都御史聶賢大理寺卿湯沐等於錦衣衛獄侍郎桂萼張璁少詹事方獻夫署三法司雜治之總制尚書王憲擊敗小王子於石臼墩癸亥賈詠致仕庚午振湖廣水災九月己卯免江西河南山西被災秋糧壬午頒欽明大獄録於天下冬十月戊申兵部侍郎張璁為禮部尚書兼文淵閣大學士預機務是年魯迷入貢七年春正月癸未考核天下巡撫官丙戌大祀天地於南郊三月戊寅謝遷致仕癸巳右都御史伍文定為兵部尚書提督軍務侍郎梁材督理糧儲討雲南叛蠻夏四月甲寅甘露降告於郊廟六月辛丑明倫大典成頒示天下癸卯定議禮諸臣罪追削楊廷和等籍丁卯雲南蠻平秋七月己卯追尊孝惠皇太后為太皇太后恭穆獻皇帝為恭睿淵仁寬穆純聖獻皇帝辛巳尊章聖皇太后為章聖慈仁皇太后戊子詔天下八月壬子免河南被災稅糧九月甲戌王守仁討廣西蠻悉平之壬午振嘉興湖州災冬十月丁未皇后崩十一月丙寅立順妃張氏為皇后十二月丙子小王子犯大同指揮趙源戰死是年琉球入貢八年春正月己亥振山西災庚戌大祀天地於南郊二月癸酉吏部尚書桂萼兼武英殿大學士預機務丁丑振襄陽饑甲申旱躬禱於南郊乙酉禱於社稷三月丙申葬悼靈皇后戊戌振河南饑甲寅賜羅洪先等進士及第出身有差秋七月甲午以議獄不當下郎中魏應召等於獄右都御史熊浹削籍八月丙子張璁桂萼罷壬午始親祭山川著為令九月癸巳召張璁復入閣癸丑楊一清罷是月免兩畿河南被災稅糧振江西湖廣饑冬十月癸亥朔日有食之己巳除外戚世封著為令十一月庚子召桂萼復入閣甲辰振浙江災戊申禱雪己酉雪丁巳親詣郊壇告謝百官表賀是年天方撒馬兒罕土魯番入貢九年春正月丁酉大祀天地於南郊丙午作先蠶壇於北郊丁巳振山西饑二月戊辰耕藉田乙亥振京師饑丁丑禁官民服舍器用踰制三月丁巳皇后親蠶於北郊夏四月丙戌振延綏饑五月己亥更建四郊六月癸亥立曲阜孔顏孟三氏學秋八月壬午免江西被災稅糧九月壬辰罷雲南鎮守中官乙未免南畿被災秋糧冬十一月辛丑更正孔廟祀典定孔子諡號曰至聖先師孔子己酉祀昊天上帝於南郊禮成大赦是年琉球入貢十年春正月辛卯祈穀於大祀殿奉太祖太宗配甲午更定廟祀奉德祖於祧廟乙巳桂萼致仕二月甲戌免廬鳳淮揚被災秋糧壬申賜張璁名孚敬三月戊申罷四川分守中官夏四月丁巳皇后親蠶於西苑甲子禘於太廟五月壬子祀皇地祇於方澤閏六月己丑罷浙江湖廣福建兩廣及獨石萬全永寧鎮守中官秋七月癸丑侍郎葉相振陝西饑戊午張孚敬罷辛巳鄭王厚烷獻白雀薦之宗廟八月辛丑改安陸州曰承天府九月乙丑西苑宮殿成設成祖位致祭宴羣臣丙寅禮部尚書李時兼文淵閣大學士預機務壬申幸西苑御無逸殿命李時翟鑾進講宴儒臣於豳風亭冬十一月甲寅祀天於南郊戊辰免陝西被災秋糧丁丑召張孚敬復入閣十二月戊子御史喻希禮石金因修醮請宥議禮諸臣罪下錦衣衛獄十一年春正月辛未祈穀於圜丘始命武定侯郭勛攝事二月戊戌免湖廣被災稅糧三月戊辰賜林大欽等進士及第出身有差夏四月辛卯續封常遇春李文忠鄧愈湯和後為侯五月丙子前吏部尚書方獻夫兼武英殿大學士預機務六月壬午免畿內被災秋糧甲申續封劉基後誠意伯秋七月戊辰免南畿被災夏稅八月戊子以星變敕羣臣修省辛丑張孚敬罷九月丁巳振陝西饑冬十月甲申編修楊名以災異陳言下獄謫戍是月免山東被災稅糧振山西饑十一月甲寅四川巡撫都御史宋滄獻白兔羣臣表賀庚申祀天於南郊十二月己亥免畿內被災稅糧是年琉球哈密土魯番天方撒馬兒罕入貢十二年春正月丙午河南巡撫都御史吳山獻白鹿羣臣表賀自後諸瑞異表賀以為常丙辰召張孚敬復入閣是月免浙江河南被災稅糧二月乙酉振雲南饑三月丙辰釋奠於先師孔子秋八月乙未以皇子生詔赦天下九月庚戌廣東巢賊亂提督侍郎陶諧討平之冬十月乙亥大同兵亂殺總兵官李瑾代王奔宣府丙子下建昌侯張延齡於獄十一月己亥振遼東災癸丑翟鑾以憂去十二月己卯吉囊犯寧夏總兵官王效副總兵梁震擊敗之是年土魯番天方入貢十三年春正月癸卯廢皇后張氏壬子立德妃方氏為皇后二月己丑總督宣大侍郎張瓚撫定大同亂卒辛卯代王返國三月壬申振大同被兵者乙酉吉囊犯響水堡參將任傑擊敗之夏四月己酉方獻夫致仕六月甲子南京太廟災秋八月壬子寇犯花馬池梁震禦却之冬十一月庚午祀天於南郊是年琉球入貢十四年春正月壬申罷督理倉場中官丙戌莊肅皇后崩二月己亥作九廟丁未禁冠服非制三月戊子葬孝靜皇后於康陵己丑遼東軍亂執都御史呂經夏四月甲午張孚敬致仕召費宏復入閣丙申賜韓應龍等進士及第出身有差丙午廣寧兵亂六月吉囊犯大同總兵官魯綱禦却之秋七月甲申廣寧亂卒平八月乙巳詔九卿會推巡撫官著為令冬十月戊申費宏卒十一月乙亥祀天於南郊是年烏斯藏入貢十五年春二月癸巳振湖廣災三月丙子奉章聖皇太后如天壽山謁陵免昌平今年稅糧三之二賜高年粟帛癸未謁恭讓章皇后景皇帝陵是日還宮夏四月癸巳詔建山陵癸卯詣七陵祭告癸丑還宮是月吉囊犯甘涼總兵官姜奭擊敗之秋九月庚午如天壽山丁丑還宮是秋吉囊犯延綏官軍四戰皆敗之冬十月己亥更定世廟為獻皇帝廟戊申如天壽山壬子還宮十一月戊午以皇長子生詔赦天下辛巳祀天於南郊十二月辛卯九廟成閏月癸亥以定廟制加上兩宮皇太后徽號詔赦天下乙丑禮部尚書夏言兼武英殿大學士預機務丙寅享九廟是年免山西山東被災稅糧琉球烏斯藏入貢十六年春二月壬子安南黎寧遣使告莫登庸之難癸酉如天壽山三月甲申還宮丙午幸大峪山視壽陵夏四月癸丑還宮六月癸酉吉囊寇宣府指揮趙鏜戰死秋八月復寇宣府殺參將張國輔冬十一月故昌國公張鶴齡下獄瘐死是年土魯番天方撒馬兒罕入貢十七年春二月戊辰如天壽山壬申還宮三月壬辰賜茅瓚等進士及第出身有差辛丑咸寧侯仇鸞為征夷副將軍充總兵官兵部尚書毛伯溫參贊軍務討安南莫登庸夏四月庚戌如天壽山甲寅還宮戊午罷安南師甲子禱雨於郊壇戊辰雨六月寇犯宣府都指揮周冕戰死丙辰定明堂大饗禮下戶部侍郎唐胄於獄秋七月辛卯開河南雲南銀礦癸巳慈寧宮成八月甲辰吉囊犯河西總督都御史劉天和禦却之丙辰禮部尚書掌詹事府事顧鼎臣兼文淵閣大學士預機務九月戊寅免畿內被災稅糧辛巳上太宗廟號成祖獻皇帝廟號睿宗遂奉睿宗神主祔太廟躋武宗上辛卯大享上帝於玄極寶殿奉睿宗配乙未如天壽山丁酉還宮冬十一月辛未朔詣南郊上皇天上帝號還詣太廟上太祖高皇帝高皇后尊號辛卯祀天於南郊詔赦天下乙未免江西被災稅糧十二月癸卯章聖皇太后崩壬子如大峪山相視山陵甲寅還宮乙卯李時卒戊午振寧夏災是年琉球土魯番入貢十八年春二月庚子朔立皇子載壑為皇太子封載垕為裕王載圳景王辛丑詔赦天下起黃綰為禮部尚書宣諭安南壬寅起翟鑾為兵部尚書兼右都御史充行邊使丁未祈穀於玄極寶殿先賢曾子裔孫質粹為翰林院世襲五經博士壬子振遼東饑癸丑安南莫方瀛請降乙卯幸承天太子監國辛酉次真定望於北獄丁卯次衛輝行宮火三月己巳渡河祭大河之神辛未次鈞州望於中嶽甲戌免畿內被災稅糧庚辰至承天辛巳謁顯陵甲申享上帝於龍飛殿奉睿宗配秩於國社國稷遍羣祀戊子御龍飛殿受賀詔赦天下給復承天三年免湖廣明年田賦五之二畿內河南三之一夏四月壬子至自承天壬戌免湖廣被災稅糧甲子幸大峪山丙寅還宮秋閏七月庚申葬獻皇后於顯陵辛酉復命仇鸞毛伯溫征安南九月辛酉如天壽山侍郎王杲振河南饑冬十月丙寅還宮十一月丙申祀天於南郊是年日本哈密入貢十九年春正月丙午召翟鑾復入閣辛亥吉囊寇大同殺指揮周岐三月戊戌詔修仁壽宮夏六月辛巳瓦剌部長發塞秋七月癸卯吉囊入萬全右衛總兵官白爵逆戰於宣平敗之壬子又敗之於桑乾河戊午振江西災八月丁丑太僕卿楊最諫服丹藥豫杖死九月吉囊犯固原周尚文敗之於黑水苑延綏總兵官任傑追擊於鐵柱泉又敗之己酉召仇鸞還冬十月庚申罷礦場甲子顧鼎臣卒十一月丙辰慈慶宮成是年琉球日本入貢二十年春正月免南畿被災稅糧二月乙丑顯陵成給復承天三年丙寅御史楊爵言時政下錦衣衛獄三月乙巳賜沈坤等進士及第出身有差是春吉囊寇蘭州參將鄭東戰死夏四月己未莫登庸納發改安南國為安南都統使司以登庸為都統使辛酉九廟災燬成祖仁宗主丙子詔行寬恤之政五月戊子採木於湖廣四川甲寅振遼東饑六月振畿內山西饑秋七月丁酉俺答阿不孩遣使發塞求貢詔却之是月免河南陝西山東被災稅糧八月辛酉昭聖皇太后崩庚辰夏言罷是月俺答阿不孩吉囊分道入寇總兵官趙卿帥京營兵都御史翟鵬理軍務禦之九月乙未翊國公郭勛有罪下獄死辛亥俺答犯山西入石州冬十月癸丑振山西被寇者復徭役二年丁卯召夏言復入閣十一月辛卯葬敬皇后於泰陵丙申免四川被災稅糧是年琉球入貢二十一年夏四月庚申大高玄殿成閏五月戊辰俺答阿不孩遣使發大同塞巡撫都御史龍大有誘殺之六月辛卯俺答寇朔州壬寅入雁門關丁未犯太原秋七月己酉朔日有食之夏言罷己未俺答寇潞安掠沁汾襄垣長子參將張世忠戰死八月辛巳募兵於直隸山東河南壬午振山西被兵州縣免田租癸巳禮部尚書嚴嵩兼武英殿大學士預機務九月癸亥員外郎劉魁諫營雷殿豫杖下獄冬十月丁酉宮人謀逆伏誅磔端妃曹氏寧嬪王氏於市是年免畿內陝西河南福建被災稅糧安南入貢
