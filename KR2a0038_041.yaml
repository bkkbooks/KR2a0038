body:
  text: 明史卷四十一志第十七地理二山東山西山東禹貢青兗二州地元直隸中書省又分置山東東西道宣慰司治益都路屬焉洪武元年四月置山東等處行中書省治濟南府三年十二月置青州都衛治青州府八年十月改都衛為山東都指揮使司九年六月改行中書省為承宣布政使司領府六屬州十五縣八十九為里六千四百有奇南至郯城與南直界北至無棣與北直界西至定陶與北直河南界東至海距南京一千八百五十里京師九百里洪武二十六年編戶七十五萬三千八百九十四口五百二十五萬五千八百七十六弘治四年戶七十七萬五百五十五口六百七十五萬九千六百七十五萬曆六年戶一百三十七萬二千二百六口五百六十六萬四千九十九濟南府元濟南路屬山東東西道宣慰司太祖吳元年為府領州四縣二十六歷城倚天順元年建德王府南有歷山東有華不注山有大清河在西北即濟水故道自壽張縣流經縣界東北至利津入海又小清河即濟之南源一名濼水出城西趵突泉經城北下流至樂安縣入海又大明湖在城內又東北有堰頭鎮巡檢司章丘府東東有長白山又有黌山南有東陵山又有長城嶺又小清河在北又東有淯河一名繡江合諸泉西北匯為白雲湖下流入小清河鄒平府東北西南有長白山接章丘長山二縣界北有小清河淄川府東元般陽路治此屬山東東西道宣慰司太祖吳元年改路為淄川州縣仍為附郭二年七月州廢來屬西南有夾谷山南有原山與萊蕪縣界其山陰淄水出焉又西有孝婦河自益都縣流入合瀧萌般諸水下流入小清河長山府東北元屬般陽路洪武二年七月來屬西南有長白山西北有小清河南有孝婦河新城府東北元屬般陽路洪武二年七月來屬七年十二月省入長山高苑二縣後復置北有小清河西北有孝婦河東有烏河其上流即時水下流至高苑縣入小清河齊河府西元屬德州洪武二年七月改屬府有大清河齊東府東元屬河間路洪武初來屬北有大清河東有減水河成化元年開濬泄小清河漲溢入大清河濟陽府北南有大清河禹城府西北元屬曹州洪武二十年來屬西有漯水枯河俗名土河臨邑府北元屬河間路洪武初來屬西北有盤河長清府西南元屬泰安州洪武二年七月改屬府東南有青崖山隔馬山方山西南有大清河又有沙河自縣南流入焉亦曰沙溝河又東南有石都寨巡檢司肥城府西南元屬濟寧路洪武二年七月來屬西北有巫山一名孝堂山肥水出焉西流入大清河青城府東北元屬河間路洪武二年省入鄒平齊東二縣十三年十一月復置來屬北有大清河北有大石關舊置巡檢司後廢陵府西北元德州治安德縣直隸中書省洪武元年省安德縣入州七年七月移州於故陵縣十三年十一月置陵縣於此東有德河下流西入衛河泰安州元直隸中書省洪武初來屬以州治奉符縣省入北有泰山即岱宗也亦曰東嶽汶水出焉下流至汶上縣合大清河又東南有徂徠山南有梁父山又城西有泰安巡檢司北距府百八十里領縣二新泰州東南西北有宮山本名新甫西南有龜山東北有小汶河西流合汶水又西有上四莊巡檢司萊蕪州東洪武初改屬濟南府二年仍來屬東北有原山其山陽汶水別源出焉又西南有冠山西北有韶山諸山多産銅鐵錫德州元陵州屬河間路洪武元年降為陵縣屬濟寧府二年七月改屬德州七年七月省陵縣移德州治焉西有衛河東南有故篤馬河俗名土河東南距府二百八十里領縣二德平州東東北有般河亦曰盤河或以為古鈎盤也平原州東南武定州元棣州治厭次縣屬濟南路洪武初州縣俱廢六年六月復置州改名樂安宣德元年八月改為武定州永樂十五年漢王府遷於此宣德元年除南有大清河又有土河又有商河東南有清河巡檢司西南距府二百四十里領縣四陽信州北元屬棣州東有商河海豐州東北洪武六年六月析樂安州南地置屬濱州後來屬東北濱海又北有鬲津河又有無棣縣元屬棣州洪武初省東北有大沽河口巡檢司樂陵州西北舊治在縣之咸平鎮屬滄州洪武元年改屬濟寧府二年移治富平鎮七月來屬南有般河及鬲津河又有土河西南又有商河西北有舊縣鎮巡檢司商河州西南南有商河濱州洪武初以州治渤海縣省入東北濱海産鹽南有大清河北有士傷河即鬲津別名也西南距府三百五十里領縣三利津州東東北濱海有永阜等鹽場東有大清河流入海又東北有豐國鎮巡檢司霑化州西北東北濱海有富國等鹽場又有久山鎮巡檢司蒲臺州南元屬般陽路洪武二年七月來屬東濱海北有大清河兗州府元兗州屬濟寧路洪武十八年升為兗州府領州四縣二十三東北距布政司三百五十里滋陽倚洪武三年四月建魯王府元曰嵫陽洪武初省入州十八年復置成化間改為滋陽泗水在東又有沂水自曲阜縣西流來合焉曲阜府東東南有尼山沂水所出又東有防山北有泗水又有洙水西南流入於沂水又北有孔林寧陽府北西北有汶水支流為洸水洸水者洙水也洸洙相入受通稱也俱西南入運河又東北有城堰即汶洸分流處也鄒府東南元屬滕州洪武二年七月改屬東南有嶧山亦曰邾嶧又曰鄒嶧東北有昌平山西南有鳧山又有泗河泗水府東東有陪尾山泗水出焉經縣北下流至南直清河縣入淮滕府東南元滕州治滕縣屬益都路洪武二年七月州廢縣屬濟寧府十八年來屬東南有桃山東北有連青山又西南有新運河北自南陽南至境山長一百九十四里嘉靖四十四年所開又薛水源自縣東高薛二山間西南流合漷水一名南沙河至沛縣入運又有北沙河在縣北西流經魚臺入招湖又南有沙溝集巡檢司嶧府東南元嶧州屬益都路洪武二年降為縣屬濟寧府後來屬東南有柱子山舊名葛嶧山氶水流其下又北有君山一名抱犢山西泇水所出東南流至三合村有東泇河自沂水來會焉又南合武河彭氶諸水注於泗謂之泇口萬曆中改為運道自夏鎮至直河口凡二百六十餘里避黃河之險者三百三十里又西北有鄒塢鎮巡檢司嘉靖中移於縣西拖梨溝又東南有臺莊巡檢司萬曆三十四年置金鄉府西南元屬濟寧路洪武十八年來屬金莎嶺在東大河在西南魚臺府西南元屬濟州洪武元年屬徐州二年七月屬濟寧府十八年來屬泗河在東即運道也北有菏水一名五丈溝東入泗又東有穀亭鎮嘉靖九年黃河決於此又南有塌場口洪武永樂間為運道所經單府西南元單州屬濟寧路洪武元年省州治單父縣入州二年七月乃降州為縣屬濟寧府十八年來屬舊城在南正德十四年五月因河決改遷南濱大河城武府西南元屬曹州洪武四年屬濟寧府十八年來屬縣城正德十四年五月因河決改遷南有故黃河即洪武間之運道也弘治後堙濟寧州元任城縣為濟州治至正八年罷濟州徙濟寧路治此太祖吳元年為濟寧府十八年降為州以州治任城縣省入南臨會通河西有馬腸湖又東南有魯橋鎮巡檢司東距府六十里領縣三嘉祥州東元屬單州洪武二年來屬南有塔山東有會通河北有故黃河一名塔章河即塌場口之上流也巨野州西北元為濟寧路治至正八年徙路治任城縣以縣屬焉南有高平山東有巨野澤元末為黃河所決遂涸東南有會通河西南有故黃河弘治後堙西有安興集巡檢司鄆城州西北西有灉水又有故黃河又有故濟水在西南東平州元東平路直隸中書省太祖吳元年為府七年十一月降為州屬濟寧府以州治須城縣省入十八年改屬北有瓠山東北有危山西南有安山亦曰安民山下有積水湖一名安山湖山南有安山鎮會通河所經也汶水在南西流入安山湖又西北有金線閘巡檢司東南距府百五十里領縣五汶上州東南西南有蜀山其下為蜀山湖又西為南旺湖其西北則馬踏河運道經其中而北出即會通河也又汶水在東北舊時西流入大清河永樂中開會通河堰汶水西南流悉入南旺湖東阿州西北故城在縣西南今治本故穀城縣也洪武八年徙於此南有碻磝山西有魚山會通河自西南而北經此始與大清河分流又西有馬頰河俗名小鹽河東流入大清河又張秋鎮在西南弘治二年河決於此七年十二月塞賜名安平鎮平陰州東北南有汶河西南有大清河又有滑口鎮巡檢司後廢陽穀州西北東有會通河又東有阿膠井壽張州西洪武三年省入須城陽穀二縣十三年十一月復置屬濟寧府後來屬東南有故城元時縣治在焉今治本王陵店洪武十三年徙置南有梁山濼即故大野澤下流東北有會通河又有沙灣弘治前黃河經此後堙西南有梁山集巡檢司曹州正統十年十二月以曹縣之黃河北舊土城置東有舊黃河洪武初引河入泗以通運處也永樂中亦嘗條濬南有灉河東南有菏澤流為菏水東北距府三百里領縣二曹州東南元曹州治濟陰縣直隸中書省洪武元年省濟陰縣入州二年州治自北徙於盤石鎮四年降為縣屬濟寧府正統十年十二月置州以縣屬焉西南有黃陵岡與河南儀封縣界弘治五年黃河決於此河遂在縣南東入單縣界至南直徐州合泗入淮又西有賈魯河嘉靖前猶為運道後廢東南有楚丘縣元屬曹州洪武初省又西北有安陵鎮巡檢司定陶州東南元屬曹州洪武元年屬濟寧府十年五月省入城武縣十三年十一月復置仍屬濟寧府正統十年十二月來屬西有黃河故道弘治前河經此至張秋之沙灣入會通河沂州元屬益都路後省州治臨沂縣入州洪武元年屬濟寧府五年屬濟南府七年十二月屬青州府十八年來屬弘治四年八月建涇王府嘉靖十六年除西有艾山東有沂水源自青州沂水縣南流至州境與枋水合下流入泗又有沭水流經南直安東縣為漣水入淮又西南有泇水亦曰東泇水下流合嶧縣之西泇水入運西南有羅藤鎮巡檢司西距府五百六十里領縣二郯城州東南洪武初置東有馬陵山又有羽山與南直贛榆縣界又沭水在東沂水在西西有磨山鎮巡檢司後廢費州西北西北有蒙山西南有大沫涸又有祊水東北有蒙陽水下流俱入於沂河西南有關陽鎮西北有毛陽鎮二巡檢司東昌府元東昌路直隸中書省洪武初為府領州三縣十五東距布政司二百九十里聊城倚城東有會通河西南有武水枯河即漯河也為會通河所截中堙堂邑府西東北有會通河西有舊黃河博平府東北洪武三年三月省尋復置西南有會通河東北有故黃河茌平府東北西有故黃河又西北有故馬頰河莘府西南北有弇山舊有泉湧出曰弇山泉清平府北元屬德州洪武元年屬恩州二年七月屬高唐州三年三月省尋復置改屬西有會通河西南有魏家灣巡檢司冠府西南元冠州直隸中書省洪武三年降為縣來屬西北有衛河又東有賈鎮堡東北有清水鎮堡俱嘉靖二十二年築臨清州元臨清縣屬濮州洪武二年七月改屬弘治二年升為州舊治在南洪武二年徙治臨清閘景泰元年又於閘東北三里築城徙治焉會通河在城南有衛河自西來會至天津直沽入海為北運河東南距府百二十里領縣二丘州西元直隸東昌路弘治二年改屬州東南有衛河又有漳河館陶州西南元屬濮州洪武二年七月屬東昌府三年三月省尋復置仍屬東昌府弘治二年改屬州西有衛河自元城縣流入又西南有漳河又西南有南館陶鎮巡檢司高唐州元直隸中書省洪武初以州治高唐縣省入來屬西有漯河溢涸無常又有馬頰河一名舊黃河西南距府百二十里領縣三恩州北元恩州直隸中書省洪武二年降為縣來屬西有故城今治本許官店洪武七年七月徙於此西北