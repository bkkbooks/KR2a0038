body:
  text: 明史卷一百七十二列傳第六十羅亨信侯璡楊寧王來孫原貞孫需張憲朱鑑楊信民張驥竺淵耿定王晟鄧顒馬謹程信白圭子鉞張瓚謝士元孔鏞李時敏鄧廷瓚王軾劉丙羅亨信字用實東莞人永樂二年進士改庶吉士授工科給事中出視浙江水災奏蠲三縣租進吏科右給事中坐纍謫交址為吏居九年仁宗嗣位始召入為御史核通州倉儲巡按畿內清軍山西皆有聲宣德中有薦其堪方面者命食按察僉事俸待遷英宗即位之三月擢右僉都御史練兵平涼西寧正統二年蔣貴討阿台朵兒只伯亨信參其軍務至魚兒海貴等以芻餉不繼留十日引還亨信讓之曰公等受國厚恩敢臨敵退縮耶死法孰與死敵貴不從亨信上章言貴逗遛狀帝以其章示監督尚書王驥等明年進兵大破之亨信以參贊功進秩一等父喪歸葬還朝改命巡撫宣府大同參將石亨請簡大同民三之一為軍亨信奏止之十年進右副都御史巡撫如故時遣官度二鎮軍田一軍八十畝外悉徵稅五升亨信言文皇帝時詔邊軍盡力墾田毋徵稅陛下復申命之今奈何忽為此舉塞上諸軍防邊勞苦無他生業惟事田作每歲自冬徂春迎送瓦剌使臣三月始得就田七月又復刈草八月以後修治關塞計一歲中曾無休暇況邊地磽瘠霜早收薄若更徵稅則民不復耕必致竄逸計臣但務積粟不知人心不固雖有粟將誰與守帝納其言而止初亨信嘗奏言也先專候釁端以圖入寇宜預於直北要害增置城衛為備不然恐貽大患兵部議寢不行及土木之變人情洶懼有議棄宣府城者官吏軍民紛然爭出亨信仗劍坐城下令曰出城者斬又誓諸將為朝廷死守人心始定也先挾上皇至城南傳命啓門亨信登城語曰奉命守城不敢擅啓也先逡巡引去赤城雕鶚懷來永寧保安諸守將棄城遁並按其罪當是時車駕既北寇騎日薄城下關門左右皆戰場亨信與總兵楊洪以孤城當其衝外禦強寇內屏京師洪既入衛又與朱謙共守勞績甚著著兜鍪處顛髮盡禿景帝即位進左副都御史明年年七十有四矣乞致仕許之歸八年卒於家侯璡字廷玉澤州人少慷慨有志節登宣德二年進士授行人烏撒烏蒙土官以爭地相讐殺詔遣璡及同官章聰諭解之正其疆理而還副侍郎章敞使交址關門卑前驅傴而入璡叱曰此狗竇耳奈何辱天使交人為毀關乃入及歸餽遺無所受遷兵部主事正統初從尚書柴車等出鐵門關禦阿台有功進郎中從王驥征麓川至金齒驥自統大軍擊思任發而遣璡援大侯州賊衆三萬至督都指揮馬讓盧鉞擊走之遂由高黎貢山兼程夜行會大軍壓其巢麓川平拜禮部右侍郎參贊雲南軍務詔與楊寧二年更代驥再征麓川璡以功遷左九年代還母憂起復尋調兵部十一年復代寧鎮雲南思機發竄孟養驥復南征璡與都督張軏分兵進抵金沙江破之鬼哭山璽書褒賚景泰初貴州苗韋同烈叛圍新添平越清平興隆諸衛命璡總督貴州軍務討之時副總兵田禮已解新添平越圍璡遂遣兵攻敗都盧水西諸賊貴州道始通又調雲南兵由烏撒會師開畢節諸路檄普安土兵援安南衛而自率師攻紫塘彌勒等十餘寨會賊復圍平越回師擊退之遂分哨七盤坡羊腸河楊老堡解清平圍東至重安江與驥兵會興隆抵鎮遠道皆通捷聞進兵部尚書進克賞改苗擒其渠王阿同等三十四人別賊阿趙偽稱趙王率衆掠清平璡復討擒之水西苗阿忽等六族皆自乞歸化詔璡隨方處置景泰元年八月以勞瘁卒於普定年五十三賜祭葬廕其子錦衣衛世襲千戶楊寧字彥謐歙人宣德五年進士授刑部主事機警多才能負時譽正統初從尚書魏源巡視宣大四年與都督吳亮征麓川賊款軍門約降寧曰兵未加而先降誘我也宜嚴兵待之不聽令寧督運金齒已而賊果大至官兵敗績諸將獲罪寧擢郎中復從王驥至騰衝破賊寧與太僕少卿李蕡督戰並有功師還寧超拜刑部右侍郎遭母憂奪情九年代侯璡參贊雲南軍務時麓川甫平寧以騰衝地要害與都督沐昂築城置衛設戍兵控諸蠻邊方遂定居二年召還閩浙盜起命寧鎮江西賊至輒擊敗之暇則詢民疾苦境內嚮服景泰初召拜禮部尚書偕胡濙理部事迤北可汗遣使入貢寧言宜留使數日宴勞賜豫視也先使倍厚彼性多猜二人必內搆邊患可緩帝務誠信不許其冬以足疾調南刑部七年為御史莊升所劾遣核未報寧力詆言官都察院再劾寧脅制言路詔免其罪録狀示之英宗復辟命致仕踰年卒寧有才而善交權貴嘗自前後戰功乞世廕子堣方一歲遂得新安衛副千戶王來字原之慈溪人宣德二年以會試乙榜授新建教諭寧王府以諸生充樂舞來請易以道士諸王府設樂舞生始此六年以薦擢御史出按蘇松常鎮四府命偕巡撫周忱考察屬吏敕有請自上裁語來言賊民吏去之惟恐不速必請而後行民困多矣帝為改敕賜之中官陳武以太后命使江南橫甚來數抑之武還訴於帝帝問都御史顧佐巡按誰也佐以來對帝歎息稱其賢曰識之及報命奬諭甚至英宗即位以楊士奇薦擢山西左參政言流民所在成家及招還故土每以失産復逃去乞請隨在附籍便又言郡縣官不以農業為務致民多遊惰催徵輒致已命朝廷憫其失業下詔蠲除而田日荒間租稅無出纍及良民宜擇守長賢者以課農為職其荒田令附近之家通力合作供租之外聽其均分原主復業則還之蠶桑可裨本業者聽其規畫仍令提學風憲官督之庶人知務本從之來居官廉練達政事侍郎于謙撫山西亟稱其才可置近侍而來執法嚴疾惡尤甚以公事仗死縣令不職者十人逮下獄當徒遇赦以原官調補廣東來自此始折節為和平而政亦修舉正統十三年遷河南左布政使明年改左副都御史巡撫河南及湖廣襄陽諸府也先逼京師來督兵勤王渡河聞寇退乃引還景泰元年貴州苗叛總督湖廣貴州軍務侯璡卒於軍進來右都御史代之與保定伯梁珤都督毛勝方瑛會兵進討至靖州賊掠長沙寶慶武岡來等分道邀擊俘斬三千餘人賊遁去已復出掠官軍連戰皆捷賊魁韋同烈據興隆劫平越清平諸衛來與方瑛擊敗之賊退保香爐山山陡絶勝瑛與都督陳友三道進來與珤大軍繼之先後破三百餘寨會師香爐山下發炮轟崖石聲動地賊懼縛同烈並賊將五十八人降餘悉解散遂移軍清平且檄四川兵共剿都勻草塘諸賊賊望風具牛酒迎降賊平班師詔留來珤鎮撫尋命來兼巡撫貴州奏言近因黔楚用兵暫行鬻爵之例今寇賊稍寧惟平越都勻等四衛乏餉宜召商中鹽罷納米例從之三年十月召還加兼大理寺卿珤以來功大乞加旌異都給事中蘇霖駁之乃止來還在道以貴州苗復反敕回師進討明年事平召為南京工部尚書英宗復辟六尚書悉罷來歸成化六年卒於家孫原貞名瑀以字行德興人永樂十三年進士授禮部主事歷郎中英宗初用薦擢河南右參政居官清慎有吏才正統八年大臣會薦遷浙江左布政使久之盜大起閩浙間赦而再叛景帝即位發兵討之原貞嘗策賊必叛上方略請為備至是即命原貞參議軍事深入擒其魁而溫州餘賊猶未滅命都指揮李信為都督僉事調軍討之遂拜原貞兵部左侍郎參信軍務鎮守浙江丁母憂當去副都御史軒輗請留之報可景泰元年原貞進兵搗賊巢俘斬賊首陶得二等招撫三千六百餘人追還被掠男女捷聞璽書奬勵請奔喪踰月還鎮復分兵剿平餘寇奏析瑞安地增置泰順析麗水青田二縣地置雲和宣平景寧四邑建官置戍盜患遂息論功進秩一等浙官田賦重右布政使楊瓚請均於民田輕額者詔原貞督之田賦以平三年請褒贈禦賊死事武臣指揮同知脫綱王瑛都指揮僉事沈轔崔源皆得贈恤六月進兵部尚書鎮守如故未幾命考察福建庶官因留鎮焉福州建寧二府舊有銀冶因寇亂罷朝議復開原貞執不可乃寢五年冬疏言四方屯軍率以營繕轉輸諸役妨耕作宜簡精鋭實伍餘悉歸之農苟增萬人屯即歲省支倉糧十二萬石且積餘糧六萬石兵食豈有不足哉今歲漕數百萬石道路費不資如浙江糧軍兌運米石加耗米七斗民自運米石加八斗其餘計水程遠近加耗是田不加多而賦斂實倍欲民無困不可得也況今太倉無十數年之積脫遇水旱其何以濟宜量入為出汰冗食浮費俟倉儲既裕漸減歲漕數而民困可蘇也臣昔官河南稽諸逃民籍凡二十餘萬戶悉轉徙南陽唐鄧襄樊間羣聚謀生安保其不為盜宜及今年豐遣近臣循行督有司籍為編戶給田業課農桑立社學鄉約義倉使敦本務業生計既定徐議賦役庶無他日患時不能盡用後劉千斤之亂果如原貞所料已復鎮浙江英宗復位罷歸成化十年卒年八十七原貞所至有勞績在浙江尤著名孫需字孚吉成化八年進士為常州府推官疑獄立剖擢南京御史劾僧繼曉忤旨豫杖出為四川副使弘治中纍官右副都御史巡撫河南歲凶募民築汴河堤堤成而飢者亦濟鎮守中官劉琅貪橫姦民赴琅訟者需以法論之遣戍琅為跪請執不聽琅恨次骨大臣子橫于鄉需抑之琅與謀改需撫陝西尋改撫鄖陽安輯流民占籍者九萬餘戶正德元年召為南京兵部右侍郎四年就拜禮部尚書未兩月劉瑾惡之追論撫河南時事罰米輸邊廷推需刑部尚書中旨令致仕瑾誅起南京工部尚書就改刑部再改吏部十三年乞休去嘉靖初卒諡清簡張憲字廷式與需同里同舉進士相代為尚書嘗為浙江右布政使後以工部右侍郎督易州山廠公帑無毫髮私歷南京禮部尚書劉瑾勒致仕瑾誅起工部卒朱鑑字用明晉江人童時刲股療父疾舉鄉試授蒲圻教諭宣德二年與廬陵知縣孔文英等四十三人以顧佐薦召於各道觀政三月遂擢御史巡按湖廣諭降梅花洞賊蕭啓寧等請復舊制同副使僉事按行所部問民疾苦湖湘俗男女婚嫁多踰三十鑑申明禮制其俗遂變三載代歸正統五年復按廣東奏設欽州守備都指揮奉命録囚多所平反招撫逋叛甚衆還朝請天下按察司增僉事一人專理屯田遂為定制七年用薦擢山西左參政奏減平陽採薪供邊夫役景帝監國進布政使尋擢右副都御史巡撫其地上言也先姦詭百端殺掠無已復假和親遣使覘伺以送駕為名覬得開關延接稍示抗拒彼即有辭其謀既深我慮宜遠宜暫罷中貴監軍之制假總兵以生殺權使志無所撓計有所施整散兵募勇士重懸賞格鼓勸義旅徵勤王兵數道並進戮力復讐庶大駕可還敵兵自退曩者江南寇發皆以誅王振為名夫事歸朝廷則治歸宦官則亂昔高皇帝與羣臣議事必屏去左右恐泄事機乞杜權幸之門凡軍國重事屬任大臣必當有濟景帝嘉納之時瓦剌窺塞下鑑日夜為守禦計景泰元年敵數萬騎攻雁門都指揮李端擊却之尋犯河曲及義井堡殺二指揮圍欣代諸州石亨等不能禦長驅抵太原城北山西大震命鑑移鎮雁門而別遣都督僉事王良鎮太原援兵漸集敵亦饜乃引去時山西仍遘兵荒鑑外飭戎備內撫災民勞瘁備至二年十月鎮守山西都御史羅通召還命鑑兼領其事明年詔遣大臣行天下黜陟有司禮部侍郎鄒幹至山西多所論劾鑑請召幹還幹因極論鑑徇護帝是幹言其年十月召鑑佐院事至京致仕去初景帝易儲鑑貽大學士陳循書言不可且曰陛下於上皇當避位以全大義循大駭英宗復位鑑詣闕上表賀帝曰鑑老疾何妄來其速令還家居二十餘年卒楊信民名誠以字行浙江新昌人鄉舉入國學宣德時除工科給事中母憂歸營葬土石必躬舁數百步曰吾葬吾母而專役他人吾不安也服闋改刑科正統中清軍江西還奏民隱五事多議行尋以王直薦擢廣東左參議清操絶俗嘗行田野訪利弊為更置性剛負氣按察使郭智不法信民劾之下獄黃翰代智信民復發其姦已又劾僉事韋廣廣遂訐信民因與翰俱被逮軍民譁然詣闕下乞留信民詔復信民官而翰廣鞫實除名景帝監國于謙薦之命守備白羊口會廣東賊黃蕭養圍廣州急嶺南人乞信民乃以為右僉都御史巡撫其地士民聞而相慶曰楊公來矣時廣州被圍久將士戰輒敗禁民出入樵采絶而鄉民避賊來者拒不納多為賊所害民益愁苦歸賊信民至開城門發倉廩刻木鍥給民得出入賊見木鍥曰此楊公所給也不敢傷避賊者悉收保民若更生信民益厲甲兵多方招撫降者日至乃使使持檄入賊營諭以恩信蕭養曰得楊公一言死不恨剋日請見信民單車詣之隔濠與語賊黨望見歡曰果楊公也爭羅拜有泣下者賊以大魚獻信民受之不疑蕭養且降而都督董興大軍至賊忽中變夜有大星隕城外七日而信民暴疾卒時景泰元年三月乙卯也軍民聚哭城中皆縞素賊聞之亦泣曰楊公死吾屬無歸路矣未幾興平賊所過村聚多殺掠民仰天號曰楊公在豈使吾曹至是訃聞賜葬祭録其子玖為國子生廣東民赴京請建祠許之成化中賜諡恭惠久之從選人盧從願請命有司歲以其忌日祭焉張驥字仲德安化人永樂中舉於鄉入國學宣德初授御史出按江西慮囚福建有仁廉聲正統八年吏部尚書王直等應詔博舉廷臣公廉有學行者驥與焉遷大理右寺丞巡撫山東先是濟南設撫民官專撫流民後反為民擾驥奏罷之俗遇旱輒伐新葬冢墓殘其肢體以為旱所由致名曰打旱骨樁以驥言禁絶還朝進右少卿已命巡視濟寧至淮揚飢民驥立法捕蝗停不急務蠲逋發廩民賴以濟十三年冬巡撫浙江初慶元人葉宗留與麗水陳鑑胡聚衆盜福建寶豐諸銀礦已而羣盜自相殺遂為亂九年七月福建參議竺淵往捕被執死宗留僭稱王時福建鄧茂七亦聚衆反勢甚張宗留鑑胡附之流剽浙江江西福建境上參議耿定僉事王晟及都督僉事陳榮指揮劉真都指揮吳剛龔禮永豐知縣鄧顒前後敗歿遂昌賊蘇牙俞伯通剽蘭溪又與相應遠近震動驥至遣金華知府石瑁擊斬牙等撫定其餘黨而鑑胡方以爭忿殺宗留專其衆自稱大王國號太平建元泰定偽署將帥圍處州分掠武義松陽龍泉永康義烏東陽浦江諸縣未幾茂七死鑑胡勢孤驥命麗水丞丁寧率老人王世昌等齎榜入賊巢招之鑑胡遂偕其黨出降惟陶得二不就撫殺使者入山為亂如故時十四年四月也驥既招降鑑胡而別賊蘇記養等掠金華亦為官軍所獲賊勢乃益衰其秋景帝嗣位召驥還卒於道驥所至咸有建樹山東兩浙民久而思之鑑胡至京帝宥不誅更遇赦釋充留守衛軍也先入犯鑑胡乘間亡被獲伏誅竺淵奉化人耿定和州人王晟鄆城人鄧顒樂昌人俱進士顒兵潰被執不屈死詔為營葬淵等贈官録一子馬謹字守禮新樂人宣德二年進士事父母孝遭喪親負土以葬正統中以御史按浙江時修備倭海船徵材于嚴衢諸郡謹恐軍士藉勢肆斬伐請禁飭之報可所至貪猾屏迹疏振台處寧紹四府飢吏部驗封郎中缺人久帝令推擇會謹九載滿尚書郭璡薦謹廉直遂用之十年薦擢湖廣右布政使正統末湖南叛苗掠靖州命謹同御史侯爵撫諭參將張善率兵繼之謹等至招數千人復業其出掠者擊敗之尋與善破淇溪諸寨景泰初復與善大破臘婆諸洞已同參將李震擊破青龍渡馬楊山諸賊追奔至雞心嶺先後斬首千四百有奇師還靖州賊復出掠搗其巢斬獲如前武岡城溪諸賊結廣西蠻據青肺山復與震攻破之獲賊楊光拳等五百六十人斬首倍之扶城諸寨聞風發附謹出入行間三歲衝冒鋒鏑與諸將同而運籌轉餉功尤多轉左布政使録功進秩一等六年五月遷右副都御史仍支二品俸巡撫河南撫流民三萬一千餘戶天順初廢巡撫官謹亦罷歸久之卒謹性廉介楊士奇嘗稱為冰霜鐵石程信字彥實其先休寧人洪武中戍河間因家焉信舉正統七年進士授吏科給事中景帝即位薦起薛瑄等三人也先犯京師信督軍守西城上言五事都督孫鏜擊也先失利欲入城信不納督軍從城上發箭炮助之鏜戰益力也先遂却景泰元年請振畿輔飢民復河間學官生徒因用兵罷遣者皆報可進左給事中以天變上中興固本十事其言敬天則請帝敦孝友之實以答天心帝嘉納之明年二月出為山東右參政督餉遼東巡撫寇深奏盜糧一石以上者死又置新斛視舊加大屬信鈎考信立碎之曰奈何納人於死深由是不悅信尋以憂去服闋起四川參政理松潘餉偕侍郎羅綺破黑虎諸寨天順元年信入賀時方録景泰間進言者特擢信太僕卿京衛馬舊多耗信定期徵之三營大將石亨孫鏜曹欽並以奪門功有寵庇諸武臣為言太僕苛急請改隸兵部信言高皇帝令太僕馬數勿使人知若隸兵部馬登耗太僕不得聞脫有警馬不給誰任其咎帝是之乃隸太僕如故明年改左僉都御史巡撫遼東都指揮夏霖恣不法僉事胡鼎發其四十罪信以聞下霖錦衣獄門達言信不當代奏帝責令陳狀時寇深方掌都察院修前郤劾信徵下詔獄降南京太僕少卿五年召為刑部右侍郎母憂歸成化元年起兵部尋轉左四川戎縣山都掌蠻數叛陷合江等九縣廷議發大軍討之以襄城伯李瑾充總兵官太監劉為監督進信尚書提督軍務至永寧分道進都督芮成由戎縣巡撫貴州都御史陳宜參將吳經由芒部都指揮崔旻由普市冰腦南寧伯毛榮由李子關巡撫四川都御史汪浩參將宰用由渡船鋪左右遊擊將軍羅秉忠穆義由金鵝池而信與瑾居中節制轉戰六日破龍背豹尾諸寨七百五十餘明年至大壩焚寨千四百五十前後斬首四千五百有奇俘獲無算按諸九姓不奉化者遷瀘州衛於渡船鋪增置關堡改大壩為太平川長官司分山都掌地設官建治控制之帝降璽書嘉勞録功進兼大理寺卿與白圭同涖兵部言官劾信上首功不實信四疏乞休不許信欲有為而阻於圭不自得數稱疾六年春旱應詔言兵事宜更張者四兵弊宜申理者五大略言延綏兩廣歲遭劫掠宜擇大臣總制四方流民多聚荊襄宜早區畫京軍操練無法功次升賞未當語多侵圭圭奏寢之改南京兵部參贊機務明年致仕踰年卒贈太子少保諡襄毅信有才力識大體征南蠻時制許便宜從事迄班師未嘗擅賞戮一人曰刑賞人主大柄也不得已而假之人幸而事集輒自專非人臣所宜在南京守備臣欲預錢穀訟獄事信曰守備重臣所以謹非常也若此乃有司職耳論者韙之子敏政見文苑傳白圭字宗玉南宮人正統七年進士除御史監朱勇軍討兀良哈有功巡按山西辨疑獄百餘從車駕北征陷土木脫還景帝命往澤州募兵尋遷陝西按察副使擢浙江右布政使福建賊鄭懷冒流剽處州協諸將平之天順二年貴州東苗干把豬等僭號攻劫都勻諸處詔進右副都御史贊南和侯方瑛軍往討圭以谷種諸夷為東苗羽翼先剿破百四十七寨遂會兵青崖復破四百七十餘寨乘勝攻六美山干把豬就擒諸苗震讋湖廣災就命圭巡撫四年召為兵部右侍郎明年孛來寇莊浪圭與都御史王竑贊都督馮宗軍務分兵巡邊圭敗之固原州七年進工部尚書成化元年荊襄賊劉千斤等作亂敕撫寧伯朱永為總兵官都督喜信鮑政為左右參將中官唐慎林貴奉監之而以圭提督軍務發京軍及諸道兵會討千斤名通河南西華人縣門石狻猊重千斤通隻手舉之因以為號正統中流民聚荊襄間通竄入為妖言潛謀倡亂石龍者號石和尚聚衆剽掠通與共起兵偽稱漢王建元德勝流民從者四萬人圭等至南漳賊迎戰敗之乘勝逼其巢通奔壽陽謀走陝西圭遣兵扼其道通乃退保大市與苗龍合官軍又破之雁坪斬通子聰及其黨苗虎等賊退保後巖山據險下木石如雨諸軍四面攻圭往來督戰士皆蟻附登賊大敗擒通及其衆三千五百餘人獲賊子女萬一千有奇焚其廬舍夷險阻而還石龍與其黨劉長子等逸去轉掠四川連陷巫山大昌圭等分兵蹙之長子縛龍以降餘寇悉平録功加圭太子少保增俸一級遭父憂葬畢視事三年改兵部尚書兼督十二團營六年阿羅出等駐牧河套陝西數被寇圭言鎮巡官偷肆宜治延綏巡撫王鋭鎮守太監秦剛總兵官房能俱獲罪去圭乃議大舉搜河套發京兵及他鎮兵十萬屯延綏而以輸餉責河南山西陝西民不給則預徵明年賦於是內地騷然而前後所遣三大將朱永趙輔劉聚皆畏怯不任戰卒以無功十年卒官年五十六贈少傅諡恭敏圭性簡重公退即閉閣臥請謁皆不得通在貴州時有憤中官虐而欲刺之者誤入圭所圭擁衾問之其人驚曰乃吾公耶即自刎不殊仆於地圭呼燭起視傅以善藥遣之人服其量次子鉞字秉德進士及第授編修纍官太子少保禮部尚書習典故以詞翰稱卒贈太子太保諡文裕張瓚字宗器孝感人正統十三年進士授工部主事遷郎中歷知太原寧波二府有善政成化初市舶中官福住貪恣瓚禁戢其下住誣瓚於朝瓚遂列住罪住被責其黨多抵法大臣會薦遷廣東參政轉浙江左布政使十年冬以右副都御史巡撫四川播州致仕宣慰楊輝言所屬夭壩干灣溪諸寨及重安長官司為生苗竊據請王師進討詔瓚諭還侵地不服則征之瓚率兵討定請設安寧宣撫司即授輝子友為宣撫以鎮詔可賜敕奬勞以母老乞歸母已卒會松茂番寇邊詔起復視事先是僉事林璧言松茂曩為大鎮都御史寇深侍郎羅綺嘗假便宜專制其地故有功今惟設兩參將以副使居中調度事權輕臨敵稟令制府千里請戰謀泄機緩未有能獲利者宜別置重臣彈壓或即命瓚兼領專其責成十二年七月命瓚兼督松茂安綿建昌軍務瓚至軍審度形勢改大壩舊設副使於安綿而令副總兵堯彧軍松潘參將孫皓軍威疊為夾攻計乘間修河西舊路作浮梁治月城茂州疊溪所過降附抵曲山三寨攻破之再討平白草壩餘寇先後破滅五十二寨賊魁撒哈等皆殲他一百五寨悉獻馬納款諸番盡平留兵戍要害增置墩堡乃班師帝嘉其功徵拜戶部左侍郎辭歸終制十五年起左副都御史總督漕運兼巡撫江北諸府十八年歲大祲疏請振濟發銀五萬兩復敕瓚移淮安倉糧分振而瓚已卒瓚功名著西蜀其後撫蜀者如謝士元輩雖有名不及瓚惟夭壩干之役或言楊輝溺愛庶長子友欲官之詐言生苗為亂瓚信而興師其功不無矯飾云謝士元字仲仁長樂人景泰五年進士授戶部主事督通州倉陳四弊屢與監倉宦官忤天順七年擢建昌知府地多盜為軍將所庇士元以他事持軍將姦發輒得民懷券訟田宅士元叱曰偽也券今式而所訟乃二十年事民驚服訟為衰止考滿進從三品俸治府事如故以憂去服闋起知廣信永豐有銀礦處州民盜發之聚數千人將士憚其驍彍不敢剿士元勒兵趨之賊遮刺士元傷左股裹創力戰獲其魁塞礦穴而還入覲改永平遭喪不赴服闋擢四川右參政進右布政使弘治元年就擢右副都御史巡撫其地土番大小娃者將煽亂士元託行邊馳詣其地賊恐羅拜道左徐慰遣之歲大祲流民趨就食士元振恤有方全活者數萬明年坐事下獄事白遂致仕孔鏞字韶文長洲人景泰五年進士知都昌縣分戶九等以定役設倉水次便收斂民甚賴之以弟銘尚寧府郡主改知連山瑤僮出沒鄰境縣民悉竄鏞往招之民驚走鏞炊飯民舍留錢償其直以去民乃漸知親鏞相率還鏞慰勞振恤俾復故業教以戰守道路漸通縣治遂復都御史葉盛征廣西以鏞從諸將妄殺者鏞輒力爭所全活甚衆成化元年用葉盛等薦擢高州試知府前知府劉海以瑤警閉城門自護鄉民避瑤至者輒不納還為瑤所戕又疑民陰附賊輒戮之賊緣是激衆怒為內應城遂陷鏞至開門納來者流亡日歸城不能容別築城東北居之附郭多暴骸民以疫死復為義冢瘞焉時賊屯境內者凡十餘部而其魁馮曉屯化州鄧公長屯茅洞屢招不就鏞一日單騎從二人直抵茅洞洞去城十里許道遇賊徒令還告曰我新太守也公長驟聞新守至亟呼其黨擐甲迎及見鏞坦易無騶從氣大沮鏞徐下馬入坐庭中公長率其徒弛甲羅拜鏞諭曰汝曹故良民迫凍餒耳前守欲兵汝吾今奉命為汝父母汝我子也信我則送我歸賚汝粟帛不信則殺我即大軍至無遺種矣公長猶豫其黨皆感悟泣下鏞曰餒矣當食我公長為跪上酒饌既食曰日且暮當止宿夜解衣酣寢賊相顧駭服再宿而返見道旁裸而懸樹上者纍纍詢之皆諸生也命盡釋之公長遣數十騎擁還城中人望見皆大驚謂知府被執來紿降也盡登陴鏞止騎城外獨與羸卒入取穀帛使載歸公長益感激遂焚其巢率黨數千人來降公長既降諸賊次第納款惟曉恃險不服鏞選壯士二百人乘夜抵化州曉倉皇走匿獲其妻子以歸撫恤甚厚曉亦以五百人降已與僉事陶魯敗賊廖婆保他賊先後來犯多敗去境內大定上官交薦擢按察副使分巡高雷二府益招劇賊梁定侯大六鄧辛酉等給田産分處內地為官備他盜廣西賊犯信宜岑溪皆擊敗之治績聞賜誥命旌異遭喪服除改廣西瑤僮聞鏞至悉遠遁十四年兵部上其功賚銀幣尋進按察使荔浦賊來寇總督朱英以兵屬鏞擊平之進食二品祿已遷左布政使旋以右副都御史巡撫貴州清平部苗阿溪者桀驁多智其養子阿賴尤有力橫行諸部中守臣皆納溪賂驕不可制鏞行部至清平詢得溪所昵者二人遂以計擒溪磔之並討平雞背苗郡蠻震懾鏞居官廉歷仕三十餘年皆在邊陲觸瘴成疾乞骸骨不許弘治二年召為工部右侍郎道卒年六十三平樂李時敏者為信宜知縣嘗與鏞共平瑤亂有功遷知化州粵人以孔李並稱鄧廷瓚字宗器巴陵人景泰五年進士知淳安縣有惠政丁母憂服除遷太僕寺丞貴州新設程番府地在萬山中蠻僚雜居吏部難其人特擢廷瓚為知府至則悉心規畫城郭衢巷學校壇廟廨舍以次興建榜諭諸僚受約束政平令和巡撫陳儼上其治行帝令久任九載秩滿始遷山東左參政尋進右布政使弘治二年以右副都御史巡撫貴州廷瓚自令至守淹常調者踰三十年至是去知府止三歲遂得開府以生母憂歸服闋還原任都勻苗乜富架長腳等作亂敕廷瓚提督軍務同湖廣總兵官顧溥貴州總兵官王通等討之副使吳倬遣熟苗詐降富架誘令入寇伏兵擒其父子官軍乘勝連破百餘宀生繫長腳以歸群蠻震懾廷瓚言都勻清平舊設二衛九長官司其人皆世祿自用其法恣虐激變苗民亂四十餘年今元凶就除非大更張不可請改為府縣設流官與土官兼治庶可久安因上善後十一事帝悉從之遂設府一曰都勻州二曰獨山麻哈縣一曰清平苗患自此漸戢論功進右都御史八年召掌南京都察院事甫數月命提督兩廣軍務兼巡撫越二年進左廷瓚治尚簡易於吏事但總大綱結羣蠻以恩信不輕用兵而兵出必成功鬱林雲罏大桂諸蠻及四會飢民作亂以次討平兩廣遂無事十三年復召掌南院未行卒贈太子少保諡襄敏廷瓚有雅量待人不疑時多稱其長者至所設施動中機宜其在貴州平苗功為尤偉云王軾字用敬公安人天順八年進士授大理右評事遷右寺正録囚四川平反百餘人擢四川副使歲凶請官銀十萬兩為糴費以按嘉定同知盛崇仁贓罪被訐下吏事白還職改陝西弘治初擢四川按察使三年遷南京右僉都御史提督操江八年進右副都御史總理南京糧儲旋命巡撫貴州明年入為大理卿詔與刑部裁定條例頒天下十三年拜南京戶部尚書尋命兼左副都御史督貴州軍務討普安賊婦米魯時鎮守中官楊友總兵官曹愷巡撫錢鉞共發兵討魯大敗於阿馬坡都指揮吳遠被執普安幾陷友等請濟師乃以命軾軾未至而友等遣人招賊賊揚言欲降益擁衆攻圍普安安南衛城斷盤江道勢愈熾又乘間劫執友右布政使閭鉦按察使劉福都指揮李宗武郭仁史韜李雄吳達等死焉軾至以便宜調廣西湖廣雲南四川官軍土兵八萬人合貴州兵分八道進使致仕都督王通將一軍十五年正月參將趙晟破六墜寨賊遁過盤江都指揮張泰等渡江追擊指揮劉懷等遂進解安南衛圍而愷通及都指揮李政亦各破賊寨賊還攻平夷衛及大河扼勒諸堡都御史陳金以雲南兵禦之賊遁歸馬尾籠寨官軍聚攻益急土官鳳英等格殺米魯餘黨遂平用兵凡五月破賊寨千餘斬首四千八百有奇俘獲一千二百捷聞帝大喜嘉勞召還京賜賚有加録功加太子少保已改南京兵部參贊機務連乞致仕不允武宗立遇疾復請詔加太子太保賜敕乘傳歸卒贈太保諡襄簡劉丙字文煥南雄知府實孫也成化末登進士選庶吉士改御史巡按雲南雲南諸司吏舊不得給由父滿子代丙請如例考入官流戍僉發必經兵部多淹延致死丙請屬之撫按土官無後者請録其弟姪勿令妻妾冒冠服俱著為例後督兩淮鹽課中官請引二萬為織造費部議許之丙執不可得減四之三歷福建四川副使俱督學校三遷四川左布政使正德六年以右副都御史巡撫湖廣所部鎮溪千戶所筸子坪長官司與貴州銅仁四川酉陽梅桐諸土司犬牙相錯弘治中錯溪苗龍麻陽與銅仁苗龍童保聚衆攻剽土官李椿等實縱之而筸子百夫長龍真與通謀後遂四出劫掠遠近騷然先後守臣莫能制丙將討之賊入連山深箐為拒守計丙率師破其數寨賊走據天生崖及六龍山貴州巡撫沈林兵繼至連攻破之前後擒童保等二百人斬首八百九十餘級都指揮潘勛又破鎮筸諸寨擒麻陽等百六十人斬首級如前餘賊遠遁璽書奬勵丙操履清介敢任事所至嚴明法令修舉遷工部右侍郎採木入山越二載犯風痹得疾卒詔贈尚書諡恭襄贊曰英景間瓦剌逼西陲邊圉孔棘而黃蕭養葉宗留之徒劫掠嶺南浙閩境上其後荊襄流民嘯聚則以劉通石龍為之魁他若都勻松茂黔楚諸苗瑤叛者數起羅亨信侯璡諸人保固封圻誅虓禁亂討則有功撫則信著宣力封疆無忝厥任矣孔鏞以知府服叛瑤其才力有過人者韓愈言柳中丞行事適機宜風采可畏愛不如是惡能以有為哉
