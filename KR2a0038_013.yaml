body:
  text: 明史卷十三本紀第十三憲宗一憲宗繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝諱見深英宗長子也母貴妃周氏初名見濬英宗留瓦剌皇太后命立為皇太子景泰三年廢為沂王天順元年復立為皇太子改名見深天順八年正月英宗崩乙亥即皇帝位以明年為成化元年大赦天下免明年田租三之一浙江江西福建陝西臨清鎮守內外官諸邊鎮守內官正統間所無者悉罷之下番使者緝事官校皆召還二月庚子始以內批授官三月甲寅朔尊皇后為慈懿皇太后貴妃周氏為皇太后戊午放宮人丙寅毀錦衣衛新獄庚午賜彭教等進士及第出身有差癸酉詔內閣九卿考核天下方面官戊寅復立團營夏四月癸未朔日當食不見五月丁巳大風雨雹敕羣臣修省庚申葬睿皇帝於裕陵秋七月壬申立吳氏為皇后八月癸未御經筵甲申命儒臣日講癸卯廢皇后吳氏下太監牛玉於獄冬十月壬辰立王氏為皇后甲辰立武舉法十二月甲辰免京官雜犯罪是年兩畿川廣荊襄盜賊大起道路不通安南烏斯藏入貢成化元年春正月乙卯享太廟己未大祀天地於南郊甲子都督同知趙輔為征夷將軍充總兵官僉都御史韓雍贊理軍務討廣西叛瑤二月戊子祭社稷甲午耕藉田三月庚戌四川山都掌蠻亂丁巳釋奠於先師孔子夏五月辛酉大雨雹壬戌避正殿減膳敕羣臣修省秋七月己酉免天下軍衛屯糧十之三甲子振兩畿浙江河南饑八月丁丑工部侍郎沈義僉都御史吳琛振撫兩畿饑民辛巳瘞暴骸庚寅毛里孩犯延綏總兵官房能敗之冬十二月癸卯撫寧伯朱永為靖虜將軍充總兵官太監唐慎監軍工部尚書白圭提督軍務討荊襄賊是月韓雍大破大藤峽瑤改名峽曰斷藤是年琉球哈密爪哇烏斯藏入貢二年春正月戊申罷團營乙卯大祀天地於南郊辛酉英宗神主祔太廟二月癸未禮部侍郎鄒幹巡視畿內饑民三月甲辰賜羅倫等進士及第出身有差己酉李賢父卒乞終制不許乙卯朱永大破荊襄賊劉通於南漳閏月癸酉振南畿饑乙未朱永擊擒劉通其黨石龍遁轉掠四川夏五月癸酉修撰羅倫以論李賢起復謫福建市舶司提舉己卯禁侵損古帝王忠臣烈士名賢陵墓六月甲辰趙輔師還乙巳免今年天下屯糧十之三壬子楊信為平虜將軍充總兵官太監裴當監督軍務禦寇延綏秋七月辛巳封弟見治為欣王見沛徽王戊戌毛里孩犯固原八月丁巳犯寧夏都指揮焦政戰死丁卯諭祭于謙復其子冕官冬十月丁未朱永擊擒石龍賊平進永爵為侯十二月甲寅李賢卒丙辰太常寺少卿兼翰林院侍讀學士劉定之入閣預機務是月斷藤峽賊復起是年哈密琉球安南烏斯藏瓦剌入貢三年春正月己卯大祀天地於南郊丙申撫寧侯朱永為平胡將軍充總兵官會楊信討毛里孩二月丁酉朔日有食之丁巳湖廣總兵官李震討破靖州苗三月戊辰召商輅為兵部侍郎復入閣己巳毛里孩犯大同辛巳復開浙江福建四川雲南銀場以內臣領之夏四月四川地屢震自去年六月至於是月乙巳録囚癸丑復立團營六月戊申雷震南京午門敕羣臣修省辛酉襄城伯李瑾為征夷將軍充總兵官兵部尚書程信提督軍務太監劉恆監軍討山都掌蠻秋七月乙酉停河南採辦九月辛未振湖廣江西饑冬十二月庚子左庶子黎淳追論景泰廢立事帝曰景泰事已往朕不介意且非臣下所當言切責之辛丑杖編修章懋黃仲昭檢討莊謫官有差是月程信破山都掌蠻平之是年琉球哈密占城烏斯藏入貢朝鮮獻海青白鵲諭毋獻四年春正月甲戌大祀天地於南郊三月甲子免湖廣被災秋糧甲申詔中外勢家毋得擅請田土夏四月丁巳録囚陳文卒五月癸未遣使録天下囚六月丙午免江西被災秋糧辛亥開城賊滿俊反陝西總兵官寧遠伯任壽巡撫都御史陳價討之甲寅慈懿皇太后崩秋七月癸酉都督同知劉玉為平虜副將軍充總兵官太監劉祥監軍副都御史項忠總督軍務討滿俊八月癸巳京師地震乙卯朱永代劉玉為總兵官是月任壽陳價寧夏總兵官廣義伯吳琮及滿俊戰敗績都指揮蔣泰申澄被殺九月庚申葬孝莊睿皇后於裕陵辛酉振陝西饑壬申以地震星變下詔自責敕羣臣修省甲申給事中董旻御史胡深等九人請罷商輅及禮部尚書姚夔下獄杖之冬十月乙未項忠敗賊於石城伏羌伯毛忠戰死十一月項忠擊擒滿俊送京師伏誅壬戌毛里孩犯遼東指揮胡珍戰沒十二月己酉遼東總兵官趙勝奏十一月初六日虜賊千餘攻指揮傅斌營指揮胡珍率軍來援被賊射死毛里孩犯延綏都指揮僉事許寧擊敗之是年琉球烏斯藏哈密日本滿剌加入貢五年春正月乙丑大祀天地於南郊三月辛丑賜張升等進士及第出身有差夏五月辛丑禮部侍郎萬安兼翰林院學士入閣預機務六月癸丑朔日有食之辛酉録囚秋八月辛酉劉定之卒冬十一月乙未毛里孩犯延綏是年冬阿羅出入居河套琉球哈密烏斯藏滿剌加安南土魯番入貢六年春正月己丑大祀天地於南郊己亥大同總兵官楊信敗毛里孩於胡柴溝二月辛未大理寺少卿宋旻侍郎曾翬原傑黃琛副都御史滕昭巡視畿南浙江河南四川福建考察官吏訪軍民疾苦其餘直省有巡撫等官者命亦如之丁丑禱雨於郊壇戊寅振廣西饑三月甲申免湖廣山東被災稅糧壬寅詔延綏屯田朱永為平虜將軍充總兵官太監傅恭顧恆監軍王越參贊軍務備阿羅出於延綏夏五月丙申振畿內山東河南饑丁酉王越敗阿羅出於延綏東路六月戊申朔日有食之秋七月壬午朱永敗阿羅出於雙山堡丙戌都御史項忠侍郎葉盛振畿輔饑民都督李撫治屯營甲辰總兵官房能敗阿羅出於開荒川是月免南畿四川被災稅糧八月辛亥振山西饑癸丑以水旱相仍下詔寬恤冬十月免畿內河南山東被災稅糧十一月癸未荊襄流民作亂項忠總督河南湖廣荊襄軍務討之是月孛羅忽渡河與阿羅出合十二月庚戌遣使十四人分振畿輔是年琉球哈密烏斯藏入貢七年春正月辛巳命京官五品以上及給事中御史各舉堪州縣者一人丙戌大祀天地於南郊夏四月己巳録囚五月辛巳瘞京師暴骸秋八月甲辰振山東浙江水災閏九月己未浙江潮溢漂民居鹽場遣工部侍郎李顒往祭海神修築堤岸冬十月乙亥王恕為刑部侍郎總理河道十一月甲寅立皇子祐極為皇太子大赦己未荊襄賊平流民復業者一百四十餘萬人十二月甲戌彗星見下詔自責敕羣臣修省條時政得失壬午彗星入紫微垣避正殿撤樂御奉天門聽政癸未召朱永還王越總督延綏軍務辛卯減死罪以下是年癿加思蘭入居河套與阿羅出合安南黎灝攻占城破之琉球安南入貢八年春正月庚戌大祀天地於南郊癸亥皇太子薨是月延綏參將錢亮禦毛里孩於安邊營敗績都指揮柏隆陳英戰死癿加思蘭犯固原平涼三月癸丑賜吳寬等進士及第出身有差夏四月京師久旱運河水涸癸酉遣使禱於郊社山川淮瀆東海之神乙酉録囚丁亥遣使録天下囚五月癸丑武靖侯趙輔為平虜將軍充總兵官節制各邊軍馬同王越禦癿加思蘭秋九月丙午諭安南黎灝還占城侵地冬十一月己酉寧晉伯劉聚代趙輔為將軍屯延綏十二月癸酉振京師饑民是年孛羅忽癿加思蘭屢入安邊營花馬池犯固原寧夏平涼臨鞏環慶南至通渭琉球哈密安南入貢九年春正月丁未大祀天地於南郊壬子劉聚王越敗癿加思蘭於漫天嶺是月土魯番速檀阿力破哈密據之夏四月辛酉朔日有食之甲子福餘三衛寇遼東總兵官歐信擊敗之戊辰盡免山東稅糧瘞京畿暴骸壬午閲武臣騎射於西苑秋七月壬辰巡撫延綏都御史余子俊敗癿加思蘭於榆林澗九月辛卯鎮守浙江中官李義杖殺寧波衛指揮馬璋詔勿問庚子王越襲滿都魯孛羅忽癿加思蘭於紅鹽池大破之諸部漸出河套冬十一月丁酉復閲騎射於西苑是年免湖廣畿內山西南畿陝西被災稅糧振畿內陝西饑振山西者再山東者三哈密琉球暹羅入貢十年春正月丁亥朔振京師貧民丁酉大祀天地於南郊癸卯王越總制延綏甘肅寧夏三邊駐固原丙午召劉聚還三月免南畿湖廣被災秋糧夏五月戊申申藏妖書之禁是月免山西陝西被災秋糧閏六月乙巳築邊牆自紫城寨至花馬池秋七月甲寅免江西被災秋糧八月辛卯都督同知趙勝為平虜將軍充總兵官太監劉恆覃平監軍討癿加思蘭九月癸丑朔日有食之乙卯免南畿水災秋糧冬十一月丙子免河南被災稅糧十二月己丑罷寶慶諸府採金甲午録妖書名示天下是年琉球烏斯藏土魯番入貢十一年春正月癸亥大祀天地於南郊二月甲申禁酷刑三月壬子賜謝遷等進士及第出身有差辛未彭時卒夏四月乙酉吏部侍郎劉珝禮部侍郎劉吉並兼翰林學士入閣預機務壬辰乾清門災己亥録囚五月癸酉免湖廣被災秋糧秋八月辛巳浚通惠河丁亥滿都魯癿加思蘭遣使來朝九月丁未朔日有食之冬十一月癸丑立皇子祐樘為皇太子大赦十二月戊子復郕王帝號丁酉申自宮之禁是年土魯番琉球暹羅滿剌加安南入貢命琉球貢使二年一至
