body:
  text: 明史卷七十一志第四十七選舉三太祖下金陵辟儒士范祖幹葉儀克婺州召儒士許元胡翰等日講經史治道克處州徵耆儒宋濂劉基章溢葉琛至建康創禮賢館處之以濂為江南等處儒學提舉溢琛為營田僉事基留帷幄預謀議甲辰三月敕中書省曰今土宇日廣文武並用卓犖奇偉之才世豈無之或隱於山林或藏於士伍非在上者開導引拔之無以自見自今有能上書陳言敷宣治道武略出衆者參軍及都督府具以名聞或不能文章而識見可取許詣闕面陳其事郡縣官年五十以上者雖練達政事而精力既衰宜令有司選民間俊秀年二十五以上資性明敏有學識才幹者辟赴中書與年老者參用之十年以後老者休致而少者已熟於事如此則人才不乏而官使得人其下有司宣布此意於是州縣歲舉賢才及武勇謀略通曉天文之士間及兼通書律者既而嚴選舉之禁有濫舉者逮治之吳元年遣起居注吳林魏觀等以幣帛求遺賢於四方洪武元年徵天下賢才至京授以守令其年冬又遣文原吉詹同魏觀吳輔趙壽等分行天下訪求賢才各賜白金而遣之三年諭廷臣曰六部總領天下之務非學問博洽才德兼美之士不足以居之慮有隱居山林或在下僚者其令有司悉心推訪六年復下詔曰賢才國之寶也古聖王勞於求賢若高宗之於傅說文王之於呂尚彼二君者豈其智不足哉顧皇皇於版築鼓刀之徒者蓋賢才不備不足以為治鴻鵠之能遠舉者為其有羽翼也蛟龍之能騰躍者為其有鱗鬣也人君之能致治者為其有賢人而為之輔也山林之士德行文藝可稱者有司采舉備禮遣送至京朕將任用之以圖至治是年遂罷科舉別令有司察舉賢才以德行為本而文藝次之其目曰聰明正直曰賢良方正曰孝弟力田曰儒士曰孝廉曰秀才曰人才曰耆民皆禮送京師不次擢用而各省貢生亦由太學以進於是罷科舉者十年至十七年始復行科舉而薦舉之法並行不廢時中外大小臣工皆得推舉下至倉庫司局諸雜流亦令舉文學才幹之士其被薦而至者又令轉薦以故山林巖穴草茅窮居無不獲自達於上由布衣而登大僚者不可勝數耆儒鮑恂余詮全思誠張長年輩年九十餘徵至京即命為文華殿大學士儒士王本杜斅趙民望吳源特置為四輔官兼太子賓客賢良郭有道秀才范敏曾泰稅戶人才鄭沂儒士趙翥起家為尚書儒士張子源張宗德為侍郎耆儒劉堉關賢為副都御史明經張文通阮仲志為僉都御史人才赫從道為大理少卿孝廉李德為府尹儒士吳顒為祭酒賢良欒世英徐景昇李延中儒士張璲王廉為布政使孝弟李好誠聶士舉賢良蔣安素薛正言張端文學宋亮為參政儒士鄭孔麟王德常黃桐生賢良余應舉馬衞許安范孟宗何德忠孫仲賢王福王清聰明張大亨金思存為參議凡其顯擢者如此其以漸而躋貴仕者又無算也嘗諭禮部經明行修練達時務之士徵至京師年六十以上七十以下者置翰林以備顧問四十以上六十以下者於六部及布按兩司用之蓋是時仕進無他途故往往多驟貴者而吏部奏薦舉當除官者多至三千七百餘人其少者亦至一千九百餘人又俾富戶耆民皆得進見奏對稱旨輒予美官而會稽僧郭傳由宋濂薦擢為翰林應奉此皆可得而考者也洎科舉復設兩途並用亦未嘗畸重輕建文永樂間薦舉起家猶有內授翰林外授藩司者而楊士奇以處士陳濟以布衣遽命為太祖實錄總裁官其不拘資格又如此自後科舉日重薦舉日益輕能文之士率由場屋進以為榮有司雖數奉求賢之詔而人才既衰第應故事而已宣宗嘗出御製猗蘭操及招隱詩賜諸大臣以示風勵實應者寡人情亦共厭薄正統元年行在吏部言宣德間嘗詔天下布按二司及府州縣官舉賢良方正各一人迄今尚舉未已宜止之帝以朝廷求賢不可止自今來者六部都察院翰林院堂上官考試中者錄用不中者黜之薦舉者益稀矣天順元年詔處士中有學貫天人才堪經濟高蹈不求聞達者所司具實奏聞御史陳迹奏崇仁儒士吳與弼學行命江西巡撫韓雍禮聘赴京至則召見命為左諭德與弼辭疾不受帝又命李賢引見文華殿從容顧問曰重卿學行特授宮僚煩輔太子與弼固辭賜宴文華殿命賢侍宴降敕褒賚遣行人送歸蓋殊典也至成化十九年廣東舉人陳獻章被薦授翰林院檢討而聽其歸典禮大減矣其後弘治中浙江儒士潘辰嘉靖中南直隸生員文徵明永嘉儒士葉幼學皆以薦授翰林院待詔萬曆中湖廣舉人瞿九思亦授待詔江西舉人劉元卿授國子監博士江西處士章潢僅遙授順天府訓導而直隸處士陳繼儒四川舉人楊思心等雖皆被薦下之禮部而已崇禎九年吏部復議舉孝廉言祖宗朝皆偶一行之未有定制今宜通行直省加意物色果有孝廉懷才抱德經明行修之士由司道以達巡按覆核疏聞驗試錄用於時薦舉紛紛遍天下然皆授以殘破郡縣卒無大效至十七年令豫楚被陷州縣員缺悉聽撫按官辟選更置不拘科目雜流生員人等此則皇遽求賢非承平時舉士之典至若正德四年浙江大吏薦餘姚周禮徐子元許龍上虞徐文彪劉瑾以四人皆謝遷同鄉而草詔出於劉健矯旨下禮等鎮撫司謫戍邊衞勒布政使林符邵寶李贊及參政參議府縣官十九人罰米二百石幷削健遷官且著令餘姚人不得選京官此則因薦舉而得禍者又其變也任官之事文歸吏部武歸兵部而吏部職掌尤重吏部凡四司而文選掌銓選考功掌考察其職尤要選人自進士舉人貢生外有官生恩生功生監生儒士又有吏員承差知印書算篆書譯字通事諸雜流進士為一途舉貢等為一途吏員等為一途所謂三途並用也京官六部主事中書行人評事博士外官知州推官知縣由進士選外官推官知縣及學官由舉人貢生選京官五府六部首領官通政司太常光祿寺詹事府屬官由官廕生選州縣佐貳都布按三司首領官由監生選外府外衞鹽運司首領官中外雜職入流未入流官由吏員承差等選此其大凡也其參差互異者可推而知也初授者曰聽選陞任者曰陞遷選人之法每年吏部六考六選凡引選六類選六遠方選二聽選及考定陞降者雙月大選其序定於單月改授改降丁憂候補者單月急選其揀選三歲舉行舉人乞恩歲貢就教無定期凡陞遷必滿考若員缺應補不待滿者曰推陞內閣大學士吏部尚書由廷推或奉特旨侍郎以下及祭酒吏部會同三品以上廷推太常卿以下部推通參以下吏部於弘政門會選詹事由內閣各衙門由各掌印在外官惟督撫廷推九卿共之吏部主之布按員缺三品以上官會舉監司則序遷其防邊兵備等率由選擇保舉付以敕書邊府及佐貳亦付敕薊遼之昌平薊州等山西之大同河曲代州等陝西之固原靜寧等六十有一處俱為邊缺尤慎選除有功者越次擢悞封疆者罪無赦內地監司率序遷其後亦多超遷不拘次有一歲中四五遷由僉事至參政者監司多額外添設守巡之外往往別立數銜不能畫一也在外府州縣正佐在內大小九卿之屬員皆常選官選授遷除一切由吏部其初用拈鬮法至萬曆間變為掣籤二十九年文選員外郎倪斯蕙條上銓政十八事其一曰議掣籤尚書李戴擬行報可孫丕揚踵而行之後雖有譏其失者終明世不復更也洪武間定南北更調之制南人官北北人官南其後官制漸定自學官外不得官本省亦不限南北也初太祖嘗御奉天門選官且諭毋拘資格選人有即授侍郎者而監司最多進士監生及薦舉者參錯互用給事御史亦初授陞遷各半永宣以後漸循資格而臺省尚多初授至弘正後資格始拘舉貢雖與進士並稱正途而軒輊低昂不啻霄壤隆慶中大學士高拱言國初舉人躋八座為名臣者甚衆後乃進士偏重而舉人甚輕至於今極矣請自授官以後惟考政績不問其出身然勢已積重不能復返崇禎間言者數申三途並用之說間推一二舉人如陳新甲孫元化者置之要地卒以傾覆用武舉陳啟新為給事亦聲名潰裂於是朝端又以為不若循資格而甲榜之悞國者亦正不少也給事中御史謂之科道科五十員道百二十員明初至天順成化間進士舉貢監生皆得選補其遷擢者推官知縣而外或由學官其後監生及新科進士皆不得與或庶吉士改授或取內外科目出身三年考滿者考選內則兩京五部主事中行評博國子監博士助教等外則推官知縣自推知入者謂之行取其有特薦則俸雖未滿亦得與焉考選視科道缺若干多寡無定額其授職吏部都察院協同注擬給事皆實補御史必試職一年始實授惟庶吉士否嘉靖萬曆間常令部曹不許改科道後亦間行之舉貢推知例得與進士同考選大抵僅四之一嘉靖間嘗令監生與選已罷不行萬曆中百度廢弛二十五年臺省新舊人數不足當額設之半三十六年科止數人道止二人南科以一人攝九篆者二歲南道亦止一人內臺既空外差亦缺淮揚蘇松江西陝西廣東西宣大甘肅遼東巡按及陝西之茶馬河東之鹽課缺差至數年給事中陳治則請急考選不報三十九年考選疏上復留中不下推知擬擢臺省候命闕下去留不得自如四十六年掌河南道御史王象復言十三道御史在班行者止八人六科給事中止五人而冊封典試諸差及內外巡方報滿告病求代者踵至當亟議變通之法大學士方從哲亦言考選諸臣守候六載艱苦備嘗吏部議咨禮部都察院按次題差蓋權宜之術不若特允部推今諸臣受命供職足存政體卒皆不報至光宗初前後考選之疏俱下而臺省一旦森列矣考選之例優者授給事中次者御史又次者以部曹用雖臨時考試而先期有訪單出於九卿臺省諸臣之手往往據以為高下崇禎三年吏部考選畢奏應擢給事御史若干人而以中書二人訪單可否互異具疏題請帝責其推諉令更確議而不責訪單之非體也京官非進士不得考選推知則舉貢皆行取然天下守令進士十三舉貢十七推知行取則進士十九舉貢纔十一舉貢所得又大率有臺無省多南少北御史王道純以為言帝謂用人當論才本不合拘資格下所司酌行之初制急缺風憲不時行取神宗時定為三年至是每年一舉帝從吏部尚書閔洪學請仍以三年為期此選擇言路之大凡也保舉者所以佐銓法之不及而分吏部之權自洪武十七年命天下朝覲官舉廉能屬吏始永樂元年命京官文職七品以上外官至縣令各舉所知一人量才擢用後以貪污聞者舉主連坐蓋亦嘗間行其法然洪永時選官並由部請至仁宗初一新庶政洪熙元年特申保舉之令京官五品以上及給事御史外官布按兩司正佐及府州縣正官各舉所知惟見任府州縣正佐官及曾犯贓罪者不許薦舉其他官及屈在下僚或軍民中有廉潔公正才堪撫字者悉以名聞是時京官勢未重臺省考滿由吏部奏陞方面郡守既而定制凡布按二司知府有缺令三品以上京官保舉宣德三年況鍾趙豫等以薦擢守蘇松諸府賜敕行事十年用郭濟姚文等為知府亦如之其所奏保者郎中員外御史及司務行人寺副皆與不依常調也後多有政績部曹及御史由堂上官薦引類能其官而長吏部者蹇義郭璡亦屢奉敕諭帝又慮諸臣畏連坐而不舉則語大學士楊溥以全才之難謂一言之薦豈能保其終身欲得賢才尤當厚教養之法故其時吏治蒸蒸稱極盛焉沿及英宗一遵厥舊然行之既久不能無弊所舉或鄉里親舊僚屬門下素相私比者方面大吏方正謝莊等由保舉而得罪而無官保舉者在內御史在外知府往往九年不遷正統七年罷薦舉縣令之制十一年御史黃裳言給事御史國初奏遷方面郡守近年方面郡守率由廷臣保陞給事御史以糾參為職豈能無忤於一人乞敕吏部仍按例奏請除授帝是其言命部議行明年給事中余忭復指正莊等事敗謂宜坐舉主且言方面郡守有缺吏部當奏請上裁尚書王直英國公張輔等言方面郡守保舉陞用稱職者多未可擅更易英宗仍從輔直言而採忭疏許言官指劾十三年御史涂謙復陳舉薦得方面郡守輒改前操之弊請仍遵洪武舊制於內外九年考滿官內揀擇陞授或親擇朝臣才望者任之詔可大臣舉官之例遂罷景泰中復行保舉給事中林聰陳推舉驟遷之弊言今缺參政等官三十餘員請暫令三品以上官保舉自後惟布按兩司三品以上官連名共舉其餘悉付吏部詔並從之成化五年科道官復請保舉方面吏部因幷及郡守帝從言官請而命知府員缺仍聽吏部推舉踰年以會舉多未當幷方面官第令吏部推兩員以聞罷保舉之令既而都御史李賓請令在京五品以上管事官及給事御史各舉所知以任州縣從之弘治十二年復詔部院大臣各舉方面郡守吏部因請依往年御史馬文升遷按察使屠滽遷僉都御史之例超擢一二以示激勸而未經大臣薦舉者亦兼采之並從其議當是時孝宗銳意求治命吏兵二部每季開兩京府部堂上及文武方面官履歷具揭帖奏覽第兼保舉法行之不專恃以為治也正德以後具帖之制漸廢嘉靖八年給事中夏言復請循弘治故事且及舉劾賢否略節每季孟月部臣送科以達御前命著為令而保舉方面郡守之法終明世不復行矣至若坐事斥免因急才而薦擢者謂之起廢家居被召因需缺而預補者謂之添註此又銓法之所未詳而中葉以後間嘗一行者也考滿考察二者相輔而行考滿論一身所歷之俸其目有三曰稱職曰平常曰不稱職為上中下三等考察通天下內外官計之其目有八曰貪曰酷曰浮躁曰不及曰老曰病曰罷曰不謹考滿之法三年給由曰初考六年曰再考九年曰通考依職掌事例考覈陞降諸部寺所屬初止署職必考滿始實授外官率遞考以待覈雜考或一二年或三年九年郡縣之繁簡或不相當則互換其官謂之調繁調簡洪武十一年命吏部課朝覲官殿最稱職而無過者為上賜坐而宴有過而稱職者為中宴而不坐有過而不稱職者為下不預宴序立於門宴者出然後退此朝覲考覈之始也十四年其法稍定在京六部五品以下聽本衙門正官察其行能驗其勤怠其四品以上及一切近侍官與御史為耳目風紀之司及太醫院欽天監王府官不在常選者任滿黜陟取自上裁直隸有司首領官及屬官從本司正官考覈任滿從監察御史覆考各布政使司首領官俱從按察司考覈其茶馬鹽馬鹽運鹽課提舉司軍職首領官俱從布政司考覈仍送按察司覆考其布政司四品以上按察司鹽運司五品以上任滿黜陟取自上裁內外入流幷雜職官九年任滿給由赴吏部考覈依例黜陟果有殊勳異能超邁等倫者取自上裁又以事之繁簡與歷官之殿最相參互覈為等第之陞降其繁簡之例在外府以田糧十五萬石以上州以七萬石以上縣以三萬石以上或親臨王府都布政按察三司幷有軍馬守禦路當驛道邊方衝要供給處俱為事繁府糧不及十五萬石州不及七萬石縣不及三萬石及僻靜處俱為事簡在京諸司俱從繁例十六年京官考覈之制稍有裁酌俱由其長開具送部覈考十八年吏部言天下布按府州縣朝覲官凡四千一百一十七人稱職者十之一平常者十之七不稱職者十之一而貪污闒茸者亦共得十之一帝令稱職者陞平常者復職不稱職者降貪污者付法司罪之闒茸者免為民永宣間中外官舊未有例者稍增入之又從部議初考稱職次考未經考覈今考稱職者若初考平常次考未經考覈今考稱職者俱依稱職例陞用自時厥後大率遵舊制行之中間利弊不可枚舉而其法無大變更也考察之法京官六年以巳亥之歲四品以上自陳以取上裁五品以下分別致仕降調閒住為民者有差具冊奏請謂之京察自弘治時定外官三年一朝覲以辰戌丑未歲察典隨之謂之外察州縣以月計上之府府上下其考以歲計上之布政司至三歲撫按通核其屬事狀造冊具報麗以八法而處分察例有四與京官同明初行之相沿不廢謂之大計計處者不復用定為永制洪武四年命工部尚書朱守仁廉察山東萊州諸郡官吏六年令御史臺御史及各道按察司察舉有司官有無過犯奏報黜陟此考察之始也洪熙時命御史考察在外官以奉命者不能無私諭吏部尚書蹇義嚴加戒飭務矢至公景泰二年吏部都察院考察當黜退者七百三十餘人帝慮其未當仍集諸大臣更考存留者三之一成化五年南京吏部右侍郎章綸都察院右僉都御史高明考察庶官帝以各衙門掌印官不同僉名疑有未當令侍郎葉盛都給事中毛弘從公體勘亦有所更定弘治六年考察當罷者共一千四百員又雜職一千一百三十五員帝諭方面知府必指實跡毋虛文泛言以致枉人府州以下任未三年者亦通核具奏尚書王恕等具陳以請而以府州縣官貪鄙殃民者雖年淺不可不黜帝終謂人才難得降諭諄諄多所原宥當黜而留者九十餘員給事御史又交章請黜遺漏及宜退而留者復命吏部指實跡恕疏各官考語及本部訪察者以聞帝終以考語為未實諭令復核恕以言不用且疑有中傷者遂力求去至十四年南京吏部尚書林瀚言在外司府以下官俱三年一次考察兩京及在外武職官亦五年一考選惟兩京五品以下官十年始一考察法大闊略旨下吏部覆請如瀚言而京官六年一察之例定矣京察之歲大臣自陳去留既定而居官有遺行者給事御史糾劾謂之拾遺拾遺所攻擊無獲免者弘正嘉隆間士大夫廉恥自重以掛察典為終身之玷至萬曆時閣臣有所徇庇間留一二以撓察典而羣臣水火之爭莫甚於辛亥丁巳事具各傳中黨局既成互相報復至國亡乃已兵部凡四司而武選掌除授職方掌軍政其職尤要凡武職內則五府留守司外則各都司各衞所及三宣六慰流官八等都督及同知僉事都指揮使同知僉事正副留守世官九等指揮使及同知僉事衞所鎮撫正副千戶百戶試百戶直省都指揮使二十一留守司二衞九十一守禦屯田羣牧千戶所二百十有一此外則苗蠻土司皆聽部選自永樂初增立三大營各設管操官各哨有分管坐營官坐司官景泰中設團營十已復增二各有坐營官俱特命親信大臣提督之非兵部所銓擇也凡大選曰色目曰狀貌曰才行曰封贈曰襲廕其途有四曰世職曰武舉曰行伍曰納級初武職率以勳舊太祖慮其不率以武士訓戒錄大誥武臣錄頒之後乃參用將材三歲武舉六歲會舉每歲薦舉皆隸部除授久之法紀隳壞選用紛雜正德間冒功陞授者三千有奇嘉靖中詹事霍韜言成化中增太祖時軍職四倍今又增幾倍矣錦衣初額官二百五員今至千七百員殆增八倍洪武初軍功襲職子弟年二十者比試初試不中襲職署事食半俸二年再試中者食全俸仍不中者充軍其法至嚴故職不冗而俸易給自永樂後新官免試舊官即比試賄賂無不中此軍職所以日濫也永樂平交阯賞而不陞邇者不但獲馘者陞而奏帶及緝妖言捕盜者亦無不陞此軍職所以益冗也宜命大臣循清黃例內外武職一切差次功勞考其祖宗相承叔姪兄弟繼及或洪永年間功或宣德以後功或內監弟姪恩廕或勳戚駙馬子孫或武舉取中各分數等默寓汰省之法或許世襲或許終身或許繼或不許繼各具冊籍昭示明白以為激勸於是命給事中夏言等查覈冒濫言等指陳其弊言鎮守官奏帶舊止五名今至三四百名蓋一人而奏帶數處者有之一時而數處獲功者有之他復巧立名色紀驗不加審覈銓選又無駁勘其改正重陞併功加授之類弊端百出宜盡革以昭神斷部核如議恩倖冗濫者裁汰以數千計宿蠹為清萬曆十五年復詔嚴加察核且嘗命提鎮科道會同兵部品年資課技藝序薦剡分為三等名曰公選然徒飾虛名終鮮實效也武官爵止六品其職死者襲老疾者替世久而絕以旁支繼年六十者子替明初定例嫡子襲替長幼次及之絕者嫡子庶子孫次及之又絕者以弟繼永樂後取官舍旗軍餘丁曾歷戰功者令原帶俸及管事襲替悉因之其降級子孫仍替見降職事弘治時令旁支減級承襲正德中令旁支入總旗嘉靖間旁支無功者不得保送凡陞職官舍如父職其陣亡保襲者流官一等凡襲替官舍以騎射試之大抵世職難覈故例特詳而長弊叢奸亦復不少官之大者必會推五軍都督府掌印缺於見任公侯伯取一人僉書缺於帶俸公侯伯及在京都指揮在外正副總兵官推二人錦衣衞堂上官及前衞掌印缺視五府例推二人都指揮留守以下上一人正德十六年令五府及錦衣衞必由都指揮屢著勳猷者陞授諸衞官不世獨錦衣以世武之軍政猶文之考察也成化二年令五年一行以見任掌印帶俸差操及初襲官一體考核十三年令兩京通考以為常五府大臣及錦衣衞堂上官自陳候旨直省總兵官如之在內五府所屬幷直省衞所官悉由巡視官及部官註送在外都司衞所官由撫按造冊繳部副參以下千戶以上由都布按三司察註送撫咨部考舉題奏錦衣衞管戎務者倍加嚴考南北鎮撫次之各衞所及地方守禦幷各都司隸巡撫者例同惟管漕運者不與考
