body:
  text: 明史卷一百八表第九外戚恩澤侯表古恩澤封有三曰外戚曰中官曰嬖幸明興追崇外氏廟貌之隆爵超五等而苗裔無考未及授官高后外家不奉朝請家法之嚴有自來矣自文皇后而外率由儒族單門入儷宸極后父初秩不過指揮侯伯保傅以漸而進優者厚田宅列僮奴雖擁侈富之資曾無憑藉之勢制防之微意寓焉肅宗申明功令裁抑世封戚畹周親不得與汗馬餘勳為齒雖稱肺腑事劣封君上視漢唐殆相懸絶茲考實録所載封襲歲月備列為表以別於元功之次他若宦官子弟濫列金貂方士義兒均從班爵騁文成之丕誕踵養子之傾輈亂政亟行若循一軌各依年次備著於篇亦班固表外戚譜張釋欒大之例也
