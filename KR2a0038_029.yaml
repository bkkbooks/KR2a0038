body:
  text: 明史卷二十九志第五五行二火木洪範曰火曰炎上火不炎上則失其性矣前史多以燠草異羽蟲之孽羊禍火災火異赤眚赤祥皆屬之火今從之燠洪熙元年正月癸未以京師一冬不雪詔諭修省正統九年冬畿內外無雪十二年冬陝西無雪景泰六年冬無雪天順元年冬宮中祈雪是年直隸山西河南山東皆無雪二年冬命百官祈雪六年冬直隸山東河南皆無雪成化元年冬無雪五年冬燠如夏六年二月壬申以自冬徂春雨雪不降敕諭羣臣親詣山川壇請禱十年二月南京山東奏冬春燠無冰雪十一年冬以無雪祈禱十五年冬直隸山東河南山西無雪十九年冬京師直隸無雪弘治九年冬無雪十五年冬無雪十八年冬溫如春無雪正德元年冬無雪永嘉自冬至春麥穗桃李實三年冬無雪六年至九年連歲無雪十一年冬無雪嘉靖十四年冬深無雪遣官遍祭諸神十九年冬無雪二十年十二月癸卯禱雪於神祇壇二十四年十二月甲午命諸臣分告宮廟祈雪三十二年冬無雪三十三年十二月壬申以災異屢見即禱雪日為始百官青衣辦事三十六年冬無雪三十九年冬無雪明年又無雪帝將躬禱會大風命亟禱雪兼禳風變四十一年至四十五年冬祈雪無虛歲隆慶元年冬無雪四年冬無雪萬曆四年十二月己丑命禮部祈雪十六年十七年二十九年三十七年四十七年亦如之崇禎五年十二月癸酉命順天府祈雪六年七年冬無雪草異永樂十六年正月乙丑同州澄城郃陽朝邑雨穀及蕎麥正統八年十一月殿上生荊棘高二尺十四年廣州獄竹牀踰年忽青生葉成化六年二月戊寅湖廣應山雨粟弘治八年二月枯竹開花實如麥米苦砶開蓮花六月甲子黟縣雨豆味不可食九年黃州民家瓜大如斗瓤皆赤血萬曆四十三年四月戊寅石首雨豆大小不一色雜紅黑崇禎四年五年河南草生人馬形如被甲持矛馳驅戰鬬者然十三年徐州田中白豆多作人面眉目宛然羽蟲之孽萬曆二十五年二月壬午嶽州民家有鴨含絮裹火飛上屋入竹椽茅茨中火四起延燒數百家四十三年四月壬午隻鶴銜火飛集掖縣海神廟殿明日廟火崇禎六年汝寧有鳥鳩身猴足鳳陽惡鳥數萬兔頭雞身鼠足供饌甚肥犯其骨立死羊禍萬曆三十八年四崞縣民家羊産羔一首二眼四耳八足三十九年四月降夷部産羊羔人面羊身火災洪武元年七月丁酉京師火延燒永濟倉三年二月己巳大河衛火燔及廣積庫七月乙未寶源局火甲子鳳臺門軍營火延燒武德衛軍器局四年十一月癸亥京師大軍倉災五年二月癸未臨濠府火壬辰至甲午京師火燬龍驤等六衛軍民廬舍七月丁卯永清衛軍器庫火十二月丙戌京師定遠等衛火焚及軍器局兵仗十七年十二月己未潮州火官廨民居及倉廩兵仗圖籍焚蕩無遺二十一年二月戊辰歷代帝王廟火上元縣治亦災甲戌天界能仁二寺災二十九年二月辛丑通州火燔屋千九百餘三十年四月甲午廣南衛火延燒城樓及衛治倉庫建文二年八月癸巳承天門災永樂四年十二月辛亥甌寧王邸第火王薨十三年正月壬子北京午門災十九年四月庚子奉天謹身華蓋三殿災二十年閏十二月戊寅乾清宮災宣德三年三月己亥東嶽泰山廟火六年八月武昌火延燒楚王宮譜系敕符俱燼甲辰天津右衛北城外火飛焰入城燒倉厫九年二月庚午京城東南樓火正統二年二月西鎮吳山廟火三年八月辛酉順天貢院火席舍多焚改期再試十二月乙亥韓府承運殿災四年三月戊午代府寢殿火七年正月廣昌木廠火焚松木八千八百餘株戊午南京內府火燔廊房六十餘間圖籍器用守衛衣甲皆空三月辛未趙城媧皇寢廟火十年正月庚寅忠義前後二衛災是時太倉屢火遣官禱祭火龍及太歲以禳之五月甲申忠月甲申忠義後衛倉復火癸巳通州右衛倉火十一月丁酉御花房火十一年秋武昌火死者數百人十二月乙未周府災十二年六月南京山川壇災十三年二月癸酉忠義前衛倉火十四年六月丙辰夜南京謹身奉天華蓋三殿災景泰二年六月丙子青州廢齊府火三年八月戊寅秦府火五年春南京火延燒數數千家七年九月壬申寧府火延燒八百餘家天順元年七月丙寅夜承天門災二年五月戊子器皿廠火三年九月庚寅肅州城中火延燒五千四百餘十家死者六十餘人四年八月己巳光祿寺大烹內門火是歲楚府頻火宮殿家廟悉燬五年三月丁卯南京朝天宮災六年六月癸未楚府火七年正月丁西南京西安門木襒火延燒皇牆二月戊辰會試天下舉人火作於貢院御史焦顯扃其門燒殺舉子九十餘人成化二年九月癸未南京御用監火六年十一月己亥江浦火延燒二百六十餘家九年七月庚戌東直門災十一年四月壬辰夜乾清宮門災十三年十一月壬辰太倉米麥歲久蒸浥自焚百餘石十八年八月丙午合州火延燒千五百餘家乙卯楚府火凡三發十一月戊午南京國子監火十二月乙卯器皿廠火壬辰寧河王府火先有妖夜見或為神或為王侯時舉火作欲焚狀是夜燔府第無遺冠服器用皆燼二十年正月戊戌欽天監火二十二年六月臨海縣災延燒千七百餘家弘治元年三月庚寅南京內花園火十一月丁丑夜南京甲字庫災二年四月乙未南京神樂觀火四年二月戊午禮部官舍火六年四月甲寅刑部官舍火辛酉夜南京舊內災八年三月戊子鎮東等堡躍火星如斗燬公館倉厫人馬多斃十一年自春徂夏貴州大火燬官民房舍千八百餘所死傷者六千餘人十月甲戌夜清寧宮災十二年六月甲辰夜闕里聖廟災十二月建陽縣書坊火古今書板皆燼十三年二月乙酉禮部官舍火七月甲寅南城縣空中有火乍分乍合流光下墜十餘丈隱隱有聲燬軍民廬舍庚申永寧衛雁尾山至居庸關之石縱山東西四十餘里南北七十餘里延燒七晝夜閏七月辛巳福州城樓燬八月己未瀋府火十一月庚辰寧河府火十六年三月庚午遼東鐵嶺衛墜火如斗丙子火起燒房屋二千五百餘間死者百餘人四月戊午寬河衛倉災燬米豆四萬餘石九月戊寅廣寧衛城火燔三百餘家十七年四月丁巳淮安火焚五百餘家五月癸巳正陽門內西廊火燔武功坊正德元年二月庚寅鄖陽火燬譙樓官舍延百餘家是歲寧夏左屯衛紅氣亙天既而火作城樓臺堡俱燼六月庚寅大同平虜城災燔藁百萬餘十一月己亥臨海縣治火延燒數千家七年三月己未嶧縣有火如斗自空而隕大風隨之燬官民房千餘間火逸城外延及丘木庚申成山衛秦皇廟火屋宇悉燬像設如故是月文登大桑樹火樹燔而枝葉無損五月癸酉至閏五月丙子遼東懿路城火三作焚官民廬舍之半九月壬午玉山火燔學舍及民居三百餘家八年六月辛酉豐城縣西南連隕火星如盆如斗既而火作至七月初始熄燔二萬餘家七月戊子火隕龍泉縣焚四千餘家十月壬寅饒州及永豐浮梁火各燔五百餘家浮梁學舍災庚申臨江火燔官舍延八百餘家九年正月庚辰乾清宮火十一年八月丁丑黔陽火燬城樓官廨延七百餘家十二年正月甲辰清寧宮小房火四月裕陵神宮監火八月丁卯南昌火燔三百家九月壬午建安火燔二百五十餘家十三年二月己卯夷陵火燔七百餘家八月庚辰獻陵明樓災丁酉延平火燔五百餘家十四年四月乙巳淮安新城火七月丙辰泰寧火燔五千餘家十五年五月辛卯靜樂火燔八百餘家嘉靖元年正月己未清寧宮後三小宮災楊廷和言廢禮之應不報二月己丑南京針線廠火己亥通州城樓火二年五月丙子榮府火九月戊辰秦府宮殿火四年三月壬午夜仁壽宮災玉德安喜景福諸殿俱燼五年三月乙酉趙府家廟火六年三月丁亥西庫火八年十月癸未大內所房災十年正月辛亥大內東偏火四月庚辰兵工二部公廨災燬文籍十三年六月甲子南京太廟火燬前後殿東西廡神廚庫十五年四月癸卯山西平虜衛火盡燬神機官庫軍器十八年二月乙丑趙州及臨洺鎮行宮俱火丁卯駕幸衛輝行宮四更火陸炳負帝出後宮及內侍有殞於火者六月丁酉皇城北鼓樓災二十年四月辛酉夜宗廟災燬成仁二廟主二十五年五月壬申盔甲廠火二十六年十一月壬午宮中火釋楊爵於獄三十一年八月乙丑南京試院火三十五年九月戊辰杭州大火延燒數千家三十六年四月丙申奉天華蓋謹身三殿文武二樓午門奉天門俱災三十七年正月光祿寺災三十八年正月癸未前軍都督府火四十年十一月辛亥夜萬壽宮災四十四年三月己亥夜大明門內西千步廊火隆慶二年正月浙江省城外災燬室廬舟艦以千計三月乙亥乾清坤寧兩宮一時俱燼五年二月壬子南京廣惠二倉火萬曆元年十一月己亥慈寧宮後舍火三年四月甲戌工部後廠火五年十月丙申禁中火十一月癸未宗人府災十一年十二月庚午夜慈寧宮災十二年二月己酉無逸殿災十二月癸卯朔又災十五年五月甲子司設監火十八年三月辛酉遼東寨山兒堡火燬城堡器械傷九十餘人十九年十二月甲辰萬法寶殿災二十一年六月望太倉公署後樓有炮聲火藥器械俱燼二十二年五月壬寅天火燔鐵嶺衛千餘家二十四年二月甲寅潞府門火三月乙亥火發坤寧宮延及乾清宮俱燼二十五年二月壬午杭州火燒官民房千三百餘間丙戌馬湖屏山災延燔八百餘家斃二十四人三月癸卯泗州大火燒民房四千餘盱眙火燔民房百六十餘間撥漕糧二萬石以振六月戊寅三殿災火起歸極門延皇極等殿文昭武成二閣周遭廊房一時俱燼十二月甲寅吏部文選司署火二十七年十一月壬申內府火延燒尚寶司印綬監工部廊至銀作局山牆而止二十八年三月南陽火延燒唐府二十九年正月己巳鐵嶺衛火車輛火藥俱燼八月己卯大光明東配殿災三十年二月乙酉魏國公賜第火十月丙申孝陵災十二月庚子南海普陀山寺災三十一年九月戊寅通州漕艘火三十三年二月乙丑御馬監火五月辛巳洗白廠火九月甲午昭和殿火丙申官軍於盔甲廟支火藥藥年久凝如石用斧劈之火突發聲若震霆刀鎗火箭迸射百步外軍民死者無數十一月丁卯刑部提牢廳火三十五年二月乙卯易州神器庫火四月丁酉通州西倉火十月己卯南京行人司署燬三十七年正月庚子慶府火燔寢宮及帑藏三月丙戌武昌火越二日又火共燔二百六十餘家六月慶府災十月戊午朝日壇火三十八年四月丁丑夜正陽門箭樓火三十九年四月戊子怡神殿災四十一年五月壬戌蜀府災門殿為燼四十三年四月壬午黃花鎮柳溝火延燒數十里甲午蜀府殿庭災遼東長寧堡自二月至五月火凡五發燬房屋人畜無算閏八月辛亥通州糧艘火九月丁丑湖口稅廨燬四十四年十一月己巳隆德殿災丁亥南城延喜宮災四十五年正月壬午東朝房火延燬公生門十一月丙戌宣禧宮災四十六年閏四月丁丑夜開原殷家莊堡臺杆八同時燼甲申媛閣廠膳房火九月壬子茂陵火四十七年四月癸酉盔甲廠火泰昌元年十月丁卯噦鸞宮災天啓元年閏二月戊戌昭和殿災三月甲辰杭州火延燒六千餘家八月戊子復災城內外延燬萬餘家年五月丙申旗纛廟正殿災火藥盡焚匠役多死者三年七月辛卯南京大內左傍宮災六年五月戊申王恭廠災地中霹靂聲不絶火藥自焚煙塵障空白晝晦冥凡四五里五月癸亥朝天宮災七月庚寅登州城樓火七年十月庚子寧遠前屯火傷男婦二百餘人崇禎元年四月乙卯左軍都督府災五月乙亥鷹坊司火丁亥丁字庫火七月己卯公安縣火燬文廟延五千餘家二年十一月庚子火藥局災三年三月戊戌又災八月癸酉頭道關災火器轟擊無餘六年正癸丑濟南舜廟災七年九月庚申盔甲廠災十一年四月戊戌新火藥局災傷人甚衆六月癸巳安民廠災震燬城垣廨舍居民死傷無算八月丁酉十藥局又災火異成化二十一年正月甲申朔有火光自中天而少西墜於下化為白氣復曲折上騰聲如雷弘治三年三月庚午儀隴空中有紅白火焰長三丈餘自縣治東北流至正東六十餘里而墜聲震如雷八年三月辛卯廣寧右衛臺杆火高五寸杆如故十年四月辛丑阜平有火光長八九尺大如轆軸有聲自東南至西南而墜正德元年三月戊申夜太原有火如斗大墜寧化王殿前廣寧墩臺火發旗杆凡六七月壬戌夜火光墜即墨民家化為緑石圓高尺餘七年三月丁卯夜大風雷電餘干仙居寨有光如箭墜旗竿上俄如燭龍光照四野士卒撼其旗飛上竿首既而其火四散鎗首皆有光如星十二年五月己亥夜火隕都察院獄旋轉久之始滅十五年六月癸未夜台州火隕三大如盤觸草木皆焦嘉靖五年七月甲申有火毬三大五六尺從北墜於東其光燭天二十年七月丙戌火毬如斗隕左軍都府中門東良久乃滅隆慶二年三月戊午延綏保寧堡城角旗杆出火灼灼有聲萬曆十四年保定府民間牆壁內出火三日夜乃熄十五年二月綏靖邊城各堡脊獸旗杆俱出火軍士以杖撲之杖亦生火三更乃熄二十年三月陝西空中有火大如盆後生三尾隕於西北二十一年二月庚辰夜分大毛山樓上各獸吻俱有火如雞卵赤色即時雨雪火上嗟嗟有聲二十三年九月癸巳永寧有火光形如屋大隕於西北永昌鎮番寧遠所見同二十四年二月戊申夜鄠縣雷雨遍地火十有餘里二十五年二月癸亥平涼瓦獸口出火水灌不滅八月甲申肅涼二州火光在天形如車輪尾分三股約長三丈天啓六年五月壬寅朔厚載門火神廟紅毬滾出前門城樓角有數千螢火並合如車輪崇禎元年西安有火如碾如斗者數十色青焰高尺許嘗入民居留數日乃去用羊豕禳之不為害自五月至七月而止十三年六月壬申鎮安火光如斛自西墜地土木皆焦赤眚赤祥成化十三年二月甲午浙江山陰湧泉如血正德元年正月乙酉夜崇明空中有紅光曳尾如虹起東北至西南沒聲如雷辛丑鳳陽紅光發與日同色聲如雷二年八月己亥赤光見寧夏長五丈八年七月甲申龍泉有赤彈二自空隕於縣治形如鵝卵躍入民居相鬬久之嘉靖三十三年四月戊子慈溪民家湧血高尺餘三十七年五月戊辰東陽民張思齊家地裂五六處出血如線高尺許血凝犬就食之掘地無所見三十九年二月己未竹溪民家出血隆慶六年閏二月癸酉遼東赤風揚塵蔽天萬曆六年七月丁丑松門衛金鐺家湧血三尺有聲十三年四月乙丑虹民王祿投宿姚壘家見血出於地驚走至市市亦流血鄉人擊器物譟之乃止十九年六月庚戌慈溪茅家浦湧血八處大如盆高尺許血濺船船即出血濺人足足亦出血數刻乃絶二十六年九月甲辰蕭山賈九經家出血高尺許天啓元年六月庚寅肇慶民王體積中庭噴血如跑突泉崇禎七年二月戊午海豐雨血八年八月戊寅宣城池中出血洪範曰木曰曲直木不曲直則失其性矣前史多以雨狂人服妖雞禍鼠孽木冰木妖青眚青祥皆屬之木今從之雨洪武十三年七月海康大雨壞縣治二十三年十一月山東二十九州縣久雨傷麥禾建文元年三月乙卯夜燕王營於蘇家橋大雨平地水三尺及王臥榻永樂元年三月京師霪雨壞城西南隅五十餘丈七月建寧衛霪雨壞城二年七月新安衛霪雨壞城八月霪雨壞北京城五千餘丈六年七月思明霪雨壞城七年九月浙江衛所五颶風驟雨壞城漂流房舍八年七月金鄉衛颶風驟雨壞城垣公廨十二年九月密雲後衛霪雨壞城二十年正月信豐雨水壞城瞿城衛如之二十一年二月六安衛霪雨壞城是歲建昌守禦所淮安懷來等衛皆霪雨壞城二十二年二月壽州衛雨水壞城三月贛州振武二衛雨水壞城四月霪雨壞密雲及薊州城是歲南北畿山東州縣霪雨傷麥禾甚衆洪熙元年夏蘇松嘉湖積雨傷稼閏七月京師大雨壞正陽齊化順成等門城垣九月久雨壞密雲中衛城宣德元年五月永喜樂清颶風急雨壞公私廨宇及壇廟正統元年七月順天山東河南廣東霪雨傷稼四年夏居庸關及定州衛霪雨壞城五年二月南京大風雨壞北上門脊覆官民舟七年濟南青萊淮鳳徐州五月至六月霪雨傷稼九年閏七月野狐嶺等處霪雨壞城及濠塹墩臺十一年春江西七府十六縣霪雨田禾淹沒十二年六月瑞金霪雨市水丈餘漂倉庫溺死二百餘人十三年四月雨水壞順天古北口邊倉五月至六月鳳陽徽州久雨傷稼九月寧都大雨壞城郭廬舍溺死甚衆景泰三年永平兗州久雨傷禾大嵩等二十衛所久雨壞城四年南畿河南山東府十州一自五月至於八月霪雨傷稼五年杭嘉湖大雨傷苗六旬烈止七月京師久雨九門城垣多壞六年北畿府五河南府二久雨傷稼雲南大理諸府如之七年兩畿江西河南浙江山東山西湖廣共府三十雨淹田天順元年濟兗青三府大雨閲月禾盡沒四年安慶南陽雨自五月至七月淹禾苗七年五月淮鳳揚徐大雨腐二麥武昌漢陽荊州廬舍漂沒民皆依山露宿成化元年六月畿東大雨水壞山海關永平薊州遵化城堡八月通州大雨壞城及運倉二年定州積雨壞城垣及墩臺𣛀口百七十三八年七月南京大風雨壞天地壇孝陵廟宇鳳陽大雨壞皇陵牆垣九年三月南京大風雨拔太廟社稷壇樹十三年七月京城大雨十四年八月鳳陽大雨沒城內民居以千計十七年七月乙酉南京大風雨社稷壇及太廟殿宇皆摧十八年河南懷慶諸府夏秋霪雨三月塌城垣千一百八十餘丈漂公署壇廟民居三十一萬四千間有奇淹死一萬一千八百餘人弘治二年七月京師霪雨求直言三年七月南京驟雨壞午門西城垣七年七月庚寅南京大風雨壞殿宇城樓獸吻拔太廟天地社稷壇及孝陵樹自五月至八月義州等衛連雨害稼八年五月南京陰雨踰月壞朝陽門北城堵九月潮州諸府颶風暴雨壞城垣廬舍十年七月安陸霪雨壞城郭廬舍殆盡十一年七月長安嶺暴風雨壞城及廬舍十四年六月義錦廣寧霪雨壞城垣墩堡倉庫橋梁民多壓死者十五年六七月南京大風雨孝陵神宮監及懿文陵樹木橋梁牆垣多摧拔者十六年五月榆林大風雨毀子城垣移垣洞於其南五十步十八年三月雙山堡大雷雨壞城六月至八月京畿連雨正德元年七月鳳陽諸府大雨平地水深丈五尺沒居民五百餘家二年七月武平大風雨毀城樓長泰南靖大風雨三日夜平地水深二丈漂民居八百餘家十二年蘇松常鎮嘉湖大雨殺麥禾十三年應天蘇松常鎮揚大雨彌月漂室廬人畜無算十六年京師久雨傷稼嘉靖四年六月登州大雨壞城十六年京師雨自夏及秋不絶房屋傾倒軍民多壓死二十五年八月京師大雨壞九門城垣三十三年六月京師大雨平地水數尺四十五年九月鄖陽大霪雨平地水丈餘壞城垣廬舍人民溺死無算隆慶元年六月京師霪雨遼東自五月至七月雨不止壞垣牆禾黍萬曆元年七月霪雨十一年四月承天大雨水十二年正月喜峰口大風雨壞各墩臺十五年五月至七月蘇松諸府霪雨禾麥俱傷六月京師大雨二十四年杭嘉湖霪雨傷苗二十八年七月興化莆田連江福安大雨數日夜城垣橋梁隄岸俱圮二十九年春夏蘇松嘉湖霪雨傷麥三十二年七月京師霪雨城崩三十三年五月丙申鳳陽大風雨損皇陵正殿御座三十九年春河南大雨夏京師廣東大雨廣西積雨五閲月四十二年浙江霪雨為災天啓六年閏六月大雨連旬壞天壽山神路都城橋梁是歲遼東霪雨壞山海關內外城垣軍民傷者甚衆七年山東州縣二十有八積雨傷禾崇禎五年六月大雨八月又雨衝損慶陵九月順天二十七縣霪雨害稼十一年夏雨浹旬圮南山邊垣十二年十二月浙江霪雨阡陌成巨浸十三年四月至七月寧池諸郡霪雨田半為壑十五年十月黃蘄德安諸郡縣霪雨十六年二月戊辰親祀社稷大風雨僅成禮而還狂人景泰三年五月癸巳朔以明日立太子具香亭於奉天門有一人自外竟入執紅棍擊香亭曰先打東方甲乙木嘉靖十八年駕將南幸有軍人孫堂從御路中橋至奉天門下登金臺坐久守門官役無知者升堂大呼覺而捕之乃病狂者服妖正德元年婦女多用珠結蓋頭謂之瓔路十三年正月車駕還京令朝臣用曳撒大帽鸞帶給事中朱鳴陽言曳撒大帽行役所用非見君服皆近服妖也十五年十二月帝平宸濠還京俘從逆者及懸諸逆首於竿皆標以白幟數里皆白時帝已不豫見者識其不祥崇禎時朝臣好以紗縠竹籜為帶取其便易論者謂金銀重而貴紗籜賤而輕殆賤將乘貴也時北方小民製幘低側其簷自掩眉目名曰不認親其後寇亂民散途遇親戚有飲泣不敢言或掉臂去之者雞禍弘治十四年華容民劉福家雞雛三足十七年六月崇明民顧孟文家雞生雛猴頭而人形身長四寸有尾活動無聲嘉靖四年長垣民王憲家雞抱卵內成人形耳目口鼻四肢皆具萬曆二十二年六月靖邊營軍家雌雞化為雄崇禎九年淮安民家牝雞啼躍化為雄十年宣武門外民家白雞喙距純赤重四十斤或曰此也所見之處國亡十四年太倉衛指揮姜周輔家雞伏子兩頭四翼八足鼠妖萬曆四十四年七月常鎮淮揚諸郡土鼠千萬成羣夜銜尾渡江絡繹不絶幾一月方止四十五年五月南京有鼠萬餘銜尾渡江食禾稼崇禎七年寧夏鼠十餘萬銜尾食苗十二年黃州鼠食禾渡江五六日不絶時內殿奏章房多鼠盜食與人相觸而不畏亦鼠妖也至甲申元旦後鼠始屏跡又秦州關山中鼠化鵪鶉者以數千計十五年二月羣鼠渡江晝夜不絶十月榆林定邊諸堡鼠生蝦蟆腹中一生數十食苗如割木冰洪武四年正月戊申木冰六年十二月乙丑雨木冰十一年正月丁亥雨木冰二十二年正月甲戌雨木冰正統三年十月丁丑曉木介天順七年十月甲辰雨木冰八年正月乙丑雨木冰成化十六年正月辛卯曉雨木冰二十三年十二月戊辰曉木介隆慶三年十一月癸巳木冰萬曆十四年冬蘇松木冰崇禎元年十一月陝西木冰樹枝盡折其後大河以北歲有此異木妖弘治八年長沙楓生李實黃蓮生黃瓜九年三月長寧楠生蓮花李生豆莢嘉靖三十七年十月戊辰泗水沙中湧出大杉木圍丈五尺長六丈餘隆慶五年四月杭州栗生桃萬曆十八年五月丁卯祖陵大松樹孔中吐火竟日方滅二十三年十二月癸亥皇陵樹顛火出延燒草木天啓六年四月癸巳白露著樹如垂綿日中不散十月辛酉南京西華門內有烟無火禮臣往視乃舊宮材木瘞土中久烟自生土石皆焦以水沃之三日始滅崇禎六年五月癸巳霍山縣有木甑飛墮不知所自來七年二月丁巳太康門牡自開者三知縣集邑紳議其事梁墮而死青眚青祥宣德元年八月辛巳東南天有青氣狀如人叉手揖拜
