body:
  text: 明史卷七十七志第五十三食貨一記曰取財於地而取法於天富國之本在於農桑明初沿元之舊錢法不通而用鈔又禁民間以銀交易宜若不便於民而洪永熙宣之際百姓充實府藏衍溢蓋是時劭農務墾闢土無萊蕪人敦本業又開屯田中鹽以給邊軍餫餉不仰藉於縣官故上下交足軍民胥裕其後屯田壞於豪強之兼並計臣變鹽法於是邊兵悉仰食太倉轉輸往往不給世宗以後耗財之道廣府庫匱竭神宗乃加賦重征礦稅四出移正供以實左藏中涓羣小橫斂侵漁民多逐末田卒汙萊吏不能拊循而覆侵刻之海內困敝而儲積益以空乏昧者多言復通鈔法可以富國不知國初之充裕在勤農桑而不在行鈔法也夫強本節用為理財之要明一代理財之道始所以得終所以失條其本末著於篇戶口田制屯田莊田太祖籍天下戶口置戶帖戶籍具書名歲居地籍上戶部帖給之民有司歲計其登耗以聞及郊祀中書省以戶籍陳壇下薦之天祭畢而藏之洪武十四年詔天下編賦役黃册以一百十戶為一里推丁糧多者十戶為長餘百戶為十甲甲凡十人歲役里長一人甲首一人董一里一甲之事先後以丁糧多寡為序凡十年一周曰排年在城曰坊近城曰廂鄉都曰里里編為册册首總為一圖魚衆寡孤獨不任役者附十甲後為畸零僧道給度牒有田者編册如民科無田者亦為畸零每十年有司更定其册以丁糧增減而升降之册凡四一上戶部其三則布政司府縣各存一焉上戶部者册面黃紙故謂之黃册年終進呈送後湖東西二庫庋藏之歲命戶科給事中一人御史二人戶部主事四人釐校訛舛其後黃册祇具文有司徵稅編徭則自為一册曰白册云凡戶三等曰民曰軍曰匠民有儒有醫有陰陽軍有校尉有力士弓鋪兵匠有廚役裁縫馬船之類瀕海有鹽竈寺有僧觀有道士畢以其業著籍人戶以籍為斷禁數姓合戶附籍漏口脫戶許自實里設老人選年高為衆所服者導民善平鄉里爭訟其人戶避徭役者曰逃戶年飢或避兵他徙者曰流民有故而出僑於外者曰附籍朝廷所移民曰移徙凡逃戶明初督令還本籍復業賜復一年老弱不能歸及不願歸者令在所著籍授田輸賦正統時造逃戶周知册核其丁糧凡流民英宗令勘籍編甲互保屬在所里長管轄之設撫民佐二官歸本者勞徠安輯給牛種口糧又從河南山西巡撫于謙言免流民復業者稅成化初荊襄寇亂流民百萬項忠楊璿為湖廣巡撫下令逐之弗率者戍邊死者無算祭酒周洪謨著流民説引東晉時僑置郡縣之法使近者附籍遠者設州縣以撫之都御史李賓上其説憲宗命原傑出撫招流民十二萬戶給間田置鄖陽府立上津等縣統治之河南巡撫張瑄亦請輯西北流民帝從其請凡附籍者正統時老疾致仕事故官家屬離本籍千里者許收附不及千里者發還景泰中令民籍者收附軍匠竈役冒民籍者發還其移徙者明初嘗徙蘇松嘉湖杭民之無田者四千餘戶往耕臨濠給牛種車糧以資遣之三年不征其稅徐達平沙漠徙北平山後民三萬五千八百餘戶散處諸府衛籍為軍者給衣糧民給田又以沙漠遺民三萬二千八百餘戶屯田北平置屯二百五十四開地千三百四十三頃復徙江南民十四萬於鳳陽戶部郎中劉九皋言古狹鄉之民聽遷之寬鄉欲地無遺利人無失業也太祖採其議遷山西澤潞民於河北後屢徙浙西及山西民於滁和北平山東河南又徙登萊青民於東昌兗州又徙直隸浙江民二萬戶於京師充倉腳夫太祖時徙民最多其間有以罪徙者建文帝命武康伯徐理往北平度地處之成祖核太原平陽澤潞遼沁汾丁多田少及無田之家分其丁口以實北平自是以後移徙者鮮矣初太祖設養濟院收無告者月給糧設漏澤園葬貧民天下府州縣立義冢又行養老之政民年八十以上賜爵復下詔優恤遭難兵民然懲元末豪強侮貧弱立法多右貧抑富嘗命戶部籍浙江等九布政司應天十八府州富民萬四千三百餘戶以次召見徙其家以實京師謂之富戶成祖時復選應天浙江富民三千戶充北京宛大二縣廂長附籍京師仍應本籍徭役供給日久貧乏逃竄輒選其本籍殷實戶僉補宣德間定制逃者發邊充軍官司鄰里隱匿者俱坐罪弘治五年始免解在逃富戶每戶徵銀三兩與廂民助役嘉靖中減為二兩以充邊餉太祖立法之意本倣漢徙富民實關中之制其後事久弊生遂為厲階戶口之數增減不一其可考者洪武二十六年天下戶一千六十五萬二千八百七十口六千五十四萬五千八百十二弘治四年戶九百十一萬三千四百四十六口五千三百二十八萬一千一百五十八萬曆六年戶一千六十二萬一千四百三十六口六千六十九萬二千八百五十六太祖當兵燹之後戶口顧極盛其後承平日久反不及焉靖難兵起淮以北鞠為茂草其時民數反增於前後乃遞減至天順間為最衰成弘繼盛正德以後又減戶口所以減者周忱謂投倚於豪門或冒匠竄兩京或冒引賈四方舉家舟居莫可蹤迹也而要之戶口增減由於政令張弛故宣宗嘗與羣臣論歷代戶口以為其盛也本於休養生息其衰也由土木兵戎殆篤論云明土田之制凡二等曰官田曰民田初官田皆宋元時入官田地厥後有還官田沒官田斷入官田學田皇莊牧馬草場城壖苜蓿地牲地園陵墳地公占隙地諸王公主勳戚大臣內監寺觀賜乞莊田百官職田邊臣養廉田軍民商屯田通謂之官田其餘為民田元季喪亂版籍多亡田賦無準明太祖即帝位遣周鑄等百六十四人核浙西田畝定其賦稅復命戶部核實天下土田而兩浙富民畏避徭役大率以田産寄他戶謂之鐵腳詭寄洪武二十年命國子生武淳等分行州縣隨糧定區區設糧長四人量度田畝方圓次以字號悉書主名及田之丈尺編類為册狀如魚鱗號曰魚鱗圖册先是詔天下編黃册以戶為主詳具舊管新收開除實在之數為四柱式而魚鱗圖册以土田為主諸原坂墳衍下隰沃瘠沙鹵之別畢具魚鱗册為經土田之訟質焉黃册為緯賦役之法定焉凡質賣田土備書稅糧科則官為籍記之毋令産去稅存以為民害又以中原田多蕪命省臣議計民授田設司農司開治河南掌其事臨濠之田驗其丁力計畝給之毋許兼並北方近城地多不治召民耕人給十五畝蔬地二畝免租三年每歲中書省奏天下墾田數少者畝以千計多者至二十餘萬官給牛及農具者乃收其稅額外墾荒者永不起科二十六年核天下土田總八百五十萬七千六百二十三頃蓋駸駸無棄土矣凡田以近郭為上地迤遠為中地下地五尺為步步二百四十為畝畝百為頃太祖仍元里社制河北諸州縣土著者以社分里甲遷民分屯之地以屯分里甲社民先占畝廣屯民新占畝狹故屯地謂之小畝社地謂之廣畝至宣德間墾荒田永不起科及汙下斥鹵無糧者皆核入賦額數溢於舊有司乃以大畝當小畝以符舊額有數畝當一畝者步尺參差不一人得以意贏縮土地不均未有如北方者貴州田無頃畝尺籍悉徵之土官而諸處土田日久頗淆亂與黃册不符弘治十五年天下土田止四百二十二萬八千五十八頃官田視民田得七之一嘉靖八年霍韜奉命修會典言自洪武迄弘治百四十年天下額田已減強半而湖廣河南廣東失額尤多非撥給於王府則欺隱於猾民廣東無藩府非欺隱即委棄於寇賊矣司國計者可不究心是時桂萼郭弘化唐龍簡霄先後疏請核實田畝而顧鼎臣請履畝丈量丈量之議由此起江西安福河南裕州首行之而法未詳具人多疑憚其後福建諸州縣為經緯二册其法頗詳然率以地為主田多者猶得上下其手神宗初建昌知府許孚遠為歸戶册則以田從人法簡而密矣萬曆六年帝用大學士張居正議天下田畝通行丈量限三載竣事用開方法以徑圍乘除畸零截補於是豪猾不得欺隱里甲免賠纍而小民無虛糧總計田數七百一萬三千九百七十六頃視弘治時贏三百萬頃然居正尚綜核頗以溢額為功有司爭改小弓以求田多或掊克見田以充虛額北直隸湖廣大同宣府遂先後按溢額田增賦云屯田之制曰軍屯曰民屯太祖初立民兵萬戶府寓兵於農其法最善又令諸將屯兵龍江諸處惟康茂才績最乃下令褒之因以申飭將士洪武三年中書省請稅太原朔州屯卒命勿徵明年中書省言河南山東北平陝西山西及直隸淮安諸府屯田凡官給牛種者十稅五自備者十稅三詔且勿徵三年後畝收租一斗六年太僕丞梁野仙帖木爾言寧夏境內及四川西南至船城東北至塔灘相去八百里土膏沃宜招集流亡屯田從之是時遣鄧愈湯和諸將屯陝西彰德汝寧北平永平徙山西真定民屯鳳陽又因海運餉遼有溺死者遂益講屯政天下衛所州縣軍民皆事墾闢矣其制移民就寬鄉或召募或罪徙者為民屯皆領之有司而軍屯則領之衛所邊地三分守城七分屯種內地二分守城八分屯種每軍受田五十畝為一分給耕牛農具教樹植復租賦遣官勸輸誅侵暴之吏初畝稅一斗三十五年定科則軍田一分正糧十二石貯屯倉聽本軍自支餘糧為本衛所官軍俸糧永樂初定屯田官軍賞罰例歲食米十二石外餘六石為率多者賞鈔缺者罰俸又以田肥瘠不同法宜有別命官軍各種樣田以其歲收之數相考較太原左衛千戶陳淮所種樣田每軍餘糧二十三石帝命重賞之寧夏總兵何福積穀尤多賜敕褒美戶部尚書郁新言湖廣諸衛收糧不一種請以米為準凡粟穀穈黍大麥蕎穄二石稻穀秫二石五斗穇稗三石皆準米一石小麥芝麻豆與米等從之著為令又更定屯守之數臨邊險要守多於屯地僻處及輸糧艱者屯多於守屯兵百名委百戶三百名委千戶五百名以上指揮提督之屯設紅牌列則例於上年六十與殘疾及幼者耕以自食不限於例屯軍以公事妨農務者免徵子粒且禁衛所差撥於時東自遼左北抵宣大西至甘肅南盡滇蜀極於交址中原則大河南北在在興屯矣宣宗之世屢核各屯以征戍罷耕及官豪勢要占匿者減餘糧之半迤北來歸就屯之人給車牛農器分遼東各衛屯軍為三等丁牛兼者為上丁牛有一為中俱無者為下英宗免軍田正糧歸倉止徵餘糧六石後又免沿邊開田官軍子粒減各邊屯田子粒有差景帝時邊方多事令兵分為兩番六日操守六日耕種成化初宣府巡撫葉盛買官牛千八百並置農具遣軍屯田收糧易銀以補官馬耗損邊人稱便自正統後屯政稍弛而屯糧猶存三之二其後屯田多為內監軍官占奪法盡壞憲宗之世頗議釐復而視舊所入不能什一矣弘治間屯糧愈輕有畝止三升者沿及正德遼東屯田較永樂間田贏萬八千餘頃而糧乃縮四萬六千餘石初永樂時屯田米常溢三之一常操軍十九萬以屯軍四萬供之而受供者又得自耕邊外軍無月糧以是邊餉足及是屯軍多逃死常操軍止八萬皆仰給於倉而邊外數擾棄不耕劉瑾擅政遣官分出丈田責逋希瑾意者偽增田數搜括慘毒戶部侍郎韓福尤急刻遼卒不堪脅衆為亂撫之乃定明初募鹽商於各邊開中謂之商屯逮弘治中葉淇變法而開中始壞諸淮商悉撤業歸西北商亦多徙家於淮邊地為墟米石直銀五兩而邊儲枵然矣世宗時楊一清復請召商開中又請倣古募民實塞下之意招徠隴右關西民以屯邊其後周澤王崇古林富陳世輔王畿王朝用唐順之吳桂芳等爭言屯政而龐尚鵬總理江北鹽屯尋移九邊與總督王崇古先後區畫屯政甚詳然是時因循日久卒鮮實效給事中管懷理言屯田不興其弊有四疆埸戒嚴一也牛種不給二也丁壯亡徙三也田在敵外四也如是而管屯者猶欲按籍增賦非扣月糧即按丁賠補耳屯糧之輕至弘正而極嘉靖中漸增隆慶間復畝收一斗然屯丁逃亡者益多管糧郎中不問屯田有無月糧止半給沿邊屯地或變為斥鹵沙磧糧額不得減屯田御史又於額外增本折屯軍益不堪命萬曆時計屯田之數六十四萬四千餘頃視洪武時虧二十四萬九千餘頃田日減而糧日增其弊如此時則山東巡撫鄭汝璧請開登州海北長山諸島田福建巡撫許孚遠墾閩海壇山田成復請開南日山澎湖又言浙江濱海諸山若陳錢金塘補陀玉環南麂皆可經理天津巡撫汪應蛟則請於天津興屯或留中不下或不久輒廢熹宗之世巡按張慎言復議天津屯田而御史左光斗命管河通判盧觀象大興水田之利太常少卿董應舉踵而行之光斗更於河間天津設屯學試騎射為武生給田百畝李繼貞巡撫天津亦力於屯務然仍歲旱蝗弗克底成效也明時草場頗多占奪民業而為民厲者莫如皇莊及諸王勳戚中官莊田為甚太祖賜勳臣公侯丞相以下莊田多者百頃親王莊田千頃又賜公侯暨武臣公田又賜百官公田以其租入充祿指揮沒於陳者皆賜公田勳臣莊佃多倚威扞禁帝召諸臣戒諭之其後公侯復歲祿歸賜田於官仁宣之世乞請漸廣大臣亦得請沒官莊舍然寧王權請灌城為庶子耕牧地帝賜書援祖制拒之至英宗時諸王外戚中官所在占官私田或反誣民占請案治比案問得實帝命還之民者非一乃下詔禁奪民田及奏請畿內地然權貴宗室莊田墳塋或賜或請不可勝計御馬太監劉順家人進薊州草場進獻由此始宦官之田則自尹奉喜寧始初洪熙時有仁壽宮莊其後又有清寧未央宮莊天順三年以諸王未出閣供用浩繁立東宮德王秀王莊田二王之藩地仍歸官憲宗即位以沒入曹吉祥地為宮中莊田皇莊之名由此始其後莊田遍郡縣給事中齊莊言天子以四海為家何必置立莊田與貧民較利弗聽弘治二年戶部尚書李敏等以災異上言畿內皇莊有五共地萬二千八百餘頃勳戚中官莊田三百三十有二共地三萬三千餘頃管莊官校招集羣小稱莊頭伴當占地土斂財物汙婦女稍與分辨輒被誣奏官校執縛舉家驚惶民心傷痛入骨災異所由生乞革去管莊之人付小民耕種畝徵銀三分充各宮用度帝命戒飭莊戶又因御史言罷仁壽宮莊還之草場且命凡侵牧地者悉還其舊又定制獻地王府者戍邊奉御趙瑄獻雄縣地為皇莊戶部尚書周經劾其違制下瑄詔獄敕諸王輔導官導王奏請者罪之然當日奏獻不絶乞請亦愈繁徽興岐衡四王田多至七千餘頃會昌建昌慶雲三侯爭田帝輒賜之武宗即位踰月即建皇莊七其後增至三百餘處諸王外戚求請及奪民田者無算世宗初命給事中夏言等清核皇莊田言極言皇莊為厲於民自是正德以來投獻侵牟之地頗有給還民者而宦戚輩復中撓之戶部尚書孫交造皇莊新册額減於舊帝命核先年頃畝數以聞改稱官地不名皇莊詔所司徵銀解部然多為宦寺中飽積逋至數十萬以為常是時禁勳戚奏討姦民投獻者又革王府所請山場湖陂德王請齊漢二庶人所遺東昌兗州間田又請白雲等湖山東巡撫邵錫按新令却之語甚切德王爭之數四帝仍從部議但存藩封初請莊田其後有奏請者不聽又定凡公主國公莊田世遠者存什三嘉靖三十九年遣御史沈陽清奪隱冒莊田萬六千餘頃穆宗從御史王廷瞻言復定世次遞減之限勳臣五世限田二百頃戚畹七百頃至七十頃有差初世宗時承天六莊二湖地八千三百餘頃領以中官又聽校舍兼並增八百八十頃分為十二莊至是始領之有司兼並者還民又著令宗室買田不輸役者沒官皇親田俱令有司徵之如勳臣例雖請乞不乏而賜額有定徵收有制民害少衰止神宗賚豫過侈求無不獲潞王壽陽公主恩最渥而福王分封括河南山東湖廣田為王莊至四萬頃羣臣力爭乃減其半王府官及諸閹丈地徵稅旁午於道扈養厮役廩食以萬計漁斂慘毒不忍聞駕帖捕民格殺莊佃所在騷然給事中官應震姚宗文等屢疏諫皆不報時復更定勳戚莊田世次遞減法視舊制稍寬其後應議減者輒奉詔姑留不能革也熹宗時桂惠瑞三王及遂平寧德二公主莊田動以萬計而魏忠賢一門橫賜尤甚蓋中葉以後莊田侵奪民業與國相終云
