body:
  text: 明史卷一百六十四列傳第五十二鄒緝鄭維桓柯暹弋謙黃驥黃澤孔友諒范濟聊讓郭佑胡仲倫華敏賈斌左鼎練綱曹凱許仕達劉煒尚褫單宇姚顯楊浩張昭賀煬高瑤虎臣鄒緝字仲熙吉水人洪武中舉明經授星子教諭建文時入為國子助教成祖即位擢翰林侍講立東宮兼左中允屢署國子監事永樂十九年三殿災詔求直言緝上疏曰陛下肇建北京焦勞聖慮幾二十年工大費繁調度甚廣冗官蠶食耗費國儲工作之夫動以百萬終歲供役不得躬親田畝以事力作猶且征求無藝至伐桑棗以供薪剝桑皮以為楮加之官吏橫征日甚一日如前歲買辦顏料本非土産動科千百民相率斂鈔購之他所大青一斤價至萬六千貫及進納又多留難往復展轉當須二萬貫鈔而不足供一柱之用其後既遣官采之産所而買辦猶未止蓋緣工匠多派牟利而不顧民艱至此夫京師天下根本人民安則京師安京師安則國本固而天下安自營建以來工匠小人假託威勢驅迫移徙號令方施廬舍已壞孤兒寡婦哭泣叫號倉皇暴露莫知所適遷移甫定又復驅令他徙至有三四徙不得息者及其既去而所空之地經月逾時工猶未及此陛下所不知而人民疾怨者也貪官污吏遍布內外剝削及於骨髓朝廷每遣一人即是其人養活之計虐取苛求初無限量有司承奉惟恐不及間有廉強自守不事干媚者輒肆讒毀動得罪譴無以自明是以使者所至有司公行貨賂剝下媚上有同交易夫小民所積幾何而內外上下誅求如此今山東河南山西陝西水旱相仍民至剝樹皮掘草根以食老幼流移顛踣道路賣妻鬻子以求苟活而京師聚集僧道萬餘人日耗廩米百餘石此奪民食以養無用也至報效軍士朝廷厚與糧賜及使就役乃驕傲橫恣間遊往來此皆姦詭之人懼還原伍假此規避非真有報效之心也朝廷歲令天下織錦鑄錢遣內官買馬外蕃所出常數千萬而所取曾不能一二馬至雖多類皆駑下責民牧養騷擾殊甚及至死傷輒令賠補馬戶貧困更鬻妻子此尤害之大者漠北降人賜居室盛供帳意欲招其同類也不知來者皆懷窺覘非真遠慕王化甘去鄉土宜於來朝之後遣歸本國不必留為後日子孫患至宮觀禱祠之事有國者所當深戒古人有言淫祀無福況事無益以害有益蠹財妄費者乎凡此數事皆下失民心上違天意怨讟之興實由於此夫奉天殿者所以朝羣臣發號令古所謂明堂也而災首及焉非常之變也非省躬責己大布恩澤改革政化疏滌天下窮困之人不能回上天譴怒前有監生生員以單丁告乞侍親因而獲罪遣戍者此實有虧治體近者大赦法司執滯常條當赦者尚復拘繫並乞重加湔洗蠲除租賦一切勿征有司百官全其廩祿拔簡賢才申行薦舉官吏貪贓蠹政者核其罪而罷黜之則人心歡悅和氣可臻所以保安宗社為國家千萬年無窮之基莫有大於此者矣且國家所恃以久長者惟天命人心而天命常視人心為去留今天意如此不宜勞民當還都南京奉謁陵廟告以災變之故保養聖躬休息於無為毋聽小人之言復有所興作以誤陛下於後也書奏不省時三殿初成帝方以定都詔天下忽罹火災頗懼下詔求直言及言者多斥時政帝不懌而大臣復希旨詆言者帝於是發怒謂言事者謗訕下詔嚴禁之犯者不赦侍讀李時勉侍講羅汝敬俱下獄御史鄭維桓何忠羅通徐瑢給事中柯暹俱左官交址惟緝與主事高公望庶吉士楊復得無罪是年冬緝進右庶子兼侍講明年九月卒於官緝博極羣書居官勸慎清操如寒士子循宣德中為翰林待詔請贈父母帝諭吏部曰曩皇祖征沙漠朕守北京緝在左右陳說皆正道良臣也其豫之鄭維桓慈溪人永樂十三年進士出知交址南清州卒柯暹池州建德人由鄉舉出知交址歡州纍官浙江雲南按察使弋謙代州人永樂九年進士除監察御史出按江西言事忤旨貶峽山知縣復坐事免歸仁宗在東宮素知謙骨鯁及嗣位召為大理少卿直陳時政言官吏貪殘政事多非洪武之舊及有司誅求無藝帝多採納既復言五事詞太激帝乃不懌尚書呂震吳中侍郎吳廷用大理卿虞謙等因劾謙誣罔都御史劉觀令衆御史合糾謙帝召楊士奇等言之士奇對曰謙不諳大體然心感超擢恩欲圖報耳主聖則臣直惟陛下優容之帝乃不罪謙然每見謙詞色甚厲士奇從容言陛下詔求直言謙言不當觸怒外廷悚惕以言為戒今四方朝覲之臣皆集闕下見謙如此將謂陛下不能容直言帝惕然曰此固朕不能容亦呂震輩迎合以益朕過自今當置之遂免謙朝參令專視司事未幾帝以言事者益少復召士奇曰朕怒謙矯激過實耳朝臣遂月餘無言爾語諸臣白朕心士奇曰臣空言不足信乞親降璽書遂令就榻前書敕引過曰朕自即位以來臣民上章以數百計未嘗不欣然聽納苟有不當不加譴訶羣臣所共知也間者大理少卿弋謙所言多非實事羣臣迎合朕意交章奏其賣直請置諸法朕皆拒而不聽但免謙朝參而自是以來言者益少今自去冬無雪春亦少雨陰陽愆和必有其咎豈無可言而為臣者懷自全之計退而默默何以為忠朕於謙一時不能含容未嘗不自愧咎爾羣臣勿以前事為戒於國家利弊政令未當者直言勿諱謙朝參如故時中官採木四川貪橫帝以謙清直命往治之擢謙副都御史賜鈔以行遂罷採木之役宣德初交址右布政戚遜以貪淫黜命謙往代王通棄交址謙亦論死正統初釋為民土木之變謙布衣走闕下薦通及寧懋阮遷等十三人皆奇才可用衆議以通副石亨謙請專任通事遂寢廷臣以謙負重名奏留之亦不報景泰二年復至京疏薦通等不納罷歸未幾卒仁宗性寬大容直言謙以故得無罪反責呂震等而黃驥言西域事帝亦誚震而行其言驥全州人洪武中中鄉舉為沙縣教諭永樂時擢禮科給事中常三使西域仁宗初上疏言西域貢使多商人假托無賴小人投為從者乘傳役人運貢物至京師賞賚優厚番人慕利貢無虛月致民失業妨農比其使還多齎貨物車運至百餘輛丁男不足役及婦女所至辱驛官鞭夫隸無敢與較者乞敕陝西行都司惟哈密諸國王遣使入貢者許令來京止正副使得乘驛馬陝人庶少蘇至西域所産惟馬切邊需應就給甘肅軍士其碙砂梧桐之類皆無益國用請一切勿受則來者自稀浮費益省帝以示尚書呂震且讓之曰驥嘗奉使悉西事卿西人顧不悉邪驥言是其即議行後遷右通政與李琦羅汝敬撫諭交址不辱命使還尋卒黃澤閩縣人永樂十年進士擢河南左參政南陽多流民拊循使復業嘗率丁役至北京周恤備至久之調湖廣仁宗即位入覲言時政多見采宣宗立下詔求言澤上疏言正心恤民敬天納諫練兵重農止貢獻明賞罰遠嬖幸汰冗官十事其言遠嬖幸曰刑餘之人其情幽陰其慮險譎大姦似忠大詐似信大巧似愚一與之親如飲醇酒不知其醉如噬甘臘不知其毒寵之甚易遠之甚難是以古者宦寺不使典兵干政所以防患於未萌也涓涓弗塞將為江河此輩宜一切疏遠勿使用事漢唐已事彰彰可監當成祖時宦官稍稍用事宣宗寖以親幸澤於十事中此為尤切帝雖嘉歎不能用也其後設內書堂而中人多通書曉文義宦寺之盛自宣宗始宣德三年擢浙江布政使復上言平陽麗水等七縣銀冶宜罷並請盡罷諸坑冶語甚切帝歎息曰民困若此朕何由知遣官驗視酌議以聞澤在官有政績然多暴怒鹽運使丁鎡不避道撻之為所奏巡按御史馬謹亦劾澤九載秩滿自出行縣斂白金三千兩償官物且越境過家遂逮下獄正統六年黜為民初澤奏金華台州戶口較洪武時耗減而歲造弓箭如舊乞減免下部議得允而澤已罷官踰月矣孔友諒長洲人永樂十六年進士改庶吉士出知雙流縣宣宗初上言六事一曰守令親民之官古者不拘資格必得其人不限歲月使盡其力今居職者多不知撫字之方而廉幹得民心者又遷調不常差遣不一或因小事連纍朝夕營治往來道路日不暇給乞敕吏部擇才望素優及久歷京官者任之諭戒上司毋擅差遣假以歲月責成治效至遠缺佐二多經裁減獨員居職或遇事赴京多委雜職署事因循苟且政令無常民不知畏今後路遠之缺常留一正員任事不得擅離庶法有常守二曰科舉所以求賢必名實相副非徒誇多而已今秋闈取士動一二百人弊既多端僥幸過半會試下第十常八九其登第者實行或乖請於開科之歲詳核諸生行履孝弟忠信學業優贍者乃許入試庶浮薄不致濫收而國家得真才之用三曰祿以養廉祿入過薄則生事不給國朝制祿之典視前代為薄今京官及方面官稍增俸祿其餘大小官自折鈔外月不過米二石不足食數人仰事俯育與道路往來費安所取資貪者放利行私廉者終窶莫訴請敕戶部勘實天下糧儲以歲支之餘量增官俸仍令內外風憲官採訪廉潔之吏重加旌賞則廉者知勸貪者知戒四曰古者賦役量土宜驗丁口不責所無不盡所有今自常賦外復有和買採辦諸事自朝廷視之不過令有司支官錢平買而無賴之輩關通吏胥壟斷貨物巧立辨驗折耗之名科取數倍姦弊百端乞盡停採買減諸不急務則國賦有常民無科擾其二事言汰冗員任風憲言者多及之不具載宣德八年命吏部擇外官有文學者六十八人試之得友諒及進士胡端禎等七人悉令辦事六科居二年皆授給事中惟友諒未授官而卒范濟元進士洪武中以文學舉為廣信知府坐纍謫戍興州宣宗即位濟年八十餘矣詣闕言八事其一曰楮幣之法昉於漢唐元造元統交鈔後又造中統鈔久而物重鈔輕公私俱敝乃造至元鈔與中統鈔兼行子母相權新陳通用又令民間以昏鈔赴平準庫中統鈔五貫得換至元鈔一貫又其法日造萬錠共計官吏俸稍內府供用若干天下正稅雜課若干斂發有方周流不滯以故久而通行太祖皇帝造大明寶鈔以鈔一貫當白金一兩民歡趨之迄今五十餘年其法稍弊亦由物重鈔輕所致願陛下因時變通重造寶鈔一準洪武初制使新舊兼行取元時所造之數而增損之審國家度支之數而權衡之俾鈔少而物多鈔重而物輕嚴僞造之條開倒換之法推陳出新無耗無阻則鈔法流通永永無弊其二曰備邊之道守險為要若朔州大同開平宣府大寧乃京師之藩垣邊徼之門戶土可耕城可守宜盛兵防禦廣開屯田修治城堡謹烽火明斥堠毋貪小利毋輕遠求堅壁清野使無所得俟其憊而擊之得利則止毋窮追深入此守邊大要也其三曰兵不在多在於堪戰比者多發為事官吏人民充軍塞上非白面書生則老弱病廢遇有征行有力者得免貧弱者備數器械不完糗糧不具望風股栗安能效死今宜選其壯勇勤加訓練餘但令乘城擊柝趨走牙門庶幾各得其用其四曰民病莫甚於勾軍衛所差官至六七員百戶差軍旗亦二三人皆有力交結及畏避征調之徒重賄得遣既至州縣擅作威福迫脅里甲恣為姦私無丁之家誅求不已有丁之戶詐稱死亡託故留滯久而不還及還則以所得財物遍賄官吏朦朧具覆究其所取之丁十不得一欲軍無缺伍難矣自今軍士有故令各衛報都督府及兵部府部諜布政按察司令府州縣準籍貫姓名勾取送衛則差人騷擾之弊自絶其五曰洪武中令軍士七分屯田三分守城最為善策比者調度日繁興造日廣虛有屯種之名田多荒蕪兼養馬採草伐薪燒炭雜役旁午兵力焉得不疲農業焉得不廢願敕邊將課卒墾荒限以頃畝官給牛種稽其勤惰明賞罰以示勸懲則塞下田可盡墾轉餉益紓諸邊富實計無便於此者其六曰學校者風化之源人材所自出貴明體適用非徒較文藝而已也洪武中妙選師儒教養甚備人材彬彬可觀邇來士習委靡立志不弘執節不固平居無剛方正大之氣安望其立朝為名公卿哉宜選良士為郡縣學官擇民間子弟性行端謹者為生徒訓以經史勉以節行俟其有成貢於國學磨礱砥礪使其氣充志定卓然成材然後舉而用之以任天下國家事無難矣其七曰兵者凶器聖人不得已而用之漢高祖解平城之圍未聞蕭曹勸以復讎唐太宗禦突厥於便橋未聞房杜勸以報怨古英君良相不欲疲民力以誇武功計慮遠矣洪武初年嘗赫然命將欲清沙漠既以餽運不繼旋即頒師遂撤東勝衛於大同塞山西陽武谷口選將練兵扼險以待內修政教外嚴邊備廣屯田興學校罪貪吏徙頑民不數年間朵兒只巴獻女伯顏帖木兒乃兒不花等相繼擒獲納哈出亦降此專務內治不勤遠略之明效也伏望遠鑒漢唐近法太祖毋以窮兵黷武為快毋以犁庭掃穴為功棄捐不毛之地休養冠帶之民俾竭力於田桑盡心於庠序邊塞絶傷痍之苦閭里絶呻吟之聲將無幸功士無夭閼遠人自服荒外自歸國祚靈長於萬年矣其八曰官不在衆在乎得人國家承大亂後因時損益以府為州以州為縣繼又裁併小縣之糧不及俸者量民數以設官民多者縣設丞簿少者知縣典史而已其時官無廢事民不愁勞今藩臬二司及府州縣官視洪武中再倍政愈不理民愈不寧姦弊叢生詐僞滋起甚有官不能聽斷吏不諳文移乃容留書寫之人在官影射賄賂公行獄訟淹滯皆官冗吏濫所致也望斷自宸衷凡內外官吏並依洪武中員額冗濫者悉汰則天工無曠庶績咸熙而天下大治矣奏上命廷臣議之尚書呂震以為文辭冗長且事多已行不足采帝曰所言甚有學識多契朕心當察其素履以聞震乃言濟故元進士曾守郡坐事戍邊帝曰惜哉斯人令久淹行伍今猶足用震曰年老矣帝曰國家用人正須老成但不宜任以繁劇乃以濟為儒學訓導聊讓蘭州人肅府儀衛司餘丁也好學有志尚明習時務景帝嗣位懲王振蒙蔽大闢言路吏民皆得上書言事景泰元年六月讓詣闕陳數事其略曰邇歲土木繁興異端盛起番僧絡驛污吏縱橫相臣不正其非御史不劾其罪上下蒙蔽民生凋瘵狡寇犯邊上皇播越陛下枕戈嘗膽之秋可不拔賢舉能一新政治乎昔宗嶽為將敵國不敢呼名韓范鎮邊西賊聞之破膽司馬光居相位強鄰戒勿犯邊今文武大臣之有威名德望者宜使典樞要且延訪智術才能之士布滿朝廷則也先必畏服而上皇可指日還矣大臣陽也宦寺陰也君子陽也小人陰也近日食地震陰盛陽微謫見天地望陛下總攬乾綱抑宦寺使不得預政遏小人俾不得居位則陰陽順而天變弭矣天下治亂在君心邪正田獵是娛宮室是侈宦寺是狎三者有一足蠱君心願陛下涵養克治多接賢士大夫少親宦官宮妾自能革奢靡戒遊佚而心無不正矣堯立謗木恐人不言所以聖秦除諡法恐人議己所以亡陛下廣從諫之量旌直言之臣則國家利弊閭閻休戚臣下無所顧忌而言無不盡矣蘇子曰平居無犯顏敢諫之臣則臨難必無仗節死義之士願陛下念是言而審察之書奏帝頗嘉納之後四年讓登進士官知縣卒景泰二年監生郭佑亦上書言兵事略曰逆寇犯順上皇蒙塵此千古非常之變百世必報之讎也今使臣之來動以數千務驕蹇責望於我而我乃隱忍姑息致賊勢日張我氣日索求和與和求戰與戰是和戰之權不在我而在賊也願陛下結人心親賢良以固國本廣儲蓄練將士以壯國氣正分定名裁之以義如桀驁侵軼則提兵問罪使大漠之南不敢有匹馬闌入乃可保百年無虞不然西北力罷東南財竭不能一日安枕矣昨以國用耗乏謀國大臣欲紓一時之急令民納粟者賜冠帶今軍旅稍寧行之如故農工商販之徒不較賢愚惟財是授驕親戚誇鄉里長非分之邪心贓污吏罷退為民欲掩閭黨之恥納粟納草冠帶而歸前以冒貨去職今以輸貨得官何以禁貪殘重名爵況天下統一藏富在民未至大不得已而舉措如此是以空乏啓寇心也章下廷議格不行又有胡仲倫者雲南鹽課提舉司吏目也緣事入都會上皇北狩也先欲妻以妹上皇因遣廣寧伯劉安入言於帝仲倫上疏爭之言今日事不可屈者有七降萬乘之尊與諧婚媾一也敵假和議使我無備二也必欲為姻驕尊自大三也索金帛使我坐困四也以送駕為名乘機入犯五也逼上皇手詔誘取邊城六也欲求山後之地七也稍從其一大事去矣曩上皇在位王振專權忠諫者死鯁直者戍君子見斥小人驟遷章奏多決中旨黑白混淆邪正倒置閩浙之寇方殷瓦剌之釁大作陛下宜親賢遠姦信賞必罰通上情達下志賣國之姦無所投隙倉卒之變末由發機朝廷自此尊天下自此安矣帝嘉納焉又有華敏者南京錦衣衛軍餘也意氣慷慨讀書通大義憤王振亂國與儕輩言輒裂眥怒詈景泰三年九月上書曰近年以來內官袁琦唐受喜寧王振專權害政致國事傾危望陛下防微杜漸總攬權綱為子孫萬世法不然恐禍稔蕭牆曹節侯覽之害復見於今日臣雖賤陋不勝痛哭流涕謹以虐軍害民十事為陛下痛切言之內官家積金銀珠玉纍室兼籯從何而至非內盜府藏則外朘民膏害一也怙勢矜寵占公侯邸舍興作工役勞擾軍民害二也家人外親皆市井無籍之子縱橫豪悍任意作奸納粟補官貴賤淆雜害三也建造佛寺耗費不資營一己之私破萬家之産害四也廣置田莊不入賦稅寄戶郡縣不受征徭阡陌連亙而民無立錐害五也家人中鹽虛占引數轉而售人倍支巨萬壞國家法豪奪商利害六也奏求塌房邀接商旅倚勢賒買恃強不償行賈坐敝莫敢誰何害七也賣放軍匠名為伴當俾辦月錢致內府監局營作乏人工役煩重並力不足害八也家人貿置物料所司畏懼以一科十虧官損民害九也監作所至非法酷刑軍匠塗炭不勝怨酷害十也章下禮部寢不行又有賈斌者商河人山西都司令史也亦疏言宦官之害引漢桓帝唐文宗宋徽欽為戒且獻所輯忠義集四卷採史傳所記直諫盡忠守節之士而宦官恃寵蠹政可為鑒戒者附焉乞命工刊布禮部以其言當乞垂鑒納不必刊行帝報聞左鼎字周器永新人正統七年進士明年都御史王文以御史多闕請會吏部於進士選補帝從之尚書王直考鼎及白圭等十餘人曉諳刑名皆授御史而鼎得南京尋改北巡按山西時英宗北狩兵荒洊臻請蠲太原諸府稅糧停大同轉餉夫以蘇其困也先請和抗言不可尋以山東河南饑遣鼎巡視民賴以安律官吏故勘平人致死者抵罪時以給事中于泰言悉得寬貰鼎言小民無知情貸可也官吏深文巧詆與故殺何異法者天下之公不可意為輕重自是論如律景泰四年疏言瓦剌變作將士無用由軍政不立謂必痛懲前弊乃今又五年矣貂蟬盈座悉屬公侯鞍馬塞途莫非將帥民財歲耗國帑日虛以天下之大土地兵甲之衆曾不能振揚威武則軍政仍未立也昔太祖定律令至太宗暫許有罪者贖蓋權宜也乃法吏拘牽沿為成例官吏受枉法財悉得減贖骫骳如此復何顧憚哉國初建官有常近始因事增設主事每司二人今有增至十人者矣御史六十人今則百餘人矣甚至一部有兩尚書侍郎亦倍常額都御史以數十計此京官之冗也外則增設撫民管屯官如河南參議益二而為四僉事益三而為七此外官之冗也天下布按二司各十餘人乃歲遣御史巡視復遣大臣巡撫鎮守夫今之巡撫鎮守即曩之方面御史也為方面御史則合衆人之長而不足為巡撫鎮守則任一人之智而有餘有是理邪至御史遷轉太驟當以六年為率令其通達政事然後可以治人巡按所係尤重毋使初任之員漫然嘗試其餘百執事皆當慎擇而久任之帝頗嘉納未幾復言國家承平數十年公私之積未充一遇軍興抑配橫徵鬻官市爵率行衰世苟且之政此司邦計者過也臣請痛抑末技嚴禁遊惰斥異端使歸南畝裁冗員以省虛糜開屯田而實邊料士伍而紓餉寺觀營造供佛飯僧以及不急之工無益之費悉行停罷專以務農重粟為本而躬行節儉以先之然後可阜民而裕國也倘忽不加務任掊克聚斂之臣行朝三暮四之術民力已盡而征發無已民財已竭而賦斂日增苟紓目前之急不恤意外之虞臣竊懼焉章下戶部尚書金濂請解職帝不許鼎言亦不盡行踰月以災異偕同官陳救弊恤民七事末言大臣不乏奸回宜黜罷其尤用清政本帝善其言下詔甄別而大臣辭職並慰留給事中林聰請明諭鼎等指實劾奏鼎聰等乃共論吏部尚書何文淵刑部尚書俞士悅工部侍郎張敏通政使李錫不職狀錫罷文淵致仕鼎居官清勤卓有聲譽御史練綱以敢言名而鼎尤善為章奏京師語曰左鼎手練綱口自公卿以下咸憚之鼎出為廣東右參政會英宗復位以郭登言召為左僉都御史踰年卒練綱字從道長洲人祖則成洪武時御史綱舉鄉試入國子監歷事都察院郕王監國上中興八策也先將入犯復言和議不可就南遷不可從有持此議者宜立誅安危所倚惟于謙石亨當主中軍而分遣大臣守九門擇親王忠孝著聞者令同守臣勤王檄陝西守將調番兵入衛帝悉從之綱有才辨急功名都御史陳鎰尚書俞士悅皆綱同里念綱數陳時政有聲且畏其口遂薦之授御史景泰改元上時政五事巡視兩淮鹽政駙馬都尉趙輝侵利劾奏之三年冬偕同官應詔陳八事並允行亡何復偕同官上言吏部推選不公任情高下請置尚書何文淵右侍郎項文曜於理尚書王直左侍郎俞山素行本端為文曜等所罔均宜按問帝雖不罪終以綱等為直明年命出贊延綏軍務自陳名輕責重乞授僉都御史帝曰遷官可自求耶遂寢其命初京師戒嚴募四方民壯分營訓練歲久多逃或赴操不如期廷議編之尺籍綱等言召募之初激以忠義許事定罷遣今展轉輪操已孤所望況其逃亡實迫寒餒豈可遽著軍籍邊方多故倘更召募誰復應之詔即除前令五年巡按福建與按察使楊王玉互訐俱下吏謫王玉黃州知府綱邠州判官久之卒曹凱字宗元益都人正統十年進士授刑科給事中磊落多壯節英宗北征諫甚力且曰今日之勢大異澶淵彼文武忠勇士馬徑悍今中貴竊權人心玩愒此輩不惟以陛下為孤注即懷愍徽欽亦何暇恤帝不從乘輿果陷凱痛哭竟日聲徹禁庭與王竑共擊馬順至死景泰中遷左給事中林聰劾何文淵周旋詔宥之凱上殿力諍二人遂下吏時令輸豆得補官凱爭曰近例輸豆四千石以上授指揮彼受祿十餘年費已償矣乃令之世襲是以生民膏血養無功子孫而彼取息長無窮也有功者必相謂曰吾以捐軀獲此彼以輸豆亦獲此是朝廷以我軀命等於荏菽其誰不解體乞自今惟令帶俸不得任事傳襲文職則止原籍帶俸帝以為然命已授者如故未授者悉如凱議福建巡按許仕達與侍郎薛希璉相訐命凱往勘用薦擢浙江右參政時諸衛武職役軍辦納月錢至四千五百餘人以凱言禁止鎮守都督李信擅募民為軍糜餉萬餘石凱劾奏之信雖獲宥諸助信募軍者咸獲罪在浙數年聲甚著初凱為給事常劾武清侯石亨亨得志修前憾謫凱衛經歷卒許仕達歙人正統十年進士擢御史景泰元年四月上疏言災沴數見請帝痛自修省帝深納之未幾復請於經筵之餘日延儒臣講論經史帝亦優詔褒答巡按福建劾鎮守中官廖秀下之獄秀訐仕達下鎮守侍郎薛希璉等廉問會仕達亦劾希璉貪縱乃命凱及御史王豪往勘還奏兩人互有虛實而耆老數千人乞留仕達給事中林聰閩人也亦為仕達言乃命留任且敕希璉勿搆郤仕達厲風紀執漳州知府馬嗣宗送京師大理寺劾其擅執帝以執贓吏不問期滿當代耆老詣闕請留不許未幾即以為福建左參政天順中歷山東貴州左右布政使劉煒字有融慈溪人正統四年進士授南京刑科給事中副都御史周銓以私憾撻御史諸御史范霖楊永與尚褫等十人共劾銓煒與同官盧祥等復劾之銓下詔獄亦訐霖永及煒祥等王振素惡言官盡逮下詔獄霖永坐絞後減死他御史或戍或謫煒祥事白留任而銓已先瘐死煒纍進都給事中景泰四年戶部以邊儲不足奏令罷退官非贓罪者輸米二十石給之誥敕煒等言考退之官多有罷軟酷虐荒溺酒色廉恥不立者非止贓罪已也賜之誥敕以何為辭若但褒其納米則是朝廷誥敕止直米二十石何以示天下後世此由尚書金濂不識大體有此謬舉帝立為已之山東歲歉戶部以尚書沈翼習其地民瘼請令往振及往初無方略煒因劾翼且言其地已有尚書薛希璉少卿張固鎮撫又有侍郎鄒幹都御史王竑振濟而復益之以翼所謂十羊九牧乞還翼南京戶部而專以命希璉等從之平江侯陳豫鎮臨清事多違制煒劾之豫被責讓明年都督黃以易儲議得帝眷奏求霸州武清縣地煒等抗章言本蠻僚遽蒙重任怙寵妄干乞地六七十里豈盡無主者請正其罪帝宥遣戶部主事黃岡謝往勘還奏果民産戶部再請罪帝卒宥焉官至貴州巡撫以清慎稱煒天順初出為雲南參政改廣東分守惠潮二府潮有巨寇招之不服會兵進剿誅其魁改涖南韶會大軍征兩廣以勞瘁卒官尚褫字景福羅山人正統四年進士除行人上書請毋囚繫大臣擢南御史以劾周銓下獄與他御史皆謫驛丞得雲南虛仁驛景泰五年冬因災異上書陳數事中言忠直之士冒死陳言執政者格以條例輕則報罷重則中傷是言路雖開猶未開也釋教盛行誘煽聾俗由掌邦禮者畏王振勢度僧多至此宜盡勒歸農章下禮部尚書胡濙惡其刺己悉格不行量移豐城知縣為邑豪誣搆繫獄尋得釋成化初大臣會薦擢湖廣僉事初有詔荊襄流民許所在附籍都御史項忠復遣還鄉督甚急多道死褫憫之陳牒巡撫吳琛請進止琛以報忠忠怒劾褫中朝知其意在恤民卒申令流民聽附籍不願乃遣還鄉褫為僉事十年所司上其治行賜誥旌異致仕卒單宇字時泰臨川人正統四年進士除嵊縣知縣馭吏嚴吏欲誣奏宇宇以聞坐不並上吏奏逮下獄事白調諸暨遭喪服除待銓京師適英宗北狩宇憤中官監軍諸將不得專進止致喪師疏請盡罷之以重將權景帝不納初王振佞佛請帝歲一度僧其所修大興隆寺日役萬人糜帑數十萬閎麗冠京都英宗為賜號第一叢林命僧大作佛事躬自臨幸以故釋教益熾至是宇上書言前代人君尊奉佛氏卒致禍亂近男女出家纍百千萬不耕不織蠶食民間營搆寺宇遍滿京邑所費不可勝紀請撤木石以建軍營銷銅鐵以鑄兵仗罷遣僧尼歸之民俗庶皇風清穆異教不行疏入為廷議所格復知侯官而咸陽姚顯以鄉舉入國學亦上言曩者修治大興隆寺窮極壯麗又奉僧楊某為上師儀從侔王者食膏粱被組繡藐萬乘若弟子今上皇被留賊庭乞令前赴瓦剌化諭也先誠能奉駕南還庶見護國之力不然佛不足信彰彰矣當景泰時廷臣諫事佛者甚衆帝卒不能從而中官興安最用事佞佛甚於振請帝建大隆福寺嚴壯與興隆並四年三月寺成帝剋期臨幸河東鹽運判官濟寧楊浩切諫乃止宇好學有文名三為縣咸以慈惠聞居侯官久之卒顯後為齊東知縣移武城公廉剛正用巡撫翁世資薦擢太僕丞浩初以鄉舉入國學除官未行遂抗疏聲譽籍甚纍官右副都御史巡撫延綏張昭不知何許人天順初為忠義前衛吏英宗復辟甫數月欲遣都指揮馬雲等使西洋廷臣莫敢諫昭聞之上疏曰安內救民國家之急務慕外勤遠朝廷之末策漢光武閉關謝西域唐太宗不受康國內附皆深知本計者也今畿輔山東仍歲災歉小民絶食逃竄妻子衣不蔽體被薦裹席鬻子女無售者家室不相完轉死溝壑未及埋瘞已成市臠此可為痛哭者也望陛下用和番之費益以府庫之財急遣使振恤庶饑民可救奏下公卿博議言雲等已罷遣宜籍記所市物俟命帝命姑已之天順三年秋建安老人賀煬亦上書論時事言今銓授縣令多年老監生逮滿九載年幾七十苟且貪污宜擇年富有才能者其下僚及山林抱德士亦當推舉景泰朝録先賢顏孟程朱子孫授以翰林博士俾之奉祀然有官無祿宜班給以昭崇儒之意黃幹劉爚蔡沈真德秀配祠朱子亦景泰間從僉事呂昌之請然未入祝辭宜增補預備義倉本以振貧民乃豪猾多冒支不償致廩庾空虛乞令出粟義民各疏里內饑民同有司散放未幾又言朝廷建學立師將以陶鎔士類而師儒鮮積學草野小夫夤緣津要初解兔園之冊已厠鶚薦之羣及受職泮林猥瑣貪叨要求百故而授業解惑莫措一詞生徒亦往往玩愒歲月佻達城闕待次循資濫升太學侵尋老耋幸博一官但厪身家之謀無復功名之念及今不嚴甄選人材日陋士習日非矣帝善其言下所司行之高瑤字庭堅閩縣人由鄉舉為荊門州學訓導成化三年五月抗疏陳十事其一言正統己巳之變先帝北狩陛下方在東宮宗社危如一髮使非郕王繼統國有長君則禍亂何由平鑾輿何由返六七年間海宇寧謐元元樂業厥功不細逮先帝復辟貪天功者遂加厚誣使不得正其終節惠隮祀未稱典禮望特敕禮官集議追加廟號盡親親之恩章下廷議久不決至十二月始奏追崇廟號非臣下敢擅議惟陛下裁決而左庶子黎淳力爭謂不當復且言瑤此言有死罪二一誣先帝為不明一陷陛下於不孝臣以謂瑤此舉非欲尊郕王特為羣邪進用階必有小人主之者帝曰景泰往過朕未嘗介意豈臣子所當言淳為此奏欲獻諂希恩耶議遂寢然帝終感瑤言久之竟復郕王帝號瑤後知番禺縣多異政發中官韋眷通番事沒其資巨萬於官眷憾甚誣奏於朝瑤及布政使陳選俱被逮士民泣送者塞道瑤竟謫戍永州釋還卒黎淳華容人天順元年進士第一官至南京禮部尚書頗有名譽其與瑤爭郕王廟號也專欲阿憲宗意至以昌邑更始比景帝為士論所薄當成化時言路大阻給事御史多獲譴惟瑤以卑官建危議卒無罪時皆稱帝盛德云又有虎臣者麟遊人成化中貢入太學上言天下士大夫過先聖廟宜下輿馬從之省親歸會陝西大饑巡撫鄭時將請振臣齎奏行陳饑歉狀詞激切大獲振貸已上言臣鄉比歲災傷人相食由長吏貪殘賦役失均請敕有司審民戶編三等以定科徭從之孝宗踐阼將建棕棚萬歲山備登眺臣抗疏切諫祭酒費誾懼禍及鋃鐺縶臣堂樹下俄官校宣臣至左順門傳旨慰諭曰若言是棕棚已毀矣誾大慚臣名遂聞都下頃之命授七品官乃以為雲南嘉知縣卒官贊曰明自太祖開基廣闢言路中外臣寮建言不拘所職草野微賤奏章咸得上聞沿及宣英流風未替雖升平日久堂陛深嚴而逢掖布衣刀筆掾史抱關之冗吏荷戈之戍卒朝陳封事夕達帝閽採納者榮顯其身報罷者亦不之罪若仁宗之復弋謙朝參引咎自責即懸鞀設鐸復何以加以此為招宜乎慷慨發憤之徒扼腕而談世務也英景之際實録所載不可勝書今掇其著者列於篇逮憲宗季年閹尹擅朝事勢屢變別自為卷得有考焉
