body:
  text: 明史卷一百六十六列傳第五十四韓觀山雲蕭授吳亮方瑛陳友李震王信都勝郭鋐彭倫歐磐張祐韓觀字彥賓虹人高陽忠壯侯成子也以舍人宿衛忠謹為太祖所知授桂林右衛指揮僉事洪武十九年討平柳州融縣諸蠻纍遷廣西都指揮使二十二年平富川蠻設靈亭千戶所二十五年平賓州上林蠻二十七年會湖廣兵討全州灌陽諸瑤斬千四百餘人明年捕擒宜山諸縣蠻斬其偽王及萬戶以下二千八百餘人以征南左副將軍從都督楊文討龍州土官趙宗壽宗壽伏罪移兵征南丹奉議及都康向武富勞上林思恩都亮諸蠻先後斬獲萬餘級觀生長兵間有勇略性鷙悍誅罰無所假下令如山人莫敢犯初羣蠻所在蜂起剽郡縣殺守吏勢甚熾將士畏觀法爭死鬬觀得賊必處以極刑間縱一二使歸告諸蠻諸蠻膽落由是境內得安二十九年召還進都督同知明年復從楊文討平吉州及五開叛苗與顧成討平水西諸蠻堡還理左府事建文元年練兵德州禦燕師無功成祖即位委任如故命往江西練軍城守兼節制廣東福建湖廣三都司廬陵民嘯聚山澤帝不欲用兵遣行人許子謨齎敕招諭命觀臨撫之觀至衆皆復業賜璽書褒勞命佩征南將軍印鎮廣西節制兩廣官軍帝知觀嗜殺賜璽書戒之曰蠻民易叛難服殺愈多愈不治卿往鎮務綏懷之毋專殺戮會羣蠻復叛帝遣員外郎李宗輔齎敕招之觀大陳兵示將發狀而遣使與宗輔俱桂林蠻復業者六千家惟思恩蠻未附而慶遠柳潯諸蠻方殺掠吏民乃上章請討永樂元年與指揮葛森等擊斬理定諸縣山賊千一百八十有奇擒其酋五十餘人斬以徇還所掠男女於民而撫輯其逃散者明年遣都指揮朱輝諭降宜山欣城諸山寨荔波瑤震恐乞為編戶帝屬觀撫之八十餘洞皆歸附明年潯桂柳三府蠻作亂已撫復叛遣朱輝以偏師破之蠻大懼會朝廷遣郎中徐子良至遂來降歸所掠人畜器械四年大發兵討安南詔觀畫方略轉粟二十萬石餉軍已復命偕大理卿陳洽選土兵三萬會太平仍令觀偵安南賊中動靜尋從大兵發憑祥抵坡壘關以所部營關下伐木治橋梁給軍食安南平命措置交址緣途諸堡而柳潯諸蠻乘觀出復叛五年觀旋師抵柳州賊望風遁匿觀請俟秋涼深入且請濟師帝使使發湖廣廣東貴州三都司兵又敕新城侯張輔遣都督朱廣方政以征交址兵協討十月諸軍皆集分道進剿觀自以貴州兩廣兵由柳州攻馬平來賓遷江賓州上林羅城融縣皆破之會兵象州復進武宣東鄉桂林貴平永福斬首萬餘級擒萬三千餘人羣蠻復定捷聞帝嘉勞之九年拜征夷副將軍仍佩故印總兵鎮交址明年復命轉粟給張輔軍輔再出師定交址觀皆主饋運不為將故功不著觀在廣西久威震南中蠻人惴惴奉命繼之者自山雲外皆不能及十二年九月卒無子宣德二年保定伯梁銘奏求觀南京故宅帝許之既聞觀妻居其中曰觀功臣也雖歿豈可奪之遂不許令有司以他宅賜銘山雲徐人父青以百戶從成祖起兵積功至都督僉事雲貌魁梧多智略初襲金吾左衛指揮使數從出塞有功時幼軍二十五所隸府軍前衛掌衛者不任事更命雲及李玉等五人撫戢之仁宗立擢行在中軍都督僉事宣德元年改北京行都督府命偕都御史王彰自山海抵居庸巡視關隘以便宜行事帝征樂安召輔鄭王襄王居守明年柳慶蠻韋朝烈等掠臨桂諸縣時鎮遠侯顧興祖以不救丘溫被逮公侯大臣舉雲帝亦自知之三年正月命佩征蠻將軍印充總兵官往鎮雲至討朝烈破之賊保山巔山峻險挂木於藤壘石其上官軍至輒斷藤下木石無敢近者雲夜半束火牛羊角以金鼓隨其後驅向賊賊謂官軍至亟斷藤比明木石且盡衆譟而登遂盡破之南安廣源諸蠻悉下是夏欣城蠻談團作亂雲討擒之四年春討平柳潯諸蠻其秋雒容蠻出掠遣指揮王綸破之雲上綸功並劾其殺良民罪帝宥綸而心重雲廣西自韓觀卒後諸蠻漸橫雲以廣西兵少留貴州兵為用先後討平潯柳平樂桂林宜山思恩諸蠻九年又以慶遠鬱林苗瑤非大創不服請濟師詔發廣東兵千五百人益雲雲分道剿捕擒斬甚衆復遣指揮田真攻大藤峽賊破之雲在鎮先後大戰十餘斬首萬二千二百六十降賊酋三百七十奪還男女二千五百八十築城堡十三鋪舍五百陶磚鑿石增高益厚自是瑤僮屏迹居民安堵論功進都督同知璽書褒勞雲謀勇深沉而端潔不苟取公賞罰嚴號令與士卒同甘苦臨機應變戰無不捷廣西鎮帥初至土官率饋獻為故事帥受之即為所持雲始至聞府吏鄭牢剛直召問曰饋可受乎牢曰潔衣被體一污不可湔將軍新潔衣也雲曰不受彼且生疑奈何牢曰黷貨法當死將軍不畏天子法乃畏土夷乎雲曰善盡却饋獻嚴馭之由是土官畏服調發無敢後者雲所至詢問里老撫善良察誣枉土人皆愛之英宗即位雲墜馬傷股帝遣醫馳視以病請代優詔不許進右都督正統二年上言潯州與大藤峽諸山相錯瑤寇出沒占耕旁近田左右兩江土官所屬人多田少其狼兵素勇為賊所畏若量撥田州土兵於近山屯種分界耕守斷賊出入不過數年賊必坐困報可嗣後東南有急輒調用狼兵自此始也明年冬卒於鎮贈懷遠伯諡忠毅長子俊襲府軍前衛指揮使廣西人思雲不置立祠肖像祀焉初韓觀鎮廣西專殺戮慶遠諸生來迓觀曰此皆賊覘我也悉斬之雲平恕參佐有罪輒上請不妄殺人人亦不敢犯鄭牢嘗逮事觀觀醉輒殺人牢輒留之醒乃以白牢為士大夫所重然竟以隸終蕭授華容人由千戶從成祖起兵至都指揮同知永樂十六年擢右軍都督僉事充總兵官鎮湖廣貴州宣德元年鎮遠邛水蠻銀總作亂指揮祝貴往撫被殺授遣都指揮張名破斬之貴州宣慰所轄乖西巴香諸洞寨山箐深險諸蠻錯居攻剽他部傷官軍發民冢而昆阻比諸寨亦恃險不輸賦二年授遣都指揮蘇保會宣慰宋斌攻破昆阻比寨窮追斬偽王以下數百人乖西諸蠻皆震懾歸命水西蠻阿閉妨宜作亂授結旁寨酋以計誅之而西堡蠻阿骨等與寨底豐寧清平平越普安諸苗復相聚為寇四川筠連諸蠻應之授且捕且撫諸蠻先後聽命承制赦之以豐寧酋稔惡械送京師伏誅七年諭降安隆酋岑俊已討辰州蠻擒其酋八十斬馘無算移兵擊江華苗討富川山賊先後破擒之先是貴州治古答意二長官司苗數出掠授築二十四堡環其地分兵以戍賊不得逞久之其酋吳不爾覘官軍少復掠清浪殺官吏授遣張名擊破之賊走湖廣境結生苗勢復張授乃發黔楚蜀軍分道捕討進軍筸子坪誅不爾斬首五百九十餘級賊悉平九年都勻蠻為亂引廣西賊入掠授遣指揮陳原顧勇分道邀擊獲賊首韋萬良等降下合江蔡郎等五十餘寨英宗即位命佩征蠻副將軍印鎮守如故念授年老以都督僉事吳亮副之正統元年普定蠻阿遲等叛僭稱王四出攻掠授遣顧勇等搗其巢破之而廣西蒙顧十六洞與湖廣逃民相聚蜂起授督兵圍之再戰悉擒斬其酋餘黨就誅捷聞進右都督上言靖州與廣西接壤時苦苗患永樂宣德間嘗儲糧數萬石備軍興比年儲糧少有警發人徒轉輸賊輒先覺以故不能得賊乞於清浪靖州二衛各增儲五萬石庶緩急可藉報可四年貴州計沙賊苗金蟲苗總牌糾洪江生苗作亂偽立統千侯統萬侯號授督兵抵計沙分遣都指揮鄭通攻三羊洞馬曄攻黃柏山大破之吳亮窮追至蒲頭洪江斬總牌千戶尹勝誘斬金蟲於是生苗盡降授沉毅多計算裨校皆盡其材而馭軍嚴整自鎮遠侯顧成歿羣蠻所在屯結官軍討之皆無功授在鎮二十餘年規畫多本於成久益明練威信大行寇起輒滅前後諸帥莫及也論功進左都督是年六月召還以老致仕尋起視事右府十年卒贈臨武伯諡靖襄吳亮來安人永樂初為旗手衛指揮僉事宣德中署湖廣都指揮僉事尋以右副總兵與王瑜督漕運英宗初討新淦賊有功纍進都督僉事副授鎮湖廣貴州破普定蠻進都督同知平計沙苗進右都督方政歿於麓川召亮還京命為副總兵將兵五萬往討至雲南賊益熾坐金齒參將張榮敗不救逮下獄左遷都督僉事仍佩征南副將軍印鎮湖廣貴州討平四川都掌蠻尋召還視右府事正統十一年卒亮姿貌魁梧性寬簡不喜殺戮所至蠻人懷附好讀書至老手不釋卷方瑛都督政之子正統初以舍人從父征麓川父戰死瑛發憤矢報父讐初襲指揮使已論政死事功遷都指揮同知六年從王驥征麓川帥兵六千突賊壘賊渠衣黃衣帳中瑛直前左右擊斬數百人躪死者無算遂平其地進都指揮使尋復從驥破貢章沙壩阿嶺諸蠻進都督僉事涖後府事充右參將協守雲南十三年復從驥征麓川破鬼山大寨留鎮雲南景泰元年廷議以瑛有將略命都督毛福壽代還進都督同知甫抵京而貴州羣苗叛道梗驥請瑛還討其年四月拜右副總兵與保定伯梁珤侍郎侯璡次第破走之進右都督復破賞改諸寨擒偽苗王王阿同等璡卒都御史王來代督軍務分道擊賊香爐山瑛入自龍場大破平之三年秋來劾瑛違法事置不問來召還命瑛鎮守貴州其冬討白石崖賊俘斬二千五百人招降四百六十寨進左都督五年四川草塘苗黃龍韋保作亂自稱平天大王剽播州西坪黃灘瑛與巡撫蔣琳會川兵進剿賊魁皆就縛因分兵克中潮山及三百灘乖西谷種乖立諸寨執偽王谷蟻丁等斬首七千餘詔封南和伯瑛為將嚴紀律信賞罰臨陳勇敢善撫士士皆樂為用以故數有功廷臣言宜委以禁旅乃召還同石亨督京營軍務明年琳奏瑛前守貴州邊境寧苗蠻畏服乞遣還帝不許未幾湖廣苗叛拜瑛平蠻將軍率京軍討之而使御史張鵬偵其後還奏瑛所過秋毫不犯帝大喜七年賊渠蒙能攻平溪衛都指揮鄭泰等擊却之能中火槍死瑛遂進沅州連破鬼板等一百六十餘寨與尚書石璞移兵天柱率陳友等分擊天堂諸寨復大破之克寨二百七十擒偽侯伯以下一百二人時英宗已復位捷聞璞召還瑛留鎮貴州湖廣瑛討蒙能餘黨克銅鼓藕洞一百九十五寨覃洞上隆諸苗各斬其渠納款帝嘉瑛功進侯天順二年東苗干把豬等僭偽號攻都勻諸衛命瑛與巡撫白圭合川湖雲貴軍討之克六百餘寨邊方悉定瑛前後克寨幾二千俘斬四萬餘平苗之功前此無與比者尋卒於鎮年四十五帝震悼賜諡忠襄瑛天姿英邁曉古兵法嘗上練兵法及陳圖老將多稱之為人廉謙和不伐所至鎮以安靜民思之久而不忘子毅嗣伯爵誘祖母誣從父瑞不孝坐奪爵間住卒子壽祥嗣正德中歷鎮貴州湖廣傳爵至明亡乃絶陳友其先西域人家全椒正統初官千戶纍遷都指揮僉事頻年使瓦剌有勞尋復進都指揮使九年充寧夏遊擊將軍與總兵官黃真擊兀良哈多獲進都督僉事未幾出塞招答哈卜等四百人來歸景帝即位進都督同知征湖廣貴州苗尋充左參將守備靖州景泰二年偕王來等擊賊香爐山自萬潮山入大破之留鎮湖廣論功進右都督四年春奏斬苗五百餘級五年又奏斬苗三百餘而都指揮戚安等八人戰死兵部疑首功不實指揮蔡升亦奏友欺妄命總督石璞廉之斬獲僅三四十人陷將士千四百人宜罪詔令殺賊自效天順元年隨瑛征天堂諸苗大獲命充左副總兵仍鎮湖廣已又偕瑛破蒙能餘黨召封武平伯豫世券孛來犯邊充遊擊將軍從安遠侯柳溥等往禦率都指揮趙瑛等與戰敵敗遁再犯鎮番復擊却之俘百六十人尋佩將軍印充總兵官討寧夏寇先是寇大入甘涼溥及總兵衛穎等不能禦惟友稍獲至是巡撫芮釗列諸將失事狀兵部請免友罪詔並宥溥等召還進侯卒傳子至孫綱弘治中請友贈諡詔贈沔國公諡武僖綱傳子勳及熹嘉靖中吏部以友征苗功多冒濫請停襲帝不從熹子大策復得嗣至明亡乃絶李震南陽人父謙都督僉事震襲指揮使正統九年從征兀良哈有功進都指揮僉事已從王驥平麓川進同知景帝即位充貴州右參將擊苗於偏橋敗之景泰二年從王來征韋同烈破鎖兒流源諸寨俘斬千六百人共克香爐山獲同烈進都指揮使守靖州尋坐罪徵還方瑛討苗乞震隨軍詔許立功贖已從瑛大破天堂諸苗仍充左參將瑛平銅鼓諸賊震亦進武岡克牛欄等五十四寨斬獲多進都督僉事天順中復從瑛平貴東苗干把豬瑛卒即以震充總兵官代鎮貴州湖廣初麻城人李添保以逋賦逃入苗中偽稱唐太宗後衆萬餘僭王建元武烈剽掠遠近震進擊大破之添保遁入貴州鬼池諸苗中復誘羣苗出掠震擒之送京師尋破西堡苗五年春剿城步瑤僮攻橫水城溪莫宜中平諸寨皆破之長驅至廣西西延會總兵官過興軍克十八團諸瑤前後俘斬數千人其冬命震專鎮湖廣以李安充總兵守貴州明年夏率師由錦田江華抵雲川桂嶺橫江諸寨破瑤俘斬二千八百餘人七年冬苗據赤溪湳洞長官司震與安分道進斬賊渠飛天侯等破寨二百遂復長官司進都督同知明年冬廣西瑤侵湖南夜入桂陽州大掠震遣兵分道追擊連敗之俘斬千餘人成化改元守備靖州都指揮同知莊榮奏貴州黎平諸府密邇湖廣五開諸衛非大將總領不可乃復命震兼鎮貴州未幾獲賊首苗蟲蝦荊襄賊劉千斤石和尚為亂震進討賊屢敗乘勝追及於梅溪賊巢官軍不利都指揮以下死者三十八人有詔切責白圭等大軍至震自南漳進兵合擊大破之賊遂平論功進右都督時武岡沅靖銅鼓五開苗復蜂起而貴州亦告警震言貴州終難遙制請專鎮湖廣許之乃還兵由銅鼓天柱分四道進連破賊直抵清水江因苗為導深入賊境兩月間破巢八百焚廬舍萬三千斬獲三千三百而廣西瑤劫桂陽者亦擊斬三千八百有奇當是時震威名著西南苗僚聞風畏懾呼為金牌李七年與項忠討平流賊李原招撫流民九十萬人荊襄遂定語具忠傳十一年苗復犯武岡靖州湖湘大擾震與巡撫劉敷等分五道進破六百二十餘寨俘斬八千五百餘人獲賊孥萬計論功封興寧伯時武靖侯趙輔寧晉伯劉聚皆以功封論者多訾議之獨震功最高人無異言參將吳經者與震有隙弟千戶綬為汪直腹心經屬綬譖之會直方傾項忠詞連震遂逮下獄奪爵降左都督南京間住未幾直遣校尉緝事言震陰結守備太監覃包私通貨賂帝怒遣直赴南京數包等罪責降包孝陵司香勒震回京直敗震訴復爵尋卒震在湖湘久熟知苗情善用兵一時征苗功方瑛後震為最然貪功好進事交結竟以是敗王信字君實南鄭人生半歲父忠征北戰歿母嶽氏苦節育之後俱獲旌正統中信襲寬河衛千戶成化初積功至都指揮僉事守備荊襄劉千斤反信以房縣險進據之民兵不滿千人賊衆四千突至圍其城拒四十餘日選死士出城五六里舉炮賊疑援至驚走追敗之已白圭統大軍至以信為右參將分道抵後巖山賊遂滅論功進都指揮同知賊黨石龍復陷巫山信與諸將共平之而流民仍嘯荊襄南陽間信以為憂言於朝即命信兼督南陽軍務賊首李原等果亂信復與項忠討平之擢署都督僉事鎮守臨清十三年以本官佩平蠻將軍印移鎮湖廣永順保靖二宣慰世相讐殺信諭以禍福兵即解靖州及武岡蠻久不戢守臣議剿之信親詣犒以牛酒責其無狀衆稽顙服罪十七年疏言湖廣諸蠻雖腹心蠹實無能為久不靖者由我將士利其竊發以邀功也選精鋭慎隄防其患自息荊襄流逋本避徭役濫誅恐傷天和南畝之氓咸無蓄積收穫未竟餱糧已空機杼方停布縷何在乞選公正仁惠守令加意撫綏濫授冗員無慮千百無一矢勞冒崇階之賞乞察勘削奪部指揮劉斌張全智勇力薦於朝且云英雄之士處心剛正安肯俯首求媚若不加意延訪則志士沈淪朝廷安得而用之二十一年巡撫馬馴等言副總兵周賢參將彭倫官皆都督僉事而信反止署職宜量進一秩以重其權兵部言信無軍功帝特擢為都督同知頃之改總督漕運帥府舊有湖擅為利信開以泊漕艘勢要壅水一裁以法漕務修舉明年卒信毅簡重好觀書被服儒雅歷大鎮不營私産嘗曰儉足以久死後不纍子孫所遺多矣故人婚喪傾資助之子繼善從善皆舉進士繼信總漕運者寧津都勝合肥郭鋐勝襲職南京羽林左衛指揮僉事鋐襲彭城衛指揮使成化初勝擢署都指揮僉事而鋐亦以從征荔浦功進都指揮僉事中武舉遷同知勝備倭揚州擊敗鹽徒為亂者尹旻等舉勝將才鋐亦為張懋所舉乃命勝充參將協同漕運而鋐代之備倭陝西大飢勝奉詔輸米百萬石往振信卒遂遷署都指揮使充總兵官代之鋐代勝為參將弘治中勝以都督僉事帶俸南京前府時鋐已鎮守廣西副總兵破府江僮賊遂以時望擢總漕運鋐沈毅有將略而勝無汗馬勳徒以居官廉靜故頻有任使歷任五十七年所處皆膏腴地而自奉簡淡日食止豆腐時因以為號鋐纍進都督同知凡軍民利病多陳於朝嘗濬通州河二十里置壩令淺船搬運歲省白金數萬當孝宗時朝政整肅文武大臣率得人鋐管漕十三年不易正德初始召佐後府尋卒彭倫初職為湖廣永定衛指揮使纍功至都指揮同知成化初從趙輔平大藤峽賊進都指揮使守備貴州清浪諸處討破茅坪銅鼓叛苗賊掠乾溪倫討之賊還所掠與盟而退倫以賊入時道邛水諸寨不即邀遏乃下令賊入境能生致者豫重賞縱者置諸法由是諸司各約所屬凡生苗軼入即擒之送帳下者纍纍倫大會所部目把縛俘囚置高竿集健卒亂射殺之復割裂肢體烹噉諸壯士罪輕者截耳鼻使去曰以此識再犯不赦矣因令諸寨樹牌為界羣苗股栗不敢犯明年充右參將仍鎮清浪益盡心邊計戎事畢舉妖賊石全州潛入絞洞煽動古州苗洪江甘篆諸苗咸應之倫遣兵截擒並搜獲其妻子諸苗將攻鎮遠倫大敗之斬首及墮崖死者無算無何邛水十四寨苗糾洪江生苗為逆倫分五哨往甫行雨如注倫曰賊不虞我急趨之可得志也競進夾攻縶其魁俘斬餘黨賊盡平靖州苗亂湖廣總兵官李震檄倫會討軍至邛水江諸熟苗驚欲竄倫與僉事李晃計曰苗竄必助賊乃急撫定之又緣道降天堂小坪諸苗既抵靖州倫將右哨出賊背布營賊走據高山倫軍仰攻之賊敗走遂渡江搗其巢大獲乘勝攻白崖塘崖高萬仞下臨深淵稱絶險倫會左哨同進得徑路夜登賊倉皇潰追斬二千餘級俘獲如之盡夷其寨初臻剖六洞苗侵熟苗田不輸賦又不供驛馬有司莫敢問倫遣人諭之頓首請如制録功進都督僉事久之御史鄧庠員外郎費瑄勘事貴州總兵官吳經等皆被劾獨薦倫智謀老成弘治初經論罷即以倫代倫用師先計後戰故多功四年以老致仕卒豫恤如制歐磐滁人襲世職指揮使成化中擢廣東都指揮僉事屢剿蠻寇有功用總督朱英薦充廣西右參將分守柳州慶遠與左參將馬義討融縣八寨瑤克之師旋餘賊復出掠被劾帝絀磐等功但恤死事家瑤賊方公強亂兵部劾總鎮中官顧並及磐當謫戍督撫奏磐所守乃瑤僮出沒地磐募死士夜入賊巢斬其渠胡公返威震羣蠻論功可贖罪帝乃宥之還故任二十三年鬱林陸川賊黃公定胡公明等亂磐偕按察使陶魯等分五道攻破之進都指揮同知弘治初謝病解職總督秦紘言磐多歷戰陳有才有守乞起用詔還任八年府江永安諸僮亂總督閔圭調兵六萬分四哨往討磐自象州修仁直搗陸洞所向摧破已偕諸軍連破山寨百八十斬首六千有奇進都指揮使遷廣西副總兵思恩土官岑濬築石城於丹良莊截江括商利帥府令毀之不聽磐自田州還督兵將毀城濬率衆拒擊敗之卒夷其城都御史鄧廷瓚等以磐功多言於朝進都督僉事十五年命佩平蠻將軍印鎮守湖廣磐為將廉能得士久鎮南邦蠻人畏服十八年請老又二年卒祭葬如制張祐字天祐廣州人幼好學能文弘治中襲世職為廣州右衛指揮使年十九從總督潘蕃征南海寇禤元祖先登有功正德二年擢署都指揮僉事守備德慶瀧水瑤僮負險者聞其威信稍稍遁去總督林廷選引為中軍事無大小咨焉守備惠潮搗盜魁劉文安李通寶穴平之遷廣西右參將分守柳慶總督陳金討府江賊命祐進沈沙口大破之增俸一等擢副總兵鎮守廣西尋進署都督僉事古田諸瑤僮亂祐言先年征討率倚兩江土兵賞不酬勞今調多失期乞定議優賚從之督都指揮沈希儀等討臨桂灌陽諸瑤斬首五百餘級璽書奬勞又連破古田賊俘斬四千七百進署都督同知已復討平洛容肇慶平樂諸蠻增俸一等蔭子世百戶嘉靖改元母喪哀毀骨立尋以疾乞休還衛初上思州土目黃鏐作亂祐購其黨黃廷寶縛獻之總督張嵿惡祐不白己至劾祐懷姦避難逮繫德慶獄數上書訟冤釋令間住盧蘇王受亂田州總督姚鏌召至軍中待以賓禮多所裨贊後王守仁代鏌詢撫剿之宜祐曰以夷治夷可不煩兵而下守仁納之蘇受果效順因命祐部分其衆事寧守仁言思田初定宜設一副總兵鎮之請即以命祐報可破封川賊盤古子又剿廣東會寧劇賊丘區長等斬首一千二百勒銘大隆山十一年楊春賊趙林花陷高州總督陶諧檄祐討深入多所斬獲忽中危疾卒軍中為哀慟祐身長八尺智識絶人馭軍有節制與下同甘苦不營私産性好書每載以自隨軍暇即延儒生講論嘗過烏蠻灘謁馬伏波祠太息曰歿不俎豆其間非夫也題詩而去後田州人立祠橫山祀之贊曰苗蠻阻險自固易動難服自其性然而草剃禽獮濫殺邀功貪貨賄興事端控馭乖方綏懷無策則鎮將之過也韓觀諸人雖功最焯著而皆以威信震懾蠻荒若山雲王信張祐之廉儉有守士君子何以過故尤足尚云
