十年夏秋真順廣大四府水二十一年五月邳州高郵寶應大水決湖堤二十二年七月鳳陽廬州大水二十三年四月泗水浸祖陵二十四年秋杭嘉湖三府大水二十九年八月沔陽大水入城三十年六月京師大水三十一年五月成安永年肥鄉安州深澤漳滏沙燕河並溢決堤橫流祁州靜海圮城垣廬舍殆盡六月泰安大水淹八百餘人八月泉州諸府海水暴漲溺死萬餘人三十二年六月昌平大水壞各陵橋道七月永平真保三府俱水淹男婦無算八月河決蘇家莊淹豐沛黃水逆流灌濟寧魚臺單縣三十五年六月黃州蛟起武昌承天鄖陽嶽州常德大水漂沒廬舍徽州寧國太平嚴州四府山水大湧漂人口甚衆閏六月京師大水長安街水深五尺三十七年九月福建江西大水四十一年六月通惠河決七月京師大水南畿江西河南俱大水八月山東廣西湖廣俱大水九月遼東大水四十二年浙江江西兩廣俱水四十四年七月江西廣東水四十六年八月潮州六縣海颶大作溺萬二千五百餘人壞民居三萬間天啓三年睢寧河決六年秋河決匙頭灣倒入駱馬湖自新安鎮抵邳宿民居盡沒是歲順天永平二府大水邊垣多圮崇禎元年七月壬午杭嘉紹三府海嘯壞民居數萬間溺數萬人海寧蕭山尤甚三年山東大水四年六月又大水五年六月壬申河決孟津口橫浸數百里七年五月邛眉諸州縣大水壞城垣田舍人畜無算十年八月州大水民登州堂及高阜者得免餘盡沒十三年五月浙江大水十四年七月福州風潮泛溢漂溺甚衆十五年六月汴水決九月壬午河決開封朱家寨癸未城圮溺死士民數十萬水變洪武五年河南黃河竭行人可涉天順二年十二月癸未武強苦井變為甘弘治十四年八月丙辰融縣河水紅濁如黃河十月丙辰馬湖底渦江水白可鑑翌日濁如泔漿凝兩岸沙石上者如土粉十七日乃澄丁巳州東南二河白如雪濃如漿者三日十五年九月丙戌濮州井溢沙土隨水而出正德十年七月文安水忽僵立是日大寒結為冰柱高圍俱五丈中空旁穴數日而賊至民避穴中生全者甚衆隆慶六年五月南畿龍目井化為酒萬曆二十二年四月南京正陽門水赤三日二十五年八月甲申蒲州池塘無風湧波溢三四尺臨淄濠水忽漲南北相向而鬬又夏莊大灣潮忽起聚散不聚則丈餘開則見底樂安小清河逆流臨清磚板二閘無風大浪三十年閏二月戊午河州蓮花寨黃河涸四十六年四月宣武正陽門外水赤三里如血一月乃止四十七年四月宣武門響閘至東御河水復赤崇禎十年寧遠衛井鳴沸三日乃止河南汝水變色深黑而味惡飲者多病十三年華陰渭水赤十四年山西潞水北流七晝夜勢如潮湧十五年達州井鳴濠水變血十六年松江自五月至七月不雨河水盡涸而泖水忽增數尺黑眚黑祥洪武十年正月丁酉金華處州雨水如墨汁十四年正月黑氣亙天十一月壬午黑氣亙天者再二十一年二月乙卯黑氣亙天宣德元年二月戊子北方黑氣東西亙天八月辛巳樂安城中有黑氣如死灰正統元年九月辛亥未刻黑氣亙天自西南屬東北二年八月甲申北方黑氣東西亙天十四年十一月己丑晡時西方有黑氣從地而生景泰元年二月壬寅黑氣南北亙天十月辛未西南黑氣如煙火南北亙天二年四月庚辰有黑氣如煙摩地而上天順五年七月己亥朔東方有黑氣須臾蔽天成化七年四月丙辰雨黑沙如漆八年三月庚子黑氣起西北臨清德州晝晦十二年七月庚戌京師黑眚見民間男女露宿有物金睛修尾狀如犬貍負黑氣入牖直抵密室至則人昏迷遍城驚擾操刃張燈鳴金鼓逐之不可得帝常朝奉天門侍衛見之而譁帝欲起懷恩持帝衣頃之乃定弘治五年二月己巳北方黑氣東西亙天六年八月壬申南京有黑氣東西百餘丈十四年四月辛未應州黑風大作十六年二月庚子宜良黑氣迷空咫尺莫辨人形正德七年六月壬戌黑眚見順德河間及涿大者如犬小者如貓夜出傷人有至死者尋見於京師形赤黑風行有聲居民夜持刁斗相警達旦逾月乃息後又見於封丘十二年閏十二月丁丑夜瑞州有紅氣變白形如曲尺中外二黑氣相鬬者久之八年十月癸巳杭州雨黑水三十七年三月衡州黑眚見隆慶二年四月天雨黑豆六年四月杭州黑霧有物蜿蜒如車輪目光如電冰雹隨之萬曆二十四年十二月辛卯同安生黑毛二十五年二月癸亥湖州黑雨雜以黃沙崇禎十年山東雨黑水新鄉亦如之十一年京師有黑眚狀如貍入民家為祟半歲乃止十三年正月丁卯黑氣彌空者三日
