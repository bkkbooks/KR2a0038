body:
  text: 明史卷二十八志第四五行一水史志五行始自漢書詳録五行傳説及其占應後代作史者因之粵稽洪範首五行以其為天地萬物之所莫能外而合諸人道則有五事稽諸天道則有庶徵天人相感以類而應者固不得謂理之所無而傳説則條分縷析以某異為某事之應更旁引曲證以伸其説故雖父子師弟不能無所抵牾則果有當於疇之意歟夫苟知天人之應捷於影響庶幾一言一動皆有所警惕以此垂戒意非不善然天道遠人道邇逐事而比之必有驗有不驗至有不驗則見以為無徵而怠焉前賢之論此悉矣孔子作春秋紀異而説不書彼劉董諸儒之學頗近於術數禨祥本無足述班氏創立此志不得不詳其學之本原而歷代之史往往取前人數見之説備列簡端揆之義法未知所處故考次洪武以來略依舊史五行之例著其祥異而事應暨舊説之前見者並削而不載云洪範曰水曰潤下水不潤下則失其性矣前史多以寒陰雪霜冰雹雷震魚孽蝗蝻豕禍龍蛇之孽馬異人痾疾疫鼓妖隕石水潦水變黑眚黑祥皆屬之水今從之寒景泰四年冬十一月戊辰至明年孟春山東河南浙江直隸淮徐大雪數尺淮東之海冰四十餘里人畜凍死萬計五年正月江南諸府大雪連四旬蘇常凍餓死者無算是春羅山大寒竹樹魚蚌皆死衡州雨雪連綿傷人甚多牛畜凍死三萬六千蹄成化十三年四月壬戌開原大雨雪畜多凍死十六年七八月越巂雨雪交作寒氣若冬弘治六年十一月鄖陽大雪至十二月壬戌夜雷電大作明日復震後五日雪止平地三尺餘人畜多凍死正德元年四月雲南武定隕霜殺麥寒如冬萬曆五年六月蘇松連雨寒如冬傷稼四十六年四月辛亥陝西大雨雪吂月馬凡橐駝凍死二千蹄陰洪武十八年二月久陰正統五年七月戊午己未及癸亥曉刻陰沉四方濃霧不辨人八年邳海二州陰霧彌月夏麥多損景泰六年正月癸酉陰霧四塞既而成霜附木凡五日八年正月甲子陰晦大霧咫尺不辨人物成化四年三月昏霧蔽天不見星日者纍晝夜九年三月甲午四月丁卯山東黑暗如夜二十年五月丙申番禺天晦良久乃復二十三年十二月辛卯大霧不辨人弘治十五年十一月景東晝晦者七日十六年四月辛亥甘肅昏霧障天咫尺不辨人物十八年秋廣昌大雨霧凡兩月民病且死者相繼正德十年四月巨野陰霧六日殺穀十四年三月戊午陰晦嘉靖元年正月丁卯日午昏霧四塞三年江北昏霧其氣如藥天啓六年六月丙戌霧重如雨閏六月己未如之雨雪隕霜洪武十四年五月丁未建德雪六月己卯杭州晴日飛雪二十六年四月丙申榆社隕霜損麥景泰四年鳳陽八衛二三月雨雪不止傷麥天順四年三月乙酉大雪越月乃止成化二年四月乙巳宣府隕霜殺青苗十九年三月辛酉陝西隕霜弘治六年十月南京雨雪連旬八年四月庚申榆社陵川襄垣長子沁源隕霜殺麥豆桑辛酉慶陽諸府縣衛所三十五隕霜殺麥豆禾苗九年四月辛巳榆次隕霜殺禾是月武鄉亦隕霜十七年二月壬寅鄖陽均州雨雪雹雪片大者六寸六月癸亥雨雪正德八年四月乙巳文登萊陽隕霜殺稼丙辰殺穀十三年三月壬戌遼東隕霜禾苗皆死嘉靖二年三月甲子郯城隕霜殺麥辛未殺禾二十二年四月己亥固原隕霜殺麥隆慶六年三月丁亥南宮隕霜殺麥萬曆二十四年四月己亥林縣雪二十六年十一月辛亥彰德隕霜不殺草三十八年四月壬寅貴州暴雪形如土磚民居片瓦無存者四十四年正月雨紅黃黑三色雪屋上多巨人迹崇禎六年正月辛亥大雪深二丈餘十一年五月戊寅喜峰口雪三尺十三年四月會寧隕霜殺稼十六年四月鄢陵隕霜殺麥冰雹洪武二年六月庚寅慶陽大雨雹傷禾苗三年五月丙辰蔚州大雨雹傷田苗五年五月癸丑夜中都皇城萬歲山雨冰雹大如彈丸七年八月甲午平涼延安綏德米脂雨雹九月甲子鞏昌雨雹八年四月臨洮平涼河州雹傷麥十四年七月己酉臨洮大雨雹傷稼十八年二月雨雹永樂七年秋保定浙東雨雹十二年四月河南一州八縣雨雹殺麥正統三年西延平慶臨鞏六府及秦河岷金四州自夏逮秋大雨雹四年五月壬戌京師大雨雹五年四月丁酉平涼諸府大雨雹傷人畜田禾六月壬申至丙子山西行都司及蔚州連日雨雹其深尺餘傷稼八月庚辰保定大雨雹深尺餘傷稼景泰五年六月庚寅易州大方等社雨雹甚大傷稼百二十五里人馬多擊死六年閏六月乙巳束鹿雨雹如雞子擊死鳥雀狐兔無算天順元年六月己亥雨雹大如雞卵至地經時不化奉天門東吻牌摧毀八年五月丁巳雨雹成化元年四月庚寅雨雹大如卵損禾稼五月辛酉又大雨雹五年閏二月癸未瓊山雨雹大如斗八年七月丙午隴州雨雹大如鵝卵或如雞子中有如牛者五長七八寸厚三四寸六日乃消九年五月丁巳雨雹如拳十三年春湖廣大雨冰雹牛死無算十九年六月乙亥潞州雨雹大者如碗二十年二月丙子清遠雨雹大如拳丙戌大雷電復雨雹二十一年三月己丑夜番禺南海風雷大作飛雹交下壞民居萬餘死者千餘人二十二年三月甲寅南陽雨雹大如鵝卵弘治元年三月壬申夜融縣雨雹壞城樓垣及軍民屋舍死者四人二年三月戊寅賓州雨雹如雞子擊殺牧豎三人壞廬舍禾稼庚辰貴州安莊衛大雷雨雪雹壞麥苗四月辛卯洮州衛雨冰雹水湧三丈四年三月癸卯裕汝二州雨雹大者如牆杵積厚二三尺壞屋宇禾稼四月己酉洮州衛雨雹及冰塊水高三四丈漫城郭漂房舍田苗人畜多淹死五年四月乙丑莒沂二州安丘郯城二縣雨雹大如酒杯傷人畜禾稼六年八月己巳長子雨雹大者如拳傷禾稼人有擊死者辛未雨雹大如彈丸平地壅積八年二月壬申永嘉暴風雨雨雹大如雞卵小如彈丸積地尺餘白霧四起毀