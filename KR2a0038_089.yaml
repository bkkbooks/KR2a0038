body:
  text: 明史卷八十九志第六十五兵一明以武功定天下革元舊制自京師達於郡縣皆立衛所外統之都司內統於五軍都督府而上十二衛為天子親軍者不與焉征伐則命將充總兵官調衛所軍領之既旋則將上所佩印官軍各回衛所蓋得唐府兵遺意文皇北遷一遵太祖之制然內臣觀兵履霜伊始洪宣以後狃於治平故未久而遂有土木之難于謙創立團營簡精鋭一號令兵將相習其法頗善憲孝武世四朝營制屢更而威益不振衛所之兵疲於番上京師之旅困於占役馴至末造尺籍久虛行伍衰耗流盜蜂起海內土崩宦豎降於關門禁軍潰於城下而國遂以亡矣今取其一代規制之詳及有關於軍政者著於篇京營侍衛上直軍皇城守衛京城巡捕四衛營京軍三大營一曰五軍一曰三千一曰神機其制皆備於永樂時初太祖建統軍元帥府統諸路武勇尋改大都督府以兄子文正為大都督節制中外諸軍京城內外置大小二場分教四十八衛卒已又分前後中左右五軍都督府洪武四年士卒之數二十萬七千八百有奇成祖增京衛為七十二又分步騎軍為中軍左右掖左右哨亦謂之五軍歲調中都山東河南大寧兵番上京師隸之設提督內臣一武臣二掌號頭官二大營坐營官一把總二中營坐營官一馬步隊把總各一左右掖哨官如之又有十二營掌隨駕馬隊官軍設把總二又有圍子手營掌操練上直叉刀手及京衛步隊官軍設坐營官一統四司以一二三四為號把總各二又有幼官舍人營掌操練京衛幼官及應襲舍人坐營官一四司把總各一此五軍營之部分也已得邊外降丁三千立營分五司一掌執大駕龍旗寶纛勇字旗負御寶及兵仗局什物上直官軍一掌執左右二十隊勇字旗大駕旗纛金鼓上直官軍一掌傳令營旗牌御用監盔甲尚冠尚衣尚履什物上直官軍一掌執大駕勇字旗五軍紅盔貼直軍上直官軍一掌殺虎手馬轎及前哨馬營上直明甲官軍隨侍營隨侍東宮官舍遼東備禦回還官軍提督內臣二武臣二掌號頭官二坐司官五見操把總三十四上直把總十六明甲把總四此三千營之部分也已征交址得火器法立營肄習提督內臣武臣掌號頭官皆視三千營亦分為五軍中軍坐營內臣一武臣一其下四司各監鎗內臣一把司官一把總官二左右掖哨皆如之又因得都督談廣馬五千匹置營名五千下掌操演火器及隨駕護衛馬隊官軍坐營內臣武臣各一其下四司各把司官二此神機營之部分也居常五軍肄營陳三千肄巡哨神機肄火器大駕征行則大營居中五軍分駐步內騎外騎外為神機神機外為長圍周二十里樵採其中三大營之制如此洪熙時始命武臣一人總理營政宣德五年以成國公朱勇言選京衛卒隸五軍訓練明年命科道及錦衣官核諸衛軍數帝之征高煦及破兀良哈皆以京營取勝焉正統二年復因勇言令錦衣等衛守陵衛卒存其半其上直旗校隸錦衣督操餘悉歸三大營土木之難京軍沒幾盡景帝用于謙為兵部尚書謙以三大營各為教令臨期調撥兵將不相習乃請於諸營選勝兵十萬分十營團練每營都督一號頭官一都指揮二把總十領隊一百管隊二百於三營都督中推一人充總兵官監以內臣兵部尚書或都御史一人為提督其餘軍歸本營曰老家京軍之制一變英宗復辟謙死團營罷憲宗立復之增為十二成化二年復罷命分一等次等訓練尋選得一等軍十四萬有奇帝以數多令仍分十二營團練而區其名有奮耀練顯四武營敢果效鼓四勇營立伸揚振四威營命侯十二人掌之各佐以都指揮監以內臣提督以勳臣名其軍曰選鋒不任者仍為老家以供役而團營之法又稍變二十年立殫忠效義二營練京衛舍人餘丁二營永樂間設後廢至是復設未幾以無益罷帝在位久京營特注意然缺伍至七萬五千有奇大率為權貴所隱占又用汪直總督團營禁旅專掌於內臣自帝始也孝宗即位乃命都御史馬文升為提督是時營軍久苦工役成化末余子俊嘗言之文升復力陳不可又請於每營選馬步鋭卒二千遇警徵調且遵洪永故事五日一操以二日走陳下營以三日演武從之時尚書劉大夏陳弊端十事復奏減修乾清宮卒內臣謂其不恤大工大學士劉健曰愛惜軍士司馬職也帝納之會戶部主事李夢陽極論役軍之害並及內臣主兵者以語侵壽寧侯下詔獄遂格不行武宗即位十二營鋭卒僅六萬五百餘人稍弱者二萬五千而已給事中葛嵩請選五軍三千營精鋭歸團練而存八萬餘人於營以供役惠安伯張偉謬引舊制以爭事遂已隱占如故置鐇反太監張永將京軍往討中官權益重及流寇起邊將江彬等得幸請調邊軍入衛於是集九邊突騎家丁數萬人於京師名曰外四家立兩官廳選團營及勇士四衛軍於西官廳操練正德元年所選官軍操於東官廳自是兩官廳軍為選鋒而十二團營且為老家矣武宗崩大臣用遺命罷之當是時工作浩繁邊將用事京營戎政益大壞給事中王良佐奉敕選軍按籍三十八萬有奇而存者不及十四萬中選者僅二萬餘世宗立久之從廷臣言設文臣知兵者一人領京營是時額兵十萬七千餘人而存者僅半專理京營兵部尚書李承勛請足十二萬之數部議遵弘治中例老者補以壯丁逃故者清軍官依期解補從之十五年都御史王廷相提督團營條上三弊一軍士多雜派工作終歲不得入操雖名團營聽征實與田夫無異二軍士替代吏胥需索重賄貧軍不能辦老羸苟且應役而精壯子弟不得收練三富軍憚營操征調率賄將辨置老家數中貧者雖老疲亦常操練語頗切中既而兩郊九廟諸宮殿之工起役軍益多兵部請分番為二半團操半放歸而收其月廩雇役詔行一年自後邊警急團營見兵少僅選騎卒三萬仍號東西官廳餘者悉老弱仍為營帥中官私役二十九年俺答入寇兵部尚書丁汝夔核營伍不及五六萬人驅出城門皆流涕不敢前諸將領亦相顧變色汝夔坐誅大學士嚴嵩乃請振刷以圖善後吏部侍郎王邦瑞攝兵部因言國初京營徑旅不減七八十萬元戎宿將常不乏人自三大營變為十二團營又變為兩官廳雖浸不如初然額軍尚三十八萬有奇今武備積弛見籍止十四萬餘而操練者不過五六萬支糧則有調遣則無比敵騎深入戰守俱稱無軍即見在兵率老弱疲憊市井遊販之徒衣甲器械取給臨時此其弊不在逃亡而在占役不在軍士而在將領蓋提督坐營號頭把總諸官多世胄紈袴平時占役營軍以空名支餉臨操則肆集市人呼舞博笑而已先年尚書王瓊毛伯溫劉天和常有意振飭然將領惡其害己陰謀阻撓軍士又習於驕惰競倡流言事復中止釀害至今乞大振乾綱遣官精核帝是其言命兵部議興革於是悉罷團營兩官廳復三大營舊制更三千曰神樞罷提督監鎗等內臣設武臣一曰總督京營戎政以咸寧侯仇鸞為之文臣一曰協理京營戎政即以邦瑞充之其下設副參等官二十六員已又從部議以四武營歸五軍營中軍四勇營歸左右哨四威營歸左右掖各設坐營官一員為正兵備城守參將二員備征討帝以營制新定告於太廟行之又遣四御史募兵畿輔山東山西河南得四萬人分隸神樞神機各設副將一而增能戰將六員分領操練大將所統三營之兵居常名曰練勇有事更定職名五軍營大將一員統軍一萬總主三營副參遊擊佐擊及坐營等官副將二員各統軍七千左右前後參將四員各六千遊擊四員各三千外備兵六萬六千六百六十人神樞營副將二員各統軍六千佐擊六員各三千外備兵四萬人神機營亦如之已又定三大營官數五軍營一百九十六員神樞營二百八員神機營一百八十二員共五百八十六員在京各衛軍俱分隸三營分之為三十營合之為三大營終帝世其制屢更最後中軍哨掖之名亦罷但稱戰守兵兼立車營故事五軍府皆開府給印主兵籍而不與營操營操官不給印戎政之有府與印自仇鸞始鸞方貴幸言於帝選各邊兵六萬八千人分番入衛與京軍雜練復令京營將領分練邊兵於是邊軍盡隸京師塞上有警邊將不得徵集邊事益壞鸞死乃罷其所置戎政廳首領官之屬而入衛軍則惟罷甘肅者隆慶四年大學士趙貞吉請收將權更營制極言戎政之設府鑄印以數十萬衆統於一人非太祖成祖分府分營本意請以官軍九萬分五營營擇一將分統訓練詔下廷臣議尚書霍冀言營制世宗熟慮而後定不宜更惟大將不當專設戎政不宜有印請如貞吉言制曰可於是三大營各設總兵一副將二其參佐等官互有增損各均為十人而五軍營兵均配二營營十枝屬二副將分統以侯伯充總兵尋改曰提督又用三文臣亦稱提督自設六提督後各持意見遇事旬月不決給事中溫純言其弊乃罷仍設總督協理二臣萬曆二年從給事中歐陽柏請復給戎政印汰坐營官二員五年巡視京營科臣林景暘請廣召募立選鋒是時張居正當國綜核名實羣臣多條上兵事大旨在足兵選將營務頗飭久之帝厭政廷臣漸爭門戶習於愈惰遂日廢弛三十六年尚書李化龍理戎政條上京營積弊敕下部議卒無所振作及兵事起總督京營趙世新請改設教場城內便演習太常少卿胡來朝請調京軍戍邊可變弱為強皆無濟於用天啓三年協理侍郎朱光祚奏革老家軍補以少壯老家怨以瓦礫投光祚遂不果革是時魏忠賢用事立內操又增內臣為監視及把牌諸小內監益募健丁諸營軍多附之莊烈帝即位撤內臣已而復用戎政侍郎李邦華憤京營弊壞請汰老弱虛冒而擇材力者為天子親軍營卒素驕有疑其為變者勳戚中官亦惡邦華害己蜚語日聞帝為罷邦華代以陸完學盡更其法京營自監督外總理捕務者二員提督禁門巡視點軍者三員帝皆以御馬監司禮文書房內臣為之於是營務盡領於中官矣十年八月車駕閲城鎧甲旌旗甚盛羣臣悉鸞帶策馬從六軍望見乘輿皆呼萬歲帝大悅召完學入御幄奬勞酌以金卮然徒為容觀而已時兵事益亟帝命京軍出防剿皆監以中官廩給優渥挾勢而驕多奪人俘獲以為功輕折辱諸將士將士益解體周延儒再入閣勸罷內操撤諸監軍京兵班師還時營將率內臣私人不知兵兵惟注名支糧買替紛紜朝甲暮乙雖有尺籍莫得而識也帝屢旨訓練然日不過二三百人未昏遂散營兵十萬幸抽驗不及玩愒佚罰者無算帝嘗問戎政侍郎王家彥家彥曰今日惟嚴買替之禁改操練之法庶可救萬一然勢已晚帝不懌而罷十六年襄城伯李國禎總戎政內臣王承恩監督京營明年流賊入居庸關至沙河京軍出禦聞炮聲潰而歸賊長驅犯闕守陴者僅內操之三千人京師遂陷大率京軍積弱由於占役買閒其弊實起於紈袴之營帥監視之中官竟以亡國云京營之在南者永樂北遷始命中府掌府事官守備南京節制在南諸衛所洪熙初以內臣同守備宣德末設參贊機務官景泰間增協同守備官成化末命南京兵部尚書參贊機務視五部特重先是京師立神機營南京亦增設與大小二教場同練軍士常操不息風雨方免有逃籍者憲宗命南給事御史時至二場點閲成國公朱儀及太監安寧不便詭言軍機密務御史詰問名數非宜帝為罪御史仍令守備參贊官閲視著為令嘉靖中言者數奏南營耗亡之弊二十四年冬詔立振武營簡諸營鋭卒充之益以淮揚趫捷者江北舊有池河營專城守護陵寢二營兵各三千領以勳臣別設場訓練然振武營卒多無賴子督儲侍郎黃懋官抑削之遂譁毆懋官至死詔誅首惡以戶部尚書江東為參贊東多所寬假衆益驕無復法紀給事中魏元吉以為言因舉浙直副總兵劉顯往提督未至池河兵再變毆千戶吳欽詔顯亟往許以川兵五百自隨事始定隆慶改元罷振武營以其卒千餘仍隸二場及神機營萬曆十一年參贊尚書潘季馴言操軍原額十有二萬今僅二萬餘祖軍與選充參半選充例不補營伍由是虛請如祖軍收補已而王遴代季馴言大小二場新舊官軍二萬三千有餘請如北京各邊三千一百二十人為一枝每枝分中左右哨得兵七枝餘置旗鼓下備各營缺從之巡視科臣阮子孝極論南營耗弊言頗切中然卒無振飭之者已從尚書吳文華請增參贊旗牌得以軍法從事兼聽便宜調遣三十一年添設南中軍標營選大教場卒千餘設中軍參將統練規制雖具而時狃苟安闒茸一如北京及崇禎中流寇陷廬鳳踞上流有窺留都意南中將士日夜惴惴以護陵寢守京城為名幸賊不東下而已最後史可法為參贊尚書思振積弊未久而失蓋無可言焉侍衛上直軍之制太祖即吳王即位其年十二月設拱衛司領校尉隸都督府洪武二年改親軍都尉府統中左右前後五衛軍而儀鑾司隸焉六年造守衛金牌銅塗金為之長一尺闊三寸以仁義禮智信為號二面俱篆文一曰守衛一曰隨駕掌於尚寶司衛士佩以上直下直納之十五年罷府及司置錦衣衛所屬有南北鎮撫司十四所所隸有將軍力士校尉掌直駕侍衛巡察緝捕已又擇公侯伯都督指揮之嫡次子置勳衛散騎舍人而府軍前衛及旗手等十二衛各有帶刀官錦衣所隸將軍初名天武後改稱大漢將軍凡千五百人設千百戶總旗七員其衆自為一軍下直操練如制缺至五十人方補月糈二石積勞試補千百戶亡者許以親子弟魁梧材勇者代無則選民戶充之永樂中置五軍三千營增紅盔明甲二將軍及叉刀圍子手之屬備宿衛校尉力士僉民間丁壯無惡疾過犯者力士先隸旗手衛後改隸錦衣及騰驤四衛專領隨駕金鼓旗幟及守衛四門校尉原隸儀鑾司司改錦衣衛仍隸焉掌擎執鹵簿儀仗曰鑾輿曰擎蓋曰扇手曰旌節曰幡幢曰班劍曰斧鉞曰戈戟曰弓矢曰馴馬凡十司及駕前宣召差遣三日一更直設總旗小旗而領以勳戚官官凡六管大漢將軍及散騎舍人府軍前衛帶刀官者一管五軍營叉刀圍子手者一管神樞營紅盔將軍者四聖節正旦冬至及大祀誓戒冊封遣祭傳制用全直直三千人餘則更番器仗衣服位列亦稍殊焉凡郊祀經筵巡幸侍從各有定制詳禮志中居常當直將軍朝夕分候午門外夜則司更共百人而五軍叉刀官軍悉於皇城直宿掌侍衛官輪直日一員惟掌錦衣衛將軍及叉刀手者每日侍尤嚴收捕之令及諸脫更離直者共計錦衣衛大漢將軍一千五百七人府軍前衛帶刀官四十神樞營紅盔將軍二千五百把總指揮十六明甲將軍五百二把總指揮二大漢將軍八五軍營叉刀圍子手三千把總指揮八勳衛散騎舍人無定員旗手等衛帶刀官一百八十此侍衛親軍大較也正統後妃主公侯中貴子弟授官者多寄録錦衣中正德時奏帶傳升冒銜者又不下數百人武宗好養勇士嘗以千把總四十七人注錦衣衛帶俸舍餘千一百人充御馬監家將勇士食糧騎操又令大漢將軍試百戶五年實授著為令幸竇開而恩澤濫宿衛稍輕矣至萬曆間衛士多占役買閒其弊亦與三大營等雖定離直者奪月糈之例然不能革太祖之設錦衣也專司鹵簿是時方用重刑有罪者往往下錦衣衛鞫實本衛參刑獄自此始文皇入立倚錦衣為心腹所屬南北兩鎮撫司南理本衛刑名及軍匠而北專治詔獄凡問刑奏請皆自達不關白衛帥用法深刻為禍甚烈詳刑法志又錦衣緝民間情僞以印官奉敕領官校東廠太監緝事別領官校亦從本衛撥給因是與中官相表𩹉皇城守衛用二十二衛卒不獨錦衣軍而門禁亦上直中事京城巡捕有專官然每令錦衣官協同地親權要遂終明之世云初太祖取婺州選富民子弟充宿衛曰御中軍已置帳前總制親兵都指揮使後復省置都鎮撫司隸都督府總牙兵巡徼而金吾前後羽林左右虎賁左右府軍左右前後十衛以時番上號親軍有請得自行部不關都督府及定天下改都鎮撫司為留守設左右前後中五衛關領內府銅符日遣二人點閲夜亦如之所謂皇城守衛官軍也二十七年申定皇城門禁約凡朝參門始啓直日都督將軍及帶刀指揮千百戶鎮撫舍人入後百官始以次入上直軍三日一更番內臣出入必合符嚴索以金幣出者驗視勘合以兵器雜藥入門者擒治失察者重罪之民有事陳奏不許固遏帝念衛士勞苦令家有婚喪疾病産子諸不得已事得自言情家無餘丁父母俱病者許假侍養愈乃復先是新宮成詔中書省曰軍士戰鬬傷殘難備行伍可於宮牆外造舍以居之晝則治生夜則巡警其後定十二衛隨駕軍上直者人給錢三百二十八年復於四門置舍使恩軍為衛士執爨恩軍者得罪免死及諸降卒也永樂中定制諸衛各有分地自午門達承天門左右逮長安左右門至皇城東西屬旗手濟陽濟川府軍及虎賁右金吾前燕山前羽林前八衛東華門左右至東安門左右屬金吾羽林府軍燕山四左衛西華門左右至西安門左右屬四右衛玄武門左右至北安門左右屬金吾府軍後及通州大興四衛衛有銅符頒自太祖曰承曰東曰西曰北各以其門名也巡者左半守者右半守官遇巡官至合契而從事各門守衛官夜各領銅令申字牌巡警自一至十六內皇城衛舍四十外皇城衛舍七十二俱設銅鐸次第循環內皇城左右坐更將軍百每更二十人四門走更官八交互往來鈐印于籍以為驗都督及帶刀千百戶日各一人領申字牌直宿及點各門軍士後更定都督府改命侯伯僉書焉洪熙初更造衛士懸牌時親軍缺伍衛士不獲代帝命選他衛軍守端直諸門尚書李慶謂不可帝曰人主在布德以屬人心苟心相屬雖非親幸何患焉宣德三年命御史點閲衛卒天順中復增給事中一人成化十年尚書馬文升言太祖置親軍指揮使司不隸五府文皇帝復設親軍十二衛又增勇士數千員屬御馬監上直而以腹心臣領之比者日廢弛勇士與諸營無異皇城之內兵衛無幾諸監門卒尤疲羸至不任受甲宜敕御馬監官即見軍選練仍敕守衛官常嚴步伍譏察出入以防微銷萌帝然其言亦未能有所整飭正德初嚴皇城紅鋪巡徼日令留守衛指揮五員督內外夜巡軍而兵部郎中主事各一人同御史錦衣衛稽閲毋攝他務嘉靖七年增直宿官軍衣糧五年一給萬曆十一年於皇城內外設把總二員分東西管理時門禁益弛衛軍役於中官每至空伍賃市兒行丐應點閲叉刀紅盔日出始一入直直廬虛無人坐更將軍皆納月鏹於所轄凡提號巡城印簿走更諸事悉廢十五年再申門禁久之給事中吳文煒乞盡復舊制不報末年有失金牌久之始覺者梃擊之事張差一妄男子得闌入殿廷其積弛可知是後中外多事啓禎兩朝雖屢申飭竟莫能挽侵尋以至於亡京城巡捕之職洪武初置兵馬司譏察奸僞夜發巡牌旗士領之核城門扃鐍及夜行者已改命衛所鎮撫官而掌於中軍都督府永樂中增置五城兵馬司宣德初京師多盜增官軍百人協五城逐捕已復增夜巡候卒五百成化中始命錦衣官同御史督之末年撥給團營軍二百弘治元年令三千營選指揮以下四員領精騎巡京城外又令錦衣官五旗手等衛官各一分地巡警巡軍給牌五年設把總都指揮專職巡捕正德中添設把總分畫京城外地南抵海子北抵居庸關西抵盧溝橋東抵通州復增城內二員而益以團營軍定官卒賞罰例末年邏卒增至四千人特置參將嘉靖元年復增城外把總一員並舊為五分轄城內東西二路城外西南東南東北三路增營兵為五千又十選一立尖哨五百騎厚其月糈命參將督操而監以兵部郎是時京軍弊壞積久捕營亦然三十四年軍士僅三百餘以給事中丘嶽等言削指揮樊經職而禁以軍馬私役騎乘萬曆十二年從兵部議京城內外盜發自卯至申責兵馬司自酉至寅責巡捕官賊衆則協力捕剿是後軍額倍增駕出及朝審録囚皆結隊駐巷口籍伍雖具而士馬實凋弊不足用捕營提督一參將二把總十八巡軍萬一千馬五千匹盜賊縱橫至竊內中器物獲其橦索竟不能得也莊烈帝時又以兵部左侍郎專督然營軍半虛廩馬多雇人騎失盜嚴限止五日玩法卒如故四衛營者永樂時以迤北逃回軍卒供養馬役給糧授室號曰勇士後多以進馬者充而聽御馬監官提調名隸羽林身不隸也軍卒相冒支糧不可稽宣德六年乃專設羽林三千戶所統之凡三千一百餘人尋改武驤騰驤左右衛稱四衛軍選本衛官四員為坐營指揮督以太監別營開操稱禁兵器械衣甲異他軍橫於輦下往往為中官占匿弘治末勇士萬一千七百八十人旗軍三萬一百七十人歲支廩粟五十萬孝宗納廷臣言核之又令內臣所進勇士必由兵部驗送乃給廩五年籍其人數著為令省度支金錢歲數十萬武宗即位中官寧瑾乞留所汰人數言官及尚書劉大夏持不可不聽後兩官廳設遂選四衛勇士隸西官廳掌以邊將江彬太監張永等世宗入立詔自弘治十八年存額外悉裁之替補必兵部查駁而御馬監馬牛羊令巡視科道核數既而中旨免核馬多虛增後數年御馬太監閔洪復矯旨選四衛官給事中鄭自璧劾其欺蔽不報久之兵部尚書李承勛請以選核仍隸本部中官謂非便帝從承勛言十六年又命收復登極詔書所裁者凡四千人後五年內臣言勇士僅存五千餘請令子姪充選以備邊警部臣言故額定五千三百三十人八年清稽已浮其數且此營本非為備邊設者帝從部議然隱射占役冒糧諸弊率如故萬曆二年減坐營官二員已復定營官缺由兵部擇用其後復為中官所撓仍屬御馬監廷臣多以為言不能從四十二年給事中姚宗文點閲本營言官勇三千六百四十七僅及其半馬一千四十三則無至者官旗七千二百四十止四千六百餘馬亦如之乞下法司究治帝不能問天啓末巡視御史高弘圖請視三大營例分弓弩短兵火器加以訓練至莊烈帝時提督內臣曹化淳奏改為勇衛營以周遇吉黃得功為帥遂成徑旅出擊賊輒有功得功軍士畫虎頭於皂布以衣甲賊望見黑虎頭軍多走避其得力出京營上云
