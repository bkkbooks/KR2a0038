body:
  text: 明史卷一百七十四列傳第六十二史昭劉昭李達巫凱曹義施聚許貴子寧周賢子玉歐信王璽魯鑑子麟孫經劉寧周璽莊鑑彭清姜漢子奭孫應熊安國杭雄史昭合肥人永樂初積功至都指揮僉事八年充總兵官鎮涼州土軍老的罕先與千戶虎保作亂虎保敗老的罕就撫昭上書言其必叛狀未至而老的罕果叛昭與都指揮滿都等擊平之移鎮西寧仁宗立進都督僉事上言西寧風俗鄙悍請設學校如中土報可宣德初昭以衛軍守禦不暇屯種其家屬願力田者七百七十餘人請俾耕藝收其賦以足軍食從之五年曲先衛都指揮使散即思邀劫西域使臣昭率參將趙安偕中官王安王瑾討之長驅至曲先散即思望風遁擒其黨答答不花等獲男女三百四十人馬駝牛羊三十餘萬威震塞外捷聞璽書慰勞賞賚加等七年春以征西將軍鎮寧夏孛的達里麻犯邊遣兵擊之至濶台察罕俘獲甚衆進都督同知正統初昭以寧夏孤懸河外東抵綏德二千里曠遠難守請於花馬池築哨馬營增設烽堠直接哈剌兀速之境邊備大固尋進右都督時阿台𩽆兒只伯數寇邊詔昭與甘肅守將蔣貴趙安進剿並無功被詔切責貶都督僉事三年復右都督八年以老召還明年卒昭居寧夏十二年老成持重兵政修舉亦會敵勢衰弱邊境得無事兵部尚書王驥寧夏參將王榮嘗舉其過朝議以昭守邊久習兵事不易也而與昭並為邊將最久有勳績可稱者都督同知劉昭鎮西寧二十年都指揮李達鎮洮州至四十年並為蕃漢所畏服劉昭全椒人永樂五年以都指揮同知使𩽆甘烏思藏建驛站還至靈藏番賊邀劫昭敗之進都指揮使鎮河州宣德二年副陳懷討平松潘寇纍進都督同知移西寧復鎮河州兼轄西寧罕東酋劄兒加邀殺中官使西域者奪璽書金幣去命昭副甘肅總兵官劉廣討之劄兒加請還所掠書幣貢馬贖罪帝以窮寇不足深治命昭等還李達定遠人纍官都督僉事正統中致仕巫凱句容人由廬州衛百戶積功至都指揮同知永樂六年以從英國公張輔平交址功遷遼東都指揮使十一年召帥所部會京明年從征沙漠命先還凱言諸衛兵宜以三之二守禦而以其一屯糧開原巿馬悉給本衛乘操從之宣宗立以都督僉事佩征虜前將軍印代朱榮鎮遼東時中國人自塞外脫歸者令悉送京師俟親屬赴領凱言遠道往來恐致失所阻遠人慕歸心乃更令有馬及少壯者送京師餘得自便敵掠西山凱擊敗之盡得所掠者降敕褒勉帝嘗遣使造舟松花江招諸部地遠軍民轉輸大困多逃亡會有警凱力請罷其役而逃軍入海西諸部者已五百餘人既而造舟役復興中官阮堯民都指揮劉清等董之多不法致激變凱劾堯民等下之吏英宗登極進都督同知上言邊情八事請厚恤死事者家益官吏折俸鈔歲給軍士冬衣布棉軍中口糧芻粟如舊制且召商實邊俱允行未幾為兵部尚書王驥所劾朝廷知凱賢令凱自陳並諭廷臣文武官有罪得實始奏誣者罪不貸凱由是得行其志正統三年十二月有疾命醫馳視未至而卒凱性剛毅饒智略馭衆嚴而有恩在遼東三十餘年威惠並行邊務修飭前後守東陲者曹義外皆莫及義字敬方儀真人以燕山左衛指揮僉事纍功至都督僉事副凱守遼東凱卒代為總兵官凱名將義承其後廉介有守遼人安之兀良哈犯廣寧前屯詔切責命王翺往飭軍務劾義死罪頃之義獲犯邊孛台等詔戮於布自是義數與兀良哈戰正統九年會朱勇軍夾擊斬獲多進都督同知纍官左都督義在邊二十年無赫赫功然能謹守邊陲其麾下施聚焦禮等皆至大將英宗復辟特封義豐潤伯聚亦封懷柔伯居四年義卒贈侯諡莊武繼室李氏殉詔旌之施聚其先沙漠人居順天通州父忠為金吾右衛指揮使從北征陳歿聚嗣職宣德中備禦遼東纍擢都指揮同知以義薦進都指揮使義與兀良哈戰聚皆從也先逼京師景帝詔聚與焦禮俱入衛聚慟哭即日引兵西部下進牛酒聚揮之曰天子安在吾屬何心饗此比至寇已退乃還聚以勇敢稱官至左都督值英宗推恩得封伯後義二年卒贈侯諡威靖義三傳至棟聚四傳至瑾吏部皆言不當復襲世宗特許之傳爵至明亡許貴字用和江都人永新伯成子也襲職為羽林左衛指揮使安鄉伯張安舉貴將才試騎射及策皆最擢署都指揮同知尋以武進伯朱冕薦擢山西行都司督操大同諸衛士馬正統末守備大同西路也先入寇從石亨戰陽和後口敗績貴力戰得還英宗北狩邊城悉殘破大同當敵衝人心尤恟懼貴以忠義激戰士敵來擊敗之進都指揮使景泰元年春充右參將敵寇威遠追敗之蒲州營奪還所掠人畜敵萬騎逼城下禦却之再遷都督同知大同乏馬命求民間得八百餘匹所司不給直貴為請乃豫之嘗募死士入賊壘劫馬百餘悉畀戰士士皆樂為用分守中官韋力轉淫虐衆莫敢言貴劾奏之三年疾還京英宗復辟命理左府事尋調南京松潘地雜番苗密邇董卜韓胡舊設參將一人天順五年守臣告警廷議設副總兵以貴鎮守未抵鎮而山都掌蠻叛詔便道先翦之貴分兩哨直抵其巢連破四十餘寨斬首千一百級生擒八百餘人餘賊遠遁貴亦感嵐氣未至松潘卒帝為輟朝一日賜賻及祭葬如制子寧字志道正統末自以舍人從軍有功為錦衣千戶貴歿嗣指揮使用薦擢署都指揮僉事守禦柴溝堡成化初充大同遊擊將軍寇入犯與同官秦傑等禦之小龍州澗擒其右丞把禿等十一人改督宣府操練移延綏地逼河套寇數入掠孤山堡寧提孤軍奮擊之三戰皆捷寇渡河走明年復以三千騎入沙河墩與總兵官房能禦之寇退復掠康家岔寧出塞百五十里追與戰獲馬牛羊千餘而還時能守延綏無將略巡撫王鋭請濟師詔大同巡撫王越帥衆赴越遣寧出西路破敵黎家澗進都指揮同知復遣寧與都指揮陳輝追寇獲馬騾六百朝廷以阿羅出復入河套頻擾邊命越與朱永禦而以寧才擢都督僉事佩靖虜副將軍印代能充總兵官寧起世胄不十年至大將同列推讓不及父友多隸部下亦不以為驟踰月寇大入永遣寧及遊擊孫鉞禦之至波羅堡相持三日夜寇乃解去亡失多寧以力戰得出卒被賞至冬賊入安邊寧追擊有功七年又與諸將孫鉞祝雄等敗寇於滉忽都河璽書褒奬迤北開元王把哈孛羅屢欲降內懼朝廷見罪外畏阿羅出讐之倣徨不決寧請撫慰以固其心卒降之明年參將錢亮敗績於師婆澗士卒死者十三四寧與越等俱被劾帝不罪時滿都魯等屢犯延綏寧帥鎮兵力戰寇不得志乃出西路直犯環慶固原寧將輕騎夜襲之鴨子湖奪馬畜而還又明年寇入榆林澗與巡撫余子俊敗之滿都魯等大入西路留其家紅鹽池越乘間與寧及宣府將周玉襲破其巢進署都督同知與子俊築邊牆增營堡寇患少衰十八年寇分數道入寧蹙之邊牆獲級百二十豫實授時越方鎮大同命寧與易鎮至則與鎮守太監汪直不協巡撫郭鏜以聞調直南京小王子大入寧知敵勢盛欲持重俟隙乃斂兵守而別遣將劉寧董升與周璽相掎角寇大掠焚代王別堡王趣戰使衆哭於轅門寧憤與鏜等營城外寇以十餘人為誘太監蔡新部騎馳擊寧將士爭赴之遇伏大敗死者千餘人寧奔夏米莊鏜新馳入城會璽等來援寇乃退寧還陳亡家婦子號呼詬詈擲以瓦礫寧大喪氣已而寇復入劉寧宋澄莊鑑等禦之十戰少利寇退寧等掩其敗更以捷聞巡按程春震發之與鏜新俱下獄鏜降六官新以初任降三官寧降指揮同知閒住弘治中用薦署都指揮使分領操練十一年十二月卒贈都督僉事寧束髮從軍大小百十餘戰身被二十七創性沉毅守官廉待士有恩不屑干進劉寧神英李杲皆出麾下子泰自有傳周賢滁人襲宣府前衛千戶景泰初纍功至都指揮僉事守備西猫兒峪助副總兵孫安守石八城尋充右參將代安鎮守兀良哈入寇總兵官過興令宣府副將楊信及賢合擊賢不俟信徑擊敗之信被劾都御史李秉言信緩師賢亦棄約帝兩宥之天順初總兵官楊能奏賢擢都督僉事寇駐塞下能檄賢與大軍會失期徵下獄以故官赴寧夏隸定遠伯石彪寇二萬騎入安邊營彪率賢等擊之連戰皆捷追至野馬澗半坡墩寇大敗而賢追不已中流矢卒詔贈都督同知賢初下吏自以不復用及得釋感激誓死報竟如其志子玉字廷璧當嗣指揮使以父死事超二官為萬全都司都指揮同知督理屯田進都指揮使充宣府遊擊將軍成化九年會昌侯孫繼宗等奉詔舉將才玉為首詔率所部援延綏從王越襲紅鹽池進署都督僉事還守宣府寇入馬營赤城擊敗之兵部言宣府諸大帥無功玉所部三千人能追敵出境請加一秩酬其勞乃豫實授尋充宣府副總兵十三年佩征朔將軍印鎮宣府破敵紅崖追奔至水磨灣進署都督同知十七年五月寇復入犯參將吳儼少監崖榮追出塞至赤把都為所遮兵分為三皆被圍儼榮走據北山困甚守備張澄率兵進力戰解二圍抵北山下儼榮已夜遁澄拔其衆而還死者過半澄所部七百人亦多戰死詔録澄功治儼等罪玉先以葛谷堡赤城頻受掠凡三被論至是復以節制不嚴見劾帝皆置不問十九年小王子犯大同敗總兵官許寧入順聖川大掠以六千騎寇宣府玉將二千人前行巡撫秦紘兵繼進至白腰山擊敗之指揮曹洪邀擊至西陽河都指揮孫成亦敗寇七馬房時寇乘勝氣甚鋭竟為玉等所挫一時稱其功未幾寇復入玉伏兵敗之朱永至大同復會玉軍擊敗之鵓鴿峪進署右都督余子俊築邊牆玉不為力且與紘不相能子俊惡之奏與寧夏神英易鎮久之復移鎮甘肅孝宗嗣位實授右都督玉督邊牆工峻急部卒張伏興等以瓦石投之兵部言悍卒漸不可長遂戮伏興戍其黨土魯番貢獅子願獻還哈密城及金印贖所留使者玉為之奏帝命與巡撫王繼經畫既果來歸玉等皆受賚七年病歸尋卒諡武僖玉初為偏裨及鎮宣府甚有名後涖甘肅部下屢失事又侵屯田死後事發子襲職降二等歐信嗣世職金吾右衛指揮使景泰三年以廣東破賊功擢都指揮同知已命守備白羊口遷大寧都指揮使天順初以都督僉事充參將守備廣東雷廉諸府巡撫葉盛薦其廉勇進都督同知代副總兵翁信兩廣瑤僮陷開建殺官吏帝趣進兵信破賊化州之馬里村再破之石城擊斬海南衛反者邵瑄時所在盜羣起將吏不能定廣西參將范信守潯梧瑤盡在境內陰納瑤賂縱使越境流劫約毋犯己於是雷廉高肇悉被寇帝命廣西總兵官陳涇及信合剿時有斬馘而賊勢不衰朝廷猶倚范信會涇以罪徵乃擢范信都督僉事充副總兵鎮廣東而命信佩征蠻將軍印代涇鎮廣西成化元年賊掠英德諸縣信討斬五百餘人奪還人口韓雍督師令信等分五哨攻破大藤峽已而餘賊復入潯州信被劾獲宥召還理前府事七年春充總兵官鎮守遼東纍敗福餘三衛言者謂信已老請召還巡撫彭誼奏官軍耆老五千餘人皆言信忠謹有謀勇纍立戰功威鎮邊陲年六旬騎射勝壯士不宜召回乃留鎮如故久之陳鉞代誼鉞貪功信不能違十四年為巡按王崇之所劾其冬乃召歸尋遣中官汪直等往按直右鉞歸罪信等下獄鐫一官閒住飲恨而卒范信既徙廣東賊勢愈盛劫掠不止乃語人曰今賊仍犯廣東亦我遣之耶而是時都督顏彪佩征夷將軍印討賊久無功濫殺良民報捷嶺南人咸疾之王璽太原左衛指揮同知也成化初擢署都指揮僉事守禦黃河七墅巡撫李侃薦於朝阿魯出寇延綏命充遊擊將軍赴援戰孤山堡敗之寇再入戰漫天嶺劉宗塢及漫塔水磨川皆有功進都指揮同知充副總兵鎮守寧夏九年以將才與周玉同薦十二年擢署都督僉事充總兵官鎮守甘肅黃河以西自莊浪抵肅州南山其外番人阿吉等二十九族所居也洪武間立石畫界約樵牧毋越疆歲久湮廢諸番往往闌入而中國無賴人又潛與交通為邊患璽請復畫疆域召集諸番諭以界石廢恐官軍欺凌諸部今復立之聽界外駐牧互巿則入關如此番人必聽命可潛消他日憂帝稱善從之十七年進署都督同知時璽以都督僉事為總兵官而魯鑑以署都督同知為參將璽恐難於節制乞解兵柄故有是命初哈密為土魯番所擾使其將牙蘭守之都督罕慎寄居苦峪口近赤斤罕東數相攻罕慎勢窮無援朝議敕璽築城苦峪別立哈密衛以居之璽遣諜者間牙蘭牙蘭不聽得其所羈掠九十餘人以歸具悉虛實十七年召集赤斤罕東將士犒以牛酒令助罕慎罕慎合二衛兵夜襲哈密及剌木等八城遂復其地仍令罕慎居之事聞奬勞賚金幣已罕東入寇璽禦却之請興師以討帝念其常助罕慎第遣使責諭明年北寇殺哨卒璽率參將李俊及赤斤兵擊之於狼心山黑河西多所斬獲二十年移鎮大同璽有復哈密功官不進陳於朝乃實授都督同知璽習韜略諳文事勇而有謀廷臣多稱之在邊二十餘年為番人所憚弘治元年卒賜祭葬贈恤有加魯鑑其先西大通人祖阿失都鞏卜失加明初率部落歸附太祖授為百夫長俾統所部居莊浪傳子失加纍官莊浪衛指揮同知正統末鑑嗣父職久之擢署都指揮僉事成化四年固原滿四反鑑以土兵千人從征諸軍圍石城日挑戰鑑出則先驅入則殿後最為賊所憚賊平進署都督同知尋充左參將分守莊浪命其子麟為百戶統治土軍十七年坐寇入境戴罪立功尋充左副總兵協守甘肅寇犯永昌被劾鑑疏辨第停其俸兩月俄命充總兵官鎮守延綏自陳往功豫實授孝宗立得疾致仕弘治初命麟襲指揮使加都指揮僉事已進同知充甘肅遊擊將軍魯氏世守西陲有捍禦功至鑑官益顯其世業益大而所部土軍生齒又日盛麟既移甘肅帝以土軍非鑑不能治特起治之且命有司建坊旌其世績鑑乃條上邊務四事多議行鑑有材勇遇敵輒冒矢石數被傷不為沮故能積功至大將十五年以舊創疾發卒贈右都督賜恤如制時麟已由甘肅參將擢左副總兵豪健如其父而恭順不如先為遊擊時寇入永昌失律委罪副將陶禎下御史按當戍邊但貶一秩遊擊如故為副將調韋州禦寇寇大入不能擊遣都指揮楊琳邀之孔壩溝琳大敗不救連被劾麟自訴止停俸二月時已授麟子經官令約束土軍而麟奏經幼土人不受要束乞歸治之不俟報徑歸帝用劉大夏言從其請武宗立甘肅巡撫畢亨薦經及麟謀勇令率所部協戰守正德二年經既襲指揮使自陳嘗隨父有功乃以為都指揮僉事未幾麟卒贈都督僉事賜祭葬故事都指揮無恤典以經乞破例豫之經積戰功再遷都指揮使充左參將分守莊浪復自陳功閥兵部執不可帝特命為署都督僉事世宗立乞休巡撫許鳳翔言經力戰被創疾行愈且世將敢戰知名異域今邊患𣗥不宜聽其去帝乃諭留且勞以銀幣尋充副總兵分守如故嘉靖六年冬以都督同知充總兵官鎮守延綏大學士楊一清言經守莊浪二十餘戴屢立戰功其部下土軍非他人所能及雖其子瞻已為指揮僉事奉命統轄然年尚少今陝西總兵官張鳳乃延綏世將若調鳳延綏而改經陝西自可彈壓莊浪無西顧患帝立從之居二年竟以疾致仕久之命瞻以本官守備山丹經奏言自臣高祖後世守茲土今臣家居瞻又移他鎮土軍皇皇不欲別附若因此生他患是隳先業而負世恩也乞令守故業可二十二年宣大有警詔經簡壯士五千赴援至而邊患已息乃遣還以經力疾趨召厚賚之明年瞻卒經以次子及孫皆幼請得自轄土軍詔許之經驍勇奉職寡過繼祖父為大帥保功名稱良將三十五年卒賜恤如制劉寧字世安其先山陽人襲世職為永寧衛指揮使勇敢善戰自以冗散無所見會延綏用兵疏請效死尚書白圭許之屢以功遷都指揮使充宣府遊擊將軍周璽字廷玉遷安人嗣職為開平衛指揮使負氣習兵書善騎射以征北功擢署都指揮僉事充右參將分守陽和敕部兵三千訓肄聽調成化十六年從王越征威寧海子纍進都指揮使時邊寇無虛歲十八年分道入掠璽與遊擊董升戰黑石崖寧戰塔兒山皆有功璽進署都督僉事遷大同副總兵寧進都督僉事改左參將分守陽和十九年秋亦思馬因大入大同總兵官許寧分遣璽守懷仁寧與董升營西山自將中軍擊之夏米莊敗績寧升被圍數重幾陷亟發巨炮擊之敵多死圍乃解璽聞中軍失利亟還兵援夜遇敵乘勝前鋭甚璽厲將士曰今日有進無退大呼陷陳敵少却久之短兵接臂中流矢拔鏃戰益急與子鵬及麾下壯士擊殺數十人會寧兵至中軍潰卒亦稍集敵乃退許寧等亦還無何復入掠寧將兵三千遇之聚落站西連戰敗之復敗之白登柳林又追敗之小鵓鴿谷而大同西路參將莊鑑亦邀其歸路戰於牛心山敵遂遁時諸將多失利許寧以下獲罪而璽以功豫實授寧超遷都督同知莊鑑以所部無失亡亦賚銀幣鑑遼東人天順中襲定遼右衛指揮使驍猛有膽決遇賊輒奮數有功纍官都督僉事掌左府弘治十一年佩鎮朔將軍印鎮宣府以才與大同總兵官張俊易鎮兵部侍郎熊繡奏其經畫功進都督同知璽尋以右副總兵分守代州兼督偏頭諸關而改寧左副總兵協守大同二人並著功北邊稱名將璽以偏頭去太原遠請改分守為鎮守又以鎮守不當聽節制乞易總兵銜憲宗皆曲從之弘治初移鎮陝西討平扶風諸縣附籍回回三年佩征西將軍印鎮守寧夏甫一歲卒且死召諸子曰吾佩印分閫分已足獨未嘗大破敵抱恨入地矣連呼殺賊而瞑子鵬纍官錦衣衛指揮僉事璽歿後三年而寧佩平羌將軍印鎮甘肅其冬寇犯涼州寧與戰抹山墩擒斬五十餘相持至暮收輜重南行寇復來襲擒其長一人明日參將顏玉來援副將陶禎兵亦至寇乃遁俘其稚弱獲馬駝牛羊二千進右都督明年與巡撫許進襲破土魯番於哈密進左都督增俸百石以疾還京十三年大同告警命寧為副總兵從平江伯陳鋭禦之鋭無將略與寧不協止毋戰寇遂得志去坐停半俸閒住尋以參將贊畫朱暉軍務亦無功寧自陳哈密功乞封伯詔還全俸寧有膽智為大同副將時入貢者數萬人懷異志寧率二十騎直抵其營衆駭愕有部長勒馬引弓出寧前下馬與諸部長坐舉策指畫宣天子威德一人語不遜寧摑其面奮臂起其長叱之退寧復坐與語呼酒歡飲皆感悟卒如約嘗仿古番上法以五十八人為隊隊伍重為陳建五色幟又各建五巨幟於中軍中幟起五陳各視其色應之循環無端每戰用是取勝晚再赴大同已老病帥又怯懦故無成功然孝宗朝良將稱寧十七年卒贈廣昌伯彭清字源潔榆林人初襲綏德衛指揮使以功擢都指揮僉事弘治初充右參將分守肅州寇入犯率兵躡之獲馬駝器仗及所掠人畜而還尋與巡撫王繼恢復哈密有功清雖位偏校而好謀有勇略名聞中朝尤為尚書馬文升所器嘗引疾乞休文升力言於朝慰留之八年甘肅有警以文升薦擢左副總兵仍守甘肅未幾巡撫許進乞移清涼州而是時哈密復為土魯番所據文升方密圖恢復倚清成功言肅州多故而清名著西域不可易乃寢文升既得楊翥策鋭欲搗哈密襲牙蘭乃發罕東赤斤暨哈密兵令清統之為前鋒從許進潛往行半月抵其城下攻克之牙蘭已先遁乃撫安哈密遺種全師而還是役也文升授方略擬從間道往而進仍由故道牙蘭遂逸去斬獲無幾然番人素輕中國謂不能涉其地至是始知畏清功居多稍遷都指揮使十年總兵官劉寧罷擢清都督僉事代之其冬土魯番歸哈密忠順王陝巴且乞通貢西域復定屢辭疾請解兵柄不允十五年卒清御士有恩久鎮西陲威名甚著番夷憚之性廉潔在鎮遭母及妻妹四喪貧不能歸葬卒之日將士及庶民婦豎皆流涕遺命其子不得受賻贈故其喪亦不能歸帝聞之命撫臣發帑錢資送歸里賜祭葬如制姜漢榆林衛人弘治中嗣世職為本衛指揮使御史胡希顏薦其材勇進都指揮僉事充延綏遊擊將軍十八年春寇犯寧夏興武營漢帥所部馳援遇於中沙墩擊敗之賜敕奬勞武宗嗣位寇大舉犯宣大漢偕副總兵曹雄參將王戟分道援有功尋代雄為副總兵協守延綏正德三年移守涼州明年冬擢署都督僉事充總兵官鎮寧夏漢馭軍嚴整得將士心甫數月而安化王置鐇謀逆置酒召漢及巡撫安惟學等宴酒半其黨何錦等率衆入即座上執漢漢奮起怒罵不屈遂殺之子奭逃免賊平訟於朝詔𧩎祭葬有司為立祠春秋祭之嘉靖時復從巡撫張珩請賜額憫忠奭當嗣職帝以漢死事特進一官為都指揮僉事十一年回賊魏景陽作亂華陰諸縣悉被害巡撫蕭翀檄奭討之獲景陽進署都指揮同知充右參將守肅州嘉靖二年擢右副總兵分守涼州進署都督僉事充總兵官鎮甘肅回賊犯甘州奭與戰張欽堡敗走之未幾西海賊八千騎犯涼州奭率遊擊周倫等襲擊於苦水墩大敗之斬首百餘級殲其長還所掠人口千二百畜産二千都指揮張錦亦戰死録功進署都督同知吉囊他部寇莊浪奭與遇分水嶺再勝之遂至平嶺敵騎大集奭伏兵誘之復斬其長一人獲首功七十豫實授十六年春寇大入甘州不能禦貶二秩戴罪尋以永昌破敵功復署都督僉事其冬坐前罪罷久之以薦擢副總兵協守大同為總督翁萬達劾罷卒子應熊嗣指揮使擢宣府西路參將二十七年春俺答寇大同總兵官周尚文戰曹家莊應熊從萬達自懷來鼓譟揚塵而西寇不測衆寡遂遁纍進都督僉事充總兵官鎮守寧夏三十二年套寇數萬騎屯賀蘭山遣精騎掠紅井應熊戒將士固守以綴敵而潛師攻敵營斬首百四十級進都督同知越二年套寇數萬踏冰西渡由寧夏山後直抵莊涼應熊等掩擊獲首功百餘進右都督御史崔揀劾其縱寇褫職逮問充為事官赴塞上立功四十年秋寇六萬餘騎犯居庸岔道口應熊被圍於南溝中五鎗墮馬參將胡鎮殺數人奪之歸其冬復為右都督充總兵官鎮守大同以招徠塞外人口增俸一級四十二年寇大舉犯畿輔詔應熊等入援諸鎮兵盡集見敵勢盛不敢擊給事中李瑜遂劾應熊及宣大總督江東保定總兵官祝福坐視胡鎮被圍一卒不發帝怒降敕嚴責會寇將遁應熊禦之密雲頗有斬獲寇退帝令江東第諸將功以應熊為首詔增其祖職二級已録防秋勞進左都督總督趙炳然劾其縱寇互巿殘害朔州坐戍邊穆宗立赦還子顯祚襲職纍官署都督僉事總兵官歷鎮山西宣府子弼亦至都督僉事為援遼總兵官姜氏為大將著邊功凡五世安國字良臣綏德衛人初為諸生通春秋子史知名里中後襲世職為指揮僉事正德三年中武會舉第一進署指揮使赴陝西三邊立功劉瑾要賄國同舉六十人咸無資瑾乃編之行伍有警聽調禁其擅歸六十人者悉大窘儕於戍卒不聊生而邊臣憚瑾竟無有收恤之者置鐇反肆赦始放還通政叢蘭請收用瑾怒諷給事中張瓚等劾諸人皆庸才悉停其加官瑾誅始以故官分守寧夏西路尋進署都指揮僉事充右參將擢右副總兵協守大同徙延綏十一年冬寇二萬騎分掠偏頭關諸處國偕遊擊杭雄馳敗之岢嵐州斬首八十餘級獲馬千餘匹寇遂遁初寇大入白羊口帝遣中官張忠都督劉暉侍郎丁鳳統京軍討之比至已飽掠去忠暉恥無功紀功御史劉澄甫攘國等功歸之大行遷賞忠等悉增祿豫世廕尚書王瓊亦加少保廕子錦衣國時以署都督僉事為寧夏總兵官僅豫實授意不平不敢自列乃具疏力辭為部卒重傷者乞録瓊請再國功始進都督同知當是時佞幸擅朝債帥風大熾獨國以材武致大將端謹練戎務所至思盡職推將材者必歸焉在鎮四年卒特諡武敏杭雄字世威世為綏德衛總旗雄承廕數先登積首功六遷至指揮使正德七年進署都指揮僉事剿賊四川尋守備西寧用尚書楊一清薦擢延綏遊擊將軍從都御史彭澤經略哈密偕副將安國破敵岢嵐進都督僉事改參將擢都督同知統邊兵操於西內武宗幸宣府大同雄扈從即拜大同總兵官嘉靖初汰傳奉官雄當貶以方守邊命署都督僉事鎮守如故小王子萬餘騎入沙河堡雄戰却之未幾復大入不能禦求罷不許移延綏召僉書後軍都督府三年秋土魯番侵甘肅詔尚書金獻民視師以雄佩平虜大將軍印充總兵官提督陝西延綏寧夏甘肅四鎮軍務列侯出征始佩大將軍印無授都督者至是特以命雄甫至寇已破走而雄亦得廕錦衣千戶既班師復出鎮寧夏吉囊大入總督王憲檄雄等破之進都督同知寇八千騎乘冰犯寧夏雄及副總兵趙鎮禦之前鋒陷伏中雄等皆敗總督王瓊劾之奪官閒住明年卒雄敢戰嘗以數騎行邊敵麕至乃下馬積鞍為壘跪而射之敵退解衣腋凝血乃知中飛矢武宗在大同見雄檳帷敝甚曰老杭窮乃爾寇至帝將親擊雄叩馬諫曰主人畜犬不使吠盜奚用犬為願聽臣等效力帝笑而止少役延綏巡撫行臺既貴每至臺議事不敢正席坐曰此當年役所也正德嘉靖間西北名將馬永而下稱雄云贊曰時平則將略無由見或綰符出鎮守疆禦侮著有勞效以功名終亦足尚矣許貴周賢魯鑑姜漢家世為將勳閥相承而賢與漢死事尤烈彭清杭雄之清節斯又其最優者歟
