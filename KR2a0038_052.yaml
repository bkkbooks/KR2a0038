body:
  text: 明史卷五十二志第二十八禮六吉禮六奉先殿奉慈殿獻皇帝廟親王從饗功臣配饗王國宗廟羣臣家廟奉先殿洪武三年太祖以太廟時享未足以展孝思復建奉先殿於宮門內之東以太廟象外朝以奉先殿象內朝正殿五間南向深二丈五尺前軒五間深半之製四代帝后神位衣冠定儀物祝文每日朝晡帝及皇太子諸王二次朝享皇后率嬪妃日進膳羞諸節致祭月朔薦新其品物視元年所定惟三月不用鮆魚四月減鰣魚益以王瓜彘五月益以茄九月減柿蟹十月減木瓜蘆蔔益以山藥十一月減天鵝鷀益以獐皆太常奏聞送光祿寺供薦凡遇時新品物太常供獻又録皇考妣忌日歲時享祀以為常成祖遷都北京建如制宣德元年奉太宗祔廟畢復遣鄭王瞻埈詣奉先殿設酒果祭告奉安神位天順七年奉孝恭皇后祔廟畢帝還行奉安神位禮略如祔廟儀弘治十七年吏部尚書馬文升言南京進鮮船本為奉先殿設挽夫至千人沿途悉索今揚徐荒旱願倣古凶年殺禮之意減省以蘇民困命所司議行之武宗即位祧熙祖奉先殿神位亦遷德祖西其衣冠牀幔儀物貯於神庫嘉靖十四年定內殿之祭並禮儀清明中元聖誕冬至正旦有祝文樂如宴樂兩宮壽旦皇后並妃嬪生日皆有祭無祝文樂立春元宵四月八日端陽中秋重陽十二月八日皆有祭用時食舊無祝文今增告詞舊儀但一室一拜至中室跪祝畢又四拜焚祝帛今就位四拜獻帛爵祝畢后妃助亞獻執事終獻徹饌又四拜忌祭舊具服作樂今更淺色衣去樂凡祭方澤朝日夕月出告回參及冊封告祭朔望行禮皆在焉十五年禮部尚書夏言等奏悼靈皇后神主先因祔於所親暫祔奉慈殿孝惠太后之側茲三后神主既擬遷於陵殿則悼靈亦宜暫遷奉先殿旁室享祀祭告則一體設饌從之隆慶元年禮部言舊制太廟一歲五享而節序忌辰等祭則行於奉先殿今孝潔皇后既祔太廟則奉先殿亦宜奉安神位乃設神座儀物於第九室遣官祭告如儀萬曆三年帝欲以孝烈孝恪二后神位奉安於奉先殿禮官謂世宗時議祔陵祭不議祔內殿帝曰奉先殿見有孝肅孝穆孝惠三后神位俱皇祖所定宜遵行祔安蓋當時三后既各祔陵廟仍並祭於奉先殿而外廷莫知也命輔臣張居正等入視居正等言奉先殿奉安列聖祖妣凡推尊為后者俱得祔享內殿比之太廟一帝一后者不同今亦宜奉安祔享從之先是冊封告祭以太常寺官執事仍題請遣官至萬曆元年帝親行禮而遣官之請廢二年太常寺以內殿在禁地用內官供事便帝俞其請凡聖節中元冬至歲暮嘉靖初俱告祭於奉先殿十五年罷中元祭四十五年罷歲暮祭隆慶元年罷聖節冬至祭其方澤朝日夕月出告回參嘉靖中行於景神殿隆慶元年仍行於奉先殿諸帝后忌辰嘉靖以前行於奉先殿十八年改高皇帝后忌辰於景神殿文皇帝后以下於永孝殿二十四年仍行於奉先殿凡內殿祭告自萬曆二年後親祭則祭品告文執事皆出內監遣官代祭則皆出太常惟品用脯醢者即親祭亦皆出太常萬曆十四年禮臣言近年皇貴妃冊封祭告奉先殿祝文執事出內庭而祭品取之太常事體不一夫太常專主祀享而光祿則主膳羞內庭祭告蓋取象於食時上食之義也宜遵舊制凡祭告內殿無論親行遣官其祭品光祿寺供惟告文執事人親行則辦之內庭遣官則暫用太常寺從之奉慈殿孝宗即位追上母妃孝穆太后紀氏諡祔葬茂陵以不得祔廟遂於奉先殿右別建奉慈殿以祀一歲五享薦新忌祭俱如太廟奉先殿儀弘治十七年孝肅周太后崩先是成化時預定周太后祔葬祔祭之議至是召輔臣議祔廟禮劉健等言議誠有之顧當年所引唐宋故事非漢以前制也帝以事當師古乃援孝穆太后別祭奉慈殿為言而命廷臣議健退復疏論其事以堅帝心於是英國公張懋吏部尚書馬文升等言宗廟之禮乃天下公議非子孫得以私之殷周七廟父昭子穆各有配座一帝一后禮之正儀春秋書考仲子之宮胡安國傳云孟子入惠公之廟仲子無祭享之所以此見魯秉周禮先王之制猶存祖廟無二配故也伏覩憲宗敕諭有曰朕心終不自安竊窺先帝至情以重違慈意因勉從並配之議羣臣欲權以濟事亦不得已而為此也據禮區處上副先帝在天遺志端有待於今日稽之周禮有祀先妣之文疏云姜嫄也詩所謂閟宮是已唐宋推尊太后不配食祖廟者則別立殿以享之亦得閟宮之義我朝祖宗迄今已溢九廟配皆無二今宜於奉先殿外建一新廟如詩之閟宮宋之別殿歲時薦享仍稱太皇太后則情義兩盡議上復召健等至素幄袖出奉先殿圖指西一區曰此奉慈殿也又指東一區曰此神廚也欲於此地別建廟奉遷孝穆神主併祭於此健等皆對曰最當已而欽天監奏年方有礙廷議暫奉於奉慈殿正中徙孝穆居左及孝宗崩武宗即位禮部始進奉安孝肅神主儀前期致齊三日告奉先殿及孝宗几筵是日早帝具黑翼善冠淺淡色服黑犀帶先孝穆神座禮畢帝詣神座前請神主降座帝捧主立內執事移神座於殿左間帝奉安訖行叩頭禮至午帝詣清寧宮孝肅几筵行禮畢內侍進神主輿於殿前衣冠輿於丹陛上帝詣拜位親王吉服後隨四拜興帝捧神主由殿中門出奉安輿內執事捧衣冠置輿後隨帝率親王步從至寶善門外太皇太后皇太后率宮妃迎於門內先詣奉慈殿序立於殿西神主輿至奉先殿門外少駐帝詣輿前跪請神主詣奉先殿俯伏興捧神主由殿左門入至殿內褥位跪置神主帝行五拜三叩頭禮畢捧神主仍由左門出安輿內至奉慈殿門外帝捧神主由中門入奉安於神座訖行安神禮三獻如常儀太皇太后以下四拜禮畢內侍官設褥位於殿正中之南帝詣孝穆皇太后神座前跪請神主謁孝肅太皇太后跪置於褥位上俯伏興行五拜三叩頭禮畢帝捧主興仍安於神座訖行安神禮如前皇太后以下四拜嘉靖元年世宗奉孝惠邵太后祔祀八年二月禮部尚書方獻夫等言悼靈皇后禮宜祔享太廟但今九廟之制已備考唐宋故事后於太廟未有本室則創別廟故曲臺禮有別廟皇后禘祫於太廟之文又禮記喪服小記婦祔於祖姑祖姑有三人則祔於親者釋之者曰親者謂舅所生母也今孝惠太皇太后實皇考獻皇帝之生母則悼靈皇后當祔於側詔可三月行祔廟禮先期祭告諸殿至期請悼靈后主詣奉慈殿奉安內侍捧神主諡冊衣冠隨帝至奉先殿謁見帝就位行五拜三叩頭禮次詣崇先殿次詣奉慈殿謁三太后內侍捧主安神座皇妃以下四拜十五年帝以三太后別祀奉慈殿不若奉於陵殿為宜廷臣議古天子宗廟惟一帝一后所生母薦於寢身歿而已孝宗奉慈殿之祭蓋子祀生母以盡終身之孝焉耳然禮妾母不世祭疏曰不世祭者謂子祭之於孫則止明繼祖重故不復顧其私祖母也今陛下於孝肅曾孫也孝穆孫屬也孝惠孫也禮不世祭議當祧考宋熙寧罷奉慈廟故事與今同宜遷主陵廟歲時祔享如故報可奉慈殿遂罷世宗孝烈后隆慶時祀弘孝殿萬曆三年遷祔奉先殿穆宗母孝恪皇太后隆慶初祀神霄殿又祔孝懿后於其側六年孝懿祔太廟萬曆三年孝恪遷祔奉先殿二殿俱罷獻皇帝廟嘉靖二年四月始命興獻帝家廟享祀樂用八佾初禮官議廟制未決監生何淵上書請立世室於太廟東禮部尚書汪俊等皆謂不可帝諭奉先殿側別立一室以盡孝思禮官集議言奉慈之建禮臣據姜嫄特廟而言至為本生父立廟大內古所未有惟漢哀為定陶共王建廟京師不可為法詹事石珤等亦言不可不聽葺奉慈殿後為觀德殿以奉之四年四月淵已授光祿寺署丞復上書請立世室崇祀皇考於太廟禮部尚書席書等議天子七廟周文武並有功德故立文武世室於三昭穆之上獻皇帝追稱帝號未為天子淵妄為諛詞乞寢其奏帝令再議書等言將置主於武宗上則武宗君也分不可僭置武宗下則獻皇叔也神終未安時廷臣於稱考稱伯異同相半至議祔廟無一人以為可者學士張璁桂萼亦皆以為不可書復密疏爭之帝不聽復令會議乃準漢宣故事於皇城內立一禰廟如文華殿制籩豆樂舞一用天子禮帝親定其名曰世廟五年七月諭工部以觀德殿窄隘欲別建於奉天殿左尚書趙璜謂不可不聽乃建於奉先之東曰崇先殿十三年命易承天家廟曰隆慶殿十五年以避渠道遷世廟更號曰獻皇帝廟遂改舊世廟曰景神殿寢殿曰永孝殿十七年以豐坊請稱宗以配明堂禮官不敢違集議者久之言古者父子異昭穆兄弟同世數故殷有四君一世而同廟宋太祖太宗同居昭位今皇考與孝宗當同一廟遂奉獻皇帝祔太廟二十二年更新太廟廷議睿宗孝宗並居一廟同為昭帝責諸臣不竭忠任事寢其議已而左庶子江汝璧請遷皇考廟於穆廟首以當將來世室與成祖廟並峙右贊善郭希顏又欲於太祖廟文世室外止立四親廟而祧孝宗武宗以禮臣斥其妄而止二十四年六月新太廟成遂奉睿宗於太廟之左第四序躋武宗上而罷特廟之祀四十四年以舊廟柱産芝更號曰玉芝宮定日供時享儀穆宗初因禮臣請乃罷時享及節序忌辰有事奉告之祭但進日供而已隆慶元年禮科王治請罷獻皇祔廟而專祀之世廟章下所司萬曆九年禮科丁汝謙請仍專祭玉芝宮復奉宣宗帝后冠服於太廟帝責汝謙妄議謫外任天啓元年太常少卿李宗延奏祧廟宜議言睿宗入廟世宗無窮之孝思也然以皇上視之則遠矣俟光宗升祔時或從舊祧或從新議蓋在孝子固以恩事親而在仁人當以義率祖章下禮部卒不能從親王從饗洪武三年定以皇伯考壽春王王夫人劉氏為一壇皇兄南昌王霍丘王下蔡王安豐王霍丘王夫人翟氏安豐王夫人趙氏為一壇皇兄蒙城王盱眙王臨淮王臨淮王夫人劉氏為一壇後定夫人皆改稱妃皇姪寶應王六安王來安王都梁王英山王山陽王昭信王為一壇凡一十九位春夏於仁祖廟東廡秋冬及歲除於德祖廟東廡皇帝行初獻禮時獻官詣神位分獻四年進親王於殿內東壁九年新太廟成增祀蒙城王妃田氏盱眙王妃唐氏正德中御史徐文華言族有成人而無後者祭終兄弟之孫之身諸王至今五六世矣宜祧禮官議不可嘉靖間仍序列東廡二十四年新建太廟成復進列東壁罷分獻萬曆十四年太常卿裴應章言諸王本從祖祔食今四祖之廟已祧而諸王無所於祔宜罷享而祔之祧廟禮部言祧以藏毀廟之主為祖非為孫禮有祧不聞有配祧者請仍遵初制序列東廡為近禮報可功臣配饗洪武二年享太廟以廖永安俞通海張得勝桑世傑耿再成胡大海趙德勝配設青布幃六於太廟庭中遣官分獻俟皇帝亞獻將畢行禮每歲春秋享廟則配食於仁祖廟之東廡三年定配享功臣常遇春以下凡八位春夏於仁祖廟西廡秋冬於德祖廟西廡設位東向遂罷幃次之設更定三獻禮皇帝初獻時獻官即分詣行禮不拜四年太祖謂中書省臣太廟之祭以功臣配列廡間今既定太廟合祭禮朕以祖宗具在使功臣故舊歿者得少依神靈以同享祀不獨朝廷宗廟盛典亦以寓朕不忘功臣之心於是禮官議凡合祭時為黃布幄殿中祖考神位旁設兩壁以享親王及功臣令大臣分獻制可已而命去布幄九年新太廟成以徐達常遇春李文忠鄧愈湯和沐英俞通海張德勝胡大海趙得勝耿再成桑世傑十二位配於西廡罷廖永安建文時禮部侍郎宋禮言功臣自有雞籠山廟請罷太廟配享帝以先帝所定不從且令候太廟享畢別遣官即其廟祭之洪熙元年以張玉朱能姚廣孝配享太廟遣張輔朱勇王通及尚寶少卿姚繼各祭其父嘉靖九年以廖道南言罷姚廣孝十年以刑部郎中李瑜議進劉基位次六王十六年以武定侯郭勛奏進其祖英初二廟功臣位各以爵及進基位公侯上至是復令禮官議合二廟功臣爵於是列英於桑世傑上張玉朱能於沐英下基於世傑下二十四年進諸配位於新太廟西壁罷分獻萬曆十四年太常卿裴應章言廟中列后在上異姓之臣禮當別嫌且至尊拜俯於下諸臣之靈亦必不安命復改西廡遣官分獻天啓元年太常少卿李宗延言前代文臣皆有從祀我朝不宜獨闕下禮部議不行王國宗廟洪武四年禮部尚書陶凱等議定王國宮垣內左宗廟右社稷廟制殿五間寢殿如之門三間永樂八年建秦愍王享堂命視晉恭王制加高一尺因定享堂七間廣十丈九尺五寸高二丈九尺深四丈三尺五寸弘治十三年寧王宸濠奏廟祀禮樂未有定式乞頒賜遵守禮部議洪武元年學士宋濂等奏定諸王國祭祀禮樂用清字但有曲名而無曲辭請各王府稽考於是靖江王長史具上樂章且言四孟上旬及除夕五祭所用品物俎豆佾舞禮節悉遵國初定制從之嘉靖八年秦王充耀言代懿王當祔廟而自始封至今已盈五廟之數請定祧廟之制禮臣言親王祧廟古制未聞宜推太廟祧祔之禮而降殺之始封居中百世不遷以下四世親盡而祧但諸侯無祧廟祧主宜祔始祖之室置櫝藏之每歲暮則出祧主合祭詔如議羣臣家廟明初未有定制權倣朱子祠堂之制奉高曾祖禰四世神主以四仲之月祭之加臘月忌日之祭與歲時俗節之薦其庶人得奉祖父母父母之祀已著為令至時享於寢之禮略同品官祠堂之制堂三間兩階三級中外為兩門堂設四龕龕置一桌高祖居西以次而東藏主櫝中兩壁立匱西藏遺書衣物東藏祭器旁親無後者以其班附庶人無祠堂以二代神主置居室中間無櫝洪武六年定公侯以下家廟禮儀凡公侯品官別為祠屋三間於所居之東以祀高曾祖考並祔位祠堂未備奉主於中堂享祭二品以上羊一豕一五品以上羊一以下豕一皆分四體熟薦不能具牲者設饌以享所用器皿隨官品第稱家有無前二日主祭者聞於上免朝參凡祭擇四仲吉日或春秋分冬夏至前期一日齊沐更衣宿外舍質明主祭者及婦率預祭者詣祠堂主祭者捧正祔神主櫝置於盤令子弟捧至祭所主祭開櫝捧各祖考神主主婦開櫝捧各祖妣神主以序奉安子弟捧祔主置東西壁執事者進饌讀祝者一人就贊禮以子弟親族為之陳設神位訖各就位主祭在東伯叔諸兄立於其前稍東諸親立於其後主婦在西母及諸母立於其前稍西婦女立於後贊拜皆再拜主祭者詣香案前跪三上香獻酒奠酒執事酌酒於祔位前讀祝者跪讀訖贊拜主祭者復位與主婦皆再拜再獻終獻並如之惟不讀祝每獻執事者亦獻於祔位禮畢再拜焚祝並紙錢於中庭安神主於櫝成化十一年祭酒周洪謨言臣庶祠堂神主俱自西而東古無神道尚右之說惟我太祖廟制合先王左昭右穆之義宜令一品至九品皆立一廟以高卑廣狹為殺神主則高祖居左曾祖居右祖居次左考居次右帝下禮臣參酌更定嘉靖十五年禮部尚書夏言言按三代有五廟三廟二廟一廟之制者以其有諸侯卿大夫上中下之爵也後世官職既殊無世封采邑豈宜過泥於古至宋儒程頤乃始約之而歸於四世自公卿以及士庶莫不皆然謂五服之制皆至高祖則祭亦當如之今定官自三品以上立五廟以下皆四廟為五廟者亦如唐制五間九架厦旁隔板為五室中祔五世祖旁四室祔高曾祖禰為四廟者三間五架中一室祔高曾左右二室祔祖禰若當祀始祖則如朱熹所云臨祭時作紙牌祭訖焚之其三品以上者至世數窮盡則以今之得立廟者為世世奉祀之祖而不遷焉四品以下四世遞遷而已從之
