body:
  text: 明史卷一百九十七列傳第八十五席書弟春篆霍韜子與瑕熊浹黃宗明黃綰陸澄席書字文同遂寧人弘治三年進士授郯城知縣入為工部主事移戶部進員外郎十六年雲南晝晦地震命侍郎樊瑩巡視奏黜監司以下三百餘人書上疏言災異係朝廷不係雲南如人元氣內損然後瘡瘍發四肢朝廷元氣也雲南四肢也豈可舍致毒之源專治四肢之末今內府供應數倍往年冗食官數千投充校尉數萬齋醮寺觀無停日織造頻煩賞賚踰度皇親奪民田宦官增遣不已大獄據招詞不敢辨刑官亦不敢伸大臣賢者未起用小臣言事謫者未復文武官傳升名器大濫災異之警偶泄雲南欲以遠方外吏當之此何理也漢遣八使巡行天下張綱獨曰豺狼當道安問狐狸今樊瑩職巡察不能劾戚畹大臣獨考黜雲南官吏舍本而治末乞陛下以臣所言弊政一切釐革他大害當祛大政當舉者悉令所司條奏而興革之時不能用武宗時歷河南僉事貴州提學副使時王守仁謫龍場驛丞書擇州縣子弟延守仁教之士始知學屢遷福建左布政使寧王宸濠反急募兵二萬討之至則賊已平乃返尋以右副都御史巡撫湖廣中官李鎮張暘假進貢及御鹽名斂財十餘萬書疏發之嘉靖元年改南京兵部右侍郎江南北大飢奉命振江北令州縣十里一廠煮糜哺之全活無算初書在湖廣見中朝議大禮未定揣帝向張璁霍韜獻議言昔宋英宗以濮王第十三子出為人後今上以興獻王長子入承大統英宗入嗣在袞衣臨御之時今上入繼在宮車晏駕之後議者以陛下繼統武宗仍為興獻帝之子別立廟祀張璁霍韜之議未為非也然尊無二帝陛下於武宗親則兄弟分則君臣既奉孝宗為宗廟主可復有他稱乎宜稱曰皇考興獻王此萬世不刊之典禮臣三四執奏未為失也然禮本人情陛下尊為天子慈聖設無尊稱可乎故尊所生曰帝后上慰慈闈此情之不能已也為今日議宜定號曰皇考興獻帝別立廟大內歲時祀太廟畢仍祭以天子之禮似或一道也蓋別以廟祀則大統正而昭穆不紊隆以殊稱則至愛篤而本支不淪尊尊親親並行不悖至慈聖宜稱皇母某后不可以興獻加之獻諡也豈宜加於今日議既具會中朝競詆張璁為邪説書懼不敢上而密以示桂萼萼然其議三年正月萼具疏並上之帝大喜趣召入對無何詔改稱獻帝為本生皇考遂寢召命會禮部尚書汪俊以爭建廟去位特旨用書代之故事禮部長二率用翰林官是時廷臣排異議益力書進又不由廷推因交章詆書至訾其振荒無狀多侵漁書亦屢辭新命並録上大禮考議且乞遣官勘振荒狀帝為遣司禮中官戶刑二部侍郎錦衣指揮往勘而趣書入朝益急比至德州則廷臣已伏闕哭爭盡繫詔獄書馳疏言議禮之家名為聚訟兩議相持必有一是陛下擇其是者而非者不必深較乞宥其愆失俾獲自新不允其年八月入朝帝慰勞有加踰月乃會廷臣大議上奏曰三代之法父死子繼兄終弟及自夏歷漢二千年未有立從子為皇子者也漢成帝以私意立定陶王始壞三代傳統之禮宋仁宗立濮王子英宗即位始終不稱濮王為伯今陛下生於孝宗崩後二年乃不繼武宗大統超越十有六年上考孝宗天倫大義固已乖悖又未嘗立為皇子與漢宋不同自古天子無大宗小宗亦無所生所後禮經所載乃大夫士之禮不可語於帝王伯父子姪皆天經地義不可改易今以伯為父以父為叔倫理易常是為大變夫得三代傳統之義遠出漢唐繼嗣之私者莫若祖訓祖訓曰朝廷無皇子必兄終弟及則嗣位者實繼統非繼嗣也伯自宜稱皇伯考父自宜稱皇考兄自宜稱皇兄今陛下於獻帝章聖已去本生之稱復下臣等大議臣書臣璁臣萼臣獻夫及文武諸臣皆議曰世無二道人無二本孝宗皇帝伯也宜稱皇伯考昭聖皇太后伯母也宜稱皇伯母獻皇帝父也宜稱皇考章聖皇太后母也宜稱聖母武宗仍稱皇兄莊肅皇后宜稱皇嫂尤願陛下仰遵孝宗仁聖之德念昭聖擁翊之功孝敬益隆始終無間大倫大統兩有歸矣奉神主而別立禰室於至親不廢隆尊號而不入太廟於正統無干尊親兩不悖矣一遵祖訓允合聖經復三代數千年未明之典禮洗漢宋悖經違禮之陋習非聖人其孰能之議上詔布告天下尊稱遂定帝既加隆所生中外獻諛希恩者紛然至錦衣百戶隨全光祿録事錢子勛既以罪褫希旨請遷獻帝顯陵梓宮北葬天壽山工部尚書趙璜等斥其謬帝復下廷議書乃會廷臣上言顯陵先帝體魄所藏不可輕動昔高皇帝不遷祖陵文皇帝不遷孝陵全等諂諛小人妄論山陵宜下法司按問帝報曰先帝陵寢在遠朕朝夕思望不勝哀痛其再詳議以聞書復集衆議極言不可乃已書以大禮告成宜有以答天下望乃條新政十二事以獻帝優旨報焉大同軍變殺巡撫張文錦燬總兵官江桓印而出故帥朱振於獄令代桓帝因而命之諭禮部鑄新印書持不可請討之與政府忤時執政者費宏石珤賈詠書心弗善也乃力薦楊一清王守仁入閣且曰今諸大臣皆中材無足與計天下事定亂濟時非守仁不可帝曰書為大臣當抒猷略共濟時艱何以中材自諉守仁迄不獲柄用四年光祿寺丞何淵請建世室祀獻皇帝於太廟帝命禮官集議書等上議王制天子七廟三昭三穆周以文武有大功德乃立世室與后稷廟皆百世不遷我太祖立四親廟德祖居北後改同堂異室議祧則以太祖擬文世室太宗擬武世室今獻皇帝以藩王追崇帝號何淵乃欲比之太祖太宗立世室於太廟甚無據不報頃之張璁特奏上力言不可書亦三疏如璁議帝遣中官即其家諭之書復密疏切諫帝不悅責以畏衆飾姦乃議別立禰廟而世室之議竟寢五年秋章聖太后將謁世廟禮官議不合書以目眚在告上言母后謁廟事出創聞禮官實無所據惟聖明裁酌且世廟既成宜有肆赦之典請盡還議禮遣戍諸臣所謂合萬國之歡心以祀先王此天子大孝也報聞書以議禮受帝知倚為親臣初進大禮集議加太子太保尋以獻帝實録成進少保眷顧隆異雖諸輔臣莫敢望而書得疾不能視事屢疏乞休舉羅欽順自代帝輒慰留不允其後疾篤請益力詔加武英殿大學士賜第京師支俸如故甫聞命而卒贈太傅諡文襄任一子尚寶丞異數也書遇事敢為性頗偏愎初長沙人李鑑為盜知府宋卿論之死書方巡撫湖廣發卿贓私因劾卿故入鑑罪帝遣大臣按不如書言而書時已得幸乃命逮鑑入京再訊書遂言臣以議禮犯衆怒故刑官率右卿而重鑑罪請敕法司辨雪及法司讞上無異詞帝重違書意特減鑑死遣戍其他庇陳洸排費宏率恣行私意為時論所斥弟春篆春由庶吉士授御史巡雲南以兄為都御史改翰林檢討預修武宗實録成當進秩內閣費宏以春由他官入與檢討劉夔並擬按察僉事夔亦故御史以避兄侍郎龍改授者也書大怒疏言故事無纂修書成出為外任者帝以書故留春擢修撰而夔亦留擢編修書由是怨宏數詆諆及書卒帝念其議禮功纍進春翰林學士嘉靖十二年由禮部右侍郎改吏部詔舉堪翰林者春欲召還故翰林楊惟聰陳沂尚書汪鋐不可遂有隙後鋐有所推舉不與春議春怒詬鋐鋐訐春前附楊廷和排議禮諸臣遂落職卒於家篆為戶科給事中黔國公沐崑劾按察使沈恩等篆與同官李長私語崑奏多誣長即劾崑武宗責長誣重臣下詔獄詞連篆並繫治謫外篆得夷陵判官世宗嗣位復故官未上卒豫祭贈光祿少卿霍韜字渭先南海人舉正德九年會試第一謁歸成婚讀書西樵山經史淹洽世宗踐阼除職方主事楊廷和方柄政韜上言閣臣職參機務今止票擬而裁決歸近習輔臣失參贊之權近習起干政之漸自今章奏請召大臣面決施行講官臺諫班列左右衆議而公駁之宰相得取善之名內臣免招權之謗因言錦衣不當典刑獄東廠不當預朝議撫按兵備官不當以軍功授秩廕興府護衛軍不當盡取入京概授官職御史謝源伍希儒赴難有功不當罷黜平逆藩功自安慶南昌外不當濫帝嘉納之及大禮議起禮部尚書毛澄力持考孝宗韜私為大禮議駁之澄貽書相質難韜三上書極辨其非已知澄意不可回其年十月上疏曰按廷議謂陛下宜以孝宗為父興獻王為叔別擇崇仁王子為獻王後考之古禮則不合質之聖賢之道則不通揆之今日之事體則不順考儀禮喪服章云斬衰為所後者又云為人後者為其父母報是於所後者蓋無稱為父母之説而於本生父母又無改稱伯叔父母之云也漢儒不明其義謬為邪説曰為人後者為之子果如其言則漢宣帝當為昭帝後矣然昭帝從祖也宣帝從孫也孫將謂祖為父可乎唐宣宗當為武宗後矣然武宗姪也宣宗叔也叔反謂姪為父可乎吳諸樊兄弟四人以國相授受蓋迭相為後矣是兄弟自具高曾祖考也而可乎故曰考之古禮則不合也天下者天下之天下非一人所得私也宋人之告其君曰仁宗於宗室中特簡聖明授以大業陛下所以負扆端冕富有四海子孫萬世柤承皆先帝之德蓋謂仁宗以天下授英宗宜舍本生父母而以仁宗為父母也臣以聖賢之道觀之孟子言舜為天子瞽瞍殺人皋陶執之舜則竊負而逃是父母重而天下輕也若宋儒之説則天下重而父母輕矣故曰求之聖賢之道則不通也武宗嗣孝宗歷十有六年孝宗非無嗣也今強欲陛下重為孝宗之嗣何為也哉夫陛下為孝宗子矣誰為武宗子乎孝宗有兩嗣子矣武宗獨無嗣子可乎臣子於君父一也既不忍孝宗之無嗣獨忍武宗之無嗣乎若曰武宗以兄固得享弟之祀則孝宗以伯獨不得享姪之祀乎既可越武宗直繼孝宗矣獨不可並越孝宗直繼憲宗乎武宗無嗣無可如何矣孝宗有嗣復強繼其嗣而絶興獻之嗣是於孝宗無所益而於興獻不大有損乎故曰揆之今日之事體則不順也然臣下之為此議也其故有三曰前代故事之拘也曰不忘孝宗之德也曰避迎合之嫌也今陛下既考孝宗矣尊興獻王以帝號矣則將如斯而已乎臣竊謂帝王之相繼也繼其統而已矣固不屑屑於父子之稱也惟繼其統則不惟孝宗之統不絶即武宗之統亦不絶矣然則如之何而可乎惟陛下於興獻王得正父子之稱以不絶天性之恩於國母之迎得正天子之母之禮復於昭聖太后武宗皇后處之有其道事之盡其誠則於尊尊親親兩不悖矣帝得疏喜甚迫羣議不遽行而朝士咸指目韜為邪説韜意不自得尋謝病歸嘉靖三年帝議尊崇所生益急兩詔召韜韜辭疾不赴馳疏言今日大禮之議兩端而已曰崇正統之大義也曰正天倫之大經也徒尊正統其弊至於利天下而棄父母徒重天倫其弊至於小加大而卑踰尊故臣謂陛下宜稱孝宗曰皇伯考獻帝曰皇考此天倫之當辨者也尊崇之議則姑在所緩此大統之當崇者也乃廷議欲陛下上考孝宗又兼考獻帝此漢人兩統之失也本原既差則愈議愈失臣之愚慮則願陛下預防未然之失母重將來之悔而已始陛下尊昭聖皇太后為母雖於禮未合然宮闈之內亦既相安今一旦改稱大非人情所堪願陛下以臣等建議之情上啓皇太后必中心悅豫無疑二之隙萬一未喻亦得歸罪臣等加賜誅斥然後委曲申請務得其歡心陛下朝夕所以承迎其意慰釋其憂者亦無所不用其極庶名分正而嫌隙消天下萬世無所非議此臣愚慮者一也昭聖之嫡嗣武宗一人而已武宗無嗣莊肅皇后之屬望已矣臣謂陛下之事昭聖禮秩雖極尊崇然其勢日輕陛下之事聖母尊稱雖或未至然其勢日重故今日廷臣惓惓以尊大統母昭聖為請者蓋預防陛下將來之失而追報孝宗之職分也臣嘗伏讀明詔正統大義不敢有違知陛下尊昭聖敬莊肅此心可上質天地下信士庶矣但恐左右之人不達聖意妄生疑間或以彌文小節遂搆兩宮之隙此不可不早慮而預防之也願陛下以臣等建議之情上啓聖母曰昭聖皇太后實大統嫡宗至尊無對伏願聖母時自謙抑示尊敬至意莊肅皇后母儀天下十六年聖母接見之儀不可輕忽凡正旦賀壽聖母每致謙讓不敢受納之意俾宮闈大權一歸昭聖而聖母若無與焉則天下萬世稱頌懿德與天無極萬一聖母意猶未喻亦得歸罪臣等加賜誅斥然後委曲申請務得允從庶宗統正而嫌隙消天下萬世無所非議此臣愚慮者二也帝深嘉其忠義趣令趨朝明年擢少詹事兼侍講學士韜固辭且請令六部長二翰林給事御史俱調外任練政體監司守令政績卓異即擢卿丞有文學者擢翰林舉貢入仕皆得擢翰林升部院不宜困資格帝不允辭趣令赴職下其奏於有司悉格不用六年還朝命直經筵日講韜自以南音力辭日講請撰古今政要及詩書直解以進帝褒許之其年九月遷詹事兼翰林學士韜復固辭言自楊榮楊士奇楊溥以及李東陽楊廷和顓權植黨籠翰林為屬官中書為門吏故翰林遷擢不由吏部而中書至有進秩尚書者臣嘗建議謂翰林去留盡屬吏部庶不陰倚內閣為腹心內閣亦不陰結翰林為羽翼且欲京官補外以均勞逸議未即行躬自蹈之而又躐居學士徐縉上何愧如之帝優詔不允明年四月進禮部右侍郎韜力辭且舉康海王九思李夢陽魏校顏木王廷陳何瑭自代帝不允再辭乃允之六月大禮成超拜禮部尚書掌詹事府事韜因言翰林院修書遷官日講廕子及巡撫子弟廕武職之非而以為己不能力挽不可隨衆趨且稱給事中陳洸冤薦監生陳雲章才可用帝優詔褒答不允辭韜復奏曰今異議者謂陛下特欲尊崇皇考遂以官爵餌其臣臣等二三臣苟圖官爵遂阿順陛下之意臣嘗自慨若得禮定決不受官俾天下萬世知議禮者非利官也苟疑議禮者為利官則所議雖是彼猶以為非何以塞天下口因固辭不拜帝猶不允三辭乃允之韜先後薦王守仁王瓊諸人帝皆納用嘗因災異陳時弊十餘事多議行張璁桂萼之罷政也韜謂言官陸粲等受楊一清指使兩疏力攻一清奪其職而璁萼召還帝從夏言議將分祀天地建二郊韜極言其非帝不悅責韜罔上自恣言亦疏辨力詆韜韜素護前自遂見帝怒不敢辨乃遺言書痛詆之復録其書送法司言怒疏陳其狀且劾韜無君七罪並以其書進呈帝大怒責韜謗訕君上醜正懷邪遂下都察院獄韜從獄中上書祈哀璁亦再申救帝皆不納南京御史鄧文憲言宜察韜心容其戇且天地分祀是置父母異處郊外親蠶是廢內外防間帝怒謫之邊方韜繫獄踰月帝終念其議禮功令輸贖還職尋以母喪歸廣東僉事龔大稔訐韜及方獻夫居鄉不法事大稔反被逮削籍十二年韜起歷吏部左右侍郎時部事多主於尚書兩侍郎率不預韜爭於尚書汪鋐侍郎始獲參部事韜素剛愎屢與鋐爭鋐等亦嚴憚之既而鋐罷帝久不置尚書以韜掌部事閣臣李時傳旨用鴻臚卿王道中為順天府丞韜言輔臣承天語無可疑然臣等猶當奏請用杜矯偽因守故事列道中及應天府丞郭登庸二人名上帝嘉其守法乃用登庸而改道中大理少卿久之出韜為南京禮部尚書順天府尹劉淑相坐所親贓私被鞫疑禮部尚書夏言姻通判費完陷之訐言請屬事帝怒下淑相詔獄淑相與韜善言亦疑韜主之遂訐韜扈蹕謁陵遠遊銀山寺大不敬韜自訴因論言請諡故少師費宏為文憲不宏纍被劾狀按律增減緊關情節者斬且憲乃純皇帝廟號人臣安得用會南京給事中曾鈞騎馬不避尚書劉龍潘珍轎龍與鈞互訐奏韜劾鈞且請禁小臣乘轎給事中李充濁曹邁等交章言近侍之臣不當避道雜舉公會宴次得與尚書同列以證語頗侵韜韜疑充濁倚言為內主訐充濁為姦黨復托言他事言益怒奏韜大罪十餘事且言彭時宋濂皆於正德間諡文憲不避廟號韜陋不知故事帝方不直韜淑相復從獄中托言他事帝益怒考訊之辭服韜主使乃斥淑相為民降韜俸一級當議乘轎時言被劾不預都御史王廷相會禮部侍郎黃宗明張璧請禁飭小臣如韜奏而南京諸給事御史自如韜以為言帝復申飭衆情滋不悅曹邁及同官尹相等遂與韜忿爭相劾韜遷南部怨望擅取海子魚與鄉人羣飲郊壇松下侍郎袁宗儒期喪不當進表逼使行韜上疏自理下廷議帝為停韜俸四月相等亦停二月韜既與言交惡及言柄用韜每欲因事陷之上言頃吏部選劉文光等為給事中尋忽報罷人皆曰閣臣抑之給事中李鶴鳴考察謫官尋復故人皆曰賄得宜諭吏部毋受當事頤指使天下知威福出朝廷而大臣有李林甫秦檜者不得播弄於左右其意為言發也於是鶴鳴上疏自白並托韜居鄉不法諸事帝兩置之無何韜劾南京御史龔湜郭本湜等自辨亦劾韜帝並置不問十八年簡補宮僚命韜以太子少保禮部尚書協掌詹事府事疏辭加秩且詆大臣受祿不讓晉秩不辭或有狐鼠鑽結陰固寵權怨氣召災實有所自其意亦為言發既屢擊言不勝最後見郭勛與言有隙乃陰比勛與共齮齕言時中外訛言帝復南幸韜因顯頌勛言六飛南狩時臣下多納賄不法文官惟袁宗儒武官惟郭勛不受饋今訛言復播宜有以禁戢之帝既下詔安羣情乃詰韜曰朕昨南巡卿不在行受賄事得自何人據實以奏韜對請問諸郭勛帝責其支詞務令指實韜窘乃言扈從諸臣無不受餽遺折取夫隸直者第問之夏言令自述至各官取賄實迹勛具悉始末當不欺如必欲臣言請假臣風憲職循途按之當備列以奏章下所司韜懼不當帝旨尋赴京列所遇進鮮船內臣貪橫狀帝亦不問明年十月卒於官年五十有四贈太子太保諡文敏韜學博才高量褊隘所至與人競帝頗心厭之故不大用先後多所建白亦頗涉國家大計且嘗薦大禮大獄得罪諸臣及廢籍李夢陽康海等在南都禁喪家宴飲絶婦女入寺觀罪娼戶市良人女毀淫祠建社學散僧尼表忠節既去士民思之始與璁萼結既而比郭勛舉進士出毛澄門下素執弟子禮議禮不合遂不復稱為座主及總裁己丑會試亦遂不以唐順之等為門生其議禮時詆司馬光後議薛瑄從祀至追論光不可祀孔廟其不顧公論如此子與瑕舉進士授慈溪知縣鄢懋卿巡鹽行部與瑕不禮為所劾罷起知鄞縣終廣西僉事熊浹字悅之南昌人正德九年進士授禮科給事中寧王宸濠將為變浹與同邑御史熊蘭草奏授御史蕭淮上之濠倉卒舉事卒敗本兩人早發之力出核松潘邊餉副總兵張傑倚江彬勢贓纍巨萬誘殺熟番上功啓邊釁箠死千戶以下至五百人又嘗率家衆遮擊副使胡澧撫按莫敢言浹至盡發其狀傑遂褫職世宗踐阼廷議追崇禮未定浹馳疏言陛下起自藩服入登大寶倘必執為後之説考孝宗而母慈壽則興獻母妃當降稱伯叔父母矣不知陛下承歡內庭時將仍舊稱乎抑改而從今稱乎若仍舊稱而不得尊之為后則於慈壽徒有為後之虛文於母妃則又缺尊崇之大典無一而可也臣愚謂興獻王尊以帝號別建一廟以示不敢上躋於列聖母妃則尊為皇太后而少殺其徽稱以示不敢上同於慈壽此於大統固無所妨而天性之恩亦得以兼盡疏至會興王及妃已稱為帝后下之禮官嘉靖初由右給事中出為河南參議艱歸六年服闋召修明倫大典超擢右僉都御史協理院事明年四月遷大理寺卿俄遷右副都御史大典成轉左八年二月遂擢右都御史掌院事京師民張福訴里人張柱殺其母東廠以聞刑部坐柱死不服福姊亦泣訴官謂母福自殺之其鄰人之詞亦然詔郎中魏應召覆按改坐福東廠奏法司妄出人罪帝怒下應召詔獄浹是應召議執如初帝愈怒褫浹職給事中陸粲劉希簡爭之帝大怒並下兩人詔獄侍郎許讚等遂抵柱死應召及鄰人俱充軍杖福姊百人以為冤當是時帝方深疾孝武兩后家柱實武宗后家夏氏僕故帝必欲殺之浹家居十年至帝幸承天與近臣論舊人乃召為南京禮部尚書改兵部參贊機務二十一年召為兵部尚書掌都察院事居二年代許讚為吏部尚書帝於禁中築乩仙臺間用其言決威福浹論其妄帝大怒欲罪之以前議禮故不遽斥二品六年滿加太子太保坐事奪俸者再浹知帝意終不釋遂稱病乞休帝大怒褫職為民又十年卒浹少有志節自守嚴雖由議禮顯然不甚黨比尤愛護人才故其去吏部也善類多思之隆慶初復官豫祭葬諡恭肅黃宗明字誠甫鄞人正德九年進士除南京兵部主事進員外郎嘗從王守仁論學寧王宸濠反上江防三策武宗南征抗疏諫尋請告歸嘉靖二年起南京刑部郎中張璁桂萼爭大禮自南京召入都未上三年四月璁萼黃綰及宗明聯疏奏曰今日尊崇之議以陛下與為人後者禮官附和之私也以陛下為入繼大統者臣等考經之論也人之言曰兩議相持有大小衆寡不敵之勢臣等則曰惟理而已大哉舜之為君視天下悅而歸己猶草芥也惟不順於父母如窮人無所歸今言者徇私植黨奪天子之父母而不顧在陛下可一日安其位而不之圖乎此聖諭令廷臣集議終日相視莫敢先發者勢有所壓理有所屈故也臣等大懼欺蔽因循終不能贊成大孝陛下何不親御朝堂進百官而詢之曰朕以憲宗皇帝之孫孝宗皇帝之姪興獻帝之子遵太祖兄終弟及之文奉武宗倫序當立之詔入承大統非與為人後者也前者未及詳稽遽詔天下尊孝宗皇帝為皇考昭聖太后為聖母而興獻帝后別加本生之稱朕深用悔艾今當明父子大倫繼統大義改稱孝宗為皇伯考昭聖為皇伯母而去本生之稱為皇考恭穆獻皇帝聖母章聖皇太后此萬世通禮爾文武廷臣尚念父子之親君臣之義與朕共明大倫於天下如此在朝百工有不感泣而奉詔者乎更以此告於天下萬姓其有不感泣而奉詔者乎此即周禮詢羣臣詢萬民之意也奏入帝大悅卒如其言宗明亦遂蒙帝眷明年出為吉安知府遷福建鹽運使六年召修明倫大典以母憂歸服闋徵拜光祿卿十一年擢兵部右侍郎其冬編修楊名以劾汪鋐下詔獄詞連同官程文德亦坐繫詔書責主謀者益急宗明抗疏救且曰連坐非善政今以一人妄言必究主使廷臣孰不懼況名搒掠已極當嚴冬或困斃將為仁明纍帝大怒謂宗明即其主使並下詔獄謫福建右參政帝終念宗明議禮功明年召拜禮部右侍郎遼東兵變捶辱巡撫呂經而帝務姑息納鎮守中官王純等言將逮經宗明言前者遼陽之變生於有激今重賦苛徭悉已釐正廣寧復變又誰激之法不宜復赦請令新撫臣韓邦奇勒兵壓境揚聲討罪取其首惡用振國威不得專事姑息帝不從經卒被逮宗明尋轉左侍郎卒於官初議禮諸臣恃帝恩眷驅駕氣勢恣行胸臆宗明雖由是驟顯持論頗平於諸人中獨無畏惡之者黃綰字宗賢黃巖人侍郎孔昭孫也承祖廕官後府都事嘗師謝鐸王守仁嘉靖初為南京都察院經歷張璁桂萼爭大禮帝心嚮之三年二月綰亦上言曰武宗承孝宗之統十有六年今復以陛下為孝宗之子繼孝宗之統則武宗不應有廟矣是使孝宗不得子武宗乃所以絶孝宗也由是使興獻帝不得子陛下乃所以絶興獻帝也不幾於三綱淪九法斁哉奏入帝大喜下之所司其月再上疏申前説俄聞帝下詔稱本生皇考復抗疏極辨又與璁萼及黃宗明合疏爭大禮乃定綰自是大受帝知及明年何淵請建世室綰與宗明斥其謬尋遷南京刑部員外郎再謝病歸帝念其議禮功六年六月召擢光祿少卿預修明倫大典王守仁中忌者雖封伯不給誥券歲祿諸有功若知府邢珣徐璉陳槐御史伍希儒謝源多以考察黜綰訟之於朝且請召守仁輔政守仁得給賜如制珣等亦録綰尋遷大理左少卿其年十月璁萼逐諸翰林於外引己所善者補之遂用綰為少詹事兼侍講學士直經筵以任子官翰林前此未有也明年大典成進詹事錦衣僉事聶能遷者初附錢寧得官用登極詔例還為百戶後附璁萼議大禮且交關中貴崔文得復故職大典成諸人皆進秩能遷獨不與大恨囑罷間主事翁洪草奏誣王守仁賄席書得召用詞連綰及璁綰疏辨且乞引避帝優旨留之而下能遷法司遣之戍洪亦編原籍為民綰與璁輩深相得璁欲用為吏部侍郎且令典試南京並為楊一清所抑又以其南音不令與經筵綰大恚上疏醜詆一清而不斥其名帝心知其為一清也以浮詞責之其年十月出為南京禮部右侍郎遍攝諸部印十二年召拜禮部左侍郎初綰與璁深相結至是夏言長禮部帝方嚮用綰乃潛附之與璁左其佐南禮部也郎中鄒守益引疾詔綰核實久不報而守益竟去吏部尚書汪鋐希璁指疏發其事詔奪守益官令鋐覆核鋐遂劾綰欺蔽璁調旨削三秩出之外會禮部請祈穀導引官帝留綰供事鋐於是再疏攻綰且掇及他事帝復命調外綰上疏自理因詆鋐為璁鷹犬乞賜罷黜以避禍帝終念綰議禮功仍留任如故綰自是顯與璁二矣初大同軍變殺總兵官李瑾據城拒守總制侍郎劉源清提督郤永議屠之城中恟懼外勾蒙古為助塞上大震巡撫潘倣急請止兵源清怒馳疏力詆倣璁及廷議並右源清綰獨言非策及源清罷侍郎張瓚往代未至而郎中詹榮等已定亂叛卒未盡獲軍民瘡痍甚代王請遣大臣綏輯之疏下禮部夏言以為宜許而極詆前用兵之謬語侵璁璁怒力持不欲遣帝委曲諭解之乃特以命綰且令察軍情勘功罪得便宜行事綰馳至大同宗室軍民牒訴官軍暴掠者以百數無告叛軍者綰一無所問以安其心有為叛軍使蒙古歸者綰執戮之反側者復相煽綰大集軍民曉以禍福罹害者陳牒綰佯不問而密以牒授給振官按里核實一日捕首惡數十人卒尚欽殺一家三人懼不免夜鳴金倡亂無應者遂就擒綰復圖形購首惡數人軍民乃不復虞詿誤遂令有司樹木柵設保甲四隅創社學教軍民子弟城中大安還朝列上文武將吏功罪極詆源清永綰以勞增俸一等璁及兵部庇源清陰抑綰綰纍疏論帝亦意嚮之源清永卒被逮綰尋以母憂歸十八年禮官以恭上皇天上帝大號及皇祖諡號請遣官詔諭朝鮮時帝方議討安南欲因以覘之乃曰安南亦朝貢之國不可以邇年叛服故不使與聞其擇大臣有學識者往廷臣屢以名上皆不用特起綰禮部尚書兼翰林學士為正使諭德張治副之帝方幸承天趣綰詣行在受命綰憚往至徐州先馳使奏疾不能前致失期帝責綰不馳赴行在而舟詣京師為大不敬令陳狀已而釋之綰數陳便宜請得節制兩廣雲貴重臣遣給事御史同事吏禮兵三部擇郎官二人備任使帝悉從之最後為其父母請贈且援建儲恩例請給誥命如其官帝怒褫尚書新命令以侍郎間住使事亦竟寢久之卒於家綰起家任子致位卿二初附張璁晚背璁附夏言時皆以傾狡目之方大禮之興也首繼璁上疏者為襄府棗陽王祐楒其言曰孝廟止宜稱皇伯考聖父宜稱皇考興獻大王即興國之陵廟祀用天子禮樂祝稱孝子皇帝某聖母宜上徽號稱太妃迎養宮中庶繼體之道不失天性之親不泯時世宗登極歲之八月也自時厥後諸希寵干進之徒紛然而起失職武夫罷間小吏亦皆攘臂努目抗論廟謨即璁萼輩亦羞稱之不與為伍故自璁等八人外率無殊擢至致仕教諭王價遂請加諸臣貶竄誅戮之刑懲朋黨欺蔽之罪而最陋者南京刑部主事歸安陸澄初極言追尊之非逮服闋入都明倫大典已定璁萼大用事澄乃言初為人誤質之臣師王守仁乃大悔恨萼悅其言請除禮部主事而帝見澄前疏惡之謫高州通判以去嘉靖四年七月席書將輯大禮集議因言近題請刊布多繫建言於三年以前若臣書及璁萼獻夫韜所正取者不過五人禮科右給事中熊浹南京刑部郎中黃宗明都察院經歷黃綰通政司經歷金述監生陳雲章儒士張少連及楚王棗陽王二宗室外所附取者不過六人有同時建議若監生何淵主事王國光同知馬時中巡檢房濬言或未純義多未正亦在不取其他罷職投間之夫建言於璁萼等召用後者皆望風希旨有所覬覦亦一切不録其錦衣百戶聶能遷昌平致仕教諭王價建言三年二三月未經採入今二臣奏乞附名應如其請帝從之因詔大禮已定自今有假言陳奏者必罪不宥至十二年正月蒲州諸生秦鏜伏闕上書言孝宗之統訖於武宗則獻皇帝於孝宗實為兄終弟及陛下承獻皇帝之統當奉之於太廟而張孚敬議禮乃別創世廟以祀之使不得預昭穆之次是幽之也又謂分祀天地日月於四郊失尊卑大小之序去先師王號撤其塑像損其禮樂增啓聖祠皆非聖祖之意請復其初帝得奏大怒責以毀上不道下詔獄嚴訊令供主謀鏜服妄議希恩實無主使者乃坐妖言律論死繫獄其後又從豐坊之請入廟稱宗以配上帝則璁輩已死不及見矣贊曰席書等亦由議禮受知而持論差平然事以激成末流多變蓋至入廟稱宗則亦非諸人倡議之初心矣書韜在官頗有所建樹浹宗明能自斂戢時論為優至綰之傾狡乃不足道矣
