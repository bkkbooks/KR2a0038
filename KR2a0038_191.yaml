body:
  text: 明史卷一百九十一列傳第七十九毛澄汪俊弟偉吳一鵬朱希周何孟春豐熙子坊徐文華薛蕙胡侍王祿侯廷訓毛澄字憲清崑山人舉弘治六年進士第一授修撰預修會典成進右諭德直講東宮武宗為太子以澄進講明晰稱之帝帝大喜方秋夜置宴即徹以賜武宗立進左庶子直經筵以母憂歸正德四年劉瑾摘會典小疵貶諸纂修者秩以澄為侍讀服闋還朝進侍講學士再進學士掌院事歷禮部侍郎十二年六月拜尚書其年八月朔帝微行澄率侍郎王瓚顧清等疏請還宮既又出居庸幸宣府久留不返澄等頻疏諫悉不報明年正月駕旋命百官戎服郊迎澄等請用常服不許七月帝自稱威武大將軍朱壽統六師巡邊遂幸宣府抵大同歷山西至榆林澄等屢疏馳諫至十二月復偕廷臣上疏曰去歲正月以來鑾輿數駕不遑寧居今茲之行又已半歲宗廟社稷享祀之禮並係攝行萬壽正旦冬至朝賀之儀悉從簡略臘朔省牲闕而不行遂二年矣歲律將周郊禋已卜皇祖之訓曰凡祀天地精誠則感格怠慢則禍生今六龍遐騁旋軫無日萬一冰雪阻違道途梗塞元正上日不及躬執玉帛於上帝前陛下何以自安且邊地荒寒隆冬尤甚臣等處重城食厚祿仰思聖體勞頓根本空虛遙望清塵憂心如醉伏祈趣駕速還躬親祼享宗社臣民幸甚不報十四年二月駕甫還京即諭禮部總督軍務威武大將軍總兵官太師鎮國公朱壽遣往兩畿瞻東嶽奉安聖像祈福安民澄等駭愕復偕廷臣上言陛下以天地之子承祖宗之業九州四海但知陛下有皇帝之號今曰總督軍務威武大將軍太師鎮國公者臣等莫知所指夫出此旨者陛下也加此號者陛下也不知受此號者何人如以皇儲未建欲遍告名山大川用祈默相則遣使走幣足將敬矣何必躬奉神像獻寶香如佛老所為哉因歷陳五不可亦不報宸濠反江西帝南征示威武駐蹕留都者踰歲澄屢請回鑾及駕返通州用江彬言將即賜宸濠死澄據漢庶人故事請還京告郊廟獻俘行戮不從中官王堂鎮浙江請建生祠西番闡化王使者乞額外賜茶九萬斤澄皆力爭不聽王瓊欲陷彭澤澄獨白其無罪武宗崩澄偕大學士梁儲壽寧侯張鶴齡駙馬崔元太監韋霦等迎世宗於安陸既至將謁見有議用天子禮者澄曰今即如此後何以加豈勸進辭讓之禮當遂廢乎世宗踐阼甫六日有旨議興獻王主祀及尊稱五月七日戊午澄大會文武羣臣上議曰考漢成帝立定陶王為皇太子立楚孝王孫景為定陶王奉共王祀共王者皇太子本生父也時大司空師丹以為恩義備至今陛下入承大統宜如定陶王故事以益王第二子崇仁王厚炫繼興王後襲興王主祀事又考宋濮安懿王之子入繼仁宗後是為英宗司馬光謂濮王宜尊以高官大爵稱王伯而不名范鎮亦言陛下既考仁宗若復以濮王為考於義未當乃立濮王園廟以宗朴為濮國公奉濮王祀程頤之言曰為人後者謂所後為父母而謂所生為伯叔父母此生人之大倫也然所生之義至尊至大宜別立殊稱曰皇伯叔父某國大王則正統既明而所生亦尊崇極矣今興獻王於孝宗為弟於陛下為本生父與濮安懿王事正相等陛下宜稱孝宗為皇考改稱興獻王為皇叔父興獻大王妃為皇叔母興獻王妃凡祭告興獻王及上箋於妃俱自稱姪皇帝某則正統私親恩禮兼盡可以為萬世法議上帝怒曰父母可更易若是耶命再議其月二十四日乙亥澄復會廷臣上議曰禮為人後者為之子自天子至庶人一也興獻王子惟陛下一人既入繼大統奉祀宗廟是以臣等前議欲令崇仁王厚炫主興獻王祀至於稱號陛下宜稱為皇叔父興獻大王自稱姪皇帝名以宋程頤之説為可據也本朝之制皇帝於宗藩尊行止稱伯父叔父自稱皇帝而不名今稱興獻王為皇叔父大王又自稱名尊崇之典已至臣等不敢復有所議因録程頤代彭思永議濮王禮疏進覽帝不從命博考前代典禮再議以聞澄乃復會廷臣上議曰臣等會議者再請改稱興獻王為叔父者明大統之尊無二也然加皇字於叔父之上則凡為陛下伯叔諸父皆莫能與之齊矣加大字於王之上則天下諸王皆莫得而並之矣興獻王稱號既定則王妃稱號亦隨之天下王妃亦無以同其尊矣況陛下養以天下所以樂其心不違其志豈一家一國之養可同日語哉此孔子所謂事之以禮者其他推尊之説稱親之議似為非禮推尊之非莫詳於魏明帝之詔稱親之非莫詳於宋程頤之議至當之禮要不出於此並録上魏明帝詔書當是時帝鋭意欲推崇所生而進士張璁復抗疏極言禮官之謬帝心動持澄等疏久不下至八月庚辰朔再命集議澄等乃復上議曰先王制禮本乎人情武宗既無子嗣又鮮兄弟援立陛下於憲廟諸孫之中是武宗以陛下為同堂之弟考孝宗母慈壽無可疑矣可復顧私親哉疏入帝不懌復留中會給事中邢寰請議憲廟皇妃邵氏徽號澄上言王妃誕生獻王實陛下所自出但既承大統則宜考孝宗而母慈壽太后矣孝宗於憲廟皇妃宜稱皇太妃則在陛下宜稱太皇太妃如此則彝倫既正恩義亦篤疏入報聞其月帝以母妃將至下禮官議其儀澄等請由崇文門入東安門帝不可乃議由正陽左門入大明東門帝又不可澄等執議如初帝乃自定其儀悉由中門入時尊崇禮猶未定張璁復進大禮或問帝益嚮之至九月末乃下澄等前疏更令博採輿論以聞澄等知勢不可已謀於內閣加稱興王為帝妃為后而以皇太后懿旨行之乃疏言臣等一得之愚已盡於前議茲欲仰慰聖心使宜於今而不戾乎情合乎古而無悖乎義則有密勿股肱在臣等有司未敢擅任帝遂於十月二日庚辰以慈壽皇太后旨加興獻王號曰興獻帝妃曰興國太后皇妃邵氏亦尊為皇太后宣示中外顧帝雖勉從廷議意猶慊之十二月十一日己丑復傳諭加稱皇帝內閣楊廷和等封還御批澄抗疏力爭又偕九卿喬宇等合諫帝皆不允明年嘉靖改元正月清寧宮後三小宮災澄復以為言會朝臣亦多諫者事獲止澄端亮有學行論事侃侃不撓帝欲推尊所生嘗遣中官諭意至長跪稽首澄駭愕急扶之起其人曰上意也上言人孰無父母奈何使我不獲伸必祈公易議因出囊金畀澄澄奮然曰老臣悖耄不能隳典禮獨有一去不與議已耳抗疏引疾至五六上帝輒慰留不允二年二月疾甚復力請乃許之舟至興濟而卒先是論定策功加澄太子太傅廕錦衣世指揮同知力辭不受帝雅敬憚澄雖數忤旨而恩禮不衰既得疾遣醫診視藥物之賜時至其卒也深悼惜之贈少傅諡文簡汪俊字抑之弋陽人父鳳進士貴州參政俊舉弘治六年會試第一授庶吉士進編修正德中與修孝宗實録以不附劉瑾焦芳調南京工部員外郎瑾芳敗召復原官纍遷侍讀學士擢禮部右侍郎嘉靖元年轉吏部左侍郎時議興獻王尊號與尚書喬宇毛澄輩力爭澄引疾去代者羅欽順不至乃以俊為禮部尚書是時獻王已加帝號矣主事桂萼復請稱皇考章下廷議三年二月俊集廷臣七十有三人上議曰祖訓兄終弟及指同産言今陛下為武宗親弟自宜考孝宗明矣孰謂與人為後而滅武宗之統也儀禮傳曰為人後者孰後後大宗也漢宣起民間猶嗣孝昭光武中興猶考孝元魏明帝詔皇后無子擇建支子以繼大宗孰謂入繼之主與為人後者異也宋范純仁謂英宋親受詔為子與入繼不同蓋言恩義尤篤尤當不顧私親非以生前為子者乃為人後身後入繼者不為人後也萼言孝宗既有武宗為之子安得復為立後臣等謂陛下自後武宗而上考孝宗非為孝宗立後也又言武宗全神器授陛下何忍不繼其統臣等謂陛下既稱武宗皇兄矣豈必改孝宗稱伯乃為繼其統乎又言禮官執者不過前宋濮議臣等愚昧所執實不出此蓋宋程頤之議曰雖當專意於正統豈得盡絶於私恩故所繼主於大義所生存乎至情至於名稱統緒所繫若其無別斯亂大倫殆為今日發也謹集諸章奏惟進士張璁主事霍韜給事中熊浹與萼議同其他八十餘疏二百五十餘人皆如臣等議議上留中而特旨召桂萼張璁席書於南京越旬有五日乃下諭曰朕奉承宗廟正統大義豈敢有違第本生至情亦當兼盡其再集議以聞俊不得已乃集羣臣請加皇字以全徽稱議上復留十餘日至三月朔乃詔禮官加稱興獻帝為本生皇考恭穆獻皇帝興國太后為本生母章聖皇太后擇日祭告郊廟頒詔天下而別諭建室奉先殿側恭祀獻皇俊等復爭曰陛下入奉大宗不得祭小宗亦猶小宗之不得祭大宗也昔興獻帝奉藩安陸則不得祭憲宗今陛下入繼大統亦不得祭興獻帝是皆以禮抑情者也然興獻帝不得迎養壽安皇太后於藩邸陛下得迎興國太后於大內受天下之養而尊祀興獻帝以天子之禮樂則人子之情獲自盡矣乃今聖心無窮臣等敢不將順但於正統無嫌乃為合禮帝曰朕但欲奉先殿側別建一室以伸追慕之情耳迎養藩邸祖宗朝無此例何容飾以為詞其令陳狀俊具疏引罪乃嚴旨切責而趣立廟益急俊等乃上議曰立廟大內有干正統臣實愚昧不敢奉詔帝不納而令集廷臣大議俊等復上議曰謹按先朝奉慈別殿蓋孝宗皇帝為孝穆皇太后附葬初畢神主無薦享之所而設也當時議者皆據周制特祀薑嫄而言至為本生立廟大內則從古未聞惟漢哀帝為定陶恭王立廟京師師丹以為不可哀帝不聽卒遺後世之譏陛下有可以為堯舜之資臣等不敢導以衰世之事請於安陸特建獻帝百世不遷之廟俟他日襲封興王子孫世世獻饗陛下歲時遣官持節奉祀亦足伸陛下無窮至情矣帝仍命遵前旨再議俊遂抗疏乞休再請益力帝怒責以肆慢允其去召席書未至令吳一鵬署事明倫大典成落俊職卒於家隆慶初贈少保諡文莊俊行誼修潔立朝光明端介學宗洛閩與王守仁交好而不同其説學者稱石潭先生弟偉字器之由庶吉士授檢討與俊皆忤劉瑾調南京禮部主事瑾誅復故官屢遷南京國子祭酒武宗以巡幸至率諸生請幸學不從江彬矯旨取玉硯偉曰有秀才時故硯可持去俊罷官之歲偉亦至吏部右侍郎偕廷臣數爭大禮又伏闕力爭及席書張璁等議行猶持前説不變轉官左侍郎為陳洸劾罷卒於家吳一鵬字南夫長洲人弘治六年進士選庶吉士授編修戶部尚書周經以讒去上疏乞留之正德初進侍講充經筵講官劉瑾出諸翰林為部曹一鵬得南京刑部員外郎遷禮部郎中瑾誅復為侍講進侍講學士歷國子祭酒太常卿並在南京母喪除起故官世宗踐阼召拜禮部右侍郎尋轉左數與尚書毛澄汪俊力爭大禮俊去國一鵬署部事而帝趣建獻帝廟甚亟一鵬集廷臣上議曰前世入繼之君間有為本生立廟園陵及京師者第歲時遣官致祀尋亦奏罷然猶見非當時取議後代若立廟大內而親享之從古以來未有也臣等寧得罪陛下不欲陛下失禮於天下後世今張璁桂萼之言曰繼統公立後私又曰統為重嗣為輕竊惟正統所傳之謂宗故立宗所以繼統立嗣所以承宗統之與宗初無輕重況當我朝傳子之世而欲倣堯舜傳賢之例擬非其倫又謂孝不在皇不皇惟在考不考遂欲改稱孝宗為皇伯考臣等歷稽前古未有神主稱皇伯考者惟天子稱諸王曰伯叔父則有之非可加於宗廟也前此稱本生皇考實裁自聖心乃謂臣等留一皇字以覘陛下又謂百皇字不足當父子之名何肆言無忌至此乞速罷建室之議立廟安陸下璁萼等法司按治帝報曰朕起親藩奉宗祀豈敢違越但本生皇考寢園遠在安陸於卿等安乎命下再四爾等欺朕沖歲黨同執違敗父子之情傷君臣之義往且勿問其奉先殿西室亟修葺盡朕歲時追遠之情時嘉靖三年四月也頃之一鵬極陳四方災異言自去年六月迄今二月其間天鳴者三地震者三十八秋冬雷電雨雹十八暴風白氣地裂山崩産妖各一民飢相食二非常之變倍於往時願陛下率先羣工救疾苦罷營繕信大臣納忠諫用回天意帝優詔報之踰月手敕名奉先殿西室為觀德殿遂命一鵬偕中官賴義京山侯崔元迎獻帝神主於安陸一鵬等復上言歷考前史並無自寢園迎主入大內者此天下後世觀瞻所係非細故也且安陸為恭穆啓封之疆神靈所戀又陛下龍興之地王氣所鍾故我太祖重中都太宗重留都皆以王業所基永修世祀伏乞陛下俯納群言改題神主奉安故宮為百世不遷其觀德殿中別設神位香几以慰孝思則本生之情既隆正統之義亦盡奏入不納一鵬乃行慮使者為道途患疏請禁約帝善其言而戒飭之比還朝則廷臣已伏闕哭爭朝事大變而給事中陳洸譸張尤甚一鵬抗疏曰大禮之議斷自聖心正統本生昭然不紊而洸妄謂陛下誕生於孝宗沒後三年嗣位於武宗沒後二月無從授受其説尤為不經謹按春秋以受命為正始故魯隱公上無所承內無所受則不書即位今陛下承武宗之遺詔奉昭聖之懿旨正合春秋之義而洸謂孰從授受是以陛下為不得正始也洸本小人不痛加懲艾無以杜效尤之漸不聽其年九月一鵬以本官入內閣專典誥敕兼掌詹事府事武宗實録成進尚書領職如故尋以省墓歸還朝仍典誥敕未幾出理部事前此典內閣誥敕者皆需次柄政而張璁桂萼新用事素銜一鵬異己乃出為南京吏部尚書加太子少保居二年南京官劾諸大臣王瓊等不職一鵬與焉遂乞致仕給廩如故事卒贈太子太保諡文端子子孝湖廣參政朱希周字懋忠崑山人徙吳縣高祖吉戶科給事中父文雲按察副使希周舉弘治九年進士孝宗喜其姓名擢為第一授修撰進侍講充經筵講官劉瑾摘修會典小疵降修撰孝宗實録成復官久之進侍讀學士擢南京吏部右侍郎閲五年召為禮部右侍郎時方議大禮數偕其長爭執會左侍郎吳一鵬奉使安陸尚書席書未至希周獨理部事而帝方營觀德殿令協律郎崔元初習樂舞生於大內太常卿汪舉劾之帝遂令太常官一人同入內教習希周上言太常樂舞有定數不當更設帝不從舉復爭帝責其妄議而是時張璁桂萼已召至益交章請去本生之號帝悅從之趣禮官具上册儀希周率郎中余才汪必東等疏諫曰陛下考孝宗母昭聖三年矣而更定之論忽從中出則明詔為虛文不足信天下祭告為瀆禮何以感神祇且本生非貶詞也不妨正統而親之義寓焉何嫌於此而必欲去之以滋天下之議時羣臣諫者甚衆疏皆留中遂相率詣左順門跪伏希周走告諸閣臣曰羣臣伏闕公等能坐視乎亦偕群臣跪伏以請帝聞大怒命希周與何孟春等俱待罪而盡繫庶僚於詔獄明日上章聖皇太后册文希周及尚書秦金金獻民趙鑑趙璜侍郎何孟春都御史王時中大理少卿張縉徐文華俱不赴帝怒責陳狀希周等伏罪復嚴旨譙責乃已而是時庶僚繫獄者猶未釋希周上言諸臣狂率固不可宥但今獻皇帝神主將至必百官齋迎乃克成禮乞早寬縲絏用襄大典不納大禮遂自此定矣其明年由左侍郎遷南京吏部尚書嘉靖六年大計京官南六科無黜者桂萼素以議禮嗛希周且惡兩京言官嘗劾己因言希周畏勢曲庇希周言南京六科止七人實無可去者臣以言路私之固不可如避言路嫌誅責之尤不可且使舉曹皆賢必去一二人示公設舉曹皆不肖亦但去一二人塞責乎因力稱疾乞休溫旨許之仍敕有司歲給夫廩林居三十年中外論薦者三十餘疏竟不復起性恭謹不妄取豫卒年八十有四贈太子少保瀕歿屬諸子曰他日儻蒙易名典勿犯我家諱乃避文諡恭靖何孟春字子元郴州人祖俊雲南按察司僉事父説刑部郎中孟春少遊李東陽之門學問該博第弘治六年進士授兵部主事言官龐泮等下獄疏救之詔修萬歲山育秀亭乾清宮西室役軍九千人計費百餘萬抗疏極諫清寧宮災陳八事疏萬餘言進員外郎郎中出理陝西馬政條目畢張還上釐弊五事並劾撫臣不職正德初請釐正孔廟祀典不果行出為河南參政廉公有威擢太僕少卿進為卿駕幸宣府馳疏諫尋以右副都御史巡撫雲南討平十八宀叛蠻阿勿阿寺等奏設永昌府增五長官司五守禦所録功廕一子辭不受世宗即位遷南京兵部右侍郎半道召為吏部右侍郎會蘇松諸府旱潦相繼而江淮北河水大溢漂沒田廬人畜無算孟春倣漢魏相條奏八事帝嘉納焉尋進左侍郎尚書喬宇罷代署部事先是大禮議起孟春在雲南聞之上疏言臣閲邸報見進士屈儒奏中請尊聖父為皇叔考興獻大王聖母為皇叔母興獻大王妃得旨下部知猶未奉俞命也臣惟前世帝王自旁支入奉大統推尊本生得失之迹具載史册宣帝不敢加號於史皇孫光武不敢加號於南頓君晉元帝不敢加號於恭王抑情守禮宋司馬光所謂當時歸美後世頌聖者也哀安桓靈乃追尊其父祖犯義侵禮司馬光所謂取譏當時見非後世者也儀禮喪服為人後者傳曰何以三年也受重者必以尊服服之為人後者為其父母報傳曰何以期也不二斬也重大宗者降其小宗也夫父母天下莫隆焉至繼大宗則殺其服而移於所後之親蓋名之不可以二也為人後者為之子不敢復顧私親聖人制禮尊無二上若恭敬之心分於彼則不得專於此故也今者廷臣詳議事猶未決豈非皇叔考之稱有未當者乎抑臣愚亦不能無疑禮生曰父母死曰考妣有世父母叔父母之文而無世叔考世叔妣之説今欲稱興獻王為皇叔考古典何據宋英宗時有請加濮王皇伯考者宋敏求力斥其謬然則皇叔考之稱豈可加於興獻王乎即稱皇叔父於義亦未安也經書稱伯父叔父皆生時相呼及其既歿從無通親屬冠於爵位之上者然則皇叔父之稱其可復加先朝已諡之親王乎臣伏覩前詔陛下稱先皇帝為皇兄誠於獻王稱皇叔如宋王圭司馬光所云亦已愜矣而議者或不然何也天下者太祖之天下也自太祖傳至孝宗孝宗傳之先皇帝特簡陛下授之大業獻王雖陛下天性至親然而所以光臨九重富有四海子子孫孫萬世南面者皆先皇帝之德孝宗之所貽也臣故願以漢宣光武晉元三帝為法若非古之名不正之號非臣所願於陛下也及孟春官吏部則已尊本生父母為興獻帝興國太后繼又改稱本生皇考恭穆獻皇帝本生聖母章聖皇太后孟春三上疏乞從初詔皆不省於是帝益入張璁桂萼等言復欲去本生二字璁方盛氣列上禮官欺妄十三事且斥為朋黨孟春偕九卿秦金等具疏略曰伊尹謂有言逆於心必求諸道有言遜於志必求諸非道邇者大禮之議邪正不同若諸臣匡拂纍千萬言此所謂逆於心之言也陛下亦嘗求諸道否乎一二小人敢託將順之説招徠罷間不學無恥之徒熒惑聖聽此所謂遜於志之言也陛下亦嘗求諸非道否乎何彼言之易行而此言之難入也遂發十三難以辨折璁疏入留中其時詹事翰林給事御史及六部諸司大理行人諸臣各具疏爭並留中不下羣情益洶洶會朝方罷孟春倡言於衆曰憲宗朝百官哭文華門爭慈懿皇太后葬禮憲宗從之此國朝故事也修撰楊慎曰國家養士百五十年仗節死義正在今日編修王元正給事中張翀等遂遮留羣臣於金水橋南謂今日有不力爭者必共擊之孟春金獻民徐文華復相號召於是九卿則尚書獻民及秦金趙鑑趙璜俞琳侍郎孟春及朱希周劉玉都御史王時中張潤寺卿汪舉潘希曾張九吳祺通政張瓚陳霑少卿徐文華及張縉蘇民金瓚府丞張仲賢通政參議葛禬寺丞袁宗儒凡二十有三人翰林則掌詹事府侍郎賈詠學士豐熙侍講張璧修撰舒芬楊維聰姚淶張衍慶編修許成名劉棟張潮崔桐葉桂章王三錫余承勳陸釴王相應良王思檢討金皋林時及慎元正凡二十有二人給事中則張翀劉濟安磐張漢卿張原謝蕡毛玉曹懷張嵩王瑄張鄭一鵬黃重李錫趙漢陳時明鄭自璧裴紹宗韓楷黃臣胡納凡二十有一人御史則王時柯余翺葉奇鄭本公楊樞劉潁祁杲杜民表楊瑞張英劉謙亨許中陳克宅談纘劉翀張録郭希愈蕭一中張恂倪宗嶽王璜沈教鍾卿密胡瓊張濂何鰲張曰韜藍田張鵬翰林有孚凡三十人諸司郎官吏部則郎中余寬黨承志劉天民員外郎馬理徐一鳴劉勳主事應大猷李舜臣馬冕彭澤張鵾司務洪伊凡十有二人戶部則郎中黃待顯唐升賈繼之楊易楊淮胡宗明栗登黨以平何巖馬朝卿員外郎申良鄭漳顧可久婁志德主事徐嵩張庠高奎安璽王尚志朱藻黃一道陳儒陳騰鸞高登程旦尹嗣忠郭日休李録周詔戴亢繆宗周丘其仁俎琚張希尹司務金中夫檢校丁律凡三十有六人禮部則郎中余才汪必東張張懷員外郎翁磐李文中張澯主事張鏜豐坊仵瑜丁汝夔臧應奎凡十有二人兵部則郎中陶滋賀縉姚汝皋劉淑相萬潮員外郎劉漳楊儀王德明主事汪溱黃嘉賓李春芳盧襄華鑰鄭曉劉一正郭持平余禎陳賞司務李可登劉從學凡二十人刑部則郎中相世芳張詹潮胡璉范録陳力張大輪葉應驄白轍許路員外郎戴欽張儉劉士奇主事祁敕趙廷松熊宇何鰲楊濂劉仕蕭樟顧鐸王國光汪嘉會殷承陸銓錢鐸方一蘭凡二十有七人工部則郎中趙儒葉寬張子衷汪登劉璣江珊員外郎金廷瑞范鏓龐淳主事伍餘福張鳳來張羽車純蔣珙鄭騮凡十有五人大理之屬則寺正毋德純蔣同仁寺副王暐劉道評事陳大綱鍾雲瑞王光濟張徽王天民鄭重杜鸞凡十有一人俱跪伏左順門帝命司禮中官諭退衆皆曰必得俞旨乃敢退自辰至午凡再傳諭猶跪伏不起帝大怒遣錦衣先執為首者於是豐熙張翀余翺余寬黃待顯陶滋相世芳毋德純八人並繫詔獄楊慎王元正乃撼門大哭衆皆哭聲震闕廷帝益怒命收繫五品以下官若干人而令孟春等待罪翼日編修王相等十八人俱杖死熙等及慎元正俱謫戍始下孟春等前疏責曰朕嗣承大統祗奉宗廟尊崇大禮自出朕心孟春等毀君害政變亂是非且張璁等所上十三條尚留中未發安得先知其以實對於是孟春等具疏伏罪言璁等所條者於未進之日先以私示人且有副本存通政司故臣等知之臣等忝從大臣後得與議禮之末竊以璁等欺罔故昌言論辨以瀆天聽罪應萬死惟望聖明加察辨其孰正孰邪則臣等雖死亦幸帝怒不已責孟春倡衆逞忿非大臣事君之道法宜重治姑從輕奪俸一月旋出為南京工部左侍郎故事南部止侍郎一人時已有右侍郎張琮復以孟春為左蓋賸員也孟春屢疏引疾至六年春始得請及明倫大典成削其籍久之卒於家隆慶初贈禮部尚書諡文簡孟春所居有泉用燕去來時盈涸得名遂稱燕泉先生云豐熙字原學鄞人布政司慶孫也幼有異稟嘗大書壁間曰立志當以聖人為的遜第一等事於人非夫也年十六喪母水漿不入口數日居倚廬三年弘治十二年舉殿試第二孝宗奇其策賜第一人袍帶寵之授編修進侍講遷右諭德以不附劉瑾出掌南京翰林院事父喪闋起故官世宗即位進翰林學士興獻王大禮議起熙偕禮官數力爭及召張璁桂萼為學士方獻夫為侍讀學士熙昌言於朝曰此冷褒段猶流也吾輩可與並列耶抗疏請歸不允既而尊稱禮定卜日上恭穆獻皇帝諡册熙等疏諫曰大禮之議頒天下三年矣乃以一二人妄言欲去本生之稱專隆鞠育之報臣等聞命驚惶罔知攸措竊惟陛下為宗廟神人之主必宗廟之禮加隆斯繼統之義不失若乖先王之禮貽後世之譏豈不重纍聖德哉不得命相率伏哭左順門遂下詔獄掠治復杖之闕廷遣戍熙得福建鎮海衛既璁等得志乃相率請釋謫戍諸臣罪皆首及熙帝不聽最後謹身殿災熙年且七十給事中田濡復請矜宥卒不聽居十有三年竟卒於戍所隆慶初贈官賜恤子坊字存禮舉鄉試第一嘉靖二年成進士出為南京吏部考功主事尋謫通州同知免歸坊博學工文兼通書法而性狂誕熙既卒家居貧乏思效張璁夏言片言取通顯十七年詣闕上書言建明堂事又言宜加獻皇帝廟號稱宗以配上帝世宗大悅未幾進號睿宗配饗玄極殿其議蓋自坊始人咸惡坊畔父云明年復進卿雲雅詩一章詔付史館待命久之竟無所進擢歸家悒悒以卒晚歲改名道生別為十三經訓詁類多穿鑿語或謂世所傳子貢詩傳亦坊偽纂也徐文華字用光嘉定州人正德三年進士授大理評事擢監察御史巡按貴州乖西苗阿雜等倡亂偕巡撫魏英討之破寨六百三十璽書奬勞江西副使胡世寧坐論寧王宸濠繫詔獄文華抗疏救曰世寧上為聖朝下為宗室竭誠發憤言甫脫口而禍患隨之亦可哀也寧王威焰日以張隱患日以甚失今不戢容有紀極顧又置世寧重法杜天下之口奪忠鯁之氣弱朝廷之勢啓宗藩之心招意外之變皆自今日始矣不納帝遣中官劉允迎佛烏斯藏文華力諫不報馬昂納妊身女弟於帝又疏諫曰中人之家不取再醮之婦陛下萬乘至尊乃有此舉返之於心則不安宣之於口則不順傳之天下後世則可醜誰為陛下進此者罪可族也萬一防間闊略不幸有李園呂不韋之徒乘間投隙豈細故哉今昂兄弟子姪出入禁闥陛下降絀等威與之亂服雜坐或同臥起壞祖宗法莫此為甚馬姬專寵於內昂等弄權於外禍機竊發有不可勝言者乞早誅以絶禍源亦不報文華既數進直言帝及諸近幸皆銜之會文華條上宗廟禮儀祧廟禘祫特享出主祔食凡五事考證經義悉可施行帝怒責其出位妄言章下所司禮官暗於經術又阿帝意遂奏文華言非是命下詔獄黜為民時正德十一年十月也世宗即位起故官歷河南按察副使嘉靖二年舉治行卓異入為大理右少卿尋轉左時方議興獻帝大禮文華數偕諸大臣力爭明年七月復倡廷臣伏闕哭諫坐停俸四月已席書張璁桂萼方獻夫會廷臣大議文華與汪偉鄭嶽猶力爭武定侯郭勛遽曰祖訓如是古禮如是璁等言當書曰大臣事君當將順其美議乃定及改題廟主文華諫曰孝宗有祖道焉不可以伯考稱武宗有父道焉不可以兄稱不若直稱曰孝宗敬皇帝武宗毅皇帝猶兩全無害也疏入命再奪俸六年秋李福達獄起主獄者璁萼獻夫以議禮故憾文華等乃盡反獄詞下文華與諸法官獄獄具責文華阿附御史殺人遣戍遼陽遇赦卒於道隆慶初贈左僉都御史自大學士毛紀侍郎何孟春去位諸大臣前爭大禮者或依違順旨文華顧堅守前議不變其被譴不以罪士論深惜之薛蕙字君采亳州人年十二能詩舉正德九年進士授刑部主事諫武宗南巡受杖奪俸旋引疾歸起故官改吏部歷考功郎中嘉靖二年廷臣數爭大禮與張璁桂萼等相持不下蕙撰為人後解為人後辨及辨璁萼所論七事合數萬言上於朝解有上下二篇推明大宗義其辨曰陛下繼祖體而承嫡統合於為人後之義坦然無疑乃有二三臣者詭經畔禮上惑聖聰夫經傳纖悉之指彼未能覩其十一遽欲恃小慧騁夸詞可謂不知而作者也其曰陛下為獻帝不可奪之適嗣按漢石渠議曰大宗無後族無庶子己有一適子當絶父嗣以後大宗否戴聖云大宗不可絶禮言適子不為後者不得先庶子耳族無庶子則當絶父以後大宗晉范汪曰廢小宗昭穆不亂廢大宗昭穆亂矣先王所以重大宗也豈得不廢小宗以繼大宗乎夫人子雖有適庶其親親之心一也而禮適子不為後庶子得為後者此非親其父母有厚薄也直繫於傳重收族不同耳今之言者不知推本祖禰惟及其父母而止此弗忍薄其親忍遺其祖也其曰為人後者為之子乃漢儒邪説按此踵歐陽修之謬也夫為人後者為之子其言出於公羊固漢儒所傳者然於儀禮實相表𩹉古今以為折衷未有異論者也藉若修之説其悖禮甚矣禮為人後者斬衰三年此子於父母之喪也以其父母之喪服之非為之子而何其言之悖禮一也傳言為所後者之祖父母妻妻之父母昆弟昆弟之子若子其若子者由為之子故耳傳明言若子今顧曰不為之子其言之悖禮二也且為人後者不為之子然則稱謂之間將不曰父而仍曰伯父叔父乎其言之悖禮三也又立後而不為之子則古立後者皆未嘗實子之而姑偽立是人也是聖人偽教人以立後而實則無後焉耳其言之悖禮四也夫無後者重絶祖考之祀故立後以奉之今所後既不得而子則祖考亦不得而孫矣豈可以入其廟而奉其祀乎其言之悖禮五也由此觀之名漢臣以邪説無乃其自名耶抑二三臣者亦自度其説之必窮也於是又為遁辭以倡之曰夫統與嗣不同陛下之繼二宗當繼統而不繼嗣此一言者將欲以廢先王為人後之義與則尤悖禮之甚者也然其牽合附會眩於名實苟不辨而絶之殆將為後世禍矣夫禮為大宗立後者重其統也重其統不可絶乃為之立後至於小宗不為之後者統可以絶則嗣可以不繼也是則以繼統故繼嗣繼嗣所以繼統也故禮為人後言繼嗣也後大宗言繼統也統與嗣非有二也其何不同之有自古帝王入繼者必明為人後之義而後可以繼統蓋不為後則不成子也若不成子夫安所得統而繼之故為後也者成子也成子而後繼統又將以絶同宗覬覦之心焉聖人之制禮也不亦善乎抑成子而後繼統非獨為人後者爾也禮無生而貴者雖天子諸侯之子苟不受命於君父亦不敢自成尊也春秋重授受之義以為為子受之父為臣受之君故穀梁子曰臣子必受君父之命斯義也非直尊君父也亦所以自尊焉耳蓋尊其君父亦將使人之尊己也如此則義禮明而禍亂亡今説者謂倫序當立斯立已是惡知禮與春秋之意哉若夫前代之君間有弟終而兄繼姪終而伯叔父繼者此遭變不正者也然多先君之嗣先君於己則考也己於先君則子也故不可考後君而亦無兩統二父之嫌若晉之哀帝唐之宣宗是也其或諸王入嗣則未有仍考諸王而不考天子者也陛下天倫不先於武宗正統不自於獻帝是非豫奪至為易辨而二三臣者猥欲比於遭變不正之舉故曰悖禮之尤者也其他所辨七事亦率倣此書奏天子大怒下鎮撫司考訊已貰出之奪俸三月會給事中陳洸外轉疑事由文選郎夏良勝及蕙良勝已被訐見斥而蕙故在時亳州知州顏木方坐罪乃誣蕙與木同年相關通疑有姦利章下所司蕙亦奏辨帝不聽令解任聽勘蕙遂南歸既而事白吏部數移文促蕙起蕙見璁萼等用事堅臥不肯起十八年詔選宮僚擬蕙春坊司直兼翰林檢討帝猶以前憾故報罷而蕙亦卒矣蕙貌臞氣清持己峻潔於書無所不讀學者重其學行稱為西原先生當是時廷臣力持大禮而璁萼建異議舉朝非之其不獲與廷議而以璁萼得罪者又有胡侍王祿侯廷訓云胡侍寧夏人舉進士歷官鴻臚少卿張璁桂萼既擢學士侍劾二人越禮背經因據所奏反覆論辨凡千餘言帝怒命逮治言官論救謫潞州同知瀋府宗室勛注以事憾之奏侍試諸生題譏刺且謗大禮逮至京訊斥為民王祿新城人舉於鄉為福建平和知縣嘉靖九年疏請建獻帝廟於安陸封崇仁王以主其祀不當考獻帝伯孝宗涉二本之嫌宗藩子有幼而岐嶷者當養之宮中備儲二選疏奏即棄官歸命按臣逮治亦斥為民侯廷訓樂清人與張璁同郡同舉進士而持論不合初釋褐即上疏請考孝宗且言不當私藩邸舊臣語最切直除南京禮部主事嘉靖三年冬大禮定廷訓心非之私刊所著議禮書潛寄京師下詔獄拷訊子一元年十三伏闕訟冤得釋後起官至漳南僉事以貪虐被劾為民一元舉進士官至江西布政使贊曰大禮之議楊廷和為之倡舉朝翕然同聲大抵本宋司馬光程頤濮園議然英宗長育宮中名稱素定而世宗奉詔嗣位承武宗後事勢各殊諸臣徒見先賢大儒成説可據求無得罪天下後世而未暇為世宗熟計審處準酌情理以求至當爭之愈力失之愈深惜夫
