body:
  text: 明史卷一百九十列傳第七十八楊廷和梁儲蔣冕毛紀石珤兄玠楊廷和字介夫新都人父春湖廣提學僉事廷和年十二舉於鄉成化十四年年十九先其父成進士改庶吉士告歸娶還朝授檢討廷和為人美風姿性沉靜詳審為文簡暢有法好考究掌故民瘼邊事及一切法家言鬱然負公輔望弘治二年進修撰憲宗實録成以預纂修進侍讀改左春坊左中允侍皇太子講讀修會典成超拜左春坊大學士充日講官正德二年由詹事入東閣專典誥敕以講筵指斥佞幸忤劉瑾傳旨改南京吏部左侍郎五月遷南京戶部尚書又三月召還進兼文淵閣大學士參預機務明年加少保兼太子太保瑾摘會典小誤奪廷和與大學士李東陽等俸二級尋以成孝宗實録功還之明年加光祿大夫柱國遷改吏部尚書武英殿大學士時瑾橫益甚而焦芳張綵為中外媾廷和與東陽委曲其間小有劑救而已安化王置鐇反以誅瑾為名廷和等草赦詔請擢邊將仇鉞以離賊黨鉞果執置鐇會張永發瑾罪瑾伏誅廷和等乃復論功進少傅兼太子太傅謹身殿大學士豫一子中書舍人流賊劉六劉七齊彥名反楊一清薦馬中錫討之廷和言中錫文士也不任此時業已行果不能平賊廷和請逮中錫下獄以陸完代之而斬故受賕縱賊者參將桑玉已又用學士陳霽言調諸邊兵討河南賊趙鐩等而薦彭澤為總制賊平論功録廷和一子錦衣衛千戶辭特加少師太子太師華蓋殿大學士東陽致政廷和遂為首輔張永既去瑾而驕捕得男子臂龍文者以為功援故太監劉永誠例覬封侯廷和言永誠從子聚自以戰功封伯耳且非永誠身受之也乃止彭澤將西討鄢本恕問計廷和廷和曰以君才賊不足平所戒者班師早耳澤後破誅本恕等即班師而餘黨復蝟起不可制澤既發復留乃歎曰楊公先見吾不及也乾清宮災廷和請帝避殿下詔罪己求直言因與其僚上疏勸帝早朝晏罷躬九廟祭祀崇兩宮孝養勤日講復面奏開言路達下情還邊兵革宮市罷皇店出西僧省工作減織造凡十餘條皆切至帝不省尋以父卒乞奔喪不許三請乃許遣中官護行旋復起之三疏辭始許閣臣之得終父母喪者自廷和始也服甫闋即召至帝方獵宣府使使賜廷和羊酒銀幣廷和疏謝因請回鑾不報復與大學士蔣冕馳至居庸欲身出塞請帝令谷大用扼關門乃歸帝命回鑾日羣臣各製旗帳迎廷和曰此里俗以施之親舊耳天子至尊不敢瀆獻帝再使使諭意執不從乃已當廷和柄政帝恆不視朝恣游大同宣府延綏間多失政廷和未嘗不諫俱不聽廷和亦不能執奏以是邑邑不自得數移疾乞骸骨帝亦不聽中官谷大用魏彬張雄義子錢寧江彬輩恣橫甚廷和雖不為下然亦不能有所裁禁以是得稍自安御史蕭淮發寧王宸濠反謀錢寧輩猶庇之詆淮離間廷和請如宣宗諭趙王故事遣貴戚大臣齎敕往諭收其護衛屯田於是命中官賴義駙馬都尉崔元等往未至而宸濠反帝欲帥師親征廷和等力阻之帝乃自稱總督軍務威武大將軍總兵官後軍都督府太師鎮國公朱壽統各京邊將士南討而安邊伯許泰為威武副將軍左都督劉暉為平賊將軍前驅鎮守撫按悉聽節制命廷和與大學士毛紀居守以乾清坤寧二宮工成推恩録一子錦衣衛副千戶辭時廷和當草大將軍征南敕諭謝弗肯帝心恚會推南京吏部尚書劉春理東閣誥敕以廷和私其鄉人切責之廷和謝罪乞罷不許少師梁儲等請與俱罷復不許廷和方引疾不入帝遂傳旨行之時十四年八月也帝既南兩更歲朔廷和頗以鎮靜持重為中外所推服凡請回鑾者數十疏皆不復省帝歸駐蹕通州廷和等舉故事請帝還大內御殿受俘然後正宸濠等誅而帝已不豫趨召廷和等至通州受事即行在執宸濠等僇之駕乃旋明年正月帝郊祀嘔血輿疾歸逾月益篤時帝無嗣司禮中官魏彬等至閣言國醫力竭矣請捐萬金購之草澤廷和心知所謂不應而微以倫序之說風之彬等唯唯三月十四日丙寅谷大用張永至閣言帝崩於豹房以皇太后命移殯大內且議所當立廷和舉皇明祖訓示之曰兄終弟及誰能瀆焉興獻王長子憲宗之孫孝宗之從子大行皇帝之從弟序當立梁儲蔣冕毛紀咸贊之乃令中官入啓皇太后廷和等候左順門下頃之中官奉遺詔及太后懿旨宣諭羣臣一如廷和請事乃定廷和遂以遺詔令太監張永武定侯郭勛安邊伯許泰尚書王憲選各營兵分布皇城四門京城九門及南北要害廠衛御史以其屬扞掫傳遺命罷威武營團練諸軍各邊兵入衛者俱重賚散歸鎮革皇店及軍門辦事官校悉還衛哈密土魯番佛郎機諸貢使皆給賞遣還國豹房番僧及少林僧教坊樂人南京快馬船諸非常例者一切罷遣又以遺詔釋南京逮繫囚放遣四方進獻女子停京師不急工務收宣府行宮金寶歸諸內庫中外大悅時平虜伯江彬擁重兵在肘腋間知天下惡之心不自安其黨都督僉事李琮尤狠黠勸彬乘間以其家衆反不勝則北走塞外彬猶豫未決於是廷和謀以皇太后旨捕誅彬遂與同官蔣冕毛紀及司禮中官溫祥四人謀張永伺知其意亦密為備司禮魏彬者故與彬有連廷和以其弱可脅也因題大行銘旌與彬祥及他中官張鋭陳嚴等為詳言江彬反狀以危語怵之彬心動惟鋭力言江彬無罪廷和面折之冕曰今日必了此乃臨嚴亦從旁贊決因俾祥彬等入白皇太后良久未報廷和冕益自危頃之嚴至曰彬已擒矣彬既誅中外相慶廷和總朝政幾四十日興世子始入京師即帝位廷和草上登極詔書文書房官忽至閣中言欲去詔中不便者數事廷和曰往者事齟齬動稱上意今亦新天子意耶吾儕賀登極後當面奏上問誰欲削詔草者冕紀亦相繼發危言其人語塞已而詔下正德中蠹政釐抉且盡所裁汰錦衣諸衛內監局旗校工役為數十四萬八千七百減漕糧百五十三萬二千餘石其中貴義子傳升乞升一切恩幸得官者大半皆斥去中外稱新天子聖人且頌廷和功而諸失職之徒銜廷和次骨廷和入朝有挾白刃伺輿旁者事聞詔以營卒百人衛出入帝御經筵廷和知經筵事修武宗實録充總裁廷和先已加特進一品滿九載兼支大學士俸賜敕旌諭至是加左柱國帝召對者三慰勞備至廷和益欲有所發攄引用正人布列在位給事御史交章論王瓊罪狀下詔獄瓊迫疏訐廷和以自解法司當瓊奸黨律論死瓊力自辨得減戍邊或疑法司承廷和指者會石珤自禮部尚書掌詹事府改吏部廷和復奏改之掌詹事司誥敕人或謂廷和太專然廷和以帝雖沖年性英敏自信可輔太平事事有所持諍錢寧江彬雖伏誅而張鋭張忠于經許泰等獄久不決廷和等言不誅此曹則國法不正公道不明九廟之靈不安萬姓之心不服禍亂之機未息太平之治未臻帝乃籍沒其資産廷和復疏請敬天戒法祖訓隆孝道保聖躬務民義勤學問慎命令明賞罰專委任納諫諍親善人節財用語多剴切皆優詔報可及議大禮廷和持論益不撓卒以是忤帝意先是武宗崩廷和草遺詔言皇考孝宗敬皇帝親弟興獻王長子某倫序當立遵奉祖訓兄終弟及之文告於宗廟請於慈壽皇太后迎嗣皇帝位既令禮官上禮儀狀請由東安門入居文華殿翼日百官三上箋勸進俟令旨俞允擇日即位其箋文皆循皇子嗣位故事世宗覽禮部狀謂遺詔以吾嗣皇帝位非為皇子也及至京止城外廷和固請如禮部所具儀世宗不聽乃御行殿受箋由大明門直入告大行几筵日中即帝位詔草言奉皇兄遺詔入奉宗祧帝遲回久之始報可越三日遣官往迎帝母興獻妃未幾命禮官議興獻王主祀稱號廷和檢漢定陶王宋濮王事授尚書毛澄曰是足為據宜尊孝宗曰皇考稱獻王為皇叔考興國大王母妃為皇叔母興國太妃自稱姪皇帝名別立益王次子崇仁王為興王奉獻王祀有異議者即奸邪當斬進士張璁與侍郎王瓚言帝入繼大統非為人後瓚微言之廷和恐其撓議改瓚官南京五月澄會廷臣議上如廷和言帝不悅然每召廷和從容賜茶慰諭欲有所更定廷和卒不肯順帝指乃下廷臣再議廷和偕蔣冕毛紀奏言前代入繼之君追崇所生者皆不合典禮惟宋儒程頤濮議最得義理之正可為萬世法至興獻王祀雖崇仁王主之他日皇嗣繁衍仍以第二子為興獻王後而改封崇仁王為親王則天理人情兩全無失帝益不悅命博考典禮務求至當廷和冕紀復言三代以前聖莫如舜未聞追崇其所生父瞽瞍也三代以後賢莫如漢光武未聞追崇其所生父南頓君也惟皇上取法二君則聖德無纍聖孝有光矣澄等亦再三執奏帝留中不下七月張璁上疏謂當繼統不繼嗣帝遣司禮太監持示廷和言此議遵祖訓據古禮宜從廷和曰秀才安知國家事體復持入無何帝御文華殿召廷和冕紀授以手敕令尊父母為帝后廷和退而上奏曰禮謂為所後者為父母而以其所生者為伯叔父母蓋不惟降其服而又異其名也臣不敢阿諛順旨仍封還手詔羣臣亦皆執前議帝不聽逮九月母妃至京帝自定儀由中門入謁見太廟復申諭欲加稱興獻帝后為皇廷和言漢宣帝繼孝昭後諡史皇孫王夫人曰悼考悼后光武上繼元帝巨鹿南頓君以上立廟章陵皆未嘗追尊今若加皇字與孝廟慈壽並是忘所後而重本生任私恩而棄大義臣等不得辭其責因自請斥罷廷臣諍者百餘人帝不得已乃以嘉靖元年詔稱孝宗為皇考慈壽皇太后為聖母興獻帝后為本生父母不稱皇當是時廷和先後封還御批者四執奏幾三十疏帝常忽忽有所恨左右因乘間言廷和恣無人臣禮言官史道曹嘉遂交劾廷和帝為薄謫道嘉以安廷和然意內移矣尋論定策功封廷和冕紀伯爵歲祿千石廷和固辭改廕錦衣衛指揮使復辭帝以賞太輕加廕四品京職世襲復辭會滿四考超拜太傅復四辭而止特賜敕旌異錫宴於禮部九卿皆與焉帝頗事齊醮廷和力言不可引梁武宋徽為喻優旨報納江左比歲不登中官請遣官督織造工部及給事御史言之皆不聽趣內閣撰敕廷和等不奉命因極言民困財竭請毋遣帝趣愈急且戒毋瀆擾執拗廷和力爭言臣等與舉朝大臣言官言之不聽顧二三邪佞之言是聽陛下能獨與二三邪佞共治祖宗天下哉且陛下以織造為纍朝舊例不知洪武以來何嘗有之創自成化弘治耳憲宗孝宗愛民節財美政非一陛下不取法獨法其不美者何也即位一詔中官之幸路絀塞殆盡天下方傳誦聖德今忽有此何以取信因請究擬旨者何人疑有假御批以行其私者帝為謝不審俾戒所遣官毋縱肆而已不能止也廷和先纍疏乞休其後請益力又以持考獻帝議不合疏語露不平三年正月帝聽之去責以因辭歸咎非大臣道然猶賜璽書給輿廩郵護如例申前廕子錦衣衛指揮使之命給事御史請留廷和皆不報廷和去始議稱孝宗為皇伯考於是廷和子修撰慎率羣臣伏闕哭爭杖謫雲南既而王邦奇誣訐廷和及其次子兵部主事惇壻修撰金承勛鄉人侍讀葉桂章與彭澤弟沖交關請屬俱逮下詔獄鞫治無狀乃得解七年明倫大典成詔定議禮諸臣罪言廷和謬主濮議自詭門生天子定策國老法當僇市姑削職為民明年六月卒年七十一居久之帝問大學士李時太倉所積幾何時對曰可支數年由陛下初年詔書裁革員所致帝慨然曰此楊廷和功不可沒也隆慶初復官贈太保諡文忠初廷和入閣東陽謂曰吾於文翰頗有一日之長若經濟事須歸介夫及武宗之終卒安社稷者廷和力也人以東陽為知言弟廷儀兵部右侍郎子慎惇孫有仁皆進士慎自有傳梁儲字叔厚廣東順德人受業陳獻章舉成化十四年會試第一選庶吉土授編修尋兼司經局校書弘治四年進侍講改洗馬侍武宗於東宮冊封安南却其饋久之擢翰林學士同修會典遷少詹事拜吏部右侍郎正德初改左進尚書專典誥敕掌詹事府劉瑾摘會典小疵儲坐降右侍郎孝宗實録成復尚書尋加太子少保調南京吏部瑾誅以吏部尚書兼文淵閣大學士入參機務屢加少傅太子太傅進建極殿十年楊廷和遭喪去儲為首輔進少師太子太師華蓋殿大學士時方建乾清坤寧宮又營太素殿天鵝房船塢儲偕同官靳貴楊一清切諫明年春以國本未定請擇宗室賢者居京師備儲二之選皆不報其秋一清罷蔣冕代之至明年貴亦罷毛紀入閣帝好微行嘗出西安門經宿返儲等諫不聽然猶慮外廷知是春從近幸言召百官至左順門明告以郊祀畢幸南海子觀獵儲等暨廷臣諫皆不納八月朔微服從數十騎幸昌平次日儲冕紀始覺追至沙河不及連疏請回鑾越十有三日乃旋儲等以國無儲副而帝盤游不息中外危疑力申建儲之請亦不報九月帝馳出居庸關幸宣府命谷大用守關無縱廷臣出遂由宣府抵大同遇寇於應州幾殆儲等憂懼請回鑾益急章十餘上帝不為動歲除竟駐宣府當是時帝失德彌甚羣小竊權濁亂朝政人情惶惶儲懼不克任以廷和服闋屢請召之廷和還朝儲遂讓而處其下鳳陽守備中官丘德及鎮守延綏寧夏大同宣府諸中官皆乞更敕書兼理民事帝許之儲等極言不可弗聽十三年七月帝從江彬言將遍游塞上託言邊關多警命總督軍務威武大將軍總兵官朱壽統六師往征令內閣草敕閣臣不可帝復集百官左順門面諭廷和冕在告儲紀泣諫衆亦泣帝意不可回已而紀亦引疾儲獨廷爭纍日帝竟不聽踰月帝以大將軍壽肅清邊境令加封鎮國公儲紀上言公雖貴人臣耳陛下承祖宗業為天下君奈何謬自貶損既封國公則將授以誥券追封三代祖宗在天之靈亦肯如陛下貶損否況鐵券必有免死之文陛下壽福無疆何甘自菲薄蒙此不祥之辭名既不正言自不順臣等斷不敢阿意苟從取他日戮身亡家之禍也不報帝遂歷宣府大同直抵延綏儲等疏數十上悉置不省秦王請關中閒田為牧地江彬錢寧張忠等皆為之請帝排羣議許之命閣臣草制廷和冕引疾帝怒甚儲度不可爭乃上制草曰太祖高皇帝著令茲土不畀藩封非吝也念其土廣饒藩封得之多蓄士馬富而且驕奸人誘為不軌不利宗社王今得地宜益謹毋收聚奸人毋多蓄士馬毋聽狂人謀不軌震及邊方危我社稷是時雖欲保親親不可得已帝駭曰若是其可虞事遂寢明年帝將南巡言官伏闕諫儲冕紀亦以為言會諸曹多諫者乃止寧王宸濠反帝南征儲冕扈從在道聞賊滅連疏請駕旋抵揚州帝議南京行郊禮儲冕計此議行則回鑾益無日極陳不可疏三上始得請帝以宸濠械將至問處置之宜儲等請如宣宗征高煦故事罪人既得即日班師又因郊期改卜四方災異邊警乞還乘輿疏八九上帝殊無還意是秋行在有物若豕首墮帝前色碧又進御婦人室中若懸人首狀人情益驚儲冕危言諫帝頗心動而羣小猶欲導帝游浙西泛江漢儲冕益懼手疏跪泣行宮門外歷未至酉帝遣人取疏入諭之起叩頭言未奉俞旨不敢起也帝不得已許不日還京乃叩頭出帝崩楊廷和等定策迎興世子故事當以內閣一人與中貴勳戚偕禮官往廷和欲留蔣冕自助而慮儲老或憚行乃佯惜儲憊老阻其行儲奮曰事孰有大於此者敢以憊辭遂與定國公徐光祚等迎世子安陸邸既即位給事中張九等劾儲結納權奸持祿固寵儲三疏求去命賜敕馳傳遣行人護行歲給廩隸如制卒子鈞奏請贈諡吏部侍郎桂萼等言儲立身輔政有干公議因録上兩京言官彈章帝念先朝舊臣特贈太師諡文康先是儲子次攄為錦衣百戶居家與富人楊端爭民田端殺田主次攄遂滅端家二百餘人事發武宗以儲故僅發邊衛立功後還職纍冒功至廣東都指揮僉事蔣冕字敬之全州人兄升南京戶部尚書以謹厚稱冕舉成化二十三年進士選庶吉士授編修弘治十三年太子出閣兼司經局校書正德中纍官吏部左侍郎改掌詹事府典誥敕進禮部尚書仍掌府事冕清謹有器識雅負時望十一年命兼文淵閣大學士預機務明年改武英殿加太子太傅近幸冒邊功大行升賞冕及梁儲亦廕錦衣世千戶兩人力辭乃改文廕帝之以威武大將軍行邊也冕時病在告疏諫曰陛下自損威重下同臣子倘所過諸王以大將軍禮見陛下何辭責之曩睿皇帝北征六軍官屬近三十萬猶且陷於土木今宿衛單弱經行邊徼寧不寒心請治左右引導者罪不報十四年扈帝南征還加少傅兼太子太傅戶部尚書謹身殿大學士帝崩與楊廷和協誅江彬世宗即位議定策功加伯爵固辭改廕錦衣世指揮又辭乃廕五品文職仍進一階御史張鵬疏評大臣賢否請罷冕御史趙永亨詆石珤不可掌銓衡冕珤遂求去朝議不平諸給事御史皆言其不可去帝乃命鴻臚諭留再下優詔始起視事嘉靖三年遣官織造江南命冕草敕冕以江南被災具疏請止帝不從敕亦久不進帝責其違慢冕引罪而止大禮議起冕固執為人後之說與廷和等力爭之帝始而婉諭繼以譙讓冕執議不回及廷和罷政冕當國帝愈欲尊崇所生逐禮部尚書汪俊以怵冕而用席書代之且召張璁桂萼物情甚沸冕乃抗疏極諫曰陛下嗣承丕基固因倫序素定然非聖母昭聖皇太后懿旨與武宗皇帝遺詔則將無所受命今既受命於武宗自當為武宗之後特兄弟之名不容紊故但兄武宗考孝宗母昭聖而於孝廟武廟皆稱嗣皇帝稱臣稱御名以示繼統承祀之義今乃欲為本生父母立廟奉先殿側臣雖至愚斷斷知其不可自古人君嗣位謂之承祧踐阼皆指宗祀而言禮為人後者惟大宗以大宗尊之統也亦主宗廟祭祀而言自漢至今未有為本生父母立廟大內者漢宣帝為叔祖昭帝後止立所生父廟於葬所光武中興本非承統平帝而止立四親廟於章陵宋英宗父濮安懿王亦止即園立廟陛下先年有旨立廟安陸與前代適同得其當矣豈可既奉大宗之祀又兼奉小宗之祀夫情既重於所生義必不專於所後將孝武二廟之靈安所托乎竊恐獻帝之靈亦將不能安雖聖心亦自不能安也邇者復允汪俊之去趣張璁桂萼之來人心益駭是日廷議建廟天本晴明忽變陰晦至暮風雷大作天意如此陛下可不思變計哉因力求去帝得疏不悅猶以大臣故優詔答之未幾復請罷建廟之議且乞休疏中再以天變為言帝益不悅遂令馳傳歸給月廩歲夫如制冕當正德之季主昏政亂持正不撓有匡弼功世宗初朝政雖新而上下扞格彌甚冕守之不移代廷和為首輔僅兩閲月卒齟齬以去論者謂有古大臣風明倫大典成落職閒住久之卒隆慶初復官諡文定毛紀字維之掖縣人成化末舉鄉試第一登進士選庶吉士弘治初授檢討進修撰充經筵講官簡侍東宮講讀會典成遷侍讀武宗立改左諭德坐會典小誤降侍讀孝宗實録成擢侍講學士為講官正德五年進學士遷戶部右侍郎十年由吏部左侍郎拜禮部尚書烏思藏入貢其使言有活佛能前知禍福帝遣中官劉允迎之攜錦衣官百三十衛卒及私僕隸數千人芻糧舟車費以百萬計紀等上言自京師至烏思藏二萬餘里公私煩費不可勝言且自四川雅州出境過長河西行數月而後至無有郵驛村市一切資費取辦四川四川連歲用兵流賊甫平蠻寇復起困竭之餘重加此纍恐生意外變疏再上內閣梁儲靳貴楊一清皆切諫不報郊祀畢請勤朝講又以儲嗣未建乞早定大計亦不聽尋改理誥敕掌詹事府十二年兼東閣大學士入預機務其秋加太子太保改文淵閣帝南征紀佐楊廷和居守駕旋晉少保戶部尚書武英殿大學士世宗即位録定策功加伯爵再疏辭免嘉靖初帝欲追尊興獻帝閣臣執奏忤旨三年廷和冕相繼去國紀為首輔復執如初帝欲去本生之稱紀與石珤合疏爭之帝召見平臺委曲諭意紀終不從朝臣伏闕哭爭者俱逮繫紀具疏乞原帝怒傳旨責紀要結朋奸背君報私紀乃上言曰曩蒙聖諭國家政事商確可否然後施行此誠內閣職業也臣愚不能仰副明命邇者大禮之議平臺召對司禮傳諭不知其幾似乎商確矣而皆斷自聖心不蒙允納何可否之有至於笞罰廷臣動至數百乃祖宗來所未有者亦皆出自中旨臣等不得與聞宣召徒勤扞格如故慰留雖切詰責隨加臣雖有體國之心不能自盡宋司馬光告神宗曰陛下所以用臣蓋察其狂直庶有補於國家若徒以祿位榮之而不取其言是以官私非其人也臣以祿位自榮而不能救正是徒盜竊名器以私其身也臣於陛下敢舉以為告夫要結朋奸背君報私正臣平日所痛憤而深疾者有一於此罪何止罷黜今陛下以之疑臣尚可一日靦顏朝寧間哉乞賜骸骨歸鄉里以全終始尤望陛下法祖典學任賢納諫審是非辨忠邪以養和平之福帝銜紀亢直允其去馳驛給夫廩如故事紀有學識居官廉靜簡重與廷和冕正色立朝並為縉紳所倚賴其代冕亦僅三月後明倫大典成追論奪官久之廷和冕皆淪喪紀以恩詔復帝亦且忘之二十一年年八十撫按以聞詔遣官存問再賜夫廩又三年卒贈太保諡文簡子渠進士太僕卿石珤字邦彥藁城人父玉山東按察使珤與兄玠同舉成化末年進士改庶吉士授檢討數謝病居家孝宗末始進修撰正德改元擢南京侍讀學士歷兩京祭酒遷南京吏部右侍郎召改禮部進左侍郎武宗始遊宣府珤上疏力諫不報改掌翰林院事廷臣諫南巡禍將不測珤疏救之十六年拜禮部尚書掌詹事府世宗立代王瓊為吏部尚書自羣小竊柄銓政混濁珤剛方謝請託諸犯清議者多見黜時望大孚而內閣楊廷和有所不悅甫二月復改掌詹事府典誥敕嘉靖元年遣祀闕里及東嶽事竣還家屢乞致仕言官以珤望重交章請留乃起赴官三年五月詔以吏部尚書兼文淵閣大學士入參機務帝欲以奉先殿側別建一室祀獻帝珤抗疏言其非禮及廷臣伏闕泣爭珤與毛紀助之無何大禮議定紀去位珤復諫曰大禮一事已奉宸斷無可言矣但臣反覆思之終有不安於心者心所不安而不以言言恐觸忤而不敢盡則陛下將焉用臣臣亦何以仰報君父哉夫孝宗皇帝與昭聖皇太后乃陛下骨肉至親也今使疏賤讒佞小人輒行離間但知希合取寵不復為陛下體察茲孟冬時享在邇陛下登獻對越如親見之寧不少動於中乎夫事亡如事存陛下承列聖之統以總百神臨萬方焉得不加慎重顧聽細人之說干不易之典哉帝得奏不悅戒勿復言明年建世廟於太廟東帝欲從何淵言毀神宮監伐林木以通輦道給事中韓楷御史楊秦葉忠等交諫忤旨奪俸給事中衛道繼言之貶秩調外珤復抗章極言不可弗聽及世廟成帝欲奉章聖皇太后謁見張璁桂萼力主之禮官劉龍等爭不得諸輔臣以為言帝不報趣具儀珤乃上疏曰陛下欲奉皇太后謁見世廟臣竊以為從令固孝而孝有大於從令者臣誠不敢阿諛以誤君上竊惟祖宗家法后妃已入宮未有無故復出者且太廟尊嚴非時享祫祭雖天子亦不輕入況后妃乎璁輩所引廟見之禮今奉先殿是也聖祖神宗行之百五十年已為定制中間納后納妃不知凡幾未有敢議及者何至今日忽倡此議彼容悅佞臣豈有忠愛之實而陛下乃欲聽之乎且陰陽有定位不可侵越陛下為天地百神之主致母后無故出入太廟街門是坤行乾事陰侵陽位不可之大者也臣豈不知君命當承第恐上纍聖德是以不敢順旨曲從以成君父之過負覆載之德也奏入帝大慍珤為人清介端亮孜孜奉國數以力行王道清心省事辨忠邪敦寬大毋急近效為帝言帝見為迂濶弗善也議大禮時帝欲援以自助而珤據禮爭持論堅確失帝意璁萼輩亦不悅璁萼朝夕謀輔政攻擊費宏無虛日以珤行高不能有所加至明年春奸人王邦奇訐楊廷和誣珤及宏為奸黨兩人遂乞歸帝許宏馳驛而責珤歸怨朝廷失大臣誼一切恩典皆不豫歸裝襆被車一輛而已都人歎異謂自來宰臣去國無若珤者自珤及楊廷和蔣冕毛紀以強諫罷政迄嘉靖季密勿大臣無進逆耳之言者矣珤加官自太子太保至少保七年冬卒諡文隱隆慶初改諡文介玠字邦秀弘治中由泛水知縣召為御史出核大同軍儲按甘肅及陝西所條上邊務悉中機宜為都御史戴珊所委寄嘗因災異劾南京刑部尚書翟瑄以下二十七人正德中纍官右副都御史巡撫大同召拜兵部右侍郎海西部長數犯邊泰寧三衛與別部相攻久缺貢市遣玠以左侍郎兼僉都御史往遼東巡視出關撫諭皆受約束帝大喜璽書嘉勞召還左都御史陸完遷廷推代者三上悉不用最後推玠乃以為右都御史掌院事御史李隱劾玠夤緣不報十年拜戶部尚書中官史大鎮雲南請獨領銀場務杜甫鎮湖廣請借鹽船稅銀為進貢資劉德守涼州請帶食茶六百引玠皆執不可西僧闡教王請船三百艘販載食鹽玠極言其害帝初出居庸玠切諫及在宣府需銀百萬兩玠持不可帝弗從乃進其半王瓊欲以哈密事害彭澤玠獨廷譽之奸民欲牟鹽利者賄朱寧為請玠不可連章執奏廷臣諫南巡跪闕下諸大臣莫敢言玠獨論救羣小激帝怒嚴旨責令自陳遂引疾去賜敕馳傳給廩隸如故事家居二年卒贈太子少傅玠有操行居官亦持正其為都御史時胡世寧論寧王玠與李士實請罪世寧以是為人所譏贊曰武宗之季君德日荒嬖幸盤結左右廷和為相雖無能改於其德然流賊熾而無土崩之虞宗藩叛而無瓦解之患者固賴廟堂有經濟之遠略也至其誅大奸決大策扶危定傾功在社稷即周勃韓琦殆無以過儲雖蒙物議而大節無玷蔣冕毛紀石珤清忠鯁亮皆卓然有古大臣風自時厥後政府日以權勢相傾或脂韋淟涊持祿自固求如諸人豈可多得哉
