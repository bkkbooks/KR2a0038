body:
  text: 明史卷十二本紀第十二英宗後紀天順元年春正月壬午昧爽武清侯石亨都督張輗張軏左都御史楊善副都御史徐有貞太監曹吉祥以兵迎帝於南宮御奉天門朝百官徐有貞以原官兼翰林學士入閣預機務日中御奉天殿即位下兵部尚書于謙大學士王文錦衣衛獄太常寺卿許彬大理寺卿薛瑄為禮部侍郎兼翰林學士入閣預機務丙戌詔赦天下改景泰八年為天順元年論奪門迎復功封石亨忠國公張軏太平侯張輗文安伯楊善興濟伯曹吉祥嗣子欽都督同知丁亥殺于謙王文籍其家陳循江淵俞士悅謫戍蕭鎡商輅除名己丑復論奪門功封孫鏜懷寧伯董興海寧伯欽天監正湯序禮部右侍郎官舍旗軍晉級者凡三千餘人辛卯罷巡撫提督官壬辰榜于謙黨人示天下甲午殺昌平侯楊俊二月乙未朔廢景泰帝為郕王庚子高穀致仕湯序請除景泰年號不許癸卯吏部侍郎李賢兼翰林學士入閣預機務殺都督范廣戊申柳溥破廣西蠻癸丑郕王薨戊午方瑛石璞大破湖廣苗召璞還壬戌免南畿被災秋糧三月己巳復立長子見深為皇太子封皇子見潾為德王見澍秀王見澤崇王見浚吉王癸酉封徐有貞武功伯乙亥大賚文武軍民庚辰賜黎淳等進士及第出身有差石亨為征虜副將軍剿寇延綏丁亥振山東飢夏四月甲午朔以災異數見求直言乙未免浙江被災稅糧丁酉方瑛攻銅鼓藕洞苗悉平之丁未録囚癸丑罷團營乙卯孛來寇寧夏參將种興戰死五月辛未安遠侯柳溥備宣大邊是月以石亨言下御史楊瑄張鵬獄六月甲午下右都御史耿九疇副都御史羅綺錦衣衛獄己亥下徐有貞李賢錦衣衛獄是日大風雨雹壞奉天門鴟吻敕修省庚子徐有貞李賢羅綺耿九疇謫外任楊瑄張鵬戍邊通政司參議兼侍講呂原入閣預機務壬寅薛瑄致仕癸卯修撰嶽正入閣預機務甲辰復李賢為吏部侍郎乙巳巡撫貴州副都御史蔣琳坐于謙黨棄市秋七月乙丑復下徐有貞於獄丙寅承天門災丁卯躬禱於南郊戊辰敕修省庚午李賢復入閣改許彬南京禮部侍郎辛未出嶽正為欽州同知尋下獄謫戍癸酉大赦癸未放徐有貞於金齒辛卯大賚諸邊軍士八月甲午以彗星屢見躬禱於上帝九月甲子太常少卿彭時兼翰林學士入閣預機務冬十月丁酉賜王振祭葬立祠曰旌忠壬寅徵江西處士吳與弼丙辰釋建文帝幼子文圭及其家屬安置鳳陽十一月甲戌廣西總兵官朱瑛討田州叛蠻己丑免山東被災夏稅十二月壬辰封曹欽昭武伯辛丑安遠侯柳溥充總兵官禦孛來於甘涼是年琉球中山安南暹羅占城哈密烏斯藏入貢二年春正月辛酉兵部尚書陳汝言有罪下獄乙丑享太廟甲戌大祀天地於南郊己卯上皇太后尊號二月戊申開雲南福建浙江銀場中官市雲南珍寶閏月己卯瘞土木暴骸夏四月復設巡撫官五月壬寅授處士吳與弼左諭德辭不拜尋送還鄉秋七月癸卯定遠伯石彪為平夷將軍充總兵官禦寇寧夏八月戊辰孛來寇鎮番冬十月甲子獵南海子壬午武平伯陳友為征夷將軍充總兵官剿寇寧夏十一月甲寅免山東秋糧是年安南烏斯藏占城哈密入貢三年春正月乙未大祀天地於南郊甲辰定遠伯石彪彰武伯楊信敗孛來於安邊營都督僉事周賢都指揮李鑑戰死進彪為侯二月丁卯遣御史及中官採珠廣東夏四月壬子巡撫兩廣僉都御史葉盛破瀧水瑤己巳南和侯方瑛克貴州苗六月辛酉復命巡撫官以八月集京師議事秋八月庚戌石彪有罪下錦衣衛獄己未禁文武大臣給事中御史錦衣衛官往來交通違者依鐵榜例論罪乙亥免湖廣被災秋糧冬十月己未幸南海子庚午石亨以罪罷諸奪門冒功者許自首改正是月命法司會廷臣每歲霜降録囚後以為常十一月癸巳振湖廣飢是年哈密疏球中山錫蘭山滿剌加入貢四年春正月丁亥大祀天地於南郊癸卯石亨有罪下獄尋死二月壬子僮陷梧州丁卯石彪棄市三月庚辰賜王一夔等進士及第出身有差戊戌免南畿被災秋糧夏四月己酉分遣內臣督浙江雲南福建四川銀課壬子襄王瞻墡來朝五月壬午免畿內浙江被災秋糧己亥罷中官督蘇杭織造六月癸亥免湖廣被災稅糧秋七月乙亥朔日有食之辛卯自五月雨至是月淮水決沒軍民田廬遣使振恤八月甲子孛來三道入寇大同總兵官李文宣府總兵官楊能禦之癸酉孛來入雁門掠欣代朔諸州九月庚辰孛來圍大同右衛庚寅撫寧伯朱永都督白玉鮑政備宣府邊甲午免江西被災秋糧冬十月甲子閲京營將領騎射於西苑戊辰幸南海子十一月丁酉閲隨操武臣騎射於西苑閏月己未幸鄭村壩閲甲仗軍馬是年疏球中山安南占城爪哇哈密烏斯藏入貢五年春正月庚戌大祀天地於南郊二月己卯免山東被災稅糧丙申都督僉事顏彪為征夷將軍充總兵官討兩廣瑤賊三月壬子免蘇松常鎮被災稅糧甲寅湖廣貴州總兵官李震會廣西軍剿瑤僮悉破之夏四月癸巳兵部侍郎白圭督陝西諸邊討孛來五月丁未免河南被災秋糧六月丙子孛來寇河西官軍敗績壬午兵部尚書馬昂總督軍務懷寧伯孫鏜充總兵官帥京營軍禦之秋七月庚子總督京營太監曹吉祥及昭武伯曹欽反左都御史寇深恭順侯吳瑾被殺懷寧伯孫鏜帥兵討平之癸卯磔吉祥於市夷其族其黨湯序等悉伏誅丁未免南畿被災稅糧庚戌大赦求直言丁巳河決開封侍郎薛遠往治之戊午都督馮宗充總兵官禦寇於河西兵部侍郎白圭副都御史王竑參贊軍務辛酉孛來上書乞和九月壬戌京師地震有聲冬十月壬申以西邊用兵令河南山西陝西士民納馬者豫冠帶十一月丁酉朔日有食之壬戌幸南海子是年安南疏球中山哈密亦力把里入貢六年春正月丁未大祀天地於南郊戊申孛來遣使入貢二月癸酉諭孛來三月癸丑召馮宗等還夏四月壬申免河南被災秋糧五月庚子顏彪討平兩廣諸瑤己未免陝西被災秋糧六月戊辰淮王祁銓來朝秋七月淮安海溢九月乙未皇太后崩冬十一月甲午葬孝恭章皇后是年琉球中山哈密烏斯藏暹羅入貢七年春正月丙午大祀天地於南郊二月壬戌詹事陳文為禮部侍郎兼翰林學士入閣預機務三月壬寅旱詔行寬恤之政停各處銀場夏四月壬午逮宣大巡按御史李蕃荷校於長安門尋死丙戌復遣中官督蘇杭織造五月己丑朔日有食之甲寅遼東巡按御史楊璡以擅撻軍職逮治六月丁卯逮山西巡按御史韓祺荷校於長安門數日死秋七月庚戌免陝西被災稅糧閏月甲戌上宣宗廢后胡氏尊諡戊寅命湖廣貴州會師討洪江叛苗九月甲戌敕廣東總兵官歐信會廣西兵討瑤賊冬十月丁酉振西安諸府飢丁未巡撫廣西僉都御史吳楨節制兩廣諸軍討瑤賊十一月癸酉賊陷梧州致仕布政使宋欽死之壬午下右都御史李賓副都御史林聰於錦衣衛獄十二月辛卯下刑部尚書陸瑜侍郎周瑄程信於錦衣衛獄尋釋之是年琉球中山哈密安南烏斯藏入貢八年春正月乙卯帝不豫己未皇太子攝事於文華殿己巳大漸遺詔罷宮妃殉葬庚午崩年三十有八二月乙未上尊諡廟號英宗葬裕陵贊曰英宗承仁宣之業海內富庶朝野清晏大臣如三楊胡濙張輔皆纍朝勳舊受遺輔政綱紀未弛獨以王振擅權開釁遂至乘輿播遷乃復辟而後猶追念不已抑何其惑溺之深也前後在位二十四年無甚稗政至於上恭讓后諡釋建庶人之繫罷宮妃殉葬則盛德之事可法後世者矣
