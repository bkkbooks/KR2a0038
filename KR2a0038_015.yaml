body:
  text: 明史卷十五本紀第十五孝宗孝宗建天明道誠純中正聖文神武至仁大德敬皇帝諱祐樘憲宗第三子也母淑妃紀氏成化六年七月生帝於西宮時萬貴妃專寵宮中莫敢言悼恭太子薨後憲宗始知之育周太后宮中十一年敕禮部命名大學士商輅等因以建儲請是年六月淑妃暴薨帝年六歲哀慕如成人十一月立為皇太子二十三年八月憲宗崩九月壬寅即皇帝位大赦天下以明年為弘治元年丁未斥諸佞幸侍郎李孜省太監梁芳外戚萬喜及其黨謫戍有差冬十月丁卯汰傳奉官罷右通政任傑侍郎蒯鋼等千餘人論罪戍斥革法王佛子國師真人封號乙亥尊皇太后周氏為太皇太后皇后王氏為皇太后丙子立妃張氏為皇后丁亥萬安罷壬辰追諡母淑妃為孝穆皇太后癸巳吏部左侍郎兼翰林學士徐溥入閣預機務十一月癸丑尹直罷乙卯詹事劉健為禮部侍郎兼翰林學士入閣預機務戊午下梁芳李孜省於獄十二月壬午葬純皇帝於茂陵是月免江西湖廣被災稅糧是年安南暹羅哈密土魯番烏斯藏琉球入貢封占城王子古來為王諭安南黎灝還占城侵地弘治元年春正月己亥享太廟丙午大祀天地於南郊己未始考察鎮守武臣二月戊戌祭社稷丁未耕藉田封哈密衛左都督罕慎為忠順王丙辰禁廷臣請託公事三月乙丑疏文武大臣及中外四品以上官姓名揭文華殿壁癸酉釋奠於先師孔子乙亥小王子寇蘭州都指揮廖斌擊敗之丙子御經筵丁丑命儒臣日講夏四月甲寅以天暑録囚嗣後歲以為常六月癸巳朔日有食之秋七月戊辰減浙江銀課汰管理銀場官八月乙巳小王子犯山丹永昌辛亥犯獨石馬營冬十月乙卯振湖廣四川飢十一月甲申妖僧繼曉伏誅乙酉免河南被災秋糧是年土魯番殺忠順王罕慎復據哈密琉球占城撒馬兒罕烏斯藏入貢二年春正月丁卯收已故內臣賜田給百姓辛未大祀天地於南郊二月癸巳振四川飢三月己未免陝西被災秋糧三分之二戊寅閉會川衛銀礦夏五月庚申河決開封入沁河役五萬人治之秋七月癸亥以京師霪雨南京大風雷修省求直言戊寅振畿內水災免稅糧給貧民麥種八月丁酉復四川流民復業者雜役三年己酉憲宗神主祔太廟十一月戊午順天飢發粟平糶十二月甲申朔日有食之辛卯賜于謙諡立祠曰旌功是年土魯番入貢撒馬兒罕貢獅子鸚鵡却之三年春正月甲子大祀天地於南郊二月壬辰免河南被災秋糧甲午戶部請免南畿湖廣稅糧上曰凶歲義當損上益下必欲取盈如病民何悉從之三月丙辰命天下預備倉積粟以里數多寡為差不及額者罪之庚午賜錢福等進士及第出身有差甲戌侍郎張海通政使元守直閲邊秋九月庚戌禁內府加派供御物料閏月癸巳禁宗室勳戚奏請田土及受人投獻冬十一月甲辰停工役罷內官燒造瓷器十二月辛亥以彗星見敕羣臣修省陳軍民利病己未京師地震壬戌減供御品物罷明年上元燈火是年琉球安南哈密撒馬兒罕天方土魯番入貢四年春正月癸未以修省罷上元節假己丑大祀天地於南郊停慶成宴二月己巳敕法司曰曩因天道示異敕天下諸司審録重囚發遣數十百人朕以為與其寬之於終孰若謹之於始嗣後兩京三法司及天下問刑官務存心仁恕持法公平詳審其情罪所當庶不背於古聖人欽恤之訓六月辛亥京師地震秋八月庚戌蘇松浙江水停本年織造乙卯南京地震己未封皇弟祐榰為壽王祐汝王祐蕣涇王祐樞榮王祐楷申王冬十月丙辰以皇長子生詔天下戊午河溢振河南被災者乙丑禮部尚書丘濬兼文淵閣大學士預機務十一月庚辰振南畿災十二月甲子土魯番以哈密地及金印來歸是年暹羅入貢五年春正月壬午大祀天地於南郊二月丙寅命陝巴襲封忠順王庚午減陝西織造絨毼之半三月戊寅立皇子厚照為皇太子大赦録太祖廟配享功臣絶封者後辛卯廣西副總兵馬俊參議馬鉉千戶王珊等討古田叛僮遇伏死夏六月丁未免南畿去年被災稅糧秋七月甲午振南京浙江山東飢八月癸卯劉吉致仕乙丑停蘇松浙江額外織造召督造官還冬十月壬戌湖廣總兵官鎮遠侯顧溥貴州巡撫都御史鄧廷瓚太監江德會師討貴州黑苗十一月丙申閉溫處銀坑十二月丁巳荊王見潚有罪廢為庶人是年琉球烏斯藏土魯番入貢火剌札國貢方物不受給廩食遣還六年春正月己卯大祀天地於南郊二月甲寅録常遇春李文忠鄧愈湯和後裔世襲指揮使丁巳擢布政使劉大夏右副都御史治張秋決河三月癸未賜毛澄等進士及第出身有差夏四月己亥土魯番速檀阿黑麻襲執陝巴據哈密己酉侍郎張海都督同知緱謙經略哈密辛酉久旱敕修省求直言五月丙寅小王子犯寧夏殺指揮趙璽閏月乙未免南京被災秋糧六月庚午捕蝗壬申都御史閔圭擊破古田叛僮秋八月甲戌免順天被災夏稅九月丁酉免陝西被災夏稅冬十月丙寅以災傷罷明年上元燈火庚辰停甘肅織造絨毼十一月庚申振京師流民十二月己卯敕天下鎮巡官修省是年安南烏斯藏土魯番暹羅入貢七年春正月丁酉大祀天地於南郊二月甲子以去年冬孝陵風雷之變遣使祭告修省求直言命內外慎刑獄決輕繫三月癸巳貴州黑苗平戊申兩畿捕蝗夏五月甲辰太監李興平江伯陳鋭同劉大夏治張秋決河秋七月乙巳京師地震丙午工部侍郎徐貫巡撫副都御史何鑑經理南畿水利九月丁亥以水災停蘇松諸府所辦物料留關鈔戶鹽備振冬十一月壬子京師地震十二月甲戌張秋河工成己卯振甘涼被兵軍民給牛種是年免北京河南湖廣陝西山西被災稅糧琉球入貢以土魯番據哈密却其貢使八年春正月乙未大祀天地於南郊以太皇太后不豫免慶成宴壬子甘肅總兵官劉寧敗小王子於涼州二月乙卯朔日有食之戊午丘濬卒乙丑禮部侍郎李東陽少詹事謝遷入閣預機務己卯黃陵岡河口工成三月壬辰免湖廣被災稅糧己亥寧夏地震夏四月甲寅蘇松各府治水工成壬戌諭吏部都察院人材進退考察務得實迹不可偏聽枉人五月己丑免南畿被災秋糧秋七月丁亥封宋儒楊時將樂伯從祀孔子廟庭戊子廣西副總兵歐磐擊破平樂叛瑤八月癸亥以四方災異數見敕羣臣修省冬十一月己酉免直隸被災秋糧十二月辛酉巡撫甘肅僉都御史許進總兵官劉寧入哈密土魯番遁遂班師是年爪哇占城烏斯藏入貢克力諸部發肅州塞求入貢却之九年春正月壬辰大祀天地於南郊二月庚午免河南被災稅糧辛未右通政張璞大理少卿馬中錫閲邊三月丙申賜朱希周等進士及第出身有差夏四月戊子以岷王膺鉟奏逮武岡知州劉遜給事中御史龐泮劉紳等諫下錦衣衛獄尋釋之六月庚子免江西被災稅糧秋八月壬寅免湖廣被災秋糧九月己酉禁勢家侵奪民利是年日本疏球烏斯藏入貢十年春正月庚戌大祀天地於南郊三月辛亥以旱霾修省求直言甲子召大學士劉健李東陽謝遷於文華殿議庶政後以為常夏五月戊辰小王子犯潮河川己巳犯大同六月己卯侍郎劉大夏李介理宣府大同軍餉秋七月癸丑都督楊玉帥京營軍備永平冬十一月庚子土魯番歸陝巴乞通貢是年免南畿山西陝西被災稅糧振山東四川水災安南暹羅烏斯藏入貢十一年春正月丁未大祀天地於南郊二月己巳小王子遣使求貢夏五月戊申甘肅參將楊翥敗小王子於黑山秋七月己酉總制三邊都御史王越襲小王子於賀蘭山後敗之癸亥徐溥致仕八月癸未振祥符民被河患者冬十月丙寅命工作不得役團營軍士甲戌清寧宮災丁亥敕羣臣修省求直言罷明年上元燈火十一月壬子免陝西織造羊絨閏月壬戌朔日有食之乙酉罷福建織造綵布十二月庚子禁中外奢靡踰制壬子以清寧宮災詔赦天下是年免山西陝西兩畿廣西廣東被災稅糧土魯番烏斯藏入貢十二年春正月辛未大祀天地於南郊免慶成宴二月壬辰免山東被災夏稅戊申嚴左道惑衆之禁三月丁丑賜倫文等進士及第出身有差夏四月癸巳敕宣大延綏備邊是月免湖廣江西被災稅糧五月戊寅免南畿被災秋糧六月甲辰闕里先師廟災遣使慰祭秋八月免河南南畿被災夏稅九月壬午普安賊婦米魯作亂甲申重建清寧宮成是年占城烏斯藏土魯番爪哇撒馬兒罕入貢十三年春正月乙丑大祀天地於南郊二月戊子免山西被災稅糧庚寅定問刑條例乙未嚴旌舉連坐之法夏四月火篩寇大同遊擊將軍王杲敗績於威遠衛乙巳平江伯陳鋭為靖虜將軍充總兵官太監金輔監軍戶部左侍郎許進提督軍務禦之五月甲寅朔日有食之丙辰召大學士劉健李東陽謝遷於平臺議京營將領癸亥火篩大舉入寇大同左衛遊擊將軍張俊禦却之六月甲申免江西被災秋糧停山陝採辦物料庚子召陳鋭金輔還保國公朱暉太監扶安往代益兵禦寇秋七月己巳京師地震八月辛卯振江西水災冬十月戊申兩京地震是月小王子諸部寇大同十二月辛丑火篩寇大同南掠百餘里是年小王子部入居河套犯延綏神木堡琉球土魯番烏斯藏入貢十四年春正月庚戌朔陝西地大震己未大祀天地於南郊二月己亥罷陝西織造中官夏四月庚辰工部侍郎李鐩總督延綏邊餉戊子保國公朱暉提督軍務都御史史琳監軍太監苗逵分道進師延綏戊戌免陝西山西物料是月火篩諸部寇固原五月庚戌振大同被兵軍民免稅糧辛酉免陝西被災稅糧戊辰修闕里先師廟命各布政使司上地里圖秋七月丁未泰寧衛賊犯遼東掠長勝諸屯堡癸亥南京戶部尚書王軾兼左副都御史提督軍務討貴州賊婦米魯丁卯朱暉史琳襲小王子於河套庚午分遣給事中御史清理屯田閏月乙酉都指揮王泰禦小王子於鹽池戰死戊戌振兩畿江西山東河南水災八月己酉免河南被災稅糧是月火篩諸部犯固原大掠韋州環縣萌城靈州己巳減光祿寺供應如元年制火篩諸部犯寧夏東路九月丙子朔日有食之丁亥遣使募兵於延綏寧夏甘涼甲辰召史琳還起秦紘為戶部尚書兼副都御史代之冬十一月癸巳分遣侍郎何鑑大理寺丞吳一貫振恤兩畿山東河南飢民十二月戊辰遼東大飢振之是月寇出河套是年免湖廣江西山西山東陝西河南畿內被災稅糧安南琉球入貢十五年春正月丙子朱暉帥師還丙戌大祀天地於南郊二月癸丑免河南被災稅糧三月癸未罷饒州督造瓷器中官庚寅賜康海等進士及第出身有差夏四月壬寅振京師貧民五月庚子免湖廣被災秋糧秋七月己卯録劉基後裔世襲指揮使己丑王軾破斬米魯貴州賊平辛卯命各邊衛設養濟院漏澤園八月庚戌以南京鳳陽霪雨大風江溢為災遣使祭告敕兩京羣臣修省九月庚午朔日有食之戊子放減內府所畜鳥獸冬十月癸卯罷明年上元燈火十一月壬申瓊州黎賊作亂甲午罷廣東採珠十二月己酉大明會典成辛亥以疾不視朝是月免南畿被災秋糧是年琉球安南入貢十六年春正月癸酉遣官代享太廟二月辛丑視朝戊申大祀天地於南郊三月癸巳免山西被災稅糧夏四月辛亥敕宣大嚴邊備五月戊子以雲南災變敕羣臣修省刑部侍郎樊瑩巡視雲貴察官吏問民疾苦秋七月廣東官軍討黎賊敗之九月丁丑振兩畿浙江山東河南湖廣被災軍民冬十一月甲戌罷營造器物及明年上元煙火是月免南畿被災秋糧十二月丙午免淮揚浙江物料是年安南暹羅哈密土魯番撒馬兒罕入貢十七年春正月辛未南京工部侍郎高銓振應天飢甲戌大祀天地於南郊壬午嚴誣告之禁二月甲寅減供用物料己未嚴讖緯妖書之禁庚申免浙江被災稅糧三月壬戌太皇太后崩癸未定太廟各室一帝一后之制夏四月己酉葬孝肅皇太后閏月辛酉闕里先師廟成遣大學士李東陽祭告庚午免山東被災稅糧乙亥以四方災荒敕羣臣修省庚辰命諸司詳議害民弊政五月壬辰罷南京蘇杭織造中官六月乙亥始命兩京五品以下官六年一考察辛巳召劉健李東陽於暖閣議邊務癸未火篩入大同指揮鄭瑀力戰死秋七月癸巳工部侍郎李鐩大理少卿吳一貫通政司參議叢蘭分道經略邊塞甲午左副都御史閻仲宇通政司參議熊偉分理邊餉八月戊辰命天下撫按三司官奏軍民利病士民建言可採者所司以聞甲申免南畿被災夏稅丁亥召馬文升戴珊於暖閣諭以明年考察務訪實迹以求至當九月庚寅諭法司不得任情偏執致淹獄囚甲寅太常少卿孫交經略宣大邊務丁巳御暖閣諭劉健李東陽謝遷諸邊首功巡按御史察勘動淹歲年非所以示勸自今奏報以遠近立限違者詰治諭講官進講直言毋諱冬十一月戊子罷雲南銀場十二月庚午申閉糴之禁甲申免湖廣被災秋糧是年琉球撒馬兒罕哈密烏斯藏入貢十八年春正月己丑小王子諸部圍靈州入花馬池遂掠韋州環縣戶部侍郎顧佐理陝西軍餉乙未大祀天地於南郊甲辰小王子陷寧夏清水營二月戊辰御奉天門諭戶兵工三部曰方今生齒漸繁而戶口軍伍日就耗損此皆官司撫恤無方因仍苟且所致其悉議弊政以聞三月癸卯賜顧鼎臣等進士及第出身有差夏四月戊寅刑部侍郎何鑑撫輯荊襄流民甲申帝不豫五月庚寅大漸召大學士劉健李東陽謝遷受顧命辛卯崩於乾清宮年三十有六六月庚申上尊諡廟號孝宗葬泰陵贊曰明有天下傳世十六太祖成祖而外可稱者仁宗宣宗孝宗而已仁宣之際國勢初張綱紀修立淳朴未漓至成化以來號為太平無事而晏安則易耽怠玩富盛則漸啓驕奢孝宗獨能恭儉有制勤政愛民兢兢於保泰持盈之道用使朝序清寧民物康阜易曰氍平不陂氍往不復艱貞氍咎知此道者其惟孝宗乎
