body:
  text: 明史卷二本紀第二太祖二洪武元年春正月乙亥祀天地於南郊即皇帝位定有天下之號曰明建元洪武追尊高祖考曰玄皇帝廟號德祖曾祖考曰皇帝廟號懿祖祖考曰裕皇帝廟號熙祖皇考曰淳皇帝廟號仁祖妣皆皇后立妃馬氏為皇后世子標為皇太子以李善長徐達為左右丞相諸功臣進爵有差丙子頒即位詔於天下追封皇伯考以下皆為王辛巳李善長徐達等兼東宮官甲申遣使核浙西田賦壬辰胡廷瑞克建寧庚子鄧愈為征戍將軍略南陽以北州郡湯和克延平執元平章陳友定福建平是月天下府州縣官來朝諭曰天下始定民財力俱困要在休養安息惟廉者能約己而利人勉之二月壬寅定郊社宗廟禮歲必親祀以為常癸卯湯和提督海運廖永忠為征南將軍朱亮祖副之由海道取廣東丁未以太牢祀先師孔子於國學戊申祀社稷壬子詔衣冠如唐制癸丑常遇春克東昌山東平甲寅楊璟克寶慶三月辛未詔儒臣修女誡戒后妃毋預政壬申周德興克全州丁酉鄧愈克南陽己亥徐達徇汴梁左君弼降夏四月辛丑蘄州進竹簟却之命四方毋妄獻廖永忠師至廣州元守臣何真降廣東平丁未祫享太廟戊申徐達常遇春大破元兵於洛水北遂圍河南梁王阿魯溫降河南平丁巳楊璟克永州甲子幸汴梁丙寅馮勝克潼關李思齊張思道遁五月己卯廖永忠下梧州潯貴容鬱林諸州皆降辛卯改汴梁路為開封府六月庚子徐達朝行在甲辰海南海北諸道降壬戌楊璟朱亮祖克靖江秋七月戊子廖永忠下象州廣西平庚寅振恤中原貧民辛卯將還應天諭達等曰中原之民久為羣雄所苦流離相望故命將北征拯民水火元祖宗功德在人其子孫罔恤民隱天厭棄之君則有罪民復何辜前代革命之際肆行屠戮違天虐民朕實不忍諸將克城毋肆焚掠妄殺人元之宗戚咸俾保全庶幾上答天心下慰人望以副朕伐罪安民之意不恭命者罰無赦丙申命馮勝留守開封閏月丁未至自開封己酉徐達會諸將兵於臨清壬子常遇春克德州丙寅克通州元帝趨上都是月徵天下賢才為守令免吳江廣德太平寧國滁和被災田租八月己巳以應天為南京開封為北京庚午徐達入元都封府庫圖籍守宮門禁士卒侵暴遣將巡古北口諸隘壬申以京師火四方水旱詔中書省集議便民事丁丑定六部官制御史中丞劉基致仕己卯赦殊死以下將士從征者恤其家逋逃許自首新克州郡毋妄殺輸賦道遠者官為轉運災荒以實聞免鎮江租稅避亂民復業者聽墾荒地復三年衍聖公襲封及授曲阜知縣並如前代制有司以禮聘致賢士學校毋事虛文平刑毋非時決囚除書籍田器稅民間逋負免徵蒙古色目人有才能者許擢用魚衆寡孤獨廢疾者存恤之民年七十以上一子復他利害當興革不在詔內者有司具以聞壬午幸北京改大都路曰北平府徵元故臣癸未詔徐達常遇春取山西甲午放元宮人九月癸亥詔曰天下之治天下之賢共理之今賢士多隱巖穴豈有司失於敦勸歟朝廷疏於禮待歟抑朕寡昧不足致賢將在位者壅蔽使不上達歟不然賢士大夫幼學壯行豈甘沒世而已哉天下甫定朕願與諸儒講明治道有能輔朕濟民者有司禮遣乙丑常遇春下保定遂下真定冬十月庚午馮勝湯和下懷慶澤潞相繼下丁丑至自北京戊寅以元都平詔天下十一月己亥遣使分行天下訪求賢才庚子始祀上帝於圜丘癸亥詔劉基還十二月丁卯徐達克太原擴廓帖木兒走甘肅山西平己巳置登聞鼓壬辰以書諭明升二年春正月乙巳立功臣廟於雞籠山丁未享太廟庚戌詔曰朕淮右布衣因天下亂率衆渡江保民圖治今十有五年荷天眷祐悉皆戡定用是命將北征齊魯之民饋糧給軍不憚千里朕軫厥勞已免元年田租遭旱民未蘇其更賜一年頃者大軍平燕都下晉冀民被兵燹困征斂北平燕南河東山西今年田租亦與蠲免河南諸郡歸附久欲惠之西北未平師過其地是以未遑今晉冀平矣西抵潼關北界大河南至唐鄧光息今年稅糧悉除之又詔曰應天太平鎮江宣城廣德供億浩穰去歲蠲租遇旱惠不及下其再免諸郡及無為州今年租稅庚申常遇春取大同是月倭寇山東濱海郡縣二月丙寅朔詔修元史壬午耕藉田三月庚子徐達至奉元張思道遁振陝西饑戶米三石丙午常遇春至鳳翔李思齊奔臨洮夏四月丙寅遇春還師平己巳諸王子受經於博士孔克仁令功臣子弟入學乙亥編祖訓録定封建諸王之制徐達下鞏昌丙子賜秦隴新附州縣稅糧丁丑馮勝至臨洮李思齊降乙酉徐達襲破元豫王於西安五月甲午朔日有食之丁酉徐達下平涼延安張良臣以慶陽降尋叛癸卯始祀地於方丘六月己卯常遇春克開平元帝北走壬午封陳日煃為安南國王秋七月己亥鄂國公常遇春卒於軍詔李文忠領其衆辛亥擴廓帖木兒遣將破原州涇州辛酉馮勝擊走之丙辰明升遣使來八月丙寅元兵攻大同李文忠擊敗之己巳定內侍官制諭吏部曰內臣但備使令毋多人古來若輩擅權可為鑒戒馭之之道當使之畏法勿令有功有功則驕恣矣癸酉元史成丙子封王顓為高麗國王癸未徐達克慶陽斬張良臣陝西平是月命儒臣纂禮書九月辛丑召徐達湯和還馮勝留總軍事癸卯以臨濠為中都戊午征南師還冬十月壬戌遣楊璟諭明升甲戌甘露降於鍾山羣臣請告廟不許辛卯詔天下郡縣立學是月遣使貽元帝書十一月乙巳祀上帝於圜丘以仁祖配十二月甲戌封阿答阿者為占城國王甲申振西安諸府饑戶米二石己丑大賚平定中原及征南將士庚寅擴廓帖木兒攻蘭州指揮于光死之是年占城安南高麗入貢三年春正月癸巳徐達為征虜大將軍李文忠馮勝鄧愈湯和副之分道北征二月癸未追封郭子興滁陽王戊子詔求賢才可任六部者是月李文忠下興和進兵察罕腦兒執元平章竹貞三月庚寅免南畿河南山東北平浙東江西廣信饒州今年田租夏四月乙丑封皇子樉為秦王棡晉王棣燕王橚吳王楨楚王榑齊王梓潭王嵵趙王檀魯王從孫守謙靖江王徐達大破擴廓帖木兒於沈兒峪盡降其衆擴廓走和林丙戌元帝崩於應昌子愛猷識理達臘嗣是月慈利土官覃垕作亂五月己丑徐達取興元分遣鄧愈招諭吐蕃丁酉詔守令舉學識篤行之士己亥設科取士甲辰李文忠克應昌元嗣君北走獲其子買的里八剌降五萬餘人窮追至北慶州不及而還丁未詔行大射禮戊申祀地於方丘以仁祖配辛亥徐達下興元鄧愈克河州丁巳詔開國時將帥無嗣者祿其家是月旱齊戒后妃親執爨皇太子諸王饋於齊所六月戊午朔素服草屨步禱山川壇露宿凡三日還齊於西廡辛酉賚將士省獄囚命有司訪求通經術明治道者壬戌大雨壬申李文忠捷奏至命仕元者勿賀諡元主曰順帝癸酉買的里八剌至京師羣臣請獻俘帝曰武王伐殷用之乎省臣以唐太宗嘗行之對帝曰太宗是待王世充耳若遇隋之子孫恐不爾也遂不許又以捷奏多侈辭謂宰相曰元主中國百年朕與卿等父母皆賴其生養奈何為此浮薄之言亟改之乙亥封買的里八剌為崇禮侯丙子告捷於南郊丁丑告太廟詔示天下辛巳徙蘇州松江嘉興湖州杭州民無業者田臨濠給資糧牛種復三年是月倭寇山東浙江福建濱海州縣秋七月丙辰明升將吳友仁寇漢中參政傅友德擊却之中書左丞楊憲有罪誅八月乙酉遣使瘞中原遺骸冬十月丙辰詔儒士更直午門為武臣講經史癸亥周德興為征南將軍討覃垕垕遁辛巳貽元嗣君書十一月壬辰北征師還甲午告武成於郊廟丙申大封功臣進李善長韓國公徐達魏國公封李文忠曹國公馮勝宋國公鄧愈衛國公常遇春子茂鄭國公湯和等侯者二十八人己亥設壇親祭戰沒將士庚戌有事於圜丘辛亥詔戶部置戶籍戶帖歲計登耗以聞著為令乙卯封中書右丞汪廣洋忠勤伯御史中丞劉基誠意伯十二月癸亥復貽元嗣君書並諭和林諸部甲子建奉先殿庚午遣使祭歷代帝王陵寢並加修葺己卯賜勳臣田壬午以正月至是月日中屢有黑子詔廷臣言得失是年占城爪哇西洋入貢四年春正月丙戌李善長罷汪廣洋為右丞相丁亥中山侯湯和為征西將軍江夏侯周德興德慶侯廖永忠副之率舟師由瞿塘潁川侯傅友德為征虜前將軍濟寧侯顧時副之率步騎由秦隴伐蜀魏國公徐達練兵北平戊子衛國公鄧愈督餉給征蜀軍庚寅建郊廟於中都丁未詔設科取士連舉三年嗣後三年一舉戊申免山西旱災田租二月甲戌幸中都壬午至自中都元平章劉益以遼東降是月蠲太平鎮江寧國田租三月乙酉朔始策試天下貢士賜吳伯宗等進士及第出身有差乙巳徙山後民萬七千戶屯北平丁未誠意伯劉基致仕夏四月丙戌傅友德克階州文隆綿三州相繼下五月免江西浙江秋糧六月壬午傅友德克漢州辛卯廖永忠克夔州戊戌明升將丁世貞破文州守將朱顯忠死之癸卯湯和至重慶明升降戊申倭寇膠州是月徙山後民三萬五千戶於內地又徙沙漠遺民三萬二千戶屯田北平秋七月辛亥徐達練兵山西辛酉傅友德下成都四川平乙丑明升至京師封歸義侯八月甲午免中都淮揚及泰滁無為田租己酉振陝西饑是月高州海寇亂通判王名善死之九月庚戌朔日有食之冬十月丙申征蜀師還十一月丙辰有事於圜丘庚申命官吏犯贓者罪勿貸是月免陝西河南被災田租十二月徐達還是年安南浡泥高麗三佛齊暹羅日本真臘入貢五年春正月癸丑待制王禕使雲南詔諭元梁王把匝剌瓦爾密禕至不屈死乙丑徙陳理明升於高麗甲戌魏國公徐達為征虜大將軍出雁門趨和林曹國公李文忠為左副將軍出應昌宋國公馮勝為征西將軍取甘肅征擴廓帖木兒靖海侯吳禎督海運餉遼東衛國公鄧愈為征南將軍江夏侯周德興江陰侯吳良副之分道討湖南廣西洞蠻二月丙戌安南陳叔明弒其主日熞自立遣使入貢却之三月丁卯都督僉事藍玉敗擴廓於土剌河夏四月己卯振濟南萊州饑戊戌始行鄉飲酒禮庚子鄧愈平散毛諸洞蠻五月壬子徐達及元兵戰於嶺北敗績是月詔曰天下大定禮儀風俗不可不正諸遭亂為人奴隸者復為民凍餒者里中富室假貸之孤寡殘疾者官養之毋失所鄉黨論齒相見揖拜毋違禮婚姻毋論財喪事稱家有無毋惑陰陽拘忌停柩暴露流民復業者各就丁力耕種毋以舊田為限僧道齊醮雜男女恣飲食有司嚴治之閩粵豪家毋閹人子為火者犯者抵罪六月丙子定宦官禁令丁丑定宮官女職之制戊寅馮勝克甘肅追敗元兵於瓜沙州癸巳定六部職掌及歲終考績法壬寅吳良平靖州蠻甲辰李文忠敗元兵於阿魯渾河宣寧侯曹良臣戰沒乙巳作鐵榜誡功臣是月振山東饑免被災郡縣田租秋七月丙辰湯和及元兵戰於斷頭山敗績八月丙申吳良平五開古州諸蠻甲辰元兵犯雲內同知黃里死之九月戊午周德興平婪鳳安田諸蠻冬十月丁酉馮勝師還是月免應天太平鎮江寧國廣德田租十一月辛酉有事於圜丘甲子征南師還壬申納哈出犯遼東是月召徐達李文忠還十二月甲戌詔以農桑學校課有司辛巳命百官秦事啓皇太子庚子鄧愈為征西將軍征吐番壬寅貽元嗣君書是年瑣里占城高麗琉球烏斯藏入貢高麗貢使再至諭自後三年一貢六年春正月甲寅謫汪廣洋為廣東參政二月乙未諭暫罷科舉察舉賢才壬寅命御史及按察使考察有司三月癸卯朔日有食之頒昭鑒録訓誡諸王戊申大閲壬子徐達為征虜大將軍李文忠馮勝鄧愈湯和副之備邊山西北平甲子指揮使於顯為總兵官備倭夏四月己丑令有司上山川險易圖六月壬午盱眙獻瑞麥薦宗廟壬辰擴廓帖木兒遣兵攻雁門指揮吳均擊却之是月免北平河間河南開封延安汾州被災田租秋七月壬寅命戶部稽渡江以來各省水旱災傷分數優恤之壬子胡惟庸為右丞相八月乙亥詔祀三皇及歷代帝王冬十月辛巳召徐達馮勝還十一月壬子擴廓帖木兒犯大同徐達遣將擊敗之達仍留鎮甲子遣兵部尚書劉仁振真定饑丙寅冬至帝不豫改卜郊閏月乙亥録故功臣子孫未嗣者二百九人壬午有事於圜丘庚寅頒定大明律是年暹羅高麗占城真臘三佛齊入貢命安南陳叔明權知國事七年春正月甲戌都督僉事王簡王誠平章李伯升屯田河南山東北平靖海侯吳禎為總兵官都督於顯副之巡海捕倭二月丁酉朔日有食之戊午修曲阜孔子廟設孔顏孟三氏學是月平陽太原汾州歷城汲縣旱蝗並免租稅夏四月己亥都督藍玉敗元兵於白酒泉遂拔興和壬寅金吾指揮陸齡討永道諸州蠻平之五月丙子免真定等四十二府州縣被災田租辛巳振蘇州饑民三十萬戶癸巳減蘇松嘉湖極重田租之半六月陝西平涼延安靖寧鄜州雨雹山西山東北平河南蝗並蠲田租秋七月甲子李文忠破元兵於大寧高州壬申倭寇登萊八月甲午朔祀歷代帝王廟辛丑詔軍士陳歿父母妻子不能自存者官為存養百姓避兵離散或客死遺老幼並資遣還遠宦卒官妻子不能歸者有司給舟車資送庚申振河間廣平順德真定饑蠲租稅九月丁丑遣崇禮侯買的里八剌歸遺元嗣君書冬十一月壬戌納哈出犯遼陽千戶吳壽擊走之辛未有事於圜丘十二月戊戌召鄧愈湯和還是年阿難功德國暹羅琉球三佛齊烏斯藏撒里畏兀兒入貢八年春正月辛未增祀雞籠山功臣廟一百八人癸酉命有司察窮民無告者給屋舍衣食辛巳鄧愈湯和等十三人屯戍北平陝西河南丁亥詔天下立社學是月河決開封發民夫塞之二月甲午宥雜犯死罪以下及官犯私罪者謫鳳陽輸作屯種贖罪癸丑耕藉田召徐達李文忠馮勝還傅友德等留鎮北平三月辛酉立鈔法辛巳罷寶源局鑄錢夏四月辛卯幸中都丁巳至自中都免彰德大名臨洮平涼河州被災田租罷營中都致仕誠意伯劉基卒五月己巳永嘉侯朱亮祖偕傅友德鎮北平六月壬寅指揮同知胡汝平貴州蠻秋七月己未朔日有食之辛酉改作太廟壬戌召傅友德朱亮祖還李文忠顧時鎮山西北平戊辰詔百官奔父母喪不俟報京師地震丁丑免應天太平寧國鎮江及蘄黃諸府被災田租八月己酉元擴廓帖木兒卒冬十月丁亥詔舉富民素行端潔達時務者壬子命皇太子諸王講武中都十一月丁丑有事於圜丘十二月戊子京師地震甲寅遣使振蘇州湖州嘉興松江常州太平寧國杭州水災是月納哈出犯遼東指揮馬雲葉旺大敗之是年撒里高麗占城暹羅日本爪哇三佛齊入貢九年春正月中山侯湯和潁川侯傅友德都督僉事藍玉王弼中書右丞丁玉備邊延安三月己卯詔曰比年西征燉煌北伐沙漠軍需甲仗皆資山陝又以秦晉二府宮殿之役重困吾民平定以來閭閻未息國都始建土木屢興畿輔既極煩勞外郡疲於轉運今蓄儲有餘其淮揚安徽池五府及山西陝西河南福建江西浙江北平湖廣今年租賦悉免之夏四月庚戌京師自去年八月不雨是日始雨五月癸酉自庚戌雨至是日始霽六月甲午改行中書省為承宣布政使司辛丑李文忠還秋七月癸丑朔日有食之是月蠲蘇松嘉湖水災田租振永平旱災元將伯顏帖木兒犯延安傅友德敗降之八月己酉遣官省歷代帝王陵寢禁芻牧置守陵戶忠臣烈士祠有司以時葺治分遣國子生修嶽鎮海瀆祠西番𩽆兒只巴寇罕東河州指揮寧正擊走之閏九月庚寅以災異詔求直言冬十月己未太廟成自是行合享禮丙子命秦晉燕吳楚齊諸王治兵鳳陽十一月壬午有事於圜丘戊子徙山西及真定民無産者田鳳陽十二月甲寅振畿內浙江湖北水災己卯遣都督同知沐英乘傳詣陝西問民疾苦是年覽邦琉球安南日本烏斯藏高麗入貢十年春正月辛卯以羽林等衛軍益秦晉燕三府護衛是春振蘇松嘉湖水災夏四月己酉鄧愈為征西將軍沐英為副將軍率師討吐番大破之是月振太平寧國及宜興錢塘諸縣水災五月庚子韓國公李善長曹國公李文忠總中書省大都督府御史臺議軍國重事癸卯振湖廣水災丙午戶部主事趙乾振荊蘄遲緩伏誅六月丁巳詔臣民言事者實封達御前丙寅命政事啓皇太子裁決奏聞秋七月甲申置通政司是月始遣御史巡按州縣八月庚戌改建大祀殿於南郊癸丑選武臣子弟讀書國子監九月丙申振紹興金華衢州水災辛丑胡惟庸為左丞相汪廣洋為右丞相冬十月戊午封沐英西平侯辛酉賜百官公田十一月癸未衛國公鄧愈卒丁亥合祀天地於奉天殿是月免河南陝西廣東湖廣田租威茂蠻叛御史大夫丁玉為平羌將軍討平之十二月乙巳朔日有食之丁未録故功臣子孫五百餘人授官有差是年占城三佛齊暹羅爪哇真臘入貢高麗使五至以嗣王未立却之十一年春正月甲戌封皇子椿為蜀王柏湘王桂豫王楧漢王植衛王改封吳王橚為周王己卯進封湯和信國公是月徵天下布政使及知府來朝二月指揮胡淵平茂州蠻三月壬午命奏事毋關白中書省是月第來朝官為三等夏四月元嗣君愛猷識理達臘殂子脫古思帖木兒嗣五月丁酉存問蘇松嘉湖被水災民戶賜米一石蠲逋賦六十五萬有奇六月壬子遣使祭故元嗣君己巳五開蠻叛殺靖州指揮過興以辰州指揮楊仲名為總兵官討之秋七月丁丑振平陽饑是月蘇松揚台海溢遣官存恤八月免應天太平鎮江寧國廣德諸府州秋糧九月丙申追封劉繼祖為義惠侯冬十月甲子大祀殿成十一月庚午征西將軍西平侯沐英率都督藍玉王弼討西番是月五開蠻平是年暹羅闍婆高麗琉球占城三佛齊𩽆甘烏斯藏彭亨百花入貢十二年春正月己卯始合祀天地於南郊甲申洮州十八族番叛命沐英移兵討之丙申丁玉平松州蠻二月戊戌李文忠督理河岷臨鞏軍事乙巳詔曰今春雨雪經旬天下貧民困於饑寒者多有其令有司給以鈔丙寅信國公湯和率列侯練兵臨清夏五月癸未蠲北平田租六月丁卯都督馬雲征大寧秋七月丙辰丁玉回師討眉縣賊平之己未李文忠還掌大都督府事八月辛巳詔凡致仕官復其家終身無所與九月己亥沐英大破西番擒其部長三副使冬十一月甲午沐英班師封仇成藍玉等十二人為侯庚申大寧平十二月汪廣洋貶廣南賜死徵天下博學老成之士至京師是年占城爪哇暹羅日本安南高麗入貢高麗貢黃金百斤白金萬兩以不如約却之十三年春正月戊戌左丞相胡惟庸謀反及其黨御史大夫陳寧中丞涂節等伏誅癸卯大祀天地於南郊罷中書省廢丞相等官更定六部官秩改大都督府為中左右前後五軍都督府二月壬戌朔詔舉聰明正直孝弟力田賢良方正文學術數之士發丹符驗天下金穀之數戊辰文武官年六十以上者聽致仕給以誥敕三月壬辰減蘇松嘉湖重賦十之二壬寅燕王棣之國北平壬子沐英襲元將脫火赤於亦集乃擒之盡降其衆夏四月己丑命羣臣各舉所知五月甲午雷震謹身殿乙未大赦丙申釋在京及臨濠屯田輸作者己亥免天下田租吏以過誤罷者還其職壬寅都督濮英進兵赤斤站獲故元豳王亦憐真及其部曲而還是月罷御史臺命從征士卒老疾者許以子代老而無子及寡婦有司資遣還六月丙寅雷震奉天門避正殿省愆丁卯罷王府工役丁丑置諫院官秋八月命天下學校師生日給廩膳九月辛卯景川侯曹震營陽侯楊璟永城侯薛顯屯田北平乙巳天壽節始受羣臣朝賀賜宴於謹身殿後以為常丙午置四輔官告於太廟以儒士王本杜佑龔斆杜斆趙民望吳源為春夏官是月詔陝西衛軍以三分之二屯田安置翰林學士承旨宋濂於茂州道卒冬十一月乙未徐達還丙午元平章完者不花乃兒不花犯永平指揮劉廣戰沒千戶王輅擊敗之擒完者不花十二月天下府州縣所舉士至者八百六十餘人授官有差南雄侯趙庸鎮廣東討陽春蠻是年琉球日本安南占城真臘爪哇入貢日本以無表却之十四年春正月戊子徐達為征虜大將軍湯和傅友德為左右副將軍帥師討乃兒不花命新授官者各舉所知乙未大祀天地於南郊壬子罷天下歲造兵器癸丑命公侯子弟入國學丙辰詔求隱逸二月庚辰核天下官田三月丙戌大赦辛丑頒五經四書於北方學校夏四月庚午徐達率諸將出塞至北黃河擊破元兵獲全寧四部以歸五月五溪蠻叛江夏侯周德興討平之秋八月丙子詔求明經老成之士有司禮送京師庚辰河決原武祥符中牟辛巳徐達還九月壬午朔傅友德為征南將軍藍玉沐英為左右副將軍帥師征雲南徐達鎮北平丙午周德興移師討施州蠻平之冬十月壬子朔日有食之癸丑命法司録囚會翰林院給事中及春坊官會議平允以聞甲寅免應天太平廣德鎮江寧國田租癸亥分遣御史録囚己卯延安侯唐勝宗帥師討浙東山寇平之十一月壬午吉安侯陸仲亨鎮成都庚戌趙庸討廣州海寇大破之十二月丁巳命翰林春坊官考駁諸司章奏戊辰傅友德大敗元兵於白石江遂下曲靖壬申元梁王把匝剌瓦爾密走普寧自殺是年暹羅安南爪哇𩽆甘烏斯藏入貢以安南寇思明不納
