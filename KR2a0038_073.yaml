二人掌典籍各一人成祖復舊制英宗初命大學士提調講讀官按詹事府多由他官兼掌天順以前或尚書侍郎都御史成化以後率以禮部尚書侍郎由翰林出身者兼掌之其協理者無常員春坊大學士景泰間倪謙劉定之而後僅楊廷和一任之後不復設其司直司諫清紀郎亦不常置惟嘉靖十八年以陸深為詹事崔銑為少詹事王教羅洪先華察等為諭德贊善洗馬皇甫涍唐順之等為司直司諫皆天下名儒自明初宋濂諸人後宮僚莫盛於此嗣是出閣講讀每點別員本府坊局僅為翰林官遷轉之階翰林院學士一人正五品侍讀學士侍講學士各二人並從五品侍讀侍講各二人並正六品五經博士九人正八品並世襲別見典籍二人從八品侍書二人正九品後不常設待詔六人從九品不常設孔目一人未入流史官修撰從六品編修正七品檢討從七品庶吉士無定員學士掌制誥史冊文翰之事以考議制度詳正文書備天子顧問凡經筵日講纂修實録玉牒史志諸書編纂六曹章奏皆奉敕而統承之誥敕以學士一人兼領正統中王直王英以禮部侍郎兼學士專領誥敕後罷弘治七年復設正德中白鉞費宏等由禮部尚書入東閣專典誥敕嘉靖六年復罷以講讀編檢等官管之大政事大典禮集諸臣會議則與諸司參決其可否車駕幸太學聽講凡郊祀慶成諸宴則學士侍坐於四品京卿上侍讀侍講掌講讀經史五經博士初置五人各掌專經講義繼以優給聖賢先儒後裔世襲不治院事史官掌修國史凡天文地理宗潢禮樂兵刑諸大政及詔敕書檄批答王言皆籍而記之以備實録國家有纂修著作之書則分掌考輯撰述之事經筵充展卷官鄉試充考試官會試充同考官殿試充收卷官凡記注起居編纂六曹章奏謄黃冊封等咸充之庶吉士讀書翰林院以學士一人教習之侍書掌以六書供侍待詔掌應對孔目掌文移吳元年初置翰林院秩正三品設學士正三品侍講學士正四品直學士正五品修撰典簿正七品編修正八品洪武二年置學士承旨正三品改學士從三品侍講學士正四品侍讀學士從四品修撰正六品增設待制從五品應奉正七品典籍從八品等官十三年增設檢閲從九品十四年定學士為正五品革承旨直學士待制應奉檢閲典簿設孔目五經博士侍書待詔檢討令編修檢討典籍同左春坊左司直郎正字贊讀考駁諸司奏啓平允則署其銜曰翰林院兼平駁諸司文章事某官某列名書之十八年更定品員如前所列獨未有庶吉士以侍讀先侍講建文時仍設承旨改侍讀侍講兩學士為文學博士設文翰文史二館文翰以居侍讀侍講侍書五經博士典籍待詔文史以居修撰編修檢討改孔目為典簿改中書舍人為侍書以隸翰林又設文淵閣待詔及拾遺補闕等官成祖初復舊其年九月特簡講讀編檢等官參預機務簡用無定員謂之內閣然解縉胡廣等既直文淵閣猶相繼署院事至洪熙以後楊士奇等加至師保禮絶百僚始不復署正統七年翰林院落成學士錢習禮不設楊士奇楊溥公座曰此非三公府也二楊以聞乃命工部具椅案禮部定位次以內閣固翰林職也嘉隆以前文移關白猶稱翰林院以後則竟稱內閣矣其在六部自成化時周洪謨以後禮部尚書侍郎必由翰林吏部兩侍郎必有一由於翰林其由翰林者尚書則兼學士六部皆然侍郎則兼侍讀侍講學士其在詹事府暨坊局官視其品級必帶本院銜詹事少詹事帶學士銜春坊大學士不常設庶子諭德中允贊善洗馬等則帶講讀學士以下至編檢銜史官自洪武十四年置修撰三人編修檢討各四人其後由一甲進士除授及庶吉士留館授職往往溢額無定員嘉靖八年復定講讀修撰各三人編修檢討各六人皆從吏部推補如諸司例然未幾即以侍從人少詔采方正有學術者以充其選因改御史胡經員外郎陳束主事唐順之等七人俱為編修以後仍循舊例由庶吉士除授卒無定額崇禎七年又考選推官知縣為編修檢討蓋亦創舉非常制也庶吉士自洪武初有六科庶吉士十八年以進士在翰林院承敕監等近侍者俱稱庶吉士永樂二年始定為翰林院庶吉士選進士文學優等及善書者為之三年試之其留者二甲授編修三甲授檢討不得留者則為給事中御史或出為州縣官宣德五年始命學士教習萬曆以後掌教習者專以吏禮二部侍郎二人明初嘗置弘文館學士洪武三年置以胡鉉為學士又命劉基危素王本中睢稼皆兼弘文館學士未幾罷宣德間復建弘文閣於思善門右以翰林學士楊溥掌閣印尋併入文淵閣祕書監洪武三年置秩正六品除監丞一人直長二人尋定設令一人丞直長各二人掌內府書籍十三年併入翰林院典籍起居注甲辰年置吳元年定秩正五品洪武四年改正七品六年升從六品九年定起居注二人後革十四年復置秩從七品尋罷至萬曆間命翰林院官兼攝之已復罷尋皆罷國子監祭酒一人從四品司業一人正六品其屬繩愆廳監丞一人正八品博士廳五經博士五人從八品率性修道誠心正義崇志廣業六堂助教十五人從八品學正十人正九品學録七人從九品典簿廳典簿一人從八品典籍廳典籍一人從九品掌饌廳掌饌二人未入流祭酒司業掌國學諸生訓導之政令凡舉人貢生官生恩生功生例生土官外國生幼勳臣及勳戚大臣子弟之入監者奉監規而訓課之造以明體達用之學以孝弟禮義忠信廉恥為之本以六經諸史為之業務各期以敦倫善行敬業樂羣以修舉古樂正成均之師道有不率者撲以夏楚不悛徙謫之其率教者有升堂積分超格用之法課業倣書季呈翰林院考校文冊歲終奏上每歲仲春秋上丁遣大臣祀先師則總其禮儀車駕幸學則執經坐講新進士釋褐則坐而受拜監丞掌繩愆廳之事以參領監務堅明其約束諸師生有過及廩膳不潔並糾懲之而書之於集愆冊博士掌分經講授而時其考課凡經以易詩書春秋禮記人專一經大學中庸論語孟子兼習之助教學士學録掌六堂之訓誨士子肄業本堂則為講說經義文字導約之以規矩典簿典文移金錢出納支受典籍典書籍掌饌掌飲饌明初即置國子學乙巳九月置國子學以故集慶路學為之洪武十四年改建國子學於雞鳴山下設博士助教學正學録典樂典書典膳等官吳元年定國子學官制增設祭酒司業典簿祭酒正四品司業正五品博士正七品典簿正八品助教從八品學正正九品學録從九品典膳省注洪武八年又置中都國子學秩正四品命國子學分官領之十三年改典膳為掌饌十五年改為國子監秩從四品設祭酒一人司業一人監丞典簿各一人博士三人助教十六人學正學録各三人掌饌一人各官品秩如前所列中都國子監制亦如之十六年以宋訥為祭酒敕諭之曰太學天下賢關禮義所由出人材所由興卿夙學耆德故特命為祭酒尚體朕立教之意俾諸生有成士習丕變國家其有賴焉又命曹國公李文忠領監事車駕時幸以故監官不得中廳而坐中門而行二十四年更定國子監品秩員數俱如前所列中都國子監設祭酒司業監丞典簿博士學正學録掌饌各一人助教二人品秩與在京同二十六年罷中都國子監建文中升監丞為堂上官革學正學録成祖復舊制永樂元年置國子監於北京設祭酒司業監丞典簿博士學正學録掌饌各一人助教二人後增設不常助教至十五人學正至十一人學録至七人後革助教二人學正四人學録二人萬曆九年又革助教四人學録一人宣德九年省司業弘治十五年復設明初祭酒司業擇有學行者任之後皆由翰林院官遷轉衍聖公孔氏世襲正二品袍帶誥命朝班一品洪武元年授孔子五十六代孫希學襲封其屬掌書典籍司樂知印奏差書寫各一人皆以流官充之曲阜知縣孔氏世職洪武元年授孔子裔孫希大為曲阜世襲知縣翰林院世襲五經博士正八品孔氏二人正德元年授孔子五十九世孫彥繩主衢州廟祀宋孔端友從高宗南渡家於衢州此孔氏南宗也正德二年授孔聞禮奉子思廟祀顏氏一人景泰三年授顏子五十九世孫希惠曾氏一人嘉靖十八年授曾子六十代孫質粹仲氏一人萬曆十五年授子路裔孫仲呂孟氏一人景泰三年授孟子裔孫希文周氏一人景泰七年授先儒周敦頤裔孫冕程氏二人景泰六年授先儒程頤裔孫克仁崇禎三年授先儒程皓裔孫接道邵氏一人崇禎三年授先儒邵雍裔孫繼祖張氏一人天啓二年以先儒張載裔孫文運為博士朱氏二人景泰六年授先儒朱熹裔孫梴嘉靖二年又授墅為博士主婺源廟祀劉氏一人景泰七年授誠意伯劉基七世孫祿後革教授司教授從九品學録學司並未入流孔顏曾孟四氏各一人又尼山洙泗二書院各學録一人先是元代封孔子後裔為衍聖公賜三品印洪武元年太祖既以孔希學襲封衍聖公因謂禮臣曰孔子萬世帝王之師待其後嗣秩止三品弗稱褒崇其授希學秩二品賜以銀印又命復孔顏孟三家子孫徭役十八年敕工部詢問凡有聖賢子孫以罪輸作者釋之永樂二十二年賜衍聖公宅於京師加一品金織衣正統元年詔免凡聖賢子孫差役選周程張朱諸儒子孫聰明俊秀可教養者不拘名數送所在儒學讀書仍給廩饌成化元年給孔顏孟三氏學印令三年貢有學行者一人入國子監六年命衍聖公始襲者在監讀書一年
