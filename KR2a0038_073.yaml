body:
  text: 明史卷七十三志第四十九職官二都察院附總督巡撫通政司大理寺詹事府附左右春坊司經局翰林院國子監衍聖公附五經博士都察院左右都御史正二品左右副都御史正三品左右僉都御史正四品其屬經歷司經歷一人正六品都事一人正七品司務廳司務二人從九品初設四人後革二人照磨所照磨正八品檢校正九品司獄司司獄從九品初設六人後革五人各一人十三道監察御史一百十人正七品浙江江西河南山東各十人福建廣東廣西四川貴州各七人陝西湖廣山西各八人雲南十一人其在外加都御史或副僉都御史銜者有總督有提督有巡撫有總督兼巡撫提督兼巡撫及經略總理贊理巡視撫治等員巡撫之名起於懿文太子巡撫陝西永樂十九年遣尚書蹇義等二十六人巡行天下安撫軍民以後不拘尚書侍郎都御史少卿等官事畢復命即或停遣初名巡撫或名鎮守後以鎮守侍郎與巡按御史不相統屬文移窒礙定為都御史巡撫兼軍務者加提督有總兵地方加贊理或參贊所轄多事重者加總督他如整飭撫治巡治總理等項皆因事特設其以尚書侍郎任總督軍務者皆兼都御史以便行事都御史職專糾劾百司辨明冤枉提督各道為天子耳目風紀之司凡大臣姦邪小人搆黨作威福亂政者劾凡百官猥茸貪冒壞官紀者劾凡學術不正上書陳言變亂成憲希進用者劾遇朝覲考察同吏部司賢否陟黜大獄重囚會鞫於外朝偕刑部大理讞平之其奉敕內地拊循外地各專其敕行事十三道監察御史主察糾內外百司之官邪或露章面劾或封章奏劾在內兩京刷卷巡視京營監臨鄉會試及武舉巡視光祿巡視倉場巡視內庫皇城五城輪值登聞鼓後改科員在外巡按北直隸二人南直隸三人宣大一人遼東一人甘肅一人十三省各一人清軍提督學校兩京各一人萬曆末南京增設一人巡鹽兩淮一人兩浙一人長蘆一人河東一人茶馬陝西巡漕巡關宣德四年設立鈔關御史至正統十年始遣主事儹運印馬屯田師行則監軍紀功各以其事專監察而巡按則代天子巡狩所按藩服大臣府州縣官諸考察舉劾尤專大事奏裁小事立斷按臨所至必先審録罪囚弔刷案卷有故出入者理辨之諸祭祀壇場省其牆宇祭器存恤孤老巡視倉庫查算錢糧勉勵學校表揚善類翦除豪蠹以正風俗振綱紀凡朝會糾儀祭祀監禮凡政事得失軍民利病皆得直言無避有大政集闕廷預議焉蓋六部至重然有專司而都察院總憲綱惟所見聞得糾察諸御史糾劾務明著實跡開寫年月毋虛文泛詆訐拾細瑣出按復命都御史覆劾其稱職不稱職以聞凡御史犯罪加三等有贓從重論十三道各協管兩京直隸衙門而都察院衙門分屬河南道獨專諸內外考察浙江道協管中軍都督府在京府軍左金吾左金吾右金吾前留守中神策應天和陽廣洋武功中武功後茂陵十二衛牧馬千戶所及直隸廬州府廬州六安二衛江西道協管前軍都督府在京府軍前燕山左龍江左龍江右龍驤豹韜天策寬河八衛及直隸淮安府淮安大河邳州九江武清龍門各衛福建道協管戶部寶鈔提舉司鈔紙印鈔二局承運廣惠廣積廣盈贓罰甲乙丙丁戊字天財軍儲供用行用各庫在京金吾後武成中飛熊武功左武功右武功前獻陵景陵裕陵泰陵十衛及直隸常州池州二府定邊開平中屯二衛美峪千戶所四川道協管工部營繕所文思院御用司設神宮尚衣都知等監惜薪司兵仗銀作巾帽針工器皿盔甲軍器寶源皮作鞍轡織染柴炭抽分竹木各局僧道録司在京府軍濟州大寧前蔚州左永清左五衛蕃牧千戶所及直隸松江府廣德州金山懷安懷來各衛神木千戶所播州宣慰司石砫酉陽等宣撫司天全六番招討司陝西道協管後軍都督府大理寺行人司在京府軍後鷹揚興武義勇右橫海江陰康陵昭陵八衛敢勇報效二營韓秦慶安化四府及直隸和州保定左右中前四衛雲南道協管順天府廣備庫在京羽林前通州二衛及直隸永平廣平二府通州左通州右涿鹿涿鹿左涿鹿中密雲中密雲後永平山海盧龍撫寧東勝左東勝右大同中屯營州五屯延慶延慶左延慶右萬全左萬全右各衛居庸關黃花鎮寬河武定各千戶所河南道協管禮部都察院翰林院國子監太常寺光祿寺鴻臚寺尚寶司中書舍人欽天監太醫院司禮尚膳尚寶直殿等監酒醋局鐘鼓司教坊司在京羽林左留守前留守後神武左神武前彭城六衛伊唐周鄭四府及兩淮鹽運司直隸揚州大名二府揚州高郵儀真歸德寧山潼關神武右各衛泰州通州汝寧各千戶所廣西道協管通政司六科在京燕山右燕山前大興左騰驤左騰驤右武驤左鎮南瀋陽左會州富峪忠義前忠義後十二衛及直隸安慶徽州保定真定四府安慶新安鎮武真定各衛紫荊關倒馬關廣昌各千戶所廣東道協管刑部應天府在京虎賁左濟陽武驤右瀋陽右武功左武功右孝陵長陵八衛及直隸延慶州開平中屯衛山西道協管左軍都督府在京錦衣府軍右留守左驍騎左驍騎右龍虎龍虎左大寧中義勇前義勇後英武水軍左十二衛晉府長史司及直隸鎮江太平二府鎮江建陽瀋陽中屯各衛平定蒲州二千戶所山東道協管宗人府兵部會同館御馬監典牧所大通關在京羽林右永清右濟川三衛及中都留守司遼東都司直隸鳳陽府徐滁二州中都留守左留守中鳳陽鳳陽中鳳陽右皇陵長淮懷遠徐州滁州泗州壽州宿州武平沂州德州德州左保定後瀋陽中各衛洪塘千戶所湖廣道協管右軍都督府五城兵馬司在京留守右武德忠義右虎賁右廣武水軍右江淮永陵八衛遼梁岷吉華陽五府荊襄楚三府長史司及興都留守司直隸寧國府寧國宣州神武中定州茂山各衛貴州道協管吏部太僕寺上林苑監內官印綬二監在京旗手衛及長蘆鹽運司大寧都司萬全都司直隸蘇州河間順德三府保安州蘇州太倉鎮海薊州遵化鎮朔興州五屯忠義中河間天津天津左天津右宣府前宣府左宣府右開平保安右蔚州永寧各衛嘉興吳淞江梁城滄州興和長安龍門各千戶所初吳元年置御史臺設左右御史大夫從一品御史中丞正二品侍御史從二品治書侍御史正三品殿中侍御史正五品察院監察御史正七品經歷從五品都事正七品照磨管勾正八品以鄧愈湯和為御史大夫劉基章溢為御史中丞諭之曰國家立三大府中書總政事都督掌軍旅御史掌糾察朝廷紀綱盡繫於此而臺察之任尤清要卿等當正己以率下忠勤以事上毋委靡因循以縱姦毋假公濟私以害物洪武九年汰侍御史及治書殿中侍御史十年七月詔遣監察御史巡按州縣十三年專設左右中丞正二品左右侍御史正四品尋罷御史臺十五年更置都察院設監察都御史八人秩正七品分監察御史為浙江河南山東北平山西陝西湖廣福建江西廣東廣西四川十二道各道置御史或五人或三四人秩正九品每道鑄印二一畀御史久次者掌之一藏內府有事受印以出既事納之文曰繩愆糾繆以秀才李原名詹徽等為都御史吳荃等為試監察御史試御史一年後實授又有理刑進士理刑知縣理都察院刑獄半年實授正德中革十六年升都察院為正三品設左右都御史各一人正三品左右副都御史各一人正四品左右僉都御史各二人正五品經歷一人正七品知事一人正八品十七年升都御史正二品副都御史正三品僉都御史正四十二道監察御史正七品二十三年左副都御史袁泰言各道印篆相同慮有詐僞乃更鑄監察御史印曰某道監察御史印其巡按印曰巡按某處監察御史印建文元年改設都御史一人革僉都御史二年改為御史府設御史大夫改十二道為左右兩院止設御史二十八人成祖復舊制永樂元年改北平道為北京道十八年罷北京道增設貴州雲南交址三道洪熙元年稱行在都察院同六部又定巡按以八月出巡宣德十年罷交址道始定為十三道正統中去行在字嘉靖中以清屯增副都御史三人尋罷隆慶中以提督京營增右都御史三人尋亦罷總督漕運兼提督軍務巡撫鳳陽等處兼管河道一員太祖時嘗置京畿都漕運司設漕運使洪武元年置漕運使正四品知事正八品提控案牘從九品屬官監運正九品都綱省注十四年罷永樂間設漕運總兵官以平江伯陳瑄治漕宣德中又遣侍郎都御史少卿等官督運至景泰二年因漕運不繼始命副都御史王竑總督因兼巡撫淮揚廬鳳四府徐和滁三州治淮安成化八年分設巡撫總漕各一員九年復舊正德十三年又分設十六年又復舊嘉靖三十六年以倭警添設提督軍務巡撫鳳陽都御史四十年歸併改總督漕運兼提督軍務萬曆七年加兼管河道總督薊遼保定等處軍務兼理糧餉一員嘉靖二十九年置先是薊遼有警間遣重臣巡視或稱提督至是以邊患益甚始置總督開府密雲轄順天保定遼東三巡撫兼理糧餉萬曆九年加兼巡撫順天等處十一年復舊天啓元年置遼東經略經略之名起於萬曆二十年宋應昌暨後楊鎬至天啓元年又以內閣孫承宗督師經略山海關稱樞輔崇禎四年併入總督十一年又增設總督於保定總督宣大山西等處軍務兼理糧餉一員正統元年始遣僉都御史巡撫宣大景泰二年宣府大同各設巡撫遣尚書石璞總理軍務成化弘治間有警則遣正德八年設總制嘉靖初兼轄偏保二十九年去偏保定設總督宣大山西等處銜三十八年令防秋日駐宣府四十三年移駐懷來隆慶四年移駐陽和總督陝西三邊軍務一員弘治十年火篩入寇議遣重臣總督陝西甘肅延綏寧夏軍務乃起左都御史王越任之十五年以後或設或罷至嘉靖四年始定設初稱提督軍務七年改為總制十九年避制字改為總督開府固原防秋駐花馬池總督兩廣軍務兼理糧餉帶管鹽法兼巡撫廣東地方一員永樂二年遣給事中雷填巡撫廣西十九年遣郭瑄艾廣巡撫廣東景泰三年苗寇起以兩廣宜協濟應援乃設總督成化元年兼巡撫事駐梧州正德十四年改總督為總制尋改提督嘉靖四十五年另設廣東巡撫改提督為總督止兼巡撫廣西駐肇慶隆慶三年又設廣西巡撫除兼職四年革廣東巡撫改為提督兩廣軍務兼理糧餉巡撫廣東萬曆三年仍改總督加帶管鹽法總督四川陝西河南湖廣等處軍務一員正德五年設尋罷嘉靖二十七年以苗患又設總督四川湖廣貴州雲南等處軍務四十二年罷天啓元年以土官奢崇明反又設四川湖廣雲南貴州廣西五省總督四年兼巡撫貴州總督浙江福建江南兼制江西軍務一員嘉靖三十三年以倭犯杭州置四十一年革總督陝西山西河南湖廣四川五省軍務一員崇禎七年置或兼七省十二年後俱以內閣督師總督鳳陽地方兼制河南湖廣軍務一員崇禎十四年設總督保定地方軍務一員崇禎十一年設總督河南湖廣軍務兼巡撫河南一員崇禎十六年設總督九江地方兼制江西湖廣軍務一員崇禎十六年設總理南直隸河南山東湖廣四川軍務一員崇禎八年設以盧象升為之與總督或分或併總理河漕兼提督軍務一員永樂九年遣尚書治河自後間遣侍郎都御史成化後始稱總督河道正德四年定設都御史嘉靖二十年以都御史加工部職銜提督河南山東直隸河道隆慶四年加提督軍務萬曆五年改總理河漕兼提督軍務八年革總理糧儲提督軍務兼巡撫應天等府一員宣德五年初命侍郎總督糧儲兼巡撫景泰四年定遣都御史嘉靖三十三年以海警加提督軍務駐蘇州萬曆中移駐句容已復駐蘇州巡撫浙江等處地方兼提督軍務一員永樂初遣尚書治兩浙農事以