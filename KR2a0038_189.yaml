body:
  text: 明史卷一百八十九列傳第七十七李文祥孫磐徐珪胡爟周時從王雄羅僑葉釗劉天麒戴冠黃鞏陸震夏良勝萬潮等何遵劉校等李文祥字天瑞麻城人祖正芳山西布政使父陝西參政文祥自幼俊異弱冠舉於鄉成化末登進士萬安當國重其才以孫弘璧與同榜款於家文祥意弗慊也屬題畫鳩語含刺安深銜之未幾孝宗嗣位即上封事略曰祖宗設內閣六部贊萬幾理庶務職至重也頃者在位多匪人權移內侍賞罰任其喜怒禍福聽其轉移讐視言官公行賄賂阿之則交引驟遷忤之則巧讒遠竄朝野寒心道路側目望陛下密察渠魁明彰國憲擇謹厚者供使令更博選大臣諮諏治理推心委任不復嫌疑然後體統正而近習不得肆也祖宗定律輕重適宜頃法司專徇己私不恤國典豪強者雖重必寬貧弱者雖輕必罪惠及奸宄養成玩俗兼之風尚奢麗禮制蕩然豪民僭王者之居富室擬公侯之服奇技淫巧上下同流望陛下申明舊章俾法曹遵律令臣庶各守等威然後禮法明而人心不敢玩也然國無其人誰與共理致仕尚書王恕王竑孤忠自許齒力未衰南京主事林俊思南通判王純剛方植躬才品兼茂望陛下起列朝端資其議論必有裨益可翊明時且賢才難得自古為然習俗移人豪杰不免惟茲臣庶不盡庸愚能知自愧即屬名流樂其危菑乃為猥品願陛下明察羣倫罷其罔上營私違天蠹物者餘則勉以自新既開改過之路必多遷善之人臣見登極詔書不許風聞言事古聖王懸鼓設木自求誹謗言之縱非其情聽者亦足為戒何害於國遽欲罪之昔李林甫持此以禍唐王安石持此以禍宋遠近驟聞莫不驚駭願陛下再頒明詔廣求直言庶不墮奸謀足彰聖德大率君子之言決非小人之利諮問倘及必肆中傷如有所疑請試面對疏奏宦官及執政萬安劉吉尹直等咸惡之數日不下忽詔詣左順門以疏內有中興再造語傳旨詰責文祥從容辨析而出謫授陝西咸寧丞南京主事夏崇文論救不納工部主事莆田林沂復請召文祥及湯鼐納崇文言且召陳獻章謝鐸等時安已去吉直激帝怒嚴旨切責之廷臣多薦文祥率為吉直所沮弘治二年以王恕薦召為兵部主事監司以下餽贐皆不納到官未踰月復以吉人事下獄貶貴州興隆衞經歷都御史鄧廷瓚征苗咨以兵事大奇之欲薦為監司文祥曰昔以言事出今以軍功進不可固辭不得乃請齎表入都固乞告歸疏再上不許還經商城渡冰陷死焉年僅三十孫磐遼陽人弘治九年進士觀政在部時刑部典吏徐珪以滿倉兒事劾中官楊鵬得罪磐上疏曰近諫官以言為諱而排寵倖觸權奸者乃在胥吏臣竊羞之請定建言者為四等最上不避患害抗彈權貴者其次揚清激濁能補闕拾遺又其次建白時政有裨軍國皆分別擢而粉飾文具循默不言者則罷黜之庶言官知警不至曠時不見用徐珪者應城人先是千戶吳能以女滿倉兒付媒者鬻於樂婦張紿曰周皇親家也後轉鬻樂工袁璘所能歿妻聶訪得之女怨母鬻己詭言非己母聶與子劫女歸璘訟於刑部郎中丁哲員外郎王爵訊得情璘語不遜哲笞璘數日死御史陳玉主事孔琦驗璘屍瘞之東廠中官楊鵬從子嘗與女淫教璘妻訴冤於鵬而令張指女為妹又令賈校尉屬女亦如張言媒者遂言聶女前鬻周皇親矣奏下鎮撫司坐哲爵等罪復下法司錦衣衞讞索女皇親周彧家無有復命府部大臣及給事御史廷訊張與女始吐實都察院奏哲因公杖人死罪當徒爵玉琦及聶母女當杖獄上珪憤懣抗疏曰聶女之獄哲斷之審矣鵬拷聶使誣服鎮撫司共相蔽欺陛下令法司錦衣會問懼東廠莫敢明至鞫之朝堂乃不能隱夫女誣母僅擬杖哲等無罪反加以徒輕重倒置如此皆東廠威劫所致也臣在刑部三年見鞫問盜賊多東廠鎮撫司緝獲有稱校尉誣陷者有稱校尉為人報讐者有稱校尉受首惡贓而以為從令傍人抵罪者刑官洞見其情無敢擅更一字上干天和災異迭見臣願陛下革去東廠戮鵬叔姪並賈校尉及此女於市謫戍鎮撫司官極邊進哲爵琦玉各一階以洗其冤則天意可回太平可致如不罷東廠亦當推選謹厚中官如陳寬韋泰者居之仍簡一大臣與共理鎮撫司理刑亦不宜專用錦衣官乞推選在京各衞一二人及刑部主事一人共蒞其事或三年六年一更則巡捕官校當無有作奸擅刑誣及無辜者矣臣一介微軀左右前後皆東廠鎮撫司之人禍必不免顧與其死於此輩孰若死於朝廷願斬臣頭以行臣言給臣妻子送骸骨歸臣雖死無恨帝怒下都察院考訊都御史閔珪等抵以奏事不實贖徒還役帝責具狀皆上疏引罪奪俸有差珪贖徒畢發為民既而給事中龐泮等言哲等獄詞覆奏已餘三月繫獄者凡三十八人乞早為省釋乃杖滿倉兒送浣衣局哲給璘埋葬貲發為民爵及琦玉俱贖杖還職時弘治九年十二月也磐尋擢吏部主事正德元年宦官漸用事磐復上疏曰今日弊政莫甚於內臣典兵夫臣以內稱外事皆不當預矧可使握兵柄哉前代盛時未嘗有此唐宋季世始置監軍而其國遂以不永今九邊鎮守監槍諸內臣恃勢專恣侵剋百端有警則擁精卒自衞克敵則縱部下攘功武弁藉以夤緣憲司莫敢訐問所攜家人頭目率惡少無賴吞噬爭攫勢同狼虎致三軍喪氣百職灰心乞盡撤還京專以邊務責將帥此今日修攘要務也不從及劉瑾得志斥磐為奸黨勒之歸瑾誅起河南僉事坐累罷珪以刑部主事陳鳳梧薦授桐鄉丞正德中歷贛州通判招降盜魁何積玉已復叛下珪獄尋釋之後以平盜功擢知州胡爟字仲光蕪湖人弘治六年進士改庶吉士授戶部主事十年三月災異求言爟應詔疏言中官李廣楊鵬引左道劉良輔輩惑亂聖聰濫設齋醮耗蠹國儲而不肖士大夫方昏暮乞憐於其門交通請託陰盛陽微災何由弭因極陳戚畹方士傳奉宂員之害疏留中未幾廣死故爟得無罪當成化時宦官用事孝宗嗣位雖間有罷黜而勢積重不能驟返忤之者必結黨排陷不勝不止前後庶僚以忤璫被陷者如弘治元年戶部員外郎周時從疏請置先朝遺奸汪直錢能蔡用輩於重典而察核兩京及四方鎮守中官諸宦官摘其奏中宗社字不越格命法司逮治已而釋之十三年秋大同有警命保國公朱暉禦之行人永清王雄極言暉不足任且請罷中官監督以重將權苗逵方督暉軍謂雄阻軍乃下詔獄謫雲南浪穹丞羅僑字維升吉水人性純靜寡嗜慾受業張元禎講學里中舉弘治十二年進士除新會知縣有惠愛正德初入為大理右評事五年四月京師旱霾上疏曰臣聞人道理則陰陽和政事失則災沴作頃因京師久旱陛下特沛德音釋逋戍之囚弛株連之禁而齋禱經旬雨澤尚滯臣竊以為天心仁愛未已也陛下視朝或至日昃狎侮羣小號呶達旦其何以承天心基大業乎文網日密誅求峻急盜賊白晝殺人百姓流移載道元氣索然科道知之而不敢言內閣言之而不敢盡此壅蔽之大患也古者進退大臣必有體貌黥劓之罪不上大夫邇來公卿去不以禮先朝忠藎如劉大夏者謫戍窮邊已及三載陛下置之不問非所以待耆舊敬大臣也本朝律例參酌古今足以懲奸而蔽罪近者法司承望風旨巧中善類傳曰賞僭則及淫人刑濫則及善人不幸而過寧僭無濫今之刑罰濫孰甚焉願陛下慎逸游屏玩好放棄小人召還舊德與在廷臣工宵旰圖治幷敕法司慎守成律即有律輕情重者亦必奏請裁決毋擅有輕重庶可上弭天變下收人心時朝士久以言為諱僑疏上自揣必死輿櫬待命劉瑾大怒矯中旨詰責數百言令廷臣議罪大學士李東陽力救得改原籍教職其秋瑾敗僑尋召復官引病去宸濠反王守仁起兵吉安僑首赴義世宗即位即家授台州知府建忠節祠祀方孝孺延布衣張尺詢民間疾苦歲時循行阡陌課農桑講明冠婚喪祭禮境內大治嘉靖二年舉行卓異都御史姚鏌上書訟僑曰人臣犯顏進諫自古為難曩八黨弄權逆瑾亂政廷臣結舌全軀自保而給事中劉評事羅僑殉國忘身發摘時弊幸存餘息遭遇聖朝謂宜顯加奬擢用厲具臣乃僑知台州知長沙使懷忠竭節之士淹於常調臣竊為朝廷惜之帝納其言擢僑廣東左參政僑辭部牒敦趣不得已之官踰年遂謝病歸僑敦行誼動則古人羅洪先居喪不廢講學僑以為非禮遺書責之其峭直如此葉釗字時勉豐城人弘治十五年進士除南京刑部主事獄囚久淹悉按法出之守備中官侵蘆洲判歸之民應天諸府災上荒政四事尋進員外郎武宗立應詔陳八事中言宣大被寇殺卒幾千人監督中官苗逵妄報首功宜召還候勘宦官典兵於古未見唐始用之而宗社丘墟我正統朝用之而鑾輿北狩自今軍務勿遣監督鎮守者亦宜撤還且國初宦官悉隸禮部秩不過四品職不過掃除今請仍隸之部易置司禮俾供雜役罷革東廠移為他署斯左右不得擅權而後天下可安也又乞召還劉大夏宥諫官戴銑等劉瑾怒坐斷獄詿誤逮下詔獄削籍歸講學西江瑾誅起禮部員外郎未聞命卒學者祀之石鼓書院時又有工部主事劉天麒者臨桂人釗同年進士分司呂梁奄人過者不為禮愬之瑾逮下詔獄謫貴州安莊驛丞卒嘉靖初復官予祭戴冠信陽人正德三年進士為戶部主事見寵倖日多廩祿多耗乃上疏極諫略曰古人理財務去宂食近京師勢要家子弟僮奴苟竊爵賞錦衣官屬數至萬餘次者繫籍勇士投充監局匠役不可數計皆國家蠹也歲漕四百萬宿有嬴餘近絀水旱所入不及前而歲支反過之計為此輩耗三之一陛下何忍以赤子膏血養無用之蠹乎兵貴精不貴多邊軍生長邊土習戰陣足以守禦今遇警輒發京軍而宣府調入京操之軍累經臣下論列堅不遣還不知陛下何樂於邊軍而不為關塞慮也天子藏富天下務鳩聚為帑藏是匹夫商賈計也逆瑾既敗所籍財產不歸有司而貯之豹房遂創新庫夫供御之物內有監局外有部司此庫何所用之疏入帝大怒貶廣東烏石驛丞嘉靖初起官歷山東提學副使以清介聞黃鞏字仲固莆田人弘治十八年進士正德中由德安推官入為刑部主事掌諸司奏牘歷職方武選郎中十四年三月有詔南巡鞏上疏曰陛下臨御以來祖宗之綱紀法度一壞於逆瑾再壞於佞倖又再壞於邊帥蓋蕩然無餘矣天下知有權臣不知有天子亂本已成禍變將起試舉當今最急者陳之一崇正學臣聞聖人主靜君子慎動陛下盤遊無度流連忘反動亦過矣臣願陛下高拱九重凝神定慮屏紛華斥異端遠佞人延故老訪忠良可以涵養氣質薰陶德性而聖學維新聖政自舉二通言路言路者國家之命脈也古者明王導人以言用其言而顯其身今則不然臣僚言及時政者左右匿不以聞或事關權臣則留中不出而中傷以他事使其不以言獲罪而以他事獲罪由是雖有安民長策謀國至計無因自達雖必亂之事不軌之臣陛下亦何由知臣願廣開言路勿罪其出位勿責其沽名將忠言日進聰明日廣亂臣賊子亦有所畏而不敢肆矣三正名號陛下無故降稱大將軍太師鎮國公遠近傳聞莫不驚嘆如此則誰為天子者天下不以天子事陛下而以將軍事陛下天下皆為將軍之臣矣今不削去諸名號昭上下之分則體統不正朝廷不尊古之天子亦有號稱獨夫求為匹夫而不得者竊為陛下懼焉四戒遊幸陛下始時遊戲不出大庭馳逐止於南內論者猶謂不可既而幸宣府矣幸大同矣幸太原榆林矣所至費財動衆郡縣騷然至使民間夫婦不相保陛下為民父母何忍使至此極也近復有南巡之命南方之民爭先挈妻子避去流離奔踣怨讟煩興今江淮大饑父子兄弟相食天時人事如此陛下又重蹙之幾何不流為盜賊也奸雄窺伺待時而發變生在內則欲歸無路變生在外則望救無及陛下斯時悔之晚矣彼居位大臣用事中官親暱羣小夫豈有毫髮愛陛下之心哉皆欲陛下遠出而後得以擅權自恣乘機為利也其不然則亦袖手旁觀如秦越人不相休戚也陛下宜翻然悔悟下哀痛罪己之詔罷南巡撤宣府離宮示不復出發內帑以振江淮散邊軍以歸卒伍雪已往之謬舉收既失之人心如是則尚可為也五去小人自古未有小人用事不亡國喪身者也今之小人簸弄威權貪溺富貴者實繁有徒至於首開邊事以兵為戲使陛下勞天下之力竭四海之財傷百姓之心者則江彬之為也彬行伍庸流兇狠傲誕無人臣禮臣但見其有可誅之罪不聞其有可賞之功今乃賜以國姓封以伯爵託以心腹付以京營重寄使其外持兵柄內蓄逆謀以成騎虎之勢此必亂之道也天下切齒怒罵皆欲食彬之肉陛下亦何惜一彬不以謝天下哉六建儲貳陛下春秋漸高前星未耀祖宗社稷之託搖搖無所寄方且遠事觀遊屢犯不測收養義子布滿左右獨不能豫建親賢以承大業臣以為陛下殆倒置也伏望上告宗廟請命太后旁諏大臣擇宗室親賢者一人養於宮中以繫四海之望他日誕生皇子仍俾出藩實宗社無疆之福也員外郎陸震草疏將諫見鞏疏稱歎因毀己與鞏連署以進帝怒甚下二人詔獄復跪午門衆謂天子且出鞏曰天子出吾當牽裾死之跪五日期滿仍繫獄越二十餘日廷杖五十斥為民彬使人沿途刺鞏有治洪主事知而匿之間行得脫既歸潛心著述或米盡日中未爨晏如也嘗歎曰人生至公卿富貴矣然不過三四十年惟立身行道千載不朽世人顧往往以此易彼何也世宗立召為南京大理丞疏請稽古正學敬天勤民取則堯舜保全君子辨別小人明年入賀卒於京師行人張岳訟其直節贈大理少卿賜祭葬天啟初追諡忠裕陸震字汝亨蘭谿人受業同縣章懋以學行知名正德三年進士除泰和知縣時劉瑾擅政以逋鹽課責縣民償者連數百人震力白之上官得免鎮守中官歲徵貢絺為減其額增築學舍居諸生毀淫祠祀忠節浮糧累民稽賦籍得詭寄隱匿者萬五千石以補之建倉縣左儲穀待振親行鄉落勸課農桑立保伍法使民備盜甓城七里外為土城十里周之時發狼兵討賊所至擾民震言於總督令毋聽檥舟官具糧糗以次續食兵行肅然督捕永豐新淦賊以功受賞撫按交薦徵為兵部主事泰和人生祠之在部主諸司章奏與中人忤改巡紫荊諸關又以論都御史彭澤副使胡世寧無罪忤尚書王瓊陸完孝貞皇后崩武宗至自宣府既發喪數日復欲北出震抗疏曰日者昊天不弔威降大戚車駕在狩羣情惶惶陛下單騎衝雪還宮百官有司莫不感愴以為陛下前蔽而今明也乃者梓宮在殯遽擬遊巡臣知陛下之心必有慼然不安者且陛下即位十有二年矣十者干之終十有二者支之終當氣運周會正修德更新時顧乃營宣府以為居縱騎射以為樂此臣所深懼也古人君車馬遊畋之好雖或有之至若以外為主以家為客挈天下大器賞罰大柄付之於人漠然不關意念此古今所絕無者伏望勉終喪制深戒盤遊不報進武選員外郎已偕黃鞏諫南巡遂下詔獄獄中與鞏講易九卦明憂患之道同繫者率處分後事震獨無一言既杖創甚作書與諸子吾雖死汝等當勉為忠孝吾筆亂神不亂也遂卒世宗立贈太常少卿予祭方震等繫獄江彬必欲致之死絕其飲食震季子體仁年十五變服為他囚親屬職納饘焉後有詔錄一子官諸兄讓體仁為漳州通判有政聲孫可教由進士歷南京禮部侍郎夏良勝字于中南城人少為督學副使蔡清所知曰子異日必為良臣當無有勝子者遂名良勝正德二年舉鄉試第一明年成進士授刑部主事調吏部進考功員外郎南巡詔下良勝具疏與禮部主事萬潮太常博士陳九川連署以進言方今東南之禍不獨江淮西北之憂近在輦轂廟祀之鬯位不可以久虛聖母之孝養不可以曠宮壼之孕祥尚可以早圖機務之繁重未可以盡委鎮國之號傳聞海內恐生覬覦之階邊將之屬納於禁近詎忘肘腋之患巡遊不已臣等將不知死所矣時舒芬黃鞏陸震疏已前入吏部郎中張衍瑞等十四人刑部郎中陸俸等五十三人繼之禮部郎中姜龍等十六人兵部郎中孫鳳等十六人又繼之而醫士徐鏊亦以其術諫略言養身之道猶置燭然室閉之則堅風暴之則淚陛下輕萬乘習嬉娛躍馬操弓捕魚玩獸邇復不憚遠遊冒寒暑涉關河饍飲不調餚無擇誠非養生道也況南方卑濕尤易致病乞念宗廟社稷之重勿事鞍馬勿過醉飽喜無傷心怒無傷肝慾無傷腎勞無傷脾就密室之安違暴風之禍臣不勝至願諸疏既入帝與諸倖臣皆大怒遂下良勝潮九川鞏震鏊詔獄芬及衍瑞等百有七人罰跪午門外五日而大理寺正周等十人行人司副余廷瓚等二十人工部主事林大輅何遵蔣山卿連名疏相繼上帝益怒並下詔獄俄令廷瓚大輅等與良勝等六人俱跪闕下五日加梏拲焉至晚仍繫獄諸臣晨入暮出纍纍若重囚道途觀者無不泣下而廷臣自大學士楊廷和戶部尚書石玠疏救外莫有言者士民咸憤爭擲瓦礫詬詈之諸大臣皆恐入朝不待辨色請下詔禁言事者通政司遂格不受疏是時天連曀晝晦禁苑南海子水涌四尺餘橋下七鐵柱皆折如斬金吾衞都指揮僉事張英曰此變徵也駕出必不利乃肉袒戟刃於胸囊土數升持諫疏當蹕道跪哭即自刺其胸血流滿地衞士奪其刃縛送詔獄問囊土何為曰恐污帝廷灑土掩血耳詔杖之八十遂死芬等百有七人跪既畢杖各三十以芬衍瑞俸龍鳳為倡首謫於外餘奪俸半歲良勝等六人及廷瓚大輅各杖五十餘三十人四十鞏震良勝潮九川除名他貶黜有差鏊戍邊而車駕亦不復出矣良勝既歸講授生徒世宗立召復故官尚書喬宇賢之奏為文選郎中公廉多所振拔大禮議起數偕僚長力爭及席書張璁桂萼方獻夫用中旨超擢又執不可由是為議禮者所切齒以久次遷南京太常少卿未赴外轉給事中陳洸上書傅會張璁等議斥良勝與尚書宇等羣結朋黨任情擠排遂謫良勝茶陵知州及明倫大典成詔責前郎中良勝脅持庶官釀禍特深黜為民初良勝輯其部中章奏名曰銓司存凡議禮諸疏具在為讐家所發再下獄論杖當贖特旨謫戍遼東三萬衞踰五年卒於戍所穆宗立贈太常卿舒芬等自有傳萬潮字汝信進賢人正德六年進士由寧國推官入為儀制主事與芬良勝九川稱江西四諫世宗立起故官歷浙江提學副使久之遷參政以忤權貴調廣西屢遷陝西左布政使右副都御史巡撫延綏所至著聲陳九川字惟濬臨川人正德九年進士從王守仁遊尋授太常博士既削籍復從守仁卒業世宗嗣位召復故官再遷主客郎中正貢獻名物節貢使犒賞費數萬會天方國貢玉石九川簡去其不堪者所求蟒衣不為奏覆復怒罵通事胡士紳等士紳恚假番人詞訐九川及會同館主事陳邦偁帝怒下二人詔獄而是時張璁桂萼欲傾費宏奪其位乃屬士紳再訐九川盜貢玉饋宏製帶詞連兵部郎中張錦衣指揮張潮等帝益怒幷下等詔獄指揮駱安請攝士紳質訊給事中解一貫等亦以為言帝不許獄成九川戍鎮海衞邦偁等削籍有差久之遇赦放還卒張衍瑞字元承汲人弘治十八年進士為清豐知縣以執法忤劉瑾逮下詔獄幾死瑾誅得釋官吏部文選郎中既杖謫平陽同知嘉靖初召還擢太常少卿尋卒贈太僕卿姜龍太倉人見父昂傳孫鳳洛陽人陸俸吳縣人周九谿衞人林大輅莆田人蔣山卿儀真人皆由進士山卿遊顧璘門以詩名於時既杖鳳俸並謫府同知縣丞大輅州判官山卿前府都事世宗立悉召復故官鳳終副使俸知府工部尚書大輅右副都御史巡撫湖廣山卿廣西參政徐鏊嘉定人本高氏子少孤依舅京師冒徐姓從其業為醫供事內殿既杖謫戍烏撒世宗即位召還尋擢御醫鏊性耿介時朝士多新貴不知鏊鏊亦不言前事一官垂三十年不調年七十求致仕值同縣徐學謨為禮部郎中引見尚書吳山山閱牘有諫南巡事瞿然曰此武廟時徐先生耶何淹也兩侍郎嫌其老學謨抗聲曰鏊雖老然少與舒狀元同患難為可敬耳又久之始遷院判自引歸卒年八十三時同受杖者吏部則姚繼巖行人則陶滋巴思明李錫顧可久鄧顯麒熊榮楊秦王懋黃國用李儼潘銳劉黻張岳大理寺則寺正金罍寺副孟庭柯張士鎬郝鳳升傅尚文郭五常評事姚如皐蔡時並謫官世宗立召還張英亦得贈官予祭授弟雄都指揮僉事姚繼巖南通州人張衍瑞同年生也當遷文選郎中讓衍瑞嘉靖初歷太常少卿伏闕爭大禮甘貧約遠權勢及卒不能成喪何遵字孟循江寧人家貧父命之賈不願也去為儒舉正德九年進士吏部尚書陸完聞其名使子弟從學及選臺諫遵引疾曰不可因人進也授工部主事榷木荊州下令稅自百金以下減三之一風濤敗貲者勿算入算者手實其數自識之藏於郡帑數日一會所入比去不私一錢帝將南巡以進香東嶽為詞遵抗言淫祠無福萬一宗藩中藉口奉迎潛懷不軌則福未降而禍已隨蓋指宸濠也諸權倖見疏遏勿進時黃鞏等已得罪遵復與同官林大輅蔣山卿上疏乞罷南巡極言江彬怙權倡亂鞏等無罪願特寬宥毋使後世有殺諫臣名帝怒下詔獄廷杖四十創甚肢體俱裂越二日遂卒年三十四家貧僚友助而殮之當遵草疏時家僮前抱持哭曰主縱不自計獨不念老親幼子乎遵執筆從容曰為我謝大人兒子勿令廢學足矣死之日其父方與家人祭墓歸有鳥悲鳴心異之或傳工部有以言獲罪者父長號曰遵死矣已而果然時先遵受杖死者刑部主事郾城劉校照磨汲人劉王玉與遵同死杖下者陸震而外大理評事長樂林公黼行人司副鄱陽余廷瓚行人盱眙李紹賢澤州孟陽玉山詹軾安陸劉概祥符李惠劉校字宗道性至孝母胡教子嚴偶不悅輒長跪請罪母悅乃起正德六年與詹軾劉概同舉進士授刑部主事迎父就養卒於途校奔赴抱屍痛哭幾絕面有塵以舌舐而拭之及起故官帝將南巡刑曹諫疏校所草也杖將死大呼曰校無恨恨不見老母耳子元婁年十一哭於旁校曰爾讀書不多獨不識事君致身義乎善事祖母及母毋媿而父遂絕劉王玉由貢士林公黼字質夫父母喪三年蔬粥不入內正德十二年與李紹賢李惠同舉進士諸曹諫南巡者皆罰跪闕前諸奸又日以危言恫喝聞者惴惴以故戶曹不敢出疏工曹諫者止三人獨大理闔署諫故帝怒加甚公黼夜草疏時聞暗中泣歎聲不顧比入獄黃鞏與語歎曰吾取友徧天下乃近遺質夫古人謂入險不驚殆斯人乎公黼體羸竟不勝杖而卒余廷瓚字伯獻與孟陽皆正德九年進士當禮兵二曹之進諫也廷瓚亦率其僚陳巡遊十不可通政司獨留之居數日諸曹已罰跪疏始上帝愈怒掠治尤嚴李紹賢字崇德嘗頒詔至徐州監倉中使席班首紹賢立命撤其席中使愕然去比逮繫見中官猶奴視之孟陽字子乾吏部侍郎春之子為行人久不遷或諷之見當路陽不可及是語諸僚此舉繫社稷安危一命之士皆與有憂豈必言官乃當効死父春前巡撫宣府有軍功忤中官張永罷歸聞子死諫哭之以詩語甚悲壯人爭傳之詹軾字敬之為人開爽磊落善談論從父瀚字汝約與公黼同舉進士時方為刑部主事亦以諫受杖軾死為經紀其喪以歸嘉靖中瀚爭大禮再受杖每陰雨創痛曰吾無媿敬之地下足矣積官刑部侍郎劉概字平甫李惠字德卿尚書鉞之子世宗立贈遵校尚寶卿王玉刑部主事公黼廷瓚太常丞紹賢御史各賜祭錄一子入國學其以創死稍後者禮部員外郎慈谿馮涇驗封郎中吳江王鑾行人昌黎王瀚馮涇字伯清與瀚皆正德九年進士涇以孝友稱既卒家貧不能還喪世宗立吏部以狀聞賜米二十斛命有司厚恤其家王鑾字汝和正德六年進士試政吏部為尚書楊一清所知擢文選主事朝夕扃戶人罕得見再遷驗封郎中被創踰年卒王瀚亦前卒世宗立贈御史賜祭當諸曹連章迭諫江彬怒甚陰屬典詔獄者重其杖以故諸臣多死哭聲徹禁掖帝亦為感動竟罷南巡諸臣之力也嘉靖初主事仵瑜上疏曰正德間給事御史挾勢凌人趨權擇便凡朝廷大闕失羣臣大奸惡緘口不言一時犯顏敢諍視死如歸或拷死闕廷或流竄邊塞皆郎中員外主事評事行人照磨庶吉士非有言責者張英本一武夫抗言就死行道悲傷今幸聖皇御極褒恤忠良諸給事御史更何顏復立清明之朝請加黜罰以示創懲章下吏部瑜後以爭大禮杖死自有傳贊曰李文祥孫磐甫釋褐觀政未列庶位胡爟以下率諸曹尚書郎或散卑末非司風憲當言路以諫諍為盡職也抗言極論竄謫接踵而來者愈多死相枕籍而赴蹈恐後其抵觸權倖指斥乘輿皆切於安危之至計若張英陷胸以悟主徐鏊託術以諷諭誠心出於忠愛抑尤人所難能者矣
