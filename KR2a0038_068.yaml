body:
  text: 明史卷六十八志第四十四輿服四皇帝寶璽皇后冊寶皇妃以下冊印皇太子冊寶皇太子妃冊寶親王以下冊寶冊印鐵券印信符節宮室制度臣庶室屋制度器用明初寶璽十七其大者曰皇帝奉天之寶曰皇帝之寶曰皇帝行寶曰皇帝信寶曰天子之寶曰天子行寶曰天子信寶曰制誥之寶曰敕命之寶曰廣運之寶曰皇帝尊親之寶曰皇帝親親之寶曰敬天勤民之寶又有御前之寶表章經史之寶及欽文之璽丹符出驗四方洪武元年欲制寶璽有賈胡浮海獻美玉曰此出于闐祖父相傳當為帝王寶璽乃命製為寶不知十七寶中此玉製何寶也成祖又製皇帝親親之寶皇帝奉天之寶誥命之寶敕命之寶弘治十三年鄠縣民毛志學於泥河濱得玉璽其文曰受命於天既壽永昌色白微青螭紐陝西巡撫熊翀以為秦璽復出遣人獻之禮部尚書傅瀚言自有秦璽以來歷代得喪真偽之跡具載史籍今所進篆文與輟耕錄等書摹載魚鳥篆文不同其螭紐又與史傳所紀文盤五龍螭缺一角旁刻魏錄者不類蓋秦璽亡已久今所進與宋元所得疑皆後世摹秦璽而刻之者竊惟璽之用以識文書防詐偽非以為寶玩也自秦始皇得藍田玉以為璽漢以後傳用之自是巧爭力取謂得此乃足以受命而不知受命以德不以璽也故求之不得則偽造以欺人得之則君臣色喜以誇示於天下是皆貽笑千載我高皇帝自制一代之璽文各有義隨事而施真足以為一代受命之符而垂法萬世何藉此璽哉帝從其言却而不用嘉靖十八年新製七寶曰奉天承運大明天子寶大明受命之寶巡狩天下之寶垂訓之寶命德之寶討罪安民之寶敕正萬民之寶與國初寶璽共為御寶二十四尚寶司官掌之皇后之冊用金冊二片依周尺長一尺二寸廣五寸厚二分五釐字依數分行鐫以真書上下有孔聯以紅縧開闔如書帙藉以紅錦褥冊盝用木飾以渾金瀝粉蟠龍紅紵絲襯𩹉內以紅羅銷金小袱裹冊外以紅羅銷金夾袱包之五色小絛縈於外寶用金龜紐篆文曰皇后之寶依周尺方五寸九分厚一寸七分寶池用金闊取容寶篋二副一置寶一置寶池每副三重外篋用木飾以渾金瀝粉蟠龍紅紵絲襯𩹉中篋用金鈒蟠龍內小篋飾如外篋內置寶座四角雕蟠龍飾以渾金座上用錦褥以銷金紅羅小夾袱裹寶其篋外各用紅羅銷金大夾袱覆之臨冊之日冊寶俱置於紅髹輿案案頂有紅羅瀝水用擔牀舉之皇貴妃而下有冊無寶而有印妃冊用鍍金銀冊二片廣長與后冊同冊盝飾以渾金瀝粉蟠鳳其印用金龜紐尺寸與諸王寶同文曰皇妃之印篋飾以蟠鳳宣德元年帝以貴妃孫氏有容德特請於皇太后製金寶賜之未幾即誕皇嗣自是貴妃授寶遂為故事嘉靖十年立九嬪冊用銀殺皇妃五分之一以金飾之皇太子冊寶冊用金二片其制及盝篋之飾與皇后冊同寶用金龜紐篆書皇太子寶其制及池篋之飾與后寶同皇太子妃冊寶其冊用金兩葉重百兩每葉高一尺二寸廣五寸藉冊以錦聯冊以紅絲絛墊冊以錦褥裹冊以紅羅銷金袱其盝飾以渾金瀝粉雲鳳內有花銀釘鉸嵌金絲鐵筦籥外以紅羅銷金袱覆之其金寶之制未詳洪武二十八年更定止授金冊不用寶親王冊寶冊制與皇太子同其寶用金龜紐依周尺方五寸二分厚一寸五分文曰某王之寶池篋之飾與皇太子寶同寶盝之飾則雕蟠螭親王妃冊印其金冊高視太子妃冊減一寸餘制悉同冊文視親王其金印之制未詳洪武二十八年更定止授金冊公主冊印銀冊二片鐫字鍍金藉以紅錦褥冊盝飾以渾金瀝粉蟠螭其印同宋制用金龜紐文曰某國公主之印方五寸二分厚一寸五分印池用金廣取容印外篋用木飾以渾金瀝粉盤鳳中篋用金鈒蟠鳳內小篋飾如外篋親王世子金冊金寶承襲止授金冊傳用金寶世子妃亦用金冊洪武二十三年鑄世子妃印制視王妃金印龜紐篆文曰某世子妃印郡王鍍金銀冊鍍金銀印冊文視世子其妃止有鍍金銀冊功臣鐵券洪武二年太祖欲封功臣議為鐵券而未有定制或言台州民錢允一有家藏吳越王鏐唐賜鐵券遂遣使取之因其式而損益焉其制如瓦第為七等公二等一高尺廣一尺六寸五分一高九寸五分廣一尺六寸侯三等一高九寸廣一尺五寸五分一高八寸五分廣一尺五寸一高八寸廣一尺四寸五分伯二等一高七寸五分廣一尺三寸五分一高六寸五分廣一尺二寸五分外刻履歷恩數之詳以記其功中鐫免罪減祿之數以防其過字嵌以金凡九十七副各分左右左頒功臣右藏內府有故則合之以取信焉三年大封功臣公六人侯二十八人並賜鐵券公李善長徐達李文忠馮勝鄧愈常茂侯湯和唐勝宗陸仲亨周德興華雲龍顧時耿炳文陳德郭子興王志鄭遇春費聚吳良吳楨趙庸廖永忠俞通源華高楊璟康鐸朱亮祖傅友德胡美韓政黃彬曹良臣梅思祖陸聚二十五年改製鐵券賜公傅友德侯王弼耿炳文郭英及故公徐達李文忠侯吳傑沐英凡八家永樂初靖難功臣亦有賜者百官印信洪武初鑄印局鑄中外諸司印信正一品銀印三臺方三寸四分厚一寸六部都察院並在外各都司俱正二品銀印二臺方三寸二分厚八分其餘正二品從二品官銀印二臺方三寸一分厚七分惟衍聖公以正二品三臺銀印則景泰三年賜也順天應天二府俱正三品銀印方二寸九分厚六分五釐其餘正三品從三品官俱銅印方二寸七分厚六分惟太僕光祿寺並在外鹽運司俱從三品銅印方減一分厚減五釐正四品從四品俱銅印方二寸五分厚五分正五品從五品俱銅印方二寸四分厚四分五釐惟在外各州從五品銅印方減一分厚減五釐正六品從六品俱銅印方二寸二分厚三分五釐正七品從七品銅印方二寸一分厚三分正從八品俱銅印方二寸厚二分五釐正從九品俱銅印方一寸九分厚二分二釐未入流者銅條記闊一寸三分長二寸五分厚二分一釐以上俱直紐九疊篆文初雜職亦方印至洪武十三年始改條記凡百官之印惟文淵閣銀印直紐方一寸七分厚六分玉箸篆文誠重之也武臣受重寄者征西鎮朔平蠻諸將軍銀印虎紐方三寸三分厚九分柳葉篆文洪武中嘗用上公佩將軍印後以公侯伯及都督充總兵官名曰掛印將軍有事征伐則命總兵佩印以往旋師則上所佩印於朝此外惟漕運總兵印同將軍其在外鎮守總兵參將掛印則洪熙元年始也有文臣掛將軍印者王驥以兵部尚書征湖貴苗掛平蠻將軍印王越以左都御史守大同掛征西將軍印其他文武大臣有領敕而權重者或給以銅關防直紐廣一寸九分五釐長二寸九分厚三分九疊篆文雖宰相行邊與部曹無異惟正德時張永征安化王用金鑄嘉靖中顧鼎臣居守用牙鏤關防皆特賜也初太祖重御史之職分河南等十三道每道鑄二印文曰繩愆糾繆守院御史掌其一其一藏內府有事則受以出復命則納之洪武二十三年都御史袁泰言各道印篆相類乃命改製某道監察御史其奉差者則曰巡按某處監察御史銅印直紐有眼方一寸五分厚三分八疊篆文成祖初幸北京有一官署二三印者夏原吉至兼掌九卿印諸曹並於朝房取裁其任重矣明初賜高麗金印龜紐方三寸文曰高麗國王之印賜安南鍍金銀印駝紐方三寸文曰安南國王之印賜占城鍍金銀印駝紐方三寸文曰占城國王之印賜吐蕃金印駝紐方五寸文曰白蘭王印符牌凡宣召親王必遣官齎金符以往親王之藩及鎮守巡撫諸官奏請符驗俱從兵部奏行尚寶司領之洪武二十六年定制凡公差以軍情重務及奉旨差遣給驛者兵部既給勘合即赴內府關領符驗給驛而去事竣則繳嘉靖三十七年定制南京鳳陽守備內外官並各處鎮守總兵巡撫及各守一方不受鎮守節制內外守備並領符驗奏事凡監鎗整飭兵備並一城一堡守備官不許關領符驗其制上織船馬之狀起馬者用馬字號起船者水字號起雙馬者達字號起單馬者通字號起站船者信字號洪武四年始製用寶金牌凡軍機文書自都督府中書省長官而外不許擅奏有詔調軍中書省同都督府覆奏乃各出所藏金牌入請用寶又造軍中調發符牌用鐵長五寸闊半之上鈒二飛龍下鈒二麒麟首為圜竅貫以紅絲絛嘗遣官齎金牌信符詣西番以茶易馬其牌四十一上號藏內府下號降各番篆文曰皇帝聖旨左曰合當差發右曰不信者斬二十二年又頒西番金牌信符其後番官發塞皆齎原降牌符而至永樂二年製信符金字紅牌給雲南諸蠻凡歷代改元則所頒外國信符金牌必更鑄新年號給之此符信之達於四裔者也其武臣懸帶金牌則洪武四年所造闊二寸長一尺上鈒雙龍下鈒二伏虎牌首尾為圓竅貫以紅絲絛指揮佩金牌雙雲龍雙虎符千戶佩鍍金銀牌獨雲龍獨虎符百戶素雲銀牌符太祖親為文鈒之曰上天祐民朕乃率撫威加華夏實憑虎臣賜爾金符永傳後嗣天子祀郊廟若視學耤田勳衞扈從及公侯駙馬五府都督日直錦衣衞當直及都督率諸衞千百戶夜巡內皇城金吾諸衞各輪官隨朝巡綽俱給金牌有龍者虎者麒麟者獅者雲者以官為差其扈駕金字銀牌則洪武六年所造尋改為守衞金牌以銅為之塗以金高一尺闊三寸分字號凡五仁字號上鈒獨龍蟠雲花公侯伯都督佩之義字號鈒伏虎盤雲花指揮佩之禮字號鈒獬豸蟠雲花千戶衞鎮撫佩之智字號鈒獅子蟠雲花百戶所鎮撫佩之信字號鈒蟠雲花將軍佩之牌下鑄守衞二篆字背鑄凡守衞官軍懸帶此牌等二十四字牌首竅貫青絲鎮撫及將軍隨駕直宿衞者佩之下直則納之凡夜巡官於尚寶司領令牌禁城各門金吾等衞指揮千戶分領申字號牌午門自一至四長安左右門東華門自五至八西華門自九至十二玄武門自十三至十六五城兵馬指揮亦日領令牌東西南北中城分領木金火水土五字號留守五衞巡城官並金吾等衞守衞官俱領銅符留守衞指揮所領承字及東西北字號牌俱左半字陽文左比金吾等衞端門承天門東西北安門指揮千戶所領承字及東西北字號俱右半字陰文右比銅符字號比對相同方許巡行內官內使之出亦須守門官比對銅符而後行皇城九門守衞軍與圍子手各領勇字號銅牌錦衣校尉上直及光祿寺吏典廚役遇大祀俱佩雙魚銅牌永樂六年駕幸北京扈從官俱帶牙牌五府六部都察院大理寺錦衣衞各鑄印信通政司鴻臚寺各鑄關防謂之行在衙門印信關防其後命內府印綬監收貯嘉靖十八年南巡禮部領出以給扈從者焉凡郊廟諸祭陪祀供事官及執事者入壇俱領牙牌洪武八年始也圓花牌陪祀官領之長花牌供事官領之長素牌執事人領之又謂之祀牌凡駕詣陵寢扈從官俱於尚寶司領小牙牌嘉靖九年皇后行親蠶禮文官四品以上武官三品以上命婦及使人俱於尚寶司領牙牌有雲花圜牌鳥形長牌之異凡文武朝參官錦衣衞當駕官亦領牙牌以防姦偽洪武十一年始也其制以象牙為之刻官職於上不佩則門者却之私相借者論如律牙牌字號公侯伯以勳字駙馬都尉以親字文官以文字武官以武字教坊官以樂字入內官以官字正德十六年禮科邢寰言牙牌惟常朝職官得懸比來權姦侵柄傳旨升官者輒佩牙牌宜清核以重名器乃命文職不朝參者毋得濫給牙牌武官進御侍班佩刀執金爐者給與嘉靖二十八年內府供事匠作武職官皆帶朝參牙牌嘗奉旨革奪旋復給之給事中陳邦修以為言禮部覆奏會典所載文武官出入禁門帶牙牌有執事供事朝參之別執事供事者皆届期而領如期而繳惟朝參牙牌得朝夕懸之非徒為關防之具亦以示等威之辨也虛銜帶俸供事執事者不宜概領第出入禁闥若一切革奪何由譏察尚寶司所貯舊牌數百上有入內府字號請以給之至於衞所武官掌印僉書侍衞之外非屬朝參供役者盡革奪之其納粟填註冒賜牙牌及罷退閑住官舊所關領不繳者俱逮問報可洪武十五年製使節黃色三簷寶蓋長二尺黃紗袋籠之又製丹漆架一以節置其上使者受命則載以行使歸則持之以復命二十三年詔考定使節之制禮部奏漢光武時以竹為節柄長八尺其毛三重而黃公紹韻會註漢節柄長三尺毛三重以旄牛為之詔從三尺之制宮室之制吳元年作新內正殿曰奉天殿後曰華蓋殿又後曰謹身殿皆翼以廊廡奉天殿之前曰奉天門殿左曰文樓右曰武樓謹身殿之後為宮前曰乾清後曰坤寧六宮以次列宮殿之外周以皇城城之門南曰午門東曰東華西曰西華北曰玄武時有言瑞州文石可甃地者太祖曰敦崇儉樸猶恐習於奢華爾乃導予奢麗乎言者慚而退洪武八年改建大內宮殿十年告成闕門曰午門翼以兩觀中三門東西為左右掖門午門內曰奉天門門內奉天殿嘗御以受朝賀者也門左右為東西角門奉天殿左右門左曰中左右曰中右兩廡之間左曰文樓右曰武樓奉天殿之後曰華蓋殿華蓋殿之後曰謹身殿殿後則乾清宮之正門也奉天門外兩廡間有門左曰左順右曰右順左順門外有殿曰文華為東宮視事之所右順門外有殿曰武英為皇帝齋戒時所居制度如舊規模益宏二十五年改建大內金水橋又建端門承天門樓各五間及長安東西二門永樂十五年作西宮於北京中為奉天殿側為左右二殿南為奉天門左右為東西角門其南為午門又南為承天門殿北有後殿涼殿煖殿及仁壽景福仁和萬春永壽長春等宮凡為屋千六百三十餘楹十八年建北京凡宮殿門闕規制悉如南京壯麗過之中朝曰奉天殿通為屋八千三百五十楹殿左曰中左門右曰中右門丹墀東曰文樓西曰武樓南曰奉天門常朝所御也左曰東角門右曰西角門東廡曰左順門西廡曰右順門正南曰午門中三門翼以兩觀觀各有樓左曰左掖門右曰右掖門午門左稍南曰闕左門曰神廚門內為太廟右稍南曰闕右門曰社左門內為太社稷又正南曰端門東曰廟街門即太廟右門也西曰社街門即太社稷壇南左門也又正南曰承天門又折而東曰長安左門折而西曰長安右門東後曰東安門西後曰西安門北後曰北安門正南曰大明門中為馳道東西長廊各千步奉天殿之後曰華蓋殿又後曰謹身殿謹身殿左曰後左門右曰後右門正北曰乾清門內為乾清宮是曰正寢後曰交泰殿又後曰坤寧宮為中宮所居東曰仁壽宮西曰清寧宮以奉太后左順門之東曰文華殿右順門之西曰武英殿文華殿東南曰東華門武英殿西南曰西華門坤寧宮後曰坤寧門門之後曰玄武門其他宮殿名號繁多不能盡列所謂千門萬戶也皇城內宮城外凡十有二門曰東上門東上北門東上南門東中門西上門西上北門西上南門西中門北上門北上東門北上西門北中門復於皇城東南建皇太孫宮東安門外東南建十王街宣宗留意文雅建廣寒清暑二殿及東西瓊島游觀所至悉置經籍正統六年重建三殿嘉靖中於清寧宮後地建慈慶宮於仁壽宮故基建慈寧宮三十六年三殿門樓災帝以殿名奉天非題扁所宜用敕禮部議之部臣會議言皇祖肇造之初名曰奉天者昭揭以示虔爾既以名則是昊天監臨儼然在上臨御之際坐以視朝似未安也今乃修復之始宜更定以答天庥明年重建奉天門更名曰大朝門四十一年更名奉天殿曰皇極華蓋殿曰中極謹身殿曰建極文樓曰文昭閣武樓曰武成閣左順門曰會極右順門曰歸極大朝門曰皇極東角門曰弘政西角門曰宣治又改乾清宮右小閣名曰道心旁左門曰仁蕩右門曰義平世宗初墾西苑隙地為田建殿曰無逸亭曰豳風又建亭曰省耕曰省斂每歲耕穫帝輒臨觀十三年西苑河東亭榭成親定名曰天鵝房北曰飛靄亭迎翠殿前曰浮香亭寶月亭前曰秋輝亭昭和殿前曰澄淵亭後曰臺坡臨漪亭前曰水雲榭西苑門外二亭曰左臨海亭右臨海亭北閘口曰湧玉亭河之東曰聚景亭改呂梁洪之亭曰呂梁前曰檥金亭翠玉館前曰擷秀亭親王府制洪武四年定城高二丈九尺正殿基高六尺九寸正門前後殿四門城樓飾以青綠點金廊房飾以青黛四城正門以丹漆金塗銅釘宮殿窠栱攢頂中畫蟠螭飾以金邊畫八吉祥花前後殿座用紅漆金蟠螭帳用紅銷金蟠螭座後壁則畫蟠螭彩雲後改為龍立山川社稷宗廟於王城內七年定親王所居殿前曰承運中曰圜殿後曰存心四城門南曰端禮北曰廣智東曰體仁西曰遵義太祖曰使諸王覩名思義以藩屏帝室九年定親王宮殿門廡及城門樓皆覆以青色琉璃瓦又命中書省臣惟親王宮得飾朱紅大青綠其他居室止飾丹碧十二年諸王府告成其制中曰承運殿十一間後為圜殿次曰存心殿各九間承運殿兩廡為左右二殿自存心承運周迴兩廡至承運門為屋百三十八間殿後為前中後三宮各九間宮門兩廂等室九十九間王城之外周垣四門堂庫等室在其間凡為宮殿室屋八百間有奇弘治八年更定王府之制頗有所增損郡王府制天順四年定門樓廳廂廚庫米倉等共數十間而已公主府第洪武五年禮部言唐宋公主視正一品府第並用正一品制度今擬公主第廳堂九間十一架施花樣獸脊梁棟斗栱簷桷彩色繪飾惟不用金正門五間七架大門綠油銅環石礎牆甎鐫鑿玲瓏花樣從之百官第宅明初禁官民房屋不許雕刻古帝后聖賢人物及日月龍鳳狻猊麒麟犀象之形凡官員任滿致仕與見任同其父祖有官身歿子孫許居父祖房舍洪武二十六年定制官員營造房屋不許歇山轉角重簷重栱及繪藻井惟樓居重簷不禁公侯前廳七間兩厦九架中堂七間九架後堂七間七架門三間五架用金漆及獸面錫環家廟三間五架覆以黑板瓦脊用花樣瓦獸梁棟斗栱簷桷綵繪飾門窗枋柱金漆飾廊廡庖庫從屋不得過五間七架一品二品廳堂五間九架屋脊用瓦獸梁棟斗栱簷桷青碧繪飾門三間五架綠油獸面錫環三品至五品廳堂五間七架屋脊用瓦獸梁棟簷桷青碧繪飾門三間三架黑油錫環六品至九品廳堂三間七架梁棟飾以土黃門一間三架黑門鐵環品官房舍門窗戶牖不得用丹漆功臣宅舍之後留空地十丈左右皆五丈不許那移軍民居止更不許於宅前後左右多占地構亭館開池塘以資遊眺三十五年申明禁制一品三品廳堂各七間六品至九品廳堂梁棟祇用粉青飾之庶民廬舍洪武二十六年定制不過三間五架不許用斗栱飾彩色三十五年復申禁飭不許造九五間數房屋雖至一二十所隨其物力但不許過三間正統十二年令稍變通之庶民房屋架多而間少者不在禁限器用之禁洪武二十六年定公侯一品二品酒注酒盞金餘用銀三品至五品酒注銀酒盞金六品至九品酒注酒盞銀餘皆甆漆木器不許用硃紅及抹金描金雕琢龍鳳文庶民酒注錫酒盞銀餘用甆漆百官牀面屏風槅子雜色漆飾不許雕刻龍文並金飾朱漆軍官軍士弓矢黑漆弓袋箭囊不許用朱漆描金裝飾建文四年申飭官民不許僭用金酒爵其椅棹木器亦不許朱紅金飾正德十六年定一品二品器皿不用玉止許用金商賈技藝家器皿不許用銀餘與庶民同
