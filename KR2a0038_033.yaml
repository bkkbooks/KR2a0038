body:
  text: 明史卷三十三志第九曆三大統曆法一下法原日月五星平立定三差太陽盈縮平立定三差之原冬至前後盈初縮末限八十八日九十一刻就整離為六段每段各得一十四日八十二刻就整各段實測日躔度數與平行相較以為積差積日積差第一段一十四日八二七千五十八分二五第二段二十九日六四一萬二千九百七十六三九二第三段四十四日四六一萬七千六百九十三七四六二第四段五十九日二八二萬一千一百四十八七三二八第五段七十四日一二萬三千二百七十九九九七第六段八十八日九二二萬四千二十六一八四各置其段積差以其段積日除之為各段日平差置各段日平差與後段日平差相減為一差置一差與後段一差相減為二差日平差一差二差第一段四百七十六分二五三十八分四五一分三八第二段四百三十七分八三十九分八三一分三八第三段三百九十七分九七四十一分二一一分三八第四段三百五十六分七六四十二分五九一分三八第五段三百一十四分一七四十三分九七第六段二百七十分二置第一段日平差四百七十六分二十五秒為泛平積以第二段二差一分三十八秒去減第一段一差三十八分四十五秒餘三十七分七秒為泛平積差另置第一段二差一分三十八秒折半得六十九秒為泛立積差以泛平積差三十七分七秒加入泛平積四百七十六分二十五秒共得五百一十三分三十二秒為定差以泛立積差六十九秒去減泛平積差三十七分七秒餘三十六分三十八秒為實以段日一十四日八十二刻為法除之得二分四十六秒為平差置泛立積差六十九秒為實以段日為法除二次得三十一微為立差夏至前後縮初盈末限九十三日七十一刻就整離為六段每段各得一十五日六十二刻就整各段實測日躔度數與平行相較以為積差積日積差第一段一十五日六二七千五十八分九九四第二段三十一日二四一萬二千九百七十八六五八第三段四十六日八六一萬七千六百九十六六七九第四段六十二日四八二萬一千一百五十七二九六第五段七十八日一二萬三千二百七十八四八六第六段九十三日七二二萬四千百一十七六二四四推日平差一差二差術與盈初縮末同日平差一差二差第一段四百五十一分九二三十六分四七一分三三第二段四百一十五分四五三十七分八一分三三第三段三百七十七分六五三十九分一二一分三三第四段三百三十八分五二四十分四六一分三三第五段二百九十八分六四十一分七九第六段二百五十六分二七置第一段日平差四百五十一分九十二秒為泛平積以第一段二差一分三十三秒去減第一段一差三十六分四十七秒餘三十五分一十四秒為泛平積差另置第一段二差一分三十三秒折半得六十六秒五十微為泛立積差以泛平積差三十五分一十四秒入泛平積四百五十一分九十二秒共四百八十七分六秒為定差以泛立積差六十六秒五十微去減泛平差三十五分一十四秒餘三十四分四十七秒五十微為實以段日一十五日六二為法除之得二分二十一秒為平差置泛立積差六十六秒五十微為實以段日為法除二次得二十七微為立差凡求盈縮以入曆初末日乘立差得數以加平差再以初末日乘之得數以減定差餘數以初末日乘之為盈縮積凡盈曆以八十八日九九二二五為限縮曆以九十三日七一二二五為限在其限已下為初以上轉減半歲周餘為末盈初是從冬至後順推縮末是從冬至前逆溯其距冬至同故其盈積同縮初是從夏至後順推盈末是從夏至前逆溯其距夏至同故其縮積同盈縮招差圖定差實一一一限一二二四二限一三二六三九三限一四二八三十四十四限二六一五二一三十四二五草五限十五十五三一六二十三十四草五三六十六限二八四十六三四四一七二十三草四草五十六十七十七限四一八五二九三四五六一八二十三草四十五四六十七十八十八限六四二十八六四三四五六七八一九二十三草四十五十六十七十八十九十九限八七六五四三二一定差平立平立平立平立平立平立平立平立平立法差差差差差差差差差差差差差差差差差差盈縮招差圖説盈縮招差本為一象限之法如盈曆則以八十八日九十一刻為象限縮曆則以九十三日七十一刻為象限今止作九限者舉此為例也其空格九行定差本數為實也其斜線以上平差立差之數為法也斜線以下空格之定差乃餘實也假如定差為一萬平差為一百立差為單一今求九限法以九限乘定差得九萬為實另置平差以九限乘二次得八千一百置立差以九限乘三次得七百二十九並兩數得八千八百二十九為法以法減實餘八萬一千一百七十一為九限積又法以九限乘平差得九百又以九限乘立差二次得八十一並兩數得九百八十一為法定差一萬為實以法減實餘九千零一十九即九限末位所書之定差也於是再以九限乘餘實得八萬一千一百七十一為九限積與前所得同蓋前法是先乘後減又法是先減後乘其理一也按授時曆於七政盈縮並以垛積招差立算其法巧合天行與西人用小輪推步之法殊途同歸然世所傳九章諸書不載其術曆草載其術而不言其故宣城梅文鼎為之圖解於平差立差之理垛積之法皆有以發明其所以然有專書行於世不能備録謹録招差圖説以明立法之大意云凡布立成盈初縮末置立差三十一微以六因之得一秒八十六微為加分立差置平差二分四十六秒倍之得四分九十二秒加入加分立差得四分九十三秒八十六微為平立合差置定差五百一十三分三十二秒內減平差二分四十六秒再減立差三十一微餘五百一十分八十五秒六十九微為加分縮初盈末置立差二十七微以六因之得一秒六十二微為加分立差置平差二分二十一秒倍之得四分四十二秒加入加分立差得四分四十三秒六十二微為平立合差置定差四百八十七分六秒內減平差二分二十一秒再減立差二十七微餘四百八十四分八十四秒七十三微為加分已上所推皆初日之數其推次日皆以加分立差纍加平立合差為次日平立合差以平立合差減其日加分為次日加分盈縮並同其加分纍積之即盈縮積其數並見立成太陰遲疾平立定三差之原太陰轉周二十七日五十五刻四六測分四象象各七段四象二十八段每段十二限每象八十四限凡三百三十六限而四象一周以四象為法除轉周日得每象六日八八八六五分為七段每段下實測月行遲疾之數與平行相較以求積差積限積差第一段一十二一度二十八分七一二第二段二十四二度四十五分九六一六第三段三十六三度四十八分三七九二第四段四十八四度三十二分五九五二第五段六十四度九十五分二四第六段七十二五度三十二分九四四第七段八十四五度四十二分三三七六各置其段積差以其段積限為法除之為各段限平差置各段限平差與後段相減為一差置一差與後段一差相減為二差限平差一差二差第一段一十分七二六四十七秒七六九秒三六第二段一十分二四八四五十七秒一二九秒三六第三段九分六七七二六十六秒四八九秒三六第四段九分一二四七十五秒八四九秒三六第五段八分二五四八十五秒二九秒三六第六段七分四二九十四秒五六第七段六分四五六四置第一段限平差一十分七二六為泛平積置第一段一差四十七秒七六以第一段二差九秒三六減之餘三十八秒四十微為泛平積差另置第一段二差九秒三十六微折半得四秒六十八微為泛立積差以泛平積差三十八秒四十微加泛平積一十分七二六得一十一分一十一秒為定差置泛平積差三十八秒四十微以泛立積差四秒六十八微減之餘三十三秒七十二微為實以十二限為法除之得二秒八十一微為平差置泛立積差四秒六十八微為實十二限為法除二次得三微二十五纖為立差凡求遲疾皆以入曆日乘十二限二十分以在八十四限已下為初已上轉減一百六十八限餘為末各以初末限乘立差得數以加平差再以初末限乘之得數以減定差餘以初末限乘之為遲疾積其初限是從最遲最疾處順推至後末限是從最遲最疾處逆溯至前其距最遲疾處同故其積度同太陰與太陽立法同但太陽以定氣立限故盈縮異數太陰以平行立限故遲疾同原布立成法置立差三微二十五纖以六因之得一十九微五十纖為損益立差置平差二秒八十一微倍之得五秒六十二微再加損益立差一十九微五十纖共得五秒八十一微為初限平立合差自此以損益立差纍加之即每限平立合差至八十限下積至二十一秒四一五為平立合差之極八十一限下差一秒七八九八十二限下一秒七八八至八十三限下平立合差與益分中分為益分之終八十四限下差亦與損分中分為損分之始至八十六限下差亦二十一秒四一五自此以損益立差纍減之即每限平立合差至末限與初限同置定差一十一分一十一秒內減平差二秒八十一微再減立差三微二十五纖餘一十一分八秒一十五微七十五纖為加分定差即初限損益分置損益分以其限平立合差益減損加之即為次限損益分以益分積之損分減之便為其下遲疾度以八百二十分為一限日率纍加八百二十分為每限日率以上俱詳立成五星平立定三差之原凡五星各以實測分其行度為八段以求積差略如日月法木星立差加平差減積日積差第一段一十一日五十刻一度二一五二九七一一五第二段二十三日二度三四五二一四第三段三十四日五十刻三度三五四一三七二六五第四段四十六日四度二三四六九一二第五段五十七日五十刻四度九六四一三七五第六段六十九日五度五九九七八四四第七段八十日五十刻五度八六一八四七二五第八段九十二日五度九九四三四四六四泛平差泛平較泛立較第一段一十分五六七八一三十九秒一六二一六秒二四二二第二段一十分一七六一八四十五秒四四三六秒二四二二第三段九分七二二一三七五十一秒六四六五六秒二四二二第四段九分二五六七二五十七秒八八八七六秒二四二二第五段八分六二六七八五六十四秒一三九六秒二四二二第六段七分九八五四七六七十秒三七二一六秒二四二二第七段七分二八一七四五七十六秒六一五三第八段六分五一五五九二各置其段所測積差度分為實以段日為法除之為泛平差各以泛平差與次段泛平差相較為泛平較又以泛平較與次段泛平較相較為泛立較置第一段泛平較三十九秒一六二一減其下泛立較六秒二四二二餘三十二秒九一九九為初段平立較加初段泛平差一十分五六七八一共得一十分八十九秒七十微為定差秒置萬位置初段平立較差三十二秒九一九九內減泛立較之半三秒一二一一餘二十九秒七九八八以段日一十一日五十刻除之得二秒五十九微一十二纖為平差置泛立差之半三秒一二一一以段日為法除二次得二微三十六纖為立差已上為木星平立定三差之原火星盈初縮末立差減平差減積日第一段七日六十二刻五十分第二段一十五日二十五刻第三段二十二日八十七刻五十分第四段三十日五十刻第五段三十八日一十二刻五十分第六段四十五日七十五刻第七段五十三日三十七刻五十分第八段六十一日積差第一段六度二六八二五一二二八一八五