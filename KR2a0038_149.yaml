body:
  text: 明史卷一百四十九列傳第三十七蹇義夏原吉俞士吉李文郁鄒師顏蹇義字宜之巴人初名瑢洪武十八年進士授中書舍人奏事稱旨帝問汝蹇叔後乎瑢頓首不敢對帝嘉其誠篤為更名義手書賜之滿三載當遷特命滿九載曰朕且用義由是朝夕侍左右小心敬慎未嘗忤色惠帝既即位推太祖意超擢吏部右侍郎是時齊泰黃子澄當國外興大師內改制度義無所建明國子博士王紳遺書責之義不能答燕師入迎附遷左侍郎數月進尚書時方務反建文之政所更易者悉罷之義從容言曰損益貴適時宜前改者固不當今必欲盡復者亦未悉當也因舉數事陳說本末帝稱善從其言永樂二年兼太子詹事帝有所傳諭太子輒遣義能委曲導意帝與太子俱愛重之七年帝巡北京命輔皇太子監國義熟典故達治體軍國事皆倚辦時舊臣見親用者戶部尚書夏原吉與義齊名中外稱曰蹇夏滿三考帝親宴二人便殿褒揚甚至數奉命兼理他部事職務填委處之裕如十七年以父喪歸帝及太子皆遣官賜祭詔起復十九年三殿災敕廷臣二十六人巡行天下義及給事中馬俊分巡應天諸府問軍民疾苦黜文武長吏擾民者數人條興革數十事奏行之還治部事明年帝北征還以太子曲宥呂震壻主事張鶴朝參失儀罪義不匡正逮義繫錦衣衛獄又明年春得釋仁宗即位義原吉皆以元老為中外所信帝又念義監國時舊勞尤厚倚之首進義少保賜冠服象笏玉帶兼食二祿歷進少師賜銀章一文曰繩愆糾繆已復賜璽書曰曩朕監國卿以先朝舊臣日侍左右兩京肇建政務方殷卿勞心焦思不恤身家二十餘年夷險一節朕承大統贊襄治理不懈益恭朕篤念不忘茲以己意創製蹇忠貞印賜卿俾藏於家傳之後世知朕君臣共濟艱難相與有成也時惟楊士奇亦得賜貞一印及敕尋命與英國公輔及原吉同監修太宗實録義視原吉尤重厚然過於周慎士奇嘗於帝前謂義曰何過慮義曰恐鹵莽為後憂耳帝兩是之楊榮嘗毀義帝不直榮義頓首言榮無他即左右有讒榮者願陛下慎察帝笑曰吾固弗信也宣宗即位委寄益重時方修獻陵帝欲遵遺詔從儉約以問義原吉二人力贊曰聖見高遠出於至孝萬世之利也帝親為規畫三月而陵成宏麗不及長陵其後諸帝因以為制逮世宗營永陵始益崇侈云帝征樂安義原吉及諸學士皆從預軍中機務賜鞍馬甲胄弓劍及還賚豫甚厚三年從巡邊還帝以義原吉士奇榮四人者皆已老賜璽書曰卿等皆祖宗遺老畀輔朕躬今黃髮危齒不宜復典冗劇傷朝廷優老待賢之禮可輟所務朝夕在朕左右討論至理共寧邦家官祿悉如舊明年郭璡代為尚書尋以胡濙言命義等四人議天下官吏軍民建言章奏復賜義銀章文曰忠厚寬宏七年詔有司為義營新第於文明門內英宗即位齊宿得疾遣醫往視問所欲言對曰陛下初嗣大寶望敬守祖宗成憲始終不渝耳遂卒年七十三贈太師諡忠定義為人質直孝友善處僚友間未嘗一語傷物士奇常言張詠之不飾玩好傅堯俞之遇人以誠范景仁之不設城府義兼有之子英有詩名以廕為尚寶司丞歷官太常少卿夏原吉字維哲其先德興人父時敏官湘陰教諭遂家焉原吉早孤力學養母以鄉薦入太學選入禁中書制誥諸生或喧笑原吉危坐儼然太祖詗而異之擢戶部主事曹務叢脞處之悉有條理尚書郁新甚重之有劉郎中者忌其能會新劾諸司怠事者帝欲宥之新持不可帝怒問誰教若新頓首曰堂後書算生帝乃下書算生於獄劉郎中遂言教尚書者原吉也帝曰原吉能佐尚書理部事汝欲陷之耶劉郎中與書算生皆棄市建文初擢戶部右侍郎明年充採訪使巡福建所過郡邑核吏治咨民隱人皆悅服久之移駐蘄州成祖即位或執原吉以獻帝釋之轉左侍郎或言原吉建文時用事不可信帝不聽與蹇義同進尚書偕義等詳定賦役諸制建白三十餘事皆簡便易遵守曰行之而難繼者且重困民吾不忍也浙西大水有司治不效永樂元年命原吉治之尋命侍郎李文郁為之副復使僉都御史俞士吉齎水利書賜之原吉請循禹三江入海故蹟濬吳淞下流上接太湖而度地為閘以時蓄泄從之役十餘萬人原吉布衣徒步日夜經畫盛暑不張蓋曰民勞吾何忍獨適事竣還京師言水雖由故道入海而支流未盡疏泄非經久計明年正月原吉復行浚白茆塘劉家河大黃浦大理少卿袁復為之副已復命陝西參政宋性佐之九月工畢水泄蘇松農田大利三年還其夏浙西大饑命原吉率俞士吉袁復及左通政趙居任往振發粟三十萬石給牛種有請召民佃水退淤田益賦者原吉馳疏止之姚廣孝還自浙西稱原吉曰古之遺愛也亡何郁新卒召還理部事首請裁冗食平賦役嚴鹽法錢鈔之禁清倉場廣屯種以給邊蘇民且便商賈皆報可凡中外戶口府庫田賦贏縮之數各以小簡書置懷中時檢閲之一日帝問天下錢穀幾何對甚悉以是益重之當是時兵革初定論靖難功臣封賞分封諸藩增設武衛百司已又發卒八十萬問罪安南中官造巨艦通海外諸國大起北都宮闕供億轉輸以巨萬萬計皆取給戶曹原吉悉心計應之國用不絀六年命督軍民輸材北都詔以錦衣官校從治怠事者原吉慮犯者衆告戒而後行人皆感悅七年帝北巡命兼攝行在禮部兵部都察院事有二指揮冒月廩帝欲斬之原吉曰非律也假實為盜將何以加乃止八年帝北征輔太孫留守北京總行在九卿事時諸司草創每旦原吉入佐太孫參決庶務朝退諸曹郎御史環請事原吉口答手書不動聲色北達行在南啓監國京師肅然帝還賜鈔幣鞍馬牢醴慰勞有加尋從還南京命侍太孫周行鄉落觀民間疾苦原吉取齏黍以進曰願殿下食此知民艱九載滿與蹇義皆宴便殿帝指二人謂羣臣曰高皇帝養賢以貽朕欲觀古名臣此其人矣自是屢侍太孫往來兩京在道隨事納忠多所裨益十八年北京宮室成使原吉南召太子太孫既還原吉言連歲營建今告成宜撫流亡蠲逋負以寬民力明年三殿災原吉復申前請亟命所司行之初以殿災詔求直言羣臣多言都北京非便帝怒殺主事蕭儀曰方遷都時與大臣密議久而後定非輕舉也言者因劾大臣帝命跪午門外質辨大臣爭詈言者原吉獨奏曰彼應詔無罪臣等備員大臣不能協贊大計罪在臣等帝意解兩宥之或尤原吉背初議曰吾輩歷事久言雖失幸上憐之若言官得罪所損不細矣衆始歎服原吉雖居戶部國家大事輒令詳議帝每御便殿闕門召語移時左右莫得聞退則恂恂若無預者交址平帝問遷官與賞孰便對曰賞費於一時有限遷官為後日費無窮也從之西域法王來朝帝欲郊勞原吉不可及法王入原吉見不拜帝笑曰卿欲效韓愈耶山東唐賽兒反事平俘脅從者三千餘人至原吉請於帝悉原之谷王橞叛帝疑長沙有通謀者原吉以百口保之乃得寢十九年冬帝將大舉征沙漠命原吉與禮部尚書呂震兵部尚書方賓工部尚書吳中等議皆言兵不當出未奏會帝召賓賓力言軍興費乏帝不懌召原吉問邊儲多寡對曰比年師出無功軍馬儲蓄十喪八九災眚迭作內外俱疲況聖躬少安尚須調護乞遣將往征勿勞車駕帝怒立命原吉出理開平糧儲而吳中入對如賓言帝益怒召原吉繫之內官監並繫大理丞鄒師顏以嘗署戶部也賓懼自殺遂並籍原吉家自賜鈔外惟布衣瓦器明年北征以糧盡引還已復連歲出塞皆不見敵還至榆木川帝不豫顧左右曰夏原吉愛我崩聞至之三日太子走繫所呼原吉哭而告之原吉伏地哭不能起太子令出獄與議喪禮復問赦詔所宜對以振饑省賦役罷西洋取寶船及雲南交址採辦諸道金銀課悉從之仁宗即位復其官方原吉在獄有母喪至是乞歸終制帝曰卿老臣當與朕共濟艱難卿有喪朕獨無喪乎厚賜之令家人護喪馳傳歸葬有司治喪事原吉不敢復言尋加太子少傅呂震以太子少師班原吉上帝命鴻臚引震列其下進少保兼太子少傅尚書如故食三祿原吉固辭乃聽辭太子少傅祿賜繩愆糾繆銀章建第於兩京已而仁宗崩太子至自南京原吉奉遺詔迎於盧溝橋宣宗即位以舊輔益親重明年漢王高煦反亦以靖難為辭移檄罪狀諸大臣以原吉為首帝夜召諸臣議楊榮首勸帝親征帝難之原吉曰獨不見李景隆已事耶臣昨見所遣將命下即色變臨事可知矣且兵貴神速卷甲趨之所謂先人有奪人之心也榮策善帝意遂決師還賚豫加等賜閽者三人原吉以無功辭不聽三年從北巡帝取原吉橐糗嘗之笑曰何惡也對曰軍中猶有餒者帝命賜以大官之饌且犒將士從閲武兔兒山帝怒諸將慢褫其衣原吉曰將帥國爪牙奈何凍而斃之反覆力諫帝曰為卿釋之再與蹇義同賜銀印文曰含弘貞靖帝雅善繪事嘗親畫壽星圖以賜其他圖畫服食器用銀幣玩好之賜無虛日五年正月兩朝實録成復賜金幣鞍馬旦入謝歸而卒年六十五贈太師諡忠靖敕戶部復其家世世無所與原吉有雅量人莫能測其際同列有善即採納之或有小過必為之掩覆吏污所服金織賜衣原吉曰勿怖污可浣也又有樜精微文書者吏叩頭請死原吉不問自入朝引咎帝命易之呂震嘗傾原吉震為子乞官原吉以震在靖難時有守城功為之請平江伯陳瑄初亦惡原吉原吉顧時時稱瑄才或問原吉量可學乎曰吾幼時有犯未嘗不怒始忍於色中忍於心久則無可忍矣嘗夜閲爰書撫案而歎筆欲下輒止妻問之曰此歲終大辟奏也與同列飲他所夜歸值雪過禁門有欲不下者原吉曰君子不以冥冥墮行其慎如此原吉與義皆起家太祖時義秉銓政原吉管度支皆二十七年名位先於三楊仁宣之世外兼臺省內參館閣與三楊同心輔政義善謀榮善斷而原吉與士奇尤持大體有古大臣風烈子瑄以廕為尚寶司丞喜談兵景泰時數上章言兵事有沮者不獲用終南京太常少卿俞士吉字用貞象山人建文中為兗州訓導上書言時政擢御史出按鳳陽徽州及湖廣能辨釋冤獄成祖即位進僉都御史奉詔以水利書賜原吉因留督浙西農政湖州逋糧至六十萬石同事者欲減其數以聞士吉曰欺君病民吾不為也具以實奏悉得免尋為都御史陳瑛所劾與大理少卿袁復同繫獄復死獄中土吉謫為事官治水蘇松既而復職還上聖孝瑞應頌帝曰爾為大臣不言民問利病乃獻諛耶擲還之宣德初仕至南京刑部侍郎致仕李文郁襄陽人永樂初以戶部侍郎副原吉治水有勞後坐事謫遼東二十年仁宗即位召還為南京通政參議致仕鄒師顏宜都人永樂初為江西參政坐事免尋以薦擢御史有直聲遷大理丞署戶部與原吉同下獄仁宗立釋為禮部侍郎省墓歸還至通州卒貧不能歸葬尚書呂震聞於朝宣宗命驛舟送之詔京官卒者皆給驛著為令贊曰書曰敷求哲人俾輔于爾後嗣蹇義夏原吉自筮仕之初即以誠篤幹濟受知太祖至成祖益任以繁劇而二人實能通達政體諳練章程稱股肱之任仁宣繼體委寄優隆同德協心匡翼令主用使吏治修明民風和樂成績懋著蔚為宗臣樹人之效遠矣哉
