body:
  text: 明史卷五十志第二十六禮四吉禮四歷代帝王陵廟三皇聖師先師孔子旗纛五祀馬神南京神廟功臣廟京師九廟諸神祠厲壇歷代帝王陵廟洪武三年遣使訪先代陵寢仍命各行省具圖以進凡七十有九禮官考其功德昭著者曰伏羲神農黃帝少昊顓頊唐堯虞舜夏禹商湯中宗高宗周文王武王成王康王漢高祖文帝景帝武帝宣帝光武明帝章帝後魏文帝隋高祖唐高祖太宗憲宗宣宗周世宗宋太祖太宗真宗仁宗孝宗理宗凡三十有六各製袞冕函香幣遣秘書監丞陶誼等往修祀禮親製祝文遣之每陵以白金二十五兩具祭物陵寢發者掩之壞者完之廟敝者葺之無廟者設壇以祭仍令有司禁樵採歲時祭祀牲用太牢四年禮部定議合祀帝王三十五在河南者十陳祀伏羲商高宗孟津祀漢光武洛陽祀漢明帝章帝鄭祀周世宗鞏祀宋太祖太宗真宗仁宗在山西者一滎河祀商湯在山東者二東平祀唐堯曲阜祀少昊在北平者三內黃祀商中宗滑祀顓頊高辛在湖廣者二酃祀神農寧遠祀虞舜在浙江者二會稽祀夏禹宋孝宗在陝西者十五中部祀黃帝咸陽祀周文王武王成王康王宣王漢高帝景帝咸寧祀漢文帝興平祀漢武帝長安祀漢宣帝三原祀唐高祖醴泉祀唐太宗蒲城祀唐憲宗涇陽祀唐宣宗歲祭用仲春仲秋朔于是遣使詣各陵致祭陵置一碑刊祭期及牲帛之數俾所在有司守之已而命有司歲時修葺設陵戶二人守視又每三年出祝文香帛傳制遣太常寺樂舞生齎往所在命有司致祭其所祀者視前去周宣王漢明帝章帝而增祀媧皇於趙城後魏文帝於富平元世祖於順天及宋理宗於會稽凡三十六帝後又增祀隋高祖於扶風而理宗仍罷祀又命帝王陵廟所在官司以春秋仲月上旬擇日致祭六年帝以五帝三王及漢唐宋創業之君俱宜於京師立廟致祭遂建歷代帝王廟於欽天山之陽倣太廟同堂異室之制為正殿五室中一室三皇東一室五帝西一室夏禹商湯周文王又東一室周武王漢光武唐太宗又西一室漢高祖唐高祖宋太祖元世祖每歲春秋仲月上旬甲日致祭已而以周文王終守臣服唐高祖由太宗得天下遂寢其祀增祀隋高祖七年令帝王廟皆塑袞冕坐像惟伏羲神農未有衣裳之制不必加冕服八月帝躬祀於新廟已而罷隋高祖之祀二十一年令每歲郊祀附祭歷代帝王於大祀殿仍以歲八月中旬擇日遣官祭於本廟其春祭停之又定每三年遣祭各陵之歲則停廟祭是年詔以歷代名臣從祀禮官李原名奏擬三十六人以進帝以宋趙普負太祖不忠不可從祀元臣四傑木華黎為首不可祀孫而去其祖可祀木華黎而罷安童既祀伯顏則阿术不必祀漢陳平馮異宋潘美皆善始終可祀於是定風后力牧皐陶夔龍伯夷伯益伊尹傅說周公旦召公奭太公望召虎方叔張良蕭何曹參陳平周勃鄧禹馮異諸葛亮房玄齡杜如晦李靖郭子儀李晟曹彬潘美韓世忠岳飛張浚木華黎博爾忽博爾术赤老溫伯顏凡三十七人從祀於東西廡為壇四初太公望有武成王廟嘗遣官致祭如釋奠儀至是罷廟祭去王號永樂遷都帝王廟遣南京太常寺官行禮嘉靖九年罷歷代帝王南郊從祀令建歷代帝王廟於都城西歲以仲春秋致祭後幷罷南京廟祭十年春二月廟未成躬祭歷代帝王於文華殿凡五壇丹陛東西名臣四壇禮部尚書李時言舊儀有賜福胙之文賜者自上而下之義惟郊廟社稷宜用歷代帝王止宜云答詔可十一年夏廟成名曰景德崇聖之殿殿五室東西兩廡殿後祭器庫前為景德門門外神庫神廚宰牲亭鐘樓街東西二坊曰景德街八月壬辰親祭帝由中門入迎神受福胙送神各兩拜嗣後歲遣大臣一員行禮四員分獻凡子午卯酉祭於陵寢之歲則停秋祭二十四年以禮科陳棐言罷元世祖陵廟之祀及從祀木華黎等復遷唐太宗與宋太祖同室凡十五帝從祀名臣三十二人三皇明初仍元制以三月三日九月九日通祀三皇洪武元年令以太牢祀二年命以句芒祝融風后力牧左右配俞跗桐君僦貸季少師雷公鬼臾區伯高岐伯少俞高陽十大名醫從祀儀同釋奠四年帝以天下郡邑通祀三皇為瀆禮臣議唐玄宗嘗立三皇五帝廟於京師至元成宗時乃立三皇廟於府州縣春秋通祀而以醫藥主之甚非禮也帝曰三皇繼天立極開萬世教化之原汨於藥師可乎命天下郡縣毋得褻祀正德十一年立伏羲氏廟於秦州秦州古成紀地從巡按御史馮時雄奏也嘉靖間建三皇廟於太醫院北名景惠殿中奉三皇及四配其從祀東廡則僦貸季岐伯伯高鬼臾區俞跗少俞少師桐君雷公馬師皇伊尹扁鵲淳于意張機十四人西廡則華陀王叔和皇甫謐葛洪巢元方孫思邈韋慈藏王冰錢乙朱肱李杲劉完素張元素朱彥修十四人歲仲春秋上甲日禮部堂上官行禮太醫院堂上官二員分獻用少牢復建聖濟殿於內祀先醫以太醫官主之二十一年帝以規制湫隘命拓其廟聖師聖師之祭始於世宗奉皇師伏羲氏神農氏軒轅氏帝師陶唐氏有虞氏王師夏禹王商湯王周文王武王九聖南向左先聖周公右先師孔子東西向每歲春秋開講前一日皇帝服皮弁拜跪行釋奠禮用羹酒果脯帛祭於文華殿東室初東室有釋像帝以其不經撤之乃祀先聖先師自為祭文行奉安神位禮輔臣禮卿及講官俟行禮訖入拜先是洪武初司業宋濂建議欲如建安熊氏之說以伏羲為道統之宗神農黃帝堯舜禹湯文武以次列焉秩祀天子之學則道統益尊太祖不從至是世宗倣其意行之十六年移祀於永明殿後行禮如初其後常遣官代祭隆慶初仍於文華殿東室行禮至聖先師孔子廟祀漢晉及隋或稱先師或稱先聖宣尼宣父唐諡文宣王宋加至聖號元復加號大成明太祖入江淮府首謁孔子廟洪武元年二月詔以太牢祀孔子於國學仍遣使詣曲阜致祭臨行諭曰仲尼之道廣大悠久與天地並有天下者莫不虔修祀事朕為天下主期大明教化以行先聖之道今既釋奠成均仍遣爾修祀事於闕里爾其敬之又定制每歲仲春秋上丁皇帝降香遣官祀於國學以丞相初獻翰林學士亞獻國子祭酒終獻先期皇帝齋戒獻官陪祀執事官皆散齋二日致齋一日前祀一日皇帝服皮弁服御奉天殿降香至日獻官行禮三年詔革諸神封號惟孔子封爵仍舊且命曲阜廟庭歲官給牲幣俾衍聖公供祀事四年禮部奏定儀物改初制籩豆之八為十籩用竹其簠簋登鉶及豆初用木者悉易以瓷牲易以熟樂生六十人舞生四十八人引舞二人凡一百一十人禮部請選京民之秀者充樂舞生太祖曰樂舞乃學者事況釋奠所以崇師宜擇國子生及公卿子弟在學者豫教肄之五年罷孟子配享踰年帝曰孟子辨異端闢邪說發明孔子之道配享如故七年二月上丁日食改用仲丁十五年新建太學成廟在學東中大成殿左右兩廡前大成門門左右列戟二十四門外東為犧牲廚西為祭器庫又前為靈星門自經始以來駕數臨視至是落成遣官致祭帝既親詣釋奠又詔天下通祀孔子幷頒釋奠儀注凡府州縣學籩豆以八器物牲牢皆殺于國學三獻禮同十哲兩廡一獻其祭各以正官行之有布政司則以布政司官分獻則以本學儒職及老成儒士充之每歲春秋仲月上丁日行事初國學主祭遣祭酒後遣翰林院官然祭酒初到官必遣一祭十七年敕每月朔望祭酒以下行釋菜禮郡縣長以下詣學行香二十六年頒大成樂於天下二十八年以行人司副楊砥言罷漢揚雄從祀益以董仲舒三十年以國學孔子廟隘命工部改作其制皆帝所規畫大成殿門各六楹靈星門三東西廡七十六楹神廚庫皆八楹宰牲所六楹永樂初建廟於太學之東宣德三年以萬縣訓導李譯言命禮部考正從祀先賢名位頒示天下十年慈利教諭蔣明請祀元儒吳澄大學士楊士奇等言當從祀從之正統二年以宋儒胡安國蔡沈真德秀從祀三年禁天下祀孔子於釋老宮孔顏孟三氏子孫教授裴侃言天下文廟惟論傳道以列位次闕里家廟宜正父子以彝倫顏子曾子子思子也配享殿廷無繇子伯魚父也從祀廊廡非惟名分不正抑恐神不自安況叔梁紇元已追封啟聖王創殿於大成殿西崇祀而顏孟之父俱封公惟伯魚子仍侯乞追封公爵偕顏孟父俱配啟聖王殿帝命禮部行之仍議加伯魚子封號成化二年追封董仲舒廣川伯胡安國建寧伯蔡沈崇安伯真德秀浦城伯十二年從祭酒周洪謨言增樂舞為八佾籩豆各十二弘治八年追封楊時將樂伯從祀位司馬光之次九年增樂舞為七十二人如天子之制十二年闕里孔廟燬敕有司重建十七年廟成遣大學士李東陽祭告幷立御製碑文正德十六年詔有司改建孔氏家廟之在衢州者官給錢董其役令博士孔承義奉祀嘉靖九年大學士張璁言先師祀典有當更正者叔梁紇乃孔子之父顏路曾孔鯉乃顏曾子思之父三子配享廟庭紇及諸父從祀兩廡原聖賢之心豈安請於大成殿後別立室祀叔梁紇而以顏路曾孔鯉配之帝以為然因言聖人尊天與尊親同今籩豆十二牲用犢全用祀天儀亦非正禮其諡號章服悉宜改正璁緣帝意言孔子宜稱先聖先師不稱王祀宇宜稱廟不稱殿祀宜用木主其塑像宜毀籩豆用十樂用六佾配位公侯伯之號宜削止稱先賢先儒其從祀申黨公伯寮秦冉等十二人宜罷林放蘧瑗等六人宜各祀於其鄉后蒼王通歐陽修胡瑗蔡元定宜從祀帝命禮部會翰林諸臣議編修徐階疏陳易號毀像之不可帝怒謫階官乃御製正孔子祀典說大略謂孔子以魯僭王為非寧肯自僭天子之禮復為正孔子祀典申記俱付史館璁因作正孔子廟祀典或問奏之帝以為議論詳正幷令禮部集議於是御史黎貫等言聖祖初正祀典天下嶽瀆諸神皆去其號惟先師孔子如故良有深意陛下疑孔子之祀上擬祀天之禮夫子之不可及也猶天之不可階而升雖擬諸天亦不為過自唐尊孔子為文宣王已用天子禮樂宋真宗嘗欲封孔子為帝或謂周止稱王不當加帝號而羅從彥之論則謂加帝號亦可至周敦頤則以為萬世無窮王祀孔子邵雍則以為仲尼以萬世為王其辨孔子不當稱王者止吳澄一人而已伏望博考羣言務求至當時貫疏中言莫尊於天地亦莫尊於父師陛下敬天尊親不應獨疑孔子王號為僭帝因大怒疑貫借此以斥其追尊皇考之非詆為奸惡下法司會訊褫其職給事中王汝梅等亦極言不宜去王號帝皆斥為謬論於是禮部會諸臣議人以聖人為至聖人以孔子為至宋真宗稱孔子為至聖其意已備今宜於孔子神位題至聖先師孔子去其王號及大成文宣之稱改大成殿為先師廟大成門為廟門其四配稱復聖顏子宗聖曾子述聖子思子亞聖孟子十哲以下凡及門弟子皆稱先賢某子左丘明以下皆稱先儒某子不復稱公侯伯遵聖祖首定南京國子監規制製木為神主仍擬大小尺寸著為定式其塑像即令屏撤春秋祭祀遵國初舊制十籩十豆天下各學八籩八豆樂舞止六佾凡學別立一祠中叔梁紇題啟聖公孔氏神位以顏無繇曾點孔鯉孟孫氏配俱稱先賢某氏至從祀之賢不可不考其得失申黨即申棖釐去其一公伯寮秦冉顏何荀況戴聖劉向賈逵馬融何休王肅王弼杜預吳澄罷祀林放蘧瑗盧植鄭衆鄭玄服虔范寧各祀於其鄉后蒼王通歐陽修胡瑗宜增入命悉如議行又以行人薛侃議進陸九淵從祀初洪武時司業宋濂請去像設主禮儀樂章多所更定太祖不允成弘間少詹程敏政嘗謂馬融等八人當斥給事中張九功推言之幷請罷荀況公伯寮蘧瑗等而進后蒼王通胡瑗為禮官周洪謨所却而止至是以璁力主衆不敢違毀像蓋用濂說先賢去留略如九功言其進歐陽修則以濮議故也明年國子監建啟聖公祠成從尚書李時言春秋祭祀與文廟同日籩豆牲帛視四配東西配位視十哲從祀先儒程晌朱松蔡元定視兩廡輔臣代祭文廟則祭酒祭啟聖祠南京祭酒於文廟司業於啟聖祠遂定制殿中先師南向四配東西向稍後十哲閔子損冉子雍端木子賜仲子由卜子商冉子耕宰子予冉子求言子偃顓孫子師皆東西向兩廡從祀先賢澹臺滅明宓不齊原憲公冶長南宮适高柴漆雕開樊須司馬耕公西赤有若琴張申棖陳亢巫馬施梁鱣公哀商瞿冉孺顏辛伯虔曹恤冉季公孫龍漆雕哆秦商漆雕徒父顏高商澤壤駟赤任不齊石作蜀公良孺公夏首公肩定后處鄡單奚容蒧罕父黑顏祖榮旂秦祖左人郢句井疆鄭國公祖句茲原亢縣成廉潔燕伋叔仲會顏之僕邽巽樂欬公西輿如狄黑孔忠公西蒧步叔乘施之常秦非顏噲先儒左丘明公羊高穀梁赤伏勝高堂生孔安國毛萇董仲舒后蒼杜子春王通韓愈胡瑗周敦頤程顥歐陽修邵雍張載司馬光程頤楊時胡安國朱熹張栻陸九淵呂祖謙蔡沈真德秀許衡凡九十一人隆慶五年以薛瑄從祀萬曆中以羅從彥李侗從祀十二年又以陳獻章胡居仁王守仁從祀二十三年以宋周敦頤父輔成從祀啟聖祠又定每歲仲春秋上丁日御殿傳制遣大臣祭先師及配位其十哲以翰林官兩廡以國子監官各二員分獻每月朔及每科進士行釋菜禮司府州縣衞學各提調官行禮牲用少牢樂如太學京府及附府縣學止行釋菜禮崇禎十五年以左丘明親授經於聖人改稱先賢幷改宋儒周二程張朱邵六子亦稱先賢位七十子下漢唐諸儒之上然僅國學更置之闕里廟廷及天下學宮未遑頒行也旗纛旗纛之祭有四其一洪武元年禮官奏軍行旗纛所當祭者旗謂牙旗黃帝出軍訣曰牙旗者將軍之精一軍之形候凡始豎牙必祭以剛日纛謂旗頭也太白陰經曰大將中營建纛天子六軍故用六纛氂牛尾為之在左騑馬首唐宋及元皆有旗纛之祭今宜立廟京師春用驚蟄秋用霜降日遣官致祭乃命建廟於都督府治之後以都督為獻官題主曰軍牙之神六纛之神七年二月詔皇太子率諸王詣閱武場祭旗纛為壇七行三獻禮後停春祭止霜降日祭於教場其二歲暮享太廟日祭旗纛於承天門外其三旗纛廟在山川壇左初旗纛與太歲諸神合祭於城南九年別建廟每歲仲秋天子躬祀山川之日遣旗手衞官行禮其正祭旗頭大將六纛大將五方旗神主宰戰船正神金鼓角銃礮之神弓弩飛鎗飛石之神陣前陣後神祇五昌等衆凡七位共一壇南向皇帝服皮弁御奉天殿降香獻官奉以從事祭物視先農帛七黑二白五瘞毛血望燎與風雲雷雨諸神同祭畢設酒器六於地刺雄雞六瀝血以釁之其四永樂後有神旗之祭專祭火雷之神每月朔望神機營提督官祭於教場牲用少牢凡旗纛皆藏內府祭則設之王國祭旗纛則遣武官戎服行禮天下衞所於公署後立廟以指揮使為初獻官僚屬為亞獻終獻儀物殺京都五祀洪武二年定制歲終臘享通祭於廟門外八年禮部奏五祀之禮周漢唐宋不一今擬孟春祀戶設壇皇宮門左司門主之孟夏祀竈設壇御廚光祿寺官主之季夏祀中霤設壇乾清宮丹墀內官主之孟秋祀門設壇午門左司門主之孟冬祀井設壇宮內大庖井前光祿寺官主之四孟於有事太廟之日季夏於土旺之日牲用少牢制可從定中霤于奉天殿外文樓前又歲暮合祭五祀于太廟西廡下太常寺官行禮馬神洪武二年命祭馬祖先牧馬社馬步之神築壇後湖禮官言周官春祭馬祖天駟星也夏祭先牧始養馬者秋祭馬社始乘馬者冬祭馬步乃神之災害馬者隋用周制祭以四仲之月唐宋因之今定春秋二仲月甲戊庚日遣官致祀為壇四樂用時樂行三獻禮四年蜀明昇獻良馬十其一白者長丈餘不可加韉勒太祖曰天生英物必有神司之命太常以少牢祀馬祖囊沙四百斤壓之令人騎而遊苑中久之漸馴帝乘之以夕月於清涼山比還大悅賜名飛越峰復命太常祀馬祖五年幷諸神為一壇歲止春祭永樂十三年立北京馬神祠於蓮花池其南京馬神則南太僕主之南京神廟初稱十廟北極真武以三月三日九月九日道林真覺普濟禪師寶誌以三月十八日都城隍以八月祭帝王後一日祠山廣惠張王渤以二月十八日五顯靈順以四月八日九月二十八日皆南京太常寺官祭漢秣陵尉蔣忠烈公子文晉成陽卞忠貞公壼宋濟陽曹武惠王彬南唐劉忠肅王仁瞻元衞國忠肅公福壽俱以四孟朔歲除應天府官祭惟蔣廟又有四月二十六日之祭幷功臣廟為十一後復增四關公廟洪武二十七年建於雞籠山之陽稱漢前將軍壽亭侯嘉靖十年訂其誤改稱漢前將軍漢壽亭侯以四孟歲暮應天府官祭五月十三日南京太常寺官祭天妃永樂七年封為護國庇民妙靈昭應弘仁普濟天妃以正月十五日三月二十三日南京太常寺官祭太倉神廟以仲春秋望日南京戶部官祭司馬馬祖先牧神廟以春秋仲月中旬擇日南京太僕寺官祭諸廟皆少牢真武與真覺禪師素羞功臣廟太祖既以功臣配享太廟又命別立廟於雞籠山論次功臣二十有一人死者塑像生者虛其位正殿中山武寧王徐達開平忠武王常遇春岐陽武靖王李文忠寧河武順王鄧愈東甌襄武王湯和黔寧昭靖王沐英羊二豕二西序越國武莊公胡大海梁國公趙德勝巢國武壯公華高虢國忠烈公俞通海江國襄烈公吳良安國忠烈公曹良臣黔國威毅公吳復燕山忠愍侯孫興祖東序郢國公馮國用西海武莊公耿再成濟國公丁德興蔡國忠毅公張德勝海國襄毅公吳楨蘄國武義公康茂才東海郡公茅成羊二豕二兩廡各設牌一總書故指揮千百戶衞所鎮撫之靈羊十豕十以四孟歲暮遣駙馬都尉祭初胡大海等歿命肖像於卞壼蔣子文之廟及功臣廟成移祀焉永樂三年以中山王勳德第一又命正旦清明中元孟冬冬至遣太常寺官祭於大功坊之家廟牲用少牢京師九廟京師所祭者九廟真武廟永樂十三年建以祀北極佑聖真君正德二年改為靈明顯佑宮在海子橋之東祭日同南京東嶽泰山廟在朝陽門外祭以三月二十八日都城隍廟祭以五月十一日漢壽亭侯關公廟永樂間建成化十三年又奉敕建廟宛平縣之東祭以五月十三日皆太常寺官祭京都太倉神廟建於太倉戶部官祭司馬馬祖先牧神廟太僕寺官祭宋文丞相祠永樂六年從太常博士劉履節請建於順天府學之西元世祖廟嘉靖中罷皆以二月八月中旬順天府官祭洪恩靈濟宮祀徐知證知諤永樂十五年立廟皇城之西正旦冬至聖節內閣禮部及內官各一員祭生辰禮部官祭弘治中大學士劉健等請毋遣閣臣嘉靖中改遣太常寺官其榮國公姚廣孝洪熙元年從祀太廟嘉靖九年撤廟祀移祀大興隆寺在皇城西北隅後寺燬復移崇國寺東嶽都城隍用太牢五廟用少牢真武靈濟宮素羞諸神祠洪武元年命中書省下郡縣訪求應祀神祇名山大川聖帝明王忠臣烈士凡有功於國家及惠愛在民者著於祀典令有司歲時致祭二年又詔天下神祇常有功德於民事蹟昭著者雖不致祭禁人毀撤祠宇三年定諸神封號凡後世溢美之稱皆革去天下神祠不應祀典者即淫祠也有司毋得致祭弘治元年禮科張九功言祀典正則人心正今朝廷常祭之外又有釋迦牟尼文佛三清三境九天應元雷聲普化天尊金玉闕真君元君神父神母諸宮觀中又有水官星君諸天諸帝之祭非所以法天下帝下其章禮部尚書周洪謨等言釋迦牟尼文佛生西方中天竺國宗其教者以本性為法身德業為報身幷真身為三其實一人耳道家以老子為師朱熹有曰玉清元始天尊既非老子法身上清太上道君又非老子報身設有二像又非與老子為一而老子又自為上清太上老君蓋倣釋氏而又失之者也自今凡遇萬壽等節不令修建吉祥齋醮或遇喪禮不令修建薦揚齋醮其大興隆寺朝天宮俱停遣官祭告北極中天星主紫微大帝者北極五星在紫微垣中正統初建紫微殿設像祭告夫幽禜祭星古禮也今乃像之如人稱之為帝稽之祀典誠無所據雷聲普化天尊者道家以為總司五雷又以六月二十四日為天尊示現之日故歲以是日遣官詣顯靈宮致祭夫風雲雷雨南郊合祀而山川壇復有秋報則此祭亦當罷免祖師三天扶教輔玄大法師真君者傳記云漢張道陵善以符治病唐天寶宋熙寧大觀間累號正一靖應真君子孫亦有封號國朝仍襲正一嗣教真人之封然宋邵伯溫云張魯祖陵父衡以符法相授受自號師君今歲以正月十五日為陵生日遣官詣顯靈宮祭告亦非祀典大小青龍神者記云有僧名盧寓西山有二童子來侍時久旱童子入潭化二青龍遂得雨後賜盧號曰感應禪師建寺設像別設龍祠於潭上宣德中建大圓通寺加二龍封號春秋祭之邇者連旱祈禱無應不足崇奉明矣梓潼帝君者記云神姓張名亞子居蜀七曲山仕晉戰沒人為立廟唐宋屢封至英顯王道家謂帝命梓潼掌文昌府事及人間祿籍故元加號為帝君而天下學校亦有祠祀者景泰中因京師舊廟闢而新之歲以二月三日生辰遣祭夫梓潼顯靈於蜀廟食其地為宜文昌六星與之無涉宜敕罷免其祠在天下學校者俱令拆毀北極佑聖真君者乃玄武七宿後人以為真君作龜蛇於其下宋真宗避諱改為真武靖康初加號佑聖助順靈應真君圖志云真武為淨樂王太子修煉武當山功成飛昇奉上帝命鎮北方被髮跣足建皂纛玄旗此道家附會之說國朝御製碑謂太祖平定天下陰佑為多嘗建廟南京崇祀及太宗靖難以神有顯相功又於京城艮隅幷武當山重建廟宇兩京歲時朔望各遣官致祭而武當山又專官督祀事憲宗嘗範金為像今請止遵洪武間例每年三月三日九月九日用素羞遣太常官致祭餘皆停免崇恩真君隆恩真君者道家以崇恩姓薩名堅西蜀人宋徽宗時嘗從王侍宸林靈素輩學法有驗隆恩則玉樞火府天將王靈官也又嘗從薩傳符法永樂中以道士周思得能傳靈官法乃於禁城之西建天將廟及祖師殿宣德中改大德觀封二真君成化初改顯靈宮每年換袍服所費不訾近今祈禱無應亦當罷免金闕上帝玉闕上帝者誌云閩縣靈濟宮祀五代時徐溫子知證知諤國朝御製碑謂太宗嘗弗豫禱神輒應因大新閩地廟宇春秋致祭又立廟京師加封金闕真君玉闕真君正統成化中累加號為上帝朔望令節俱遣官祀及時薦新四時換袍服夫神世系事蹟本非甚異其僭號宜革正妄費亦宜節省神父聖帝神母元君及金玉闕元君者即二徐父母及其配也宋封其父齊王為忠武真人母田氏為仁壽仙妃配皆為仙妃永樂至成化間屢加封今號亦宜削號罷祀東嶽泰山之神者泰山五嶽首廟在泰安州山下又每歲南郊及山川壇俱有合祭之禮今朝陽門外有元東嶽舊廟國朝因而不廢夫既專祭封內且合祭郊壇則此廟之祭實為煩瀆京師都城隍之神者舊在順天府西南以五月十一日為神誕辰故是日及節令皆遣官祀夫城隍之神非人鬼也安有誕辰況南郊秋祀俱已合祭則誕辰及節令之祀非宜凡此俱當罷免議上乃命修建齋醮遣官祭告幷東嶽真武城隍廟靈濟宮祭祀俱仍舊二徐真君及其父母妻革去帝號仍舊封冠袍等物換回焚毀餘如所議行之按祀典太祖時應天祀陳喬楊邦乂姚興王鉷成都祀李冰文翁張詠均州祀黃霸密縣祀卓茂松江祀陸遜陸抗陸凱龍州祀李龍遷建寧祀謝夷甫彭澤祀狄仁傑九江祀李黼安慶祀余闕韓建之李宗可宣宗時高郵祀耿遇德英宗時豫章祀韋丹許遜無錫祀張巡憲宗時崖山祀張世傑陸秀夫孝宗時新會祀宋慈元楊后延平祀羅從彥李侗建寧祀劉子翬烏撒祀潭淵廬陵祀文天祥婺源祀朱熹都昌祀陳澔饒州祀江萬里福州祀陳文龍興化祀陳瓚湖廣祀李芾廣西祀馬慨武宗時真定祀顏杲卿真卿韶州附祀張九齡子拯沂州祀諸葛亮蕭山祀游酢羅從彥皆歷代名臣事蹟顯著守臣題請禮官議覆事載實錄年月可稽至若有明一代之臣抗美前史者或以功勳或以學行或以直節或以死事臚于志乘刻于碑版匪一而足其大者鄱陽湖忠臣祠祀丁普郎等三十五人南昌忠臣祠祀趙德勝等十四人太平忠臣廟祀花雲王鼎許瑗金華忠臣祠祀胡大海皆太祖自定其典其後通州祀常遇春山海關祀徐達蘇州祀夏原吉周忱淮安祀陳瑄海州衞祀衞青徐安生甘州祀毛忠榆林祀余子俊杭州祀于謙蕭山祀魏驥汀州祀王得仁廣州祀楊信民毛吉雲南祀沐英沐晟貴州祀顧成廬陵祀劉球李時勉廣信祀鄧顒寶慶祀賀興隆上杭祀伍驥丁泉慶遠祀葉禎雲南祀王禕吳雲青田祀劉基平陽祀薛瑄杭州祀鄒濟徐善述金華祀章懋皆衆著耳目炳然可考其他郡縣山川龍神忠烈之士及祈禱有應而祀者會典所載尤詳悉云厲壇泰厲壇祭無祀鬼神春秋傳曰鬼有所歸乃不為厲此其義也祭法王祭泰厲諸侯祭公厲大夫祭族厲士喪禮疾病禱於厲鄭注謂漢時民間皆秋祠厲則此祀達于上下矣然後世皆不舉行洪武三年定制京都祭泰厲設壇玄武湖中歲以清明及十月朔日遣官致祭前期七日檄京都城隍祭日設京省城隍神位於壇上無祀鬼神等位於壇下之東西羊三豕三飯米三石王國祭國厲府州祭郡厲縣祭邑厲皆設壇城北一年二祭如京師里社則祭鄉厲後定郡邑厲鄉厲皆以清明日七月十五日十月朔日
