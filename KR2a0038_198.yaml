body:
  text: 明史卷一百九十八列傳第八十六楊一清王瓊彭澤毛伯溫汪文盛鮑象賢翁萬達楊一清字應寧其先雲南安寧人父景以化州同知致仕攜之居巴陵少能文以奇童薦為翰林秀才憲宗命內閣擇師教之年十四舉鄉試登成化八年進士父喪葬丹徒遂家焉服除授中書舍人久之遷山西按察僉事以副使督學陝西一清貌寢而性警敏好談經濟大略在陝八年以其暇究邊事甚悉入為太常寺少卿進南京太常寺卿弘治十五年用劉大夏薦擢都察院左副都御史督理陝西馬政西番故饒馬而仰給中國茶飲以去疾太祖著令以蜀茶易番馬資軍中用久而寖弛奸人多挾私茶闌出為利番馬不時至一清嚴為禁盡籠茶利於官以服致諸番番馬大集會寇大入花馬池帝命一清巡撫陝西仍督馬政甫受事寇已退乃選卒練兵創平虜紅古二城以援固原築垣瀕河以捍靖虜劾罷貪庸總兵武安侯鄭宏裁鎮守中官冗費軍紀肅然武宗初立寇數萬騎抵固原總兵曹雄軍隔絶不相聞一清帥輕騎自平涼晝夜行抵雄軍為之節度多張疑兵脅寇寇移犯隆德一清夜發火炮響應山谷間寇疑大兵至遁出塞一清以延綏寧夏甘肅有警不相援患無所統攝請遣大臣兼領之大夏請即命一清總制三鎮軍務尋進右都御史一清遂建議修邊其略曰陝西各邊延綏據險寧夏甘肅扼河山惟花馬池至靈州地寬延城堡復疏寇毀牆入則固原慶陽平涼鞏昌皆受患成化初寧夏巡撫徐廷璋築邊牆綿亙二百餘里在延綏者余子俊修之甚固由是寇不入套二十餘年後邊備疏牆塹日夷弘治末至今寇連歲侵略都御史史琳請於花馬池韋州設營衛總制尚書秦紘僅修四五小堡及靖虜至環慶治塹七百里謂可無患不一二年寇復深入是紘所修不足捍敵臣久官陝西頗諳形勢寇動稱數萬往來倏忽未至徵兵多擾費既至召援輒後時欲戰則彼不來持久則我師坐老臣以為防邊之策大要有四修濬牆塹以固邊防增設衛所以壯邊兵經理靈夏以安內附整飭韋州以遏外侵今河套即周朔方漢定襄赫連勃勃統萬城也唐張仁願築三受降城置烽堠千八百所突厥不敢踰山牧馬古之舉大事者未嘗不勞於先逸於後夫受降據三面險當千里之蔽國初舍受降而衛東勝已失一面之險其後又輟東勝以就延綏則以一面而遮千餘里之衝遂使河套沃壤為寇巢穴深山大河勢乃在彼而寧夏外險反南備河此邊患所以相尋而不可解也誠宜復守東勝因河為固東接大同西屬寧夏使河套方千里之地歸我耕牧屯田數百萬畝省內地轉輸策之上也如或不能及今增築防邊敵來有以待之猶愈無策因條具便宜延綏安邊營石潦池至橫城三百里宜設墩臺九百座暖譙九百間守軍四千五百人石潦池至定邊營百六十三里平衍宜牆者百三十一里險崖峻阜可剷削者三十二里宜為墩臺連接寧夏東路花馬池無險敵至仰客兵宜置衛興武營守禦所兵不足宜召募自環慶以西至寧州宜增兵備一人橫城以北黃河南岸有墩三十六宜修復帝可其議大發帑金數十萬使一清築牆而劉瑾憾一清不附己一清遂引疾歸其成者在要害間僅四十里瑾誣一清冒破邊費逮下錦衣獄大學士李東陽王鏊力救得解仍致仕歸先後罰米六百石安化王置鐇反詔起一清總制軍務與總兵官神英西討中官張永監其軍未至一清故部將仇鉞已捕執之一清馳至鎮宣布德意張永旋亦至一清與結納相得甚歡知永與瑾有隙乘間扼腕言曰賴公力定反側然此易除也如國家內患何永曰何謂也一清遂促席畫掌作瑾字永難之曰是家晨夕上前枝附根據耳目廣矣一清慷慨曰公亦上信臣討賊不付他人而付公意可知今功成奏捷請間論軍事因發瑾奸極陳海內愁怨懼變起心腹上英武必聽公誅瑾瑾誅公益柄用悉矯前弊收天下心呂強張承業暨公千載三人耳永曰脫不濟奈何一清曰言出於公必濟萬一不信公頓首據地泣請死上前剖心以明不妄上必為公動苟得請即行事毋須臾緩於是永勃然起曰嗟乎老奴何惜餘年不以報主哉竟如一清策誅瑾永以是德一清左右之得召還拜戶部尚書論功加太子少保賜金幣尋改吏部一清於時政最通練而性闊大愛樂賢士大夫與共功名凡為瑾所搆陷者率見甄録朝有所知夕即登薦門生遍天下嘗再帥關中起偏裨至大將封侯者纍纍然不絶饋謝有所入緣手即散之大盜躪中原一清疏請命將調兵前後凡數上皆報可盜平加少保太子太保廕錦衣百戶再推內閣不用用尚書靳貴而進一清少傅太子太傅給事中王昂論選法弊指一清植私黨帝為謫昂一清更申救優旨報聞乾清宮災詔求直言一清上書言視朝太遲享祀太慢西內創梵宇禁中宿邊兵畿內皇店之害江南織造之擾因引疾乞歸帝慰留之大學士楊廷和憂去命一清兼武英殿大學士入參機務張永尋得罪罷而義子錢寧用事寧故善一清有搆之者因蓄怨會災異一清自劾極陳時政中有狂言惑聖聽匹夫搖國是禁廷雜介胄之夫京師無藩籬之託語譏切近幸帝弗省寧與江彬輩聞之大怒使優人於帝前為蜚語刺譏一清時有考察罷官者嗾武學生朱大周訐一清陰事而以寧為內主給事御史周金陳軾等交章劾大周妄言請究主使帝不聽一清乃力請骸骨歸賜敕褒諭給夫廩如制帝南征幸一清第樂飲兩晝夜賦詩賡和以十數一清從容諷止帝遂不為江浙行世宗為世子時獻王嘗言楚有三傑劉大夏李東陽及一清也心識之及即位廷臣交薦一清乃遣官賜金幣存問諭以宣召期趣使有言一清陳謝特豫一子官中書舍人嘉靖三年十二月戊午詔一清以少傅太子太傅改兵部尚書左都御史總制陝西三邊軍務故相行邊自一清始溫詔褒美比之郭子儀一清至是三為總制部曲皆踴躍喜亦不剌竄西海為西寧洮河害金獻民言撫便獨一清請剿土魯番求貢陳九疇欲絶之一清則請撫時帥諸將肄習行陳嘗曰無事時當如有事隄防有事時當如無事鎮靜會張璁等力排費宏御史吉棠因請還一清內閣給事中章僑御史侯秩等爭之帝謫秩官召一清為吏部尚書武英殿大學士既入見加少師仍兼太子太傅非故事也亡何獻皇帝實録成加太子太師謹身殿大學士一清以不預纂修辭不許王憲奏捷推功一清加特進左柱國華蓋殿大學士費宏已去一清遂為首輔帝賜銀章二曰耆德忠正曰繩愆糾違令密封言事與張璁論張永前功起為提督團營給事中陸粲請增築邊牆推明一清曩時議一清因力從臾之帝為發帑金命侍郎王廷相往然久之亦竟止明倫大典成加正一品俸初大禮議起一清方家居見張璁疏寓書門人喬宇曰張生此議聖人復起不能易也又勸席書早赴召以定大議璁等既驟顯頗引一清帝亦以一清老臣恩禮加渥免常朝日講侍班朔望朝參令晨初始入閣視事御書和章及金幣牢醴之賜甚渥所言邊事國計大小無不傾聽璁與桂萼既攻去費宏意一清必援己一清顧請召謝遷心怨之遷未至璁已入內閣多所更建一清引故事稍裁抑其黨積不平錦衣聶能遷訐璁璁欲置之死一清不可璁怒上疏陰詆一清又嗾黃綰排之甚力一清疏辨言璁以能遷故排己且傍及璁他語因乞骸骨帝為兩解之一清又因災變請戒飭百官和衷復乞宥議禮諸臣罪璁益憾桂萼入內閣亦不相能一清屢求去且言今持論者尚紛更臣獨主安靜尚刻核臣獨主寬平用是多齟齬願避賢者路帝復溫旨褒之而給事中王準陸粲發璁萼招權納賄狀帝立罷璁萼且暴其罪其黨霍韜攘臂曰張桂行勢且及我遂上疏力攻一清言其受張永蕭敬賄一清再疏辨乞罷帝雖慰留之而璁復召還韜攻益急且言法司承一清風指搆成萼罪帝果怒令法司會廷臣雜議出刑部尚書周倫於南京以侍郎許讚代讚乃實韜言請削一清籍帝令一清自陳璁乃三上密疏引一清贊禮功乞賜寬假實以堅帝意俾之去帝果允致仕馳驛歸仍賜金幣明年璁等搆朱繼宗獄坐一清受張永弟容金錢為永志墓又與容世錦衣指揮遂落職閒住一清大恨曰老矣乃為孺子所賣疽發背死遺疏言身被樜衊死且不瞑帝令釋贓罪不問後數年復故官久之贈太保諡文襄一清生而隱宮貌寺人無子博學善權變尤曉暢邊事羽書旁午一夕占十疏悉中機宜人或訾己反薦揚之惟晚與璁萼異為所軋不獲以恩禮終然其才一時無兩或比之姚崇云王瓊字德華太原人成化二十年進士授工部主事進郎中出治漕河三年臚其事為志繼者按稽之不爽毫髮由是以敏練稱改戶部歷河南右布政使正德元年擢右副都御史督漕運明年入為戶部右侍郎衡府有賜地蕪不可耕勒民出租以為常王反誣民趙賢等侵據瓊往按奪旁近民地豫之賢等戍邊民多怨者三年春廷推吏部侍郎前後六人皆不允最後以瓊上許之坐任戶部時邊臣借太倉銀未償所司奏遲尚書顧佐奪俸而瓊改南京已復改戶部八年進尚書瓊為人有心計善鈎校為郎時悉録故牘條例盡得其斂散盈縮狀及為尚書益明習國計邊帥請芻糗則屈指計某倉某場庤糧草幾何諸郡歲輸邊卒歲採秋青幾何曰足矣重索妄也人益以瓊為才十年代陸完為兵部尚書時四方盜起將士以首功進秩瓊言此嬴秦弊政行之邊方猶可未有內地而論首功者今江西四川妄殺平民千萬縱賊貽禍皆此議所致自今內地征討惟以蕩平為功不計首級從之帝時遠遊塞外經歲不還近畿盜竊發瓊請於河間設總兵一人大名武定各設兵備副使一人責以平賊而檄順天保定兩巡撫嚴要害為外防集遼東延綏士馬於行在以護車駕中外恃以無恐孝豐賊湯麻九反有司請發兵剿瓊請密敕勘糧都御史許廷光出不意擒之無一脫者四方捷奏上多推功瓊數受廕賚纍加至少師兼太子太師子錦衣世千戶及營建乾清宮又廕錦衣千戶者二寵遇冠諸尚書十四年寧王宸濠反瓊請敕南和伯方壽祥督操江兵防南都南贛巡撫王守仁湖廣巡撫秦金各率所部趨南昌應天巡撫李充嗣鎮京口淮揚巡撫叢蘭扼儀真奏上帝意欲親征持三日不下大學士楊廷和趣之竟下親征詔命瓊與廷和等居守先是瓊用王守仁撫南贛假便宜提督軍務比宸濠反書聞舉朝惴惴瓊曰諸君勿憂吾用王伯安贛州正為今日賊旦夕擒耳未幾果如其言瓊才高善結納厚事錢寧江彬等因得自展所奏請輒行其能為功於兵部者亦彬等力也陸完敗代為吏部尚書瓊忌彭澤平流賊聲望出己上搆於錢寧中澤危法又陷雲南巡撫范鏞甘肅巡撫李昆副使陳九疇於獄中外多畏瓊而大學士廷和亦以瓊所誅賞多取中旨不關內閣弗能堪明年世宗入繼言官交劾瓊繫都察院獄瓊力訐廷和帝愈不直瓊下廷臣雜議坐交結近侍律論死命戍莊浪瓊復訴年老改戍綏德張璁桂萼霍韜用事以瓊與廷和讎首薦之不納至嘉靖六年有邊警萼力請用瓊不果帝亦憫瓊老病令還籍為民御史胡松因劾萼謫外任其同官周在請宥松並下詔獄萼復言瓊前攻廷和故廷臣羣起排之帝乃命復瓊尚書待用明年遂以兵部尚書兼右都御史代王憲督陝西三邊軍務土魯番據哈密廷議閉關絶其貢四年矣至是其將牙木蘭為酋速檀滿速兒所疑率衆二千求內屬沙州番人帖木哥土巴等素為土魯番役屬者苦其徵求亦率五千餘人入附番人來寇連為參將雲昌等所敗其引瓦剌寇肅州者遊擊彭濬擊退之賊既失援又數失利乃獻還哈密求通貢乞歸羈留使臣而語多謾瓊奏乞撫納帝從兵部尚書王時中議如瓊請霍韜難之瓊再疏請詔還番使通貢如故自是西域復定而北寇常為邊患初入犯莊浪瓊部諸將遮擊之斬數十級俄由紅城子入殺部餉主簿張文明明年以數萬騎寇寧夏已又犯靈州瓊督遊擊梁震等邀斬七十餘人其秋集諸道精卒三萬按行塞下寇聞徙帳遠遁諸軍分道出縱野燒耀兵而還先是南京給事中丘九仞劾瓊帝慰留之及璁萼罷政諸劾璁萼黨者咸首瓊乃令致仕俄寢前詔遣慰諭會番大掠臨洮瓊集兵討若籠板爾諸族焚其巢斬首三百六十撫降七十餘族録功加太子太保瓊在邊戎備甚飭寇嘗入山西得利踰歲復獵境上陽欲東瓊令備其西寇果入大敗之諸番蕩平西陲益靖甘肅軍民素苦土魯番侵暴恐瓊去相率乞守臣奏留於是巡撫唐澤巡按胡明善具陳其功乞如軍民請優詔奬之初帝惡楊廷和疑廷臣悉其黨故連用桂萼方獻夫為吏部及獻夫去帝不欲授他人久不補至十年冬遣行人齎敕召瓊為吏部尚書南京御史馬揚等十人力詆瓊先朝遺奸帝大怒盡逮揚等下詔獄慰諭瓊未幾揚等亦還職花馬池有警兵部尚書王憲請發兵瓊言花馬池備嚴寇不能入大軍至且先退徒耗中國憲竟發六千人比至彰德寇果遁明年秋卒官贈太師諡恭襄是年彭澤已先卒矣當正嘉間澤瓊並有才略相中傷不已亦迭為進退而瓊險忮公論尤不豫然在本兵時功多而其督三邊也人以比楊一清云彭澤字濟物蘭州人幼學於外祖段堅有志節會試二場畢聞母病徑歸母病亦已登弘治三年進士授工部主事歷刑部郎中勢豪殺人澤置之辟中貴為祈免執不聽出為徽州知府澤將遣女治漆器數十使吏送其家澤父大怒趣焚之徒步詣徽澤驚出迓目吏負其裝父怒曰吾負此數千里汝不能負數步耶入杖澤堂下杖已持裝徑去澤益痛砥礪政最人以方前守孫遇遇見循吏傳中父喪歸正德初起知真定閹人數撓禁澤治一棺於廳事以死怵之其人不敢逞遷浙江副使歷河南按察使所至以威猛稱擢右僉都御史巡撫遼東進右副都御史改保定未赴而劉惠趙鐩等亂河南命澤與咸寧伯仇鉞提督軍務討之陳便宜十一事厚賞峻罰以激勸將吏澤體幹修偉腰帶十二圍大音聲與人語若叱咤始至大陳軍容引見諸將校責以畏縮當死諸將校股栗伏罪良久乃釋遂下令鼓行薄賊大小數十戰連破之甫四月賊盡平語詳鉞傳録功進右都御史太子少保廕子錦衣世百戶尋代洪鍾總督川陝諸軍討四川賊時鄢本恕藍廷瑞廖惠曹甫已平惟廖麻子喻思俸猖獗如故澤偕總兵官時源數敗賊部將閻勳追擒麻子於劍州思俸竄通巴間勢復振澤督諸軍圍之卒就擒澤遂移漢中請班師未報而內江榮昌賊復熾澤又移師討平之且平成都亂卒之執知州指揮者請班師益力詔暫留保寧鎮撫進左都御史太子太保廕子如初澤復請還者再乃召還未行會土魯番據哈密執忠順王速檀拜牙郎以其印去投謾書甘肅要索金幣總制鄧璋甘肅巡撫趙鑑以聞請遣大臣經略大學士楊廷和等共薦澤澤久在兵間厭之以鄉土為辭且引疾推璋及咸寧侯鉞可任帝優詔慰勉乃行澤材武知兵然性疏闊負氣經略哈密事頗不當錢寧王瓊等交齮齕之遂因此得罪澤至甘州土魯番方寇赤斤苦峪諸衛遣使索金幣請還哈密澤以番人可利啖也與鑑謀遣哈密都督寫亦虎仙以幣二千銀酒鎗一賂之令還哈密城印未得報輒奏事平乞骸骨召還理院事巡按御史馮時雍言城未歸澤不宜遽召不納初兵部缺尚書廷臣共推澤而王瓊得之且陰阻澤言官多劾瓊者由是有隙澤又使酒常凌瓊瓊愈欲傾之澤時時罵錢寧瓊以語寧寧未信瓊乃邀澤飲匿寧所親屏間挑澤醉罵使聞之寧果大怒會寇大入宣府廷議以許泰將兵澤總制東西兩邊軍務及詔下罷泰不遣又不命澤總制獨令提督兩遊擊兵六千人以行意以困澤澤言臣文臣摧鋒陷陳非臣所能獨任瓊乃奏遣成國公朱輔會寇遁澤還理院事寫亦虎仙者素桀黠雖居肅州陰通土魯蕃酋速檀滿速兒為之耳目據城奪印皆其謀澤初不知而遣之滿速兒以城印來歸留速檀拜牙郎如故虎仙復啖使入寇曰肅州可得也滿速兒悅使其壻馬黑木隨入貢以覘虛實且徵賄澤已還鑑亦遷去李昆代巡撫慮他變質其使於甘州而驅虎仙出關虎仙懼弗去滿速兒聞之怒復取哈密分兵據沙州自率萬騎寇嘉峪關遊擊芮寧與參將蔣存禮禦之寧以七百人先遇寇沙子壩寇圍寧而分兵綴存禮軍寧軍盡沒遂墮城堡縱殺掠詔澤提督三邊軍務往禦會副使陳九疇繫其使失拜煙答及虎仙等內應絶乃復求和澤兵遂罷尋乞骸骨歸馳驛給夫廩如制澤既去瓊追論嘉峪之敗請窮詰增幣者主名錢寧從中下其事大學士梁儲等持之乃已會失拜煙答子訟父冤下法司議釋寫亦虎仙等瓊因請遣給事御史勘失事狀還報無所引瓊遂劾澤妄增金幣遺書議和失信啓釁辱國喪師昆九疇俱宜罪詔斥澤為民昆九疇逮訊昆謫官九疇除名世宗入繼錢寧敗瓊亦得罪御史楊秉中請召澤遂即家起兵部尚書太子太保昆九疇亦復官部事積壞久澤核功罪杜干請兵政一新初正德時廷臣建白戎務奉俞旨者多廢格澤請臚列成書次第修舉又請敕九邊守臣策防禦方略毋畫境自保鎮巡居中調度毋相牽制諸邊各以農隙築牆濬濠修墩臺飭屯堡為經久計內地盜甫息敕守臣練卒伍立保甲懲匿盜不舉者且撫西南諸苗蠻申海禁汰京軍老弱帝咸嘉納詔遣中官楊金鄭斌安川更代鎮守復令張弼劉瑤守涼州居庸澤持不可罷弗遣四川巡撫胡世寧劾分守中官趙欽澤因請盡罷諸鎮守時雖不從其後鎮守竟罷嘉靖元年澤言天下軍官部皆有帖黃籍用以黜陟錦衣獨無於是置籍如諸衛錦衣千戶劉瓚等詔書黜汰復求還官司禮中官蕭敬請補監局工匠千五百人澤皆持不可帝並從之帝將授外戚蔣泰等五人為錦衣澤爭不納在部多所執持會御史史道以訐楊廷和下獄澤復劾道帝因諭言官惟大奸及機密事專疏奏餘只具公疏毋挾私中傷善類詔下給事御史交章劾澤阻言路壞祖宗法帝乃從吏部言停前諭澤不自安纍疏乞休言者復交劾之乃加少保賜敕乘傳歸錦衣百戶王邦奇憾澤嘗抑己上書言哈密失國由澤賂番求和所致語侵楊廷和陳九疇等張璁桂萼方疾廷和遂逮九疇廷訊戍邊澤復奪官為民家居鬱鬱以卒總制尚書唐龍言澤孝友廉直先後討平羣盜功在盟府陛下起之田間俾掌邦政澤孜孜奉國復為讒言搆罷今歿已五年所遺二妾衣食不給請核澤往勞復官加恤以作忠臣之氣不從隆慶初復官諡襄毅毛伯溫字汝厲吉水人祖超廣西知府伯溫登正德三年進士授紹興府推官擢御史巡按福建河南世宗即位中官張鋭張忠等論死其黨蕭敬韋霦陰緩之伯溫請並誅敬霦中官為屏氣嘉靖初遷大理寺丞擢右僉都御史巡撫寧夏李福達獄起坐為大理時失入褫職歸用薦起故官撫山西移順天皆未赴改理院事進左副都御史為趙府宗人祐椋所訐解官候勘已復褫職十五年冬皇嗣生將頒詔外國禮部尚書夏言以安南久失朝貢不當遣使請討之遂起伯溫右都御史與咸寧侯仇鸞治兵待命以父喪辭不許明年五月至京上方略六事會安南世孫黎寧遣陪臣鄭惟僚等訴莫登庸弒逆請興師復讐帝疑其不實命暫緩師敕兩廣雲南守臣勘報而命伯溫協理院事御史何維柏請聽伯溫終制不許伯溫引疾不出至禫除始起視事其冬遷工部尚書十七年春黔國公沐朝輔等以登庸降表至請宥罪許貢先是雲南巡撫汪文盛奏登庸聞發兵進討遣使潛覘帝已敕遵前詔進兵文盛又納安南降人武文淵策具言登庸可破狀復傳檄安南令奉表獻地及是下朝輔奏付廷議僉言不可許乃改伯溫兵部尚書兼右都御史剋期啓行帝以用兵事重無必討意特欲威服之而兵部尚書張瓚無所畫視帝意為可否朝論多主不當興師顧不敢顯諫制下數月兩廣總督侍郎張經以用兵方略上且言須兵三十萬餉百六十萬石欽州知州林希元則極言登庸易取請即日出師瓚不敢決復請廷議議上無成策帝不懌讓瓚師復止命伯溫仍協理院事明年二月帝幸承天詔伯溫總督宣大山西軍務俄選宮僚加兼太子賓客大同所轄鎮邊鎮川弘賜鎮河鎮虜五堡相距二百餘里極邊近賊帳自巡撫張文錦以築堡致亂後無敢議修者伯溫曰變所由生以任用匪人非建議謬也卒營之募軍三千防守給以閒田永除其賦邊防賴焉録功加太子少保是時登庸懼討數上表乞降帝亦欲因撫之遣侍郎黃綰招諭綰多所要求帝怒罷綰再下廷議咸言當討帝從之閏七月命伯溫鸞南征文武三品以下不用命者許軍令從事伯溫等至廣西會總督張經總兵官安遠侯柳珣參政翁萬達張嶽等議徵兩廣福建湖廣狼土官兵凡十二萬五千餘人分三哨自憑祥龍峒思陵州入而以奇兵二為聲援檄雲南巡撫汪文盛帥兵駐蓮花灘亦分三道進部署已定會鸞有罪召還即以珣代十九年秋伯溫等進駐南寧檄安南臣民諭以天朝興滅繼絶之義罪止登庸父子舉郡縣降者以其地授之懸重購購登庸父子而宣諭登庸籍土地人民納款即如詔書宥罪登庸大懼遣使詣萬達乞降詞甚哀萬達送之伯溫所伯溫承制許之宣天子恩威納其圖籍並所還欽州四峒地權令還國聽命馳疏以聞帝大悅詔改安南國為安南都統使司以登庸為都統使世襲置十三宣撫司令自署置伯溫受命歲餘不發一矢而安南定由帝本不欲用兵故也論功加太子太保二十一年正月還朝復理院事邊關數有警伯溫請築京師外城帝已報可給事中劉養直言廟工方興物力難繼乃命暫止其年十月張瓚卒伯溫代為兵部瓚貪黷在部八年戎備盡墮伯溫會廷臣議上防邊二十四事軍令一新言官建議請核實新軍京軍及內府力士匠役以裕國儲伯溫因上濫當革者二十餘條凡錦衣騰驤諸衛御馬內官尚膳諸監素為中貴盤踞者盡在革中帝稱善立命清汰宿弊頗釐而左右近習多不悅二十三年秋順天巡撫朱方以防秋畢請撤客兵未幾寇大入直逼畿輔帝震怒並械總督翟鵬遣戍斃方杖下御史舒汀言方止議撤薊兵而並撤宣大則伯溫與職方郎韓最也帝遂削伯溫籍杖最八十戍極邊伯溫歸疽發背卒穆宗立復官賜恤天啓初追諡襄懋伯溫氣宇沉毅飲啖兼十人臨事決機不動聲色安南之役萬達嶽策為多伯溫力薦於朝二人遂得任用汪文盛字希周崇陽人正德六年進士授饒州推官有顧嵩者挾刃入淮王祐棨府被執誣文盛使刺王下獄訊治久之得白還官事詳淮王傳入為兵部主事偕同官諫武宗南巡杖闕下嘉靖初歷福州知府遷浙江陝西副使皆督學校擢雲南按察使十五年冬廷議將討安南以文盛才就拜右僉都御史巡撫其地黔國公沐朝輔幼兵事一決於文盛副使鮑象賢言剿不如撫文盛然之會聞莫登庸已篡位安南舊臣不服多據地搆兵有武文淵者據宣光以所部萬人降獻進兵地圖且言舊臣阮仁蓮黎景瑂等皆分據一方與登庸抗天兵至號召國中義士諸方並起登庸可擒也文盛以聞授文淵四品章服子弟給冠帶文盛又招安南旁近諸國助討皆聽命乃奏言老撾地廣兵衆可使當一面八百車里孟艮多兵象可備徵調酋長俱未襲職乞免其保勘先授以官彼必鼓勇為用帝悉從之文盛乃檄安南所部以土地歸者仍故職並諭登庸歸命攻破鎮守營方瀛救之失利登庸部衆多來附文盛列營樹柵蓮花灘處之蓮花灘者蒙自縣地當交廣水陸衝為安南腹𩹉登庸益懼請降願修貢因言黎寧阮氏子所持印亦僞文盛以聞朝議不許既而毛伯溫至南寧受登庸降如文盛議安南遂定是役也功成於伯溫然伐謀制勝文盛功為多及論功伯溫及兩廣鎮巡官俱進秩而文盛止賚銀幣奸人唐弼請開大理銀礦帝許之文盛斥其妄下之吏召為大理卿九廟災道病自陳疏少緩令致仕卒賜恤如制從子宗伊字子衡為文盛後嘉靖十七年進士除浮梁知縣纍官兵部郎中楊繼盛劾嚴嵩及其孫鵠冒功事宗伊議不撓忤嵩自免歸隆慶初起南京吏部郎中歷應天府尹裁諸司供億歲省民財萬計萬曆初進南京大理卿三遷戶部尚書總督倉場致仕卒天啓初追諡恭惠鮑象賢歙人由進士授御史歷雲南副使毛伯溫檄文盛會師以象賢領中哨屢遷右副都御史巡撫陝西代石簡撫雲南初元江土舍那鑑殺知府那憲以叛布政使徐樾往招降被殺簡攻之未克坐樾事罷而象賢代之乃集土漢兵七萬以討鑑懼仰藥死擇那氏後立之遷兵部右侍郎總督兩廣軍務賊魁徐銓等糾倭橫海上檄副使汪柏等擊斬之廣西賊黃父將等擾慶遠搗其巢大獲豫象賢一子官入佐南京兵部被劾回籍聽勘家居十年起太僕卿復以右副都御史巡撫山東召拜兵部左侍郎年老引去隆慶初卒翁萬達字仁夫揭陽人嘉靖五年進士授戶部主事再遷郎中出為梧州知府咸寧侯仇鸞鎮兩廣縱部卒為虐萬達縛其尤橫者杖之閲四年聲績大著會朝議將討安南擢萬達廣西副使專辦安南事萬達請於總督張經曰莫登庸大言中國不能正土官弒逆罪安能問我今憑祥州土舍李寰弒其土官珍思恩府土目盧回煽九司亂龍州土舍趙楷殺從子燧暖又結田州人韋應殺燧弟寶斷藤峽瑤侯公丁負固此曹同惡共濟一旦約為內應我且不自保先擒此數人問罪安南易下耳經曰然惟君之所為於是誅寰應擒回招還九司誘殺楷佯繫訟公丁者紿公丁執諸坐以兩軍破平其巢又議割四峒屬南寧降峒豪黃賢相登庸始懼遷浙江右參政經以征安南非萬達不可奏留之乃命以參政涖廣西已而毛伯溫集兵進剿萬達上書伯溫言揖讓而告成功上策也懾之以不敢不從中策也芟夷絶滅終為下策伯溫然之會獲安南諜者丁南傑萬達解其縛厚遇遣之去怵以天朝兵威登庸大懼乃詣伯溫乞降是役也萬達功最賞不逾常格然帝知其能遷四川按察使歷陝西左右布政使二十三年擢右副都御史巡撫陝西尋進兵部右侍郎兼右僉都御史代翟鵬總督宣大山西保定軍務劾罷宣府總兵官郤永副總兵姜奭薦何卿趙卿沈希儀趙卿遂代永萬達謹偵候明賞罰每當防秋發卒乘障陰遣卒傾硃於油察離次者硃其處卒歸輒縛毋敢復離次者嚴殺降禁違輒抵死得降人撫之如所親以是益知敵情寇數萬騎犯大同中路入鐵裹門故總兵官張達力戰却之又犯鵓鴿谷參將張鳳諸生王邦直等戰死萬達與總兵官周尚文備陽和而遣騎四出邀擊頗有斬獲寇登山見官兵大集乃引去事聞賜敕奬賚屢疏請修築邊牆議自大同東路陽和口至宣府西陽河須帑銀二十九萬帝已許之兵部撓其議以大同舊有二邊不當復於邊內築牆帝不聽乃自大同東路天城陽和開山口諸處為牆百二十八里堡七墩臺百五十四宣府西路西陽河洗馬林張家口諸處為牆六十四里敵臺十斬崖削坡五十里工五十餘日成進右都御史發代府宗室充灼等叛謀進左都御史已會宣大山西鎮巡官議上邊防修守事宜其略曰山西起保德州黃河岸歷偏頭抵老營二百五十四里大同西路起丫角山歷中北二路東抵東陽河鎮口臺六百四十七里宣府起西陽河歷中北二路東抵永寧四海冶千二十三里凡千九百二十四里皆逼巨寇險在外所謂極邊也山西老營堡轉南而東歷寧武雁門至平刑關八百里又轉南而東歷龍泉倒馬紫荊之吳王口插箭嶺浮圖峪至沿河口千七十餘里又東北歷高崖白羊至居庸關一百八十餘里凡二千五十餘里皆峻山層岡險在內所謂次邊也外邊大同最難守次宣府次山西之偏老大同最難守者北路宣府最難守者西路山西偏關以西百五十里恃河為險偏關以東百有四里略與大同西路等內邊紫荊寧武雁門為要次則居庸倒馬龍泉平刑邇年寇犯山西必自大同犯紫荊必自宣府先年山西防秋止守外邊偏老一帶歲發班軍六千人備禦大同仍置兵寧雁為聲援比棄極衝守次邊非守要之意宣府亦專備西中二路而北路空虛且連年三鎮防秋徵調遼陝兵馬糜糧賞不訾恐難持久併守之議實為善經外邊四時皆防城堡兵各有分地冬春徂夏不必參錯徵發若泥往事臨時調遣近者數十里遠者百餘里首尾不相應萬一如往年潰牆而入越關而南京師震駭方始徵調何益事機擺邊之兵未可遽罷易曰王公設險以守其國設之云者築垣乘障資人力之謂也山川之險險與彼共垣塹之險險為我專百人之堡非千人不能攻以有垣塹可憑也修邊之役必當再舉夫定規畫度工費二者修邊之事慎防秋併兵力重責成量徵調實邊堡明出塞計供億節財用八者守邊之事因條十事上之帝悉報許乃請帑銀六十萬兩修大同西路宣府東路邊牆凡八百里工成豫一子官萬達精心計善鈎校牆堞近遠濠塹深廣曲盡其宜寇乃不敢輕犯牆內戍者得以暇耕牧邊費亦日省初客兵防秋歲帑金一百五十餘萬添發且數十萬其後減省幾半又議掣山西兵並力守大同巡撫孫繼魯沮之帝為逮繼魯悉納萬達言萬達更事久帝深倚之所請無不從獨言俺答貢事與帝意左先是二十一年俺答阿不孩使石天爵等款鎮遠堡求貢言小王子等九部牧青山豔中國縑帛入掠止人畜所得寡且不能無亡失故令天爵輸誠朝議不納天爵等復至巡撫龍大有執之大有進一官將吏悉遷擢磔天爵於市寇怒大入屠村堡信使絶五年會玉林衛百戶楊威為所掠威詭能定貢市遂釋還俺答阿不孩復遣使款大同左衛塞邊帥家丁董寶等狃天爵前事復殺之以首功報萬達言北敵弘治前歲入貢疆埸稍寧自虞臺嶺之戰覆我師漸輕中國侵犯四十餘年石天爵之事臣嘗痛邊臣失計今復通款即不許當善相諭遣誘而殺之此何理也請亟誅寶等榜塞上明告以朝廷德意解其蓄怨搆兵之謀帝不聽未幾俺答阿不孩復奉印信番文欲詣邊陳款萬達為奏曰今屆秋彼可一逞乃屢被殺戮猶請貢不已者緣入犯則利在部落獲貢則利歸其長處之克當邊患可弭若臣等封疆臣貢亦備不貢亦備不緣此懈也兵部尚書陳經等言敵難信請敕邊臣詰實責萬達十日內回奏萬達還其使與約至期使者不至萬達慮帝督過以使者去無可究為辭已而使狎至牢拒之好言慰答而已俺答以通好散處其衆不設備亦不殺哨卒頃之復至詞益恭萬達又為奏曰敵懇懇求貢去而復來今宣大興版築正當羈縻使無擾請限以地以人以時悉聽即許之貢不聽則曲在彼即拒絶之帝責其瀆奏卒不許蓋是時曾銑有復套之議夏言主之故力絀貢議且以復套事行諸邊臣議之萬達議曰河套本中國故壤成祖三犂王庭殘其部落舍黃河衛東勝後又撤東勝以就延綏套地遂淪失然正統弘治間我未守彼亦未取乃因循畫地守捐天險失沃野之利弘治前我猶歲搜套後乃任彼出入盤據其中畜牧生養譬之為家成業久矣欲一舉復之毋乃不易乎提軍深入山川之險易途徑之迂直水草之有無皆未熟知我馬出塞三日已疲彼騎一呼可集我軍數萬衆緩行持重則備益固疾行趨利則輜重在後即得小利歸師尚艱倘失嚮導全軍殆矣彼遷徙遠近靡常一戰之後彼或保聚或佯遁笳角時動壁壘相持已離復合終不渡河我軍於此戰耶退耶兩相守耶數萬衆出塞亦必數萬衆援之又以驍將通糧道是皆至難而不可任者也夫馳擊者彼所長守險者我所便弓矢利馳擊火器利守險舍火器守險與之馳擊於黃沙白草間大非計議者欲整六萬衆為三歲期春夏馬瘦彼弱我利於征秋冬馬肥彼強我利於守春搜套秋守邊三舉彼必遠遁我乃拒河守夫馬肥瘦我與敵共之即彼弱然坐以待懼其擾擊我及彼強又懼其報復我且六萬之衆千里襲人一舉失利議論蜂起烏能待三即三舉三勝彼敗而守終不渡河版築亦無日議者見近時搗巢獲首功昔年城大同五堡寇不深競以為套易復然搗巢因其近塞乘不備勝則倏歸舉足南向即家門復套則深入其地後援不繼事勢異也往城諸邊近我土彼原不以為利套自其四時駐牧地肯晏然已乎事體異也曰伺彼出套據河守先亟築渡口垣牆以次移置邊堡彼控弦十餘萬豈肯空套出築垣二千餘里豈不日可成堡非百數十不相聯絡堡兵非千人不可居而遊徼瞭望者不與當三十萬衆不止也況循邊距河動輒千里一歲食糜億萬自內輸邊自邊輸河飛挽之艱不可不深慮若令彼有其隙我乘其敝從而圖之未嘗不可今塞下喘息未定邊卒瘡痍未起橫挑強寇以事非常愚所不解也議上不省其後俺答與小王子隙小王子欲寇遼東俺答以其謀告請與中國夾攻以立信萬達不敢聞使者再至為言於朝帝不許二十七年三月萬達又言諸部求貢不遂慚且憤聲言大舉犯邊乞令邊臣得便宜從事帝怒切責之通貢議乃絶其年八月俺答犯大同不克退攻五堡官軍戰彌陀山却之趨山西復敗還踰月犯宣府大掠永寧隆慶懷來軍民死者數萬萬達坐停俸二級俄録彌陀山功還其俸俺答將復寇宣府總兵官趙卿怯萬達奏以周尚文代未至寇犯滴水崖指揮董暘江瀚唐臣張淮等戰死遂南下駐隆慶石河營分遊騎東掠遊擊王鑰大同遊擊袁正却之寇移而南會尚文萬騎至參將田琦騎千餘與合連戰曹家莊斬四首搴其旗寇據險不退萬達督參將姜應熊等馳赴順風鼓譟揚沙蔽天寇驚曰翁太師至矣是夜東去諸將追擊連敗之帝偵萬達督戰狀大喜立進兵部尚書兼右副都御史尋召理部事以父憂歸明年秋大同失事督撫郭宗皋陳耀被逮詔起萬達代宗皋萬達方病疽廬墓間疏請終制未達而俺答犯都城兵部尚書丁汝夔得罪遂即以萬達代之萬達家嶺南距京師八千里倍道行四十日抵近京時寇氛熾帝日夕徯萬達至遲之以問嚴嵩嵩故不悅萬達言寇患在肘腋諸臣觀望非君召不俟駕之義帝遂用王邦瑞於兵部不數日萬達至具疏自明帝責其欺慢念守制姑奪職聽別用仇鸞時為大將軍寵方盛銜宿怨讒言搆於帝萬達遂失眷降兵部右侍郎兼右僉都御史經略紫荊諸關三十年二月京察自陳乞終制帝疑其避事免歸瀕行疏謝復摘訛字為不敬斥為民明年十月兵部尚書趙錦以附仇鸞戍邊復起萬達代之未聞命卒年五十五萬達事親孝父歿負土成墳好談性命之學與歐陽德羅洪先唐順之王畿魏良政善通古今操筆頃刻萬言為人剛介坦直勇於任事履艱危意氣彌厲臨陳嘗身先士卒尤善御將士得其死力嘉靖中邊臣行事適機宜建言中肯窾者萬達稱首隆慶中追諡襄毅贊曰楊一清王瓊俱負才略著績邊陲有人倫鑒鋤奸定難因以成功亦俱任智數然瓊其權譎之尤歟彭澤望甚偉顧處置哈密抑何舛也毛伯溫能任翁萬達張嶽以成安南之功不失為持重將萬達飭邊備整軍實其爭復套知彼知己尤深識遠慮云
