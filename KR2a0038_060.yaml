body:
  text: 明史卷六十志第三十六禮十四凶禮三謁祭陵廟忌辰受蕃國王訃奏儀為王公大臣舉哀儀臨王公大臣喪儀中宮為父祖喪儀遣使臨弔儀遣使册贈王公大臣儀賜祭葬喪葬之制碑碣賜諡品官喪禮士庶人喪禮服紀謁祭陵廟洪武元年三月遣官致祭仁祖陵二年加號英陵禮部尚書崔亮請下太常行祭告禮博士孫吾與言山陵之制莫備於漢初未有祭告之禮蓋廟號陵號不同廟號易大行之號必上册諡告之神明陵號則後嗣王所以識別先後而已願罷英陵祭告亮言漢光武加先陵曰昌宋太祖加高曾祖考陵曰欽康定安蓋尊祖考則尊其陵尊其陵則必以告禮緣人情告之是廷議皆是亮從之熙祖陵每歲正旦清明中元冬至及每月朔望本署官供祭行禮又即其地望祭德祖懿祖二陵英陵後改稱皇陵多孟冬一祭俱署官行禮朔望中都留守司官行禮八年詔翰林院議陵寢朔望節序祭祀禮學士樂韶鳳等言漢諸廟寢園有便殿日祭於寢月祭於廟時祭於便殿後漢都洛陽以關西諸陵久遠但四時用特牲祀每西幸即親詣歲正月祀郊廟畢以次上洛陽諸陵唐園陵之制皇祖以上陵皆朔望上食元日冬至寒食伏臘社各一祭皇考陵朔望及節祭日進食又薦新於諸陵永徽二年定獻陵朔望冬夏至伏臘清明社等節皆上食開元中敕獻昭乾定橋恭六陵朔望上食冬至寒食各設一祭宋每歲春秋仲月遣太常宗正卿朝諸陵我朝舊儀每歲元旦清明七月望十月朔冬至日俱用太牢遣官致祭白塔二處則用少牢中官行禮今擬如舊儀增夏至日用太牢其伏臘社每月朔望則用特羊祠祭署官行禮如節與朔望伏臘社同日則用節禮從之十六年孝陵殿成命皇太子以牲醴致祭清晨陳祭儀畢皇太子親王由東門入就殿中拜位皆四拜皇太子少前三上香奠酒讀祝曰園陵始營祭享之儀未具今禮殿既成奉安神位謹用祭告遂行亞獻終獻禮皇太子以下皆四拜執事行禮皆內官二十六年令車馬過陵及守陵官民入陵者百步外下馬違者以大不敬論建文初定孝陵每歲正旦孟冬忌辰聖節俱行香清明中元冬至俱祭祀勳舊大臣行禮文武官陪祀若親王之藩過京師者謁陵官員以公事至入城者謁陵出城者辭陵國有大事遣官祭告懿文太子陵在孝陵左四孟清明中元冬至歲暮及忌辰凡九祭永樂元年工部以泗州祖陵黑瓦為言帝命易以黃如皇陵制宣宗即位遣鄭王謁祭孝陵正統二年諭天壽山陵寢剪伐樹木者重罪都察院榜禁錦衣衛官校巡視工部欽天監官環山立界十年謁三陵諭百官具淺色衣服如洪武永樂例南京司禮太監陳祖圭言魏國公徐俌每祭孝陵皆由紅券門直入至殿內行禮僭妄宜改俌言入由紅券門者所以重祖宗之祭尊皇上之命出由小旁門者所以守臣下之分循守故事幾及百年豈敢擅易下禮部議言長陵及太廟遣官致祭所由之門與孝陵事體相同宜如舊從之弘治元年遣內官監護鳳陽皇陵凡官員以公事經過者俱謁陵十七年更裕陵神座初議以孝肅太皇太后祔葬裕陵已遣官分告諸陵及天壽山后土而欽天監以為歲殺在北方向不利內官監亦謂英廟陵寢難以輕動遂議別建廟奉安神主帝心未慊卒移英廟居中孝莊居左孝肅祔其右云正德間定長陵以下諸陵各設神宮監並衛及祠祭署凡清明中元冬至俱分遣駙馬都尉行禮文武官陪祭忌辰及正旦孟冬聖節亦遣駙馬都尉行禮親王之藩詣諸陵辭謁恭讓章皇后陵清明中元冬至忌辰內官行禮西山景皇帝陵祭期如上儀賓行禮初成祖易黃土山名天壽山嘉靖十年名祖陵曰基運山皇陵曰翌聖山孝陵曰神烈山顯陵曰純德山及天壽山並方澤從祀所在有司祭告各陵山祇禮官因奏神祇壇每年秋祭有鍾山天壽山之神今宜增基運等山從之十四年諭禮部尚書夏言清明節既遣官上陵內殿復祭似涉煩復言因言我朝祀典如特享時享祫祭禘祭足應經義可為世法惟上陵及奉先殿多沿前代故事上陵之祀每歲清明中元冬至凡三中元俗節事本不經往因郊祀在正首故冬至上陵蓋重一氣之始伸報本之義今冬至既行大報配天之禮則陵事為輕況有事南郊乃輟陪祀臣僚遠出山陵恐於尊祖配天之誠未盡可罷冬至上陵而移中元於霜降惟清明如舊蓋清明禮行於春所謂雨露既濡君子履之有怵惕之心者也霜降禮行於秋所謂霜露既降君子履之有悽愴之心者也二節既遣官上陵則內殿之祭誠不宜復遂著為令十五年諭言曰廟重於陵其禮嚴故廟中一帝一后陵則二三后配葬今別建奉慈殿不若奉主於陵殿為宜且梓宮配葬而主乃別置近於黜之非親之也乃遷孝肅孝穆孝惠三后神主於陵殿又諭言曰三后神主稱皇太后太皇太后者乃子孫所奉尊稱今既遷陵殿則名實不準言等議曰三后神主禮不祔廟義當從祧遷奉陵殿深合典禮其稱皇太后太皇太后者乃子孫所上尊號今已遷奉於陵則當從夫婦之義改題孝肅神主不用睿字孝穆孝惠神主俱不用純字則嫡庶有別而尊親併隆矣命如擬行又諭祭告長陵等七陵俱躬叩拜恭讓章皇后景皇帝陵亦展拜一次以慰追感之情十七年改陵殿曰恩殿門曰恩門又建成祖聖迹亭於平臺山率從官行祭禮二十一年工部尚書顧璘請以帝所上顯陵聖製歌詩製為樂章享獻陵廟禮部言天壽山諸陵歲祀皆不用樂已而承天府守備太監傅霖乞增顯陵歲暮之祭部議言諸陵皆無歲暮祀典詔並從部議隆慶二年帝詣天壽山春祭前一日告世宗几筵及奉先弘孝神霄殿駕至天壽山紅門降輿由左門入升輿駐蹕感思殿越二日質明行禮帝青袍乘板輿至長陵門外東降輿由殿左門入至拜位上香四拜至神御前獻帛獻爵訖復位亞獻終獻令執爵者代復四拜餘如常祭之儀隨詣永陵行禮是日遣官六員俱青服分祭六陵萬曆八年謁陵禮如舊十一年復謁陵禮部言宜遵世宗彝憲酌分二日以次展拜乃定長永昭三陵上香八拜親奠帛初獻六陵二寢上香四拜其奠帛三獻俱執事官代十四年禮部言諸妃葬金山諸處者嘉靖中俱配享各陵殿罷本墳祭今世廟諸妃安厝西山者宜從其例至陵祭品物九陵恭讓恭仁之陵止於酒果而越靖諸王及諸王妃則又有牲果祝文反從其厚者蓋以九陵帝后歲暮已祫祭於廟旬日內且復有孟春之享故元旦陵殿止用酒果非儉也諸王諸妃則祫祭春祭皆不與元旦一祭不宜從簡故用牲帛祝文非豐也特恭讓恭仁既不與祫享於廟中又不設牲帛於陵殿是則禮文之缺宜增所未備而諸王諸妃祝文尚仍安厝時所用宜改歲時遣官之意則情順禮安報可凡山陵規制有寶城長陵最大徑一百一丈八尺次永陵徑八十一丈各陵深廣丈尺有差正前為明樓樓中立帝廟諡石碑下為靈寢門惟永陵中為券門左右牆門各一樓明樓前為石几筵又前為恩殿恩門殿惟長陵重簷九間左右配殿各十五間永陵重簷七間配殿各九間諸陵俱殿五間配殿五間門外神庫或一或二神廚宰牲亭有聖迹碑亭諸陵碑俱設門外率無字長陵迤南有總神道有石橋有石像人物十八對擎天柱四石望柱二長陵有神功聖德碑仁宗御撰在神道正南南為紅門門外石牌坊一門內有時陟殿為車駕更衣之所永陵稍東有感思殿為駐蹕之所殿東為神馬廠忌辰洪武八年四月仁祖忌日太祖親詣皇陵致祭永樂元年禮部尚書李至剛等奏定高皇帝忌辰前二日帝服淺淡色衣御西角門視事不鳴鐘鼓不行賞罰不舉音樂禁屠宰百官淺淡色衣黑角帶朝參至日親祀於奉先殿仍率百官詣孝陵致祭高皇后忌辰如之宣德四年令凡遇忌辰通政司禮科兵馬司勿引囚奏事五年敕百官朝參輟奏事儀英宗即位召禮臣及翰林院議忌辰禮大學士楊士奇楊榮學士楊溥議每歲高廟帝后文廟帝后仁宗忌辰服淺淡色服不鳴鐘鼓於奉天門視事宣宗忌辰小祥之日於西角門視事從之弘治十四年令凡遇忌辰朝參官不得服紵絲紗羅衣景皇帝恭讓皇后忌辰遇節令服青絲花樣宣宗忌辰遇祭祀服紅十六年八月吏部尚書馬文升言宣德間仁宗忌辰諸司悉免奏事自太祖至仁宗生忌俱輟朝其後不知何時仁宗忌辰依前奏事惟太祖至憲宗忌辰百官淺淡色服黑角帶朝廷亦出視朝鳴鐘鼓奏事臣思自仁至憲世有遠近服有隆殺請自仁宗忌辰英宗生忌日視朝鳴鐘鼓若遇憲宗及孝穆皇太后忌日不視朝著淺淡服進素膳不預他事或遵宣宗時例自太祖至憲宗生忌俱輟朝一日憲宗孝穆忌日如臣所擬帝下禮部議部臣言經傳所載忌日為親死之日則死日為忌非謂生辰也其曰忌日不用不以此日為他事也曰忌日不樂是不可舉吉事也此日當專意哀思父母餘事皆不舉但先朝事例迄今見行未敢更易帝乃酌定以淺淡服色視事嘉靖七年令忌辰只祭本位十八年令高廟帝后忌辰祭於景神殿列聖帝后忌辰祭於永孝殿二十四年令仍祭於奉先殿乘輿受蕃國王訃奏儀凡蕃國王薨使者訃奏至於西華門內壬地設御幄皇帝素服乘輿詣幄太常卿奏某國世子遣陪臣某官某奏某國王臣某薨承制官至使者前宣制曰皇帝致問爾某國王某得何疾而逝使者答故其儀大略如臨王公大臣喪儀但不舉哀凡塞外都督等官訃至永樂間遣官香鈔諭祭後定例因其奏請給與表𩹉祭文令攜歸自祭來京病故者遣官諭祭或賜棺賜葬後定年終類奏遣官祭之若在邊歿於戰陳者不拘此例凡外國使臣病故者令所在官司賜棺及祭或欲歸葬者聽乘輿為王公大臣舉哀儀洪武二年開平王常遇春卒於軍訃至禮官請如宋太宗為趙普舉哀故事遂定制凡王公薨訃報太常司示百官於西華門內壬地設御幄陳御座置素褥設訃者位於前設百官陪哭位東西向奉慰位於訃者位北北向贊禮二人位於訃者位之北引訃者二人位於贊禮之南引百官四人位於陪位之北皆東西向其日備儀仗於奉天門迎駕皇帝素服乘輿詣幄樂陳於幄之南不作太常卿奏某官來訃某年月日臣某官以某疾薨請舉哀皇帝哭百官皆哭太常卿奏止哭百官奉慰訖分班立訃者四拜退太常卿奏禮畢乘輿還宮百官出東宮為王公舉哀儀同但設幄於東宮西門外陪哭者皆東宮屬乘輿臨王公大臣喪儀凡王公大臣訃奏太史監擇皇帝臨喪日期拱衛司設大次於喪家大門外設御座於正廳中有司設百官次於大次之左右侍儀司設百官陪立位於廳前左右引禮四人位於百官之北東西向設喪主以下拜位於廳前主婦以下哭位於殯北幔中其日鑾駕至大次降輅升輿入易素服百官皆易服先入就廳前分班侍立御輿出次喪主以下免絰去杖衰服出迎於大門外望見乘輿止哭再拜入於門內之西乘輿入門將軍四人前導四人後從入至正廳降輿升詣靈座前百官班於後皇帝哭百官皆哭太常卿奏止哭三上香三祭酒出至正廳御座主喪以下詣廳下拜位再拜承制官詣喪主前云有制喪主以下皆跪宣制訖皆再拜退立於廳西太常卿奏禮畢皇帝升輿出就大次易服御輿出喪主以下詣前再拜退皇帝降輿升輅喪主杖哭而入諸儀衛贊唱大略如常其公侯卒葬輟朝禮洪武二十三年定凡公侯卒於家者聞喪輟朝三日下葬一日卒於外者聞喪一日柩至京三日下葬仍一日凡輟朝之日不鳴鐘鼓各官淺淡色衣朝參初制都督至都指揮卒輟朝二日永樂後更定惟公侯駙馬伯及一品官輟朝一日中宮為父祖喪儀凡中宮父母薨訃報太常寺轉報內使監前期設薦於別殿東壁下為皇后舉哀位及內命婦以下哭位皇后出詣別殿內使監令奏考某官以某月某日薨母則云妣某夫人祖考妣同皇后哭內命婦以下皆哭盡哀皇后問故又哭盡哀乃素服內命婦皆素服止哭還宮內使監令奏聞得旨皇后奔喪喪家設薦席於喪寢之東從臨內命婦哭位於其下主喪以下哭位於喪寢之西主婦以下哭位於喪寢之北幔下至日內使監進堊車備儀仗導引皇后素服出宮升輿三面白布行帷至閣外降輿升堊車至喪家大門內降車哭入仍以行帷圍護從臨者皆哭入喪主以下降詣西階下立哭皇后升自東階進至尸東憑尸哭從臨者皆哭喪主升自西階俱哭於尸西皇后至哭位內使監令跪請止哭應奉慰者詣皇后前奉慰如常禮如皇后候成服則從臨命婦應還者先還如本日未即奔喪則是晡復哭於別殿尚服製皇后齊衰及從臨命婦孝服俟喪家成服日進之詣靈前再拜上香復位再拜如為諸王外戚舉哀仍於別殿南向不設薦位遣使臨弔儀太常司奉旨遣弔前期設宣制位於喪家正廳之北南向喪主受弔位於南北向婦人立哭位於殯北幕下其日使者至喪主去杖免絰衰服止哭出迎於中門外復先入就廳前拜位內外止哭使者入就位稱有制喪主以下再拜跪宣制曰皇帝聞某官薨遣臣某弔喪主以下復再拜禮畢內外皆哭使者出喪主至中門外拜送杖哭而入宮使則稱有令至遣使賻贈及致奠其儀節亦相倣云賻贈之典一品米六十石麻布六十匹二品以五三品四品以四五品六品以三公侯則以百永樂後定制公侯駙馬伯皆取上裁凡陳亡者全支邊遠守禦出征及出海運糧病故半支其遣百官會王公大臣喪儀前期有司於喪家設位次其日百官應會弔者素服至喪主以下就東階哭位主婦以下就殯北哭位百官入就殯前位哭主喪主婦以下皆哭止哭再拜主喪以下答拜班首詣喪主前展慰畢百官出喪主拜送杖哭而入會葬儀同遣使册贈王公大臣儀前期禮部奏請製册翰林院取旨製文中書省禮部奏請某官為使其日祠祭司設龍亭香亭於午門前正中執事於受册者家設宣制官位於正廳之東北南向喪主代受册命者位於廳前北向禮部官封册文以盝匣盛之黃袱裹置龍亭中儀仗鼓樂前導至其家代受册者出迎於大門外執事舁龍亭置廳上正中使者入立於東北代受册者就拜位再拜使者稍前稱有制代受册者跪宣制曰皇帝遣臣某册贈故某官某為某勳某爵宣訖代受册者復再拜使者取册授之代受册者捧置靈座前使者出代受册者送至大門外如不用册者吏部用誥命喪家以册文録黃設祭儀於靈前代受册者再拜執事者展黃立讀於左喪主以下皆再拜焚黃賜祭葬洪武十四年九月衍聖公孔希學卒遣官致祭其後羣臣祭葬皆有定制太祖諭祭羣臣文多出御筆嘉靖中世宗為禮部尚書席書兵部尚書李承勛親製祭文皆特典非常制也隆慶元年十二月禮部議上恤典條例凡官員祭葬有無隆殺之等悉遵會典其特恩如侍從必日侍講讀軍功必躬履行陳東宮官必出閣講授有勞者據嘉靖中事例祭葬加一等無祭者與祭一壇無葬者給半葬半葬者給全葬講讀官五品本身有祭四品及父母三品及妻軍功四品得祭葬三品未滿及父母講讀年久啓沃功多軍旅身殲勳勞茂著者恩恤加厚臨期請旨會典凡一品官祭九壇父母妻加祭或二壇一壇或妻止一壇者恩難預擬遇有陳乞酌擬上請二品二壇加東宮三少或兼大學士贈一品者至四壇父母妻俱一壇致仕加三少者加一壇加太子太保者加三壇妻未封夫人者不祭三品祭葬在任致仕俱一壇兼學士贈尚書者二壇未及考滿病故者一壇減半造葬悉如舊例四五品官不得重封故四品官由六七品升者父母有祭由五品升者以例不重封遂不得祭今定四品官凡經考滿者父母雖止授五品封亦與祭一壇四品以上官本身及父母恩典必由考滿而後得然有二品三品共歷四五年父母未授三品封終不得霑一祭者宜並年資二品三品共歷三年以上者雖未考三品滿本身及父母俱與三品祭葬三品四品共歷三年以上者雖未考四品滿本身用三品未考滿例祭一壇半葬父母祭一壇凡被劾間住者雖遇覃恩復致仕仍不給祭葬勳臣祭葬皇親出自上裁駙馬都尉祭十五壇公侯伯在內掌府事坐營在外總兵有殊勳加太子太保以上者遵會典公侯十六壇伯十五壇掌府坐營總兵有勳勞者七壇掌府坐營年勞者五壇掌府坐營而政迹未著者四壇管事而被劾勘明間住者二壇被劾未經勘實者一壇勘實罪重者並本爵應得祭葬皆削又正德間公侯伯本祭俱三壇嘉靖間二壇今遵嘉靖例以復會典之舊武臣祭葬遵正德嘉靖例都督同知僉事錦衣衛指揮祭三壇署都督同知僉事一壇餘推類行之帝從其議萬曆六年更定凡致仕養病終養聽用等官祭葬俱與現任官同十二年續定被劾自陳致仕官有日久論定原無可議者仍給祭葬父母妻視本身為差等喪葬之制洪武五年定凡襲衣三品以上三四品五品二六品以下一飯含五品以上飯稷含珠九品以上飯梁含小珠銘旌絳帛廣一幅四品以上長九尺六品以上八尺九品以上七尺斂衣品官朝服一襲常服十襲衾十番靈座設於柩前用白絹結魂帛以依神棺椁品官棺用油杉朱漆椁用土杉牆翣公侯六三品以上四五品以上二明器公侯九十事一品二品八十事三品四品七十事五品六十事六品七品三十事八品九品二十事引者引車之紼也披者以纁為之繫於輀車四柱在旁執之以備傾覆者也鐸者以銅為之所以節挽歌者公侯四引六披左右各八鐸一品二品三引四披左右各六鐸三品四品二引二披左右各四鐸五品以下二引二披左右各二鐸羽幡竿長九尺五品以上一人執之以引柩六品以下不用功布品官用之長三尺方相四品以上四目七品以上兩目八品以下不用柳車上用竹格以綵結之旁施帷幔四角重流蘇志石二片品官皆用之其一為蓋書某官之墓其一為底書姓名鄉里三代生年卒葬月日及子孫葬地婦人則隨夫與子孫封贈二石相向鐵束埋墓中祭物四品以上羊豕九品以上豕初洪武二年敕葬開平王常遇春於鍾山之陰給明器九十事納之墓中鉦二鼓四紅旗拂子各二紅羅蓋鞍籠各一弓二箭三竈釜火爐各一俱以木為之水罐甲頭盔臺盞壺瓶酒甕唾壺水盆香爐各一燭臺二香盒香匙各一香筯二香匙筯瓶茶鍾茶盞各一筯二匙二匙筯瓶一碗二楪十二橐二俱以錫造金裹之班劍牙仗各一金裹立瓜骨𩽆響節各二交椅腳踏馬杌各一誕馬六槍劍斧弩食桌牀屏風拄杖箱交牀香桌各一凳二俱以木為之樂工十六執儀仗二十四控士六女使十青龍白虎朱雀玄武神四門神二武士十並以木造各高一尺雜物翣六璧一筐笥楎椸襟鞶各一笣二筲二糧漿瓶二油瓶一紗廚暖帳各一束帛青三段纁二段每段長一丈八尺後定制公侯九十事者準此行之餘以次減殺碑碣明初文武大臣薨逝例請於上命翰林官製文立神道碑惟太祖時中山王徐達成祖時榮國公姚廣孝及弘治中昌國公張巒治先塋皆出御筆其制自洪武三年定五品以上用碑龜趺螭首六品以下用碣方趺圓首五年復詳定其制功臣歿後封王螭首高三尺二寸碑身高九尺廣三尺六寸龜趺高三尺八寸一品螭首二品麟鳳蓋三品天祿辟邪蓋四品至七品方趺首視功臣歿後封王者遞殺二寸至一尺八寸止碑身遞殺五寸至五尺五寸止其廣遞殺二寸至二尺二寸止趺遞殺二寸至二尺四寸止墳塋之制亦洪武三年定一品塋地周圍九十步墳高一丈八尺二品八十步高一丈四尺三品七十步高一丈二尺以上石獸各六四品四十步七品以下二十步高六尺五年重定功臣歿後封王塋地周圍一百步墳高二丈四圍墳牆高一丈石人四文武各二石虎羊馬石望柱各二一品至六品塋地如舊制七品加十步一品墳高一丈八尺二品至七品遞殺二尺一品墳牆高九尺二品至四品遞殺一尺五品四尺一品二品石人二文武各一虎羊馬望柱各二三品四品無石人五品無石虎六品以下無當太祖時盱眙揚王墳置守戶二百一十宿州徐王墳置墳戶九十三滁州滁陽王墳亦置墳戶四年又賜功臣李善長徐達常茂馮勝墳戶百五十鄧愈唐勝宗陸仲亨華雲龍顧時陳德耿炳文吳楨孫恪郭興墳戶百成化十五年南京禮部言常遇春李文忠等十四人勳臣墳墓俱在南京城外文忠曾孫萼等以歲久頽壞為言請命工修治帝可其奏且令無子孫者復墓旁一人守護之賜諡親王例用一字郡王二字文武大臣同與否自上裁若官品未高而侍從有勞或以死勤事者特賜諡非常例洪武初有應得諡者禮部請旨令禮部行翰林院擬奏弘治十五年定制凡親王薨行撫按郡王病故行本府親王及承奉長史核勘以奏乃議諡文武大臣請諡禮部取旨行吏兵部考實迹禮部定三等行業俱優者為上頗可者為中行實無取者為下送翰林院擬諡有應諡而未得者撫按科道官以聞按明初舊制諡法自十七字至一字各有等差然終高帝世文臣未嘗得諡武臣非贈侯伯不可得魯秦二王曰荒曰愍至建文諡王禕成祖諡胡廣文臣始有諡逮世宗則濫及方士且加四字矣定例三品得諡詞臣諡文然亦有得諡不止三品諡文不專詞臣者或以勳勞或以節義或以望實破格崇褒用示激勸其冒濫者亦間有之萬曆元年禮臣言大臣應得諡者宜廣詢嚴核應諡而未請者不拘遠近撫按科道舉奏酌議補給十二年禮臣言大臣諡號必公論允服毫無瑕疵者具請上裁如行業平常即官品雖崇不得概豫帝皆從之三十一年禮部侍郎郭正域請嚴諡典議奪者四人許論黃光升呂本范謙應奪而改者一人陳瓚補者七人伍文定吳悌魯穆楊繼宗鄒智楊源陳有年閣臣沈一貫朱賡力庇呂本不從其議未幾御史張邦俊請以呂柟從祀孔廟而論應補諡者雍泰魏學曾等十四人部議久之共彙題先後七十四人留中不發天啓元年始降旨俞允又增續請者十人而邦俊原請九人不與正域所請伍文定等亦至是始定凡八十四人其官卑得諡者鄒智劉臺魏良弼周天佐楊允繩沈鍊楊源黃鞏楊慎周怡莊馮應京皆以直諫孟秋張元忭曹端賀欽陳茂烈馬理陶望齡皆以學行張銓以忠義李夢陽以文章魯穆楊繼宗張朝瑞朱冠傅新德張允濟皆以清節楊慎之文憲莊之文節則又兼論文學云三年禮部尚書林堯俞言諡典五年一舉自萬曆四十五年至今蒙恤而未諡者九卿臺省會議與臣部酌議帝可之然是時遲速無定六年禮科給事中彭汝楠言耳目近則覩記真宜勿逾五年之限又謂三品以上為當豫諡而建文諸臣之忠義陶安等之參帷幄葉琛等之殉行間皆宜補諡事下禮部以建文諸臣未易輕擬不果行至福王時始從工科給事中李清言追諡開國功臣李善長等十四人正德諫臣蔣欽等十四人天啓慘死諸臣左光斗等九人而建文帝之弟允熥允熞允子文奎亦皆因清疏追補品官喪禮品官喪禮載在集禮會典者本之儀禮士喪稽諸唐典又參以朱子家禮之編通行共曉茲舉大要其儀節不具録凡初終之禮疾病遷於正寢屬纊俟絶氣乃哭立喪主主婦護喪以子孫賢能者治棺訃告設尸牀帷堂掘坎設沐具沐者四人六品以下三人乃含置虛座結魂帛立銘旌喪之明日乃小斂又明日大斂蓋棺設靈牀於柩東又明日五服之人各服其服然後朝哭相弔既成服朝夕奠百日而卒哭乃擇地三月而葬告后土遂穿壙刻志石造明器備大輿作神主既發引至墓所乃窆施銘旌志石於壙內掩壙復土乃祠后土於墓題主奉安升車反哭凡虞祭葬之日日中而虞柔日再虞剛日三虞若去家經宿以上則初虞於墓所行之墓遠途中遇柔日亦於館所行之若三虞必俟至家而後行三虞後遇剛日卒哭明日祔家廟期而小祥喪至此凡十三月不計閏古卜日祭今止用初忌喪主乃易練服再期而大祥喪至此凡二十五月亦止用第二忌日祭陳禫服告遷於祠堂改題神主遞遷而西奉神主入於祠堂徹靈座奉遷主埋於墓側大祥後間一月而禫喪至此計二十有七月卜日喪主禫服詣祠堂祗薦禫事其在遠聞喪者始聞易服哭而行至家憑殯哭四日而成服若未得行則設位四日而變服若既葬則先哭諸墓歸詣靈座前哭四日成服齊衰以下聞喪為位而哭若奔喪則至家成服若不奔喪四日成服凡有改葬者孝子以下及妻妾女子子俱緦麻服周親以下素服不設祖奠無反哭無方相魌頭餘如常葬之儀既葬就吉帷靈座前一虞孝子以下出就別所釋緦服素服而還洪武二十六年四月除期服奔喪之制先是百官聞祖父母伯叔兄弟喪俱得奔赴至是吏部言祖父母伯叔兄弟皆係期年服若俱令奔喪守制或一人連遭五六期喪或道路數千里則居官日少更易繁數曠官廢事今後除父母祖父母承重者丁憂外其餘期喪不許奔但遣人致祭從之士庶人喪禮集禮及會典所載大略倣品官制稍有損益洪武元年御史高元侃言京師人民循習舊俗凡有喪葬設宴會親友作樂娛尸竟無哀戚之情甚非所以為治乞禁止以厚風化乃令禮官定民喪服之制五年詔定庶民襲衣一稱用深衣一大帶一履一雙裙袴衫襪隨所用飯用粱含錢三銘旌用紅絹五尺斂隨所有衣衾及親戚襚儀隨所用棺用堅木油杉為上柏次之土杉松又次之用黑漆金漆不得用硃紅明器一事功布以白布三尺引柩柳車以衾覆棺志石二片如官之儀塋地圍十八步祭用豕隨家有無又詔古之喪禮以哀戚為本治喪之具稱家有無近代以來富者奢僭犯分力不足者稱貸財物誇耀殯送及有惑於風水停柩經年不行安葬宜令中書省臣集議定制頒行遵守違者論罪又諭禮部曰古有掩骼埋胔之令近世狃元俗死者或以火焚而投其骨於水傷恩敗俗莫此為甚其禁止之若貧無地者所在官司擇寬間地為義冢俾之葬埋或有宦遊遠方不能歸葬者官給力費以歸之服紀明初頒大明令凡喪服等差多因前代之舊洪武七年孝慈録成復圖列於大明令列示中外先是貴妃孫氏薨敕禮官定服制禮部尚書牛諒等奏曰周儀禮父在為母服期年若庶母則無服太祖曰父母之恩一也而低昂若是不情甚矣乃敕翰林院學士宋濂等曰養生送死聖王大政諱亡忌疾衰世陋俗三代喪禮散失於衰周厄於暴秦漢唐以降莫能議此夫人情無窮而禮為適宜人心所安即天理所在爾等其考定喪禮於是濂等考得古人論服母喪者凡四十二人願服三年者二十八人服期年者十四人太祖曰三年之喪天下通喪觀願服三年視願服期年者倍豈非天理人情之所安乎乃立為定制子為父母庶子為其母皆斬衰三年嫡子衆子為庶母皆齊衰杖期仍命以五服喪制並著為書使內外遵守其制服五曰斬衰以至粗麻布為之不縫下邊曰齊衰以稍粗麻布為之縫下邊曰大功以粗熟布為之曰小功以稍粗熟布為之曰緦麻以稍細熟布為之其服有八曰斬衰三年者子為父母庶子為所生母子為繼母子為慈母謂母卒父命他妾養己者子為養母謂自幼過房與人者女在室為父母女嫁被出而反在室為父母嫡孫為祖父母承重及曾高祖父母承重者為人後者為所後父母及為所後祖父母承重夫為後則妻從服婦為舅姑庶子之妻為夫之所生母妻妾為夫曰齊衰杖期者嫡子衆子為庶母嫡子衆子之妻為夫之庶母為嫁母出母父卒繼母改嫁而己從之者夫為妻曰齊衰不杖期者父母為嫡長子及衆子父母為女在室者繼母為長子及衆子慈母為長子及衆子孫為祖父母孫女雖適人不降高曾皆然為伯叔父母妾為夫之長子及衆子為所生子為兄弟為兄弟之子及兄弟之女在室者為姑及姊妹在室者妾為嫡妻嫁母出母為其子女在室及雖適人而無夫與子者為其兄弟及兄弟之子繼母改嫁為前夫之子從己者為繼父同居兩無大功之親者婦人為夫親兄弟之子婦人為夫親兄弟子女在室者女出嫁為父母妾為其父母為人後者為其父母女適人為兄弟之為父後者祖為嫡孫父母為長子婦曰齊衰五月者為曾祖父母曰齊衰三月者為高祖父母為繼父昔同居而今不同者為繼父雖同居而兩有大功以上親者曰大功九月者為同堂兄弟及姊妹在室者為姑及姊妹及兄弟之女出嫁者父母為衆子婦為女之出嫁者祖為衆孫為兄弟之子婦婦人為夫之祖父母為夫之伯叔父母為夫之兄弟之子婦為夫兄弟之女嫁人者女出嫁為本宗伯叔父母及為兄弟與兄弟之子為姑姊妹及兄弟之女在室者為人後者為其兄弟及姑姊妹在室者妻為夫本生父母為兄弟之子為人後者曰小功五月者為伯叔祖父母為同堂伯叔父母為再從兄弟及再從姊妹在室者為同堂兄弟之子為祖姑在室者為從祖姑在室者為同堂兄弟之女在室者為兄弟之妻為人後者為其姑姊妹適人者為嫡孫婦為同堂姊妹之出嫁者為孫女適人者為兄弟之孫及兄弟之女孫在室者為外祖父母為母之兄弟姊妹為同母異父之兄弟姊妹為姊妹之子婦人為夫之姑及夫之姊妹為夫之兄弟及夫兄弟之妻為夫兄弟之孫及夫兄弟之女孫在室者為夫同堂兄弟之子及同堂兄弟之女在室者曰緦麻三月者為族曾祖父母為族伯叔祖父母為族父母為族兄弟及族姊妹在室者為族曾祖姑在室者為族祖姑及族姑在室者為兄弟之曾孫女在室同為曾孫玄孫為同堂兄弟之孫女在室同為再從兄弟之子女在室同為祖姑從祖姑及從祖姊妹之出嫁者為兄弟之孫女出嫁者為同堂兄弟之女出嫁者為乳母為舅之子為姑之子為姨之子為外孫為壻為妻之父母為兄弟孫之婦為同堂兄弟子之婦為同堂兄弟之妻為外孫婦為甥婦婦人為夫之曾祖高祖父母為夫之叔伯祖父母為夫之同堂伯叔父母為夫兄弟之曾孫為夫之同堂兄弟為夫同堂兄弟之孫孫女同為夫再從兄弟之子為夫兄弟之孫婦為夫同堂兄弟子之婦為夫同堂兄弟之妻為夫同堂姊妹為夫之外祖父母為夫之舅及姨為夫之祖姑及從祖姑在室者女出嫁為本宗叔伯祖父母為本宗同堂叔伯父母為本宗同堂兄弟之子女為本宗祖姑及從祖姑在室者為本宗同堂姊妹之出嫁者為人後者為本生外祖父母嘉靖十八年正月諭輔臣昨居喪理疾閲禮記檀弓等篇其所著禮儀制度俱不歸一又不載天子全儀雖曰三年之喪通乎上下而今昔亦有大不同者皇祖所定未有全文每遇帝后之喪亦未免因仍為禮至於冠裳衰絰所司之製不一其與禮官考定之自初喪至除服冠裳輕重之製具為儀節俾歸至當於是禮部議喪服諸制奏之帝令更加考訂畫圖注釋並祭葬全儀編輯成書備覽
