body:
  text: 明史卷一百三十九列傳第二十七錢唐程徐韓宜可周觀政歐陽韶蕭岐門克新馮堅茹太素曾秉正李仕魯陳汶輝葉伯巨鄭士利方徵周敬心王朴錢唐字惟明象山人博學敦行洪武元年舉明經對策稱旨特授刑部尚書二年詔孔廟春秋釋奠止行於曲阜天下不必通祀唐伏闕上疏言孔子垂教萬世天下共尊其教故天下得通祀孔子報本之禮不可廢侍郎程徐亦疏言古今祀典獨社稷三皇與孔子通祀天下民非社稷三皇則無以生非孔子之道則無以立堯舜禹湯文武周公皆聖人也然發揮三綱五常之道載之於經儀範百王師表萬世使世愈降而人極不墜者孔子力也孔子以道設教天下祀之非祀其人祀其教也祀其道也今使天下之人讀其書由其教行其道而不得舉其祀非所以維人心扶世教也皆不聽久之乃用其言帝嘗覽孟子至草芥寇讐語謂非臣子所宜言議罷其配享詔有諫者以大不敬論唐抗疏入諫曰臣為孟軻死死有餘榮時廷臣無不為唐危帝鑒其誠懇不之罪孟子配享亦旋復然卒命儒臣修孟子節文云唐為人強直嘗詔講虞書唐陛立而講或糾唐草野不知君臣禮唐正色曰以古聖帝之道陳於陛下不跪不為倨又嘗諫宮中不宜揭武后圖忤旨待罪午門外竟日帝意解賜之食即命撤圖未幾謫壽州卒程徐字仲能鄞人元名儒端學子也至正中以明春秋知名歷官兵部尚書致仕明兵入元都妻金抱二歲兒與女瓊赴井死洪武二年偕危素等自北平至京授刑部侍郎進尚書卒徐精勤通敏工詩文有集傳於世韓宜可字伯時浙江山陰人元至正中行御史臺辟為掾不就洪武初薦授山陰教諭轉楚府録事尋擢監察御史彈劾不避權貴時丞相胡惟庸御史大夫陳寧中丞涂節方有寵於帝嘗侍坐從容燕語宜可直前出懷中彈文劾三人險惡似忠奸佞似直恃功怙寵內懷反側擢置臺端擅作威福乞斬其首以謝天下帝怒曰快口御史敢排陷大臣耶命下錦衣衛獄尋釋之九年出為陝西按察司僉事時官吏有罪者笞以上悉謫屯鳳陽至萬數宜可疏爭之曰刑以禁淫慝一民軌宜論其情之輕重事之公私罪之大小今悉令謫屯此小人之幸君子殆矣乞分別以協衆心帝可之已入朝京師會賜諸司沒官男女宜可獨不受且極論罪人不孥古之制也有事隨坐法之濫也況男女人之大倫婚姻踰時尚傷和氣合門連坐豈聖朝所宜帝是其言後坐事將刑御謹身殿親鞫之獲免復疏陳二十餘事皆報可未幾罷歸已復徵至命撰祀鍾山大江文諭日本征烏蠻詔皆稱旨特授山西右布政使尋以事安置雲南惠帝即位用檢討陳性善薦起雲南參政入拜左副都御史卒於官是夜大星隕櫪馬皆驚嘶人謂宜可當之云帝之建御史臺也諸御史以敢言著者自宜可外則稱周觀政觀政亦山陰人以薦授九江教授擢監察御史嘗監奉天門有中使將女樂入觀政止之中使曰有命觀政執不聽中使慍而入頃之出報曰御史且休女樂已罷不用觀政又拒曰必面奉詔已而帝親出宮謂之曰宮中音樂廢缺欲使內家肄習耳朕已悔之御史言是也左右無不驚異者觀政纍官江西按察使前觀政者有歐陽韶字子韶永新人薦授監察御史有詔日命兩御史侍班韶嘗侍直帝乘怒將戮人他御史不敢言韶趨跪殿廷下倉卒不能措詞急捧手加額呼曰陛下不可帝察韶朴誠從之未幾致仕卒於家蕭岐字尚仁泰和人五歲而孤事祖父母以孝聞有司屢舉不赴洪武十七年詔徵賢良強起之上十便書大意謂帝刑罰過中訐告風熾請禁止實封以杜誣罔依律科獄以信詔令凡萬餘言召見授潭王府長史力辭忤旨謫雲南楚雄訓導岐即日行遣騎追還歲餘改授陝西平涼再歲致仕復召與錢宰等考定書傳賜幣鈔給驛歸嘗輯五經要義又取刑統八韻賦引律令為之解合為一集嘗曰天下之理本一出乎道必入乎刑吾合二書使觀者有所省也學者稱正固先生當是時太祖治尚剛嚴中外凜凜奉法救過不給而岐所上書過切直帝不為忤厥後以言被超擢者有門克新克新鞏昌人泰州教諭也二十六年秩滿來朝召問經史及政治得失克新直言無隱授贊善時紹興王俊華以善文辭亦授是職上諭吏部曰左克新右俊華重直言也初教官給由至京帝詢民疾苦岢嵐吳從權山陰張桓皆言臣職在訓士民事無所與帝怒曰宋胡瑗為蘇湖教授其教兼經義治事漢賈誼董仲舒皆起田里敷陳時務唐馬周不得親見太宗且教武臣言事今既集朝堂朕親詢問俱無以對志聖賢之道者固如是乎命竄之邊方且榜諭天下學校使為鑒戒至是克新以亮直見重不數年擢禮部尚書尋引疾命太醫給藥物不輟其俸及卒命有司護喪歸葬馮堅不知何許人為南豐典史洪武二十四年上書言九事一曰養聖躬請清心省事不與細務以為民社之福二曰擇老成諸王年方壯盛左右輔導願擇取老成之臣出為王官使得直言正色以圖匡救三曰攘要荒請務農講武屯戍邊圉以備不虞四曰勵有司請得廉正有守之士任以方面旌別屬吏具實以聞而黜陟之使人勇於自治五曰褒祀典請敕有司採歷代忠烈諸臣追加封諡俾末俗有所興勸六曰省宦寺晨夕密邇其言易入養成禍患而不自知請裁去冗員可杜異日陵替之弊七曰易邊將假以兵柄久在邊圉多致縱佚請時遷歲調不使久居其任不惟保全勳臣實可防將驕卒惰內輕外重之漸八曰訪吏治廉幹之才或為上官所忌僚吏所嫉上不加察非激勸之道請廣布耳目訪察廉貪以明黜陟九曰增關防諸司以帖委胥吏俾督所部輒加箠楚害及於民請增置勘合以付諸司聽其填寫差遣事訖繳報庶所司不輕發以病民而庶務亦不致曠廢書奏帝嘉之稱其知時務達事變又謂侍臣曰堅言惟調易邊將則未然邊將數易則兵力勇怯敵情出沒山川形勝無以備知倘得趙充國班超者又何取數易為哉乃命吏部擢堅左僉都御史在院頗持大體其明年卒於任茹太素澤州人洪武三年鄉舉上書稱旨授監察御史六年擢四川按察使以平允稱七年五月召為刑部侍郎上言自中書省內外百司聽御史按察使檢舉而御史臺未有定考宜令守院御史一體察核磨勘司官吏數少難以檢核天下錢糧請增置若干員各分為科在外省衛凡會議軍民事各不相合致稽延請用按察司一員糾正帝皆從之明年坐纍降刑部主事陳時務纍萬言太祖令中書郎王敏誦而聽之中言才能之士數年來幸存者百無一二今所任率迂儒俗吏言多忤觸帝怒召太素面詰杖於朝次夕復於宮中令人誦之得其可行者四事慨然曰為君難為臣不易朕所以求直言欲其切於情事文詞太多便至熒聽太素所陳五百餘言可盡耳因令中書定奏對式俾陳得失者無繁文摘太素疏中可行者下所司帝自序其首頒示中外十年與同官曾秉正先後同出為參政而太素往浙江尋以侍親賜還里十六年召為刑部試郎中居一月遷都察院僉都御史復降翰林院檢討十八年九月擢戶部尚書太素抗直不屈屢瀕於罪帝時宥之一日宴便殿賜之酒曰金杯同汝飲白刃不相饒太素叩首即續韻對曰丹誠圖報國不避聖心焦帝為惻然未幾謫御史復坐排陷詹徽與同官十二人俱鐐足治事後竟坐法死曾秉正南昌人洪武初薦授海州學正九年以天變詔羣臣言事秉正上疏數千言大略曰古之聖君不以天無災異為喜惟以祗懼天譴為心陛下聖文神武統一天下天之付與可謂盛矣兵動二十餘年始得休息天之有心於太平亦已久矣民之思治亦切矣創業與守成之政大抵不同開創之初則行富國強兵之術用趨事赴功之人大統既立邦勢已固則普天之下水土所生人力所成皆邦家倉庫之積乳哺之童垂白之叟皆邦家休養之人不患不富庶惟保成業於永久為難耳於此之時當盡革向之所為何者足應天心何者足慰民望感應之理其效甚速又言天既有警則變不虛生極論大易春秋之旨帝嘉之召為思文監丞未幾改刑部主事十年擢陝西參政會初置通政司即以秉正為使在位數言事帝頗優容之尋竟以忤旨罷貧不能歸鬻其四歲女帝聞大怒置腐刑不知所終李仕魯字宗孔濮人少穎敏篤學足不窺戶外者三年聞鄱陽朱公遷得宋朱熹之傳往從之遊盡受其學太祖故知仕魯名洪武中詔求能為朱氏學者有司舉仕魯入見太祖喜曰吾求子久何相見晚也除黃州同知曰朕姑以民事試子行召子矣期年治行聞十四年命為大理寺卿帝自踐阼後頗好釋氏教詔徵東南戒德僧數建法會於蔣山應對稱旨者輒賜金襴袈裟衣召入禁中賜坐與講論吳印華克勤之屬皆拔擢至大官時時寄以耳目由是其徒橫甚讒毀大臣舉朝莫敢言惟仕魯與給事中陳汶輝相繼爭之汶輝疏言古帝王以來未聞縉紳緇流雜居同事可以相濟者也今勳舊耆德咸思辭祿去位而緇流憸夫乃益以讒間如劉基徐達之見猜李善長周德興之被謗視蕭何韓信其危疑相去幾何哉伏望陛下於股肱心膂悉取德行文章之彥則太平可立致矣帝不聽諸僧怙寵者遂請為釋氏創立職官於是以先所置善世院為僧録司設左右善世左右闡教左右講經覺義等官皆高其品秩道教亦然度僧尼道士至踰數萬仕魯疏言陛下方創業凡意指所向即示子孫萬世法程奈何捨聖學而崇異端乎章數十上亦不聽仕魯性剛介由儒術起方欲推明朱氏學以闢佛自任及言不見用遽請於帝前曰陛下深溺其教無惑乎臣言之不入也還陛下笏乞賜骸骨歸田里遂置笏於地帝大怒命武士捽搏之立死階下陳汶輝字耿光詔安人以薦授禮科給事中纍官至大理寺少卿數言得失皆切直最後忤旨懼罪投金水橋下死仕魯與汶輝死數歲帝漸知諸僧所為多不法有詔清理釋道二教云葉伯巨字居升寧海人通經術以國子生授平遙訓導洪武九年星變詔求直言伯巨上書略曰臣觀當今之事太過者三分封太侈也用刑太繁也求治太速也先王之制大都不過三國之一上下等差各有定分所以強幹弱枝遏亂源而崇治本耳今裂土分封使諸王各有分地蓋懲宋元孤立宗室不競之弊而秦晉燕齊梁楚吳蜀諸國無不連邑數十城郭宮室亞於天子之都優之以甲兵衛士之盛臣恐數世之後尾大不掉然後削其地而奪之權則必生觖望甚者緣間而起防之無及矣議者曰諸王皆天子骨肉分地雖廣立法雖侈豈有抗衡之理臣竊以為不然何不觀於漢晉之事乎孝景高帝之孫也七國諸王皆景帝之同祖父兄弟子孫也一削其地則遽構兵西向晉之諸王皆武帝親子孫也易世之後迭相攻伐遂成劉石之患由此言之分封踰制禍患立生援古證今昭昭然矣此臣所以為太過者也昔賈誼勸漢文帝盡分諸國之地空置之以待諸王子孫向使文帝早從誼言則必無七國之禍願及諸王未之國之先節其都邑之制減其衛兵限其疆理亦以待封諸王之子孫此制一定然後諸王有賢且才者入為輔相其餘世為藩屏與國同休割一時之恩制萬世之利消天變而安社稷莫先於此臣又觀歷代開國之君未有不以任德結民心以任刑失民心者國祚長短悉由於此古者之斷死刑也天子撤樂減膳誠以天生斯民立之司牧固欲其並生非欲其即死不幸有不率教者入於其中則不得已而授之以刑耳議者曰宋元中葉專事姑息賞罰無章以致亡滅主上痛懲其弊故制不宥之刑權神變之法使人知懼而莫測其端也臣又以為不然開基之主垂範百世一動一靜必使子孫有所持守況刑者民之司命可不慎歟夫笞杖徒流死今之五刑也用此五刑既無假貸一出乎大公至正可也而用刑之際多裁自聖衷遂使治獄之吏務趨求意旨深刻者多功平反者得罪欲求治獄之平豈易得哉近者特旨雜犯死罪免死充軍又刪定舊律諸則減宥有差矣然未聞有戒敕治獄者務從平恕之條是以法司猶循故例雖聞寬宥之名未見寬宥之實所謂實者誠在主上不在臣下也故必有罪疑惟輕之意而後好生之德洽於民心此非可以淺淺期也何以明其然也古之為士者以登仕為榮以罷職為辱今之為士者以溷跡無聞為福以受玷不録為幸以屯田工役為必獲之罪以鞭笞捶楚為尋常之辱其始也朝廷取天下之士網羅捃托務無餘逸有司敦迫上道如捕重囚比到京師而除官多以貌選所學或非其所用所用或非其所學洎乎居官一有差跌苟免誅戮則必在屯田工役之科率是為常不少顧惜此豈陛下所樂為哉誠欲人之懼而不敢犯也竊見數年以來誅殺亦可謂不少矣而犯者相踵良由激勸不明善惡無別議賢議能之法既廢人不自勵而為善者怠也有人於此廉如夷齊智如良平少戾於法上將録長棄短而用之乎將舍其所長苛其所短而置之法乎苟取其長而舍其短則中庸之材爭自奮於廉智倘苛其短而棄其長則為善之人皆曰某廉若是某智若是朝廷不少貸之吾屬何所容其身乎致使朝不謀夕棄其廉恥或事掊克以備屯田工役之資者率皆是也若是非用刑之煩者乎漢嘗徙大族於山陵矣未聞實之以罪人也今鳳陽皇陵所在龍興之地而率以罪人居之怨嗟愁苦之聲充斥園邑殆非所以恭承宗廟意也且夫強敵在前則揚精鼓鋭攻之必克擒之必獲可也今賊突竄山谷以計求之庶或可得顧勞重兵彼方驚散入不可蹤跡之地捕之數年既無其方而乃歸咎於新附戶籍之細民而遷徙之騷動數千里之地室家不得休居雞犬不得寧息況新附之衆向者流移他所朝廷許其復業今附籍矣而又復遷徙是法不信於民也夫戶口盛而後田野闢賦稅增今責守令年增戶口正為是也近者已納稅糧之家雖承旨分釋還家而其心猶不自安已起戶口雖蒙憐恤而猶見留開封祗候訛言驚動不知所出況太原諸郡外界邊境民心如此甚非安邊之計也臣願自今朝廷宜存大體赦小過明詔天下修舉八議之法嚴禁深刻之吏斷獄平允者超遷之殘酷裒斂者罷黜之鳳陽屯田之制見在居屯者聽其耕種起科已起戶口見留開封者悉放復業如此則足以隆好生之德樹國祚長久之福而兆民自安天變自消矣昔者周自文武至於成康而教化大行漢自高帝至於文景而始稱富庶蓋天下之治亂氣化之轉移人心之趨向非一朝一夕故也今國家紀元九年於茲偃兵息民天下大定紀綱大正法令修明可謂治矣而陛下切切以民俗澆漓人不知懼法出而奸生令下而詐起故或朝信而暮猜者有之昨日所進今日被戮者有之乃至令下而尋改已赦而復收天下臣民莫之適從臣愚謂天下之趨於治猶堅冰之泮也冰之泮非太陽所能驟致陽氣發生土脈微動然後得以融釋聖人之治天下亦猶是也刑以威之禮以導之漸民以仁摩民以義而後其化熙熙孔子曰如有王者必世而後仁此非空言也求治之道莫先於正風俗正風俗之道莫先於守令知所務使守令知所務莫先於風憲知所重使風憲知所重莫先於朝廷知所尚古郡守縣令以正率下以善導民使化成俗美征賦期會獄訟簿書固其末也今之守令以戶口錢糧獄訟為急務至於農桑學校王政之本乃視為虛文而置之將何以教養斯民哉以農桑言之方春州縣下一白帖里甲回申文狀而已守令未嘗親視種藝次第旱潦戒備之道也以學校言之廩膳諸生國家資之以取人才之地也今四方師生缺員甚多縱使具員守令亦鮮有以禮讓之實作其成器者朝廷切切於社學屢行取勘師生姓名所習課業乃今社鎮城郭或但置立門牌遠村僻處則又徒存其名守令不過具文案備照刷而已上官分部按臨亦但循習故常依紙上照刷未嘗巡行點視也興廢之實上下視為虛文小民不知孝弟忠信為何物而禮義廉恥掃地矣風紀之司所以代朝廷宣導德化訪察善惡聽訟讞獄其一事耳今專以獄訟為要忠臣孝子義夫節婦視為末節而不暇舉所謂宣導風化者安在哉其始但知以去一贓吏決一獄訟為治而不知勸民成俗使民遷善遠罪乃治之大者此守令風憲未審輕重之失也王制論鄉秀士升於司徒曰選士司徒論其秀士而升於太學曰俊士大樂正又論造士之秀升之司馬曰進士司馬辨論官材論定然後官之任官然後爵之其考之之詳若此故成周得人為盛今使天下諸生考於禮部升於太學歷練衆職任之以事可以洗歷代舉選之陋上法成周然而升於太學者或未數月遽選入官間或委以民社臣恐其人未諳時務未熟朝廷禮法不能宣導德化上乖國政而下困黎民也開國以來選舉秀才不為不多所任名位不為不重自今數之在者有幾臣恐後之視今亦猶今之視昔昔年所舉之人豈不深可痛惜乎凡此皆臣所為求治太速之過也昔者宋有天下蓋三百餘年其始以禮義教其民當其盛時閭閻里巷皆有忠厚之風至於恥言人之過失洎乎末年忠臣義士視死如歸婦人女子羞被污辱此皆教化之效也元之有國其本不立犯禮義之分壞廉恥之防不數十年棄城降敵者不可勝數雖老儒碩臣甘心屈辱此禮義廉恥不振之弊遺風流俗至今未革深可怪也臣謂莫若敦仁義尚廉恥守令則責其以農桑學校為急風憲則責其先教化審法律以平獄緩刑為急如此則德澤下流求治之道庶幾得矣郡邑諸生升於太學者須令在學肄業或三年或五年精通一經兼習一藝然後入選或宿衛或辦事以觀公卿大夫之能而後任之以政則其學識兼懋庶無敗事且使知祿位皆天之祿位而可以塞覬覦之心也治道既得陛下端拱穆清待以歲月則陰陽調而風雨時諸福吉祥莫不畢至尚何天變之不消哉書上帝大怒曰小子間吾骨肉速逮來吾手射之既至丞相乘帝喜以奏下刑部獄死獄中先是伯巨將上書語其友曰今天下惟三事可患耳其二事易見而患遲其一事難見而患速縱無明詔吾猶將言之況求言乎其意蓋謂分封也然是時諸王止建藩號未曾裂土不盡如伯巨所言逮洪武末年燕王屢奉命出塞勢始強後因削奪稱兵遂有天下人乃以伯巨為先見云鄭士利字好義寧海人兄士元剛直有才學由進士歷官湖廣按察使僉事荊襄卒乘亂掠婦女吏不敢問士元立言於將領還所掠安陸有冤獄御史臺已讞上士元奏其冤得白會考校錢穀冊書空印事覺凡主印者論死佐二以下榜一百戍遠方士元亦坐是繫獄時帝方盛怒以為欺罔丞相御史莫敢諫士利歎曰上不知以空印為大罪誠得人言之上聖明寧有不悟會星變求言士利曰可矣既而讀詔有假公言私者罪士利曰吾所欲言為天子殺無罪者耳吾兄非主印者固當出需吾兄杖出乃言即死不恨士元出士利乃為書數千言言數事而於空印事尤詳曰陛下欲深罪空印者恐奸吏得挾空印紙為文移以虐民耳夫文移必完印乃可今考較書策乃合兩縫印非一印一紙比縱得之亦不能行況不可得乎錢穀之數府必合省省必合部數難懸決至部乃定省府去部遠者六七千里近亦三四千里冊成而後用印往返非期年不可以故先印而後書此權宜之務所從來久何足深罪且國家立法必先明示天下而後罪犯法者以其故犯也自立國至今未嘗有空印之律有司相承不知其罪今一旦誅之何以使受誅者無詞朝廷求賢士置庶位得之甚難位至郡守皆數十年所成就通達廉明之士非如草菅然可刈而復生也陛下奈何以不足罪之罪而壞足用之材乎臣竊為陛下惜之書成閉門逆旅泣數日兄子問曰叔何所苦士利曰吾有書欲上觸天子怒必受禍然殺我生數百人我何所恨遂入奏帝覽書大怒下丞相御史雜問究使者士利笑曰顧吾書足用否耳吾業為國家言事自分必死誰為我謀獄具與士元皆輸作江浦而空印者竟多不免方徵字可久莆田人以鄉舉授給事中嘗侍遊後苑與聯詩句太祖知其有母在賜白金馳驛歸省還改監察御史出為懷慶知府徵志節甚偉遇事敢直言居郡時因星變求言疏言風憲官以激濁揚清為職今不聞旌廉拔能專務羅織人罪多徵贓罰此大患也朝廷賞罰明信乃能勸懲去年各行省官吏以用空印罹重罪而河南參政安然山東參政朱芾俱有空印反遷布政使何以示勸懲帝問羅織及多徵贓罰者為誰徵指河南僉事彭京以對貶沁陽驛丞十三年以事逮至京卒周敬心山東人太學生也洪武二十五年詔求曉曆數者敬心上疏極諫且及時政數事略曰臣聞國祚長短在德厚薄不在曆數三代尚矣三代而下最久莫如漢唐宋最短莫如秦隋五代其久也以有道其短也以無道陛下膺天眷命救亂誅暴然神武威斷則有餘寬大忠厚則不足陛下若效兩漢之寬大唐宋之忠厚講三代所以有道之長則帝王之祚可傳萬世何必問諸小道之人耶臣又聞陛下連年遠征北出沙漠為恥不得傳國璽耳昔楚平王時琢卞和之玉至秦始名為璽歷代遞嬗以訖後唐治亂興廢皆不在此石敬瑭亂潞王攜以自焚則秦璽固已毀矣敬瑭入洛更以玉製晉亡入遼遼亡遺於桑乾河元世祖時札剌爾者漁而得之今元人所挾石氏璽耳昔者三代不知有璽仁為之璽故曰聖人大寶曰位何以守位曰仁陛下奈何忽天下之大璽而求漢唐宋之小璽也方今力役過煩賦斂過厚教化溥而民不悅法度嚴而民不從昔汲黯言於武帝曰陛下內多欲而外施仁義奈何欲效唐虞之治乎方今國則願富兵則願強城池則願高深宮室則願壯麗土地則願廣人民則願衆於是多取軍卒廣籍資財征伐不休營造無極如之何其可治也臣又見洪武四年録天下官吏十三年連坐胡黨十九年逮官吏積年為民害者二十三年罪妄言者大戮官民不分臧否其中豈無忠臣烈士善人君子於茲見陛下之薄德而任刑矣水旱連年夫豈無故哉言皆激切報聞王朴同州人洪武十八年進士本名權帝為改焉除吏科給事中以直諫忤旨罷旋起御史陳時事千餘言性鯁直數與帝辨是非不肯屈一日遇事爭之強帝怒命戮之及市召還諭之曰汝其改乎朴對曰陛下不以臣為不肖擢官御史奈何摧辱至此使臣無罪安得戮之有罪又安用生之臣今日願速死耳帝大怒趣命行刑過史館大呼曰學士劉三吾志之某年月日皇帝殺無罪御史朴也竟戮死帝撰大誥謂朴誹謗猶列其名有張衡者萬安人朴同年進士授禮科給事中奏疏剴切擢禮部侍郎以清慎見褒載於大誥後亦以言事坐死贊曰太祖英武威斷廷臣奏對往往失辭而錢唐韓宜可李仕魯輩抱其朴誠力諍於堂陛間可謂古之遺直矣伯巨敬心以縫掖諸生言天下至計雖違於信而後諫之義然原厥本心由於忠愛以視末季沽名賣直之流有不可同日而語者也
