body:
  text: 明史卷一百四十二列傳第三十鐵鉉暴昭侯泰陳性善陳植王彬崇剛張昺謝貴彭二葛誠余逢辰宋忠余瑱馬宣曾濬卜萬朱鑑石撰瞿能莊得楚智皂旗張王指揮楊本張倫陳質顏伯瑋唐子清黃謙向朴鄭恕鄭華王省姚善錢芹陳彥回張彥方鐵鉉鄧人洪武中由國子生授禮科給事中調都督府斷事嘗讞疑獄立白太祖喜字之曰鼎石建文初為山東參政李景隆之北伐也鉉督餉無乏景隆兵敗白溝河單騎走德州城戍皆望風潰鉉與參軍高巍感奮涕泣自臨邑趨濟南偕盛庸宋參軍等誓以死守燕兵攻德州景隆走依鉉德州陷燕兵收其儲蓄百餘萬勢益張遂攻濟南景隆復大敗南奔鉉與庸等乘城守禦燕兵隄水灌城築長圍晝夜攻擊鉉以計焚其攻具間出兵奮擊又遣千人出城詐降燕王大喜軍中皆歡呼鉉伏壯士城上候王入下鐵板擊之別設伏斷橋既而失約王未入城板驟下王驚走伏發橋倉卒不可斷王鞭馬馳去憤甚百計進攻凡三閲月卒固守不能下當是時平安統兵二十萬將復德州以絶燕餉道燕王懼解圍北歸燕王自起兵以來攻真定二日不下即舍去獨以得濟南斷南北道即畫疆守金陵不難圖故乘大破景隆之鋭盡力以攻期於必拔而竟為鉉等所挫帝聞大悅遣官慰勞賜金幣封其三世鉉入謝賜宴凡所建白皆採納擢山東布政使尋進兵部尚書以盛庸代景隆為平燕將軍命鉉參其軍務是年冬庸大敗燕王於東昌斬其大將張玉燕王奔還北平自燕兵犯順南北日尋干戈而王師克捷未有如東昌者自是燕兵南下由徐沛不敢道山東比燕兵漸逼帝命遼東總兵官楊文將所部十萬與鉉合絶燕後文師至直沽為燕將宋貴等所敗無一至濟南者四年四月燕軍南綴王師於小河鉉與諸將時有斬獲連戰至靈璧平安等師潰被擒既而庸亦敗績燕兵渡江鉉屯淮上兵亦潰燕王即皇帝位執之至反背坐廷中嫚罵令其一回顧終不可遂磔於市年三十七子福安戍河池父仲名年八十三母薛並安置海南宋參軍者逸其名燕兵攻濟南不克舍之南去參軍說鉉直搗北平鉉以卒困甚不果後不知所終暴昭潞州人洪武中由國子生授大理寺司務三十年擢刑部右侍郎明年進尚書耿介有峻節布衣麻履以清儉知名建文初充北平採訪使得燕不法狀密以聞請預為備燕兵起設平燕布政司於真定昭以尚書掌司事與鐵鉉輩悉心經畫平安諸軍敗召歸金川門陷出亡被執不屈磔死繼昭為刑部尚書者侯泰字順懷南和人以薦舉起家建文初仕至尚書燕王舉兵力主抗禦之策嘗督餉於濟寧淮安京師不守行至高郵被執下獄與弟敬祖子俱被殺陳性善名復初以字行山陰人洪武三十年進士臚唱過御前帝見其容止凝重屬目久之曰君子也授行人司副遷翰林檢討性善工書嘗召入便殿翻録誠意伯劉基子璉所獻其父遺書帝威嚴見者多惴恐至惶汗不成一字性善舉動安詳字畫端好帝大悅賜酒饌留竟日出惠帝在東宮習知性善名及即位擢為禮部侍郎薦起流人薛正言等數人雲南布政使韓宜可隸謫籍亦以性善言起副都御史一日帝退朝獨留性善賜坐問治天下要道手書以進性善盡所言悉從之已為有司所格性善進曰陛下不以臣不肖猥承顧問既僭塵聖聽許臣必行未幾輟改事同反汗何以信天下帝為動容燕師起改副都御史監諸軍靈璧戰敗與大理丞彭與明欽天監副劉伯完等皆被執已悉縱還性善曰辱命罪也奚以見吾君朝服躍馬入於河以死餘姚黃墀陳子方與性善友亦同死燕王入京師詔追戮性善徙其家於邊與明萬安人貢入太學歷給事中建文初為大理右丞廉勤敏達以督軍被執縱歸慚憤裂冠裳變姓名與伯完俱亡去不知所終時以侍郎監軍者有廬江陳植植元末舉鄉試不仕洪武間官吏部主事建文二年官兵部右侍郎燕兵臨江植監戰江上慷慨師部將有議迎降者植責以大義甚厲部將殺之以降且邀賞燕王怒立誅部將具棺殮葬植白石山上燕師之至江北也御史王彬巡按江淮駐揚州與鎮撫崇剛嬰城堅守時盛庸兵既敗人無固志守將王禮謀舉城降彬執之及其黨繫獄剛出練兵彬修守具晝夜不懈有力士能舉千斤彬嘗以自隨燕兵飛書城中縛王御史降者官三品左右憚力士莫敢動禮弟崇賂力士母誘其子出乘彬解甲浴猝縛之出禮於獄開門納燕師彬與剛皆不屈死彬字文質東平人洪武中進士剛逸其里籍又兵部主事樊士信應城人守淮力拒燕兵不勝死之張昺澤州人洪武中以人材纍官工部右侍郎謝貴者不知所自起歷官河南衛指揮僉事建文初廷臣議削燕更置守臣乃以昺為北平布政使貴為都指揮使並受密命時燕王稱疾久不出二人知其必有變乃部署在城七衛及屯田軍士列九門防守將執王昺庫吏李友直預知其謀密以告王王遂得為備建文元年七月六日朝廷遣人逮燕府官校王僞縛官校置廷中將付使者紿昺貴入至端禮門為伏兵所執俱不屈死燕將張玉朱能等帥勇士攻九門克其八獨西直門不下都指揮彭二躍馬呼市中曰燕王反從我殺賊者賞集兵千餘人將攻燕府會燕健士從府中出格殺二兵遂散盡奪九門初昺被殺喪得還靖難後出昺尸焚之家人及近戚皆死葛誠不知所由進洪武末為燕府長史嘗奉王命奏事京師帝召見問府中事誠具以實對遣還王佯病盛暑擁爐坐呼寒甚昺貴等入問疾誠言王實無病將為變又密疏聞於帝及昺貴將圖王誠與護衛指揮盧振約為內應事敗誠振俱被殺夷其族又伴讀余逢辰字彥章宣城人有學行王信任之以故得聞異謀乘間力諫知變將作貽書其子誓必死兵起復泣諫言君父兩不可負死之北平人杜奇者才雋士也燕王起兵徵入府奇因極諫當守臣節王怒立斬之宋忠不知何許人洪武末為錦衣衛指揮使有百戶以非罪論死忠疏救御史劾之太祖曰忠率直無隱為人請命何罪遂宥百戶尋為僉都御史劉觀所劾調鳳陽中衛指揮使三十年平羌將軍齊讓征西南夷無功以忠為參將從將軍楊文討之師旋復官錦衣建文元年以都督奉敕總邊兵三萬屯開平悉簡燕府護衛壯士以從又以都督徐凱屯臨清耿瓛屯山海關相掎角北平故有永清左右衛忠調其左屯彰德右屯順德以備燕及張昺謝貴謀執燕王忠亦帥兵趨北平未至而燕兵起居庸失守不得進退保懷來燕王度忠必爭居庸帥精兵八千卷甲倍道趨懷來時北平將士在忠部下者忠告以家屬並為燕屠滅盍努力復讎報國恩燕王偵知之急令其家人張故旗幟為前鋒呼父兄子弟相問勞將士咸喜曰我家固亡恙宋總兵欺我遂無鬬志忠倉卒布陳未成列燕王一麾渡河鼓譟進忠敗死之忠之守懷來也都指揮余瑱彭聚孫泰與俱及戰瑱被執不屈死泰中流矢血被甲裹創力鬬與聚俱沒於陳當是時諸將校為燕所俘者百餘人皆不肯降以死惜姓名多不傳馬宣亦不知何許人官都指揮使宋忠之趨居庸宣亦自薊州帥師赴北平聞變走還燕王既克懷來旋師欲南下張玉進曰薊州外接大寧多騎士不取恐為後患會宣發兵將攻北平與燕兵戰公樂驛敗歸與鎮撫曾濬城守玉等往攻之宣出戰被擒罵不絶口與濬俱死燕兵之襲大寧也守將都指揮卜萬與都督劉真陳亨帥兵扼松亭關亨欲降燕畏萬不敢發燕行反間貽萬書盛稱萬極詆亨厚賞所獲大寧卒緘書衣中俾密與萬故使同獲卒見之亦縱去而不與賞不得賞者發其事真亨搜卒衣得書遂執萬下獄死籍其家萬忠勇而死於間論者惜之及大寧陷指揮使朱鑑力戰不屈死寧府左長史石撰者平定人以學行稱燕王舉兵撰輒為守禦計每以臣節諷寧王王亦心敬之及城陷憤詈不屈支解死瞿能合肥人父通洪武中纍官都督僉事能嗣官以四川都指揮使從藍玉出大渡河擊西番有功又以副總兵討建昌叛酋月魯帖木兒破之雙狼寨燕師起從李景隆北征攻北平與其子帥精騎千餘攻彰義門垂克景隆忌之令候大軍同進於是燕人夜汲水沃城方大寒冰凝不可登景隆卒致大敗已又從景隆進駐白溝河與燕師戰能父子奮擊所向披靡日暝各收軍明日復戰燕王幾為所及王急佯招後軍以疑之得脫去薄暮能復引衆搏戰大呼滅燕斬馘數百諸將俞通淵滕聚復帥衆來會會旋風起王突入馳擊能父子死於陳通淵聚俱死精兵萬餘並沒南軍由是不振時與北兵戰死者有都指揮莊得楚智皂旗張等得故隸宋忠懷來之敗一軍獨全後從盛庸戰夾河斬燕將談淵已而燕王以驍騎乘暮掩擊得力戰死智嘗從馮勝藍玉出塞有功建文初守北平尋召還及討燕帥兵從景隆戰輒奮勇北人望旗幟股栗至是馬陷被執死皂旗張逸其名或曰張能力挽千斤每戰輒麾皂旗先驅軍中呼皂旗張死時猶執旗不仆又王指揮者臨淮人常騎小馬軍中呼小馬王戰白溝河被重創脫胄付其僕曰吾為國捐軀以此報家人立馬植戈而死二人死尤異云又中牟楊本初為太學生通禽遁術應募授錦衣鎮撫從景隆討燕有功景隆忌之不以聞尋劾景隆喪師辱國遂以孤軍獨出被擒繫北平獄後被殺張倫不知何許人河北諸衛指揮使也勇悍負氣喜觀古忠義事馬宣自薊州起兵攻北平不克死倫發憤合兩衛官帥所部南奔結盟報國從李景隆盛庸戰皆有功燕王即帝位招倫降倫笑曰張倫將自賣為丁公乎死之京師陷武臣皆降附從容就義者倫一人而已又陳質者以參將守大同進中軍都督同知助宋忠保懷來忠敗退守大同代王欲舉兵應燕質持之不得發及燕兵攻大同不下蔚州廣昌附於燕質復取之成祖即位以質劫制代王剽掠已附誅死顏伯瑋名瓌以字行廬陵人唐魯國公真卿後建文元年以賢良徵授沛縣知縣李景隆屯德州沛人終歲挽運伯瑋善規畫得不困會設豐沛軍民指揮司乃集民兵五千人築七堡為備禦計尋調其兵益山東所存疲弱不任戰燕兵攻沛伯瑋遣縣丞胡先間行至徐州告急援不至遂命其弟王玉子有為還家侍父題詩公署壁上誓必死燕兵夜入東門指揮王顯迎降伯瑋冠帶升堂南向拜自經死有為不忍去復還見父尸自刎其側主簿唐子清典史黃謙俱被執燕將欲釋子清子清曰願隨顏公地下遂死之遣謙往徐州招降謙不從亦死又向朴慈溪人力學養親洪武末以人才召見知獻縣縣無城郭燕將談淵至朴集民兵與戰被執懷印死鄭恕仙居人蕭縣知縣燕將王聰破蕭不屈死二女當配亦死之鄭華臨海人由行人貶東平吏目燕兵至州長二盡棄城走華謂妻蕭曰吾義必死奈若年少何蕭泣曰君不負國妾敢負君華曰足矣帥吏民憑城固守城破力戰不屈死王省字子職吉水人洪武五年領鄉舉至京詔免會試命吏部授官省言親老乞歸養尋以文學徵太祖親試稱旨當殊擢自陳才薄親老乞便養授浮梁教諭凡三為教官最後得濟陽燕兵至為游兵所執從容引譬詞義慷慨衆舍之歸坐明倫堂伐鼓聚諸生謂曰若等知此堂何名今日君臣之義何如因大哭諸生亦哭省以頭觸柱死女靜適即墨主簿周岐鳳聞燕兵至濟陽知父必死三遣人往訪得遺骸歸葬姚善字克一安陸人初姓李洪武中由鄉舉歷祁門縣丞同知廬州重慶二府三十年遷蘇州知府初太祖以吳俗奢僭欲重繩以法黠者更持短長相攻訐善為政持大體不為苛細訟遂衰息吳中大治好折節下士敬禮隱士王賓韓奕俞貞木錢芹輩以月朔會學宮迎芹上座請質經義芹曰此非今所急也善悚然起問芹乃授以一冊視之皆守禦策時燕兵已南下密結鎮常嘉松四郡守練民兵為備薦芹於朝署行軍斷事善尋至京師會朝廷以燕王上書貶齊泰黃子澄於外善言不當貶遂復召二人建文四年詔兼督蘇松常鎮嘉興五府兵勤王兵未集燕王已入京師時子澄匿善所約共航海起兵善謝曰公朝臣當行收兵圖興復善守土與城存亡耳子澄去善為麾下許千戶者縛以獻不屈死年四十三子節等四人俱戍配芹字繼忠少好奇節元末干諸將不遇洪武初辟大都督府掾從中山王出北平至大漠還解職家居二十年甘貧樂道以善薦起從李景隆北行遣入奏事道病將卒猶條上兵事年七十三陳彥回字士淵莆田人父立誠為歸安縣丞被誣論死彥回謫戍雲南家人從者多道死比至蜀唯彥回與祖母郭在會赦又弗原監送者憐而縱之貧不能歸依鄉人知縣黃積良冒黃姓久之以閬中教諭嚴德政薦授保寧訓導考滿至京召見以為平江知縣逾年太祖崩彥回入臨又以給事中楊維康薦擢徽州知府建文元年以循良受上賞祖母郭卒當去百姓走京師乞留彥回衰絰赴闕自陳乞復姓當彥回之戍雲南也其弟彥亦戍遼東至是詔除彥籍連乞終喪不許葬郭徽城北十里北山之陽時走墓下哭甚哀人目之曰太守山嘗對百姓泣曰吾罪人也向亡命冒他姓以祖母存恐陳首獲罪隱忍二十年今祖母沒宜自請死上特宥我終當死報國耳燕兵逼京師彥回糾義勇赴援已而被擒械至京死之張彥方龍泉人初為給事中以便養乞改樂平知縣應詔勤王帥所部抵湖口被執械至樂平斬之梟其首譙樓當暑月一蠅不集經旬面如生邑人竊葬之清白堂後同時以勤王死者有松江同知死尤烈云同知姓名不可考或曰周繼瑜也勤王詔下榜募義勇入援極言大義感動人心並斥靖難兵乖恩悖道械至京磔於市贊曰燕師之南嚮也連敗二大將其鋒蓋不可當鐵鉉以書生竭力抗禦於齊魯之間屢挫燕衆設與耿李易地而處天下事固未可知矣張昺謝貴葛誠圖燕於肘腋而事不就宋忠馬宣東西繼敗瞿能諸將垂勝戰亡燕兵卒得長驅南下而姚善陳彥回之屬欲以郡邑之甲奮拒於大勢已去之後此黃鉞所謂兵至江南禦之無及者也
