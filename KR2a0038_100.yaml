body:
  text: 明史卷一百表第一諸王世表一明太祖建藩子孫世系預錫嘉名以示傳世久遠當神宗中葉僅及祖訓之半而不億之麗宗祿虧乏議者遂有減歲祿限宮媵且限支子之請由是支屬承祧者親王無旁推之恩羣從繼世者郡封絶再襲之例以及名婚不時有明禁本折互支無常期啓禎時軍餉告絀大農蒿目安能顧贍藩維親王或可自存郡王以至中尉空乏尤甚一旦盜起無力禦侮徒手就戮宗社為墟惜哉考之史冊漢諸王表與王子侯離而不屬世次難明唐宗族蕃大源遠流長然諸王以不出閣不分房子孫皆闕而不著宋史於太祖太宗魏王廷美之裔迄臨安淪沒悉載譜牒而賢愚並列漫無裁割茲表明代親王至郡王而止以從史漢諸王及王子侯之例又倣唐宗分房法繫各府郡王於親王之下如小宗之從大宗其餘不得封者概不載洪武中太祖以子孫蕃衆命名慮有重復乃於東宮親王世系各擬二十字字為一世子孫初生宗人府依世次立雙名以上一字為據其下一字則取五行偏旁者以火土金水木為序惟靖江王不拘東宮擬名曰允文遵祖訓欽武大君勝順道宜逢吉師良善用晟秦府曰尚志公誠秉惟懷敬誼存輔嗣資廉直匡時永信惇晉府曰濟美鍾奇表知新慎敏求審心咸景慕述學繼前修燕府後為帝系曰高瞻祁見祐厚載翊常由慈和怡伯仲簡靖迪先猷周府曰有子同安睦勤朝在肅恭紹倫敷惠潤昭格廣登庸楚府曰孟季均榮顯英華蘊盛容宏才升博衍茂士立全功齊府曰賢能長可慶睿智實堪宗養性期淵雅寅思復會通魯府曰肇泰陽當健觀頤壽以弘振舉希兼達康莊遇本寧蜀府曰悅友申賓讓承宣奉至平懋進深滋益端居務穆清湘府曰久鎮開方嶽揚威謹禮儀剛毅循超卓權衡素自持代府曰遜仕成聰俊充廷鼐鼎彝傳貽連秀郁炳耀壯洪基肅府曰瞻祿貢真弼縉紳識烈忠曦暉躋當運凱諫處隆遼府曰貴豪恩寵致憲術儼尊儒雲仍祺保合操翰麗龍輿慶府曰秩邃置台鼒倪伸帥倬奇適完因巨衎騭眷發需毗寧府曰磐奠覲宸拱多謀統議中總添支庶闊作哲向親衷岷府曰徽音膺彥譽定幹企禋雍崇理原咨訪寬鎔喜賁從谷府曰賦質僖雄敞叢興闡福昌篤諧恂懌豫擴霽昱禎祥韓府曰沖範徵偕旭融謨朗璟逵亶韶愈灝慥令緒價蕃維瀋府曰佶幼詮勛胤恬珵效回瑝湜源諲暐圭璧徹澄昂安府曰斐序斌廷賞凝覃濬祉襄恢嚴顓輯矩縝密廓程綱唐府曰瓊芝彌宇宙碩器聿琳琚啓齡蒙頌體嘉曆協銘圖郢府曰偉聞參望奭針誨洎皋夔麒麟餘積兆奎穎曄璿璣伊府曰顒勉諟訏典褒珂采鳳琛應疇頒胄選昆玉冠泉金靖江王曰贊佐相規約經邦任履亨若依純一行遠得襲芳名考明代帝系熹宗莊烈二帝名始及由字其他王府亦多不出十字親王之子例封郡王若以支屬嗣者自後長子襲封親王外餘子仍照原封世次授以本等爵級不得冒濫郡爵郡王無子兄弟及兄弟之子不得請襲違者為冒封皆萬曆七年例也太祖二十六子懿文太子外皇子楠未封成祖以洪武三年封燕王後尊為帝系不得仍列之藩封世次其得封者二十三王曰秦愍王樉曰晉恭王棡曰周定王橚曰楚昭王楨曰齊王榑曰潭王梓曰趙王嵵曰魯荒王檀曰蜀獻王椿曰湘獻王柏曰代簡王桂曰肅莊王楧曰遼簡王植曰慶靖王曰寧獻王權曰岷莊王楩曰谷王橞曰韓憲王松曰瀋簡王模曰安惠王楹曰唐定王桱曰郢靖王棟曰伊厲王而靖江王以南昌嫡孫受封郡王附載於後
