body:
  text: 明史卷一百四十列傳第二十八魏觀陶垕仲王佑劉仕貆王溥徐均王宗顯王興宗呂文燧王興福蘇恭讓趙庭蘭王觀楊卓羅性道同歐陽銘盧熙兄熊王士弘倪孟賢郎敏青文勝魏觀字嵵山蒲圻人元季隱居蒲山太祖下武昌聘授國子助教再遷浙江按察司僉事吳元年遷兩淮都轉運使入為起居注奉命偕吳琳以幣帛求遺賢於四方洪武元年建大本堂命侍太子說書及授諸王經未幾又命偕文原吉詹同吳輔趙壽等分行天下訪求遺才所舉多擢用三年轉太常卿考訂諸祀典稱旨改侍讀學士尋遷祭酒明年坐考祀孔子禮不以時奏謫知龍南縣旋召為禮部主事五年廷臣薦觀才出知蘇州府前守陳寧苛刻人呼陳烙鐵觀盡改寧所為以明教化正風俗為治建黌舍聘周南老王行徐用誠與教授貢潁之定學儀王彝高啓張羽訂經史耆民周壽誼楊茂林文友行鄉飲酒禮政化大行課績為天下最明年擢四川行省參知政事未行以部民乞留命還任初張士誠以蘇州舊治為宮遷府治於都水行司觀以其地湫隘還治舊基又濬錦帆涇興水利或譖觀興既滅之基帝使御史張度廉其事遂被誅帝亦尋悔命歸葬陶垕仲名鑄以字行鄞人洪武十六年以國子生擢監察御史糾彈不避權貴劾刑部尚書開濟至死直聲動天下未幾擢福建按察使誅贓吏數十人興學勸士撫恤軍民帝下詔褒異布政使薛大方貪暴垕仲劾奏之大方辭相連並逮至京訊實坐大方罪詔垕仲還官垕仲言臣父昔為方氏部曲以故官例徙鳳陽臣幼弱依兄撫養至於有成今兄亦為鳳陽軍吏臣叨聖恩備位司憲欲推祿養報生育恩使父母兄弟得復聚處實戴聖天子孝治天下至意帝特許迎養去徙籍垕仲清介自持祿入悉以贍賓客未幾卒官時廣西僉事王佑泰和人按察使尋適嘗咨以政體佑曰蠻方之人瀆倫傷化不及此時明禮法示勸懲後難治適從之廣西稱治蜀平徙佑知重慶州招徠撫輯甚得民和坐事免官卒劉仕貆字伯貞安福人父閈元末隱居不仕仕貆少受父學紅巾賊亂掠其鄉母張氏率羣婦女沉茨潭死賊械仕貆久之得釋洪武初以供役為安福丞張禧所辱仕貆憤益力學十五年應賢良舉對策稱旨授廣東按察司僉事分司瓊州瓊俗善蠱上官至輒致所産珍貨為贄受則喜不受則懼按治蠱殺之仕瓊者多為所汙仕貆廉且惠輕徭理枉大得民和雖却其贄夷人不忍害也辱仕貆者張禧適調丞瓊山以屬吏謁大慚怖仕貆待之與他吏等未幾朝議省僉事官例降東莞河泊使渡河遇風歿於水同僚張仕祥葬之鴉磯後有王溥者桂林人洪武末為廣東參政亦以廉名其弟自家來省屬吏與同舟贈以布袍溥命還之曰一衣雖微不可不慎此汙行辱身之漸也糧運由海道多漂沒溥至庾嶺相度形勢命有司鑿石填塹修治橋梁易以車運民甚便之居官數年笥無重衣庖無兼饌以誣逮下詔獄僚屬餽贐皆不受曰吾豈以患難易其心哉事白得歸卒時有徐均者陽春主簿也地僻土豪得盤踞為姦邑長至輒餌以厚賂從而把持之均至吏白應往視莫大老莫大老者洞主也均曰此非王民邪不來且誅出雙劍示之大老恐入謁均廉得其不法事繫之獄詰朝以兩瓜及安石榴數枚為饋皆黃金美珠也均不視械送府府官受賕縱之歸復致前饋均怒欲捕治之而府檄調均攝陽江陽江大治以憂去官王宗顯和州人僑居嚴州胡大海克嚴禮致幕中太祖征婺州大海以宗顯見太祖曰我鄉里也命至婺覘敵宗顯潛得城中虛實及諸將短長還白太祖太祖喜曰我得婺以爾為知府既而元樞密同僉寧安慶與守將帖木烈思二遣都事縋城請降開東門納兵與宗顯所刺事合改婺州為寧越府以宗顯知府事宗顯故儒者博涉經史開郡學聘葉儀宋濂為五經師戴良為學正吳沉徐源等為訓導自兵興學校久廢至是始聞絃誦聲未幾卒官太祖之下婺也又以王興宗為金華知縣興宗故隸人也李善長李文忠皆以為不可太祖曰興宗從我久勤廉能斷儒生法吏莫先也居三年果以治行聞遷判南昌改知嵩州時方籍民為軍興宗奏曰元末聚民為兵散則仍為民今軍民分矣若籍為軍則無民何所徵賦帝曰善遷懷慶知府上計至京帝以事詰諸郡守至興宗獨曰是守公勤不貪不須問再遷蘇州擢河南布政使陛辭帝曰久不見爾老矣我鬚亦白宴而遣之益勤其職後坐纍得白卒於官同時有呂文燧字用明永康人元末盜起文燧散家財募壯士得三千人與盜連戰破走之三授以官皆不受太祖定婺置永康翼以文燧為左副元帥兼知縣事尋召為營田司經歷擢知廬州府浙西平徙知嘉興松江民作亂寇嘉興文燧柵內署帥壯士拒守李文忠援至賊就擒諸將因欲屠城文燧曰作亂者賊也民何罪力止之滿三載入朝奉詔持節諭闍婆國次興化疾卒明年嘉興佐二以下坐鹽法死者數十人有司以文燧嘗署名公牘請籍其家帝曰文燧誠信必不為姦利且沒於使事可念也勿籍一時郡守以治行稱者又有王興福蘇恭讓二人興福隨人初守徽州有善政遷杭州杭初附人心未安興福善撫輯民甚德之秩滿當遷郡人遮道攀留興福諭遣之曰非余能惠父老父老善守法耳太祖嘉之擢吏部尚書坐事左遷西安知府卒官恭讓玉田人舉聰明正直任漢陽知府為治嚴明而不苛有重役輒詣上官反復陳說多得減省而知漢陽縣者趙庭蘭徐人亦能愛民任事朝廷嘗遣使徵陳氏散卒他縣多以民丁應庭蘭獨言縣無有漢陽人言郡守則稱恭讓言縣令則稱庭蘭云王觀字尚賓祥符人性耿介儀度英偉善談論由鄉薦入太學擢知蘇州府公廉有威黠吏錢英屢陷長官觀捶殺之事聞太祖遣行人齎敕褒之勞以御酒歲大侵民多逋賦部使者督甚急觀置酒延諸富人勸貸貧民償辭指誠懇富人皆感動逋賦以完朝廷嘉其能榜以勵天下守蘇者前有季亨魏觀後有姚善況鍾皆賢稱姑蘇五太守並祀學宮楊卓字自立泰和人洪武四年進士授吏部主事踰年遷廣東行省員外郎田家婦獨行山中遇伐木卒欲亂之婦不從被殺官拷同役卒二十人皆引服卓曰卒人衆必善惡異也可盡抵罪乎列二十人庭下熟視久之指兩卒曰殺人者汝也兩卒大驚服罪坐事謫田鳳陽復起為杭州通判有兄弟爭田者纍歲不決卓至垂涕開諭遂罷爭卓精吏事吏不能欺而治平恕民悅服焉病免卒卓同邑羅性字子理洪武初舉於鄉授德安同知有大盜久不獲株連繫獄者數百人性至郡悉出所繫約十日得賊即盡貸衆叩頭願盡力七日果得嘗治蔬圃得窖鐵萬餘斤會方賦鐵造軍器民爭求售性曰此天所以濟民也吾何預焉悉以充賦秩滿赴京坐用棗木染軍衣謫戍西安性博學時四方老師宿儒在西安者數十人吳人鄒奕曰合吾輩所讀書庶幾羅先生之半年七十卒道同河間人其先蒙古族也事母以孝聞洪武初薦授太常司贊禮郎出為番禺知縣番禺故號煩劇而軍衛尤橫數鞭辱縣中佐吏前令率不能堪同執法嚴非理者一切抗弗從民賴以少安未幾永嘉侯朱亮祖至數以威福撼同同不為動土豪數十輩抑買市中珍貨稍不快意輒巧詆以罪同械其魁通衢諸豪家爭賄高祖求免亮祖置酒召同從容言之同厲聲曰公大臣奈何受小人役使亮祖不能屈也他日亮祖破械脫之借他事笞同富民羅氏者納女於亮祖其兄弟因怙勢為奸同復按治亮祖又奪之去同積不平條其事奏之未至亮祖先劾同訕傲無禮狀帝不知其由遂使使誅同會同奏亦至帝悟以為同職甚卑而敢斥言大臣不法事其人骨鯁可用復使使宥之兩使者同日抵番禺後使者甫到則同已死矣縣民悼惜之或刻木為主祀於家卜之輒驗遂傳同為神云當同未死時布政使徐本雅重同同方笞一醫未竟而本急欲得醫遣卒語同釋之同岸然曰徐公乃亦效永嘉侯耶笞竟始遣自是上官益嚴憚然同竟用此取禍先是有歐陽銘者亦嘗以事抗將軍常遇春銘字日新泰和人以薦除江都縣丞兵燹後民死徙者十七八銘招徠拊循漸次復業有繼母告子不孝者呼至案前委曲開譬母子泣謝去卒以慈孝稱嘗治廨後隙地得白金百兩會部符徵漆即市之以輸遷知臨淄遇春師過其境卒入民家取酒相毆擊一市盡譁銘笞而遣之卒訴令罵將軍遇春詰之曰卒王師民亦王民也民毆且死卒不當笞耶銘雖愚何至詈將軍將軍大賢奈何私一卒撓國法遇春意解為責軍士以謝後大將軍徐達至軍士相戒曰是健吏曾抗常將軍者毋犯也銘為治廉靜平恕暇輒進諸生講文藝或單騎行田間課耕穫邑大治秩滿入覲卒盧熙字公暨崑山人兄熊字公武為兗州知府時兵革甫定會營魯王府又濬河大役並興熊竭心調度民以不擾後坐纍死熙以薦授睢州同知有惠愛命行知府事適御史奉命搜舊軍睢民濫入伍者千人檄熙追送熙令民自實得嘗隸尺籍者數人畀之御史怒繫曹吏必盡得不則以格詔論同官皆懼熙曰吾民牧也民散安用牧乃自詣御史曰州軍籍盡此矣迫之民且散獨有同知在耳請以充役御史怒斥去堅立不動已知不能奪乃罷去後卒於官貧不能喪官為具殮喪歸吏民挽哭者塞道大雨無一人却者又王士弘者知寧海縣靖海侯吳禎奉命收方氏故卒無賴子誣引平民台溫騷然士弘上封事辭極懇切詔罷之民賴以安倪孟賢南昌人知麗水縣民有賣卜者干富室不應遂詣京告大姓陳公望等五十七人謀亂命錦衣衛千戶周原往捕之孟賢廉得實謂僚屬曰朝廷命孟賢令是邑忍坐視善良者橫被荼毒耶即具疏聞復令耆老四十人赴闕訴下法司鞫實論告密者如律又樂平奸民亦詣闕訴大姓五十餘家謀逆饒州知州郎敏力為奏辨詔誅奸民而被誣者得盡釋青文勝字質夫夔州人仕為龍陽典史龍陽瀕洞庭歲罹水患逋賦數十萬敲撲死者相踵文勝慨然詣闕上疏為民請命再上皆不報歎曰何面目歸見父老復具疏擊登聞鼓以進遂自經於鼓下帝聞大驚憫其為民殺身詔寬龍陽租二萬四千餘石定為額邑人建祠祀之妻子貧不能歸養以公田百畝萬曆十四年詔有司春秋致祭名其祠曰惠烈贊曰太祖起閭右稔墨吏為民害嘗以極刑處之然每旌舉賢能以示勸勉不專任法也嘗遣行人齎敕併鈔三十錠內酒一尊賜平陽知縣張礎又建陽知縣郭伯泰丞陸鎰為政不避權勢遣使勞以酒醴遷其官丹徒知縣胡夢通丞郭伯高金壇丞李思進坐事當逮民詣闕言多善政帝並賜內尊降敕褒勞永州守余彥誠齊東令鄭敏等十人坐事下獄部民列政績以請皆復官宜春令沈昌等四人更擢郡守其自下僚不次擢用者寧遠尉王尚賢為廣西參政祥符丞鄒俊為大理卿靜寧州判元善為僉都御史芝陽令李行素為刑部侍郎至如懷寧丞陳希文宜興簿王復春先以善政擢已知其貪肆旋置重典所以風厲激勸者甚至以故其時吏治多可紀述云
