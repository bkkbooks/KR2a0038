body:
  text: 明史卷一百五十九列傳第四十七熊概葉春陳鎰李儀丁璿陳泰李棠曾翬賈銓王宇崔恭劉孜宋傑邢宥李侃雷復李綱原傑彭誼牟俸夏塤子鍭高明楊繼宗熊概字元節豐城人幼孤隨母適胡氏冒其姓永樂九年進士授御史十六年擢廣西按察使峒溪蠻大出掠布政使議請靖江王兵遏之概不可曰吾等居方面寇至無捍禦顧煩王耶且寇必不至戒嚴而已已而果然久之調廣東洪熙元年正月命以原官與布政使周幹參政葉春巡視南畿浙江初夏原吉治水江南還代以左通政趙居任兼督農務居任不恤民歲以豐稔聞成祖亦知其誣罔既卒左通政嶽福繼之庸懦不事事仁宗監國時嘗命概以御史署刑部知其賢故有是命是年八月幹還言有司多不得人土豪肆惡而福不任職宣宗召福還擢概大理寺卿與春同往巡撫南畿浙江設巡撫自此始浙西豪持郡邑短長為不法海鹽民平康暴橫甚御史捕之遁去會赦還益聚黨八百餘人概捕誅之已悉捕豪惡數十輩械至京論如法於是奸宄帖息諸衛所糧運不繼軍乏食概以便宜發諸府贖罪米四萬二千餘石贍軍乃聞於朝帝悅諭戶部勿以專擅罪概概用法嚴姦民憚之騰謗書於朝宣德二年行在都御史劾概與春所至作威福縱兵擾民帝弗問陰使御史廉之無所得由是益任概明年七月賜璽書奬勵概亦自信諸當興革者皆列以聞時屢遣部官至江南造紙市銅鐵概言水潦民饑乞罷之五年還朝始復姓亡何遷右都御史治南院事行在都御史顧佐疾驛召概代領其職兼署刑部九年十月録囚自朝至日宴未暇食忽風眩卒賜祭給舟歸其喪概性剛決巡視江南威名甚盛及掌臺憲聲稱漸損於初葉春者海鹽人起家掾吏歷禮部郎中兩淮鹽運使改四川右參政與概巡撫江浙諸府既復奉命與錦衣指揮任啓御史賴英太監劉寧巡視先後凡三涖浙西治事於鄉人無議其私者概遷都御史春同日進刑部右侍郎卒於官陳鎰字有戒吳縣人永樂十年進士授御史遷湖廣副使歷山東浙江皆有聲英宗即位之三月擢右副都御史與都督同知鄭銘鎮守陝西北方饑民多流移就食鎰道出大名見之疏陳其狀詔免賦役正統改元鎰言陝西用兵民困供億派徵物料乞悉停免詔可明年五月以勞績下敕奬勵因命巡延綏寧夏邊所至條奏軍民便宜多所廢置所部六府饑請發倉振帝從輔臣請修荒政鎰請遍行於各邊由是塞上咸有儲蓄六年春以鎰久勞於外命與王翺歲一更代七年翺調遼東鎰復出鎮歲滿當代以陝人乞留詔仍舊任時倉儲充溢有軍衛者足支十年無者直可支百年鎰以陳腐委棄可惜請每歲春夏時給官軍為月餉不復折鈔從之九年春進右都御史鎮守如故秦中饑乞蠲租十之四其餘米布兼收時瓦剌也先漸強遣人授罕東諸衛都督喃哥等為平章又置甘肅行省名號鎰以聞請嚴為之備已命與靖遠伯王驥巡視甘肅寧夏延綏邊務聽便宜處置以災沴頻仍條上撫安軍民二十四事多議行鎰嘗恐襄漢間流民嘯聚為亂請命河南湖廣陝西三司官親至其地撫恤之得旨允行而當事者不以為意王文亦相繼力言有司怠忽恐遺禍至成化時乃有項忠之役人益思鎰言英宗北狩景帝監國鎰合大臣廷論王振於是振姪王山伏誅也先將入犯以于謙薦出撫畿內事寧召還進左都御史景泰二年陝西饑軍民萬餘人願得陳公活我監司以聞帝復命之鎰至是凡三鎮陝先後十餘年陝人戴之若父母每還朝必遮道擁車泣再至則歡迎數百里不絶其得軍民心前後撫陝者莫及也三年春召還加太子太保與王文並掌都察院文威嚴諸御史畏之若神鎰性寬恕少風裁譽望損於在陝時明年秋以疾致仕卒贈太保諡僖敏天順七年詔官其子伸為刑部照磨李儀涿人永樂間以薦舉授戶部主事宣宗既平高煦儀請去趙王護衛尚書張本亦言往歲孟賢謀逆趙王未必不知高煦亦謂與趙合謀儀言是帝不聽既而言者益衆帝封其詞遣使諭王如儀指王即獻護衛趙卒無事儀尋出知九江府有惠政英宗即位之歲始設諸邊巡撫僉都御史丁璿方督大同宣府軍儲而儀以右僉都御史巡撫其地盛有所建置明年請以大同東西二路分責於總兵官羅文方政從之時朝議遣方政楊洪出塞與甘肅將蔣貴史昭合擊朵兒只伯儀言四裔為患自古有之在備禦有方耳和寧殘部窮無所歸乍臣乍叛小為邊寇邊將謹待之將自遁何必窮兵萬一乘虛襲我少有失適足為笑乞敕政等無窮追不納督糧參政劉璉不職儀劾之璉乃誣儀淫亂事適參將石亨欲奏鎮守中官郭敬罪先咨儀儀誤緘咨牒於核餉主事文卷中戶部以聞致亨敬相奏訐詔儀璉自陳而切責敬等璉止停俸二歲儀雖引罪自負其直詞頗激遂被劾下吏瘐死正統二年二月也儀居官廉謹邊人素德之聞其死建昭德祠以祀丁璿上元人永樂中進士由御史擢居是職正統五年將征麓川命乘傳往備儲餉尋言用兵便宜遂命撫雲南麓川平召為左副都御史所至有聲陳泰字吉亨光澤人幼從外家曹姓既貴乃復故舉鄉試第一除安慶府學訓導正統初廷臣交薦擢御史巡按貴州官軍征麓川歲取土兵二千為鄉導戰失利輒殺以冒功泰奏罷之再按山西時百官俸薄折鈔又不能即得泰上章乞量增祿廩俾足養廉然後治贓污則貪風自息事格不行六年夏言連歲災異咎在廷臣請敕御史給事中糾彈大臣去其尤不職者而後所司各考核其屬帝從之於是御史馬謹等交章劾吏部尚書郭璡等數十人已復出按山東泰素勵操行好搏擊三為巡按懲奸去貪威稜甚峻九年超擢四川按察使與鎮守都御史寇深相失十二年八月參議陳敏希深指劾泰擅杖武職毆輿夫至死逮刑部獄坐斬泰奏辨大理卿俞士悅亦具狀以聞皆不聽景帝監國赦復官于謙薦守紫荊關也先入犯關門不守復論死景帝宥之命充為事官從總兵官顧興祖築關隘自效景泰元年擢大理右少卿守備白羊口四月都督同知劉安代寧遠伯任禮巡備涿易真保諸城命泰以右僉都御史參其軍務三年兼巡撫保定六府尋命督治河道自儀真至淮安濬渠百八十里塞決口九築壩三役六萬人數月而畢七年移撫蘇松天順改元罷巡撫官改廣東副使以憂去四川盜起有言泰嘗蒞其地有威名乃復故官往巡撫八年進右副都御史總督漕運兼巡撫淮揚諸府蒞淮三年謝政歸成化六年卒李棠字宗楷縉雲人宣德五年進士授刑部主事為尚書魏源所器金濂代源以剛嚴懾下棠與辨論是非譴訶不為動濂亦器之進員外郎録囚南畿多所平反進郎中景帝嗣位超擢本部侍郎未幾巡撫廣西提督軍務所部多寇棠以次討平之正己帥下令行政舉景泰三年思明土知府黃老子鈞嗣庶兄使其子殺父子滅其家而以他盜為亂告棠檄右參政曾翬副使劉仁宅按其事翬等誘執父子下之獄窘則遣使走京師上書請帝廢太子立己子帝大喜立擢都督同知出其子於獄事具懷獻太子及土司傳棠既不得竟黃獄鬱鬱纍疏謝病歸不攜嶺表一物以清節顯曾翬字時升泰和人宣德八年進士治秦府永興王葬却有司饋遺歷刑部員外郎尚書金濂器之俾典奏牘有重獄諸郎不能決輒以屬翬秦王訐巡撫陳鎰狎妓翬按得其情劾藩府誣大臣鎰得白正統十三年進郎中以何文淵薦擢廣西右參政李棠檄翬及副使劉仁宅按黃父子使人持千金賄於道且擁精兵挾之二人佯許諾已誘執下之獄棠以聞未幾以上書擢都督同知父子俱出獄翬等太息而已尋以憂去服闋起官河南御史清軍者利得軍多枉及民翬辨釋甚衆南陽諸府多流戶衆議驅逐人情惶急翬與巡撫撫安之天順五年遷山東右布政使民墾田無賦者姦民指為閒田獻諸戚畹部使者來勘翬曰祖制民墾荒田永不科稅奈何奪之使者奏如言乃免成化初轉左河南歲饑計開封積粟多奏請平糶貧民賴以濟召拜刑部左侍郎仍食從二品俸尋巡視浙江考察官吏奏罷不職者百餘人他弊政多所釐革還朝久之謝病去翬操行謹所至有聲及歸生計蕭然絶跡公府鄉人以為賢賈銓字秉鈞邯鄲人永樂末進士宣德四年授禮科給事中數有參駁英宗踐阼既肆赦復命讞在京重囚多所原宥從銓請推之南京秩滿出為大理知府王驥征麓川饋運有勞驥薦之麓川平擢雲南左參政仍知府事尋以驥言還治司事正統十二年左布政使闕軍民數萬人頌銓參贊軍務侍郎侯璡等亦疏請銓遂得擢土官十餘部歲當貢馬輸差發銀及海草釆八府民歲當輸食鹽米鈔至景泰初皆積逋不能償銓等為言除之治行聞賜誥旌異景泰七年九載滿當入都軍民乞留命還任天順四年與梁楘等舉政績卓異戶部初闕尚書王翺欲擢銓帝問李賢賢曰聞其名未見其人也及是來覲帝命賢視之還奏貌寢乃以為右副都御史巡撫山東尋兼撫河南山東歲侵請召還清軍御史河南饑請停徵課馬皆許之成化初左都御史李秉督師遼東召銓署院事中官唐慎等從征荊襄還杖死淮安知事谷淵自奏丐免銓請罪之乃付慎等司禮監命法司罪其從人未幾卒官諡恭靖銓在雲南治行為一時冠比為巡撫清靜不自表暴吏民亦安之王宇字仲宏祥符人童丱時日記萬言巡撫侍郎于謙奇之登正統四年進士授南京戶部主事秩滿當轉郎中吏部以宇才特用為撫州知府為政簡靜而鋤強遏姦凜不可犯一府大治天順元年所司上其治行詔賜誥命頃之擢山東右布政使命撫恤所屬饑民明年遷右副都御史巡撫宣府中官嚴順都督張林等令家人承納芻糧宇劾奏都御史寇深為解帝切責深尋命兼撫大同石亨及從子彪驕恣大同其舊鎮地徵索尤橫宇抗疏論其姦乞置之法疏雖不行聞者敬憚督餉郎中楊益不能備芻藁為宇所劾戶部庇之宇並劾尚書沈固等皆輸罪遭喪起復為大理卿固辭不許宇剛介所至有盛名居大理平反為多七年卒崔恭字克讓廣宗人正統元年進士除戶部主事出理延綏倉儲有能聲以楊溥薦擢萊州知府內地輸遼東布悉貯郡庫歲久朽敝守者多破家恭別搆屋三十楹貯之請約計歲輸外餘以充本府軍餉遂放遣守者八百人也先犯京師遣民兵數千入援廷議城臨清檄發役夫恭以方春民乏食請俟秋成居府六年萊人以比漢楊震景泰中超遷湖廣右布政使諸司供給率取之民恭與僚佐約悉罷之公安監利流民擅相殺恭下令願附籍者聽否則逮秋遣歸衆遂定尋遷江西左布政使司有廣濟庫官吏乾沒五十萬恭白於巡撫韓雍典守者咸獲罪定均徭法酌輕重十年一役遂為定例天順二年寧王奠培不法恭劾之削其護衛王稍戢遷右副都御史代李秉巡撫蘇松諸府按部進耆老言利病為興革與都督徐恭浚儀真漕河又浚常鎮河避江險已大治吳淞江起崑山夏界口至上海白鶴江又自白鶴江至嘉定卞家渡迄莊家涇凡浚萬四千二百餘丈又浚曹家港蒲匯塘新涇諸水民賴其利目曹家港為都堂浦初周忱奏定耗羡則例李秉改定以賦之輕重遞盈縮其例甚平而難於稽算吏不勝煩擾恭乃罷去悉如忱舊吏部缺右侍郎李賢王翺舉恭遂召用置勸懲簿有聞皆識之翺甚倚恭轉左父憂起復憲宗即位乞致仕不允成化五年尚書李秉罷商輅欲用姚夔彭時欲用王概而北人居言路者謂時實逐秉喧謗於朝時稱疾不出侍讀尹直以時概皆己鄉人恐因此得罪急言於輅以恭代秉越五月母喪歸服除起南京吏部劾罷諸司不職者數人十一年春命參贊機務居三年致仕又二年卒贈太子少保諡莊敏劉孜字顯孜萬安人正統十年進士授御史出按遼東景帝即位有建南遷議者孜馳奏乞斬言者以定人心期滿當代朝議邊務方殷復留一歲再按畿輔時方築滄州城以孜言罷擢山東按察使天順四年吏部舉天下治行卓異按察使惟孜一人遷左布政使明年春以右副都御史巡撫江南十府蘇松財賦自周忱立法後代者多紛更孜首訪忱遺蹟斟酌行之民稱便成化元年應天饑方振貸而江北饑民就食者衆孜請盡發諸縣廩全活無算時民間多積困瀕江官田久廢沒仍責輸賦蘇松杭嘉諸府僉補富戶南京廊房既傾圮猶征鈔上元江寧農民代河泊所網戶採鰣魚應天都稅宣課諸司額外增稅江陰諸縣民戶償納荒租六合江浦官牛歲徵犢孜皆疏罷之召拜南京刑部尚書以宋傑代四年致仕道卒孜廉慎治事精審然持法過嚴時議其刻傑為人長者居二年罷去而邢宥代宥文昌人正統十三年進士授御史出巡福建民十人被誣為盜當刑呼冤宥為緩之果得真盜天順中出為台州知府有治績坐纍謫晉江丞憲宗復其職改知蘇州姦民攬納秋賦置之法得其贓萬緡以隄沙河甓官道大水民饑不待奏輒發米二十萬斛以振宥素廉介及治蘇嚴而不苛傑薦於朝詔加浙江左參政仍理府事賜璽書居半歲遂以右僉都御史代傑巡撫開丹陽河築奔牛閘省兌運冗費民以為便尋兼理兩浙鹽政考察屬吏奏黜不職者百七十餘人居數載引疾歸李侃字希正東安人正統七年進士授戶科給事中景帝監國陳簡將才募民壯用戰車三事也先逼京師議者欲焚城外馬草侃言敵輕剽無持久心乞勿焚免復斂為民纍皆報許時父母在容城侃曉夜悲泣乞假冒險迎之景泰初議録扈從死事諸臣後侃因言避難偷生者宜嚴譴以厲臣節上皇將還與同官劉福等言禮宜從厚忤旨被詰尚書胡濙為解乃已再遷都給事中軍興減天下學校師儒俸廩侃奏復之戶部尚書金濂違詔徵租侃論濂下之吏石亨從子彪侵民業侃請置重典並嚴禁勳戚中官不得豪奪細民有司隱者同罪帝宥亨彪餘如其請時給事中敢言者林聰稱首侃亦矯抗有直聲廷議易儲諸大臣唯唯侃泣言東宮無失德聰與御史朱英亦言不可時議壯之擢詹事府丞天順元年改太常丞進太僕卿明年復設山西巡撫遷侃右僉都御史任之奏言塞北之地與窮荒無異非生長其間者未有能寧居而狎敵者也今南人戍西北邊怯風寒聞寇股栗而北人戍南亦不耐暑多潛逃宜令南北清勾之軍各就本土補伍人情交便戎備得修時不能用奏發巡按李傑罪傑亦訐侃按傑事有驗除名侃無贓罪獲宥六年考察屬吏奏罷布政使王允李正芳以下百六十人因言諸臣年與臣若不堪任事者臣悉退之臣亦當罷詔不許侃性剛方力振風紀貪墨者屏跡其年冬以母喪歸軍民擁泣至不得行服除遂不出家居十餘年卒侃事親孝好學安貧歿幾不能殮弘治初國子生江紀等言前祭酒胡儼都御史高明李侃學行事功彰著耳目並乞賜諡寢不行侃二子德恢嚴州知府德仁河東鹽運使雷復字景暘湖廣寧遠人正統初進士授行人歷官廣西副使藤縣民胡趙成搆瑤陷縣治復與參將范信討斬之成化初以大臣會薦擢山東右布政使七年徵拜禮部右侍郎尋改右副都御史巡撫山西繼李侃後端恪守法得軍民心敗寇紅沙烟再敗之烟寺溝石人村賜敕奬勞時山西大祲而廷議以陝西用兵令預徵芻餉轉輸榆林復上言自山西至榆林道路險絶民齎銀往易價騰踴不免稱貸償責多破産今雨雪愆違饑民疾病流離困悴萬狀而應輸綾帛藥果諸物又不下萬計乞依山東例蠲除仍發帑振贍帝從之及發金三萬不足請鬻鹽四十萬引並令民入粟授散官皆報可十年夏卒於官李綱字廷張長清人幼從父入都墜車下車轢體過竟不傷人咸異之登天順元年進士授御史歷按南畿浙江劾去浙江贓吏至四百餘人時目為鐵御史奉敕編集陝西延綏土兵還遷太僕寺少卿巡畿輔馬政盡却有司饋按冀州遇盜問隸人曰太僕李公耶是何從得金不啓篋而去成化十三年遷右僉都御史轉左出督漕運與平江伯陳鋭共事踰年卒鋭見笥中惟敝衣揮涕曰君子也為具棺斂聞其清節於朝帝特命賜祭葬不為令綱清剛似李侃為時所重原傑字子英陽城人正統十年進士又二年授南京御史尋改北巡按江西捕誅劇盜姦宄斂跡復按順天諸府大水牧官馬者乏芻馬多斃有司責償傑請免之開中鹽引入米振饑疏入為部所格景帝卒從傑議超擢江西按察使發寧王奠培淫亂事革其護衛治行聞賜誥旌異遷山東左布政使成化二年就拜右副都御史巡撫其地歲凶振救民無流移召為戶部左侍郎時黃河遷決不常彼陷則此淤軍民就淤墾種姦徒指為園場屯地獻王府邀賞王府輒據有之傑請獻者謫戍並罪受獻者從之江西盜起以傑嘗再蒞其地得民詔往治捕戮六百餘人餘悉解散改左副都御史還佐院事荊襄流民數十萬朝廷以為憂祭酒周洪謨嘗著流民圖說謂當增置府縣聽附籍為編氓可實襄鄧戶口俾數百年無患都御史李賓以聞帝善之十二年遂命傑出撫遍歷山溪宣朝廷德意諸流民欣然願附籍於是大會湖廣河南陝西撫按官籍之得戶十一萬三千有奇口四十三萬八千有奇其初至無産及平時頑梗者驅還其鄉而附籍者用輕則定田賦民大悅因相地勢以襄陽所轄鄖縣居竹房上津商洛諸縣中道路四達去襄陽五百餘里山林阻深將吏鮮至猝有盜賊府難遙制乃拓其城置鄖陽府以縣附之且置湖廣行都司增兵設戍而析竹山置竹溪析鄖置鄖西析漢中之洵陽置白河與竹山上津房咸隸新府又於西安增山陽南陽增南召桐柏汝州增伊陽各隸其舊府制既定薦知鄧州吳遠為鄖陽知府諸縣皆擇鄰境良吏為之流人得所四境乂安將還以地界湖廣河南陝西事無統紀因薦御史吳道宏自代詔即擢道宏大理少卿撫治鄖陽襄陽荊州南陽西安漢中六府鄖陽之有撫治自此始也傑以功進右都御史傑數揚歷於外既居內臺不欲出荊襄之命非其意也事竣急請還朝會南京兵部缺尚書以傑任之傑疏辭不許遂卒於南陽年六十一鄖襄民為立祠詔贈太子太保録其子宗敏為國子生彭誼字景宜東莞人正統中由鄉舉除工部司務嘗與尚書辨事無所阿景帝立用薦改御史從尚書石璞塞沙灣決河進秩二等復決再往塞之景泰五年以從大學士王文巡視江淮擒獲蘇州賊擢大理寺丞明年二月擢右僉都御史提督紫荊倒馬諸關劾都指揮胡璽納賄縱軍罪天順初罷巡撫官中朝有不悅誼者下遷紹興知府歲饑輒發廩振貸吏白當俟朝命誼曰民方急安得循故事耶築白馬閘障海潮歷九載多惠政超擢山東左布政使入為工部左侍郎成化四年遼東巡撫張岐得罪吏部舉代者帝曰遼東自王翺後屢更巡撫多不稱可於大臣中求之乃改誼右副都御史以往鎮守中官橫徵諸屬衛誼下令凡文牒不經巡撫審定者所司毋輒行虐焰為息十年冬戶部檄所司開黑山金場誼奏永樂中太監王彥等開是山督夫六千人三閲月止得金八兩請罷之遂止誼好古博學通律曆占象水利兵法之屬平居謙厚簡默臨事毅然有斷鎮遼八年軍令振肅年未老四疏告歸家居四十餘年卒牟俸巴人景泰初進士授御史巡按雲南南寧伯毛勝鎮金齒俸列其違縱罪將吏皆聳天順元年出為福建僉事成化初進秩副使久之遷江西按察使政尚嚴厲入為太僕卿八年以左僉都御史巡撫山東歲祲請發濟南倉儲減價以糶令臨清關稅收米麥濟振皆從之時大饑雖獲振饑民衆轉徙益多俸請敕鄰境撫按隨所在安輯秋成資遣復業又乞開中淮浙鹽百萬引盡蠲州縣逋課詔如所請更命移臨清倉粟十萬石振之至七月俸又言公私困竭救荒靡策乞開納粟例令胥吏得就選富民授散官且截留漕糧備振十月復言今救荒者止救其饑不謀其寒縱得食終不免僵死乞貸貧民布棉帝皆嘉納俸又檄發東昌濟寧倉粟十萬餘石為軍士月糧而以德州臨清寄庫銀易米振濟奏請伏專擅罪帝特宥之已復以俸奏免柴夫折價銀移河南輸邊粟濟山東而別給銀為邊餉山東輸京租二十萬石給本地用十年又饑請發倉儲出貸撫山東五年盡心荒政活饑民不可勝數以右副都御史改撫蘇松俸性嚴以所部多巨室欲故摧抑之乃禁索私租勸富家出穀備振動千計怨謗紛然中官汪直有事南京或譖俸直歸未發也俸初在山東與布政陳鉞負氣不相下後鉞從容言俸短直信之十四年俸議事至京直請執俸下詔獄先是所親學士江朝宗除服還朝俸迓之九江聯舟並下所至有司供張頗盛直因謂朝宗有所關說並下獄詞連僉事吳等十餘人俱被逮繫獄半歲謫戍湖廣俸在江西時共成許聰獄人多議其深文至是被禍皆知為直誣然無白其冤者踰年卒戍所夏塤字宗成天台人景泰二年進士授御史天順初巡授福建繼清軍江西發鎮守中官葉達恣橫狀達為斂威以薦超擢廣東按察使時用師歲久役民守城塤至悉遣之成化初奏瑤僮弗靖用兵無功由有司撫字乖方賊因得誘良民為徒黨劇寇數百脅從萬千進則驅之當前退則殺以抒憤害常在民而利常在彼況用兵不已供斂日增以易搖之人心責無窮之軍費恐外患未除內變先作請慎選監司守令撫綏遺民彼被脅之衆自聞風來歸帝深納其言尋遷布政使調江西八年以右副都御史巡撫四川苗僚時為寇塤立互知會捕法賊為之戢古州苗萬餘居爛土久時議逐之塤謂非計松潘參將堯彧請益戍兵三千又力陳不可皆得寢已奏所部將校多犯法奏請踰時輒至遁逸請先逮繫然後奏聞帝可之塤剛介善聽斷所至民不冤在蜀二年民夷畏服然厭繁劇與時多齟齬子鍭獻詩勸歸塤欣然納焉年未五十即求退章四上得請既歸杜門養親不接賓客又五年卒鍭舉進士弘治四年謁選入都上書請復李文祥鄒智等官罷大學士劉吉忤旨下獄得釋久之除南京大理評事疏論賦斂徭役馬政鹽課利弊及宗藩戚里侵漁狀不報鍭素無宦情居官僅歲餘念母老乞侍養遂歸家居三十餘年竟不復出高明字上達貴溪人幼事母以孝聞登景泰二年進士授御史聞內苑造龍舟切諫有指揮為大臣所陷論死辨出之徐州民訴有司於朝時例越訴者戍邊明言戍邊防誣訴也今訴不誣法止當杖民有為妖言者吏貪功誣以謀反明按無反狀止坐妖言律皆報許巡按河南黜屬吏六十人再按畿輔入總諸道章奏天順初尚書陳汝言有罪偕諸御史劾下之獄四年御史趙明等劾天下朝覲官觸帝怒詰草疏主名衆大懼明獨自承都御史寇深言頻年章疏盡出明手幸勿以細故加罪帝意解反稱明能石亨既誅僮僕皆收明言不宜坐免者百人擢大理寺丞憲宗立拜南京右僉都御史以留都春夏淫雨請修人事以回天意時納馬入監者至萬餘人明請區別薦郎中孫瓊陳鴻漸梅倫何宜主事宋瑛皆端方廉潔恬於進取宜顯擢以風有位疏下所司成化三年揚州鹽寇起守兵失利詔明討之造巨艦名曰籌亭往來江上督戰並江置邏堡候望賊蹤跡無所匿遂平之內官鬻私鹽據法沒入鹽政大治因條上利病十餘事多議行仍還原任以親老乞終養歸十四年上杭盜發詔起巡撫福建督兵往討擒誅首惡餘皆減死遣戍以上杭地接江西廣東盜易嘯聚請析置永定縣移疾徑歸久之卒楊繼宗字承芳陽城人天順初進士授刑部主事囚多疫死為時其食飲令三日一櫛沐全活甚衆又善辨疑獄河間獲盜遣里民張文郭禮送京師盜逸文謂禮曰吾二人並當死汝母老鮮兄弟以我代盜庶全汝母子命禮泣謝從之文桎梏詣部繼宗察非盜竟辨出之成化初用王翺薦擢嘉興知府以一僕自隨署齊蕭然性剛廉孤峭人莫敢犯而時時集父老問疾苦為祛除之大興社學民間子弟八歲不就學者罰其父兄遇學官以賓禮師儒競勸文教大興御史孔儒清軍里老多撻死繼宗榜曰御史杖人至死者詣府報名儒怒繼宗入見曰為治有體公但剔姦弊勸懲官吏若比戶稽核則有司事非憲體也儒不能難而心甚銜之瀕行突入府署發篋視之敝衣數襲而已儒慙而去中官過者繼宗遺以菱芡曆書中官索錢繼宗即發牒取庫金曰金具在與我印券中官咋舌不敢受入覲汪直欲見之不可憲宗問直朝覲官孰廉直對曰天下不愛錢者惟楊繼宗一人耳九載秩滿超遷浙江按察使數與中官張慶忤慶兄敏在司禮每於帝前毀繼宗帝曰得非不私一錢之楊繼宗乎敏惶恐遺書慶曰善遇之上已知其人矣聞母喪立出止驛亭下盡籍廨中器物付有司惟攜一僕書數卷而還服除以右僉都御史巡撫順天畿內多權貴莊田有侵民業者輒奪還之按行關塞武備大飭星變應詔陳言歷指中官及文武諸臣貪殘狀且請召還中官出鎮者益為權貴所嫉治中陳翼訐其過權貴因中之左遷雲南副使孝宗立遷湖廣按察使既至命汲水百斛洗滌廳事而後視事曰吾以除穢也居無何復以僉都御史巡撫雲南三司多舊僚相見歡然既而出位揖之曰明日有公事諸君幸相諒遂劾罷不職者八人未幾卒繼宗力持風節而居心慈厚自處必以禮為知府謁上官必衣繡服朝覲謁吏部亦然或言不可笑曰此朝廷法服也此而不服將安用之為浙江按察時倉官十餘人坐缺糧繫獄至鬻子女以償繼宗欲寬之而無由一日送月俸至命量之則溢原數較他司亦然因悟倉吏缺糧之由將具實以聞衆懼請於繼宗願捐俸代償由是十人者獲釋嘗監鄉試得二卷具朝服再拜曰二子當大魁天下吾為朝廷得人賀耳及拆卷王華李旻也後果相繼為狀元人服其鑑天啓初諡貞肅贊曰明初以十五布政司分治天下諸邊要害則遣侯伯勳臣鎮扼之永樂之季敕蹇義等二十六人巡行天下安撫軍民事竣還朝不為經制宣德初始命熊概巡撫蘇松兩浙越數年而江西河南諸省以次專設巡撫官天順初暫罷復設諸邊亦稍用廷臣出鎮或參贊軍務蓋以地大物衆法令滋章三司謹奉教條修其常職而興利除弊均賦稅擊貪濁安善良惟巡撫得以便宜從事熊概以下諸人強幹者立聲威愷悌者流惠愛政績均有可紀于謙周忱巡撫最為有名而勳業尤盛故別著焉
