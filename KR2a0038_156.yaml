body:
  text: 明史卷一百五十六列傳第四十四吳允誠子克忠孫瑾薛斌子綬弟貴李賢吳成滕定金順金忠蔣信李英從子文毛勝焦禮毛忠孫銳和勇羅秉忠吳允誠蒙古人名把都帖木兒居甘肅塞外塔溝地官至平章永樂三年與其黨倫都兒灰率妻子及部落五千馬駝萬六千因宋晟來歸帝以蒙古人多同名當賜姓別之尚書劉儁請如洪武故事編為勘合允誠得賜姓名授右軍都督僉事倫都兒灰亦賜姓名柴秉誠授後軍都督僉事餘授官賜冠帶給畜產鈔幣有差使領所部居涼州耕牧晟以招徠功封西寧侯自是降附者益衆邊境日安由允誠始七年往亦集乃覘敵擒哈剌等二十餘人進都督同知明年從出塞敗本雅失里進右都督尋進左都督與中官王安追闊脫赤至把力河獲之封恭順伯食祿千二百石予世券允誠三子答蘭管者克勤允誠與二子從軍留其妻及管者居涼州番人虎保等誘脅允誠衆欲叛去允誠妻與管者謀召部將都指揮保住卜顏不花等擒其黨誅之帝喜降敕奬之賜縑鈔羊米甚厚授管者指揮僉事保住賜姓名楊效誠授指揮僉事韃靼可汗鬼力赤遇弒其下多潰答蘭與別立哥請出塞自效有功別立哥者秉誠子也帝征瓦剌允誠父子皆從師還命仍居涼州備邊允誠卒贈國公諡忠壯命答蘭更名克忠襲其爵再征阿魯台從行三征阿魯台復從兄弟皆有功洪熙元年以戚里恩克忠進侯時管者已積功至都指揮同知亦封廣義伯克忠嘗充副總兵巡邊正統九年統兵出喜峰口征兀良哈有功加太子太保土木之變克忠與其弟都督克勤子瑾為後拒寇突至驟戰不勝敵兵據山上飛矢石如雨官軍死傷略盡克忠下馬射矢竭猶殺數人與克勤俱歿於陣贈邠國公諡忠勇克勤贈遵化伯諡僖敏瑾被執逃歸嗣侯英宗嘗欲使瑾守甘肅辭曰臣外人若用臣守邊恐外裔輕中國帝善其言乃止曹欽反瑾與從弟琮聞變椎長安門上告門閉欽攻不得入遂縱火瑾將五六騎與欽力戰死贈涼國公諡忠壯予世券三傳至曾孫繼爵嘗守備南京傳子汝胤孫惟英與繼爵皆總督京營戎政崇禎末都城陷汝胤弟勳衞汝徵偕妻女投繯死管者卒子嗣管者妻早奴亦有智略嘗親入朝獻良馬朝廷多其忠卒管者弟克勤子琮嗣鎮守寧夏成化四年滿四反琮坐激變且臨陣先退下獄論死謫戍邊爵除薛斌蒙古人本名脫歡父薛台洪武中歸附賜姓薛累官燕山右護衞指揮僉事斌嗣職從起兵累遷都督僉事從北征有功進都督同知永樂十八年封永順伯祿九百石世指揮使斌卒子壽童方五歲從父貴引見仁宗立命嗣伯賜名綬長驍勇善戰正統十四年秋與成國公朱勇等遇敵於鷂兒嶺軍敗弦斷矢盡猶持空弓擊敵敵怒支解之既而知其本蒙古人也曰此吾同類宜勇健若此相與哭之諡武毅子輔孫勳並得嗣伯勳子璽乃嗣指揮使如券文貴本名脫火赤斌之弟以舍人從燕王起兵屢脫王於險積官都指揮使再從北征進都督僉事永樂二十年封安順伯祿九百石宣德元年進侯加祿三百石予世券卒贈濱國公諡忠勇無子從子山嗣為指揮使天順改元以復辟恩命山子忠嗣伯卒子瑤嗣弘治中卒子昂降襲指揮使李賢初名丑驢韃靼人元工部尚書洪武二十一年來歸通譯書太祖賜姓名授燕府紀善侍燕世子最恭謹靖難師起有勞績累遷都指揮同知凡塞外表奏及朝廷所降詔敕皆命賢譯賢亦屢陳所見成祖皆採納之仁宗即位念舊勞進後軍都督僉事再進右都督賜賚甚渥尋召見憫其病封忠勤伯食祿千一百石尋卒吳成遼陽人初名買驢父通伯元遼陽行省右丞太祖時觀童來降通伯父子與俱買驢更今姓名充總旗數從大軍出塞建文元年授永平衞百戶降燕從戰皆有功三遷都指揮僉事始知名南軍聞吳買驢名多於陣上指目之設伏淝河進兵小河合戰齊眉山攻敗靈璧軍皆殊死鬬功多成祖即位授都指揮使從征本雅失里疾戰本雅失里以七騎遁從征阿魯台合朱榮兵為前鋒追至闊灣海召還進都督僉事又三從出塞洪熙元年進左都督從陽武侯薛祿征大松嶺為前鋒有功增祿米宣宗初以成嘗宿衞東宮錄舊勞封清平伯祿千一百石予世券從征樂安復與薛祿為前鋒事定出守備興和成好畋獵而不修武備寇伺其出獵卒入城掠其妻孥以去帝聞之置不罪已而阿魯台入貢還其家口三年帝北征從敗賊於寬河進侯祿如故八年卒贈渠國公諡壯勇子忠前死忠子英嗣伯卒子璽嗣坐貪淫奪爵久乃復之卒無子從弟琮嗣四傳至玄孫遵周崇禎末京師陷被殺滕定父瓚住元樞密知院洪武中來降授會州衞指揮僉事賜姓滕從燕起兵進燕山右衞指揮使卒定嗣官屢從出塞有功進至都督僉事宣德四年封奉化伯祿八百石正統初卒子福嗣為指揮使金順本名阿魯哥失里永樂中來降授大寧都指揮僉事從敗本雅失里又敗阿魯台累進都督僉事宣德三年從巡北邊有斬捕功明年封順義伯祿八百石卒子忠嗣為指揮僉事金忠者蒙古王子也先土干也素桀黠為阿魯台所忌永樂二十一年成祖親征漠北至上莊堡率妻子部屬來降時六師深入寇已遠遁帝方恥無功見其來歸大喜賜姓名封忠勇王賜冠帶織金襲衣命坐列侯下輟御前珍羞賜之復賜金銀寶器忠大喜過望班師在道忠騎從數問寇中事眷寵日隆明年忠請為前鋒討阿魯台自效帝初不許會大同開平警報至諸將請從忠言帝復出塞忠與陳懋為前鋒而阿魯台聞王師復出倉皇渡答蘭納木兒河遁去忠懋至河不見寇抵白邙山卒無所遇乃班師仁宗嗣位加太子太保並支二俸宣德三年親征兀良哈敗寇於寬河忠與把台請自效帝許之或言不可遣帝曰去留任所欲耳朕有天下獨少此二人邪二人獲數十人馬牛數百來獻帝喜命中官酌以金卮遂賜之明年加太保六年秋卒命有司治喪葬把台者忠之甥從忠來降授都督僉事宣德初賜姓名蔣信正統中封忠勇伯從駕陷土木也先使隸賽罕王帳下信雖居朔漠志常在中國每詣上皇所慟哭擁衞頗至已竟從駕還詔復給其祿景泰五年卒贈侯諡僖順子也兒索忽襲爵天順初更名善弘治中卒無子爵絕李英西番人父南哥洪武中率衆歸附授西寧州同知累功進西寧衞指揮僉事英嗣官永樂十年番酋老的罕叛英擊之討來川俘斬三百六十人夜雪賊遁追盡獲之進都指揮僉事番僧張答里麻者通譯書成祖授以左覺義居西寧恣甚以計取西番貢使貲納逋逃交通外域肆惡十餘年英發其事磔死籍其家西陲快之末年中官喬來喜鄧誠等使西域道安定曲先遇賊見殺掠所齎金幣仁宗璽書諭赤斤罕東及安定曲先詰賊主名而敕英與土官指揮康壽等進討英詗知安定指揮哈三孫散哥曲先指揮散即思實殺使者遂率兵西入賊驚走追擊踰崑崙山深入數百里至雅令闊與安定賊遇大敗之俘斬千一百餘人獲馬牛雜畜十四萬曲先賊聞風遠遁安定王桑爾加失夾等懼詣闕謝罪宣宗嘉英功遣使褒諭宴勞之令馳驛入朝既至擢右府左都督賜賚加等宣德二年封會寧伯祿千一百石幷封南哥如子爵英恃功而驕所為多不法寧夏總兵官史昭奏英父子有異志南哥上章辯賜敕慰諭之英家西寧招逋逃七百餘戶置莊墾田豪奪人產復為兵部及言官所劾帝宥英追逃者入官七年西寧指揮祁震子成當襲父職庶兄監藏英甥也欲奪之成從祖太平攜成赴京辯英遣人篡取太平及其義兒杖之義兒竟死言官交劾幷及前罪遂下英詔獄奪爵論死正統二年始釋後稍給其祿尋卒英宗復辟官其子錦衣指揮同知尋進都指揮使用薦擢左軍都督僉事屢分典營務以嚴慎稱英從子文宣德間為陝西行都司都指揮僉事西番思俄可嘗盜他部善馬都指揮穆肅求不得會思俄可以畜產鬻於邊肅誣以盜收掠致死番人惶駭思亂文劾之逮肅下吏西陲以寧累官都指揮使天順元年冒迎駕功進都督僉事未幾以右都督出鎮大同寇二千餘騎犯威遠文率師敗之封高陽伯石亨敗革奪門冒功者官文自首帝以守邊不問四年秋孛來大舉入寇文按兵不戰遂入雁門大掠忻代諸州京師震恐寇退徵文下詔獄論斬帝宥文死降都督僉事立功延綏既而進都督同知成化中哈密為土魯番所併求救於朝詔文與右通政劉文往甘肅經略之無功而還弘治初卒正德初贈高陽伯毛勝字用欽初名福壽元右丞相伯卜花之孫伯父那海洪武中歸附以靖難功至都指揮同知無子勝父安太嗣為羽林指揮使傳子濟無子勝嗣論濟征北功進都指揮使嘗逃歸塞外尋復自還正統七年以征麓川功擢都督僉事靖遠伯王驥請選在京番將舍人捕苗雲南乃命勝與都督冉保統六百人往已再征麓川即命二人充左右參將賊平進都督同知十四年夏也先謀入寇勝偕平鄉伯陳懷等率京軍三萬鎮大同懷遇寇戰歿勝脫還以武清伯石亨薦景帝進勝左都督督三千營操練貴州苗大擾詔勝往討未行而也先逼京師勝禦之彰義門北擊退之越二日引兵西直門外解都督孫鏜圍明日都督武興戰歿於彰義門寇乘勝進勝與都御史王竑急援之寇遂引却勝追襲至紫荊關頗有斬獲事定乃命以左副總兵統河間東昌降夷赴貴州賊首韋同烈據香罏山作亂勝與總兵梁珤右副總兵方瑛等從總督王來分道夾擊勝進自重安江大破之會師山下環四面攻之賊窘縛同烈降還討湖廣巴馬諸處反賊克二十餘寨擒賊首吳奉先等百四十人斬首千餘級封南寧伯予世券疏請更名從之移鎮騰衝金齒芒市長官刀放革潛結麓川遺孽思卜發為變勝設策擒之巡按御史牟俸劾其貪暴不法數十事且言勝本降人狡猾難制今又數通外夷恐貽邊患詔巡撫覆實卒置不問天順二年卒贈侯諡莊毅子榮嗣坐石亨黨發廣西立功成化初鎮貴州尋移兩廣卒子文嗣弘治初協守南京傳爵至明亡乃絕焦禮字尚節蒙古人父把思台洪武中歸附為通州衞指揮僉事子勝嗣傳至義榮無子以勝弟謙嗣累功至都指揮同知卒子管失奴幼謙弟禮借襲其職備禦遼東宣德初禮當還職宣宗念禮守邊勞命居職如故別授管失奴指揮使禮尋以年勞累進都指揮同知正統中積功至右都督英宗北狩景帝命充左副總兵守寧遠未幾也先逼京城詔禮率師入衞寇退還鎮景泰四年賊二千餘騎犯興水堡禮擊走之璽書奬勵進左都督英宗復辟以禮守邊有功召入覲封東寧伯世襲賜賚甚厚遣還鎮兵部以禮年垂八十不可獨任奏遣都指揮鄧鐸協同守備居無何禮奏鐸欺侮請更調命都指揮張俊代鐸天順七年卒於鎮贈侯諡襄毅禮有膽略精騎射善以少擊衆守寧遠三十餘年士卒樂為用邊陲寧謐孫壽嗣爵卒無子弟俊嗣成化末歷鎮甘肅寧夏弘治中掌南京前府兼督操江出鎮貴州湖廣俊少事商販既貴能下士而折衝非所長卒子淇嗣嘗分典京營正德中賄劉瑾出鎮兩廣踰年卒弟洵嗣洵雖嗣爵先業盡為淇妻所有生母卒無以葬哀憤得疾卒無子以再從子棟嗣嘉靖中提督五軍營兼掌中府踰十年改總兵湖廣卒贈太子太保諡莊僖傳爵至明亡乃絕毛忠字允誠初名哈喇西陲人曾祖哈喇歹洪武初歸附起行伍為千戶戰歿祖拜都從征哈密亦戰歿父寶以驍勇充總旗至永昌百戶忠襲職時年二十膂力絕人善騎射常從太宗北征宣德五年征曲先叛寇有功八年征亦不剌山擒偽少師知院九年出脫歡山十年征黑山寇皆擒其酋各進一官歷指揮同知正統三年從都督蔣貴征𩽆兒只伯先登陷陣大獲擢都指揮僉事十年以守邊勞進同知始賜姓明年從總兵官任禮收捕沙洲衞都督喃歌部落徙之塞內進都指揮使十三年率師至罕東生縶喃歌弟偽祁王鎖南奔幷其部衆擢都督僉事始賜名忠尋充右參將協守甘肅景泰初侍郎李實使漠北還言忠數遣使通瓦剌詔執赴京既至兵部論其罪請置大辟景帝不許請貶官發福建立功乃遣之福建而官秩如故令甘肅守臣徙其家屬京師初忠之征沙漠也獲番僧加失領真以獻英宗赦不誅後逃之瓦剌為也先用憾忠欲陷之遂宣言忠與也先交通而朝廷不察也英宗在塞外獨知之比復辟即召還而忠在福建亦屢有斬馘功乃擢都督同知充左副總兵鎮守甘肅陛見慰諭甚至賜玉帶織金蟒衣天順二年寇大入甘肅巡撫芮釗劾奏諸將失事罪部議忠功足贖罪置不問三年以鎮番破賊功進左都督五年孛來以數萬騎分掠西寧莊浪甘肅諸道入涼州忠鏖戰一日夜矢盡力疲賊來益衆軍中皆失色忠意氣彌厲拊循將士復殊死鬬賊見終不可勝而援軍亦至遂解去忠竟全師還七年永昌涼州莊浪塞外諸番屢為邊患忠與總兵官衞穎分討之忠先破巴哇諸大族其昝咂馬吉思諸族他將不能下者忠復擊破之論功忠止增祿百石而穎乃得世券忠以為言遂封伏羌伯成化四年固原賊滿四據石城反詔忠移師討之與總督項忠等夾攻賊巢忠由木頭溝直抵礮架山下多所斬獲賊稍却冒矢石連奪山北山西兩峰而項忠等軍亦克山之東峰及石城東西二門賊大窘相對哭忽昏霧起他哨舉烟掣軍賊遂併力攻忠忠力戰不已為流矢所中卒年七十五從子海孫鎧前救忠亦死忠為將嚴紀律善撫士其卒也西陲人弔哭者相望於道事聞贈侯諡武勇予世券弘治中從有司言建忠義坊於蘭州以表其里又從巡撫許進言建武勇祠於甘州城東春秋致祭孫銳襲伯爵成化中協守南京弘治初出鎮湖廣改兩廣平蠻賊累有功咸璽書奬勵九年以廣西破賊增歲祿二百石言官劾銳廣置邸舍私造大舶以通番商置不問思恩土官岑濬反與總督潘蕃討平之既又討平賀縣僮賊加官至太子太傅正德三年劉瑾欲殺尚書劉大夏坐以處置田州事失宜并逮銳下詔獄獄具革其加官并歲祿五百石已而賄瑾起督漕運踰年瑾誅被劾罷六年盜劉宸等擾畿甸命銳與中官谷大用討之所統京軍皆驕惰不習戰明年正月遇賊於長垣與戰大敗身被傷亡將印會許泰援軍至僅免言官交劾乃召還以與大用同事竟不罪世宗即位復起鎮湖廣居三年卒贈太傅諡威襄傳子江及漢漢嘉靖中掌南京左府提督操江改總督漕運未上給事中楊上林劾其所至貪墨詔褫職逮問卒無子從子桓嗣卒子登嗣萬曆中掌中軍府事垂二十年又再傳而明亡和勇初名脫脫孛羅和寧王阿魯台孫也阿魯台既為瓦剌脫歡所殺子阿卜只俺窮蹙款塞來歸宣宗授以左都督賜第京師卒勇襲指揮使帶俸錦衣衞積功至都督僉事天順元年詔加同知賜姓名久之以兩廣多寇命充遊擊將軍統降夷千人往討時總兵顏彪無將略賊勢愈熾廣西巡撫吳禎殺降冒功得優賞彪效之亦殺平民報捷朝廷進彪官勇亦進右都督既而師久無功言官劾文武將吏之失事者詔停勇俸充為事官成化初趙輔韓雍征大藤峽賊詔勇以所部從征其冬賊大破進左都督增祿百石三年召督効勇營訓練尋上言大藤峽之役臣與趙輔同功輔還京餘賊復叛臣親搗賊巢縶其魁誅其黨還被掠男女四千人今輔已封伯而臣止進秩惟陛下憐察憲宗以勇再著戰功特封靖安伯十年卒諡武敏世襲指揮使勇性廉謹在兩廣時諸將多營私漁利勇獨無所取時論稱之羅秉忠初名克羅俄領占沙州衞都督僉事困即來子也兄喃哥既襲父職英宗復命秉忠為指揮使協理衞事既而喃哥率千二百人內徙詔居之東昌平山二衞給田廬什器所以撫恤甚厚喃哥卒秉忠為都指揮使代領其衆英宗北狩塞上多警朝議恐降人乘機為變欲徙之南方會貴州苗亂都督毛福壽南征即擢秉忠都督僉事率所部援剿積戰功至左都督天順初始賜姓名曹欽之反番官多從之者秉忠亦坐下獄籍其家久之上章自辯乃得釋成化初尚書程信討山都掌蠻秉忠以遊擊將軍從既抵永寧分兵六道秉忠由金鵝江進大破之論功封順義伯十六年卒諡榮壯子孫世指揮使贊曰明興諸番部懷太祖功德多樂內附賜姓名授官職者不可勝紀繼以成祖銳意遠圖震耀威武於是吳允誠金忠之徒率衆來屬遂得列爵授任比肩勳舊或以戰功自奮錫券受封傳世不絕視夫陸梁倔強者順逆殊異不其昭歟土木以還勢以不競邊政日弛火篩俺答諸部騷動無寧歲盛衰之故概可考焉
