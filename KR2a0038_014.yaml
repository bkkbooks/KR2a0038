body:
  text: 明史卷十四本紀第十四憲宗二十二年春正月辛亥南京地震有聲戊午大祀天地於南郊二月乙亥朔日有食之甲午敕羣臣修省三月壬子減內府供用物壬戌李震大破靖州苗夏五月丁卯副都御史原傑撫治荊襄流民庚申録囚秋七月庚戌黑眚見乙丑躬禱天地於禁中以用度不節工役勞民忠言不聞仁政不施四事自責戊辰遣使録天下囚冬十月辛巳京師地震十一月巡撫四川都御史張瓚討灣溪苗破之十二月己丑置鄖陽府設行都司衛所處流民是年土魯番撒馬兒罕琉球烏斯藏入貢十三年春正月庚戌大祀天地於南郊己巳置西廠太監汪直提督官校刺事夏四月汪直執郎中武清樂章太醫院院判蔣宗武行人張廷綱浙江布政使劉福下西廠獄五月甲戌執左通政方賢下西廠獄丙子大學士商輅尚書項忠請罷西廠從之六月甲辰罷項忠為民庚戌復設西廠丁巳商輅致仕秋八月壬戌錦衣衛官校執工部尚書張文質繫獄帝知而釋之冬十月戊申復立哈密衛於苦峪谷給土田牛種十一月張瓚破松潘疊溪苗是年免浙江山東河南江西福建被災稅糧振山東南畿州縣飢安南琉球烏斯藏暹羅日本入貢滿都魯癿加思蘭各遣使貢馬十四年春正月甲戌大祀天地於南郊三月戊辰免浙江被災秋糧己卯賜曾彥等進士及第出身有差辛巳罷烏撒衛銀場丙戌復開遼東馬市丁亥以浙江飢罷採花木夏四月丁酉免南畿山東被災秋糧六月癸卯太監汪直行遼東邊秋七月丁丑遣使振畿南山東飢八月癸巳以直隸山東災傷詔六部條恤民事宜南京刑部侍郎金紳巡視江西水災庚戌免湖廣被災秋糧甲寅下巡撫蘇松副都御史牟俸於錦衣衛獄謫戍十二月甲午免畿內被災秋糧是年占城烏斯藏撒馬兒罕入貢十五年春正月丁卯大祀天地於南郊辛巳振山東飢免秋糧二月免湖廣被災秋糧甲寅詔修開國勳臣墓無後者置守冢一人夏四月丙午免南畿被災稅糧壬子下駙馬都尉馬誠於錦衣衛獄五月壬戌汪直劾侍郎馬文升下文升獄謫戍癸酉以馬文升牟俸事杖給事中李俊御史王濬五十六人於闕下己卯免湖廣河南被災稅糧秋七月癸酉汪直行大同宣府邊冬十月丁亥撫寧侯朱永為靖虜將軍充總兵官汪直監軍禦伏當加十二月辛未論功封朱永保國公加汪直歲祿升賞者二千六百餘人是月免四川江西被災稅糧是年琉球安南烏斯藏入貢十六年春正月甲午大祀天地於南郊丁酉保國公朱永為平虜將軍充總兵官王越提督軍務汪直監軍禦亦思馬因於延綏二月癸酉免湖廣被災稅糧戊寅王越襲亦思馬因於威寧海子破之三月戊子以歲歉減光祿寺供用物夏六月癸丑禁勢家侵占民田秋八月辛酉申存恤孤老之令冬十二月庚申亦思馬因犯大同丙寅朱永汪直王越帥京軍禦之是月總督兩廣軍務都御史朱英總兵官平鄉伯陳政討廣西瑤破之是年免兩畿湖廣河南山東雲南被災稅糧琉球暹羅蘇門答剌土魯番撒馬兒罕入貢十七年春正月丙戌大祀天地於南郊二月壬戌核天下庫藏出納之數是月免浙江山西被災稅糧三月辛卯賜王華等進士及第出身有差夏四月庚申以久旱風霾敕羣臣修省戊辰諭法司慎刑獄太監懷恩同法司録囚自是每五歲遣內臣審録以為常癸酉亦思馬因犯宣府五月己亥汪直監督軍務王越為平胡將軍充總兵官禦之秋七月甲戌免南畿被災秋糧甲午命所在鎮守總兵巡撫聽汪直王越節制冬十月壬戌振河南飢十一月戊子取太倉銀三分之一入內庫是年安南占城滿剌加烏斯藏入貢安南黎灝侵老撾宣慰司賜敕諭之十八年春正月壬午大祀天地於南郊庚寅劉吉起復三月已巳朔振南畿飢壬申罷西廠夏四月癸丑罕慎復哈密城甲子免山西被災夏稅五月免山東南畿被災稅糧六月壬寅亦思馬因犯延綏汪直王越調兵禦敗之秋八月癸丑遣使振畿內山東飢辛酉免河南被災稅糧閏月壬申倉副使應時用請罷饒州燒造御器內臣下獄贖還職冬十一月免畿內陝西遼東被災秋糧十二月庚午御製文華大訓成是年琉球哈密暹羅土魯番烏斯藏入貢十九年春正月丙午大祀天地於南郊三月丙辰免湖廣被災稅糧夏四月丁丑免河南被災稅糧六月乙亥汪直有罪調南京御馬監丁丑陳政破廣西瑤秋七月辛丑迤北小王子犯大同癸卯總兵官許寧禦之敗績己未朱永為鎮朔大將軍充總兵官帥京軍禦之八月甲子犯宣府巡撫都御史秦紘總兵官周玉禦却之乙丑戶部侍郎李衍刑部侍郎何喬新巡視邊關壬申謫汪直為奉御其黨王越戴縉等貶黜有差是月朱永敗寇於大同宣府冬十月壬申召朱永還是年撒馬兒罕貢獅子二十年春正月庚寅京師地震壬辰敕羣臣修省詔減貢獻飭備邊罷營造理冤獄寬銀課工役馬價恤大同陳亡士卒丁酉大祀天地於南郊三月庚寅賜李旻等進士及第出身有差己酉太監張善監督軍務定西侯蔣琬充總兵官同總督尚書余子俊備大同宣府夏四月戊午録囚五月甲午再録囚減死罪以下六月免南畿陝西被災稅糧秋九月乙酉朔日有食之是月寇復入居河套是秋陝西山西大旱飢人相食停歲辦物料免稅糧發帑轉粟開納米事例振之冬十月丁巳杖刑部員外郎林俊都督府經歷張黻並謫官癸酉罷雲南元江諸府銀坑十二月免山西河南被災夏稅是年安南日本琉球哈密土魯番入貢二十一年春正月甲申朔星變丙戌詔羣臣極言時政庚寅赦天下乙未大祀天地於南郊乙巳遣侍郎李賢何喬新賈俊振陝西山西河南飢二月己未放免傳奉文武官五百六十餘人丁丑免陝西被災稅糧夏四月戊午以泰山屢震遣使祭告壬戌轉漕四十萬石振陝西飢是月免南畿山東被災稅糧五月壬戌京師地震丙子振京師飢民六月辛巳令武臣納粟襲職癸未詔盛暑祁寒廷臣所奏毋得過五事秋八月己卯朔日有食之九月甲子劉珝致仕冬十月免山東山西河南陝西四川被災稅糧十一月丙寅京師地震十二月甲申詹事彭華為吏部左侍郎兼翰林學士入閣預機務甲午振南畿飢是冬小王子犯蘭州莊浪鎮番涼州是年哈密烏斯藏入貢二十二年春正月己未大祀天地於南郊乙丑免河南被災秋糧二月庚辰免畿南及湖廣被災秋糧夏四月乙未清畿內勳戚莊田六月免南畿陝西被災稅糧乙亥敕羣臣修舉職業甲午諭法司慎刑秋七月小王子犯甘州指揮姚英等戰死九月免河南廣東被災稅糧丁卯兵部左侍郎尹直為戶部侍郎兼翰林學士入閣預機務冬十一月癸丑占城為安南所侵王子古來來奔十二月免江西廣西被災稅糧是年哈密琉球入貢二十三年春正月免陝西湖廣被災稅糧庚戌大祀天地於南郊二月乙酉副都御史邊鏞邊政司參議田景賢巡視大同諸邊三月丁未彭華致仕丁巳賜費宏等進士及第出身有差癸亥免山東被災稅糧夏四月乙亥免浙江被災秋糧五月乙卯旱遣使分禱天下山川丙辰敕羣臣修省是月朵顏三衛避那孩入遼東令駐牧近邊給米布六月免陝西南畿被災秋糧秋七月戊申封皇子祐杬為興王祐棆岐王祐檳益王祐楎衡王祐橒雍王八月庚辰帝不豫甲申皇太子攝事於文華殿己丑崩年四十有一九月乙卯上尊諡廟號憲宗葬茂陵贊曰憲宗早正儲位中更多故而踐阼之後上景帝尊號恤于謙之冤抑黎淳而召商輅恢恢有人君之度矣時際休明朝多耆彥帝能篤於任人謹於天戒蠲賦省刑閭里日益充足仁宣之治於斯復見顧以任用汪直西廠橫恣盜竊威柄稔惡弄兵夫明斷如帝而為所蔽惑久而後覺婦寺之禍固可畏哉
