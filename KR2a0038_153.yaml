body:
  text: 明史卷一百五十三列傳第四十一宋禮藺芳陳瑄王瑜周忱宋禮字大本河南永寧人洪武中以國子生擢山西按察司僉事左遷戶部主事建文初薦授陝西按察僉事復坐事左遷刑部員外郎成祖即位命署禮部事以敏練擢禮部侍郎永樂二年拜工部尚書嘗請給山東屯田牛種又請犯罪無力準工者徙北京為民並報可七年丁母憂詔留視事九年命開會通河會通河者元至元中以壽張尹韓仲暉言自東平安民山鑿河至臨清引汶絶濟屬之衛河為轉漕道名曰會通然岸狹水淺不任重載故終元世海運為多明初輸餉遼東北平亦專用海運洪武二十四年河決原武絶安山湖會通遂淤永樂初建北京河海兼運海運險遠多失亡而河運則由江淮達陽武發山西河南丁夫陸挽百七十里入衛河歷八遞運所民苦其勞至是濟寧州同知潘叔正上言舊會通河四百五十餘里淤者乃三之一濬之便於是命禮及刑部侍郎金純都督周長往治之禮以會通之源必資汶水乃用汶上老人白英策築堽城及戴村壩橫亙五里遏汶流使無南入洸而北歸海匯諸泉之水盡出汶上至南旺中分之為二道南流接徐沛者十之四北流達臨清者十之六南旺地勢高決其水南北皆注所謂水脊也因相地置閘以時蓄泄自分水北至臨清地降九十尺置閘十有七而達於衛南至沽頭地降百十有六尺置閘二十有一而達於淮凡發山東及徐州應天鎮江民三十萬蠲租一百一十萬石有奇二十旬而工成又奏濬沙河入馬常泊以益汶語詳河渠志是年帝復用工部侍郎張信言使興安伯徐亨工部侍郎蔣廷瓚會金純濬祥符魚王口至中灤下復舊黃河道以殺水勢使河不病漕命禮兼董之八月還京師論功第一受上賞潘叔正亦賜衣鈔明年以御史許堪言衛河水患命禮往經畫禮請自魏家灣開支河二泄水入土河復自德州西北開支河一泄水入舊黃河使至海豐大沽河入海帝命俟秋成後為之禮還言海運經歷險阻每歲船輒損敗有漂沒者有司修補迫於期限多科斂為民病而船亦不堅計海船一艘用百人而運千石其費可辦河船容二百石者二十船用十人可運四千石以此而論利病較然請撥鎮江鳳陽淮安揚州及兗州糧合百萬石從河運給北京其海道則三歲兩運已而平江伯陳瑄治江淮間諸河功亦相繼告竣於是河運大便利漕粟益多十三年遂罷海運初帝將營北京命禮取材川蜀禮伐山通道奏言得大木數株皆尋丈一夕自出谷中抵江上聲如雷不偃一草朝廷以為瑞及河工成復以採木入蜀十六年命治獄江西明年造番舟自蜀召還以老疾免朝參有奏事令侍郎代二十年七月卒於官禮性剛馭下嚴急故易集事以是亦不為人所親卒之日家無餘財洪熙改元禮部尚書呂震請豫葬祭如制弘治中主事王寵始請立祠詔祀之南旺湖上以金純周長配隆慶六年贈禮太子太保藺芳夏縣人洪武中舉孝廉纍遷刑部郎中永樂中出為吉安知府寬厚廉潔民甚德之吉水民詣闕言縣有銀礦遣使覆視父老遮芳訴曰聞宋季嘗有言此者卒以妄得罪今皆樹藝地安所得銀礦芳詰告者知其誣獄具同官不敢署名芳請獨任之奏上帝曰吾固知妄也得寢已坐事謫辦事官從宋禮治會通河復為工部都水主事十年河決陽武灌中牟祥符尉氏遣芳按視芳言中鹽隄當暴流之衝請加築塞又言自中灤分導河流使由故道北入海誠萬世利又言新築岸掃止用草索不能堅久宜編木成大囷貫樁其中實以瓦石復以木橫貫樁表牽築隄上則殺水固隄之長策也詔悉從之其後築隄者遵用其法以宋禮薦擢工部右侍郎亡何行太僕卿楊砥言吳橋東光興濟交河及天津屯田雨水決隄傷稼乞開德州良店東南黃河故道以分水勢復命芳往治之所經郡邑有不便民者輒疏以聞事竣還十五年十一月卒於官芳自奉約布衣蔬食事母至孝母甚賢芳所治事暮必告母有不當輒加教誡芳受命唯謹由是為良吏云陳瑄字彥純合肥人父聞以義兵千戶歸太祖纍官都指揮同知瑄代父職父坐事戍遼陽瑄伏闕請代詔併原其父子瑄少從大將軍幕以射雁見稱屢從征南番又征越巂討建昌叛番月魯帖木兒踰梁山平天星寨破寧番諸蠻復征鹽井進攻卜水瓦寨賊熾甚瑄將中軍賊圍之數重瑄下馬射傷足裹創戰自巳至酉全師還又從征賈哈剌以奇兵涉打沖河得間道作浮梁渡軍既渡撤梁示士卒不返連戰破賊又會雲南兵征百夷有功遷四川行都司都指揮同知建文末遷右軍都督僉事燕兵逼命總舟師防江上燕兵至浦口瑄以舟師迎降成祖遂渡江既即位封平江伯食祿一千石賜誥券世襲指揮使永樂元年命瑄充總兵官總督海運輸粟四十九萬餘石餉北京及遼東遂建百萬倉於直沽城天津衛先是漕舟行海上島人畏漕卒多閉匿瑄招令互市平其直人交便之運舟還會倭寇沙門島瑄追擊至金州白山島焚其舟殆盡九年命與豐城侯李彬統浙閩兵捕海寇海溢隄圮自海門至鹽城凡百三十里命瑄以四十萬卒築治之為捍潮隄萬八千餘丈明年瑄言嘉定瀕海地江流衝會海舟停泊於此無高山大陵可依請於青浦築土山方百丈高三十餘丈立堠表識既成賜名寶山帝親為文記之宋禮既治會通河成朝廷議罷海運仍以瑄董漕運議造淺船二千餘艘初運二百萬石寖至五百萬石國用以饒時江南漕舟抵淮安率陸運過壩踰淮達清河勞費甚巨十三年瑄用故老言自淮安城西管家湖鑿渠二十里為清江浦導湖水入淮築四閘以時宣泄又緣湖十里築隄引舟由是漕舟直達於河省費不訾其後復濬徐州至濟寧河又以呂梁洪險惡於西別鑿一渠置二閘蓄水通漕又築沛縣刁陽湖濟寧南旺湖長隄開泰州白塔河通大江又築高郵湖隄於隄內鑿渠四十里避風濤之險又自淮至臨清相水勢置閘四十有七作常盈倉四十區於淮上及徐州臨清通州皆置倉便轉輸慮漕舟膠淺自淮至通州置舍五百六十八舍置卒導舟避淺復緣河隄鑿井樹木以便行人凡所規畫精密宏遠身理漕河者三十年舉無遺策仁宗即位之九月瑄上疏陳七事一曰南京國家根本乞嚴守備二曰推舉宜核實無循資格選朝臣公正者分巡天下三曰天下歲運糧餉湖廣江西浙江及蘇松諸府並去北京遠往復踰年上逋公租下妨農事乞令轉至淮徐等處別令官軍接運至京又快船馬船所載不過五六十石每船官軍足用有司添差軍民遞送拘集聽候至有凍餒請革罷四曰教職多非其人乞考不職者黜之選俊秀補生員而軍中子弟亦令入學五曰軍伍竄亡乞核其老疾者以子弟代逃亡者追補戶絶者驗除六曰開平等處邊防要地兵食虛乏乞選練鋭士屯守兼務七曰漕運官軍每歲北上歸即修船勤苦終年該衛所又於其隙雜役以重困之乞加禁絶帝覽奏曰瑄言皆當令所司速行遂降敕奬諭尋賜券世襲平江伯宣宗即位命守淮安督漕運如故宣德四年言濟寧以北自長溝至棗林淤塞計用十二萬人疏濬半月可成帝念瑄久勞命尚書黃福往同經理六年瑄言歲運糧用軍十二萬人頻年勞苦乞於蘇松諸郡及江西浙江湖廣別僉民丁又於軍多衛所僉軍通為二十四萬人分番迭運又江南之民運糧赴臨清淮安徐州往返一年失誤農業而湖廣江西浙江及蘇松安慶軍士每歲以空舟赴淮安載糧若令江南民撥糧與附近衛所官軍運載至京量給耗米及道里費則軍民交便帝命黃福及侍郎王佐議行之更民運為兌運自此始也八年十月卒於官年六十有九追封平江侯贈太保諡恭襄初瑄以濬河有德於民民立祠清河縣正統中命有司春秋致祭孫豫字立卿讀書修謹正統末福建沙縣賊起以副總兵從寧陽侯陳懋分道討平之進封侯也先入犯出鎮臨清建城堡練兵撫民安靜不擾明年召還父老詣闕請留從之景泰五年山東飢奉詔振恤尋守備南京天順元年召還益歲祿百石七年卒贈黟國公諡莊敏子鋭嗣伯成化初分典三千營及團營尋佩平蠻將軍印總制兩廣移鎮淮陽總督漕運建淮河口石閘及濟寧分水南北二閘築隄疏泉修舉廢墜總漕十四年章數十上日本貢使買民男女數人以歸道淮安鋭留不遣贖還其家淮揚飢疫煮糜施藥多所存濟弘治六年河決張秋奉敕塞治還增祿二百石纍加太傅兼太子太傅十三年火篩寇大同鋭以總兵官佩將軍印往援既至擁兵自守為給事中御史所劾奪祿間住其年卒子熊嗣正德三年出督漕運劉瑾索金錢熊不應銜之坐事逮下詔獄謫戍海南衛奪誥券熊故黷貨在淮南頗殃民雖為瑾搆陷人無惜之者瑾誅赦還復爵卒無子再從子圭嗣以薦出鎮兩廣封川寇起圭督諸將往討擒其魁俘斬數千加太子太保復平柳慶及賀連山賊加太保蔭一子安南范子儀等寇欽廉黎岐賊寇瓊崖相掎角圭移文安南曉以利害使縛子儀而急出兵攻黎岐敗走之論功復蔭一子加歲祿四十石圭能與士卒同甘苦聞賊所在輒擐甲先登深箐絶壑衝冒瘴毒無所避以故所向克捷在粵且十年殲諸小賊不可勝數召還掌後軍府圭妻仇氏咸寧侯鸞女弟也圭深嫉鸞鸞數短圭於世宗幾得罪鸞敗帝益重圭命總京營兵寇入紫荊關圭請出戰營於盧溝寇退而止明年寇復入古北口或議列營九門為備圭以徒示弱無益寇亦尋退董築京師外城加太子太傅卒贈太傅諡武襄子王謨嗣僉書後軍出鎮兩廣賊張璉反屠掠數郡王謨會提督張臬討平之擒斬三萬餘論功加太子太保蔭一子萬曆中出鎮淮安總漕運入掌前軍府事卒贈少保諡武靖傳至明亡爵絶王瑜字廷器山陽人以總旗隸趙王府永樂末常山護衛指揮孟賢等與宦官黃儼結謀弒帝廢太子而立趙王其黨高正者瑜舅也密告瑜瑜大驚曰奈何為此族滅計垂涕諫不聽正懼謀泄將殺瑜瑜遂詣闕告變按治有驗賢等盡伏誅而授瑜遼海衛千戶仁宗即位擢錦衣衛指揮同知厚賜之並戒同官事必白瑜乃行瑜持大體不為苛細廷中稱其賢宣德八年進都指揮僉事充左副總兵代陳瑄鎮淮安董漕運纍進左軍都督僉事淮安瑜故鄉也人以為榮在淮數年守瑄成法不變有善政民有親在與弟訟産者瑜曰訟弟不友無親不孝杖而斥之又有負金不能償至翁壻兄弟相訟者瑜曰奈何以財故傷恩即代償勸其敦睦二卒盜敗舟一板有司以盜官物坐卒死瑜曰兩卒之命抵敗舟一板耶竟得末減歲凶發官廩以振然性好貨為英宗切責而前所發不軌事有枉者正統四年議事入京得疾束兩手如高懸狀號救求解而卒周忱字恂如吉水人永樂二年進士選庶吉士明年成祖擇其中二十八人令進學文淵閣忱自陳年少乞預帝嘉其有志許之尋擢刑部主事進員外郎忱有經世才浮沉郎署二十年人無知者獨夏原吉奇之洪熙改元稍遷越府長史宣德初有薦為郡守者原吉曰此常調也安足盡周君五年九月帝以天下財賦多不理而江南為甚蘇州一郡積逋至八百萬石思得才力重臣往釐之乃用大學士楊榮薦遷忱工部右侍郎巡撫江南諸府總督稅糧始至召父老問逋稅故皆言豪戶不肯加耗並徵之細民民貧逃亡而稅額益缺忱乃創為平米法令出耗必均又請敕工部頒鐵斛下諸縣準式革糧長之大入小出者舊例糧長正副三人以七月赴南京戶部領勘合既畢復齎送部往反資費皆科斂充之忱止設正副各一人循環赴領訖事有司類收上之部民大便忱見諸縣收糧無團局糧長即家貯之曰此致逋之由也遂令諸縣於水次置囤囤設糧頭囤戶各一人名轄收至六七萬石以上始立糧長一人總之名總收民持帖赴囤官為監納糧長但奉期會而已置撥運綱運二簿撥運記支撥起運之數預計所運京師通州諸倉耗以次定支綱運聽其填注剝淺諸費歸以償之支撥羡餘存貯在倉曰餘米次年餘多則加六徵又次年加五徵初太祖平吳盡籍其功臣子弟莊田入官後惡富民豪並坐罪沒入田産皆謂之官田按其家租籍征之故蘇賦比他府獨重官民田租共二百七十七萬石而官田之租乃至二百六十二萬石民不能堪時宣宗屢下詔減官田租忱乃與知府況鍾曲算纍月減至七十二萬餘石他府以次減民始少蘇七年江南大稔詔令諸府縣以官鈔平糴備振貸蘇州遂得米二十九萬石故時公侯祿米軍官月俸皆支於南戶部蘇松民轉輸南京者石加費六斗忱奏令就各府支給與船價米一斗所餘五斗通計米四十萬石有奇並官鈔所糴共得米七十萬餘石遂置倉貯之名曰濟農振貸之外歲有餘羡凡綱運風漂盜奪者皆借給於此秋成抵數還官其修墟築岸開河濬湖所支口糧不責償耕者借貸必驗中下事力及田多寡給之秋與糧並賦凶歲再振其姦頑不償者後不復給定為條約以聞帝嘉奬之終忱在任江南數大郡小民不知凶荒兩稅未嘗逋負忱之力也時漕運軍民相半軍船給之官民則僦舟加以雜耗率三石致一石往復經年失農業忱與平江伯陳瑄議民運至淮安或瓜洲水次交兌漕軍運抵通州淮安石加五斗瓜洲又益五升其附近並南京軍未過江者即倉交兌加與過江米二斗襯墊蘆席與折米五合兌軍或後期阻風則令州縣支贏米設厫於瓜洲水次遷米貯之量支餘米給守者由是漕費大省民間馬草歲運兩京勞費不訾忱請每束折銀三分南京則輕齎即地買納京師百官月俸皆持俸帖赴領南京米賤時俸帖七八石僅易銀一兩忱請檢重額官田極貧下戶兩稅準折納金花銀每兩當米四石解京兌俸民出甚少而官俸常足嘉定崑山諸縣歲納布匹重三斤抵糧一石比解以縷粗見斥者十八九忱言布縷細必輕然價益高今既貴重勢不容細乞自今不拘輕重務取長廣如式從之各郡驛馬及一切供帳舊皆領於馬頭有耗損則馬頭橫科補買忱令田畝出米升九合與秋糧俱征驗馬上中下直給米正統初淮揚災鹽課虧敕忱巡視奏令蘇州諸府撥餘米一二萬石運揚州鹽場聽抵明年田租竈戶得納鹽給米時米貴鹽賤官得積鹽民得食米公私大濟尋敕兼理松江鹽課華亭上海二縣逋課至六十三萬餘引竈丁逃亡忱謂田賦宜養農夫鹽課宜養竈丁因上便宜四事命速行之忱為節竈戶運耗得米三萬二千餘石亦倣濟農倉法置贍鹽倉益補逃亡缺額由是鹽課大殖浙江當造海船五十艘下忱計度忱召問都匠言一艘須米千石忱以成大事不宜惜費第減二十石奏於朝竟得報可以九載秩滿進左侍郎六年命兼理湖州嘉興二府稅糧又命同刑科都給事中郭瑾録南京刑獄忱素樂易先是大理卿胡概為巡撫用法嚴忱一切治以簡易告訐者輒不省或面訐忱公不及胡公忱笑曰胡卿敕旨在祛除民害朝廷命我但云安撫軍民委寄正不同耳既久任江南與吏民相習若家人父子每行村落屏去騶從與農夫餉婦相對從容問所疾苦為之商略處置其馭下也雖卑官冗吏悉開心訪納遇長吏有能如況鍾及松江知府趙豫常州知府莫愚同知趙泰輩則推心與咨畫務盡其長故事無不舉常詣松江相視水利見嘉定上海間沿江生茂草多淤流乃濬其上流使崑山顧浦諸所水迅流駛下壅遂盡滌暇時以匹馬往來江上見者不知其為巡撫也歷宣德正統二十年間朝廷委任益專兩遭親喪皆起復視事忱以此益發舒見利害必言言無不聽初欲減松江官田額依民田起科戶部郭資胡濙奏其變亂成法請罪之宣宗切責資等忱嘗言吳淞江畔有沙塗柴場百五十頃水草茂盛蟲蜢多生其中請募民開墾可以足國課消蟲災又言丹徒丹陽二縣田沒入江者賦尚未除國初蠲稅之家其田多併於富室宜徵其租沒於江者除之則額不虧而貧富均無錫官田賦白米太重請改征租米悉報可其因災荒請蠲貸及所陳他利病無算小者用便宜行之無所顧慮久之見財賦充溢益務廣大修葺舍學校先賢祠墓橋梁道路及崇飾寺觀贈遺中朝官資餉過客無稍吝惜胥吏漁蠹其中亦不甚訾省以故屢召人言九年給事中李素等劾忱妄意變更專擅科斂忱上章自訴帝以餘米既為公用置不問先是姦民尹崇禮欲撓忱法奏忱不當多徵耗米請究問倉庫主者忱因罷前法既而兩稅復逋民無所賴咸稱不便忱乃奏按崇禮罪舉行前法如故再以九載滿進戶部尚書尋以江西人不得官戶部乃改工部仍巡撫景泰元年溧陽民彭守學復訐忱如崇禮言戶部遂請遣御史李鑑等往諸郡稽核明年又以給事中金達言召忱還朝忱乃自陳臣未任事之先諸郡稅糧無歲不逋自臣蒞任設法剗弊節省浮費於是歲無逋租更積贏羡凡向之公用所須科取諸民者悉於餘米隨時支給或振貸未還遇赦宥免或未估時值低昂不一緣奉宣宗皇帝並太上皇敕諭許臣便宜行事以此支用不復具聞致守學訐奏戶部遣官追徵實臣出納不謹死有餘罪禮部尚書楊寧言妄費罪乃在忱今估計餘值悉征於民間至有棄家逃竄者乞將正統以前者免追詔許之召鑑等還既而言官猶交章劾忱請正其罪景帝素知忱賢大臣亦多保持之但令致仕然當時言理財者無出忱右其治以愛民為本濟農倉之設也雖與民為期約至時多不追取每歲徵收畢踰正月中旬輒下檄放糧曰此百姓納與朝廷賸數今還與百姓用之努力種朝廷田秋間又納朝廷稅也其所弛張變通皆可為後法諸府餘米數多至不可校公私饒足施及外郡景泰初江北大飢都御史王竑從忱貸米三萬石忱為計至來年麥熟以十萬石畀之性機警錢穀巨萬一屈指無遺算嘗陰為册記陰晴風雨或言某日江中遇風失米忱言是日江中無風其人驚服有姦民故亂其舊案嘗之忱曰汝以某時就我決事我為汝斷理敢相紿耶三殿重建詔徵牛膠萬斤為綵繪用忱適赴京言庫貯牛皮歲久朽腐請出煎膠俟歸市皮償庫土木之變當國者議欲焚通州倉絶寇資忱適議事至言倉米數百萬可充京軍一歲餉令自往取則立盡何至遂付煨燼頃之詔趣造盔甲數百萬忱計明盔浴鐵工多令且沃錫數日畢辦忱既被劾帝命李敏代之敕無輕易忱法然自是戶部括所積餘米為公賦儲備蕭然其後吳大飢道殣相望課逋如故矣民益思忱不已即生祠處處祀之景泰四年十月卒諡文襄況鍾等自有傳贊曰宋禮陳瑄治河通運道為國家經久計生民被澤無窮周忱治財賦民不擾而廩有餘羡此無他故殫公心以體國而才力足以濟之誠異夫造端興事徼一時之功智籠巧取為科斂之術者也然河渠之利世享其成而忱之良法美意未幾而澌滅無餘民用重困豈非成功之有迹者易以循而用法之因人者難其繼哉雖然見小利而樂紛更不能不為當日之嘵嘵者惜也
