body:
  text: 明史卷一百三十二列傳第二十朱亮祖周德興王弼藍玉曹震張翼張溫陳桓朱壽曹興謝成李新朱亮祖六安人元授義兵元帥太祖克寧國擒亮祖喜其勇悍賜金幣仍舊官居數月叛歸於元數與我兵戰為所獲者六千餘人遂入宣城據之太祖方取建康未暇討也已遣徐達等圍之亮祖突圍戰常遇春被創而還諸將莫敢前太祖親往督戰獲之縛以見問曰爾將何如對曰生則盡力死則死耳太祖壯而釋之纍功授樞密院判從下南昌九江戰鄱陽湖下武昌進廣信衛指揮使李文忠破李伯升於新城亮祖乘勝燔其營落數十獲同僉元帥等六百餘人軍士三千馬八百匹輜重鎧甲無算伯升僅以數騎遁太祖嘉其功賜賚甚厚胡深請會兵攻陳友定亮祖由鉛山進取浦城克崇安建陽功最多會攻桐廬圍餘杭遷浙江行省參政副李文忠守杭州帥馬步舟師數萬討方國瑛下天台進攻台州國瑛出走追至黃巖降其守將哈兒魯徇下仙居諸縣進兵溫州方明善拒戰擊敗之克其城徇下瑞安復敗明善於盤嶼追至楚門國瑛及明善詣軍降洪武元年副征南將軍廖永忠由海道取廣東何真降悉定其地進取廣西克梧州元尚書普賢帖木兒戰死遂定鬱林潯貴諸郡與平章楊璟會師攻克靖江同廖永忠克南寧象州廣西平班師太子帥百官迎勞龍灣三年封永嘉侯食祿千五百石豫世券四年伐蜀帝以諸將久無功命亮祖為征虜右副將軍濟師至蜀而明升已降徇下未附州縣師還以擅殺軍校不預賞八年同傅友德鎮北平還又同李善長督理屯田巡海道十二年出鎮廣東亮祖勇悍善戰而不知學所為多不法番禺知縣道同以聞亮祖誣奏同同死事見同傳帝尋悟明年九月召亮祖至與其子府軍衛指揮使暹俱鞭死御製壙志仍以侯禮葬二十三年追論亮祖胡惟庸黨次子昱亦坐誅周德興濠人與太祖同里少相得從定滁和渡江纍戰皆有功遷左翼大元帥從取金華安慶高郵援安豐征廬州進指揮使從討贛州安福永新拔吉安再進湖廣行省左丞同楊璟討廣西攻永州元平章阿思蘭及周文貴自全州來援德興再擊敗之斬朱院判追奔至全州遂克之道州寧州藍山皆下進克武岡州分兵據險絶靖江聲援廣西平功多洪武三年封江夏侯歲祿千五百石豫世券是歲慈利土酋覃垕連茅岡諸寨為亂長沙洞苗俱煽動太祖命德興為征南將軍帥師討平之明年伐蜀副湯和為征西左將軍克保寧先是傅友德已克階文而和所帥舟師未進及保寧下兩路軍始合蜀平論功帝以和功由德興賞德興而面責和且追數征蠻事謂覃垕之役楊璟不能克趙庸中道返功無與德興比者復副鄧愈為征南左將軍帥趙庸左君弼出南寧平婪鳳安田諸州蠻克泗城州功復出諸將上賞倍於大將命署中立府行大都督府事德興功既盛且恃帝故人營第宅踰制有司列其罪詔特宥之十三年命理福建軍務旋召還明年五溪蠻亂德興已老力請行帝壯而遣之賜手書曰趙充國圖征西羌馬援請討交址朕常嘉其事謂今人所難卿忠勤不怠何忝前賢靖亂安民在此行也至五溪蠻悉散走會四川水盡源通塔平諸洞作亂仍命德興討平之十八年楚王楨討思州五開蠻復以德興為副將軍德興在楚久所用皆楚卒威震蠻中定武昌等十五衛歲練軍士四萬四千八百人決荊州嶽山壩以溉田歲增官租四千三百石楚人德之還鄉賜黃金二百兩白金二千兩文綺百匹居無何帝謂德興福建功未竟卿雖老尚勉為朕行德興至閩按籍僉練得民兵十萬餘人相視要害築城一十六置巡司四十有五防海之策始備逾三年歸第復令節制鳳陽留守司並訓練屬衛軍士諸勳臣存者德興年最高歲時入朝賜豫不絶二十五年八月以其子驥亂宮並坐誅死王弼其先定遠人後徙臨淮善用雙刀號雙刀王初結鄉里依三臺山樹柵自保踰年帥所部來歸太祖知其才使備宿衛破張士誠兵於湖州取池州石埭攻婺源州斬守將鐵木兒不花拔其城獲甲三千擢元帥下蘭溪金華諸暨援池州復太平下龍興吉安大戰鄱陽邀擊陳友諒於涇江口從平武昌還克廬州拔安豐破襄陽安陸取淮東克舊館降士誠將朱暹遂取湖州遷驍騎右衛親軍指揮使進圍平江弼軍盤門士誠親帥鋭士突圍出西門搏戰將奔常遇春軍遇春分兵北濠截其後而別遣兵與戰士誠軍殊死鬬遇春拊弼臂曰軍中皆稱爾健將能為我取此乎弼應曰諾馳騎揮雙刀奮擊敵小却遇春帥衆乘之吳兵大敗人馬溺死沙盆潭者甚衆士誠馬逸墮水幾不救肩輿入城自是不敢復出吳平賞賚甚厚從大軍征中原下山東略定河南北遂取元都克山西走擴廓自河中渡河克陝西進征察罕腦兒師還洪武三年授大都督府僉事世襲指揮使十一年副西平侯沐英征西番降𩽆甘諸酋及洮州十八族殺獲甚衆論功封定遠侯食祿二千石十四年從傅友德征雲南至大理土酋段世扼龍尾關弼以兵由洱水趨上關與沐英兵夾擊之拔其城擒段世鶴慶麗江諸郡以次悉平加祿五百石豫世券二十年以副將軍從馮勝北伐降納哈出明年復以副將軍從藍玉出塞深入不見敵玉欲引還弼持不可玉從之進至捕魚兒海以弼為前鋒直薄敵營走元嗣主脫古思帖木兒盡獲其輜重語在玉傳二十三年奉詔還鄉二十五年從馮勝傅友德練軍山西河南明年同召還先後賜死爵除弼子六人女為楚王妃藍玉定遠人開平王常遇春婦弟也初隸遇春帳下臨敵勇敢所向皆捷遇春數稱於太祖由管軍鎮撫積功至大都督府僉事洪武四年從傅友德伐蜀克綿州五年從徐達北征先出雁門敗元兵於亂山再敗之於土剌河七年帥兵拔興和獲其國公帖里密赤等五十九人十一年同西平侯沐英討西番擒其酋三副使斬獲千計明年師還封永昌侯食祿二千五百石豫世券十四年以征南左副將軍從潁川侯傅友德征雲南擒元平章達里麻於曲靖梁王走死滇地悉平玉功為多益祿五百石冊其女為蜀王妃二十年以征虜左副將軍從大將軍馮勝征納哈出次通州聞元兵有屯慶州者玉乘大雪帥輕騎襲破之殺平章果來擒其子不蘭溪還會大軍進至金山納哈出遣使詣大將軍營納發玉往受降納哈出以數百騎至玉大喜飲以酒納哈出酌酒酬玉玉解衣衣之曰請服此而飲納哈出不肯服玉亦不飲爭讓久之納哈出覆酒於地顧其下咄咄語將脫去鄭國公常茂在坐直前砍傷之都督耿忠擁以見勝其衆驚潰遣降將觀童諭降之還至亦迷河悉降其餘衆會馮勝有罪收大將軍印命玉行總兵官事尋即軍中拜玉為大將軍移屯薊州時順帝孫脫古思帖木兒嗣立擾塞上二十一年三月命玉帥師十五萬征之出大寧至慶州諜知元主在捕魚兒海間道兼程進至百眼井去海四十里不見敵欲引還定遠侯王弼曰吾輩提十餘萬衆深入漠北無所得遽班師何以復命玉曰然令軍士穴地而爨毋見烟火乘夜至海南敵營尚在海東北八十餘里玉令弼為前鋒疾馳薄其營敵謂我軍乏水草不能深入不設備又大風揚沙晝晦軍行敵無所覺猝至前大驚迎戰敗之殺太尉蠻子等降其衆元主與太子天保奴數十騎遁去玉以精騎追之不及獲其次子地保奴妃公主以下百餘人又追獲吳王𩽆兒只代王達里麻及平章以下官屬三千人男女七萬七千餘人並寶璽符敕金牌金銀印諸物馬駝牛羊十五萬餘焚其甲仗蓄積無算奏捷京師帝大喜賜敕褒勞比之衛青李靖又破哈剌章營獲人畜六萬師還進涼國公明年命督修四川城池二十三年施南忠建二宣撫司蠻叛命玉討平之又平都勻安撫司散毛諸洞益祿五百石詔還鄉二十四年命玉理蘭州莊浪等七衛兵以追逃寇祁者孫遂略西番罕東之地土酋哈咱等遁去會建昌指揮使月魯帖木兒叛詔移兵討之至則都指揮瞿能等已大破其衆月魯走柏興州玉遣百戶毛海誘縛其父子送京師誅之而盡降其衆因請增置屯衛報可復請籍民為兵討𩽆甘百夷詔不許遂班師玉長身頳面饒勇略有大將才中山開平即沒數總大軍多立功太祖遇之厚寖驕蹇自恣多蓄莊奴假子乘勢暴橫嘗占東昌民田御史按問玉怒逐御史北征還夜扣喜峯關關吏不時納縱兵毀關入帝聞之不樂又人言其私元主妃妃慚自經死帝切責玉初帝欲封玉梁國公以過改為涼仍鐫其過於券玉猶不悛侍宴語傲慢在軍擅黜陟將校進止自專帝數譙讓西征還命為太子太傅玉不樂居宋潁兩公下曰我不堪太師耶比奏事多不聽益怏怏二十六年二月錦衣衛指揮蔣瓛告玉謀反下吏鞫訊獄辭云玉同景川侯曹震鶴慶侯張翼舳艫侯朱壽東莞伯何榮及吏部尚書詹徽戶部侍郎傅友文等謀為變將伺帝出藉田舉事獄具族誅之列侯以下坐黨夷滅者不可勝數手詔布告天下條列爰書為逆臣録至九月乃下詔曰藍賊為亂謀泄族誅者萬五千人自今胡黨藍黨概赦不問胡謂丞相惟庸也於是元功宿將相繼盡矣凡列名逆臣録者一公十三侯二伯葉升前坐事誅胡玉等諸小侯皆別見其曹震張翼張溫陳桓朱壽曹興六侯附著左方曹震濠人從太祖起兵纍官指揮使洪武十二年以征西番功封景川侯祿二千石從藍玉征雲南分道取臨安諸路至威楚降元平章閻乃馬歹等雲南平因請討容美散毛諸洞蠻及西番𩽆甘思曩日諸族詔不許又請以貴州四川二都司所易番馬分給陝西河南將士又言四川至建昌驛道經大渡河往來者多死瘴癘詢父老自眉州峨眉至建昌有古驛道平易無瘴毒已令軍民修治請以瀘州至建昌驛馬移置峨眉新驛從之二十一年與靖寧侯葉升分道討平東川叛蠻俘獲五千餘人尋復命理四川軍務同藍玉核征南軍士會永寧宣慰司言所轄地有百九十灘其八十餘灘道梗不利詔震疏治之震至瀘州按視有支河通永寧乃鑿石削崖令深廣以通漕運又闢陸路作驛舍郵亭駕橋立棧自茂州一道至松潘一道至貴州以達保寧先是行人許穆言松州地磽瘠不宜屯種戍卒三千糧運不給請移戍茂州俾就近屯田帝以松州控制西番不可動至是運道既通松潘遂為重鎮帝嘉其勞踰年復奏四事一請於雲南大寧境就井鹽募商輸粟以贍邊一令商入粟雲南建昌給以重慶綦江市馬之引一請蠲馬湖逋租一施州衛軍儲仰給湖廣泝江險遠請以重慶粟順流輸之皆報可震在蜀久諸所規畫並極周詳蜀人德之藍玉敗謂與震及朱壽誘指揮莊成等謀不軌論逆黨以震為首並其子炳誅之張翼臨淮人父聚以前翼元帥從平江南淮東積功為大同衛指揮同知致仕翼隨父軍中驍勇善戰以副千戶嗣父職從征陝西擒叛寇擢都指揮僉事進僉都督府事從藍玉征雲南克普定曲靖取鶴慶麗江剿七百房山寨搗劍川擊石門十七年論功封鶴慶侯祿二千五百石豫世券二十六年坐玉黨死張溫不詳何許人從太祖渡江授千戶積功至天策衛指揮僉事從大軍收中原克陝西攻下蘭州守之元將擴廓偵大將軍南還自甘肅帥步騎奄至諸將請固守以待援溫曰彼遠來未知我虛實乘暮擊之可挫其鋭倘彼不退固守未為晚也於是整兵出戰元兵少却已而圍城數重溫斂兵固守敵攻不能下乃引去太祖稱為奇功擢大都督府僉事已又命兼陝西行都督府僉事當蘭州之受圍也元兵乘夜梯城而登千戶郭佑被酒臥他將巡城者擊退之圍既解溫將斬佑天策衛知事朱有聞爭曰當賊犯城時將軍斬佑以令衆軍法也賊既退始追戮之無及於事且有擅殺名溫謝曰非君不聞是言遂杖佑釋之帝聞而兩善焉並賞有聞綺帛其明年以參將從傅友德伐蜀功多十一年以副將會王弼等討西羌明年論功封會寧侯祿二千石又明年命往理河南軍務十四年從傅友德征雲南二十年秋帥師討納哈出餘衆從北伐皆有功後以居室器用僭上獲罪遂坐玉黨死陳桓濠人從克滁和渡江克集慶先登從取寧國金華戰龍江彭蠡收淮東浙西平中原纍功授都督僉事洪武四年從伐蜀十四年從征雲南與胡海郭英帥兵五萬由永寧趨烏撒道險隘自赤河進師與烏撒諸蠻大戰敗走之再破芒部土酋走元右丞實卜遂城烏撒降東川烏蒙諸蠻進克大理略定汝寧靖寧諸州邑十七年封普定侯祿二千五百石豫世券二十年同靖寧侯葉升征東川俘獲甚衆就令總制雲南諸軍再平九溪洞蠻立營堡屯田還坐玉黨死朱壽未詳何許人以萬戶從渡江下江東郡邑進總管收常婺克武昌平蘇湖轉戰南北積功為橫海衛指揮進都督僉事與張赫督漕運有功洪武二十年封舳艫侯祿二千石豫世券坐玉黨死曹興一名興才未詳何許人從平武昌授指揮僉事取平江進指揮使克蘇九疇炭山寨進都督僉事兼太原衛指揮進山西行省參政領衛事為晉王相洪武十一年從沐英討洮州羌降𩽆甘酋擒三副使等師還封懷遠侯世襲指揮使理軍務山西從北征有功後數年坐玉黨死同時以黨連坐者都督則有黃輅湯泉馬俊王誠聶緯王銘許亮謝熊汪信蕭用楊春張政祝哲陶文茆鼎凡十餘人多玉部下偏裨於是勇力武健之士芟夷略盡罕有存者謝成濠人從克滁和渡江定集慶授總管克寧國婺州進管軍千戶戰鄱陽平武昌下蘇湖進指揮僉事從大軍征中原克元都攻慶陽搗定西為都督僉事晉王府相從沐英征𩽆甘降乞失迦平洮州十八族洪武十二年封永平侯祿二千石世指揮使二十年同張溫追討納哈出餘衆召還二十七年坐事死沒其田宅李新濠州人從渡江數立功戰龍灣授管軍副千戶取江陵進龍驤衛正千戶克平江遷神武衛指揮僉事調守茶陵衛屢遷至中軍都督府僉事十五年以營孝陵封崇山侯歲祿千五百石二十二年命改建帝王廟於雞鳴山新有心計將作官吏視成畫而已明年遣還鄉頒賜金帛田宅時諸勳貴稍僭肆帝頗嫉之以黨事緣坐者衆新首建言公侯家人及儀從戶各有常數餘者宜歸有司帝是之悉發鳳陽隸籍為民命禮部纂稽制録嚴公侯奢侈踰越之禁於是武定侯英還佃戶輸稅信國公和還儀從戶曹國公景隆還莊田皆自新發之二十六年督有司開胭脂河於溧水西達大江東通兩浙以濟漕運河成民甚便之二十八年以事誅贊曰治天下不可以無法而草昧之時法尚疏承平之日法漸密固事勢使然論者每致慨於鳥盡弓藏謂出於英主之猜謀殊非通達治體之言也夫當天下大定勢如磐石之安指麾萬里奔走恐後復何所疑忌而芟剃之不遺餘力哉亦以介胄之士桀驁難馴乘其鋒鋭皆能豎尺寸於疆埸逮身處富貴志滿氣溢近之則以驕恣啓危機遠之則以怨望扞文網人主不能廢法而曲全之亦出於不得已而非以剪除為私計也亮祖以下諸人既昧明哲保身之幾又違制節謹度之道駢首就僇亦其自取焉爾
