body:
  text: 明史卷一百十五列傳第三興宗孝康皇帝孝康皇后呂太后睿宗獻皇帝獻皇后興宗孝康皇帝標太祖長子也母高皇后元至正十五年生於太平陳迪家太祖為吳王立為王世子從宋濂受經吳元年年十三矣命省臨濠墓諭曰商高宗舊勞於外周成王早聞無逸之訓皆知小民疾苦故在位勤儉為守成令主兒生長富貴習於晏安今出旁近郡縣遊覽山川經歷田野其因道途險易以知鞍馬勤勞觀閭閻生業以知衣食艱難察民情好惡以知風俗美惡即祖宗所居訪求父老問吾起兵渡江時事識之於心以知吾創業不易又命中書省擇官輔行凡所過郡邑城隍山川之神皆祭以少牢過太平訪迪家賜白金五十兩至泗濠告祭諸祖墓是冬從太祖觀郊壇令左右導之農家遍觀服食器具又指道旁荊楚曰古用此為撲刑以其能去風雖傷不殺人古人用心仁厚如此兒念之洪武元年正月立為皇太子帶刀舍人周宗上書乞教太子帝嘉納中書省都督府請倣元制以太子為中書令帝以元制不足法令詹同考歷代東宮官制選勳德老成及新進賢者兼領東宮官於是左丞相李善長兼太子少師右丞相徐達兼太子少傅中書平章録軍國重事常遇春兼太子少保右都督馮宗異兼右詹事中書平章政事胡廷瑞廖永忠李伯升兼同知詹事院事中書左右丞趙庸王溥兼副詹事中書參政楊憲兼詹事丞傅瓛兼詹事同知大都督康茂才張興祖兼左右率府使大都督府副使顧時孫興祖同知左右率府事僉大都督府事吳楨耿炳文兼左右率府副使御史大夫鄧愈湯和兼諭德御史中丞劉基章溢兼贊善大夫治書侍御史文原吉范顯祖兼太子賓客諭之曰朕於東宮不別設府僚而以卿等兼領者蓋軍旅未息朕若有事於外必太子監國若設府僚卿等在內事當啓聞太子或聽斷不明與卿等意見不合卿等必謂府僚導之嫌隙易生又所以特置賓客諭德等官者欲輔成太子德性且選名儒為之職此故也昔周公教成王克詰戎兵召公教康王張皇六師此居安慮危不忘武備蓋繼世之君生長富貴昵於安逸不諳軍旅一有緩急罔知所措二公之言其並識之是年命選國子生國琦王璞張傑等十餘人侍太子讀書禁中琦等入對謹身殿儀狀明秀應對詳雅帝喜因謂殿中侍御史郭淵友等曰諸生於文藝習矣然與太子處當端其心術不流浮靡庶儲德亦獲裨助因厚賜之未幾以梁貞王儀為太子賓客秦庸盧德明張昌為太子諭德先是建大本堂取古今圖籍充其中徵四方名儒教太子諸王分番夜直選才俊之士充伴讀帝時時賜宴賦詩商榷古今評論文字無虛日命諸儒作鍾山龍蟠賦置酒歡甚自作時雪賦賜東宮官令三師諭德朝賀東宮東宮答拜又命東宮及王府官編輯古人行事可為鑒戒者訓諭太子諸王四年春製大本堂玉圖記賜太子十年令自今政事並啓太子處分然後奏聞諭曰自古創業之君歷涉勤勞達人情周物理故處事咸當守成之君生長富貴若非平昔練達少有不謬者故吾特命爾日臨羣臣聽斷諸司啓事以練習國政惟仁不失於疏暴惟明不惑於邪佞惟勤不溺於安逸惟斷不牽於文法凡此皆心為權度吾自有天下以來未嘗暇逸於諸事務惟恐毫髮失當以負上天付託之意戴星而朝夜分而寢爾所親見爾能體而行之天下之福也時令儒臣為太子講大學衍義二十二年置詹事院二十四年八月敕太子巡撫陝西先是帝以應天開封為南北京臨濠為中都御史胡子祺上書曰天下形勝地可都者四河東地勢高控制西北堯嘗都之然其地苦寒汴梁襟帶河淮宋嘗都之然其地平曠無險可憑洛陽周公卜之周漢遷之然嵩邙非有殽函終南之阻澗瀍伊洛非有涇渭灞滻之雄夫據百二河山之勝可以聳諸侯之望舉天下莫關中若也帝稱善至是諭太子曰天下山川惟秦地號為險固汝往以省觀風俗慰勞秦父老子弟於是擇文武諸臣扈太子行既行使諭曰爾昨渡江震雷忽起於東南導爾前行是威震之兆也然一旬久陰不雨占有陰謀宜慎舉動嚴宿衛施仁布惠以回天意仍申諭從行諸臣以宿頓聞比還獻陝西地圖遂病病中上言經略建都事明年四月丙子薨帝慟哭禮官議期喪請以日易及當除服帝不忍禮官請之始釋服視朝八月庚申祔葬孝陵東諡曰懿文太子為人友愛秦周諸王數有過輒調護之得返國有告晉王異謀者太子為涕泣請帝乃感悟帝初撫兄子文正姊子李文忠及沐英等為子高后視如己出帝或以事督過之太子輒告高后為慰解其仁慈天性然也太子元妃常氏繼妃呂氏生子五長雄英次建文皇帝次允熥次允熞次允熙建文元年追尊為孝康皇帝廟號興宗燕王即帝位復稱懿文皇太子孝康皇后常氏開平王遇春女洪武四年四月册為皇太子妃十一年十一月薨諡敬懿太祖為輟朝三日建文元年追尊為孝康皇后永樂元年復稱敬懿皇太子妃皇太后呂氏壽州人父本纍官太常卿惠帝即位尊為皇太后燕兵至金川門迓太后至軍中述不得已起兵之故太后還未至宮中已火既而隨其子允熙居懿文陵永樂元年復稱皇嫂懿文太子妃初太祖册常妃繼册呂妃常氏薨呂氏始獨居東宮而其時秦王樉亦納王保保妹為妃又以鄧愈女為配皆前代故事所無也睿宗興獻皇帝祐杬憲宗第四子母邵貴妃成化二十三年封興王弘治四年建邸德安已改安陸七年之藩舟次龍江有慈烏數萬繞舟至黃州復然人以為瑞謝疏陳五事孝宗嘉之賜豫異諸弟王嗜詩書絶珍玩不畜女樂非公宴不設牲醴楚俗尚巫覡而輕醫藥乃選布良方設藥餌以濟病者長史張景明獻所著六益於王賜之金帛曰吾以此懸宮門矣邸旁有臺曰陽春數與羣臣賓從登臨賦詩正德十四年薨諡曰獻王薨二年而武宗崩召王世子入嗣大統是為世宗禮臣毛澄等援漢定陶宋濮王故事考孝宗改稱王為皇叔父興獻大王王妃為皇叔母帝命廷臣集議未決進士張璁上書請考興獻王帝大悅會母妃至自安陸止通州不入帝啓張太后欲避天子位奉母妃歸藩羣臣惶懼太后命進王為興獻帝妃為興獻后璁更為大禮或問以進而主事霍韜桂萼給事中熊浹議與璁合帝因諭輔臣楊廷和蔣冕毛紀帝后加稱皇廷和等合廷臣爭之未決嘉靖元年禁中火廷和及給事中鄧繼曾朱鳴陽引五行五事為廢禮之證乃輟稱皇加稱本生父興獻帝尊園曰陵黃屋監衛如制設祠署安陸歲時享祀用十二籩豆樂用八佾帝心終未慊三年加稱為本生皇考恭穆獻皇帝興國太后為本生聖母章聖皇太后建廟奉先殿西曰觀德殿祭如太廟七月諭去本生號九月詔稱孝宗皇伯考稱獻皇帝曰皇考璁萼等既驟貴干進者爭以言禮希上意百戶隨全録事錢子勳言獻皇帝宜遷葬天壽山禮部尚書席書議高皇帝不遷祖陵太宗不遷孝陵蓋其慎也小臣妄議山陵宜罪工部尚書趙璜亦言不可乃止尊陵名曰顯陵明年修獻皇帝實録建世廟於太廟左六年以觀德殿狹隘改建崇先殿七年命璁等集明倫大典成加上尊諡曰恭睿淵仁寬穆純聖獻皇帝親製顯陵碑封松林山為純德山從祀方澤次五鎮改安陸州為承天府十七年通州同知豐坊請加尊皇考廟號稱宗以配上帝九月加上尊諡知天守道洪德淵仁寬穆純聖恭儉敬文獻皇帝廟號睿宗祔太廟位次武宗上明堂大享奉主配天罷世廟之祭四十四年芝生世廟柱復作玉芝宮祀焉穆宗立乃罷明堂配享初楊廷和等議封益王次子崇仁王厚炫為興王奉獻帝祀不允興國封除獻帝有長子厚熙生五日而殤嘉靖四年贈嶽王諡曰懷獻皇后蔣氏世宗母也父斆大興人追封玉田伯弘治五年册為興王妃世宗入承大統即位三日遣使詣安陸奉迎而令廷臣議推尊禮咸謂宜考孝宗而稱興王為皇叔父妃為皇叔母議三上未決會妃將至禮臣上入宮儀由崇文門入東安門皇帝迎於東華門不許再議由正陽門入大明承天端門從王門入宮又不許王門諸王所出入門也敕曰聖母至御太后車服從御道入朝太廟故事后妃無謁廟禮禮臣難之時妃至通州聞考孝宗恚曰安得以吾子為他人子留不進帝涕泣願避位羣臣以慈壽太后命改稱興獻后乃入以太后儀謁奉先奉慈二殿不廟見元年改稱興國太后三年乃上尊號曰本生章聖皇太后是年秋用張璁等言尊為聖母章聖皇太后五年獻帝世廟成奉太后入謁七年上尊號曰慈仁九年頒太后所製女訓於天下十五年奉太后謁天壽山陵命諸臣進賀行殿是年加上尊號曰康靜貞壽十七年十二月崩諭禮工二部將改葬獻皇帝於大峪山以駙馬都尉京山侯崔元為奉迎行禮使兵部尚書張瓚為禮儀護行使指揮趙俊為吉凶儀仗官翊國公郭勛知聖母山陵事已帝親幸大峪相視令議奉太后南詣合葬而禮部尚書嚴嵩等言靈駕北來慈宮南詣共一舉耳大峪可朝發夕至顯陵遠在承天恐陛下春秋念之臣謂如初議便帝曰成祖豈不思皇祖耶何以南孝陵因止崔元等毋行而令趙俊往且啓視幽宮是年上尊諡曰慈孝貞順仁敬誠一安天誕聖獻皇后明年俊歸謂顯陵不吉遂議南巡九卿大臣許讚等諫不聽左都御史王廷相又諫帝曰朕豈空行哉為吾母耳已而侍御呂柟給事中曾烶御史劉賢郎中嶽倫等復相繼疏諫不聽三月帝至承天謁顯陵作新宮焉曰待合葬也歸過慶都御史謝少南言慶都有堯母墓佚於祀典請祀之帝曰帝堯父母異陵可知合葬非古即拜少南左春坊左司直兼翰林院檢討定議葬大峪山四月帝謁長陵諭嚴嵩曰大峪不如純德仍命崔元護梓宮南祔閏七月合葬顯陵主祔睿宗廟贊曰興宗睿宗雖未嘗身為天子而尊號徽稱典禮具備其實有不容泯者史者所以記事也記事必核其名與實曰宗曰帝者當時已定之名名定而實著焉矣爰據元史裕宗睿宗列傳之例別為一卷如右而各以后附焉
