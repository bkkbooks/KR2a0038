body:
  text: 明史卷二百列傳第八十八姚鏌子淶張嵿伍文定邢珣等蔡天祐胡瓚張文錦詹榮劉源清劉天和楊守禮張嶽李允簡郭宗皋趙時春姚鏌字英之慈溪人弘治六年進士除禮部主事進員外郎擢廣西提學僉事立宣成書院延五經師以教士子桂人祀山魈卓旺鏌毀像俗遂變遷福建副使未幾改督學政正德九年擢貴州按察使十五年拜右副都御史巡撫延綏上邊務六事皆議行嘉靖元年吉囊入涇陽鏌遣遊擊彭楧出西路釋指揮卜雲於獄使副之夜半邀擊斬其二將乃遁璽書褒諭尋召為工部右侍郎出督漕運改兵部左侍郎四年遷右都御史提督兩廣軍務兼巡撫田州土官岑猛謀不軌鏌調永順保靖兵使沈希儀與張經李璋程鑒各統兵八萬分道討而鏌與總兵官朱麒等攻破定羅丹梁用希儀計結猛婦翁岑璋使為內應大破之斬猛子邦彥璋誘殺猛獻其首詔進鏌左都御史加太子少保任一子官諸將進秩有差鏌請改設流官陳善後七事制可乃命參議汪必東僉事申惠與參將張經以兵萬人鎮其地必東惠移疾他駐猛黨盧蘇王受等詐言猛不死借交址兵二十萬且至夷民信之蘇等薄城經突圍走城遂陷王受亦攻入思恩府巡按御史石金劾鏌失策罔上並論前總督盛應期帝以鏌有功許便宜撫剿蘇受數求赦鏌不許將大討之會廷議起王守仁督兩廣軍令鏌與同事鏌引疾乞罷許馳驛歸初廣東提學道魏校毀諸寺觀田數千畝盡入霍韜方獻夫諸家鏌至廣追還之官韜獻夫恨甚與張璁桂萼合排鏌謂大同當征而反撫田州當撫而反征皆費宏謀國不臧釀成南北患時宏雖去猶借鏌以排之也鏌既得請方候代千夫長韋貴徐伍攻復思恩鏌上其狀詔先賞貴等而以撫剿事宜俟守仁處置既而鏌奏辨石金前疏詆金阻撓養寇金亦再疏詆鏌帝先入璁等言落鏌職閒住其後蘇受復叛帝漸思鏌十三年三邊闕總制大學士費宏李時同召對宏薦鏌時亦助之遂命以兵部尚書總制三邊軍務未赴宏卒鏌辭帝不悅仍落職閒住鏌既罷薦者至二十疏不用家數年卒子淶字維東嘉靖二年殿試第一授翰林修撰爭大禮廷杖又議郊祀合祀不當輕易召修明倫大典懇辭不與纍官侍讀學士張嵿字時俊蕭山人成化二十三年進士弘治初修憲宗實録命往蘇松諸府採軼事事竣授上饒知縣遷南京兵部主事就進刑部郎中正德初遷興化知府隆平侯張祐無子弟祿與族人爭襲訴於南京法司久不決復訴京師劉瑾方擅政遂削尚書樊瑩都御史高銓籍嵿以郎承勘為民瑾敗起知南雄擢江西參政進右布政使舉治行卓異遷左寧王宸濠欲拓地廣其居嵿執不可大恚遣人餽之嵿發視則棗梨薑芥蓋隱語也未幾召為光祿卿以右副都御史巡撫保定諸府忤中貴移疾歸世宗即位命以右都御史總督兩廣軍務廣西上思州賊黃鏐糾峝兵劫州縣嵿討擒之廣東新寧恩平賊蔡猛三等剽掠衆至數萬嵿合兵三萬餘人擊新寧諸賊破巢二百擒斬一萬四千餘人俘賊屬五千九百餘人猛三等皆授首自嶺南用兵以寡勝衆未有若是役者捷聞奬賚程鄉賊梁八尺等與福建上杭流賊相應遣都指揮李臯等會福建官兵夾搬俘斬五百餘人歸善李文積聚奸宄拒捕討之久弗克嵿遣參政徐度等剿之俘斬千餘人佛郎機國人別都盧剽劫滿剌加諸國復率其屬疏世利等擁五舟破巴西國遂入寇新會嵿遣將出海擒之獲其二舟賊乃遁尋召掌南京都察院事就改工部尚書六年大計京官拾遺被劾致仕後數年卒伍文定字時泰松滋人父琇貴州參議文定登弘治十二年進士有膂力便弓馬議論慷慨授常州推官精敏善決獄稱強吏魏國公徐俌與民爭田文定勘歸之民劉瑾入俌重賄興大獄巡撫艾朴以下十四人悉被逮文定已遷成都同知亦下詔獄斥為民瑾敗起補嘉興江西姚源賊王浩八等流劫浙江開化都御史俞諫檄文定與參將李隆都指揮江洪僉事儲珊討之軍華埠而都指揮白弘與湖州知府黃衷別營馬金賊黨劉昌三破執弘官軍大挫浩八突華埠洪文定擊敗之追及於孔埠隆珊亦追至池淮破其巢進攻淫田洪以奇兵深入中賊誘與指揮張琳等皆被執文定等殿後得還賊亦遁歸江西諫等上文定忠勇狀詔所司奬勞擢河南知府計擒劇賊張勇李文簡以才任治劇調吉安計平永豐及大茅山賊已佐巡撫王守仁平桶岡橫水宸濠反吉安士民爭亡匿文定斬亡者一人衆乃定乃迎守仁入城知府邢珣徐璉戴德孺等先後至共討賊文定當大帥丙辰之戰身犯矢石火燎鬚不動賊平功最擢江西按察使張忠許泰至南昌欲冒其功而守仁已俘宸濠赴浙江忠等失望大恨文定出謁遂縛之文定罵曰吾不恤九族為國家平大賊何罪汝天下腹心屈辱忠義為逆賊報讐法當斬忠益怒椎文定仆地文定求解任不報尋遷廣東右布政使未赴而世宗嗣位上忠等罪狀且曰曩忠泰與劉暉至江西忠自稱天子弟暉稱天子兒泰稱威武副將軍與天子同僚折辱命吏誣害良民需求萬端漁獵盈百萬致餓殍遍野盜賊縱橫雖寸斬三人不足謝江西百姓今大憝江彬錢寧皆已伏法三人實其黨與乞速正天誅用章國典又請發宸濠資財還之江西以資經費矜釋忠泰所陷無辜及寧府宗人不預謀者以清冤獄帝並嘉納之論功進右副都御史提督操江嘉靖三年討獲海賊董效等二百餘人賜敕奬勞尋謝病歸六年召拜兵部右侍郎其冬擢右都御史代胡世寧掌院事雲南土酋安銓反敗參攻黃昭道攻陷尋甸嵩明明年武定土酋鳳朝文亦反殺同知以下官與銓合兵圍雲南詔進文定兵部尚書兼前職提督雲南四川貴州湖廣軍討之以侍郎梁材督餉會芒部叛酋沙保子普奴為亂並以屬文定文定未至雲南銓等已為巡撫歐陽重所破遂移師征普奴左都御史李承勛極言川貴殘破不當用兵遂召還命提督京營文定至湖廣疏乞省祭歸已四川巡按御史戴金復上言叛酋稱亂之初勢尚可撫而文定決意進兵一無顧惜飛芻挽糧糜數十萬及有詔罷師尚不肯已又極論土酋阿濟等罪軍民訛言幾復生變臣愚以為文定可罪也尚書方獻夫李承勛因詆文定好大喜功傷財動衆乃令致仕文定忠義自許遇事敢為不與時俯仰芒部之役憤小醜數亂欲為國伸威為議者旁撓廟堂專務姑息以故功不克就九年七月卒於家天啓初追諡忠襄邢珣當塗人弘治六年進士正德初歷官南京戶部郎中忤劉瑾除名瑾誅起南京工部遷贛州知府招降劇盜滿總等授廬給田撫之甚厚後討他盜多藉其力守仁征橫水桶岡珣常為軍鋒功最增二秩宸濠反以重賞誘總總執其使送珣遂從珣共平宸濠徐璉朝邑人文定同年進士由戶部郎中出為袁州知府從討宸濠獲首功千餘事定珣璉遷江西右參政世宗録功各增秩二等嘉靖二年大計給事御史劾監司不職者二十二人珣璉與焉吏部以軍功未酬請進秩布政使致仕從之二人竟廢珣子埴嘗學於張璁嘉靖初登鄉薦璁貴顯屢欲援之辭不應授浦城知縣有徐浦者役公府埴一見異之令與子同學為娶妻後登第為給事中其家世世祀埴弟址進士歷御史終山東鹽運使以清操聞戴德孺臨海人弘治十八年進士歷工部員外郎監蕪湖稅有清名再遷臨江知府宸濠反遣使收府印德孺斬之與家人誓曰吾死守孤城脫有急若輩沉池中吾不負國也即日戒嚴旋與守仁共滅宸濠以憂去世宗以德孺馭軍最整獨增三秩為雲南右布政使舟次徐州覆水死後贈光祿寺卿豫一子官珣璉等倡義討賊月餘成大功當事者以嫉守仁故痛裁抑之或賞或否又往往借考功法逐之去守仁之再疏辭爵也為諸人訟曰宸濠變初起勢焰猖熾人心疑懼退阻當時首從義師自伍文定邢珣徐璉戴德孺諸人外又有知府陳槐曾璵胡堯元等知縣劉源清馬津傅南喬李美李楫及楊材王冕顧佖劉守緒王軾等鄉官都御史王懋中編修鄒守益御史張鰲山伍希儒謝源等或摧鋒陷陳或遮邀伏擊或贊畫謀議監録經紀所謂同功一體者也帳下之士若聽選官雷濟已故義官蕭禹致仕縣丞龍光指揮高睿千戶王佐等或詐為兵檄以撓其進止壞其事機或僞書反間以離其心腹散其黨與今聞紀功文冊改造者多所刪削舉人冀元亨為臣勸說寧王反為奸人搆陷竟死獄中尤傷心慘目負之冥冥之中者夫宸濠積威凌劫雖在數千里外無不震駭夫措而況江西諸郡縣切近剝觸目皆賊兵隨處有賊黨非真有捐軀赴難之義戮力報主之忠孰肯甘虀粉之禍從赤族之誅蹈必死之地以希萬一難冀之功乎今臣獨崇封爵而此同事諸人者或賞不行而並削其績或賞未及而罰已先行或虛受升職之名而因使退間或冒蒙不忠之號而隨以廢斥非獨為已斥諸權奸所誣搆挫辱而已也羣憎衆嫉惟事指摘搜羅以為快曾未見有鳴其不平伸其屈抑者臣竊痛之奏入卒寢不行蔡天祐字成之睢州人父晟濟南知府以廉惠聞天祐登弘治十八年進士改庶吉士授吏科給事中出為福建僉事歷山東副使分巡遼陽歲歉活饑民萬餘闢濱海墟田數萬頃民名之曰蔡公田纍遷山西按察使嘉靖三年大同兵亂巡撫張文錦遇害詔曲赦亂卒改巡撫宣府都御史李鐸撫之鐸以母憂不至乃擢天祐右僉都御史巡撫大同天祐從數騎馳入城諭軍士獻首惡衆心稍定會尚書金獻民總兵官杭雄出師甘肅道大同亂卒疑見討復鼓譟天祐懼急請再赦兵部言元惡不除無以警後請特遣大臣總督宣大軍務以制其變乃命戶部侍郎胡瓚偕都督魯綱統京軍三千人以往瓚等未發而進士李枝齎餉銀至亂卒曰此承密詔盡殺大同人為軍犒也夜中火起圍枝館出牒示之乃解尋復殺知縣王文昌圍代王府脅王奏乞赦王急攜二郡王走宣府巡按御史王官言亂卒方囂大兵壓境是趣之叛也請亟止禁軍容臣密圖乃命瓚駐兵宣府頃之天祐奏總兵官桂勇已捕五十四人請止京軍勿遣帝責以阻撓令必獲首惡郭鑑等既而瓚次陽和勇天祐令千戶苗登擒斬鑑等十一人函首送瓚請班師甫二日鑑父郭疤子復糾徐檳兒等夜殺勇家人又燬苗登家瓚言非盡殲不可帝乃切讓天祐召勇還京以故總兵朱振代之敕瓚仍駐宣府居無何天祐捕戮徐檳兒等瓚等遂班師明年正月侍郎李昆孟春總兵官馬永交章言疤子潛逃塞外必為後患帝將遣使勘會瓚還京言逃卒無足患帝乃罷勘官勿遣疤子復潛入城焚振第明旦天祐閉城大索獲疤子及其黨三十四人悉斬以徇盡宥脅從人心乃大定事聞賚銀幣已進副都御史巡撫如故尋就進兵部右侍郎久之召還部天祐以藩祿久缺又歲當繕邊垣用便宜增淮鹽引價每引萬加銀五千被訐帝宥之至是御史李宗樞復追論前事天祐因引疾去居二年奉詔起用未至京得疾告歸卒年九十五天祐有才智兵變時左右皆賊耳目幕府動靜悉知之天祐廣招星卜藝士往來軍中因具得其情卒賴以成功在鎮七年威德大著父老為立安輯祠胡瓚字伯珩永平人進士官終南京工部尚書張文錦安丘人弘治十二年進士授戶部主事正德初為劉瑾所陷逮繫詔獄斥為民瑾誅起故官再遷郎中督稅陝西條上籌邊裕民十事遷安慶知府度寧王宸濠必反與都指揮楊鋭為禦備計宸濠果反浮江下文錦等慮其攻南都令軍士登城詬之宸濠乃留攻卒不能克事具楊鋭傳璽書褒美擢太僕少卿嘉靖元年拜右副都御史巡撫大同文錦性剛以拒賊得重名遂鋭意振刷操切頗無序大同北四望平衍寇至無可禦文錦曰寇犯宣府不能近鎮城者以葛谷白陽諸堡為外蔽也今城外即戰場何以示重議於城北九十里外增設五堡曰水口宣寧只河柳溝樺溝參將賈鑑督役嚴卒已怨及堡成欲徙鎮卒二千五百家戍之衆憚行請募新丁僚吏咸以為言文錦怒曰如此則令不行矣鎮親兵先往孰敢後親兵素游惰有室聞當發大恐請孑身往得分番又不聽嚴趣之鑑承風杖其隊長諸邊卒自甘州五衛殺巡撫許銘朝廷處之輕頗無忌至是卒郭鑑柳忠等乘衆憤遂倡亂殺賈鑑裂其尸走出塞屯焦山墩文錦恐與外寇連令副將時陳等招之入城即索治首亂者郭鑑等大懼復聚為亂焚大同府門入行都司縱獄囚又焚都御史府門文錦踰垣走匿博野王府第亂卒欲燔王宮王懼出文錦郭鑑等殺之亦裂其尸遂焚鎮守總兵公署出故總兵朱振於獄脅為帥時嘉靖三年八月也事聞帝命侍郎李昆赦亂卒昆為文錦請恤典不報久之文錦父政訟其子守安慶功禮部為之請終不許文錦妻李氏復上疏哀請帝怒命執齎疏者治之副都御史陳洪謨言文錦僨事朝廷戮之可也假手士卒傳之四方損國威不小復降旨詰責自是廷臣不敢言萬曆中始贈右都御史天啓初追諡忠愍詹榮字仁甫山海衛人嘉靖五年進士授戶部主事歷郎中督餉大同值兵變殺總兵官李瑾總督劉源清率師圍城久不下榮素有智略善應變叛卒掠城中無犯榮者外圍益急榮密約都指揮紀振遊擊戴濂鎮撫王寧同盟討賊察叛卒馬升楊麟無逆志乃陽令寧持官民狀詣源清所為叛卒乞原而陰以榮謀告請宥升麟死畀三千金俾募死士自效會源清已罷巡撫樊繼祖許之升麟遂結心腹擒首惡黃鎮等九人戮之榮乃開城門延繼祖入復捕斬二十六人録功擢光祿寺少卿再遷太常寺少卿二十二年以右僉都御史巡撫甘肅魯迷貢使留甘州者九十餘人總兵官楊信驅以禦寇死者十之一榮言彼以好來而用之鋒鏑失遠人心且示中國弱詔奪信官槥死者送之歸番人感悅踚年以大同巡撫趙錦與總兵官周尚文不相能詔榮與錦易任俺答數萬騎入掠榮與尚文破之黑山陽進右副都御史寇復大舉犯中路參將張鳳等陳歿榮與尚文及總督翁萬達嚴兵備陽和而遣騎邀擊多所殺傷寇乃引去代府奉國將軍充灼行剽榮奏奪其祿充灼等結小王子入寇謀據大同榮告尚文捕得皆伏辜榮以大同無險乃築東路邊牆百三十八里堡七墩臺百五十四又以守邊當積粟而近邊弘賜諸堡三十一所延亙五百餘里闢治之皆膏腴田可數十萬頃乃奏請召軍佃作復其租徭移大同一歲市馬費市牛賦之秋冬則聚而遏寇帝立從焉寇入犯與尚文破之彌陀山斬一部長榮先以靖亂功進兵部右侍郎又以繕邊破敵纍被奬賚召還理部事進左尚書趙廷瑞罷榮署部務奏行秋防十事已而翁萬達入為尚書遭母喪榮復當署部務辭疾乞休帝怒奪職閒住越二年卒當榮之撫大同也萬達為總督尚文為總兵三人皆有才略寇數入不能得志自後代者不能任寇無歲不入躪邊人益思榮等明年俺答薄京師萬達榮皆已去論者謂二人在寇未必至此萬曆中榮孫延為順天通判上書訟榮功贈工部尚書豫恤如制劉源清字汝澄東平人正德九年進士授進賢知縣宸濠反源清積薪環室命家人曰事急火吾家一僕逸手刃以徇縣中諸惡少與賊通者悉杖殺之宸濠妃弟婁伯歸上饒募兵源清邀戮之賊檄至立斬其使會餘干知縣馬津龍津驛丞孫天祐亦起兵拒賊賊七殿下者奪運舟於龍津天祐與戰殺數人賊黨募兵過龍津天祐追殺之焚其舟婁氏家衆西下亦為天祐所遏擒七十餘人賊兵不敢經湖東以窺兩浙者三人力也賊平源清徵為御史嘉靖改元津亦入為御史津滁州人終福建副使源清尋遷大理丞謝病歸六年夏以右僉都御史巡撫宣府滴水崖賊郭春據城叛稱王源清遣卒捕之為所覺副總兵劉淵令曰止擒元惡以旗繞城而呼其黨皆散春等自剄死總兵官郤永虐下源清劾罷之進副都御史十二年以邊警遷兵部左侍郎總制宣大山西保定諸鎮軍務大同總兵官李瑾浚天城左孤店濠四十里趣工急卒王福勝等焚殺瑾因焚巡撫潘倣署倣奏瑾激變帝命源清同總兵郤永討之源清榜令解散而榜言五堡變處之過寬五堡遺孽大懼師次陽和倣等密捕亂卒杖死十餘人繫賊首王保等七十餘人以獻請旋師源清懲昔胡瓚事不欲已以囚屬御史蘇祐囚妄言前總兵朱振失職首亂且多引無辜源清遣參將趙綱入城大索城中訛言城且屠亂卒遂鼓噪殺千戶張欽會僉事孫允中自源清所至諭源清意撫慰之始定振前為亂卒所擁實不反詣源清自明不能白發憤自殺永兵至城下大掠五堡遺孽遂盡反迎戰殺遊擊曹安官軍攻據四關晝夜圍擊亂卒出前參將黃鎮等於獄奉為帥死守倣與鎮國將軍俊等登城止毋攻俊出見永請緩兵皆不聽允中縋城出言將士妄殺狀源清叱曰汝為賊游說耶欲囚之允中不敢歸源清因多設邏卒遏王府及有司軍民章疏而請益師至五萬帝命侍郎錢如京都督江桓統京軍八千以往已忽悟罷弗遣專責源清永討賊倣馳疏言將士妄殺激變速旋師亂可已源清亦詆倣媚賊張孚敬主源清侍郎顧鼎臣黃綰言用兵謬帝不能決城圍久大困毀王府及諸廨舍供爨兵部復下安撫令源清亦樹幟招降叛卒稍稍自投首惡黃鎮等亦分日出見乞通樵採路永許諾翌日採薪者出永悉執之城中人益懼亂卒復叛勾外寇為助永遇之大敗而遁叛卒遂引寇十餘騎入城指代府曰以此為那顏居那顏者華言大人也城中人聞之皆巷哭明日外寇攻東南二關叛卒與掎角官軍殊死戰互有殺傷寇知叛卒不足賴倒戈擊之大詬而去是時寇游騎南掠至朔應源清請募九邊兵增總制官禦之己得一意攻城帝不許源清乃百道攻穴城為毒烟熏死者相籍復請壅水灌之帝大不懌奪其職閒住以兵部侍郎張瓚代之瓚未至郎中詹榮等已悉捕首惡黃綰勘功罪言源清永實罪魁具劾其婪賄不資狀兵科曾忭等言宸濠亂源清有保障功當蒙八議之貸帝怒下忭等詔獄逮源清治之獄久不決綰憂去乃減死斥為民俺答薄京師即家起之未赴而卒隆慶初贈兵部尚書劉天和字養和麻城人正德三年進士授南京禮部主事劉瑾黜御史十八人改他曹二十四人補之天和與焉出按陝西鎮守中官廖堂奉詔辦食御物於蘭州天和謂非所部辭不往堂奏天和拒命詔逮之部民哭送者萬人錮詔獄久不釋吏部尚書楊一清疏救法司奏當贖杖還職中旨謫金壇丞刑部主事孫繼芳抗章救不報屢遷湖州知府多惠政嘉靖初擢山西提學副使纍遷南京太常少卿以右僉都御史督甘肅屯政請以肅州丁壯及山陝流民於近邊耕牧且推行於諸邊尋奏當興革者十事田利大興改撫陝西請撤鎮守中官及罷為民患者三十餘事帝皆從之洮岷番四十二族蠢動天和誅不順命者又討平湖店大盜及漢中妖賊就進右副都御史母憂服闋以故官總理河道黃河南徙歷濟徐皆旁溢天和疏汴河自朱仙鎮至沛飛雲橋殺其下流疏山東七十二泉自尼諸山達南旺河濬其下流役夫二萬不三月訖工加工部右侍郎故事河南八府歲役民治河不赴役者人出銀三兩天和因歲饑請盡蠲旁河受役者課遠河未役者半之詔可十五年改兵部左侍郎總制三邊軍務兵車皆雙輪用二十人遇險即困又行遲不適於用天和請倣前總督秦紘隻輪車上置炮槍斧戟廂前樹狻猊牌左右虎盾連二車可蔽三四十人一人挽之推且翼者各二人戰則護騎士其中敵遠則施火器稍近發弓弩又近乃出短兵敵走則騎兵追復製隨車小帳令士不露宿又毒弩矢修邊牆濠塹皆從之吉囊十萬衆屯賀蘭山後遣別部寇涼州副將王輔逐奪其纛寇莊浪總兵官姜奭屢敗之進天和右都御史寇復大集兵將入犯天和策寇瞰西有備必東密檄延綏副將白爵宵行與參將吳瑛合寇果東入黑河墩遇爵伏兵大創而去既又入蒺藜川爵尾擊之寇多死尋入寇家澗張家塔為爵瑛所敗犯寧夏者總兵官王效復破之帝大喜進天和左都御史吉囊犯河西天和禦却之進兵部尚書寇將入平虜城天和伏兵花馬池寇戰不勝走河上遇伏兵多死於水吉囊乘虛寇固原剽掠且饜會淫潦弓矢盡膠無鬬志而諸將多畏縮天和斬指揮二人召故總兵周尚文令立功會陝西總兵官魏時角寇至黑水苑尚文盡鋭夾擊殺吉囊子小十王寇退寧夏巡撫楊守禮總兵官任傑等復邀擊敗之鐵柱泉斬獲共四百四十餘級論功加天和太子太保廕一子錦衣千戶前後賚銀幣十數遷南京戶部尚書召為兵部尚書督團營言官論天和衰老遂乞休歸家居三年卒贈少保諡莊襄天和初舉進士劉瑾欲與宗姓謝不往晚年內召陶仲文以刺迎稱戚屬天和返其刺曰誤矣吾中外姻連無是人仲文恚其罷官有力焉楊守禮字秉節蒲州人正德六年進士除戶部主事嘉靖初屢遷湖廣僉事以計擒公安賊魁坐事謫州通判纍遷右副都御史巡撫四川與副將何卿平諸番亂賚銀幣初守禮貶州為僉事張文奎所辱至是文奎遷四川參議恐守禮修隙先以所托事奏詔二人俱解職歸守禮才器敏達中外以為能居家未久工部尚書秦金等會薦起河南參政再遷右副都御史巡撫寧夏寇犯固原為總督劉天和所敗欲自寧夏去守禮與總兵任傑等邀敗之會天和召還進守禮右都御史總督軍務代之録前功進兵部尚書總兵官李義楊信連却吉囊三賜璽書銀幣尋上疏乞休帝惡其避難降俸二級其秋寇三萬騎抵綏德遊擊張鵬却之總兵官吳英等追至塞外東路參將周文兵亦至夾擊敗之巡按御史殷學言寇入內地五百里請治諸將罪部議延綏游兵俱調宣大寇方避實擊虛而我能以寡勝衆宜録其功乃加守禮太子少保學謫外守禮尋以憂去俺答薄都城廷臣首以守禮薦詔趣上道寇退止不行久之卒張嶽字維喬惠安人自幼好學以大儒自期登正德十一年進士授行人武宗寢疾豹房請令大臣侍從臺諫輪直起居視藥餌防意外變不報與同官諫南巡杖闕下謫南京國子學正世宗嗣位復故官遷右司副母老乞便養改南京武選員外郎歷主客郎中方議大禘禮張璁求始祖所自出者實之禮官皆唯唯嶽言於尚書李時曰不如為皇初祖位毋實以人時大喜告璁璁不謂然以初議上帝竟令題皇初祖主如嶽言璁銜之出為廣西提學僉事行部柳州軍缺餉大譁城閉五日嶽令守城啓門召詰譁者豫餉去尋以計擒首惡置之理入賀改提學江西不謝璁璁黜廣西選貢七人謫嶽廣東鹽課提舉遷廉州知府督民墾棄地教以桔橰運水廉民多盜珠池嶽居四年未嘗入一珠帝使使往安南詰莫登庸殺主嶽言於總督張經曰莫氏篡黎可無勘而知也使往受謾詞辱國請留使者毋前經不可知欽州林希元上書請決討莫氏嶽貽書止之復條上不可討六事為書貽執政曰據邊民報黎賙襲封無嗣以兄子譓為子陳皓作亂賙遇害皓篡未幾國人擁立譓皓奔諒山譓立七年為莫登庸所逼出居升華登庸立譓幼弟而相之卒弒自立國分為三黎在南莫居中陳在西北後諒山亦為登庸有陳遂絶而黎所居即古日南地與占城鄰限大海登庸不能踰之南故兩存近登庸又以交州付其孫福海而自營海東府地都齊居之蓋安南諸府惟海東地最大即所謂王山郡也此賊負篡逆名常練兵備我又時揚言求入貢邊人以非故王也弗敢聞愚以為彼內亂未嘗有所侵犯可且置之待其亂定乃貢若必用兵勝負利鈍非嶽所敢知執政得書不能決已毛伯溫來視師張經一以軍事委嶽又以翁萬達才進二人於伯溫嶽與伯溫語數日伯溫曰交事屬君矣許登庸如嶽議會嶽遷浙江提學副使又遷參政伯溫馳奏留之乃改廣東參政分守海北登庸降加嶽俸一級賜銀幣尋以征瓊州叛黎功加俸及賜如之塞上多事言官薦嶽邊才伯溫言嶽可南翁萬達可北也遂擢嶽右僉都御史撫治鄖陽旋移撫江西進右副都御史總督兩廣軍務兼巡撫討破廣東封川僮蘇公樂等進兵部右侍郎平廣西馬平諸縣瑤賊先後俘斬四千招撫二萬餘人誅賊魁韋金田等增俸一級召為刑部右侍郎以御史徐南金言命留任連山賊李金與賀縣賊倪仲亮等出沒衡永郴桂積三十年不能平嶽大合兵討擒之蒞鎮四年巨寇悉平召拜兵部左侍郎湖貴間有山曰蠟爾諸苗居之東屬鎮溪千戶所筸子坪長官司隸湖廣西屬銅仁平頭二長官司隸貴州北接四川酉陽廣袤數百里諸苗數反官兵不能制侍郎萬鏜征之四年不克乃授其魁龍許保冠帶湖苗暫息而貴苗反如故鏜班師龍許保及其黨吳黑苗復亂貴州巡撫李義壯告警乃命嶽總督湖廣貴州四川軍務討之進右都御史義壯持鏜議欲撫嶽劾其阻兵罷之先義壯撫貴州者僉都御史王學益與鏜附嚴嵩主撫議數從中撓嶽嶽持益堅許保襲執印江知縣徐文伯及石阡推官鄧本忠以去嶽坐停俸乃使總兵官沈希儀參將石邦憲等分道進躬入銅仁督之先後斬賊魁五十三人獨許保黑苗跳不獲嶽以捷聞言貴苗漸平湖苗聽撫請遣土兵歸農朝議許之未幾酉陽宣慰冉元嗾許保黑苗突思州劫執知府李允簡邦憲兵邀奪允簡還允簡竟死嵩父子故憾嶽欲逮治之徐階持不可乃奪右都御史以兵部侍郎督師邦憲等旋破賊嶽搜山箐餘賊獻思州印及許保湖廣兵亦破擒首惡李通海等嶽以黑苗未獲不敢報功已而冉元謀露嶽發其奸元賄嚴世蕃責嶽絶苗黨邦憲竟得黑苗以獻苗患乃息嶽卒於沅州喪歸沅人迎哭者不絶已功復右都御史贈太子少保諡襄惠嶽博覽工文章經術湛深不喜王守仁學以程朱為宗李允簡融縣人由舉人起家以郡境多寇遣孥歸獨與孫炳文居祖孫皆被執許保挾以求厚贖允簡則傳語邦憲令亟進兵在賊中自投高崖下賊拽出棄之途思人舁還至清浪衛而卒詔贈貴州副使賜祭葬官一子郭宗皋字君弼福山人嘉靖八年進士選庶吉士尋詔與選者皆改除得刑部主事擢御史十二年十月星隕如雨未幾哀沖太子薨大同兵亂宗皋勸帝惇崇寬厚察納忠言勿專以嚴明為治帝大怒下詔獄杖四十釋之歷按蘇松順天行部乘馬不御肩輿會廷推保定巡撫劉夔還理院事宗皋論夔嘗薦大學士李時子諂媚無行不任風紀坐奪俸兩月尋出為雁門兵備副使轉陝西參政遷大理少卿二十三年十月寇入萬全右衛抵廣昌列營四十里順天巡撫朱方下獄擢宗皋右僉都御史代之寇已去宗皋言密雲最要害宜宿重兵乞敕馬蘭太平燕河三屯歲發千人以五月赴密雲有警則總兵官自將赴援居庸白楊地要兵弱遇警必待部奏不能及事請預擬借調之法令建昌三屯軍平時則協助密雲遇警則移駐居庸俱報可久之宗皋聞敵騎四十萬欲分道入奏調京營山東河南兵為援已竟無實坐奪俸一年故事京營歲發五軍詣薊鎮防秋宗皋請罷三軍以其犒軍銀充本鎮募兵費又請發修邊餘銀增築燕河營古北口帝疑有侵冒令罷歸聽勘既而事得白起故官巡撫大同與宣府巡撫李仁易鎮尋進兵部右侍郎總督宣大山西軍務俺答三萬騎犯萬全左衛總兵官陳鳳副總兵林椿與戰鷂兒嶺殺傷相當宗皋坐奪俸明年再犯大同總兵官張達及椿皆戰死宗皋與巡撫陳耀坐奪俸給事中唐禹追論死事狀因言全軍悉陷乃數十年未有之大衄帝乃逮宗皋及耀各杖一百耀遂死宗皋戍陝西靖虜衛隆慶改元從戍所起刑部右侍郎改兵部協理戎政旋進南京右都御史就改兵部尚書參贊機務給事中莊國禎劾宗皋衰庸宗皋亦自以年老求去詔許之萬曆中再存問歲給廩隸十六年宗皋年九十又遣行人存問是年卒贈太子太保諡康介趙時春字景仁平涼人幼與羣兒嬉輒列旗幟部勒如兵法年十四舉於鄉踰四年為嘉靖五年會試第一選庶吉士以張璁言改官得戶部主事尋轉兵部九年七月上疏曰陛下以災變求言已旬月大小臣工率浮詞面謾蓋自靈寶知縣言河清受賞都御史汪鋐繼進甘露今副都御史徐讚訓導范仲斌進瑞麥指揮張楫進嘉禾鋐及御史楊東又進鹽華禮部尚書李時再請表賀仲斌等不足道鋐讚司風紀時典三禮乃罔上欺君壞風傷政帝責其妄言且令獻讜言善策時春惶恐引咎未對帝趣之於是時春上言當今之務最大者有四最急者有三最大者曰崇治本君之喜怒賞罰所自出勿以逆心事為可怒則賞罰大公而天下治曰信號令無信一人之言必參諸公論毋狃一時之近必稽之永遠苟利十而害一則利不必興功百而費半則功不必舉如是而天下享安靜之福矣曰廣延訪宜倣古人輪對及我朝宣召之制使大臣臺諫侍從各得敷納殿陛間羣吏則以其職事召問之曰勵廉恥大臣宜待以禮取大節略小過臺諫言是者用之非者寬容之庶臣工自愛不敢不勵其最急者曰惜人才凡得罪諸臣其才不當棄其過或可原宜霈然發命召還故秩且因南郊禮成除謫戍之罪與之更始曰固邊圉敗軍之律宜嚴臨陳而退者禆將得以戮士卒大將得以戮禆將總制官得以戮大將則人心震悚而所向用命曰正治教請復古冠婚喪祭之禮絶醮祭禱祀之術凡佛老之徒有假引符籙依託經懺幻化黃白飛升遐景以冒寵祿者即賜遣斥則正道修明而民志定帝覽之益怒下詔獄掠治黜為民久之選東宮官屬起翰林編修兼司經局校書帝有疾時春與羅洪先唐順之疏請東宮御殿受百官正旦朝賀帝大怒復黜為民京師被寇朝議以時春知兵起兵部主事贊理京營務統民兵訓練大將軍仇鸞倡馬市時春憤曰此秦檜續耳身為大將而效市儈可乎忤鸞為所搆幾重得罪稍遷山東僉事進副使三十二年擢僉都御史巡撫山西時春慷慨負奇氣善騎射慨寇縱橫將帥不任戰數謂人使吾領選卒五千俺答丘福不足平也作禦寇論論戰守甚悉既秉節鉞益思以武功自奮其年九月寇入神池利民諸堡時春率馬步兵往禦之至廣武諸將畢會諜報寇騎二千餘去兩舍時春擐甲欲馳大將李淶固止之時春大言曰賊知吾來必遁緩追即不及遂策馬前及於大蟲嶺伏兵四起敗績倉皇投一墩守卒縋之上乃得免淶軍竟覆被論解官聽調時春喜談兵至是一戰而敗然當是時將帥率避寇不擊為督撫者安居堅城遙領軍事無躬搏寇者時春功雖不就天下皆壯其氣時春讀書善強記文章豪肆與唐順之王慎中齊名詩伉浪自喜類其為人贊曰姚鏌等封疆宣其擘畫軍務暢其機謀勳績咸有可記伍文定從王守仁平宸濠之難厥功最懋趙時春將略自命一出輒躓夫危事而易言之固知兵者所弗取乎
