body:
  text: 明史卷四十二志第十八地理三河南陝西河南禹貢豫冀揚兗四州之域元以河北地直隸中書省河南地置河南江北行中書省治汴梁路洪武元年五月置中書分省治開封府二年四月改分省為河南等處行中書省三年十二月置河南都衞八年十月改都衞為都指揮使司九年六月改行中書省為承宣布政使司府八直隸州一屬州十一縣九十六為里三千八百八十有奇北至武安與北直山西界南至信陽與江南湖廣界東至永城與山東江南界西至陝州與山西陝西界距南京一千一百七十五里京師一千五百八十里洪武二十六年編戶三十一萬五千六百一十七口一百九十一萬二千五百四十二弘治四年戶五十七萬五千二百四十九口四百三十六萬四百七十六萬曆六年戶六十三萬三千六十七口五百一十九萬三千六百二開封府元汴梁路屬河南江北行省洪武元年五月曰開封府八月建北京十一年京罷領州四縣三十祥符倚洪武十一年正月建周王府大河舊在城北正統十三年河決滎陽東過城西南而城遂在河北東為開封縣元時同治郭內洪武中省南有朱仙鎮東北有陳橋鎮陳留府東少南北有大河東北有睢水下流至南直宿遷縣合泗水嵵府東南北有睢水又有舊黃河洪武二十五年河決之故道也嘉靖三十六年全河合淮入海而縣遂無河患通許府東南西南有故黃河弘治後北徙不經縣界太康府東南北有渦水自通許縣流入下流至南直懷遠縣入淮東有馬廠集正統十三年河決自嵵縣經此尉氏府南少西西南有大溝東北合康溝入於黃河洧川府西南南有故城洪武二年以河患遷今治又南有洧水下流至西華縣合潁水東南有南席店弘治九年河入栗家口南行經此鄢陵府南少西北有洧水扶溝府南少東東有沙河一名惠民河又名小黃河即宋蔡河故道也成化中濬下流達南直太和縣界又北有洧水自西流入焉又東北有黃河故道弘治二年淤中牟府西東有故城天順中徙今治大河在縣北又有汴河舊自榮陽而東下流經祥符縣南又東南至南直泗州入於淮正統六年改從此入河後淤西北有圃田澤陽武府西北北濱大河自此至南直徐州大河所行皆唐宋汴河故道原武府西北北有黑陽山下臨大河洪武二十四年河決於此正統十二年復決焉東南有安城縣洪武初置正統中廢封丘府北南有大河西南有荊隆口一名金龍口弘治二年五年萬曆十五年崇禎四年五年河屢決於此又西北有沁河弘治六年淤西南有中欒鎮巡檢司延津府西北大河舊經縣北成化十四年河決徙流縣南而縣北之流遂絕西北有沙門鎮弘治十一年移項城縣西之香臺巡檢司於此蘭陽府東少北北濱大河有李景高口萬曆十七年河決於此儀封府東少北元屬睢州洪武十年五月改屬南陽府後來屬故城在縣北洪武二十二年二月圮於河徙日樓村即今治也東北有黃陵岡大河舊經其下入曹縣界弘治五年河決於此尋塞之改從岡南入睢州界又賈魯故河亦在縣北正德四年河決入焉新鄭府西南元屬均州隆慶五年七月改屬西南有大隗山一名具茨山潩水出焉一名魯固河下流入潁又南有陘山北有大河又有溱水一曰澮水流合縣南之洧水陳州洪武初以州治宛丘縣省入南有潁水又西有沙水亦曰小黃河至潁岐口與潁水合下流分為二崇禎間屢決於西南之苑家埠口又南有故黃河嘉靖時黃河南出之道也西北距府二百六十五里領縣四商水州西南洪武初廢四年七月復置北有潁水又有水亦曰大水西華州西少北北有潁水又有沙水即小黃河也西南有水又有常社鎮巡檢司項城州南東北有故城今治本南頓縣之殄寇鎮也宣德三年遷東有潁水西有水流入焉洪武二十四年大河自陳州經縣界合潁下入於淮永樂九年河始復故道又東北有沙水沈丘州東南元屬潁州洪武初廢弘治十年改乳香臺巡檢司置來屬東北有潁水東入南直潁州界又北有沙河東入南直太和縣界又東有界首巡檢司又北有南頓縣洪武初廢景泰初置南頓巡檢司於此許州洪武初以州治長社縣省入西有潁水北有潩水又東有東湖一名秋湖又西北有石固鎮與長葛縣界東北距府二百二十里領縣四臨潁州東南西有潁水潩水自縣北流入焉又西南有小水襄城州西南南有首山東北有潁水南有汝河郾城州東南南有沙水亦曰大水上流即故汝水也又東南有澧水來入焉長葛州西北北有洧水西有潩水禹州元曰鈞州洪武初以州治陽翟縣省入萬曆三年四月避諱改曰禹州成化二年七月建徽王府嘉靖三十五年除北有禹山又西北有鑛山有鐵母山舊俱產鐵又北有潁水下經襄城一名渚水至臨潁合沙河東北距府三百二十里領縣一密州西北南有洧水又有溱水鄭州洪武初以州治管城縣省入西南有梅山鄭水出焉下流舊入汴水後堙又西有須水源出滎陽縣舊亦入於汴水正統八年嘗濬以分決河之流後亦堙東北距府百四十里領縣四滎陽州西南有大周山汴水出焉又東南有嵩渚山京水出焉又有索水源出小陘山北流與京水合下流入於鄭水又大河在北東有須水鎮崇禎十年築城滎澤州北少西元直隸汴梁路洪武中改屬州北有故城洪武八年因河患徙於南成化十五年正月又徙北濱大河東南有孫家渡正統十三年大河決於此河陰州西北舊治在大峪口洪武三年為水所圮徙於此東北有廣武山與三皇山連西有敖倉北濱大河汜水州西故城在縣東洪武十一年七月徙於成皐崇禎十六年又遷西北北濱河洛水自西東至滿家溝合汜水入焉又西有虎牢關洪武四年九月改曰古崤關有巡檢司河南府元河南府路屬河南江北行中書省洪武元年為府領州一縣十三東距布政司三百八十里洛陽倚洪武二十四年建伊王府嘉靖四十三年廢萬曆二十九年十月建福王府北有北邙山西南有闕塞山亦曰闕口山亦曰伊闕山俗曰龍門山又西北有穀城山亦曰簪亭山瀍水所出又東南有大谷谷口有關又大河在北又有洛水源自洛南冢嶺山東經盧氏永寧諸縣至洛陽偃師鞏縣入於河又東有伊水自盧氏縣東北流至偃師縣而入洛又北有瀍水西有澗水俱流會於洛又西南有孝水偃師府東少北南有緱氏山又有洛水西有伊水流合焉鞏府東北西南有轘轅山上有關北濱河西北有洛水舊經縣北入河謂之洛汭亦曰洛口嘉靖後東過汜水縣入河又南有鄩水會洛入河亦曰鄩口也又東南有石子河西南有長羅川皆流入洛水又西南有黑石渡巡檢司孟津府東北舊治在縣東今治本聖賢莊嘉靖十四年七月遷於此西北有大河又西有硤石津又西有委粟津又有高渚馬渚陶渚皆大河津濟處東北有孟津巡檢司宜陽府西南西有女几山東南有鹿蹄山一名非山甘水出焉又北有洛水西有宜水又有昌谷水與甘水俱流注於洛又西南有趙保鎮木冊鎮二巡檢司永寧府西南北有崤山崤水出焉北注於河其東曰穀陽谷穀水所出焉又南有洛水東北有刀轘川下流為昌谷水又有大宋川下流為宜水又西有崇陽鎮又有高門關東有崤底關三巡檢司新安府西西有缺門山北有大河又南有澗水穀水自北流入焉東有慈澗水亦流入穀水又有函谷新關澠池府西元屬陝州洪武中改屬東北有廣陽山亦曰澠池山北溪水出焉又有白石山澗水所出西北濱河南有穀水又西北有南村巡檢司登封府東南北有嵩山即中岳也亦曰太室山又西有少室山潁水中源出焉又有右源出於山之南溪又有左源出於西南之陽乾山合流至南直壽州入淮又北有陽城山洧水所出下流至扶溝縣入沙河又東南有崿嶺即箕山也上有崿坂關又東南有五渡水流入潁亦曰三交水又西南有少陽河亦流入潁嵩府西南元嵩州屬南陽府洪武二年四月降為縣來屬三塗山在西南陸渾山在東北又東有篩山北有露寶山西有大礦山皆產錫西南有伏牛山即天息山也山有分水嶺汝水出焉下流至南直潁州入淮行千三百五十餘里又南有伊水西北有高都川流入焉又西南有舊縣鎮巡檢司西有沒大嶺巡檢司盧氏府西南元屬嵩州洪武元年四月屬南陽府三年三月屬陝州萬曆初改屬府西南有熊耳山洛水自陝西商州流入境經此東南有巒山一名悶頓嶺伊水所出北有鐵嶺東澗水出焉東南入洛又東北有馬回川亦入於洛又東南有欒州鎮西南有朱陽鎮北有杜管鎮三巡檢司又西有白華關陝州元屬河南府路洪武元年四月改屬南陽府以州治陝縣省入東有底柱山在大河中山有三門中曰神門南曰鬼門北曰人門惟人門修廣可行舟鬼門最險又南有橐水一名永定澗亦曰漫澗西北入河又東南有硤石關有巡檢司又有雁翎關東距府三百里領縣二靈寶州西少南北濱河又西有弘農澗南有虢略鎮巡檢司又有函谷故關西南又有洪關閿鄉州西南東南有夸父山一名秦山中有大谷關北濱河自山西芮城縣流入東南至永城縣入南直碭山縣界西有湖水又有盤澗水北流入焉又西有潼關與陝西華陰縣分界歸德府元直隸河南江北行省洪武元年五月降為州屬開封府嘉靖二十四年六月升為府領州一縣八西距布政司三百五十里商丘倚元曰睢陽洪武初省嘉靖二十四年六月復置更名舊治在南弘治十五年圮於河十六年九月遷於今治北濱河正統後河決而南城嘗在河北正德後仍在河南北有丁家道口巡檢司東南有武津關巡檢司寧陵府西南有睢水北有桃源集巡檢司鹿邑府南元屬亳州洪武中改屬南有潁水又蔡河自西流入謂之蔡河口即沈丘縣之沙河也又北有渦水東流入南直亳州境夏邑府東元曰下邑洪武初更名北濱大河又東南有睢水永城府東南洪武元年五月屬開封府十一月來屬北有碭山又有芒山皆與南直碭山縣界又睢水澮水皆在縣南又南有泡水弘治間淤塞虞城府東北元屬濟寧路洪武二年正月來屬南有故城嘉靖九年遷於今治北有黃河睢州元屬汴梁路洪武初屬開封府以州治襄邑縣省入十年五月降為縣十三年十一月復升為州嘉靖二十四年六月來屬北濱河又有睢水亦在州東北東距府百七十里領縣二考城州北元末省洪武四年八月復置屬開封府十年五月復省十三年十一月復置屬州舊治在縣東南正統十三年徙北濱大河柘城州東南元末省洪武四年八月復置屬開封府十年五月省入寧陵縣十三年十一月復置屬州北有睢水南有渦水汝寧府元直隸河南江北行省洪武初因之領州二縣十二距布政司四百六十里汝陽倚天順元年三月建秀王府成化八年除十年建崇王府洪武初縣廢四年七月復置北有汝水源出天息山東流入境過新蔡東南入淮又南有澺水又有汶水又有溱水又西北有瀙水俗名泥河下流俱入於汝又城南有柴潭東有陽埠巡檢司真陽府東元屬息州洪武四年省入汝陽縣景泰四年置真陽鎮巡檢司於此弘治十八年十二月仍置縣而徙巡檢司於縣南銅鐘店仍故名尋廢南有淮水又汝水在縣東北有滇水流入焉上蔡府北洪武初廢四年五月復置西有汝水西南有沙水流合焉新蔡府東少南元屬息州後廢洪武四年五月復置改屬南有汝水又澺水自城北流合焉又東北有瓦店巡檢司西平府西北北有汝水源出縣西南雲莊諸石二山自元末堨斷故汝而此水遂為汝源嘉靖九年復塞改為洪河之上流確山府西南洪武十年五月省入汝陽縣十三年十一月復置成化十一年九月改屬信陽州弘治二年八月仍屬府西北有朗山亦曰樂山北有黃酉河下流為練河流入