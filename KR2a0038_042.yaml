有長城關正德初置東南距布政司千一百二十里寧夏中衞元應理州屬寧夏府路洪武三年州廢永樂元年正月置衞西有沙山一名萬斛堆大河在南又西南有溫圍水流入大河又有裴家川又東南有鳴沙州元屬寧夏府路洪武初廢南距布政司千一百十里靖虜衞正統二年以故會州地置屬陝西都司南有烏蘭山上有烏蘭關北有大河西南有祖厲河東北有亥剌河皆注於大河西南有會寧關南距布政司千二百二十里陝西行都指揮使司元甘肅等處行中書省治甘州路洪武五年十一月置甘肅衞二十五年罷二十六年陝西行都指揮使司自莊浪徙置於此領衞十二守禦千戶所四距布政司二千六百四十五里甘州左衞倚元甘州路洪武初廢二十三年十二月置甘州左衞二十七年十一月罷二十八年六月復置洪武二十五年三月建肅王府建文元年遷於蘭縣西南有祁連山西北有合黎山東北有人祖山山口有關曰山南嘉靖二十七年置又東北有居延海西有弱水出西南山谷中下流入焉又有張掖河流合弱水其支流曰黑水河仍合於張掖河又東南有盧水亦曰沮渠川甘州右衞甘州中衞俱洪武二十五年三月置甘州前衞甘州後衞俱洪武二十九年置四衞俱與甘州左衞同城肅州衞元肅州路屬甘肅行省洪武二十七年十一月置衞西有嘉峪山其西麓即嘉峪關也弘治七年正月扁關曰鎮西西南有小崑崙山亦曰雪山與甘州山相接北有討來河東會於張掖河西南有白水又西北有黑水東南有紅水俱流入白水下流入西寧衞之西海又東北有威虜衞洪武中置永樂三年三月省東距行都司五百十里山丹衞元山丹州直隸甘肅行省洪武初廢二十三年九月置衞屬陝西都司後來屬東南有焉支山西有刪丹河即弱水也北有紅鹽池西距行都司百八十里永昌衞元永昌路屬甘肅行省至正三年七月改永昌等處宣慰司洪武初廢十五年三月置衞屬陝西都司後來屬北有金山麗水出焉西南有白嶺山亦曰雪山西有水磨川上有水磨關又東南有蹇占河西北距行都司三百十里涼州衞元西涼州屬永昌路洪武九年十月置衞屬陝西都司後來屬南有天梯山三岔河出焉東南有洪池嶺又東北有白亭海有瀦野澤又西有土彌干川即五澗水也亦出天梯山下流合於三岔河又東有雜木口關又有涼州土衞洪武七年十月置西北距行都司五百里鎮番衞本臨河衞洪武中以小河灘城置三十年正月更名建文中罷永樂元年六月復置西有黑河即張掖河下流也又東有三岔河南有小河西有鹽池西南有黑山關西距行都司五百五十里莊浪衞洪武五年十一月以永昌地置十二年正月置陝西行都指揮使司於衞城二十六年行都司徙於甘州建文中改衞為守禦千戶所洪武三十五年十月復改所為衞屬陝西都司後來屬東有大松山其北有小松山西有分水嶺南出者為莊浪河北出者為古浪河又南有大通河與莊浪河合北流經衞西入於沙漠北距行都司九百四十里西寧衞元西寧州直隸甘肅行省洪武初廢六年正月置衞宣德七年十一月升軍民指揮使司屬陝西都司後來屬西南有小積石山與河州接界東南有峽口山亦曰湟峽南有大河自西域流入迴環於陝西山西河南山東四布政司及南直隸之地幾至萬里至淮安府清河縣南合長淮又東至安東縣南入於海又北有湟水即蘇木連河也東入大河又西南有賜支河又城北有西寧河皆流入大河又西北有浩亹水西南有宗哥川俱流合於湟水又西有西海亦名卑禾羌海俗呼青海西北有赤海又有烏海鹽池東南有綏遠關西北距行都司千三百五十里碾伯守禦千戶所本碾北地洪武十一年三月置莊浪分衞七月改置碾北衞後廢而徙西寧衞右千戶所於此成化中更名南有碾伯河西北距行都司千二百三十里沙州衞元沙州路屬甘肅行省洪武初廢永樂元年置衞正統間廢南有鳴沙山東南有三危山又東有龍勒山又有渥洼水西有瓜州元屬沙州路洪武初廢東距行都司千三百六十里鎮夷守禦千戶所洪武三十年以甘州衞地置建文二年罷永樂元年復置所舊在西北天順八年移於今治南有黑河即張掖河也西南有鹽池北有兔兒關東南距行都司三百里古浪守禦千戶所正統三年六月以莊浪衞地置古浪河在東又南有古浪關東有石峽關東南距行都司六百四十里高臺守禦千戶所景泰七年以甘州衞之高臺站置弱水在北又西有合黎山西南有白城山東南距行都司一百六十里
