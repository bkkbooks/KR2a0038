body:
  text: 明史卷一百十四列傳第二后妃二孝宗孝康張皇后武宗孝靜夏皇后世宗孝潔陳皇后張廢后孝烈方皇后孝恪杜太后穆宗孝懿李皇后孝安陳皇后孝定李太后神宗孝端王皇后劉昭妃孝靖王太后鄭貴妃光宗孝元郭皇后孝和王太后孝純劉太后李康妃李莊妃趙選侍熹宗懿安張皇后張裕妃莊烈帝愍周皇后田貴妃孝宗孝康皇后張氏興濟人父巒以鄉貢入太學母金氏夢月入懷而生后成化二十三年選為太子妃是年孝宗即位册立為皇后帝頗優禮外家追封巒昌國公封后弟鶴齡壽寧侯延齡建昌伯為后立家廟於興濟工作壯麗數年始畢鶴齡延齡並注籍宮禁縱家人為姦利中外諸臣多以為言帝以后故不問武宗即位尊為皇太后五年十二月以置鐇平上尊號曰慈壽皇太后世宗入繼稱聖母加上尊號曰昭聖慈壽嘉靖三年加上昭聖康惠慈壽已改稱伯母十五年復加上昭聖恭安康惠慈壽二十年八月崩諡曰孝康靖肅莊慈哲懿翊天贊聖敬皇后合葬泰陵祔廟武宗之崩也江彬等懷不軌賴后與大學士楊廷和定策禁中迎立世宗而世宗事后顧日益薄元年大婚初傳昭聖懿旨既復改壽安太后壽安者憲宗妃興獻帝生母也廷和爭之乃止三年興國太后誕節敕命婦朝賀燕賚倍常及后誕日敕免賀修撰舒芬疏諫奪俸御史朱浙馬明衡陳逅季本員外郎林惟聰等先後言皆得罪竟罷朝賀初興國太后以藩妃入太后猶以故事遇之帝頗不悅及帝朝太后待之又倨會太后弟延齡為人所告帝坐延齡謀逆論死太后窘迫無所出哀沖太子生請入賀帝謝不見使人請不許大學士張孚敬亦為延齡請帝手敕曰天下者高皇帝之天下孝宗皇帝守高皇帝法卿慮傷伯母心豈不慮傷高孝二廟心耶孚敬復奏曰陛下嗣位時用臣言稱伯母皇太后朝臣歸過陛下至今未已茲者大小臣工默無一言誠幸太后不得令終以重陛下過耳夫謀逆之罪獄成當坐族誅昭聖獨非張氏乎陛下何以處此冬月慮囚帝又欲殺延齡復以孚敬言而止亡何姦人劉東山者告變並逮鶴齡下詔獄太后至衣敝襦席藁為請亦不聽久之鶴齡瘐死及太后崩帝竟殺延齡事詳外戚傳武宗孝靜皇后夏氏上元人正德元年册立為皇后嘉靖元年上尊稱曰莊肅皇后十四年正月崩合葬康陵祔廟初禮臣上喪儀帝曰嫂叔無服且兩宮在上朕服青臣民如母后服禮部尚書夏言曰皇上以嫂叔絶服則羣臣不敢素服見皇上請暫罷朝參許之已而議諡大學士張孚敬曰大行皇后上嫂也與纍朝元后異宜用二字或四字李時曰宜用八左都御史王廷相吏部侍郎霍韜等曰均帝后也何殊言集衆議因奏曰古人尚質諡法簡稱其行後人增加臣子情也生今世宜行今制大行皇后宜如列聖元后諡二四及八於禮無據帝不從命再議羣臣請如孚敬言帝曰用六合陰數焉於是上諡孝靜莊惠安肅毅皇后十五年帝覺孚敬言非是敕曰孝靜皇后諡不備不稱配武宗乃改諡孝靜莊惠安肅溫誠順天偕聖毅皇后世宗孝潔皇后陳氏元城人嘉靖元年册立為皇后帝性嚴厲一日與后同坐張方二妃進茗帝循視其手后恚投杯起帝大怒后驚悸墮娠崩七年十月也喪禮從殺帝素服御西角門十日即玄冠玄裳御奉天門諡曰悼靈葬襖兒峪葬之日梓宮出王門百官一日臨給事中王汝梅諫不聽十五年禮部尚書夏言議請改諡時帝意久釋矣乃改諡曰孝潔穆宗即位禮臣議孝潔皇后大行皇帝元配宜合葬祔廟若遵遺制祔孝烈則舍元配也若同祔則二后也大行皇帝升祔時宜奉孝潔配遷葬永陵孝烈主宜別祀報可隆慶元年二月上尊諡曰孝潔恭懿慈睿安莊相天翊聖肅皇后廢后張氏世宗第二后也初封順妃七年陳皇后崩遂立為后是時帝方追古禮令后率嬪御親蠶北郊又日率六宮聽講章聖女訓於宮中十三年正月廢居別宮十五年薨喪葬儀視宣宗胡廢后孝烈皇后方氏世宗第三后也江寧人帝即位且十年未有子大學士張孚敬言古者天子立后並建六宮三夫人九嬪二十七世婦八十一御妻所以廣嗣也陛下春秋鼎盛宜博求淑女為子嗣計從之十年三月后與鄭氏王氏閻氏韋氏沈氏盧氏沈氏杜氏同册為九嬪冠九翟冠大采鞠衣圭用次玉穀文册黃金塗視皇后殺五分之一至期帝袞冕告太廟還服皮辨御華蓋殿傳制遣大臣行册禮既册從皇后朝奉先殿禮成帝服皮辨受百官賀蓋創禮也張后廢遂立為后而封沈氏為宸妃閻氏為麗妃舊制立后謁內廟而已至是下禮臣議廟見禮於是羣臣以天子立三宮以承宗廟禮經有廟見之文乃考據禮經參稽大明集禮擬儀注以上至期帝率后謁太廟及世廟越三日頒詔天下明日受命婦朝二十一年宮婢楊金英等謀弒逆帝賴后救得免乃進后父泰和伯鋭爵為侯初曹妃有色帝愛之册為端妃是夕帝宿端妃宮金英等伺帝熟寢以組縊帝項誤為死結得不絶同事張金蓮知事不就走告后后馳至解組帝蘇后命內監張佐等捕宮人雜治言金英等弒逆王寧嬪首謀又曰曹端妃雖不與亦知謀時帝病悸不能言后傳帝命收端妃寧嬪及金英等悉磔於市並誅其族屬十餘人然妃實不知也久之帝始知其冤二十六年十一月乙未后崩詔曰皇后比救朕危奉天濟難其以元后禮葬預名葬地曰永陵諡孝烈親定諡禮視昔加隆焉禮成頒詔天下及大祥禮臣請安主奉先殿東夾室帝曰奉先殿夾室非正也可即祔太廟於是大學士嚴嵩等請設位於太廟東皇妣睿皇后之次後寢藏主則設幄於憲廟皇祖妣之右以從祔於祖姑之義帝曰祔禮至重豈可權就后非帝乃配帝者自有一定之序安有享從此而主藏彼之禮其祧仁宗祔以新序即朕位次勿得亂禮嵩曰祔新序非臣下所敢言且陰不可當陽位乃命姑藏主睿皇后側二十九年十月帝終欲祔后太廟命再議尚書徐階言不可給事中楊思忠是階議餘無言者帝覘知狀及議疏入謂后正位中宮禮宜祔享但遽及廟次則臣子之情不唯不敢實不忍也宜設位奉先殿帝震怒階思忠惶恐言周建九廟三昭三穆國朝廟制同堂異室與周禮不同今太廟九室皆滿若以聖躬論仁宗當祧固不待言但此乃異日聖子神孫之事臣聞夏人之廟五商以七周以九禮由義起五可七七可九九之外亦可加也請於太廟及奉先殿各增二室以祔孝烈則仁宗可不必祧孝烈皇后可速正南面之位陛下亦無預祧以俟之嫌帝曰臣子之誼當祧當祔力請可也苟禮得其正何避豫為於是階等復會廷臣上言唐虞夏五廟其祀皆止四世周九廟三昭三穆然而兄弟相及亦不能盡足六世今仁宗為皇上五世祖以聖躬論仁宗於禮當祧孝烈皇后於禮當祔請祧仁宗祔孝烈皇后於太廟第九室因上祧祔儀注已而請忌日祭帝猶銜前議報曰孝烈繼后所奉者又入繼之君忌不祭亦可階等請益力帝曰非天子不議禮后當祔廟居朕室次禮官顧謂今日未宜徒飾説以惑衆聽因諭嚴嵩等曰禮官從朕言勉強耳即不忍祧仁宗且置后主別廟將來由臣下議處忌日令奠一卮酒不至傷情於是禮臣不敢復言第請如敕行乃許之後二年楊思忠為賀表觸忌豫杖削籍隆慶初與孝潔皇后同日上尊諡曰孝烈端順敏惠恭誠祗天衛聖皇后移主弘孝殿孝恪杜太后穆宗生母也大興人嘉靖十年封康嬪十五年進封妃三十三年正月薨是時穆宗以裕王居邸禮部尚書歐陽德奏喪儀請輟朝五日裕王主喪事遵高皇帝孝慈録斬衰三年帝謂當避君父之尊大學士嚴嵩言高帝命周王橚為孫貴妃服慈母服斬衰三年是年孝慈録成遂為定制自後久無是事及茲當作則垂訓於後帝命比賢妃鄭氏故事輟朝二日賜諡榮淑葬金山穆宗立上諡曰孝恪淵純慈懿恭順贊天開聖皇太后遷葬永陵祀主神霄殿追封后父林為慶都伯命其子繼宗嗣穆宗孝懿皇后李氏昌平人穆宗為裕王選為妃生憲懷太子嘉靖三十七年四月薨帝以部疏稱薨非制命改稱故葬金山穆宗即位諡曰孝懿皇后封后父銘德平伯神宗即位上尊諡曰孝懿貞惠順哲恭仁儷天襄聖莊皇后合葬昭陵祔太廟孝安皇后陳氏通州人嘉靖三十七年九月選為裕王繼妃隆慶元年册為皇后后無子多病居別宮神宗即位上尊號曰仁聖皇太后六年加上貞懿十年加康靜初神宗在東宮每晨謁奉先殿朝帝及生母畢必之后所問安后聞履聲輒喜既嗣位孝事兩宮無間二十四年七月崩諡曰孝安貞懿恭純溫惠佐天弘聖皇后祀奉先殿別室孝定李太后神宗生母也漷縣人侍穆宗於裕邸隆慶元年三月封貴妃生神宗即位上尊號曰慈聖皇太后舊制天子立尊皇后為皇太后若有生母稱太后者則加徽號以別之是時太監馮保欲媚貴妃因以並尊風大學士張居正下廷臣議尊皇后曰仁聖皇太后貴妃曰慈聖皇太后始無別矣仁聖居慈慶宮慈聖居慈寧宮居正請太后視帝起居乃徙居乾清宮太后教帝頗嚴帝或不讀書即召使長跪每御講筵入嘗令效講臣進講於前遇朝期五更至帝寢所呼曰帝起敕左右掖帝坐取水為盥面挈之登輦以出帝事太后惟謹而諸內臣奉太后旨者往往挾持太過帝嘗在西城曲宴被酒令內侍歌新聲辭不能取劍擊之左右勸解乃戲割其髮翼日太后聞傳語居正具疏切諫令為帝草罪己御札又召帝長跪數其過帝涕泣請改乃已六年帝大婚太后將返慈寧宮敕居正曰吾不能視皇帝朝夕先生親受先帝付託其朝夕納誨終先帝憑几之誼三月加尊號曰宣文十年加明肅十二年同仁聖太后謁山陵二十九年加貞壽端獻三十四年加恭熹四十二年二月崩上尊諡曰孝定貞純欽仁端肅弼天祚聖皇太后合葬昭陵別祀崇先殿后性嚴明萬曆初政委任張居正綜核名實幾於富強后之力居多光宗之未册立也給事中薑應麟等疏請被謫太后聞之弗善一日帝入侍太后問故帝曰彼都人子也太后大怒曰爾亦都人子帝惶恐伏地不敢起蓋內廷呼宮人曰都人太后亦由宮人進故云光宗由是得立羣臣請福王之藩行有日矣鄭貴妃欲遲之明年以祝太后誕為解太后曰吾潞王亦可來上壽乎貴妃乃不敢留福王御史曹學程以建言論死太后憐其母老言於帝釋之后父偉封武清伯家人嘗有過命中使出數之而抵其家人於法顧好佛京師內外多置梵剎動費巨萬帝亦助施無算居正在日嘗以為言未能用也神宗孝端皇后王氏餘姚人生京師萬曆六年册立為皇后性端謹事孝定太后得其歡心光宗在東宮危疑者數矣調護備至鄭貴妃顓寵后不較也正位中宮者四十二年以慈孝稱四十八年四月崩諡孝端光宗即位上尊諡曰孝端貞恪莊惠仁明天育聖顯皇后會帝崩熹宗立始上册寶合葬定陵主祔廟與后同日册封者有昭妃劉氏天啓崇禎時嘗居慈寧宮掌太后璽性謹厚撫愛諸王莊烈帝禮事之如大母嘗以歲朝朝見帝就便坐俄假寐太后戒勿驚命尚衣謹護之頃之帝覺攝衣冠起謝曰神祖時海內少事今苦多難兩夜省文書未嘗交睫在太妃前困不自持如此太妃為之泣下崇禎十五年薨年八十有六孝靖王太后光宗生母也初為慈寧宮宮人年長矣帝過慈寧私幸之有身故事宮中承寵必有賞賚文書房內侍記年月及所賜以為驗時帝諱之故左右無言者一日侍慈聖宴語及之帝不應慈聖命取內起居注示帝且好語曰吾老矣猶未有孫果男者宗社福也母以子貴寧分差等耶十年四月封恭妃八月光宗生是為皇長子既而鄭貴妃生皇三子進封皇貴妃而恭妃不進封二十九年册立皇長子為皇太子仍不封如故三十四年元孫生加慈聖徽號始進封皇貴妃三十九年病革光宗請旨得往省宮門猶閉抉鑰而入妃目眚手光宗衣而泣曰兒長大如此我死何恨遂薨大學士葉向高言皇太子母妃薨禮宜從厚不報復請乃得允諡溫肅端靖純懿皇貴妃葬天壽山光宗即位下詔曰朕嗣承基緒撫臨萬方遡厥慶源則我生母溫肅端靖純懿皇貴妃恩莫大焉朕昔在青宮莫親溫凊今居禁闥徒痛杯棬欲伸罔極之深悰惟有肇稱乎殷禮其準皇祖穆宗皇帝尊生母榮淑康妃故事禮部詳議以聞會崩熹宗即位上尊諡曰孝靖溫懿敬讓貞慈參天胤聖皇太后遷葬定陵祀奉慈殿后父天瑞封永寧伯恭恪貴妃鄭氏大興人萬曆初入宮封貴妃生皇三子進皇貴妃帝寵之外廷疑妃有立己子謀羣臣爭言立儲事章奏纍數千百皆指斥宮闈攻擊執政帝概置不問由是門戶之禍大起萬曆二十九年春皇長子移迎禧宮十月立為皇太子而疑者仍未已先是侍郎呂坤為按察使時嘗集閨範圖説太監陳矩見之持以進帝帝賜妃妃重刻之坤無與也二十六年秋或撰閨範圖説跋名曰憂危竑議匿其名盛傳京師謂坤書首載漢明德馬后由宮人進位中宮意以指妃而妃之刊刻實藉此為立己子之據其文託朱東吉為問答東吉者東朝也其名憂危以坤曾有憂危一疏因借其名以諷蓋言妖也妃兄國泰姪承恩以給事中戴士衡嘗糾坤全椒知縣樊玉衡並糾貴妃疑出自二人手帝重謫二人而置妖言不問踰五年續憂危竑議復出是時太子已立大學士朱賡得是書以聞書託鄭福成為問答鄭福成者謂鄭之福王當成也大略言帝於東宮不得已而立他日必易其特用朱賡內閣者實寓更易之義詞尤詭妄時皆謂之妖書帝大怒敕錦衣衛搜捕甚急久之乃得皎生光者坐極刑語詳郭正域沈鯉傳四十一年百戶王曰乾又告變言姦人孔學等為巫蠱將不利於聖母及太子語亦及妃賴大學士葉向高勸帝以靜處之而速福王之藩以息羣言事乃寢其後梃擊事起主事王之寀疏言張差獄情詞連貴妃宮內侍龐保劉成等朝議洶洶貴妃聞之對帝泣帝曰外廷語不易解若須自求太子貴妃向太子號訴貴妃拜太子亦拜帝又於慈寧宮太后几筵前召見羣臣令太子降諭禁株連於是張差獄乃定神宗崩遺命封妃皇后禮部侍郎孫如遊爭之乃止及光宗崩有言妃與李選侍同居乾清宮謀垂簾聽政者久之始息崇禎三年七月薨諡恭恪惠榮和靖皇貴妃葬銀泉山光宗孝元皇后郭氏順天人父維城以女貴封博平伯進侯卒兄振明嗣后於萬曆二十九年册為皇太子妃四十一年十一月薨諡恭靖熹宗即位上尊諡曰孝元昭懿哲惠莊仁合天弼聖貞皇后遷葬慶陵祔廟孝和王太后熹宗生母也順天人侍光宗東宮為選侍萬曆三十二年進才人四十七年三月薨熹宗即位上尊諡曰孝和恭獻溫穆徽慈諧天鞠聖皇太后遷葬慶陵祀奉先殿崇禎十一年三月以加上孝純太后尊諡於御用監得后及孝靖太后玉册玉寶始命有司獻於廟忠賢黨王體乾坐怠玩論死蓋距上諡時十有八年矣孝純劉太后莊烈帝生母也海州人後籍宛平初入宮為淑女萬曆三十八年十二月生莊烈皇帝已失光宗意被譴薨光宗中悔恐神宗知之戒掖庭勿言葬於西山及莊烈帝長封信王追進賢妃時莊烈帝居勗勤宮問近侍曰西山有申懿王墳乎曰有傍有劉娘娘墳乎曰有每密付金錢往祭及即位上尊諡曰孝純恭懿淑穆莊靜毗天育聖皇太后遷葬慶陵帝五歲失太后問左右遺像莫能得傅懿妃者舊與太后同為淑女比宮居自稱習太后言宮人中狀貌相類者命后母瀛國太夫人指示畫工可意得也圖成由正陽門具法駕迎入帝跪迎於午門懸之宮中呼老宮婢視之或曰似或曰否帝雨泣六宮皆泣故事生母忌日不設祭不服青十五年六月帝以太后故欲追前代生繼七后同建一廟以展孝思乃御德政殿召大學士及禮臣入問曰太廟之制一帝一后祧廟亦然歷朝繼后及生母凡七位皆不得與即宮中奉先殿亦尚無祭奈何禮部侍郎蔣德璟曰奉先殿外尚有奉慈殿所以奉繼后及生母者雖廢可舉也帝曰奉慈殿外尚有弘孝神霄本恩諸殿德璟曰內廷規制臣等未悉孝宗建奉慈殿嘉靖間廢之今未知尚有舊基否帝曰奉慈已撤惟奉先尚可拓也於是別置一殿祀孝純及七后云康妃李氏光宗選侍也時宮中有二李選侍人稱東西李康妃者西李也最有寵嘗撫視熹宗及莊烈帝光宗即位不豫召大臣入帝御暖閣憑几命封選侍為皇貴妃選侍趣熹宗出曰欲封后帝不應禮部侍郎孫如遊奏曰今兩太后及元妃才人諡號俱未上俟四大禮舉行後未晚既而帝崩選侍尚居乾清宮外廷恟懼疑選侍欲聽政大學士劉一燝吏部尚書周嘉謨兵科都給事中楊漣御史左光斗等上疏力爭選侍移居仁壽殿事詳一燝漣傳熹宗即位降敕暴選侍凌毆聖母因致崩逝及妄覬垂簾狀而御史賈繼春進安選侍揭與周朝瑞爭駁不已帝復降敕曰九月一日皇考賓天大臣入宮哭臨畢因請朝見選侍阻朕暖閣司禮監官固請乃得出既許復悔又使李進忠等再三趣回及朕至乾清丹陛進忠等猶牽朕衣不釋甫至前宮門又數數遣人令朕還毋御文華殿也此諸臣所目覩察選侍行事明欲要挾朕躬垂簾聽政朕蒙皇考令選侍撫視飲膳衣服皆皇祖皇考賜也選侍侮慢凌虐朕晝夜涕泣皇考自知其誤時加勸慰若避宮不早則爪牙成列朕且不知若何矣選侍因毆崩聖母自忖有罪每使宮人竊伺不令朕與聖母舊侍言有輒捕去朕之苦衷外廷豈能盡悉乃諸臣不念聖母惟黨選侍妄生謗議輕重失倫理法焉在朕今停選侍封號以慰聖母在天之靈厚養選侍及皇八妹以敬遵皇考之意爾諸臣可以仰體朕心矣已復屢旨詰責繼春繼春遂削籍去是時熹宗初即位委任司禮太監王安故敕諭如此久之魏忠賢亂政四年封選侍為康妃五年修三朝要典漣光斗等皆得罪死復召繼春與前旨大異矣久之始卒莊妃李氏即所稱東李者也仁慈寡言笑位居西李前而寵不及莊烈帝幼失母育於西李既而西李生女光宗改命東李撫視天啓元年二月封莊妃魏忠賢客氏用事惡妃持正宮中禮數多被裁損憤鬱薨崇禎初詔賜妃弟成棟田産選侍趙氏者光宗時未有封號熹宗即位忠賢客氏惡之矯旨賜自盡選侍以光宗賜物列案上西向禮佛痛哭自經死熹宗懿安皇后張氏祥符人父國紀以女貴封太康伯天啓元年四月册為皇后性嚴正數於帝前言客氏魏忠賢過失嘗召客氏至欲繩以法客魏交恨遂誣后非國紀女幾惑帝聽三年后有娠客魏盡逐宮人異己者而以其私人承奉竟損元子帝嘗至后宮后方讀書帝問何書對曰趙高傳也帝默然時宮門有匿名書列忠賢逆狀者忠賢疑出國紀及被逐諸臣手其黨邵輔忠孫杰等欲因此興大獄盡殺東林諸臣而借國紀以搖動中宮冀事成則立魏良卿女為后順天府丞劉志選偵知之首上疏劾國紀御史梁夢環繼之會有沮者乃已及熹宗大漸折忠賢逆謀傳位信王者后力也莊烈帝上尊號曰懿安皇后十七年三月李自成陷都城后自縊順治元年世祖章皇帝命合葬熹宗陵裕妃張氏熹宗妃也性直烈客魏恚其異己幽於別宮絶其飲食天雨妃匍匐飲簷溜而死又慧妃范氏者生悼懷太子不育復失寵李成妃侍寢密為慧妃乞憐客魏知之怒亦幽成妃於別宮妃預藏食物簷瓦間閉宮中半月不死斥為宮人崇禎初皆復位號莊烈帝愍皇后周氏其先蘇州人徙居大興天啓中選入信邸時神宗劉昭妃攝太后寶宮中之政悉稟成於熹宗張皇后故事宮中選大婚一后以二貴人陪中選則皇太后幕以青紗帕取金玉跳脫繫其臂不中即以年月帖子納淑女袖侑以銀幣遣還懿安疑后弱昭妃曰今雖弱後必長大因册為信王妃帝即位立為皇后后性嚴慎嘗以寇急微言曰吾南中尚有一家居帝問之遂不語蓋意在南遷也至他政事則未嘗預田貴妃有寵而驕后裁之以禮歲元日寒甚田妃來朝翟車止廡下后良久方御坐受其拜拜已遽下無他言而袁貴妃之朝也相見甚歡語移時田妃聞而大恨向帝泣帝嘗在交泰殿與后語不合推后仆地后憤不食帝悔使中使持貂裀賜后且問起居妃尋以過斥居啓祥宮三月不召一日后侍帝於永和門看花請召妃帝不應后遽令以車迎之乃相見如初帝以寇亂茹蔬后見帝容體日瘁具饌將進而瀛國夫人奏適至曰夜夢孝純太后歸語帝瘁而泣且曰為我語帝食毋過苦帝持奏入宮后適進饌帝追念孝純且感后意因出奏示后再拜舉匕箸相向而泣淚盈盈沾案崇禎十七年三月十八日暝都城陷帝泣語后曰大事去矣后頓首曰妾事陛下十有八年卒不聽一語至有今日乃撫太子二王慟哭遣之出宮帝令后自裁后入室闔戶宮人出奏猶云皇后領旨后遂先帝崩帝又命袁貴妃自縊繫絶久之蘇帝拔劍斫其肩又斫所御妃嬪數人袁妃卒不殊世祖章皇帝定鼎諡后曰莊烈愍皇后與帝同葬田貴妃寢園名曰思陵下所司給袁妃居宅贍養終其身有宮人魏氏者當賊入宮大呼曰我輩必遭賊污有志者早為計遂躍入御河死頃間從死者一二百人宮人費氏年十六自投眢井中賊鈎出見其姿容爭奪之費氏紿曰我長公主也羣賊不敢逼擁見李自成自成命中官審視之非是以賞部校羅某者費氏復紿羅曰我實天潢義難苟合將軍宜擇吉成禮羅喜置酒極歡費氏懷利刃俟羅醉斷其喉立死因自詫曰我一弱女子殺一賊帥足矣遂自刎死自成聞大驚令收葬之恭淑貴妃田氏陝西人後家揚州父弘遇以女貴官左都督好佚遊為輕俠妃生而纖姘性寡言多才藝侍莊烈帝於信邸崇禎元年封禮妃進皇貴妃宮中有夾道暑月駕行幸御蓋行日中妃命作蘧篨覆之從者皆得休息又易小黃門之舁輿者以宮婢帝聞以為知禮嘗有過謫別宮省愆所生皇五子薨於別宮妃遂病十五年七月薨諡恭淑端惠靜懷皇貴妃葬昌平天壽山即思陵也贊曰高皇后從太祖備歷艱難贊成大業母儀天下慈德昭彰繼以文皇后仁孝寬和化行宮壼後世承其遺範內治肅雍論者稱有明家法遠過漢唐信不誣矣萬鄭兩貴妃亦非有陰鷙之謀干政奪嫡之事徒以恃寵溺愛遂滋謗訕易曰間有家悔亡苟越其間悔將無及聖人之垂戒遠矣哉
