body:
  text: 明史卷一百八十五列傳第七十三李灃葉淇賈俊劉璋黃紱張悅張鎣鍾曾鑑梁璟王詔徐恪李介子昆黃珂王鴻儒叢蘭吳世忠李敏字公勉襄城人景泰五年進士授御史天順初奉敕撫定貴州蠻還巡按畿內以薊州餉道經海口多覆溺建議別開三河達薊州以避其險軍民利之成化初用薦超遷浙江按察使再任湖廣歷山西四川左右布政使十三年擢右副都御史巡撫大同敵騎出沒塞下掩殺守墩軍敏伏壯士突擒之修治垣塹敵不敢犯十五年召為兵部右侍郎踰四年病歸河南大飢條上救荒數事詔以左副都御史巡撫保定諸府二十一年改督漕運尋召拜戶部尚書先是敏在大同見山東河南轉餉至者道遠耗費乃會計歲支外悉令輸銀民輕齎易達而將士得以其贏治軍裝交便之至是並請畿輔山西陝西州縣歲輸糧各邊者每糧一石徵銀一兩以十九輸邊依時值折軍餉有餘則召糴以備軍興帝從之自是北方二稅皆折銀由敏始也崇文門宣課司稅多為勢要所侵漁敏因馬文升言請增設御史主事監視御史陳瑤斥敏聚斂敏再疏求去帝慰留之貴戚請隙地及鷹房牧馬場千頃敏執不可事得寢當憲宗末中官佞幸多賜莊田既得罪率辭而歸之官罪重者奪之然不以賦民敏請召佃畝科銀三分帝從之然他莊田如故也會京師大水敏乃極陳其害言今畿輔皇莊五為地萬二千八百餘頃勛戚中官莊三百三十有二為地三萬三千一百餘頃官校招無賴為莊頭豪奪畜産戕殺人污婦女民心痛傷災異所由生皇莊始正統間諸王未封相間地立莊王之藩地仍歸官其後乃沿襲普天之下莫非王土何必皇莊請盡革莊戶賦民耕畝概徵銀三分充各宮用度無皇莊之名而有足用之效至權要莊田亦請擇佃戶領之有司收其課聽諸家領取悅民心感和氣無切於此時不能用南京御史與守備太監蔣琮相訐御史咸逮謫而琮居職如故敏再疏力爭皆不聽弘治四年得疾乞休帝為遣醫視療已復力請乃以葉淇代詔敏乘傳歸未抵家卒贈太子少保諡恭靖敏生平篤行誼所得祿賜悉以分昆弟故人里居時築室紫雲山麓聚書數千卷與學者講習及巡撫大同疏籍之於官詔賜名紫雲書院大同孔廟無雅樂以敏奏得頒給如制云葉淇字本清山陽人景泰五年進士授御史天順初石亨譖之下吏考訊無驗出為武陟知縣成化中纍官大同巡撫孝宗立召為戶部侍郎弘治四年代李敏為尚書尋加太子少保哈密為土魯番所陷守臣請給其遺民廩食處之內地淇曰是自貽禍也寢其奏姦民獻大名地為皇莊淇議歸之有司內官龍綬請開銀礦淇不可帝從之已綬請長蘆鹽二萬引鬻於兩淮以供織造費淇力爭竟不納淇居戶部六年直亮有執能為國家惜財用每廷議用兵輒持不可惟變開中之制令淮商以銀代粟鹽課驟增至百萬悉輸之運司邊儲由此蕭然矣九年四月乞休歸卒贈太子太保從子贄進士歷官刑部右侍郎以清操聞賈俊字廷杰束鹿人以鄉舉入國學天順中選授御史歷巡浙江山西陝西河南南畿所至有聲成化十三年自山東副使超拜右僉都御史巡撫寧夏在鎮七年軍民樂業召為工部右侍郎二十一年奉敕振飢河南尋轉左數月拜尚書時專重進士舉人無至六卿者俊獨以重望得之及孝宗踐阼尚書王恕李敏周洪謨余子俊何喬新都御史馬文升皆一時民譽俊參其間亦稱職諸王府第塋墓悉官豫直而儀仗時繕修內官監欲頻興大工俊言王府既有祿米莊田請給半直儀仗非甚敝不得煩有司公家所宜營惟倉庫城池餘皆停罷帝報可弘治四年中官奏修沙河橋請發京軍二萬五千及長陵五衛軍助役內府寶鈔司乞增工匠浙江及蘇松諸府方罹水災而織造錦綺至數萬匹俊皆執奏並得寢工部政務與內府監局相表𩹉而內官監專董工役職尤相關俊不為所撓工役大省太廟後殿成加太子少保足疾致仕詔許乘傳歸給夫廩如制踰年卒俊廉慎居工部八年望孚朝野代之者劉璋字廷信延平人天順初進士歷官中外有聲居工部亦數有爭執名亞於俊黃紱字用章其先封丘人曾祖徙平越遂家焉紱登正統十三年進士除行人歷南京刑部郎中剛廉人目之曰硬黃大猾談千戶者占民蘆場莫敢問紱奪還之民成化九年遷四川左參議久之進左參政按部崇慶旋風起輿前不得行紱曰此必有冤吾當為理風遂散至州禱城隍神夢若有言州西寺者寺去州四十里倚山為巢後臨巨塘僧夜殺人沉之塘下分其資且多藏婦女於窟中紱發吏兵圍之窮詰得其狀誅僧毀其寺倉吏倚皇親乾沒官糧巨萬紱追論如法威行部中歷四川湖廣左右布政使奏閉建昌銀礦兩京工興湖廣當輸銀二萬例徵之民紱以庫羡充之荊王奏徙先壟紱恐為民擾執不可二十二年擢右副都御史巡撫延綏劾參將郭鏞都指揮鄭印李鐸王琮等抵罪計捕姦豪張綱申軍令增置墩堡邊政一新出見士卒妻衣不蔽體歎曰健兒家貧至是何面目臨其上亟豫給三月餉親為拊循會有詔毀庵寺紱因盡汰諸尼以給壯士無妻者及紱去多攜子女拜送於道弘治三年拜南京戶部尚書言官以紱進頗驟頻有言帝不聽就改左都御史焚差歷簿於庭曰事貴得人耳資勞久近豈立官意哉紱歷官四十餘年性卞急不能容物然操履潔白所至有建樹六年乞休未行卒張悅字時敏松江華亭人舉天順四年進士授刑部主事進員外郎成化中出為江西僉事改督浙江學校力拒請託校士不糊名曰我取自信而已遷四川副使進按察使遭喪服闋補湖廣王府承奉張通縱恣悅繩以法及入覲中官尚銘督東廠衆競趨其門悅獨不往銘銜甚伺察無所得銘敗召拜左僉都御史孝宗立遷工部右侍郎轉吏部左侍郎王恕為尚書悅左右之嘗兩攝選事弘治六年夏大旱求言陳遵舊章恤小民崇儉素裁冗食禁濫罰數事又上修德圖治二疏並嘉納俄遷南京右都御史就改吏部尚書九年復改兵部參贊機務以年至纍疏乞休詔加太子少保馳傳歸卒贈太子太保諡莊簡時與悅同里而先為南京兵部尚書者張鎣字廷器正統十三年進士景泰初擢御史歷江西副使按察使陝西左布政使成化三年以右副都御史巡撫寧夏寧夏城土築鎣始甃以甎道河流溉靈州屯田七百餘頃以父喪去服除起撫河間諸府改大同歷刑部左右侍郎十八年擢本部尚書明年加太子少保又明年再以憂歸弘治元年起南京兵部尚書卒官贈太子太保諡莊懿鍾字大器鄆城人成化二年進士授御史巡鹽兩淮按浙江還掌諸道章奏汪直諷鍾劾馬文升鍾不可被譖杖闕下以都御史王越薦擢大理寺丞再遷右少卿寇入大同廷議遣大臣巡視保定諸府乃以命鍾居數月即擢右副都御史巡撫其地河間瀕海民地為勢家所據鍾奪還之召為刑部右侍郎丁內艱僦運艘載母柩南還督漕總兵官王信奏之逮下吏會當路方逐尹旻黨而鍾與旻為同鄉乃貶二秩為曲靖知府改徽州復入為大理寺左少卿弘治三年以右副都御史巡撫蘇松諸府盡心荒政召為戶部侍郎總督倉場尋改吏部十一年遷右都御史居二年進戶部尚書十五年上天下會計之數言常入之賦以蠲免漸減常出之費以請乞漸增入不足當出正統以前軍國費省小民輸正賦而已自景泰至今用度日廣額外科率河南山東邊餉浙江雲南廣東雜辦皆昔所無民已重困無可復增往時四方豐登邊境無調發州縣無流移今太倉無儲內府殫絀而冗食冗費日加於前願陛下惕然省憂力加損節且敕廷臣共求所以足用之術帝乃下廷臣議議上十二事其罷傳奉冗官汰內府濫收軍匠清騰驤四衛勇士停寺觀齋醮省內侍畫工番僧供應禁王府及織造濫乞鹽引令有司徵莊田租皆權幸所不便者疏留數月不下鍾乃復言之他皆報可而事關權幸者終格不行姦商投外戚張鶴齡乞以長蘆舊引十七萬免追鹽課每引納銀五分別用價買各場餘鹽如其數聽鬻販帝許之後姦民援例乞兩淮舊引至百六十萬鍾等力持皆不聽自此鹽法大壞姦人橫行江湖官司無如何矣東廠偵事者發鍾子瑞受金事鍾屢疏乞休命馳驛歸正德時劉瑾托鍾在部時事至罰米者三又數年卒曾鑑字克明其先桂陽人以戍籍居京師天順八年進士授刑部主事通州民十餘人坐為盜獄已具鑑辨其誣已果獲真盜成化末歷右通政纍遷工部左侍郎弘治十三年進尚書孝宗在位久海內樂業內府供奉漸廣司設監請改造龍毯素毯一百有奇鑑等言毯雖一物然徵毛毳於山陝採綿紗諸料於河南召工匠於蘇松經纍歲勞費百端祈賜停止不聽內府針工局乞收幼匠千人鑑等言往年尚衣監收匠千人而兵仗局效之收至二千人軍器局司設監又效之各收千人弊源一開其流無已於是命減其半太監李興請辦元夕煙火有詔裁省因鑑奏盡罷之十六年帝納諸大臣言召還織造中官中官鄧瑢以請帝又許之鑑等極言乃命減三之一其冬言諸省方用兵且水旱多盜賊乞罷諸營繕及明年煙火龍虎山上清宮工作帝皆報從正德元年雷震南京報恩寺塔守備中官傅容請修之鑑言天心示警不宜重興土木以勞民力乃止御馬監太監陳貴奏遷馬房欽天監官倪謙覆視請從之給事中陶諧等劾貴假公營私並劾謙阿附不聽鑑執奏謂馬房皆由欽天監相視營造其後任意增置者宜令拆毀改正葺以己資庶牧養無妨而民不勞報可內織染局請開蘇杭諸府織造上供錦綺為數二萬四千有奇鑑力請停罷得減三分之半太監許鏞等各齎敕於浙江諸處抽運木植亦以鑑言得寢孝宗末閣部大臣皆極一時選鑑亦持正及與韓文等請誅宦官不勝諸大臣留者率巽順避禍鑑獨守故操有詔賜皇親夏儒第帝嫌其隘欲拓之鑑力爭不從明年春中官黃準守備鳳陽從其請賜旗牌鑑等言大將出征及諸邊守將乃有旗牌內地守備無故事乃寢其年閏正月致仕旋卒贈太子太保梁璟字廷美崞縣人天順八年進士授兵科給事中成化時屢遷都給事中項忠征荊襄驅流民復業璟劾其縱兵逼迫較賊更慘語具忠傳延綏用兵令山西預征芻粟民相率逃亡璟疏陳其困得寬減畿輔八府舊止設巡撫一人駐薊州以禦邊不能兼顧璟請順天永平二府分設一巡撫以薊州邊務屬之令巡撫陳濂專撫保定六府兼督紫荊諸關朝議從之遂為定制已與同官韓文王詔等奏請起致仕尚書王竑李秉而斥都御史王越並及宮闈隱事被撻文華殿武靖伯趙輔西征不敢戰稱病求還復謀典營府事璟等極論其罪乃令養疾歸九載秩滿擢陝西左參政分守洮岷西番入寇督兵斬其魁內艱服闋還原任歷左右布政使先後在陝十五年多政績孝宗嗣位遷右副都御史巡撫湖廣弘治二年民飢請免徵兩京漕糧八十九萬餘石從之帝登極詔書已罷四方額外貢獻而提督武當山中官復貢黃精梅笋茶芽諸物武當道士先止四百至是倍之所度道童更倍咸衣食於官月給油蠟香楮灑掃夫役以千計中官陳喜又攜道士三十餘人各領護持敕所至張威虐璟皆奏請停免多見採納外艱服除再撫四川七年召拜南京吏部右侍郎久之就進戶部尚書致仕歸卒王詔字文振趙人生有異姿學士曹鼐奇之妻以女天順末登進士授工科給事中睿皇后崩值秋享太廟時議謂不當以卑廢尊詔言禮有喪不祭無已則移日俟釋服議雖不行識者是焉勘牧馬草場劾會昌侯孫繼宗撫寧侯朱永侵占罪時方面官缺令京卿三品保舉詔言恐長奔競風不聽纍遷都給事中八年七月敕修隆善寺工竣授工匠三十人官尚寶少卿任道遜等以書碑皆進秩詔上疏力諫不省已偕梁璟等論及宮闈事帝大怒召至文華殿面詰之詔仰呼曰臣等言雖不當然區區犬馬之誠知為國而已乃杖而釋之出為湖廣右參政原傑經略荊襄詔襄理功為多以父憂去服除再任遷右布政使弘治元年轉貴州左布政使其冬以右副都御史巡撫雲南土官好爭襲所司入其賄變亂曲直生邊患詔不通苞苴一斷以法且去弊政之不便者諸夷歸命邊徼寧戢有故官不能歸者妻子多鬻為奴詔為資遣得歸者甚衆洪武中尚書吳雲繼王禕死事後禕諡忠文歲祀之而不及雲詔以為請乃諡雲忠節與禕並祀四年召拜南京兵部右侍郎未上卒徐恪字公肅常熟人成化二年進士授工科給事中中官欲出領抽分廠恪等疏爭中官怒請即遣恪等將托其罪無所得乃已出為湖廣左參議遷河南右參政陝西飢當轉粟數萬石恪以道遠請輸直上下稱便弘治初歷遷左右布政使徽王府承奉司違制置吏恪革之王奏恪侵侮帝賜書誡王河徙逼開封有議遷藩府三司於許州者恪言非便遂寢四年拜右副都御史巡撫其地奏言秦項梁唐龐勛元方谷珍輩往往起東南今東南民力已竭加水旱洊臻去冬彗掃天津直吳越地乞召還織造內臣敕撫按諸臣加意拊循以弭異變帝不從故事王府有大喪遣中官致祭所過擾民成化末始就遣王府承奉及帝即位又復之恪請如先帝制並條上汰冗官清賦稅禁科擾定贖例革抽分數事多議行戶部督逋急恪以災變請緩其事御史李興請於鄖陽別設三司割南陽荊州襄陽漢中保寧夔州隸之恪陳五不可乃止恪素剛正所至抑豪右祛姦弊及為巡撫以所部多王府持法尤嚴宗人多不悅平樂義寧二王遂訐恪減祿米改校尉諸事勘無驗坐恪入王府誤行端禮門欲以平二王忿帝知恪無他而以二王幼降敕切責命湖廣巡撫韓文與恪易任吏民罷市泣送數十里不絶屬吏以羡金贐揮之去至則值岐王之國中使攜鹽數百艘抑賣於民為恪所持阻不行其黨密搆於帝居一歲中旨改南京工部右侍郎恪上疏曰大臣進用宜出廷推未聞有傳奉得者臣生平不敢由他途進請賜罷黜帝慰留乃拜命勢要家濫索工匠者悉執不豫十一年考績入都得疾遂致仕卒李介字守貞高密人成化五年進士選庶吉士改御史巡鹽兩浙還掌河南道事以四方災傷陳時政數事帝多採用之介敢言遇事不可輒率同列論奏忤帝意兩撻於庭九載滿擢大理丞進少卿弘治改元遷右僉都御史巡撫宣府尋召佐院事歷兵部左右侍郎十年夏北寇謀犯大同命介兼左僉都御史往督軍餉且經略之比至寇已退乃大修戎備察核官田牛具錢還之軍以其資償軍所逋馬價邊人感悅先後條上便宜二十事卒贈尚書子昆字承裕弘治初進士歷禮部主事中官何鼎建言下獄臺諫救之咸被責昆復論救弗聽父憂歸起改兵部主事帝將建延壽塔於城外昆復疏諫正德初羣小用事請黜邪枉進忠直杜宦戚請乞節中外侈費皆不報進員外郎忤尚書劉宇貶知解州屢遷陝西左布政使十年以右副都御史巡撫甘肅與總督彭澤經略哈密兵部尚書王瓊劾澤處置失宜語連昆下吏法司言昆設謀遏強寇功不可掩瓊不從謫浙江副使世宗立瓊得罪復官巡撫順天尋召為兵部右侍郎嘉靖初改左大同軍亂殺巡撫張文錦昆奉命往撫承制曲赦之還請收恤文錦帝方惡其激變不從遇疾歸久之卒黃珂字鳴玉遂寧人成化二十年進士授龍陽知縣治行聞擢御史出按貴州金達長官何碖謀不軌計擒之改設流官賊婦米魯亂奏劾巡撫錢鉞總兵官焦俊等皆得罪改按畿輔歷山西按察使正德四年擢右僉都御史巡撫延綏安化王置鐇反傳檄四方用討劉瑾為名他鎮畏瑾不敢以聞珂封上其檄因陳便宜八事而急令副總兵侯勛參將時源分兵扼河東賊遂不敢出亦不剌寇邊珂偕總兵官馬昂督軍戰敗之木瓜山六年復寇邊珂檄副總兵王勛等七將分據要害夾擊復敗之屢賜璽書銀幣是年秋入為戶部右侍郎總督倉場河南用兵出理軍餉主客兵十餘萬追奔轉戰遷止無常珂隨方轉輸軍興無乏録功增俸一級改刑部進左侍郎已改佐兵部寧王宸濠謀復護衛珂執議獨堅九年擢南京右都御史尋就拜工部尚書以年至乞休歸卒贈太子少保諡簡肅王鴻儒字懋學南陽人少工書家貧為府書佐知府段堅愛其書留署中親教之遣入學校為諸生遂舉鄉試第一成化末登進士授南京戶部主事纍遷郎中擢山西僉事進副使俱督學政居九年士風甚盛孝宗嘗語劉大夏曰藩臬中若王鴻儒他日可大用也正德改元謝病歸劉瑾擅政改召名流四年夏起為國子祭酒以父喪去再起南京戶部侍郎歷吏部右侍郎尋轉左十四年遷南京戶部尚書甫履任宸濠反命督軍餉疽發於背遂卒諡文莊鴻儒為學務窮理致用為世所推在吏部清正自持門無私謁弟鴻漸鄉試亦第一以進士纍官山東右布政使以廉靜稱叢蘭字廷秀文登人弘治三年進士為戶科給事中中官梁芳陳喜汪直韋興先以罪擯斥復夤緣還京蘭因清寧宮災疏陳六事極論芳等罪諸人遂廢尋言吏部遵詔書請擢用建言詿誤諸臣而明旨不盡從非所以示信失儀被糾請免送詔獄畿內征徭繁重富民規免他戶代之宜釐正章下所司進兵科右給事中都督僉事吳安以傳奉得官蘭請罷之時命撥團營軍八千人修九門城濠蘭言臣頃簡營軍詔許專事訓諫無復差撥命下未幾旋復役之如前詔何遂罷遣遷通政參議小王子犯大同命經略紫荊倒馬諸關塞蹊隧可通敵騎者百十所正德三年進左通政明年冬出理延綏屯田安化王置鐇反蘭奏陳十事中言文武官罰米者鬻産不能償朝臣謫戍刑官妄引新例鍛鍊成獄沒其家資校尉遍行邊塞勢焰薰灼人不自保劉瑾大惡之矯旨嚴責給事中張瓚御史汪賜等遂希旨劾蘭瑾方憂邊事置不問數月瑾誅進通政使俄擢戶部右侍郎督理三邊軍餉六年陝西巡撫都御史藍章以四月寇亂移駐漢中會河套有警乃命蘭兼管固靖等處軍務蘭上言陝西起運糧草數為大戶侵牟請委官押送每鎮請發內帑銀數萬預買糧草御史張彧清出田畝請蠲免子粒如弘治十八年以前科則靈州鹽課請照例開中召商糴糧軍士折色主者多剋減乞選委鄰近有司散給從之是年冬南畿及河南歲侵命蘭往振未赴而河北賊自宿遷渡河將逼鳳陽乃命蘭以本官巡視廬鳳滁和兼理振濟河南白蓮賊趙景隆自稱宋王掠歸德蘭遣指揮石堅知州張思齊等擊斬之九月賊平論功賚金幣增俸一級召還理部事部無侍郎缺乃命添注明年大同有警命巡視居庸龍泉諸關尋兼督宣大軍餉進右都御史總制宣大山東軍務令內地皆築堡寇至收保如塞下寇五萬騎自萬全右衛趨蔚州大掠又三萬騎入平虜南城以失事停半歲俸十年夏改督漕運尋兼巡撫江北中官劉允取佛烏思藏道蘭境入謁辭不見允需舟五百餘艘役夫萬餘人蘭馳疏極陳其害不報居四年以事忤兵部尚書王瓊解漕務專任巡撫寧王宸濠反蘭移鎮瓜州十五年遷南京工部尚書世宗即位御史陳克宅劾蘭附江彬帝以蘭素清謹釋勿問蘭遂乞休去卒贈太子少保吳世忠字懋貞金溪人弘治三年進士授兵科給事中兩畿及山東河南浙江民飢有詔振恤所司俟勘覆世忠極言其弊因條上興水利復常平二事多施行已請恤建文朝殉難諸臣乞賜爵諡崇廟食且録其子孫復其族屬為忠義勸章下禮官寢不行尚書王恕被訐求去上疏請留之壽寧侯張鶴齡求勘河間賜地其母金夫人復求不已帝命遣使世忠言侯家仰托肺腑豈宜與小民爭尺寸命部勘未已內臣繼之內臣未已大臣又繼之剝民斂怨非國家福尤非外戚之福不聽大同總兵官神英副總兵趙昶等因馬市令家人以違禁綵繒易馬番人因闌入私易鐵器既出塞復潛兵掠蔚州陷馬營轉剽中東二路英等擁兵不救巡撫劉瓛鎮守中官孫振又不以實聞十一年事發世忠往勘上疏備陳大同邊備廢弛士卒困苦之狀因極言英瓛等貪利畏敵蕩無法度英落職瓛振召還昶及遊擊劉淮參將李嶼等俱逮問已而瓛改大理少卿昶以大理丞吳一貫覆讞僅鐫級世忠復極論瓛罪且詆一貫帝皆不問闕里文廟災陳八事不能盡用寇犯延綏大同世忠言國初設七十二衛軍士不下百萬近軍政日壞精卒不能得一二萬人此兵足憂也太倉之儲本以備軍近支費日廣移用日多倘興師十萬犒賜無所取給此食足憂也正統己巳之變尚有石亨楊洪邇所用李杲阮興趙昶劉淮之屬先後皆敗今王璽馬升又以失事告此將帥足憂也國家多事大臣有以鎮之邇者忠正多斥貪庸獲存既鮮匡濟之才又昧去就之節安能懾強敵壯國勢乎此任人足憂也政多舛乖民日咨怨京軍敝力役京民苦催科畿甸覬恩尤切顧使不樂其生至此臨難誰與死守此民心足憂也天變屢徵火患頻發雲南地震壓萬餘家大同馬災踣二千匹此天意足憂也願順好惡以收人心肅念慮以回天意遣文武重臣經略宣大以飭邊防策免諸臣不肖者而起素有才望如何喬新劉大夏倪嶽戴珊張敷華林俊諸人以任國事則賊將望風遠遁而邊境可無憂矣帝以言多詆毀切責之尋乞大同增置臺堡以間田給軍耕墾不徵其稅江西歲飢盜起請簡巡撫黜有司貪殘者又請築京師外城所司多從其議再遷吏科左給事中擢湖廣參議坐事降山東僉事正德四年閏九月召為光祿少卿旋改尚寶司卿其年冬與通政叢蘭等出理邊屯世忠往薊州明年奏言占種盜賣積弊已久若一一究問恐人情不安請量為處分從之劉瑾敗言官劾其嘗請清核屯田助瑾為虐世忠故方鯁朝議寬之得免再遷大理少卿八年擢右僉都御史巡撫延綏寇在河套逐之失利乃引疾歸贊曰明至英宗以後幸門日開傳奉請乞官冗役繁用度奓汰盛極孽衰國計坐絀李敏諸人斤斤為國惜財抵抗近幸以求紓民然涓滴之助無補漏卮國家當承平殷阜之世侈心易萌近習乘之糜費日廣易曰節以制度不傷財不害民又曰不節若則嗟若此恭儉之主所為也
