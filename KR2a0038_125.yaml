body:
  text: 明史卷一百二十五列傳第十三徐達常遇春徐達字天德濠人世業農達少有大志長身高顴剛毅武勇太祖之為郭子興部帥也達時年二十二往從之一見語合及太祖南略定遠帥二十四人往達首與焉尋從破元兵於滁州澗從取和州子興授達鎮撫子興執孫德崖德崖軍亦執太祖達挺身詣德崖軍請代太祖乃得歸達亦獲免從渡江拔采石取太平與常遇春皆為軍鋒冠從破擒元將陳野先別將兵取溧陽溧水從下集慶太祖身居守而命達為大將帥諸軍東攻鎮江拔之號令明肅城中宴然授淮興翼統軍元帥時張士誠已據常州挾江東叛將陳保二以舟師攻鎮江達敗之於龍潭遂請益兵以圍常州士誠遣將來援達以敵狡而鋭未易力取乃離城設二伏以待別遣將王均用為奇兵而自督軍戰敵退走遇伏大敗之獲其張湯二將進圍常州明年克之進僉樞密院事繼克寧國徇宜興使前鋒趙德勝下常熟擒士誠弟士德明年復攻宜興克之太祖自將攻婺州命達留守應天別遣兵襲破天完將趙普勝復池州遷奉國上將軍同知樞密院事進攻安慶自無為陸行夜掩浮山寨破普勝部將於青山遂克潛山還鎮池州與遇春設伏敗陳友諒軍於九華山下斬首萬人生擒三千人遇春曰此徑旅也不殺為後患達不可乃以狀聞而遇春先以夜坑其人過半太祖不悉縱遣餘衆於是始命達盡護諸將陳友諒犯龍江達軍南門外與諸將力戰破之追及之慈湖焚其舟明年從伐漢取江州友諒走武昌達追之友諒出戰艦沔陽達營漢陽沌口以遏之進中書右丞明年太祖定南昌降將祝宗康泰叛達以沌口軍討平之從援安豐破吳將呂珍遂圍廬州會漢人寇南昌太祖召達自廬州來會師遇於鄱陽湖友諒軍甚盛達身先諸將力戰敗其前鋒殺千五百人獲一巨舟太祖知敵可破而慮士誠內犯即夜遣達還守應天自帥諸將鏖戰竟斃友諒明年太祖稱吳王以達為左相國復引兵圍廬州克其城略下江陵辰州衡州寶慶諸路湖湘平召還帥遇春等徇淮東克泰州吳人陷宜興達還救復之復引兵渡江克高郵俘吳將士千餘人會遇春攻淮安破吳軍於馬騾港守將梅思祖以城降進破安豐獲元將欣都走左君弼盡得其運艘元兵侵徐州迎擊大破之俘斬萬計淮南北悉平師還太祖議征吳右相國李善長請緩之達曰張氏汰而苛大將李伯升輩徒擁子女玉帛易與耳用事者黃蔡葉三參軍書生不知大計臣奉主上威德以大軍蹙之三吳可計日定太祖大悅拜達大將軍平章遇春為副將軍帥舟師二十萬人薄湖州敵三道出戰達亦分三軍應之別遣兵扼其歸路敵戰敗返走不得入城還戰大破之擒將吏二百人圍其城士誠遣呂珍等以兵六萬赴救屯舊館築五寨自固達使遇春等為十壘以遮之士誠自以精兵來援大破之於皂林士誠走遂拔升山水陸寨五太子朱暹呂珍等皆降以徇於城下湖州降遂下吳江州從太湖進圍平江達軍葑門遇春軍虎丘郭子興軍婁門華雲龍軍胥門湯和軍閶門王弼軍盤門張溫軍西門康茂才軍北門耿炳文軍城東北仇成軍城西南何文輝軍城西北築長圍困之架木塔與城中浮屠等別築臺三成瞰城中置弓弩火筒臺上又置巨炮所擊輒糜碎城中大震達遣使請事太祖敕勞之曰將軍謀勇絶倫故能遏亂略削羣雄今事必稟命此將軍之忠吾甚嘉之然將在外君不御軍中緩急將軍其便宜行之吾不中制既而平江破執士誠傳送應天得勝兵二十五萬人城之將破也達與遇春約曰師入我營其左公營其右又令將士曰掠民財者死毀民居者死離營二十里者死既入吳人安堵如故師還封信國公尋拜征虜大將軍以遇春為副帥步騎二十五萬人北取中原太祖親禡於龍江是時稱名將必推達遇春兩人才勇相類皆太祖所倚重遇春剽疾敢深入而達尤長於謀略遇春下城邑不能無誅僇達所至不擾即獲壯士與諜結以恩義俾為己用由此多樂附大將軍者至是太祖諭諸將御軍持重有紀律戰勝攻取得為將之體者莫如大將軍達又謂達進取方略宜自山東始師行克沂州降守將王宣進克嶧州王宣復叛擊斬之莒密海諸州悉下乃使韓政分兵扼河張興祖取東平濟寧而自帥大軍拔益都徇下濰膠諸州縣濟南降分兵取登萊齊地悉定洪武元年太祖即帝位以達為右丞相冊立皇太子以達兼太子少傅副將軍遇春克東昌會師濟南擊斬樂安反者還軍濟寧引舟師泝河趨汴梁守將李克彝走左君弼竹貞等降遂自虎牢關入洛陽與元將脫因帖木兒大戰洛水北破走之梁王阿魯溫以河南降略定嵩陝陳汝諸州遂搗潼關李思齊奔鳳翔張思道奔鄜城遂入關西至華州捷聞太祖幸汴梁召達詣行在所置酒勞之且謀北伐達曰大軍平齊魯掃河洛王保保逡巡觀望潼關既克思齊輩狼狽西奔元聲援已絶今乘勢直搗元都可不戰有也帝曰善達復進曰元都克而其主北走將窮追之乎帝曰元運衰矣行自澌滅不煩窮兵出塞之後固守封疆防其侵軼可也達頓首受命遂與副將軍會師河陰遣裨將分道徇河北地連下衛輝彰德廣平師次臨清使傅友德開陸道通步騎顧時浚河通舟師遂引而北遇春已克德州合兵取長蘆扼直沽作浮橋以濟師水陸並進大敗元軍於河西務進克通州順帝帥后妃太子北去踰日達陳兵齊化門填濠登城監國淮王帖木兒不花左丞相慶童平章迭兒必失朴賽因不花右丞張康伯御史中丞滿川等不降斬之其餘不戮一人封府庫籍圖書寶物令指揮張勝以兵千人守宮殿門使宦者護視諸宮人妃主禁士卒毋所侵暴吏民安居巿不易肆捷聞詔以元都為北平府置六衛留孫興祖等守之而命達與遇春進取山西遇春先下保定中山真定馮勝湯和下懷慶度太行取澤潞達以大軍繼之時擴廓帖木兒方引兵出雁門將由居庸以攻北平達聞之與諸將謀曰擴廓遠出太原必虛北平有孫都督在足以禦之今乘敵不備直搗太原使進不得戰退無所守所謂批亢搗虛者也彼若西還自救此成擒耳諸將皆曰善乃引兵趨太原擴廓至保安果還救達選精兵夜襲其營擴廓以十八騎遁去盡降其衆遂克太原乘勢收大同分兵徇未下州縣山西悉平二年引兵西渡河至鹿臺張思道遁遂克奉元時遇春下鳳翔李思齊走臨洮達會諸將議所向皆曰張思道之才不如李思齊而慶陽易於臨洮請先慶陽達曰不然慶陽城險而兵精猝未易拔也臨洮北界河湟西控羌戎得之其人足備戰鬬物産足佐軍儲蹙以大兵思齊不走則束手縛矣臨洮既克於旁郡何有遂渡隴克秦州下伏羌寧遠入鞏昌遣右副將軍馮勝逼臨洮思齊果不戰降分兵克蘭州襲走豫王盡收其部落輜重還出蕭關下平涼思道走寧夏為擴廓所執其弟良臣以慶陽降達遣薛顯受之良臣復叛夜出兵襲傷顯達督軍圍之擴廓遣將來援逆擊敗去遂拔慶陽良臣父子投於井引出斬之盡定陝西地詔達班師賜白金文綺甚厚將論功大封會擴廓攻蘭州殺指揮使副將軍遇春已卒三年春帝復以達為大將軍平章李文忠為副將軍分道出兵達自潼關出西道搗定西取擴廓文忠自居庸出東道絶大漠追元嗣主達至定西擴廓退屯沈兒峪進軍薄之隔溝而壘日數交擴廓遣精兵從間道劫東南壘左丞胡德濟倉卒失措軍驚擾達帥兵擊却之德濟大海子也達以其功臣子械送之京師而斬其下指揮等數人以徇明日整兵奪溝殊死戰大破擴廓兵擒郯王文濟王及國公平章以下文武僚屬千八百六十餘人將士八萬四千五百餘人馬駝雜畜以巨萬計擴廓僅挾妻子數人奔和林德濟至京帝釋之而以書諭達將軍效衛青不斬蘇建耳獨不見穰苴之待莊賈乎將軍誅之則已今下廷議吾且念其信州諸暨功不忍加誅繼自今將軍毋事姑息達既破擴廓即帥師自徽州南一百八渡至略陽克沔州入連雲棧攻興元取之而副將軍文忠亦克應昌獲元嫡孫妃主將相先後露布聞詔振旅還京師帝迎勞於龍江乃下詔大封功臣授達開國輔運推誠宣力武臣特進光祿大夫左柱國太傅中書右丞相參軍國事改封魏國公歲祿五千石豫世券明年帥盛熙等赴北平練軍馬修城池徙山後軍民實諸衛府置二百五十四屯墾田一千三百餘頃其冬召還五年復大發兵征擴廓達以征虜大將軍出中道左副將軍李文忠出東道征西將軍馮勝出西道各將五萬騎出塞達遣都督藍玉擊敗擴廓於土剌河擴廓與賀宗哲合兵力拒達戰不利死者數萬人帝以達功大弗問也時文忠軍亦不利引還獨勝至西涼獲全勝坐匿駝馬賞不行事具文忠勝傳明年達復帥諸將行邊破敵於答剌海還軍北平留三年而歸十四年復帥湯和等討乃兒不花已復還鎮每歲春出冬暮召還以為常還輒上將印賜休沐宴見歡飲有布衣兄弟稱而達愈恭慎帝嘗從容言徐兄功大未有寧居可賜以舊邸舊邸者太祖為吳王時所居也達固辭一日帝與達之邸強飲之醉而蒙之被舁臥正寢達醒驚趨下階俯伏呼死罪帝覘之大悅乃命有司即舊邸前治甲第表其坊曰大功胡惟庸為丞相欲結好於達達薄其人不答則賂達閽者福壽使圖達福壽發之達亦不問惟時時為帝言惟庸不任相後果敗帝益重達十七年太陰犯上將帝心惡之達在北平病背疽稍愈帝遣達長子輝祖齎敕往勞尋召還明年二月病篤遂卒年五十四帝為輟朝臨喪悲慟不已追封中山王諡武寧贈三世皆王爵賜葬鍾山之陰御製神道碑文配享太廟肖像功臣廟位皆第一達言簡慮精在軍令出不二諸將奉持而帝前恭謹如不能言善拊循與下同甘苦士無不感恩效死以故所向克捷尤嚴戢部伍所平大都二省會三郡邑百數閭井宴然民不苦兵歸朝之日單車就舍延禮儒生談議終日雍雍如也帝嘗稱之曰受命而出成功而旋不矜不伐婦女無所愛財寶無所取中正無疵昭明乎日月大將軍一人而已子四輝祖添福膺緒增壽長女為文皇帝后次代王妃次安王妃輝祖初名允恭長八尺五寸有才氣以勳衛署左軍都督府事達薨嗣爵以避皇太孫諱賜今名數出練兵陝西北平山東河南元將阿魯帖木兒隸燕府有異志捕誅之還領中軍都督府建文初加太子太傅燕王子高煦輝祖甥也王將起兵高煦方留京師竊其善馬而逃輝祖大驚遣人追之不及乃以聞遂見親信久之命帥師援山東敗燕兵於齊眉山燕人大懼俄被詔還諸將勢孤遂相次敗績及燕兵渡江輝祖猶引兵力戰成祖入京師輝祖獨守父祠弗迎於是下吏命供罪狀惟書其父開國勳及券中免死語成祖大怒削爵幽之私第永樂五年卒萬曆中録建文忠臣廟祀南都以輝祖居首後追贈太師諡忠貞輝祖死踰月成祖詔羣臣輝祖與齊黃輩謀危社稷朕念中山王有大功曲赦之今輝祖死中山王不可無後遂命輝祖長子欽嗣九年欽與成國公勇定國公景昌永康侯忠等俱以縱恣為言官所劾帝宥勇等而令欽歸就學十九年來朝遽辭歸帝怒罷為民仁宗即位復故爵傳子顯宗承宗承宗天順初守備南京兼領中軍府公廉恤士有賢聲卒子俌嗣俌字公輔持重善容止南京守備體最隆懷柔伯施鑑以協同守備位俌上俌不平言於朝詔以爵為序著為令弘治十二年給事中胡易御史胡獻以災異陳言下獄俌上章救之正德中上書諫遊畋語切直嘗與無錫民爭田賄劉瑾為時所譏俌嗣五十二年而卒贈太傅諡莊靖孫鵬舉嗣嬖其妾冒封夫人欲立其子為嫡坐奪祿傳子邦瑞孫維志曾孫弘基自承宗至弘基六世皆守備南京領軍府事弘基纍加太傅卒諡莊武子文爵嗣明亡爵除增壽以父任仕至左都督建文帝疑燕王反嘗以問增壽增壽頓首曰燕王先帝同氣富貴已極何故反及燕師起數以京師虛實輸於燕帝覺之未及問比燕兵渡江帝召增壽詰之不對手劍斬之殿廡下王入撫尸哭即位追封武陽侯諡忠愍尋進封定國公祿二千五百石以其子景昌嗣驕縱數被劾成祖輒宥之成祖崩景昌坐居喪不出宿奪冠服歲祿已而復之三傳至玄孫光祚纍典軍府加太師嗣四十五年卒諡榮僖傳子至孫文璧萬曆中領後軍府以小心謹畏見親於帝數代郊天加太師纍上書請建儲罷礦稅釋逮繫嗣三十五年卒諡康惠再傳至曾孫允禎崇禎末為流賊所殺洪武諸功臣惟達子孫有二公分居兩京魏國之後多賢而纍朝恩數定國常倍之嘉靖中詔裁恩澤世封有言定國功弗稱者竟弗奪也添福早卒膺緒授尚寶司卿纍遷中軍都督僉事奉朝請世襲指揮使常遇春字伯仁懷遠人貌奇偉勇力絶人猿臂善射初從劉聚為盜察聚終無成歸太祖於和陽未至困臥田間夢神人被甲擁盾呼曰起起主君來驚寤而太祖適至即迎拜時至正十五年四月也無何自請為前鋒太祖曰汝特饑來就食耳吾安得汝留也遇春固請太祖曰俟渡江事我未晚也及兵薄牛渚磯元兵陳磯上舟距岸且三丈餘莫能登遇春飛舸至太祖麾之前遇春應聲奮戈直前敵接其戈乘勢躍而上大呼跳蕩元軍披靡諸將乘之遂拔采石進取太平授總管府先鋒進總管都督時將士妻子輜重皆在和州元中丞蠻子海牙復以舟師襲據采石道中梗太祖自將攻之遣遇春多張疑兵分敵勢戰既合遇春操輕舸衝海牙舟為二左右縱擊大敗之盡得其舟江路復通尋命守溧陽從攻集慶功最從元帥徐達取鎮江進取常州吳兵圍達於牛塘遇春往援破解之擒其將進統軍大元帥克常州遷中翼大元帥從達攻寧國中流矢裹創鬬克之別取馬駝沙以舟師攻池州下之進行省都督馬步水軍大元帥從取婺州轉同僉樞密院事守婺移兵圍衢州以奇兵突入南門甕城毀其戰具急攻之遂下得甲士萬人進僉樞密院事攻杭州失利召還應天從達拔趙普勝之水寨從守池州大破漢兵於九華山下語具達傳友諒薄龍灣遇春以五翼軍設伏大破之遂復太平功最太祖追友諒於江州命遇春留守用法嚴軍民肅然無敢犯進行省參知政事從取安慶漢軍出江游徼遇春擊之皆反走乘勝取江州還守龍灣援長興俘殺吳兵五千餘人其將李伯升解圍遁命甓安慶城先是太祖所任將帥最著者平章邵榮右丞徐達與遇春為三而榮尤宿將善戰至是驕蹇有異志與參政趙繼祖謀伏兵為變事覺太祖欲宥榮死遇春直前曰人臣以反名尚何可宥臣義不與共生太祖乃飲榮酒流涕而戮之以是益愛重遇春池州帥羅友賢據神山寨通張士誠遇春破斬之從援安豐比至呂珍已陷其城殺劉福通聞大軍至盛兵拒守太祖左右軍皆敗遇春橫擊其陳三戰三破之俘獲士馬無算遂從達圍廬州城將下陳友諒圍洪都召還會師伐漢遇於彭蠡之康郎山漢軍舟大乘上流鋒鋭甚遇春偕諸將大戰呼聲動天地無不一當百友諒驍將張定邊直犯太祖舟舟膠於淺幾殆遇春射中定邊太祖舟得脫而遇春舟復膠於淺有敗舟順流下觸遇春舟乃脫轉戰三日縱火焚漢舟湖水皆赤友諒不敢復戰諸將以漢軍尚強欲縱之去遇春獨無言比出湖口諸將欲放舟東下太祖命扼上流遇春乃溯江而上諸將從之友諒窮蹙以百艘突圍諸將邀擊之漢軍遂大潰友諒死師還第功最賚金帛土田甚厚從圍武昌太祖還應天留遇春督軍困之明年太祖即吳王位進遇春平章政事太祖復視師武昌漢丞相張必先自嶽來援遇春乘其未集急擊擒之城中由是氣奪陳理遂降盡取荊湖地從左相國達取廬州別將兵略定臨江之沙坑麻嶺牛陂諸寨擒僞知州鄧克明遂下吉安圍贛州熊天瑞固守不下太祖使使諭遇春克城無多殺苟得地無民何益於是遇春浚壕立柵以困之頓兵六月天瑞力盡乃降遇春果不殺太祖大喜賜書褒勉遇春遂因兵威諭降南雄韶州還定安陸襄陽復從徐達克泰州敗士誠援兵督水軍壁海安壩以遏之其秋拜副將軍伐吳敗吳軍於太湖於毗山於三里橋遂薄湖州士誠遣兵來援屯於舊館出大軍後遇春將奇兵由大全港營東阡更出其後敵出精卒搏戰奮擊破之襲其右丞徐義於平望盡燔其赤龍船復敗之於烏鎮逐北至升山破其水陸寨悉俘舊館兵湖州遂下進圍平江軍虎丘士誠潛師趨遇春遇春與戰北濠破之幾獲士誠久之諸將破葑門遇春亦破閶門以入吳平進中書平章軍國重事封鄂國公復拜副將軍與大將軍達帥兵北征帝親諭曰當百萬衆摧鋒陷堅莫如副將軍不慮不能戰慮輕戰耳身為大將顧好與小校角甚非所望也遇春拜謝既行以遇春兼太子少保從下山東諸郡取汴梁進攻河南元兵五萬陳洛水北遇春單騎突其陳敵二十餘騎攢刺之遇春一矢殪其前鋒大呼馳入麾下壯士從之敵大潰追奔五十餘里降梁王阿魯溫河南郡邑以次下謁帝於汴梁遂與大將軍下河北諸郡先驅取德州將舟師並河而進破元兵於河西務克通州遂入元都別下保定河間真定與大將軍攻太原擴廓帖木兒來援遇春言於達曰我騎兵雖集步卒未至驟與戰必多殺傷夜劫之可得志達曰善會擴廓部將豁鼻馬來約降且請為內應乃選精騎夜銜枚往襲擴廓方燃燭治軍書倉卒不知所出跣一足乘孱馬以十八騎走大同豁鼻馬降得甲士四萬遂克太原遇春追擴廓至欣州而還詔改遇春左副將軍居右副將軍馮勝上北取大同轉徇河東下奉元路與勝軍合西拔鳳翔會元將也速攻通州詔遇春還備以平章李文忠副之帥步騎九萬發北平徑會州敗敵將江文清於錦州敗也速於全寧進攻大興州分千騎為八伏守將夜遁盡擒之遂拔開平元帝北走追奔數百里獲其宗王慶生及平章鼎住等將士萬人車萬輛馬三千匹牛五萬頭子女寶貨稱是師還次柳河川暴疾卒年僅四十太祖聞之大震悼喪至龍江親出奠命禮官議天子為大臣發哀禮議上用宋太宗喪韓王趙普故事制曰可賜葬鍾山原給明器九十事納墓中贈翊運推誠宣德靖遠功臣開府儀同三司上柱國太保中書右丞相追封開平王諡忠武配享太廟肖像功臣廟位皆第二遇春沉鷙果敢善撫士卒摧鋒陷陳未嘗敗北雖不習書史用兵輒與古合長於大將軍達二歲數從征伐聽約束惟謹一時名將稱徐常遇春嘗自言能將十萬衆橫行天下軍中又稱常十萬云遇春從弟榮積功為指揮同知從李文忠出塞戰死臚朐河遇春二子茂升茂以遇春功封鄭國公食祿二千石豫世券驕稚不習事洪武二十年命從大將軍馮勝征納哈出於金山勝茂婦翁也茂多不奉勝約束勝數誚責之茂應之慢勝益怒未有以發也會納哈出請降詣右副將軍藍玉營酒次與玉相失納哈出取酒澆地顧其下咄咄語茂方在坐麾下趙指揮者解蒙古語密告茂納哈出將遁矣茂因出不意直前搏之納哈出大驚起欲就馬茂拔刀砍其臂傷納哈出所部聞之有驚潰者勝故怒茂增飾其狀奏茂激變遂械繫至京茂亦言勝諸不法事帝收勝總兵印而安置茂於龍州二十四年卒初龍州土官趙貼堅死從子宗壽當襲貼堅妻黃以愛女豫茂為小妻擅州事茂既死黃與宗壽爭州印相告訐或搆蜚語謂茂實不死宗壽知狀帝怒責令獻茂自贖命楊文韓觀出師討龍州已而知茂果死宗壽亦輸乃罷兵茂無子弟升改封開國公數出練軍加太子太保升之沒實録不載其他書紀傳謂建文末升及魏國公輝祖力戰浦子口死於永樂初或謂升洪武中坐藍玉黨有告其聚兵三山者誅死常氏為興宗外戚建文時恩禮宜厚事遭革除無可考其死亦遂傳聞異詞升子繼祖永樂元年遷雲南之臨安衛時甫七歲繼祖子寧寧子復弘治五年詔曰太廟配享諸功臣其贈王者皆佐皇祖平定天下有大功而子孫或不沾寸祿淪於氓隸朕不忍所司可求其世嫡量授一官奉先祀乃自雲南召復授南京錦衣衛世指揮使嘉靖十一年紹封四王後封復孫玄振為懷遠侯傳至曾孫延齡有賢行崇禎十六年全楚淪陷延齡請統京兵赴九江協守又言江都有地名常家沙族丁數千皆其始祖遠裔請鼓以忠義練為親兵帝嘉之不果行南都諸勳戚多恣睢自肆獨延齡以守職稱國亡身自灌園蕭然布衣終老贊曰明太祖奮自滁陽戡定四方雖曰天授蓋二王之力多焉中山持重有謀功高不伐自古名世之佐無以過之開平摧鋒陷陳所向必克智勇不在中山下而公忠謙遜善持其功名允為元勳之冠身依日月剖符錫土若二王者可謂極盛矣顧中山賞延後裔世叨榮寵而開平天不假年子孫亦復衰替貴匹勳齊而食報或爽其故何也太祖嘗語諸將曰為將不妄殺人豈惟國家之利爾子孫實受其福信哉可為為將帥者鑑矣
