body:
  text: 明史卷一百七十三列傳第六十一楊洪子俊從子能信石亨從子彪從孫後郭登朱謙子永孫暉等孫鏜趙勝范廣楊洪字宗道六合人祖政明初以功為漢中百戶父璟戰死靈璧洪嗣職調開平善騎射遇敵輒身先突陳初從成祖北征至斡難河獲人馬而還帝曰將才也令識其名進千戶宣德四年命以精騎二百專巡徼塞上繼命城西猫兒峪留兵戍之敗寇於紅山英宗立尚書王驥言邊軍怯弱由訓練無人因言洪能詔加洪遊擊將軍洪所部才五百詔選開平獨石騎兵益之再進都指揮僉事時先朝宿將已盡洪後起以敢戰著名為人機變敏捷善出奇搗虛未嘗小挫雖為偏校中朝大臣皆知其能有毀之者輒為曲護洪以是得展其才尚書魏源督邊事指揮杜衡部卒李全皆訐奏洪罪帝從源言謫衡廣西執全付洪自治尋命洪副都督僉事李謙守赤城獨石謙老而怯故與洪左洪每調軍謙輒陰沮之洪嘗勵將士殺敵謙笑曰敵可盡乎徒殺吾人耳御史張鵬劾罷謙因命洪代洪益自奮朝廷亦厚待之每奏捷功雖微必洪初敗兀良哈兵執其部長朵欒帖木兒既代謙任復敗其兵於西涼亭帝賜敕嘉奬又敕宣大總兵官談廣等曰此即前寇延綏為指揮王禎所敗者去若軍甚邇顧不能撲滅若視洪等愧不三年春擊寇於伯顏山洪馬蹶傷足戰益力擒其部長也陵台等四人追至寶昌州又擒阿台答剌花等五人寇大敗遁去璽書慰勞遣醫視進都指揮同知賜銀幣尋以談廣老命充右參將佐之洪建議加築開平城拓龍門所自獨石至潮河川增置堠臺六十尋進都指揮使與兀良哈兵戰三岔口又嘗追寇至亦把禿河再遷都督同知九年兀良哈寇延綏洪與內臣韓政等出大同至黑山迤北邀破之克列蘇進左都督軍士蒙賞者九千九百餘人洪嘗請給旗牌不許乃自製小羽箭木牌令軍中有司論其專擅帝不問十二年充總兵官代郭玹鎮宣府自宣德以來迤北未嘗大舉入寇惟朵顏三衛衆乘間擾邊多不過百騎或數十騎他將率巽磱洪獨以敢戰至大將諸部亦憚之稱為楊王瓦剌可汗脫脫不花太師也先皆嘗致書於洪並遺之馬洪聞於朝敕令受之而報以禮嗣後數有贈遺帝方倚任洪不責也帝既北狩道宣府也先傳帝命趣開門城上人對曰所守者主上城池天已暮門不敢開且洪已他往也先乃擁帝去景帝監國論前後功封昌平伯也先復令帝為書遺洪洪封上之時景帝已即位馳使報洪上皇書僞也自今雖真書毋受於是洪一意堅守也先逼京師急詔洪將兵二萬入衛比至寇已退敕洪與孫鏜范廣等追擊餘寇至霸州破之獲阿歸等四十八人還所掠人畜萬計及關寇返鬬殺官軍數百人洪子俊幾為所及寇去以功進侯命率所部留京師督京營訓練兼掌左府事朝廷以洪宿將所言多采納嘗陳禦寇三策又奏請簡汰三千諸營將校不得以貧弱充伍皆從之景泰元年于謙以邊警未息宜令洪等條上方略洪言四事命兵部議行都督宮聚王喜張斌先坐罪繫獄洪與石亨薦三人習戰請釋令立功詔已許而言官劾其黨邪撓政帝以國家多事務得人置不問上皇還洪與石亨俱授奉天翊衛宣力武臣豫世券明年夏佩鎮朔大將軍印還鎮宣府從子能信充左右參將其子俊為右都督管三千營洪自以一門父子官極品手握重兵盛滿難居乞休致請調俊等他鎮帝不許八月以疾召還京踰月卒贈潁國公諡武襄妾葛氏自經以殉詔贈淑人洪久居宣府御兵嚴肅士馬精強為一時邊將冠然未嘗專殺又頗好文學嘗請建學宣府教諸將子弟子傑嗣上言臣家一侯三都督蒼頭得官者十六人大懼不足報稱乞停蒼頭楊釗等職詔許之仍令給俸傑卒無子庶兄俊嗣俊初以舍人從軍正統中纍官署都指揮僉事總督獨石永寧諸處邊務景帝即位給事中金達奉使獨石劾俊貪侈乃召還也先犯京師俊敗其別部於居庸進都督僉事尋充右參將佐朱謙鎮宣府太監喜寧數誘敵入寇中朝患之購擒斬寧者賞黃金千兩白金二萬兩爵封侯寧為都指揮江福所獲而俊冒其功廷臣請如詔帝以俊邊將職所當為不允加右都督賜金幣俊恃父勢橫恣嘗以私憾杖都指揮陶忠至死洪懼奏俊輕躁恐誤邊事乞令來京隨臣操練許之既至言官交劾下獄論斬詔令隨洪立功未幾冒擒喜寧功事覺詔追奪冒升官軍別賞福等而降俊官令剿賊自效俄充遊擊將軍巡徼真保涿易諸城還督三千營訓練景泰三年俊上疏曰也先既弒其主併其衆包藏禍心窺伺邊境直須時動耳聞其妻孥輜重去宣府才數百里我緣邊宿兵不下數十萬宜分為奇正以待誘使來攻正兵列營大同宣府堅壁觀變而出奇兵倍道搗其巢彼必還自救我軍夾攻可以得志疏下廷議于謙等以計非萬全遂寢團營初設命俊分督四營明年復充遊擊將軍送瓦剌使歸至永寧被酒杖都指揮姚貴八十且欲斬之諸將力解而止貴訴於朝宣府參政葉盛亦論俊罪以俊嘗潰於獨石斥為敗軍之將俊上疏自理封還所賜敕書以明己功言官劾其跋扈論斬錮之獄會傑卒傑母魏氏請暫釋俊營傑葬事乃宥死降都督僉事旋襲洪職家人告俊盜軍儲再論死輸贖還爵久之又以陰事告俊免死奪爵命其子珍襲俊初守永寧懷來聞也先欲奉上皇還密戒將士毋輕納既還又言是將為禍本及上皇復位張軏與俊不協言於朝遂徵下詔獄坐誅奪珍爵戍廣西憲宗立授龍虎衛指揮使能字文敬沈毅善騎射從洪屢立功為開平衛指揮使進都指揮僉事景泰元年進同知充遊擊將軍沿邊巡徼寇犯蔚州畏不進復與紀廣禦寇野狐嶺敗傷右膝為御史張昊所劾宥之尋命與石彪各統精兵三千訓練備調遣再加都督僉事纍進左副總兵協守宣府巡撫李秉劾其貪惰弗問五年召還總神機營天順初以左都督為宣府總兵官與石彪破寇磨兒山封武強伯也先已死孛來繼興能欲約兀良哈共襲劫之與以信炮兵部劾其非計帝以能志在滅賊置不罪寇犯宣府能失利復為兵部所劾帝亦宥之是年卒無子弟倫襲羽林指揮使信字文實幼從洪擊敵興州賊將方躍馬出陳前信直前擒之以是知名纍功至指揮僉事正統末進都指揮僉事守柴溝堡也先犯京師入衛進都指揮同知景泰改元守懷來寇入不能禦護餉永寧聞炮聲奔還皆被劾朝議以方用兵不問纍進都督僉事代能為左副總兵協鎮宣府上言鹿角之制臨陳可捍敵馬結營可衛士卒每隊宜置十具遇敵團牌拒前鹿角列後神銃弓矢相繼迭發則守無不固戰無不克從之天順初移鎮延綏進都督同知明年破寇青陽溝大獲封彰武伯佩副將軍印充總兵官鎮守如故延綏設總兵官佩印自信始也頃之破寇高家堡三年與石彪大破寇於野馬澗明年寇二萬騎入榆林信擊却之追奔至金雞峪斬平章阿孫帖木兒還所掠人畜萬計其冬代李文鎮大同憲宗即位信自陳前後戰功豫世券成化元年冬禦寇延綏無功召還督三千營毛里孩據河套命佩將軍印總諸鎮兵往禦寇既渡河北去已復還據套分掠水泉營及朔州信等屢却之寇遂東入大同因詔信還鎮大同六年信與副將徐恕參將張瑛分道出塞敗寇於胡柴溝獲馬五百餘匹璽書奬勵信在邊三十年鎮以安靜人樂為用然性好營利代王嘗奏其違法事詔停一歲祿十三年冬卒於鎮贈侯諡武毅洪父子兄弟皆佩將印一門三侯伯其時稱名將者推楊氏昌平侯既廢能以流爵弗世而信獨傳其子瑾弘治初領將軍宿衛三傳至曾孫炳隆慶時協守南京召掌京營戎政屢加少師卒諡恭襄傳子至孫崇猷李自成陷京師被殺石亨渭南人生有異狀方面偉軀美髯及膝其從子彪魁梧似之鬚亦過腹就飲酒肆相者曰今平世二人何乃有封侯相亨嗣世父職為寬河衛指揮僉事善騎射能用大刀每戰輒摧破正統初以獲首功纍遷都指揮僉事敗敵黃牛坡獲馬甚衆三年正月敵三百餘騎飲馬黃河亨追擊至官山下多所斬獲進都指揮同知尋充左參將佐武進伯朱冕守大同六年上言邊餉難繼請分大同左右玉林雲川四衛軍墾淨水坪迤西曠土官給牛種可歲增糧萬八千石明年又言大同西路屯堡皆臨極邊玉林故城去右衛五十里與東勝單于城接水草便利請分軍築壘防護屯種詔皆允行尋以敗敵紅城功進都指揮使敵犯延安追至金山敗之再遷都督僉事亨以國制搜將才未廣請倣漢唐制設軍謀宏遠智識絶倫等科令人得自陳試驗擢用不專保舉報可十四年與都督僉事馬麟巡徼塞外至箭豁山敗兀良哈衆進都督同知是時邊將智勇者推楊洪其次則亨亨雖偏將中朝倚之如大帥故亨亦盡力其秋也先大舉寇大同亨及西寧侯宋瑛武進伯朱冕等戰陽和口瑛冕戰沒亨單騎奔還降官募兵自效郕王監國尚書于謙薦之召掌五軍大營進右都督無何封武清伯也先逼京師命偕都督陶瑾等九將分兵營九門外德勝門當敵衝特以命亨于謙以尚書督軍寇薄彰義門都督高禮等却之轉至德勝門外亨用謙令伏兵誘擊死者甚衆既而圍孫鏜西直門外以亨救引卻相持五日寇斂衆遁論功亨為多進侯景泰元年二月命佩鎮朔大將軍印帥京軍三萬人巡哨大同遇寇敗之其秋豫世襲誥券易儲加亨太子太師于謙立團營命亨提督充總兵官如故八年帝將郊宿齊宮疾作不能行禮召亨代亨受命榻前見帝病甚遂與張軏曹吉祥等謀迎立上皇上皇既復辟以亨首功進爵忠國公眷顧特異言無不從其弟姪家人冒功錦衣者五十餘人部曲親故竄名奪門籍得官者四千餘人兩京大臣斥逐殆盡納私人重賄引用太僕丞孫弘郎中陳汝言蕭璁張用瀚郝璜龍文朱銓員外郎劉本道為侍郎時有語曰朱三千龍八百勢焰熏灼嗜進者競走其門既以私憾殺于謙范廣等又以給事中成章御史甘澤等九人嘗攻其失貶黜之數興大獄搆陷耿九疇嶽正而戍楊瑄張鵬謫周斌盛顒等又惡文臣為巡撫抑武臣不得肆盡撤還由是大權悉歸亨亨無日不進見數預政事所請或不從艴然見於辭色即不召必假事以入出則張大其勢巿權利久之帝不能堪嘗以語閣臣李賢賢曰惟獨斷乃可帝然之一日語賢曰閣臣有事須燕見彼武臣何故頻見遂敕左順門非宣召毋得納總兵官亨自此稀燕見亨嘗白帝立碑於其祖墓工部希亨指請敕有司建立翰林院撰文帝以永樂以來無為功臣祖宗立碑故事責部臣而令亨自立初帝命所司為亨營第既成壯麗踰制帝登翔鳳樓見之問誰所居恭順侯吳瑾謬對曰此必王府帝曰非也瑾曰非王府誰敢僭踰若此帝頷之亨既權侔人主而從子彪亦封定遠侯驕橫如亨兩家蓄材官猛士數萬中外將帥半出其門都人側目三年秋彪謀鎮大同令千戶楊斌等奏保帝覺其詐收斌等拷問得實震怒下彪詔獄亨懼請罪帝慰諭之亨請盡削弟姪官放歸田里帝亦不許及鞫彪得繡蟒龍衣及違式寢牀諸不法事罪當死遂籍彪家命亨養病亨嘗遣京衛指揮裴瑄出關巿木遣大同指揮盧昭追捕亡者至是事覺法司請罪亨帝猶置不問法司再鞫彪言彪初為大同遊擊以代王增祿為己功王至跪謝自是數款彪出歌妓行酒彪凌侮親王罪亦當死因劾亨招權納賕肆行無忌與術士鄒叔彝等私講天文妄談休咎宜置重典帝命錮彪於獄亨閒住罷朝參時方議革奪門功窮治亨黨由亨得官者悉黜朝署一清明年正月錦衣指揮逯杲奏亨怨望與其從孫後等造妖言蓄養無賴專伺朝廷動靜不軌迹已著廷臣皆言不可輕宥乃下亨詔獄坐謀叛律斬沒其家資踰月亨瘐死彪後並伏誅彪驍勇敢戰善用斧初以舍人從軍正統末積功至指揮同知也先逼京師既退追襲餘寇頗有斬獲進署都指揮僉事景泰改元詔豫實授充遊擊將軍守備威遠衛敵圍土城彪用炮擊死百餘人遁去塞上日用兵彪勇冠流輩每戰必捷以故一歲中數遷至都督僉事恃亨勢多縱家人占民産又招納流亡五十餘戶擅越關置莊墾田為給事中李侃御史張奎所劾請並罪亨景帝皆宥不問但令給還民産遣流亡戶復業而已三年冬充右參將協守大同嘗憾巡撫年富抑己不得逞及英宗復辟召彪還亨方得志彪遂誣奏富罪致之獄未幾進都督同知再以遊擊將軍赴大同備敵與參將張鵬等哨磨兒山寇千餘騎來襲彪率壯士衝撀斬把禿王搴其旗俘斬百二十人追至三山墩又斬七十二人以是封定遠伯遊擊如故天順二年命偕高陽伯李文赴延綏禦寇以疾召還尋充總兵官明年寇二萬騎入掠安邊營彪與彰武伯楊信等禦之連戰皆捷斬鬼力赤追出塞轉戰六十餘里生擒四十餘人斬首五百餘級獲馬駝牛羊二萬餘為西北戰功第一捷聞進侯彪本以戰功起家不藉父兄廕然一門二公侯勢盛而驕多行不義謀鎮大同與亨表𩹉握兵柄為帝所疑遂及於禍後天順元年進士助亨籌畫都督杜清出亨門下後造妖言有土木掌兵權語蓋言杜也事覺後伏誅清亦流金齒郭登字元登武定侯英孫也幼英敏及長博聞強記善議論好談兵洪熙時授勳衛正統中從王驥征麓川有功擢錦衣衛指揮僉事又從沐斌征騰衝遷署都指揮僉事十四年車駕北征扈從至大同超拜都督僉事充參將佐總兵官廣寧伯劉安鎮守朱勇等軍覆倉猝議旋師登告學士曹鼐張益曰車駕宜入紫荊關王振不從遂及於敗當是時大同軍士多戰死城門晝閉人心洶洶登慷慨奮勵修城堞繕兵械拊循士卒弔死問傷親為裹創傅藥曰吾誓與此城共存亡不令諸君獨死也八月也先擁帝北去經大同使袁彬入城索金幣登閉城門以飛橋取彬入登與安及侍郎沈固給事中孫祥知府霍瑄等出謁伏地慟哭以金二萬餘及宋瑛朱冕內臣郭敬家資進帝以賜也先等是夕敵營城西登謀遣壯士劫營迎駕不果明日也先擁帝去景帝監國進都督同知充副總兵尋令代安為總兵官十月也先犯京師登將率所部入援先馳蠟書奏奏至敵已退景帝優詔褒答進右都督登計京兵新集不可輕用上用兵方略十餘事景泰元年春偵知寇騎數千自順聖川入營沙窩登率兵躡之大破其衆追至栲栳山斬二百餘級得所掠人畜八百有奇邊將自土木敗後畏縮無敢與寇戰登以八百人破敵數千騎軍氣為之一振捷聞封定襄伯豫世券四月寇騎數千奄至登出東門戰佯北誘之入土城伏起敵敗走登度敵且復至令軍士齎毒酒羊豕楮錢僞為祭冢者見寇即棄走寇至爭飲食之死者甚衆六月也先復以二千騎入寇登再擊却之越數日奉上皇至城外聲言送駕還登與同守者設計具朝服候駕月城內伏兵城上俟上皇入即下月城閘也先及門而覺遂擁上皇去時鎮守中官陳公忌登會有發公奸贓者公疑登使之遂與登搆帝謂于謙曰大同吾藩籬也公與登如是其何以守遣右監丞馬慶代公還登愈感奮初也先欲取大同為巢穴故數來攻及每至輒敗有一營數十人不還者敵氣懾始有還上皇意上皇既還代王仕頌登功乞降敕奬勞兵部言登已封伯乃止二年登以老疾乞休舉石彪自代且請令其子嵩宿衛帝以嵩為散騎舍人不聽登辭是時邊患甫息登悉心措置思得公廉有為者與俱遂劾奏沈固廢事而薦尚書楊寧布政使年富又言大同既有御史又有巡按御史僉都御史任寧宜止巡撫宣府帝悉從之以年富代固而徵還固及寧其秋以疾召還登初至大同士卒可戰者才數百馬百餘匹及是馬至萬五千精卒數萬屹然成巨鎮登去大同人思之初英宗過大同遣人謂登曰朕與登有姻何拒朕若是登奏曰臣奉命守城不知其他英宗銜之及復辟登懼不免首陳八事多迎合尋命掌南京中府事明年召還言官劾登結陳汝言獲召鞫實論斬宥死降都督僉事立功甘肅憲宗即位詔復伯爵充甘肅總兵官奏邊軍償馬艱甚至鬻妻子乞借楚慶肅三王府馬各千匹官酬其直從之用朱永等薦召掌中府事總神機營兵成化四年復設十二團營命登偕朱永提督八年卒贈侯諡忠武登儀觀甚偉髯垂過腹為將兼智勇紀律嚴明料敵制勝動合機宜嘗以意造攪地龍飛天網鑿深塹覆以土木如平地敵入圍中發其機自相撞擊頃刻皆陷又倣古製造偏箱車四輪車中藏火器上建旗幟鉤環聯絡布列成陳戰守皆可用其軍以五人為伍教之盟於神祠一人有功五人同賞罰亦如之十伍為隊隊以能挽六十斤弓者為先鋒十隊領以一都指揮令功無相撓罪有專責一時稱善登事母孝居喪秉禮能詩明世武臣無及者無子以兄子嵩為子登謫甘肅留家京師嵩窘其衣食登妾縫紉自給幾殆弗顧登還欲黜之以其壻於會昌侯侯嘗活己隱忍不發及卒嵩遂襲爵後以非登嫡嗣止嵩身子參降錦衣衛指揮使朱謙夏邑人永樂初襲父職為中都留守左衛指揮僉事洪熙時隸陽武侯薛祿征北有功進指揮使宣德元年進萬全都指揮僉事正統六年與參將王真巡哨至伯顏山遇寇擊走之次閔安山遇兀良哈三百騎又敗之追至莽來泉寇越山澗遁去乃還時謙已遷都指揮同知乃以為都指揮使八年充右參將守備萬全左衛明年與楊洪破兀良哈兵於克列蘇進都督僉事所部發其不法事帝以方防秋宥之復以北征功進都督同知帝北狩也先擁至宣府城下令開門謙與參將紀廣都御史羅亨信不應遂去進右都督與楊洪入衛會寇已退追襲之近畿戰失利洪劾之兵部並劾洪不救景帝俱弗問洪入總京營廷議欲得如洪者代之咸舉謙乃進左都督充總兵官鎮守宣府景泰元年四月寇三百騎入石烽口復由故道去降敕切責踰月復入犯謙率兵禦之次關子口寇數千騎突至謙拒以鹿角發火器擊之寇少却如是數四謙軍且退寇復來追都督江福援之亦失利謙卒力戰寇不得入六月復有二千騎南侵謙遣都指揮牛璽等往禦戰南坡謙見塵起率參將紀廣等馳援自巳至午寇敗遁論功封撫寧伯是時寇氣甚驕屢擾宣府大同意二城且旦夕下而謙守宣府郭登守大同數挫其衆也先知二人難犯始一意歸上皇八月上皇還道宣府謙率子永出見厚犒其使者既而謙謬報寇五千騎毀牆入察之則也先貢使也詔切責之謙惶恐謝明年二月卒於鎮贈侯子永襲謙在邊久善戰然勇而寡謀故其名不若楊洪石亨郭登之著成化中諡武襄永字景昌偉軀貌顧盼有威初見上皇於宣府數目屬焉景泰中嗣爵奉朝請英宗復辟睹永識之曰是見朕宣府者耶永頓首謝即日召侍左右分領宣威營禁軍天順四年宣大告警命帥京軍巡邊七年統三千營尋兼神機營憲宗立改督團營領三千營如故成化元年荊襄盜劉通作亂命永與尚書白圭往討進師南漳擊斬九百有奇會疾留南漳而圭率大軍破賊永往會道遇餘賊俘斬數百人其秋復進討石龍馮喜皆捷論功進侯毛里孩犯邊命佩將軍印會彰武伯楊信禦之會遣使朝貢乃班師六年阿羅出寇延綏復拜將軍偕都御史王越都督劉玉劉聚往討擊敗之蘇家寨寇萬騎自雙山堡分五道至戰於開荒川寇少却乘勢馳之皆棄輜重走至牛家寨遇都指揮吳瓚兵少寇圍之指揮李鎬滕忠至復力戰聚及都指揮范瑾神英分據南山夾擊寇乃大敗斬首一百有六獲馬牛數千阿羅出中流矢遁時斬獲無多然諸將咸力戰追敵邊人以為數十年所未有論功豫世侯阿羅出雖少挫猶據河套明年正月寇屢入永所部屢有斬獲三月復以萬餘騎分掠懷遠諸堡永與越等分兵為五設伏敗之追至山口及滉忽都河寇敗走而遊擊孫鉞蔡瑄別破他部於鹿窖山捷聞璽書奬勞永等再請班師皆不許寇復以二萬餘騎入掠擊退之歲將盡乃召永還留越總制三邊十四年加永太子太保明年冬拜靖虜將軍東伐以中官汪直監督軍務還進爵保國公又明年正月延綏告警命永為將軍越提督軍務直仍監督分道出塞越與直選輕騎出孤店關俘寇於威寧海子而永率大軍由南路出榆林不見寇道回遠費兵食巨萬馬死者五千餘匹於是越得封伯直廕錫踰等而永無功賞不行久之進太子太傅十七年二月復偕直越出師大同禦亦思馬獲首功百二十遂賜襲世公十九年秋小王子入邊宣大告急越與直已得罪以永為鎮朔大將軍中官蔡新監其軍督諸將周玉李璵等擊敗之還仍督團營或投匿名書言永圖不軌永乞解兵柄不許其冬手敕加太傅太子太師弘治四年監修太廟成進太師永治軍嚴肅所至多奏功前後八佩將軍印內總十二團營兼掌都督府列侯勛名無與比九年卒追封宣平王諡武毅子暉嗣給事中王廷言永功不當公朝議止豫襲一世後皆侯詔可暉字東陽長身美髯人稱其威重類父又屢從父塞下歷行陳時以為才弘治五年授勳衛年垂五十始嗣爵分典神機營十三年更置京營大師命暉督三千營兼領右府事火篩入大同平江伯陳鋭等不能禦命暉佩大將軍印代之比至寇已退乃還明年春火篩連小王子大入延綏寧夏右都御史史琳請濟師復命暉佩大將軍印統都督李俊李澄楊玉馬儀劉寧五將往而以中官苗逵監其軍至寧夏寇已飽掠去乃與琳逵率五路師搗其巢於河套寇已徙帳僅斬首三級獲馬駝牛羊千五百以歸未幾寇入固原轉掠平涼慶陽關中大震兩鎮將嬰城不敢戰而暉等畏怯不急赴比至斬首十二人還所掠生口四千遂以捷聞是役也大帥非制勝才師行紆回無紀律邊民死者遍野諸郡困轉輸餉軍費八十餘萬他徵發稱是先後僅獲首功十五級廷臣連章效三人罪帝不問已而上搗巢有功將士萬餘人尚書馬文升大學士劉健持之帝先入逵等言竟録二百十人署職一級餘皆被賚及班師帝猶遣中官齎羊酒迎勞言官極論暉罪終不聽以暉總督團營領三千營右府如故武宗即位寇大入宣府復命暉偕逵琳帥師往寇轉掠大同參將陳雄擊斬八十餘級還所掠人口二千七百有奇暉等奏捷列有功將士二萬餘人兵部侍郎閻仲宇大理丞鄧璋往勘所報多不實終以逵故衆咸給賜劉瑾用事暉等更奏録功太薄請依成化間白狐莊例兵部力爭不納竟從暉言得擢者千五百六十三人暉加太保正德六年卒子麒襲侯嘗充總兵官鎮兩廣與姚鏌平田州誅岑猛加太子太保嘉靖初召還久之守備南京卒子嶽嗣亦守備南京隆慶中卒四傳至孫國弼天啓中楊漣劾魏忠賢國弼亦乞速賜處分忠賢怒停其歲祿崇禎時總督京營溫體仁柄國國弼抗疏劾之詔捕其門客及繕疏者下獄停祿如初及至南京進保國公乃與馬士英阮大鋮相結以訖明亡孫鏜字振遠東勝州人襲濟陽衛指揮同知用朱勇薦進署指揮使正統末擢指揮僉事充左參將從總兵官徐恭討葉宗留敗賊金華復破之烏龍嶺英宗北狩景帝召鏜還超擢都督僉事典三千營也先將入犯進右都督充總兵官統京軍一萬禦之紫荊關將發寇已入遂營都城外寇薄德勝門為于謙等所却轉至西直門鏜與大戰斬其前鋒數人寇稍北鏜逐之寇益兵圍鏜鏜力戰不解高禮毛福壽來援禮中流矢會石亨兵至寇乃退詔鏜副楊洪追之戰於涿州深溝頗有斬獲師還仍典營務景泰初楊洪劾鏜下獄石亨請赦鏜江淵亦言城下之役惟鏜戰最力乃釋之三年冬充副總兵協郭登鎮大同登節制嚴鏜不得逞欲與分軍且令子百戶宏侮登帝械宏竟以鏜故貰之召還典三千營如故英宗復辟以奪門功封懷寧伯尋豫世券天順初甘肅告警詔鏜充總兵官帥京軍往討將陛辭病宿朝房夜二鼓太監曹吉祥昭武伯曹欽反其部下都指揮馬亮告變於恭順侯吳瑾瑾趨語鏜鏜草奏叩東長安門自門隙投入內廷始得集兵縛吉祥守皇城諸門鏜走太平侯張瑾家邀兵擊賊瑾不敢出鏜倉猝復走宣武街急遣二子輔軏呼征西將士紿之曰刑部囚反獄獲者重賞衆稍聚至二千人始語之故時已黎明遂擊欽欽方攻東長安門不得入轉攻東安門鏜兵追及賊稍散軏斫欽中膊軏亦被殺欽知事不成竄歸其家猶督衆拒鏜力戰至晡始定論功第一進爵世侯仍典三千營贈軏百戶世襲鏜粗猛善戰然數犯法初賄太監金英得遷都督事覺論斬景帝特宥之天順末以受將士賄屢被劾不自安求退詔解營務及府軍前衛事猶掌左府憲宗即位中官牛玉得罪鏜坐與玉婚停祿閒住尋陳情豫半祿已復自陳功狀給祿如故成化七年卒贈淶國公諡武敏子輔請嗣吏部言奪門功例不得世傳帝以鏜捕反者豫之傳子至孫應爵正德中總督團營四傳至曾孫世忠萬曆中鎮守湖廣總督漕運凡二十年又三傳至孫維藩流賊陷京師被殺鏜之冒奪門功封伯爵也都督董興及曹義施聚趙勝等皆乘是時冒封豫世券興義聚自有傳趙勝字克功遷安人襲職為永平衛指揮使正統末禦寇西直門進都指揮僉事天順初與孫鏜等預奪門功超遷都督僉事又與鏜擊反者曹欽進同知孛來犯甘肅勝與李杲充左右參將從白圭西征至固原擊寇却之憲宗立典鼓勇營訓練成化改元山西告警拜將軍次雁門寇已退乃還明年復出延綏禦寇會方納款遂旋師尋典耀武營四年充總兵官鎮遼東七年召典五軍營已改三千營癿加思蘭犯宣府詔勝為將軍統京兵萬人禦之亦以寇遁召還久之進左都督加太子太保十九年封昌寧伯勝初與李杲並有名後屢督大師未見敵無功夤緣得封名大損後加太保營萬貴妃塋墮崖石間死贈侯諡壯敏弘治初孫鑑乞襲爵吏部言勝無功不當傳世乃授錦衣衛指揮使范廣遼東人正統中嗣世職為寧遠衛指揮僉事進指揮使十四年積功遷遼東都指揮僉事廣精騎射驍勇絶倫英宗北狩廷議舉將材尚書于謙薦廣擢都督僉事充左副總兵為石亨副也先犯京師廣躍馬陷陳部下從之勇氣百倍寇退又追敗之紫荊關録功命實授俄進都督同知出守懷來尋召還景泰元年二月亨出巡邊時都督衛穎統大營命廣協理三月寇犯宣府敕兵部會諸營將遴選將材僉舉廣命充總兵官偕都御史羅通督兵巡哨駐居庸關外數月還京副石亨提督團營軍馬亨所為不法其部曲多貪縱廣數以為言亨銜之譖罷廣止領毅勇一營廣又與都督張軏不相能及英宗復辟亨軏恃奪門功誣廣黨附于謙謀立外藩遂下獄論死子升戍廣西籍其家以妻孥第宅賜降丁明年春軏早朝還途中為拱揖狀左右怪問之曰范廣過也遂得疾不能睡痛楚月餘而死成化初廷臣訟廣冤命子升仍襲世職廣性剛果每臨陳身先士卒未嘗敗衄一時諸將盡出其下最為于謙所信任以故為儕輩所忌贊曰楊洪石亨輩遭時多事奮爪牙之力侯封世券照耀一門酬庸亦過厚矣洪知盛滿可懼而亨邪狠粗傲怙寵而驕其赤族宜哉朱謙勇略不及郭登登乃無後而謙子永進爵上公子孫世侯勿絶孫鏜范廣善戰略相等而廣以冤死所遇有幸有不幸相去豈不遠哉
