body:
  text: 明史卷六十七志第四十三輿服三文武官冠服命婦冠服內外官親屬冠服內使冠服侍儀以下冠服士庶冠服樂工冠服軍隸冠服外蕃冠服僧道服色羣臣冠服洪武元年命制公服朝服以賜百官時禮部言各官先授散官與見任職事高下不同如御史董希哲前授朝列大夫澧州知州而任七品職事省司郎中宋冕前授亞中大夫黃州知府而任五品職事散官與見任之職不同故服色不能無異乞定其制乃詔省部臣定議禮部復言唐制服色皆以散官為準元制散官職事各從其高者服色因之國初服色依散官與唐制同乃定服色準散官不計見職於是所賜袍帶亦並如之三年禮部言歷代異尚夏黑商白周赤秦黑漢赤唐服飾黃旂幟赤今國家承元之後取法周漢唐宋服色所尚於赤為宜從之文武官朝服洪武二十六年定凡大祀慶成正旦冬至聖節及頒詔開讀進表傳制俱用梁冠赤羅衣白紗中單青飾領緣赤羅裳青緣赤羅蔽膝大帶赤白二色絹革帶佩綬白韈黑履一品至九品以冠上梁數為差公冠八梁加籠巾貂蟬立筆五折四柱香草五段前後玉蟬侯七梁籠巾貂蟬立筆四折四柱香草四段前後金蟬伯七梁籠巾貂蟬立筆二折四柱香草二段前後玳瑁蟬俱插雉尾駙馬與侯同不用雉尾一品冠七梁不用籠巾貂蟬革帶與佩俱玉綬用黃綠赤紫織成雲鳳四色花錦下結青絲網玉綬環二二品六梁革帶綬環犀餘同一品三品五梁革帶金佩玉綬用黃綠赤紫織成雲鶴花錦下結青絲網金綬環二四品四梁革帶金佩藥玉餘同三品五品三梁革帶銀鈒花佩藥玉綬用黃綠赤紫織成盤鵰花錦下結青絲網銀鍍金綬環二一品至五品笏俱象牙六品七品二梁革帶銀佩藥玉綬用黃綠赤織成練鵲三色花錦下結青絲網銀綬環二獨御史服獬廌八品九品一梁革帶烏角佩藥玉綬用黃綠織成鸂勅鳥二色花錦下結青絲網銅綬環二六品至九品笏俱槐木其武官應直守衞者別有服色雜職未入流品者大朝賀進表行禮止用公服三十年令視九品官用朝服嘉靖八年更定朝服之制梁冠如舊式上衣赤羅青緣長過腰指七寸毋掩下裳中單白紗青緣下裳七幅前三後四每幅三襞積赤羅青緣蔽膝綴革帶綬各從品級花樣革帶之後佩綬繫而掩之其環亦各從品級用玉犀金銀銅不以織於綬大帶表𩹉俱素惟兩耳及下垂緣綠又以青組約之革帶俱如舊式珮玉一如詩傳之制去雙滴及二珩其三品以上玉四品以下藥玉及韈履俱如舊式萬曆五年令百官正旦朝賀毋僭躡朱履故事十一月百官戴煖耳是年朝覲外官及舉人監生不許戴煖耳入朝凡親祀郊廟社稷文武官分獻陪祀則服祭服洪武二十六年定一品至九品青羅衣白紗中單俱皁領緣赤羅裳皁緣赤羅蔽膝方心曲領其冠帶佩綬等差並同朝服又定品官家用祭服三品以上去方心曲領四品以下幷去珮綬嘉靖八年更定百官祭服上衣青羅皁緣與朝服同下裳赤羅皁緣與朝服同蔽膝綬環大帶革帶佩玉韈履俱與朝服同其視牲朝日夕月耕耤祭歷代帝王獨錦衣衞堂上官大紅蟒衣飛魚烏紗帽鸞帶佩繡春刀祭太廟社稷則大紅便服文武官公服洪武二十六年定每日早晚朝奏事及侍班謝恩見辭則服之在外文武官每日公座服之其制盤領右袵袍用紵絲或紗羅絹袖寬三尺一品至四品緋袍五品至七品青袍八品九品綠袍未入流雜職官袍笏帶與八品以下同公服花樣一品大獨科花徑五寸二品小獨科花徑三寸三品散答花無枝葉徑二寸四品五品小雜花紋徑一寸五分六品七品小雜花徑一寸八品以下無紋幞頭漆紗二等展角長一尺二寸雜職官幞頭垂帶後復令展角不用垂帶與入流官同笏依朝服為之腰帶一品玉或花或素二品犀三品四品金荔枝五品以下烏角用青革仍垂撻尾於下鞾用皁其後常朝止朝服惟朔望具公服朝參凡武官應直守衞者別有服色不拘此制公侯駙馬伯服色花樣腰帶與一品同文武官花樣如無從織造則用素百官入朝雨雪許服雨衣奉天華蓋武英諸殿奏事必躡履違者御史糾之萬曆五年令常朝俱衣本等錦繡服色其朝覲官見辭謝恩不論已未入流公服行禮文武官常服洪武三年定凡常朝視事以烏紗帽團領衫束帶為公服其帶一品玉二品花犀三品金鈒花四品素金五品銀鈒花六品七品素銀八品九品烏角凡致仕及侍親辭閑官紗帽束帶為事黜降者服與庶人同至二十四年又定公侯伯駙馬束帶與一品同雜職官與八品九品同朝官常服禮㙐洪武六年定先是百官入朝遇雨皆躡釘鞾聲徹殿陛侍儀司請禁之太祖曰古者入朝有履自唐始用鞾其令朝官為輭底皮㙐冒於鞾外出朝則釋之禮部言近奢侈越制詔申禁之仍參酌漢唐之制頒行遵守凡職官一品二品用雜色文綺綾羅綵繡帽頂帽珠用玉三品至五品用雜色文綺綾羅帽頂用金帽珠除玉外隨所用六品至九品用雜色文綺綾羅帽頂用銀帽珠瑪瑙水晶香木一品至六品穿四爪龍以金繡為之者聽禮部又議品官見尊長用朝君公服於理未安宜別製梁冠絳衣絳裳革帶大帶大白襪烏舄佩綬其衣裳去緣襈三品以上佩綬三品以下不用從之二十二年令文武官遇雨戴雨帽公差出外戴帽子入城不許二十三年定制文官衣自領至裔去地一寸袖長過手復回至肘公侯駙馬與文官同武官去地五寸袖長過手七寸二十四年定公侯駙馬伯服繡麒麟白澤文官一品仙鶴二品錦鷄三品孔雀四品雲雁五品白鷴六品鷺鷥七品鸂勅鳥八品黃鸝九品鵪鶉雜職練鵲風憲官獬廌武官一品二品獅子三品四品虎豹五品熊羆六品七品彪八品犀牛九品海馬又令品官常服用雜色紵絲綾羅綵繡官吏衣服帳幔不許用玄黃紫三色幷織繡龍鳳文違者罪及染造之人朝見人員四時並用色衣不許純素三十年令致仕官服色與見任同若朝賀謝恩見辭一體具服景泰四年令錦衣衞指揮侍衞者得衣麒麟天順二年定官民衣服不得用蟒龍飛魚斗牛大鵬像生獅子四寶相花大西番蓮大雲花樣幷玄黃紫及玄色黑綠柳黃薑黃明黃諸色弘治十三年奏定公侯伯文武大臣及鎮守守備違例奏請蟒衣飛魚衣服者科道糾劾治以重罪正德十一年設東西兩官廳將士悉衣黃罩甲中外化之金緋盛服者亦必加此於上都督江彬等承日紅笠之上綴以靛染天鵝翎以為貴飾貴者飄三英次者二英兵部尚書王瓊得賜一英冠以下教場自謂殊遇其後巡狩所經督餉侍郎巡撫都御史無不衣罩甲見上者十三年車駕還京傳旨俾迎候者用曳撒大帽鸞帶尋賜羣臣大紅紵絲羅紗各一其服色一品斗牛二品飛魚三品蟒四五品麒麟六七品虎彪翰林科道不限品級皆與焉惟部曹五品下不與時文臣服色亦以走獸而麒麟之服逮於四品尤異事也十六年世宗登極詔云近來冒濫玉帶蟒龍飛魚斗牛服色皆庶官雜流幷各處將領夤緣奏乞今俱不許武職卑官僭用公侯服色者亦禁絕之嘉靖六年復禁中外官不許濫服五彩裝花織造違禁顏色七年既定燕居法服之制閣臣張璁因言品官燕居之服未有明制詭異之徒競為奇服以亂典章乞更法古玄端別為簡易之制昭布天下使貴賤有等帝因復製忠靜冠服圖頒禮部敕諭之曰祖宗稽古定制品官朝祭之服各有等差第常人之情多謹於明顯怠於幽獨古聖王慎之制玄端以為燕居之服比來衣服詭異上下無辨民志何由定朕因酌古玄端之制更名忠靜庶幾乎進思盡忠退思補過焉朕已著為圖說如式製造在京許七品以上官及八品以上翰林院國子監行人司在外許方面官及各府堂官州縣正堂儒學教官服之武官止都督以上其餘不許濫服禮部以圖說頒布天下如敕奉行按忠靜冠仿古玄冠冠匡如制以烏紗冒之兩山俱列於後冠頂仍方中微起三梁各壓以金線邊以金緣之四品以下去金緣以淺色絲線忠靜服仿古玄端服色用深青以紵絲紗羅為之三品以上雲四品以下素緣以藍青前後飾本等花樣補子深衣用玉色素帶如古大夫之帶制青表綠緣邊幷𩹉素履青綠絛結白襪十六年羣臣朝於駐蹕所兵部尚書張瓚服蟒帝怒諭閣臣夏言曰尚書二品何自服蟒言對曰瓚所服乃欽賜飛魚服鮮明類蟒耳帝曰飛魚何組兩角其嚴禁之於是禮部奏定文武官不許擅用蟒衣飛魚斗牛違禁華異服色其大紅紵絲紗羅服惟四品以上官及在京五品堂上官經筵講官許服五品官及經筵不為講官者俱服青綠錦繡遇吉禮止衣紅布絨褐品官花樣並依品級錦衣衞指揮侍衞者仍得衣麒麟其帶俸非侍衞及千百戶雖侍衞不許僭用歷朝賜服文臣有未至一品而賜玉帶者自洪武中學士羅復仁始衍聖公秩正二品服織金麒麟袍玉帶則景泰中入朝拜賜自是以為常內閣賜蟒衣自弘治中劉健李東陽始麒麟本公侯服而內閣服之則嘉靖中嚴嵩徐階皆受賜也仙鶴文臣一品服也嘉靖中成國公朱希忠都督陸炳服之皆以玄壇供事而學士嚴訥李春芳董份以五品撰青詞亦賜仙鶴尋諭供事壇中乃用於是尚書皆不敢衣鶴後敕南京織閃黃補麒麟仙鶴賜嚴嵩閃黃乃上用服色也又賜徐階教子升天蟒萬曆中賜張居正坐蟒武清侯李偉以太后父亦受賜儀賓朝服公服常服俱視品級與文武官同惟笏皆象牙服花樣視武官弘治十三年定郡主儀賓鈒花金帶胸背獅子縣主儀賓鈒花金帶郡君儀賓光素金帶胸背俱虎豹縣君儀賓鈒花銀帶鄉君儀賓光素銀帶胸背俱彪有僭用者革去冠帶戴平頭巾於儒學讀書習禮三年狀元及諸進士冠服狀元冠二梁緋羅圓領白絹中單錦綬蔽膝紗帽槐木笏光銀帶藥玉佩朝鞾襪皆御前頒賜上表謝恩日服之進士巾如烏紗帽頂微平展角闊寸餘長五寸許系以垂帶皁紗為之深藍羅袍緣以青羅袖廣而不殺槐木笏革帶青飾以黑角垂撻尾於後廷試後頒於國子監傳臚日服之上表謝恩後謁先師行釋菜禮畢始易常服其巾袍仍送國子監藏之命婦冠服洪武元年定命婦一品冠花釵九樹兩博鬢九鈿服用翟衣繡翟九重素紗中單黼領朱縠褾襈裾蔽膝隨裳色以緅為領緣加文繡重翟為章二等玉帶青襪舄佩綬二品冠花釵八樹兩博鬢八鈿服用翟衣八等犀帶餘如一品三品冠花釵七樹兩博鬢七鈿翟衣七等金革帶餘如二品四品冠花釵六樹兩博鬢六鈿翟衣六等金革帶餘如三品五品冠花釵五樹兩博鬢五鈿翟衣五等烏角帶餘如四品六品冠花釵四樹兩博鬢四鈿翟衣四等烏角帶餘如五品七品冠花釵三樹兩博鬢三鈿翟衣三等烏角帶餘如六品自一品至五品衣色隨夫用紫六品七品衣色隨夫用緋其大帶如衣色四年以古天子諸侯服袞冕后與夫人亦服褘翟今羣臣既以梁冠絳衣為朝服不敢用冕則外命婦亦不當服翟衣以朝命禮部議之奏定命婦以山松特髻假鬢花鈿真紅大袖衣珠翠蹙金霞帔為朝服以朱翠角冠金珠花釵闊袖雜色綠緣為燕居之服一品衣金繡文霞帔金珠翠妝飾玉墜二品衣金繡雲肩大雜花霞帔金珠翠妝飾金墜子三品衣金繡大雜花霞帔珠翠妝飾金墜子四品衣繡小雜花霞帔翠妝飾金墜子五品衣銷金大雜花霞帔生色畫絹起花妝飾金墜子六品七品衣銷金小雜花霞帔生色畫絹起花妝飾鍍金銀墜子八品九品衣大紅素羅霞帔生色畫絹妝飾銀墜子首飾一品二品金玉珠翠三品四品金珠翠五品金翠六品以下金鍍銀間用珠五年更定品官命婦冠服一品禮服用山松特髻翠松五株金翟八口銜珠結正面珠翠翟一珠翠花四𩽆珠翠雲喜花三𩽆後鬢珠梭毬一珠翠飛翟一珠翠梳四金雲頭連三釵