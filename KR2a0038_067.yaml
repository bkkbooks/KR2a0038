幞頭亦無祭服萬曆初穆宗主入太廟大璫冠進賢服祭服以從蓋內府祀中霤竈井之神例遣中官因自創為祭服非由廷議也侍儀舍人冠服洪武二年禮官議定侍儀舍人導禮依元制展脚幞頭窄袖紫衫塗金束帶皁紋鞾常服烏紗唐帽諸色盤領衫烏角束帶衫不用黃四年中書省議定侍儀舍人併御史臺知班引禮執事冠進賢冠無梁服絳色衣其蔽膝履襪帶笏與九品同惟不用中單校尉冠服洪武三年定制執仗之士首服皆縷金額交脚幞頭其服有諸色辟邪寶相花裙襖銅葵花束帶皁紋鞾六年令校尉衣只孫束帶幞頭鞾㙐只孫一作質孫本元制蓋一色衣也十四年改用金鵝帽黑漆戧金荔枝銅釘樣每五釘攢就四面稍起邊襴青緊束之二十二年令將軍力士校尉旂軍常戴頭巾或榼腦二十五年令校尉力士上直穿鞾出外不許刻期冠服宋置快行親從官明初謂之刻期冠方頂巾衣胸背鷹鷂花腰線襖子諸色闊匾絲絛大象牙雕花環行縢八帶㙐洪武六年惟用雕刻象牙絛環餘同庶民儒士生員監生巾服洪武三年令士人戴四方平定巾二十三年定儒士生員衣自領至裳去地一寸袖長過手復回不及肘三寸二十四年以士子巾服無異吏胥宜甄別之命工部制式以進太祖親視凡三易乃定生員襴衫用玉色布絹為之寬袖皁緣皁絛軟巾垂帶貢舉入監者不變所服洪武末許戴遮陽帽後遂私戴之洪熙中帝問衣藍者何人左右以監生對帝曰著青衣較好乃易青圓領嘉靖二十二年禮部言士子冠服詭異有凌雲等巾甚乖禮制詔所司禁之萬曆二年禁舉人監生生儒僭用忠靜冠巾錦綺鑲履及張傘蓋戴煖耳違者五城御史送問庶人冠服明初庶人婚許假九品服洪武三年庶人初戴四帶巾改四方平定巾雜色盤領衣不許用黃又令男女衣服不得僭用金繡錦綺紵絲綾羅止許紬絹素紗其鞾不得裁製花樣金線裝飾首飾釵鐲不許用金玉珠翠止用銀六年令庶人巾環不得用金玉瑪瑙珊瑚琥珀未入流品者同庶人帽不得用頂帽珠止許水晶香木十四年令農衣紬紗絹布商賈止衣絹布農家有一人為商賈者亦不得衣紬紗二十二年令農夫戴斗笠蒲笠出入市井不禁不親農業者不許二十三年令耆民衣制袖長過手復回不及肘三寸庶人衣長去地五寸袖長過手六寸袖樁廣一尺袖口五寸二十五年以民間違禁鞾巧裁花樣嵌以金線藍條詔禮部嚴禁庶人不許穿鞾止許穿皮札惟北地苦寒許用牛皮直縫鞾正德元年禁商販僕役倡優下賤不許服用貂裘十六年禁軍民衣紫花罩甲或禁門或四外遊走者緝事人擒之士庶妻冠服洪武三年定制士庶妻首飾用銀鍍金耳環用金珠釧鐲用銀服淺色團衫用紵絲綾羅紬絹五年令民間婦人禮服惟紫絁不用金繡袍衫止紫綠桃紅及諸淺淡顏色不許用大紅鴉青黃色帶用藍絹布女子在室者作三小髻金釵珠頭窄袖褙子凡婢使高頂髻絹布狹領長襖長裙小婢使雙髻長袖短衣長裙成化十年禁官民婦女不得僭用渾金衣服寶石首飾正德元年令軍民婦女不許用銷金衣服帳幔寶石首飾鐲釧協律郎樂舞生冠服明初郊社宗廟用雅樂協律郎幞頭紫羅袍荔枝帶樂生緋袍展脚幞頭舞士幞頭紅羅袍荔枝帶皁鞾文舞生紅袍武舞生緋袍俱展脚幞頭革帶皁鞾朝會大樂九奏歌工中華一統巾紅羅生色大袖衫畫黃鶯鸚鵡花樣紅生絹襯衫錦領杏紅絹裙白絹大口袴青絲絛白絹襪茶褐㙐其和聲郎押樂者皁羅闊帶巾青羅大袖衫紅生絹襯衫錦領塗金束帶皁鞾其三舞一武舞曰平定天下之舞舞士皆黃金束髮冠紫絲纓青羅生色畫舞鶴花樣窄袖衫白生絹襯衫錦領紅羅銷金大袖罩袍紅羅銷金裙皁生色畫花緣襈白羅銷金汗袴藍青羅銷金緣紅絹擁項紅結子紅絹束腰塗金束帶青絲大絛錦臂韝綠雲頭皁鞾舞師黃金束髮冠紫絲纓青羅大袖衫白絹襯衫錦領塗金束帶綠雲頭皁鞾一文舞曰車書會同之舞舞士皆黑光描金方山冠青絲纓紅羅大袖衫紅生絹襯衫錦領紅羅擁項紅結子塗金束帶白絹大口袴白絹襪茶褐㙐舞師冠服與舞士同惟大袖衫用青羅不用紅羅擁項紅結子一文舞曰撫安四夷之舞舞士東夷四人椎髻於後繫紅銷金頭繩紅羅銷金抹額中綴塗金博山兩傍綴塗金巾環明金耳環青羅生色畫花大袖衫紅生色領袖紅羅銷金裙青銷金裙緣紅生絹襯衫錦領塗金束帶烏皮鞾西戎四人間道錦纏頭明金耳環紅紵絲細摺襖子大紅羅生色雲肩綠生色緣藍青羅銷金汗袴紅銷金緣繫腰合鉢十字泥金數珠五色銷金羅香囊紅絹擁項紅結子赤皮鞾南蠻四人綰朝天髻繫紅羅生色銀錠紅銷金抹額明金耳環紅織金短襖子綠織金細摺短裙絨錦袴間道紵絲手巾泥金頂牌金珠瓔珞綴小金鈴錦行纏泥金獅蠻帶綠銷金擁項紅結子赤皮鞾北翟四人戴單于冠貂鼠皮簷雙垂髻紅銷金頭繩紅羅銷金抹額諸色細摺襖子藍青生色雲肩紅結子紅銷金汗袴繫腰合鉢皁皮鞾其舞師皆戴白捲簷帽塗金帽頂一撒紅纓紫羅帽襻紅綠金繡襖子白銷金汗袴藍青銷金緣塗金束帶綠擁項紅結子赤皮鞾凡大樂工及文武二舞樂工皆曲脚幞頭紅羅生色畫花大袖衫塗金束帶紅絹擁項紅結子皁皮鞾四夷樂工皆蓮花帽諸色細摺襖子白銷金汗袴紅銷金緣紅綠絹束腰紅羅擁項紅結子花鞾永樂間定殿內侑食樂奏平定天下之舞引舞樂工皆青羅包巾青紅綠玉色羅銷金胸背襖子渾金銅帶紅羅褡雲頭皁鞾青綠羅銷金包臀舞人服色如之奏撫安四夷之舞高麗舞四人皆笠子青羅銷金胸背襖子銅帶皁鞾琉球舞四人皆棉布花手巾青羅大袖襖子銅帶白碾光絹間道踢袴皁皮鞾北番舞四人皆狐帽青紅紵絲銷金襖子銅帶伍魯速回回舞四人皆青羅帽比里罕棉布花手巾銅帶皁鞾奏車書會同之舞舞人皆皁羅頭巾青綠玉色皁沿邊襴茶褐線絛皁皮四縫鞾奏表正萬邦之舞引舞二人青羅包巾紅羅銷金項帕紅生絹錦領中單紅生絹銷金通袖襖子青線絛銅帶織錦臂韝雲頭皁鞾各色銷金包臀紅絹褡舞人樂工服色與引舞同奏天命有德之舞引舞二人青幪紗如意冠紅生絹錦領中單紅生絹大袖袍各色絹采畫直纏黑角偏帶藍絹綵雲頭皁鞾白布襪舞人樂工服色與引舞同洪武五年定齋郎樂生文武舞生冠服齋郎黑介幘漆布為之無花樣服紅絹窄袖衫紅生絹為𩹉皁皮四縫鞾黑角帶文舞生及樂生黑介幘漆布為之上加描金蟬服紅絹大紬袍胸背畫纏枝方葵花紅生絹為𩹉加錦臂韝二皁皮四縫鞾黑角帶武舞生武弁以漆布為之上加描金蟬服飾鞾帶並同文舞生嘉靖九年定文武舞生服制圜丘服青紵絲方澤服黑綠紗朝日壇服赤羅夕月壇服玉色羅宮中女樂冠服洪武三年定制凡中宮供奉女樂奉鑾等官妻本色髻青羅圓領提調女樂黑漆唐巾大紅羅銷金花圓領鍍金花帶皁鞾歌章女樂黑漆唐巾大紅羅銷金裙襖胸帶大紅羅抹額青綠羅彩畫雲肩描金牡丹花皁鞾奏樂女樂服色與歌章同嘉靖九年祀先蠶定樂女生冠服黑縐紗描金蟬冠黑絲纓黑素羅銷金葵花胸背大袖女袍黑生絹襯衫錦領塗金束帶白襪黑㙐教坊司冠服洪武三年定教坊司樂藝青卍字頂巾繫紅綠褡樂妓明角冠皁褙子不許與民妻同御前供奉俳長鼓吹冠紅羅胸背小袖袍紅絹褡皁鞾色長鼓吹冠紅青羅紵絲彩畫百花袍紅絹褡歌工弁冠紅羅織金胸背大袖袍紅生絹錦領中單黑角帶紅熟絹錦脚袴皁皮琴㙐白棉布夾襪樂工服色與歌工同凡教坊司官常服冠帶與百官同至御前供奉執粉漆笏服黑漆幞頭黑綠羅大袖襴袍黑角偏帶皁鞾教坊司伶人常服綠色巾以別士庶之服樂人皆戴鼓吹冠不用錦絛惟紅褡服色不拘紅綠教坊司婦人不許戴冠穿褙子樂人衣服止用明綠桃紅玉色水紅茶褐色俳色長樂工俱皁頭巾雜色絛王府樂工冠服洪武十五年定凡朝賀用大樂宴禮七奏樂樂工俱紅絹彩畫胸背方花小袖單袍有花鼓吹冠錦臂韝皁鞾抹額以紅羅彩畫束腰以紅絹其餘樂工用綠絹彩畫胸背方花小袖單袍無花鼓吹冠抹額以紅絹彩畫束腰以紅絹軍士服洪武元年令製衣表𩹉異色謂之鴛鴦戰襖以新軍號二十一年定旂手衞軍士力士俱紅袢襖其餘衞所袢襖如之凡袢襖長齊膝窄袖內實以棉花二十六年令騎士服對襟衣便於乘馬也不應服而服者罪之皁隸公人冠服洪武三年定皁隸圓頂巾皁衣四年定皁隸公使人皁盤領衫平頂巾白褡帶錫牌十四年令各衙門祗禁原服皁衣改用淡青二十五年皁隸伴當不許着鞾止用皮札外國君臣冠服洪武二年高麗入朝請祭服制度命製給之二十七年定蕃國朝貢儀國王來朝如嘗賜朝服者服之以朝三十一年賜琉球國王併其臣下冠服永樂中賜琉球中山王皮弁玉圭麟袍犀帶視二品秩宣德三年朝鮮國王李言洪武中蒙賜國王冕服九章陪臣冠服比朝廷遞降二等故陪臣一等比朝臣第三等得五梁冠服永樂初先臣芳遠遣世子禔入朝蒙賜五梁冠服臣竊惟世子冠服何止同陪臣一等乞為定制乃命製六梁冠賜之嘉靖六年令外國朝貢人不許擅用違制衣服如違賣者買者同罪僧道服洪武十四年定禪僧茶褐常服青絛玉色袈裟講僧玉色常服綠絛淺紅袈裟教僧皁常服黑絛淺紅袈裟僧官如之惟僧錄司官袈裟綠文及環皆飾以金道士常服青法服朝衣皆赤道官亦如之惟道錄司官法服朝服綠文飾金凡在京道官紅道衣金襴木簡在外道官紅道衣木簡不用金襴道士青道服木簡
