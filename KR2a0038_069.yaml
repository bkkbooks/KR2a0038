body:
  text: 明史卷六十九志第四十五選舉一選舉之法大略有四曰學校曰科目曰薦舉曰銓選學校以教育之科目以登進之薦舉以旁招之銓選以布列之天下人才盡於是矣明制科目為盛卿相皆由此出學校則儲才以應科目者也其徑由學校通籍者亦科目之亞也外此則雜流矣然進士舉貢雜流三途並用雖有畸重無偏廢也薦舉盛於國初後因專用科目而罷銓選則入官之始舍此蔑由焉是四者釐然具載其本末而二百七十年間取士得失之故可覩已科舉必由學校而學校起家可不由科舉學校有二曰國學曰府州縣學府州縣學諸生入國學者乃可得官不入者不能得也入國學者通謂之監生舉人曰舉監生員曰貢監品官子弟曰廕監捐資曰例監同一貢監也有歲貢有選貢有恩貢有納貢同一廕監也有官生有恩生國子學之設自明初乙巳始洪武元年令品官子弟及民俊秀通文義者並充學生選國琦王璞等十餘人侍太子讀書禁中入對謹身殿姿狀明秀應對詳雅太祖喜因厚賜之天下既定詔擇府州縣學諸生入國子學又擇年少舉人趙惟一等及貢生董等入學讀書賜以衣帳命於諸司先習吏事謂之歷事監生取其中尤英敏者李擴等入文華武英堂說書謂之小秀才其才學優贍聰明俊偉之士使之博極羣書講明道德經濟之學以期大用謂之老秀才初改應天府學為國子學後改建於雞鳴山下既而改學為監設祭酒司業及監丞博士助教學正學録典籍掌饌典簿等官分六堂以館諸生曰率性修道誠心正義崇志廣業學旁以宿諸生謂之號房厚給廩餼歲時賜布帛文綺襲衣巾鞾正旦元宵諸令節俱賞節錢孝慈皇后積糧監中置紅倉二十餘舍養諸生之妻子歷事生未娶者賜錢婚聘及女衣二襲月米二石諸生在京師歲久父母存或父母亡而大父母伯叔父母存皆遣歸省人賜衣一襲鈔五錠為道里費其優恤之如此而其教之之法每旦祭酒司業坐堂上屬官自監丞以下首領則典簿以次序立諸生揖畢質問經史拱立聽命惟朔望給假餘日升堂會饌乃會講復講背書輪課以為常所習自四子本經外兼及劉向說苑及律令書數御製大誥每月試經書義各一道詔誥表策論判內科二道每日習書二百餘字以二王智永歐虞顏柳諸帖為法每班選一人充齊長督諸生工課衣冠步履飲食必嚴飭中節夜必宿監有故而出必告本班教官令齊長帥之以白祭酒監丞置集愆簿有不遵者書之再三犯者決責四犯者至發遣安置其學規條目屢次更定寬嚴得其中堂宇宿舍飲饌澡浴俱有禁例省親畢姻回籍限期以道里遠近為差違限者謫選遠方典史有罰充吏者司教之官必選耆宿宋訥吳顒等由儒士擢祭酒訥尤推名師歷科進士多出太學而戊辰任亨泰廷對第一太祖召訥褒賞撰題名記立石監門辛未許觀亦如之進士題名碑由此相繼不絶每歲天下按察司選生員年二十以上厚重端秀者送監考留會試下第舉人入監卒業又因諫官關賢奏設為定例府州縣學歲貢生員各一人翰林考試經書義各一道判語一條中式者一等入國子監二等送中都不中者遣還提調教官罰停廩祿於是直省諸士子雲集輦下雲南四川皆有土官生日本琉球暹羅諸國亦皆有官生入監讀書輒加厚賜並給其從人永宣間先後絡繹至成化正德時琉球生猶有至者中都之置國學也自洪武八年至二十六年乃革以其師生並入京師永樂元年始設北京國子監十八年遷都乃以京師國子監為南京國子監而太學生有南北監之分矣太祖慮武臣子弟但習武事鮮知問學命大都督府選入國學其在鳳陽者即肄業於中都命韓國公李善長等考定教官生員高下分列班次曹國公李文忠領監事以繩核之嗣後勳臣子弟多入監讀書嘉靖元年令公侯伯未經任事年三十以下者送監讀書尋令已任者亦送監而年少勳戚爭以入學為榮矣六堂諸生有積分之法司業二員分為左右各提調三堂凡通四書未通經者居正義崇志廣業一年半以上文理條暢者升修道誠心又一年半經史兼通文理俱優者乃升率性升至率性乃積分其法孟月試本經義一道仲月試論一道詔誥表內科一道季月試經史策一道判語二條每試文理俱優者與一分理優文劣者與半分紕繆者無分歲內積八分者為及格與出身不及者仍坐堂肄業如有才學超異者奏請上裁洪武二十六年盡擢監生劉政龍鐔等六十四人為行省布政按察兩使及參政參議副使僉事等官其一旦而重用之至於如此其為四方大吏者蓋無算也李擴等自文華武英擢御史擴尋改給事中兼齊相府録事蓋臺諫之選亦出於太學其常調者乃為府州縣六品以下官初以北方喪亂之餘人鮮知學遣國子生林伯雲等三百六十六人分教各郡後乃推及他省擇其壯歲能文者為教諭等官太祖雖間行科舉而監生與薦舉人才參用者居多故其時布列中外者太學生最盛一再傳之後進士日益重薦舉遂廢而舉貢日益輕雖積分歷事不改初法南北祭酒陳敬宗李時勉等加意振飭已漸不如其始衆情所趨向專在甲科宦途升沈定於謁選之日監生不獲上第即奮自鏃礪不能有成積重之勢然也逮開納粟之例則流品漸淆且庶民亦得援生員之例以入監謂之民生亦謂之俊秀而監生益輕於是同處太學而舉貢得為府佐二及州縣正官官恩生得選部院府衛司寺小京職尚為正途而援例監生僅得選州縣佐二及府首領官其授京職者乃光祿寺上林苑之屬其願就遠方者則以雲貴廣西及各邊省軍衛有司首領及衛學王府教授之缺用而終身為異途矣舉人入監始於永樂中會試下第輒令翰林院録其優者俾入學以俟後科給以教諭之俸是時會試有副榜大抵署教官故令入監者亦食其祿也宣德八年嘗命禮部尚書胡濙與大學士楊士奇楊榮選副榜舉人龍文等二十四人送監進學翰林院三月一考其文與庶吉士同頗示優異後不復另試則取副榜年二十五以上者授教職年未及者或依親或入監讀書既而不拘年齒依親入監者皆聽依親者回籍讀書依親肄業也又有丁憂成婚省親送幼子皆仿依親例限年復班正統中天下教官多缺而舉人厭其卑冷多不願就十三年御史萬節請敕禮部多取副榜以就教職部臣以舉人願依親入監者十之七願就教職者僅十之三但宜各隨所欲却其請不行至成化十三年御史胡璘言天下教官率多歲貢言行文章不足為人師範請多取舉人選用而罷貢生勿選部議歲貢如其舊而舉人教官仍許會試自後就教者亦漸多矣嘉靖中南北國學皆空虛議盡發下第舉人入監且立限期以趣之然舉人不願入監者卒不可力強於是生員歲貢之外不得不頻舉選貢以充國學矣貢生入監初由生員選擇既命各學歲貢一人故謂之歲貢其例亦屢更洪武二十一年定府州縣學以一二三年為差二十五年定府學歲二人州學二歲三人縣學歲一人永樂八年定州縣戶不及五里者州歲一人縣間歲一人十九年令歲貢照洪武二十一年例宣德七年復照洪武二十五年例正統六年更定府學歲一人州學三歲二人縣學間歲一人弘治嘉靖間仍定府學歲二人州學二歲三人縣學歲一人遂為永制後孔顏孟三氏及京學衛學都司土官川雲貴諸遠省其按年充貢之法亦間有增減云歲貢之始必考學行端莊文理優長者以充之其後但取食廩年深者弘治中南京祭酒章懋言洪永間國子生以數千計今在監科貢共止六百餘人歲貢挨次而升衰遲不振者十常八九舉人坐監又每後時差撥不敷教養罕效近年有增貢之舉而所拔亦挨次之人資格所拘英才多滯乞於常貢外令提學行選貢之法不分廩膳增廣生員通行考選務求學行兼優年富力強纍試優等者乃以充貢通計天下之廣約取五六百人以後三五年一行則人才可漸及往年矣乃下部議行之此選貢所由始也選貢多英才入監課試輒居上等撥歷諸司亦有幹局歲貢頽老其勢日絀則惟願就教而不願入監嘉靖二十七年祭酒程文德請將廷試歲貢惟留即選者於部而其餘盡使入監報可歲貢諸生合疏言家貧親老不願入監禮部復請從其所願而盡使舉人入監又從之舉人入監不能如期南京祭酒潘晟至請設重罰以趣其必赴於是舉人選貢歲貢三者迭為盛衰而國學之盈虛亦靡有定也萬曆中工科郭如心言選貢非祖制其始欲補歲貢之乏其後遂妨歲貢之途請停其選神宗以為然至崇禎時又嘗行之恩貢者國家有慶典或登極詔書以當貢者充之而其次即為歲貢納貢視例監稍優其實相仿也廕子入監明初因前代任子之制文官一品至七品皆得廕一子以世其祿後乃漸為限制在京三品以上方得請廕謂之官生出自特恩者不限官品謂之恩生或即與職事或送監讀書官生必三品京官成化三年從助教李伸言也時給事中李森不可帝諭責其刻薄第令非歷任年久政績顯著者毋得濫而已既得廕由提學官考送部試如貢生例送入監中時內閣呂原子由廕監補中書舍人七年辛卯乞應順天鄉試部請從之給事中芮畿不可帝允所請不為例然其後以廕授舍人者俱得應舉矣嘉隆以後宰相之子有初授即為尚寶司丞徑轉本司少卿由光祿太常以躋九列者又有以軍功廕錦衣者往往不由太學其他並入監恩生之始建文元年録吳雲子黼為國子生以雲死節雲南也正德十六年定例凡文武官死於忠諫者一子入監其後守土官死節亦皆得廕子矣又弘治十八年定例東宮侍從官講讀年久輔導有功者歿後子孫乞恩禮部奏請上裁正德元年復定其祖父年勞已及三年者一子即授試中書舍人習字未及三年者一子送監讀書八年復定東宮侍班官三年者一子入監又萬曆十二年定例三品日講官雖未考滿一子入監例監始於景泰元年以邊事孔棘令天下納粟納馬者入監讀書限千人止行四年而罷成化二年南京大饑守臣建議欲令官員軍民子孫納粟送監禮部尚書姚夔言太學乃育才之地近者直省起送四十歲生員及納草納馬者動以萬計不勝其濫且使天下以貨為賢士風日陋帝以為然為却守臣之議然其後或遇歲荒或因邊警或大興工作率援往例行之訖不能止此舉貢廕例諸色監生前後始末之大凡也監生歷事始於洪武五年建文時定考核法上中下三等上等選用中下等仍歷一年再考上等者依上等用中等者不拘品級隨才任用下等者回監讀書永樂五年選監生三十八人隸翰林院習四夷譯書九年辛卯鍾英等五人成進士俱改庶吉士壬辰乙未以後譯書中會試者甚多皆改庶吉士以為常歷事生成名其蒙恩遇如此仁宗初政中軍都督府奏監生七人吏事勤慎請注選授官帝不許仍令入學由科舉以進他歷事者多不願還監於是通政司引奏六科辦事監生二十人滿日例應還監仍願就科辦事帝復召二十人者諭令進學蓋是時六科給事中多缺諸生覬得之帝察知其意故不授官也宣宗以教官多缺選用監生三百八十人而程富等以都御史顧佐之薦使於各道歷政三月選擇任之所謂試御史也監生撥歷初以入監年月為先後丁憂省祭有在家延留七八年者比至入監即得取撥陳敬宗李時勉先後題請一以坐監年月為淺深其後又以存省京儲依親就學在家年月亦作坐堂之數其患病及他事故始以虛曠論諸生互爭年月資次各援科條成化五年祭酒陳鑑以兩詞具聞乞敕禮部酌中定制為禮科所駁鑑復奏互爭之乃下部覆議請一一精核仍計地理遠近水程日月以為準然文移往來紛錯繁揉上下伸縮弊端甚多卒不能畫一也初令監生由廣業升率性始得積分出身天順以前在監十餘年然後撥歷諸司歷事三月仍留一年送吏部銓選其兵部清黃及隨御史出巡者則以三年為率其後以監生積滯者多頻減撥歷歲月以疏通之每歲揀選優者輒與撥歷有未及一年者弘治八年監生在監者少而吏部聽選至萬餘人有十餘年不得官者祭酒林瀚以坐班人少不敷撥歷請開科貢禮部尚書倪嶽覆奏科舉已有定額不可再增惟請增歲貢人數而定諸司歷事必須日月滿後方與更替使諸生坐監稍久選人亦無壅滯及至嘉靖十年監生在監者不及四百人諸司歷事歲額以千計禮部尚書李時引嶽前議言嶽權宜二法一增歲額以足坐班生徒一議差歷以久坐班歲月於是府州縣學以一歲二貢二歲三貢一歲一貢為差行之四歲而止其諸司歷事三月考勤之後仍歷一年其餘寫本一年清黃寫誥清軍清匠三年以至出巡等項俱如舊例日月今國學缺人視弘治間更甚請將前件事例參酌舉行並從之獨不增貢額未幾復以祭酒許誥提學御史胡時善之請詔增貢額如嶽時前議隆萬以後學校積弛一切循故事而已崇禎二年從司業倪嘉善言復行積分法八年從祭酒倪元璐言以貢選為正流援納為閏流貢選不限撥期以積分歲滿為率援納則依原定撥歷為率而歷事不分正雜惟以考定等第為歷期多寡諸司教之政事勿與猥雜差遣滿日校其勤惰開報吏部不率者回監教習時監規頽廢已久不能振作也凡監生歷事吏部四十一名戶部五十三名禮部十三名大理寺二十八名通政司五名行人司四名五軍都督府五十名謂之正歷三月上選滿日增減不定又有諸司寫本戶部十名禮部十八名兵部二十名刑部十四名工部八名都察院十四名大理寺通政司俱四名隨御史出巡四十二名謂之雜歷一年滿日上選又有諸色辦事清黃一百名寫誥四十名續黃五十名清軍四十名天財庫十名初以三年謂之長差後改一年上選承運庫十五名司禮監十六名尚寶司六名六科四十名初作短差後亦定一年上選又有隨御史刷卷一百七十八名工部清匠六十名俱事完日上選又有禮部寫民情條例七十二名光祿寺刷卷四名修齊八名參表二十名報訃二十名齎俸十二名錦衣衛四名兵部查馬冊三十名工部大木廠二十名後府磨算十名御馬監四名天財庫四名正陽門四名崇文宣武朝陽東直俱三名阜城西直安定德勝俱二名以半年滿日回監郡縣之學與太學相維創立自唐始宋置諸路州學官元頗因之其法皆未具迄明天下府州縣衛所皆建儒學教官四千二百餘員弟子無算教養之法備矣洪武二年太祖初建國學諭中書省臣曰學校之教至元其弊極矣上下之間波頽風靡學校雖設名存實亡兵變以來人習戰爭惟知干戈莫識俎豆朕惟治國以教化為先教化以學校為本京師雖有太學而天下學校未興宜令郡縣皆立學校延師儒授生徒講論聖道使人日漸月化以復先王之舊於是大建學校府設教授州設學正縣設教諭各一俱設訓導府四州三縣二生員之數府學四十人州縣以次減十師生月廩食米人六斗有司給以魚肉學官月俸有差生員專治一經以禮樂射御書數設科分教務求實才頑不率者黜之十五年頒學規於國子監又頒禁例十二條於天下鐫立臥碑置明倫堂之左其不遵者以違制論蓋無地而不設之學無人而不納之教庠聲序音重規疊矩無間於下邑荒徼山陬海涯此明代學校之盛唐宋以來所不及也生員雖定數於國初未幾即命增廣不拘額數宣德中定增廣之額在京府學六十人在外府學四十人州縣以次減十成化中定衛學之例四衛以上軍生八十人三衛以上軍生六十人二衛一衛軍生四十人有司儒學軍生二十人土官子弟許入附近儒學無定額增廣既多於是初設食廩者謂之廩膳生員增廣者謂之增廣生員及其既久人才愈多又於額外增取附於諸生之末謂之附學生員凡初入學者止謂之附學而廩膳增廣以歲科兩試等第高者補充之非廩生久次者不得充歲貢也士子未入學者通謂之童生當大比之年間收一二異敏三場並通者俾與諸生一體入場謂之充場儒士中式即為舉人不中式仍候提學官歲試合格乃准入學提學官在任三歲兩試諸生先以六等試諸生優劣謂之歲考一等前列者視廩膳生有缺依次充補其次補增廣生一二等皆給賞三等如常四等撻責五等則廩增遞降一等附生降為青衣六等黜革繼取一二等為科舉生員俾應鄉試謂之科考其充補廩增給賞悉如歲試其等第仍分為六而大抵多置三等三等不得應鄉試撻黜者僅百一亦可絶無也生儒應試每舉人一名以科舉三十名為率舉人屢廣額科舉之數亦日增及求舉者益衆又往往於定額之外加取以收士心凡督學者類然嘉靖十年嘗下沙汰生員之令御史楊宜爭之而止萬曆時張居正當國遂核減天下生員督學官奉行太過童生入學有一州縣僅録一人者其科舉減殺可推而知也生員入學初由巡按御史布按兩司及府州縣官正統元年始特置提學官專使提督學政南北直隸俱御史各省參用副使僉事景泰元年罷提學官天順六年復設各賜敕諭十八條俾奉行之直省既設提學有所轄太廣及地最僻遠歲巡所不能及者乃酌其宜口外及各都司衛所土官以屬分巡道員直隸廬鳳淮揚滁徐和以屬江北巡按湖廣衡永郴以屬湖南道辰靖以屬辰沅道廣東瓊州以屬海南道甘肅衛所以屬巡按御史亦皆專敕行事萬曆四十一年南直隸分上下江湖廣分南北始各增提學一員提學之職專督學校不理刑名所受詞訟重者送按察司輕者發有司直隸則轉送巡按御史督撫巡按及布按二司亦不許侵提學職事也明初優禮師儒教官擢給事御史諸生歲貢者易得美官然鉗束亦甚謹太祖時教官考滿兼核其歲貢生員之數後以歲貢為學校常例二十六年定學官考課法專以科舉為殿最九年任滿核其中式舉人府九人州六人縣三人者為最其教官又考通經即與升遷舉人少者為平等即考通經亦不遷舉人至少及全無者為殿又考不通經則黜降其待教官之嚴如此生員入學十年學無所成者及有大過者俱送部充吏追奪廩糧至正統十四年申明其制而稍更之受贓姦盜冒籍宿娼居喪娶妻妾所犯事理重者直隸發充國子監膳夫各省發充附近儒學膳夫齊夫滿日為民俱追廩米犯輕充吏者不追廩米其待諸生之嚴又如此然其後教官之黜降生員之充發皆廢格不行即臥碑亦具文矣諸生上者中式次者廩生年久充貢或選拔為貢生其纍試不第年踰五十願告退閒者給與冠帶仍復其身其後有納粟馬捐監之例則諸生又有援例而出學者矣提學官歲試校文之外令教官舉諸生行優劣者一二人賞黜之以為勸懲此其大較也諸生應試之文通謂之舉業四書義一道二百字以上經義一道三百字以上取書旨明而已不尚華采也其後標新領異益漓厥初萬曆十五年禮部言唐文初尚靡麗而士趨浮薄宋文初尚鉤棘而人習險譎國初舉業有用六經語者其後引左傳國語矣又引史記漢書矣史記窮而用六子六子窮而用百家甚至佛經道藏摘而用之流弊安窮弘治正德嘉靖初年中式文字純正典雅宜選其尤者刊布學宮俾知趨向因取中式文字一百十餘篇奏請刊布以為準則時方崇尚新奇厭薄先民矩矱以士子所好為趨不遵上指也啓禎之間文體益變以出入經史百氏為高而恣軼者亦多矣雖數申詭異險僻之禁勢重難返卒不能從論者以明舉業文字比唐人之詩國初比初唐成弘正嘉比盛唐隆萬比中唐啓禎比晚唐云自儒學外又有宗學社學武學宗學之設世子長子衆子將軍中尉年未弱冠者俱與焉其師於王府長史紀善伴讀教授等官擇學行優長者除授萬曆中定宗室子十歲以上俱入宗學若宗子衆多分置數師或於宗室中推舉一人為宗正領其事令學生誦習皇明祖訓孝順事實為善陰騭諸書而四書五經通鑑性理亦相兼誦讀尋復增宗副二人子弟入學者每歲就提學官考試衣冠一如生員已復令一體鄉試許得中式其後宗學寖多頗有致身兩榜起家翰林者社學自洪武八年延師以教民間子弟兼讀御製大誥及本朝律令正統時許補儒學生員弘治十七年令各府州縣建立社學選擇明師民間幼童十五以下者送入讀書講習冠婚喪祭之禮然其法久廢寖不舉行武學之設自洪武時置大寧等衛儒學教武官子弟正統中成國公朱勇奏選驍勇都指揮等官五十一員熟嫻騎射幼官一百員始命兩京建武學以訓誨之尋命都司衛所應襲子弟年十歲以上者提學官選送武學讀書無武學者送衛學或附近儒學成化中敕所司歲終考試入學武生十年以上學無可取者追廩還官送營操練弘治中從兵部尚書馬文升言刊武經七書分散兩京武學及應襲舍人嘉靖中移京城東武學於皇城西隅廢寺俾大小武官子弟及勳爵新襲者肄業其中用文武重臣教習萬曆中兵部言武庫司專設主事一員管理武學近者裁去請復專設教官升堂都指揮執弟子禮請遵會典例立為程式詔皆如議崇禎十年令天下府州縣學皆設武學生員提學官一體考取已又申會典事例簿記功能有不次擢用黜退送操奬罰激厲之法時事方棘無所益也
