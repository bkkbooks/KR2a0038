body:
  text: 明史卷一百八十六列傳第七十四韓文顧佐陳仁張敷華楊守隨弟守隅許進子誥讚論雍泰張津陳壽樊瑩熊繡潘蕃胡富張泰吳文度張鼐冒政王璟朱欽韓文字貫道洪洞人宋宰相琦後也生時父夢紫衣人抱送文彥博至其家故名之曰文成化二年舉進士除工科給事中覈韋州軍功劾寧晉伯劉聚都御史王越馬文升等濫殺妄報尋劾越薦李秉王竑語頗涉兩宮帝怒撻之文華殿庭已進右給事中出為湖廣右參議中貴督太和山乾沒公費文力遏之以其羨易粟萬石備振貸九谿土酋與鄰境爭地相攻文往諭皆服閱七年轉左弘治改元王恕以文久淹用為山東左參政居二年用倪岳薦擢雲南左布政使以右副都御史巡撫湖廣移撫河南召為戶部右侍郎母喪除起改吏部進左十六年拜南京兵部尚書歲侵米價翔踴文請預發軍餉三月戶部難之文曰救荒如救焚有罪吾自當之乃發廩十六萬石米價為平明年召拜戶部尚書文凝厚雍粹居常抑抑至臨大事剛斷無所撓武宗即位賞賚及山陵大婚諸費需銀百八十萬兩有奇部帑不給文請先發承運庫詔不許文言帑藏虛賞賚自京邊軍士外請分別給銀鈔稍益以內庫及內府錢幷暫借勳戚賜莊田稅而敕承運庫內官核所積金銀著之籍且盡罷諸不急費帝不欲發內帑命文以漸經畫文持大體務為國惜財真人陳應大國師那卜堅參等落職文請沒其貲實國帑舊制監局倉庫內官不過二三人後漸添注或一倉十餘人上林苑林衡署至三十二人文力請裁汰淳安公主賜田三百頃復欲奪任丘民業文力爭乃止孝宗時外戚慶雲壽寧侯家人及商人譚景清等奏請買補殘鹽至百八十萬引文條鹽政夙弊七事論殘鹽尤切孝宗嘉納未及行而崩即入武宗登極詔中罷之侯家復奏乞下部更議文等再三執奏弗從竟如侯請正德元年內閣及言官復論之詔下廷議文言鹽法之設專以備邊今山陝饑寇方大入度支匱絀飛輓甚難奈何壞祖宗法忽邊防之重景清復陳乞如故文等劾其桀悍請執付法官帝不得已始寢前命榮王乞霸州莊田崇王請自徵莊田租勿令有司與文皆持却之保定巡撫王璟請革皇莊廷議從之帝命再議文請命巡撫官召民佃畝徵銀三分輸內庫而盡撤中官管莊者大學士劉健等亦力言內臣管莊擾民乃命留中官各一人校尉十人餘如文議中旨索寶石西珠文請屏絕珍奇以養儉德報可帝將大婚取戶部銀四十萬兩文連疏請得免四之一文司國計二年力遏權倖權倖深疾之而是時青宮舊奄劉瑾等八人號八虎日導帝狗馬鷹兔歌舞角觝不親萬幾文每退朝對僚屬語及輒泣下郎中李夢陽進曰公大臣義共國休戚徒泣何為諫官疏劾諸奄執政持甚力公誠及此時率大臣固爭去八虎易易耳文捋鬚昂肩毅然改容曰善縱事勿濟吾年足死矣不死不足報國即偕諸大臣伏闕上疏略曰人主辨奸為明人臣犯顏為忠況羣小作朋逼近君側安危治亂胥此焉關臣等伏覩近歲朝政日非號令失當自入秋來視朝漸晚仰窺聖容日漸清削皆言太監馬永成谷大用張永羅祥魏彬丘聚劉瑾高鳳等造作巧偽淫蕩上心擊毬走馬放鷹逐犬俳優雜劇錯陳於前至導萬乘與外人交易狎暱媟褻無復禮體日遊不足夜以繼之勞耗精神虧損志德遂使天道失序地氣靡寧雷異星變桃李秋華考厥占候咸非吉徵此輩細人惟知蠱惑君上以便己私而不思赫赫天命皇皇帝業在陛下一身今大婚雖畢儲嗣未建萬一遊宴損神起居失節雖齏粉若輩何補於事高皇帝艱難百戰取有四海列聖繼承以至陛下先帝臨崩顧命之語陛下所聞也奈何姑息羣小置之左右以累聖德竊觀前古奄宦誤國為禍尤烈漢十常侍唐甘露之變其明驗也今永成等罪惡既著若縱不治將來益無忌憚必患在社稷伏望陛下奮乾剛割私愛上告兩宮下諭百僚明正典刑以回天地之變泄神人之憤潛削禍亂之階永保靈長之業疏入帝驚泣不食瑾等大懼時內閣劉健謝遷等方持言官章不肯下文疏復入帝遣司禮太監李榮王岳等詣閣議一日三至健等持益堅岳素剛直獨曰閣議是是夜八人者環泣帝前帝怒立收岳下詔獄而外廷固未之知也明日文倡九卿科道再詣闕固爭俄有旨宥八人不問健遷倉皇致仕去八人各分據要地瑾掌司禮時事遂大變瑾恨文甚日令人伺文過踰月有以偽銀輸內庫者遂以為文罪詔降一級致仕郎中陳仁謫鈞州同知給事中徐昂乞留文原官中旨謂顯有囑託落文職以顧佐代並除昂名二年三月榜奸黨姓名自劉健謝遷外尚書則文為首餘若張敷華楊守隨林瀚等凡五十三人列於朝堂文子高唐知州士聰刑部主事士奇皆削籍文出都門乘一藍輿行李一車而已瑾恨未已坐以遺失部籍逮文及侍郎張縉下詔獄數月始釋罰米千石輸大同尋復罰米者再家業蕩然瑾誅復官致仕世宗即位遣行人齎璽書存問賚羊酒令有司月給廩四石歲給役夫六人終其身復加太子太保廕一孫光祿寺署丞嘉靖五年卒年八十有六贈太傅諡忠定士聰舉人罷官後不復仕士奇進士終湖廣參政少子士賢亦由舉人為開封同知孫廷瑋進士行太僕卿顧佐字良弼臨淮人成化五年進士授刑部主事歷郎中按錦衣指揮牛循中官顧雄鍾欽罪無所撓出為河間知府弘治中再遷大理少卿擢右僉都御史巡撫山西宗室第宅官為繕費不貲佐請悉令自營治正統末權發太原平陽民戍邊後久不代佐奏令更代入為左副都御史勘罷遼東總兵官李杲太監任良巡撫張玉歷戶部左右侍郎出理陝西軍食善區畫儲蓄餘三年正德改元代韓文為尚書劉瑾憾文捃摭萬端部有故冊逸欲以為文罪逼佐上其事佐不可坐事奪俸三月佐乃再疏乞歸從之瑾憾不置三罰米輸塞上至千餘石家貧稱貸以償卒贈太子太保陳仁字子居莆田人成化末進士弘治中官戶部郎中闕里先聖廟災疏請修省陝西進古璽仁抗疏斥其偽詔召番僧領占竹於四川仁疏諫又請復建文忠臣方孝孺等官多格不行正德初瑾以銀事坐尚書文罪仁並謫後瑾誅累擢至浙江右布政使張敷華字公實安福人父洪御史死土木難敷華少負氣節年七歲里社樹為祟麾羣兒盡伐之景泰初錄死事後入國學舉天順八年進士選庶吉士成化元年與劉大夏願就部曹除兵部主事歷郎中廉重不撓名等於大夏十一年出為浙江參議景寧礦盜起至數千人敷華諭散之執其魁十二人居浙十餘年歷布政使弘治初遷湖廣歲饑令府縣大修學宮以傭直資餓者擢右副都御史巡撫山西中道奔喪服闋還故官部內賦輸大同困於折價敷華請太原以北可通車者仍輸米民便之改撫陝西製婚娶喪葬之式納民於禮妖僧據終南山為逆廷議用兵尚書馬文升曰張都御史能辦此敷華果以計縛僧歸遷南京兵部右侍郎十二年改右都御史總督漕運兼巡撫淮揚諸府高郵湖堤圮浚深溝以殺水勢又築寶應堤民利賴焉改掌南京都察院與吏部尚書林瀚僉都御史林俊祭酒章懋稱南都四君子就遷刑部尚書正德元年召為左都御史其冬大臣與言官請去劉瑾等內閣力主之帝猶豫敷華乃上言陛下宴樂逸遊日狎憸壬政令與詔旨相背行事與成憲交乖致天變上干人心下拂今給事中劉御史朱廷聲徐鈺等連章論列但付所司英國公懋與臣等列名上請但云朕自處置臣竊歎惑請略言時政之弊如四十萬庫藏已竭而取用不已六七歲童子何知而招為勇士織造已停傳奉已革尋復如故鹽法莊田方遣官清覈而奏乞之疏隨聞中官監督京營鎮守四方者一時屢有更易政令紛拏弊端滋蔓夫國家大事百人爭之不足數人壞之有餘願陛下審察疏入不報既而朝事大變宦官勢益張至除夕朝罷忽傳旨與楊守隨俱致仕敷華即日就道至徐州洪坐小艇觸石幾溺死瑾恨未已欲借湖廣倉儲浥爛坐以贓罪修撰康海過瑾曰吾秦人愛張公如父母公忍相薄耶瑾意稍解猶坐敷華奸黨與守隨等榜名朝堂明年六月病且革衣冠揖家廟就榻而卒瑾誅後二年贈太子少保諡簡肅敷華性剛介弘治時劉大夏常薦之帝曰敷華誠佳但為人太峻耳為部郎奉使盜探其囊得七金而已孫鰲山官御史楊守隨字維貞鄞人侍郎守陳從弟也舉成化二年進士授御史巡視漕運覈大同軍餉巡按江西所至以風采見憚六年疏陳六事言郕王受命艱危時削平禍亂功甚大歿乃諡以戾公論不平此非先帝意權奸逞私憾者為之也亟宜改易彰陛下親親之仁尚書李秉効忠守法一時良臣為蕭彥莊誣劾致仕乞即召還律令犯公罪者不罷近御史朱賢婁芳等並除名乞復其官且戒所司毋法外加罪一以律令從事西征之役以數萬甲兵討出沒不常之寇千里轉輸曠日持久恐外患未平內地先敝乞速班師戒邊臣慎封守近例軍官犯罪未結正者遇赦即原致此曹遷延以希倖免自今衆證明白者即據律定案毋使逃罪雖遇赦免亦不得管軍在外官俸兵餉有踰年不給者由郡縣蓄積少也請於起運外量加存留以濟乏匱疏奏時不能從太常少卿孫廣安母喪起復守隨與給事中李和等連章論之乃令守制八年冬以災異陳時政九事廷議四方災傷停遣刷卷御史會昌侯孫繼宗請幷停在京者守隨言繼宗等任情作奸恐罪及假此祈免帝置繼宗不問而刷卷如故山東饑廷議吏納銀免考授冠帶守隨極言不可帝即罷之擢應天府丞未上母憂歸服除無缺添註視事初李孜省授太常寺丞因守隨言改上林監副憾之至是譖於帝中旨責守隨不當添註調南寧知府弘治初召為應天府尹勘南京守備中官蔣琮罪琮嗾其黨郭鏞劾守隨按給事方向獄不公謫廣西右參政久之進按察使八年召為南京右僉都御史提督操江歷兩京大理卿九載滿進工部尚書仍掌大理寺刑部獄送寺覆讞者多加刑主事朱瑬論其非守隨言自永樂間寺已設刑具部囚多未得實安得不更訊帝乃寢瑬奏孝宗崩中官張瑜等以誤用御藥下獄守隨會訊杖之正德元年四月守隨奏每歲熱審行於京師而不行於南京五歲一審錄詳於在京而略於在外皆非是請更定其制報可中官李興擅伐陵木論死令家人以銀四十萬兩求變其獄守隨持之堅獄不得解廷臣之爭餘鹽也中旨詰是何大事守隨語韓文曰事誠有大於是者文遂偕九卿伏闕論八黨文等既逐守隨憤獨上章極論之曰陛下嗣位以來左右近臣不能祗承德意盡取先朝良法而更張之盡誣先朝碩輔而剗汰之天下嗷嗷莫措手足致古今罕見之災交集數月以內陛下獨不思其故乎內臣劉瑾等八人奸險佞巧誣罔恣肆人目為八虎而瑾尤甚日以荒縱導陛下或在西海擎鷹搏兔或於南城躡峻登高禁內鼓鉦震於遠邇宮中火礮聲徹晝夜淆雜尊卑陵夷貴賤引車騎而供執鞭之役列市肆而親商賈之為致陛下日高未朝漏盡不寢此數人者方且竊攬威權詐傳詔旨放逐大臣刑誅臺諫邀阻封章廣納貨賂傳奉宂員多至千百招募武勇收及孩童紫綬金貂盡予爪牙之士蟒衣玉帶濫授心腹之人附己者進官忤意者褫職內外臣僚但知畏瑾不知畏陛下向也二三大臣受遺夾輔今則有潛交默附漏泄事機者矣向也南北羣僚矢心痛疾今則有畫策主文依附時勢者矣而且數易邊境將帥之臣大更四方鎮守之職志欲何為夫太阿之柄不可授人今陛下於兵刑財賦之區機務根本之地悉以委之或掌團營或主兩廠或典司禮或督倉場大權在手彼復何憚於是大行殺戮廣肆誅求府藏竭於上財力匱於下武勇疲於邊上下胥讒神人共憤陛下猶不覺悟方且謂委任得人何其舛也伏望大奮乾綱立置此曹重典遠鑒延熹之失毋使臣蹈蕃武已覆之轍疏入帝不省瑾輩深銜之傳旨致仕守隨去李興遂以中旨免死矣瑾憾未釋三年四月坐覆讞失出逮赴京繫獄罰米千石輸塞上踰年復坐庇鄉人重獄除名追毀誥命再罰米二百石守隨家立破瑾誅復官又十年卒年八十五贈太子少保諡康簡從弟守隅由進士歷官江西參政有政績寧府祿米石徵銀一兩後漸增十之五守隅入請於王裁減如舊瑾惡守隨並罷守隅官瑾死後起官四川終廣西布政使許進字季升靈寶人成化二年進士除御史歷按甘肅山東皆有聲陳鉞激變遼東為御史強珍所劾進亦率同官論之汪直怒搆珍下獄摘進他疏譌字廷杖之幾殆滿三考遷山東副使辨疑獄人稱神明分巡遼東坐累徵下詔獄孝宗嗣位釋還弘治元年擢右僉都御史巡撫大同小王子久不通貢遣使千五百餘人款關進以便宜納之請於朝詔許五百人至京師已而屢盜邊進被劾不問三年復窺邊進等整軍待之新寧伯譚祐以京軍援乃遁去又乞通貢進再為請帝許之當是時大同士馬盛強邊防修整貢使每至關率下馬脫弓矢入館俛首聽命無敢譁者會進與分守中官石岩相訐岩徵還進亦謫兗州知府七年遷陝西按察使土魯番阿黑麻攻陷哈密執忠順王陝巴去使其將牙蘭守之尚書馬文升謂復哈密非進不可乃薦為右僉都御史巡撫甘肅明年涖鎮告諸將曰小醜陸梁謂我不敢深入耳堂堂天朝不能發一鏃塞外何以慰遠人諸將難之乃獨與總兵官劉寧謀厚結小列禿使以四千騎往殺數百人小列禿中流矢卒小列禿故與土魯番世相讐及死其子卜六阿歹益憤進復厚結之使斷賊道無令東援牙蘭而重犒赤斤罕東及哈密遺種之居苦峪者令出兵助討十一月副將彭清以精騎千五百出嘉峪關前行寧與中官陸誾統二千五百騎繼之越八日諸軍俱會羽集乜川薄暮大風揚沙軍士寒栗僵臥進出帳外勞軍有異烏悲鳴將士多雨進慷慨曰男兒報國死沙場幸耳何泣為將士皆感奮夜半風止大雨雪時番兵俱集惟罕東兵未至衆欲待之進曰潛師遠襲利在捷速兵已足用不須待也及明冒雪倍道進又六日奄至哈密城下牙蘭已先遁去餘賊拒守官軍四面並進拔其城獲陝巴妻女賊退保土剌土剌華言大臺也守者八百人諸軍再戰不下問其俘則皆哈密人為牙蘭所劫者進乃令勿攻或欲盡殲之進不可遣使撫諭即下於是探牙蘭所嚮分守要害而疏請懷輯罕東諸衞為援散土魯番黨與孤其勢遂班師錄功加右副都御史明年移撫陝西歷戶部右侍郎進左十三年火篩大舉犯大同邊將屢敗敕進與太監金輔平江伯陳銳率京軍禦之無功言官劾輔等玩寇幷論進致仕去武宗即位乃起為兵部左侍郎提督團營正德元年代劉大夏為尚書七月應詔陳時政八事極言內監役京軍守皇城內侍橫索月錢諸弊多格不行又以帝狎比羣小請崇聖學以古荒淫主為戒不納中官王岳奏官校王縉等緝事捕盜功各進一秩進言邊將出萬死馘一賊始獲晉級此輩乃冒濫得之孰不解體又言團營軍非為營造設宜悉令歸伍居兵部半歲改吏部明年加太子少保進以才見用能任人性通敏劉瑾弄權亦多委蛇徇其意而瑾終不悅方進督團營時與瑾同事每閱操談笑指揮意度閒雅瑾及諸將咸服一日操畢忽呼三校前各杖數十瑾請其故進出權貴請託書示之瑾陽稱善心不喜至是欲去進用劉宇代焦芳以干請不得亦因擠進三年八月南京刑部郎中闕適無實授員外郎進循故事以署事主事二人上瑾以為非制令對狀進不引咎三降嚴旨譙責不得已請罪乃令致仕未幾坐用雍泰削其籍二子誥讚在翰林俱輸贖調外任尋與劉健等六百七十五人並追奪誥命瑾又摘進在大同時籍軍出雇役錢失勾校欲籍其家會瑾誅得解復官致仕未聞命卒年七十四嘉靖五年諡襄毅子誥讚詩詞論詩工部郎中詞知府誥字廷綸進次子也弘治十二年進士授戶科給事中出視延綏軍儲論丁糧丁草之害帝褒納之尋劾監督中官苗逵貪肆罪進刑科右給事中正德元年父進為兵部尚書故事大臣子不得居言職遂改翰林檢討及進忤劉瑾削籍並謫誥全州判官父喪歸久之薦起尚寶丞復引疾歸家居授徒講學嘉靖初起南京通政參議改侍講學士直經筵遷太常卿掌國子監請於太學中建敬一亭勒御製敬一箴註程子四箴范浚心箴於石帝悅從之帝將正文廟祀典誥請用木主文華殿東室舊有釋像帝命撤去誥所撰道統書言宜崇祀五帝三王以周公孔子配帝即採用其言十一年擢吏部右侍郎其冬拜南京戶部尚書弟讚亦長戶部兄弟並司兩京邦計縉紳以為榮卒官贈太子太保諡莊敏誥官祭酒時諸生旅櫬不能歸者三十餘皆為葬之衣食不繼者並周卹然頗善傅會時有白鵲之瑞誥獻論司業陳寰獻頌並宣付史館給事中張裕謝存儒御史馮恩皆劾誥裕至比之祝欽明帝怒下裕獄謫福建布政司照磨存儒亦調邊方恩詆誥學術迂邪誥求罷帝曰恩所詆乃指前日去土偶用木主事也爾以是介意邪其為帝眷寵如此讚字廷美進第三子也弘治九年進士授大名推官亦以辨疑獄知名召拜御史正德元年改編修劉瑾逐進讚亦出為臨淄知縣累遷浙江左布政使嘉靖六年入為光祿卿歷刑部左右侍郎知州金輅謫戍賂武定侯郭勛勛遣人篡取之指揮王臣不與縛臣以歸掠取其賄事覺讚等請論如律帝憐勛諭法司毋刑輅等輅等遂不承尚書高友璣在告坐畏縮被劾去讚請如常訊具得勛納賄狀乃再奪其祿八年進尚書詔許六部歷事監生發廷臣奸弊有詹者訐吏部侍郎徐縉下都御史汪鋐訊語塞已論罪復訐縉及通政陳經等再下鋐訊鋐力斥其妄會太常卿彭澤欲傾縉代之偽為縉書抵張孚敬求解復惎孚敬劾縉賄己縉疏辨詔法司會錦衣衞訊讚等卒論誣罔而縉行賄事莫能白坐除名帝方嘉能奉詔言事竟宥罪於是無賴子率持朝士陰事索貲財妄搆事端入奏諸司為惕息軍人童源訐中官張永造塋犯天壽山龍脈復嗾永弟容僕王謙等發容違法事奸人張雄又為謙草奏詆讚與兄誥及汪鋐廖道南史道內臣黃錦輩數十人受容重賂源亦上疏助之鞫得實源等並戍極邊告訐始少衰十年改讚戶部尚書馳驛歸省母母先卒服未闋詔以為吏部尚書服除始入朝帝以讚醇謹虛位待及至論列不當意詔選宮僚閣臣多引私黨言官劾罷十餘人帝以屬吏部讚乃舉霍韜毛伯溫顧璘呂柟鄒守益徐階任瀚薛蕙周鈇趙時春等詔璘柟蕙仍故官餘俱用之屢加少保兼太子太保九廟災自陳免居半歲帝難其代復起讚任之請發內帑借百官俸括富民財開鬻爵之令以濟邊需時議內地築墩堡讚謂非計帝以借俸括財非盛世事已之墩堡議亦寢翟鑾嚴嵩柄政多所請托郎中王與齡勸讚發之嵩辨之強帝眷嵩反切責讚除與齡籍讚自是懾嵩不敢抗亦頗以賄聞矣鑾罷帝謀代者嵩以讚柔和易制引之詔以本官兼文淵閣大學士參預機務政事一決於嵩讚無所可否久之加少傅以年踰七十數乞休帝責其忘君愛身落職閒住歸三年卒後復官贈少師諡文簡論字廷議進少子也嘉靖五年進士授順德推官入為兵部主事改禮部好談兵幼從父歷邊境盡知阨塞險易因著九邊圖論上之帝喜頒邊臣議行自是以知兵聞累遷南京大理寺丞會廷推順天巡撫論名列第二帝曰是上九邊圖論者即拜右僉都御史任之白通事以千餘騎犯黃崖口論督將士敗之再犯大木谷復為官軍所却錄功進右副都御史歲餘以病免俺答薄都城起故官撫山西錄防秋功進兵部右侍郎召理京營戎政以築京師外城轉左三十三年出督宣大山西軍務奸人呂鶴初與丘富以左道惑衆富叛降俺答為之謀主鶴遣其黨闌出塞外引寇入犯為偵卒所獲論遣兵捕鶴並誅其黨以功進右都御史再以功進兵部尚書廕子錦衣世千戶翁萬達為總督築大同邊牆六百里里建一墩臺於牆內後以兵少牆不能守盡撤而守臺論言兵既守臺則寇攻牆不得用其力及寇入牆率震駭逃散請改築於牆外每三百步建一臺俾矢石相及去牆不得越三十步高廣方四丈五尺其顛損三之一上置女牆營舍守以壯士十人下築月城穴門通出入度工費不過九萬金數月而足詔立從之寇萬騎犯山西論督軍遮破之朔州川其犯宣府龍門者亦為將士所敗先後俘斬五百三十有奇加太子太保廕子如初三十五年兵部尚書楊博以父喪去召論代之當是時嚴嵩父子用事將帥率以賄進南北用兵帝責中樞甚急丁汝夔王邦瑞趙錦聶豹咸不得善去論時已老重自顧念一切將帥黜陟兵機進止悉聽世蕃指揮望由此損俺答子辛愛憤總督楊順納其逃妾擁眾圍大同右衞城數重城中析屋而爨帝聞深以為憂密問嵩嵩意欲棄之而難於發言則請降諭問本兵論請復右衞軍馬歲辦五十萬金故為難詞冀以動帝帝顧亟措餉發兵易置文武將吏右衞圍亦尋解給事中吳時來劾楊順因言論雷同附和日昏酣置邊警度外帝遂削論籍嵩微為之解亦不能救也三十八年復起故官督薊遼保定軍務把都兒犯薊西論厚集精銳以待至則為遊擊胡鎮所破分掠沙兒嶺燕子窩又却乃遁去事聞厚賚銀幣尋又奏密雲昌平二鎮防秋須餉銀三十餘萬給事中鄭茂言論奏請過多請察其侵冒弊詔論回籍聽勘給事中鄧棟往覈具得虛冒狀奪官閒住未幾卒年七十二隆慶初復官諡恭襄曾孫浩然由世廕歷官太子太保左都督浩然子達胤錦衣指揮李自成陷京師不屈死其從兄佳胤弘農衞指揮崇禎十四年賊破靈寶持刀赴鬬死焉雍泰字世隆咸寧人成化五年進士除吳縣知縣太湖漲沒田千頃泰作堤為民利稱雍公堤民妾亡去妾父訟其夫密殺女匿屍湖石下泰詰曰彼密殺汝女汝何以知匿所且此非兩月尸必汝殺他人女冀得賂耳一考而服召為御史巡鹽兩淮竈丁無妻者泰為婚匹出知鳳陽府父憂去服闋起知南陽余子俊督師薦為大同兵備副使擢山西按察使泰剛廉所至好搏擊豪強太原知府尹珍塗遇弗及避泰召至跽而數之珍不服泰竟笞珍珍訴於朝且告泰非罪杖人死逮下詔獄王恕請寬泰罪會事經赦乃降湖廣參議弘治四年轉浙江右布政使復以母憂去十二年起右副都御史巡撫宣府官馬死軍士不能償泰言於朝以官帑市邊軍貧有妻者輒鬻泰請官為資給尚書周經因令貧者給聘財典賣者收贖軍盡歡參將王傑有罪泰劾之下泰逮問泰又請按千戶八人帝以泰屢抑武臣方詔都察院行勘而參將李稽坐事畏泰重劾乞受杖泰取大杖決之稽乃奏泰凌虐帝遣給事中徐仁偕錦衣千戶往按傑復使人走登聞鼓下訟泰妄逮將校至八十六人幷及其壻納賂事法司覈上褫為民武宗立給事中潘鐸等薦泰有敢死之節克亂之才吏部尚書馬文升遂起泰南京右副都御史提督操江固辭不赴正德三年春許進為吏部復起前官七月擢南京戶部尚書劉瑾泰鄉人也怒泰不與通甫四日即令致仕謂進私泰遂削二人籍而追斥馬文升及前薦泰者尚書劉大夏給事中趙士賢御史張津等為民其他罰米輸邊者又五十餘人泰歸居韋曲別墅不入城市瑾誅復官致仕年八十卒卒時榻下有聲若霆者泰奉身儉素貴賓至不過二肉為尚書無緋衣及卒家人始製以斂天啟中追諡端惠張津字廣漢博羅人成化末進士除建陽知縣築城郭遏礦盜建朱熹蔡元定諸賢祠置祭田畀其子孫憂歸補大冶徵授御史弘治十四年冬吏部缺尚書廷臣推馬文升閔珪而津偕同官文森曾大有請用致仕尚書周經兩廣總督劉大夏忤旨下詔獄給事御史論救得釋已言陛下延訪大臣而庶官不預非所以明目達聰也乞命卿佐侍從及考滿朝覲諸外僚咸得以時進見通達下情武宗初巡按廣西劾總鎮中官韋經擅移官帑預平富賀賊被賚出為泉州知府坐嘗舉泰勒為民劉瑾敗起寧波知府遷山東左參政擢右僉都御史提督操江進右副都御史巡撫應天諸府所部水旱請停織造車駕北巡疏諫不報浙孝豐奸民據深山拒捕積二十年莫能制津托別事赴浙悉縛之加戶部右侍郎巡撫如故帝自宣府還復欲北幸津疏切諫不報卒贈南京戶部尚書陳壽字本仁其先新淦人祖志弘洪武間代兄戍遼東遂籍寧遠衞壽少貧甚得遺金坐守至夜分還其主從鄉人賀欽學登成化八年進士授戶科給事中視宣大邊防劾去鎮守中官不檢者又嘗劾萬貴妃兄弟及中官梁芳僧繼曉繫詔獄得釋屢遷都給事中弘治元年王恕為吏部擢壽大理丞劉吉憾恕諷御史劾壽不習刑名冀以罪恕竟調壽南京光祿少卿就轉鴻臚卿十三年冬以右僉都御史巡撫延綏火篩數盜邊前鎮巡官俱得罪去壽至蒐軍實廣間諜分布士馬為十道使互相應援軍勢始振明年諸部大入先以百餘騎來誘諸將請擊之壽不可自出帳擁數十騎據胡牀指麾飲食寇望見疑之引去諸道襲擊斬獲甚多朝廷方遣苗逵等重兵至而壽已奏捷孝宗嘉之加祿一等逵欲乘勝搗巢駐延綏久戰馬三萬匹日費芻菽不貲壽請出牧近塞就水草衆有難色壽跨馬先行衆皆從之省費數十萬當戰捷時或勸注子弟名籍壽曰吾子弟不知弓槊寧當與血戰士同受賞哉竟不許十六年以右副都御史掌南院正德初劉瑾矯詔逮南京科道戴銑薄彥徽等壽抗章論救瑾怒令致仕尋坐延綏倉儲虧損罰米二千三百石布千五百匹貧不能償上章自訴瑾廉知壽貧特免之中官廖堂鎮陝西貪暴楊一清以壽剛果九年正月起撫其地堂初奉詔製氈幄百六十間贏金數萬將遺權倖壽檄所司留備振復戒諭堂勿假貢獻名有所科取堂怒將傾之壽四疏乞休不得堂爪牙數十輩散府縣漁利壽命捕之皆逃歸氣益沮其秋拜南京兵部侍郎陝人號呼擁輿移日不得行踰年乞駭骨就進刑部尚書致仕壽為給事中言時政無隱獨不喜劾人曰吾父戒吾勿作刑官易枉人言官枉人尤甚吾不敢妄言也嘉靖改元詔進一品階遣有司存問時年八十有三壽廉歷官四十年無家可歸寓南京所居不蔽風雨其卒也尚書李充嗣府尹寇天為之斂又數年親舊賻助始得歸葬新淦樊瑩字廷璧常山人天順末舉進士引疾歸養久之授行人使蜀不受餽土官作却金亭識之成化八年擢御史山東盜起奉命捕獲其魁清軍江北所條奏多著為例改按雲南交阯誘邊氓為寇馳檄寢其謀出知松江府運夫苦耗折瑩革民夫令糧長專運而寬其綱用以優之賦役循周忱舊法稍為變通民困大甦憂歸起知平陽弘治初詔大臣舉方面官侍郎黃孔昭以瑩應尚書王恕亦器之擢河南按察使黃河為患民多流移瑩巡振全活甚衆河南田賦多積弊巡撫都御史徐恪欲考本末衆難之瑩曰視萬猶千視千猶百耳何難恪以屬瑩部吏鈎考旬日間宿蠹一清四年遷應天府尹守備中官蔣琮與言官訐奏所蔓引多至罪黜瑩承命推鞫初若不為異者琮大喜後奏其傷孝陵山脈事琮遂下獄充淨軍七年遷南京工部右侍郎尋改右副都御史巡撫湖廣錦田賊結兩廣瑤僮為寇瑩諭散餘黨戮首惡十八人歲餘以疾乞休家居七年中外交薦起故官撫治鄖陽旋改南京刑部右侍郎十六年雲南景東衞晝晦七日宜良地震如雷曲靖大火數發貴州亦多災異命瑩巡視至則劾鎮巡官罪黜文武不職者千七百人廉知景東之變乃指揮吳勇侵官帑圖脫罪因雲霧晦冥虛張其事劾罪之還進本部尚書武宗踐阼致仕歸劉瑾以會勘隆平侯爭襲事連及瑩削籍明年又坐減松江官布罰米五百石輸邊瑩素貧至是益窘三年十一月卒年七十五瑾敗復官贈太子少保諡清簡瑩性誠売心農月坐籃輿戴笠子孫舁行田間曰非徒視稼欲子孫習勞也其後人率教多愿朴力學者熊繡字汝明道州人其先以戍籍自豐城徙焉繡舉成化二年進士授行人奉使楚府巡茶四川力拒餽遺擢御史巡按陝西左布政于璠以官帑銀餽苑馬卿邵進繡發其罪璠遁赴京訐繡帝幷下繡吏謫知清豐璠進亦除名久之鳳翔闕知府擢繡任之弘治初遷山東左參政進右布政使七年以右副都御史巡撫延綏榆林初僅小堡屯兵備冬景泰中始移巡撫總兵官居之遂為西北巨鎮城隘弗能容繡因請增築千二百餘丈涖鎮數年練兵積粟邊政修舉歷兵部左右侍郎尚書劉大夏深倚信之騰驤四衞勇士額三四萬人率虛籍歲糜錢穀數十萬多入奄人家廷臣屢請稽核輒被撓十八年命繡清釐未竟而孝宗崩朝政漸變繡力持不顧得詭冒者萬四千人御馬太監甯瑾等疏請復舊給事御史交章劾瑾大夏亦力爭武宗不得已從之而宥瑾等不問正德元年擢右都御史總督兩廣軍務兼巡撫事既抵鎮盡裁幕府供億秋毫無所取二年與總兵官伏羌伯毛銳討平賀縣僮劉瑾以前汰勇士事深疾繡伺察無所得召掌南京都察院事尋以中旨罷之已復摭延綏倉儲浥爛為繡罪罰米五百石責繡躬輸於邊繡家遂破十年閏四月卒無子巡撫秦金頌其清節於朝贈刑部尚書太僕少卿何孟春以繡承繼孫幼且貧無以為養請如主事張鳳翔孔琦例賜月廩且乞予諡遂諡莊簡給其孫米月一石潘蕃字廷芳崇德人初冒鍾姓既顯始復成化二年舉進士授刑部主事歷郎中雲南鎮守中官錢能為巡撫王恕所劾詔蕃按盡得其實出為安慶知府改鄖陽時府治初設陝洛流民畢聚蕃悉心撫循皆成土著累遷山東湖廣左右布政使弘治九年以右副都御史巡撫四川兼提督松潘軍務宣布威信蠻人畏服單車行松茂莫敢犯遷南京兵部右侍郎就改刑部十四年進右都御史總督兩廣帳下士舊不下萬人蕃汰之纔給使令而已黎寇符南蛇亂海南聚眾數萬蕃令副使胡富調狼土兵討斬之平賊巢千二百餘所論功進左都御史已又平歸善劇賊古三仔唐大鬢等思恩知府岑濬與田州知府岑猛相讐殺攻陷田州猛窮乞援蕃諭濬罷兵不從乃與鎮守太監韋經總兵官伏羌伯毛銳集兵十餘萬分六哨討之濬死傳首軍門斬級四千七百盡平其地迴軍討平南海縣豐湖賊褟元祖捷聞璽書嘉勞蕃奏思恩宜設流官猛搆兵失地宜降同知俾還守舊土兵部尚書劉大夏議猛世濟凶惡不宜歸舊治請兩府皆設流官而降猛為千戶徙之福建帝從之正德改元之正月召為南京刑部尚書踰年致仕初蕃去兩廣岑猛據田州不肯徙知府謝湖畏猛悍亦逗遛事聞逮湖詔獄湖委罪蕃及韋經毛銳經復委罪於尚書大夏劉瑾方惡大夏遂幷逮四人大夏以不從蕃言為罪而蕃亦坐不能撫猛俱謫戍肅州三年九月也既而瑾從戶部郎中莊言遣太監韋霦覈廣東庫藏奏應解贓罰諸物多朽敝梧州貯鹽利軍賞銀六十餘萬兩不以時解逮問蕃及前總督大夏前左布政使仁和沈銳等八百九十九人罰米輸邊銳廉介已遷南京刑部右侍郎乞休歸至是奪職瑾誅蕃以原官致仕踰六年卒銳至嘉靖初始復職致仕方蕃解官歸無屋稅他人宅居之與鄉人飲露坐花下醉則任所之其風致如此胡富字永年績溪人成化十四年進士授南京大理評事弘治初歷福建僉事福寧繫囚二百餘人富一訊皆定囹圄頓空以憂去起補山東遷廣東副使四會瑤亂剿擒五百餘人瀧水瑤出沒無時富度其所經地得荒田三千餘頃招僮戶耕牧其中瑤畏僮不敢出擾居民得田作符南蛇圍儋州富與參議劉信往覘賊突至殺信富手斬劇賊一人賊乃退還益兵討平之歷陝西左右布政使正德初入為順天府尹三年進南京大理寺卿就遷戶部右侍郎五年正月坐大理時勘事遲緩勒致仕亦瑾意也瑾敗起故官七年拜本部尚書南都倉儲僅支一年富在部三載有六年積上十餘事率權貴所不便格不行遂引年歸嘉靖元年卒贈太子少保諡康惠張泰字叔亨廣東順德人成化二年進士除知沙縣時經鄧茂七之亂泰撫綏招集流亡盡復入為御史偕同官諫萬貴妃干政廷杖幾斃出督京畿學校以憂去家居十餘年弘治五年起故官按雲南孟密土舍思揲搆亂以兵遏木邦宣慰使罕穵法於孟乃砦守臣撫諭拒不聽泰與巡撫張誥集兵示必討思揲懼始罷兵滇池溢為民災泰築堤以弭其患還朝乞罷織造內臣減皇莊及貴戚莊田被災稅賦給畿省災民牛種詔止給牛種餘不行寇入永昌甘肅遊擊魯麟委罪副總兵陶禎而總兵官劉寧疏言守臣不和詔泰往勘泰奏鎮守太監傅惪故總兵官周玉侵據屯田巡撫馮續減削軍餉寇數入莫肯為禦失士卒六百餘馬駝牛羊二萬皆不以聞帝怒下之吏惪降內使錮南京續編氓口外泰又言甘州膏腴地悉為中官武臣所據仍責軍稅城北草湖資戍卒牧馬今亦被占請悉歸之軍且推行於延寧二鎮詔皆從之遷太僕少卿改大理初薊州民田多為牧馬草場所侵又侵御馬監及神機營草場皇莊貧民失業草場亦虧故額孝宗屢遣給事中周旋侍郎顧佐熊翀等往勘皆不能決至是命泰偕錦衣官會巡撫周季麟復勘泰密求得永樂間舊籍參互稽考田當歸民者九百三十餘頃而京營及御馬監牧地咸不失故額奏入駁議者再尚書韓文力持之留中未下及武宗嗣位文再請始出泰奏流亡者咸得復業尋遷右副都御史督儲南京奏釐革十二事多報可正德二年召為工部右侍郎踰年遷南京右都御史泰清謹劉瑾專權朝貴爭賂遺泰奏表至京惟餽土葛瑾憾之其年十月令以南京戶部尚書致仕明年七月卒摭他事罰米數百石瑾誅予葬祭如制吳文度字憲之晉尪人從父客江寧遂家焉登成化八年進士除龍泉知縣徵授南京御史偕同官孫需等論妖僧繼曉被廷杖尋遷汀州知府瑤弗靖設方略綏撫瑤承賦如居民弘治中歷江西左參政山西河南左右布政使正德元年遷右副都御史巡撫雲南師宗州賊阿本等作亂諭不從乃遣參議陳一經等督軍二萬攻之別遣兵截盤江據賊巢背先後俘斬千人入歷戶部侍郎三年冬進南京右都御史方文度召自雲南劉瑾以地產金寶屢責賄文度無以應瑾深銜之會工部尚書李鐩致仕廷推文度及南京戶部侍郎王珩遂改文度南京戶部尚書與珩俱致仕命下舉朝駭異既歸所居屋僅數椽瑾誅未及用而卒珩趙人起家進士亦以清操聞張鼐字用和歷城人成化十一年進士授襄陵知縣入為御史憲宗末年數笞言官鼐力諫又嘗劾妖僧繼曉方士鄧常恩等帝心惡之出按江西盜賊多強宗佃僕鼐與巡撫閔珪交奏其事尹直等搆之乃貶珪而坐鼐尹旻黨謫郴州判官弘治初擢河南僉事進參議以協治黃陵岡遷副使十五年進按察使鼐官河南久屢遭河患督治有方民為立祠是年秋擢右僉都御史巡撫遼東時軍政久弛又許餘丁納貲助驛遞給冠帶復其身邊人競援例避役鼐言不可因條上定馬制核屯糧清隱占稽客戶減軍伴數事悉允行尋劾分守中官劉恭貪虐罪築邊牆自山海關迄開原靉陽堡凡千餘里遼撫自徐貫後歷張岫張玉陳瑤韓重四人多得罪去至鼐稱能武宗立移撫宣府正德改元召還尋進右副都御史署院事有知縣犯贓當褫職卒殺人當抵死劉瑾納重賄欲寬之鼐執不可出為南京右都御史焦芳子黃中欲強市其居畀通政魏訥鼐不從芳父子亦怨之會瑾遣給事中王翊等覈遼東軍餉還奏芻粟多浥爛遂以為守臣罪逮鼐及繼任巡撫馬中錫鄧章前參政冒政參議方矩郎中王藎劉繹下詔獄令其家人輸米遼東鼐坐輸二千石以力不辦繫遼東久之總兵官毛倫等具奏諸人苦狀請得折價瑾勉從之閱三年事始竟皆斥為民瑾誅復官鼐前卒世宗初予卹冒政泰州人鼐同年進士歷官右副都御史巡撫寧夏守官廉劉瑾覬賄不得遂假遼東事逮之罰米至三千石瑾誅復職致仕久之卒王璟字廷采沂人成化八年進士為登封知縣歷兩京御史弘治十四年以南京鴻臚卿拜右僉都御史理兩浙鹽政振荒浙江奏行荒政十事多所全活十七年冬巡撫保定武宗立太監夏綬乞於真定諸府歲加葦場稅少監傅琢請履畝覈靜海永清隆平諸縣田太監張峻欲稅寧晉小河往來客貨詔皆許之又以莊田故遣緹騎逮民魯堂等二百餘人畿南騷動璟抗疏切諫尚書韓文等力持之管莊內臣稍得召還正德元年四月引疾致仕命馳傳歸三年坐累奪官閒住六年起撫山西製火槍萬餘槍藏箭六皆傅毒藥用以禦寇寇不敢西累遷右都御史已遷左以張綸為右都御史代之後陳金以太子太保左都御史入院位璟上人號璟中都御史焉時羣小用事大臣靡然附之璟獨守故操再進太子太保世宗立致仕卒贈少保諡恭靖初璟自保定巡撫歸其後兵科給事中高淓勘滄州鹽山牧地劾六十一人及璟與前巡撫都御史高銓銓即淓父也詔去職者勿問璟銓並獲免銓江都人累官南京戶部尚書正德二年廷推左都御史瑾勒令致仕尋坐事逮下獄復坐隆平侯家襲爵事除名罰米五百石後瑾益事操切每遣使勘核多務苛急承瑾意淓遂幷銓在劾中淓後官至光祿少卿以劾父不齒於人瑾誅銓復官致仕卒贈太子少保朱欽字懋恭邵武人師吳與弼以學行稱舉成化八年進士授寧波推官治最徵授御史出督漕運按河南清軍廣西並著風節弘治中遷山東副使歷浙江按察使十五年入覲吏部舉天下治行卓異者六人欽與焉僉都御史林俊又舉欽自代乃稍遷湖廣左布政使武宗立以右副都御史巡撫山東中官王岳被謫道死欽上言岳謫守祖陵罪狀未暴賜死道路不厭人心臣知岳為劉瑾輩所惡必瑾譖毀以至此望陛下察岳非辜懲瑾讒賊疏至瑾屏不奏銜之欽以山東俗淫酗嚴禁市酤令濟南推官張元魁察之犯者罪及鄰比有懼而自縊者其母欲奏訴元魁與知府趙璜賄之乃已瑾使偵事校尉發之俱逮下詔獄勒欽致仕璜除名元魁謫戍瑾憾欽未已摭前湖廣時小故下巡按御史逮問俄坐山東勘地事斥為民又坐修曲阜先聖廟會計數多罰輸米六百石塞下又坐撫山東時以民夫給事尚書秦紘家再下巡按御史逮問瑾誅乃復官十五年卒年七十七與弼之門以宦學顯者欽為稱首贊曰武宗初劉謝受遺輔政韓文張敷華等為列卿長當路多正人國事有賴八虎潛伏左右雖未敢顯與朝士為難固腹心之蠹也夫以外攻內勢所甚難況相權之輕遠異前代雖抱韓琦之忠初無書敕之柄區區爭勝於筆舌間此難必之剛明之主而以望之武宗庸有濟乎一擊不勝反噬必毒消長之機間不容髮宦豎之貽禍烈也吁可畏哉
