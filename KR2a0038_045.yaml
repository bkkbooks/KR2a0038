body:
  text: 明史卷四十五志第二十一地理六福建廣東廣西福建禹貢揚州之域元置福建道宣慰使司治福州路屬江浙行中書省至正十六年正月改宣慰司為行中書省太祖吳元年十二月平陳友定洪武二年五月仍置福建等處行中書省七年二月置福州都衛與行中書省同治八年十月改福州都衛為福建都指揮使司九年六月改行中書省為承宣布政使司領府八直隸州一屬縣五十七為里三千七百九十七北至嶺與浙江界西至汀州與江西界南至詔安與廣東界東至海距南京二千八百七十二里京師六千一百三十三里洪武二十六年編戶八十一萬五千五百二十七口三百九十一萬六千八百六弘治四年戶五十萬六千三十九口二百一十萬六千六十萬曆六年戶五十一萬五千三百七口一百七十三萬八千七百九十三福州府元福州路屬福建道太祖吳元年為府領縣九閩倚南有釣臺山亦曰南臺山東南有鼓山南有方山一名甘果山下有官母嶼有巡檢司東南濱海南有閩江亦曰建江自南平縣流入府界東南納羣川之水至府西曰洪塘江分二流南出曰陶江東出曰南臺江至鼓山下合為一又東南有馬頭江自永福縣流入曰西峽江又東有東峽江流合焉又東南至五虎門入於海東有閩安鎮巡檢司侯官倚西有旗山有雪峯山有建江又有西禪浦西南有陽崎吳山鳳岡澤苗延澤仙坂等六浦皆建江支分仍合正流入海西北有懷安縣洪武十二年移入郭內與閩侯官同治萬曆八年九月省西北有竹崎又有五縣寨二巡檢司長樂府東少南東濱海有海堤北有馬頭江又東有守禦梅花千戶所洪武二十一年二月置東北有石梁蕉山東南有松下鎮二巡檢司又東有小祉山巡檢司後移治大祉澳福清府南少東元福清州洪武二年二月降為縣東南際海有鹽場海中有海壇山又有小練山南有龍江又有徑江東南有海口江皆匯流入海又東有鎮東衛東南有守禦萬安千戶所俱洪武二十一年二月置又有澤朗山有牛頭門又南有壁頭山三巡檢司又東有海口鎮巡檢司洪武二十年移於長樂縣之松下鎮連江府東北東北濱海海中有北茭鎮巡檢司南有連江東入海東北有守禦定海千戶所洪武二十一年二月置羅源府東北東濱海西有羅川南流分三派入海南有應德鎮古田府西北建江在縣南自南平縣流入經城南有大溪流合焉謂之水口又東南徑模天嶺下江流至此始出險就平東入閩清縣界東有杉洋鎮出銀坑有巡檢司後廢又西南有谷口鎮西北有西溪鎮二巡檢司尋廢閩清府西北西南有大帽山北有建江西南有梅溪流合焉東有青窰鎮巡檢司廢永福府西南西南有高蓋山又南有陳山東有東溪匯諸山溪之水下流會於福清之龍江而入海又有漈門巡檢司後移於嵩口埕尋復故興化府元興化路屬福建道宣慰司洪武元年為府領縣二北距布政司二百八十里莆田倚東南濱海海中有湄洲嶼又有南日山俱東與琉球國相望又南有木蘭溪北有延壽溪東北有荻蘆溪又有通應港俱會流入海又西北有興化縣正統十三年四月省東有平海衛東南有守禦莆禧千戶所俱洪武二十一年二月置東有嵌頭西北有大洋寨東南有吉了三巡檢司東有沖沁巡檢司本治尋陽後徙興福又有青山巡檢司本治武盛里南哨後徙奉國里東南有南日山巡檢司後徙新安東北有迎仙寨巡檢司後移鼓樓山東有峙頭東南有小峙二巡檢司後廢仙游府西北有二飛山東北有何嶺南臨九鯉湖湖在萬山中下流入莆田縣界合於延壽溪西有三會溪即木蘭溪上源西有白嶺巡檢司後遷於文殊寨南有楓亭市西有潭邊市二巡檢司後廢建寧府元建寧路屬福建道宣慰司洪武元年為府領縣八四年正月置建寧都衛於此八年十月改為福建行都指揮使司東南距布政司五百二十五里建安倚東北有鳳凰山産茶東有東溪即建江自浙江慶元縣流經此又西合於西溪又東南有壽嶺巡檢司甌寧倚西有西溪源出崇安縣東會諸溪之水流入縣境又東合於東溪南入延平府界西北有營頭街巡檢司建陽府西北西北有西山東南有錦江亦曰交溪有二源合流於縣東東山下南流達於建溪崇安府西北南有武夷山中有清溪九曲流入崇溪西北有分水嶺上有分水關巡檢司其水西流者入江西境東流者入縣境即崇溪源俗謂之大溪經城西而南出亦謂之西溪其別源出縣東北之岑陽山亦曰東溪西南流合於西溪又南合武夷水而入建陽縣界即錦江之上源也又西北有溫林岑陽桐木焦嶺谷口寮竹觀音等關與分水關為崇安入關浦城府東北北有漁梁山建溪之源出焉又有蓋仙山有黎嶺又有楓嶺一名大竿嶺皆浙閩通途又東北有柘嶺與浙江麗水縣分界柘水出焉流合大溪又南有南浦溪亦曰大溪即建溪也下合建陽之交溪東有高泉東北有溪源西北有盆亭三巡檢司松溪府東東有萬山東北有鷲峯山接浦城及浙江之龍泉界南有松溪源出浙江慶元縣亦謂之松源水又西有杉溪下流俱入於建溪北有二十四都巡檢司南有東關巡檢司後遷於烏鞍嶺又遷於鐵嶺又遷於峽橋政和府東南有七星溪源出縣東之銅盤山下流合於松溪又東有丹溪流經福安縣入海又東南有赤巖巡檢司壽寧府東景泰六年八月以政和縣楊海村置析福安縣地益之東有蟾溪即福寧州長溪上源也東有漁溪巡檢司後遷縣北之官臺山又遷斜灘鎮延平府元延平路屬福建道宣慰司洪武元年為府領縣七東南距布政司四百五里南平倚南有九峯山東北有衍仙山城東南有劍溪即建江也亦曰東溪自建寧府流入南經黯淡灘又西徑劍津與西溪合西溪出汀邵二府之境至縣西合於沙縣之沙溪為沙溪口又東至劍津合於東溪又南至尤溪口合於大溪亦名南溪又東至福州府入於海俗亦謂之三溪東南有蒼峽西北有大曆二巡檢司將樂府西南有天階山西北有百丈山南有將溪亦曰大溪即西溪之上源也又西北有梅溪自邵武界流入合於大溪又北有萬安寨巡檢司沙府西南西北有幼山縣治南有沙溪亦名太史溪自永安縣流入經縣東有霹靂等灘下流合於西溪北有北鄉寨巡檢司尤溪府南北有丹溪嶺一名桃木嶺下有丹溪東有尤溪其上源一出龍巖縣一出德化縣合流於縣西南又北流會湯泉等二十溪北出尤口入建溪亦曰湖頭溪西有英果寨又有高才坂二巡檢司順昌府西少北南有徘徊嶺西北有順陽溪源出建陽縣又東經縣南與將溪合又東經沙口合邵武縣之沙溪又東經縣西與西溪合西溪即邵武縣之紫雲溪也又東入南平縣界為南平之西溪又西北有仁壽鎮巡檢司永安府西南本沙縣之浮流巡檢司正統十四年置永安千戶所於此景泰三年改置縣析尤溪縣地益之東北有貢川山東南有石羅山西有燕溪四源合流經城東北下流為沙縣之沙溪又西有安砂鎮西南有湖口寨二巡檢司又西北有黃楊巡檢司廢大田府西南嘉靖十五年二月以尤溪縣之大田置析永安漳平德化三縣地益之北有五臺山南有大仙山東有銀瓶山産銀鐵又南有尤溪自龍岩縣流入又東入尤溪縣境又東南有花橋巡檢司又西南有桃源店巡檢司本屬漳平縣後來屬北有英寨西南有安仁隘二巡檢司後廢汀州府元汀州路屬福建道宣慰司洪武元年為府領縣八東距布政司九百七十五里長汀倚北有臥龍山又北有新樂山貢水出焉流入江西界西有新路嶺東有鄞江即東溪亦曰左溪自寧化縣流入下流經廣東大埔縣入海中有五百灘亦謂之汀水又東南有正溪西有西溪北有北溪南有南溪俱合於東溪又西有古城寨巡檢司寧化府東北南有潭飛漈又有大溪源出縣北萬斛泉分流為清流縣之清溪其正流入長汀縣為鄞江上流北有安遠寨巡檢司上杭府南西有金山上有膽泉浸鐵能成銅西南有羊山産礦南有大溪武平府西南北有黃公嶺南有化龍溪下流入廣東程鄉縣西南有武平城洪武二十四年正月置武平千戶所於此東南有象洞巡檢司後移於縣西南之懸繩隘北有永平寨巡檢司後移縣西北之貝寨清流府東北南有豐山東南有鐵石山南臨九龍溪有鐵石磯頭巡檢司西南有清溪自寧化縣流入東北合半溪又東南經九龍灘而入永安縣界亦曰龍溪即燕溪之上源連城府東南本曰蓮城洪武十七年後改蓮曰連東有蓮峯山南有文溪下流達於清流縣之清溪西南有北園寨巡檢司後遷於縣南之朗村隘後又遷於縣西南之新泉隘歸化府東北成化七年正月以清流縣之明溪鎮置析將樂沙縣寧化三縣地益之北有鐵嶺南有歸化溪下流合將樂縣之將溪東有夏陽巡檢司永定府南成化十四年以上杭縣溪南里之田心地置析勝運等四里益之西有大溪即汀水自上杭縣流經此又東入廣東大埔縣界東南有三層嶺巡檢司東北有太平巡檢司後徙高坡西南有興化巡檢司治溪南里古鎮尋廢復置後遷於上杭縣之峯頭邵武府元邵武路屬福建道宣慰司太祖吳元年為府領縣四東南距布政司六百七十里邵武倚東有三臺山東南有七臺山又有道人峯又有樵溪源自樵嵐山經城內出北門合紫雲溪流至順昌縣為順陽溪又東南有水口巡檢司又東有拏口南有同巡東北有楊坊三巡檢司廢光澤府西北北有雲際嶺西北有杉嶺杉關在其上與江西南城縣接界杭川出焉亦名大溪下流入紫雲溪又有大寺寨巡檢司在杉關東又西北有黃土關泰寧府西南西有金鐃山西北有大杉嶺西有二十四溪南有灘江流合焉下流會於樵溪建寧府西南北有百丈嶺藍溪出焉南有綏江源出金鐃山一名濉江亦名寧溪至綏城口合藍溪流入泰寧縣界西有西安巡檢司本治里心保後遷丘坊隘尋廢後復置後又遷新安保之黃泥鋪泉州府元泉州路屬福建道宣慰司洪武元年為府領縣七東距布政司四百十里晉江倚東北有泉山一名清源東南有寶蓋山南有靈源山東南濱海有鹽場海中有彭湖嶼南有晉江自南安縣流入經城西石塔山下又東南至岱嶼入海東北有洛陽江南流入海又東南有永寧衛南有守禦福泉千戶所俱洪武二十一年二月置東南有祥芝又有烏潯南有深滬又有圍頭四巡檢司西南有安平城嘉靖中築東南有石湖城萬曆中築南安府西少北東南濱海南有黃龍溪即晉江之上流西有桃林溪流入焉南有石井巡檢司又西北有澳頭西南有達河二巡檢司後廢同安府西南西有文圃山南濱海有鹽場西北有西溪流合縣東之東溪縣西之苧溪又東南注於海西南有守禦金門千戶所西有守禦高浦千戶所俱洪武二十一年二月置又西南有永寧中左千戶所在嘉禾嶼即厦門也洪武二十七年二月置西有苧溪南有塔頭山東南有田浦又有陳坑四巡檢司又西南有白礁巡檢司後移於縣西之草淮口寨東南有烈嶼巡檢司後移於石潯港口又有官澳巡檢司後移於踏石寨又有峯上巡檢司後移於縣西之下店港口惠安府東北東南濱海有鹽場西有洛陽江又東南有守禦崇武千戶所洪武二十一年二月置嘉靖中移於縣東北城東有黃崎南有獺窟東南有小岞東北有峯尾四巡檢司又東北有塗嶺又有沙格東南有小兜三巡檢司洪武二十年廢安溪府西西北有佛耳山南有藍溪又西北有源口渡巡檢司後遷白華堡尋復永春府西北西北有雪山桃林溪出焉東徑南安縣北合藍溪為雙溪口又東徑南安縣南合於黃龍溪西有陳岩寨巡檢司洪武中廢德化府西北西北有戴雲山西有太湖山南有丁溪又有滻溪合而北流入興化仙遊境又西北有高鎮巡檢司本東西團後