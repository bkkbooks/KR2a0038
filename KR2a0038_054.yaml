body:
  text: 明史卷五十四志第三十禮八嘉禮二册皇后儀册妃嬪儀附册皇太子及皇太子妃儀册親王及王妃儀册公主儀附皇帝加元服儀皇太子皇子冠禮品官冠禮庶人冠禮册皇后儀古者立后無册命禮至漢靈帝立宋美人為皇后始御殿命太尉持節奉璽綬讀册皇后北面稱臣妾跪受其後沿為定制而儀文代各不同明儀注大抵參唐宋之制而用之太祖初定制凡册皇后前期三日齋戒遣官祭告天地宗廟前一日侍儀司設册寶案於奉天殿御座前設奉節官位於册案之東掌節者位於其左稍退設承制官位於其南俱西向設正副使受制位於橫街之南北向設承制宣制官位於其北設奉節奉册奉寶官位於其東北俱西向設正副使受册寶褥位於受制位之北北向典儀二人位丹陛上南贊禮二人位正副使北知班二人位贊禮之南俱東西相向百官及侍從位如朝儀是日早列鹵簿陳甲士設樂如儀內官設皇后受册位及册節寶案於宮中設香案於殿上設權置册寶案於香案前設女樂於丹陛質明正副使及百官入鼓三嚴皇帝袞冕御奉天殿禮部官奉册寶各置於案諸執事官各人就殿上位立樂作四拜興樂止承制官奏發皇后册寶承制訖由中門出降自中陛至宣制位曰有制正副使跪承制官宣制曰册妃某氏為皇后命卿等持節展禮宣畢由殿西門入正副使俯伏興執事者舉册寶案由中門出降自中陛奉節官率掌節者前導至正副使褥位以案置於北掌節者脫節衣以節授奉節官奉節官以授正使正使以授掌節者掌節者跪受興立於正使之左奉節官退引禮引正使詣受册位奉册官以册授正使正使跪受置於案退復位副使受寶亦如之樂作正副使四拜興樂止正使隨册副使隨寶掌節者前導舉案者次之樂作出奉天門樂止侍儀奏禮畢駕興百官出掌節者加節衣奉册寶官皆搢笏取册寶置龍亭內儀仗大樂前導至中宮門外樂作皇后具九龍四鳳冠服褘衣出閣至殿上南向立樂止正副使奉册寶權置於門外所設案上引禮引正副使及內使監令俱就位正使詣內使監令前稱册禮使臣某副使臣某奉制授皇后册寶內使監令入告皇后出復位引禮引內外命婦入就位正使奉册授內使監令內使監令跪受以授內官副使授寶亦如之各復位內使監令率奉册奉寶內官入各置於案尚儀引皇后降陛詣庭中位立內官奉册寶立於皇后之東西內使監令稱有制尚儀奏拜皇后拜樂作四拜興樂止宣制訖奉册內官以册授讀册內官讀訖以授內使監令內使監令跪以授皇后皇后跪受以授司言奉寶如前儀受訖以授司寶尚儀奏拜皇后拜如前內使監令出詣正副使前稱皇后受册禮畢使者退詣奉天殿橫街南北面西上立給事中立於正副使東北西向正副使再拜復命曰奉制册命皇后禮畢又再拜給事中奏聞乃退皇后既受册寶升座引禮引內命婦班首一人詣殿中賀位跪致詞曰茲遇皇后殿下膺受册寶正位中宮妾等不勝歡慶謹奉賀贊拜樂作再拜興樂止退復位又引外命婦班首一人入就殿上賀位如內命婦儀禮畢俱出皇后降座樂作還閣樂止次日百官上表箋稱賀皇帝御殿受賀如常儀遂卜日行謁廟禮先遣官用牲牢行事告以皇后將祗見之意前期皇后齋三日內外命婦及執事內官齋一日設皇后拜位於廟門外及廟中設內命婦陪祀位於廟庭南外命婦陪祀位於內命婦之南司贊位皇后拜位之東西司賓位內命婦之北司香位香案右陳盥洗於階東司盥洗官位其所至日內外命婦各翟衣集中宮內門外皇后具九龍四鳳冠服褘衣出內宮門升輿至外門外降輿升重翟車鼓吹設而不作尚儀陳儀衛次外命婦次內命婦皆乘車前導內使監扈從宿衛陳兵仗前後導從皇后至廟門司賓引命婦先入皇后降車司贊導自左門入就位北向立命婦各就位北向立司贊奏拜司賓贊拜皇后及命婦皆再拜興司贊請詣盥洗位盥手帨手由東陛升至神位前司贊奏上香者三司香捧香於右皇后三上訖導復位贊拜如前司贊奏禮畢皇后出自廟之左門命婦以次出皇后升車命婦前導如來儀過廟鼓吹振作皇后入宮是日皇帝宴羣臣於謹身殿皇后宴內外命婦於中宮皆如正旦宴會儀及成祖即位册皇后徐氏其制小異皇帝皮辨服御華蓋殿翰林院官以詔書用寶訖然後御奉天殿傳制皇后受册禮畢翰林官以詔書授禮部官禮部官奉詔書於承天門開讀皇帝還宮率皇后具服詣奉先殿謁告畢皇后具服於內殿俟皇帝升座贊引女官導詣拜位行謝恩禮樂作八拜興樂止禮畢次日皇帝皇后受賀宴會如前儀天順八年增定親王於皇帝前慶賀次詣皇太后慶賀次詣皇后前八拜儀嘉靖十三年册皇后方氏禮臣具儀注有謁告內殿儀無謁告太廟世廟之禮帝命議增於是禮臣以儀上先期齋三日所司陳設如時祫儀至日皇帝御輅皇后妃御翟車同詣太廟命官奉七廟主升神座訖皇帝奉高皇帝主皇后奉高皇后主出升神座迎神上香奠帛祼獻樂作止皆如儀次詣世廟行禮同上儀隆慶元年增定頒詔次日命婦行見皇后禮册妃之儀自洪武三年册孫氏為貴妃定皇帝不御殿承制官宣制曰妃某氏特封某妃命卿等持節行禮但授册無寶餘並如中宮儀永樂七年定册妃禮皇帝皮辨服御華蓋殿傳制至宣宗立孫貴妃始授寶憲宗封萬貴妃始稱皇非洪武之舊矣嘉靖十年帝册九嬪禮官上儀注先日所司陳設儀仗如朔望儀至期皇帝具袞冕告太廟世廟訖易皮辨服御華蓋殿百官公服入行禮正副使朝服承制舉節册至九嬪宮九嬪迎於宮門外隨至拜位女官宣册九嬪受册先後八拜送節出宮門復命九嬪隨具服候皇后率詣奉先殿謁告及詣皇帝皇后前謝恩俱如册妃禮惟圭用次玉穀文銀册少殺於皇妃五分之一二十年册德妃張氏以妃將就室而帝方靜攝不傳制不謁告內殿餘並如舊册皇太子及皇太子妃儀自漢代始稱皇太子明帝始有臨軒册拜之儀唐則年長者臨軒册授幼者遣使內册宋惟用臨軒元惟用內册不以長幼明興定制册皇太子所司陳設如册后儀設皇太子拜位於丹陛上中嚴皇帝袞冕御謹身殿皇太子冕服俟於奉天門外辦皇帝升奉天殿引禮導皇太子入奉天東門樂作由東階升至丹陛位樂止百官各就丹墀位樂作皇太子再拜興樂止承制官由殿中門出立於門外曰有制皇太子跪宣制曰册長子某為皇太子皇太子俯伏興樂作再拜樂止引禮導皇太子由殿東門入樂作內贊導至御座前樂止內贊贊跪贊宣册宣畢贊搢圭贊授册皇太子搢圭跪受册以授內侍復贊授寶如授册儀贊出圭皇太子出圭俯伏興由殿東門出執事官舉節册寶隨出皇太子復位樂作四拜興樂止由東階降樂作至奉天門樂止儀仗鼓樂迎册寶至文華殿持節官持節復命禮部官奉詔書赴午門開讀百官迎詔至中書省頒行侍儀奏禮畢駕興還宮皇太子詣內殿候皇后升座行朝謝禮四拜恭謝曰小子某茲受册命謹詣母后殿下恭謝復四拜禮畢親王世子郡王俟於文華殿陛上皇太子升座親王以下由東陛升就拜位四拜長王恭賀曰小弟某茲遇長兄皇太子榮膺册寶不勝欣忭之至謹率諸弟詣殿下稱賀賀畢皆四拜皇太子興以次出諸王詣中宮四拜長王致詞賀畢皆四拜出是日皇太子詣武英殿見諸叔行家人禮四拜諸叔西向坐受見諸兄行家人禮二拜諸兄西向立受次日百官進表箋慶賀內外命婦慶賀中宮如常儀乃擇日太子謁太廟洪武二十八年皇太子親王俱授金册不用寶永樂二年定先三日齋戒遣官祭告天地宗廟受册寶畢先詣太廟謁告後至奉天殿謝恩乃入謝中宮二十二年十月册東宮以梓宮在殯樂設而不作奉先殿行禮畢仍詣几筵謁告宣德二年十一月皇子生羣臣表請立太子三年二月行禮以太子尚幼乃命正副使授册寶於文華門成化十一年以册立皇太子禮成文武官分五等賜綵緞有差嘉靖十八年二月册東宮帝詣南郊告上帝詣太廟告皇祖自北郊及列聖宗廟以下皆遣官時太子方二歲保姆奉之迎册寶於文華殿門詣皇帝前謝恩皇后貴妃代太子八拜詣皇后前貴妃代八拜詣貴妃前保姆代四拜餘如常儀其皇太子妃受册與皇太子同日傳制節册將至內殿妃降自東階迎置於案贊就拜位贊跪妃跪贊宣册女官跪取册立宣畢贊授册贊搢圭女官以册授妃妃搢圭受册訖以授女官女官跪受捧立贊出圭興四拜禮畢內官持節出妃送至殿外正副使持節復命是日妃具禮服詣奉先殿行謁告禮隨詣宮門俟皇帝皇后升座入謝恩行八拜禮又詣各宮皇妃前行四拜禮還宮詣皇太子前亦四拜禮畢升座王妃公主郡主及外命婦於丹墀拜賀如儀册親王及王妃儀漢册親王於廟唐臨軒册命禮極詳備宋有册命之文皆上表辭免惟迎官誥還第元亦降制命之不行册禮明洪武三年定制册命親王先期告宗廟所司陳設如册東宮儀至日皇帝御奉天殿皇太子親王由奉天東門入樂作升自東陛皇太子由殿東門入內贊導至御前侍立位親王入至丹陛拜位樂止贊拜樂作再拜興樂止承制官承制如儀諸王皆跪宣制曰封皇子某為某王某為某王宣畢諸王俯伏興贊拜樂作再拜興樂止引禮導王由殿東外入樂作內贊引至御座前拜位樂止王跪贊授册捧册官以册授讀册官讀訖以授丞相丞相授王王搢圭受以授內使授寶如上儀訖王出圭俯伏興引禮導王出復位以次引諸王入殿授册寶如儀內使以册寶置綵亭訖贊拜樂作諸王皆四拜興樂止內使舉亭前行親王由東階降樂作出奉天東門樂止禮部尚書請詔書用寶赴午門開讀禮畢皇帝還宮皇太子出王年幼則遣官齎册寶授之丞相承制至王所東北立西南向宣制最幼者行保抱之禮是日親王朝謝皇后太子與東宮受册朝謝同親王各自行賀幼者詣長者行四拜禮百官詣親王賀亦行四拜禮丞相至殿上跪文武官於庭中丞相致詞曰某官某等茲遇親王殿下榮膺册寶封建禮成無任欣忭之至賀畢丞相及百官復四拜次日皇太子冕服於奉天殿朝賀皇帝太子致詞曰長子某茲遇諸弟某等受封建國謹詣父皇陛下稱賀賀中宮致詞曰謹詣母后殿下稱賀百官進表箋賀皇帝及中宮東宮如東宮受册儀內外命婦賀中宮致詞曰妾某氏等茲遇親王受封建國恭詣皇后殿下稱賀是日百官及命婦各賜宴擇日諸王謁太廟時秦晉燕楚吳五王皆長而齊潭趙魯四王方幼故兼具其制靖江王則以親王封故視秦晉儀二十八年定制親王嫡長子年十歲授金册寶立為王世子次嫡及庶子皆封郡王凡王世子必以嫡長王年三十正妃未有嫡子其子止為郡王待王與正妃年五十無嫡子始立庶長子為王世子襲封朝廷遣人行册命之禮成化末封興岐益衡雍五王帝親告奉先殿遣使就各王府册之罷臨軒禮而諸王當襲封者俱於歲終遣官册封嘉靖中改於孟春著為令册王妃與册太子妃儀同册公主儀洪武九年七月命使册公主設册案於乾清宮御座之東南册用銀字鍍金皇帝皇后升御座遣使捧册傳制如儀使者至華蓋殿公主拜受其儀略與册太子妃同凡皇姑曰大長公主皇姊妹曰長公主皇女曰公主親王女曰郡主郡王女曰縣主孫女曰郡君曾孫女曰縣君玄孫女曰鄉君郡主以下受誥封不册命皇帝加元服儀古者冠必於廟天子四加魏以後始冠於正殿又以天子至尊禮惟一加歷代因之明洪武三年定制先期太史院卜日工部製冕服翰林院撰祝文禮部具儀注中書省承制命某官攝太師某官攝太尉既卜日遣官告天地宗廟前一日內使監令陳御冠席於奉天殿正中其南設冕服案及