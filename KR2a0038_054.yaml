居仁由義毋怠毋驕茂隆萬世樂作四拜興樂止持節官捧節出樂作皇太子送節至殿門外還東序內侍導還宮樂止賓贊等官持節復命餘如舊儀是日皇太子詣皇太后皇帝皇后前謝俱行五拜三叩頭禮用樂明日皇帝及皇太子受羣臣賀如儀皇子冠禮初加進網巾祝詞曰茲惟吉日冠以成人克敦孝友福祿來駢再加進翼善冠祝詞曰冠禮斯舉實由成德敬慎威儀維民之則三加進袞冕祝詞曰冠至三加命服用章敬神事上永固藩邦酌醴祝曰旨酒嘉薦載芬載芳受茲景福百世其昌敕戒詞曰孝于君親友于兄弟親賢愛民率由禮義毋溢毋驕永保富貴其陳設執事及傳制謁謝並如皇太子儀初皇子冠之明日百官稱賀畢詣王府行禮成化二十三年皇子冠之次日各詣奉天門東廡序坐百官常服四拜萬曆二十九年禮部尚書馮琦言舊制皇太子冠設冠席醴席於文華殿內今文華殿為皇上臨御遣官之地則皇太子冠醴席應移於殿之東序又親王冠舊設席於皇極門之東廡今皇太子移席於殿東序則親王應移席於殿西序從之永樂九年十一月命皇太子嫡長子為皇太孫冠於華蓋殿其儀與皇太子同品官冠禮古者男子二十而冠大夫五十而後爵故無大夫冠禮唐制三加一品之子以袞冕逮九品之子以爵辨皆倣士禮而增益之明洪武元年定制始加緇布冠再加進賢冠三加爵辨其儀前期擇日主者告於家廟乃筮賓前二日戒賓及贊冠者明日設次於大門外之右南向至日夙興設洗於阼階東南東西當東霤六品以下當東榮南北以堂深罍水在洗東加勺冪篚在洗西南肆實巾一於篚加冪設席於東房西牖下陳服於席東領北上莞筵四加藻席四在南側尊甒醴在服北加勺冪設坫在尊北四品以下設篚無坫饌陳於坫北設洗於東房近北罍在洗西篚在洗東北肆實以巾質明賓贊至門外掌次者引之次賓贊公服諸行事者各服其服就位冠各一笥人執之侍於西階之西東面北上設主席於阼階上西面設賓席於西階東面冠者席於主者東北西面主者公服立於阼階下當東序西面諸親公服立於罍洗東南西面北上尊者在別室儐者公服立於門內道東北面冠者雙童髻空頂幘雙玉導綵褶錦紳烏皮履六品以下導不以玉立於房中南面主者贊冠者公服立於房內戶東西面賓及贊冠者出次立於門西東面北上儐者進受命出立門東西面曰敢請事賓曰某子有嘉禮命某執事儐者入告主者迎賓於大門外之東西面再拜賓答拜主者揖贊冠者贊冠者報揖又揖賓賓報揖主者入賓贊次入及內門至階主者請升賓三辭乃升主者自阼階立於席東西向賓自西階立於席西東向賓贊冠者及庭盥於洗升自西階入於東房立於主贊冠者之南西面主贊冠者導冠者立於房外之西南面賓贊冠者取纚櫛簪跪奠於筵南端退立於席北少東西面賓揖冠者冠者進升席西向坐賓贊冠者進筵前東面跪脫雙童髻櫛畢設纚興復位立賓降至罍洗盥訖詣西階主者立於席後西面賓立於西階上東面執緇布冠者升賓降一等受之右執項左執前進冠者筵前東向立祝用士禮祝詞祝畢跪冠興復位賓贊冠者進筵前東面跪結纓興復位冠者興賓揖之適房賓主皆坐冠者衣青衣素裳出戶西南面立賓主俱興賓揖冠者冠者進升席西向坐賓贊冠者跪脫緇布冠櫛畢設纚賓進進賢冠立祝如初加禮易萬年為永年易胡福為遐福祝畢跪冠興復位賓贊冠者跪脫進賢冠櫛畢設纚賓進爵辨立祝如再加禮賓贊冠者設簪結纓如前冠者適房著爵辨之服出主贊冠者徹纚櫛及筵入於房又設筵於室戶西南向冠者出房戶西南面立主贊洗觶於房酌醴出南面立賓揖冠者就筵西南面立賓受醴進冠者筵前北面立祝畢冠者拜受觶賓復西階上答拜執饌者進饌於筵冠者左執觶右取脯祭於籩豆間贊者取胏一以授冠者奠觶於薦西以祭冠者坐取觶祭醴奠觶再拜賓答拜冠者執觶興賓主俱坐冠者升筵跪奠觶於薦東興進北面跪取脯降自西階入見母進奠脯於席前退再拜出母不在則使人受脯於西階下初冠者入見母賓主俱興賓降當西序東面立主者降當東序西面立冠者出立於西階東南面賓少進字之辭同士禮冠者再拜跪曰某不敏夙夜祗承賓出主者送於內門外西向請禮從者賓就次主者入初賓出冠者東面見諸親諸親拜之冠者答拜冠者西向拜賓贊賓贊亦答拜見諸尊於別室亦如之賓主既釋服入醴席一獻訖賓與衆賓出次立於門東西面主者出揖賓賓報揖主者先入賓及衆賓從之至階賓立於西階上主者立於東階上衆賓立於西階下主者授幣篚於賓贊復位還阼階上北面拜送賓贊降自西階主者送賓於大門外西面再拜而入孤子則諸父諸兄戒賓冠之日主者紒而迎賓冠於阼階下其儀亦如之明日見廟冠者朝服入南門中庭道西北面再拜出庶人冠禮古冠禮之存者惟士禮後世皆推而用之明洪武元年詔定冠禮下及庶人纖悉備具然自品官而降鮮有能行之者載之禮官備故事而已凡男子年十五至二十皆可冠將冠筮日筮賓戒賓俱如品官儀是日夙興張幄為房於廳事東皆盛服設盥於阼階下東南陳服於房中西牖下席二在南酒在服北次幞頭巾帽各盛以盤三人捧之立於堂下西階之西南向東上主人立於阼階下諸親立於盥東儐者立於門外以俟賓冠者雙紒袍勒帛素履待於房賓至主人出迎揖而入坐定冠者出於房執事者請行事賓之贊者取櫛總篦幧頭置於席南端賓揖冠者即席西向坐贊者為之櫛合紒施總加幧頭賓降主亦降立於阼階下賓盥主人揖讓升自西階復位執事者進巾賓降一等受之詣冠者席前東向祝詞同品官祝訖跪著巾興復位冠者興賓揖之入房易服深衣大帶出就冠席賓盥如初執事者進帽賓降二等受之進祝跪冠訖興復位揖冠者入房易服襴衫要帶出就冠席賓盥如初執事者進幞頭賓降三等受之進祝跪冠訖興復位揖冠者入房易公服出執事者徹冠席設醴席於西階南向贊者酌醴出房立於冠者之南賓揖冠者即席西向立賓受醴詣席前北面祝冠者拜受賓答拜執事者進饌冠者即席坐飲食訖再拜賓答拜冠者離席立於西階之東南向賓字之如品官詞冠者拜賓答拜冠者拜父母父母為之起拜諸父之尊者遂出見鄉先生及父之執友先生執友皆答拜賓退主人請禮賓固請乃入設酒饌賓退主人酬賓贊侑以幣禮畢主人以冠者見於祠堂再拜出
