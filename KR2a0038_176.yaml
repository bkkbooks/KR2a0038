body:
  text: 明史卷一百七十六列傳第六十四李賢呂原子嶽正彭時商輅劉定之李賢字原德鄧人舉鄉試第一宣德八年成進士奉命察蝗災於河津授驗封主事少師楊士奇欲一見賢竟不往正統初言塞外降人居京師者盈萬指揮使月俸三十五石實支僅一石降人反實支十七石五斗是一降人當京官十七員半矣宜漸出之外省費且消患未萌帝不能用時詔文武臣誥敕非九年不給賢言限以九年或官不能滿秩或親老不待不得者十八九無以勸臣下請仍三年便從之遷考功郎中改文選扈從北征師覆脫還景泰二年二月上正本十策曰勤聖學顧針警戒嗜欲絶玩好慎舉措崇節儉畏天變勉貴近振士風結民心帝善之命翰林寫置左右備省覽尋又陳車戰火器之利帝頗採納是冬擢兵部右侍郎轉戶部也先數貢馬賢謂輦金帛以強寇自弊非策因陳邊備廢弛狀于謙請下其章厲諸將轉吏部採古二十二君行事可法者曰鑑古録上之英宗復位命兼翰林學士入直文淵閣與徐有貞同預機務未幾進尚書賢氣度端凝奏對皆中機宜帝深眷之山東饑發帑振不足召有貞及賢議有貞謂頒振多中飽賢曰慮中飽而不貸坐視民死是因噎廢食也遂命增銀石亨曹吉祥與有貞爭權並忌賢諸御史論亨吉祥亨吉祥疑出有貞賢意訴之帝下二人獄會有風雷變得釋謫賢福建參政未行王翺奏賢可大用遂留為吏部左侍郎踰月復尚書直內閣如故亨知帝嚮賢怒然無可如何乃佯與交歡賢亦深自匿非宣召不入而帝益親賢顧問無虛日孛來近塞獵亨言傳國璽在彼可掩而取帝色動賢言釁不可啓璽不足寶事遂寢亨益惡賢時帝亦厭亨吉祥驕橫屏人語賢曰此輩干政四方奏事者先至其門為之奈何賢曰陛下惟獨斷則趨附自息帝曰向嘗不用其言乃怫然見辭色賢曰願制之以漸當亨吉祥用事賢顧忌不敢盡言然每從容論對所以裁抑之者甚至及亨得罪帝復問賢奪門事賢曰迎駕則可奪門豈可示後天位乃陛下固有奪即非順且爾時幸而成功萬一事機先露亨等不足惜不審置陛下何地帝悟曰然賢曰若郕王果不起羣臣表請陛下復位安用擾攘為此輩又安所得邀升賞招權納賄安自起老成耆舊依然在職何至有殺戮降黜之事致干天象易曰開國承家小人勿用正謂此也帝曰然詔自今章奏勿用奪門字併議革冒功者四千餘人至成化初諸被革者訴請復以賢言並奪太平侯張瑾興濟伯楊宗爵時論益大快之帝既任賢所言皆見聽于謙嘗分遣降人南征陳汝言希宦官指盡召之還賢力言不可帝曰吾亦悔之今已就道後當聽其願去者帝憂軍官支俸多歲入不給賢請汰老弱於外則費省而人不覺帝深納焉時歲有邊警天下大水江南北尤甚賢外籌邊計內請寬百姓罷一切徵求帝用其言四方得蘇息七年二月空中有聲帝欲禳之命賢撰青詞賢言君不恤民天下怨叛厥有鼓妖因請行寬恤之政又請罷江南織造清錦衣獄止邊臣貢獻停內外採買帝難之賢執爭數四同列皆懼賢退曰大臣當知無不言可卷舌偷位耶終天順之世賢為首輔呂原彭時佐之然賢委任最專初御史劉濬劾柳溥敗軍罪觸帝怒賢言御史耳目官不宜譴石亨譖賢曲護帝寖疏賢尋悟待之如初每獨對良久方出遇事必召問可否或遣中官就問賢務持大體尤以惜人才開言路為急所薦引年富軒輗耿九疇王竑李秉程信姚夔崔恭李紹等皆為名臣時勸帝延見大臣有所薦必先與吏兵二部論定之及入對帝訪文臣請問王翺武臣請問馬昂兩人相左右故言無不行而人不病其專惟羣小與為難曹欽之反也擊賢東朝房執將殺之逼草奏釋己罪賴王翺救乃免賢密疏請擒賊黨時方擾攘不知賢所在得疏帝大喜裹傷入見慰勞之特加太子太保賢因言賊既誅急宜詔天下停不急務而求直言以通閉塞帝從之門達方用事錦衣官校恣橫為劇患賢纍請禁止帝召達誡諭之達怙寵益驕賢乘間復具陳達罪帝復召戒達達銜次骨因袁彬獄陷賢賢幾不免語載達傳帝不豫臥文華殿會有間東宮於帝者帝頗惑之密告賢賢頓首伏地曰此大事願陛下三思帝曰然則必傳位太子乎賢又頓首曰宗社幸甚帝起立召太子至賢扶太子令謝太子謝抱帝足泣帝亦泣讒竟不行憲宗即位進少保華蓋殿大學士知經筵事是年春日黯無光賢偕同官上言日君象君德明則日光盛惟陛下敬以修身正以御下剛以斷事明以察微持之不怠則天變自弭和氣自至翌日又言天時未和由陰氣太盛自宣德至天順間選宮人太多浣衣局沒官婦女愁怨尤甚宜放還其家帝從之中外欣悅五月大雨雹大風飄瓦拔郊壇樹賢言天威可畏陛下當凜然加省無狎左右近幸崇信老成共圖國是有司請造鹵簿賢言內庫尚有未經御者今恩詔甫頒方節財用奈何復為此帝即日寢之每遇災變必與同官極陳無隱而於帝初政申誡尤切門達既竄其黨多投匿名書搆賢賢乞罷有詔慰留吳后廢言官請誅牛玉語侵賢又有造蜚語搆賢者帝命衛士宿賢家護出入成化二年三月遭父喪詔起復三辭不許遣中官護行營葬還至京又辭遣使宣意遂視事其年冬卒年五十九帝震悼贈太師諡文達賢自以受知人主所言無不盡景帝崩將以汪后殉葬用賢言而止惠帝少子幽禁已六十年英宗憐欲赦之以問賢賢頓首曰此堯舜用心也天地祖宗實式憑之帝意乃決帝嘗祭山川壇以夜出未便欲遣官代祀賢引祖訓爭之卒成禮而還嘗言內帑餘財不以恤荒濟軍則人主必生侈心而移之於土木禱祠聲色之用前後頻請發帑振貸恤邊不可勝計故事方面官敕三品京官保舉賢患其營競令吏部每缺舉二人請帝簡用並推之例始此自三楊以來得君無如賢者然自郎署結知景帝超擢侍郎而所著書顧謂景帝為荒淫其抑葉盛擠嶽正不救羅倫尤為世所惜云呂原字逢原秀水人父嗣芳萬泉教諭兄本景州訓導嗣芳老就養景州與本相繼卒貧不能歸葬厝於景原時至墓慟哭久之奉母南歸家益貧知府黃懋奇原文補諸生遣入學舉鄉試第一正統七年進士及第授編修十二年與侍講裴綸等十人同選入東閣肄業直經筵景泰初進侍講與同官倪謙授小內侍書於文華殿東廡帝至命謙講國風原講堯典皆稱旨問何官並以中允兼侍講對帝曰品同耳何相兼為進二人侍講學士兼中允尋進左春坊大學士天順初改通政司右參議兼侍講徐有貞李賢下獄之明日命入內閣預機務石亨曹吉祥用事貴倨獨敬原原朝會衣青袍亨笑曰行為先生易之原不答尋與嶽正列亨吉祥罪狀疏留中二人怒摘敕諭中語謂閣臣謗訕帝大怒坐便殿召對厲聲曰正大膽敢爾原素恭謹阿正何也正罷去原得留李賢既復官入閣柄政原佐之未幾彭時亦入三人相得甚歡賢通達遇事立斷原濟以持重庶政稱理其年冬進翰林院學士六年遭母喪水漿不入口三日詔葬畢即起視事原乞終制不允乃之景州啓父兄殯歸葬舟中寢苫哀毀體素豐至是羸瘠抵家甫襄事而卒年四十五贈禮部左侍郎諡文懿原內剛外和與物無競性儉約身無紈綺歸裝惟賜衣數襲分祿恤宗姻子字秉之以蔭補國子生供事翰林遷中書舍人疏乞應試所司執故事不許憲宗特許之遂舉順天鄉試舍人得赴試自始纍遷禮部郎中好學能文諳掌故琉球請歲一入貢回回貢使乞道廣東歸國皆以非制格之以薦進南京太僕寺少卿故事太僕馬數不令他官知以是文籍磨滅登耗無稽曰他官不與聞是也當職者可貿貿耶議請三年一校勘著為例纍遷南京太常卿輯典故因革若干卷正德初致仕歸嶽正字季方漷縣人正統十三年會試第一賜進士及第授編修進左贊善天順初改修撰教小內侍書閣臣徐有貞李賢下獄帝既用呂原預政頃之薛瑄又致仕帝謀代者王翺以正薦遂召見文華殿正長身美鬚髯帝遙見色喜既登陛連稱善問年幾何家安在何年進士正具以對復大喜曰爾年正強仕吾北人又吾所取士今用爾內閣其盡力輔朕正頓首受命趨出石亨張軏遇之左順門愕然曰何自至此比入帝曰朕今日自擇一閣臣問為誰帝曰嶽正兩人陽賀帝曰但官小耳當與吏部左侍郎兼學士兩人曰陛下既得人俟稱職加秩未晚帝默然遂命以原官入閣正素豪邁負氣敢言及為帝所拔擢益感激思自效掌欽天監侍郎湯序者亨黨也嘗奏災異請盡去奸臣帝問正正言奸臣無指名即求之人人自危且序術淺何足信也乃止有僧為妖言錦衣校邏得之坐以謀反中官牛玉請官邏者正言事縱得實不過坐妖言律邏者給賞而已不宜與官僧黨數十人皆得免或為匿名書列曹吉祥罪狀吉祥怒請出榜購之帝使正撰榜格正與呂原入見曰為政有體盜賊責兵部姦宄責法司豈有天子出榜購募者且事緩之則自露急之則愈匿此人情也帝是其言不問亨從子彪鎮大同獻捷下內閣問狀使者言捕斬無算不能悉致皆梟置林木間正按地圖指詰之曰某地至某地皆沙漠汝梟置何所其人語塞時亨吉祥恣甚帝頗厭之正從容言二人權太重臣請以計間之帝許焉正出見吉祥曰忠國公常令杜清來此何為者吉祥曰辱石公愛致誠款耳正曰不然彼使伺公所為耳因勸吉祥辭兵柄復詣亨諭令自戢亨吉祥揣知正意怒吉祥見帝免冠泣請死帝內愧慰諭之召正責漏言會承天門災正極言亨將為不軌且言陳汝言小人今既為尚書可用盧彬為侍郎二人者俱譎悍若同事必相齮齕乘其隙可並去之徐有貞再下獄復云用有貞則天變可弭帝皆不納及敕諭廷臣命正視草正草敕曰乃者承天門災朕心震驚罔知所措意敬天事神有未盡歟祖宗成憲有不遵歟善惡不分用舍乖歟曲直不辨刑獄冤歟征調多方軍旅勞歟賞賚無度府庫虛歟請謁不息官爵濫歟賄賂公行政事廢歟朋奸欺罔附權勢歟羣吏弄法擅威福歟征斂徭役太重而閭閻靡寧歟讒諂奔競之徒幸進而忠言正士不用歟抑有司闒茸酷暴貪冒無厭而致軍民不得其所歟此皆傷和致災之由而朕有所未明也今朕省愆思咎怵惕是存爾羣臣休戚惟均其洗心改過無蹈前非當行者直言無隱敕下舉朝傳誦而亨吉祥搆蜚語謂正賣直謗訕帝怒命仍授內侍書明日謫欽州同知道漷以母老留旬日陳汝言令巡校言狀且言正嘗奪公主田遂逮繫詔獄杖百戍肅州行至涿夜宿傳舍手拲急氣奔且死涿人楊四醉卒酒脫正拲刳其中且厚賂卒乃得至戍所亨吉祥既誅帝謂李賢曰嶽正固嘗言之賢曰正有老母得放歸田里幸甚乃釋為民憲宗立御史呂洪等請復正與楊瑄官詔正以原官直經筵纂修英宗實録初正得罪都督僉事季鐸乞得其宅至是敕還正正還朝自謂當大用而賢欲用為南京祭酒正不悅忌者僞為正劾賢疏草賢嗛之成化元年四月廷推兵部侍郎清理貼黃以正與給事中張寧名並上詔以為私出正為興化知府而寧亦補外正至官築隄溉田數千頃節縮浮費經理預備倉欲有所興革鄉士大夫不利其所為騰謗言正亦厭吏職五年入覲遂致仕又五年卒年五十五無子大學士李東陽御史李經其壻也正博學能文章高自期許氣屹屹不能下人在內閣才二十八日勇事敢言便殿論奏至唾濺帝衣有規以信而後諫者慨然曰上顧我厚懼無以報稱子乃以諫官處我耶英宗亦悉其忠其在戍所嘗念之曰嶽正倒好只是大膽正聞自為像贊述帝前語末言臣嘗聞古人之言蓋將之死而靡憾也其自信不回如此然意廣才疏欲以縱橫之術離散權黨反為所噬人皆迂而惜之嘉靖中追贈太常寺卿諡文肅彭時字純道安福人正統十三年進士第一授修撰明年郕王監國令同商輅入閣預機務聞繼母憂力辭不允乃拜命釋褐踰年參大政前此未有也尋進侍讀景泰元年以兵事稍息得請終制然由此忤旨服除命供事翰林院不復與閣事易儲遷左春坊大學士寰宇通志成遷太常寺少卿俱兼侍讀天順元年徐有貞既得罪嶽正許彬相繼罷帝坐文華殿召見時曰汝非朕所擢狀元乎時頓首明日仍命入閣兼翰林院學士閣臣自三楊後進退禮甚輕為帝所親擢者唯時與正二人而帝方嚮用李賢數召賢獨對賢雅重時退必咨之時引義爭可否或至失色賢初小忤久亦服其諒直曰彭公真君子也慈壽皇太后上尊號詔告天下時欲推恩賢謂一年不宜再赦時曰非赦也宜行優老典朝臣父母七十與誥敕百姓八十給冠帶是老吾老以及人之老也賢稱善即奏行之帝愛時風度選庶吉士命賢盡用北人南人必若時者方可賢以語時俄中官牛玉宣旨時謂玉曰南士出時上者不少何可抑之已選十五人南六人與焉門達搆賢帝惑之曰去賢行專用時矣或傳其語時矍然曰李公有經濟才何可去因力直之且曰賢去時不得獨留語聞帝意乃解帝大漸口占遺命定后妃名分勿以嬪御殉葬凡四事付閣臣潤色時讀竟涕下悲愴不自勝中官復命帝亦為隕涕憲宗即位議上兩宮尊號中官夏時希周貴妃旨言錢后久病不當稱太后而貴妃帝所生母宜獨上尊號賢曰遺詔已定何事多言時曰李公言是也朝廷所以服天下在正綱常若不爾損聖德非小頃之中官復傳貴妃旨子為皇帝母當為太后豈有無子而稱太后者宣德間有故事賢色變目時時曰今日事與宣德間不同胡后表讓位退居別宮故在正統初不加尊今名分固在安得為比中官曰如是何不草讓表時曰先帝存日未嘗行今誰敢草若人臣阿意順從是萬世罪人也中官厲聲怵以危語時拱手向天曰太祖太宗神靈在上孰敢有二心錢皇后無子何所規利而為之爭臣義不忍默者欲全主上聖德耳若推大孝之心則兩宮並尊為宜賢亦極言之議遂定及將上寶冊時曰兩宮同稱則無別錢太后宜加兩字以便稱謂乃尊為慈懿皇太后貴妃為皇太后越數日中官覃包至內閣曰上意固如是但迫於太后不敢自主非二公力爭幾誤大事時閣臣陳文默無語聞包言甚愧禮成進吏部右侍郎兼學士同知經筵成化改元進兵部尚書兼官如故明年秋乞歸省三年二月詔趣還朝英宗實録成加太子少保兼文淵閣大學士四年慈懿太后崩詔議山陵時及商輅劉定之言太后作配先帝正位中宮陛下尊為太后詔示天下先帝全夫婦之倫陛下盡母子之愛於義俱得今梓宮當合葬裕陵主當祔廟此不易之禮比聞欲別卜葬地臣等實懷疑懼竊謂皇上所以遲疑者必以今皇太后萬壽後當與先帝同尊自嫌二后並配非祖宗制考之於古漢文帝尊所生母薄太后而呂后仍祔長陵宋仁宗追尊生母李宸妃而劉后仍祔太廟今若陵廟之制稍有未合則有乖前美貽譏來葉於是諸大臣相繼言之帝猶重違太后意時偕朝臣伏文華門泣請帝與太后皆感動始從時議彗見三台時等言外廷大政固所當先宮中根本尤為至急諺云子出多母今嬪嬙衆多維熊無兆必陛下愛有所專而專寵者已過生育之期故也望均恩愛為宗社大計時帝專寵萬貴妃妃年已近四十時故云然又言大臣黜陟宜斷自宸衷或集羣臣僉議不可悉委臣下使大權旁落帝雖不能從而心嘉其忠都御史項忠討滿四不利朝議命撫寧侯朱永將京軍往赴永故難其行多所邀請時惡其張大且度軍可無行第令整裝待會忠馳奏已圍賊石城帝遣中官懷恩黃賜偕兵部尚書白圭程信等至閣議時曰賊四出攻剽鋒誠不可當今入石城自保我軍圍甚固此困獸易擒耳信曰安知忠不退師時曰彼部分已定何故自退且今出師度何時到信曰來春時曰如此益緩不及事事成敗冬月決矣信忿出危言曰忠若敗必斬一二人然後出師衆危之問時何見曰觀忠疏曲折知其能若聞別遣禁軍將退避不敢任賊不可知矣時惟商輅然其言至冬賊果平人乃大服改吏部尚書五年得疾在告踰三月帝趣赴閣視事免朝參是冬無雪疏言光祿寺採辦各城門抽分掊剋不堪而獻珍珠寶石者倍估增直漁竭帑藏乞革其弊以惠小民帝優詔褒納畿輔山東河南旱請免夏稅鹽鈔及太僕寺賠課馬京師米貴請發倉儲五十萬石平糶並從之時以舊臣見倚重遇事爭執無所避而是時帝怠於政大臣希得見萬安同在閣結中貴戚畹上下壅隔時頗懷憂七年疾復作乞致仕帝慰留之不得去冬彗復見時言政本七事一毋惑佛事糜金錢二傳旨專委司禮監毋令他人以防詐僞三延見大臣議政事四近幸賜豫太多工匠冒官無紀而重囚死徙者法不蔽罪宜戒淫刑僭賞五虛懷受諫勿惡切直六戒廷臣毋依違凡政令失當直言論奏七清理牧馬草地減退勢要莊田皆切中時弊寧晉伯劉聚為從父太監永誠請封諡且乞祠額禮部執故事却之帝特賜額曰褒功命內閣擬封諡時等言即豫永誠將來守邊內臣皆援此陳乞是變祖宗法自今日始或言宋童貫封王時曰貫封王在徽宗末年豈盛世事耶乃寢時每因災變上言或留中或下所司多阻隔悒悒不得志五年以後凡七在告帝輒命醫就視數遣內臣賜賚十一年正月以秩滿進少保踰月卒年六十贈太師諡文憲時立朝三十年孜孜奉國持正存大體公退未嘗以政語子弟有所論薦不使其人知燕居無惰容服御儉約無聲樂之奉非其義不取有古大臣風商輅字弘載淳安人舉鄉試第一正統十年會試殿試皆第一終明之世三試第一者輅一人而已除修撰尋與劉儼等十人進學東閣輅丰姿瓌偉帝親簡為展書官郕王監國以陳循高穀薦入內閣參機務徐珵倡南遷議輅力沮之其冬進侍讀景泰元年遣迎上皇於居庸進學士三年錦衣指揮盧忠令校尉上變告上皇與少監阮浪內使王瑤圖復位帝震怒捕二人下詔獄窮治之忠筮於術者同寅寅以大義折之且曰此大凶兆死不足贖忠懼佯狂以冀免輅及中官王誠言於帝曰忠病風無足信不宜聽妄言傷大倫帝意少解乃並下忠獄坐以他罪降為事官立功殺瑤錮浪於獄事得不竟太子既易進兵部左侍郎兼左春坊大學士如故賜第南薰里塞上腴田率為勢豪侵據輅請核還之軍開封鳳陽諸府饑民流濟寧臨清間為有司驅逐輅憂其為變請招墾畿內八府閒田給糧種民皆有所歸鍾同章綸下獄輅力救得無死寰宇通志成加兼太常卿景帝不豫羣臣請建東宮不許將繼奏輅援筆曰陛下宣宗章皇帝之子當立章皇帝子孫聞者感動以日暮奏未入而是夜石亨輩已迎復上皇明日王文于謙等被收召輅與高穀入便殿溫旨諭之命草復位詔亨密語輅赦文毋別具條發輅曰舊制也不敢易亨輩不悅諷言官劾輅朋奸下之獄輅上書自訴復儲疏在禮部可覆驗不省中官興安稍解之帝愈怒安曰向者此輩創議南遷不審置陛下何地帝意漸釋乃斥為民然帝每獨念輅朕所取士嘗與姚夔侍東宮不忍棄之以忌者竟不復用成化三年二月召至京命以故官入閣輅疏辭帝曰先帝已知卿枉其勿辭首陳勤學納諫儲將防邊省冗官設社倉崇先聖號廣造士法凡八事帝嘉納之其言納諫也請召復元年以後建言被斥者於是羅倫孔公恂等悉復官明年彗星見給事中董旻御史胡深等劾不職大臣並及輅御史林誠詆輅曾與易儲不宜用帝不聽輅因求罷帝怒命廷鞫諸言者欲加重譴輅曰臣嘗請優容言者今論臣反責之如公論何帝悅旻等各豫杖復職尋進兵部尚書久之進戶部宋元通鑑綱目成改兼文淵閣大學士皇太子立加太子少保進吏部尚書十三年進謹身殿大學士輅為人平粹簡重寬厚有容至臨大事決大議毅然莫能奪仁壽太后莊戶與民爭田帝欲徙民塞外輅曰天子以天下為家安用皇莊為事遂寢乾清宮門災工部請採木川湖輅言宜少緩以存警畏從之悼恭太子薨帝以繼嗣為憂紀妃生皇子六歲矣左右畏萬貴妃莫敢言久之乃聞於帝帝大喜欲宣示外廷遣中官至內閣諭意輅請敕禮部擬上皇子名於是廷臣相率稱賀帝即命皇子出見廷臣越數日帝復御文華殿皇子侍召見輅及諸閣臣輅頓首曰陛下踐祚十年儲副未立天下引領望久矣當即立為皇太子安中外心帝頷之是冬遂立皇子為皇太子初帝召見皇子留宮中而紀妃仍居西內輅恐有他患難顯言偕同官上疏曰皇子聰明岐嶷國本攸繫重以貴妃保護恩踰己出但外議謂皇子母因病別居久不得見宜移就近所俾母子朝夕相接而皇子仍藉撫育於貴妃宗社幸甚由是紀妃遷永壽宮踰月妃病篤輅請曰如有不諱禮宜從厚且請命司禮監奉皇子過妃宮問視及製衰服行禮帝皆是之帝將復郕王位號下廷議輅極言王有社稷功位號當復帝意遂決帝建玉皇閣於宮北命內臣執事禮與郊祀等輅等爭罷之黑眚見疏弭災八事曰番僧國師法王毋濫賜印章四方常貢外勿受玩好許諸臣直言分遣部使慮囚省冤獄停不急營造實三邊軍儲守沿邊關隘設雲南巡撫帝優詔褒納中官汪直之督西廠也數興大獄輅率同官條直十一罪言陛下委聽斷於直直又寄耳目於羣小如韋瑛輩皆自言承密旨得顓刑殺擅作威福賊虐善良陛下若謂擲奸禁亂法不得已則前此數年何以帖然無事且曹欽之變由逯杲刺事激成可為懲鑒自直用事士大夫不安其職商賈不安於途庶民不安於若不亟去天下安危未可知也帝慍曰用一內豎何遽危天下誰主此奏者命太監懷恩傳旨詰責厲甚輅正色曰朝臣無大小有罪皆請旨逮問直擅抄沒三品以上京官大同宣府邊城要害守備俄頃不可缺直一日械數人南京祖宗根本地留守大臣直擅收捕諸近侍在帝左右直輒易置直不去天下安得無危萬安劉珝劉吉亦俱對引義慷慨恩等屈服輅顧同列謝曰諸公皆為國如此輅復何憂會九卿項忠等亦劾直是日遂罷西廠直雖不視廠事寵幸如故譖輅嘗納指揮楊曄賄欲脫其罪輅不自安而御史戴縉復頌直功請復西廠輅遂力求去詔加少保賜敕馳傳歸輅既去士大夫益俯首事直無敢與抗者矣錢溥嘗以不遷官作禿婦傳以譏輅高瑤請復景帝位號黎淳疏駁極詆輅輅皆不為較待之如平時萬貴妃重輅名出父像屬為贊遺金帛甚厚輅力辭使者告以妃意輅曰非上命不敢承也貴妃不悅輅終不顧其和而有執如此及謝政劉吉過之見其子孫林立歎曰吉與公同事歷年未嘗見公筆下妄殺一人宜天之報公厚輅曰正不敢使朝廷妄殺一人耳居十年卒年七十三贈太傅諡文毅子良臣成化初進士官翰林侍講劉定之字主靜永新人幼有異稟父授之書日誦數千言不令作文一日偶見所為祀竈文大異之舉正統元年會試第一殿試及第授編修京城大水應詔陳十事言號令宜出大公裁以至正不可苟且數易公卿侍從當數召見察其才能心術而進退之降人散處京畿者宜漸移之南方郡縣職以京朝官補使迭相出入內外無畸重薦舉之法不當拘五品以上可倣唐制朝臣遷秩舉一人自代吏部籍其名而簡用之武臣子孫教以韜略守令牧養為先務毋徒取幹辦羣臣遭喪乞永罷起復以教孝僧尼蠹國當嚴絶富民輸粟授官者有犯宜追奪疏入留中十三年弟寅之與鄉人相訐辭連定之下獄得白秩滿進侍講景帝即位復上言十事曰自古如晉懷愍宋徽欽皆因邊塞外破藩鎮內潰救援不集馴致播遷未有若今日以天下之大數十萬之師奉上皇於漠北委以與寇者也晉宋遭禍亂棄故土偏安一隅尚能奮於既衰以禦方張之敵未有若今日也先乘勝直抵都城以師武臣之衆既不能奮武以破賊又不能約和以迎駕聽其自來而自去者也國勢之弱雖非旦夕所能強豈可不思自強之術而力行之臣愚敢略陳所見近日京軍之戰但知堅壁持重而不能用奇制勝至前敗而後不救左出而右不隨謂宜倣宋吳玠吳璘三疊陳法互相倚恃迭為救護至鐵騎衝突必資刀斧以制之郭子儀破安祿山八萬騎用千人執長刀如牆而進韓世忠破兀术拐子馬用五百人執長斧上揕人胸下斫馬足是刀斧揮霍便捷優於火鎗也紫荊居庸二關名為關塞實則坦途今宜增兵士繕亭障塞蹊隧陸則縱橫掘塹名曰地網水則瀦泉令深名曰水匱或多植榆柳以制奔突或多招鄉勇以助官軍此皆古所嘗為已有明效往者奉使之臣充以驛人駔夫招釁啓戎職此之故今宜擇內蘊忠悃外工專對若陸賈富弼其人者使備正介之選庶不失辭辱國臣於上皇朝乞徙漠北降人知謀短淺未蒙採納比乘國釁奔歸故土寇掠畿甸者屢見告矣宜乘大兵聚集時遷之南方使與中國兵民相錯雜以牽制而變化之且可省俸給減漕挽其事甚便天下農出粟女出布以養兵也兵受粟於倉受布於庫以衛國也向者兵士受粟布於公門納月錢於私室於是手不習擊刺之法足不習進退之宜第轉貨為商執技為工而以工商所得補納月錢民之膏血兵之氣力皆變為金銀以惠奸宄一旦率以臨敵如驅羊拒狼幾何其不敗也今宜痛革其弊一新簡練之政將帥踵舊習者誅毋赦如是而兵威不振者未之有也守令朘民猶將帥之剝兵也宜嚴糾考慎黜陟犯贓者舉主與其罰然後貪墨者寡薦舉者慎民安而邦本固矣古販繒屠狗之夫俱足助成帝業今于謙楊善亦非出自將門然將能知將宜令各舉所知不限門閥公卿侍從亦令舉勇力知謀之士以備將材庶搜羅既廣禦侮有人昔者漢圖恢復所恃者諸葛亮南宋禦金所恃者張浚彼皆忠義夙著功業久立及街亭一敗亮辭丞相符離未捷浚解都督何則賞罰明則將士奮也昨德勝門下之戰未聞摧陷強寇但迭為勝負互殺傷而已雖不足罰亦不足賞乃石亨則自伯進侯于謙則自二品遷一品天下未聞其功但見其賞豈不怠忠臣義士之心乎可令仍循舊秩勿躐新階他日勛名著而爵賞加正未為晚夫既與不忍奪者姑息之政既進不肯退者患失之心上不行姑息之政下不懷患失之心則治平可計日而望也向者御史建白欲令大臣入內議政疏寢不行夫人主當總攬威權親決機務政事早朝未決者日御便殿使大臣敷奏言官察其邪正而糾劾之史官直書簡冊以示懲勸此前代故事祖宗成法也願陛下遵而行之若僅封章入奏中旨外傳恐偏聽獨任致生奸亂欲治化之成難矣人主之德欲其明如日月以察直枉仁如天地以覆羣生勇如雷霆以收威柄故司馬光之告君以仁明武為言即中庸所謂知仁勇也知仁勇非學而能之哉夫經莫要於尚書春秋史莫正於通鑑綱目陛下留心垂覽其於君也既知禹湯文武之所以興又知桀紂幽厲之所以替而趨避審矣於馭內臣也既知有呂強張承業之忠又知有仇士良陳弘志之惡於馭廷臣也既知有蕭曹房杜之良又知有李林甫楊國忠之奸而用舍當矣如是則於知仁勇之德豈不大有助哉苟徒如嚮者儒臣進講誦述其善諱避其惡是猶恐道路之有陷穽閉目而過之其不至於冥行顛仆者幾何今天下雖遭大創尚如金甌之未缺誠能本聖學以見之政治臣見國勢可強讐恥可雪兄弟之恩可全祖宗之制可復亦何憚而不為此書奏帝優詔答之三年遷洗馬也先使者乞遣報使帝堅不許定之疏引故事以請帝下廷議竟不果遣久之遷右庶子天順改元調通政司左參議仍兼侍講尋進翰林學士憲宗立進太常少卿兼侍讀學士直經筵成化二年十二月以本官入直文淵閣進工部右侍郎兼翰林學士江西湖廣災有司方徵民賦定之言國儲充積倉庾至不能容而此張口待哺之氓乃責其租課非聖主恤下意帝感其言即命停徵四年進禮部左侍郎萬貴妃專寵皇后希得見儲嗣未兆郕王女及筓未下嫁定之因久旱並論及之且請經筵兼講太祖御製諸書斥異端邪教勿令害政耗財帝留其疏不下五年卒官贈禮部尚書諡文安定之謙恭質直以文學名一時嘗有中旨命製元宵詩內使却立以俟據案伸紙立成七言絶句百首又嘗一日草九制筆不停書有質宋人名字者就列其世次若譜系然人服其敏博贊曰英宗之復辟也當師旅饑饉之餘民氣未復權奸內訌柱石傾移朝野多故時事亦孔棘矣李賢以一身搘拄其間沛然若有餘獎厲人材振飭綱紀逮憲孝之世名臣相望猶多賢所識拔偉哉宰相才也彭時商輅侃侃守義盡忠獻納粹然一出於正其於慈懿典禮非所謂善成君德者歟輅科名與宋王曾宋庠埒德望亦無愧焉呂原嶽正劉定之雖相業未優而原之行誼正之氣概定之之建白咸有可稱故以時次並列於篇
