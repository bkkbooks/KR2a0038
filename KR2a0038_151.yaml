body:
  text: 明史卷一百五十一列傳第三十九茹瑺嚴震直張紞毛泰亨王鈍鄭賜郭資呂震李至剛方賓吳中劉觀茹瑺衡山人洪武中由監生除承敕郎歷通政使勤於職太祖賢之二十三年拜右副都御史又試兵部尚書尋實授加太子少保及惠帝即位改吏部與黃子澄不相能刑部尚書暴昭發其贓罪出掌河南布政司事尋復召為兵部尚書燕兵至龍潭帝遣瑺及曹國公李景隆都督同知王佐詣燕軍議和瑺等見成祖伏地流汗不能發一言成祖曰公等言即言耳何懼至是久之乃言奉詔割地講和成祖笑曰吾無罪而削為庶人今救死何以地為且皇考封諸子已各有分地矣其縛姦臣來吾即解甲謁孝陵歸藩瑺等唯唯頓首還成祖入京師召瑺瑺首勸進成祖既即位下詔言景隆瑺佐及陳瑄事太祖忠功甚重封瑺忠誠伯食祿一千石終其身仍兵部尚書太子少保選其子鑑為秦府長安郡主儀賓即命瑺出營郡主府第還朝坐不送趙王遣歸里既而為家人所訟逮至京釋還過長沙不謁谷王王以為言時方重藩王禮谷王又開金川門有功帝意嚮之陳瑛遂劾瑺違祖制逮下錦衣獄瑺知不免命子銓巿毒藥服之死時永樂七年二月也法司劾銓毒其父請以謀殺父母論後以銓實承父命減死與兄弟家屬二十七人謫戍廣西河池仁宗立釋還宣宗與所沒田廬瑺居官謹慎謙和有容其死也人頗惜之嚴震直字子敏烏程人洪武時以富民擇糧長歲部糧萬石至京師無後期帝才之二十三年特授通政司參議再遷為工部侍郎二十六年六月進尚書時朝廷事營建集天下工匠於京師凡二十餘萬戶震直請戶役一人書其姓名所業於官有役則按籍更番召之役者稱便鄉民訴其弟姪不法帝付震直訊具獄上帝以為不欺赦其弟姪已坐事降御史數雪冤獄二十八年討龍州使震直偕尚書任亨泰諭安南還條奏利病稱旨尋命修廣西興安縣靈渠審度地勢導湘灕二江浚渠五千餘丈築渼潭及龍母祠土堤百五十餘丈又增高中江石堤建陡閘三十有六鑿去灘石之礙舟者漕運悉通歸奏帝稱善三十年二月疏言廣東舊運鹽八十五萬餘引於廣西召商中買今終年所運纔十之一請分三十萬八千餘引貯廣東別募商入粟廣西乏糧衞所支鹽廣東鬻之江西南安贛州吉安臨江四府便帝從之廣鹽行於江西自此始其年四月擢右都御史尋復為工部尚書建文中嘗督餉山東已而致仕成祖即位召見命以故官巡視山西至澤州病卒張紞字昭季富平人洪武中舉明經為東宮侍書累遷試左通政十五年雲南平出為左參政陛辭帝賦詩二章賜之歷左布政使二十年春入覲治行為天下第一特令吏部勿考賜璽書曰曩者討平西南命官撫守爾紞實先往於今五年諸蠻聽服誠信相孚克恭乃職不待考而朕知其功出天下十二牧上故嘉爾績命爾仍治滇南往欽哉紞在滇凡十七年土地貢賦法令條格皆所裁定民間喪祭冠婚咸有定制務變其俗滇人遵用之朝士董倫王景輩謫其地皆接以禮意惠帝即位召為吏部尚書詔徵遺逸士集闕下紞所選用皆當其才會修太祖實錄命試翰林編纂官紞奏楊士奇第一士奇由是知名成祖入京師錄中朝姦臣二十九人紞與焉以茹瑺言宥仍故職無何帝臨朝而歎咎建文時之改官制者乃令紞及戶部尚書王鈍解職務月給半俸居京師紞懼自經於吏部後堂妻子相率投池中死紞在吏部值變官制小吏張祖言曰高皇帝立法創制規模甚遠今更之未必勝徒滋人口願公力持之紞不能用然心賢祖奏為京衞知事後紞死屬吏無敢視者唯祖經紀其喪世傳燕師入京紞即自經死嚴震直奉使至雲南遇建文君悲愴吞金死考諸國史非其實也時有毛泰亨者建文時為吏部侍郎與紞同事紞死泰亨亦死王鈍字士魯太康人元末猗氏縣尹洪武中徵授禮部主事歷官福建參政以廉慎聞遣諭麓川却其贈或曰不受恐遠人疑貳鈍乃受之還至雲南輸之官庫二十三年遷浙江左布政使在浙十年名與張紞埒帝嘗稱於朝以勸庶僚建文初拜戶部尚書成祖入踰城走為邏卒所執詔仍故官未幾與紞俱罷尋命同工部尚書嚴震直等分巡山西河南陝西山東又同新昌伯唐雲經理北平屯種承制再上疏言事皆允行永樂二年四月賜敕以布政使致仕既歸鬱鬱死子瀹永樂四年進士仁宗時遷鄭王府左長史數以禮諫王嘗擬荀卿成相篇撰十二章以獻語切與王不合召改戶部郎中英宗即位擢戶部右侍郎巡撫浙江有惠政母喪起復入覲留攝部事尋以老乞歸卒鄭賜字彥嘉建寧人洪武十八年進士授監察御史時天下郡邑吏多坐罪謫戍賜嘗奉命於龍江編次行伍方暑諸囚憊甚賜脫其械俾僦舍止息周其飲食病者與醫藥多所全活秩滿當遷湖廣布政司參議闕命賜與檢討吳文為之二人協心剗弊民以寧輯苗僚畏懷母喪去服除改北平參議事成祖甚謹復坐累謫戍安東屯及惠帝即位成祖及楚王楨皆舉賜為長史不許召為工部尚書燕兵起督河南軍扼燕成祖入京師李景隆訐賜罪亞齊黃逮至帝曰吾於汝何如乃相背耶賜曰盡臣職耳帝笑釋之授刑部尚書永樂元年劾都督孫岳擅毀太祖所建寺詔安置海南岳建文時守鳳陽嘗毀寺材修戰艦以禦燕軍燕知其有備取他道南下故賜劾之二年劾李景隆陰養亡命謀不軌又與陳瑛同劾耿炳文僭侈炳文自經死皆揣帝意所惡者祁陽教諭康孔高朝京師還枉道省母會母疾留侍九閱月不行賜請逮問孔高罪當杖帝曰母子暌數年一旦相見難遽舍況有疾可矜也命復其官三年秋代李至剛為禮部尚書四年正月西域貢佛舍利賜因請釋囚帝曰梁武元順溺佛教有罪者不刑紀綱大壞此豈可效是年六月朔日當食陰雲不見賜請賀不許賜言宋盛時嘗行之帝曰天下大矣京師不見如天下見之何卒不許賜為人頗和厚然不識大體帝意輕之為同官趙羾所間六年六月憂悸卒帝疑其自盡楊士奇曰賜有疾數日惶懼不敢求退昨立右順門力不支仆地口鼻有噓無吸語未竟帝曰微汝言幾誤疑賜賜固善人才短耳命予葬祭洪熙元年贈太子少保諡文安郭資武安人洪武十八年進士累官北平左布政使陰附於成祖及兵起張昺等死資與左參政孫瑜按察司副使墨麟僉事呂震率先降呼萬歲成祖悅命輔世子居守成祖轉戰三年資主給軍餉及即位以資為戶部尚書掌北平布政司北京建改行部尚書統六曹事定都仍改戶部時營城郭宮殿置官吏及出塞北征工役繁興資舉職無廢事仁宗立以舊勞兼太子賓客尋以老病加太子太師賜敕致仕宣德四年復起戶部尚書奉職益勤八年十二月卒年七十三贈湯陰伯諡忠襄官其子佑戶部主事資治錢穀有能稱仁宗嘗以問楊士奇對曰資性強毅人不能干以私然蠲租詔數下不奉行使陛下恩澤不流者資也呂震字克聲臨潼人洪武十九年以鄉舉入太學時命太學生出稽郡邑壤地以均貢賦震承檄之兩浙還奏稱旨擢山東按察司試僉事入為戶部主事遷北平按察司僉事燕兵起震降於成祖命侍世子居守永樂初遷真定知府入為大理寺少卿三年遷刑部尚書六年改禮部皇太子監國震壻主事張鶴朝參失儀太子以震故宥之帝聞之怒下震及蹇義於錦衣衞獄已復職仁宗即位命兼太子少師尋進太子太保兼禮部尚書宣德元年四月卒震嘗三奉命省親兩值關中饑令所司出粟振之還始以聞然無學術為禮官不知大體成祖崩遺詔二十七日釋縗服及期震建議羣臣皆易烏紗帽黑角帶近臣言仁孝皇后崩既釋縗服太宗易素冠布腰絰震勃然變色詆其異己仁宗黜震議易素冠布腰絰洪熙元年分遣羣臣祀嶽鎮海瀆及先代帝王陵震乞祀周文武成康便道省母私以妻喪柩與香帛同載祀太廟致齋飲酒西番僧舍大醉歸一夕卒震為人佞諛傾險永樂時曹縣獻騶虞榜葛剌國麻林國進麒麟震請賀帝曰天下治安無麒麟何害貴州布政使蔣廷瓚言帝北征班師詔至思南大巖山有呼萬歲者三震言此山川效靈帝曰山谷之聲空虛相應理或有之震為國大臣不能辯其非又欲因之進媚豈君子事君之道郎中周訥請封禪震力贊之帝責其謬震雖累受面斥然終不能改金水河太液池冰具樓閣龍鳳花卉狀帝召羣臣觀之震因請賀不許而隆平侯張信奏太和山五色雲見侍郎胡濙圖上瑞光榔梅靈芝震率羣臣先後表賀云成祖初巡北京命定太子留守事宜震請常事聽太子處分章奏分貯南京六科回鑾日通奏報可十一年十四年震再請如前制十七年帝在北京因事索章奏侍臣言留南京帝忘震前請曰章奏宜達行在豈禮部別有議耶問震震懼罪曰無之奏章當達行在三問對如前遂以擅留奏章殺右給事中李能衆知能冤畏震莫敢言尹昌隆之禍由震搆之事具昌隆傳夏原吉方賓以言北征餉絀得罪以震兼領戶兵部事震亦自危帝令官校十人隨之曰若震自盡爾十人皆死震有精力能強記才足以濟其為人凡奏事他尚書皆執副本又與左右侍郎更進迭奏震既兼三部奏牘益多皆自占奏侍郎不與也情狀委曲千緒萬端背誦如流未嘗有悞嘗扈北狩帝見碑立沙磧中率從臣讀其文後一年與諸文學臣語及碑詔禮部遣官往錄之震言不須遣使請筆札帝前疏之帝密使人拓其本校之無一字脫悞者子熊宣宗初立震數於帝前乞官至流涕帝不得已授兵科給事中李至剛名鋼以字行松江華亭人洪武二十一年舉明經選侍懿文太子授禮部郎中坐累謫戍邊尋召為工部郎中遷河南右參議河決汴堤至剛議借王府積木作筏濟之建文中調湖廣左參議坐事繫獄成祖即位左右稱其才遂以為右通政與修太祖實錄朝夕在上左右稱說洪武中事甚見親信尋進禮部尚書永樂二年冊立皇太子至剛兼左春坊大學士直東宮講筵與解縉後先進講已復坐事下獄久之得釋降禮部郎中恨解縉中傷之縉下獄詞連至剛亦坐繫十餘年仁宗即位得釋復以為左通政給事中梁盛等劾至剛輩十餘人當大行晏駕不宿公署飲酒食肉恬無戚容帝念至剛先朝舊人出為興化知府時年已七十再歲歿於官至剛為人敏給能治繁劇善傅會首發建都北平議請禁言事者挾私成祖從之既得上心務為佞諛嘗言太祖忌辰宜傚宋制令僧道誦經山東野蠶成繭至剛請賀陝西進瑞麥至剛率百官賀帝皆不聽中官使真臘從者逃三人國王以國中三人補之帝令遣還至剛言中國三人安知非彼私匿帝曰朕以至誠待內外何用逆詐所建白多不用妻父麗重法至剛為乞免帝曰獄輕重外人何以知之至剛曰都御史黃信為臣言帝怒誅信初至剛與解縉交甚厚帝書大臣姓名十人命縉疏其人品言至剛不端縉謫廣西至剛遂奏其怨望改謫交阯方賓錢塘人洪武時由太學生試兵部郎中建文中署應天府事坐罪戍廣東以茹瑺薦召復官成祖入京師賓與侍郎劉儁等迎附特見委用進兵部侍郎四年儁以尚書出征黎利賓理部事有幹才應務不滯性警敏能揣上意見知於帝頗恃寵貪恣七年進尚書扈從北京兼掌行在吏部事明年從北征與學士胡廣金幼孜楊榮侍郎金純並與機密自後帝北巡賓輒扈從十九年議親征尚書夏原吉吳中呂震與賓共議宜且休兵養民未奏會帝召賓賓言糧餉不足召原吉亦以不給對帝怒遣原吉視糧開平旋召還下獄賓方提調靈濟宮中使進香至語賓以帝怒賓懼自縊死帝實無意殺賓聞賓死乃益怒戮其屍吳中字思正武城人洪武末為營州後屯衞經歷成祖取大寧迎降以轉餉捍禦功累遷至右都御史永樂五年改工部尚書從北征艱歸起復改刑部十九年與夏原吉方賓等同以言北征餉絀忤旨繫獄仁宗即位出之復其官兼詹事加太子少保宣德元年從征樂安三年坐以官木石遺中官楊慶作宅下獄落宮保奪祿一年正統六年殿工成進少師明年卒年七十追封茌平伯諡榮襄中勤敏多計算先後在工部二十餘年北京宮殿長獻景三陵皆中所營造職務填委規畫井然然不恤工匠又湛於聲色時論鄙之劉觀雄縣人洪武十八年進士授太谷縣丞以薦擢監察御史三十年遷署左僉都御史坐事下獄尋釋出為嘉興知府丁父憂去永樂元年擢雲南按察使未行拜戶部右侍郎二年調左副都御史時左都御史陳瑛殘刻右都御史吳中寬和觀委蛇二人間務為容悅四年北京營造宮室觀奉命採木浙江未幾還明年冬帝以山西旱命觀馳傳往散遣採木軍民六年鄭賜卒擢禮部尚書十二月與刑部尚書呂震易官坐事為皇太子譴責帝在北京聞之以大臣有小過不宜遽折辱特賜書諭太子八年都督僉事費瓛討涼州叛羌命觀贊軍事還坐事謫本部吏十三年還職改左都御史十五年督浚河漕十九年命巡撫陝西考察官吏仁宗嗣位兼太子賓客旋加太子少保給二俸時大理少卿弋謙數言事帝厭其繁瑣尚書呂震大理卿虞謙希旨劾奏觀復令十四道御史論其誣妄以是為輿論所鄙時未有官妓之禁宣德初臣僚宴樂以奢相尚歌妓滿前觀私納賄賂而諸御史亦貪縱無忌三年六月朝罷帝召大學士楊士奇楊榮至文華門諭曰祖宗時朝臣謹飭年來貪濁成風何也士奇對曰永樂末已有之今為甚耳榮曰永樂時無踰方賓帝問今日誰最甚者榮對曰劉觀又問誰可代者士奇榮薦通政使顧佐帝乃出觀視河道以佐為右都御史於是御史張循理等交章劾觀並其子輻諸贓污不法事帝怒逮觀父子以彈章示之觀疏辯帝益怒出廷臣先後密奏中有枉法受賕至千金者觀引伏遂下錦衣衞獄明年將置重典士奇榮乞貸其死乃謫輻戍遼東而命觀隨往觀竟客死七年士奇請命風憲官考察奏罷有司之貪污者帝曰然向使不罷劉觀風憲安得肅贊曰成祖封茹瑺以事太祖有功然考之未有所表見意史軼之歟嚴震直之於廣西張紞之於雲南治效卓然王鈍鄭賜為方伯監司聲績頗著至其晚節皆不克自振惜夫郭資呂震之徒有幹濟才而操行無取李至剛之險吳中劉觀之墨又不足道矣
