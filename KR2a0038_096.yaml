body:
  text: 明史卷九十六志第七十二藝文一明太祖定元都大將軍收圖籍致之南京復詔求四方遺書設祕書監丞尋改翰林典籍以掌之永樂四年帝御便殿閲書史問文淵閣藏書解縉對以尚多闕略帝曰士庶家稍有餘資尚欲積書況朝廷乎遂命禮部尚書鄭賜遣使訪購惟其所欲與之勿較值北京既建詔修撰陳循取文淵閣書一部至百部各擇其一得百匱運致北京宣宗嘗臨視文淵閣親披閲經史與少傅楊士奇等討論因賜士奇等詩是時祕閣貯書約二萬餘部近百萬卷刻本十三抄本十七正統間士奇等言文淵閣所貯書籍有祖宗御製文集及古今經史子集之書向貯左順門北廊今移於文淵閣東閣臣等逐一點勘編成書目請用寶鈐識永久藏制曰可正德十年大學士梁儲等請檢內閣並東閣藏書殘闕者令原管主事李繼先等次第修補先是祕閣書籍皆宋元所遺無不精美裝用倒摺四周外向蟲鼠不能損迄流賊之亂宋刻元鐫胥歸殘闕至明御製詩文內府鏤板而儒臣奉敕修纂之書及象魏布告之訓卷帙既夥文藻復優當時頒行天下外此則名公卿之論撰騷人墨客一家之言其工者深醇大雅卓卓可傳即有怪奇駁雜出乎其間亦足以考風氣之正變辨古學之源流識大識小掌故備焉挹其華實無讓前徽可不謂文運之盛歟四部之目昉自荀勗晉宋以來因之前史兼録古今載籍以為皆其時柱下之所有也明萬曆中修撰焦竑修國史輯經籍志號稱詳博然延閣廣內之藏竑亦無從遍覽則前代陳編何憑記録區區掇拾遺聞冀以上承隋志而書錯列徒滋訛舛故今第就二百七十年各家著述稍為釐次勒成一志凡卷數莫考疑信未定者寧闕而不詳云經類十一曰易類二曰書類三曰詩類四曰禮類五曰樂類六曰春秋類七曰孝經類八曰諸經類九曰四書類十曰小學類朱升周易旁注前圖二卷周易旁注十卷梁寅周易參義十二卷趙汸大易文詮八卷鮑恂大易舉隅三卷又名大易鉤玄林大同易經奧義二卷歐陽貞周易問辨三十卷朱謐易學啓蒙述解二卷張洪周易傳義會通十五卷程汝器周易集傳十卷永樂中敕修周易傳義大全二十四卷義例一卷胡廣等纂楊士奇周易直指十卷劉髦石潭易傳撮要一卷林志周易集説三卷李賢讀易記一卷劉定之周易圖釋三卷王恕玩易意見二卷羅倫周易説旨四卷談綱讀易愚慮二卷易考圖義一卷卜筮節要一卷易義言一卷易指考辨一卷蔡清周易蒙引二十四卷朱綬易經精蘊二十四卷何孟春易疑初筮告蒙約十二卷胡世寧讀易私記四卷陳鳳梧集定古易十二卷劉玉執齋易圖説一卷許誥圖書管見一卷周用讀易日記一卷崔銑讀易餘言五卷易大象説一卷湛若水修復古易經傳訓測十卷張邦奇易説一卷鄭善夫易論一卷呂柟周易説翼三卷王崇慶周易議卦二卷唐龍易經大旨四卷韓邦奇易學啓蒙意見四卷一名易學疏原易占經緯四卷鍾芳學易疑義三卷王道周易億四卷梅鷟古易考原三卷金賁亨學易記五卷舒芬易箋問一卷季本易學四同八卷圖文餘辨一卷蓍法別傳一卷古易辨一卷林希元易經存疑十二卷陳琛易經通典六卷一名淺説方獻夫周易約説十二卷余誠易圖説一卷黃芹易圖識漏一卷李舜臣易卦辱言一卷葉良珮周易義叢十六卷豐坊古易世學十五卷坊云家有古易傳自遠祖豐稷又有古書世學六卷言得朝鮮倭國二本合於今文古文石經古本魯詩世學三十六卷亦言豐稷所傳錢謙益謂皆坊偽撰也唐樞易修墨守一卷羅洪先易解一卷楊爵周易辨録四卷薛甲易象大旨八卷熊過周易象旨決録七卷胡經易演義十八卷王畿大象義述一卷盧翰古易中説四十四卷陳言易疑四卷陳士元易象鉤解四卷易象彙解二卷魯邦彥圖書就正録一卷李贄九正易因四卷贄自謂初著易因一書改至八九次而後定故有九正之名徐師曾今文周易演義十二卷薑寶周易補疑十二卷顧曾唯周易詳蘊十三卷孫應鼇易談四卷鄧元錫易經繹五卷顏鯨易學義林十卷陳錫易原一卷王世懋易解一卷徐元氣周易詳解十卷萬廷言易説四卷易原四卷楊時喬周易古今文全書二十一卷來知德周易集注十六卷任惟賢周易義訓十卷張獻翼讀易韻考七卷曾士傳正易學啓蒙一卷葉山八白易傳十六卷金瑤六爻原意一卷李逢期易經隨筆三卷方社昌周易指要三卷孫從龍周易參疑十卷沈一貫易學十二卷馮時可易説五卷唐鶴徵周易象義四卷黃正憲易象管窺十五卷郭子章易解十五卷吳中立易詮古本三卷周坦易圖説一卷朱篁易郵七卷朱謀㙔易象通八卷陳第伏羲圖贊二卷鄧伯羔古易詮二十九卷今易詮二十四卷傅文兆羲經十一翼五卷林兆恩易外別傳一卷王宇周易占林四卷彭好古易鑰五卷方時化易疑一卷易引九卷周易頌二卷學易述談四卷章潢周易象義十卷姚舜牧易經疑問十二卷顏素易研六卷曾朝節易測十卷鄒元標易彀通一卷徐三重易義一卷蘇濬周易冥冥篇四卷易經兒説四卷沈孚聞周易日鈔十一卷屠隆讀易便解四卷楊啓新易林疑説二卷鍾化民讀易鈔十四卷李廷機易經纂注四卷易答問四卷鄒德溥易會八卷錢一本像象管見七卷易象鈔續鈔共六卷四聖一心録四卷潘士藻洗心齋讀易述十七卷嶽元聲易説三卷顧允成易圖説億言四卷焦竑易筌六卷高攀龍大易易簡説三卷周易孔義一卷郝敬周易正解二十卷易領四卷問易補七卷學易枝言二卷張納陛學易飲河八卷吳炯周易繹旨八卷萬尚烈易贊測一卷易大象測一卷吳默易説六卷姚文蔚周易旁注會通十四卷李本固古易彙編意辭集十七卷楊廷筠易顯六卷湯賓尹易經翼注四卷孫慎行周易明洛義纂述六卷不語易義二卷曹學佺周易可説七卷張汝霖周易因指八卷崔師訓大成易旨二卷劉宗周周易古文鈔三卷讀易圖記一卷薛三省易蠡二卷程汝繼周易宗義十二卷王三善周易象注九卷魏濬周易古象通八卷樊良樞易疑一卷易象二卷高捷易學象辭二集十二卷陸振奇易芥十卷楊瞿崍易林疑説十卷王納諫周易翼注三卷陸夢龍易略三卷文翔鳳邵窩易詁一卷卓爾康易學全書五十卷繆昌期周易會通十二卷羅喻義讀易內篇問篇外篇共七卷程玉潤周易演旨六十五卷錢士升易揆十二卷錢繼登易簣三卷吳極易學五卷方孔照周易時論十五卷徐世淳易就六卷汪邦柱周易會通十二卷葉憲祖大易玉匙六卷方鯤易蕩二卷鮑觀白易説二卷張伯樞易象大旨三卷吳桂森像象述五卷鄭維嶽易經意言六卷喻有功周易懸鏡七卷潘士龍演易圖説一卷洪守美易説醒四卷余叔純周易讀五卷陸起龍周易易簡編四卷徐奇周易卦義二卷洪化昭周易獨坐談五卷沈瑞鍾周易廣筌二卷林有桂易經觀理説四卷陳履祥孔易彀一卷許順義易經三注粹鈔四卷王祚昌周易敝書五卷容若春今易圖學心法釋義十卷張次仲周易玩辭困學記十二卷顧樞西疇易稿三卷陳仁錫羲經易簡録八卷黃道周易象正十四卷三易洞璣十六卷倪元璐兒易內儀六卷外儀十五卷龍文光乾乾篇三卷文安之易傭十四卷林胤昌周易耨義六卷張鏡心易經增注十二卷李奇玉易義四卷朱之俊周易纂六卷何楷古周易訂詁十六卷侯洞曾易解三卷黎遂球周易爻物當名二卷鄭賡唐讀易搜十二卷陳際泰易經大意七卷羣經輔易説一卷周易翼簡捷解十六卷秦鏞易序圖説二卷金鉉易説一卷黃端伯易疏五卷來集之讀易偶通二卷右易類二百二十二部一千五百七十卷明太祖注尚書洪範一卷帝嘗命儒臣書洪範揭於御座之右因自為注仁宗體尚書二卷釋尚書中皋陶謨甘誓盤庚等十六篇以講解更其原文世宗書經三要三卷帝以太祖有注洪範一篇因注無逸再注伊訓分三册共為一書已乃製洪範序略一篇復將皋陶謨伊訓無逸等篇通加注釋名曰書經三要洪武中敕修書傳會選六卷太祖以蔡沈書傳有得有失詔劉三吾等訂正之又集諸家之説足其未備書成頒刻然世竟鮮行永樂中修大全一依蔡傳取便於士子舉業此外不復有所考究也朱升尚書旁注六卷書傳補正輯注一卷梁寅書纂義十卷朱右書集傳發揮十卷禹貢凡例一卷徐蘭書經體要一卷陳雅言尚書卓躍六卷郭元亮尚書該義十二卷永樂中敕修書傳大全十卷胡廣等纂張洪尚書補傳十二卷彭勗書傳通釋六卷徐善述尚書直指六卷陳濟書傳補注一卷徐驥洪範解訂正一卷章陬書經提要四卷費希冉尚書本旨七卷楊守陳書私鈔一卷黃瑜書經旁通十卷李承恩書經拾蔡二卷楊廉洪範纂要一卷熊宗立洪範九疇數解八卷張邦奇書説一卷吳世忠洪範考疑一卷鄭善夫洪範論一卷劉天民洪範辨疑一卷馬明衡尚書疑義一卷呂柟尚書説疑五卷韓邦奇禹貢詳略二卷王崇慶書經説略一卷舒芬書論一卷鄭曉尚書考二卷禹貢圖説一卷馬森書傳敷言十卷張居正書經直解八卷王樵尚書日記十六卷書帷別記四卷陳錫尚書經傳別解一卷歸有光洪範傳一卷考定武成一卷程弘賓書經虹臺講義十二卷屠本畯尚書別録六卷鄧元錫尚書繹二卷章潢尚書圖説三卷陳第尚書疏衍四卷羅敦仁尚書是正二十卷鍾庚陽尚書傳心録七卷王祖嫡書疏叢鈔一卷瞿九思書經以俟録六卷姚舜牧書經疑問十二卷劉應秋尚書旨十卷郭正域東宮進講尚書義一卷錢一本範衍十卷袁宗道尚書纂注四卷焦竑禹貢解一卷吳炯書經質疑一卷王肯堂尚書要旨三十一卷郝敬尚書辨解十卷盧廷選尚書雅言六卷曹學佺書傳會衷十卷謝廷讚書經翼注七卷趙惟寰尚書蠡四卷陸鍵尚書傳翼十卷張爾嘉尚書貫言二卷薑逢元禹貢詳節一卷朱道行尚書集思通十二卷史惟堡尚書晚訂十二卷楊肇芳尚書副墨六卷潘士遴尚書葦籥五十卷徐大儀書經補注六卷黃道周洪範明義四卷鄭鄤禹貢注一卷艾南英禹貢圖注一卷傅元初尚書撮義四卷袁儼尚書百家彙解六卷江旭奇尚書傳翼二卷朱朝瑛讀書略記二卷茅瑞徵虞書箋二卷禹貢匯疏十二卷王綱振禹貢逆志一卷張能恭禹貢訂傳一卷黃翼登禹貢注刪一卷夏允彝禹貢古今合注五卷羅喻義洪範直解一卷讀範內篇一卷右書類八十八部四百九十七卷周是修詩小序集成三卷梁寅詩演義八卷詩考四卷朱升詩旁注八卷汪克寬詩集傳音義會通三十卷曾堅詩疑大鳴録一卷朱善詩解頤四卷高頤詩集傳解二十卷張洪詩正義十五卷楊禹錫詩義二卷鄭旭詩經總旨一卷永樂中敕修詩集傳大全二十卷胡廣等纂范理詩集解三十卷王逢詩經講説二十卷孫鼎詩義集説四卷李賢讀詩紀一卷楊守陳詩私鈔四卷易貴詩經直指十五卷程楷詩經講説二十卷陸深儼山詩微二卷張邦奇詩説一卷湛若水詩釐正二十卷呂柟毛詩序説六卷胡纘宗胡氏詩識三卷王崇慶詩經衍義一卷季本詩説解頤八卷總論二卷黃佐詩傳通解二十五卷潘恩詩經輯説七卷陸垹詩傳存疑一卷薛應旗方山詩説八卷陳錫詩辨疑一卷勞堪詩林伐柯四卷沈一貫詩經纂注四卷馮時可詩億二卷郭子章詩傳書例四卷朱得之印古詩説一卷袁仁毛詩或問二卷鄧元錫詩繹三卷陳第毛詩古音考四卷朱謀㙔詩故十卷凌濛初聖門傳詩嫡冢十六卷詩逆四卷陶其情詩經注疏大全纂十二卷趙一元詩經理解十四卷黃一正詩經埤傳八卷馮復京六家詩名物疏五十五卷吳雨毛詩鳥獸草木疏三十卷唐汝諤毛詩微言二十卷瞿九思詩經以俟録六卷姚舜牧詩經疑問十二卷林