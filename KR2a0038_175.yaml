body:
  text: 明史卷一百七十五列傳第六十三衛青子穎董興何洪劉雄劉玉仇鉞神英子周曹雄子謙馮禎張俊李鋐楊鋭崔文衛青字明德松江華亭人以薊州百戶降成祖積功至都指揮僉事蒞中都留守司事改山東備倭永樂十八年二月蒲臺妖婦林三妻唐賽兒作亂自言得石函中寶書神劍役鬼神剪紙作人馬相戰鬬徒衆數千據益都卸石柵寨指揮高鳳敗歿勢遂熾其黨董彥升等攻下莒即墨圍安丘總兵官安遠侯柳升帥都指揮劉忠圍賽兒寨賽兒夜劫官軍軍亂忠戰死賽兒遁去比明升始覺追不及獲賊黨劉俊等及男女百餘人而賊攻安丘益急知縣張旟丞馬撝死戰賊不能下合莒即墨衆萬餘人以攻青方屯海上聞之帥千騎晝夜馳至城下再戰大敗之城中亦鼓譟出殺賊二千生擒四千餘悉斬之時城中旦夕不能支青救稍遲城必陷比賊敗升始至青迎謁升怒其不待己捽之出是日鰲山衛指揮王真亦以兵百五十人殲賊諸城賊遂平而賽兒卒不獲帝賜書勞青切責升尚書吳中等劾升且言升媢青功於是下升獄而擢青山東都指揮使真都指揮同知旟撝左右參議賞賚有差青還備倭海上尋坐事繫獄宣德元年帝念其功釋之俾復職時京師營繕役繁調及防海士卒青以為言得番代英宗立進都督僉事尋卒青有孝行善撫士卒居海上十餘年海濱人思之請於朝立祠以祀次子穎正統初襲濟南衛指揮使景帝立奉詔入衛再遷至都指揮同知以石亨薦擢署都督僉事管五軍營右哨論黃花鎮白羊口及西直門禦寇功纍進都督同知景泰三年協鎮宣府逾年召還天順元年以奪門功封宣城伯豫世券出鎮甘肅孛來入犯不能禦為有司所劾詔不問亨敗穎以守邊故得無奪憲宗即位廷議以穎不勝任乃召還會盡革奪門世爵穎以天順間征西番馬吉思冬沙諸族功自訴詔如故成化二年為遼東總兵官尋引疾罷給事中陳鉞等劾之下獄尋宥之弘治中卒贈侯諡壯勇傳子至孫錞嘉靖時督神機營屢加太保兼太子太師四傳至時泰崇禎時掌後府京師陷懷鐵券闔門十七人皆赴井死董興長垣人初為燕山右衛指揮使纍遷署都指揮同知正統中新建伯李玉等舉興將才進署都指揮使京營管操復用薦擢署都督僉事充右參將從寧陽侯陳懋討鄧茂七破餘黨於建寧進都督同知南海賊黃蕭養圍廣州安鄉伯張安都指揮王清戰死賊衆攻城益急詔拜興左副總兵調江西兩廣軍往討而以侍郎孟鑑贊理軍務興用天文生馬軾自隨興果鋭不能戢下軾戒之景泰元年二月師至廣州賊舟千餘艘勢甚熾而徵兵未至諸將請濟師軾曰廣民延頸久矣即以狼兵往擊猶拉朽耳興從之既而兵大集進至大洲擊賊殺溺死者萬餘人餘多就撫蕭養中流矢死函首以獻俘其父及子等餘黨皆伏誅論功進右都督留鎮廣東給事中黃士俊劾興寬縱降其官明年復職久之召還分督京營與曹吉祥結姻冒奪門功封海寧伯未幾充總兵官鎮遼東豫世券議革奪門者爵興以守邊得免吉祥誅乃奪興爵仍右都督發廣西立功以錦衣李貴薦復爵總兵宣府再豫世券憲宗嗣位罷還已停世襲家居十餘年卒何洪全椒人嗣世職為成都前衛指揮使正統中從征麓川景泰末從征天柱銅鼓皆有功屢遷都指揮使掌四川都司事與平東苗憲宗即位論功擢都督僉事巡撫汪浩乞留洪四川許之德陽人趙鐸反自稱趙王漢州諸賊皆歸之連番衆數陷城殺將吏遣其黨何文讓及僧悟升掠安嶽諸縣洪斬悟升生擒文讓鐸將逼成都官軍分三路討洪偕都指揮寧用趨彰明賊引去追至梓潼朱家河力戰賊少却洪乘勝陷陳後軍不繼為賊所圍左右跳蕩殺賊甚衆力竭而死洪勇敢善撫士號令嚴蜀將無及之者既死官軍奪氣而四川都指揮僉事臨淮劉雄亦戰死雄剛徑遇敵輒前嘗捕賊漢州生擒七十餘人及鐸亂追之羅江大水河手馘數人賊連敗千戶周鼎傷雄前救之徑奔賊陳叢刺死詔贈洪都督同知豫祭葬子節襲都指揮僉事雄贈都指揮同知賜祭命子襲職超二官洪雖死綿竹典史蕭讓帥鄉兵擊鐸破之官兵頻進擊其黨稍散去鐸勢孤帥餘賊趨彰明千戶田儀等設伏梓潼而參將周貴直搗其巢賊大敗夜奔石子嶺儀亟進斬鐸賊盡平成化元年五月也劉玉字仲璽磁州人生有膂力給侍曹吉祥家從征麓川授副千戶積功至都指揮僉事天順元年以奪門功進都督僉事尋充右參將守備潯州慶遠蠻剽博白及廣東之寧川玉偕左參將范信邀擊敗之俄命分守貴州從方瑛討東苗殲干把豬討西堡苗縶其魁楚得先後斬首千級毀其巢而還旋改右副總兵鎮守貴州吉祥誅玉下吏當斬以道遠不與謀免死謫海南副千戶六年帝將以谷登為甘肅副總兵李賢言登不任玉老成乃復以為都督僉事右副總兵鎮守涼州咎咂族叛會兵平之進都督同知成化四年滿俊亂固原白圭舉玉為總兵官統左右參將夏正劉清討之兵分為七玉與總督項忠抵石城賊已數敗會毛忠死玉亦被圍中流矢力戰得出相持兩月大小百十戰竟平之進左都督掌右府事自訴前西堡功命增俸百石掌耀武營六年充左副總兵從朱永出延綏五月河套部入犯玉帥衆禦却之逾年卒贈固原伯諡毅敏玉雖起僕隸勇決過人善撫士所至未嘗衄滿俊之叛據石城險屢敗官軍玉戰最力及論功只賜秩一級時惜其薄子文襲指揮使仇鉞字廷威鎮原人初以傭卒給事寧夏總兵府大見信愛會都指揮僉事仇理卒無嗣遂令鉞襲其世職為寧夏前衛指揮同知理江都人故鉞自稱江都仇氏再以破賊功進都指揮僉事正德二年用總制楊一清薦擢寧夏遊擊將軍五年安化王置鐇及都指揮何錦周昂指揮丁廣反鉞時駐城外玉泉營聞變欲遁去顧念妻子在城中恐為所屠滅遂引兵入城解甲覲置鐇歸臥家稱病以所將兵分隸賊營錦等信之時時就問計鉞亦謬輸心腹而陰結壯士遣人潛出城令還報官軍旦夕至鉞因紿錦廣宜急出兵守渡口遏東岸兵勿使渡河錦廣果傾營出而昂獨守城置鐇以禡牙召鉞鉞稱病亟昂來視鉞方堅臥呻吟伏卒猝起捶殺昂鉞乃被甲橫刀提其首躍馬大呼壯士皆集徑馳詣置鐇第縛之傳置鐇令召錦等還而密諭其部曲以擒置鐇狀衆遂大潰錦廣單騎走賀蘭山為邏卒所獲舉事凡十八日而敗先是中朝聞變議以神英為總兵官而命鉞為副俄傳鉞降賊欲追敕還大學士楊廷和曰鉞必不從賊令知朝廷擢用志當益堅不然棄良將資敵人耳乃不追事果定而劉瑾昵陝西總兵官曹雄盡以鉞功歸之鉞竟無殊擢巡按御史閻睿訟其功詔奪俸三月瑾誅始進署都督僉事充寧夏總兵官尋論功封咸寧伯歲祿千石豫世券明年冬召掌三千營七年二月拜平賊將軍偕都御史彭澤討河南盜劉惠趙鐩以中官陸誾監其軍未至而參將馮禎戰死洛南賊勢益熾已聞官軍將至遂奔汝州又聞官軍扼要害乃走寶豐復由舞陽遂平轉掠汝州東南敗奔固始抵潁州屯朱皋鎮永順宣慰彭明輔等擊之賊倉猝渡河溺死者二千人餘衆走光山鉞追及之命諸將神周姚信時源金輔左右夾擊賊大敗斬首千四百有奇湖廣軍亦破其別部賈勉兒於羅田賊沿途潰散自六安陷舒城復還光山至商城官軍追之急賊復南攻六安將陷時源等涉河進敗之七里岡賊趨廬州至定遠西又敗還至六安分其衆為二劉惠與趙鐩二弟鐇鎬帥萬餘人北走商城而鐩道遇其徒張通及楊虎遺黨數千人勢復振掠鳳陽陷泗宿睢寧定遠於是澤與鉞計使神周追鐩時源金輔追惠姚信追勉兒勉兒鐩復合周信連敗之宿州追奔至應山其衆略盡鐩剃髮懷度牒潛至江夏飯村店軍士趙成執送京師伏誅源輔追劉惠連戰皆捷惠窘走南召指揮王謹追及於土地嶺射中惠左目自縊死勉兒數為都指揮朱忠夏廣所敗獲之項城丁村餘黨邢本道劉資及楊寡婦等先後皆被擒凡出師四月而河南賊悉平趙鐩一名風子文安諸生也劉七等亂起鐩挈家匿渚中賊驅之登陸將樜其妻女鐩素驍健有膂力手格殺二賊賊聚執之遂入其黨為之魁賊專事淫掠鐩稍有智計定為部伍勸其黨無妄殺移檄府縣約官吏師儒毋走避迎者安堵由是橫行中原勢出劉六等上嘗攻鈞州五日以馬文升方家居舍之去有司遣人齎招撫榜至鐩具疏附奏言今羣姦在朝舞弄神器濁亂海內誅戮諫臣屏棄元老舉動若此未有不亡國者乞陛下睿謀獨斷梟羣姦之首以謝天下即梟臣之首以謝羣姦其桀黠如此鉞既平河南賊移師會陸完共滅劉七等於江北論功進世侯增祿百石仍督三千營八年大同有警命充總兵官統京軍禦之鉞上五事中請遣還京操邊軍停京軍出征以省公私之擾尤切時弊時不能用鉞既至值寇犯萬全沙河擊之斬首三級而軍士亡者二十餘人寇亦引去奏捷蒙賚朝論恥之帝詔諸邊將入侍豹房鉞嘗一入後輒力辭十年冬稱疾解營務詔給軍三十人役其家世宗立再起督三千營掌前府事未上卒年五十七諡武襄子昌以病廢孫鸞嗣侯世宗時怙寵通邊磔死爵除神英字景賢壽州人天順初襲父職為延安衛指揮使守備寧塞營屢將騎兵從都督張欽等征討有功成化元年尚書王復行邊薦英有謀勇進都指揮僉事以從征滿四功遷都指揮使充延綏右參將屢敗癿加思蘭兵進署都督僉事巡撫余子俊築邊牆命英董役工成受賚久之充總兵官鎮守寧夏移延綏復移宣府弘治改元移大同十一年馬市開英違禁貿易寇掠蔚州又不救言官連劾召還間住尋起督果勇營嘗充右參將從朱暉禦寇延綏武宗立寇犯宣府與李俊並充左參將帥京軍以援尋以都督同知僉書左府剿近畿劇賊進右都督正德五年給事中段豸劾英老命致仕當是時劉瑾竊政總兵官曹雄等以附瑾得重權英素習瑾厚賄之因自陳邊功乞録特詔豫伯爵吏兵二部持之下廷議而廷臣希瑾指無不言當封者遂封涇陽伯祿八百石未幾置鐇反命充總兵官討之未至賊已滅其秋瑾敗為言官所劾詔奪爵以右都督致仕越二年卒子周輸粟為指揮僉事纍官都指揮使充延綏右參將正德六年命以所部兵討河南流賊數有功再進都督同知賊平遂以副總兵鎮山西九年秋寇大入寧武關躪欣定襄寧化周擁兵不戰軍民死者數千詔巡撫官執歸京師周潛結貴近行至易州偽稱病自陳戰功帝乃宥周罪盡削其秩為總旗而輸粟指揮如故已夤緣江彬入豹房驟復都督賜國姓典兵禁中遂與彬相倚為聲勢納賄不資彬敗周亦下獄伏誅曹雄西安左衛人弘治末歷官都指揮僉事為延綏副總兵武宗即位用總督楊一清薦擢署都督僉事充總兵官鎮固原以瑾同鄉自附於瑾瑾欲廣樹黨日相親重正德四年雄上言故事布按二司及兵備道臣文移達總兵官者率由都司轉達今邊務亟徵調不時都司遠在會城往返千里恐誤軍機乞如巡撫大同例徑呈總兵官便兵部尚書曹元希瑾意覆如其言既復受瑾屬奏雄鎮守未佩印宜如各邊例特賜印以重其權乃進雄署都督同知以延綏總兵官吳江所佩征西將軍印佩之而別鑄靖虜將軍印豫江及總督才寬禦寇沙窩為所殺雄擁兵不救佯引罪乞解兵柄令子謐齎奏詣京師瑾異謐貌妻以從女而優詔褒雄令居職如故糾者反被責置鐇反寧夏雄聞變即統兵壓境上令都指揮黃正以兵三千入靈州固士卒心約鄰境刻期討密焚大小二壩積草與守備史鏞等奪河西船盡泊東岸賊黨何錦懼急帥兵出守大壩以防決河雄乃令鏞潛通書仇鉞俾從中舉事賊遂成擒是役也功雖成於鉞而居外布置賊不內顧雄有勞焉捷聞瑾以平賊功歸之進左都督謐亦官千戶雄不安引咎自劾推功諸將降旨慰勞未幾瑾敗言官交劾降指揮僉事尋徵下獄以黨逆論死籍其家宥之與家屬永戍海南遇赦不原雄長子謙讀書能文有機略好施豫故參政李崙主事孔琦家貧甚雄請周恤其妻子以勸廉吏謙意也御史高胤先被逮無行資謙為治裝並恤其家受業楊一清聞一清將起用貽書止之曰近日關中人材連茹而起實山川不幸獨不留三五輩為後日地耶時陝人率附瑾以進故謙云然雄下獄謙亦被繫為怨家箠死馮禎綏德衛人起家卒伍纍功為本衛指揮僉事弘治末擢署都指揮僉事守備偏頭關尋充參將分守寧夏西路以勇敢聞置鐇反馳奏告變事平進署都指揮同知已擢副總兵協守延綏正德六年七月盜起中原詔以所部千五百人入討至阜城遇賊禎令軍中毋顧首級貪虜獲遂大敗賊逐北數十里俘斬八百六十有奇進解曹州圍執其魁朱諒録功進都督僉事明年春劉惠趙鐩亂河南連陷鹿邑上蔡西平遂平舞陽葉縱掠南頓新蔡商水襄城復還駐西平禎偕副總兵時源參將神周金輔擊敗之賊奔入城官軍塞其門乘夜焚死千餘人斬首稱是餘賊潰而西巡撫鄧璋等朝崇王於汝寧宴飲連日賊招散亡勢復振陷鄢陵滎陽汜水鞏圍河南府三日諸軍始集賊屯洛南覘官軍飢疲迎戰右哨金輔不敢渡洛禎及源周方陳而後哨參將姚信所部京軍先馳失利遽遁陳亂賊乘之禎下馬殊死鬬援絶死焉贈洛南伯賜祭葬授其子大金都督僉事後賊平論功復廕一子世百戶明年是日禎死所風霾大作又明年亦如之伊王奏聞敕有司建祠歲以死日致祭尋用給事中李鐸言歲給米二石帛二匹贍其家張俊宣府前衛人嗣世職為本衛指揮使纍擢大同遊擊將軍弘治十二年以功進都指揮同知火篩入大同左衛大掠八日俊遣兵三百邀其前復分兵三百為策應而親禦之荊東莊依河結營擊卻三萬餘騎帝大喜立擢都督僉事未幾總兵官王璽失事被徵即命俊代之其冬以寇入戴罪尋移鎮宣府中官苗逵督師延綏檄大同宣府卒為探騎俊持不遣逵遂劾俊帝宥俊而命發卒如逵言武宗初立寇乘喪大入連營二十餘里俊遣諸將李稽白玉張雄王鎮穆榮各帥三千人分扼要害俄寇由新開口毀垣入稽遽前迎敵玉雄鎮榮各帥所部拒於虞臺嶺俊急帥三千人赴援道傷足以兵屬都指揮曹泰泰至鹿角山被圍俊力疾益調兵五千人持三日糧馳解泰圍復援出鎮又分兵救稽玉稽玉亦潰圍出獨雄榮阻山澗援絶死諸軍已大困收兵還寇追之行且戰僅得入萬全右衛城士馬死亡無算俊及中官劉清巡撫李進皆徵還御史郭東山言俊扶病馳援勸懲不宜偏廢乃許贖罪正德五年起署都督同知典神威營操練明年六月賊楊虎等自山西十八盤還破武安掠威曲周武城清河故城景州轉入文安與劉六等合都指揮桑玉屢敗僉事許承芳請濟師乃命俊充副總兵與參將王琮統京軍千人討之往來近畿數月不能創賊已朝議調邊軍協守賊遂連敗明年三月劉六劉七齊彥名龐文宣等敗奔登萊海套陸完檄俊軍萊州合諸將李鋐等邀之賊遂北走轉掠寶坻香河玉田俊急偕許泰卻永遏之帝喜勞以白金賊由武清西去未幾得疾召還後賊平實授都督同知久之卒俊為邊將持廉有謀勇其歿也家無贏資李鋐大同右衛人世指揮同知纍功進都指揮僉事充參將協守大同山東盜起詔改遊擊將軍尋充副總兵與俊等邀賊復與劉暉部將傅鎧張椿等數立功賊平進都指揮同知充總兵官鎮鳳陽諸府尋以江西盜猖獗擢署都督僉事與都御史俞諫同提督軍務賊王浩八據裴源山憑高發矢石官軍幾不支鋐下馬持刀督將士殊死鬬賊乃走追數十里擒之復以次討平劉昌三胡浩三等移駐餘干將擊遺賊之未下者疽發背卒於軍詔贈右都督廕子都指揮僉事楊鋭字進之蕭縣人嗣世職為南京羽林前衛指揮使正德初以才擢掌龍江右衛事督造漕舟於淮安寧王宸濠有異謀王瓊以安慶居要害宜置戍乃進鋭署都指揮僉事守備其地鋭與知府張文錦治戰艦日督士肄水戰十四年六月丙子宸濠反東下焚彭澤湖口望江己丑奄至安慶城下舟五十餘艘鋭文錦與指揮崔文同知林有祿通判何景暘懷寧知縣王誥等禦之江滸已收兵入城被圍鋭文軍城西文錦有祿軍城北景暘誥軍東南城西尤要衝鋭晝夜拒戰殺傷賊二百餘斬其間諜乃稍卻七月丁酉賊悉兵至號十萬舳艫相銜六十餘里宸濠乘黃艦泊黃石磯身自督戰江西僉事潘鵬在賊軍安慶人也宸濠令諭降呼鋭及文錦語衆心頗搖吏黃洲者以大義責數之鵬慚而退既復持偽檄至其家僮見遙呼之鋭腰斬以徇將射鵬鵬遁去衆心乃定賊怒圍城數周攻益急鋭等殊死戰賊雲樓數十瞰城中城中亦造飛樓射賊夜縋人焚賊樓賊置天梯廣二丈高於城版蔽之前後有門伏兵其中輪轉以薄城城上束葦沃膏燃其端梯稍近即投之須臾盡焚賊多死時軍衛卒不滿百乘城皆民兵老弱婦女饋餉人運石一二數日積如山賊攻城城上或投石或沸湯沃之賊輒傷鋭等射書賊營諭令解散有亡去者乃募死士夜劫賊營賊大驚擾比曉稍定宸濠慚憤謂其下曰安慶且不克安望南都會聞伍文定等破南昌遂解圍去文出城襲擊又破之旬有八日而圍解事聞武宗大喜擢鋭參將分守安徽池太寧國及九江饒黃鋭薦鄭嶽胡世寧帝即召用世宗立論功擢都督僉事廕子世千戶再遷僉書左府改南京右府充總兵官鎮遼東改督漕運鎮淮安嘉靖十年為巡按御史李循義劾罷踰年卒崔文世為安慶衛指揮使守城勞亞於鋭世宗録其功超三階為都指揮使廕子世百戶江淮多盜廷議設總兵官督上下江防擢文都督僉事任之改蒞南京前府專督操江久之卒贊曰衛青等當承平時不逞竊發列城擾攘賴其戡定雖所敵非堅然勇敢力戰功多可紀或遂身膏原野若何洪劉雄馮禎輩壯節有足惜者鉞以心計定亂鋭以城守摧逆干城之寄克稱廟謨神英曹雄亦有勞績而以附閹損名且獲罪為將者其以跅弛為戒哉
