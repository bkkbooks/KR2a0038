body:
  text: 明史卷七十九志第五十五食貨三漕運倉庫歷代以來漕粟所都給官府廩食各視道里遠近以為準太祖都金陵四方貢賦由江以達京師道近而易自成祖遷燕道里遼遠法凡三變初支運次兌運支運相參至支運悉變為長運而制定洪武元年北伐命浙江江西及蘇州等九府運糧三百萬石於汴梁已而大將軍徐達令欣崞代堅臺五州運糧大同中書省符下山東行省募水工發萊州洋海倉餉永平衛其後海運餉北平遼東為定制其西北邊則浚開封漕河餉陝西自陝西轉餉寧夏河州其西南令川貴納米中鹽以省遠運於時各路皆就近輸得利便矣永樂元年納戶部尚書郁新言始用淮船受三百石以上者道淮及沙河抵陳州潁岐口跌坡別以巨舟入黃河抵八柳樹車運赴衛河輸北平與海運相參時駕數臨幸百費仰給不止餉邊也淮海運道凡二而臨清倉儲河南山東粟亦以輸北平合而計之為三運惟海運用官軍其餘則皆民運云自濬會通河帝命都督賈義尚書宋禮以舟師運禮以海船大者千石工窳輒敗乃造淺船五百艘運淮揚徐兗糧百萬以當海運之數平江伯陳瑄繼之頗增至三千餘艘時淮徐臨清德州各有倉江西湖廣浙江民運糧至淮安倉分遣官軍就近挽運自淮至徐以浙直軍自徐至德以京衛軍自德至通以山東河南軍以次遞運歲凡四次可三百萬餘石名曰支運支運之法支者不必出當年之民納納者不必供當年之軍支通數年以為裒益期不失常額而止由是海陸二運皆罷惟存遮洋船每歲於河南山東小灘等水次兌糧三十萬石十二輸天津十八由直沽入海輸薊州而已不數年官軍多所調遣遂復民運道遠數愆期宣德四年瑄及尚書黃福建議復支運法乃令江西湖廣浙江民運百五十萬石於淮安倉蘇松寧池廬安廣德民運糧二百七十四萬石於徐州倉應天常鎮淮揚鳳太滁和徐民運糧二百二十萬石於臨清倉令官軍接運入京通二倉民糧既就近入倉力大減省乃量地近遠糧多寡抽民船十一或十三五之一以給官軍惟山東河南北直隸則徑赴京倉不用支運尋令南陽懷慶汝寧糧運臨清倉開封彰德衛輝糧運德州倉其後山東河南皆運德州倉六年瑄言江南民運糧諸倉往返幾一年誤農業令民運至淮安瓜洲兌與衛所官軍運載至北給與路費耗米則軍民兩便是為兌運命羣臣會議吏部蹇義等上官軍兌運民糧加耗則例以地遠近為差每石湖廣八斗江西浙江七斗南直隸六斗北直隸五斗民有運至淮安兌與軍運者止加四斗如有兌運不盡仍令民自運赴諸倉不願兌者亦聽其自運軍既加耗又給輕齎銀為洪閘盤撥之費且得附載他物皆樂從事而民亦多以遠運為艱於是兌運者多而支運者少矣軍與民兌米往往恃強勒索帝知其弊敕戶部委正官監臨不許私兌已而頗減加耗米遠者不過六斗近者至二斗五升以三分為率二分與米一分以他物準正糧斛面鋭耗糧俱平概運糧四百萬石京倉貯十四通倉貯十六臨徐淮三倉各遣御史監收正統初運糧之數四百五十萬石而兌運者二百八十萬餘石淮徐臨德四倉支運者十之三四耳土木之變復盡留山東直隸軍操備蘇松諸府運糧仍屬民景泰六年瓦剌入貢乃復軍運天順末兌運法行久倉人覬耗餘入庾率兌斛面且求多索軍困甚憲宗即位漕運參將袁佑上言便宜帝曰律令明言收糧令納戶平準石加耗不過五升今運軍願明加則倉吏侵害過多可知今後令軍自概每石加耗五升毋溢勒索者治罪後從督倉中官言加耗至八升久之復溢收如故屢禁不能止也初運糧京師未有定額成化八年始定四百萬石自後以為常北糧七十五萬五千六百石南糧三百二十四萬四千四百石其內兌運者三百三十萬石由支運改兌者七十萬石兌運之中湖廣山東河南折色十七萬七千七百石通計兌運改兌加以耗米入京通兩倉者凡五百十八萬九千七百石而南直隸正糧獨百八十萬蘇州一府七十萬加耗在外浙賦視蘇減數萬江西湖廣又殺焉天津薊州密雲昌平共給米六十四萬餘石悉支兌運米而臨德二倉貯預備米十九萬餘石取山東河南改兌米充之遇災傷則撥二倉米以補運務足四百萬之額不令缺也至成化七年乃有改兌之議時應天巡撫滕昭令運軍赴江南水次交兌加耗外復石增米一斗為渡江費後數年帝乃命淮徐臨德四倉支運七十萬石之米悉改水次交兌由是悉變為改兌而官軍長運遂為定制然是時司倉者多苛取甚至有額外罰運軍展轉稱貸不支弘治元年都御史馬文升疏論運軍之苦言各直省運船皆工部給價令有司監造近者漕運總兵以價不時給請領價自造而部臣慮軍士不加愛護議令本部出料四分軍衛任三分舊船抵三分軍衛無從措辦皆軍士賣資産鬻男女以供之此造船之苦也正軍逃亡數多而額數不減俱以餘丁充之一戶有三四人應役者春兌秋歸艱辛萬狀船至張家灣又雇車盤撥多稱貸以濟用此往來之苦也其所稱貸運官因以侵漁責償倍息而軍士或自載土産以易薪米又格於禁例多被掠奪今宜加造船費每艘銀二十兩而禁約運官及有司科害搜檢之弊庶軍困少蘇詔從其議五年戶部尚書葉淇言蘇松諸府連歲荒歉民買漕米每石銀二兩而北直隸山東河南歲供宣大二邊糧料每石亦銀一兩去歲蘇州兌運已折五十萬石每石銀一兩今請推行於諸府而稍差其直災重者石七錢稍輕者石仍一兩俱解部轉發各邊抵北直隸三處歲供之數而收三處本色以輸京倉則費省而事易集從之自後歲災輒權宜折銀以水次倉支運之糧充其數而折價以六七錢為率無復至一兩者先是成化間行長運之法江南州縣運糧至南京令官軍就水次兌支計省加耗輸挽之費得餘米十萬石有奇貯預備倉以資緩急之用至是巡撫都御史以兌支有弊請令如舊上倉而後放支戶部言兌支法善不可易詔從部議以所餘就貯各衛倉作正支銷又從戶部言山東改兌糧九萬石仍聽民自運臨德二倉令官軍支運正德二年漕運官請疏通水次倉儲言往時民運至淮徐臨德四倉以待衛軍支運後改附近州縣水次交兌已而并支運七十萬石亦令改兌但七十萬石之外猶有交兌不盡者民仍運赴四倉久無支銷以致陳腐請將浙江江西湖廣正兌糧米三十五萬石折銀解京而令三省衛軍赴臨德等倉支運如所折之數則諸倉米不腐三省漕卒便於支運歲漕額外又得三十五萬折銀一舉而數善具矣帝命部臣議如其請六年戶部侍郎邵寶以漕運遲滯請復支運法戶部議支運法廢久不可卒復事遂寢臨德二倉之貯米也凡十九萬計十年得百九十萬自世宗初災傷撥補日多而山東河南以歲歉數請輕減且二倉囤積多朽腐於是改折之議屢興而倉儲漸耗矣嘉靖元年漕運總兵楊宏請以輕齎銀聽運官道支為顧僦舟車之費不必裝鞘印封計算羡餘以苦漕卒給事御史交駁之戶部言科道官之論主於防奸是也但輕齎本資轉般費今慮官軍侵耗盡取其贏餘以歸太倉則以腳價為正糧非立法初意也乃議運船至通州巡倉御史核驗酌量支用實數著為定規有羡餘不輸太倉即用以修船官旗漁蠹者重罪輕齎銀者憲宗以諸倉改兌給路費始各有耗米兌運米俱一平一鋭故有鋭米自隨船給運四斗外餘折銀謂之輕齎凡四十四萬五千餘兩後頗入太倉矣隆慶中運道艱阻議者欲開膠萊河復海運由淮安清江浦口歷新壩馬家壕至海倉口徑抵直沽止循海套不泛大洋疏上遣官勘報以水多沙磧而止神宗時漕運總督舒應龍言國家兩都並建淮徐臨德實南北咽喉自兌運久行臨德尚有歲積而淮徐二倉無粒米請自今山東河南全熟時盡徵本色上倉計臨德已足五十餘萬則令納於二倉亦積五十萬石而止從之當是時折銀漸多萬曆三十年漕運抵京僅百三十八萬餘石而撫臣議截留漕米以濟河工倉場侍郎趙世卿爭之言太倉入不當出計二年後六軍萬姓將待新漕舉炊倘輸納愆期不復有京師矣蓋災傷折銀本折漕糧以抵京軍月俸其時混支以給邊餉遂致銀米兩空故世卿爭之自後倉儲漸匱漕政亦益弛逮於啓禎天下蕭然煩費歲供愈不足支矣運船之數永樂至景泰大小無定為數至多天順以後定船萬一千七百七十官軍十二萬人許令附載土宜免徵稅鈔孝宗時限十石神宗時至六十石憲宗立運船至京期限北直隸河南山東五月初一日南直隸七月初一日其過江支兌者展一月浙江江西湖廣九月初一日通計三年考成違限者運官降罰武宗列水程圖格按日次填行止站地違限之米頓德州諸倉曰寄囤世宗定過淮程限江北十二月江南正月湖廣浙江江西三月神宗時改為二月又改至京限五月者縮一月七八九月者遞縮兩月後又通縮一月神宗初定十月倉十一月兌竣大縣限船到十日小縣五日十二月開幫二月過淮三月過洪入閘皆先期以樣米呈戶部運糧到日比驗相同乃收凡災傷奏請改折者毋過七月題議後期及臨時改題者立案免覆漂流者抵換食米大江漂流為大患河道為小患二百石外為大患二百石內為小患小患把總勘報大患具奏其後不計多寡概行奏勘矣初船用楠杉下者乃用松三年小修六年大修十年更造每船受正耗米四百七十二石其後船數缺少一船受米七八百石附載夾帶日多所在稽留違限一遇河決即有漂流官軍因之為奸水次折乾沿途侵盜妄稱水火至有鑿船自沉者明初命武臣督海運嘗建漕運使尋罷成祖以後用御史又用侍郎都御史催督郎中員外分理主事督兌其制不一景泰二年始設漕運總督於淮安與總兵參將同理漕事漕司領十二總十二萬軍與京操十二營軍相準初宣宗令運糧總兵官巡撫侍郎歲八月赴京會議明年漕運事宜及設漕運總督則并令總督赴京至萬曆十八年後始免凡歲正月總漕巡揚州經理瓜淮過閘總兵駐徐邳督過洪入閘同理漕參政管押赴京攢運則有御史郎中押運則有參政監兌理刑管洪管廠管閘管泉監倉則有主事清江衛河有提舉兌畢過淮過洪巡撫漕司河道各以職掌奏報有司米不備軍衛船不備過淮誤期者責在巡撫米具船備不即驗放非河梗而壓幫停泊過洪誤期因而漂凍者責在漕司船糧依限河渠淤淺疏濬無法閘坐啓閉失時不得過洪抵灣者責在河道明初於漕政每加優恤仁宣禁役漕舟宥遲運者英宗時始扣口糧均攤而運軍不守法度為民害自後漕政日弛軍以耗米易私物道售稽程比至反買倉米補納多不足數而糧長率攙沙水於米中河南山東尤甚往往蒸溼浥爛不可食權要貸運軍銀以罔厚利至請撥關稅給船料以取償漕運把總率由賄得倉場額外科取歲至十四萬世宗初政諸弊多釐革然漂流違限二弊日以滋甚中葉以後益不可究詰矣漕糧之外蘇松常嘉湖五府輸運內府白熟粳糯米十七萬四十餘石內折色八千餘石各府部糙粳米四萬四千餘石內折色八千八百餘石令民運謂之白糧船自長運法行糧皆軍運而白糧民運如故穆宗時陸樹德言軍運以充軍儲民運以充官祿人知軍運之苦不知民運尤苦也船戶之求索運軍之欺陵洪閘之守候入京入倉厥弊百出嘉靖初民運尚有保全之家十年後無不破矣以白糧令軍帶運甚便疏入下部議不從凡諸倉應輸者有定數其或改撥他鎮者水次應兌漕糧即令坐派鎮軍領兌者給價州縣官督車戶運至遠倉或給軍價就令關支者通謂之穵運九邊之地輸糧大率以車宣德時餉開平亦然而蘭甘松潘往往使民背負永樂中又嘗令廣東海運二十萬石給交址云明初京衛有軍儲倉洪武三年增置至二十所且建臨濠臨清二倉以供轉運各行省有倉官吏俸取給焉邊境有倉收屯田所入以給軍州縣則設預備倉東南西北四所以振凶荒自鈔法行頗有省革二十四年儲糧十六萬石於臨清以給訓練騎兵二十八年置皇城四門倉儲糧給守禦軍增京師諸衛倉凡四十一又設北平密雲諸縣倉儲糧以資北征永樂中置天津及通州左衛倉且設北京三十七衛倉益令天下府縣多設倉儲預備倉之在四鄉者移置城內逮會通河成始設倉於徐州淮安德州而臨清因洪武之舊并天津倉凡五謂之水次倉以資轉運既又移德州倉於臨清之永清壩設武清衛倉於河西務設通州衛倉於張家灣宣德中增造臨清倉容三百萬石增置北京及通州倉京倉以御史戶部官錦衣千百戶季更巡察外倉則布政按察都司關防之各倉門以致仕武官二率老幼軍丁十人守之半年一更英宗初命廷臣集議天下司府州縣有倉者以衛所倉屬之無倉者以衛所改隸惟遼東甘肅寧夏萬全及沿海衛所無府州縣者仍其舊正統中增置京衛倉凡七自兌運法行諸倉支運者少而京通倉不能容乃毀臨清德州河西務倉三分之一改為京通倉景泰初移武清衛諸倉於通州成化初廢臨德預備倉在城外者而以城內空廒儲預備米名臨清者曰常盈德州者曰常豐凡京倉五十有六通倉十有六直省府州縣藩府邊隘堡站衛所屯戍皆有倉少者一二多者二三十云預備倉之設也太祖選耆民運鈔糴米以備振濟即令掌之天下州縣多所儲蓄後漸廢弛于謙撫河南山西修其政周忱撫南畿別立濟農倉他人不能也正統時重侵盜之罪至僉妻充軍且定納穀千五百石者敕奬為義民免本戶雜役凡振饑米一石俟有年納稻穀二石五斗還官弘治三年限州縣十里以下積萬五千石二十里積二萬石衛千戶所萬五千石百戶所三百石考滿之日稽其多寡以為殿最不及三分者奪俸六分以上降調十八年令贖罪贓罰皆糴穀入倉正德中令囚納紙者以其八折米入倉軍官有犯者納穀準立功初預備倉皆設倉官至是革令州縣官及管糧倉官領其事嘉靖初諭德顧鼎臣言成弘時每年以存留餘米入預備倉緩急有備今秋糧僅足兌運預備無粒米一遇災傷輒奏留他糧及勸富民借穀以應故事乞急復預備倉糧以裕民帝乃令有司設法多積米穀仍倣古常平法春振貧民秋成還官不取其息府積萬石州四五千石縣二三千石為率既又定十里以下萬五千石纍而上之八百里以下至十九萬石其後積粟盡平糶以濟貧民儲積漸減隆慶時劇郡無過六千石小邑止千石久之數益減科罰亦益輕萬曆中上州郡至三千石止而小邑或僅百石有司沿為具文屢下詔申飭率以虛數欺罔而已弘治中江西巡撫林俊嘗請建常平及社倉嘉靖八年乃令各撫按設社倉令民二三十家為一社擇家殷實而有行義者一人為社首處事公平者一人為社正能書算者一人為社副每朔望會集別戶上中下出米四斗至一斗有差斗加耗五合上戶主其事年饑上戶不足者量貸稔歲還倉中下戶酌量振給不還倉有司造冊送撫按歲一察核倉虛罰社首出一歲之米其法頗善然其後無力行者兩京庫藏先後建設其制大略相同內府凡十庫內承運庫貯緞匹金銀寶玉齒角羽毛而金花銀最大歲進百萬兩有奇廣積庫貯硫黃硝石甲字庫貯布匹顏料乙字庫貯胖襖戰鞋軍士裘帽丙字庫貯棉花絲纊丁字庫貯銅鐵獸皮蘇木戊字庫貯甲仗贓罰庫貯沒官物廣惠庫貯錢鈔廣盈庫貯紵絲紗羅綾錦紬絹六庫皆屬戶部惟乙字庫屬兵部戊字廣積廣盈庫屬工部又有天財庫亦名司鑰庫貯各衙門管鑰亦貯錢鈔供用庫貯粳稻熟米及上供物以上通謂之內庫其在宮內者又有內東裕庫寶藏庫謂之𩹉庫凡𩹉庫不關於有司其會歸門寶善門迤東及南城磁器諸庫則謂之外庫若內府諸監司局神樂堂犧牲所太常光祿寺國子監皆各以所掌收貯應用諸物太僕則馬價銀歸之明初嘗置行用庫於京城及諸府州縣以收易昏爛之鈔仁宗時罷英宗時始設太倉庫初歲賦不徵金銀惟坑冶稅有金銀入內承運庫其歲賦偶折金銀者俱送南京供武臣祿而各邊有緩急亦取足其中正統元年改折漕糧歲以百萬為額盡解內承運庫不復送南京自給武臣祿十餘萬兩外皆為御用所謂金花銀也七年乃設戶部太倉庫各直省派剩麥米十庫中綿絲絹布及馬草鹽課關稅凡折銀者皆入太倉庫籍沒家財變賣田産追收店錢援例上納者亦皆入焉專以貯銀故又謂之銀庫弘治時內府供應繁多每收太倉銀入內庫又置南京銀庫正德時內承運庫中官數言內府財用不充請支太倉銀戶部執奏不能沮嘉靖初內府供應視弘治時其後乃倍之初太倉中庫積銀八百餘萬兩續收者貯之兩廡以便支發而中庫不動遂以中庫為老庫兩廡為外庫及是時老庫所存者僅百二十萬兩二十二年特令金花子粒銀應解內庫者並送太倉備邊用然其後復入內庫三十七年令歲進內庫銀百萬兩外加預備欽取銀後又取沒官銀四十萬兩入內庫隆慶中數取太倉銀入內庫承運庫中官至以空劄下戶部取之廷臣疏諫皆不聽又數取光祿太僕銀工部尚書朱衡極諫不聽初世宗時太倉所入二百萬兩有奇至神宗萬曆六年太倉歲入凡四百五十餘萬兩而內庫歲供金花銀外又增買辦銀二十萬兩以為常後又加內操馬芻料銀七萬餘兩久之太倉光祿太僕銀括取幾盡邊賞首功向發內庫者亦取之太僕矣凡甲字諸庫主事偕科道巡視太倉庫員外郎主事領之而以給事中巡視嘉靖中始兩月一報出納之數時修工部舊庫名曰節慎庫以貯礦銀尚書文明以給工價帝詰責之令以他銀補償自是專以給內用焉其在外諸布政司都司直省府州縣衛所皆有庫以貯金銀錢鈔絲帛贓罰諸物巡按御史三歲一盤查各運司皆有庫貯銀歲終巡鹽御史委官察之凡府州縣稅課司局河泊所歲課商稅魚課引由契本諸課程太祖令所司解州縣府司以至於部部劄之庫其元封識不擅發也至永樂時始委驗勘中方起解至部復驗同乃進納嘉靖時建驗試廳驗中給進狀寄庫月逢九會巡視庫藏科道官進庫驗收不堪者駁易正統十年設通濟庫於通州世宗時罷隆慶初密雲薊州昌平諸鎮皆設庫收貯主客年例軍門公費及撫賞修邊銀云凡為倉庫害者莫如中官內府諸庫監收者橫索無厭正德時台州衛指揮陳良納軍器稽留八載至乞食於市內府收糧增耗嘗以數倍為率其患如此諸倉初不設中官宣德末京通二倉始置總督中官一人後淮徐臨德諸倉亦置監督漕挽軍民被其害世宗用孫交張孚敬議撤革諸中官惟督諸倉者如故久之從給事中管懷理言乃罷之初天下府庫各有存積邊餉不借支於內京師不收括於外成化時巡鹽御史楊澄始請發各鹽運提舉司贓罰銀入京庫弘治時給事中曾昂請以諸布政司公帑積貯征徭羡銀盡輸太倉尚書周經力爭之以為用不足者以織造賞賚齊醮土木之故必欲盡括天下財非藏富於民意也至劉瑾用事遂令各省庫藏盡輸京師世宗時閩廣進羡餘戶部請責他省巡按歲一奏獻如例又以太倉庫匱運南戶部庫銀八十萬兩實之而戶部條上理財事宜臨德二倉積銀二十萬兩録以歸太倉隆慶初遣四御史分行天下搜括庫銀神宗時御史蕭重望請核府縣歲額銀進部未報上千戶何其賢乞敕內官與己督之帝竟從其請由是外儲日就耗至天啓中用操江巡撫范濟世策下敕督歲進收括靡有遺矣南京內庫頗藏金銀珍寶魏忠賢矯旨取進盜竊一空內外匱竭遂至於亡
