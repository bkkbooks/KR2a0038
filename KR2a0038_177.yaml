body:
  text: 明史卷一百七十七列傳第六十五王翺年富王竑李秉姚夔王復林聰葉盛王翺字九皋鹽山人永樂十三年初會試貢士於行在帝時欲定都北京思得北士用之翺兩試皆上第大喜特召賜食改庶吉士授大理寺左寺正左遷行人宣德元年以楊士奇薦擢御史時官吏有罪不問重輕許運磚還職翺請犯贓吏但許贖罪不得復官以懲貪黷帝從之五年巡按四川松潘蠻竊發都督陳懷駐成都相去八百餘里不能制翺上便宜五事請移懷松潘而松茂軍糧於農隙齊力起運護以官軍毋專纍百姓致被劫掠吏不給由為民蠹令自首毋隱州縣土司遍設社學會川銀場歲運米八千餘石給軍往返勞費請令有罪者納粟自贖詔所司議詳運糧事而遷蠹吏北京餘悉允行英宗即位廷議遣文武大臣出鎮守擢翱右僉都御史偕都督武興鎮江西懲貪抑奸吏民畏愛正統二年召還院四年處州賊流劫廣信命翱往捕盡俘以還是年冬松潘都指揮趙諒誘執國師商巴掠其財與同官趙得誣以叛其弟小商巴怒聚衆剽掠命翱及都督李安軍二萬征之而巡按御史白其枉詔審機進止翱至出商巴於獄遣人招其弟撫定餘黨而劾誅諒戍得復商巴國師松潘遂平六年代陳鎰鎮陝西軍民之借糧不能償者核免之七年冬提督遼東軍務翱以軍令久弛寇至將士不力戰因諸將庭謁責以失律罪命左右曳出斬之皆惶恐叩頭願效死贖翱乃躬行邊起山海關抵開原繕城垣濬溝塹五里為保十里為屯使烽燧相接練將士室魚衆寡軍民大悅又以邊塞孤遠軍餉匱緣俗立法令有罪得收贖十餘年間得穀及牛羊數十萬邊用以饒八年以九載滿進右副都御史指揮孫璟鞭殺戍卒其妻女器之亦死他卒訴璟殺一家三人翱曰卒死法妻死夫女死父非殺也命璟償其家葬薶費璟感激後參將遼東追敵三百里事李秉為名將十二年與總兵曹義等出塞擊兀良哈擒斬百餘人獲畜産四千六百進右都御史十四年諸將破敵廣平山進左脫脫不花大舉犯廣寧翺方閲兵寇猝至衆潰翱入城自保或謂城不可守翱手劍曰敢言棄城者斬寇退坐停俸半載景奉三年召還掌院事易儲加太子太保潯梧瑤亂總兵董興武毅推委不任事于謙請以翁信陳旺易之而特遣一大臣督軍務乃以命翱雨廣有總督自翱始翱至鎮將吏讋服推誠撫諭瑤人嚮化部內無事明年召人為吏部尚書初何文淵協王直掌銓多私為言官攻去翱代一循成憲天順改元直致仕翱始專部事石亨欲去翺翺乞休已得請李賢力爭乃留及賢為亨所逐亦以翺言留兩人相得歡甚帝每用人必咨賢賢以推翺以是翱得行其志帝眷翺厚時召對便殿稱先生不名而翺年幾八十多忘嘗令郎談倫隨入帝問故翺頓首曰臣老矣所聆聖諭恐遣誤令此郎代識之其人誠謹可信也帝喜吏部主事曹恂已遷江西參議遇疾還翺以聞命以主事回籍恂怒伺翺入朝捽翺胸摑其面大聲詬詈事聞下詔獄翺具言恂實病得斥歸時服其量五年加太子少保成化元年進太子太保雨雪免朝參屢疏乞歸輒慰留數遣醫視疾三年疾甚乃許致仕未出都卒年八十有四贈太保諡忠肅翺在銓部謝絶請謁公餘宿直廬非歲時朔望謁先祠未嘗歸私第每引選或值召對侍郎代選歸雖暮必至署閲所選惟恐有不當也論薦不使人知曰吏部豈快恩怨地耶自奉儉素景帝知其貧為治第鹽山孫以廕入太學不使應舉曰勿妨寒士路壻賈傑官近畿翺夫人數迎女傑恚曰若翁典銓移我官京師反手爾何往來不憚煩也夫人聞之乘間請翺翺怒推案擊夫人傷面傑卒不得調其自遼東還朝也中官同事者重翺贐明珠數顆翺固辭其人曰此先朝賜也公得毋以贓卻我乎不得已納而藏焉中官死召其從子還之為都御史時夫人為娶一妾逾半歲語翺翺怒曰汝何破我家法即日具金幣返之妾終不嫁曰豈有大臣妾嫁他人者翺卒妾往奔喪其子養之終身李賢嘗語人曰皋陶言九德王公有其五亂而敬擾而毅簡而廉剛而塞強而義也然性頗執嘗有詔舉賢良方正經明行修及山林隱逸士至者率下部試翺黜落百不取一二性不喜南士英宗嘗言北人文雅不及南人顧質直雄偉緩急當得力翺由是益多引北人晚年徇中官郭聰囑為都御史李秉所劾翺自引伏蓋不無小損云子孫世官錦衣千戶年富字大有懷遠人本姓嚴訛為年以會試副榜授德平訓導年甫踰冠嚴重如老儒宣德三年課最擢吏科給事中糾正違失務存大體帝以六科任重命科二人掌其事乃以富與賈銓並掌刑科都御史顧佐等失入死罪十七人富劾之帝詰責佐等英宗嗣位上言永樂中招納降人縻以官爵坐耗國帑養亂招危宜遣還故土府軍前衛幼軍本選民間子弟隨侍青宮今死亡殘疾僉補為擾請於二十五所內以一所補調勿更纍民軍民之家規免稅徭冒僧道者纍萬宜悉遣未度者復業議多施行遷陝西左參政尋命總理糧儲陝西歲織綾絹毼九百餘匹永樂中加織毼五十匹富請罷之官吏諸生衛卒祿廩率以邊餉減削富請復其舊諸邊將校占墾腴田有至三四十頃者富奏每頃輸賦十二石都督王禎以為過重疏爭之廷議滅三之二遂為定額又會計歲用以籌軍餉言臣所部歲收二稅百八十九萬石屯糧七十餘萬石其間水旱流移蠲逋負大率三分減一而歲用乃至百八十餘萬入少出多今鎮守諸臣不量國計競請益兵餉何由給請滅冗卒汰駑馬杜侵耗之弊帝可其奏三邊士馬供億浩繁軍民疲遠輸豪猾因緣為奸利富量遠近定徵科出入慎鈎考宿弊以革民困大蘇富遇事果敢有為權勢莫能撓聲震關中然執法過嚴僥幸者多不悅以是屢遭誣謗陝西文武將吏恐失富咸上章陳其勞乃得停俸留任九載滿遷河南右布政使復有言富苛虐者帝命核舉主將坐之既知舉富者少師楊溥也意乃解富至河南歲饑流民二十餘萬公剽掠巡撫于謙委富輯之皆定土木敗後邊境道阻部檄富轉餉無後期者進左景泰二年春以右副都御史巡撫大同提督軍務時經喪敗法弛弊尤甚富一意拊循奏免秋賦罷諸州縣稅課局停太原民轉餉大同武清侯石亨武安侯鄭宏武進伯朱瑛令家人領官庫銀帛糴米實邊多所乾沒富首請按治詔宥亨等抵家人罪亨所遣卒越關抵大同富復劾亨專擅亨輸罪巳削襄垣王府菜戶又杖其廚役之署教授事者又劾分守中官韋力轉參將石彪及山西參政林厚罪是時富威名重天下而諸豪家愈側目相與托富罪于謙方當事力保持之帝亦知富深故得行其志林厚力詆富帝曰厚怨富誣富耳朕方付富邊事豈輕聽人言加辱耶削厚官六年母憂起復七年富上言諸邊鎮守監鎗內官增於前如陽和天城一城二人擾民殊甚請減滅汰事格不行又言高皇帝定制軍官私罪收贖惟笞則然杖即降授徒流俱充軍律明甚近犯贓者輕皆復職重惟立功刑不足懲更無顧憚此皆法官過也下廷議流徒輸贖如故惟於本衛差操不得領軍英國公張懋及鄭宏各置田莊於邊境歲役軍耕種富劾之還軍於伍天順元年革巡撫官富亦罷歸頃之石彪以前憾劾富逮下詔獄帝問李賢賢稱富能袪弊帝曰此必彪為富抑不得逞其私耳賢曰誠如聖諭宜早雪之諭門達從公問事果無驗乃令致仕明年以廷臣薦起南京兵部右侍郎未上改戶部巡撫山東道聞屬邑蝗馳疏以聞改左副都御史巡撫如故官吏習富威名望之讋服豪猾屏跡四年春戶部缺尚書李賢舉富左右巧阻之帝語賢曰戶部非富不可人多不喜富此富所以為賢也特召任之富酌贏縮謹出納躬親會計吏不能欺事關利害者僚屬或不敢任富曰第行之吾當其責諸君毋署名可也由是部事大理丁父憂奪哀如初憲宗立富以陝西頻用兵而治餉者非人請黜左布政孫育用右布政楊璿參政婁良西安知府余子俊吏部尚書王翺論富侵官請下於理富力辨曰薦賢為國非有所私也因乞骸骨帝慰留之為黜育頃之病疽卒賜諡恭定富廉正強直始終不渝與王翺同稱名臣初英宗嘗諭李賢曰戶部如年富不易得賢對曰若他日繼翺為吏部非富不可然性好疑尤惡干請屬吏黠者故反其意嘗之欲事行故言不可即不行故言可富輒為所賣王竑字公度其先江夏人祖俊卿坐事戍河州遂著籍竑登正統四年進士十一年授戶科給事中豪邁負氣節正色敢言英宗北狩郕王攝朝午門羣臣劾王振誤國罪讀彈文未起王使出待命衆皆伏地哭請族振錦衣指揮馬順者振黨也厲聲叱言者去竑憤怒奮臂起捽順髮呼曰若曹奸黨罪當誅今尚敢爾且罵且齧其面衆共擊之立斃朝班大亂王恐遽起入竑率羣臣隨王後王使中官金英問所欲言曰內官毛貴王長隨亦振黨請置諸法王命出二人衆又捶殺之血漬廷陛當是時竑名震天下王亦以是深重竑且召諸言官慰諭甚至王即帝位也先犯京師命竑與王通楊善守禦京城擢右僉都御史督毛福壽高禮軍寇退詔偕都指揮夏忠等鎮守居庸竑至簡士馬繕厄塞劾將帥不職者壁壘一新景泰元年四月浙江鎮守中官李德上言馬順等有罪當請命行誅諸臣乃敢擅殺非有內官擁護危矣是皆犯闕賊臣不宜用章下廷議于謙等奏曰上皇蒙塵禍由賊振順等實振腹心陛下監國羣臣共請行戮而順猶敢呵叱是以在廷文武及宿衛軍士忠憤激發不暇顧忌捶死三人此正春秋誅亂賊之大義也向使乘輿播遷奸黨猶在國之安危殆未可知臣等以為不足問帝曰誅亂臣所以安衆志廷臣忠義朕已知之卿等勿以德言介意八月竑以疾還朝尋命同都督僉事徐恭督漕運治通州至徐州運河明年尚寶司檢順牙牌不得順子請責之竑帝許焉諸諫官言順黨奸罪重廷臣共除之遑問牙牌且非竑一人事若責之竑忠臣懼矣乃寢前旨是年冬耿九疇召還敕竑兼巡撫淮揚廬三府徐和二州又命兼理兩淮鹽課四年正月以災傷疊見方春盛寒上言請敕責諸臣痛自修省省刑薄斂罷無益之工嚴無功之賞散財以收民心愛民以植邦本陛下益近親儒臣講道論德進君子退小人以回天意且引罪乞罷帝納其言遂下詔修省求直言先是鳳陽淮安徐州大水道殣相望竑上疏奏不待報開倉振之至是山東河南饑民就食者坌至廩不能給惟徐州廣運倉有餘積竑欲盡發之典守中官不可竑往告曰民旦夕且為盜若不吾從脫有變當先斬若然後自請死耳中官憚竑威名不得已從之竑乃自劾專擅罪因言廣運所儲僅支三月請令死罪以下得於被災所入粟自贖帝復命侍郎鄒幹齎帑金馳赴聽便宜竑乃躬自巡行散振不足則令沿淮上下商舟量大小出米全活百八十五萬餘人勸富民出米二十五萬餘石給饑民五十五萬七千家賦牛種七萬四千餘復業者五千五百家他境流移安輯者萬六百餘家病者給藥死者具槥所鬻子女贖還之歸者豫道里費人忘其饑頌聲大作初帝聞淮鳳饑憂甚及得竑發廣運倉自劾疏喜曰賢哉都御史活我民矣尚書金濂大學士陳循等皆稱竑功是年十月就進左副都御史時濟寧亦饑帝遣尚書沈翼齎帑金三萬兩往振翼散給僅五千兩餘以歸京庫竑劾翼奉使無狀請仍易米備振從之明年二月上言比年饑饉薦臻人民重困頃冬春之交雪深數尺淮河抵海冰凍四十餘里人畜僵死萬餘弱者鬻妻子強者肆劫敓衣食路絶流離載途陛下端居九重大臣安處廊廟無由得見使目擊其狀未有不為之流涕者也陛下嗣位以來非不敬天愛民而天變民窮特甚者臣竊恐聖德雖修而未至大倫雖正而未篤賢才雖用而未收其效邪佞雖屏而未盡其類仁愛施而實惠未溥財用省而上供未節刑罰寬而冤獄未伸工役停而匠力未息法制頒而奉行或有更張賦稅免而有司或仍牽制有一於此皆足以干和召變伏望陛下修厥德以新厥治欽天命法祖宗正倫理篤恩義戒逸樂絶異端斯修德有其誠矣進忠良遠邪佞公賞罰寬賦役節財用戒聚斂却貢獻罷工役斯圖治有其實矣如是而災變不息未之有也帝褒納之敕內外臣工同加修省六年霍山民趙玉山自稱宋裔以妖術惑衆為亂竑捕獲之先後劾治貪濁吏革糧長之蠹民者民大稱便英宗復辟革巡撫官改竑浙江參政數日石亨張軏追論竑擊馬順事除名編管江夏居半歲帝於宮中得竑疏見正倫理篤恩義語感悟命遣官送歸田里敕有司善視之天順五年孛來寇莊浪都督馮宗等出討用李賢薦起竑故官與兵部侍郎白圭參贊軍務明年正月竑與宗擊退孛來於紅崖子川圭等還竑仍留鎮至冬乃召還明年春復令督漕撫淮揚淮人聞竑再至歡呼迎拜數百里不絶憲宗即位給事中蕭斌御史呂洪等共薦竑及宣府巡撫李秉堪大用下廷議尚書王翺大學士李賢請從其言帝曰古人君夢卜求賢今獨不能從輿論所與乎即召竑為兵部尚書秉為左都御史命下朝野相慶時將用兵兩廣竑舉韓雍為總督雍新得罪衆難之竑曰天子方棄瑕録用雍有罪不當用竑非罪廢者耶卒用雍竑條上進剿事宜且言將帥征討毋得奏攜私人妄冒首功又請復京營舊額禁勢家豪帥擅役禁軍於是命竑同給事中御史六人簡閲十二營軍士竑以擇兵不若擇將共奏罷營職八十餘人而慎簡材武補之兵部清理貼黃缺官竑偕諸大臣舉修撰嶽正都給事中張寧為李賢所沮竟出二人於外並罷會舉例竑憤然曰吾尚可居此耶即引疾求退帝方嚮用竑優詔慰留日遣醫視疾竑請益切九月命致仕去竑為尚書一年謝病者四月人以未竟其用為惜既去中外薦章百十上並報寢初竑號其室曰戇庵既歸改曰休庵杜門謝客鄉人希得見時李秉亦罷歸日出入里閈與故舊談笑遊燕竑聞之曰大臣何可不養重自愛秉聞之亦笑曰所謂大臣豈以立異鄉曲尚矯激為賢哉時兩稱之竑居家二十年弘治元年十二月卒年七十五正德間贈太子少保諡莊毅淮人立祠祀之李秉字執中曹縣人少孤力學舉正統元年進士授延平推官沙縣豪誣良民為盜而淫其室秉捕治豪豪誣秉坐下獄副使侯軏直之論豪如法由是知名徵入都察院理刑將授御史都御史王文薦為本院經歷尋改戶部主事宣府屯田為豪占秉往視歸田於民而請罷科索邊人賴之兩淮鹽課弊覺逮數百人秉往核搜得僞印逮者以白景帝立進郎中景泰二年命佐侍郎劉璉督餉宣府發璉侵牟狀即擢右僉都御史代璉兼參贊軍務宣府軍民數遭寇牛具悉被掠朝廷遣官市牛萬五千給屯卒人豫直市穀種璉盡以畀京軍之出守者一不及屯卒更停其月餉而徵屯糧甚急秉盡反璉政厚恤之軍卒自城守外悉得屯作凡使者往來及宦官鎮守供億科斂者皆奏罷以官錢給費尋上邊備六事言軍以有妻者為有家月餉一石無者減其四即有父母兄弟而無妻概以無家論非義當一體增給從之時宣府億萬庫頗充裕秉益召商中鹽納糧料飭戎裝市耕牛給軍軍愈感悅三年冬命兼理巡撫事頃之又命提督軍務秉盡心邊計不恤嫌怨劾都指揮楊文楊鑑都督江福貪縱罪之論守獨石內官弓勝田獵擾民請徵還又劾總兵官紀廣等罪廣訐秉自解帝召秉還以言官交請乃命御史練綱給事中嚴誠往勘卒留秉時邊民多流移秉廣行招徠復業者奏給月廩瘞土木鷂兒嶺暴骸乞推行諸塞軍家為寇所殺掠無依者官為養贍或資遣還鄉釐諸弊政所條奏百十章多允行諜報寇牧近邊廷議遣楊俊會宣府兵出剿秉曰塞外原諸部牧地非犯邊也掩殺幸功非臣所敢聞乃止諸部質所掠男婦求易米朝議成丁者豫一石幼者半之諸部概乞一石鎮將不可秉曰是輕人重粟也如其言豫之自請專擅罪帝以為識體天順初罷巡撫官改督江南糧儲初江南蘇松賦額不均陳泰為巡撫令民田五升者倍征官田重者無增耗賦均而額不虧秉至一守其法尋坐舉知府違例被逮帝以秉過微宥之復任請滸墅關稅悉徵米備荒又發內官金保監淮安倉科索罪御史李周等左遷秉疏救帝怒將罪之會廷議復設巡撫大臣薦秉才遂命巡撫大同都指揮孫英先以罪貶職還衛總兵李文妄引詔書令復職秉至即斥之裨將徐旺領騎卒操練秉以旺不勝任解其官未幾天城守備中官陳例久病秉請易以羅付帝責秉專擅徵下詔獄指揮門達並以前舉知府救御史及斥孫英等為秉罪法司希旨斥為民居三年用閣臣薦起故官涖南京都察院憲宗立進右副都御史復撫宣府數月召拜左都御史成化改元掌大計黜罷貪殘倍於其舊明年秋命整飭遼東抵大同邊備至即劾鎮守中官李良總兵武安侯鄭宏失律罪出都指揮裴顯於獄舉指揮崔勝傅海等擊敵鳳皇山捷聞璽書嘉勞秉乃往巡宣府大同更將帥申軍令而還未幾命為總督與武清伯趙輔分五道出塞大捷帝勞以羊酒賜麒麟服加太子少保三年冬吏部尚書王翺致仕廷推代者帝特擢秉任之秉鋭意澄仕路監生需次八千餘人請分別考核黜庸劣者數百人於是怨謗紛起左侍郎崔恭以久次當得尚書而秉得之頗不平右侍郎尹旻嘗學於秉秉初用其言既而疏之侍讀彭華附中貴數以私干秉秉不聽胥怨秉御史戴用請兩京堂上官及方面正佐如正統間例會廷臣保舉又吏部司屬與各部均升調不得久擅要地且驟遷語侵吏部吏部持之帝令兩京官四品以上吏部具缺取上裁而御史劉璧吳遠馮徽爭請仍歸吏部帝怒詰責言者會朝覲考察秉斥退者衆又多大臣鄉故衆怨交集而大理卿王亦欲去秉代其位乃與華謀嗾同鄉給事中蕭彥莊劾秉十二罪且言其陰結年深御史附己以攬權帝怒下廷議恭旻輒言吾兩人諫之不聽刑部尚書陸瑜等附會二人意為奏帝以秉徇私變法負任使落秉太子少保致仕所連鮑克寬李沖調外任丘陵張穆陳民弼孫遇李齡柳春皆罷命彥莊指秉所結御史不能對久之以璧等三人名上遂俱下詔獄出之外陵等實良吏有名以讒黜衆議不平陵尤不服連章訐彥莊廷訊陵詞直帝惡彥莊誣罔謫大寧驛丞方秉之被劾也勢洶洶且逮秉秉謂人曰為我謝彭先生秉罪惟上所命第毋令入獄入則秉必不出恐傷國體因具疏引咎略不自辨時天下舉子方會試集都下奮罵曰李公天下正人為奸邪所誣若罪李公願罷我輩試以贖及帝薄責秉乃已秉行官屬餞送皆欷歔有泣下者秉慷慨揖諸人登車而去秉去恭遂為尚書秉誠心直道夷險一節與王竑並負重望家居二十年中外薦疏十餘上竟不起弘治二年卒贈太子太保後諡襄敏子聰明智孫邦直皆舉鄉試聰南宮知縣以彥莊劾罷歸明建寧府同知智南陽府知府邦直寧波府同知彥莊謫後署大寧縣以科斂為盜所殺姚夔字大章桐廬人孝子伯華孫也正統七年進士鄉會試皆第一明年授吏科給事中陳時政八事又言預備倉本振貧民而里甲慮貧者不能償輒隱不報致稱貸富室倍稱還之收穫甫畢遽至乏絶是貧民遇凶年饑豐年亦饑也乞敕天下有司歲再發廩必躬勘察先給其最貧者帝立命行之景帝監國諸大臣議勸即位未決以問諸言官夔曰朝廷任大臣正為社稷計何紛紛為議遂定也先薄京城請急徵宣府遼東兵入衛景泰元年超擢南京刑部右侍郎四年就改禮部奉敕考察雲南官吏還朝留任禮部景帝不豫尚書胡濙在告夔強起之偕羣臣疏請復太子不允明日夔欲率百官伏闕請而石亨輩已奉上皇復位出夔南京禮部英宗雅知夔及聞復儲議驛召還進左侍郎天順二年改吏部知府某以貪敗賄石亨求復夔執不可遂止七年代石瑁為禮部尚書成化二年帝從尚書李賓言令南畿及浙江江西福建諸生納米濟荒得入監夔奏罷之四年以災異屢見疏請均愛六宮以廣繼嗣乞罷西山新建塔院斥遠阿叱哩之徒勤視經筵裁決庶政親君子遠小人節用度愛名器服食言動悉遵祖宗成憲以回天意且言今日能守成化初政足矣帝優旨答之他所請十事皆立報可慈懿太后崩中旨議別葬閣臣持不可下廷議夔言太后配先帝二十餘年合葬升祔典禮具在一有不慎違先帝心損母后之德他日有據禮議改者如陛下孝德何疏三上又率羣臣伏文華門哭諫帝為固請周太后竟得如禮後孝宗見夔及彭時疏謂劉健曰先朝大臣忠厚為國乃如此彗星見言官連劾夔夔求去不允帝信番僧有封法王佛子者服用僭擬無度奸人慕之競為其徒夔力諫勢稍減五年代崔恭為吏部尚書雨雪失時陳時弊二十事七年加太子少保彗星見復偕羣臣陳二十八事大要以絶求請禁採辦恤軍匠減力役撫流民節冗費為急帝多採納明年九月南畿浙江大水夔請命廷臣共求安民弭患之術每遇災異輒請帝振恤憂形於色明年卒贈少保諡文敏夔才器宏遠表𩹉洞達朝議未定者夔一言立決其在吏部留意人才不避親故初王翺為吏部專抑南人北人喜之至夔頗右南人論薦率能稱職子璧由進士歷官兵部郎中項忠劾汪直璧預其謀直搆忠連璧下獄謫廣西思明同知謝病歸夔從弟龍與夔同舉進士除刑部主事纍官福建左布政使右布政使劉讓同年不相能讓粗暴龍亦乏清操成化初入覲王翺兩罷之王復字初陽固安人正統七年進士授刑科給事中聲容宏偉善敷奏擢通政參議也先犯京師邀大臣出迎上皇衆憚行復請往乃遷右通政假禮部侍郎與中書舍人趙榮偕敵露刃夾之復等不為懾還仍涖通政事再遷通政使天順中歷兵部左右侍郎成化元年延綏總兵官房能奏追襲河套部衆有旨奬勞復以七百里趨戰非宜且恐以僥幸啓釁請敕戒諭帝是之進尚書錦衣千戶陳王玉者本畫工及卒從子錫請襲百戶復言襲雖先帝命然非軍功宜勿許遂止毛里孩擾邊命復出視陝西邊備自延綏抵甘肅相度形勢上言延綏東起黃河岸西至定邊營接寧夏花馬池縈紆二千餘里險隘俱在內地而境外乃無屏障止憑墩保以守軍反居內民顧居外敵一入境官軍未行民遭掠已盡矣又西南抵慶陽相去五百餘里烽火不接寇至民猶不知其迤北墩堠率皆曠遠非禦邊長策請移府谷響水等十九堡置近邊要地而自安邊營接慶陽自定邊營接環州每二十里築墩臺一計凡三十有四隨形勢為溝牆庶息響相聞易於守禦其經略寧夏則言中路靈州以南本無亭燧東西二路營堡遼絶聲聞不屬致敵每深入亦請建置墩臺如延綏計為臺五十有八其經略甘肅則言永昌西寧鎮番莊浪俱有險可守惟涼州四際平曠敵最易入又水草便利輒輕年宿留遠調援軍兵疲鋭挫急何能濟請於甘州五衛內各分一千戶所置涼州中衛給之印信其五所軍伍則於五衛內餘丁選補且耕且練斯戰守有資兵威自振又言洪武間建東勝衛其西路直達寧夏皆列烽堠自永樂初北寇遠遁因移軍延綏棄河不守誠使兵強糧足仍準祖制據守黃河萬全計也今河套未靖豈能遽復然亦宜因時捐益延綏將校視他鎮為少調遣不足請增置參將二人統軍九千使駐要地互相援接實今日急務奏上皆從之復在邊建置多合機宜及還朝言者謂治兵非復所長特命白圭代之改復工部謹守法度聲名逾兵部時中官請修皇城西北回廊復議緩其役給事中高斐亦言災沴頻仍不宜役萬人作無益帝皆不許中官領騰驤四衛軍者請給胖襖鞋袴復執不可曰朝廷制此本給征行之士使得刻日戒途無勞縫紉京軍則歲給冬衣布棉此成憲也奈何渝之大應法王劄實巴死中官請造寺建塔復言大慈法王但建塔未嘗造寺今不宜創此制乃止命建塔猶發軍四千人供役云十四年加太子少保復好古嗜學守廉約與人無城府當官識大體居工部十二年會災異言官言其衰老乞休不許居二月汪直諷言官更劾復及鄒幹薛遠乃傳旨並令致仕歸久之卒贈太子太保諡莊簡林聰字季聰寧德人正統四年進士授吏科給事中景泰元年進都給事中時方多故聰慷慨論事無所諱中官金英家人犯法都御史陳鎰王文治之不罪英聰率同列劾鎰文畏勢縱奸並及御史宋瑮謝琚皆下獄已而復職聰又言瑮琚不任風紀二人竟調外中官單增督京營有寵朝士稍忤者輒遭辱家奴白晝殺人奪民産侵商稅聰發其奸下詔獄獲宥增自是不敢肆三年春疏言臣職在糾察刑獄妖僧趙才興之疏族百口律不當坐而抄提至京叛人王英兄不知情家口律不當逮而俱配流所雖終見原然其始受害已不堪矣湖廣巡撫蔡錫以劾副使邢端為所訐繫獄經年而端居職如故侍郎劉璉督餉侵隱不為無罪較沈固周忱乾沒萬計孰為輕重璉下獄追徵而固忱不問犯人徐南與子中書舍人頤俱坐王振黨當斬乃論南大辟頤止除名皆刑罰之失平者帝是之端下獄璉得釋南亦減死除名東宮改建聰有異論遷春坊司直郎四年春學士商輅言聰敢言不宜置之散地乃復為吏科都給事中上言奪情非令典請永除其令帝納之初正統中福建銀場額重民不堪聰恐生變請輕之時弗能用已果大亂及是復極言其害竟得減免五年三月以災異偕同官條上八事雜引五行諸書纍數千言大略以絶玩好謹嗜欲為崇德之本而修人事在進賢退奸武清侯石亨指揮鄭倫身享厚祿而多奏求田地百戶唐興多至一千二百餘頃宜為限制餘如罷齊醮汰僧道慎刑獄禁私役軍士省輪班工匠皆深中時弊帝多採納先是吏部尚書何文淵以聰言下獄致仕去及是吏部除副使羅箎為按察使參政李輅僉事陳永為布政使聰疏爭之並言山西布政使王瑛老宜罷箎等遂還故官瑛致仕御史白仲賢以久次擢廣東按察使聰言仲賢奔競不當超擢乃遷鎮江知府兵部主事吳誠夤緣得吏部聰劾之遂改工部諸司憚聰風裁聰所言無敢不奉行者吏部尤甚內閣及諸御史亦並以聰好論建弗善也其年冬聰甥陳和為教官欲得近地便養聰為言於吏部御史黃溥等遂劾聰挾制吏部並前劾仲賢為私其鄉人參政方員欲奪仲賢官豫之與吳誠有怨輒劾誠福建參政許仕達囑聰求進聰舉仕達堪巡撫並劾尚書王直阿聰章下廷訊坐專擅選法論斬高穀胡濙力救帝亦自知聰止貶國子學正英宗復辟超拜左僉都御史出振山東饑活饑民百四十五萬還進右副都御史捕江淮鹽盜以便宜擒戮渠魁數人餘悉解散而奏籍指揮之受盜賂者母憂起復再辭不許天順四年曹欽反將士妄殺至割乞兒首報功市人不敢出戶聰署院事急令獲賊者必生致濫殺為止錦衣官校惡欽殺指揮逯杲悉捕欽姻識千戶龔遂榮及外舅賀三亦在繫中人知其冤莫敢直聰辨出之其他湔雪者甚衆七年冬以刑部囚自縊諸給事中劾紀綱廢弛與都御史李賓俱下獄尋釋成化二年淮南北饑聰出巡視奏貸漕糧及江南餘糧以振民德之如山東明年偕戶部尚書馬昂清理京軍進右都御史七年代王越巡撫大同歲餘遇疾致仕再歲以故官起掌南院前掌院多不樂御史言事聰獨奬勵之或咎聰聰曰己既不言又禁他人言可乎十三年秋召拜刑部尚書尋加太子少保聰以舊德召用持大體秉公論不嚴而肅時望益峻十五年偕中官汪直定西侯蔣琬按遼東失事狀直庇巡撫陳鉞聰不能爭論者惜焉十八年乞歸不得卒於位年六十八贈少保諡莊敏聰為諫官嚴重不可犯實恂恂和易不為嶄絶之行以故不肖者畏之而賢者多樂就焉景泰時士大夫激昂論事朝多直臣率聰與葉盛為之倡葉盛字與中崑山人正統十年進士授兵科給事中師覆土木諸將多遁還盛率同列請先正扈從失律者罪且選將練兵為復讐計郕王即位例有賞賚盛以君父蒙塵辭不許也先迫都城請罷內府軍匠備征操又請令有司儲糧料給戰士遣散卒取軍器於天津以張外援三日間章七八上多中機宜寇退進都給事中言勸懲之道在明賞罰敢戰如孫鏜死事如謝澤韓青當賞其他守禦不嚴赴難不力者皆當罰大臣陳循等議召還鎮守居庸都御史羅通並留宣府都督楊洪掌京營盛言今日之事邊關為急往者獨石馬營不棄駕何以陷土木紫荊白羊不破寇何以薄都城今紫荊倒馬諸關寇退幾及一月尚未設守禦宣府為大同應援居庸切近京師守之尤不可非人洪等既留必求如洪者代之然後可以副重寄而集大功帝是之尋命出安集陳州流民景泰元年還朝言流民雜五方其情不一雖幸成編戶而鬬爭讐殺時時有之宜專官綏撫又言畿輔旱蝗相仍請加寬恤帝多採納京衛武臣及其子弟多驕惰不習兵盛請簡拔精壯備操守京城勳戚所置市廛月徵稅盛以國用不足請籍其稅佐軍餉皆從之明年上弭災防患八事帝以兵革稍息頗事宴遊盛請復午朝故事立報可當是時帝虛懷納諫凡六科聯署建請多盛與林聰為首廷臣議事盛每先發言往復論難與議大臣或不悅曰彼豈少保耶因呼為葉少保然物論皆推盛才擢右參政督餉宣府尋以李秉薦協贊都督僉事孫安軍務初安嘗領獨石馬營龍門衛所四城備禦英宗既北狩安以四城遠在塞外勢孤奏棄之內徙至是廷議命安修復盛與闢草萊葺廬舍庀戰具招流移為行旅置暖鋪請帑金買牛千頭以賦屯卒立社學置義冢療疾扶傷兩歲間四城及赤城鵰鶚諸堡次第皆完安由是進副總兵而守備中官弓勝害安奏安疾宜代帝以問盛言安為勝所持故病今諸將無踰安者乃留安且遣醫視疾已又劾勝卒調之他鎮英宗復位盛遭父憂奔喪天順二年召為右僉都御史巡撫兩廣乞終制不許瀧水瑤鳳弟吉肆掠督諸將生擒之時兩廣盜蜂起所至破城殺將諸將怯不敢戰殺平民冒功民相率從賊盛以蠻出沒不常請自今攻劫城池者始以聞餘止類奏疏至兵部駁不行盛與總兵官顏彪破賊寨七百餘所彪頗濫殺謗者遂以咎盛六年命吳禎撫廣西而盛專撫廣東憲宗立議事入都給事中張寧等欲薦之入閣以御史呂洪言遂止而以韓雍代撫廣東初編修丘濬與盛不相能大學士李賢入濬言及是草雍敕曰無若葉盛之殺降也盛不置辨稍遷左僉都御史代李秉巡撫宣府請量減中鹽米價以勸商裕邊復舉官牛官田之法墾田四千餘頃以其餘積市戰馬千八百匹修堡七百餘所邊塞益寧成化三年秋入為禮部右侍郎偕給事毛弘按事南京還改吏部出振真定保定饑議清莊田分養民間種馬置倉涿州天津積粟備荒皆切時計滿都魯諸部久駐河套兵部尚書白圭議以十萬衆大舉逐之沿河築城抵東勝徙民耕守帝壯其議八年春敕盛往會總督王越巡撫馬文升余子俊徐廷璋詳議初盛為諫官喜言兵多所論建既往來三邊知時無良將邊備久虛轉運勞費搜河套復東勝未可輕議乃會諸臣上疏言守為長策如必決戰亦宜堅壁清野伺其惰歸擊之令一大創庶可遏再來又或乘彼入掠遣精卒進搗其巢令彼反顧內外夾擊足以有功然必守固而後戰可議也帝善其言而圭主復套師出竟無功人以是服盛之先見八年轉左侍郎十年卒年五十五諡文莊盛清修積學尚名檢薄嗜好家居出入常徒步生平慕范仲淹堂寢皆設其像志在君民不為身計有古大臣風贊曰天順成化間六部最稱得人王翺等正直剛方皆所謂名德老成人也觀翺與李秉年富之任封疆王竑之擊奸黨活饑民王復之籌邊備姚夔之典秩宗林聰葉盛之居言路所表見皆自卓卓其聲實茂著繫朝野重望有以哉
