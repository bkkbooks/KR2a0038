body:
  text: 明史卷一百四十三列傳第三十一王艮高遜志廖昇魏冕鄒瑾龔泰周是修程本立黃觀王叔英林英黃鉞曾鳳韶王良陳思賢龍溪六生台溫二樵程通黃希范葉惠仲黃彥清蔡運石允常高巍韓郁高賢寧王璡周縉牛景先程濟等王艮字敬止吉水人建文二年進士對策第一貌寢易以胡靖即胡廣也艮次之又次李貫三人皆同里並授修撰如洪武中故事設文史館居之預修太祖實錄及類要時政記諸書一時大著作皆綜理之數上書言時務燕兵薄京城艮與妻子訣曰食人之祿者死人之事吾不可復生矣解縉吳溥與艮靖比舍居城陷前一夕皆集溥舍縉陳說大義靖亦奮激慷慨艮獨流涕不言三人去溥子與弼尚幼歎曰胡叔能死是大佳事溥曰不然獨王叔死耳語未畢隔牆聞靖呼外喧甚謹視豚溥顧與弼曰一豚尚不能舍肯舍生乎須臾艮舍哭飲鴆死矣縉馳謁成祖甚喜明日薦靖召至叩頭謝貫亦迎附後成祖出建文時羣臣封事千餘通令縉等編閱事涉兵農錢穀者留之諸言語干犯及他一切皆焚毀因從容問貫縉等曰爾等宜皆有之衆未對貫獨頓首曰臣實未嘗有也成祖曰爾以無為美耶食其祿任其事當國家危急官近侍獨無一言可乎朕特惡夫誘建文壞祖法亂政者耳後貫遷中允坐累死獄中臨卒歎曰吾愧王敬止矣有高遜志者艮座主也蕭縣人寓嘉興幼嗜學師貢師泰周伯琦等文章典雅成一家言徵修元史入翰林累遷試吏部侍郎以事謫朐山建文初召為太常少卿與董倫同主會試得士自艮外胡靖吳溥楊榮金幼孜楊溥胡濙顧佐等皆為名臣燕師入存歿無可考廖昇襄陽人不知其所以進學行最知名與方孝孺王紳相友善洪武末由左府斷事擢太常少卿建文初修太祖實錄董倫王景為總裁官昇與高遜志為副總裁官李貫王紳胡子昭楊士奇羅恢程本立為纂修官皆一時選燕師渡江朝廷遣使請割地不許昇聞而慟哭與家人訣自縊死殉難諸臣昇死最先其後陳瑛奏諸臣逆天命效死建文君請行追戮亦首及昇云時為瑛追論者有魏冕等冕官御史燕兵犯闕都督徐增壽徘徊殿廷有異志冕率同官毆之與大理丞鄒瑾大呼請速加誅明日宮中火起有勸冕降者厲聲叱之遂自殺瑾亦死瑾冕皆永豐人其同里鄒朴官秦府長史聞瑾死憤甚不食卒或曰即瑾子也又都給事中龔泰義烏人由鄉薦起家燕王入金川門泰被縛以非奸黨釋不殺自投城下死泰嘗遊學宮狂人擠之溺池中幾死弗校人服其量周是修名德以字行泰和人洪武末舉明經為霍丘訓導太祖問家居何為對曰教人子弟孝弟力田太祖喜擢周府奉祀正逾年從王北征至黑山還遷紀善建文元年有告王不法者官屬皆下吏是修以嘗諫王得免改衡府紀善衡王惠帝母弟未之藩是修留京師預翰林纂修好薦士陳說國家大計燕兵渡淮與蕭用道上書指斥用事者用事者怒共挫折之是修屹不為動京城失守留書別友人江仲隆解縉胡靖蕭用道楊士奇付以後事具衣冠為贊繫衣帶間入應天府學拜先師畢自經於尊經閣年四十九燕王即帝位陳瑛言是修不順天命請追戮帝曰彼食其祿自盡其心勿問是修外和內剛志操卓犖非其義一介不苟得也嘗曰忠臣不計得失故言無不直烈女不慮死生故行無不果嘗輯古今忠節事為觀感錄其學自經史百家陰陽醫卜靡不通究為文援筆立就而雅贍條達初與士奇縉靖及金幼孜黃淮胡儼約同死臨難惟是修竟行其志云程本立字原道崇德人先儒頤之後父德剛負才氣不仕元將路成兵過皂林暴掠德剛為陳利害成悅戢其部衆欲奏官之辭去本立少有大志讀書不事章句洪武中旌孝子太祖嘗謂之曰學者爭務科舉以窮經為名而無實學子質近厚當志聖賢之學本立益自力聞金華朱克修得朱熹之傳於許謙往從之遊舉明經秀才除秦府引禮舍人賜楮幣鞍馬母憂去官服除補周府禮官從王之開封二十年春進長史從王入覲坐累謫雲南馬龍他郎甸長官司吏目留家大梁攜一僕之任土酋施可伐煽百夷為亂本立單騎入其巢諭以禍福諸酋咸附未幾復變西平侯沐英布政使張紞知本立賢屬行縣典兵事且撫且禦自楚雄姚安抵大理永昌鶴慶麗江山行野宿往來綏輯凡九年民夷安業三十一年奏計京師學士董倫府尹向寶交薦之徵入翰林預修太祖實錄遷右僉都御史俸入外不通餽遺建文三年坐失陪祀貶官仍留纂修實錄成出為江西副使未行燕兵入自縊死黃觀字伯瀾一字尚賓貴池人父贅許從許姓受學於元待制黃冔冔死節觀益自勵洪武中貢入太學繪父母墓為圖瞻拜輒淚下二十四年會試廷試皆第一累官禮部右侍郎乃奏復姓建文初更官制左右侍中次尚書改觀右侍中與方孝孺等並親用燕王舉兵觀草制諷其散軍歸藩束身謝罪辭極詆斥四年奉詔募兵上游且督諸郡兵赴援至安慶燕王已渡江入京師下令暴左班文職奸臣罪狀觀名在第六既而索國寶不知所在或言已付觀出收兵矣命有司追捕收其妻翁氏幷二女給象奴奴索釵釧市酒肴翁氏悉與之持去急攜二女及家屬十人投淮清橋下死觀聞金川門不守歎曰吾妻有志節必死招魂葬之江上命舟至羅剎磯朝服東向拜投湍急處死觀弟覯先匿其幼子逃他處或云覯妻畢氏孀居母家遺腹生子故黃氏有後於貴池初觀妻投水時嘔血石上成小影陰雨則見相傳為大士像僧舁至庵中翁氏見夢曰我黃狀元妻也比明沃以水影愈明有愁慘狀後移至觀祠名翁夫人血影石今尚存王叔英字原采黃巖人洪武中與楊大中葉見泰方孝孺林右並徵至叔英固辭歸二十年以薦為仙居訓導改德安教授遷漢陽知縣多惠政歲旱絕食以禱立應建文時召為翰林修撰上資治八策曰務問學謹好惡辨邪正納諫諍審才否慎刑罰明利害定法制皆援證古今可見之行事又曰太祖除奸剔穢抑強鋤梗如醫去病如農去草去病急或傷體膚去草嚴或傷禾稼病去則宜調燮其血氣草去則宜培養其根苗帝嘉納之燕兵至淮奉詔募兵行至廣德京城不守會齊泰來奔叔英謂泰貳心欲執之泰告以故乃相持慟哭共圖後舉已知事不可為沐浴更衣冠書絕命詞藏衣裾間自經於玄妙觀銀杏樹下天台道士盛希年葬之城西五里其詞曰人生穹壤間忠孝貴克全嗟予事君父自省多過愆有志未及竟奇疾忽見纏肥甘空在案對之不下咽意者造化神有命歸九泉嘗念夷與齊餓死首陽巔周粟豈不佳所見良獨偏高蹤渺難繼偶爾無足傳千秋史官筆慎勿稱希賢又題其案曰生既已矣未有補於當時死亦徒然庶無慚於後世燕王稱帝陳瑛簿錄其家妻金氏自經死二女下錦衣獄赴井死叔英與孝孺友善以道義相切劘建文初孝孺欲行井田叔英貽書曰凡人有才固難能用其才尤難子房於漢高能用其才者也賈誼於漢文不能用其才者也子房察高帝可行而言故高帝用之一時受其利雖親如樊酈信如平勃任如蕭曹莫得間焉賈生不察而易言且言之太過故絳灌之屬得以短之方今明良相值千載一時但事有行於古亦可行於今者夏時周冕之類是也有行於古不可行於今者井田封建之類是也可行者行則人之從之也易而民樂其利難行而行則從之也難而民受其患時井田雖不行然孝孺卒用周官更易制度無濟實事為燕王藉口論者服叔英之識而惜孝孺不能用其言也時御史古田林英亦在廣德募兵知事無濟再拜自經妻宋氏下獄亦自經死黃鉞字叔揚常熟人少好學家有田在葛澤陂鉞父令督耕其中鉞從友人家借書竊讀不廢縣舉賢良授宜章典史建文元年舉湖廣鄉試明年賜進士授刑科給事中三年丁父憂方孝孺弔之屏人問曰燕兵日南蘇常鎮江京師左輔也君吳人朝廷近臣今雖去宜有以教我鉞曰三府唯鎮江最要害守非其人是撤垣而納盜也指揮童俊狡不可任奏事上前視遠而言浮心不可測也蘇州知府姚善忠義激烈有國士風然仁有餘而禦下寬恐不足定亂且國家大勢當守上游兵至江南禦之無及也孝孺乃因鉞附書於善善得書與鉞相對哭誓死國鉞至家依父殯以居燕兵至江上善受詔統兵勤王以書招鉞鉞知事不濟辭以營葬畢乃赴既而童俊果以鎮江降燕鉞聞國變杜門不出明年以戶科左給事中召半途自投於水以溺死聞故其家得不坐曾鳳韶廬陵人洪武末年進士建文初嘗為監察御史燕王稱帝以原官召不赴又以侍郎召知不可免乃刺血書衣襟曰予生廬陵忠節之邦素負剛鯁之腸讀書登進士第仕宦至繡衣郎慨一死之得宜可以含笑於地下而不愧吾文天祥囑妻李氏子公望勿易我衣即以此殮遂自殺年二十九李亦守節死王良字天性祥符人洪武末累官僉都御史坐緩其僚友獄貶刑部郎中建文中歷遷刑部左侍郎議減燕府人罪不稱旨出為浙江按察使燕王即位頗德之遣使召良良執使者將斬之衆劫之去良集諸司印於私第將自殺未即決妻問故曰吾分應死未知所以處汝耳妻曰君男子乃為婦人謀乎饋良食食已抱其子入後園置子池旁投水死良殮妻畢以子付友人家遂積薪自焚印俱毀成祖曰死固良分朝廷印不可毀毀印良不得無罪徙其家於邊陳思賢茂名人洪武末為漳州教授以忠孝大義勖諸生每部使者涖漳參謁時必請曰聖躬安否燕王登極詔至慟哭曰明倫之義正在今日堅臥不迎詔率其徒吳性原陳應宗林王玉鄒君默曾廷瑞呂賢六人即明倫堂為舊君位哭臨如禮有司執之送京師思賢及六生皆死六生皆龍溪人嘉靖中提學副使邵銳立祠祀思賢以六生侑食又台州有樵夫日負薪入市口不貳價聞燕王即帝位慟哭投東湖死而溫州樂清亦有樵夫聞京師陷其鄉人卓侍郎敬死號慟投於水二樵皆逸其名程通績溪人嘗上書太祖乞除其祖戍籍詞甚哀竟獲請已授遼府紀善燕師起從王泛海歸京師上封事數千言陳禦備策進左長史永樂初從王徙荊州有言其前上封事多指斥者械至死於獄家屬戍邊幷捕其友人徽州知府黃希范論死籍其家葉惠仲臨海人與兄夷仲並有文名以知縣徵修太祖實錄遷知南昌府永樂元年坐直書靖難事族誅黃彥清歙人官國子博士以名節自勵坐在梅殷軍中私諡建文帝誅死蔡運南康人歷官四川參政勁直不諧於俗罷歸復起知賓州有惠政永樂初亦追論奸黨死石允常寧海人洪武二十七年進士官河南僉事廉介有聲坐事謫常州同知建文末帥兵防江軍潰棄官去後追錄廢周藩事繫獄二年免死戍邊高巍遼州人尚氣節能文章母蕭氏有痼疾巍左右侍奉至老無少懈母死蔬食廬墓三年洪武中旌孝行由太學生試前軍都督府左斷事疏墾河南山東北平荒田又條上抑末技慎選舉惜名器數事太祖嘉納之尋以決事不稱旨當罪減死戍貴州關索嶺特許弟姪代役曰旌孝子也及惠帝即位上疏乞歸田里未幾遼州知州王欽應詔辟巍巍因赴吏部上書論時政用事者方議削諸王獨巍與御史韓郁先後請加恩略曰高皇帝分封諸王比之古制既皆過當諸王又率多驕逸不法違犯朝制不削朝廷綱紀不立削之則傷親親之恩賈誼曰欲天下治安莫如衆建諸侯而少其力今盍師其意勿行晁錯削奪之謀而效主父偃推恩之策在北諸王子弟分封於南在南子弟分封於北如此則藩王之權不削而自削矣臣又願益隆親親之禮歲時伏臘使人餽問賢者下詔褒賞之驕逸不法者初犯容之再犯赦之三犯不改則告太廟廢處之豈有不順服者哉書奏帝頷之已而燕兵起命從李景隆出師參贊軍務巍復上書言臣願使燕披忠膽陳義禮曉以禍福感以親親之誼令休兵歸藩帝壯其言許之巍至燕自稱國朝處士高巍再拜上書燕王殿下太祖上賓天子嗣位布維新之政天下愛戴皆曰內有聖明外有藩翰成康之治再見於今矣不謂大王顯與朝廷絕張三軍抗六師臣不知大王何意也今在朝諸臣文者智輳武者勇奮執言仗義以順討逆勝敗之機明於指掌皆云大王藉口誅左班文臣實則吳王濞故智其心路人所共知巍竊恐奸雄無賴乘隙奮擊萬一有失大王得罪先帝矣今大王據北平取密雲下永平襲雄縣掩真定雖易若建瓴然自兵興以來業經數月尚不能出蕞爾一隅地且大王所統將士計不過三十萬以一國有限之衆應天下之師亦易罷矣大王與天子義則君臣親則骨肉尚生離間況三十萬異姓之士能保其同心協力效死於殿下乎巍每念至此未始不為大王灑泣流涕也願大王信巍言上表謝罪再修親好朝廷鑒大王無他必蒙寬宥太祖在天之靈亦安矣倘執迷不悟舍千乘之尊捐一國之富恃小勝忘大義以寡抗衆為僥倖不可成之悖事巍不知大王所稅駕也況大喪未終毒興師旅其與泰伯夷齊求仁讓國之義不大逕庭乎雖大王有肅清朝廷之心天下不無篡奪嫡統之議即幸而不敗謂大王何如人巍白髮書生蜉蝣微命性不畏死洪武十七年蒙太祖高皇帝旌臣孝行巍竊自負既為孝子當為忠臣死忠死孝巍至願也如蒙賜死獲見太祖在天之靈巍亦可以無愧矣書數上皆不報已而景隆兵敗巍自拔南歸至臨邑遇參政鐵鉉相持痛哭奔濟南誓死拒守屢敗燕兵及京城破巍自經死驛舍郁疏略曰諸王親則太祖遺體貴則孝康皇帝手足尊則陛下叔父使二帝在天之靈子孫為天子而弟與子遭殘戮其心安乎臣每念至此未嘗不流涕也此皆豎儒偏見病藩封太重疑慮太深乃至此夫唇亡齒寒人人自危周王既廢湘王自焚代府被摧而齊臣又告王反矣為計者必曰兵不舉則禍必加是朝廷執政激之使然燕舉兵兩月矣前後調兵不下五十餘萬而一矢無獲謂之國有謀臣可乎經營既久軍興輒乏將不效謀士不效力徒使中原無辜赤子困於轉輸民不聊生日甚一日九重之憂方深而出入帷幄與國事者方且揚揚自得彼其勸陛下削藩國者果何心哉諺曰親者割之不斷疎者續之不堅殊有理也陛下不察不待十年悔無及矣臣至愚感恩至厚不敢不言幸少垂洞鑒興滅繼絕釋代王之囚封湘王之墓還周王於京師迎楚蜀為周公俾各命世子持書勸燕罷兵守藩以慰宗廟之靈明詔天下撥亂反正篤厚親親宗社幸甚不聽燕師渡江郁棄官遁去不知所終高賢寧濟陽儒學生嘗受學于教諭王省以節義相砥礪建文中貢入太學燕兵破德州圍濟南賢寧適在圍中不及赴是時燕兵勢甚張黃子澄等謀遣使議和以怠之尚寶司丞李得成者慷慨請行見燕王城下王不聽圍益急參政鐵鉉等百計禦之王射書城中諭降賢寧作周公輔成王論射城外王悅其言為緩攻相持兩月卒潰去燕王即位後賢寧被執入見成祖曰此作論秀才耶秀才好人予一官賢寧固辭錦衣衞指揮紀綱故劣行被黜生也素與賢寧善勸就職賢寧曰君為學校所棄故應爾我食廩有年義不可且嘗辱王先生之教矣綱為言於帝竟得歸年九十七卒王璡字器之日照人博通經史尤長於春秋初為教授坐事謫遠方洪武末以賢能薦授寧波知府夜四鼓即秉燭讀書聲徹署外間詣學課諸生諸生率四鼓起誦習無敢懈毀境內淫祠三皇祠亦在毀中或以為疑璡曰不當祠而祠曰淫不得祠而祠曰瀆惟天子得祭三皇於士庶人無預毀之何疑自奉儉約一日饌用魚羹璡謂其妻曰若不憶吾啖草根時耶命撤而埋之人號埋羹太守燕師臨江璡造舟艦謀勤王為衞卒縛至京成祖問造舟何為對曰欲泛海趨瓜洲阻師南渡耳帝亦不罪放還里以壽終周縉字伯紳武昌人以貢入太學授永清典史攝令事成祖舉兵守令相率迎降永清地尤近縉獨為守禦計已度不可為懷印南奔道聞母卒歸終喪燕兵已迫糾義旅勤王聞京師不守乃走匿吏部言前北平所屬州縣官朱寧等二百九十人當皇上靖難俱棄職逃亡宜置諸法詔令入粟贖罪遣戍興州有司遂捕縉械送戍所居數歲子代還年八十而沒朱寧等皆無考牛景先不知何許人官御史金川門開易服宵遁卒於杭州僧寺已而窮治齊黃黨籍其家燕兵之入一夕朝臣縋城去者四十餘人其姓名爵里莫可得而考然世相傳有程濟及河西傭補鍋匠之屬程濟朝邑人有道術洪武末官岳池教諭恵帝即位濟上書言某月日北方兵起帝謂非所宜言逮至將殺之濟大呼曰陛下幸囚臣臣言不驗死未晚乃下之獄已而燕兵起釋之改官編修參北征軍淮上敗召還或曰徐州之捷諸將樹碑紀功濟一夜往祭人莫測後燕王過徐見碑大怒趣左右椎之再椎遽曰止為我錄文來已按碑行誅無得免者而濟名適在椎脫處然考其實徐州未嘗有捷也金川門啟濟亡去或曰帝亦為僧出亡濟從之莫知所終河西傭不知何許人建文四年冬披葛衣行乞金城市中已至河西為傭於莊浪魯氏取直買羊裘而以故葛衣覆其上破縷縷不肯棄力作倦輒自吟哦或夜聞其哭聲久之有京朝官至識傭欲與語走南山避之或問京朝官傭何人官亦不答在莊浪數年病且死呼主人屬曰我死勿殮西北風起火我勿埋我骨魯家從其言補鍋匠者常往來夔州重慶間業補鍋凡數年川中人多識之一日於夔州市遇一人相顧愕然已相持哭共入山巖中坐語竟日復相持哭別去其人即馮翁也翁在夔以章句授童子給衣食能為古詩詩後題馬二子或馬公或塞馬先生後二人皆不知所終又會稽有二隱者一雲門僧一若耶溪樵僧每泛舟賦詩歸即焚之樵每於溪沙上以荻畫字已輒亂其沙人有疑之者從後抱持觀之則皆孤臣去國之詞也時又有玉山樵者居金華之東山麻衣戴笠終身不易嘗為王姓者題詩曰宗人故疑其王姓云雪庵和尚人疑其為葉希賢見練子寧傳其後數十年松陽王詔游治平寺於轉輪藏上得書一卷載建文亡臣二十餘人事蹟楮墨斷爛可識者僅九人梁田玉梁良玉梁良用梁中節皆定海人同族同仕於朝田玉官郎中京師破去為僧良玉官中書舍人變姓名走海南鬻書以老良用為舟師死於水中節好老子太玄經為道士何申宋和郭節俱不知何許人同官中書申使蜀至峽口聞變嘔血疽發背死和及節挾卜筮書走異域客死何洲海州人不知何官亦去為卜者客死郭良官籍俱無考與梁中節相約棄官為道士餘十一人並失其姓名縉雲鄭僖紀其事為忠賢奇秘錄傳於世及萬曆時江南又有致身錄云得之茅山道書中建文時侍書吳江史仲彬所述紀帝出亡後事甚具仲彬程濟葉希賢牛景先皆從亡之臣又有廖平金焦諸姓名而雪菴和尚補鍋匠等具有姓名官爵一時士大夫皆信之給事中歐陽調律上其書於朝欲為請諡立祠然考仲彬實未嘗為侍書錄蓋晚出附會不足信贊曰靖難之役朝臣多捐軀殉國若王艮以下諸人之從容就節非大義素明者不能也高巍一介布衣慷慨上書請歸藩服其持論甚偉又能超然遠引晦跡自全可稱奇士若夫行遯諸賢雖其姓字雜出於諸家傳紀未足徵信而忠義奇節人多樂道之者傳曰與其過而去之寧過而存之亦足以扶植綱常使懦夫有立志也
