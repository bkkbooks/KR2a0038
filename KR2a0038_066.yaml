body:
  text: 明史卷六十六志第四十二輿服二皇帝冕服后妃冠服皇太子親王以下冠服皇帝冕服洪武元年學士陶安請製五冕太祖曰此禮太繁祭天地宗廟服袞冕社稷等祀服通天冠絳紗袍餘不用三年更定正旦冬至聖節並服袞冕祭社稷先農册拜亦如之十六年定袞冕之制冕前圓後方玄表纁𩹉前後各十二旒旒五采玉十二珠五采繅十有二就就相去一寸紅絲組為纓黈纊充耳玉簪導袞玄衣黃裳十二章日月星辰山龍華蟲六章織於衣宗彝藻火粉米黼黻六章繡於裳白羅大帶紅𩹉蔽膝隨裳色繡龍火山文玉革帶玉佩大綬六采赤黃黑白縹緑小綬三色同大綬間施三玉環白羅中單黻領青緣襈黃襪黃舄金飾二十六年更定袞冕十二章冕版廣一尺二寸長二尺四寸冠上有覆玄表朱𩹉餘如舊制圭長一尺二寸袞玄衣纁裳十二章如舊制中單以素紗為之紅羅蔽膝上廣一尺下廣二尺長三尺織火龍山三章革帶佩玉長三尺三寸大帶素表朱𩹉兩邊用緣上以朱錦下以緑錦大綬六采黃白赤玄縹緑織成純玄質五百首凡合單紡為一系四系為一扶五扶為一首小綬三色同大綬間織三玉環朱襪赤舄永樂三年定冕冠以皂紗為之上覆曰綖桐板為質衣之以綺玄表朱𩹉前圓後方以玉衡維冠玉簪貫紐紐與冠武足前體下曰武綏在冠之下亦曰武並繫纓處皆飾以金綖以左右垂黈纊充耳用黃玉繫以玄紞承以白玉瑱朱紘餘如舊制玉圭長一尺二寸剡其上刻山四以象四鎮之山蓋周鎮圭之制異於大圭不瑑者也以黃綺約其下別以囊韜之金龍文袞服十有二章玄衣八章日月龍在肩星辰山在背火華蟲宗彝在袖每袖各三皆織成本色領褾襈裾褾者袖端襈者衣緣纁裳四章織藻粉米黼黻各二前三幅後四幅前後不相屬共腰有辟積本色綼裼裳側有純謂之綼裳下有純謂之裼純者緣也中單以素紗為之青領褾襈裾領織黻文十三蔽膝隨裳色四章織藻粉米黼黻各二本色緣有紃施於縫中玉鉤二玉佩二各用玉珩一瑀一琚二衝牙一璜二瑀下垂玉花一玉滴二瑑飾雲龍文描金自珩而下繫組五貫以玉珠行則衝牙二滴與璜相觸有聲金鉤二有二小綬六采黃白赤玄縹緑纁質大綬六采黃白赤玄縹緑纁質三小綬色同大綬間施三玉環龍文皆織成襪舄皆赤色舄用黑絇純以黃飾舄首嘉靖八年諭閣臣張璁袞冕有革帶今何不用璁對曰按陳祥道禮書古革帶大帶皆謂之鞶革帶以繫佩韍然後加以大帶而笏搢於二帶之間夫革帶前繫韍後繫綬左右繫佩自古冕辨用之今惟不用革帶以至前後佩服皆無所繫遂附屬裳要之間失古制矣帝曰冕服祀天地享祖宗若闕革帶非齊明盛服之意及觀會典載蔽膝用羅上織火山龍三章並大帶緣用錦皆與今所服不合卿可並革帶繫蔽膝佩綬之式詳考繪圖以進又云衣裳分上下服而今衣掩裳裳制如帷而今兩幅朕意衣但當與裳要下齊而露裳之六章何如已又諭璁以變更祖制為疑璁對曰臣考禮制衣不掩裳與聖意允合夫衣六章裳六章義各有取衣自不容掩裳大明集禮及會典與古制不異今衣八章裳四章故衣常掩裳然於典籍無所準內閣所藏圖注蓋因官司織造循習訛謬今訂正之乃復祖制非有變更帝意乃決因復諭璁曰衣有六章古以繪今當以織朕命織染局考國初冕服日月各徑五寸當從之裳六章古用繡亦當從之古色用玄黃取象天地今裳用纁於義無取當從古革帶即束帶後當用玉以佩綬繫之於下蔽膝隨裳色其繡上龍下火可不用山卿與內閣諸臣同考之於是楊一清等詳議袞冕之服自黃虞以來玄衣黃裳為十二章日月星辰山龍華蟲其序自上而下為衣之六章宗彝藻火粉米黼黻其序自下而上為裳之六章自周以後寖變其制或八章或九章已戾於古矣我太祖皇帝復定為十二章之制司造之官仍習舛訛非制作之初意伏乞聖斷不疑帝乃令擇吉更正其制冠以圓匡烏紗冒之旒綴七采玉珠十二青纊充耳綴玉珠二餘如舊制玄衣黃裳衣裳各六章洪武間舊制日月徑五寸裳前後連屬如帷六章用繡蔽膝隨裳色羅為之上繡龍一下繡火三繫於革帶大帶素表朱𩹉上緣以朱下以緑革帶前用玉其後無玉以佩綬繫而掩之中單及圭俱如永樂間制朱襪赤舄黃絛緣玄纓結皇帝通天冠服洪武元年定郊廟省牲皇太子諸王冠婚醮戒則服通天冠絳紗袍冠加金博山附蟬十二首施珠翠黑介幘組纓玉簪導絳紗袍深衣製白紗內單皂領褾襈裾絳紗蔽膝白假帶方心曲領白襪赤舄其革帶佩綬與袞服同皇帝皮辨服朔望視朝降詔降香進表四夷朝貢外官朝覲策士傳臚皆服之嘉靖以後祭太歲山川諸神亦服之其制自洪武二十六年定皮辨用烏紗冒之前後各十二縫每縫綴五采玉十二以為飾玉簪導紅組纓其服絳紗衣蔽膝隨衣色白玉佩革帶玉鉤緋白大帶白襪黑舄永樂三年定皮辨如舊制惟縫及冠武並貫簪繫纓處皆飾以金玉圭長如冕服之圭有脊並雙植文絳紗袍本色領褾襈裾紅裳但不織章數中單紅領褾襈裾餘俱如冕服內制皇帝武辨服明初親征遣將服之嘉靖八年諭閣臣張璁云會典紀親征類禡之祭皆具武辨服不可不備璁對周禮有韋辨謂以韎韋為辨又以為衣裳國朝視古損益有皮辨之制今武辨當如皮辨但皮辨以黑紗冒之武辨當以絳紗冒之隨具圖以進帝報曰覽圖有形但無繫處冠制古象上尖今皮辨則圓朕惟上鋭取其輕利當如古制又衣裳舄皆赤色何謂且佩綬俱無於祭用之可乎璁對自古服冕辨俱用革帶以前繫韍後繫綬韋辨之正繫於革帶耳武事尚威烈故色純用赤帝復報璁冠服衣裳舄俱如古制增革帶佩綬及圭乃定制辨上鋭色用赤上十二縫中綴五采玉落落如星狀韎衣韎裳韎韐俱赤色佩綬革帶如常制佩綬及韎韐俱上繫於革帶舄如裳色玉圭視鎮圭差小剡上方下有篆文曰討罪安民皇帝常服洪武三年定烏紗折角向上巾盤領窄袖袍束帶間用金琥珀透犀永樂三年更定冠以烏紗冒之折角向上其後名翼善冠袍黃盤領窄袖前後及兩肩各織金盤龍一帶用玉鞾以皮為之先是洪武二十四年帝微行至神樂觀見有結網巾者翼日命取網巾頒示十三布政使司人無貴賤皆裹網巾於是天子亦常服網巾又會典載皇太孫冠禮有云掌冠跪加網巾而皇帝皇太子冠服俱闕而不載嘉靖七年更定燕辨服初帝以燕居冠服尚沿習俗諭張璁考古帝王燕居法服之制璁乃采禮書玄端深衣之文圖注以進帝為參定其制諭璁詳議璁言古者冕服之外玄端深衣其用最廣玄端自天子達於士國家之命服也深衣自天子達於庶人聖賢之法服也今以玄端加文飾不易舊制深衣易黃色不離中衣誠得帝王損益時中之道帝因諭禮部曰古玄端上下通用今非古人比雖燕居宜辨等威因酌古制更名曰燕辨寓深宮獨處以燕安為戒之意其制冠匡如皮辨之制冒以烏紗分十有二瓣各以金線壓之前飾五采玉雲各一後列四山朱絛為組纓雙玉簪服如古玄端之制色玄邊緣以青兩肩繡日月前盤圓龍一後盤方龍二邊加龍文八十一領與兩袪共龍文五九袵同前後齊共龍文四九襯用深衣之制色黃袂圓袪方下齊負繩及踝十二幅素帶朱𩹉青表緑緣邊腰圍飾以玉龍九玄履朱緣紅纓黃結白襪皇后冠服洪武三年定受册謁廟朝會服禮服其冠圓匡冒以翡翠上飾九龍四鳳大花十二樹小花數如之兩博鬢十二鈿褘衣深青繪翟赤質五色十二等素紗中單黻領朱羅縠褾襈裾蔽膝隨衣色以緅為領緣用翟為章三等大帶隨衣色朱𩹉紕其外上以朱錦下以緑錦紐約用青組玉革帶青襪青舄以金飾永樂三年定制其冠飾翠龍九金鳳四中一龍銜大珠一上有翠蓋下垂珠結餘皆口銜珠滴珠翠雲四十片大珠花小珠花數如舊三博鬢飾以金龍翠雲皆垂珠滴翠口圈一副上飾珠寶鈿花十二翠鈿如其數托𩹉金口圈一副珠翠面花五事珠排環一對皂羅額子一描金龍文用珠二十一翟衣深青織翟文十有二等間以小輪花紅領褾襈裾織金雲龍文中單玉色紗為之紅領褾襈裾織黻文十三蔽膝隨衣色織翟為章三等間以小輪花四以緅為領緣織金雲龍文玉穀圭長七寸剡其上瑑穀文黃綺約其下韜以黃囊金龍文玉革帶青綺描金雲龍文玉事件十金事件四大帶表𩹉俱青紅相半末純紅下垂織金雲龍文上朱緣下緑緣青綺副帶一綬五采黃赤白縹緑纁質間施二玉環皆織成小綬三色同大綬玉佩二各用玉珩一瑀一琚二衝牙一璜二瑀下垂玉花一玉滴二瑑飾雲龍文描金自珩而下繫組五貫以玉珠行則衝牙二滴與二璜相觸有聲上有金鉤有小綬五采以副之纁質織成青襪舄飾以描金雲龍皂純每舄首加珠五顆皇后常服洪武三年定雙鳳翊龍冠首飾釧鐲用金玉珠寶翡翠諸色團衫金繡龍鳳文帶用金玉四年更定龍鳳珠翠冠真紅大袖衣霞帔紅羅長裙紅褙子冠制如特髻上加龍鳳飾衣用織金龍鳳文加繡飾永樂三年更定冠用皂縠附以翠博山上飾金龍一翊以珠翠鳳二皆口銜珠滴前後珠牡丹二花八蕊翠葉三十六珠翠穰花鬢二珠翠雲二十一翠口圈一金寶鈿花九飾以珠金鳳二口銜珠結三博鬢飾以鸞鳳金寶鈿二十四邊垂珠滴金簪二珊瑚鳳冠觜一副大衫霞帔衫黃霞帔深青織金雲霞龍文或繡或鋪翠圈金飾以珠玉墜子瑑龍文四襖子即褙子深青金繡團龍文鞠衣紅色前後織金雲龍文或繡或鋪翠圈金飾以珠大帶紅線羅為之有緣餘或青或緑各隨鞠衣色緣襈襖子黃色紅領褾襈裾皆織金采色雲龍文緣襈裙紅色緑緣襈織金采色雲龍文玉帶如翟衣內制第減金事件一玉花采結綬以紅緑線羅為結玉綬花一瑑雲龍文綬帶玉墜珠六金垂頭花瓣四小金葉六紅線羅繫帶一白玉雲樣玎璫二如佩制有金鉤金如意雲蓋一下懸紅組五貫金方心雲板一俱鈒雲龍文襯以紅綺下垂金長頭花四中小金鐘一末綴白玉雲𩽆五青襪舄與翟衣內制同皇妃皇嬪及內命婦冠服洪武三年定皇妃受册助祭朝會禮服冠飾九翬四鳳花叉九樹小花數如之兩博鬢九鈿翟衣青質繡翟編次於衣及裳重為九等青紗中單黻領朱縠褾襈裾蔽膝隨裳色加文繡重雉為章二等以緅為領緣大帶隨衣色玉革帶青襪舄佩綬常服鸞鳳冠首飾釧鐲用金玉珠寶翠諸色團衫金繡鸞鳳不用黃帶用金玉犀又定山松特髻假鬢花鈿或花叉鳳冠真紅大袖衣霞帔紅羅裙褙子衣用織金及繡鳳文永樂三年更定禮服九翟冠二以皂縠為之附以翠博山飾大珠翟二小珠翟三翠翟四皆口銜珠滴冠中寶珠一座翠頂雲一座其珠牡丹翠穰花鬢之屬俱如雙鳳翊龍冠制第減翠雲十又翠牡丹花穰花各二面花四梅花環四珠環各二其大衫霞帔燕居佩服之飾俱同中宮第織金繡瑑俱雲霞鳳文不用雲龍文九嬪冠服嘉靖十年始定冠用九翟次皇妃之鳳大衫鞠衣如皇妃制圭用次玉穀文內命婦冠服洪武五年定三品以上花叉翟衣四品五品山松特髻大衫為禮服貴人視三品以皇妃燕居冠及大衫霞帔為禮服以珠翠慶雲冠鞠衣褙子緣襈襖裙為常服宮人冠服制與宋同紫色團領窄袖遍刺折枝小葵花以金圈之珠絡縫金帶紅裙弓樣㙐上刺小金花烏紗帽飾以花帽額綴團珠結珠鬢梳垂珠耳飾皇太子冠服陪祀天地社稷宗廟及大朝會受册納妃則服袞冕洪武二十六年定袞冕九章冕九旒旒九玉金簪導紅組纓兩玉瑱圭長九寸五分玄衣纁裳衣五章織山龍華蟲宗彝火裳四章織藻粉米黼黻白紗中單黻領蔽膝隨裳色織火山二章革帶金鉤玉佩綬五采赤白玄縹緑織成純赤質三百三十首小綬三色同間織三玉環大帶白表朱𩹉上緣以紅下緣以緑白襪赤舄永樂三年定冕冠玄表朱𩹉前圓後方前後各九旒每旒五采繅九就貫五采玉九赤白青黃黑相次玉衡金簪玄紞垂青纊充耳用青玉承以白玉瑱朱紘纓玉圭長九寸五分以錦約其下並韜袞服九章玄衣五章龍在肩山在背火華蟲宗彝在袖每袖各三皆織成本色領褾襈裾纁裳四章織藻粉米黼黻各二前三幅後四幅不相屬共腰有襞積本色綼裼中單以素紗為之青領褾襈裾領織黻文十一蔽膝隨裳色四章織藻粉米黼黻本色緣有紃施於縫中上玉鉤二玉佩二各用玉珩一瑀一琚一衝牙一璜二瑀下垂玉花一玉滴二瑑雲龍文描金自珩而下繫組五貫以玉珠上有金鉤小綬四采赤白縹緑以副之纁質大帶素表朱𩹉在腰及垂皆有綼上綼以朱下綼以緑紐約用青組大綬四采赤白縹緑纁質小綬三采間施二玉環龍文皆織成襪舄皆赤色舄用黑絇純黑飾舄首朔望朝降詔降香進表外國朝貢朝覲則服皮辨永樂三年定皮辨冒以烏紗前後各九縫每縫綴五采玉九縫及冠武並貫簪繫纓處皆飾以金金簪朱纓玉圭如冕服內制絳紗袍本色領褾襈裾紅裳如冕服內裳制但不織章數中單以素紗為之如深衣制紅領褾襈裾領織黻文十一蔽膝隨裳色本色緣有紃施於縫中其上玉鉤二玉佩如冕服內制但無雲龍文有小綬四采以副之大帶大綬襪舄赤色皆如冕服內制其常服洪武元年定烏紗折上巾永樂三年定冠烏紗折角向上巾亦名翼善冠親王郡王及世子俱同袍赤盤領窄袖前後及兩肩各金織盤龍一玉帶鞾以皮為之皇太子妃冠服洪武三年定禮服與皇妃同永樂三年更定九翬四鳳冠漆竹絲為匡冒以翡翠上飾翠翬九金鳳四皆口銜珠滴珠翠雲四十片大珠花九樹小珠花數如之雙博鬢飾以鸞鳳皆垂珠滴翠口圈一副上飾珠寶鈿花九翠鈿如其數托𩹉金口圈一副珠翠面花五事珠排環一對珠皂羅額子一描金鳳文用珠二十一翟衣青質織翟文九等間以小輪花紅領褾襈裾織金雲龍文中單玉色紗為之紅領褾襈裾領織黻文十一蔽膝隨衣色織翟為章二等間以小輪花三以緅為領緣織金雲鳳文其玉圭帶綬玉佩襪舄之制俱同皇妃洪武三年又定常服犀冠刻以花鳳首飾釧鐲衫帶俱同皇妃四年定冠亦與皇妃同永樂三年定燕居冠以皂縠為之附以翠博山上飾寶珠一座翊以二珠翠鳳皆口銜珠滴前後珠牡丹二花八蕊翠葉三十六珠翠穰花鬢二珠翠雲十六片翠口圈一副金寶鈿花九上飾珠九金鳳一對口銜珠結雙博鬢飾以鸞鳳金寶鈿十八邊垂珠滴金簪一對珊瑚鳳冠觜一副其大衫霞帔燕居佩服之飾俱同皇妃親王冠服助祭謁廟朝賀受册納妃服袞冕朔望朝降詔降香進表四夷朝貢朝覲服皮辨洪武二十六年定冕服俱如東宮第冕旒用五采玉圭長九寸二分五釐青衣纁裳永樂三年又定冕服皮辨制俱與東宮同其常服亦與東宮同嘉靖七年諭禮部朕仿古玄端自為燕辨冠服更制忠靜冠服錫於有位而宗室諸王制猶未備今酌燕辨及忠靜冠之制復為式具圖命曰保和冠服自郡王長子以上其式已明鎮國將軍以下至奉國中尉及長史審理紀善教授伴讀俱用忠靜冠服依其品服之儀賓及餘官不許概服夫忠靜冠服之異式尊賢之等也保和冠服之異式親親之殺也等殺既明庶幾乎禮之所保保斯和和斯安此錫名之義也其以圖説頒示諸王府如敕遵行保和冠制以燕辨為準用九去簪與五玉後山一扇分畫為四服青質青緣前後方龍補身用素地邊用雲襯用深衣玉色帶青表緑𩹉緑緣履用皂緑結白襪親王妃冠服受册助祭朝會服禮服洪武三年定九翬四鳳冠永樂三年又定九翟冠制同皇妃其大衫霞帔燕居佩服之飾同東宮妃第金事件減一玉綬花瑑寶相花文公主冠服與親王妃同惟不用圭親王世子冠服聖節千秋節並正旦冬至進賀表箋及父王生日諸節慶賀皆服袞冕洪武二十六年定袞冕七章冕三采玉珠七旒圭長九寸青衣三章織華蟲火宗彝纁裳四章織藻粉米黼黻素紗中單青領襈赤韍革帶佩白玉玄組綬綬紫質用三采紫黃赤織成間織三白玉環白襪赤舄永樂三年更定冕冠前後各八旒每旒五采繅八就貫三采玉珠八赤白青色相次玉圭長九寸青衣三章火在肩華蟲宗彝在兩袖皆織成本色領褾襈裾其纁裳玉佩帶綬之制俱與親王同第領織黻文減二皮辨用烏紗冒之前後各八縫每縫綴三采玉八餘制如親王其圭佩帶綬襪舄如冕服內制常服亦與親王同嘉靖七年定保和冠服以燕辨為準用八去簪玉後山以一扇分畫為四服與親王同世子妃冠服永樂三年定與親王妃同惟冠用七翟郡王冠服永樂三年定冕冠前後各七旒每旒五采繅七就貫三采玉珠七圭長九寸青衣三章粉米在肩藻宗彝在兩袖皆織成纁裳二章織黼黻各二中單領織黻文七餘與親王世子同皮辨前後各七縫每縫綴三采玉七餘與親王世子同其圭佩帶綬襪舄如冕服內制常服亦與親王世子同嘉靖七年定保和冠服冠用七服與親王世子同郡王妃冠服永樂三年定冠用七翟與親王世子妃同其大衫霞帔燕居佩服之飾俱同親王妃第繡雲霞翟文不用盤鳳文郡王長子朝服七梁冠大紅素羅衣白素紗中單大紅素羅裳及蔽膝大紅素羅白素紗二色大帶玉朝帶丹礬紅花錦錦雞綬玉佩象笏白絹襪皂皮雲頭履㙐公服皂皺紗幞頭大紅素紵絲衣玉革帶常服烏紗帽大紅紵絲織金獅子開圓領玉束帶皂皮銅線鞾其保和冠如忠靜之制用五服與郡王同補子用織金方龍郡主冠服永樂三年定與郡王妃同惟不用圭減四珠環一對郡王長子夫人冠服珠翠五翟冠大紅紵絲大衫深青紵絲金繡翟褙子青羅金繡翟霞帔金墜頭鎮國將軍冠服與郡王長子同鎮國將軍夫人冠服與郡王長子夫人同輔國將軍冠服與鎮國將軍同惟冠六梁帶用犀輔國將軍夫人冠服與鎮國將軍夫人同惟冠用四翟抹金銀墜頭奉國將軍冠服與輔國將軍同惟冠五梁帶用金鈒花常服大紅織金虎豹奉國將軍淑人冠服與輔國將軍夫人同惟褙子霞帔金繡孔雀文鎮國中尉冠服與奉國將軍同惟冠四梁帶用素金佩用藥玉鎮國中尉恭人冠服與奉國將軍淑人同輔國中尉冠服與鎮國中尉同惟冠三梁帶用銀鈒花綬用盤雕公服用深青素羅常服紅織金熊羆輔國中尉宜人冠服與鎮國中尉恭人同惟冠用三翟褙子霞帔金繡鴛鴦文銀墜頭奉國中尉冠服與輔國中尉同惟冠二梁帶用素銀綬用練鵲幞頭黑漆常服紅織金彪奉國中尉安人冠服與輔國中尉宜人同惟大衫用丹礬紅褙子霞帔金繡練鵲文縣主冠服珠翠五翟冠大紅紵絲大衫深青紵絲金繡孔雀褙子青羅金繡孔雀霞帔抹金銀墜頭郡君冠服與縣主同惟冠用四翟褙子霞帔金繡鴛鴦文縣君冠服與郡君同惟冠用三翟鄉君冠服與縣君同惟大衫用丹礬紅褙子霞帔金繡練鵲文
