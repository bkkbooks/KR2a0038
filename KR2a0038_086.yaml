body:
  text: 明史卷八十六志第六十二河渠四運河下海運江南運河自杭州北郭務至謝村北為十二里洋為塘棲德清之水入之踰北陸橋入崇德界過松老抵高新橋海鹽支河通之繞崇德城南轉東北至小高陽橋東過石門塘折而東為王灣至皂林水深者及丈過永新入秀水界踰陡門鎮北為分鄉鋪稍東為繡塔北由嘉興城西轉而北出杉青三閘至王江涇鎮松江運艘自東來會之北為平望驛東通鶯脰湖湖州運艘自西出新興橋會之北至松陵驛由吳江至三里橋北有震澤南有黃天蕩水勢漰湃夾浦橋屢建北經蘇州城東鮎魚口水由齾塘入之北至楓橋由射瀆經滸墅關過白鶴鋪長洲無錫兩邑之界也錫山驛水僅浮瓦礫過黃埠至洛社橋江陰九里河之水通之西北為常州漕河舊貫城入東水門由西水門出嘉靖末防倭改從南城壕江陰順塘河水由城東通丁堰沙子湖在其西南宜興鍾溪之水入之又西直瀆水入之又西為奔牛呂城二閘常鎮界其中皆有月河以佐節宣後並廢其南為金壇河溧陽高淳之水出焉丹陽南二十里為陵口北二十五里為黃泥壩舊皆置閘練湖水高漕河數丈一由三思橋一由仁智橋皆入運北過丹徒鎮有猪婆灘多軟沙丹徒以上運道視江潮為盈涸過鎮江出京口閘閘外沙堵延袤二十丈可藏舟避風由此浮於江與瓜步對自北郭至京口首尾八百餘里皆平流歷嘉而蘇衆水所聚至常州以西地漸高仰水淺易泄盈涸不時濬時壅往往兼取孟瀆德勝兩河東浮大江以達揚泰洪武二十六年嘗命崇山侯李新開溧水胭脂河以通浙漕免丹陽輸挽及大江風濤之險而三吳之粟必由常鎮三十一年濬奔牛呂城二壩河道永樂間修練湖堤即命通政張璉發民丁十萬濬常州孟瀆河又濬蘭陵溝北至孟瀆河閘六千餘丈南至奔牛鎮千二百餘丈已復濬鎮江京口新港及甘露三港以達於江漕舟自奔牛溯京口水涸則改從孟瀆右趨瓜洲抵白塔以為常宣德六年從武進民請疏德勝新河四十里八年工竣漕舟自德勝北入江直泰興之北新河由泰州壩抵揚子灣入漕河視白塔尤便於是漕河及孟瀆德勝三河並通皆可濟運矣正統元年廷臣上言自新港至奔牛漕河百五十里舊有水車捲江潮灌注通舟溉田請支官錢置車詔可然三河之入江口皆自卑而高其水亦更迭盈縮八年武進民請濬德勝及北新河浙江都司蕭華則請濬孟瀆巡撫周忱定議濬兩河而罷北新築壩白塔河之大橋閘以時啓閉而常鎮漕河亦疏濬焉景泰間漕河復淤遂引漕舟盡由孟瀆三年御史練綱言漕舟從夏港及孟瀆出江逆行三百里始達瓜洲德勝直北新而白塔又與孟瀆斜直由此兩岸橫渡甚近宜大疏淤塞帝命尚書石璞措置會有請鑿鎮江七里港引金山上流通丹陽以避孟瀆險者鎮江知府林鶚以為迂道多石壞民田墓多宜濬京口閘甘露壩道里近功力省乃從鶚議浙江參政胡清又欲去新港奔牛等壩置石閘以蓄泉亦從其請而濬德勝河與鑿港之議俱寢然石閘雖建蓄水不能多漕舟仍入孟瀆天順元年尚寶少卿凌信言糧艘從鎮江𩹉河為便帝以為然命糧儲河道都御史李秉通七里港口引江水注之且濬奔牛新港之淤巡撫崔恭又請增置五閘至成化四年閘工始成於是漕舟盡由𩹉河其入二河者回空之艘及他舟而已定制孟瀆河口與瓜儀諸港俱三年一濬孟瀆寬廣不甚淤𩹉河不久輒涸則又改從孟瀆弘治十七年部臣復陳夏港孟瀆遠浮大江之害請亟濬京口淤而引練湖灌之詔速行正德二年復開白塔河及江口大橋潘家通江四閘十四年從督漕都御史臧鳳言濬常州上下𩹉河漕舟無阻者五十餘載萬曆元年又漸涸復一濬之歲貢生許汝愚上言國初置四閘曰京口曰丹徒防三江之涸曰呂城曰奔牛防五湖之泄自丹陽至鎮江蓄為湖者三曰練湖曰焦子曰杜墅歲久居民侵種焦杜二湖俱涸僅存練湖猶有侵者而四閘俱空設矣請濬三湖故址通漕總河傅希摯言練湖已濬而焦子杜墅源少無益其議遂寢未幾練湖復淤淺五年御史郭思極陳世寶先後請復練湖濬孟瀆而給事中湯聘尹則請於京口旁別建一閘引江流內注潮長則開縮則閉御史尹良任又言孟瀆渡江入黃家港水面雖闊江流甚平由此抵泰興以達灣頭高郵僅二百餘里可免瓜儀不測之患至如京口北渡金山而下中流遇風有漂溺患宜挑甘露港夾岸洲田十餘里以便回泊御史林應訓又言自萬緣橋抵孟瀆兩崖陡峻雨潦易圮且江潮湧沙淤塞難免宜於萬緣橋黃連樹各建閘以資蓄泄又言練湖自西晉陳敏遏馬林溪引長山八十四溪之水以溉雲陽堤名練塘又曰練河凡四十里許環湖立涵洞十三宋紹興時中置橫埂分上下湖立上中下三閘八十四溪之水始經辰溪衝入上湖復由三閘轉入下湖洪武間因運道澀依下湖東堤建三閘借湖水以濟運後乃漸堙今當盡革侵占復濬為湖上湖四際夾阜下湖東北臨河原埂完固惟應補中間缺口且增築西南與東北相應至三閘惟臨湖上閘如故宜增建中下二閘更設減水閘二座界中下二閘間共革田五千畝有奇塞沿堤私設涵洞止存其舊十三處以宣泄湖水冬春即閉塞毋得私啓蓋練湖無源惟藉瀦蓄增堤啓閘水常有餘然後可以濟運臣親驗上湖地仰八十四溪之水所由來懼其易泄下湖地平衍僅高漕河數尺又常懼不盈誠使水裕堤堅則應時注之河有全力矣皆下所司酌議十三年鎮江知府吳撝謙復言練湖中堤宜飭有司春初即修以防衝決且禁勢豪侵占從之十七年濬武進橫林漕河崇禎元年濬京口漕河五年太常少卿姜志禮建漕河議言神廟初先臣寶著漕河議當事采行不開河而濟運者二十餘年後復佃湖妨運歲纍畚鍤故老有言京口閘底與虎丘塔頂平是可知挑河無益蓄湖為要也今當革佃修閘而高築上下湖圍埂蓄水使深且漕河閘座非僅京口呂城新閘奔牛數處而已陵口尹公橋黃泥壩新豐大犢山節節有閘皆廢去並宜修建而運道支流如武進洞子河連江橋河扁擔河丹陽簡橋河陳家橋河七里橋河丁議河越瀆河滕村溪之大壩頭丹陽甘露港南之小閘口皆應急修整至奔牛呂城之北各設減水閘歲十月實以土商民船盡令盤壩此皆舊章所當率由近有欲開九曲河使運船竟從泡港閘出江直達揚子橋以免瓜洲啓閘稽遲者試而後行可也回空糧艘及官舫宜由江行而於河莊設閘啓閉數役並行漕事乃大善矣議不果行江漕者湖廣漕舟由漢沔下潯陽江西漕舟出章江鄱陽而會於湖口暨南直隸寧太池安江寧廣德之舟同浮大江入儀真通江閘以溯淮揚入閘河瓜儀之間運道之咽喉也洪武中餉遼卒者從儀真上淮安由鹽城泛海餉梁晉者亦從儀真赴淮安盤壩入淮江口則設壩置閘凡十有三濬揚子橋河至黃泥灣九千餘丈永樂間濬儀真清江壩下水港及夾港河修沿江堤岸洪熙元年濬儀真壩河後定制儀真壩下黃泥灘直河口二港及瓜洲二港常州之孟瀆河皆三年一濬宣德間從侍郎趙新御史陳祚請濬黃泥灘清江閘成化中建閘於儀真通江河港者三江都之留潮通江者二已而通江港塞弘治初復開之既又於總港口建閘蓄水儀真江都二縣間有官塘五區築閘蓄水以溉民田豪民占以為業真揚之間運道阻梗嘉靖二年御史秦鉞請復五塘從之萬曆五年御史陳世寶言儀真江口去閘太遠請於上下十數丈許增建二閘隨湖啓閉以截出江之船盡令入閘庶免遲滯疏上議行白塔河者在泰州上通邵伯下接大江斜對常州孟瀆河與泰興北新河皆浙漕間道也自陳瑄始開宣德間從趙新陳祚請命瑄役夫四萬五千餘人濬之建新閘潘家莊大橋江口四閘正統四年水潰閘塞都督武興因閉不用仍自瓜洲盤壩瓜洲之壩洪武中置凡十五列東西二港間永樂間廢東壩為廠以貯材木止存西港七壩漕舟失泊屢遭風險英宗初年乃復濬東港既而巡撫周忱築壩白塔河之大橋閘以時啓閉漕舟稍分行自鎮江𩹉河開濬漕舟出甘露新港徑渡瓜洲而白塔北新皆以江路險遠捨而不由矣衛漕者即衛河源出河南輝縣至臨清與會通河合北達天津自臨清以北皆稱衛河詳具本志白漕者即通濟河源出塞地經密雲縣霧靈山為潮河川而富河罾口河七渡河桑乾河三里河俱會於此名曰白河南流經通州合通惠及榆渾諸河亦名潞河三百六十里至直沽會衛河入海賴以通漕楊村以北勢若建瓴底多淤沙夏秋水漲苦潦冬春水微苦澀衝潰徙改頗與黃河同耎兒渡者在武清通州間尤其要害處也自永樂至成化初年凡八決輒發民夫築堤而正統元年之決為害尤甚特敕太監沐敬安遠侯柳溥尚書李友直隨宜區畫發五軍營卒五萬及民夫一萬築決堤又命武進伯朱冕尚書吳中役五萬人去河西務二十里鑿河一道導白水入其中二工並竣人甚便之賜河名曰通濟封河神曰通濟河神先是永樂二十一年築通州抵直沽河岸有衝決者隨時修築以為常逮通濟河成決岸修築者亦且數四萬曆三十一年從工部議挑通州至天津白河深四尺五寸所挑沙土即築堤兩岸著為令大通河者元郭守敬所鑿由大通橋東下抵通州高麗莊與白河合至直沽會衛河入海長百六十里有奇十里一閘蓄水濟運名曰通惠又以白河榆河渾河合流亦名潞河洪武中漸廢永樂四年八月北京行部言宛平昌平西湖景東牛欄莊及青龍華家甕山三閘水衝決岸命發軍民修治明年復言自西湖景東至通流凡七閘河道淤塞自昌平東南白浮村至西湖景東流水河口一百里宜增置十二閘從之未幾閘俱堙不復通舟成化中漕運總兵官楊茂言每歲自張家灣舍舟車轉至都下雇值不資舊通惠河石閘尚存深二尺許修閘瀦水用小舟剝運便又有議於三里河從張家灣烟墩橋以西疏河泊舟者下廷臣集議遣尚書楊鼎侍郎喬毅相度上言舊閘二十四座通水行舟但元時水在宮牆外舟得入城內海子灣今水從皇城金水河出故道不可復行且元引白浮泉往西逆流今經山陵恐妨地脈又一畝泉過白羊口山溝兩水衝截難引若城南三里河舊無河源正統間修城壕恐雨多水溢乃穿正陽橋東南窪下地開壕口以泄之始有三里河名自壕口八里始接渾河舊渠兩岸多廬墓水淺河窄又須增引別流相濟如西湖草橋源出玉匠局馬跑等地泉不深遠元人曾用金口水洶湧沒民舍以故隨廢惟玉泉龍泉及月兒柳沙等泉皆出西北循山麓而行可導入西湖請濬西湖之源閉分水清龍閘引諸泉水從高梁河分其半由金水河出餘則從都城外壕流轉會於正陽門東城壕且閉令勿入三里河併流大通橋閘河隨旱潦啓閉則舟獲近倉甚便帝從其議方發軍夫九萬修濬會以災異詔罷諸役所司以漕事大乃命四萬人濬城壕而西山玉泉及抵張家灣河道則以漸及焉越五年乃敕平江伯陳鋭副都御史李裕侍郎翁世資王詔督漕卒濬通惠河如鼎毅前議明年六月工成自大通橋至張家灣渾河口六十餘里濬泉三增閘四漕舟稍通然元時所引昌平三泉俱遏不行獨引一西湖又僅分其半河窄易盈涸不二載澀滯如舊正德二年嘗一濬之且修大通橋至通州閘十有二壩四十有一嘉靖六年御史吳仲言通惠河屢經修復皆為權勢所撓顧通流等八閘遺跡俱存因而成之為力甚易歲可省車費資二十餘萬且歷代漕運皆達京師未有貯國儲於五十里外者帝心以為然命侍郎王軏何詔及仲偕相度軏等言大通橋地形高白河六丈餘若濬至七丈引白河達京城諸閘可盡罷然未易議也計獨濬治河閘但通流閘在通州舊城中經二水門南浦土橋廣利三閘皆闤闠衢市不便轉挽惟白河濱舊小河廢壩西不一里至堰水小壩宜修築之使通普濟閘可省四閘兩關轉搬力而尚書桂萼言不便請改修三里河帝下其疏於大學士楊一清張璁一清言因舊閘行轉搬法省運軍勞費宜斷行之璁亦言此一勞永逸之計萼所論費廣功難帝乃却萼議明年六月仲報河成因疏五事言大通橋至通州石壩地勢高四丈流沙易淤宜時加濬治管河主事宜專委任毋令兼他務官吏閘夫以罷運裁減宜復舊額慶豐上閘平津中閘今已不用宜改建通州西水關外剝船造費及遞歲修艌俱宜酌處帝以先朝屢勘行未即功仲等四閲月工成詔豫賞悉從其所請仲又請留督工郎中何棟專理其事為經久計從之九年擢棟右通政仍管通惠河道是時仲出為處州知府進所編通惠河志帝命送史館採入會典且頒工部刊行自此漕艘直達京師迄於明末人思仲德建祠通州祀之薊州河者運薊州官軍餉道也明初海運餉薊州天順二年大河衛百戶閔恭言南京並直隸各衛歲用旗軍運糧三萬石至薊州等衛倉越大海七十餘里風濤險惡新開沽河北望薊州正與水套沽河直袤四十餘里而徑且水深其間阻隔者僅四之一若穿渠以運可無海患下總兵都督宋勝巡按御史李敏行視可否勝等言便遂開直沽河闊五丈深丈五尺成化二年一濬二十年再濬並濬鴉鴻橋河道造豐潤縣海運糧儲倉正德十六年運糧指揮王瓚言直沽東北新河轉運薊州河流淺潮至方可行舟邊關每匱餉宜濬使深廣從之初新河三歲一濬嘉靖元年易二歲以為常十七年濬殷留莊大口至舊倉店百十六里豐潤環香河者濬自成化間運粟十餘萬石以餉薊州東路者也後堙廢餉改薊州給大不便嘉靖四十五年從御史鮑承蔭請復之且建三閘於北濟張官屯鴉鴻橋以瀦水昌平河運諸陵官軍餉道也起鞏華城外安濟橋抵通州渡口袤百四十五里其中淤淺三十里難行隆慶六年大濬運給長陵等八衛官軍月糧四萬石遂成流通萬曆元年復疏鞏華城外舊河海運始於元至元中伯顏用朱清張瑄運糧輸京師僅四萬餘石其後日增至三百萬餘石初海道萬三千餘里最險惡既而開生道稍徑直後殷明略又開新道尤便然皆出大洋風利自浙西抵京不過旬日而漂失甚多洪武元年太祖命湯和造海舟餉北征士卒天下既定募水工運萊州洋海倉粟以給永平後遼左及迤北數用兵於是靖海侯吳禎延安侯唐勝宗航海侯張赫舳艫侯朱壽先後轉遼餉以為常督江浙邊海衛軍大舟百餘艘運糧數十萬賜將校以下綺帛胡椒蘇木錢鈔有差民夫則復其家一年溺死者厚恤三十年以遼東軍餉贏羡第令遼軍屯種其地而罷海運永樂元年平江伯陳瑄督海運糧四十九萬餘石餉北京遼東二年以海運但抵直沽別用小船轉運至京命於天津置露囤千四百所以廣儲蓄四年定海陸兼運瑄每歲運糧百萬建百萬倉於直沽尹兒灣城天津衛籍兵萬人戍守至是命江南糧一由海運一由淮黃陸運赴衛河入通州以為常陳瑄上言嘉定瀕海當江流之衝地平衍無大山高嶼海舟停泊或值風濤觸堅膠淺輒敗宜於青浦築土為山立堠表識使舟人知所避而海險不為患詔從之十年九月工成方百丈高三十餘丈賜名寶山御製碑文紀之十三年五月復罷海運惟存遮洋一總運遼薊糧正統十三年減登州衛海船百艘為十八艘以五艘運青萊登布花鈔錠十二萬餘斤歲賞遼軍成化二十三年侍郎丘濬進大學衍義補請尋海運故道與河漕並行大略言海舟一載千石可當河舟三用卒大減河漕視陸運費省什三海運視陸省什七雖有漂溺患然省牽卒之勞駁淺之費挨次之守利害亦相當宜訪素知海道者講求勘視其說未行弘治五年河決金龍口有請復海運者朝議弗是嘉靖二年遮洋總漂糧二萬石溺死官軍五十餘人五年停登州造船二十年總河王以旗以河道梗澀言海運雖難行然中間平度州東南有南北新河一道元時建閘直達安東南北悉由內洋而行路捷無險所當講求帝以海道迂遠却其議三十八年遼東巡撫侯汝諒言天津入遼之路自海口至右屯河通堡不及二百里其中曹泊店月坨桑姜女墳桃花島皆可灣泊部覆行之四十五年順天巡撫耿隨朝勘海道自永平西下海百四十五里至紀各莊又四百二十六里至天津皆傍岸行舟其間開洋百二十里有建河糧河小沽大沽河可避風初允其議尋以御史劉翾疏沮而罷是年從給事中胡應嘉言革遮洋總隆慶五年徐邳河淤從給事中宋良佐言復設遮洋總存海運遺意山東巡撫梁夢龍極論海運之利言海道南自淮安至膠州北自天津至海倉島人商賈所出入臣遣卒自淮膠各運米麥至天津無不利者淮安至天津三千三百里風便兩旬可達舟由近洋島嶼聯絡雖風可依視殷明略故道甚安便五月前風順而柔此時出海可保無虞命量撥近地漕糧十二萬石俾夢龍行之六年王宗沐督漕請行海運詔令運十二萬石自淮入海其道由雲梯關東北歷鷹游山安東衛石臼所夏河所齊堂島靈山衛古鎮膠州鼇山衛大嵩衛行村寨皆海面自海洋所歷竹島寧津所靖海衛東北轉成山衛劉公島威海衛西歷寧海衛皆海面自福山之罘島至登州城北新海口沙門等島西歷桑島屺島自屺西歷三山島芙蓉島萊州大洋海倉口自海倉西歷淮河海口魚兒鋪西北歷侯鎮店唐頭塞自侯鎮西北大清河小清河海口乞溝河入直沽抵天津衛凡三千三百九十里萬曆元年即墨福山島壞糧運七艘漂米數千石溺軍丁十五人給事御史交章論其失罷不復行二十五年倭寇作自登州運糧給朝鮮軍山東副使于仕廉復言餉遼莫如海運海運莫如登萊蓋登萊度金州六七百里至旅順口僅五百餘里順風揚帆一二日可至又有沙門鼉磯皇城等島居其中天設水遞止宿避風惟皇城至旅順二百里差遠得便風不半日可度也若天津至遼則大洋無泊淮安至膠州雖僅三百里而由膠至登千里而遙礁礙難行惟登萊濟遼勢便而事易時頗以其議為然而未行也四十六年山東巡撫李長庚奏行海運特設戶部侍郎一人督之事具長庚傳崇禎十二年崇明人沈廷揚為內閣中書復陳海運之便且輯海運書五卷進呈命造海舟試之廷揚乘二舟載米數百石十三年六月朔由淮安出海望日抵天津守風者五日行僅一旬帝大喜加廷揚戶部郎中命往登州與巡撫徐人龍計度山東副總兵黃蔭恩亦上海運九議帝即令督海運先是寧遠軍餉率用天津船赴登州候東南風轉粟至天津又候西南風轉至寧遠廷揚自登州直輸寧遠省費多尋命赴淮安經理海運為督漕侍郎朱大典所沮乃命易駐登州領寧遠餉務十六年加光祿少卿福王時命廷揚以海舟防江尋命兼理糧務南都既失廷揚崎嶇唐魯二王間以死當嘉靖中廷臣紛紛議復海運漕運總兵官萬表言在昔海運歲溺不止十萬載米之舟駕船之卒統卒之官皆所不免今人策海運輒主丘濬之論非達於事者也
