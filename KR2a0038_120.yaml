body:
  text: 明史卷一百二十列傳第八諸王五世宗諸子哀沖太子載基莊敬太子載景王載圳潁王載戚王載薊王載均王載穆宗諸子憲懷太子翊釴靖王翊鈴潞王翊鏐神宗諸子邠王常福王常洵沅王常治瑞王常浩惠王常潤桂王常瀛光宗諸子簡王由㰒齊王由楫懷王由模湘王由栩惠王由橏熹宗諸子懷沖太子慈然悼懷太子慈焴獻懷太子慈炅莊烈帝諸子太子慈烺懷王慈烜定王慈炯永王慈照世宗八子閻貴妃生哀沖太子載基王貴妃生莊敬太子載杜太后生穆宗盧靖妃生景王載圳江肅妃生潁王載趙懿妃生戚王載陳雍妃生薊王載趙榮妃生均王載哀沖太子載基世宗第一子生二月而殤莊敬太子載世宗第二子嘉靖十八年世宗將南巡立為皇太子甫四歲命監國以大學士夏言為傅尚書霍韜郎中鄒守益獻東宮聖學圖册疑為謗訕幾獲罪帝既得方士段朝用思習修攝術諭禮部具皇太子監國儀太僕卿楊最諫杖死監國之議亦罷贊善羅洪先趙時春唐順之請太子出閣講學文華殿皆削籍太廟成命太子攝祀二十八年三月行冠禮越二日薨帝命與哀沖太子並建寢園歲時祭祀從諸陵後景恭王載圳世宗第四子嘉靖十八年册立太子同日封穆宗裕王載圳景王其後太子薨廷臣言裕王次當立帝以前太子不永遲之晚信方士語二王皆不得見載圳既與裕王並出邸居處衣服無別載圳年少左右懷窺覬語漸聞中外頗有異論四十年之國德安居四年薨帝謂大學士徐階曰此子素謀奪嫡今死矣初載圳之藩多請莊田部議給之荊州沙市不在請中中使責市租知府徐學謨執不與又取薪稅於漢陽之劉家塥推官吳宗周持之皆獲譴其他土田湖陂侵入者數萬頃王無子歸葬西山妃妾皆還居京邸封除潁殤王載世宗第五子生未踰月殤戚懷王載世宗第六子薊哀王載世宗第七子均思王載世宗第八子三王俱未踰歲殤追加封諡穆宗四子李皇后生憲懷太子翊釴孝定太后生神宗潞王翊鏐其靖王翊鈴母氏無考憲懷太子翊釴穆宗長子生五歲殤贈裕世子隆慶元年追諡靖悼王翊鈴穆宗第二子生未踰年殤贈藍田王隆慶元年追加封諡潞簡王翊鏐穆宗第四子隆慶二年生生四歲而封萬曆十七年之藩衛輝初翊鏐以帝母弟居京邸王店王莊遍畿內比之藩悉以還官遂以內臣司之皇店皇莊自此益侈翊鏐居藩多請贍田食鹽無不應者其後福藩遂緣為故事明初親王歲祿外量給草場牧地間有以廢壤河灘請者多不及千頃部臣得執奏不盡從也景王就藩時賜豫概裁省楚地曠多間田詔悉豫之景藩除潞得景故籍田多至四萬頃部臣無以難至福王常洵之國版籍更定民力益絀尺寸皆奪之民間海內騷然論者推原事始頗以翊鏐為口實云翊鏐好文性勤飭以歲入輸之朝助工助邊無所惜帝益善之四十二年皇太后哀問至翊鏐悲慟廢寢食未幾薨世子常淓幼母妃李氏理藩事時福王奏請輒取中旨帝於王妃奏亦從中下示無異同部臣言王妃奏陳四事如軍校月糧之當給發義和店之預防侵奪義所當許至歲祿之欲先給王莊之欲更設則不當許且於王無絲豪益徒令邸中人日魚肉小民飽私囊將來本支千億請索日頻盡天府之版章給王邸而不足也不報四十六年常淓嗣崇禎中流賊擾秦晉河北常淓疏告急言衛輝城卑土惡請選護衛三千人助守捐歲入萬金資餉不煩司農朝廷嘉之盜發王妃冢常淓上言賊延蔓漸及江北鳳泗陵寢可虞宜早行剿滅時諸藩中能急國難者惟周潞二王云後賊中州常淓流寓於杭順治二年六月降於我大清神宗八子王太后生光宗鄭貴妃生福王常洵沅王常治周端妃生瑞王常浩李貴妃生惠王常潤桂王常瀛其邠王常永思王常溥母氏無考邠哀王常神宗第二子生一歲殤福恭王常洵神宗第三子初王皇后無子王妃生長子是為光宗常洵次之母鄭貴妃最幸帝久不立太子中外疑貴妃謀立己子交章言其事竄謫相踵而言者不止帝深厭苦之二十九年始立光宗為太子而封常洵福王婚費至三十萬營洛陽邸第至二十八萬十倍常制廷臣請王之藩者數十百奏不報至四十二年始令就藩先是海內全盛帝所遣稅使礦使遍天下月有進奉明珠異寶文毳錦綺山積他搜括贏羡億萬計至是多以資常洵臨行出宮門召還數四期以三歲一入朝下詔賜莊田四萬頃所司力爭常洵亦奏辭得減半中州腴土不足取山東湖廣田益之又奏乞故大學士張居正所沒産及江都至太平沿江荻洲雜稅並四川鹽井榷茶銀以自益伴讀承奉諸官假履畝為名乘傳出入河南北齊楚間所至騷動又請淮鹽千三百引設店洛陽與民市中使至淮揚支鹽乾沒要求輒數倍而中州舊食河東鹽以改食淮鹽故禁非王肆所出不得鬻河東引遏不行邊餉由此絀廷臣請改給王鹽於河東且無與民市弗聽帝深居久羣臣章奏率不省獨福藩使通籍中左門一日數請朝上夕報可四方姦人亡命探風旨走利如騖如是者終萬曆之世及崇禎時常洵地近屬尊朝廷尊禮之常洵日閉閣飲醇酒所好惟婦女倡樂秦中流賊起河南大旱蝗人相食民間藉藉謂先帝耗天下以肥王洛陽富於大內援兵過洛者喧言王府金錢百萬而令吾輩枵腹死賊手南京兵部尚書呂維祺方家居聞之懼以利害告常洵不為意十三年冬李自成連陷永寧宜陽明年正月參政王胤昌帥衆警備總兵官王紹禹副將劉見義羅泰各引兵至常洵召三將入賜宴加禮越數日賊大至攻城常洵出千金募勇士縋而出用矛入賊營賊稍却夜半紹禹親軍從城上呼賊相笑語揮刀殺守堞者燒城樓開北門納賊常洵縋城出匿迎恩寺翌日賊迹而執之遂遇害兩承奉伏尸哭賊捽之去承奉呼曰王死某不願生乞一棺收王骨粉無所恨賊義而許之桐棺一寸載以斷車兩人即其旁自縊死王妃鄒氏及世子由嵩走懷慶賊火王宮三日不絶事聞帝震悼輟朝三日令河南有司改殯十六年秋七月由嵩襲封帝親擇宮中寶玉帶賜之明年三月京師失守由嵩與潞王常淓俱避賊至淮安四月鳳陽總督馬士英等迎由嵩入南京五月庚寅稱監國以兵部尚書史可法戶部尚書高弘圖及士英俱為大學士士英仍督鳳陽軍務壬寅自立於南京偽號弘光史可法督師江北召士英入分淮揚鳳廬為四鎮以總兵官黃得功劉良佐劉澤清高傑領之由嵩性暗弱湛於酒色聲伎委任士英及士英黨阮大鋮擢至兵部尚書巡閲江防二人日以鬻官爵報私憾為事事詳諸臣傳中未幾有王之明者詐稱莊烈帝太子下之獄又有婦童氏自稱由嵩妃亦下獄於是中外譁然明年三月寧南侯左良玉舉兵武昌以救太子誅士英為名順流東下阮大鋮黃得功等帥師禦之而我大清兵以是年五月己丑渡江辛卯夜由嵩走太平蓋趨得功軍也壬辰士英挾由嵩母妃奔杭州癸巳由嵩至蕪湖丙申大兵至南京城北文武官出降丙午執由嵩至南京九月甲寅以歸京師沅懷王常治神宗第四子生一歲殤瑞王常浩神宗第五子初太子未立有三王並封之旨蓋謂光宗福王及常浩也尋以羣臣爭遂寢二十九年東宮立與福惠桂三王同日封常洵以長先之藩常浩年已二十有五尚未選婚羣臣交章言率不報而日索部帑為婚費贏十八萬藏宮中且言冠服不能備天啓七年之藩漢中崇禎時流寇劇封地當賊衝七年上書言臣託先帝骨肉獲奉西藩未期年而寇至比西賊再渡河闌入漢興破洵陽逼興安紫陽平利白河相繼陷沒督臣洪承疇單騎裹甲出入萬山賊始敗遁臣捐犒軍振飢銀七千餘兩此時撫臣練國事移兵商洛按臣范復粹馳赴漢中近境稍寧既而鳳縣再陷蜀賊入秦州楚賊上興安六月遂犯郡界幸諸將憑江力拒賊力稍退臣在萬山絶谷中賊四面至覆亡無日臣肺腑至親藩封最僻而於寇盜至迫惟陛下哀憐常浩在宮中衣服禮秩降等好佛不近女色及寇逼秦中將吏不能救乞師於蜀總兵官侯良柱援之遂奔重慶隴西士大夫多挈家以從十七年張獻忠陷重慶被執遇害時天無雲而雷者三從死者甚衆惠王常潤神宗第六子福王之藩內廷蓄積為空中官藉諸王冠婚索部帑以實宮中所需輒數十萬珠寶稱是戶部不能給常潤與弟常瀛年二十皆未選婚其後兵事亟始減殺成禮天啓七年之藩荊州崇禎十五年十二月李自成再破夷陵荊門常潤走湘潭自成入荊州據之常潤之渡湘也遇風於陵陽磯宮人多漂沒身僅以免就吉王於長沙十六年八月張獻忠陷長沙常潤走衡州就桂王衡州繼陷與吉王桂王走永州巡按御史劉熙祚遣人護三王入廣西以身當賊永州陷熙祚死之桂端王常瀛神宗第七子天啓七年之藩衡州崇禎十六年衡州陷與吉惠二王同走廣西居梧州大清順治二年大兵平江南福王就擒在籍尚書陳子壯等將奉常瀛監國會唐王自立於福建遂寢是年薨於蒼梧世子已先卒次子安仁王由亦未幾卒次由榔崇禎時封永明王三年八月大兵取汀州執唐王聿鍵於是兩廣總督丁魁楚廣西巡撫瞿式耜巡按王化澄與舊臣呂大器等共推由榔監國母妃王氏曰吾兒不勝此願更擇可者魁楚等意益堅合謀迎於梧十月十四日監國肇慶以魁楚大器式耜為大學士餘授官有差是月大兵取贛州內侍王坤倉卒奉由榔仍走梧州式耜等力爭乃回肇慶十一月唐王弟聿自閩浮海至粵時閩舊臣蘇觀生撤兵奔廣州與布政使顧元鏡總兵官林察等謀立聿偽號紹武與由榔相拒是月由榔亦自立於肇慶偽號永曆遣兵部侍郎林佳鼎討聿會大兵由福建取廣州執聿觀生自縊祭酒梁朝鍾太僕卿霍子衡等俱死肇慶大震王坤復奉由榔走梧州明年二月由平樂潯州走桂林魁楚棄由榔走岑溪降於大軍既而平樂不守由榔大恐會武岡總兵官劉承胤以兵至全州王坤請赴之式耜力諫不聽乃以式耜及總兵官焦璉留守桂林封陳邦傳為思恩侯守昭平遂趨承胤軍中三月封承胤安國公錦衣指揮馬吉翔等為伯承胤挾由榔歸武岡改曰奉天府政事皆決焉是時長沙衡永皆不守湖廣總督何騰蛟與侍郎嚴起走白牙市六月由榔遣官召騰蛟至密使除承胤顧承胤勢盛騰蛟復還白牙大兵由寶慶趨武岡馬吉翔等挾由榔走靖州承胤舉城降由榔又奔柳州道出古泥總兵官侯性太監龐天壽帥舟師來迎會天雨飢餓性供帳甚備九月土舍覃鳴珂作亂大掠城中矢及由榔舟先是大兵趨桂林焦璉拒守甚力又廣州有警大兵東向桂林稍安既而湖南十三鎮將郝永忠盧鼎等俱奔赴桂林騰蛟亦至與式耜議分地給諸將使各自為守璉已先復陽朔平樂陳邦傳復潯州合兵復梧州廣西全省略定十二月由榔返桂林五年二月大兵至靈川郝永忠潰於興安奔還挾由榔走柳州大兵攻桂林式耜騰蛟拒戰時南昌金聲桓等叛降於由榔八月由榔至肇慶六年春大兵下湘潭何騰蛟死明年由榔走梧州是年十二月大兵入桂林瞿式耜及總督張同敞死焉由榔聞報大懼自梧州奔南寧時孫可望已據滇黔受封為秦王八年三月遣兵來衛殺嚴起等九年二月可望迎由榔入安隆所改曰安龍府久之日益窮促聞李定國與可望有隙遣使密召定國以兵來迎馬吉翔黨於可望偵知之大學士吳貞育以下十餘人皆被殺事詳貞育傳後二年李定國敗於新會將由安隆入滇可望患之促由榔移貴陽就己由榔故遲行定國至遂奉由榔由安南衛走雲南居可望署中封定國晉王可望以妻子在滇未敢動明年由榔送其妻子還黔遂舉兵與定國戰於三岔可望將白文選單騎奔定國軍可望敗挈妻子赴長沙大軍前降十五年三月大兵三路入雲南定國厄雞公背斷貴州道別將守七星關抵生界立營以牽蜀師大兵出遵義由水西取烏撒守將棄關走李定國連敗於安隆由榔走永昌明年正月三日大兵入雲南由榔走騰越定國敗於潞江又走南甸二十六日抵囊木河是為緬境緬勒從官盡棄兵仗始啓關至蠻莫二月緬以四舟來迎從官自覓舟隨行者六百四十餘人陸行者自故岷王子而下九百餘人期會於緬甸十八日至井亘黔國公沐天波等謀奉由榔走戶獵二河不果五月四日緬復以舟來迎明日發井亘行三日至阿瓦阿瓦者緬酋所居城也又五日至赭硜陸行者緬人悉掠為奴多自殺惟岷王子八十餘人流入暹羅緬人於赭硜置草屋居由榔遣兵防之十七年定國文選與緬戰索其主連敗緬兵緬終不肯出由榔十八年五月緬酋弟莽猛白代立紿從官渡河盟既至以兵圍之殺沐天波馬吉翔王維恭魏豹等四十有二人詳任國璽傳存者由榔與其屬二十五人十二月大兵臨緬白文選自木邦降定國走景線緬人以由榔父子送軍前明年四月死於雲南六月李定國卒其子嗣興等降永思王常溥神宗第八子生二歲殤光宗七子王太后生熹宗簡王由㰒王選侍生齊王由楫李選侍生懷王由模劉太后生莊烈皇帝定懿妃生湘王由栩敬妃生惠王由橏簡懷王由㰒光宗第二子生四歲殤齊思王由楫光宗第三子生八歲殤懷惠王由模光宗第四子生五歲殤湘懷王由栩光宗第六子惠昭王由橏光宗第七子俱早殤五王皆追加封諡熹宗三子懷沖太子慈然不詳其所生母皇貴妃范氏生悼懷太子慈焴容妃任氏生獻懷太子慈炅懷沖太子慈然熹宗第一子悼懷太子慈焴熹宗第二子獻懷太子慈炅熹宗第三子與懷沖悼懷皆殤莊烈帝七子周皇后生太子慈烺懷隱王慈烜定王慈炯田貴妃生永王慈照悼靈王慈煥悼懷王及皇七子太子慈烺莊烈帝第一子崇禎二年二月生三年二月立為皇太子十年預擇東宮侍班講讀官命禮部尚書薑逢元詹事姚明恭少詹王鐸屈可伸侍班禮部侍郎方逢年諭德項煜修撰劉理順編修吳偉業楊廷麟林曾志講讀編修胡守楊士聰校書十一年二月太子出閣十五年正月開講閣臣條上講儀七月改慈慶宮為端本宮慈慶懿安皇后所居也時太子年十四議明歲選婚故先為置宮而移懿安后於仁壽殿既而以寇警暫停京師陷賊獲太子偽封宋王及賊敗西走太子不知所終由嵩時有自北來稱太子者驗之以為駙馬都尉王昺孫王之明者偽為之繫獄中南京士民譁然不平袁繼咸及劉良佐黃得功輩皆上疏爭左良玉起兵亦以救太子為名一時真偽莫能知也由嵩既奔太平南京亂兵擁王之明立之越五日降於我大清懷隱王慈烜莊烈帝第二子殤定王慈炯莊烈帝第三子崇禎十四年六月諭禮臣朕第三子年已十齡敬遵祖制宜加王號但既受册封必具冕服而會典開載年十二或十五始行冠禮十齡受封加冠二禮可並行乎於是禮臣歷考經傳及本朝典故以奏定於是歲册封越二年行冠禮九月封為定王十一月選新進士為檢討國子助教等官為待詔充王講讀官以兩殿中書充侍書十七年京師陷不知所終永王慈照莊烈帝第四子崇禎十五年三月封永王賊陷京師不知所終悼靈王慈煥莊烈帝第五子生五歲而病帝視之忽云九蓮菩薩言帝待外戚薄將盡殤諸子遂薨九蓮菩薩者神宗母孝定李太后也太后好佛宮中像作九蓮座故云帝念王靈異封為孺孝悼靈王玄機慈應真君命禮臣議孝和皇太后莊妃懿妃道號禮科給事中李焻言諸后妃祀奉先殿不可崇邪教以亂徽稱不聽十六年十二月改封宣顯慈應悼靈王去真君號悼懷王莊烈帝第六子生二歲殤第七子生三歲殤名俱無考贊曰有明諸藩分封而不錫土列爵而不臨民食祿而不治事蓋矯枉鑒覆所以杜漢晉末大之禍意固善矣然徒擁虛名坐縻厚祿賢才不克自見知勇無所設施防間過峻法制日增出城省墓請而後許二王不得相見藩禁嚴密一至於此當太祖時宗藩備邊軍戎受制贊儀疏屬且令遍歷各國使通親親然則法網之繁起自中葉豈太祖衆建屏藩初計哉
