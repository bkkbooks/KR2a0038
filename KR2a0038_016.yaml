body:
  text: 明史卷十六本紀第十六武宗武宗承天達道英肅睿哲昭德顯功弘文思孝毅皇帝諱厚照孝宗長子也母孝康敬皇后弘治五年立為皇太子性聰穎好騎射十八年五月孝宗崩壬寅即皇帝位以明年為正德元年大赦天下除弘治十六年以前逋賦戊申小王子犯宣府總兵官張俊敗績庚戌太監苗逵監督軍務保國公朱暉為征虜將軍充總兵官右都御史史琳提督軍務禦之秋八月甲寅尊皇太后為太皇太后皇后為皇太后丙子召朱暉等還九月甲午南京地震丁酉振陝西飢冬十月丙辰小王子犯甘肅庚午葬敬皇帝於泰陵十一月甲申御文華殿日講是年占城安南入貢正德元年春正月乙酉享太廟己丑大祀天地於南郊二月壬子御經筵乙丑耕藉田三月甲申釋奠於先師孔子夏五月丙申減蘇杭織造歲幣六月辛酉禁吏民奢靡免陝西被災稅糧是日大風雨壞郊壇獸瓦庚午諭羣臣修省秋八月乙卯復遣內官南京織造戊午立皇后夏氏冬十月丁巳戶部尚書韓文帥廷臣請誅亂政內臣馬永成等八人大學士劉健李東陽謝遷主之戊午韓文等再請不聽以劉瑾掌司禮監丘聚谷大用提督東西廠張永督十二團營兼神機營魏彬督三千營各據要地劉健李東陽謝遷乞去健遷是日致仕己未東陽復乞去不允壬戌吏部尚書焦芳兼文淵閣大學士吏部侍郎王鏊兼翰林學士入閣預機務戊辰停日講十一月甲辰罷韓文十二月丁巳命錦衣衛官點閲給事中癸酉除曲阜孔氏田賦是年哈密烏斯藏入貢二年春正月乙亥朔日有食之乙酉大祀天地於南郊閏月庚戌杖給事中艾洪呂翀劉及南京給事中戴銑御史薄彥徽等二十一人於闕下二月戊戌杖御史王良臣於午門御史王時中荷校於都察院三月辛未以大學士劉健謝遷尚書韓文楊守隨張敷華林瀚五十三人黨比宣戒羣臣是月敕各鎮守太監預刑名政事夏五月戊午度僧道四萬人己巳復寧王宸濠護衛六月甲戌孝宗神主祔太廟戊寅罷修邊垣輸其費於京師秋八月丙戌作豹房冬十月甲申逮各邊巡撫都御史及管糧郎中下獄丙戌南京戶部尚書楊廷和為文淵閣大學士預機務十二月壬辰開浙江福建四川銀礦是年琉球入貢三年春正月丁未大祀天地於南郊辛亥大計外吏中旨罷翰林學士吳儼御史楊南金二月己巳令京官告假違限及病滿一年者皆致仕三月乙卯賜呂柟等進士及第出身有差夏四月乙亥軍民納銀得授都指揮僉事以下官六月壬辰得匿名文書於御道跪羣臣奉天門外詰之下三百餘人於錦衣衛獄尋釋之秋七月壬子命天下選樂工送京師八月辛巳立內廠劉瑾領之庚寅下韓文錦衣衛獄罰輸米千石於大同是月山東盜起九月癸卯削致仕尚書雍泰馬文升許進劉大夏籍辛酉逮劉大夏下獄戍肅州癸亥振南京飢冬十月辛未南京工部侍郎畢亨振湖廣河南飢十一月乙未振鳳陽諸府飢是年安南哈密撒馬兒罕烏斯藏入貢四年春正月丙午大祀天地於南郊二月丙戌削劉健謝遷籍三月甲辰振浙江飢己酉吏部侍郎張綵請不時考察京官從之夏四月乙亥王鏊致仕六月戊子吏部尚書劉宇兼文淵閣大學士預機務秋八月辛酉遣使核各邊屯田是月義州軍變閏九月小王子犯延綏圍總兵官吳江於隴州城冬十一月甲子犯花馬池總制尚書才寬戰死十二月庚戌奪劉健謝遷等六百七十五人誥敕是年兩廣江西湖廣陝西四川並盜起琉球安南哈密土魯番撒馬兒罕入貢五年春正月丁卯大祀天地於南郊庚辰籍故尚書秦紘家二月癸巳兵部尚書曹元為吏部尚書兼文淵閣大學士預機務三月辛未禱雨釋獄囚免正德三年逋賦乙酉江西賊熾右都御史王哲巡視南贛刑部尚書洪鍾總制川陝河南鄖陽軍務兼振恤湖廣夏四月庚寅安化王置鐇反殺巡撫都御史安惟學總兵官薑漢丙午起右都御史楊一清總制寧夏延綏甘涼軍務涇陽伯神英充總兵官討置鐇辛亥詔赦天下太監張永總督寧夏軍務是日遊擊將軍仇鉞襲執置鐇寧夏平五月癸未焦芳致仕六月庚子帝自號大慶法王所司鑄印以進丙午劉宇罷秋七月壬申洪鍾討沔陽賊平之八月甲午劉瑾以謀反下獄詔自正德二年後所更政令悉如舊戊戌治劉瑾黨吏部尚書張綵下獄己亥曹元罷丁未革寧王護衛戊申劉瑾伏誅己酉釋謫戍諸臣九月丙辰論平置鐇功封仇鉞咸寧伯戊午吏部尚書劉忠梁儲並兼文淵閣大學士預機務己未以平置鐇劉瑾功封太監張永兄富弟容皆為伯癸酉封義子指揮同知朱德太監谷大用兄大寬馬永成兄山魏彬弟英皆為伯冬十月己亥戮張綵尸於市十二月己丑賊陷江津僉事吳景死之是年日本占城哈密撒馬兒罕土魯番烏斯藏入貢六年春正月甲子大祀天地於南郊癸酉賊陷營山殺僉事王源二月丙申置鐇伏誅己酉起左都御史陳金總制江西軍務討賊三月戊辰賜楊慎等進士及第出身有差庚午惠安伯張偉充總兵官右都御史馬中錫提督軍務討直隸河南山東賊丙子免被寇州縣稅糧一年是月小王子入河套犯沿邊諸堡夏四月癸未劉忠乞省墓歸是月淮安盜起六月山西盜起秋七月壬申賊犯文安京師戒嚴癸酉調宣府延綏兵入援八月己卯兵部侍郎陸完將邊軍討賊四川巡撫都御史林俊擒斬賊首藍廷瑞鄢本恕甲申賊劉六犯固安丙戌召張偉馬中錫還九月丙寅再調宣府及遼東兵益陸完軍冬十月癸未賊陷長山典史李暹戰死甲申賊焚糧艘於濟寧州丁酉甘州副總兵白琮敗小王子於柴溝十一月庚戌太監谷大用張忠伏羌伯毛鋭帥京軍會陸完討賊丙辰戶部侍郎叢蘭王瓊振兩畿河南山東戊午京師地震辛酉敕修省乙亥瘞暴骨十二月癸巳禮部尚書費宏兼文淵閣大學士預機務甲午清河口至柳鋪黃河清三日辛丑賊掠蒼溪兵備副使馮傑敗死是年自畿輔迄江淮楚蜀盜賊殺官吏山東尤甚至破九十餘城道路梗絶琉球哈密入貢七年春正月甲寅賊犯霸州京師戒嚴丁巳陷大城知縣張汝舟主簿李銓戰死己未大祀天地於南郊二月丁丑副都御史彭澤咸寧伯仇鉞提督軍務太監陸誾監軍討河南賊己卯賊犯萊州指揮僉事蔡顯等力戰死三月辛未副總兵時源敗績於河南都督僉事馮禎力戰死夏五月丙午陸完敗賊於萊州山東賊平甲寅左都御史陳金討平撫州賊丙寅賊殺副都御史馬炳然於武昌江中閏月壬辰仇鉞敗賊於光山河南賊平秋七月癸巳江西賊殺副使周憲於華林丁酉振四川飢八月癸亥陸完追殲劉七等賊於狼山九月乙酉陳金討平華林賊戊子召洪鍾還都御史彭澤總制四川軍務丙申賜義子一百二十七人國姓冬十月免河南江西浙江被災寇者稅糧十一月壬申時源為平賊將軍會彭澤討四川賊丁亥留大同宣府遼東兵於京營李東陽諫不聽十二月丁卯李東陽致仕是月免兩畿山東山西陝西被災寇者稅糧是年安南日本哈密入貢八年春正月癸酉右副都御史俞諫代陳金討江西賊壬午大祀天地於南郊乙酉以邊將江彬許泰分領京營賜國姓尋設兩官廳軍命彬泰分領之癸巳戶部侍郎叢蘭僉都御史陳玉巡邊二月丙午以平賊功封太監谷大用弟大亮陸誾姪永皆為伯三月戊子置鎮國府處宣府官軍甲午以旱敕羣臣修省夏四月乙丑彭澤破賊於劍州五月辛巳仇鉞充總兵官帥京營兵禦敵於大同六月戊戌河決黃陵岡乙卯俞諫破賊於貴溪秋八月免南畿水災稅糧土魯番襲據哈密冬十月丁未俞諫連破賊於東鄉江西賊平十二月南京刑部侍郎鄧璋振江西飢是年哈密入貢九年春正月丁丑大祀天地於南郊庚辰乾清宮災二月庚子帝始微行丙午禮部尚書靳貴兼文淵閣大學士預機務癸丑彭澤時源討平四川賊三月辛巳賜唐皋等進士及第出身有差夏四月丁酉復寧王護衛豫屯田五月乙丑費宏致仕己丑彭澤總督甘肅軍務經理哈密六月乙卯開雲南銀礦秋七月乙丑小王子犯宣府大同太監張永提督軍務都督白玉充總兵官帥京營兵禦之八月辛卯朔日有食之辛丑小王子犯白羊口乙巳京師地震己未小王子入寧武關掠欣州定襄寧化九月壬戌犯宣府蔚州庚午帝狎虎被傷不視朝編修王思以諫謫饒平驛丞冬十月己酉遣使採木於川湖十一月辛酉廢歸善王當沍為庶人自殺十二月甲寅建乾清宮加天下賦一百萬是年安南哈密烏斯藏入貢十年春正月癸亥薄暮享太廟戊辰薄暮祀天地於南郊三月壬申楊廷和以憂去夏閏四月辛酉吏部尚書楊一清兼武英殿大學士預機務戊寅召彭澤還秋八月丙寅小王子犯固原冬十二月癸丑朔日有食之己卯免南畿旱災秋糧是年琉球安南哈密撒馬兒罕入貢十一年春正月乙未大祀天地於南郊夏四月振河南飢五月庚寅土魯番以哈密來歸甲辰録自宮男子三千四百餘人充海戶是月振陝西飢秋七月乙未小王子犯薊州白羊口太監張忠監督軍務左都督劉暉充總兵官帥東西官廳軍禦之丙午工部侍郎趙璜俞琳飭畿內武備八月丁巳左都御史彭澤成國公朱輔帥京營兵防邊庚申賜宛平縣被寇者人米二石甲子楊一清致仕丁丑禮部尚書蔣冕兼文淵閣大學士預機務九月土魯番復據哈密侵肅州殺遊擊芮寧冬十月己酉朔享太廟遣使代行禮十一月甲申免湖廣被災稅糧是年琉球天方入貢十二年春正月己丑大祀天地於南郊遂獵於南海子夜中還御奉天殿受朝賀三月癸巳賜舒芬等進士及第出身有差戊戌以兩淮浙江四川河東鹽課充陝西織造夏四月壬子靳貴致仕丙辰副總兵鄭廉敗土魯番於瓜州五月丙子禮部尚書毛紀兼東閣大學士預機務六月乙巳朔日有食之秋八月甲辰微服如昌平乙巳梁儲蔣冕毛紀追及於沙河請回蹕不聽己酉至居庸關巡關御史張欽閉關拒命乃還丙辰至自昌平戊午夜視朝癸亥副都御史吳廷舉振湖廣飢丙寅夜微服出德勝門如居庸關辛未出關幸宣府命谷大用守關毋出京朝官九月辛卯河決城武壬辰如陽和自稱總督軍務威武大將軍總兵官庚子輸帑銀一百萬兩於宣府冬十月癸卯駐蹕順聖川甲辰小王子犯陽和掠應州丁未親督諸軍禦之戰五日辛亥寇引去駐蹕大同十一月丁亥召楊廷和復入閣戊子還至宣府十二月癸亥羣臣赴行在請還宮不得出關而還閏月丁亥迎春於宣府是年琉球烏斯藏入貢十三年春正月辛丑朔帝在宣府丙午至自宣府命羣臣具綵帳羊酒郊迎御帳殿受賀丁未罷南郊致齋庚戌大祀天地於南郊遂獵於南海子辛亥還宮辛酉復如宣府是月振兩畿山東水災給京師流民米人三斗瘞死者二月己卯太皇太后崩壬午至自宣府三月戊辰如昌平夏四月己巳朔謁六陵遂幸密雲五月己亥朔日有食之駐蹕喜峯口戊申至自喜峯口六月庚辰太皇太后梓宮發京師帝戎服從甲申葬孝貞純皇后乙酉至自昌平秋七月己亥録應州功廕升賞者五萬餘人丙午復如宣府八月乙酉如大同九月庚子次偏頭關癸丑敕曰總督軍務威武大將軍總兵官朱壽親統六師肅清邊境特加封鎮國公歲支祿米五千石吏部如敕奉行甲寅封朱彬為平虜伯朱泰為安邊伯冬十月戊辰渡河己卯次榆林十一月庚子調西官廳及四衛營兵赴宣大壬子次綏德幸總兵官戴欽第十二月戊寅渡河幸石州戊子次太原是年琉球天方瓦剌入貢十四年春正月丙申朔帝在太原甲辰改卜郊壬子還宣府二月壬申至自宣府丁丑大祀天地於南郊遂獵於南海子是日京師地震己丑帝自加太師諭禮部曰總督軍務威武大將軍總兵官太師鎮國公朱壽將巡兩畿山東祀神祈福其具儀以聞三月癸丑以諫巡幸下兵部郎中黃鞏六人於錦衣衛獄跪修撰舒芬百有七人於午門五日金吾衛都指揮僉事張英自刃以諫衛士奪刃得不死鞫治杖殺之乙卯下寺正周行人司副余廷瓚主事林大輅三十三人於錦衣衛獄戊午杖舒芬等百有七人於闕下是日風霾晝晦夏四月甲子免南畿被災稅糧戊寅杖黃鞏等三十九人於闕下先後死者十一人五月己亥詔山東山西陝西河南湖廣流民歸業者官給廩食廬舍牛種復五年六月丙子寧王宸濠反巡撫江西右副都御史孫燧南昌兵備副使許逵死之戊寅陷南康己卯陷九江秋七月甲辰帝自將討宸濠安邊伯朱泰為威武副將軍帥師為先鋒丙午宸濠犯安慶都指揮楊鋭知府張文錦禦却之辛亥提督南贛汀漳軍務副都御史王守仁帥兵復南昌丁巳守仁敗宸濠於樵舍擒之八月癸未車駕發京師丁亥次涿州王守仁捷奏至祕不發冬十一月乙巳漁於清江浦壬子冬至受賀於太監張陽第十二月辛酉次揚州乙酉渡江丙戌至南京是歲淮揚飢人相食撒馬兒罕入貢十五年春正月庚寅朔帝在南京癸巳改卜郊夏四月己未振淮揚諸府飢六月丁巳次牛首山諸軍夜驚秋七月小王子犯大同宣府八月癸未免江西稅糧閏月癸巳受江西俘丁酉發南京癸卯次鎮江幸大學士楊一清第臨故大學士靳貴喪九月己巳漁於積水池舟覆救免遂不豫冬十月庚戌次通州十一月庚申治交通宸濠者罪執吏部尚書陸完赴行在十二月己丑宸濠伏誅甲午還京師告捷於郊廟社稷丁酉大祀天地於南郊初獻疾作不克成禮是年琉球占城佛郎機土魯番入貢十六年春正月癸亥改卜郊二月己亥巡撫雲南副都御史何孟春討平彌勒州苗三月癸丑朔日有食之庚申改西官廳為威武團營乙丑大漸諭司禮監曰朕疾不可為矣其以朕意達皇太后天下事重與閣臣審處之前事皆由朕誤非汝曹所能預也丙寅崩於豹房年三十有一遺詔召興獻王長子嗣位罷威武團營遣還各邊軍革京城內外皇店放豹房番僧及教坊司樂人戊辰頒遺詔於天下釋繫囚還四方所獻婦女停不急工役收宣府行宮金寶還內庫庚午執江彬等下獄世宗入立五月己未上尊諡廟號武宗葬康陵贊曰明自正統以來國勢寖弱毅皇手除逆瑾躬禦邊寇奮然欲以武功自雄然耽樂嬉遊昵近羣小至自署官號冠履之分蕩然矣猶幸用人之柄躬自操持而秉鈞諸臣補苴匡救是以朝綱紊亂而不底於危亡假使承孝宗之遺澤制節謹度有中主之操則國泰而名完豈至重後人之訾議哉
