body:
  text: 明史卷八十一志第五十七食貨五錢鈔坑冶附鐵冶銅場商稅市舶馬市錢幣之興自九府圜法歷代遵用鈔始於唐之飛錢宋之交會金之交鈔元世始終用鈔錢幾廢矣太祖初置寶源局於應天鑄大中通寶錢與歷代錢兼行以四百文為一貫四十文為一兩四文為一錢及平陳友諒命江西行省置貨泉局頒大中通寶錢大小五等錢式即位頒洪武通寶錢其制凡五等曰當十當五當三當二當一當十錢重一兩餘遞降至重一錢止各行省皆設寶泉局與寶源局並鑄而嚴私鑄之禁洪武四年改鑄大中洪武通寶大錢為小錢初寶源局錢鑄京字於背後多不鑄民間無京字者不行故改鑄小錢以便之尋令私鑄錢作廢銅送官償以錢是時有司責民出銅民毀器皿輸官頗以為苦而商賈沿元之舊習用鈔多不便用錢七年帝乃設寶鈔提舉司明年始詔中書省造大明寶鈔命民間通行以桑穰為料其制方高一尺廣六寸質青色外為龍文花欄橫題其額曰大明通行寶鈔其內上兩旁復為篆文八字曰大明寶鈔天下通行中圖錢貫十串為一貫其下云中書省奏準印造大明寶鈔與銅錢通行使用偽造者斬告捕者賞銀二十五兩仍給犯人財産若五百文則畫錢文為五串餘如其制而遞減之其等凡六曰一貫曰五百文四百文三百文二百文一百文每鈔一貫準錢千文銀一兩四貫準黃金一兩禁民間不得以金銀物貨交易違者罪之以金銀易鈔者聽遂罷寶源寶泉局越二年復設寶泉局鑄小錢與鈔兼行百文以下止用錢商稅兼收錢鈔錢三鈔七十三年以鈔用久昏爛立倒鈔法令所在置行用庫許軍民商賈以昏鈔納庫易新鈔量收工墨直會中書省廢乃以造鈔屬戶部鑄錢屬工部而改寶鈔文中書省為戶部與舊鈔兼行十六年置戶部寶鈔廣源庫廣惠庫入則廣源掌之出則廣惠掌之在外衛所軍士月鹽皆給鈔各鹽場給工本鈔十八年天下有司官祿米皆給鈔二貫五百文準米一石二十二年詔更定錢式生銅一斤鑄小錢百六十折二錢半之當三至當十準是為差更造小鈔自十文至五十文二十四年諭榷稅官吏凡鈔有字貫可辨者不問爛損即收受解京抑勒與偽充者罪之二十五年設寶鈔行用庫於東市凡三庫各給鈔三萬錠為鈔本倒收舊鈔送內府令大明寶鈔與歷代錢兼行鈔一貫準錢千文提舉司於三月內印造十月內止所造鈔送內府充賞賚明年罷行用庫又罷寶泉局時兩浙江西閩廣民重錢輕鈔有以錢百六十文折鈔一貫者由是物價翔貴而鈔法益壞不行三十年乃更申交易用金銀之禁成祖初犯者以姦惡諭惟置造首飾器皿不在禁例永樂二年詔犯者免死徙家戍興州陝西都司僉事張豫坐抵易官鈔論戍江夏民父死以銀營葬具當戍邊帝以其迫於治葬非玩法特矜宥之都御史陳瑛言比歲鈔法不通皆緣朝廷出鈔太多收斂無法以致物重鈔輕莫若暫行戶口食鹽法天下人民不下千萬戶官軍不下二百萬家誠令計口納鈔食鹽可收五千餘萬錠帝令戶部會羣臣議大口月食鹽一斤納鈔一貫小口半之從其議設北京寶鈔提舉司稅糧課程贓罰俱折收鈔其直視洪武初減十之九後又令鹽官納舊鈔支鹽發南京抽分場積薪龍江提舉司竹木鬻之軍民收其鈔應天歲辦蘆柴徵鈔十之八帝初即位戶部尚書夏原吉請更鈔板篆文為永樂帝命仍其舊自後終明世皆用洪武年號云仁宗監國令犯笞杖者輸鈔及即位以鈔不行詢原吉原吉言鈔多則輕少則重民間鈔不行緣散多斂少宜為法斂之請市肆門攤諸稅度量輕重加其課程鈔入官官取昏軟者悉燬之自今官鈔宜少出民間得鈔難則自然重矣乃下令曰所增門攤課程鈔法通即復舊金銀布帛交易者亦暫禁止然是時民卒輕鈔至宣德初米一石用鈔五十貫乃弛布帛米麥交易之禁凡以金銀交易及匿貨增直者罰鈔府縣衛所倉糧積至十年以上者鹽糧悉收鈔秋糧亦折鈔三分門攤課鈔增五倍塌房店舍月納鈔五百貫果園吂月馬凡車並令納鈔戶部言民間交易惟用金銀鈔滯不行乃益嚴其禁交易用銀一錢者罰鈔千貫贓吏受銀一兩者追鈔萬貫更追免罪鈔如之英宗即位收賦有米麥折銀之令遂減諸納鈔者而以米銀錢當鈔弛用銀之禁朝野率皆用銀其小者乃用錢惟折官俸用鈔鈔壅不行十三年復申禁令阻鈔者追一萬貫全家戍邊天順中始弛其禁憲宗令內外課程錢鈔兼收官俸軍餉亦兼支錢鈔是時鈔一貫不能直錢一文而計鈔徵之民則每貫徵銀二分五釐民以大困弘治元年京城稅課司順天山東河南戶口食鹽俱收鈔各鈔關俱錢鈔兼收其後乃皆改折用銀而洪武永樂宣德錢積不用詔發之令與歷代錢兼用戶部請鼓鑄乃復開局鑄錢凡納贖收稅歷代錢制錢各收其半無制錢即收舊錢二以當一制錢者國朝錢也舊制工部所鑄錢入太倉司鑰二庫諸關稅錢亦入司鑰庫共貯錢數千百萬中官掌之京衛軍秋糧取給焉每七百當銀一兩武宗之初部臣請察核侵蝕又以錢當俸糧者僅及銀數三之一請於承運庫給銀時中官方用事皆不聽已而司鑰庫太監龐瑮言自弘治間榷關折銀入承運庫錢鈔缺乏支放不給請遵成化舊制錢鈔兼收從之正德三年以太倉積錢給官俸十分為率錢一銀九又從太監張永言發天財庫及戶部布政司庫錢關給徵收每七十文徵銀一錢且申私鑄之禁嘉靖四年令宣課分司收稅鈔一貫折銀三釐錢七文折銀一分是時鈔久不行錢亦大壅益專用銀矣明初鑄洪武錢成祖九年鑄永樂錢宣德九年鑄宣德錢弘治十六年以後鑄弘治錢至世宗嘉靖六年大鑄嘉靖錢每文重一錢三分且補鑄纍朝未鑄者三十二年鑄洪武至正德九號錢每號百萬錠嘉靖錢千萬錠一錠五千文而稅課抽分諸廠專收嘉靖錢民患錢少乃發內庫新舊錢八千一百萬文折給俸糧又令通行歷代錢有銷新舊錢及以銅造像製器者罪比盜鑄先是民間行濫惡錢率以三四十錢當銀一分後益雜鉛錫薄劣無形製至以六七十文當銀一分翦楮夾其中不可辨用給事中李用敬言以制錢與前代雜錢相兼行上品者俱七文當銀一分餘視錢高下為三等下者二十一文當銀一分私造濫惡錢悉禁不行犯者置之法小錢行久驟革之民頗不便又出內庫錢給文武官俸不論新舊美惡悉以七文折算諸以俸錢市易者亦悉以七文抑勒豫民民亦騷然屬連歲大侵四方流民就食京師死者相枕藉論者謂錢法不通使然於是御史何廷鈺條奏請許民用小錢以六十文當銀一分戶部執不從廷鈺訐奏尚書方鈍及郎中劉爾牧帝怒斥爾牧採廷鈺議命從民便且定嘉靖錢七文洪武諸錢十文前代錢三十文當銀一分然諸濫惡小錢以初禁之嚴雖奉旨間行竟不復用而民間競私鑄嘉靖通寶錢與官錢並行焉給事中殷正茂言兩京銅價大高鑄錢得不償費宜採雲南銅運至嶽州鼓鑄費工本銀三十九萬可得錢六萬五千萬文直銀九十三萬餘兩足以少佐國家之急戶部覆言雲南地僻事簡即山鼓鑄為便乃敕巡撫以鹽課銀二萬兩為工本未幾巡撫王昺言費多入少乞罷鑄帝以小費不當惜仍命行之越數年巡按王諍復言宜罷鑄部議錢法壅滯者由宣課司收稅以七文當一分姦民乘機阻撓錢多則惡濫相欺錢少則增直罔利故禁愈繁而錢愈滯自今準折聽民便不必定文數而課稅及官俸且俱用銀乃罷雲南鑄錢而從戶部議時所鑄錢有金背有火漆有鏇邊議者以鑄錢艱難工匠勞費革鏇車用鑢鐋於是鑄工競雜鉛錫便銼治而輪郭粗糲色澤黯黲姦偽倣效盜鑄日滋金背錢反阻不行死罪日報終不能止帝患之問大學士徐階階陳五害請停寶源局鑄錢應支給錢者悉豫銀帝乃鞫治工匠侵料減工罪而停鼓鑄自後稅課徵銀而不徵錢且民間止用制錢不用古錢而私鑄者多隆慶初錢法不行兵部侍郎談綸言欲富民必重布帛菽粟而賤銀欲賤銀必制錢法以濟銀之不足今錢惟布於天下而不以輸於上故其權在市井請令民得以錢輸官則錢法自通於是課稅銀三兩以下復收錢民間交易一錢以下止許用錢時錢八文折銀一分禁民毋得任意低昂直隸巡按楊家相請鑄大明通寶錢不識年號部議格不行高拱再相言錢法朝議夕更迄無成説小民恐今日得錢而明日不用是以愈更愈亂愈禁愈疑請一從民便勿多為制以亂人耳目帝深然之錢法復稍稍通矣寶鈔不用垂百餘年課程亦鮮有收鈔者惟俸錢獨支鈔如故四年始以新鑄隆慶錢給京官俸云萬曆四年命戶工二部準嘉靖錢式鑄萬曆通寶金背及火漆錢一文重一錢二分五釐又鑄鏇邊錢一文重一錢三分頒行天下俸糧皆銀錢兼給雲南巡按郭庭梧言國初京師有寶源局各省有寶泉局自嘉靖間省局停廢民用告匱滇中産銅不行鼓鑄而反以重價購海草釆非利也遂開局鑄錢尋命十三布政司皆開局採工部言以五銖錢為準用四火黃銅鑄金背二火黃銅鑄火漆粗惡者罪之蓋以費多利少則私鑄自息也久之戶部言錢之輕重不常輕則斂重則散故無壅閼匱乏之患初鑄時金背十文直銀一分今萬曆金背五文嘉靖金背四文各直銀一分火漆鏇邊亦如之僅踰十年而輕重不啻相半錢重而物價騰踴宜發庫貯以平其直從之時王府皆鑄造私錢吏不敢訐古錢阻滯不行國用不足乃命南北寶源局拓地增爐鼓鑄而北錢視南錢昂直三之一南鑄大抵輕薄然各循其舊並行不廢天啓元年鑄泰昌錢兵部尚書王象乾請鑄當十當百當千三等大錢用龍文略倣白金三品之制於是兩京皆鑄大錢後有言大錢之弊者詔兩京停鑄大錢收大錢發局改鑄當是時開局遍天下重課錢息崇禎元年南京鑄本七萬九千餘兩獲息銀三萬九千有奇戶部鑄錢獲息銀二萬六千有奇其所鑄錢皆以五十五文當銀一錢計息取盈工匠之賠補行使之折閲不堪命矣寶泉局銅本四十萬兩舊例錢成還本太倉次年再借至是令永作鑄本三年御史饒京言鑄錢開局本通行天下今乃苦於無息旋開旋罷自南北兩局外僅存湖廣陝西四川雲南及宣密二鎮而所鑄之息不盡歸朝廷復苦無鑄本蓋以買銅而非採銅也乞遵洪武初及永樂九年嘉靖六年例遣官各省鑄錢採銅於産銅之地置官吏駐兵倣銀礦法十取其三銅山之利朝廷擅之小民所採仍豫直以市帝從之是時鑄廠並開用銅益多銅至益少南京戶部尚書鄭三俊請專官買銅戶部議原籍産銅之人駐鎮遠荊常銅鉛會集處所謂採銅於産銅之地也帝俱從之既又採絳孟垣曲聞喜諸州縣銅鉛荊州抽分主事朱大受言荊州上接黔蜀下聯江廣商販銅鉛畢集一年可以四鑄四鑄之息兩倍於南三倍於北因陳便宜四事即命大受專督之遂定錢式每文重一錢每千直銀一兩南都錢輕薄屢旨嚴飭乃定每文重八分初嘉靖錢最工隆萬錢加重半銖自啓禎新鑄出舊錢悉棄置然日以惡薄大半雜鉛砂百不盈寸捽擲輒破碎末年敕鑄當五錢不及鑄而明亡初制歷代錢與制錢通行自神宗初從僉都御史龐尚鵬議古錢止許行民間輸稅贖罪俱用制錢啓禎時廣鑄錢始括古錢以充廢銅民間市易亦擯不用矣莊烈帝初即位御平臺召對給事中黃承昊疏有銷古錢之語大學士劉鴻訓言北方皆用古錢若驟廢之於民不便帝以為然既而以御史王燮言收銷舊錢但行新錢於是古錢銷毀頓盡蓋自隋世盡銷古錢至是凡再見云鈔法自弘正間廢天啓時給事中惠世揚復請造行崇禎末有蔣臣者申其説擢為戶部司務倪元璐方掌部事力主之然終不可行而止坑冶之課金銀銅鐵鉛汞硃砂青緑而金銀礦最為民害徐達下山東近臣請開銀場太祖謂銀場之弊利於官者少損於民者多不可開其後有請開陝州銀礦者帝曰土地所産有時而窮歲課成額徵銀無已言利之臣皆戕民之賊也臨淄丞乞發山海之藏以通寶路帝黜之成祖斥河池民言採礦者仁宣仍世禁止填番禺坑洞罷嵩縣白泥溝發礦然福建尤溪縣銀屏山銀場局爐冶四十二座始於洪武十九年浙江溫處麗水平陽等七縣亦有場局歲課皆二千餘兩永樂間開陝西商縣鳳皇山銀坑八所遣官湖廣貴州採辦金銀課復遣中官御史往核之又開福建浦城縣馬鞍等坑三所設貴州太平溪交址宣光鎮金場局葛容溪銀場局雲南大理銀冶其不産金銀者亦屢有革罷而福建歲額增至三萬餘兩浙江增至八萬餘宣宗初頗減福建課其後增至四萬餘而浙江亦增至九萬餘英宗下詔封坑穴撤閘辦官民大蘇息而歲額未除歲辦皆洪武舊額也閘辦者永宣所新增也既而禁革永煎姦民私開坑穴相殺傷嚴禁不能止下詔宥之不悛言者復請開銀場則利歸於上而盜無所容乃命侍郎王質往經理定歲課福建銀二萬餘浙江倍之又分遣御史曹祥馮傑提督供億過公稅民困而盜愈衆鄧茂七葉宗留之徒流毒浙閩久之始定景帝嘗封閉旋以盜礦者多兵部尚書孫原貞請開浙江銀場因並開福建命中官戴細保提督之天順四年命中官羅永之浙江羅圭之雲南馮讓之福建何能之四川課額浙閩大略如舊雲南十萬兩有奇四川萬三千有奇總十八萬三千有奇成化中開湖廣金場武陵等十二縣凡二十一場歲役民夫五十五萬死者無算得金僅三十五兩於是復閉而浙江銀礦以缺額量減雲南屢開屢停弘治元年始減雲南二萬兩溫處萬兩餘罷浦城廢坑銀冶至十三年雲南巡撫李士實言雲南九銀場四場礦脈久絶乞免其課報可四川山東礦穴亦先後封閉武宗初從中官秦文等奏復開浙閩銀礦既而浙江守臣言礦脈已絶乃令歲進銀二萬兩劉瑾誅乃止世宗初閉大理礦場其後薊豫齊晉川滇所在進礦砂金銀復議開採以助大工既獲玉旺峪礦銀帝諭閣臣廣開採戶部尚書方鈍等請令四川山東河南撫按嚴督所屬一一搜訪以稱天地降祥之意於是公私交騖礦利而浙江江西盜礦者且劫徽寧天下漸多事矣隆慶初罷薊鎮開採南中諸礦山亦勒石禁止萬曆十二年姦民屢以礦利中上心諸臣力陳其弊帝雖從之意怏怏二十四年張位秉政前衛千戶仲春請開礦位不能止開採之端啓廢辨白望獻礦洞者日至於是無地不開中使四出昌平則王忠真保薊永房山蔚州則王虎昌黎則田進河南之開封彰德衛輝懷慶葉縣信陽則魯坤山東之濟南青州濟寧沂州滕費蓬萊福山棲霞招遠文登則陳增山西之太原平陽潞安則張忠南直之寧國池州則郝隆劉朝用湖廣之德安則陳奉浙江之杭嚴金衢孝豐諸暨則曹金後代以劉忠陝西之西安則趙鑒趙欽四川則丘乘雲遼東則高淮廣東則李敬廣西則沈永壽江西則潘相福建則高寀雲南則楊榮皆給以關防並偕原奏官往礦脈微細無所得勒民償之而姦人假開採之名乘傳橫索民財陵轢州縣有司恤民者罪以阻撓逮問罷黜時中官多暴橫而陳奉尤甚富家巨族則誣以盜礦良田美宅則指以為下有礦脈率役圍捕辱及婦女甚至斷人手足投之江其酷虐如此帝縱不問自二十五年至三十三年諸璫所進礦稅銀幾及三百萬兩羣小藉勢誅索不啻倍蓰民不聊生山西巡撫魏允貞上言方今水旱告災天鳴地震星流氣射四方日報中外軍興百姓困敝而嗜利小人借開採以肆叨餮倘釁由中作則礦夫冗役為禍尤烈至是而後求投珠抵璧之説用之晚矣河南巡按姚思仁亦言開採之弊大可慮者有八礦盜哨聚易於召亂一也礦頭纍極勢成土崩二也礦夫殘害逼迫流亡三也雇民糧缺飢餓噪呼四也礦洞遍開無益浪費五也礦砂銀少強科民買六也民皆開礦農桑失業七也奏官強橫淫刑激變八也今礦頭以賠纍死平民以逼買死礦夫以傾壓死以爭鬬死及今不止雖傾府庫之藏竭天下之力亦無濟於存亡矣疏入皆不省識者以為明亡蓋兆於此鐵冶所洪武六年置江西進賢新喻分宜湖廣興國黃梅山東萊蕪廣東陽山陝西鞏昌山西吉州二太原澤潞各一凡十三所歲輸鐵七百四十六萬餘斤河南四川亦有鐵冶十二年益以茶陵十五年廣平吏王允道言磁州産鐵元時置官歲收百餘萬斤請如舊帝以民生甫定復設必重擾杖而流之海外十八年罷各布政司鐵冶既而工部言山西交城産雲子鐵舊貢十萬斤繕治兵器他處無有乃復設已而武昌吉州以次復焉末年以工部言復盡開令民得自採鍊每三十分取其二永樂時設四川龍州遼東都司三萬衛鐵冶景帝時辦事吏請復陝西寧遠鐵礦工部劾其違法下獄給事中張文質以為不宜塞言路乃釋之弘治十七年廣東歸善縣請開鐵冶有司課外索賂唐大鬢等因作亂都御史劉大夏討平之正德十四年廣州置鐵廠以鹽課提舉司領之禁私販如鹽法嘉靖三十四年開建寧延平諸府鐵冶隆萬以後率因舊制未嘗特開云銅場明初惟江西德興鉛山其後四川梁山山西五臺陝西寧羌略陽及雲南皆採水銀青緑太祖時廉州巡檢言階州界西戎有水銀坑冶及青緑紫泥願得兵取其地帝不許惟貴州大萬山長官司有水銀硃砂場局而四川東川府會川衛山産青緑銀銅以與外番接境虞軍民潛取生事特禁飭之成化十七年封閉雲南路南州銅坑弘治十八年裁革板場坑水銀場局正德九年軍士周達請開雲南諸銀礦因及銅錫青緑詔可遂次第開採嘉靖隆萬間因鼓鑄屢開雲南諸處銅場久之所獲漸少崇禎時遂括古錢以供爐冶焉關市之征宋元頗繁瑣明初務簡約其後增置漸多行齎居鬻所過所止各有稅其名物件析榜於官署按而征之惟農具書籍及他不鬻於市者勿算應征而藏匿者沒其半買賣田宅頭匹必投稅契本別納紙價凡納稅地置店曆書所止商氏名物數官司有都稅有宣課有司有局有分司有抽分場局有河泊所所收稅課有本色有折色稅課司局京城諸門及各府州縣市集多有之凡四百餘所其後以次裁併十之七抽分在南京者曰龍江大勝港在北京者曰通州白河盧溝通積廣積在外者曰真定杭州荊州太平蘭州廣寧又令軍衛自設場分收貯柴薪河泊所惟大河以南有之河北止鹽山縣凡稅課徵商估物貨抽分科竹木柴薪河泊取魚課又有門攤課鈔領於有司太祖初征酒醋之稅收官店錢即吳王位減收官店錢改在京官店為宣課司府縣官店為通課司凡商稅三十而取一過者以違令論洪武初命在京兵馬指揮領市司每三日一校勘街市度量權衡稽牙儈物價在外城門兵馬亦令兼領市司彰德稅課司稅及蔬果飲食畜牧諸物帝聞而黜之山西平遙主簿成樂秩滿來朝上其考曰能恢辦商稅帝曰稅有定額若以恢辦為能是剝削下民失吏職也州考非是命吏部移文以訊十年戶部奏天下稅課司局征商不如額者百七十八處遂遣中官國子生及部委官各一人核實立為定額十三年吏部言稅課司局歲收額米不及五百石者凡三百六十四處宜罷之報可胡惟庸伏誅帝諭戶部曰曩者姦臣聚斂稅及纖悉朕甚恥焉自今軍民嫁娶喪祭之物舟車絲布之類皆勿稅罷天下抽分竹木場明年令以野獸皮輸魚課製裘以給邊卒初京師軍民居室皆官所給比舍無隙地商貨至或止於舟或貯城外駔儈上下其價商人病之帝乃命於三山諸門外瀕水為屋名塌房以貯商貨永樂初定制嫁娶喪祭時節禮物自織布帛農器食品及買既稅之物車船運己貨物魚蔬雜果非市販者俱免稅準南京例置京城官店塌房七年遣御史監生於收課處榷辦課程二十一年山東巡按陳濟言淮安濟寧東昌臨清德州直沽商販所聚今都北平百貨倍往時其商稅宜遣人監榷一年以為定額帝從之洪熙元年增市肆門攤課鈔宣德四年以鈔法不通由商居貨不稅由是於京省商賈湊集地巿鎮店肆門攤稅課增舊凡五倍兩京蔬果園不論官私種而鬻者塌房庫房店舍居商貨者騾驢車受雇裝載者悉令納鈔委御史戶部錦衣衛兵馬司官各一於城門察收舟船受雇裝載者計所載料多寡路近遠納鈔鈔關之設自此始其倚勢隱匿不報者物盡沒官仍罪之於是有漷縣濟寧徐州淮安揚州上新河滸墅九江金沙洲臨清北新諸鈔關量舟大小修廣而差其額謂之船料不稅其貨惟臨清北新則兼收貨稅各差御史及戶部主事監收自南京至通州經淮安濟寧徐州臨清每船百料納鈔百貫侍郎曹弘言塌房月鈔五百貫良苦有鬻子女輸課者帝令核除之及鈔法通減北京蔬地課鈔之半船料百貫者減至六十貫正統初詔凡課程門攤俱遵洪武舊額不得藉口鈔法妄增未幾以兵部侍郎于謙奏革直省稅課司局領其稅於有司罷濟寧徐州及南京上新河船料鈔移漷縣鈔關於河西務船料當輸六十貫者減為二十貫商民稱便九年王佐掌戶部置彰義門官房收商稅課鈔復設直省稅課司官征榷漸繁矣景泰元年于謙柄國船料減至十五貫減張家灣及遼陽課稅之半大理卿薛瑄言抽分薪炭等匿不報者準舶商匿番貨罪盡沒之過重請得比匿稅律帝從之成化七年增置蕪湖荊州杭州三處工部官初抽分竹木止取鈔其後易以銀至是漸益至數萬兩尋遣御史榷稅孝宗初御史陳瑤言崇文門監稅官以掊克為能非國體乃命客貨外車輛毋得搜阻又從給事中王敞言取回蕪湖荊州杭州抽分御史以府州佐二官監收其稅十三年復遣御史正德十一年始收泰山碧霞元君祠香錢從鎮守太監言也十二年御史胡文靜請革新設諸抽分廠未一年太監鄭璽請復設於順德廣平工部尚書李鐩依阿持兩端橫征之端復起尋命中官李文馬俊之湖廣浙江抽分廠與主事中分榷稅世宗初抽分中官及江西福建廣東稅課司局多所裁革又革真定諸府抽印木植中官京城九門之稅弘治初歲入鈔六十六萬餘貫錢二百八十八萬餘文至末年數大減自正德七年以後鈔增四倍錢增三十萬嘉靖三年詔如弘治初年例仍減錢三十萬直省關稅成化以來折收銀其後復收錢鈔八年復收銀遂為定制始時鈔關估船料定稅既而以估料難核乃度梁頭廣狹為準自五尺至三丈六尺有差帝令以成尺為限勿科畸零太監李能請於山海關榷商稅行之數年主事塢閲言廣寧八里鋪前屯衛既有榷場不宜再榷罷之其後復山海關稅罷八里鋪店錢四十二年令各關歲額定數之外餘饒悉入公帑隆慶二年始給鈔關主事關防敕書尋令鈔關去府近者知府收解去府遠者令佐二官收貯府庫季解部主事掌核商所報物數以定稅數收解無有所與神宗初令商貨進京者河西務給紅單赴崇文門併納正條船三稅其不進京者河西務止收正稅免條船二稅萬曆十一年革天下私設無名稅課然自隆慶以來凡橋梁道路關津私擅抽稅罔利病民雖纍詔察革不能去也逮兩宮三殿災營建費不資始開礦增稅而天津店租廣州珠榷兩淮餘鹽京口供用浙江巿舶成都鹽茶重慶名木湖口長江船稅荊州店稅寶坻魚葦及門攤商稅油布雜稅中官遍天下非領稅即領礦驅脅官吏務朘削焉榷稅之使自二十六年千戶趙承勛奏請始其後高寀於京口暨祿於儀真劉成於浙李鳳於廣州陳奉於荊州馬堂於臨清陳增於東昌孫隆於蘇杭魯坤於河南孫朝於山西丘乘雲於四川梁永於陝西李道於湖口王忠於密雲張曄於盧溝橋沈永壽於廣西或徵市舶或徵店稅或專領稅務或兼領開採姦民納賄於中官輒姶指揮千戶劄用為爪牙水陸行數十里即樹旗建廠視商賈懦者肆為攘奪沒其全資負戴行李亦被搜索又立土商名目窮鄉僻塢米鹽雞豕皆令輸稅所至數激民變帝率庇不問諸所進稅或稱遺稅或稱節省銀或稱罰贖或稱額外贏餘又假買辦孝順之名金珠寶玩貂皮名馬雜然進奉帝以為能甚至稅監劉成因災荒請暫寬商稅中旨仍徵課四萬其嗜利如此三十三年始詔罷採礦以稅務歸有司而稅使不撤李道詭稱有司固却乞如舊便帝遽從之又聽福府承奉謝文銓言設官店於崇文門外以供福邸戶部尚書趙世卿屢疏不聽世卿又言崇文門河西務臨清九江滸墅揚州北新淮安各鈔關歲徵本折約三十二萬五千餘兩萬曆二十五年增銀八萬二千兩此定額也乃二十七年以後歷歲減縮至二十九年總解二十六萬六千餘兩究厥所由則以稅使苛斂商至者少連年稅使所供即此各關不足之數也疏入不省寶坻銀魚廠永樂時設穆宗時止令估直備廟祀上供及是始以中官坐採又徵其稅後並稅武清等縣非産魚之處增葦網諸稅且及青縣天津九門稅尤苛舉子皆不免甚至擊殺覲吏事聞詔法司治之監豎為小戢至四十二年李太后遺命減天下稅額三之一免近京畸零小稅光宗立始盡蠲天下額外稅撤回稅監其派入地畝行戶人丁間架者概免之天啓五年戶部尚書李起元請復榷水陸衝要依萬曆二十七八年例量徵什一允行之崇禎初關稅每兩增一錢通八關增五萬兩三年復增二錢惟臨清僅半而崇文門河西務俱如舊戶部尚書畢自嚴議增南京宣課司稅額一萬為三萬南京戶部尚書鄭三俊以宣課所收落地稅無幾請稅蕪湖以當增數自嚴遂議稅蕪湖三萬兩而宣課仍增一萬三俊悔疏爭不能已九年復議增稅課發項十三年增關稅二十萬兩而商民益困矣凡諸課程始收鈔間折收米已而收錢鈔半後乃折收銀而折色本色遞年輪收本色歸內庫折色歸太倉明初東有馬市西有茶市皆以馭邊省戍守費海外諸國入貢許附載方物與中國貿易因設市舶司置提舉官以領之所以通夷情抑姦商俾法禁有所施因以消其釁隙也洪武初設於太倉黃渡尋罷復設於寧波泉州廣州寧波通日本泉州通琉球廣州通占城暹羅西洋諸國琉球占城諸國皆恭順任其時至入貢惟日本叛服不常故獨限其期為十年人數為二百舟為二艘以金葉勘合表文為驗以防詐偽侵軼後市舶司暫罷輒復嚴禁瀕海居民及守備將卒私通海外諸國永樂初西洋剌泥國回回哈只馬哈沒奇等來朝附載胡椒與民互市有司請徵其稅帝曰商稅者國家抑逐末之民豈以為利今夷人慕義遠來乃侵其利所得幾何而虧辱大體多矣不聽三年以諸番貢使益多乃置驛於福建浙江廣東三市舶司以館之福建曰來遠浙江曰安遠廣東曰懷遠尋設交址雲屯市舶提舉司接西南諸國朝貢者初入貢海舟至有司封識俟奏報然後起運宣宗命至即馳奏不待報隨送至京武宗時提舉市舶太監畢真言舊制泛海諸船皆市舶司專理近領於鎮巡及三司官乞如舊便禮部議市舶職司進貢方物其泛海客商及風泊番船非敕旨所載例不當預中旨令如熊宣舊例行宣先任市舶太監也嘗以不預滿剌加諸國番舶抽分奏請兼理為禮部所劾而罷劉瑾私真謬以為例云嘉靖二年日本使宗設宋素卿分道入貢互爭真偽市舶中官賴恩納素卿賄右素卿宗設遂大掠寧波給事中夏言言倭患起於市舶遂罷之市舶既罷日本海賈往來自如海上姦豪與之交通法禁無所施轉為寇賊二十六年倭寇百艘久泊寧台數千人登岸焚劫浙江巡撫朱紈訪知舶主皆貴官大姓市番貨皆以虛直轉鬻牟利而直不時給以是構亂乃嚴海禁毀餘皇奏請鐫諭戒大姓不報二十八年紈又言長澳諸大俠林恭等勾引夷舟作亂而巨姦關通射利因為嚮導躪我海濱宜正典刑部覆不允而通番大猾紈輒以便宜誅之御史陳九德劾紈措置乖方專殺啓釁帝逮紈聽勘紈既黜姦徒益無所憚外交內訌釀成禍患汪直徐海陳東麻葉等起而海上無寧日矣三十五年倭寇大掠福建浙直都御史胡宗憲遣其客蔣洲陳可願使倭宣諭還報倭志欲通貢市兵部議不可乃止三十九年鳳陽巡撫唐順之議復三市舶司部議從之四十四年浙江以巡撫劉畿言仍罷福建開而復禁萬曆中復通福建互市惟禁市硝黃已而兩市舶司悉復以中官領職如故永樂間設馬市三一在開原南關以待海西一在開原城東五里一在廣寧皆以待𩽆顏三衛定直四等上直絹八匹布十二次半之下二等各以一遞減既而城東廣寧市皆廢惟開原南關馬市獨存大同馬市始正統三年巡撫盧睿請令軍民平價市駝馬達官指揮李原等通譯語禁市兵器銅鐵帝從之十四年都御史沈固請支山西行都司庫銀市馬時也先貢馬互市中官王振裁其馬價也先大舉入寇遂致土木之變成化十四年陳鉞撫遼東復開三衛馬市通事劉海姚安肆侵牟𩽆顏諸部懷怨擾廣寧不復來市兵部尚書王越請令參將布政司官各一員監之毋有所侵剋遂治海安二人罪尋令海西及𩽆顏三衛入市開原月一市廣寧月二市以互市之稅充撫賞正德時令驗放入市者依期出境不得挾弓矢非互市日毋輒近塞垣嘉靖三十年以總兵仇鸞言詔於宣府大同開馬市命侍郎史道總理之兵部員外郎楊繼盛諫不從俺答旋入寇抄大同市則寇宣府宣府市則寇大同幣未出境警報隨至帝始悔之召道還然諸部嗜馬市利未敢公言大舉而邊臣亦多畏懾以互市啖之明年罷大同馬市宣府猶未絶抄掠不已乃並絶之隆慶四年俺答孫把漢那吉來降於是封貢互市之議起而宣大互市復開邊境稍靜然撫賞甚厚朝廷為省客兵餉減哨銀以充之頻年加賞而要求滋甚司事者復從中乾沒邊費反過當矣遼東義州木市萬曆二十三年開事具李化龍傳二十六年從巡撫張思忠奏罷之遂並罷馬市其後總兵李成梁力請復而薊遼總督萬世德亦疏於朝二十九年復開馬木二市後以為常
