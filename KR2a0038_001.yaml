body:
  text: 明史卷一本紀第一太祖一太祖開天行道肇紀立極大聖至神仁文義武俊德成功高皇帝諱元璋字國瑞姓朱氏先世家沛徙句容再徙泗州父世珍始徙濠州之鍾離生四子太祖其季也母陳氏方娠夢神授藥一丸置掌中有光吞之寤口餘香氣及產紅光滿室自是夜數有光起鄰里望見驚以為火輒奔救至則無有比長姿貌雄傑奇骨貫頂志意廓然人莫能測至正四年旱蝗大饑疫太祖時年十七父母兄相繼歿貧不克葬里人劉繼祖與之地乃克葬即鳳陽陵也太祖孤無所依乃入皇覺寺為僧逾月遊食合肥道病二紫衣人與俱護視甚至病已失所在凡歷光固汝潁諸州三年復還寺當是時元政不綱盜賊四起劉福通奉韓山童假宋後起潁徐壽輝僭帝號起蘄李二彭大趙均用起徐眾各數萬並置將帥殺吏侵略郡縣而方國珍已先起海上他盜擁兵據地寇掠甚眾天下大亂十二年春二月定遠人郭子興與其黨孫德崖等起兵濠州元將徹里不花憚不敢攻而日俘良民以邀賞太祖時年二十五謀避兵卜於神去留皆不吉乃曰得毋當舉大事乎卜之吉大喜遂以閏三月甲戌朔入濠見子興子興奇其狀貌留為親兵戰輒勝遂妻以所撫馬公女即高皇后也子興與德崖齟齬太祖屢調護之秋九月元兵復徐州李二走死彭大趙均用奔濠德崖等納之子興禮大而易均用均用怨之德崖遂與謀伺子興出執而械諸孫氏將殺之太祖方在淮北聞難馳至訴於彭大大怒呼兵以行太祖亦甲而擁盾發屋出子興破械使人負以歸遂免是冬元將賈魯圍濠太祖與子興力拒之十三年春賈魯死圍解太祖收里中兵得七百人子興喜署為鎮撫時彭趙所部暴橫子興弱太祖度無足與共事乃以兵屬他將獨與徐達湯和費聚等南略定遠計降驢牌寨民兵三千與俱東夜襲元將張知院於橫澗山收其卒二萬道遇定遠人李善長與語大悅遂與俱攻滁州下之是年張士誠據高郵自稱誠王十四年冬十月元丞相脫脫大敗士誠於高郵分兵圍六合太祖曰六合破滁且不免與耿再成軍瓦梁壘救之力戰衞老弱還滁元兵尋大至攻滁太祖設伏誘敗之然度元兵勢盛且再至乃還所獲馬遣父老具牛酒謝元將曰守城備他盜耳奈何舍巨寇戮良民元兵引去城賴以完脫脫既破士誠軍聲大振會中讒遽解兵江淮亂益熾十五年春正月子興用太祖計遣張天祐等拔和州檄太祖總其軍太祖慮諸將不相下秘其檄期旦日會廳事時席尚右諸將先入皆踞右太祖故後至就左比視事剖決如流眾瞠目不能發一語始稍稍屈議分工甓城期三日太祖工竣諸將皆後於是始出檄南面坐曰奉命總諸公兵今甓城皆後期如軍法何諸將皆惶恐謝乃搜軍中所掠婦女縱還家民大悅元兵十萬攻和拒守三月食且盡而太子禿堅樞密副使絆住馬民兵元帥陳埜先分屯新塘高望雞籠山以絕餉道太祖率眾破之元兵皆走渡江三月郭子興卒時劉福通迎立韓山童子林兒於亳國號宋建元龍鳳檄子興子天為都元帥張天祐太祖為左右副元帥太祖慨然曰大丈夫寧能受制於人耶遂不受然念林兒勢盛可倚藉乃用其年號以令軍中夏四月常遇春來歸五月太祖謀渡江無舟會巢湖帥廖永安俞通海以水軍千艘來附太祖大喜往撫其眾而元中丞蠻子海牙扼銅城閘馬場河諸隘巢湖舟師不得出忽大雨太祖喜曰天助我也遂乘水漲從小港縱舟還因擊海牙於峪溪口大敗之遂定計渡江諸將請直趨集慶太祖曰取集慶必自采石始采石重鎮守必固牛渚前臨大江彼難為備可必克也六月乙卯乘風引帆直達牛渚常遇春先登拔之采石兵亦潰緣江諸壘悉附諸將以和州饑爭取資糧謀歸太祖謂徐達曰渡江幸捷若舍而歸江東非吾有也乃悉斷舟纜放急流中謂諸將曰太平甚近當與公等取之遂乘勝拔太平執萬戶納哈出總管靳義赴水死太祖曰義士也禮葬之揭榜禁剽掠有卒違令斬以徇軍中肅然改路曰府置太平興國翼元帥府自領元帥事召陶安參幕府事李習為知府時太平四面皆元兵右丞阿魯灰中丞蠻子海牙等嚴師截姑孰口陳埜先水軍帥康茂才以數萬眾攻城太祖遣徐達鄧愈湯和逆戰別將潛出其後夾擊之擒埜先并降其眾阿魯灰等引去秋九月郭天敘張天祐攻集慶埜先叛二人皆戰死於是子興部將盡歸太祖矣埜先尋為民兵所殺從子兆先收其眾屯方山與海牙掎角以窺太平冬十二月壬子釋納哈出北歸十六年春二月丙子大破海牙於采石三月癸未進攻集慶擒兆先降其眾三萬六千人皆疑懼不自保太祖擇驍健者五百人入衞解甲酣寢達旦眾心始安庚寅再敗元兵於蔣山元御史大夫福壽力戰死之蠻子海牙遁歸張士誠康茂才降太祖入城悉召官吏父老諭之曰元政瀆擾干戈蜂起我來為民除亂耳其各安堵如故賢士吾禮用之舊政不便者除之吏毋貪暴殃吾民民乃大喜過望改集慶路為應天府辟夏煜孫炎楊憲等十餘人葬御史大夫福壽以旌其忠當是時元將定定扼鎮江別不華楊仲英屯寧國青衣軍張明鑑據揚州八思爾不花駐徽州石抹宜孫守處州其弟厚孫守婺州宋伯顏不花守衢州而池州已為徐壽輝將所據張士誠自淮東陷平江轉掠浙西太祖既定集慶慮士誠壽輝強江左浙右諸郡為所并於是遣徐達攻鎮江拔之定定戰死夏六月鄧愈克廣德秋七月己卯諸將奉太祖為吳國公置江南行中書省自總省事置僚佐貽書張士誠士誠不報引兵攻鎮江徐達敗之進圍常州不下九月戊寅如鎮江謁孔子廟遣儒士告諭父老勸農桑尋還應天十七年春二月耿炳文克長興三月徐達克常州夏四月丁卯自將攻寧國取之別不華降五月上元寧國句容獻瑞麥六月趙繼祖克江陰秋七月徐達克常熟胡大海克徽州八思爾不花遁冬十月常遇春克池州繆大亨克揚州張明鑑降十二月己丑釋囚是年徐壽輝將明玉珍據重慶路十八年春二月乙亥以康茂才為營田使三月己酉錄囚鄧愈克建德路夏四月徐壽輝將陳友諒遣趙普勝陷池州是月友諒據龍興路五月劉福通破汴梁迎韓林兒都之初福通遣將分道四出破山東寇秦晉掠幽薊中原大亂太祖故得次第略定江表所過不殺收召才雋由是人心日附冬十二月胡大海攻婺州久不下太祖自將往擊之石抹宜孫遣將率車師由松溪來援太祖曰道車戰適取敗耳命胡德濟迎戰於梅花門大破之婺州降執厚孫先一日城中人望見城西五色雲如車蓋以為異及是乃知為太祖駐兵地入城發粟振貧民改州為寧城府辟范祖幹葉儀許元等十三人分直講經史戊子遣使招諭方國珍十九年春正月乙巳太祖謀取浙東未下諸路戒諸將曰克城以武戡亂以仁吾比入集慶秋毫無犯故一舉而定每聞諸將得一城不妄殺輒喜不自勝夫師行如火不戢將燎原為將能以不殺為武豈惟國家之利子孫實受其福庚申胡大海克諸暨是月命寧越知府王宗顯立郡學三月甲午赦大逆以下丁巳方國珍以溫台慶元來獻遣其子關為質不受夏四月俞通海等復池州時耿炳文守長興吳良守江陰湯和守常州皆數敗士誠兵太祖以故久留寧越徇浙東六月壬戌還應天秋八月元察罕帖木兒復汴梁福通以林兒退保安豐九月常遇春克衢州擒宋伯顏不花冬十月遣夏煜授方國珍行省平章國珍以疾辭十一月壬寅胡大海克處州石抹宜孫遁時元守兵單弱且聞中原亂人心離散以故江左浙右諸郡兵至皆下遂西與友諒隣二十年春二月元福建行省參政袁天祿以福寧降三月戊子徵劉基宋濂章溢葉琛至夏五月徐達常遇春敗陳友諒於池州閏月丙辰友諒陷太平守將朱文遜院判花雲王鼎知府許瑗死之未幾友諒弒其主徐壽輝自稱皇帝國號漢盡有江西湖廣地約士誠合攻應天應天大震諸將議先復太平以牽之太祖曰不可彼居上游舟師十倍於我猝難復也或請自將迎擊太祖曰不可彼以偏師綴我而全軍趨金陵順流半日可達吾步騎急難引還百里趨戰兵法所忌非策也乃馳諭胡大海擣信州牽其後而令康茂才以書紿友諒令速來友諒果引兵東於是常遇春伏石灰山徐達陣南門外楊璟屯大勝港張德勝等以舟師出龍江關太祖親督軍盧龍山乙丑友諒至龍灣眾欲戰太祖曰天且雨趣食乘雨擊之須臾果大雨士卒競奮雨止合戰水陸夾擊大破之友諒乘別舸走遂復太平下安慶而大海亦克信州初太祖令茂才紿友諒李善長以為疑太祖曰二寇合吾首尾受敵惟速其來而先破之則士誠膽落矣已而士誠兵竟不出丁卯置儒學提舉司以宋濂為提舉遣子標受經學六月耿再成敗石抹宜孫於慶元宜孫戰死遣使祭之秋九月徐壽輝舊將歐普祥以袁州降冬十二月復遣夏煜以書諭國珍二十一年春二月甲申立鹽茶課己亥置寶源局三月丁丑改樞密院為大都督府元將薛顯以泗州降戊寅國珍遣使來謝飾金玉馬鞍以獻却之曰今有事四方所需者人材所用者粟帛寶玩非所好也秋七月友諒將張定邊陷安慶八月遣使於元平章察罕帖木兒時察罕平山東降田豐軍聲大振故太祖與通好會察罕方攻益都未下太祖乃自將舟師征陳友諒戊戌克安慶友諒將丁普郎傅友德迎降壬寅次湖口追敗友諒於江州克其城友諒奔武昌分徇南康建昌饒蘄黃廣濟皆下冬十一月己未克撫州二十二年春正月友諒江西行省丞相胡廷瑞以龍興降乙卯如龍興改為洪都府謁孔子廟告諭父老除陳氏苛政罷諸軍需存恤貧無告者民大悅袁瑞臨江吉安相繼下二月還應天鄧愈留守洪都癸未降人蔣英殺金華守將胡大海郎中王愷死之英叛降張士誠處州降人李祐之聞變亦殺行樞密院判耿再成反都事孫炎知府王道同元帥朱文剛死之三月癸亥降人祝宗康泰反陷洪都鄧愈走應天知府葉琛都事萬思誠死之是月明玉珍稱帝於重慶國號夏夏四月己卯邵榮復處州甲午徐達復洪都五月丙午朱文正趙德勝鄧愈鎮洪都六月戊寅察罕以書來報留我使人不遣察罕尋為田豐所殺秋七月丙辰平章邵榮參政趙繼祖謀逆伏誅冬十二月元遣尚書張昶航海至慶元授太祖江西行省平章政事不受察罕子擴廓帖木兒致書歸使者二十三年春正月丙寅遣汪河報之二月壬申命將士屯田積穀是月友諒將張定邊陷饒州士誠將呂珍破安豐殺劉福通三月辛丑太祖自將救安豐珍敗走以韓林兒歸滁州乃還應天夏四月壬戌友諒大舉兵圍洪都乙丑諸全守將謝再興叛附於士誠五月築禮賢館友諒分兵陷吉安參政劉齊知府朱叔華死之陷臨江同知趙天麟死之陷無為州知州董曾死之秋七月癸酉太祖自將救洪都癸未次湖口先伏兵涇江口及南湖觜遏友諒歸路檄信州兵守武陽渡友諒聞太祖至解圍逆戰於鄱陽湖友諒兵號六十萬聯巨舟為陣樓櫓高十餘丈綿亙數十里旌旂戈盾望之如山丁亥遇於康郎山太祖分軍十一隊以禦之戊子合戰徐達擊其前鋒俞通海以火礮焚其舟數十殺傷略相當友諒驍將張定邊直犯太祖舟舟膠於沙不得退危甚常遇春從旁射中定邊通海復來援舟驟進水湧太祖舟乃得脫己丑友諒悉巨艦出戰諸將舟小仰攻不利有怖色太祖親麾之不前斬退縮者十餘人人皆殊死戰會日晡大風起東北乃命敢死士操七舟實火藥蘆葦中縱火焚友諒舟風烈火熾烟焰漲天湖水盡赤友諒兵大亂諸將鼓噪乘之斬首二千餘級焚溺死者無算友諒氣奪辛卯復戰友諒復大敗於是斂舟自守不敢更戰壬辰太祖移軍扼左蠡友諒亦退保渚磯相持三日其左右二金吾將軍皆降友諒勢益蹙忿甚盡殺所獲將士而太祖則悉還所俘傷者傅以善藥且祭其親戚諸將陣亡者八月壬戌友諒食盡趨南湖觜為南湖軍所遏遂突湖口太祖邀之順流搏戰及於涇江涇江軍復遮擊之友諒中流矢死張定邊以其子理奔武昌九月還應天論功行賞先是太祖救安豐劉基諫不聽至是謂基曰我不當有安豐之行使友諒乘虛直擣應天大事去矣乃頓兵南昌不亡何待友諒亡天下不難定也壬午自將征陳理是月張士誠自稱吳王冬十月壬寅圍武昌分徇湖北諸路皆下十二月丙申還應天常遇春留督諸軍二十四年春正月丙寅朔李善長等率羣臣勸進不允固請乃即吳王位建百官以善長為右相國徐達為左相國常遇春俞通海為平章政事諭之曰立國之初當先正紀綱元氏闇弱威福下移馴至於亂今宜鑒之立子標為世子二月乙未復自將征武昌陳理降漢沔荊岳皆下三月乙丑還應天丁卯置起居注庚午罷諸翼元帥府置十七衞親軍指揮使司命中書省辟文武人材夏四月建祠祀死事丁普郎等於康郎山趙德勝等於南昌秋七月丁丑徐達克廬州戊寅常遇春徇江西八月戊戌復吉安遂圍贛州達徇荊湘諸路九月甲申下江陵夷陵潭歸皆降冬十二月庚寅達克辰州遣別將下衡州二十五年春正月己巳徐達下寶慶湖湘平常遇春克贛州熊天瑞降遂趨南安招諭嶺南諸路下韶州南雄甲申如南昌執大都督朱文正以歸數其罪安置桐城二月己丑福建行省平章陳友定侵處州參軍胡深擊敗之遂下浦城丙午士誠將李伯昇攻諸全之新城李文忠大敗之夏四月庚寅常遇春徇襄漢諸路五月乙亥克安陸己卯下襄陽六月壬子朱亮祖胡深攻建寧戰於城下深被執死之秋七月令從渡江士卒被創廢疾者養之死者贍其妻子九月丙辰建國子學冬十月戊戌下令討張士誠是時士誠所據南至紹興北有通泰高郵淮安濠泗又北至於濟寧乃命徐達常遇春等先規取淮東閏月圍泰州克之十一月張士誠寇宜興徐達擊敗之遂自宜興還攻高郵二十六年春正月癸未士誠窺江陰太祖自將救之士誠遁康茂才追敗之於浮子門太祖還應天二月明玉珍死子昇自立三月丙申令中書嚴選舉徐達克高郵夏四月乙卯襲破士誠將徐義水軍於淮安義遁梅思祖以城降濠徐宿三州相繼下淮東平甲子如濠州省墓置守塚二十家賜故人汪文劉英粟帛置酒召父老飲極歡曰吾去鄉十有餘年艱難百戰乃得歸省墳墓與父老子弟復相見今苦不得久留歡聚為樂父老幸教子弟孝弟力田毋遠賈濱淮郡縣尚苦寇掠父老善自愛令有司除租賦皆頓首謝辛未徐達克安豐分兵敗擴廓於徐州夏五月壬午至自濠庚寅求遺書秋八月庚戌改築應天城作新宮鍾山之陽辛亥命徐達為大將軍常遇春為副將軍帥師二十萬討張士誠御戟門誓師曰城下之日毋殺掠毋毀廬舍毋發丘壟士誠母葬平江城外毋侵毀既而召問達遇春用兵當何先遇春欲直擣平江太祖曰湖州張天騏杭州潘原明為士誠臂指平江窮蹙兩人悉力赴援難以取勝不若先攻湖州使疲於奔命羽翼既披平江勢孤立破矣甲戌敗張天騏於湖州士誠親率兵來援復敗之於皂林九月乙未李文忠攻杭州冬十月壬子遇春敗士誠兵於烏鎮十一月甲申張天騏降辛卯李文忠下餘杭潘原明降旁郡悉下癸卯圍平江十二月韓林兒卒以明年為吳元年建廟社宮室祭告山川所司進宮殿圖命去雕琢奇麗者是歲元擴廓帖木兒與李思齊張良弼搆怨屢相攻擊朝命不行中原民益困二十七年春正月戊戌諭中書省曰東南久罹兵革民生凋敝吾甚憫之且太平應天諸郡吾渡江開創地供億煩勞久矣今比戶空虛有司急催科重困吾民將何以堪其賜太平田租二年應天鎮江寧國廣德各一年二月丁未傅友德敗擴廓將李二於徐州執之三月丁丑始設文武科取士夏四月方國珍陰遣人通擴廓及陳友定移書責之五月己亥初置翰林院是月以旱減膳素食復徐宿濠泗壽邳東海安東襄陽安陸及新附地田租三年六月戊辰大雨群臣請復膳太祖曰雖雨傷禾已多其賜民今年田租癸酉命朝賀罷女樂秋七月丙子給府州縣官之任費賜綺帛及其父母妻長子有差著為令己丑雷震宮門獸吻赦罪囚庚寅遣使責方國珍貢糧八月癸丑圜丘方丘社稷壇成九月甲戌太廟成朱亮祖帥師討國珍戊寅詔曰先王之政罪不及孥自今除大逆不道毋連坐辛巳徐達克平江執士誠吳地平戊戌遣使致書於元主送其宗室神保大王等北還辛丑論平吳功封李善長宣國公徐達信國公常遇春鄂國公將士賜賚有差朱亮祖克台州癸卯新宮成冬十月甲辰遣起居注吳琳魏觀以幣求遺賢於四方丙午令百官禮儀尚左改李善長左相國徐達右相國辛亥祀元臣余闕於安慶李黼於江州壬子置御史臺癸丑湯和為征南將軍吳禎副之討國珍甲寅定律令戊午正郊社太廟雅樂庚申召諸將議北征太祖曰山東則王宣反側河南則擴廓跋扈關隴則李思齊張思道梟張猜忌元祚將亡中原塗炭今將北伐拯生民於水火何以決勝遇春對曰以我百戰之師敵彼久逸之卒直擣元都破竹之勢也太祖曰元建國百年守備必固懸軍深入餽餉不前援兵四集危道也吾欲先取山東撤彼屏蔽移兵兩河破其籓籬拔潼關而守之扼其戶檻天下形勝入我掌握然後進兵元都勢孤援絕不戰自克鼓行而西雲中九原關隴可席卷也諸將皆曰善甲子徐達為征虜大將軍常遇春為副將軍帥師二十五萬由淮入河北取中原胡廷瑞為征南將軍何文輝為副將軍取福建湖廣行省平章楊璟左丞周德興參政張彬取廣西己巳朱亮祖克溫州十一月辛巳湯和克慶元方國珍遁入海壬午徐達克沂州斬王宣己丑廖永忠為征南副將軍自海道會和討國珍乙未頒大統曆辛丑徐達克益都十二月甲辰頒律令丁未方國珍降浙東平張興祖下東平兗東州縣相繼降己酉徐達下濟南胡廷瑞下邵武癸丑李善長帥百官勸進表三上乃許甲子告於上帝庚午湯和廖永忠由海道克福州
