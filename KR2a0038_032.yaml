body:
  text: 明史卷三十二志第八曆二大統曆法一上法原造曆者各有本原史宜備錄使後世有以考如太初之起數鍾律大衍之造端蓍策皆詳本志授時曆以測驗算術為宗惟求合天不牽合律呂卦爻然其法之所以立數之所從出以及晷影星度皆有全書郭守敬齊履謙傳中有書名可考元史漫無采摭僅存李謙之議錄曆經之初稿其後改三應率及立成之數與夫割圓弧矢之法平立定三差之原盡削不載使作者精意湮沒識者憾焉今據大統曆通軌及曆草諸書稍為編次首法原次立成次推步而法原之目七曰句股測望曰弧矢割圓曰黃赤道差曰黃赤道內外度曰白道交周曰日月五星平立定三差曰里差刻漏句股測望北京立四丈表冬至日午正測得景長七丈九尺八寸五分隨以簡儀測到太陽南至地平二十六度四十六分半為半弧背求得矢度五度九十一分半置周天半徑截矢餘五十四度九十六分為股乃本地去戴日下之度以弦股別句術求得句二十六度一十七分六十六秒為日出地半弧弦北京立四丈表夏至日午正測得景長一丈一尺七寸一分隨以簡儀測到太陽南至地平七十四度二十六分半為半弧背求得矢度四十三度七十四分少置周天半徑截矢餘一十七度一十三分二十五秒為句乃本地去戴日下之度以句弦別股術求得股五十八度四十五分半為日出地半弧弦以二至日度相併得一百度七十三分折半得五十度三十六分半為北京赤道出地度以赤道出地度轉減周天四之一餘四十度九十四分九十三秒七十五微為北京北極出地度弧矢割圓周天徑一百二十一度七十五分少少不用半徑六十度八十七分半又為黃赤道大弦二至黃赤道內外半弧背二十四度所測就整二至黃赤道弧矢四度八十四分八十二秒黃赤道大句二十三度八十分七十秒黃赤道大股五十六度二分六十八秒半徑內減去矢度之數割圓求矢術置半弧背度自之為半弧背羃周天徑自之為上廉上廉乘半弧背羃為正實上廉乘徑為益從方半弧背倍之乘徑為下廉以初商乘上廉得數以減益從方餘為從方置初商自之以減下廉餘以初商乘之為從廉從方從廉相並為下法下法乘初商以減正實實不足減改初商實有不盡次第商除之倍初商數與次商相並以乘上廉得數以減益從方餘為從方幷初商次商而自之又以初商自之並二數以減下廉餘以初商倍數並次商乘之為從廉從方從廉相並為下法下法乘次商以減餘實而定次商有不盡者如法商之皆以商得數為矢度之數黃赤道同用如以半弧背一度求矢度術曰置半弧背一度自之得一度為半弧背羃置周天徑一百二十一度太自之得一萬四千八百二十三度六分二十五秒為上廉上廉乘半弧背羃得一萬四千八百二十三度六分二五為正實上廉又乘徑得一百八十萬四千七百七度八十五分九十三秒七五為益從方半弧背一度倍之得二度以乘徑得二百四十三度五十分為下廉初商八十秒置初商八十秒乘上廉一萬四千八百二十三度六二五得一百一十八度五八四五以減益從方一百八十萬四千七百七度八五九三七五餘一百八十萬四千五百八十九度二七四八七五為從方又置初商八十秒自之得六十四微以減下廉餘二百四十三度四九九九三六仍以八十秒乘之得一度九四七九九九四八八為從廉以從廉從方並之共得一百八十萬四千五百九十一度二二二八七四四八八為下法下法乘初商得一萬四千四百三十六度七十二分九七八二九九五九四以減正實餘實三百八十六度三十三分二七一七四九六次商二秒置初商八十秒倍之得一分六十秒加次商二秒得一分六十二秒乘上廉一萬四千八百二十三度六二五得二百四十度一三三六一二五以減益從方餘一百八十萬四千四百六十七度七二五七六二五為從方又置初次商八十二秒自之得六十七微加初商八十秒自之之數得一秒三十一微以減下廉餘二百四十三度四九九八六九以前所得一分六十二秒乘之得三度九十四分四六九七八七七八為從廉以從廉從方並得一百八十萬四千四百七十一度六十七分四六三七七八為下法下法乘次商得三百六十度八九四三三四九二七五五六以減餘實仍餘二十五度四三八三八二九一二二四四不足一秒棄不用下同凡求得矢度八十二秒餘度各如上法求到矢度以為黃赤相求及其內外度之根數詳後黃赤道差求黃道各度下赤道積度術置周天半徑內減去黃道矢度餘為黃赤道小弦置黃赤道小弦以黃赤道大股乘之大股見割圓為實黃赤道大弦半徑為法實如法而一為黃赤道小股置黃道矢自乘為實以周天全徑為法實如法而一為黃道半背弦差以差去減黃道積度即黃道半弧背餘為黃道半弧弦置黃道半弧弦自之為股羃黃赤道小股自之為句羃二羃並之以開平方法除之為赤道小弦置黃道半弧弦以周天半徑亦為赤道大弦乘之為實以赤道小弦為法而一為赤道半弧弦置黃赤道小股亦為赤道橫小句以赤道大弦即半徑乘之為實以赤道小弦為法而一為赤道橫大句以減半徑餘為赤道橫弧矢橫弧矢自之為實以全徑為法而一為赤道半背弦差以差加赤道半弧弦為赤道積度如黃道半弧背一度求赤道積度術曰置半徑六十度八十七分五十秒即黃赤道大弦內減黃道矢八十二秒餘六十度八六六八為黃赤道小弦置黃赤道小弦以黃赤道大股五十六度二六八乘之得三千四百一十度一七二三二四為實以黃赤道大弦六十度八七五為法實如法而一得五十六度一分九十二秒為黃赤道小股又為赤道小句置矢度八十二秒自之得六十七微以全徑一百二十一度七五為法除之得五十五