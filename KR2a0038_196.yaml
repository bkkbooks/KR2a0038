body:
  text: 明史卷一百九十六列傳第八十四張璁胡鐸桂萼方獻夫夏言張璁字秉用永嘉人舉於鄉七試不第將謁選御史蕭鳴鳳善星術語之曰從此三載成進士又三載當驟貴璁乃歸正德十六年登第年四十七矣世宗初踐阼議追崇所生父興獻王廷臣持之議三上三却璁時在部觀政以是年七月朔上疏曰孝子之至莫大乎尊親尊親之至莫大乎以天下養陛下嗣登大寶即議追尊聖考以正其號奉迎聖母以致其養誠大孝也廷議執漢定陶宋濮王故事謂為人後者為之子不得顧私親夫天下豈有無父母之國哉記曰禮非天降非地出人情而已漢哀帝宋英宗固定陶濮王子然成帝仁宗皆預立為嗣養之宮中其為人後之義甚明故師丹司馬光之論行於彼一時則可今武宗無嗣大臣遵祖訓以陛下倫序當立而迎立之遺詔直曰興獻王長子未嘗著為人後之義則陛下之興實所以承祖宗之統與預立為嗣養之宮中者較然不同議者謂孝廟德澤在人不可無後假令聖考尚存嗣位今日恐弟亦無後兄之義且迎養聖母以母之親也稱皇叔母則當以君臣禮見恐子無臣母之義禮長子不得為人後聖考止生陛下一人利天下而為人後恐子無自絶其父母之義故在陛下謂入繼祖後而得不廢其尊親則可謂為人後以自絶其親則不可夫統與嗣不同非必父死子立也漢文承惠帝後則以弟繼宣帝承昭帝後則以兄孫繼若必奪此父子之親建彼父子之號然後謂之繼統則古有稱高伯祖皇伯考者皆不得謂之統乎臣竊謂今日之禮宜別立聖考廟於京師使得隆尊親之孝且使母以子貴尊與父同則聖考不失其為父聖母不失其為母矣帝方扼廷議得璁疏大喜曰此論出吾父子獲全矣極下廷臣議廷臣大怪駭交起擊之禮官毛澄等執如初會獻王妃至通州聞尊稱禮未定止不肯入帝聞而泣欲避位歸藩璁乃著大禮或問上之帝於是連駁禮官疏廷臣不得已合議尊孝宗曰皇考興獻王曰本生父興獻帝璁亦除南京刑部主事以去追崇議且寢至嘉靖三年正月帝得桂萼疏心動復下廷議汪俊代毛澄為禮部執如澄璁乃復上疏曰陛下遵兄終弟及之訓倫序當立禮官不思陛下實入繼大統之君而強比與為人後之例絶獻帝天性之恩蔑武宗相傳之統致陛下父子伯姪兄弟名實俱紊寧負天子不敢忤權臣此何心也伏睹聖諭云興獻王獨生朕一人既不得承緒又不得徽稱罔極之恩何由得報執政窺測上心有見於推尊之重故今日爭一帝字明日爭一皇字而陛下之心亦日以不帝不皇為歉既而加稱為帝謂陛下心既慰矣故留一皇字以覘陛下將來未盡之心遂敢稱孝宗為皇考稱興獻帝為本生父父子之名既更推崇之義安在乃遽詔告天下乘陛下不覺陷以不孝禮曰君子不奪人之親亦不可奪親也陛下尊為萬乘父子之親人可得而奪之又可容人之奪之乎故今日之禮不在皇與不皇惟在考與不考若徒爭一皇字則執政必姑以是塞今日之議陛下亦姑以是滿今日之心臣恐天下知禮者必將非笑無已也與桂萼第二疏同上帝益大喜立召兩人赴京命未達兩人及黃宗明黃綰復合疏力爭及獻帝改稱本生皇考閣臣以尊稱既定請停召命帝不得已從之二人已在道復馳疏曰禮官懼臣等面質故先為此術求遂其私若不亟去本生之稱天下後世終以陛下為孝宗之子墮禮官欺蔽中矣帝益心動趣召二人五月抵都復條上七事衆洶洶欲撲殺之萼懼不敢出璁閲數日始朝給事御史張翀鄭本公等連章力攻帝益不悅特授二人翰林學士二人力辭且請面折廷臣之非給事御史李學曾吉棠等言璁萼曲學阿世聖世所必誅以傳奉為學士纍聖德不少御史段續陳相又特疏論並及席書帝責學曾等對狀下續相詔獄刑部尚書趙鑑亦請置璁萼於理語人曰得俞旨便捶殺之帝責以朋奸亦令對狀璁萼乃復列欺罔十三事力折廷臣及廷臣伏闕哭爭盡繫詔獄豫杖死杖下者十餘人貶竄相繼由是璁等勢大張其年九月卒用其議定尊稱帝益眷倚璁萼璁萼益恃寵讐廷臣舉朝士大夫咸切齒此數人矣四年冬大禮集議成進詹事兼翰林學士後議世廟神道廟樂武舞及太后謁廟帝率倚璁言而決璁緣飾經文委曲當帝意帝益器之璁急圖柄用為大學士費宏所抑遂與萼連章攻宏帝亦知其情留宏不即放五年七月璁以省墓請既辭朝帝復用為兵部右侍郎兼官如故給事中杜桐楊言趙廷瑞交章力詆並劾吏部尚書廖紀引用邪人帝怒切責之兩京給事御史解一貫張録方紀達戴繼先等復交章論不已皆不聽尋進璁左侍郎復與萼攻費宏明年二月興王邦奇獄搆陷楊廷和等宏及石珤同日罷吏部郎中彭澤以浮躁被斥璁言昔議禮時澤勸臣進大禮或問致招衆忌今諸臣去之將以次去臣等澤乃得留居三日復言臣與舉朝抗四五年舉朝攻臣至百十疏今修大禮全書元惡寒心羣奸側目故要略方進讒謗繁興使全書告成將誣陷益甚因引疾求退以要帝帝優詔慰留吏部闕尚書推前尚書喬宇楊旦禮部尚書亦缺推侍郎劉龍溫仁和仁和以俸深爭璁言宇旦乃楊廷和黨而仁和亦不宜自薦帝命大臣休致者非奉詔不得推舉宇等遂廢璁積怒廷臣日謀報復會山西巡按馬録治反賊李福達獄詞連武定侯郭勛法司讞如録擬璁讒於帝謂廷臣以議禮故陷勛帝果疑諸臣朋比乃命璁署都察院桂萼署刑部方獻夫署大理覆讞盡反其獄傾諸異己者大臣顏頤壽聶賢以下咸被搒掠録等坐罪遠竄帝益以為能奬勞之便殿賚二品服三代封誥京察及言官互糾已黜御史十三人璁掌憲復請考察斥十二人又奏行憲綱七條鉗束巡按御史其年冬遂拜禮部尚書兼文淵閣大學士入參機務去釋褐六年耳楊一清為首輔翟鑾亦在閣帝待之不如璁嘗諭璁朕有密諭毋泄朕與卿帖悉親書璁因引仁宗賜楊士奇等銀章事帝賜璁二章文曰忠良貞一曰繩愆弼違因並及一清等璁初拜學士諸翰林恥之不與並列璁深恨及侍讀汪佃講洪範不稱旨帝令補外璁乃請自講讀以下量才外補改官及罷黜者二十二人諸庶吉士皆除部屬及知縣由是翰苑為空七年正月帝視朝見璁萼班兵部尚書李承勛下意嗛之一清因請加散官乃手敕加二人太子太保璁辭以未建青宮官不當設乃更加少保兼太子太保明倫大典成復進少傅兼太子太傅吏部尚書謹身殿大學士一清再相頗由璁萼力傾心下二人而璁終以壓於一清不獲盡如意遂相齟齬指揮聶能遷劾璁璁欲置之死一清擬旨稍輕璁益恨斥一清為奸人鄙夫一清再疏引退且刺璁隱情帝手敕慰留因極言璁自伐其能恃寵不讓良可歎息璁見帝忽暴其短頗愧沮八年秋給事中孫應奎劾一清萼並及璁其同官王準復劾璁私參將陳璠宜斥璁乞休者再詞多陰詆一清帝乃褒諭璁而給事中陸粲復劾其擅作威福報復恩怨帝大感悟立罷璁頃之其黨霍韜力攻一清微為璁白璁行抵天津帝命行人齎手敕召還一清遂罷去璁為首輔帝自排廷議定大禮遂以制作禮樂自任而夏言始用事乃議皇后親蠶議勾龍棄配社稷議分祭天地議罷太宗配祀議朝日夕月別建東西二郊議祀高禖議文廟設主更從祀諸儒議祧德祖正太祖南向議祈穀議大禘議帝社帝稷奏必下璁議顧帝取獨斷璁言亦不盡入其諫罷太宗配天三四往復卒弗能止也十年二月璁以名嫌御諱請更乃賜名孚敬字茂恭御書四大字賜焉夏言恃帝眷數以事訐孚敬孚敬銜之未有以發納彭澤言搆陷行人司正薛侃因侃以害言廷鞫事露旨斥其忮罔御史談纘端廷赦唐愈賢交章劾之帝諭法司令致仕孚敬乃大慚去未幾遣行人齎敕召之明年三月還朝言已擢禮部尚書益用事李時翟鑾在閣方獻夫繼入孚敬亦不能專恣如曩時矣八月彗星見東井帝心疑大臣擅政孚敬因求罷都給事中魏良弼詆孚敬奸孚敬言良弼以濫舉京營官奪俸由臣擬旨挾私報復給事中秦鰲劾孚敬強辨飾奸言官論列輒文致其罪擬旨不密引以自歸明示中外若天子權在其掌握帝是鰲言令孚敬自陳狀許之致仕李時請給廩隸敕書不許再請乃得馳傳歸十二年正月帝復思之遣鴻臚齎敕召四月還朝六月彗星復見畢昴間乞避位不許明年進少師兼太子太師華蓋殿大學士初潞州陳卿亂孚敬主用兵賊竟滅大同再亂亦主用兵薦劉源清為總督師久無功其後亂定代王請大臣安輯夏言遂力詆用兵之謬請如王言語多侵孚敬孚敬怒持王疏不行帝諭令與言交好而遣黃綰之大同相機行事孚敬以議不用稱疾乞休疏三上已而子死請益力帝報曰卿無疾疑朕耳孚敬復上奏不引咎且歷詆同議禮之萼獻夫韜綰等帝詰責之乃復起視事帝於文華殿後建九五齊恭默室為齊居所命輔臣賦詩孚敬及時各為四首以上已數召見便殿從容議政十四年春得疾帝遣中官賜尊牢而與時言頗及其執拗且不惜人才以叢怨狀又遣中官賜藥餌手敕言古有剪鬚療大臣疾者朕今以己所服者賜卿孚敬幸得溫諭遂屢疏乞骸骨命行人御醫護歸有司給廩隸如制明年五月帝復遣錦衣官齎手敕視疾趣其還行至金華疾大作乃歸十八年二月卒帝在承天聞之傷悼不已孚敬剛明果敢不避嫌怨既遇主亦時進讜言帝欲坐張延齡反族其家孚敬諍曰延齡守財虜耳何能反數詰問對如初及秋盡當論孚敬上疏謂昭聖皇太后春秋高卒聞延齡死萬一不食有他故何以慰敬皇帝在天之靈帝恚責孚敬自古強臣令主非一若今愛死囚令主矣當悔不從廷和事敬皇帝耶帝故為重語愒止孚敬而孚敬意不已以故終昭聖皇太后世延齡得長繫他若清勛戚莊田罷天下鎮守內臣先後殆盡皆其力也持身特廉痛惡贓吏一時苞苴路絶而性狠愎報復相尋不護善類欲力破人臣私黨而己先為黨魁大禮大獄叢詬沒世顧帝始終眷禮廷臣卒莫與二嘗稱少師羅山而不名其卒也禮官請諡帝取危身奉上之義特諡文忠贈太師時有胡鐸者字時振餘姚人弘治末進士正德中官福建提學副使嘉靖初遷湖廣參政纍官南京太僕卿鐸與璁同舉於鄉大禮議起鐸意亦主考獻王與璁合璁要之同署鐸曰主上天性固不可違天下人情亦不可拂考獻王不已則宗宗不已則入廟入廟則當有祧以藩封虛號之帝而奪君臨治世之宗義固不可也入廟則有位將位於武宗上乎武宗下乎生為之臣死不得躋於君然魯嘗躋僖公矣恐異日不乏夏父之徒也璁議遂上旋被召鐸方服闋赴京璁又要同疏鐸復書謝之且與辨繼統之義大禮既定鐸又貽書勸召還議禮諸人養和平之福璁不能從鐸與王守仁同鄉不宗其學與璁同以考獻王為是不與同進然其辨繼統謂國統絶而立君寓立賢之意蓋大謬云桂萼字子實安仁人正德六年進士除丹徒知縣性剛使氣屢忤上官調青田不赴用薦起知武康復忤上官下吏嘉靖初由成安知縣遷南京刑部主事世宗欲尊崇所生廷臣力持已稱興獻王為帝妃為興國太后頒詔天下二歲矣萼與張璁同官乃以二年十一月上疏曰臣聞帝王事父孝故事天明事母孝故事地察未聞廢父子之倫而能事天地主百神者也今禮官失考典章遏絶陛下純孝之心納陛下於與為人後之非而滅武宗之統奪獻帝之宗且使興國太后壓於慈壽太后禮莫之盡三綱頓廢非常之變也乃自張璁霍韜獻議論者指為干進逆箝人口致達禮者不敢駁議切念陛下侍興國太后慨興獻帝弗祀已三年矣拊心出涕不知其幾願速發明詔稱孝宗曰皇伯考興獻帝皇考別立廟大內正興國太后之禮定稱聖母庶協事天事地之道至朝臣所執不過宋濮議耳按宋范純仁告英宗曰陛下昨受仁宗詔親許為之子至於封爵悉用皇子故事與入繼之主不同則宋臣之論亦自有別今陛下奉祖訓入繼大統未嘗受孝宗詔為之子也則陛下非為人後而為入繼之主也明甚考興獻帝母興國太后又何疑臣聞非天子不議禮天下有道禮樂自天子出臣久欲以請乃者復得席書方獻夫二疏伏望奮然裁斷將臣與二臣疏並付禮官令臣等面質帝大喜明年正月手批議行三月萼復上疏曰自古帝王相傳統為重嗣為輕故高皇帝法前王著兄終弟及之訓陛下承祖宗大統正遵高皇帝制執政乃無故任己私背祖訓其為不道尚可言哉臣聞道路人言執政窺伺陛下至情不已則加一皇字而已夫陛下之孝其親不在於皇不皇惟在於考不考使考獻帝之心可奪雖加千百字徽稱何益於孝陛下遂終其身為無父人矣逆倫悖義如此猶可使與斯議哉與璁疏並上帝益大喜召赴京初議禮諸臣無力詆執政者至萼遂斥為不道且欲不使議其言恣肆無忌朝士尤疾之召命下衆益駭愕羣起排擊帝不為動萼復偕璁論列不已遂召為翰林學士卒用其言萼自是受知特深四年春給事中柯維熊言陛下親君子而君子不容如林俊孫交彭澤之去是也遠小人而小人尚在如張璁桂萼之用是也且今伏闕諸臣多死徙而御史王懋郭楠又謫譴竊以為罰過重矣萼璁遂求去優詔慰留尋進詹事兼翰林學士議世廟神道及太后謁廟禮復排廷議希合帝指帝益以為賢兩人氣益盛而閣臣抑之不令與諸翰林等兩人乃連章攻費宏並石珤齮之去給事中陳洸犯重辟萼與尚書趙鑑攘臂爭為南京給事中所劾不問嘗陳時政請預蠲六年田租更登極初宿弊寬登聞鼓禁約復塞上開中制懲奸徒阻絶養濟院聽窮民耕城垣陾地停外吏赴部考滿申聖敬廣聖孝凡數事多議行六年三月進禮部右侍郎兼官如故時方京察南京言官拾遺及萼萼上言故輔楊廷和廣植私黨蔽聖聰者六年今次第斥逐然遺奸在言路昔憲宗初年命科道拾遺後互相糾劾言路遂清請舉行如制章下吏部侍郎孟春等言憲宗無此詔萼被論報復無以厭衆心萼言詔出憲宗文集春欲媚言官宜並按問章下部再議春等言成化中科道有超擢巡撫不稱者憲宗命互劾去者七人非考察拾遺比帝終然萼言趣令速舉給事御史爭之並奪俸春等乃以御史儲良才等四人名上帝獨黜良才而特旨斥給事中鄭自璧孟奇且令部院再核復黜給事中余經等四人南京給事中顧溱等數人乃已其年九月改吏部左侍郎是月拜禮部尚書兼翰林學士故事尚書無兼學士者自萼始甫踰月遷吏部尚書賜銀章二曰忠誠靜慎曰繩愆匡違令密封言事與輔臣埒七年正月手敕加太子太保明倫大典成加少保兼太子太傅萼既得志日以報怨為事陳九疇李福達陳洸之獄先後株連彭澤馬録葉應驄等甚衆或被陷至謫戍廷臣莫不畏其凶威獨疏薦建言獲罪鄧繼曾季本等因事貶謫黃國用劉秉鑑等諸人得量移世亦稍以此賢萼然王守仁之起也萼實薦之已銜其不附己力齮齕及守仁卒極言醜詆奪其世封諸恤典皆不豫八年二月命以本官兼武英殿大學士入參機務初萼璁赴召廷臣欲倣先朝馬順故事於左順門捶殺之走武定侯郭勛家以免勛遂與深相結亦蒙帝眷典禁兵久之勛奸狀大露璁霍韜力庇勛萼知帝已惡之獨疏其凶暴貪狡數事勛遂獲罪楊一清為首輔持重萼璁好紛更且惡其壓己遂不相能給事中孫應奎請鑒別三臣賢否詆萼最力帝已疑萼令滌宿愆全君臣終始之義萼乃大懼疏辨且稱疾乞休帝報曰卿行事須勉徇公議庶不負前日忠萼益懼給事中王準因劾萼舉私人李夢鶴為御醫詔下吏部言夢鶴由考選無私帝終以為疑命太醫院更考言官知帝意已移給事中陸粲極論其罪並言夢鶴與萼家人吳從周序班桂林居間行賄事奏入帝大悟立奪萼官以尚書致仕璁亦罷政帝復列二人罪狀詔廷臣略言其自用自恣負君負國所為事端昭然衆見而萼尤甚法當置刑典特寬貸之遂下夢鶴等法司皆首服無何霍韜兩疏訟萼言一清與法司搆成萼贓罪一清遂去位刑部尚書周倫調南京郎中員外皆奪職命法司會錦衣鎮撫官再讞乃言夢鶴等假託行私與萼無與詔削夢鶴林籍從周論罪萼復散官是時璁已召還史館儒士蔡圻知帝必復萼疏頌萼功請召之帝乃賜敕令撫按官趣上道萼未至國子生錢潮等復請趣萼帝怒曰大臣進退𡺣麼敢與聞耶並圻下吏明年四月還朝盡復所奪官仍參機務萼初鋭意功名勇任事不恤物議驟被摧抑氣為之懾不敢復放恣居位數月屢引疾帝輒優旨慰留十年正月得請歸卒於家贈太傅諡文襄萼所論奏帝王心學論皇極論易復卦禮月令及進禹貢圖輿地圖說皆有裨君德時政性猜狠好排異己以故不為物論所容始與璁相得歡甚比同居政府遂至相失方獻夫字叔賢南海人生而孤弱冠舉弘治十八年進士改庶吉士乞歸養母遂丁母憂正德中授禮部主事調吏部進員外郎與主事王守仁論學悅之遂請為弟子尋謝病歸讀書西樵山中者十年嘉靖改元夏還朝道聞大禮議未定草疏曰先王制禮本緣人情君子論事當究名實竊見近日禮官所議有未合乎人情未當乎名實者一則守禮經之言一則循宋儒之說也臣獨以為不然按禮經喪服傳曰何如而可以為人後支子可也又曰為人後者孰後後大宗也大宗者尊之統也不可以絶故族人以支子後大宗也適子不得後大宗為是禮者蓋謂有支子而後可以為人後未有絶人之後以為人後者也今興獻帝止生陛下一人別無支庶乃使絶其後而後孝宗豈人情哉且為人後者父嘗立之為子子嘗事之為父故卒而服其服今孝宗嘗有武宗矣未嘗以陛下為子陛下於孝宗未嘗服三年之服是實未嘗後孝宗也而強稱之為考豈名實哉為是議者未見其合於禮經之言也又按程頤濮議謂英宗既以仁宗為父不當以𣾴王為親此非宋儒之說不善實今日之事不同蓋仁宗嘗育英宗於宮中是實為父子孝宗未嘗育陛下於宮中其不同者一孝宗有武宗為子矣仁宗未嘗有子也其不同者二濮王別有子可以不絶興獻帝無別子也其不同者三豈得以濮王之事比今日之事哉為是議者未見其善述宋儒之說也若謂孝宗不可無後故必欲陛下為子此尤不達於大道者也推孝宗之心所以必欲有後者在不絶祖宗之祀不失天下社稷之重而已豈必拘拘父子之稱而後為有後哉孝宗有武宗武宗有陛下是不絶祖宗之祀不失天下社稷之重矣是實為有後也且武宗君天下十有六年不忍孝宗之無後獨忍武宗之無後乎此尤不通之說也夫興獻帝當父也而不得父孝宗不當父也而強稱為父武宗當繼也而不得繼是一舉而三失焉臣未見其可也且天下未嘗有無父之國也瞽瞍殺人舜竊負而逃今使陛下舍其父而有天下陛下何以為心哉臣知陛下純孝之心寧不有天下決不忍不父其父也說者又謂興獻帝不當稱帝此尤不達於大道者也孟子曰孝子之至莫大乎尊親周公追王太王王季子思以為達孝豈有子為天子父不得稱帝者乎今日之事臣嘗為之說曰陛下之繼二宗當繼統而不繼嗣興獻之異羣廟在稱帝而不稱宗夫帝王之體與士庶不同繼統者天下之公三王之道也繼嗣者一人之私後世之事也興獻之得稱帝者以陛下為天子也不得稱宗者以實未嘗在位也伏乞宣示朝臣復稱孝宗曰皇伯興獻帝曰皇考別立廟祀之夫然後合於人情當乎名實非唯得先王制禮之意抑亦遂陛下純孝之心矣疏具見廷臣方抵排異議懼不敢上為桂萼所見與席書疏並表上之帝大喜立下廷議廷臣遂目獻夫為奸邪至不與往還獻夫乃杜門乞假既不得請則進大禮上下二論其說益詳時已召張璁桂萼於南京至即用為翰林學士而用獻夫為侍講學士攻者四起獻夫亦力辭帝卒用諸人議定大禮由是荷帝眷與璁萼埒四年冬進少詹事獻夫終不自安謝病歸六年召修明倫大典獻夫與霍韜同里以議禮相親善又同赴召乃合疏言自古力主為後之議者宋莫甚於司馬光漢莫甚於王莽主濮議者光為首呂誨范純仁呂大防附之而光之說惑人最甚主哀帝議者莽為首師丹甄邯劉歆附之而莽之說流毒最深宋儒祖述王莽之說以惑萬世誤後學臣等謹按漢書魏志宋史略采王莽師丹甄邯之奏與其事始末及魏明帝之詔濮園之議論正以附其後乞付纂修官參互考訂俾天下臣子知為後之議實起於莽宋儒之論實出於莽下洗羣疑上彰聖孝詔下其書於史館還朝未幾命署大理寺事與璁萼覆讞李福達獄萼等議馬録重辟獻夫力爭得減死其年九月拜禮部右侍郎仍兼學士直經筵日講尋代萼為吏部左侍郎復代為禮部尚書明倫大典成加太子太保獻夫視璁萼性寬平遇事亦間有執持不盡與附會萼反陳洸獄請盡逮問官葉應驄等以獻夫言多免逮思恩田州比歲亂獻夫請專任王守仁而罷鎮守中官鄭潤總兵官朱騏帝乃召潤騏還思田既平守仁議築城建邑萼痛詆之獻夫歷陳其功狀築城得毋止璁萼與楊一清搆獻夫因災異進和衷之說且請收召謫戍削籍余寬馬明衡輩而倍取進士之數帝優詔答之寬等卒不用獻夫以尼僧道姑傷風化請勒令改嫁帝從之又因霍韜言盡汰僧道無牒毀寺觀私創者帝欲殺陳后喪獻夫引禮固爭尋復代萼為吏部尚書萼璁罷政詔吏部核兩人私黨獻夫言陸粲等所劾百十人誣者不少昔攻璁萼者以為黨而去之今附璁萼者又以為黨而去之縉紳之禍何時已乃奏留黃綰等二十三人而黜儲良才等十二人良才者初為御史以考察黜上疏詆楊廷和指吏部侍郎孟春等為奸黨萼因請復其職至是斥去時論快之安昌伯錢維圻卒庶兄維垣請嗣爵獻夫言外戚之封不當世及歷引漢唐宋事為證帝善其言下廷議外戚遂永絶世封璁萼既召還羽林指揮劉永昌劾都督桂勇語侵萼及兵部尚書李承勛又劾御史廖自顯自顯坐逮已又訐兵部郎中盧襄等獻夫請按治永昌毋令奸人以蜚語中善類帝不從獻夫遂求退帝亦不允給事中孫應奎劾獻夫私其親故大理少卿洗光太常卿彭澤帝不聽都給事中夏言亦劾獻夫壞選法徙張璁所惡浙江參政黃卿於陝西而用璁所愛党以平代邪回之彭澤踰等躐遷太常及他所私昵皆有迹疑獻夫交通賄賂疏入帝令卿等還故官獻夫及璁疏辨因引退帝重違二人意復令卿等如前擬頃之給事中薛甲言劉永昌以武夫劾冢宰張瀾以軍餘劾勛臣下凌上替不知所止願存廉遠堂高之義俾小人不得肆攻訐章下吏部獻夫等請從甲言敕都察院嚴禁吏民毋得譸張亂政並飭兩京給事御史及天下撫按官論事先大體毋責小疵當是時帝方欲廣耳目周知百僚情僞得獻夫議不懌報罷於是給事中饒秀劾甲阿附自劉永昌後言官未聞議大臣獨夏言孫應奎趙漢議及璁獻夫耳漢已蒙詰譴言應奎所奏皆用人行政之失甲乃指為毛舉細故而頌大臣不已貪縱如郭勛亦不欲人言必使大臣橫行羣臣緘口萬一有逆人厠其間何奏入帝心善其言下吏部再議甲具疏自明帝惡其不俟部奏命削二官出之外部謂甲已處分不復更議帝責令置對停獻夫俸一月郎官倍之獻夫不自得兩疏引疾帝即報允然猶虛位以俟十年秋有詔召還獻夫疏辭舉梁材汪鋐王廷相自代帝手詔褒答遣行人蔡靉趣之靉及門獻夫潛入西樵以疾辭既而使命再至云將別用乃就道明年五月至京命以故官兼武英殿大學士入閣輔政初賜獻夫銀章曰忠誠直諒令有事密封奏聞獻夫歸上之朝至是復賜如故吏部尚書王瓊卒命獻夫掌之獻夫家居引體自尊監司謁見輒稱疾不報家人姻黨橫於郡中鄉人屢訐告僉事龔大稔聽之獻夫還朝囑大稔會大稔坐事落職疑獻夫為之遂上疏列其不法數事詞連霍韜獻夫疏辨帝方眷獻夫大稔遂被逮削籍十月彗見東井御史馮恩詆獻夫凶奸肆巧辨播弄威福將不利於國家故獻夫掌吏部而彗見帝怒下之獄獻夫亦引疾乞休優詔不允獻夫飾恬退名連被劾中恧雖執大政氣厭厭不振獨帝欲殺張延齡常力爭而其時桂萼已前卒張璁最寵罷相者屢矣霍韜黃宗明言事一不當輒下之吏獻夫見帝恩威不測居職二歲三疏引疾帝優詔許之令乘傳豫道里費家居十年卒先已加柱國少保乃贈太保諡文襄獻夫緣議禮驟貴與璁萼共事持論頗平恕故人不甚惡之夏言字公謹貴溪人父鼎臨清知州言舉正德十二年進士授行人擢兵科給事中性警敏善屬文及居言路謇諤自負世宗嗣位疏言正德以來壅蔽已極今陛下維新庶政請日視朝後御文華殿閲章疏召閣臣面決或事關大利害則下廷臣集議不宜謀及褻近徑發中旨聖意所豫奪亦必下內閣議而後行絶壅蔽矯詐之弊帝嘉納之奉詔偕御史鄭本公主事汪文盛核親軍及京衛冗員汰三千二百人復條九事以上輦下為肅清嘉靖初偕御史樊繼祖等出按莊田悉奪還民産劾中官趙霦建昌侯張延齡疏凡七上請改後宮負郭莊田為親蠶廠公桑園一切禁戚里求請及河南山東奸人獻民田王府者救被逮永平知府郭九皋莊奉夫人弟邢福海肅奉夫人弟顧福傳旨授錦衣世千戶言力爭不可諸疏率諤諤為人傳誦屢遷兵科都給事中勘青羊山平賊功罪論奏悉當副使牛鸞獲賊中交通名籍言請毀之以安衆心孝宗朝令吏兵二部每季具兩京大臣及在外文武方面官履歷進御正德後漸廢以言請復之七年調吏科當是時帝鋭意禮文事以天地合祀非禮欲分建二郊並日月而四大學士張孚敬不敢決帝卜之太祖亦不吉議且寢會言上疏請帝親耕南郊后親蠶北郊為天下倡帝以南北郊之說與分建二郊合令孚敬諭旨言乃請分祀天地廷臣持不可孚敬亦難之詹事霍韜詆尤力帝大怒下韜獄降璽書奬言賜四品服俸卒從其請又贊成二郊配饗議語詳禮志言自是大蒙帝眷郊壇工興即命言監之延綏饑言薦僉都御史李如圭為巡撫吏部推代如圭者帝不用再推及言御史熊爵謂言出如圭為己地至比之張綵帝切責爵令言毋辨而言不平訐爵且辭新命帝乃止孚敬頤指百僚無敢與抗者言自以受帝知獨不為下孚敬乃大害言寵言亦怨孚敬驟用彭澤為太常卿不右己兩人遂有隙言抗疏劾孚敬及吏部尚書方獻夫孚敬獻夫皆疏辨求去帝顧諸人厚為兩解之言既顯與孚敬獻夫韜為難益以強直厚自結帝欲輯郊禮為成書擢言侍讀學士充纂修官直經筵日講仍兼吏科都給事中言又贊帝更定文廟祀典及大禘禮帝益喜十年三月遂擢少詹事兼翰林學士掌院事直講如故言眉目疏朗美鬚髯音吐弘暢不操鄉音每進講帝必目屬欲大用之孚敬忌彌甚遂與彭澤搆薛侃獄下言法司已帝覺孚敬曲乃罷孚敬而釋言八月四郊工成進言禮部左侍郎仍掌院事踰月代李時為本部尚書去諫官未浹歲拜六卿前此未有也時士大夫猶惡孚敬恃言抗之言既以開敏結帝知又折節下士御史喻希禮石金請宥大禮大獄得罪諸臣帝大怒令言劾言謂希禮金無他腸請帝寬恕帝責言對狀逮二人詔獄遠竄之言引罪乃已以是大得公卿間聲帝制作禮樂多言為尚書時所議閣臣李時翟鑾取充位帝每作詩輒賜言悉酬和勒石以進帝益喜奏對應制倚待立辦數召見咨政事善窺帝旨有所傅會賜銀章一俾密封言事文曰學博才優先後賜繡蟒飛魚麒麟服玉帶兼金上尊珍饌時物無虛月孚敬獻夫復相繼入輔知帝眷言厚亦不敢與較已而皆謝事議禮諸人獨霍韜在讎言不置十五年以順天府尹劉淑相事韜言相攻訐韜卒不勝事詳韜傳中言由是氣遂驕郎中張元孝李遂與小忤即奏謫之皇子生帝賜言甚渥初加太子太保進少傅兼太子太傅閏十二月遂兼武英殿大學士入參機務扈蹕謁陵還至沙河言庖中火延郭勛李時帳帝付言疏六亦焚言當獨引罪與勛等合謝被譙責焉時李時為首輔政多自言出顧鼎臣入恃先達且年長頗欲有所可否言意不悅鼎臣遂不敢與爭其冬時卒言為首輔十八年以祗薦皇天上帝冊表加少師特進光祿大夫上柱國明世人臣無加上柱國者言所自擬也武定侯郭勛得幸害言寵而禮部尚書嚴嵩亦心妒言言與嵩扈蹕承天帝謁顯陵畢嵩再請表賀言乞俟還京帝報罷意大不懌嵩知帝指固以請帝乃曰禮樂自天子出可也令表賀帝自是不悅言帝幸大峪山言進居守敕稍遲帝責讓言懼請罪帝大怒曰言自卑官因孚敬議郊禮進乃怠慢不恭進密疏不用賜章其悉還纍所降手敕言益懼疏謝請免追銀章手敕為子孫百世榮詞甚哀帝怒不解疑言毀損令禮部追取削少師勳階以少保尚書大學士致仕言乃以手敕四百餘並銀章上之居數日怒解命止行復以少傅太子太傅入直言疏謝帝悅諭令勵初忠秉公持正免衆怨言心知所云衆怨者郭勛輩也再疏謝謂自處不敢後他人一志孤立為衆所忌帝復不悅詰責之惶恐謝乃已未幾雷震奉天殿召言及鼎臣不時至帝復詰讓令禮部劾之言等請罪帝復讓言傲慢並責鼎臣已乃還所追銀章御書陝西奏捷復少師太子太師進吏部尚書華蓋殿江淮賊平璽書奬勵賜金幣兼支大學士俸鼎臣已歿翟鑾再入恂恂若屬吏然不敢少齟齬而霍韜入掌詹事府數修怨以郭勛與言有隙結令助己三人日相搆既而韜死言勛交惡自若九廟災言方以疾在告乞罷不允昭聖太后崩詔問太子服制言報疏有訛字帝切責言言謝罪且乞還家治疾帝益怒令以少保尚書大學士致仕言始聞帝怒己上御邊十四策冀以解帝曰言既蘊忠謀何堅自愛負朕眷倚姑不問初言撰青詞及他文最當帝意言罷獨翟鑾在非帝所急也及將出都詣西苑齊宮叩首謝帝聞而憐之特賜酒饌俾還私第治疾俟後命會郭勛以言官重劾亦引疾在告京山侯崔元新有寵直內苑忌勛帝從容問元言勛皆朕股肱相妒何也元不對帝問言歸何時曰俟聖誕後始敢請又問勛何疾曰勛無疾言歸即出耳帝頷之言官知帝眷言惡勛因共劾勛勛辨語悖謾帝怒削勛同事王廷相籍給事中高時者言所厚也盡發勛貪縱不法十數事遂下勛獄復言少傅太子太師禮部尚書武英殿大學士疾愈入直言雖在告閣事多取裁治勛獄悉其指授二十一年春一品九年滿遣中使賜銀幣寶鈔羊酒內饌盡復其官階璽書奬美賜宴禮部尚書侍郎都御史陪侍當是時帝雖優禮言然恩眷不及初矣慈慶慈寧兩宮宴駕勛嘗請改其一居太子言不可合帝意至是帝猝問太子當何居言忘前語念興作費煩對如勛指帝不悅又疑言官劾勛出言意及建大享殿命中官高忠監視言不進敕入直西苑諸臣帝皆令乘馬又賜香葉束髮巾用皮帛為履言謂非人臣法服不受又獨乘腰輿帝積數憾欲去言而嚴嵩因得間之嵩與言同鄉稱先達事言甚謹言入閣援嵩自代以門客畜之嵩心恨甚言既失帝意嵩日以柔佞寵言懼斥呼嵩與謀嵩則已潛造陶仲文第謀齮言代其位言知甚慍諷言官屢劾嵩帝方憐嵩不聽也兩人遂大郤六月嵩燕見頓首雨泣訴言見凌狀帝使悉陳言罪嵩因振暴其短帝大怒手敕禮部歷數言罪且曰郭勛已下獄猶千羅百織言官為朝廷耳目專聽言主使朕不早朝言亦不入閣軍國重事取裁私家王言要密視等戲玩言官不一言徒欺謗君上致神鬼怒雨甚傷禾言大懼請罪居十餘日獻帝諱辰猶召入拜候直西苑言因謝恩乞骸骨語極哀疏留八日會七月朔日食既下手詔曰日食過分正坐下慢上之咎其落言職閒住帝又自引三失布告天下御史喬佑給事中沈良才等皆具疏論言且請罪帝大怒貶黜十三人高時以劾勛故獨謫遠邊於是嚴嵩遂代言入閣言久貴用事家富厚服用豪侈多通問遺久之不召監司府縣吏亦稍慢易之悒悒不樂遇元旦聖壽必上表賀稱草土臣帝亦漸憐之復尚書大學士至二十四年帝微覺嵩貪恣復思言遣官齎敕召還盡復少師諸官階亦加嵩少師若與言並者言至直陵嵩出其上凡所批答略不顧嵩嵩噤不敢吐一語所引用私人言斥逐之亦不敢救銜次骨海內士大夫方怨嵩貪忮謂言能壓嵩制其命深以為快而言以廢棄久務張權文選郎高簡之戍唐龍許成名崔桐王用賓黃佐之罷王杲王暐孫繼魯之獄皆言主之貴州巡撫王學益山東巡撫何鰲為言官論劾輒擬旨逮訊龍故與嵩善暐事牽世蕃其他所譴逐不盡當朝士仄目最後御史陳其學以鹽法事劾崔元及錦衣都督陸炳言擬旨令陳狀皆造言請死炳長跪乃得解二人與嵩比而搆言言未之悟也帝數使小內豎詣言所言負氣岸奴視之嵩必延坐親納金錢袖中以故日譽嵩而短言言進青詞往往失帝旨嵩聞益精治其事未幾河套議起言故慷慨以經濟自許思建立不世功因陝西總督曾銑請復河套贊決之嵩與元炳媒孽其間竟以此敗江都人蘇綱者言繼妻父也雅與銑善銑方請復河套綱亟稱於言言倚銑可辦密疏薦之謂羣臣無如銑忠者帝令言擬旨優奬之者再銑喜益鋭意出師帝忽降旨詰責語甚厲嵩揣知帝意遂力言河套不可復語侵言言始大懼謝罪且言嵩未嘗異議今乃盡諉於臣帝責言強君脅衆嵩復騰疏攻言言亦力辨而帝已入嵩譖怒不可解二十七年正月盡奪言官階以尚書致仕猶無意殺之也會有蜚語聞禁中謂言去時怨謗嵩復代仇鸞草奏訐言納銑金交關為奸利事連蘇綱遂下銑綱詔獄嵩與元炳謀坐銑交結近侍律斬綱戍邊遣官校逮言言抵通州聞銑所坐大驚墮車曰噫吾死矣再疏訟冤言鸞方就逮上降諭不兩日鸞何以知上語又何知嵩疏而附麗若此蓋嵩與崔元輩詐為之以傾臣嵩靜言庸違似共工謙恭下士似王莽奸巧弄權父子專政似司馬懿在內諸臣受其牢籠知有嵩不知有陛下在外諸臣受其箝制亦知有嵩不知有陛下臣生死係嵩掌握惟歸命聖慈曲賜保全帝不省獄成刑部尚書喻茂堅左都御史屠僑等當言死援議貴議能條以上帝不從切責茂堅等奪其俸猶及言前不戴香冠事其年十月竟棄言市妻蘇流廣西從子主事克承從孫尚寶丞朝慶削籍為民言死時年六十有七言豪邁有俊才縱橫辨博人莫能屈既受特眷揣帝意不欲臣下黨比遂日與諸議禮貴人抗帝以為不黨遇益厚然卒為嚴嵩所擠言死嵩禍及天下久乃多惜言者而言所推轂徐階後卒能去嵩為名相隆慶初其家上書白冤狀詔復其官賜祭葬諡文愍言始無子妾有身妻忌而嫁之生一子言死妻逆之歸貌甚類言且得官矣忽病死言竟無後贊曰璁萼獻夫議尊興獻帝本人子至情故其說易入原其初議未嘗不準情禮之中乃至遭時得君動引議禮自固務快恩讎於是知其建議之心非有惓惓忠愛之實欲引其君於當道也言所奏定典禮亦多可採而志驕氣溢卒為嵩所擠究觀諸人立身本末與所言是非固兩不相掩云
