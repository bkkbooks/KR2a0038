光霓旌樹紫蓋張璇臺玉曆轉新陽鈞天廣樂諧宮商恩深露湛喜溢霞觴日月煥龍章地久天長奏表正萬邦舞曲其一慶太平維天眷我聖明禮圜丘至德精誠乾元永清洪膺景命休徵應泰階平其二千秋歲聖主乘龍御萬邦慶雲翔化日重光羣臣拜舞稱壽觴載歌天保章其三滾繡毬五雲車度九重利見飛龍耀袞章火藻華蟲擊虎敔考鐘鼉鼓逢逢八珍列九鼎豐隆堯眉揚彩舜重瞳萬國咸熙四海雍齊歌頌聖德神功其四殿前歡萬年禮樂中興日大化覩重熙河清海宴臻祥瑞五行順七政齊超三邁五貞元會既醉頌鷖其五天下樂萬靈朝拱接清都享南郊欽天法祖願聖人承乾納祜中和位育龜獻範馬陳圖其六醉太平禮樂萬年規謳歌四海熙衣冠蹈舞九龍墀麗正仰南離紫雲高捧唐虞帝垂衣天下文明治鎬烏岐鳳呈嘉瑞真個是人在成周世六奏慶豐年之曲聖人懋承乾綏萬邦屢豐年神倉御廩登天田明粢鬱鬯祀孔虔輿情咸豫協氣用宣萬古帝圖傳璧合珠聯七奏集禎應之曲天保泰階平寶露降渾河清嘉禾秀麥集休禎遐陬絶域喜氣盈一人有慶百度惟貞萬國頌咸寧麗正重明八奏永皇圖之曲鎬燕集天京頌魚藻歌鹿鳴邊陲安堵萬國寧重譯來庭四海清咸池日曙昧谷雲征帝座仰前星豫大豐亨九奏樂太平之曲皇極永登祥乾符啓泰運昌玉管回春動一陽金鑾錫燕歌九章虞庭獸舞岐山鳳翔日麗袞龍裳主聖臣良迎膳曲水龍吟香霧氤氳紫閣重仰天德瞻帝容星輝海潤甘雨間和風樂比鳶魚瑞呈麟鳳永獻卷阿頌進膳曲其一水龍吟萬戶千門啓建章台階峻帝座張三垣九道北斗玉衡光元氣調和雅韻鏗鏘昭代慶明良其二太清歌萬方國盡來庭稽首歌帝仁仰荷生成振乾綱陰陽順序民物樂生逢明聖萬年春永膺休命華夷蠻僚咸歸正蒼生至老不知兵鼓腹含哺囿太平九有享清寧奏天命有德舞曲其一萬歲樂太平天子興隆日履初長陽回元吉醴泉芝草休徵集曾聞道五星聚室其二賀聖朝一人元良百度維新握赤符凝玄應享太清大禮方行祀事孔明感天心億載恆承慶明王慎德四裔咸賓奏纓鞭得勝蠻夷隊舞承應曲其一醉太平星華紫殿高雲氣彤樓繞九夷重譯梯航到皇圖光八表玉宇無塵明月皎銀河自轉扶桑曉平平蕩蕩歸王道百獸舞鳳鳴簫韶其二看花會普天下都賴吾皇至聖看玉關頻發天山已定四夷效順歸王命天保歌羣黎百姓其三天下樂九重樂奏萬花開望龍樓雲蒸霧靄仰天工雍熙帝載臣民歡戴溥仁恩遍九垓其四清江引黃鍾既奏陽和長德盛天心貺人文日月明國勢山河壯衢室民謠頻擊壤奏致語曲其一清江引鈞天畢奏日方中既醉歡聲動雲章傍袞龍飆勢翔威鳳萬方安樂興嘉頌其二千秋歲上下交歡燕禮成一陽奮萬彙咸亨風雲會合開明運紫極轉璇衡宴畢百官行禮曲朝天子文班武班歡動承明殿禮成樂備頌聲喧真咫尺仰天顏日照龍筵風回雉扇翠蕤旋奉仙鑾雲間斗間五色金章燦還宮曲萬歲樂天回北極雲成瑞望層霄重華日麗九垓八極樂雍熙祝聖壽萬萬歲永樂間小宴樂章一奏本太初之曲朝天子混兮沌兮水土成元氣不分南北與東西未辨天和地萬象包涵其中祕密難窮造化機是陰陽本體乃為之太極兩儀因而立二奏仰大明之曲歸朝歡太極分混然方始見儀形清浮濁偃乾坤定日月齊興照青霄萬象明陽須動陰須靜陰與陽皆相應流行二氣萬物俱生三奏民初生之曲其一沽美酒乾坤清宇宙寧六合淨四維正萬象原來一氣生定三才五行民與物共成羣其二太平令為一類不分人品竟生食豈曉庖烹避寒暑巢居穴遁披樹葉相尋趁如何是愛親世情治生雖混然各安其性四奏品物亨之曲醉太平黎民生世間萬物長塵寰陰陽交運轉循環久遠時庶繁相傳氣候應無間品物交錯憑誰鑒望聖人出世整江山主萬民得安五奏御六龍之曲其一清江引人心久仰生聖君天使人生聖聖人受天機體天居中正御六龍聖明登九重其二碧玉簫君坐神京海嶽共從新民仰君恩聖治有人倫人品分萬物增聖承乾百福臻垂法明尊天命興後朝皆從正六奏泰階平之曲十二月聖乃有言天天是無言聖聖人臨正萬物亨通恩威盛社稷安仁德感江山定選用英賢興王政分善惡賞罰均平三公九卿左右股肱庶事康寧七奏君德成之曲其一十二月皇基以興聖帝修身奉天體道聖德愈明敬天地勤勞萬民立法度上下咸寧其二堯民歌風俗禮樂厚彝倫爰興學校進儒經賢臣良將保朝廷四野人民頌歡聲用的是賢英賢英定太平寰海皆歸正八奏聖道行之曲其一金殿萬年歡三綱既定九疇復興聖道如天嘉禾齊秀寒暑和平聖威無邊皇基穩勝磐石慶雲生景星長現三光輝耀百穀收成萬姓安寧其二得勝令聖德感皇乾甘露降山川萬邦來朝貢奇珍擺布全玉階下鳴鞭仰聖主升金殿丹墀列英賢讚吾皇豐稔年九奏樂清寧之曲其一普天樂萬邦寧皇圖正父君母后天下咸欽君治外永聖明后治內長安靜後聖承乾皆從正德相傳聖子神孫天威浩蕩江山永固洪福無窮其二沽美酒和氣生滿玉京祥煙起映皇宮明聖開基整萬民風雲會帝庭奏蕭韶九韻成其三太平令紫霧隱金鸞彩鳳祥光罩良將賢臣玉案列珍羞美醞寶鼎爇龍涎香噴至尊永寧儲嗣守成賀萬萬歲一人有慶右二奏至八奏俱奏百戲承應第九奏魚躍于淵承應奉天門宴百官止用本太初仰大明民初生三奏曲其進酒進膳樂同惟百官叩頭禮用朝天子曲宴畢導駕還宮用御鑾歌嘉靖間仁壽宮落成宴饗樂章一奏本太初之曲朝天子帝誠帝明寶位基昌命仙苑開筵歌鹿鳴亭殿天章映我有嘉賓鼓瑟吹笙示周行昭德音日升明恆萬載皇圖正二奏仰大明之曲殿前歡天保定聖人多壽多男慶修和禮樂協中興麗正重明如山阜如岡陵如川方至莫不增協氣生禎祥應百神受命萬國來庭三奏民初生之曲其一沽美酒黃河清寶露凝瑞麥呈靈鵲鳴諸福來同仰聖明喜萬寶告成占景緯泰階平其二太平令念農桑衣食之本仰君德獨厚民生事耕鑿羣黎百姓歌鹿鳴神人胥慶明主宴嘉賓承筐鼓瑟吹笙繼自今福增天定四奏品物亨之曲醉太平瑤宮怡聖顏閬苑隔人寰吹笙鼓瑟賓旨酒天開宴鹿鳴歌舞黃金殿賴吾皇錫福萬民安醉歌天保歡五奏御六龍之曲其一清江引聖主有道樂升平宴會延休慶務本軫民生弘化凝天命欣落成萬載開鴻運其二碧玉簫帝重農桑法駕起明光麟遊鳳翔宴陳天保章開玳筵薦瑤觴既醉頌洋洋聖德巍皇恩蕩世際唐虞上進膳曲其一水龍吟寶瑟瑤笙鼓吹喧聖天子御華筵南山萬壽瑞日正中天百穀豐年八方珍膳人樂升平宴其二太清歌祥麥嘉瓜臻瑞仰荷堯舜主愛育羣黎感天意五風十雨秋報春祈遍爾德勸農桑日用衣食嘉賓和樂開筵地紅雲捧雕盤珍味山呼萬歲福無疆日升川至其三上清歌仰賴吾皇參天兩地凝和氣四三王六五帝四三王六五帝國家興賢才為上瑞養萬民九域熙百祿咸宜其四開天門寶殿輝龍虎風雲會瞻丹陛覲紫微周詩歌既醉螽斯麟趾開祥瑞仰飛龍在天位豳風亭宴講官樂章一奏本太初之曲朝天子九重詔傳殿閣開秋宴授衣時節肅霜天禾稼登場遍鼓瑟吹笙升平重見工歌七月篇春酒當筵獻願吾皇萬年歲歲臨西苑二奏仰大明之曲殿前歡鳳苑御筵開黃花映玉階鹿鳴天保歌三代古調新裁奉君王萬壽杯日月明乾坤大看年年秋報賽太平有象元首明哉三奏民初生之曲其一沽美酒熙春陽化日長執懿筐采柔桑拾繭繅絲有萬箱染紅黃孔陽為公子製衣裳其二太平令勤樹藝歲年豐穰九十月禾黍登場為春酒甕浮新釀村田樂齊歌齊唱饗公堂殺羊舉觴繼進著兕觥祝聖壽萬靈扶相四奏品物亨之曲醉太平納嘉禾滿場釀御酒盈缸公桑蠶績製玄黃服龍衣袞裳螽斯蟋蟀諧清唱水光山色明仙仗豳風亭殿進霞觴祝聖壽無疆五奏御六龍之曲其一清江引九月風光何處有鳳苑在龍池右農夫稼已登公子衣方授萬歲君王頻進酒其二碧玉簫凡我生民農桑最苦辛終歲經營氣候變冬春田畯欣婦子勤詠豳詩仰化鈞場圃新風雨順宴御墀龍顏近進膳曲其一水龍吟養老休農敞御筵瀉春酒介耆年刲羊剪韭社鼓正闐闐香粳米顆升堂拜獻此樂真堪羡其二太清歌九月天開西苑宸居無逸殿講幄張筵集儒流雲蒸星炫璧緯珠躔睹御製煥天章昭回雲漢堯天舜日民安宴御廩神倉百穀登金輝玉燦休徵見大有豐年其三上清歌鳳苑宸居公桑帝藉今方舉躬耕蠶勸士女躬耕蠶勸士女獻羊羔升堂奏樂舞葵菽棗壺上珍廚萬壽山呼其四開天門豳風亭共仰吾皇聖百穀登萬國咸寧民康物阜禎祥應仰乾運俯坤靈隆慶三年大閲禮成回鑾樂章武成之曲吾皇閲武成簡戎旅壯帝京龍旗照耀虎豹營六師雲擁甲胄明威靈廣播蠻夷震驚首頌升平四海澄清嘉靖間皇后親蠶宴內外命婦樂章升座奏天香鳳韶之曲春雲繚繞芳郊曙喜乾坤萬象咸舒蘭皋蕙圃迎仙馭釆桑條攀茂樹蠶宮繭館親臨御璧月珠星照太虛開筵還駐翠旓旟萬載垂貞譽進膳曲沽美酒蠶禮成鳳輦停薦霞觴列雲屏宮妃世婦仰坤寧祥雲映紫冥同祝頌耀前星回宮御鑾歌惟天啓聖皇君耕藉后躬桑身先田織率萬邦天清地寧民阜康百穀用成四夷來王治化登虞唐世發禎祥永樂間定東宮宴饗樂章一奏喜千春之曲賀聖朝開國承天聖感極多總一統封疆濶百姓快活萬物榮光共沐恩波仙音韻合讚升平詠歌齊朝拜千千歲東宮滿國春和二奏永南山之曲水仙子洪基永固海波清盛世明時禮樂興華夷一統江山靜民通和樂太平讚東宮仁孝賢明秉鈞衡端正順乾坤泰亨坐中華萬世昌寧三奏桂枝香之曲蟾宮曲曉光融宴饗春宮日朗風和嘉氣蔥蔥鎮領台樞規宏綱憲禮節至公事聖上柔聲婉容問安寧勤孝虔恭果斷寬洪剛健文明聖德合同四奏初春曉之曲小梁州端拱嚴宸事紫微秉運璇璣四時百物總相宜仰賴明君德大業勝磐石皇儲仁孝明忠義美遐方順化朝儀孝能歡慈愛心敬篤上尊卑意禮上和下睦民鼓舞樂雍熙五奏乾坤泰之曲滿庭芳春和玳筵安邦興國欽聖尊賢文英武烈於民便禮樂成全享大業中庸不偏順天常節儉為先達文獻嚴儀訓典孝敬億千年六奏昌運頌之曲喜秋風文武安軍民樂宴文華會班僚五雲齊動鈞天樂賀春宮讚皇朝右二奏至六奏俱奏百戲承應七奏泰道開之曲沽美酒布春風滿畫樓對嘉景鳳凰洲高捧金波碧玉甌設威儀左右分品從列公侯其二太平令效聖上誠心勤厚主宗器嚴備春秋諧律呂仙音齊奏欽王政皇天保佑拜舞頓首讚祝進酒千千歲康寧福壽迎膳樂曲水龍吟方響笙竹秦鼓樂喧排寶器開玳筵鸞儀旌節錦繡景相連簪纓趨進皆來朝見春滿文華殿升座還宮百官行禮奏千秋歲曲堯年舜日勝禹周慶雲生繚繞鳳樓風調雨順五穀收萬民暢歌謳朔望朝參同
