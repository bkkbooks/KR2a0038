body:
  text: 明史卷六十三志第三十九樂三樂章二洪武三年定朝賀樂章升殿奏飛龍引之曲百官行禮奏風雲會之曲丞相致詞奏慶皇都之曲復位百官行禮奏喜升平之曲還宮奏賀聖朝之曲俱見後宴饗九奏中二十六年更定升殿韶樂奏聖安之曲乾坤日月明八方四海慶太平龍樓鳳閣中扇開簾捲帝王興聖感天地靈保萬壽洪福增祥光王氣生升寶位永康寧還宮韶樂奏定安之曲九五飛聖龍千邦萬國敬依從鳴鞭三下同公卿環珮響玎瑓掌扇護御容中和樂音呂濃翡翠錦繡擁還華蓋赴龍宮公卿入門奏治安之曲忠良為股肱昊天之德承主恩森羅拱北辰御爐煙繞奉天門江山社稷興安天下軍與民龍虎會風雲後不用洪武二十六年定中宮正旦冬至千秋節朝賀樂章中宮天香鳳韶之曲寶殿光輝晴天映懸玉鉤珍珠簾櫳瑤觴舉時簫韶動慶大筵來儀鳳昭陽玉帛齊朝貢讚孝慈賢助仁風歌謠正在升平中謹獻上齊天頌宣德以後增定慈宮朝賀樂章天香鳳韶之曲龍樓鳳閣彤雲曉開繡簾天香芬馥瑤階春暖千花簇壽聖母齊頌祝御筵奏獻長生曲坤道寧品類咸育和氣四時調玉燭享萬萬年太平福洪武三年定宴饗樂章一奏起臨濠之曲名飛龍引千載中華生聖主王氣成龍虎提劍起淮西將勇師雄百戰收強虜驅馳鞍馬經寒暑將士同甘苦次第靜風塵除暴安民功業如湯武二奏開太平之曲名風雲會玉壘瞰江城風雲繞帝營駕樓船龍虎縱橫飛炮發機驅六甲降虜將勝胡兵談笑掣長鯨三軍勇氣增一戎衣宇宙清寧從此華夷歸一統開帝業慶升平三奏安建業之曲名慶皇都虎踞龍蟠佳麗地真主開基千載風雲會十萬雄兵屯鐵騎臺臣守將皆奔潰一洗煩苛施德惠里巷謳歌田野騰和氣王業弘開千萬世黎民咸仰雍熙治四奏削羣雄之曲名喜升平時黃鉞削平荊楚清吳越清吳越暮秦朝晉幾多豪傑幽燕齊魯風塵潔伊涼蜀隴人心悅人心悅車書一統萬方同轍五奏平幽都之曲名賀聖朝天運推遷虜運移王師北討定燕畿百年禮樂重興日四海風雲慶會時除暴虐撫瘡痍漠南爭覩舊威儀君王聖德容降虜三恪衣冠拜玉墀六奏撫四夷之曲名龍池宴海波不動風塵靜中國有真人文身交址檳裘金齒重譯來賓奇珍異産梯山航海奉表稱臣白狼玄豹九苞丹鳳五色麒麟七奏定封賞之曲名九重歡乾坤清廓論功定賞策勳封爵玉帶金符貂蟬簪珥形圖麟閣奉天洪武功臣佐興運文經武略子子孫孫尊榮富貴久長安樂八奏大一統之曲名鳳凰吟大明天子駕飛龍開疆宇定王封江漢遠朝宗慶四海車書會同東夷西旅北戎南越都入地圖中遐邇暢皇風億萬載時和歲豐九奏守承平之曲名萬年春風調雨順遍乾坤齊慶承平時節玉燭調和甘露降遠近桑麻相接偃武修文報功崇德率土皆臣妾山河磐固萬方黎庶歡悅長想創業艱難君臣曾共掃四方豪傑露宿宵征鞍馬上歷盡風霜冰雪朝野如今清寧無事任用須賢哲躬勤節儉萬年同守王業以上九奏前三奏和緩中四奏壯烈後二奏舒長其曲皆按月律十二月按律樂歌正月太簇本宮黃鍾商俗名大石曲名萬年春奉天承運秉黃麾志在安民除慝曾覩中天騰王氣五色虹霓千尺龍繞兜鍪神迎艘艦嘉應非人力鳳凰山上慶雲長繞峯石天助神武成功人心效順所至皆無敵手握乾符開寶祚略定山河南北飲馬江淮列營河漢四海風波息師雄將猛萬方齊仰威德二月夾鍾本宮夾鍾宮俗名中呂曲名玉街行山林豺虎中原狐兔四海英雄無數大明真主起臨濠震於赫戎衣一怒星羅玉壘雲屯鐵騎一掃乾坤煙霧黎民重覩太平年慶萬里山河磐固三月姑洗本宮太簇商俗名大石曲名賀聖朝雲氣朝生芒碭間虹光夜起鳳凰山江淮一日真主出華夏千年正統還瞻日角覩天顏雲龍風虎競追攀君臣勤苦成王業王業汪洋被百蠻四月仲呂本宮無射徵俗名黃鍾正徵曲名喜升平風雲密濠梁千載真龍出真龍出鯨鯢豺虎掃除無迹江河從此波濤息乾坤同慶承平日承平日華夷萬里地圖歸一五月蕤賓本宮姑洗商俗名中管雙調曲名樂清朝中原鹿走英雄起回首四郊多壘英主倡兵淮水將士皆雄偉百靈護助人心喜一呼萬人風靡談笑掃除螻蟻王業從茲始六月林鍾本宮夾鍾角俗名中呂角曲名慶皇都王氣呈祥飛紫鳳虎嘯龍興千里旌旗動四海歡呼師旅衆天戈一指風雲從將士爭先民樂用駕御英雄聖德皆天縱率土華夷歸職貢詞臣拜獻河清頌七月夷則本宮南呂商俗名中管商角曲名永太平鳳凰佳氣好王師起義乾坤初曉淮水西邊五色慶雲繚繞三尺龍泉似水更百萬貔貅熊豹軍令悄魚麗鵝鸛風雲蛇鳥赳赳電掣鷹揚在伐罪安民去殘除暴天與人歸豪傑削平多少萬里煙塵淨洗正紅日一輪高照膺大寶王業萬年相保八月南呂本宮南呂宮俗名中管仙呂曲名鳳凰吟紫微翠蓋擁蓬萊聖天子帝圖開曆數應江淮看五色雲生上台櫛風沐雨攻堅擊鋭將士總英才躍馬定塵埃創萬古山河壯哉九月無射本宮無射宮俗名黃鍾曲名飛龍引詞同前起臨濠之曲十月應鍾本宮姑洗徵俗名中呂正徵曲名龍池宴大明英主承天運倡義擁天戈星辰旋繞風雲圍護龍虎麾訶旌旗所指羌夷納發江海停波從今平定萬年疆宇百二山河十一月黃鍾本宮夷則角俗名仙呂角曲名金門樂慶皇明聖主開寶祚起臨濠正汝潁塵飛江淮浪捲赤子呼號天戈奮然倡義擁神兵百萬總英豪貔虎朝屯壁壘虹霓夜繞弓刀鳳凰山勢聳層霄佳氣五雲高愛士伍同心君臣協力不憚勤勞風雲一時相會看魚龍飛舞出波濤靜掃八方氛祲咸聽九奏簫韶十二月大呂本宮大呂宮俗名高宮曲名風雲會天眷顧淮西真人起布衣正乾剛九五龍飛駕馭英雄收俊傑承永命布皇威一劍立鴻基三軍擁義旗望雲霓四海人歸整頓乾坤除暴虐歌聖德慶雍熙武舞曲名清海宇拔劍起淮土策馬定寰區王氣開天統寶曆應乾符武略文謨龍虎風雲創業初將軍星繞辨勇士月彎弧選騎平南楚結陳下東吳跨蜀驅胡萬里山河壯帝居文舞曲名泰階平乾坤清寧治功告成武定禍亂文致太平郊則致其禮廟則盡其誠卿雲在天甘露零風雨時若百穀登禮樂雍和政刑肅清儲嗣既立封建乃行讒佞屏四海賢俊立朝廷玉帛鐘鼓陳兩楹君臣賡歌揚頌聲四夷舞曲其一小將軍大明君定宇寰聖恩寬掌江山東虜西戎北狄南蠻手高擎寶貝盤其二殿前歡五雲宮闕連霄漢金光明照眼玉溝金水聲潺潺俯發觀趨蹌看儀鑾嚴肅百千般威人心膽寒其三慶新年虎豹關文武班五綵間慶雲朝霞燦黃金殿喜氣增丹墀內仰聖顏翠繞紅圍錦繡班高樓十二欄笙簫趁紫壇仙音韻瑤竹秦按拜舞齊歌謠讚吾皇萬壽安其四過門子定宇寰定宇寰掌江山撫百蠻謳歌拜舞仰祝讚萬萬年帝業安洪武十五年重定宴饗九奏樂章一奏炎精開運之曲炎精開運篤生聖皇大明御極遠紹虞唐河清海宴物阜民康威加夷僚德被戎羌八珍有薦九鼎馨香鼓鐘鐄鐄宮徵洋洋怡神養壽理陰順陽保茲遐福地久天長二奏皇風之曲皇風被八表熙熙聲教宣時和景象明宸宸開繡筵龍袞曜朝日金爐裊祥煙濟濟公與侯被服麗且鮮列坐侍丹扆磬折在周旋羔豚升華俎玉饌充方圓初筵奏南風繼歌賡載篇瑤觴欣再舉拜俯禮無愆同樂及斯辰於皇千萬年奏平定天下之舞曲名清海宇同前三奏眷皇明之曲赫赫上帝眷我皇明大命既集本固支榮厥本伊何育德春宮厥支伊何藩邦以寧慶延百世澤被羣生及時為樂天祿是膺千秋萬歲永觀厥成奏撫安四夷之舞曲名小將軍殿前歡慶新年過門子俱同前四奏天道傳之曲馬負圖兮天道傳龜載書兮人文宣羲畫卦兮禹疇皇極建兮合自然綿綿曆數歸明主祥麟在郊威鳳舞九夷入貢康衢謠聖子神孫繼祖武垂拱無為邁前古奏車書會同之舞曲名泰階平同前五奏振皇綱之曲周南詠麟趾卷阿歌鳳凰藹藹稱多士為楨振皇綱赫赫我大明德尊踰漢唐百揆修庶績公輔理陰陽峨冠正襟佩都俞在高堂坐令八紘內熙熙民樂康氣和風雨時田疇見豐穰獻禮過三爵歡娛良未央六奏金陵之曲鍾山蟠蒼龍石城踞金虎千年王氣都於今歸聖主六代繁華經幾秋江流東去無時休誰言天塹分南北英雄豈但嗤曹劉我皇昔住濠梁屋神遊天錫真人服提兵乘勢渡江來詞臣早獻金陵曲歌金陵進珍饌諧八音繼三歎請觀漢祖用兵時為嘗馮異滹沱飯七奏長楊之曲長楊曳緑黃鳥和鳴菡萏呈鮮紫燕輕盈千花浥露日麗風清及時為樂芳尊在庭管音嘒嘒絲韻泠泠玉振金聲各奏爾能皤皤國老載勸載懲明德惟馨垂之聖經唐風示戒永保嘉名無已太康哲人是聽八奏芳醴之曲夏王厭芳醴商湯遠色聲聖人示深戒千春垂令名惟皇登九五玉食保尊榮日昃不遑餐布德延羣生天庖具豐膳鼎鼐事調烹豈但資肥甘亦足養遐齡達人悟茲理恆令五氣平隨時知有節昭哉天道行九奏駕六龍之曲日麗中天漏下遲公卿侍宴多令儀簫韶九奏觴九獻爐煙細逐祥風吹羣臣舞蹈天顏喜歲熟民康常若此六龍回駕鳳樓深寶扇齊開扶玉几景星呈瑞慶雲多兩曜增暉四序和聖人道大如天地歲歲年年奈樂何進膳曲水龍吟寶殿祥雲紫氣濛聖明君龍德宮氤氳霧靄檜柏間青松龍樓鳳閣雕梁畫棟此是蓬萊洞太平清樂曲太清歌萬國來朝進貢仰賀聖明主一統華夷普天下八方四海南北東西託聖德勝堯王保護家國太平天下都歸一將兵器銷為農器旌旗不動酒旗招仰荷天地上清歌一願四時風調雨順民心喜攝外國將寶貝攝外國將寶貝見君王來朝寶殿𩹉珊瑚瑪瑙玻璃進在丹墀開天門託長生日月光天德萬萬歲永固皇基公卿文武來朝會開玳筵捧金杯迎膳奏水龍吟曲與進膳同升座還宮百官行禮奏萬歲樂朝天子二曲與朝賀同大祀慶成大宴用萬國來朝隊舞纓鞭得勝隊舞萬壽聖節大宴用九夷進寶隊舞壽星隊舞冬至大宴用讚聖喜隊舞百花聖朝隊舞正旦大宴用百戲蓮花盆隊舞勝鼓采蓮隊舞永樂十八年定宴饗樂舞一奏上萬壽之曲龍飛定萬方受天命振紀綱彝倫攸四海康普天率土盡來王臣民舞蹈嵩呼載揚稱觴奉吾皇聖壽天長平定天下舞曲其一四邊靜威伏千邦四夷來賓納表章顯禎祥承乾象皇基永昌萬載山河壯其二刮地風聖主過堯舜禹湯立五常三綱八蠻進貢朝今上頓首誠惶朝中宰相燮理陰陽五穀收成萬民歡暢賀吾皇齊讚揚萬國來降二奏仰天恩之曲皇天眷聖明五辰順四海寧風調雨順百穀登臣民鼓舞樂太平賢良在位邦家永禎吾皇仰洪恩夙夜存誠黃童白叟鼓腹謳歌承應曲曰豆葉黃雨順風調五穀收成倉廪豐盈大利民生託賴著皇恩四海清鼓腹謳歌白叟黃童共樂咸寧四夷舞曲其一小將軍順天心聖德誠化番邦盡朝京四夷歸伏舞於龍廷貢皇明寶貝擎其二殿前歡四夷率土歸王命都來仰大明萬邦千國皆歸正現帝庭朝仁聖天階班列衆公卿齊聲歌太平其三慶豐年和氣增鸞鳳鳴紫霧生祥雲朝霞映爇金爐香昧馨列丹墀御駕盈絃管簫韶五音應龍笛間鳳笙其四渤海令金杯中酒滿盛御案前列羣英君德成皇圖慶嵩呼萬歲聲其五過門子聖主興聖主興顯威靈蠻夷靜至仁至德至聖明萬萬年帝業成三奏感地德之曲皇心感地靈順天時德厚生含弘光大品物亨鍾奇育秀産俊英河清海宴麟來鳳鳴陰陽永和平相我文明車書會同舞曲其一新水令錦衣花帽設丹墀具公服百司同會麟至舞鳳來儀文武班齊朝賀聖明帝其二水仙子八方四面錦華夷天下蒼生仰