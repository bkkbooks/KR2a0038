body:
  text: 明史卷一百四十一列傳第二十九齊泰黃子澄方孝孺盧原質鄭公智林嘉猷胡子昭鄭居貞劉政方法樓璉練子寧宋徵葉希賢茅大芳周璿卓敬郭任盧迥陳迪黃魁巨敬景清連楹胡閏高翔王度戴德彝謝升丁志方甘霖董鏞陳繼之韓永葉福齊泰溧水人初名德洪武十七年舉應天鄉試第一明年成進士歷禮兵二部主事雷震謹身殿太祖禱郊廟擇歷官九年無過者陪祀德與焉賜名泰二十八年以兵部郎中擢左侍郎太祖嘗問邊將姓名泰歷數無遺又問諸圖籍出袖中手册以進簡要詳密大奇之皇太孫素重泰及即位命與黃子澄同參國政尋進尚書時遺詔諸王臨國中毋奔喪王國吏民聽朝廷節制諸王謂泰矯皇考詔間骨肉皆不悅先是帝為太孫時諸王多尊屬擁重兵患之至是因密議削藩建文元年周代湘齊岷五王相繼以罪廢七月燕王舉兵反師名靖難指泰子澄為姦臣事聞泰請削燕屬籍聲罪致討或難之泰曰明其為賊敵乃可克遂定議伐燕布告天下時太祖功臣存者甚少乃拜長興侯耿炳文為大將軍帥師分道北伐至真定為燕所敗子澄薦曹國公李景隆代將泰極言不可子澄不聽卒命景隆將當是時帝舉五十萬兵畀景隆謂燕可旦夕滅燕王顧大喜曰昔漢高止能將十萬景隆何才其衆適足為吾資也是冬景隆果敗帝有懼色會燕王上書極詆泰子澄帝乃解二人任以謝燕而陰留之京師仍參密議景隆遺燕王書言二人已竄可息兵燕王不聽明年盛庸捷東昌帝告廟命二人任職如故及夾河之敗復解二人官求罷兵燕王曰此緩我也進益急始削藩議起帝入泰子澄言謂以天下制一隅甚易及屢敗意中悔是以進退失據逮燕兵日逼復召泰還未至京師已不守泰走外郡謀興復時購泰急泰墨白馬走行稍遠汗出墨脫或曰此齊尚書馬也遂被執赴京同子澄方孝孺不屈死泰從兄弟敬宗等皆坐死叔時永陽彥等謫戍子甫六歲免死給配仁宗時赦還黃子澄名湜以字行分宜人洪武十八年會試第一由編修進修撰伴讀東宮纍遷太常寺卿惠帝為皇太孫時嘗坐東角門謂子澄曰諸王尊屬擁重兵多不法奈何對曰諸王護衛兵才足自守倘有變臨以六師其誰能支漢七國非不強卒底亡滅大小強弱勢不同而順逆之理異也太孫是其言比即位命子澄兼翰林學士與齊泰同參國政謂曰先生憶昔東角門之言乎子澄頓首曰不敢忘退而與泰謀泰欲先圖燕子澄曰不然周齊湘代岷諸王在先帝時尚多不法削之有名今欲問罪宜先周周王燕之母弟削周是剪燕手足也謀定明日入白帝會有言周王橚不法者遂命李景隆帥兵襲執之詞連湘代諸府於是廢橚及岷王楩為庶人幽代王桂於大同囚齊王榑於京師湘王柏自焚死下燕議周王罪燕王上書申救帝覽書惻然謂事宜且止子澄與泰爭之未決出相語曰今事勢如此安可不斷明日又入言曰今所慮者獨燕王耳宜因其稱病襲之帝猶豫曰朕即位未久連黜諸王若又削燕何以自解於天下子澄對曰先人者制人毋為人制帝曰燕王智勇善用兵雖病恐猝難圖乃止於是命都督宋忠調緣邊官軍屯開平選燕府護衛精壯隸忠麾下召護衛胡騎指揮關童等入京以弱燕復調北平永清左右衛官軍分駐彰德順德都督徐凱練兵臨清耿瓛練兵山海關以控制北平皆泰子澄謀也時燕王憂懼以三子皆在京師稱病篤乞三子歸泰欲遂收之子澄曰不若遣歸示彼不疑乃可襲而取也竟遣還未幾燕師起王泣誓將吏曰陷害諸王非由天子意乃姦臣齊泰黃子澄所為也始帝信任子澄與泰驟事削藩兩人本書生兵事非其所長當耿炳文之敗也子澄謂勝敗常事不足慮因薦曹國公李景隆可大任帝遂以景隆代炳文而景隆益無能為連敗於鄭村壩白溝河喪失軍輜士馬數十萬已又敗於濟南城下帝急召景隆還赦不誅子澄慟哭請正其罪帝不聽子澄拊膺曰大事去矣薦景隆誤國萬死不足贖罪及燕兵漸南與齊泰同謫外密令募兵子澄微服由太湖至蘇州與知府姚善倡義勤王善上言子澄才足捍難不宜棄間遠以快敵人帝復召子澄未至而京城陷欲與善航海乞兵善不可乃就嘉興楊任謀舉事為人告俱被執子澄至成祖親詰之抗辨不屈磔死族人無少長皆斬姻黨悉戍邊一子變姓名為田經遇赦家湖廣咸寧正德中進士黃表其後云楊任洪武中由人材起家歷官袁州知府時致仕匿子澄於家亦磔死二子禮益俱斬親屬戍邊方孝孺字希直一字希古寧海人父克勤洪武中循吏自有傳孝孺幼警敏雙眸炯炯讀書日盈寸鄉人目為小韓子長從宋濂學濂門下知名士皆出其下先輩胡翰蘇伯衡亦自謂弗如孝孺顧末視文藝以明王道致太平為己任嘗臥病絶糧家人以告笑曰古人三旬九食貧豈獨我哉父克勤坐空印事誅扶喪歸葬哀動行路既免喪復從濂卒業洪武十五年以吳沉揭樞薦召見太祖喜其舉止端整謂皇太子曰此莊士當老其才禮遣還後為仇家所連逮至京太祖見其名釋之二十五年又以薦召至太祖曰今非用孝孺時除漢中教授日與諸生講學不倦蜀獻王聞其賢聘為世子師每見陳説道德王尊以殊禮名其讀書之廬曰正學及惠帝即位召為翰林侍講明年遷侍講學士國家大政事輒咨之帝好讀書每有疑即召使講解臨朝奏事臣僚面議可否或命孝孺就扆前批答時修太祖實録及類要諸書孝孺皆為總裁更定官制孝孺改文學博士燕兵起廷議討之詔檄皆出其手建文三年燕兵掠大名王聞齊黃已竄上書請罷盛庸吳傑平安兵孝孺建議曰燕兵久頓大名天暑雨當不戰自疲急令遼東諸將入山海關攻永平真定諸將渡盧溝搗北平彼必歸救我以大兵躡其後可成擒也今其奏事適至宜且與報書往返踰月使其將士心懈我謀定勢合進而蹴之不難矣帝以為然命孝孺草詔遣大理寺少卿薛嵓馳報燕盡赦燕罪使罷兵歸藩又為宣諭數千言授嵓持至燕軍中密散諸將士比至嵓匿宣諭不敢出燕王亦不奉詔五月吳傑平安盛庸發兵擾燕餉道燕王復遣指揮武勝上書伸前請帝將許之孝孺曰兵罷不可復聚願毋為所惑帝乃誅勝以絶燕未幾燕兵掠沛縣燒糧艘時河北師老無功而德州又饋餉道絶孝孺深以為憂以燕世子仁厚其弟高煦狡譎有寵於燕王嘗欲奪嫡謀以計間之使內亂乃建議白帝遣錦衣衛千戶張安齎璽書往北平賜世子世子得書不啓封並安送燕軍前間不得行明年五月燕兵至江北帝下詔徵四方兵孝孺曰事急矣遣人許以割地稽延數日東南募兵漸集北軍不長舟楫決戰江上勝負未可知也帝遣慶成郡主往燕軍陳其説燕王不聽帝命諸將集舟師江上而陳瑄以戰艦降燕燕兵遂渡江時六月乙卯也帝憂懼或勸帝他幸圖興復孝孺力請守京城以待援兵即事不濟當死社稷乙丑金川門啓燕兵入帝自焚是日孝孺被執下獄先是成祖發北平姚廣孝以孝孺為託曰城下之日彼必不降幸勿殺之殺孝孺天下讀書種子絶矣成祖頷之至是欲使草詔召至悲慟聲徹殿陛成祖降榻勞曰先生毋自苦豫欲法周公輔成王耳孝孺曰成王安在成祖曰彼自焚死孝孺曰何不立成王之子成祖曰國賴長君孝孺曰何不立成王之弟成祖曰此朕家事顧左右授筆札曰詔天下非先生草不可孝孺投筆於地且哭且罵曰死即死耳詔不可草成祖怒命磔諸市孝孺慨然就死作絶命詞曰天降亂離兮孰知其由姦臣得計兮謀國用猶忠臣發憤兮血淚交流以此殉君兮抑又何求嗚呼哀哉兮庶不我尤時年四十有六其門人德慶侯廖永忠之孫鏞與其弟銘檢遺骸瘞聚寶門外山上孝孺有兄孝聞力學篤行先孝孺死弟孝友與孝孺同就戮亦賦詩一章而死妻鄭及二子中憲中愈先自經死二女投秦淮河死孝孺工文章醇深雄邁每一篇出海內爭相傳誦永樂中藏孝孺文者罪至死門人王稌潛録為侯城集故後得行於世仁宗即位諭禮部建文諸臣已蒙顯戮家屬籍在官者悉宥為民還其田土其外親戍邊者留一人戍所餘放還萬曆十三年三月釋坐孝孺謫戍者後裔浙江江西福建四川廣東凡千三百餘人而孝孺絶無後惟克勤弟克家有子曰孝復洪武二十五年嘗上書闕下請減信國公湯和所加寧海賦謫戍慶遠衛以軍籍獲免孝復子琬後亦得釋為民世宗時松江人俞斌自稱孝孺後一時士大夫信之為纂歸宗録既而方氏察其偽言於官乃已神宗初有詔褒録建文忠臣建表忠祠於南京首徐輝祖次孝孺云孝孺之死宗族親友前後坐誅者數百人其門下士有以身殉者盧原質鄭公智林嘉猷皆寧海人原質字希魯孝孺姑子也由進士授編修歷官太常少卿建文時屢有建白燕兵至不屈與弟原朴等皆被殺公智字叔貞嘉猷名升以字行皆師事孝孺孝孺嘗曰匡我者二子也公智以賢良舉為御史有聲嘉猷洪武丙子以儒士校文四川建文初入史館為編修尋遷陝西僉事嘗以事入燕邸知高煦謀傾世子狀孝孺間燕之謀實嘉猷發之胡子昭字仲常初名志高榮縣人孝孺為漢中教授時往從學蜀獻王薦為縣訓導建文初與修太祖實録授檢討纍遷至刑部侍郎鄭居貞閩人與孝孺友善以明經歷官鞏昌通判河南參政所至有善績孝孺教授漢中居貞作鳳雛行勗之諸人皆坐黨誅死孝孺主應天鄉試所得士有長洲劉政桐城方法政字仲理燕兵起草平燕策將上之以病為家人所沮及聞孝孺死遂嘔血卒法字伯通官四川都司斷事諸司表賀成祖登極當署名不肯投筆出被逮次望江瞻拜鄉里曰得望我先人廬舍足矣自沉於江成祖既殺孝孺以草詔屬侍讀樓璉璉金華人嘗從宋濂學承命不敢辭歸語妻子曰我固甘死正恐纍汝輩耳其夕遂自經或曰草詔乃括蒼王景或曰無錫王達云練子寧名安以字行新淦人父伯尚工詩洪武初官起居注以直言謫外任終鎮安通判子寧英邁不羣十八年以貢士廷試對策力言天之生材有限陛下忍以區區小故縱無窮之誅何以為治太祖善其意擢一甲第二授翰林修撰丁母艱力行古禮服闋復官歷遷工部侍郎建文初與方孝孺並見信用改吏部左侍郎以賢否進退為己任多所建白未幾拜御史大夫燕師起李景隆北征屢敗召還子寧從朝中執數其罪請誅之不聽憤激叩首大呼曰壞陛下事者此賊也臣備員執法不能為朝廷除賣國姦死有餘罪即陛下赦景隆必無赦臣因大哭求死帝為罷朝宗人府經歷宋徵御史葉希賢皆抗疏言景隆失律喪師懷二心宜誅並不納燕師既渡淮靖江府長史蕭用道衡府紀善周是修上書論大計指斥用事者書下廷臣議用事者盛氣以詬二人子寧曰國事至此尚不能容言者耶詬者愧而止燕王即位縛子寧至語不遜磔死族其家姻戚俱戍邊子寧從子大亨官嘉定知縣聞變同妻沉劉家河死里人徐子權以進士為刑部主事聞子寧死慟哭賦詩自經子寧善文章孝孺稱其多學而文弘治中王佐刻其遺文曰金川玉屑集提學副使李夢陽立金川書院祀子寧名其堂曰浩然徵不知何許人嘗疏請削罪藩屬籍燕師入不屈並妻子俱死希賢松陽人亦坐姦黨被殺或曰去為僧號雪菴和尚云茅大芳名誧以字行泰興人博學能詩文洪武中為淮南學官召對稱旨擢秦府長史制詞以董仲舒為言大芳益奮激盡心輔導額其堂曰希董方孝孺為之記建文元年遷副都御史燕師起遺詩淮南守將梅殷辭意激烈聞者壯之周璿洪武末以天策衛知事建言擢左僉都御史燕王稱帝與大芳並見收不屈死而大芳子順童道壽俱論誅二孫死獄中卓敬字惟恭瑞安人穎悟過人讀書十行俱下舉洪武二十一年進士除戶科給事中鯁直無所避時制度未備諸王服乘擬天子敬乘間言京師天下視效陛下於諸王不早辨等威而使服飾與太子埒嫡庶相亂尊卑無序何以令天下帝曰爾言是朕慮未及此益器重之他日與同官見適八十一人命改官為元士尋以六科為政事本源又改曰源士已復稱給事中歷官戶部侍郎建文初敬密疏言燕王智慮絶倫雄才大略酷類高帝北平形勝地士馬精強金元所由興今宜徙封南昌萬一有變亦易控制夫將萌而未動者幾也量時而可為者勢也勢非至剛莫能斷幾非至明莫能察奏入翌日召問敬叩首曰臣所言天下至計願陛下察之事竟寢燕王即位被執責以建議徙燕離間骨肉敬厲聲曰惜先帝不用敬言耳帝怒猶憐其才命繫獄使人諷以管仲魏徵事敬泣曰人臣委贄有死無二先皇帝曾無過舉一旦橫行篡奪恨不即死見故君地下乃更欲臣我耶帝猶不忍殺姚廣孝故與敬有隙進曰敬言誠見用上寧有今日乃斬之誅其三族敬立朝慷慨美丰姿善談論凡天官輿地律曆兵刑諸家無不博究成祖嘗歎曰國家養士三十年惟得一卓敬萬曆初用御史屠叔方言表墓建祠同時戶部侍郎死者有郭任盧迥任丹徒人一曰定遠人廉慎有能建文初佐戶部飲食起居俱在公署時方貶削諸藩任言天下事先本後末則易成今日儲財粟備軍實果何為者乃北討周南討湘舍其本而末是圖非策也且兵貴神速苟曠日持久鋭氣既竭姑息隨之將坐自困耳燕王聞而惡之兵起任與同官盧迥主調兵食京師失守被擒不屈死之子經亦論死少子戍廣西迥仙居人爽朗不拘細行喜飲酒飲後輒高歌人謂迥狂及仕折節恭慎建文三年拜戶部侍郎燕兵入不屈縛就刑長謳而死台人祀之八忠祠陳迪字景道宣城人祖宥賢明初從征有功世撫州守禦百戶因家焉迪倜儻有志操辟府學訓導為郡草賀萬壽表太祖異之久之以通經薦歷官侍講出為山東左參政多惠政丁內艱起復除雲南右布政使普定曲靖烏撒烏蒙諸蠻煽亂迪率土兵擊破之賜金幣建文初徵為禮部尚書時更修制度沿革損益迪議為多會以水旱詔百官集議迪請清刑獄招流民凡二十餘事皆從之尋加太子少保李景隆等數戰敗迪陳大計命督運軍儲已聞變趨赴京師燕王即帝位召迪責問抗聲不屈命與子鳳山丹山等六人磔於市既死人於衣帶中得詩及五噫歌辭意悲烈蒼頭侯來保拾其遺骸歸葬妻管縊死幼子珠生五月乳母潛置溝中得免八歲為怨家所訐成祖宥其死戍撫寧尋徙登州為蓬萊人洪熙初赦還鄉給田産成化中寧國知府塗觀建祠祀迪弘治間裔孫鼎舉進士仕至應天府尹剛鯁有聲黃魁不知何許人為禮部侍郎有學行習典禮迪及侍郎黃觀皆愛敬之燕兵入不屈死有巨敬者平涼人為御史改戶部主事充史官以清慎稱與迪同不屈死夷其族景清本耿姓訛景真寧人倜儻尚大節讀書一過不忘洪武中進士授編修改御史三十年春召見命署左僉都御史以奏疏字誤懷印更改為給事中所劾下詔獄尋宥之詔巡察川陝私茶除金華知府建文初為北平參議燕王與語言論明晰大稱賞再遷御史大夫燕師入諸臣死者甚衆清素預密謀且約孝孺等同殉國至是獨詣闕自歸成祖命仍其官委蛇班行者久之一日早朝清衣緋懷刃入先是日者奏異星赤色犯帝座甚急成祖故疑清及朝清獨著緋命搜之得所藏刃詰責清奮起曰欲為故主報讎耳成祖怒磔死族之籍其鄉轉相攀染謂之瓜蔓抄村里為墟初金川門之啓御史連楹叩馬欲刺成祖被殺尸植立不仆楹襄垣人胡閏字松友鄱陽人太祖征陳友諒過長沙王吳芮祠見題壁詩奇之立召見帳前洪武四年郡舉秀才入見帝曰此書生故題詩鄱陽廟壁者邪授都督府都事遷經歷建文初選右補闕尋進大理寺少卿燕師起與齊黃輩晝夜畫軍事京師陷召閏不屈與子傳道俱死幼子傳慶戍邊四歲女郡奴入功臣家稍長識大義日以爨灰污面洪熙初赦還鄉貧甚誓不嫁見者競遺以錢穀曰此忠臣女也高翔朝邑人洪武中以明經為監察御史建文時戮力兵事成祖聞其名與閏同召欲用之翔喪服入見語不遜族之發其先冢親黨悉戍邊諸給高氏産者皆加稅曰令世世罵翔也王度字子中歸善人少力學工文辭用明經薦為山東道監察御史建文時燕兵起度悉心贊畫及王師屢敗度奏請募兵小河之捷奉命勞軍徐州還方孝孺與度書誓死社稷燕王稱帝坐方黨謫戍賀縣又坐語不遜族度有智計盛庸之代景隆度密陳便宜是以有東昌之捷景隆徵還赦不誅反用事忌庸等功讒間之度亦見疏論者以其用有未盡惜之戴德彝奉化人洪武二十七年進士纍官侍講太祖諭之曰翰林雖職文學然既列禁近凡國家政治得失民生利害當知無不言昔唐陸贄崔羣李絳在翰林皆能正言讜論補益當時汝宜以古人自期已改監察御史建文時改左拾遺燕王入召見不屈死之德彝死時兄弟並從京師嫂項家居聞變度禍且族令闔舍逃去匿德彝二子山中毀戴氏族譜獨身留家收者至無所得械項至京搒掠終無一言戴族獲全時御史不屈死者有諸城謝升聊城丁志方而懷寧甘霖從容就戮子孫相戒不復仕又董鏞不知何許人諸御史有志節者時時會鏞所誓以死報國諸將校觀望不力戰鏞輒露章劾之城破被殺家戍極邊而給事中死者則有陳繼之韓永葉福三人繼之莆田人建文二年進士時江南僧道多腴田繼之請人限五畝餘以賦民從之兵事亟數條奏機宜燕兵入不屈見殺父母兄弟悉戍邊永西安人或曰浮山貌魁梧音吐洪亮每慷慨論兵事燕王入欲官之抗辭不屈死福侯官人繼之同年生燕兵至守金川門城陷死之贊曰帝王成事蓋由天授成祖之得天下非人力所能禦也齊黃方練之儔抱謀國之忠而乏制勝之策然其忠憤激發視刀鋸鼎鑊甘之若飴百世而下凜凜猶有生氣是豈泄然不恤國事而以一死自謝者所可同日道哉由是觀之固未可以成敗之常見論也
