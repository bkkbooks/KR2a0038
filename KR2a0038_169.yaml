body:
  text: 明史卷一百六十九列傳第五十七高穀胡濙王直高穀字世用揚州興化人永樂十三年進士選庶吉士授中書舍人仁宗即位改春坊司直郎尋遷翰林侍講英宗即位開經筵楊士奇薦穀及苗衷馬愈曹鼐四人侍講讀正統十年由侍講學士進工部右侍郎入內閣典機務景泰初進尚書兼翰林學士掌閣務如故英宗將還奉迎禮薄千戶龔遂榮投書於穀具言禮宜從厚援唐肅宗迎上皇故事穀袖之入朝遍示廷臣曰武夫尚知禮況儒臣乎衆善其言胡濙王直欲以聞穀曰迎復議上上意久不決若進此書使上知朝野同心亦一助也都御史王文不可已而言官奏之詰所從得穀對曰自臣所因抗章懇請如遂榮言帝雖不從亦不之罪二年進少保東閣大學士易儲加太子太傅給二俸應天鳳陽災命祀三陵振貧民七年進謹身殿大學士仍兼東閣內閣七人言論多齟齬穀清直持議正王文由穀薦數擠穀穀屢請解機務不許都給事中林聰忤權要論死穀力救得薄譴陳循及文搆考官劉儼黃諫帝命禮部會穀覆閲試卷穀力言儼等無私且曰貴胄與寒士競進已不可況不安義命欲因此搆考官乎帝乃賜循文子中式惟黜林挺一人事得已英宗復位循文等皆誅竄穀謝病英宗謂穀長者語廷臣曰穀在內閣議迎駕及南內事嘗左右朕其賜金帛襲衣給驛舟以歸尋復賜敕獎諭穀既去位杜門絶賓客有問景泰天順間事輒不應天順四年正月卒年七十穀美丰儀樂儉素位至台司敝廬瘠田而已成化初贈太保諡文義胡濙字源潔武進人生而髮白彌月乃黑建文二年舉進士授兵科給事中永樂元年遷戶科都給事中惠帝之崩於火或言遁去諸舊臣多從者帝疑之五年遣濙頒御製諸書並訪仙人張邋遢遍行天下州郡鄉邑隱察建文帝安在濙以故在外最久至十四年乃還所至亦間以民隱聞母喪乞歸不許擢禮部左侍郎十七年復出巡江浙湖湘諸府二十一年還朝馳謁帝於宣府帝已就寢聞濙至急起召入濙悉以所聞對漏下四鼓乃出先濙未至傳言建文帝蹈海去帝分遣內臣鄭和數輩浮海下西洋至是疑始釋皇太子監國南京漢王為飛語謗太子帝改濙官南京因命廉之濙至密疏馳上監國七事言誠敬孝謹無他帝悅仁宗即位召為行在禮部侍郎濙陳十事力言建都北京非便請還南都省南北轉運供億之煩帝皆嘉納既聞其嘗有密疏疑之不果召轉太子賓客兼南京國子祭酒宣宗即位仍遷禮部左侍郎明年來朝乃留行在禮部尋進尚書漢王反與楊榮等贊親征事平賚豫甚厚明年賜第長安右門外給閽者二人賜銀章四生辰賜宴其第四年命兼理詹事府事六年張本卒又兼領行在戶部時國用漸廣濙慮度支不足蠲租詔下輒沮格帝嘗切戒之然眷遇不少替嘗曲宴濙及楊士奇夏原吉蹇義曰海內無虞卿等四人力也英宗即位詔節冗費濙因奏減上供物及汰法王以下番僧四五百人浮費大省正統五年山西災詔行寬恤既而有採買物料之命濙上疏言詔旨宜信又言軍旗營求差遣因而擾民宜罷之皆報可行在禮部印失詔弗問命改鑄已又失被劾下獄未幾印獲復職九年年七十乞致仕不許英宗北狩群臣聚哭於朝有議南遷者濙曰文皇定陵寢於此示子孫以不拔之計也與侍郎于謙合中外始有固志景帝即位進太子太傅楊善使也先濙言上皇蒙塵久宜附進服食不報上皇將還命禮部具奉迎儀濙等議遣禮部迎於龍虎臺錦衣具法駕迎居庸關百司迎土城外諸將迎教場門上皇自安定門入進東安門於東上北門南面坐皇帝謁見畢百官朝見上皇入南城大內議上傳旨以一轎二馬迎於居庸關至安定門易法駕餘如奏給事中劉福等言禮太薄帝報曰朕尊大兄為太上皇帝尊禮無加矣福等顧云太薄其意何居禮部其會官詳察之濙等言諸臣意無他欲陛下篤親親耳帝曰昨得太上皇書具言迎駕之禮宜從簡損朕豈得違之羣臣乃不敢言會千戶龔遂榮為書投大學士高穀言奉迎宜厚具言唐肅宗迎上皇故事穀袖之以朝與王直等共觀之直與濙欲聞之帝為都御史王文所阻而給事中葉盛竟以聞盛同官林聰復劾直濙穀等皆股肱大臣有聞必告不宜偶語竊議有詔索書濙等因以書進且言肅宗迎上皇典禮今日正可倣行陛下宜躬迎安定門外分遣大臣迎龍虎臺帝不悅曰第從朕命無事紛更上皇至居南城宮濙請帝明年正旦率羣臣朝延安門不許上皇萬壽節請令百官拜賀延安門亦不許三年正月與王直並進少傅易太子加兼太子太師王文惡林聰文致其罪欲殺之濙不肯署遂稱疾數日不朝帝使興安問疾對曰老臣本無疾聞欲殺林聰殊驚悸耳聰由是得釋英宗復位力疾入朝遂求去賜璽書白金楮幣襲衣給驛官其一子錦衣世鎮撫濙歷事六朝垂六十年中外稱耆德及歸有三弟年皆七十餘鬚眉皓白燕聚一堂因名之曰壽愷又七年始卒年八十九贈太保諡忠安濙節儉寬厚喜怒不形於色能以身下人在禮部久表賀祥瑞以官當首署名人因謂其性善承迎南城人龔謙多妖術濙薦為天文生又薦道士仰彌高曉陰陽兵法使守邊時頗譏之王直字行儉泰和人父伯貞洪武十五年以明經聘至京時應詔者五百餘人伯貞對第一授試僉事分巡廣東雷州復呂塘廢渠清鹽法會罷分巡官召還為戶部主事以父喪服闋不時起謫居安慶建文初復以薦知瓊州崖州黎相仇殺以反聞且用兵伯貞捕其首惡兵遂罷瓊田歲常三穫以賦軍軍不時受俟民乏乃急斂以要利伯貞為立期三輸之弊始絶居數年大治流民占籍者萬餘憂歸卒於家直幼而端重家貧力學舉永樂二年進士改庶吉士與曾棨王英等二十八人同讀書文淵閣帝善其文召入內閣俾屬草尋授修撰歷事仁宗宣宗纍遷少詹事兼侍讀學士正統三年宣宗實録成進禮部侍郎學士如故五年出涖部事尚書胡濙悉以部政付之直處之若素習者八年正月代郭璡為吏部尚書十一年戶部侍郎奈亨附王振搆郎中趙敏詞連直及侍郎曹義趙新並下獄三法司廷鞫論亨斬直等贖徒帝宥直義奪亨新俸帝將親征也先直率廷臣力諫曰國家備邊最為謹嚴謀臣猛將堅甲利兵隨處充滿且耕且守是以久安今敵肆猖獗違天悖理陛下但宜固封疆申號令堅壁清野蓄鋭以待之可圖必勝不必親御六師遠臨塞下況秋暑未退旱氣未回青草不豐水泉猶塞士馬之用未充兵凶戰危臣等以為不可帝不從命直留守王師覆於土木大臣群請太后立皇子為皇太子命郕王攝政已勸王即位以安反側時變起倉卒朝臣議屢上皆直為首而直自以不如于謙每事推下之雍容鎮率而已加太子太保景泰元年也先使使議和且請還上皇下禮部議未決直率群臣上言曰太上皇惑細人言輕身一出至於蒙塵陛下宵衣旰食徵天下兵與羣臣兆姓同心僇力期滅此朝食以雪不共戴天之恥乃者天誘其衷也先有悔心之萌而來求成於我請還乘輿此轉禍為福之機也望陛下俯從其請遣使往報因察其誠偽而撫納之奉太上皇以歸少慰祖宗之心陛下天位已定太上皇還不復涖天下事陛下第崇奉之則天倫厚而天眷益隆誠古今盛事也帝曰卿等言良然但前後使者五輩往終不得要領今復遣使設彼假送駕為名來犯京師豈不為蒼生患賊詐難信其更議之已而瓦剌別部阿剌使復至胡濙等復以為言於是帝御文華殿門召諸大臣及言官諭以宜絶狀直對曰必遣使毋貽後悔帝不悅于謙前為解帝意釋羣臣既退太監興安匍匐出呼曰若等固欲遣使有文天祥富弼其人乎直大言曰廷臣惟天子使既食其祿敢辭難乎言之再聲色愈厲安語塞乃議遣使命李實羅綺往既行而瓦剌可汗脫脫不花及也先使先後至將遣歸使者謂館伴曰中國關外十四城皆為我有前阿剌知院使來尚遣人偕往今亦必得大臣同行庶有濟胡濙以聞下廷議直等固請乃遣楊善等報之比實還又以也先使至具言也先欲和狀直與寧陽侯陳懋等上疏請更遣使齎禮幣往迎上皇不許復上疏曰臣等與李實語具得彼中情事其所需衣物資斧者上皇言也而奉迎車駕也先意也昨者脫脫不花及阿剌知院使來皆有報使今也先使以迎請為辭乃不遣使與偕是疑敵而召兵也又不許已而實自言於帝帝第報也先書就令楊善迎歸而已直等復上言今北使已發願本上皇之心順臣民之願因彼悔心遣使往報以圖迎復此不待計而決者也不然衆志難犯違天不祥彼將執為兵端邊事益棘京師亦不得高枕臥矣帝乃命羣臣擇使直與陳懋等請仍遣實報曰候善歸議之御史畢鑾等復上疏力言就令彼以詐來我以誠往萬一不測則我之兵力固在帝終不聽已而善竟奉上皇還二年也先遣使入貢且請答使直屢疏言邊備未修芻糧未積瘡痍未復宜如其請遣使往以觀虛實開導其善不許無何也先遣騎入塞以報使為辭直與羣臣復請之卒不許直等乃上疏言陛下鋭意治兵為戰守計真大有為之主然使命不通難保其不為寇宜敕沿邊守臣發兵遊徼有警則入保無事則力耕陛下於機務之暇時召京營總督總兵詢以方略誠接而禮貌之信賞罰以持其後斯戰守可言也帝曰善明年正月進少傅帝欲易太子未發會思明土知府黃以為請帝喜下禮部議胡濙唯唯文武諸臣議者九十一人當署名直有難色陳循濡筆強之乃署竟易皇太子直進兼太子太師賜金幣加等頓足歎曰此何等大事乃為一蠻酋所壞吾輩愧死矣景帝疾亟直濙等會諸大臣臺諫請復立沂王為皇太子推大學士商輅草疏未上而石亨徐有貞等奪門迎上皇復位殺王文等疏草留姚夔所嘗出以示郎中陸昶歎曰是疏不及進天也直遂乞休賜璽書金綺楮幣給驛歸直為人方面修髯儀觀甚偉性嚴重不苟言笑及與人交恂恂如也在翰林二十餘年稽古代言編纂紀注之事多出其手與金溪王英齊名人稱二王以居地目直曰東王英曰西王直以次當入閣楊士奇不欲也及長吏部益廉慎時初罷廷臣薦舉方面大吏專屬吏部直委任曹郎嚴抑奔競凡御史巡方歸者必令具所屬賢否以備選擢稱得人其子為南國子博士考績至部文選郎欲留侍直直不可曰是亂法自我始也朝廷以直老命何文淵為尚書佐之文淵去又命王翺部遂有二尚書直為尚書十四年年益高名德日益重帝優禮之免其常朝比家居嘗從諸佃僕耕蒔擊鼓歌唱諸子孫更迭舉觴上壽直歎曰曩者西楊抑我令不得共事然使我在閣今上復辟當不免遼陽之行安得與汝曹為樂哉天順六年卒年八十四贈太保諡文端仕至翰林檢討亦以學行稱曾孫思自有傳贊曰高穀之清直胡濙之寬厚王直之端重蓋皆有大臣之度焉當英景之間國勢初更人心觀望執政任事之臣多阿意取容而穀濙惓惓於迎駕之儀直侃侃於遣使之請皆力持正議不隨衆俯仰故能身負碩望始終一節可謂老成人矣
