body:
  text: 明史卷三十一志第七曆一後世法勝於古而屢改益密者惟曆為最著唐志謂天為動物久則差忒不得不屢變其法以求之此說似矣而不然也易曰天地之道貞觀者也蓋天行至健確然有常本無古今之異其歲差盈縮遲疾諸行古無而今有者因其數甚微積久始著古人不覺而後人知之而非天行之忒也使天果久動而差忒則必差參凌替而無典要安從修改而使之益密哉觀傳志所書歲失其次日度失行之事不見於近代亦可見矣夫天之行度多端而人之智力有限持尋尺之儀表仰測穹蒼安能洞悉無遺惟合古今人之心思踵事增修庶幾符合故不能為一成不易之法之黃帝迄秦曆凡六改漢凡四改魏迄隋十五改唐迄五代十五改宋十七改金迄元五改惟明之大統曆實即元之授時承用二百七十餘年未嘗改憲成化以後交食往往不驗議改曆者紛紛如俞正己冷守中不知妄作者無論已而華湘周濂李之藻邢雲路之倫頗有所見鄭世子載堉撰律曆融通進聖壽萬年曆其說本之南都御史何瑭深得授時之意而能補其不逮臺官泥於舊聞當事憚於改作並格而不行崇禎中議用西洋新法命閣臣徐光啓光祿卿李天經先後董其事成曆書一百三十餘卷多發古人所未發時布衣魏文魁上疏排之詔立兩局推驗纍年校測新法獨密然亦未及頒行由是觀之曆固未有行之久而不差者烏可不隨時修改以求合天哉今采各家論說有裨於曆法者著於篇端而大統曆則述立法之原以補元志之未備回回曆始終隸於欽天監與大統參用亦附録焉曆法沿革吳元年十一月乙未冬至太史院使劉基率其屬高翼上戊申大統曆太祖諭曰古者季冬頒曆太遲今於冬至亦未善宜以十月朔著為令洪武元年改院為司天監又置回回司天監詔徵元太史院使張佑回回司天太監黑的兒等共十四人尋召回回司天臺官鄭阿里等十一人至京議曆法三年改監為欽天設四科曰天文曰漏刻曰大統曆曰回回曆以監令少監統之歲造大統民曆御覽月令曆七政躔度曆六壬遁甲曆四季天象占驗曆御覽天象録各以時上其日月交食分秒時刻起復方位先期以聞十年三月帝與羣臣論天與七政之行皆以蔡氏左旋之說對帝曰朕自起兵以來仰觀乾象天左旋七政右旋曆家之論確然不易爾等猶守蔡氏之說豈所謂格物致知之學乎十五年九月詔翰林李翀吳伯宗譯回回曆書十七年閏十月漏刻博士元統言曆以大統為名而積分猶踵授時之數非所以重始敬正也況授時以至元辛巳為曆元至洪武甲子積一百四年年遠數盈漸差天度合修改七政運行不齊其理深奧聞有郭伯玉者精明九數之理宜徵令推算以成一代之制報可擢統為監令統乃取授時曆去其歲實消長之說析其條例得四卷以洪武十七年甲子為曆元命曰大統曆法通軌二十二年改監令丞為監正副二十六年監副李德芳言監正統改作洪武甲子曆元不用消長之法以考魯獻公十五年戊寅歲天正冬至比辛巳為元差四日半強今當復用辛巳為元及消長之法疏入元統奏辨太祖曰二說皆難憑但驗七政交會行度無差者為是自是大統曆元以洪武甲子而推算仍依授時法三十一年罷回回欽天監其回回曆科仍舊永樂遷都順天仍用應天冬夏晝夜時刻至正統十四年始改用順天之數其冬景帝即位天文生馬軾奏晝夜時刻不宜改下廷臣集議監正許惇等言前監正彭德清測驗得北京北極出地四十度比南京高七度有奇冬至晝三十八刻夏至晝六十二刻奏準改入大統曆永為定式軾言誕妄不足聽帝曰太陽出入度數當用四方之中今京師在堯幽都之地寧可為準此後造曆仍用洪永舊制景泰元年正月辛卯卯正三刻月食監官誤推辰初初刻致失救護下法司論徒詔宥之成化十年以監官多不職擢雲南提學童軒為太常寺少卿掌監事十五年十一月戊戌望月食監推又誤帝以天象微渺不之罪也十七年真定教諭俞正己上改曆議詔禮部及軒參考尚書周洪謨等言正己止據皇極經世書及歷代天文曆志推算氣朔又以己意創為八十七年約法每月大小相間輕率狂妄宜正其罪遂下正己詔獄十九年天文生張升上言改曆欽天監謂祖制不可變升說遂寢弘治中月食屢不應日食亦舛正德十二三年連推日食起復皆弗合於是漏刻博士朱裕上言至元辛巳距今二百三十七年歲久不能無差若不量加損益恐愈久愈舛乞簡大臣總理其事令本監官生半推古法半推新法兩相交驗回回科推驗西域九執曆法仍遣官至各省候土圭以測節氣早晚往復參較則交食可正而七政可齊部覆言裕及監官曆學未必皆精今十月望月食中官正周濂等所推算與古法及裕所奏不同請至期考驗既而濂等言日躔歲退之差一分五十秒今正德乙亥距至元辛巳二百三十五年赤道歲差當退天三度五十二分五十秒不經改正推步豈能有合臣參詳較驗得正德丙子歲前天正冬至氣應二十七日四百七十五分命得辛卯日丑初初刻日躔赤道箕宿六度四十七分五十秒黃道箕宿五度九十六分四十三秒為曆元其氣閏轉交四應併周天黃赤道諸類立成悉從歲差隨時改正望敕禮臣併監正董其事部奏古法未可輕變請仍舊法別選精通曆學者同濂等以新法參驗更為奏請從之十五年禮部員外郎鄭善夫言日月交食日食最為難測蓋月食分數但論距交遠近別無四時加減且月小暗虛大八方所見皆同若日為月所掩則日大而月小日上而月下日遠而月近日行有四時之異月行有九道之分故南北殊觀時刻亦異必須據地定表因時求合如正德九年八月辛卯日食曆官報食八分六十七秒而閩廣之地遂至食既時刻分秒安得而同今宜按交食以更曆元時刻分秒必使奇零剖析詳盡不然積以歲月躔離朓朒又不合矣不報十六年以南京戶科給事中樂頀工部主事華湘通曆法俱擢光祿少卿管監事嘉靖二年湘言古今善治曆者三家漢太初以鐘律唐大衍以蓍策元授時以晷景為近欲正曆而不登臺測景皆空言臆見也望許臣暫罷朝參督中官正周濂等及冬至前詣觀象臺晝夜推測日記月書至來年冬至以驗二十四氣分至合朔日躔月離黃赤二道昏旦中星七政四餘之度視元辛巳所測離合何如差次録聞更敕禮部延訪精通理數者徵赴京師令詳定歲差以成一代之制下禮部集議而頀謂曆不可改與湘頗異禮部言湘欲自行測候不為無識請二臣各盡所見窮極異同以協天道從之七年欽天監奏閏十月朔回回曆推日食二分四十七秒大統曆推不食已而不食十九年三月癸巳朔臺官言日當食已而不食帝喜以為天眷然實由推步之疏也隆慶三年掌監事順天府丞周相刊大統曆法其曆原歷古今諸曆異同萬曆十二年十一月癸酉朔大統曆推日食九十二秒回回曆推不食已而回回曆驗禮科給事中侯先春因言邇年月食在酉而曰戌月食將既而曰未九分差舛甚矣回回曆科推算日月交食五星凌犯最為精密何妨纂入大統曆中以備考驗詔可二十年五月甲戌夜月食監官推算差一日二十三年鄭世子載堉進聖壽萬年曆律曆融通二書疏略曰高皇帝革命時元曆未久氣朔未差故不改作但討論潤色而已積年既久氣朔漸差後漢志言三百年斗曆改憲今以萬曆為元而九年辛巳歲適當斗曆改憲之期又協乾元用九之義曆元正在是矣臣嘗取大統與授時二曆較之考古則氣差三日推今則時差九刻夫差雖九刻處夜半之際所差便隔一日節氣差天一日則置閏差一月閏差一月則時差一季時差一季則歲差一年其失豈小小哉蓋因授時減分太峻失之先天大統不減失之後天因和會兩家酌取中數立為新率編撰成書大旨出於許衡而與衡曆不同黃鐘乃律曆本原而舊曆罕言之新法則以步律呂爻象為首堯時冬至日躔宿次何承天推在須女十度左右一行推在女虛間元人曆議亦云在女虛之交而授時曆考之乃在牛宿二度大統曆考之乃在危宿一度相差二十六度皆不與堯典合新法上考堯元年甲辰歲夏至午中日在柳宿十二度左右冬至午中日在女宿十度左右心昴昏中各去午正不逾半次與承天一行二家之說合此皆與舊曆不同之大者其餘詳見曆議望敕大臣名儒參訂採用其法首曰步發斂取嘉靖甲寅歲為曆元元紀四千五百六十期實千四百六十一節氣歲差一秒七十五忽歲周氣策無定率各隨歲差求而用之律應即氣應五十五日六十刻八十九分律總旬周六十日次曰步朔閏朔望弦策與授時同閏應十九日三十六刻十九分次曰步日躔日平行一度躔周即天周三百六十五度二十五分躔中半之象策又半之辰策十二分躔周之一黃赤道歲差盈初縮末限縮初盈末限俱與授時同周應二百三十八度二十二分三十九秒按授時求日度法以周應加積度命起虛七其周應為自虛七度至箕十度之數萬年曆法以周應減積度命起角初其周應為箕十度至角初度之數當為二百八十六度四十五分今數不合似誤次曰步晷漏北極出地度分冬夏至中晷恆數併二至晝夜長短刻數俱以京師為準參以嶽臺以見隨處里差之數次曰步月離月平行轉周轉中與授時同離周即遲疾限三百三十六限十六分六十秒離中半之離象又半之轉差一日九十七刻六十分轉應七日五十刻三十四分次曰步交道正交中交與授時同距交十四度六十六分六十六秒交周交中交差與授時同交應二十日四十七刻三十四分次日步交食日食交外限六度定法六十一交內限八度定法八十一月食限定法與授時同次曰步五緯合應土星二百六十二日三千二十六分木星三百一十日一千八百三十七分火星三百四十三日五千一百七十六分金星二百三日八千三百四十七分水星九十一日七千六百二十八分曆應土星八千六百四日五千三百三十八分木星四千一十八日六千七十三分火星三百一十四日四十九分金星六十日一千九百七十五分水星二百五十三日七千四百九十七分周率度率及晨夕伏見度俱與授時同其議歲餘也曰陰陽消長之理以漸而積未有不從秒起授時考古於百年之際頓加一分於理未安假如魯隱公三年辛酉歲下距至元辛巳二千年以授時本法算之於歲實當加二十分得庚午日六刻為其年天正冬至次年壬戌歲下距至元辛巳一千九百九十九年本法當加十九分得乙亥日五十刻四十四分為其年天正冬至兩冬至相減得相距三百六十五日四十四刻四十四分則是歲餘九分日之四非四分日之一也曆法之謬莫甚於此新法酌量設若每年增損二秒推而上之則失昭公己丑增損一秒至一秒半則失僖公辛亥今約取中數其法置定距自相乘七因八歸所得百約之為分得一秒七十五忽則辛亥己丑皆得矣其議日躔也曰古曆見於六經灼然可考者莫如日躔及中星而推步家鮮有達者蓋由不知夏時周正之異也大抵夏曆以節氣為主周曆以中氣為主何承天以正月甲子夜半合朔雨水為上元進乖夏朔退非周正故近代推月令小正者皆不與古合嘗以新法歲差上考堯典中星則所謂四仲月蓋自節氣之始至於中氣之終三十日內之中星耳後世執著於二分二至是亦誤矣其議候極也曰自漢至齊梁皆謂紐星即不動處惟祖之測知紐星去極一度有餘自唐至宋又測紐星去極三度有餘元志從三度蓋未有定說也新法不測紐星以日景驗之於正方案上周天度內權指一度為北極自此度右旋數至六十七度四十一分為夏至日躔所在復至一百一十五度二十一分為冬至日躔所在左旋數亦如之四處並中心共五處各識一針於二至日午中將案直立向南取景使三針景合然後縣繩界取中線又取方十字界之視橫界上距極度分即極出地度分也其議晷景也曰何承天立表測景始知自漢以來冬至皆後天三日然則推步晷景乃治曆之要也授時曆亦憑晷景為本而曆經不載推步晷景之術是為缺略今用北極出地度數兼弧矢二術以求之庶盡其原又隨地形高下立差以盡變前此所未有也又曰授時曆議據前漢志魯獻公十五年戊寅歲正月甲寅朔旦冬至引用為首夫獻公十五年下距隱公元年己未歲百六十一年其非春秋時明矣而元志乃云自春秋獻公以來又云昭公冬至乃日度失行之驗誤矣夫獻公甲寅冬至別無所據惟劉歆三統曆言之豈左傳不足信而歆乃可信乎太初元年冬至在辛酉歆乃以為甲子差天三日尚不能知而能逆知上下數百年乎故凡春秋前後千載之間氣朔交食長曆大衍所推近是劉歆班固所說全非也又曰大衍曆議謂宋元嘉十三年十一月甲戌景長為日度變行授時曆議亦云竊以為過矣苟日度失行當如歲差漸漸而移今歲既已不合來歲豈能復合耶蓋前人所測或未密耳夫冬至之景一丈有餘表高晷長則景虛而淡或設望筒副表景符之類以求實景然望筒或一低昂副表景符或一前却所據之表或稍有傾欹圭面或稍有斜側二至前後數日之景進退只在毫釐之間要亦難辨況委託之人未知當否九服之遠既非目擊所報晷景寧足信乎其議漏刻也曰日月帶食出入五星晨昏伏見曆家設法悉因晷漏為準而晷漏則隨地勢南北辰極高下為異焉元人都燕其授時曆七曜出沒之早晏四時晝夜之永短皆準大都晷漏國初都金陵大統曆晷漏改從南京冬夏至相差三刻有奇今推交食分秒南北東西等差及五星定伏定見皆因元人舊法而獨改其漏刻是以互相舛誤也故新法晷漏照依元舊其議日食也曰日道與月道相交處有二若正會於交則食既若但在交前後相近者則食而不既此天之交限也又有人之交限假令中國食既戴日之下所虧才半化外之地則交而不食易地反觀亦如之何則日如大赤丸月如小黑丸共縣一線日上而月下即其下正望之黑丸必掩赤丸似食之既及旁觀有遠近之差則食數有多寡矣春分已後日行赤道北畔交外偏多交內偏少秋分已後日行赤道南畔交外偏少交內偏多是故有南北差冬至已後日行黃道東畔午前偏多午後偏少夏至已後日行黃道西畔午前偏少午後偏多是故有東西差日中仰視則高旦暮平視則低是故有距午差食於中前見早食於中後見遲是故有時差凡此諸差唯日有之月則無也故推交食惟日頗難欲推九服之變必各據其處考晷景之短長揆辰極之高下庶幾得之曆經推定之數徒以燕都所見者言之耳舊云月行內道食多有驗月行外道食多不驗又云天之交限雖係內道若在人之交限之外類同外道日亦不食此說似矣而未盡也假若夏至前後日食於寅卯酉戌之間人向東北西北觀之則外道食分反多於內道矣日體大於月月不能盡掩之或遇食既而日光四溢形如金環故日無食十分之理雖既亦止九分八十秒授時曆日食陽曆限六度定法六十陰曆限八度定法八十各置其限度如其定法而一皆得十分今於其定法下各加一數以除限度則得九分八十餘秒也其議月食也曰暗虛者景也景之蔽月無早晚高卑之異四時九服之殊譬如懸一黑丸於暗室其左燃燭其右懸一白丸若燭光為黑丸所蔽則白丸不受其光矣人在四旁觀之所見無不同也故月食無時差之說自紀元曆妄立時差授時因之誤矣其議五緯也曰古法推步五緯不知變數之加減北齊張子信仰觀歲久知五緯有盈縮之變當加減以求逐日之躔蓋五緯出入黃道內外各自有其道視日遠近為遲疾其變數之加減如里路之徑直斜曲也宋人有言曰五星行度惟留退之際最多差自內而進者其退必向外自外而進者其退必由內其迹如循柳葉兩末鋭於中間往還之道相去甚遠故星行兩末度稍遲以其斜行故也中間行度稍速以其徑捷故也前代修曆止增損舊法而已未嘗實考天度其法須測驗每夜昏曉夜半月及五星所在度秒置簿録之滿五年其間去陰雲晝見日數外可得三年實行然後可以算術綴之也書上禮部尚書范謙奏歲差之法自虞喜以來代有差法之議竟無畫一之規所以求之者大約有三考月令之中星測二至之日景驗交食之分秒考以衡管測以臬表驗以漏刻斯亦佹得之矣曆家以周天三百六十五度四分度之一紀七政之行又析度為百分分為百秒可謂密矣然渾象之體徑僅數尺布周天度每度不及指許安所置分秒哉至於臬表之樹不過數尺刻漏之籌不越數寸以天之高且廣也而以尺寸之物求之欲其纖微不爽不亦難乎故方其差在分秒之間無可驗者至踰一度乃可以管窺耳此所以窮古今之智巧不能盡其變歟即如世子言以大統授時二曆相較考古則氣差三日推今則時差九刻夫時差九刻在亥子之間則移一日在晦朔之交則移一月此可驗之於近也設移而前則生明在二日之昏設移而後則生明在四日之夕矣今似未至此也其書應發欽天監參訂測驗世子留心曆學博通今古宜賜敕奬諭從之河南僉事邢雲路上書言治曆之要無踰觀象測景候時籌策四事今丙申年日至臣測得乙未日未正一刻而大統推在申正二刻相差九刻且今年立春夏至立冬皆適直子半之交臣推立春乙亥而大統推丙子夏至壬辰而大統推癸巳立冬己酉而大統推庚戌相隔皆一日若或直元日於子半則當退履端於月窮而朝賀大禮在月正二日矣豈細故耶閏八月朔日食大統推初虧巳正二刻食幾既而臣候初虧巳正一刻食止七分餘大統實後天幾二刻則閏應及轉應交應各宜增損之矣欽天監見雲路疏甚惡之監正張應侯奏詆謂其僭妄惑世禮部尚書范謙乃言曆為國家大事士夫所當講求非曆士之所得私律例所禁乃妄言妖祥者耳監官拘守成法不能修改合天幸有其人所當和衷共事不宜妬忌乞以雲路提督欽天監事督率官屬精心測候以成巨典議上不報三十八年監推十一月壬寅朔日食分秒及虧圓之候職方郎范守己疏駁其誤禮官因請博求知曆學者令與監官晝夜推測庶幾曆法靡差於是五官正周子愚言大西洋歸化遠臣龐迪熊三拔等攜有彼國曆法多中國典籍所未備者乞視洪武中譯西域曆法例取知曆儒臣率同監官將諸書盡譯以補典籍之缺先是大西洋人利瑪竇進貢土物而迪三拔及龍華民鄧玉函湯若望等先後至俱精究天文曆法禮部因奏精通曆法如雲路守己為時所推請改授京卿共理曆事翰林院檢討徐光啓南京工部員外郎李之藻亦皆精心曆理可與迪三拔等同譯西洋法俾雲路等參訂修改然曆法疏密莫顯於交食欲議修曆必重測驗乞敕所司修治儀器以便從事疏入留中未幾雲路之藻皆召至京參預曆事雲路據其所學之藻則以西法為宗四十一年之藻已改銜南京太僕少卿奏上西洋曆法略言臺監推算日月交食時刻虧分之謬而力薦迪三拔及華民陽瑪諾等言其所論天文曆數有中國昔賢所未及者不徒論其度數又能明其所以然之理其所製窺天窺日之器種種精絶今迪等年齡向衰乞敕禮部開局取其曆法譯出成書禮科姚永濟亦以為言時庶務因循未暇開局也四十四年雲路獻七政真數言步曆之法必以兩交相對兩交正而中間時刻分秒之度數一一可按日月之交食五星之凌犯皆日月五星之相交也兩交相對互相發明七政之能事畢矣天啓元年春雲路復詳述古今日月交食數事以明授時之疏證新法之密章下禮部四月壬申朔日食雲路所推食分時刻與欽天監所推互異自言新法至密至期考驗皆與天不合雲路又嘗論大統宮度交界當以歲差考定不當仍用授時三百年前所測之數又月建非關斗杓所指斗杓有歲差而月建無改移皆篤論也崇禎二年五月乙酉朔日食禮部侍郎徐光啓依西法預推順天府見食二分有奇瓊州食既大寧以北不食大統回回所推順天食分時刻與光啓互異已而光啓法驗餘皆疏帝切責監官時五官正戈豐年等言大統乃國初所定實即郭守敬授時曆也二百六十年毫未增損自至元十八年造曆越十八年為大德三年八月已當食不食六年六月又食而失推是時守敬方知院事亦付之無可奈何況斤斤守法者哉今若循舊向後不能無差於是禮部奏開局修改乃以光啓督修曆法光啓言近世言曆諸家大都宗郭守敬法至若歲差環轉歲實參差天有緯度地有經度列宿有本行月五星有本輪日月有真會視會皆古所未聞惟西曆有之而舍此數法則交食凌犯終無密合之理宜取其法參互考訂使與大統法會同歸一已而光啓上曆法修正十事其一議歲差每歲東行漸長漸短之數以正古來百年五十年六十年多寡互異之說其二議歲實小餘昔多今少漸次改易及日景長短歲歲不同之因以定冬至以正氣朔其三每日測驗日行經度以定盈縮加減真率東西南北高下之差以步日躔其四夜測月行經緯度數以定交轉遲疾真率東西南北高下之差以步月離其五密測列宿經緯行度以定七政盈縮遲疾順逆違離遠近之數其六密測五星經緯行度以定小輪行度遲疾留逆伏見之數東西南北高下之差以推步凌犯其七推變黃道赤道廣狹度數密測二道距度及月五星各道與黃道相距之度以定交轉其八議日月去交遠近及真會視會之因以定距午時差之真率以正交食其九測日行考知二極出入地度數以定周天緯度以齊七政因月食考知東西相距地輪經度以定交食時刻其十依唐元法隨地測驗二極出入地度數地輪經緯以求晝夜晨昏永短以正交食有無先後多寡之數因舉南京太僕少卿李之藻西洋人龍華民鄧玉函報可九月癸卯開曆局三年玉函卒又徵西洋人湯若望羅雅谷譯書演算光啓進本部尚書仍督修曆法時巡按四川御史馬如蛟薦資縣諸生冷守中精曆學以所呈曆書送局光啓力駁其謬並預推次年四月四川月食時刻令其臨時比測四年正月光啓進曆書二十四卷夏四月戊午夜望月食光啓預推分秒時刻方位奏言日食隨地不同則用地緯度算其食分多少用地經度算其加時早晏月食分秒海內並同止用地經度推求先後時刻臣從輿地圖約略推步開載各布政司月食初虧度分蓋食分多少既天下皆同則餘率可以類推不若日食之經緯各殊必須詳備也又月體一十五分則盡入暗虛亦十五分止耳今推二十六分六十秒者蓋暗虛體大於月若食時去交稍遠即月體不能全入暗虛止從月體論其分數是夕之食極近於交故月入暗虛十五分方為食既更進一十一分有奇乃得生光故為二十六分有奇如回回曆推十八分四十七秒略同此法也已而四川報冷守中所推月食實差二時而新法密合光啓又進曆書二十一卷冬十月辛丑朔日食新法預推順天見食二分一十二秒應天以南不食大漠以北食既例以京師見食不及三分不救護光啓言月食在夜加時早晚苦無定據惟日食按晷定時無可遷就故曆法疏密此為的證臣等纂輯新法漸次就緒而向後交食為期尚遠此時不與監臣共見至成曆後將何徵信且是食之必當測候更有說焉舊法食在正中則無時差今此食既在日中而新法仍有時差者蓋以七政運行皆依黃道不由赤道舊法所謂中乃赤道之午中非黃道之正中也黃赤二道之中獨冬夏至加時正午乃得同度今十月朔去冬至度數尚遠兩中之差二十三度有奇豈可因加時近午不加不減乎適際此日又值此時足可驗時差之正術一也本方之地經度未得真率則加時難定其法必從交食時測驗數次乃可較勘畫一今此食依新術測候其加時刻分或前後未合當取從前所記地經度分斟酌改定此可以求里差之真率二也時差一法但知中無加減而不知中分黃赤今一經目見人人知加時之因黃道因此推彼他術皆然足以知學習之甚易三也即分數甚少亦宜詳加測候以求顯驗帝是其言至期光啓率監臣預點日晷調壺漏用測高儀器測食甚日晷高度又於密室中斜開一隙置窺筒遠鏡以測虧圓畫日體分數圖板以定食分其時刻高度悉合惟食甚分數未及二分於是光啓言今食甚之度分密合則經度里差已無煩更定矣獨食分未合原推者蓋因太陽光大能減月魄必食及四五分以上乃得與原推相合然此測用密室窺筒故能得此分數倘止憑目力或水盆照映則眩耀不定恐少尚不止此也時有滿城布衣魏文魁著曆元曆測二書令其子象乾進曆元於朝通政司送局考驗光啓摘當極論者七事其一歲實自漢以來代有減差至授時減為二十四分二十五秒依郭法百年消一今當為二十一秒有奇而曆元用趙知微三十六秒翻覆驟加其一弧背求弦矢宜用密率今曆測中猶用徑一圍三之法不合弧矢真數其一盈縮之限不在冬夏至宜在冬夏至後六度今考日躔春分迄夏至夏至迄秋分此兩限中日時刻分不等又立春迄立夏立秋迄立冬此兩限中日時刻分亦不等測量可見其一言太陰最高得疾最低得遲且以圭表測而得之非也太陰遲疾是入轉內事表測高下是入交內事豈容混推而月行轉周之上又復左旋所以最高向西行極遲最低向東行乃極疾舊法正相反其一言日食正午無時差非也時差言距非距赤道之午中乃距黃道限東西各九十度之中也黃道限之中有距午前後二十餘度者但依午正加減焉能必合其一言交食定限陰曆八度陽曆六度非也日食陰曆當十七度陽曆當八度月食則陰陽曆俱十二度其一曆測云宋文帝元嘉六年十一月己丑朔日食不盡如鉤晝星見今以授時推之止食六分九十六秒郭曆舛矣夫月食天下皆同日食九服各異南宋都於金陵郭曆造於燕地北極出地差八度時在十一月則食差當得二分弱其云不盡如鉤當在九分左右郭曆推得七分弱乃密合非舛也本局今定日食分數首言交次言地次言時一不可闕已而文魁反覆論難光啓更申前說著為學曆小辨其論歲實小餘及日食變差尤明晰曰歲實小餘自漢迄元漸次消減今新法定用歲實更減於元不知者必謂不惟先天更先大統乃以推壬申冬至大統得己亥寅正一刻而新法得辰初一刻十八分何也蓋正歲年與步月離相似冬至無定率與定朔定望無定率一也朔望無定率宜以平朔望加減之冬至無定率宜以平年加減之故新法之平冬至雖在大統前而定冬至恆在大統後也又曰宋仁宗天聖二年甲子歲五月丁亥朔曆官推當食不食諸曆推算皆云當食夫於法則實當食而於時則實不食今當何以解之蓋日食有變差一法月在陰曆距交十度強於法當食而獨此日此地之南北差變為東西差故論天行則地心與日月相參直實不失食而從人目所見則日月相距近變為遠實不得食顧獨汴京為然若從汴以東數千里則漸見食至東北萬餘里外則全見食也夫變差時時不同或多變為少或少變為多或有變為無或無變為有推曆之難全在此等未幾光啓入內閣五年九月十五日月食監推初虧在卯初一刻光啓等推在卯初三刻回回科推在辰初初刻三法異同致奉詰問至期測候陰雲不見無可徵驗光啓具陳三法不同之故言時刻之加減由於盈縮遲疾兩差而盈縮差舊法起冬夏至新法起最高最高有行分惟宋紹興間與夏至同度郭守敬後此百年去離一度有奇故未覺今最高在夏至後六度此兩法之盈縮差所以不同也遲疾差舊法只用一轉周新法謂之自行輪自行之外又有兩次輪此兩法之遲疾差所以不同也至於回回曆又異者或由於四應或由於里差臣實未曉其故總之三家俱依本法推步不能變法遷就也將來有宜講求者二端一曰食分多寡日食時陽晶晃耀每先食而後見月食時游氣紛侵每先見而後食其差至一分以上今欲灼見實分有近造窺筒日食時於密室中取其光景映照尺素之上初虧至復圓分數真確畫然不爽月食用以仰觀二體離合之際鄞鄂著明與目測迥異此定分法也一曰加時早晚定時之術壺漏為古法輪鍾為新法然不若求端於日星晝則用日夜則任用一星皆以儀器測取經緯度數推算得之此定時法也二法既立則諸術之疏密毫末莫遁矣古今月食諸史不載日食自漢至隋凡二百九十三而食於晦者七十七晦前一日者三初二日者三其疏如此唐至五代凡一百一十而食於晦者一初二日者一初三日者一稍密矣宋凡一百四十八無晦食者更密矣猶有推食而不食者十三元凡四十五亦無晦食猶有推食而不食者一食而失推者一夜食而書晝者一至加時差至四五刻者當其時已然可知高遠無窮之事必積時纍世乃稍見其端倪故漢至今千七百歲立法者十有三家而守敬為最優尚不能無數刻之差而況於沿習舊法者何能責其精密哉是年光啓又進曆書三十卷明年冬十月光啓以病辭曆務以山東參政李天經代之逾月而光啓卒七年魏文魁上言曆官所推交食節氣皆非是於是命文魁入京測驗是時言曆者四家大統回回外別立西洋為西局文魁為東局言人人殊紛若聚訟焉天經繕進曆書凡二十九卷並星屏一具俱故輔光啓督率西人所造也天經預推五星凌犯會合行度言閏八月二十四木犯積尸氣九月初四昏初火土同度初七卯正金土同度十一昏初金火同度舊法推火土同度在初七是後天三日金火同度在初三是先天八日而文魁則言天經所報木星犯積尸不合天經又言臣於閏八月二十五日夜及九月初一日夜同禮臣陳六韐等用窺管測見積尸為數十小星團聚木與積尸共納管中蓋窺管圓徑寸許兩星相距三十分內者方得同見如觜宿三星相距三十七分則不能同見而文魁但據臆算未經實測據云初二日木星已在柳前則前此豈能越鬼宿而飛渡乎天經又推木星退行順行兩經鬼宿其度分晷刻已而皆驗於是文魁說絀天經又進曆書三十二卷並日晷星晷窺筒諸儀器八年四月又上乙亥丙子七政行度曆及參訂曆法條議二十六則其七政公說之議七一曰諸曜之應宜改蓋日月五星平行起算之根則為應乃某曜某日某時躔某宮次之數今新法改定諸應悉從崇禎元年戊辰前冬至後己卯日子正為始二曰測諸曜行度應用黃道儀蓋太陽由黃道行月星各有本道出入黃道內外不行赤道若用赤道儀測之所得經緯度分須通以黃赤通率表不如用黃道儀即得七政之本度為便也三曰諸方七政行度隨地不等蓋日月東西見食其時各有先後既無庸疑矣則太陽之躔二十四節氣與月五星之掩食凌犯安得不與交食同一理乎故新法立成諸表雖以順天府為主而推算諸方行度亦皆各有本法四曰諸曜加減分用平立定三差法尚不足蓋加減平行以求自行乃曆家要務第天實圓體與平行異類舊所用三差法俱從句股平行定者於天體未合即各盈縮損益之數未得其真今新法加減諸表乃以圓齊圓始可合天五曰隨時隨地可求諸曜之經度舊法欲得某日某曜經度必先推各曜冬至日所行宮度宿次後乃以各段日度比算始得今法不拘時日方所只簡本表推步即是六曰徑一圍三非弧矢真法蓋古曆家以直線測圓形名曰弧矢法而算用徑一圍三謬也今立割圓八線表其用簡而大弧矢等線但乘除一次便能得之七曰球上三角三弧形非句股可盡蓋古法測天以句股為本然句股能御直角不能御斜角且天為圓球其面上與諸道相割生多三弧形句股不足以盡之星之議四一曰恆星本行即所謂歲差從黃道極起算蓋各星距赤極度分古今不同其距赤道內外也亦古今不同而距黃極或距黃道內外則皆終古如一所以知日月五星俱依黃道行其恆星本行應從黃極起算以為歲差之率二曰古今各宿度不同蓋恆星以黃道極為極故各宿距星行度與赤道極時近時遠行漸近極即赤道所出過距星線漸密其本宿赤道弧則較小漸遠極即過距星線漸疏其本宿赤道弧則較大此緣二道二極不同非距星有異行亦非距星有易位也如觜宿距星漢測距參二度唐測一度宋崇寧測半度元郭守敬測五分今測之不啻無分且侵入參宿二十四分非一證乎三曰夜中測星定時蓋太陽依赤道左行每十五度為一小時今任測一星距子午圈前後度分又以本星經行與太陽經行相加減得太陽距子午圈度分因以變為真時刻四曰宋時所定十二宮次在某宿度今不能定於某宿度蓋因恆星有本行宿度已右移故也太陽之議四一曰太陽盈縮之限非冬夏二至所謂最高及最高衝也此限年年右行今已過二至後六度有奇二曰以圭表測冬夏二至非法之善蓋二至前後太陽南北之行度甚微計一丈之表其一日之影差不過一分三十秒則一秒得六刻有奇若測差二三秒即差幾二十刻安所得準乎今法獨用春秋二分蓋以此時太陽一日南北行二十四分一日之景差一寸二分即測差一二秒算不滿一刻較二至為最密三曰日出入分應從順天府起算蓋諸方北極出地不同晨昏時刻亦因以異大統依應天府算是以晝夜長短日月東西帶食所推不準今依順天府改定四曰平節氣非上天真節氣蓋舊法氣策乃歲周二十四分之一然太陽之行有盈有縮不得平分如以平分則春分後天二日秋分先天二日矣今悉改定太陰之議四一曰朔望之外別有損益分一加減不足以盡之蓋舊定太陰平行算朔望加減大率五度有奇然兩弦時多寡不一即授時亦言朔望外平行數不定明其理未著其法今於加減外再用一加減名為二三均數二曰緯度不能定於五度時多時寡古今曆家以交食分數及交泛等測定黃白二道相距約五度然朔望外兩道距度有損有益大距計五度三分度之一若一月有兩食其弦時用儀求距黃道度五度未能合天三曰交行有損益分蓋羅計都即正交中交行度古今為平行今細測之月有時在交上以平求之必不合算因設一加減為交行均數四曰天行無紫氣舊謂生於閏餘又為木之餘氣今細考諸曜無象可明知為妄增交食之議四一曰日月景徑分恆不一蓋日月有時行最高有時行最卑因相距有遠近見有大小又因遠近得太陰過景時有厚薄所以徑分不能為一二曰日食午正非中限乃以黃道九十度限為中限蓋南北東西差俱依黃道則時差安得不從黃道論其初末以求中限乎且黃道出地平上兩象限自有其高亦自有其中此理未明或宜加反減宜減反加凡加時不合者由此也三曰日食初虧復圓時刻多寡恆不等非二時折半之說蓋視差能變實行為視行則以視差較食甚前後鮮有不參差者夫視差既食甚前後不一又安能令視行前後一乎今以視行推變時刻則初虧復圓其不能相等也明矣四曰諸方各依地經推算時刻及日食分蓋地面上東西見日月出沒各有前後不同即所得時刻亦不同故見食雖一而時刻異此日月食皆一理若日食則因視差隨地不一即太陰視距不一所見食分亦異焉五緯之議三一曰五星應用太陽視行不得以段目定之蓋五星皆以太陽為主與太陽合則疾行衝則退行且太陽之行有遲疾則五星合伏日數時寡時多自不可以段目定其度分二曰五星應加緯行蓋五星出入黃道各有定距度又木土火三星衝太陽緯大合太陽緯小金水二星順伏緯小逆伏緯大三曰測五星當用星為準則蓋測星用黃道儀外宜用弧矢等儀以所測緯星視距二星若干度分依法布算方得本星真經緯度分或繪圖亦可免算是時新法書器俱完屢測交食凌犯俱密合但魏文魁等多方阻撓內官實左右之以故帝意不能決諭天經同監局虛心詳究務祈畫一是年天經推水星伏見及木星所在之度皆與大統各殊而新法為合又推八月二十七日寅正二刻木火月三曜同在張六度而大統推木在張四度火月張三度至期果同在張六度九年正月十五日辛酉曉望月食天經及大統回回東局各預推虧圓食甚分秒時刻天經恐至期雲掩難見乃按里差推河南山西所見時刻奏遣官分行測驗其日天經與羅雅谷湯若望大理評事王應遴禮臣李焻及監局守登文魁等赴臺測驗惟天經所推獨合已而河南所報盡合原推山西則食時雲掩無從考驗帝以測驗月食新法為近但十五日雨水而天經以十三日為雨水令再奏明天經覆言論節氣有二法一為平節氣一為定節氣平節氣者以一歲之實二十四平分之每得一十五日有奇為一節氣故從歲前冬至起算必越六十日八十七刻有奇為雨水舊法所推十五日子正二刻者此也定節氣者以三百六十為周天度而亦以二十四平分之每得一十五度為一節氣從歲前冬至起算歷五十九日二刻有奇而太陽行滿六十度為雨水新法所推十三日卯初二刻八分者此也太陽之行有盈有縮非用法加減之必不合天安得平分歲實為節氣乎以春分證之其理更明分者黃赤相交之點太陽行至此乃晝夜平分舊法於二月十四日下注晝五十刻夜五十刻是也夫十四日晝夜已平分則新法推十四日春分者為合天而舊法推十六日者後天二日矣知春分則秋分及各節氣可知而無疑於雨水矣已而天經於春分屆期每午赴臺測午正太陽高度二月十四日高五十度八分十五日高五十度三十三分天經乃言京師北極出地三十九度五十五分則赤道應高五十度五分春分日太陽正當赤道上其午正高度與赤道高度等過此則太陽高度必漸多今置十四日所測高度加以地半徑差二分較赤道已多五分蓋原推春分在卯正二刻五分弱是時每日緯行二十四分弱時差二十一刻五分則緯行應加五分強至十五日並地半徑較赤道高度已多至三十分况十六日乎是春分當在十四不當在十六也秋分亦然又出節氣圖曰內規分三百六十五度四分度之一者日度也外規分三百六十度者天度也自冬至起算越九十一日三十一刻六分而始歷春分者日為之限也乃在天則已踰二度餘矣又越二百七十三日九十三刻一十九分而即交秋分者亦日為之限也乃在天不及二度餘豈非舊法春分每後天二日秋分先天二日耶十年正月辛丑朔日食天經等預推京師見食一分一十秒應天及各省分秒各殊惟雲南太原則不見食其初虧食甚復圓時刻亦各異大統推食一分六十三秒回回推食三分七十秒東局所推止游氣侵光三十餘秒而食時推驗惟天經為密時將廢大統用新法於是管理另局曆務代州知州郭正中言中曆必不可盡廢西曆必不可專行四曆各有短長當參合諸家兼收西法十一年正月乃詔仍行大統曆如交食經緯晦朔弦望因年遠有差者旁求參考新法與回回科並存是年進天經光祿寺卿仍管曆務十四年十二月天經言大統置閏但論月無中氣新法尤視合朔後先今所進十五年新曆其十月十二月中氣適交次月合朔時刻之前所以月內雖無中氣而實非閏月蓋氣在朔前則此氣尚屬前月之晦也至十六年第二月止有驚蟄一節而春分中氣交第三月合朔之後則第二月為閏正月第三月為二月無疑時帝已深知西法之密逮十六年三月乙丑朔日食測又獨驗八月詔西法果密即改為大統曆法通行天下未幾國變竟未施行本朝用為時憲曆按明制曆官皆世業成弘間尚能建修改之議萬曆以後則皆專己守殘而已其非曆官而知曆者鄭世子而外唐順之周述學陳壤袁黃雷宗皆有著述唐順之未有成書其議論散見周述學之曆宗通議曆宗中經袁黃著曆法新書其天地人三元則本之陳壤而雷宗亦著合璧連珠曆法皆會通回回曆以入授時雖不能如鄭世子之精微其於中西曆理亦有所發明邢雲路古今律曆考或言本出魏文魁手文魁學本膚淺無怪其所疏授時皆不得其旨也西洋人之來中土者皆自稱甌羅巴人其曆法與回回同而加精密嘗考前代遠國之人言曆法者多在西域而東南北無聞唐之九執曆元之萬年曆及洪武間所譯回回曆皆西域也蓋堯命羲和仲叔分宅四方羲仲羲叔和叔則以嵎夷南交朔方為限獨和仲但曰宅西而不限以地豈非當時聲教之西被者遠哉至於周末疇人子弟分散西域天方諸國接壤西陲非若東南有大海之阻又無極北嚴寒之畏則抱書器而西征勢固便也甌羅巴在回回西其風俗相類而好奇喜新競勝之習過之故其曆法與回回同源而世世增修遂非回回所及亦其好勝之俗為之也羲和既失其守古籍之可見者僅有周髀而西人渾蓋通憲之器寒熱五帶之說地圓之理正方之法皆不能出周髀範圍亦可知其源流之所自矣夫旁搜博採以續千百年之墜緒亦禮失求野之意也故備論之
