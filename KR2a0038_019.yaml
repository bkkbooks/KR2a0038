body:
  text: 明史卷十九本紀第十九穆宗穆宗契天隆道淵懿寬仁顯文光武純德弘孝莊皇帝諱載垕世宗第三子也母杜康妃嘉靖十八年二月封裕王與莊敬太子景恭王同日受冊已而莊敬薨世宗以王長且賢繼序已定而中外危疑屢有言者乃令景王之國四十五年十二月庚子世宗崩壬子即皇帝位以明年為隆慶元年大赦天下先朝政令不便者皆以遺詔改之召用建言得罪諸臣死者恤録方士悉付法司治罪罷一切齊醮工作及例外採買免明年天下田賦之半及嘉靖四十三年以前逋賦釋戶部主事海瑞於獄是年土魯番入貢隆慶元年春正月丙寅罷睿宗明堂配享戊辰復鄭王厚烷爵丁丑追尊母康妃為孝恪皇太后二月戊子祭大社大稷乙未冊妃陳氏為皇后吏部侍郎陳以勤為禮部尚書兼文淵閣大學士禮部侍郎張居正為吏部左侍郎兼東閣大學士預機務三月壬申葬肅皇帝於永陵乙酉土蠻犯遼陽指揮王承德戰歿夏四月丙戌朔享太廟丙午禁屬國毋獻珍禽異獸丁未御經筵五月己未黃河決口工成辛酉祀地於北郊丁丑高拱罷六月戊戌以霪雨修省素服避殿御皇極門視事是月新河復決秋七月辛巳招撫山東河南被災流民復五年八月癸未朔釋奠於先師孔子九月乙卯俺答寇大同詔嚴戰守癸亥俺答陷石州殺知州王亮采掠交城文水壬申土蠻犯薊鎮掠昌黎盧龍至於灤河詔宣大總督侍郎王之誥還駐懷來巡撫都御史曹亨駐兵通州甲戌郭朴致仕免襄陽鄖陽被災秋糧乙亥總兵官李世忠援永平與敵戰於撫寧京師戒嚴冬十月丙戌寇退京師解嚴甲辰諭羣臣議邊防事宜寧夏總兵官雷龍出塞邀擊河套部敗之十一月癸亥祀天於南郊是年廣東賊大起琉球入貢二年春正月己卯給事中石星疏陳六事杖闕下斥為民二月丁酉寇犯柴溝堡守備韓尚忠戰死己亥耕藉田丁未如天壽山謁長陵永陵庚戌還宮免所過田租有差三月辛酉立皇子翊鈞為皇太子詔赦天下乙丑廣西總兵官俞大猷討廣東賊戊辰賜羅萬化等進士及第出身有差丙子幸南海子戊寅京師地震命百官修省夏六月庚辰遣使兩畿録囚己丑廣東賊曾一本寇廣州殺知縣劉師顏秋七月己酉賊入廉州丙寅徐階致仕冬十月戊寅免南畿被災秋糧振淮徐饑己亥廢遼王憲為庶人甲辰免畿內河南被災秋糧十一月壬子宣府總兵官馬芳襲俺答於長水海子又敗之鞍子山辛酉免江西被災稅糧戊辰祀天於南郊己巳命廣東福建督撫將領會剿曾一本十二月庚寅世宗神主祔太廟丁酉限勳戚莊田是年琉球入貢三年春正月壬子大同總兵官趙岢敗俺答於弘賜堡二月庚辰免陝西被災秋糧三月戊辰曾一本陷碣石衛裨將周雲翔殺參將耿宗元叛附於賊夏四月己丑總兵官雷龍出塞襲河套部敗之五月庚戌總兵官郭成等破賊於平山周雲翔伏誅甲寅御史詹仰庇請罷靡費斥為民秋七月壬午河決沛縣乙酉詔天下有司實修積穀備荒之政壬辰遣使振沿河被災州縣八月癸丑廣東賊平曾一本伏誅壬戌禮部尚書趙貞吉兼文淵閣大學士預機務丁卯振南畿浙江山東水災九月丙子俺答犯大同掠山陰應州懷仁渾源辛卯大閲冬十一月甲戌祀天於南郊庚辰京師地震有聲敕修省十二月己亥命廠衛密訪部院政事庚申召高拱復入閣乙丑尚寶寺丞鄭履淳以言事廷杖下獄是冬免兩畿山東浙江河南湖廣稅糧是年陝西賊起琉球土魯番入貢四年春正月己巳朔日有食之免朝賀辛未避殿修省是月倭入廣海衛城二月乙丑分設三大營文武提督六人夏四月戊戌京師地震丙午俺答寇大同宣府官兵拒却之是月陝西賊寇四川五月癸酉給事中李己諫買金寶廷杖下獄秋七月己巳禁章奏浮冗命撫按官嚴禁有司酷刑戊子陳以勤致仕乙未免四川被災稅糧八月庚戌宣大告警敕邊備九月癸酉陝西水災蠲振有差甲戌河決邳州壬午免北畿湖廣被災稅糧癸未寇犯大同副總兵錢棟戰死戊子犯錦州總兵官王治道等戰死甲午罷京營文武提督置總督協理大臣冬十月癸卯俺答孫把漢那吉來降丁未以把漢那吉為指揮使壬戌考察給事中御史十一月丁丑俺答乞封己卯祀天於南郊乙酉趙貞吉罷己丑禮部尚書殷士儋兼文淵閣大學士預機務十二月丁酉俺答執叛人趙全等九人來獻詔遣把漢那吉歸厚賜之乙卯受俘磔趙全等於市五年春二月甲午廷臣及朝覲官謁皇太子於文華左門己未封皇子翊鏐為潞王三月己卯賜張元忭等進士及第出身有差己丑封俺答為順義王夏四月甲午河復決邳州五月壬戌古田僮賊平戊寅李春芳致仕六月辛卯京師地震者三敕修省甲辰授河套部長吉能為都督同知甲寅順義王俺答貢馬告廟受賀丙辰俺答執趙全餘黨十三人來獻秋八月癸卯許河套部互市九月癸未三鎮貢市成冬十月己亥河南山東大水申飭河防十一月己巳殷士儋致仕是年琉球土魯番入貢六年春正月辛未築徐州至宿遷隄三百七十里二月丙申倭寇廣東陷神電衛大掠山寇復起閏月丁卯御皇極殿門疾作遽還宮乙亥倭寇高雷官軍擊敗之夏四月戊辰禮部尚書高儀兼文淵閣大學士預機務五月壬辰免廣東用兵諸郡逋賦己酉大漸召大學士高拱張居正高儀受顧命庚戌崩於乾清宮年三十有六七月丙戌上尊諡廟號穆宗葬昭陵贊曰穆宗在位六載端拱寡營躬行儉約尚食歲省巨萬許俺答封貢減賦息民邊陲寧謐繼體守文可稱令主矣第柄臣相軋門戶漸開而帝未能振肅乾綱矯除積習蓋亦寬恕有餘而剛明不足者歟
