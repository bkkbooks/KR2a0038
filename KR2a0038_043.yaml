body:
  text: 明史卷四十三志第十九地理四四川江西四川禹貢梁荊二州之域元置四川等處行中書省治成都路又置羅羅蒙慶等處宣慰司治建昌路屬雲南行中書省洪武四年六月平明升七月置四川等處行中書省九月置成都都衛與行中書省同治八年十月改都衛為四川都指揮使司領招討司一宣慰司二安撫司五長官司二十二及諸衛所九年六月改行中書省為承宣布政使司領府十三直隸州六宣撫司一安撫司一屬州十五縣百十一長官司十六為里千一百五十有奇北至廣元與陝西界東至巫山與湖廣界南至烏撒東川與貴州雲南界西至威茂與西番界距南京七千二百六十里京師一萬七百一十里洪武二十六年編戶二十一萬五千七百一十九口一百四十六萬六千七百七十八弘治四年戶二十五萬三千八百三口二百五十九萬八千四百六十萬曆六年戶二十六萬二千六百九十四口三百一十萬二千七十三成都府元成都路洪武四年為府領州六縣二十五成都倚洪武十一年建蜀王府華陽倚北有武擔山又有外江自灌縣分流經城北繞城而南一名清遠江又有內江亦自灌縣分流經城南繞城而東亦名石犀渠合流南注於大江此府城之內外江也東有寧州衛洪武十一年四月置東南有馬軍寨巡檢司雙流府西南洪武十年五月省入華陽縣十三年十一月復置東南有牧馬川即府城內外江下流也郫府西有內江一名郫江即府城內江之上流也溫江府西少南西南有皂江亦曰內江新繁府西北洪武十年五月省入成都縣十三年十一月復置西北有沱江又西有湔口新都府北東有雒水自什邡縣流經此下流至瀘州入大江亦曰中水北有湔水即大江別流自灌縣東北出流經此至漢州入雒水東北有綿水自漢州流至此入雒江三水同流亦曰郫江也彭府北元彭州洪武十年五月降為縣北有九隴山有葛璝山又有大隋山中隋山南有沱江又北有濛水流合焉又東有濛陽縣元屬彭州洪武十年五月省又北有白石溝巡檢司崇寧府西北元屬彭州洪武四年屬府十年五月省入灌縣十三年十一月復置南有沱江灌府西少北元灌州洪武中降為縣西北有灌口山又有玉壘山下有玉壘關一名七盤關又西南有青城山又西有湔江亦曰都江亦曰湔堋江古離堆也岷江經此正流引而南支流分三道繞成都境有石渠水口又有白沙水下流入都江又南有沱江即郫江上源也又西有蠶崖關巡檢司西南有獠澤關金堂府東洪武十年五月省入新都縣十三年十一月復置東北有三學山南有雲頂山有金堂峽雒水經此曰金堂河東南又有懷口巡檢司仁壽府南少東東有麗甘山下有鹽井東有三嵎山又有蟠溪下流入資江又南有陵井産鹽亦曰仙井井研府南少東洪武六年十二月置十年五月省入仁壽縣十三年十一月復置東北有鐵山舊産鐵南有鹽井資府東明玉珍置資州洪武初降為縣南有珠江即雒江也東流為資江東有銀山鎮巡檢司內江府東南洪武中置西有中江即雒之異名南有椑木鎮巡檢司安府北少東元安州治在西北洪武中降為縣移於今治南有浮山黑水出焉南流入羅江縣界北有曲山關東有小東壩關又東南有睢水關關西有綿堰堡綿水發源處也簡州洪武六年降為縣正德八年又升為州舊治在絳河北正德八年徙治河南東北有石鼓山西有分棟山東有雁水即雒水也絳水自北來合焉一名赤水亦曰牛鞞水又城內有牛皮井産鹽西有龍泉鎮巡檢司西南有陽安關西北距府百五十里領縣一資陽州東洪武六年十二月置屬府十年五月省入簡縣成化元年七月復置仍屬府正德中改屬州西有資溪流入雁水東有資陽鎮巡檢司後移治濛溪河崇慶州元治晉原縣洪武中省縣入州西有鶴鳴山西北有鄩江東流入新津界又北有味江東北有白馬江皆岷江南出之別名也西北有永康縣東南有江源縣明玉珍復置洪武初省西有清溪口巡檢司東北距府百十里領縣一新津州東南有天社山南枕大江一名皂江東有北江亦曰新穿水自府城南流經此合大江漢州明玉珍復置雒縣為州治洪武四年省縣入州東有雒水有綿水又西南有湔水流入雒又北有雁水亦流入雒故雒水亦兼雁水之名又東北有石亭水流合綿水東南有三水關巡檢司西南距府百十里領縣三什邡州西洪武十年五月省入綿竹縣十三年十一月復置西北有章山雒水出此亦名雒通山南有高鏡關雒水經其南又西有大逢山綿竹州西北西北有紫巖山綿水出焉又有紫溪河一名射水河又北有睢水關德陽州東北洪武十年五月省入漢州十三年十一月復置北有鹿頭山上有鹿頭關東有綿水西南有石亭水南有白馬關巡檢司綿州元屬潼川府洪武三年來屬十年五月降為縣十三年十一月復為州東有富樂山西有涪水源出松潘衛流經此亦曰綿江下流至合州合於嘉陵江又西北有安昌水一名龍安水東南流合涪水又東有潺水亦合於涪水東有魏城巡檢司西南距府三百六十里領縣二羅江州南洪武六年十二月省入綿州十三年十一月復置東北有羅江涪水與安昌水會流處也又西有黑水自安縣流入界又西南有白馬關巡檢司關與德陽縣鹿頭關相對彰明州北洪武十年五月省入綿縣十三年十一月復置東北有太華山西有涪江北有廉水西有讓水俱流入焉茂州元治汶山縣屬陝西行省吐番宣慰司洪武中省縣入州十六年復置縣後復省南有岷山即隴山之南首也汶江自松潘衛流入經山下又東經州城西東南流回環於四川湖廣江西三布政司及南直隸之地入於海幾七千餘里南有雞宗關東有積水關北有魏磨關三巡檢司又南有七星關又有雁門關東有桃坪關北有實大關西北有黃崖關有汶山長官司又南有靜川長官司東南有隴木頭長官司西南有嶽希蓬長官司俱洪武七年五月置屬重慶衛又北有長寧堡本長寧安撫司宣德中平曆日諸蠻置屬松潘衛正統元年二月改屬壘溪所八年六月改屬茂州衛後廢為堡東南距府五百五十里領縣一汶川州西南北有七盤山西有玉輪江即汶江也有汶川長官司洪武七年五月置西有寒水關巡檢司又南有徹底關威州元以州治保寧縣省入明玉珍復置縣洪武二十年五月復省縣入州舊治在西北鳳坪里宣德三年六月遷於保子岡河西十年六月又遷於保子岡河東千戶所城內東南有定廉山鹽溪出焉又西南有雪山亦曰西山北有汶江西北有赤水北有平谷水俱流入焉東有通化縣洪武三年省西北有保子關徹底關西南有鎮夷關東南距府四百五十里領縣一保州西北洪武六年分保寧縣地置東有汶江西北有鎮安關保寧府元屬廣元路洪武四年直隸行省領州二縣八西南距布政司七百里閬中倚成化二十三年建雍王府弘治三年遷於湖廣衡州府四年八月建壽王府正德元年遷於湖廣德安府舊治在縣東明玉珍徙於此東有蟠龍山其北有鋸山關又有靈山其麓為梁山關南有嘉陵江即西漢水自陝西寧羌州流入至巴縣合大江亦曰閬水又曰巴水其下流曰渝水有南津關在城南臨嘉陵江又有滴水關在城北玉臺山下又東南有和溪關蒼溪府西北洪武十年五月省入閬中縣十三年十一月復置大獲山在東宋江環其下東南有雲臺山西南有嘉陵江宋江自西流入焉北有八字堡巡檢司南部府南少東洪武十年五月省入閬中縣十三年十一月復置南有南山一名跨鰲山東南有離堆山東北有嘉陵江廣元府北少西元廣元路治綿谷縣洪武四年改為府九年四月降為州來屬以綿谷縣省入十三年十一月復置綿谷縣二十二年六月降州為縣復省綿谷縣入焉北有潭毒山上有潭毒關下臨大江又有朝天嶺上有朝天關又有七盤嶺上有七盤關為陝西四川分界處又東北有大漫天嶺其北有小漫天嶺西有嘉陵江北有渡口在大小二漫間東有百丈關北有望雲關有龍門閣北達陝西寧羌州昭化府西北元屬廣元路洪武十年五月省入廣元州十三年十一月復置屬府西南有長寧山有白衛嶺又西有九曲山東有嘉陵江其津口曰桔柏津渡口關在焉北有白水自陝西文縣流入亦曰葭萌水合於嘉陵江又北有馬鳴閣又有石匱閣劍州元屬廣元路洪武六年以州治普安縣省入來屬九年省十三年十一月復置北有大劍山亦曰梁山西北接小劍山飛閣通衢謂之劍閣有大小劍門關在其上又有漢陽山東有嘉陵江西南有涪江北有大劍溪小劍溪又有泥溪東南距府三百二十里領縣一梓潼州西南西有梓潼水亦曰潼江水下流入於涪江又北有揚帆水流合潼江水又東有小潼水下流入嘉陵江巴州元屬廣元路洪武九年四月以州治化城縣省入又改州為縣來屬正德九年復為州東北有小巴山與漢中大巴山接巴江水出焉經州東南分為三下流至合州入嘉陵江南有清水江流合巴江東有曾口縣元屬州後廢又北有米倉關巡檢司本治小巴山之巔尋徙大巴山下後廢東北距府三百五十里領縣二通江州東少北元至正四年置屬府正德九年改屬州舊治在趙口坪洪武中徙於今治東有得漢山南有巴江又有宕水在縣西壁山下亦曰諾水流入巴江東北有濛壩北有羊圈山二巡檢司又東北有桐柏關相對樗林關南江州北正德十一年置北有兩角山南有難江源出南鄭縣米倉山下流入巴江西北有大壩巡檢司順慶府元順慶路洪武中為府領州二縣八西南距布政司六百里南充倚北有北津渡縣舊治也洪武中徙今治南有清居山西有大小方山東有嘉陵江西有曲水又有流溪水東有清水溪又有大斗溪俱流注於嘉陵江又西有昆井産鹽府境州縣多鹽井北有北津渡巡檢司西充府西北洪武十年五月省入南充縣十三年十一月復置南有南岷山上有九井十三峯西有西溪即流溪也蓬州元屬順慶路洪武中以州治相如縣省入東南有雲山西有嘉陵江東北有巴江西南距府百四十里領縣二營山州東少北洪武十年五月省入蓬州十三年十一月復置東北有大小蓬山東有巴江儀隴州北少東洪武十年五月省入蓬州十三年十一月復置西有伏虞山北有金城山一名金粟山東有巴江北有鼇水流入嘉陵江廣安州元廣安府屬順慶路洪武四年降為州來屬十年五月以州治渠江縣省入東北有篆江即巴江合渠江之下流也江中有三十六灘亦名洄水又北有濃水南流合於環水至州南合洄水並注合州之嘉陵江西北距府二百十里領縣四嶽池州西北東有嶽池水渠州東北元渠州屬順慶路至元二十六年五月省州治流江縣入焉洪武九年四月降為縣東北有八濛山東有宕渠山有渠江下流合巴江又北有衛渠關正德中置鄰水州東少南成化元年七月置東南有鄰山産鐵有鄰水下流入大江縣以此名大竹州東少北元屬渠州洪武九年來屬西有九盤山東有東流溪下流合於渠江夔州府元夔州路屬四川南道宣慰司洪武四年為府九年四月降為州屬重慶府十年五月直隸布政司十三年十一月復為府領州一縣十二西距布政司千九百里奉節倚洪武九年四月省十三年十一月復置東北有赤甲山東有白帝山又有白鹽山南濱江東出為瞿唐峽峽口曰灩澦堆又西有南鄉峽虎鬚灘東有龍脊灘皆江流至險處又東有大瀼水東瀼水俱流入江南有尖山又有金子山二巡檢司又東有瞿唐關東南有江關南有八陳磧磧旁有鹽泉巫山府東東有巫山亦曰巫峽大江經其中東入湖廣巴東縣界東有大寧河又有萬流溪皆流入大江大昌府東洪武十三年十一月置西有千頃池又有當陽