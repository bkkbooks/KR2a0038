body:
  text: 明史卷一百五十五列傳第四十三宋晟薛祿郭義金玉劉榮朱榮費瓛談廣陳懷馬亮蔣貴孫琬任禮趙安趙輔劉聚宋晟字景陽定遠人父朝用兄國興並從渡江皆積功至元帥攻集慶國興戰歿晟嗣其職既而朝用請老晟方從鄧愈克徽州召還襲父官纍進都指揮同知歷鎮江西大同陝西洪武十二年坐法降涼州衛指揮使十七年五月討西番叛酋至亦集乃路擒元海道千戶也先帖木兒國公吳把都剌赤等俘獲萬八千人送酋長京師簡其精鋭千人補卒伍餘悉放遣召還復為都指揮進右軍都督僉事仍鎮涼州二十四年充總兵官與都督劉真討哈梅里其地去肅州千餘里晟令軍中多具糧糗倍道疾馳乘夜至城下質明金鼓聲震地闔城股栗遂克之擒其王子別兒怯帖木兒及偽國公以下三十餘人收其部落輜重以歸自是番戎懾服兵威極於西域明年五月從藍玉征罕東徇阿真川土酋哈咱等遁去師還調中軍都督僉事二十八年六月從總兵官周興出開原至忽剌江部長西陽哈遁追至甫答迷城俘人畜而還明年拜征南右副將軍討廣西帡幪諸寨苗擒斬七千餘人又明年總羽林八衛兵討平五開龍里苗三十一年出鎮開平從燕王出塞還城萬全諸衛建文改元仍鎮甘肅成祖即位入朝進後軍左都督拜平羌將軍遣還鎮永樂三年招降把都帖木兒倫都兒灰等部落五千人獲馬駝牛羊萬六千封西寧侯祿千一百石世指揮使晟凡四鎮涼州前後二十餘年威信著絶域帝以晟舊臣有大將材專任以邊事所奏請輒報可御史劾晟自專帝曰任人不專則不能成功況大將統制一邊寧能盡拘文法即敕晟以便宜從事晟嘗請入朝報曰西北邊務一以委卿非召命毋輒來尋命營河西牧地及圖出塞方略會病卒五年七月也晟三子長瑄建文中為府軍右衛指揮使戰靈璧先登斬數級力鬬死瑄弟琥尚成祖女安成公主得嗣侯豫世券八年佩前將軍印鎮甘肅十年與李彬捕叛酋老的罕俘斬甚衆召還洪熙元年坐不敬奪爵並削駙馬都尉官宣德中復都尉琥既廢弟瑛嗣瑛尚咸寧公主正統中歷掌左軍前府事瓦剌也先入寇瑛充總兵官督大同守將朱冕石亨等戰陽和全軍敗沒瑛及冕皆戰死贈鄆國公諡忠順子傑嗣景泰中典禁兵宿衛以謹慎稱卒子誠嗣署右府事復佩平羌將軍印鎮甘肅誠有材武嘗出獵至涼州遇寇掠牛馬北去誠三矢殪三人寇驚散盡驅所掠還九傳至孫裕德死流寇難薛祿膠人行六軍中呼曰薛六既貴乃更名祿祿以卒伍從燕起兵首奪九門真定之戰左副將軍李堅迎鬬鋒始交祿持槊刺堅墜馬擒之擢指揮僉事從援永平下大寧富峪會州寬河還救北平先驅敗南軍遊騎進指揮同知攻大同為先鋒戰白溝河追奔至濟南遷指揮使戰東昌以五十騎敗南兵數百時成祖為盛庸所敗還走北平庸檄真定諸將屯威縣深州邀燕歸路祿皆擊走之戰滹沱河右軍却祿馳赴陳出入數十戰破之追奔至夾河斬馘無算戰單家橋為平安所執奮脫縛拔刀殺守卒馳還復戰大敗安軍掠順德大名彰德攻西水寨生擒都指揮花英乘勝下東阿東平汶上連戰淝河小河靈璧功最入京師擢都督僉事永樂六年進同知八年充驃騎將軍從北征進右都督十年上言自古用人必資豫教今武臣子弟間暇不教恐緩急無可使者帝韙其言會四方送幼軍數萬至悉隸祿操習之十五年以行在後軍都督董營造十八年十二月定都北京授奉天靖難推誠宣力武臣封陽武侯祿千一百石二十一年將右哨從北征還討平長興盜二十二年再領右哨從北征仁宗即位命掌左府加太子太保豫世券洪熙元年充總兵官備禦塞外尋以獲寇功益祿五百石是年頒諸將軍印於各邊鎮祿佩鎮朔大將軍印巡開平至大同邊宣宗即位召還陳備邊五事尋復遣巡邊宣德元年從征樂安為前鋒高煦就擒留祿與尚書張本鎮撫之明年春奉詔巡視畿南諸府城池嚴戒軍士毋擾民違者以軍法論是夏復佩大將軍印北巡開平還駐宣府敵犯開平無所得而退去城三百餘里祿帥精兵晝伏夜行三夕至縱輕騎蹂敵營破之大獲人畜師還敵躡其後復奮擊敗之敵由是遠遁召還三年從北征破敵於寬河留鎮薊州永平復數佩鎮朔印巡邊護餉出開平宣府間五年遇敵於鳳凰嶺斬獲多加太保上言永寧衛團山及雕鶚赤城雲州獨石宜築城堡便守禦詔發軍民三萬六千赴工精騎一千五百護之皆聽祿節制臨行賜詩以山甫南仲為比祿武人不知書以問楊士奇士奇曰上以古賢人待君也祿拊心曰祿安敢望前賢然敢不勉圖報上恩萬一其年六月有疾召還踰月卒贈鄞國公諡忠武祿有勇而好謀謀定後戰戰必勝紀律嚴明秋毫無犯善撫士卒同甘苦人樂為用靖難諸功臣張玉朱能及祿三人為最而祿逮事三朝巋然為時宿將孫詵嗣至曾孫翰卒無子族人爭襲久之不得請田宅並入官世絶者三十餘年萬曆五年乃復封翰族子鋹為侯再傳至濂崇禎末京師陷被害永樂中從起兵北平後積功至大將封侯伯不以靖難功者薛祿及郭義金玉劉榮朱榮凡五人而義玉與祿同日封云郭義濟寧人洪武時纍功為燕山千戶從成祖入京師纍遷左都督永樂九年坐曠職謫交址立功已而宥之數從出塞有功封安陽侯祿千一百石亦授奉天靖難武臣號時義在南京疾革聞命而卒金玉江浦人襲父官為羽林衛百戶調燕山護衛從起兵有功纍遷河南都指揮使永樂三年進都督僉事八年充鷹揚將軍從北征師旋為殿至長秀川收敵所棄牛羊雜畜亙數十里十四年討平山西妖賊劉子進論前後功封惠安伯祿九百石十九年卒妾田氏自經以殉贈淑人劉榮宿遷人初冒父名江從魏國公徐達戰灰山黑松林為總旗給事燕邸雄偉多智略成祖深器之授密雲衛百戶從起兵為前鋒屢立戰功徇山東與朱榮帥精騎三千夜襲南軍於滑口斬數千人獲馬三千擒都指揮唐禮等纍授都指揮僉事戰滹沱河奪浮橋掠館陶曹州大獲還軍救北平敗平安軍於平村楊文以遼東兵圍永平江往援文引却江聲言還北平行二十餘里卷甲夜入永平文聞江去復來攻江突出掩擊大敗之斬首數千擒指揮王雄等七十一人遷都指揮使從至淝河與白義王真以輕騎誘致平安敗之時南軍駐宿州積糧為持久計成祖患之議絶其餉道命江將三千人往趦趄不行成祖大怒欲斬之諸將叩首請乃免渡江策功以前罪不封止授都督僉事遷中府右都督永樂八年從北征以遊擊將軍督前哨乘夜據清水源敗敵斡難河復敗阿魯台於靖虜鎮師還為殿即軍中進左都督遣鎮遼東敵闌入殺官軍帝怒命斬江既而宥之九年復鎮遼東十二年再從北征仍為前鋒將徑騎偵敵於飲馬河見敵騎東走追至康哈里孩擊斬數十人復與大軍合擊馬哈木於忽失溫下馬持短兵突陳斬獲多受上賞復充總兵官鎮遼東倭數寇海上北抵遼南訖浙閩瀕海郡邑多被害江度形勢請於金線島西北望海堝築城堡設烽堠嚴兵以待十七年六月瞭者言東南海島中舉火江急引兵赴堝上倭三十餘舟至泊馬雄島登岸奔望海堝江依山設伏別遣將斷其歸路以步卒迎戰佯却賊入伏中炮舉伏起自辰至酉大破賊賊走櫻桃園空堡中江開西壁縱之走復分兩路夾擊盡覆之斬首千餘級生擒百三十人自是倭大創不敢復入遼東詔封廣寧伯祿千二百石豫世券始更名榮尋遣還鎮明年四月卒榮為將常為軍鋒所向無堅陳馭士卒有紀律恩信嚴明諸發塞者撫輯備至既卒人咸思之贈侯諡忠武子湍嗣卒無子弟安嗣正統十四年與郭登鎮大同也先擁英宗至城下邀登出見登不可安出見伏哭帝前景帝降敕切責安馳至京師言奉上皇命來告敵情且言進己為侯羣臣交劾下獄論死會京師戒嚴釋安充總兵官陳東直門寇退進都督同知守備白羊口復伯爵英宗復位豫世侯再益祿三百石曹欽反安被創加太子少傅成化中卒贈嶧國公諡忠僖傳爵至明亡朱榮字仲華沂人洪武十四年以總旗從西平侯沐英征雲南纍官副千戶守大寧降於成祖襲孫霖於滑口圍定州斷南軍餉道大小二十餘戰論功授都督僉事永樂四年從新城侯張輔征交址破雞陵關會沐晟於白鶴輔等議於嘉林江上流濟師遣榮陳下流十八里日增其數以惑賊又作舟筏為欲濟狀以牽制之賊果分兵渡江登岸榮等奮擊大破之大軍進克多邦城榮功為多帝以榮嘗怠事師還論功僅擢右都督賜白金鈔幣七年復從輔討賊餘黨平之明年督右掖從征阿魯台與劉榮並進左都督十二年復從北征與榮俱為前鋒其冬充總兵官鎮大同修忙牛嶺兔毛河赤山榆楊口來勝諸城寇不敢近居三年召還十八年代劉榮鎮遼東二十年復從北征為前鋒駐雕鶚詗寇以五千騎視敵所向大軍次玉沙泉榮帥鋭士三百人人三馬齎二十日糧深入敵已棄牛羊馬駝北走悉收之焚其輜重移師破兀良哈師還封武進伯祿千二百石仍鎮遼東二十二年復從北征已還鎮洪熙元年佩征虜前將軍印鎮如故其年七月卒於鎮贈侯諡忠靖子冕嗣以晉王濟熿新廢命鎮山西尋召還六年命輸餉獨石因巡其地正統四年佩征西將軍印鎮大同十四年從北征戰於陽和死之諡忠賣心子瑛嗣傳爵至明亡費瓛定遠人祖愚洪武時為燕府左相改授燕山中護衛指揮使傳子肅至瓛從成祖起兵有功纍進後軍都督僉事永樂八年春涼州衛千戶虎保永昌衛千戶亦令真巴等叛衆數千屯據驛路新附伯顏帖木兒等應之西鄙震動都指揮李智擊之不勝賊聲言攻永昌涼州城皇太子命瓛往討至涼州智及都指揮陳懷以師會遂進兵鎮番遇賊於雙城瓛擊其左懷等擊其右賊大敗走斬首三百餘級追奔至黑魚海獲賊千餘馬駝牛羊十二萬虎保等遠遁乃班師十二年充總兵官鎮甘肅瓛以肅州兵多糧少脫有調發猝難措置請以臨鞏稅糧付近邊軍丁轉運又以涼州多間田請給軍屯墾從之洪熙元年豫平羌將軍印永樂時諸邊率用宦官協鎮恣睢專軍務瓛亦為所制仁宗知之賜璽書責之曰爾以名臣後受國重寄乃俯首受制於人豈大丈夫所為其痛自懲艾圖後效瓛得書陳謝宣宗嗣位進右府左都督元年七月入朝封崇信伯祿千一百石從征高煦次流河驛帝念前鋒薛祿軍少命瓛帥兵益之還豫世券復鎮甘肅二年沙州衛賊屢劫撒馬兒罕及亦力把里貢使瓛討破之明年卒於鎮瓛為人和易善撫士在鎮十五年境內寧謐子釗嗣從征鄧茂七還掌都督府天順中受武定侯郭英次孫昭賂誣嫡孫昌不孝欲奪其爵法司請逮治詔解府事卒子淮嗣爵傳至明亡乃絶談廣字仲宏丹徒人洪武初起卒伍從征金山為燕山護衛百戶從成祖起兵以百騎掠涿州生得將校三十人戰白溝真定夾河咸有功屢遷指揮使留守保定都督韓觀帥師十二萬來攻廣以孤軍力拒四十餘日伺間破走之永樂九年進大寧都指揮僉事董建北京既而領神機營從北征充驍騎將軍十一年練軍山西明年從征九龍口為前鋒賊數萬憑岸廣命挽強士射之萬矢齊發死者無算乘勝夾擊賊大敗論功進都督僉事仁宗嗣位擢左都督佩鎮朔將軍印鎮宣府宣德三年請軍衛如郡縣例立風雲雷雨山川社稷壇六年以宣府糧少請如開平獨石召商中鹽納粟以足兵食俱從之明年帝從戶部議令他衛軍戍宣府者悉遣還屯種廣上言臣所守邊一千四百餘里敵人窺伺竊發無時脫有警徵兵數百里外勢豈能及屯種之議臣愚未見其可帝以邊卒戍守有餘但命永樂中調戍者勿遣正統初朝議以脫歡雖款塞狡謀未可測命廣及他鎮總兵官陳懷李謙王彧圖上方略廣等各上議大要謂邊寇出沒不常惟守禦為上策宜分兵扼要害而間遣精鋭巡塞外遇敵則量力戰守間諜以偵之輕兵以躡之寇來無所得去有所懼則邊患可少弭帝納其言六年十一月以禦敵功封永寧伯祿千二百石仍鎮宣府八年乞致仕優詔不許明年十月召還陛見帝憫其老免常朝是月卒年八十二諡襄毅廣長身多力奮迹行伍至大將大小百餘戰未嘗挫衄在宣府二十年修屯堡嚴守備增驛傳又請頒給火器於各邊將校失律即奏請置罪而撫士卒有恩邊徼帖然稱名將嘗逞憤杖殺都司經歷又以私憾杖百戶並為言官所劾置不問既卒吏部言非世券授其子序指揮使陳懷合肥人襲父職為真定副千戶永樂初積功至都指揮僉事從平安南進都指揮使涖山西都司事再從張輔擒安南賊簡定從都督費瓛征涼州叛人虎保皆有功仁宗立進都督同知宣德元年代梁銘為總兵官鎮寧夏時官軍征交址者屢敗詔發松潘軍援之將士憚行千戶錢宏與衆謀詐言番叛帥兵掠麥匝諸族番人震恐遂反殺指揮陳傑等陷松潘疊溪圍威茂諸州指揮吳玉韓整高隆相繼敗績西鄙騷然詔遣鴻臚丞何敏指揮吳瑋往招之而命懷統劉昭趙安莊貴帥師數萬隨其後瑋等至賊不順命瑋與龍州知州薛繼賢擊賊復松潘比懷至仍用瑋前鋒遂復疊溪降二十餘寨招撫復業者萬二千二百餘戶歸所掠軍民二千二百餘人事遂定進左都督厚賚金幣而絀瑋功不録懷留鎮四川在鎮驕縱不法干預民事受賕庇罪人侵奪屯田笞辱僉事柴震等數為言官所劾帝降敕責讓復以御史王禮彈章示之懷引罪置不問六年松潘勒都北定諸族暨空郎龍溪諸寨番復叛懷遣兵戰敗指揮安寧等死者三百餘人懷乃親督兵深入破革兒骨寨進攻空郎乞兒洞賊敗斬首墜崖死者無算革兒骨賊復聚生苗邀戰擊破之剿戮殆盡於是任昌牛心諸寨番聞風乞降羣寇悉平久之巡按御史及按察使復奏懷僭侈踰分每旦令三司官分班立有事跪白懷中坐稱旨行遣且日荒於酒不飭邊備致城寨失陷宣宗怒召懷還命文武大臣鞫之罪當斬下都察院獄宥死落職正統二年以原官鎮大同時北人來貢者日給廩餼為軍民纍懷言於朝得減省居二年以老召還命理中府事九年春與中官但住出古北口征兀良哈還與馬亮等同封而懷得平鄉伯十四年扈駕北征死土木贈侯諡忠毅子輔乞襲爵吏部言非世券執不許景帝以懷死事許之輔卒子政請襲吏部執如初中旨許嗣政鎮兩廣久自陳軍功乞世券吏部復執不可詔豫之政卒子信嗣弘治中卒無子弟俊嗣指揮使馬亮淇人以燕山衛卒從成祖起兵纍功至都指揮僉事宣宗時官至左都督兀良哈之役偕中官劉永誠出劉家口至黑山大松林流沙河諸處遇賊勝之還封招遠伯是役也王振主之故諸將功少率得封亮善騎射每戰身先士卒所向克捷時稱驍將為伯三年卒諡榮毅蔣貴字大富江都人以燕山衛卒從成祖起兵雄偉多力善騎射積功至昌國衛指揮同知從大軍征交址及沙漠遷都指揮僉事掌彭城衛事宣德二年四川松潘諸番叛充右參將從總兵官陳懷討之募鄉導絶險而進薄其巢一日十數戰大敗之進都指揮同知鎮守密雲七年復命為參將佐懷鎮松潘明年進都督僉事充副總兵協方政鎮守又明年諸番復叛政等分道進討貴督兵四千攻破任昌大寨會都指揮趙得宮聚兵以次討平龍溪等三十七寨斬首一千七百級投崖墜水死者無算捷聞進都督同知充總兵官佩平蠻將軍印代政鎮守英宗即位以所統皆極邊地奏增軍士月糧正統元年召還為右都督阿台寇甘涼邊將告急命佩平虜將軍印帥師討之賊犯莊浪都指揮江源戰死亡士卒百四十餘人侍郎徐晞劾貴朝議以貴方選軍甘州勢不相及而莊浪乃晞所統責晞委罪置貴不問明年春諜報敵駐賀蘭山後詔大同總兵官方政都指揮楊洪出大同迤西貴與都督趙安出涼州塞會剿貴至魚兒海子都指揮安敬言前途無水草引還鎮守陝西都御史陳鎰言狀尚書王驥出理邊務斬敬責貴立功貴感奮會𩽆兒只伯懼罪連遣使入貢敵勢稍弱貴帥輕騎敗之於狼山追抵石城已聞𩽆兒只伯依阿台於兀魯乃地貴將二千五百人為前鋒往襲副將李安沮之貴拔劍厲聲叱安曰敢阻軍者死遂出鎮夷間道疾馳三日夜抵其巢阿台方牧馬貴猝入馬羣令士卒以鞭擊弓韣驚馬馬盡佚敵失馬挽弓步鬬貴縱騎蹂擊指揮毛哈阿奮入其陳大敗之復分軍為兩翼別遣百騎乘高為疑兵轉戰八十里會任禮亦追敵至黑泉阿台與𩽆兒只伯以數騎遠遁西邊悉平三年四月王驥以捷聞論功封定西伯食祿一千二百石給世券明年代任禮鎮甘肅又明年冬以征麓川蠻思任發召還京六年命佩平蠻將軍印充總兵官與王驥帥師抵金齒分路進搗麓川上江寨破杉木籠山七寨及馬鞍山象陳功皆第一事詳王驥傳明年師還進封侯益祿三百石八年夏復佩平蠻將軍印與王驥討思任發子思機發攻破其寨明年師還賞賚甚渥加歲祿五百石是役也貴子雄乘敵敗帥三十人深入敵扼其後自刎沉於江贈懷遠將軍彭城衛指揮使十四年正月貴卒年七十贈涇國公諡武勇貴起卒伍不識字天性朴實忘己下人能與士卒同甘苦出境討賊衣糧器械常身自囊負不役一人臨陳輒身先之以故所向有功子義病不能嗣以義子琬嗣侯天順末佩平羌將軍印總兵甘肅築甘州沙河諸屯堡成化八年召還協守南京兼督操江十年入督十二團營尋兼總神機營兵上言太祖肇建南京京城外復築土城以衛居民誠萬世之業今北京但有內城己巳之變敵騎長驅直薄城下可以為鑒今西北隅故址猶存亟行勸募之令濟以工罰成功不難又言大同宣府諸塞下腴田無慮數十萬悉為豪右所占畿內八府良田半屬勢要家細民失業脫使邊關有警內郡何資運道或梗京師安給請遣給事御史按核塞下田定其科額畿內民田嚴戢豪右毋得侵奪庶兵民足食而內外有備章下所司雖不盡行時論韙之十三年帥京軍防秋大同宣府陳機宜十餘事皆報可十五年偕汪直按遼東邊事二十年佩將軍印出禦邊寇寇退班師纍加太保兼太子太傅卒贈涼國公諡敏毅子驥嗣典京營兵弘治中充總兵官歷鎮薊州遼東湖廣官中外二十年家無餘貨再傳至孫傅嘉靖中纍典軍府佩征蠻將軍印鎮兩廣以平海賊及慶遠瑤功加太子太保明亡爵絶任禮字尚義臨漳人以燕山衛卒從成祖起兵積功至山東都指揮使永樂二十年擢都督僉事從北征前行偵敵還受厚賞仁宗即位命掌廣西都司事尋改遼東宣宗立進都指揮同知從平樂安又從征兀良哈還為後拒英宗立進左都督正統元年佩平羌將軍印充左副總兵鎮甘肅阿台𩽆兒只伯數犯肅州璽書譙讓二年復寇莊浪都指揮魏榮擊却之擒𩽆兒只伯姪把禿孛羅禮以聞三年與王驥蔣貴出塞敗𩽆兒只伯於石城復分道至梧桐林亦集乃進至黑泉而還斬獲多封寧遠伯祿千二百石明年還朝又明年代貴鎮甘肅八年赤斤蒙古衛都督且旺失加苦也先暴橫欲移駐也洛卜剌禮以其地近肅州執不許已奏請建寺於其地禮復言許其建寺彼必移居遺後患事竟寢時邊將家僮墾塞上田者每頃輸糧十二石禮連請於朝得減四石是時邊塞無警禮與巡撫曹翼屯田積粟繕甲訓兵邊備甚固十一年沙州衛都督喃哥兄弟爭部衆離二禮欲乘其飢窘遷之內地會喃哥亦請居肅州境內禮因遣都指揮毛哈剌往撫其衆而親帥兵繼其後比至喃哥復持兩端其部下欲奔瓦剌禮進兵逼之遂收其全部千二百餘人以還事聞賜賚甚厚時瓦剌也先方盛封喃哥弟鎖南奔為祁王禮以二寇合則勢益難制遣人招之鎖南奔欲從未決禮潛師直抵罕東縶之以歸帝大喜賜禮鐵券令世襲十四年也先分道入寇抵肅州禮遣裨將禦之再戰再敗失士馬萬計徵還以伯就第景泰初提督三千營以老致仕久之復起守備南京入掌中府禮自起卒伍至大將恪謹奉法成化初卒贈侯諡僖武子壽嗣總兵鎮陝西坐征滿四失律宥死戍邊子弘豫世指揮使趙安狄道人從兄琦土指揮同知坐罪死安謫戍甘州永樂元年進馬除臨洮百戶使西域從北征有功纍進都指揮同知宣德二年松潘番叛充左參將從總兵陳懷討平之進都督僉事時議討兀良哈詔安與史昭統所部赴京師兀良哈旋來朝命回原衛使烏思藏四年還明年復以左參將從史昭討曲先斬獲多九年中官宋成等使烏思藏命安帥兵千五百人送之畢力术江尋與侍郎徐晞出塞討阿台𩽆兒只伯敗之正統元年進都督同知充右副總兵官協任禮鎮甘肅明年與蔣貴出塞剿寇無功三年復與王驥任禮蔣貴分道進師至刁力溝執右丞達魯花赤等三十人以功封會川伯祿千石明年移鎮涼州安家臨洮姻黨厮養多為盜副使陳斌以聞在涼州又多招無賴為僮奴擾民復為御史孫育所劾詔皆不問安勇敢有將略與貴禮並稱西邊良將九年十二月卒子英為指揮使立功進都督同知趙輔字良佐鳳陽人襲職為濟寧衛指揮使景帝嗣位尚書王直等以將才薦擢署都指揮僉事充左參將守懷來天順初徵入右府涖事成化元年以中府都督同知拜征夷將軍與韓雍討兩廣蠻克大藤峽還封武靖伯已而蠻入潯州言官交劾廣西巡按御史端宏謂賊流毒方甚而輔妄言賊盡冒封爵不罪輔無以示戒輔乃自陳戰閥委其罪於守將歐信帝皆弗問三年總兵征迤東與都御史李秉從撫順深入連戰有功進侯八年廷議大舉搜河套拜輔將軍陝西延綏寧夏三鎮兵皆聽節制輔至榆林寇已深入大掠輔不能制與王越疏請罷兵言官交論其罪命給事中郭鏜往勘還言寇於六月入平涼鞏昌臨洮殺掠人畜逮七月而縱橫慶陽境內輔與越至榆林不進宜治其弛兵玩寇罪帝不納輔還猶督京營言者攻益力詔姑置之輔辭侯乞世伯帝許其世伯侯如故僅減祿二百石言官力爭不聽輔復上疏暴功言減祿無以贍老又言上命內官盧永征南蠻黃順汪直征東北皆莫大功宜付史館余子俊等請置輔於法卒不問十二年解營務家居十年卒贈容國公諡恭肅輔少俊辨有才善詞翰多交文士又好結權幸故屢遭論劾卒無患子承慶嗣伯協守南京正德初坐傳寫諫官劉疏為劉瑾所惡削半祿間住四傳至玄孫光遠萬曆中鎮湖廣明亡乃絶劉聚者太監永誠從子也為金吾指揮同知以奪門功進都指揮僉事復超擢都督同知與討曹欽進右都督成化六年以右副總兵從朱永赴延綏追賊黃草梁遇伏鏖戰傷頦麾下力捍以免頃復與都督范瑾等擊寇青草溝敗之永等追寇牛家寨聚亦據南山力攻寇大敗出境論功進左都督以內援特封寧晉伯八年冬代趙輔為將軍總陝西諸鎮兵寇入花馬池率副總兵孫鉞遊擊將軍王璽等擊却之還至高家堡寇復至敗之追奔至漫天嶺伏起夾擊又敗之鉞璽亦別破賊於井油山捷聞豫世券其冬孛羅忽滿都魯癿加思蘭連兵深入至秦州安定會寧諸州縣縱橫數千里賊退適王越自紅鹽池還妄以大捷聞璽書嘉勞頃之紀功兵部員外郎張謹劾聚及總兵官范瑾等六將殺被掠者冒功部科及御史交章劾詔遣給事中韓文往勘還奏如謹言所報首功百五十僅十九級帝以寇既遁置不問聚尋卒贈侯諡威勇傳子祿及福福弘治中掌三千營加太子太保卒子嶽嗣卒從子文請嗣吏部言聚無大功子孫不宜再襲世宗不允命文嗣亦傳至明亡乃絶贊曰宋晟在太祖時即與開國諸元勳參迹戎行其後四鎮涼州威著西鄙兩子尚主世列徹侯功名盛矣薛祿以下諸人皆與靖難祿東昌滹沱之戰劉榮守永平談廣守保定宣力最著雖策勳之日未即剖符而各以積閥受封其善撫士卒慎固封守恪謹奉職有足尚者趙輔劉聚猷績遠遜前人而帶礪之盟與國終始誠厚幸哉請人並以勳爵鎮禦邊陲故類著於篇
