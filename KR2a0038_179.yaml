body:
  text: 明史卷一百七十九列傳第六十七羅倫涂棐章懋從子拯黃仲昭莊鄒智舒芬崔桐馬汝驥羅倫字彝正吉安永豐人五歲嘗隨母入園果落衆競取倫獨賜而後受家貧樵牧挾書誦不輟及為諸生志聖賢學嘗曰舉業非能壞人人自壞之耳知府張瑄憫其貧周之粟謝不受居父母喪踰大祥始食鹽酪成化二年廷試對策萬餘言直斥時弊名震都下擢進士第一授翰林修撰踰二月大學士李賢奔喪畢奉詔還朝倫詣賢沮之不聽乃上疏曰臣聞朝廷援楊溥故事起復大學士李賢臣竊謂賢大臣起復大事綱常風化繫焉不可不慎曩陛下制策有曰朕夙夜拳拳欲正大綱舉萬目使人倫明於上風俗厚於下竊謂明人倫厚風俗莫先於孝在禮子有父母之喪君三年不呼其門子夏問三年之喪金革無避禮歟孔子曰魯公伯禽有為為之也今以三年之喪從其利者吾弗知也陛下於賢以為金革之事起復之歟則未之有也以大臣起復之歟則禮所未見也夫為人君當舉先王之禮教其臣為人臣當守先王之禮事其君昔宋仁宗嘗起復富弼矣弼辭曰不敢遵故事以遂前代之非但當據禮經以行今日之是仁宗卒從其請孝宗嘗起復劉珙矣珙辭曰身在草土之中國無門庭之寇難冒金革之名私竊利祿之實孝宗不抑其情此二君者未嘗以故事強其臣二臣者未嘗以故事徇其君故史冊書之為盛事士大夫傳之為美談無他君能教臣以孝臣有孝可移於君也自是而後無復禮義王黼史嵩之陳宜中賈似道之徒皆援故事起復然天下壞亂社稷傾危流禍當時遺譏後代無他君不教臣以孝臣無孝可移於君也陛下必欲賢身任天下之事則賢身不可留口實可言宜降溫詔俾如劉珙得以言事使賢於天下之事知必言言必盡陛下於賢之言聞必行行必力賢雖不起復猶起復也苟知之而不能盡言言之而不能力行賢雖起復無益也且陛下無謂廟堂無賢臣庶官無賢士君盂也臣水也水之方圓盂實主之臣之直佞君實召之陛下誠於退朝之暇親直諒博洽之臣講聖學君德之要詢政事得失察民生利病訪人才賢否考古今盛衰舍獨信之偏見納逆耳之苦言則衆賢羣策畢萃於朝又何待違先王之禮經損大臣之名節然後天下可治哉臣伏見比年以來朝廷以奪情為常典縉紳以起復為美名食稻衣錦之徒接踵廟堂不知此人於天下之重何關耶且婦於舅姑喪亦三年孫於祖父母服則齊衰奪情於夫初無預其妻奪情於父初無干其子今或舍館如故妻孥不還乃號於天下曰本欲終喪朝命不許雖三尺童子臣知其不信也為人父者所以望其子之報豈擬至於此哉為人子者所以報其親之心豈忍至於此哉枉己者不能直人忘親者不能忠君陛下何取於若人而起復之也今大臣起復羣臣不以為非且從而贊之羣臣起復大臣不以為非且從而成之上下成俗混然同流率天下之人為無父之歸臣不忍聖明之朝致綱常之壞風俗之弊一至此極也願陛下斷自聖衷許賢歸家持服其他已起復者仍令奔喪未起復者悉許終制脫有金革之變亦從墨衰之權使任軍事於外盡心喪於內將朝廷端則天下一大臣法則羣臣效人倫由是明風俗由是厚矣疏入謫福建市舶司副提舉御史陳選疏救不報御史楊琅復申救帝切責之尚書王翺以文彥博救唐介事諷賢賢曰潞公市恩歸怨朝廷吾不可以效之亡何賢卒明年以學士商輅言召復原職改南京居二年引疾歸遂不復出倫為人剛正嚴於律己義所在毅然必為於富貴名利泊如也里居倡行鄉約相率無敢犯衣食粗惡或遺之衣見道殣解以覆之晨留客飲妻子貸粟鄰家及午方炊不為意以金牛山人跡不至築室著書其中四方從學者甚衆十四年卒年四十八嘉靖初從御史唐龍請追贈左春坊諭德諡文毅學者稱一峰先生方倫為提舉時御史豐城涂棐巡按福建司禮中官黃賜延平人也請見棐不可泉州知府李宗學以受賕為棐所按訐棐自解賜從中主其奏棐宗學俱被徵詞連倫當並逮鎮撫司某曰羅先生可至此乎即日鞫成上之倫得免棐亦復官棐天順四年進士成化中嘗言祖宗朝政事必與大臣面議自先帝幼沖未能裁決柄國者慮其缺遺假簡易之辭以便宣布凡視朝奏事諭旨輒曰所司知之此一時權宜非可循為定制況批答多參以中官內閣或不與尤乖祖制乞復面議杜蔽壅之弊憲宗不能用終廣東副使章懋字德懋蘭溪人成化二年會試第一成進士改庶吉士明年冬授編修憲宗將以元夕張燈命詞臣撰詩詞進奉懋與同官黃仲昭檢討莊疏諫曰頃諭臣等撰鰲山煙火詩詞臣等竊議此必非陛下本懷或以兩宮聖母在上欲備極孝養奉其歡心耳然大孝在乎養志不可徒陳耳目之玩以為養也今川東未靖遼左多虞江西湖廣赤地數千里萬姓嗷嗷張口待哺此正陛下宵旰焦勞兩宮母后同憂天下之日至翰林官以論思為職鄙俚之言豈宜進於君上伏讀宣宗皇帝御製翰林針有曰啓沃之言唯義與仁堯舜之道鄒魯以陳張燈豈堯舜之道詩詞豈仁義之言若謂煙火細故不足為聖德纍則舜何必不造漆器禹何必不嗜旨酒漢文何必不作露臺古帝王慎小謹微必矜細行者正以欲不可縱漸不可長也伏乞將煙火停止移此視聽以明目達聰省此資財以振饑恤困則災祲可銷太平可致帝以元夕張燈祖宗故事惡懋等妄言並杖之闕下左遷其官修撰羅倫先以言事被黜時稱翰林四諫懋既貶臨武知縣未行以給事中毛弘等論救改南京大理左評事踰三年遷福建僉事平泰寧沙尤賊聽福安民採礦以杜盜源建議番貨互通貿易以裕商民政績甚著滿考入都年止四十一力求致仕吏部尚書尹旻固留之不可既歸屏跡不入城府奉親之暇專以讀書講學為事弟子執經者日益進貧無供具惟脫粟菜羹而已四方學士大夫高其風稱為楓山先生家居二十餘年中外交薦部檄屢起之以親老堅不赴弘治中孝宗登用羣賢衆議兩京國學當用名儒起謝鐸於北監及南監缺祭酒遂以懋補之懋方遭父憂不就時南監缺司業且二十年詔特以羅欽順為之而虛位以待懋十六年服闋懋復固辭不允始涖任六館士人人自以為得師監生尤樾母病例不得歸省晝夜泣懋遣之歸曰吾寧以違制獲罪武宗立陳勤聖學隆繼述謹大婚重詔令敬天戒五事正德元年乞休五疏不允復引疾懇辭明年三月始得請五年起南京太常卿明年又起為南京禮部右侍郎皆力辭不就言者屢陳懋德望請加優禮詔有司歲時存問世宗嗣位即家進南京禮部尚書致仕其冬遣行人存問而懋已卒年八十六贈太子少保諡文懿懋為學恪守先儒訓或諷為文章曰小技耳豫弗暇有勸以著述者曰先儒之言至矣芟其繁可也通籍五十餘年歷俸僅滿三考難進易退世皆高之生三子兼令業農縣令過之諸子釋耒跪迎人不知其貴公子也子省懋於南監徒步往道為巡檢所笞已知而請罪懋慰遣之晚年三子一孫盡死年八十二生少子接後以廕為國子生從子拯字以道幼從懋學登弘治十五年進士為刑部主事正德初忤劉瑾下詔獄謫梧州府通判瑾誅擢南京兵部郎中嘉靖中纍官工部尚書桂萼欲復海運延公卿議得失拯曰海運雖有故事而風濤百倍於河且天津海口多淤自古不聞有濬海者議遂寢南北郊議起拯言不可失帝意尋坐郊壇祭器缺供落職歸久之復官致仕卒黃仲昭名潛以字行莆田人祖壽生翰林檢討有學行父嘉束鹿知縣以善政聞仲昭性端謹年十五六即有志正學登成化二年進士改庶吉士授編修與章懋莊同以直諫被杖謫湘潭知縣在道用諫官言改南京大理評事兩京諸司隸卒率放還而取其月錢為故事惟仲昭與羅倫不取御史縱子弟取賂刑部曲為地仲昭駁正之有羣掠民婦轉鬻者部坐首惡一人仲昭請皆坐連遭父母喪不離苫塊者四年服除以親不逮養遂不出弘治改元御史姜洪疏薦吏部尚書王恕檄有司敦趣比至恕迓之大門外揖讓升堂相向再拜世兩高之除江西提學僉事誨士以正學久之再疏乞休日事著述學者稱未軒先生卒年七十四仲昭兄深御史深子乾亨行人使滿剌加歿於海乾亨子如金廣西提學副使希雍蘇州同知仲昭孫懋南京戶部侍郎莊字孔暘江浦人自幼豪邁不羣嗜古博學舉成化二年進士改庶吉士授翰林檢討與編修章懋黃仲昭疏諫內廷張燈忤旨廷杖二十謫桂陽州判官尋以言官論救改南京行人司副居三年母憂去繼丁父憂哀毀喪除不復出卜居定山二十餘年學者稱定山先生巡撫王恕嘗欲葺其廬辭之生平不尚著述有自得輒見之於詩薦章十餘上部檄屢趣俱不赴大學士丘濬素惡語人曰率天下士背朝廷者也弘治七年有薦者奉詔起用念濬當國不出且得罪強起入都大學士徐溥語郎中邵寶曰定山故翰林復之濬聞曰我不識所謂定山也乃復以為行人司副俄遷南京吏部郎中得風疾明年乞身歸部臣不為奏又明年京察尚書倪嶽以老疾罷之居二年卒年六十三天啓初追諡文節鄒智字汝愚合州人年十二能文家貧讀書焚木葉繼晷者三年舉成化二十二年鄉試第一時帝益倦於政而萬安劉吉尹直居政府智憤之道出三原謁致仕尚書王恕慨然曰治天下在進君子退小人方今小人在位毒痡四海而公顧屏棄田里智此行非為科名欲上書天子別白賢奸拯斯民於塗炭耳恕奇其言笑而不答明年登進士改庶吉士遂上疏曰陛下於輔臣遇事必咨殊恩異數必及亦云任矣然或進退一人處分一事往往降中旨使一二小人陰執其柄是既任之而又疑之也陛下豈不欲推誠待物哉由其進身之初多出私門先有以致陛下之厭薄及與議事又唯諾惟謹伈伈俔俔若有所不敢反不如一二俗吏足以任事此陛下所為疑也臣竊以為過矣昔宋仁宗知夏竦懷詐則黜之知呂夷簡能改過則容之知杜衍韓琦范仲淹富弼可任則不次擢之故能北拒契丹西臣元昊未聞一任一疑可以成天下事也願陛下察孰為竦孰為夷簡而黜之容之孰為衍琦仲淹弼而擢之日與講論治道不使小人得參其間則天工亮矣臣又聞天下事惟輔臣得議惟諫官得言諫官雖卑與輔臣等乃今之諫官以軀體魁梧為美以應對捷給為賢以簿書刑獄為職業不畏天變不恤人窮或以忠義激之則曰吾非不欲言言出則禍隨其誰吾聽嗚呼既不能盡言效職而復引過以歸於上有人心者固如是乎臣願罷黜浮冗廣求風節之臣令仗下糾彈入閣參議或請對或輪對或非時召對霽色接之溫言導之使得畢誠盡蘊則天聽開矣臣又聞汲黯在朝淮南寢謀君子之有益人國也大矣以陛下之聰明寧不知君子可任而故屈抑之哉乃小人巧讒間以中傷之耳今碩德如王恕忠鯁如強珍亮直剛方如章懋林俊張吉皆一時人望不宜貶錮負上天生才之意陛下誠召此數人置要近之地使各盡其平生則天心協矣臣又聞高皇帝制閽寺惟給掃除不及以政近者舊章日壞邪徑日開人主大權盡出其手內倚之為相外倚之為將藩方倚之為鎮撫伶人賤工倚之以作奇技淫巧法王佛子倚之以恣出入宮禁此豈高皇帝所許哉願陛下以宰相為股肱以諫官為耳目以正人君子為腹心深思極慮定宗社長久之計則大綱正矣然其本則在陛下明理何如耳竊聞侍臣進講無反覆論辨之功陛下聽講亦無從容沃心之益如此而欲明理以應事臣不信也願陛下念義理之難窮惜日月之易邁考之經史驗之身心使終歲無間則聖學明而萬事畢治豈特四事之舉措得其當已耶疏入不報智既慷慨負奇其時御史湯鼐中書舍人吉人進士李文祥亦並負意氣智皆與之善因相與品核公卿裁量人物未幾孝宗嗣位弊政多所更智喜以為其志且得行乃復因星變上書曰伏讀明詔云天下利弊所當興革所在官員人等條具以聞此殆陛下知前日登極詔書為奸臣所誤禁言官毋風聞挾私言事物論囂然故復下此條自解耳夫不曰朕躬有過朝政有闕而曰利弊當興革不曰許諸人直言無隱而曰官員人等條具以聞陛下所以求言者已不廣矣今欲興天下之利革天下之弊當求利弊之本原而興且革之不當毛舉細故以為利弊在是也本原何在閣臣是已少師安持祿怙寵少保吉附下罔上太子少保直挾詐懷奸世之小人也陛下留之則君德必不就朝政必不修此弊所當革者也致仕尚書王恕忠亮可任大事尚書王竑剛毅可寢大奸都御史彭韶方正可決大疑世之君子也陛下用之則君德開明朝政清肅此利所當興也然君子所以不進小人所以不退大抵由宦官權重而已漢元帝嘗任蕭望之周堪矣卒制於弘恭石顯宋孝宗嘗任劉俊卿劉珙矣卒間於陳源甘升李林甫牛仙客與高力士相附和而唐政不綱賈似道丁大全與董宋臣相表𩹉而宋室不振君子小人進退之機未嘗不繫此曹之盛衰願陛下鑒既往謹將來攬天綱張英斷凡所以待宦官者一以高皇帝為法則君子可進小人可退而天下之治出於一矣以陛下聰明冠世豈不知刑臣不可委信然而不免誤用者殆正心之學未講也心發於天理則耳目聰明言動中節何宦官之能惑發於人欲則一身無主萬事失綱投間抵隙蒙蔽得施雖有神武之資亦將日改月化而寖失其初欲進君子退小人興天下之利革天下之弊豈可得哉帝得疏頷之居無何安直相繼罷斥而吉任寄如故銜智刺骨鼐常朝當侍班智告之曰祖宗盛時御史侍班得面陳政務得失立取進止自後惟退而具疏此君臣情意所由隔也君幸值維新之日盍倣先朝故事行之及恕赴召至京智往謁曰後世人臣不獲時見天子故事多苟且願公且勿受官先請朝見取時政不善者歷陳之力請除革而後拜命庶其有濟若先受官無復見天子之日矣鼐與恕亦未能用其言會劉概獄起吉使其黨魏璋入智名遂下詔獄智身親三木僅屬喘息慷慨對簿曰智見經筵以寒暑輟講午朝以細事塞責紀綱廢弛風俗浮薄生民憔悴邊備空虛私竊以為憂與鼐等往來論議誠有之不知其他讞者承吉意竟謫廣東石城所吏目事具湯鼐傳智至廣東總督秦紘檄召修書乃居會城聞陳獻章講道新會往受業自是學益粹弘治四年十月得疾遽卒年二十有六同年生吳廷舉為順德知縣殮而歸其喪天啓初追諡忠介舒芬字國裳進賢人年十二獻馴鴈賦於知府祝瀚遂知名正德十二年舉進士第一授修撰時武宗數微行畋遊無度其明年孝貞皇后崩甫踰月欲幸宣府託言往視山陵罷沿道兵衛芬上言陛下三年之內當深居不出雖釋服之後固儼然煢疚也且自古萬乘之重非奔竄逃匿未有不嚴侍衛者又等威莫大於車服以天子之尊下同庶人舍大輅袞冕而羸車褻服是御非所以辨上下定禮儀不聽孝貞山陵畢迎主祔廟自長安門入芬又言孝貞皇后作配茂陵未聞失德祖宗之制既葬迎主必入正門昨孝貞之主顧從陛下駕由旁門入他日史臣書之曰六月己丑車駕至自山陵迎孝貞純皇后主入長安門將使孝貞有不得正終之嫌其何以解於天下後世昨祔廟之夕疾風迅雷甚雨意者聖祖列宗及孝貞皇后之靈警告陛下也陛下宜即明詔中外以示改過不報遂乞歸養不許又明年三月帝議南巡時寧王宸濠久蓄異謀與近幸相結人情惶懼言官伏闕諫忤旨被責讓芬憂之與吏部員外郎夏良勝禮部主事萬潮庶吉士汪應軫要諸曹連章入諫衆許諾芬遂偕編修崔桐庶吉士江暉王廷陳馬汝驥曹嘉及應軫上疏曰古帝王所以巡狩者協律度同量衡訪遺老問疾苦黜陟幽明式序在位是以諸侯畏焉百姓安焉若陛下之出不過如秦皇漢武侈心為樂而已非能行巡狩之禮者也博浪柏谷其禍亦可鑒矣近者西北再巡六師不攝四民告病哀痛之聲上徹蒼昊傳播四方人心震動故一聞南巡詔書皆鳥驚獸散而有司方以迎奉為名徵發嚴急江淮之間蕭然煩費萬一不逞之徒乘勢倡亂為禍非細且陛下以鎮國公自命苟至親王國境或據勛臣之禮以待陛下將北嚮朝之乎抑南面受其朝乎假令循名責實深求悖謬之端則左右寵幸無死所矣尚有事堪痛哭不忍言者宗藩蓄劉濞之釁大臣懷馮道之心以祿位為故物以朝署為巿廛以陛下為奕棋以革除年間為故事特左右寵幸知術短淺無能以此言告陛下耳使陛下得聞此言雖禁門之外亦將警蹕而出尚敢輕騎慢遊哉疏入陸完迎謂曰上聞有諫者輒恚欲自引決諸君且休勿歸過君上沽直名芬等不應而出有頃良勝潮過芬扼腕恨完芬因邀博士陳九川至酌之酒曰匹夫不可奪志君輩可遂已乎明日遂偕諸曹連疏入帝大怒命跪闕下五日期滿復杖之三十芬創甚幾斃舁至翰林院中掌院者懼得罪命摽出之芬曰吾官此即死此耳竟謫福建巿舶副提舉裹創就道世宗即位召復故官嘉靖三年春昭聖太后壽旦詔免諸命婦朝賀芬言前者興國太后令旦命婦朝賀如儀今遇皇太后壽節忽行傳免恐失輕重之宜乞收成命以彰聖孝帝怒奪俸三月時帝欲尊崇本生芬偕其僚連章極諫及張璁桂萼方獻夫驟擢學士芬及同官楊維聰編修王思羞與同列拜疏乞罷未幾復偕同官楊慎等伏左順門哭爭帝怒下獄廷杖奪俸如初旋遭母喪歸卒於家年四十四世稱忠孝狀元芬丰神玉立負氣峻厲端居竟日無倦容夜則計過自訟以倡明絶學為己任其學貫串諸經兼通天文律曆而尤精於周禮嘗曰周禮視儀禮禮記猶蜀之視吳魏也賈氏謂儀禮為本周禮為末妄矣朱子不加是正何也疾革其子請所言惟以未及表章周禮為恨學者稱梓溪先生萬曆中追諡文節先是修撰羅倫以諫謫福建提舉踰六十年而芬繼之與倫同鄉同官所謫地與官又同福建士大夫遂祀芬配倫云崔桐字來鳳海門人鄉試第一與芬同進士及第授編修既諫南巡並跪闕下受杖奪俸嘉靖中以侍讀出為湖廣右參議纍擢國子祭酒禮部右侍郎馬汝驥字仲房綏德人正德十二年進士改庶吉士偕芬等諫南巡罰跪受杖教習期滿當授編修特調澤州知州懲王府人虐小民比王有所屬輒投其書櫝中不視陵川知縣貪汝驥欲黜之巡按御史為曲解汝驥不聽竟褫其官世宗立召復編修尋録直諫功增秩一等預修武宗實録進修撰歷兩京國子司業擢南京右通政就改國子祭酒召拜禮部右侍郎尚書嚴嵩愛重汝驥入閣稱之帝特加侍讀學士汝驥行己峭厲然性故和易人望歸焉卒贈尚書諡文簡應軫等自有傳贊曰詞臣以文學侍從為職非有言責也激於名義侃侃廷諍抵罪謫而不悔豈非皎然志節之士歟奪情之典不始李賢然自羅倫疏傳誦天下而朝臣不敢以起復為故事於倫理所裨豈淺鮮哉章懋等引宣宗針明國家設官意不為彰君之過鄒智指列賢奸矯拂偷末舒芬危言聳切有爰盎㖿轡之風況夫清修峻節行無瑕尤若諸子者洵足以矯文士浮夸之習矣
