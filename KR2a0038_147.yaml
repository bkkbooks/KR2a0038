body:
  text: 明史卷一百四十七列傳第三十五解縉黃淮胡廣金幼孜胡儼解縉字大紳吉水人祖子元為元安福州判官兵亂守義死父開太祖嘗召見論元事欲官之辭去縉幼穎敏洪武二十一年舉進士授中書庶吉士甚見愛重常侍帝前一日帝在大庖西室諭縉朕與爾義則君臣恩猶父子當知無不言縉即日上封事萬言略曰臣聞令數改則民疑刑太繁則民玩國初至今將二十載無幾時不變之法無一日無過之人嘗聞陛下震怒鋤根翦蔓誅其姦逆矣未聞褒一大善賞延於世復及其鄉終始如一者也臣見陛下好觀説苑韻府雜書與所謂道德經心經者臣竊謂甚非所宜也説苑出於劉向多戰國縱橫之論韻府出元之陰氏抄輯穢蕪略無可採陛下若喜其便於檢閲則願集一二志士儒英臣請得執筆隨其後上泝唐虞夏商周孔下及關閩濂洛根實精明隨事類別勒成一經上接經史豈非太平制作之一端歟又今六經殘缺禮記出於漢儒踳駁尤甚宜及時刪改訪求審樂之儒大備百王之典作樂書一經以惠萬世尊祀伏羲神農黃帝堯舜禹湯文武皋陶伊尹太公周公稷契夷益傅説箕子於太學孔子則自天子達於庶人通祀以為先師而以顏曾子思孟子配自閔子以下各祭於其鄉魯之闕里仍建叔梁紇廟贈以王爵以顏路曾孔鯉配一洗歷代之因仍肇起天朝之文獻豈不盛哉若夫祀天宜復掃地之規尊祖宜備七廟之制奉天不宜為筵宴之所文淵未備夫館閣之隆太常非俗樂之可肄官妓非人道之所為禁絶倡優易置寺閹執戟陛墀皆為吉士虎賁趣馬悉用俊良除山澤之禁稅蠲務鎮之征商木輅朴居而土木之工勿起布墾荒田而四裔之地勿貪釋老之壯者驅之俾復於人倫經咒之妄者火之俾絶其欺誑絶鬼巫破淫祀省冗官減細縣痛懲法外之威刑永革京城之工役流十年而聽復杖八十以無加婦女非帷薄不修毋令逮繫大臣有過惡當誅不宜加辱治曆明時授民作事但申播植之宜何用建除之謬所宜著者日月之行星辰之次仰觀俯察事合逆順七政之齊正此類也近年以來臺綱不肅以刑名輕重為能事以問囚多寡為勳勞甚非所以勵清要長風采也御史糾彈皆承密旨每聞上有赦宥則必故為執持意謂如此則上恩愈重此皆小人趨媚效勞之細術陛下何不肝膽而鏡照之哉陛下進人不擇賢否授職不量重輕建不為君用之法所謂取之盡錙銖置朋姦倚法之條所謂用之如泥沙監生進士經明行修而多屈於下僚孝廉人材冥蹈瞽趨而或布於朝省椎埋嚚悍之夫闒茸下愚之輩朝捐刀鑷暮擁冠裳左棄筐篋右綰組符是故賢者羞為之等列庸人悉習其風流以貪婪苟免為得計以廉潔受刑為飾辭出於吏部部者無賢否之分入於刑部者無枉直之判天下皆謂陛下任喜怒為生殺而不知皆臣下之乏忠良也古者善惡鄉鄰必記今雖有申明旌善之舉而無黨庠鄉學之規互知之法雖嚴訓告之方未備臣欲求古人治家之禮睦鄰之法若古藍田呂氏之鄉約今義門鄭氏之家範布之天下世臣大族率先以勸旌之復之為民表帥將見作新於變至於比屋可封不難矣陛下天資至高合於道微神怪妄誕臣知陛下洞矚之矣然猶不免所謂神道設教者臣謂不必然也一統之輿圖已定矣一時之人心已服矣一切之姦雄已懾矣天無變災民無患害聖躬康寧聖子聖孫繼繼繩繩所謂得真符者矣何必興師以取寶為名諭衆以神仙為徵應也哉臣觀地有盛衰物有盈虛而商稅之征率皆定額是使其或盈也姦黠得以侵欺其歉也良善困於補納夏稅一也而茶椒有糧果絲有稅既稅於所産之地又稅於所過之津何其奪民之利至於如此之密也且多貧下之家不免拋荒之咎今日之土地無前日之生植而今日之徵聚有前日之稅糧或賣産以供稅産去而稅存或賠辦以當役役重而民困土田之高下不均起科之輕重無別膏腴而稅反輕瘠鹵而稅反重欲拯困而革其弊莫若行授田均田之法兼行常平義倉之舉積之以漸至有九年之食無難者臣聞仲尼曰王公設險以守其國近世狃於晏安墮名城銷鋒鏑禁兵諱武以為太平一旦有不測之虞連城望風而靡及今宜敕有司整葺寬之以歲月守之以里胥額設弓手兼教民兵開武舉以收天下之英雄廣鄉校以延天下之俊乂古時多有書院學田貢士有莊義田有族皆宜興復而廣益之夫罪人不孥罰弗及嗣連坐起於秦法孥戮本於偽書今之為善者妻子未必蒙榮有過者里胥必陷其罪況律以人倫為重而有給配婦女之條聽之於不義則又何取夫節義哉此風化之所由也孔子曰名不正則言不順尚書侍郎內侍也而以加於六卿郎中員外內職也而以名於六屬御史詞臣所以居寵臺閣郡守縣令不應回避鄉邦同寅協恭相倡以禮而今內外百司捶楚屬官甚於奴隸是使柔懦之徒蕩無廉恥進退奔趨肌膚不保甚非所以長孝行勵節義也臣以為自今非犯罪惡解官笞杖之刑勿用催科督厲小有過差蒲鞭示辱亦足懲矣臣但知罄竭愚衷急於陳獻略無次序惟陛下幸垂鑒焉書奏帝稱其才已復獻太平十策文多不録縉嘗入兵部索皂隸語嫚書沈溍以聞帝曰縉以冗散自恣耶命改為御史韓國公李善長得罪死縉代郎中王國用草疏白其冤又為同官夏長文草疏劾都御史袁泰泰深銜之時近臣父皆得入覲縉父開至帝謂曰大器晚成若以而子歸益令進學後十年來大用未晚也歸八年太祖崩縉入臨京師有司劾縉違詔旨且母喪未葬父年九十不當舍以行謫河州衛吏時禮部侍郎董倫方為惠帝所信任縉因寓書於倫曰縉率易狂愚無所避忌數上封事所言分封勢重萬一不幸必有厲長吳濞之虞哈术來歸欽承顧問謂宜待之有禮稍忤機權其徒必二此類非一頗皆億中又嘗為王國用草諫書言韓國事為詹徽所疾欲中以危法伏蒙聖恩申之慰諭重以鏹賜令以十年著述冠帶來廷元史舛誤承命改修及踵成宋書刪定禮經凡例皆已留中奉親之暇杜門纂述漸有次第洊將八載賓天之訃忽聞痛切欲絶母喪在殯未遑安厝家有九十之親倚門望思皆不暇戀冀一拜山陵隕淚九土何圖詿誤蒙恩遠行揚粵之人不耐寒暑復多疾病俯仰奔趨伍於吏卒誠不堪忍晝夜涕泣恆懼不測負平生之心抱萬古之痛是以數鳴知感冀還京師得望天顏或遂南還父子相見即更生之日也倫乃薦縉召為翰林待詔成祖入京師擢侍讀命與黃淮楊士奇胡廣金幼孜楊榮胡儼並直文淵閣預機務內閣預機務自此始尋進侍讀學士奉命總裁太祖實録及列女傳書成賜銀幣永樂二年皇太子立進縉翰林學士兼右春坊大學士帝嘗召縉等曰爾七人朝夕左右朕嘉爾勤慎時言之宮中情慎初易保終難願共勉焉因各賜五品服命七人命婦朝皇后於柔儀殿后勞賜備至又以立春日賜縉等金綺衣與尚書埒縉等入謝帝曰代言之司機密所繫且旦夕侍朕裨益不在尚書下也一日帝御奉天門諭六科諸臣直言因顧縉等曰王魏之風世不多有若使進言者無所懼聽言者無所忤天下何患不治朕與爾等共勉之其年秋胡儼出為祭酒縉等六人從容獻納帝嘗虛己以聽縉少登朝才高任事直前表𩹉洞達引拔士類有一善稱之不容口然好臧否無顧忌廷臣多害其寵又以定儲議為漢王高煦所忌遂致敗先是儲位未定淇國公丘福言漢王有功宜立帝密問縉縉稱皇長子仁孝天下歸心帝不應縉又頓首曰好聖孫謂宣宗也帝頷之太子遂定高煦由是深恨縉會大發兵討安南縉諫不聽卒平之置郡縣而太子既立又時時失帝意高煦寵益隆禮秩踰嫡縉又諫曰是啓爭也不可帝怒謂其離間骨肉恩禮寖衰四年賜黃淮等五人二品紗羅衣而不及縉久之福等議稍稍傳達外廷高煦遂譖縉泄禁中語明年縉坐廷試讀卷不公謫廣西布政司參議既行禮部郎中李至剛言縉怨望改交址命督餉化州永樂八年縉奏事入京值帝北征縉謁皇太子而還漢王言縉伺上出私覲太子徑歸無人臣禮帝震怒縉時方偕檢討王稱道廣東覽山川上疏請鑿贛江通南北奏至逮縉下詔獄拷掠備至詞連大理丞湯宗宗人府經歷高得暘中允李貫贊善王汝玉編修朱紘檢討蔣驥潘畿蕭引高並及至剛皆下獄汝玉貫紘引高得暘皆瘐死十三年錦衣衛帥紀綱上囚籍帝見縉姓名曰縉猶在耶綱遂醉縉酒埋積雪中立死年四十七籍其家妻子宗族徙遼東方縉居翰林時內官張興恃寵笞人左順門外縉叱之興斂手退帝嘗書廷臣名命縉各疏其短長縉言蹇義天資厚重中無定見夏原吉有德量不遠小人劉俊有才幹不知顧義鄭賜可謂君子頗短於才李至剛誕而附勢雖才不端黃福秉心易直確有執守陳瑛刻於用法尚能持廉宋禮戇直而苛人怨不恤陳洽疏通警敏亦不失正方賓簿書之才駔儈之心帝以付太子太子因問尹昌隆王汝玉縉對曰昌隆君子而量不弘汝玉文翰不易得惜有市心耳後仁宗即位出縉所疏示楊士奇曰人言縉狂觀所論列皆有定見不狂也詔歸縉妻子宗族縉初與胡廣同侍成祖宴帝曰爾二人生同里長同學仕同官縉有子廣可以女妻之廣頓首曰臣妻方娠未卜男女帝笑曰定女矣已而果生女遂約緍縉敗子禎亮徙遼東廣欲離婚女截耳誓曰薄命之婚皇上主之大人面承之有死無二及赦還卒歸禎亮正統元年八月詔還所籍家産成化元年復縉官贈朝議大夫始縉言漢王及安南事得禍後高煦以叛誅安南數反置吏未久復棄去悉如縉言縉兄綸洪武中亦官御史性剛直後改應天教授子禎期以書名黃淮字宗豫永嘉人父性方國珍據溫州遁迹避偽命淮舉洪武末進士授中書舍人成祖即位召對稱旨命與解縉常立御榻左備顧問或至夜分帝就寢猶賜坐榻前語機密重務悉預聞既而與縉等六人並直文淵閣改翰林編修進侍讀議立太子淮請立嫡以長太子立遷左庶子兼侍讀永樂五年解縉黜淮進右春坊大學士明年與胡廣金幼孜楊榮楊士奇同輔導太孫七年帝北巡命淮及蹇義金忠楊士奇輔皇太子監國十一年再北巡仍留守明年帝征瓦剌還太子遣使迎稍緩帝重入高煦譖悉徵東宮官屬下詔獄淮及楊溥金問皆坐繫十年仁宗即位復官尋擢為通政使兼武英殿大學士與楊榮金幼孜楊士奇同掌內制丁母憂乞終制不許明年進少保戶部尚書兼大學士如故仁宗崩太子在南京漢王久蓄異志中外疑懼淮憂危嘔血宣德元年帝親征樂安命淮居守明年以疾乞休許之父性年九十奉養甚歡及性卒賜葬祭淮詣闕謝值燈時賜遊西苑詔乘肩輿登萬歲山命主會試比辭歸餞之太液池帝為長歌送之且曰朕生日卿其復來明年入賀英宗立再入朝正統十四年六月卒年八十三諡文簡淮性明果達於治體永樂中長沙妖人李法良反仁宗方監國命豐城侯李彬討之漢王忌太子有功詭言彬不可用淮曰彬老將必能滅賊願急遣彬卒擒法良又時有告黨逆者淮言於帝曰洪武末年已有敕禁不宜復理吏部追論靖難兵起時南人官北地不即歸附者當編戍淮曰如是恐示人不廣帝皆從之阿魯台歸款請得役屬吐蕃諸部求朝廷刻金作誓詞磨其金酒中飲諸酋長以盟衆議欲許之淮曰彼勢分則易制一則難圖矣帝顧左右曰黃淮論事如立高岡無遠不見西域僧大寶法王來朝帝將刻玉印賜之以璞示淮淮曰朝廷賜諸番制敕用敕命廣運二寶今此玉較大非所以示遠人尊朝廷帝嘉納其獻替類如此然量頗隘同列有小過輒以聞或謂解縉之謫淮有力焉其見疏於宣宗也亦謂楊榮言淮病瘵能染人云胡廣字光大吉水人父子祺名壽昌以字行陳友諒陷吉安太祖遣兵復之將殺脅從者千餘人子祺走謁帥力言不可得免洪武三年以文學選為御史上書請都關中帝稱善遣太子巡視陝西後以太子薨不果子祺出為廣西按察僉事改知彭州所至平冤獄毀淫祀修廢堰民甚德之遷延平知府卒於任廣其次子也建文二年廷試時方討燕廣對策有親藩陸梁人心搖動語帝親擢廣第一賜名靖授翰林修撰成祖即位廣偕解縉迎附擢侍講改侍讀復名廣遷右春坊右庶子永樂五年進翰林學士兼左春坊大學士帝北征與楊榮金幼孜從數召對帳殿或至夜分過山川厄塞立馬議論行或稍後輒遣騎四出求索嘗失道脫衣乘驏馬渡河水沒馬及腰以上帝顧勞良苦廣善書每勒石皆命書之十二年再北征皇長孫從命廣與榮幼孜軍中講經史十四年進文淵閣大學士兼職如故帝徵烏思藏僧作法會為高帝高后薦福言見諸祥異廣乃獻聖孝瑞應頌帝綴為佛曲令宮中歌舞之禮部郎中周訥請封禪廣言其不可遂不許廣上却封禪頌帝益親愛之廣性縝密帝前所言及所治職務出未嘗告人時人以方漢胡廣然頗能持大體奔母喪還朝帝問百姓安否對曰安但郡縣窮治建文時姦黨株及支親為民厲帝納其言十六年五月卒年四十九贈禮部尚書諡文穆文臣得諡自廣始喪還過南京太子為致祭明年官其子穜翰林檢討仁宗立加贈廣少師金幼孜名善以字行新淦人建文二年進士授戶科給事中成祖即位改翰林檢討與解縉等同直文淵閣遷侍講時翰林坊局臣講書東宮皆先具經義閣臣閲正呈帝覽乃進講解縉書楊士奇易胡廣詩幼孜春秋因進春秋要旨三卷永樂五年遷右諭德兼侍講因諭吏部直內閣諸臣胡廣金幼孜等考滿勿改他任七年從幸北京明年北征幼孜與廣榮扈行駕駐清水源有泉湧出幼孜獻銘榮獻詩皆勞以上尊帝重幼孜文學所過山川要害輒命記之幼孜據鞍起草立就使自瓦剌來帝召幼孜等傍輿行言敵中書親倚甚嘗與廣榮及侍郎金純失道陷谷中暮夜幼孜墜馬廣純去不顧榮為結鞍行行又輒墜榮乘以己騎明日始達行在所是夜帝遣使十餘輩迹榮幼孜不獲比至帝喜動顏色自後北征皆從所撰有北征前後二録十二年命與廣榮等纂五經四書性理大全遷翰林學士十八年與榮並進文淵閣大學士二十二年從北征中道兵疲帝以問羣臣莫敢對惟幼孜言不宜深入不聽次開平帝謂榮幼孜曰朕夢神人語上帝好生者再是何祥也榮幼孜對曰陛下此舉固在除暴安民然火炎崑岡玉石俱燬惟陛下留意帝然之即命草詔招諭諸部還軍至榆木川帝崩祕不發喪榮訃京師幼孜護梓宮歸仁宗即位拜戶部右侍郎兼文淵閣大學士尋加太子少保兼武英殿大學士是年十月命幼孜榮士奇會録罪囚於承天門外詔法司録重囚必會三學士委寄益隆帝御西角門閲廷臣制誥顧三學士曰汝三人及蹇夏二尚書皆先帝舊臣朕方倚以自輔嘗見前代人主惡聞直言雖素所親信亦畏威順旨緘默取容賢良之臣言不見聽退而杜口朕與卿等當深用為戒因取五人誥詞親增二語云勿謂崇高而難入勿以有所從違而或怠幼孜等頓首稱謝洪熙元年進禮部尚書兼大學士學士如故並給三俸尋乞歸省母明年母卒宣宗立詔起復修兩朝實録充總裁官三年持節寧夏册慶府郡王妃所過詢兵民疾苦還奏之帝嘉納焉從巡邊度雞鳴山帝曰唐太宗恃其英武征遼嘗過此山幼孜對曰太宗尋悔此役故建憫忠閣帝曰此山崩於元順帝時為元亡徵對曰順帝亡國之主雖山不崩國亦必亡宣德六年十二月卒年六十四贈少保諡文靖幼孜簡易靜默寬裕有容眷遇雖隆而自處益謙名其宴居之室曰退庵疾革時家人囑請身後恩不聽曰此君子所恥也胡儼字若思南昌人少嗜學於天文地理律曆醫卜無不究覽洪武中以舉人授華亭教諭能以師道自任母憂服除改長垣乞便地就養復改餘干學官許乞便地自儼始建文元年薦授桐城知縣鑿桐陂水溉田為民利縣有虎傷人儼齋沐告於神虎遁去桐人祀之朱邑祠四年副都御史練子寧薦於朝曰儼學足達天人智足資帷幄比召至燕師已渡江成祖即位曰儼知天文其令欽天監試既試奏儼實通象緯氣候之學尋又以解縉薦授翰林檢討與縉等俱直文淵閣遷侍講進左庶子父喪起復儼在閣承顧問嘗不欲先人然少戇永樂二年九月拜國子監祭酒遂不預機務時用法嚴峻國子生託事告歸者坐戍邊儼至即奏除之七年帝幸北京召儼赴行在明年北征命以祭酒兼侍講掌翰林院事輔皇太孫留守北京十九年改北京國子監祭酒當是時海內混一垂五十年帝方內興禮樂外懷要荒公卿大夫彬彬多文學之士儼館閣宿儒朝廷大著作多出其手重修太祖實録永樂大典天下圖志皆充總裁官居國學二十餘年以身率教動有師法洪熙改元以疾乞休仁宗賜敕奬勞進太子賓客仍兼祭酒致仕復其子孫宣宗即位以禮部侍郎召辭歸家居二十年方嶽重臣咸待以師禮儼與言未嘗及私自處淡泊歲時衣食才給初為湖廣考官得楊溥文大異之題其上曰必能為董子之正言而不為公孫之阿曲世以為知人正統八年八月卒年八十三贊曰明初罷丞相分事權於六部成祖始命儒臣直文淵閣預機務沿及仁宣而閣權日重實行丞相事解縉以下五人則詞林之最初入閣者也夫處禁密之地必以公正自持而尤貴於厚重不泄縉少年高才自負匡濟大略太祖俾十年進學愛之深矣彼其動輒得謗不克令終夫豈盡嫉賢害能者力固使之然歟黃淮功在輔導胡廣金幼孜勞著扈從胡儼久於國學觀諸臣從容密勿隨事納忠固非僅以文字翰墨為勳績已也
