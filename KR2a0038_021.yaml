body:
  text: 明史卷二十一本紀第二十一神宗二二十五年春正月丙辰朝鮮使來請援二月丙寅復議征倭丙子前都督同知麻貴為備倭總兵官統南北諸軍三月乙巳山東右參政楊鎬為僉都御史經略朝鮮軍務己未兵部侍郎邢玠為尚書總督薊遼保定軍務經略禦倭夏六月戊寅皇極中極建極三殿災癸未罷修國史秋七月癸巳誡諭羣臣丁酉詔赦天下是月楊應龍叛掠合江綦江八月丁丑倭破朝鮮間山遂薄南原副總兵楊元棄城走倭逼王京甲申京師地震九月壬辰逮前兵部尚書石星下獄論死冬十月甲戌安南黎惟潭篡立發關請罪詔授安南都統使是年琉球入貢二十六年春正月官軍攻倭於蔚山不克楊鎬麻貴奔王京三月癸卯賜趙秉忠等進士及第出身有差壬子羣臣詣文華門疏請皇長子冠婚不允夏四月丁卯遼東總兵官李如松出塞遇伏戰死壬申京師旱敕修省六月丁巳楊鎬罷戊午中官李敬採珠廣東丙寅張位罷丙子巡撫天津僉都御史萬世德經略朝鮮秋七月丙戌中官魯保鬻兩淮餘鹽八月丁丑京師地震九月壬辰免浙江被災田租冬十月乙卯總兵官劉綎麻貴分道擊倭敗之董一元攻倭新寨敗績十一月戊戌倭棄蔚山遁官軍分道進擊十二月總兵官陳璘破倭於乙山朝鮮平是年烏斯藏入貢二十七年春二月壬子分遣中官領浙江福建廣東市舶司是月貴州巡撫江東之遣兵討楊應龍敗績三月己亥前兵部侍郎李化龍總督川湖貴州軍務討楊應龍夏四月甲戌御午門受倭俘是月臨清民變焚稅使馬堂署殺其參隨三十四人閏月丙戌以倭平詔天下除東征加派田賦己丑久旱敕修省丙申以諸皇子婚詔取太倉銀二千四百萬兩戶部告匱命嚴核天下積儲六月己亥楊應龍陷綦江參將房嘉寵遊擊張良賢戰死秋八月甲午陝西狄道縣山崩九月土蠻犯錦州冬十月壬午振京城饑民丙戌以播州用兵加四川湖廣田賦戊子貴州宣慰使安疆臣有罪詔討賊自贖十一月己酉免河南被災田租癸酉振畿輔及鳳陽等處饑十二月丁丑武昌漢陽民變擊傷稅使陳奉戊子振京師就食流民是年琉球入貢二十八年春二月戊寅京師地震丙戌李化龍帥師分八路進討播州夏六月丁丑克海龍囤楊應龍自縊死播州平秋七月辛亥旱敕修省八月辛未慈慶宮成丙子罷朝鮮戍兵九月甲寅停刑是秋炒花犯遼東副總兵解生等敗沒冬十月辛未貴州皮林苗叛總兵官陳璘討之丙子雲南稅監楊榮開採阿瓦孟密寶井十二月乙未御午門受播州俘是年兩畿各省災傷民饑盜起內外羣臣交章請罷礦稅諸監皆不聽大西洋利瑪竇進方物二十九年春正月壬子以播州平詔天下蠲四川貴州湖廣雲南加派田租逋賦除官民詿誤罪是月皮林苗賊平二月甲戌振大同宣府饑三月乙卯賜張以誠等進士及第出身有差是月武昌民變殺稅監陳奉參隨六人焚巡撫公署夏四月乙酉徵陳奉還以守備承天中官杜茂代之五月蘇州民變殺織造中官孫隆參隨數人六月京師自去年六月不雨至是月乙亥始雨山東山西河南皆大旱丁亥法司請熱審不報是夏振畿內饑秋九月壬寅河決開封歸德丁未趙志皋卒癸丑振貴州饑戊午前禮部尚書沈鯉朱賡並兼東閣大學士預機務冬十月己卯立皇長子常洛為皇太子封諸子常洵福王常浩瑞王常潤惠王常瀛桂王詔赦天下壬辰加上慈聖皇太后尊號十二月辛未詔復𩽆顏馬市是年琉球入貢三十年春正月己未以四方災異敕修省二月己卯不豫召大學士沈一貫於啓祥宮命罷礦稅停織造釋逮繫復建言諸臣職翼日疾瘳寢前詔甲申重建乾清坤寧宮閏月丙申復河套諸部貢市戊午河州黃河竭三月甲申騰越民變殺稅監委官夏四月辛丑振順天永平饑五月乙亥法司請熱審不報秋七月辛巳邊餉缺命嚴催積逋是月緬賊陷蠻莫宣撫司宣撫思正奔騰越賊追至有司殺正以謝賊始解冬十月戊戌振江北災丙辰停刑是年琉球哈密入貢三十一年春三月戊午吏部奏天下郡守闕員不報是月播州餘賊吳洪等作亂有司討平之夏四月丁亥朔日有食之五月丙辰閣臣請熱審不報戊寅京師地震鳳陽大雨雹毀皇陵殿脊是夏河決蘇家莊北浸豐沛魚臺單縣秋九月甲子江北盜起冬十月甲申停刑丙申睢州賊楊思敬作亂有司討擒之十一月甲子獲妖書言帝欲易太子詔五城大索十二月丙戌召見皇太子於啓祥宮賜手敕慰諭三十二年春二月壬寅閣臣請補司道郡守及遣巡方御史不報三月甲子乾清宮成乙丑賜楊守勤等進士及第出身有差夏四月辛巳朔日有食之是月濬泇河工成五月癸酉雷火焚長陵明樓六月丙戌以陵災命補闕官恤刑獄丁酉昌平大水壞長泰康昭四陵石梁秋七月庚戌京師大雨壞城垣辛酉振被水居民八月辛丑羣臣伏文華門疏請修舉實政降旨切責丙午分水河工成九月戊申振畿南六府饑閏月辛丑武昌宗人蘊鉁等作亂殺巡撫都御史趙可懷冬十月甲寅始平播州功是年琉球烏斯藏入貢三十三年春正月重修京師外城庚辰銀定歹成犯鎮番總兵官達雲擊敗之夏四月辛亥蘊鉁等伏誅五月丙申鳳陽大風雨毀陵殿神座庚子雷擊圜丘望燈高杆六月乙巳以雷警敕修省秋八月己巳停刑九月甲午昭和殿災丙申京師地震冬十一月辛巳免淮陽被災田租十二月壬寅詔罷天下開礦以稅務歸有司歲輸所入之半於內府半戶工二部丙午免河南被災田租乙卯以皇長孫生詔赦天下開宗室科舉入仕例罷採廣東珠池雲南寶井三十四年春二月庚戌加上皇太后徽號辛亥大學士沈鯉朱賡請補六部大僚不報三月己卯雲南人殺稅監楊榮焚其尸丁酉真定順德廣平大名災蠲振有差夏四月癸亥濬朱旺口河工成五月癸酉河套部犯延綏官軍擊走之六月癸卯緬甸陷木邦是月畿內大蝗秋七月癸未沈一貫沈鯉致仕九月甲午詔陝西嚴敕邊備冬十月丙申停刑十一月己巳𩽆顏入犯總兵官姜顯謨禦却之十二月壬子南京妖賊劉天緒謀反事覺伏誅是年安南琉球入貢蒙古喀爾喀諸部悉歸我大清三十五年春正月辛未給事中翁憲祥言撫按官解任宜候命不宜聽其自去不報二月戊戌安南賊武德成犯雲南總兵官沐睿禦却之三月辛巳賜黃士俊等進士及第出身有差夏四月戊戌銀定歹成犯涼州副總兵柴國柱擊走之壬子順義王扯力克卒五月戊子前禮部尚書于慎行及禮部侍郎李廷機南京吏部侍郎葉向高並禮部尚書兼東閣大學士預機務六月湖廣及徽寧太平嚴州大水閏月辛巳復河套諸部貢市秋七月庚子京師久雨刑部請發熱審疏不報八月丙寅振畿內饑九月甲午停刑冬十月癸酉山東旱饑蠲振有差十一月壬子于慎行卒十二月金沙江蠻阿克叛陷武定攻圍雲南別陷嵩明祿豐安南賊犯欽州是年琉球入貢三十六年春正月河南江北饑二月戊辰京師地震夏六月己卯南畿大水秋七月丁酉京師地震郴州礦賊起八月癸亥治雲南失事諸臣罪巡撫都御史陳用賓總兵官沐睿下獄論死庚辰振南畿及嘉興湖州饑九月甲午四川巡撫都御史喬璧星奏擒阿克於東川賊平冬十一月壬子朱賡卒十二月戊午再振南畿免稅糧是年琉球入貢三十七年春三月辛卯拱兔陷大勝堡遊擊于守志戰於小凌河敗績己酉大學士葉向高請發羣臣相攻諸疏公論是非以肅人心不報夏四月倭寇溫州秋九月癸卯左都御史詹沂封印自去丁未停刑是秋福建浙江江西大水湖廣四川河南陝西山西旱畿內山東徐州蝗冬十二月己巳留畿內山東諸省稅銀三分之一振饑民徐州賊殺如皋知縣張藩是年日本入琉球執其國王尚寧哈密入貢三十八年春三月癸巳賜韓敬等進士及第出身有差夏四月丁丑正陽門樓災辛卯以旱災異常諭羣臣各修職業勿彼此攻訐辛丑振畿內山東山西河南陝西福建四川饑五月河南賊陳自管等作亂有司討擒之冬十月辛丑停刑十一月壬寅朔日有食之丁卯以軍乏餉諭廷臣陳足國長策不得請發內帑是年烏斯藏入貢三十九年春二月庚子河套部敵犯甘州之紅崖青湖官軍禦却之夏四月京師旱戊子怡神殿災丙申設邊鎮常平倉五月壬寅御史徐兆魁疏劾東林講學諸人陰持計典自是諸臣益相攻擊廣西廣東大水六月自徐州北至京師大水是夏停熱審冬十月丁卯戶部尚書趙世卿拜疏自去甲申停刑閣臣請釋輕犯不報是年暹羅入貢四十年春二月癸未吏部尚書孫丕揚拜疏自去三月丙午振京師流民夏四月丙寅南京各道御史言臺省空虛諸務廢墮上深居二十餘年未嘗一接見大臣天下將有陸沈之憂不報五月甲午朔日有食之秋八月河決徐州九月庚戌李廷機拜疏自去冬十月甲申停刑是年琉球中山王尚寧遣使報歸國四十一年春正月庚申諭朝鮮練兵防倭三月癸酉賜周延儒等進士及第出身有差夏五月己巳諭吏部都察院年來議論混淆朝廷優容不問遂益妄言排陷致大臣疑畏皆欲求去甚傷國體自今仍有結黨亂政者罪不宥六月乙未卜失兔襲封順義王秋七月甲子兵部尚書掌都察院事孫瑋拜疏自去九月壬申吏部左侍郎方從哲前吏部左侍郎吳道南並禮部尚書兼東閣大學士預機務庚辰吏部尚書趙煥拜疏自去是年兩畿山東江西河南廣西湖廣遼東大水烏斯藏入貢四十二年春正月乙丑總兵官劉綎討建昌叛蠻平之二月辛卯慈聖皇太后崩己酉振畿內饑三月丙子福王之國夏四月丙戌以皇太后遺命赦天下六月甲午葬孝定皇后秋八月甲午禮部右侍郎孫慎行拜疏自去癸卯葉向高致仕是年安南土魯番入貢四十三年春正月乙丑徐州決河工成三月丁未朔日有食之夏五月己酉薊州男子張差持梃入慈慶宮擊傷守門內侍下獄丁巳刑部提牢主事王之寀揭言張差獄情梃擊之案自是起己巳嚴皇城門禁癸酉召見廷臣於慈寧宮御史劉光復下獄甲戌張差伏誅六月戊寅久旱敕修省秋七月己酉振畿內饑甲戌停刑閏八月庚戌重建三殿丁巳山東大旱詔留稅銀振之丁卯河套諸部犯延綏官軍禦之敗績副將孫弘謨被執冬十月辛酉京師地震十一月戊寅振京師饑民四十四年春三月辛未朔日有食之乙酉賜錢士升等進士及第出身有差是春畿內山東河南淮徐大饑蠲振有差夏四月戊午河南盜起諭有司撫剿六月壬寅河套諸部犯延綏總兵官杜文煥禦却之丁卯河決祥符朱家口浸陳嵵睢柘諸州縣秋七月乙未河套部長吉能犯高家堡參將王國興敗沒是月陝西旱江西廣東水河南淮揚常鎮蝗山東盜賊大起冬十月丁未停刑十一月己巳隆德殿災四十五年春二月戊午以去冬無雪入春不雨敕修省三月辛未鎮撫司缺官獄囚久繫多死大學士方從哲等以請不報乙亥振江西饑夏五月丙子久旱再諭修省六月丙申畿南大饑有司請振不報是月閣臣法司請熱審不報秋七月癸亥朔日有食之丁卯吳道南以憂去是年兩畿河南山東山西陝西江西湖廣福建廣東災暹羅烏斯藏入貢四十六年春二月乙巳振廣東饑夏四月甲辰大清兵克撫順城千總王命印死之庚戌總兵官張承胤帥師援撫順敗沒閏月庚申楊鎬為兵部左侍郎兼右僉都御史經略遼東六月壬午京師地震是夏有司請熱審不報秋七月丙午大清兵克清河堡守將鄒儲賢張死之八月壬申海運餉遼東庚辰乃蠻等七部發塞辛巳停刑九月壬辰遼師乏餉有司請發各省稅銀不報辛亥加天下田賦乙卯京師地震冬十一月甲午以災異敕修省十二月丁巳河套部長猛克什力來降是年土魯番天方撒馬兒罕魯迷哈密烏斯藏入貢四十七年春二月乙丑經略楊鎬誓師於遼陽總兵官李如柏杜松劉綎馬林分道出塞三月甲申杜松遇大清兵於吉林崖戰死乙酉馬林兵敗於飛芬山兵備僉事潘宗顏戰死庚寅劉綎兵深入阿布達里岡戰死辛丑賜莊際昌等進士及第出身有差夏四月癸酉盔甲廠災六月丁卯大清兵克開原馬林敗沒癸酉大理寺丞熊廷弼為兵部右侍郎兼右僉都御史經略遼東甲戌廷臣伏文華門請發章奏及增兵發餉不報秋八月乙卯山東蝗癸亥逮楊鎬九月庚辰停刑戊子百官伏闕請視朝行政不報冬十月丁巳振京師饑民十二月再加天下田賦辛未鎮江寬奠靉陽新募援兵潰是年暹羅入貢四十八年春正月庚子朝鮮乞援三月庚寅復加天下田賦夏四月癸丑皇后王氏崩戊午帝不豫召見方從哲於弘德殿秋七月壬辰大漸召英國公張惟賢大學士方從哲尚書周嘉謨李汝華黃嘉善張問達黃克纘侍郎孫如游於弘德殿勉諸臣勤職丙申崩年五十有八遺詔罷一切榷稅併新增織造諸項九月甲申上尊諡廟號神宗葬定陵光宗光宗崇天契道英睿恭純憲文景武淵仁懿孝貞皇帝諱常洛神宗長子也母恭妃王氏萬曆十年八月生神宗御殿受賀告祭郊廟社稷頒詔天下上兩宮徽號未幾鄭貴妃生子常洵有寵儲位久不定廷臣交章固請皆不聽二十九年十月乃立為皇太子三十一年獲妖書言神宗欲易太子指斥鄭貴妃神宗怒捕逮株連者甚衆最後得皎生光者磔之獄乃解四十一年六月姦人王曰乾上變告孔學等為巫蠱將謀不利於東宮語連鄭貴妃福王事具葉向高傳四十三年夏五月己酉薊州男子張差持梃入慈慶宮事復連貴妃內璫太子請以屬吏獄具戮差於市斃內璫二人於禁中自是遂有梃擊之案四十八年七月神宗崩丁酉太子遵遺詔發帑金百萬犒邊盡罷天下礦稅起建言得罪諸臣己亥再發帑金百萬充邊賞八月丙午朔即皇帝位大赦天下以明年為泰昌元年蠲直省被災租賦己酉吏部侍郎史繼偕南京禮部侍郎沈為禮部尚書兼東閣大學士預機務遼東大旱庚申蘭州黃河清凡三日甲子禮部侍郎何宗彥劉一燝韓爌為禮部尚書兼東閣大學士預機務乙丑南京禮部尚書朱國祚為禮部尚書兼東閣大學士預機務召葉向高遣使恤刑丙寅帝不豫戊辰召對英國公張惟賢大學士方從哲等十有三人於乾清宮命皇長子出見甲戌大漸復召從哲等受顧命是日鴻臚寺官李可灼進紅丸九月乙亥朔崩於乾清宮在位一月年三十有九熹宗即位從廷臣議改萬曆四十八年八月後為泰昌元年冬十月上尊諡廟號光宗葬慶陵贊曰神宗冲齡踐阼江陵秉政綜核名實國勢幾於富強繼乃因循牽制晏處深宮綱紀廢弛君臣否隔於是小人好權趨利者馳騖追逐與名節之士為仇讎門戶紛然角立馴至哲愍邪黨滋蔓在廷正類無深識遠慮以折其機牙而不勝忿激交相攻訐以致人主蓄疑賢姦雜用潰敗決裂不可振救故論者謂明之亡實亡於神宗豈不諒歟光宗潛德久彰海內屬望而嗣服一月天不假年措施未展三案搆爭黨禍益熾可哀也夫
