body:
  text: 明史卷十一本紀第十一景帝恭仁康定景皇帝諱祁鈺宣宗次子也母賢妃吳氏英宗即位封郕王正統十四年秋八月英宗北狩皇太后命王監國丙寅移通州糧入京師徵兩畿山東河南備倭運糧諸軍入衛召寧陽侯陳懋帥師還戊辰兵部侍郎于謙為本部尚書令羣臣直言時事舉人材己巳皇太后詔立皇子見深為皇太子恤陳亡將士庚午籍王振家辛未右都御史陳鎰撫安畿內軍民壬申都督石亨總京營兵乙亥諭邊將瓦剌奉駕至不得輕出輸南京軍器於京師修撰商輅彭時入閣預機務是月廣東賊黃蕭養作亂九月癸未王即皇帝位遙尊皇帝為太上皇帝以明年為景泰元年大赦天下免景泰二年田租十之三甲申夷王振族庚寅處州賊平癸巳指揮僉事季鐸奉皇太后命達於上皇甲午祭宣府土木陳亡將士瘞遺骸乙未總兵官安鄉伯張安討廣州賊敗死指揮僉事王清被執死之辛丑給事中孫祥郎中羅通為右副都御史守紫荊居庸關甲辰遣御史十五人募兵畿內山東山西河南都督同知陳友帥師討湖廣貴州叛苗乙巳遣使奉書上皇丙午苗圍平越衛調雲南四川兵會王驥討之參議楊信民為右僉都御史討廣東賊冬十月戊申也先擁上皇至大同壬子詔諸王勤王乙卯于謙提督諸營石亨及諸將分守九門丙辰也先陷紫荊關孫祥死之京師戒嚴丁巳詔宣府遼東總兵官山東河南山西陝西巡撫及募兵御史將兵入援戊午也先薄都城都督高禮毛福壽敗之於彰義門己未右通政王復太常少卿趙榮使也先營朝上皇於土城庚申徵兵於朝鮮調河州諸衛土軍入援于謙石亨等連敗也先衆於城下壬戌寇退甲子出紫荊關丁卯詔止諸王兵瓦剌可汗脫脫不花使來辛未昌平伯楊洪充總兵官都督孫鏜范廣副之剿畿內餘寇十一月癸未修沿邊關隘辛卯毛福壽為副總兵討辰州叛苗壬辰上皇至瓦剌乙未侍郎耿九疇撫安南畿流民賜復三年十二月庚戌尊皇太后為上聖皇太后辛亥王驥為平蠻將軍充總兵官討貴州叛苗都督同知董興為左副總兵討廣東賊戶部侍郎孟鑑參贊軍務癸丑尊母賢妃為皇太后甲寅立妃汪氏為皇后丙辰大赦己未石亨楊洪柳溥分練京營兵戊辰祭陳亡官軍於西直門外是年琉球中山占城烏斯藏撒馬兒罕入貢景泰元年春正月丁丑朔罷朝賀辛巳城昌平壬午享太廟丙戌大祀天地於南郊閏月甲寅瓦剌寇寧夏癸亥詔會試取士毋拘額庚午大同總兵官郭登敗瓦剌於沙窩又追敗之於栲栳山封登定襄伯是月免大名真定開封衛輝被災稅糧二月戊寅耕藉田癸未懸賞格招陷敵軍民丙戌石亨為鎮朔大將軍帥師巡大同都指揮同知楊能充遊擊將軍巡宣府壬辰太監喜寧伏誅三月己酉瓦剌寇朔州辛亥録土木死事諸臣後癸丑瓦剌寇寧夏慶陽乙卯寇朔州癸亥免畿內逋賦及夏稅夏四月丙子廣東都指揮李升何貴帥兵捕海賊戰死辛巳瓦剌寇大同官軍擊却之丁亥保定伯梁珤代王驥討貴州叛苗戊子大理寺丞李茂録囚南京考黜百司訪軍民利病丙申瓦剌寇雁門己亥都督同知劉安充總兵官練兵於保定真定及涿易通三州僉都御史曹泰參贊軍務庚子振山東飢辛丑振畿內被寇州縣癸卯瓦剌寇大同郭登擊却之五月乙巳免山西被災稅糧瓦剌掠河曲代州遂南犯詔劉安督涿易諸軍禦之戊申瓦剌寇雁門益黃花鎮戍兵衛陵寢癸丑董興擊破廣東賊黃蕭養伏誅壬戌振大同被寇軍民丙寅侍郎侯璡副總兵田禮大破貴州苗辛未瓦剌遣使請和六月壬午瓦剌寇大同郭登擊却之丙戌也先復擁上皇至大同丁亥左都御史陳鎰王文以鞫太監金英家人不實下獄尋釋之戊子瓦剌寇宣府都督朱謙參將紀廣禦却之戊戌免山東被災州縣稅糧己亥給事中李實大理寺丞羅綺使瓦剌秋七月庚戌尚書侯璡參將方瑛破貴州苗擒其酋獻京師庚申右都御史楊善工部侍郎趙榮使瓦剌停山西民運糧大同癸亥李實羅綺還己巳楊善至瓦剌也先許上皇歸八月癸酉上皇發瓦剌戊寅祀社稷甲申遣侍讀商輅迎上皇於居庸關丙戌上皇還京師帝迎於東安門入居南宮帝帥百官朝謁庚寅赦天下辛卯刑部右侍郎江淵兼翰林學士直文淵閣預機務九月癸丑巡撫河南副都御史王來總督湖廣貴州軍務討叛苗冬十月辛卯録囚癸巳免畿內逋賦十一月辛亥禮部尚書胡濙請令百官賀上皇萬壽節十二月丙申復請明年正旦百官朝上皇於延安門皆不許是年朝鮮貢馬者三二年春正月庚戌大祀天地於南郊壬子詔天下朝覲官當黜者運糧口外二月辛未釋奠於先師孔子辛卯以星變修省詔廷臣條議寬恤諸政癸巳詔畿內及山東巡撫官舉廉能吏專司勸農授民荒田貸牛種三月壬寅賜柯潛等進士及第出身有差夏四月乙酉梁珤王來等破平越苗獻俘京師甲午瓦剌寇宣府馬營敕遊擊將軍石彪等巡邊乙未命石亨選京營兵操練尚書石璞總督軍務五月乙巳城固原六月戊辰朔日當食不見己卯詔貴州各衛修舉屯田秋七月戊申普定永寧畢節諸苗復叛梁珤等留軍討之八月壬申南京地震辛巳復午朝九月乙卯禁諸司起復冬十月己丑免山西被災稅糧十二月庚寅禮部左侍郎王一寧祭酒蕭鎡兼翰林學士直文淵閣預機務是月也先弒其主脫脫不花是年安南琉球中山瓦剌哈密入貢三年春正月丙午大祀天地於南郊二月乙酉副都御史劉廣衡録南京囚戊子戶部尚書金濂以違詔下獄尋釋之三月戊午毛福壽討湖廣巴馬苗克之夏五月甲午廢皇太子見深為沂王立皇子見濟為皇太子廢皇后汪氏立太子母杭氏為皇后封上皇子見清榮王見淳許王大赦天下丙申築沙灣堤成辛丑河南流民復業者計口給食五年乙巳官顏孟二氏子孫各一人六月乙亥罷各省巡撫官入京議事是月大雨河決沙灣秋七月乙未左都御史王翺總督兩廣軍務壬寅王一寧卒八月乙丑振徐兗水災戊辰都御史洪英尚書孫原貞薛希璉等分行天下考察官吏丁丑振兩畿水災州縣免稅糧乙酉振南畿河南山東流民九月庚寅江淵起復辛卯以南京地震兩淮大水河決命都御史王文巡視安輯乙未振兩畿山東山西福建廣西江西遼東被災州縣閏月癸未開處州銀場是月福建盜起冬十月戊戌左都御史王文兼翰林學士直文淵閣預機務丙辰都督孫鏜僉事石彪協守大同都督同知衛潁僉事楊能張欽協守宣府備也先十一月己未朔日有食之戊辰都督方瑛平白石崖諸苗甲戌安輯畿內山東山西逃民復賦役五年是月免山東及淮徐水災稅糧十二月癸巳始立團營太監阮讓都督楊俊等分統之聽于謙石亨太監劉永誠曹吉祥節制是月免河南及永平被災秋糧是年瓦剌琉球中山爪哇暹羅安南哈密烏斯藏入四年春正月辛未大祀天地於南郊二月戊子五開清浪諸苗復叛梁珤王來討之庚戌免江西去年被災秋糧三月戊寅開建寧銀場夏四月戊子築沙灣決口運南京倉粟振徐州五月丁巳發徐淮倉振飢民己巳王文起復甲戌徐州復大水民益飢發支運及鹽課糧振之丁丑發淮安倉振鳳陽乙酉沙灣河復決六月壬辰吏部尚書何文淵以給事中林聰言下獄尋令致仕辛亥瘞土木大同紫荊關暴骸秋七月庚辰停諸不急工役八月己丑振河南飢甲午也先自立為可汗冬十月庚寅詔天下鎮守巡撫官督課農桑甲午諭德徐有貞為左僉都御史治沙灣決河戊戌也先遣使來十一月辛未皇太子見濟薨十二月乙未免山東被災稅糧乙巳賚邊軍是年琉球中山安南爪哇日本占城哈密瓦剌入貢五年春正月戊午黃河清自龍門至於芮城甲子大祀天地於南郊壬申罷福州建寧銀場甲戌平江侯陳豫學士江淵撫輯山東河南被災軍民二月乙巳以雨暘弗時詔修省求直言三月壬子賜孫賢等進士及第出身有差辛酉學士江淵振淮北飢民王文撫恤南畿甲子總督兩廣副都御史馬昂破瀧水瑤庚辰緬甸執獻思機發夏四月壬午朔日有食之辛卯方瑛破草塘苗封瑛南和伯五月甲子禮部郎中章綸御史鍾同以請復沂王為皇太子下錦衣衛獄六月戊子録囚秋七月癸酉振南畿水災八月丁酉復命天下巡撫官赴京師議事九月壬戌免蘇松常揚杭嘉湖漕糧二百餘萬石冬十月庚辰副都御史劉廣衡巡撫浙江福建專司討賊十一月戊午罷蘇松常鎮織造採辦十二月免南畿浙江被災稅糧是年安南琉球中山爪哇入貢也先為知院阿剌所殺六年春正月戊午大祀天地於南郊二月壬午太監王誠同法司刑科録囚大理少卿李茂等録南京浙江囚夏四月丙子朔日有食之辛巳敕戶兵二部及兩畿山東河南浙江湖廣撫按三司官條寬恤事罷不急諸務五月己巳禱雨於南郊六月乙亥宋儒朱熹裔孫梃為翰林院世襲五經博士癸未河決開封秋七月乙亥沙灣決口隄成庚寅以南京災異屢見敕羣臣修省八月庚申南京大理少卿廖莊以請復沂王為皇太子杖於闕下並杖章綸鍾同於獄同卒九月乙亥振蘇松飢民米麥一百餘萬石冬十月戊午免陝西被災稅糧十一月乙亥南和伯方瑛為平蠻將軍充總兵官討湖廣苗十二月己巳免南畿被災秋糧是年琉球中山暹羅哈密滿剌加入貢七年春正月己卯尚書石璞撫安湖廣軍民壬午大祀天地於南郊二月庚申皇后崩甲子營壽陵三月戊寅免雲南被災稅糧夏五月戊寅以水旱災異敕內外諸臣修省辛卯宋儒周敦頤裔孫冕為翰林院世襲五經博士六月庚申葬肅孝皇后冬十月癸卯振江西飢十二月己亥方瑛大破湖廣苗戊午振畿內山東河南水災癸亥帝不豫罷明年元旦朝賀是冬免畿內山東被災稅糧並蠲逋賦是年琉球中山撒馬兒罕烏斯藏入貢八年春正月戊辰免江西被災稅糧丁丑帝輿疾宿南郊齋宮己卯羣臣請建太子不聽壬午武清侯石亨副都御史徐有貞等迎上皇復位二月乙未廢帝為郕王遷西內皇太后吳氏以下悉仍舊號癸丑王薨於西宮年三十諡曰戾毀所營壽陵以親王禮葬西山給武成中衛軍二百戶守護成化十一年十二月戊子制曰朕叔郕王踐阼戡難保邦奠安宗社殆將八載彌留之際姦臣貪功妄興讒構請削帝號先帝旋知其枉每用悔恨以次抵諸姦於法不幸上賓未及舉正朕敦念親親用成先志可仍皇帝之號其議諡以聞遂上尊諡敕有司繕陵寢祭饗視諸陵贊曰景帝當倥傯之時奉命居攝旋正大位以繫人心事之權而得其正者也篤任賢能勵精政治強寇深入而宗社乂安再造之績良云偉矣而乃汲汲易儲南內深錮朝謁不許恩誼恝然終於輿疾齋宮小人乘間竊發事起倉猝不克以令名終惜夫
