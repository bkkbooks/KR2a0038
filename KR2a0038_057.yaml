body:
  text: 明史卷五十七志第三十三禮十一軍禮親征遣將禡祭受降奏凱獻俘論功行賞大閲大射救日伐鼓四曰軍禮親征為首遣將次之方出師有禡祭之禮及還有受降奏凱獻俘論功行賞之禮平居有閲武大射之禮而救日伐鼓之制亦以類附焉親征洪武元年閏七月詔定軍禮中書省臣會儒臣言古者天子親征所以順天應人除殘去暴以安天下自黃帝習用干戈以征不享此其始也周制天子親征則類於上帝宜於大社造於祖廟禡於所征之地及祭所過山川師還則奏凱獻俘於廟社後魏有宣露布之制唐仍舊典宋亦間行焉於是歷考舊章定為親征禮奏之前期擇日祭告天地宗社皇帝服武辨乘革輅備六軍具牲幣作樂皆行三獻禮其儀與大祀同又於國南神祠行禡祭禮凡所過山川嶽鎮海瀆用太牢其次少牢又次特牲若行速止用酒脯祭器籩豆各一前期齊一日皇帝服通天冠絳紗袍省牲視滌祭之日服武辨行一獻禮凱旋告祭宗社禮與出師同獻俘廟社以露布詔天下然後論功行賞永樂宣德正統間率遵用之正德十四年帝親征宸濠禮部上祭告儀注如舊帝令祭祀俱遣官代及疏請遣官有旨勿遣其頒詔亦如舊制明年十一月將凱旋禮臣言宸濠悖逆皇上親統六師往正其罪與宣德間親征漢庶人高煦故事相同但一切禮儀無從稽考請於師還之日聖駕從正陽門入遣官告謝天地廟社駕詣奉先殿几筵殿謁見畢朝見皇太后次日早御午門樓百官朝見行獻俘禮擇日詔告天下十二月帝還京百官迎於正陽門外帝戎服乘馬入遣將洪武元年中書省臣會官議奏王者遣將所以討有罪除民害也書稱大禹徂征詩美南仲薄伐史記引兵書曰古王者之遣將跪而推轂漢高命韓信為將設壇具禮北齊親授斧鉞唐則告於廟社又告太公廟宋則授旌節於朝堂次告廟社又禡祭黃帝今定遣將禮皇帝武辨服御奉天殿大將軍入就丹墀四拜由西陛入殿再拜跪承制官宣制以節鉞授大將軍大將軍受之以授執事者俯伏興再拜出降陛復位四拜駕還宮大將軍出至午門外勒所部將士建旗幟鳴金鼓正行列擎節鉞奏樂前導百官以次送出造廟宜社之禮即命大將軍具牲幣行一獻禮與遣官祭告廟社儀同其告武成王廟儀前二日大將省牲祭日大將於幕次僉祝版入就位再拜詣神位前上香奠帛再拜進熟酌獻讀祝再拜詣位再拜飲福受胙復再拜徹豆望燎其配位亦大將行禮兩廡陪祀諸將分獻禡祭親征前期皇帝及大將陪祭官皆齊一日前一日皇帝服通天冠絳紗袍省牲詣神廚視鼎鑊滌溉執事設軍牙六纛於廟中之北軍牙東六纛西籩豆十二簠簋各二鉶登俎各三設瘞坎位於神位西北設席於坎前上置酒碗五雄雞五餘陳設如常儀祭日建牙旗六纛於神位後皇帝服武辨自左南門入至廟庭南正中北向立大將及陪祭官分文武重行班於後迎神再拜奠幣行初獻禮先詣軍牙神位前再詣六纛神位前俱再拜亞獻終獻如之惟初獻讀祝詣飲福位再拜飲福受胙又再拜掌祭官徹豆贊禮唱送神復再拜執事官各以祝幣掌祭官取饌詣燎所太常奏請望燎執事殺雞刺血於酒碗中酹神燎半奏禮畢駕還若遣將則於旗纛廟壇行三獻禮大將初獻諸將亞獻終獻受降洪武四年七月蜀夏明升降表至京師太祖命中書集議受降禮省部請如宋太祖受蜀主孟昶降故事擬明升朝見日皇帝御奉天門升等於午門外跪進待罪表侍儀使捧表入宣表官宣讀訖承制官出傳制升等皆俯伏於地侍儀舍人掖升起其屬官皆起跪聽宣制釋罪升等五拜三呼萬歲承制官傳制賜衣服冠帶侍儀舍人引升入丹墀中四拜侍儀使傳旨升跪聽宣諭俯伏四拜三呼萬歲又四拜出百官行賀禮帝以昶專治國政所為奢縱升年幼事由臣下免其叩頭伏地上表請罪禮惟命升及其官屬朝見百官朝賀奏凱獻俘凡親征師還皇帝率諸將陳凱樂俘馘於廟南門外社北門外告祭廟社行三獻禮同出師儀祭畢以俘馘付刑部協律郎導樂以退皇帝服通天冠絳紗袍升午門樓以露布詔天下百官具朝服以聽儀與開讀詔赦同大將奏凱儀先期大都督以露布聞內使監陳御座於午門樓上前楹設奏凱樂位於樓前協律郎位於奏凱樂北司樂位於協律郎南又設獻俘位於樓前少南獻俘將校位於其北刑部尚書奏位於將校北皆北向又設刑部尚書受俘位於獻俘位西東向設露布案於內道正中南向受露布位於案東承制位於案東北俱西向宣露布位於文武班南北向至日清晨先陳凱樂俘馘於廟社門外不奏歌曲俟告祭禮畢復陳樂於午門樓前將校引俘侍立於兵仗之外百官入侍立位皇帝常服升樓侍衛如常儀大將於樓前就位四拜諸將隨之退就侍立位贊奏凱樂協律郎執麾引樂工就位司樂跪請奏凱樂協律郎舉麾鼓吹振作編奏樂曲樂止贊宣露布承制官以露布付受露布官引禮引詣案跪受由中道南行以授宣露布官宣訖付中書省頒示天下將校引俘至位刑部尚書跪奏曰某官某以某處所俘獻請付所司奏訖退復位其就刑者立於西廂東向以付刑官其宥罪者樓上承制官宣旨有敕釋縛樓下承旨釋訖贊禮贊所釋之俘謝恩皆四拜三呼將校以所釋俘退如有所賜就宣旨賜之大將以下就拜位舞蹈山呼如常儀班前稍前跪稱賀致詞訖百官復四拜禮畢還宮洪武三年六月左副將軍李文忠北征大捷遣官送所俘元孫買的里八剌及寶冊至京師百官請行獻俘禮帝不許事詳本紀止令服本俗服朝見畢賜中國衣冠就謝復謂省臣曰故國之妃朝於君者元有此禮不必效之亦令衣本俗服入見中宮賜中國服就謝十一月大將軍徐達及文忠等師還車駕出勞於江上明日達率諸將上平沙漠表帝御奉天殿皇太子親王侍百官朝服陪列達文忠奉表賀禮成退自西階皇太子親王入賀後定凡大捷擇日以宣其日不奏事百官吉服賀即日遣官薦告郊廟中捷以下止宣捷不祭告慶賀永樂四年定凡捷兵部官以露布奏聞大將在軍則進露布官行禮次日行開讀禮第三日行慶賀禮餘如前儀武宗征宸濠還禮部上獻俘儀值帝弗豫不果行嘉靖二十三年十月叛賊王三屢導吉囊入犯大同官軍計擒之遣官謝南北郊景神殿太社稷擇日獻俘百官表賀天啓二年四川獻逆犯樊友邦等山東獻逆犯徐鴻儒等俱遣官告祭郊廟御樓獻俘論功行賞凡凱還中書省移文大都督府兵部具諸將功績吏部具勳爵職名戶禮二部具賞格中書集六部論定功賞奏取上裁前期陳御座香案於奉天殿設寶案詔書案於殿中誥命案於丹陛正中之北宣制案於誥命案之北吏戶禮三部尚書位於殿上東南大都督兵部尚書位於殿上西南應受賞官拜位於丹墀中序立位於丹墀西南受賞位於誥命案之南受賞執事位於受賞官序立位之西每官用捧誥命捧禮物各一人俱北向餘陳設如朝儀是日鼓三嚴執事官各就位皇帝袞冕升座皇太子諸王袞冕自殿東門入侍立受賞官入就拜位四拜承制官跪承制由殿中門出吏戶禮尚書由殿西門出立於誥命案東承制官南向稱有制受賞官皆跪宣制曰朕嘉某等為國建功宜加爵賞今授以某職賜以某物其恭承朕命宣畢受賞官俯伏興再拜唱行賞受賞官第一人詣案前跪吏部尚書捧誥命戶部尚書捧禮物各授受賞官受賞官以授左右俯伏興復位餘官以次受賞訖承制官吏部尚書等俱至御前復命退復位受賞官皆再拜三舞蹈山呼俯伏興復四拜禮畢皇帝還宮各官出至午門外以誥命禮物置於龍亭用儀仗鼓樂各送還本第明日進表稱謝如常儀大閲宣德四年十月帝將閲武郊外命都督府整兵文武各堂上官一員屬官一員扈從正統間或閲於近郊於西苑不著令隆慶二年大學士張居正言祖宗時有大閲禮乞親臨校閲兵部引宣宗英宗故事請行之命於明年八月舉行及期禮部定儀前期一日皇帝常服告於內殿行四拜禮如出郊儀司設監設御幄於將臺上總協戎政大臣巡視科道督率將領軍兵預肅教場至日早遣官於教場祭旗纛之神三大營官軍具甲仗將官四員統馬兵二千扈駕文臣各堂上官科道掌印官禮兵二科禮部儀制司兵部四司官糾儀監射御史鴻臚寺供事官武臣都督以上錦衣衛堂上及南鎮撫司掌印僉書官俱大紅便服關領扈從牙牌懸帶先詣教場是日免朝錦衣衛備鹵簿皇帝常服乘輦由長安左門出官軍導從鉦鼓振作出安定門至閲武門外總協戎政官率大小將佐戎服跪迎入將臺下北向序立駕進閲武門內中軍舉號炮三各營鉦鼓振作扈從官序立於行宮門外駕至門降輦兵部官導入行宮鳴金止鼓候升座扈從官行一拜禮傳賜酒飯各官謝恩出將臺下東西序立兵部官奏請大閲兵部鴻臚寺官導駕登臺舉炮三京營將士叩頭畢東西侍立總協戎政官列於扈從官之北諸將列從官之南兵部尚書奏請令各營整搠人馬臺上吹號笛麾黃旗總協戎政及將佐等官各歸所部兵部尚書請閲陳舉炮三馬步官軍演陳如常法演畢復吹號笛麾黃旗將士俱回營少頃兵部尚書請閲射總協戎政官以下及聽射公侯駙馬伯錦衣衛等官俱於臺下較射馬三矢步六矢中的者鳴鼓以報御史兵部官監視紀録把總以下及家丁軍士射以府部大臣並御史兵部官於東西廳較閲鎗刀火器等藝聽總協戎政官量取一隊於御前呈驗兵部尚書奏大閲畢臺下舉號旗總協戎政官及諸將領俱詣臺下北向序立鴻臚寺官奏傳制贊跪宣制訖贊叩頭各官先退出門外贊扈從官行叩頭禮禮畢駕回行宮少扈從等官趨至門內立皇帝升輦中軍舉炮三各營皆鼓吹鹵簿及馬兵導從如來儀鉦鼓與大樂相應振作總協戎政以下候駕至叩頭退馬兵至長安左門外止鹵簿大樂至午門外止駕還仍詣內殿參謁如前儀百官不扈從者各吉服於承天門外橋南序立恭送駕還迎如之次日總協戎政官以下表謝百官侍班行稱賀禮如常儀兵部以將士優劣及中箭多寡教練等第奏聞越二日皇帝御皇極門賜敕勉勵將士總協戎政官捧至彩輿將士迎導至教場開讀行禮如儀是日即行賞賚並戒罰有差次日總協戎政官率將佐復謝恩詔如議行駕還樂奏武成之曲萬曆九年大閲如隆慶故事大射大射之禮後世莫講惟宋史列於嘉禮至明集禮則附軍禮中會典亦然其制洪武三年定凡郊廟祭祀先期行大射禮工部製射侯等器其射鵠有七虎鵠五采天子用之熊鵠五采皇太子用之豹鵠五采親王用之豹鵠四采文武一品二品者用之糝鵠三采三品至五品用之狐鵠二采六品至九品用之布鵠無采文武官子弟及士民俊秀用之凡射時置乏於鵠右乏又名容見周禮大司馬服不氏職執旗及待獲者以蔽身設楅及韋當射時置於前以齊矢設射中五皮樹中天子大射用之閭中天子宴射用之虎中皇太子親王射用之兕中一品至五品文武官用之鹿中六品至九品及文武官子弟士民俊秀通用之其職事設司正官二掌驗射者品級尊卑人力強弱而定耦其中否則書於算兵部官職之司射二掌先以強弓射鵠誘射以鼓衆氣武職官充之司射器官二掌辨弓力強弱分為三等驗人力強弱以授工部官職之舉爵者掌以馬湩授中者飲光祿寺官職之請射者掌定耦射射畢再請某耦射侍儀司職之待獲者掌矢納於司射器者以隸僕供其役執旗者六人掌於容後執五色旗如射者中的舉紅旗應之中采舉采旗應之偏西舉白旗偏東舉青旗過於鵠舉黃旗不及鵠舉黑旗軍士二人掌之引禮二掌引文武官進退侍儀司舍人職之太祖又以先王射禮久廢弧矢之事專習於武夫而文士多未解乃詔國學及郡縣生員皆令習射頒儀式於天下朔望則於公廨或閒地習之其官府學校射儀略倣大射之式而殺其禮射位初三十步自後纍加至九十步射四矢以二人為耦永樂時有擊毬射柳之制十一年五月五日幸東苑擊毬射柳聽文武羣臣四夷朝使及在京耆老聚觀分擊毬官為兩朋自皇太孫而下諸王大臣以次擊射賜中者幣布有差救日伐鼓洪武六年二月定救日食禮其日皇帝常服不御正殿中書省設香案百官朝服行禮鼓人伐鼓復圓乃止月食大都督府設香案百官常服行禮不伐鼓雨雪雲翳則免二十六年三月更定禮部設香案於露臺向日設金鼓於儀門內設樂於露臺下各官拜位於露臺上至期百官朝服入班樂作四拜興樂止跪執事者捧鼓班首擊鼓三聲衆鼓齊鳴候復圓復行四拜禮月食則百官便服於都督府救護如儀在外諸司日食則於布政使司府州縣月食則於都指揮使司衛所如儀隆慶六年大喪方成服遇日食百官先哭臨後赴禮部青素衣黑角帶向日四拜不用鼓樂
