body:
  text: 明史卷一百八十一列傳第六十九徐溥丘濬劉健謝遷李東陽王鏊劉忠徐溥字時用宜興人祖鑑瓊州知府有惠政溥景泰五年進士及第授編修憲宗初擢左庶子再遷太常卿兼學士成化十五年拜禮部右侍郎尋轉左久之改吏部孝宗嗣位兼文淵閣大學士參預機務旋進禮部尚書弘治五年劉吉罷溥為首輔屢加少傅太子太傅溥承劉吉恣睢之後鎮以安靜務守成法與同列劉健李東陽謝遷等協心輔治事有不可輒共爭之欽天監革職監正李華為昌國公張巒擇葬地中旨復官溥等言即位以來未嘗有內降幸門一開末流安底臣等不敢奉詔八年太皇太后召崇王來朝溥等與尚書倪嶽諫帝為請乃已占城奏安南侵擾帝欲遣大臣往解溥等言外國相侵有司檄諭之足矣無勞遣使萬一抗令則虧損國體問罪興師後患滋大於是罷不遣是年十二月詔撰三清樂章溥等言天至尊無對漢祀五帝儒者猶非之況三清乃道家妄說耳一天之上安得有三大帝且以周柱下史李耳當其一以人鬼列天神矯誣甚矣郊祀樂章皆太祖所親製今使製為時俗詞曲以享神明褻瀆尤甚臣等誦讀儒書邪說俚曲素所不習不敢以非道事陛下國家設文淵閣命學士居之誠欲其謨謀政事講論經史培養本原匡弼闕失非欲其阿諛順旨惟言莫違也今經筵早休日講久曠異端乘間而入此皆臣等無狀不足以啓聖心保初政憂愧之至無以自容數月以來奉中旨處分未當者封還執奏至再至三願陛下曲賜聽從俾臣等竭駑鈍少有裨益非但樂章一事而已奏入帝嘉納之帝自八年後視朝漸晏溥等屢以為言中官李廣以燒鍊齊醮寵十年二月溥等上疏極論曰舊制內殿日再進奏事重者不時上聞又常面召儒臣咨訪政事今奏事日止一次朝參之外不得一望天顏章奏批答不時斷決或稽留數月或竟不施行事多壅滯有妨政體經筵進講每歲不過數日正士疏遠邪說得行近聞有以齊醮修鍊之說進者宋徽宗崇道教科儀符籙最盛卒至乘輿播遷金石之藥性多酷烈唐憲宗信柳泌以殞身其禍可鑒今龍虎山上清宮神樂觀祖師殿及內府番經廠皆焚燬無餘彼如有靈何不自保天厭其穢亦已明甚陛下若親近儒臣明正道行仁政福祥善慶不召自至何假妖妄之說哉自古奸人蠱惑君心者必以太平無事為言唐臣李絳有云憂先於事可以無憂事至而憂無益於事今承平日久溺於晏安目前視之雖若無事然工役繁興科斂百出士馬罷敝閭閻困窮愁歎之聲上干和氣致熒惑失度太陽無光天鳴地震草木興妖四方奏報殆無虛月將來之患灼然可憂陛下高居九重言官皆畏罪緘默臣等若復不言誰肯為陛下言者帝感其言三月甲子御文華殿召見溥及劉健李東陽謝遷授以諸司題奏曰與先生輩議溥等擬旨上帝應手改定事端多者健請出外詳閲帝曰盍就此面議既畢賜茶而退自成化間憲宗召對彭時商輅後至此始再見舉朝詡為盛事然終溥在位亦止此一召而已尋以災異求言廷臣所上封事經月不報而言官論救何鼎忤旨待罪者久溥等皆以為言於是悉下諸章而罷諸言官弗問溥時年七十引年求退不許詔風雨寒暑免朝參十一年皇太子出閣加少師兼太子太師進華蓋殿大學士以目疾乞歸帝眷留久之乃許恩賚有加踰年卒贈太師諡文靖溥性凝重有度在內閣十二年從容輔導人有過誤輒為掩覆曰天生才甚難不忍以微瑕棄也屢遇大獄及逮繫言官委曲調劑孝宗仁厚多納溥等所言天下陰受其福嘗曰祖宗法度所以惠元元者備矣患不能守耳卒無所更置性至孝嘗再廬墓自奉甚薄好施豫置義田八百畝贍宗族請籍記於官以垂永久帝為復其徭役丘濬字仲深瓊山人幼孤母李氏教之讀書過目成誦家貧無書嘗走數百里借書必得乃已舉鄉試第一景泰五年成進士改庶吉士授編修濬既官翰林見聞益廣尤熟國家典故以經濟自負成化元年兩廣用兵濬奏記大學士李賢指陳形勢纚纚數千言賢善其計聞之帝命録示總兵官趙輔巡撫都御史韓雍雍等破賊雖不盡用其策而濬以此名重公卿間秩滿進侍講與修英宗實録進侍講學士續通鑑綱目成擢學士遷國子祭酒時經生文尚險怪濬主南畿鄉試分考會試皆痛抑之及是課國學生尤諄切告誡返文體於正尋進禮部右侍郎掌祭酒事濬以真德秀大學衍義於治國平天下條目未具乃博採羣書補之孝宗嗣位表上其書帝稱善賚金幣命所司刊行特進禮部尚書掌詹事府事修憲宗實録充副總裁弘治四年書成加太子太保尋命兼文淵閣大學士參預機務尚書入內閣者自濬始時年七十一矣濬以衍義補所載皆可見之行事請摘其要者奏聞下內閣議行之帝報可明年濬上言臣見成化時彗星三見遍掃三垣地五六百震邇者彗星見天津地震天鳴無虛日異鳥三鳴於禁中春秋二百四十年書彗孛者三地震者五飛禽者二今乃屢見於二十年之間甚可畏也願陛下體上天之仁愛念祖宗之艱難正身清心以立本而應務謹好尚不惑於異端節財用不至於耗國公任使不失於偏聽禁私謁明義理慎儉德勤政務則承風希寵左道亂政之徒自不敢肆其奸而天災弭矣因列時弊二十二事帝納之六年以目疾免朝參濬在位嘗以寬大啓上心忠厚變士習顧性褊隘嘗與劉健議事不合至投冠於地言官建白不當意輒面折之與王恕不相得至不交一言六年大計羣吏恕所奏罷二千人濬請未及三載者復任非貪暴有顯跡者勿斥留九十人恕爭之不得求去太醫院判劉文泰嘗往來濬家以失職訐恕恕疑文泰受濬指而言者譁然言疏稿出濬手恕竟坐罷人以是大不直濬給事中毛珵御史宋德周津等交章劾濬不可居相位帝不問踰年加少保八年卒年七十六贈太傅諡文莊濬廉介所居邸第極湫隘四十年不易性嗜學既老右目失明猶披覽不輟議論好矯激聞者駭愕至修英宗實録有言于謙之死當以不軌書者濬曰己巳之變微于公社稷危矣事久論定誣不可不白其持正又如此正德中以巡按御史言賜祠於鄉曰景賢劉健字希賢洛陽人父亮三原教諭有學行健少端重與同邑閻禹錫白良輔遊得河東薛瑄之傳舉天順四年進士改庶吉士授編修謝交遊鍵戶讀書人以木強目之然練習典故有經濟志成化初修英宗實録起之憂中固辭不許書成進修撰三遷至少詹事充東宮講官受知於孝宗既即位進禮部右侍郎兼翰林學士入內閣參預機務弘治四年進尚書兼文淵閣大學士纍加太子太保改武英殿十一年春進少傅兼太子太傅代徐溥為首輔健學問深粹正色敢言以身任天下之重清寧宮災太監李廣有罪自殺健與同列李東陽謝遷疏言古帝王未有不遇災而懼者向來奸佞熒惑聖聽賄賂公行賞罰失當災異之積正此之由今幸元惡殄喪聖心開悟而餘慝未除宿弊未革伏願奮發勵精進賢黜姦明示賞罰凡所當行斷在不疑毋更因循以貽後悔帝方嘉納其言而廣黨蔡昭等旋取旨豫廣祭葬祠額健等力諫僅寢祠額南北言官指陳時政頻有所論劾一切皆不問國子生江瑢劾健東陽杜抑言路帝慰留健東陽而下瑢於獄二人力救得釋十三年四月大同告警京師戒嚴兵部請甄別京營諸將帝召健及東陽遷至平臺面議去留乃去遂安伯陳韶等三人而召鎮遠侯顧溥督團營時帝視朝頗晏健等以為言頷之而已十四年秋帝以軍興缺餉屢下廷議健等言天下之財其生有限今光祿歲供增數十倍諸方織作務為新巧齊醮日費巨萬太倉所儲不足餉戰士而內府取入動四五十萬宗藩貴戚之求土田奪鹽利者亦數千萬計土木日興科斂不已傳奉冗官之俸薪內府工匠之餼廩歲增月積無有窮期財安得不匱今陝西遼東邊患方殷湖廣貴州軍旅繼動不知何以應之望陛下絶無益之費躬行節儉為中外倡而令羣臣得畢獻其誠講求革弊之策天下幸甚明年四月以災異陳勤朝講節財用罷齊醮公賞罰數事及冬南京鳳陽大水廷臣多上言時務久之不下健等因極陳怠政之失請勤聽斷以振紀綱帝皆嘉納大明會典成加少師兼太子太師吏部尚書華蓋殿大學士與東陽遷同賜蟒衣閣臣賜蟒自健等始帝孝事兩宮太后甚謹而兩宮皆好佛老先是清寧宮成命灌頂國師設壇慶讚又遣中官齎真武像建醮武當山使使詣泰山進神袍或白晝散燈市上帝重違太后意曲從之而健等諫甚力十五年六月詔擬釋迦啞塔像讚十七年二月詔建延壽塔朝陽門外除道士杜永祺等五人為真人皆以健等力諫得寢是年夏小王子謀犯大同帝召見閣臣健請簡京營大帥因言京軍怯不任戰請自今罷其役作以養鋭氣帝然之退復條上防邊事宜悉報允未幾邊警狎至帝惑中官苗逵言鋭欲出師健與東陽遷委曲阻之帝意猶未回兵部尚書劉大夏亦言京軍不可動乃止帝自十三年召對健等後閣臣希得進見及是在位久益明習政事數召見大臣欲以次革煩苛除宿弊嘗論及理財東陽極言鹽政弊壞由陳乞者衆因而私販數倍健進曰太祖時茶法始行駙馬歐陽倫以私販坐死高皇后不能救如倫事孰敢為陛下言者帝曰非不敢言不肯言耳遂詔戶部核利弊具議以聞當是時健等三人同心輔政竭情盡慮知無不言初或有從有不從既乃益見信所奏請無不納呼為先生而不名每進見帝輒屏左右左右間從屏間竊聽但聞帝數數稱善諸進退文武大臣釐飭屯田鹽馬諸政健翊贊為多未幾帝疾大漸召健等入乾清宮帝力疾起坐自即位始末甚詳令近侍書之已執健手曰先生輩輔導良苦東宮聰明但年尚幼好逸樂先生輩常勸之讀書輔為賢主健等欷歔頓首受命而出翌日帝崩武宗嗣位健等釐諸弊政凡孝宗所欲興罷者悉以遺詔行之劉瑾者東宮舊豎也與馬永成谷大用魏彬張永丘聚高鳳羅祥等八人俱用事時謂之八黨日導帝遊戲詔條率沮格不舉京師淫雨自六月至八月健等乃上言陛下登極詔出中外歡呼想望太平今兩月矣未聞汰冗員幾何省冗費幾何詔書所載徒為空文此陰陽所以失調雨暘所以不若也如監局倉庫城門及四方守備內臣增置數倍朝廷養軍匠費巨萬計僅足供其役使寧可不汰文武臣曠職僨事虛糜廩祿者寧可不黜畫史工匠濫授官職者多至數百人寧可不罷內承運庫纍歲支銀數百餘萬初無文簿司鑰庫貯錢數百萬未知有無寧可不勾校至如縱內苑珍禽奇獸放遣先朝宮人皆新政所當先而陛下悉牽制不行何以慰四海之望帝雖溫詔答之而左右宦豎日恣增益且日衆享祀郊廟帶刀被甲擁駕後內府諸監局僉書多者至百數十人光祿日供驟益數倍健等極陳其弊請勤政講學報聞而已正德元年二月帝從尚書韓文言畿甸皇莊令有司徵課而每莊仍留宦官一人校尉十人健等言皇莊既以進奉兩宮自宜悉委有司不當仍主以私人反失朝廷尊親之意因備言內臣管莊擾民不省吏戶兵三部及都察院各有疏爭職掌為近習所撓健等擬旨上不從令再擬健等力諫謂奸商談景清之沮壞鹽政北征將士之無功授官武臣神英之負罪玩法御用監書篆之濫收考較皆以一二人私恩壞百年定制況今政令維新而地震天鳴白虹貫日星晝見太陽無光內賊縱橫外寇猖獗財匱民窮怨謗交作而中外臣僕方且乘機作奸排忠直猶仇讐保奸回如骨肉日復一日愈甚於前禍變之來恐當不遠臣等受知先帝叨任腹心邇者旨從中下略不與聞有所擬議竟從改易似此之類不可悉舉若復顧惜身家共為阿順則罔上誤國死有餘辜所擬四疏不敢更易謹以原擬封進不報居數日又言臣等遭逢先帝臨終顧命惓惓以陛下為託痛心刻骨誓以死報即位詔書天下延頸而朝令夕改迄無寧日百官庶府倣效成風非惟廢格不行抑且變易殆盡建言者以為多言幹事者以為生事纍章執奏謂之瀆擾釐剔弊政謂之紛更憂在於民生國計則若罔聞知事涉於近幸貴戚則牢不可破臣等心知不可義當盡言比為鹽法賞功諸事極陳利害拱俟數日未蒙批答若以臣等言是宜賜施行所言如非即當斥責乃留中不報視之若無政出多門咎歸臣等宋儒朱子有言一日立乎其位則一日業乎其官一日不得乎其官則不敢一日立乎其位若冒顧命之名而不盡輔導之實既負先帝又負陛下天下後世其謂臣何伏乞聖明矜察特賜退休帝優旨慰留之疏仍不下越五日健等復上疏歷數政令十失指斥貴戚近幸尤切因再申前請帝不得已始下前疏命所司詳議健知志終不行首上章乞骸骨李東陽謝遷繼之帝皆不許既而所司議上一如健等指帝勉從之由是諸失利者咸切齒六月庚午復上言近日以來免朝太多奏事漸晚遊戲漸廣經筵日講直命停止臣等愚昧不知陛下宮中復有何事急於此者夫濫賞妄費非所以崇儉德彈射釣獵非所以養仁心鷹犬狐兔田野之物不可育於朝廷弓矢甲胄戰鬬之象不可施於宮禁今聖學久曠正人不親直言不聞不情不達而此數者雜交於前臣不勝憂懼帝曰朕聞帝王不能無過貴改過卿等言是朕當行之健等乃録廷臣所陳時政切要者請置坐隅朝夕省覽曰無單騎馳驅輕出宮禁曰無頻幸監局泛舟海子曰無事鷹犬彈射曰無納內侍進獻飲膳疏入報聞先是孝宗山陵畢健等即請開經筵帝初勉應之後數以朝謁兩宮停講或云擇日乘馬健等陳諫甚切至八月帝既大婚健等又請開講命俟九月至期又命停午講健等以先帝故事日再進講力爭不得當是時健等懇切疏諫者屢矣而帝以狎近羣小終不能改既而遣中官崔杲等督織造乞鹽萬二千引所司執奏給事中陶諧徐昂御史杜旻邵清楊儀等先後諫健等亦言不可帝召健等至暖閣面議頗有所詰問健等皆以正對帝不能難最後正色曰天下事豈皆內官所壞朝臣壞事者十常六七先生輩亦自知之因命鹽引悉如杲請健等退再上章言不可帝自愧失言乃俞健等所奏於是中外咸悅以帝庶幾改過健等遂謀去八黨連章請誅之言官亦交論羣閹罪狀健及遷東陽持其章甚力帝遣司禮詣閣曰朕且改矣其為朕曲赦若曹健等言此皆得罪祖宗非陛下所得赦復上言曰人君之於小人不知而誤用天下尚望其知而去之知而不去則小人愈肆君子愈危不至於亂亡不已且邪正不並立今舉朝欲決去此數人陛下又知其罪而故留之左右非特朝臣疑懼此數人亦不自安上下相猜中外不協禍亂之機始此矣不聽健等以去就爭瑾等八人窘甚相對涕泣而尚書韓文等疏復入於是帝命司禮王嶽等詣閣議一日三至欲安置瑾等南京遷欲遂誅之健推案哭曰先帝臨崩執老臣手付以大事今陵土未乾使若輩敗壞至此臣死何面目見先帝聲色俱厲嶽素剛正疾邪慨然曰閣議是其儕范亨徐智等亦以為然是夜八人益急環泣帝前帝怒立收嶽等下詔獄而健等不知方倚嶽內應明日韓文倡九卿伏闕固爭健逆謂曰事且濟公等第堅持頃之事大變八人皆宥不問而瑾掌司禮健遷遂乞致仕賜敕給驛歸月廩歲夫如故事健去瑾憾不已明年三月辛未詔列五十三人為奸黨榜示朝堂以健為首又二年削籍為民追奪誥命瑾誅復官致仕後聞帝數巡遊輒歎息不食曰吾負先帝世宗立命行人齎敕存問以司馬光文彥博為比賜賚有加及年躋九十詔撫臣就第致束帛餼羊上尊官其孫成學中書舍人嘉靖五年卒年九十四遺表數千言勸帝正身勤學親賢遠佞帝震悼賜恤甚厚贈太師諡文靖健器局嚴整正己率下朝退僚寀私謁不交一言許進輩七人欲推焦芳入吏部健曰老夫不久歸田此座即焦有恐諸公俱受其害耳後七人果為芳所擠東陽以詩文引後進海內士皆抵掌談文學健若不聞獨教人治經窮理其事業光明俊偉明世輔臣鮮有比者孫望之進士謝遷字于喬餘姚人成化十年鄉試第一明年舉進士復第一授修撰纍遷左庶子弘治元年春中官郭鏞請豫選妃嬪備六宮遷上言山陵未畢禮當有待祥禫之期歲亦不遠陛下富於春秋請俟諒陰既終徐議未晚尚書周洪謨等如遷議從之帝居東宮時遷已為講官及是與日講務積誠開帝意前夕必正衣冠習誦及進講敷詞詳切帝數稱善進少詹事兼侍講學士八年詔同李東陽入內閣參預機務遷時居憂力辭服除始拜命進詹事兼官如故皇太子出閣加太子少保兵部尚書兼東閣大學士上疏勸太子親賢遠佞勤學問戒逸豫帝嘉之尚書馬文升以大同邊警餉饋不足請加南方兩稅折銀遷曰先朝以南方賦重故折銀以寬之若復議加恐民不堪命且足國在節用用度無節雖加賦奚益尚書倪嶽亦爭之議遂寢孝宗晚年慨然欲釐弊政而內府諸庫及倉場馬坊中官作奸骫法不可究詰御馬監騰驤四衛勇士自以禁軍不隸兵部率空名支餉其弊尤甚遷乘間言之帝令擬旨禁約遷曰虛言設禁無益宜令曹司搜剔弊端明白奏聞然後嚴立條約有犯必誅庶積蠹可去帝俞允之遷儀觀俊偉秉節直亮與劉健李東陽同輔政而遷見事明敏善持論時人為之語曰李公謀劉公斷謝公尤侃侃天下稱賢相武宗嗣位屢加少傅兼太子太傅數諫帝弗聽因天變求去甚力帝輒慰留及請誅劉瑾不克遂與健同致仕歸禮數俱如健而瑾怨遷未已焦芳既附瑾入內閣亦憾遷嘗舉王鏊吳寬自代不及己乃取中旨勒罷其弟兵部主事迪斥其子編修丕為民四年二月以浙江應詔所舉懷才抱德士餘姚周禮徐子元許龍上虞徐文彪皆遷同鄉而草詔由健欲因此為二人罪矯旨謂餘姚隱士何多此必徇私援引下禮等詔獄詞連健遷瑾欲逮健遷籍其家東陽力解芳從旁厲聲曰縱輕貸亦當除名旨下如芳言禮等咸戍邊尚書劉宇復劾兩司以上訪舉失實坐罰米有削籍者且詔自今餘姚人毋選京官著為令其年十二月言官希瑾指請奪健遷及尚書馬文升劉大夏韓文許進等誥命詔並追還所賜玉帶服物同時奪誥命者六百七十五人當是時人皆為遷危而遷與客圍棋賦詩自若瑾誅復職致仕世宗即位遣使存問起迪參議丕復官翰林遷乃遣子正入謝勸帝勤學法祖納諫優旨答之嘉靖二年復詔有司存問六年大學士費宏舉遷自代楊一清欲阻張璁亦力舉遷帝乃遣行人齎手敕即家起之命撫按官敦促上道遷年七十九矣不得已拜命比至而璁已入閣一清以官尊於遷無相下意遷居位數月力求去帝待遷愈厚以天寒免朝參除夕賜御製詩及以病告則遣醫賜藥餌光祿致酒餼使者相望於道遷竟以次年三月辭歸十年卒於家年八十有三贈太傅諡文正迪仕至廣東布政使丕鄉試第一弘治末進士及第歷官吏部左侍郎贈禮部尚書李東陽字賓之茶陵人以戍籍居京師四歲能作徑尺書景帝召試之甚喜抱置膝上賜果鈔後兩召講尚書大義稱旨命入京學天順八年年十八成進士選庶吉士授編修纍遷侍講學士充東宮講官弘治四年憲宗實録成由左庶子兼侍講學士進太常少卿兼官如故五年旱災求言東陽條摘孟子七篇大義附以時政得失纍數千言上之帝稱善閣臣徐溥等以詔敕繁請如先朝王直故事設官專領乃擢東陽禮部右侍郎兼侍讀學士入內閣專典誥敕八年以本官直文淵閣參預機務與謝遷同日登用久之進太子少保禮部尚書兼文淵閣大學士十七年重建闕里廟成奉命往祭還上疏言臣奉使遄行適遇亢旱天津一路夏麥已枯秋禾未種挽舟者無完衣荷鋤者有菜色盜賊縱橫青州尤甚南來人言江南浙東流亡載道戶口消耗軍伍空虛庫無旬日之儲官缺纍歲之俸東南財賦所出一歲之饑已至於此北地呰窳素無積聚今秋再歉何以堪之事變之生恐不可測臣自非經過其地則雖久處官曹日理章疏猶不得其詳況陛下高居九重之上耶臣訪之道路皆言冗食太衆國用無經差役頻煩科派重疊京城土木繁興供役軍士財力交殫每遇班操寧死不赴勢家巨族田連郡縣猶請乞不已親王之藩供億至二三十萬游手之徒託名皇親僕從每於關津都會大張市肆網羅商稅國家建都於北仰給東南商賈驚散大非細故更有織造內官縱羣小掊擊閘河官吏莫不奔駭鬻販窮民所在騷然此又臣所目擊者夫閭閻之情郡縣不得而知也郡縣之情廟堂不得而知也廟堂之情九重亦不得而知也始於容隱成於蒙蔽容隱之端甚小蒙蔽之禍甚深臣在山東伏聞陛下以災異屢見敕羣臣盡言無諱然詔旨頻降章疏畢陳而事關內廷貴戚者動為掣肘纍歲經時俱見遏罷誠恐今日所言又為虛文乞取從前內外條奏詳加採擇斷在必行帝嘉歎悉付所司是時帝數召閣臣面議政事東陽與首輔劉健等竭心獻納時政闕失必盡言極諫東陽工古文閣中疏草多屬之疏出天下傳誦明年與劉健謝遷同受顧命武宗立屢加少傅兼太子太傅劉瑾入司禮東陽與健遷即日辭位中旨去健遷而東陽獨留恥之再疏懇請不許初健遷持議欲誅瑾詞甚厲惟東陽少緩故獨留健遷瀕行東陽祖餞泣下健正色曰何泣為使當日力爭與我輩同去矣東陽默然瑾既得志務摧抑縉紳而焦芳入閣助之虐老臣忠直士放逐殆盡東陽悒悒不得志亦委蛇避禍而焦芳嫉其位己上日夕搆之瑾先是東陽奉命編通鑑纂要既成瑾令人摘筆畫小疵除謄録官數人名欲因以及東陽東陽大窘屬芳與張綵為解乃已瑾凶暴日甚無所不訕侮於東陽猶陽禮敬凡瑾所為亂政東陽彌縫其間亦多所補救尚寶卿崔璿副使姚祥郎中張瑋以違制乘肩輿從者妄索驛馬給事中安奎御史張彧以核邊餉失瑾意皆荷重校幾死東陽力救璿等謫戍奎彧釋為民三年六月壬辰朝退有遺匿名書於御道數瑾罪者詔百官悉跪奉天門外頃之執庶僚三百餘人下詔獄次日東陽等力救會瑾亦廉知其同類所為衆獲宥後數日東陽疏言寬恤數事章下所司既而戶部覆奏言糧草虧折自有專司巡撫官總領大綱宜從輕減瑾大怒矯旨詰責數百言中外駭歎瑾患盜賊日滋欲戍其家屬並鄰里及為之囊橐者或自陳獲盜七十人所司欲以新例從事東陽言如是則百年之案皆可追論也乃免劉健謝遷劉大夏楊一清及平江伯陳熊輩幾得危禍皆賴東陽而解其潛移默奪保全善類天下陰受其庇而氣節之士多非之侍郎羅上書勸其早退至請削門生籍東陽得書俯首長歎而已焦芳既與中人為一王鏊雖持正不能與瑾抗東陽乃援楊廷和共事差倚以自強已而鏊辭位代者劉宇曹元皆瑾黨東陽勢益孤東陽前已加少師兼太子太師後瑾欲加芳官詔東陽食正一品祿四年五月孝宗實録成編纂諸臣當序遷所司援會典故事詔以劉健等前纂修會典多糜費皆奪升職東陽亦坐降俸居數日乃以實録功復之五年春久旱下詔恤刑東陽等因上詔書所未及者數條帝悉從之而法司畏瑾減死者止二人其秋瑾誅東陽乃上疏自列曰臣備員禁近與瑾職掌相關凡調旨撰敕或被駁再三或徑自改竄或持回私室假手他人或遞出謄黃逼令落真假混淆無從別白臣雖委曲匡持期於少濟而因循隱忍所損亦多理宜黜罷帝慰留之置鐇平加特進左柱國廕一子尚寶司丞為御史張芹所劾帝怒奪芹俸東陽亦乞休辭廕不許時焦芳曹元已罷而劉忠梁儲入政事一新然張永魏彬馬永成谷大用等猶用事帝嬉遊如故皇子未生多居宿於外又議大興豹房之役建寺觀禁中東陽等憂之前後上章切諫不報七年東陽等以京師及山西陝西雲南福建相繼地震而帝講筵不舉視朝久曠宗社祭享不親禁門出入無度谷大用仍開西廠屢上疏極諫帝亦終不聽九載秩滿兼支大學士俸河南賊平廕子世錦衣千戶再疏力辭改廕六品文官其冬帝欲調宣府軍三千入衛而以京軍更番戍邊東陽等力持不可大臣臺諫皆以為言中官旁午索草敕帝坐乾清宮門趣之東陽等終不奉詔明日竟出內降行之江彬等遂以邊兵入豹房矣東陽以老疾乞休前後章數上至是始許賜敕給廩隸如故事又四年卒年七十贈太師諡文正東陽事父淳有孝行初官翰林時常飲酒至夜深父不就寢忍寒待其歸自此終身不夜飲於外為文典雅流麗朝廷大著作多出其手工篆隸書碑版篇翰流播四裔奬成後進推挽才彥學士大夫出其門者悉粲然有所成就自明興以來宰臣以文章領袖縉紳者楊士奇後東陽而已立朝五十年清節不渝既罷政居家請詩文書篆者填塞戶限頗資以給朝夕一日夫人方進紙墨東陽有倦色夫人笑曰今日設客可使案無魚菜耶乃欣然命筆移時而罷其風操如此王鏊字濟之吳人父琬光化知縣鏊年十六隨父讀書國子監諸生爭傳誦其文侍郎葉盛提學御史陳選奇之稱為天下士成化十年鄉試明年會試俱第一廷試第三授編修杜門讀書避遠權勢弘治初遷侍講學士充講官中貴李廣導帝遊西苑鏊講文王不敢盤於遊田反覆規切帝為動容講罷謂廣曰講官指若曹耳壽寧侯張巒故與鏊有連及巒貴鏊絶不與通東宮出閣大臣請選正人為宮僚鏊以本官兼諭德尋轉少詹事擢吏部右侍郎嘗奏陳邊計略言昨火篩入寇大同陛下宵旰不寧而緣邊諸將皆嬰城守無一人敢當其鋒者此臣所不解也臣竊謂今日火篩小王子不足畏而嬖幸亂政功罪不明委任不專法令不行邊圉空虛深可畏也比年邊將失律往往令戴罪殺賊副總兵姚信擁兵不進亦得逃罪此人心所以日懈士氣所以不振也望陛下大奮乾剛時召大臣咨詢邊將勇怯有罪必罰有功必賞專主將之權起致仕尚書秦紘為總制節制諸邊提督右都御史史琳坐鎮京營遙為聲援厚恤沿邊死事之家召募邊方驍勇之士用間以攜其部曲分兵掩擊出奇制勝寇必不敢長驅深入從之又言宜倣前代制科如博學宏詞之類以收異材六年一舉尤異者授以清要之職有官者加秩數年之後士類濯磨必以通經學古為高脫去謏聞之陋時不能用尋以父憂歸正德元年四月起左侍郎與韓文諸大臣請誅劉瑾等八黨俄瑾入司禮大學士劉健謝遷相繼去內閣止李東陽一人瑾欲引焦芳廷議獨推鏊瑾迫公論命以本官兼學士與芳同入內閣踰月進戶部尚書文淵閣大學士明年加少傅兼太子太傅景帝汪后薨疑其禮鏊曰妃廢不以罪宜復故號葬以妃祭以后乃命輟朝致祭如制憲宗廢后吳氏之喪瑾議欲焚之以滅迹曰不可以成服鏊曰服可以不成葬不可薄也從之尚寶卿崔璿等三人荷校幾死鏊謂瑾曰士可殺不可辱今辱且殺之吾尚何顏居此李東陽亦力救璿等得遣戍瑾銜尚書韓文必欲殺之又欲以他事中健遷鏊前後力救得免或惡楊一清於瑾謂築邊牆糜費鏊爭曰一清為國修邊安得以功為罪瑾怒劉大夏逮至京欲坐以激變罪死鏊爭曰岑猛但遷延不行耳未叛何名激變時中外大權悉歸瑾鏊初開誠與言間聽納而芳專媕阿瑾橫彌甚禍流縉紳鏊不能救力求去四年疏三上許之賜璽書乘傳有司給廩隸咸如故事家居十四年廷臣交薦不起世宗即位遣行人存問鏊疏謝因上講學親政二篇帝優詔報聞官一子中書舍人嘉靖三年復詔有司存問未幾卒年七十五贈太傅諡文恪鏊博學有識鑒文章爾雅議論明暢晚著性善論一篇王守仁見之曰王公深造世未能盡也少善制舉義後數典鄉試程文魁一代取士尚經術險詭者一切屏去弘正間文體為一變劉忠字司直陳留人成化十四年進士改庶吉士授編修弘治四年憲宗實録成遷侍講直經筵尋兼侍東宮講讀又九年進侍讀學士武宗即位以宮寮擢學士掌翰林院仍直經筵正德二年劉瑾用事日導帝遊戲亂祖宗舊章忠上言戒逸遊崇正學數事已因進講與楊廷和傅經義規帝闕失而指斥近幸尤切帝謂瑾曰經筵講書耳浮詞何為瑾素惡兩人因諷吏部尚書許進出之南京南京諸部惟右侍郎一人進特請用為禮部左侍郎命下外議籍籍進患之甫兩月即擢忠本部尚書其冬就改吏部時留都一御史素驕橫一郎中張綵所昵也秩滿皆署下考疾吏胥詭名寄籍督諸曹核汰千人大計京官所黜多於前又疏請不時糾劾以示勸懲無待六年考黜詔可之忠在南京正直有風采然是時瑾方以嚴苛折辱士大夫而忠操繩墨待下糾劾過峻時論遂謂忠附會瑾意頗歸怨焉五年二月改吏部尚書兼翰林學士專典制詔兩疏乞休不報瑾誅以本官兼文淵閣大學士入閣預機務甫數日以平寧夏功加少傅兼太子太傅故事閣臣加官無遽至三孤者忠無功驟得不自安連疏固辭不許瑾雖誅張永魏彬輩擅政大臣復爭與交歡忠獨無所顧永嘗遣廖鵬謁忠忠僕隸遇之又却其餽由是與永輩左前後乞休疏七八上皆慰留明年命典會試甫畢帝以試録文義多舛召李東陽示之忠知為中官所掎乞省墓詔乘傳還抵家再上章乞致仕報許給月廩歲隸終其身世宗即位屢薦不起遣行人存問忠奏謝因有所獻納帝褒其忠愛嘉靖二年卒年七十二贈太保諡文肅贊曰徐溥以寬厚著丘濬以博綜聞觀其指事陳言懇懇焉為憂盛危明之計可謂勤矣劉健謝遷正色直道蹇蹇匪躬閹豎亂政秉義固諍志雖不就而剛嚴之節始終不渝有明賢宰輔自三楊外前有彭商後稱劉謝庶乎以道事君者歟李東陽以依違蒙詬然善類賴以扶持所全不少大臣同國休戚非可以決去為高遠蹈為潔顧其志何如耳王鏊劉忠持正不阿奉身早退此誠明去就之節烏能委蛇俯仰以為容悅哉
