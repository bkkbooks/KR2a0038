body:
  text: 明史卷九十五志第七十一刑法三刑法有創之自明不衷古制者廷杖東西廠錦衣衛鎮撫司獄是已是數者殺人至慘而不麗於法踵而行之至末造而極舉朝野命一聽之武夫宦豎之手良可歎也太祖常與侍臣論待大臣禮太史令劉基曰古者公卿有罪盤水加劍詣請室自裁未嘗輕折辱之所以存大臣之體侍讀學士詹同因取大戴禮及賈誼疏以進且曰古者刑不上大夫以勵廉恥也必如是君臣恩禮始兩盡帝深然之洪武六年工部尚書王肅坐法當笞太祖曰六卿貴重不宜以細故辱命以俸贖罪後羣臣罣誤許以俸贖始此然永嘉侯朱亮祖父子皆鞭死工部尚書薛祥斃杖下故上書者以大臣當誅不宜加辱為言廷杖之刑亦自太祖始矣宣德三年怒御史嚴皚方鼎何傑等沈湎酒色久不朝參命枷以徇自此言官有荷校者至正統中王振擅權尚書劉中敷侍郎吳璽陳瑺祭酒李時勉率受此辱而殿陛行杖習為故事矣成化十五年汪直誣陷侍郎馬文升都御史牟俸等詔責給事御史李俊王濬輩五十六人容隱廷杖人二十正德十四年以諫止南巡廷杖舒芬黃鞏等百四十六人死者十一人嘉靖三年羣臣爭大禮廷杖豐熙等百三十四人死者十六人中年刑法益峻雖大臣不免笞辱宣大總督翟鵬薊州巡撫朱方以撤防早宣大總督郭宗皋大同巡撫陳耀以寇入大同刑部侍郎彭黯左都御史屠僑大理卿沈良才以議丁汝夔獄緩戎政侍郎蔣應奎左通政唐國相以子弟冒功皆逮杖之方耀斃於杖下而黯僑良才等杖畢趣治事公卿之辱前此未有又因正旦朝賀怒六科給事中張思靜等皆朝服豫杖天下莫不駭然四十餘年間杖殺朝士倍蓰前代萬曆五年以爭張居正奪情杖吳中行等五人其後盧洪春孟養浩王德完輩咸被杖多者至一百後帝益厭言者疏多留中廷杖寢不用天啓時太監王體乾奉敕大審重笞戚畹李承恩以悅魏忠賢於是萬燝吳裕中斃於杖下臺省力爭不得閣臣葉向高言數十年不行之敝政三見於旬日萬萬不可再行忠賢乃罷廷杖而以所欲殺者悉下鎮撫司士大夫益無噍類矣南京行杖始於成化十八年南御史李珊等以歲祲請振帝摘其疏中訛字令錦衣衛詣南京午門前人杖二十守備太監監之至正德間南御史李熙劾貪吏觸怒劉瑾矯旨杖三十時南京禁衛久不行刑選卒習數日乃杖之幾斃東廠之設始於成祖錦衣衛之獄太祖嘗用之後已禁止其復用亦自永樂時廠與衛相倚故言者並稱廠衛初成祖起北平刺探宮中事多以建文帝左右為耳目故即位後專倚宦官立東廠於東安門北令嬖昵者提督之緝訪謀逆妖言大奸惡等與錦衣衛均權勢蓋遷都後事也然衛指揮紀綱門達等大幸更迭用事廠權不能如至憲宗時尚銘領東廠又別設西廠刺事以汪直督之所領緹騎倍東廠自京師及天下旁午偵事雖王府不免直中廢復用先後凡六年冤死者相屬勢遠出衛上會直數出邊監軍大學士萬安乃言太宗建北京命錦衣官校緝訪猶恐外官徇情故設東廠令內臣提督行五六十年事有定規往者妖狐夜出人心驚惶感勞聖慮添設西廠特命直督緝用戒不虞所以權一時之宜慰安人心也向所紛擾臣不贅言今直鎮大同京城衆口一辭皆以革去西廠為便伏望聖恩特旨革罷官校悉回原衛宗社幸甚帝從之尚銘專用事未幾亦黜弘治元年員外郎張倫請廢東廠不報然孝宗仁厚廠衛無敢橫司廠者羅祥楊鵬奉職而已正德元年殺東廠太監王嶽命丘聚代之又設西廠以命谷大用皆劉瑾黨也兩廠爭用事遣邏卒刺事四方南康吳登顯等戲競渡龍舟身死家籍遠州僻壤見鮮衣怒馬作京師語者轉相避匿有司聞風密行賄賂於是無賴子乘機為奸天下皆重足立而衛使石文義亦瑾私人廠衛之勢合矣瑾又改惜薪司外薪廠為辦事廠榮府舊倉地為內辦事廠自領之京師謂之內行廠雖東西廠皆在伺察中加酷烈焉且創例罪無輕重皆決杖永遠戍邊或枷項發遣枷重至百五十斤不數日輒死尚寶卿顧璿副使姚祥工部郎張瑋御史王時中輩並不免瀕死而後謫戍御史柴文顯汪澄以微罪至凌遲官吏軍民非法死者數千瑾誅西廠內行廠俱革獨東廠如故張鋭領之與衛使錢寧並以緝事恣羅織廠衛之稱由此著也嘉靖二年東廠芮景賢任千戶陶淳多所誣陷給事中劉最執奏謫判廣德州御史黃德用使乘傳往會有顏如環者同行以黃袱裹裝景賢即奏逮下獄最等編戍有差給事中劉濟言最罪不至戍且緝執於宦寺之門鍛鍊於武夫之手裁決於內降之旨何以示天下不報是時盡罷天下鎮守太監而大臣狃故事謂東廠祖宗所設不可廢不知非太祖制也然世宗馭中官嚴不敢恣廠權不及衛使陸炳遠矣萬曆初馮保以司禮兼廠事建廠東上北門之北曰內廠而以初建者為外廠保與張居正興王大臣獄欲族高拱衛使朱希孝力持之拱得無罪衛猶不大附廠也中年礦稅使數出為害而東廠張誠孫暹陳矩皆恬靜矩治妖書獄無株濫時頗稱之會帝亦無意刻核刑罰用稀廠衛獄中至生青草及天啓時魏忠賢以秉筆領廠事用衛使田爾耕鎮撫許顯純之徒專以酷虐鉗中外而廠衛之毒極矣凡中官掌司禮監印者其屬稱之曰宗主而督東廠者曰督主東廠之屬無專官掌刑千戶一理刑百戶一亦謂之貼刑皆衛官其隸役悉取給於衛最輕黠狷巧者乃撥充之役長曰檔頭帽上鋭衣青素褶繫小絛白皮靴專主伺察其下番子數人為幹事京師亡命誆財挾讐視幹事者為窟穴得一陰事由之以密白於檔頭檔頭視其事大小先豫之金事曰起數金曰買起數既得事帥番子至所犯家左右坐曰打樁番子即突入執訊之無有左證符牒賄如數徑去少不如意搒治之名曰乾醡酒亦曰搬罾兒痛楚十倍官刑且授意使牽有力者有力者豫多金即無事或靳不豫豫不足立聞上下鎮撫司獄立死矣每月旦廠役數百人掣簽庭中分瞰官府其視中府諸處會審大獄北鎮撫司考訊重犯者曰聽記他官府及各城門訪緝曰坐記某官行某事某城門得某奸胥吏疏白坐記者上之廠曰打事件至東華門雖夤夜投隙中以入即屏人達至尊以故事無大小天子皆得聞之家人米鹽猥事宮中或傳為笑謔上下惴惴無不畏打事件者衛之法亦如廠然須具疏乃得上聞以此其勢不及廠遠甚有四人夜飲密室一人酒酣謾罵魏忠賢其三人噤不敢出聲罵未訖番人攝四人至忠賢所即磔罵者而勞三人金三人者魄喪不敢動莊烈帝即位忠賢伏誅而王體乾王永祚鄭之惠李承芳曹化淳王德化王之心王化民齊本正等相繼領廠事告密之風未嘗息也之心化淳緝奸功廕弟姪錦衣衛百戶而德化及東廠理刑吳道正等偵閣臣薛國觀陰事國觀由此死時衛使懾廠威已久大抵俯首為所用崇禎十五年御史楊仁願言高皇帝設官無所謂緝事衙門者臣下不法言官直糾之無陰訐也後以肅清輦轂乃建東廠臣待罪南城所閲詞訟多以假番故訴冤夫假稱東廠害猶如此況其真乎此由積重之勢然也所謂積重之勢者功令比較事件番役每懸價以買事件受買者至誘人為奸盜而賣之番役不問其從來誘者分利去矣挾忿首告誣以重法挾者志無不逞矣伏願寬東廠事件而後東廠之比較可緩東廠之比較緩而後番役之買事件與賣事件者俱可息積重之勢庶幾可稍輕後復切言緹騎不當遣帝為諭東廠言所緝止謀逆亂倫其作奸犯科自有司存不宜緝並戒錦衣校尉之橫索者然帝倚廠衛益甚至國亡乃已錦衣衛獄者世所稱詔獄也古者獄訟掌於司寇而已漢武帝始置詔獄二十六所歷代因革不常五代唐明宗設侍衛親軍馬步軍都指揮使乃天子自將之名至漢有侍衛司獄凡大事皆決焉明錦衣衛獄近之幽縶慘酷害無甚於此者太祖時天下重罪逮至京者收繫獄中數更大獄多使斷治所誅殺為多後悉焚衛刑具以囚送刑部審理二十六年申明其禁詔內外獄毋得上錦衣衛大小咸經法司成祖幸紀綱令治錦衣親兵復典詔獄綱遂用其黨莊敬袁江王謙李春等緣借作奸數百千端久之族綱而錦衣典詔獄如故廢洪武詔不用矣英宗初理衛事者劉勉徐恭皆謹飭而王振用指揮馬順流毒天下枷李時勉殺劉球皆順為之景帝初有言官校緝事之弊者帝切責其長令所緝送法司有誣罔者重罪英宗復辟召李賢屏左右問時政得失賢因極論官校提人之害帝然其言陰察皆實乃召其長戒之已緝弋陽王敗倫事虛復申戒之而是時指揮門達鎮撫逯杲怙寵賢亦為羅織者數矣達遣旗校四出杲又立程督併以獲多為主千戶黃麟之廣西執御史吳禎至索獄具二百餘副天下朝覲官陷罪者甚衆杲死達兼治鎮撫司搆指揮使袁彬繫訊之五毒更下僅免朝官楊璡李蕃韓祺李觀包瑛張祚程萬鍾輩皆鋃鐺就逮冤號道路者不可勝記蓋自紀綱誅其徒稍戢至正統時復張天順之末禍益熾朝野相顧不自保李賢雖極言之不能救也鎮撫司職理獄訟初止立一司與外衛等洪武十五年添設北司而以軍匠諸職掌屬之南鎮撫司於是北司專理詔獄然大獄經訊即送法司擬罪未嘗具獄詞成化元年始令覆奏用參語法司益掣肘十四年增鑄北司印信一切刑獄毋關白本衛即衛所行下者亦徑自上請可否衛使毋得與聞故鎮撫職卑而其權日重初衛獄附衛治至門達掌問刑又於城西設獄舍拘繫狼籍達敗用御史呂洪言毀之成化十年都御史李賓言錦衣鎮撫司纍獲妖書圖本皆誕妄不經之言小民無知輒被幻惑乞備録其書名目榜示天下使知畏避免陷刑辟報可緝事者誣告猶不止十三年捕寧晉人王鳳等誣與瞽者受妖書署僞職並誣其鄉官知縣薛方通判曹鼎與通謀發卒圍其家搒掠誣伏方鼎家人數聲冤下法司驗得實坐妄報妖言當斬帝戒以不得戕害無辜而已不能罪也是年令錦衣衛副千戶吳綬於鎮撫司同問刑綬性狡險附汪直以進後知公議不容凡文臣非罪下獄者不復加箠楚忤直意黜去是時惟衛使朱驥持法平治妖人獄無冤者詔獄下所司獨用小杖嘗命中使詰責不為改世以是稱之弘治十三年詔法司凡廠衛所送囚犯從公審究有枉即與辨理勿拘成案正德時衛使石文義與張綵表𩹉作威福時稱為劉瑾左右翼然文義常侍瑾不治事治事者高得林瑾誅文義伏誅得林亦罷其後錢寧管事復大恣以叛誅世宗立革錦衣傳奉官十六汰旗校十五復諭緝事官校惟察不軌妖言人命強盜重事他詞訟及在外州縣事毋得與未幾事多下鎮撫鎮撫結內侍多巧中會太監崔文奸利事發下刑部尋以中旨送鎮撫司尚書林俊言祖宗朝以刑獄付法司事無大小皆聽平鞫自劉瑾錢寧用事專任鎮撫司文致冤獄法紀大壞更化善治在今日不宜復以小事撓法不聽俊復言此途一開恐後有重情即夤緣內降以圖免實長亂階御史曹懷亦諫曰朝廷專任一鎮撫法司可以空曹刑官為冗員矣帝俱不聽六年侍郎張璁等言祖宗設三法司以糾官邪平獄訟設東廠錦衣衛以緝盜賊詰奸宄自今貪官冤獄仍責法司其有徇情曲法乃聽廠衛覺察盜賊奸宄仍責廠衛亦必送法司擬罪詔如議行然官校提人恣如故給事中蔡經等論其害願罷勿遣尚書胡世寧請從其議詹事霍韜亦言刑獄付三法司足矣錦衣衛復橫撓之昔漢光武尚名節宋太祖刑法不加衣冠其後忠義之徒爭死效節夫士大夫有罪下刑曹辱矣有重罪廢之誅之可也乃使官校衆執之脫冠裳就桎梏朝列清班暮幽犴獄剛心壯氣銷折殆盡及覆案非罪即冠帶立朝班武夫捍卒指目之曰某吾辱之某吾繫執之小人無所忌憚君子遂致易行此豪傑所以興山林之思而變故罕仗節之士也願自今東廠勿與朝儀錦衣衛勿典刑獄士大夫罪謫廢誅勿加笞杖鎖梏以養廉恥振人心勵士節帝以韜出位妄言不納祖制凡朝會廠衛率屬及校尉五百名列侍奉天門下糾儀凡失儀者即褫衣冠執下鎮撫司獄杖之乃免故韜言及之逮萬曆時失儀者始不付獄罰俸而已世宗銜張鶴齡延齡奸人劉東山等乃誣二人毒魘呪詛帝大怒下詔獄東山因株引素所不快者衛使王佐探得其情論以誣罔法反坐佐乃枷東山等闕門外不及旬悉死人以佐比牟斌牟斌者弘治中指揮也李夢陽論延齡兄弟不法事下獄斌傅輕比得不死云世宗中年衛使陸炳為忮與嚴嵩比而傾夏言然帝數興大獄而炳多保全之故士大夫不疾炳萬曆中建言及忤礦稅璫者輒下詔獄刑科給事中楊應文言監司守令及齊民被逮者百五十餘人雖已打問未送法司獄禁森嚴水火不入疫癘之氣充斥囹圄衛使駱思恭亦言熱審歲舉俱在小滿前今二年不行鎮撫司監犯且二百多拋瓦聲冤鎮撫司陸逵亦言獄囚怨恨有持刀斷指者俱不報然是時告訐風衰大臣被録者寡其末年稍寬逮繫諸臣而錦衣獄漸清矣田爾耕許顯純在熹宗時為魏忠賢義子其黨孫雲鶴楊寰崔應元佐之拷楊漣左光斗輩坐贓比較立限嚴督之兩日為一限輸金不中程者受全刑全刑者曰械曰鐐曰棍曰拶曰夾棍五毒備具呼謈聲沸然血肉潰爛宛轉求死不得顯純叱咤自若然必伺忠賢旨忠賢所遣聽記者未至不敢訊也一夕令諸囚分舍宿於是獄卒曰今夕有當壁挺者壁挺獄中言死也明日漣死光斗等次第皆鎖頭拉死每一人死停數日葦席裹尸出牢戶蟲蛆腐體獄中事祕其家人或不知死日莊烈帝擒戮逆黨冤死家子弟望獄門稽顙哀號為文以祭帝聞之惻然自劉瑾創立枷錦衣獄常用之神宗時御史朱應轂具言其慘請除之不聽至忠賢益為大枷又設斷脊墮指刺心之刑莊烈帝問左右立枷何為王體乾對曰以罪巨奸大憝耳帝愀然曰雖如此終可憫忠賢為頸縮東廠之禍至忠賢而極然廠衛未有不相結者獄情輕重廠能得於內而外廷有扞格者衛則東西兩司房訪緝之北司拷問之鍛鍊周內始送法司即東廠所獲亦必移鎮撫再鞫而後刑部得擬其罪故廠勢強則衛附之廠勢稍弱則衛反氣凌其上陸炳緝司禮李彬東廠馬廣陰事皆至死以炳得內閣嵩意及後中官愈重閣勢日輕閣臣反比廠為之下而衛使無不競趨廠門甘為役隸矣錦衣衛升授勳衛任子科目功升凡四途嘉靖以前文臣子弟多不屑就萬曆初劉守有以名臣子掌衛其後皆樂居之士大夫與往還獄急時頗賴其力守有子承禧及吳孟明其著者也莊烈帝疑羣下王德化掌東廠以慘刻輔之孟明掌衛印時有縱舍然觀望廠意不敢違而鎮撫梁清宏喬可用朋比為惡凡縉紳之門必有數人往來踪跡故常晏起早闔毋敢偶語旗校過門如被大盜官為囊橐均分其利京城中奸細潛入傭夫販子陰為流賊所遣無一舉發而高門富豪局蹐無寧居其徒黠者恣行請託稍拂其意飛誣立搆摘竿牘片字株連至十數人姜埰熊開元下獄帝諭掌衛駱養性潛殺之養性泄上語且言二臣當死宜付所司書其罪使天下明知若陰使臣殺之天下後世謂陛下何如主會大臣多為埰等言遂得長繫此養性之可稱者然他事肆虐亦多矣錦衣舊例有功賞惟緝不軌者當之其後冒濫無紀所報百無一實吏民重困而廠衛題請輒從隆慶初給事中歐陽一敬極言其弊言緝事員役其勢易逞而又各類計所獲功次以為升授則憑可逞之勢邀必獲之功枉人利己何所不至有盜經出首幸免故令多引平民以充數者有括家囊為盜贓挾市豪以為證者有潛搆圖書懷挾僞批用妖言假印之律相誣陷者或姓名相類朦朧見收父訴子孝坐以忤逆所以被訪之家諺稱為剗毒害可知矣乞自今定制機密重情事干憲典者廠衛如故題請其情罪不明未經讞審必待法司詳擬成獄之後方與紀功仍敕兵刑二部勘問明白請旨升賞或經緝拿未成獄者不得虛冒比擬及他詞訟不得概涉以侵有司之事如獄未成而官校及鎮撫司拷打傷重或至死者許法司參治法司容隱扶同則聽科臣並參如此則功必覆實訪必當事而刑無冤濫時不能用也內官同法司録囚始於正統六年命何文淵王文審行在疑獄敕同內官興安周忱郭瑾往南京敕亦如之時雖未定五年大審之制而南北內官得與三法司刑獄矣景泰六年命太監王誠會三法司審録在京刑獄不及南京者因災創舉也成化八年命司禮太監王高少監宋文毅兩京會審而各省恤刑之差亦以是歲而定十七年辛卯命太監懷恩同法司録囚其後審録必以丙辛之歲弘治九年不遣內官十三年以給事中丘俊言復命會審凡大審録齎敕張黃蓋於大理寺為三尺壇中坐三法司左右坐御史郎中以下捧牘立唯諾趨走惟謹三法司視成案有所出入輕重俱視中官意不敢忤也成化時會審有弟助兄鬬因毆殺人者太監黃賜欲從末減尚書陸瑜等持不可賜曰同室鬬者尚被髮纓冠救之況其兄乎瑜等不敢難卒為屈法萬曆三十四年大審御史曹學程以建言久繫羣臣請宥皆不聽刑部侍郎沈應文署尚書事合院寺之長以書抵太監陳矩請寬學程罪然後會審獄具署名同奏矩復密啓言學程母老可念帝意解釋之其事甚美而監權之重如此錦衣衛使亦得與法司午門外鞫囚及秋後承天門外會審而大審不與也每歲決囚後圖諸囚罪狀於衛之外垣令人觀省內臣曾奉命審録者死則於墓寢畫壁南面坐旁列法司堂上官及御史刑部郎引囚鞠躬聽命狀示後世為榮觀焉成化二年命內官臨斬強盜宋全嘉靖中內臣犯法詔免逮問唯下司禮監治刑部尚書林俊言宮府一體內臣所犯宜下法司明正其罪不當廢祖宗法不聽按太祖之制內官不得識字預政備掃除之役而已末年焚錦衣刑具蓋示永不復用而成祖違之卒貽子孫之患君子惜焉
