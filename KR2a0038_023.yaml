body:
  text: 明史卷二十三本紀第二十三莊烈帝一莊烈愍皇帝諱由檢光宗第五子也萬曆三十八年十二月生母賢妃劉氏早薨天啓二年封信王六年十一月出居信邸明年八月熹宗疾大漸召王入受遺命丁巳即皇帝位大赦天下以明年為崇禎元年九月甲申追諡生母賢妃曰孝純皇后丁亥停刑庚寅冊妃周氏為皇后冬十月甲午朔享太廟癸丑南京地震十一月甲子安置魏忠賢於鳳陽戊辰撤各邊鎮守內臣己巳魏忠賢縊死癸酉免天啓時逮死諸臣贓釋其家屬癸巳黃立極致仕十二月前南京吏部侍郎錢龍錫禮部侍郎李標禮部尚書來宗道吏部侍郎楊景辰禮部侍郎周道登少詹事劉鴻訓俱禮部尚書兼東閣大學士預機務魏良卿客氏子侯國興俱伏誅崇禎元年春正月辛巳詔內臣非奉命不得出禁門壬午尊熹宗后為懿安皇后丙戌戮魏忠賢及其黨崔呈秀尸二月乙未禁章奏冗蔓癸丑御經筵丁巳戒廷臣交結內侍三月己巳葬哲皇帝於德陵癸未施鳳來張瑞圖致仕乙酉贈恤冤陷諸臣夏四月癸巳賜劉若宰等進士及第出身有差甲午袁崇煥為兵部尚書督師薊遼庚戌指揮卓銘請開礦不許五月己巳李國致仕庚午燬三朝要典甲戌裁各部添注官辛巳禱雨乙酉復外吏久任及舉保連坐之法禁有司私派六月削魏忠賢黨馮銓魏廣微籍壬寅許顯純伏誅壬子來宗道楊景辰致仕秋七月癸酉召對廷臣及袁崇煥於平臺壬午浙江風雨海溢漂沒數萬人癸未海寇鄭芝龍降甲申寧遠兵變巡撫都御史畢自肅自殺八月乙未詔非盛暑祁寒日御文華殿與輔臣議政九月丁卯京師地震冬十月戊戌劉鴻訓罷尋遣戍十一月癸未祀天於南郊十二月丙申韓爌復入閣是年革廣寧及薊鎮塞外諸部賞諸部饑告糴不許陝西饑民苦加派流賊大起分掠鄜州延安二年春正月丙子釋奠於先師孔子丁丑定逆案自崔呈秀以下凡六等二月戊子祀社稷庚寅皇長子慈烺生赦天下三月戊寅薊州兵變有司撫定之夏四月甲午裁驛站閏月癸亥流賊犯三水遊擊高從龍戰歿癸未祀地於北郊五月乙酉朔日有食之庚子議改曆法六月戊午袁崇煥殺毛文龍於雙島癸亥以久旱齊居文華殿敕羣臣修省秋八月甲子總兵官侯良柱兵備副使劉可訓擊斬奢崇明安邦彥於紅土川水西賊平甲戌熹宗神主祔太廟九月丁未楊鎬棄市冬十月戊寅大清兵入大安口十一月壬午朔京師戒嚴乙酉山海關總兵官趙率教戰沒於遵化甲申大清兵入遵化巡撫都御史王元雅推官何天球等死之丁亥總兵官滿桂入援己丑吏部侍郎成基命為禮部尚書兼東閣大學士預機務召前大學士孫承宗為兵部尚書中極殿大學士視師通州辛卯袁崇煥入援次薊州戊子宣大保定兵相繼入援徵天下鎮巡官勤王辛丑大清兵薄德勝門甲辰召袁崇煥等於平臺崇煥請入城休兵不許下兵部尚書王洽於獄十二月辛亥朔再召袁崇煥於平臺下錦衣衛獄甲寅總兵官祖大壽兵潰東出關乙卯孫承宗移駐山海關庚申諭廷臣進馬丁卯遣中官趨滿桂出戰桂及前總兵官孫祖壽俱戰歿總兵官馬世龍總理援軍壬申錢龍錫罷癸酉山西援兵潰於良鄉丁丑禮部侍郎周延儒尚書何如寵侍郎錢象坤俱禮部尚書兼東閣大學士預機務三年春正月甲申大清兵克永平副使鄭國昌知府張鳳奇等死之丙戌瘞城外戰士骸戊子大清兵克灤州庚寅逮總督薊遼都御史劉策下獄論死乙未禁抄傳邊報韓爌致仕壬寅兵部右侍郎劉之綸敗沒於遵化是月陝西諸路總兵官吳自勉等帥師入衛延綏甘肅兵潰西去與羣寇合二月庚申立皇長子慈烺為皇太子大赦三月壬午李標致仕戊申流賊犯山西夏四月乙卯以久旱齊居文華殿諭百官修省丁丑流賊陷蒲縣五月辛卯馬世龍祖大壽諸軍入灤州壬辰大清兵東歸永平遷安遵化相繼復六月癸丑流賊王嘉胤陷府谷米脂賊張獻忠聚衆應之己未授宋儒邵雍後裔五經博士辛酉禮部尚書溫體仁吳宗達並兼東閣大學士預機務秋八月癸亥殺袁崇煥九月己卯逮錢龍錫下獄冬十月癸亥停刑丙寅巡撫延綏副都御史洪承疇總兵官杜文煥敗賊張獻忠於清澗十一月壬辰破賊於懷寧甲午山西總兵官王國梁追賊於河曲敗績十二月乙巳朔增田賦充餉戊午流賊陷寧塞是年烏斯藏入貢四年春正月己卯流賊陷保安丁酉御史吳甡振延綏饑民己亥召對內閣九卿科道及入覲兩司官於文華殿命都察院嚴核巡按御史二月壬子流賊圍慶陽分兵陷合水三月丁丑副將張應昌等擊敗之慶陽圍解癸未總督陝西三邊軍務侍郎楊鶴招撫流賊於寧州羣賊僞降尋復叛己丑賜陳于泰等進士及第出身有差夏四月庚戌禱雨辛酉詔廷臣條時政是月延綏副將曹文詔擊賊於河曲王嘉胤敗死五月甲戌朔步禱於南郊庚辰戍錢龍錫六月丁未錢象坤致仕秋七月甲戌總兵官王承恩敗賊於鄜州降賊首上天龍八月癸卯總兵官賀虎臣擊斬賊劉六於慶陽丁未大清兵圍祖大壽於大凌城丙辰何如寵致仕九月庚辰內臣王應朝鄧希詔等監視關寧薊鎮兵糧及各邊撫賞甲午逮楊鶴下獄論戍洪承疇總督三邊軍務丁酉太監張彝憲總理戶工二部錢糧給事中宋可久等相繼諫不聽戊戌山海總兵官宋偉等援大凌敗於長山監軍太僕少卿張春被執冬十月辛丑朔日有食之戊辰祖大壽殺副將何可綱己巳大壽自大凌脫歸入錦州十一月丙戌太監李奇茂監視陝西茶馬吳直監視登島兵糧海禁羣臣合疏諫不聽壬辰孫承宗致仕癸巳召對廷臣於文華殿歷詢軍國諸務語及內臣帝曰諸臣若實心任事朕亦何需此輩己亥流賊羅汝才犯山西閏月乙丑陝西降賊復叛陷甘泉殺參政張允登丁卯登州遊擊孔有德率師援遼次吳橋反陷陵縣連陷臨邑商河齊東屠新城十二月丙子濟南官軍禦賊於阮城店敗績丁丑以大凌築城招釁奪孫承宗官是冬延安慶陽大雪民饑盜賊益熾五年春正月辛丑孔有德陷登州遊擊陳良謨戰死總兵官張可大死之巡撫都御史孫元化副使宋光蘭等被執尋縱還辛亥孔有德陷黃縣丙寅總兵官楊御蕃王洪率師討孔有德敗績於新城鎮二月己巳朔孔有德圍萊州巡撫都御史徐從治固守辛巳孔有德陷平度三月壬寅兵部侍郎劉宇烈督理山東軍務討孔有德夏四月甲戌劉宇烈敗績於沙河癸未徐從治中傷卒是月總兵官曹文詔楊嘉謨連破賊於隴安靜寧賊奔水落城平涼莊浪饑民附之勢復熾五月丙午參政朱大典為僉都御史巡撫山東辛亥禮部尚書鄭以偉徐光啓並兼東閣大學士預機務六月京師大雨水壬申河決孟津秋七月辛丑太監曹化淳提督京營戎政癸卯孔有德僞降誘執登萊巡撫都御史謝璉萊州知府朱萬年死之己未孫元化棄市逮劉宇烈下獄論戍八月甲戌洪承疇敗賊於甘泉賊首白廣恩降甲申朱大典督軍救萊州前鋒參將祖寬敗賊於沙河乙酉萊州圍解癸巳官軍大敗孔有德於黃縣進圍登州九月丁酉海賊劉香寇福建是秋陝西賊入山西連陷大寧澤州壽陽分部走河北犯懷慶陷修武冬十一月戊戌劉香寇浙江六年春正月癸卯曹文詔節制山陝諸將討賊丁未副將左良玉破賊於涉縣賊走林縣山中饑民爭附之庚申遣使分督直省逋賦是月曹文詔擊山西賊屢敗之二月壬申削左副都御史王志道籍癸酉流賊犯畿南戊子總兵官陳洪範等克登州水城辛卯孔有德遁入海山東平三月癸巳敕曹文詔諸將限三月平賊夏四月己巳免延安慶陽平涼新舊遼餉壬申總兵官鄧左良玉剿河南賊五月乙巳太監陳大金等分監曹文詔張應昌左良玉鄧軍壬子孔有德及其黨耿仲明等航海降於我大清癸丑河套部犯寧夏總兵官賀虎臣戰沒六月辛酉朔太監高起潛監視寧錦兵餉乙丑鄭以偉卒庚辰周延儒致仕甲申延綏副將李卑援剿河南庚寅太監張彝憲請催逋賦一千七百餘萬給事中范淑泰諫不聽秋七月甲辰大清兵取旅順總兵官黃龍死之癸丑改曹文詔鎮大同山西巡撫都御史許鼎臣請留文詔剿賊不許八月己巳曹文詔敗賊於濟源又敗之於懷慶九月庚戌南京禮部侍郎錢士升為禮部尚書兼東閣大學士預機務冬十月戊辰徐光啓卒十一月癸巳禮部侍郎王應熊何吾騶俱禮部尚書兼東閣大學士預機務辛亥詔保定河南山西會兵剿賊壬子賊渡河乙卯陷澠池十二月連陷伊陽盧氏分犯南陽汝寧遂逼湖廣是年安南入貢七年春正月己丑廣鹿島副將尚可喜降於我大清設河南山陝川湖五省總督以延綏巡撫陳奇瑜兼兵部侍郎為之庚寅總兵官張應昌渡河敗賊於靈寶壬辰賊自鄖陽渡漢癸巳犯襄陽連陷紫陽平利白河南入四川二月戊寅陷夔州大寧諸縣皆失守甲申耕藉田乙酉張獻忠突商雒凡十三營流入漢南是月振登萊饑蠲逋賦三月丁亥朔日有食之甲辰賜劉理順等進士及第出身有差乙巳張應昌擊賊於五嶺山敗績庚戌賊自四川走湖廣副將楊世恩追敗之於石河口山西自去年不雨至於是月民大饑夏四月賊自湖廣走盧氏靈寶癸酉發帑振陝西山西饑五月丙申副將賀人龍等敗賊於藍田六月辛未總督侍郎陳奇瑜鄖陽撫治都御史盧象升會師於上津剿湖廣賊甲戌河決沛縣是夏官軍圍高迎祥李自成諸賊於興安之車箱峽兩月賊食盡僞降陳奇瑜受之縱出險復叛陷所過州縣張應昌自清水追賊敗績秋七月壬辰大清兵入上方堡至宣府乙未詔總兵官陳洪範守居庸巡撫保定都御史丁魁楚等守紫荊雁門辛丑京師戒嚴庚戌大清兵克保安沿邊諸城堡多不守八月分遣總兵官尤世威等援邊戊辰宣大總督侍郎張宗衡節制各鎮援兵閏月甲申賊陷隆德固原參議陸夢龍赴援敗沒丁亥大清兵克萬全左衛庚寅旋師出塞壬寅李自成圍賀人龍於隴州九月庚申盔甲廠災庚辰洪承疇解隴州圍甲戌以賊聚陝西詔河南兵入潼華湖廣兵入商雒四川兵由興漢山西兵出蒲州韓城合剿冬十月庚戌湖廣兵援漢中副將楊正芳戰死十一月庚辰逮陳奇瑜下獄論戍乙酉洪承疇兼攝五省軍務是冬陝西賊分犯湖廣河南李自成陷陳州是年暹羅入貢八年春正月乙卯賊陷上蔡連陷汜水滎陽固始己未洪承疇出關討賊辛酉張獻忠陷潁州丙寅陷鳳陽焚皇陵樓殿留守朱國相等戰死壬申徐州援兵至鳳陽張獻忠犯廬州尋陷廬江無為李自成走歸德與羅汝才復入陝西二月張獻忠陷潛山羅田太湖新蔡應天巡撫都御史張國維禦却之甲午以皇陵失守逮總督漕運尚書楊一鵬下獄尋棄市丁酉總兵官鄧敗賊於羅山是月曹文詔敗賊於隨州夏四月張獻忠復走漢中犯平涼鳳翔丁亥鄭芝龍擊敗海賊劉香香自殺衆悉降辛卯洪承疇會師於汝州分部諸將防豫楚要害乙巳川兵變於樊城鄧自殺丙午洪承疇西還駐師靈寶五月乙亥吳宗達致仕六月己丑官軍遇賊於亂馬川敗績壬辰副將艾萬年柳國鎮擊李自成於寧州之襄樂戰沒丙午曹文詔追賊至真寧之湫頭鎮遇伏力戰死之秋七月甲戌少詹事文震孟刑部侍郎張至發俱禮部侍郎兼東閣大學士預機務是月張獻忠突朱陽關總兵官尤世威敗績賊復走河南八月李自成陷咸陽賊將高傑降壬辰詔撤監視總理內臣惟京營及關寧如故辛丑盧象升總理直隸河南山東湖廣四川軍務九月辛亥洪承疇督副將曹變蛟等敗賊於關山鎮李自成東走與張獻忠合壬戌官軍敗績於沈丘之瓦店總兵官張全昌被執壬申王應熊致仕冬十月庚辰下詔罪己辟居武英殿減膳撤樂示與將士同甘苦丙戌戶部尚書侯恂請嚴徵新舊逋賦從之辛卯李自成陷陝州十一月庚戌何吾騶文震孟罷庚申祀天於南郊總兵官祖寬破賊於汝州十二月戊寅城鳳陽乙酉盧象升祖寬敗李自成於確山戊子左良玉敗賊於閿鄉癸巳賊犯江北圍滁州乙巳老回回諸賊自河南犯陝西洪承疇敗之於臨潼是年安南暹羅琉球入貢九年春正月甲寅總理侍郎盧象升祖寬援滁大敗賊於朱龍橋丁卯前禮部侍郎林釬以原官兼東閣大學士預機務二月前副將湯九州及賊戰嵩縣敗沒山西大饑人相食乙酉寧夏饑兵變殺巡撫都御史王楫兵備副使丁啓睿撫定之辛卯以武舉陳起新為給事中三月盧象升祖大樂剿河南賊高迎祥李自成分部入陝西餘賊自光化走湖廣振南陽饑蠲山西被災州縣新舊二餉夏四月戊子錢士升致仕五月壬子詔赦脅從諸賊願歸者護還鄉有司安置願隨軍自效者有功一體録丙辰延綏總兵官俞冲霄擊李自成於安定敗績死之李自成犯榆林賀人龍擊敗之癸酉免畿內五年以前逋賦六月乙亥林釬卒甲申吏部侍郎孔貞運禮部尚書賀逢聖黃士俊俱禮部尚書兼東閣大學士預機務己亥總兵官解進忠撫賊於淅川被殺秋七月甲辰內臣李國輔等分守紫荊倒馬諸關庚戌成國公朱純臣巡視邊關癸丑詔諸鎮星馳入援己未大清兵入昌平巡關御史王肇坤等死之壬戌巡撫陝西都御史孫傳庭擊擒賊首高迎祥於盩厔送京師伏誅癸亥諭廷臣助餉甲子兵部尚書張鳳翼督援軍高起潛為總監是月大清兵入寶坻連下近畿州縣八月癸酉括勳戚文武諸臣馬乙未盧象升入援次真定丙申唐王聿鍵起兵勤王勒還國尋廢為庶人是月大清兵出塞九月辛酉改盧象升總督宣大山西軍務冬十月乙亥工部侍郎劉宗周以論內臣及大學士溫體仁削籍甲申張獻忠犯襄陽丙申命開銀鐵銅鉛諸礦十一月丁未蠲山東五年以前逋賦十二月大清兵征朝鮮是年洪承疇敗賊於隴州賊走慶陽鳳翔暹羅入貢十年春正月辛丑朔日有食之丙午老回回諸賊趨江北張獻忠羅汝才自襄陽犯安慶南京大震二月甲戌遣使督直省逋賦丁酉賊犯潛山總兵官左良玉副使史可法敗之於楓香驛是月朝鮮降於我大清三月辛亥振陝西災丁巳賜劉同升等進士及第出身有差甲子官軍援安慶敗績於酆家店夏四月戊寅大清兵克皮島副總兵金日觀力戰死之總兵官沈冬魁走石城島癸巳旱清刑獄是月洪承疇剿賊於漢南閏月壬寅敕羣臣潔己愛民以回天意江北賊分犯河南總督兩廣都御史熊文燦為兵部尚書總理南京河南山陝川湖軍務駐鄖陽討賊五月戊寅李自成自秦州犯四川六月戊申溫體仁致仕是夏兩畿山西大旱秋七月山東河南蝗民大饑八月己酉吏部侍郎劉宇亮禮部侍郎傅冠俱禮部尚書僉都御史薛國觀為禮部侍郎並兼東閣大學士預機務庚申閲城九月丙子左良玉敗賊於虹縣辛卯洪承疇敗賊於漢中癸巳李自成陷寧羌冬十月丙申自成自七盤關入西川壬寅陷昭化劍州梓潼分兵趨潼川江油綿州總兵官侯良柱戰死遂陷彰明鹽亭諸縣庚戌逼成都十一月庚辰以星變修省求直言十二月癸卯黃士俊致仕癸亥洪承疇曹變蛟援四川次廣元是年安南琉球入貢
