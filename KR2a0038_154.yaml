body:
  text: 明史卷一百五十四列傳第四十二張輔高士文徐政黃福劉俊呂毅劉昱陳洽侯保馮貴伍雲陳忠李任等李彬柳升崔聚史安陳鏞李宗昉潘禋梁銘王通陶季容陳汀張輔字文弼河間王玉長子也燕師起從父力戰為指揮同知玉歿東昌輔嗣職從戰夾河藁城彰德靈璧皆有功從入京師封信安伯祿千石豫世券妹為帝妃丘福朱能言輔父子功俱高不可以私親故薄其賞永樂三年進封新城侯加祿三百石是時安南黎季犛弒其主自稱太上皇立子蒼為帝其故王之孫陳天平自老撾來奔季犛佯請歸國帝遣都督黃中以兵五千送之前大理卿薛嵓為輔季犛伏兵芹站殺天平嵓亦死帝大怒命成國公朱能為征夷將軍輔為右副將軍帥豐城侯李彬等十八將軍兵八十萬會左副將軍西平侯沐晟分道進討兵部尚書劉俊贊軍事行部尚書黃福大理寺卿陳洽給饋餉四年十月能卒於軍輔代領其衆自憑祥進師度坡壘關望祭安南境內山川檄季犛二十罪進破隘留雞陵二關道芹站走其伏兵抵新福晟軍亦自雲南至營於白鶴安南有東西二都依宣洮富良四江為險賊緣江南北岸立柵聚舟其中築城於多邦隘城柵橋艦相連九百餘里兵衆七百萬欲據險以老輔師輔自新福移軍三帶州造船圖進取會帝聞朱能卒敕拜輔為將軍制詞以李文忠代開平王常遇春為比且言乘冬月瘴癘未興宜及時滅賊十二月輔軍次富良江北遣驃騎將軍朱榮破賊嘉林江遂與晟合軍進攻多邦城佯欲他攻以懈賊令都督黃中等將死士人持炬火銅角夜四鼓越重濠雲梯傅其城都指揮蔡福先登士蟻附而上角鳴萬炬齊舉城下兵鼓噪繼進遂入城賊驅象迎戰輔以畫獅蒙馬衝之翼以神機火器象皆反走賊大潰斬其帥二人追至傘圓山盡焚緣江木柵俘斬無算進克東都輯吏民撫降附來歸者日以萬計遣別將李彬陳旭取西都又分軍破賊援兵季犛焚宮室倉庫逃入海三江州縣皆望風降明年春輔遣清遠伯王友等濟自注江悉破籌江困枚萬劫普賴諸寨斬首三萬七千餘級賊將胡杜聚舟盤灘江輔使降將陳封襲走之盡得其舟遂定東潮諒江諸府州尋擊破季犛舟師於木丸江斬首萬級擒其將校百餘人溺死者無算追至膠水縣悶海口還軍築城鹹子關令都督柳升守之已賊由富良江入輔與晟夾岸迎戰升等以舟師橫擊大破之馘斬數萬江水為赤乘勝窮追時天旱水淺賊棄舟陸走官軍至忽大雨水漲遂畢渡五月至奇羅海口獲季犛及其子蒼並僞太子諸王將相大臣等檻送京師安南平得府州四十八縣一百八十戶三百十二萬求陳氏後不得遂設交址布政司以其地內屬自唐之亡交址淪於蠻服者四百餘年至是復入版圖帝為詔告天下諸王百官奉表稱賀六年夏輔振旅還京師再賜宴奉天殿帝為賦平安南歌進封英國公歲祿三千石豫世券其年冬陳氏故臣簡定復叛命沐晟討之敗績於生厥江明年春復命輔佩征虜將軍印帥師往討時簡定已僭稱越上皇別立陳季擴為皇勢張甚輔就叱覽山伐木造舟招諒江北諸避寇者復業遂進至慈廉州破喝門江克廣威州孔目柵遇賊鹹子關賊舟六百餘保江東南岸輔帥陳旭等以划船戰乘風縱火擒賊帥二百餘人盡得其舟追至太平海口賊將阮景異以三百艘迎敵復大破之於是季擴自言陳氏後遣使求紹封輔曰向者遍索陳王後不應今詐也吾奉命討賊不知其他遂遣朱榮蔡福等以步騎先進輔帥舟師繼之自黃江至神投海會師清化分道入磊江獲簡定於美良山中及其黨送京師八年正月進擊賊餘黨斬數千人築京觀惟季擴未獲帝留沐晟討之召輔班師謁帝於興和命練兵宣府萬全督運北征時陳季擴雖請降實無悛心乘輔歸攻剽如故晟不能制交人苦中國約束又數為吏卒侵擾往往起附賊乍服乍叛將帥益玩寇九年正月仍命輔與沐晟協力進討輔至申軍令都督黃中素驕違節度詰之不遜斬以徇將士惕息無敢不用命者其年七月破賊帥阮景異於月常江獲船百餘生擒僞元帥鄧宗稷等又捕斬別部賊首數人以瘴癘息兵明年八月擊賊於神投海賊舟四百餘分三隊鋭甚輔衝其中堅賊却左右隊迭進官軍與相鉤連殊死戰自卯至巳大破賊擒渠帥七十五人進軍乂安府賊將降者相繼十一年冬與晟會順州戰愛子江賊驅象前行輔戒士卒一矢落象奴二矢射象鼻象奔還自蹂其衆裨將楊鴻韓廣薛聚等乘勢繼進矢落如雨賊大敗擒其帥五十六人追至愛母江盡降其衆明年正月進至政平州聞賊屯暹蠻昆蒲諸柵遂引兵往懸崖側徑騎不得進輔與將校徒步行山箐中夜四鼓抵其巢悉擒阮景異鄧容等季擴走老撾遣指揮師祐以兵索之破其三關遂縛季擴及其孥送京師賊平承制以賊所取占城地設升華思義四州增置衛所官其降人留軍守之而還十三年春至京旋命為交址總兵官往鎮而餘寇陳月湖等復作亂輔悉討平之十四年冬召還輔凡四至交址前後建置郡邑及增設驛傳遞運規畫甚備交人所畏惟輔輔還一年而黎利反纍遣將討之無功至宣德時柳升敗沒王通與賊盟倉卒引還廷議棄交址輔爭之不能得也仁宗即位掌中軍都督府事進太師並支二俸尋命輔所受太師俸於北京倉支給時百官俸米皆給於南京此蓋特恩云成祖喪滿二十七日帝素冠麻衣以朝而羣臣皆已從吉惟輔與學士楊士奇服如帝帝歎曰輔武臣也而知禮過六卿益見親重尋命知經筵事監修實録宣德元年漢王高煦謀反誘諸功臣為內應潛遣人夜至輔所輔執之以聞盡得其反狀因請將兵擊之帝決策親征命輔扈行事平加祿三百石輔威名益盛而久握兵四年都御史顧佐請保全功臣詔輔解府務朝夕侍左右謀畫軍國重事進階光祿大夫左柱國朝朔望英宗即位加號翊運佐理知經筵監修實録如故輔雄毅方嚴治軍整肅屹如山嶽三定交南威名聞海外歷事四朝連姻帝室而小心敬慎與蹇夏三楊同心輔政二十餘年海內宴然輔有力焉王振擅權文武大臣望塵頓首惟輔與抗禮也先入犯振導英宗親征輔從行不使預軍政輔老矣默默不敢言至土木死於難年七十五追封定興王諡忠烈子懋九歲嗣公憲宗閲騎射西苑懋三發連中賜金帶歷掌營府纍加至太師嘗上言防邊事宜諫止發京營兵作圓通寺弘治中御史李興彭程下獄懋論救復請罷作真武觀免織造召還中官董織者武宗即位與羣小狎遊懋率文武大臣諫其言皆切直然性豪侈又頗朘削軍士屢為言者所糾嗣公凡六十六年握兵柄者四十年尊寵為勳臣冠正德十年卒年亦七十五贈寧陽王諡恭靖萬曆十一年與朱希忠並削王號孫崙嗣傳爵至世澤流寇陷京師遇害初輔之定交址也先後百餘戰其從征死事最著者有高士文徐政士文咸陽人洪武中以小校從征雲南及金山有功為燕山左護衛百戶質直剛果善騎射從成祖起兵纍官都督僉事從張輔征交址黎季犛既擒餘黨竄山谷中出沒為寇五年八月士文帥所部敗之廣源進圍其寨晝夜急攻垂破賊突走士文追與戰中飛石死所部復追賊賊失巢潰散遂為指揮程瑒所滅朝廷念士文功追封建平伯令其子福嗣祿千三百石豫世券三傳至孫霳無子以義子為嗣事覺爵除徐政儀真人建文時為揚州衛副千戶以城降成祖纍遷都指揮同知從征交址奪船於三帶江以濟大軍拔西都戰鹹子關皆有功陳季擴反盤灘地最要衝張輔遣政守之七年八月賊黨阮景異來攻與戰飛鎗貫脅猶督兵力戰竟敗賊賊退腹潰而死黃福字如錫昌邑人洪武中由太學生歷金吾前衛經歷上書論國家大計太祖奇之超拜工部右侍郎建文時深見倚任成祖列姦黨二十九人福與焉成祖入京師福迎附李景隆指福姦黨福曰臣固應死但目為姦黨則臣心未服帝置不問復其官未幾拜工部尚書永樂三年陳瑛劾福不恤工匠改北京行部尚書明年坐事逮下詔獄謫充為事官已復職督安南軍餉安南既平郡縣其地命福以尚書掌布政按察二司事時遠方初定軍旅未息庶務繁劇福隨事制宜咸有條理上疏言交址賦稅輕重不一請酌定務從輕省又請循瀘江北岸至欽州設衛所置驛站以便往來開中積鹽使商賈輸粟以廣軍儲官吏俸廩倉粟不足則給以公田又言廣西民餽運陸路艱險宜令廣東海運二十萬石以給皆報可於是編氓籍定賦稅興學校置官師數召父老宣諭德意戒屬吏毋苛擾一切鎮之以靜上下帖然時羣臣以細故謫交址者衆福咸加拯恤甄其賢者與共事由是至者如歸鎮守中官馬騏怙寵虐民福數裁抑之騏誣福有異志帝察其妄不問仁宗即位召還命兼詹事輔太子福在交址凡十九年及還交人扶攜走送號泣不忍別福還交址賊遂劇訖不能靖仁宗崩督獻陵工宣德元年馬騏激交址復叛時陳洽以兵部尚書代福纍奏乞福還撫交址會福奉使南京召赴闕敕曰卿惠愛交人久交人思卿其為朕再行仍以工部尚書兼詹事領二司事比至柳升敗死福走還至雞陵關為賊所執欲自殺賊羅拜下泣曰公交民父母也公不去我曹不至此力持之黎利聞之曰中國遣官吏治交址使人人如黃尚書我豈得反哉遣人馳往守護饋白金餱糧肩輿送出境至龍州盡取所遺歸之官還為行在工部尚書四年與平江伯董漕事議令江西湖廣浙江及江南北諸郡民量地遠近轉粟於淮徐臨清而令軍士接運至北京民大稱便五年陳足兵食省役之要其言足食謂永樂間雖營建北京南討交址北征沙漠資用未嘗乏比國無大費而歲用僅給即不幸有水旱征調將何以濟請役操備營繕軍士十萬人於濟寧以北衛輝真定以東緣河屯種初年自食次年人收五石三年收倍之既省京倉口糧六十萬石又省本衛月糧百二十萬石歲可得二百八十萬石帝善之下行在戶兵二部議郭資張本言緣河屯田實便請先以五萬頃為率發附近居民五萬人墾之但山東近年旱饑流徙初復衛卒多力役宜先遣官行視田以俟開墾帝從之命吏部郎中趙新等經理屯田福總其事既而有言軍民各有常業若復分田役益勞擾事竟不行改戶部尚書七年帝於宮中覽福漕事便宜疏出以示楊士奇曰福言智慮深遠六卿中誰倫比者對曰福受知太祖正直明果一志國家永樂初建北京行部綏輯凋瘵及使交址總藩憲具有成績誠六卿所不及福年七十矣諸後進少年高坐公堂理政事福四朝舊人乃朝暮奔走勞悴殊非國家優老敬賢之道帝曰非汝不聞此言士奇又曰南京根本重地先帝以儲宮監國福老成忠直緩急可倚帝曰然明日改福官南京明年兼掌南京兵部英宗即位加少保參贊南京守備襄城伯李隆機務留都文臣參機務自福始隆用福言政肅民安正統五年正月卒年七十八福丰儀修整不妄言笑歷事六朝多所建白公正廉恕素孚於人當官不為赫赫名事微細無不謹憂國忘家老而彌篤自奉甚約妻子僅給衣食所得俸祿惟待賓客周匱乏而已初成祖手疏大臣十人命解縉評之惟於福曰秉心易直確乎有守無少貶福參贊南京時嘗坐李隆側士奇寄聲曰豈有孤卿而旁坐者福曰焉有少保而贊守備者邪卒不變然隆待福甚恭公退即推福上坐福亦不辭士奇之省墓也道南京聞福疾往候之福驚曰公輔幼主一日不可去左右奈何遠出士奇深服其言兵部侍郎徐琦使安南回福與相見石城門外或指福問安南來者曰汝識此大人否對曰南交草木亦知公名安得不識福卒贈諡不及士論頗不平成化初始贈太保諡忠宣劉俊字子士江陵人洪武十八年進士除兵部主事歷郎中遇事善剖決為帝所器二十八年擢右侍郎建文時為侍中成祖即位進尚書永樂四年大征安南以俊參贊軍務俊為人縝密勤敏在軍佐畫籌策有功還受厚賚未幾簡定復叛俊再出參贊沐晟軍務六年冬晟與簡定戰生厥江敗績俊行至大安海口颶風作揚沙晝晦且戰且行為賊所圍自經死洪熙元年三月帝以俊陷賊不屈有司不言未加褒恤敕責禮官乃賜祭贈太子少傅諡節愍官其子奎給事中與俊同死者呂毅劉昱毅項城人以濟南衛百戶從成祖渡江積功至都督僉事與同官黃中充左右副將軍佐征南將軍韓觀鎮廣西尋與中將兵送故安南王孫陳天平歸國至芹站天平被劫去坐奪官帝薄毅罪起為鷹揚將軍從張輔討季犛有功掌交址都司事至是與賊戰深入陷陳死昱武城人自吏科給事中遷左通政出為河南參政改交址嚴肅有治材吏民畏憚軍敗亦死之陳洽字叔遠武進人好古力學與兄濟弟浚並有名洪武中以善書薦授兵科給事中嘗奉命閲軍一過輒識之有再至者輒叱去帝嘉其能賜金織衣父戍五開歿洽奔喪會蠻叛道梗冒險間行負父骨以歸建文中以茹瑺薦起文選郎中成祖即位擢吏部右侍郎改大理卿安南兵起命洽赴廣西與韓觀選士卒從征及大軍出遂命贊軍務主饋餉安南平轉吏部左侍郎是時黃福掌布按二司事專務寬大拊循其民洽甄拔才能振以風紀核將士功罪建置土官經理兵食剖決如流還朝命兼署禮部工部事七年復參張輔軍討簡定平之還從帝北征與輔練兵塞外九年復與輔往交址討陳季擴居五年進兵部尚書復留贊李彬軍事仁宗召黃福還以洽掌布按二司仍參軍務中官馬騏貪暴洽不能制反者四起黎利尤桀黠而榮昌伯陳智都督方政不相能寇勢日張洽上疏言賊雖乞降內懷詭詐黨羽漸盛將不可制乞諭諸將速滅賊毋為所餌宣宗降敕切責智等令進兵復敗於茶籠州帝乃削智政官爵命成山侯王通佩征夷將軍印往討洽仍贊其軍宣德元年九月通至交址十一月進師應平次寧橋洽與諸將言地險惡恐有伏宜駐師覘賊通不聽麾兵徑渡陷泥淖中伏發官軍大敗洽躍馬入賊陳創甚墜馬左右欲扶還洽張目叱曰吾為國大臣食祿四十年報國在今日義不苟生揮刀殺賊數人自剄死事聞帝歎曰大臣以身殉國一代幾人贈少保諡節愍官其子樞刑科給事中自黎利反用兵三四年將吏先後死者甚衆侯保贊皇人由國子生歷知襄城贛榆博興三縣有善政交址初設府縣擇人撫綏以保知交州府遷右參政永樂十八年黎利反保以黃江要害築堡守之賊至力拒數月出戰不勝死馮貴武陵人舉進士為兵科給事中從張輔征交址督兵餉纍遷左參政涖事明敏善撫流亡土兵二千人驍果善戰貴撫以恩意數擊賊有功中官馬騏盡奪之黎利反貴以羸卒數百禦賊於瑰縣力屈而死仁宗時尚書黃福言狀贈貴左布政使保右布政使然貴嘗言交址産金遂命以參議提督金場時論非之伍雲定遠人以荊州護衛指揮同知從征交址破坡壘隘留多邦城拔東西二都皆有功賊平調昌江衛仁宗初隨方政討黎利於茶籠深入陷陳死陳忠臨淮人初為寬河副千戶以靖難功積官指揮同知坐事戍廣西從征交址自箇招市舁小舟入江劫黎季犛水寨破之攻多邦城先登論功還故官調交州左衛屢與賊戰有功進都指揮同知黎利寇清化忠戰死仁宗憫之與雲皆優恤如制李任永康人以燕山衛指揮僉事從成祖起兵纍功為都指揮同知宣德元年從征交址守昌江黎利以昌江為官軍往來要路悉力攻之時都督蔡福為賊所獲逼令招任降任於城上罵福曰汝為大將不能殺賊反為賊用狗彘不食汝餘發炮擊之賊擁福去大集兵象飛車衝梯薄城環攻任與指揮顧福帥精騎出城掩擊燒其攻具賊又築土山臨射城中鑿地道潛入城任福隨方禦之死守九月餘前後三十戰賊聞征夷將軍柳升兵將至益兵來攻二年四月城陷任福猶帥死士三戰三敗賊賊驅象大至不能支皆自剄死內官馮智指揮劉順俱自經城中軍民婦女不屈死者數千人劉子輔廬陵人由國子生擢監察御史巡按浙江性廉平浙人德之按察使周新不苟許與獨稱子輔賢遷廣東按察使坐纍左遷諒江知府善撫循其民黎利反子輔與守將集兵民死守亦九閲月與昌江先後同陷子輔曰吾義不樜賊刃即自縊死一子一妾皆死何忠字廷臣江陵人由進士為監察御史廉慎人莫敢干以私永樂中三殿災言事忤旨出為政平知州民安其政寧橋之敗王通詭與賊和而請濟師於朝為賊所遮不得達賊遣使奉表入謝通乃遣忠及副千戶桂勝與偕行以奏還土地為辭陰令請兵至昌江內官徐訓泄其謀賊遂拘忠勝臨以白刃二人瞋目怒罵不屈並忠子皆被害徐麒桂林中衛指揮使與南寧千戶蔡顒守丘溫時賊勢已熾將吏多棄城遁丘溫被圍麒與顒猶帥疲卒固守城陷皆死無一降者易先湘陰人以國子生授諒山知府有善政歲滿還朝郡人乞留詔進秩三品還任賊破諒山先自縊死周安以指揮僉事守備乂安黎利勢張都督蔡福以芻糧將盡退就東關既行千戶包宣以其衆詣賊降安等至富良江為賊所蹙俱陷賊賊逼蔡福詣諸城說降安憤甚潛與衆謀俟官軍至為內應包宣覺之以告利利收安將殺之安曰吾天朝臣子豈死賊手與指揮陳麟躍起奪賊刀殺數人皆自刎死所部九千餘人悉被殺交址布政使弋謙以任等十二人死事聞宣宗歎息贈任都督同知福順麒都指揮同知安指揮同知顒指揮僉事勝正千戶並令子孫承襲子輔先布政司參政忠府同知智太監並豫誥賜祭惟麟嘗與朱廣開門納賊故贈恤不及已而黎利稱臣歸蔡福朱廣等六人盡棄市籍其家李彬字質文鳳陽人父信從太祖渡江積功為濟川衛指揮僉事彬嗣職從潁國公傅友德出塞斬獲多還與築諸邊城成祖起兵彬歸附為前鋒轉戰有功纍遷右軍都督僉事永樂元年四月以丘福議封豐城侯祿千石豫世券明年襄城伯李濬討永新叛寇命彬帥師策應未至寇平命以所統鎮廣東四年召還捕南陽皂君山寇其年七月以左參將仭征夷副將軍印授沐晟進討安南十二月彬及雲陽伯陳旭破安南西都又大敗賊於木丸江安南平論功與旭皆以臨敵稽緩不益封加祿五百石尋充總兵官備倭海上移兵討擒長沙賊李法良又帥浙閩兵捕海寇十年命往甘肅與西寧侯宋琥經略降酋彬與柳升嚴兵境上而令土官李英防野馬川涼州酋老的罕叛都指揮何銘戰死英追躡盡俘其衆老的罕走赤斤蒙古帝欲發兵彬言道遠餉難繼宜緩圖之明年代琥鎮甘肅赤斤蒙古縛老的罕以獻帝嘉彬功賜賚甚厚十二年從北征領右哨破敵於忽失溫追奔至土剌河師還受上賞移鎮陝西十五年二月命佩征夷將軍印鎮交址至則破擒陸那縣賊阮貞遣都督朱廣等平順州及北晝諸寨明年清化府土巡檢黎利反彬遣廣討破之利遁去十七年遣都督同知方政襲利於可藍柵獲其將軍阮箇立等利走老撾師還復出為寇都指揮黃誠擊走之以暑雨旋師當是時交人反者四起彬遣諸將分道往討方政討車綿子等於嘉興鄭公證於南策丁宗老於大灣朱廣討談興邦等於別部都指揮徐謜討范軟於俄樂指揮陳原瑰討陳直誠於惡江都指揮王忠討楊恭於峽山皆先後報捷而賊勢尤劇者彬輒自將往擊潘僚者乂安土知府也為中官馬騏所虐反衙儀彬擊敗之追至玉麻州擒其酋進焚賊柵僚竄老撾彬遣都指揮師祐帥師往僚以老撾兵迎戰破之農巴林悉降其衆范玉者塗山寺僧也反東潮州彬往討敗之江中玉脫走追獲之東潮而鄭公證之黨黎姪復起都指揮陳忠等纍敗之於小黃江彬自將追捕至鎮蠻盡縛其衆於是諸賊略平惟黎利數出沒聚衆磊江屢為徐謜方政所敗復遁去十九年彬以餽運不繼請令官軍與土軍參錯屯田並酌屯守征行多寡之數以聞帝從之將發兵入老撾索黎利老撾懼請自捕以獻會彬疾作而罷明年正月卒繼之者孟瑛陳智李安方政皆不能討王通代鎮賊勢益盛交址遂不可守彬卒贈茂國公諡剛毅子賢嗣宣德三年從出塞還修永寧隆慶諸城正統初鎮大同尋守備南京景泰二年卒贈豐國公諡忠憲子勇嗣再傳至孫旻正德中鎮貴州擒思南石阡流賊平武定諸蠻有功加太子太傅嘉靖初鎮湖廣有威惠楚人安之徙兩廣武定侯郭勛典京營以罪罷世宗以旻遠鎮無內黨召代之尋坐事罷卒諡武襄無子從子熙嗣出鎮湖廣楚世子獄株連甚衆熙言於御史平反二百餘人討平沅州麻陽叛蠻卒無子從子儒嗣傳至孫承祚天啓時附魏忠賢請設海外督理內臣又請豫忠賢九錫崇禎初奪爵戍邊子開先嗣為伯都城陷遇害柳升懷寧人襲父職為燕山護衛百戶大小二十餘戰纍遷左軍都督僉事永樂初從張輔征交址破賊魯江斬其帥阮子仁等守鹹子關賊入富良江舟亙十餘里截江立寨陸兵亦數萬人輔將步騎升將水軍夾攻大敗之獲僞尚書阮希周等又敗賊於奇羅海口得舟三百部卒得季犛及其子澄升仭露布獻俘被賞賚師還封安遠伯祿千石豫世券七年同陳瑄帥舟師巡海至青州海中大破倭追至金州白山島而還明年從北征至回曲津將神機火器為前鋒大敗阿魯台進封侯加祿五百石仍世伯爵出鎮寧夏討斬叛將馮答蘭帖木兒等召還總京營兵十二年復從北征將大營兵戰忽蘭忽失溫以火器破敵十八年蒲臺妖婦唐賽兒反命升與都指揮劉忠將京軍往剿圍其寨升自以大將意輕賊賊乞降信之夜為所襲忠中流矢死賽兒遁去及明始覺追獲其黨百餘人都指揮衛青力戰解安丘圍升忌其功摧辱之徵下獄已得釋二十年復從北征將中軍破兀良哈於屈裂兒河豫侯帝五出塞升皆從數有功寵待在列侯右仁宗即位命掌右府加太子太傅宣德元年冬成山侯王通征黎利敗聞命升為征虜副將軍充總兵官保定伯梁銘為左副總兵都督崔聚為參將尚書李慶贊軍務帥步騎七萬會黔國公沐晟往討時賊勢已盛道路梗絶朝廷久不得交址奏報二年六月有軍丁李茂先者三人間道走京師言昌江被圍急帝授三人百戶敕升急進援而昌江已於四月陷九月升始入隘留關利僞為國人上書請立陳氏後升不啓封以聞賊緣途據險列柵官軍連破之抵鎮夷關升以賊屢敗易之時李慶梁銘皆病甚郎中史安主事陳鏞言於慶曰柳將軍辭色皆驕驕者兵家所忌賊或示弱以誘我未可知也防賊設伏璽書告誡甚切公宜力言之慶強起告升升不為意至倒馬坡與百餘騎先馳度橋橋遽壞後隊不得進賊伏四起升陷泥淖中中鏢死其日銘病卒明日慶亦卒又明日崔聚帥軍至昌江賊來益衆官軍殊死鬬賊驅象大戰陳亂賊大呼降者不死官軍或死或走無降者全軍盡沒史安陳鏞及李宗昉潘禋皆死之崔聚懷遠人從成祖起兵八年從北征敗敵於廣漠戍洪熙元年纍遷左軍都督僉事至是力戰被執賊百計降之終不屈死升質直寬和善撫士卒勇而寡謀遂及於敗升敗沐晟師不得進亦引還王通孤軍援絶遂棄交址朝議以升喪師不令子溥襲爵久之乃許正統十二年贈升融國公諡襄愍溥初掌中府出鎮廣西廉慎然無將略承山雲後不能守成法過於寬弛瑤僮相煽為亂溥先後討斬大藤峽賊渠破柳州思恩諸蠻寨而賊滋蔓如故景泰初兵事亟召掌右府總神機營事定復出鎮天順初召還防宣府大同纍進太傅陝西有警命佩平虜大將軍印往禦敵再入涼州溥閉壁不出敵飽掠去躡取數十級報捷被劾落太傅閒住尋復起掌神機營卒諡武肅孫景嗣景子文文子珣凡三世皆鎮兩廣有平蠻功嘉靖十九年命珣佩征夷副將軍印征安南莫登庸登庸乞降加太子太傅又以討瓊州黎賊功加少保卒贈太保諡武襄傳至明亡爵絶史安字志靜豐城人廉重好學由進士歷官儀制司郎中陳鏞字叔振錢塘人由庶吉士授祠祭司主事楊士奇稱其清介端確表𩹉一出於正李宗昉不知何許人亦以主事從潘禋鄞人以後軍都事從嘗勸升持重廣偵探引芹站寧橋事為戒升不聽軍敗格鬬死梁銘汝陽人以燕山前衛百戶從仁宗守北平李景隆圍城戰甚力積功至後軍都督僉事侍仁宗監國永樂八年坐事下獄十九年赦復職副都督胡原捕倭廣東仁宗即位進都督同知以參將佩征西將軍印同都督同知陳懷鎮寧夏追論守城功封保定伯祿千石豫世券宣德初御史石璞劾其貪黷下獄當奪爵宥之副柳升征交址升敗銘病卒銘勇敢善戰能得士卒心既死崔聚獨以衆入全軍遂覆子珤嗣正統末充副總兵討福建盜鄧茂七擊斬餘賊於九龍山班師而賊黨復作謫充為事官從石亨立功復爵景泰元年拜平蠻將軍代王驥討貴州苗其冬分四道進攻大敗之斬首七千有奇破寨五百明年自沅州進兵與都督方瑛破賊於興澤又大破之香罏山俘僞王韋同烈等擒斬數千人分兵攻都勻草塘諸苗悉震恐降師還苗復叛珤復與瑛討平之論功進侯益祿五百石四年討平湖廣清浪叛苗天順元年出鎮陝西破敵涼州又破敵靖虜堡召還理左府事成化初卒贈蠡國公諡襄靖珤天資平恕數總兵柄未嘗妄殺一人子弟從征以功授官輒辭不受人以為賢傳爵至世勳崇禎初提督京營京師陷遇害王通咸寧人金鄉侯真子也嗣父官為都指揮使將父兵轉戰有功纍進都督僉事復以父死事故封武義伯祿千石豫世券永樂七年董營長陵十一年進封成山侯加祿二百石明年從北征領左掖二十年從出塞以大軍殿連出塞並領右掖仁宗即位命掌後府加太子太保時交址總兵官豐城侯李彬已前卒榮昌伯陳智都督方政以參將代鎮不協黎利益張數破郡邑殺將吏智出兵數敗宣宗削智爵而命通佩征夷將軍印帥師往討黎利弟善攻交州城都督陳濬等擊却之會通至分道出擊參將馬瑛破賊於石室縣通引軍與瑛合至應平之寧橋中伏軍大潰死者二三萬人尚書陳洽與焉通中傷還交州利在乂安聞之自將精卒圍東關通氣沮陰遣人許為利乞封而檄清化迤南地歸利按察使楊時習執不可通厲聲叱之清化守羅通亦不肯棄城與指揮打忠堅守朝廷遣柳升等助通未至二年二月利攻城通以徑兵五千出不意搗賊營破之斬其司空丁禮以下萬餘級利惶懼欲走諸將請乘勝急擊通猶豫三日不出賊勢復振樹柵掘濠塹四出攻掠分兵陷昌江諒江而圍交益急通斂兵不出利乞和通以聞會柳升戰歿沐晟師至水尾縣不得進通益懼更啖利和為利馳上謝罪表其年十月大集官吏軍民出城立壇與利盟約退師因宴利遺利錦綺利亦以重寶為謝十二月通令太監山壽與陳智等由水路還欽州而自帥步騎還廣西至南寧始以聞會廷議厭兵遂棄交址交址內屬者二十餘年前後用兵數十萬餽餉至百餘萬轉輸之費不與焉至是棄去官吏軍民還者八萬六千餘人其陷於賊及為賊所戮者不可勝計而土官嚮義者陶季容陳汀之屬乃往往自拔來歸明年通還京羣臣交劾論死繫獄奪券籍其家正統四年特釋為民景帝立起都督僉事守京城禦也先有功進同知守天壽山還其家産景泰三年卒天順元年詔通子琮嗣成山伯琮子鏞成化時賜原券傳爵至明亡陶季容者世為水尾土官交址平以為土知縣歷歸化知州遷宣化府同知守北間堡宣德元年遣所部阮執先等追賊至清波縣為所獲既而遣執先還招季容脅以兵不為動宣宗聞之擢宣化知府降敕奬勞賊復遣人誘季容季容執以送沐晟而導官軍敗賊於水尾王通棄交址季容率官屬入朝陳汀古雷縣千夫長數從方政擊賊有功政信倚之王通棄地汀北行為賊所得授以官令守交州東關汀挈其家九十餘人從間道走賊追之家屬盡陷汀獨身入欽州帝嘉其義以為指揮厚賚之他若土官阮世寧阮公庭皆不願從利率所部來歸乞居龍州陳州之地帝命加意撫恤資糧器用官給之贊曰成祖因季犛篡立興師問罪以彰天討求陳氏後不得從而郡縣其地得取亂侮亡之道矣蠻疆險遠易動難馴數年之間叛者數起柳升以輕敵喪師王通以畏怯棄地雖黃福惠愛在交叛人心折而大勢已去再至無功宣宗用老成謀國之言廓然置之度外良以其得不為益失不為損事勢所不必爭非獨憚於勞民而絀於籌餉也嘗考黃福與張輔書言惡本未盡除守兵不足用馭之有道可以漸安守之無法不免再變權交事之始終蓋惜張輔之不得為滇南之沐氏也
