body:
  text: 明史卷一百三十五列傳第二十三陳遇秦從龍葉兌范常潘庭堅宋思顏夏煜郭景祥李夢庚王濂毛騏楊元杲阮弘道汪河孔克仁陳遇字中行先世曹人高祖義甫宋翰林學士徙居建康子孫因家焉遇天資沉粹篤學博覽精象數之學元末為溫州教授已而棄官歸隱學者稱為靜誠先生太祖渡江以秦從龍薦發書聘之引伊呂諸葛為喻遇至與語大悅遂留參密議日見親信太祖為吳王授供奉司丞辭即皇帝位三授翰林學士皆辭乃賜肩輿一乘衛士十人護出入以示榮寵洪武三年奉命至浙江廉察民隱還賜金帛除中書左丞又辭明年召對華蓋殿賜坐命草平西詔授禮部侍郎兼弘文館大學士復辭西域進良馬遇引漢故事以諫除太常少卿固辭強之不可最後除禮部尚書又固辭帝沉吟良久從之自是不復強以官帝嘗從容言欲官其子遇曰臣三子皆幼學未成請俟異日帝亦弗強也遇自開基之始即侍帷幄帝嘗問保國安民至計遇對以不嗜殺人薄斂任賢復先王禮樂為首務廷臣或有過被譴責遇力為解多得全釋其計畫多祕不傳而寵禮之隆勳戚大臣無與比者數臨幸其第語必稱先生或呼為君子命爵輒辭終成其高十七年卒賜葬鍾山子恭舉人纍官工部尚書有能聲遇弟遠字中復嘗隨遇侍帝永樂初為翰林待詔精繪事遠子孟顒善書秦從龍字元之洛陽人仕元官江南行臺侍御史兵亂避居鎮江徐達之攻鎮江也太祖謂之曰聞有秦元之者才器老成汝當詢訪致吾欲見意達下鎮江訪得之太祖命從子文正甥李文忠奉金綺造其廬聘焉從龍與妻陳偕來太祖自迎之於龍江時太祖居富民家因邀從龍與同處朝夕訪以時事已即元御史臺為府居從龍西華門外事無大小悉與之謀嘗以筆書漆簡問答甚密左右皆不能知從龍生日太祖與世子厚有贈遺或親至其家燕飲至正二十五年冬從龍子澤死請告歸太祖出郊握手送之尋病卒年七十太祖驚悼時方督軍至鎮江親臨哭之厚恤其家命有司營葬葉兌字良仲寧海人以經濟自負尤精天文地理卜筮之書元末知天運有歸以布衣獻書太祖列一綱三目言天下大計時太祖已定寧越規取張士誠方國珍而察罕兵勢甚盛遣使至金陵招太祖故兌書於三者籌之為詳其略曰愚聞取天下者必有一定之規模韓信初見高祖畫楚漢成敗孔明臥草廬與先主論三分形勢者是也今之規模宜北絶李察罕南併張九四撫溫台敗閩越定都建康拓地江廣進則越兩淮以北征退則畫長江而自守夫金陵古稱龍蟠虎踞帝王之都藉其兵力資財以攻則克以守則固百察罕能如吾何哉江之所備莫急上流今義師已克江州足蔽全吳況自滁和至廣陵皆吾所有非直守江兼可守淮矣張氏傾覆可坐而待淮東諸郡亦將來歸北略中原李氏可併也今聞察罕妄自尊大致書明公如曹操之招孫權竊以元運將終人心不屬而察罕欲效操所為事勢不侔宜如魯肅計鼎足江東以觀天下之釁此其大綱也至其目有三張九四之地南包杭紹北跨通泰而以平江為巢穴今欲攻之莫若聲言掩取杭紹湖秀而大兵直搗平江城固難以驟拔則以鎖城法困之於城外矢石不到之地別築長圍分命將卒四面立營屯田固守斷其出入之路分兵略定屬邑收其稅糧以贍軍中彼坐守空城安得不困平江既下巢穴已傾杭越必歸餘郡解體此上計也張氏重鎮在紹興紹興懸隔江海所以數攻而不克者以彼糧道在三江斗門也若一軍攻平江斷其糧道一軍攻杭州絶其援兵紹興必拔所攻在蘇杭所取在紹興所謂多方以誤之者也紹興既拔杭城勢孤湖秀風靡然後進攻平江犁其心腹江北餘孽隨而瓦解此次計也方國珍狼子野心不可馴狎往年大兵取婺州彼即奉書納發後遣夏煜陳顯道招諭彼復狐疑不從顧遣使從海道報元謂江東委之納發誘令張齎詔而來且遣韓叔義為說客欲說明公奉詔彼既降我而反欲招我降元其反覆狡獪如是宜興師問罪然彼以水為命一聞兵至挈家航海中原步騎無如之何夫上兵攻心彼言杭越一平即當納土不過欲發我師耳攻之之術宜限以日期責其歸順彼自方國璋之沒自知兵不可用又叔義還稱義師之盛氣已先挫今因陳顯道以自通正可脅之而從也事宜速不宜緩宣諭之後更置官吏拘集舟艦潛收其兵權以消未然之變三郡可不勞而定福建本浙江一道兵脆城陋兩浙既平必圖歸附下之一辨士力耳如復遲則大兵自溫處入奇兵自海道入福州必不支福州下旁郡迎刃解矣威聲已震然後進取兩廣猶反掌也太祖奇其言欲留用之力辭去賜銀幣襲衣後數歲削平天下規模次第略如兌言范常字子權滁人太祖軍滁杖策謁軍門太祖夙知其名與語意合留置幕下有疑輒問常悉以實對諸將克和州兵不戢常言於太祖曰得一城而使人肝腦塗地何以成大事太祖乃切責諸將搜軍中所掠婦女還其家民大悅太祖以四方割據戰爭無虛日命常為文禱於上帝其辭曰今天下紛紜生民塗炭不有所屬物類盡矣倘元祚未終則羣雄當早伏其辜某亦在羣雄中請自某始若已厭元德有天命者宜歸之無使斯民久阽危苦存亡之機驗於三月太祖嘉其能達己意命典文牘授元帥府都事取太平命為知府諭之曰太平吾股肱郡其民數困於兵當令得所常以簡易為治興學恤民官廩有穀數千石請給民乏種者秋稔輸官公私皆足居三年民親愛之召入為侍儀洪武元年擢翰林直學士兼太常卿帝鋭意稽古禮文羣臣集議間有異同常能參合衆言委曲當上意尋以病免歸歲餘手詔徵詣闕仍故官帝宴閒輒命儒臣列坐賦詩為樂常每先成語多率帝笑曰老范詩質朴殊似其為人也遷起居注常有足疾數在告賜以安車尋乞歸帝賦詩四章送之賜宅於太平子祖歷官雲南左參政有修潔稱潘庭堅字叔聞當塗人元末為富陽教諭謝去太祖駐太平以陶安薦徵庭堅為帥府教授慎密謙約為太祖所稱下集慶擢中書省博士婺州下改為金華府以庭堅同知府事時上游諸郡次第平定擇儒臣撫綏之先後用陶安汪廣洋於江西而庭堅與王愷守浙東太祖為吳王設翰林院與安同召為學士而庭堅已老遂告歸洪武四年復召至主會試子黼字章甫有文名官至江西按察使會修律令留為議律官書成卒黼謹飭類父而文采清雅過之父子皆以鄉校顯時以為榮宋思顏不知何許人太祖克太平以思顏居幕府及定集慶置江南行中書省太祖總省事以李善長及思顏為參議同時所設省中官李夢庚郭景祥侯元善楊元杲陶安阮弘道孔克仁王愷欒鳳夏煜等數十人而思顏獨與善長並授參議其任較諸人為重已建大都督府以思顏兼參軍事太祖嘗視事東閣天暑汗沾衣左右更以衣進皆數經浣濯者思顏曰主公躬行節儉真可示法子孫惟願終始如一太祖嘉其直賜之幣他日又進曰句容虎為害既捕獲宜除之今豢養民間何益太祖欣然即命殺虎其隨事納忠類如此後出為河南道按察僉事坐事死夏煜字允中江寧人有俊才工詩辟為中書省博士婺州平調浙東分省兩使方國珍咸稱旨太祖征陳友諒儒臣惟劉基與煜侍鄱陽戰勝太祖所與草檄賦詩者煜其一也洪武元年使總制浙東諸府與高見賢楊憲凌說四人以伺察搏擊為事後俱以不良死郭景祥濠人與鳳陽李夢庚皆從渡江典文書佐謀議分任行中書省左右司郎中既同調浙東分省尋復同入為大都督府參軍景祥性諒直博涉書史遇事敢言太祖親信之嘗曰景祥文吏而有折衝禦侮才能盡忠於我可大任也先是克滁州太平溧陽以城郭不完輒命景祥董治之既而和州守臣言州城久廢命景祥相度即故址城之九旬而工畢太祖以為能授和州總制景祥益治城隍樓櫓廣屯田練士卒威望肅然和遂為重鎮璽書褒勞仕終浙江行省參政謝再興之守諸全也部將私販易吳境太祖怒殺部將召諭再興命夢庚往諸全總制軍事再興還鎮忿夢庚出己上遂叛執夢庚降於吳夢庚死之其時參佐行省者又有毛騏王濂濂字習古定遠人李善長婦兄也少嗜學事親孝初從汝潁賊太祖克集慶乃渡江來歸善長為言得召見除執法官讞獄平允遷中書省員外郎出為浙江按察僉事治行著聞大風晝晦濂應詔言民瘼請緩征太祖納之洪武三年卒帝謂善長曰濂有王佐才今死朕失一臂後善長坐事帝歎曰使王濂在必不至是騏字國祥與濂同里太祖自濠引兵趨定遠騏扶縣令出降太祖喜留與飲食籌兵事悉當意取滁州擢總管府經歷典倉廩兼掌晨昏曆稽將帥之失伍者從渡江擢行省郎中是時太祖左右惟善長及騏文書機密皆兩人協贊尋授參議官征婺州命權理中書省事委以心膂俄病卒太祖親為文哭之臨視其葬子驤管軍千戶積功擢親軍指揮僉事從定中原進指揮使滕州段士雄反驤討平之捕倭浙東斬獲多擢都督僉事見親任嘗掌錦衣衛事典詔獄後坐胡惟庸黨死楊元杲阮弘道皆滁人家世皆儒者從渡江同為行省左右司員外郎與陶安等更番掌行機宜文字元杲以郎中擢理軍儲於金華而弘道亦於是歲以郎中從大都督文正守南昌皆有功二人皆於太祖最故又皆儒雅嗜文學練達政體而元杲知慮尤周密帝嘗曰文臣從渡江掌簿書文字勤勞十餘年無如楊元杲阮弘道李夢庚侯元善樊景昭者其後元杲歷應天府尹弘道歷福建江西行省參政皆卒官元杲子賁博學強記以詞翰知名薦授大名知縣仕至周府紀善元善全椒人歷官參知政事與樊景昭俱無所表見又汪河者舒城人嘗師余闕以文章名從渡江為行中書省掾數陳時務太祖高其才進大都督府都事使察罕議論稱旨後奉命偕錢楨至河南報擴廓聘為所留太祖前後七致擴廓書終不報洪武元年大軍下河洛擴廓走定西河始得歸被拘凡六年帝甚嘉之進吏部侍郎備陳西征方略二年改御史臺侍御史九年拜晉王左相親御便殿諭遣之居數歲卒於官孔克仁句容人由行省都事進郎中嘗偕宋濂侍太祖太祖數與論天下形勢及前代興亡事陳友諒既滅太祖志圖中原謂克仁曰元運既隳豪傑互爭其釁可乘吾欲督兩淮江南諸郡之民及時耕種加以訓練兵農兼資進取退守仍於兩淮間餽運可通之處儲糧以俟兵食既足中原可圖卿以為何如克仁對曰積糧訓兵觀釁待時此長策也當是時江左兵勢日盛太祖以漢高自期嘗謂克仁曰秦政暴虐漢高帝起布衣以寬大馭羣雄遂為天下主今羣雄𧔧起皆不知修法度以明軍政此其所以無成也因感歎久之又曰天下用兵河北有孛羅帖木兒河南有擴廓帖木兒關中有李思齊張良弼然有兵而無紀律者河北也稍有紀律而兵不振者河南也道途不通餽餉不繼者關中也江南則惟我與張士誠耳士誠多奸謀尚間諜御衆無紀律我以數十萬衆修軍政任將帥相時而動其勢有不足平者克仁頓首曰主上神武當定天下於一矣嘗閲漢書濂與克仁侍太祖曰漢治道不純者何克仁對曰王霸雜故也太祖曰誰執其咎克仁曰責在高祖太祖曰高祖創業遭秦滅學民憔悴甫蘇禮樂之事固所未講孝文為令主正當制禮作樂以復三代之舊乃逡巡未遑使漢業終於如是帝王之道貴不違時三代之王有其時而能為之漢文有其時而不為周世宗則無其時而為之者也又嘗問克仁漢高起徒步為萬乘主所操何道克仁對曰知人善任使太祖曰項羽南面稱孤仁義不施而自矜功伐高祖知其然承以柔遜濟以寬仁卒以勝之今豪傑非一我守江左任賢撫民以觀天下之變若徒與角力則猝難定也及徐達等下淮東西又謂克仁曰壬辰之亂生民塗炭中原諸將孛羅擁兵犯闕亂倫干紀行已夷滅擴廓挾太子以稱戈急私讐無敵愾之志思齊輩碌碌竊據一方民受其害士誠外假元名反覆兩端明玉珍父子據蜀僭號喜於自用而無遠謀觀其所為皆不能有成豫揆天時審人事有可定之機今師西出襄樊東踰淮泗首尾相應擊之必勝大事可成天下不難定既定之後生息猶難方勞思慮耳克仁侍帷幄最久故獲聞太祖謀略居多洪武二年四月命克仁等授諸子經功臣子弟亦令入學已出知江州入為參議坐事死贊曰太祖起布衣經營天下渡江以來規模宏遠聲教風馳雖曰天授抑亦左右丞弼多國士之助歟陳遇見禮不下劉基而超然利祿之外葉兌於天下大計籌之審矣亦能抗節肥遁其高致均非人所易及孔克仁無可稱述以太祖之雄謀大略具其事中故列於篇
