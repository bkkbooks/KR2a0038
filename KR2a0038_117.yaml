body:
  text: 明史卷一百十七列傳第五諸王二太祖諸子二蜀王椿湘王柏代王桂襄垣王遜燂靈丘王遜烇成𨨣廷鄣肅王楧遼王植慶王寧王權蜀獻王椿太祖第十一子洪武十一年封十八年命駐鳳陽二十三年就藩成都性孝友慈祥博綜典籍容止都雅帝嘗呼為蜀秀才在鳳陽時闢西堂延李叔荊蘇伯衡商榷文史既至蜀聘方孝孺為世子傅表其居曰正學以風蜀人詣講郡學知諸博士貧分祿餼之月一石後為定制造安車賜長史陳南賓聞義烏王紳賢聘至待以客禮紳父禕死雲南往求遺骼資給之時諸王皆備邊練士卒椿獨以禮教守西陲番人入寇燒黑崖關椿請於朝遣都指揮瞿能隨涼國公藍玉出大渡河邀擊之自是番人讋伏前代兩川之亂皆因內地不逞者鉤致為患有司私市蠻中物或需索啓爭端椿請繒錦香扇之屬從王邸定為常貢此外悉免宣索蜀人由此安業日益殷富川中二百年不被兵革椿力也成祖即位來朝賜豫倍諸藩谷王橞椿母弟也圖不軌椿子悅燇獲咎於椿走橞所橞稱為故建文君以詭衆永樂十四年椿暴其罪帝報曰王此舉周公安王室之心也入朝賚金銀繒綵巨萬二十一年薨世子悅先卒孫靖王友堉嗣初華陽王悅謀奪嫡椿覺之會有他過杖之百將械於朝友堉為力請得釋椿之薨友堉方在京師悅竊王帑友堉歸不問悅更誣奏友堉怨誹成祖召入訊之會崩仁宗察其誣命歸藩召悅悅猶執奏仁宗抵其章於地遷之武岡復遷澧州宣德五年總兵官陳懷奏都司私遺蜀邸炮用以警夜非制詔逮都司首領官明年獻還二護衛從之是年薨妃李侍姬黃皆自經以殉無子弟僖王友由羅江王嗣九年薨獻王第五子和王悅由保寧王嗣天順五年薨繼妃徐氏年二十六不食死諡靜節子定王友垓嗣七年薨子懷王申鈘嗣成化七年薨弟惠王申鑿嗣弘治六年薨子昭王賓瀚嗣正德三年薨子成王讓栩嗣自椿以下四世七王幾百五十年皆檢飭守禮法好學能文孝宗稱蜀多賢王舉獻王家範為諸宗法讓栩尤賢明喜儒雅不邇聲伎創義學修水利振災恤荒嘉靖十五年巡撫都御史吳山巡按御史金粲以聞賜敕嘉獎署坊表曰忠孝賢良二十年建太廟獻黃金六十斤白金六百斤酬以玉帶幣帛二十六年薨子康王承爚嗣三十七年薨子端王宣圻嗣萬曆四十年薨子恭王奉銓嗣四十三年薨子至澍嗣崇禎末京師陷蜀尚無恙未幾張獻忠陷成都合宗被害至澍率妃妾投於井湘獻王柏太祖第十二子洪武十一年封十八年就藩荊州性嗜學讀書每至夜分開景元閣招納俊乂日事校讐志在經國喜談兵膂力過人善弓矢刀槊馳馬若飛三十年五月同楚王楨討古州蠻每出入縹囊載書以隨遇山水勝境輒徘徊終日尤善道家言自號紫虛子建文初有告柏反者帝遣使即訊柏懼無以自明闔宮焚死諡曰戾王無子封除永樂初改諡獻置祠官守其園代簡王桂太祖第十三子洪武十一年封豫王二十五年改封代是年就藩大同糧餉艱遠令立衛屯田以省轉運明年詔帥護衛兵出塞受晉王節制桂性暴建文時以罪廢為庶人成祖即位復爵永樂元年正月還舊封十一月賜璽書曰聞弟縱戮取財國人甚苦告者數矣且王獨不記建文時耶尋命有司自今王府不得擅役軍民斂財物聽者治之已復有告其不軌者賜敕列其三十二罪召入朝不至再召至中途遣還革其三護衛及官屬王妃中山王徐達女仁孝文皇后妹也驕妒嘗漆桂二侍女為癩事聞帝以中山王故不罪桂移怒世子遜煓出其母子居外舍桂已老尚時時與諸子遜炓遜焴窄衣禿帽遊行市中袖錘斧傷人王府教授楊普上言遜炓狎軍人武亮與博戲致箠殺軍人朝廷杖治亮降敕責戒稍斂戢十六年四月復護衛及官屬正統十一年桂薨世子遜煓先卒孫隱王仕嗣景泰中嘗上言總兵官郭登守城功朝廷為勞登天順七年薨子惠王成鍊嗣弘治二年薨子聰沫先封武邑王以肆酒革爵已居惠王喪益淫酗廢為庶人遷太原久之惠王妃為疏理復封武邑王卒子懿王俊杖襲封代王嘉靖三年大同軍叛圍王宮俊杖走免事平賜書慰問六年薨子昭王充耀嗣十二年大同軍又叛充耀走宣府再賜慰問事平返國奏亂賊既除軍民交困乞遣大臣振撫詔允行二十四年和川奉國將軍充灼坐罪奪祿怨充耀不為解乃與襄垣中尉充謀引敵入大同殺王會應州人羅廷璽等以白蓮教惑衆見充灼為妖言因畫策約奉小王子入塞藉其兵攻雁門取平陽立充灼為主事定即計殺小王子充灼然之先遣人陰持火箭焚大同草場五六所而令通蒙古語者衛奉闌出邊為總兵周尚文邏卒所獲並得其所獻小王子表鞫實以聞逮充灼等至京賜死焚其尸王府長史等官皆逮治總督侍郎翁萬達疏言大同狹瘠祿餉不支代宗日繁衍衆聚而貧且地近邊易生反側請量移和川昌化諸郡王於山陝隙地詔改遷於山西先是景泰間昌化王仕罈乞移封景帝不許至是乃遷代宗自簡至懿封郡王者凡二十有三而外徙者十王二十六年充耀薨子恭王廷崎嗣饒陽王充數以事侵廷崎恐得罪乃以陳邊事為名三十一年奏鎮巡官之罪世宗為黜巡撫都御史何思逮總兵官徐仁等充益驕遂與廷崎互訐前後勘官莫能判巡撫都御史侯鉞奏奪其祿充怒不承三十三年詔遣司禮少監王臻即訊充乃伏下法司錮高牆萬曆元年廷崎薨子定王鼐鉉嗣二十二年薨無子弟新寧王鼐鈞嗣薨子康王鼎渭嗣崇禎二年薨再傳至孫傳崇禎十七年三月李自成入大同闔門遇害襄垣王遜燂簡王第五子分封蒲州諸王就藩後非請命不得歲時定省遜燂念大同不置作思親篇詞甚悲切其後宗人聰瀺聰俊俊榷俊俊杓俊噤充焞皆嫻於文章俊噤字若訥尤博學有盛名不慕榮利姊陵川縣君適裴禹卿地震城崩禹卿死縣君以首觸棺嘔血卒年二十有一詔諡貞節靈丘王遜烇簡王第六子宣宗時封好學工詩尤善醫嘗施藥治瘟疫全活無算子仕孫成鈠曾孫聰滆三王皆以孝旌聰滆子俊格能文善書嘉靖時獻皇儲明堂二頌興獻帝后挽歌賜金帛聰滆嘗乞封其孫廷址為曾長孫禮官奏無故事帝以王壽考特許之已而復封廷址子鼐鐮為玄長孫聰滆薨年八十三鼐鐮襲高祖爵聰滆之從父成亦有孝行聰滆聞於朝賜金幣獎諭詔禮官自今宗室中孝行卓異如成者撫按疏聞又成𨨣者隰川王諸孫父仕坐罪幽鳳陽病死成𨨣微服走鳳陽視喪上疏自劾越禁乞負父骨歸葬澤州即不得願為庶人止墓側歲時省視詔許歸葬弟成鐎亦好學有志概嘉靖十三年上言雲中叛卒之變幸獲銷弭究其釁端實貪酷官吏激成之臣慮天下之禍隱於民心異日不獨雲中而已指陳切直帝下廷臣飭行時以其兄弟為二難焉萬曆二十年西夏弗寧山陰王俊柵奏詩八章寓規諷之旨代處塞上諸宗洊經禍亂其言皆憂深思遠有中朝士大夫所不及者廷鄣代府宗室也崇禎中為鞏昌府通判署秦州事有廉直聲十六年冬賊陷秦州被執使之跪叱曰我天朝宗姓頭可斷膝不可屈賊欲活之大呼曰今日惟求一死坐自若遂見害肅莊王楧太祖第十四子洪武十一年封漢王二十四年命偕衛谷慶寧岷五王練兵臨清明年改封肅又明年詔之國以陝西各衛兵未集命駐平涼二十八年始就藩甘州詔王理陝西行都司甘州五衛軍務三十年令督軍屯糧遇征伐以長興侯耿炳文從建文元年乞內徙遂移蘭州永樂六年以捶殺衛卒三人及受哈密進馬逮其長史官屬已又聽百戶劉成言罪平涼衛軍敕械成等京師十七年薨子康王瞻焰嗣宣德七年上一護衛府中被盜為榜募告捕者御史言非制罪其長史楊威瞻焰又請加歲祿敕曰洪武永樂間歲祿不過五百石莊王不言者以朝廷念遠地轉輸難故也仁考即位加五百石矣朕守祖制不敢違正統元年上言甘州舊邸改都司而先王墳園尚在乞禁近邸樵採從之天順三年上馬五百匹備邊豫直不受帝強豫之八年薨子簡王祿埤嗣成化十五年薨子恭王貢錝嗣嘉靖十五年薨世子真淤長孫弼桓皆早卒次孫定王弼桄嗣四十一年薨子縉炯先卒孫懷王紳堵嗣踰二年薨無子靖王第四子弼柿子輔國將軍縉以屬近宜嗣禮官言縉懷王從父不宜襲詔以本職理府事上冊寶罷諸官屬穆宗即位定王妃吳氏及延長王真等先後上言聖祖刈羣雄定天下報功之典有隆無替臣祖莊王受封邊境操練征戍屏衛天家不幸大宗中絶反拘於昭穆之次不及勳武繼絶之典非所以崇本支厚藩衛也下部議議以郡王理藩政帝不許隆慶五年特命縉嗣肅王設官屬之半萬曆十六年薨諡曰懿子憲王紳堯嗣四十六年薨子識鋐嗣崇禎十六年冬李自成破蘭州被執宗人皆死遼簡王植太祖第十五子洪武十一年封衛王二十五年改封遼明年就藩廣寧以宮室未成暫駐大凌河北樹柵為營帝命武定侯郭英為築城郭宮室英王妃父也督工峻急會高麗自國中至鴨緑江皆積粟帝慮其有陰謀而役作軍士艱苦令輟役至三十年始命都督楊文督遼東諸衛士繕治之增其雉堞以嚴邊衛復圖西北沿邊要害示植與寧王權諭之曰自東勝以西至寧夏河西察罕腦兒東勝以東至大同宣府開平又東南至大寧又東至遼東抵鴨緑江北至大漠又自雁門關外西抵黃河渡河至察罕腦兒又東至紫荊關又東至居庸關及古北口又東至山海衛凡軍民屯種地毋縱畜牧其荒曠地及山場聽諸王駙馬牧放樵採東西往來營駐因以時練兵防寇違者論之植在邊習軍旅屢樹軍功建文中靖難兵起召植及寧王權還京植渡海歸朝改封荊州永樂元年入朝帝以植初二於己嫌之十年削其護衛留軍校廚役三百人備使令二十二年薨子長陽王貴烚嗣初植庶子遠安王貴燮巴東王貴煊嘗告其父有異謀及父死又不奔喪仁宗即位皆廢為庶人正統元年府僚乞加王祿敕曰簡王得罪朝廷成祖特厚待仁宗朝加祿得支二千石宣宗又給旗軍三百人親親已至王素乖禮度府臣不匡正顧為王請乎不許三年巡撫侍郎吳政奏王不友諸弟待庶母寡恩捶死長史杜述居國多過召訊京師盡得其淫穢黷倫凶暴諸不法事明年四月廢為庶人守簡王園弟肅王貴𤊐嗣成化七年薨子靖王豪墭嗣十四年薨子惠王恩嗣弘治五年松滋王府諸宗人恩等闌入荊州府支歲祿恩禁之皆怨已儀賓袁鏞復誘恩等招羣小奪軍民商賈利恩發其事恩等愈怨謀殺王朝廷遣官按實幽恩等鳳陽謫戍其黨有差恩陰使送者刑梏之斃八十餘人不數日世子暴卒八年恩疽發背薨子恭王寵嗣與弟光澤王寵友愛飲食服御必俱寵有令德寵有事必咨之後行正德十六年薨子莊王致格嗣病不視事妃毛氏明書史沉毅有斷中外肅然賢聲聞天下嘉靖十六年致格薨子憲嗣以奉道為世宗所寵賜號清微忠教真人豫金印隆慶元年御史陳省劾憲諸不法事詔奪真人號及印明年巡按御史郜光先復劾其大罪十三命刑部侍郎洪朝選往勘具得其淫虐僭擬諸罪狀帝以憲宜誅念宗親免死廢為庶人錮高牆初副使施篤臣憾憲甚朝選至湖廣篤臣詐為憲書餽朝選因劫持之憲建白纛曰訟冤之纛篤臣驚曰王反矣使卒五百圍王宮朝選還朝實王罪不言王反大學士張居正家荊州故與憲有隙嫌朝選不坐憲反久之屬巡撫都御史勞堪羅織朝選死獄中其後居正死憲訟冤籍居正家而篤臣亦死遼國除諸宗隸楚藩以廣元王術為宗理慶靖王太祖第十六子洪武二十四年封二十六年就藩寧夏以餉未敷令駐慶陽北古韋州城就延安綏寧租賦二十八年詔王理慶陽寧夏延安綏德諸衛軍務三十年始建邸王好學有文忠孝出天性成祖善之令歲一至韋州度夏宣德初言寧夏卑濕水泉惡乞仍居韋不許令歲一往來如成祖時正統初寧夏總兵官史昭奏王沮邊務占靈州草場畜牧遣使由綏德草地往還煽惑土民章未下或告王閲兵造戎器購天文書疑皆昭為之三年上書請徙國避昭英宗不可貽書慰諭其年薨子康王秩煃嗣景泰元年以寧夏屢被兵乞徙內地不許成化五年薨子懹王邃嗣十五年薨弟莊王邃塀嗣弘治四年薨子恭王置錖嗣十一年薨子定王台浤嗣正德五年安化王置鐇反台浤稽首行君臣禮詔削護衛革祿三之一戍其承奉長史嘉靖三年台浤賄鎮守太監李昕總兵官种勛求為奏請復祿昕勛不納台浤銜之會寧夏衛指揮楊欽等得罪於巡撫都御史張璿謀藉王殺璿及勛事覺下都司按察司按治欽等誣台浤不軌璿以聞帝使太監扶安副都御史王時中等復按上言台浤他罪有之無謀不軌事詔廷臣定議坐前屈事置鐇蒙恩不悛煽構羣小謀害守臣廢為庶人留邸歲與米三百石以其叔父鞏昌王置銂攝府事置銂裁慶邸宮妃薪米取邸中金帛萬計台浤子鼒櫍幼失愛於父逃置銂所置銂造台浤謀逆謠語使寺人誘鼒櫍吟誦圖陷台浤自立懷王妃王氏奏置銂裁減衣食至不能自存豐林王台瀚亦欲陷置銂遂發其瀆亂人倫諸罪驗實廢為庶人幽高牆廷議謂台浤父子乖離徙台浤西安而封鼒櫍世子視府事十一年十月也十五年以兩宮徽號恩復台浤冠帶薨鼒櫍先卒弟惠王鼒枋嗣好學樂善以禮飭諸宗世宗賜之敕建坊表之寧夏築邊牆鼒枋出銀米佐工萬曆二年薨子端王倪嗣十六年薨子憲王伸域嗣十九年薨明年寧夏賊哱拜反王妃方氏匿其子帥鋅地窖中自經死時壽陽嗣王倪爋哱拜脅降之不屈為所囚鎮原王伸塇理府事謀襲賊弗克府中人皆被殺賊平御史劉芳譽言諸宗死節者俱應恤録方妃宜建祠旌表詔從之給銀一萬五千兩分振諸宗人帥鋅嗣薨子倬𠃘嗣崇禎十六年流賊破寧夏被執安塞王秩炅靖王季子也十二而孤母位氏誨之性通敏過目不忘善古文遇縉紳學士質難辨惑移日不倦所著有隨筆二十卷庶人置鐇祖秩炵靖王第四子也封安化王父邃墁鎮國將軍以置鐇襲王爵性狂誕相者言其當大貴巫王九兒教鸚鵡妄言禍福置鐇遂覬望非分寧夏指揮周昂千戶何錦丁廣衛學諸生孫景文孟彬史連輩皆往來置鐇所正德五年帝遣大理少卿周東度寧夏屯田東希劉瑾意以五十畝為一頃又畝斂銀為瑾賄敲撲慘酷戍將衛卒皆憤怨而巡撫都御史安惟學數杖辱將士妻將士銜刺骨置鐇知衆怒令景文飲諸武臣酒以言激之諸武臣多願從置鐇者又令人結平虜城戍將及素所厚張欽等會有邊警參將仇鉞副總兵楊英帥兵出防禦總兵官姜漢簡鋭卒六十人為牙兵令周昂領之遂與何錦定約四月五日置鐇設宴邀撫鎮官飲於第惟學東不至錦昂帥牙兵直入殺姜漢及太監李增鄧廣於坐分遣卒殺惟學東及都指揮楊忠於公署遂焚官府釋囚繫撤黃河渡船於西岸以絶渡者遣人招楊英仇鉞皆佯許之英率衆保王宏堡衆潰英奔靈州鉞引還置鐇奪其軍出金帛犒將士僞署何錦大將軍周昂丁廣副將軍張欽先鋒魏鎮楊泰等總兵都護令孫景文作檄以討劉瑾為名陝西總兵官曹雄聞變遣指揮黃正駐靈州檄楊英督靈州兵防黃河都指揮韓斌總兵官侯勳參將時源各以兵會英密使蒼頭報仇鉞為內應令史墉浮渡奪西岸船營河東焚大小二壩草置鐇懼令錦等出禦獨留昂守城使使召鉞鉞稱病昂來問疾鉞刺昂死令親兵馳置鐇第擊殺景文連等十餘人遂擒置鐇迎英衆入置鐇反十有八日而擒錦廣泰欽先後皆獲械送伏誅置鐇賜死諸子弟皆論死有孫鼒材逃出削髮為僧居永寧山中未幾為土僧所凌詣官言狀傳至京安化宮人左寶瓶在浣衣局使驗之咤曰此鼒材殿下也帝念其自歸免死安置鳳陽寧獻王權太祖第十七子洪武二十四年封踰二年就藩大寧大寧在喜峯口外古會州地東連遼左西接宣府為巨鎮帶甲八萬革車六千所屬𩽆顏三衛騎兵皆驍勇善戰權數會諸王出塞以善謀稱燕王初起兵與諸將議曰曩余巡塞上見大寧諸軍慓悍吾得大寧斷遼東取邊騎助戰大事濟矣建文元年朝議恐權與燕合使人召權權不至坐削三護衛其年九月江陰侯吳高攻永平燕王往救高退燕王遂自劉家口間道趨大寧詭言窮蹙來求救權邀燕王單騎入城執手大慟具言不得已起兵故求代草表謝罪居數日發洽不為備北平鋭卒伏城外吏士稍稍入城陰結三衛部長及諸戍卒燕王辭去權祖之郊伏兵起擁權行三衛彍騎及諸戍卒一呼畢集守將朱鑑不能禦戰歿王府妃妾世子皆隨入松亭關歸北平大寧城為空權入燕軍時時為燕王草檄燕王謂權事成當中分天下比即位王乞改南土請蘇州曰畿內也請錢塘曰皇考以豫五弟竟不果建文無道以王其弟亦不克享建寧重慶荊州東昌皆善地惟弟擇焉永樂元年二月改封南昌帝親製詩送之詔即布政司為邸瓴甋規制無所更已而人告權巫蠱誹謗事密探無驗得已自是日韜晦搆精廬一區鼓琴讀書其間終成祖世得無患仁宗時法禁稍解乃上書言南昌非其封國帝答書曰南昌叔父受之皇考已二十餘年非封國而何宣德三年請乞近郭灌城鄉土田明年又論宗室不應定品級帝怒頗有所詰責權上書謝過時年已老有司多齮齕以示威重權日與文學士相往還託志翀舉自號臞仙嘗奉敕輯通鑑博論二卷又作家訓六篇寧國儀範七十四章漢唐祕史二卷史斷一卷文譜八卷詩譜一卷其他注纂數十種正統十三年薨世子盤烒先卒孫靖王奠培嗣奠培善文辭而性卞急多嫌猜景泰七年弟弋陽王奠壏訐其反逆巡撫韓雍以聞帝遣官往讞不實時軍民連逮者六七百人會英宗復辟俱赦釋惟謫戍其教授游堅奠培由是憾守土官不為禮布政使崔恭積不平王府事多持不行奠培遂劾奏恭不法恭與按察使原傑亦奏奠培私獻惠二王宮人逼內官熊璧自盡按問皆實遂奪護衛踰三年而奠壏以有罪賜死初錦衣衛指揮逯杲聽詗事者言誣奠壏蒸母帝令奠培具實以聞復遣駙馬都尉薛桓與杲按問奠培奏無是事杲按亦無實帝怒責問杲杲懼仍以為實遂賜奠壏母子自盡焚其尸是日雷雨大作平地水深數尺衆咸冤之弘治四年奠培薨子康王覲鈞嗣十年薨子上高王宸濠嗣其母故娼也始生靖王夢蛇啖其室旦日鴟鳴惡之及長輕佻無威儀而善以文行自飾術士李自然李日芳妄言其有異表又謂城東南有天子氣宸濠喜時時詗中朝事聞謗言輒喜或言帝明聖朝廷治即怒武宗末年無子羣臣數請召宗室子子之宸濠屬疏顧深結左右於帝前稱其賢初宸濠賄劉瑾復所奪護衛瑾誅仍論奪及陸完為兵部尚書宸濠結嬖人錢寧臧賢為內主欲奏復大學士費宏執不可諸嬖人乘宏讀廷試卷取中旨行之宸濠益恣擅殺都指揮戴宣逐布政使鄭嶽御史范輅幽知府鄭巘宋以方盡奪諸附王府民廬責民間子錢強奪田宅子女養羣盜劫財江湖間有司不敢問日與致仕都御史李士實舉人劉養正等謀不軌副使胡世寧請朝廷早裁抑之宸濠連奏世寧罪世寧坐謫戍自是無敢言者正德十二年典儀閻順內官陳宣劉良間行詣闕上變寧賢等庇之不問宸濠疑出承奉周儀殺儀家及典仗查武等數百人巡撫都御史孫燧列其事中道為所邀不得達宸濠又賄錢寧求取中旨召其子司香太廟寧言於帝用異色龍箋加金報賜異色龍箋者故事所賜監國書箋也宸濠大喜列仗受賀復勒諸生父老奏闕下稱其孝且勤時邊將江彬新得幸太監張忠附彬欲傾寧賢乘間為帝言寧賢盛稱寧王陛下以為何如帝曰薦文武百執事可任使也薦藩王何為者忠曰賢稱寧王孝譏陛下不孝耳稱寧王勤譏陛下不勤耳帝曰然下詔逐王府人毋留闕下是時宸濠與士實養正日夜謀益遣姦人盧孔章等分布水陸孔道萬里傳報浹旬往返蹤跡大露朝野皆知其必反巡撫都御史孫燧七上章言之皆為所邀沮諸權姦多得宸濠金錢匿其事不以聞十四年御史蕭淮疏言宸濠諸罪謂不早制將來之患有不可勝言者疏下內閣大學士楊廷和謂宜如宣宗處趙府事遣勳戚大臣宣諭令王自新帝命駙馬都尉崔元都御史顏頤壽太監賴義持諭往收其護衛令還所奪官民田宸濠聞元等且至乃定計以己生辰日宴諸守土官詰旦皆入謝宸濠命甲士環之稱奉太后密旨令起兵入朝孫燧及副使許逵不從縛出斬之執御史王金主事馬思聰金山參議黃宏許效廉布政使胡廉參政陳杲劉棐僉事賴鳳指揮許金白昂等下獄參政王綸季斆僉事潘鵬師夔布政使梁宸按察使楊璋副使唐錦皆從逆以李士實劉養正為左右丞相王綸為兵部尚書集兵號十萬命其承奉涂欽與素所蓄羣盜閔念四等略九江南康破之馳檄指斥朝廷七月壬辰朔宸濠出江西留其黨宜春王拱內官萬鋭等守城自帥舟師蔽江下攻安慶汀贛巡撫僉都御史王守仁聞變與吉安知府伍文定等檄諸郡兵先後至乃使奉新知縣劉守緒破其墳廠伏兵戊申直攻南昌辛亥城破拱鋭等皆就擒宮人自焚死宸濠方攻安慶不克聞南昌破大恐解圍還守仁逆擊之乙卯遇於黃家渡賊兵乘風進薄氣驕甚文定及指揮余恩佯北誘賊趨利前後不相及知府邢珣徐璉戴德孺從後急擊文定帥還兵乘之賊潰斬溺萬計又別遣知府陳槐林瑊曾璵周朝佐復九江南康明日復戰官兵稍却文定士卒殊死鬬擒斬二千餘級宸濠乃退保樵舍明日官軍以火攻之宸濠大敗諸妃嬪皆赴水死將士焚死者三萬餘人宸濠及其世子郡王儀賓並李士實劉養正涂欽王綸等俱就擒宸濠自舉事至敗蓋四十有三日時帝聞宸濠反下詔暴其罪告宗廟廢為庶人逮繫尚書陸完嬖人錢寧臧賢等籍其家江彬張忠從臾帝親征至良鄉守仁捷奏至檄止之守仁已械繫宸濠等取道浙江帝留南京遣許泰朱暉及內臣張永張忠搜捕江西餘黨民不勝其擾檄守仁還江西守仁至杭州遇張永以俘付之使送行在十五年十二月帝受所獻俘回鑾至通州誅之封除初宸濠謀逆其妃婁氏嘗諫及敗歎曰昔紂用婦言亡我以不用婦言亡悔何及嘉靖四年弋陽王拱匱等言獻王惠王四服子孫所共祀非宸濠一人所自出如臣等皆得甄別守職業如故而二王不獲廟享臣竊痛之疏三上帝命弋陽王以郡王奉祀樂舞齊郎之屬半給之寧藩既廢諸郡王勢頡頏莫能一帝命拱匱攝府事卒樂安王拱欏攝拱欏奏以建安樂安弋陽三王分治八支著為令石城王奠堵惠王第四子性莊毅家法甚嚴靖王奠培與諸郡王交惡臨川弋陽皆被搆得罪奠堵獨謹約不能坐以過失子覲鎬孝友有令譽早卒孫宸浮嗣與母弟宸浦庶兄宸浼弟宸澅皆淫縱殺人弘治十二年互訐奏宸浮宸浦並革為庶人宸澅宸浼奪祿宸澅遂從宸濠反雷震死嘉靖二十四年復宸浮宸浦冠帶宸浼子拱梃上書為父澡雪亦還爵宸澅弟宸素方正宸濠欲屈之不得數使人火其居而諷諸宗資給之以示惠宸辭不受宸濠敗宸得免子輔國將軍拱概孫奉國將軍多曾孫鎮國中尉謀㙔三世皆端謹自好而謀㙔尤貫串羣籍通曉朝廷典故諸王子孫好學敦行自周藩中尉睦而外莫及謀㙔者萬曆二十二年廷議增設石城宜春管理命謀㙔以中尉理石城王府事得劾治不法者典藩政三十年宗人咸就約束暇則閉戶讀書著易象通詩故春秋戴記魯論箋及他書凡百十有二種皆手自繕寫黃汝亨為進賢令投謁抗禮劇談久之逡巡改席次日北面稱弟子人兩稱之病革猶與諸子說易子八人皆賢而好學從弟謀晋築室龍沙躬耕賦詩以終奉國將軍拱榣瑞昌王奠墠四世孫也父宸渠為宸濠纍逮繫中都兄拱枘請以身代拱榣佐之卒得白嘉靖九年上書請建宗學令宗室設壇墠行耕桑禮謹祀典加意恤刑皆得旨俞允捐田白鹿洞贍學者其後以議禮稱旨拱枘上大禮頌並賜敕褒諭諸子羣從多知名者多熅多以孝友著多煪多以秉禮嚴重稱多多煃多炘以善詞賦名而多熅與從兄多煡獨杜門却掃多購異書校讐以為樂萬曆中督撫薦理瑞昌王府事謝不起多煪父拱樛以宸濠事被逮多煪甫十餘齡哭走軍門乞以身代王守仁見而異之嘉靖二年疏訟父冤得釋歸復爵時諸郡王統於弋陽而瑞昌始王不祀多煪自謂小宗宜典宗祏請於朝特敕許焉乃益祭田修飭家政儼若朝典四子皆莊謹嗜學奉國將軍多煌惠王第五子弋陽王奠壏五世孫也孝友嗜學弋陽五傳而絶宗人舉多煌賢能敕攝府事瑞昌諸宗皆屬焉性廉靜寡欲淑人熊氏早卒不再娶獨處齊閣者二十六年萬曆四十一年撫按以行誼聞詔褒之會病卒詔守臣加祭一壇又多炡者亦奉國將軍穎敏善詩歌嘗變姓名出遊蹤跡遍吳楚晚病羸猶不廢吟誦卒門人私諡曰清敏先生子謀堚亦有父風時樂安輔國將軍多有詩癖與謀堚等放志文酒終其世
