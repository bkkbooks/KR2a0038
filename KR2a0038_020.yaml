body:
  text: 明史卷二十本紀第二十神宗一神宗範天合道哲肅敦簡光文章武安仁止孝顯皇帝諱翊鈞穆宗第三子也母貴妃李氏隆慶二年立為皇太子時方六歲性岐嶷穆宗嘗馳馬宮中諫曰陛下天下主獨騎而騁寧無銜橛憂穆宗喜下馬勞之陳皇后病居別宮每晨隨貴妃候起居后聞履聲輒喜為強起取經書問之無不響答貴妃亦喜由是兩宮益和六年五月穆宗崩六月乙卯朔日有食之甲子即皇帝位以明年為萬曆元年詔赦天下祀建文朝盡節諸臣於鄉有苗裔者卹錄庚午罷高拱丁丑高儀卒壬午禮部尚書呂調陽兼文淵閣大學士預機務秋七月丁亥初通漕運於密雲庚寅察京官己亥戒諭廷臣詔曰近歲以來士習澆漓官方刓缺詆老成為無用矜便佞為有才遂使朝廷威福之柄徒為人臣報復之資用是薄示懲戒餘皆曲貸諸臣宜祓除前愆共維新政若溺於故習背公徇私獲罪祖宗朕不敢赦庚子尊皇后曰仁聖皇太后貴妃曰慈聖皇太后八月戊午祀大社大稷九月甲午葬莊皇帝於昭陵冬十月己未侍郎王遴吳百朋汪道昆分閱邊防辛酉停刑十一月乙未河工成十二月辛酉振榆林延綏饑甲戌以大行未期罷明年元夕燈火及宮中宴萬曆元年春二月癸丑御經筵三月丙申詔內外官舉將材夏四月乙丑潮惠賊平庚午旱諭百官修省五月甲申詔內外官慎刑獄六月壬申振淮安水災秋七月河決徐州九月癸未振荊州承天及濟南災丙戌四川都掌蠻平癸卯停刑冬十一月庚辰命諸司立程限文簿以防稽緩十二月己未振遼東饑是年暹羅琉球入貢二年春正月甲午召見朝覲廉能官於皇極門二月甲寅振四川被寇諸縣三月癸巳賜孫繼臯等進士及第出身有差夏四月丙寅詔內外官行久任之法五月辛丑穆宗神主祔太廟八月己巳振山西災庚午振淮揚徐水災冬十月甲寅決囚丁卯視朝閱銓選閏十二月庚寅詔罷明年元夕燈火是年琉球入貢三年春正月丁未享太廟二月戊寅祀大社大稷辛巳詔南京職務清簡官不必備丙申始命日講官分直記注起居纂緝章奏臨朝侍班夏四月己巳朔日有食之既壬申書謹天戒任賢能親賢臣遠嬖佞明賞罰謹出入慎起居節飲食收放心存敬畏納忠言節財用十二事於座右以自警五月庚子淮揚大水詔察二府有司貪酷老疾者罷之六月戊辰浙江海溢戊寅命撫按官有司賢否一體薦劾不得偏重甲科是夏蘇松常鎮大水秋八月丙子禮部侍郎張四維為禮部尚書兼東閣大學士預機務丁丑河決高郵碭山戊子免淮揚鳳徐被水田租九月戊午京師地震冬十月丁卯地再震敕羣臣修省戊辰停刑十一月乙巳祀天於南郊十二月辛未詔罷明年元夕燈火是年安南琉球暹羅土魯番入貢四年春正月丁巳遼東巡按御史劉臺以論張居正逮下獄削籍夏五月戊申祀地於北郊六月庚辰復遣內臣督蘇杭織造秋七月丁酉諭吏戶二部清吏治蠲逋賦有差明年漕糧折收十之三壬寅遣御史督修江浙水利甲辰修泗州祖陵辛亥草灣河工成八月壬戌釋奠於先師孔子是秋河決崔鎮冬十月乙亥振徐州及豐沛睢寧金鄉魚臺單曹七縣水災蠲租有差是年安南琉球烏斯藏土魯番天方撒馬兒罕魯迷哈密入貢五年春正月己酉詔鳳陽淮安力舉營田二月乙丑振廣西饑三月乙巳賜沈懋學等進士及第出身有差夏五月癸巳廣東羅旁瑤平秋八月癸亥河復決崔鎮閏月乙酉朔日食陰雲不見九月己卯起復張居正冬十月乙巳以論張居正奪情杖編修吳中行檢討趙用賢員外郎艾穆主事沈思孝罷黜謫戍有差丁未杖進士鄒元標戍邊十一月癸丑以星變考察百官是年琉球入貢六年春正月築決河堤二月戊戌免兗青登萊所屬逋賦庚子立皇后王氏三月甲寅禮部尚書馬自強兼文淵閣大學士吏部侍郎申時行兼東閣大學士預機務甲子張居正葬父歸夏四月乙未免湖廣四川逋賦丙午詔戶部歲增金花銀二十萬兩六月乙未張居正還京師秋七月乙卯呂調陽致仕丙子詔江北諸府民年十五以上無田者官給牛一頭田五十畝開墾三年後起科九月庚午詔蘇州諸府開墾荒田六年後起科辛未停刑冬十月辛卯馬自強卒十一月辛酉祀天於南郊是年烏斯藏入貢七年春正月戊辰詔毀天下書院二月己丑遣使分閱邊防三月甲子免淮揚逋賦夏五月癸亥祀地於北郊六月辛卯覈兩畿山東陝西勳戚田賦秋七月壬子振蘇松水災蠲稅糧戊午京師地震是年烏斯藏入貢八年春二月辛未朔日有食之戊子耕耤田戊戌河工成三月辛亥奉兩宮皇太后如天壽山謁陵免所過田租甲寅還宮丁卯賜張懋修等進士及第出身有差夏閏四月庚申廣西八寨賊平冬十月辛丑汰內外冗官乙巳振蘇松常鎮饑十一月丙子詔度民田是年琉球入貢九年春正月庚午敕邊臣備警辛未裁諸司冗官癸酉土蠻犯錦州遊擊周之望敗沒己卯命翰林官日四人入直辛巳裁南京冗官甲申遼東總兵官李成梁襲敗土蠻於襖郎兔三月丙寅大閱是月土蠻犯遼陽副總兵曹簠禦之敗績夏四月丁酉振山西被災州縣乙卯振蘇松淮鳳徐宿災戶部進萬曆會計錄秋八月丁未揚州大水九月丁亥停刑冬十月己亥土蠻犯廣寧義州李成梁禦却之十一月丙戌振真定順德廣平災免稅糧是年裁各省冗官覈徭賦汰諸司冒濫冗費琉球安南土魯番天方撒馬兒罕魯迷哈密烏斯藏入貢十年春二月癸巳順義王俺答卒丁酉免天下積年逋賦三月庚申杭州兵變執巡撫吳善言丁卯兵部侍郎張佳胤巡撫浙江討定之丙子泰寧衞部長速把亥犯義州李成梁擊斬之己卯倭寇溫州夏四月戊子朔諭禮部令民及時農桑勿事游惰甲午寧夏土軍馬景殺參將許汝繼巡撫都御史晉應槐討誅之庚子以久旱敕修省五月庚申免先師孔子及宋儒朱熹李侗羅從彥蔡沈胡安國游酢真德秀劉子翬故大學士楊榮後裔賦役有差庚辰振畿內饑六月丁亥朔日有食之壬寅振太原平陽潞安饑乙巳前禮部書潘晟兼武英殿大學士吏部侍郎余有丁為禮部尚書兼文淵閣大學士預機務晟尋罷丙午張居正卒秋七月庚午振平慶延臨鞏饑九月丙辰以皇長子生詔赦天下甲子上兩宮皇太后徽號冬十月丙申蘇松大水蠲振有差十二月壬辰太監馮保謫奉御籍其家壬寅復建言諸臣職是年免畿內山西被災稅糧哈密烏斯藏入貢十一年春正月壬戌敕嚴邊備閏二月甲子俺答子乞慶哈襲封順義王緬甸寇永昌乙丑如天壽山謁九陵免所過田租庚午如西山謁恭讓章皇后景皇帝陵辛未還宮乙酉振臨鞏平延慶五府旱災免田租三月甲申追奪張居正官階庚子賜朱國祚等進士及第出身有差夏四月丁巳張四維以憂去己未吏部侍郎許國為禮部尚書兼東閣大學士預機務甲戌承天大雨江溢是月廣東羅定兵變五月我大清太祖高皇帝起兵征尼堪外蘭克圖倫城六月乙丑振承天漢陽鄖陽襄陽災秋八月丙辰免山西被災稅糧九月甲申如天壽山謁陵己丑還宮冬十月癸亥停刑辛未河南水災蠲振有差十一月己卯朔日有食之十二月庚午慈寧宮災敕修省是年琉球入貢十二年春二月丁卯京師地震己巳釋建文諸臣外親謫戍者後裔三月己亥減江西燒造瓷器夏四月乙卯籍張居正家丁巳遊擊將軍劉綎討平隴川賊五月甲午京師地震六月辛亥以雲南用兵免稅糧及逋賦秋八月丙辰榜張居正罪於天下家屬戍邊九月丙戌奉兩宮皇太后如天壽山謁陵己丑作壽宮辛卯還宮冬十月丁巳停刑丙寅免湖廣山東被災稅糧十一月己丑余有丁卒十二月甲辰前禮部侍郎王錫爵為禮部尚書兼文淵閣大學士吏部侍郎王家屏兼東閣大學士預機務癸亥罷開銀礦是年安南烏斯藏入貢十三年春正月辛卯四川建武所兵變擊傷總兵沈思學二月丁未南京地震京師自去年八月不雨至於是月庚午大雩三月甲申大雩己丑李成梁出塞襲把兒炒花大破之壬辰減杭州織造及尚衣監料銀尚寶司少卿徐貞明督治京畿水田夏四月丙午大雩戊申以旱詔中外理冤抑釋鳳陽輕犯及禁錮年久罪宗戊午步禱於南郊面諭大學士等曰天旱雖由朕不德亦天下有司貪婪剝害小民以致上干天和今後宜慎選有司蠲天下被災田租一年五月丙戌雨六月辛丑慈寧宮成壬寅建武所亂卒伏誅是月四川松茂番作亂秋八月己酉京師地震閏九月戊戌振淮鳳災癸卯如天壽山閱壽宮戊申還宮庚申停刑冬十二月丁卯汰惜薪司內官冗員是月順義王乞慶哈卒是年土魯番烏斯藏入貢十四年春二月癸未嚴外官餽遺三月戊戌以旱霾諭廷臣陳時政癸卯禁部曹言事罷治京畿水田癸丑賜唐文獻等進士及第出身有差戊午久旱敕修省夏四月癸酉京師地震六月癸未松茂番平是夏振直隸河南陝西及廣西潯柳平樂廣東瓊山等十二縣饑山西盜起秋七月癸卯振江西災戊申敕戶兵二部撫安災民嚴保甲是月淇縣賊王安聚衆流劫尋剿平之九月壬辰王家屏以憂去乙卯停刑己未發帑遣使振河南山東直隸陝西遼東淮鳳災冬十月丙寅禮部主事盧洪春以疏請謹疾杖闕下削籍十一月癸卯祀天於南郊是年土魯番入貢十五年春正月壬辰發帑振山西陝西河南山東諸宗室三月乙卯乞慶哈子撦力克襲封順義王夏四月京師旱大疫六月戊辰禁廷臣奢僭是月京師大雨振卹貧民秋七月江北蝗江南大水山西陝西河南山東旱河決開封蠲振有差八月庚申以災沴頻仍敕撫按官懲貪吏理冤獄蠲租振卹九月丁亥朔日當食陰雲不見己丑停刑冬十月庚申大學士申時行請發留中章奏十一月戊子鄖陽兵譟巡撫都御史李材罷是年哈密琉球烏斯藏入貢十六年春三月壬辰詔改景皇帝實錄去郕戾王號不果行山西陝西河南及南畿浙江並大饑疫夏四月振江北大名開封諸府饑五月四川建昌番作亂討平之乙巳以軍儲倉火及各省災傷敕內外官修省六月庚申京師地震甲子以災傷停減蘇杭織造秋七月乙卯免山東被災夏稅庚午定邊臣考績法八月乙未詔取太倉銀二十萬充閱陵賞費九月己未停刑庚申如天壽山閱壽宮甲子次石景山觀渾河乙丑還宮庚午甘肅兵變巡撫都御史曹子登罷是月青海部長他不囊犯西寧殺副將李魁冬十一月辛酉禁章奏浮冗是年烏斯藏入貢十七年春正月己酉朔日有食之丁巳太湖宿松賊劉汝國等作亂安慶指揮陳越討之敗死二月丙申吳淞指揮陳懋功討平之三月丙辰免陞授官面謝自是臨御遂簡癸亥雲南永昌兵變乙丑賜焦竑等進士及第出身有差夏四月己亥王家屏復入閣始興妖僧李圓朗作亂犯南雄有司討誅之六月甲申浙江大風海溢己丑永昌亂卒平乙巳南畿浙江大旱太湖水涸發帑金四十萬振之秋八月壬寅嚴匿名揭之禁冬十月癸未停刑癸卯黃河決口工成十二月己丑諭諸臣遇事勿得忿爭求勝是年安南烏斯藏入貢十八年春正月甲辰朔召見大學士申時行等於毓德宮出皇長子見之夏四月甲申振湖廣饑六月己卯免畿內被災夏稅甲申青海部長火落赤犯舊洮州副總兵李聯芳敗沒乙酉更定宗藩事例始聽無爵者得自便秋七月庚子朔日有食之乙丑召見閣臣議邊事命廷臣舉將材己巳兵部尚書鄭雒經略陝西四鎮及山西宣大邊務是月火落赤再犯河州臨洮總兵官劉承嗣敗績八月癸酉停撦力克市賞冬十月戊寅振臨洮被兵軍民十二月甲申遣廷臣九人閱邊是年安南入貢十九年春正月緬甸寇永昌騰越二月乙酉總兵官尤繼先敗火落赤餘衆於莽剌川閏三月丁丑以彗星見敕修省己卯責給事中御史風聞訕上各奪俸一年夏四月丙申享太廟是後廟祀皆遣代五月壬午四川四哨番作亂巡撫都御史李尚思討平之六月壬子王錫爵歸省秋七月癸未諭廷臣國是紛紜致大臣爭欲乞身此後有肆行誣衊者重治八月丁酉免河南被災田賦九月壬申許國致仕甲戌申時行致仕丁丑吏部侍郎趙志皐為禮部尚書前禮部侍郎張位為吏部侍郎並兼東閣大學士預機務冬十月癸巳京營軍官譁於長安門十二月甲午詔定戚臣莊田癸丑河套部敵犯榆林延綏總兵官杜桐敗之是年畿內蝗南畿浙江大水蠲振有差琉球入貢二十年春正月丙戌給事中孟養浩以言建儲杖闕下削籍三月戊辰寧夏致仕副總兵哱拜殺巡撫都御史黨馨副使石繼芳據城反辛未王家屏致仕壬申總督軍務兵部尚書魏學曾討寧夏賊戊寅賜翁正春等進士及第出身有差夏四月甲辰總兵官李如松提督陝西討賊軍務甲寅甘肅巡撫都御史葉夢熊帥師會魏學曾討賊撦力克擒賊叩關獻俘復還二年市賞五月倭犯朝鮮陷王京朝鮮王李奔義州求救六月丁未諸軍進次寧夏賊誘河套部入犯官軍擊却之秋七月癸酉免陝西逋賦甲戌副總兵祖承訓帥師援朝鮮與倭戰於平壤敗績甲申罷三邊總督魏學曾以葉夢熊代之尋逮學曾下獄八月乙巳兵部右侍郎宋應昌經略備倭軍務己酉詔天下督撫舉將材九月壬申寧夏賊平冬十月壬寅李如松提督薊遼保定山東軍務充防海禦倭總兵官救朝鮮是月振畿內浙江河南被災諸府蠲租有差十一月戊辰御午門受寧夏俘十二月甲午以寧夏賊平告天下是年暹羅土魯番入貢二十一年春正月甲戌李如松攻倭於平壤克之辛未王錫爵還朝辛巳詔並封三皇子為王廷臣力爭尋報罷壬午李如松進攻王京遇倭於碧蹄館敗績二月甲寅敕勞東征將士夏四月癸卯倭棄王京遁六月丁酉詔天下每歲夏月錄囚減釋輕繫如兩京例癸卯倭使小西飛請發秋七月癸丑召援朝鮮諸邊鎮兵還乙卯彗星見敕修省八月丙戌以災異敕戒內外諸臣修舉實政冬十月丙申停刑十二月丙辰薊遼總督顧養謙兼理朝鮮事召宋應昌李如松還是年振江北湖廣河南浙江山東饑河南礦賊大起烏斯藏入貢二十二年春正月己亥詔以各省災傷山東河南徐淮尤甚盜賊四起有司玩愒朝廷詔令不行自今以安民弭盜為撫按有司黜陟二月癸丑皇長子常洛出閤講學甲子遣使振河南免田租三月癸卯詔修國史夏四月己酉朔日有食之五月辛卯禮部尚書陳于陛南京禮部尚書沈一貫並兼東閣大學士預機務庚子王錫爵致仕六月己酉雷雨西華門災敕修省秋七月丙申河套部長卜失兔犯延綏是月延綏總兵官麻貴敗河套部敵於下馬關冬十月己未南京兵部右侍郎邢玠總督川貴軍務討播州宣慰使楊應龍丁卯詔倭使入朝是月炒花犯遼東總兵官董一元敗之是年琉球烏斯藏入貢二十三年春正月癸卯遣都督僉事李宗城指揮楊方亨封平秀吉為日本國王三月乙未賜朱之蕃等進士及第出身有差夏五月丁酉京師地震敕修省秋九月戊寅青海部長永邵卜犯甘肅參將達雲敗之乙酉詔復建文年號冬十一月辛未湖廣災蠲振有差十二月辛丑大學士趙志皐等請發留中章奏不報是年江北大水淮溢浸泗州祖陵二十四年春二月戊申麻貴襲河套部敗之三月乙亥乾清坤寧兩宮災敕修省壬辰下詔自責是月火落赤犯洮河總兵官劉綎破走之夏四月己亥李宗城自倭營奔還王京五月戊辰河套部敵犯甘肅總兵官楊濬擊破之庚午復議封倭命都督僉事楊方亨遊擊沈惟敬往六月振福建饑秋七月丁卯吏部尚書孫丕揚請發推補官員章疏不報戊寅仁聖皇太后崩乙酉始遣中官開礦於畿內未幾河南山東山西浙江陝西悉令開採以中官領之羣臣屢諫不聽閏八月乙丑朔日有食之丁卯大學士趙志皐請視朝發章奏罷採礦不報九月乙未楊方亨至日本平秀吉不受封復侵朝鮮乙卯葬孝安莊皇后是月河套部犯寧夏總兵官李如柏擊敗之是秋河決黃堌口冬十月丙子停刑乙酉始命中官榷稅通州是後各省皆設稅使羣臣屢諫不聽十二月乙亥陳于陛卒
