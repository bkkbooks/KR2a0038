body:
  text: 明史卷八十志第五十六食貨四鹽法茶法煮海之利歷代皆官領之太祖初起即立鹽法置局設官令商人販鬻二十取一以資軍餉既而倍征之用胡深言復初制丙午歲始置兩淮鹽官吳元年置兩浙洪武初諸産鹽地次第設官都轉運鹽使司六曰兩淮曰兩浙曰長蘆曰山東曰福建曰河東鹽課提舉司七曰廣東曰海北曰四川曰雲南雲南提舉司凡四曰黑鹽井白鹽井安寧鹽井五井又陝西靈州鹽課司一兩淮所轄分司三曰泰州曰淮安曰通州批驗所二曰儀真曰淮安鹽場三十各鹽課司一洪武時歲辦大引鹽三十五萬二千餘引弘治時改辦小引鹽倍之萬曆時同鹽行直隸之應天寧國太平揚州鳳陽廬州安慶池州淮安九府滁和二州江西湖廣二布政司河南之河南汝寧南陽三府及陳州正統中貴州亦食淮鹽成化十八年湖廣衡州永州改行海北鹽正德二年江西贛州南安吉安改行廣東鹽所輸邊甘肅延綏寧夏宣府大同遼東固原山西神池諸堡上供光祿寺神宮監內官監歲入太倉餘鹽銀六十萬兩兩浙所轄分司四曰嘉興曰松江曰寧紹曰溫台批驗所四曰杭州曰紹興曰嘉興曰溫州鹽場三十五各鹽課司一洪武時歲辦大引鹽二十二萬四百餘引弘治時改辦小引鹽倍之萬曆時同鹽行浙江直隸之松江蘇州常州鎮江徽州五府及廣德州江西之廣信府所輸邊甘肅延綏寧夏固原山西神池諸堡歲入太倉餘鹽銀十四萬兩明初置北平河間鹽運司後改稱河間長蘆所轄分司二曰滄州曰青州批驗所二曰長蘆曰小直沽鹽場二十四各鹽課司一洪武時歲辦大引鹽六萬三千一百餘引弘治時改辦小引鹽十八萬八百餘引萬曆時同鹽行北直隸河南之彰德衛輝二府所輸邊宣府大同薊州上供郊廟百神祭祀內府羞膳及給百官有司歲入太倉餘鹽銀十二萬兩山東所轄分司二曰膠萊曰濱樂批驗所一曰濼口鹽場十九各鹽課司一洪武時歲辦大引鹽十四萬三千三百餘引弘治時改辦小引鹽倍之萬曆時九萬六千一百餘引鹽行山東直隸徐邳宿三州河南開封府後開封改食河東鹽所輸邊遼東及山西神池諸堡歲入太倉餘鹽銀五萬兩福建所轄鹽場七各鹽課司一洪武時歲辦大引鹽十萬四千五百餘引弘治時增七百餘引萬曆時減千引其引曰依山曰附海依山納折色附海行本色神宗時亦改折色鹽行境內歲入太倉銀二萬二千餘兩河東所轄解鹽初設東場分司於安邑成祖時增設西場於解州尋復並於東正統六年復置西場分司弘治二年增置中場分司洪武時歲辦小引鹽三十萬四千引弘治時增八萬引萬曆中又增二十萬引鹽行陝西之西安漢中延安鳳翔四府河南之歸德懷慶河南汝寧南陽五府及汝州山西之平陽潞安二府澤沁遼三州地有兩見者鹽得兼行隆慶中延安改食靈州池鹽崇禎中鳳翔漢中二府亦改食靈州鹽歲入太倉銀四千餘兩給宣府鎮及大同代府祿糧抵補山西民糧銀共十九萬兩有奇陝西靈州有大小鹽池又有漳縣鹽井西和鹽井洪武時歲辦鹽西和十三萬一千五百斤有奇漳縣五十一萬五千六百斤有奇靈州二百八十六萬七千四百斤有奇弘治時同萬曆時三處共辦千二百五十三萬七千六百餘斤鹽行陝西之鞏昌臨洮二府及河州歲解寧夏延綏固原餉銀三萬六千餘兩廣東所轄鹽場十四海北所轄鹽場十五各鹽課司一洪武時歲辦大引鹽廣東四萬六千八百餘引海北二萬七千餘引弘治時廣東如舊海北萬九千四百餘引萬曆時廣東小引生鹽三萬二百餘引小引熟鹽三萬四千六百餘引海北小引正耗鹽一萬二千四百餘引鹽有生有熟熟貴生賤廣東鹽行廣州肇慶惠州韶州南雄潮州六府海北鹽行廣東之雷州高州廉州瓊州四府湖廣之桂陽郴二州廣西之桂林柳州梧州潯州慶遠南寧平樂太平思明鎮安十府田龍泗城奉議利五州歲入太倉鹽課銀萬一千餘兩四川鹽井轄鹽課司十七洪武時歲辦鹽一千一十二萬七千餘斤弘治時辦二千一十七萬六千餘斤萬曆中九百八十六萬一千餘斤鹽行四川之成都州順慶保寧夔州五府潼川嘉定廣安雅廣元五州縣歲解陝西鎮鹽課銀七萬一千餘兩雲南黑鹽井轄鹽課司三白鹽井安寧鹽井各轄鹽課司一五井轄鹽課司七洪武時歲辦大引鹽萬七千八百餘引弘治時各井多寡不一萬曆時與洪武同鹽行境內歲入太倉鹽課銀三萬五千餘兩成祖時嘗設交址提舉司其後交址失乃罷遼東鹽場不設官軍餘煎辦召商易粟以給軍凡大引四百斤小引二百斤鹽所産不同解州之鹽風水所結寧夏之鹽刮地得之淮浙之鹽熬波川滇之鹽汲井閩粵之鹽積鹵淮南之鹽煎淮北之鹽曬山東之鹽有煎有曬此其大較也有明鹽法莫善於開中洪武三年山西行省言大同糧儲自陵縣運至太和嶺路遠費煩請令商人於大同倉入米一石太原倉入米一石三斗給淮鹽一小引商人鬻畢即以原給引目赴所在官司繳之如此則轉運費省而邊儲充帝從之召商輸糧而與之鹽謂之開中其後各行省邊境多召商中鹽以為軍儲鹽法邊計相輔而行四年定中鹽例輸米臨濠開封陳橋襄陽安陸荊州歸州大同太原孟津北平河南府陳州北通州諸倉計道里近遠自五石至一石有差先後增減則例不一率視時緩急米直高下中納者利否道遠地險則減而輕之編置勘合及底簿發各布政司及都司衛所商納糧畢書所納糧及應支鹽數齎赴各轉運提舉司照數支鹽轉運諸司亦有底簿比照勘合相符則如數給與鬻鹽有定所刊諸銅版犯私鹽者罪至死偽造引者如之鹽與引離即以私鹽論成祖即位以北京諸衛糧乏悉停天下中鹽專於京衛開中惟雲南金齒衛楚雄府四川鹽井衛陝西甘州衛開中如故不數年京衛糧米充羡而大軍征安南多費甘肅軍糧不敷百姓疲轉運逮安南新附餉益難繼於是諸所召商中鹽他邊地復以次及矣仁宗立以鈔法不通議所以斂之之道戶部尚書夏原吉請令有鈔之家中鹽遂定各鹽司中鹽則例滄州引三百貫河東山東半之福建廣東百貫宣德元年停中鈔例三年原吉以北京官吏軍匠糧餉不支條上預備策言中鹽舊則太重商賈少至請更定之乃定每引自二斗五升至一斗五升有差召商納米北京戶部尚書郭敦言中鹽則例已減而商來者少請以十分為率六分支與納米京倉者四分支與遼東永平山海甘肅大同宣府萬全已納米者他處中納悉停之又言洪武中中鹽客商年久物故代支者多虛冒請按引給鈔十錠帝皆從之而命倍給其鈔甘肅寧夏大同宣府獨石永平道險遠趨中者少許寓居官員及軍餘有糧之家納米豆中鹽正統三年寧夏總兵官史昭以邊軍缺馬而延慶平涼官吏軍民多養馬乃奏請納馬中鹽上馬一匹與鹽百引次馬八十引既而定邊諸衛遞增二十引其後河州中納者上馬二十五引中減五引松潘中納者上馬三十五引中減五引久之復如初制中馬之始驗馬乃掣鹽既而納銀於官以市馬銀入布政司宗祿屯糧修邊振濟展轉支銷銀盡而馬不至而邊儲亦自此告匱矣於是召商中淮浙長蘆鹽以納之令甘肅中鹽者淮鹽十七浙鹽十三淮鹽惟納米麥浙鹽兼收豌豆青稞因淮鹽直貴商多趨之故令淮浙兼中也明初仍宋元舊制所以優恤戶者甚厚給草場以供樵採堪耕者許開墾仍免其雜役又給工本米引一石置倉於場歲撥附近州縣倉儲及兌軍餘米以待給兼支錢鈔以米價為準尋定鈔數淮浙引二貫五百文河間廣東海北山東福建四川引二貫竈戶雜犯死罪以上止豫杖計日煎鹽以贖後設總催多朘削竈戶至正統時竈戶貧困逋逃者多松江所負課六十餘萬民訴於朝命直隸巡撫周忱兼理鹽課忱條上鑄鐵釜恤鹵丁選總催嚴私販四事且請於每年正課外帶徵逋課帝從其請命分逋課為六以六載畢徵當是時商人有自永樂中候支鹽祖孫相代不得者乃議倣洪武中例而加鈔錠以償之願守支者聽又以商人守支年久雖減輕開中少有上納者議他鹽司如舊制而淮浙長蘆以十分為率八分給守支商曰常股二分收貯於官曰存積遇邊警始召商中納常股存積之名由此始凡中常股者價輕中存積者價重然人甚苦守支爭趨存積而常股壅矣景帝時邊圉多故存積增至六分中納邊糧兼納穀草秋青草秋青草三當穀草二廣東之鹽例不出境商人率市守關吏越市廣西巡撫葉盛以為任之則廢法禁之則病商請令入米餉邊乃許出境公私交利焉成化初歲洊災京儲不足召商於淮徐德州水次倉中鹽舊例中鹽戶部出榜召商無徑奏者富人呂銘等託勢要奏中兩淮存積鹽中旨允之戶部尚書馬昂不能執正鹽法之壞自此始勢豪多攙中商人既失利江南北軍民因造遮洋大船列械販鹽乃為重法私販窩隱俱論死家屬徙邊衛夾帶越境者充軍然不能遏止也十九年頗減存積之數常股七分而存積三分然商人樂有見鹽報中存積者爭至遂仍增至六分淮浙鹽猶不能給乃配支長蘆山東以給之一人兼支數處道遠不及親赴邊商輒貿引於近地富人自是有邊商內商之分內商之鹽不能速獲邊商之引又不賤售報中寢怠存積之滯遂與常股等憲宗末年閹宦竊勢奏討淮浙鹽無算兩淮積欠至五百餘萬引商引壅滯至孝宗時而買補餘鹽之議興矣餘鹽者竈戶正課外所餘之鹽也洪武初制商支鹽有定場毋許越場買補勤竈有餘鹽送場司二百斤為一引給米一石其鹽召商開中不拘資次給與成化後令商收買而勸借米麥以振貧竈至是清理兩淮鹽法侍郎李嗣請令商人買餘鹽補官引而免其勸借且停各邊開中俟逋課完日官為賣鹽三分價直二充邊儲而留其一以補商人未交鹽價由是以餘鹽補充正課而鹽法一小變明初各邊開中商人招民墾種築臺堡自相保聚邊方菽粟無甚貴之時成化間始有折納銀者然未嘗著為令也弘治五年商人困守支戶部尚書葉淇請召商納銀運司類解太倉分給各邊每引輸銀三四錢有差視國初中米直加倍而商無守支之苦一時太倉銀纍至百餘萬然赴邊開中之法廢商屯撤業菽粟翔貴邊儲日虛矣武宗之初以鹽法日壞令大臣王瓊張憲等分道清理而慶雲侯周壽壽寧侯張鶴齡各令家人奏買長蘆兩淮鹽引戶部尚書韓文執不可中旨許之織造太監崔杲又奏乞長蘆鹽一萬二千引戶部以半豫之帝欲全豫大學士劉健等力爭李東陽語尤切帝不悅健等復疏爭乃從部議權要開中既多又許買餘鹽一引有用至十餘年者正德二年始申截舊引角之令立限追繳而每引增納紙價及振濟米麥引價重而課壅如故矣先是成化初都御史韓雍於肇慶梧州清遠南雄立抽鹽廠官鹽一引抽銀五分許帶餘鹽四引引抽銀一錢都御史奏紘許增帶餘鹽六引抽銀六錢及是增至九錢而不復抽官引引目積滯私鹽通行乃用戶部郎中丁致祥請復紘舊法而他處商人夾帶餘鹽掣割納價惟多至三百斤者始罪之淮浙長蘆引鹽常股四分以給各邊主兵及工役振濟之需存積六分非國家大事邊境有警未嘗妄開開必邊臣奏討經部覆允未有商人擅請及專請淮鹽者弘治間存積鹽甚多正德時權幸遂奏開殘鹽改存積常股皆為正課且皆折銀邊臣緩急無備而勢要占中賣窩價增數倍商人引納銀八錢無所獲利多不願中課日耗絀姦黠者夾帶影射弊端百出鹽臣承中璫風旨復列零鹽所鹽諸目以假之世宗登極詔首命裁革未幾商人逯俊等夤緣近幸以增價為名奏買殘餘等鹽戶部尚書秦金執不允帝特令中兩淮額鹽三十萬引於宣府金言姦人占中淮鹽賣窩罔利使山東長蘆等鹽別無搭配積之無用虧國用誤邊儲莫此為甚御史高世魁亦爭之詔減淮引十萬分兩浙長蘆鹽給之金復言宣大俱重鎮不宜令姦商自擇便利但中宣府帝可之已而俊等請以十六人中宣府十一人中大同竟從其請嘉靖五年從給事中管律奏乃復常股存積四六分之制然是時餘鹽盛行正鹽守支日久願中者少餘鹽第領勘合即時支賣願中者多自弘治時以餘鹽補正課初以償逋課後令商人納價輸部濟邊至嘉靖時延綏用兵遼左缺餉盡發兩淮餘鹽七萬九千餘引於二邊開中自是餘鹽行其始尚無定額未幾兩淮增引一百四十餘萬每引增餘鹽二百六十五斤引價淮南納銀一兩九錢淮北一兩五錢又設處置科罰名色以苛斂商財於是正鹽未派先估餘鹽商竈俱困姦黠者藉口官買餘鹽夾販私煎法禁無所施鹽法大壞十三年給事中管懷理言鹽法之壞其弊有六開中不時米價騰貴召糴之難也勢豪大家專擅利權報中之難也官司科罰吏胥侵索輸納之難也下場挨掣動以數年守支之難也定價太昂息不償本取贏之難也私鹽四出官鹽不行市易之難也有此六難正課壅矣而司計者因設餘鹽以佐之餘鹽利厚商固樂從然不以開邊而以解部雖歲入距萬無益軍需嘗考祖宗時商人中鹽納價甚輕而竈戶煎鹽工本甚厚今鹽價十倍於前而工本不能十一何以禁私鹽使不行也故欲通鹽法必先處餘鹽欲處餘鹽必多減正價大抵正鹽賤則私販自息今宜定價每引正鹽銀五錢餘鹽二錢五分不必解赴太倉俱令開中關支餘鹽以盡收為度正鹽價輕既利於商餘鹽收盡又利於竈未有商竈俱利而國課不充者也事下所司戶部覆以為餘鹽銀仍解部如故而邊餉益虛矣至二十年帝以變亂鹽法由餘鹽敕罷之淮浙長蘆悉復舊法夾帶者割沒入官應變賣者以時估為準御史吳瓊又請各邊中鹽者皆輸本色然令甫下吏部尚書許讚即請復開餘鹽以足邊用戶部覆從之餘鹽復行矣先是十六年令兩浙僻邑官商不行之處山商每百斤納銀八分給票行鹽其後多侵奪正引官商課缺引壅二百萬候掣必五六載於是有預徵執抵季掣之法預徵者先期輸課不得私為去留執抵者執現在運鹽水程復持一引以抵一引季掣則以納課先後為序春不得遲於夏夏不得超於春也然票商納稅即掣賣預徵諸法徒厲引商而已靈州鹽池自史昭中馬之議行邊餉虧缺甘肅米直石銀五兩戶部因奏停中馬召商納米中鹽二十七年令開中者止納本色糧草三十二年令河東以六十二萬引為額合正餘鹽為一而革餘鹽名時都御史王紳御史黃國用議兩淮竈戶餘鹽每引官給銀二錢以充工本增收三十五萬引名為工本鹽令商人中額鹽二引帶中工本鹽一引抵主兵年例十七萬六千兩有奇從其請初淮鹽歲課七十萬五千引開邊報中為正鹽後益餘鹽納銀解部至是通前額凡一百五萬引額增三之一行之數年積滯無所售鹽法壅不行言事者屢陳工本為鹽贅疣戶部以國用方絀年例無所出因之不變江西故行淮鹽三十九萬引後南安贛州吉安改行廣鹽惟南昌諸府行淮鹽二十七萬引既而私販盛行袁州臨江瑞州則私食廣鹽撫州建昌私食福鹽於是淮鹽僅行十六萬引數年之間國計大絀巡撫馬森疏其害請於峽江縣建橋設關扼閩廣要津盡復淮鹽額稍增至四十七萬引未久橋毀增額二十萬引復除矣三十九年帝欲整鹽法乃命副都御史鄢懋卿總理淮浙山東長蘆鹽法懋卿嚴嵩黨也苞苴無虛日兩淮額鹽銀六十一萬有奇自設工本鹽增九十萬懋卿復增之遂滿百萬半年一解又搜括四司殘鹽共得銀幾二百萬一時詡為奇功乃立剋限法每卒一人季限獲私鹽有定數不及數輒削其雇役錢邏卒經歲有不得支一錢者乃共為私販以牟大利甚至劫估舶誣以鹽盜而執之流毒遍海濱矣嵩失勢巡鹽御史徐爌言兩淮鹽法曰常股曰存積曰水鄉共七十萬引有奇引二百斤納銀八分永樂以後引納粟二斗五升下場關支四散發賣商人之利亦什五焉近年正鹽之外加以餘鹽餘鹽之外又加工本工本不足乃有添單添單不足又加添引懋卿趨利目前不顧其後是誤國亂政之尤者方今災荒疊告鹽場淹沒若欲取盈百萬必至逃亡弦急欲絶不棘於此於是悉罷懋卿所增者四十四年巡鹽御史朱炳如奏罷兩淮工本鹽自葉淇變法邊儲多缺嘉靖八年以後稍復開中邊商中引內商守支末年工本鹽行內商有數年不得掣者於是不樂買引而邊商困因營求告掣河鹽河鹽者不上廩囷在河徑自超掣易支而獲利捷河鹽行則守支存積者愈久而內商亦困引價彌賤於是姦人專以收買邊引為事名曰囤戶告掣河鹽坐規厚利時復議於正鹽外附帶餘鹽以抵工本之數囤戶因得賤買餘鹽而貴售之邊商與內商愈困矣隆慶二年屯鹽都御史龐尚鵬疏言邊商報中內商守支事本相須但內商安坐邊商遠輸勞逸不均故掣河鹽者以惠邊商也然河鹽既行淮鹽必滯內商無所得利則邊商之引不售今宜停掣河鹽但別邊商引價自見引及起紙關引到司勘合別為三等定銀若干邊商倉鈔已到內商不得留難蓋河鹽停則淮鹽速行引價定則開中自多邊商內商各得其願矣帝從之四年御史李學詩議罷官買餘鹽報可是時廣西古田平巡撫都御史殷正茂請官出資本買廣東鹽至桂林發賣七萬餘包可獲利二萬二千有奇從之自嘉靖初復常股四分存積六分之制後因各邊多故常股存積並開淮額歲課七十萬五千餘引又增各邊新引歲二十萬萬曆時以大工搜遠年違沒廢引六十餘萬胥出課額之外無正鹽止令商買補餘鹽餘鹽久盡惟計引重科加煎飛派而已時兩淮引價餘銀百二十餘萬增至百四十五萬新引日益正引日壅千戶尹英請配賣沒官鹽可得銀六萬兩大學士張位等爭之二十六年以鴻臚寺主簿田應璧奏命中官魯保鬻兩淮沒官餘鹽給事中包見捷極陳利害不聽保既視事遂議開存積鹽戶部尚書楊俊民言明旨核沒官鹽而存積非沒官也額外加增必虧正課保奏不可從御史馬從騁亦爭之俱不聽保乃開存積八萬引引重五百七十斤越次超掣壓正鹽不行商民大擾而姦人𧔧起董璉吳應麒等爭言鹽利山西福建諸稅監皆領鹽課矣百戶高時夏奏浙閩餘鹽歲可變價三十萬兩巡撫金學曾勘奏皆罔疏入不省於是福建解銀萬三千兩有奇浙江解三萬七千兩有奇借名苛斂商困引壅戶部尚書趙世卿指其害由保因言額外多取一分則正課少一分而國計愈絀請悉罷無名浮課不報三十四年夏至明年春正額逋百餘萬保亦惶懼請罷存積引鹽保尋死有旨罷之而引斤不能減矣李太后薨帝用遺誥蠲各運司浮課商困稍蘇而舊引壅滯戶部上鹽法十議正行見引附銷積引以疏通之巡鹽御史龍遇奇立鹽政綱法以舊引附見引行淮南編為十綱淮北編為十四綱計十餘年則舊引盡行從之天啓時言利者恣搜括務增引超掣魏忠賢黨郭興治崔呈秀等巧立名目以取之所入無算論者比之絶流而漁崇禎中給事中黃承昊條上鹽政頗欲有所釐革是時兵餉方大絀不能行也初諸王府則就近地支鹽官民戶口食鹽皆計口納鈔自行關支而官吏食鹽多冒增口數有一官支二千餘斤一吏支五百餘斤者乃限吏典不得過十口文武官不過三十口大口鈔十二貫支鹽十二斤小口半之景泰三年始以鹽折給官吏俸糧以百四十斤當米一石京官歲遣吏下場恣為姦利錦衣吏益暴率聯巨艦私販有司不能詰巡鹽御史乃定百司食鹽數攟束以給吏禁毋下場納鈔僦挽費無所出吏多亡嘉靖中吏部郎中陸光祖言於尚書嚴訥疏請革之自後百司停支食鹽惟戶部及十三道御史歲支如故軍民計口納鈔者浙江月納米三升買鹽一斤而商賈持鹽赴官官為斂散追徵之急過於租賦正統時從給事中鮑輝言令民自買食鹽於商罷納米令且鬻十斤以下者勿以私鹽論而鹽鈔不除後條鞭法行遂編入正賦巡鹽之官洪永時嘗一再命御史視鹽課正統元年始命侍郎何文淵王佐副都御史朱與言提督兩淮長蘆兩浙鹽課命中官御史同往未幾以鹽法已清下敕召還後遂令御史視鹺依巡按例歲更代以為常十一年以山東諸鹽場隸長蘆巡鹽御史十四年命副都御史耿九疇清理兩淮鹽法成化中特遣中官王允中僉都御史高明整治兩淮鹽法明請增設副使一人判官二人孝宗初鹽法壞戶部尚書李敏請簡風憲大臣清理乃命戶部侍郎李嗣於兩淮刑部侍郎彭韶於兩浙俱兼都御史賜敕遣之弘治十四年僉都御史王璟督理兩淮鹽法正德二年兩淮則僉都御史王瓊閩浙則僉都御史張憲後惟兩淮賦重時遣大臣十年則刑部侍郎藍章嘉靖七年則副都御史黃臣三十二年則副都御史王紳至三十九年特命副都御史鄢懋卿總理四運司事權尤重自隆慶二年副都御史龐尚鵬總理兩淮長蘆山東三運司後遂無特遣大臣之事番人嗜乳酪不得茶則困以病故唐宋以來行以茶易馬法用制羌戎而明制尤密有官茶有商茶皆貯邊易馬官茶間徵課鈔商茶輸課略如鹽制初太祖令商人於産茶地買茶納錢請引引茶百斤輸錢二百不及引曰畸零別置由帖給之無由引及茶引相離者人得告捕置茶局批驗所稱較茶引不相當即為私茶凡犯私茶者與私鹽同罪私茶出境與關隘不譏者並論死後又定茶引一道輸錢千照茶百斤茶由一道輸錢六百照茶六十斤既又令納鈔每引由一道納鈔一貫洪武初定令凡賣茶之地令宣課司三十取一四年戶部言陝西漢中金州石泉漢陰平利西鄉諸縣茶園四十五頃茶八十六萬餘株四川巴茶三百十五戶茶二百三十八萬餘株宜定令每十株官取其一無主茶園令軍士薅采十取其八以易番馬從之於是諸産茶地設茶課司定稅額陝西二萬六千斤有奇四川一百萬斤設茶馬司於秦洮河雅諸州自碉門黎雅抵𩽆甘烏思藏行茶之地五千餘里山後歸德諸州西方諸部落無不以馬售者碉門永寧筠連所産茶名曰剪刀竹讎葉惟西番用之而商販未嘗出境四川茶鹽都轉運使言宜別立茶局徵其稅易紅纓氈衫米布椒蠟以資國用而居民所收之茶依江南給引販賣法公私兩便於是永寧成都筠連皆設茶局矣川人故以茶易毛布毛纓諸物以償茶課自定課額立倉收貯專用以市馬民不敢私採課額每虧民多賠納四川布政司以為言乃聽民採摘與番易貨又詔天全六番司民免其徭役專令蒸烏茶易馬初制長河西等番商以馬入雅州易茶由四川巖州衛入黎州始達茶馬司定價馬一匹茶千八百斤於碉門茶課司給之番商往復迂遠而給茶太多巖州衛以為言請置茶馬司於巖州而改貯碉門茶於其地且驗馬高下以為茶數詔茶馬司仍舊而定上馬一匹給茶百二十斤中七十斤駒五十斤三十年改設秦州茶馬司於西寧敕右軍都督曰近者私茶出境互市者少馬日貴而茶日賤啓番人玩侮之心檄秦蜀二府發都司官軍於松潘碉門黎雅河州臨洮及入西番關口外巡禁私茶之出境者又遣駙馬都尉謝達諭蜀王椿曰國家榷茶本資易馬邊吏失譏私販出境惟易紅纓雜物使番人坐收其利而馬入中國者少豈所以制戎狄哉爾其諭布政司都司嚴為防禁毋致失利當是時帝綢繆邊防用茶易馬固番人心且以強中國嘗謂戶部尚書郁新用陝西漢中茶三百萬斤可得馬三萬匹四川松茂茶如之販鬻之禁不可不嚴以故遣僉都御史鄧文鏗等察川陝私茶駙馬都尉歐陽倫以私茶坐死又製金牌信符命曹國公李景隆齎入番與諸番要約篆文上曰皇帝聖旨左曰合當差發右曰不信者斬凡四十一面洮州火把藏思囊日等族牌四面納馬三千五十匹河州必里衛西番二十九族牌二十一面納馬七千七百五匹西寧曲先阿端罕東安定四衛巴哇申中申藏等族牌十六面納馬三千五十匹下號金牌降諸番上號藏內府以為契三歲一遣官合符其通道有二一出河州一出碉門運茶五十餘萬斤獲馬萬三千八百匹太祖之馭番如此永樂中帝懷柔遠人遞增茶斤由是市馬者多而茶不足茶禁亦稍弛多私出境碉門茶馬司至用茶八萬餘斤僅易馬七十匹又多瘦損乃申嚴茶禁設洮州茶馬司又設甘肅茶馬司於陝西行都司地十三年特遣三御史巡督陝西茶馬太祖之禁私茶也自三月至九月月遣行人四員巡視河州臨洮碉門黎雅半年以內遣二十四員往來旁午宣德十年乃定三月一遣自永樂時停止金牌信符至是復給未幾番人為北狄所侵掠徙居內地金牌散失而茶司亦以茶少止以漢中茶易馬且不給金牌聽其以馬入貢而已先是洪武末置成都重慶保寧播州茶倉四所令商人納米中茶宣德中定官茶百斤加耗什一中茶者自遣人赴甘州西寧而支鹽於淮浙以償費商人恃文憑恣私販官課數年不完正統初都御史羅亨信言其弊乃罷運茶支鹽例令官運如故以京官總理之景泰中罷遣行人成化三年命御史巡茶陝西番人不樂御史馬至日少乃取回御史仍遣行人且令按察司巡察已而巡察不專兵部言其害乃復遣御史歲一更著為令又以歲飢待振復令商納粟中茶且令茶百斤折銀五錢商課折色自此始弘治三年御史李鸞言茶馬司所積漸少各邊馬耗而陝西諸郡歲稔無事易粟請於西寧河西洮州三茶馬司召商中茶每引不過百斤每商不過三十引官收其十之四餘者始令貨賣可得茶四十萬斤易馬四千匹數足而止從之十二年御史王憲又言自中茶禁開遂令私茶莫遏而易馬不利請停糧茶之例異時或兵荒乃更圖之部覆從其請四川茶課司舊徵數十萬斤易馬永樂以後番馬悉由陝西道川茶多浥爛乃令以三分為率一分收本色二分折銀糧茶停二年延綏飢復召商納糧草中四百萬斤尋以御史王紹言復禁止並罷正額外召商開中之例十六年取回御史以督理馬政都御史楊一清兼理之一清復議開中言召商買茶官貿其三之一每歲茶五六十萬斤可得馬萬匹帝從所請正德元年一清又建議商人不願領價者以半與商令自賣遂著為例永行焉一清又言金牌信符之制當復且請復設巡茶御史兼理馬政乃復遣御史而金牌以久廢卒不能復後武宗寵番僧許西域人例外帶私茶自是茶法遂壞番人之市馬也不能辨權衡止訂篦中馬篦大則官虧其直小則商病其繁十年巡茶御史王汝舟酌為中制每千斤為三百三十篦嘉靖三年御史陳講以商茶低偽悉徵黑茶地産有限乃第茶為上中二品印烙篦上書商名而考之旋定四川茶引五萬道二萬六千道為腹引二萬四千道為邊引芽茶引三錢葉茶引二錢中茶至八十萬斤而止不得太濫十五年御史劉良卿言律例私茶出境與關隘失察者並凌遲處死蓋西陲籓籬莫切於諸番番人恃茶以生故嚴法以禁之易馬以酬之以制番人之死命壯中國之籓籬斷胸奴之右臂非可以常法論也洪武初例民間蓄茶不得過一月之用弘治中召商中茶或以備振或以儲邊然未嘗禁內地之民使不得食茶也今減通番之罪止於充軍禁內地之茶使不得食又使商私課茶悉聚於三茶馬司夫茶司與番為鄰私販易通而禁復嚴於內郡是驅民為私販而授之資也以故大姦闌出而漏網小民負升斗而罹法今計三茶馬司所貯洮河足三年西寧足二年而商私課茶又日益增積久腐爛而無所用茶法之弊如此番地多馬而無所市吾茶有禁而不得通其勢必相求而制之之機在我今茶司居民竊易番馬以待商販歲無虛日及官易時而馬反耗矣請敕三茶馬司止留二年之用每年易馬當發若干正茶之外分毫毋得夾帶令茶價踴貴番人受制良馬將不可勝用且多開商茶通行內地官榷其半以備軍餉而河蘭階岷諸近番地禁賣如故更重通番之刑如律例洮岷河責邊備道臨洮蘭州責隴右分巡西寧責兵備各選官防守失察者以罷軟論奏上報可於是茶法稍飭矣御史劉崙總督尚書王以旗等請復給諸番金牌信符兵部議番族變詐不常北狄抄掠無已金牌亟給亟失殊損國體番人納馬意在得茶嚴私販之禁則番人自順雖不給金牌馬可集也若私販盛行吾無以繫其心制其命雖給金牌馬亦不至乃定議發勘合豫之其後陝西歲飢茶戶無所資頗逋課額三十六年戶部以全陝災震邊餉告急國用大絀上言先時正額茶易馬之外多開中以佐公家有至五百萬斤者近者御史劉良卿亦開百萬後止開正額八十萬斤並課茶私茶通計僅九十餘萬宜下巡茶御史議召商多中御史楊美益言歲祲民貧即正額尚多虧損安有贏羡今第宜守每年九十萬斤招番易馬之規凡通內地以息私販增開中以備振荒悉從停罷毋使與馬分利戶部以帑藏方匱請如弘治六年例易馬外仍開百萬斤召納邊鎮以備軍餉詔從之末年御史潘一桂言增中商茶頗壅滯宜裁減十四五又言松潘與洮河近私茶往往闌出宜停松潘引目申嚴入番之禁皆報可四川茶引之分邊腹也邊茶少而易行腹茶多而常滯隆慶三年裁引萬二千以三萬引屬黎雅四千引屬松潘諸邊四千引留內地稅銀共萬四千餘兩解部濟邊以為常五年令甘州倣洮河西寧事例歲以六月開中兩月內中馬八百匹立賞罰例商引一二年銷完者賞有差踰三年者罪之沒其附帶茶萬曆五年俺答發塞請開茶市御史李時成言番以茶為命北狄若得藉以制番番必從狄貽患匪細部議給百餘篦而勿許其市易自劉良卿弛內地之禁楊美益以為非其後復禁止十三年以西安鳳翔漢中不與番鄰開其禁招商給引抽十三入官餘聽自賣御史鍾化民以私茶之闌出多也請分任責成陝之漢中關南道督之府佐一人專駐魚渡壩川之保寧川北道督之府佐一人專駐雞猴壩率州縣官兵防守從之中茶易馬惟漢中保寧而湖南産茶其直賤商人率越境私販中漢中保寧者僅一二十引茶戶欲辦本課輒私販出邊番族利私茶之賤因不肯納馬二十三年御史李楠請禁湖茶言湖茶行茶法馬政兩弊宜令巡茶御史召商給引願報漢興保夔者準中越境下湖南者禁止且湖南多假茶食之刺口破腹番人亦受其害既而御史徐僑言漢川茶少而直高湖南茶多而直下湖茶之行無妨漢中漢茶味甘而薄湖茶味苦於酥酪為宜亦利番也但宜立法嚴核以遏假茶戶部折衷其議以漢茶為主湖茶佐之各商中引先給漢川畢乃給湖南如漢引不足則補以湖引報可二十九年陝西巡按御史畢三才言課茶徵輸歲有定額先因茶多餘積園戶解納艱難以此改折今商人絶迹五司茶空請令漢中五州縣仍輸本色每歲招商中五百引可得馬萬一千九百餘匹部議西寧河洮岷甘莊浪六茶司共易馬九千六百匹著為令天啓時增中馬二千四百匹明初嚴禁私販久而姦弊日生洎乎末造商人正引之外多給賞由票使得私行番人上駟盡入姦商茶司所市者乃其中下也番得茶叛服自由而將吏又以私馬竄番馬冒支上茶茶法馬政邊防於是俱壞矣其他産茶之地南直隸常廬池徽浙江湖嚴衢紹江西南昌饒州南康九江吉安湖廣武昌荊州長沙寶慶四川成都重慶嘉定夔瀘商人中引則於應天宜興杭州三批驗所徵茶課則於應天之江東瓜埠自蘇常鎮徽廣德及浙江河南廣西貴州皆徵鈔雲南則徵銀其上供茶天下貢額四千有奇福建建寧所貢最為上品有探春先春次春紫筍及薦新等號舊皆採而碾之壓以銀板為大小龍團太祖以其勞民罷造惟令採茶芽以進復上供戶五百家凡貢茶第按額以供不具載
