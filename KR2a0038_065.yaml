body:
  text: 明史卷六十五志第四十一輿服一大輅玉輅大馬輦小馬輦步輦大涼步輦板轎耕根車后妃車輿皇太子親王以下車輿公卿以下車輿傘蓋鞍轡有虞氏御天下車服以庸夏則黻冕致美商則大輅示儉成周有巾車典輅辨師司服之職天子以之表式萬邦而服車五乘下逮臣民漢承秦制御金根為乘輿服袀玄以承大祀東都乃有九斿雲罕旒冕絇屨之儀物踵事增華日新代異江左偏安玉輅棲寶鳳采旄銜金龍其服冕也或飾翡翠珊瑚雜珠豈古所謂法駕法服者哉唐武德間著車輿衣服之制上得兼下下不得擬上宋初袞冕不綴珠玉政和中詔修車輅並建旗常議禮局所釐定用為成憲元制郊祀則駕玉輅服袞冕巡幸或乘象轎四時質孫之服各隨其宜明太祖甫有天下考定邦禮車服尚質酌古通今合乎禮意迄於世宗藉田造耕根燕居服燕辨講武用武辨更為忠靖冠以風有位為保和冠以親宗藩亦一王之制也苦夫前代傘扇鞍勒之儀門戟旌節之屬咸別等威至宋加密明初儉德開基宮殿落成不用文石甃地以此坊民武臣猶有飾金龍於牀幔馬廄用九五間數而豪民亦或鎔金為酒器飾以玉珠太祖皆重懲其弊乃命儒臣稽古講禮定官民服舍器用制度歷代守之遞有禁例茲更以朝家册寶中外符信及宮室器用之等差附於後焉天子車輅明初大朝會則拱衛司設五輅於奉天門玉居中左金次革右象次木駕出則乘玉輅後有腰輿以八人載之其後太祖考周禮五輅以詢儒臣曰玉輅太侈何若祇用木輅博士詹同對曰孔子云乘殷之輅即木輅也太祖曰以玉飾車古惟祀天用之常乘宜用殷輅然祀天之際玉輅未備木輅亦未為不可參政張昶曰木輅戎輅也不可以祀天太祖曰孔子斟酌四代禮樂以為萬世法木輅寧不可祀祀在誠敬豈泥儀文洪武元年有司奏乘輿服御應以金飾詔用銅有司言費小不足惜太祖曰朕富有四海豈吝乎此第儉約非身先無以率下且奢泰之習未有不由小而至大者也六年命禮官考五輅制為木輅二乘一以丹漆祭祀用之一以皮鞔行幸用之是冬大輅成命更造大輅一象輅十中宮輅一後宮車十飾俱以鳳以將幸中立府故造之非常制也二十六年始定鹵簿大駕之制玉輅一大輅一九龍車一步輦一後罷九龍車永樂三年更定鹵簿大駕有大輅玉輅大馬輦小馬輦步輦大涼步輦板轎各一具服幄殿各一大輅高一丈三尺九寸五分廣八尺二寸五分輅座高四尺一寸有奇上平盤前後車櫺並雁翅及四垂如意滴珠板轅長二丈二尺九寸有奇紅髹鍍金銅龍頭龍尾龍鱗葉片裝釘平盤下方箱四周紅髹匡俱十二槅內飾緑地描金繪獸六麟狻猊犀象天馬天祿禽六鸞鳳孔雀朱雀翟鶴盤左右下有護泥板及車輪二貫軸一每輪輻十有八其輞皆紅髹抹金銅鈒花葉片裝釘輪內車心用抹金銅鈒蓮花瓣輪盤裝釘軸中䗿黃絨駕轅諸索輅亭高六尺七寸九分四柱長五尺八寸四分檻座皆紅髹前二柱創金柱首寶相花中雲龍文下龜文錦前左右有門高五尺一寸九分廣二尺四寸九分四周裝雕木沉香色描金香草板十二片門旁槅各二及明俱紅髹以抹金銅鈒花葉片裝釘槅編以黃線絛後紅髹屏風上雕描金雲龍五紅髹板創金雲龍一屏後地沉香色上四槅雕描金雲龍四其次雲板如之下三槅雕描金雲龍三其次雲板亦如之俱抹金銅鈒花葉片裝釘亭內黃線絛編紅髹匡軟座下蓮花墜石上施花毯紅錦褥席紅髹坐椅靠背上雕描金雲龍一下雕雲板一紅髹福壽板一並褥椅中黃織金椅靠坐褥四圍椅裙施黃綺帷幔亭外青綺緣邊紅簾十扇輅頂並圓盤高三尺有奇鍍金銅蹲龍頂帶仰覆蓮座垂攀頂黃線圓絛盤上以紅髹其下外四面地沉香色描金雲內四角地青繪五彩雲以青飾輅蓋亭內貼金斗栱承紅髹匡寶蓋鬬以八頂冒以黃綺謂之黃屋中並四周繡五彩雲龍九天輪三層皆紅髹上安雕木貼金邊耀葉板八十一片內緑地雕木貼金雲龍文三層間繪五彩雲襯板八十一片盤下四周黃銅釘裝施黃綺瀝水三層每層八十一摺間繡五彩雲龍文四角垂青綺絡帶各繡五彩雲升龍圓盤四角連輅坐板用攀頂黃線圓絛並貼金木魚輅亭前有左右轉角闌干二扇後一字帶左右轉角闌干一扇皆紅髹內嵌雕木貼金龍間以五彩雲三扇共十二柱柱首雕木貼金蹲龍及線金五彩蓮花抱柱闌干內四周布花毯亭後樹太常旗二以黃線羅為之皆十有二斿每斿內外繡升龍一左旗腰繡日月北斗竿首用鍍金銅龍首右旗腰繡黻字竿首用鍍金銅戟各綴抹金銅鈴二垂紅纓十二纓上施抹金銅寶蓋下垂青線錔踏梯一紅髹以抹金銅鈒花葉片裝釘行馬架二紅髹上有黃絨匾絛用抹金銅葉片裝釘有黃絹幰衣即遮塵油絹雨衣青氈衣及紅油合扇梯紅油托叉各一輅以二象駕之玉輅亦駕以二象制如大輅而無平盤下十二槅之飾輅亭前二柱飾以摶換貼金升龍屏風後無上四槅雲龍及雲板之飾天輪內用青地雕木飾玉色雲龍文而太常旗及踏梯行馬之類悉與大輅同大馬輦古者輦以人挽之周禮巾車后五輅其一輦車組挽然縣師有車輦之稽黍苗詩云我任我輦則臣民所乘亦名輦至秦始去其輪而制乃尊明諸輦有輪者駕以馬以別於步輦焉其制高一丈二尺五寸九分廣八尺九寸五分轅長二丈五寸有奇輦座高三尺四寸有奇餘同大輅輦亭高六尺四寸有奇紅髹四柱長五尺四寸有奇檻座高與輅同四周紅髹絛環板前左右有門高五尺有奇廣二尺四寸有奇門旁槅各二後槅三及明皆紅髹抹金銅鈒花葉片裝釘槅心編以黃線絛亭內制與大輅同第軟座上不用花毯而用紅毯亭外用紅簾十二扇輦頂並圓盤高二尺六寸有奇上下俱紅髹以青飾輦蓋其銅龍蓮座寶蓋黃屋及天輪輦亭制悉與大輅同太常旗踏梯行馬之屬亦同大輅駕以八馬備鞍韉鞦轡鈴纓之飾小馬輦視大馬輦高廣皆減一尺轅長一丈九尺有奇餘同大馬輦輦亭高五尺五寸有奇紅髹四柱長五尺四寸有奇檻座紅髹四周絛環板前左右有門高五尺廣二尺二寸有奇門旁槅各二及明後屏風壁板俱紅髹用抹金銅鈒花葉片裝釘亭底紅髹上施紅花毯紅錦褥席外用紅簾四扇駕以四馬餘同大馬輦步輦者古之步挽明制高一丈三尺二寸有奇廣八尺二寸有奇輦座高三尺二寸有奇四周雕木五彩雲渾貼金龍板十二片間以渾貼金仰覆蓮座下雕木線金五彩雲板十二片轅四紅髹中二轅長三丈五尺九寸左右二轅長二丈九尺五寸有奇俱以鍍金銅龍頭龍尾裝釘輦亭高六尺三寸有奇四柱長六尺二寸有奇檻座紅髹四周雕木沉香色描金香草板十二片抹金銅鈒花葉片裝釘前左右有門高五尺七寸有奇廣二尺四寸有奇門旁紅髹十字槅各二扇雕飾沉香色描金雲龍板八片下雲板如其數後紅髹屏風上雕沉香色描金雲龍五屏後雕沉香色描金雲龍板三片又雲板如其數俱用抹金銅鈒花葉片裝釘餘同馬輦惟紅簾用十扇輦頂並圓盤高二尺六寸有奇其蓮座輦蓋天輪幰衣之屬俱同馬輦大涼步輦高一丈二尺五寸有奇廣一丈二尺五寸有奇四面紅髹匡裝雕木五彩雲板二十片間以貼金仰覆蓮座下紅髹如意絛環板如其數紅髹轅六中二轅長四丈三尺五寸有奇左右二轅長四丈有奇外二轅長三丈六尺五寸有奇前後俱飾以雕木貼金龍頭龍尾輦亭高六尺五寸有奇廣八尺五寸有奇四柱紅髹前左右有門高五尺八寸有奇廣二尺五寸有奇四周描金香草板十二片門旁槅各二後槅三及明皆紅髹編以黃線絛亭底上施墊氈加紅錦褥並席紅髹坐椅一四周雕木沉香色描金寶相花靠背褥裙帷幔與馬輦同內設紅髹桌二紅髹闌干香桌一闌干四柱首俱雕木貼金蹲龍鍍金銅龍蓋香爐一並香匙箸瓶紅錦墩二外紅簾三扇輦頂高二尺七寸有奇又鍍金銅寶珠頂帶仰覆蓮座高一尺三寸有奇垂攀頂黃線圓絛四頂用丹漆上冒紅氈四垂以黃氈為如意雲黃氈緣條四周施黃綺瀝水三層每層百三十二摺間繡五彩雲龍文或用大紅羅冒頂以黃羅為如意雲緣條瀝水亦用黃羅頂下四周以紅氈為帷黃氈緣條四角鍍金銅雲四亭內寶蓋繡五龍頂以紅髹木匡冒以黃綺為黃屋頂心四周繡雲龍各一輦亭四角至輦座用攀頂黃線圓絛四並貼金木魚輦亭前左右轉角闌干二扇後一字帶轉角闌干一扇皆紅髹雕木渾貼金龍間以五彩雲板闌干內四周布席其闌干十二柱之飾及踏梯之屬俱與馬輦同轎者肩行之車宋中興以後皇后嘗乘龍肩輿又以征伐道路險阻詔百官乘轎名曰竹轎子亦曰竹輿元皇帝用象轎駕以二象至用紅板轎則自明始也其制高六尺九寸有奇頂紅髹近頂裝圓匡蜊房窗鍍金銅火焰寶帶仰覆蓮座四角鍍金銅雲𩽆轎杠二前後以鍍金銅龍頭龍尾裝釘有黃絨墜角索四周紅髹板左右門二用鍍金銅釘鉸轎內紅髹匡坐椅一福壽板一並褥椅內黃織金綺靠坐褥四周椅裙下鋪席並踏褥有黃絹轎衣油絹雨衣各一青氈衣紅氈緣條雲子嘉靖十三年謁廟帝及后妃俱乘肩輿出宮至奉天門降輿升輅隆慶四年設郊祀慶成宴帝乘板輿由歸極門出入皇極門至殿上降輿車駕之出有具服幄殿按周官大小次木架葦障上下四旁周以幄帟以象宮室明鹵簿載具服幄殿儀仗有黃帳房仍元制也帳並帷幕以黃木棉布為之上施獸吻柱竿紅髹竿首彩裝蹲獅氈頂耕根車世宗朝始造漢有耕車晉曰耕根車俱天子親耕所用嘉靖十年帝將耕藉田詔造耕根車禮官上言考大明集禮耕藉用宋制乘玉輅以耕根車載耒耜同行今考儀注順天府官奉耒耜及穜稑種置彩輿先於祭前二日而出今用耕根車以載耒耜宜令造車於祭祀日早進呈置耒耜先玉輅以行第稽諸禮書祇有圖式而無高廣尺寸宜依今置車式差小通用青質從之皇后輅一高一丈一尺三寸有奇平盤前後車檽並雁翅四垂如意滴珠板轅長一丈九尺六寸皆紅髹轅用抹金銅鳳頭鳳尾鳳翎葉片裝釘平盤左右垂護泥板及輪二貫軸一每輪輻十有八皆紅髹輞以抹金鈒花銅葉片裝釘輪內車轂用抹金銅鈒蓮花瓣輪盤裝釘軸中䗿黃絨駕轅諸索輅亭高五尺八寸有奇紅髹四柱檻座上沉香色描金香草板十二片前左右有門高四尺五寸有奇廣二尺四寸有奇門旁沉香色線金菱花槅各二下絛環板有明抹金銅鈒花葉片裝釘後紅髹五山屏風創金鸞鳳雲文屏上紅髹板創金雲文中裝雕木渾貼金鳳一屏後紅髹板俱用抹金銅鈒花葉片裝釘亭底紅髹上施紅花毯紅錦褥席紅髹坐椅一靠背雕木線金五彩裝鳳一上下香草雲板各一紅福壽板一並褥椅中黃織金綺靠坐褥四周有椅裙施黃綺帷幔或黃線羅外用紅簾十二扇前二柱創金上寶相花中鸞鳳雲文下龜文錦輅頂圓盤高二尺有奇抹金銅立鳳頂帶仰覆蓮座垂攀頂黃線圓絛四盤上紅髹下四周沉香色描金雲文內青地五彩雲文以青飾輅蓋內寶蓋紅髹匡鬬以八頂冒以黃綺頂心及四周繡鳳九並五彩雲文天輪三層紅髹上雕木貼金邊耀葉板七十二片內飾青地雕木五彩雲鸞鳳文三層間繪五彩雲襯板七十二片下四周黃銅裝釘上施黃綺瀝水三層間繡鸞鳳文四垂青綺絡帶繡鸞鳳各一圓盤四角連輅座板用攀頂黃線圓絛四輅亭前後有左右轉角闌干各二扇內嵌絛環板皆紅髹計十二柱柱首雕木紅蓮花線金青緑裝蓮花抱柱其踏梯行馬之屬與大馬輦同安車本周禮后五輅之一應劭漢官鹵簿圖有五色安車晉皇后乘雲母安車唐皇后安車制如金輅明皇后安車獨簡素其制高九尺七寸有奇平盤