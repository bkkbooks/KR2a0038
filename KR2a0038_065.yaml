許乘轎文官四品以下用帷轎者禁如例萬曆三年奏定勳戚及武臣不許用帷轎肩輿並交牀上馬至若破格殊典則宣德中少保黃淮陪遊西苑嘗乘肩輿入禁中嘉靖間嚴嵩奉詔苑直年及八旬出入得乘肩輿武臣則郭勛朱希忠特命乘肩輿扈南巡蹕後遂賜常乘焉皆非制也傘蓋之制洪武元年令庶民不得用羅絹涼傘但許用油紙雨傘三年令京城內一品二品用傘蓋其餘用雨傘十六年令尚書侍郎左右都御史通政使太常卿應天府尹國子祭酒翰林學士許張傘蓋二十六年定一品二品傘用銀浮屠頂三品四品用紅浮屠頂俱用黑色茶褐羅表紅絹𩹉三簷雨傘用紅油絹五品紅浮屠頂青羅表紅絹𩹉兩簷雨傘同四品六品至九品用紅浮屠頂青絹表紅絹𩹉兩簷雨傘俱用油紙三十五年官員傘蓋不許用金繡朱丹裝飾公侯駙馬伯與一品二品同成化九年令兩京官遇雨任用油傘其涼傘不許張於京城鞍轡之制洪武六年令庶民不得描金惟銅鐵裝飾二十六年定公侯一品二品用銀鋄鐵事件用描銀三品至五品用銀鋄鐵事件用油畫六品至九品用擺錫鐵事件用油畫三十五年官民人等馬頷下纓並鞦轡俱用黑色不許紅纓及描金嵌金天青朱紅裝飾軍民用鐵事件黑緑油
