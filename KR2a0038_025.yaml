亦名窺筩其制虛管層疊相套使可伸縮兩端俱用玻璃隨所視物之遠近以為長短不但可以窺天象且能攝數里外物如在目前可以望敵施砲有大用焉至於日晷星晷皆用措置得宜必須築臺以便安放帝命太監盧維寧魏國徵至局驗試用法明年天經又請造沙漏明初詹希元以水漏至嚴寒水凍輒不能行故以沙代水然沙行太疾未協天運乃以斗輪之外復加四輪輪皆三十六齒厥後周述學病其竅太小而沙易堙乃更制為六輪其五輪悉三十齒而微裕其竅運行始與晷協天經所請殆其遺意歟夫制器尚象乃天文家之首務然精其術者可以因心而作故西洋人測天之器其名未易悉數內渾蓋簡平二儀其最精者也其說具見全書茲不載極度晷影宣城梅文鼎曰極度晷影常相因知北極出地之高即可知各節氣午正之影測得各節氣午正之影亦可知北極之高然其術非易易也圭表之法表短則分秒難明表長則影虛而淡郭守敬所以立四丈之表用影符以取之也日體甚大豎表所測者日體上邊之影橫表所測者日體下邊之影皆非中心之數郭守敬所以於表端架橫梁以測之也其術可謂善矣但其影符之制用銅片鑽鍼芥之孔雖前低後仰以向太陽但太陽之高低每日不同銅片之欹側安能俱合不合則光不透臨時遷就而日已西移矣須易銅片以圓木左右用兩板架之如車軸然則轉動甚易更易圓孔以直縫而用始便也然影符止可去虛淡之弊而非其本必須正其表焉平其圭焉均其度焉三者缺一不可以得影三者得矣而人心有粗細目力有利鈍任事有誠偽不可不擇也知乎此庶幾晷影可得矣西洋之法又有進焉謂地半徑居日天半徑千餘分之一則地面所測太陽之高必少於地心之實高於是有地半徑差之加近地有清蒙氣能升卑為高則晷影所推太陽之高或多於天上之實高於是又有清蒙差之減是二差者皆近地多而漸高漸減以至於無地半徑差至天頂而無清蒙差至四十五度而無也崇禎初西洋人測得京省北極出地度分北京四十度周天三百六十度度六十分立算下同南京三十二度半山東三十七度山西三十八度陝西三十六度河南三十五度浙江三十度江西二十九度湖廣三十一度四川二十九度廣東二十三度福建二十六度廣西二十五度雲南二十二度貴州二十四度以上極度惟兩京江西廣東四處皆係實測其餘則據地圖約計之又以十二度度六十分之表測京師各節氣午正日影夏至三度三十三分芒種小暑三度四十二分小滿大暑四度十五分立夏立秋五度六分穀雨處暑六度二十三分清明白露八度六分春秋分十度四分驚蟄寒露十二度二十六分雨水霜降十五度五分立春立冬十七度四十七分大寒小雪二十度四十七分小寒大雪二十三度三十分冬至二十四度四分東西偏度以京師子午線為中而較各地所偏之度凡節氣之早晚月食之先後胥視此蓋人各以見日出入為東西為卯酉以日中為南為午而東方見日早西方見日遲東西相距三十度則差一時東方之午乃西方之巳西方之午乃東方之未也相距九十度則差三時東方之午乃西方之卯西方之午乃東方之酉也相距一百八十度則晝夜時刻俱反對矣東方之午乃西方之子西洋人湯若望曰天啟三年九月十五夜戌初初刻望月食京師初虧在酉初一刻十二分而西洋意大里雅諸國望在晝不見推其初虧在巳正三刻四分相差三時二刻八分以里差計之殆距京師之西九十九度半也故欲定東西偏度必須兩地同測一月食較其時刻若早六十分時之二則為偏西一度遲六十分時之二則為偏東一度節氣之遲早亦同今各省差數未得測驗據廣輿圖計里之方約略條列或不致甚舛也南京應天府福建福州府並偏東一度山東濟南府偏東一度十五分山西太原府偏西六度湖廣武昌府河南開封府偏西三度四十五分陝西西安府廣西桂林府偏西八度半浙江杭州府偏東三度江西南昌府偏西二度半廣東廣州府偏西五度四川成都府偏西十三度貴州貴陽府偏西九度半雲南雲南府偏西十七度右偏度載崇禎曆書交食曆指其時開局修曆未暇分測度數實多未確存之以備考訂云中星古今中星不同由於歲差而歲差之說中西復異中法謂節氣差而西西法謂星差而東然其歸一也今將李天經湯若望等所推崇禎元年京師昏旦時刻中星列於後春分戌初二刻五分昏北河三中寅正一刻一十分旦尾中清明戌初三刻十三分昏七星偏東四度昏旦時或無正中之星則取中前中後之大星用之距中三度以內者為時不及一刻可勿論四度以上去中稍遠故紀其偏度焉寅正初刻二分旦帝座中穀雨戌正一刻七分昏翼偏東七度寅初二刻八分旦箕偏東四度立夏戌正三刻二分昏軫偏東五度寅初初刻十三分旦箕偏西四度小滿亥初初刻十二分昏角中丑正三刻三分旦箕中芒種亥初一刻十二分昏大角偏西六度丑正二刻三分旦河鼓二中夏至亥初二刻五分昏房中丑正一刻一十分旦須女中小暑亥初一刻十二分昏尾中丑正二刻三分旦危中大暑亥初初刻十二分昏箕偏東七度丑正三刻三分旦營室中立秋戌正三刻二分昏箕中寅初三刻十三分旦婁偏東六度處暑戌正一刻七分昏織女一中寅初二刻八分旦婁中白露戌初三刻十三分昏河鼓二偏東四度寅正初刻二分旦昴偏東四度秋分戌初二刻五分昏河鼓二中寅正一刻十一分旦畢偏西五度寒露戌初初刻十四分昏牽牛中寅正三刻一分旦參四中霜降酉正三刻十一分昏須女偏西五度卯初初刻四分旦南河三偏東六度立冬酉正二刻一十分昏危偏東四度卯初一刻五分旦輿鬼中小雪酉正一刻十二分昏營室偏東七度卯初二刻二分旦張中大雪酉正一刻五分昏營室偏西八度卯初二刻一十分旦翼中冬至酉正一刻二分昏土司空中卯初二刻十三分旦五帝座中小寒酉正一刻五分昏婁中卯初二刻一十分旦角偏東五度大寒酉正一刻十三分昏天囷一中卯初二刻二分旦亢中立春酉正二刻一十分昏昴偏西六度卯初一刻五分旦氐中雨水酉正三刻十一分昏參七中卯初初刻四分旦貫索一中驚蟄戌初初刻十四分昏天狼中寅正三刻一分日心中分野周禮保章氏以星土辨九州之地所封之域皆有分星以觀妖祥唐貞觀中李淳風撰法象志因漢書十二次度數以唐州縣配而一行則以為天下山河之象存乎南北兩界其說詳矣洪武十七年大明清類天文分野書成頒賜秦晉二王其書大略謂晉天文志分野始角亢者以東方蒼龍為首也唐始女虛危者以十二支子為首也今始斗牛者以星紀為首也古言天者皆由斗牛以紀星故曰星紀是之取耳茲取其所配直隸十三布政司府州縣衞及遼東都司分星錄之斗三度至女一度星紀之次也直隸所屬之應天太平寧國鎮江池州徽州常州蘇州松江九府暨廣德州屬斗分鳳陽府壽滁六安三州泗州之盱眙天長二縣揚州府高郵通泰三州廬州府無為州安慶府和州皆斗分淮安府斗牛分浙江布政司所屬之杭州湖州嘉興嚴州紹興金華衢州處州寧波九府皆牛女分台州溫州二府斗牛須女分江西布政司所屬皆斗分福建布政司所屬皆牛女分廣東布政司所屬之廣州府亦牛女分惠州女分肇慶南雄二府德慶州皆牛女分潮州府牛分雷州瓊州二府崖儋萬三州高州府化州廣西布政司所屬梧州府之蒼梧藤岑溪容四縣皆牛女分女二度至危十二度玄枵之次也山東布政司所屬之濟南府樂安德濱三州皆危分泰安州青州府皆虛危分萊州府膠州登州府寧海州東昌府高塘州皆危分東平州之陽穀東阿平陰三縣北平布政司所屬之滄州皆須女虛危分危十三度至奎一度娵訾之次也河南布政司所屬之衞輝彰德懷慶三府北平之大名府開州山東東昌之濮州館陶冠臨清三縣東平州之汶上壽張二縣皆室壁分奎二度至胃三度降婁之次也山東濟寧府之兗州滕嶧二縣青州府之莒州安丘諸城蒙陰三縣濟南府之沂州直隸鳳陽府之泗邳二州五河虹懷遠三縣淮安府之海州桃源清河沭陽三縣皆奎婁分胃四度至畢六度大梁之次也北平之真定府昴畢分定冀二州皆昴分晉深趙三州皆畢分廣平順德二府皆昴分祁州昴畢分河南彰德府之磁州山東高唐州之恩縣山西布政司所屬之大同府應朔渾源蔚四州皆昴畢分畢七度至井八度實沈之次也山西之太原府石忻代平定保德岢嵐六州平陽府皆參分絳蒲吉隰解霍六州皆觜參分澤汾二州皆參分潞沁遼三州皆參井分井九度至柳三度鶉首之次也陝西布政司所屬之西安府同華乾耀邠五州鳳翔府隴州延安府鄜綏德葭三州漢中府金州臨洮平涼二府靜寧州皆井鬼分涇州鬼分慶陽府寧州鞏昌府階徽秦三州皆井鬼分四川布政司所屬惟綿州觜分合州參井分餘皆井鬼分雲南布政司所屬皆井鬼分柳四度至張十五度鶉火之次也河南之河南府陝州皆柳分南陽府鄧汝裕三州汝寧府之信陽羅山二縣開封府之均許二州陝西西安府之商縣華州之洛南縣湖廣布政司所屬德安府之隨州襄陽府之均州光化縣皆張分張十六度至軫九度鶉尾之次也湖廣之武昌府興國州荊州府歸夷陵荊門三州黃州府蘄州襄陽德安二府安陸沔陽二州皆翼軫分長沙府軫旁小星曰長沙應其地衡州府桂陽州永州府全道二州岳州常德二府澧州辰州府沅州漢陽府靖郴二州寶慶府武岡鎮遠二州皆翼軫分廣西所屬除梧州府之蒼梧藤容岑溪四縣屬牛女分餘皆翼軫分廣東之連州廉州府欽州韶州府皆翼軫分軫十度至氐一度壽星之次也河南之開封府角亢分鄭州氐分陳州亢分汝寧府光州懷慶府之孟濟源溫三縣直隸壽州之霍丘縣皆角亢氐分氐二度至尾二度大火之次也河南開封府之嵵太康儀封蘭陽四縣歸德睢二州山東之濟寧府皆房心分直隸鳳陽府之潁州房分徐宿二州壽州之蒙城縣潁州之亳縣皆房心分尾三度至斗二度析木之次也北平之北平府尾箕分涿通薊三州皆尾分霸州保定府皆尾箕分易安二州皆尾分河間府景州皆尾箕分永平府尾分灤州尾箕分遼東都指揮司尾箕分朝鮮箕分
