body:
  text: 明史卷二十五志第一天文一自司馬遷述天官而歷代作史者皆志天文惟遼史獨否謂天象昭垂千古如一日食天變既著本紀則天文志近於衍其說頗當夫周髀宣夜之書安天窮天昕天之論以及星官占驗之說晉史已詳又見隋志謂非衍可乎論者謂天文志首推晉隋尚有此病其他可知矣然因此遂廢天文不志亦非也天象雖無古今之異而談天之家測天之器往往後勝於前無以志之使一代制作之義泯焉無傳是亦史法之缺漏也至於彗孛飛流暈適背抱天之所以示儆戒者本紀中不可盡載安得不別志之明神宗時西洋人利瑪竇等入中國精於天文曆算之學發微闡奧運算制器前此未嘗有也茲掇其要論著於篇而實錄所載天象星變殆不勝書擇其尤異者存之日食備載本紀故不復書兩儀七政星黃赤宿度黃赤宮界儀象極度晷影東西偏度中星分野兩儀楚詞言圜則九重孰營度之渾天家言天包地如卵𩹉黃則天有九重地為渾圓古人已言之矣西洋之說既不背於古而有驗於天故表出之其言九重天也曰最上為宗動天無星辰每日帶各重天自東而西左旋一周次曰列宿天次曰填星天次曰歲星天次曰熒惑天次曰太陽天次曰金星天次曰水星天最下曰太陰天自星天以下八重天皆隨宗動天左旋然各天皆有右旋之度自西而東與蟻行磨上之喻相符其右旋之度雖與古有增減然無大異惟星之行即古歲差之度古謂星千古不移而黃道之節氣每歲西退彼則謂黃道終古不動而星每歲東行由今考之星實有動移其說不謬至於分周天為三百六十度命日為九十六刻使每時得八刻無奇零以之布算製器甚便也其言地圓也曰地居天中其體渾圓與天度相應中國當赤道之北故北極常現南極常隱南行二百五十里則北極低一度北行二百五十里則北極高一度東西亦然亦二百五十里差一度也以周天度計之知地之全周為九萬里也以周徑密率求之得地之全徑為二萬八千六百四十七里又九分里之八也又以南北緯度定天下之縱凡北極出地之度同則四時寒暑靡不同若南極出地之度與北極出地之度同則其晝夜永短靡不同惟時令相反此之春彼為秋此之夏彼為冬耳以東西經度定天下之衡兩地經度相去三十度則時刻差一辰若相距一百八十度則晝夜相反焉其說與元史札馬魯丁地圓之旨略同七政日月五星各有一重天其天皆不與地同心故其距地有高卑之不同其最高最卑之數皆以地半徑準之太陽最高距地為地半徑者一千一百八十二最卑一千一百零二太陰最高五十八最卑五十二填星最高一萬二千九百三十二最卑九千一百七十五歲星最高六千一百九十最卑五千九百一十九熒惑最高二千九百九十八最卑二百二十二太白最高一千九百八十五最卑三百辰星最高一千六百五十九最卑六百二十五若欲得七政去地之里數則以地半徑一萬二千三百二十四里通之又謂填星形如瓜兩側有兩小星如耳歲星四周有四小星遶行甚疾太白光有盈缺如月之弦望用窺遠鏡視之皆可悉睹也餘詳曆志星崇禎初禮部尚書徐光啟督修曆法上見界總星圖以為回回立成所載有黃道經緯度者止二百七十八星其繪圖者止十七座九十四星並無赤道經緯今皆崇禎元年所測黃赤二道經緯度畢具後又上赤道兩總星圖其說謂常現常隱之界隨北極高下而殊圖不能限且天度近極則漸狹而見界圖從赤道以南其度反寬所繪星座不合仰觀因從赤道中剖渾天為二一以北極為心一以南極為心從心至周皆九十度合之得一百八十度者赤道緯度也周分三百六十度者赤道經度也乃依各星之經緯點之遠近位置形勢皆合天象至於星循黃道右旋惟黃道緯度無古今之異而赤道經緯則歲歲不同然亦有黃赤俱差甚至前後易次者如觜宿距星唐測在參前三度元測在參前五分今測已侵入參宿故舊法先觜後參今不得不先參後觜不可強也又有古多今少古有今無者如紫微垣中六甲六星今止有一華蓋十六星今止有四傳舍九星今五天廚六星今五天牢六星今二又如天理四勢五帝內座天柱天大贊府大理女御內廚皆全無也天市垣之市樓六星今二太微垣之常陳七星今三郎位十五星今十長垣四星今二五諸侯五星全無也角宿中之庫樓十星今八亢宿中之折威七星今無氐宿中之亢池六星今四帝席三星今無尾宿中天龜五星今四斗宿中之鼈十四星今十三天籥農丈人俱無牛宿中之羅堰三星今二天田九星俱無女宿中之趙周秦代各二星今各一扶匡七星今四離珠五星今無虛宿中之司危司祿各二星今各一敗臼四星今二離瑜三星今二天壘城十三星今五危宿中之人五星今三杵三星今一臼四星今三車府七星今五天鈎九星今六天鈔十星今四蓋屋二星今一室宿中之羽林軍四十五星今二十六螣蛇二十二星今十五八魁九星今無壁宿中之天十星今三奎宿中之天溷七星今四畢宿中之天節八星今七咸池三星今無觜宿中之座旗九星今五井宿中之軍井十三星今五鬼宿中之外廚六星今五張宿中之天廟十四星今無翼宿中之東甌五星今無軫宿中之青丘七星今三其軍門土司空器府俱無也又有古無今有者策星旁有客星萬曆元年新出先大今小南極諸星古所未有近年浮海之人至赤道以南往往見之因測其經緯度其餘增入之星甚多並詳星表其論雲漢起尾宿分兩派一經天江南海市樓過宗人宗星涉天津至螣蛇一由箕斗天弁河鼓左右旗涉天津至車府而會於螣蛇過造父直趨附路閣道大陵天船漸下而南行歷五車天關司怪水府傍東井入四瀆過闕丘弧矢天狗之墟抵天社海石之南踰南船帶海山貫十字架蜜蜂傍馬腹經南門絡三角龜杵而屬於尾宿是為帶天一周以理推之隱界自應有雲漢其所見當不誣又謂雲漢為無數小星大陵鬼宿中積尸亦然考天官書言星漢皆金之散氣則星漢本同類得此可以相證又言昴宿有三十六星皆得之於窺遠鏡者凡測而入表之星共一千三百四十七微細無名者不與其大小分為六等內一等十六星二等六十七星三等二百零七星四等五百零三星五等三百三十八星六等二百一十六星悉具黃赤二道經緯度列表二卷入光啟所修崇禎曆書中茲取二十八宿距星及一二等大星存之其小而有名者間取一二備列左方十二宮星名黃道經度黃道緯度赤道經度從春分赤道緯度起算降婁壁宿一四度強北一十二度半強三百五十八度半強北一十二度太強壁宿二九度少弱北二十五度太弱三百六十五度少強北二十六度太奎宿一一十七度少強北一十五度少強九度強北二十五度少弱奎宿二一十五度半強北一十七度太強七度弱北二十二度少弱奎宿九二十五度少弱北二十六度弱一十二度少弱北三十三度太弱婁宿一二十八度太強北八度半弱二十三度半強北一十八度太強大梁天大將軍一九度強北二十七度太強二十五度半北四十三度少天囷一九度少弱南一十二度半強四十一度弱北二度少強胃宿一一十一度太強北一十一度少三十五度半強北二十六度強昴宿一二十四度太強北四度五十一度少強北二十三度弱天船三二十六度太弱北三十度強四十四度半弱北四十八度半弱卷舌五二十八度弱北一十二度弱五十二度半強北三十一度半弱實沈畢宿一三度少南三度六十一度太北一十八度少強畢宿五四度半強南五度太強六十三度太弱北一十五度太弱參宿一一十七度少南二十三度太弱七十八度少強南初度太弱參宿二一十八度少強南二十四度半強七十九度少強南一度半參宿三一十九度半南二十五度少強八十度半南二度少弱參宿四二十三度半強南一十六度太強八十三度太強北七度少強參宿五一十五度太南一十七度弱七十六度少強北六度弱參宿七一十一度太弱南三十一度太弱七十三度少弱南八度太觜宿一一十八度半強南一十三度半弱七十八度太北九度太弱天皇大帝一十五度半北六十八度弱三百三十七度半強北八十四度少弱五車二一十六度太弱北二十二度太強七十二度少弱北四十五度少強丈人一一十七度少強南五十七度太弱八十一度太強南三十四度半五車五一十七度半弱北五度少強七十五度太弱北二十八度少子二二十度少強南五十九度太弱八十四度弱南三十六度少強勾陳大星二十三度半弱北六十六度六度半北八十七度少弱五車三二十六度少北二十一度半弱八十三度少弱北四十四度太強鶉首井宿一初度少弱南一度弱九十度強北二十二度太弱井宿三四度弱南六度太強九十四度強北一十六度太弱軍市一二度強南四十一度少強九十一度太強南一十七度太強天樞即北八度弱北六十七度少強一百九十九度少強北八十六度太弱極星老人八度半南七十五度九十四度半弱南五十一度半強狼星九度南三十九度少強九十七度少強南一十六度少弱北河二一十五度強北一十度強一百零七度少北三十二度太弱北河三一十八度強北六度太弱一百一十度太弱北二十九度弱南河三二十度太弱南一十六度弱一百一十度弱北六度強上台一二十六度少強北二十九度少一百二十五度強北四十九度太弱上台二二十七度半強北二十八度太弱一百二十七度半弱北四十八度太弱文昌一二十八度半弱北四十六度少強一百四十度少弱北六十五度強鶉火鬼宿一初度半強南初度太強一百二十三度弱北一十九度少強柳宿一五度少弱南一十二度半弱一百二十四度半強北七度弱弧矢一六度半南五十四度半一百一十五度弱南三十四度少弱帝星七度太弱北七十二度太強二百二十三度北七十五度太強弧矢南一八度太強南五十一度少一百一十七度半南三十一度半弱天樞一十度弱北四十九度太弱一百六十度強北六十三度太弧矢南五一十二度半南五十八度少強一百一十七度強南三十八度太天璇一十四度強北四十五度強一百五十九度太弱北五十八度半弱中台一一十四度少強北二十九度太強一百四十八度強北四十五度弱太子一十五度強北七十五度半弱二百三十一度半強北七十三度太弱中台二一十五度半弱北二十八度太一百四十八度太北四十三度半天社一二十一度少強南六十四度弱一百二十度弱南四十五度半強星宿一二十二度少弱南二十二度半弱一百三十七度少強南七度弱軒轅十二二十四度少強北八度太強一百四十九度太強北二十一度太弱軒轅十四二十四度太弱北初度半弱一百四十七度少弱北一十三度太強天璣二十五度少弱北四十七度強一百七十三度半弱北五十五度太強天權二十五度太強北五十一度半強一百七十九度少弱北五十九度強鶉尾張宿一初度半強南二十六度少弱一百四十三度少弱南一十二度半下台一一度少強北二十六度少一百六十四度半強北三十五度少弱下台二二度北二十五度弱一百六十四度少北三十三度太強右樞二度半強北六十六度半強二百零九度少弱北六十六度少強玉衡三度半強北五十四度少強一百八十九度強北五十八度少弱西上相六度強北一十四度少強一百六十三度半強北二十二度半強天記六度半弱南五十五度半一百三十九度半強南三十三度半開陽一十度少強北五十六度少強一百九十七度少弱北五十七度少弱五帝座