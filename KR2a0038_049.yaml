body:
  text: 明史卷四十九志第二十五禮三吉禮三社稷朝日夕月先農先蠶高禖祭告祈報神祇星辰靈星壽星司中司命司民司祿太歲月將風雲雷雨嶽鎮海瀆山川城隍社稷社稷之祀自京師以及王國府州縣皆有之其壇在宮城西南者曰太社稷明初建太社在東太稷在西壇皆北向洪武元年中書省臣定議周制小宗伯掌建國之神位右社稷左宗廟社稷之祀壇而不屋其制在中門之外外門之內尊而親之與先祖等然天子有三社為羣姓立者曰太社其自為立者曰王社又勝國之社屋之國雖亡而存之以重神也後世天子惟立太社太稷漢高祖立官太社太稷一歲各再祀光武立太社稷於洛陽宗廟之右春秋二仲月及臘一歲三祀唐因隋制並建社稷於含光門右仲春秋戊日祭之玄宗升社稷為大祀仍令四時致祭宋制如東漢時元世祖營社稷於和義門內以春秋二仲上戊日祭今宜祀以春秋二仲月上戊日是年二月太祖親祀太社太稷社配以后土西向稷配以后稷東向帝服皮辨服省牲通天冠絳紗袍行三獻禮初帝命中書省翰林院議創屋備風雨學士陶安言天子太社必受風雨霜露亡國之社則屋之不受天陽也建屋非宜若遇風雨則請於齊宮望祭從之三年於壇北建祭殿五間又北建拜殿五間以備風雨十年太祖以社稷分祭配祀未當下禮官議尚書張籌言按通典顓頊祀共工氏子句龍為后土后土社也烈山氏子柱為稷稷田正也唐虞夏因之此社稷所由始也商湯因旱遷社以后稷代柱欲遷句龍無可繼者故止然王肅謂社祭句龍稷祭后稷皆人鬼非地祇而陳氏禮書又謂社祭五土之祇稷祭五穀之神鄭康成亦謂社為五土總神稷為原隰之神句龍有平水土功故配社后稷有播種功故配稷二說不同漢元始中以夏禹配官社后稷配官稷唐宋及元又以句龍配社周棄配稷此配祀之制初無定論也至社稷分合至義書召誥言社於新邑孔注曰社稷共牢周禮封人掌設王之社壝注云不言稷者舉社則稷從之陳氏禮書曰稷非土無以生土非稷無以見生生之效故祭社必及稷山堂考索曰社為九土之尊稷為五穀之長稷生於土則社與稷固不可分其宜合祭古有明證請社稷共為一壇至句龍工氏之子也祀之無義商湯欲遷未果漢嘗易以夏禹而夏禹今已列祀帝王之次棄稷亦配先農請罷句龍棄配位謹奉仁祖淳皇帝配享以成一代盛典遂改作於午門之右社稷共為一壇初社稷列中祀及以仁祖配乃升為上祀具冕服以祭行奉安禮十一年春祭社稷行新定儀迎神飲福送神凡十二拜餘如舊建文時更奉太祖配永樂中北京社稷壇成制如南京洪熙後奉太祖太宗同配舊制上丁釋奠孔子次日上戊祀社稷弘治十七年八月上丁在初十日上戊在朔日禮官請以十一日祀社稷御史金洪劾之言如此則中戊非上戊矣禮部覆奏言洪武二十年嘗以十一日為上戊失不始今日命遵舊制仍用上戊嘉靖九年諭禮部天地至尊次則宗廟又次則社稷今奉祖配天又奉祖配社此禮官之失也宜改從皇祖舊制太社以句龍配太稷以后稷配乃以更正社稷壇配位禮告太廟及社稷遂藏二配位於寢廟更定行八拜禮其壇在西苑豳風亭之西者曰帝社稷東帝社西帝稷皆北向始名西苑土穀壇嘉靖十年帝謂土穀壇亦社稷耳何以別於太社稷張璁等言古者天子稱王今若稱王社王稷與王府社稷名同前定神牌曰五土穀之神名義至當帝采帝藉之義改為帝社帝稷以上戊明日祭後改次戊次戊在望後則仍用上巳春告秋報為定制隆慶元年禮部言帝社稷之名自古所無嫌於煩數宜罷從之中都亦有太社壇洪武四年建取五方土以築直隸河南進黃土淅江福建廣東廣西進赤土江西湖廣陝西進白土山東進青土北平進黑土天下府縣千三百餘城各土百斤取於名山高爽之地王國社稷洪武四年定十一年禮臣言太社稷既同壇合祭王國各府州縣亦宜同壇稱國社國稷之神不設配位詔可十三年九月復定制兩壇一壝如初式十八年定王國祭社稷山川等儀行十二拜禮府州縣社稷洪武元年頒壇制於天下郡邑俱設於本城西北右社左稷十一年定同壇合祭如京師獻官以守禦武臣為初獻文官為亞獻終獻十三年溧水縣祭社稷以牛醢代鹿醢禮部言定制祭物缺者許以他物代帝曰所謂缺者以非土地所産溧水固有鹿是有司故為苟簡也百司所以能理其職而盡民事者以其常存敬懼之心耳神猶忽之於人事又何懼焉命論如律乃敕禮部下天下郡邑凡祭祀必備物苟非地産無從市鬻者聽其缺十四年令三獻皆以文職長官武官不與里社每里一百戶立壇一所祀五土五穀之神朝日夕月洪武三年禮部言古者祀日月之禮有六郊特牲曰郊之祭大報天而主日配以月一也玉藻曰朝日於東門之外祭義曰祭日於東郊祭月於西郊二也小宗伯肆類於四郊兆日於東郊兆月於西郊三也月令孟冬祈來年於天宗天宗日月之類四也覲禮拜日於東門之外反祀方明禮日於南門之外禮月於北門之外五也霜雪風雨之不時則禜日月六也說者謂因郊祀而祀之非正祀也類禜而祀之與覲諸侯而禮之非常祀也惟春分朝之於東門外秋分夕之於西門外者祀之正與常也蓋天地至尊故用其始而祭以二至日月次天地春分陽氣方永秋分陰氣向長故祭以二分為得陰陽之義自秦祭八神六曰月主七曰日主雍又有日月廟漢郊太乙朝日夕月改周法常以郊泰畤質明出行宮東向揖日西向揖月又於殿下東西拜日月宣帝於神山祠日萊山祠月魏明帝始朝日東郊夕月西郊唐以二分日朝日夕月於國城東西宋人因之升為大祀元郊壇以日月從祀其二分朝日夕月皇慶中議建立而未行今當稽古正祭之禮各設壇專祀朝日壇宜築於城東門外夕月壇宜築於城西門外朝日以春分夕月以秋分星辰則祔祭於月壇從之其祀儀與社稷同二十一年帝以大明夜明已從祀罷朝日夕月之祭嘉靖九年帝謂大報天而主日配以月大明壇當與夜明壇異且日月照臨其功甚大太歲等神歲有二祭而日月星辰止一從祭義所不安大學士張璁亦以為缺典遂定春秋分之祭如舊儀而建朝日壇於朝陽門外西向夕月壇於阜城門外東向壇制有隆殺以示別朝日護壇地一百畝夕月護壇地三十六畝朝日無從祀夕月以五星二十八宿周天星辰共一壇南向祔焉春祭時以寅迎日出也秋祭時以亥迎月出也十年禮部上朝日夕月儀朝日迎神四拜飲福受胙兩拜送神四拜夕月迎神飲福受胙送神皆再拜餘並如舊儀隆慶元年禮部議定東郊以甲丙戊庚壬年西郊以丑辰未戌年車駕親祭餘歲遣文大臣攝祭朝日壇武大臣攝祭夕月壇三年禮部上朝日儀言正祭遇風雨則設小次於壇前駕就小次行禮其升降奠獻俱以太常寺執事官代制曰可先農洪武元年諭廷臣以來春舉行藉田禮於是禮官錢用壬等言漢鄭玄謂王社在藉田之中唐祝欽明云先農即社宋陳祥道謂社自社先農自先農藉田所祭乃先農非社也至享先農與躬耕同日禮無明文惟周語曰農正陳藉禮而韋昭注云祭其神為農祈也至漢以藉田之日祀先農而其禮始著由晉至唐宋相沿不廢政和間命有司享先農止行親耕之禮南渡後復親祀元雖議耕藉竟不親行其祀先農命有司攝事今議耕藉之日皇帝躬祀先農禮畢躬耕藉田以仲春擇日行事從之二年二月帝建先農壇於南郊在藉田北親祭以后稷配器物祀儀與社稷同祀畢行耕藉禮御耒耜二具韜以青絹御耕牛四被以青衣禮畢還大次應天府尹及上元江寧兩縣令率庶人終畝是日宴勞百官耆老於壇所十年二月遣官享先農命應天府官率農民耆老陪祀二十一年更定祭先農儀不設配位永樂中建壇京師如南京制在太歲壇西南石階九級西瘞位東齊宮鑾駕庫東北神倉東南具服殿殿前為觀耕之所護壇地六百畝供黍稷及薦新品物地九十餘畝每歲仲春上戊順天府尹致祭後凡遇登極之初行耕藉禮則親祭弘治元年定耕藉儀前期百官致齊順天府官以耒耜及穜稑種進呈內官仍捧出授之由午門左出置綵輿鼓樂送至藉田所至期帝翼善冠黃袍詣壇所具服殿服袞冕祭先農畢還更翼善冠黃袍太常卿導引至耕藉位南向立三公以下各就位戶部尚書北向跪進耒耜順天府官北向跪進鞭帝秉耒三推三反訖戶部尚書跪受耒耜順天府官跪受鞭太常卿奏請復位府尹挾青箱以種子播而覆之帝御外門南向坐觀三公五推尚書九卿九推太常卿奏耕畢帝還具服殿升座府尹率兩縣令耆老人行禮畢引上中下農夫各十人執農器朝見令其終畝百官行慶賀禮賜酒饌三品以上丹陛上東西坐四品以下臺下坐並宴勞耆老於壇旁宴畢駕還宮大樂鼓吹振作農夫人賜布一匹嘉靖十年帝以其禮過煩命禮官更定迎神送神止行二拜先二日順天府尹以耒耜穜稑種置綵輿至耕藉所並罷百官慶賀後又議造耕根車載耒耜府尹於祭日進呈畢以耒耜載車內前玉輅行其御門觀耕地位卑下議建觀耕臺一詔皆可後又命墾西苑隙地為田建殿曰無逸亭曰豳風又曰省耕曰省斂倉曰裕禮部上郊廟粢盛支給之數因言南郊藉田皇上三推公卿各宣其力較西苑為重西苑雖農官督理皇上時省耕斂較藉田為勤請以藉田所出藏南郊圓廩神倉以供圜丘祈穀先農神祇壇長陵等陵歷代帝王及百神之祀西苑所出藏裕倉以供方澤朝日夕月太廟世廟太社稷帝社稷禘祫先蠶及先師孔子之祀從之十六年諭凡遇親耕則戶部尚書先祭先農皇帝至止行三推禮三十八年罷親耕惟遣官祭先農四十一年並令所司勿復奏隆慶元年罷西苑耕種諸祀皆取之藉田先蠶明初未列祀典嘉靖時都給事中夏言請改各宮莊田為親蠶廠公桑園令有司種桑柘以備宮中蠶事九年復疏言耕蠶之禮不宜偏廢帝乃敕禮部古者天子親耕皇后親蠶以勸天下自今歲始朕親祀先農皇后親蠶其考古制具儀以聞大學士張璁等請於安定門外建先蠶壇詹事霍韜以道遠爭之戶部亦言安定門外近西之地水源不通無浴蠶所皇城內西苑中有太液瓊島之水考唐制在苑中宋亦在宮中宜倣行之帝謂唐人因陋就安不可法於是禮部尚書李時等言大明門至安定門道路遙遠請鳳輦出東華玄武二門因條上四事一治繭之禮二壇壝之向三採桑之器四掌壇之官帝從其言命自玄武門出內使陳儀衛軍一萬人五千圍壇所五千護於道餘如議二月工部上先蠶壇圖式帝親定其制壇方二丈六尺疊二級高二尺六寸四出陛東西北俱樹桑柘內設蠶宮令署採桑臺高一尺四寸方十倍三出陛鑾駕庫五間後蓋織堂壇圍方八十丈禮部上皇后親蠶儀蠶將生欽天監擇吉巳日以聞順天府具蠶母名數送北郊工部以鉤箔筐架諸器物給蠶母順天府以蠶種及鉤筐一進呈內官捧出還授之出玄武右門置綵輿中鼓樂送至蠶室蠶母受蠶種浴飼以待命婦文四品武三品以上俱陪祀攜一侍女執鉤筐皇后齊三日內執事並司贊六尚等女官及應入壇者齊一日先一日太常寺具祝版祭物羊豕籩豆各六黑帛送蠶宮令是日分授執事女官日未明宿衛陳兵備女樂司設監備儀仗及重翟車俱候玄武門外將明內侍詣坤寧宮奏請皇后服常服導引女官導出宮門乘肩輿至玄武門內侍奏請降輿升重翟車兵衛儀仗及女樂前導出北安門障以行帷至壇內壝東門內侍奏請降車乘肩輿兵衛儀仗停東門外皇后入具服殿易禮服出至壇司贊奏就位公主內外命婦各就拜位祭先蠶行三獻禮女官執事如儀迎神四拜賜福胙二拜送神四拜凡拜跪興公主內外命婦皆同禮畢皇后還具服殿更常服司賓引外命婦先詣採桑壇東陛下南北向尚儀奏請皇后詣採桑位東向公主以下位皇后位東亦南北向以西為上執鉤者跪進鉤執筐者跪奉筐受桑皇后採桑三條還至壇南儀門坐觀命婦採桑三公命婦採五條列侯九卿命婦採九條訖各授女侍司賓引內命婦一人詣桑室尚功率執鉤筐者從尚功以桑授蠶母蠶母受桑縷切之以授內命婦內命婦食蠶灑一箔訖還尚儀奏禮畢皇后還坐具服殿司賓率蠶母等叩頭訖司贊唱班齊外命婦序立定尚儀致詞云親蠶既成禮當慶賀四拜畢賜宴命婦並賜蠶母酒食公主及內命婦於殿內外命婦文武二品以上於臺上三品以下於丹墀尚食進膳教坊司女樂奏樂宴畢公主以下各就班四拜禮畢皇后還宮導從如前詔如擬四月蠶事告成行治繭禮選蠶婦善繅絲及織者各十人卜日皇后出宮導從如常儀至織堂內命婦一人行三盆手禮布於織婦以終其事蠶宮令送尚衣織染監局造祭服其祀先蠶止用樂不用舞樂女生冠服俱用黑十年二月禮臣言去歲皇后躬行採桑已足風勵天下今先蠶壇殿工未畢宜且遣官行禮帝初不可令如舊行已而以皇后出入不便命改築先蠶壇於西苑壇之東為採桑臺臺東為具服殿北為蠶室左右為廂房其後為從室以居蠶婦設蠶宮署於宮左令一員丞二員擇內臣謹恪者為之四月皇后行親蠶禮於內苑帝謂親耕無賀此安得賀第行叩頭禮女樂第供宴勿前導三十八年罷親蠶禮四十一年並罷所司奏請高禖嘉靖九年青州儒生李時揚請祠高禖以祈聖嗣禮官覆以聞帝曰高禖雖古禮今實難行遂寢其議已而定祀高禖禮設木臺於皇城東永安門北震方臺上皇天上帝南向騂犢蒼璧獻皇帝配西向牛羊豕各一高禖在壇下西向牲數如之禮三獻皇帝位壇下北向后妃位南數十丈外北向用帷壇下陳弓矢弓韣如后妃嬪之數祭畢女官導后妃嬪至高禖前跪取弓矢授后妃嬪后妃嬪受而納於弓韣祭告明制凡登極巡幸及上諡葬陵冊立冊封冠婚等事皆祭告天地宗廟社稷凡營造宮室及命將出師歲時旱潦祭告天地山川太廟社稷后土凡即位之初並祭告闕里孔廟及歷代帝王陵寢洪武二年從禮部尚書崔亮奏圜丘方丘大祀前期親告太廟仍遣使告百神於天下神祇壇六年禮部尚書牛諒奏太歲諸神凡祈報則設一十五壇有事祭告則設神位二十八壇中太歲風雲雷雨五嶽五鎮四海凡五壇東四瀆京畿湖廣山東河南北平廣西四川甘肅山川夏冬二季月將京都城隍凡十二壇西鍾山江西浙江福建山西陝西廣東遼東山川春秋二季月將旗纛戰船等神凡十一壇若親祀皇帝皮辨服行一獻禮每三壇行一次禮八年帝駐蹕中都祭告天地於中都之圜丘九年以諸王將之藩分日告祭太廟社稷嶽鎮海瀆及天下名山大川復告祀天地於圜丘初諸王來朝還藩祭真武等神於端門用豕九羊九制帛等物祭護衛旗纛於承天門亦如之二十六年帝以其禮太繁定制豕一羊一不用帛尋又罷端門祭惟用葷素二壇祭於承天門外永樂七年巡狩北京祭告天地宗廟社稷嘉靖八年秋以躬祭山川諸神命先期不必遣官告太廟凡出入必親告祖考於內殿聖誕前一日以酒果告列聖帝后於奉先殿至日以酒脯告皇天上帝於玄極寶殿遣官以牲醴祭神烈天壽純德諸陵山及東嶽都城隍以素羞祭真武及靈濟宮又告修齊於道極七寶帝尊隆慶三年以親祭朝日壇預告奉先弘孝神霄殿祈報洪武二年太祖以春久不雨祈告諸神祇中設風雲雷雨嶽鎮海瀆凡五壇東設鍾山兩淮江西兩廣海南北山東燕南燕薊山川旗纛諸神凡七壇西設江東兩浙福建湖廣荊襄河南北河東華州山川京都城隍凡六壇中五壇奠帛初獻帝親行禮兩廡命官分獻三年夏旱六月朔帝素服草履步禱於山川壇藁席露坐晝曝於日夜臥於地凡三日六年從禮部尚書牛諒言太歲諸神春祈秋報凡十五壇中太歲風雲雷雨五嶽五鎮四海東四瀆京畿山川春秋二季月將京都各府城隍西鍾山甘肅山川夏冬二季月將旗纛戰船等神各五壇時甘肅新附故附其山川之祭於京師其親祀之儀與祭告同正統九年三月雨雪愆期遣官祭天地社稷太歲風雲雷雨嶽鎮海瀆弘治十七年畿內山東久旱命官祭告天壽山分命各巡撫祭告北嶽北嶽東嶽東鎮東海嘉靖八年春帝諭禮部去冬少雪今當東作雨澤不降當親祭南郊社稷山川尚書方獻夫等言周禮大宗伯以荒禮哀凶札釋者謂君膳不舉馳道不除祭事不縣皆所以示貶損之意又曰國有大故則旅上帝及四望釋者曰故謂凶災旅陳也陳其祭祀以禱焉禮不若祀之備也今陛下閔勞萬姓親出祈禱禮儀務簡約以答天戒常朝官並從同致省愆祈籲之誠隨具上儀注二月親禱南郊山川同日社稷用次日不除道冠服淺色羣臣同文五品武四品以上於大祀門外餘官於南天門外就班陪祀是秋帝欲親祀山川諸神禮部尚書李時言舊例山川等祭中夜行禮先一日出郊齊宿祭畢清晨回鑾兩日畢事禮太重宜比先農壇例昧爽行禮因具儀以進制可祭服用皮辨迎神送神各兩拜十一年大學士李時等以聖嗣未降請廷臣詣嶽鎮名山祝禱帝欲分遣道士齎香帛行令所在守臣行禮在廷大臣分詣地祇壇祈告於是禮部尚書夏言言我朝建地祇壇自嶽鎮海瀆以及遠近名山大川莫不懷柔即此而禱正合古人望衍之義但輔臣所請止於嶽鎮竊以山川海瀆發祥效靈與嶽鎮同功況基運翊聖神烈天壽純德諸山又祖宗妥靈之地祈禱之禮皆不可缺遂命大臣詣壇分祀神祇壇洪武二年從禮部尚書崔亮言建天下神祇壇於圜丘壝外之東及方丘壝外之西郊祀前期帝躬詣壇設神位西向以酒脯祭告郊之日俟分獻從祀將畢就壇以祭後定遣官預告又建山川壇於正陽門外天地壇西合祀諸神凡設壇十有九太歲春夏秋冬四季月將為第一次風雲雷雨次五嶽次五鎮次四海次四瀆次京都鍾山次江東次江西次湖廣次淮東淮西次浙東浙西福建次廣東廣西海南海北次山東山西河南河北次北平陝西次左江右江次安南高麗占城諸國山川次京都城隍次六纛大神旗纛大將五方旗神戰船金鼓銃炮弓弩飛鎗飛石陳前陳後諸神皆躬自行禮先祭禮官奏祝文太歲以下至四海凡五壇稱臣者親署御名其鍾山諸神稱余者請令禮官代署帝曰朋友書牘尚親題姓名況神明乎遂加親署後又定驚蟄秋分後三日遣官祭山川壇諸神七年令春秋仲月上旬擇日以祭九年復定山川壇制凡十三壇正殿太歲風雲雷雨五嶽五鎮四海四瀆鍾山七壇東西廡各三壇東京畿山川夏冬二季月將西春秋二季月將京都城隍十年定正殿七壇帝親行禮東西廡遣功臣分獻二十一年增修大祀殿諸神壇壝乃敕十三壇諸神並停春祭每歲八月中旬擇日祭之命禮部更定祭山川壇儀與社稷同永樂中京師建山川壇並同南京制惟正殿鍾山之右益以天壽山之神嘉靖十一年改山川壇名為天神地祇壇改序雲師雨師風伯雷師天神壇在左南向雲雨風雷凡四壇地祇壇在右北向五嶽五鎮基運翊聖神烈天壽純德五陵山四海四瀆凡五壇從祀京畿山川西向天下山川東向以辰戌丑未年仲秋皇帝親祭餘年遣大臣攝祭其太歲月將旗纛城隍別祀之十七年加上皇天上帝尊稱預告於神祇遂設壇於圜丘外壝東南親定神祇壇位陳設儀式禮部言皇上親獻大明壇則四壇分獻諸臣不敢並列請先上香畢命官代獻帝裁定上香奠帛獻爵復位後分獻官方行禮亞終二獻執事官代餘壇俱獻官三行隆慶元年禮臣言天神地祇已從祀南北郊其仲秋神祇之祭不宜復舉令罷之星辰壇洪武三年帝謂中書省臣日月皆專壇祭而星辰乃祔祭於月壇非禮也禮部擬於城南諸神享祭壇正南向增九間朝日夕月祭周天星辰俱於是行禮朝日夕月仍以春秋分祭星辰則於天壽節前三日從之四年九月帝躬祀周天星辰正殿共十壇中設周天星辰位儀如朝日二十一年以星辰既從祀南郊罷禜星之祭靈星諸神洪武元年太常司奏周禮以槱燎祀司中司命風師雨師天府若祭天則祀司民司祿而獻民數穀數受而藏之漢高帝命郡國立靈星祠唐制立秋後辰日祀靈星立冬後亥日遣官祀司中司命司民司祿以少牢宋祀如唐而於秋分日祀壽星今擬如唐制分日而祀為壇於城南從之二年從禮部尚書崔亮奏每歲聖壽日祭壽星同日祭司中司命司民司祿示與民同受其福也八月望日祀靈星皆遣官行禮三年罷壽星等祀太歲月將風雲雷雨之祀古無太歲月將壇宇之制明始重其祭增雲師於風師之次亦自明始太祖既以太歲諸神從祀圜丘又合祭羣祀壇已而命禮官議專祀壇壝禮臣言太歲者十二辰之神按說文歲字從步從戌木星一歲行一次歷十二辰而周天若步然也陰陽家說又有十二月將十日十二時所直之神若天乙天罡太乙功曹太衝之類雖不經見歷代因之元每有大興作祭太歲月將日直時直於太史院若風師雨師之祀見於周官後世皆有祭唐天寶中增雷師於雨師之次宋元因之然唐制各以時別祭失享祀本意宜以太歲風雲雷雨諸天神合為一壇諸地祇為一壇春秋專祀乃定驚蟄秋分日祀太歲諸神於城南三年復以諸神陰陽一氣流行無間乃合二壇為一而增四季月將又改祭期與地祇俱用驚蟄秋分後三日嘉靖十年命禮部考太歲壇制禮官言太歲之神唐宋祀典不載元雖有祭亦無常典壇宇之制於古無稽太歲天神宜設壇露祭準社稷壇制而差小從之遂建太歲壇於正陽門外之西與天壇對中太歲殿東廡春秋月將二壇西廡夏冬月將二壇帝親祭於拜殿中每歲孟春享廟歲暮祫祭之日遣官致祭王國府州縣亦祀風雲雷雨師仍築壇城西南祭用驚蟄秋分日嶽鎮海瀆山川之祀洪武二年太祖以嶽瀆諸神合祭城南未有專祀又享祀之所屋而不壇非尊神之道禮官言虞舜祭四嶽王制始有五嶽之稱周官兆四望於四郊鄭注以四望為五嶽四鎮四瀆詩序巡狩而禮四嶽河海則又有四海之祭蓋天子方望之事無所不通而嶽鎮海瀆在諸侯封內則各祀之秦罷封建嶽瀆皆領於祠官漢復建諸侯則侯國各祀其封內山川天子無與武帝時諸侯或分或廢五嶽皆在天子之邦宣帝時始有使者持節祠嶽瀆之禮由魏及隋嶽鎮海瀆即其地立祠有司致祭唐宋之制有命本界刺史縣令之祀有因郊祀而望祭之祀又有遣使之祀元遣使祀嶽鎮海瀆分東西南北中為五道今宜以嶽鎮海瀆及天下山川城隍諸地祇合為一壇與天神埒春秋專祀遂定祭日以清明霜降前期一日皇帝躬省牲至日服通天冠絳紗袍詣嶽鎮海瀆前行三獻禮山川城隍分獻官行禮是年命官十八人祭天下嶽鎮海瀆之神帝皮辨御奉天殿躬署御名以香祝授使者百官公服送至中書省使者奉以行黃金合貯香黃綺幡二白金二十五兩巿祭物三年詔定嶽鎮海瀆神號略曰為治之道必本於禮嶽鎮海瀆之封起自唐宋夫英靈之氣萃而為神必受命於上帝豈國家封號所可加瀆禮不經莫此為甚今依古定制並去前代所封名號五嶽稱東嶽泰山之神南嶽衡山之神中嶽嵩山之神西嶽華山之神北嶽山之神五鎮稱東鎮沂山之神南鎮會稽山之神中鎮霍山之神西鎮吳山之神北鎮醫無閭山之神四海稱東海之神南海之神西海之神北海之神四瀆稱東瀆大淮之神南瀆大江之神西瀆大河之神北瀆大濟之神帝躬署名於祝文遣官以更定神號告祭六年禮臣言四川未平望祭江瀆於峽州今蜀既下當遣人於南瀆致祭從之十年命官十八人分祀嶽鎮海瀆賜之制萬曆十四年巡撫胡來貢請改祀北嶽於渾源州禮臣言大明集禮載漢唐宋北嶽之祭皆在定州曲陽縣與史俱合渾源之稱北嶽止見州志碑文經傳無可考仍祀曲陽是其他山川之祀洪武元年躬祀汴梁諸神仍遣官祭境內山川二年以天下山川祔祭嶽瀆壇帝又以安南高麗皆臣附其國內山川宜與中國同祭諭中書及禮官考之安南之山二十一其江六其水六高麗之山三其水四命著祀典設位以祭三年遣使往安南高麗占城祀其國山川帝齊戒親為祝文仍遣官頒革正山川神號詔於安南占城高麗六年琉球諸國已朝貢祀其國山川八年禮部尚書牛諒言京都既罷祭天下山川其外國山川亦非天子所當親祀中書及禮臣請附祭各省從之廣西附祭安南占城真臘暹羅鎖里廣東附祭三佛齊爪哇福建附祭日本琉球渤泥遼東附祭高麗陝西附祭甘肅𩽆甘烏斯藏京城不復祭又從禮官言各省山川居中南向外國山川東西向同壇共祀其王國山川之祀洪武十三年定制十八年定王國祭山川儀同社稷但無瘞埋之文凡嶽鎮海瀆及他山川所在令有司歲二祭以清明霜降城隍洪武二年禮官言城隍之祀莫詳其始先儒謂既有社不應復有城隍故唐李陽冰縉雲城隍記謂祀典無之惟吳越有之然成都城隍祠李德裕所建張說有祭城隍之文杜牧有祭黃州城隍文則不獨吳越為然又蕪湖城隍廟建於吳赤烏二年高齊慕容儼梁武陵王祀城隍皆書於史又不獨唐而已宋以來其祠遍天下或錫廟額或頒封爵至或遷就傅會各指一人以為神之姓名按張九齡祭洪州城隍文曰城隍是保氓庶是依則前代崇祀之意有在也今宜附祭於嶽瀆諸神之壇乃命加以封爵京都為承天鑒國司民升福明靈王開封臨濠太平和州滁州皆封為王其餘府為鑒察司民城隍威靈公秩正二品州為鑒察司民城隍靈佑侯秩三品縣為鑒察司民城隍顯佑伯秩四品袞章冕旒俱有差命詞臣撰制文以頒之三年詔去封號止稱某府州縣城隍之神又令各廟屏去他神定廟制高廣視官署廳堂造木為主毀塑像舁置水中取其泥塗壁繪以雲山六年製中都城隍神主成遣官賫香幣奉安京師城隍既附饗山川壇又於二十一年改建廟尋以從祀大祀殿罷山川壇春祭永樂中建廟都城之西曰大威靈祠嘉靖九年罷山川壇從祀歲以仲秋祭旗纛日並祭都城隍之神凡聖誕節及五月十一日神誕皆遣太常寺堂上官行禮國有大災則告廟在王國者王親祭之在各府州縣者守令主之
