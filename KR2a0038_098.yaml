body:
  text: 明史卷九十八志第七十四藝文三子類十二一曰儒家類二曰雜家類前代藝文志列名法諸家然寥寥無幾備數而已今總附雜家三曰農家類四曰小說家類五曰兵書類六曰天文類七曰曆數類八曰五行類九曰藝術類醫書附十曰類書類十一曰道家類十二曰釋家類聖學心法四卷永樂中編為類四曰君道臣道父道子道成祖製序性理大全七十卷永樂中既命胡廣等纂修經書大全又以周程張朱諸儒性理之書類聚成編成祖製序傳心要語一卷孝順事實十卷為善陰騭十卷皆永樂中編五倫書六十二卷宣宗采經傳子史嘉言善行為是書正統中英宗製序刊行憲宗文華大訓二十八卷綱四目二十有四成化中編嘉靖中世宗製序刊行世宗敬一針一卷注程子四針注范浚心針共二卷孫作東家子一卷葉儀潛書一卷留睿留子一卷葉子奇太玄本旨九卷朱右性理本原三卷張九韶理學類編八卷謝應芳辨惑編四卷周是修綱常彝範十二卷曹端理學要覽二卷夜行燭一卷月川語録一卷尤文語録二卷鮑寧天原發微辨正五卷金潤心學探微十二卷吳與弼康齊日録一卷薛瑄讀書録十卷續録十卷周洪謨南皋子雜言二卷箐齊讀書録二卷胡居仁居業録八卷謝鐸伊洛淵源續録六卷程敏政道一編五卷蔡清性理要解二卷楊廉伊洛淵源録類增十四卷畏軒劄記三卷張吉陸學訂疑二卷章懋楓山語録二卷周木延平問答續録一卷楊守址困學寡聞録十卷韓邦奇性理三解八卷王鴻漸讀書記二卷王蓂大儒心學録二十七卷徐問讀書劄記八卷續記八卷方鵬觀感録十二卷魏校莊渠全書十卷陳獻章言行録十卷附録二卷趙鶴金華正學編十卷王守仁傳習録四卷陽明則言二卷羅欽順困知記六卷附録二卷陳建學蔀通辨十二卷許讚性學編一卷道統泝流録一卷湛若水甘泉明論十卷遵道録十卷問辨録六卷黃佐泰泉庸言十二卷呂柟涇野子內篇三十三卷語録二十卷鄒守益道南三書三卷明道録四卷何瑭柏齊三書四卷薛蕙日録五卷顧應祥惜陰録十二卷沈霽語録四卷邵經邦弘道録五十七卷唐順之儒編六十卷薛應旗考亭淵源録二十四卷薛子庸語十二卷王艮心齊語録二卷周思兼學道記言六卷胡直胡子衡齊八卷陸樹聲汲古叢語一卷金賁亨道南録五卷台學源流集七卷尤時熙擬學小記八卷劉元卿諸儒學案八卷周琦東溪日談十八卷羅汝芳明道録八卷近溪集語十二卷耿定向庸言二卷雅言一卷新語一卷教學商求一卷李渭先行録十卷王樵劄記一卷筆記一卷許孚遠語要二卷朱衡道南源委録十二卷孫應鰲論學彙編八卷梁斗輝聖學正宗二十卷管志道問辨牘八卷理學酬咨録八卷王敬臣俟後編四卷呂坤呻吟語四卷鄒德溥畏聖録二卷鄧球理學宗旨二卷李材教學録十二卷南中問辨録十卷曾朝節臆言八卷鄒元標仁文會語四卷日新編二卷楊起元證學編二卷識仁編二卷徐即登儒學明宗録二十五卷黃時熠知非録六卷錢一本黽記四卷顧憲成劄記十八卷東林商語二卷證性編八卷當下繹一卷涇陽遺書二十卷李多見學原前後編八卷涂宗濬證學記三卷周子義日録見聞十卷吳仕期大儒敷言三十三卷徐三重信古餘論八卷來知德日録十二卷方學漸心學宗四卷姚舜牧性理指歸二十八卷馮從吾元儒考略四卷語録六卷唐鶴徵憲世編六卷曾鳳儀明儒見道編二卷周汝登聖學宗傳十八卷高攀龍就正録二卷高子遺書十二卷孫慎行困思抄四卷劉宗周理學宗要一卷證人要旨一卷劉子遺書四卷葉秉敬讀書録鈔八卷黃道周榕壇問業十八卷章世純留書十卷黃淳耀吾師録一卷語録一卷劄記二卷右儒家類一百四十部一千二百三十卷太祖資治通訓一卷凡十四章首君道次臣道又次民用士用工用商用皆著勸導之意公子書一卷訓世臣務農技藝商賈書一卷訓庶民子弟成祖務本之訓一卷采太祖創業事迹及往古興亡得失為書以訓太孫仁孝皇后勸善書二十卷宋濂燕書一卷王廉迂論十卷葉子奇草木子八卷王達筆疇二卷曹安讕言長語二卷趙弼事物紀原刪定二十卷解延年物類集說三十四卷羅頎梅山叢書二百卷物原二卷謝理東岑子四卷潘府南山素言一卷何孟春餘冬序録六十五卷閒日分義一百卷戴鱀經濟考略二十卷戴璟博物策會十七卷陸深同異録一卷傳疑録二卷孫宜遁言二卷祝允明前聞記一卷讀書筆記一卷蔡羽太藪外史五卷劉繪劉子通論十卷高岱楚漢餘談一卷羅虞臣原子八卷王杰經濟總論十卷汪坦日知録五卷劉鳳劉子雜組十卷王世貞劄記二卷宛委餘編十九卷王可大國憲家猷五十六卷萬曆中御史言內閣絲綸簿猝無可考惟是書載之遂取以進沈津百家類纂四十卷陳耀文學圃萱蘇六卷學林就正四卷陳絳金罍子四十四卷方弘靜千一録二十六卷勞堪史編始事二卷陳其力藝心識餘八卷周祈名義考十二卷詹景鳳詹氏小辨六十四卷穆希文說原十六卷動植記原四卷王三聘事物考八卷徐常吉諸家要旨二卷徐伯齡蟫精雋二十卷趙士登省身至言十卷劉仕義知新録二十四卷屠隆冥寥子二卷鴻苞四十八卷閔文振異物類苑五卷朱謀㙔玄覽八卷趙樞生含玄子十六卷別編十卷吳安國纍瓦編三十二卷馮應京經世實用編二十八卷柯壽愷語叢三十八卷徐三重鴻洲雜著十八卷王納諫會心言四卷沈節甫紀録彙編二百十六卷祁承國朝徵信録二百十二卷淡生堂餘苑六百四卷董斯張廣博物志五十卷鄭瑄昨非菴日纂六十卷右雜家類六十七部二千二百八十四卷劉基多能鄙事十二卷周定王救荒本草四卷寧獻王臞仙神隱書四卷楊溥水雲録二卷周履靖茹草編四卷鄺璠便民圖纂十六卷顧清田家月令一卷施大經閲古農書六卷俞貞木種樹書三卷溫純齊民要書一卷王世懋學圃雜疏三卷黃省曾稻品一卷蠶經一卷李德紹樹藝考二卷袁黃寶坻勸農書二卷陳鳴鶴田家月令一卷宋公望四時種植書一卷馮應京月令廣義二十四卷王象晉羣芳譜二十八卷徐光啓農政全書六十卷農遺雜疏五卷張國維農政全書八卷吳嘉言四季須知二卷右農家類二十三部一百九十一卷宋濂蘿山雜言一卷葉子奇草木子餘録三卷陶宗儀輟耕録三十卷說郛一百二十卷又有續說郛四十六卷明季人陶珽纂輯劉績霏雪録二卷陶輔桑榆漫筆一卷瞿佑香臺集三卷張綸林泉隨筆一卷李賢古穰雜録二卷嶽正類博雜言二卷葉盛水東日記三十八卷單宇菊坡叢話二十六卷陸容菽園雜記十五卷姚福青溪暇筆二十卷張志淳南園漫録十卷續録十卷梅純續百川學海一百卷王錡寓圃雜記十卷羅鳳漫録三十卷李詡漫筆八卷徐泰玉池談屑四卷羅欽德閒中瑣録二卷王渙墨池瑣録三卷沈周客坐新聞二十二卷都邛三餘贅筆二卷都穆奚囊續要二十卷徐禎卿異林一卷唐錦龍江夢餘録四卷戴冠筆記十卷侯甸西樵野記十卷陸粲庚巳編十卷陸深儼山外集四十卷馬攀龍株守談略四卷陸采天池聲雋四十卷胡侍野談六卷楊慎丹鉛總録二十七卷續録十二卷餘録十七卷新録七卷閏録九卷卮言四卷談菀醍醐九卷藝林伐山二十卷墐戶録一卷清暑録二卷陸楫古今說海一百四十二卷陳霆兩山墨談十八卷司馬泰廣說郛八十卷古今彙說六十卷再續百川學海八十卷三續三十卷史流十品一百卷王文祿明世學山五十卷尤鏜紅箱集五十卷朱應辰漫鈔十卷李文鳳月山叢談十卷何良俊語林三十卷叢說三十八卷沈儀麈談録十卷萬表灼艾集十卷高鶴見聞搜玉八卷項喬甌東私録六卷張時徹說林二十四卷袁褧前後四十家小說八十卷廣四十家小說四十卷陸樹聲清暑筆談一卷長水日鈔一卷耄餘雜識一卷徐伯相畫暇叢記二十卷姚弘謨錦囊瑣綴八卷陳師筆談十五卷石磐菊徑漫談十四卷郎瑛七修類稿五十一卷朱國禎湧幢小品二十四卷李豫亨自樂編十六卷徐渭路史二卷汪雲程逸史搜奇十卷孫能傳剡溪漫筆六卷王應山風雅叢談六十卷陳禹謨說麈八卷田藝蘅留青日札三十九卷西湖志餘二十六卷胡應麟少室山房筆叢三十二卷續十六卷林茂槐說類六十卷焦竑筆乘二十卷玉堂叢語八卷明世說八卷黃汝良筆談十二卷朱謀㙔異林十六卷湯顯祖續虞初志八卷張鼎思琅琊代醉編四十卷屠本畯山林經濟籍二十四卷顧起元說略六十三卷王肯堂鬱岡齊筆麈四卷董其昌畫禪室隨筆二卷商濬稗海三百六十八卷謝肇浙五雜組十六卷麈餘四卷文海披沙八卷徐徐氏筆精八卷王兆雲驚座新書八卷王氏青箱餘十二卷張所望閲耕餘録六卷郭良翰問奇類林三十六卷陳繼儒祕笈一百三十卷潘之恆亘史鈔九十一卷王學海筠齊漫録十卷李日華六研齊筆記十二卷日記二十卷包衡清賞録十二卷張重華娛耳集十二卷馬應龍藝林鉤微録二十四卷李紹文明世說新語八卷張大復筆談十四卷徐應秋談薈三十六卷楊崇吾檢蠹隨筆三十卷來斯行槎菴小乘四十六卷沈弘正蟲天志十卷胡震亨讀書雜録三卷閔元京湘烟録十六卷茅元儀雜記三十二卷華繼善咫聞録五卷王所日格類鈔三十卷王績纂言鉤玄十六卷楊德周隨筆十二卷吳之俊獅山掌録二十八卷右小說家類一百二十七部三千三百七卷劉寅七書直解二十六卷集古兵法一卷寧獻王權注素書一卷徐昌會握機橐鑰六卷陳元素古今名將傳十七卷劉畿諸史將略十六卷何喬新續百將傳四卷五代訖宋元何瑭兵論一卷王草巳綱目兵法六卷穆伯寅兵鑑撮要七卷劉濂兵說十二卷吳從周兵法彙編十二卷唐順之武編十二卷兵垣四編五卷何東序益智兵書一百卷武庫益智録六卷陳禹謨左氏兵法略三十二卷李材將將紀二十四卷兵政紀略五十卷經武淵源十五卷顧其言新續百將傳四卷一名明百將傳馮孜古今將略四卷尹商閫外春秋三十二卷戚繼光紀效新書十四卷練兵實紀九卷雜集六卷將臣寶鑑一卷趙本學韜鈐內篇一卷俞大猷韜鈐續篇一卷劍經一卷葉夢熊運籌綱目十卷王鳴鶴登壇必究四十卷何僎讀史機略十卷鄭璧古今兵鑑三十二卷經世宏籌三十六卷王有麟古今戰守攻圍兵法六十卷姚文蔚省括編二十二卷趙大綱方略摘要十卷高折枝將略類編二十四卷施浚明古今紆籌十二卷楊惟休武略十卷孫承宗車營百八扣一卷徐常陳法舉要一卷龍正八陳圖演注一卷瞿汝稷兵略纂聞十二卷茅元儀武備志二百四十卷孫元化經武全編十卷顏季亨明武功紀勝通考八卷徐標兵機纂要四卷范景文師律十六卷谷中虛水陸兵律令操法四卷張燾西洋火攻圖說一卷王應遴備書二十卷冒起宗守筌五卷講武全書兵覽三十二卷兵律三十八卷兵占二十四卷兵機備纂十三卷已上四部不知撰人右兵書類五十八部一千一百二十二卷清類天文分野書二十四卷洪武中編以十二分野星次分配天下郡縣又於郡縣之下詳載古今沿革之由天元玉曆祥異賦七卷仁宗製序葉子奇元理一卷劉基天文祕略一卷觀象玩占十卷不知撰人或云劉基輯楊廉星略一卷王應電天文會通一卷周述學天文圖學一卷吳珫天文要義二卷范守己天官舉正六卷陸侹天文地理星度分野集要四卷王臣夔測候圖說一卷黃履康管窺略三卷黃鍾和天文星象考一卷楊惟休天文書四卷潘元和古今災異類考五卷趙宦光九圜史一卷余文龍祥異圖說七卷史異編十七卷李之藻渾蓋通憲圖說二卷利瑪竇