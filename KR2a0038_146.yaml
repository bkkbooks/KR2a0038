body:
  text: 明史卷一百四十六列傳第三十四張武陳圭孟善鄭亨徐忠郭亮趙彝張信唐雲徐祥李濬孫巖房勝陳旭陳賢張興陳志王友張武瀏陽人豁達有勇力稍涉書史為燕山右護衛百戶從成祖起兵克薊州取雄縣戰月漾橋乘勝抵鄚州與諸將敗耿炳文於真定夾河之戰帥壯士為前鋒突陳佯敗走南軍追之武還擊南軍遂潰攻西水寨前軍夜失道南軍來追武引兵伏要路擊却之戰小河陳文歿於陳武帥敢死士自林間突出與騎兵合大破南軍斬首二萬級溺死無算纍授都督同知成祖即位論功封成陽侯祿千五百石位次朱能下是時侯者陳圭鄭亨孟善火真顧成王忠王聰徐忠張信李遠郭亮房寬十三人武為第一還守北平永樂元年十月卒出內馬以賻贈潞國公諡忠毅無子爵除陳圭泰州人洪武初從大將軍徐達平中原授龍虎衛百戶改燕山中護衛從成祖出塞為前鋒進副千戶已從起兵積功至指揮同知還佐世子居守纍遷都督僉事封泰寧侯祿千二百石佐世子居守如故永樂四年董建北京宮殿經畫有條理甚見奬重八年帝北征偕駙馬都尉袁容輔趙王留守北倞十五年命鑄繕工印給圭並設官屬兼掌行在後府十七年四月卒年八十五贈靖國公諡忠襄子瑜嗣二十年從北征失律下獄死兄子鐘嗣再傳至瀛歿土木贈寧國公諡恭愍弟涇嗣天順六年鎮廣西明年九月瑤賊作亂涇將數千人駐梧州是冬大藤賊數百人夜入城殺掠甚衆涇擁兵不救徵還下獄論斬尋宥之卒子桓嗣弘治初鎮寧夏中貴人多以所親冒功賞桓拒絶之為所譖召還卒數傳至延祚明亡爵除孟善海豐人仕元為山東樞密院同僉明初歸附從大軍北征授定遠衛百戶從平雲南進燕山中護衛千戶燕師起攻松亭關戰白溝河皆有功已守保定南軍數萬攻城城中兵才數千善固守城完纍遷右軍都督同知封保定侯祿千二百石永樂元年鎮遼東七年召還北京鬚眉皓白帝憫之命致仕十年六月卒贈滕國公諡忠勇子瑛嗣將左軍再從北征督運餉仁宗即位為左參將鎮交址坐庶兄常山護衛指揮賢永樂中謀立趙王事並奪爵毀其券謫雲南宣德六年放還充為事官於宣府英宗即位授京衛指揮使卒子俊嗣官天順初以恩詔與伯爵卒子昂嗣卒爵除鄭亨合肥人父用洪武時積功為大興左衛副千戶請老亨嗣職洪武二十五年應募持檄諭韃靼至斡難河還遷密雲衛指揮僉事燕師起以所部降戰真定先登進指揮使襲大寧至劉家口諸將將攻關成祖慮守關卒走報大寧得為備乃令亨將徑騎數百卷旆登山潛出關後斷其歸路急攻之悉縛守關者遂奄至大寧進北平都指揮僉事夜帥衆破鄭村壩兵西破紫荊關掠廣昌取蔚州直抵大同還戰白溝河逐北至濟南進都指揮同知攻滄州軍北門扼餉道東昌戰敗收散卒還軍深州明年戰夾河藁城略地至彰德耀兵河上還屯完縣明年從破東平汶上軍小河戰敗王真死諸將皆欲北還惟亨與朱能不可入京師歷遷中府左都督封武安侯祿千五百石豫世券留守北京時父用猶在受封爵視亨永樂元年充總兵官帥武成侯王聰安平侯李遠備宣府亨至邊度宣府萬全懷來形便每數堡相距中擇一堡可容數堡士馬者為高城深池浚井蓄水謹瞭望寇至夜舉火晝鳴炮併力堅守規畫周詳後莫能易三年二月召還旋遣之鎮七年秋備邊開平明年帝北征命亨督運出塞將右哨追敗本雅失里大軍與阿魯台遇亨帥衆先大破之論功為諸將冠其冬仍出鎮宣府十二年復從北征領中軍戰忽失溫追敵中流矢却復與大軍合破之二十年復從出塞將左哨帥卒萬人治龍門道過軍破兀良哈於屈裂河將輜重還擊破寇之追躡者仍守開平成祖凡五出塞亨皆在行仁宗即位鎮大同洪熙元年二月頒制諭及將軍印於各邊總兵官亨佩征西前將軍印在鎮墾田積穀邊備完固自是大同希寇患宣德元年召掌行後府事已仍鎮大同轉餉宣府招降迤北部長四十九人請於朝厚撫之歸附者相屬九年二月卒於鎮亨嚴肅重厚善撫士卒恥掊克在大同時鎮守中官撓軍政亨裁之以理其人不悅然其卒也深悼惜之贈漳國公諡忠毅妾張氏自經以殉贈淑人子能嗣傳爵至明亡徐忠合肥人襲父爵為河南衛副千戶纍從大軍北征多所俘獲進濟陽衛指揮僉事洪武末鎮開平燕兵破居庸懷來忠以開平降從徇灤河與陳旭拔其城李景隆攻北平燕師自大寧還救至會州置五軍張玉將中軍朱能將左軍李彬將右軍房寬將後軍忠號驍勇使將前軍遂敗陳暉於白河破景隆於鄭村壩白溝河之戰忠單騎突陳一指中流矢未暇去鏃急抽刀斷之控滿疾驅殊死戰燕王乘高見之謂左右曰真壯士也進攻濟南克滄州大戰東昌夾河攻彰德破西水寨克東阿東平汶上大戰靈璧遂從渡江入京師自指揮同知纍遷都督僉事封永康侯祿一千一百石豫世券忠每戰摧鋒跳蕩為諸將先而馭軍甚嚴所過無擾善撫降附得其死力事繼母以孝聞夜歸必揖家廟而後入儉約恭謹未嘗有過成祖北巡以忠老成輔太子監國永樂十一年八月卒贈蔡國公諡忠烈傳爵至裔孫錫登崇禎末死於賊從兄錫胤嘗襲侯卒無子其妻朱氏成國公純臣女也夫歿樓居十餘年不履地城陷捧廟主自焚死郭亮合肥人為永平衛千戶燕兵至永平與指揮趙彝以城降即命為守時燕師初起先略定旁郡邑既克居庸懷來山後諸州皆下而永平地接山海關障隔遼東既降北平益無患成祖遂南敗耿炳文於真定既而遼東鎮將江陰侯吳高都督楊文等圍永平亮拒守甚固援師至內外合擊高退走未幾高中讒罷楊文代將復率衆來攻亮及劉江合擊大敗之纍進都督僉事成祖即位以守城功封成安侯祿千二百石世伯爵永樂七年守開平以不檢聞二十一年三月卒贈興國公諡忠壯妾韓氏自經以殉贈淑人子晟當嗣伯仁宗特命嗣侯宣德五年坐扈駕先歸革爵尋復之無子弟昂嗣伯傳爵至明亡趙彝虹人洪武時為燕山右衛百戶從傅友德北征城宣府萬全懷來擢永平衛指揮僉事降燕歷諸戰皆有功纍遷都指揮使成祖稱帝封欣城伯祿千石永樂八年鎮宣府嘗從北征坐盜餉下獄得釋尋以呂梁洪湍險命彝鎮徐州經理復以擅殺運丁盜官糧為都御史李慶所劾命法司論治復得釋仁宗立召還宣德初卒子榮嗣數傳至之龍崇禎末協守南京大清兵下江南之龍迎降張信臨淮人父興永寧衛指揮僉事信嗣官移守普定平越積功進都指揮僉事惠帝初即位大臣薦信謀勇調北平都司受密詔令與張昺謝貴謀燕王信憂懼不知所為母怪問之信以告母大驚曰不可汝父每言王氣在燕汝無妄舉滅家族成祖稱病信三造燕邸辭不見信固請入拜牀下密以情輸成祖成祖戄然起立召諸將定計起兵奪九門成祖入京師論功比諸戰將進都督僉事封隆平侯祿千石與世伯券成祖德信甚呼為恩張欲納信女為妃信固辭以此益見重凡察藩王動靜諸密事皆命信信怙寵頗驕永樂八年冬都御史陳瑛言信無汗馬勞忝冒侯爵恣肆貪墨強占丹陽練湖八十餘里江陰官田七十餘頃請下有司驗治帝曰瑛言是也昔中山王有沙洲一區耕農水道所經家僮阻之以擅利王聞即歸其地於官今信何敢爾命法司雜治之尋以舊勳不問二十年從北征督運餉大閲於隰寧信辭疾不至謫充辦事官已而復職仁宗即位加少師並支二俸與世侯券宣德元年從征樂安三年帝巡邊征兀良哈命居守明年督軍萬五千人浚河西務河道正統七年五月卒於南京贈鄖國公諡恭僖子鏞自立功為指揮僉事先卒子淳嗣傳爵至明亡有唐雲者燕山中護衛指揮也不知所自起成祖既殺張昺謝貴等將士猶據九門閉甕城陳戈戟內向張玉等夜襲之已克其八惟西直門不下成祖令雲解甲騎馬導從如平時諭守者曰天子已聽王自制一方汝等急退後者戮雲於諸指揮中年最長素信謹將士以為不欺遂散時衆心未附雲告以天意所嚮衆乃定雲從成祖久出入左右甚見倚任先後出師皆留輔世子南兵數攻城拒守甚力戰未嘗失利纍遷都指揮使成祖稱帝封新昌伯世指揮使明年七月卒賜賚甚厚徐祥大冶人初仕陳友諒歸太祖於江州積功至燕山右護衛副千戶成祖以其謹直命侍左右從起兵轉戰四年皆有功纍進都指揮使成祖即位論功封興安伯祿千石時封伯者祥及徐理李濬張輔唐雲談忠孫巖房勝趙彝陳旭劉才茹瑺王佐陳瑄十四人祥第一祥在諸將中年稍長及封益勤慎永樂二年五月卒年七十三孫亨嗣十二年從北征為中軍副將至土剌河獲馬三千還守開平將輕騎往來興和大同備邊後屢從出塞宣德元年以右副將征交址無功奪爵英宗即位復之正統九年征兀良哈出界嶺口河北川進侯出鎮陝西召還天順初卒諡武襄子賢嗣伯以跛免朝謁給半祿卒子盛嗣卒無子再從弟良嗣良祖母故小妻也繼祖母定襄伯郭登女至是其孫爭襲朝議以郭氏初嘗適人法不當為正嫡良竟得嗣良時年五十家貧傭大中穚汲水都督府求興安伯後良乃謝其鄰而去僉書南京中府忤劉瑾革祿二百石傳爵至明亡李濬和州人父旺洪武中燕山左護衛副千戶濬嗣官從起兵奪九門招募薊州永平壯勇數千人破南軍於真定從收大寧鄭村壩之戰帥精騎突陳衆鼓譟乘之大捷轉戰山東為前鋒至小河猝與南軍遇帥敢死士先斷河橋南軍不能爭成祖至遂大敗之纍遷都指揮使封襄城伯祿千石永樂元年出鎮江西永新盜起捕誅其魁尋召還三年十一月卒子隆字彥平年十五嗣封雄偉有將略數從北征出奇料敵成祖器之既遷都以南京根本地命隆留守仁宗即位命鎮山海關未幾復守南京隆讀書好文論事侃侃清慎守法尤敬禮士大夫在南京十八年前後賜璽書二百餘及召還南都民流涕送之江上正統五年入總禁軍十一年巡大同邊賜寶刀一申飭戒備內外凜凜訖還不僇一人明年卒子珍嗣歿於土木贈侯諡悼僖無子弟瑾嗣成化三年四川都掌蠻叛命佩征夷將軍印充總兵官往討兵部尚書程信督之師至永寧分六路進瑾與信居中節制盡破諸蠻寨前後斬首四千五百有奇獲鎧仗牲畜無算分都掌地設官建治控制之師還進侯纍加太保弘治二年卒贈芮國公諡壯武瑾性寬弘能下士兄璉以貌寢不得嗣瑾敬禮甚厚璉卒撫其子如己子瑾子黼嗣伯數年卒無子得嗣四傳至守錡纍典營務加太子少保崇禎初總督京營坐營卒為盜落職憂憤卒子國禎嗣有口辨嘗召對指陳兵事甚悉帝信以為才十六年命總督京營倚任之而國禎實無他能明年三月李自成犯京師三大營兵不戰而潰再宿城陷賊勒國禎降國禎解甲聽命責賄不足被拷折踝自縊死孫巖鳳陽人從太祖渡江纍官燕山中護衛千戶致仕燕師起通州守將房勝以城降王以巖宿將使與勝協守南軍至攻城甚急樓堞皆毀巖勝多方捍禦已復突門力戰追奔至張家灣獲餉舟三百纍擢都指揮僉事論功以舊臣有守城功封應城伯祿千石永樂十一年備開平旋移通州以私憾椎殺千戶奪爵安置交址已而復之十六年卒贈侯諡威武子亨嗣傳至明亡爵除房勝景陵人初從陳友諒來歸纍功至通州衛指揮僉事燕兵起北平勝首以通州降成祖即位以守城功封富昌伯祿千石世指揮使永樂四年卒陳旭全椒人父彬從太祖為指揮僉事旭嗣官為會州衛指揮同知舉城降燕從徇灤河功多力戰真定守德州盛庸兵至棄城走置不問從入京師封雲陽伯祿千石永樂元年命巡視中都及直隸衛所軍馬城池四年從英國公張輔征交址為右參將偕豐城侯李彬破西都師還與彬各加祿五百石已而陳季擴叛復從輔往剿輔還又命副沐晟八年以疾卒於軍無子封絶陳賢壽州人初從太祖立功授雄武衛百戶從征西番雲南北征至捕魚兒海皆有功歷燕山右護衛指揮僉事燕師起從諸將轉戰常突陳陷堅軍中稱其驍勇纍遷都督僉事永樂元年四月成祖慮功臣封有遺闕令丘福等議福等言都督僉事李彬功不在房寬下涇國公子懋金鄉侯子通俱未襲爵而陳賢張興陳志王友功與劉才等於是封彬豐城侯懋通與賢等四人並封伯祿皆千石賢封榮昌伯八年充神機將軍從北征十三年十一月卒子智前立功為常山右護衛指揮嗣父爵宣德中以參將佩征夷將軍印鎮交址怯不任戰又與都督方政相失黎利勢盛不能禦敗績奪爵充為事官從王通立功尋以棄地還下獄得釋正統初復為指揮使張興壽州人起卒伍為燕山左護衛指揮僉事從起兵功多纍遷都指揮同知從子勇有力敢戰從興行陳為肘腋興嘗單騎追敵被數十創傷重不任戰以勇嗣指揮使代將其兵再論功興封安鄉伯永樂五年正月卒無子勇嗣永樂八年從北征失律謫交址赦還復爵卒子安嗣正統十三年鎮廣東黃蕭養寇廣州安帥舟師遇賊於戙船澳安方醉臥官軍不能支退至沙角尾賊薄之軍潰安溺死傳爵至光燦死流寇陳志巴人洪武中為燕山中護衛指揮僉事從起兵纍遷都指揮同知封遂安伯志素以恭謹受知戮力戎行始終不懈永樂八年五月卒孫瑛嗣屢從出塞鎮永平山海薊州城雲州獨石爽闓有將材然貪殘人多怨者卒子塤嗣歿於土木諡榮懷弟韶嗣卒孫鏸嗣總薊州兵𩽆顏入寇禦却之嘉靖初奉迎功加太子太保進少保委寄亞武定侯郭勛嗣伯六十餘年卒又五傳而明亡王友荊州人襲父職為燕山護衛百戶從起兵定京師論功當侯以驕縱授都指揮僉事及丘福等議上乃封清遠伯明年充總兵官帥舟師沿海捕倭倭數掠海上友無功帝切責之已大破倭帝喜降敕褒勞尋召還四年從征交址與指揮柳琮合兵破籌江柵困枚普賴諸山斬首三萬七千餘級六年七月進侯加祿五百石與世券明年再征交址為副總兵八年還從北征督中軍別與劉才築城飲馬河上會知院失乃干欲降帝令友將士卒先行諭以遇敵相機剿滅友等至與敵相距一程迂道避之應昌軍中乏食多死者帝震怒屢旨切責奪其軍屬張輔還令羣臣議罪已而赦之十二年坐妾告友夫婦誹謗有驗奪爵未幾卒仁宗即位官其子順為指揮僉事贊曰張武陳圭諸人或從起藩封或率先歸附皆偏裨列校非有勇略智計稱大將材也一旦遘風雲之會剖符策功號稱佐命與太祖開國諸臣埒酬庸之義不亦厚歟
