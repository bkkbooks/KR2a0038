body:
  text: 明史卷五十九志第三十五禮十三凶禮二皇后陵寢興宗帝后陵寢睿宗帝后陵寢皇妃等喪葬皇太子及妃喪葬諸王及妃公主喪葬皇后陵寢洪武十五年皇后馬氏崩禮部引宋制為請於是命在京文武官及聽除官人給布一匹令自製服皆斬衰二十七日而除服素服百日凡在京官越三日素服至右順門外具喪服入臨畢素服行奉慰禮三日而止武官五品以上文官三品以上命婦亦於第四日素服至乾清宮入臨用麻布蓋頭麻布衫裙鞋去首飾脂粉其外官服制與京官同聞訃日於公廳成服命婦服亦與在京命婦同皆三日而除軍民男女素服三日禁屠宰在京四十九日在外三日停音樂祭祀百日嫁娶官停百日軍民一月將發引告太廟遣官祭金水橋午門等神及鍾山之神帝親祭於几筵百官喪服詣朝陽門外奉辭是日安厝皇堂皇太子奠玄纁玉璧行奉辭禮神主還宮百官素服迎於朝陽門外仍行奉慰禮帝復以醴饌祭於几筵殿自再虞至九虞皆如之遣官告謝鍾山之神卒哭以神主詣廟行祔享禮喪滿百日帝輟朝祭几筵殿致欽不拜東宮以下奠帛爵百官素服行奉慰禮東宮親王妃主以牲醴祭孝陵公侯等從命婦詣几筵殿祭奠自後凡節序及忌日東宮親王祭几筵及陵小祥輟朝三日禁在京音樂屠宰設醮於靈谷寺朝天宮各三日帝率皇太子以下詣几筵殿祭百官素服詣宮門進香訖詣後右門奉慰外命婦詣几筵殿進香皇太子親王熟布練冠九皇孫七皆去首絰負版辟領衰見帝及百官則素服烏紗帽烏犀帶妃主以下熟布蓋頭去腰絰宗室駙馬練冠去首絰內尚衣尚冠以所釋服於几筵殿前丙位焚之皇太子親王復詣陵行禮大祥奉安神主於奉先殿預期齋戒告廟百官陪祀畢行奉慰禮成祖皇后徐氏崩自次日輟朝不鳴鐘鼓帝素服御西角門百官素服詣思善門外哭臨畢行奉慰禮三日成服哭臨如上儀自次日為始各就公署齋宿二十七日止文武四品以上命婦成服日為始詣思善門內哭臨三日聽選辦事官俱喪服人材監生吏典僧道坊廂耆老各素服自成服日始赴應天府舉哀三日餘悉遵高后時儀又定諸王公主等服制世子郡王皆齊衰不杖期世子郡王妃郡主皆大功周楚諸王及寧國諸公主及郡王之子皆小功遣中官訃告諸王府造祔謁太廟祭器諡冊諡寶悉用檀香將冊帝躬告天地於奉天殿丹陛上御華蓋殿鴻臚寺官引頒冊寶官入行禮傳制曰永樂五年十月十四日冊諡大行皇后命卿行禮四拜畢序班舉冊寶案至奉天殿丹陛上置綵輿中由中道出入右順門至几筵殿以冊寶置案退俟於殿外尚儀女官詣香案前跪進曰皇帝遣某官冊諡大行皇后謹告贊宣冊女官捧冊宣於几筵之右置冊於案宣寶如之尚儀奏禮畢女官以冊寶案置几筵之左內官出報禮畢頒冊寶官復命百日禮部請御正門視朝鳴鐘鼓百官易淺淡色服帝以梓宮未葬不允至周期帝素服詣几筵致祭百官西角門奉慰輟朝三日在京停音樂禁屠宰七日禮部官於天禧寺朝天宮齋醮其明日帝吉服御奉天門視朝鳴鐘鼓百官服淺淡色衣烏紗帽黑角帶退朝署事仍素服遇朔望朝見慶賀如常儀几筵祭祀熟布練冠及發引齋三日遣官以葬期告郊廟社稷帝素服祭告几筵皇太子以下衰服行禮遣官祭所過橋門及沿途祀典諸神百官及命婦俱素服以次路祭梓宮至江濱百官奉辭於江濱皇太子送渡江漢王護行途中朝夕哭奠官民迎祭者皆素服既葬賜護送官軍及舁梓宮軍士鈔米有差正統中仁宗皇后張氏崩禮部定大行太皇太后喪禮皇帝成服三日後即聽政祀典皆勿廢諸王以下內外各官及命婦哭臨如前儀衰服二十七日而除軍民男女素服十三日諸王勿會葬外官勿進香臣民勿禁音樂嫁娶及葬遣官告太廟帝親奉太后衣冠謁列祖帝后及仁宗神位又奉宣宗衣冠謁太后神位其禮視時享天順中宣宗皇后孫氏崩儀如故事止改哭臨於清寧門英宗皇后錢氏崩禮如舊惟屠宰止禁七日外國使臣免哭臨正德元年景帝后汪氏薨禮部會羣臣言宜如皇妃例輟朝三日祭九壇太后中宮親王以下文武大臣命婦皆有祭制可憲宗廢后吳氏正德四年薨以大學士李東陽等言禮如英宗惠妃故事憲宗皇后王氏正德十三年崩越三日帝至自宣府乃發喪百官具素服於清寧宮門外聽宣遺誥及發引先期結平臺與順天府交衢相值帝晨出北安門迎皇太后及皇后御平臺候殯復入至清寧宮親奉梓宮朝祖百官步送德勝門外惟送喪官騎送明日帝奉神主還京百官迎於德勝門帝素服腰絰御西角門百官奉慰卒哭始釋服孝宗母紀氏憲宗妃也成化中薨輟朝如故事自初喪及葬帝及皇太后中宮妃主皇子皆致祭遣皇子奉祝冊行禮塋域葬儀俱從厚皇親百官及命婦送葬設祭皆如儀世宗祖母邵氏嘉靖元年崩服除部臣毛澄等請即吉視事議再上命考孝肅太皇太后喪禮澄等言孝肅崩時距葬期不遠故暫持凶服以待山陵事竣與今不同況當正旦朝元亦不宜縞衣臨見萬國若孝思未忘第毋御中門及不鳴鐘鼓足矣從之仍免朔望日陞殿既葬四日帝御奉天門百官行奉慰禮始從吉嘉靖中孝宗皇后張氏崩禮臣以舊制上帝謂郊社不宜瀆罷祭告又謂躬行諸禮前已諭代亦罷謁廟禮及太常寺以朝祖祔廟請各廟捧主官詔主俱不必出蓋從殺也先是武宗皇后夏氏崩禮部上儀注有素冠素服絰帶舉哀及羣臣奉慰禮帝曰朕於皇兄后無服矧上奉兩宮又迫聖母壽旦忍用純素朕青服視事諸儀再擬於是尚書夏言等言莊肅皇后喪禮在臣民無容議惟是皇上以天子之尊服制既絕不必御西角門羣臣成服後不當素服朝參及上喪葬儀帝復諭毅皇后事宜與累朝元后不同無几筵之奉當即行祔廟令皇后攝事於內殿言等議按禮卒哭乃行祔告蓋以新主當入舊主當祧故預以告也此在常典則然非今日義例毅皇后神主誠宜即祔太廟以妥神靈而祔告之禮宜免因具上其儀制可嘉靖七年世宗皇后陳氏崩禮部上喪祭儀帝疑過隆議再上帝自裁定概從減殺欲九日釋服閣臣張璁等言夫婦之倫參三綱而立人君乃綱常之主尤不可不慎左傳昭公十五年六月乙丑周景王太子壽卒秋八月戊寅王穆后崩叔向曰王一歲而有三年之喪二焉蓋古禮父為子夫為妻皆服報服三年後世夫為妻始制為齊衰杖期父母在則不杖喪服自期以下諸侯絕然特為旁期言若妻喪本自三年報服殺為期年則固未嘗絕者今皇上為后服期以日易月僅十二日臣子為君母服三年以日易月僅二十七日較諸古禮已至殺矣皇上宜服期十二日臣子素服終二十七日不然則恩紀不明典禮有乖禮臣方獻夫亦雜引儀禮喪服等篇反覆爭辨幷三朝聖諭所載仁孝皇后崩太宗衰服後仍服數月白衣冠故事以證之帝言文皇后喪時上無聖母下有東宮從重盡禮為宜今不敢不更其制已詹事霍韜言今百官遭妻喪無服衰涖事之禮蓋妻喪內而不外陰不可當陽也聖諭云素服十日倣輟朝之義於內廷行之則可若對臨百官總理萬幾履當陽之位行中宮之服則不可百官為皇后服衰為其母儀天下也禮父在為母杖不上於堂尊父也於朝廷何獨不然臣請陛下玄冠素服御西角門十日即玄冠玄服御奉天門百官入左掖門則烏紗帽青衣侍班退出公署及私室則仍素服白帽二十七日若曰於禮猶有未慊則山陵事畢而除帝從其言尋定進冊諡儀禮部議先期帝袞冕告奉先殿崇先殿至期帝常服御奉天門正副使常服百官淺淡色衣黑角帶入班行禮如儀節冊至右順門內侍捧入正門至几筵前置於案內贊贊就位上香宣冊官立宣訖復置冊於案內侍持節由正門出以節授正副使報禮畢正副使持節復命次日禮部謄黃頒示天下時中宮喪禮自文皇后而後至是始再行永樂時典禮燬於火會典所載皆略乃斷自帝心著為令梓宮將葬帝親定諸儀亦從減損以思善門逼近仁智殿命百官哭臨止一日亦罷辭祖禮喪由左王門出二十六年皇后方氏崩即日發喪諭禮部皇后嘗救朕危其考元后喪禮行之禮部定儀以第四日成服自後黑冠素服十日後易淺色衣俱西角門視朝百官十日素服絰帶自後烏紗帽黑角帶素服通前二十七日帝常服於奉天門視朝百官淺色衣鳴鐘鼓鳴鞭如常朔望不陞殿梓宮發引百官始常服帝於奉先等殿行禮俱常服於几筵祭則服其服服滿日命中官代祭從之尋諭皇妃列太子後非禮其改正及葬部臣以舊儀請詔梓宮由中道行虞祭如制用九數安玄宮居左他日即配祀部臣復上儀注改席殿曰行享殿又以孝潔皇后自發引至神主還京將半載遇令節百官常服今孝烈皇后初十日發引十五日即還事禮不同以諸臣服制請帝命隨喪往來者仍制服祭畢烏紗帽素服入朝素冠素服辦事迎主仍制服思善門外行安神禮更素冠素服從事先是帝命孝烈居左而遷孝潔既而以孝潔久安不宜妄動罷不行乃更命孝烈居右而虛其左以自待穆宗母杜氏三十三年薨禮部言宜用成化中淑妃紀氏喪制且裕王已成婚宜持服主喪送葬出城乃議輟朝五日裕王遵孝慈錄斬衰三年欽遣大臣題主開塋掩壙祠謝后土幷用工部官送葬儀仗人數皆增於舊帝謂非禮之正令酌考賢妃鄭氏例於是尚書歐陽德等復上儀注輟朝二日不鳴鐘鼓帝服淺淡色衣奉天門視事百官淺色衣烏紗帽黑角帶朝參命裕王主饋奠之事王率妃入宮素服哭盡哀四拜視殮成服後朝夕哭臨三日後每日一奠通前二十七日而止仍於燕居盡斬衰三年之制冊諡焚黃日陳祭儀裕王詣靈前行禮喪出玄武門裕王步送至京城門外路祭畢還宮帝謂焚黃乃制命非王可行仍如常儀禮部覆奏皇妃焚黃儀傳訛已久皆拜獻酒跪讀祝乃參用上尊諡之儀而未思賜諡為制命其祭文稱皇帝遣諭與上尊諡不同今奉旨以常禮從事當改議賜諡如賜祭禮讀祝宣冊皆平立不拜報可著為令穆宗皇后李氏裕邸元妃也先薨葬西山隆慶元年加諡孝懿皇后親告世宗几筵御皇極門遣大臣持節捧冊寶詣陵園上之神宗母皇太后李氏萬曆四十二年崩帝諭禮部從優具儀帝衰服行奠祭禮穆廟皇妃中宮妃嬪太子諸王公主以下皆成服百官詣慈寧宮門外哭臨命婦入宮門哭臨餘俱如大喪禮興宗帝后陵寢洪武二十五年皇太子薨命禮部議喪禮侍郎張智等議曰喪禮父為長子服齊衰期年今皇帝當以日易月服齊衰十二日祭畢釋之在內文武官公署齋宿翌日素服入臨文華殿給衰麻服越三日成服詣春和門會哭明日素服行奉慰禮其當祭祀及送葬者仍衰絰以行在京停大小祀事及樂至復土日而止停嫁娶六十日在外文武官易服於公署發哀次日成服行禮停大小祀事及樂十三日停嫁娶三十日其內外官致祭者帝令光祿寺供具百官惟致哀行禮建文帝即位追諡為興宗孝康皇帝所荐陵號不傳元妃常氏先興宗薨太祖素服輟朝三日中宮素服哀臨皇太子齊衰葬畢易常服皇孫斬衰祭奠則服之諸王公主服如制建文初追諡曰孝康皇后永樂初皆追削福王立南京復帝后故號睿宗帝后陵寢睿宗帝后陵寢在安陸州世宗入立追諡曰睿宗獻皇帝葺陵廟荐號曰顯陵既而希進之徒屢言獻皇帝梓宮宜改葬天壽山帝不聽嘉靖十七年帝母蔣太后崩禮部言歲除日大行皇太后服制二十七日已滿適遇正旦請用黑冠淺淡服受朝疏未下帝諭大學士夏言元旦玄極殿拜天仍具祭服先期一日宜變服否禮部請正旦拜天受朝及先一日俱青服孟春時享前三日齋青服臣下同之餘仍孝貞皇太后喪禮例不從於是定議歲除日變服玄色吉衣元旦祭服於玄極殿行告祀禮具翼善冠黃袍御殿百官公服致詞鳴鐘鼓鳴鞭奏堂上樂是時議南北遷祔久不決帝親詣承天及歸乃定議梓宮南祔禮部上葬儀自常典外帝復增定太廟辭謁承天門辭奠朝陽門遣奠題主後降神饗神及梓宮登舟升岸等祭梓宮發引帝衰服行諸禮如儀百官步送朝陽門外奠獻使行遣奠禮至通州題主官復命神主回京百官奉迎於門外帝衰服率皇后以下哭迎午門內奉安於几筵殿梓宮所過河瀆江山神祇俱牲醴致祭勳臣青服行禮梓宮升席殿先詣睿宗舊陵奉遷於恩殿復奉梓宮至殿合葬於新寢皇妃等喪葬洪武七年九月貴妃孫氏薨無子太祖命吳王橚主喪事服慈母服斬衰三年東宮諸王皆服期由是作孝慈錄永樂中貴妃王氏薨輟朝五日御祭一壇皇后皇妃皇太子各祭一壇親王共祭一壇公主共祭一壇七七百日期再期皆祭贈諡冊行焚黃禮開塋域遣官祠后土發引前期辭靈祭壇與初喪同惟增六尚司及內官內使各一壇啟奠祖奠遣奠各遣祭一壇發引日百官送至路祭所皇親駙馬共一壇公侯伯文武共一壇外命婦共一壇所過城門祭祀內門遣內官外門遣太常寺官下葬遣奠遣祭一壇掩壙遣官祀后土迎靈轎至享堂行安神禮遣祭一壇天順七年敬妃劉氏薨輟朝五日帝服淺淡黃衣於奉天門視事百官淺淡色衣烏紗帽黑角帶朝參冊文置靈柩前皇太子以下行三獻禮靈柩前儀仗內使女樂二十四人花旛雪柳女隊子二十人女將軍十一人自初喪至期年辭靈各於常祭外增祭一壇弘治十四年憲廟麗妃章氏發引輟朝一日凡陪葬諸妃歲時俱享於殿內其別葬金山諸處者各遣內官行禮嘉靖間始命併入諸陵從祭恩殿之兩旁以紅紙牌書曰某皇帝第幾妃之位祭畢焚之後改用木刻名號嘉靖十三年諭禮工二部世婦御妻皆用九數九妃同一墓共一享殿為定制皇太子及妃喪葬自洪武中懿文太子後至成化八年悼恭太子薨年甫三歲帝諭禮部禮宜從簡王府及文武官俱免進香帛禮部具儀上自發喪次日輟朝三日帝服翼善冠素服七日而除又三日御西角門視朝不鳴鐘鼓祭用素食文武羣臣素服麻布絰帶麻鞋布裹紗帽詣思善門哭臨一日而除第四日素服朝西角門奉慰在外王府幷文武官素服舉哀二日而除嘉靖二十八年莊敬太子薨禮部上喪禮帝曰天子絕期況十五歲外方出三殤朕服非禮止輟朝十日百官如制成服十二日而除詣停柩所行罷詣門哭臨葬遣戚臣行禮萬曆四十七年二月皇太子才人王氏薨命視皇太子妃郭氏例輟朝五日不鳴鐘鼓帝服淺淡色衣百官青素服黑角帶朝參皇長孫主饋奠諸王及妃公主喪葬諸儀洪武二十八年秦王樉薨詔定喪禮禮部尚書任亨泰言考宋制宜輟朝五日今遇時享請暫輟一日皇帝及親王以下至郡主及靖江王宮眷服制皆與魯王喪禮同皇太子服齊衰期亦以日易月十二日而除素服期年從之定制親王喪輟朝三日禮部奏遣官掌行喪葬禮翰林院撰祭文諡冊文壙志文工部造銘旌遣官造墳欽天監官卜葬國子監監生八名報訃各王府御祭一皇太后皇后東宮各一在京文武官各一自初喪至除服御祭凡十三壇封內文武祭一其服制王妃世子衆子及郡王郡主下至宮人斬衰三年封內文武官齊衰三日哭臨五日而除在城軍民素服五日郡王衆子郡君為兄及伯叔父齊衰期年郡王妃小功凡親王妃喪御祭一壇皇太后中宮東宮公主各祭一壇布政司委官開壙合葬繼妃次妃祭禮同其夫人則止御祭一壇俱造壙祔葬郡王喪輟朝一日行人司遣官掌行喪葬禮餘多與親王同無皇太后皇后祭郡王妃與親王妃同無公主祭合葬郡王繼妃次妃喪禮俱與正妃同凡世子喪御祭一東宮祭一遇七及百日下葬期年除服御祭各一凡世孫喪禮如世子減七七及大祥祭凡鎮國將軍止聞喪百日下葬三祭奉國將軍以下御祭一初洪武九年五月晉王妃謝氏薨命議喪服之制侍講學士宋濂等議曰按唐制皇帝為皇妃等舉哀宋制皇帝為皇親舉哀今參酌唐宋之制皇帝及中宮服大功諸妃皆服小功南昌皇妃服大功東宮公主親王等皆服小功晉王服齊衰期靖江王妃小功王妃服緦麻輟朝三日既成服皇帝素服入喪次十五舉音百官奉慰皇帝出次釋服服常服制曰可其後王妃喪視此正統十三年定親王塋地五十畝房十五間郡王塋地三十畝房九間郡王子塋地二十畝房三間郡主縣主塋地十畝房三間天順二年禮部奏定親王以下依文武大臣例或王或妃先故者合造其壙後葬者止令所在官司安葬繼妃則祔葬其旁同一享堂成化八年二月忻王見治薨發引日帝不視朝及葬輟朝一日十三年四川按察使彭韶言親王郡王薨逝皆遣官致祭使臣絡繹人夫勞擾自後惟親王如舊其郡王初喪遣官一祭餘並遣本處官凡王國母妃之喪俱遣內官致祭今宗婦衆多其地有鎮守太監者宜遣行禮又王國塋葬夫婦同穴初造之時遣官監修開壙合葬乞止命本處官司帝從禮部覆奏王妃祭禮如舊餘依議行弘治十六年七月申王祐楷薨禮部言前沂穆王薨未出府申王已出府而未之國擬依沂穆參以在外親王例行之王妃葬地載於會典者明初追封壽春等十王及妃墳在鳳陽府西北二十五里白塔設祠祭署陵戶南昌等五王及妃祔葬鳳陽皇陵有司歲時祭祀皆與享懷獻世子以下諸王未之國者多葬於西山歲時遣內官行禮永樂十五年正月永安公主薨時初舉張燈宴遂罷之輟朝四日賜祭命有司治喪葬二月太祖第八女福清公主薨輟朝三日定制凡公主喪聞輟朝一日自初喪至大祥御祭凡十二壇下葬輟朝一日儀視諸王稍殺喪制同惟各官不成服其未下嫁葬西山者歲時遣內官行禮
