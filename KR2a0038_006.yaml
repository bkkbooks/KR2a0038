body:
  text: 明史卷六本紀第六成祖二永樂元年春正月己卯朔御奉天殿受朝賀宴羣臣及屬國使乙酉享太廟辛卯大祀天地於南郊復周王橚齊王榑代王桂岷王楩舊封以北平為北京癸巳保定侯孟善鎮遼東丁酉宋晟為平羌將軍鎮甘肅二月庚戌設北京留守行後軍都督府行部國子監改北平曰順天府乙卯遣御史分巡天下為定制己未徙封寧王權於南昌貽書鬼力赤可汗許其遣使通好癸亥耕藉田乙丑遣使徵尚師哈立麻於烏斯藏己巳振北京六府饑辛未命法司五日一引奏罪囚壬申瘞戰地暴骨甲戌高陽王高煦備邊開平三月庚辰江陰侯吳高鎮大同壬午改北平行都司為大寧都司徙保定始以大寧地畀兀良哈戊子平江伯陳瑄都督僉事宣信充總兵官督海運餉遼東北京歲以為常甲午振直隸北京山東河南饑夏四月丁未朔安南胡乞襲陳氏封爵遣使察實以聞己酉戶部尚書夏原吉治蘇松嘉湖水患辛未岷王楩有罪降其官屬甲戌襄城伯李濬鎮江西五月丁丑除天下荒田未墾者額稅癸未宥死罪以下遞減一等庚寅捕山東蝗丁酉河南蝗免今年夏稅是月再論靖難功封駙馬都尉袁容等三人為侯陳亨子懋等六人為伯六月壬子代王桂有罪削其護衛癸丑遣給事中御史分行天下撫安軍民有司奸貪者逮治丁巳改上高皇帝高皇后尊諡戊辰武安侯鄭亨鎮宣府秋七月庚寅復貽書鬼力赤八月己巳發流罪以下墾北京田甲戌徙直隸蘇州等十郡浙江等九省富民實北京九月癸未命寶源局鑄農器給山東被兵窮民庚寅初遣中官馬彬使爪哇諸國乙未奪歷城侯盛庸爵尋自殺庚子岷王楩有罪削其護衛冬十一月乙亥朔頒曆於朝鮮諸國著為令壬辰罷遣浚河民夫甲午北京地震乙未命六科辦事官言事丙申韓觀討柳州山賊平之閏月丁卯封胡為安南國王是年始命內臣出鎮及監京營軍朝鮮入貢者六自是歲時貢賀為常琉球中山山北山南暹羅占城爪哇西王日本剌泥安南入貢二年春正月乙卯大祀天地於南郊己巳召世子高熾及高陽王高煦還京師三月乙巳賜曾棨等進士及第出身有差己酉始選進士為翰林院庶吉士庚戌吏部請罪千戶違制薦士者帝曰馬周不因常何進乎果才授之官否則罷之可耳戊辰改封敷惠王允甌寧王奉懿文太子祀夏四月辛未朔置東宮官屬壬申僧道衍為太子少師復其姓姚賜名廣孝甲戌立子高熾為皇太子封高煦漢王高燧趙王壬午封汪應祖為琉球國山南王五月壬寅豐城侯李彬鎮廣東清遠伯王友充總兵官率舟師巡海六月丁亥汰冗官辛卯振松江嘉興蘇州湖州饑甲午封哈密安克帖木兒為忠順王秋七月壬戌鄱陽民進書毀先賢杖之毀其書丙寅振江西湖廣水災八月丁酉故安南國王陳日煃弟天平來奔九月丙午周王橚來朝獻騶虞百官請賀帝曰瑞應依德而至騶虞若果為祥在朕更當修省丁卯徙山西民萬戶實北京命自今御史巡行察吏毋得托拾人言賢否皆具實蹟以聞冬十月丁丑河決開封乙酉蒲城河津黃河清是月籍長興侯耿炳文家炳文自殺十一月甲辰御奉天門録囚癸丑京師及濟南開封地震敕羣臣修省戊午蠲蘇松嘉湖杭水災田租十二月壬辰同州韓城黃河清是月下李景隆於獄是年占城別失八里琉球山北山南爪哇真臘入貢暹羅日本琉球中山入貢者再三年春正月庚戌大祀天地於南郊甲寅遣使責諭安南庚申復免順天永平保定田租二年二月己巳行部尚書雒僉以言事涉怨誹誅癸未趙王高燧居守北京三月甲寅免湖廣被水田租夏六月己卯中官鄭和帥舟師使西洋諸國庚辰中官山壽等帥兵出雲州覘敵甲申夏原吉等振蘇松嘉湖饑免天下農民戶口食鹽鈔庚寅胡謝罪請迎陳天平歸國秋九月丁酉蠲蘇松嘉湖水災田租凡三百三十八萬石丁巳徙山西民萬戶實北京冬十月盜殺駙馬都尉梅殷丁卯齊王榑有罪三賜書戒之戊子頒祖訓於諸王十二月戊辰沐晟討八百降之庚辰都督僉事黃中呂毅以兵納陳天平於安南是年蘇門答剌滿剌加古里浡泥來貢封其長為王日本貢馬並俘獲倭寇為邊患者爪哇東西占城碟里日羅夏治合貓里火州回回入貢暹羅琉球山南山北入貢者再琉球中山入貢者三四年春正月丁未大祀天地於南郊丙辰初御午朝令羣臣奏事得從容陳論三月辛卯朔釋奠於先師孔子甲午設遼東開原廣寧馬市乙巳賜林環等進士及第出身有差丙午胡襲殺陳天平於芹站前大理卿薛嵓死之黃中等引兵還夏四月己卯遣使購遺書五月丁酉振常州廬州安慶饑庚戌齊王榑有罪削官屬護衛留之京師六月己未朔日當食陰雲不見禮官請表賀不許丙寅南陽獻瑞麥諭禮部曰比郡縣屢奏祥瑞獨此為豐年之兆命薦之宗廟秋七月辛卯朱能為征夷將軍沐晟張輔副之帥師分道討安南兵部尚書劉俊參贊軍務行部尚書黃福大理卿陳洽督餉詔曰安南皆朕赤子惟黎季犛父子首惡必誅他脅從者釋之罪人既得立陳氏子孫賢者毋養亂毋玩寇毋毀廬墓毋害禾稼毋攘財貨掠子女毋殺降有一於此雖功不宥乙巳申誹謗之禁閏月壬戌詔以明年五月建北京宮殿分遣大臣採木於四川湖廣江西浙江山西八月丁酉詔通政司凡上書奏民事者雖小必以聞癸丑齊王榑廢為庶人九月戊辰振蘇松常杭嘉湖流民復業者十二萬餘戶冬十月戊子成國公朱能卒於軍張輔代領其衆乙未克隘留關庚子沐晟率師會於白鶴十一月己巳甘露降孝陵松柏醴泉出神樂觀薦之太廟賜百官十二月辛卯赦天下殊死以下張輔大破安南兵於嘉林江丙申拔多邦城丁酉克其東都癸卯克西都賊遁入海辛亥甌寧王允邸第火王薨是年暹羅占城于闐浡泥日本琉球中山山南婆羅入貢爪哇東西真臘入貢者再別失八里入貢者三琉球進閹人還之回回結牙曲進玉碗却之五年春正月丁卯大祀天地於南郊己巳張輔大敗安南兵於木丸江二月庚寅出翰林學士解縉為廣西參議三月丁巳封尚師哈立麻為大寶法王辛巳張輔大破安南兵於富良江夏四月己酉振順天河間保定饑五月甲子張輔擒黎季犛黎蒼獻京師安南平河南饑逮治匿災有司敕都察院凡災傷不以實聞者罪之六月癸未以安南平詔天下置交址布政司己丑山陽民丁王玉訐其鄉人誹謗擢為刑科給事中甲午詔自永樂二年六月後犯罪去官者悉宥之乙未張輔移師會韓觀討潯柳叛蠻癸卯命張輔訪交址人才禮遣赴京師秋七月乙卯皇后崩丁卯河溢河南八月乙酉左都督何福鎮甘肅庚子録囚雜犯死罪減等論戍流以下釋之九月壬子鄭和還乙卯御奉天門受安南俘大賚將士冬十月潯柳蠻平是年琉球中山山南婆羅日本別失八里阿魯撒馬兒罕蘇門答剌滿剌加小葛蘭入貢六年春正月丁巳岷王楩復有罪罷其官屬辛酉大祀天地於南郊二月丁未除北京永樂五年以前逋賦免諸色課程三年三月癸丑寧陽伯陳懋鎮寧夏乙卯除河南山東山西永樂五年以前逋賦夏四月丙申始命雲南鄉試五月壬戌夜京師地震六月庚辰詔罷北京諸司不急之務及買辦以蘇民困流民來歸者復三年丁亥張輔沐晟還秋七月癸丑論平交址功進封張輔英國公沐晟黔國公王友清遠侯封都督僉事柳升安遠伯餘爵賞有差八月乙酉交址簡定反沐晟為征夷將軍討之劉俊仍參贊軍務九月己酉命刑部疏滯獄癸亥鄭和復使西洋冬十一月丁巳録囚十二月丁酉沐晟及簡定戰於生厥江敗績劉俊及都督僉事呂毅參政劉昱死之是月柳升陳瑄李彬等率舟師分道沿海捕倭是年鬼力赤為其下所弒立本雅失里為可汗浡泥國王來朝瓦剌占城于闐暹羅撒馬兒罕榜葛剌馮嘉施蘭日本爪哇琉球中山山南入貢七年春正月癸丑賜百官上元節假十日著為令乙卯大祀天地於南郊二月乙亥遣使於巡狩所經郡縣存問高年八十以上賜酒肉九十加帛丙子徵致仕知府劉彥才等九十二人分署府州縣辛巳以北巡告天地宗廟社稷壬午發京師皇太子監國張輔王友率師討簡定戊子謁鳳陽皇陵三月甲辰次東平州望祭泰山辛亥次景州望祭山乙卯平安自殺壬戌至北京癸亥大賚官吏軍民丙寅詔起兵時將士及北京效力人民雜犯死罪咸宥之充軍者官復職軍民還籍伍壬申柳升敗倭於青州海中敕還師夏四月癸酉朔皇太子攝享太廟壬午海寇犯欽州副總兵李圭遣將擊敗之閏月戊申命皇太子所決庶務六科月一類奏丙辰諭行在法司重罪必五覆奏五月己卯營山陵於昌平封其山曰天壽乙未封瓦剌馬哈木為順寧王太平為賢義王把禿孛羅為安樂王六月壬寅察北巡郡縣長吏擢汶上知縣史誠祖治行第一下易州同知張騰於獄辛亥給事中郭驥使本雅失里為所殺丁卯斥御史洪秉等四人詔自今御史勿用吏員秋七月癸酉淇國公丘福為征虜大將軍武成侯王聰同安侯火真副之靖安侯王忠安平侯李遠為左右參將討本雅失里八月甲寅丘福敗績於臚朐河福及聰真忠遠皆戰死庚申張輔敗賊於鹹子關九月庚午朔日有食之張輔敗賊於太平海口甲戌贈北征死事李遠莒國公王聰漳國公遂決意親征丙子武安侯鄭亨率師巡邊壬午成安侯郭亮備禦開平冬十月丁未削丘福封爵徙其家於海南十一月戊寅張輔獲簡定於美良送京師誅之十二月庚戌賜濟寧至良鄉民頻年遞運者田租一年乙丑召張輔還是年滿剌加哈烈撒馬兒罕火州古里占城蘇門答剌琉球中山山南入貢暹羅榜葛剌入貢者再八年春正月辛未召寧陽侯陳懋隨征漠北己卯皇太子攝祀天地於南郊癸巳免去年揚州淮安鳳陽陳州水災田租贖軍民所鬻子女二月辛丑以北征詔天下命戶部尚書夏原吉輔皇長孫瞻基留守北京乙巳皇太子録囚奏貰雜犯死罪以下從之丁未發北京癸亥遣祭所過名山大川乙丑大閲三月丁卯清遠侯王友督中軍安遠伯柳升副之寧遠侯何福武安侯鄭亨督左右哨寧陽侯陳懋廣恩伯劉才督左右掖都督劉江督前哨甲戌次鳴鑾戍乙亥誓師夏四月庚申次威虜鎮以橐所載水給衛士視軍士皆食始進膳五月丁卯更名臚朐河曰飲馬甲戌聞本雅失里西奔遂渡飲馬河追之己卯及於斡難河大敗之本雅失里以七騎遁丙戌還次飲馬河詔移師征阿魯台丁亥回回哈剌馬牙殺都指揮劉秉謙據肅州衛以叛千戶朱迪等討平之六月甲辰阿魯台僞降命諸將嚴陳以待果悉衆來犯帝自將精騎迎擊大敗之追北百餘里丁未又敗之己酉班師秋七月丁卯次開平帝在軍念士卒艱苦每蔬食是日宴賚始復常膳西寧侯宋琥鎮甘肅辛巳振安慶徽州鳳陽鎮江饑壬午至北京御奉天殿受朝賀甲午論功行賞有差八月壬寅進封柳升安遠侯乙卯何福自殺庚申河溢開封九月己巳幸天壽山冬十月丁酉發北京是月倭寇福州十一月甲戌至京師十二月癸巳阿魯台遣使貢馬戊午陳季擴乞降以為交址右布政使季擴不受命是年失捏干寇黃河東岸寧夏都指揮王俶敗沒浡泥呂宋馮嘉施蘭蘇門答剌榜葛剌入貢占城貢象琉球山南爪哇暹羅貢馬琉球中山入貢者三九年春正月甲戌大祀天地於南郊丙子柳升鎮寧夏己卯張輔為征虜副將軍會沐晟討交址丙戌豐城侯李彬平江伯陳瑄率浙江福建兵捕海寇二月辛亥陳瑛有罪下獄死丙辰詔赦交址丁巳倭陷昌化千戶所己未工部尚書宋禮開會通河三月甲子賜蕭時中等進士及第出身有差壬午浚祥符縣黃河故道戊子劉江鎮遼東夏六月乙巳鄭和還自西洋是月下交址右參議解縉於獄秋七月丙子張輔敗賊於月常江九月戊寅諭法司凡死罪必五覆奏壬午命屯田軍以公事妨農務者免徵子粒著為令冬十月乙未寬北京謫徙軍民賦役癸卯封哈密兔力帖木兒為忠義王乙巳復修太祖實録十一月戊午蠲陝西逋賦癸亥張輔敗賊於生厥江丁卯立皇長孫瞻基為皇太孫壬申韓觀為征夷副將軍改鎮交址都指揮葛森鎮廣西丙子敕法司決遣罪囚毋淹滯是月遣使督瘞戰場暴骨十二月壬辰敕宥福餘𩽆顏泰寧三衛罪令入貢閏月丁巳命府部諸臣陳軍民利弊是年浙江湖廣河南順天揚州水河南陝西疫遣使振之滿剌加王來朝爪哇榜葛剌古里柯枝蘇門答剌阿魯彭亨急蘭丹南巫里暹羅入貢阿魯台來貢馬別失八里獻文豹琉球中山入貢者三十年春正月己丑命入覲官千五百餘人各陳民瘼不言者罪之言有不當勿問丁酉大祀天地於南郊癸丑振平陽饑逮治布政使及郡縣官不奏聞者二月辛酉蠲山西河南逋賦庚辰遼王植有罪削其護衛三月丁亥豐城侯李彬討甘肅叛寇八耳思𩽆羅歹戊子賜馬鐸等進士及第出身有差甲辰免北京水災租稅夏六月甲戌諭戶部凡郡縣有司及朝使目擊民艱不言者悉逮治秋七月癸卯禁中官干預有司政事八月癸丑張輔大破交址賊於神投海己未敕邊將自長安嶺迤西迄洗馬林築石垣深濠塹冬十月戊辰獵城南武岡十一月壬午侍講楊榮經略甘肅丙申鄭和復使西洋是年浡泥占城暹羅滿剌加榜葛剌蘇門答剌南浡利球琉山南入貢十一年春正月辛巳朔日有食之詔罷朝賀宴會壬午諭通政使禮科給事中凡朝覲官境內災傷不以聞為他人所奏者罪之辛卯大祀天地於南郊辛丑豐城侯李彬鎮甘肅召宋琥還二月辛亥始設貴州布政司癸亥令北京民戶分養孳生馬著為令甲子幸北京皇太孫從尚書蹇義學士黃淮諭德楊士奇洗馬楊溥輔皇太子監國乙丑發京師命給事中御史所過存問高年賜酒肉及帛丙寅葬仁孝皇后於長陵辛未次鳳陽謁皇陵夏四月己酉至北京五月丁未曹縣獻騶虞禮官請賀不許秋七月戊寅封阿魯台為和寧王八月甲子北京地震乙丑鎮遠侯顧成討思州靖州叛苗九月壬午詔自今郡縣官每歲春行視境內蝗蝻害稼即捕絶之不如詔者二司并罪冬十月丙寅以璽書命皇太子録囚十一月戊寅以野蠶繭為衾命皇太子薦太廟壬午瓦剌馬哈木兵渡飲馬河阿魯台告警命邊將嚴守備甲申寧陽侯陳懋都督談青馬聚朱崇巡寧夏大同山西邊簡練士馬尋命陝西山西及潼關等五衛兵駐宣府中都遼東河南三都指揮使司及武平等四衛兵會北京乙巳應城伯孫巖備開平十二月壬子張輔沐晟大敗交址賊於愛子江是年馬哈木弒其主本雅失里立答里巴為可汗別失八里滿剌加占城爪哇西王入貢琉球中山入貢者四琉球山南入貢者再
