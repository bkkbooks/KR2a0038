body:
  text: 明史卷四十志第十六地理一自黃帝畫野置監唐虞分州建牧沿及三代下逮宋元廢興因革前史備矣明太祖奮起淮右首定金陵西克湖湘東兼吳會然後遣將北伐幷山東收河南進取幽燕分軍四出芟除秦晉訖於嶺表最後削平巴蜀收復滇南禹跡所奄盡入版圖近古以來所未有也洪武初建都江表革元中書省以京畿應天諸府直隸京師後乃盡革行中書省置十三布政使司分領天下府州縣及羈縻諸司又置十五都指揮使司以領衞所番漢諸軍其邊境海疆則增置行都指揮使司而於京師建五軍都督府俾外都指揮使司各以其方附焉成祖定都北京北倚羣山東臨滄海南面而臨天下乃以北平為直隸又增設貴州交阯二布政使司仁宣之際南交屢叛旋復棄之外徼終明之世為直隸者二曰京師曰南京為布政使司者十三曰山東曰山西曰河南曰陝西曰四川曰湖廣曰浙江曰江西曰福建曰廣東曰廣西曰雲南曰貴州其分統之府百有四十州百九十有三縣千一百三十有八羈縻之府十有九州四十有七縣六編里六萬九千五百五十有六而兩京都督府分統都指揮使司十有六行都指揮使司五曰北平曰山西曰陝西曰四川曰福建留守司二所屬衞四百九十有三所二千五百九十有三守禦千戶所三百一十有五又土官宣慰司十有一宣撫司十安撫司二十有二招討司一長官司一百六十有九蠻夷長官司五其邊陲要地稱重鎮者凡九曰遼東曰薊州曰宣府曰大同曰榆林曰寧夏曰甘肅曰太原曰固原皆分統衞所關堡環列兵戎綱維布置可謂深且固矣計明初封略東起朝鮮西據吐番南包安南北距大磧東西一萬一千七百五十里南北一萬零九百四里自成祖棄大寧徙東勝宣宗遷開平於獨石世宗時復棄哈密河套則東起遼海西至嘉峪南至瓊崖北抵雲朔東西萬餘里南北萬里其聲教所訖歲時納贄而非命吏置籍侯尉羈屬者不在此數嗚呼盛矣論者謂交阯之棄未為失圖而開平近遷則守衞益薄雖置萬全都指揮使司不足以鎮伏山後諸部故再傳而有土木之變然睿皇自以失律蒙塵非由經制未備景帝任賢才修守禦國步未移乘輿旋復由是觀之三衞者一隅之隘而無關大計也審矣至其季世流寇首禍於西陲浸尋蔓延中原為之糜爛金湯之固不足以制土崩昄宇之廣不足以成掎角疆圉不蹙於曩時形勝無虧於初盛而強弱懸殊興亡異數者天降喪亂昏椓內訌人事之乖而非地利之失也語曰在德不在險詎不信夫今考其升降之差沿革之故具著於篇作地理志京師南京京師禹貢冀兗豫三州之域元直隸中書省洪武元年四月分屬河南山東兩行中書省二年三月置北平等處行中書省治北平府先屬山東河南者皆復其舊領府八州三十七縣一百三十六八月置燕山都衞與行中書省同治八年十月改都衞為北平都指揮使司九年六月改行中書省為承宣布政使司永樂元年正月建北京於順天府稱為行在二月罷北平布政使司以所領直隸北京行部罷北平都指揮使司以所領直隸北京留守行後軍都督府十九年正月改北京為京師罷北京留守行後軍都督府直隸後軍都督府衞所有實土者附見無實土者不載罷北京行部直隸六部洪熙初仍稱行在正統六年十一月罷稱行在定為京師府八直隸州二屬州十七縣一百一十六為里三千二百三十有奇府州縣建置沿革俱自元始其沿革年月已見元史志者不載其未見元史志及明改元舊幷新增新廢者悉書北至宣府外為邊地東至遼海與山東界南至東明與山東河南界西至阜平與山西界洪武二十六年編戶三十三萬四千七百九十二口一百九十二萬六千五百九十五順天府元大都路直隸中書省洪武元年八月改為北平府十月屬山東行省二年三月改屬北平三年四月建燕王府永樂元年正月升為北京改府為順天府永樂四年閏七月詔建北京宮殿修城垣十九年正月告成宮城周六里一十六步亦曰紫禁城門八正南第一重曰承天第二重曰端門第三重曰午門東曰東華西曰西華北曰玄武宮城之外為皇城周一十八里有奇門六正南曰大明東曰東安西曰西安北曰北安大明門東轉曰長安左西轉曰長安右皇城之外曰京城周四十五里門九正南曰麗正正統初改曰正陽南之左曰文明後曰崇文南之右曰順城後曰宣武東之南曰齊化後曰朝陽東之北曰東直西之南曰平則後曰阜成西之北曰彰儀後曰西直北之東曰安定北之西曰德勝嘉靖三十二年築重城包京城之南轉抱東西角樓長二十八里門七正南曰永定南之左為左安南之右為右安東曰廣渠東之北曰東便西曰廣寧西之北曰西便領州五縣二十二弘治四年編戶一十萬五百一十八口六十六萬九千三十三萬曆六年戶一十萬一千一百三十四口七十萬六千八百六十一大興倚東南有大通河亦曰通惠河水自玉河出繞都城東南下流至高麗莊入白河即元運河也又有玉河源自玉泉山流經大內出都城東南注大通河宛平倚西山在西有桑乾河出山西馬邑縣流千里入京師宛平縣境出盧溝橋下又東南分為二一至通州入白河一至武清小直沽合衞河入於海又有沙河高梁河清河皆在西北西又有沿河口守禦千戶所有盧溝王平口石港口齊家莊四巡檢司良鄉府西南有琉璃河即古聖水下流入淀北有天津關固安府西南元固安州洪武元年十二月降為縣西南有拒馬河即淶水源自代郡下流合易水為白溝入三角淀永清府南南有拒馬河東安府東南元東安州治在西洪武元年十二月降為縣三年徙今治南有鳳河即桑乾分流南入三角淀香河府東南元屬漷州洪武十年二月省入州十三年二月復置改屬府西有板罾口河源出通州東之孤山經縣界入於白河通州洪武初以州治潞縣省入西有通惠河西南有渾河即桑乾至州東張家灣俱合於白河有張家灣巡檢司西南有弘仁橋巡檢司西距府四十里領縣四三河州東北有泃河又西有洳河西南有鮑丘河一名矣榆河即東潞水俱流入於泃河西有泥窪舖巡檢司後移於夏店舖武清州南元屬漷州洪武十二年來屬有三角淀在縣南即古之雍奴周二百餘里諸水所聚有直沽在縣東南衞河白河丁字沽合流於此入海有巡檢司又東北有河西務東南有楊村二巡檢司漷縣州南元漷州洪武十四年二月降為縣來屬有漷河一名新河東入於白河即盧溝之下流寶坻州東南元直隸大都路洪武十年二月來屬東有潮河南有泃河又縣東南有梁城守禦千戶所建文二年燕王置有蘆臺巡檢司霸州洪武初以州治益津縣省入拒馬河舊在北後徙治南又南有沙河東有苑家口巡檢司北距府二百十里領縣三文安州南少東西有易水東北有得勝火燒等淀大城州東南東北有黃汊河源自交河分流至縣境入三角淀保定州南少西洪武七年九月省入霸州十三年十一月復置玉帶河在北東流入會通河西南有磁河東南與玉帶河合涿州洪武初以州治范陽縣省入西有獨鹿山北有涿水西北有挾河合焉南有范水東北距府百四十里領縣一房山州北少西西有大房山北有大安山西南有青龍潭其下流為挾河一名韓村河至涿州與胡良河合北有磁家務巡檢司昌平州元昌平縣直隸大都路正德元年七月升為州旋罷八年復升為州舊治白浮圖城景泰元年築永安城於東三年遷縣治焉北有天壽山成祖以下陵寢咸在東南有白浮山西南有駐蹕山又南有榆河一名溫餘河下流為沙河入於白河又東南有鞏華城嘉靖十九年築東北有黃花鎮弘治中置渤海守禦千戶所於此萬曆元年移於慕田峪四年復故西有鎮邊城又有常峪城俱正德十年五月築各置守禦千戶所又有白陽守禦千戶所亦正德中置西北有居庸關南距府九十里領縣三順義州東少南元順州洪武元年十二月改為順義縣屬府正德元年七月來屬東有白河西南有榆河又有潮河俱流入焉懷柔州東北洪武元年十一月省入檀州十二月復分密雲昌平二縣地置屬府正德元年七月來屬東有黍谷山西有白河密雲州東北元檀州後置縣為州治洪武元年十一月省縣入州十二月復置縣省州入焉屬府正德元年七月來屬南有白檀山西有白河東有潮河北有古北口洪武十二年九月置守禦千戶所於此三十年改為密雲後衞又有石塘嶺牆子嶺等關薊州洪武初以州治漁陽縣省入西北有盤山東北有崆峒山又泃水在北沽河在南州北有黃崖峪寬佃峪等關東又有石門鎮西距府二百里領縣四玉田州東南東北有無終山又有徐無山又東有梨河北有浭水東南有興州左屯衞永樂元年自故開平境移置於此豐潤州東南南有沙河西南有浭水遵化州東東北有五峯山南有靈靈山及龍門峽又東有灤河西南有梨河北有喜峯口馬蘭峪松亭等關平谷州西北洪武十年二月省入三河縣十三年十一月復置東南有泃河又有洳河西北有營州中屯衞永樂元年自故龍山縣移置於此又東有黃松峪關與密雲縣將軍石關相接保定府元保定路直隸中書省洪武元年九月為府十月屬河南分省二年三月來屬領州三縣十七東北距京師三百五十里弘治四年編戶五萬六百三十九口五十八萬二千四百八十二萬曆六年戶四萬五千七百一十三口五十二萬五千八十三清苑倚北有徐河一名大冊水自滿城經縣北至安州東入淀又西有清苑河又南有張登巡檢司嘉靖十三年自滿城縣方順橋移置於此滿城府西少北洪武十年五月省入慶都縣十三年十一月復置北有徐河南有方順河安肅府北少東元安肅州洪武二年七月降為縣易水在北曹河在南徐河在西西南又有鮑河又西有遂州元屬保定路洪武初降為縣八年二月省定興府北少東元屬易州洪武六年五月改屬府西有拒馬河即淶水也又易水自西來合焉謂之白溝河南有河陽巡檢司後移於清苑縣界之固城鎮新城府東北元屬雄州洪武初屬北平府六年五月改屬府南有白溝河西南有巨河鎮巡檢司雄府東北元雄州洪武二年七月省州治歸信縣入焉七年四月降為縣北有白溝河南有瓦濟河容城府東北元屬雄州洪武七年四月省入州十三年十一月復置來屬舊治在拒馬河南景泰二年遷於河北西有易水又有濡水唐府西少南西北有大茂山即岳也東麓有岳嶺口巡檢司又唐河在西源出山流經定州曰滱水下流合於南易水又西北有倒馬關有巡檢司後移於縣西之橫河口又有周家舖軍城鎮二巡檢司慶都府西南南有唐河北有祁水博野府南舊治在今蠡縣界直隸保定路洪武元年徙今治改屬祁州六年五月還屬府西北有博水南有唐河亦曰滱水又有永安鎮巡檢司有鐵燈盞巡檢司蠡府南少東元蠡州屬真定路洪武二年七月來屬八年正月降為縣楊村河在南滋沙唐三河之下流也俗亦謂之唐河完府西元完州洪武二年七月降為縣西有伊祁山祁水出焉其下流為方順河祁州洪武二年七月以州治蒲陰縣省入北有唐河西南有滋河至州東南合沙河流入易水北距府百二十里領縣二深澤州南少西西有滋河束鹿州東南北有故城今治天啟二年所徙滹沱河在南又南有百天口巡檢司安州洪武二年七月以州治葛城縣省入七年降為縣十三年十一月復升為州北有易水府境九河之水所也下流至雄縣南為瓦濟河西距府七十里領縣二高陽州南元屬安州洪武六年五月改屬府尋屬蠡州八年正月省入蠡縣十三年十一月復置還屬故城在東洪武三年圮於水遷於今治東有馬家河其上流為蠡縣之楊村