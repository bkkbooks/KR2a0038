body:
  text: 明史卷九十九志第七十五藝文四集類三一曰別集類二曰總集類三曰文史類明太祖文集五十卷詩集五卷仁宗文集二十卷詩集二卷宣宗文集四十四卷詩集六卷樂府一卷憲宗詩集四卷孝宗詩集五卷世宗翊學詩一卷宸翰錄一卷咏和錄一卷咏春同德錄一卷白鵲贊和集一卷神宗勸學詩一卷各藩及宗室自著詩文集已見本傳不載宋濂潛溪文集三十卷皆元時作潛溪文粹十卷劉基選續文粹十卷方孝孺鄭濟同選宋學士文集七十五卷鑾坡前集十卷後集十卷續集十卷別集十卷芝園前集十卷後集十卷別集十卷朝天集五卷詩集五卷劉基覆瓿集二十四卷拾遺二卷皆元時作犁眉公集四卷文成集二十卷彙編諸集及郁離子春秋明經諸書詞四卷危素學士集五十卷葉儀南陽山房稿二十卷王冕竹齋詩集三卷范祖幹柏軒集四卷戴良九靈山房集三十卷王逢梧溪詩集七卷梁寅石門集四卷楊維楨東維子集三十卷鐵崖文集五卷古樂府十六卷詩集六卷陶宗儀南村詩集四卷貢性之南湖集二卷謝應芳龜巢集二十卷張昱詩集二卷楊芾鶴崖集二十卷李祁雲陽先生集十卷裔孫李東陽傳其集涂幾涂子類稿十卷張憲玉笥集十卷吳復雲槎集十卷華幼武黃楊集四卷陶振賦一卷洪武初振獻紫金山金水河及飛龍在天三賦陶安文集二十卷李習橄欖集五卷汪廣洋鳳池吟稿十卷孫炎左司集四卷劉炳春雨軒集十卷詞一卷劉簡文集五卷郭奎望雲集五卷王禕忠文集二十四卷張以寧翠屏集五卷詹同文集三卷劉崧文集十八卷詩八卷魏觀蒲山集四卷朱善一齋集十卷遼海集五卷顧輝守齋類稿三十卷朱升楓林集十二卷趙汸東山集十五卷汪克寬環谷集八卷唐桂芳白雲集略四十卷李勝原盤谷遺稿五卷胡翰文集十卷蘇伯衡蘇平仲集十六卷朱廉文集十七卷陳謨海桑集十卷周霆震石初集十卷高啟槎軒集十卷大全集十八卷詞一卷楊基眉菴集十二卷詞一卷徐賁北郭集六卷張羽靜居集六卷陳基夷白齋集二十卷王彝溈蜼子集四卷王行半軒集十二卷袁凱海叟詩集四卷孫作滄螺集六卷朱右白雲稿十二卷徐尊生制誥二卷懷歸稿十卷還鄉稿十卷貝瓊清江文集三十卷詩十卷顧祿經進集二十卷答祿與權文集十卷杜斅拙菴集十卷吳源託素齋集八卷劉駟文集十卷宋訥西隱集十卷劉三吾坦齋集二卷一作坦翁集十二卷張孟兼名丁以字行文集六卷王翰敝帚集五卷梁園寓稿九卷方克勤愚菴集二十卷吳伯宗集二十四卷南宮使交成均玉堂凡四種杜隰雙清集十卷鄭真滎陽外史集一百卷吳玉林松蘿吟稿二十卷方幼學翬山集十二卷唐肅丹崖集八卷謝肅密菴集十卷謝徽蘭庭集六卷邵亨貞蛾術文集十六卷烏斯道春草齋集十卷貝翺舒菴集十卷葉顒樵雲集六卷沈夢麟花溪集三卷劉廌盤谷集十卷宋禧文集三十卷詩十卷鄭淵遂初齋稿十卷林靜愚齋集二十卷劉永之山陰集五卷龔斅鵝湖集六卷王沂徵士集八卷王祐長江稿五卷解開文集四十卷林鴻鳴盛集四卷鴻與唐泰黃玄周玄鄭定高棅王偁王褒王恭陳亮另有閩中十才子詩十卷孫蕡西菴集九卷蕡與王佐黃哲趙介李德另有廣中五先生詩四卷藍仁詩集六卷藍智詩集六卷張適樂圃集六卷浦源舍人集十卷林弼登州集六卷陸中蒲棲集二十卷林大同文集九卷丁鶴年海巢集三卷本西域人後家武昌永樂中始卒楚憲王為刻其集方孝孺遜志齋集三十卷拾遺十卷黃孔昭謝鐸同輯卓敬卓氏遺書五十卷練子寧金川玉屑集五卷茅大芳集五卷程本立巽隱集四卷王艮吉水人王充耘孫翰林集十卷王叔英靜學集二卷周是修芻蕘集六卷鄭居貞集五卷程通遺稿十卷梅殷都尉集三卷任亨泰遺稿二卷王紳文集三十卷王稌青巖類稿十卷林右集二卷王賓詩集二卷張紞鶠菴集一卷樓璉居夷集五卷龔詡野古集二卷高遜志嗇齋集二卷解縉學士集三十卷春雨集十卷似羅隱集二卷已上洪武建文時姚廣孝逃虛子集十卷外集一卷黃淮省愆集二卷詞一卷胡廣集十九卷楊榮兩京類稿三十卷玉堂遺稿十二卷楊士奇東里集二十五卷詩三卷胡儼頤菴集三十卷金幼孜集十二卷夏原吉集六卷王鈍野莊集六卷鄭賜聞一齋集四卷趙羾集三卷茹瑺詩一卷黃福家集三十卷使交文集十七卷鄒濟頤菴集九卷王達天游集二十二卷曾棨集十八卷林環文集十卷詩三卷林誌蔀齋集十五卷王汝玉詩集八卷張洪集二卷王紱詩集五卷梁潛泊菴集十二卷劉髦石潭集五卷鄒緝素菴集十卷王偁虛舟集五卷王褒養靜齋集十卷王恭詩集七卷高棅嘯臺集二十卷木天清氣集十四卷黃壽生文集十卷楊慈文集五卷蘇伯厚履素集十卷鄭棠道山集二十卷劉均拙菴集八卷徐永達文集二十卷詩十卷王洪毅齋集八卷黃裳集十卷袁忠徹符臺外集五卷陸顒頤光集二十卷瞿佑存齋樂全集三卷詞三卷曾鶴齡松臞集三卷陳叔剛絅齋集十卷柯暹東岡集十二卷羅亨信集十二卷劉鉉詩集六卷金實文集二十八卷王暹奏議二十卷文集四十卷蘇鉦竹坡吟稿二十卷周鳴退齋稿六十卷方勉怡菴集十五卷周石溪集十八卷楊溥文集十二卷詩四卷胡濙澹菴集五卷已上永樂時熊概芝山集四十卷公餘集三十卷吳訥文集二十卷詩八卷秦樸抱拙集六卷陳繼怡菴集二十卷黃澤詩集十四卷羅紘蘭坡集十二卷馬愉淡軒文集八卷陳循芳洲集十六卷高穀集十卷廖莊漁梁集二卷林文澹軒稿十二卷龔錡蒙齋集十卷王訓文集三十卷梁萼集二十卷姜洪松岡集十一卷楊復土苴集五十卷劉廣衡雲菴集三十卷陳泰拙菴集二十五卷李奎九川集六卷徐琦文集六卷已上洪熙宣德時孫原貞奏議八卷歲寒集二卷王直抑菴集四十二卷王英文集六卷詩五卷錢習禮文集十四卷應制集一卷陳鎰文集六卷魏驥摘稿十卷周忱雙崖集八卷陳璉琴軒稿三十卷周旋文集十卷劉球兩谿集二十四卷張楷和唐音二十八卷和李杜詩十二卷李時勉文集十一卷詩一卷陳敬宗澹然集十八卷張倬毅齋集二十卷鄭鯨雲遨摘稿八卷彭時奏疏一卷文集四卷商輅奏議一卷文集三十二卷蕭鎡文集二十卷詩十卷于謙奏議十卷文集二十卷郭登聯珠集二十二卷景泰初登封定襄伯有詩名是集以其父王玉兄武之作與登詩合編何文淵奏議一卷文稿四卷章瑄竹莊集四十卷吳宣野菴集十六卷鄭文康平橋集十八卷劉溥草窗集二卷溥與蔣主忠王貞慶晏鐸蘇平蘇正湯胤勣王淮沈愚鄒亮等稱景泰十才子當時各有專稿桑琳鶴溪集二十卷錢洪詩集四卷劉英詩集六卷徐有貞武功集八卷許彬文集十卷詩四卷薛瑄敬軒集四十卷詩八卷李賢古穰集三十卷續集二十卷呂原介軒集十二卷岳正類博稿十卷劉儼文集三十二卷吳與弼康齋文集十二卷王宇厚齋集三卷張穆勿齋集二十卷劉昌五臺集二十二卷胥臺鳳臺金臺嵩臺越臺諸稿彙編蕭儼竹軒集二十卷周瑩郡齋稿十卷羅周梅隱稿十八卷姚綬雲東集十卷湯胤勣東谷集十卷易貴文集十五卷已上正統景泰天順時劉定之存稿二十一卷續稿五卷劉珝文集十六卷軒輗奏議四卷彭華文集十卷尹直澄江集二十五卷姚夔奏議三十卷文集十卷李裕奏議七卷文集四卷楊鼎奏議五卷文稿二十卷倪謙玉堂南宮上谷歸田四稿共一百七十卷余子俊奏議六卷周洪謨箐齋集五十卷南皐集二十卷林聰奏議八卷文集十四卷張瑄奏議八卷觀菴集十五卷關洛紀巡錄十七卷謝一夔文集六卷韓雍奏議一卷文集十五卷柯潛竹巖集八卷陸釴春雨堂稿三十卷葉盛奏草三十卷文稿二卷詩一卷楊守陳全集三十卷范理丹臺稿十卷林鶚文稿十卷羅倫一峯集十卷莊昶定山集十卷黃仲昭未軒集十三卷陳獻章白沙子八卷文集二十二卷遺編六卷楊起元文編六卷張弼文集五卷詩四卷胡居仁敬齋集三卷陳真晟布衣存稿九卷夏寅文集四十卷備遺錄二十三卷張寧文集三十二卷夏時正留餘稿三十五卷陸容式齋集三十八卷龍瑄鴻泥集二十卷周瑛翠渠摘稿七卷段正介菴集三十卷蔣琬文集十卷朱翰石田稿十四卷張冑西溪集十五卷丁元吉文集六十四卷劉敔鳳巢稿六卷桑悅兩都賦二卷古賦三卷文集十六卷祁順巽川集二十卷徐溥文集七卷丘濬瓊臺類稿五十二卷詩十二卷李東陽懷麓堂前後集九十卷續稿二十卷謝遷歸田稿十卷陸簡龍皐稿十九卷程敏政篁墩全集一百二十卷吳寬匏菴集七十八卷張元禎文集二十四卷王恕奏稿十五卷文集九卷韓雍奏議一卷倪岳青溪漫稿二十四卷馬文升奏議十六卷文集一卷王思軒集十二卷楊守阯碧川文鈔二十九卷詩二十卷張昇文集二十二卷童軒枕肱集二十卷杭淮雙溪詩集八卷黎淳龍峯集十三卷劉大夏奏議一卷詩二卷張悅集五卷何喬新文集三十二卷彭韶奏議五卷文集十二卷王珣奏稿十卷詩二卷閔珪文集十卷徐貫餘力集十二卷董越文集四十二卷謝鐸奏議四卷文稿四十五卷詩三十六卷陳音愧齋集十二卷張詡東所集十卷鄒智立齋遺文四卷李承箕大崖集二十卷錢福文集六卷楊循吉遺集五卷邵珪半江集六卷趙寬半江集六卷杭濟詩集六卷吳元應詩集十五卷顧潛靜觀堂集十四卷文林溫州集十二卷呂九柏集六卷沈周石田詩鈔十卷史鑑西村集八卷祝允明祝氏集略三十卷懷里堂集三十卷小集七卷唐寅集四卷顧磐海涯集十卷王鏊文集三十卷楊廷和奏議一卷石齋集八卷梁儲鬱洲集九卷費宏文集二十四卷靳貴戒菴集二十卷楊一清奏議三十卷石淙類稿四十五卷詩二十卷蔣冕湘皐集三十三卷毛紀鼇峯類稿二十六卷韓文質菴集四卷吳文度交石集十卷林瀚集二十五卷屠勳東湖稿十二卷羅玘奏議一卷文集十八卷續集十四卷儲巏文集十五卷王鴻儒凝齋集九卷邵寶容春堂全集六十一卷章懋文集九卷楊廉奏議四卷文集六十二卷喬宇白巖集二十卷黃瓚文集十二卷蔡清虛齋文集五卷魯鐸文集十卷王雲鳳虎谷集二十一卷毛澄類稿十八卷王瓊奏議四卷彭澤幸菴行稿十二卷林俊文集四十卷詩十四卷李夢陽空同全集六十六卷康海對山集十九卷樂府二卷王九思渼陂集十九卷樂府四卷何景明大復集六十四卷鄭善夫奏議一卷少谷全集二十五卷徐禎卿功集十一卷朱應登凌溪集十九卷王廷陳夢澤集三十八卷景暘前谿集十四卷陳沂文集十二卷詩五卷田汝耔奏議五卷水南集十八卷倫文迂岡集十卷白沙集十二卷顏木燼餘稿四卷盧雍古園集十二卷陳霆水南集十七卷王守仁陽明全書三十八卷陸完水村集二十卷唐錦龍江集十四卷穆孔暉文集三卷史學埭谿集二十卷許莊康衢集一百卷汪循仁峯文集二十五卷錢仁夫水部詩曆十二卷徐璉玉峯集十五卷五言詩五卷黃省曾五岳山人集三十八卷孫一元太白山人稿五卷謝承舉一名璿詩集十五卷王寵雅宜山人集十卷傅汝舟丁戊集十二卷高瀫石門集二卷蕭雍酌齋遺稿四卷已上成化弘治正德時廖道南文集五十卷詩六卷羅欽順整菴稿三十三卷何孟春疏議十卷文集十八卷顧清文集四十二卷劉瑞五清集十八卷呂柟涇野集五十卷何瑭文集十一卷魏校莊渠文錄十六卷詩四卷陳察虞山集十三卷楊慎文集八十一卷南中集七卷詩五卷詞四卷胡世寧奏議十卷鄭岳山齋稿二十四卷陳洪謨文稿二卷王時中奏議十卷董文集六卷秦金詩集十卷潘希曾奏議四卷竹澗集八