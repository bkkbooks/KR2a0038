body:
  text: 明史卷五十八志第三十四禮十二凶禮一山陵次五曰凶禮凡山陵寢廟與喪葬服紀及士庶喪制皆以類編次其謁陵忌辰之禮亦附載焉山陵太祖即位追上四世帝號皇祖考熙祖墓在鳳陽府泗州蠙城北薦號曰祖陵設祠祭署置奉祀一員陵戶二百九十三皇考仁祖墓在鳳陽府太平鄉太祖至濠嘗議改葬不果因增土以培其封令陵旁故人汪文劉英等二十家守視洪武二年薦號曰陵後改稱皇陵設皇陵衛並祠祭署奉祀一員祀丞三員俱勳舊世襲陵戶三千三百四十二直宿灑掃禮生二十四人四年建祖陵廟倣唐宋同堂異室之制前殿寢殿俱十五楹東西旁各二為夾室如晉王肅所議中三楹通為一室奉德祖神位以備祫祭東一楹奉懿祖西一楹奉熙祖十九年命皇太子往泗州修繕祖陵葬三祖帝后冠服三十一年太祖崩禮部定議京官聞喪次日素服烏紗帽黑角帶赴內府聽遺詔於本署齋宿朝晡詣几筵哭越三日成服朝晡哭臨至葬乃止自成服日始二十七日除命婦孝服去首飾由西華門入哭臨諸王世子王妃郡主內使宮人俱斬衰三年二十七月除凡臨朝視事素服烏紗帽黑角帶退朝衰服羣臣麻布員領衫麻布冠麻絰麻鞋命婦麻布大袖長衫麻布蓋頭明器如鹵簿神主用栗制度依家禮行人頒遺詔於天下在外百官詔書到日素服烏紗帽黑角帶四拜聽宣讀訖舉哀再四拜三日成服每旦設香案哭臨三日除各遣官赴京致祭祭物禮部備孝陵設神宮監並孝陵衛及祠祭署建文帝詔行三年喪事在本紀以遭革除喪葬之制皆不傳文帝崩於榆木川遺詔一遵太祖遺制京師聞訃皇太子以下皆易服宮中設几筵朝夕哭奠百官素服朝夕哭臨思善門外禮部定喪禮宮中自皇太子以下及諸王公主成服日為始斬衰三年二十七月除服內停音樂嫁娶祭祀止停百日文武宮聞喪之明日詣思善門外哭五拜三叩頭宿本署不飲酒食肉四日衰服朝夕哭臨三日又朝臨十日衰服二十七日凡入朝及視事白布裹紗帽垂帶素服腰絰麻鞋退朝衰服二十七日外素服烏紗帽黑角帶二十七月而除聽選辦事等官衰服監生吏典僧道素服赴順天府朝夕哭臨三日又朝臨十日命婦第四日由西華門入哭臨三日俱素服二十七日除凡音樂祭祀並輟百日婚嫁官停百日軍民停一月軍民素服婦人素服不妝飾俱二十七日在外以聞喪日為始越三日成服就本署哭臨餘如京官命婦素服舉哀三日二十七日除軍民男女皆素服十三日餘俱如京師凡京官服給麻布一匹自製四夷使臣工部造與諸王公主遣官及內外文武官詣几筵祭祀者光祿寺備物翰林院撰文禮部引赴思善門外行禮京城聞喪日為始寺觀各鳴鐘三萬杵禁屠宰四十九日喪將至文武官衰服軍民素服赴居庸關哭迎皇太子親王及羣臣皆衰服哭迎於郊至大內奉安於仁智殿加斂奉納梓宮遣中官奉大行皇帝遺衣冠作書賜漢王趙王禮臣言喪服已踰二十七日請如遺命以日易月帝以梓宮在殯不忍易素冠麻衣麻絰視朝退仍衰服羣臣聽其便十二月禮部進葬祭儀發引前三日百官齋戒遣官以葬期告天地宗社皇帝衰服告几筵皇太子以下皆衰服隨班行禮百官衰服朝一臨至發引止前一日遣官祭金水橋午門端門承天門大明門德勝門並所過河橋京都應祀神祇及經過應祀神祠儀用酒果肴饌是夕設辭奠帝后太子以下皆衰服以序致祭司禮監禮部錦衣衛命執事者設大升輿陳葬儀於午門外並大明門外將發設啓奠皇帝暨皇太子以下衰服四拜奠帛獻酒讀祝四拜舉哀興哀止望瘞執事者升徹帷幕拂拭梓宮進龍輴於几筵殿下設神亭神帛輿諡册寶輿於丹陛上設祖奠如啓奠儀皇帝詣梓宮前西向立皇太子親王以次侍立內侍於梓宮前奏請靈駕進發捧册寶神帛置輿中次銘旌出執事官升梓宮內執事持翣左右蔽降殿內侍官請梓宮升龍輴執事官以綵帷幕梓宮內侍持傘扇侍衛如儀舊御儀仗居前册寶神帛神亭銘旌以次行皇帝由殿左門出后妃皇太子親王及宮妃後隨至午門內設遣奠如祖奠儀內侍請靈駕進發皇帝以下哭盡哀俱還宮梓宮至午門外禮官請梓宮升大升輿執事官奉升輿訖禮官請靈駕進發皇太子親王以下哭送出端門外行辭祖禮執事官設褥位於太廟香案前皇太子易常服捧神帛由左門入至褥位跪置神帛於褥興正立於神帛後跪禮官跪於左奏太宗體天弘道高明廣運聖武神功純仁至孝文皇帝謁辭皇太子俯伏興贊五拜三叩頭畢皇太子捧神帛興以授禮官禮官安輿中請靈駕進發皇太子仍喪服親王以下隨行梓宮由大明中門出皇太子以下由左門出步送至德勝門外乘馬至陵在途朝夕哭奠臨諸王以下及百官軍民耆老四品以上命婦以序沿途設祭文武官不係山陵執事者悉還至陵執事官先陳龍輴於獻殿門外俟大升輿至禮官請靈駕降輿升龍輴詣獻殿執事官奉梓宮入皇太子親王由左門入安奉訖行安神禮皇太子四拜興奠酒讀祝俯伏興四拜舉哀親王以下陪拜如常儀遣官祀告后土並天壽山設遷奠禮如上儀將掩玄宮皇太子以下詣梓宮前跪內侍請靈駕赴玄宮執事官奉梓宮入皇堂內侍捧册寶置於前陳明器行贈禮皇太子四拜興奠酒進贈執事官捧玉帛進於右皇太子受獻以授內執事捧入皇堂安置俯伏興四拜舉哀遂掩玄宮行饗禮如遷奠儀遣官祀謝后土及天壽山設香案玄宮門外設題主案於前西向設皇太子拜位於前北向內侍盥手奉主置案上題主官盥手西向題畢內侍奉主安於神座藏帛箱中內侍奏請太宗文皇帝神靈上神主贊四拜興獻酒讀祝俯伏興四拜舉哀內侍啓櫝受主訖請神主降座升輿至獻殿奏請神主降輿升座行初虞禮皇太子四拜初獻奠帛酒讀祝俯伏興亞獻終獻四拜舉哀望瘞內官捧神帛箱埋於殿前焚凶器於野葬日初虞柔日再虞剛日三虞後間日一虞至九虞止在途皇太子行禮還京皇帝行禮神主將還內侍請神主降座升輿儀仗侍衛如儀皇太子隨仍朝夕奠至京先於城外置幄次列儀衛鼓吹備而不作百官衰服候城外主入幄次百官序列五拜三叩首神主行百官從至午門外皇帝衰服迎於午門內舉哀步導主升几筵殿皇帝立殿上內侍請神主降輿升座行安神禮皇帝四拜興奠酒讀祝俯伏興四拜舉哀皇太子以下陪拜百官於思善門外行禮如儀明日百官行奉慰禮卒哭用虞祭後剛日禮同虞祭自是罷朝夕奠祔饗用卒哭之明日太常寺設醴饌於太廟如時饗儀樂設而不作設儀衛傘扇於午門外內侍進御輦於几筵殿前皇帝衰服四拜舉哀興哀止立於拜位之東西向內侍請神主降座升輦詣太廟祔饗至思善門外皇帝易祭服升輅隨至午門外詣御輦前跪太常卿奏請神主降輦皇帝俯伏興捧主由左門入至丹陛上典儀唱太宗文皇帝謁廟至廟前內侍捧主至褥位皇帝於後行八拜禮每廟俱同內侍捧主北向太常卿立壇東西向唱賜坐皇帝搢圭奉神主安於座詣拜位行祭禮如時饗儀太常卿奏請神主還几筵皇帝捧主由廟左門出安奉於御輦皇帝升輅隨至思善門降輅易衰服隨至几筵殿前內侍請神主降輦升座皇帝由殿左門入行安神禮畢釋服還宮明日百官素服行奉慰禮大祥奉安神主於太廟禮詳廟制皇帝祭告几筵殿皇太后皇后以下各祭一壇王府遣官共祭一壇在京文武官祭一壇自神主出几筵殿內侍即撤几筵帷幄焚於思善門外禫祭遣親王詣陵行禮洪熙元年仁宗崩皇太子還自南京至良鄉宮中始發喪宣遺詔文武官常服於午門外四拜宣畢舉哀復四拜易素服迎皇太子於盧溝橋橋南設幕次香案皇太子至常服詣次四拜聽宣遺詔復四拜哭盡哀易素服至長安右門下馬步哭至宮門外釋冠服披髮詣梓宮前五拜三叩首哭盡哀宮中自皇后以下皆披髮哭皇太子就喪次東見母后親王以次見皇太子畢各居喪次行祭告禮喪儀俱如舊惟改在京朝夕哭臨三日後又朝臨止七日在外止朝夕哭臨三日無朝臨禮文武官一品至四品命婦入哭臨服除禮臣請帝服淺淡色衣烏紗翼善冠黑角帶於奉天門視事百官皆淺淡色衣烏紗帽黑角帶朝參如常儀退朝仍終太宗服制帝曰朕心何能忍雖加一日愈於已仍素服坐西角門不鳴鐘鼓令百日後再議已百日禮臣復請御奉天門帝命候山陵事畢先是詔營獻陵帝召尚書蹇義夏原吉諭曰國家以四海之富葬親豈惜勞費然古聖帝明王皆從儉制孝子思保其親體魄於永久亦不欲厚葬況皇考遺詔天下所共知宜遵先志於是建寢殿五楹左右廡神廚各五楹門樓三楹其制較長陵遠殺皆帝所規畫也吏部尚書蹇義等請祔廟後素服御西角門視事至孟冬歲暮行時饗禮鳴鐘鼓黃袍御奉天門視朝禫祭後始釋素服從之宣宗崩喪葬如獻陵故事惟改命婦哭臨自三品以上英宗崩遺命東宮過百日成婚不得以宮妃殉葬憲宗即位百日御奉天門視朝禮儀悉用吉典憲宗崩孝宗既除服仍素翼善冠麻衣腰絰視朝不鳴鐘鼓百官素服朝參百日後如常弘治元年正旦時未及小祥帝黃袍御殿受朝次日仍黑翼善冠淺淡服犀帶及大祥神主奉安太廟及奉先殿至禫祭免朝擇日遣官詣陵致祭孝宗崩工部言大行遺詔惓惓以節用愛民為本乞敕內府諸司凡葬儀冥器並山陵殿宇務從減省禮部言百日例應變服但梓宮未入山陵請仍素翼善冠麻布袍服腰絰御西角門視事不鳴鐘鼓百官仍素服朝參從之自辭靈至虞祔榮王俱在陪列既而王以疾奏免禮部請以駙馬等官捧帛朝祖帝曰朝祖捧帛朕自行發引親王止送至大明門外其在途及至陵臨奠俱護喪官行禮後遂為例世宗崩令旨免命婦哭臨隆慶元年正月未及二十七日帝衰服御宣治門百官素服腰絰奉慰發引帝行遣奠禮至朝祖則遣官捧帛行禮梓宮至順天府皇親命婦及三品以上命婦祭餘如舊制光宗即位禮部言喪服列代皆有制度而斷自孝宗蓋孝宗篤於親喪禮詳且備故武世穆三廟皆宗之今遵舊制以衰服御文華門視事百官素服朝參候梓宮發引除從之明自仁宗獻陵以後規制儉約世宗葬永陵其制始侈及神宗葬定陵給事中惠世揚御史薛貞巡視陵工費至八百餘萬云
