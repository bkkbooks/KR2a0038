body:
  text: 明史卷二十六志第二天文二月掩犯五緯五緯掩犯五緯合聚五緯掩犯星月掩犯五緯洪武元年五月甲申犯填星十二年三月戊辰朔犯辰星十四年十一月甲午犯填星十九年五月己未犯歲星二十三年四月丁酉掩太白十一月癸卯及永樂四年正月戊午五年六月丙午七年十二月壬子俱犯熒惑八年十二月壬子九年四月庚子十六年七月戊辰俱犯歲星十八年十一月辛卯掩太白二十年三月辛未掩填星二十二年八月乙丑犯熒惑洪熙元年二月己未掩填星宣德元年十二月丙子掩熒惑二年正月癸卯犯熒惑四月甲申犯太白六年十月丙申掩太白七年二月甲寅犯填星八年二月癸巳掩歲星四月戊子犯歲星正統二年正月辛亥掩歲星四月癸酉五月庚子俱犯歲星七月戊申犯熒惑四年正月乙酉掩填星八年三月庚申犯填星十一月丙寅掩歲星十年十一月辛卯犯熒惑十一年十二月甲寅犯歲星十二年正月辛巳閏四月庚午俱犯歲星十四年四月壬子犯太白五月癸未掩太白景泰二年四月戊子犯歲星九月甲辰犯歲星於斗五年二月丁亥犯太白六年正月甲寅犯歲星七年四月癸丑犯填星乙丑犯太白天順五年十一月己亥犯太白於斗成化五年二月丙申癸亥俱犯歲星六年三月癸未八年正月癸亥俱犯太白十二年十一月戊申犯歲星於室十三年十月乙卯犯填星十二月丁酉犯太白十四年三月戊辰十八年二月戊午俱犯填星八月己酉二十三年四月乙亥俱掩熒惑五月戊午六月乙酉俱犯歲星十月甲戌掩歲星弘治四年二月壬子犯歲星七年十一月戊申犯熒惑八年正月癸卯犯歲星十二月丙辰掩填星十一年四月甲申九月庚子俱犯歲星十二年八月壬寅犯熒惑十四年七月丁卯九月己丑俱犯歲星丙辰掩歲星十二月癸丑犯熒惑十七年十一月甲辰犯歲星十八年二月丙寅掩歲星九月乙巳掩填星正德元年十一月己卯犯太白四年閏九月癸亥犯歲星八年正月己丑犯填星十六年二月丙戌掩太白嘉靖二年五月戊子掩歲星十一月壬申犯歲星十七年十二月己未犯填星十八年十月丙戌犯熒惑二十年五月辛卯犯歲星二十一年四月甲寅二十七年七月丁丑俱犯太白九月庚子犯太白於角三十一年五月辛丑犯填星九月庚寅掩填星十二月丁卯犯歲星四十二年五月庚辰掩歲星四十四年七月丁巳犯熒惑萬曆二年九月己卯犯熒惑於箕十年八月戊申犯熒惑於井十四年八月己丑犯太白於角十五年六月乙丑十九年九月辛未俱犯熒惑十二月甲辰犯填星於井二十四年正月甲申犯填星於張二十七年九月辛亥犯太白三十一年五月癸未犯太白三十五年六月乙未犯填星於斗三十七年八月辛酉犯填星四十一年九月癸未犯歲星崇禎三年八月辛亥掩太白十一年四月己酉掩熒惑於尾五緯掩犯洪武六年三月戊申熒惑犯填星六月壬辰太白犯歲星八年三月癸亥熒惑犯填星二十二年六月丙辰辰星犯太白二十七年三月乙丑熒惑犯歲星於奎永樂三年三月戊戌太白犯歲星十一月癸巳朔太白犯辰星於箕四年正月癸卯太白犯歲星五年七月甲子熒惑犯填星十二年十一月丁卯太白犯歲星十四年七月乙巳太白犯填星二十年九月乙亥太白犯歲星十月己酉太白犯填星洪熙元年十一月丙午太白犯填星宣德元年十一月戊戌辰星犯填星七年六月己酉太白犯歲星七月辛巳太白犯熒惑九年十一月己亥太白犯填星十年十月庚子熒惑犯填星正統元年五月戊寅太白犯熒惑於井二年五月辛丑熒惑犯填星三年十二月戊寅太白犯歲星五年五月丙午太白犯填星七年九月戊午太白犯熒惑於氐十一年九月丁亥太白犯歲星十二年七月戊午熒惑犯填星十四年二月己卯太白犯熒惑七月丙午熒惑犯填星景泰元年閏正月丁卯熒惑犯歲星天順七年十一月乙卯朔熒惑犯填星成化六年九月乙亥太白犯歲星十一年七月戊辰太白犯填星十三年九月丙寅熒惑犯填星十六年六月壬申太白犯歲星弘治二年正月戊辰太白犯歲星十一月壬午太白犯填星三年正月庚申太白犯填星五年八月丁未熒惑犯歲星六年十一月己未太白犯填星七年九月甲寅及十年正月丙辰熒惑犯歲星十二月庚辰辰星犯歲星十七年閏四月癸酉歲星犯填星正德二年十月癸未熒惑犯填星八年正月壬午及十六年十二月丙午俱太白犯歲星嘉靖元年正月己未太白犯歲星十二月甲戌太白犯填星三年正月癸酉太白犯歲星二十九年六月庚辰熒惑犯歲星守井萬曆五年十二月辛丑太白犯填星於斗九年十二月癸巳太白犯填星入危十一年六月丁丑太白犯熒惑十五年五月己亥太白犯填星二十四年四月己酉太白犯歲星二十五年七月甲辰熒惑犯歲星二十七年閏四月庚寅辰星犯太白於井三十四年十一月庚辰熒惑掩歲星於危甲辰熒惑犯歲星三十八年十一月辛亥太白犯填星於虛四十七年三月壬子太白犯歲星於壁天啟元年八月丙申熒惑與太白同度者兩日崇禎九年六月己亥太白犯歲星於張五緯合聚洪武十四年六月癸未辰星熒惑太白聚於井十七年六月丙戌歲星填星太白聚於參十八年二月乙巳五星並見三月戊子填星歲星太白聚於井二十年二月壬午朔五星俱見二十四年七月戊子太白熒惑填星聚於翼十一月乙未辰星歲星合於斗十二月甲子熒惑辰星合於箕二十五年正月辛丑熒惑歲星合於牛二十六年十月壬辰太白填星同度永樂元年五月甲辰五星俱見東方二年四月戊子太白熒惑合於井正統十四年九月壬寅太白填星熒惑聚於翼十二月辛未太白歲星合於尾景泰元年十月壬申太白歲星合於箕十二月己丑辰星歲星同度二年九月庚申太白熒惑填星聚於軫四年三月乙丑太白歲星合於壁五年正月戊辰太白歲星合於奎六月己酉熒惑歲星合於胃十一月己未太白填星合於氐七年三月戊戌太白熒惑合於奎十月戊申歲星熒惑合於鬼天順元年五月乙丑太白歲星合於井十二月丙辰太白填星合於心二年九月甲寅太白填星合於斗三年九月乙巳太白歲星合於角四年十月壬申歲星熒惑辰星太白聚於氐五年十一月己亥填星熒惑合於牛甲子太白熒惑合於虛六年九月甲午太白熒惑合於張七年十月庚寅歲星熒惑合於女庚戌太白歲星合於女八年二月丙午填星歲星太白聚於危成化四年四月癸巳歲星熒惑合於井壬子及七年七月庚子太白歲星合於井十一年八月甲午熒惑填星同度弘治十三年四月癸丑熒惑太白辰星聚於井十六年八月庚申熒惑歲星填星聚於井十八年五月丙申太白歲星合於星九月乙未太白歲星同度正德二年九月戊辰辰星歲星太白聚於亢嘉靖三年正月壬午五星聚於營室十九年九月乙卯太白辰星填星聚於角二十三年正月癸卯熒惑歲星填星聚於房四十二年七月戊戌太白歲星填星聚於井四十三年四月庚子歲星填星熒惑太白聚於柳萬曆十七年十二月辛卯太白熒惑同度二十年六月壬子太白辰星填星聚於井三十二年九月辛酉歲星填星熒惑聚於危天啟四年七月丙寅五星聚於張崇禎七年閏八月丙午至九月壬申填星熒惑太白聚於尾十年十一月己卯歲星熒惑合於亢甲午填星辰星同度五緯掩犯星歲星洪武六年九月庚申犯鬼十一月壬子退行犯鬼七年八月乙巳犯軒轅大星九年二月乙丑退入太微犯左執法十年六月戊寅及戊戌犯亢十一月甲辰犯房十一年四月戊申犯鍵閉七月甲申犯牛八月丙午犯房十四年四月壬戌犯壘壁十七年閏十月癸卯犯井十九年四月丙申入鬼八月壬辰犯軒轅二十一年四月丁未留太微垣十一月甲戌入亢二十二年三月辛卯退入亢九月丁卯犯氐十一月甲午入房十二月壬戌犯東咸二十三年五月己未守房八月乙丑犯東咸二十六年二月丙子朔犯壘壁二十九年六月庚子犯井鉞七月丙辰朔入井十月癸卯退入井三十年八月庚辰朔入鬼建文四年七月乙未退犯東咸十月丙辰犯天江永樂元年正月丁未犯建十二月己丑犯羅堰六年三月己巳犯諸王西第二星四月甲午犯東第一星六月丙申犯井八年九月乙亥犯靈臺十八年七月己丑犯天罇西北星八月庚子犯東北星二十一年正月庚戌犯上將二十二年十一月戊寅入氐宣德三年閏四月己酉犯壘壁西第六星十一月丙寅又犯七年七月丙寅犯天罇九年五月庚子犯軒轅大星正統五年六月甲寅犯壘壁十一年十月戊戌犯右執法十四年正月丙申犯房北第一星二月丙子退犯房九月己卯犯進賢丙戌犯房景泰元年閏正月庚午與熒惑遞入斗八月戊子犯秦二年二月庚午朔犯牛三年十月辛丑犯亢六年六月庚子犯諸王八月庚申犯井鉞七年九月癸未入鬼天順元年九月癸亥犯軒轅大星二年八月癸未犯右執法十月己丑三年正月辛卯俱犯左執法六月辛未犯右執法十二月癸亥犯亢四年閏十一月丙寅犯房北第一星庚午犯鉤鈐五年三月丁卯退犯房上星八月癸酉犯鉤鈐七年二月庚申朔犯牛八年二月丙午犯壘壁三月辛巳又犯成化二年六月丁未守昴五年七月己酉犯軒轅大星六年三月癸卯留守軒轅七年三月丁丑退入太微垣犯執法四月乙卯入太微垣留守端門六月甲寅犯右執法十一月己亥犯亢八年十一月辛亥犯房北第一星癸丑犯鉤鈐九年三月丙辰犯東咸五月己酉犯鉤鈐六月乙丑犯房第一星十二年三月丁巳犯壘壁十三年閏二月己未犯外屏十五年三月甲子犯天街九月乙卯犯井辛巳守井十七年正月己卯犯鬼三月甲午入鬼庚子犯積尸十八年五月庚戌犯靈臺閏八月壬辰犯左執法二十年五月乙巳守亢八月癸酉犯氐弘治四年七月癸巳犯井十一月壬辰又犯六年八月庚寅犯靈臺七年正月癸卯犯壘壁五月甲辰犯靈臺八年二月丁巳犯進賢七月辛丑又犯十月丁卯犯亢十一月己酉犯氐九年二月至三月庚寅守氐十二年五月己亥犯壘壁十三年八月戊申又犯十五年七月丙子犯諸王十六年七月己巳犯井八月壬子犯天罇十八年九月丁未犯太微垣上相正德元年二月壬子退犯右執法及上將三月壬午犯靈臺十一月戊辰犯牛六年四月丁未十二月壬午俱犯壘壁九年八月丙辰犯諸王十四年十月癸未犯氐嘉靖元年四月戊寅犯牛十一月丙寅犯羅堰二年十一月壬辰犯壘壁二十年十一月庚寅二十一年正月丁未俱犯左執法二十二年十二月丁亥犯房北第一星二十三年四月戊寅又犯三十五年五月壬戌退行又犯四十五年五月辛卯退留守左執法隆慶元年二月戊午退守亢萬曆三十九年十月己巳天啟三年九月甲辰俱犯軒轅四年正月丙寅犯軒轅大星五年正月庚戌朔退行犯左執法七年三月乙酉退行犯房北第一星崇禎七年閏八月丁未犯積尸九年冬犯右執法熒惑洪武元年八月甲午犯太微西垣上將九月戊申犯右執法二年正月乙卯犯房六月壬辰犯東咸三年九月丙申入太微垣乙卯留太微垣四年九月乙卯犯壘壁五年十一月庚午犯鉤鈐九年三月辛酉犯井四月戊申犯鬼十年八月丙寅犯天罇十月乙卯犯鬼十一年二月壬戌犯五諸侯三月甲午犯積尸六月壬戌犯右執法十二年八月乙亥犯鬼戊寅犯積尸十二月庚寅犯軒轅大星十四年十月丙子犯太微垣十五年三月乙亥犯右執法九月乙丑犯南斗十六年八月辛卯行軒轅中九月辛酉犯太微西垣上將十七年正月乙卯入氐三月戊午犯氐十八年正月戊辰犯外屏