天市至天津尾化蒼白氣如蛇形長丈餘良久散成化十二年十一月乙丑延綏波羅堡有星二形如轆軸一墜樊家溝一墜本堡紅光燭天二十年五月丙申有大星墜番禺縣東南聲如雷散為小星十餘既而天地皆晦良久乃復二十一年正月甲申朔申刻有火光自中天少西下墜化白氣復曲折上騰有聲踰時西方有赤星大如碗自中天西行近濁尾跡化白氣曲曲如蛇行良久正西轟轟如雷震弘治元年八月戊申巳刻南方流星如盞自南行丈餘大如碗西南至近濁尾化白雲屈曲蛇行而散四年十月丁巳有星赤光如電自西南往東北聲如鼓隕光山縣化為石如斗光州商城亦見大星飛空如光山所見十一月甲戌星隕真定西北紅光燭天西南天鳴如鼓又若奔車七年五月宣府山西河南有星晝隕八年四月辛未有星如輪流至西北隕於鉛山縣其聲如雷九年閏三月戊午平涼東南有流星如月紅光燭地至西北止既而天鼓鳴十年正月壬子有星大如斗色黃白光長三十餘丈一小星隨之隕於寧夏西北隅天鳴如雷者數聲九月乙巳有星如斗光掩月流自西北隕於永平有聲十一年正月癸亥有流星隕於肅州大如房響如雷良久滅十月壬申曉東方赤星如碗行丈餘光燭地東南行小星數十隨之十四年閏七月辛巳山東有星大如車輪赤光燭天自東南往西北隕於壽光天鼓鳴十六年正月己酉南京有星晝流正德元年十二月庚午有星如碗隕寧夏中衛空中有紅光大二畝二年八月己亥寧夏有大星自正南流西南而墜後有赤光一道濶三尺長五丈五年四月丁亥雷州有大星如月自東南流西北分為二尾如彗隨沒聲如雷六年八月癸卯有流星如箕尾長四五丈紅光燭天自西北轉東南三首一尾墜四川崇慶衛色化為白復起緑焰高二丈餘聲如雷震十五年正月丁未酉刻有星隕於山西龍舟谷巡檢司廳事四月丙戌陝西鞏昌府有星如日色赤自東方流西南而隕天鼓鳴嘉靖十二年九月丙子流星如盞光照地自中台東北行近濁尾跡化為白氣四更至五更四方大小流星縱橫交行不計其數至明乃息十四年九月戊子開封白晝天鼓鳴有星如碗東南流衆小星從之如珠十九年五月辛丑星隕棗強為石四萬曆三年五月癸亥晝景州天鼓鳴隕星二化為黑石四年十一月甲午有四星隕費縣火光照地質明落赤點於城西北色如硃砂長二里濶一二尺是月臨漳有星長尺許白晝北飛十三年七月辛巳有星如碗隕於沈丘蓮花集天鼓鳴十五年六月丙寅平陽晝隕星丁卯辰刻有星如斗隕於平陰震響如雷十七年正月庚申有星隕西寧衛大如月天鼓鳴二十年二月丙辰有三星隕閩縣東南二十二年正月戊戌保定青山口有大飛星餘光若彗長二十餘丈二十七年三月庚子蓋州衛天鼓鳴連隕大星三三十年九月己未朔有大星見東南赤如血大如碗忽化為五中星更明久之會為一大如簏辛巳有大小星數百交錯行十月壬辰五更流星起中天光散七道有聲如雷三十三年九月戊子有星如碗墜於南京龍江後營光如火至地遊走如螢移時滅明日復有星如月從西北流至閲兵臺分為三墜地有聲十一月有星隕南京教場入地無跡三十五年十一月癸巳有星隕於涇陽淳化諸縣大如車輪赤色尾長丈餘聲如轟雷三十八年二月癸酉有星大如斗墜陽曲西北碎星不絶天鼓齊鳴四十一年正月庚子真定天鼓鳴流星晝隕有光四十三年三月戊申晝星墜清豐東流村聲如雷四十六年十月辛酉有星如斗隕於南京安德門外聲如霹靂化為石重二十一斤天啓三年九月甲寅固原州星隕如雨崇禎十五年夏星流如織後二年三月己丑朔有星隕於御河雲氣洪武四年四月辛丑五色雲見戊申乙酉十一月壬戌五年正月庚午丙子六月辛巳七月己酉壬子八月己亥六年六月丁丑七月癸卯七年四月丙午五月丙戌癸巳甲午六月乙未乙卯七月己卯八月辛酉八年正月壬申四月丁未五月庚午癸未六月壬辰己亥十月庚戌九年八月癸巳十四年九月甲申十五年正月甲申五月庚申九月乙卯丙寅十一月辛酉十八年四月癸巳乙未五月辛未甲申六月癸丑十九年九月壬午二十年十一月丁亥五月乙酉二十七年六月乙卯並如之永樂元年六月甲寅日下五色雲見八月壬申日珥隨五色雲見八年二月庚戌車駕次永安甸日下五色雲見十一年六月戊申朔武當山頂五色雲見十七年九月丙辰十二月癸未慶雲見二十二年十一月丙戌月下五色雲見洪熙元年二月癸酉庚辰三月乙未俱五色雲見宣德元年八月庚辰白雲起東南狀如羣羊驚走十一月丙辰北方有蒼白雲東西竟天二年十一月乙未日下五色雲見四年六月戊子夜五色雲見六年二月壬子昏西方有蒼白雲南北竟天十年三月丁亥月生五色雲正統二年七月庚子月生五色雲十月己丑日生五色雲十二月癸亥如之三年七月己亥夜中天有蒼白雲南北竟天貫南北斗八年十一月戊辰夜東南方有蒼白雲東西亙天九年十一月甲午月生五色雲十年九月丁酉日生五色雲十一月甲午月生五色雲十四年十月庚申晝生蒼白雲復化為三東西南北竟天景泰元年六月乙酉赤雲四道兩頭鋭如耕壠狀徐徐東北行而散八月甲戌黑雲如山化作龍虎麋鹿狀九月丙寅有蒼白雲氣南北亙天二年六月戊寅日上五色雲九月辛酉夜蒼白雲三東西竟天三年正月癸亥東南有黑雲如人戴笠而揖四年十一月丁卯月生五色雲天順二年十月壬申四年十月戊午亦如之成化二年三月辛未白雲起南方東西竟天十一年正月丙寅月生五色雲十八年十月庚午五色雲見於泰陵二十一年閏四月壬辰開濮二州清豐金鄉未申時黑雲起西北化為五色須臾畝如夜弘治二年正月辛巳日生五色雲十四年三月