body:
  text: 明史卷二十七志第三天文三星晝見客星彗孛天變日變月變暈適星變流隕雲氣星晝見星洪武十九年七月癸亥二十年五月丁丑七月壬寅二十一年十二月丁卯俱三辰晝見弘治十八年九月甲午申刻河鼓北斗見庚子星晝見正德元年二月癸酉星斗晝見天啓二年五月壬寅有星隨日晝見崇禎十六年十二月辛酉朔星晝見歲星景泰二年九月甲辰晝見三年六月壬戌四年五月丁丑六月甲辰五年七月庚戌壬子癸亥六年七月丁酉天順元年五月丙子五年七月乙卯六年八月庚午七年三月乙巳成化十四年六月庚子八月丁酉十六年七月丙申十八年九月癸亥二十年八月壬申弘治元年六月甲寅二年五月癸亥六月甲午五年十月己酉六年九月癸卯七年十一月癸卯九年二月辛亥至甲寅四月壬午十年正月甲寅至丙辰十一年八月甲申十三年四月庚子至乙巳十四年六月壬辰至乙未並如之十五年六月連日晝見十六年七月辛卯十七年七月壬子十八年五月乙未八月辛巳至九月癸未正德元年十一月乙酉二年十一月辛酉至丁卯六年三月壬寅至四月壬申九年八月乙巳至甲寅十二年十月甲子至乙巳並如之嘉靖二年三月辛未二十九年八月戊寅晝見守井崇禎十一年四月壬子晝見熒惑景泰三年八月甲子晝見於未位太白洪武四年二月戊午晝見四月戊申六月壬午朔五年六月甲申至丁亥十二月甲申八年八月丁巳九年二月乙巳至己酉三月壬申十二年閏五月戊戌十三年七月甲午十五年四月丁亥七月戊申辛酉九月丁未朔十六年十月壬辰至乙未十八年四月己亥至辛丑六月丙申至辛丑辛亥並如之九月戊寅經天與熒惑同度乙酉晝見丁亥又見犯熒惑十月癸巳至丙申晝見戊戌至辛丑十九年十月甲申朔至庚寅並如之二十年六月戊戌經天七月壬寅至甲辰晝見二十一年四月己巳七月丙申二十三年三月丁亥二十四年八月辛巳二十五年二月辛酉二十六年四月甲辰並如之八月庚子與太陰同晝見建文四年七月庚子經天永樂元年五月癸未癸卯俱與太陰同晝見六月壬申與太陰晝見四年七月壬寅晝見五年八月丙申六年二月甲辰八年十月庚戌十二年九月癸未十五年七月己酉八月庚戌洪熙元年六月戊戌七月乙巳八月癸巳宣德六年十月乙巳八年九月戊戌至甲寅九年十二月甲子十年七月丁亥正統四年七月壬子十月丙申六年五月庚戌並如之十一年七月甲申經天十三年二月辛酉晝見十四年正月辛亥八月丙子景泰元年十月乙酉二年五月庚子辛亥並如之壬子經天三年五月丁巳晝見十一月壬戌五年正月甲戌二月丙戌六月癸卯七年正月戊戌天順元年四月甲午八月壬子二年十月己未三年四月癸亥癸酉四年十一月庚寅十二月丙戌五年正月丁未十二月癸巳六年六月己丑八月庚午七年閏七月辛酉癸未八年正月庚申成化元年二月癸未三年四月癸丑四年六月丙申六年六月丙戌七年八月癸卯並如之八年正月乙卯經天與日爭明十一年五月己未晝見十二年十月丙戌十三年十二月甲午並如之十四年六月庚子與歲星俱晝見八月甲午晝見十五年十二月丙子十七年三月癸未八月癸亥十八年九月庚戌十九年四月癸亥朔並如之二十年八月壬申與歲星俱晝見二十一年十一月丙辰晝見二十二年六月己丑二十三年九月丙午弘治元年五月庚午二年正月壬戌三月庚申五月丙戌八月癸巳庚子四年四月辛未五年五月乙亥十月辛酉六年十二月乙丑七年五月庚戌八年七月戊子九年二月己酉朔十年正月甲子至丁卯並如之六月丙子未刻經天八月癸未及十一年十月辛巳晝見十二年三月戊辰至壬申八月庚寅並如之十三年四月庚子至乙巳與歲星同晝見十月丁未己酉十四年十二月庚戌十五年五月庚寅至癸巳十六年七月壬辰十七年二月戊戌及六月癸亥十八年二月壬戌並晝見五月辛亥經天八月癸亥至戊辰晝見正德元年十月己未如之二年正月庚辰經天三月戊辰晝見三年五月乙巳至丁未十月己卯庚辰四年十月戊戌至乙巳五年五月丙子六年七月壬申至八月癸未八年正月丙戌至己丑四月壬戌癸亥八月庚戌至乙卯九年十一月甲申至十二月壬辰十一年六月甲寅至己未十四年八月丙寅至庚辰十五年正月己未至二月辛酉十六年八月丁亥嘉靖元年九月辛未並如之二年三月辛未與歲星俱晝見三年四月庚戌晝見五年五月庚子十一年四月癸巳十月辛巳戊子十一月甲寅十三年閏二月庚申並如之五月癸巳與月同晝見十七年九月辛卯晝見十八年四月癸亥十一月壬寅二十年十一月乙巳至丁未二十二年七月丙午二十三年二月辛巳二十四年閏正月戊寅二十五年十月辛卯二十六年四月丙申二十七年四月丁巳十一月丙戌至乙未二十八年十一月乙酉至己丑二十九年六月戊申甲寅三十年六月丙子至辛巳三十一年正月丙戌至丙申三十二年二月辛未至甲戌七月戊辰至辛未三十五年五月壬午十月癸卯至丙午三十六年十二月庚辰朔三十八年七月癸酉三十九年正月庚寅至壬辰並如之四十年三月丙子晝見歷二十四日八月辛未晝見四十一年九月乙未四十二年四月己巳至壬申四十三年五月甲寅並如之十月戊子晝見歷二十二日四十五年正月己亥晝見隆慶元年七月辛酉二年正月甲寅並如之三年三月甲子晝見歷二十二日四年十一月乙丑至丁卯晝見萬曆十一年七月辛丑十二年七月癸巳十六年九月丁丑二十一年八月甲午二十四年十月丙寅並如之二十七年九月辛卯經天三十七年三月辛丑晝見三十八年十月辛巳四十年五月壬寅天啓二年二月丙戌三年三月丁巳十二月乙丑五年四月癸未並如之七月癸酉經天崇禎元年七月壬戌晝見三年四月己卯十二月丙辰並如之客星史記天官書有客星之名而不詳其形狀國皇昭明諸異星甚悉而無瑞星妖星之名然則客星者言其非常有之星殆諸異星之總名而非有專屬也李淳風志晉隋天文始分景星含譽之屬為瑞星彗孛國皇之類為妖星又以周伯老子等為客星自謂本之漢末劉睿荊州占夫含譽所謂瑞星也而光芒則似彗國皇所謂妖星也而形色又類南極老人瑞與妖果有定哉且周伯一星也既屬之瑞星而云其國大昌又屬之客星而云其國兵起有喪其說如此果可為法乎馬遷不復區別良有以也今按實録彗孛變見特甚皆別書老人星則江以南常見而燕京必無見理故不書餘悉屬客星而編次之洪武三年七月太史奏文星見九年六月戊子有星大如彈丸白色止天倉經外屏卷舌入紫微垣掃文昌指內入於張七月乙亥滅十一年九月甲戌有星見於五車東北發芒丈餘掃內階入紫微宮掃北極五星犯東垣少宰入天市垣犯天市至十月己未陰雲不見十八年九月戊寅有星見太微垣犯右執法出端門乙酉入翼彗長丈餘至十月庚寅犯軍門彗掃天廟二十一年二月丙寅有星出東壁占曰文士效用帝大喜以為將策進士兆也永樂二年十月庚辰輦道東南有星如盞黃色光潤而不行二十二年九月戊戌有星見斗宿大如碗色黃白光燭地有聲如撒沙石宣德五年八月庚寅有星見南河旁如彈丸大色青黑凡二十六日滅十月丙申蓬星見外屏南東南行經天倉天庾八日而滅十二月丁亥有星如彈丸見九斿旁黃白光潤旬有五日而隱六年三月壬午又見八年閏八月戊午景星三見西北方天門青赤黃各一大如碗明朗清潤良久聚半月形丁丑有黃赤色見東南方如星非星如雲非雲蓋歸邪星也景泰三年十一月癸未有星見鬼宿積尸氣旁徐徐西行天順二年十一月癸卯有星見於星宿色白西行至丙午其體微狀如粉絮在軒轅旁庚戌生芒五寸犯爟位西北星至十二月壬戌沒於東井五年六月壬辰天市垣宗正旁有星粉白至乙未化為白氣而消六年六月丙寅有星見策星旁色蒼白入紫微垣犯天牢至癸未居中台下形漸微弘治三年十二月丁巳有星見天市垣東南行戊辰見天倉下漸向壁七年十二月丙寅有星見天江旁徐行近斗至八年正月庚戌入危十二年七月戊辰有星見天市垣宗星旁入紫微垣東藩經少宰尚書抵太子后宮出西藩少輔旁至八月己丑滅十五年十月戊辰有星見天廟旁自張抵翼復退至張戊寅滅正德十六年正月甲寅朔東南有星如火變白長可六七尺橫亙東西復變勾屈狀良久乃散嘉靖八年正月立春日長星亙天七月又如之十一年二月壬午有星見東南色蒼白有芒積十九日滅十三年五月丁卯朔有星見螣蛇歷天入閣道二十四日滅十五年三月戊午有星見天棓旁東行歷天西入天漢至四月壬辰沒二十四年十一月壬午有星出天棓入箕轉東北行逾月沒萬曆六年正月戊辰有大星如日出自西方衆星皆西環十二年六月己酉有星出房三十二年九月乙丑尾分有星如彈丸色赤黃見西南方至十月而隱十二月辛酉轉出東南方仍尾分明年二月漸暗八月丁卯始滅三十七年有大星見西南芒刺四射四十六年九月乙卯東南有白氣一道濶尺餘長二丈餘東至軫西入翼十九日而滅十一月丙寅旦有花白星見東方天啓元年四月癸酉赤星見於東方崇禎九年冬天狗見豫分彗孛彗之光芒傅日而生故夕見者必東指晨見者必西指孛亦彗類其芒氣四出天文家言其災更甚於彗洪武元年正月庚寅彗星見於昴畢三月辛卯彗星出昴北大陵天船間長八尺餘指文昌近五車四月己酉沒於五車北六年四月彗星三入紫微垣二十四年四月丙子彗星二一入紫微垣閶闔門犯天牀一犯六甲掃五帝內座永樂五年十一月丙寅彗星見宣德六年四月戊戌有星孛於東井長五尺餘七年正月壬戌彗星出東方長丈餘尾掃天津東南行十月始滅是月戊子又出西方十有七日而滅八年閏八月壬子彗星出天倉旁長丈許己巳入貫索掃七公己卯復入天市垣掃晉星二十有四日而滅正統四年閏二月己丑彗星見張宿旁大如彈丁酉長五丈餘西行掃酒旗迤北犯鬼宿六月戊寅彗星見畢宿旁長丈餘指西南計五十有五日乃滅九年七月庚午彗星見太微東垣長丈許纍日漸長至閏七月己卯入角沒十四年十二月壬子彗星見天市垣市樓旁歷尾度長二尺餘至乙亥沒景泰元年正月壬午彗星出天市垣外掃天紀星三年三月甲午朔有星孛於畢七年四月壬戌彗星東北見於胃長二尺指西南五月癸酉漸長丈餘戊子西北見於柳長九尺餘掃犯軒轅星甲午見於張長七尺餘掃太微北西南行六月壬寅入太微垣長尺餘十二月甲寅彗星復見於畢長五寸東南行漸長至癸亥而沒天順元年五月丙戊彗星見於危若動搖者東行一度芒長五寸指西南六月癸巳朔見室長丈餘由尾至東壁犯天大將軍卷舌第三星井宿水位南第二星十月己亥彗星見於角長五寸餘指北犯角北星及平道東星五年六月戊戌彗見東方指西南入井度七月丙寅始滅成化元年二月彗星見三月又見西北長三丈餘三閲月而沒四年九月己未有星見星五度東北行越五日芒長三丈餘尾指西南變為彗星其後晨見東方昏見室南犯三公北斗瑤光七公轉入天市垣出垣漸小犯天屏西第一星十一月庚辰始滅七年十二月甲戌彗星見天田西指尋北行犯右攝提掃太微垣上將及幸臣太子從官尾指正西橫掃太微垣郎位己卯光芒長大東西竟天北行二十八度餘犯天槍掃北斗三公太陽入紫微垣內正晝猶見自帝星北斗魁庶子后