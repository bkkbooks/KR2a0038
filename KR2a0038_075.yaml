body:
  text: 明史卷七十五志第五十一職官四南京宗人府吏部戶部附總督糧儲禮部兵部刑部工部都察院附提督操江通政司大理寺詹事府翰林院國子監太常寺光祿寺太僕寺鴻臚寺尚寶司六科行人司欽天監太醫院五城兵馬司應天府附上元江寧二縣已上南京官王府長史司布政司按察司各道行太僕寺苑馬寺都轉運鹽使司鹽課提舉司巿舶提舉司茶馬司府州縣儒學巡檢司驛稅課司倉庫織染局河泊所附閘壩官批驗所遞運所鐵冶所醫學陰陽學僧綱司道紀司南京宗人府經歷司經歷一人南京官品秩俱同北京吏部尚書一人右侍郎一人六部侍郎至弘治後始專設右萬曆三年俱革十一年復設天啓中每部增侍郎一人崇禎間革其屬司務廳司務一人文選考功驗封稽勳四清吏司各郎中一人主事一人驗封稽勳二司主事後並革凡南京官六年考察考功掌之不由北吏部戶部尚書一人右侍郎一人司務一人照磨一人十三司郎中十三人員外郎九人浙江江西湖廣廣東廣西福建山西陝西雲南九司各一人嘉靖三十七年革山西陝西二司員外郎各一人隆慶中又革廣西雲南二司員外郎各一人主事十七人山西廣東廣西雲南四司各二人隆慶三年革廣東司主事一人所轄寶鈔提舉司提舉一人廣積庫承運庫贓罰庫甲乙丙丁戊五字庫寶鈔廣惠庫軍儲倉各大使一人長安門倉東安門倉西安門倉北安門倉各副使一人龍江鹽倉檢校批驗所大使一人隆慶三年革寶鈔司提舉軍儲倉大使總督糧儲一人嘉靖以前特設都御史二十六年革以戶部右侍郎加都御史銜領之禮部尚書一人右侍郎一人司務一人儀制祠祭主客精膳四司各郎中一人儀制祠祭二司各主事一人所轄鑄印局副使一人教坊司右韶舞一人左右司樂各一人兵部尚書參贊機務一人右侍郎一人司務一人武選職方車駕武庫四司郎中四人員外郎二人武選武庫無員外郎主事五人車駕主事二人所轄典牧所提領一人正八品會同館大勝關各大使一人按參贊機務自宣德八年黃福始成化二十三年始奉敕諭專以本部尚書參贊機務同內外守備官操練軍馬撫恤人民禁戢盜賊振舉庶務故其職視五部為特重云刑部尚書一人右侍郎一人司務照磨各一人十三司郎中十三人員外郎五人惟浙江江西河南陝西廣東五司設主事十四人廣東司二人分掌南京諸司及公侯伯五府京衛所刑名之事司獄二人工部尚書一人右侍郎一人司務一人營繕虞衡都水屯田四司郎中四人員外郎二人營繕司一人都水司一人嘉靖三十七年革都水員外郎主事八人營繕司三人屯田司一人餘各二人所轄營繕所所正所副所丞各一人龍江清江二提舉司各提舉一人副提舉後革文思院寶源局軍器局織染所龍江抽分竹木局瓦屑壩抽分竹木局各大使一人嘉靖三十七年革文思院大使都察院右都御史一人右副都御史一人右僉都御史一人司務經歷都事照磨各一人司獄二人嘉靖三十七年革司獄一人隆慶四年革都事浙江江西河南山東山西陝西四川雲南貴州九道各御史二人福建湖廣廣東廣西四道各御史三人嘉靖後不全設恆以一人兼數道凡刷卷巡倉巡江巡城屯田印馬巡視糧儲監收糧斛點閘軍士管理京營比驗軍器皆而差之清軍則偕兵部兵科核後湖黃冊則偕戶部戶科提督操江一人以副僉都御史為之領上下江防之事通政使司通政使一人右通政一人右參議一人掌收呈狀付刑部審理經歷一人大理寺卿一人右寺丞一人司務一人左右寺正各一人左右評事各三人隆慶三年革左右評事各一人詹事府主簿一人翰林院學士一人不常置以翰林坊局官署職孔目一人國子監祭酒一人司業一人監丞一人典簿一人博士三人助教六人學正五人學録二人典籍一人掌饌一人嘉靖三十七年革助教二人及掌饌隆慶四年革博士一人學正一人太常寺卿一人少卿一人典簿一人博士一人協律郎二人贊禮郎七人嘉靖中革贊禮郎一人司樂二人各祠祭署合奉祀八人祀丞七人天地壇奉祀一祀丞一山川壇藉田奉祀一祖陵奉祀祀丞各一皇陵奉祀祀丞各二孝陵揚王墳徐王墳各奉祀一祀丞一嘉靖後革天地壇祖陵揚王墳三祠祭署祀丞光祿寺卿一人少卿一人隆慶四年革少卿典簿一人大官珍羞良醞掌醢四署各署正一人署丞一人嘉靖中革良醞掌醢二署署丞萬曆中革珍羞署丞太僕寺卿一人少卿二人寺丞二人隆慶中革少卿一人寺丞一人主簿一人鴻臚寺卿一人主簿一人司儀司賓二署各署丞一人鳴贊四人序班九人尚寶司卿一人吏戶禮兵刑工六科給事中六人又戶科給事中一人管理後湖黃冊行人司左司副一人欽天監監正一人監副一人主簿一人五官正一人五官靈臺郎二人五官監候一人五官司曆一人太醫院院判一人吏目一人惠民藥局生藥庫各大使一人五城兵馬司指揮各一人副指揮各三人吏目各一人萬曆中革副指揮每城二人應天府府尹一人府丞一人治中一人通判二人推官一人經歷知事照磨檢校各一人儒學教授一人訓導六人所轄上元江寧二縣各知縣一人縣丞一人主簿一人典史一人司獄司司獄一人織染局大使一人左右副使各一人都稅司宣課司凡四龍江江東聚寶門太平門稅課局凡二龍江龍潭各大使一人副使或一人或二人龍江遞運所大使副使各一人批驗所大使一人河泊所官一人龍江關石灰山關各大使一人副使四人洪武三年改應天府知府為府尹秩正三品賜銀印十三年始立儒學南京官自永樂四年成祖往北京置行部尚書備行在九卿印以從是時皇太子監國大小庶務悉以委之惟封爵大辟除拜三品以上文武職則六科都給事中以聞政本