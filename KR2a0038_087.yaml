body:
  text: 明史卷八十七志第六十三河渠五淮河泇河衛河漳河沁河滹沱河桑乾河膠萊河淮河出河南平氏胎簪山經桐柏其流始大東至固始入南畿潁州境東合汝潁諸水經壽州北肥水入焉至懷遠城東渦水入焉東經鳳陽臨淮濠水入焉又經五河縣南而納澮沱漴潼諸水勢盛流疾經泗州城南稍東則汴水入焉過龜山麓益折而北會洪澤阜陵泥墩萬家諸湖東北至清河南會於大河即古泗口也亦曰清口是謂黃淮交會之衝淮之南岸漕河流入焉所謂清江浦口又東經淮安北安東南而達於海永樂七年決壽州泛中都正統三年溢清河天順四年溢鳳陽皆隨時修築無巨害也正德十二年復決漕堤灌泗州泗州祖陵在焉其地最下初淮自安東雲梯關入海無旁溢患逮與黃會黃水勢盛奪淮入海之路淮不能與黃敵往往避而東陳瑄鑿清江浦因築高家堰舊堤以障之淮揚恃以無恐而鳳泗間數為害嘉靖十四年用總河都御史劉天和言築堤衛陵而高堰方固淮暢流出清口鳳泗之患弭隆慶四年總河都御史翁大立復奏濬淮工竣淮益無事至萬曆三年三月高家堰決高寶興鹽為巨浸而黃水躡淮且漸逼鳳泗乃命建泗陵護城石堤二百餘丈泗得石堤稍寧於是總漕侍郎吳桂芳言河決崔鎮清河路淤黃強淮弱南徙而灌山陽高寶請急護湖堤帝令熟計其便給事中湯聘尹議請導淮入江會河從老黃河奔入海淮得乘虛出清口桂芳以聞議遂寢六年總河都御史潘季馴言高堰淮揚之門戶而黃淮之關鍵也欲導河以入海必藉淮以刷沙淮水南決則濁流停滯清口亦堙河必決溢上流水行平地而邳徐鳳泗皆為巨浸是淮病而黃病黃病而漕亦病相因之勢也於是築高堰堤起武家墩經大小澗阜陵湖周橋翟壩長八十里使淮不得東又以淮水北岸有王簡張福二口泄入黃河水力分清口易淤淺且黃水多由此倒灌入淮乃築堤捍之使淮無所出黃無所入全淮畢趨清口會大河入海然淮水雖出清口亦西淫鳳泗八年雨潦淮薄泗城且至祖陵墀中御史陳用賓以聞給事中王道成因言黃河未漲淮泗間霖雨偶集而清口已不容泄宜令河臣疏導堵塞之季馴言黃淮合流東注甚迅駛泗州岡阜盤旋雨潦不及宣泄因此漲溢欲疏鑿則下流已深無可疏欲堵塞則上流不可逆堵乃令季馴相度卒聽之而已十六年季馴復為總河加泗州護堤數千丈皆用石十九年九月淮水溢泗州高於城壕因塞水關以防內灌於是城中積水不泄居民十九淹沒侵及祖陵疏泄之議不一季馴謂當聽其自消會嘔血乞歸言者因請允其去而帝遣給事中張貞觀往勘會總河尚書舒應龍等詳議以上計未有所定連數歲淮東決高良澗西灌泗陵帝怒奪應龍官遣給事中張企程往勘議者多請拆高堰總河尚書楊一魁與企程不從而力請分黃導淮乃建武家墩經河閘泄淮水由永濟河達涇河下射陽湖入海又建高良澗及周橋減水石閘以泄淮水一由岔河入涇河一由草子湖寶應湖下子嬰溝俱下廣洋湖入海又挑高郵茆塘港通邵伯湖開金家灣下芒稻河入江以疏淮漲而淮水以平其後三閘漸塞崇禎間黃淮漲溢議者復請開高堰淮揚在朝者公疏力爭議遂寢然是時建義諸口數決下灌興鹽淮患日棘矣泇河二源一出費縣南山谷中循沂州西南流一出嶧縣君山東南與費泇合謂之東西二泇河南會彭河水從馬家橋東過微山赤山呂孟等湖踰葛墟嶺而南經侯家灣良城至泇口鎮合蛤鰻連汪諸湖東會沂水從周湖柳湖接邳州東直河東南達宿遷之黃墩湖駱馬湖從董陳二溝入黃河引泗合沂濟運道以避黃河之險其議始於翁大立繼之者傅希摯而成於李化龍曹時聘隆慶四年九月河決邳州自睢寧至宿遷淤百八十里總河侍郎翁大立請開泇河以避黃水未決而罷明年四月河復決邳州命給事中雒遵勘驗工部尚書朱衡請以開泇口河之説下諸臣熟計帝即命遵會勘遵言泇口河取道雖捷施工實難葛墟嶺高出河底六丈餘開鑿僅至二丈硼石中水泉湧出侯家灣良城雖有河形水中多伏石難鑿縱鑿之湍激不可通漕且蛤鰻周柳諸湖築堤水中功費無算微山赤山呂孟等湖雖可築堤然須鑿葛墟嶺以泄正派開地濱溝以散餘波乃可施工請罷其議詔尚書朱衡會總河都御史萬恭等覆勘衡奏有三難大略如遵指且言漕河已通徐邳間堤高水深不煩別建置乃罷萬曆三年總河都御史傅希摯言泇河之議嘗建而中止謂有三難而臣遣錐手步弓水平畫匠於三難處核勘起自上泉河口開向東南則起處低窪下流趨高之難可避也南經性義村東則葛墟嶺高堅之難可避也從陡溝河經郭村西之平坦則良城侯家灣之伏石可避也至泇口上下河渠深淺不一湖塘聯絡相因間有砂礓無礙挑穵大較上起泉河口水所從入也下至大河口水所從出也自西北至東南長五百三十里比之黃河近八十里河渠河塘十居八九源頭活水脈絡貫通此天之所以資漕也誠能捐十年治河之費以成泇河則黃河無慮壅決茶城無慮填淤二洪無慮艱險運艘無慮漂損洋山之支河可無開境山之閘座可無建徐呂之洪夫可盡省馬家橋之堤工可中輟今日不資之費他日所省抵有餘者也臣以為開泇河便乃命都給事中侯于趙往會希摯及巡漕御史劉光國確議以聞于趙勘上泇河事宜自泉河口至大河口五百三十里內自直河至清河三百餘里無賴於泇事在可已惟徐呂至直河上下二百餘里河衝蕭碭則涸二洪衝睢寧則淤邳河宜開以避其害約費百五十餘萬金特良城伏石長五百五十丈開鑿之力難以逆料性義嶺及南禹陵俱限隔河流二處既開則豐沛河決必至灌入宜先鑿良城石預修豐沛堤防可徐議興功也部覆如其言而謂開泇非數年不成當以治河為急帝不悅責于趙阻撓然議亦遂寢二十年總河尚書舒應龍開韓莊以泄湖水泇河之路始通至二十五年黃河決黃堌口南徙徐呂而下幾斷流方議開李吉口小浮橋及鎮口以下建閘引水以通漕而論者謂非永久之計於是工科給事中楊應文吏科給事中楊廷蘭皆謂當開泇河工部覆議允行帝命河漕官勘報不果二十八年御史佴祺復請開泇河工部覆奏云用黃河為漕利與害參用泇河為漕有利無害但泇河之外由微山呂孟周柳諸湖伏秋水發虞風波冬春水涸虞淺阻須上下別鑿漕渠建閘節水從之總河尚書劉東星董其事以地多沙石工艱未就工科給事中張問達以為言御史張養志復陳開泇河之説有四一曰開黃泥灣以通入泇之徑邳州沂河口入泇河門戶也進口六七里有湖名連二汪其水淺而闊下多淤泥欲挑濬則無岸可修欲為壩掃則無基可築湖外有黃泥灣離湖不遠地頗低自沂口至湖北崖約二十餘里於此開一河以接泇口引湖水灌之運舟可直達泇口矣一曰鑿萬家莊以接泇口之源萬家莊泇口迤北地也與臺家莊侯家灣良城諸處皆山岡高阜多砂礓石塊極難為工東星力鑿成河但河身尚淺水止二三尺宜更鑿四五尺俾韓莊之水下接泇口則運舟無論大小皆沛然可達矣一曰濬支河以避微口之險微山湖在韓莊西上下三十餘里水深丈餘必探深淺立標為嚮導風正帆懸頃刻可過突遇狂未免敗沒今已傍湖開支河四十五里上通西柳莊下接韓莊牽挽有路當再疏濬庶無漂溺之患其一則以萬莊一帶勢高北水南下至此必速請即其地建閘數座以時蓄泄詔速勘行而東星病卒御史高舉獻河漕三策復及泇河工部尚書楊一魁覆言泇河經良城彭河葛墟嶺石礓難鑿故口僅丈六尺淺亦如之當大加疏鑿其韓莊渠上接微山呂孟宜多方疏導俾無淤淺順流入馬家橋夏鎮以為運道接濟之資帝以泇河既有成績命河臣更挑濬三十年工部尚書姚繼可言泇河之役宜罷乃止不治未幾總河侍郎李化龍復議開泇河屬之直河以避河險工科給事中侯慶遠力主其説而以估費太少責期太速請專任而責成之三十二年正月工部覆化龍疏言開泇有六善其不疑有二泇河開而運不借河河水有無聽之善一以二百六十里之泇河避三百三十里之黃河善二運不借河則我為政得以熟察機宜而治之善三估費二十萬金開河二百六十里視朱衡新河事半功倍善四開河必行召募春荒役興麥熟人散富民不擾窮民得以養善五糧船過洪必約春盡實畏河漲運入泇河朝暮無妨善六為陵捍患為民禦災無疑者一徐州向苦洪水泇河既開則徐民之為魚者亦少無疑者二帝深善之令速鳩工為久遠之計八月化龍報分水河成糧艘由泇者三之二會化龍丁艱去總河侍郎曹時聘代上言頌化龍功然是時導河濬泇兩工並興役未能竟而黃河數溢壞漕渠給事中宋一韓遂詆化龍開泇之誤化龍憤上章自辨時聘亦力言泇可賴因畫善後六事以聞部覆皆從其議且言泇開於梗漕之日固不可因泇而廢黃漕利於泇成之後亦不可因黃而廢泇兩利俱存庶幾緩急可賴因請築郗山堤削頓莊嘴平大泛口湍溜濬貓兒窩等處之淺建巨梁吳衝閘增三市徐塘壩以終泇河未就之功詔如議越數年泇工未竟督漕者復舍泇由黃舟有覆者遷徙黃泇間運期久踰限三十八年御史蘇惟霖疏陳黃泇利害請專力於泇略言黃河自清河經桃源北達直河口長二百四十里此在泇下流水平身廣運舟日行僅十里然無他道故必用之自直河口而上歷邳徐達鎮口長二百八十餘里是謂黃河又百二十里方抵夏鎮其東自貓窩泇溝達夏鎮止二百六十餘里是謂泇河東西相對舍此則彼黃河三四月間淺與泇同五月初其流洶湧自天而下一步難行由其水挾沙而來河口日高至七月初則淺涸十倍統而計之無一時可由者溺人損舟其害甚劇泇河計日可達終鮮風波但得實心任事之臣不三五年缺略悉補數百年之利也工科給事中何士晉亦言運道最險無如黃河先年水出昭陽湖夏鎮以南運道衝阻開泇之議始決避淺澀急溜二洪之險聚諸泉水以時啓閉通行無滯者六年乃今忽欲舍泇由黃致倉皇損壞糧艘或改由大浮橋河道淤塞復還由泇以故運抵灣遲汲汲有守凍之慮由黃之害略可見矣顧泇工未竟闊狹深淺不齊宜拓廣濬深與會通河相等重運空回往來不相礙回旋不相避水常充盛舟無留行歲捐水衡數萬金督以廉能之吏三年可竣工然後循駱馬湖北岸東達宿遷大興畚鍤盡避黃河之險則泇河之事訖矣或謂泉脈細微太闊太深水不能有不知泇源遠自蒙沂近挾徐塘許池文武諸泉河大率視濟寧泉河略相等呂公堂口既塞則山東諸水總合全收加以閘壩堤防何憂不足或謂直抵宿遷此功迂而難竟是在任用得人綜理有法耳疏入不報明年部覆總河都御史劉士忠泇黃便宜疏言泇渠春夏間沂武京河山水衝發沙淤潰決歲終當如南旺例修治顧別無置水之地勢不得不塞泇河壩令水復歸黃流故每年三月初則開泇河壩令糧艘及官民船由直河進至九月內則開召公壩入黃河以便空回及官民船往來至次年二月中塞之半年由泇半年由黃此兩利之道也因請增驛設官又覆惟霖疏言直隸貓窩淺為沂下流河廣沙淤不可以閘最為泇患宜西開一月河以通沂口凡水挾沙來沙性直走有月河以分之則聚於洄伏之處撈刷較易而泇患少減矣俱報可其後泇河遂為永利但需補葺而已然泇勢狹窄冬春糧艘回空仍由黃河焉四十八年巡漕御史毛一鷺言泇河屬夏鎮者有閘九座屬中河者止藉草壩分司官議於直口等處建閘請舉行之詔從其議崇禎四年總漕尚書楊一鵬濬泇河九年總河侍郎周鼎奏重濬泇河成久之鼎坐決河防遠戍給事中沈胤培訟其修泇利運之功得減論衛河源出河南輝縣蘇門山百門泉經新鄉汲縣而東至畿南濬縣境淇水入焉謂之白溝亦曰宿胥瀆宋元時名曰御河由內黃東出至山東館陶西漳水合焉東北至臨清與會通河合北歷德滄諸州至青縣南合滹沱河北達天津會白河入海所謂衛漕也其河流濁勢盛運道得之始無淺澀虞然自德州下漸與海近卑窄易衝潰初永樂元年瀋陽軍士唐順言衛河抵直沽入海南距黃河陸路才五十里若開衛河而距黃河百步置倉廒受南運糧餉至衛河交運公私兩便乃命廷臣議未行其冬命都督僉事陳俊運淮安儀真倉糧百五十萬餘石赴陽武由衛河轉輸北京五年自臨清抵渡口驛決堤七處發卒塞之後宋禮開會通河衛河與之合時方數決堤岸遂命禮并治之禮言衛輝至直沽河岸多低薄若不究源析流但務堤築恐復潰決勞費益甚會通河抵魏家灣與土河連其處可穿二小渠以泄於土河雖遇水漲下流衛河自無橫溢患德州城西北亦可穿一小渠蓋自衛河岸東北至舊黃河十有二里而中間五里故有溝渠宜開道七里泄水入舊黃河至海豐大沽河入海詔從之英宗初永平縣丞李祐請閉漳河以防患疏衛河以通舟從之正統四年築青縣衛河堤岸十三年從御史林廷舉請引漳入衛十四年黃河決臨清四閘御史錢清請濬其南撞圈灣河以達衛從之景泰四年運艘阻張秋之決河南參議豐慶請自衛輝胙城洎於沙門陸挽三十里入衛舟運抵京師命漕運都督徐恭覆報如其策山東僉事江良材嘗言通河於衛有三便古黃河自孟津至懷慶東北入海今衛河自汲縣至臨清天津入海則猶古黃河道也便一三代前黃河東北入海宇宙全氣所鍾河南徙氣遂遷轉今於河陰原武懷孟間導河入衛以達天津不獨徐沛患息而京師形勝百倍便二元漕舟至封丘陸運抵淇門入衛今導河注衛冬春水平漕舟至河陰順流達衛夏秋水迅仍從徐沛達臨清以北抵京師且修其溝洫擇良有司任之可以備旱潦捍戎馬益起直隸河南富強之勢便三詹事霍韜大然其畫具奏以聞不行萬曆十六年總督河漕楊一魁議引沁水入衛命給事中常居敬勘酌可否居敬言衛小沁大衛清沁濁恐利少害多乃止泰昌元年十二月總河侍郎王佐言衛河流塞惟挽漳引沁闢丹三策挽漳難而引沁多患丹水則雖勢與沁同而丹口既闢自修武而下皆成安流建閘築堰可垂永利制可亦未能行也崇禎十三年總河侍郎張國維言衛河合漳沁淇洹諸水北流抵臨清會閘河以濟運自漳河他徙衛流遂弱挽漳引沁之議建而未行宜導輝縣泉源且酌引漳沁闢丹水疏通滏洹淇三水之利害得失命河南撫按勘議以聞不果行漳河出山西長子曰濁漳樂平曰清漳俱東經河南臨漳縣由畿南真定河間趨天津入海其分流至山東館陶西南五十里與衛河合洪武十七年河決臨漳敕守臣防護復諭工部凡堤塘堰壩可禦水患者皆預修治有司以黃沁漳衛沙五河所決堤岸丈尺具圖計工以聞詔以軍民兼築之永樂七年決固安縣賀家口九年決西南張固村河口與滏陽河合流下田不可耕臨漳主簿趙永中乞令災戶於漳河旁墾高阜荒地從之是年築沁州及大名等府決堤十三年漳滏並溢漂沒磁州田稼二十二年溢廣宗洪熙元年漳滏並溢決臨漳三冢村等堤岸二十四處發軍民修築宣德八年復築三冢村堤口正統元年漳滏並溢壞臨漳杜村西南堤三年漳決廣平順德四年又決彰德皆命修築十三年御史林廷舉言漳河自沁州發源七十餘溝會而為一至肥鄉堤岸逼隘水勢激湍故為民患元時分支流入衛河以殺其勢永樂間堙塞舊迹尚存去廣平大留村十八里宜發丁夫鑿通置閘遏水轉入之而疏廣肥鄉水道則漳河水減免居民患而衛河水增便漕從之漳水遂通於衛正德元年濬滏陽河河舊在任縣新店村東北源出磁州經永年曲周平鄉至穆家口會百泉等河北流永樂間漳河決而與合二水每並為患至景泰間又合漳衝曲周諸縣沿河之地皆築堤備之成化間舊河淤衝新店西南為新河合沙洺等河入穆家口亦築堤備之英宗時漳已通衛弘治初益徙入御河遂棄滏堤不理其後漳水復入新河兩岸地皆沒任縣民高暘等以為言下巡撫官勘奏言穆家口乃衆河之委當從此先而併濬新舊河令分流漳滏缺堤以漸而築從之自此漳滏匯流而入衛之道漸堙矣萬曆二十八年給事中王德完言漳河決小屯東經魏縣元城抵館陶入衛為一變其害小決高家口析二流於臨漳之南北俱至成安東呂彪河合流經廣平肥鄉永年至曲周入滏水同流至青縣口方入漕河為再變其害大滏水不勝漳而今納漳則狹小不能束巨浪病溢而患在民衛水昔仰漳而今舍漳則細緩不能捲沙泥病涸而患在運塞高家河口導入小屯河費少利多為上策仍回龍鎮至小灘入衛費巨害少為中策築呂彪河口固堤漳水運道不資利地方不罹害為下策命河漕督臣集議行之直隸巡按佴祺亦請引漳河並下督臣急引漳會衛以圖永濟不果行沁河出山西沁源縣綿山東谷穿太行山東南流三十里入河南境繞河內縣東北又東南至武陟縣與黃河會而東注達徐州以濟漕其支流自武陟紅荊口經衛輝入衛河元郭守敬言沁餘水引至武陟北流合御河灌田此沁入衛之故迹也明初黃河自滎澤趨陳潁徑入於淮不與沁合乃鑿渠引之令河仍入沁久之沁水盡入黃河而入衛之故道堙矣武陟者沁黃交會處也永樂間再決再築宣德九年沁水決馬曲灣經獲嘉至新鄉水深成河城北又匯為澤築堤以防猶不能遏新鄉知縣許宣請堅築決口俾由故道遣官相度從之沁水稍定而其支流復入於衛正統三四年間武陟沁堤復再決再築十三年黃河決滎澤背沁而去乃從武陟東寶家灣開渠三十里引河入沁以達淮自後沁河益大合而沁之入衛者漸淤景泰三年僉事劉清言自沁決馬曲灣入衛沁黃衛三水相通轉輸頗利今決口已塞衛河膠淺運舟悉從黃河嘗遇險阻宜遣官濬沁資衛軍民運船視遠近之便而轉輸之詔下巡撫集議明年清復言東南漕舟水淺弗能進請自滎澤入沁河濬岡頭百二十里以通衛河且張秋之決由沁合黃勢遂奔急若引沁入衛則張秋無患行人王晏亦言開岡頭置閘分沁水使南入黃北達衛遇漲則閉閘漕可永無患並下督漕都御史王竑等核實以聞明年給事中何升言沁河有漏港已成河臨清屯聚膠淺之舟宜使從此入黃度二旬可達淮詔竑及都御史徐有貞閲之既而罷引沁河議初王晏請漕沁有司多言弗利晏固爭吏部尚書王直請遣官行河命侍郎趙榮同晏往榮亦言不利議乃寢天順八年都察院都事金景輝復請濬陳橋集古河分引沁水北通長垣曹州巨野以達漕河詔按實以聞未能行也弘治二年夏黃河決掃頭五處入沁河其冬又決祥符翟家口合沁河出丁家道口十一年員外郎謝緝以黃河南決恐牽沁水南流徐呂二洪必涸請遏黃河堤沁水使俱入徐州方下所司勘議明年漕運總兵官郭鋐上副使張鼐引沁河議請於武陟木欒店鑿渠抵荊隆口分沁水入賈魯河由丁家道口以下徐淮倘河或南徙即引沁水入渠以濟二洪之運帝即令鼐理之而曹縣知縣鄒魯又駁鼐議謂引沁必塞沁入河之口沁水無歸必漫田廬若俟下流既通而始塞之水勢搗虛千里不折其患更大甚於黃陵且起木欒店至飛雲橋地以千里計用夫百萬積功十年未能必其成也兗州知府龔弘主其説因上言鼐見河勢南行故建此議但今秋水逆流東北亟宜濬築乃從河臣撫臣議修丁家口上下堤岸而鼐議卒罷至萬曆十五年沁水決武陟東岸蓮花池金屹新鄉獲嘉盡淹沒廷議築堤障之都御史楊一魁言黃河從沁入衛此故道也自河徙而沁與俱南衛水每涸宜引沁入衛不使助河為虐部覆言沁入黃衛入漕其來已久頃沁水決木欒蓮花口而東一魁因建此議而科臣常居敬往勘言衛輝府治卑於河恐有衝激且沁水多沙入漕反為患不如堅築決口廣闢河身乃罷其議三十三年茶陵知州范守己復言嘉靖六年河決豐沛胡世寧言沁水自紅荊口分流入衛近年始塞宜擇武陟陽武地開一河北達衛水以備徐沛之塞會盛應期主開新渠議遂不行近者十年前河沙淤塞沁口沁水不得入河自木欒店東決岸奔流入衛則世寧紅荊口之説信矣彼時守土諸臣塞其決口築以堅堤仍導沁水入河而堤外河形直抵衛滸至今存也請建石閘於堤分引一支由所決河道東流入衛漕舟自邳遡河而上因沁入衛東達臨清則會通河可廢帝命總河及撫按勘議不行滹沱河出山西繁峙泰戲山循太行掠晉冀逶迤而東至武邑合漳東北至青縣岔河口入衛下直沽或云九河中所稱徒駭是也明初故道由藁城晉州抵寧晉入衛其後遷徙不一河身不甚深而水勢洪大左右旁近地大率平漫夏秋雨潦挾衆流而潰往往成巨浸水落則因其淺淤以為功修堤濬流隨時補救不能大治也洪武間一濬建文永樂間修武強真定決岸者三至洪熙元年夏霪雨河水大漲晉定深三州藁城無極饒陽新樂寧晉五縣低田盡沒而滹沱遂久淤矣宣德六年山水復暴泛衝壞堤岸發軍民濬之正統元年溢獻縣決大郭黿窩口堤四年溢饒陽決醜女堤及獻縣郭家口堤淹深州田百餘里皆命有司修築十一年復疏晉州故道成化七年巡撫都御史楊璿言霸州固安東安大城香河寶坻新安任丘河間肅寧饒陽諸州縣屢被水患由地勢平衍水易瀦積而唐滹沱白溝三河上源堤岸率皆低薄遇雨輒潰官吏東西決放以鄰為壑宜求故迹隨宜濬之帝即命璿董其事水患稍寧至十八年衛漳滹沱並溢潰漕河岸自清平抵天津決口八十六因循者久之弘治二年修真定縣白馬口及近城堤三千九百餘丈五年又築護城堤二道後復比年大水真定城內外俱浸改挑新河水患始息嘉靖元年築束鹿城西決口修晉州紫城口堤未幾復連歲被水十年冬巡按御史傅漢臣言滹沱流經大名故所築二堤衝敗宜修復如舊乃命撫按官會議其明年敕太僕卿何棟往治之棟言河發渾源州會諸山之水東趨真定由晉州紫城口之南入寧晉泊會衛河入海此故道也晉州西高南下因衝紫城東溢而束鹿深州諸處遂為巨浸今宜起藁城張村至晉州故堤築十八里高三丈廣十之植椿榆諸樹乃濬河身三十餘里導之南行使歸故道則順天真保諸郡水患俱平矣又用郎中徐元祉言於真定濬滹沱河以保城池又導束鹿武強河間獻縣諸水循滹沱以出皆從之自後數十年水頗戢無大害萬曆九年給事中顧問言臣令任丘見滹沱水漲漂沒民田不可勝紀請自饒陽河間以下水占之地悉捐為河而募夫深濬河身堅築堤岸以圖永久命下撫按官勘議增築雄縣橫堤八里任丘東堤二十里桑乾河盧溝上源也發源太原之天池伏流至朔州馬邑雷山之陽有金龍池者渾泉溢出是為桑乾東下大同古定橋抵宣府保安州雁門應州雲中諸水皆會穿西山入宛平界東南至看口分為二其一東由通州高麗莊入白河其一南流霸州合易水南至天津丁字沽入漕河曰盧溝河亦曰渾河河初過懷來束兩山間不得肆至都城西四十里石景山之東地平土疏衝激震蕩遷徙弗常元史名盧溝曰小黃河以其流濁也上流在西山後者盈涸無定不為害嘉靖三十三年御史宋儀望嘗請疏鑿以漕宣大糧三十九年都御史李文進以大同缺邊儲亦請開桑乾河以通運道自古定橋至盧溝橋務里村水運五節七百餘里陸運二節八十八里春秋二運可得米二萬五千餘石且造淺船由盧溝達天津而建倉務里村青白口八處以備撥運皆不能行下流在西山前者泛溢害稼畿封病之堤防急焉洪武十六年濬桑乾河自固安至高家莊八十里霸州西支河二十里南支河三十五里永樂七年決固安賀家口十年壞盧溝橋及堤岸沒官田民廬溺死人畜洪熙元年決東狼窩口宣德三年潰盧溝堤皆發卒治之六年順天府尹李庸言永樂中渾河決新城高從周口遂致淤塞霸州桑圓里上下每年水漲無所泄漫湧倒流北灌海子凹牛欄佃請亟修築從之七年侍郎王佐言通州至河西務河道淺狹張家灣西舊有渾河請疏濬帝以役重止之九年決東狼窩口命都督鄭銘往築正統元年復命侍郎李庸修築並及盧溝橋小屯廠潰岸明年工竣越三年白溝渾河二水俱溢決保定縣安州堤五十餘處復命庸治之築龍王廟南石堤七年築渾河口八年築固安決口成化七年霸州知州蔣愷言城北草橋界河上接渾河下至小直沽注於海永樂間渾河改流西南經固安新城雄縣抵州屢決為害近決孫家口東流入河又東抵三角淀小直沽乃其故道請因其自然之勢修築堤岸詔順天府官相度行之十九年命侍郎杜謙督理盧溝河堤岸弘治二年決楊木廠堤命新寧伯談祐侍郎陳政內官李興等督官軍二萬人築之正德元年築狼窩決口久之下流支渠盡淤嘉靖十年從郎中陸時雍言發卒濬導三十四年修柳林至草橋大河四十一年命尚書雷禮修盧溝河岸禮言盧溝東南有大河從麗莊園入直沽下海沙澱十餘里稍東岔河從固安抵直沽勢高今當先濬大河令水歸故道然後築長堤以固之決口地下水急人力難驟施西岸故堤綿亙八百丈遺址可按宜併築詔從其請明年訖工東西岸石堤凡九百六十丈萬曆十五年九月神宗幸石景山臨觀渾河召輔臣申時行至幄次諭曰朕每聞黃河衝決為患不常欲觀渾河以知水勢今見河流洶湧如此知黃河經理倍難宜飭所司加慎勿以勞民傷財為故事至選用務得人吏工二部宜明喻朕意膠萊河在山東平度州東南膠州東北源出高密縣分南北流南流自膠州麻灣口入海北流經平度州至掖縣海倉口入海議海運者所必講也元至元十七年萊人姚演獻議開新河鑿地三百餘里起膠西縣東陳村海口西北達膠河出海倉口謂之膠萊新河尋以勞費難成而罷明正統六年昌邑民王坦上言漕河水淺軍卒窮年不休往者江南常海運自太倉抵膠州州有河故道接掖縣宜濬通之由掖浮海抵直沽可避東北海險數千里較漕河為近部覆寢其議嘉靖十一年御史方遠宜等復議開新河以馬家墩數里皆石岡議復寢十七年山東巡撫胡纘宗言元時新河石座舊迹猶在惟馬壕未通已募夫鑿治請復濬淤道三十餘里命從其議至十九年副使王獻言勞山之西有薛島陳島石砑林立橫伏海中最險元人避之故放洋走成山正東踰登抵萊然後出直沽考膠萊地圖薛島西有山曰小竺兩峯夾峙中有石岡曰馬壕其麓南北皆接海崖而北即麻灣又稍北即新河又西北即萊州海倉由麻灣抵海倉才三百三十里由淮安踰馬壕抵直沽才一千五百里可免繞海之險元人嘗鑿此道遇石而止今鑿馬壕以趨麻灣濬新河以出海倉誠便獻乃於舊所鑿地迤西七丈許鑿之其初土石相半下則皆石又下石頑如鐵焚以烈火用水沃之石爛化為燼海波流匯麻灣以通長十有四里廣六丈有奇深半之由是江淮之舟達於膠萊踰年復濬新河水泉旁溢其勢深闊設九閘置浮梁建官署以守而中間分水嶺難通者三十餘里時總河王以旗議復海運請先開平度新河帝謂妄議生擾而獻亦適遷去於是工未就而罷三十一年給事中李用敬言膠萊新河在海運舊道西王獻鑿馬家壕導張魯白現諸河水益之今淮舟直抵麻灣即新河南口也從海倉直抵天津即新河北口也南北三百餘里潮水深入中有九穴湖大沽河皆可引濟其當疏濬者百餘里耳宜急開通給事中賀涇御史何廷鈺亦以為請詔廷鈺會山東撫按官行視既而以估費浩繁報罷隆慶五年給事中李貴和復請開濬詔遣給事中胡檟會山東撫按官議檟言獻所鑿渠流沙善崩所引白河細流不足灌注他若現河小膠河張魯河九穴都泊皆潢汙不深廣膠河雖有微源地勢東下不能北引諸水皆不足資上源則水泉枯涸無可仰給下流則浮沙易潰不能持久擾費無益巡撫梁夢龍亦言獻誤執元人廢渠為海運故道不知渠身太長春夏泉涸無所引注秋冬暴漲無可蓄泄南北海沙易塞舟行滯而不通乃復報罷萬曆三年南京工部尚書劉應節侍郎徐栻復議海運言難海運者以放洋之險覆溺之患今欲去此二患惟自膠州以北楊家圈以南濬地百里無高山長坂之隔楊家圈北悉通海潮矣綜而計之開創者什五通濬者什三量濬者什二以錐探之上下皆無石可開無疑乃命栻任其事應節議主通海而栻往相度則膠州旁地高峻不能通潮惟引泉源可成河然其道二百五十餘里鑿山引水築堤建閘估費百萬詔切責栻謂其以難詞沮成事會給事中光懋疏論之且請令應節往勘應節至謂南北海口水俱深闊舟可乘潮條悉其便以聞山東巡撫李世達上言南海麻灣以北應節謂沙積難除徙古路溝十三里以避之又慮南接鴨緑港東連龍家屯沙積甚高渠口一開沙隨潮入故復有建閘障沙之議臣以為閘閉則潮安從入閘啓則沙又安從障也北海倉口以南至新河閘大率沙淤潮淺應節挑東岸二里僅去沙二尺大潮一來沙壅如故故復有築堤約水障沙之議臣以為障兩岸之沙則可耳若潮自中流衝激安能障也分水嶺高峻一工止二十丈而費千五百金下多碙石掣水甚難故復有改挑王家丘之議臣以為吳家口至亭口高峻者共五十里大概多碙石費當若何而舍此則又無河可行也夫潮信有常大潮稍遠亦止及陳村閘楊家圈不能更進況日止二潮乎此潮水之難恃也河道紆曲二百里張魯白膠三水微細都泊行潦業已乾涸設遇亢旱何泉可引引泉亦難恃也元人開濬此河史臣謂其勞費不資終無成功足為前鑒巡按御史商為正亦言挑分水嶺下方廣十丈用夫千名才下數尺為碙石又下皆沙又下盡黑沙又下水泉湧出甫挑即淤止深丈二尺必欲通海行舟更須挑深一丈雖二百餘萬未足了此給事中王道成亦論其失工部尚書郭朝賓覆請停罷遂召應節栻還京罷其役嗣是中書程守訓御史高舉顏思忠尚書楊一魁相繼議及之皆不果行崇禎十四年山東巡撫曾櫻戶部主事邢國璽復申王獻劉應節之説給內帑十萬金工未舉櫻去官十六年夏尚書倪元璐請截漕糧由膠萊河轉餉自膠河口用小船抵分水嶺車盤嶺脊四十里達於萊河復用小船出海可無島嶕漂損之患山東副總兵黃蔭恩獻議略同皆未及行
