body:
  text: 明史卷八十三志第五十九河渠一黃河上黃河自唐以前皆北入海宋熙寧中始分趨東南一合泗入淮一合濟入海金明昌中北流絶全河皆入淮元潰溢不時至正中受害尤甚濟寧曹鄆間漂沒千餘里賈魯為總制導使南匯淮入海明洪武元年決曹州雙河口入魚臺徐達方北征乃開塌場口引河入泗以濟運而徙曹州治於安陵塌場者濟寧以西耐牢坡以南直抵魚臺南陽道也八年河決開封太黃寺堤詔河南參政安然發民夫三萬人塞之十四年決原武祥符中牟有司請興築帝以為天災令護舊堤而已十五年春決朝邑七月決滎澤陽武十七年決開封東月堤自陳橋至陳留橫流數十里又決嵵縣入巴河遣官塞河蠲被災租稅二十二年河沒儀封徙其治於白樓村二十三年春決歸德州東南鳳池口徑夏邑永城發興武等十衛士卒與歸德民併力築之罪有司不以聞者其秋決開封西華諸縣漂沒民舍遣使振萬五千七百餘戶二十四年四月河水暴溢決原武黑洋山東經開封城北五里又東南由陳州項城太和潁州潁上東至壽州正陽鎮全入於淮而賈魯河故道遂淤又由舊曹州鄆城兩河口漫東平之安山元會通河亦淤明年復決陽武泛陳州中牟原武封丘祥符蘭陽陳留通許太康扶溝十一州縣有司具圖以聞發民丁及安吉等十七衛軍士修築其冬大寒役遂罷三十年八月決開封城三面受水詔改作倉庫於滎陽高阜以備不虞冬蔡河徙陳州先是河決由開封北東行至是下流淤又決而之南永樂三年河決溫縣堤四十丈濟潦二水交溢淹民田四十餘里命修堤防四年修陽武黃河決岸八年秋河決開封壞城二百餘丈民被患者萬四千餘戶沒田七千五百餘頃帝以國家藩屏地特遣侍郎張信往視信言祥符魚王口至中灤下二十餘里有舊黃河岸與今河面平濬而通之使循故道則水勢可殺因繪圖以進時尚書宋禮侍郎金純方開會通河帝乃發民丁十萬命興安伯徐亨侍郎蔣廷瓚偕純相治併令禮總其役九年七月河復故道自封丘金龍口下魚臺塌場會汶水經徐呂二洪南入於淮是時會通河已開黃河與之合漕道大通遂議罷海運而河南水患亦稍息已而決陽武中鹽堤漫中牟祥符尉氏工部主事藺芳按視言堤當急流之衝夏秋泛漲勢不可驟殺宜捲土樹樁以資捍禦無令重為民患而已又言中灤導河分流使由故道北入海誠萬世利但緣河堤掃止用蒲繩泥草不能持久宜編木為囤填石其中則水可殺堤可固詔皆從其議十四年決開封州縣十四經懷遠由渦河入於淮二十年工部以開封土城堤數潰請濬其東故道報可宣德元年霪雨溢開封州縣十三年以河患徙靈州千戶所於城東六年從河南布政使言濬祥符抵儀封黃陵岡淤道四百五十里是時金龍口漸淤而河復屢溢開封十年從御史李懋言濬金龍口正統二年築陽武原武滎澤決岸又決濮州范縣三年河復決陽武及邳州灌魚臺金鄉嘉祥越數年又決金龍口陽穀堤及張家黑龍廟口而徐呂二洪亦漸淺太黃寺巴河分水處水脈微細十三年方從都督同知武興言發卒疏濬而陳留水夏漲決金村堤及黑潭南岸築垂竣復決其秋新鄉八柳樹口亦決漫曹濮抵東昌衝張秋潰壽張沙灣壞運道東入海徐呂二洪遂淺澀命工部侍郎王永和往理其事永和至山東修沙灣未成以冬寒停役且言河決自衛輝宜敕河南守臣修塞帝切責之令山東三司築沙灣趣永和塞河南八柳樹疏金龍口使河由故道明年正月河復決聊城至三月永和濬黑洋山西灣引其水由太黃寺以資運河修築沙灣堤大半而不敢盡塞置分水閘設三空放水自大清河入海且設分水閘二空於沙灣西岸以泄上流而請停八柳樹工從之是時河勢方橫溢而分流大清不專向徐呂徐呂益膠淺且自臨清以南運道艱阻景泰二年特敕山東河南巡撫都御史洪英王暹協力合治務令水歸漕河暹言黃河自陝州以西有山峽不能為害陝州以東則地勢平緩水易泛溢故為害甚多洪武二十四年改流從汴梁北五里許由鳳陽入淮者為大黃河其支流出徐州以南者為小黃河以通漕運自正統十三年以來河復故道從黑洋山後徑趨沙灣入海但存小黃河從徐州出岸高水低隨濬隨塞以是徐州之南不得飽水臣自黑洋山東南抵徐州督河南三司疏濬臨清以南請以責英未幾給事中張文質劾暹英治水無績請引塌場水濟徐呂二洪濬潘家渡以北支流殺沙灣水勢且開沙灣浮橋以西河口築閘引水以灌臨清而別命官以責其成詔不允仍命暹英調度時議者謂沙灣以南地高水不得南入運河請引耐牢坡水以灌運而勿使經沙灣別開河以避其衝決之勢或又言引耐牢坡水南去則自此以北枯澀矣甚者言沙灣水湍急石鐵沉下若羽非人力可為宜設齊醮符咒以禳之帝心甚憂念命工部尚書石璞往治而加河神封號璞至濬黑洋山至徐州以通漕而沙灣決口如故及命中官黎賢阮洛御史彭誼協治璞等築石堤於沙灣以禦決河開月河二引水以益運河且殺其決勢三年五月河流漸微細沙灣堤始成及加璞太子太保而於黑洋山沙灣建河神二新廟歲春秋二祭六月大雨浹旬復決沙灣北岸掣運河之水以東近河地皆沒命英督有司修築復敕中官黎賢武艮工部侍郎趙榮往治四年正月河復決新塞口之南詔復加河神封號至四月決口乃塞五月大雷雨復決沙灣北岸掣運河水入鹽河漕舟盡阻帝復命璞往乃鑿一河長三里以避決口上下通運河而決口亦築壩截之令新河運河俱可行舟工畢奏聞帝恐不能久令璞且留處置而命諭德徐有貞為僉都御史專治沙灣時河南水患方甚原武西華皆遷縣治以避水巡撫暹言黃河舊從開封北轉流東南入淮不為害自正統十三年改流為二一自新鄉八柳樹由故道東經延津封丘入沙灣一決滎澤漫流原武抵祥符扶溝通許洧川尉氏臨潁郾城陳州商水西華項城太康沒田數十萬頃而開封患特甚雖嘗築大小堤於城西皆三十餘里然沙土易壞隨築隨決小堤已沒大堤復壞其半請起軍民夫協築以防後患帝可其奏太僕少卿黃仕俊亦言河分兩派一自滎澤南流入項城一自新鄉八柳樹北流入張秋會通河並經六七州縣約二千餘里民皆蕩析離居而有司猶徵其稅乞敕所司覆視免徵帝亦可其奏巡撫河南御史張瀾又言原武黃河東岸嘗開二河合黑洋山舊河道引水濟徐呂今河改決而北二河淤塞不通恐徐呂乏水必妨漕運黑洋山北河流稍紆回請因決口改挑一河以接舊道灌徐呂帝亦從之有貞至沙灣上治河三策一置水閘門臣聞水之性可使通流不可使堙塞禹鑿龍門闢伊闕為疏導計也故漢武堙瓠子終弗成功漢明疏汴河踰年著績今談治水者甚衆獨樂浪王景所述制水門之法可取蓋沙灣地土皆沙易致坍決故作壩作閘皆非善計請依景法損益其間置閘門於水而實其底令高常水五尺小則拘之以濟運大則疏之使趨海則有通流之利無堙塞之患矣一開分水河凡水勢大者宜分小者宜合今黃河勢大衝決運河勢小乾淺必分黃水合運河則有利無害請度黃河可分之地開廣濟河一道下穿濮陽博陵及舊沙河二十餘里上連東西影塘及小嶺等地又數十餘里其內則有古大金堤可倚以為固其外有八百里梁山泊可恃以為泄至新置二閘亦頗堅牢可以宣節使黃河水大不至泛溢為害小亦不至乾淺以阻漕運其一挑深運河帝諭有貞如其議行之有貞乃踰濟汶沿衛沁循大河道濮范相度地形水勢上言河自雍而豫出險固而之夷斥水勢既肆由豫而兗土益疏水益肆而沙灣之東所謂大洪口者適當其衝於是決焉而奪濟汶入海之路以去諸水從之而泄堤以潰渠以淤潦則溢旱則涸漕道由此阻然驟而堰之則潰者益潰淤者益淤今請先疏其水水勢平乃治其決決止乃濬其淤於是設渠以疏之起張秋金堤之首西南行九里至濮陽濼又九里至博陵陂又六里至壽張之沙河又八里至東西影塘又十有五里至白嶺灣又三里至李凡五十里由李而上二十里至竹口蓮花池又三十里至大瀦潭乃踰范暨濮又上而西凡數百里經澶淵以接河沁築九堰以禦河流旁出者長各萬丈實之石而鍵以鐵六年七月功成賜渠名廣濟沙灣之決垂十年至是始塞亦會黃河南流入淮有貞乃克奏功凡費木鐵竹石纍數萬夫五萬八千有奇工五百五十餘日自此河水北出濟漕而阿鄄曹鄆間田出沮洳者百數十萬頃乃濬漕渠由沙灣北至臨清南抵濟寧復建八閘於東昌用王景制水門法以平水道而山東河患息矣七年夏河南大雨河決開封河南彰德其秋畿輔山東大雨諸水並溢高地丈餘堤岸多衝決仍敕有貞修築未幾事竣還京入見奬勞甚至擢副都御史天順元年修祥符護城大堤五年七月河決汴梁土城又決磚城城中水丈餘壞官民舍過半周王府宮人及諸守土官皆乘舟筏以避軍民溺死無算襄城亦決縣城命工部侍郎薛遠往視恤災戶蠲田租公廨民居以次修理明年二月開祥符曹家溜河勢稍平七年春河南布政司照磨金景輝考滿至京上言國初黃河在封丘後徙康王馬頭去城北三十里復有二支河一由沙門注運河一由金龍口達徐呂入海正統戊辰決滎澤轉趨城南並流入淮舊河支河俱堙漕河因而淺澀景泰癸酉因水迫城築堤四十里勞費過甚而水發輒潰然尚未至決城壕為人害也至天順辛巳水暴至土城磚城並圮七郡財力所築之堤俱委諸無用人心惶惶未知所底夫河不循故道併流入淮是為妄行今急宜疏導以殺其勢若止委之一淮而以堤防為長策恐開封終為魚鱉之區乞敕部檄所司先疏金龍口寬闊以接漕河然後相度舊河或別求泄水之地挑濬以平水患為經久計命如其說行之成化七年命王恕為工部侍郎奉敕總理河道總河侍郎之設自恕始也時黃河不為患恕專力漕河而已十四年河決開封壞護城堤五十丈巡撫河南都御史李衍言河南纍有河患皆下流壅塞所致宜疏開封西南新城地下抵梁家淺舊河口七里壅塞以泄杏花營上流又自八角河口直抵南頓分導散漫以免祥符鄢陵睢陳歸德之災乃敕衍酌行之明年正月遷滎澤縣治以避水而開封堤不久即塞弘治二年五月河決開封及金龍口入張秋運河又決掃頭五所入沁郡邑多被害汴梁尤甚議者至請遷開封城以避其患布政司徐恪持不可乃止命所司大發卒築之九月命白昂為戶部侍郎修治河道賜以特敕令會山東河南北直隸三巡撫自上源決口至運河相機修築三年正月昂上言臣自淮河相度水勢抵河南中牟等縣見上源決口水入南岸者十三入北岸者十七南決者自中牟楊橋至祥符界析為二支一經尉氏等縣合潁水下塗山入於淮一經通許等縣入渦河下荊山入於淮又一支自歸德州通鳳陽之亳縣亦合渦河入於淮北決者自原武經陽武祥符封丘蘭陽儀封考城其一支決入金龍等口至山東曹州衝入張秋漕河去冬水消沙積決口已淤因併為一大支由祥符翟家口合沁河出丁家道口下徐州此河流南北分行大勢也合潁渦二水入淮者各有灘磧水脈頗微宜疏濬以殺河勢合沁水入徐者則以河道淺隘不能受方有漂沒之虞況上流金龍諸口雖暫淤久將復決宜於北流所經七縣築為堤岸以衛張秋但原敕治山東河南北直隸而南直隸淮徐境實河所經行要地尚無所統於是併以命昂昂舉郎中婁性協治乃役夫二十五萬築陽武長堤以防張秋引中牟決河出滎澤陽橋以達淮濬宿州古汴河以入泗又濬睢河自歸德飲馬池經符離橋至宿遷以會漕河上築長堤下修減水閘又疏月河十餘以泄水塞決口三十六使河流入汴汴入睢睢入泗泗入淮以達海水患稍寧昂又以河南入淮非正道恐卒不能容復於魚臺德州吳橋修古長堤又自東平北至興濟鑿小河十二道入大清河及古黃河以入海河口各建石堰以時啓閉蓋南北分治而東南則以疏為主云六年二月以劉大夏為副都御史治張秋決河先是河決張秋戴家廟掣漕河與汶水合而北行遣工部侍郎陳政督治政言河之故道有二一在滎澤孫家渡口經朱仙鎮直抵陳州一在歸德州飲馬池與亳州地相屬舊俱入淮今已淤塞因致上流衝激勢盡北趨自祥符孫家口楊家口車船口蘭陽銅瓦廂決為數道俱入運河於是張秋上下勢甚危急自堂邑至濟寧堤岸多崩圮而戴家廟減水閘淺隘不能泄水亦有衝決請濬舊河以殺上流之勢塞決河以防下流之患政方漸次修舉未幾卒官帝深以為憂命廷臣會薦才識堪任者僉舉大夏遂賜敕以往十二月巡按河南御史涂升言黃河為患南決病河南北決病山東昔漢決酸棗復決瓠子宋決館陶復決澶州元決汴梁復決蒲口然漢都關中宋都大梁河決為患不過瀕河數郡而已今京師專藉會通河歲漕粟數百萬石河決而北則大為漕憂臣博采輿論治河之策有四一曰疏濬滎鄭之東五河之西飲馬白露等河皆黃河由渦入淮之故道其後南流日久或河口以淤高不泄或河身狹隘難容水勢無所分殺遂泛濫北決今惟屣上流東南之故道相度疏濬則正流歸道餘波就壑下流無奔潰之害北岸無衝決之患矣二曰扼塞既殺水勢於東南必須築堤岸於西北黃陵岡上下舊堤缺壞當度下流東北形勢去水遠近補築無遺排障百川悉歸東南由淮入海則張秋無患而漕河可保矣三曰用人薦河南僉事張鼐四曰久任則請專信大夏且於歸德或東昌建公廨令居中裁決也帝以為然七年五月命太監李興平江伯陳鋭往同大夏共治張秋十二月築塞張秋決口工成初河流湍悍決口闊九十餘丈大夏行視之曰是下流未可治當治上流於是即決口西南開越河三里許使糧運可濟乃濬儀封黃陵岡南賈魯舊河四十餘里由曹出徐以殺水勢又濬孫家渡口別鑿新河七十餘里導使南行由中牟潁川東入淮又濬祥符四府營淤河由陳留至歸德分為二一由宿遷小河口一由亳渦河俱會於淮然後沿張秋兩岸東西築臺立表貫索聯巨艦穴而窒之實以土至決口去窒沉艦壓以大掃且合且決隨決隨築連晝夜不息決既塞繚以石堤隱若長虹功乃成帝遣行人齎羊酒往勞之改張秋名為安平鎮大夏等言安平鎮決口已塞河下流北入東昌臨清至天津入海運道已通然必築黃陵岡河口導河上流南下徐淮庶可為運道久安之計廷議如其言乃以八年正月築塞黃陵岡及荊隆等口七處旬有五日而畢蓋黃陵岡居安平鎮之上流其廣九十餘丈荊隆等口又居黃陵岡之上流其廣四百三十餘丈河流至此寬漫奔放皆喉襟重地諸口既塞於是上流河勢復歸蘭陽考城分流徑徐州歸德宿遷南入運河會淮水東注於海南流故道以復而大名府之長堤起胙城歷滑縣長垣東明曹州曹縣抵虞城凡三百六十里其西南荊隆等口新堤起于家店歷銅瓦廂東橋抵小宋集凡百六十里大小二堤相翼而石壩俱培築堅厚潰決之患於是息矣帝以黃陵岡河口功成敕建黃河神祠以鎮之賜額曰昭應其秋召大夏等還京荊隆即金龍也十一年河決歸德管河工部員外郎謝緝言黃河一支先自徐州城東小浮橋流入漕河南抵邳州宿遷今黃河上流於歸德州小壩子等處衝決與黃河別支會流經宿州睢寧由宿遷小河口流入漕河於是小河口北抵徐州水流漸細河道淺阻且徐呂二洪惟賴沁水接濟自沁源河內歸德至徐州小浮橋流出雖與黃河異源而比年河沁之流合而為一今黃河自歸德南決恐牽引沁水俱往南流則徐呂二洪必至淺阻請亟塞歸德決口遏黃水入徐以濟漕而挑沁水之淤使入徐以濟徐呂則水深廣而漕便利矣帝從其請未幾河南管河副使張鼐言臣嘗請修築侯家潭口決河以濟徐呂二洪今自六月以來河流四溢潭口決齧彌深工費浩大卒難成功臣嘗行視水勢荊隆口堤內舊河通賈魯河由丁家道口下徐淮其迹尚在若於上源武陟木欒店別鑿一渠下接荊隆口舊河俟河流南遷則引之入渠庶沛然之勢可接二洪而糧運無所阻矣帝為下其議於總漕都御史李蕙越二歲兗州知府龔弘上言副使鼐見河勢南行欲自荊隆口分沁水入賈魯河又自歸德西王牌口上下分水亦入賈魯河俱由丁家道口入徐州但今秋水從王牌口東行不由丁家口而南顧逆流東北至黃陵岡又自曹縣入單南連虞城乞令守臣亟建疏濬修築之策於是河南巡撫都御史鄭齡言徐呂二洪藉河沁二水合流東下以相接濟今丁家道口上下河決堤岸者十有二處共闊三百餘丈而河淤三十餘里上源奔放則曹單受害而安平可虞下流散溢則蕭碭被患而漕流有阻濬築誠急務也部覆從之乃修丁家口上下堤岸初黃河自原武滎陽分而為三一自亳州鳳陽至清河口通淮入海一自歸德州過丁家道口抵徐州小浮橋一自窪泥河過黃陵岡亦抵徐州小浮橋即賈魯河也逮河決黃陵岡犯張秋北流奪漕劉大夏往塞之仍出清河口十八年河忽北徙三百里至宿遷小河口正德三年又北徙三百里至徐州小浮橋四年六月又北徙一百二十里至沛縣飛雲橋俱入漕河是時南河故道淤塞水惟北趨單豐之間河窄水溢決黃陵岡尚家等口曹單田廬多沒至圍豐縣城郭兩岸闊百餘里督漕及山東鎮巡官恐經巨野陽穀故道則奪濟寧安平運河各陳所見以請議未定明年九月河復衝黃陵岡入賈魯河泛溢橫流直抵豐沛御史林茂達亦以北決安平鎮為虞而請濬儀封考城上流故道引河南流以分其勢然後塞決口築故堤工部侍郎崔巖奉命修理黃河濬祥符董盆口滎澤孫家渡又濬賈魯河及亳州故河各數十里且築長垣諸縣決口及曹縣外堤梁靖決口功未就而驟雨堤潰巖上疏言河勢衝蕩益甚且流入王子河亦河故道若非上流多殺水勢決口恐難卒塞莫若於曹單豐沛增築堤防毋令北徙庶可護漕且請別命大臣知水利者共議於是帝責巖治河無方而以侍郎李堂代之堂言蘭陽儀封考城故道淤塞故河流俱入賈魯河經黃陵岡至曹縣決梁靖楊家二口侍郎巖亦嘗修濬緣地高河澱隨濬隨淤水殺不多而決口又難築塞今觀梁靖以下地勢最卑故衆流奔注成河直抵沛縣藉令其口築成而容受全流無地必致回激黃陵岡堤岸而運道妨矣至河流故道堙者不可復疏請起大名三春柳至沛縣飛雲橋築堤三百餘里以障河北徙從之六年二月功未竣堂言陳橋集銅瓦廂俱應增築請設副使一人專理會河南盜起召堂還京命姑已其不急者遂委其事於副使而堤役由此罷八年六月河復決黃陵岡部議以其地界大名山東河南守土官事權不一請專遣重臣乃命管河副都御史劉愷兼理其事愷奏率衆祭告河神越二日河已南徙尚書李鐩因請祭河且賜愷羊酒愷於治河束手無策特歸功於神曹單間被害日甚世宗初總河副都御史龔弘言黃河自正德初載變遷不常日漸北徙大河之水合成一派歸入黃陵岡前乃折而南出徐州以入運河黃陵岡初築三掃先已決去其二懼山陝諸水橫發加以霖潦決而趨張秋復由故道入海臣嘗築堤起長垣由黃陵岡抵山東楊家口延袤二百餘里今擬距堤十里許再築一堤延袤高廣如之即河水溢舊堤流至十里外性緩勢平可無大決從之自黃陵岡決開封以南無河患而河北徐沛諸州縣河徙不常嘉靖五年督漕都御史高友璣請濬山東賈魯河河南鴛鴦口分泄水勢毋偏害一方部議恐害山東河南不允其冬以章拯為工部侍郎兼僉都御史治河先是大學士費宏言河入汴梁以東分為三支雖有衝決可無大害正德末渦河等河日就淤淺黃河大股南趨之勢既無所殺乃從蘭陽考城曹濮奔赴沛縣飛雲橋及徐州之溜溝悉入漕河泛溢瀰漫此前數年河患也近者沙河至沛縣浮沙湧塞官民舟楫悉取道昭陽湖春夏之交湖面淺涸運道必阻渦河等河必宜亟濬御史戴金言黃河入淮之道有三自中牟至荊山合長淮曰渦河自開封經葛岡小壩丁家道口馬牧集鴛鴦口至徐州小浮橋口曰汴河自小壩經歸德城南飲馬池抵文家集經夏邑至宿遷曰白河弘治間渦白上源堙塞而徐州獨受其害宜自小壩至宿遷小河併賈魯河鴛鴦口文家集壅塞之處盡行疏通則趨淮之水不止一道而徐州水患殺矣御史劉欒言曹縣梁靖口南岸舊有賈魯河南至武家口十三里黃沙淤平必宜開濬武家口下至馬牧集鴛鴦口百十七里即小黃河舊通徐州故道水尚不涸亦宜疏通督漕總兵官楊宏亦請疏歸德小壩丁家道口亳州渦河宿遷小河友璣及拯亦屢以為言俱下工部議以為濬賈魯故道開渦河上源功大難成未可輕舉但議築堤障水俾入正河而已是年黃河上流驟溢東北至沛縣廟道口截運河注雞鳴臺口入昭陽湖汶泗南下之水從而東而河之出飛雲橋者漫而北淤數十里河水沒豐縣徙治避之明年拯言滎澤北孫家渡蘭陽北趙皮寨皆可引水南流但二河通渦東入淮又東至鳳陽長淮衛經壽春王諸園寢為患叵測惟寧陵北坌河一道通飲馬池抵文家集又經夏邑至宿州符離橋出宿遷小河口自趙皮寨至文家集凡二百餘里濬而通之水勢易殺而園寢無患乃為圖說以聞命刻期舉工而河決曹單城武楊家梁靖二口吳士舉莊衝入雞鳴臺奪運河沛地淤填七八里糧艘阻不進御史吳仲以聞因劾拯不能辦河事乞擇能者往代其冬以盛應期為總督河道右都御史是時光祿少卿黃綰詹事霍韜左都御史胡世寧兵部尚書李承勛各獻治河之議綰言漕河資山東泉水不必資黃河莫若濬兗冀間兩高中低之地道河使北至直沽入海韜言議者欲引河自蘭陽注宿遷夫水溢徐沛猶有二洪為之束捍東北諸山亙列如垣有所底極若道蘭陽則歸德鳳陽平地千里河勢奔放數郡皆壑患不獨徐沛矣按衛河自衛輝汲縣至天津入海猶古黃河也今宜於河陰原武懷孟間審視地形引河水注於衛河至臨清天津則徐沛水勢可殺其半且元人漕舟涉江入淮至封丘北陸運百八十里至淇門入御河達京師御河即衛河也今導河注衛冬春泝衛河沿臨清至天津夏秋則由徐沛此一舉而運道兩得也世寧言河自汴以來南分二道一出汴城西滎澤經中牟陳潁至壽州入淮一出汴城東祥符經陳留亳州至懷遠入淮其東南一道自歸德宿州經虹縣睢寧至宿遷出其東分五道一自長垣曹鄆至陽穀出一自曹州雙河口至魚臺塌場口出一自儀封歸德至徐州小浮橋出一自沛縣南飛雲橋出一自徐沛之中境山北溜溝出六道皆入漕河而南會於淮今諸道皆塞惟沛縣一道僅存合流則水勢既大河身亦狹不能容故溢出為患近又漫入昭陽湖以致流緩沙壅宜因故道而分其勢汴西則濬孫家渡抵壽州以殺上流汴東南出懷遠宿遷及正東小浮橋溜溝諸道各宜擇其利便者開濬一道以泄下流或修武城南廢堤抵豐單接沛北廟道口以防北流此皆治河急務也至為運道計則當於湖東滕沛魚臺鄒縣間獨山新安社地別鑿一渠南接留城北接沙河不過百餘里厚築西岸以為湖障令水不得漫而以一湖為河流散漫之區乃上策也承勛言黃河入運支流有六自渦河源塞則北出小黃河溜溝等處不數年諸處皆塞北併出飛雲橋於是豐沛受患而金溝運道遂淤然幸東面皆山猶有所障故昭陽湖得通舟若益徙而北則徑奔入海安平鎮故道可慮單縣穀亭百萬生靈之命可虞又益北則自濟寧至臨清運道諸水俱相隨入海運何由通臣愚以為相六道分流之勢導引使南可免衝決此下流不可不疏濬也欲保豐沛單縣穀亭之民必因舊堤築之堤其西北使毋溢出此上流不可不堤防也其論昭陽湖東引水為運道與世寧同乃下總督大臣會議七年正月應期奏上如世寧策請於昭陽湖東改為運河會河決淤廟道口三十餘里乃別遣官濬趙皮寨孫家渡南北溜溝以殺上流隄武城迤西至沛縣南以防北潰會旱災修省言者請罷新河之役乃召應期還京以工部侍郎潘希曾代希曾抵官言邇因趙皮寨開濬未通疏孫家渡口以殺河勢請敕河南巡撫潘塤督管河副使刻期成功帝從其奏希曾又言漕渠廟道口以下忽淤數十里者由決河西來橫衝口上并掣閘河之水東入昭陽湖致閘水不南而飛雲橋之水時復北漫故也今宜於濟沛間加築東堤以遏入湖之路更築西堤以防黃河之衝則水不散緩而廟道口可永無淤塞之虞帝亦從之八年六月單豐沛三縣長堤成九年五月孫家渡河堤成逾月河決曹縣一自胡村寺東東南至賈家壩入古黃河由丁家道口至小浮橋入運河一自胡村寺東北分二支一東南經虞城至碭山合古黃河出徐州一東北經單縣長堤抵魚臺漫為坡水傍穀亭入運河單豐沛三縣長堤障之不為害希曾上言黃由歸德至徐入漕故道也永樂間濬開封支河達魚臺入漕以濟淺自弘治時黃河改由單豐出沛之飛雲橋而歸德故道始塞魚臺支河亦塞今全河復其故道則患害已遠支流達於魚臺則淺涸無虞此漕運之利國家之福也帝悅下所司知之乃召希曾還京自是豐沛漸無患而魚臺數溢十一年總河僉都御史戴時宗請委魚臺為受水之地言河東北岸與運道鄰惟西南流者一由孫家渡出壽州一由渦河口出懷遠一由趙皮寨出桃源一由梁靖口出徐州小浮橋往年四道俱塞全河南奔故豐沛曹單魚臺以次受害今患獨鍾於魚臺宜棄以受水因而道之使入昭陽湖過新開河出留城金溝境山乃易為力至塞河四道惟渦河經祖陵未敢輕舉其三支河頗存故迹宜乘魚臺壅塞令開封河夫捲掃填堤逼使河水分流則魚臺水勢漸減俟水落畢工並前三河共為四道以分泄之河患可已明年都御史朱裳代時宗條上治河二事大略言三大支河宜開如時宗計而請塞梁靖口迤東由魚臺入運河之岔口以捍黃河則穀亭鎮迤南二百餘里淤者可濬是謂塞黃河之口以開運河黃河自穀亭轉入運河順流而南二日抵徐州徐州逆流而北四日乃抵穀亭黃水之利莫大於此恐河流北趨或由魚臺金鄉濟寧漫安平鎮則運河堤岸衝決或三支一有壅淤則穀亭南運河亦且衝決宜繕築堤岸束黃入運是謂借黃河之水以資運河詔裳相度處置十三年正月裳復言今梁靖口趙皮寨已通孫家渡方濬惟渦河一支因趙皮寨下流睢州野雞岡淤正河五十餘里漫於平地注入渦河宜挑濬深廣引導漫水歸入正河而於睢州張見口築長堤至歸德郭村凡百餘里以防泛溢更時疏梁靖口下流且挑儀封月河入之達於小浮橋則北岸水勢殺矣夫河過魚臺其流漸北將有越濟寧趨安平東入於海之漸嘗議塞岔河之口以安運河而水勢洶湧恐難遽塞塞亦不能無橫決黃陵岡李居莊諸處不能無患徐州迤上至魯橋泥沙停滯山東諸泉水微運道必澀請創築城武至濟寧縷水大堤百五十餘里以防北溢而自魯橋至沛縣東堤百五十餘里修築堅厚固之以石自魚臺至穀亭開通淤河引水入漕以殺魚臺城武之患此順水之性不與水爭地者也孫家渡渦河二支俱出懷遠會淮流至鳳陽經皇陵及壽春王陵至泗州經祖陵皇陵地高無慮祖陵則三面距河壽春王陵尤迫近祖陵宜築土堤壽春王陵宜砌石岸然事體重大不敢輕舉也清江浦口正當黃淮會合之衝二河水漲漫入河口以致淤塞滯運宜濬深廣而又築堤以防水漲築壩以護行舟皆不可緩往時淮水獨流入海而海口又有套流安東上下又有澗河馬邏諸港以分水入海今黃河匯入於淮水勢已非其舊而諸港套俱已堙塞不能速泄下壅上溢梗塞運道宜將溝港次第開濬海口套沙多置龍爪船往來爬蕩以廣入海之路此所謂殺其下流者也河出魚臺雖借以利漕然未有數十年不變者也一旦他徙則徐沛必涸宜大濬山東諸泉以匯於汶河則徐沛之渠不患乾涸雖岔河口塞亦無虞矣工部覆如其議帝允行之未幾裳憂去命劉天和為總河副都御史代裳是歲河決趙皮寨入淮穀亭流絶廟道口復淤天和役夫十四萬濬之已而河忽自夏邑大丘回村等集衝數口轉向東北流經蕭縣下徐州小浮橋天和言黃河自魚沛入漕河運舟通利者數十年而淤塞河道廢壞閘座阻隔泉流衝廣河身為害亦大今黃河既改衝從虞城蕭碭下小浮橋而榆林集侯家林二河分流入運者俱淤塞斷流利去而害獨存宜濬魯橋至徐州二百餘里之淤塞制可十四年從天和言自曹縣梁靖口東岔河口築壓口縷水堤復築曹縣八里灣至單縣侯家林長堤各一道是年冬天和條上治河數事中言魯橋至沛縣東堤舊議築石以禦橫流今黃河既南徙可不必築孫家渡自正統時全河從此南徙弘治間淤塞屢開屢淤卒不能通今趙皮寨河日漸衝廣若再開渡口併入渦河不惟二洪水澀恐亦有陵寢之虞宜仍其舊勿治舊議祥符盤石蘭陽銅瓦廂考城蔡家口各添築月堤臣以為黃河之當防者惟北岸為重當擇其去河遠者大堤中堤各一道修補完築使北岸七八百里間聯屬高厚則前勘應築諸堤舉在其中皆可罷不築帝亦從之十五年督漕都御史周金言自嘉靖六年後河流益南其一由渦河直下長淮而梁靖口趙皮寨二支各入清河匯於新莊閘遂灌𩹉河水退沙存日就淤塞故老皆言河自汴來本濁而渦淮泗清新莊閘正當二水之口河淮既合昔之為沛縣患者今移淮安矣因請於新莊更置一渠立閘以資蓄泄從之十六年冬從總河副都御史于湛言開地丘店野雞岡諸口上流四十餘里由桃源集丁家道口入舊黃河截渦河水入河濟洪十八年總河都御史胡纘宗開考城孫繼口孫祿口黃河支流以殺歸睢水患且灌徐呂因於二口築長堤及修築馬牧集決口二十年五月命兵部侍郎王以旗督理河道協總河副都御史郭持平計議先一歲黃河南徙決野雞岡由渦河經亳州入淮舊決口俱塞其由孫繼口及考城至丁家道口虞城入徐呂者亦僅十之二持平久治弗效降俸戴罪以旗至上言國初漕河惟通諸泉及汶泗黃河勢猛水濁遷徙不常故徐有貞白昂劉大夏力排之不資以濟運也今幸黃河南徙諸閘復舊宜濬山東諸泉入野雞岡新開河道以濟徐呂而築長堤沛縣以南聚水如閘河制務利漕運而已明年春持平請濬孫繼口及扈運口李景高口三河使東由蕭碭入徐濟運其秋從以旗言於孫繼口外別開一渠泄水以濟徐呂凡八月三口工成以旗持平皆被獎遂召以旗還未幾李景高口復淤先是河決豐縣遷縣治於華山久之始復其故治河決孟津夏邑皆遷其城及野雞岡之決也鳳陽沿淮州縣多水患乃議徙五河蒙城避之而臨淮當祖陵形勝不可徙乃用巡按御史賈太亨言敕河撫二臣亟濬碭山河道引入二洪以殺南注之勢二十六年秋河決曹縣水入城二尺漫金鄉魚臺定陶城武衝穀亭總河都御史詹瀚請於趙反寨諸口多穿支河以分水勢詔可三十一年九月河決徐州房村集至邳州新安運道淤阻五十里總河副都御史曾鈞上治河方略乃濬房村至雙溝曲頭築徐州高廟至邳州沂河又言劉伶臺至赤晏廟凡八十里乃黃河下流淤沙壅塞疏濬宜先次則草灣老黃河口衝激淹沒安東一縣亦當急築更築長堤磯嘴以備衝激又三里溝新河口視舊口水高六尺開舊口有沙淤之患而為害稍輕開新口未免淹沒之虞而漕舟頗便宜暫閉新口建置閘座且增築高家堰長堤而新莊諸閘甃石以遏橫流帝命侍郎吳鵬振災戶而悉從鈞奏三里溝新河者督漕都御史應檟以先年開清河口通黃河之水以濟運今黃河入海下流澗口安東俱漲塞河流壅而漸高瀉入清河口沙停易淤屢濬屢塞溝在淮水下流黃河未合之上故閉清河口而開之使船由通濟橋遡溝出淮以達黃河者也時濬徐邳將訖工一夕水湧復淤帝用嚴嵩言遣官祭河神而鵬鈞復共奏請急築濬草灣劉伶臺建閘三里溝迎納泗水清流且於徐州以上至開封濬支河一二令水分殺其冬漕河工竣進鈞秩侍郎三十七年七月曹縣新集淤新集地接梁靖口歷夏邑丁家道口馬牧集韓家道口司家道口至蕭縣薊門出小浮橋此賈魯河故道也自河患亟別開支河出小河以殺水勢而本河漸澀至是遂決趨東北段家口析而為六曰大溜溝小溜溝秦溝濁河胭脂溝飛雲橋俱由運河至徐洪又分一支由碭山堅城集下郭貫樓析而為五曰龍溝母河梁樓溝楊氏溝胡店溝亦由小浮橋會徐洪而新集至小浮橋故道二百五十餘里遂淤不可復矣自後河忽東忽西靡有定向水得分瀉者數年不至壅潰然分多勢弱淺者僅二尺識者知其必淤至四十四年七月河決沛縣上下二百餘里運道俱淤全河逆流自沙河至徐州以北至曹縣棠林集而下北分二支南流者繞沛縣戚山楊家集入秦溝至徐北流者繞豐縣華山東北由三教堂出飛雲橋又分而為十三支或橫絶或逆流入漕河至湖陵城口散漫湖坡達於徐州浩渺無際而河變極矣乃命朱衡為工部尚書兼理河漕又以潘季馴為僉都御史總理河道明年二月復遣工科給事中何起鳴往勘河工衡巡行決口舊渠已成陸而盛應期所鑿新河故跡尚在地高河決至昭陽湖不能復東乃定計開濬而季馴則以新河土淺泉湧勞費不資留城以上故道初淤可復也由是二人有隙起鳴至沛還上言舊河之難復有五黃河全徙必殺上流新集龐家屯趙家圈皆上流也以不資之財投於河流已棄之故道勢必不能一也自留城至沛莽為巨浸無所施工二也橫亙數十里褰裳無路十萬之衆何所棲身三也挑濬則淖陷築岸則無土且南塞則北奔四也夏秋淫潦難保不淤五也新河開鑿費省且可絶後來潰決之患宜用衡言開新河而兼採季馴言不全棄舊河廷臣議定衡乃決開新河時季馴持復故道之議廷臣又多以為然遂勘議新集郭貫樓諸上源地衡言河出境山以北則閘河淤出徐州以南則二洪涸惟出境山至小浮橋四十餘里間乃兩利而無害自黃河橫流碭山郭貫樓支河皆已淤塞改從華山分為南北二支南出秦溝正在境山南五里許運河可資其利惟北出沛縣西及飛雲橋逆上魚臺為患甚大朝廷不忍民罹水災拳拳故道命勘上源但臣參考地形有五不可自新集至兩河口皆平原高阜無尺寸故道可因郭貫樓抵龍溝頗有河形又係新淤無可駐足其不可一也黃河所經鮮不為患由新集則商虞夏邑受之由郭貫樓則蕭碭受之今改復故道則魚沛之禍復移蕭碭其不可二也河西注華山勢若建瓴欲從中鑿渠挽水南向必當築壩橫截遏其東奔於狂瀾巨浸之中築壩數里為力甚難其不可三也役夫三十萬曠日持久騷動三省其不可四也大役踵興工費數百萬一有不繼前功盡隳其不可五也惟當開廣秦溝使下流通行修築南岸長堤以防奔潰可以蘇魚沛昏墊之民從之衡乃開魚臺南陽抵沛縣留城百四十餘里而濬舊河自留城以下抵境山茶城五十餘里由此與黃河會又築馬家橋堤三萬五千二百八十丈石堤三十里遏河之出飛雲橋者趨秦溝以入洪於是黃水不東侵漕道通而沛流斷矣方工未成河復決沛縣敗馬家橋堤論者交章請罷衡未幾工竣帝大喜賦詩四章志喜以示在直諸臣隆慶元年五月加衡太子少保始河之決也支流散漫遍陸地既而南趨濁河逮新河成則盡趨秦溝而南北諸支河悉併流焉然河勢益大漲三年七月決沛縣自考城虞城曹單豐沛抵徐州俱受其害茶城淤塞漕船阻邳州不能進已雖少通而黃河水橫溢沛地秦溝濁河口淤沙旋疏旋壅朱衡已召還工部及總河都御史翁大立皆請於梁山之南別開一河以漕避秦溝濁河之險後所謂泇河者也詔令相度地勢未果行四年秋黃河暴至茶城復淤而山東沙薛汶泗諸水驟溢決仲家淺運道由梁山出戚家港合於黃河大立復請因其勢而濬之是時淮水亦大溢自泰山廟至七里溝淤十餘里而水從諸家溝傍出至清河縣河南鎮以合於黃河大立又言開新莊閘以通回船復陳瑄故道則淮可無虞獨黃河在睢寧宿遷之間遷徙未知所定泗州陵寢可虞請濬古睢河由宿遷歷宿州出小浮橋以泄二洪之水且規復清河魚溝分河一道下草灣以免衝激之患則南北運道庶幾可保時大立已內遷方受代而季馴以都御史復起總理河道部議令區畫九月河復決邳州自睢寧白浪淺至宿遷小河口淤百八十里糧艘阻不進大立言比來河患不在山東河南豐沛而專在徐邳故先欲開泇河口以遠河勢開蕭縣河以殺河流者正謂浮沙壅聚河面增高為異日慮耳今秋水洊至橫溢為災權宜之計在棄故道而就新衝經久之策在開泇河以避洪水乞決擇於二者部議主塞決口而令大立條利害以聞大立遂以開泇口就新衝復故道三策並進且言其利害各相參會罷去策未決而季馴則主復故道時茶城至呂梁黃水為兩崖所束不能下又不得決至五年四月乃自靈璧雙溝而下北決三口南決八口支流散溢大勢下睢寧出小河而匙頭灣八十里正河悉淤季馴役丁夫五萬盡塞十一口且濬匙頭灣築縷堤三萬餘丈匙頭灣故道以復旋以漕船行新溜中多漂沒季馴罷去六年春復命尚書衡經理河工以兵部侍郎萬恭總理河道二人至罷泇河議專事徐邳河修築長堤自徐州至宿遷小河口三百七十里併繕豐沛大黃堤正河安流運道大通衡乃上言河南屢被河患大為堤防今幸有數十年之安者以防守嚴而備禦素也徐邳為糧運正道既多方以築之則宜多方以守之請用夫每里十人以防三里一鋪四鋪一老人巡視伏秋水發時五月十五日上堤九月十五日下堤願攜家居住者聽詔如議六月徐邳河堤工竣遂命衡回部賞衡及總理河道都御史萬恭等銀幣有差是歲御史吳從憲言淮安而上清河而下正淮泗河海衝流之會河潦內出海潮逆流停蓄移時沙泥旋聚以故日就壅塞宜以春夏時濬治則下流疏暢泛溢自平帝即命衡與漕臣勘議而督理河道署郎中事陳應薦挑穵海口新河長十里有奇濶五丈五尺深一丈七尺用夫六千四百餘人衡之被召將還也上疏言國家治河不過濬淺築堤二策濬淺之法或爬或潦或逼水而衝或引水而避此可人力勝者然茶城與淮水會則在清河茶城清河無水不淺蓋二水互為勝負黃河水勝則壅沙而淤及其消也淮漕水勝則衝沙而通水力蓋居七八非專用人力也築堤則有截水縷水之異截水可施於閘河不可施於黃河蓋黃河湍悍挾川潦之勢何堅不瑕安可以一堤當之縷水則兩岸築堤不使旁潰始得遂其就下入海之性蓋以順為治非以人力勝水性故至今百五六十年為永賴焉清河之淺應視茶城遇黃河漲落時輒挑河潢導淮水衝刷雖遇漲而塞必遇落而通無足慮也惟清江浦水勢最弱出口處所適與黃河相值宜於黃水盛發時嚴閉各閘毋使沙淤若海口則自隆慶三年海嘯壅水倒灌低窪之地積瀦難泄宜時加疏濬毋使積塞至築黃河兩岸堤第當縷水不得以攔截為名疏上報聞而已
