body:
  text: 明史卷四十六志第二十二地理七雲南貴州雲南禹貢梁州徼外元置雲南等處行中書省治中慶路洪武十五年二月癸丑平雲南置雲南都指揮使司乙卯置雲南等處承宣布政使司同治雲南府領府五十八州七十五縣五十五蠻部六後領府十九禦夷府二州四十禦夷州三縣三十宣慰司八宣撫司四安撫司五長官司三十三禦夷長官司二北至永寧與四川界東至富州與廣西界西至干崖與西番界南至木邦與交址界距南京七千二百里京師一萬六百四十五里洪武二十六年編戶五萬九千五百七十六口二十五萬九千二百七十弘治四年戶一萬五千九百五十口一十二萬五千九百五十五萬曆六年戶一十三萬五千五百六十口一百四十七萬六千六百九十二雲南府元中慶路洪武十五年正月改為雲南府領州四縣九昆明倚洪武二十六年岷王府自陝西岷州遷於此永樂二十二年遷岷王府於湖廣武岡州建滕王府於此宣德元年除東有金馬山與西南碧雞山相對俱有關山下即滇池池在城南周五百里其西南為海口至武定府北注於金沙江又東有盤龍江西注滇池東有赤水鵬清水江二巡檢司富民府西北東有螳蜋川源自滇池下流入金沙江東南有安寧河宜良府東少南東有大池江一名大河亦曰巴盤江西有湯池巡檢司羅次府西北舊屬安寧州弘治十三年八月改屬府西有星宿河自武定府流入又有沙摩溪即安寧河南有鍊象關巡檢司晉寧州西有大堡河下流入滇池北距府百里領縣二歸化東北有交七浦滇池下流呈貢州北西有滇池北有落龍河南流入焉安寧州西有呀嵕山有煎鹽水設鹽課提舉司轄鹽井四天啓三年改設於琅井此司遂廢又南有螳蜋川西有安寧河又有祿貼琉二巡檢司東距府八十里領縣一祿豐州西西有南平山上有關東有大溪即安寧河西有星宿河河東有老鴉關巡檢司又西有蘭谷關昆陽州東南有渠濫川東北入於滇池北距府百五十里領縣二三泊州西北西有三泊溪流入滇池易門州西南有易門守禦千戶所洪武二十四年置舊縣治在焉萬曆三年復還縣治於此又南有黎崖山産異馬一名馬頭山西有九渡河即祿豐縣大溪下流入元江府界嵩明州洪武十五年三月改曰嵩盟成化十八年復故東北有羅錦山東有秀嵩山西北有東葛勒山東南有烏納山牧漾水出焉西南入滇池又東南有嘉利澤亦曰楊林澤又西有邵甸河匯九十九泉至昆明為盤龍江西有邵甸縣洪武十五年三月屬州尋廢東南有楊林縣成化十七年十月廢又東有楊林守禦千戶所洪武二十五年置又西有兔兒關巡檢司西南距府百二十里曲靖府元曲靖路洪武十五年三月為府二十七年四月升為軍民府領州四縣二西距布政司二百九十里南寧倚東南有石堡山山西有元越州治洪武二十八年正月廢北有白石江流合城南之瀟湘江又東南合左小江亦謂之南盤江下流環雲南澄江廣西三府之境至羅平州入貴州界東北有白水關巡檢司亦佐府東元屬羅雄州永樂初改屬府西南有塊澤江霑益州東南有堆湧山北有北盤江其上流即貴州畢節衛之可渡河流入州境又東南入貴州安南衛其西南又有南盤江即南寧縣之東山河南有交水縣東南有羅山縣東北有石梁縣元皆屬州洪武十五年皆廢南有平夷衛本平夷千戶所洪武二十一年十一月置二十三年四月改為衛後廢永樂元年復置衛衛當貴州西入之衝東有巒岡西有定南嶺北有豫順關宣威關州東南又有越州衛洪武二十三年七月置二十四年十二月徙於陸涼州二十八年與州同廢永樂元年九月復置又州南有松韶鋪阿幢橋二巡檢司又南有炎方城西南有松株城俱天啓五年築西南距府二百十三里陸涼州東有丘雄山下有中涎澤即南盤江所匯也西北有木容山有關又西有部封山又西有芳華縣南有河納縣元皆屬州永樂初皆廢西南有陸涼衛洪武二十三年三月以古魯昌地置西南有喬甸萬曆二年立營置戍於此四十八年復設法古甸龍峝等營協守其地北距府百二十里馬龍州東南有木容箐山洪武二十四年十二月置寧越堡於此山下有木容溪下流即瀟湘江又西有楊磨山一名關索嶺上有關西南有通泉縣元屬州永樂初廢北有馬隆守禦千戶所本馬隆衛洪武二十三年七月置二十八年十月改為所南有魯婆伽嶺巡檢司又有馬龍縣元屬州洪武十五年廢西南有分水嶺關東有三叉口關東距府七十里羅平州元羅雄州萬曆十五年四月更名北有祿布山東南有盤江下流入貴州慕役長官司界南有定雄守禦千戶所萬曆十四年九月置西北距府二百七十里尋甸府元仁德府洪武十六年十月辛未升為仁德軍民府丁丑改尋甸軍民府成化十二年改為尋甸府舊治在東今治在鳳梧山下嘉靖七年十月徙西南有落隴雄山又有哇山西有果馬山其泉流為龍巨江下流入滇池又西南有三稜山上有九十九泉即盤龍江之上源又東有阿交合溪又北有為美縣西有歸厚縣元屬府洪武十五年三月因之尋廢東南有木密關一名易龍堡洪武二十三年四月置木密關守禦千戶所於此西南距布政司二百六十里臨安府元臨安路洪武十五年正月為府領州六縣五長官司九北距布政司四百二十里建水州倚元時府在州北洪武中移府治此西南有寶山西北右有火焰山東有石巖山瀘江水自石屏州流經此伏流入巖洞中東出為樂蒙河又東北有曲江東入於盤江有曲江巡檢司又西有禮社江源出趙州流經此又有寧遠州萬曆十四年析建水州置四十八年廢東南有納更山土巡檢司石屏州元曰石坪洪武十五年三月改曰石平後改今名南有鍾秀山東有菜玉山産石似玉有曲江又有異龍湖周百五十里中有大小中三島其大島中島上皆有城其水引流為瀘江西有寶秀關巡檢司東距府七十里阿迷州元阿寧萬戶洪武十五年三月置州東南有買吾山萬曆初改名雷公山又南有盤江東有樂蒙河流入焉又東有火井有東山口土巡檢司又有部舊村巡檢司後廢又有阿迷守禦城萬曆二年築西距府百二十里寧州東南有登樓山東有水角甸山産蘆甘石又東有婆兮江源出澄江府撫仙湖下流入盤江又西南有浣江流合焉又東有西沙縣元屬州後省洪武十五年三月復置仍屬州尋復省西北有甸直巡檢司西南距府百八十里通海府西北元屬寧州洪武十五年三月改屬府南有秀山北有通海湖東有守禦通海前前右右二千戶所本元臨安路治洪武初徙府治建水州十五年置守禦千戶所於此河西府西北東有曲江又西有祿卑江自新興州流入合於曲江又東北有緑溪河其下流即通海湖又北有曲陀關巡檢司後廢嶍峨府西北元屬寧州洪武十五年二月改屬府東有曲江自新興州流入又南有合流江西北有丁癸江俱流合焉又西南有伽羅關西有興衣鄉二巡檢司蒙自府東南西有目則山東有雲龍山又有羡裒山又東南有黎花江即禮社江也東南注於交址清水江有黎花舊市柵宣德五年五月置臨安衛右千戶所於此又西南有西溪二出銀礦又南有蓮花灘即瀾滄江下流交址洮江上流西南有箐口關巡檢司又有大窩關楊柳河關東南有廢果寨又有賀謎寨俱道通交址新平府西北萬曆十九年置東南有魯奎山東有平甸河南有南峝巡檢司新化州本馬龍他郎甸長官司洪武十七年四月置直隸布政司弘治八年改為新化州萬曆十九年來屬北有徹崇山西有馬籠山蠻酋結寨處元置馬籠部千戶於此屬元江路洪武十五年廢又北有法龍山亦蠻酋結寨處又東南有馬籠江即禮社江亦曰摩沙勒江有摩沙勒巡檢司東北有阿怒甸東南距府五百三十里寧遠州元至治三年二月置直隸雲南行省洪武十五年來屬宣德元年與安南納樓茶甸長官司府西南本納樓千戶所洪武十五年置屬和泥府十七年四月改置北有羚羊洞産銀礦又有祿豐江即禮社江下流又東有倘甸教化三部長官司府東南元強現三部洪武中改置西南有魯部河源出禮社江下流合蒙自縣梨花江王弄山長官司府東南元王弄山大小二部洪武中改置虧容甸長官司府西南元鐵容甸屬元江路洪武中改置來屬西有虧容江源出沅江府東經車人寨出寧遠州境溪處甸長官司府西南元溪處甸軍民副萬戶屬元江路洪武中改置來屬思他甸長官司府西南元和泥路洪武十五年三月為府領納樓千戶所伴溪七溪阿撒三蠻部十七年廢後改置左能寨長官司府西南本思他甸寨洪武中改置落恐甸長官司府西南元伴溪落恐部軍民萬戶洪武中改置安南長官司府東南元捨資千戶後改安南道防送軍千戶洪武十五年三月仍曰捨資千戶所尋改置長官司正德六年省入蒙自縣天啓二年復置澄江府元澄江路洪武十五年三月為府領州二縣三西北距布政司八十里河陽倚舊治在西洪武中遷繡毬山上弘治中又遷縣東金蓮山正德十三年又遷縣東暘溥山麓嘉靖二十年又遷金蓮山南隆慶四年又遷舞鳳山下即今治北有羅藏山南有撫仙湖一名羅伽湖下流東會於盤江又東有鐵池河源出陸涼州流至此會撫仙湖復引流為鐵赤河入於盤江江川府西南南有故城崇禎七年圮於水遷於舊江川驛即今治又南有星雲湖東南入撫仙湖北有關索嶺巡檢司陽宗府東北北有明湖一名陽宗湖源出羅藏山流入於盤江新興州東北有羅麼山一名石崖山西北有大棋山又有蒙習山山與晉寧州交界又有大溪下流至嶍峨縣入於曲江有羅麼溪源出羅麼山入於大溪又北有普舍縣南有研和縣元俱屬州洪武十五年三月因之尋廢又北有鐵爐關巡檢司東距府二百里路南州西南有竹子山東有劄龍山石可煉銅西有巴盤江源自陸涼州又有鐵赤河合焉東南有邑市縣元屬州弘治三年九月廢東北有革泥巡檢司西距府百三十里廣西府元廣西路洪武十五年三月為府西有阿盧山西北有巴盤江又西有南盤江又南有矣邦池一名龍甸海跨彌勒州界南入盤江領州三西北距布政司三百十里師宗州西有龜山萬曆四十八年築督捕城於此東有英武山西有盤江又西北有巴盤江合焉東北入羅平州界西南距府八十里彌勒州南有卜龍山西有阿欲山東南有盤江山南盤江經其下又東有八甸溪南合南盤江又西有十八寨山嘉靖元年二月置十八寨守禦千戶所於此直隸雲南都司又南有捏招巡檢司東北距府九十里維摩州元大德四年二月置東北有小維摩山東南有大維摩山又有阿母山又東北有寶寧溪下流經廣南府界合西洋江西有三鄉城萬曆二十二年築西北距府二百二十里廣南府元廣南西路宣撫司洪武十五年十一月改置廣南府西北有牌頭山土人築寨其上南有西洋江東南至廣西田州府入於左江領州一西北距布政司七百九十里富州元至元十三年置屬廣南西路洪武十五年改屬府東南有者鷂山東北有西寧山又東有楠木溪至州南與南汪溪合伏流十五里東出於西洋江西南有安寧州東北有羅佐州俱元至元十三年置屬廣南西路洪武十五年因之後俱廢西距府二百里元江軍民府元元江路洪武十五年三月為府永樂初升軍民府領州二東北距布政司七百九十里奉化州倚本因遠羅必甸長官司洪武十八年四月置嘉靖中改州東有羅槃山亦名玉臺山又有路通山東南有元江亦曰禮社江東南入納樓茶甸長官司界西南有瀾滄江與車里宣慰司分界又西有步日部洪武中廢又東有禾摩村巡檢司恭順州本他郎寨長官司嘉靖中改州楚雄府元威