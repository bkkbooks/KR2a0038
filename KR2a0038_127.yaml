body:
  text: 明史卷一百二十七列傳第十五李善長汪廣洋李善長字百室定遠人少讀書有智計習法家言策事多中太祖略地滁陽善長迎謁知其為里中長者禮之留掌書記嘗從容問曰四方戰鬬何時定乎對曰秦亂漢高起布衣豁達大度知人善任不嗜殺人五載成帝業今元綱既紊天下土崩瓦解公濠産距沛不遠山川王氣公當受之法其所為天下不足定也太祖稱善從下滁州為參謀預機畫主饋餉甚見親信太祖威名日盛諸將來歸者善長察其材言之太祖復為太祖布誠使皆得自安有以事力相齟齬者委曲為調護郭子興中流言疑太祖稍奪其兵柄又欲奪善長自輔善長固謝弗往太祖深倚之太祖軍和陽自將擊雞籠山寨少留兵佐善長居守元將諜知來襲設伏敗之太祖以為能太祖得巢湖水師善長力贊渡江既拔采石趨太平善長預書榜禁戢士卒城下即揭之通衢肅然無敢犯者太祖為太平興國翼大元帥以為帥府都事從克集慶將取鎮江太祖慮諸將不戢下乃佯怒欲置諸法善長力救得解鎮江下民不知有兵太祖為江南行中書省平章以為參議時宋思顏李夢庚郭景祥等俱為省僚而軍機進退賞罰章程多決於善長改樞密院為大都督府命兼領府司馬進行省參知政事太祖為吳王拜右相國善長明習故事裁決如流又羔天於辭命太祖有所招納輒令為書前後自將征討皆命居守將吏帖服居民安堵轉調兵餉無乏嘗請榷兩淮鹽立茶法皆斟酌元制去其弊政既復制錢法開鐵冶定魚稅國用益饒而民不困吳元年九月論平吳功封善長宣國公改官制尚左以為左相國太祖初渡江頗用重典一日謂善長法有連坐三條不已甚乎善長因請自大逆而外皆除之遂命與中丞劉基等裁定律令頒示中外太祖即帝位追帝祖考及册立后妃太子諸王皆以善長充大禮使置東宮官屬以善長兼太子少師授銀青榮祿大夫上柱國録軍國重事餘如故已帥禮官定郊社宗廟禮帝幸汴梁善長留守一切聽便宜行事尋奏定六部官制議官民喪服及朝賀東宮儀奉命監修元史編祖訓録大明集禮諸書定天下嶽瀆神祇封號封建諸王爵賞功臣事無巨細悉委善長與諸儒臣謀議行之洪武三年大封功臣帝謂善長雖無汗馬勞然事朕久給軍食功甚大宜進封大國乃授開國輔運推誠守正文臣特進光祿大夫左柱國太師中書左丞相封韓國公歲祿四千石子孫世襲豫鐵券免二死子免一死時封公者徐達常遇春子茂李文忠馮勝鄧愈及善長六人而善長位第一制詞比之蕭何褒稱甚至善長外寬和內多忮刻參議李飲冰楊希聖稍侵善長權即按其罪奏黜之與中丞劉基爭法而詬基不自安請告歸太祖所任張昶楊憲汪廣洋胡惟庸皆獲罪善長事寄如故貴富極意稍驕帝始微厭之四年以疾致仕賜臨濠地若干頃置守冢戶百五十給佃戶千五百家儀仗士二十家踰年病愈命董建臨濠宮殿徒江南富民十四萬田濠州以善長經理之留濠者數年七年擢善長弟存義為太僕丞存義子伸佑皆為羣牧所官九年以臨安公主歸其子祺拜駙馬都尉初定婚禮公主修婦道甚肅光寵赫奕時人豔之祺尚主後一月御史大夫汪廣洋陳寧疏言善長狎寵自恣陛下病不視朝幾及旬不問候駙馬都尉祺六日不朝宣至殿前又不引罪大不敬坐削歲祿千八百石尋命與曹國公李文忠總中書省大都督府御史臺同議軍國大事督圜兵工丞相胡惟庸初為寧國知縣以善長薦擢太常少卿後為丞相因相往來而善長弟存義子佑惟庸從女壻也十三年惟庸謀反伏誅坐黨死者甚衆善長如故御史臺缺中丞以善長理臺事數有所建白十八年有人告存義父子實惟庸黨者詔免死安置崇明善長不謝帝銜之又五年善長年已七十有七耄不檢下嘗欲營第從信國公湯和假衛卒三百人和密以聞四月京民坐罪應徙邊者善長數請免其私親丁斌等帝怒按斌斌故給事惟庸家因言存義等往時交通惟庸狀命逮存義父子鞫之詞連善長云惟庸有反謀使存義陰説善長善長驚叱曰爾言何為者審爾九族皆滅已又使善長故人楊文裕説之云事成當以淮西地封為王善長驚不許然頗心動惟庸乃自往説善長猶不許居久之惟庸復遣存義進説善長歎曰吾老矣吾死汝等自為之或又告善長云將軍藍玉出塞至捕魚兒海獲惟庸通沙漠使者封績善長匿不以聞於是御史交章劾善長而善長奴盧仲謙等亦告善長與惟庸通賂遺交私語獄具謂善長元勳國戚知逆謀不發舉狐疑觀望懷兩端大逆不道會有言星變其占當移大臣遂並其妻女弟姪家口七十餘人誅之而吉安侯陸仲亨延安侯唐勝宗平涼侯費聚南雄侯趙庸滎陽侯鄭遇春宜春侯黃彬河南侯陸聚等皆同時坐惟庸黨死而已故營陽侯楊璟濟寧侯顧時等追坐者又若干人帝手詔條列其罪傅著獄辭為昭示姦黨三録布告天下善長子祺與主徙江浦久之卒祺子芳茂以公主恩得不坐芳為留守中衛指揮茂為旗手衛鎮撫罷世襲善長死之明年虞部郎中王國用上言善長與陛下同心出萬死以取天下勳臣第一生封公死封王男尚公主親戚拜官人臣之分極矣藉令欲自圖不軌尚未可知而今謂其欲佐胡惟庸者則大謬不然人情愛其子必甚於兄弟之子安享萬全之富貴者必不僥幸萬一之富貴善長與惟庸猶子之親耳於陛下則親子女也使善長佐惟庸成不過勳臣第一而已矣太師國公封王而已矣尚主納妃而已矣寧復有加於今日且善長豈不知天下之不可幸取當元之季欲為此者何限莫不身為齏粉覆宗絶祀能保首領者幾何人哉善長胡乃身見之而以衰倦之年身蹈之也凡為此者必有深讐激變大不得已父子之間或至相挾以求脫禍今善長之子祺備陛下骨肉親無纖芥嫌何苦而忽為此若謂天象告變大臣當災殺之以應天象則尤不可臣恐天下聞之謂功如善長且如此四方因之解體也今善長已死言之無益所願陛下作戒將來耳太祖得書竟亦不罪也汪廣洋字朝宗高郵人流寓太平太祖渡江召為元帥府令史江南行省提控置正軍都諫司擢諫官遷行省都事纍進中書右司郎中尋知驍騎衛事參常遇春軍務下贛州遂居守拜江西參政洪武元年山東平以廣洋廉明持重命理行省撫納新附民甚安之是年召入為中書省參政明年出參政陝西三年李善長病中書無官召廣洋為左丞時右丞楊憲專決事廣洋依違之猶為所忌嗾御史劾廣洋奉母無狀帝切責放還鄉憲再奏徙海南憲誅召還其冬封忠勤伯食祿三百六十石誥詞稱其剸繁治劇屢獻忠謀比之子房孔明及善長以病去位遂以廣洋為右丞相參政胡惟庸為左丞廣洋無所建白久之左遷廣東行省參政而帝心終善廣洋復召為左御史大夫十年復拜右丞相廣洋頗耽酒與惟庸同相浮沉守位而已帝數誡諭之十二年十二月中丞塗節言劉基為惟庸毒死廣洋宜知狀帝問之對曰無有帝怒責廣洋朋欺貶廣南舟次太平帝追怒其在江西曲庇文正在中書不發楊憲姦賜敕誅之廣洋少師余闕淹通經史善篆隸工為歌詩為人寬和自守與姦人同位而不能去故及於禍贊曰明初設中書省置左右丞相管領樞要率以勳臣領其事然徐達李文忠等數受命征討未嘗專理省事其從容丞弼之任者李善長汪廣洋胡惟庸三人而已惟庸敗後丞相之官遂廢不設故終明之世惟善長廣洋得稱丞相獨惜善長以布衣徒步能擇主於草昧之初委身勠力贊成鴻業遂得剖符開國列爵上公乃至富極貴溢於衰暮之年自取覆滅廣洋謹厚自守亦不能發姦遠禍俱致重譴不亦大負爰立之初心而有愧置諸左右之職業也夫
