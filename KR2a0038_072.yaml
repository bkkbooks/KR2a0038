body:
  text: 明史卷七十二志第四十八職官一明官制沿漢唐之舊而損益之自洪武十三年罷丞相不設析中書省之政歸六部以尚書任天下事侍郎二之而殿閣大學士祇備顧問帝方自操威柄學士鮮所參決其糾劾則責之都察院章奏則達之通政司平反則參之大理寺是亦漢九卿之遺意也分大都督府為五而征調隸於兵部外設都布按三司分隸兵刑錢穀其考核則聽於府部是時吏戶兵三部之權為重逮仁宣朝大學士以太子經師恩纍加至三孤望益尊而宣宗內柄無大小悉下大學士楊士奇等參可否雖吏部蹇義戶部夏原吉時召見得預各部事然希濶不敵士奇等親自是內閣權日重即有一二吏兵之長與執持是非輒以敗至世宗中葉夏言嚴嵩迭用事遂赫然為真宰相壓制六卿矣然內閣之擬票不得不決於內監之批紅而相權轉歸之寺人於是朝廷之紀綱賢士大夫之進退悉顛倒於其手伴食者承意指之不暇間有賢輔卒蒿目而不能救初領五都督府者皆元勳宿將軍制肅然永樂間設內監監其事猶不敢縱沿習數代勳戚紈袴司軍紀日以惰毀既而內監添置益多邊塞皆有巡視四方大征伐皆有監軍而疆事遂致大壞明祚不可支矣迹其興亡治亂之由豈不在用人之得失哉至於設官分職體統相維品式具備詳列後簡覽者可考而知也宗人府三公三孤太子三師三少內閣吏部戶部附總督倉場禮部兵部附協理京營戎政刑部工部附提督易州山廠宗人府宗人令一人左右宗正各一人左右宗人各一人並正一品掌皇九族之屬籍以時修其玉牒書宗室子女適庶名封嗣襲生卒婚嫁諡葬之事凡宗室陳請為聞於上達材能録罪過初洪武三年置大宗正院二十二年改為宗人府並以親王領之秦王樉為令晉王棡燕王棣為左右宗正周王橚楚王楨為左右宗人其後以勳戚大臣攝府事不備官而所領亦盡移之禮部其屬經歷司經歷一人正五品典出納文移太師太傅太保為三公正一品少師少傅少保為三孤從一品掌佐天子理陰陽經邦弘化其職至重無定員無專授洪武三年授李善長太師徐達太傅先是常遇春已贈太保三孤無兼領者建文永樂間罷公孤官仁宗復設永樂二十二年八月復置三公三少宣德三年敕太師英國公張輔少師吏部尚書蹇義少傅兵部尚書華蓋殿大學士楊士奇少保兼太子少傅戶部尚書夏原吉各輟所領侍左右咨訪政事公孤之官幾於專授逮義原吉卒士奇還領閣務自此以後公孤但虛銜為勳戚文武大臣加官贈官而文臣無生加三公者惟贈乃得之嘉靖二年加楊廷和太傅辭不受其後文臣得加三公惟張居正萬曆九年加太傅十年加太師太子太師太子太傅太子太保並從一品掌以道德輔導太子而謹護翼之太子少師太子少傅太子少保並正二品掌奉太子以觀三公之道德而教諭焉太子賓客正三品掌侍太子贊相禮儀規誨過失皆東宮大臣無定員無專授洪武元年太祖有事親征慮太子監國別設宮僚或生嫌隙乃以朝臣兼宮職李善長兼太子少師徐達兼太子少傅常遇春兼太子少保治書侍御史文原吉范顯祖兼太子賓客三年禮部尚書陶凱請選人專任東宮官罷兼領庶於輔導有所責成帝諭以江充之事可為明鑑立法兼領非無謂也由是東宮師傅止為兼官加官及贈官惟永樂間成祖幸北京以姚廣孝專為太子少師留輔太子自是以後終明世皆為虛銜於太子輔導之職無與也中極殿大學士舊名華蓋殿建極殿大學士舊名謹身殿文華殿大學士武英殿大學士文淵閣大學士東閣大學士並正五品掌獻替可否奉陳規誨點檢題奏票擬批答以平允庶政凡上之達下曰詔曰誥曰制曰册文曰諭曰書曰符曰令曰檄皆起草進畫以下之諸司下之達上曰題曰奏曰表曰講章曰書狀曰文册曰揭帖曰制對曰露布曰譯皆審署申覆而修畫焉平允乃行之凡車駕郊祀巡幸則扈從御經筵則知經筵或同知經筵事東宮出閣講讀則領其事其官而授之職業冠婚則充賓贊及納徵等使修實録史志諸書則充總裁官春秋上丁釋奠先師則攝行祭事會試充考試官殿試充讀卷官進士題名則大學士一人撰文立石於太學大典禮大政事九卿科道官會議已定則按典制相機宜裁量其可否斟酌入告頒詔則捧授禮部會敕則稽其由狀以請宗室請名請封諸臣請諡並擬上以其授餐大內常侍天子殿閣之下避宰相之名又名內閣先是太祖承前制設中書省置左右丞相正一品甲辰正月初置左右相國以李善長為右相國徐達為左相國吳元年命百官禮儀俱尚左改右相國為左相國左相國為右相國洪武元年改為左右丞相平章政事從一品左右丞正二品參知政事從二品以統領衆職置屬官左右司郎中正五品員外郎正六品都事檢校正七品照磨管勾從七品參議府參議正三品參軍斷事官從三品斷事經歷正七品知事正八品都鎮撫司都鎮撫正五品考功所考功郎正七品甲辰十月以都鎮撫司隸大都督府吳元年革參議府洪武元年革考功所二年革照磨檢校所斷事官七年設直省舍人十人尋改中書舍人洪武九年汰平章政事參知政事十三年正月誅丞相胡惟庸遂罷中書省其官屬盡革惟存中書舍人九月置四輔官以儒士王本等為之置四輔官告太廟以王本杜祐龔斆為春官杜斆趙民望吳源為夏官兼太子賓客秋冬官缺以本等攝之一月內分司上中下三旬位列公侯都督之次尋亦罷十五年倣宋制置華蓋殿武英殿文淵閣東閣諸大學士禮部尚書邵質為華蓋檢討吳伯宗為武英翰林學士宋訥為文淵典籍吳沉為東閣又置文華殿大學士徵耆儒鮑恂余詮張長年等為之以輔導太子秩皆正五品二十八年敕諭羣臣國家罷丞相設府部院寺以分理庶務立法至為詳善以後嗣君其毋得議置丞相臣下有奏請設立者論以極刑當是時以翰林春坊詳看諸司奏啓兼司平駁大學士特侍左右備顧問而已建文中改大學士為學士悉罷諸大學士各設學士一人又改謹身殿為正心殿設正心殿學士成祖即位特簡解縉胡廣楊榮等直文淵閣參預機務閣臣之預務自此始然其時入內閣者皆編檢講讀之官不置官屬不得專制諸司諸司奏事亦不得相關白仁宗以楊士奇楊榮東宮舊臣升士奇為禮部侍郎兼華蓋殿大學士榮為太常卿兼謹身殿大學士謹身殿大學士仁宗始置閣職漸崇其後士奇榮等皆遷尚書職雖居內閣官必以尚書為尊景泰中王文始以左都御史進吏部尚書入內閣自後誥敕房制敕房俱設中書舍人六部承奉意旨靡所不領而閣權益重世宗時三殿成改華蓋為中極謹身為建極閣銜因之嘉靖以後朝位班次俱列六部之上吏部尚書一人正二品左右侍郎各一人正三品其屬司務廳司務二人從九品文選驗封稽勳考功四清吏司各郎中一人正五品員外郎一人從五品主事一人正六品洪武三十一年增設文選司主事一人正統十一年增設考功司主事一人尚書掌天下官吏選授封勳考課之政令以甄別人才贊天子治蓋古冢宰之職視五部為特重侍郎為之二司務掌催督稽緩勾銷簿書明初設主事司務各四人為首領官有主事印洪武二十九年改主事為司官裁司務二人各部並同文選掌官吏班秩遷升改調之事以贊尚書凡文官之品九品有正從為級一十八不及九品曰未入流凡選每歲有大選有急選有遠方選有歲貢就教選間有揀選有舉人乞恩選選人咸登資簿釐其流品平其銓注而序遷之凡升必考滿若員缺當補不待考滿曰推升類推上一人單推上二人三品以上九卿及僉都御史祭酒廷推上二人或三人內閣吏兵二部尚書廷推上二人凡王官不外調王姻不內除大臣之族不得任科道僚屬同族則以下避上外官才地不相宜則酌其繁簡互換之有傳升乞升者並得執奏以署職試職實授奠年資以開設裁併兼攝適繁簡以薦舉起廢徵召振幽滯以帶俸添注寄恩冗以降調除名馭罪過以官程督吏治以寧假悉人情驗封掌封爵襲廕褒贈吏算之事以贊尚書凡爵非社稷軍功不得封封號非特旨不得與或世或不世皆給誥券衍聖公及戚里恩澤封不給券凡券左右各一左藏內府右給功臣之家襲封則徵其誥券稽其功過核其宗支以第其世流降除之等土官則勘其應襲與否移文選司注擬宣慰宣撫安撫長官諸司領土兵者則隸兵部凡廕明初自一品至七品皆得廕一子以世其祿洪武十六年定職官子孫廕正一品子正五品用從一品子從五品用正二品子正六品用從二品子從六品用正三品子正七品用從三品子從七品用正四品子正八品用從四品子從八品用正五品子正九品用從五品子從九品用正六品子於未入流上等職內用從六品子於未入流中等職內用正從七品子於未入流下等職內用後乃漸為限制京官三品以上考滿著績始廕一子曰官生其出自特恩者曰恩生凡封贈公侯伯之追封皆遞進一等三品以上政績顯異及死諫死節陳亡者皆得贈官其見任則初授散階京官滿一考及外官滿一考而以最聞者皆給本身誥敕七品以上皆得推恩其先五品以上授誥命六品以下授敕命一品三代四軸二品三品二代三軸四品五品六品七品一代二軸八品以下流內官本身一軸一品軸以玉二品軸以犀三品四品軸以鋈金五品以下軸以角曾祖祖父皆如其子孫官公侯伯視一品外內命婦視夫若子之品生曰封死曰贈若先有罪譴則停給文之散階四十有二以歷考為差正一品初授特進榮祿大夫升授特進光祿大夫從一品初授榮祿大夫升授光祿大夫正二品初授資善大夫升授資政大夫加授資德大夫從二品初授中奉大夫升授通奉大夫加授正奉大夫正三品初授嘉議大夫升授通議大夫加授正議大夫從三品初授亞中大夫升授中大夫加授大中大夫正四品初授中順大夫升授中憲大夫加授中議大夫從四品初授朝列大夫升授朝議大夫加授朝請大夫正五品初授奉議大夫升授奉政大夫從五品初授奉訓大夫升授奉直大夫正六品初授承直郎升授承德郎從六品初授承務郎升授儒林郎吏材幹出身授宣德郎正七品初授承事郎升授文林郎吏材幹授宣議郎從七品初授從仕郎升授徵仕郎正八品初授功郎升授修職郎從八品初授功佐郎升授修職佐郎正九品初授將仕郎升授登仕郎從九品初授將仕佐郎升授登仕佐郎外命婦之號九公曰某國夫人侯曰某侯夫人伯曰某伯夫人一品曰夫人後稱一品夫人二品曰夫人三品曰淑人四品曰恭人五品曰宜人六品曰安人七品曰孺人因其子孫封者加太字夫在則否凡封贈之次七品至六品一次五品一次初制有四品一次後省三品二品一品各一次三母不並封兩封從優品父職高於子則進一階父應停給及子為人後者皆得移封嫡在不封生母生母未封不先封其妻妻之封止於一嫡一繼其封贈後而以墨敗者則追奪稽勳掌勳級名籍喪養之事以贊尚書凡文勳十正一品左右柱國從一品柱國正二品正治上卿從二品正治卿正三品資治尹從三品資治少尹正四品贊治尹從四品贊治少尹正五品修正庶尹從五品協正庶尹自五品以上歷再考乃授勳凡百官遷除降調皆開寫年甲鄉貫出身每歲十二月貼黃春秋清黃皆赴內府有故揭而去之凡父母年七十無兄弟得歸養凡三年喪解職守制糾擲其奪喪匿喪短喪者惟欽天監官奔喪三月復任考功掌官吏考課黜陟之事以贊尚書凡內外官給由三年初考六年再考並引請九年通考奏請綜其稱職平常不稱職而陟黜之陟無過二等降無過三等其甚者