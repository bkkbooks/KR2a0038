body:
  text: 明史卷七十八志第五十四食貨二賦役賦役之法唐租庸調猶為近古自楊炎作兩稅法簡而易行歷代相沿至明不改太祖為吳王賦稅十取一役法計田出夫縣上中下三等以賦十萬六萬三萬石下為差府三等以賦二十萬上下十萬石下為差即位之初定賦役法一以黃冊為準冊有丁有田丁有役田有租租曰夏稅曰秋糧凡二等夏稅無過八月秋糧無過明年二月丁曰成丁曰未成丁凡二等民始生籍其名曰不成丁年十六曰成丁成丁而役六十而免又有職役優免者役曰里甲曰均徭曰雜泛凡三等以戶計曰甲役以丁計曰徭役上命非時曰雜役皆有力役有雇役府州縣驗冊丁口多寡事産厚薄以均適其力兩稅洪武時夏稅曰米麥曰錢鈔曰絹秋糧曰米曰錢鈔曰絹弘治時會計之數夏稅曰大小米麥曰麥荍曰絲綿並荒絲曰稅絲曰絲綿折絹曰稅絲折絹曰本色絲曰農桑絲折絹曰農桑零絲曰人丁絲折絹曰改科絹曰棉花折布曰苧布曰土苧曰紅花曰麻布曰鈔曰租鈔曰稅鈔曰原額小絹曰幣帛絹曰本色絹曰絹曰折色絲秋糧曰米曰租鈔曰賃鈔曰山租鈔曰租絲曰租絹曰租粗麻布曰課程棉布曰租苧布曰牛租米穀曰地畝棉花絨曰棗子易米曰棗株課米曰課程苧麻折米曰棉布曰魚課米曰改科絲折米萬曆時小有所增損大略以米麥為主而絲絹與鈔次之夏稅之米惟江西湖廣廣東廣西麥荍惟貴州農桑絲遍天下惟不及川廣雲貴餘各視其地産太祖初立國即下令凡民田五畝至十畝者栽桑麻木棉各半畝十畝以上倍之麻畝徵八兩木棉畝四兩栽桑以四年起科不種桑出絹一匹不種麻及木棉出麻布棉布各一匹此農桑絲絹所由起也洪武九年天下稅糧令民以銀鈔錢絹代輸銀一兩錢千文鈔一貫皆折輸米一石小麥則減直十之二棉苧一匹折米六斗麥七斗麻布一匹折米四斗麥五斗絲絹等各以輕重為損益願入粟者聽十七年雲南以金銀貝布漆丹砂水銀代秋租於是謂米麥為本色而諸折納稅糧者謂之折色越二年又令戶部侍郎楊靖會計天下倉儲存糧二年外並收折色惟北方諸布政司需糧餉邊仍使輸粟三十年諭戶部曰行人高稹言陝西困逋賦其議自二十八年以前天下逋租咸許任土所産折收布絹棉花及金銀等物著為令於是戶部定鈔一錠折米一石金一兩十石銀一兩二石絹一匹石有二斗棉布一匹一石苧布一匹七斗棉花一斤二斗帝曰折收逋賦蓋欲蘇民困也今賦重若此將愈困民豈恤之之意哉金銀每兩折米加一倍鈔止二貫五百文折一石餘從所議永樂中既得交址以絹漆蘇木翠羽紙扇沉速安息諸香代租賦廣東瓊州黎人肇慶瑤人內附輸賦比內地天下本色稅糧三千餘萬石絲鈔等二千餘萬計是時宇內富庶賦入盈羡米粟自輸京師數百萬石外府縣倉廩蓄積甚豐至紅腐不可食歲歉有司往往先發粟振貸然後以聞雖歲貢銀三十萬兩有奇而民間交易用銀仍有厲禁至正統元年副都御史周銓言行在各衛官俸支米南京道遠費多輒以米易貨貴買賤售十不及一朝廷虛糜廩祿各官不得實惠請於南畿浙江江西湖廣不通舟楫地折收布絹白金解京充俸江西巡撫趙新亦以為言戶部尚書黃福復條以請帝以問行在戶部尚書胡濙濙對以太祖嘗折納稅糧於陝西浙江民以為便遂倣其制米麥一石折銀二錢五分南畿浙江江西湖廣福建廣東廣西米麥共四百餘萬石折銀百萬餘兩入內承運庫謂之金花銀其後概行於天下自起運兌軍外糧四石收銀一兩解京以為永例諸方賦入折銀而倉廩之積漸少矣初太祖定天下官民田賦凡官田畝稅五升三合五勺民田減二升重租田八升五合五勺沒官田一斗二升惟蘇松嘉湖怒其為張士誠守乃籍諸豪族及富民田以為官田按私租簿為稅額而司農卿楊憲又以浙西地膏腴增其賦畝加二倍故浙西官民田視他方倍蓗畝稅有二三石者大抵蘇最重松嘉湖次之常杭又次之洪武十三年命戶部裁其額畝科七斗五升至四斗四升者減十之二四斗三升至三斗六升者俱止徵三斗五升其以下者仍舊時蘇州一府秋糧二百七十四萬六千餘石自民糧十五萬石外皆官田糧官糧歲額與浙江通省埒其重猶如此建文二年詔曰江浙賦獨重而蘇松準私租起科特以懲一時頑民豈可為定則以重困一方宜悉與減免畝不得過一斗成祖盡革建文政浙西之賦復重宣宗即位廣西布政使周幹巡視蘇常嘉湖諸府還言諸府民多逃亡詢之耆老皆云重賦所致如吳江崑山民田租舊畝五升小民佃種富民田畝輸私租一石後因事故入官輒如私租例盡取之十分取八民猶不堪況盡取乎盡取則民必凍餒欲不逃亡不可得也仁和海寧崑山海水陷官民田千九百餘頃逮今十有餘年猶徵其租田沒於海租從何出請將沒官田及公侯還官田租俱視彼處官田起科畝稅六斗海水淪陷田悉除其稅則田無荒蕪之患而細民獲安生矣帝命部議行之宣德五年二月詔舊額官田租畝一斗至四斗者各減十之二四斗一升至一石以上者減十之三著為令於是江南巡撫周忱與蘇州知府況鍾曲計減蘇糧七十餘萬他府以為差而東南民力少紓矣忱又令松江官田依民田起科戶部劾以變亂成法宣宗雖不罪亦不能從而朝廷數下詔書蠲除租賦持籌者輒私戒有司勿以詔書為辭帝與尚書胡濙言計臣壅遏膏澤然不深罪也正統元年令蘇松浙江等處官田準民田起科秋糧四斗一升至二石以上者減作三斗二斗一升以上至四斗者減作二斗一斗一升至二斗者減作一斗蓋宣德末蘇州逋糧至七百九十萬石民困極矣至是乃獲少蘇英宗復辟之初令鎮守浙江尚書孫原貞等定杭嘉湖則例以起科重者徵米宜少起科輕者徵米宜多乃定官田畝科一石以下民田七斗以下者每石歲徵平米一石三斗官民田四斗以下者每石歲徵平米一石五斗官田二斗以下民田二斗七升以下者每石歲徵平米一石七斗官田八升以下民田七升以下者每石歲徵平米二石二斗凡重者輕之輕者重之欲使科則適均而畝科一石之稅未嘗減云嘉靖二年御史黎貫言國初夏秋二稅麥四百七十餘萬石今少九萬米二千四百七十餘萬石今少二百五十餘萬而宗室之蕃官吏之冗內官之衆軍士之增悉取給其中賦入則日損支費則日加請核祖宗賦額及經費多寡之數一一區畫則知賦入有限而浮費不容不節矣於是戶部議令天下官吏考滿遷秩必嚴核任內租稅徵解足數方許給由交代仍乞朝廷躬行節儉以先天下帝納之既而諭德顧鼎臣條上錢糧積弊四事一曰察理田糧舊額請責州縣官於農隙時令里甲等倣洪武正統間魚鱗風旗之式編造圖冊細列元額田糧字墟則號條段坍荒成熟步口數目官為覆勘分別界址履畝檢踏丈量具開墾改正豁除之數刊刻成書收貯官庫給散里中永為稽考仍斟酌先年巡撫周忱王恕簡便可行事例立為定規取每歲實徵起運存留加耗本色折色並處補暫徵帶徵停徵等件數目會計已定張榜曉諭庶吏胥不得售其奸欺而小民免賠纍科擾之患一曰催徵歲辦錢糧成弘以前里甲催徵糧戶上納糧長收解州縣監收糧長不敢多收斛面糧戶不敢攙雜水穀糠粃兌糧官軍不敢阻難多索公私兩便近者有司不復比較經催里甲負糧人戶但立限敲撲糧長令下鄉追徵豪強者則大斛倍收多方索取所至雞犬為空孱弱者為勢豪所凌耽延欺賴不免變産補納至或舊役侵缺責償新僉一人逋負株連親屬無辜之民死於箠楚囹圄者幾數百人且往時每區糧長不過正副二名近多至十人以上其實收掌管糧之數少而科斂打點使用年例之數多州縣一年之間輒破中人百家之産害莫大焉宜令戶部議定事例轉行所司審編糧長務遵舊規如州縣官多僉糧長縱容下鄉及不委里甲催辦輒酷刑限比糧長者罪之致人命多死者以故勘論其二則議遣官綜理及復預備倉糧也疏下戶部言所陳俱切時弊令所司舉行遷延數載如故糧長者太祖時令田多者為之督其鄉賦稅歲七月州縣委官偕詣京領勘合以行糧萬石長副各一人輸以時至得召見語合輒蒙擢用末年更定每區正副二名輪充宣德間復永充科斂橫溢民受其害或私賣官糧以牟利其罷者虧損公賦事覺至隕身喪家景泰中革糧長未幾又復自官軍兌運糧長不復輸京師在州里間頗滋害故鼎臣及之未幾御史郭弘化等亦請通行丈量以杜包賠兼並之弊帝恐紛擾不從給事中徐俊民言今之田賦有受地於官歲供租稅者謂之官田有江水泛溢溝塍淹沒者謂之坍江有流移亡絶田棄糧存者謂之事故官田貧民佃種畝入租三斗或五六斗或石以上者有之坍江事故虛糧里甲賠納或數十石或百餘石者有之夫民田之價十倍官田貧民既不能置而官田糧重每病取盈益以坍江事故虛糧又令攤納追呼敲撲歲無寧日而奸富猾胥方且詭寄那移並輕分重此小民疾苦閭閻凋瘁所以日益而日增也請定均糧限田之制坍江事故悉與蠲免而合官民田為一定上中下三則起科以均糧富人不得過千畝聽以百畝自給其羡者則加輸邊稅如此則多寡有節輕重適宜貧富相安公私俱足矣部議疆土民俗各異令所司熟計其便不行越數年乃從應天巡撫侯位奏免蘇州坍海田糧九萬餘石然那移飛灑之弊相沿不改至十八年鼎臣為大學士復言蘇松常鎮嘉湖杭七府供輸甲天下而里胥豪右𢀿弊特甚宜將欺隱及坍荒田土一一檢核改正於是應天巡撫歐陽鐸檢荒田四千餘頃計租十一萬石有奇以所欺隱田糧六萬餘石補之餘請豁免戶部終持不下時嘉興知府趙瀛建議田不分官民稅不分等則一切以三斗起徵鐸乃與蘇州知府王儀盡括官民田裒益之履畝清丈定為等則所造經賦冊以八事定稅糧曰元額稽始曰事故除虛曰分項別異曰歸總正實曰坐派起運曰運餘撥存曰存餘考積曰徵一定額又以八事考里甲曰丁田曰慶賀曰祭祀曰鄉飲曰科賀曰恤政曰公費曰備用以三事定均徭曰銀差曰力差曰馬差著為例徵一者總徵銀米之凡而計畝均輸之其科則最重與最輕者稍以耗損益推移重者不能盡損惟遞減耗米派輕賫折除之陰豫以輕輕者不能加益為徵本色遞增耗米加乘之陰豫以重推收之法以田為母戶為子時豪右多梗其議鼎臣獨以為善曰是法行吾家益千石輸然貧民減千石矣不可易也顧其時上不能損賦額長民者私以己意變通由是官田不至偏重而民田之賦反加矣時又有綱銀一串鈴諸法綱銀者舉民間應役歲費丁四糧六總徵之易知而不繁猶網之有綱也一串鈴則夥收分解法也自是民間輸納止收本色及折色銀矣是時天下財賦歲入太倉庫者二百萬兩有奇舊制以七分經費而存積三分備兵歉以為常世宗中年邊供費繁加以土木禱祀月無虛日帑藏匱竭司農百計生財甚至變賣寺田收贖軍罪猶不能給二十九年俺答犯京師增兵設戍餉額過倍三十年京邊歲用至五百九十五萬戶部尚書孫應奎蒿目無策乃議於南畿浙江等州縣增賦百二十萬加派於是始嗣後京邊歲用多者過五百萬少者亦三百餘萬歲入不能充歲出之半由是度支為一切之法其箕斂財賄題增派括贓贖算稅契折民壯提編均徭推廣事例興焉其初亦賴以濟匱久之諸所灌輸益少又四方多事有司往往為其地奏留或請免浙直以備倭川貴以採木山陝宣大以兵荒不惟停格軍興所徵發即歲額二百萬且虧其三之一而內廷之賞給齊殿之經營宮中夜半出片紙吏雖急無敢延頃刻者三十七年大同右衛告警賦入太倉者僅七萬帑儲大較不及十萬戶部尚書方鈍等憂懼不知所出乃乘間具陳帑藏空虛狀因條上便宜七事以請既又令羣臣各條理財之策議行者凡二十九事益瑣屑非國體而纍年以前積逋無不追徵南方本色逋賦亦皆追徵折色矣是時東南被倭南畿浙閩多額外提編江南至四十萬提編者加派之名也其法以銀力差排編十甲如一甲不足則提下甲補之故謂之提編及倭患平應天巡撫周如斗乞減加派給事中何煃亦具陳南畿困敝言軍門養兵工部料價操江募兵兵備道壯丁府州縣鄉兵率為民纍甚者指一科十請禁革之命如煃議而提編之額不能減隆萬之世增額既如故又多無藝之征逋糧愈多規避亦益巧已解而愆限或至十餘年未徵而報收一縣有至十萬者逋缺之多縣各數十萬賴行一條鞭法無他科擾民力不大絀一條鞭法者總括一州縣之賦役量地計丁丁糧畢輸於官一歲之役官為僉募力差則計其工食之費量為增減銀差則計其交納之費加以增耗凡額辦派辦京庫歲需與存留供億諸費以及土貢方物悉併為一條皆計畝徵銀折辦於官故謂之一條鞭立法頗為簡便嘉靖間數行數止至萬曆九年乃盡行之其後接踵三大征頗有加派事畢旋已至四十六年驟增遼餉三百萬時內帑充積帝靳不肯發戶部尚書李汝華乃援征倭播例畝加三釐五毫天下之賦增二百萬有奇明年復加三釐五毫明年以兵工二部請復加二釐通前後九釐增賦五百二十萬遂為歲額所不加者畿內八府及貴州而已天啓元年給事中甄淑言遼餉加派易致不均蓋天下戶口有戶口之銀人丁有人丁之銀田土有田土之銀有司徵收總曰銀額按銀加派則其數不漏東西南北之民甘苦不同布帛粟米力役之法徵納不同惟守令自知其甘苦而通融其徵納今因人土之宜則無偏枯之纍其法以銀額為主而通人情酌土俗頒示直省每歲存留起解各項銀兩之數以所加餉額按銀數分派總提折扣裒多益寡期不失餉額而止如此則愚民易知可杜奸胥意為增減之弊且小民所最苦者無田之糧無米之丁田鬻富室産去糧存而猶輸丁賦宜取額丁額米兩衡而定其數米若干即帶丁若干買田者收米便收丁則縣冊不失丁額貧民不致賠纍而有司亦免逋賦之患下部覆議從之崇禎三年軍興兵部尚書梁廷棟請增田賦戶部尚書畢自嚴不能止乃於九釐外畝復徵三釐惟順天永平以新被兵無所加餘六府畝徵六釐得他省之半共增賦百六十五萬四千有奇後五年總督盧象升請加宦戶田賦十之一民糧十兩以上同之既而概徵每兩一錢名曰助餉越二年復行均輸法因糧輸餉畝計米六合石折銀八錢又畝加徵一分四釐九絲越二年楊嗣昌督師畝加練餉銀一分兵部郎張若麒請收兵殘遺産為官莊分上中下畝納租八斗至二三斗有差御史衛周胤言嗣昌流毒天下剿練之餉多至七百萬民怨何極御史郝晉亦言萬曆末年合九邊餉止二百八十萬今加派遼餉至九百萬剿餉三百三十萬業已停罷旋加練餉七百三十餘萬自古有一年而括二千萬以輸京師又括京師二千萬以輸邊者乎疏語雖切直而時事危急不能從也役法定於洪武元年田一頃出丁夫一人不及頃者以他田足之名曰均工夫尋編應天十八府州江西九江饒州南康三府均工夫圖冊每歲農隙赴京供役三十日遣歸田多丁少者以佃人充夫而田主出米一石資其用非佃人而計畝出夫者畝資米二升五合逮造黃冊成以一百十戶為一里里分十甲曰里甲以上中下戶為三等五歲均役十歲一更造一歲中諸色雜目應役者編第均之銀力從所便曰均徭他雜役曰雜泛凡祗應禁子弓兵悉僉市民毋役糧戶額外科一錢役一夫者罪流徙後法稍弛編徭役里甲者以戶為斷放大戶而勾單小於是議者言均徭之法按冊籍丁糧以資産為宗核人戶上下以蓄藏得實也稽冊籍則富商大賈免役而土著困核人戶則官吏里胥輕重其手而小民益窮蹙二者交病然專論丁糧庶幾古人租庸調之意乃令以舊編力差銀差之數當丁糧之數難易輕重酌其中役以應差里甲除當復者論丁糧多少編次先後曰鼠尾冊按而徵之市民商賈家殷足而無田産者聽自占以佐銀差正統初僉事夏時創行於江西他省倣行之役以稍平其後諸上供者官為支解而官府公私所須復給所輸銀於坊里長責其營辦給不能一二供者或什伯甚至無所給惟計值年里甲祗應夫馬飲食而里甲病矣凡均徭解戶上供為京徭主納為中官留難不易中納往復改貿率至傾産其他役苛索之弊不可毛舉明初令天下貢土所有有常額珍奇玩好不與即須用編之里甲出銀以市顧其目冗碎奸黠者緣為利孔又大工營繕祠官祝釐資用繁溢逮至中葉倭寇交訌仍歲河決國用耗殫於是里甲均徭浮於歲額矣凡役民自里甲正辦外如糧長解戶馬船頭館夫祗候弓兵皂隸門禁廚斗為常役後又有斫薪撎柴修河修倉運料接遞站鋪閘淺夫之類因事編僉歲有增益嘉隆後行一條鞭法通計一省丁糧均派一省徭役於是均徭里甲與兩稅為一小民得無擾而事亦易集然糧長里長名罷實存諸役卒至復僉農氓條鞭法行十餘年規制頓紊不能盡遵也天啓時御史李應升疏陳十害其三條切言馬夫河役糧甲修辦白役擾民之弊崇禎三年河南巡撫范景文言民所患苦莫如差役錢糧有收戶解戶驛遞有馬戶供應有行戶皆僉有力之家充之名曰大戶究之所僉非富民中人之産輒為之傾自變為條鞭法以境內之役均於境內之糧宜少蘇矣乃民間仍歲奔走罄資津貼是條鞭行而大戶未嘗革也時給事中劉懋復奏裁驛夫征調往來仍責編戶驛夫無所得食至相率從流賊為亂云凡軍匠竈戶役皆永充軍戶死若逃者於原籍勾補匠戶二等曰住坐曰輪班住坐之匠月上工十日不赴班者輸罰班銀月六錢故謂之輸班監局中官多占匠役又括充幼匠動以千計死若逃者勾補如軍竈戶有上中下三等每一正丁貼以餘丁上中戶丁力多或貼二三丁下戶概豫優免他如陵戶園戶海戶廟戶幡夫庫役瑣末不可勝計明初工役之繁自營建兩京宗廟宮殿闕門王邸採木陶甓工匠造作以萬萬計所在築城濬陂百役具舉迄於洪宣郊壇倉庾猶未迄工正統天順之際三殿兩宮南內離宮次第興建弘治時大學士劉吉言近年工役俱摘發京營軍士內外軍官禁不得估工用大小多寡本用五千人奏請至一二萬無所稽核禮部尚書倪嶽言諸役費動以數十萬計水旱相仍乞少停止南京禮部尚書童軒復陳工役之苦吏部尚書林瀚亦言兩畿頻年凶災困於百役窮愁怨嘆山陝供億軍興雲南廣東西征發剿叛山東河南湖廣四川江西興造王邸財力不贍浙江福建辦物料視舊日增多庫藏空匱不可不慮帝皆納其言然不能盡從也武宗時乾清宮役尤大以太素殿初制朴儉改作雕峻用銀至二千萬餘兩役工匠三千餘人歲支工食米萬三千餘石又修凝翠昭和崇智光霽諸殿御馬監鐘鼓司南城豹房新房火藥庫皆鼎新之權幸閹宦莊園祠墓香火寺觀工部復竊官銀以媚焉給事中張原言工匠養父母妻子尺籍之兵禦外侮京營之軍衛王室今奈何令民無所賴兵不麗伍利歸私門怨叢公室乎疏入謫貴州新添驛丞世宗營建最繁十五年以前名為汰省而經費已六七百萬其後增十數倍齊宮祕殿並時而興工場二三十處役匠數萬人軍稱之歲費二三百萬其時宗廟萬壽宮災帝不之省營繕益急經費不敷乃令臣民獻助獻助不已復行開納勞民耗財視武宗過之萬曆以後營建織造溢經制數倍加以征調開採民不得少休逮閹人亂政建第營墳僭越亡等功德私祠遍天下蓋二百餘年民力殫殘久矣其以職役優免者少者一二丁多者至十六丁萬曆時免田有至二三千者至若賦稅蠲免有恩蠲有災蠲太祖之訓凡四方水旱輒免稅豐歲無災傷亦擇地瘠民貧者優免之凡歲災盡蠲二稅且貸以米甚者賜米布若鈔又設預備倉令老人運鈔易米以儲粟荊蘄水災命戶部主事趙乾往振遷延半載怒而誅之青州旱蝗有司不以聞逮治其官吏旱傷州縣有司不奏許耆民申訴處以極刑孝感饑其令請以預備倉振貸帝命行人馳驛往且諭戶部自今凡歲饑先發倉庾以貸然後聞著為令在位三十餘年賜豫布鈔數百萬米百餘萬所蠲租稅無數成祖聞河南饑有司匿不以聞逮治之因命都御史陳瑛榜諭天下有司水旱災傷不以聞者罪不宥又敕朝廷歲遣巡視官目擊民艱不言者悉逮下獄仁宗監國時有以發振請者遣人馳諭之言軍民因乏待哺嗷嗷尚從容啓請待報不能效漢汲黯耶宣宗時戶部請核饑民帝曰民饑無食濟之當如拯溺救焚奚待勘蓋二祖仁宣時仁政亟行預備倉之外又時時截起運賜內帑被災處無儲粟者發旁縣米振之蝗蝻始生必遣人捕瘞鬻子女者官為收贖且令富人蠲佃戶租大戶貸貧民粟免其雜役為息豐年償之皇莊湖泊皆弛禁聽民採取饑民還籍給以口糧京通倉米平價出糶兼預給俸糧以殺米價建官舍以處流民給糧以收棄嬰養濟院窮民各注籍無籍者收養蠟燭幡竿二寺其恤民如此世宗神宗於民事略矣而災荒疏至必賜蠲振不敢違祖制也振米之法明初大口六斗小口三斗五歲以下不與永樂以後減其數納米振濟贖罪者景帝時雜犯死罪六十石流徒減三之一餘遞減有差捐納事例自憲宗始生員納米百石以上入國子監軍民納二百五十石為正九品散官加五十石增二級至正七品止武宗時富民納粟振濟千石以上者表其門九百石至二三百石者授散官得至從六品世宗令義民出穀二十石者給冠帶多者授官正七品至五百石者有司為立坊振粥之法自世宗始報災之法洪武時不拘時限弘治中始限夏災不得過五月終秋災不得過九月終萬曆時又分近地五月七月邊地七月九月洪武時勘災既實盡與蠲免弘治中始定全災免七分自九分災以下遞減又止免存留不及起運後遂為永制云
