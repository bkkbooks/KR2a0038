body:
  text: 明史卷一百十八列傳第六諸王三太祖諸子三岷王楩谷王橞韓王松瀋王模沁水王珵階清源王幼安王楹唐王桱三城王芝垝文城王彌鉗彌鋠輔國將軍宇浹郢王棟伊王皇子楠靖江王守謙興宗諸子虞王雄英吳王允熥衡王允熞徐王允惠帝諸子太子文奎少子文圭成祖諸子高煦趙王高燧高爔岷莊王楩太祖第十八子洪武二十四年封國岷州二十八年以雲南新附宜親王鎮撫改雲南有司請營宮殿帝令暫居棕亭俟民力稍紓後作建文元年西平侯沐晟奏其過廢為庶人徙漳州永樂初復王與晟交惡帝賜書諭楩而詔戒晟楩沉湎廢禮擅收諸司印信殺戮吏民帝怒奪冊寶尋念王建文中久幽繫復豫之而楩不悛六年削其護衛罷官屬仁宗即位徙武岡寄居州治久之始建王邸景泰元年薨子恭王徽煣嗣初世子徽焲宣德初訐其弟鎮南王徽煣誹謗仁廟宣宗疑其詐並召至京及所連閹豎面質事果誣斬閹豎而遣徽煣等歸徽煣嗣位弟廣通王徽煠有勇力家人段友洪以技術得寵致仕後軍都事于利賓言徽煠有異相當主天下遂謀亂作僞敕分遣友洪及蒙能陳添行入苗中誘諸苗以銀印金幣使發兵攻武岡苗首楊文伯等不敢受事覺友洪為徽煣所執都御史李實以聞遣駙馬都尉焦敬中官李琮徵徽煠入京師湖廣總督王來總兵官梁珤復發陽宗王徽焟通謀狀亦徵入皆除爵幽高牆時景泰二年十月也天順七年徽煣薨子順王音嗣病瘋痺屢年不起次子安昌王膺鋪侍醫藥晨夕不去左右憲宗聞之賜敕嘉獎成化十六年音薨世子膺鉟居喪飲博無度承奉劉忠禁制之遂殺忠事聞驗實革冠帶停封居四年乃嗣弘治十三年薨諡曰簡子靖王彥汰嗣嘉靖四年與弟南安王彥泥訐陰事彥泥廢為庶人彥汰亦坐抗制擅權革爵八年令世子譽榮攝府事譽榮上疏懇辭謂臣坐享尊榮而父困苦寂寞臣心何安且前曾舉臣弟善化王譽桔廷議以子無制父理奏寢不行臣亦人子也獨不愧臣弟乎帝覽疏憐之下部議十二年賜彥汰冠帶理府事十五年以兩宮徽號恩復王又八年始薨子康王譽榮嗣三十一年薨子憲王定耀嗣三十四年薨曾孫禋洪天啓二年嗣崇禎元年薨無子從父企金豐嗣十六年流賊陷武岡遇害谷王橞太祖第十九子洪武二十四年封二十八年三月就藩宣府宣府上谷地故曰谷王燕兵起橞走還京師及燕師渡江橞奉命守金川門登城望見成祖麾蓋開門迎降成祖德之即位賜橞樂七奏衛士三百賚豫甚厚改封長沙增歲祿二千石橞居國橫甚忠誠伯茹瑺過長沙不謁橞橞白之帝瑺得罪死遂益驕肆奪民田侵公稅殺無罪人長史虞廷綱數諫誣廷綱誹謗磔殺之招匿亡命習兵法戰陳造戰艦弓弩器械大創佛寺度僧千人為咒詛日與都指揮張成宦者吳智劉信謀呼成師尚父智信國老令公僞引讖書云我高皇帝十八子與讖合橞行次十九以趙王嵵早卒故云謀於元夕獻燈選壯士教之音樂同入禁中伺隙為變又致書蜀王為隱語欲結蜀為援蜀王貽書切責不聽已而蜀王子崇寧王悅燇得罪逃橞所橞因詭衆往年我開金川門出建文君今在邸中我將為申大義事發有日矣蜀王聞之上變告初護衛都督僉事張興見橞為不法懼禍及因奏事北京白其狀帝不信興過南京復啓於太子且曰乞他日無連坐至是帝歎曰朕待橞厚張興常為朕言不忍信今果然立命中官持敕諭橞歸悅燇於蜀且召橞入朝橞至帝示以蜀王章伏地請死諸大臣廷劾橞曰周戮管蔡漢辟濞長皆大義滅親陛下縱念橞奈天下何帝曰橞朕弟朕且令諸兄弟議永樂十五年正月周王橚楚王楨蜀王椿等各上議橞違祖訓謀不軌蹤跡甚著大逆不道誅無赦帝曰諸王羣臣奉大義國法固爾吾寧生橞於是及二子皆廢為庶人官屬多誅死興以先發不坐韓憲王松太祖第二十子洪武二十四年封國開原性英敏通古今恭謹無過永樂五年薨以未之國命葬安德門外十年子恭王沖嗣時棄大寧三衛地開原逼塞不可居二十二年改封平涼仁宗即位召沖與弟襄陵王沖秋樂平王沖烌入朝各獻詩頌帝嘉悅賜金幣有差宣宗初請徙江南不許請蠲護衛屯租建邸第許之遣主事毛俊經度並建襄陵樂平二邸及岷州廣福寺陝西守臣言歲歉請輟工帝令繕王宮罷建寺役平涼接邊徼間諜充斥沖習邊鄙利弊正統元年上書極言邊事賜書褒答五年薨子懷王範圯嗣九年薨弟靖王範嗣景泰元年薨子惠王徵釙嗣初土木之變沖秋赴京師勤王會解嚴下書慰勞及成化六年寇入河套沖秋復請率子壻擊賊憲宗止之沖兄弟並急王事以藩禁嚴不用自是宗臣無預兵事者成化五年徵釙薨子悼王偕流嗣十年薨弟康王偕灊嗣弘治十四年薨子昭王旭櫏嗣性忠孝工詩居藩有惠政韓土瘠祿薄弟建寧王旭至以所受金冊質於宗室偕泆事聞廢為庶人諸貧宗往往淩劫有司平涼知府吳世良鄺衍任守德王松先後被窘辱嘉靖十三年旭櫏薨子定王融燧嗣懲宗室之橫頗繩以法不逞者怨之三十二年襄陵王融焚及諸宗二百餘人訐奏王奸利事勘無實革融焚等祿四十四年融燧薨子謨先卒世宗末年以宗祿不足詔身不及王者許其嫡長子繼王餘子如故秩謨以世子不及王王其長子朗錡餘子止鎮國將軍萬曆三十四年朗錡薨諡曰端子孫皆早卒曾孫亶塉嗣崇禎十六年賊陷平涼被執襄陵王沖秋憲王第二子有至性母病刲股和藥病良已及卒終喪毀瘠每展墓必率子孫躬畚鍤培冢先後璽書褒美者六子範址服其教母荊罹危疾亦刲股進之愈其後五世同居門內雍肅嘉靖十一年賚以羊酒文幣韓諸王以襄陵家法為第一王孫徵病卒聘杜氏女未婚歸王家志操甚厲詔賜旌表瀋簡王模太祖第二十一子洪武二十四年封永樂六年就藩潞州宣德六年薨子康王佶焞嗣景泰中數與州官置酒大會巡撫朱鑑以聞帝令諸王非時令壽節不得輒與有司宴飲著為令天順元年薨子莊王幼嗣正德十一年薨子恭王詮鉦嗣嘉靖六年薨孫允榿攝府事九年卒無子再從弟憲王允栘攝府事凡十年乃嗣封當是時瀋府諸郡王勛淯詮鏋並爭襲帝皆切責之而令允栘嗣二十八年薨子宣王恬烄嗣好學工古文詞審聲律弟安慶王恬爖鎮康王恬焯穆宗時皆以孝義旌萬曆十年恬烄薨子定王珵堯嗣仁孝恭慎弟六人封郡王者二餘例不得封朝廷獎王恭皆封郡王而不與祿薨子效鏞嗣明亡國除沁水王珵階簡王七世孫也工詩喜士名譽藉甚前此有德平王允梃負俊才與衡府新樂王載璽周宗人睦俊噤等齊名又清源王幼康王第三子博學能文詞其後輔國將軍勳漣從子允杉允允析及鎮國將軍恬烷與諸子珵圻等並以能詩名時稱瀋藩多才焉安惠王楹太祖第二十二子洪武二十四年封永樂六年就藩平涼十五年薨無子封除府僚及樂戶悉罷留典仗校尉百人守園洪熙初韓恭王改封平涼就安王邸英宗令官校隸韓長史供安王祀暇日給韓王子襄陵王沖秋使令景泰五年沖秋遂乞承安王祀正德十二年嗣襄陵王徵鈐請樂戶祀安王明年樂平王徵錏援徵鈐例以請禮部言親王有樂戶郡王別城居者有事假鼓吹於有司其附親王國者假樂戶於長史司因並革安王供祀樂戶嘉靖二年韓王旭櫏復為代請帝以安王故報可之徵鈐卒韓王融燧令長史革之徵鈐長孫旭橦上言禮樂自天子出韓王不宜擅豫奪融燧亦言親王郡王禮樂宜有降殺帝曰樂戶為安王祀也給如故唐定王桱太祖第二十三子洪武二十四年封永樂六年就藩南陽十三年薨子靖王瓊烴嗣綜核有矩矱為成祖所喜入朝五日三召見宣德元年薨妃高氏未冊自經以殉詔封靖王妃無子弟憲王瓊炟嗣成化十一年薨子莊王芝址嗣諸弟三城王芝垝蕩陰王芝並好學有令譽而承休王芝垠憲王繼妃焦氏子也妃愛之遇節旦召樂婦入宮芝址詰之語不遜焦妃怒持鐵鎚擊宮門芝址閉不敢出芝垠與妃弟璟誣王詈繼母按驗不實得芝垠慢母詈兄狀革爵久之始復二十一年芝址薨子成王彌鍗嗣弘治中疏言朝廷待親藩生爵歿諡親親至矣間有惡未敗聞歿獲美諡是使善者怠惡者肆也自今宜勘實用寓彰疸禮臣請降敕獎諭勉厲諸王詔可武宗喜遊幸彌鍗作憂國詩且上疏以用賢圖治為言弟文城王彌鉗有學行孝友篤至嘉靖二年彌鍗薨無子彌鉗子敬王宇溫嗣二十一年獻金助太廟工賜玉帶益祿二百石時承休王芝垠子彌鋠以父與莊王交訐失令名折節蓋前愆宇溫上其事璽書褒獎三十九年宇溫薨子順王宙栐嗣四十三年薨子端王碩熿嗣惑於嬖人囚世子器墭及其子聿鍵於承奉司器墭中毒死崇禎五年碩熿薨聿鍵嗣七年流賊大熾蠲金築南陽城又援潞藩例乞增兵三千人不許九年秋八月京師戒嚴倡義勤王詔切責勒還國事定下部議廢為庶人幽之鳳陽弟聿鏌嗣十四年李自成陷南陽聿鏌遇害十七年京師陷福王由嵩立於南京乃赦聿鍵出大清順治二年五月南都降聿鍵行至杭遇鎮江總兵官鄭鴻逵戶部郎中蘇觀生遂奉入閩南安伯鄭芝龍巡撫都御史張肯堂與禮部尚書黃道周等定議奉王稱監國閏六月丁未遂立於福州號隆武改福州為天興府進芝龍鴻逵為侯封鄭芝豹鄭彩為伯觀生道周俱大學士肯堂為兵部尚書餘拜官有差聿鍵好學通典故然權在鄭氏不能有所為是年八月芝龍議簡戰守兵二十餘萬計餉不支其半請預借兩稅一年令羣下捐俸勸紳士輸助徵府縣銀穀未解者官吏督迫閭里騷然又廣開事例猶苦不足仙霞嶺守關兵僅數百人皆不堪用聿鍵屢促芝龍出兵輒以餉詘辭久之芝龍知衆論不平乃請以鴻逵出浙東彩出江西各擁兵數千號數萬既行託候餉皆行百里而還先是黃道周知芝龍無意出師自請行從廣信趨婺源兵潰死事詳道周傳是時李自成兵敗走死通山其兄子李錦帥衆降於湖廣總督何騰蛟一時增兵十餘萬侍郎楊廷麟祭酒劉同升起兵復吉安臨江於是廷麟等請聿鍵出江右騰蛟請出湖南原任知州金堡言騰蛟可恃芝龍不可恃宜棄閩就楚聿鍵大喜授堡給事中遣觀生先行募兵先是靖江王亨嘉僭稱監國不奉聿鍵命為巡撫瞿式耜等所擒以捷聞而魯王以海又稱監國於紹興拒聿鍵使者故聿鍵決意出江西湖廣十二月發福州駐建寧廣東布政湯來賀運餉十萬由海道至明年二月駐延平三月大清兵取吉安撫州圍楊廷麟於贛州尚書郭維經出閩募兵援贛六月大兵克紹興魯王以海遁入海閩中大震芝龍假言海寇至徹兵回安平鎮航海去守關將士皆隨之仙霞嶺空無一人七月何騰蛟遣使迎聿鍵將至韶州唯時我兵已抵閩關守浦城御史鄭為虹給事中黃大鵬延平知府王士和死焉八月聿鍵出走數日方至汀州大兵奄至從官奔散與妃曾氏俱被執妃至九瀧投於水聿鍵死於福州給事中熊緯尚書曹學佺通政使馬思禮等自縊死郢靖王棟太祖第二十四子洪武二十四年封永樂六年之藩安陸十二年薨無子封除留內外官校守園王妃郭氏武定侯英女王薨踰月妃慟哭曰未亡人無子尚誰恃引鏡寫容付宮人曰俟諸女長令識母遂自經妃四女一夭其三女封光化穀城南漳郡主歲祿各八百石宣德四年以郢故邸封梁王瞻移郢宮人居南京伊厲王太祖第二十五子洪武二十一年生生四年封永樂六年之藩洛陽歲祿僅二千石王好武不樂居宮中時時挾彈露劍馳逐郊外奔避不及者手擊之髠裸男女以為笑樂十二年薨禮臣請追削封爵不許二十二年子簡王顒炴始得嗣縱中官擾民洛陽人苦之河南知府李驥稍持以法誣奏驥被逮治已而得白罪王左右英宗時上表文不恭屢被譙讓天順六年薨世孫悼王諟釩嗣成化十一年薨弟定王諟鋝嗣好學崇禮居喪哀毀歲時祀先致齊於外郡王諸將軍中尉非慶賀不褻見民間高年者禮下之正德三年薨子莊王訏淵嗣嘉靖五年薨弟敬王訏淳嗣居母喪以孝聞以祿薄上言先朝以河南課鈔萬七千七百貫準祿米八千石八年革諸王請乞租稅伊府課鈔亦在革中乞補祿戶部言課鈔本成弘間請乞非永樂時欽賜比河南一省缺祿者八十餘萬宜不許帝從部議二十一年薨世子典楧嗣貪而愎多持官吏短長不如指必搆之去既去復折辱之御史行部過北邙山外典楧要笞之縉紳往來率紆途取他境經郭外者府中人輒追挽其車詈其不朝入朝者復辱以非禮府牆壞請更築乃奪取民舍以廣其宮郎中陳大壯與邸鄰索其居不與使數十人從大壯臥起奪其飲食竟至餒死所為宮崇臺連城擬帝闕有錦衣官校之陝者經洛陽典楧忽召官屬迎詔鼓吹擁錦衣入捧一黃卷入宮衆請開讀曰密詔也遂趣錦衣去錦衣謂王厚待之不知所以其夜大張樂至曙府中皆呼千歲詐謂天子特親我也閉河南府城大選民間子女七百餘留其姝麗者九十人不中選者令以金贖都御史張永明御史林潤給事中丘嶽相繼言其罪狀再遣使往勘革祿三之二令壞所僭造宮城歸民間女執羣小付有司典楧不奉詔部牒促之布政使持牒入見典楧曰牒何為者可用障櫺耳四十三年二月撫按官以聞詔禮部會三法司議僉謂典楧淫暴無蕃臣禮陛下曲赦再四終不湔改奸回日甚宜如徽王載故事禁錮高牆削除世封詔從其議與子褒俱安置開封皇子楠太祖第二十六子洪武二十六年生踰月殤靖江王守謙太祖從孫父文正南昌王子也當太祖起兵時南昌王前死妻王氏攜文正依太祖太祖高后撫如己子比長涉獵傳記饒勇略隨渡江取集慶路已有功授樞密院同僉太祖從容問若欲何官文正對曰叔父成大業何患不富貴爵賞先私親何以服衆太祖喜其言益愛之太祖為吳王命為大都督節制中外諸軍事及再定江西以洪都重鎮屏翰西南非骨肉重臣莫能守乃命文正統元帥趙得勝等鎮其地儒士郭之章劉仲服為參謀文正增城浚池招集山寨未附者號令明肅遠近震懾居無何友諒帥舟師六十萬圍洪都文正數摧其鋒堅守八十有五日城壞復完者數十丈友諒旁掠吉安臨江俘其守將徇城下不為動太祖親帥兵來援友諒乃解去與太祖相拒於彭蠡友諒掠糧都昌文正遣方亮焚其舟糧道絶友諒遂敗復遣何文輝等討平未附州縣江西之平文正功居多太祖還京告廟飲至賜常遇春廖永忠及諸將士金帛甚厚念文正前言知大體錫功尚有待也而文正不能無少望性素卞急至是暴怒遂失常度任掾吏衛可達奪部中子女按察使李飲冰奏其驕侈觖望太祖遣使詰責文正懼飲冰益言其有異志太祖即日登舟至城下遣人召之文正倉卒出迎太祖數曰汝何為者遂載與俱歸欲竟其事高后力解之曰兒特性剛耳無他也免官安置桐城未幾卒飲冰亦以他事伏誅文正之被謫也守謙甫四歲太祖撫其頂曰兒無恐爾父倍訓教貽我憂我終不以爾父故廢爾育之宮中守謙幼名鐵柱吳元年以諸子命名告廟更名煒洪武三年更名守謙封靖江王祿視郡王官屬親王之半命耆儒趙塤為長史傅之既長之藩桂林桂林有元順帝潛邸改為王宮上表謝太祖敕其從臣曰從孫幼而遠鎮西南其善導之守謙知書而好比羣小粵人怨咨召還戒諭之守謙作詩怨望帝怒廢為庶人居鳳陽七年復其爵徙鎮雲南使其妃弟徐溥同往賜書戒飭語極摯切守謙暴橫如故召還使再居鳳陽復以強取牧馬錮之京師二十五年卒子贊儀幼命為世子三十年春遣省晉燕周楚齊蜀湘代肅遼慶谷秦十三王自湘楚入蜀歷陝西抵河南山西北平東至大寧遼陽還自山東使知親親之義熟山川險易習勞苦贊儀恭慎好學永樂元年復之國桂林使蕭用道為長史用道善輔導贊儀亦敬禮之六年薨諡曰悼僖子莊簡王佐敬嗣初給銀印宣德中改用金塗正統初與其弟奉國將軍佐敏相訐奏語連大學士楊榮帝怒戍其使人成化五年薨子相承先卒孫昭和王規裕嗣弘治二年薨子端懿王約麒嗣以孝謹聞正德十一年薨子安肅王經扶嗣好學有儉德嘗為敬義針嘉靖四年薨子恭惠王邦薴嗣與巡按御史徐南金相訐奏奪祿米罪其官校隆慶六年薨子康僖王任昌嗣萬曆十年薨子溫裕王履燾嗣二十年薨無子從父憲定王任晟嗣三十八年薨子榮穆王履祜嗣薨子亨嘉嗣李自成陷京師後自稱監國於廣西為巡撫瞿式耜所誅時唐王聿鍵在福建奏捷焉興宗五子后常氏生虞懷王雄英吳王允熥呂后生惠帝衡王允熞徐王允虞懷王雄英興宗長子太祖嫡長孫也洪武十五年五月薨年八歲追加封諡吳王允熥興宗第三子建文元年封國杭州未之藩成祖即位降為廣澤王居漳州未幾召還京廢為庶人錮鳳陽永樂十五年卒衡王允熞興宗第四子建文元年封成祖降為懷恩王居建昌與允熥俱召還錮鳳陽先後卒徐王允興宗第五子建文元年封成祖降為敷惠王隨母呂太后居懿文陵永樂二年下詔改甌寧王奉太子祀四年十二月邸中火暴薨諡曰哀簡惠帝二子俱馬后生太子文奎建文元年立為皇太子燕師入七歲矣莫知所終少子文圭年二歲成祖入幽之中都廣安宮號為建庶人英宗復辟憐庶人無罪久繫欲釋之左右或以為不可帝曰有天命者任自為之大學士李賢贊曰此堯舜之心也遂請於太后命內臣牛玉往出之聽居鳳陽婚娶出入使自便與閽者二十人婢妾十餘人給使令文圭孩提被幽至是年五十七矣未幾卒成祖四子仁宗漢王高煦趙王高燧俱文皇后生高爔未詳所生母漢王高煦成祖第二子性凶悍洪武時召諸王子學於京師高煦不肯學言動輕佻為太祖所惡及太祖崩成祖遣仁宗及高煦入臨京師舅徐輝祖以其無賴密戒之不聽盜輝祖善馬徑渡江馳歸途中輒殺民吏至涿州又擊殺驛丞於是朝臣舉以責燕成祖起兵仁宗居守高煦從嘗為軍鋒白溝河之戰成祖幾為瞿能所及高煦帥精騎數千直前決戰斬能父子於陳及成祖東昌之敗張玉戰死成祖隻身走適高煦引師至擊退南軍徐輝祖敗燕兵於浦子口高煦引蕃騎來成祖大喜曰吾力疲矣兒當鼓勇再戰高煦麾蕃騎力戰南軍遂却成祖屢瀕於危而轉敗為功者高煦力為多成祖以為類己高煦亦以此自負恃功驕恣多不法成祖即位命將兵往開平備邊時議建儲淇國公丘福駙馬王寧善高煦時時稱高煦功高幾奪嫡成祖卒以元子仁賢且太祖所立而高煦又多過失不果永樂二年仁宗立為太子封高煦漢王國雲南高煦曰我何罪斥萬里不肯行從成祖巡北京力請並其子歸南京成祖不得已聽之請得天策衛為護衛輒以唐太宗自比已復乘間請益兩護衛所為益恣成祖嘗命同仁宗謁孝陵仁宗體肥重且足疾兩中使掖之行失足高煦從後言曰前人蹉跌後人知警時宣宗為皇太孫在後應聲曰更有後人知警也高煦回顧失色高煦長七尺餘輕趫善騎射兩腋若龍鱗者數片既負其雄武又每從北征在成祖左右時媒孽東宮事譖解縉至死黃淮等皆繫獄十三年五月改封青州又不欲行成祖始疑之賜敕曰既受藩封豈可常居京邸前以雲南遠憚行今封青州又託故欲留侍前後殆非實意茲命更不可辭然高煦遷延自如私選各衛健士又募兵三千人不隸籍兵部縱使劫掠兵馬指揮徐野驢擒治之高煦怒手鐵瓜撾殺野驢衆莫敢言遂僭用乘輿器物成祖聞之怒十四年十月還南京盡得其不法數十事切責之褫冠服囚繫西華門內將廢為庶人仁宗涕泣力救乃削兩護衛誅其左右狎諸人明年三月徙封樂安州趣即日行高煦至樂安怨望異謀益急仁宗數以書戒不悛成祖北征晏駕高煦子瞻圻在北京覘朝廷事馳報一晝夜六七行高煦亦日遣人潛伺京師幸有變仁宗知之顧益厚遇遺書召至增歲祿賜賚萬計仍命歸藩封其長子為世子餘皆郡王先是瞻圻怨父殺其母屢發父過惡成祖曰爾父子何忍也至是高煦入朝悉上瞻圻前後覘報中朝事仁宗召示瞻圻曰汝處父子兄弟間讒搆至此稚子不足誅遣守鳳陽皇陵未幾仁宗崩宣宗自南京奔喪高煦謀伏兵邀於路倉卒不果及帝即位賜高煦及趙王視他府特厚高煦日有請並陳利國安民四事帝命有司施行仍復書謝之因語羣臣曰皇祖嘗踰皇考謂叔有異志宜備之然皇考待之極厚如今所言果出於誠則是舊心已革可不順從凡有求請皆曲徇其意高煦益自肆宣德元年八月遂反遣其親信枚青等潛至京師約舊功臣為內應英國公張輔執之以聞時高煦已約山東都指揮靳榮等又散弓刀旗幟於衛所盡奪傍郡縣畜馬立五軍指揮王斌領前軍韋達左軍千戶盛堅右軍知州朱後軍諸子各監一軍高煦自將中軍世子瞻坦居守指揮韋弘韋興千戶王玉李智領四哨部署已定僞授王斌朱等太師都督尚書等官御史李濬以父喪家居高煦招之不從變姓名間道詣京師上變帝猶不忍加兵遣中官侯泰賜高煦書泰至高煦盛兵見泰南面坐大言曰永樂中信讒削我護衛徙我樂安仁宗徒以金帛餌我我豈能鬱鬱居此汝歸報急縛奸臣夏原吉等來徐議我所欲泰懼唯唯而已比還帝問漢王何言治兵何如泰皆不敢以實對是月高煦遣百戶陳剛進疏更為書與公侯大臣多所指斥帝歎曰漢王果反乃議遣陽武侯薛祿將兵往討大學士楊榮等勸帝親征帝是之張輔奏曰高煦素懦願假臣兵二萬擒獻闕下帝曰卿誠足擒賊顧朕初即位小人或懷二心不親行不足安反側於是車駕發京師過楊村馬上顧從臣曰度高煦計安出或對曰必先取濟南為巢窟或對曰彼曩不肯離南京今必引兵南下帝曰不然濟南雖近未易攻聞大軍至亦不暇攻護衛軍家樂安必內顧不肯徑趨南京高煦外誇詐內實怯臨事狐疑不能斷今敢反者輕朕年少新立衆心未附不能親征耳今聞朕行已膽落敢出戰乎至即擒矣高煦初聞祿等將兵攘臂大喜以為易與及聞親征始懼時有從樂安來歸者帝厚賞之令還諭其衆仍遺書高煦曰張敖失國始於貫高淮南被誅成於伍被今六師壓境王即出倡謀者朕與王除過恩禮如初不然一戰成擒或以王為奇貨縛以來獻悔無及矣前鋒至樂安高煦約詰旦出戰帝令大軍蓐食兼行駐蹕樂安城北壁其四門賊乘城守王師發神機銃箭聲震如雷諸將請即攻城帝不許再敕諭高煦皆不答城中人多欲執獻高煦者高煦大懼乃密遣人詣行幄願假今夕訣妻子即出歸罪帝許之是夜高煦盡焚兵器及通逆謀書明日帝移蹕樂安城南高煦將出城王斌等力止曰寧一戰死無為人擒高煦紿斌等復入宮遂潛從間道出見帝羣臣請正典刑不允以劾章示之高煦頓首言臣罪萬萬死惟陛下命帝令高煦為書召諸子餘黨悉就擒赦城中罪脅從者不問命薛祿及尚書張本鎮撫樂安改曰武定州遂班師廢高煦父子為庶人築室西安門內錮之王斌等皆伏誅惟長史李默以嘗諫免死謫口北為民天津青州滄州山西諸都督指揮約舉城應者事覺相繼誅凡六百四十餘人其故縱與藏匿坐死戍邊者一千五百餘人編邊氓者七百二十人帝製東征記以示羣臣高煦及諸子相繼皆死趙簡王高燧成祖第三子永樂二年封尋命居北京詔有司政務皆啓王後行歲時朝京師辭歸太子輒送之江東驛高燧恃寵多行不法又與漢王高煦謀奪嫡時時譖太子於是太子宮寮多得罪七年帝聞其不法事大怒誅其長史顧晟褫高燧冠服以太子力解得免擇國子司業趙亨道董子莊為長史輔導之高燧稍改行二十一年五月帝不豫護衛指揮孟賢等結欽天監官王射成及內侍楊慶養子造僞詔謀進毒於帝俟晏駕詔從中下廢太子立趙王總旗王瑜姻家高以正者為賢等畫謀謀定告瑜瑜上變帝曰豈應有此立捕賢得為僞詔賢等皆伏誅升瑜遼海衛千戶帝顧高燧曰爾為之耶高燧大懼不能言太子力為之解曰此下人所為高燧必不與知自是益斂戢仁宗即位加漢趙二王歲祿二萬石明年之國彰德辭常山左右二護衛宣宗即位賜田園八十頃帝擒高煦歸至單橋尚書陳山迎駕言曰趙王與高煦共謀逆久矣宜移兵彰德擒趙王否則趙王反側不自安異日復勞聖慮帝未決時惟楊士奇以為不可山復邀尚書蹇義夏原吉共請帝曰先帝友愛二叔甚漢王自絶於天朕不敢赦趙王反形未著朕不忍負先帝也及高煦至京亦言嘗遣人與趙通謀戶部主事李儀請削其護衛尚書張本亦以為言帝不聽既而言者益衆明年帝以其詞及羣臣章遣駙馬都尉廣平侯袁容持示高燧高燧大懼乃請還常山中護衛及羣牧所儀衛司官校帝命收其所還護衛而與儀衛司宣德六年薨子惠王瞻塙嗣景泰五年薨子悼王祈鎡嗣天順四年薨子靖王見灂嗣惠王悼王皆頗有過失至見灂惡尤甚屢賊殺人又嘗乘醉欲殺其叔父成化十二年事聞詔奪祿米三之二去冠服戴民巾讀書習禮其後二年見灂母妃李氏為之請得冠服如故見灂卒不能改愛幼子祐枳遂誣長子祐棌以大逆復被詔誚讓弘治十五年薨子莊王祐棌嗣正德十三年薨子康王厚煜嗣事祖母楊妃以孝聞嘉靖七年六月璽書褒豫明年冬境內大饑厚煜上疏請辭祿一千石以佐振帝嘉王憂國詔有司發粟不允所辭及帝南巡厚煜遠出迎命益祿三百石厚煜性和厚構一樓名思訓嘗獨居讀書文藻贍麗宗人輔國將軍祐椋等數犯法與有司為難厚煜庇祐椋祐椋卒得罪並見責讓其後有司益務以事裁抑諸宗洛川王翊鏴奴與通判田時雨之隸爭瓜而毆時雨捕王奴厚煜請解不得竟論奴充軍未幾宗室數十人索祿時雨以宗室毆府官白於上官知府傅汝礪盡捕各府人厚煜由是忿恚竟自諡死三十九年十月也厚煜子成皋王載垸疏聞於朝下法司按問時雨斬河南市汝礪戍極邊厚煜子載培及載培子翊錙皆前卒翊錙子穆王常清嗣以善行見旌萬曆四十二年薨世子由松前卒弟壽光王由桂子慈嗣薨無子穆王弟常嗣崇禎十七年彰德陷被執
