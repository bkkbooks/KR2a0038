body:
  text: 明史卷五十五志第三十一禮九嘉禮三天子納后儀皇太子納妃儀親王婚禮公主婚禮品官婚禮庶人婚禮皇帝視學儀經筵日講東宮出閣講學儀諸王讀書儀天子納后儀婚禮有六天子惟無親迎禮漢晉以來皆遣使持節奉迎其禮物儀文各以時損益明興諸帝皆即位後行册立禮正統七年英宗大婚始定儀注凡納采問名前期擇日遣官告天地宗廟至期設御座制案節案鹵簿綵輿中和大樂如儀禮部陳禮物於丹陛上及文樓下質明皇帝冕服升座百官朝服行禮訖各就位正副使朝服四拜執事舉制案節案由中門出禮物隨之俱置丹陛中道傳制官宣制曰茲選某官某女為皇后命卿等持節行納采問名禮正副使四拜駕興舉制節案由奉天門中門出正副使取節及制書置綵輿中儀仗大樂前導出大明門釋朝服乘馬行詣皇后第第中設使者幕次於大門外左南向設香案於正堂設制節案於南別設案於北使者至引禮導入幕次執事官陳禮物於正堂使者出次奉制書於案禮官先入立於東主婚朝服出立於西禮官曰奉制建后遣使行納采問名禮引主婚者出迎使者捧制書及節主婚者隨至堂置制書及節於案正副使分立案左右主婚者四拜詣案前跪正使取納采制宣曰朕承天序欽紹鴻圖經國之道正家為本夫婦之倫乾坤之義實以相宗祀之敬協奉養之誠所資惟重祗遵聖母皇太后命遣使持節以禮采擇宣訖授主婚者主婚者授執事者置於北案上稍左副使取問名制宣曰朕惟夫婦之道大倫之本正位乎內必資名家特遣使持節以禮問名尚佇來聞宣訖授如前置案上稍右主婚者俯伏興執事舉表案以表授主婚者主婚者跪授正使表曰臣某伏承嘉命正使某官某等重宣制詔問臣名族臣女臣夫婦所生先臣某官某之曾孫先臣某官某之孫先臣某官某之外孫臣女今年若干謹具奏聞主婚者俯伏興退四拜使者出置表綵輿中主婚者前曰請禮從者酒饌畢主婚者捧幣以勞使者使者出主婚者送至大門外使者隨綵輿入大明門左門至奉天門外以表節授司禮監復命次納吉納徵告期傳制遣使並如前儀但納徵用玄纁束帛六馬穀圭等物制詞曰茲聘某官某女為皇后命卿等持節行納吉納徵告期禮皇后第陳設如前惟更設玉帛案使者至以制書玉帛置案上六馬陳堂下執事先設皇后冠服諸物於正堂禮官入主婚者出迎執事舉玉帛案正使捧納吉納徵制書副使捧告期制書執節者捧節以次入各置於案主婚者四拜詣案前跪正使取制書宣曰大婚之卜龜筮師士協從敬循禮典遣使持節告吉又宣曰卿女有貞靜之德稱母儀之選宜共承天地宗廟特遣使持節以禮納徵宣訖授主婚者正副使又捧圭及玄纁以授主婚者俱如前儀副使取制書宣曰歲令月良吉日某甲子大婚維宜特遣使持節以禮告期宣訖授如前儀主婚者四拜使者持節出主婚者禮使者使者還復命如初次發册奉迎所司陳設如前儀禮部陳雁及禮物於丹陛上內官監陳皇后鹵簿車輅於奉天門外制詞曰茲册某官某女為皇后命卿等持節奉册寶行奉迎禮正副使以册寶置綵輿中隨詣皇后第至門取制書册寶置案上禮官先入主婚者朝服出見禮官曰奉制册后遣使持節奉册寶行奉迎禮主婚者出迎執事者舉案前行使者捧制書及節執事者以雁及禮物從之至堂中各置於案使者左右立主婚者四拜退立於西南女官以九龍四鳳冠褘衣進皇后內官陳儀仗於中堂前設女樂於堂下作止如常儀使者以節册寶授司禮監官內贊導入中堂皇后具服出閣詣香案前向闕立四拜贊宣册皇后跪宣册官宣訖以授皇后皇后搢圭受册以授女官女官跪受立於西贊宣寶如宣册儀贊出圭贊興四拜訖皇后入閣司禮監官持節出授使者報受册寶禮畢主婚者詣案前跪正使取奉迎制宣訖授主婚者副使進雁及禮物主婚者皆跪受如前儀主婚者興使者四拜出主婚者禮使者如初女官奏請皇后出閣自東階下立香案前四拜升堂南向立主婚者進立於東西向曰戒之敬之夙夜無違退立於東階母進立於西東向施襟結帨曰勉之敬之夙夜無違退立於西階內執事請乘輿皇后降階升輿導從出儀仗大樂前行次綵輿正副使隨次司禮監官擁導從大明門中門入百官朝服於承天門外班迎候輿入乃退皇后至午門外鳴鐘鼓鹵簿止正副使以節授司禮監復命捧册寶官捧册寶儀仗女樂前導進奉天門至內庭幕次司禮監以册寶授女官皇后出輿由西階進皇帝由東階降迎於庭揖皇后入內殿帝詣更服處具袞冕后詣更服處更禮服同詣奉先殿行謁廟禮祭畢還宮合卺帝更皮辨升內殿后更衣從升各升座東西相向執事者舉饌案於前女官取四金爵酌酒以進既飲進饌復進酒進飯訖女官以兩卺酌酒合和以進既飲又進饌畢興易常服帝從者餕后之饌后從者餕帝之饌次日早帝后皆禮服候太后升座帝后進座前宮人以腶修盤立於后左帝后皆四拜執事舉案至宮人以腶修盤授后后捧置於案女官舉案后隨至太后前進訖復位帝后皆四拜三日早帝冕服后禮服同詣太后宮行八拜禮還宮帝服皮辨升座女官導后禮服詣帝前行八拜禮后還宮升座引禮導在內親屬及六尚等女官行八拜禮次各監局內官內使行八拜禮是日皇帝御奉天殿頒詔如常儀四日早皇帝服袞冕御華蓋殿親王八拜次執事官五拜遂升奉天殿百官進表行慶賀禮是日太后及皇后各禮服升座親王入八拜出次內外命婦慶賀及外命婦進表箋皆如常儀五日行盥饋禮尚膳監具膳修皇后禮服詣太后前四拜尚食以膳授皇后皇后捧膳進於案復位四拜退立於西南俟膳畢引出皇太子納妃儀歷代之制與納后同隋唐以後始親迎天子臨軒醮戒宋始行盥饋禮明因之洪武元年定制凡行禮皆遣使持節如皇帝大婚儀納采問名制曰奉制納某氏女為皇太子妃命卿等行納采問名禮至妃第儐者出詣使者前曰敢請事使者曰儲宮納配屬於令德邦有常典使某行納采之禮儐者入告主婚者曰臣某之子昧於壼儀不足以備采擇恭承制命臣某不敢辭儐者出告使者入陳禮物於庭宣制曰某奉詔采擇奠雁禮畢使者出儐者復詣使者前曰敢請事使者曰儲宮之配采擇既諧將加卜筮奉制問名儐者入告主婚者曰制以臣某之女可以奉侍儲宮臣某不敢辭儐者出告使者復入陳禮奠雁如儀宣制曰臣某奉詔問名將謀諸卜筮主婚者曰臣某第幾女某氏出次納吉儐者請事如前使者曰謀諸卜筮其占協從制使某告吉儐者入告主婚者曰臣某之子蠢愚懼弗克堪卜筮云吉惟臣之幸臣謹奉典制儐者出告使者入陳禮奠雁如儀宣制曰奉制告吉又次納徵儐者出告使者入陳玉帛禮物不奠雁宣制曰某奉制告成又次請期辭曰詢於龜筮某月某日吉制使某告期主婚者曰敢不承命陳禮奠雁如儀又次告廟遣使持節授册寶儀注悉見前又次醮戒皇帝服通天冠絳紗袍御奉天殿百官侍立引進導皇太子至丹陛四拜入殿東門就席位東向立司爵以盞進皇太子跪搢圭受盞祭酒司饌以饌進跪受亦如之興就席坐飲食訖導詣御座前跪皇帝命之曰往迎爾相承我宗事勗帥以敬皇太子曰臣某謹奉制旨俯伏興出至丹陛四拜畢皇帝還宮皇太子出又次親迎前一日有司設皇太子次於妃氏大門外南向東宮官次於南東西相向至日質明東宮官具朝服陳鹵簿鼓吹於東宮門外皇太子冕服乘輿出侍衛導從如儀至宮門降輿升輅東宮官皆從至妃第回轅南向降輅升輿至次降輿入就次東宮官皆就次先是皇太子將至主婚者設會宴女至期妃服褕翟花叉出就閣南面立傅姆立於左右主婚者具朝服立於西階之下引進導皇太子出次立於大門之東西向儐者朝服出立於門東曰敢請事引進跪啓訖皇太子曰某奉制親迎引進受命興承傳於儐者儐者入告導主婚者出迎於大門外之西東向再拜皇太子答拜引進導皇太子入門而左執雁者從儐者導主婚者入門而右皇太子升東階進立於閣門戶前北向立主婚者升西階立於西東向引進啓奠雁執雁者以雁進皇太子受雁以授主婚者主婚者跪受興以授左右退立於西皇太子再拜降自東階出至次以伺主婚者不降送初皇太子入門妃母出立於閣門外奠雁位之西南向皇太子拜訖宮人傅姆導妃出立於母左主婚者命之曰戒之戒之夙夜恪勤毋或違命母命之曰勉之勉之爾父有訓往承惟欽庶母申之曰恭聽父母之言宮人傅姆擎執導從妃乘輿出門降輿乘鳳轎皇太子揭簾訖遂升輅侍從如來儀至東宮門外降輅乘輿至閣降輿入俟於內殿門外之東西面司閨導妃詣內殿門外之西東面皇太子揖妃入行合卺禮如中宮儀又次朝見其日妃詣內殿陛下候皇帝升座司閨導妃入北面立再拜自西階升宮人奉棗栗盤進至御座前授妃妃奠於御前退復位再拜禮畢詣皇后前奉腶修盤如上儀又次醴妃次盥饋次謁廟次羣臣命婦朝賀皆如儀四年册開平王常遇春女為皇太子妃禮部上儀注太祖覽之曰贄禮不用笄但用金盤翟車用鳳轎雁以玉為之古禮有親迎執綏御輪今用轎則揭簾是矣其合卺依古制用匏妃朝見入宮中乘小車以帷幕蔽之謁廟則皇太子俱往禮成後三日乃宴羣臣命婦著為令成化二十二年更定婚禮凡節册等案俱由奉天左門出皇太子親迎由東長安門出親迎日妃服燕居服隨父母家廟行禮執事者具酒饌妃飲食訖父母坐堂上妃詣前各四拜父命之曰爾往大內夙夜勤慎孝敬無違母命之曰爾父有訓爾當敬承合卺前於皇太子內殿各設拜位皇太子揖妃入就位再拜妃四拜然後各升座廟見後百官朝賀致詞曰某官臣某等恭惟皇太子嘉禮既成益綿宗社隆長之福臣某等不勝欣忭之至謹當慶賀帝賜宴如正旦儀命婦詣太后皇后前賀亦賜宴致詞曰皇太子嘉聘禮成益綿景福餘大率如洪武儀親王婚禮唐制皇子納妃命親王主婚宋皆皇帝臨軒醮戒略與皇太子同明因之其宣制曰册某氏為某王妃納采致詞曰某王之儷屬於懿淑使某行納采禮問名詞曰某既受命將加諸卜筮奉制問名主婚者曰制以臣某之子可以奉侍某王臣某不敢辭納吉詞曰卜筮協從使某告吉主婚者曰臣某之子愚弗克堪卜貺之吉臣與有幸謹奉典制納徵詞曰某王之儷卜既協吉制使某以儀物告成主婚者曰奉制賜臣以重禮臣某謹奉典制請期詞曰某月日涓吉制使某告期主婚者曰謹奉命醮戒命曰往迎爾相用承厥家勗帥以敬其親迎合卺朝見盥饋並如皇太子盥饋畢王皮辨服妃翟衣詣東宮前行四拜禮東宮坐受東宮妃立受二拜答二拜王與妃至妃家妃父出迎王先入妃父從之至堂王立於東妃父母立於西王四拜妃父母立受二拜答二拜王中坐其餘親屬見王四拜王皆坐受妃入中堂妃父母坐妃四拜其餘序家人禮太祖之世皇太子皇子有二妃洪武八年十一月徵衛國公鄧愈女為秦王次妃不傳制不發册不親迎正副使行納徵禮冠服擬唐宋二品之制儀仗視正妃稍減婚之日王皮辨服導妃謁奉先殿王在東稍前妃西稍後禮畢入宮王與正妃正坐次妃詣王前四拜復詣正妃前四拜次妃東坐宴飲成禮次日朝見拜位如謁殿謁中宮不用棗栗腶修餘並同公主婚禮古者天子嫁女不自主婚以同姓諸侯主之故曰公主唐猶以親王主婚宋始不用惟令掌婚者於內東門納表則天子自為主矣明因之凡公主出降行納采問名禮壻家備禮物表文於家庭望闕再拜掌婚者奉至內東門詣內使前曰朝恩貺室於某官某之子某習先人之禮使臣某請納采以表跪授內使內使跪受奉進內殿執雁及禮物者從入內使出掌婚者曰將加卜筮使臣某問名進表如初內使出曰有制掌婚者跪內使宣曰皇帝第幾女封某公主掌婚者俯伏興入就次賜宴出納吉儀與納采同掌婚者致詞曰加諸卜筮占曰從吉謹使臣某敢告納徵壻家具玄纁玉帛乘馬表文如儀掌婚者致詞曰朝恩貺室於某官某之子某有先人之禮使臣某以束帛乘馬納徵請期詞曰某命臣某謹請吉日親迎日壻公服告廟曰國恩貺室於某以某日親迎敢告將行父醮於廳隨意致戒壻再拜出至內東門內內使延入次執雁及奉禮物者各陳於庭其日公主禮服辭奉先殿詣帝后前四拜受爵帝后隨意訓戒受命訖又四拜降階內命婦送至內殿門外公主升輦至內東門降輦壻揭簾公主升轎壻出次立執雁者以雁跪授壻壻受雁跪進於內使內使跪受以授左右壻再拜先出乘馬還公主鹵簿車輅後發公侯百官命婦送至府壻先候於門公主至壻揭簾公主降同詣祠堂壻東公主西皆再拜進爵讀祝又再拜出詣寢室壻公主相向再拜各就坐壻東公主西進饌合卺如儀復相向再拜明日見舅姑舅姑坐於東西向公主立於西東向行四拜禮舅姑答二拜第十日駙馬朝見謝恩行五拜禮初洪武九年太祖以太師李善長子祺為駙馬都尉尚臨安公主先期告奉先殿下嫁前二日命使册公主册後次日謁奉先殿又定駙馬受誥儀吏部官捧誥命置龍亭至太師府駙馬朝服拜受次日善長及駙馬謝恩後十日始請婚期二十六年稍更儀注然儀注雖存其拜姑舅及公主駙馬相向拜之禮終明之世實未嘗行也明年又更定公主郡主封號婚禮及駙馬儀賓品秩弘治二年册封仁和長公主重定婚儀入府公主駙馬同拜天地行八拜禮堂內設公主座於東西向駙馬東向座餘如前儀嘉靖二年工科給事中安磐等言駙馬見公主行四拜禮公主坐受二拜雖貴賤本殊而夫婦分定於禮不安不聽崇禎元年教習駙馬主事陳鍾盛言臣教習駙馬鞏永固駙馬黎明於府門外月臺四拜云至三月後則上堂上門上影壁行禮如前始視膳於公主前公主飲食於上駙馬侍立於旁過此方議成婚駙馬餽果肴書臣公主答禮書賜皆大失禮夫既合卺則儼然夫婦安有跪拜數月稱臣侍膳然後成婚者會典行四拜於合卺之前明合卺後無拜禮也以天子館甥下同隸役豈所以尊朝廷帝是其言令永固即擇日成婚凡選駙馬禮部榜諭在京官員軍民子弟年十四至十六容貌齊整行止端莊有家教者報名司禮內臣於諸王館會選不中則博訪於畿內山東河南選中三人欽定一人餘二人送本處儒學充廩生自宣德時駙馬始有教習用學官為之正統以後令駙馬赴監讀書習禮嘉靖六年始定禮部主事一人專在駙馬府教習品官婚禮周制凡公侯大夫士之婚娶者用六禮唐以後儀物多以官品為降殺明洪武五年詔曰古之婚禮結兩姓之歡以重人倫近世以來專論聘財習染奢侈其儀制頒行務從節儉以厚風俗故其時品節詳明皆有限制後克遵者鮮矣其制凡品官婚娶或為子聘婦皆使媒氏通書女氏許之擇吉納采主婚者設賓席至日具祝版告廟訖賓至女氏第主婚者公服出迎揖賓及媒氏入雁及禮物陳於廳賓左主右媒氏立於賓南皆再拜賓詣主人曰某官以伉儷之重施於某某率循典禮謹使某納采主婚者曰某之子弗羔天姆訓既辱采擇敢不拜嘉賓主西東相向坐徹雁受禮訖復陳雁及問名禮物賓興詣主婚者曰某官慎重婚禮將加卜筮請問名主婚者進曰某第幾女妻某氏出或以紅羅或以銷金紙書女之第行年歲賓辭主婚者請禮從者禮畢送賓至門外納吉如納采儀賓致詞曰某官承嘉命稽諸卜筮龜筮協從使某告吉主婚者曰某未教之女既以吉告其何敢辭納徵如納吉儀加玄纁束帛函書不用雁賓致詞曰某官以伉儷之重加惠某官率循典禮有不腆之幣敢請納徵主婚者曰某官貺某以重禮某敢不拜受賓以函書授主婚者主婚者亦答以函書請期亦如納吉儀親迎日壻父告於禰廟壻北面再拜立父命之曰躬迎嘉偶釐爾內治壻進曰敢不承命再拜媒氏導壻之女家其日女氏主婚者告廟訖醴女如家人禮壻至門下馬就大門外之次女從者請女盛服就寢門內南向坐壻出次主婚者出迎於門外揖而入主婚者入門而右壻入門而左執雁者從至寢戶前北面立主婚者立於戶東西向壻再拜奠雁出就次主婚者不降送壻既出女父母南向坐保母導女四拜父命之曰往之女家以順為正無忘肅恭母命之曰必恭必戒毋違舅姑之命庶母申之曰爾忱聽於訓言毋作父母羞保姆及侍女翼女出門升車儀衛導前送者乘車後壻先還以俟婦車至門出迎於門內揖婦入及寢門壻先升階婦從升入室壻盥於室之東南婦從者執巾進水以沃之婦盥於室之西北壻從者執巾進水以沃之盥畢各就座壻東婦西舉食案進酒進饌酒食訖復進如初侍女以卺注酒進於壻婦前各飲畢皆興立於座南東西相向皆再拜壻婦入室易服壻從者餕婦之餘婦從者餕壻之餘明日見宗廟設壻父拜位於東階下壻於其後主婦拜位於西階下婦於其後諸親各以序分立其日夙興壻父以下各就位再拜贊禮引婦至庭中北面立壻父升自東階詣神位前跪三上香三祭酒讀祝興立於西婦四拜退復位壻父降自西階就拜位壻父以下皆再拜禮畢次見舅姑其日婦立堂下伺舅姑即座就位四拜保姆引婦升自西階轗舅前侍女奉棗栗授婦婦進訖降階四拜詣姑前進腶修如前儀次舅姑醴婦如家人禮次盥饋其日婦家備饌至壻家舅姑即座婦四拜升自西階至舅前從者舉食案以饌授婦婦進饌執事者加匕筯進饌於姑亦如之食訖徹饌婦降階就位四拜禮畢舅姑再醴婦如初儀庶人婚禮禮云婚禮下達則六禮之行無貴賤一也朱子家禮無問名納吉止納采納幣請期洪武元年定制用之下令禁指腹割衫襟為親者凡庶人娶婦男年十六女年十四以上並聽婚娶壻常服或假九品服婦服花叉大袖其納采納幣請期略倣品官之儀有媒無賓詞亦稍異親迎前一日女氏使人陳設於壻之寢室俗謂之鋪房至若告詞醮戒奠雁合卺並如品官儀見祖禰舅姑舅姑醴婦亦略相準皇帝視學儀禮曰凡始立學者必釋奠於先聖先師周末淪喪禮廢不行漢明帝始幸辟雍唐以後天子視學始設講榻洪武十五年太祖將幸國子監議者言孔子雖聖乃人臣禮宜一奠而再拜太祖不從命禮部尚書劉仲質定其制前期設御幄於大成門東南向設御座於彝倫堂至日學官率諸生迎駕於成賢街左皇帝入御幄具皮辨服詣先師神位再拜獻爵復再拜四配十哲兩廡分獻如常儀皇帝入御幄易常服升輿至彝倫堂升座學官諸生五拜叩頭東西序立於堂下三品以上及侍從官以次入堂東西序立贊進講祭酒司業博士助教四人由西門入至堂中贊舉經案於御前禮部官奏請授經於講官祭酒跪受賜講官坐及以經置講案叩頭就西南隅几榻坐講賜大臣翰林儒臣坐皆叩頭序坐於東西諸生圜立以聽講畢叩頭退就本位司業博士助教各以次進講出堂門復位贊宣制學官諸生列班俱北面跪聽宣諭五拜叩頭禮畢學官諸生出成賢街送駕明日祭酒率學官上表謝恩永樂四年禮部尚書鄭賜引宋制請服鞾袍再拜帝不從仍行四拜禮進講畢賜百官茶禮部請立視學之碑帝親製文勒石祭酒等表謝帝御奉天門賜百官宴仍賜祭酒司業紵絲羅衣各二襲學官三十五人各紵絲衣一襲監生三千餘人各鈔五錠正統九年帝幸國子監如儀禮畢賜公侯伯駙馬武官都督以上文官三品以上及翰林學士至檢討國子監祭酒至學録宴先是視學祭先師不設牲不奏樂至成化元年始用牲樂視學之日樂設而不作禮畢百官慶賀賜衣服賜宴皆及孔顏孟三氏子孫弘治元年定先期致齋一日奠加幣牲用太牢改分獻官為分奠官嘉靖元年定衍聖公率三氏子孫祭酒率學官諸生上表謝恩皆賜宴於禮部十二年以先師祀典既正再視學命大臣致奠啓聖公祠萬曆四年定次日行慶賀禮賞如舊免賜宴初憲宗取三氏子孫赴京觀禮又命衍聖公分獻至世宗命衍聖公及顏孟二博士孔氏老成者五人顏孟各二人赴京陪祀經筵明初無定日亦無定所正統初始著為常儀以月之二日御文華殿進講月三次寒暑暫免其制勳臣一人知經筵事內閣學士或知或同知尚書都御史通政使大理卿及學士等侍班翰林院春坊官及國子監祭酒二員進講春坊官二員展書給事中御史各二員侍儀鴻臚寺錦衣衛堂上官各一員供事鳴贊一贊禮序班四舉案勳臣或駙馬一人領將軍侍衛禮部擇吉請先期設御座於文華殿設御案於座東稍南設講案於案南稍東是日司禮監先陳所講四書經史各一册置御案一册置講案皆四書東經史西講官各撰講章置册內帝升座知經筵及侍班等官於丹陛上五拜三叩頭後每講止行叩頭禮以次上殿東西序立序班二員舉御案於座前二員舉講案置御案南正中鴻臚官贊進講講官二員從東西班出詣講案前北向並立東西展書官各至御案南銅鶴下相向立鴻臚官贊講官拜興東班展書官詣御案前跪展四書退立於東鶴下講官至講案前立奏講某書講畢退展書官跪掩書仍退立鶴下西班展書官展經或史講官進講退如初鴻臚官贊講官拜興各退就東西班展書官隨之序班徹御案講案禮畢命賜酒飯各官出至丹陛行叩頭禮至左順門酒飯畢入行叩頭禮隆慶元年定先一日告奉先殿告几筵是日帝詣文華殿左室展禮先聖先師講章於前兩日先進呈覽萬曆二年定春講以二月十二日起至五月初二日止秋講以八月十二日起至十月初二日止不必題請日講日講御文華穿殿止用講讀官內閣學士侍班不用侍儀等官講官或四或六開讀初吉服五拜三叩首後常服一拜三叩首閣臣同侍於殿內候帝口宣先生來同進叩首東西立讀者先至御前一揖至案展書壓金尺執牙籤讀五過掩書一揖退先書次經次史進講如讀儀侍書官侍習書畢各叩頭退於文華殿賜茶文華門賜酒飯午講隆慶六年定每日早講畢帝進暖閣少閲章奏閣臣等退西廂房久之率講官再進午講講通鑑節要及貞觀政要講畢帝還宮凡三六九視朝日暫免講讀又嘉靖六年定制月三八日經筵日講官二員講大學衍義十年定無逸殿講儀質明帝常服乘輦至殿門衆官於門外迎候帝降輦乘板輿至殿升座各官於殿門外一拜三叩首入內東西序立贊進講講官大學士一員出班叩首命賜坐一叩首乃坐講畢展書官跪掩講章講官叩頭復班又學士一員承旨坐講如初禮畢各官至豳風亭候駕至亭內賜宴東宮出閣講學儀太祖命學士宋濂授皇太子諸王經於大本堂後於文華後殿世宗改為便殿遂移殿東廂天順二年定出閣儀是日早侍衛侍儀如常執事官於文華後殿四拜鴻臚官請皇太子升殿師保等官於丹陛上四拜各官退出內侍導皇太子至後殿升座以書案進侍班侍讀講官入分班東西立內侍展書侍讀講官以次進讀講叩頭而退其每日講讀儀早朝退後皇太子出閣升座不用侍衛等官惟侍班侍讀講官入行叩頭禮內侍展書先讀四書則東班侍讀官向前伴讀十數遍退復班次讀經或史則西班伴讀亦如之讀畢各官退至巳時各官入內侍展書侍講官講早所讀四書畢退班次講經史亦然講畢侍書官侍習寫字寫畢各官叩頭退凡讀書三日後一溫背誦成熟溫書之日不授新書凡寫字春夏秋日百字冬日五十字凡朔望節假及大風雨雪隆寒盛暑則暫停弘治十一年更定三師三少並宮僚於丹陛四拜畢從殿左右門入東西立候講讀畢叩頭退隆慶六年改設皇太子座於文華殿之東廂正中西向每日講讀各官先詣文華門外東西向序立候帝御日講經筵畢皇太子出閣升座凡東宮初講時閣臣連侍五日後每月三八日一至先拜出然後各官入崇禎十一年署禮部事學士顧錫疇言東宮嘉禮告成纍朝錫賚有據實録載成化十五年皇太子出閣講學六卿皆加保傅弘治十年皇太子出閣講學內閣徐溥等四人尚書馬文升等七人俱加宮保帝命酌議行之諸王讀書儀書堂在皇極門右廂講官選部曹或進士改授翰林官充之天順二年定初入書堂其日早王至右順門之北書堂面東中坐提督講讀並講讀官行四拜禮內官捧書展於案上就案左坐講讀官進立於案右伴讀十遍叩頭退每日講讀清晨王至書堂講讀官行叩頭禮伴讀十遍出飯後復詣堂伴看寫字講書畢仍叩頭退萬曆六年定書堂設中座書案在左寫字案在右輔臣率講讀侍書官候於門外王入書堂傳令旨先生進輔臣率各官入四拜分班侍立講讀官以次授書各十遍訖令旨先生喫酒飯各官出王暫入堂南間少輔臣各率官入令旨先生進遂入分班侍立待書官看寫字講讀以次進講畢各官一拜出
