body:
  text: 明史卷一百八十八列傳第七十六劉呂翀艾洪葛嵩趙佑朱廷聲等戴銑李光翰等陸崑薄彥徽等蔣欽周璽涂禎湯禮敬王渙何紹正許天錫周鑰等徐文溥翟唐王鑾張士隆張文明陳鼎等范輅張欽周廣曹琥石天柱劉字惟馨涪州人弘治十二年進士授戶科給事中劾戶部尚書鍾縱子受賕論外戚慶雲侯壽寧侯家人侵牟商利阻壞鹺法又論文選郎張綵顛倒銓政有直聲武宗踐阼未數月漸改孝宗之政疏諫曰先帝大漸召閣臣劉健李東陽謝遷於榻前託以陛下今梓宮未葬德音猶存而政事多乖號令不信張瑜劉文泰方藥弗慎致先帝升遐不即加誅容其奏辨中官劉瑯貽害河南宜按治僅調之薊州戶部奏汰宂員兵部奏革傳奉疏皆報罷夫先帝留健等輔陛下乃近日批答章奏以恩侵法以私揜公是閣臣不得與聞而左右近習陰有干預矣願遵遺命信老成政無大小悉咨內閣庶事無壅蔽權不假竊報聞正德元年吏部尚書馬文升致仕廷議推補御史王時中以閔珪劉大夏不宜在推舉之列恐耆德益疎上疏極論其謬章下所司是言詔為飭言官毋挾私妄奏孝宗在位時深悉內臣出鎮之害所遣皆慎選劉瑾竊柄盡召還之而代以其黨言用新人不若用舊人猶養饑虎不若養飽虎不聽尋與給事中張文等極言時政缺失五事忤旨奪俸三月劉健謝遷去位與刑科給事中呂翀各抗章乞留語侵瑾先是兵科都給事中艾洪劾中官高鳳姪得林營掌錦衣衞諸疏傳至南京守備武靖伯趙承慶所應天尹陸珩錄以示諸僚兵部尚書林瀚聞而太息於是給事中戴銑御史薄彥徽等各馳疏極諫請留健遷瑾等大怒矯旨逮銑彥徽等下詔獄鞫治並翀洪俱廷杖削籍承慶停半祿閒住瀚珩貶秩致仕既而列健遷等五十三人為奸黨及翀洪並預焉瑾敗起金華知府舉治行卓異未及遷輒告歸嘉靖初起知長沙遷江西副使卒御史范永奎訟於朝特予祭葬呂翀廣信永豐人弘治十二年進士其請留健遷言二臣不可聽去者有五孔子稱孟莊子之孝以不改父之臣為難二臣皆先帝所簡以遺陛下今陵土未乾無故罷遣何以慰在天之靈不可一也二臣雖以老疾辭實由言違計沮不得其職而去陛下聽之亦以其不善將順非實有意優老也在二臣得去就之義在陛下有棄老成之嫌不可二也今民窮財殫府藏虛罄水旱盜賊星象草木之變迭見雜出萬一禍生不測國無老成誰與共事不可三也自古剛正者難容柔順者易合二臣既去則柔順之人必進將一聽陛下所為非國家之福不可四也書曰無遺壽耉健等諳練有素非新進可侔今同日去國天下後世將謂陛下喜新進而厭舊人不可五也既削籍歸後起雲南僉事遷四川副使修成都江堰以資灌溉水利大興嘉靖初卒艾洪濱州人弘治九年進士授兵科給事中武宗立詔清覈騰驤諸衞及在京七十二衞軍給事中葛嵩剔抉無所徇得各監局占役者七千五百餘人有旨送各營備操既而中官魏興蕭壽等撓之格不行洪率同官抗論竟不能得又劾英國公張懋懷寧侯孫應爵新寧伯譚佑彭城伯張信並請斥陝西鎮監劉雲薊州鎮監劉瑯不聽雲尋調南京守備乞以其養子偉為錦衣千戶洪復率同官劾之事乃寢洪在兵科久諫疏多可稱削籍後復罰米二百石輸宣府後起官終福建左參政葛嵩字鍾甫無錫人弘治十二年進士由行人擢禮科給事中閱薊州軍儲核貴戚所侵地歸之民正德初以釐營弊力抗權倖請出先朝宮人諫射獵因劾魏國公徐俌又偕九卿請誅劉瑾瑾怒斥為奸黨罷歸趙佑字汝翼雙流人弘治十二年進士由繁昌知縣召為御史正德元年六月災異求言佑上言太監劉瑾丘聚馬永成輩日獻鷹犬導騎射萬一有銜之變豈不為兩宮憂鎮守內臣鄧原麥秀頗簡靜而劉璟梁裕擠代之戶部議馬房草場召民佃種甯瑾竟自奏止李興擅伐陵木已坐大辟乃欲賂左右祈免他如南京守備劉雲倉場監督趙忠韋雋段循俱夤緣增設乞置瑾等於法罷璟裕毋遣而汰革額外宂員自今政事必諮大臣臺諫不為近習所搖則災變自弭奏入羣奄大恨帝將大婚詔取太倉銀四十萬兩佑言左右以婚禮為名將肆無厭之欲計臣懼禍而不敢阻閣臣避怨而不敢爭用如泥沙坐致耗國不幸興師旅遘饑饉將何以為計哉九月宛平郊外李花盛開佑言此陰擅陽權非偶然也帝皆不納是時中官益橫佑與同官朱廷聲徐鈺交章極論章下閣議將重罪中官事忽中變劉健謝遷去位瑾遂大逐廷臣忤己者指佑與廷聲鈺及陳琳潘鏜等為奸黨勒罷之瑾誅佑用薦起山西僉事卒朱廷聲字克諧進賢人弘治十二年進士嘉靖中終刑部右侍郎徐鈺字用礪江夏人弘治九年進士終四川左布政使陳琳字玉疇莆田人弘治九年進士由庶吉士改御史上端本修政十五事出督南畿學政劉瑾逐健遷逮戴銑陸崑等琳抗章言南京窮冬雷震正旦日食正宜修德弭災委心元寮博采忠言豈宜自棄股肱隔塞耳目瑾大怒謫揭陽丞瑾敗遷嘉興同知世宗時終南京兵部右侍郎潘鏜字宗節六安人弘治九年進士有孝行為滿城知縣憂歸繼知滑縣擢御史陳時務大計四事孝宗嘉納之正德初以論高鳳為中人所惡傳旨鏜黨太監王岳除其名八年起廣東僉事謝病歸戴銑字寶之婺源人弘治九年進士改庶吉士授兵科給事中數有建白久之以便養調南京戶科武宗嗣位偕同官請敕六科檢詳弘治間所行進賢退奸節財訓兵重祀慎刑救災恤困諸大政備錄進覽凡裁決機務悉以為準報聞踰月言四方歲辦多非土產勞費滋甚宜蠲其所無又請勤御經筵俾密勿大臣從容獻納既乃與給事中李光翰徐蕃牧相任惠徐暹及御史薄彥徽等連章奏留劉健謝遷且劾中官高鳳帝怒逮繫詔獄廷杖除名銑創甚遂卒世宗立追贈光祿少卿李光翰新鄉人弘治十二年進士授南京戶科給事中正德改元災異求言光翰偕同官疏劾太監苗逵高鳳李榮及保國公朱暉且言大學士劉健等疏陳鹽法事留中不報將使老臣不安其位帝不省既削籍歸後起台州知府與蕃同舉治行卓異尋卒徐蕃泰州人弘治六年進士授南京禮科給事中武宗嗣位復先朝所汰諸宂費番等力爭不納後起江西參議從都御史陳金討平東鄉寇嘉靖時累官工部右侍郎牧相餘姚人弘治十二年進士授南京兵科給事中論救宣府都御史雍泰又公疏請罷禮部尚書崔志端等皆不聽正德元年奉命與御史呂鏜清查御馬監因陳濫役濫費之弊及太監李棠扞詔旨營私罪至是受杖歸授徒養母後復官擢廣西參議命下相已前卒任惠灤州人弘治九年進士由行人擢南京吏科給事中正德元年九月偕同官諫佚遊語切直後起山東僉事未任卒徐暹歷城人弘治十五年進士武宗即位擢南京工科給事中正德改元因災異上言七事且請斥英國公張懋尚書張昇等撤諸添註內官明正張瑜劉文泰用藥失宜致悞先帝及太監李興擅伐陵木新寧伯譚佑侍郎李鐩同事不舉之罪帝下之所司後起山西僉事進副使平巨盜混天王民德之卒於官陸崑字如玉歸安人弘治九年進士授清豐知縣以廉幹徵擢南京御史武宗即位疏陳重風紀八事一奬直言古者臣下不匡其刑墨宋制御史入臺踰十旬無言有辱臺之罰今郎署建言如李夢陽楊子器輩當加旌擢而言官考績宜以章疏多寡及當否為殿最二復面劾舊制御史上殿被劾者趨出待罪即唐人對仗讀彈文遺意近率封章奏聞批答未行彌縫先入乞遵舊典面奏立取睿裁三明淑慝尚書劉大夏王軾以病乞休侍郎張元禎陳清屢劾不去賢不肖倒置實治亂消長之關宜勉留二人放元禎等還田里四覈命令近者言妨左右頻見留中事涉所私輒收成命乞令諸曹章奏俱具數送閣已行者得考稽未行者易奏請五養銳氣御史與都御史例得互相糾繩行事不宜牽制六均差遣御史以南北為限顯分重輕自今除巡按面命外其他差遣及遷轉資格宜均擬上請以示一體七專委任河南道有考覈之責請擇人專任八勵庶官郎中田岩姚汀張憲員外郎李承勛胡世寧張嵿顧璘等二十人皆宜顯擢章下所司又劾中官高鳳苗逵保國公朱暉因請汰南京增設守備內臣廣開言路屏絕宴遊騎射帝不能從時八黨竊柄朝政日非崑偕十三道御史薄彥徽葛浩貢安甫王蕃史良佐李熙任諾姚學禮張鳴鳳蔣欽曹黃昭道王弘蕭乾元等上疏極諫曰自古奸臣欲擅主權必先蠱其心志如趙高勸二世嚴刑肆志以極耳目之娛和士開說武成毋自勤約宜及少壯為樂仇士良教其黨以奢靡導君勿使親近儒生知前代興亡之故其君惑之卒皆受禍陛下嗣位以來天下顒然望治乃未幾寵倖奄寺顛覆典刑太監馬永成魏彬劉瑾傳興羅祥谷大用輩共為蒙蔽日事宴遊上干天和災祲疊告廷臣屢諫未蒙省納若輩必謂宮中行樂何關治亂此正奸人欺君之故術也陛下廣殿細旃豈知小民窮簷蔀屋風雨之不庇錦衣玉食豈知小民祁寒暑雨凍餒之弗堪馳騁宴樂豈知小民疾首蹙頞赴訴之無路昨日雷震郊壇彗出紫微夏秋亢旱江南米價騰貴京城盜賊橫行可恣情縱欲不一顧念乎閣部大臣受顧命之寄宜隨事匡救弘濟艱難言之不聽必伏闕死諫以悟聖意顧乃怠緩悅從巽順退託自為謀則善矣如先帝付委天下屬望何伏望側身修行亟屏永成輩以絕禍端委任大臣務學親政以還至治疏至朝事已變劉健謝遷皆被逐於是彥徽為首復上公疏請留健遷而罪永成瑾等瑾怒悉逮下詔獄各杖三十除名昭道弘乾元逮捕未至命即南京闕下杖之江西清軍御史王良臣聞崑等被逮馳疏救並逮下詔獄杖三十斥為民後列奸黨五十三人崑彥徽等並與焉瑾誅復崑官致仕世宗初起用未行而卒薄彥徽陽曲人弘治九年進士授四川道御史嘗劾崔志端以羽士玷春卿有直聲至是被杖歸未及起官卒葛浩字天宏上虞人弘治九年進士由五河知縣擢御史數陳時政闕失孝宗多采納正德元年帝允司禮中官高鳳請令其從子得林掌錦衣衞事浩等爭之言先帝詔錦衣官悉由兵部推舉陛下亦悉罷傳奉乞官今得林由傳奉不關兵部廢先帝命壞銓舉法虛陛下詔一舉三失由鳳致之乞治鳳罪而罷得林御史潘鏜亦言鳳得林操中外大柄中人效尤弊將安底帝皆不聽浩既削籍瑾憾未釋復坐先所劾武昌知府陳晦不實與安甫蕃熙學禮崑六人逮杖闕下瑾誅起浩知邵武府入覲陳利弊五事悉施行嘉靖中歷官兩京大理卿帝郊祀有犯蹕者法司欲置重典浩執奏得不死十年夏雷震午門自劾致仕歸年九十二卒貢安甫字克仁江陰人弘治九年進士授長垣知縣孝宗時擢御史嘗疏劾壽寧侯張鶴齡正德初考功郎楊子器以山陵事下詔獄安甫疏力救兵部尚書劉大夏為中官所扼謝病去戶部侍郎陳清遷南京工部尚書安甫率御史請還大夏而罷清報聞彥徽等公疏安甫筆也瑾知之故列奸黨以安甫首南御史家居十年終歲不入城市後起山東僉事甫三月引疾歸史良佐字禹臣亦江陰人弘治十二年進士由行人擢御史後起雲南副使平十八寨苗賜白金文綺濬海口溉田千頃滇人頌之李熙上元人弘治九年進士由將樂知縣擢御史十八年奸人徐俊等造謠言帝遣官齎駕帖至南京有所捕治已而知其妄熙公疏言陛下於此事威與明少損矣儻奸人效尤妄以蜚語中善類害何可勝言事下法司亦力言駕帖之害帝納之正德元年九月以災異復偕御史陳十事瑾誅得禍者皆起熙獨廢世宗嗣位始起饒州知府遷浙江副使以清操聞姚學禮巴人家京師弘治六年進士正德元年公疏諫佚遊不納後起雲南僉事終參議張鳴鳳清平人弘治九年進士為永康知縣有政績擢御史後起湖廣僉事進副使母憂歸卒蔣欽杖死別有傳曹閔上海人弘治九年進士為沙縣知縣被徵民號泣攀留累日不得去既與崑等同得罪後當起官以養母不出母終枕塊得寒疾卒黃昭道平江人弘治十二年進士後起廣西僉事再遷雲南參政撫木邦孟密有功終左布政使王弘六合人弘治六年進士蕭乾元萬安人弘治十二年進士王蕃任諾鞫獄時抵不與知不足載王良臣陳州人弘治六年進士官南京御史瑾誅起山東副使終按察使蔣欽字子修常熟人弘治九年進士授衞輝推官徵擢南京御史數有論奏正德元年劉瑾逐大學士劉健謝遷欽偕同官薄彥徽等切諫瑾大怒逮下詔獄廷杖為民居三日欽獨具疏曰劉瑾小豎耳陛下親以腹心倚以耳目待以股肱殊不知瑾悖逆之徒蠹國之賊也忿臣等奏留二輔抑諸權奸矯旨逮問予杖削職然臣思畎畝猶不忘君況待命袵席目擊時弊烏忍不言昨瑾要索天下三司官賄人千金甚有至五千金者不與則貶斥與之則遷擢通國皆寒心而陛下獨用之於左右是不知左右有賊而以賊為腹心也給事中劉指陛下闇於用人昏於行事而瑾削其秩撻辱之矯旨禁諸言官無得妄生議論不言則失於坐視言之則虐以非法通國皆寒心而陛下獨用之於前後是不知前後有賊而以賊為耳目股肱也一賊弄權萬民失望愁歎之聲動徹天地陛下顧懵然不聞縱之使壞天下事亂祖宗法陛下尚何以自立乎幸聽臣言急誅瑾以謝天下然後殺臣以謝瑾使朝廷一正萬邪不能入君心一正萬欲不能侵臣之願也今日之國家乃祖宗之國家也陛下苟重祖宗之國家則聽臣所奏如其輕之則任瑾所欺疏入再杖三十繫獄越三日復具疏曰臣與賊瑾勢不兩立賊瑾蓄惡已非一朝乘間起釁乃其本志陛下日與嬉遊茫不知悟內外臣庶如冰淵臣昨再疏受杖血肉淋漓伏枕獄中終難自默願借上方劍斬之朱雲何人臣肯少讓陛下試將臣較瑾瑾忠乎臣忠乎忠與不忠天下皆知之陛下亦洞然知之何仇於臣而信任此逆賊耶臣骨肉都銷涕泗交作七十二歲老父不顧養矣臣死何足惜但陛下覆國喪家之禍起於旦夕是大可惜也陛下誠殺瑾梟之午門使天下知臣欽有敢諫之直陛下有誅賊之明陛下不殺此賊當先殺臣使臣得與龍逢比干同遊地下臣誠不願與此賊並生疏入復杖三十方欽屬草時燈下微聞鬼聲欽念疏上且掇奇禍此殆先人之靈欲吾寢此奏耳因整衣冠立曰果先人盍厲聲以告言未已聲出壁間益悽愴欽歎曰業己委身義不得顧私使緘默負國為先人羞不孝孰甚復坐奮筆曰死即死此不可易也聲遂止杖後三日卒於獄年四十九瑾誅贈光祿少卿嘉靖中賜祭葬錄一子入監周璽字天章廬州衞人弘治九年進士授吏科給事中三遷禮科都給事中慷慨好言事武宗初即位請毀新立寺觀屏逐法王真人停止醮事並論前中官齊玄煉丹糜金罪頃之以久雨偕同官劾侍郎李溫太監苗逵九月以星變復劾溫及尚書崔志端熊翀賈斌都御史金澤徐源等翀溫澤因是罷帝遣中官韋興守鄖陽璽力言不可尋復偕同官言邇者聰明日蔽膏澤未施講學一暴而十寒詔令朝更而夕改宂員方革復留鎮監撤還更遣解戶困於交收鹽政壞於陳乞厚戚畹而駕帖頻頒私近習而帑藏不覈不可不亟為釐正不聽正德元年復應詔陳八事中劾大寮賈斌等十一人中官李興等三人勳戚張懋等七人邊將朱廷解端李稽等三人未幾言陛下即位以來鷹犬之好糜費日甚如是不已則酒色游觀便佞邪僻凡可以悅耳目蕩心志者將無所不至光祿上供視舊十增七八新政已爾何以克終御史何天衢等亦以為言章下禮部尚書張昇請從之帝雖不加譴不能用也明年擢順天府丞璽論諫深切率與中官牴牾劉瑾等積不能堪至是命璽與監丞張淮侍郎張縉都御史張鸞錦衣都指揮楊玉勘近縣皇莊玉瑾黨三人皆下之璽辭色無假且公移與玉止牒文玉奏璽侮慢敕使瑾即矯旨逮下詔獄搒掠死瑾誅詔復官賜祭恤其家嘉靖初錄一子又御史涂禎新淦人也弘治十二年進士初為江陰知縣正德初巡鹽長蘆瑾縱私人中鹽又命其黨畢真託取海物侵奪商利禎皆據法裁之比還朝遇瑾止長揖瑾怒矯旨下詔獄江陰人在都下者謀斂錢賂瑾解之禎不可喟然曰死耳豈以汙父老哉遂杖三十論戍肅州創重竟死獄中瑾怒未已取其子樸補伍瑾誅樸乃還禎復官賜祭湯禮敬字仁甫丹徒人弘治九年進士授行人擢刑科給事中正德初上言陛下踐阼以來上天屢示災譴不謹天戒惟走馬射獵遊樂無度頃四月中旬雷電雨雹當六陽用事時陰氣乃與之抗此倖臣竊權忠鯁疎遠之應也已又論兩廣鎮監韋經又偕九卿伏闕請誅八黨劉瑾銜之尋以其請當審奏囚決之日有愬冤者屏勿奏指為變祖制謫薊州判官後列奸黨給事中十六人禮敬居首罷歸未幾卒瑾惡言官譏切時政多刺己輒假他事坐之禮敬得罪後有王渙何紹正王渙字時霖象山人弘治九年進士由長樂知縣徵授御史正德元年應詔條上應天要道五事語多斥宦官明年出視山海諸關以病謝事未行盜發其部內都御史劉宇承瑾指劾渙失報逮下詔獄杖之斥為民瑾敗復官致仕何紹正淳安人弘治十五年進士授行人正德三年擢吏科給事中中官廖堂鎮河南奏保方面數人且擅擬遷調吏部尚書許進等不能難紹正劾之瑾不得已責堂自陳而心甚銜紹正及冬坐頒曆導駕失儀杖之闕下謫海州判官屢遷池州知府築銅陵五十餘圩以備旱潦宸濠反攻安慶池人震恐紹正登陴固守事平增俸一級遷江西參政致仕池人為立祠與宋包拯並祀許天錫字啟衷閩縣人弘治六年進士改庶吉士思親成疾陳情乞假孝宗賜傳以行還朝授吏科給事中時言官何天衢倪天明與天錫並負時望都人有臺省三天之目十二年建安書林火天錫言去歲闕里孔廟災今茲建安又火古今書版蕩為灰燼闕里道所從出書林文章所萃聚也春秋書宣榭火說者曰榭所以藏樂器也天意若曰不能行政令何以禮樂為禮樂不行天故火其藏以戒也頃師儒失職正教不修上之所尚者浮華下之所習者枝葉此番災變似欲為儒林一掃積垢宜因此遣官臨視刊定經史有益之書其餘晚宋陳言如論範論草策略策海文衡文髓主意講章之類悉行禁刻其於培養人才實非淺鮮所司議從其言就令提學官校勘大同失事天錫往核具得其狀巡撫洪漢中官劉雲總兵官王璽以下咸獲罪內使劉雄怒儀真知縣徐淮廚傳不飭愬之南京守備中官以聞逮淮繫詔獄天錫及御史馮允中論救卒調淮邊縣御史文森張津曾大有言事下吏崔志端由道士擢尚書天錫皆力爭十七年五月天變求言上疏曰外官三年考察又有撫按監臨科道糾劾其法已無可加惟兩京堂上官例不考覈而五品以下雖有十年考察之條居官率限九載或年勞轉遷或服除改補不能及期今請以六年為期通行考察其大寮曾經彈劾者悉令自陳而簡去之用儆有位古者災異策免三公陰霖輒避位今大臣不引咎陛下又不行策免宜且革公孤銜俟天心既回徐還厥職祖宗御內官恩不泛施法不輕貸內府二十四監局及在外管事者並有常員近年諸監局掌印僉事多至三四十人他管事無數留都亦然憑陵奢暴蠹蝕民膏第宅連雲田園遍野膏粱厭於輿臺文繡被乎狗馬凡若此類皆足召變乞敕司禮監會內閣嚴行考察以定去留此後或三年五年一行永為定制帝善之於是令兩京四品以上並自陳聽命五品下六年考察遂著為令惟大臣削公孤及內官考察事格不行尋與御史何深覈牛馬房條上便利十四事歲省芻豆費五十餘萬武宗即位之七月因災異上疏請痛加修省廣求直言遷工科左給事中正德元元奉使封安南在道進都給事中三年春竣事還朝見朝事大變敢言者皆貶斥而劉瑾肆虐加甚天錫大憤六月朔清覈內庫得瑾侵匿數十事知奏上必罹禍乃夜具登聞鼓狀將以尸諫令家人於身後上之遂自經時妻子無從者一童侍側匿其狀而遁或曰瑾懼天錫發其罪夜令人縊殺之莫能明也時有旨令錦衣衞點閱六科給事中不至者劾之錦衣帥劾天錫三日不至訊之死矣聞者哀之方瑾用事橫甚尤惡諫官懼禍者往往自盡海陽周鑰弘治十五年進士為兵科給事中勘事淮安與知府趙俊善俊許貸千金既而不與時奉使還者瑾皆索重賄鑰計無所出舟行至桃源自刎從者救之已不能言取紙書趙知府悞我遂卒事聞繫俊至京責鑰死狀竟坐俊罪平定郗夔弘治十五年進士為禮科給事中正德五年出覈延綏戰功瑾屬其私人夔念從之則違國典不從則得禍遂自經死瓊山馮顒弘治九年進士為御史嘗以事忤瑾為所誣自經死顒初為主事官軍討叛黎符南蛇久不克顒歷陳致變之由請購已革土官子孫俾召集舊卒以夷攻夷有功則復舊職尚書劉大夏亟稱之奏行其策正德初偕中官高金勘涇王所乞莊地清還二千七百餘頃而不得其死人皆惜之瑾誅天錫鑰夔顒俱復官賜祭且恤其家嘉靖中天錫子春訟冤復賜祭葬方瑾敗時刑部員外郎夾江宿進疏陳六事言忤逆瑾死者內臣如王岳范亨言官如許天錫周鑰並宜卹贈又附瑾大臣如兵部尚書王敞等及內侍餘黨俱宜斥疏入帝怒將親鞫之命張永召閣臣李東陽東陽語永曰後生狂妄且日暮非見君時幸少寬之永入少頃執進至午門杖五十削籍歸未幾卒世宗初贈光祿少卿徐文溥字可大開化人正德六年進士授南京禮科給事中劾尚書劉櫻都御史李士實侍郎呂獻大理卿茆欽而請召還致仕尚書孫交傅珪時論以為當寧王宸濠求復護衞文溥諫曰曩因寧藩不靖英廟革其護衛屯田及逆瑾亂政重賄謀復瑾既伏誅陛下又革之正欲制以義而安全之耳乃曰驅使乏人夫晏居深邃靡征討之勞安享尊榮無居守之責何所用而乏人且王暴行大彰剝削商民挾制官吏招誘無賴廣行劫掠致舟航斷絕邑里蕭條萬民莫不切齒及今止之猶恐不逮顧可縱之加恣假翼於虎乎貢獻本有定制乃無故馳騁飛騎出入都城伺察動靜況今海內多故天變未息意外之虞實未易料宜裁以大義勿徇私情罪其獻謀之人逐彼偵事之使宗社幸甚時宸濠奧援甚衆疏入人咸危之帝但責其妄言而已又請擇建儲貳不報十年四月復偕同官上疏曰頃因災異禮部奏請修省伏讀聖諭謂事關朕躬者皆已知之臣惟茲一念之誠足以孚上帝迓休命矣雖然知之非艱行之維艱陛下誠能經筵講學早朝勤政布寬恤以安人心躬獻享以重宗廟孝養慈闈敬事蒼昊舍豹房而居大內遠嬖倖而近儒臣禁中不為貿易皇店不以罔財還邊兵於故伍斥番僧於外寺毋昵俳優盡屏義子馬氏已醮之女弗留乎後宮馬昂梟獍之族立奪其兵柄停諸路之織造罷不急之土木汰倉局門戶之內官禁水陸舟車之進奉出留中奏牘以達下情省傳奉宂員以慎名器則陛下所謂事關朕躬非徒知之且一一行之而不轉禍為福者未之有也報聞初帝聽中官崔瑤史宣劉瑯于喜誣奏先後逮知府翟唐部曹王鑾王瑞之御史施儒張經等又入中官王堂譖下僉事韓邦奇獄文溥言朝廷刑威所及乃在奄侍一言旗校繹絡於道途縉紳駢首於狴犴遠近震駭上下屏氣向一瑾亂政於內今數瑾縱橫於外乞幷下堂法司且追治瑤等誣罔罪帝不聽遂引疾去世宗即位廷臣交薦起河南參議未幾以念母乞歸撫按請移近地便養乃改福建尋遷廣東副使上言十事多涉權要恐貽母憂復引疾歸行至玉山卒翟唐字堯佐長垣人弘治十二年進士由壽光知縣召為御史正德四年出按湖廣奏言四川賊首劉烈僭號設官必將為大患湖廣陝西壤地相接入竹山可抵荊襄入漢中可抵秦隴今內外壅蔽奬諭切責率皆虛文宜切圖預備之策時劉瑾竊柄以唐言壅蔽尤惡之兵部尚書王敞希指言今盪滌宿弊唐乃云然宜令指實會瑾怒稍解乃切責而宥之久之遷知寧波府市舶中官崔瑤藉貢物擾民為唐所裁抑且杖其黨王臣臣尋病死瑤奏唐阻截貢獻笞殺貢使帝怒逮下詔獄巡按御史趙春等交章救之給事中范洵亦言唐被逮日軍民遮道涕泣請宥令還任帝不聽謫雲南嵩明知州再遷陝西副使卒王鑾字廷和大庾人正德三年進士授邵武知縣入為都水主事出轄徐沛牐河十一年織造中官史宣過其地索輓夫千人沛縣知縣胡守約給其半宣怒自至縣捕吏鑾助守約與抗宣誣奏於朝逮繫詔獄以言官論救守約罷官鑾輸贖還職已分司南旺又捕誅中官廖堂姪廖鵬之黨嘉靖初遷武昌知府鎮守中官李景儒歲進魚鮓多科率鑾疏請罷之楚府征稅茶商重困鑾謂稅當歸官力與爭王詆為毀辱親王鑾遂請終養不待報竟歸後吏部坐以擅離職守奪官張士隆字仲修安陽人弘治八年舉鄉試入太學與同縣崔銑及寇天馬卿呂柟輩相砥礪以學行聞十八年成進士授廣信推官正德六年入為御史巡鹽河東劾去貪汙運使劉愉建正學書院興起文教九年乾清宮災上疏曰陛下前有逆瑾之變後遭薊盜之亂猶不知警方且興居無度狎暱匪人積戎醜於禁中戲干戈於臥內徹旦燕遊萬幾不理寵信內侍濁亂朝綱致民困盜起財盡兵疲禍機潛蓄恐大命難保夫裒衣博帶之雅孰與市井狡儈之羣廣厦細之娛孰與鞍馬驅馳之險不報出按鳳陽織造中官史宣列黃梃二於騶前號為賜棍每以抶人有至死者自都御史以下莫敢問士隆劾奏之又劾錦衣千戶廖鎧奸利事且曰鎧虐陝西即其父鵬虐河南故習也河南以鵬故召亂鎧又欲亂陝西乞置鎧父子於法幷召還廖鑾以釋陝人之憤鑾鎧所從鎮陝西者也錢寧素暱鎧見疏大恨遂因士隆按薛鳳鳴獄以陷之鳳鳴者寶坻人先為御史坐罪削籍諂事諸佞倖尤善寧與從弟鳳翔有隙嗾緝事者發其私下吏論死刑部疑有冤幷捕鞫鳳鳴鳳鳴懼使其妾訴枉自剄長安門外詞連寶坻知縣周在及素所讐者數十人悉逮付法司而鳳鳴得釋士隆與御史許完先後按治復捕鳳鳴對簿釋在還職寧怒令鳳鳴女告士隆完治獄偏枉遂下詔獄謫士隆晉州判官久之擢知州世宗立詔復故官出為陝西副使漢中賊王大等匿豪家結回回為亂士隆下令匿賊者罪及妻孥無赦賊無所容遂就擒滅築堰溉田千頃民利之卒於官張文明字應奎陽曲人正德六年進士授行人擢御史巡按遼東尋按陝西鎮守中官廖堂貪恣文明捕治其爪牙二十四人堂大恨十三年車駕幸延綏文明馳疏諫極陳災異且言江彬逢惡導非亟宜行誅朝臣匡救無聞亦當罰治帝不省既而文明朝行在諸權倖扈從者文明裁抑之所需多不應司禮太監張忠等譖於帝言諸生毆旗校文明縱勿治帝怒命械赴京師下詔獄明年春言官交章請宥不報比駕旋命執至豹房帝將親鞫文明自謂必死及見帝命釋之謫電白典史時劉瑾雖誅佞幸猶熾中外諫官被禍者不可勝數文明止於貶謫人以為幸世宗立召復故官尋出為松江知府甫抵任卒巡按御史馬錄頌其忠詔贈太常少卿陳鼎字大器其先宣城人高祖尚書迪死惠帝之難子孫戍登州衞遂占籍焉鼎舉弘治十八年進士正德四年授禮科試給事中鎮守河南中官廖堂福建人也弟鵬之子鎧冒籍中河南鄉試物議沸騰畏堂莫敢與難鼎上章發其事鎧遂除名堂鵬大恨會流寇起鼎陳弭盜機宜堂囑權倖摘其語激帝怒下詔獄掠治謂鼎前籍平江伯貲產附劉瑾增估物價疑有侵盜尚書楊一清救之乃釋為民世宗立復故官遷河南參議妖人馬隆等為亂鼎督兵誅之改陝西副使擢浙江按察使廉介正直不通私謁召為應天府尹未任卒賀泰字志同吳縣人弘治十二年進士由衢州府推官入為御史武宗收京師無賴及宦官厮養為義子一日而賜國姓者百二十七人泰抗言其非諸人激帝怒謫衢州推官終廣東參議張璞字中善江夏人弘治十八年進士由歸安知縣召授御史正德八年出按雲南鎮守中官梁裕貪橫璞裁抑之為所誣逮赴詔獄死獄中世宗嗣位贈太僕少卿賜祭葬成文大同山陰人弘治十五年進士由知縣擢御史正德中阿爾禿厮亦不剌與小王子戰敗引所部駐甘肅塞外時入寇掠陷堡砦五十有三巡撫張翼鎮守太監朱彬等反冒奏首功千九百有餘以捷奏者十有一文出巡按盡發其奸翼等賄中人傾文會文劾僉事趙應龍應龍亦訐文細事遂逮文斥為民嘉靖中起用累官右副都御史巡撫遼東告歸卒李翰臣大同人正德三年進士官御史巡按山東吏部主事梁穀誣歸善王當沍謀叛翰臣劾穀挾私近倖方欲邀功責翰臣為叛人掩飾逮繫詔獄謫德州判官終山東副使張經興州左衞人正德六年進士官御史出按宣府劾鎮守中官于喜貪肆罪為喜所訐逮繫詔獄謫雲南河西典史尋卒世宗初贈祭如張璞毛思義陽信人弘治十五年進士官永平知府正德十三年駕幸昌平民間婦女驚避思義下令言大喪未舉車駕必不遠出非有文書妄稱駕至擾民者治以法鎮守中官郭原與思義有隙以聞立逮下詔獄繫半歲謫雲南安寧知州嘉靖中累遷副都御史應天巡撫胡文璧耒陽人弘治十二年進士正德初由戶部郎中改御史出知鳳陽遷天津副使中官張忠督直沽皇莊縱羣小牟利文璧捕治之為所搆械繫詔獄謫延安府照磨嘉靖初累官四川按察使王相光山人正德三年進士官御史十二年巡按山東鎮守中官黎鑑假進貢苛斂相檄郡縣毋輒行鑑怒誣奏於朝逮繫詔獄謫高郵判官未幾卒嘉靖初贈光祿少卿董相嵩縣人正德六年進士官御史巡視居庸諸關江彬遣小校米英執人於平谷恃勢橫甚相收而杖之將以聞彬遽譖於帝械繫詔獄謫判徐州嘉靖初召復故官終山東副使劉士元彭縣人正德六年進士官御史巡按畿輔十三年帝獵古北口將招朵顏衞花當把兒孫等燕勞士元陳四不可先是帝幸河西務指揮黃勳假供奉擾民士元按之勳懼逃赴行在因嬖倖譖於帝云士元聞駕至令民間盡嫁其女藏匿婦人帝怒命裸縛面訊之野次無杖取生柳榦痛笞之四十幾死囚檻車馳入京幷執知縣曹俊等十餘人同繫詔獄都御史王璟及科道陳霑牛天麟等交章論救不報謫麟山驛丞世宗立復故官出為湖州知府遷湖廣副使修荒政積粟百萬餘石事聞被旌勞嘉靖九年屢遷右副都御史巡撫貴州居三年罷范輅字以載桂陽人正德六年進士授行人除南京御史武宗久無子輅偕同官請擇宗室賢者育宮中以宋仁宗為法不報先後劾中官黎安劉瑯及衞官簡文王忠罪又論馬姬有娠不當入宮語皆切直尋命清軍江西寧王宸濠令諸司以朝服見輅不可奏言高帝定制王府屬僚稱官後乃稱臣其餘文武及京官出使者皆稱官朝使相見以便服今天下王府儀注制未畫一臣以為尊無二上凡不稱臣者皆不宜具朝服以嚴大防章下禮官議宸濠馳疏爭之廷議請如輅言宸濠伶人秦榮僭侈輅劾治之又劾鎮守太監畢真貪虐十五事疏留不下真乃摭他事誣之遂逮下詔獄值帝巡幸淹繫經年至十四年四月始謫龍州宣撫司經歷未幾宸濠及真謀逆誅御史謝源伍希儒等交章薦輅未及召世宗立復故官遷福建僉事轉江西副使致仕歸又用胡世寧薦起密雲兵備副使討礦賊有功歷江西福建左右布政使卒官張欽字敬之順天通州人正德六年進士由行人授御史巡視居庸諸關十二年七月帝聽江彬言將出關幸宣府欽上疏諫曰臣聞明主不惡切直之言以納忠烈士不憚死亡之誅以極諫比者人言紛紛謂車駕欲度居庸遠遊邊塞臣度陛下非漫遊蓋欲親征北寇也不知北寇猖獗但可遣將徂征豈宜親勞萬乘英宗不聽大臣言六師遠駕遂成己巳之變且匹夫猶不自輕陛下奈何以宗廟社稷之身蹈不測之險今內無親王監國又無太子臨朝外之甘肅有土番之患江右有輂賊之擾淮南有漕運之艱巴蜀有採辦之困京畿諸郡夏麥少收秋潦為沴而陛下不虞禍變欲縱轡長驅觀兵絕塞臣竊危之已聞朝臣切諫皆不納復疏言臣愚以為乘輿不可出者有三人心搖動供億浩繁一也遠涉險阻兩宮懸念二也北寇方張難與之角三也臣職居言路奉詔巡關分當效死不敢愛身以負陛下疏入不報八月朔帝微行至昌平傳報出關甚急欽命指揮孫璽閉關納門鑰藏之分守中官劉嵩欲詣昌平朝謁欽止之曰車駕將出關是我與君今日死生之會也關不開車駕不得出違天子命當死關開車駕得出天下事不可知萬一有如土木我與君亦死寧坐不開關死死且不朽頃之帝召璽璽曰御史在臣不敢擅離乃更召嵩嵩謂欽曰吾主上家奴也敢不赴欽因負敕印手劍坐關門下曰敢言開關者斬夜草疏曰臣聞天子將有親征之事必先期下詔廷臣集議其行也六軍翼衞百官扈從而後有車馬之音羽旄之美今寂然一不聞輒云車駕即日過關此必有假陛下名出邊勾賊者臣請捕其人明正典刑若陛下果欲出關必兩宮用寶臣乃敢開不然萬死不奉詔奏未達使者復來欽拔劍叱之曰此詐也使者懼而返為帝言張御史幾殺臣帝大怒顧朱寧為我趣捕殺御史會梁儲蔣冕等追至沙河請帝歸京師帝徘徊未決而欽疏亦至廷臣又多諫者帝不得已乃自昌平還意怏怏未已又二十餘日欽巡白羊口帝微服自德勝門出夜宿羊房民舍遂疾馳出關數問御史安在欽聞追之已不及欲再疏諫而帝使中官谷大用守關禁毋得出一人欽感憤西望痛哭於是京師盛傳張御史閉關三疏云明年帝從宣府還至關笑曰前御史阻我我今已歸矣然亦不之罪也世宗嗣位出為漢中知府累官太僕卿嘉靖十七年以右副都御史巡撫四川召為工部左侍郎被論罷欽初姓李既通顯始復其姓事父母孝有不悅長跪請至解乃已周廣字克之崑山人弘治十八年進士歷知莆田吉水二縣正德中以治最徵授御史疏陳四事略言三代以前未有佛法況剌麻尤釋教所不齒耳貫銅環身衣赭服殘破禮法肆為淫邪宜投四裔以禦魑魅奈何令近君側為羣盜興兵口實哉昔禹戒舜曰毋若丹朱傲惟慢遊是好周公戒成王曰毋若商王紂之迷亂酗於酒德今之伶人助慢遊迷亂者也唐莊宗與伶官戲狎一夫夜呼倉皇出走臣謂宜遣逐樂工不復籍之禁內乃所以放鄭聲也陛下承祖宗統緒而羣小獻媚熒惑致三宮鎖怨蘭殿無徵雖陛下春秋鼎盛獨不思萬世計乎中人稍有資產猶畜妾媵以圖嗣續未有專養螟蛉不顧祖宗繼嗣者也義子錢寧本宦豎蒼頭濫寵已極乃復攘敓貨賄輕蔑王章甚至投刺於人自稱皇庶子僭踰之罪所不忍言陛下何不慎選宗室之賢者置諸左右以待皇嗣之生諸義兒養子俱奪其名爵乃所以遠佞人也近兩京言官論大臣禦寇不職者陛下率優容即武將失律亦赦不誅故兵氣不揚功成無日川原白骨積如丘山夫出師十萬日費千金今海內困憊已骨見而肉消矣諸統兵大臣如陳金陸完輩可任其優游玩寇不加切責哉請定期責令成功以贖前罪寧見疏大怒留之不下傳旨謫廣東懷遠驛丞主事曹琥救之亦被謫寧怒不已使人遮道刺廣廣知之易姓名變服潛行四百餘里乃免武定侯郭勛鎮廣東承寧風旨以白金試廣廣拒不受伺廣謁御史攝致軍門箠繫幾死御史救之始解越二年遷建昌知縣有惠政寧矯旨再謫竹寨驛丞世宗即位復故官歷江西副使提督學校嘉靖二年舉治行卓異擢福建按察使鎮守中官以百金餽廣貯之庫將劾之中官懼謝罪自是不敢撓六年以右僉都御史巡撫江西墨吏望風去將限豪右田不果明年拜南京刑部右侍郎居二年暴疾卒嘉靖末贈右都御史廣初以鄉舉入太學師章懋在里閈與魏校友善平生嚴冷無笑容居官公強弗受請託士類莫不憚之曹琥字瑞卿巢人弘治十八年進士授南京工部主事改戶部既抗疏救廣吏部擬調河南通判寧欲遠竄乃改尋甸再遷廣信同知寧王暨鎮守中貴託貢獻頻有徵斂琥攝府事堅持不予士民德之擢鞏昌知府未任卒嘉靖初贈光祿卿石天柱字季瞻岳池人正德三年進士當除給事中吏科李憲請如御史例試職一年授戶科試給事中乾清宮災上言今日外列皇店內張酒館寵信番僧從其鬼教招集邊卒襲其衣裝甚者結為昆弟無復尊卑數離深宮馳驅郊外章疏置之高閣視朝月止再三視老成為贅疣待義子以心腹時享不親慈闈罕至不思前星未耀儲位久虛既不常御宮中又弗預選宗室何以消禍本計久長哉屢遷工科都給事中十一年都督馬昂進其女弟已有娠帝嬖之天柱率同官合詞抗論未報又上疏曰臣等請出孕婦未蒙進止竊疑陛下之意將遂立為己子歟秦以呂易嬴而嬴亡晉以牛易馬而馬滅彼二君者特出不知致墮奸計謂陛下亦為之耶天位至尊神明之冑尚不易負荷而況𡺣麼之子借使以陛下威力成於一時異日諸王宗室肯坐視祖宗基業與他人乎內外大臣肯俯首立於其朝乎望急遣出以清宮禁消天下疑卒不報泰山有碧霞元君祠中官黎鑑請收香錢為修繕費天柱言祀典惟有東嶽神無所謂碧霞元君者淫祀非禮不可許十二年四月詔毀西安門外鳴玉積慶二坊民居有所營建天柱等疏請停止帝皆不省是年帝始巡遊塞外營鎮國府於宣府天柱率同官力諫孝貞純皇后將葬帝假啟土為名欲復巡幸天柱念帝盤遊無度廷臣雖諫帝意不回思所以感動之者乃刺血草疏略曰臣竊自念生臣之身者臣之親也成臣之身者累朝之恩也感成身之恩欲報之於陛下者臣之心也因刺臣血以寫臣心明臣愚忠冀陛下憐察數年以來星變地震大水奇荒災異不可勝數而陛下不悟禍延太皇太后天之意欲陛下居衰絰中悔過自新以保大業也尚或不悟天意或幾乎息矣喪禮大事人子所當自盡陛下於太皇太后未能盡孝則羣臣於陛下必不能盡忠不忠將無所不至猝有變故人心瓦解矣夫大位者奸之窺也昔太康田於洛汭煬帝行幸江都皆以致敗可不鑒哉方今朝廷空城市空倉廩空邊鄙空天下皆知危亡之禍獨陛下不知耳治亂安危在此行止此臣所痛心為陛下惜復昧死為陛下言也凡數千言當天柱刺血時恐為家人所阻避居密室雖妻子不知既上即易服待罪聞者皆感愴而帝不悟也踰月兵部尚書王瓊欲因哈密事殺都御史彭澤廷臣集議瓊盛氣以待衆不敢發言天柱與同官王爌力明澤無罪乃得罷為民瓊怒取中旨出兩人於外天柱得臨安推官世宗即位召復舊職遷大理丞未幾卒久之子請恤特予祭贊曰諫臣之職在糾慝弼違諸臣戒盤遊斥權倖引義力爭無忝厥職矣武宗主德雖荒然文明止於遠竄入關不罪張欽其天姿固非殘暴酷烈者比而義兒閹豎煬竈為奸桁楊交錯於闕庭忠直負痛於狴戶批鱗者尚獲生全投鼠者必陷死地元氣日削朝野震驚祚以不延統幾中絕風愆之訓垂戒不亦切乎
