body:
  text: 明史卷三十五志第十一曆五大統曆法三上推步大統推步悉本授時惟去消長而已然通軌諸捷法實為布算所須其間次序亦有與曆經微別者如氣朔發斂授時原分二章今合為一授時盈縮差在日躔遲疾差在月離定朔經朔離為二處今則經朔後即求定朔於用殊便其目七曰氣朔曰日躔曰月離曰中星曰交食曰五星曰四餘步氣朔發斂附洪武十七年甲子歲為元上距至元辛巳一百四算歲周三百六十五萬二千四百二十五分實測無消長半之為歲周四分之為氣象限二十四分之為氣策日周一萬即一百刻刻有百分分有百秒以下微纖皆以百遞析氣應五十五萬三百七十五分置距算一百四求得中積三億七千六百一十九萬九千七百七十五分加辛巳氣應五十五萬六百分得通積三億七千六百七十五萬三百七十五分滿紀法六十去之餘為大統氣應閏應一十八萬二千百七十分一十八秒置中積加辛巳閏應二十萬二千五十分得閏積三億七千六百四十萬一千八百二十五分滿朔實去之餘為大統閏應轉應二十萬九千六百九十分置中積加辛巳轉應一十三萬二百五分共得三億七千六百三十二萬九千九百八十分滿轉終去之餘為大統轉應交應一十一萬五千一百五分八秒置中積加辛巳交應二十六萬三百八十八分共得三億七千六百四十六萬一百六十三分滿交終去之餘為大統交應按授時曆既成之後閏轉交三應數旋有改定故元志曆經閏應二十萬一千八百五十分而通軌載閏應二十萬二千五十分實加二百分是當時經朔改早二刻也曆經轉應一十三萬一千九百四分通軌載轉應一十三萬二百五分實減一千六百九十九分是入轉改遲一十七刻弱也曆經交應二十六萬一百八十七分八十六秒通軌交應二十六萬三百八十八分實加二百分一十四秒是正交改早二刻強也或以通軌辛巳三應與元志互異目為元統所定非也夫改憲必由測驗即當具詳始末何反追改授時曆自沒其勤乎是故通軌所述者乃授時續定之數而曆經所存則其未定之初也通餘五萬二千四百二十五分朔策二十九萬五千三百五分九十三秒一名朔實半之為望策一名交望又半之為弦策通閏一十萬八千七百五十三分八十四秒月閏九千百六十二分八十二秒閏限一十八萬六千五百五十二分九秒一名閏准盈初縮末限八十八萬九千百九十二分二十五秒縮初盈末限九十三萬七千一百二十分二十五秒轉終二十七萬五千五百四十六分半之為轉中朔轉差一萬九千七百五十九分九十三秒日轉限一十二限二十轉中限一百六十八限八三六以日轉限乘轉中一名限總朔轉限二十四限一七一一四六以日轉限乘朔轉差弦轉限九十限六八三八六五以日轉限乘弦策一名限策交終二十七萬二千一百二十二分二十四秒朔交差二萬三千一百八十三分六十九秒氣盈二千一百八十四分三十七秒五十微朔虛四千六百九十四分七秒沒限七千八百一十五分六十二秒五十微盈策九萬六千六百九十五分二十八秒虛策二萬九千一百四分二十二秒土王策三萬四百三十六分八十七秒五十微宿策一萬五千三百五分九十三秒紀法六十萬即旬周六十日推天正冬至置距洪武甲子積年減一以歲周乘之為中積加氣應為通積滿紀法去之至不滿之數為天正冬至以萬為日命甲子算外為冬至日辰纍加通餘即得次年天正冬至推天正閏餘置中積加閏應滿朔策去之至不滿之數為天正閏餘纍加通閏即得次年天正閏餘推天正經朔置冬至減閏餘遇不及減加紀法減之為天正經朔無閏加五十四萬三六七一一六十二朔策去紀法有閏加二十三萬八九七七九十三朔實去紀法滿紀法仍去之即得次年天正經朔視天正閏餘在閏限已上其年有閏月推天正盈縮置半歲周內減其年閏餘全分餘為所求天正縮曆如徑求次年者於天正縮曆內減通閏即得減後視在一百五十三日九已下者復加朔實為次年天正縮曆推天正遲疾置中積加轉應減去其年閏餘全分餘滿轉終去之即天正入轉視在轉中已下為疾曆已上去之為遲曆如徑求次年者加二十三萬七一一九一六十二轉差之積經閏再加轉差皆滿轉終去之遲疾各仍其舊若滿轉中去之為遲疾相代推天正入交置中積減閏餘加交應滿交終去之即天正入交泛日如徑求次年者加六千八十二分四秒十二交差內去交終經閏加二萬九千二百六十五分七十三秒十三交差內去交終皆滿交終仍去之即得推各月經朔及弦望置天正經朔加二朔策滿紀法去之即得正月經朔以弦策纍加之去紀法即得弦望及次朔推各氣置天正冬至加三氣策滿紀法去之即得立春日以氣策纍加之去紀法即得二十四氣日推閏在何月置朔策以有閏之年閏餘減之餘為實以月閏為法而一得數命起天正次月算外即得所閏之月閏有進退仍以定朔無中氣為定如減餘不及月閏或僅及一月閏者為閏在年前推各月盈縮曆置天正縮曆加二朔策去半歲周即得正月經朔下盈曆纍加弦策各得弦望及次朔如滿半歲周去之交縮滿半歲周又去之即復交盈推初末限視盈曆在盈初縮末限已下縮曆在縮初盈末限已下各為初已上用減半歲周為末推盈縮差置初末曆小餘以立成內所有盈縮加分乘之為實日周一萬為法除之得數以加其下盈縮積即盈縮差推各月遲疾曆置天正經朔遲疾曆加二轉差得正月經朔下遲疾曆纍加弦策得弦望及次朔皆滿轉中去之為遲疾相代推遲疾限各置遲疾曆以日轉限乘之即得限數以弦轉限纍加之滿轉中限去之即各弦望及次朔限如徑求次月以朔轉限加之亦滿轉中去之即得又法視立成中日率有與遲疾曆較小而相近者以減之餘在八百二十已下即所用限求遲疾差置遲疾曆以立成日率減之如不及減則退一位餘以其下損益分乘之為實八百二十分為法除之得數以加其下遲疾積即遲疾差推加減差視經朔弦望下所得盈縮差遲疾差以盈遇遲縮遇疾為同相併盈遇疾縮遇遲為異相較各以八百二十分乘之為實再以遲疾限行度內減去八百二十分為定限度為法法除實為加減差盈遲為加縮疾為減異名相較者盈多於疾為加疾多於盈為減縮多於遲減遲多於縮加推定朔弦望各置經朔弦望以加減差加減之即為定日視定朔干名與後朔同者月大不同者月小內無中氣者為閏月其弦望在立成相同日日出分已下者則退一日命之推各月入交置天正經朔入交泛日加二交差得正月經朔下入交泛日纍加交望滿交終去之即得各月下入交泛日徑求次月加交差即得推土王用事置穀雨大暑霜降大寒氣日減土王策如不及減加紀法減之即各得土王用事日推發斂加時各置所推定朔弦望及氣之小餘以十二乘之滿萬為時命起子正滿五千又進一時命起子初算外得時不滿者以一千二百除之為刻命起初刻初正時之刻皆以初一二三四為序於算外命之其第四刻為畸零得刻法三之一凡三時成一刻以足十二時百刻之數按古曆及授時皆以發斂為一章發斂云者日道發南斂北之細數也而加時附焉則又所以紀發斂之辰刻故曰發斂加時也大統取其便算故合發斂與氣朔共為一章或以乘除疏發斂非其質矣推盈日視氣小餘在沒限已上為有盈之氣置策餘一萬一四五六二五以十五日除氣策以有盈之氣小餘減之餘以六十八分六六以氣盈除十五日乘之得數以加氣大餘滿紀法去之命甲子算外得盈日求次盈置盈日及分秒以盈策加之又去紀法即得推虛日視經朔小餘在朔虛已下為有虛之朔置有虛之朔小餘以六十三分九一以朔虛除三十日乘之得數以加經朔大餘滿紀法去之命甲子算外為虛日求次虛置虛日及分秒以虛策加之又去紀法即得推直宿置通積以氣應加中積減閏應以宿會二十八萬纍去之餘命起翼宿算外得天正經朔直宿置天正經宿直宿加兩宿策為正月經朔直宿以宿策纍加得各月經朔直宿再以各月朔下加減差加減之為定朔直宿步日躔周天三百六十五度二十五分七十五秒半之為半周天又半之為象限歲差一分五十秒周應三百一十五度一十分七十五秒按此係至元辛巳之周應乃自虛七度至箕十度之數也洪武甲子相距一百四年歲差已退天一度五十四分五十秒而周應仍用舊數殆傳習之誤耳推天正冬至日躔赤道宿次置中積加周應應減距曆元甲子以來歲差滿周天去之不盡起虛七度依各宿次去之即冬至加時赤道日度如求次年纍減歲差即得赤道度虛八九五七五危十五四室十七一壁八六奎十六六婁十一八胃十五六昴十一三畢十七四觜初五參十一一井三十三三鬼二二柳十三三星六三張十七二五翼十八七五軫十七三角十二一亢九二氐十六三房五六心六五尾十九一箕十四斗二十五二牛七二女十一三五推天正冬至日躔黃道宿次置冬至加時赤道日度以至後赤道積度減之餘以黃道率乘之如赤道率而一得數以加黃道積度即冬至加時黃道日度黃赤道積度及度率俱見法原黃道度箕九五九斗二十三四七牛六九女十一一二虛九七五危十五九五室十八三二壁九三四奎十七八七婁十二三六胃十五八一昴十一八畢十六五觜初五參十二八井三十一三鬼二一一柳十三星六三一張十七七九翼二十九軫十八七五角十二八七亢九五六氐十六四房五四八心六二七尾十七九五推定象限度以冬至加時赤道日度與冬至加時黃道日度相減為黃赤道差以本年黃赤道差與次年黃赤道差相減餘以四而一加入氣象限內為定象限度推四正定氣日置所推冬至分即為冬正定氣加盈初縮末限滿紀法去之餘為春正定氣加縮初盈末限去紀法餘為夏正定氣加縮初盈末限去紀法餘為秋正定氣加盈初縮末限去紀法餘為次年冬正定氣推四正相距日以前正定氣大餘減次正定氣大餘加六十日得相距日如次正氣不及減者加六十日減之再加六十日為相距日推四正加時黃道積度置冬至加時黃道日度纍加定象限度各得四正加時黃道積度推四正加時減分置四正定氣小餘以其初日行度乘之如日周而一為各正加時減分冬正行一度五一八五春正距夏正九十三日者行度九九九七三距九十四日者行一度夏正行度九五一五一六秋正距冬正八十八日者行一度五五距八十九日者行一度推四正夜半積度置四正加時黃道積度減去其加時減分即得推四正夜半黃道宿次置四正夜半黃道積度滿黃道宿度去之即得推四正夜半相距度置次正夜半黃道積度以前正夜半黃道積度減之餘為兩正相距度遇不及減者加周天減之推四正行度加減日差以相距度與相距日下行積度相減餘如相距日而一為日差從相距度內減去行積度者為加從行積度內減去相距度者為減秋正距冬至冬至距春正八十八日行積度九十度四九八十九日行積度九十一度四一四春正距夏至夏至距秋正九十三日行積度九十度五九九九十四日行積度九十一度五九八七推每日夜半日度置四正後每日行度在立成以日差加減之為每日行定度置四正夜半日度以行定度每日加之滿黃道宿度去之即每日夜半日度黃道十二次宿度危十二度六四九一入娵訾辰在亥奎一度七三六二入降婁辰在戌胃三度七四五六入大梁辰在酉畢六度八八五入實沈辰在申井八度三四九四入鶉首辰在未柳三度八六八入鶉火辰在午張十五