body:
  text: 明史卷三十七志第十三曆七回回曆法一回回曆法西域默狄納國王馬哈麻所作其地北極高二十四度半經度偏西一百七度約在雲南之西八千餘里其曆元用隋開皇己未即其建國之年也洪武初得其書於元都十五年秋太祖謂西域推測天象最精其五星緯度又中國所無命翰林李翀吳伯宗同回回大師馬沙亦黑等譯其書其法不用閏月以三百六十五日為一歲歲十二宮宮有閏日凡百二十八年而宮閏三十一日以三百五十四日為一周周十二月月有閏日凡三十年月閏十一日歷千九百四十一年宮月日辰再會此其立法之大概也按西域曆術見於史者在唐有九執曆元有札馬魯丁之萬年曆九執曆最疏萬年曆行之未久唯回回曆設科隸欽天監與大統參用二百七十餘年雖於交食之有無深淺時有出入然勝於九執萬年遠矣但其書多脫誤蓋其人之隸籍臺官者類以土盤布算仍用其本國之書而明之習其術者如唐順之陳壤袁黃輩之所論著又自成一家言以故翻譯之本不行於世其殘缺宜也今為博訪專門之裔考究其原書以補其脫落正其訛舛為回回曆法著於篇積年起西域阿喇必年隋開皇己未下至洪武甲子七百八十六年用數天周度三百六十每度六十分每分六十秒微纖以下俱準此宮十二每宮三十度日周分一千四百四十時二十四每時六十分刻九十六每刻十五分宮度起白羊節氣首春分命時起午正午初四刻屬前日七曜數日一月二火三水四木五金六土七以七曜紀日不用甲子宮數白羊初金牛一陰陽二巨蟹三獅子四雙女五天稱六天蝎七人馬八磨羯九寶瓶十雙魚十一宮日白羊戌宮三十一日金牛酉宮三十一日陰陽申宮三十一日巨蟹未宮三十二日獅子午宮三十一日雙女巳宮三十一日天稱辰宮三十日天蝎卯宮三十日人馬寅宮二十九日磨羯丑宮二十九日寶瓶子宮三十日雙魚亥宮三十日巳上十二宮所謂不動之月凡三百六十五日乃歲周之日也若遇宮分有閏之年於雙魚宮加一日凡三百六十六日月分大小單月大雙月小凡十二月所謂動之月也月大三十日月小二十九日凡三百五十四日乃十二月之日也遇月分有閏之年於第十二月內增一日凡三百五十五日太陽五星最高行度隋己未測定太陽二宮二十九度二十一分土星八宮十四度四十八分木星六宮初度八分火星四宮十五度四分金星二宮十七度六分水星七宮六度十七分求宮分閏日愛之餘日置西域歲前積年減一以一百五十九乘之一百二十八年內閏三十一日故以總數乘內加一十五閏應以一百二十八屢減之餘不滿之數若在九十七已上閏限其年宮分有閏日已下無閏日於除得之數內加五宮分立成起火三故須加五滿七去之餘即所求年白羊宮一日七曜有閏加一日後同求月分閏日朔之餘日置西域歲前積年減一以一百三十一乘之總數乘內加一百九十四閏應以三十為法屢減之餘在十九已上閏限其年月分有閏日已下則無於除得之數滿七去之餘即所求年第一月一日七曜加次法置積日全積並宮閏所得數減月閏內加三百三十一日己未春正前日以三百五十四一年數除之餘數內減去所加三百三十一又減二十三足成一年日數又減二十四洪武甲子加次又減一改應所損之一日為實距年己未至今得數又法以氣積宮閏併通閏為氣積內減月閏置十一以距年乘之外加十四以三十除之得月閏數以三百五十四除之餘減洪武加次二十四又減補日二十三又減改應損日一得數如前求通閏置十一日以距年乘之求宮閏前見太陽行度求最高總度置西域歲前積年入總年零年月分日期立成內各取前年前月前日最高行度併之如求十年則取九年之類蓋立成中行度俱本年本月日足數也如十年竟求十年則逾數矣月日義同後倣此求最高行度置求到最高總度加測定太陽最高行度二宮二十九度二十一分即所求年白羊宮最高行度如求次宮纍加五秒六微求次月加四秒五十六微求中心行度日平行度置積年入總年零年月日立成內各取日中心行度併之取法同前內減一分四秒即所求白羊宮第一日中心行度求各宮月日按每日行度五十九分八秒纍加之內減一分四秒或云西域距中國里差非是蓋係己未年之宮分末日度應也求自行度置其日中心行度減其宮最高行度即得即入盈縮曆度也求加減差即盈縮差以自行宮度為引數入太陽加減立成內照引數宮度取加減差是名未定差其度下小餘用比例法以本度加減差與後度加減差相減餘數通為秒如一分通為六十秒與引數小餘亦通秒相乘得數為纖秒乘秒得纖以六十收之為微為秒為分如數多先以六十收之為微又以六十收之為秒又以六十收之為分視前所得未定加減差數較少於後數者後度加減差加之多於後數者減之是為加減定差分如無小餘竟用未定差為定差後準此求經度黃道度置其日中心行度以加減定差分加減之視定差引數自行宮度在初宮至五宮為減差六宮至十一宮為加差即得求七曜置積年入立成內取總年零年月日下七曜數併之纍去七數餘即所求白羊宮一日七曜如求次宮者內加各宮七曜數如求逐日纍加一數滿七去之求太陰五星羅計七曜並準此太陰行度求中心行度置積年入立成內取總零年月日下中心行度併之得數內減一十四分己未應轉即所求年白羊宮一日中心行度如求逐日纍加日行度十三度一三五求加倍相離度月體在小輪行度合朔後與日相離置積年入立成內取總年零年月日下加倍相離度併之內減二十六分即所求白羊宮一日度也如求逐日纍加倍離日行度二十四度二二五三二二半之即小輪心離太陽數求本輪行度即月轉度置積年入立成內取總零年月日下本輪行度併之內減一十四分即所求白羊宮一日度也如求各日纍加本輪日行度十三度三分五四求第一加減差又名倍離差以加倍相離宮度為引數入太陰第一加減立成內取加減差未定差又與下差相減餘乘引數小餘得數為秒分乘分以六十收之為分用加減未定差後差多加少減同太陽得第一差分求本輪行定度置其日本輪行度以第一差分加減之視倍離度前六宮加後六宮減求第二加減差以本輪行定度為引數入太陰第二加減立成內取未定差依比例法同前求得零數加減之為第二加減差分視引數六宮已前為減差後為加差求比敷分以倍離宮度入第一加減立成內取比敷分如倍離零分在三十分已上者取下度比敷分求遠近度以本輪行定宮度為引數入太陰第二加減立成內取遠近度分其引數零分亦依比例法取之求泛差定差置比敷分以遠近度通分乘之以六十約之為分即泛差以泛差加入第二加減差即為定差求經度置其日太陰中心行度以定差加減之即太陰經度視本輪行定度六宮以前減以後加太陰緯度求計都與月相離度入交定度置其日太陰經度內減其日計都行度即羅計中心度即計都與月相離度分求緯以計都與月相離宮度為引數入太陰緯度立成上宮用右行順度下宮用左行逆度取其度分依比例法求得零分加減之上六宮加下六宮減得緯度分引數在六宮已前為黃道北六宮後為黃道南求計羅行度置積年入總年零年月日立成內取羅計中心行度併之為其年白羊宮一日行度求各宮一日以各宮日行度加之與十二宮相減餘即所求宮一日計都行度如求計都逐日細行以前後二段行度相減餘以相距日數除之為日差又置前段計都行度以日差纍減之如求羅行度置其日計都行度內加六宮五星經度求最高總度數同太陽依前太陽術求之求最高行度置所求本星最高總度加測定本星最高行度見前為其年白羊宮最高行度求各宮各日加各宮日行度求日中心行度依太陽術求之求自行度置積年入立成總零年月日下各取自行度並之得其年白羊宮一日自行度土木金三星減一分水星減三分火星不減如求各宮各日照本星自行度纍加之水星如自行度遇三宮初度作五日一段算至九宮初度作十日一段算緯度亦然求中心行度小輪心度即入曆度五星本輪土木火三星置太陽中心行度減其星自行度為三星中心行度內又減最高行度為三星小輪心度金水二星其中心行度即太陽中心行度內減其星最高行度餘為其星小輪心度不及減加十二宮減之求第一加減差盈縮差以其星小輪心宮度為引數入本星第一加減立成依比例法求之法同太陽太陰求自行定度及小輪心定度視第一加減差引數在初宮至五宮用加減差加自行度減小輪心度各為定度在六宮至十一宮用加減差減自行度加小輪心度各為定度求第二加減差以其星自行定度入本星第二加減立成內取其度分用比例法加減之同前求比敷分如土木金水星以本星小輪心定宮度入第一加減立成內取比敷分如引數小餘在三十分已上取後行比敷分如火星則必用比例法求之求遠近度以自行定宮度入第二加減立成內取遠近度依比例法求之求泛差定差法同太陰求經度置小輪心定度以定差加減之視引數自行定度在六宮已前加已後減內加其星最高行度求留段以其留段小輪心定宮度為引數即立成內各星入曆定限入五星順退留立成內於同宮近度取本星度分與前後行相減若取得在初宮至六宮本行與後行相減六宮至初宮本行與前行相減又以引數宮度減立成內同宮近度兩減餘通分相乘用六度除之立成內每隔六度六十分收之順加逆減於前取度分得數與其日自行定度同者即本日留如自行定度多者已過留日少者未到留日欲得細率以所得數與其日自行定度相減餘以各星一日自行度約之如土星一日自行五十七分有奇之類即得留日在本日前後數也土星留七日其留日前三日後三日皆與留日數同木星留五日其留日前二日後二日與留日數同火金水三星不留退而即行行而即退但於行分極少處為留耳求細行分土木金火四星以前後兩段經度相減以相距日除之為日行分水星以白羊宮初日經度又與前一日經度相減餘為初日行分又置前後二段經度相減餘以相距日除之為平行分與初日行分加減倍之以前段前一日與後段相距日數除之為日差以加減初日行分初日行分少於平行分加多減為日行分五星各置前段經度以逐日行分順加退減之為各星逐日經度求伏見視各星自行定度在伏見立成內限度已上者即五星晨夕伏見也五星緯度求最高總行度中心行度自行度小輪心度並依五星經度術求之求自行定度置自行宮度分其宮以一十乘之為度如一宮以十乘之得十度此用約法折算以造緯度立成其度以二十乘之為分滿六十約之為度其分亦以二十乘之為秒滿六十約之為分併之即得求小輪心定度置小輪心宮度分其宮以五乘之為度如一宮以五乘之得五度其度以一十乘之為分滿六十約之為度其分亦以一十乘之為秒滿六十約之為分併之即得求緯度以小輪心定度及自行定度入本星緯度立成內兩取一縱一橫得數與後行相減若遇交黃道者與後行相併又以小輪心定度與立成上小輪心定度相減上橫行兩減餘相乘以立成上小輪心度纍加數除之如土星上橫行小輪心度每隔三度火星每隔二度之類滿六十收之為分用加減兩取數多於後行減少加若遇交黃道者即後行數多亦減寄左復以自行定度與立成上自行定度相減首直行又以兩取數與下行相減若遇交黃道者與下行併兩減餘相乘以立成上自行度纍加數除之如土星直行自行度每隔十度火星每隔四度之類收之為分與前寄左數相加減如兩取數多於下行者減少加若遇交黃道者所得分多於寄左數置所得分內減寄左數餘為交過黃道南北分也即得黃道南北緯定分求緯度細行分置其星前段緯度與後段緯度相減餘以相距日除之為日差置前段緯度以日差順加退減即逐日緯度分按緯度前段少於後段者以日差順加退減若前段多於後段者宜以日差順減退加非可一例也若前後段南北不同者置其星前後段緯度併之以相距日除之為日差置前段緯度以日差纍減之至不及減者於日差內減之餘以日差纍加之即得逐日緯度推日食法日食諸數如午前合朔用前一日數推午後合朔用次日數推辨日食限視合朔太陰緯度在黃道南四十五分已下黃道北九十分已下為有食若合朔為晝則全見食若合朔在日未出三時及日已入十五分一時四分之一皆有帶食若合朔在夜刻者不算求食甚泛時即合朔置午正太陰行過太陽度求法見後月食太陰逐時行過太陽分通秒以二十四乘之為實置太陰日行度減太陽日行度通秒為法除之為時時下零數以六十通之為分分下零數以六十通之為秒三十秒已上收為一分六十分收為一時共為食甚泛時求合朔太陽經度以食甚泛時通分以太陽日行度通秒乘之以二十四除之為微滿六十約之為秒為分用加減午正太陽度午前合朔減之午後加之得合朔時太陽經度即食甚日躔黃道度求加減分視合朔時太陽宮度入晝夜加減立成內取加減分依比例法求之求子正至合朔時分秒置食甚泛時以加減分加減之午前合朔減午後加用加減十二時午前合朔用減十二時午後用加十二時即子正至合朔時分秒按命時起子正乃變其術以合大統非其本法也求第一東西差經差視合朔時太陽宮在立成經緯時加減立成右七宮取上行時順行在左七宮取下行時逆行以子正至合朔時取經差依比例法求之止用時下小餘求之下同為第一東西差求第二東西差視合朔時太陽宮在立成內同上取次宮子正至合朔時經差依比例法求之為第二東西差求第一南北差緯差以合朔時太陽宮及子正至合朔時入立成內同上取緯差依比例法求之為第一南北差求第二南北差以合朔太陽宮取次宮子正至合朔時緯差依比例法求之為第二南北差求第一時差以合朔太陽宮及子正至合朔時入立成取時差依比例法求之求第二時差以合朔太陽宮取次宮子正至合朔時時差依比例法求之求合朔時東西差以第一東西差與第二東西差相減餘通秒以乘合朔時太陽度分亦通秒以三十度除之為纖以六十收之為微為秒為分以加減第一東西差視第一東西差數少於第二差者加之多者減之下同為合朔時東西差求合朔時南北差以第一南北差與第二南北差相減餘通秒以乘太陽度分以三十除之為纖依率收之為微秒分以加減第一南北差為合朔時南北差求合朔時差以第一第二兩時差相減乘太陽度分以三十除之依率收之用加減第一時差為合朔時差求合朔時本輪行度以本輪日行度一十三度四分通分以乘食甚泛時亦通分以二十四除之為秒依率收之為分為度以加減午正本輪行度午前減午後加為合朔時行度求比敷分以本輪行度入立成太陽太陰晝夜時行影徑分立成取同宮近度太陰比敷分依比例法求之求東西定差置合朔時東西差通秒以比敷分通秒乘之為纖以六十收之為微為秒為分以加合朔東西差有加無減為定差求南北定差法同東西定差求食甚定時即食甚定分視其日合朔時太陽度在立成經緯時加減立成左七宮其時差黑字減白字加在右七宮白字減黑字加皆加減於子正至合朔時得數命起子正減之得某時初正餘通為秒以一千乘之以一百四十四除之六十分為一時每日一千四百四十分故以千乘之又以一四四除之以六十約之滿百為刻即食甚定時求食甚太陰經度於合朔太陽經度內加減東西定差即得食甚太陰經度其加減視食甚定時時差加減求合朔計都度置食甚泛時通分以計都日行度三分一十一秒通秒乘之以二十四除之為微滿六十收之為秒為分以加減其日午時計都行度羅計逆行午前合朔加午後減為合朔時計都度求合朔太陰緯度食甚時太陰經度內加減合朔時計都度餘為計都與月相離度入太陰緯度立成取之求食甚太陰緯度南北定差內加減合朔時太陰緯度在黃道南加北減得食甚緯度求合朔時太陽自行度用太陽日行度五十九分八秒通秒以乘食甚泛時亦通分用二十四除之得數為微滿六十收之為秒為分以加減其日午正自行度午前合朔減午後加得合朔自行度求太陽徑分以合朔太陽自行度為引數入立成影徑分立成內同宮近度取太陽徑分依比例法求之求太陰徑分以合朔時本輪行度為引數入立成同上內取同宮近度太陰徑分依比例法求之求二半徑分併太陽太陰兩徑分半之求太陽食限分置二半徑分內減食甚太陰緯度餘為太陽食限如不及減者不食如太陰無緯度者食既如太陰無緯度而日徑大於月徑者食有金環求太陽食甚定分以太陽食限分通秒以一千乘之為實以太陽徑分通秒為法除之以百約之為分為太陽食甚定分求時差即定用分食甚太陰緯度通秒自乘二半徑分亦通秒自乘兩自乘數相減餘以平方開之以二十四乘之為實以其日太陰日行度內減太陽日行度通分為法實如法而一得數為分滿六十分為一時為時差求初虧置食甚定時內減時差餘時命起子正減之得初正時餘分通秒以一千乘之以一百四十四除之以六十約之滿百為刻為初虧時刻求復圓置食甚定時內加時差命起子正如初虧法得復圓時刻求初虧食甚復圓方位與大統法同推月食法月食諸數午前望用前一日推午後望用次一日推辨月食限視望日太陰經度與羅或計都度相離一十三度之內太陰緯度在一度八分之下為有食又視合望在太陰未出二時未入二時其限有帶食其在二時已上者不算求食甚泛時即經望置其日太陰經度內減六宮如不及減加十二宮減以減其日午正太陽度為午前望如太陽度不及減加入六宮減之為午後望置相減餘數通秒以二十四乘之為實置其日太陰經度內減前一日太陰經度若在午後望者減後一日太陰經度餘為太陰日行度又置其日午正太陽度內減前一日午正太陽度若在午後望者減後一日太陽度餘為太陽日行度兩日行度相減餘通秒為法除實得數為時其時下餘數以六十通之為分秒即所求食甚泛時求食甚月離黃道宮度置食甚泛時與太陽日行度俱通秒相乘以二十四除之得數為纖滿六十收之為微為秒為分以加減其日午正太陽度午前望減午後望加為望時太陽度加六宮即得所求求晝夜加減差以望時太陽宮度為引數入晝夜加減立成內取加減分依比例法求之求食甚定時置食甚泛時以晝夜加減差加減之午前望減午後加得數用加減一十二時如午後望加十二午前望與十二時相減命起子正得初正時其小餘如法收為刻法詳日食得定時求望時計都度置食甚泛時通秒為實以計都日行度三分一十一秒通秒乘之以二十四除之得數為纖以六十收之為微為秒為分用加減其日午正計都行度羅計逆行午前望加午後望減即得求望時太陰緯度置食甚月離黃道度內減望時計都度如不及減加十二宮減餘為計都與月相離度入太陰緯度立成取之求望時本輪行度即入遲疾曆置太陰本輪日行度十三度四分通分以食甚泛時通秒乘之以二十四除之為微以六十收之為秒為分為度用加減其日午正本輪行度午前望減午後加即得求太陰徑分以望時本輪行宮度入影徑分立成求之法詳日食求太陰影徑分以望時本輪行宮度入影徑分立成取之求望時太陽自行度以太陽日行度五十九分八秒與食甚泛時俱通秒相乘以二十四除之得數為纖滿六十收之為微為秒為分以加減其日午正太陽自行度法同日食求太陽經度求影徑減差以其日太陽自行宮度為引數入影徑立成內於同宮近度取太陰影徑差分依比例法求之法詳前求影徑定分置太陰影徑分內減影徑減差分求二半徑分置太陰徑分加影徑定分半之求太陰食限置二半徑分內減望時太陰緯度如不及減不食求食甚定分置食限分通秒以一千乘之為實以太陰徑分通秒為法除之以百約之為分為食甚定分求太陰逐時行過太陽分置太陰望時經度減前一日太陰經度又置望時太陽自行度減前一日太陽自行度以兩餘數相減為太陰晝夜行過太陽度通秒以二十四除之滿六十收之得逐時行過太陽分求時差以太陰緯度分通秒自乘又以二半徑分通秒自乘兩數相減餘開平方為實以太陰行過太陽度通秒為法除之得數即時差即初虧至食甚定用分求初虧復圓時刻以時差減食甚定時得初虧時刻加食甚定時得復圓時刻甚命時收刻之法並同日食求食既至食甚時差置二半徑分減太陰徑分通秒自乘又置太陰緯度亦通秒自乘相減平方開之為實以太陰逐時行過太陽度通秒為法除之得數即時差求食既生光時刻以食既至食甚時差減食甚定時為食既時刻加食甚定時為生光時刻求初虧食甚復圓方位與大統法同求日出入時以午正太陽經度為引數入西域晝夜時立成取其度分依比例法求之為未定分又於引數相對宮度內取其度分如初宮三度向六宮三度取之亦依比例法求之為後未定分兩未定分相減不及減加三百六十度減餘通秒用十五除之六十收之為分為時得其日晝時分秒半之為其日半晝時分秒以半晝時分秒減十二時餘為日出時分秒加十二時為日入時分秒求日月出入帶食分秒視其日日出時分秒并日入時分秒較多於初虧時分秒少於食甚定時及復圓時分秒者即有帶食置其日日出時或日入時與食甚定時分秒相減餘為帶食差置日月食甚定分以帶食差通秒乘之以時差通秒除之得數為帶食分於食甚定分內減帶食分餘為日月帶食所見之分求月食更點置二十四時內減晝時又減晨昏時七十二分即中曆之五刻弱也餘為夜時通秒五約之為更法五分更法為點法如食在子正以前者置初虧食甚復圓等時內減日入時又減半晨昏時三十六分餘通秒以更法減之為更數不滿更法者以點法減之為點數食在子正已後者置夜時半之加初虧食甚復圓等時以更法減之為更數不滿更法者以點法減之為點數皆命起初更初點更法減之減一次為一更其減餘不滿法者亦虛命為一更點法倣此太陰五星凌犯求太陰晝夜行度以本日經度與次日經度相減餘即本日晝夜行度求太陰晨昏刻度置其日午正太陰經度內加立成太陰出入晨昏加減立成其日昏刻加差即為其日太陰昏刻經度置其次日午正太陰經度減立成其日晨刻減差即為其日太陰晨刻經度求月出入度置其日午正太陰經度加立成內即前立成其日月入加差即為其日月入時太陰經度加立成內其日月出加差即其日月出時太陰經度求太陰所犯星座朔後視昏刻度至月入度望後視月出度至晨刻度入黃道南北各像星立成內經緯度相近在一度已下者取之求時刻置其日午正太陰經度與取到各像星經度相減通分以二十四乘之以太陰晝夜行度亦通分除之得初正時其小餘以六十通之為分以一千乘之一百四十四除之以百約之為刻即得所求時刻求上下相離分置太陰緯度與所犯星緯度相減餘為上下相離分若月星同在南月多為下離月少為上離同在北月多為上離少為下離若南北不同月在北為上離南為下離求五星凌犯各星相離分置其日五星經緯度入黃道立成內視各像內外星經緯度在一度已下者取之其五星緯度與各星緯度相減餘即上下相離分求月犯五星五星相犯視太陰經緯度五星經緯度相近在一度已下者取之
