body:
  text: 明史卷一百三十八列傳第二十六陳修滕毅趙好德翟善李仁吳琳楊思義滕德懋范敏費震張琬周禎劉惟謙周湞端復初李質黎光劉敏楊靖凌漢嚴德珉單安仁朱守仁薛祥秦逵趙翥趙俊唐鐸沈溍開濟陳修字伯昂上饒人從太祖平浙東授理官援引律令悉本寬厚盡改元季弊政擢兵部郎中遷濟南知府時亂後比戶雕殘且多衛將練兵屯田其間修撫治有方兵民相安流亡復業帝嘉之洪武四年拜吏部尚書六部之設始自洪武元年鎮江滕毅首長吏部佐省臺裁定銓除考課諸法略具至是修與侍郎李仁詳考舊典參以時宜按地衝僻為設官煩簡凡庶司黜陟及課功核實之法皆精心籌畫銓法秩然未幾卒官其後部制屢創令入覲官各舉所知定內外封贈廕之典自浮山李信始天下朝正官各造事迹文册圖畫土地人民以進及撥用吏員法自崑山余熂始倣唐六典自五府六部都察院以下諸司設官分職編集為書曰諸司職掌定吏役考滿給由法以為司衛府縣首領選監生能文章者兼除州縣官及學正教諭自泰興翟善始三年一朝考核等第自沂水杜澤始此洪武時銓政大略也六部初屬中書省權輕多仰承丞相意指毅修及詹同吳琳趙好德輩居吏部稱賢然亦無大建豎至十三年中書省革部權乃專而銓衡為尤要顧帝用法嚴熂以排宋訥誅善貶澤拜尚書未數月罷惟信歷侍郎拜尚書幾二載卒於官云滕毅字仲弘太祖征吳以儒士見留徐達幕下尋除起居注命與楊訓文集古無道之君若桀紂秦始皇隋煬帝行事以進曰吾欲觀喪亂之由以為炯戒耳吳元年出為湖廣按察使尋召還擢居吏部一月改江西行省參政卒趙好德字秉彝汝陽人由安慶知府入為戶部侍郎進尚書改吏部帝嘉其典銓平嘗召與四輔官入內殿坐論治道命畫史圖像禁中終陝西參政子毅永樂中官至工部侍郎翟善字敬夫以貢舉歷官吏部文選司主事二十六年尚書詹徽侍郎傅友文誅命善署部事再遷至尚書明於經術奏對合帝意帝曰善雖年少氣宇恢廓他人莫及也欲為營第於鄉善辭又欲除其家戍籍善曰戍卒宜增豈可以臣破例帝益以為賢二十八年坐事降宣化知縣以終李仁唐縣人初仕陳友諒王師克武昌來歸以常遇春薦代陶安知黃州府歷官侍郎進尚書坐事謫青州政最擢戶部侍郎致仕吳琳黃岡人太祖下武昌以詹同薦召為國子助教經術逾于同吳元年除浙江按察司僉事復入為起居注命齎幣帛求書於四方洪武六年自兵部尚書改吏部嘗與同迭主部事踰年乞歸帝嘗遣使察之使者潛至旁舍一農人坐小杌起拔稻苗布田貌甚端謹使者前曰此有吳尚書者在否農人斂手對曰琳是也使者以狀聞帝為嘉歎楊思義不詳其籍里太祖稱吳王授起居注初錢穀隸中書省吳元年始設司農卿以思義為之明年設六部改為戶部尚書大亂之後人多廢業思義請令民間皆植桑麻四年始徵其稅不種桑者輸絹不種麻者輸布如周官里布法詔可帝念水旱不時緩急無所恃命思義令天下立預備倉以防水旱思義首邦計以農桑積貯為急凡所興設雖本帝意而經畫詳密時稱其能調陝西行省參政卒於官終洪武朝為戶部尚書者四十餘人皆不久於職績用罕著惟茹太素楊靖滕德懋范敏費震之屬差有聲太素靖自有傳德懋字思勉吳人由中書省掾歷外任洪武三年召拜兵部尚書尋改戶部為人有才辨器量弘偉長於奏疏一時招徠詔諭之文多出其手以事免官卒范敏閿鄉人洪武八年舉秀才擢戶部郎中十三年授試尚書薦耆儒王本等皆拜四輔官帝以徭役不均命編造黃册敏議百一十戶為里丁多者十人為里長鳩一里之事以供歲役十年一周餘百戶為十甲後遂仍其制不廢明年以不職罷費震鄱陽人洪武初以賢良徵為吉水知州寬惠得民擢知漢中歲凶盜起發倉粟十餘萬斛貸民俾秋成還倉盜聞皆來歸令占宅自為保伍得數千家帝聞而嘉之後坐事被逮以有善政特釋為寶鈔提舉十一年帝謂吏部曰資格為常流設耳有才能者當不次用之超擢者九十五人而拜震戶部侍郎尋進尚書奉命定丞相御史大夫以下歲祿之制出為湖廣布政使以老致仕洪武初有張琬者鄱陽人以貢士試高等授給事中改戶部主事一日帝問天下財賦戶口之數口對無遺帝悅立擢左侍郎謹身殿災上言時政歲飢請蠲民租百萬餘石俱見嘉納琬才敏有心計年二十七卒於官時人惜之周禎字文典江寧人元末流寓湖南太祖平武昌用為江西行省僉事歷大理卿太祖以唐宋皆有成律斷獄惟元以一時行事為條格胥吏易為姦詔禎與李善長劉基陶安滕毅等定律令少卿劉惟謙丞周湞與焉書成太祖稱善洪武元年設刑部以禎為尚書尋改治書侍御史明年出為廣東行省參政時省治初開正官多缺吏治鮮勸懲香山丞沖敬有治行以勞卒官禎為文祭之聞者感動一時郡邑良吏雷州同知余騏惠州知府萬迪乳源知縣張安仁清流知縣李鐸揭陽縣丞許德廉州知府脫因歸善知縣木寅禎皆列其政績以聞寅土司脫因蒙古人也於是屬吏益勸三年九月召為御史中丞尋引疾致仕帝初即位懲元寬縱用法太嚴奉行者重足立律令既具吏士始知循守其後數有釐正皆以禎書為權輿云劉惟謙不詳何許人吳元年以才學舉洪武初歷官刑部尚書六年命詳定新律刪繁損舊輕重得宜帝親加裁定頒行焉後坐事免周湞字伯寧鄱陽人江西十才子之一也官亦至刑部尚書終洪武世為刑部者亦幾四十人楊靖最著而端復初李質黎光劉敏亦有名復初字以善溧水人子貢裔也從省文稱端氏元末為小吏常遇春鎮金華召致幕下未幾辭去太祖知其名召為徽州府經歷令民自實田彙為圖籍積弊盡刷稍遷至磨勘司令時官署新立案牘填委復初鈎稽無遺帝嘗廷譽之性嚴峭人不敢干以私僚屬多貪敗復初獨以清白免洪武四年超拜刑部尚書用法平杭州飛糧事覺逮繫百餘人詔復初往治誠偽立辨知府以下皆服罪明年出為湖廣參政令民來歸者復其賦一年流亡畢集以治辦聞坐事召還卒子孝文翰林待詔孝思翰林侍書先後使朝鮮並著清節朝鮮人為立雙清館云李質字文彬德慶人有材略元末居何真麾下嘗募兵平德慶亂民旁郡多賴其保障名士客嶺南者茶陵劉三吾江右伯顏子中羊城孫蕡建安張智等皆禮之洪武元年從真降授中書斷事明年改都督府斷事強力執法五年擢刑部侍郎進尚書治獄平恕遣振飢山東御製詩餞之尋出為浙江行省參政居三年惠績著聞帝念質老召還嘗入見便殿訪時政質直言無隱拜靖江王右相王罪廢質竟坐死黎光東莞人以鄉薦拜御史巡蘇州請振水災全活甚衆巡鳳陽上封事悉切時弊帝嘉之洪武九年擢刑部侍郎執法不阿為御史大夫陳寧所忌坐事死貶所劉敏肅寧人舉孝廉為中書省吏嘗暮市蘆龍江旦載於家俾妻織席鬻以奉母而後入治事性廉介或遺之瓷瓦器亦不受為楚相府録事中書以沒官女婦給文臣家衆勸其請給以事母敏固辭曰事母子婦事何預他人及省臣敗吏多坐誅敏獨無所預帝賢之擢工部侍郎改刑部出為徽州府同知有惠政卒於官楊靖字仲寧山陽人洪武十八年進士選吏科庶吉士明年擢戶部侍郎時任諸司者率進士及太學生然時有不法者帝製大誥舉通政使蔡瑄左通政茹瑺工部侍郎秦逵及靖以諷厲之曰此亦進士太學生也能率職以稱朕心其見稱如此二十二年進尚書明年五月詔在京官三年皆遷調著為令乃以刑部尚書趙勉與靖換官諭曰愚民犯法如啖飲食設法防之犯者益衆推恕行仁或能感化自今惟犯十惡並殺人者死餘罪皆令輸粟北邊又曰在京獄囚卿等覆奏朕親審決猶恐有失在外各官所擬豈能盡當卿等當詳讞然後遣官審決靖承旨研辨多所平反帝嘉納之嘗鞫一武辨門卒撿其身得大珠屬僚驚異靖徐曰偽也安有珠大如此者乎碎之帝聞歎曰靖此舉有四善焉不獻朕求悅一善也不窮追投獻二善也不奬門卒杜小人僥幸三善也千金之珠卒然而至略不動心有過人之智應變之才四善也二十六年兼太子賓客並給二祿已坐事免會征龍州趙宗壽詔靖諭安南輸粟餉師以白衣往安南相黎一元以陸運險艱欲不奉詔靖宣示反覆開諭且許以水運一元乃輸粟二萬至海江別造浮橋以達龍州帝大悅拜靖左都御史靖公忠有智略善理繁劇治獄明察而不事深文寵遇最厚同列無與比三十年七月坐為鄉人代改訴冤狀草為御史所劾帝怒遂賜死時年三十八時有凌漢字斗南原武人以秀才舉獻烏鵲論授官歷任御史巡按陝西疏所部疾困數事帝善之召其子賜衣鈔漢鞫獄平允及還京有德漢者邀置酒欲厚贈以金漢曰酒可飲金不可受也帝聞之嘉歎擢右都御史時詹徽為左論議不合每面折徽徽銜之左遷刑部侍郎改禮部後為徽所劾降左僉都御史帝憫其衰令歸田里漢以徽在有後憂不敢去歲餘徽誅復擢右僉都御史尋致仕歸漢出言不檢居官屢躓然以廉直見知於帝故終得保全又吳人嚴德珉由御史擢左僉都御史以疾求歸帝怒黥其面謫戍南丹遇赦放還布衣徒步自齒齊民宣德中猶存嘗以事為御史所逮德珉跪堂下自言曾在臺勾當公事曉三尺法御史問何官答言洪武中臺長所謂嚴德珉是也御史大驚揖起之次日往謁則擔囊徙矣有教授與飲見其面黥戴敝冠問老人犯何法德珉述前事因言先時國法甚嚴仕者不保首領此敝冠不易戴也乃北面拱手稱聖恩聖恩云單安仁字德夫濠人少為府吏元末江淮兵亂安仁集義兵保鄉里授樞密判官從鎮南王孛羅普化守揚州時羣雄四起安仁歎曰此輩皆為人驅除耳王者之興當自有別鎮南王為長槍軍所逐安仁無所屬聞太祖定集慶乃曰此誠是已率衆歸附太祖悅即命將其軍守鎮江嚴飭軍伍敵不敢犯移守常州其子叛降張士誠太祖知安仁忠謹弗疑也久之遷浙江副使悍帥橫斂民名曰寨糧安仁置於法進按察使徵為中書左司郎中佐李善長裁斷調瑞州守禦千戶入為將作卿洪武元年擢工部尚書仍領將作事安仁精敏多智計諸所營造大小中程甚稱帝意逾年改兵部尚書請老歸賜田三千畝牛七十角歲給尚書半俸六年起山東參政懇辭許之家居嘗奏請濬儀真南壩至朴樹灣以便官民輸挽疏轉運河江都深港以防淤淺移瓜州倉厫置揚子橋西免大江風潮之患帝善其言再授兵部尚書致仕初尚書階正三品十三年中書省罷始進為正二而安仁致仕在前帝念安仁勳舊二十年特授資善大夫其年十二月卒年八十五徐州朱守仁者字元夫元末亦以保障功官樞密同知守舒城明兵下廬州以城來歸歷官工部侍郎洪武四年進尚書奉命察山東官吏稱旨尋改北平行省參政以餽餉不繼謫蒼梧知縣初守仁知袁州撫安創殘民甚德之至是連知容州高唐州皆有善政十年進四川布政使治尚簡嚴以年老致仕坐事罰輸作特宥之十五年雲南平改威楚開南等路宣撫司為楚雄府遂命守仁知府事招集流移均徭役建學校境內大治二十八年上計入朝郡人垂涕送之拜太僕卿首請立牧馬草場於江北滁州諸處所轄十四監九十八羣馬大蕃息馬政之修自守仁始久之致仕永樂初入朝遇疾卒薛祥字彥祥無為人從俞通海來歸渡江為水寨管軍鎮撫數從征有功洪武元年轉漕河南夜半抵蔡河賊驟至祥不為動好語諭散之帝聞大喜以方用兵供億艱授京畿都漕運使分司淮安濬河築堤自揚達濟數百里徭役均平民無怨言有勞者立奏授以官元都下官民南遷道經淮安祥多方存恤山陽海州民亂駙馬都尉黃琛捕治詿誤甚衆祥會鞫無驗者悉原之治淮八年民相勸為善及考滿還京皆焚香祝其再來或肖像祀之八年授工部尚書時造鳳陽宮殿帝坐殿中若有人持兵鬬殿脊者太師李善長奏諸工匠用厭鎮法帝將盡殺之祥為分別交替不在工者並鐵石匠皆不預活者千數營謹身殿有司列中匠為上匠帝怒其罔命棄市祥在側爭曰奏對不實竟殺人恐非法得旨用腐刑祥復徐奏曰腐廢人矣莫若杖而使工帝可之明年改天下行省為承宣布政司以北平重地特授祥三年治行稱第一為胡惟庸所惡坐營建擾民謫知嘉興府惟庸誅復召為工部尚書帝曰讒臣害汝何不言對曰臣不知也明年坐纍杖死天下哀之子四人謫瓊州遂為瓊山人孫遠正統七年進士景泰時官戶部郎中天順元年擢本部右侍郎改工部奉詔塞開封決河還仍改戶部成化初督兩廣軍餉位至南京兵部尚書以忤汪直免官其繼祥為工部尚書有名者有秦逵等逵字文用宣城人洪武十八年進士歷事都察院奉檄清理囚徒寬嚴得宜帝嘉其能擢工部侍郎時營繕事繁部中缺尚書凡興作事皆逵領之初議籍四方工匠驗其丁力定三年為班更番赴京三月交代名曰輪班匠未及行至是逵議量地遠近為班次置籍為勘合付之至期齎至部免其家徭役著為令帝念逵勤勩詔有司復其家二十二年進尚書明年改兵部未幾復改工部帝以學校為國儲材而士子巾服無異胥吏宜更易之命逵製式以進凡三易其製始定賜監生藍衫縧各一以為天下先明代士子衣冠蓋創自逵云有趙翥者永寧人有志節以學行聞由訓導舉賢良擢贊善大夫拜工部尚書奏定天下歲造軍器之數及議定藩王宮城制度趙俊者不知何許人自工部侍郎進尚書帝以國子監所藏書板歲久殘剝命諸儒考補工部督匠修治俊奉詔監理古籍始備洪武十二年翥改署刑部尋致仕去俊十七年免而逵於二十五年九月坐事自殺唐鐸字振之虹人太祖初起兵即侍左右守濠州從定江州授西安縣丞召為中書省管勾洪武元年湯和克延平以鐸知府事拊輯新附士民安之居三年入為殿中侍御史復出知紹興府六年十二月召拜刑部尚書明年改太常卿丁母憂特給半俸十四年服闋起兵部尚書明年初置諫院以為諫議大夫帝嘗與侍臣論歷代興廢曰使朕子孫如成康輔弼如周召則可祈天永命鐸因進曰豫教元良選左右為輔導宗社萬年福也帝又謂鐸曰人有公私故言有邪正正言務規諫邪言務謗諛鐸曰謗近忠諛近愛不為所眩則讒佞自遠未幾左遷監察御史請選賢能京官遍歷郡縣訪求賢才體察官吏選歷練老成望隆名重者居布政按察之職帝從之既復擢為右副都御史歷刑兵二部尚書二十二年置詹事院命吏部曰輔導太子必擇端重之士三代保傅禮甚尊嚴兵部尚書鐸謹厚有德量以為詹事食尚書俸如故以鐸嘗請豫教故也其年致仕二十六年起太子賓客進太子少保二十八年龍州土官趙宗壽以奏鄭國公常茂死事不實被召又不至帝怒命楊文統大軍往討而命鐸招諭鐸至廉得茂實病死宗壽亦伏罪來朝乃詔文移兵征奉議諸州叛蠻即以鐸參議軍事逾月諸蠻平鐸相度形勢請設奉議衛及向武河池懷集武仙賀縣諸處守禦千戶所鎮以官軍皆報可鐸為人長者性慎密不妄取豫帝以故舊遇之嘗曰鐸自友及臣至今三十餘年其與人交不至變色絶亦不出惡聲又曰都御史詹徽剛斷嫉惡胥吏不得肆其貪謗訕滿朝唐鐸重厚又謂懦而無為人心不古有若是耶後徽卒坐罪誅死而鐸恩遇不替三十年七月卒於京師年六十九賻贈甚厚命有司護其喪歸葬沈溍字尚賢錢塘人與鐸同官兵部以明敏稱帝嘗以勳臣子弟多骫法撰大誥二十二篇諭天下武臣皆令誦習使知警惕已又以諭戒八條頒示將士時溍以試兵部侍郎掌部事一切訓飭事宜皆承旨行之尋進尚書廣西都司建譙樓青州衛造軍器皆擅科民財溍請凡都司衛所營作必都督府奏準官給物料毋擅役民違者治罪仍禁武臣預民事時干戈甫息武臣暴橫數扞文法至是始戢溍力也帝嘗諭致治之要在進賢退不肖溍因言君子常少小人常多在上風厲之耳賢者舉而不仁者遠矣帝善其言二十三年以溍與工部尚書秦逵換官賜誥奬諭尋復舊任後以事免明初衛所世籍及軍卒勾補之法皆溍所定然名目瑣細簿籍煩多吏易為姦終明之世頗為民患而軍衛亦日益耗減語詳兵志潮州生陳質父在戍籍父沒質被勾補請歸卒業帝命除其籍溍以缺軍伍持不可帝曰國家得一卒易得一士難遂除之然此皆特恩云開濟字來學洛陽人元末為察罕帖木兒掌書記洪武初以明經舉授河南府訓導入為國子助教以疾罷歸十五年七月御史大夫安然薦濟有吏治才召試刑部尚書踰年實授濟以綜核為己任請天下諸司設文簿日書所行事課得失又各部勘合文移立程限定功罪又言軍民以細故犯罪者宜即決遣數月間滯牘一清帝大以為能會都御史趙仁言曩者以賢良方正孝弟力田諸科所取士列置郡縣多不舉職宜核其去留濟條議以經明行修為一科工習文詞為一科通曉書義為一科人品俊秀為一科練達治理為一科言有條理為一科六科備者為上三科以上為中不及三科者為下從之濟敏慧有才辨凡國家經制田賦獄訟工役河渠事衆莫能裁定濟一算畫即有條理品式可為世守以故帝甚信任數備顧問兼預他部事人以是忌之謗議滋起然濟亦深刻好以法中傷人嘗奉命定詐偽律濟議法巧密帝曰張密網以羅民可乎又設籍曰寅戌之書以程僚屬出入帝切責曰古人以卯酉為常今使趨事者朝寅暮戌奉父母會妻子幾何時耶又為榜戒其僚屬請揭文華殿帝曰告誡僚屬之言欲張殿廷豈人臣禮濟慚謝尋令郎中仇衍脫囚死為獄官所發濟與侍郎王希哲主事王叔徵執獄官斃之其年十二月御史陶垕仲等發其事且言濟奏事時置奏劄懷中或隱而不言覘伺上意務為兩端姦狡莫測役甥女為婢妹早寡逐其姑而略其家財帝怒下濟獄併希哲衍等皆棄市贊曰六部之制仿於周官所以佐王理邦國熙庶績任至重也明興建官分職立法秩然又三途用人求賢彌廣若陳修滕毅之典銓法楊思義范敏之治賦役周禎之定律令單安仁之領將作以至沈溍開濟輩之所經畫皆委曲詳備細大不遺考其規模固一代政治之權輿者歟
