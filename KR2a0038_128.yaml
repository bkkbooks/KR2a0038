body:
  text: 明史卷一百二十八列傳第十六劉基子璉璟宋濂葉琛章溢子存道劉基字伯溫青田人曾祖濠仕宋為翰林掌書宋亡邑子林融倡義旅事敗元遣使簿錄其黨多連染使道宿濠家濠醉使者而焚其廬籍悉毀使者計無所出乃為更其籍連染者皆得免基幼穎異其師鄭復初謂其父爚曰君祖德厚此子必大君之門矣元至順間舉進士除高安丞有廉直聲行省辟之謝去起為江浙儒學副提舉論御史失職為臺臣所阻再投劾歸基博通經史於書無不窺尤精象緯之學西蜀趙天澤論江左人物首稱基以為諸葛孔明儔也方國珍起海上掠郡縣有司不能制行省復辟基為元帥府都事基議築慶元諸城以逼賊國珍氣沮及左丞帖里帖木兒招諭國珍基言方氏兄弟首亂不誅無以懲後國珍懼厚賂基基不受國珍乃使人浮海至京賄用事者遂詔撫國珍授以官而責基擅威福羇管紹興方氏遂愈橫亡何山寇蜂起行省復辟基剿捕與行院判石抹宜孫守處州經略使李國鳳上其功執政以方氏故抑之授總管府判不與兵事基遂棄官還青田著郁離子以見志時避方氏者爭依基基稍為部署寇不敢犯及太祖下金華定括蒼聞基及宋濂等名以幣聘基未應總制孫炎再致書固邀之基始出既至陳時務十八策太祖大喜築禮賢館以處基等寵禮甚至初太祖以韓林兒稱宋後遙奉之歲首中書省設御座行禮基獨不拜曰牧豎耳奉之何為因見太祖陳天命所在太祖問征取計基曰士誠自守虜不足慮友諒劫主脅下名號不正地據上流其心無日忘我宜先圖之陳氏滅張氏勢孤一舉可定然後北向中原王業可成也太祖大悅曰先生有至計勿惜盡言會陳友諒陷太平謀東下勢張甚諸將或議降或議奔據鍾山基張目不言太祖召入內基奮曰主降及奔者可斬也太祖曰先生計安出基曰賊驕矣待其深入伏兵邀取之易耳天道後舉者勝取威制敵以成王業在此舉矣太祖用其策誘友諒至大破之以克敵賞賞基基辭友諒兵復陷安慶太祖欲自將討之以問基基力贊遂出師攻安慶自旦及暮不下基請逕趨江州擣友諒巢穴遂悉軍西上友諒出不意帥妻子奔武昌江州降其龍興守將胡美遣子通請勿散其部曲太祖有難色基從後蹋胡牀太祖悟許之美降江西諸郡皆下基喪母值兵事未敢言至是請還葬會苗軍反殺金處守將胡大海耿再成等浙東搖動基至衢為守將夏毅諭安諸屬邑復與平章郡榮等謀復處州亂遂定國珍素畏基致書唁基答書宣示太祖威德國珍遂入貢太祖數以書即家訪軍國事基條答悉中機宜尋赴京太祖方親援安豐基曰漢吳伺隙未可動也不聽友諒聞之乘間圍洪都太祖曰不聽君言幾失計遂自將救洪都與友諒大戰鄱陽湖一日數十接太祖坐胡牀督戰基侍側忽躍起大呼趣太祖更舟太祖倉卒徙別舸坐未定飛礮擊舊所御舟立碎友諒乘高見之大喜而太祖舟更進漢軍皆失色時湖中相持三日未決基請移軍湖口扼之以金木相犯日決勝友諒走死其後太祖取士誠北伐中原遂成帝業略如基謀吳元年以基為太史令上戊申大統曆熒惑守心請下詔罪己大旱請決滯獄即命基平反雨隨注因請立法定制以止濫殺太祖方欲刑人基請其故太祖語之以夢基曰此得土得衆之象宜停刑以待後三日海寧降太祖喜悉以囚付基縱之尋拜御史中丞兼太史令太祖即皇帝位基奏立軍衞法初定處州稅糧視宋制畝加五合惟青田命毋加曰令伯溫鄉里世世為美談也帝幸汴梁基與左丞相善長居守基謂宋元寬縱失天下今宜肅紀綱令御史糾劾無所避宿衞宦侍有過者皆啟皇太子置之法人憚其嚴中書省都事李彬坐貪縱抵罪善長素暱之請緩其獄基不聽馳奏報可方祈雨即斬之由是與善長忤帝歸愬基僇人壇壝下不敬諸怨基者亦交譖之會以旱求言基奏士卒物故者其妻悉處別營凡數萬人陰氣鬱結工匠死胔骸暴露吳將吏降者皆編軍戶足干和氣帝納其言旬日仍不雨帝怒會基有妻喪遂請告歸時帝方營中都又銳意滅擴廓基瀕行奏曰鳳陽雖帝鄉非建都地王保保未可輕也已而定西失利擴廓竟走沙漠迄為邊患其冬帝手詔基勳伐召赴京賜賚甚厚追贈基祖父皆永嘉郡公累欲進基爵基固辭不受初太祖以事責丞相李善長基言善長勳舊能調和諸將太祖曰是數欲害君君乃為之地耶吾行相君矣基頓首曰是如易柱須得大木若束小木為之且立覆及善長罷帝欲相楊憲憲素善基基力言不可曰憲有相才無相器夫宰相者持心如水以義理為權衡而己無與者也憲則不然帝問汪廣洋曰此褊淺殆甚於憲又問胡惟庸曰譬之駕懼其僨轅也帝曰吾之相誠無逾先生基曰臣疾惡太甚又不耐繁劇為之且孤上恩天下何患無才惟明主悉心求之目前諸人誠未見其可也後憲廣洋惟庸皆敗三年授弘文館學士十一月大封功臣授基開國翊運守正文臣資善大夫上護軍封誠意伯祿二百四十石明年賜歸老於鄉帝嘗手書問天象基條答甚悉而焚其草大要言霜雪之後必有陽春今國威已立宜少濟以寬大基佐定天下料事如神性剛嫉惡與物多忤至是還隱山中惟飲酒弈棋口不言功邑令求見不得微服為野人謁基基方濯足令從子引入茆舍炊黍飯令令告曰某青田知縣也基驚起稱民謝去終不復見其韜跡如此然究為惟庸所中初基言甌括間有隙地曰談洋南抵閩界為鹽盜藪方氏所由亂請設巡檢司守之奸民弗便也會茗洋逃軍反吏匿不以聞基令長子璉奏其事不先白中書省胡惟庸方以左丞掌省事挾前憾使吏訐基謂談洋地有王氣基圖為墓民弗與則請立巡檢逐民帝雖不罪基然頗為所動遂奪基祿基懼入謝乃留京不敢歸未幾惟庸相基大慼曰使吾言不驗蒼生福也憂憤疾作八年三月帝親製文賜之遣使護歸抵家疾篤以天文書授子璉曰亟上之毋令後人習也又謂次子璟曰夫為政寬猛如循環當今之務在修德省刑祈天永命諸形勝要害之地宜與京師聲勢連絡我欲為遺表惟庸在無益也惟庸敗後上必思我有所問以是密奏之居一月而卒年六十五基在京病時惟庸以醫來飲其藥有物積腹中如拳石其後中丞涂節首惟庸逆謀幷謂其毒基致死云基虬髯貌修偉慷慨有大節論天下安危義形於色帝察其至誠任以心膂每召基輒屏人密語移時基亦自謂不世遇知無不言遇急難勇氣奮發計畫立定人莫能測暇則敷陳王道帝每恭己以聽常呼為老先生而不名曰吾子房也又曰數以孔子之言導予顧帷幄語秘莫能詳而世所傳為神奇多陰陽風角之說非其至也所為文章氣昌而奇與宋濂並為一代之宗所著有覆瓿集犁眉公集傳於世子璉璟璉字孟藻有文行洪武十年授考功監丞試監察御史出為江西參政太祖常欲大用之為惟庸黨所脅墮井死璉子廌字士端洪武二十四年三月嗣伯食祿五百石初基爵止及身至是帝追念基功又憫基父子皆為惟庸所厄命增其祿予世襲明年坐事貶秩歸里洪武末坐事戍甘肅尋赦還建文帝及成祖皆欲用之以奉親守墓力辭永樂間卒子法停襲景泰三年命錄基後授法曾孫祿世襲五經博士弘治十三年以給事中吳士偉言乃命祿孫瑜為處州衞指揮使正德八年加贈基太師諡文成嘉靖十年刑部郎中李瑜言基宜侑享高廟封世爵如中山王達下廷臣議僉言高帝收攬賢豪一時佐命功臣並軌宣猷而帷幄奇謀中原大計往往屬基故在軍有子房之稱剖符發諸葛之喻基亡之後孫廌實嗣太祖召諭再三鐵券丹書誓言世祿廌嗣未幾旋即隕世褫圭裳於末裔委帶礪於空言或謂後嗣孤貧弗克負荷或謂長陵紹統遂至猜嫌雖一辱泥塗傳聞多謬而載書盟府績效具存昔武王興滅天下歸心成季無後君子所歎基宜侑享太廟其九世孫瑜宜嗣伯爵與世襲制曰可瑜卒孫世延嗣嘉靖末南京振武營兵變世延掌右軍都督府事撫定之數上封事不報忿而恣橫萬曆三十四年坐罪論死卒適孫萊臣年幼庶兄藎臣借襲藎臣卒萊臣當襲藎臣子孔昭復據之崇禎時出督南京操江福王之立與馬士英阮大鋮比後航海不知所終璟字仲璟基次子弱冠通諸經太祖念基每歲召璟同章溢子允載葉琛子永道胡深子伯機入見便殿燕語如家人洪武二十三年命襲父爵璟言有長兄子廌在帝大喜命廌襲封以璟為閤門使且諭之曰考宋制閤門使即儀禮司朕欲汝日夕左右以宣達為職不特禮儀也帝臨朝出侍班百官奏事有闕遺者隨時糾正都御史袁泰奏車牛事失實帝宥之泰忘引謝璟糾之服罪帝因諭璟凡似此者即面糾朕雖不之罪要令知朝廷綱紀已復令同法司錄獄囚冤滯谷王就封擢為左長史璟論說英侃喜談兵初溫州賊葉丁香叛延安侯唐勝宗討之決策於璟破賊還稱璟才略帝喜曰璟真伯溫兒矣嘗與成祖弈成祖曰卿不少讓耶璟正色曰可讓處則讓不可讓者不敢讓也成祖默然靖難兵起璟隨谷王歸京師獻十六策不聽令參李景隆軍事景隆敗璟夜渡盧溝河冰裂馬陷冒雪行三十里子貊自大同赴難遇之良鄉與俱歸上聞見錄不省遂歸里成祖即位召璟稱疾不至逮入京猶稱殿下且云殿下百世後逃不得一篡字下獄自經死法官希旨緣坐其家成祖以基故不許宣德二年授貊刑部照磨宋濂字景濂其先金華之潛溪人至濂乃遷浦江幼英敏強記就學於聞人夢吉通五經復往從吳萊學已遊柳貫黃溍之門兩人皆亟遜濂自謂弗如元至正中薦授翰林編修以親老辭不行入龍門山著書踰十餘年太祖取婺州召見濂時已改寧越府命知府王顯宗開郡學因以濂及葉儀為五經師明年三月以李善長薦與劉基章溢葉琛並徵至應天除江南儒學提舉命授太子經尋改起居注濂長基一歲皆起東南負重名基雄邁有奇氣而濂自命儒者基佐軍中謀議濂亦首用文學受知侍左右備顧問嘗召講春秋左氏傳濂進曰春秋乃孔子褒善貶惡之書苟能遵行則賞罰適中天下可定也太祖御端門口釋黃石公三略濂曰尚書二典三謨帝王大經大法畢具願留意講明之已論賞賚復曰得天下以人心為本人心不固雖金帛充牣將焉用之太祖悉稱善乙巳三月乞歸省太祖與太子並加勞賜濂上箋謝幷奉書太子勉以孝友敬恭進德修業太祖覽書大悅召太子為語書音賜札褒答幷令太子致書報焉尋丁父憂服除召還洪武二年詔修元史命充總裁官是年八月史成除翰林院學士明年二月儒士歐陽佑等採故元元統以後事蹟還朝仍命濂等續修六越月再成賜金帛是月以失朝參降編修四年遷國子司業坐考祀孔子禮不以時奏謫安遠知縣旋召為禮部主事明年遷贊善大夫是時帝留意文治徵召四方儒士張唯等數十人擇其年少俊異者皆擢編修令入禁中文華堂肄業命濂為之師濂傅太子先後十餘年凡一言動皆以禮法諷勸使歸於道至有關政教及前代興亡事必拱手曰當如是不當如彼皇太子每斂容嘉納言必稱師父云帝剖符封功臣召濂議五等封爵宿大本堂討論達旦歷據漢唐故實量其中而奏之甘露屢降帝問災祥之故對曰受命不於天於其人休符不於祥於其仁春秋書異不書祥為是故也皇從子文正得罪濂曰文正固當死陛下體親親之誼置諸遠地則善矣車駕祀方丘患心不寧濂從容言曰養心莫善於寡欲審能行之則心清而身泰矣帝稱善者良久嘗問以帝王之學何書為要濂舉大學衍義乃命大書揭之殿兩廡壁頃之御西廡諸大臣皆在帝指衍義中司馬遷論黃老事命濂講析講畢因曰漢武溺方技謬悠之學改文景恭儉之風民力既敝然後嚴刑督之人主誠以禮義治心則邪說不入以學校治民則禍亂不興刑罰非所先也問三代曆數及封疆廣狹既備陳之復曰三代治天下以仁義故多歷年所又問三代以上所讀何書對曰上古載籍未立人不專講誦君人者兼治教之責率以躬行則衆自化嘗奉制詠鷹令七舉足即成有自古戒禽荒之言帝忻然曰卿可謂善陳矣濂之隨事納忠皆此類也六年七月遷侍講學士知制誥同修國史兼贊善大夫命與詹同樂韶鳳修日曆又與吳伯宗等修寶訓九月定散官資階給濂中順大夫欲任以政事辭曰臣無他長待罪禁近足矣帝益重之八年九月從太子及秦晉楚靖江四王講武中都帝得輿圖濠梁古蹟一卷遣使賜太子題其外令濂詢訪隨處言之太子以示濂因歷歷舉陳隨事進說甚有規益濂性誠謹官內庭久未嘗訐人過所居室署曰溫樹客問禁中語即指示之嘗與客飲帝密使人偵視翼日問濂昨飲酒否坐客為誰饌何物濂具以實對笑曰誠然卿不朕欺間召問羣臣臧否濂惟舉其善者曰善者與臣友臣知之其不善者不能知也主事茹太素上書萬餘言帝怒問廷臣或指其書曰此不敬此誹謗非法問濂對曰彼盡忠於陛下耳陛下方開言路惡可深罪既而帝覽其書有足採者悉召廷臣詰責因呼濂字曰微景濂幾誤罪言者於是帝廷譽之曰朕聞太上為聖其次為賢其次為君子宋景濂事朕十九年未嘗有一言之偽誚一人之短始終無二非止君子抑可謂賢矣每燕見必設坐命茶每旦必令侍膳往復咨詢常夜分乃罷濂不能飲帝嘗強之至三觴行不成步帝大懽樂御製楚辭一章命詞臣賦醉學士詩又嘗調甘露於湯手酌以飲濂曰此能愈疾延年願與卿共之又詔太子賜濂良馬復為製白馬歌一章亦命侍臣和焉其寵待如此九年進學士承旨知制誥兼贊善如故其明年致仕賜御製文集及綺帛問濂年幾何曰六十有八帝乃曰藏此綺三十二年作百歲衣可也濂頓首謝又明年來朝十三年長孫慎坐胡惟庸黨帝欲置濂死皇后太子力救乃安置茂州濂狀貌豐偉美鬚髯視近而明一黍上能作數字自少至老未嘗一日去書卷於學無所不通為文醇深演迤與古作者並在朝郊社宗廟山川百神之典朝會宴享律曆衣冠之制四裔貢賦賞勞之儀旁及元勳巨卿碑記刻石之辭咸以委濂屢推為開國文臣之首士大夫造門乞文者後先相踵外國貢使亦知其名數問宋先生起居無恙否高麗安南日本至出兼金購文集四方學者悉稱為太史公不以姓氏雖白首侍從其勳業爵位不逮基而一代禮樂制作濂所裁定者居多其明年卒於夔年七十二知事葉以從葬之蓮花山下蜀獻王慕濂名復移塋華陽城東弘治九年四川巡撫馬俊奏濂真儒翊運述作可師黼黻多功輔導著績久死遠戍幽壤沉淪乞加卹錄下禮部議復其官春秋祭葬所正德中追諡文憲仲子璲最知名字仲珩善詩尤工書法洪武九年以濂故召為中書舍人其兄子慎亦為儀禮序班帝數試璲與慎幷教誡之笑語濂曰卿為朕教太子諸王朕亦教卿子孫矣濂行步艱帝必命璲慎扶掖之祖孫父子共官內庭衆以為榮慎坐罪璲亦連坐並死家屬悉徙茂州建文帝即位追念濂興宗舊學召璲子懌官翰林永樂十年濂孫坐姦黨鄭公智外親詔特宥之葉琛字景淵麗水人博學有才藻元末從石抹宜孫守處州為畫策捕誅山寇授行省元帥王師下處州琛避走建寧以薦徵至應天授營田司僉事尋遷洪都知府佐鄧愈鎮守祝宗康泰叛愈脫走琛被執不屈大罵死之追封南陽郡侯塑像耿再成祠後祀功臣廟章溢字三益龍泉人始生聲如鐘弱冠與胡深同師王毅毅字叔剛許謙門人也教授鄉里講解經義聞者多感悟溢從之遊同志聖賢學天性孝友嘗遊金華元憲使禿堅不花禮之改官秦中要與俱行至虎林心動辭歸歸八日而父歿未葬火焚其廬溢搏顙籲天火至柩所而滅蘄黃寇犯龍泉溢從子存仁被執溢挺身告賊曰吾兄止一子寧我代賊素聞其名欲降之縛於柱溢不為屈至夜紿守者脫歸集里民為義兵擊破賊俄府官以兵來欲盡誅詿誤者溢走說石抹宜孫曰貧民迫凍餒誅之何為宜孫然其言檄止兵留溢幕下從平慶元浦城盜授龍泉主簿不受歸宜孫守台州為賊所圍溢以鄉兵赴援却賊已而賊陷龍泉監縣寶忽丁遁去溢與其師王毅帥壯士擊走賊寶忽丁還內慚殺毅以反溢時在宜孫幕府聞之馳歸偕胡深執戮首惡因引兵平松陽麗水諸寇長槍軍攻婺聞溢兵至解去論功累授浙東都元帥府僉事溢曰吾所將皆鄉里子弟肝腦塗地而吾獨取功名弗忍也辭不受以義兵屬其子存道退隱匡山明兵克處州避入閩太祖聘之與劉基葉琛宋濂同至應天太祖勞基等曰我為天下屈四先生今天下紛紛何時定乎溢對曰天道無常惟德是輔惟不嗜殺人者能一之耳太祖偉其言授僉營田司事巡行江東兩淮田分籍定稅民甚便之以病久在告太祖知其念母也厚賜遣歸省而留其子存厚於京師浙東設提刑按察使命溢為僉事胡深出師溫州令溢守處州饋餉供億民不知勞山賊來寇敗走之遷湖廣按察僉事時荊襄初平多廢地議分兵屯田且以控制北方從之會浙東按察使宋思顏孔克仁等以職事被逮詞連溢太祖遣太史令劉基諭之曰素知溢守法毋疑也會胡深入閩陷沒處州動搖命溢為浙東按察副使往鎮之溢以獲罪蒙宥不應遷秩辭副使仍為僉事既至宣布詔旨誅首叛者餘黨悉定召舊部義兵分布要害賊寇慶元龍泉溢列木柵為屯賊不敢犯浦城戍卒乏食李文忠欲運處州糧餉之溢以舟車不通而軍中所掠糧多請入官均給之食遂足溫州茗洋賊為患溢命子存道捕斬之朱亮祖取溫州軍中頗掠子女溢悉籍還其家吳平詔存道守處而召溢入朝太祖諭羣臣曰溢雖儒臣父子宣力一方寇盜盡平功不在諸將後復問溢征閩諸將如何對曰湯和由海道胡美由江西必勝然閩中尤服李文忠威信若令文忠從浦城取建寧此萬全計也太祖立詔文忠出師如溢策處州糧舊額一萬三千石軍興加至十倍溢言之丞相奏復其舊浙東造海舶徵巨材於處溢曰處婺之交山巖峻險縱有木從何道出白行省罷之洪武元年與劉基並拜御史中丞兼贊善大夫時廷臣伺帝意多嚴苛溢獨持大體或以為言溢曰憲臺百司儀表當養人廉恥豈恃搏擊為能哉帝親祀社稷會大風雨還坐外朝怒儀禮不合致天變溢委曲明其無罪乃貰之文忠之征閩也存道以所部鄉兵萬五千人從閩平詔存道以所部從海道北征溢持不可曰鄉兵皆農民許以事平歸農今復調之是不信也帝不懌既而奏曰兵已入閩者俾還鄉里昔嘗叛逆之民宜籍為軍使北上一舉而恩威著矣帝喜曰孰謂儒者迂濶哉然非先生一行無能辦者溢行至處州遭母喪乞守制不許鄉兵既集命存道由永嘉浮海而北再上章乞終制詔可溢悲戚過度營葬親負土石感疾卒年五十六帝痛悼親撰文即其家祭之存道溢長子溢應太祖聘存道帥義兵歸總管孫炎炎令守上游屢却陳友定兵及以功授處州翼元帥副使戍浦城總制胡深死命代領其衆為遊擊溢即處城坐鎮之溢謂父子相統於律不宜奏罷存道官不允旋分兵征閩而詔存道守處復部鄉兵從李文忠入閩及還浮海至京師帝褒諭之命從馮勝北征積功授處州衞指揮副使洪武三年從徐達西征留守興元敗蜀將吳友仁再守平陽轉左衞指揮同知五年從湯和出塞征陽和遇敵於斷頭山力戰死焉贊曰太祖既下集慶所至收攬豪雋徵聘名賢一時韜光韞德之士幡然就道若四先生者尤為傑出基濂學術醇深文章古茂同為一代宗工而基則運籌帷幄濂則從容輔導於開國之初敷陳王道忠誠恪慎卓哉佐命臣也至溢之宣力封疆琛之致命遂志宏才大節建豎偉然洵不負弓旌之德意矣基以儒者有用之學輔翊治平而好事者多以讖緯術數妄為傅會其語近誕非深知基者故不錄云
