body:
  text: 明史卷一百二十九列傳第十七馮勝兄國用傅友德廖永忠趙庸楊璟胡美馮勝定遠人初名國勝又名宗異最後名勝生時黑氣滿室經日不散及長雄勇多智略與兄國用俱喜讀書通兵法元末結寨自保太祖略地至妙山國用偕勝來歸甚見親信太祖嘗從容詢天下大計國用對曰金陵龍蟠虎踞帝王之都先拔之以為根本然後四出征伐倡仁義收人心勿貪子女玉帛天下不足定也太祖大悅俾居幕府從克滁和戰三叉河板門寨雞籠山皆有功從渡江取太平遂命國用典親兵委以心腹太祖既擒陳埜先釋之令招其部曲國用策其必叛不如弗遣尋果叛為其下所殺其從子兆先復擁衆屯方山蠻子海牙扼采石國用與諸將攻破海牙水寨又破擒兆先盡降其衆三萬餘人衆疑懼太祖擇驍勇者五百人為親軍宿衞帳中悉屏舊人獨留國用侍榻側五百人者始安即命國用將之以攻集慶爭效死先登與諸將下鎮江丹陽寧國泰興宜興從征金華攻紹興累擢親軍都指揮使卒於軍年三十六太祖哭之慟洪武三年追封郢國公肖像功臣廟位第八國用之卒子誠幼勝先已積功為元帥遂命襲兄職典親軍陳友諒逼龍灣太祖禦之戰石灰山勝攻其中堅大破之又追破之采石遂復太平從征友諒破安慶水寨長驅至江州走友諒進親軍都護從解安豐圍遷同知樞密院事從戰鄱陽下武昌克廬州移兵取江西諸路與諸將收淮東克海安壩取泰州徐達圍高郵未下還師援宜興以勝督軍高郵守將詐降勝令指揮康泰帥數百人先入城敵閉門盡殺之太祖怒召勝決大杖十令步詣高郵勝慚憤攻甚力達亦自宜興還益兵攻克之遂取淮安安豐破擒吳將呂珍於舊館下湖州克平江功次平章常遇春再遷右都督從大將軍達北征下山東諸州郡洪武元年兼太子右詹事坐小法貶一官為都督同知引兵遡河取汴洛下陝州趨潼關守將宵遁遂奪關取華州還汴謁帝行在授征虜右副將軍留守汴梁尋從大將軍征山西由武陟取懷慶踰太行克碗子城取澤潞擒元右丞賈成於猗氏克平陽絳州擒元左丞田保保等獲將士五百餘人帝悅詔右副將軍勝居常遇春下偏將軍湯和居勝下偏將軍楊璟居和下二年渡河趨陝西克鳳翔遂渡隴取鞏昌進逼臨洮降李思齊還從大將軍圍慶陽擴廓遣將攻原州為慶陽聲援勝扼驛馬關敗其將遂克慶陽執張良臣陝西悉平九月帝召大將軍還命勝駐慶陽節制諸軍勝以關陝既定輒引兵還帝怒切責之念其功大赦勿治而賞賚金幣不能半大將軍明年正月復以右副將軍同大將軍出西安擣定西破擴廓帖木兒獲士馬數萬分兵自徽州南出一百八渡徇略陽擒元平章蔡琳遂入沔州遣別將自連雲棧取興元移兵吐番征哨極於西北凱旋論功授開國輔運推誠宣力武臣特進榮祿大夫右柱國同參軍國事封宋國公食祿三千石予世券誥詞謂勝兄弟親同骨肉十餘年間除肘腋之患建爪牙之功平定中原佐成混一所以稱揚之者甚至五年以勝宣力四方與魏國公達曹國公文忠各賜彤弓擴廓在和林數擾邊帝患之大發兵三道出塞命勝為征西將軍帥副將軍陳德傅友德等出西道取甘肅至蘭州友德以驍騎前驅再敗元兵勝復敗之掃林山至甘肅元將上都驢迎降至亦集乃路守將卜顏帖木兒亦降次別篤山岐王𩽆兒只班遁去追獲其平章長加奴等二十七人及馬駝牛羊十餘萬是役也大將軍達軍不利左副將軍文忠殺傷相當獨勝斬獲甚衆全師而還會有言其私匿駝馬者賞不行自後數出練兵臨清北平出大同征元遺衆鎮陝西及河南冊其女為周王妃久之大將軍達左副將軍文忠皆卒而元太尉納哈出擁衆數十萬屯金山數為遼東邊害二十年命勝為征虜大將軍潁國公傅友德永昌侯藍玉為左右副將軍帥南雄侯趙庸等以步騎二十萬征之鄭國公常茂曹國公李景隆申國公鄧鎮等皆從帝復遣故所獲納哈出部將乃剌吾者奉璽書往諭降勝出松亭關分築大寧寬河會州富峪四城駐大寧踰兩月留兵五萬守之而以全師壓金山納哈出見乃剌吾驚曰爾尚存乎乃剌吾述帝恩德納哈出喜遣其左丞探馬赤等獻馬且覘勝軍勝已深入踰金山至女直苦屯降納哈出之將全國公觀童大軍奄至納哈出度不敵因乃剌吾請降勝使藍玉輕騎受之玉飲納哈出酒歡甚解衣衣之納哈出不肯服顧左右咄咄語謀遁去勝之壻常茂在坐遽起砍其臂都督耿忠擁以見勝納哈出將士妻子十餘萬屯松花河聞納哈出傷驚潰勝遣觀童諭之乃降得所部二十餘萬人牛羊馬駝輜重亙百餘里還至亦迷河復收其殘卒二萬餘車馬五萬而都督濮英殿後為敵所殺師還以捷聞並奏常茂激變狀盡將降衆二十萬人入關帝大悅使使者迎勞勝等械繫茂會有言勝多匿良馬使閽者行酒於納哈出之妻求大珠異寶王子死二日強娶其女失降附心又失濮英三千騎而茂亦訐勝過帝怒收勝大將軍印命就第鳳陽奉朝請諸將士亦無賞勝自是不復將大兵矣二十一年奉詔調東昌番兵征曲靖番兵中道叛勝鎮永寧撫安之二十五年命籍太原平陽民為軍立衞屯田皇太孫立加太子太師偕潁國公友德練軍山西河南諸公侯皆聽節制時詔列勳臣望重者八人勝居第三太祖春秋高多猜忌勝功最多數以細故失帝意藍玉誅之月召還京踰二年賜死諸子皆不得嗣而國用子誠積戰功雲南累官至右軍左都督納哈出者元木華黎裔孫為太平路萬戶太祖克太平被執以名臣後待之厚知其不忘元資遣北歸元既亡納哈出聚兵金山畜牧蕃盛帝遣使招諭之終不報數犯遼東為葉旺所敗勝等大兵臨之乃降封海西侯從傅友德征雲南道卒子察罕改封瀋陽侯坐藍玉黨死傅友德其先宿州人後徙碭山元末從劉福通黨李喜喜入蜀喜喜敗從明玉珍玉珍不能用走武昌從陳友諒無所知名太祖攻江州至小孤山友德帥所部降帝與語奇之用為將從常遇春援安豐略廬州還從戰鄱陽湖輕舟挫友諒前鋒被數創戰益力復與諸將邀擊於涇江口友諒敗死從征武昌城東南高冠山下瞰城中漢兵據之諸將相顧莫前友德帥數百人一鼓奪之流矢中頰洞脅不為沮武昌平授雄武衞指揮使從徐達拔廬州別將克夷陵衡州襄陽攻安陸被九創破擒其將任亮從大軍下淮東破張士誠援兵於馬騾港獲戰艘千復大破元將竹貞於安豐同陸聚守徐州擴廓遣將李二來攻次陵子村友德度兵寡不敵遂堅壁不戰詗其衆方散掠以二千人泝河至呂梁登陸擊之單騎奮槊刺其將韓乙敵敗去度且復至亟還開城門而陣於野臥戈以待約聞鼓即起李二果至鳴鼓士騰躍搏戰破擒二召還進江淮行省參知政事撤御前麾蓋鼓吹送歸第明年從大將軍北征破沂州下青州元丞相也速來援以輕騎誘敵入伏奮擊敗走之遂取萊陽東昌明年從定汴洛收諸山寨渡河取衞輝彰德至臨清獲元將為嚮導取德州滄州既克元都偵邏古北隘口守盧溝橋略大同還下保定真定守定州從攻山西克太原擴廓自保安來援萬騎突至友德以五十騎衝却之因夜襲其營擴廓倉卒遁去追至土門關獲其士馬萬計復敗賀宗哲於石州敗脫列伯於宣府遂西會大將軍圍慶陽以偏師駐靈州遏其援兵遂克慶陽還賜白金文綺洪武三年從大將軍擣定西大破擴廓移兵伐蜀領前鋒出一百八渡奪略陽關遂入沔分兵自連雲棧合攻漢中克之以饋餉不繼還軍西安蜀將吳友仁寇漢中友德以三千騎救之攻斗山寨令軍中人燃十炬布山上蜀兵驚遁是冬論功授開國輔運推誠宣力武臣榮祿大夫柱國同知大都督府事封潁川侯食祿千五百石予世券明年充征虜前將軍與征西將軍湯和分道伐蜀和帥廖永忠等以舟師攻瞿塘友德帥顧時等以步騎出秦隴太祖諭友德曰蜀人聞我西伐必悉精銳東守瞿塘北阻金牛以抗我師若出不意直擣階文門戶既隳腹心自潰兵貴神速患不勇耳友德疾馳至陝集諸軍聲言出金牛而潛引兵趨陳倉攀援巖谷晝夜行抵階州敗蜀將丁世珍克其城蜀人斷白龍江橋友德修橋以渡破五里關遂拔文州渡白水江趨綿州時漢江水漲不得渡伐木造戰艦欲以軍聲通瞿塘乃削木為牌數千書克階文綿日月投漢水順流下蜀守者見之皆解體初蜀人聞大軍西征丞相戴壽等果悉衆守瞿塘及聞友德破階文擣江油始分兵援漢州以保成都未至友德已破其守將向大亨於城下謂將士曰援師遠來聞大亨破已膽落無能為也迎擊大敗之遂拔漢州進圍成都壽等以象戰友德令強弩火器衝之身中流矢不退將士殊死戰象反走躪藉死者甚衆壽等聞其主明昇已降乃籍府庫倉廩面縛詣軍門成都平分兵徇州邑未下者克保寧執吳友仁送京師蜀地悉定友德之攻漢州也湯和尚頓軍大溪口既於江流得木牌乃進師而戴壽等撤其精兵西救漢州留老弱守瞿塘故永忠等得乘勝擣重慶降明昇於是太祖製平西蜀文盛稱友德功為第一廖永忠次之師還受上賞五年副征西將軍馮勝征沙漠敗失剌罕於西涼至永昌敗太尉𩽆兒只巴獲馬牛羊十餘萬略甘肅射殺平章不花降太尉鎖納兒等至瓜沙州獲金銀印及雜畜二萬而還是時師出三道獨友德全勝以主將勝坐小法賞不行明年復出雁門為前鋒獲平章鄧孛羅帖木兒還鎮北平陳便宜五事皆從之召還從太子講武於荊山益歲祿千石九年破擒伯顏帖木兒於延安降其衆帝將征雲南命友德巡行川蜀雅播之境修城郭繕關梁因兵威降金筑普定諸山寨十四年副大將軍達出塞討乃兒不花渡北黃河襲灰山斬獲甚衆其年秋充征南將軍帥左副將軍藍玉右副將軍沐英將步騎三十萬征雲南至湖廣分遣都督胡海等將兵五萬由永寧趨烏撒而自帥大軍由辰沅趨貴州克普定普安降諸苗蠻進攻曲靖大戰白石江擒元平章達里麻遂擊烏撒循格孤山而南以通永寧之兵遣兩將軍趨雲南元梁王走死友德城烏撒羣蠻來爭奮擊破之得七星關以通畢節又克可渡河降東川烏蒙芒部諸蠻烏撒諸蠻復叛討之斬首三萬餘級獲牛馬十餘萬水西諸部皆降十七年論功進封潁國公食祿三千石予世券十九年帥師討平雲南蠻二十年副大將軍馮勝征納哈出於金山二十一年東川蠻叛復為征南將軍帥師討平之移兵討越州叛酋阿資明年破之於普安二十三年從晉王燕王征沙漠擒乃兒不花還駐開平復征寧夏明年為征虜將軍備邊北平復從燕王征哈者舍利追元遼王軍甫行遽令班師敵不設備因潛師深入至黑嶺大破敵衆而還再出練兵山陝總屯田事加太子太師尋遣還鄉友德喑啞跳盪身冒百死自偏裨至大將每戰必先士卒雖被創戰益力以故所至立功帝屢敕奬勞子忠尚壽春公主女為晉世子濟熺妃二十五年友德請懷遠田千畝帝不悅曰祿賜不薄矣復侵民利何居爾不聞公儀休事耶尋副宋國公勝分行山西屯田於大同東勝立十六衞是冬再練軍山西河南明年偕召還又明年賜死以公主故錄其孫彥名為金吾衞千戶弘治中晉王為友德五世孫瑛援六王例求襲封下禮官議不許嘉靖元年雲南巡撫都御史何孟春請立祠祀友德詔可名曰報功廖永忠巢人楚國公永安弟也從永安迎太祖於巢湖年最少太祖曰汝亦欲富貴乎永忠曰獲事明主掃除寇亂垂名竹帛是所願耳太祖嘉焉副永安將水軍渡江拔采石太平擒陳埜先破蠻子海牙及陳兆先定集慶克鎮江常州池州討江陰海寇皆有功永安陷於吳以永忠襲兄職為樞密僉院總其軍攻趙普勝柵江營復池州陳友諒犯龍江大呼突陣諸軍從其後大敗之從伐友諒至安慶破其水寨遂克安慶從攻江州州城臨江守備甚固永忠度城高下造橋於船尾名曰天橋以船乘風倒行橋傅於城遂克之進中書省右丞從下南昌援安豐戰鄱陽湖決圍殊死戰敵將張定邊直犯太祖舟常遇春射走之永忠乘飛舸追且射定邊被百餘矢漢卒多死傷明日復與俞通海等以七舟載葦荻乘風縱火焚敵樓船數百又以六舟深入搏戰復旋繞而出敵驚為神又邀擊之涇江口友諒死從征陳理分兵柵四門於江中連舟為長寨絕其出入理降還京太祖以漆牌書功超羣將智邁雄師八字賜之懸於門已從徐達取淮東張士誠遣舟師薄海安太祖令永忠還兵水寨禦之達遂克淮東諸郡從伐士誠取德清進克平江拜中書平章政事尋充征南副將軍帥舟師自海道會湯和討降方國珍進克福州洪武元年兼同知詹事院事略定閩中諸郡至延平破執陳友定尋拜征南將軍以朱亮祖為副由海道取廣東永忠先發書諭元左丞何真曉譬利害真即奉表請降至東莞真帥官屬出迎至廣州降盧左丞擒海寇邵宗愚數其殘暴斬之廣人大悅馳諭九真日南朱厓儋耳三十餘城皆納印請吏進取廣西至梧州降元達魯花赤拜住潯柳諸路皆下遣亮祖會楊璟收未下州郡永忠引兵克南寧降象州兩廣悉平永忠善撫綏民懷其惠為之立祠明年九月還京師帝命太子帥百官迎勞於龍江入見仍命太子送還第復出撫定泉漳三年從大將軍徐達北征克察罕腦兒還封德慶侯食祿一千五百石予世券明年以征西副將軍從湯和帥舟師伐蜀和駐大溪口永忠先發及舊夔府破守將鄒興等兵進至瞿塘關山峻水急蜀人設鐵鎖橋橫據關口舟不得進永忠密遣數百人持糗糧水筒舁小舟踰山渡關出其上流蜀山多草木令將士皆衣青蓑衣魚貫走崖石間度已至帥精銳出墨葉渡夜五鼓分兩軍攻其水陸寨水軍皆以鐵裹船頭置火器而前黎明蜀人始覺盡銳來拒永忠已破其陸寨會將士舁舟出江者一時並發上下夾攻大破之鄒興死遂焚三橋斷橫江鐵索擒同僉蔣達等八十餘人飛天張鐵頭張等皆遁去遂入夔府明日和始至乃與和分道進期會於重慶永忠帥舟師直擣重慶次銅鑼峽蜀主明昇請降永忠以和未至辭俟和至乃受降承制撫慰下令禁侵掠卒取民七茄立斬之慰安戴壽向大亨等家令其子弟持書往成都招諭壽等已為傅友德所敗及得書遂降蜀地悉平帝製平蜀文旌其功有傅一廖二之語褒賚甚厚明年北征至和林六年督舟師出海捕倭尋還京初韓林兒在滁州太祖遣永忠迎歸應天至瓜步覆其舟死帝以咎永忠及大封功臣諭諸將曰永忠戰鄱陽時忘軀拒敵可謂奇男子然使所善儒生窺朕意徼封爵故止封侯而不公及楊憲為相永忠與相比憲誅永忠以功大得免八年三月坐僭用龍鳳諸不法事賜死年五十三子權十三年嗣侯從傅友德征雲南守畢節及瀘州召還十七年卒子鏞不得嗣以嫡子為散騎舍人累官都督建文時與議兵事宿衞殿廷與弟銘皆嘗受學於方孝孺孝孺死鏞銘收其遺骸葬聚寶門外山上甫畢亦見收論死弟鉞及從父指揮僉事昇俱戍邊初廖永忠等之歸太祖也趙庸兄弟亦俱降後亦有過不得封公與永忠類庸廬州人與兄仲中聚衆結水寨屯巢湖歸太祖仲中累功為行樞密院僉事守安慶陳友諒陷安慶仲中棄城走還龍江法當誅常遇春請原之太祖不許曰法不行無以懲後遂誅仲中而以其官授庸從復安慶徇江西諸路進參知政事從戰康郎山與俞通海廖永忠等以六舟深入敗敵平武昌克廬州援安豐皆有功大軍取淮東庸與華高帥舟師克海安泰州進圍平江吳平擢中書左丞從大將軍取山東洪武元年命兼太子副詹事河南平命庸留守復分兵渡河徇下河北州縣進克河間守之尋移守保定幷收未復山寨又從大軍克太原下關陝從常遇春北追元帝師還遇春卒命庸為副將軍同李文忠攻慶陽行至太原元兵攻大同急文忠與庸謀以便宜援大同再敗元兵於馬邑擒其將脫列伯論功賞賚亞於大將軍三年復從文忠北伐出野狐嶺克應昌師還論功最以在應昌私納奴婢不得封公封南雄侯食祿一千五百石予世券已從伐蜀中途還十四年閩盜起命庸討之踰年悉平諸盜及陽山歸善叛蠻戮其魁散遣餘衆民得復業奏籍蜑戶萬人為水軍又平廣東盜號鏟平王者獲賊黨萬七千八百餘人斬首八千八百餘級降其民萬三千餘戶還賜綵幣上尊良馬其冬出理山西軍務巡撫北邊二十年以左參將從傅友德討納哈出二十三年以左副將軍從燕王出古北口降乃兒不花還坐胡惟庸黨死爵除楊璟合肥人本儒家子以管軍萬戶從太祖下集慶進總管下常州進親軍副都指揮使從下婺州遷樞密院判官再從伐漢以功擢湖廣行省參政移鎮江陵進攻湖南蠻寇駐師三江口復以招討功遷行省平章政事帥左丞周德興參政張彬將武昌諸衞軍取廣西洪武元年春進攻永州守將鄧祖勝迎戰敗斂兵固守璟進圍之元兵來援駐東鄉倚湘水列七營軍勢甚盛璟擊敗之俘獲千餘人全州守將平章阿思蘭及周文貴再以兵來援輒遣德興擊敗之遣千戶王廷取寶慶德興彬取全州略定道州藍山桂陽武岡諸州縣而永州久不下令裨將分營諸門築壘困之造浮橋西江上急攻之祖勝力盡仰藥死百戶夏昇約降璟兵踰城入參政張子賢巷戰軍潰被執遂克永州而征南將軍廖永忠參政朱亮祖亦自廣東取梧州定潯貴鬱林亮祖以兵來會進攻靖江不下璟謂諸將曰彼所恃西濠水耳決其隄岸破之必矣乃遣指揮丘廣攻牐口關殺守隄兵盡決濠水築土隄五道傅於城城中猶固守急攻二月克之執平章也兒吉尼先是張彬攻南關為守城者所詬怒欲屠其民璟甫入立下令禁止之民乃安復移師徇郴州降兩江土官黃英岑伯顏等而永忠亦定南寧象州廣西悉平還與偏將軍湯和從徐達取山西至澤州及元平章韓扎兒戰於韓店敗績還捕唐州亂卒留鎮南陽未幾詔璟往使於夏是時夏主昇幼母彭及諸大臣用事璟既至數諭昇以禍福俾從入覲昇集其下共議而諸大臣方專恣不利昇歸朝皆持不可昇亦莫能決璟還再以書諭昇終不聽踰二年而夏亡璟遷湖廣行省平章慈利土官覃垕搆諸洞蠻為亂命帥師往討連敗之垕詐降璟使部卒往報為所執太祖遣使讓璟璟督戰士力攻賊乃遁三年大封功臣封璟營陽侯祿千五百石予世券四年從湯和伐夏戰於瞿塘不利明年充副將軍從鄧愈討定辰沅蠻寇再從大將軍徐達鎮北平練兵遼東十五年八月卒追封芮國公諡武信子通嗣二十年帥降軍戍雲南多道亡降普定指揮使二十三年詔書坐璟胡惟庸黨謂以瞿塘之敗被責有異謀云胡美沔陽人初名廷瑞避太祖字易名美初仕陳友諒為江西行省丞相守龍興太祖既下江州遣使招諭美美遣使鄭仁傑詣九江請降且請無散部曲太祖初難之劉基蹴所坐胡牀太祖悟賜書報曰鄭仁傑至言足下有効順之誠此足下明達也又恐分散所部此足下過慮也吾起兵十年奇才英士得之四方多矣有能審天時料事機不待交兵挺然委身來者嘗推赤心以待隨其才任使之兵少則益之以兵位卑則隆之以爵財乏則厚之以賞安肯散其部曲使人自危疑負來歸之心哉且以陳氏諸將觀之如趙普勝驍勇善戰以疑見戮猜忌若此竟何所成近建康龍灣之役予所獲長張梁鉉彭指揮諸人用之如故視吾諸將恩均義一長張破安慶水寨梁鉉等攻江北並膺厚賞此數人者其自視無復生理尚待之如此況如足下不勞一卒以完城來歸者耶得失之機間不容髮足下當早為計美得書乃遣康泰至九江來降太祖遂如龍興至樵舍美以陳氏所授丞相印及軍民糧儲之數來獻迎謁於新城門太祖慰勞之俾仍舊官美之降也同僉康泰平章祝宗不欲從美微言於太祖太祖命將其兵從徐達征武昌二人果叛攻陷洪都達等還兵擊定之祝宗走死執康泰歸於建康太祖以泰為美甥赦勿誅美從征武昌復與達等帥馬步舟師取淮東進伐張士誠下湖州圍平江別將取無錫降莫天祐師還加榮祿大夫其冬命為征南將軍帥師由江西取福建諭之曰汝以陳氏丞相來歸事吾數年忠實無過故命汝總兵取閩左丞何文輝為爾副參政戴德聽調發二人雖皆吾親近勿以其故廢軍法聞汝嘗攻閩中宜深知其地利險易今總大軍攻圍城邑必擇便宜可否為進退無失機宜美遂渡杉關下光澤邵武守將李宗茂以城降次建陽守將曹復疇亦降進圍建寧守將同僉達里麻參政陳子琦謀堅守以老我師美數挑戰不出急攻之乃降整軍入城秋毫無所犯執子琦等送京師獲將士九千七百餘人糧糗馬畜稱是會湯和等亦取福州延平興化美遂遣降將諭降汀泉諸郡福建悉平美留守其地尋召還從幸汴梁太祖即位以美為中書平章同知詹事院事洪武三年命赴河南招集擴廓故部曲是年冬論功封豫章侯食祿千五百石予世券誥詞以竇融歸漢為比十三年改封臨川侯董建潭府於長沙太祖榜列勳臣謂持兵兩雄間可觀望而不觀望來歸者七人七人者韓政曹良臣楊璟陸聚梅思祖黃彬及美皆封侯美與璟有方面勳帝遇之尤厚十七年坐法死二十三年李善長敗帝手詔條列奸黨言美因長女為貴妃偕其子壻入亂宮禁事覺子壻刑死美賜自盡云贊曰馮勝傅友德百戰驍將也考當日功臣位次與太祖褒美之詞豈在湯和鄧愈下哉廖永忠智勇超邁功亞宋潁皆不得以功名終身死爵除為可慨矣江夏侯周德興之得罪也太祖宥之因誡諭公侯謂多粗暴無禮自取敗亡又謂永忠數犯法屢宥不悛然則洪武功臣之不獲保全者或亦有以自取歟楊璟胡美功雖不逮然嘗別將各著方面勳故次列之云
