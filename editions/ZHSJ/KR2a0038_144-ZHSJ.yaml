body:
  text: 明史卷一百四十四列傳第三十二盛庸平安何福顧成盛庸不知何許人洪武中累官至都指揮建文初以參將從耿炳文伐燕李景隆代炳文遂隸景隆麾下二年四月景隆敗於白溝河走濟南燕師隨至景隆復南走庸與參政鐵鉉悉力固守燕師攻圍三月不克庸鉉乘夜出兵掩擊燕衆大敗解圍去乘勝復德州九月論功封歷城侯祿千石尋命為平燕將軍充總兵官陳暉平安為左右副總兵馬溥徐真為左右參將進鉉兵部尚書參贊軍務時吳傑平安守定州庸駐德州徐凱屯滄州為掎角是冬燕兵襲滄州破擒凱掠其輜重進薄濟寧庸引兵屯東昌以邀之背城而陣燕王帥兵直前薄庸軍左翼不動復衝中堅庸開陣縱王入圍之數重燕將朱能帥番騎來救王乘間突圍出而燕軍為火器所傷甚衆大將張玉死於陣王獨以百騎殿退至館陶庸檄吳傑平安自真定遮燕歸路明年正月傑平安戰深州不利燕師始得歸是役也燕精銳喪失幾盡庸軍聲大振帝為享廟告捷三月燕兵復南出保定庸營夾河王將輕騎來覘掠陣而過庸遣千騎追之為燕兵射却及戰庸軍列盾以進王令步卒先攻騎兵乘間馳入庸麾軍力戰斬其將譚淵而朱能張武等帥衆殊死鬬王以勁騎貫陣與能合庸部驍將莊得皂旗張等俱戰死是日燕軍幾敗明日復戰燕軍東北庸軍西南自辰至未互勝負兩軍皆疲將士各坐息復起戰忽東北風大起飛塵蔽天燕兵乘風大呼左右橫擊庸大敗走還德州自是氣沮已而燕將李遠焚糧艘於沛縣庸軍遂乏餉明年靈璧戰敗平安等被執庸獨引軍而南列戰艦淮南岸燕將丘福等潛濟出庸後庸不能支退為守江計燕兵渡淮由盱眙陷揚州庸禦戰于六合及浦子口皆失利都督陳瑄帥舟師降燕燕兵遂渡江庸倉卒聚海艘出高資港迎戰復敗軍益潰散成祖入京師庸以餘衆降即命守淮安尋賜敕曰比以山東未定命卿鎮守淮安今鐵鉉就獲諸郡悉平朕念山東久困兵革憊于轉輸卿宜輯兵養民以稱朕意永樂元年致仕無何千戶王欽訐庸罪狀立進欽指揮同知於是都御史陳瑛劾庸怨望有異圖庸自殺平安滁人小字保兒父定從太祖起兵官濟寧衞指揮僉事從常遇春下元都戰沒安初為太祖養子驍勇善戰力舉數百斤襲父職遷密雲指揮使進右軍都督僉事建文元年伐燕安以列將從征及李景隆代將用安為先鋒燕王將渡白溝河安伏萬騎河側邀之燕王曰平安豎子耳往歲從出塞識我用兵今當先破之及戰不能挫安時南軍六十萬列陣河上王帥將士馳入陣戰至暝互有殺傷及夜深乃各斂軍燕王失道從者僅三騎下馬伏地視河流辨東西始知營壘所在明日再戰安擊敗燕將房寬陳亨燕王見事急親冒矢石力戰馬創矢竭劍折不可擊走登堤佯舉鞭招後騎以疑敵會高煦救至乃得免當是時諸將中安戰最力王幾為安槊所及已而敗語詳成祖紀燕兵圍濟南安營單家橋謀出御河奪燕餉舟又選善水卒五千人渡河將攻德州圍乃解安與吳傑進屯定州明年燕敗盛庸於夾河迴軍與安戰單家橋安奮擊大破之擒其將薛祿無何逸去再戰滹沱河又破之安於陣中縛木為樓高數丈戰酣輒登樓望發強弩射燕軍死者甚衆忽大風起發屋拔樹聲如雷都指揮鄧戩陳鵬等陷敵中安遂敗走真定燕王與南軍數大戰每親身陷陣所向皆靡惟安與庸二軍屢挫之滹沱之戰矢集王旗如蝟毛王使人送旗北平諭世子謹藏以示後世顧成已先被執在燕見而泣曰臣自少從軍今老矣多歷戰陣未嘗見若此也踰月燕師出大名安與庸及吳傑等分兵擾其餉道燕王患之遣指揮武勝上書於朝請撤安等息兵為緩師計帝不許燕王亦決計南下遣李遠等潛走沛縣焚糧舟掠彰德破尾尖寨諭降林縣時安在真定度北平空虛帥萬騎直走北平至平村去城五十里而軍燕王懼遣劉江等馳還救安戰不利引還時大同守將房昭引兵入紫荊關據易州西水寨以窺北平安自真定餉之八月燕兵北歸安及燕將李彬戰於楊村敗之四年燕兵復南下破蕭縣安引軍躡其後至淝河燕將白義王真劉江迎敵安轉戰斬真真驍將燕王嘗曰諸將奮勇如王真何事不成至是為安所殺燕王乃身自迎戰安部將火耳灰挺槊大呼直前刺王馬忽蹶被擒安稍引却已復進至小河張左右翼擊燕軍斬其將陳文已復移軍齊眉山與諸將列陣大戰自午至酉又敗之燕諸將謀北還圖後舉王不聽尋何福軍亦至與安合燕軍益大懼王晝夜擐甲者數日福欲持久老燕師移營靈璧深塹高壘自固而糧運為燕兵所阻不得達安分兵往迎燕王以精騎遮安軍分為二福開壁來援為高煦所敗諸將謀移軍淮河就糧夜令軍中聞三礮即走翌日燕軍猝薄壘發三礮軍中誤以為己號爭趨門遂大亂燕兵乘之人馬墜壕塹俱滿福單騎走安及陳暉馬溥徐真孫成等三十七人皆被執文臣宦官在軍被執者又百五十餘人時四月辛巳也安久駐真定屢敗燕兵斬驍將數人燕將莫敢嬰其鋒至是被擒軍中歡呼動地曰吾屬自此獲安矣爭請殺安燕王惜其材勇選銳卒衞送北平命世子及郭資等善視之王即帝位以安為北平都指揮使尋進行後府都督僉事永樂七年三月帝巡北京將至覽章奏見安名謂左右曰平保兒尚在耶安聞之遂自殺命以指揮使祿給其子何福鳳陽人洪武初累功為金吾後衞指揮同知從傅友德征雲南擢都督僉事又從藍玉出塞至捕魚兒海二十一年江陰侯吳高帥迤北降人南征抵沅江衆叛由思州出荊樊道渭河欲遁歸沙漠明年正月福與都督聶緯追擊及諸鄜延盡殲之移兵討平都勻蠻俘斬萬計二十四年拜平羌將軍討越州叛蠻阿資破降之擇地立柵處其衆置寧越堡遂平九名九姓諸蠻尋與都督茅鼎會兵徇五開未行而畢節諸蠻復叛大掠屯堡殺吏士福令畢節諸衞嚴備而檄都督陶文等從鼎擣其巢擒叛酋戮之分兵盡捕諸蠻建堡設戍乃趨五開請因兵力討水西奢香不許三十年三月水西蠻居宗必登等作亂會顧成討平之其冬拜征虜左將軍副西平侯沐春討麓川叛蠻刀幹孟明年福與都督瞿能踰高良公山擣南甸擒其酋刀名孟回軍擊景罕寨不下春以銳軍至賊驚潰幹孟懼乞降已而春卒賊復懷貳是時太祖已崩惠帝初即位拜福征虜將軍福遂破擒刀幹孟降其衆七萬分兵徇下諸寨麓川地悉定建文元年還京師論功進都督同知練兵德州進左都督與盛庸平安會兵伐燕戰淮北不利奔還成祖即位以福宿將知兵推誠用之聘其甥女徐氏為趙王妃尋命佩征虜將軍印充總兵官鎮寧夏節制山陝河南諸軍福至鎮宣布德意招徠遠人塞外諸部降者相踵邊陲無事因請置驛屯田積穀定賞罰為經久計會有讒之者帝不聽降敕褒慰永樂五年八月移鎮甘肅福馭軍嚴下多不便者帝間使使戒福善自衞毋為小人所中六年福請遣京師蕃將將迤北降人帝報曰爾久總蕃漢兵恐勢衆致讒耳爾老將朕推誠倚重毋顧慮尋請以布市馬選其良者別為羣置官給印專領之于是馬大蕃息永昌苑牧馬自此始明年本雅失里糾阿魯台將入寇為瓦剌所敗走臚朐河欲收諸部潰卒窺河西詔福嚴兵為備迤北王子國公司徒以下十餘人帥所部駐亦集乃乞內附福以聞帝令庶子楊榮往佐福經理其衆悉降福親至亦集乃鎮撫之送其酋長於京師帝嘉福功命榮即軍中封福為寧遠侯祿千石且詔福軍中事先行後聞八年帝北征召福從出塞初帝以福有才略寵任踰諸將福亦善引嫌有事未嘗專決在鎮嘗請取西平侯家鞏昌蓄馬以充孳牧帝報曰皇考時貴近家多許養馬以示共享富貴之意爾所奏固為國矣然非待勳戚之道不聽其餘有請輒行委寄甚重及從征數違節度羣臣有言其罪者福益怏怏有怨言師還都御史陳瑛復劾之福懼自縊死爵除而趙王妃亦尋廢顧成字景韶其先湘潭人祖父業操舟往來江淮間遂家江都成少魁岸膂力絕人善馬槊文其身以自異太祖渡江來歸以勇選為帳前親兵擎蓋出入嘗從上出舟膠於沙成負舟而行從攻鎮江與勇士十人轉鬬入城被執十人皆死成躍起斷縛仆持刀者脫歸導衆攻城克之授百戶大小數十戰皆有功進堅城衞指揮僉事從伐蜀攻羅江擒元帥以下二十餘人進降漢州蜀平改成都後衞洪武六年擒重慶妖賊王元保八年調守貴州時羣蠻叛服不常成連歲出兵悉平之已從潁川侯傅友德征雲南為前鋒首克普定留成列柵以守蠻數萬來攻成出柵手殺數十百人賊退走餘賊猶在南城成斬所俘而縱其一曰吾夜二鼓來殺汝夜二鼓吹角鳴礮賊聞悉走獲器甲無算進指揮使諸蠻隸普定者悉平十七年平阿黑螺螄等十餘寨明年奏罷普定府析其地為三州六長官司進貴州都指揮同知有告其受賕及僭用玉器等物者以久勞不問二十九年遷右軍都督僉事佩征南將軍印會何福討水西蠻斬其酋居宗必登明年西堡滄浪諸寨蠻亂成遣指揮陸秉與其子統分道討平之成在貴州凡十餘年討平諸苗洞寨以百數皆誅其渠魁撫綏餘衆恩信大布蠻人帖服是年二月召還京建文元年為左軍都督從耿炳文禦燕師戰真定被執燕王解其縛曰此天以爾授我也送北平輔世子居守南軍圍城防禦調度一聽於成燕王即位論功封鎮遠侯食祿千五百石予世券命仍鎮貴州永樂元年上書請嚴備西北諸邊及早建東宮帝褒答之六年三月召至京賜金帛遣還思州宣慰使田琛與思南宣慰使田宗鼎搆兵詔成以兵五萬壓其境琛等就擒於是分思州思南地更置州縣遂設貴州布政司其年八月臺羅苗普亮等作亂詔成帥二都司三衞兵討平之成性忠謹涉獵書史始居北平多效謀畫然終不肯將兵賜兵器亦不受再鎮貴州屢平播州都勻諸叛蠻威鎮南中土人立生祠祀焉其被召至京也命輔太子監國成頓首言太子仁明廷臣皆賢輔導之事非愚臣所及請歸備蠻時羣小謀奪嫡太子不自安成入辭文華殿因曰殿下但當竭誠孝敬孳孳恤民萬事在天小人不足措意十二年五月卒年八十有五贈夏國公諡武毅八子長統普定衞指揮以成降燕被誅統子興祖嗣侯仁宗即位廣西蠻叛詔興祖為總兵官討之先後討平潯州平樂思恩宜山諸苗降附甚衆宣德中交阯黎利復叛陷隘留關圍丘溫時興祖在南寧坐擁兵不援徵下錦衣衞獄踰年得釋正統末從北征自土木脫歸論死也先逼都城復冠帶充副總兵禦敵於城外授都督同知守備紫荊關景泰三年坐受賄復下獄尋釋以立東宮恩予伯爵天順初復侯守備南京卒孫淳嗣卒無子從弟溥嗣掌五軍右掖弘治二年拜平蠻將軍鎮湖廣始至捕斬苗中首惡五年十月貴州都勻苗乜富架作亂自稱都順王梗滇蜀道詔溥充總兵官帥兵八萬討之分五路刻期並進誅富架父子斬首萬計加太子太保增祿二百石召入提督團營掌前軍都督府事十六年卒諡襄恪溥清慎守法卒之日囊無餘資英國公張懋出布帛以斂子仕隆嗣管神機營左哨得士心正德初出為漕運總兵數請恤軍卒鎮淮安十餘年以清白聞武宗南巡江彬橫甚折辱諸大吏惟仕隆不為屈嘉靖初移鎮湖廣尋召還論奉迎防守功加太子太傅掌中軍都督府事錦衣千戶王邦奇者怨大學士楊廷和兵部尚書彭澤上疏言哈密失策事由兩人帝怒逮繫廷和諸子壻給事中楊言疏救忤旨事下五府九卿科道議仕隆言廷和功在社稷邦奇小人假邊事惑聖聽傷國體有詔切責移病解營務卒贈太傅諡榮靖子寰嗣守備南京奉詔讞獄多所平反十七年為漕運總兵官明年獻皇后梓宮赴承天漕舟以避梓宮後期者三千而江南北多灾傷寰請被灾地停漕一年令改折色軍民交便又條上漕政七事並施行諸為漕蠹者病之遂布蜚語為給事中王交所劾已按驗不實再鎮淮安會安南事起移鎮兩廣莫宏瀷者安南都統使莫福海子也福海死宏瀷幼其權臣阮敬與族人莫正中構兵國內亂正中逃入欽州時有議乘釁取安南者寰與提督侍郎周延決策請于朝令宏瀷襲都統使安南遂定三十年事也尋以兵討平桂林平樂叛瑤復命鎮淮有禦倭功入總京營加太子太保復出督漕召還請老隆慶五年特起授京營總督尋乞休神宗嗣位起掌左府久之致仕加少保萬曆九年卒贈太傅諡榮僖自溥至寰三世皆寬和廉靖內行飭謹曉文藝仕隆寰兩世督漕皆勤於職三傳至孫肇跡京師陷死於賊贊曰東昌小河之戰盛庸平安屢挫燕師斬其驍將厥功甚壯及至兵敗被執不克引義自裁隱忍偷生視鐵鉉暴昭輩能無愧乎何福顧成皆太祖時宿將著功邊徼而一遇燕兵或引却南奔或身遭俘馘成祖棄瑕錄舊均列茅土亦云幸矣福固不以功名終而成之延及苗裔榮不勝辱亦奚足取哉
