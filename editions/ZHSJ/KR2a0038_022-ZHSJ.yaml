body:
  text: 明史卷二十二本紀第二十二熹宗熹宗達天闡道敦孝篤友章文襄武靖穆莊勤悊皇帝諱由校光宗長子也母選侍王氏萬曆三十三年十一月神宗以元孫生詔告天下四十八年神宗遺詔皇長孫及時冊立未及行九月乙亥光宗崩遺詔皇長子嗣皇帝位羣臣哭臨畢請見皇長子於寢門奉至文華殿行禮還居慈慶宮丙子頒遺詔時選侍李氏居乾清宮吏部尚書周嘉謨等及御史左光斗疏請選侍移宮御史王安舜疏論李可灼進藥之誤紅丸移宮二案自是起己卯選侍移仁壽殿庚辰即皇帝位詔赦天下以明年為天啟元年己丑以是年八月以後稱泰昌元年辛卯逮遼東總兵官李如柏甲午廕太監魏進忠兄錦衣衞千戶封乳保客氏為奉聖夫人官其子冬十月丙午葬顯皇帝孝端顯皇后於定陵戊申遼東巡撫都御史袁應泰為兵部侍郎經略遼東代熊廷弼辛酉御經筵壬戌禮部尚書孫如游兼東閣大學士預機務丁卯噦鸞宮災十一月丙子追諡皇妣孝元貞皇后生母孝和皇太后十二月辛酉方從哲致仕天啟元年春正月庚辰享太廟壬辰追諡伍文定等七十三人壬寅御史王心一請罷客氏香火土田魏進忠陵工錄不報二月甲辰言官請復當朝口奏及召對之典從之己未御經筵閏月乙酉以風霾諭羣臣修省丁亥孫如游致仕丙申除齊泰黃子澄戚屬戍籍戊戌昭和殿災三月乙卯大清兵取瀋陽總兵官尤世功賀世賢戰死總兵官陳策童仲揆戚金張名世帥諸將援遼戰於渾河皆敗沒壬戌大清兵取遼陽經略袁應泰等死之巡按御史張銓被執不屈死丙寅諭兵部國家文武並用頃承平日久視武弁不啻奴隸致令豪傑解體今邊疆多故大風猛士深軫朕懷其令有司於山林草澤間慎選將材丁卯京師戒嚴夏四月壬申朔日有食之甲戌禁抄發軍機丙子遼東巡撫僉都御史薛國用為兵部侍郎經略遼東參議王化貞為右僉都御史巡撫廣寧戊寅募兵於通州天津宣府大同甲午募兵於陝西河南山西浙江戊戌冊皇后張氏五月丁未貴州紅苗平甲寅禁訛言辛酉陝西都指揮陳愚直以固原兵入援潰於臨洺未幾寧夏援遼兵潰於三河六月癸酉何宗彥入閣丙子朱國祚入閣熊廷弼為兵部尚書兼右副都御史經略遼東辛巳兵部尚書王象乾總督薊遼軍務秋七月乙巳沈入閣八月丙子擢參將毛文龍為副總兵駐師鎮江城戊子杭州大火詔停織造癸巳停刑九月壬寅葬貞皇帝於慶陵乙卯永寧宣撫使奢崇明反殺巡撫徐可求據重慶分兵陷合江納溪瀘州丁卯陷興文知縣張振德死之冬十月戊辰御史周宗建請出客氏於外不聽給事中倪思輝朱欽相等相繼言皆謫外任丙子史繼偕入閣乙酉奢崇明圍成都布政使朱燮元固守尋擢燮元僉都御史巡撫四川石砫宣撫使女土官秦良玉起兵討賊壬辰葉向高入閣十二月丁丑巡撫河南都御史張我續為兵部侍郎提督川貴軍務陝西巡撫移駐漢中鄖陽巡撫移駐夷陵湖廣官軍由巫峽趨忠涪討賊庚辰援遼浙兵譁於玉田辛卯以熊廷弼王化貞屢議戰守不合遣使宣諭是年安南土魯番烏斯藏入貢二年春正月丁未延綏總兵官杜文煥四川總兵官楊愈懋討永寧賊丁巳大清兵取西平堡副將羅一貴死之鎮武營總兵官劉渠祁秉忠逆戰於平陽橋敗沒王化貞走閭陽與熊廷弼等俱入關參政高邦佐留松山死之壬戌振山東流徙遼民癸亥兵部尚書張鶴鳴視師遼東乙丑京師戒嚴河套部犯延綏永寧賊將羅乾象約降與官軍共擊賊成都圍解二月癸酉水西土同知安邦彥反陷畢節安順平壩霑益龍里遂圍貴陽巡撫都御史李橒巡按御史史永安固守戊寅免天下帶徵錢糧二年及北畿加派禮部右侍郎孫承宗為兵部尚書兼東閣大學士預機務己丑孫承宗兼理兵部事三月丁酉朔劉一燝致仕甲辰陽武侯薛濂管理募兵兵部侍郎王在晉為尚書兼右副都御史經略遼薊天津登萊軍務甲寅賜文震孟等進士及第出身有差丁巳敕湖廣雲南廣西官軍援貴州是春舉內操夏四月甲申京師旱五月戊戌復張居正原官己亥錄方孝孺遺嗣尋予祭葬及諡丙午山東白蓮賊徐鴻儒反陷鄆城癸亥秦良玉杜文煥破賊於佛圖關官軍合圍重慶復之六月戊辰徐鴻儒陷鄒縣滕縣滕縣知縣姬文胤死之加毛文龍為總兵官貴州總兵官張彥芳為平蠻總兵官從巡撫都御史王三善討水西賊己巳前總兵官楊肇基遊擊陳九德帥兵討山東賊秋七月甲辰松潘副使李忠臣約總兵官楊愈懋謀復永寧不克皆死之賊攻大壩遊擊龔萬祿戰死遂陷遵義癸丑沈𠃘致仕乙卯神宗神主祔太廟庚申援黔兵潰於新添癸亥武邑賊于弘志作亂尋伏誅八月庚辰孫承宗以原官督理山海關及薊遼天津登萊軍務九月甲午朔光宗神主祔太廟壬寅御史馮英請設州縣兵按畝供餉從之乙卯封皇弟由檢為信王停刑冬十月辛未水西賊犯雲南官軍擊敗之辛巳官軍復鄒縣擒徐鴻儒等山東賊平壬午總兵官魯欽代杜文煥為總理援貴州十一月癸丑朱燮元總督四川軍務十二月己巳王三善副總兵劉超敗賊於龍里貴陽圍解是年暹羅入貢三年春正月己酉禮部侍郎朱國禎尚書顧秉謙侍郎朱延禧魏廣微俱禮部尚書東閣大學士預機務乙卯紅夷據澎湖貴州官軍三路進討水西副總兵劉超敗績於陸廣河二月乙酉贈卹鄒縣死難博士孟承光及母孔氏子弘略是月停南京進鮮三月癸卯朝鮮廢其主李琿是春振山東被兵州縣夏四月庚申朔京師地震己巳朱國祚致仕五月辛丑四川官軍敗賊於永寧奢崇明走紅崖秋七月辛卯南京大內災壬辰奢崇明走龍場與安邦彥合丁酉安南寇廣西巡撫都御史何士晉禦却之己亥史繼偕致仕九月癸巳給事中陳良訓疏陳防微四事下鎮撫司獄冬十月乙亥京師地震丁丑停刑閏月壬寅以皇子生詔赦天下是月王三善剿水西屢破賊至大方十一月丁巳朔祀天於南郊十二月癸巳封李倧為朝鮮國王戊戌京師地震庚戌魏忠賢總督東廠是年暹羅琉球入貢四年春正月丙辰朔長興民吳野樵殺知縣石有恆主簿徐可行尋伏誅乙丑王三善自大方旋師遇伏被執死之諸官將皆死庚午何宗彥卒二月丁酉薊州永平山海關地震壞城郭廬舍甲寅京師地震宮殿動搖有聲帝不豫三月丁巳疾愈庚申杭州兵變是月京師屢地震夏五月甲寅朔福寧兵變有司撫定之六月癸未左副都御史楊漣劾魏忠賢二十四大罪南北諸臣論忠賢者相繼皆不納丙申大雨雹杖殺工部郎中萬燝逮杖御史林汝翥秋七月辛酉葉向高致仕癸亥河決徐州振山東饑冬十月削吏部侍郎陳于廷副都御史楊漣僉都御史左光斗籍十一月己巳韓爌致仕是月貴州官兵敗賊於普定進至織金破之十二月辛巳逮內閣中書汪文言下鎮撫司獄丙申朱國禎致仕癸卯南京地震如雷是月兩當民變殺知縣牛得用五年春正月癸亥大清兵取旅順戊寅以慶陵工成予魏忠賢等廕賚是月總理魯欽劉超等自織金旋師為賊所襲諸營兵潰三月甲寅釋奠於先師孔子丙寅賜余煌等進士及第出身有差甲戌朱燮元總督雲貴川湖廣西軍務討安邦彥丁丑讞汪文言獄逮楊漣左光斗袁化中魏大中周朝瑞顧大章削尚書趙南星等籍未幾漣等逮至下鎮撫司獄相繼死獄中夏四月己亥削大學士劉一燝籍五月癸亥給事中楊所修請以梃擊紅丸移宮三案編次成書從之乙丑祀地於北郊庚午行宗室限祿法六月丙戌朱延禧致仕秋七月壬戌毀首善書院壬申韓爌削籍甲戌追論萬曆辛亥丁巳癸亥三京察尚書李三才顧憲成等削籍八月壬午毀天下東林講學書院削尚書孫慎行等籍戊子禮部尚書周如磐兼東閣大學士侍郎丁紹軾黃立極為禮部尚書少詹事馮銓為禮部右侍郎並兼東閣大學士預機務己亥魏廣微罷壬寅熊廷弼棄市傳首九邊九月壬子遼東副總兵魯之甲敗沒於柳河冬十月己卯兵部尚書高第經略遼薊登萊天津軍務丙戌停刑庚寅孫承宗致仕丙申逮中書舍人吳懷賢下鎮撫司獄杖殺之庚子以皇子生詔赦天下十一月壬子周如磐致仕十二月乙酉榜東林黨人姓名頒示天下戊子戍前尚書趙南星是年琉球烏斯藏入貢六年春正月戊午修三朝要典丁卯大清兵圍寧遠總兵官滿桂寧前道參政袁崇煥固守己巳圍解二月乙亥袁崇煥為僉都御史專理軍務仍駐寧遠戊戌以蘇杭織造太監李實奏逮前應天巡撫周起元吏部主事周順昌左都御史高攀龍諭德繆昌期御史李應昇周宗建黃尊素攀龍赴水死起元等下鎮撫司獄相繼死獄中己亥祭日於東郊三月丁未設各邊鎮監軍內臣太監劉應坤鎮守山海關大學士丁紹軾兵部尚書王永光等屢諫不聽論寧遠解圍功封魏忠賢從子良卿肅寧伯庚戌安邦彥犯貴州官軍敗績總理魯欽死之壬子袁崇煥巡撫遼東山海夏四月丁丑命南京守備內臣搜括應天各府貯庫銀充殿工兵餉戊戌丁紹軾卒五月戊申王恭廠災死者甚衆己酉以旱災敕羣臣修省癸亥朝天宮災六月丙子京師地震靈丘地震經月壬午河決廣武辛卯三朝要典成刊布中外閏月辛丑巡撫浙江僉都御史潘汝楨請建魏忠賢生祠許之嗣是建祠幾遍天下壬寅馮銓罷壬子朱燮元以憂去偏沅巡撫都御史閔夢得代之是夏京師大水江北山東旱蝗秋七月辛未朔日當食陰雲不見辛巳下前揚州知府劉鐸詔獄殺之丙戌禮部侍郎施鳳來張瑞圖詹事李國俱禮部尚書東閣大學士預機務八月陝西流賊起由保寧犯廣元九月庚寅顧秉謙致仕壬辰皇極殿成停刑己亥魏良卿進封肅寧侯是月參將楊明輝齎敕招諭水西賊被殺是秋江北大水河南蝗冬十月戊申進魏忠賢爵上公魏良卿寧國公予誥券加賜莊田一千頃己酉以皇極殿成詔天下官匠雜流陞授者九百六十五人癸丑改修光宗實錄十一月庚寅予魏良卿鐵券十二月戊申南京地震甲子潯州賊殺守備蔡人龍是年安南烏斯藏琉球入貢七年春正月辛未振鳳陽饑乙亥太監涂文輔總督太倉銀庫節慎庫崔文昇李明道提督漕運河道覈京師通州諸倉辛卯免榷潼關咸陽商稅二月壬戌修隆德殿三月癸酉豐城侯李承祚請開採珠池銅礦不許戊子澄城民變殺知縣張斗耀是春大清兵征朝鮮夏四月丁酉下前侍郎王之寀鎮撫司獄死獄中五月己巳監生陸萬齡請建魏忠賢生祠於太學旁歲祀如孔子許之丙子大清兵圍錦州癸巳攻寧遠六月庚子錦州圍解秋七月乙丑朔帝不豫丙寅罷袁崇煥己卯封魏忠賢孫鵬翼為安平伯壬午戍孫慎行丁亥海賊寇廣東是月浙江大水八月丙申加魏良卿太師魏鵬翼少師戊戌中極建極二殿成乙巳召見閣部科道諸臣於乾清宮諭以魏忠賢王體乾忠貞可計大事封忠賢姪良棟為東安侯甲寅大漸乙卯崩於乾清宮年二十三遺詔以皇第五弟信王由檢嗣皇帝位冬十月庚子上尊諡廟號熹宗葬德陵贊曰明自世宗而後綱紀日以陵夷神宗末年廢壞極矣雖有剛明英武之君已難復振而重以帝之庸懦婦寺竊柄濫賞淫刑忠良慘禍億兆離心雖欲不亡何可得哉
