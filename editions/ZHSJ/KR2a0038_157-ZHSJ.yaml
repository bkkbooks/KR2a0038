body:
  text: 明史卷一百五十七列傳第四十五金純張本郭敦郭璡鄭辰柴車劉中敷孫機張鳳周瑄子紘楊鼎翁世資黃鎬胡拱辰陳俊林鶚潘榮夏時正金純字德修泗州人洪武中國子監生以吏部尚書杜澤薦授吏部文選司郎中三十一年出為江西布政司右參政成祖即位以蹇義薦召為刑部右侍郎時將營北京命採木湖廣永樂七年從巡北京八年從北征遷左侍郎九年命與宋禮同治會通河又同徐亨蔣廷瓚濬魚王口黃河故道初太祖用兵梁晉間使大將軍徐達開塌場口通河於泗又開濟寧西耐牢坡引曹鄆河水以通中原之運其後故道寖塞至是純疏治之自開封北引水達鄆城入塌場出穀亭北十里為永通廣運二閘十四年改禮部左侍郎越二月進尚書十五年從巡北京十九年同給事中葛紹祖巡撫四川仁宗即位改工部居數月又改刑部明年兼太子賓客宣德三年純有疾帝命醫視療稍間免其朝參俾護疾視事會暑敕法司理滯囚純數從朝貴飲為言官所劾帝怒曰純以疾不朝而燕於私可乎命繫錦衣獄既念純老臣釋之落太子賓客八月予致仕去純在刑部仁宗嘗諭純法司近尚羅織言者輒以誹謗得罪甚無謂自今告誹謗者勿論純亦務寬大每誡屬吏不得妄椎擊人故當純時獄無瘐死者正統五年卒贈山陽伯張本字致中東阿人洪武中自國子生授江都知縣燕兵至揚州御史王彬據城抗為守將所縛本率父老迎降成祖以滁泰二知州房吉田慶成率先歸附命與本並為揚州知府偕見任知府譚友德同涖府事尋擢本江西布政司右參政永樂四年召為工部左侍郎坐事免官冠帶辦事明年五月復官尋以奏牘書銜誤左為右為給事中所劾帝命改授本部右侍郎而宥其罪七年皇太子監國奏為刑部右侍郎善摘奸命督北河運躬自相視立程度舟行得無滯會疾作太子賜之狐裘冠鈔遣醫馳視十九年將北征命本及王彰分往兩直隸山東山西河南督有司造車挽運明年即命本督北征餉仁宗即位拜南京兵部尚書兼掌都察院事召見言時政得失且請嚴飭武備帝嘉納之遂留行在兵部宣德初工部侍郎蔡信乞徵軍匠家口隸錦衣衞本言軍匠二萬六千人屬二百四十五衞所為匠者暫役其一丁若盡取以來家以三四丁計之數近十萬軍伍既缺人情驚駭不可帝善本言征漢庶人從調兵食庶人就擒命撫輯其衆而錄其餘黨還以軍政久敝奸人用貨脫籍而援平民實伍言於帝擇廷臣四出釐正之時馬大孳息畿內軍民為畜牧所困本請分牧於山東河南及大名諸府山東河南養馬自此始晉王濟熿坐不軌奪爵本奉命散其護衞軍於邊鎮四年命兼太子賓客戶部以官田租減度支不給請減外官俸及生員軍士月給帝以軍士艱不聽減餘下廷議本等持不可乃止陽武侯薛祿城獨石諸戍成本往計守禦之宜還奏稱旨命兼掌戶部本慮邊食不足而諸邊比歲稔請出絲麻布帛輸邊易穀多者三四十萬石少者亦十萬石儲偫頓充六年病卒賜賻三萬緡葬祭甚厚本廉介有執持尚刻少恕錄高煦黨脅從者多不免成祖宴近臣銀器各一案因以賜之獨本案設陶器諭曰卿號窮張銀器無所用本頓首謝其為上知如此郭敦字仲厚堂邑人洪武中以鄉舉入太學授戶部主事遷衢州知府多惠政衢俗貧者死不葬輒焚其屍敦為厲禁且立義阡俗遂革禁民聚淫祠敦疾民勸弛其禁弗聽疾亦瘳在衢七年永樂初坐累徵耆老數百人伏闕乞留不得後廷臣言敦廉正召補監察御史遷河南左參政調陝西十六年春胡濙言敦有大臣體擢禮部右侍郎兼太僕寺卿偕給事中陶衎巡撫順天二十年督北征餉仁宗即位以大行喪不齋宿降太僕卿旋進戶部左侍郎兼詹事府少詹事宣德二年進尚書陝西旱命與隆平侯張信整飭庶務當行者同三司官計議奏行敦乃請蠲逋賦振貧乏考黜貪吏罷不急之務凡十數事悉從之歲餘召還在部多所興革罷王田之奪民業者令民開荒不起科建漕運議民運至瓜洲儀真資衞卒運至京民甚便之敦事親孝持身廉同官有為不義者輒厲色待之其人悔謝乃已性好學公退手不釋卷六年卒官年六十二郭璡字時用初名進新安人永樂初以太學生擢戶部主事歷官吏部左右侍郎仁宗即位命兼詹事府少詹事更名璡宣宗初掌行在詹事府吏部尚書蹇義老輟部務帝欲以璡代璡厚重勤敏然寡學術楊士奇言恐璡不足當之宜妙擇大臣通經術知今古者帝乃止踰年卒為尚書諭以呂蒙正夾袋虞允文材館錄故事璡由是留意人才識進士李賢輔相器授吏部主事後果為名相時外官九年考滿部民走闕下乞留輒增秩復任璡慮有妄者請覆實從之璡雖長六卿然望輕又政歸內閣自布政使至知府闕聽京官三品以上薦舉既又命御史知縣皆聽京官五品以上薦舉要職選擢皆不關吏部正統初左通政陳恭言古者擇任庶官悉由選部職任專而事體一今令朝臣各舉所知恐開私謁之門長奔競之風乞杜絕令歸一下吏部議璡遜謝不敢當事遂寢正統六年御史曹恭以災異請罷大臣不職者帝命科道官參議璡及尚書吳中侍郎李庸等被劾者二十人璡等自陳帝切責而宥之璡子亮受賂為人求官事覺御史孫毓等劾璡乃令璡致仕而以王直代鄭辰字文樞浙江西安人永樂四年進士授監察御史江西安福民告謀逆事命辰往廉之具得誣狀福建番客殺人復命辰往止坐首惡釋其餘南京敕建報恩寺役囚萬人蜚語言役夫謗訕恐有變命辰往驗無實無一得罪者谷庶人謀不軌復命辰察之盡得其踪跡帝語方賓曰是真國家耳目臣矣十六年超遷山西按察使糾治貪濁不少貸潞州盜起有司以叛聞詔發兵討捕辰方以事朝京師奏曰民苦徭役而已請無發兵帝然之還則屏騶從親入山谷撫諭盜皆感泣復為良民禮部侍郎蔚綬轉粟給山海軍辰統山西民輦任民勞多逋耗綬令即山海貸償之辰曰山西民貧而悍急之恐生變不如緩之使自通有無用其言卒無逋者丁內艱歸軍民詣御史乞留御史以聞服闋還舊任宣德三年召為南京工部右侍郎初兩京六部堂官缺帝命廷臣推方面官堪內任者蹇義等薦九人獨辰及邵玘傅啟讓帝素知其名即真授餘試職而已英宗即位分遣大臣考察天下方面官辰往四川貴州雲南悉奏罷其不職者雲南布政使周璟居妻喪繼娶辰劾其有傷風教璟坐免正統二年奉命振南畿河南饑時河堤決即命辰伺便修塞或議自大名開渠引諸水通衞河利灌輸辰言勞民不便事遂寢遷兵部左侍郎與豐城侯李彬轉餉宣府大同鎮守都督譚廣撓令劾之事以辦八年得風疾告歸明年卒辰為人重義輕財初登進士產悉讓兄弟在山西與同僚杜僉事有違言杜卒為治喪資遣其妻子柴車字叔輿錢塘人永樂二年以舉人授兵部武選司主事歷員外郎八年帝北征從尚書方賓扈行還遷江西右參議坐事左遷兵部郎中出知岳州府復入為郎中宣德五年擢兵部侍郎明年山西巡按御史張勖言大同屯田多為豪右占據命車往按得田幾二千頃還之軍英宗初西鄙不靖以車廉幹命協贊甘肅軍務調軍給餉悉得事宜初𩽆兒只伯寇涼州副總兵劉廣喪師不以實聞顧飾功要賞車劾其罪械廣至京賜車金幣旌其直岷州土官后能冒功得陞賞車奏請加罪能復請命宥之車反覆論其不可曰詐冒如能者實繁有徒臣方次第按覈今宥能何以戢衆若無功得官則捐軀死敵者何以待之朝廷雖從能請然嘉車賢遣使勞賜之正統三年以破𩽆兒只伯功增俸一級在邊章數十上悉中時病同事多不悅車持益堅嘗建言漠北降人朝廷留之京師雖厚爵賞其心終異如長脫脫木兒者昔隨其長來歸未幾叛去今乃復來安知他日不再叛宜徙江南離其黨類事下兵部請處之河間德州帝報可後降者悉以此令從事稽覈屯田豪占者悉清出之得六百餘頃四年進兵部尚書參贊如故尋命兼理陝西屯田明年召還命與僉都御史曹翼歲更代出鎮及期病甚詔遣大理寺少卿程富代翼而命車歸治疾未及行六年六月卒車在江西時以採木入閩經廣信廣信守故人也餽蜜一罌發視之乃白金笑曰公不知故人矣却不受同事邊塞者多以宴樂為豪舉車惡之遂斷酒肉其介特多此類劉中敷大興人初名中孚燕王舉兵以諸生守城功授陳留丞擢工部員外郎仁宗監國命署部事賜今名遷江西右參議宣德三年遷山東右參政進左布政使質直廉靜吏民畏懷歲大侵言於巡撫減賦三之二正統改元父憂奪情俄召拜戶部尚書帝沖年踐阼慮羣下欺己治尚嚴而中官王振假以立威屢摭大臣小過導帝用重典大臣下吏無虛歲三年諷給事御史劾中敷與左侍郎吳璽等下獄釋還職六年言官劾中敷專擅詔法司於內廷雜治當流許輸贖帝特宥之其冬中敷璽及右侍郎陳瑺請以供御牛馬分牧民間言官劾其變亂成法並下獄論斬詔荷校長安門外凡十六日而釋瓦剌入貢詔問馬駝芻菽數不能對復與璽瑺論斬繫獄中敷以母病特許歸省明年冬當決囚法司以請命璽瑺戍邊中敷俟母終具奏已釋為民景帝立起戶部左侍郎兼太子賓客時方用兵論功行賞無虛日中敷言府庫財有限宜撙節以備緩急帝嘉納景泰四年卒贈尚書中敷性淡泊食不重味仕宦五十年家無餘貲子璉正統十年進士授刑科給事中累官太僕寺卿華靡居官剛果左遷遼東苑馬寺卿卒子機幼有孝行成化十四年進士改庶吉士正德中代張綵為吏部尚書以人言乞歸起南京兵部尚書參贊機務流賊犯江上衆議擇將適都督李昂自貴州罷官至機即召任之昂以無朝命辭機曰機奉敕有云敕所不載聽便宜此即朝命也衆服其膽識致仕歸卒張鳳字子儀安平人父益官給事中永樂八年從征漠北歿於陣鳳登宣德二年進士授刑部主事讞江西叛獄平反數百人正統三年十二月法司坐事盡繫獄遂擢鳳本部右侍郎以主事擢侍郎前時未有也明年命提督京倉六年改戶部尋調南京適尚書久闕鳳遂掌部事貴州奏軍衞乏糧乞運龍江倉及兩淮鹽於鎮遠府易米鳳以龍江鹽雜泥沙不堪易米給軍盡以淮鹽予之然後以聞帝嘉賞又言留都重地宜歲儲二百萬石為根本計從之遂為令南京糧儲舊督以都御史十二年冬命鳳兼理廉謹善執法號板張景泰二年進尚書四年改兵部參贊軍務戶部尚書金濂卒召鳳代之時四方兵息而災傷特甚帝屢詔寬恤鳳偕廷臣議上十事明年復先後議上八事咸報可鳳以災傷蠲賦多國用益詘乃奏言國初天下田八百四十九萬餘頃今數既減半加以水旱停征國用何以取給京畿及河南山東無額田甲方墾闢乙即訐其漏賦請準輕則征租不惟永絕爭端亦且少助軍國報可給事中成章等劾鳳擅更祖制楊穟等復爭之帝曰國初都江南轉輸易今居極北可守常制耶四方報凶荒者鳳請令御史勘實議者非之英宗復辟調南京戶部仍兼督糧儲五年二月卒鳳有孝行性淳樸故人死聘其女為子婦教其子而養其母終身同學友蘇洪好面斥鳳過及為鳳屬官猶然鳳待之如初聞其貧即賙給之周瑄字廷玉陽曲人由鄉舉入國學正統中除刑部主事善治獄十三年遷員外郎明年帝北征郎中當扈從者多託疾瑄請行六師覆沒瑄被創歸擢署郎中校尉受賕縱盜以讐人代瑄辨雪之抵校尉罪外郡送囚一日至八百人瑄慮其觸熱三日決遣之殆盡景泰元年以尚書王直薦超拜刑部右侍郎久之出振順天河間饑未竣而英宗復位有司請召還不聽復賜敕令便宜處置瑄遍歷所部大舉荒政先後振饑民二十六萬五千給牛種各萬餘奏行利民八事事竣還明年轉左帝方任門達逯杲數興大獄瑄委曲開諭多所救正復飭諸郎毋避禍以故移部定罪者不至冤濫官刑部久屬吏不敢欺意主寬恕不為深文同佐部者安化孔文英為御史時按黃巖妖言獄當坐者三千人皆白其誣獨械首從一人論罪及是居部與瑄並稱長者七年命瑄署掌工部事瑄恬靜淡榮利成化改元為侍郎十六年矣始遷右都御史督理南京糧儲捕懲作奸者數輩宿弊為清鳳陽淮徐饑以瑄言發廩四十萬以振久之遷南京刑部尚書令諸司事不須勘者毋出五日獄無滯囚暑疫悉遣輕繫者曰召汝則至囚歡呼去無失期者為尚書九載屢疏乞休久之乃得請家無田園卜居南京卒贈太子少保諡莊懿長子經尚書自有傳次子紘進士為南京吏科給事中兩以災異言事帝並嘉納未幾與御史張昺閱軍為中官蔣琮誣奏貶南京光祿署丞仕終山東參議楊鼎字宗器陝西咸寧人家貧力學舉鄉會試第一正統四年殿試第二授編修久之與侍講杜寧等十人簡入東閣肄業鼎居侍從雅欲以功名見嘗建言修飭戎備通漕三邊二事同輩誚其迂鼎益自信也先將寇京師詔行監察御史事募兵兗州景泰三年進侍講兼中允五年超擢戶部右侍郎天順初轉左陳汝言譖之帝不聽三年冬以陪祀陵寢不謹下獄贖杖還職帝嘗命中官牛玉諭旨欲取江南折糧銀實內帑而以他稅物充武臣俸鼎不可馬牛芻乏議徵什二又以民艱力沮皆報罷七年尚書年富有疾詔鼎掌部事成化四年代馬昂為戶部尚書而以翁世資為侍郎六年鼎疏言陝西外患四寇內患流民然寇害止邊塞流民則疾在腹心漢中僻居萬山襟喉川蜀四方流民數萬急之生變置之有後憂請暫設監司一人專領其事其願附籍者聽之不願者資遣兼與守臣練士馬修城池庶可弭他日患詔從之湖廣頻歲饑發廩已盡及是有秋用鼎言發庫貯銀布易米備災淮徐臨德四倉舊積糧百餘萬石後餉乏民饑輒請移用粟且匱鼎議上贖罪中鹽折鈔徵逋六事行之由是諸倉有儲蓄尋加太子少保鼎居戶部持廉然性頗拘滯十五年秋給事御史劾鼎非經國才鼎再疏求去賜敕馳驛歸命有司月給米二石歲給役四人終其身大臣致仕有給賜自鼎始也卒贈太子太保諡莊敏子時進士累官侍講學士多識典故有用世才時敷舉人廬墓被旌官兵部司務翁世資者莆田人正統七年進士除戶部主事歷郎中天順元年拜工部右侍郎四年命中官往蘇松杭嘉湖增織彩幣七千匹世資以東南水潦民艱食議減其半尚書趙榮左侍郎霍瑄難之世資請身任其咎乃連署以諫帝果怒詰主議者榮等委之世資遂下詔獄謫衡州知府成化初擢江西左布政使坐事下吏尋得白大軍征兩廣轉江西餉需十萬人世資議齎直就易嶺南米民得不擾以右副都御史巡撫山東歲總督倉場進尚書十七年還理部事閱二年致仕黃鎬字叔高侯官人正統十二年以進士試事都察院未半歲以明習法律授御史十四年按貴州羣苗盡叛道梗塞靖遠伯王驥等自麓川還軍無紀律苗襲其後官軍大敗鎬赴平越遇賊幾死夜跳入城賊圍之議者欲棄城走鎬曰平越貴州咽喉無平越是無貴州也乃偕諸將固守置密疏竹筒中募土人間行乞援於朝且劾驥等覆師狀景帝命保定伯梁珤等合川湖軍救之圍始解城被困已九月掘草根煮弩鎧而食之死者相枕籍城卒全鎬功為多復留按一年久之遷廣東僉事改浙江成化初以大臣會薦擢廣東左參政高雷廉負海多盜鎬討平之再遷廣西左布政使以右副都御史總督南京糧儲歷吏部左右侍郎十六年拜南京戶部尚書鎬有才識敏吏事理鹽政多所釐剔時論稱之十九年致仕道卒贈太子少保諡襄敏胡拱辰字共之淳安人正統四年進士為黟縣知縣有惠政擢御史疏陳時弊八事父艱歸景帝即位詔科道官憂居者悉起復拱辰至屢疏以選將保邦修德弭災為言出為貴州左參政白水堡仡佬頭目沈時保素梗化拱辰言於總兵官方瑛遣將擒之一方遂寧至畢節平宣慰使隴富亂威行邊徼母憂去御史追劾其受賕事下浙江按臣執訊事白調廣東歷廣西四川左右布政使皆有平寇功成化八年拜南京右副都御史提督操江十一年就遷兵部右侍郎儲位虛久與尚書崔恭等請冊立言甚切其年復就改左副都御史總理糧儲就進工部尚書節財省事人皆便之以年至乞歸弘治中巡按御史陳銓言拱辰退休十餘年生平清操如一日乞加禮異以勵臣節詔有司月給廩二石歲隸四人正德元年年九十遣行人齎敕存問賚羊酒加賜廩隸三年正月卒贈太子少傅諡莊懿陳俊字時英莆田人舉鄉試第一正統十三年進士除戶部主事督天津諸衞軍採草奏減新增額三十五萬束豪猾侵蘇松改折銀七十餘萬兩俊往督不數月畢輸尚書金濂以為能俾典諸曹章奏歷郎中天順五年兩廣用兵俊督餉時州縣殘破帑藏殫虛弛鹽商越境令引加米二斗軍興賴以無乏母喪不聽歸蠻平始還初俊為主事奔父喪賻者皆却之至是文武將吏醵金賻亦不納成化初擢南京太常少卿四年召拜戶部右侍郎俊練習錢穀四方災傷邊鎮急芻餉奏請至裁決咸當尚書楊鼎深倚之京師大饑先後發太倉粟八十萬石平糶石值六錢豪猾乘時射利俊請糴以升斗為率過一石勿與饑民獲濟尋議用兵河套敕俊赴河南山陝會巡撫諸臣畫芻餉發帑金二十萬助之俊以邊庾空竭歲又不登而榆林道險遠轉輸難乃發金於內地市易修西安韓城同官徑道以利飛輓還朝進俸一級歷吏部左右侍郎九載滿拜南京戶部尚書尋改兵部參贊機務先是參贊之任不專屬兵部自薛遠後繼以俊遂為定制久之就改吏部二十一年星變率九卿陳時弊二十事皆極痛切帝多采納而權倖所不便者終格不行明年乞致仕詔加太子少保賜敕馳傳還卒諡康懿林鶚字一鶚浙江太平人景泰二年進士授御史監京畿鄉試陳循等訐考官鶚邑子林挺預薦疑鶚有私逮挺考訊挺實無他得白英宗復辟倣先朝故事出廷臣為知府鶚得鎮江召見賜膳及道里費諭所以擢用意鶚感激革弊舉廢治甚有聲漕故經孟瀆險甚巡撫崔恭議鑿河自七里港引金山上流通丹陽避之鶚言道里遠多石且壞民廬墓請按京口閘甘露壩故迹濬之令通舟春夏啟閘秋冬度壩功力省便恭從其議遂為永利居五年以才任治劇調蘇州成化初超遷江西按察使有犯大辟賄達官求生者鶚執愈堅廣東寇剽贛州急調兵禦之遁去廣信妖賊妄稱天神惑衆捕戮其魁立解散歷左右布政使歲饑奏減民租十五萬石成化六年擢南京刑部右侍郎母憂服除召為刑部右侍郎執法不撓十二年得疾卒鶚事母孝謹對妻子無惰容不妄交與公餘輒危坐讀書歿不能具棺斂友人為經紀其喪鶚在蘇州先聖像剝落鶚曰塑像非古也昔太祖於國學用木主命改從之嘉靖中御史趙大佑上其節行贈刑部尚書諡恭肅潘榮字尊用龍溪人正統十三年進士犒師廣東還除吏科給事中景泰初疏論停起復抑奔競數事帝納之尋進右給事中四年九月上言致治之要莫切於納諫比以言者忤聖意諭禮部凡遇建言務加審察或假以報復具奏罪之此令一下廷臣喪氣以言為諱國家有利害生民有得失大臣有奸慝何由而知況今巨寇陸梁塞上多事奈何反塞言者路望明詔臺諫知無不言緘默者罪並敕閣部大臣勿搜求參駁虧傷治體疏入報聞天順六年使琉球還遷都給事中成化六年三月偕同官上言近雨雪愆期災異迭見陛下降詔自責躬行祈禱詔大臣盡言宜上天感格而今乃風霾晝晦沴氣赤而復黑豈非應天之道有未盡歟夫人君敬天不在齋戒祈禱而已政令乖宜下民失所崇尚珍玩費用不經後宮無序恩澤不均爵濫施於賤工賞妄及於非分皆非敬天之道願陛下日御便殿召大臣極陳缺失而釐革之庶災變可弭時萬妃專寵羣小夤緣進寶玩官賞冗濫故榮等懇言之帝不能用是年遷南京太常少卿又七年就擢戶部右侍郎尋改右副都御史總督南京糧儲積奇羨數萬石以備荒十七年召為戶部左侍郎尋署部事英國公張懋等四十三人自陳先世以大功錫爵子孫承繼所司輒減歲祿非祖宗報功意榮等言懋等於無事時妄請增祿若有功何以勸賞況頻年水旱國用未充所請不可許事乃寢中官趙陽等乞兩淮鹽十萬引帝已許之榮等言近禁勢家中鹽詔旨甫頒而陽等輒違犯宜正其罪帝為切責陽等南京戶部尚書黃鎬罷以榮代之孝宗嗣位謝政歸賜月廩歲夫如制九年卒年七十有八贈太子太保夏時正字季爵仁和人正統十年進士除刑部主事景泰六年以郎中錄囚福建出死罪六十餘人中有減死詔充所在濱海衞軍者時正慮其入海島為變轉發之山東然後以聞因言凡福建減死囚俱宜戍之方法司是其言而請治違詔罪帝特宥之時正又言通番及劫盜諸獄以待會讞淹引時月囚多瘐死請令所司斷決詔從之且推行之天下天順初擢大理寺丞久之以便養遷南京大理少卿成化五年遷本寺卿明年春命巡視江西災傷除無名稅十餘萬石汰諸司冗役數萬奏罷不職吏二百餘人增築南昌濱江堤及豐城諸縣陂岸民賴其利嘗上奏不具齎奏人姓名吏科論其簡恣帝宥其罪錄彈章示之遂乞休歸僦居民舍布政使張瓚為築西湖書院居之家食三十年年近九十而卒時正雅好學閒居久多所著述於稽古禮文事尤詳贊曰金純等黽勉奉公當官稱職加之禔躬清白操行無虧固列卿之良也鄭辰之廉事周瑄之治獄皆有仁人之用心君子哉
