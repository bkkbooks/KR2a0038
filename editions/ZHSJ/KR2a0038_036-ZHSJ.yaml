body:
  text: 明史卷三十六志第十二曆六大統曆法三下推步步交食交周日二十七日二十一刻二二二四半之為交中日交終度三百六十三度七九三四一九六半之為交中度正交度三百五十七度六四中交度一百八十八度五前準一百六十六度三九六八後準一十五度五交差二日三一八三六九交望一十四日七六五二九六五日食陽曆限六度定法六十日食陰曆限八度定法八十月食限十三度五分定法八十七陽食限視定朔入交日六已下一十三日一已上在一十四日不問小餘皆入食限一十五日二已下二十五日六已上在二十六日二十七日不問小餘皆入食限陰食限視定望入交一日二已下一十二日四已上在日一十三日不問小餘皆入食限一十四日八已下二十六日五已上在二十七日不問小餘皆入食限又視定朔小餘在日出前日入後二十分已上者日食在夜定望小餘在日入前日出後八刻二十分已上者月食在晝皆不必布算推日食用數經朔盈縮曆盈縮差遲疾曆遲疾差加減差定朔入交汎分以上皆全錄之定入遲疾曆以加減差加減遲疾即是遲疾定限置定入遲疾曆以日轉限一十二限二十分乘之小餘不用定限行度以定限取立成內行度遲用遲疾用疾內減日行分八分二十秒得之日出分以盈縮曆從立成內取之下同日入分半晝分取立成內昏分減去五千二百五十分得之歲前冬至加時黃道宿次推交常度置有食之朔入交汎分以月平行度乘之即得推交定度置交常度以朔下盈縮差盈加縮減之即得推日食正交中交限度視交定度在七度已下三百四十二度已上者食在正交在一百七十五度已上二百二度已下者食在中交不在限內不食推中前中後分視定朔小餘在半日周已下用減半日周餘為中前分在半日周已上減去半日周餘為中後分推時差置半日周以中前中後分減之餘以中前中後分乘之所得以九千六百而一為時差在中前為減中後為加推食甚定分置定朔小餘以時差加減之即得推距午定分置中前中後分加時差即得但加不減推食甚入盈縮曆置原得盈縮曆加入定朔大餘及食甚定分即得推食甚盈縮差依步氣朔求之推食甚入盈縮曆行定度置食甚入盈縮曆以盈縮差盈加縮減之即得推南北汎差視食甚入盈縮曆行定度在周天象限已下為初限已上與半歲周相減為末限以初末限自之如一千八百七十度而一得數置四度四十六分減之餘為南北汎差推南北定差置南北汎差以距午定分乘之如半晝分而一以減汎差餘為南北定差若汎差數少即反減之盈初縮末食在正交為減中交為加縮初盈末食在正交為加中交為減如係汎差反減而得者則其加減反是推東西汎差置半歲周減去食甚入盈縮曆行定度餘以食甚入盈縮曆行定度乘之以一千八百七十除之為度即東西汎差推東西定差置東西汎差以距午定分乘之如二千五百度而一視得數在東西汎差以下即為東西定差若在汎差已上倍汎差減之餘為定差盈曆中前縮曆中後者正交減中交加盈曆中後縮曆中前者正交加中交減推正交中交定限度視日食在正交者置正交度在中交者置中交度以南北東西二定差加減之即得推日食入陰陽曆去交前交後度視交定度在正交定限度已下減去交定度餘為陰曆交前度已上減去正交定限度餘為陽曆交後度在中交定限度已下減去交定度餘為陽曆交前度已上減去中交定限度餘為陰曆交後度若交定度在七度已下者加交終度減去正交定限度餘為陽曆交後度推日食分秒在陽曆者置陽食限六度減去陽曆交前交後度不及減者不食陰曆同餘以定法六十而一在陰曆者置陰食限八度減去陰曆交前交後度餘以定法八十而一即得推定用分置日食分秒與二十分相減相乘為開方積以平方法開之為開方數用五千七百四十分七因八百二十分也乘之如定限行度而一即得推初虧復圓時刻置食甚定分以定用分減為初虧加為復圓各依發斂加時即得時刻推日食起復方位陽曆初虧西南甚於正南復於東南陰曆初虧西北甚於正北復於東北若食在八分以上不分陰陽曆皆虧正西復正東據午地而論推食甚日躔黃道宿次置食甚入盈縮曆行定度在盈就為定積度在縮加半歲周為定積度置定積度以歲前冬至加時黃道日度加之滿黃道積度鈐去之至不滿宿次即食甚日躔推日帶食視初虧食甚分有在日出分已下為晨刻帶食食甚復圓分有在日入分已上為昏刻帶食在晨置日出分在昏置日入分皆以食甚分與之相減餘為帶食差置帶食差以日食分秒乘之以定用分而一所得以減日食分秒餘為所見帶食分秒推月食用數經望盈縮曆盈縮差遲疾曆遲疾差加減差定望入交汎分定入遲疾曆定限定限行度晨分日出分昏分日入分限數歲前冬至加時黃道宿次推交常度置望下入交汎分乘月平行如日食法推交定度置交常度以望下盈縮差盈加縮減之即得不及減者加交終度減之推食甚定分不用時差即以定望分為食甚分推食甚入盈縮曆行定度法同推日食推月食入陰陽曆視交定度在交中度已下為陽曆已上減去交中度餘為陰曆推交前交後度視所得入陰陽曆在後準已下為交後在前準已上置交中度減之餘為交前推月食分秒置月食限一十三度五減去交前交後度不及減者不食餘以定法八十七分而一即得推月食定用分置三十分與月食分秒相減相乘為開方積依平方法開之為開方數又以四千九百二十乃六因八百二十分數分乘之如定限行度而一即得推月食三限初虧食甚復圓時刻置食甚定分以定用分減為初虧加為復圓依發斂得時刻如日食推月食五限時刻月食十分已上者用五限推之初虧食既食甚生光復圓也置月食分秒減去十分餘與十分相減相乘為開方積平方開之為開方數又以四千九百二十分乘之如定限行度而一為既內分與定用分相減餘為既外分置食甚定分減既內分為食既分又減既外分為初虧分再置食甚定分加既內分為生光分又加既外分為復圓分各依發斂得時刻推更點置晨分倍之五分之為更法又五分之為點法推月食入更點各置三限或五限在昏分已上減去昏分在晨分已下加入晨分不滿更法為初更不滿點法為一點以次求之各得更點之數推月食起復方位陽曆初虧東北甚於正北復於西北陰曆初虧東南甚於正南復於西南若食在八分已上者皆初虧正東復於正西推食甚月離黃道宿次置食甚入盈縮曆定度在盈加半周天在縮減去七十五秒為定積度置定積度加歲前冬至加時黃道日度以黃道積度鈐去之即得推月帶食視初虧食甚復圓等分在日入分以下為昏刻帶食在日出分已上為晨刻帶食推法同日食步五星曆度三百六十五度二五七五半之為曆中又半之為曆策木星合應二百四十三萬二三一置中積三億七千六百一十九萬九七七五加辛巳合應一百一十七萬九七二六得三億七千七百三十七萬九五一滿木星周率去之餘為大統合應曆應五百三十八萬二五七二二一五置中積加辛巳曆應一千八百九十九萬九四八一得三億九千五百一十九萬九二五六滿木星曆率去之餘為大統曆應周率三百九十八萬八八曆率四千三百三十一萬二九六四八六五度率一十一萬八五八二伏見一十三度段目段日平度限度初行率合伏一十六日八六三度八六二度九三二十三分晨疾初二十八日六度一一四度六四二十二分晨疾末二十八日五度五一四度一九二十一分晨遲初二十八日四度三一三度二八一十八分晨遲末二十八日一度九一一度四五一十二分晨留二十四日晨退四十六日五八四度八八一二五度三二八七五夕退四十六日五八四度八八一二五度三二八七五一十六分夕留二十四日夕遲初二十八日一度九一一度四五夕遲末二十八日四度三一三度二八一十二分夕疾初二十八日五度五一四度一九一十八分夕疾末二十八日六度一一四度六四二十一分夕伏一十六日八六三度八六二度九三二十二分火星合應二百四十萬一四置中積加辛巳合應五十六萬七五四五得三億七千六百七十六萬七三二滿火星周率去之為大統合應中積見木星五星並同曆應三百八十四萬五七八九三五置中積加辛巳曆應五百四十七萬二九三八得三億八千一百六十七萬二七一三滿火星曆率去之周率七百七十九萬九二九曆率六百八十六萬九五八四三度率一萬八八七五伏見一十九度段目段日平度限度初行率合伏六十九日五十度四十六度五七十三分晨疾初五十九日四十一度八三十八度八七七十二分晨疾末五十七日三十九度八三十六度三四七十分晨次疾初五十三日三十四度一六三十一度七七六十七分晨次疾末四十七日二十七度四二十五度一五六十二分晨遲初三十九日一十七度七二一十六度四八五十三分晨遲末二十九日六度二五度七七三十八分晨留八日晨退二十八日九六四五八度六五六七五六度四六三二五夕退二十八日九六四五八度六五六七五六度四六三二五四十四分夕留八日夕遲初二十九日六度二五度七七夕遲末三十九日一十七度七二一十六度四八三十八分夕次疾初四十七日二十七度四二十五度一五五十三分夕次疾末五十三日三十四度一六三十一度七七六十二分夕疾初五十七日三十九度八三十六度三四六十七分夕疾末五十九日四十一度八三十八度八七七十分夕伏六十九日五十度四十六度五七十二分土星合應二百六萬四七三四置中積加辛巳合應一十七萬五六四三得三億七千六百三十七萬五四一八滿土星周率去之曆應一億六百萬三七九九二置中積加辛巳曆應五千二百二十四萬五六一得四億二千八百四十四萬三三六滿土星曆率去之周率三百七十八萬九一六曆率一億七百四十七萬八八四五六六度率二十九萬四二五五伏見一十八度段目段日平度限度初行率合伏二十日四二度四一度四九一十二分晨疾三十一日三度四二度一一一十一分晨次疾二十九日二度七五一度七一一十分晨遲二十六日一度五度八三八分晨留三十日晨退五十二日六四五八三度六二五四五度二八四五五夕退五十二日六四五八三度六二五四五度二八四五五一十分夕留三十日夕遲二十六日一度五度八三夕次疾二十九日二度七五一度七一八分夕疾三十一日三度四二度一一一十分夕伏二十日四二度四一度四九一十一分金星合應二百三十七萬九四一五置中積加辛巳合應五百七十一萬六三三得三億八千一百九十一萬六一五滿金星周率去之曆應一十萬四一八九置中積加辛巳曆應一十一萬九六三九得三億七千六百三十一萬九四一四滿金星曆率去之周率五百八十三萬九二六曆率三百六十五萬二五七五度率一萬伏見一十度半段目段日平度限度初行率合伏三十九日四十九度五四十七度六四一度二七五夕疾初五十二日六十五度五六十三度四一度二六五夕疾末四十九日六十一度五十八度七一一度二五五夕次疾初四十二日五十度二五四十八度三六一度二三五夕次疾末三十九日四十二度五四十度九一度一六夕遲初三十三日二十七度二十五度九九一度二夕遲末一十六日四度二五四度九六十二分夕留五日夕退一十日九五三一三度六九八七一度五九一三夕退伏六日四