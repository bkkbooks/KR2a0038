body:
  text: 明史卷一百五十二列傳第四十董倫王景儀智子銘鄒濟徐善述王汝玉梁潛周述弟孟簡陳濟陳繼楊翥俞山俞綱潘辰王英錢習禮周劉儼柯潛羅璟孔公恂司馬恂董倫字安常恩人洪武十五年以張以寧薦授贊善大夫侍懿文太子陳說剴切太祖嘉之進左春坊大學士太子薨出為河南左參議肇州吏目蘭溪諸葛伯衡廉倫薦之帝遽擢為陝西參議又言儒學訓導宜與冠帶別於士子訓導始注選三十年坐事謫雲南教官雲南初設學校倫以身教人皆嚮學建文初召拜禮部侍郎兼翰林學士與方孝孺同侍經筵御書怡老堂額寵之又賜髹几玉鳩杖解縉謫河州以倫言得召還倫質直敦厚嘗勸帝睦親藩不聽成祖即位倫年已八十命致仕尋卒其與倫同時為禮部侍郎者有王景字景彰松陽人洪武初為懷遠教諭以博學應詔命作朝享樂章定藩王朝覲儀累官山西參政與倫先後謫雲南建文初召入翰林修太祖實錄用張紞薦除禮部侍郎兼翰林侍講成祖即位擢學士帝問葬建文帝禮景頓首言宜用天子禮從之永樂六年卒於官儀智字居真高密人洪武末舉耆儒授高密訓導遷莘縣教諭擢知高郵州課農興學吏民愛之永樂元年遷寶慶知府土人健悍獨畏智相戒不敢犯召為右通政兼右中允未幾遷湖廣右布政使坐事謫役通州六年冬湖廣都指揮使龔忠入見帝問湖湘間老儒忠以智對即日召之既至拜禮部左侍郎十一年元旦日當食尚書呂震請朝賀如常智持不可會左諭德楊士奇亦以為言乃免賀如智議十四年詔吏部翰林院擇耆儒侍太孫士奇及蹇義首薦智太子曰吾嘗舉李繼鼎大悞悔無及智誠端士然老矣士奇頓首言智起家學官明理守正雖耄精神未衰廷臣中老成正大無踰智者是日午朝帝顧太子曰侍太孫講讀得人未太子對曰舉禮部侍郎儀智議未決帝喜曰智雖老能直言可用也遂命輔導皇太孫每進講書史必反覆啟迪以正心術為本十九年年八十致仕卒於家洪熙元年贈太子少保諡文簡季子銘字子新宣宗即位以侍郎戴綸薦授行在禮科給事中九年秩滿帝念智舊勞改銘修撰正統三年預修宣廟實錄成遷侍講後改郕府長史郕王監國視朝午門廷臣劾王振叫號莫辨人聲銘獨造膝前免冠敷奏下令旨族振衆譁始息景帝即位力贊征伐諸大事尋以潛邸恩授禮部右侍郎明年兼經筵官帝每臨講幄輒命中官擲金錢於地任講官遍拾之號恩典文臣與者內閣高穀等外惟銘與俞山俞綱蕭鎡趙琬數人而已尋進南京禮部尚書懷獻太子立加太子太保召為兵部尚書兼詹事蘇州淮安諸郡積雪民凍餓死相枕沙灣築河役山東河南九萬人責民間鐵器數萬具銘請於帝多所寬恤因災異言消弭在敬天法祖省刑薄斂節用愛人錄皇明祖訓錄以進深見奬納卒諡忠襄銘少學於吳訥天性孝友易直有父風長子海錦衣衞百戶季子泰舉於鄉為禮科給事中並以父恩授云鄒濟字汝舟餘杭人事母以孝聞博學強記尤長春秋為餘杭訓導師法嚴累遷國子學錄助教以薦知平度州永樂初預修太祖實錄成除禮部郎中征安南從幕府司奏記還為廣東右參政再遷左春坊左庶子授皇孫經濟為人和易坦夷無貴賤皆樂親之秩滿進少詹事當是時宮僚多得罪徐善述王汝玉馬京梁潛輩被讒相繼下獄死濟積憂得疾皇太子以書慰曰卿善自攝即有不諱當提攜卿息不使墜蓬蒿也卒年六十八洪熙元年贈太子少保諡文敏命有司立祠墓側春秋祀之子幹字宗盛濟卒時尚幼仁宗監國命為應天府學生月賜鈔米舉正統四年進士景帝初由兵部郎中超擢本部右侍郎以才為于謙所倚也先入寇九門皆閉百姓避兵者號城下求入幹開門納之尋改禮部兼庶子考察山西官吏黜布政使侯復以下五十餘人巡視河南鳳陽水災與王竑請振又請令諸生輸粟入監讀書納粟入監自此始成化二年振畿內饑再遷禮部尚書加太子少保被劾乞休卒諡康靖徐善述字好古天台人洪武中行歲貢法善述首貢入太學授桂陽州學正永樂初以國子博士擢春坊司直郎見重於皇太子每稱為先生嘗致書賜酒及詩遷左贊善坐累死與鄒濟同日贈太子少師諡文肅立祠春秋祀亦如濟王汝玉名璲以字行長洲人穎敏強記少從楊維楨學年十七舉於鄉永樂初由應天府學訓導擢翰林五經博士歷遷右春坊右贊善預修永樂大典仁宗在東宮特被寵遇羣臣應制撰神龜賦汝玉第一解縉次之七年坐修禮書紊制度當戍邊皇太子監國宥之以為翰林典籍尋進左贊善坐解縉累瘐死洪熙初贈太子賓客諡文靖遣官祭其家梁潛字用之泰和人洪武末舉鄉試授四川蒼溪訓導以薦除知四會縣改陽江陽春皆以廉平稱永樂元年召修太祖實錄書成擢修撰尋兼右春坊右贊善代鄭賜總裁永樂大典帝幸北京屢驛召赴行在十五年復幸北京太子監國帝親擇侍從臣翰林獨楊士奇以潛副之有陳千戶者擅取民財令旨謫交阯數日後念其有軍功貸還或讒於帝曰上所謫罪人皇太子曲宥之矣帝怒誅陳千戶事連潛及司諫周冕逮至行在親詰之潛等具以實對帝謂楊榮呂震曰事豈得由潛然卒無人為白者俱繫獄或毀冕放恣遂併潛誅潛妻楊氏痛潛非命不食死子楘由進士為刑部主事善辨冤獄用薦擢廣西副使進布政使將士多殺良民報功楘諭其帥生致難民一人准功一級全活無算田州土官岑鑑兄弟相讐楘為解之却其厚餽撫服梗化女土官民夷服其信義終浙江布政使周述字崇述吉水人永樂二年與從弟孟簡並進士及第帝手題二人策奬賞之並授翰林編修尋詔解縉選曾棨等二十八人讀書文淵閣述孟簡皆與焉司禮監給紙筆光祿給朝暮饌禮部月給膏燭鈔人三錠工部擇近宅居之一時以為榮述嘗扈北巡累進左春坊諭德仁宗即位命從皇太子謁陵南京召至榻前問所以匡弼儲君者對稱旨宣宗時進左庶子正統初卒官孟簡在翰林二十年始遷詹事府丞出為襄王府長史有言宜留備顧問者帝曰輔朕弟尤勝於輔朕也述溫厚簡靜未嘗有疾言遽色文章雅贍孟簡謙退不伐生平無睚眦於人並為世所重云陳濟字伯載武進人讀書過目成誦嘗以父命如錢塘家人齎貨以從比還以其貲之半巿書口誦手鈔十餘年盡通經史百家之言成祖詔修永樂大典用大臣薦以布衣召為都總裁修撰曾棨等為之副詞臣纂修者及太學儒生數千人繙秘庫書數百萬卷浩無端倪濟與少師姚廣孝等數人發凡起例區分鉤考秩然有法執筆者有所疑輒就濟質問應口辨析無滯書成授右贊善謹慎無過皇太子甚禮重之凡稽古纂集之事悉以屬濟隨事敷奏多所裨益五皇孫皆從受經居職十五年而卒年六十二濟少有酒過母戒之終其身未嘗至醉弟洽為兵部尚書事濟如父濟深懼盛滿彌自謙抑所居蓬戶葦壁裁蔽風雨終日危坐手不釋卷為文根據經史不事葩藻嘗云文貴如布帛菽粟有益於世爾其後有陳繼楊翥者亦以布衣通經用楊士奇薦繼由博士入翰林而翥竟用景帝潛邸恩與俞山俞綱等皆至大官自天順後始漸拘資格編修馬昇檢討傅宗不由科目李賢皆出之為參議布衣無得預館閣者而弘治間潘辰獨以才望得之一時詫異數焉陳繼字嗣初吳人幼孤母吳氏躬織以資誦讀比長貫穿經學人呼為陳五經奉母至孝府縣交薦以母老不就母卒哀毀過人永樂中復舉孝行旌其母曰貞節仁宗即位開弘文閣帝臨幸問今山林亦有名士乎楊士奇初不識繼夏原吉治水蘇松得其文歸以示士奇士奇心識之及帝問遂以繼對召為國子博士尋改翰林五經博士直弘文閣宣宗初遷檢討引疾歸卒楊翥字仲舉亦吳人少孤貧隨兄戍武昌授徒自給楊士奇微時流寄窘乏翥輒解館舍讓之而己教授他所士奇心賢之及貴薦翥經明行修宣宗詔試吏部稱旨授翰林院檢討歷修撰正統中詔簡郕王府僚諸翰林皆不欲行乃出侍講儀銘及翥為左右長史久之引年歸王即大位入朝拜禮部右侍郎景泰三年進尚書給祿致仕明年卒年八十五翥篤行絕俗一時縉紳厚德者翥為最既沒景帝念之召其子珒入覲授本邑主簿俞山字積之秀水人由鄉舉為郕府伴讀景帝時拜吏部右侍郎而嘉興俞綱由諸生繕寫實錄試中書舍人授郕府審理景帝時以兵部右侍郎入閣預機務居三日固辭守本官景帝將易東宮山密疏諫不聽懷獻太子立加太子少傅山意不自安致仕去綱加太子少保英宗復辟山以致仕得免而綱當景泰時能周旋二帝間故得調南京禮部成化初致仕卒潘辰字時用景寧人少孤隨從父家京師以文學名弘治六年詔天下舉才德之士隱於山林者府尹唐恂舉辰吏部以辰生長京師寢之恂復奏給事中王綸夏昂亦交章薦乃授翰林待詔久之掌典籍事預修會典成進五經博士正德中劉瑾摘會典小疵復降為典籍俄還故官南京缺祭酒吏部推石珤及辰帝以命珤而擢辰編修居九年超擢太常少卿致仕歸卒特賜祭葬辰居官勤慎晨入夜歸典制誥時有以幣酬者堅却之士大夫重其學行稱為南屏先生王英字時彥金谿人永樂二年進士選庶吉士讀書文淵閣帝察其慎密令與王直書機密文字與修太祖實錄授翰林院修撰進侍讀二十年扈從北征師旋過李陵城帝聞城中有石碑召英往視既至不識碑所而城北門有石出土尺餘發之乃元時李陵臺驛令謝某德政碑也碑陰刻達魯花赤等名氏具以奏帝曰碑有蒙古名異日且以為己地啟爭端命再往擊碎之沉諸河還奏帝喜其詳審曰爾是二十八人中讀書者朕且用爾因問以北伐事英曰天威親征彼必遠遁願勿窮追帝笑曰秀才謂朕黷武邪因曰軍中動靜有聞即入奏且諭中官勿阻立功官軍有過命勿與糧相聚泣以英奏復給予仁宗即位累進右春坊大學士乞省親歸宣宗立還朝是時海內宴安天子雅意文章每與諸學士談論文藝賞花賦詩禮接優渥嘗謂英曰洪武中學士有宋濂吳沉朱善劉三吾永樂初則解縉胡廣汝勉之毋俾前人獨專其美修太宗仁宗實錄成遷少詹事賜麒麟帶母喪特與葬祭遣中官護歸尋起復正統元年命侍經筵總裁宣宗實錄進禮部侍郎八年命理部事浙江民疫遣祭南鎮時久旱英至大雨民呼侍郎雨年七十再乞休不許十二年英子按察副使裕坐事下獄英上疏待罪宥不問明年進南京禮部尚書俾就閒逸居二年卒年七十五賜祭葬諡文安英端凝持重歷仕四朝在翰林四十餘年屢為會試考官朝廷制作多出其手四方求銘志碑記者不絕性直諒好規人過三楊皆不喜故不得柄用裕後累官四川按察使錢習禮名幹以字行吉水人永樂九年進士選庶吉士尋授檢討習禮與練子寧姻戚既仕鄉人以奸黨持之惴惴楊榮乘間言於帝帝笑曰使子寧在朕猶當用之況習禮乎仁宗即位遷侍讀知制誥以省親歸宣德元年修兩朝實錄與侍講陳敬宗陳循同召還進侍讀學士英宗開經筵為講官宣宗實錄成擢學士掌院事七年以故鴻臚寺為翰林院落成諸殿閣大學士皆至習禮不設楊士奇楊溥座曰此非三公府也士奇等以聞帝命具座後遂為故事正統九年乞致仕不許明年六部侍郎多闕帝命吏部尚書王直會大臣推舉而特旨擢習禮於禮部習禮力辭不允王振用事達官多造其門習禮恥為屈十二年六月復上章乞骸骨乃得歸習禮篤行誼好古秉禮動有矩則家居十五年卒年八十有九諡文肅周字公吉水人年十一能詩永樂十六年進士選庶吉士作黃鸚鵡賦稱旨授編修歷官侍讀直經筵正統六年上疏言事帝嘉納焉八年夏又上言比天旱陛下責躬虔禱而臣下不聞效忠補過之言徒陳情乞用而已掌銓選者罔論賢否第循資格司國計者不問耕桑惟勤賦斂軍士困役作刑罰失重輕風憲無激揚言官務緘默僧道數萬日耗戶口流民衆多莫為矜恤帝以章示諸大臣王直等皆引罪求罷十一年遷南京侍講學士郕王監國馳疏言君父之讐不共戴天殿下宜臥薪嘗膽如越之報吳使智者獻謀勇者効力務掃北庭雪國恥先遣辯士卑詞重幣乞還鑾輿暫為君父屈因條上勵剛明親經史修軍政選賢才安民心廣言路謹微漸修庶政八事王嘉納之景泰二年又請復午朝日接大臣咨諏治道經筵之餘召文學從臣講論政事幷詔天下臣民直言時政缺失帝因詔求言負氣節篤行誼曾祖以立在元時以宋遼金三史體例未當欲重修思繼先志正統末請於朝詔許自撰銓次數年未及成而卒同邑劉儼字宣化正統七年進士第一歷官太常少卿景泰中典順天鄉試黜大學士陳循王文子幾得危禍詳高穀傳天順初改掌翰林院事卒官贈禮部侍郎諡文介儼立朝正直居鄉亦有令德云柯潛字孟時莆田人景泰二年舉進士第一歷洗馬天順初遷尚寶少卿兼修撰憲宗即位以舊宮僚擢翰林學士英宗實錄成進少詹事慈懿太后之喪潛與修撰羅璟上章請合葬裕陵廷臣相繼爭未報潛曰朝廷大事臣子大節舍是奚所用心與璟皆再疏爭竟得如禮連遭父母喪詔起為祭酒固乞終制許之未幾卒潛邃於文學性高介為學士時即院中後圃構清風亭鑿池蒔芙蓉植二柏於後堂人稱其亭為柯亭柏為學士柏院中有井學士劉定之所浚也柯亭劉井翰林中以為美談云羅璟字明仲泰和人天順末進士及第授編修進修撰預修宋元通鑑綱目累官洗馬孝宗為太子簡侍講讀母喪歸璟與尚書尹旻子侍講龍同娶於孔氏旻得罪李孜省指璟為旻黨調南京禮部員外郎孝宗嗣位王恕等言璟才乃授福建提學副使弘治五年召為南京祭酒久之卒孔公恂字宗文先聖五十八世孫也景泰五年舉會試聞母疾不赴廷對帝以問禮部具言其故乃遣使召之日且午不及備試卷命翰林院給以筆札登第即丁母憂歸衍聖公孔彥縉卒孫弘緒幼弱詔遣禮部郎治喪公恂理其家事天順初授禮科給事中弘緒已襲封大學士李賢妻以女公恂因得交於賢賢言公恂大聖人後贊善司馬恂宋大賢溫國公光後宜輔導太子帝喜同日超拜少詹事侍東宮講讀入語孝肅皇后曰吾今日得聖賢子孫為汝子傅孝肅皇后者憲宗生母方以皇貴妃有寵於是具冠服拜謝宮中傳以為盛事云憲宗嗣位改公恂大理左少卿公恂言不通法律乃復少詹事成化二年上章言兵事諸武臣譁然給事御史交章駁之下獄謫漢陽知府未至丁父憂服闋商輅請復建言得罪者官乃還故秩涖南京詹事府久之卒司馬恂字恂如浙江山陰人正統末由舉人擢刑科給事中累遷少詹事憲宗立命兼國子祭酒卒贈禮部左侍郎恂強記敦厚與物無忤居官無所表見贊曰建文之初修尊賢敬老之節董倫以宿儒見重雖寡所表見當非苟焉已也儀智父子仍世以儒術進從容輔導蓋其賢哉鄒濟諸人以宮僚被遇而讒搆不免陳濟輩起布衣列禁近而善始終固有幸不幸歟二周王英錢習禮周柯潛謙和直諒各著其美蓋皆異於浮華博習之徒矣
