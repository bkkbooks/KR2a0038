body:
  text: 明史卷一百十九列傳第七諸王四仁宗諸子鄭王瞻埈廬江王載堙越王瞻墉蘄王瞻垠襄王瞻墡棗陽王祐楒荊王瞻堈淮王瞻墺滕王瞻塏梁王瞻衞王瞻埏英宗諸子德王見潾許王見淳秀王見澍崇王見澤吉王見浚忻王見治徽王見沛景帝子懷獻太子見濟憲宗諸子悼恭太子祐極岐王祐棆益王祐檳衡王祐楎新樂王載壐雍王祐橒壽王祐榰汝王祐涇王祐橓榮王祐樞申王祐楷孝宗子蔚王厚煒仁宗十子昭皇后生宣宗越王瞻墉襄王瞻墡李賢妃生鄭王瞻埈蘄王瞻垠淮王瞻墺張順妃生荊王瞻堈郭貴妃生滕王瞻塏梁王瞻衞王瞻埏鄭靖王瞻埈仁宗第二子永樂二十二年十月封仁宗崩皇后命與襄王監國以待宣宗宣德元年帝征樂安仍命與襄王居守四年就藩鳳翔正統八年詔遷懷慶留京邸明年之國瞻埈暴厲數斃人杖下英宗以御史周瑛為長史稍戢成化二年薨子簡王祁鍈嗣祁鍈之為世子也襄王朝京師經新鄉祁鍈不請命遣長史往迎英宗聞之不悅賜書責讓及嗣王多不法又待世子寡恩長史江萬程諫被責辱萬程以聞帝遣英國公張懋太監王允中齎敕往諭始上書謝罪弘治八年薨世子見滋母韓妃不為祁鍈所禮見滋悒悒先卒子康王祐枔嗣正德二年薨無子從弟懿王祐檡嗣十六年薨子恭王厚烷嗣世宗幸承天厚烷迎謁於新鄉加祿三百石疏奏母閻太妃貞孝事蹟詔付史館其後帝修齋醮諸王爭遣使進香厚烷獨不遣嘉靖二十七年七月上書請帝修德講學進居敬窮理克己存誠四箴演連珠十章以神仙土木為規諫語切直帝怒下其使者於獄詔曰前宗室有謗訕者置不治茲復效尤王今之西伯也欲為為之後二年而有祐橏之事厚烷遂獲罪初祁鍈有子十人世子見滋次盟津王見濍次東垣王見見濍母有寵於祁鍈規奪嫡不得竊世子金冊以去祁鍈索之急因怨不復朝所為益不法祁鍈言之憲宗革為庶人及康王薨無子見濍子祐橏應及以前罪廢乃立東垣王子祐檡至是祐橏求復郡王爵怨厚烷不為奏乘帝怒摭厚烷四十罪以叛逆告詔駙馬中官即訊還報反無驗治宮室名號擬乘輿則有之帝怒曰厚烷訕朕躬在國驕傲無禮大不道削爵錮之鳳陽隆慶元年復王爵增祿四百石厚烷自少至老布衣蔬食世子載堉篤學有至性痛父非罪見繫築土室宮門外席藁獨處者十九年厚烷還邸始入宮萬曆十九年厚烷薨載堉曰鄭宗之序盟津為長前王見濍既錫諡復爵矣爵宜歸盟津後累疏懇辭禮臣言載堉雖深執讓節然嗣鄭王已三世無中更理宜以載堉子翊錫嗣載堉執奏如初乃以祐橏之孫載壐嗣而令載堉及翊錫以世子世孫祿終其身子孫仍封東垣王二十二年正月載堉上疏請宗室皆得儒服就試毋論中外職中式者視才品器使詔允行明年又上曆算歲差之法及所著樂律書考辨詳確識者稱之卒諡端清崇禎中載壐子翊鍾以罪賜死國除廬江王載堙簡王元孫也崇禎十七年二月賊陷懷慶載堙整冠服端坐堂上賊至被執欲屈之厲聲曰吾天朝藩王肯降汝逆賊耶詬罵不屈遇害賊執其長子翊檭擁之北行三月過定興於旅店作絕命詞遂不食死越靖王瞻墉仁宗第三子永樂二十二年封衢州未之藩宣宗賜以昌平莊田正統四年薨妃吳氏殉諡貞惠無後蘄獻王瞻垠仁宗第四子初封靜樂王永樂十九年薨諡莊獻仁宗即位追加封諡無後襄憲王瞻墡仁宗第五子永樂二十二年封莊敬有令譽宣德四年就藩長沙正統元年徙襄陽英宗北狩諸王中瞻墡最長且賢衆望頗屬太后命取襄國金符入宮不果召瞻墡上書請立皇長子令郕王監國募勇智士迎車駕書至景帝立數日矣英宗還京師居南內又上書景帝宜旦夕省膳問安率羣臣朔望見無忘恭順英宗復辟石亨等誣于謙王文有迎立外藩語帝頗疑瞻墡久之從宮中得瞻墡所上二書而襄國金符固在太后閣中乃賜書召瞻墡比二書於金縢入朝宴便殿避席請曰臣過汴汴父老遮道言按察使王㮣賢以誣逮詔獄願皇上加察帝立出㮣命為大理卿詔設襄陽護衞命有司為王營壽藏及歸帝親送至午門外握手泣別瞻墡逡巡再拜帝曰叔父欲何言頓首曰萬方望治如饑渴願省刑薄斂帝拱謝曰敬受教目送出端門乃還四年復入朝命百官朝王於邸詔王詣昌平謁三陵及辭歸禮送加隆且敕王歲時與諸子得出城遊獵蓋異數也六年又召以老辭歲時存問禮遇之隆諸藩所未有成化十四年薨子定王祁鏞嗣弘治元年薨子簡王見淑嗣三年薨子懷王祐材嗣好鷹犬蓄善馬往返南陽八百里日猶未晡妃父井海誘使殺人孝宗戒諭戍海及其左右祐材好道術賜予無節又嘗與興邸爭地連逮七十餘家獄久不決大理卿汪綸兩解之乃得已十七年薨弟康王祐櫍嗣亦好道術嘉靖二十九年薨無子從子莊王厚熲由陽山王嗣定王曾孫也時王邸災先世蓄積一空厚熲折節為恭儉節祿以餉邊進金助三殿工兩賜書幣事嫡母王太妃及生母潘太妃以孝聞潘卒殯之東偏王太妃曰汝母有子社稷是賴無以我故避正寢厚熲泣曰臣不敢以非禮加臣母及葬跣足扶櫬五十里士大夫過襄者皆為韋布交四十五年薨子靖王載堯嗣萬曆二十三年薨子翊銘嗣崇禎十四年張獻忠陷襄陽遇害初大學士楊嗣昌之視師也以襄陽為軍府增堞浚隍貯五省餉金及弓刀火器是年二月獻忠邀殺嗣昌使於道奪其符驗以數十騎紿入襄城夜半火作遲明賊大至執翊銘南城樓屬卮酒曰王無罪王死嗣昌得以死償王遂殺王及貴陽王常法火城樓焚其屍賊去僅拾顱骨數寸妃妾輩死者四十三人福清王常澄進賢王常淦走免事聞帝震悼命所司備喪禮諡曰忠王嗣昌朝惠王於荊州謁者謝之曰先生惠顧寡人願先之襄陽謂襄城之破罪在嗣昌也十七年以常澄嗣襄王寄居九江後徙汀州不知所終棗陽王祐楒憲王曾孫也材武善文章博涉星曆醫卜之書嘉靖初上書請考興獻帝世宗以其議發自宗人足厭服羣心褒之更請除宗人祿使以四民業自為生賢者用射策應科第寢不行時襄王祐櫍病廢不事事承奉邵亨挾權自恣至捶死鎮寧王舅祐楒誘致之抉其目帝遣大理少卿袁宗儒偕中官錦衣往訊亨論死祐楒坐奪爵帝幸承天念祐楒前疏復之荊憲王瞻堈仁宗第六子永樂二十二年封宣德四年就藩建昌宮中有巨蛇蜿蜒自梁垂地或凭王座瞻堈大懼請徙正統十年徙蘄州景泰二年上書請朝上皇不許四年薨子靖王祁鎬嗣天順五年薨子見潚嗣靖王三子長見潚次都梁王見溥樊山王見澋見潚與見溥同母怨母之見溥也錮母奪其衣食竟死出柩於竇召見溥入後園箠殺之紿其妃何氏入宮逼淫之從弟都昌王見潭妻茆氏美求通焉見潭母馬氏防之嚴見潚髠馬氏鞭之囊土壓見潭死械繫茆妃入宮嘗集惡少年輕騎微服涉漢水掠人妻女見澋懼其及也密聞於孝宗召至京帝御文華門命廷臣會鞫見潚引伏廢為庶人錮西內居二年見潚從西內摭奏見澋罪誣其與楚府永安王謀不軌帝遣使往按問不實見澋更奏見潚嘗私造弓弩與子祐柄有異謀驗之實賜見潚死廢祐柄而以見溥子祐嗣為荊王時弘治七年也十七年薨諡曰和子端王厚烇嗣性謙和銳意典籍嘉靖中病辭祿不允令富順王厚焜攝朝謁厚焜和王第二子與弟永新王厚熿以能詩善畫名厚烇子永定王載墭長厚焜即謝攝事人尤以為賢嘉靖三十二年厚烇薨載墭已前卒其子恭王翊鉅嗣荊自靖王諸子交惡失令譽及厚烇兄弟感先世家難以禮讓訓飭宗人見澋曾孫載埁尤折節恭謹以文行稱郡王女例請祿於朝載埁四女皆妻士人不請封嘗上應詔正禮二疏不報讀易窮理著大隱山人集子翊翊翊皆工詩兄弟嘗共處一樓號花萼社翊鉅表載埁賢以訓諸子諸子不率教世子常泠尤殘恣翊鉅言於朝革為庶人隆慶四年翊鉅薨次子常嗣萬曆四年薨無子弟康王常由安城王嗣萬曆二十五年薨子定王由樊嗣天啟二年薨子慈嗣崇禎時流賊革𩹉眼左金王詭降於楚帥慈欲與為好召宴盛陳女樂十六年正月張獻忠陷蘄州慈先一月薨賊圍王宮盡掠其所見妓樂去淮靖王膽墺仁宗第七子永樂二十二年封宣德四年就藩韶州英宗即位之十月以韶多瘴癘正統元年徙饒州正統十一年薨子康王祁銓嗣弘治十五年薨世子見濂早卒無子從子定王祐棨嗣游戲無度左右倚勢暴橫境內苦之長史莊典以輔導失職自免詔不許推官汪文盛數持王府事有顧嵩者病狂持刀斧入王門官校執詰之謬言出汪指使典白之守臣鎮守太監黎安嘗以事至饒從騎入端禮門被撻銜祐棨甚先是祐棨有名琴曰天風環珮寧王宸濠求之不得又求濱湖地不與至是嗾安奏祐棨過失及文盛被誣事詔下撫按訊安與宸濠謀不待報遽繫典及府中官校鞫之典辭倨宸濠箠之斃獄中他所連坐甚衆於是祐棨奏安挾仇殺典庇嵩帝遣都御史金獻民太監張欽往按治祐棨畏宸濠不能自明欽等復言祐棨信奸徒為暴請嚴戒之軍校坐戍者二十餘人典冤竟不白嘉靖三年祐棨薨無子弟莊王祐楑嗣十六年薨子憲王厚燾嗣四十二年薨子恭王載坮嗣萬曆五年薨弟順王載堅嗣二十三年薨子翊𨨣嗣翊𨨣之未王也與妓王愛狎冒妾額入宮且令撫庶子常洪為子陳妃與世子常清俱失愛潛謀易嫡御史陳王道以理諭王出之外舍常洪遂與宗人翊銂等謀夜入王宮盜冊寶資貨以出守臣上其事王愛論死勒常洪自盡翊銂等削屬籍永錮奪翊𨨣四歲祿久之薨子常清嗣國亡不知所終滕懷王瞻塏仁宗第八子永樂二十二年封雲南未之國洪熙元年薨無後梁莊王瞻仁宗第九子永樂二十二年封宣德初詔鄭越襄荊淮五王歲給鈔五萬貫惟梁倍之四年就藩安陸故郢邸也襄王瞻墡自長沙徙襄陽道安陸與瞻留連不忍去瀕別瞻慟曰兄弟不復更相見奈何左右皆泣下正統元年言府卑濕乞更爽塏地帝詔郢中歲歉俟有秋理之竟不果六年薨無子封除梁故得郢田宅園湖後皆賜襄王及睿宗封安陸盡得郢梁邸田供二王祠祀衞恭王瞻埏仁宗第十子永樂二十二年封懷慶幼善病宣宗撫愛之未就藩歲時謁陵皆命攝祀孝謹好學以賢聞正統三年薨妃楊氏殉賜諡貞烈無子封除英宗九子周太后生憲宗崇王見澤萬宸妃生德王見潾及皇子見湜吉王見浚忻王見治王惠妃生許王見淳高淑妃生秀王見澍韋德妃生徽王見沛德莊王見潾英宗第二子初名見清景泰三年封榮王天順元年三月復東宮同日封德秀崇吉四王歲祿各萬石初國德州改濟南成化三年就藩請得齊漢二庶人所遺東昌兗州閒田及白雲景陽廣平三湖地憲宗悉予之復請業南旺湖以漕渠故不許又請漢庶人舊牧馬地知府趙璜言地歸民間供稅賦已久不宜奪帝從之正德初詔王府莊田畝徵銀三分歲為常見潾奏初年兗州莊田歲畝二十升獨清河一縣成化中用少卿宋旻議歲畝五升若如新詔臣將無以自給戶部執山東水旱相仍百姓凋敝宜如詔帝曰王何患貧其勿許十二年薨子懿王祐榕嗣嘉靖中戶部議覈王府所請山場湖陂斷自宣德以後者皆還官詔允行於是山東巡撫都御史邵錫奏德府莊田俱在革中與祐榕相訐奏錫持之益急儀衞司軍額千七百人逃絕者以餘丁補錫謂非制檄濟南知府楊撫籍諸補充者勿與餉軍校大譁毀府門詔逮問長史楊穀楊孟法戍儀衞副薛寧及軍校陶榮諭王守侯度毋徇羣小滋多事議者謂錫故激致其罪不盡祐榕過云此十一年八月事至十八年涇徽二王復請得所革莊田祐榕援以為請詔仍與三湖地使自徵其課其年薨孫恭王載墱嗣萬曆二年薨子定王翊錧嗣十六年薨子常嗣崇禎五年薨世子由樞嗣十二年正月大清兵克濟南見執見湜英宗第三子早卒復辟後不復追贈許悼王見淳英宗第四子景泰三年封明年薨禮臣請用親王禮葬帝以王幼殺其制秀懷王見澍英宗第五子生於南宮天順元年封成化六年就藩汝寧長史劉誠獻千秋日鑒錄見澍朝夕誦之就藩時慮途中擾民令併日行王居隘左右請遷文廟廣之見澍不聽曰居近學宮時聞絃頌聲顧不美乎論書至西伯戡黎長史誠主吳氏說曰戡黎者武王也右長史趙銳主孔氏說曰實文王事爭之失色見澍曰經義未有定論不嫌往復今若此非先皇帝簡二先生意也成化八年薨無子封除崇簡王見澤英宗第六子生於南宮天順元年封成化十年就藩汝寧故秀邸也弘治八年七月皇太后春秋高思一見王帝特敕召之禮部尚書倪岳言數年來三王之國道路供億民力殫竭今召王復來往返勞費兼水溢旱蝗舟車所經恐有他虞親王入朝雖有故事自宣德來已鮮舉行英宗復辟襄王奉詔來朝雖篤敦之恩實塞疑讒之隙非故事也大學士徐溥亦以為言帝重違太后意不允既而言官交章及之乃已十八年薨子靖王祐樒嗣正德六年薨子恭王厚燿嗣三王並有賢名而靖王尤孝友嘉靖十六年厚燿薨子莊王載境嗣三十六年薨子端王翊嗣萬曆三十八年薨孫由樻嗣崇禎十五年閏十一月李自成陷汝寧執由樻去偽封襄陽伯令諭降州縣之未下者由樻不從殺之於泌陽城弟河陽王由材世子慈煇等皆遇害吉簡王見浚英宗第七子生於南宮天順元年封時甫二歲成化十三年就藩長沙刻先聖圖及尚書於嶽麓書院以授學者嘉靖六年薨孫定王厚嗣請湘潭商稅益邸租不許十八年薨子端王載均由光化王嗣四十年薨子莊王翊鎮嗣隆慶四年薨無子庶兄宣王翊鑾由龍陽王嗣萬曆四十六年薨孫由楝嗣崇禎九年薨子慈煃嗣十六年張獻忠入湖南同惠王走衡州隨入國亡後死於緬甸忻穆王見治英宗第八子成化二年封未就藩八年薨無後徽莊王見沛英宗第九子成化二年封十七年就藩鈞州承奉司自置吏左布政使徐恪革之見沛以聞憲宗書諭王置吏非制也恪無罪正德元年薨子簡王祐檯嗣嘉靖四年薨子恭王厚爝嗣二十九年薨子浦城王載土侖嗣初厚爝好琴琴者與知州陳吉交惡厚爝庇之劾吉逮詔獄都御史駱昂御史王三聘白吉冤帝怒幷逮之昂杖死三聘吉俱戍邊議者不直厚爝時方士陶仲文有寵於世宗厚爝厚結之仲文具言王忠敬奉道帝喜封厚爝太清輔元宣化真人予金印及載土侖嗣王益以奉道自媚於帝命綰其父真人印南陽人梁高輔自言能導引服食載土侖用其術和藥命高輔因仲文以進帝封高輔通妙散人載土侖清微翊教輔化忠孝真人載土侖遂益恣壞民屋作臺榭苑囿庫官王章諫杖殺之嘗微服之揚州鳳陽為邏者所獲羈留三月走歸時高輔被上寵不復親載土侖載土侖銜之已而為帝取藥不得求載土侖舊所蓄者載土侖不與而與仲文高輔大恨乘間言載土侖私往南中與他過失帝疑之奪真人印仲文知釁已成不復敢言三十五年有民耿安者奏載土侖奪其女下按治有司因發其諸不法事獄成降為庶人錮高牆時載土侖居宮中所司防守嚴獄詞不得聞及帝遣內臣同撫按至始大懼登樓望龍亭後有紅板輿歎曰吾不能自明徒生奚為遂自縊死妃沈氏次妃林氏爭取帛自縊子安陽王翊錡萬善王翊鈁幷革爵及未封子女皆遷開封聽周王約束國除景皇帝一子懷獻太子見濟母杭妃始為郕王世子英宗北狩皇太后命立憲宗為皇太子而以郕王監國及郕王即位心欲以見濟代太子而難於發皇后汪氏又力以為不可遲回久之太監王誠舒良為帝謀先賜大學士陳循高穀百金侍郎江淵王一寧蕭鎡學士商輅半之用以緘其口然猶未發也會廣西土官都指揮使黃以私怨戕其弟思明知府滅其家所司聞於朝懼罪急遣千戶袁洪走京師上疏勸帝早與親信大臣密定大計易建東宮以一中外之心絕覬覦之望疏入景帝大喜亟下廷臣會議且令釋罪進階都督時景泰三年四月也疏下之明日禮部尚書胡濙侍郎薩琦鄒幹集文武羣臣廷議衆相顧莫敢發言惟都給事中李侃林聰御史朱英以為不可吏部尚書王直亦有難色司禮太監興安厲聲曰此事不可已即以為不可者勿署名無持兩端羣臣皆唯唯署議於是濙等暨魏國公徐承宗寧陽侯陳懋安遠侯柳溥武清侯石亨成安侯郭晟定西侯蔣琬駙馬都尉薛桓襄城伯李瑾武進伯朱瑛平鄉伯陳輔安鄉伯張寧都督孫鏜張軏楊俊都督同知田禮范廣過興衞穎都督僉事張輗劉深張通郭瑛劉鑑張義錦衣衞指揮同知畢旺曹敬指揮僉事林福吏部尚書王直戶部尚書文淵閣大學士陳循工部尚書東閣大學士高穀吏部尚書何文淵戶部尚書金濂兵部尚書于謙刑部尚書俞士悅左都御史王文王翺楊善吏部侍郎江淵俞山項文耀戶部侍郎劉中敷沈翼蕭鎡禮部侍郎王一寧兵部侍郎李賢刑部侍郎周瑄工部侍郎趙榮張敏通政使李錫通政欒惲王復參議馮貫諸寺卿蕭維禎許彬蔣守約齊整李賓少卿張固習嘉言李宗周蔚能陳誠黃士儁張翔齊政寺丞李茂李希安柴望酈鏞楊詢王溢翰林學士商輅六科都給事中李讚李侃李春蘇霖林聰張文質十三道御史王震朱英涂謙丁泰亨強弘劉琚陸厚原傑嚴樞沈義楊宜王驥左鼎上言陛下膺天明命中興邦家統緒之傳宜歸聖子黃奏是制曰可禮部具儀擇日以聞即日簡置東宮官公孤詹事僚屬悉備五月廢汪后立杭妃為皇后更封太子為沂王立見濟為太子詔曰天佑下民作之君實遺安於四海父有天下傳之子斯本固於萬年大赦天下令百官朔望朝太子賜諸親王公主邊鎮文武內外羣臣又加賜陳循高穀江淵王一寧蕭鎡商輅各黃金五十兩四年二月乙未太子冠十一月以御史張鵬言簡東宮師傅講讀官越四日太子薨諡曰懷獻葬西山天順元年降稱懷獻世子諸建議易儲者皆得罪憲宗十四子萬貴妃生皇第一子柏賢妃生悼恭太子祐極紀太后生孝宗邵太后生興獻帝祐杬岐王祐棆雍王祐橒張德妃生益王祐檳衡王祐楎汝王祐姚安妃生壽王祐榰楊恭妃生涇王祐橓申王祐楷潘端妃生榮王祐樞王敬妃生皇第十子第一子第十子皆未名殤悼恭太子祐極憲宗次子成化七年立為皇太子薨岐惠王祐棆憲宗第五子成化二十三年與益衡雍三王同日封弘治八年之藩德安十四年薨無子封除益端王祐檳憲宗第六子弘治八年之藩建昌故荊邸也性儉約巾服澣至再日一素食好書史愛民重士無所侵擾嘉靖十八年薨子莊王厚嗣性樸素外物無所嗜三十五年薨無子弟恭王厚炫嗣自奉益儉辭祿二千石萬曆五年薨孫宣王翊鈏嗣嗜結客厚炫所積府藏悉斥以招賓從通聘問於諸藩不數年頓盡三十一年薨子敬王常嗣四十三年薨子由本嗣國亡竄閩中衡恭王祐楎憲宗第七子弘治十二年之藩青州嘉靖十七年薨子莊王厚燆嗣嘗辭祿五千石以贍宗室宗人德之隆慶六年薨子康王載圭嗣萬曆七年薨無子弟安王載封嗣十四年薨子定王翊鑊嗣二十年薨子常嗣新樂王載壐恭王孫也博雅善文辭索諸藩所纂述得數十種梓而行之又撰洪武聖政頌皇明政要諸書多可傳者從父高唐王厚煐齊東王厚炳皆以博學篤行聞嘉靖中賜敕奬諭者再雍靖王祐橒憲宗第八子初封保寧弘治十二年之藩衡州地卑濕宮殿朽敗不可居邸中數有異乞移山東東平州廷臣以擇地別建勞民傷財四川州有申王故府宜徙居之詔可既而以道遠不可徙正德二年地裂宮室壞王薨無子封除壽定王祐榰憲宗第九子弘治四年與汝涇榮申四王同日封十一年就藩保寧正德元年以岐王世絕改就岐邸於德安校尉橫攖市民知府李重抑之奏逮重安陸民劉鵬隨重詣大理對簿重未之識也訝之鵬曰太守仁為民受過民皆得効死豈待識乎重卒得白祐榰聞而悔之後以賢聞嘉靖二十四年薨無子除封汝安王祐憲宗第十一子弘治十四年之藩衞輝正德十五年請預支食鹽十年為婚費詔別給長蘆鹽二千引食鹽如故世宗南巡迓於途甚恭加祿五百石錫金幣嘉靖二十年薨無子封除涇簡王祐橓憲宗第十二子弘治十五年之藩沂州嘉靖十六年薨子厚烇未封而卒無子封除榮莊王祐樞憲宗第十三子正德初尚留京邸乞霸州信安鎮田故牧地也部臣言永樂中設立草場蕃育馬匹以資武備至成化中近倖始陳乞為莊後岐壽二府相沿莫之改正暨孝宗皇帝留神戎務清理還屯不以私廢公也今榮王就國有期所請宜勿與三年之藩常德祐樞狀貌類高帝居國稍驕縱世宗詔以沅江酉港天心團坪河泊稅入王邸嘉靖十八年薨孫恭王載墐嗣萬曆二十三年薨子翊鉁嗣四十年薨子常溒嗣薨子憲王由枵嗣薨子慈炤嗣張獻忠入湖南奉母妃姚氏走辰溪不知所終申懿王祐楷憲宗第十四子封州未就藩弘治十六年薨無子封除孝宗二子武宗蔚王厚煒俱張皇后生蔚悼王厚煒孝宗次子生三歲薨追加封諡
