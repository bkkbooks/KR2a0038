東饑十五年湖廣大饑十七年北畿饑河南鄖陽襄陽三府饑二十年保定遼東饑二十一年順天永平饑二十四年又饑南畿亦饑二十五年順天饑江西亦饑二十七年鞏昌漢中大饑三十一年宣大二鎮大饑人相食三十二年南畿廬鳳淮揚山東河南陝西並饑三十三年順天及榆林饑三十六年遼東大饑人相食三十九年順天永平饑四十年兩畿山西饑四十三年北畿山東大饑四十四年順天饑四十五年淮徐饑隆慶元年蘇松二府大饑二年湖廣饑萬曆元年淮鳳二府饑民多為盜十年延安慶陽平涼臨洮鞏昌大饑十三年湖廣饑十五年七月黃河以北民食草木富平蒲城同官諸縣有以石為糧者十六年河南饑民相食蘇松湖三府饑二十二年河南大饑給事中楊明繪饑民圖以進巡按陳登雲進饑民所食雁糞帝覽之動容二十八年山東及河間饑二十九年兩畿饑阜平縣饑有食其稚子者蘇州饑民毆殺稅使七人三十七年山西饑四十年南畿洊饑鳳陽尤甚四十三年浙江饑四十四年山東饑甚人相食河南及淮徐亦饑四十五年北畿民食草木逃就食者相望於道山東屬邑多饑四十六年陝西饑四十八年湖廣大饑崇禎元年陝西饑延鞏民相聚為盜二年山西陝西饑五年淮揚諸府饑流殍載道六年陝西山西大饑淮揚洊饑有夫妻雉經於樹及投河者鹽城教官王明佐至自縊於官署七年京師饑御史龔廷獻繪饑民圖以進太原大饑人相食九年南陽大饑有母烹其女者江西亦饑十年浙江大饑父子兄弟夫妻相食十二年兩畿山東山西陝西江西饑河南大饑人相食盧氏嵩伊陽三縣尤甚十三年北畿山東河南陝西山西浙江三吳皆饑自淮而北至畿南樹皮食盡發瘞胔以食十四年南畿饑金壇民於延慶寺近山見人云此地深入尺餘其土可食如言取之淘磨為粉粥而食取者日衆又長山十里亦出土堪食其色青白類茯苓又石子澗土黃赤狀如猪肝俗呼觀音粉食之多腹痛隕墜卒枕藉以死是歲畿南山東洊饑德州斗米千錢父子相食行人斷絕大盜滋矣黃眚黃祥正統十一年二月辛酉有異氣現華蓋殿金頂及奉天殿鴟吻之上成化九年四月乙亥兩京雨土十三年四月戊戌陝西甘肅冰厚五尺間以雜沙有青紅黃黑四色弘治十年三月己酉雨土十一年四月辛巳雨土十七年二月甲辰鄖陽均州雨沙嘉靖元年正月丁卯雨黃沙十三年二月己未雨微土二十一年象山雨黃霧行人口耳皆塞隆慶元年三月甲寅南鄭雨土萬曆二十五年二月癸亥湖州雨黃沙四十六年三月庚午暮刻雨土濛濛如霧如霰入夜不止四十七年二月甲戌從未至酉塵沙漲天其色赤黃四十八年山東省城及泰安肥城皆雨土崇禎十二年二月壬申濬縣有黑黃雲起旋分為二頃之四塞狂風大作黃埃漲天間以青白氣五步之外不辨人踪至昏始定十四年正月壬寅黃埃漲天
