body:
  text: 明史卷三十志第六五行三金土洪範曰金曰從革金不從革則失其性矣前史多以暘詩妖毛蟲之孽犬禍金石之妖白眚白祥皆屬之金今從之暘洪武三年夏旱六月戊午朔步禱郊壇四年陝西河南山西及直隸常州臨濠北平河間永平旱五年夏山東旱七年夏北平旱二十三年山東旱二十六年大旱詔求直言永樂十三年鳳陽蘇州浙江湖廣旱十六年陝西旱宣德元年夏江西旱湖廣夏秋旱二年南畿湖廣山東山西陝西河南旱七年河南及大名夏秋旱八年南北畿河南山東山西自春徂夏不雨九年南畿湖廣江西浙江及真定濟南東昌兗州平陽重慶等府旱十年畿輔旱正統二年河南春旱順德兌州春夏旱平涼等六府秋旱三年南畿浙江湖廣江西九府旱四年直隸陝西河南及太原平陽春夏旱五年江西夏秋旱南畿湖廣四川府五州衞各一自六月不雨至於八月六年陝西旱南畿浙江湖廣江西府州縣十五春夏並旱七年南畿浙江湖廣江西府州縣衞二十餘大旱十年夏湖廣旱十一年湖廣及重慶等府夏秋旱十二年南畿及山西湖廣等府七夏旱十三年直隸陝西湖廣府州七夏秋旱十四年六月順天保定河間真定旱景泰元年畿輔山東河南旱二年陝西府四衞九旱三年江西旱四年南北畿河南及湖廣府三數月不雨五年山東河南旱六年南畿及山東山西河南陝西江西湖廣府三十三州衞十五皆旱七年湖廣浙江及南畿江西山西府十七旱天順元年夏兩京不雨杭州寧波金華均州亦旱三年南北畿浙江湖廣江西四川廣西貴州旱四年濟南青州登州肇慶桂林甘肅諸府衞夏旱五年南畿府四州一及錦衣等衞連月旱傷稼七年北畿旱濟南青州東昌衞輝自正月不雨至於四月成化三年湖廣江西及南京十一衞旱四年兩京春夏不雨湖廣江西旱六年直隸山東河南陝西四川府縣衞多旱八年京畿連月不雨運河水涸順德真定武昌俱旱九年彰德衞輝平陽旱十三年四月京師旱是歲真定河間長沙皆旱十五年京畿大旱順德鳳陽徐州濟南河南湖廣皆旱十八年兩京湖廣河南陝西府十五州二旱山西大旱十九年復旱二十年京畿山東湖廣陝西河南山西俱大旱二十二年六月陝西旱蟲鼠食苗稼凡九十五州縣八月北畿及江西三府旱九月溫台大旱長沙諸府亦旱弘治元年南畿河南四川及武昌諸府旱三年兩京陝西山東山西湖廣貴州及開封旱四年浙江府二廣西府八及陝西洮州衞旱六年北直山東河南山西及襄陽徐州旱七年福建四川山西陝西遼東旱八年京畿陝西山西湖廣江西大旱十年順天淮安太原平陽西安延安慶陽旱十一年河南山東廣西江西山西府十八旱十二年夏河南四府旱秋山東旱十三年慶陽太原平陽汾潞旱十四年遼東鎮春至秋不雨河溝盡涸十六年夏京師大旱蘇松常鎮夏秋旱十八年北京及應天四十二衞旱正德元年陝西三府旱二年貴州山西旱三年江南北旱四年旱自三月至七月陝西亦旱七年鳳陽蘇松常鎮平陽太原臨鞏旱八年畿輔及開封大同浙江六縣旱九年順天河間保定廬鳳淮揚旱十一年北畿及兗州西安大同旱十五年淮揚鳳陽州縣三十六及臨鞏甘州旱十六年兩京山東河南山西陝西自正月不雨至於六月嘉靖元年南畿江西浙江湖廣四川遼東旱二年兩京山東河南湖廣江西及嘉興大同成都俱旱赤地千里殍殣載道三年山東旱五年江左大旱六年北畿四府河南山西及鳳陽淮安俱旱七年北畿湖廣河南山東山西陝西大旱八年山西及臨洮鞏昌旱九年應天蘇松旱十年陝西山西大旱十一年湖廣陝西大旱十七年夏兩京山東陝西福建湖廣大旱十九年畿內旱二十年三月久旱親禱二十三年湖廣江西旱二十四年南北畿山東山西陝西浙江江西湖廣河南俱旱二十五年南畿江西旱二十九年北畿山西陝西旱三十三年兗州東昌淮安揚州徐州武昌旱三十四年陝西五府及太原旱三十五年夏山東旱三十七年大旱禾盡槁三十九年太原延安慶陽西安旱四十年保定等六府旱四十一年西安等六府旱隆慶二年浙江福建四川陝西及淮安鳳陽大旱四年夏旱詔諸司停刑六年夏不雨萬曆十一年八月庚戌朔河東鹽臣言解池旱涸鹽花不生十三年四月戊午因久旱步禱郊壇京師自去秋至此不雨河井並涸十四年三月乙巳以久旱命順天府祈禱十七年蘇松連歲大旱震澤為平陸浙江湖廣江西大旱十八年四月旱二十四年杭嘉湖三府旱二十六年四月旱二十七年夏旱二十九年畿輔山東山西河南及貴州黔東諸府衞旱三十八年夏久旱濟青登萊四府大旱三十九年夏京師大旱四十二年夏不雨四十三年三月不雨至於六月山東春夏大旱千里如焚四十四年陝西旱秋冬廣東大旱四十五年夏畿南亢旱四十七年廣西梧州旱赤地如焚泰昌元年遼東旱天啟元年久旱五年真順保河四府三伏不雨秋復旱七年四川大旱崇禎元年夏畿輔旱赤地千里三年三月旱擇日親禱五年杭嘉湖三府自八月至十月七旬不雨六年京師及江西旱十年夏京師及河東不雨江西大旱十一年兩京及山東山西陝西旱十二年畿南山東河南山西浙江旱十三年兩京及登青萊三府旱十四年兩京山東河南湖廣及宣大邊地旱十六年五月辛丑祈禱雨澤命臣工痛加修省詩妖太祖吳元年張士誠弟偽丞相士信及黃敬夫葉德新蔡彥文用事時有十七字謠曰丞相做事業專靠黃蔡葉一朝西風起乾鼈未幾蘇州平士信及三人者皆被誅此其應也建文初年有道士歌於途曰莫逐燕逐燕日高飛高飛上帝畿已忽不見是靖難之讖也正統二年京師旱街巷小兒為土龍禱雨拜而歌曰雨帝雨帝城隍土地雨若再來還我土地說者謂雨帝者與弟也帝弟同音城隍者郕王再來還土地者復辟也萬曆末年有道士歌於市曰委鬼當頭坐茄花遍地生北人讀客為楷茄又轉音為魏忠賢客氏之兆又成都東門外鎮江橋迴瀾塔萬曆中布政余一龍所修也張獻忠破蜀毀之穿地取磚得古碑上有篆書云修塔余一龍拆塔張獻忠歲逢甲乙丙此地血流紅妖運終川北毒氣播川東喙簫不用竹一箭貫當胸漢元興元年丞相諸葛孔明記本朝大兵西征獻忠被射而死時肅王為將又有謠曰鄴臺復鄴臺曹操再出來賊羅汝才自號曹操此其兆也毛蟲之孽弘治九年八月有黑熊自都城蓮池緣城上西直門官軍逐之下不能獲嚙死一人傷一人十一年六月有熊自西直門入城郎中何孟春曰當備盜亦宜慎火宋紹興間熊抵永嘉城州守高世則以熊字能火戒郡中慎火果延燒廬舍此其兆也是年城內多火災嘉靖五年七月南城縣有虎具人手足四十五年六月太醫院吏目李乾獻兔體備五色以為瑞兔犬禍嘉靖二十年民家生一犬八足四耳四目萬曆四十七年七月懷寧民家產一犬長五寸高四寸一頭二身八脚狀如人金異洪武十一年正月元旦甲戌早朝殿上金鐘始叩忽斷為二六月丁卯夜寧夏衞風雨兜鍪旗槊皆有火光十二年十二月甲子徐州衞譙樓銅壺自鳴乙丑復鳴是歲胡惟庸井中生石笋去之笋復旁出者三次年惟庸伏誅建文二年四月乙卯燕王營於蘇家橋兵端火光如毬上下相擊金鐵錚錚弓絃自鳴成化十三年六月壬子雨錢於京師正德四年三月甲寅蓋州衞城樓鐘自鳴者三七年文登秦始皇廟鐘鼓自鳴成山衞如之嘉靖六年五月甲午京師雨錢隆慶六年七月七日有物轟轟飛至直隸華亭海濱墜於地乃鐘也鑄時年月具在識者謂其來自閩云萬曆二十一年十月甲申山東督撫令旗及刀鎗頭皆火出且有聲二十六年五月庚寅古浪城樓大鐘自鳴者三天啟六年五月丁未京城石獅擲出城外銀錢器冊飄至昌平閱武場中崇禎六年五月癸巳有鐵斧飛落霍山縣八年十二月辛巳夜四鼓山東鎮南城樓大礮鳴如鐘至黎明大吼一聲及止十三年三月丙申蘄州城隍廟古鐘自鳴白眚白祥洪熙元年六月庚戌中天有白氣東西竟天宣德元年六月癸未夜有蒼白氣東西竟天八月庚辰東南有白氣狀如羣羊驚走既滅有黑氣如死蛇頃之分為二弘治五年十二月辛亥夜東方有白氣南北亙天去地五丈正德元年三月戊申夜太原空中見紅光如彎弓長六七尺旋變黃又變白漸長至二十餘丈光芒亙天嘉靖七年十二月望白氣亙天津洪範曰土爰稼穡稼穡不成則土失其性矣前史多以風風霾晦冥花妖蟲孽牛禍地震山頹雨毛地生毛年饑黃眚黃祥皆屬之土今從之風宣德六年六月溫州颶風大作壞公廨祠廟倉庫城垣正統四年七月蘇松常鎮四府大風拔木殺稼天順二年二月暴風拔孝陵松樹懿文陵殿獸脊梁柱多摧三年四月順天河間真定保定廣平濟南連日烈風麥苗盡敗成化十四年八月丁未南京大風拔太廟樹十五年八月辛卯大風拔孝陵木二十一年五月南京大風拔太廟樹摧大祀殿及皇城各門獸吻弘治三年六月壬午朔陝西靖虜衞大風天地昏暗變為紅光如火久之乃息七年三月己亥廣寧諸衞狂風瀋陽錦州城仆百餘丈正德元年六月辛酉暴風折郊壇松柏壞大祀殿齋宮獸瓦二年閏正月癸亥盧龍遷安大風拔樹毀屋乙丑大風壞奉天門右吻三年二月己丑大同暴風屋瓦飛動三日而止九年二月丁巳長樂大雨雹狂風震電屋瓦皆飛五月戊辰曲阜暴風毀宣聖廟獸吻十二年四月丙辰來賓大風雨雹毀官民廬舍屋瓦皆飛十一月癸巳南京大風雪仆孝陵殿前樹及圍牆內外松柏十二月己酉大理衞大風壞城樓十三年三月甲寅慶符大風雹壞學宮十六年十二月辛卯甘肅行都司狂風壞官民廬舍樹木無算嘉靖元年七月己巳南京暴風雨郊社陵寢宮闕城垣獸吻脊欄皆壞拔樹萬餘株五年陝西屢發大風捲掣廟宇民居百數十家了無蹤跡萬曆十八年三月甲辰大名狂風天色乍黑乍赤二十六年十月癸亥嘉峰路臺西北樓內旋風大作黑氣冲天樓內有火光三十四年七月丙戌大風拔朝日壇樹四十一年八月乙未青州大風拔樹傾城屋天啟元年三月辛亥大風揚塵四塞四年五月癸亥乾清宮東丹墀旋風驟作內官監鐵片大如屋頂者盤旋空中隕於西墀鏗訇若雷八月戊戌薊州寒風殺人崇禎十四年五月南陽大風拔屋七月乙亥福州大風壞官署民舍十五年五月保定廣平諸縣怪風麥禾俱傷十六年正月丁酉大風五鳳樓前門閂風斷三截建極殿榱桷俱折風霾晦冥建文元年七月癸酉燕王起兵風雲四起咫尺不辨人少焉東方露青天尺許有火燭地洞徹上下天順八年二月壬子風霾晝晦成化六年二月丁丑開封晝晦如夜黃霾蔽天三月辛巳雨霾晝晦九年三月癸未濟南諸府狂風晝晦咫尺莫辨二十一年三月戊子大名風霾自辰迄申紅黃滿空俄黑如夜已而雨沙數日乃止京師自正月至三月風霾不雨弘治二年二月辛亥開封晝晦如夜三月黃塵四寒風霾蔽天者累日四年八月乙卯南京晦冥七年三月己亥廣寧諸衞晝晦正德五年三月甲子大風霾天色晦冥者數日十六年十一月辛酉甘肅行都司黑風晝晦翌日方散嘉靖元年九月己巳大風霾晝晦八年正月戊戌朔風霾晦如夕二十六年七月乙丑甘州五衞風霾晝晦色赤復黃二十八年三月丙申風霾四塞日色慘白凡五日三十年正月辛卯大風揚塵蔽天晝晦四十年二月己酉亦如之四月癸巳大風雨黃土晝晦四十三年三月望異風作赤黃霾至二十一日乃止隆慶二年正月元旦大風揚沙走石白晝晦冥自北畿抵江浙皆同萬曆十七年正月乙丑蓋州衞風霾晝晦壞廨宇廬舍二十五年二月戊寅京師風霾二十九年四月連日風霾三十八年四月戊戌崇陽風霾晝晦至夜轉烈損官民屋木無算四十八年八月以前雲南諸府時晝晦天啟元年四月乙亥午寧夏洪廣堡風霾大作墜灰片如瓜子紛紛不絕踰時而止日將沈作紅黃色外如炊烟圍罩畝許日光所射如火焰夜分乃沒四年二月辛丑風霾晝晦塵沙蔽天連日不止崇禎元年正月癸亥永年縣晝晦咫尺不辨人物七年三月戊子黃州晝晦如夜十三年閏正月丙申南京日色晦曚風霾大作細灰從空下五步外不見一物後四年三月丙申風霾晝晦花孽弘治十六年九月安陸桃李華正德元年九月宛平棗林莊李花盛開其冬永嘉花盡放六年八月霸州桃李華蟲孽景泰五年三月畿南五府有蟲食桑春蠶不育弘治六年八月己巳臨晉雨蟲如雪七年三月廣寧諸衞有黑蟲墮地大如蠅久之入於土牛禍正德十二年徐州牛產犢一頭二舌兩尾八足嘉靖五年七月南陽牛產犢一首兩身六年十一月漳浦有牛產犢三目三角十一年二月銅仁黃牸產犢滿身有紋即死十二年山東平山衞牛犢有紋前兩足及尾悉具鱗甲中皆毳毛萬曆十三年九月光山牛產一物火光滿地鱗甲森然一夕斃三十七年五月歷城高苑二縣牛各產犢雙頭三眼兩鼻二口三十八年三月獲嘉牛產犢一身兩頭四眼四耳兩口兩足一尾三十九年二月汲縣牛產犢一膊兩頭兩口四眼兩耳七蹄四月降夷部牛產犢人頭羊耳四十五年八月開州牛產犢兩口三眼天啟元年十月會寧牛產異獸徧體鱗甲有火光三年十月沅陵牸生犢一身兩頭三尾七年三月莒州牛產犢如麟崇禎十三年襄陽牛產犢兩頭二目地震洪武四年正月己丑鞏昌臨洮慶陽地震五年四月戊戌梧州府蒼梧賀州恭城立山等處地震六月癸卯太原府陽曲縣地震七月辛亥又震壬戌京師風雨地震八月癸未太原府徐溝縣西北空中有聲如雷地震凡三日戊戌陽曲縣地又震九月壬戌又震者再十月戊寅辛卯復震是年陽曲地凡七震自六年至十四年復八震八年七月戊辰京師地震十二月戊子又震十一年四月乙巳寧夏地震壞城垣十三年十二月甲戌福州府廣州府河州地震十九年六月辛丑雲南地震十一月己卯復震有聲二十三年正月庚辰山東地震建文元年三月甲午京師地震求直言永樂元年十一月甲午北京地震山西寧夏亦震二年十一月癸丑京師濟南開封並震有聲六年五月壬戌十一年八月甲子京師復震十三年九月壬戌十四年九月癸卯京師地震十八年六月丙午北京地震二十二年六月壬申南京地震洪熙元年二月戊午六安衞地震凡七日是歲南京地震凡四十有二宣德元年七月癸巳京師地震有聲自東南迄西北是歲南京地震者九二年春復震者十三年復屢震四年兩京地震五年正月壬子南京地震辛酉又震正統三年三月己亥京師地震庚子又震甲辰又震者再四年六月乙未復震八月己亥又震五年十月庚午朔蘭州莊浪地震十日十月十一月屢震壞城堡廬舍壓死人畜十年二月丁巳京師地震景泰二年七月癸丑京師地震三年七月永新珠坑村地陷十七所是年南京地震五年十月庚子京師地震有聲起西北迄東南六年二月甲午安福大雷雨白泉陂羊塘地陷二一深三丈廣十餘丈一深六尺廣一丈有奇天順元年十月乙巳南京地震成化元年四月甲申鈞州地震二十三日乃止三年四川地震凡三百七十五五月壬申宣府大同地震有聲威遠朔州亦震壞墩臺牆垣壓傷人四年八月癸巳京師地震有聲十二月戊戌湖廣地震五年十二月丙辰汝寧武昌漢陽岳州同日地震六年正月丁亥河南地震是年湖廣亦震十年四月壬午鶴慶地震山月己巳自寅至申復十五震壞廨舍民居傷人畜十月丁酉靈州大沙井驛地震有聲如雷自後晝夜屢震至十一月甲寅一日十一震城堞房屋多圮十二年正月辛亥南京地震十月辛巳京師地震十三年正月己巳鳳陽臨淮地震有聲閏二月癸卯臨洮鞏昌地震十月辛有頹者四月戊戌甘肅地裂又震有聲榆林涼州亦震寧夏大震聲如雷城垣崩壞者八十三處甘州鞏昌榆林涼州及沂州郯城滕費嶧等縣同日俱震九月甲戌京師地三震十四年六月廣西太平府地震至八月乙巳凡七震七月四川鹽井衞地連震廨宇傾覆人畜多死十六年八月丁巳四川越巂衞一日七震越數日連震十七年二月甲寅南京鳳陽廬州淮安揚州和州兗州及河南州縣同日地震五月戊戌直隸薊州遵化縣地震六月甲辰又震日三次永平府及遼東寧遠衞亦三震二十年正月庚寅京師及永平宣府遼東皆震宣府地裂湧沙出水天壽山密雲古北口居庸關城垣墩堡多摧人有壓死者五月甲寅代州地七震九月辛巳費縣地陷深二尺縱橫三丈許二十一年二月壬申泰安地震三月壬午朔復震聲如雷泰山動搖後四日復微震癸巳乙未庚子連震閏四月癸未鞏昌府固原衞及蘭河洮岷四州地俱震有聲癸巳蘇州遵化縣地震有聲越數日復連震城垣民居有頹仆者五月壬戌京師地再震九月丙辰廉州梧州地震有聲連震者十六日十一月丙寅京師地震二十二年六月壬辰漢中府及寧羌衞地裂或十餘丈或六七丈寶雞縣裂三里𤁐丈餘九月辛亥成都地日七八震俱有聲次日復震弘治元年八月壬寅漢茂二州地震仆黃頭等寨碉房三十七戶人口有壓死者戊申宣府葛峪堡地陷深三尺長百五十步濶一丈沙河中湧疄高一尺長七十步十二月辛卯四川地震連三日二年五月庚申成都地震連三日有聲三年十二月己未京師地再震四年六月辛亥復三震八月乙卯南京地震屋宇皆搖淮揚二府同日震六年三月寧夏地震連三年共二十震四月甲辰開封衞輝東昌兗州同日地震有聲七年二月丁丑曲靖地震壞房屋壓死軍民是歲兩京並六震八年三月己亥寧夏地震十二次聲如雷傾倒邊牆墩臺房屋壓傷人九月甲午至辛丑安南衞地十二震十月壬戌至甲子海州九震是歲南京地再震九年兩京地震者各二次十年正月戊午京師山西地震六月乙亥海豐地震聲如雷數日乃止是歲真定寧夏榆林鎮番靈州太原皆震屯留尤甚如舟將覆屋瓦皆落十一年六月丙子桂林地有聲若雷旋陷九處大者圍十七丈小者七丈或三丈十三年七月己巳京師地震十月戊申兩京鳳陽同時地震十四年正月庚戌朔延安慶陽二府同華諸州咸陽長安諸縣潼關諸衞連日地震有聲如雷朝邑尤甚頻震十七日城垣民舍多摧壓死人畜甚衆縣東地坼水溢成河自夏至冬復七震是日陝州永寧盧氏二縣平陽府安邑榮河二縣俱震有聲蒲州自是日至戊午連震丁丑福興泉漳四府地俱震二月乙未蒲州地又震至三月癸亥凡二十九震八月癸丑四川可渡河巡檢司地裂而陷湧泉數十派衝壞橋梁莊舍壓死人畜甚衆癸酉貴州地三震十月辛酉南京地震十五年九月丙戌南京徐州大名順德濟南東昌兗州同日地震壞城垣民舍濮州尤甚地裂湧水壓死百餘人是日開封彰德平陽澤潞亦震十月甲子山西應朔代三州山陰馬邑陽曲等縣地俱震聲如雷丁卯南京地震十六年二月庚申南京地震十八年六月癸亥寧夏地震聲如雷城傾圮九月癸巳杭嘉紹寧四府地震有聲甲午南京及蘇松常鎮淮揚寧七府通和二州同日地震辛丑蒲解二州絳夏平陸榮河聞喜芮城猗氏七縣地俱震有聲而安邑萬全尤甚民有壓死者正德元年二月癸酉至乙亥郃陽地震者十餘有聲如雷四月癸丑雲南府連日再震木密關地震如雷凡五壞城垣屋舍壓傷人八月丁巳萊州府鰲山衞地震聲如雷城𣛀壞以後屢震萊州自九月至十二月地震四十五俱有聲如雷二年九月庚午震南府安州新興州三日連震搖撼民居人有死者四年三月甲寅廣寧大興堡地陷長四尺寬三尺深四丈餘五月己亥夜武昌見碧光如電者六有聲如雷已而地震六年四月乙未楚雄地三日五震至明年五月又連震十三日十月甲辰大理府鄧川州劍川州洱海衞地震鶴慶劍川尤甚壞城垣房廨人有壓死者十一月戊午京師地震保定河間二府及八縣三衞山東武定州同日皆震霸州連三日十九震七年五月壬子楚雄府自是日至甲子地連震聲如雷八月己巳騰衝衞地震兩日壞城樓官民廨宇赤水湧出田禾盡沒死傷甚衆八年十二月戊戌成都重慶二府潼川邛二州地俱震九年六月甲辰鳳陽府地震有聲八月乙巳京師大震十月壬辰州府太原府代平榆次等十州縣大同府應州山陰馬邑二縣俱地震有聲十年五月壬辰雲南趙州永寧衞地震踰月不止有一日二三十震者黑氣如霧地裂水湧壞城垣官廨民居不可勝計死者數千人傷倍之八月丁丑大理府地震至九月乙未復大震四日十一年八月戊辰南京地震武昌府亦震十二月己未楚雄大理二府蒙化景東二衞俱震十二年四月甲子撫州府及餘干豐城二縣泉州府俱地震浙江金鄉衞自是日至七月己丑凡十有五震六月戊辰雲南新興州及通海河西諸縣地震壞城樓房屋民有壓死者九月己卯濟青登萊四府地震是歲泉州二月至六月金華二月至七月皆數震十三年六月己巳大理府及趙鄧川二州浪穹縣地震是日蒙化府亦震十月甲午十一月癸卯又震十四年二月丁丑京師地震九月丙午昌平州宣府開平等衞亦震丙辰福興泉三府地震十五年三月丙申安寧姚安賓州蒙化鶴慶俱地震蒙化震二日仆城垣廬舍民有壓死者八月辛酉景東衞地震聲如雷搖仆城牆廨宇地多拆裂乙丑濟南東昌開封地震嘉靖二年正月南京鳳陽山東河南陝西地震七月壬申浙江定海諸衞地震城堞盡毀三年正月丙寅朔兩畿河南山東陝西同時地震二月辛亥蘇常鎮三府地震是年南京震者再四年八月癸卯徐州鳳陽一衞三州縣及懷慶開封二府俱地震聲如雷九月壬申鳳陽徐州及開封二縣復震五年四月癸亥永昌騰衝騰越同日地震貴州安南衞地震聲如雷壞城垣壬申復震六年十月戊辰京師地震十二年八月丁酉京師地震十五年十月庚寅京師地震順天永平保定萬全都司各衞所俱震聲如雷十六年九月癸酉雲南地震十八年七月庚寅楚雄臨安廣西地震十九年四月庚午洮州甘肅俱震二十一年九月甲戌平陽固原寧夏洮州同日地震有聲十一月丁巳鞏昌固原西安鳳翔地震二十二年三月乙巳太原地震有聲凡十日明年三月復如之四月庚辰福興泉漳四府地震二十三年三月朔太原地震有聲者十日二十七年七月戊寅京師地震順天保定二府俱震八月癸丑京師復震登州府及廣寧衞亦震三十年九月乙未京師地震有聲三十一年二月癸亥鳳陽府地震有聲三月丙戌山西地震有聲三十四年十二月壬寅山西陝西河南同時地震聲如雷渭南華州朝邑三原蒲州等處尤甚或地裂泉湧中有魚物或城郭房屋陷入地中或平地突成山阜或一日數震或累日震不止河渭大泛華嶽終南山鳴河清數日官吏軍民壓死八十三萬有奇三十七年正月庚申陝西地震三月丁丑昌平州地震五月丁卯蒲州地連震三日聲如雷六月甲申又震十月丙午華州地震聲如雷至壬子又震戊午復大震傾陷廬舍甚多三十八年七月辛巳南京地震有聲三十九年四月嘉興湖州地震屋廬搖動如帆河水撞激魚皆躍起四十年二月戊戌甘肅山丹衞地震有聲壞城堡廬舍六月壬申太原大同榆林地震寧夏固原尤甚城垣墩臺府屋皆摧地湧黑黃沙水壓死軍民無算壞廣武紅寺等城四十一年正月丙申京師地震是歲寧夏地震圮邊牆四十五年正月癸巳福建福興泉三府同日地震隆