body:
  text: 明史卷四十八志第二十四禮二吉禮二郊祀郊祀配位郊祀儀注祈穀大雩大饗令節拜天郊祀之制洪武元年中書省臣李善長等奉敕撰進郊祀議略言王者事天明事地察故冬至報天夏至報地所以順陰陽之義也祭天於南郊之圜丘祭地於北郊之方澤所以順陰陽之位也周禮大司樂冬日至禮天神夏日至禮地祇禮曰享帝於郊祀社於國又曰郊所以明天道社所以明地道書曰敢昭告於皇天后土按古者或曰地祇或曰后土或曰社皆祭地則皆對天而言也此三代之正禮而釋經之正說自秦立四畤以祀白青黃赤四帝漢高祖復增北畤兼祀黑帝至武帝有雍五畤及渭陽五帝甘泉太乙之祠而昊天上帝之祭則未嘗舉行魏晉以後宗鄭玄者以為天有六名歲凡九祭宗王肅者以為天體惟一安得有六一歲二祭安得有九雖因革不同大抵多參二家之說自漢武用祠官寬舒議立后土祠於汾陰脽上禮如祀天而後世因於北郊之外仍祠后土又鄭玄惑於緯書謂夏至於方丘之上祭崑崙之祇七月於泰折之壇祭神州之祇析而為二後世又因之一歲二祭元始間王莽奏罷甘泉泰畤復長安南北郊以正月上辛若丁天子親合祀天地於南郊由漢歷唐千餘年間皆因之合祭其親祀北郊者惟魏文帝周武帝隋高祖唐玄宗四帝而已宋元豐中議罷合祭紹聖政和間或分或合高宗南渡以後惟用合祭之禮元成宗始合祭天地五方帝已而立南郊專祀天泰定中又合祭文宗至順以後惟祀昊天上帝今當遵古制分祭天地於南北郊冬至則祀昊天上帝於圜丘以大明夜明星辰太歲從祀夏至則祀皇地祇於方丘以五嶽五鎮四海四瀆從祀太祖如其議行之建圜丘於鍾山之陽方丘於鍾山之陰三年增祀風雲雷雨於圜丘天下山川之神於方丘七年增設天下神祇壇於南北郊九年定郊社之禮雖有三年喪不廢十年秋太祖感齋居陰雨覽京房災異之說謂分祭天地情有未安命作大祀殿於南郊是歲冬至以殿工未成乃合祀於奉天殿而親製祝文意謂人君事天地猶父母不宜異處遂定每歲合祀於孟春為永制十二年正月始合祀於大祀殿太祖親作大祀文幷歌九章永樂十八京都大祀殿成規制如南京南京舊郊壇國有大事則遣官告祭嘉靖九年世宗既定明倫大典益覃思制作之事郊廟百神咸欲斟酌古法釐正舊章乃問大學士張璁書稱燔柴祭天又曰類於上帝孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝以形體主宰之異言也朱子謂祭之於壇謂之天祭之屋下謂之帝今大祀有殿是屋下之祭帝耳未見有祭天之禮也況上帝皇地祇合祭一處亦非專祭上帝璁言國初遵古禮分祭天地後又合祀說者謂大祀殿下壇上屋屋即明堂壇即圜丘列聖相承亦孔子從周之意帝復諭璁二至分祀萬代不易之禮今大祀殿擬周明堂或近矣以為即圜丘實無謂也璁乃備述周禮及宋陳襄蘇軾劉安世程頤所議分合異同以對且言祖制已定無敢輕議帝銳欲定郊制卜之奉先殿太祖前不吉乃問大學士翟鑾鑾具述因革以對復問禮部尚書李時時請少需日月博選儒臣議復古制帝復卜之太祖不吉議且寢會給事中夏言請舉親蠶禮帝以古者天子親耕南郊皇后親蠶北郊適與所議郊祀相表𩹉因令璁諭言陳郊議言乃上疏言國家合祀天地及太祖太宗之並配諸壇之從祀舉行不於長至而於孟春俱不應古典宜令羣臣博考詩書禮經所載郊祀之文及漢宋諸儒匡衡劉安世朱熹等之定論以及太祖國初分祀之舊制陛下稱制而裁定之此中興大業也禮科給事中王汝梅等詆言說非是帝切責之乃敕禮部令羣臣各陳所見且言汝梅等舉召誥中郊用二牛謂明言合祭天地夫用二牛者一帝一配位非天地各一牛也又或謂天地合祀乃人子事父母之道擬之夫婦同牢此等言論褻慢已甚又或謂郊為祀天社稷為祭地古無北郊夫社乃祭五土之祇猶言五方帝耳非皇地祇也社之名不同自天子以下皆得隨所在而祭之故禮有親地之說非謂祭社即方澤祭地也璁因錄上郊祀考議一冊時詹事霍韜深非郊議且言分祀之說惟見周禮莽賊偽書不足引據於是言復上疏言周禮一書於祭祀為詳大宗伯以祀天神則有禋祀實柴槱燎之禮以祀地祇則有血祭薶沈辜之禮大司樂冬至日地上圜丘之制則曰禮天神夏至日澤中方丘之制則曰禮地祇天地分祀從來久矣故宋儒葉時之言曰郊丘分合之說當以周禮為定今議者既以大社為祭地則南郊自不當祭皇地祇何又以分祭為不可也合祭之說實自莽始漢之前皆主分祭而漢之後亦間有之宋元豐一議元祐再議紹聖三議皆主合祭而卒不可移者以郊賚之費每傾府藏故省約安簡便耳亦未嘗以分祭為非禮也今之議者往往以太祖制為嫌為懼然知合祭乃太祖之定制為不可改而不知分祭固太祖之初制為可復知大祀文乃太祖之明訓為不可背而不知存心錄固太祖之著典為可遵且皆太祖之制也從其禮之是者而已敬天法祖無二道也周禮一書朱子以為周公輔導成王垂法後世用意最深切何可誣以莽之偽為耶且合祭以后配地實自莽始莽既偽為是書何不削去圜丘方丘之制天神地祇之祭而自為一說耶於是禮部集上羣臣所議郊禮奏曰主分祭者都御史汪鋐等八十二人主分祭而以慎重成憲及時未可為言者大學士張璁等八十四人主分祭而以山川壇為方丘者尚書李瓚等二十六人主合祭而不以分祭為非者尚書方獻夫等二百六人無可否者英國公張崙等一百九十八人臣等祇奉敕諭折衷眾論分祀之義合於古禮但壇壝一建工役浩繁禮屋祭曰帝夫既稱昊天上帝則當屋祭宜仍於大祀殿專祀上帝改山川壇為地壇以專祀皇地祇既無創建之勞行禮亦便帝復諭當遵皇祖舊制露祭於壇分南北郊以二至日行事言乃奏曰南郊合祀循襲已久朱子所謂千五六百年無人整理而陛下獨破千古之謬一旦舉行誠可謂建諸天地而不悖者也已而命戶禮工三部偕言等詣南郊相擇南天門外有自然之丘咸謂舊丘地位偏東不宜襲用禮臣欲於具服殿少南為圜丘言復奏曰圜丘祀天宜即高敞以展對越之敬大祀殿享帝宜即清閟以盡昭事之誠二祭時義不同則壇殿相去亦宜有所區別乞於具服殿稍南為大祀殿而圜丘更移於前體勢峻極可與大祀殿等制曰可於是作圜丘是年十月工成明年夏北郊及東西郊亦以次告成而分祀之制遂定萬曆三年大學士張居正等輯郊祀新舊圖考進呈舊禮者太祖所定新禮者世宗所定也郊祀配位洪武元年始有事於南郊有司議配祀太祖謙讓不許親為文告太廟曰歷代有天下者皆以祖配天臣獨不敢者以臣功業有未就政治有闕失去年上天垂戒有聲東南雷火焚舟擊殿吻早暮兢惕恐無以承上帝好生之德故不敢輒奉以配惟祖神與天通上帝有問願以臣所行奏帝前善惡無隱候南郊竣事臣率百司恭詣廟廷告成大禮以共享上帝之錫福明年夏至將祀方丘羣臣復請太祖執不允固請乃曰俟慶陽平議之八月慶陽平十一月冬至羣臣復固請乃奉皇考仁祖淳皇帝配天於圜丘明年祀方丘亦如之建文元年改奉太祖配洪熙改元敕曰太祖受命上天肇興皇業太宗中興宗社再奠寰區聖德神功咸配天地易曰殷薦上帝以配祖考朕崇敬祖考永惟一心正月十五日大祀天地神祇奉皇祖皇考以配遂於郊祀前告太廟及几筵請太祖太宗並配嘉靖九年給事中夏言上疏言太祖太宗並配父子同列稽之經旨未能無疑臣謂周人郊祀后稷以配天太祖足當之宗祀文王於明堂以配上帝太宗足當之禮臣集議以為二祖配享百有餘年不宜一旦輕改帝降敕諭欲於二至日奉太祖配南北郊歲首奉太宗配上帝於大祀殿於是大學士張璁翟鑾等言二祖分配於義未協且錄仁宗所撰敕諭並告廟文以進帝復命集議於東閣皆以為太廟之祀列聖昭穆相向無嫌並列況太祖太宗功德並隆圜丘大祀殿所祀均之為天則配天之祖不宜闕一臣等竊議南北郊及大祀殿每祭皆宜二祖並配帝終以並配非禮諭閣臣講求璁等言禮曰有其舉之莫敢廢也凡祭盡然況祖宗配享大典且古者郊與明堂異地故可分配今圜丘大祀殿同兆南郊冬至禮行於報而太宗不與孟春禮行於祈而太祖不與心實有所不安帝復報曰萬物本乎天人本乎祖天惟一天祖亦惟一祖故大報天之祀止當以高皇帝配文皇帝功德豈不可配天但開天立極本高皇帝肇之耳如周之王業武王實成之而配天止以后稷配上帝止以文王當時未聞爭辨功德也因命寢其議已而夏言復疏言虞夏殷周之郊惟配一祖後儒穿鑿分郊丘為二及誤解大易配考孝經嚴父之義以致唐宋變古乃有二祖並侑三帝並配之事望斷自宸衷依前敕旨帝報曰禮臣前引太廟不嫌一堂夫祀帝與享先不同此說無當仍命申議於是禮臣復上議南北郊雖曰祖制實今日新創請如聖諭俱奉太祖獨配至大祀殿則太祖所創今乃不得侑享於中恐太宗未安宜仍奉二祖並配遂依擬行之郊祀儀注洪武元年冬至祀昊天上帝於圜丘先期皇帝散齋四日致齋三日前祀二日皇帝服通天冠絳紗袍省牲器次日有司陳設祭之日清晨車駕至大次太常卿奏中嚴皇帝服袞冕奏外辦皇帝入就位贊禮唱迎神協律郎舉麾奏中和之曲贊禮唱燔柴郊社令升煙燔全犢於燎壇贊禮唱請行禮太常卿奏有司謹具請行事皇帝再拜皇太子及在位官皆再拜贊禮唱奠玉帛皇帝詣盥洗位太常卿贊曰前期齋戒今辰奉祭加其清潔以對神明皇帝搢圭盥手帨手出圭升壇太常卿贊曰神明在上整肅威儀升自午陛協律郎舉麾奏肅和之曲皇帝詣昊天上帝神位前跪搢圭三上香奠玉帛出圭再拜復位贊禮唱進俎協律郎舉麾奏凝和之曲皇帝詣神位前搢圭奠俎出圭復位贊禮唱行初獻禮皇帝詣爵洗位搢圭滌爵拭爵以爵授執事者出圭詣酒尊所搢圭執爵受泛齊以爵授執事者出圭協律郎舉麾奏壽和之曲武功之舞皇帝詣神位前跪搢圭上香祭酒奠爵出圭讀祝官捧祝跪讀訖皇帝俯伏興再拜復位亞獻酌醴齊樂奏豫和之曲文德之舞終獻酌盎齊樂奏熙和之曲文德之舞儀並同初獻但不用祝贊禮唱飲福受胙皇帝升壇至飲福位再拜跪搢圭奉爵官酌福酒跪進太常卿贊曰惟此酒殽神之所與賜以福慶億兆同霑皇帝受爵祭酒飲福酒以爵置於坫奉胙官奉胙跪進皇帝受胙以授執事者出圭俯伏興再拜復位皇太子以下在位官皆再拜贊禮唱徹豆協律郎舉麾奏雍和之曲掌祭官徹豆贊禮唱送神協律郎舉麾奏安和之曲皇帝再拜皇太子以下在位官皆再拜贊禮唱讀祝官奉祝奉幣官奉幣掌祭官取饌及爵酒各詣燎所唱望燎皇帝至望燎位半燎太常卿奏禮畢皇帝還大次解嚴二年夏至祀皇地祇於方丘其儀並同惟迎神後瘞毛血祭畢牲帛祝饌而埋之與郊天異其冬奉仁祖配天於南郊儀同元年其奠玉帛進俎三獻皆先詣上帝前次詣仁祖神位前行禮亦如之惟不用玉四年定先祭六日百官沐浴宿官署翼日朝服詣奉天殿丹墀受誓戒丞相以祀期徧告百神復詣各祠廟行香三日次日駕詣仁祖廟告請配享禮畢還齋宮七年去中嚴外辦及贊唱上香之縟節定十二拜禮十年改合祀之制奠玉帛進俎三獻俱先詣上帝神位前次皇地祇次仁祖餘悉仍舊儀嘉靖八年罷各廟焚香禮九年復分祀之制禮部上大祀圜丘儀注前期十日太常寺題請視牲次請命大臣三員看牲四員分獻前期五日錦衣衞備隨朝駕帝詣犧牲所視牲其前一日常服告於廟前期四日御奉天殿太常寺進銅人如常儀太常博士請太祖祝版於文華殿候帝親填御名捧出前期三日帝具祭服以脯醢酒果詣太廟請太祖配帝還易服御奉天殿百官朝服受誓戒前期二日太常光祿卿奏省牲帝至奉天殿親填祝版前期一日免朝錦衣衞備法駕設版輿於奉天門常服告廟乘輿詣南郊由西天門入至昭亨門外降輿禮部太常官導由左門入至內壝太常卿導至圜丘恭視壇位次至神庫視籩豆至神廚視牲畢仍由左門出升輿至齋宮分獻陪祀官叩首禮部太常官詣皇穹宇請皇天上帝神版太祖神主從祀神牌奉安壇座祭之日三鼓帝自齋宮乘輿至外壝神路之西降輿至神路東大次禮部太常寺捧神位官復命訖退百官分列神路東西以候帝具祭服出導引官導由左靈星門入內贊對引官導行至內壝典儀唱樂舞生就位執事官各司其事帝至御拜位自燔柴迎神至禮畢其儀悉如舊至大次易服禮部太常官奉神位安於皇穹宇還齋宮少駕還詣廟參拜畢回宮詔如擬明年定方澤儀先期一日太常卿請太祖配位奉安皇祇室至期禮部太常官同請皇地祇神版太祖神主從祀神牌奉安壇座祀畢太常奉神版神牌安皇祇室奉神主還廟寢餘皆如圜丘儀是年十月帝將郊祀諭禮部尚書夏言欲親行奉安禮言乃擬儀注以聞先期擇捧主執事官十一員分獻配殿大臣二員撰祝文備脯醢酒果制帛香燭前一日行告廟禮設神輿香案於奉天殿神案二於泰神殿神案二於東西配殿香案一於丹墀正中設大次於圜丘左門外是日質明帝常服詣奉天殿行一拜三叩頭禮執事官先後捧昊天上帝太祖高皇帝及從祀神主各奉安輿中至圜丘泰神殿門外帝乘輅至昭亨門禮官導至泰神殿丹墀執事官就神輿捧神主升石座奉安於龕中帝乃詣香案前行三獻禮如儀禮畢出至大次升座百官行一拜三叩頭禮畢還宮帝從之而命行禮用祭服導引用太常寺官一員合禮部堂上官四員十一年冬至尚書言前此有事南郊風寒莫備乃采禮書天子祀天張大次小次之說請作黃氈御幄為小次每大祭所司以隨值風雪則設於圜丘下帝就幄中對越而陟降奠獻以太常執事官代之命著為令祈穀明初未嘗行世宗時更定二祖分配禮因諸臣固請乃許於大祀殿祈穀奉二祖配嘉靖十年始以孟春上辛日行祈穀禮於大祀殿禮畢帝心終以為未當諭張璁曰自古惟以祖配天今二祖並配決不可法後世嗣後大報與祈穀但奉太祖配尋親製祝文更定儀注改用驚蟄節禮視大祀少殺帛減十一不設從壇不燔柴著為定式十一年驚蟄節帝疾不能親乃命武定侯郭勛代給事中葉洪言祈穀大報祀名不同郊天一也祖宗無不親郊成化弘治間或有故寧展至三月蓋以郊祀禮重不宜攝以人臣請俟聖躬痊改卜吉日行禮不從十八年改行於大內之玄極寶殿不奉配遂為定制隆慶元年禮臣言先農親祭遂耕耤田即祈穀遺意今二祀並行於春未免煩數且玄極寶殿在禁地百官陪祀出入非便宜罷祈穀止先農壇行事從之大雩明初凡水旱災傷及非常變異或躬禱或露告於宮中或於奉天殿陛或遣官祭告郊廟陵寢及社稷山川無常儀嘉靖八年春祈雨冬祈雪皆御製祝文躬祀南郊及山川壇次日祀社稷壇冠服淺色鹵簿不陳馳道不除皆不設配不奏樂九年帝欲於奉天殿丹陛上行大雩禮夏言言按左傳龍見而雩蓋巳月萬物始盛待雨而大故祭天為百穀祈膏雨也月令雩帝用盛樂乃命百縣雩祀祀百辟卿士有益於民者以祈穀實通典日巳月雩五方上帝其壇名雩禜於南郊之傍先臣丘濬亦謂天子於郊天之外別為壇以祈雨者也後世此禮不傳遇有旱暵輒假異端之人為祈禱之事不務以誠意感格而以法術劫制誣亦甚矣濬意欲於郊傍擇地為雩壇孟夏後行禮臣以為孟春既祈穀矣苟自二月至四月雨暘時若則大雩之祭可遣官攝行如雨澤愆期則陛下躬行禱祝乃建崇雩壇於圜丘壇外泰元門之東為制一成歲旱則禱奉太祖配十二年夏言等言古者大雩之祀命樂正習盛樂舞皇舞蓋假聲容之和以宣陰陽之氣請於三獻禮成之後九奏樂止之時樂奏雲門之舞仍命儒臣括雲漢詩詞制雲門一曲使文武舞士並舞而合歌之蓋雲門者帝堯之樂周官以祀天神取雲出天氣雨出地氣也且請增鼓吹數番教舞童百人青衣執羽繞壇歌雲門之曲而舞曲凡九成因上其儀視祈穀禮又言大雩乃祀天禱雨之祭凡遇亢旱則禮部於春末請行之帝從其議十七年躬禱於壇青服用一牛熟薦大饗禮明初無明堂之制嘉靖十七年六月致仕揚州府同知豐坊上疏言孝莫大於嚴父嚴父莫大於配天請復古禮建明堂加尊皇考獻皇帝廟號稱宗以配上帝下禮部會議尚書嚴嵩等言昔羲農肇祀上帝或為明堂嗣是夏后氏世室殷人重屋周人作明堂之制視夏殷加詳焉蓋聖王事天如子事父體尊而情親故制為一歲享祀之禮冬至圜丘孟春祈穀孟夏雩壇季秋明堂皆所以尊之也明堂帝而享之又以親之也今日創制古法難尋要在師先王之意明堂圜丘皆所以事天今大祀殿在圜丘之北禁城東南正應古之方位明堂秋享即以大祀殿行之為當至配侑之禮昔周公宗祀文王於明堂詩傳以為物成形於帝猶人成形於父故季秋祀帝明堂而以父配之取其成物之時也漢孝武明堂之享以景帝配孝章以光武配唐中宗以高宗配明皇以睿宗配代宗以肅宗配宋真宗以太宗配仁宗以真宗配英宗以仁宗配皆世以遞配此主於親親也宋錢公輔曰郊之祭以始封之祖有聖人之功者配焉明堂之祭以繼體之君有聖人之德者配焉當時司馬光孫抃諸臣執辯於朝程朱大賢倡議於下此主於祖宗之功德也今復古明堂大享之制其所當配之帝亦惟二說而已若以功德論則太宗再造家邦功符太祖當配以太宗若以親親論則獻皇帝陛下之所自出陛下之功德即皇考之功德當配以獻皇帝至稱宗之說則臣等不敢妄議帝降旨明堂秋報大禮於奉天殿行其配帝務求畫一之說皇考稱宗何為不可再會議以聞於是戶部左侍郎唐冑抗疏言三代之禮莫備於周孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝又曰嚴父莫大於配天則周公其人也說者謂周公有聖人之德制作禮樂而文王適其父故引以證聖人之孝答曾子問而已非謂有天下者皆必以父配天然後為孝不然周公輔成王踐阼其禮蓋為成王而制於周公為嚴父於成王則為嚴祖矣然周公歸政之後未聞成王以嚴父之故廢文王配天之祭而移於武王也後世祀明堂者皆配以父此乃誤孝經之義而違先王之禮昔有問於朱熹曰周公之後當以文王配耶當以時王之父配耶熹曰只當以文王為配又曰繼周者如何熹曰只以有功之祖配後來第為嚴父說所惑亂耳由此觀之明堂之配不專於父明矣今禮臣不能辨嚴父之非不舉文武成康之盛而乃濫引漢唐宋不足法之事為言謂之何哉雖然豐坊明堂之議雖未可從而明堂之禮則不可廢今南北兩郊皆主尊尊必季秋一大享帝而親親之義始備自三代以來郊與明堂各立所配之帝太祖太宗功德並盛比之於周太祖則后稷也太宗則文王也今兩郊及祈穀皆奉配太祖而太宗獨未有配甚為缺典故今奉天殿大享之祭必奉配太宗而後我朝之典禮始備帝怒下冑詔獄嵩乃再會廷臣先議配帝之禮言考季秋成物之指嚴父配天之文宜奉獻皇帝配帝侑食因請奉文皇帝配祀於孟春祈穀帝從獻皇配帝之請而却文皇議不行已復以稱宗之禮集文武大臣於東閣議言禮稱祖有功宗有德釋者曰祖始也宗尊也漢書注曰祖之稱始始受命也宗之稱尊有德可尊也孝經曰宗祀文王於明堂以配上帝王肅注曰周公於文王尊而祀之也此宗尊之說也古者天子七廟劉歆曰七者正法苟有功德則宗之不可預為設數宗不在數中宗變也朱熹亦以歆之說為然陳氏禮書曰父昭子穆而有常數者禮也祖功宗德而無定法者義也此宗無數之說禮以義起者今援據古義推緣人情皇考至德昭聞密佑穹旻宗以其德可聖子神孫傳授無疆皆皇考一人所衍布宗以其世亦可宜加宗皇考配帝明堂永為有德不遷之廟帝以疏不言祔廟留中不下乃設為臣下奏對之詞作明堂或問以示輔臣大略言文皇遠祖不應嚴父之義宜以父配稱宗雖無定說尊親崇上義所當行既稱宗則當祔廟豈有太廟中四親不具之禮帝既排正議崇私親心念太宗永無配享無以謝廷臣乃定獻皇配帝稱宗而改稱太宗號曰成祖時未建明堂迫季秋遂大享上帝於玄極寶殿奉睿宗獻皇帝配殿在宮右乾隅舊名欽安殿禮成禮部請帝陞殿百官表賀如郊祀慶成儀帝以大享初舉命賜宴羣臣於謹身殿已而以足疾不御殿命羣臣勿行賀禮禮官以表聞並罷宴令光祿寺分給二十一年敕諭禮部季秋大享明堂成周禮典與郊祀並行曩以享地未定特祭於玄極寶殿朕誠未盡南郊舊殿原為大祀所昨歲已令有司撤之朕自作制象立為殿恭薦名曰泰享用昭寅奉上帝之意乃定歲以秋季大享上帝奉皇考睿宗配享行禮如南郊陳設如祈穀明年禮部尚書費寀以大享殿工將竣請帝定殿門名門曰大享殿曰皇乾及殿成而大享仍於玄極寶殿遣官行禮以為常隆慶元年禮臣言我朝大享之禮自皇考舉行追崇睿宗以昭嚴父配天之孝自皇上視之則睿宗為皇祖非周人宗祀文王於明堂之義於是帝從其請罷大享禮命玄極寶殿仍改欽安殿令節拜天嘉靖初沿先朝舊儀每日宮中行拜天禮後以為瀆罷之遇正旦冬至聖誕節於奉天殿丹陛上行禮既定郊祀遂罷冬至之禮惟正旦聖誕節行禮於玄極寶殿隆慶元年正旦命宮中拜天不用在外執事祭品亦不取供於太常
