body:
  text: 明史卷一百九十三列傳第八十一費宏弟寀從子懋中子懋賢世父瑄翟鑾李時顧鼎臣嚴訥袁煒李春芳孫思誠等陳以勤趙貞吉殷士儋高儀費宏字子充鉛山人甫冠舉成化二十三年進士第一授修撰弘治中遷左贊善直講東宮進左諭德武宗立擢太常少卿兼侍講讀預修孝宗實錄充日講官正德二年拜禮部右侍郎尋轉左五年進尚書帝耽於逸樂早朝日講俱廢宏請勤政務學納諫報聞魯府鄒平王子當潩當襲父爵為弟當涼所奪且數年矣宏因當潩奏辨據法正之當涼怒誣宏受賂宏不為動明年冬十二月命宏兼文淵閣大學士參預機務尋加太子太保武英殿大學士進戶部尚書倖臣錢寧陰黨宸濠欲交歡宏餽綵幣及他珍玩拒却之寧慚且恚宸濠謀復護衞屯田輦白金鉅萬徧賂朝貴寧及兵部尚書陸完主之宏從弟編修寀其妻與濠妻兄弟也知之以告宏宏入朝完迎問曰寧王求護衞可復乎宏曰不知當日革之者何故完曰今恐不能不予宏峻却之及中官持奏至閣宏極言不當予詔卒予之於是宸濠與寧合而恚宏寧數偵宏事無所得以御史余珊嘗劾寀不當留翰林即指為宏罪中旨責陳狀宏乞休命幷寀致仕寧遣騎伺宏後抵臨清焚其舟資裝盡燬宏歸杜門謝客宸濠復求與通宏謝絕之益怒會宏族人與邑奸人李鎮等訟宸濠陰令鎮賊宏鎮等遂據險作亂率眾攻費氏索宏不得執所與訟者支解之發宏先人塚毀其家劫掠遠近眾至三千人宏馳使愬於朝下巡撫孫燧按狀始遣兵剿滅宸濠敗言者爭請召宏世宗即位遣行人即家起宏加少保入輔政宏持重識大體明習國家故事與楊廷和蔣冕毛紀同心協贊數勸帝革武宗弊政大禮之議諸臣力與帝爭帝不能堪宏頗揣知帝旨第署名公疏未嘗特諫以是帝心善之及廷和等去位宏為首輔加少師兼太子太師吏部尚書謹身殿大學士委任甚至戶部議督正德時逋賦宏偕石珤賈詠請斷自十年以後從之帝以四方災異敕羣臣修省宏等因言陛下用度無節工役不休畿內土地半成莊田內庫收納要求踰倍太倉無三年之積而宂食日增京營無十萬之兵而赴工不已直臣得罪未見原言官舉職乃被詰律所當行者數經讞不誅罪無可辨者遽傳旨獲免干和召怨自非一端帝引咎褒答然不能用也大同兵變張璁請討之宏曰討而勝玉石俱焚不勝彼將據城守損威重多矣莫若觀變而徐圖之事果旋定宏為人和易好推轂後進其於大禮不能強諫亦未嘗附離而是時席書張璁桂萼用事書弟檢討春故由他曹改用及武宗實錄成宏議出為僉事書由是憾宏璁萼由郎署入翰林驟至詹事舉朝惡其人宏每示裁抑璁萼亦大怨帝嘗御平臺特賜御製七言一章命輯倡和詩集署其銜曰內閣掌參機務輔導首臣其見尊禮前此未有也璁萼滋害宏寵萼言詩文小技不足勞聖心且使宏得馮寵靈凌壓朝士帝置不省萼遂與璁毀宏於帝言宏納郎中陳九川所盜天方貢玉受尚書鄧璋賕謀起用幷及其居鄉事宏上書乞休略曰萼璁挾私怨臣屢矣不與經筵講官則怨不與修獻皇帝實錄則怨不為兩京鄉試考官則怨不為教習則又怨萼璁疑內閣事屬臣操縱抑知臣下采物望上稟聖裁非可專擅萼璁日攘袂搤掔覬覦臣位臣安能與小人相齮齕祈賜骸骨不允及璁居兵部宏欲用新寧伯譚綸掌奮武營璁遂劾宏劫制府部無何又因宏子懋良坐罪下吏攻之益力復錄前後劾疏上之不得請則力求罷詆宏尤切章數上宏亦連疏乞休帝輒下優詔慰留然終不以譴璁萼於是奸人王邦奇承璁萼指上書汙故大學士廷和等幷誣宏宏竟致仕去時六年二月也十月璁遂以尚書大學士入直內閣間一歲萼亦入矣十四年萼既前死璁亦去位帝始追念宏四月再遣行人即家起官如故七月至京師使中使勞以上尊御饌面諭曰與卿別久卿康健無恙宜悉心輔導稱朕意宏頓首謝自是眷遇益厚偕李時召入無逸殿與周覽殿廬從容笑語移時始出賜銀章曰舊輔元臣數有咨問宏亦竭誠無隱承璁萼操切之後易以寬和朝士皆慕樂之未幾卒年六十有八帝嗟悼賻卹加等贈太保諡文憲宏三入內閣佐兩朝殆十年中遭讒搆訖以功名終其自少保入也弟寀為贊善從子懋中由進士及第為編修宏長子懋賢方改庶吉士父子兄弟並列禁近寀官至少保禮部尚書諡文通懋中終湖廣提學副使懋賢歷兵部郎中宏世父瑄成化十一年進士弘治時為兵部員外郎貴州巡撫謝總兵官吳經等奏爛土苗反僭稱王乞發大軍征討以兵部尚書馬文升請令瑄與御史鄧庠往按白苗無反狀撫定之劾經及鎮守中官張成罪遷貴州參議以終翟鑾字仲鳴其先諸城人曾祖為錦衣衞校尉因家京師舉弘治十八年進士改庶吉士正德初授編修劉瑾改翰林於他曹以鑾為刑部主事旋復官進侍讀嘉靖中累遷禮部右侍郎六年春廷推閣臣帝意在張孚敬弗與命再推乃及鑾中貴人多譽鑾者帝遂踰次用之楊一清以鑾望輕請用吳一鵬羅欽順帝不許命鑾以吏部左侍郎兼學士入直文淵閣尋賜銀章曰清謹學士鑾初入閣一清謝遷輔政既而孚敬與桂萼入鑾皆謹事之孚敬萼皆以所賜銀章密封言事鑾獨無所言詰之則頓首謝曰陛下明聖臣將順不暇何獻替之有帝心愛之一清萼孚敬先後罷鑾留獨秉政者兩月其後李時方獻夫入位皆居鑾上鑾亦無所怫帝數召時鑾入見嘗問都察院擬籍谷大用貲產當乎時鑾皆北人與中貴合時曰所擬不中律鑾曰按律籍沒止三條謀反叛逆及奸黨耳不合三尺法何以信天下帝曰大用亂政先朝正奸黨也鑾曰陛下即天也春生秋殺何所不可帝卒從重擬丁生母憂歸服闋久不召夏言顧鼎臣居政府鑾與謀召己會帝將南巡慮塞上有警議遣重臣巡視言等因薦鑾充行邊使十八年二月改兵部尚書兼右都御史諸邊文武將吏咸受節制且齎帑金五十萬犒邊軍東西往返三萬餘里明年春入京遂命以原官入閣在大同與總督毛伯溫議築五堡過甘肅與總督劉天和議拓嘉峪關皆受廕二十一年言罷鑾為首輔時已加少保武英殿大學士進少傅謹身殿嚴嵩初入鑾以資地居其上權遠出嵩下而嵩終惡鑾不能容御史趙大佑劾鑾私同年吏部尚書許讚亦發鑾請屬私書帝皆不問會鑾子汝儉汝孝與其師崔奇勛所親焦清同舉二十三年進士嵩遂屬給事中王交王堯日劾其有弊帝怒下吏部都察院鑾疏辨引西苑入直自解帝益怒勒鑾父子奇勛清及分考官編修彭鳳歐陽碷為民而下主考少詹事江汝璧及鄉試主考諭德素鳴夏贊善浦應麒詔獄並杖六十褫其官鑾初輔政有修潔聲中持服家居至困頓不能自給其用行邊起也諸邊文武大吏俱櫜鞬郊迎恐不得當鑾意饋遺不貲事竣歸裝千輛用以遺貴近得再政聲譽頓衰又為其子所累訖不復振踰三年卒年七十穆宗即位復官諡文懿李時字宗易任丘人父棨進士萊州知府時舉弘治十五年進士改庶吉士授編修正德中歷侍讀右諭德世宗嗣位為講官尋遷侍讀學士嘉靖三年擢禮部右侍郎俄以憂歸服除為戶部右侍郎復改禮部尋代方獻夫為尚書帝既定尊親禮慨然有狹小前人之志欲裁定舊章成一朝制作張孚敬夏言用事咸好更張所建諸典禮咸他人發端而時傅會成之或廷議不合率具兩端待帝自擇終未嘗顯爭以故帝愛其恭順四方上嘉瑞輒拜疏請賀帝謙讓時必再請由是益以時為忠賜銀章曰忠敏安慎俾密封言事久而失之請罪帝再賜焉十年七月四郊成加太子太保雷震午門彗星見東井時請敕臣工修省令言官指陳利害興革帝以建言乃科道專責寢不行光祿寺廚役王福錦衣衞千戶陳昇請遷顯陵於天壽山時等力陳不可巡檢徐震奏於安陸建京師時等駁其非制遂議改州為承天府其秋桂萼卒命時兼文淵閣大學士入參機務時張孚敬已罷翟鑾獨相時後入以宮保官尊反居鑾上兩人皆謙遜無齟齬帝御無逸殿召時坐講無逸篇鑾講豳風七月詩武定侯郭勛及九卿翰林俱入侍講畢帝退御豳風亭賜宴自是數召見諮謀政務明年春孚敬還內閣事取獨裁時不敢有所評議未幾方獻夫入與時亦相得彗星復出帝召見時等諭以引咎修省之意從容語及乏才時等退條上務安靜惜人才慎刑獄三事頗及大禮大獄廢斥諸臣帝優詔褒答之然卒不能用也給事中魏良弼御史馮恩先後劾吏部尚書汪鋐觸帝怒時皆為論救十二年孚敬復入鑾以憂去獻夫致仕時隨孚敬後拱手唯諾而已以故孚敬安之孚敬謝政費宏再入未幾卒時遂獨相時素寬平至是益鎮以安靜帝亦召對便殿接膝咨詢時雖無大匡救而議論暑忠厚廷論咸以時為賢客星見天棓旁帝問所主事應對曰事應之說起漢京房未必皆合惟在人君修德以弭之帝稱善扈蹕謁陵道沙河帝見居民蕭索愴然曰七陵在此宜加守護時對曰昔丘濬建議京師當設四輔以臨清為南昌平為北薊州保定為東西各屯兵一二萬今若於昌平增一總兵可南衞京師北護陵寢帝乃下廷臣勘議於沙河築鞏華城為置戍焉屢加少傅太子太師吏部尚書華蓋殿大學士會夏言入輔時不與抗每事推讓言言亦安之帝待時不如孚敬言然少責辱始終不替孚敬言亦不敢望也十七年十二月卒官贈太傅諡文康顧鼎臣字九和崑山人弘治十八年進士第一授修撰正德初再遷左諭德嘉靖初直經筵進講范浚心箴敷陳剴切帝悅乃自為註釋而鼎臣特受眷累官詹事給事中劉世揚李仁劾鼎臣汙佞帝下世揚等獄以鼎臣救得薄譴拜禮部右侍郎帝好長生術內殿設齋醮鼎臣進步虛詞七章且列上壇中應行事帝優詔褒答悉從之詞臣以青詞結主知由鼎臣倡也改吏部左侍郎掌詹事府請令曾子後授五經博士比三氏子孫從之大同軍變張孚敬主用兵鼎臣言不可帝嘉納十三年孟冬享廟命鼎臣及侍郎霍韜捧主二人有期功服當辭乃上言古禮諸侯絕期今公卿即古諸侯請得毋避禮部尚書夏言極詆其非乃已尋進禮部尚書仍掌府事京師淫雨四方多水災鼎臣請振饑弭盜報可十七年八月以本官兼文淵閣大學士入參機務尋加少保太子太傅進武英殿初李時為首輔夏言次之鼎臣又次之時卒言當國專甚鼎臣素柔媚不能有為充位而已帝將南巡立皇太子命言扈行鼎臣輔太子監國御史蕭祥曜劾吏部侍郎張潮受鼎臣屬調刑部主事陸崑為吏部潮言兵部主事馬承學恃鼎臣有聯自詭必得銓曹臣故抑承學而用崑帝下承學詔獄鼎臣不問十九年十月卒官年六十八贈太保諡文康鼎臣官侍從時憫東南賦役失均屢陳其弊帝為飭撫按巡撫歐陽鐸釐定之崑山無城言於當事為築城後倭亂起崑山獲全鄉人立祠祀焉嚴訥字敏卿常熟人舉鄉試以主司試錄觸忌一榜皆不得會試嘉靖二十年成進士改庶吉士授編修遷侍讀三吳數中倭患歲復大祲民死徙幾半有司徵斂益急訥疏陳民困請蠲貸帝得疏感動報如其請尋與李春芳入直西苑撰青詞超授翰林學士歷太常少卿禮部左右侍郎改吏部皆兼學士仍直西苑所撰青詞皆稱旨禮部尚書郭朴遷吏部遂以訥代之朴遭父喪復代為吏部尚書嚴嵩當國吏道汙雜嵩敗朴典銓猶未能盡變訥雅意自飭徐階亦推心任之訥乃與朝士約有事白於朝房毋謁私邸慎擇曹郎務抑奔競振淹滯又以資格太拘人才不能盡倣先朝三途並用法州縣吏政績異者破格超擢銓政一新尋錄供奉勞加太子太保四十四年袁煒罷命兼武英殿大學士入參機務以代者郭朴未至仍掌銓政帝齋居西苑侍臣直廬皆在苑中訥晨出理部事暮宿直廬供奉青詞小心謹畏至成疾久不愈其年冬十一月遂乞歸踰年世宗崩遂不復出訥既歸里父母皆在晨夕潔餐孝養人以為榮訥嘗語人曰銓臣與輔臣必同心乃有濟吾掌銓二年適華亭當國事無阻且所任選郎賢舉無失人華亭謂徐階選郎則陸光祖也家居二十年卒年七十有四贈少保諡文靖袁煒字懋中慈谿人嘉靖十七年會試第一殿試第三授編修煒性行不羈為御史包孝所劾帝宥不罪進侍讀久之簡直西苑撰青詞最稱旨三十五年閣臣推修撰全元立掌南京翰林院帝特用煒煒疏辭願以故官供奉帝大喜立擢煒侍講學士甫兩月手詔拜禮部右侍郎明年加太子賓客兼學士賜一品服三十九年復以供奉恩加俸二等俄進左侍郎明年二月調吏部兼官供奉如故踰月遷禮部尚書加太子少保仍命入直煒自供奉以後六年中進宮保尚書前未有也先是二月朔日食微陰煒言不當救護禮部尚書吳山不從得譴去帝聞煒言善之遂以代山及七月朔又日食曆官言食止一分五杪例免救護煒乃阿帝意上疏言陛下以父事天以兄事日羣陰退伏萬象輝華是以太陽晶明氛祲銷爍食止一分與不食同臣等不勝欣忭疏入帝益喜其冬遂命以戶部尚書兼武英殿大學士入閣典機務累加少傅兼太子太傅建極殿大學士四十四年春疾篤請假歸道卒年五十八贈少師諡文榮煒才思敏捷帝中夜出片紙命撰青詞舉筆立成遇中外獻瑞輒極詞頌美帝畜一貓死命儒臣撰詞以醮煒詞有化獅作龍語帝大喜悅其詭詞媚上多類此以故帝急枋用之恩賜稠疊他人莫敢望自嘉靖中年帝專事焚修詞臣率供奉青詞工者立超擢卒至入閣時謂李春芳嚴訥郭朴及煒為青詞宰相而煒貴倨鮮淟故出徐階門直以氣凌之與階同總裁承天大志諸學士呈稿煒竄改殆盡不以讓階諸學士不平階第曰任之而已其後煒死階亦盡竄改之煒自負能文見他人所作稍不當意輒肆詆誚館閣士出其門者斥辱尤不堪以故人皆畏而惡之李春芳字子實揚州興化人嘉靖二十六年舉進士第一除修撰簡入西苑撰青詞大被帝眷與侍讀嚴訥超擢翰林學士尋遷太常少卿拜禮部右侍郎俱兼學士直西苑如故佐理部事進左侍郎轉吏部代訥為禮部尚書時宗室蕃衍歲祿苦不繼春芳考故事為書上之諸吉凶大禮及歲時給賜皆嚴為之制帝嘉之賜名宗藩條例尋加太子太保四十四年命兼武英殿大學士與訥並參機務世宗眷侍直諸臣厚凡遷除皆出特旨春芳自學士至柄政凡六遷未嘗一由廷推春芳恭慎不以勢凌人居政府持論平不事操切時人比之李時其才力不及也而廉潔過之時徐階為首輔得君甚春芳每事必推階階亦雅重之隆慶元年春有詔修翔鳳樓春芳曰上新即位而遽興土木可乎事遂止齊康之劾徐階也語侵春芳春芳疏辨求去帝慰留之及代階為首輔益務以安靜稱帝意時同列者陳以勤張居正以勤端謹而居正恃才凌物視春芳蔑如也始階以人言罷春芳歎曰徐公尚爾我安能久容旦夕乞身耳居正遽曰如此庶保令名春芳愕然三疏乞休帝不允既而趙貞吉入代以勤剛而負氣及高拱再入直凌春芳出其上春芳不能與爭謹自飭而已俺答款塞求封春芳偕拱居正即帝前決之會貞吉為拱逐拱益張修階故怨春芳嘗從容為階解拱益不悅時春芳已累加少師兼太子太師進吏部尚書改中極殿度拱輩終不容己兩疏請歸養不允南京給事中王禎希拱意疏詆之春芳求去益力賜敕乘傳遣官護行有司給夫廩如故事閱一歲拱復為居正所擠幾不免而春芳歸父母尚無恙晨夕置酒食為樂鄉里豔之父母歿數年乃卒年七十五贈太師諡文定孫思誠天啟六年官禮部尚書尋罷崇禎初坐頌璫閒住思誠孫清字映碧崇禎四年進士由寧波推官擢刑科給事中熊文燦撫張獻忠清論其失策以久旱請寬刑忤旨貶浙江按察司照磨未赴憂歸起吏科給事中俄出封淮府國變得不與福王時請追諡開國名臣及武熹兩朝忠諫諸臣於是李善長等十四人陸震等十四人左光斗等九人並得諡春芳曾孫信廣東平和知縣城破與二子泓遠淑遠同時死陳以勤字逸甫南充人嘉靖二十年進士選庶吉士授檢討久之充裕王講官遷修撰進洗馬時東宮位號未定羣小多搆釁世宗於父子素薄王歲時不得燕見常祿外例有給賜王亦不敢請積三歲邸中窘甚王左右以千金賄嚴世蕃世蕃喜以屬戶部得幷給三歲資然世蕃常自疑一日屏人語以勤及高拱曰聞殿下近有惑志謂家大人何拱故為謔語以勤正色曰國本默定久矣生而命名從后從土首出九域此君意也故事諸王講官止用檢討今兼用編修獨異他邸此相意也殿下每謂首輔社稷臣君安從受此言世蕃默然去裕邸乃安為講官九年有羽翼功而深自晦匿王嘗書忠貞二字賜之父喪除還為侍讀學士掌翰林院進太常卿領國子監擢禮部右侍郎尋轉左改吏部掌詹事府穆宗即位以勤自以潛邸舊臣條上謹始十事曰定志保位畏天法祖愛民崇儉攬權用人接下聽言其言攬權聽言尤切詔嘉其忠懇隆慶元年春擢禮部尚書兼文淵閣大學士入參機務累加少傅兼太子太傅改武英殿穆宗朝講希御政無所裁決近倖多緣內降得厚恩以勤請勵精修政帝心動欲有所舉措卒為內侍所阻疏亦留中四年條上時務因循之弊請慎擢用酌久任治贓吏廣用人練民兵重農穀帝嘉之下所司議高拱掌吏部惡所言侵己職寢其奏惟都察院議行贓吏一事而已初以勤之入閣也徐階為首輔而拱方嚮用朝士各有所附交相攻以勤中立無所比亦無私人竟階與拱去無訾及之者及拱再入與趙貞吉相軋張居正復中搆之以勤與拱舊僚貞吉其鄉人而居正則所舉士也度不能為解恐終不為諸人所容力引疾求罷遂進兼太子太師吏部尚書賜敕馳傳歸詔其子編修于陛侍行後二年拱被逐倉皇出國門歎曰南充哲人也以勤歸十年年七十復頒上方銀幣命于陛馳歸賜之且敕有司存問又六年卒贈太保諡文端于陛別有傳趙貞吉字孟靜內江人六歲日誦書一卷及長以博洽名最善王守仁學舉嘉靖十四年進士選庶吉士授編修時方士初進用貞吉請求真儒贊大業執政不懌因請急歸還朝遷中允掌司業事俺答薄都城謾書求貢詔百官廷議貞吉奮袖大言曰城下之盟春秋恥之既許貢則必入城倘要索無已奈何徐階曰君必有良策貞吉曰為今之計請至尊速御正殿下詔引咎錄周尚文功以勵邊帥出沈束於獄以開言路輕損軍之令重賞功之格遣官宣諭諸將監督力戰退敵易易耳時帝遣中使瞷廷臣日中莫發一語聞貞吉言心壯之諭嚴嵩曰貞吉言是第不當及周尚文沈束事耳召入左順門令手疏便宜立擢左諭德兼監察御史奉敕宣諭諸軍給白金五萬兩聽隨宜勞賞初貞吉廷議罷盛氣謁嚴嵩嵩辭不見貞吉怒叱門者適趙文華至貞吉復叱之嵩大恨及撰敕不令督戰以輕其權且不與一卒護行時敵騎充斥貞吉馳入諸將營散金犒士宣諭德意明日即復命帝大怒謂貞吉漫無區畫徒為尚文束游說下之詔獄杖於廷謫荔波典史稍遷徽州通判進南京吏部主事四十年遷至戶部右侍郎廷議遣大臣赴薊州督餉練兵嵩欲用貞吉召飲示之意貞吉曰督餉者督京運乎民運乎若二運已有職掌添官徒增擾耳況兵之不練其過宜不在是即十戶侍出何益練兵嵩怫然罷會嵩請告吏部用倉場侍郎林應亮比嵩出益怒令都給事中張益劾應亮調之南京而改用僉都御史霍冀益又言督餉戶部專職今貞吉與左侍郎劉大賓廷推不及是不職也宜罷於是二人皆奪官隆慶初起禮部左侍郎掌詹事府穆宗幸太學祭酒胡杰適論罷以貞吉攝事講大禹謨稱旨命充日講官貞吉年踰六十而議論侃直進止有儀帝深注意焉尋遷南京禮部尚書既行帝念之仍留直講三年秋命兼文淵閣大學士參預機務貞吉入謝奏朝綱邊務一切廢弛臣欲捐軀任事惟陛下主之帝益喜會寇入大同總兵官趙岢失事總督陳其學反以捷聞為御史燕如宦所發貞吉欲置重罰兵部尚書霍冀僅議貶秩貞吉與同官爭不得因上言邊帥失律祖宗法具在今當事者屈法徇人如公論何臣老矣效忠無術乞賜罷不許俄加太子太保貞吉以先朝禁軍列三大營營各有帥今以一人總三營權重難制因極言其弊請分五營各統以大將稍復祖宗之舊帝善之命兵部會廷臣議尚書霍冀前與貞吉議不合頗不然其言廷臣亦多謂強兵在擇將不在變法冀等乃上議三大營宜如故惟以一人為總督權太重宜三營各設一大將而罷總督以文臣為總理報可初給事中楊鎔劾冀貪庸帝已留冀冀以鎔貞吉鄉人疑出貞吉意疏辨乞罷且詆貞吉貞吉亦疏辨求去詔留貞吉褫冀官其後營制屢更未踰年即復其舊貞吉亦不能爭也俺答款塞求封貞吉力贊其議先是高拱再入閣即掌吏部貞吉言於李春芳亦得掌都察院拱以私憾欲考察科道貞吉與同事上言頃因御史葉夢熊言事忤旨陛下嚴諭考覈言官幷及陞任在籍者應考近二百人其中豈無懷忠報主謇諤敢言之士今一以放肆奸邪罪之竊恐所司奉行過當忠邪不分致塞言路沮士氣非國家福也帝不從拱以貞吉得其情憾甚及考察拱欲去貞吉所厚者貞吉亦持拱所厚以解於是斥者二十七人而拱所惡者咸與拱猶以為憾也嗾門生給事中韓楫劾貞吉庸橫考察時有私貞吉疏辨乞休且言臣自掌院務僅以考察一事與拱相左其他壞亂選法縱肆作奸昭然耳目者臣噤口不能一言有負任使臣真庸臣也若拱者斯可謂橫也已臣放歸之後幸仍還拱內閣毋令久專大權廣樹眾黨疏入竟允貞吉去而拱握吏部權如故貞吉學博才高然好剛使氣動與物迕九列大臣或名呼之人亦以是多怨高拱張居正名輩出貞吉後而進用居先咸負才好勝不相下竟齟齬而去萬曆十年卒贈少保諡文肅殷士儋字正甫歷城人嘉靖二十六年進士選庶吉士授檢討久之充裕王講官凡關君德治道輒危言激論王為動色遷右贊善進洗馬直論如故隆慶元年擢侍讀學士掌翰林院事進禮部右侍郎未幾改吏部明年春拜禮部尚書掌詹事府事其冬還理部事四年正月朔望日月俱食士儋疏請布德緩刑納諫節用飭內外臣工講求民瘼報聞以舊恩進太子太保時寒暑皆罷講士儋請如故事四時無輟幷進講祖訓及大學衍義貞觀政要帝嘉納之始世宗定宗藩條例親王無後以兄弟及兄弟之子嗣不得以旁繼嘉靖末肅懷王薨無子其大母定王妃請以輔國將軍縉嗣禮部議縉實懷王從叔不可承祧詔許以將軍攝府事及帝即位王妃復請前尚書高儀執不可縉重賄中官屬宗人為奏祈必得士儋持之甚力帝以肅藩越在遠塞不王無以鎮之遂許縉嗣士儋爭曰肅府自甘州徙蘭州實內地且請別選郡王賢者理府事毋遂私請壞條例而帝意堅不可奪士儋乃請封為郡王諸宗率以此令從事帝終不許故事郊畢舉慶成宴自世宗倦勤典禮久廢帝即位三載猶未舉行士儋始考定舊儀行之十一月命以本官兼文淵閣大學士入閣辦事俄俺答封事成進少保改武英殿始士儋與陳以勤高拱張居正並為裕邸僚三人皆柄用士儋仍尚書不能無望拱素善張四維欲引共政而惡士儋不親己不為援士儋遂藉太監陳洪力取中旨入閣以故怨拱及四維四維父擅鹽利為御史郜永春所劾事已解他御史復及之拱四維疑出士儋指益相搆御史趙應龍遂劾士儋進由陳洪不可以參大政士儋再辨求去不允而拱門生都給事中韓楫復揚言脅之士儋亦疑出拱指故事給事中朔望當入閣會揖士儋面詰楫曰聞君有憾於我憾自可耳毋為他人使拱曰非體也士儋勃然起詬拱曰若逐陳公逐趙公復逐李公今又為四維逐我若能常有此座耶奮臂欲毆之居正從旁解亦誶而對御史侯居良復劾士儋始進不正求退不勇士儋再疏請益力乃賜道里費乘傳歸有司給廩隸如故事家居十一年卒時居正垂沒四維為政怨士儋贈太保諡文通久之改諡文莊高儀字子象錢塘人嘉靖二十年進士選庶吉士授編修歷侍講學士掌南京翰林院召為太常卿掌國子監事擢禮部右侍郎改吏部教習庶吉士四十五年代高拱為禮部尚書穆宗即位諸大典禮皆儀所酌定世宗遺命郊社及祔享祔葬諸禮悉稽祖制更定儀乃會廷臣議天地分祀不必改既祭先農不當復祈穀西苑帝社帝稷睿宗明堂配天與玉芝宮專祀當廢孝潔皇后當祔廟別祀孝烈於他所帝皆報可既而中官李芳復請天地合祀如洪武制御史張檟請易皇極諸殿名盡復其舊儀皆持不可帝踐阼四月未召對大臣儀屢請隆慶二年正月饗太廟帝將遣代儀偕僚屬諫閣臣亦以為言乃親祀如禮慶府輔國將軍縉請襲王爵儀執不從太子生七齡儀疏請出閤帝命待十齡行之詔取光祿銀二十萬兩儀力爭初世宗崇道教太常多濫員儀奏汰四十八人寺卿陳慶奏供事乏缺儀堅持不可掌禮部四年每歲暮類奏四方災異遇事秉禮循法居職甚稱引疾章六上卒見留會御史傅寵以先帝時撰文叩壇事劾儀儀四疏求去乃加太子少保馳傳歸歸二年用高拱薦命以故官侍東宮講讀掌詹事府六年四月詔兼文淵閣大學士入閣辦事踰月帝崩預顧命及拱為張居正所逐儀已病太息而已未幾卒贈太子太保諡文端儀性簡靜寡嗜慾室無妾媵舊廬燬於火終身假館於人及沒幾無以殮贊曰費宏等皆起家文學致位宰相宏却錢寧拒宸濠忤張桂再躓再起終亦無損清譽李時翟鑾皆負才望而鑾晚節不振貞吉負氣自高然處傾軋之勢即委蛇庸得免乎顧鼎臣等雍容廟堂可謂極遭逢之盛而陳以勤誠心輔導獻納良多後賢濟美繼登相位終明之世稱韋平者數以勤父子天之報之何其厚哉
