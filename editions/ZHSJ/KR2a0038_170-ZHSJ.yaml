body:
  text: 明史卷一百七十列傳第五十八于謙子冕吳寧王偉于謙字廷益錢塘人生七歲有僧奇之曰他日救時宰相也舉永樂十九年進士宣德初授御史奏對音吐鴻暢帝為傾聽顧佐為都御史待寮屬甚嚴獨下謙以為才勝己也扈蹕樂安高煦出降帝命謙口數其罪謙正詞嶄嶄聲色震厲高煦伏地戰慄稱萬死帝大悅師還賞賚與諸大臣等出按江西雪冤囚數百疏奏陝西諸處官校為民害詔遣御史捕之帝知謙可大任會增設各部右侍郎為直省巡撫乃手書謙名授吏部超遷兵部右侍郎巡撫河南山西謙至官輕騎徧歷所部延訪父老察時事所宜興革即具疏言之一歲凡數上小有水旱輒上聞正統六年疏言今河南山西積穀各數百萬請以每歲三月令府州縣報缺食下戶隨分支給先菽秫次黍麥次稻俟秋成償官而免其老疾及貧不能償者州縣吏秩滿當遷預備糧有未足不聽離任仍令風憲官以時稽察詔行之河南近河處時有衝決謙令厚築隄障計里置亭亭有長責以督率修繕並令種樹鑿井榆柳夾路道無渴者大同孤懸塞外按山西者不及至奏別設御史治之盡奪鎮將私墾田為官屯以資邊用威惠流行太行伏盜皆避匿在官九年遷左侍郎食二品俸初三楊在政府雅重謙謙所奏朝上夕報可皆三楊主持而謙每議事京師空橐以入諸權貴人不能無望及是三楊已前卒太監王振方用事適有御史姓名類謙者嘗忤振謙入朝薦參政王來孫原貞自代通政使李錫阿振指劾謙以久不遷怨望擅舉人自代下法司論死繫獄三月已而振知其誤得釋左遷大理寺少卿山西河南吏民伏闕上書請留謙者以千數周晉諸王亦言之乃復命謙巡撫時山東陝西流民就食河南者二十餘萬謙請發河南懷慶二府積粟以振又奏令布政使年富安集其眾授田給牛種使里老司察之前後在任十九年丁內外艱皆令歸治喪旋起復十三年以兵部左侍郎召明年秋也先大入寇王振挾帝親征謙與尚書鄺埜極諫不聽埜從治兵留謙理部事及駕陷土木京師大震眾莫知所為郕王監國命羣臣議戰守侍講徐珵言星象有變當南遷謙厲聲曰言南遷者可斬也京師天下根本一動則大事去矣獨不見宋南渡事乎王是其言守議乃定時京師勁甲精騎皆陷沒所餘疲卒不及十萬人心震恐上下無固志謙請王檄取兩京河南備操軍山東及南京沿海備倭軍江北及北京諸府運糧軍亟赴京師以次經畫部署人心稍安即遷本部尚書郕王方攝朝廷臣請族誅王振而振黨馬順者輒叱言官於是給事中王竑廷擊順眾隨之朝班大亂衞卒聲洶洶王懼欲起謙排眾直前掖王止且啟王宣諭曰順等罪當死勿論眾乃定謙袍袖為之盡裂退出左掖門吏部尚書王直執謙手歎曰國家正賴公耳今日雖百王直何能為當是時上下皆倚重謙謙亦毅然以社稷安危為己任初大臣憂國無主太子方幼寇且至請皇太后立郕王王驚謝至再謙颺言曰臣等誠憂國家非為私計王乃受命九月景帝立謙入對慷慨泣奏曰寇得志要留大駕勢必輕中國長驅而南請飭諸邊守臣協力防遏京營兵械且盡宜亟分道募民兵令工部繕器甲遣都督孫鏜衞穎張軏張儀雷通分兵守九門要地列營郭外都御史楊善給事中王竑參之徙附郭居民入城通州積糧令官軍自詣關支以贏米為之直毋棄以資敵文臣如軒輗者宜用為巡撫武臣如石亨楊洪柳溥者宜用為將帥至軍旅之事臣身當之不効則治臣罪帝深納之十月敕謙提督各營軍馬而也先挾上皇破紫荊關直入窺京師石亨議斂兵堅壁老之謙不可曰奈何示弱使敵益輕我亟分遣諸將率師二十二萬列陣九門外都督陶瑾安定門廣寧伯劉安東直門武進伯朱瑛朝陽門都督劉聚西直門鎮遠侯顧興祖阜成門都指揮李端正陽門都督劉得新崇文門都指揮湯節宣武門而謙自與石亨率副總兵范廣武興陳德勝門外當也先以部事付侍郎吳寧悉閉諸城門身自督戰下令臨陣將不顧軍先退者斬其將軍不顧將先退者後隊斬前隊於是將士知必死皆用命副總兵高禮毛福壽却敵彰義門北擒其長一人帝喜令謙選精兵屯教場以便調用復命太監興安李永昌同謙理軍務初也先深入視京城可旦夕下及見官軍嚴陣待意稍沮叛閹喜寧嗾使邀大臣迎駕索金帛以萬萬計復邀謙及王直胡濙等出議帝不許也先氣益沮庚申寇窺德勝門謙令亨設伏空舍遣數騎誘敵敵以萬騎來薄副總兵范廣發火器伏起齊擊之也先弟孛羅平章卯那孩中礮死寇轉至西直門都督孫鏜禦之亨亦分兵至寇引退副總兵武興擊寇彰義門與都督王敬挫其前鋒寇且却而內官數百騎欲爭功躍馬競前陣亂興被流矢死寇逐至土城居民升屋號呼投磚石擊寇譁聲動天王竑及福壽援至寇乃却相持五日也先邀請既不應戰又不利知終弗可得志又聞勤王師且至恐斷其歸路遂擁上皇由良鄉西去謙調諸將追擊至關而還論功加謙少保總督軍務謙曰四郊多壘卿大夫之恥也敢邀功賞哉固辭不允乃益兵守真保涿易諸府州請以大臣鎮山西防寇南侵景泰元年三月總兵朱謙奏敵二萬攻圍萬全敕范廣充總兵官禦之已而寇退謙請即駐兵居庸寇來則出關剿殺退則就糧京師大同參將許貴奏迤北有三人至鎮欲朝廷遣使講和謙曰前遣指揮季鐸岳謙往而也先隨入寇繼遣通政王復少卿趙榮不見上皇而還和不足恃明矣況我與彼不共戴天理固不可和萬一和而彼肆無厭之求從之則坐敝不從則生變勢亦不得和貴為介冑臣而恇怯如此何以敵愾法當誅移檄切責自是邊將人人主戰守無敢言講和者初也先多所要挾皆以喜寧為謀主謙密令大同鎮將擒寧戮之又計授王偉誘誅間者小田兒且因諜用間請特釋忠勇伯把台家許以封爵使陰圖之也先始有歸上皇意遣使通款京師稍解嚴謙上言南京重地撫輯須人中原多流民設遇歲荒嘯聚可虞乞敕內外守備及各巡撫加意整飭防患未然召還所遣召募文武官及鎮守中官在內地者於時八月上皇北狩且一年矣也先見中國無釁滋欲乞和使者頻至請歸上皇大臣王直等議遣使奉迎帝不悅曰朕本不欲登大位當時見推實出卿等謙從容曰天位已定寧復有他顧理當速奉迎耳萬一彼果懷詐我有辭矣帝顧而改容曰從汝從汝先後遣李實楊善往卒奉上皇以歸謙力也上皇既歸瓦剌復請朝貢先是貢使不過百人正統十三年至三千餘賞賚不饜遂入寇及是又遣使三千來朝謙請列兵居庸關備不虞京師盛陳兵宴之因言和議難恃條上安邊三策請敕大同宣府永平山海遼東各路總兵官增修備禦京兵分隸五軍神機三千諸營雖各有總兵不相統一請擇精銳十五萬分十營團操團營之制自此始具兵志中瓦剌入貢每攜故所掠人口至謙必奏酬其使前後贖還累數百人初永樂中降人安置近畿者甚眾也先入寇多為內應謙謀散遣之因西南用兵每有征行輒選其精騎厚資以往已更遣其妻子內患以息楊洪自獨石入衞八城悉以委寇謙使都督孫安以輕騎出龍門關據之募民屯田且戰且守八城遂復貴州苗未平何文淵議罷二司專設都司以大將鎮之謙曰不設二司是棄之也議乃寢謙以上皇雖還國恥未雪會也先與脫脫不花搆請乘間大發兵身往討之以復前仇除邊患帝不許謙之為兵部也也先勢方張而福建鄧茂七浙江葉宗留廣東黃蕭養各擁眾僭號湖廣貴州廣西瑤僮苗僚所至蜂起前後征調皆謙獨運當軍馬倥偬變在俄頃謙目視指屈口具章奏悉合機宜僚吏受成相顧駭服號令明審雖勳臣宿將小不中律即請旨切責片紙行萬里外靡不惕息其才略開敏精神周至一時無與比至性過人憂國忘身上皇雖歸口不言功東宮既易命兼宮僚者支二俸諸臣皆辭謙獨辭至再自奉儉約所居僅蔽風雨帝賜第西華門辭曰國家多難臣子何敢自安固辭不允乃取前後所賜璽書袍錠之屬悉加封識歲時一省視而已帝知謙深所論奏無不從者嘗遣使往真定河間采野菜直沽造乾魚謙一言即止用一人必密訪謙謙具實對無所隱不避嫌怨由是諸不任職者皆怨而用弗如謙者亦往往嫉之比寇初退都御史羅通即劾謙上功簿不實御史顧言謙太專請六部大事同內閣奏行謙據祖制折之戶部尚書金濂亦疏爭而言者捃摭不已諸御史以深文彈劾者屢矣賴景帝破眾議用之得以盡所設施謙性故剛遇事有不如意輒拊膺歎曰此一腔熱血竟灑何地視諸選耎大臣勳舊貴戚意頗輕之憤者益眾又始終不主和議雖上皇實以是得還不快也徐珵以議南遷為謙所斥至是改名有貞稍稍進用嘗切齒謙石亨本以失律削職謙請宥而用之總兵十營畏謙不得逞亦不樂謙德勝之捷亨功不加謙而得世侯內媿乃疏薦謙子冕詔赴京師辭不允謙言國家多事臣子義不得顧私恩且亨位大將不聞舉一幽隱拔一行伍微賤以裨軍國而獨薦臣子於公議得乎臣於軍功力杜僥倖決不敢以子濫功亨復大恚都督張軏以征苗失律為謙所劾與內侍曹吉祥等皆素憾謙景泰八年正月壬午亨與吉祥有貞等既迎上皇復位宣諭朝臣畢即執謙與大學士王文下獄誣謙等與黃搆邪議更立東宮又與太監王誠舒良張永王勤等謀迎立襄王子亨等主其議嗾言官上之都御史蕭惟禎定讞坐以謀逆處極刑文不勝誣辯之疾謙笑曰亨等意耳辯何益奏上英宗尚猶豫曰于謙實有功有貞進曰不殺于謙此舉為無名帝意遂決丙戌改元天順丁亥棄謙市籍其家家戍邊遂溪教諭吾豫言謙罪當族謙所薦舉諸文武大臣並應誅部議持之而止千戶白琦又請榜其罪鏤板示天下一時希旨取寵者率以謙為口實謙自值也先之變誓不與賊俱生嘗留宿直廬不還私第素病痰疾作景帝遣興安舒良更番往視聞其服用過薄詔令上方製賜至醯菜畢備又親幸萬歲山伐竹取瀝以賜或言寵謙太過興安等曰彼日夜分國憂不問家產即彼去令朝廷何處更得此人及籍沒家無餘貲獨正室鐍鑰甚固啟視則上賜蟒衣劍器也死之日陰霾四合天下冤之指揮朵兒者本出曹吉祥部下以酒酹謙死所慟哭吉祥怒抶之明日復酹奠如故都督同知陳逵感謙忠義收遺骸殯之踰年歸葬杭州逵六合人故舉將才出李時勉門下者也皇太后初不知謙死比聞嗟悼累日英宗亦悔之謙既死而亨黨陳汝言代為兵部尚書未一年敗贓累巨萬帝召大臣入視愀然曰于謙被遇景泰朝死無餘貲汝言抑何多也亨俯首不能對俄有邊警帝憂形於色恭順侯吳瑾侍進曰使于謙在當不令寇至此帝為默然是年有貞為亨所中戍金齒又數年亨亦下獄死吉祥謀反族誅謙事白成化初冕赦歸上疏訟冤得復官賜祭誥曰當國家之多難保社稷以無虞惟公道之獨持為權奸所並嫉在先帝已知其枉而朕心實憐其忠天下傳誦焉弘治二年用給事中孫需言贈特進光祿大夫柱國太傅諡肅愍賜祠於其墓曰旌功有司歲時致祭萬曆中改諡忠肅杭州河南山西皆世奉祀不絕冕字景瞻廕授副千戶坐戍龍門謙冤既雪幷復冕官自陳不願武職改兵部員外郎居官有幹局累遷至應天府尹致仕卒無子以族子允忠為後世襲杭州衞副千戶奉祠吳寧字永清歙人宣德五年進士除兵部主事正統中再遷職方郎中郕王監國謙薦擢本部右侍郎謙禦寇城外寧掌部事命赴軍中議方略比還城門弗啟寇騎充斥寧立雨中指揮兵士移時乃入寇既退畿民猶日數驚相率南徙或議仍召勤王兵寧曰是益之使驚也莫若告捷四方人心自定因具奏行之景泰改元以疾乞歸後不復出家居三十餘年卒寧方介有識鑑嘗為謙擇婿得千戶朱驥謙疑之寧曰公他日當得其力謙被刑驥果歸其喪葬之驥自有傳王偉字士英攸人年十四隨父謫戍宣府宣宗巡邊獻安邊頌命補保安州學生舉正統元年進士改庶吉士授戶部主事英宗北狩命行監察御史事集民壯守廣平謙引為職方司郎中軍書填委處分多中窾會遂薦擢兵部右侍郎出視邊叛人小田兒為敵間謙屬偉圖之會田兒隨貢使入至陽和城壯士從道旁突出斷其頭去使者不敢詰偉喜任智數既為謙所引恐嫉謙者目己為朋附嘗密奏謙誤冀自解帝以其奏授謙謙叩頭謝帝曰吾自知卿何謝為謙出偉問上與公何言謙笑曰我有失望君面規我何至爾邪出奏示之偉大慙沮然竟坐謙黨罷歸成化三年復官請毀白琦所鏤板踰年告病歸卒贊曰于謙為巡撫時聲績表著卓然負經世之才及時遘艱虞繕兵固圉景帝既推心置腹謙亦憂國忘家身繫安危志存宗社厥功偉矣變起奪門禍機猝發徐石之徒出力而擠之死當時莫不稱冤然有貞與亨吉祥相繼得禍皆不旋踵而謙忠心義烈與日月爭光卒得復官賜卹公論久而後定信夫
