body:
  text: 明史卷一百八十七列傳第七十五何鑑馬中錫陸完洪鍾陳鎬蔣昇陳金俞諫周南孫祿馬昊何鑑字世光浙江新昌人成化五年進士授宜興知縣徵拜御史巡宣府大同劾巡撫鄭寧以下數十人不職按裨將孟璽等罪還巡太倉總督太監卒犯法逮治之為所搆下錦衣獄得釋再按江北鳳陽皇陵所在近境取寸木法皆死陵軍多倚禁虐民鑑請以山麓為限他樵採勿禁遂著為令出為河南知府振累歲饑條行荒政十事歷四川左右布政使弘治六年以右副都御史巡撫江南兼理杭嘉湖三府稅糧蘇松水災用便宜發漕米十五萬石振之與侍郎徐貫疏吳淞白茆諸渠泄水入海水患以除復巡撫山東遷刑部侍郎母憂去十八年還朝時承平久生齒日繁孝宗覽天下戶籍數乃視國初反減咎所司溺職欲釐正之敕鑑以故官兼左僉都御史往河南湖廣陝西閱實戶口得戶二十三萬五千有奇口七十三萬九千有奇因疏善後十事及軍民利病以聞會孝宗已崩武宗悉採納之正德二年拜南京兵部尚書參贊機務鑑前撫江南嘗按千戶張文冕罪文冕亡去至是搆於劉瑾而瑾亦嗛鑑不與通遂坐以事連罰米貧不能償奏愬獲免六年正月召為刑部尚書時大盜並起劉寵劉宸楊虎劉惠齊彥名朱諒等亂畿輔方四曹甫藍廷瑞鄢本恕等躪四川汪澄二羅光權王浩八王鈺五等擾江西皆稱王四方告急無虛日兵部尚書王敞不能辦賊帝既命洪鍾陳金馬中錫督師分討其年五月罷敞以鑑代之鑑乃選將練兵錄民間材武士令鄉聚悉樹柵浚溝團結相救河南山西兵守黃河斷太行京操班軍留守所在城邑每漕艘運卒一人屯河濱護運道通行旅文武大吏軼賊請敕峻責之而褒縣令能擊賊者以中錫玩寇奏遣陸完代還調邊將從完討賊賊連為邊軍所破奔迸四出會中官谷大用伏羌伯毛銳率師駐臨清賊遂謀以十二月朔伺帝省牲南郊乘間犯駕先一日趨霸州鑑立奏聞夜設備厥明帝召問鑑鑑請早出安人心遂成禮而還賊知有備西掠保定諸州縣以去河南巡撫鄧璋請濟師鑑言山東賊不及萬官軍奚啻十倍緣勢要私人營充頭目撓律攘功失將士心請盡遣若屬還都指揮以下失事即軍前行戮益調邊軍助璋帝悉從之尋以捷書屢聞加鑑太子少保明年正月賊突霸州京師戒嚴鑑令邊兵亟邀賊賊遁去賊渠楊虎朱諒死其黨分擾山東河南鑑以山東賊劉寵劉宸齊彥名等責邊將許泰郤永劉暉李鋐以河南賊劉惠趙鐩邢老虎等責邊將馮禎時源神周金輔未幾毛銳敗績與大用俱召還鑑乃請用彭澤與仇鉞同辦河南賊而以山東賊專委陸完五月河南賊平七月山東餘賊亦平陳金洪鍾亦以次平江西四川諸賊帝喜加鑑太子太保廕子錦衣世百戶鑑乃上言羣盜蕩平民罹兵久乞量免田租多方振贍黜貪殘長吏停不急工役還民故業貸以牛種復其家三年有訐舊事及怙惡者並置於理帝悉報可先是七月中鑑以羣盜未盡請留邊將劉暉戍山東時源戍河南郤永戍畿輔李鋐戍淮揚各假總兵之職俟事寧始罷仇鉞言邊軍久勞風土不習人馬俱病今賊已漸平請留三之一討賊餘悉遣還廷議二人議俱是請四將各千人鎮壓他將許泰神周金輔溫恭輩俱統所部還邊鎮帝許之命延綏軍徑還遼東宣府大同軍過闕勞賜帝時好弄兵羣小寵幸者言邊軍憨健過京軍遠甚宜留之京營帝以為然至十一月三鎮軍畢至遂命留之以京軍往代鑑力陳不可廷臣集議復極言其害帝竟不從自是邊軍於大內團操號為外四家軍而江彬進用矣八年宣府送迤北降人脫脫太等至京命充御馬監勇士鑑等上言漢魏徙氐羌於關中郭欽江統皆勸晉武早絕亂階苻堅處鮮卑於漢南苻融亦慮其窺測虛實今使降人出入禁中假寵踰分且生慢侮萬一北寇聞之潛使黠賊偽降以為間諜寧不為將來患哉帝不聽寧王宸濠謀復護衞鑑力遏之都督白玉以失事罷厚賄豹房諸倖臣求復鑑執不從諸倖臣嗾詗事者發鑑家僮取將校金錢言官遂交章劾鑑致仕去閱九年卒年八十馬中錫字天祿故城人父偉為唐府長史以直諫忤王械送京師而盡縲其家人中錫以幼免乃奔訴巡按御史御史言於王釋其家復奉母走京師訴冤父竟得白終處州知府中錫舉成化十年鄉試第一明年成進士授刑科給事中萬貴妃弟通驕橫再疏斥之再被杖公主侵畿內田勘還之民又嘗劾汪直違恣罪歷陝西督學副使弘治五年召為大理右少卿南京守備太監蔣琮與兵部郎中婁性指揮石文通相訐連數百人遣官按不服中錫偕司禮太監趙忠等往一訊得實性除名琮下獄抵罪擢右副都御史巡撫宣府劾罷貪耄總兵官馬儀革鎮守以下私役軍士使隸尺籍寇嘗犯邊督軍敗之引疾歸中外交薦武宗即位起撫遼東還屯田於軍而劾鎮守太監朱秀置官店擅馬市諸罪正德元年入歷兵部左右侍郎劉瑾初得志其黨朱瀛冒邊功至數百人尚書閻仲宇許之中錫持不可瑾大恚中旨改南京工部明年勒致仕其冬逮繫詔獄械送遼東責償所收腐粟踰年事竣斥為民瑾誅起撫大同中錫居官廉所至革弊任怨以故有名六年三月賊劉六等起吏部尚書楊一清建議遣大臣節制諸道兵乃薦中錫為右都御史提督軍務與惠安伯張偉統禁兵南征劉六名寵其弟七名宸文安人也並驍悍善騎射先是有司患盜召寵宸及其黨楊虎齊彥名等協捕頻有功會劉瑾家人梁洪徵賄於寵等不得誣為盜遣甯杲柳尚義繪形捕之破其家寵等乃投大盜張茂茂家高樓重屋複壁深窖素招亡命為逋逃主宦官張忠與鄰茂結為兄夤緣馬永成谷大用于經輩得出入豹房侍帝蹴鞠而乘間為盜如故後數為河間參將袁彪所敗茂窘求救於忠忠置酒私第招茂彪東西坐酒酣舉觴屬彪字茂曰彥實吾弟也自今毋相厄又舉觴屬茂曰袁公善爾爾慎毋犯河間彪畏忠唯唯而已已茂為甯杲所擒寵等相率詣京謀自首忠與永成為請於帝且曰必獻萬金乃赦寵宸不能辦逃去既而瑾誅有詔許自首寵等乃出詣官兵部奏赦之令捕他盜自効寵等憚要束未幾復叛黨日衆所至陷城殺將吏中錫等受命出師敗賊於彰德既又敗之河間進左都御史然賊方熾諸將率畏懦莫敢當其鋒或反與之結參將桑玉嘗遇賊文安村中寵宸窘蹙跳民家樓上欲自剄而玉素受賊賂故緩之有頃彥名持大刀至殺傷數十人大呼抵樓下寵宸知救至出射殺數人玉大敗參將宋振禦賊棗強不發一矢城遂陷死者七千人當是時寵宸等自畿輔犯山東河南南下湖廣抵江西復自南而北直窺霸州楊虎等由河北入山西復東抵文安與寵等合破邑百數縱橫數千里所過若無人中錫雖有時望不習兵偉亦紈袴子見賊強諸將怯度不能破賊乃議招撫謂盜本良民由酷吏甯杲與中官貪黷所激若推誠待之可毋戰降也遂下令賊所在勿捕過勿邀擊饑渴則食飲之降者待以不死賊聞欲就撫相戒毋焚掠猶豫未定而朝廷以京軍弱議發邊兵中錫欲戰則兵未集欲撫則賊時向背終不得要領既建議主撫不能變會寵等聞邊兵且至退屯德州桑園中錫肩輿入其營與酒食開誠慰諭之衆拜且泣送馬為壽寵慷慨請降宸乃仰天咨嗟曰騎虎不得下今奄臣柄國人所知也馬都堂能自主乎遂罷會而是時方詔懸賞格購賊寵等偵知之益疑懼徑去焚掠如故獨至故城戒毋犯馬都堂家由是中錫謗大起謂其以家故縱賊言官交劾之下詔切責中錫猶堅持其說以請兵部尚書何鑑謂賊誠解甲則貰死即不然毋為所誑既而寵等終不降乃遣侍郎陸完督師而召中錫偉還初中錫受命討賊大學士楊廷和謂楊一清曰彼文士耳不足任也竟無功與偉同下獄論死中錫死獄中偉革爵十一年巡按御史盧雍追訟中錫冤謂賊實聽撫僉事許承芳忌之潛請益兵疑賊心及賊再受約方至軍門而檻車已就道矣朝廷乃復中錫官賜祭予廕陸完字全卿長洲人為諸生中官王敬至蘇以事庭曳諸生諸生競起擊之完不與惡完者中之敬遂首列完名上聞巡撫王恕極論敬罪完乃得免舉成化二十三年進士謁選恕方為吏部曰是嘗擊奄人者當為御史入臺果有聲正德初歷江西按察使寧王宸濠雅重之時召預曲宴以金罍為贈三年冬擢右僉都御史巡撫宣府劉瑾惡完赴闕後期命以試職視事明年夏復改南院督江防軍完以都御史試職非故事懼甚賄瑾召為左僉都御史五年春拜兵部侍郎瑾敗言者劾其黨附帝不問明年霸州賊劉六劉七等起奉楊虎為首惠安伯張偉右都御史馬中錫師出無功逮繫論死八月詔完兼右僉都御史提督軍務統京營宣府延綏軍討之行及涿州忽傳賊且逼京師命還軍入衞會副總兵許泰游擊郤永等敗楊虎等於霸州賊南走京師始解嚴指揮賀勇等再敗賊信安副總兵馮槙復大敗之阜城分兵追擊賊東圍滄州會劉六七中流矢乃解而南陷山東縣二十楊虎兵亦北殘威縣新河於是完頻請濟師益發遼東山西諸鎮兵逐賊賊益南圍濟寧焚運舟轉寇曹州楨泰永擊斬二千餘人獲其魁朱諒錄功進完右都御史諸將皆增秩中官谷大用張忠意賊旦暮平乃自請督師詔以大用總督軍務伏羌伯毛銳充總兵官忠監神鎗統京軍五千人會完討賊時劉六等縱橫沂莒間而楊虎陷宿遷執淮安知府劉祥靈璧知縣陳伯安連陷虹永城虞城夏邑及歸德州邊兵追及賊退至小黃河渡口百戶夏時設伏蹙之虎溺死餘賊奔河南推劉惠為首大敗副總兵白玉軍攻陷沈丘殺都指揮王保執都指揮潘翀北陷鹿邑有陳翰者與甯龍謀奉惠為奉天征討大元帥趙鐩副之車人羽自為侍謀軍國重務元帥府長史與龍立東西二廠治事分其軍為二十八營以應列宿營各置都督聚衆至十三萬欲牽制官軍於是惠鐩擾河南劉六及齊彥名等擾山東黨分為二已而六復轉而北永敗之濰縣還趨霸州帝將出郊省牲聞之懼急召完赴援完擊破之文安賊南至湯陰完又督諸將追敗之先後俘斬千人當是時六等衆號數萬然多脅從精銳不過千餘人自兵部下首功令官軍追賊賊輒驅良民前行急則棄所掠逸去官軍所殺皆良民以故捷書屢奏而賊勢不衰明年正月六等復突霸州京師戒嚴詔完及大用銳還禦近畿賊乃西掠博野攻蠡縣臨城大用銳與遇於長垣大敗廷議召二人還別命都御史彭澤同咸寧伯仇鉞辦河南賊以畿輔山東賊委完完遣永追敗劉六於宋家莊賊南犯滕縣副總兵劉暉大敗之賊遂奔登萊海套完師次平度檄永玉與游擊溫恭三道進攻命副總兵張俊李鋐及泰暉分軍邀其奔逸賊走連戰皆大敗之賊乃變服易馬而遁先後擒斬二千六百餘人賊止三百人北走沿途招聚勢復張剽香河寶坻玉田轉攻武清游擊王杲敗沒巡撫甯杲兵亦敗畿輔復震動而賊轉南至冠縣暉襲敗之指揮張勛又敗之平原賊南奔邳州渡河抵固始會河南賊已平劉六等勢益衰遂走湖廣奪舟至夏口遇都御史馬炳然殺之復登陸焚漢口為指揮滿弼等追及劉六中流矢與子仲淮赴水死劉七齊彥名率五百人舟行自黃州順流抵鎮江南京告急完疾趨而南帝命彭澤仇鉞會完軍進剿大兵盡集江南北賊猶乘潮上下肆掠操江武靖伯趙弘澤都御史陳世良遇之敗績死者無算七月賊治舟孟瀆完等至鎮江留鉞防守令恭以騎駐江北暉永以舟趨江陰完率都指揮孫文傅鎧趨福山港賊懼抵通州颶風大作棄舟走保狼山完命同知羅瑋夜導軍登山南蹙之彥名中槍死七中矢亦赴水死餘賊盡平還朝進完太子少保左都御史廕子錦衣世百戶明年代何鑑為兵部尚書完有才智急功名善交權勢劉暉許泰江彬皆其部將後並寵倖用事完遂得其力時宸濠已萌異志聞完為兵部致書盛陳舊好欲復護衞及屯田完答書令以祖制為詞宸濠遂遣人輦金帛鉅萬寓所善教坊臧賢家徧遺用事貴人屬錢寧為內主比奏下完遂為覆請而以屯田屬戶部請付廷議內閣擬旨上並予之舉朝譁然六科給事中高淓十三道御史汪賜等力爭章並下部久不覆南京給事中徐文溥繼言之完乃請納諫官言帝竟不許十年改吏部尚書宸濠反就執中官張永至南昌搜其籍得完平日交通事上之帝大怒還至通州執完收其母妻子女封識其家比還京反縛之竿揭姓名於首雜俘囚中列凱旋前部以入將置極刑值武宗崩世宗立法司覆奏完交外藩而遺金不却處護衞而執奏不堅當斬完復乞哀下廷臣覆讞以平賊功在八議之列遂得減死戍福建靖海衞母年九十餘竟死獄中初完嘗夢至一山曰大武及抵戍所有山如其名歎曰吾戍已久定何所逃乎竟卒於戍所洪鍾字宣之錢塘人成化十一年進士為刑部主事遷郎中奉命安輯江西福建流民還言福建武平上杭清流永定江西安遠龍南廣東程鄉皆流移錯雜習鬬爭易亂宜及平時令有司立鄉社學教之詩書禮讓弘治初再遷四川按察使馬湖土知府安鼇恣淫虐士人怨之刺骨有司利其金置不問遷延二十年僉事曲銳請巡按御史張鸞按治鍾贊決捕鼇送京師置極刑安氏自唐以來世有馬湖至是改流官一方始靖歷江西福建左右布政使十一年擢右副都御史巡撫順天整飭薊州邊備建議增築塞垣自山海關西北至密雲古北口黃花鎮直抵居庸延亙千餘里繕復城堡二百七十所悉城緣邊諸縣因奏減防秋兵六千人歲省輓輸犒賚費數萬計所部潮河川去京師二百里居兩山間廣百餘丈水漲成巨浸水退則坦然平陸寇得長驅直入鍾言關以東三里許其山外高內庳約餘二丈可鑿為兩渠分殺水勢而於口外斜築石堰以束水置關堰內守以百人使寇不得馳突可免京師北顧憂且得屯種河壖地兵部尚書馬文升等請從之比興工鑿山山石崩壓死者數百人御史弋福給事中馬予聰等劾鍾巡撫張烜等請罷役不聽未幾工成侍郎張達偕司禮中官往視還言石洞僅洩小水地近邊垣多沙石不利耕種給事中屈伸等劾鍾欺妄三罪諸言官及兵部皆請逮鍾帝以鍾為國繕邊不當罪停俸三月正德元年由巡撫貴州召督漕運兼巡撫江北明年就進右都御史蘇松浙江運舟由下港口及孟瀆河泝大江以達瓜洲遠涉二百八十餘里往往遭風濤鍾言孟瀆對江有夾河可抵白塔河口舊置四閘徑四十里至宜陵鎮再折而北即抵揚州運河開濬為便從之改掌南京都察院就遷刑部尚書四年冬加太子少保兼左都御史掌院事五年春湖廣歲饑盜起命鍾以本官總制軍務陝西河南四川亦隸焉沔陽賊楊清丘仁等僭稱天王將軍出沒洞庭間圍岳州陷臨湘官軍屢失利鍾及總兵官毛倫檄都指揮潘勳柴奎布政使陳鎬副使蔣昇擊破之於麻穰灘擒斬七百四十餘人賊遂平初鍾掌院事劉瑾方熾及瑾誅言官劾鍾徇瑾撻御史朝議以鍾討賊置不問時保寧賊藍廷瑞自稱順天王鄢本恕自稱刮地王其黨廖惠稱掃地王衆十萬餘置四十八總管延蔓陝西湖廣之境廷瑞與惠謀據保寧本恕謀據漢中取鄖陽由荊襄東下巡撫林俊方議遏通江而惠已至攻陷其城殺參議黃瓚僉事錢朝鳳等遁去適官軍自他郡還賊疑援兵至亦遁俊益發羅回及石砫土兵助朝鳳進剿參議公勉仁亦會龍灘河漲賊半渡羅回奮擊之擒斬八百餘人墜崖溺水甚衆俊復遣知府張敏何珊等追之獲惠餘衆奔陝西西鄉鍾乃下令招撫歸者萬餘人既而賊收散亡陷營山殺僉事王源縱掠蓬劍二州鍾赴四川與俊議多不合軍機牽制賊益熾已乃檄陝西湖廣河南兵分道進湖廣兵先追及於陝西石泉廷瑞走漢中都指揮金冕圍之陝西巡撫藍章方駐漢中廷瑞遣其黨何虎詣章乞還川就撫章以廷瑞本川賊恐急之必致死陝且受患遂令冕護之出境廷瑞既入川求降鍾等令至東鄉聽撫賊意在緩師遷延累月依山結營耍求營山縣或臨江市屯其衆遣官為質鍾令漢中通判羅賢入其營本恕來謁約既定會官軍有殺其樵採者賊復疑懼遂殺賢剽如故官軍為七壘守之賊不得逸其黨漸潰廷瑞以所掠女子詐為己女結婚於永順土舍彭世麟冀得間逸去世麟密白鍾鍾授方略使圖之及期廷瑞本恕暨其黨王金珠等二十八人咸來會伏發悉就擒惟廖麻子得脫其衆聞變驚潰渡河鍾遣兵追擊俘斬七百餘人以功進太子太保未幾廖麻子及其黨曹甫掠營山蓬州七年總兵官楊宏副使張敏馬昊何珊等合擊之賊勢蹙鍾乃議招撫敏以單騎詣甫營甫聽命遂赴軍門受約束歸散其黨而麻子忿甫背己殺之幷其衆轉掠川東官軍不敢擊潛躡賊後馘良民為功土兵虐尤甚時有謠曰賊如梳軍如篦土兵如巡按御史王綸紀功御史汪景芳劾鍾縱兵不戢綸復奏鍾樂飲縱遊致賊自合州渡江陷州縣詔召鍾還以彭澤代鍾遂乞歸嘉靖三年卒諡襄惠陳鎬會稽人成化二十三年進士既平賊就遷右副都御史巡撫湖廣蔣昇祁陽人鎬同年進士陳金字汝礪應城人徙武昌祖坦夔州知府父琳廣西僉事金舉成化八年進士除婺源知縣擢南京御史弘治初出按浙江還因災異劾文武大僚十九人侍郎丁永中南京大理卿吳道宏南寧伯毛文等多罷去尋遷山西副使歷雲南左布政使討平竹子箐叛苗十三年就拜右副都御史巡撫其地孟養酋思祿與孟密酋思揲搆兵積年金奉詔發緬甸干崖隴川南甸諸部兵聚糧十二萬為征討計而遣參議郭緒往撫之思祿懼遂罷兵修貢金以功賚銀幣貴州兵敗賊婦米魯米魯退攻平夷衛及大河扼勒諸堡金發兵連破之增俸一等召為南京戶部右侍郎正德改元給事中周璽等劾不職大臣金與焉詔不問金以母老乞歸不允尋以右都御史總督兩廣軍務時內臣韋霦等建議請輸兩廣各司所貯銀於京師金疏不可詔留二十餘萬馬平洛容僮猖獗金偕總兵官毛銳發兵十三萬征之俘斬七千餘人進左都御史斷藤峽苗時出剽金念苗嗜魚鹽可以利縻也乃立約束令民與苗市改峽曰永通苗性貪而黠初陽受約既乃不予直殺掠益甚潯州人為語曰永通不通來葬江中誰其作者噫陳公蓋咎金失計也三年十月遷南京戶部尚書明年冬召為左都御史未聞命以母喪歸六年二月江西盜起詔起金故官總制軍務南畿浙江福建廣東湖廣文武將吏俱隸焉許便宜從事都指揮以下不用命者專刑戮當是時撫州則東鄉賊王鈺五徐仰三傅傑一揭端三等南昌則姚源賊汪澄二王浩八殷勇十洪瑞七等瑞州則華林賊羅光權陳福一等而贛州大帽山賊何積欽等又起官軍累年不能克金以屬郡兵不足用奏調廣西狼土兵明年二月先進兵東鄉遣參議徐蕃等分屯要害而令副總兵張勇土官岑瑬岑猛各統官兵目兵擊賊熟塘進戰南追敗之赤岸蔭嶺擒仰三馘鈺五等克柵二百六十五斬首萬一千六百餘級俘七百五十餘人五月移師姚源令參政董朴吳廷舉等分營餘干安仁貴溪鄱陽樂平遏賊而親統大軍搗其巢勇十重創死會張勇以目兵至毒弩射殺瑞七成七等俘斬共五千餘人七月乘勝斬光權華林賊盡平又督副使王秩等擊大帽山賊獲積欽俘斬千七百餘人半歲間剿賊幾盡遂即東鄉立縣並立萬年縣招降人居之前後每奏捷輒賜璽書嘉勞賚銀幣加太子少保廕子錦衣世百戶金累破劇賊然所用目兵貪殘嗜殺剽掠甚於賊有巨族數百口闔門罹害者所獲婦女率指為賊屬載數千艘去民間謠曰土賊猶可土兵殺我金亦知民患之方倚其力不為禁又不能持廉軍資頗私入功雖多士民皆深怨焉東鄉之役瑬兵縱弩射趫捷若飛賊大窘瑬兵耍賞千金金靳不予乃縱賊使逸桀黠者多不死尚數千人金急欲成功遂下令招撫其破姚源賊也金喜謂功在旦夕與將吏置酒高會賊覘諸耍害無守者乃悉所有賂目兵乘暮遁去時賊絕爨已三日自分必死沿途棄稚弱散婦女及抵貴溪始得一飽食遂轉掠衢徽間金知失策亦下令招降賊首王浩八等故偽降以緩官兵攻剽如故卒不能盡賊紀功給事中黎奭及兩京言官交章劾金乃召金還以俞諫代金遂請終喪去十年再起督兩廣軍務府江賊王公珣等為亂金集諸道兵偕總兵官郭勛等分六路討之斬公珣大有所俘獲加少保太子太保廕子如初復以饒平捷詔子先受廕者進一秩金承召還朝道得疾歸詔強起之十四年冬入掌都察院事世宗立請老命乘傳還久之卒俞諫字良佐桐廬人父藎舉進士官御史按江西治外戚王氏萬氏宗族恣橫罪坐事謫澧州判官大築陂堰溉田可萬頃累遷鄖陽知府諫舉弘治三年進士授長清知縣擢南京御史遷河南僉事擒嵩賊呂梅歷江西參議平大帽山賊遷廣東副使中道召為大理少卿正德六年擢右僉都御史治水蘇杭諸府修治圩塘民享其利尋進右副都御史提督操江八年春姚源降賊王浩八叛詔以諫代陳金督江西浙江福建諸軍討之時浩八衆萬餘屯浙江開化為同知伍文定等所敗遁還江西德興以所執都指揮白弘江洪為質求撫於按察使王秩秩受之為傳送姚源浩八奔據貴溪裴源山餘衆復集連營十里諫令秩與副使胡世寧參政吳廷舉列屯要害斷其歸路而躬與都督李鋐乘夜冒雨潛進大破之俘斬數千人遂擒浩八其黨潰走玉山諫與南贛巡撫周南江西巡撫任漢復擊斬七百餘人餘賊奔姚源諫督廷舉等進剿逼擒之諫懲金失一意用兵而任漢懦先為布政使嘗贊金主撫雖亟上首功追賊緩餘黨復起先是東鄉賊為金所敗乞降隸世寧號新兵而剽掠如故既懼罪復叛遣參將桂勇等討擒之萬年雖立縣賊尚衆吏胥多賊黨官府動息必知之副使李情治峻急衆欲叛畏鋐在餘干不敢發會鋐卒王垂七胡念二等遂作亂殺情及饒州通判陳達秦碧指揮邢世臣等焚廨舍諫發兵擒之亂乃定言官劾諫及漢南兵部請召漢還命諫兼領巡撫明年擊臨川賊斬其魁而遣參將李隆擊新淦賊賊踞萬山中僭稱王且八年隆等深入悉就擒俘斬千七百餘人錄功進諫右都御史巡撫如故劇賊徐九齡者初嘯聚建昌醴源已出沒江湖間積三十年黃州德安九江安慶池州太平咸被其害諫討斬之羣盜悉平寧王宸濠諷御史張鰲山劾諫十一年召還遂乞致仕嘉靖改元用薦起故官總督漕運青州礦盜王堂等起顏神鎮流劫東昌兗州濟南都指揮楊紀及指揮楊浩等擊之浩死紀僅免詔責山東將吏於是諸臣分道逐賊賊不復屯聚流劫金鄉魚臺間突曹州欲渡河不得復掠考城並河西岸至東明長垣河南及保定守臣咸告急賊黨王友賢等轉掠祥符封丘南抵徐州廷議以諸道巡撫權位相埒乃命諫與都督魯綱並提督兩畿山東河南軍務以便宜節制諸道兵討之賊復流至考城官軍方欲擊而河南降賊張進引三百騎馳至中都留守顏愷與俱前方戰進忽三麾其旗先却賊乘之官軍大潰將士死者八百餘人諫等連營進賊始滅其秋召掌都察院事踰年卒官贈太子太保諡莊襄周南字文化縉雲人成化十四年進士除六合知縣擢御史出按畿輔弘治初再按廣東劾總兵官柳景歷江西右布政使擢右副都御史巡撫大同武宗初立寇入宣府參將陳雄等邀擊敗之錄功增南俸一秩母喪歸正德三年劉瑾擅政以大同倉粟有浥爛者逮南及督糧郎中孫祿下詔獄械送大同責倍輸會赦大同總兵官葉椿等為請免其倍數輸畢釋為民瑾誅以故官撫宣府不就引病歸明年起督南贛軍務南贛巡撫之設自南始汀州大帽山賊張時旺黃鏞劉隆李四仔等聚衆稱王攻剽城邑延及江西廣東之境數年不靖官軍討之輒敗推官莫仲昭知縣蔣璣指揮楊澤等被執賊勢愈熾南集諸道兵擊之龍牙擒時旺義民林富別擊斬鏞於鐵坑其他諸砦為指揮孫堂等所破而副使楊璋僉事淩相等亦擊隆四仔擒之先後斬獲五千人仲昭等得逸還捷聞賜敕奬勞南乃移師會總督陳金共平姚源諸賊境內遂寧九年春進右都御史總督兩廣軍務踰年乞歸卒贈太子少保孫祿棲霞人弘治九年進士由戶部主事歷郎中瑾敗起故官累遷至應天府尹馬昊本姓鄒字宗大寧夏人弘治十二年進士由行人選御史正德初遷山東僉事坐累謫真定推官境內數有盜昊教吏士習射廣設方略盜發輒獲再坐累謫判開州真定吏民伏闕請留乃免遷四川僉事昊長身驍捷善騎射知兵巨寇方四曹甫等方熾洪鍾討之久無功昊至閱所部笑曰將不知兵其何以戰於是擇健卒千人分數隊隊立長教之會甫將襲江津昊從巡撫林俊剿賊大敗之俘斬及焚死者二千餘人明年方四陷江津破綦江薄重慶昊夜出百騎舉火擊賊賊驚潰乘之斬獲多遂合羅回土兵搏賊賊陳左而伏兵其右昊以正兵當左身率百騎搗其伏伏潰趨左左亦潰四奔婺川與甫相攻衆遂散四變姓名走為他將所獲昊再被奬進副使與總兵官楊宏擊敗甫甫降而其黨廖麻子併其衆連陷銅梁榮昌坐奪冠帶時洪鍾已召還巡撫高崇熙恇怯復主撫麻子等陽受約崇熙遽罷諸軍令副使張敏徙開縣臨江市民空其地處之許給復三年為請於朝昊力爭謂臨江市蜀襟喉上達重下連湖湘地土饒衍奈何棄以資賊自遺患崇熙不從昊乃益治兵觀變其明年賊果執敏叛詔逮崇熙而擢昊右僉都御史代之賊圍中江將趨成都昊以五千騎與總督彭澤敗之遊擊閻勳追斬麻子劍州餘衆走推其黨喻思俸為主總兵官陳珣追至富村賊偽降因北渡江襲殺都指揮姚震轉入巴山故巢尋出走大安鎮珣不敢前而陝西兵與賊戰潰賊遂越寧羌犯略陽珣軍鼓譟賊夜走度廣元為官軍所遏還趨通巴招餘黨諸將率稱病不擊賊詔逮珣且讓昊昊乃與彭澤督諸軍獲思俸西鄉山中復與澤平內江賊駱松祥羣盜悉靖錄功進副都御史十年亦不剌寇松潘番人磨讓六少等乘機亂為之鄉導西土大震昊招土番為間發兵掩擊之千戶張倫等夜率熟番攻破賊獲磨讓六少亦不剌遁去昊以松潘地險阻番人往往邀劫饋運乃督參將張傑等修築牆柵自三舍堡至風洞關凡五十里賜敕褒之烏蒙芒部二府壤接筠連珙縣圍亙千里山箐深阻諸蠻僰人子羿子仲家子苗子倮佫等雜居其中有僰人子普法惡者通漢語曉符籙妄言彌勒出世自稱蠻王煽諸夷作亂流民謝文禮謝文義應之都指揮杜琮戰敗文義奪其冑十二年昊督指揮曹昱進討法惡敗走保青山砦昊分據水口絕其汲道闕南方圍待之賊乏水渴突南圍官軍遮擊法惡中流矢死諸蠻大奔以功再進右都御史廕子錦衣世百戶昊有才氣能應變揮霍自喜所向輒有功然官川中久狎其俗銳意立功名卒以是敗先是亦不剌既遁昊移兵攻小東路番砦未下茂州羣蠻懼見侵遂糾生苗圍城堡參將芮錫等討之兵敗指揮龐昇等皆死又嘗遣副總兵張傑副使吳澧擊松潘南北二路番不利亡軍士三千餘人匿不以聞僰蠻平不置戍守遽班師請改高縣為州設長吏增高珙筠連田租千八百石令指揮魏武度田奪降人業給之軍民而珙縣知縣步梁窺昊意誘殺降人阿尚杜琮以亡冑故怨文義潛使人購其頭於是文義乘羣蠻怨嗾之遂大訌攻高慶符二縣破其城琮率兵禦之又敗死傷七百人自黎雅以西天全六番皆相繼亂南京給事中孫懋暨巡按御史盧雍黎龍先後劾昊十四年遂遣官逮昊行至河南疏稱疾篤留於家世宗即位始就逮尋削籍歸楊一清胡世寧薦之為桂艹口咢所駁而止久之卒贊曰何鑑綰中樞能任諸將滅賊蓋其時楊廷和在政府閣部同心故克奏効云爾馬中錫雅負時望而軍旅非其所長適用取敗然觀劉宸阻降之言亦可以觀朝事矣陸完交結之罪浮於首功得從八議有佚罰焉洪鍾陳金威略甚著而土兵之謠聞之心惻斯又統戎旃者所當留意也
