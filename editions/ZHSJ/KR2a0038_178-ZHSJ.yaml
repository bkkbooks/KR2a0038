body:
  text: 明史卷一百七十八列傳第六十六項忠韓雍余子俊阮勤朱英秦紘項忠字藎臣嘉興人正統七年進士授刑部主事進員外郎從英宗陷於瓦剌令飼馬乘間挾二馬南奔馬疲棄之徒跣行七晝夜始達宣府景泰中由郎中遷廣東副使按行高州諜報賊攜男女數百剽村落忠曰賊無攜家理必被掠良民也戒諸將毋妄殺已訊所俘獲果然盡釋之從征瀧水瑤有功增俸一秩天順初歷陝西按察使母憂歸部民詣闕乞留詔起復時陝西連歲災傷忠發廩振且請輕罪納米民賴以濟七年以大理卿召民乞留如前遂改右副都御史巡撫其地洮岷羌叛忠疏言羌志在劫掠盡誅則傷仁遽撫則不威請聽臣便宜從事報可乃發兵據險揚聲進討衆盡降西安水泉鹵不可飲為開龍首渠及皁河引水入城又疏鄭白二渠溉涇陽三原醴泉高陵臨潼五縣田七萬餘頃民祠祀之陝西數苦兵成化元年上言三邊大將遇敵逗留雖云才怯亦由權輕士卒畏敵不畏將是以戰無成功宜許以軍法從事廟堂舉將才踰年不聞有一人應詔陝西風土強勁古多名將豈無其人但格於不能答策耳今天下學校生徒善答策者百不一二奈何責之武人帝善其言而所司守故事不能用毛里孩寇延綏詔忠偕彰武伯楊信禦之無功明年信議大舉搜河套敕忠提督軍務忠方赴延綏而寇復陷開城深入靜寧隆德六州縣大掠而去兵部劾忠帝特宥之搜套師亦不出又明年召理院事四年滿俊反滿俊者亦名滿四其祖巴丹自明初率所部歸附世以千戶畜牧為雄長仍故俗無科徭其地在開城縣之固原里接邊境俊獷悍素藏匿姦盜出邊抄掠會有獄連俊有司跡逋至其家多要求俊怒遂激衆為亂守臣遣俊姪指揮璹往捕俊殺其從者劫璹叛入據石城石城即唐吐番石堡城稱險固非數萬人不能克者也山上有城砦四面峭壁中鑿五石井以貯水惟一徑可緣而上俊自稱招賢王有衆四千都指揮邢端等禦之敗績不再月衆至二萬關中震動乃命忠總督軍務與監督軍務太監劉祥總兵官都督劉玉帥京營及陝西四鎮兵討之師未行而巡撫陳价等先以兵三萬進討復大敗賊因官軍器甲勢益張朝議欲益兵忠慮京軍脆弱不足恃且更遣大將撓事權因上言臣等調兵三萬三千餘人足以滅賊今秋深草寒若更調他軍恐往復需時賊得遠遁且邊兵不能久留益兵非便大學士彭時商輅主其議京軍得毋遣忠遂與巡撫都御史馬文升分軍七道抵石城下與戰斬獲多伏羌伯毛忠乘勝奪其西北山幾破忽中流矢死玉亦被圍諸軍欲退忠斬一千戶以徇衆力戰玉得出乃列圍困之適有星孛於台斗中朝多言占在秦分師不利忠曰李晟討朱泚熒惑守歲此何害日遣兵薄城下焚芻草絕汲道賊窘欲降邀忠與文升相見忠偕劉玉單騎赴之文升亦從數十騎至呼俊璹諭以速降賊遙望羅拜忠直前挾璹以歸俊氣沮猶豫不出忠命縛木為橋人負土囊填濠塹擊以銅礮死者益衆賊倚愛將楊虎貍為謀主夜出汲被擒忠貰其死諭以購賊賞格示之金且賜金帶鈎縱歸使誘俊出戰伏兵擒焉急擊下石城盡獲餘寇毀其城鑿石紀功增一衞於固原西北西安廢城留兵戍之而還初石城未下天甚寒士卒頗困忠慮賊奔突乘凍渡河與套寇合日夜治攻具身當矢石不少避大小三百餘戰彭時商輅知忠能辦賊不從中制卒用殄賊論功進右都御史與林聰協掌院事白圭既平劉通荊襄間流民屯結如故通黨李鬍子者名原偽稱平王與小王洪王彪等掠南漳房內鄉渭南諸縣流民附賊者至百萬六年冬詔忠總督軍務與湖廣總兵官李震討之忠乃奏調永順保靖土兵而先分軍列要害多設旗幟鉦鼓遣人入山招諭流民歸者四十餘萬彪亦就擒時白圭為兵部遣錦衣百戶吳綬贊參將王信軍綬欲攘功不利賊瓦解縱流言圭信之止土兵毋調忠疏爭且劾綬罪帝為召綬還而聽調土兵如故合二十五萬分八道逼之流民歸者又數萬賊潛伏山砦伺間出劫忠命副使余洵都指揮李振擊之遇於竹山乘溪漲半渡截擊擒李原小王洪等賊多溺死忠移軍竹山捕餘孽復招流民五十萬斬首六百四十俘八百有奇家口三萬餘人戶選一丁戍湖廣邊衞餘令歸籍給田疏陳善後十事悉允行忠之下令逐流民也有司一切驅逼不前即殺之民有自洪武中占籍者亦在遣中戍者舟行多疫死給事中梁璟因星變求言劾忠妄殺白圭亦言流民既成業者宜隨所在著籍又駁忠所上功次互異帝皆不聽進忠左都御史廕子綬錦衣千戶諸將錄功有差忠上疏言臣先後招撫流民復業者九十三萬餘人賊黨遁入深山又招諭解散自歸者五十萬人俘獲百人皆首惡耳今言皆良家子則前此屢奏猖獗難禦者伊誰也賊黨罪固當死正因不忍濫誅故令丁壯謫發遣戍其久附籍者或乃占山四十餘里招聚無賴千人爭鬬劫殺若此者可以久居故不遣乎臣揭榜曉賊謂已殺數千蓋張虛勢怵之非實事也且圭固嘗身任其事今日之事又圭所遺先時中外議者謂荊襄之患何日得寧今幸平靖而流言沸騰以臣為口實昔馬援薏苡蒙謗鄧艾檻車被徵功不見錄身更不保臣幸際聖明願賜骸骨勿使臣為馬鄧之續帝溫詔答之八年召還與李賓協掌院事後二年拜刑尚書尋代圭為兵部汪直開西廠恣橫忠屢遭侮不能堪會大學士商輅等劾直忠亦倡九卿劾之奏留中而西廠遂罷直深恨之未幾西廠復設直以吳綬為腹心綬挾前憾伺忠益急忠不自安乞歸治病未行而綬嗾偵事者誣忠罪給事中郭鏜御史馮貫等復交章劾忠事連其子經太監黃賜興寧伯李震彰武伯楊信等詔法司會錦衣衞廷鞫忠抗辯不少屈然眾知出直意無敢為之白者竟斥為民賜與震等亦得罪直敗復官致仕家居二十六年至弘治十五年乃卒年八十二贈太子太保諡襄毅忠倜儻多大略練戎務彊直不阿敏於政事故所在著稱子經經子錫錫子治元皆舉進士經江西參政錫南京光祿寺卿治元員外郎韓雍字永熙長洲人正統七年進士授御史負氣果敢以才略稱錄囚南畿碭山教諭某笞膳夫膳夫逃匿父訴教諭殺其子取他尸支解以證既誣服雍踪跡得之白其冤出巡河道已巡按江西黜貪墨吏五十七人廬陵太和盜起捕誅之十三年冬處州賊葉宗留自福建轉犯江西官軍不利都督僉事陳榮指揮劉真遇伏死詔雍及鎮守侍郎楊寧督軍民協守會福建巡按御史汪澄牒隣境會討賊鄧茂七俄以賊議降止兵雍曰賊果降退未晚也趨進賊已叛澄坐得罪死人以是服雍識景泰二年擢廣東副使大學士陳循薦為右僉都御史代楊寧巡撫江西歲饑奏免秋糧劾奏寧王不法事王府官皆得罪時雍年甫三十赫然有才望所規畫措置咸可為後法天順初罷天下巡撫官改山西副使寧王以前憾劾其擅乘肩輿諸事下獄奪官起大理少卿尋復為右僉都御史佐寇深理院事石亨既誅錦衣指揮劉敬坐飯亨直房用朋黨律論死雍言律重朋黨謂阿比亂朝政也以一飯當之豈律意且亨盛時大臣朝夕趨門不坐獨坐敬何也深歎服出之母憂起復四年巡撫宣府大同七年議事入覲帝壯其貌留為兵部右侍郎憲宗立坐學士錢溥累貶浙江左參政廣西瑤僮流剽廣東殘破郡邑殆徧成化元年正月大發兵拜都督趙輔為總兵官以太監盧永陳瑄監其軍兵部尚書王竑曰韓雍才氣無雙平賊非雍莫可乃改雍左僉都御史贊理軍務雍馳至南京集諸將議方略先是編修丘濬上書大學士李賢言賊在廣東者宜驅在廣西者宜困欲宿兵大藤峽扼其出入蹂其禾稼期一二年盡賊賢善之獻於朝詔錄示諸將諸將主其說請令遊擊將軍和勇率番騎趨廣東而大軍直趨廣西分兵撲滅雍曰賊已蔓延數千里而所至與戰是自敝也當全師直搗大藤峽南可援高肇雷廉東可應南韶西可取柳慶北可斷陽峒諸路首尾相應攻其腹心巢穴既傾餘迎刃解耳舍此不圖而分兵四出賊益奔突郡邑益殘所謂救火而噓之也衆曰善輔亦知雍才足辦賊軍謀一聽雍雍等遂倍道趨全州陽峒苗掠興安擊破之至桂林斬失機指揮李英等四人以徇按地圖與諸將議曰賊以修仁荔浦為羽翼當先收二縣以孤賊勢乃督兵十六萬人分五道先破修仁賊窮追至力山擒千二百餘人斬首七千三百級荔浦亦定十月至潯州延問父老皆曰峽天險不可攻宜以計困雍曰峽延廣六百餘里安能使困兵分則力弱師老則財匱賊何時得平吾計決矣遂長驅至峽口儒生里老數十人伏道左願為嚮導雍見即罵曰賊敢紿我叱左右縛斬之左右皆愕既縛而袂中利刃出推問果賊也悉支解刳腸胃分挂林箐中纍纍相屬賊大驚曰韓公天神也雍令總兵官歐信等為五哨自象州武宣攻其北身與輔督都指揮白全等為八哨自桂平平南攻其南參將孫震等為二哨從水路入而別分兵守諸隘口賊魁侯大狗等大懼先移其累重於桂州橫石塘而立柵南山多置滾木礧石鏢鎗藥弩拒官軍十二月朔雍等督諸軍水陸並進擁團牌登山殊死戰連破石門林峒沙田古營諸巢焚其室廬積聚賊皆奔潰伐木開道直抵橫石塘及九層樓諸山賊復立柵數重憑高以拒官軍誘賊發矢石度且盡雍躬督諸軍緣木攀藤上別遣壯士從間道先登據山頂舉礮賊不能支遂大敗先後破賊三百二十四砦生擒大狗及其黨七百八十人斬首三千二百有奇墜溺死者不可勝計峽有大藤如虹橫亙兩厓間雍斧斷之改名斷藤峽勒石紀功而還分兵擊餘黨鬱林陽江洛容博白次第皆定帝大喜賜敕嘉勞召輔等還遷雍左副都御史提督兩廣軍務雍乃散遣諸軍以省饋餉而遺孽侯鄭昂等遂乘虛陷潯州及洛容北流二縣雍被劾引罪帝宥之雍益發兵撲討時諸賊所在蜂起思恩潯賓柳城悉被擾掠流菍至廣東欽化二州皆應時破殄四年春雍以兩廣地大事殷請東西各設巡撫帝可之命陳濂撫廣東張鵬撫廣西而雍專理軍事尋以憂歸明年兩廣盜復起僉事陶魯言兩廣地勢錯互當如臂指相使不可離析近賊犯廣西臣與廣東三司議調兵匝月未決盜賊無所憚乞仍命大臣總督便會僉事林錦巡按御史龔晟亦以為請乃罷兩巡撫而起復雍右都御史總督如故又明年正月雍疏辭新命乞終制不許雍抵任遣參將張壽遊擊馮昇等分道討賊忻州八砦蠻及諸山瑤僮掠州縣者皆摧破之蠻民素懾雍威寇盜寖息九年柳潯諸蠻復叛參將楊廣等俘斬九百人方更進而賊破懷集縣兵部劾雍奏報不實廣西鎮守中官黃沁素憾雍抑己因訐雍且言其貪欲縱酒濫賞妄費帝遣給事中張謙等往勘而廣西布政使何宜副使張斅銜雍素輕己共醞釀其罪謙還奏事虛實交半竟命致仕去雍洞達闓爽重信義撫江西時請追諡文天祥謝枋得詔諡天祥忠烈枋得文節有雄略善斷動中事機臨戰率躬親矢石不目瞬自奉尊嚴三司皆長跪白事軍門設銅鼓數十儀節詳密裨將以下繩柙無所假兩地鎮守宦官素驕恣亦惕息無敢肆疾惡嚴坦中不為崖岸揮斥財帛不少惜故雖令行禁止民得安堵而謗議亦易起為中官所齮齕公論皆不平兩廣人念雍功尤惜其去為立祠祀焉家居五年卒年五十七正德間諡襄毅初以軍功予一子錦衣百戶雍以授其弟睦至是錄一子國子生余子俊字士英青神人父祥戶部郎中子俊舉景泰二年進士授戶部主事進員外郎在部十年以廉幹稱出為西安知府歲饑發廩十萬石振貸區畫以償官不損而民濟成化初所司上治行當旌者知府十人而子俊為首以林聰薦為陝西右參政歲餘擢右布政使六年轉左調浙江甫半載拜右副都御史巡撫延綏先是巡撫王銳請沿邊築牆建堡為久遠計工未興而罷子俊上疏言三邊惟延慶地平易利馳突寇屢入犯獲邊人為導徑入河套屯牧自是寇顧居內我反屯外急宜於沿邊築牆置堡況今舊界石所在多高山陡厓依山形隨地勢或剷削或壘築或挑塹緜引相接以成邊牆於計為便尚書白圭以陝民方困奏緩役既而寇入孤山堡復犯榆林子俊先後與朱永許寧擊敗之是時寇據河套歲發大軍征討卒無功八年秋子俊復言今征套士馬屯延綏者八萬芻茭煩內地若今冬寇不北去又須備來年軍資姑以今年之數約之米豆需銀九十四萬草六十萬每人運米豆六斗草四束應用四百七萬人約費行資八百二十五萬公私煩擾至此安得不變計臣前請築牆建堡詔事寧舉行請於明年春夏寇馬疲乏時役陝西運糧民五萬給食興工期兩月畢事圭猶持前議阻之帝是子俊言命速舉子俊先用軍功進左副都御史明年又用紅鹽池搗巢功進右都御史寇以搗巢故遠徙不敢復居套內地患稍息子俊得一意興役東起清水營西抵花馬池延袤千七百七十里鑿崖築牆掘塹其下連比不絕每二三里置敵臺崖砦備巡警又於崖砦空處築短牆橫一斜二如箕狀以瞭敵避射凡築城堡十一邊墩十五小墩七十八崖砦八百十九役軍四萬人不三月而成牆內之地悉分屯墾歲得糧六萬石有奇十年閏六月子俊具上其事因以母老乞歸慰留不許初延綏鎮治綏德州屬縣米脂吳堡悉在其外寇以輕騎入掠鎮兵覺而追之輒不及往往得利去自子俊徙鎮榆林增衞益兵拓城置戍攻守器畢具遂為重鎮寇抄漸稀軍民得安耕牧焉十二年十二月移撫陝西子俊知西安時以居民患水泉鹹苦鑿渠引城西潏河入灌民利之久而水溢無所洩至是乃於城西北開渠洩水使經漢故城達渭公私益便號余公渠又於涇陽鑿山引水溉田千餘頃通南山道直抵漢中以便行旅學校公署圮者悉新之奏免岷河洮三衞之戍南方者萬有奇易置南北之更戍者六千有奇就戍本土岷州栗林羌為寇子俊潛師設伏擊走之十三年召為兵部尚書奏申明條例十事又列上軍功賞格由是中外有所遵守緬甸酋卜剌浪欲奪思洪發貢章地設詞請於朝子俊言不宜許乃諭止之貴州巡撫陳儼等以播州苗竊發請調湖廣廣西四川兵五萬合貴州兵會剿子俊言賊在四川而貴州請討是邀功也奏寢其事初子俊論陳鉞掩殺貢夷罪帝以汪直故宥之鉞多方搆子俊於直會母憂歸得免子俊之築邊牆也或疑沙土易傾寇至未可恃至十八年寇入犯許寧等逐之寇扼於牆塹散漫不得出遂大衄邊人益思子俊功服闋拜戶部尚書尋加太子太保二十年命兼左副都御史總督大同宣府軍務其冬還朝明年正月星變陳時弊八事帝多采納未幾復出行邊初子俊巡歷宣大請以延綏邊牆法行之兩鎮因歲歉而止比復出銳欲行之言東起四海冶西抵黃河延袤千三百餘里舊有墩百七十應增築四百四十墩高廣皆三丈計役夫八萬六千數月可成詔明年四月即工然是時歲比不登公私耗敝驟興大役上下難之子俊又欲責成於邊臣而己不親其事謗議由是起至冬疏請還京帝入蜚語命改左都御史巡撫大同中官韋敬讒子俊假修邊多侵耗又劾子俊私恩怨易將帥兵部侍郎阮勤等為白帝怒讓勤等而給事御史復交章劾中朝多欲傾子俊工部侍郎杜謙等往勘平情按之還奏易置將帥如勤等言所費無私然為銀百五十萬米菽二百三十萬耗財煩民不得無罪遂落太子太保致仕去時二十二年二月也明年正月兵部缺尚書帝悟子俊無罪復召任之仍加太子太保孝宗嗣位以先朝老臣待之彌厚弘治元年疏陳十事已又上邊防七事帝多允行明年疾亟猶手削奏稿陳救荒弭盜之策甫得請而卒年六十一贈太保諡肅敏子俊沉毅寡言有偉略凡奏疏公移必自屬草每夜分方寢嘗曰大臣謀國當身任利害豈得遠怨市恩為自全計故榆林始事怨讟叢起子俊持之益堅竟以成功為數世利性孝友居母憂時令子寘毋會試曰雖無律令吾心不忍也當廕子移以廕弟子寰舉進士終戶部員外郎寘就武廕為錦衣千戶終指揮同知曾孫承勛承業皆進士承勛翰林修撰承業雲南僉事阮勤本交阯人其父內徒占籍長子勤舉景泰五年進士歷台州知府清慎有惠政賜誥旌異以右副都御史巡撫陝西築墩臺十四所治垣塹三十餘里歲饑奏免七府租四十餘萬石入為侍郎調南京刑部蠻邦人著聲中國者勤為最朱英字時傑桂陽人五歲而孤力學舉正統十年進士授御史浙閩盜起簡御史十三人與中官分守諸府英守處州而葉宗留黨四出剽掠處州道梗英間道馳至撫降甚衆戮賊首周明松等賊散去乃還景泰初御史王豪嘗以勘陳循爭地事忤循為所訐至是循草詔言風憲官被訐者雖經赦宥悉與外除於是豪當改知縣英言若如詔書則凡遭御史抨擊之人皆將挾讐誣訐而御史愈緘默不言矣章下法司請如英言乃復豪職未幾出為廣東右參議過家省母橐中惟賜金十兩抵任撫凋瘵流亡立均徭法十歲一更民稱便天順初兩廣賊愈熾諸將多濫殺冒功巡撫葉盛屬英督察參將范信誣宋泰永平二鄉民為賊屠戮殆盡又欲屠進城鄉英馳訊悉縱去信忿留師不還英密請於盛檄信班師一方始靖潮州賊羅劉寧等流劫遠近屢挫官兵英會師破滅之還所掠人口數千別置一營以處婦女人莫敢犯官參議十年進右參政遭母憂成化初服闋補陝西大軍討滿四英主饋餉有功歷福建陝西左右布政使皆推行均徭法十年以右副都御史巡撫甘肅先後陳安邊二十八事其請徙居戎安流離簡貢使於時務尤切明年冬兩廣總督吳琛卒廷議以英前在廣東有威信遂以代琛自韓雍大征以來將帥喜邀功利俘掠名為鵰剿英至鎮以寧靜約飭將士毋得張賊聲勢妄請用師招撫瑤僮效順者定為編戶給復三年於是馬平陽朔蒼梧諸縣蠻悉望風附而荔波賊李公主有衆數萬久負固亦遣子納款為置永安州處之俾其子孫世吏目自是歸附日衆凡為戶四萬三千有奇口十五萬有奇帝甚嘉之鎮守中官與督撫總兵官坐次中官居中總督居總兵官左時總兵官陳政以伯爵欲抑英居右英不可奏乞裁定命解英總督止為巡撫居政下尚書余子俊言英招徠功多當增秩褒賞乃反削其事權恐無以鎮諸蠻乃擢英右都御史仍總督位次如故田州酋黃明烝其知府岑溥祖母欲殺溥溥出走思恩明因肆屠戮英將進討檄溥族人恩城知州岑欽殺明雪恥欽遂誅明幷其族屬傳首軍門英淳厚然持法無所假借與市舶中官韋眷忤眷摭奏英專權玩賊潯州知府史芳以事見責亦訐英奸貪欺罔按皆無驗乃鐫芳二官論眷協和共事十六年交阯攻老撾議者恐其內寇詔問英處置之宜英對言彼不過爭甌脫耳諭之當自悔懼帝從其言果上表謝潯梧高廉賊起偕政等分道擊之再戰俘斬甚衆十九年桂林平樂蠻攻城殺將英政復分兵十二道擊破之明年入掌都察院事尋加太子少保又明年正月星變疏陳八事請禁邊將節旦獻馬鎮守中官武將不得私立莊田侵奪官地燒丹符咒左道之人當置重典四方分守監槍內官勿進貢品物罷撤倉場馬房上林苑增設內侍召還建言得罪諸臣清內府收白糧積弊治奸民投獻莊田及貴戚受獻者罪權倖皆不便執政多持之不行英造內閣力爭竟不能盡從也時流民集京師者多英請人給米月三斗幼者半之報許其年秋卒贈太子太保英為總督承韓雍吳琛後雍雖有大功恢廓自奉贈遺過侈有司困供億公私耗竭而琛務謹廉至英益持清節僅攜一蒼頭之官先後屢賜璽書金幣英藏璽書貯金幣於庫其威望不及雍而惠澤過之在甘肅積軍儲三十萬兩廣四十餘萬皆不以聞或問之答曰此邊臣常分何足言人服其知大體正德中追諡恭簡子守孚進士刑部郎中秦紘字世纓單人景泰二年進士授南京御史劾治內官傅鎖兒罪諫止江南采翠毛魚等使權貴忌之蜚語聞會考察坐謫湖廣驛丞天順初以御史練綱薦遷雄縣知縣奉御杜堅捕天鵝暴橫紘執杖其從者坐下詔獄民五千詣闕訟乃調知府谷憲宗即位遷葭州知州調秦州母喪去官州人乞借紘服闋還故任尋擢鞏昌知府改西安遷陝西右參政岷州番亂提兵三千破之進俸一級成化十三年擢右僉都御史巡撫山西奏鎮國將軍奇澗等罪奇澗父慶成王鍾鎰為奏辯且誣紘帝重違王意逮紘下法司治事皆無驗而內官尚亨籍紘家以所得敝衣數事奏帝歎曰紘貧一至此耶賜鈔萬貫旌之於是奪奇澗等三人爵王亦削祿三之一而改紘撫河南尋復調宣府小王子數萬騎寇大同長驅入順聖川掠宣府境紘與總兵官周玉等邀擊遁去尋入掠興寧口連戰却之追還所掠璽書勞焉進左僉都御史巡撫如故未幾召還理院事遷戶部右侍郎萬安逐尹旻誣紘旻黨降廣西右參政進福建左布政使弘治元年以王恕薦擢左副都御史督漕運明年三月進右都御史總督兩廣軍務奏言中官武將總鎮兩廣者率縱私人擾商賈高居私家擅理公事賊殺不辜交通土官為奸利而天下鎮守官皆得擅執軍職受民訟非制請嚴禁絕總鎮府故有賞功所歲儲金錢數萬費出無經宜從都御史勾稽廣潮南韶多盜當設社學編保甲以絕盜源帝悉從其請恩城知州岑欽攻逐田州知府岑溥與泗城知州岑應分據其地紘入田州逐走欽還溥於府留官軍戍之亂遂定復遣將討平黎賊陵水瑤賊德慶紘之初涖鎮也劾總兵官安遠侯柳景貪暴逮下獄景亦訐紘勘無左證法司當景死景連姻周太后家有奧援訐紘不已詔幷逮紘廷鞫卒無罪詔宥景死奪爵閒住而紘亦罷歸大臣王恕等請留紘不納廷臣復連章言紘可大用居數月起南京戶部尚書十一年引疾去十四年秋寇大入花馬池敗官軍孔壩溝直抵平涼言者謂紘有威名雖老可用詔起戶部尚書兼右副都御史總制三邊軍務紘馳至固原按行敗所躬祭陣亡將士掩其骼奏錄死事指揮朱鼎等五人恤軍士戰歿者家劾治敗將楊琳等四人罪更易守將練壯士興屯田申明號令軍聲大振初寇未入河套平涼固原皆內地無患自孛來住牧後固原當兵衝為平慶臨鞏門戶而城隘民貧兵力單弱商販不至紘乃拓治城郭招徠商賈建改為州而身留節制之奏言固原主客兵止萬八千人散守城堡二十四勢分力弱宜益兵舊臨鞏秦州諸軍歲赴甘涼備禦及他方有警又調兵甘涼或發京軍征討夫京師天下本邊將手握重兵而一遇有事輒請京軍非強幹弱枝之道請自今京兵毋輕發臨鞏甘涼諸軍亦宜各還本鎮但選知兵宿將一二人各守其地人以戍為家軍以將為命自樂趨役而有戰心計之得者也紘見固原迤北延袤千里閒田數十萬頃曠野近邊無城堡可依議於花馬池迤西至小鹽池二百里每二十里築一堡堡周四十八丈役軍五百人固原迤北諸處亦各築屯堡募人屯種每頃歲賦米五石可得五十萬石規畫已定而寧夏巡撫劉憲為梗紘乃奏曰竊見三邊情形延綏甘涼地雖廣而士馬精強寧夏怯弱矣然河山險阻惟花馬池至固原軍既怯弱又墩臺疏遠敵騎得長驅深入故當增築墩堡韋州豫望城諸處亦然今固原迤南修築將畢惟花馬池迤北二百里當築十堡而憲危言阻衆且廢垂成之功乞令憲制三邊而改臣撫寧夏俾得終邊防於事為便帝下詔責憲憲引罪卒行紘策修築諸邊城堡一萬四千餘所垣塹六千四百餘里固原屹為重鎮紘又以意作戰車名全勝車詔頒其式於諸邊在事三年四鎮晏然前後經略西陲者莫及十七年加太子少保召還視部事以年老連章力辭乞致仕詔賜敕乘傳歸月廩歲隸如制明年九月卒年八十贈少保諡襄毅紘廉介絕俗妻孥菜羹麥飯常不飽性剛果勇於除害不自顧慮士大夫識與不識稱為偉人在兩廣被逮時方議討後山賊治軍事畢從容就道儀衞騶從不貶損既踰嶺始囚服就繫謂官校曰兩廣蠻夷雜處總制體尊遽就拘執損國威今既踰嶺真囚矣其嚴重得體如此正德五年劉瑾亂政紘家奴憾紘婦弟楊瑾以紘所遺火礮投緝事校尉誣瑾畜違禁軍器劉瑾怒歸罪於紘籍其家無所得言官張九涂敬等復希瑾意劾紘士類嗤之贊曰項忠韓雍皆以文學通籍而親提桴鼓樹勳戎馬之場其應機決勝成畫遠謀雖宿將殆無以過豈不壯哉賞不酬勞謠諑繼起文法吏從而繩其後功名之士所為發憤而太息也余子俊盡心邊計數世賴之朱英廉威名粵嶠秦紘經略著西陲文武兼資偉哉一代之能臣矣
