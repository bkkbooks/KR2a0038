body:
  text: 明史卷一百八十列傳第六十八張寧王徽王淵等毛弘丘弘李森魏元康永韶等強珍王瑞張稷李俊汪奎從子舜民崔陞等湯鼐吉人劉㮣董傑姜綰余濬等姜洪歐陽旦暢亨曹璘彭程龐泮呂獻葉紳胡獻武衢等張弘至屈伸王獻臣吳一貫余濂張寧字靖之海鹽人景泰五年進士授禮科給事中七年夏帝從唐瑜等奏考覈南京大小諸臣寧言京師尤根本地不可獨免又言京衞帶俸武職一衞至二千餘人通計三萬餘員歲需銀四十八萬米三十六萬幷他折俸物動經百萬耗損國儲莫甚於此而其間多老弱不嫻騎射之人莫若簡可者補天下都司衞所缺官而悉汰其餘議格不行帝得疾適遇星變詔罷明年元會百官朝參如朔望寧言四方來覲不得一覩天顏疑似之際必至訛言相驚願勉循舊典用慰人心帝疾不能從而奪門之變作天順中曹石竊柄事關禮科者寧輒裁損英宗以是知寧朝鮮與鄰部毛憐衞讐殺詔寧同都指揮武忠往解寧辭義慷慨而忠驍健張兩弓折之射雁一發墜朝鮮人大驚服兩人竟解其讐而還中官覃包邀與相見不往尋擢都給事中憲宗初御經筵請日以大學衍義進講是年十月皇太后生辰禮部尚書姚夔仍故事設齋建醮會百官赴壇行香寧言無益徒傷大體乞禁止帝嘉納之未幾給事中王徽以牛玉事劾大學士李賢得罪寧率六科論救由是寖與內閣忤會王竑等薦寧堪僉都御史清軍職貼黃與岳正並舉得旨會舉多私皆予外任寧出為汀州知府以簡靜為治期年善政具舉寧才高負志節善章奏聲稱籍甚英宗嘗欲重用之不果久居諫垣不為大臣所喜既出守益鬱鬱不得志以病免歸家居三十年言者屢薦終不復召無子有二妾寧沒剪髮誓死樓居不下者四十年詔旌為雙節王徽字尚文應天人天順四年進士除南京刑科給事中憲宗即位數月與同官王淵朱寬李翔李鈞疏陳四事末言自古宦官賢良者少奸邪者多若授以大權致令敗壞然後加刑是始愛而終殺之非所以保全之也願法高皇帝舊制毋令預政典兵置產立業家人義子悉編原籍為民嚴禁官吏與之交接惟厚其賞賚使得豐足無復他望此國家之福亦宦官之福也其冬帝入萬妃譖廢吳后罪中官牛玉擅易中宮讁之南京徽復與淵等劾之曰陛下冊立中宮此何等事而賊臣牛玉乃大肆奸欺中宮既退人情咸謂玉必萬死顧僅斥陪京猶全首領則凡侍陛下左右者將何所忌憚哉內閣大臣身居輔弼視立后大事漠然不以加意方玉欺肆之初婚禮未成禮官畏權輒為阿附及玉事發之後國法難貸刑官念舊竟至苟容而李賢等又坐視成敗不出一言黨惡欺君莫此為甚請幷罪賢等為大臣不忠者戒臣等前疏請保全宦官正欲防患於未萌乃處置之道未聞牛玉之禍果作然往不可諫來猶可追臣等不敢遠引請以近事徵之正統末有王振矣詎意復有曹吉祥天順初有吉祥矣詎意復有牛玉若又不思預防安知後不有甚於牛玉者哉夫宦者無事之時似乎恭慎一聞國政即肆奸欺將用某人也必先賣之以為己功將行某事也必先泄之以張己勢迨趨附日眾威權日盛而禍作矣此所以不可預聞國政也內官在帝左右大臣不識廉恥多與交結餽獻珍奇伊優取媚即以為賢而朝夕譽之有方正不阿者即以為不肖而朝夕讒謗之日加浸潤未免致疑由是稱譽者獲顯讒謗者被斥恩出於內侍怨歸於朝廷此所以不可許其交結也內官弟姪授職任事倚勢為非聚奸養惡廣營財利奸弊多端身雖居內心實在外內外交通亂所由起此所以不可使其子姪在外任職營立家產也臣等職居言路不為苟容雖死無悔惟陛下裁察詔謂妄言邀譽欲加罪諸給事御史交章論救乃並讁州判官徽得貴州普安淵茂州寬潼川翔寧州鈞綏德奏蓋鈞筆也侍郎葉盛編修陳音相繼請留不納最後御史楊琅言尤切幾得罪徽至普安興學校教士始有舉於鄉者卻土官隴暢及白千戶賄治甚有聲居七年棄官歸言者屢薦終以宦官惡之不復錄徽嘗曰今仕者以剛方為刻怠緩為寬學者以持正為滯恬軟為通為文以典雅為膚淺怪異為古健其論治嘗誦張宣公語無求辦事之人當求曉事之人時皆服其切中弘治初吏部尚書王恕薦起陝西左參議踰年謝病還卒年八十三子韋見文苑傳王淵浙江山陰人天順元年進士除南京吏科給事中素伉直終順天府治中朱寬莆田人李翔大足人皆天順元年進士李鈞永新人景泰二年進士寬為南京禮科給事中翔兵科鈞工科既被謫寬進表入京道卒翔鈞皆以判官終毛弘字士廣鄞人登天順初進士六年授刑科給事中成化三年夏偕六科諸臣上言比塞上多事正陛下宵衣旰食時乃聞退朝之暇頗事逸遊礮聲數聞於外非禁城所宜有況災變頻仍兩畿水旱川廣兵革之餘公私交困願省遊戲宴飲之娛停金豆銀豆之賞日御經筵講求正學庶幾上解天怒下慰人心御史展毓等亦以為言皆嘉納帝從學士商輅請改元後建言罷官者悉錄用弘請斷自踐阼而後召還給事中王徽等不許慈懿太后崩詔別葬弘偕魏元等疏諫未得請朝罷弘倡言曰此大事吾輩當以死諫請合大小臣工伏闕固爭眾許諾有退却者給事中張賓呼曰君輩獨不受國恩乎何為首鼠兩端乃伏哭文華門竟得如禮弘在垣中所論列最多聲震朝宁帝頗厭苦之嘗曰昨日毛弘今日毛弘前後所陳或不見聽而弘慷慨論議無所屈欽天監正谷濱受賕當除名命輸贖貶秩正一真人張元吉有罪論死詔繫獄弘等皆固爭終不聽三遷至都給事中得疾暴卒丘弘字寬叔上杭人天順末進士授戶科給事中數陳時政成化四年春偕同官上言洪武永樂間以畿輔山東土曠人稀詔聽民開墾永不科稅邇者權豪怙勢率指為閒田朦朧奏乞如嘉善長公主求文安諸縣地西天佛子劄實巴求靜海縣地多至數十百頃夫地踰百頃古者百家產也豈可徇一人之私情而奪百家產哉帝納其言詔自今請乞皆不許著為令劄實巴所乞地竟還之民弘再遷至都給事中六年夏山東河南大旱弘請振因言四方告災部臣拘成例必覆實始免上雖蠲租下鮮實惠請自今遇災撫按官勘實即與蠲除從之萬貴妃有寵中官梁芳陳喜爭進淫巧奸人屠宗順輩日獻奇異寶石輒厚酬之糜帑藏百萬計有因以得官者都人倣傚競尚侈靡僭擬無度弘偕同官疏論宗順等罪請追還帑金嚴禁侈俗事下刑部尚書陸瑜因請置宗順等於理沒其貲以振饑民帝不許但命僭侈者罪無赦然竟不能禁也京師歲歉米貴而四方游僧萬數弘請驅逐以省宂食又請發太倉米減價以糶給貧民最甚者帝悉從之復言在京百獸房及清河寺諸處所育珍禽野獸日飼魚肉米菽乞並縱放以省宂費報聞明年使琉球道卒弘與毛弘同居言路皆敢言人稱二弘云李森字時茂歷城人天順元年進士授戶科給事中負氣敢言憲宗立上疏請禁朝覲官科斂徵求為民害者吏部尚書王翺請從其言帝為下詔禁止頃之言近有無功而晉侯伯都督者有無才德而位九列者有以畫弈彈琴醫卜技能而得官職者名爵日輕廩祿日費是玩天下之公器棄國家之大柄也自今宜擇人授毋令匪才競進且請嚴軍官黜陟覈逃伍虛糧皆報可御史謝文祥以劾姚夔下獄森偕同官救之不納明年夏日食瓊山縣地震森疏陳十事未幾以貴倖侵奪民產率諸給事言昔奉先帝敕皇親強占軍民田者罪毋赦投獻者戍邊一時貴戚莫敢犯比給事中丘弘奏絕權貴請乞陛下亦既俯從乃外戚錦衣指揮周彧求武強武邑田六百餘頃翊聖夫人劉氏求通州武清地三百餘頃詔皆許之何其與前敕悖也彼谿壑難厭而畿內膏腴有限小民衣食皆出於此一旦奪之何以為生且本朝百年來戶口日滋安得尚有閒田不耕不稼名為奏求實豪奪而已帝善其言而已賜者仍不問山西災山東及杭紹嘉湖大水森等請蠲振帝並從之時帝未有儲嗣而萬貴妃專寵後宮莫得進言者每勸上普恩澤然未敢顯言妃妬也惟森抗章為言帝心慍森已再遷左給事中會戶科都給事中缺吏部列森名上詔予外任部擬興化知府不允乃出為懷慶通判未幾投劾歸不復出魏元字景善朝城人天順元年進士授禮科給事中成化初萬貴妃兄弟驕橫元疏劾之四年慈懿太后崩將別葬元偕同官三十九人抗章極諫御史康永韶亦偕同官四十一人爭之伏哭文華門竟得如禮其年九月彗星見元率諸給事上言入春以來災異疊至近又彗星見東方光拂台垣皆陰盛陽微之證臣聞君之與后猶天之與地不可得而參貳也傳聞宮中乃有盛寵匹耦中宮尚書姚夔等向嘗言之陛下謂內事朕自裁置屏息傾聽將及半載而昭德宮進膳未聞少減中宮未聞少增夫宮闈雖遠而視聽猶咫尺袵席之微謫見玄象不可不懼且陛下富有春秋而震位尚虛豈可以宗社大計一付之愛專情一之人而不求所以固國本安民心哉願明伉儷之義嚴嫡妾之防俾尊卑較然各安其分本支百世之基實在於此四方旱澇相仍民困日棘荊襄流民告變陛下作民父母初無儆惕僅循故事付部施行而戶部尚書馬昂凡有奏報遇上意喜則曰移所司處置遇上意怒則曰事窒難行微有利害即乞聖裁首鼠依違民更何望惟亟罷征稅發內帑遣官振贍庶可少慰人心陛下崇信異教每遇生愍之辰輒重糜貲財廣建齋醮而西僧劄實巴等至加法王諸號賜予駢蕃出乘椶輿導用金吾仗縉紳避道奉養過於親王悖理亂紀孰甚於此乞革奪名號遣還其國追錄橫賜用振饑民仍敕寺觀永不得再請齋醮以蠹國用天下之財不在官則在民今公私交困由玩好太多賞賚無節或營立塔寺或購巿珍奇一物之微累價巨萬國帑安得不絀願屏絕淫巧停罷宴遊諸銀場及不急務悉為禁止至兩京文武大臣不乏奸貪爭為蒙蔽陛下勿謂其位高而不忍遽去勿謂其舊臣而姑且寬容宜令各自陳免用全大體其貪位不去者則言官糾劾而臣等濫居言路無補於時亦望罷歸為不職戒帝優詔褒答之然竟不能用元屢遷都給事中出為福建右參政巡視海道嚴禁越海私販巨商以重寶賂元怒叱出之母憂歸廬墓三年服除起江西參政卒康永韶字用和祁門人舉於鄉入國學選授御史成化初巡按畿輔劾尚書馬昂抑巿民地四年偕同官胡深鄭己等爭慈懿太后山陵事彗星見復偕同官上言八事大旨與元前疏相類兩京大臣考察庶寮去留多不當永韶等復劾大臣行私且摘刑部主事余志等十二人罪為志所訐俱下詔獄永韶謫順昌知縣再調福清惠安久之有薦其知天文者中旨召還授欽天監正進太常少卿掌監事永韶為御史有直聲及是乃更迎合取寵占候多隱諱甚者以災為祥陝西大饑永韶言今春星變當有大咎賴秦民饑死足當之誠國家無疆福帝甚悅中旨擢禮部右侍郎仍掌監事坐曆多訛字落職歸胡深定遠衞人天順末進士既爭慈懿太后山陵事復與同官陳宏鄭己何純方昇張進祿上疏請斥奸邪痛詆學士商輅尚書程信姚夔馬昂帝不納翌日給事中董旻陳鶴胡智亦劾輅等疏呈御前故事諫官彈章非大廷宣讀則封進未有不讀而面呈者帝不悅曰大臣進退有體旻等敢不循舊章亂朝儀耶輅等乞休帝惟聽昂去夔憤甚連疏求去深旻等復合辭攻而詆夔甚力帝怒下深等九人獄先是御史林誠亦嘗劾輅不納引病去帝幷屬誠吏毛弘等皆論救輅亦請寬之乃各杖二十復其官未幾深坐按陝時杖殺訴冤者謫黔陽丞稍遷鬱林知州卒鄭己山海衞人成化二年進士巡按陝西請蠲邊地逋賦分別邊兵令壯者戰守老弱耕牧章下所司定西侯蔣琬鎮甘肅己欲按其罪語洩為所劾戍宣府己性矜傲時論不甚惜董旻樂平人成化二年進士歷吏科都給事中為吏所訐下詔獄謫石臼知縣孝宗時卒官四川參議強珍宇廷貴滄州人成化二年進士除涇縣知縣請減額賦民德之擢御史初遼東巡撫陳鉞啟釁召敵敵至務為蔽欺巡按御史王崇之劾鉞鉞大恐謀之汪直誣逮崇之下詔獄輸贖調延安推官及直鉞用兵方論功而敵大入中官韋朗總兵官緱謙等匿不以聞珍往巡按請正鉞罪兵部尚書余子俊等奏鉞累犯重辟不當貸帝弗從未幾指揮王全等誘殺𩽆顏衞人珍發其狀全等俱獲罪直方自矜有大功聞珍疏怒適巡邊還鉞郊迎五十里訴珍誣己直益怒奏珍所劾皆妄詔遣錦衣千戶蕭聚往勘械赴京比至直先榜掠然後奏聞坐奏事不實當輸贖詔特謫戍遼東而責兵部及言官先嘗劾鉞者居三年直敗復珍官致仕弘治初起山東副使擢大理少卿明年以右僉都御史巡撫宣府時緱謙已罷珍奏留謙才力可用給事中言謙數失機珍不應奏保遂改南京右通政尋以母老乞休久之卒王瑞字良璧望江人成化五年進士授吏科給事中嘗於文華殿抗言內寵滋甚詞氣鯁直帝震怒同列戰慄瑞無懼色十五年疏請天下進表官各陳地方利病帝惡其紛擾杖之湖廣江西撫按官以所部災傷盜起請免有司朝覲瑞等言歲侵民困由有司不職正當加罪乃為請留正官既留則人才進退何由審辨是朝覲考察兩大典皆從此廢壞矣帝然其言即命吏部禁之進都給事中言三載黜陟朝廷大典今布按二司賢否由撫按牒報其餘由布按評覆任情毀譽多至失真舉劾謬者請連坐十九年冬瑞以傳奉宂員淆亂仕路率同官奏曰祖宗設官有定員初無倖進之路近始有納粟冠帶之制然止榮其身不任以職今倖門大開鬻販如巿恩典內降遍及吏胥武階蔭襲下逮白丁或選期未至超越官資或外任雜流驟遷京職以至厮養賤夫巿井童稚皆得攀援妄竊名器踰濫至此有識寒心伏覩英廟復辟景泰倖用者卒皆罷斥陛下臨御天順冒功者一切革除乞斷自宸衷悉皆斥汰以存國體御史寶應張稷等亦言比來末流賤伎妄厠公卿屠狗販繒濫居清要文職有未識一丁武階亦未挾一矢白徒驟貴間歲頻遷或父子並坐一堂或兄弟分踞各署甚有軍匠逃匿易姓進身官吏犯贓隱罪希寵一日而數十人得官一署而數百人寄俸自古以來有如是之政令否也帝得疏意頗動居三日貶李孜省淩中等四人秩奪黃謙錢通等九人官人心快之明年正月太監尚銘罷斥而其黨李榮蕭敬等猶用事瑞等復奏劾之不從瑞居諫垣十餘年遷湖廣右參議謝病歸卒李俊字子英岐山人成化五年進士除吏科給事中屢遷都給事中十五年帝以李孜省為太常寺丞俊偕同官言孜省本贓吏不宜玷清班奉郊廟百神祀會御史亦有言乃改上林監副時汪直竊柄陷馬文升牟俸遣戍帝責言官不糾杖俊及同官二十七人御史王濬等二十九人當是時帝耽於燕樂羣小亂政屢致災譴至二十一年正月朔申刻有星西流化白氣聲如雷帝頗懼詔求直言俊率六科諸臣上疏曰今之弊政最大且急者曰近倖干紀也大臣不職也爵賞太濫也工役過煩也進獻無厭也流亡未復也天變之來率由於此夫內侍之設國初皆有定制今或一監而叢一二十人或一事而參五六七輩或分布藩郡享王者之奉或總領邊疆專大將之權或依憑左右援引憸邪或交通中外投獻奇巧司錢穀則法外取財貢方物則多端責賂兵民坐困官吏蒙殃殺人者見原僨事者逃罪如梁芳韋興陳喜輩不可枚舉惟陛下大施剛斷無令干紀奉使於外者悉為召還用事於內者嚴加省汰則近倖戢而天意可回矣今之大臣其未進也非夤緣內臣則不得進其既進也非依憑內臣則不得安此以財貿官彼以官鬻財無怪其漁獵四方而轉輸權貴也如尚書殷謙張鵬李本侍郎艾福杜銘劉俊皆既老且懦尚書張鎣張瑄侍郎尹直大理卿田景暘皆清論不愜惟陛下大加黜罰勿為姑息則大臣知警而天意可回矣夫爵以待有德賞以待有功也今或無故而爵一庸流或無功而賞一貴倖祈雨雪者得美官進金寶者射厚利方士獻煉服之書伶人奏曼延之戲掾史胥徒皆叨官祿俳優僧道亦玷班資一歲而傳奉或至千人數歲而數千人矣數千人之祿歲以數十萬計是皆國之命脉民之脂膏可以養賢士可以活饑民誠可惜也方士道流如左通政李孜省太常少卿鄧常恩輩尤為誕妄此招天變之甚者乞盡罷傳奉之官毋令汙玷朝列則爵賞不濫而天意可回矣今都城佛剎迄無寧工京營軍士不復遺力如國師繼曉假術濟私糜耗特甚中外切齒願陛下內惜資財外惜人力不急之役姑賜停罷則工役不煩而天意可回矣近來規利之徒率假進奉以耗國財或錄一方書巿一玩器購一畫圖製一簪珥所費不多獲利十倍願陛下洞燭此弊留府庫之財為軍國之備則進獻息而天意可回矣陝西河南山西赤地千里屍骸枕籍流亡日多萑苻可慮願體天心之仁愛憫生民之困窮追錄貴倖鹽課暫假造寺資財移振饑民俾苟存活則流亡復而天意可回矣夫天下譬之人身人主元首也大臣股肱也諫官耳目也京師腹心也藩郡軀幹也大臣不職則股肱痿痹諫官緘默則耳目塗塞京師不戢則腹心受病藩郡災荒則軀幹削弱元首豈能宴然而安哉伏望陛下聽言必行事天以實疏斥羣小親近賢臣咨治道之得失究前代之興亡以聖賢之經代方書以文學之臣代方士則必有正誼足以廣聖學讜論足以究天變而手足便利耳目聰明腹心安泰軀幹強健元首於是乎大明矣帝優詔答之降孜省上林丞常恩本寺丞繼曉革國師為民令巡按御史追其誥敕制下舉朝大悅五月俊出為湖廣布政司參議弘治中屢官山西參政卒汪奎字文燦婺源人成化二年進士為秀水知縣擢御史二十一年星變偕同官疏陳十事言建言貶謫諸臣効忠於國宜復其職妖僧繼曉結中官梁芳耗竭內藏乞治芳罪斬繼曉都巿傳奉官顧賢等皆中官從子而冒錦衣李孜省小吏而授通政宜盡斥以清仕路尚書殷謙李本侍郎杜銘尹直皆素乏清譽尚書張鵬張鎣張瑄侍郎杜謙艾福馬顯劉俊大理卿宋欽巡撫都御史魯能馬馴皆老懦無能侍郎談倫奔競無恥巡撫趙文博粗鄙妄為大理卿田景暘素行不謹宜令致仕鎮守守備內官視天順間逾數倍作威福凌虐有司浙江張慶四川蔡用得逮治四品以下官尤傷國體宜悉撤還內外坐營監鎗內官增置過多皆私役軍士辦納月錢多者至二三百人武將亦皆私役健丁行伍惟存老弱勳戚內官奏乞鹽利滿載南行所至張欽賜黃旗商旅不行邊儲虧損並宜嚴禁陝西山西河南頻年水旱死徙大半山陝之民僅存無幾宜核被災郡縣概與蠲除給事張善吉先坐罪謫官考績至京昏夜乞憐得授茲職大玷清班宜罷斥山陝河洛饑民多流鄖襄至骨肉相噉請大發帑庾振濟消弭他變當是時帝以災變求言奎疏入雖觸帝忌未加譴無何有御史失儀奎當面糾退朝乃奏帝以其怠緩杖之於廷居數月復出為夔州通判討平雲陽劇賊孝宗立量移州同知以薦擢成都知府歲饑多盜振救多復業三遷廣西左布政使弘治十四年以右副都御史巡撫貴州未浹歲普安賊婦米魯作亂被劾致仕正德六年卒從子舜民字從仁成化十四年進士授行人擢御史出按甘肅劾中官將帥失事陳邊計章數十上先是奎杖闕下舜民扶掖之帝聞而怒至是奏獄情詞不當貶蒙化衞經歷弘治初遷知東莞未上擢江西僉事善讞獄剖析如流其清軍法後人遵守之改雲南屯田副使田為勢要奪者釐而歸之官麓川遺孽思祿渡金沙江據孟密承檄撫定之母憂歸服除適淮揚大饑以故官奉命振濟用便宜發粟奏停不急務活饑民百二十萬人流宂復業者八千餘戶進福建按察使盜竊福清縣庫或誣其怨家已成獄舜民廉得真盜脫三十人於死抵誣者罪歲旱禱不應躬蒞福州獄釋枉繫輕罪者所部有司皆清獄遂大雨歷河南左右布政使正德二年以右副都御史撫治鄖陽甫一月罷天下巡撫官改莅南京都察院道卒奎性簡靜不苟取與以篤實見稱而舜民好學砥行矯矯持風節尤負時望方星變求言時九卿各條奏數事率有所避無甚激切者唯奎與李俊等言最直而武選員外郎崔陞彭綱主事蘇章戶部主事周軫邢部主事李旦皆有言陞章言宦官妖僧罪請亟誅竄而尚書王恕今伊傅不宜置南京綱斥李孜省繼曉請誅之以謝天下軫亦請誅梁芳李孜省幷汰內侍罷方書旦陳十事且言神仙佛老外戚女謁聲色貨利奇技淫巧皆陛下素所惑溺而左右近習交相誘之言甚切帝以方修省皆不罪後以吏盜鬻舊賜外蕃故敕事下綱章吏貶之外而密諭吏部尚書尹旻出旦等且書六十人姓名於屏俟奏遷則貶遠惡地旦乃與給事中盧瑀秦昇童柷同日俱謫部臣見遠謫者多有應遷者輒故遲之陞軫遂得免崔陞字廷進本樂安人父為彰德庫大使因家焉成化五年進士由工部主事改兵部稍遷延安知府四川參政守官廉居常服布袍家童拾馬矢給爨家居三十年年八十八卒子銑自有傳彭綱清江人與蘇章周軫秦昇童柷皆成化十一年進士貶永寧知州改汝州鑿渠溉田數千畝再遷雲南提學副使蘇章餘干人貶姚安通判再遷延平知府有政績終浙江參政周軫莆田人副使瑛從子後進郎中終山東運使李旦字啟東獻縣人成化十七年進士貶鎮遠通判未幾卒盧瑀鄞縣人成化五年進士為刑科給事中疏蠲淮揚逋課十餘萬清西北勒巿戰馬宿弊嘗觸帝怒杖之遷工科都給事中與昇柷皆因星變陳言獲譴瑀貶長沙通判終廣平知府秦昇南昌人貶廣安州同知童柷蘭谿人貶興國州同知終袁州知府是時崔陞以請召王恕忤旨而工部主事王純亦以諫罷王恕被杖謫官純仙居人成化十七年進士貶思南推官弘治中屢遷湖廣提學僉事湯鼐字用之壽州人成化十一年進士授行人擢御史孝宗嗣位首劾大學士萬安罔上誤國明日宣至左順門中官森列令跪鼐曰令鼐跪者旨耶抑太監意耶曰有旨鼐始跪及宣旨言疏已留中鼐大言臣所言國家大事奈何留中已而安斥鼐亦出畿輔印馬馳疏言陛下視朝之餘宜御便殿擇侍臣端方謹厚若劉健謝遷程敏政吳寬者日與講學論道以為出治之本至如內閣尹直尚書李裕都御史劉敷侍郎黃景奸邪無恥或夤緣中官進用或依附佞倖行私不早驅斥必累聖明司禮中官李榮蕭敬曩為言官劾罷尋夤緣復入遂摭言官過貶竄殆盡致士氣委靡宜亟正典刑勿為姑息諸傳奉得官者請悉編置瘴鄉示天下戒且召致仕尚書王恕王竑都御史彭韶僉事章懋等而還建言得罪諸臣以厲風節報聞弘治元年正月鼐又劾禮部尚書周洪謨侍郎倪岳張悅南京兵部尚書馬文升因言少傅劉吉與萬安尹直奸貪等耳安直斥而吉獨進官不以為恥請大申黜陟明示勸懲又劾李榮蕭敬而薦謫降進士李文祥為臺諫尚書王恕以盛暑請輟經筵鼐極言不可語侵恕當是時帝更新庶政言路大開新進者爭欲以功名自見封章旁午頗傷激訐鼐意氣尤銳其所抨擊間及海內人望以故大臣多畏之而吉尤不能堪使人啗御史魏璋曰君能去鼐行僉院事矣璋欣然日夜伺鼐短未幾而吉人之獄起吉人者長安人成化末進士為中書舍人四川饑帝遣郎中江漢往振人言漢不勝任宜遣四使分道振且擇才能御史為巡按庶荒政有裨因薦給事中宋琮陳璚韓鼎御史曹璘郎中王沂洪鍾員外郎東思誠評事王寅理刑知縣韓福及壽州知州劉㮣可使而巡按則鼐足任之璋遂草疏偽署御史陳景隆等名言吉人抵抗成命私立朋黨帝怒下人詔獄令自引其黨人以鼐璘思誠㮣福對璋又嗾御史陳璧等言璘福思誠非其黨其黨則鼐㮣及主事李文祥庶吉士鄒智知州董傑是也㮣嘗餽鼐白金貽之書謂夜夢一人騎牛幾墮鼐手挽之得不仆又見鼐手執五色石引牛就道因解之曰人騎牛謂朱乃國姓意者國將傾賴鼐扶之而引君當道也鼐㮣等自相標榜詆毀時政請並文祥智傑逮治疏上吉從中主之悉下詔獄欲盡置之死刑部尚書何喬新侍郎彭韶等持之外議亦洶洶不平乃坐㮣妖言律斬鼐受賄戍肅州人欺罔削籍智文祥傑皆謫官吏部尚書王恕奏曰律重妖言謂造作符讖類耳㮣書詞雖妄良以鼐數言事不避利害因推詡之今當以妖言設有如造亡秦讖者更何以罪之帝得疏意動命姑繫獄既而熱審喬新等言㮣本不應妖言律且㮣五歲而孤無兄弟母孫氏守節三十年曾被旌老病且貧㮣死母必不全祈聖恩矜恤乃減㮣死戍海州㮣濟寧人成化二十年進士除壽州知州毀境內淫祠幾盡三年教化大行弘治初上言刑賞予奪人主大柄後世乃有為女子小人強臣外戚所攘竊者由此輩心險術巧人主稍加親信輒墮計中愛者乘君之喜而游言以揚之惡者乘君之怒而微言以中之使賢人君子卒受曖昧而去卿相缺人則遷延餌引待有交通請屬軟美易制之人然後薦用其剛正不阿者輒媒孽而放棄之俟其氣衰慮易不至大立異同乃更收錄巧計既行刑賞予奪雖名人主獨操實一出於其所簸弄迨黨立勢成復恐一旦敗露則又極意以排諫諍之士務使其君孤立於上耳無聞目無見以圖便其私不至其身與國俱敗不止故夫刑賞予奪必由大臣奏請臺諫集議而後可行或有矯誣窮治不輕貸則讒佞莫能間而權不下移矣考績赴都遂遇禍竟卒於戍所鼐既戍無援之者久之始釋歸董傑涇縣人成化末進士鼐之論暑月輟講也傑方謁選亦抗疏爭由是知名授沔陽知州甫數月逮繫詔獄謫四川行都司知事歷遷河南左布政使所在盡職業為民所懷正德六年江西盜起巡撫王哲兵敗召還擢傑右副都御史代之未幾卒璋既為吉心腹果擢大理寺丞坐事下獄黜為九江同知悒悒死姜綰字玉卿弋陽人成化十四年進士由景陵知縣擢南京御史弘治初陳治道十事又言午朝宜論大政毋泛陳細故皆報聞二年二月南京守備中官蔣琮以蘆場事下綰覆按琮囑綰求右己綰疏言琮以守備重臣與小民爭利假公事以適私情用揭帖而抗詔旨揚言陰中脅以必從其他變亂成法厥罪有十以內官侵言官職罪一妬害大臣妄論都御史秦紘罪二怒河閘官失迎候欲奏罷之罪三受民詞不由通政罪四分遣腹心侵漁國課罪五按季收班匠工銀罪六擅收用罷閑都事罪七官僚忤意輒肆中傷罪八妄奏主事周琦罪欺罔朝廷罪九保舉罷斥內臣竊天子威柄罪十事下南京三法司既復特遣官覆治以奏先是御史余濬劾中官陳祖生違制墾後湖田湖為之淤奏下南京主事盧錦勘報錦故與祖生有隙而給事中方向嘗率同官繆樗等劾祖生及文武大臣不職狀又因雷震孝陵柏劾大學士劉吉等十一人而詆祖生益力祖生銜向切骨時向方監後湖黃冊祖生遂揭向錦實侵湖田詔下法司勘勘未上而琮為綰所劾於是琮祖生及吉合謀削錦籍謫向官復逮綰及同官孫紘劉遜金章紀傑曹玉譚肅徐禮余濬給事中繆樗赴京論鞫皆謫為州判官綰謫判桂陽量移寧國同知遷慶遠知府斬劇賊韋七旋韋萬妙其黨糾賊數萬攻城綰堅守檄民兵夾擊破走之東蘭諸州蠻悉歸侵地總督劉大夏奇其材薦為右江兵備副使思恩知府岑濬逐田州知府岑猛綰獻策總督潘蕃蕃令與都指揮金堂合諸路兵大破賊思恩平綰條二府形勢請改設流官比中土廷議從之綰引疾還俄起河南按察使尋復以疾歸卒於家余濬慈谿人成化十七年進士孝宗初疏請永除納粟入監令又劾浙江鎮守中官張慶廣東鎮守中官韋眷因薦王恕堪內閣馬文升彭韶張悅阮勤黃孔昭堪吏部後湖之勘自濬啟之貶平度州判官終知府方向字與義桐城人成化十七年進士謫雲南多羅驛丞歷官瓊州知府入覲時僕私巿一珠索而投諸海繆樗字全之溧陽人成化十一年進士孝宗初陳時政八事因劾大學士尹直等時號敢言終營州判官孫紘字文冕鄞人成化十四年進士謫膠州判官遷廣德知州卒官紘少貧傭書巿肉以養母既通籍終身不食肉劉遜安福人成化十四年進士謫澧州判官遷武岡知州岷王不檢下遜裁抑之又欲損其歲祿王怒奏於朝徵下詔獄貶四川行都司斷事歷湖廣副使劉瑾徵賄不得坐缺軍儲被逮已而釋之再坐斷獄稽延罰米百石先是榮王乞辰州常德田二千頃山場八百里民舍巿廛千餘間遜與巡撫韓重持勿予至是瑾悉予之部議補遜瓊州副使瑾勒令致仕瑾誅起官歷福建按察使金章等無他表見姜洪字希範廣德人成化十四年進士除盧氏知縣單騎勸農桑民姜仲禮願代父死罪洪奏免之徵拜御史孝宗即位陳時政八事歷詆太監蕭敬內閣萬安劉吉學士尹直侍郎黃景劉宣都御史劉敷尚書李裕李敏杜銘大理丞宋經而薦致仕尚書王恕王竑李秉去任侍郎謝鐸編修張元禎檢討陳獻章僉事章懋評事黃仲昭御史強珍徐鏞于大節給事中王徽蕭顯賀欽員外林俊主事王純及現任尚書余子俊馬文升巡撫彭韶侍郎張悅詹事楊守陳且言指揮許寧內官懷恩並拔出曹輩足副任使他所陳多斥近倖疏辭幾萬言帝嘉納之為所斥者憾不置弘治元年出按湖廣與督漕都御史秦紘爭文移被劾所司白洪無罪劉吉欲中之再下禮部會議遂貶夏縣知縣御史歐陽旦請召還洪及暢亨等不納遷桂林知府瑤僮侵擾古田請兵討平之擢雲南參政土官陶洪與八百媳婦約為亂洪乘間翦滅歷山東左參政正德二年遷山西布政使劉瑾索賀印錢不應四年二月中旨令致仕瑾誅起山東左布政使七年以右副都御史巡撫山西未滿歲卒洪性廉直身後喪不能舉天啟初追諡莊介歐陽旦安福人成化十七年進士由休寧知縣擢御史嘗請逐劉吉罷皇莊歷湖廣僉事浙江副使終南京右副都御史暢亨字文通河津人成化十四年進士由長垣知縣擢御史巡按浙江歲饑奏罷上供綾紗等物弘治元年二月景寧縣屏風山異獸萬餘大如羊白色銜尾浮空去亨請罷溫處銀課而置鎮守中官張慶於法章下所司銀課得減責慶陳狀慶因訐亨考察不公停亨俸三月亨又劾僉事鄒滂滂亦訐亨慶等搆之逮亨謫涇陽知縣給事中龐泮上疏爭不聽曹璘字廷暉襄陽人成化十四年進士授行人久之選授御史孝宗嗣位疏言梓宮發引陛下宜衰絰杖履送至大明門外拜哭而別率宮中行三年喪貴妃萬氏有罪宜告於先帝削其諡遷葬他所帝納其奏而戒勿言貴妃事頃之請進用王恕等諸大臣復先朝言事于大節等諸臣官放遣宮中怨女罷撤監督京營及鎮守四方太監又言梁芳以指揮袁輅獻地建寺請令襲廣平侯爵以數畝地得侯勛臣誰不解體宜亟為革罷疏奏帝頗采焉弘治元年七月上言近日星隕地震金木二星晝現雷擊禁門皇陵雨雹南京內園災狂夫叫閽景寧白氣飛騰而陛下不深求致咎之由以盡弭災之實經筵雖御徒為具文方舉輒休暫行遽罷所謂一日暴之十日寒之者願日御講殿與儒臣論議罷斥大學士劉吉等以消天變臣昨冬曾請陛下墨衰視政今每遘節序輒漸御黃袞從官朱緋三年之間為日有幾宜但御淺服且陛下方諒陰少監郭鏞乃請選妃嬪雖拒勿納鏞猶任用何以解臣民疑祖宗嚴自宮之禁今此曹干進紛紜當論罪朝廷特設書堂令翰林官教習內使本非高皇帝制詞臣多夤緣以干進而內官亦且假儒術以文奸宜速罷之諸邊有警輒命京軍北征此輩驕惰久不足用乞自今勿遣而以出師之費賞邊軍帝得疏不喜降旨譙讓已出按廣東訪陳獻章於新會服其言論遂引疾歸居山中讀書三十年不入城巿彭程字萬里鄱陽人成化末進士弘治初授御史巡視京城降人雜處畿甸多為盜事發則投戚里奄豎為窟穴程每先機制之有發輒得巡鹽兩浙代還巡視光祿五年上疏言臣適見光祿造皇壇器皇壇者先帝修齋行法之所陛下即位此類廢斥盡何復有皇壇煩置器光祿金錢悉民膏血用得其當猶恐病民況投之無用地頃李孜省繼曉輩倡邪說而先帝篤信之者意在遠希福壽也今二人已伏重辟則禍患之來二人尚不能自免豈能福壽他人倘陛下果有此舉宜遏之將萌如無請治所司逢迎罪帝初無皇壇造器之命特光祿姑為備帝得程奏大怒以為暴揚先帝過立下錦衣獄給事中叢蘭亦巡視光祿繼上疏論之帝宥蘭奪光祿卿胡恭等俸付程刑部定罪尚書彭韶等擬贖杖還職帝欲置之死命繫之韶等復疏救程子尚三上章乞代父死終不聽是時巡按陝西御史嵩縣李興亦坐酷刑繫獄及朝審上興及程罪狀詔興斬程及家屬戍隆慶文武大臣英國公張懋等合疏言興所斃多罪犯不宜當以死程用諫為職坐此戍邊則作奸枉法者何以處之尚書王恕又特疏救乃減興死杖之百偕妻子戍賓州程竟無所減程母李氏年老無他子叩闕乞留侍養南京給事中毛珵等亦奏曰昔劉禹錫附王叔文當竄遠方裴度以其母老為請得改連州陛下聖德非唐中主可比而程罪亦異禹錫祈少矜憐全其母子不許子尚隨父戍所遂舉廣西鄉試明年帝念程母老放還其後劉瑾亂政追論程巡鹽時稍虧額課勒其家償程死久矣止遺一孫女罄產不足則並女鬻之行道皆為流涕龐泮字元化天台人成化二十年進士授工科給事中弘治中中旨取善擊銅鼓者泮疏諫屢遷刑科都給事中副使楊茂元被逮泮率同列救之茂元得薄譴九年四月帝以岷王劾武岡知州劉遜命逮之泮率同官呂獻等言錦衣天子親軍非不軌及妖言重情不可輕遣遜所坐微而王奏牽左證百人勢難盡逮宜敕撫按官體勘疏入忤旨下泮等四十二人及御史劉紳等二十人詔獄六科署空吏部尚書屠滽請令中書代收部院封事御史張淳奉使還恥獨不與抗疏論之考功郎中儲巏亦諫滽等復率九卿救之帝乃釋泮等皆停俸三月中官何鼎以直言下獄楊鵬戴禮夤緣入司禮監泮等言鼎狂直宜容鵬等得罪先朝俾參機密害非小會御史黃山張泰等亦以為言帝怒詰外廷何由知內廷事令對狀停泮等俸半歲威寧伯王越謀起用中官蔣琮李廣有罪外戚周彧張鶴齡縱家奴殺人泮皆極論直聲甚著十一年擢福建右參政中官奪宋儒黃幹宅為僧菴泮改為書院以祀幹遷河南右布政使中旨取洛陽牡丹疏請罷之轉廣西左布政使致仕呂獻浙江新昌人成化二十年進士授刑科給事中坐事杖闕廷弘治時詔選駙馬李廣受富人金陰為地為獻所發有直聲正德中終南京兵部右侍郎葉紳字廷縉吳江人成化末進士除戶科給事中改吏科歷禮科左給事中弘治十年太子年七歲猶未出閤紳請擇講官教諭尋以修省陳八事斥中官李廣又劾尚書徐瓊童軒侯瓚侍郎鄭紀王宗彝巡撫都御史劉瓛張誥張岫等二十人乞賜罷斥而末言去大奸則專劾李廣八大罪誑陛下以燒鍊而進不經之藥罪一為太子立寄壇而興煖疏之說罪二撥置皇親希求恩寵罪三盜引玉泉經繞私第罪四首開倖門大肆奸貪罪五太常崔志端真人王應輩稱廣為教主真人廣即代求善官乞賜玉帶罪六假果戶為名侵奪畿民土地幾至激變罪七四方輸納上供威取勢逼致民破產罪八內而皇親駙馬事之如父外而總兵鎮守稱之為公陛下奈何養此大奸於肘腋而不思驅斥哉御史張縉等亦以為言帝曰姑置之踰數月廣竟得罪飲酖死紳又極陳大臣恩蔭葬祭之濫下所司議頗有減損擢尚寶少卿卒胡獻字時臣揚州興化人弘治九年進士改庶吉士授御史踰月即極論時政數事言屠滽為吏部尚書王越李蕙為都御史皆交通中官李廣得之廣得售奸由陛下議政不任大臣而任廣輩也祖宗時御內閣商決章奏經筵日講悉陳時政得失又不時接見儒臣願陛下追復舊制京通二倉總督監督內臣每收米萬石勒白金十兩以歲運四百萬石計之人四千兩又各占斗級二三百人使納月錢夫監督倉儲自有戶部焉用中官願賜罷遣京操軍士自數千里至而總兵坐營等官各使分屬辦納月錢乞嚴革以蘇其困陛下遇災修省去春求言諫官及郎中王雲鳳主事胡爟皆有論奏留中不報雲鳳尋得罪如此則與不修省何異願斷自聖心凡利弊當興革者即見施行東廠校尉本以緝奸邇者但為內戚中官泄憤報怨如御史武衢忤壽寧侯張鶴齡及太監楊鵬主事毛廣忤太監韋泰皆為校尉所發推求細事誣以罪名舉朝皆知其枉無敢言者臣亦知今日言之異日必為所陷然臣弗懼也疏入鶴齡與泰各疏辨會給事中胡易劾監庫中官賀彬貪黷八罪彬亦訐易帝遂下獻易詔獄謫獻藍山丞久之釋易獻未赴官遷宜陽知縣馬文升數薦於朝遷南都察院經歷武宗即位擢廣西提學僉事遷福建提學副使未任卒武衢沂水人成化二十年進士以御史謫雲南通海主簿終汾州知州毛廣平湖人成化二十年進士其事蹟無考胡易寧都人弘治三年進士為吏科給事中華昶劾程敏政法司白昂閔珪據舊章令六科共鞫東廠劾易等皆昶同僚不當與訊得旨下詔獄昂珪請罪皆停俸比昶獄成易等猶被繫大臣以為言始令復職當弘治時言官以忤內臣得罪者又有任儀車梁任儀閬中人成化二十三年進士為御史弘治三年秋詔修齋於大興隆寺理刑知縣王嶽騎過之中使捽辱嶽使跪於寺前儀不平劾中使罪姓名偶誤乃並儀下吏出為中部知縣終山西參政車梁山西永寧人弘治三年進士為御史十五年條列時政中言東廠錦衣衞所獲盜先嚴刑具成案然後送法司法司不敢平反請自今徑送法司毋先刑訊章下未報主東廠者言梁從父郎中霆先以罪為東廠所發挾私妄言遂下梁詔獄給事御史交章論救乃得釋終漢陽知府張弘至字時行華亭人南安知府弼子也舉弘治九年進士改庶吉士授兵科給事中十二年冬陳初政漸不克終八事初汰傳奉官殆盡近匠官張廣寧等一傳至百二十餘人少卿李綸指揮張等再傳至百八十餘人異初政者一初追戮繼曉逐番僧佛子近齋醮不息異初政者二初去萬安李裕輩朝彈夕斥近被劾數十疏如尚書徐瓊者猶居位異初政者三初聖諭有大政召大臣面議近上下否隔異初政者四初撤增設內官近已還者復去已革者復增異初政者五初慎重詔旨左右不敢妄干近陳情乞恩率俞允異初政者六初令兵部申舊章有妄乞陞武職者奏治近乞陞無違拒異初政者七初節光祿供億近宂食日繁移太倉銀賒市廛物異初政者八帝下所司邊將王杲馬昇秦恭陳瑛失機論死久繫弘至請速正典刑親王之藩者所次舍率營蓆殿並從官幕次俱飾絨毯錦帛因弘至言多減省孝宗晚年從廷臣請遣官覈騰驤四衞虛冒弊以太監甯瑾言而止弘至抗章爭會兵部亦以為言乃卒覈之武宗立以戶科右給事中奉使安南還遷都給事中母憂歸卒屈伸字引之任丘人成化末進士選庶吉士授禮科給事中弘治九年詔度僧禮部爭不得伸極陳三不可不納京師民訛言寇近邊兵部請榜諭伸言若榜示人心愈驚昔漢建始中都人訛言大水至議令吏民上城避之王商不從頃之果定今當以為法事遂寢寇犯大同游擊王杲匿敗績狀伸率同官發之並劾罪總兵官王璽等屢遷兵科都給事中泰寧衞部長大掠遼陽部議令守臣遺書稱朝廷寬大不究已往若還所掠則予重賞伸等言在我示怯弱之形在彼無創艾之意非王者威攘之道前日犯邊不以為罪今日歸俘反以為功誨以為盜之利啟無賴心又非王者懷柔之道帝悟書不果遣已劾鎮守中官孫振總兵官蔣驥巡撫陳瑤僨事罪帝不問廣寧復失事瑤等以捷聞伸及御史耿明等交章劾其欺罔乃按治之太監苗逵成國公朱暉等搗巢獲三級及寇大入固原不敢救既而斬獲十二級先後以捷聞伸等數劾之及班師又極論曰暉等西討無功班師命甫下將士已入國門不知奉何詔書且此一役糜京帑及邊儲共一百六十餘萬兩而首功止三級是以五十萬金易一無名之首也乃所上有功將士至萬餘人假使馘一渠魁如火篩或斬級至千百將竭天下財不足供費而報功者不知幾萬萬也暉逵及都御史史琳監軍御史王用宜悉置重典帝不聽雲南有鎮守中官復遣監丞孫鎮金騰伸等極言不可錦衣指揮孫鑾坐罪閒住中旨復之令掌南鎮撫事伸等力爭乃命止帶俸中旨令指揮胡震分守天津伸力爭不聽鎮守河南中官劉瑯乞皂隸帝命予五十人故事尚書僅十二人伸等力爭詔止減二十人自後中官咸援例陳乞祖制遂壞伸居諫垣久持議侃侃不撓未及遷而卒王獻臣字敬止其先吳人隸籍錦衣衞弘治六年舉進士授行人擢御史巡大同邊請亟正諸將姚信陳廣閉營避寇及馬昇王杲秦恭喪師罪悉蠲大同延綏旱傷逋賦以寬軍民帝多從之嘗令部卒導從遊山為東廠緝事者所發並言其擅委軍政官徵下詔獄罪當輸贖特命杖三十謫上杭丞十七年復以張天祥事被逮天祥者遼東都指揮僉事斌孫也斌以罪廢天祥入粟得祖官有泰寧衞部十餘騎射傷海西貢使天祥出毛喇關掩殺他衞三十八人以歸指為射貢使者巡撫張鼐等奏捷獻臣疑之方移牒駁勘會斌婦弟指揮張茂及子欽與天祥有郤詐為前屯衞文書呈獻臣具言劫營事獻臣即以聞未報而獻臣被徵帝命大理丞吳一貫錦衣指揮楊玉會新按臣余濓勘之盡得其實斌等皆論死天祥斃於獄天祥叔父洪屢訟冤帝密令東廠廉其事還奏所勘皆誣帝信之欲盡反前獄召內閣劉健等出東廠揭帖示之命盡逮一貫等會訊闕下健等言東廠揭帖不可行於外既退復爭之帝再召見責健等健對曰獄經法司讞皆公卿士大夫言足信帝曰法司斷獄不當身且不保言足信乎謝遷曰事當從眾若一二人言安可信健等又言衆證遠不可悉逮帝曰此大獄逮千人何恤苟功罪不明邊臣孰肯効力者健等再四爭執見帝聲色厲終不敢深言東廠非一貫等既至帝親御午門鞫之欲抵一貫死閔珪戴珊力救乃謫嵩明州同知獻臣廣東驛丞濂雲南布政司照磨茂父子論死而斌免洪反得論功武宗立獻臣遷永嘉知縣吳一貫字道夫海陽人成化十七年進士由上高知縣擢御史弘治中歷按浙江福建南畿以強幹聞擢大理右寺丞畿輔河南饑請發粟二十萬石以振又別請二萬石給京邑及昌平民既讁官正德初遷江西副使討華林賊有功進按察使行軍至奉新卒士民立忠節祠祀焉余濂字宗周都昌人弘治六年進士武宗時終雲南副使孝宗勵精圖治委任大臣中官勢稍絀而張天祥及滿倉兒事皆發自東廠廷議猶為所撓云滿倉兒事具孫磐傳贊曰御史為朝廷耳目而給事中典章奏得爭是非於廷陛間皆號稱言路天順以後居其職者振風裁而恥緘默自天子大臣左右近習無不指斥極言南北交章連名列署或遭譴謫則大臣抗疏論救以為美談顧其時門戶未開名節自勵未嘗有承意指於政府効搏噬於權璫如末季所為者故其言有當有不當而其心則公上者愛國次亦愛名然論國事而至於愛名則將惟其名之可取而事之得失有所不顧於匡弼之道或者其未善乎
