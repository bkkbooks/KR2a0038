body:
  text: 明史卷六十一志第三十七樂一古先聖王治定功成而作樂以合天地之性類萬物之情天神格而民志協蓋樂者心聲也君心和六合之內無不和矣是以樂作於上民化於下秦漢而降斯理浸微聲音之道與政治不相通而民之風俗日趨於靡曼明興太祖銳志雅樂是時儒臣冷謙陶凱詹同宋濂樂韶鳳輩皆知聲律相與究切釐定而掌故闊略欲還古音其道無由太祖亦方以下情偷薄務嚴刑以束之其於履中蹈和之本未暇及也文皇帝訪問黃鍾之律臣工無能應者英景憲孝之世宮縣徒為具文殿廷燕享郊壇祭祀教坊羽流慢瀆苟簡劉翔胡瑞為之深慨世宗制作自任張鶚李文察以審音受知終以無成蓋學士大夫之著述止能論其理而施諸五音六律輒多未協樂官能紀其鏗鏘鼓舞而不曉其義是以卒世莫能明也稽明代之制作大抵集漢唐宋元人之舊而稍更易其名凡聲容之次第器數之繁縟在當日非不燦然俱舉第雅俗雜出無從正之故備列於篇以資考者太祖初克金陵即立典樂官其明年置雅樂以供郊社之祭吳元年命自今朝賀不用女樂先是命選道童充樂舞生至是始集太祖御戟門召學士朱升范權引樂舞生入見閱試之太祖親擊石磬命升辨五音升不能審以宮音為徵音太祖哂其誤命樂生登歌一曲而罷是年置太常司其屬有協律郎等官元末有冷謙者知音善鼓瑟以黃冠隱吳山召為協律郎令協樂章聲譜俾樂生習之取石靈璧以製磬採桐梓湖州以製琴瑟乃考正四廟雅樂命謙較定音律及編鐘編磬等器遂定樂舞之制樂生仍用道童舞生改用軍民俊秀子弟又置教坊司掌宴會大樂設大使副使和聲郎左右韶樂左右司樂皆以樂工為之後改和聲郎為奉鑾洪武元年春親祭太社太稷夏祫享於太廟其冬祀昊天上帝於圜丘明年祀皇地祇於方丘又以次祀先農日月太歲風雷嶽瀆周天星辰歷代帝王至聖文宣王皆定樂舞之數奏曲之名圜丘迎神奏中和之曲奠玉帛奏肅和之曲奉牲奏凝和之曲初獻奏壽和之曲武功之舞亞獻奏豫和之曲終獻奏熙和之曲俱文德之舞徹豆奏雍和之曲送神奏安和之曲望燎奏時和之曲方丘並同曲詞各異易望燎曰望瘞太社太稷易迎神曰廣和省奉牲餘並與方丘同曲詞各異先農迎神奠帛奏永和之曲進俎奏雍和之曲初獻終獻並奏壽和之曲徹豆送神並奏永和之曲望瘞奏太和之曲朝日迎神奏熙和之曲奠玉帛奏保和之曲初獻奏安和之曲武功之舞亞獻奏中和之曲終獻奏肅和之曲俱文德之舞徹豆奏凝和之曲送神奏壽和之曲望燎奏豫和之曲夕月迎神易凝和奠帛以下與朝日同曲詞各異太歲風雷嶽瀆迎神奏中和奠帛奏安和初獻奏保和亞獻奏肅和終獻奏凝和徹豆奏壽和送神奏豫和望燎奏熙和周天星辰初附祀夕月洪武四年別祀迎神奏凝和奠帛初獻奏保和武功舞亞獻奏中和終獻奏肅和俱文德舞徹豆奏豫和送神奏雍和太廟迎神奏太和之曲奉冊寶奏熙和之曲進俎奏凝和之曲初獻奏壽和之曲武功之舞亞獻奏豫和之曲終獻奏熙和之曲俱文德之舞徹豆奏雍和之曲送神奏安和之曲初獻則德懿熙仁各奏樂舞亞終獻則四廟共之釋奠孔子初用大成登歌舊樂洪武六年始命詹同樂韶鳳等更製樂章迎神奏咸和奠帛奏寧和初獻奏安和亞獻終獻奏景和徹饌送神奏咸和歷代帝王迎神奏雍和奠帛初獻奏保和武功舞亞獻奏中和終獻奏肅和俱文德舞徹豆奏凝和送神奏壽和望瘞奏豫和又定王國祭祀樂章迎神奏太清之曲初獻奏壽清之曲亞獻奏豫清之曲終獻奏熙清之曲徹饌奏雍清之曲送神奏安清之曲其社稷山川易迎神為廣清增奉瘞曰時清此祭祀之樂歌節奏也洪武三年又定朝會宴饗之制凡聖節正旦冬至大朝賀和聲郎陳樂於丹墀百官拜位之南北向駕出仗動和聲郎舉麾奏飛龍引之曲樂作陞座樂止偃麾百官拜奏風雲會之曲拜畢樂止丞相上殿致詞奏慶皇都之曲致詞畢樂止百官又拜奏喜昇平之曲拜異樂止駕興奏賀聖朝之曲還宮樂止百官退和聲郎樂工以次出凡宴饗和聲郎四人總樂舞二人執麾立樂工前之兩旁二人押樂立樂工後之兩旁殿上陳設畢和聲郎執麾由兩階升立於御酒案之左右二人引歌工樂工由兩階升立於丹陛上之兩旁東西向舞師二人執旌引武舞士立於西階下之南又二人執翿引文舞士立於東階下之南又二人執幢引四夷舞士立於武舞之西南俱北向武舞曰平定天下之舞象以威功定禍亂也文舞曰車書會同之舞象以文德致太平也四夷舞曰撫安四夷之舞象以戊灭德服遠人也引大樂二人執戲竹引大樂工陳列於丹陛之西文武二舞樂工列於丹陛之東四夷樂工列於四夷舞之北俱北向駕將出仗動大樂作升座樂止進第一爵和聲郎舉麾唱奏起臨濠之曲引樂二人引歌工樂工詣酒案前北面重行立定奏畢偃麾押樂引衆工退第二奏開太平之曲第三奏安建業之曲第四奏削羣雄之曲第五奏平幽都之曲第六奏撫四夷之曲第七奏定封賞之曲第八奏大一統之曲第九奏守承平之曲其舉麾偃麾歌工樂工進退皆如前儀進第一次膳和聲郎舉麾唱奏飛龍引之樂大樂作食畢樂止偃麾第二奏風雲會之樂第三奏慶皇都之樂第四奏平定天下之舞第五奏賀聖朝之樂第六奏撫安四夷之舞第七奏九重歡之樂第八奏車書會同之舞第九奏萬年春之樂其舉麾偃麾如前儀九奏三舞既畢駕興大樂作入宮樂止和聲郎執麾引衆工以次出宴饗之曲後凡再更四年所定一曰本太初二曰仰大明三曰民初生四曰品物亨五曰御六龍六曰泰階平七曰君德成八曰聖道行九曰樂清寧其詞詹同陶凱所製也十五年所定一曰炎精開運二曰皇風三曰眷皇明四曰天道傳五曰振皇綱六曰金陵七曰長楊八曰芳醴九曰駕六龍凡大朝賀教坊司設中和韶樂於殿之東西北向陳大舞於丹陛之東西亦北向駕興中和韶樂奏聖安之曲陞座進寶樂止百官拜大樂作拜畢樂止進表大樂作進訖樂止宣表目致賀訖百官俯伏大樂作拜畢樂止宣制訖百官舞蹈山呼大樂作拜畢樂止駕興中和韶樂奏定安之曲導駕至華蓋殿樂止百官以次出其大宴饗教坊司設中和韶樂於殿內設大樂於殿外立三舞雜隊於殿下駕興大樂作陞座樂止文武官入列於殿外北向拜大樂作拜畢樂止進御筵樂作進訖樂止進花樂作進訖樂止進第一爵教坊司奏炎精開運之曲樂作內外官拜畢樂止散花樂作散訖樂止第二爵教坊司奏皇風之曲樂止進湯鼓吹饗節前導至殿外鼓吹止殿上樂作羣臣湯饌成樂止武舞入教坊司請奏平定天下之舞第三爵教坊司請奏眷皇明之曲進酒如前儀樂止教坊司請奏撫安四夷之舞第四爵奏天道傳之曲進酒進湯如前儀樂止奏車書會同之舞第五爵奏振皇綱之曲進酒如前儀樂止奏百戲承應第六爵奏金陵之曲進酒進湯如前儀樂止奏八蠻獻寶承應第七爵奏長楊之曲進酒如前儀樂止奏採蓮隊子承應第八爵奏芳醴之曲進酒進湯如前儀樂止奏魚躍於淵承應第九爵奏駕六龍之曲進酒如前儀樂止收爵進湯進大膳樂作供羣臣飯食訖樂止百花隊舞承應宴成徹案羣臣出席北向拜樂作拜畢樂止駕興大樂作鳴鞭百官以次出此朝賀宴饗之樂歌節奏也其樂器之制郊丘廟社洪武元年定樂工六十二人編鐘編磬各十六琴十瑟四搏拊四柷敔各一壎四篪四簫八笙八笛四應鼓一歌工十二協律郎一人執麾以引之七年復增籥四鳳笙四壎用六搏拊用二共七十二人舞則武舞生六十二人引舞二人各執干戚文舞生六十二人引舞二人各執羽籥舞師二人執節以引之共一百三十人惟文廟樂生六十人編鐘編磬各十六琴十瑟四搏拊四柷敔各一壎四篪四簫八笙八笛四大鼓一歌工十六年鑄太和鐘其制倣宋景鐘以九九為數高八尺一寸拱以九龍柱以龍簴建樓於圜丘齋宮之東北懸之郊祀駕動則鐘聲作升壇鐘止衆音作禮畢升輦鐘聲作俟導駕樂作乃止十七年改鑄減其尺十之四焉朝賀洪武三年定丹陛大樂簫四笙四箜篌四方響四頭管四龍笛四琵琶四竹秦六杖鼓二十四大鼓二板二二十六年又定殿中韶樂簫十二笙十二排簫四橫笛十二壎四篪四琴十瑟四編鐘二編磬二應鼓二柷一敔一搏拊二丹陛大樂戲竹二簫十二笙十二笛十二頭管十二竹秦八琵琶八二十弦八方響二鼓二拍板八杖鼓十二命婦朝賀中宮設女樂戲竹二簫十四笙十四笛十四頭管十四竹秦十琵琶八二十弦八方響六鼓五拍板八杖鼓十二正旦冬至千秋凡三節其後太皇太后皇太后並用之朔望朝參戲竹二簫四笙四笛四頭管四竹秦二琵琶二二十弦二方響一鼓一拍板二杖鼓六大宴洪武元年定殿內侑食樂簫六笙六歌工四丹陛大樂戲竹二簫四笙四琵琶六竹秦六箜篌四方響四頭管四龍笛四杖鼓二十四大鼓二板二文武二舞樂器笙二橫管二竹秦二杖鼓二大鼓一板一四夷舞樂腰鼓二琵琶二胡琴二箜篌二頭管二羌笛二竹秦二水盞一板一二十六年又定殿內侑食樂柷一敔一搏拊一琴四瑟二簫四笙四笛四壎二篪二排簫一鐘一磬一應鼓一丹陛大樂戲竹二簫四笙四笛二頭管二琵琶二竹秦二二十弦二方響二杖鼓八鼓一板一迎膳樂戲竹二笙二笛四頭管二竹秦二杖鼓十鼓一板一進膳樂笙二笛二杖鼓八鼓一板一太平清樂笙四笛四頭管二竹秦四方響一杖鼓八小鼓一板一樂工舞士服色之制郊廟洪武元年定朝賀洪武三年定文武兩舞武舞士三十二人左干右戚四行行八人舞作發揚蹈厲坐作擊刺之狀舞師二人執旌以引之文舞士三十二人左籥右翟四行行八人舞作進退舒徐揖讓升降之狀舞師二人執翿以引之四夷之舞舞士十六人四行行四人舞作拜跪朝謁喜躍俯伏之狀舞師二人執幢以引之此祭祀朝賀之樂舞器服也當太祖時前後稍有增損樂章之鄙陋者命儒臣易其詞二郊之作太祖所親製後改合祀其詞復更太社稷奉仁祖配亦更製七奏嘗諭禮臣曰古樂之詩章和而正後世之詩章淫以誇故一切諛詞豔曲皆棄不取嘗命儒臣撰回鑾樂歌所奏神降祥神貺酣酒色荒禽荒諸曲凡三十九章命曰御鑾歌皆寓諷諫之意然當時作者惟務明達易曉非能如漢晉間詩歌鏗鏘雅健可錄而誦也殿中韶樂其詞出於教坊俳優多乖雅道十二月樂歌按月律以奏及進膳迎膳等曲皆用樂府小令雜劇為娛戲流俗諠譊淫哇不逞太祖所欲屏者顧反設之殿陛間不為怪也永樂十八年北京郊廟成其合祀合享禮樂一如舊制更定宴饗樂舞初奏上萬壽之曲平定天下之舞二奏仰天恩之曲撫四夷之舞三奏感地德之曲車書會同之舞四奏民樂生之曲表正萬邦之舞五奏感皇恩之曲天命有德之舞六奏慶豐年之曲七奏集禎應之曲八奏永皇圖之曲九奏樂太平之曲奏曲膚淺舞曲益下俚景泰元年助教劉翔上書指其失請敕儒臣推演道德教化之意君臣相與之樂作為詩章協以律呂如古靈臺辟雍清廟湛露之音以振勵風教備一代盛典時以襲用既久卒莫能改其後教坊司樂工所奏中和韶樂且多不諧者成化中禮官嘗請三倍其額博教而約取之弘治之初孝宗親耕耤田教坊司以雜劇承應間出狎語都御史馬文升厲色斥去給事中胡瑞嘗言御殿受朝典禮至大而殿中中和韶樂乃屬之教坊司嶽鎮海瀆三年一祭乃委之神樂觀樂舞生褻神明傷大體望敕廷臣議嶽瀆等祭當以縉紳從事中和韶樂擇民間子弟肄習設官掌之年久則量授職事帝以奏樂遣祭皆國朝舊典不能從也馬文升為尚書因災異陳言其一訪名儒以正雅樂事下禮官禮官言高皇帝命儒臣考定八音修造樂器參定樂章其登歌之詞多自裁定但歷今百三十餘年不復校正音律舛訛釐正宜急且太常官恐未足當製器協律之任乞詔下諸司博求中外臣工及山林有精曉音律者禮送京師會禮官熟議至當然後造器正音庶幾可以復祖制致太和帝可其奏末年詔南京及各王府選精通樂藝者詣京師復以禮官言而罷正德三年武宗諭內鐘鼓司康能等曰慶成大宴華夷臣工所觀瞻宜舉大樂邇者音樂廢缺無以重朝廷禮部乃請選三院樂工年壯者嚴督肄之仍移各省司取藝精者赴京供應顧所隸益猥雜筋斗百戲之類日盛於禁廷既而河間等府奉詔送樂戶居之新宅樂工既得幸時時言居外者不宜獨逸乃復移各省司所送技精者於教坊於是乘傳續食者又數百人俳優之勢大張臧賢以伶人進與諸佞倖角寵竊權矣嘉靖元年御史汪珊請屏絕玩好令教坊司毋得以新聲巧技進世宗嘉納之是時更定諸典禮因亦有志於樂建觀德殿以祀獻帝召協律郎肄樂供祀事後建世廟成改殿曰崇先乃親製樂章命大學士費宏等更定曲名以別於太廟其迎神曰永和之曲初獻曰清和之曲亞獻曰康和之曲終獻曰沖和之曲徹饌曰泰和之曲送神曰寧和之曲宏等復議獻皇生長太平不尚武功其三獻皆當用文德舞從之已而太常復請乃命禮官會張璁議璁言樂舞以佾數為降殺不聞以武文為偏全使八佾之制用其文而去其武則兩階之容得其左而闕其右是皇上舉天子禮樂而自降殺之矣乃從璁議仍用二舞九年二月始祈穀於南郊帝親製樂章命太常協於音譜是年始祀先蠶下禮官議樂舞禮官言先蠶之祀周漢所同其樂舞儀節經史不載唐開元先蠶儀注大樂令設宮縣於北郊壇壝內諸女工咸列於后則祀先蠶用女樂可知唐六典宮縣之舞八佾軒縣之舞六佾則祀先蠶用八佾又可知然止言舞生冠服而不及舞女冠服陳暘樂書享先蠶圖下止有宮架登歌圖而不及舞夫有樂有舞雖祀禮之常然周漢制度既不可考宋祀先蠶代以有司又不可據惟開元略為近古而陳氏樂書考據亦明前享先農既以佾數不足降八為六則今祀先蠶止用樂歌不用樂舞亦合古制且以見少殺先農之禮帝以舞非女子事罷不用使議樂女冠服以聞禮官言北郊陰方其色尚黑同色相感事神之道漢蠶東郊魏蠶西郊色皆尚青非其色矣樂女冠服宜黑乃用樂六奏去舞其樂女皆黑冠服因定享先蠶樂章又以祀典方釐定南北郊復朝日夕月之祭命詞臣取洪武時舊樂歌一切更改禮官因請廣求博訪有如宋胡瑗李照者具以名聞授之太常考定雅樂給事中夏言乃以致仕甘肅行太僕寺丞張鶚應詔命趣召之既至言曰大樂之正乃先定元聲元聲起自冥罔既覺之時亥子相乘之際積絲成毫積毫成釐積釐成分一時三十分一日十二時故聲生於日律起於辰氣在聲先聲從氣後若拘於器以求氣則氣不能致器而反受制於器何以定黃鍾起曆元須依蔡元定多截竹以擬黃鍾之律長短每差一分冬至日按律而候依法而取如衆管中先飛灰者即得元氣驗其時刻如在子初二刻即子初一刻移於初二刻矣如在正二刻即子正一刻移於正二刻矣願命知曆官一人同臣參候庶幾元聲可得而古樂可復又言古人製為十六編鐘非徒事觀美蓋為旋宮而設其下八鐘黃鍾大呂太簇夾鍾姑洗仲呂蕤賓林鍾是已其上八鐘夷則南呂無射應鍾黃鍾大呂太簇夾鍾是已近世止用黃鍾一均而不徧具十六鐘古人立樂之方已失況太常止以五凡工尺上一四六勾合字眼譜之去古益遠且如黃鍾為合似矣其以大呂為下四太簇為高四夾鍾為下一姑洗為高一夷則為下工南呂為高工之類皆以兩律兼一字何以旋宮取律止黃鍾一均而已且黃鍾大呂太簇夾鍾為上四清聲蓋黃鍾為君至尊無比黃鍾為宮則十一律皆從而受制臣民事物莫敢凌犯焉至於夾鍾為宮則下生無射為徵無射上生仲呂為商仲呂下生黃鍾為羽然黃鍾正律聲長非仲呂為商三分去一之次所以用黃鍾為羽必用子聲即上黃六之清聲正為不敢用黃鍾全聲而用其半耳姑洗以下之均大率若此此四清聲之所由立也編鐘十六其理亦然宋胡瑗知此義故四清聲皆小其圍徑以就之然黃鍾太簇二聲雖合大呂夾鍾二聲又非遂使十二律五聲皆不得正至於李照范鎮止用十二律不用四清聲其合於三分損益者則和矣夷則以降其臣民事物安能尊卑有辨而不相凌犯耶臣又考周禮圜鍾函鍾黃鍾天地人三宮之說有薦神之樂有降神之樂所為薦神之樂者乃奏黃鍾歌大呂子丑合也舞雲門以祀天神乃奏太簇歌應鍾寅亥合也舞咸池以祀地祇乃奏姑洗歌南呂辰酉合也舞大韶以祭四望乃奏蕤賓歌林鍾午未合也舞大夏以祭山川乃奏夷則歌小呂巳申合也舞大武以享先祖舞大濩以享先妣所謂降神之樂者冬至祀天圜丘則以圜鍾為宮黃鍾為角太簇為徵姑洗為羽是三者陽律相繼相繼者天之道也夏至祭地方丘則以函鍾為宮夾鍾為角姑洗為徵南呂為羽是三者陰呂相生相生者地之功也祭宗廟以黃鍾為宮大呂為角太簇為徵夾鍾為羽是三者律呂相合相合者人之情也且圜鍾夾鍾也生於房心之氣為天地之明堂祀天從此起宮在琴中角絃第十徽卯位也函鍾林鍾也生於坤位之氣在井東輿鬼之外主地祇祭地從此起宮在琴中徵絃第五徽未位也黃鍾生於虛危之氣為宗廟祭人鬼從此起宮在琴中宮絃第三徽子位也至若六變而天神降八變而地祇格九變而人鬼享非有難易之分蓋陽數起子而終於少陰之申陰數起午而終於少陽之寅圜鍾在卯自卯至申六數故六變而天神降函鍾在未自未至寅八數故八變而地祇格黃鍾在子自子至申九數故九變而人鬼享此皆以本元之聲召本位之神故感通之理速也或者謂自漢以來天地鬼神聞新聲習矣何必改作不知自人觀天地則由漢迄今千七百年自天地觀亦頃刻間耳自今正之猶可及也併進所著樂書二部其一曰大成樂舞圖譜自琴瑟以下諸樂逐字作譜其一曰古雅心談列十二圖以象十二律圖各有說又以琴為正聲樂之宗系凡郊廟大樂分註琴絃定徽各有歸旨且自謂心所獨契輪之妙有非口所能言者疏下禮部禮官言音律久廢太常諸官循習工尺字譜不復知有黃鍾等調臣等近奉詔演習新定郊祀樂章間問古人遺制茫無以對今鶚謂四清聲所以為旋宮其註絃定徽蓋已深識近樂之弊至欲取知曆者互相參考尤為探本窮源之論似非目前司樂者所及乃授鶚太常寺丞令詣太和殿較定樂舞鶚遂上言周禮有郊祀之樂有宗祀之樂尊親分殊聲律自別臣伏聽世廟樂章律起林鍾均殊太廟臣竊異之蓋世廟與太廟同禮而林鍾與黃鍾異樂函鍾主祀地祇位寓坤方星分井鬼樂奏八變以報資生之功故用林鍾起調林鍾畢調也黃鍾主祀宗廟位分子野星隸虛危樂奏九成以報本源之德故用黃鍾起調黃鍾畢調也理義各有歸旨聲數默相感通況天地者父母之象大君者宗子之稱今以祀母之樂奏以祀子恐世廟在天之靈必不能安且享矣不知譜是樂者何所見也臣觀舊譜樂章字用黃鍾聲同太廟但審聽七聲中少一律今更補正使依奏格則祖孫一氣相為流通函黃二宮不失均調尊親之分兩得神人之心胥悅矣詔下禮官李時等覆奏以為鶚所言與臣等所聞於律呂諸書者深有所合蓋黃鍾一調以黃鍾為宮太簇為商姑洗為角蕤賓為變徵林鍾為徵南呂為羽應鍾為變宮舊樂章用合用四用一用尺用工去蕤賓之勾而越次用再生黃鍾之六此舊樂章之失也若林鍾一調則以林鍾為宮南呂為商應鍾為角大呂之半聲為變徵太簇之半聲為徵姑洗之半聲為羽蕤賓之半聲為變宮邇者沈居敬更協樂章用尺用合用四用一用工用六夫合黃鍾也四太簇之正聲也一姑洗之正聲也六黃鍾之子聲也以林鍾為宮而所用為角徵羽者皆非其一均之聲則謬甚矣況林鍾一調不宜用於宗廟而太廟與世廟不宜異調鶚見尤真自今宜用舊協音律惟加以蕤賓勾聲去再生黃鍾之六改用應鍾之凡以成黃鍾一均庶於感格之義深有所補乃命鶚更定廟享樂音而逮治沈居敬等鶚尋譜定帝社稷樂歌以進詔嘉其勤晉為少卿掌教雅樂夏言又引古者龍見而雩命樂正習盛樂舞皇舞請依古禮定大雩之制當三獻禮成之後九奏樂止之時檃括雲漢詩辭製為雲門一曲使文武舞士幷舞而合歌之帝可其議時七廟既建樂制未備禮官因請更定宗廟雅樂言德懿熙仁四祖久祧舊章弗協太祖創業太宗定鼎列聖守成當有頌聲以對越在天垂之萬禩若特享若祫享若大祫詩歌頌美宜命儒臣撰述取自上裁其樂器樂舞各依太廟成式備為規制制可已而尊獻帝為睿宗祔享太廟於是九廟春特三時祫季冬大祫樂章皆更定焉十八年巡狩興都帝親製樂章享上帝於飛龍殿奉皇考配其後七廟火復同堂之制四時歲祫樂章器物仍如舊制初增七廟樂官及樂舞生自四郊九廟暨太歲神祇諸壇樂舞人數至二千一百名後稍裁革存其半張鶚遷太常卿復申前說建白三事一請設特鐘特磬以為樂節一請復宮縣以備古制一請候元氣以定鍾律事下禮官言特鐘特磬宜造樂懸在廟廷中周旋未便不得更製惟黃鍾為聲氣之元候氣之法實求中氣以定中聲最為作樂本原其說若重室墐戶截管實灰覆緹按曆氣至灰飛證以累黍具有成法可依其法築室於圜丘外垣隙地選知曆候者往相其役待稍有次第然後委官考驗從之乃詔取山西長子縣羊頭山黍大小中三等各五斗以備候氣定律明自太祖世宗樂章屢易然鍾律為制作之要未能有所講明呂懷劉濂韓邦奇黃佐王邦直之徒著書甚備職不與典樂託之空言而已張鶚雖因知樂得官候氣終屬渺茫不能準以定律弘治中莆人李教授文利著律呂元聲獨宗呂覽黃鍾三寸九分之說世宗初年御史范永鑾上其書其說與古背不可用嘉靖十七年六月遼州同知李文察進所著樂書四種禮官謂於樂理樂書多前人所未發者乃授文察為太常典簿以奬勸之而其所云按人聲以考定五音者不能行也神宗時鄭世子載堉著律呂精義律學新說樂舞全譜共若干卷具表進獻崇禎六年禮部尚書黃汝良進昭代樂律志宣付史館以備稽考未及施行
