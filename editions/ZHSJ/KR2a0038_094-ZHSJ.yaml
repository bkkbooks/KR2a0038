body:
  text: 明史卷九十四志第七十刑法二三法司曰刑部都察院大理寺刑部受天下刑名都察院糾察大理寺駁正太祖嘗曰凡有大獄當面訊防搆陷鍛鍊之弊故其時重案多親鞫不委法司洪武十四年命刑部聽兩造之詞議定入奏既奏錄所下旨送四輔官諫院官給事中覆覈無異然後覆奏行之有疑獄則四輔官封駁之踰年四輔官罷乃命議獄者一歸於三法司十六年命刑部尚書開濟等議定五六日旬時三審五覆之法十七年建三法司於太平門外鍾山之陰命之曰貫城下敕言貫索七星如貫珠環而成象名天牢中虛則刑平官無邪私故獄無囚人貫內空中有星或數枚者即刑繁刑官非其人有星而明為貴人無罪而獄今法天道置法司爾諸司其各慎乃事法天道行之令貫索中虛庶不負朕肇建之意又諭法司官布政按察司所擬刑名其間人命重獄具奏轉達刑部都察院參考大理寺詳擬著為令刑部有十三清吏司治各布政司刑名而陵衞王府公侯伯府在京諸曹及兩京州郡亦分隸之按察名提刑蓋在外之法司也參以副使僉事分治各府縣事京師自笞以上罪悉由部議洪武初決獄笞五十者縣決之杖八十者州決之一百者府決之徒以上具獄送行省移駁繁而賄賂行乃命中書省御史臺詳讞改月報為季報以季報之數類為歲報凡府州縣輕重獄囚依律決斷違枉者御史按察司糾劾至二十六年定制布政司及直隸府州縣笞杖就決徒流遷徙充軍雜犯死罪解部審錄行下具死囚所坐罪名上部詳議如律者大理寺擬覆平允監收候決其決不待時重囚報可即奏遣官往決之情詞不明或失出入者大理寺駁回改正再問駁至三改擬不當將當該官吏奏問謂之照駁若亭疑讞決而囚有番異則改調隔別衙門問擬二次番異不服則具奏會九卿鞫之謂之圓審至三四訊不服而後請旨決焉正統四年稍更直省決遣之制徒流就彼決遣死罪以聞成化五年南大理評事張鈺言南京法司多用嚴刑迫囚誣服其被糾者亦止改正而無罪甚非律意乃詔申大理寺參問刑部之制弘治十七年刑部主事朱瑬言部囚送大理第當駁正不當用刑大理卿楊守隨言刑具永樂間設不可廢帝是其言會官審錄之例定於洪武三十年初制有大獄必面訊十四年命法司論囚擬律以奏從翰林院給事中及春坊正字司直郎會議平允然後覆奏論決至是置政平訟理二旛審諭罪囚諭刑部曰自今論囚惟武臣死罪朕親審之餘俱以所犯奏然後引至承天門外命行人持訟理旛傳旨諭之其無罪應釋者持政平旛宣德意遣之繼令五軍都督府六部都察院六科通政司詹事府間及駙馬雜聽之錄冤者以狀聞無冤者實犯死罪以下悉論如律諸雜犯准贖永樂七年令大理寺官引法司囚犯赴承天門外行人持節傳旨會同府部通政司六科等官審錄如洪武制十七年令在外死罪重囚悉赴京師審錄仁宗特命內閣學士會審重囚可疑者再問宣德三年奏重囚帝令多官覆閱之曰古者斷獄必訊於三公九卿所以合至公重民命卿等往同覆審毋致枉死英國公張輔等還奏訴枉者五十六人重命法司勘實因切戒焉天順三年令每歲霜降後三法司同公侯伯會審重囚謂之朝審歷朝遂遵行之成化十七年命司禮太監一員會同三法司堂上官於大理寺審錄謂之大審南京則命內守備行之自此定例每五年輒大審初成祖定熱審之例英宗特行朝審至是復有大審所矜疑放遣嘗倍於熱審時內閣之與審也自憲宗罷至隆慶元年高拱復行之故事朝審吏部尚書秉筆時拱適兼吏部故也至萬曆二十六年朝審吏部尚書缺以戶部尚書楊俊民主之三十二年復缺以戶部尚書趙世卿主之崇禎十五年命首輔周延儒同三法司清理淹獄蓋出於特旨云大審自萬曆二十九年曠不舉四十四年乃行之熱審始永樂二年止決遣輕罪命出獄聽候而已尋幷寬及徒流以下宣德二年五六七月連諭三法司錄上繫囚罪狀凡決遣二千八百餘人七年二月親閱法司所進繫囚罪狀決遣千餘人減等輸納春審自此始六月又以炎暑命自實犯死罪外悉早發遣且馳諭中外刑獄悉如之成化時熱審始有重罪矜疑輕罪減等枷號疏放諸例正德元年掌大理寺工部尚書楊守隨言每歲熱審事例行於北京而不行於南京五年一審錄事例行於在京而略於在外今宜通行南京凡審囚三法司皆會審其在外審錄亦依此例詔可嘉靖十年令每年熱審幷五年審錄之期雜犯死罪准徒五年者皆減一年二十三年刑科羅崇奎言五六月間笞罪應釋放徒罪應減等者亦宜如成化時欽恤枷號例暫與蠲免至六月終止南法司亦如之報可隆慶五年令贓銀止十兩以上監久產絕或身故者熱審免追釋其家屬萬曆三十九年方大暑省刑而熱審矜疑疏未下刑部侍郎沈應文以獄囚久滯乞暫豁矜疑者未報明日法司盡按囚籍軍徒杖罪未結者五十三人發大興宛平二縣監候乃以疏聞神宗亦不罪也舊例每年熱審自小滿後十餘日司禮監傳旨下刑部即會同都察院錦衣衞題請通行南京法司一體審擬具奏京師自命下之日至六月終止南京自部移至日為始亦滿兩月而止四十四年不舉行明年又逾兩月命未下會暑雨獄中多疫言官以熱審愆期朝審不行詔獄理刑無人三事交章上請又請釋楚宗英嫶蘊鈁等五十餘人罣誤知縣滿朝薦同知王邦才卞孔時等皆不報崇禎十五年四月亢旱下詔清獄中允黃道周言中外齋宿為百姓請命而五日之內繫兩尚書不聞有抗疏爭者尚足回天意乎兩尚書謂李日宣陳新甲也帝方重怒二人不能從歷朝無寒審之制崇禎十年以代州知州郭正中疏及寒審命所司求故事尚書鄭三俊乃引數事以奏言謹按洪武二十三年十二月癸未太祖諭刑部尚書楊靖自今惟犯十惡并殺人者論死餘死罪皆令輸粟北邊以自贖永樂四年十一月法司進月繫囚數凡數百人大辟僅十之一成祖諭呂震曰此等既非死罪而久繫不決天氣沍寒必有聽其冤死者凡雜犯死罪下約二百悉准贖發遣九年十一月刑科曹潤等言昔以天寒審釋輕囚今囚或淹一年以上且一月間瘐死者九百三十餘人獄吏之毒所不忍言成祖召法司切責遂詔徒流以下三日內決放重罪當繫者恤之無令死於饑寒十二年十一月復令以疑獄名上親閱之宣德四年十月以皇太子千秋節減雜犯死罪以下宥笞杖及枷鐐者嗣後世宗神宗或以災異修刑或以覃恩布德寒審雖無近例而先朝寬大皆所宜取法者奏上帝納其言然永樂十一年十月遣副都御史李慶齎璽書命皇太子錄南京囚贖雜犯死罪以下宣德四年冬以天氣沍寒敕南北刑官悉錄繫囚以聞不分輕重因謂夏原吉等曰堯舜之世民不犯法成康之時刑措不用皆君臣同德所致朕德薄卿等其勉力匡扶庶無愧古人此寒審最著者三俊亦不暇詳也在外恤刑會審之例定於成化時初太祖患刑獄壅蔽分遣御史林愿石恆等治各道囚而敕諭之宣宗夜讀周官立政式敬爾由獄以長我王國慨然興歎以為立國基命在於此乃敕三法司朕體上帝好生之心惟刑是恤令爾等詳覆天下重獄而犯者遠在千萬里外需次當決豈能無冤因遣官審錄之正統六年四月以災異頻見敕遣三法司官詳審天下疑獄於是御史張驥刑部郎林厚大理寺正李從智等十三人同奉敕往而復以刑部侍郎何文淵大理卿王文巡撫侍郎周忱刑科給事中郭瑾審兩京刑獄亦賜之敕後評事馬豫言臣奉敕審刑竊見各處捉獲強盜多因讎人指攀拷掠成獄不待詳報死傷者甚多今後宜勿聽妄指果有贓證御史按察司會審方許論決若未審錄有傷死者毋得准例陞賞是年出死囚以下無數九年山東副使王裕言囚獄當會審而御史及三司官或踰年一會囚多瘐死往者常遣御史會按察司詳審釋遣甚眾今莫若罷會審之例而行詳審之法敕遣按察司官一員專審諸獄部持舊制不可廢帝命審例仍舊復如詳審例選按察司官一員與巡按御史同審失出者姑勿問涉贓私者究如律成化元年南京部侍郎陳翼因災異復請如正統例部議以諸方多事不行八年乃分遣刑部郎中劉秩等十四人會巡按御史及三司官審錄敕書鄭重遣之十二年大學士商輅言自八年遣官後五年於茲乞更如例行帝從其請至十七年定在京五年大審即於是年遣部寺官分行天下會同巡按御史行事於是恤刑者至則多所放遣嘉靖四十三年定坐贓不及百兩產絕者免監追萬曆四年敕雜犯死罪准徒五年者幷兩犯徒律應總徒四年者各減一年其他徒流等罪俱減等皆由恤刑者奏定所生全者益多矣初正統十一年遣刑部郎中郭恂員外郎陸瑜審南北直隸獄囚文職五品以下有罪許執問嘉靖間制審錄官一省事竣總計前後所奏依准改駁多寡通行考覈改駁數多者聽劾故恤刑之權重而責亦匪輕此中外法司審錄之大較也凡刑部問發罪囚所司通將所問囚數不問罪名輕重分南北人各若干送山東司呈堂奏聞謂之歲報每月以見監罪囚奏聞謂之月報其做工運炭等項每五日開送工科填寫精微冊月終分六科輪報之凡法官治囚皆有成法提人勘事必齎精微批文京外官五品以上有犯必奏聞請旨不得擅勾問罪在八議者實封以聞民間獄訟非通政司轉達於部刑部不得聽理誣告者反坐越訴者笞擊登聞鼓不實者杖訐告問官必覈實乃逮問至罪囚打斷起發有定期刑具有定器停刑有定月日檢驗屍傷有定法恤囚有定規籍沒亦有定物惟復讎者無明文弘治元年刑部尚書何喬新言舊制提人所在官司必驗精微批文與符號相合然後發遣此祖宗杜漸防微深意也近者中外提人止憑駕帖既不用符真偽莫辨姦人矯命何以拒之請給批文如故帝曰此祖宗舊例不可廢命復行之然旗校提人率齎駕帖嘉靖元年錦衣衞千戶白壽等齎駕帖詣科給事中劉濟謂當以御批原本送科使知其事兩人相爭並列上命檢成弘事例以聞濟復言自天順時例即如此帝入壽言責濟以狀對亦無以罪也天啟時魏忠賢用駕帖提周順昌諸人竟激蘇州之變兩畿決囚亦必驗精微批嘉靖二十一年恤刑主事戴楩吳元璧呂顒等行急失與內號相驗比至與原給外號不合為巡按御史所糾納贖還職成化時六品以下官有罪巡按御史輒令府官提問陝西巡撫項忠言祖制京外五品以上官有犯奏聞不得擅勾問今巡按輒提問六品官甚乖律意當聞於朝命御史按察司提問為是乃下部議從之凡罪在八議者實封奏聞請旨惟十惡不用此例所屬官為上司非理凌虐亦聽實封徑奏軍官犯罪都督府請旨諸司事涉軍官及呈告軍官不法者俱密以實封奏無得擅勾問嘉靖中順天巡按御史鄭存仁檄府縣凡法司有所追取不得輒發尚書鄭曉考故事民間詞訟非自通政司轉達不得聽而諸司有應問罪人必送刑部各不相侵曉乃言刑部追取人府縣不當却存仁違制宜罪存仁亦執自下而上之律論曉欺罔乃命在外者屬有司在京者屬刑部然自曉去位民間詞訟五城御史輒受之不復遵祖制矣洪武時有告謀反者勘問不實刑部言當抵罪帝以問秦裕伯對曰元時若此者罪止杖一百蓋以開來告之路也帝曰姦徒不抵善人被誣者多矣自今告謀反不實者扺罪學正孫詢訐稅使孫必貴為胡黨又訐元參政黎銘常自稱老豪傑謗訕朝廷帝以告訐非儒者所為置不問永樂間定制誣三四人杖徒五六人流三千里十人以上者凌遲家屬徙化外洪武末年小民多越訴京師及按其事往往不實乃嚴越訴之禁命老人理一鄉詞訟會里胥決之事重者始白於官然卒不能止越訴者日多乃用重法戍之邊宣德時越訴得實者免罪不實仍戍邊景泰中不問虛實皆發口外充軍後不以為例也登聞鼓洪武元年置於午門外一御史日監之非大冤及機密重情不得擊擊即引奏後移置長安右門外六科錦衣衞輪收以聞旨下校尉領駕帖送所司問理蒙蔽阻遏者罪龍江衞吏有過罰令書寫值母喪乞守制吏部尚書詹徽不聽擊鼓訴冤太祖切責徽使吏終喪永樂元年縣令以贓戍擊鼓陳狀帝為下法司其人言實受贓年老昏眊所致惟上哀憫帝以其歸誠屈法宥之宣德時直登聞鼓給事林富言重囚二十七人以姦盜當決擊鼓訴冤煩瀆不可宥帝曰登聞鼓之設正以達下情何謂煩瀆自後凡擊鼓訴冤阻遏者罪凡訐告原問官司者成化間定議覈究得實然後逮問弘治時南京御史王良臣按指揮周愷等怙勢黷貨愷等遂訐良臣詔下南京法司逮繫會鞫侍郎楊守隨言此與舊章不合請自今以後官吏軍民奏訴牽緣別事摭拾原問官者立案不行所奏事仍令問結虛詐者擬罪原問官枉斷者亦罪乃下其議於三法司法司覆奏如所請從之洪武二十六年以前刑部令主事廳會御史五軍斷事司大理寺五城兵馬指揮使官打斷罪囚二十九年幷差錦衣衞官其後惟主事會御史將笞杖罪於打斷廳決訖附卷奉旨者次日覆命萬曆中刑部尚書孫丕揚言折獄之不速由文移牽制故耳議斷既成部寺各立長單刑部送審掛號次日即送大理大理審允次日即還本部參差者究處庶事體可一至於打斷相驗令御史三六九日遵例會同餘日止會寺官以速遣徒流以上部寺詳鞫笞杖小罪聽堂部處分命如議行凡獄囚已審錄應決斷者限三日應起發者限十日逾限計日以笞囚淹滯至死者罪徒此舊例也嘉靖六年給事中周瑯言比者獄吏苛刻犯無輕重概加幽繫案無新故動引歲時意喻色授之間論奏未成囚骨已糜又況偏州下邑督察不及姦吏悍卒倚獄為市或扼其飲食以困之或徙之穢溷以苦之備諸痛楚十不一生臣觀律令所載凡逮繫囚犯老疾必散收輕重以類分枷杻薦蓆必以時飭涼漿暖匣必以時備無家者給之衣服有疾者予之醫藥淹禁有科疏決有詔此祖宗良法美意宜敕臣下同為奉行凡逮繫日月幷已竟未竟疾病死亡者各載文冊申報長吏較其結竟之遲速病故之多寡以為功罪而黜陟之帝深然其言且命中外有用法深刻致戕民命者即斥為民雖才守可觀不得推薦凡內外問刑官惟死罪幷竊盜重犯始用拷訊餘止鞭扑常刑酷吏輒用挺棍夾棍腦箍烙鐵及一封書鼠彈箏攔馬棍燕兒飛或灌鼻釘指用徑寸嬾杆不去棱節竹片或鞭脊背兩踝致傷以上者俱奏請罪至充軍停刑之月自立春以後至春分以前停刑之日初一初八十四十五十八二十三二十四二十八二十九三十凡十日檢驗屍傷照磨司取部印屍圖一幅委五城兵馬司如法檢驗府則通判推官州縣則長官親檢毋得委下僚獄囚貧不自給者洪武十五年定制人給米日一升二十四年革去正統二年以侍郎何文淵言詔如舊且令有贓罰敝衣得分給成化十二年令有司買藥餌送部又廣設惠民藥局療治囚人至正德十四年囚犯煤油藥料皆設額銀定數嘉靖六年以運炭等有力罪囚折色糴米上本部倉每年約五百石乃停收歲冬給綿衣褲各一事提牢主事驗給之犯罪籍沒者洪武元年定制自反叛外其餘罪犯止沒田產孳畜二十一年詔謀逆姦黨及造偽鈔者沒貲產丁口以農器耕牛給還之凡應合鈔劄者曰姦黨曰謀反大逆曰姦黨惡曰造偽鈔曰殺一家三人曰採生拆割人為首其大誥所定十條後未嘗用也復讎惟祖父被毆條見之曰祖父母父母為人所殺而子孫擅殺行兇人者杖六十其即時殺死者勿論其餘親屬人等被人殺而擅殺之者杖一百按律罪人應死已就拘執其捕者擅殺之罪亦止此則所謂家屬人等自包兄弟在內其例可類推也凡決囚每歲朝審畢法司以死罪請旨刑科三覆奏得旨行刑在外者奏決單於冬至前會審決之正統元年令重囚三覆奏畢仍請駕帖付錦衣衞監刑官領校尉詣法司取囚赴市又制臨決囚有訴冤者直登聞鼓給事中取狀封進仍批校尉手馳赴市曹暫停刑嘉靖元年給事中劉濟等以囚廖鵬父子及王欽陶杰等頗有內援懼上意不決乃言往歲三覆奏畢待駕帖則已日午鼓下仍受訴詞得報且及未申時及再請始刑時已過酉大非刑人於市與衆棄之之意請自今決囚在未前畢事從之七年定議重囚有冤家屬於臨決前一日撾鼓翼日午前下過午行刑不覆奏南京決囚無刑科覆奏例弘治十八年南刑部奏決不待時者三人大理寺已審允下法司議謂在京重囚間有決不待時者審允奏請至刑科三覆奏或蒙恩仍監候會審南京無覆奏例乞俟秋後審竟類奏定奪如有巨憝難依常例者更具奏處決著為令詔可各省決囚永樂元年定制死囚百人以上者差御史審決弘治十三年定歲差審決重囚官俱以霜降後至限期復命凡有大慶及災荒皆赦然有常赦有不赦有特赦十惡及故犯者不赦律文曰赦出臨時定罪名特免或降減從輕者不在此限十惡中不睦又在會赦原宥之例此則不赦者亦得原若傳旨肆赦不別定罪名者則仍依常赦不原之律自仁宗立赦條三十五皆楊士奇代草盡除永樂年間敝政歷代因之凡先朝不便於民者皆援遺詔或登極革除之凡以赦前事告言人罪者即坐以所告者罪弘治元年民呂梁山等四人坐竊盜殺人死遇赦都御史馬文升請宥死戍邊帝特命依律斬之世宗雖屢停刑尤慎無赦廷臣屢援赦令欲宥大禮大獄暨建言諸臣益持不允及嘉靖十六年同知姜輅酷殺平民都御史王廷相奏當發口外乃特命如詔書宥免而以違詔責廷相等四十一年三殿成羣臣請頒赦帝曰赦乃小人之幸不允穆宗登極覃恩雖徒流人犯已至配所者皆許放還蓋為遷謫諸臣地也有明一代刑法大概太祖開國之初懲元季貪冒重繩贓吏揭諸司犯法者於申明亭以示戒又命刑部凡官吏有犯宥罪復職書過榜其門使自省不悛論如律累頒犯諭戒諭榜諭悉象以刑誥示天下及十八年大誥成序之曰諸司敢不急公而務私者必窮搜其原而罪之凡三誥所列凌遲梟示種誅者無慮千百棄市以下萬數貴溪儒士夏伯啟叔姪斷指不仕蘇州人才姚潤王謨被徵不至皆誅而籍其家寰中士夫不為君用之科所由設也其三編稍寬容然所記進士監生罪名自一犯至四犯者猶三百六十四人幸不死還職率戴斬罪治事其推原中外貪墨所起以六曹為罪魁郭桓為誅首郭桓者戶部侍郎也帝疑北平二司官吏李彧趙全德等與桓為姦利自六部左右侍郎下皆死贓七百萬詞連直省諸官吏繫死者數萬人覈贓所寄借徧天下民中人之家大抵皆破時咸歸謗御史余敏丁廷舉或以為言帝乃手詔列桓等罪而論右審刑吳庸等極刑以厭天下心言朕詔有司除姦顧復生姦擾吾民今後有如此者遇赦不宥先是十五年空印事發每歲布政司府州縣吏詣戶部覈錢糧軍需諸事以道遠預持空印文書遇部駁即改以為常及是帝疑有姦大怒論諸長吏死佐貳榜百戍邊寧海人鄭士利上書訟其冤復杖戍之二獄所誅殺已過當而胡惟庸藍玉兩獄株連死者且四萬然時引大體有所縱舍沅陵知縣張傑當輸作自陳母賀當元季亂離守節今年老失養帝謂可勵俗特赦之秩傑令終養給事中彭與民坐繫其父為上表訴哀立釋之且免同繫十七人有死囚妻妾訴夫冤法司請黥之帝以婦為夫訴職也不罪都察院當囚死者二十四人命羣臣鞫有冤者減數人死真州民十八人謀不軌戮之而釋其母子當連坐者所用深文吏開濟詹徽陳寧陶凱輩後率以罪誅之亦數宣仁言不欲純任刑罰嘗行郊壇皇太子從指道旁荊楚曰古用此為扑刑取能去風雖寒不傷也尚書開濟議法密諭之曰竭澤而漁害及鯤鮞焚林而田禍及麛鷇法太巧密民何以自全濟慚謝參政楊憲欲重法帝曰求生於重典猶索魚於釜得活難矣御史中丞陳寧曰法重則人不輕犯吏察則下無遁情太祖曰不然古人制刑以防惡衞善故唐虞畫衣冠異章服以為戮而民不犯秦有鑿顛抽脅之刑參夷之誅而囹圄成市天下怨叛未聞用商韓之法可致堯舜之治也寧慚而退又嘗謂尚書劉惟謙曰仁義者養民之膏粱也刑罰者懲惡之藥石也舍仁義而專用刑罰是以藥石養人豈得謂善治乎蓋太祖用重典以懲一時而酌中制以垂後世故猛烈之治寬仁之詔相輔而行未嘗偏廢也建文帝繼體守文專欲以仁義化民元年刑部報囚減太祖時十三矣成祖起靖難之師悉指忠臣為姦黨甚者加族誅掘塚妻女發浣衣局教坊司親黨謫戍者至隆萬間猶勾伍不絕也抗違者既盡殺戮懼人竊議之疾誹謗特甚山陽民丁鈺訐其鄉誹謗罪數十人法司迎上旨言鈺才可用立命為刑科給事中永樂十七年復申其禁而陳瑛呂震紀綱輩先後用事專以刻深固寵於是蕭議周新解縉等多無罪死然帝心知苛法之非間示寬大千戶某灌桐油皮鞭中以決人刑部當以杖命幷罷其職法司奏冒支官糧者命即戮之刑部為覆奏帝曰此朕一時之怒過矣其依律自今犯罪皆五覆奏至仁宗性甚仁恕甫即位謂金純劉觀曰卿等皆國大臣如朕處法失中須更執奏朕不難從善也因召學士楊士奇楊榮金幼孜至榻前諭曰比年法司之濫朕豈不知其所擬大逆不道往往出於文致先帝數切戒之故死刑必四五覆奏而法司略不加意甘為酷吏而不愧自今審重囚卿三人必往同讞有冤抑者雖細故必以聞洪熙改元二月諭都御史劉觀大理卿虞謙曰往者法司以誣陷為功人或片言及國事輒論誹謗身家破滅莫復辨理今數月間此風又萌夫治道所急者求言所患者以言為諱奈何禁誹謗哉因顧士奇等曰此事必以詔書行之於是士奇承旨載帝言於己丑詔書云若朕一時過於嫉惡律外用籍沒及凌遲之刑者法司再三執奏三奏不允至五五奏不允同三公及大臣執奏必允乃已永為定制文武諸司亦毋得暴酷用鞭背等刑及擅用宮刑絕人嗣續有自宮者以不孝論除謀反及大逆者餘犯止坐本身毋一切用連坐法告誹謗者勿治在位未一年仁恩該洽矣宣宗承之益多惠政宣德元年大理寺駁正猗氏民妻王骨都殺夫之冤帝切責刑官尚書金純等謝罪乃已義勇軍士閻羣兒等九人被誣為盜當斬家人擊登聞鼓訴冤覆按實不為盜命釋羣兒等而切責都御史劉觀其後每遇奏囚色慘然御膳為廢或以手撤其牘謂左右曰說與刑官少緩之一日御文華殿與羣臣論古肉刑侍臣對漢除肉刑人遂輕犯法帝曰此自由教化豈關肉刑之有無舜法有流宥金贖而四凶之罪止於竄殛可見當時被肉刑者必皆重罪不濫及也況漢承秦敝挾書有律若概用肉刑受傷者必多矣明年著帝訓五十五篇其一恤刑也武進伯朱冕言比遣舍人林寬等送囚百十七人戍邊到者僅五十人餘皆道死帝怒命法司窮治之帝寬詔歲下閱囚屢決遣有至三千人者諭刑官曰吾慮其瘐死故寬貸之非常制也是時官吏納米百石若五十石得贖雜犯死罪軍民減十之二諸邊衞十二石遼東二十石於例為太輕然獨嚴贓吏之罰命文職犯贓者俱依律科斷由是用法輕而貪墨之風亦不甚恣然明制重朋比之誅都御史夏迪催糧常州御史何楚英誣以受金諸司懼罪明知其冤不敢白迪竟充驛夫憤死以帝之寬仁而大臣有冤死者此立法之弊也英宗以後仁宣之政衰正統初三楊當國猶恪守祖法禁內外諸司鍛鍊刑獄刑部尚書魏源以災旱上疑獄請命各巡撫審錄從之無巡撫者命巡按清軍御史行在都察院亦以疑獄上通審錄之御史陳祚言法司論獄多違定律專務刻深如戶部侍郎吳璽舉淫行主事吳軏宜坐貢舉非其人罪乃加以奏事有規避律斬及軏自經死獄官卒之罪明有遞減科乃援不應為事理重者概杖之夫原情以定律祖宗防範至周而法司乃抑輕從重至此非所以廣聖朝之仁厚也今後有妄援重律者請以變亂成法罪之帝是其言為申警戒至六年王振始亂政數辱廷臣刑章大紊侍講劉球條上十事中言天降災譴多感於刑罰之不中宜一任法司視其徇私不當者而加以罪雖有觸忤如漢犯蹕盜環之事猶當聽張釋之之執奏而從之帝不能用而球即以是疏觸振怒死於獄然諸酷虐事大率振為之帝心頗寬平十一年大理卿俞士悅以毆鬬殺人之類百餘人聞請宥俱減死戍邊景泰中陽穀主簿馬彥斌當斬其子震請代死特宥彥斌編震充邊衞軍大理少卿薛瑄言法司發擬罪囚多加參語奏請變亂律意詔法官問獄一依律令不許妄參語六年以災異審錄中外刑獄全活者甚眾天順中詔獄繁興三法司錦衣獄多繫囚未決吏往往洩獄情為姦都御史蕭維楨附會徐有貞枉殺王文于謙等而刑部侍郎劉廣衡即以詐撰制文坐有貞斬罪其後緹騎四出海內不安然霜降後審錄重囚實自天順間始至成化初刑部尚書陸瑜等以請命舉行之獄上杖其情可矜疑者免死發戍列代奉行人獲沾法外恩矣憲宗之即位也敕三法司中外文武羣臣除贓罪外所犯罪名紀錄在官者悉與湔滌其後歲以為常十年當決囚冬至節近特命過節行刑既而給事中言冬至後行刑非時遂詔俟來年冬月山西巡撫何喬新劾奏遲延獄詞僉事尚敬劉源因言凡二司不決斷詞訟者半年之上悉宜奏請執問帝曰刑獄重事周書曰要囚服念五六日至於旬時特為未得其情者言耳苟得其情即宜決斷無罪拘幽往往瘐死是刑官殺之也故律特著淹禁罪囚之條其即以喬新所奏通行天下又定制凡盜賊贓仗未真人命死傷未經勘驗輒加重刑致死獄中者審勘有無故失明白不分軍民職官俱視酷刑事例為民侍郎楊宣妻悍妬殺婢十餘人部擬命婦合坐者律特命決杖五十時帝多裨政而於刑獄尤慎之所失惟一二事嘗欲殺一囚不許覆奏御史方佑復以請帝怒杖謫佑吉安知府許聰有罪中官黃高嗾法司論斬給事中白昂以未經審錄為請不聽竟乘夜斬之孝宗初立免應決死罪四十八人元年知州劉概坐妖言罪斬以王恕爭得長繫末年刑部尚書閔珪讞重獄忤旨久不下帝與劉大夏語及之對曰人臣執法效忠珪所為無足異帝曰且道自古君臣曾有此事否對曰臣幼讀孟子見瞽瞍殺人臯陶執之之語珪所執未可深責也帝頷之明日疏下遂如擬前後所任司寇何喬新彭韶白昂閔珪皆持法平者海內翕然頌仁德焉正德五年會審重囚減死者二人時冤濫滿獄李東陽等因風霾以為言特許寬恤而刑官懼觸劉瑾怒所上止此後磔流賊趙鐩等於巿剝為魁者六人皮法司奏祖訓有禁不聽尋以皮製鞍鐙帝每騎乘之而廷杖直言之臣亦武宗為甚世宗即位七月因日精門災疏理冤抑命再問緩死者三十八人而廖鵬王瓛齊佐等與焉給事中李復禮等言鵬等皆江彬錢寧之黨王法所必誅乃令禁之如故後皆次第伏法自杖諸爭大禮者遂痛折廷臣六年命張璁桂萼方獻夫攝三法司變李福達之獄欲坐馬錄以姦黨律楊一清力爭乃戍錄而坐罪者四十餘人璁等以為己功遂請帝編欽明大獄錄頒示天下是獄所坐大抵璁三人夙嫌者以祖宗之法供權臣排陷而帝不悟也八年京師民張福殺母訴為張柱所殺刑部郎中魏應召覆治得實而帝以柱乃武宗后家僕有意曲殺之命侍郎許讚盡反讞詞而下都御史熊浹及應召於獄其後猜忌日甚冤濫者多雖間命寬恤而意主苛刻嘗諭輔臣近連歲因災異免刑今復當刑科三覆請旨朕思死刑重事欲將盜陵殿等物及毆罵父母大傷倫理者取決餘令法司再理與卿共論慎之慎之時以為得大體越數年大理寺奉詔讞奏獄囚應減死者帝謂諸囚罪皆不赦乃假借恩例縱姦壞法黜降寺丞以下有差自九年舉秋謝醮免決囚自後或因祥瑞或因郊祀大報停刑之典每歲舉行然屢譴怒執法官以為不時請旨至上迫冬至廢義而巿恩也遂削刑部尚書吳山職降調刑科給事中劉三畏等中年益肆誅戮自宰輔夏言不免至三十七年乃出手諭言司牧者未盡得人任情作威湖廣幼民吳一魁二命枉刑母又就捕情迫無控萬里叩閽以此推之冤抑者不知其幾爾等宜亟體朕心加意矜恤仍通行天下咸使喻之是詔也卹卹乎有哀痛之思焉末年主事海瑞上書觸忤刑部當以死帝持其章不下瑞得長繫穆宗立徐階緣帝意為遺詔盡還諸逐臣優恤死亡縱釋幽繫讀詔書者無不歎息萬曆初冬月詔停刑者三矣五年九月司禮太監孫得勝復傳旨奉聖母諭大婚期近命閣臣於三覆奏本擬旨免刑張居正言祖宗舊制凡犯死罪鞫問既明依律棄巿嘉靖末年世宗皇帝因齋醮始有暫免不決之令或間從御筆所勾量行取決此特近年姑息之弊非舊制也臣等詳閱諸囚罪狀皆滅絕天理敗傷彝倫聖母獨見犯罪者身被誅戮之可憫而不知彼所戕害者皆含冤蓄憤於幽冥之中使不一雪其痛怨恨之氣上干天和所傷必多今不行刑年復一年充滿囹圄既費關防又乖國典其於政體又大謬也給事中嚴用和等亦以為言詔許之十二年御史屠叔明請釋革除忠臣外親命自齊黃外方孝孺等連及者俱勘豁帝性仁柔而獨惡言者自十二年至三十四年內外官杖戍為民者至百四十人後不復視朝刑辟罕用死囚屢停免云天啟中酷刑多別見不具論莊烈帝即位誅魏忠賢崇禎二年欽定逆案凡六等天下稱快然是時承神宗廢弛熹宗昏亂之後銳意綜理用刑頗急大臣多下獄者矣六年冬論囚素服御建極殿召閣臣商榷而溫體仁無所平反陝西華亭知縣徐兆麒抵任七日城陷坐死帝心憫之體仁不為救十一年南通政徐石麒疏救鄭三俊因言皇上御極以來諸臣麗丹書者幾千圜扉為滿使情法盡協猶屬可憐況怵惕於威嚴之下者有將順而無挽回有揣摩而無補救株連蔓引九死一生豈聖人惟刑之恤之意哉帝不能納也是年冬以彗見停刑其事關封疆及錢糧剿寇者詔刑部五日具獄十二年御史魏景琦論囚西市御史高欽舜工部郎中胡璉等十五人將斬忽中官本清銜命馳免因釋十一人明日景琦回奏被責下錦衣獄蓋帝以囚有聲冤者停刑請旨而景琦倉卒不辨故獲罪十四年大學士范復粹疏請清獄言獄中文武纍臣至百四十有奇大可痛不報是時國事日𣗥惟用重法以繩羣臣救過不暇而卒無救於亂亡也
