body:
  text: 明史卷一百九十五列傳第八十三王守仁冀元亨王守仁字伯安餘姚人父華字德輝成化十七年進士第一授修撰弘治中累官學士少詹事華有器度在講幄最久孝宗甚眷之李廣貴幸華講大學衍義至唐李輔國與張后表𩹉用事指陳甚切帝命中官賜食勞焉正德初進禮部左侍郎以守仁忤劉瑾出為南京吏部尚書坐事罷旋以會典小誤降右侍郎瑾敗乃復故無何卒華性孝母岑年踰百歲卒華已年七十餘猶寢苫蔬食士論多之守仁娠十四月而生祖母夢神人自雲中送兒下因名雲五歲不能言異人拊之更名守仁乃言年十五訪客居庸山海關時闌出塞縱觀山川形勝弱冠舉鄉試學大進顧益好言兵且善射登弘治十二年進士使治前威寧伯王越葬還而朝議方急西北邊守仁條八事上之尋授刑部主事決囚江北引疾歸起補兵部主事正德元年冬劉瑾逮南京給事中御史戴銑等二十餘人守仁抗章救瑾怒廷杖四十謫貴州龍場驛丞龍場萬山叢薄苗僚雜居守仁因俗化導夷人喜相率伐木為屋以棲守仁瑾誅量移廬陵知縣入覲遷南京刑部主事吏部尚書楊一清改之驗封屢遷考功郎中擢南京太僕少卿就遷鴻臚卿兵部尚書王瓊素奇守仁才十一年八月擢右僉都御史巡撫南贛當是時南中盜賊蜂起謝志山據橫水左溪桶岡池仲容據浰頭皆稱王與大庾陳曰能樂昌高快馬郴州龔福全等攻剽府縣而福建大帽山賊詹師富等又起前巡撫文森托疾避去志山合樂昌賊掠大庾攻南康贛州贛縣主簿吳玭戰死守仁至知左右多賊耳目乃呼老黠隸詰之隸戰栗不敢隱因貰其罪令詗賊賊動靜無勿知於是檄福建廣東會兵先討大帽山賊明年正月督副使楊璋等破賊長富村逼之象湖山指揮覃桓縣丞紀鏞戰死守仁親率銳卒屯上杭佯退師出不意搗之連破四十餘寨俘斬七千有奇指揮王鎧等擒師富疏言權輕無以令將士請給旗牌提督軍務得便宜從事尚書王瓊奏從其請乃更兵制二十五人為伍伍有小甲二伍為隊隊有總甲四隊為哨哨有長協哨二佐之二哨為營營有官參謀二佐之三營為陣陣有偏將二陣為軍軍有副將皆臨事委不命於朝副將以下得遞相罰治其年七月進兵大庾志山乘間急攻南安知府季斅擊敗之副使楊璋等亦生縶曰能以歸遂議討橫水左溪十月都指揮許清贛州知府邢珣寧都知縣王天與各一軍會橫水斅及守備郟文汀州知府唐淳縣丞舒富各一軍會左溪吉安知府伍文定程鄉知縣張戩遏其奔軼守仁自駐南康去橫水三十里先遣四百人伏賊巢左右進軍逼之賊方迎戰兩山舉幟賊大驚謂官軍已盡犁其巢遂潰乘勝克橫水志山及其黨蕭貴模等皆走桶岡左溪亦破守仁以桶岡險固移營近地諭以禍福賊首藍廷鳳等方震恐見使至大喜期仲冬朔降而珣文定已冒雨奪險入賊阻水陣珣直前搏戰文定與戩自右出賊倉卒敗走遇淳兵又敗諸軍破桶岡志山貴模廷鳳面縛降凡破巢八十有四俘斬六千有奇時湖廣巡撫秦金亦破福全其黨千人突至諸將擒斬之乃設崇義縣於橫水控諸瑤還至贛州議討浰頭賊初守仁之平師富也龍川賊盧珂鄭志高陳英咸請降及征橫水浰頭賊將黃金巢亦以五百人降獨仲容未下橫水破仲容始遣弟仲安來歸而嚴為戰守備詭言珂志高讐也將襲我故為備守仁佯杖繫珂等而陰使珂弟集兵待遂下令散兵歲首大張燈樂仲容信且疑守仁賜以節物誘入謝仲容率九十三人營教場而自以數人入謁守仁呵之曰若皆吾民屯於外疑我乎悉引入祥符宮厚飲食之賊大喜過望益自安守仁留仲容觀燈樂正月三日大享伏甲士於門諸賊入以次悉擒戮之自將抵賊巢連破上中下三浰斬馘二千有奇餘賊奔九連山山橫亙數百里陡絕不可攻乃簡壯士七百人衣賊衣奔崖下賊招之上官軍進攻內外合擊擒斬無遺乃於下浰立和平縣置戍而歸自是境內大定初朝議賊勢強發廣東湖廣兵合剿守仁上疏止之不及桶岡既滅湖廣兵始至及平浰頭廣東尚未承檄守仁所將皆文吏及偏裨小校平數十年巨寇遠近驚為神進右副都御史予世襲錦衣衞百戶再進副千戶十四年六月命勘福建叛軍行至豐城而寧王宸濠反知縣顧佖以告守仁急趨吉安與伍文定徵調兵食治器械舟楫傳檄暴宸濠罪俾守令各率吏士勤王都御史王懋中編修鄒守益副使羅循羅欽德郎中曾直御史張鰲山周魯評事羅僑同知郭祥鵬進士郭持平降謫驛丞王思李中咸赴守仁軍御史謝源伍希儒自廣東還守仁留之紀功因集衆議曰賊若出長江順流東下則南都不可保吾欲以計撓之少遲旬日無患矣乃多遣間諜檄府縣言都督許泰郤永將邊兵都督劉暉桂勇將京兵各四萬水陸並進南贛王守仁湖廣秦金兩廣楊旦各率所部合十六萬直擣南昌所至有司缺供者以軍法論又為蠟書遺偽相李士實劉養正其歸國之誠令從臾早發兵東下而縱諜洩之宸濠果疑與士實養正謀則皆勸之疾趨南京即大位宸濠益大疑十餘日詗知中外兵不至乃悟守仁紿之七月壬辰朔留宜春王拱居守而劫其衆六萬人襲下九江南康出大江薄安慶守仁聞南昌兵少則大喜趨樟樹鎮知府臨江戴德孺袁州徐璉贛州邢珣都指揮余恩通判瑞州胡堯元童琦撫州鄒琥安吉談儲推官王暐徐文英知縣新淦李美泰和李楫萬安王冕寧都王天與各以兵來會合八萬人號三十萬或請救安慶守仁曰不然今九江南康已為賊守我越南昌與相持江上二郡兵絕我後是腹背受敵也不如直搗南昌賊精銳悉出守備虛我軍新集氣銳攻必破賊聞南昌破必解圍自救逆擊之湖中蔑不勝矣衆曰善己酉次豐城以文定為前鋒先遣奉新知縣劉守緒襲其伏兵庚戌夜半文定兵抵廣潤門守兵駭散辛亥黎明諸軍梯絙登縛拱等宮人多焚死軍士頗殺掠守仁戮犯令者十餘人宥脅從安士民慰諭宗室人心乃悅居二日遣文定珣璉德孺各將精兵分道進而使堯元等設伏宸濠果自安慶還兵乙卯遇於黃家渡文定當其前鋒賊趨利珣繞出賊背貫其中文定恩乘之璉德孺張兩翼分賊勢堯元等伏發賊大潰退保八字腦宸濠懼盡發南康九江兵守仁遣知府撫州陳槐饒州林城取九江建昌曾璵廣信周朝佐取南康丙辰復戰官軍却守仁斬先却者諸軍殊死戰賊復大敗退保樵舍聯舟為方陣盡出金寶犒士明日宸濠方晨朝其羣臣官軍奄至以小舟載薪乘風縱火焚其副舟妃婁氏以下皆投水死宸濠舟膠淺倉卒易舟遁王冕所部兵追執之士實養正及降賊按察使楊璋等皆就擒南康九江亦下凡三十五日而賊平京師聞變諸大臣震懼王瓊大言曰王伯安居南昌上游必擒賊至是果奏捷帝時已親征自稱威武大將軍率京邊驍卒數萬南下命安邊伯許泰為副將軍偕提督軍務太監張忠平賊將軍左都督劉暉將京軍數千泝江而上抵南昌諸嬖倖故與宸濠通守仁初上宸濠反書因言覬覦者非特一寧王請黜奸諛以回天下豪傑心諸嬖倖皆恨宸濠既平則相與媢功且懼守仁見天子發其罪競為蜚語謂守仁先與通謀慮事不成乃起兵又欲令縱宸濠湖中待帝自擒守仁乘忠泰未至先俘宸濠發南昌忠泰以威武大將軍檄邀之廣信守仁不與間道趨玉山上書請獻俘止帝南征帝不許至錢唐遇太監張永永提督贊畫機密軍務在忠泰輩上而故與楊一清善除劉瑾天下稱之守仁夜見永頌其賢因極言江西困敝不堪六師擾永深然之曰永此來為調護聖躬非邀功也公大勛永知之但事不可直情耳守仁乃以宸濠付永而身至京口欲朝行在聞巡撫江西命乃還南昌忠泰已先至恨失宸濠故縱京軍犯守仁或呼名嫚罵守仁不為動撫之愈厚病予藥死予棺遭喪於道必停車慰問良久始去京軍謂王都堂愛我無復犯者忠泰言寧府富厚甲天下今所蓄安在守仁曰宸濠異時盡以輸京師要人約內應籍可按也忠泰故嘗納宸濠賄者氣懾不敢復言已輕守仁文士強之射徐起三發三中京軍皆歡呼忠泰益沮會冬至守仁命居民巷祭已上塚哭時新喪亂悲號震野京軍離家久聞之無不泣下思歸者忠泰不得已班師比見帝與紀功給事中祝續御史章綸讒毀百端獨永時時左右之忠揚言帝前曰守仁必反試召之必不至忠泰屢矯旨召守仁守仁得永密信不赴及是知出帝意立馳至忠泰計沮不令見帝守仁乃入九華山日晏坐僧寺帝覘知之曰王守仁學道人聞召即至何謂反乃遣還鎮令更上捷音守仁乃易前奏言奉威武大將軍方略討平叛亂而盡入諸嬖倖名江彬等乃無言當是時讒邪搆煽禍變叵測微守仁東南事幾殆世宗深知之甫即位趣召入朝受封而大學士楊廷和與王瓊不相能守仁前後平賊率歸功瓊廷和不喜大臣亦多忌其功會有言國哀未畢不宜舉宴行賞者因拜守仁南京兵部尚書守仁不赴請歸省已論功封特進光祿大夫柱國新建伯世襲歲祿一千石然不予鐵券歲祿亦不給諸同事有功者惟吉安守伍文定至大官當上賞其他皆名示遷而陰絀之廢斥無存者守仁憤甚時已丁父憂屢疏辭爵乞錄諸臣功咸報寢免喪亦不召久之所善席書及門人方獻夫黃綰以議禮得幸言於張璁桂萼將召用而費宏故銜守仁復沮之屢推兵部尚書三邊總督提督團營皆弗果用嘉靖六年思恩田州土酋盧蘇王受反總督姚鏌不能定乃詔守仁以原官兼左都御史總督兩廣兼巡撫綰因上書訟守仁功請賜鐵券歲祿並討賊諸臣帝咸報可守仁在道疏陳用兵之非且言思恩未設流官土酋歲出兵三千聽官征調既設流官我反歲遣兵數千防戍是流官之設無益可知且田州隣交阯深山絕谷悉瑤僮盤據必仍設土官斯可藉其兵力為屏蔽若改土為流則邊鄙之患我自當之後必有悔章下兵部尚書王時中條其不合者五帝令守仁更議十二月守仁抵潯州會巡按御史石金定計招撫悉散遣諸軍留永順保靖土兵數千解甲休息蘇受初求撫不得聞守仁至益懼至是則大喜守仁赴南寧二人遣使乞降守仁令詣軍門二人竊議曰王公素多詐恐紿我陳兵入見守仁數二人罪杖而釋之親入營撫其衆七萬奏聞於朝陳用兵十害招撫十善因請復設流官量割田州地別立一州以岑猛次子邦相為吏目署州事俟有功擢知州而於田州置十九巡檢司以蘇受等任之並受約束於流官知府帝皆從之斷藤峽瑤賊上連八寨下通仙臺花相諸洞蠻盤亙三百餘里郡邑罹害者數十年守仁欲討之故留南寧罷湖廣兵示不再用伺賊不備進牛腸六寺等十餘寨峽賊悉平遂循橫石江而下攻克仙臺花相白竹古陶羅鳳諸賊令布政使林富率蘇受兵直抵八寨破石門副將沈希儀邀斬軼賊盡平八寨始帝以蘇受之撫遣行人奉璽書奬諭及奏斷藤峽捷則以手詔問閣臣楊一清等謂守仁自誇大且及其生平學術一清等不知所對守仁之起由璁萼薦萼故不善守仁以璁強之後萼長吏部璁入內閣積不相下萼暴貴喜功名風守仁取交阯守仁辭不應一清雅知守仁而黃綰嘗上疏欲令守仁入輔毀一清一清亦不能無移憾萼遂顯詆守仁征撫交失賞格不行獻夫及霍韜不平上疏爭之言諸瑤為患積年初嘗用兵數十萬僅得一田州旋復召寇守仁片言馳諭思田稽首至八寨斷藤峽賊阻深巖絕岡國初以來未有輕議剿者今一舉蕩平若拉枯朽議者乃言守仁受命征思田不受命征八寨夫大夫出疆有可以安國家利社稷專之可也況守仁固承詔得便宜從事者乎守仁討平叛藩忌者誣以初同賊謀又誣其輦載金帛當時大臣楊廷和喬宇飾成其事至今未白夫忠如守仁有功如守仁一屈於江西再屈於兩廣臣恐勞臣灰心將士解體後此疆圉有事誰復為陛下任之帝報聞而已守仁已病甚疏乞骸骨舉鄖陽巡撫林富自代不俟命竟歸行至南安卒年五十七喪過江西軍民無不縞素哭送者守仁天姿異敏年十七謁上饒婁諒與論朱子格物大指還家日端坐講讀五經不苟言笑游九華歸築室陽明洞中泛濫二氏學數年無所得謫龍場窮荒無書日繹舊聞忽悟格物致知當自求諸心不當求諸事物喟然曰道在是矣遂篤信不疑其為教專以致良知為主謂宋周程二子後惟象山陸氏簡易直捷有以接孟氏之傳而朱子集註或問之類乃中年未定之說學者翕然從之世遂有陽明學云守仁既卒桂萼奏其擅離職守帝大怒下廷臣議萼等言守仁事不師古言不稱師欲立異以為高則非朱熹格物致知之論知衆論之不予則為朱熹晚年定論之書號召門徒互相倡和才美者樂其任意庸鄙者借其虛聲傳習轉訛背謬彌甚但討捕軬賊擒獲叛藩功有足錄宜免追奪伯爵以章大信禁邪說以正人心帝乃下詔停世襲卹典俱不行隆慶初廷臣多頌其功詔贈新建侯諡文成二年予世襲伯爵既又有請以守仁與薛瑄陳獻章同從祀文廟者帝獨允禮臣議以瑄配及萬曆十二年御史詹事講申前請大學士申時行等言守仁言致知出大學良知出孟子陳獻章主靜沿宋儒周敦頤程顥且孝友出處如獻章氣節文章功業如守仁不可謂禪誠宜崇祀且言胡居仁純心篤行衆論所歸亦宜並祀帝皆從之終明之世從祀者止守仁等四人始守仁無子育弟子正憲為後晚年生子正億二歲而孤既長襲錦衣副千戶隆慶初襲新建伯萬曆五年卒子承勛嗣督漕運二十年子先進無子將以弟先達子業弘繼先達妻曰伯無子爵自傳吾夫由父及子爵安往先進怒因育族子業洵為後及承勛卒先進未襲死業洵自以非嫡嗣終當歸爵先達且虞其爭乃謗先達為乞養而別推承勛弟子先通當嗣屢爭於朝數十年不決崇禎時先達子業弘復與先通疏辨而業洵兄業浩時為總督所司懼忤業浩竟以先通嗣業弘憤持疏入禁門訴自刎不殊執下獄尋釋先通襲伯四年流賊陷京師被殺守仁弟子盈天下其有傳者不復載惟冀元亨嘗與守仁共患難冀元亨字惟乾武陵人篤信守仁學舉正德十一年鄉試從守仁於贛守仁屬以教子宸濠懷不軌而外務名高貽書守仁問學守仁使元亨往宸濠語挑之佯不喻獨與之論學宸濠目為癡他日講西銘反覆君臣義甚悉宸濠亦服厚贈遣之元亨反其贈於官已宸濠敗張忠許泰誣守仁與通詰宸濠言無有忠等詰不已曰獨嘗遣冀元亨論學忠等大喜搒元亨加以炮烙終不承械繫京師詔獄世宗嗣位言者交白其冤出獄五日卒元亨在獄善待諸囚若兄弟囚皆感泣其被逮也所司繫其妻李李無怖色曰吾夫尊師樂善豈他慮哉獄中與二女治麻枲不輟事且白守者欲出之曰未見吾夫出安往按察諸僚婦聞其賢召之辭不赴已就見則囚服見手不釋麻枲問其夫學曰吾夫之學不出閨門袵席間聞者悚然贊曰王守仁始以直節著比任疆事提弱卒從諸書生掃積年逋寇平定孽藩終明之世文臣用兵制勝未有如守仁者也當危疑之際神明愈定智慮無遺雖由天資高其亦有得於中者歟矜其創獲標異儒先卒為學者譏守仁嘗謂胡世寧少講學世寧曰某恨公多講學耳桂萼之議雖出於媢忌之私抑流弊實然固不能以功多為諱矣
