body:
  text: 明史卷二十四本紀第二十四莊烈帝二十一年春正月丁丑洪承疇敗賊於梓潼賊還走陝西丁亥裁南京冗官二月甲辰改河南巡按御史張任學為總兵官三月戊寅賀逢聖致仕是月李自成自洮州出番地總兵官曹變蛟追破之復入塞走西和禮縣夏四月辛丑張獻忠偽降於穀城熊文燦受之戊申張至發致仕己酉熒惑逆行諭廷臣修省五月癸亥朔策試考選官於中左門六月癸巳安民廠災壞城垣傷萬餘人壬寅孔貞運致仕乙卯兵部尚書楊嗣昌戶部尚書程國祥禮部侍郎方逢年工部侍郎蔡國用俱禮部尚書大理少卿范復粹為禮部侍郎並兼東閣大學士預機務嗣昌仍掌兵部是月兩畿山東河南大旱蝗秋七月乙丑少詹事黃道周以論楊嗣昌奪情謫按察司照磨八月戊戌以災異屢見齋居永壽宮諭廷臣修省癸丑傅冠致仕戊午停刑流賊羅汝才等自陝州犯襄陽九月陝西山西旱饑辛巳大清兵入牆子嶺總督薊遼兵部侍郎吳阿衡死之癸未京師戒嚴冬十月癸巳盧象昇入援召對於武英殿甲午括馬盧象昇高起潛分督援軍是月洪承疇曹變蛟大破賊於潼關南原李自成以數騎遁十一月戊辰大清兵克高陽致仕大學士孫承宗死之戊子罷盧象昇戴罪立功劉宇亮自請視師許之是月羅汝才降十二月庚子方逢年罷盧象昇兵敗於鉅鹿死之戊申孫傳庭為兵部侍郎督援軍徵洪承疇入衞是年土魯番琉球入貢十二年春正月己未朔以時事多艱却廷臣賀庚申大清兵入濟南德王由樞被執布政使張秉文等死之戊辰劉宇亮孫傳庭會師十八萬於晉州不敢進丁丑改洪承疇總督薊遼孫傳庭總督保定山東河北二月乙未劉宇亮罷大清兵北歸三月丙寅出青山口凡深入二千里閱五月下畿內山東七十餘城丙子加上孝純皇太后諡詔天下夏四月戊申程國祥致仕是月左良玉擊降賊首李萬慶五月甲子禮部侍郎姚明恭張四知兵部侍郎魏照乘俱禮部尚書兼東閣大學士預機務乙丑張獻忠叛於穀城羅汝才等起應之陷房縣乙亥削孫傳庭籍尋逮下獄六月畿內山東河南山西旱蝗己酉抽練各鎮精兵復加徵練餉秋七月壬申右良玉討張獻忠敗績於羅猴山總兵官羅岱被執死之熊文燦削籍尋逮下獄八月癸巳詔誅封疆失事巡撫都御史顏繼祖總兵官倪寵祖寬內臣鄧希詔孫茂霖等三十三人俱棄市己亥免唐縣等四十州縣去年田租之半壬子大學士楊嗣昌督師討賊總督以下並聽節制冬十月甲申朔楊嗣昌誓師襄陽甲午左良玉為平賊將軍丙申欽定保民四事全書成頒布天下十一月辛巳祀天於南郊十二月羅汝才犯四川丙午下兵部尚書傅宗龍於獄是年琉球入貢十三年春閏正月乙酉振真定饑戊子振京師饑民癸卯振山東饑二月壬子朔祀日於東郊戊午總督陝西三邊侍郎鄭崇儉大破張獻忠於太平縣之瑪瑙山獻忠走歸州戊寅以久旱求直言三月甲申禱雨丙戌大風霾詔清刑獄戊子罷各鎮內臣丙申賜魏藻德等進士及第出身有差戊戌振畿內饑丁未免河北三府逋賦夏四月戊午逮江西巡撫僉都御史解學龍及所舉黃道周己卯吏部尚書謝陞為禮部尚書禮部侍郎陳演以原官並兼東閣大學士預機務五月羅汝才犯夔州石砫女官秦良玉連戰却之甲申祀地於北郊庚戌姚明恭致仕六月辛亥朔總兵官賀人龍等分道逐賊敗之羅汝才走大寧庚午蔡國用卒辛未薛國觀罷秋七月庚辰朔畿內捕蝗己丑發帑振被蝗州縣辛卯左良玉及京營總兵官孫應元等大破羅汝才於興山汝才走巫山與張獻忠合八月甲戌振江北饑九月陝西官軍圍李自成於巴西魚腹山中自成走免癸巳張獻忠陷大昌總兵官張令戰死尋陷劍州綿州冬十月癸丑熊文燦棄市十一月楊嗣昌進軍重慶丁亥祀天於南郊戊子南京地震十二月丁未朔嚴軍機抄傳之禁辛亥張獻忠陷瀘州乙卯逮薛國觀是月李自成自湖廣走河南饑民附之連陷宜陽永寧殺萬安王采鑋陷偃師勢大熾是年兩畿山東河南山陝旱蝗人相食十四年春正月辛巳祈穀於南郊己丑總兵官猛如虎追張獻忠及於開縣之黃陵城敗績參將劉士傑等戰死賊遂東下丙申李自成陷河南福王常洵遇害前兵部尚書呂維祺等死之二月己酉詔以時事多艱災異疊見痛自刻責停今歲行刑諸犯俱減等論庚戌張獻忠陷襄陽襄王翊銘貴陽王常法並遇害副使張克儉等死之戊午李自成攻開封周王恭枵巡按御史高名衡拒却之乙丑張獻忠陷光州己巳召閣臣九卿科道於乾清宮左室命駙馬都尉冉興讓等齎帑金振恤河南被難宗室三月丙子朔楊嗣昌自四川還至荊州卒乙酉禱雨丙申洪承疇會八鎮兵於寧遠丁酉逮鄭崇儉下獄尋棄市夏四月壬子大清兵攻錦州祖大壽拒守己未總督三邊侍郎丁啟睿為兵部尚書督師討賊五月庚辰范復粹致仕釋傅宗龍於獄命為兵部侍郎總督陝西三邊軍務討李自成戊子祀地於北郊六月兩畿山東河南浙江湖廣旱蝗山東寇起秋七月己卯李自成攻鄧州楊文岳總兵官虎大威擊敗之壬寅洪承疇援錦州駐師松山是月臨清運河涸京師大疫八月乙巳援兵戰於松山陽和總兵官楊國柱敗沒辛亥賜薛國觀死辛酉重建太學成釋奠於先師孔子甲子總兵官吳三桂王樸自松山遁諸軍夜潰是月左良玉大敗張獻忠於信陽九月丁丑傅宗龍帥師次新蔡與總督保定侍郎楊文岳軍會己卯遇賊賀人龍師潰宗龍被圍文岳走陳州甲申周延儒賀逢聖復入閣辛卯封皇子慈炯為定王壬辰傅宗龍潰圍出趨項城被執死之賊屠項城及商水扶溝戊戌李自成羅汝才陷葉縣守將劉國能死之是月官軍破張獻忠於英山之望雲寨冬十月癸卯朔日有食之十一月丙子李自成陷南陽唐王聿鏌遇害總兵官猛如虎等死之十二月李自成連陷洧川許州長葛鄢陵甲子戍解學龍黃道周李自成羅汝才合攻開封周王恭枵巡撫都御史高名衡拒守十五年春正月癸未孫傳庭為兵部侍郎督京軍救開封乙酉楊文岳援開封賊解去南陷西華戊子免天下十二年以前逋賦是月山東賊陷張秋東平劫漕艘太監王裕民劉元斌帥禁兵會兗東官軍討平之二月戊申振山東就撫亂民癸丑總督陝西都御史汪喬年次襄城遇賊賀人龍等奔入關喬年被圍丁巳城陷被執死之戊午大清兵克松山洪承疇降巡撫都御史丘民仰總兵官曹變蛟王廷臣副總兵江翥饒勳等死之是月孫傳庭總督三邊軍務三月李自成陷陳州丁丑魏照乘致仕己卯祖大壽以錦州降於大清辛卯李自成陷睢州太康寧陵考城壬辰封皇子慈炤為永王丙申李自成陷歸德是春江北賊陷含山和州南京戒嚴夏四月癸亥李自成復圍開封乙丑削謝陞籍五月己巳孫傳庭入關誅賀人龍甲戌張獻忠陷廬州丁亥王樸棄市六月戊申賀逢聖致仕癸丑張四知致仕甲寅詔天下停刑三年己未詹事蔣德璟黃景昉戎政侍郎吳甡俱禮部尚書兼東閣大學士預機務庚申詔孫傳庭出關兵部侍郎侯恂督左良玉軍援開封壬戌以會推閣臣下吏部尚書李日宣六人於獄謫戍有差甲子祀地於北郊是月築壇親祭死事文武大臣山西總兵官許定國援開封潰於沁水寧武兵潰於覃懷秋七月己巳左良玉虎大威楊德政方國安四鎮兵潰於朱仙鎮八月庚戌安慶兵變殺都指揮徐良憲官軍討定之乙丑釋黃道周於戍所復其官丁卯兵部尚書陳新甲下獄尋棄市九月壬午賊決河灌開封癸未城圮士民溺死者數十萬人己丑孫傳庭帥師赴河南辛卯鳳陽總兵官黃得功劉良佐大敗張獻忠於潛山冬十月辛酉孫傳庭敗績於郟縣走入關十一月丁卯援汴總兵官劉超據永城反庚午發帑振開封被難宗室兵民壬申大清兵分道入塞京師戒嚴命勳臣分守九門太監王承恩督察城守詔舉堪督師大將者戊寅徵諸鎮入援庚辰大清兵克薊州丁亥薊鎮總督趙光抃提調援兵戊子張獻忠陷無為己丑遼東督師侍郎范志完入援閏月癸卯下詔罪己求直言壬寅大清兵南下畿南郡邑多不守丁巳起廢將是月李自成陷汝寧前總督侍郎楊文岳僉事王世琮不屈死十二月大清兵趨曹濮山東州縣相繼下魯王以派自殺己巳李自成陷襄陽據之左良玉奔承天尋走武昌賊分兵下德安彝陵荊門遂陷荊州癸巳焚獻陵十六年春正月丁酉李自成陷承天巡撫都御史宋一鶴留守沈壽崇等死之庚申張獻忠陷蘄州二月乙丑朔日有食之己巳范志完趙光抃會師於平原三月庚子李自成殺羅汝才併其衆壬寅命大學士吳甡督師討賊丁未賊陷武岡殺岷王企金豊張獻忠陷黃州夏四月丁卯周延儒自請督師許之辛卯大清兵北歸戰於螺山總兵官張登科和應薦敗沒八鎮兵皆潰是月劉超平五月癸巳朔張獻忠陷漢陽壬寅周延儒還京師丙午修撰魏藻德為少詹事兼東閣大學士預機務戊申吳甡罷丁巳周延儒罷壬戌張獻忠陷武昌沈楚王華奎於江在籍大學士賀逢聖等死之六月癸亥詔免直省殘破州縣三餉及一切常賦二年己卯逮范志完下獄丙戌雷震奉先殿獸吻敕修省秋七月丁酉親鞫范志完於中左門乙卯親鞫前文選郎中吳昌時於中左門徵周延儒聽勘己未戒廷臣私謁閣臣京師自二月至於是月大疫詔釋輕犯發帑療治瘞五城暴骸八月壬戌朔左良玉復武昌漢陽丙寅張獻忠陷岳州丙戌陷長沙庚寅陷衡州九月丙申張獻忠陷寶慶己亥黃景昉致仕辛丑孫傳庭復寶豐進次郟縣李自成迎戰擊敗之庚戌張獻忠陷永州巡按御史劉熙祚死之辛亥賜楊廷鑑等進士及第出身有差壬子孫傳庭兵以乏食引退賊追及之還戰大敗傳庭以餘衆退保潼關是月鳳陽地屢震冬十月辛酉朔享太廟丙寅李自成陷潼關督師尚書孫傳庭死之賊連陷華州渭南臨潼命有司以贖鍰充餉戊辰李自成屠商州庚午張獻忠陷常德壬申李自成陷西安秦王存樞降巡撫都御史馮師孔按察使黃絅等死之丁丑張獻忠陷吉安十一月甲午李自成陷延安尋屠鳳翔壬寅祀天於南郊辛亥吏部侍郎李建泰副都御史方岳貢並兼東閣大學士預機務癸丑范志完趙光抃棄市戍吳甡於金齒丁巳李自成陷榆林兵備副使都任在籍總兵官尤世威等死之寧夏慶陽相繼陷韓王亶塉被執十二月壬戌張獻忠陷建昌乙丑周延儒有罪賜死丁卯張獻忠陷撫州辛巳賊渡河陷平陽山西州縣相繼潰降甲申賊陷甘州巡撫都御史林日瑞總兵官馬爌等死之丙戌左良玉復長沙是年暹羅琉球哈密入貢十七年春正月庚寅朔大風霾鳳陽地震庚子李建泰自請措餉治兵討賊許之乙卯幸正陽門樓餞李建泰出師南京地震丙辰工部尚書范景文禮部侍郎丘瑜並兼東閣大學士預機務是月張獻忠入四川二月辛酉李自成陷汾州別賊陷懷慶丙寅陷太原執晉王求桂巡撫都御史蔡懋德等死之壬申下詔罪己癸酉潞安陷乙亥議京師城守李自成攻代州總兵官周遇吉力戰食盡退守寧武關丁丑賊別將陷固關犯畿南己卯遣內臣高起潛杜勳等十人監視諸邊及近畿要害壬午真定知府丘茂華殺總督侍郎徐標檄所屬降賊甲申賊至彰德趙王常降丁亥詔天下勤王命廷臣上戰守事宜左都御史李邦華右庶子李明睿請南遷及太子撫軍江南皆不許戊子陳演致仕李自成陷寧武周遇吉力戰死之三月庚寅賊至大同總兵官姜瓌降賊代王傳遇害巡撫都御史衞景瑗被執自縊死辛卯李建泰疏請南遷壬辰召廷臣於平臺示建泰疏曰國君死社稷朕將焉往李邦華等復請太子撫軍南京不聽蔣德璟致仕癸巳封總兵官吳三桂左良玉唐通黃得功俱為伯甲午徵諸鎮兵入援乙未總兵官唐通入衞命偕內臣杜之秩守居庸關戊戌太監王承恩提督城守己亥李自成至宣府監視太監杜勳降巡撫都御史朱之馮等死之癸卯唐通杜之秩降於自成賊遂入關甲辰陷昌平乙巳賊犯京師京營兵潰丙午日晡外城陷是夕皇后周氏崩丁未昧爽內城陷帝崩於萬歲山王承恩從死御書衣襟曰朕涼德藐躬上干天咎然皆諸臣誤朕朕死無面目見祖宗自去冠冕以髮覆面任賊分裂無傷百姓一人自大學士范景文而下死者數十人丙辰賊遷帝后梓宮於昌平昌平人啟田貴妃墓以葬明亡是年夏四月我大清兵破賊於山海關五月入京師以帝禮改葬令臣民為服喪三日諡曰莊烈愍皇帝陵曰思陵贊曰帝承神熹之後慨然有為即位之初沈機獨斷刈除奸逆天下想望治平惜乎大勢已傾積習難挽在廷則門戶糾紛疆埸則將驕卒惰兵荒四告流寇蔓延遂至潰爛而莫可救可謂不幸也已然在位十有七年不邇聲色憂勤惕勵殫心治理臨朝浩歎慨然思得非常之材而用匪其人益以僨事乃復信任宦官布列要地舉措失當制置乖方祚訖運移身罹禍變豈非氣數使然哉迨至大命有歸妖氛盡掃而帝得加諡建陵典禮優厚是則聖朝盛德度越千古亦可以知帝之蒙難而不辱其身為亡國之義烈矣
