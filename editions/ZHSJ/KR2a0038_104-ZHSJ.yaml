body:
  text: 明史卷一百四表第五諸王世表五英宗九子憲宗外庶三子見湜未封殤其得封者七王曰德莊王見潾曰許悼王見淳曰秀懷王見澍曰崇簡王見澤曰吉簡王見浚曰忻穆王見治曰徽莊王見沛憲宗十四子孝宗外悼恭太子及他皇子俱未名殤其得封者十王曰興獻王祐杬曰岐惠王祐棆曰益端王祐檳曰衡恭王祐楎曰雍靖王祐橒曰壽定王祐榰曰汝安王祐曰涇簡王祐橓曰榮莊王祐樞曰申懿王祐楷世宗八子穆宗外哀沖莊敬二太子及他皇子俱殤其得封者一王曰景恭王載圳景恭王載圳世宗庶四子嘉靖十八年封四十年就藩德安府四十四年薨無子封除穆宗四子神宗外憲懷太子及他皇子殤其得封者一王曰潞簡王翊鏐潞簡王翊王常鏐穆宗淓簡庶嫡四子一子萬隆慶五曆四十年封萬六年襲曆十七封後以年就藩國亡寓衞輝府杭州大四十二清順治年薨二年六月王師至遂降寶豐王常簡庶二子天啟三年封神宗八子光宗外三子未封其得封者四王曰福恭王常洵曰瑞王常浩曰惠王常潤曰桂端王常瀛福恭王常由崧恭洵神宗庶一子庶三子萬曆四萬曆二十五年十九年封德昌封四十王崇禎二年就十六年藩河南襲封十府崇禎七年闖十四年賊陷京正月闖師五月賊陷洛自立於陽遇害南京僭號弘光大清順治二年五月王師渡江被執潁上王由榘恭庶二子萬曆中封崇禎十四年正月與恭王同遇害瑞王常浩神宗庶五子萬曆二十九年封天啟七年就藩漢中府崇禎十七年張獻忠陷重慶遇害惠王常潤神宗庶六子萬曆二十九年封天啟七年就藩荊州府崇禎末奔廣州府大清順治三年廣東平被執死桂端王常由端瀛神宗嫡三子庶七子初封安萬曆二仁王唐十九年王聿鍵封天啟自立偽七年就封為桂藩衡州王大清府崇禎順治三十六年年卒於獻賊陷梧州無衡州王子由永州由榔端入廣西嫡四子寄居蒼初封永梧十七明王大年薨清順治三年福建平由榔自立於肇慶僭號永曆是冬王師度嶺由榔走廣西自是走貴州又走雲南遂入緬甸十八年冬王師至緬人獻之明年殺諸雲南莊烈帝七子獻愍太子慈烺外嫡第二子庶第五子第六子第七子俱殤其封而未建藩邸者二王曰定哀王慈炯曰永悼王慈炤定哀王慈炯莊烈帝嫡三子崇禎十四年封未建藩邸十七年闖賊陷京師被執不知所終永悼王慈炤莊烈帝庶四子崇禎十五年封未建藩邸十七年闖賊陷京師被執不知所終
