body:
  text: 明史卷九本紀第九宣宗宣宗憲天崇道英明神聖欽文昭武寬仁純孝章皇帝諱瞻基仁宗長子也母誠孝昭皇后生之前夕成祖夢太祖授以大圭曰傳之子孫永世其昌既彌月成祖見之曰兒英氣溢面符吾夢矣比長嗜書智識傑出永樂七年從幸北京令觀農具及田家衣食作務本訓授之八年成祖征沙漠命留守北京九年十一月立為皇太孫始冠自是巡幸征討皆從嘗命學士胡廣等即軍中為太孫講論經史每語仁宗曰此他日太平天子也仁宗即位立為皇太子夏四月以南京地屢震命往居守五月庚辰仁宗不豫璽書召還六月辛丑還至良鄉受遺詔入宮發喪庚戌即皇帝位大赦天下以明年為宣德元年辛亥諭邊將嚴守備甲寅趣中官在外採辦者還罷所市物秋七月乙亥尊皇后為皇太后立妃胡氏為皇后辛卯鎮遠侯顧興祖討大藤峽蠻平之乙未諭法司慎刑獄閏月戊申安順伯薛貴清平伯吳成都督馬英都指揮梁成帥師巡邊乙丑楊溥入直文淵閣八月戊辰都指揮李英討安定曲先叛番大敗之安定王桑兒加失夾詣闕謝罪壬申詔內外羣臣舉廉潔公正堪牧民者癸未大理卿胡概參政葉春巡撫南畿浙江設巡撫自此始九月壬寅葬昭皇帝於獻陵冬十月戊寅南京地震戊子敕公侯伯五府六部大學士給事中審覆重囚十一月戊戌顧興祖討平思恩蠻辛酉薛祿為鎮朔大將軍巡邊十二月甲申顧興祖討平宜山蠻是年哈密回回滿剌撒丁占城琉球中山爪哇烏斯藏瓦剌浡泥入貢宣德元年春正月癸卯享太廟丁未大祀天地於南郊癸丑赦死罪以下運糧宣府自贖己未遣侍郎黃宗載十五人清理天下軍伍後遣使著為令二月戊辰祭社稷丁丑耕耤田丙戌謁長陵獻陵丁亥還宮三月己亥榮昌伯陳智都督方政討黎利敗績於茶籠州乂安知府琴彭死之癸丑行在禮部侍郎張瑛兼華蓋殿大學士直文淵閣夏四月乙丑成山侯王通為征夷將軍充總兵官討黎利尚書陳洽參贊軍務陳智方政奪官從立功五月甲午朔錄囚丙申詔赦交阯許黎利自新丙午敕郡縣瘞遺骸庚申召薛祿還秋七月癸巳京師地震乙未免山東夏稅己亥諭六科凡中官傳旨必覆奏始行壬子罷湖廣採木八月壬戌漢王高煦反丙寅宥武臣殊死以下罪復其官己巳親征高煦命鄭王瞻埈襄王瞻墡居守陽武侯薛祿清平伯吳成將前鋒大賚五軍將士辛未發京師辛巳至樂安帝兩遣書諭降又以敕繫矢射城中諭禍福壬午高煦出降癸未改樂安曰武定州乙酉班師九月丙申至自武定州錮高煦於西內戊戌法司鞫高煦同謀者詞連晉王趙王詔勿問冬十月戊寅釋李時勉復為侍讀十一月乙未成山侯王通擊黎利於應平敗績尚書陳洽死之十二月辛酉免六師所過秋糧辛未錄囚宥免三千餘人乙酉征南將軍總兵官黔國公沐晟帥興安伯徐亨新寧伯譚忠征虜副將軍安遠侯柳升帥保定伯梁銘都督崔聚由雲南廣西分道討黎利兵部尚書李慶參贊軍務是年爪哇暹羅琉球蘇門答剌滿剌加白葛達撒馬兒罕土魯番哈密烏斯藏入貢二年春正月庚子大祀天地於南郊丁未有司奏歲問囚數帝謂百姓輕犯法由於教化未行命申教化二月癸亥行在戶部侍郎陳山為本部尚書兼謹身殿大學士直文淵閣乙丑黎利攻交阯城王通擊敗之三月辛卯賜馬愉等進士及第出身有差夏四月庚申黎利陷昌江都指揮李任指揮顧福劉順知府劉子輔中官馮智死之甲子晉王濟熿有罪廢為庶人己巳王通許黎利和五月癸巳薛祿督餉開平己亥仁宗神主祔太廟丙午錄囚六月戊寅錄囚秋七月己亥黎利陷隘留關鎮遠侯顧興祖擁兵不救逮治之庚子錄囚辛丑命都督同知陳懷充總兵官帥師討松潘蠻丁未薛祿敗敵於開平八月甲子黃淮致仕免兩京山西河南州縣被災稅糧九月壬辰錄囚乙未柳升師次倒馬坡遇伏戰死是日保定伯梁銘病卒丙申尚書李慶病卒師大潰參將崔聚郎中史安主事陳鏞李宗昉死之冬十月戊寅王通棄交阯與黎利盟十一月乙酉赦黎利遣侍郎李琦羅汝敬立陳暠為安南國王悉召文武吏士還己亥以皇長子生大赦天下免明年稅糧三之一十二月丁丑振陝西饑幷給絹布十五萬疋是年爪哇占城暹羅琉球瓦剌哈密亦力把里撒馬兒罕入貢三年春正月甲午大祀天地於南郊丙申陳懷平松潘蠻二月戊午立皇長子祁鎮為皇太子是月作帝訓成三月癸未廢皇后胡氏立貴妃孫氏為皇后壬辰錄囚夏四月癸亥敕凡官民建言章疏尚書都御史給事中會議以聞勿諱閏月壬寅錄囚免山西旱災稅糧甲辰命有司振卹庚戌論棄交阯罪王通等及布政使弋謙中官山壽馬騏下獄論死籍其家鎮遠侯顧興祖幷下獄五月壬子李琦羅汝敬還黎利表陳暠卒子孫幷絕乞守國俟命辛酉錄囚己巳復遣羅汝敬等諭黎利立陳氏後辛未贈交阯死事諸臣壬申免北京被災夏稅六月丙戌免陝西被災夏稅丁未都御史劉觀巡視河道秋七月戊辰錄囚八月辛卯罷北京行部及行後軍都督府丁未帝自將巡邊九月辛亥次石門驛兀良哈寇會州帝帥精卒三千人往擊之乙卯出喜峰口擊寇於寬河帝親射其前鋒殪三人兩翼軍並發大破之寇望見黃龍旂下馬羅拜請降皆生縛之斬渠酋甲子班師癸酉至自喜峰口冬十一月癸酉錦衣指揮鍾法保請採珠東莞帝曰是欲擾民以求利也下之獄十二月庚子廣西總兵官山雲討擒忻城蠻是年占城暹羅爪哇琉球瓦剌哈密安南曲先土魯番亦力把里撒馬兒罕入貢四年春正月兩京地震己未大祀天地於南郊二月己丑南京獻騶虞二禮部請表賀不許三月甲戌遣李琦再諭黎利訪立陳氏後夏四月辛巳山雲討平柳潯蠻戊子工部尚書黃福平江伯陳瑄經略漕運五月壬子錄囚六月甲午罷文吏犯贓贖罪例己亥寇犯開平鎮撫張信等戰死庚子薛祿督餉開平秋七月己未幸文淵閣八月己卯起復楊溥九月癸亥釋顧興祖於獄冬十月庚辰幸文淵閣癸未以天寒諭法司錄囚丙戌製猗蘭操賜廷臣諭以薦賢為國之道庚寅張瑛陳山罷甲午閱武於近郊乙未獵於峪口戊戌還宮十一月癸卯薛祿及恭順侯吳克忠帥師巡宣府十二月乙亥京師地震壬辰罷中官松花江造船是年爪哇占城琉球榜葛剌哈密土魯番亦力把里撒馬兒罕入貢五年春正月癸丑大祀天地於南郊戊辰尚書夏原吉卒二月壬辰罷工部採木癸巳頒寬卹之令省災傷寬馬政免逋欠薪芻招流民賜復一年罷採買減官田舊科十之三卹工匠禁司倉官包納戒法司慎刑獄乙未奉皇太后謁陵三月戊申道見耕者下馬問農事取耒三推顧侍臣曰朕三推已不勝勞況吾民終歲勤動乎命賜所過農民鈔己酉還宮辛亥李琦還黎利稱陳氏無後上表請封丙辰免山西去歲被災田租丁巳賜林震等進士及第出身有差夏四月戊寅薛祿帥師築赤城鵰鶚雲州獨石團山城堡五月癸卯追奪贓吏誥敕著為令丙辰修預備倉出官錢收糴備荒癸亥擢郎中況鍾御史何文淵九人為知府賜敕遣之六月己卯遣官捕近畿蝗諭戶部曰往年捕蝗之使害民不減於蝗宜知此弊因作捕蝗詩示之秋七月癸亥甄別守令八月己巳朔日食陰雨不見禮官請表賀不許九月丙午擢御史于謙長史周忱六人為侍郎巡撫兩京山東山西河南江西浙江湖廣乙卯巡近郊己未還宮冬十月乙亥阿魯台犯遼東遼海衞指揮同知皇甫斌力戰死丙子巡近郊己卯獵於坌道丙戌至洗馬林遍閱城堡兵備壬辰還宮十二月癸巳曲先叛番平閏月己未敕內外諸司久淹獄囚者罪之是年占城琉球爪哇瓦剌哈密罕東土魯番撒馬兒罕亦力把里入貢六年春正月丁丑大祀天地於南郊庚辰大雨雷電二月丁酉侍郎羅汝敬督陝西屯田己亥濬金龍口引河達徐州以便漕三月乙亥命吏部考察外官自布政按察二司始著為令夏四月己酉侍郎柴車經理山西屯田六月己亥遣使詔黎利權署安南國事秋七月己巳錄囚壬午許𩽆顏三衞市易冬十月甲辰陳懷平松潘蠻十一月丙子始命官軍兌運民糧乙酉分遣御史往逮貪暴中官袁琦等十二月乙未袁琦等十一人棄市榜其罪示天下丁未金幼孜卒庚戌遣御史巡視寧夏甘州屯田水利是年占城琉球瓦剌哈密蘇門答剌亦力把里入貢七年春正月辛酉朔日有食之免朝賀癸酉大祀天地於南郊二月甲午以春和諭法司錄囚三月庚申下詔行寬卹之政辛酉諭禮部曰朕以官田賦重十減其三乃聞異時蠲租詔下戶部皆不行甚者戒約有司不得以詔書為辭是廢格詔令使澤不下究也自今令在必行毋有所遏夏四月辛丑免山西逋賦壬寅募商中鹽輸粟入邊六月癸卯錄囚癸丑罷中官入番市馬是月作官箴成凡三十五篇示百官秋八月乙未敕京官三品以上舉才行文學之士吏部都察院黜方面有司不職者九月庚午諸將巡邊是秋免兩畿及嘉興湖州水災稅糧冬十一月辛酉召督漕平江伯陳瑄侍郎趙新等歲終至京議糧賦利弊是年占城琉球哈密哈烈瓦剌亦力把里入貢八年春正月丁卯大祀天地於南郊二月壬子錄囚宥免五千餘人三月丙辰賜曹鼐等進士及第出身有差庚辰諭內外優卹軍士違者風憲官察奏罪之是春以兩京河南山東山西久旱遣使振卹夏四月戊戌詔蠲京省被災逋租雜課免今年夏稅賜復一年理冤獄減殊死以下赦軍匠在逃者罪有司各舉賢良方正一人巡按御史按察使糾貪酷吏及使臣生事者五月丁巳總兵官都督蕭授討平貴州烏羅蠻丁卯山雲討平宜山蠻六月乙酉禱雨不應作閔旱詩示羣臣辛丑詔中外疏決罪囚是夏復振兩京河南山東山西湖廣饑免稅糧秋七月壬申免江西水災稅糧八月癸巳汰京師冗官閏月辛亥西域貢麒麟戊午景星見禮官請表賀皆不許九月乙酉遣官錄天下重囚己亥阿魯台部昝卜寇涼州總兵官劉廣擊斬之冬十二月乙亥諭法司宥京官過犯是年暹羅占城琉球安南滿剌加天方蘇門答剌古里柯枝阿丹錫蘭山佐法兒甘巴里加異勒忽魯謨斯哈密瓦剌撒馬兒罕亦力把里入貢九年春正月辛卯大祀天地於南郊二月庚戌振鳳陽淮安揚州徐州饑乙卯申兩京山東山西河南寬卹之令三月戊寅山雲討平思恩叛蠻夏四月己未黎利死子麟來告喪命麟權署安南國事戊辰錄囚五月壬午瘞暴骸秋七月甲申遣給事中御史錦衣衞官督捕兩畿山東山西河南蝗八月庚戌振湖廣饑甲子敕兩京湖廣江西河南巡撫巡按御史三司官行視災傷蠲秋糧十之四乙丑罷工部採辦己巳瓦剌脫歡攻殺阿魯台來告捷九月癸未自將巡邊乙酉度居庸關丙戌獵於坌道乙未阿魯台子阿卜只俺來歸丁酉至洗馬林閱城堡兵備己亥大獵冬十月丙午還宮丙辰都督方政討平松潘叛蠻甲子罷陝西市馬丁卯兩畿浙江湖廣江西饑以應運南京及臨清倉粟振濟十一月戊戌停刑庚子免四川被災稅糧十二月甲子帝不豫衞王瞻埏攝享太廟是年暹羅占城琉球蘇門答剌哈密瓦剌入貢十年春正月癸酉朔不視朝命羣臣謁皇太子於文華殿甲戌大漸罷採買營造諸使乙亥崩於乾清宮年三十有八遺詔國家重務白皇太后丁酉上尊諡廟號宣宗葬景陵贊曰仁宗為太子失愛於成祖其危而復安太孫蓋有力焉即位以後吏稱其職政得其平綱紀修明倉庾充羨閭閻樂業歲不能災蓋明興至是歷年六十民氣漸舒蒸然有治平之象矣若乃強藩猝起旋即削平掃蕩邊塵狡寇震懾帝之英姿睿略庶幾克繩祖武者歟
