body:
  text: 明史卷一百六十八列傳第五十六陳循蕭鎡王文江淵許彬陳文萬安彭華劉珝子鈗劉吉尹直陳循字德遵泰和人永樂十三年進士第一授翰林修撰習朝廷典故帝幸北京命取秘閣書詣行在遂留侍焉洪熙元年進侍講宣德初受命直南宮日承顧問賜第玉河橋西巡幸未嘗不從進侍講學士正統元年兼經筵官久之進翰林院學士九年入文淵閣典機務初廷議天下吏民建言章奏皆三楊主之至是榮士奇已卒循及曹鼐馬愉在內閣禮部援故事請帝以楊溥老宜優閒令循等預議明年進戶部右侍郎兼學士土木之變人心洶懼循居中所言多採納進戶部尚書兼職如故也先犯京師請敕各邊精騎入衞馳檄回番以疑敵帝皆從其計景泰二年以葬妻與鄉人爭墓地為前後巡按御史所不直循輒訐奏給事中林聰等極論循罪帝是聰言而置循不問循本以才望顯及是素譽隳焉二年十二月進少保兼文淵閣大學士帝欲易太子內畏諸閣臣先期賜循及高穀白金百兩江淵王一寧蕭鎡半之比下詔議循等遂不敢諍加兼太子太傅尋以太子令旨賜百官銀帛踰月帝復賜循等六人黃金五十兩進華蓋殿大學士兼文淵閣如故循子英及王文子倫應順天鄉試被黜相與搆考官劉儼黃諫為給事中張寧等所劾帝亦不罪英宗復位于謙王文死杖循百戍鐵嶺衞循在宣德時御史張楷獻詩忤旨循曰彼亦忠愛也遂得釋御史陳祚上疏觸帝怒循婉為解得不死景帝朝嘗集古帝王行事名勤政耍典上之河南江北大雪麥苗死請發帑市麥種給貧民因事進言多足採者然久居政地刻躁為士論所薄其嚴譴則石亨輩為之非帝意也亨等既敗循自貶所上書自訟言天位陛下所固有當天與人歸之時群臣備法駕大樂恭詣南內奏請臨朝非特宮禁不驚抑亦可示天下萬世而亨等儌倖一時計不出此卒皆自取禍敗臣服事累葉曾著微勞實為所擠惟陛下憐察詔釋為民一年卒成化中于謙事雪循子引例請卹乃復官賜祭同邑蕭鎡字孟勤宣德二年進士需次於家八年帝命楊溥合選三科進士拔二十八人為庶吉士鎡為首英宗即位授編修正統三年進侍讀久之代李時勉為國子監祭酒景泰元年以老疾辭既得允監丞鮑相率六館生連章乞留帝可其奏明年以本官兼翰林學士與侍郎王一寧並入直文淵閣又明年進戶部右侍郎兼官如故易儲議起鎡曰無易樹子霸者所禁矧天朝乎不聽加太子少師寰宇通志成進戶部尚書帝不豫諸臣議復憲宗東宮李賢私問鎡鎡曰既退不可再也英宗復位遂削籍天順八年卒成化中復官賜祭鎡學問該博文章爾雅然性猜忌遇事多退避云王文字千之初名強束鹿人永樂十九年進士授監察御史持廉奉法為都御史顧佐所稱宣德末奉命治彰德妖賊張普祥獄還奏稱旨賜今名英宗即位遷陝西按察使遭父憂命奔喪起視事正統三年正月擢右副都御史巡撫寧夏五年召為大理寺卿明年與刑部侍郎何文淵錄在京刑獄尋遷右都御史九年出視延綏寧夏邊務劾治定邊營失律都督僉事王禎都督同知黃真等罪邊徼為肅明年代陳鎰鎮守陝西平涼臨洮鞏昌饑奏免其租尋進左都御史在陝五年鎮靜不擾景泰改元召掌院事文為人深刻有城府面目嚴冷與陳鎰同官一揖外未嘗接談諸御史畏之若神廷臣無敢干以私者然中實柔媚初按大理少卿薛瑄獄希王振指欲坐瑄死至是治中官金英縱家奴不法事但抵奴罪給事中林聰等劾文鎰畏勢長奸下詔獄二人俱伏乃宥之二年六月學士江淵上言法司斷獄多枉文及刑部尚書兪士悅求罷且言淵嘗私以事不聽故見誣帝兩置之三年春加太子太保時陳鎰鎮陝西將還文當代諸御史交章留之乃改命侍郎耿九疇南京地震江淮北大水命巡視偕南九卿議上軍民便宜九事又言徐淮間饑甚而南京儲蓄有餘請盡發徐淮倉粟振貸而以應輸南京者輸徐淮補其缺皆報可是時陳循最任好剛自用高穀與循不相能以文強悍思引與共政以敵之乃疏請增閣員循舉其鄉人蕭維禎穀遂舉文而文得中官王誠助於是詔用文尋自江淮還朝改吏部尚書兼翰林院學士直文淵閣二品大臣入閣自文始尋遭母喪奪哀如前文雖為穀所引而穀遲重循性明決文反與循合而不附穀其後以子倫故欲傾考官又用穀言而罷由是兩人卒不相得五年三月江淮大水復命巡視先是蘇松常鎮四府糧四石折白銀一兩民以為便後戶部復徵米令輸徐淮凡一百十餘萬石率三石而致一石有破家者文用便宜停之又發廩振饑民三百六十餘萬時年饑多盜文捕長洲盜許道師等二百人欲張其功坐以謀逆大理卿薛瑄辨其誣給事中王鎮乞會廷臣勘實得為盜者十六人置之法而餘得釋還進少保兼東閣大學士再進謹身殿大學士仍兼東閣初英宗之還也廷臣議奉迎禮文時為都御史厲聲曰公等謂上皇果還耶也先不索土地金帛而遽送駕來耶眾素畏文皆愕然不決而罷及易儲議起文率先承命景帝不豫群臣欲乞還沂王東宮文曰安知上意誰屬乃疏請早選元良以是中外諠傳文與中官王誠等謀召取襄世子英宗復位即日與于謙執於班內言官劾文與謙等謀立外藩命鞫於廷文力辯曰召親王須用金牌信符遣人必有馬牌內府兵部可驗也辭氣激壯逮車駕主事沈敬按問無迹廷臣遂坐謙文召敬謀未定與謙同斬於市諸子悉戍邊敬亦坐知謀反故縱減死戍鐵嶺文之死人皆知其誣以素刻忮且迎駕復儲之議不愜輿論故冤死而民不思成化初赦其子還尋復官贈太保諡毅愍倫改名宗彝成化初進士歷戶部郎中出理遼東餉中官汪直東征言宗彝督餉勞擢太僕少卿弘治中累官南京禮部尚書卒諡安簡江淵字世用江津人宣德五年庶吉士授編修正統十二年詔與杜寧裴綸劉儼商輅陳文楊鼎呂原劉俊王玉共十人肄業東閣曹鼐等為之師郕王監國徐有貞倡議南遷太監金英叱出之踉蹌過左掖門淵適入迎問之有貞曰以吾議南遷不合也於是淵入極陳固守之策遂見知於王由侍講超擢刑部右侍郎也先薄京師命淵參都督孫鏜軍事景泰元年出視紫荊倒馬白羊諸關隘與都指揮同知翁信督修雁門關其秋遂以本官兼翰林學士入閣預機務尋改戶部侍郎兼職如故明年六月以天變條上三事一厚結朵顏赤斤諸衞為東西藩籬一免京軍餘丁以資生業一禁訐告王振餘黨以免枉濫詔悉從之又明年二月改吏部仍兼學士是春京師久雨雪淵上言漢劉向曰凡雨陰也雪又雨之陰也仲春少陽用事而寒氣脅之占法謂人君刑法暴濫之象陛下恩威溥洽未嘗不赦過宥罪竊恐有司奉行無狀冤抑或有未伸且向者下明詔免景泰二年田租之三今復移檄追徵則是朝廷自失大信於民怨氣鬱結良由此也帝乃令法司申冤濫詰戶部違詔下尚書金濂於獄卒免稅如詔東宮既易加太子少師四川巡撫僉都御史李匡不職以淵言罷之母憂起復初侍講學士倪謙遭喪淵薦謙為講官謙遂奪哀至是御史周文言淵引謙正自為今日地帝以事既處分不問而令自今羣臣遭喪無濫保五年春山東河南江北饑命同平江侯陳豫往撫淵前後條上軍民便宜十數事幷請築淮安月城以護常盈倉廣徐州東城以護廣運倉悉議行時江北洊饑淮安糧運在塗者淵悉追還備振漕卒乘機侵耗事聞遣御史按實淵被劾當削籍廷臣以淵守便宜不當罪帝宥之閣臣既不相協而陳循王文尤刻私淵好議論每為同官所抑意忽忽不樂會兵部尚書于謙以病在告詔推一人協理部事淵心欲得之循等佯推淵而密令商輅草奏示以石兵江工四字淵在旁不知也比詔下調工部尚書石璞於兵部而以淵代璞淵大失望英宗復位與陳循等俱謫戍遼東未幾卒初黃之奏易儲也或疑淵主之丘濬曰此易辨也廣西紙與京師紙異索奏視之果廣西紙其誣乃白成化初復官許彬字道中寧陽人永樂十三年進士改庶吉士授檢討正統末累遷太常少卿兼翰林待詔提督四夷館上皇將還遣彬至宣府奉迎上皇命書罪己詔及諭羣臣敕遣祭土木陣亡官軍以此受知上皇還擢本寺卿石亨等謀復上皇以其謀告彬彬進徐有貞語具有貞傳英宗復位進禮部左侍郎兼翰林院學士入直文淵閣未幾為石亨所忌出為南京禮部右侍郎甫行貶陝西參政至則乞休去憲宗立命以侍郎致仕尋卒彬性坦率好交游不能擇人一時浮蕩士多出其門晚參大政方欲杜門謝客而客惡其變態競相騰謗竟不安其位陳文字安簡廬陵人鄉試第一正統元年進士及第授編修十二年命進學東閣秩滿遷侍講景泰二年閣臣高穀薦文才遂擢雲南右布政使貴州比歲用兵資餉雲南民困轉輸文令商賈代輸而民倍償其費皆稱便稅課額鈔七十餘萬吏俸所取給典者侵蝕吏或累歲不得俸文悉按治課日羨溢雲南產銀民間用銀貿易視內地三倍隸在官者免役納銀亦三之納者不為病文曰雖如是得無傷廉乎損之復令減隸額三之一名譽日起遷廣東左布政使母憂未赴英宗既復位一日謂左右曰向侍朕編修而長者安在左右以文對即召為詹事乞終制不允入侍東宮講讀學士呂原卒帝問李賢誰可代者曰柯潛可出告王翺翺曰陳文以次當及奈何抑之明日賢入見如翺言七年二月進禮部右侍郎兼學士入內閣文既入數撓賢以自異曰吾非若所薦也侍讀學士錢溥與文比舍居交甚歡溥嘗授內侍書其徒多貴幸來謁必邀文共飲英宗大漸東宮內侍王綸私詣溥計事不召文文密覘之綸言帝不豫東宮納妃如何溥謂當奉遺詔行事已而英宗崩賢當草詔文起奪其筆曰無庸已有草者因言綸溥定計欲逐賢以溥代之而以兵部侍郎韓雍代尚書馬昂賢怒發其事是時憲宗初立綸自謂當得司禮氣張甚英宗大殮綸衰服襲貂帝見而惡之太監牛玉恐其軋己因數綸罪逐之去溥謫知順德縣雍浙江參政詞所連順天府尹王福通政參議趙昂南寧伯毛榮都督馬良馮宗劉聚錦衣都指揮僉事門達等皆坐謫雍亦文素所不悅者也改吏部左侍郎同知經筵事成化元年進禮部尚書羅倫論賢奪情文內媿陰助賢逐倫益為時論所鄙三年春帝命戶部尚書馬昂副都御史林聰及給事中潘禮陳越清理京營文奏必得內臣共事始可剗除宿弊因薦太監懷恩帝從之英宗實錄成加太子少保兼文淵閣大學士四年卒贈少傅諡莊靖文素以才自許在外頗著績效士大夫多冀其進用及居宮端行事鄙猥既參大政無所建明朝退則引賓客故人置酒為曲宴專務請屬性卞急遇睚眦怨必報及賢卒文益恣意行名節大喪歿後禮部主事陸淵之御史謝文祥皆疏論文不當得美諡帝以事已施行不許萬安字循吉眉州人長身魁顏眉目如刻畫外寬而深中正統十三年進士改庶吉士授編修成化初屢遷禮部左侍郎五年命兼翰林學士入內閣參機務同年生詹事李泰中官永昌養子也齒少於安安兄事之得其驩自為同官每當遷必推安出己上至是議簡閣臣泰復推安曰子先之我不患不至故安得入閣而泰忽暴病死安無學術既柄用惟日事請託結諸閹為內援時萬貴妃寵冠後宮安因內侍致殷勤自稱子姪行妃嘗自媿無門閥聞則大喜妃弟錦衣指揮通遂以族屬數過安家其妻王氏有母至自博興王謂母曰嚮家貧時以妹為人娣今安在母曰第憶為四川萬編修者通心疑是安訪之則安小婦由是兩家婦日往來通妻著籍禁內恣出入安得備知宮中動靜益自固侍郎邢讓祭酒陳鑑與安同年不相能安搆獄除兩人名七年冬彗見天田犯太微廷臣多言君臣否隔宜時召大臣議政大學士彭時商輅力請司禮中官乃約以御殿日召對且曰初見情未洽勿多言姑俟他日將入復約如初此見時言天變可畏帝曰已知卿等宜盡心時又言昨御史有疏請減京官俸薪武臣不免觖望乞如舊便帝可之安遂頓首呼萬歲欲出時輅不得已皆叩頭退中官戲朝士曰若輩嘗言不召見及見止知呼萬歲耳一時傳笑謂之萬歲閣老帝自是不復召見大臣矣其後尹直入閣欲請見帝計事安止之曰往彭公請召對一語不合輒叩頭呼萬歲以此貽笑今吾輩每事盡言太監擇而聞之上無不允者勝面對多矣其容悅不識大體且善歸過於人如此九年進禮部尚書久之改戶部十三年加太子少保俄改文淵閣大學士孝宗出閤進吏部尚書謹身殿大學士尋加太子太保時彭時已歿商輅以忤汪直去在內閣者劉珝劉吉而安為首輔與南人相黨附珝與尚書尹旻王越又以北人為黨互相傾軋然珝疏淺而安深鷙故珝卒不能勝安十八年汪直寵衰言官請罷西廠帝不許安具疏再言之報可中外頗以是稱安文華大訓成進太子太傅華蓋殿大學士復進少傅太子太師再進少師當是時朝多秕政四方災傷日告帝崇信道教封金闕玉闕真君為上帝遣安祭於靈濟宮而李孜省鄧常恩方進用安因彭華潛與結藉以排異己於是珝及王恕馬文升秦紘耿裕諸大臣相繼被逐而華遂由詹事遷吏部侍郎入內閣朝臣無敢與安牴牾者華安福人大學士時之族弟舉景泰五年會試第一深刻多計數善陰伺人短與安孜省比嘗嗾蕭彥莊攻李秉又逐尹旻羅璟人皆惡而畏之踰年得風疾去孝宗嗣位安草登極詔書禁言官假風聞挾私中外譁然御史湯鼐詣閣安從容言曰此𩹉面意也鼐即以其語奏聞謂安抑塞言路歸過於君無人臣禮於是庶吉士鄒智御史文貴姜洪等交章列其罪狀先是歙人倪進賢者粗知書無行諂事安日與講房中術安暱之因令就試得進士授為庶吉士除御史帝一日於宮中得疏一小篋則皆論房中術者末署曰臣安進帝命太監懷恩持至閣曰此大臣所為耶安媿汗伏地不能出聲及諸臣彈章入復令恩就安讀之安數跪起求哀無去意恩直前摘其牙牌曰可出矣始惶遽索馬歸第乞休去時年已七十餘尚於道上望三台星冀復用居一年卒贈太師諡文康初孝穆皇太后之薨內庭籍籍指萬貴妃孝宗立魚臺縣丞徐頊上書發其事廷臣議逮鞫萬氏戚屬曾出入宮掖者安驚懼不知所為曰我久不與萬氏往來矣而劉吉先與萬氏姻亦自危其黨尹直尚在閣共擬旨寢之孝宗仁厚亦置不問安吉得無事安在政府二十年每遇試必令其門生為考官子孫甥壻多登第者子翼南京禮部侍郎孫弘璧翰林編修安死無幾翼弘璧相繼死安竟無後劉珝字叔溫壽光人正統十三年進士改庶吉士授編修天順中歷右中允侍講東宮憲宗即位以舊宮僚屢遷太常卿兼侍讀學士直經筵日講成化十年進吏部左侍郎充講官如故珝每進講反覆開導詞氣侃侃聞者為悚學士劉定之稱為講官第一憲宗亦愛重之明年詔以本官兼翰林學士入閣預機務帝每呼東劉先生賜印章一文曰嘉猷贊翊尋進吏部尚書再加太子少保文淵閣大學士文華大訓成加太子太保進謹身殿大學士珝性疎直自以宮僚舊臣遇事無所回護員外郎林俊以劾梁芳繼曉下獄珝於帝前解之李孜省輩左道亂政欲動搖東宮珝密疏諫謀少阻素薄萬安嘗斥安負國無恥安積忿日夜思中珝初商輅之劾汪直也珝與萬安劉吉助之爭得罷西廠他日珝又折王越於朝越慚而退已而西廠復設珝不能有所諍至十八年安見直寵衰揣知西廠當罷邀珝同奏珝辭不與安遂獨奏疏上帝頗訝無珝名安陰使人訐珝與直有連會珝子鎡邀妓狎飲里人趙賓戲為劉公子曲或增飾穢語雜教坊院本奏之帝大怒決意去珝遣中官覃昌召安吉赴西角門出帝手封書一函示之安等佯驚救次日珝具疏乞休令馳驛賜月廩歲隸白金楮幣甚厚其實排珝使去者安吉兩人謀也時內閣三人安貪狡吉陰刻珝稍優顧喜譚論人目為狂躁珝既倉卒引退而彭華尹直相繼入內閣安吉之黨乃益固珝初遭母憂廬墓三年比歸侍父盡孝父歿復廬於墓弘治三年卒諡文和嘉靖初以言官請賜祠額曰昭賢仍遣官祭之子鈗字汝中八歲時憲宗召見愛其聰敏且拜起如禮即命為中書舍人宮殿門閾高同官楊一清常提之出入帝慮牙牌易損命易以銀歷官五十餘年嘉靖中至太常卿兼五經博士仍供事內閣誥敕房博學有行誼與長洲劉棨並淹貫故實時稱二劉劉吉字祐之博野人正統十三年進士改庶吉士授編修充經筵官寰宇通志成進修撰天順四年侍講讀於東宮以憂歸憲宗即位召纂英宗實錄至京上疏乞終制不允進侍讀實錄成遷侍讀學士直經筵累遷禮部左侍郎成化十一年與劉珝同受命兼翰林學士入閣預機務尋進禮部尚書孝宗出閤加太子少保兼文淵閣大學士十八年遭父喪詔起復吉三疏懇辭而陰屬貴戚萬喜為之地得不允文華大訓成加太子太保進武英殿大學士久之進戶部尚書謹身殿大學士尋加少保兼太子太傅孝宗即位庶吉士鄒智御史姜洪力詆萬安尹直及吉皆小人當斥吉深銜之安直皆去吉獨留委寄愈專慮言者攻不已乃建議超遷科道官處以不次之位詔起廢滯給事中賀欽御史強珍輩十人已次第擬擢吉復上疏薦之部曹預薦者惟林俊一人冀以此籠絡言路而言者猶未息庶子張昇御史曹璘歐陽旦南京給事中方向御史陳嵩等相繼劾吉吉憤甚中昇逐之數興大獄智向囚繫遠貶洪亦謫官復與中官蔣琮比逐南御史姜綰等臺署為空中外側目言者亦少衰初吉與萬安劉珝在成化時帝失德無所規正時有紙糊三閣老泥塑六尚書之謠至是見孝宗仁明同列徐溥劉健皆正人而吉於閣臣居首兩人有論建吉亦署名復時時為正論竊美名以自蓋弘治二年二月旱帝令儒臣撰文禱雨吉等言邇者奸徒襲李孜省鄧常恩故術見月宿在畢天將陰雨遂奏請祈禱覬一驗以希進用倖門一開爭言祈禱要寵召禍實基於此祝文不敢奉詔帝意悟遂已之五月以災異請帝修德防微慎終如始八月又以災異陳七事代王獻海青吉等言登極詔書已却四方貢獻乞勿受明年三月偕同列上言陛下聖質清羸與先帝不同凡宴樂游觀一切嗜好之事宜悉減省左右近臣有請如先帝故事者當以太祖太宗典故斥退之祖宗令節宴游皆有時陛下法祖宗可也土魯番使者貢獅子還帝令內閣草敕遣中官送之吉等言不宜優寵太過使番戎輕中國事遂寢既又言獅子諸獸日飼二羊歲當用七百二十又守視校尉日五十人皆繁費宜絕諸獸食聽自斃帝不能用十二月星變又言邇者妖星出天津歷杵臼迫營室其占為兵為饑為水旱今兩畿河南山西陝西旱蝗四川湖廣歲不登倘明年復然恐盜賊竊發禍亂將作願陛下節用度罷宴游屏讒言斥異教留懷經史講求治道沙河修橋江西造瓷器南海子繕垣牆俱非急務宜悉停止帝嘉納之帝惑近習言頗崇祈禱事發經牌令閣臣作贊又令擬神將封號吉等極言邪說當斥吉自帝初即位進少傅兼太子太師吏部尚書及憲宗實錄成又進少師華蓋殿大學士吉柄政久權勢烜赫帝初傾心聽信後眷頗衰而吉終無去志五年帝欲封后弟伯爵命吉撰誥券吉言必盡封二太后家子弟方可帝不悅遣中官至其家諷令致仕始上章引退詔賜敕馳驛如故事吉多智數善附會自緣飾銳於營私時為言路所攻居內閣十八年人目之為劉緜花以其耐彈也吉疑其言出下第舉子因請舉人三試不第者不得復會試時適當會試期舉子已羣集都下禮部為請詔姑許入試後如令已而吉罷令亦不行吉歸踰年卒贈太師諡文穆尹直字正言泰和人景泰五年進士改庶吉士授編修成化初充經筵講官與修英宗實錄總裁欲革去景泰帝號引漢昌邑更始為比直辨曰實錄中有初為大臣後為軍民者方居官時則稱某官某既罷去而後改稱如漢府以謀逆降庶人其未反時書王書叔如故也豈有逆計其反而即降從庶人之號者哉且昌邑旋立旋廢景泰帝則為宗廟社稷主七年更始無所受命景泰帝則策命於母后當時定傾危難之中微帝則京師非國家有雖易儲失德然能不惑於盧忠徐振之言卒全兩宮以至今日其功過足相準不宜去帝號時不能難既成進侍讀歷侍讀學士六年上疏乞纂修大明通典幷續成宋元綱目章下所司十一年遷禮部右侍郎辭不許丁父憂服除起南京吏部右侍郎就改禮部左侍郎二十二年春召佐兵部占城王古來為安南所逼棄國來求援議者欲送之還直曰彼窮來歸我若驅使還國是殺之也宜遣大臣即詢量宜處置詔從之命都御史屠滽往貴州鎮巡官奏苗反請發兵廷議將從之直言起釁邀功不可信命官往勘果無警是年九月改戶部兼翰林學士入內閣踰月進兵部尚書加太子太保直明敏博學練習朝章而躁於進取性矜忌不自檢飭與吏部尚書尹旻相惡直初覬禮部侍郎而旻薦他人直以中旨得之次日遇旻於朝舉笏謝旻曰公所謂簡在帝心者自是怨益深後在南部八年鬱鬱不得志屬其黨萬安彭華謀內召旻輒持不可諸朝臣亦皆畏直幸其在南及推兵部左右侍郎吏部列何琮等八人詔用琮而直以安華及李孜省力中旨召還至是修怨與孜省等比陷旻父子得罪又搆罷江西巡撫閔珪物論喧然不平刑部郎袁清者安私人又幸於內侍郭閏勘事浙江輘轢諸大吏吏部尚書李裕惡之比還即除紹興知府清懼累章求改裕極論其罪下詔獄安閏以屬直為言於孜省取中旨赦之改知鄖陽孝宗立進士李文祥御史湯鼐姜洪繆樗庶吉士鄒智等連章劾直給事中宋琮及御史許斌言直自初為侍郎以至入閣夤緣攀附皆取中旨帝於是薄其為人令致仕弘治九年表賀萬壽幷以太子年當出閤上承華箴引先朝少保黃淮事冀召對帝却之正德中卒諡文和贊曰易稱內君子外小人為泰外君子內小人為否況端揆之寄百僚具瞻者乎陳循以下諸人雖不為大奸慝而居心刻忮務逞己私同己者比異己者忌比則相援忌則相軋至萬安劉吉要結近倖蒙恥固位猶幸同列多賢相與彌縫匡救而穢跡昭彰小人之歸何可掩哉
