body:
  text: 明史卷一百五表第六功臣表一自昔帝王受命驅策羣力以有天下迨區宇既寧疇庸論功列爵崇報一時攀鱗附翼之士奮起兜牟之中剖符析珪爰及苗裔德意厚矣唐宋以來稍異曩制房喬遠勢首讓世封是以英衞子孫齒於甿隸而宋代勳階祇崇虛號祖孫父子各擬名邦初無世及之文非復承家之舊至明祖開基乃曠然復古凡熊羆之宿將帷幄之謀臣生著號而歿襲封茅土之頒殆逾百數馴及季年黨獄蔓延剗削芟殊存者不及三四然觀鐵榜所列訓誡之辭則河山之誓白馬之盟初意固不其然高危滿溢亦其自取焉耳乃若文皇差靖難之勞英宗懋奪門之賞跡參佐命籍次元功以視開國諸臣亦曷可同年而語乎世宗中葉開冊府之舊藏修繼絕之墜典於是鄂曹衞信之裔復列徹侯延其世緒天下翕然歸厚雖宋潁韓淇終於剿絕而自餘推誠宣力名載丹書者奕葉貂蟬保守祿位典宿衞領京營鎮陪京督漕運寄隆方岳階晉公孤家分典瑞之榮朝無酎金之罰較諸西京世冑殆將過之今考其襲替歲月見於實錄者作功臣表以與紀傳相表𩹉或牴牾散軼時世無可考稽則略而不書固史氏闕文之義云爾
