body:
  text: 明史卷十本紀第十英宗前紀英宗法天立道仁明誠敬昭文憲武至德廣孝睿皇帝諱祁鎮宣宗長子也母貴妃孫氏生四月立為皇太子遂冊貴妃為皇后宣德十年春正月宣宗崩壬午即皇帝位遵遺詔大事白皇太后行大赦天下以明年為正統元年始罷午朝丁亥尚書蹇義卒辛丑戶部尚書黃福參贊南京守備機務二月戊申尊皇太后為太皇太后庚戌尊皇后為皇太后辛亥封弟祁鈺為郕王甲寅罷諸司冗費三月戊寅放教坊司樂工三千八百餘人辛巳罷山陵夫役萬七千人丙申諭三法司死罪臨決三覆奏然後加刑夏四月壬戌以元學士吳澄從祀孔子廟庭丁卯以久旱考察布按二司及府州縣官戊辰遣給事中御史捕畿南山東河南淮安蝗五月壬午戶部言浙江蘇松荒田稅糧減除二百七十七萬餘石請加覆覈帝以覈實必增額為民患不許六月丁未令天下瘞暴骸辛酉葬章皇帝於景陵秋七月丙子免山西夏稅之半八月丙午減光祿寺膳夫四千七百餘人九月壬辰詔督漕總兵及諸巡撫官歲以八月至京會廷臣議事是月王振掌司禮監冬十月壬寅遣使諭阿台𩽆兒只伯辛亥詔天下衛所皆立學十一月戊辰朔日有食之十二月壬子阿台朵兒只伯犯涼州鎮番總兵官陳懋敗之於黑山是年琉球中山暹羅日本占城安南滿剌加哈密瓦剌入貢正統元年春正月丙戌罷銅仁金場庚寅發禁軍三萬人屯田畿輔三月己巳賜周旋等進士及第出身有差乙亥御經筵夏四月丁酉朔享太廟五月丁卯阿台𩽆兒只伯寇肅州壬辰設提督學校官秋八月甲戌右都督蔣貴充總兵官都督同知趙安副之帥師討阿台𩽆兒只伯九月癸卯遣侍郎何文淵王佐副都御史朱與言督兩淮長蘆浙江鹽課欽差巡鹽自此始庚申封黎利子麟為安南國王冬十一月乙卯詔京官三品以上舉堪任御史者四品及侍從言官舉堪任知縣者各一人免湖廣被災稅糧十二月丁丑以邊議稽緩下兵部尚書王驥侍郎鄺埜於獄尋釋之乙酉湖廣貴州總兵官蕭授討廣西蒙顧十六洞賊平之是年琉球中山爪哇安南烏斯藏占城瓦剌入貢遣宣德時來貢古里蘇門答剌十一國使臣還國二年春正月甲午宣宗神主祔太廟己亥大同總兵官方政都指揮楊洪會寧夏甘肅兵出塞討阿台𩽆兒只伯三月甲午錄囚戊午御史金敬撫輯大名及河南陝西逃民夏四月免河南被災田糧五月庚寅兵部尚書王驥經理甘肅邊務壬寅刑部尚書魏源經理大同邊務丁未免陝西平涼六府旱災夏稅六月乙亥以宋胡安國蔡沈真德秀從祀孔子廟庭庚辰副都御史賈諒侍郎鄭辰振河南江北饑冬十月甲子鎮守甘肅左副總兵任禮充總兵官都督蔣貴都督同知趙安為左右副總兵兵部侍郎柴車僉都御史曹翼羅亨信參贊軍務討阿台𩽆兒只伯兵部尚書王驥太監王貴監督之十一月乙巳振河南饑免稅糧是年琉球中山撒馬兒罕暹羅土魯番瓦剌哈密入貢三年春三月己亥京師地震辛丑振陝西饑夏四月乙卯王驥任禮蔣貴趙安襲擊阿台𩽆兒只伯大破之追至黑泉還癸未立大同馬市六月癸酉以旱讞中外疑獄乙亥都督方政僉事張榮同征南將軍黔國公沐晟右都督沐昂討麓川叛蠻思任發秋七月癸未下禮部尚書胡濙於獄辛卯下戶部尚書劉中敷於獄尋俱釋之八月乙亥以陝西饑令雜犯死囚以下輸銀贖罪送邊吏易米九月癸巳蠲兩畿湖廣逋賦冬十月癸丑再振陝西饑十二月丙辰下刑部尚書魏源右都御史陳智等於獄是年榜葛剌貢麒麟中外表賀琉球中山暹羅占城瓦剌入貢四年春正月壬午方政破麓川蠻於大寨追至空泥敗沒二月丁巳總兵官蕭授平貴州計砂叛苗閏月辛丑釋魏源陳智等復其官幷宥棄交阯王通馬騏罪三月己酉詔赦天下壬子賜施槃等進士及第出身有差庚申廢遼王貴烚為庶人丁卯黔國公沐晟卒於軍癸酉增南京及在外文武官軍俸廩夏五月庚戌右都督沐昂為征南將軍充總兵官討思任發丁卯錄中外囚六月乙未京師地震丁酉以京畿水災祭告天地諭羣臣修省戊戌下詔寬卹求直言秋七月庚戌免兩畿山東江西河南被災稅糧壬申汰冗官八月戊戌增設沿海備倭官己亥京師地震冬十二月丁丑都督同知李安充總兵官僉都御史王翺參贊軍務討松潘祈命簇叛番是年琉球占城安南瓦剌榜葛剌滿剌加哈密入貢五年春正月己未大祀天地於南郊二月乙亥侍講學士馬愉侍講曹鼐入閣預機務甲申僉都御史張純大理少卿李畛振撫畿內流民三月戊申建北京宮殿夏四月壬申免山西逋賦丙戌祈命簇番降五月征麓川參將張榮敗績於芒市六月丁丑免兩畿被災田糧戊寅錄囚秋七月辛丑遣刑部侍郎何文淵等分行天下修備荒之政壬寅楊榮卒八月乙未令各邊修舉荒政九月壬寅蠲雲南逋賦冬十一月壬寅振浙江饑壬子免蘇松常鎮嘉湖水災稅糧丁巳廣西僧楊行祥偽稱建文帝械送京師錮錦衣衞獄死乙丑沐昂討平師宗叛蠻十二月壬午免南畿浙江山東河南被災稅糧是年占城琉球中山哈密烏斯藏入貢六年春正月己亥朔日當食不見禮官請表賀不許庚戌大祀天地於南郊乙卯以莊浪地屢震躬祀郊廟遣使祭西方嶽鎮大舉征麓川定西伯蔣貴為平蠻將軍都督同知李安僉事劉聚副之兵部尚書王驥總督軍務三月庚子下兵部侍郎于謙於獄夏四月甲午以災異遣使省天下疑獄五月甲寅刑部侍郎何文淵大理卿王文錄在京刑獄巡撫侍郎周忱刑科給事中郭瑾錄南京刑獄釋于謙為大理少卿秋七月丁未振浙江湖廣饑冬十月丁丑戶部尚書劉中敷侍郎吳璽陳瑺荷校於長安門旬餘釋還職庚寅免畿內被災稅糧十一月甲午朔乾清坤寧二宮奉天華蓋謹身三殿成大赦定都北京文武諸司不稱行在癸卯王驥拔麓川上江寨癸丑免河南山東及鳳陽等府被災稅糧閏月甲戌復下劉中敷吳璽陳瑺於獄踰年釋中敷為民璽瑺戍邊十二月王驥克麓川思任發走孟養丁未班師左副總兵李安攻餘賊於高黎貢山敗績是年占城瓦剌哈密入貢七年春正月甲戌大祀天地於南郊二月庚申如天壽山三月甲子還宮乙亥免陝西屯糧十之五戊寅賜劉儼等進士及第出身有差夏四月甲午振陝西饑是月免山西河南山東被災稅糧五月壬申論平麓川功進封蔣貴為侯王驥靖遠伯戊寅立皇后錢氏丁亥倭陷大嵩所六月壬子戶部侍郎焦宏備倭浙江秋七月丙寅振陝西饑民贖民所鬻子女八月壬寅復命王驥總督雲南軍務九月甲戌陝西進嘉禾禮臣請表賀不許冬十月壬辰兀良哈犯廣寧乙巳太皇太后崩十二月葬誠孝昭皇后於獻陵是年占城瓦剌哈密琉球中山安南爪哇土魯番烏斯藏入貢八年春正月丁卯大祀天地於南郊二月己丑汰南京冗官戊戌淮王瞻墺來朝丙午荊王瞻堈來朝夏五月己巳復命平蠻將軍蔣貴王驥帥師征麓川思任發子思機發戊寅雷震奉天殿鴟吻敕修省壬午大赦六月丁亥侍講劉球陳十事下錦衣衞獄太監王振使指揮馬順殺之甲辰下大理少卿薛瑄於獄秋七月戊午祭酒李時勉荷校於國子監門三日九月甲子思機發請降冬十一月宣宗廢后胡氏卒十二月癸未免山東復業民稅糧二年丙戌駙馬都尉焦敬荷校於長安右門是年占城安南瓦剌哈密爪哇入貢九年春正月甲寅右都御史王文巡延安寧夏邊辛酉大祀天地於南郊辛未成國公朱勇興安伯徐亨都督馬亮陳懷同太監僧保曹吉祥劉永誠但住分道討兀良哈二月丙午王驥擊走思機發俘其孥以獻召驥還三月辛亥朔新建太學成釋奠於先師孔子甲子朱勇等師還楊士奇卒乙丑征兀良哈功封陳懷平鄉伯馬亮招遠伯成國公朱勇等進秩有差夏四月丙戌翰林學士陳循直文淵閣預機務丁亥振沙州及赤斤蒙古饑五月己未命法司錄在京刑獄刑部侍郎馬昂錄南京刑獄六月壬午振湖廣貴州蠻饑秋七月己酉下駙馬都尉石璟於獄處州賊葉宗留盜福安銀礦殺福建參議竺淵癸丑免河南被災稅糧閏月戊寅復開福建浙江銀場甲申瘞暴骸壬寅雷震奉先殿鴟吻八月庚戌免陝西被災稅糧贖民所鬻子女甲戌敕邊將備瓦剌也先九月丁亥靖遠伯王驥右都御史陳鎰經理西北邊備冬十月丙午朔日有食之庚午兀良哈貢馬謝罪是年兩畿山東河南浙江湖廣大水江河皆溢暹羅琉球中山瓦剌安南烏斯藏滿剌加入貢十年春正月丙戌大祀天地於南郊戊子詔舉智勇之士二月丁巳京師地震己未免陝西逋賦丙寅兀良哈貢馬請貸犯邊者罪不許壬申如天壽山三月丙子還宮庚辰思機發入貢謝罪庚寅賜商輅等進士及第出身有差夏四月甲辰朔日有食之庚申詔所在有司飼逃民復業及流移就食者六月乙丑振陝西饑免田租三之二秋七月乙未減糶河南懷慶倉粟濟山陝饑八月癸丑免湖廣旱災秋糧丙辰免蘇松嘉湖十四府州水災秋糧冬十月戊辰侍讀學士苗衷為兵部侍郎侍講學士高穀為工部侍郎並入閣預機務十二月丙辰緬甸獲思任發斬其首送京師壬戌輸河南粟振陝西饑廣西總兵官安遠侯柳溥討平慶遠叛蠻是年琉球中山哈密亦力把里安南占城滿剌加錫蘭山撒馬兒罕烏斯藏入貢十一年春正月己卯大祀天地於南郊庚辰予太監王振等弟姪世襲錦衣衞官二月辛酉異氣見華蓋奉天殿遣官祭告天地癸亥詔卹刑獄三月戊辰下戶部尚書王佐刑部尚書金濂右都御史陳鎰等於錦衣衞獄尋釋之壬申御史柳華督福建浙江江西兵討礦賊癸酉如天壽山庚辰還宮夏六月丙辰京師地震秋七月癸酉增市廛稅鈔庚辰楊溥卒八月戊戌免湖廣被災秋糧庚申下吏部尚書王直等於獄尋釋之九月辛巳廣西瑤叛執化州知州茅自得殺千戶汪義冬十月甲寅遣給事中御史分賚諸邊軍士十一月壬申減殊死以下罪是年琉球中山暹羅安南爪哇回回哈密占城亦力把里撒馬兒罕烏斯藏入貢十二年春正月癸酉大祀天地於南郊三月癸亥如天壽山庚午還宮丙子免杭嘉湖被災秋糧夏四月丁巳免蘇松常鎮被災秋糧五月己亥大理少卿張驥振濟寧及淮揚饑秋七月甲辰敕各邊練軍備瓦剌八月庚申朔日有食之九月乙未馬愉卒是年琉球中山安南占城瓦剌爪哇哈密暹羅入貢十三年春正月丁酉大祀天地於南郊三月戊子詔責孟養宣慰司獻思機發壬寅賜彭時等進士及第出身有差王驥仍總督軍務都督同知宮聚為平蠻將軍充總兵官帥師討思機發夏四月免浙江江西湖廣被災秋糧五月丙戌遣使捕山東蝗甲辰刑部侍郎丁鉉撫輯河南山東災民秋七月乙酉河決大名沒三百餘里遣使蠲振己酉河決河南沒曹濮東昌潰壽張沙灣壞運道工部侍郎王永和治之八月乙卯福建賊鄧茂七作亂甲戌命御史丁瑄捕之冬十一月丙戌寧陽侯陳懋充總兵官保定伯梁珤平江伯陳豫副之太監曹吉祥王瑾提督火器刑部尚書金濂參贊軍務討鄧茂七甲辰處州賊流劫金華諸縣庚戌永康侯徐安備倭山東十二月庚午廣東瑤賊作亂是年琉球中山安南占城入貢瓦剌貢使三千人賞不如例遂構釁十四年春正月甲午大祀天地於南郊乙巳免浙江福建銀課二月丁巳御史丁瑄指揮劉福擊斬鄧茂七於延平己巳王驥破思機發於金沙江又破之鬼哭山班師辛未指揮僉事徐恭充總兵官討處州賊葉宗留工部尚書石璞參贊軍務三月戊子如天壽山癸巳還宮夏四月庚戌處州賊犯崇安殺都指揮吳剛壬戌湖廣貴州苗賊大起命王驥討之乙丑遣御史十三人同中官督福建浙江銀課五月丙戌陳懋擊破沙縣賊壬辰旱太監金英同法司錄囚己亥侍讀學士張益直文淵閣預機務庚子巡按福建御史汪澄棄市幷殺前巡按御史柴文顯六月庚戌靖州苗犯辰溪都指揮高亮戰死丙辰南京謹身諸殿災甲子修省詔河南山西班軍番休者盡赴大同宣府乙丑西寧侯宋瑛總督大同兵馬己巳赦天下戊寅平鄉伯陳懷駙馬都尉井源都督王貴吳克勤太監林壽分練京軍於大同宣府備瓦剌秋七月己丑瓦剌也先寇大同參將吳浩戰死下詔親征吏部尚書王直帥羣臣諫不聽癸巳命郕王居守是日西寧侯宋瑛武進伯朱冕與瓦剌戰於陽和敗沒甲午發京師乙未次龍虎臺軍中夜驚丁酉次居庸關辛丑次宣府羣臣屢請駐蹕不許丙午次陽和八月戊申次大同鎮守太監郭敬諫議旋師己酉廣寧伯劉安為總兵官鎮大同庚戌師還丁巳次宣府庚申瓦剌兵大至恭順侯吳克忠都督吳克勤戰沒成國公朱勇永順伯薛綬救之至鷂兒嶺遇伏全軍盡覆辛酉次土木被圍壬戌師潰死者數十萬英國公張輔泰寧侯陳瀛駙馬都尉井源平鄉伯陳懷襄城伯李珍遂安伯陳塤修武伯沈榮都督梁成王貴尚書王佐鄺埜學士曹鼐張益侍郎丁鉉王永和副都御史鄧棨等皆死帝北狩甲子京師聞敗羣臣聚哭於朝侍講徐珵請南遷兵部侍郎于謙不可乙丑皇太后命郕王監國戊辰帝至大同己巳皇太后命立皇子見深為皇太子辛未帝至威寧海子甲戌至黑河九月癸未郕王即位遙尊帝為太上皇帝
