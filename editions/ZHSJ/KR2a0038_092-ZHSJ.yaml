body:
  text: 明史卷九十二志第六十八兵四清理軍伍訓練賞功火器車船馬政明初𣛀集令行民出一丁為軍衞所無缺伍且有羨丁未幾大都督府言起吳元年十月至洪武三年十一月軍士逃亡者四萬七千九百餘於是下追捕之令立法懲戒小旗逃所隸三人降為軍上至總旗百戶千戶皆視逃軍多寡奪俸降革其從征在外者罰尤嚴十六年命五軍府檄外衞所速逮缺伍士卒給事中潘庸等分行清理之明年從兵部尚書俞綸言京衞軍戶絕者毋冒取同姓及同姓之親令有司覈實發補府衞毋特遣人二十一年詔衞所覈實軍伍有匿己子以養子代者不許其秋令衞所著軍士姓名鄉貫為籍具載丁口以便取補又置軍籍勘合分給內外軍士遇點閱以為驗成祖即位遣給事等官分閱天下軍重定𣛀集軍更代法初三丁已上𣛀正軍一別有貼戶正軍死貼戶丁補至是令正軍貼戶更代貼戶單丁者免當軍家蠲其一丁徭洪熙元年興州左屯衞軍范濟極言勾軍之擾富峪衞百戶錢興奏言祖本涿鹿衞軍死父繼以功授百戶臣已襲父職而本衞猶以臣祖為逃軍屢行勾取帝謂尚書張本曰軍伍不清弊多類此已而宣宗立軍弊益滋黠者往往匿其籍或誣攘良民充伍帝諭兵部曰朝廷於軍民如舟車任載不可偏重有司宜審實毋混乃分遣吏部侍郎黃宗載等清理天下軍衞三年敕給事御史清軍定十一條例榜示天下明年復增為二十二條五年從尚書張本請令天下官吏軍旗公勘自洪永來勾軍之無踪者豁免之六年令勾軍有親老疾獨子者編之近地餘丁赴工逋亡者例發口外改為罰工一年示優恤焉八年免蘇州衞抑配軍百五十九人已食糧止令終其身者千二百三十九人先是蘇常軍戶絕者株累族黨動以千計知府況鍾言於朝又常州民訴受抑為軍者七百有奇故特敕巡撫侍郎周忱清理正統初令勾軍家丁盡者除籍逃軍死亡及事故者或家本軍籍而偶同姓名里胥挾讐妄報冒解或已解而赴部聲冤者皆與豁免定例補伍皆發極邊而南北人互易大學士楊士奇謂風土異宜瀕於夭折請從所宜發戍署兵部侍郎鄺埜以為紊祖制寢之成化二年山西巡撫李侃復請補近衞始議行十一年命御史十一人分道清軍以十分為率及三分者最不及者殿時以罪謫者逃故亦勾其家丁御史江昂謂非罰弗及嗣之義乃禁之嘉靖初捕亡令愈苛有株累數十家勾攝經數十年者丁口已盡猶移覆紛紜不已兵部尚書胡世寧請屢經清報者免勾又避役之人必緩急難倚急改編原籍衞所有缺伍則另選舍餘及犯罪者充補犯重發邊衞者責賣家產闔房遷發使絕顧念庶衞卒皆土著而逃亡益鮮帝是其言其後用主事王學益議製勾單立法詳善久之停差清軍御史寬管解逃軍及軍赴衞違限之科清軍官日玩愒文卷磨滅議者復請申飭萬曆三年給事中徐貞明言勾軍東南資裝出於戶丁解送出於里遞每軍不下百金大困東南之民究無補於軍政宜視班匠例免其解補而重徵班銀以資召募使東南永無勾補之擾而西北之行伍亦充鄖陽巡撫王世貞因言有四便應勾之戶樂於就近不圖避匿便一各安水土不至困絕便二近則不逃逃亦易追便三解戶不至破家便四而兵部卒格貞明議不行後十三年南京兵部尚書郭應聘復請各就近地南北改編又言應勾之軍南直隸至六萬六千餘株連至二三十萬人請自天順以前竟與釋免報可遠近皆悅然改編令下求改者相繼明年兵部言什伍漸耗邊鎮軍人且希圖脫伍有旨復舊而應聘之議復不行凡軍衞掌於職方而勾清則武庫主之有所勾攝自衞所開報先覈鄉貫居止內府給批下有司提本軍謂之跟捕提家丁謂之勾捕間有恩恤開伍者洪武二十三年令應補軍役生員遣歸卒業宣德四年上虞人李志道充楚雄衞軍死有孫宗皐宜繼時已中鄉試尚書張本言於帝得免如此者絕少戶有軍籍必仕至兵部尚書始得除軍士應起解者皆僉妻有津給軍裝解軍行糧軍丁口糧之費其冊單編造皆有式初定戶口收軍勾清三冊嘉靖三十一年又編四冊曰軍貫曰兜底曰類衞類姓其勾軍另給軍單蓋終明世於軍籍最嚴然弊政漸叢而擾民日甚明太祖起布衣策羣力取天下即位後屢命元勳宿將分道練兵而其制未定洪武六年命中書省大都督府御史臺六部議教練軍士律騎卒必善馳射槍刀步兵必善弓弩槍射以十二矢之半遠可到近可中為程遠可到將弁百六十步軍士百二十步近可中五十步彀弩以十二矢之五遠可到蹶張八十步划車一百五十步近可中蹶張四十步划車六十步槍必進退熟習在京衞所以五千人為率取五之一指揮以下官領赴御前驗試餘以次番試在外都司衞所每衞五千人取五之一千戶以下官領赴京驗試餘以次番試軍士步騎皆善將領各以其能受賞否則罰軍士給錢六百為道里費將領自指揮使以下所統軍士三分至六分不中者次第奪俸七分以上次第降官至為軍止都指揮軍士四分以上不中奪俸一年六分以上罷職後十六年令天下衞所善射者十選一於農隙分番赴京較閱以優劣為千百戶賞罰邊軍本衞較射二十年命衞士習射於午門丹墀明年復令天下衞所馬步軍士各分十班將弁以廕久次陞者統之冬月至京閱試指揮千百戶年深慣戰及屯田者免仍先下操練法俾遵行不如法及不羔天習者罰明年詔五軍府比試軍士分三等賞鈔又各給鈔三錠為路費不中者亦給之明年再試不如式軍移戍雲南官謫從征總小旗降為軍武臣子弟襲職試騎步射不中程令還衞署事與半俸二年後仍試如故者亦降為軍文皇即位五駕北征六師嘗自較閱又嘗敕秦晉周肅諸王各選護衞軍五千命官督赴真定操練陝西甘肅寧夏大同遼東諸守將及中都留守河南等都司徐宿等衞遣將統馬步軍分駐真定德州操練候赴京閱視景泰初立十團營給事中鄧林進軒轅圖即古八陣法也因用以教軍成化間增團營為十二命月二次會操起仲春十五日止仲夏十五日秋冬亦如之弘治九年兵部尚書馬文升申明洪永操法五日內二日走陣下營三日演武武宗好武勇每令提督坐營官操練又自執金鼓演四鎮卒然大要以恣馳騁供嬉戲非有實也嘉靖六年定下營布陣止用三疊陣及四門方營又令每營選槍刀箭牌銃手各一二人為教師轉相教習及更營制分兵三十枝設將三十員各統三千人訓練擇精銳者名選鋒厚其校藝之賞總督大臣一月會操者四餘日營將分練協理大臣及巡視給事御史隨意入一營校閱賞罰因以擇選鋒帝又置內營於內教場練諸內使隆慶初命各營將領以教練軍士分數多寡為黜陟全營教練者加都督僉事以次減全不教練者降祖職一級革任回衞三年內教練有成操協大臣奬諭恩錄無功績者議罰規制雖立然將卒率媮惰操演徒為具文先是浙江參將戚繼光以善教士聞嘗調土兵製鴛鴦陣破倭至是已官總兵穆宗從給事中吳時來請命繼光練兵薊門薊兵精整者數十年繼光嘗著練兵實紀以訓士一曰練伍首騎次步次車次輜重先選伍次較藝總之以合營二曰練膽氣使明作止進退及上下統屬相友相助之義三曰練耳目使明號令四曰練手足使熟技藝五曰練營陣詳布陣起行結營及交鋒之正變終之以練將後多遵用之賞功之制太祖時大賞平定中原征南諸將及雲南越州之功賞格雖具然不豫為令惟二十九年命沿海衞所指揮千百戶獲倭一船及賊者陞一級賞銀五十兩鈔五十錠軍士水陸擒殺賊賞銀有差永樂初以將士久勞命禮部依太祖陞賞例參酌行之乃分奇功首功次功三等其賞之輕重次第率臨時取旨亦不豫為令十二年定凡交鋒之際突出敵背殺敗賊衆者勇敢入陣斬將搴旗者本隊已勝別隊勝負未決而能救援克敵者受命能任事出奇破賊成功者皆為奇功齊力前進首先敗賊者前隊交鋒未決後隊向前敗賊者皆為首功軍行及營中擒獲奸細者亦准首功餘皆次功又立功賞勘合定四十字曰神威精勇猛強壯毅英雄克勝兼超捷奇功奮銳鋒智謀宣妙略剛烈效忠誠果敢能安定揚名顯大勳編號用寶貯內府印綬監當是時稽功之法甚嚴正統十四年造賞功牌有奇功頭功齊力之分以大臣主之凡挺身突陣斬將奪旗者與奇功牌生擒瓦剌或斬首一級與頭功牌雖無功而被傷者與齊力牌蓋專為瓦剌入犯設也是後將士功賞視立功之地準例奏行北邊為上東北邊次之西番及苗蠻又次之內地反賊又次之世宗時苦倭甚故海上功比北邊尤為最北邊自甘肅迤東抵山海關成化十四年例一人斬一級者進一秩至三秩止二人共斬者為首進秩同壯男與實授幼弱婦女與署職為從及四級以上俱給賞領軍官部下五百人者獲五級進一秩領千人者倍之正德十年重定例獨斬一級者陞一秩三人共者首陞署一秩從給賞四五六人共者首給賞從量賞二人共斬一幼敵者首視三人例從量賞不願陞者每實授一秩賞銀五十兩署職二十兩嘉靖十五年定領軍官千把總加至三秩止都指揮以上止陞署職二級餘加賞東北邊初定三級當北邊之一萬曆中改與北邊同番寇苗蠻亦三級進一秩實授署職視北邊十級以上幷不及數者給賞萬曆三年令陝西番寇功視成化中例軍官千總領五百人者部下斬三十級領千人者六十級把總領五百人者十級領千人者三十級俱進一秩至三秩止南方蠻賊宣德九年例三級以上及斬獲首賊俱陞一秩餘加賞正德十六年定軍官部下斬百級者陞署一秩三百級者實授一秩四百級者陞一秩餘功加賞倭賊嘉靖三十五年定斬倭首賊一級陞實授三秩不願者賞銀百五十兩從賊一級授一秩漢人脅從一級署一秩陣亡者本軍及子實授一秩海洋遇賊有功均以奇功論萬曆十二年更定視舊例少變以賊衆及船之多寡為功賞之差復定海洋征戰無論倭寇海賊勘是奇功與世襲雲南夷賊擒斬功次視倭功內地反賊成化十四年例六級陞一秩至三秩止幼男婦女及十九級以上與不及數者給賞正德七年定流賊例名賊一級授一秩世襲為從者給賞次賊一級署一秩從賊三級及陣亡者俱授一秩世襲重傷回營死者署一秩又以割耳多寡論功最多者至陞二秩世襲先是五年寧夏功後嘉靖元年江西功俱視流賊例崇禎中購闖獻以萬金爵封侯餘賊有差以賊勢重變常格也其俘獲人畜器械成化例俱給所獲者其論功陞秩成化十四年例軍士陞一秩為小旗舍人陞一秩給冠帶以上類推嘉靖四十三年定都督等官無階可陞者所應襲男廕冠帶萬曆十三年定都指揮使陞秩者不授都督賞銀五十兩陞俸者半之其有司民兵隆慶六年定視軍人例自洪宣以後賞格皆以斬級多少豫定條例漸多倖弊日啟正德間副使胡世寧言兩軍格鬬手眼瞬息不得差池何暇割級其獲級者或殺已降或殺良民或偶得單行之賊被掠逃出之人非真功也宜選強明剛正之員為紀功官痛懲此弊時弗能行故事鎮守官奏帶例止五名後領兵官所奏有至三四百名者不在斬馘之例別立名目曰運送神鎗曰齎執旗牌曰衝鋒破敵曰三次當先曰軍前効勞冒濫之弊至斯極已古所謂礮皆以機發石元初得西域礮攻金蔡州城始用火然造法不傳後亦罕用至明成祖平交阯得神機鎗礮法特置神機營肄習製用生熟赤銅相間其用鐵者建鐵柔為最西鐵次之大小不等大者發用車次及小者用架用樁用托大利於守小利於戰隨宜而用為行軍要器永樂十年詔自開平至懷來宣府萬全興和諸山頂皆置五礮架二十年從張輔請增置於山西大同天城陽和朔州等衞以禦敵然利器不可示人朝廷亦慎惜之宣德五年敕宣府總兵官譚廣神銃國家所重在邊墩堡量給以壯軍威勿輕給正統六年邊將黃真楊洪立神銃局於宣府獨石帝以火器外造恐傳習漏泄敕止之正統末邊備日亟御史楊善請鑄兩頭銅銃景泰元年巡關侍郎江潮言真定藏都督平安火傘上用鐵槍頭環以響鈴置火藥筩三發之可潰敵馬應州民師翺製銃有機頃刻三發及三百步外俱試驗之天順八年延綏參將房能言麓川破賊用九龍筒一線然則九箭齊發請頒式各邊至嘉靖八年始從右都御史汪鋐言造佛郎機礮謂之大將軍發諸邊鎮佛郎機者國名也正德末其國舶至廣東白沙巡檢何儒得其制以銅為之長五六尺大者重千餘斤小者百五十斤巨腹長頸腹有修孔以子銃五枚貯藥置腹中發及百餘丈最利水戰駕以蜈蚣船所擊輒糜碎二十五年總督軍務翁萬達奏所造火器兵部試之言三出連珠百出先鋒鐵捧雷飛俱便用母子火獸布地雷礮止可夜劫營御史張鐸亦進十眼銅礮大彈發及七百步小彈百步四眼鐵鎗彈四百步詔工部造萬曆中通判華光大奏其父所製神異火器命下兵部其後大西洋船至復得巨礮曰紅夷長二丈餘重者至三千斤能洞裂石城震數十里天啟中錫以大將軍號遣官祀之崇禎時大學士徐光啟請令西洋人製造發各鎮然將帥多不得人城守不固有委而去之者及流寇犯闕三大營兵不戰而潰鎗礮皆為賊有反用以攻城城上亦發礮擊賊時中官已多異志皆空器貯藥取聲震而已明置兵仗軍器二局分造火器號將軍者自大至五又有奪門將軍大小二樣神機礮襄陽礮盞口礮椀口礮旋風礮流星礮虎尾礮石榴礮龍虎礮毒火飛礮連珠佛郎機礮信礮神礮礮𩹉礮十眼銅礮三出連珠礮百出先鋒礮鐵捧雷飛礮火獸布地雷礮椀口銅鐵銃手把銅鐵銃神銃斬馬銃一窩鋒神機箭銃大中小佛郎機銅銃佛郎機鐵銃木廂銅銃筋繳樺皮鐵銃無敵手銃鳥嘴銃七眼銅銃千里銃四眼鐵鎗各號雙頭鐵鎗夾把鐵手鎗快鎗以及火車火傘九龍筒之屬凡數十種正德嘉靖間造最多又各邊自造自正統十四年四川始其他刀牌弓箭槍弩狼筅蒺藜甲冑戰襖在內有兵仗軍器鍼工鞍轡諸局屬內庫掌於中官在外有盔甲廠屬兵部掌以郎官京省諸司衞所又俱有雜造局軍資器械名目繁夥不具載惟火器前代所少故特詳焉中原用車戰而東南利舟楫二者於兵事為最要自騎兵起車制漸廢洪武五年造獨轅車北平山東千輛山西河南八百輛永樂八年北征用武剛車三萬輛皆惟以供餽運至正統十二年始從總兵官朱冕議用火車備戰自是言車戰者相繼十四年給事中李侃請以吂月馬凡車千輛鐵索聯絡騎卒處中每車翼以刀牌手五人賊犯陣刀牌手擊之賊退則開索縱騎帝命造成祭而後用下車式於邊境用七馬駕寧夏多溝壑總兵官張泰請用獨馬小車時以為便箭工周四章言神機鎗一發難繼請以車載鎗二十箭六百車首置五鎗架一人推二人扶一人執爨試可乃造景泰元年定襄伯郭登請倣古制為偏箱車轅長丈三尺闊九尺高七尺五寸箱用薄皮置銃出則左右相連前後相接鈎環牽互車載衣糧器械幷鹿角二屯處十五步外設為藩每車鎗礮弓弩刀牌甲士共十人無事輪番推挽外以長車二十載大小將軍銃每方五輛轉輸樵採皆在圍中又用四輪車一列五色旗視敵指揮廷議此可以守難於攻戰命登酌行蘭州守備李進請造獨輪小車上施皮屋前用木板畫獸面鑿口置椀口銃四鎗四神機箭十四樹旗一行為陣止為營二年吏部郎中李賢請造戰車長丈五尺高六尺四寸四圍箱板穴孔置銃上闢小牕每車前後占地五步以千輛計四方可十六里芻糧器械輜重咸取給焉帝令亟行成化二年從郭登言製軍隊小車每隊六輛輛九人二人挽七人番代車前置牌畫猊首遠望若城壘然八年寧都諸生何京上禦敵車式上施鐵網網穴發鎗弩行則斂之五十車為一隊用士三百七十五人十二年左都御史李賓請造偏箱車與鹿角參用兵部尚書項忠請驗閱以登高涉險不便已之十三年從甘肅總兵官王璽奏造雷火車中立樞軸旋轉發礮二十年宣大總督余子俊以車五百輛為一軍每輛卒十人車隙補以鹿角既成而遲重不可用時人謂之鷓鴣軍弘治十五年陝西總制秦紘請用隻輪車名曰全勝長丈四尺上下共六人可衝敵陣十六年閒住知府范吉獻先鋒霹靂車嘉靖十一年南京給事中王希文請倣郭固韓琦之制造車前銳後方上置七鎗為櫓三層各置九牛神弩傍翼以卒行載甲兵止為營陣下邊鎮酌行十五年總制劉天和復言全勝車之便而稍為損益用四人推挽所載火器弓弩刀牌以百五十斤為準箱前畫狻猊旁列虎盾以護騎士命從其制四十三年有司奏准京營教演兵車共四千輛每輛步卒五人神鎗夾靶鎗各二自正統以來言車戰者如此然未嘗一當敵至隆慶中戚繼光守薊門奏練兵車七營以東西路副總兵及撫督標共四營分駐建昌遵化石匣密雲薊遼總兵二營駐三屯昌平總兵一營駐昌平每營重車百五十有六輕車加百步兵四千騎兵三千十二路二千里間車騎相兼可禦敵數萬穆宗韙之命給造費然特以遏衝突施火器亦未嘗以戰也是後遼東巡撫魏學曾請設戰車營倣偏箱之制上設佛郎機二下置雷飛礮快鎗六每車步卒二十五人萬曆末經略熊廷弼請造雙輪戰車每車火礮二翼以十卒皆持火鎗天啟中直隸巡按御史易應昌進戶部主事曹履吉所製鋼輪車小衝車等式以禦敵皆罕得其用大約邊地險阻不利車戰而舟楫之用則東南所宜舟之制江海各異太祖於新江口設船四百永樂初命福建都司造海船百三十七又命江楚兩浙及鎮江諸府衞造海風船成化初濟川衞楊渠獻槳舟圖皆江舟也海舟以舟山之烏槽為首福船耐風濤且禦火浙之十裝標號軟風蒼山亦利追逐廣東船鐵栗木為之視福船尤巨而堅其利用者二可發佛郎機可擲火毬大福船亦然能容百人底尖上闊首昂尾高柁樓三重帆桅二傍護以板上設木女牆及礮牀中為四層最下實土石次寢息所次左右六門中置水櫃揚帆炊爨皆在是最上如露臺穴梯而登傍設翼板可憑以戰矢石火器皆俯發可順風行海蒼視福船稍小開浪船能容三五十人頭銳四槳一櫓其行如飛不拘風潮順逆艟船視海蒼又小蒼山船首尾皆闊帆櫓並用櫓設船傍近後每傍五枝每枝五跳跳二人以板閘跳上露首於外其制上下三層下實土石上為戰場中寢處其張帆下椗皆在上層戚繼光云倭舟甚小一入𩹉海大福海蒼不能入必用蒼船逐之衝敵便捷溫人謂之蒼山鐵也沙鷹二船相胥成用沙船可接戰然無翼蔽鷹船兩端銳進退如飛傍釘大茅竹竹間牕可發銃箭牕內舷外隱人以盪槳先駕此入賊隊沙船隨進短兵接戰無不勝漁船至小每舟三人一執布帆一執槳一執鳥嘴銃隨波上下可掩賊不備網梭船定海臨海象山俱有之形如梭竹桅布帆僅容二三人遇風濤輒舁入山麓可哨探蜈蚣船象形也能駕佛朗機銃底尖面闊兩傍楫數十行如飛兩頭船旋轉在舵因風四馳諸船無逾其速蓋自嘉靖以來東南日備倭故海舟之制特詳備云明制馬之屬內者曰御馬監中官掌之牧於大壩蓋倣周禮十有二閑意牧於官者為太僕寺行太僕寺苑馬寺及各軍衞即唐四十八監意牧於民者南則直隸應天等府北則直隸及山東河南等府即宋保馬意其曰備養馬者始於正統末選馬給邊邊馬足而寄牧於畿甸者也官牧給邊鎮民牧給京軍皆有孳生駒官牧之地曰草場或為軍民佃種曰熟地歲徵租佐牧人市馬牧之人曰恩軍曰隊軍曰改編軍曰充發軍曰抽發軍苑馬分三等上苑萬中七千下四千一夫牧馬十匹五十夫設圉長一人凡馬肥瘠登耗籍其毛齒而時省之三歲寺卿偕御史印烙鬻其羸劣以轉市邊衞營堡府州縣軍民壯騎操馬則掌於行寺卿邊用不足又以茶易於番以貨市於邊其民牧皆視丁田授馬始曰戶馬既曰種馬按歲徵駒種馬死孳生不及數輒賠補此其大凡也初太祖都金陵令應天太平鎮江廬州鳳陽揚州六府滁和二州民牧馬洪武六年設太僕寺於滁州統於兵部後增滁陽五牧監領四十八羣已為四十監旋罷惟存天長大興舒城三監置草場於湯泉滁州等地復令飛熊廣武英武三衞五軍養一馬馬歲生駒一歲解京既而以監牧歸有司專令民牧江南十一戶江北五戶養馬一復其身太僕官督理歲正月至六月報定駒七月至十月報顯駒十一二月報重駒歲終考馬政以法治府州縣官吏凡牡曰兒牝曰騍兒一騍四為羣羣頭一人五羣羣長一人三十年設北平遼東山西陝西甘肅行太僕寺定牧馬草場永樂初設太僕寺於北京掌順天山東河南舊設者為南太僕寺掌應天等六府二州四年設苑馬寺於陝西甘肅統六監監統四苑又設北京遼東二苑馬寺所統視陝西甘肅十二年令北畿民計丁養馬選居閒官教之畜牧民十五丁以下一匹十六丁以上二匹為事編發者七戶一匹得除罪尋以寺卿楊砥言北方人戶五丁養一免其田租之半薊州以東至南海等衞戍守軍外每軍飼種馬一又定南方養馬例鳳廬揚滁和五丁一應天太鎮十丁一淮徐初養馬亦以丁為率十八年罷北京苑馬寺悉牧之民洪熙元年令民牧二歲徵一駒免草糧之半自是馬日蕃漸散於隣省濟南兗州東昌民養馬自宣德四年始也彰德衞輝開封民養馬自正統十一年始也已而也先入犯取馬二萬寄養近京充團營騎操而盡以故時種馬給永平等府景泰三年令兒馬十八歲騍馬二十歲以上免算駒成化二年以南土不產馬改徵銀四年始建太僕寺常盈庫貯備用馬價是時民漸苦養馬六年吏部侍郎葉盛言向時歲課一駒而民不擾者以芻牧地廣民得為生也自豪右莊田漸多養馬漸不足洪熙初改兩年一駒成化初改三年一駒馬愈削民愈貧然馬卒不可少乃復兩年一駒之制民愈不堪請敕邊鎮隨俗所宜凡可以買馬足邊軍民交益者便宜處置時馬文升撫陝西又極論邊軍償馬之累請令屯田卒田多丁少而不領馬者歲輸銀一錢以助賠償雖皆允行而民困不能舒也繼文升撫陝者蕭禎請省行太僕寺兵部覆云洪永時設行太僕及苑馬寺凡茶馬番人貢馬悉收寺苑放牧常數萬匹足充邊用正統以後北敵屢入抄掠馬遂日耗言者每請裁革是惜小費而忘大計於是敕諭禎但令加意督察而北畿自永樂以來馬日滋輒責民牧民年十五者即養馬太僕少卿彭禮以戶丁有限而課駒無窮請定種馬額會文升為兵部尚書奏行其請乃定兩京太僕種馬兒馬二萬五千騍馬四之二年納駒著為令時弘治六年也十五年冬尚書劉大夏薦南京太常卿楊一清為副都御史督理陝西馬政一清奏言我朝以陝右宜牧設監苑跨二千餘里後皆廢惟存長樂靈武二監今牧地止數百里然以供西邊尚無不足但苦監牧非人牧養無法耳兩監六苑開城安定水泉便利宜為上苑牧萬馬廣寧萬安為中苑黑水草場逼窄清平地狹土瘠為下苑萬安可五千廣寧四千清平二千黑水千五百六苑歲給軍外可常牧馬三萬二千五百足供三邊用然欲廣孳息必多蓄種馬宜增滿萬匹兩年一駒五年可足前數請支太僕馬價銀四萬二千兩於平慶臨鞏買種馬七千又養馬恩隊軍不足請編流亡民及問遣回籍者且視恩軍例凡發邊衞充軍者改令各苑牧馬增為三千人又請相地勢築城通商種植榆柳春夏放牧秋冬還馬既得安敵來亦可收保孝宗方重邊防大夏掌兵部一清所奏輒行遷總制仍督馬政諸監草場原額十三萬三千七百餘頃存者已不及半一清覈之得荒地十二萬八千餘頃又開武安苑地二千九百餘頃正德二年聞於朝及一清去官未幾復廢時御史王濟言民苦養馬有一孳生馬輒害之間有定駒賂醫諱之有顯駒墜落之馬虧欠不過納銀二兩既孳生者已聞官而復倒斃不過納銀三兩孳生不死則饑餓馬日瘦削無濟實用今種馬地畝人丁歲取有定額請以其額數令民買馬而種馬孳生縣官無與兵部是其言自後每有奏報輒引濟言縣官無與種馬事但責駒於民遺母求子矣初邊臣請馬太僕寺以見馬給之自改徵銀馬日少而請者相繼給價十萬買馬萬匹邊臣不能市良馬馬多死太僕卿儲巏以為言請仍給馬又指陳各邊種馬盜賣私借之弊語雖切不能從而邊鎮給發日益繁延綏三十六營堡自弘治十一年始十年間發太僕銀二十八萬有奇買補四萬九千餘匹寧夏大同居庸關等處不與焉至正德七年遂開納馬例凡十二條九年復發太僕銀市馬萬五千於山東遼東河南及鳳陽保定諸府嘉靖元年陝西苑馬少卿盧璧條上馬政請督逋負明印烙訓醫藥均地差以救目前而闢場廣蓄為經久計帝嘉納之自後言馬事者頗衆大都因事立說補救一時而已二十九年俺答入寇太僕馬缺復行正德納馬例已稍增損之至四十一年遂開例至捐馬授職隆慶二年提督四夷館太常少卿武金言種馬之設專為孳生備用備用馬既別買則種馬可遂省今備用馬已足三萬宜令每馬折銀三十兩解太僕種馬盡賣輸兵部一馬十兩則直隸山東河南十二萬匹可得銀百二十萬且收草豆銀二十四萬御史謝廷傑謂祖制所定關軍機不可廢兵部是廷傑言而是時內帑乏方分使括天下逋賦穆宗可金奏下部議部請養賣各半從之太僕之有銀也自成化時始然止三萬餘兩及種馬賣銀日增是時通貢互市所貯亦無幾及張居正作輔力主盡賣之議自萬曆九年始上馬八兩下至五兩又折徵草豆地租銀益多以供團營買馬及各邊之請然一騸馬輒發三十金而州縣以駑馬進其直止數金且仍寄養於馬戶害民不減曩時又國家有興作賞賚往往借支太僕銀太僕帑益耗十五年寺卿羅應鶴請禁支借二十四年詔太僕給陝西賞功銀寺臣言先年庫積四百餘萬自東西二役興僅餘四之一朝鮮用兵百萬之積俱空今所存者止十餘萬況本寺寄養馬歲額二萬匹今歲取折色則馬之派徵甚少而東征調兌尤多卒然有警馬與銀俱竭何以應之章下部未能有所釐革也崇禎初核戶兵工三部借支太僕馬價至一千三百餘萬蓋自萬曆以來冏政大壞而邊牧廢弛愈不可問既而遼東督師袁崇煥以缺馬請於兩京州縣寄養馬內折三千匹價買之西邊太僕卿涂國鼎言祖宗令民養馬專供京營騎操防護都城非為邊也後來改折無事則易馬輸銀有警則出銀市馬仍是為京師備禦之意今折銀已多給各鎮如幷此馬盡折萬一變生奈何帝是其言却崇煥請按明世馬政法久弊叢其始盛終衰之故大率由草場興廢太祖既設草場於大江南北復定北邊牧地自東勝以西至寧夏河西察罕腦兒以東至大同宣府開平又東南至大寧遼東抵鴨綠江又北千里而南至各衞分守地又自雁門關西抵黃河外東歷紫荊居庸古北抵山海衞荒閒平埜非軍民屯種者聽諸王駙馬以至近邊軍民樵採牧放在邊藩府不得自占永樂中又置草場於畿甸尋以順聖川至桑乾河百三十餘里水草美令以太僕千騎令懷來衞卒百人分牧後增至萬二千匹宣德初復置九馬坊於保安州於是兵部奏馬大蕃息以色別而名之其毛色二十五等其種三百六十其後莊田日增草場日削軍民皆困於孳養弘治初兵部主事湯冕太僕卿王霽給事中韓祐周旋御史張淳皆請清覈而旋言香河諸縣地占於勢家霸州等處俱有仁壽宮皇莊乞罷之以益牧地雖允行而占佃已久卒不能清南京諸衞牧場亦久廢兵部尚書張鎣請復之御史胡海言恐遺地利遂止京師團營官馬萬匹與旗手等衞上直官馬皆分置草場歲春末馬非聽用者坐營官領下場放牧草豆住支秋末回給事御史閱視馬斃軍逃者以聞後上直馬不出牧而騎操馬仍歲出如例嘉靖六年武定侯郭勛以邊警為辭奏免之徵各場租以充公費餘貯太僕買馬於是營馬專仰秣司農歲費至十八萬戶部為詘而草場益廢議者爭以租佃取贏浸淫至神宗時弊壞極矣茶馬司洪武中立於川陝聽西番納馬易茶賜金牌信符以防詐偽每三歲遣廷臣召諸番合符交易上馬茶百二十觔中馬七十觔下馬五十觔以私茶出者罪死雖勳戚無貸末年易馬至萬三千五百餘匹永樂中禁稍弛易馬少乃命嚴邊關茶禁遣御史巡督正統末罷金牌歲遣行人巡察邊氓冒禁私販者多成化間定差御史一員領敕專理弘治間大學士李東陽言金牌制廢私茶盛有司又屢以敝茶紿番族番人抱憾往往以羸馬應宜嚴敕陝西官司揭榜招諭復金牌之制嚴收良茶頗增馬直則得馬必蕃及楊一清督理苑馬遂命幷理鹽茶一清申舊制禁私販種官茶四年間易馬九千餘匹而茶尚積四十餘萬觔靈州鹽池增課五萬九千貯慶陽固原庫以買馬給邊又懼後無專官制終廢也於正德初請令巡茶御史兼理馬政行太僕苑馬寺官聽其提調報可御史翟唐歲收茶七十八萬餘觔易馬九千有奇後法復弛嘉靖初戶部請揭榜禁私茶凡引俱南戶部印發府州縣不得擅印三十年詔給番族勘合然初制訖不能復矣馬市者始永樂間遼東設市三二在開原一在廣寧各去城四十里成化中巡撫陳鉞復奏行之後至萬曆初不廢嘉靖中開馬市於大同陝邊宣鎮相繼行隆慶五年俺答上表稱貢總督王崇古市馬七千餘匹為價九萬六千有奇其價遼東以米布絹宣大山西以銀市易外有貢馬者以鈔幣加賜之初太祖起江左所急惟馬屢遣使市於四方正元壽節內外藩封將帥皆以馬為幣外國土司番部以時入貢朝廷每厚加賜予所以招攜懷柔者備至文帝勤遠略遣使絕域外國來朝者甚衆然所急者不在馬自後狃於承平駕馭之權失馬無外增惟恃孳生歲課重以官吏侵漁牧政荒廢軍民交困矣蓋明自宣德以後祖制漸廢軍旅特甚而馬政其一云
