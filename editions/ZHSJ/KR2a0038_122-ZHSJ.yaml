body:
  text: 明史卷一百二十二列傳第十郭子興韓林兒郭子興其先曹州人父郭公少以日者術遊定遠言禍福輒中邑富人有瞽女無所歸郭公乃娶之家日益饒生三子子興其仲也始生郭公卜之吉及長任俠喜賓客會元政亂子興散家資椎牛釃酒與壯士結納至正十二年春集少年數千人襲據濠州太祖往從之門者疑其諜執以告子興子興奇太祖狀貌解縛與語收帳下為十夫長數從戰有功子興喜其次妻小張夫人亦指目太祖曰此異人也乃妻以所撫馬公女是為孝慈高皇后始子興同起事者孫德崖等四人與子興而五各稱元帥不相下四人者粗而戇日剽掠子興意輕之四人不悅合謀傾子興子興以是多家居不視事太祖乘閒說曰彼日益合我益離久之必為所制子興不能從也元師破徐州徐帥彭大趙均用帥餘衆奔濠德崖等以其故盜魁有名乃共推奉之使居己上大有智數子興與相厚而薄均用於是德崖等譖諸均用曰子興知有彭將軍耳不知有將軍也均用怒乘間執子興幽諸德崖家太祖自他部歸大驚急帥子興二子訴於大大曰吾在孰敢魚肉而翁者與太祖偕詣德崖家破械出子興挾之歸元師圍濠州乃釋故憾共城守五閱月圍解大均用皆自稱王而子興及德崖等為元帥如故未幾大死子早住領其衆均用專狠益甚挾子興攻盱眙泗州將害之太祖已取滁乃遣人說均用曰大王窮迫時郭公開門延納德至厚也大王不能報反聽細人言圖之自剪羽翼失豪傑心竊為大王不取且其部曲猶衆殺之得無悔乎均用聞太祖兵甚盛心憚之太祖又使人賂其左右子興用是得免乃將其所部萬餘就太祖於滁子興為人梟悍善鬬而性悻直少容方事急輒從太祖謀議親信如左右手事解即信讒疎太祖太祖左右任事者悉召之去稍奪太祖兵柄太祖事子興愈謹將士有所獻孝慈皇后輒以貽子興妻子興至滁欲據以自王太祖曰滁四面皆山舟楫商旅不通非可旦夕安者也子興乃已及取和州子興命太祖統諸將守其地德崖饑就食和境求駐軍城中太祖納之有讒於子興者子興夜至和太祖來謁子興怒甚不與語太祖曰德崖嘗困公宜為備子興默然德崖聞子興至謀引去前營已發德崖方留視後軍而其軍與子興軍鬬多死者子興執德崖太祖亦為德崖軍所執子興聞之大驚立遣徐達往代太祖縱德崖還德崖軍釋太祖達亦脫歸子興憾德崖甚將甘心焉以太祖故強釋之邑邑不樂未幾發病卒歸業滁州子興三子長子前戰死次天天爵子興死韓林兒檄天為都元帥張天祐及太祖副之天祐子興婦弟也太祖渡江天天祐引兵攻集慶陳埜先叛俱被殺林兒復以天爵為中書右丞已而太祖為平章政事天爵失職怨望久之謀不利於太祖誅死子興後遂絕有一女小張夫人出者事太祖為惠妃生蜀谷代三王洪武三年追封子興為滁陽王詔有司建廟用中牢祀復其鄰宥氏世世守王墓十六年太祖手書子興事蹟命太常丞張來儀文其碑滁人郭老舍者宣德中以滁陽王親朝京師弘治中有郭琥自言四世祖老舍滁陽王第四子予冠帶奉祀已為宥氏所訐禮官言滁陽王祀典太祖所定曰無後廟碑昭然老舍非滁陽王子奪奉祀韓林兒欒城人或言李氏子也其先世以白蓮會燒香惑衆謫徙永年元末林兒父山童鼓妖言謂天下當大亂彌勒佛下生河南江淮間愚民多信之潁州人劉福通與其黨杜遵道羅文素盛文郁等復言山童宋徽宗八世孫當主中國乃殺白馬黑牛誓告天地謀起兵以紅巾為號至正十一年五月事覺福通等遽入潁州反而山童為吏所捕誅林兒與母楊氏逃武安山中福通據朱皐破羅山上蔡真陽確山犯葉舞陽陷汝寧光息衆至十餘萬元兵不能禦時徐壽輝等起蘄黃布王三孟海馬等起湘漢芝蔴李起豐沛而郭子興亦據濠應之時皆謂之紅軍亦稱香軍十五年二月福通物色林兒得諸碭山夾河迎至亳僭稱皇帝又號小明王建國曰宋建元龍鳳拆鹿邑太清宮材治宮闕於亳尊楊氏為皇太后遵道文郁為丞相福通文素平章政事劉六知樞密院事劉六者福通弟也遵道寵用事福通嫉之陰命甲士撾殺遵道自為丞相加太保事權一歸福通既而元師大敗福通於太康進圍亳福通挾林兒走安豐未幾兵復盛遣其黨分道略地十七年李武崔德陷商州遂破武關以圖關中而毛貴陷膠萊益都濱州山東郡邑多下是年六月福通帥衆攻汴梁且分軍三道關先生破頭潘馮長舅沙劉二王士誠趨晉冀白不信大刀敖李喜喜趨關中毛貴出山東北犯勢銳甚田豐者元鎮守黃河義兵萬戶也叛附福通陷濟寧尋敗走其秋福通兵陷大名遂自曹濮陷衞輝白不信大刀敖李喜喜陷興元遂入鳳翔屢為察罕帖木兒李思齊所破走入蜀十八年田豐復陷東平濟寧東昌益都廣平順德毛貴亦數敗元兵陷清滄據長蘆鎮尋陷濟南益引兵北殺宣慰使董搏霄於南皮陷薊州犯漷州略柳林以逼大都順帝徵四方兵入衞議欲遷都避其鋒大臣諫乃止貴旋被元兵擊敗還據濟南而福通出沒河南北五月攻下汴梁守將竹貞遁去遂迎林兒都焉關先生破頭潘等又分其軍為二一出絳州一出沁州踰太行破遼潞遂陷冀寧攻保定不克陷完州掠大同興和塞外諸郡至陷上都毀諸宮殿轉掠遼陽抵高麗十九年陷遼陽殺懿州路總管呂震順帝以上都宮闕盡廢自此不復北巡李喜喜餘黨復陷寧夏略靈武諸邊地是時承平久州郡皆無守備長吏聞賊來輒棄城遁以故所至無不摧破然林兒本起盜賊無大志又聽命福通徒擁虛名諸將在外者率不遵約束所過焚劫至啖老弱為糧且皆福通故等夷福通亦不能制兵雖盛威令不行數攻下城邑元兵亦數從其後復之不能守惟毛貴稍有智略其破濟南也立賓興院選用元故官姬宗周等分守諸路又於萊州立屯田三百六十所每屯相距三十里造輓運大車百輛凡官民田十取其二多所規畫故得據山東者三年及察罕帖木兒數破賊盡復關隴是年五月大發秦晉之師會汴城下屯杏花營諸軍環城而壘林兒兵出戰輒敗嬰城守百餘日食將盡福通計無所出挾林兒從百騎開東門遁還安豐後宮官屬子女及符璽印章寶貨盡沒於察罕時毛貴已為其黨趙均用所殺有續繼祖者又殺均用所部自相攻擊獨田豐據東平勢稍強二十年關先生等陷大寧復犯上都田豐陷保定元遣使招之被殺王士誠又躪晉冀元將孛羅敗之於臺州遂入東平與豐合福通嘗責李武崔德逗撓將罪之二十一年夏兩人叛去降於李思齊時李喜喜關先生等東西轉戰已多走死餘黨自高麗還寇上都孛羅復擊降之而察罕既取汴梁遂遣子擴廓討東平脅降田豐王士誠乘勝定山東惟陳猱頭者獨守益都不下與福通遙為聲援二十二年六月豐士誠乘閒刺殺察罕入益都元以兵柄付擴廓圍城數重猱頭等告急福通自安豐引兵赴援遇元師於火星埠大敗走還元兵急攻益都穴地道以入殺豐士誠而械送猱頭於京師林兒勢大窘明年張士誠將呂珍圍安豐林兒告急於太祖太祖曰安豐破則士誠益強遂親帥師往救而珍已入城殺福通太祖擊走珍以林兒歸居之滁州明年太祖為吳王又二年林兒卒或曰太祖命廖永忠迎林兒歸應天至瓜步覆舟沉於江云初太祖駐和陽郭子興卒林兒牒子興子天為都元帥張天祐為右副元帥太祖為左副元帥時太祖以孤軍保一城而林兒稱宋後四方響應遂用其年號以令軍中林兒歿始以明年為吳元年其年遣大將軍定中原順帝北走距林兒亡僅歲餘林兒僭號凡十二年贊曰元之末季羣雄蜂起子興據有濠州地偏勢弱然有明基業實肇於滁陽一旅子興之封王祀廟食報久長良有以也林兒橫據中原縱兵蹂躪蔽遮江淮十有餘年太祖得以從容締造者藉其力焉帝王之興必有先驅者資之以成其業夫豈偶然哉
