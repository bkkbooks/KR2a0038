body:
  text: 明史卷一百九十四列傳第八十二喬宇孫交子元林俊子達張黻金獻民秦金孫柱趙璜鄒文盛梁材劉麟蔣瑤王廷相喬宇字希大山西樂平人祖毅工部左侍郎父鳳職方郎中皆以清節顯宇登成化二十年進士授禮部主事弘治初王恕為吏部調之文選三遷至郎中門無私謁擢太常少卿武宗嗣位遣祀中鎮西海還朝條上道中所見軍民困苦六事巳遷光祿卿歷戶部左右侍郎劉瑾敗大臣多以黨附見劾宇獨無所染拜南京禮部尚書乾清宮災率同列言視朝不勤經筵久輟國本未建義子猥多番僧處禁寺優伶侍起居立皇店留邊兵習戰鬬土木繁興織造不息凡十事帝不省久之改兵部參贊機務以帝遠遊塞上而監國無人請早建儲貳帝將自擊寇宇復率同列諫皆不報未幾寧王宸濠反揚言旦夕下南京宇嚴為警備而談笑自如時攜客燕城外密察地險易置戍守綜理周密內外宴然指揮楊銳有才略署為安慶守備鎮守中官劉瑯與濠通為預伏死士宇刺得其情詰瑯用事者瑯懼不敢動宇乃大索城中斬所伏壯士三百人懸首江上宸濠失內應且知有備不敢東攻安慶銳固守不得下未幾敗帝至南京詔百官戎服朝明年正旦宇不可率諸臣朝服賀江彬索城門諸鑰都督府問宇宇曰守備者所以謹非常禁門鎖鑰孰敢索亦孰敢予雖天子詔不可得都督府以宇言復乃已彬矯旨有所求日數十至宇必廷白之彬亦稍稍止彬欲譖去宇守備太監王偉者初為帝伴讀帝信之每從中調護故彬謀不行帝駐南京九月宇倡諸臣三請回鑾又自伏闕請駕旋扈至揚州明年加太子太保論保障功復加少保世宗即位召為吏部尚書宇自為選郎有人倫鑒及是銓政一清帝求治銳甚宇與林俊彭澤孫交皆海內重望帝亦委任之凡為權倖所黜者皆起列庶位天下欣欣望治帝性剛好自用宇所執漸不見聽興府需次官六十三人乞遷宇言此輩虛隸名籍與見供事者不同黜罰之有差皆怨宇帝欲封駙馬都尉崔元為侯外戚蔣輪邵喜為伯宇不可無何詔進壽寧侯張鶴齡為公封后父陳萬言為伯授萬言子紹祖尚寶丞宇言累朝太后戚屬無生封公者張巒亦歿後贈今奈何以父贈為子封萬言封伯視巒更驟而子授尚寶非制願陛下守典章以垂萬世帝並不從史道訐楊廷和宇言道挾私遂下之詔獄曹嘉助道劾宇宇求罷帝命鴻臚趨視事宇遇事不可無不力爭而爭大禮尤切帝欲加興獻帝皇號宇言加皇於本生之親則干正統非所以重宗廟正名分及禮官請稱獻帝為本生考帝改稱本生皇考又詔建獻帝廟於大內宇等復連章諫特旨用席書為禮部尚書宇又偕九卿言陛下罷汪俊用席書謫馬明衡季本陳逅召張璁桂萼霍韜舉措乖違人心駭愕夫以一二人邪說廢天下萬世公議內離骨肉外間君臣名為効忠實累聖德且書不繇廷推特出內降此祖宗來所未有乞令俊與書各仍舊職宥明衡等止璁萼毋召尋復請罷璁萼書而出爭大禮者呂柟鄒守益於獄會璁萼至京詔皆用為學士宇等又言內降恩澤先朝率施於佞倖小人若士大夫一預其間即不為清議所齒況學士最清華而俾萼等居之誰復肯與同列哉帝怒切責宇遂乞休許之馳傳給夫廩猶如故事御史許中劉隅等請留宇帝曰朕非不用宇宇自以疾求去耳後明倫大典成追論前議奪官楊一清卒宇渡江弔之南都父老皆出迎舉手加額曰活我者公也宇幼從父京師學於楊一清成進士後復從李東陽遊詩文雄雋兼通篆籀性好山水嘗陟太華絕頂遇虎僕夫皆驚仆宇端坐不動虎徐帖尾去家居澹泊服御若寒士身歿二妾劉許皆從死穆宗即位復官贈少傅諡莊簡孫交字志同安陸人成化十七年進士授南京兵部主事為尚書王恕所知弘治初恕入吏部薦授稽勳員外郎歷文選郎中居吏部十四年於善類多所推引遷太常少卿提督四夷館大同有警命經略黃花鎮諸邊增垣塹廣樹藝制敵騎馳突永樂時歲遣隆慶諸衞軍採薪炭其後罷之令歲輸銀二萬兩軍重困交奏免之正德初擢光祿卿三年進戶部右侍郎提督倉場改吏部尚書張綵附劉瑾交數規切綵怒調之南京瑾敗召拜戶部尚書時征討流寇調度煩急仍歲凶正賦不足交區畫適宜四方告饑輒請蠲租遣振以故民不至甚敝而小人用事者皆不便之帝欲以太平倉賜倖臣裴德雲南鎮守中官張倫請採銀礦南京織造中官吳經奏費乏交皆力爭八年六月中旨與禮部尚書傅珪並致仕言官多請留不報世宗在潛邸知交名甫即位召復故官首請帝日讀祖訓言動悉取準則經筵日講寒暑勿輟帝褒納焉或議遷顯陵天壽山交言山陵事重太祖於欲遷仁祖於鍾山慮泄靈氣而止具載皇陵碑事乃止武宗侈汰之後庫藏殫虛交裁宂食定經制宿弊為清然事涉中官者帝亦不能盡從也嘗會廷臣議發內帑給軍廩官俸已報可為中官梁諫等所沮交言宮府異同令出復反非新政所宜不聽中官監督倉場者初止數人正德中增至五十五人以交言罷撤過半其後復漸增帝已罷三十七人交欲盡去之並臨清徐淮諸倉一切勿遣帝令自今毋更加而已守珠池中官詔毋得預守土事而安川夤緣復故交劾川命如前詔正德中上林苑內臣至九十九人侵奪公私地無算帝即位命留十八人如弘治時已復傳奉至六十二人交乞汰如初且盡歸侵奪地報許又論御馬監內臣宜如祖制毋監收芻豆並令戶部通知馬數杜其侵耗不從錦衣百戶張瑾率校尉支俸通倉橫取狼藉主事羅洪載欲按之瑾紿請受杖奏洪載擅笞禁衞官帝怒逮下詔獄謫外交與林俊喬宇先後論救不納御馬監閻洪乞外豹房地交言先帝以豹房故貽禍無窮洪等欲修復以開游獵之端非臣等所敢聞詔以地十頃給豹房餘令百戶趙愷等佃如故奉詔上各宮莊田數視舊籍不同帝詰其故交言舊籍多以奏請投獻數多妄報也新籍少以奉命清核田多除豁也帝意稍解令考成弘間籍以聞交年已七十連章乞罷帝輒慰留遣醫視療請益力乃許之手詔加太子太保馳驛令子編修元侍行有司時存問給食米輿隸復賜道里費卒年八十諡榮僖交言論恂恂不以勢位驕人清慎恬売心終始一致初在南京僚友以事簡多暇相率談諧飲弈為樂交默處一室讀書不輟或以為言交曰對聖賢語不愈於賓客妻妾乎興獻王素愛重交嘗割陽春臺東偏地益其宅後中官言孫尚書侵地世宗曰此先皇所賜吾敢奪耶元進士終四川副使謹厚有父風林俊字待用莆田人成化十四年進士除刑部主事進員外郎性侃直不隨俗浮湛事涉權貴尚書林聰輒屬俊治之上疏請斬妖僧繼曉並罪中貴梁芳帝大怒下詔獄考訊後府經歷張黻救之並下獄太監懷恩力救俊得謫姚州判官黻師宗知州時言路久塞兩人直聲震都下為之語曰御史在刑曹黃門出後府尋以正月朔星變帝感悟復俊官改南京弘治元年用薦擢雲南副使鶴慶玄化寺稱有活佛歲時集士女萬人爭以金塗其面俊命焚之得金悉以償民逋又毀淫祠三百六十區皆撤其材修學宮干崖土舍刀怕愈欲奪從子宣撫官劫其印數年俊檄諭之遂歸印進按察使五年調湖廣以雨雪災異上疏陳時政得失又言德安安陸建王府及增修吉府工役浩繁財費鉅萬民不堪命乞循寧襄德府故事一切省儉勿用琉璃及白石雕闌請著為例不從九年引疾不待報徑歸久之薦起廣東右布政使不拜起南京右僉都御史督操江十四年正月朔陝西山西地震水涌疏述古宮闈外戚內侍柄臣之禍乞罷齋醮減織造清役占汰宂員止工作省供應節賞賜戒逸欲遠佞幸親賢人又請豫教皇儲因薦侍郎謝鐸少卿儲瓘楊廉致仕副使曹時中處士劉閔堪輔導報聞已屢疏乞休薦時中自代不許江西新昌民王武為盜巡撫韓邦問不能靖命俊巡視身入武巢武請自効悉擒賊黨詔即以俊代邦問俊引朱熹代唐仲友包拯代宋祁事力辭不允乃更定要約庶務一新王府徵歲祿率倍取於民以俊言大減省寧王宸濠貪暴俊屢裁抑之王請易琉璃瓦費二萬俊言宜如舊毋涉叔段京鄙之求吳王几杖之賜王怒伺其過無所得會俊以聖節按部遂劾奏之停俸三月尋以母憂歸武宗即位言官交薦江西人在朝者合疏乞還俊乃進右副都御史再撫江西遭父憂不果正德四年起撫四川眉州人劉烈倡亂敗而逃諸不逞假其名剽掠俊繪形捕莫能得會保寧賊藍廷瑞鄢本恕廖惠等繼起勢益張轉寇巴州猝遇之華壟單輿抵其營譬曉利害賊羅拜約降淫雨失期復叛去攻陷通江俊擊敗之龍灘河遣知府張敏等追敗之門鎮子遂擒廖惠而廷瑞奔陝西西鄉越漢中三十六盤至大巴山官軍追及復大破之遂移師擊瀘州賊曹甫且遣人招諭甫佯聽令使弟琯劫如故指揮李蔭斬琯首賊遂移江津分七營將攻重慶俊發酉陽播州土兵助蔭以元日掩破其四營賊遁入民家焚之盡斃乘勝搗老營指揮汪洋等中伏死蔭復進去賊十五里甫以數十騎出遇蔭兵敗走官軍乘勝進圍之俘及焚死者二千有奇已本恕廷瑞為永順土舍彭世麟所擒俊論功進右都御史甫黨方四亡命思南復攻南川綦江以窺瀘州俊益發土兵令副使何珊李鉞等敗之去捷聞璽書奬勵俊在軍與總督洪鍾議多左中貴子弟欲冒從軍功輒禁止御史俞緇走避賊而僉事吳景戰歿緇慚欲委罪俊遂劾俊累報首功賊終不滅加鑿井毀寺逐僧徒迫為賊於是俊前後被切責比方四敗賊且盡俊辭加秩及賞乞以舊職歸田詔不許辭秩聽其致仕言官交請留不報俊歸士民號哭追送時正德六年十一月也世宗即位起工部尚書改刑部在道數引疾不許因請帝親近儒臣正其心以出號令用渾樸為天下先初詔所革無遷就以廢公議既抵京師會暑月經筵輟講舉祖宗勤學故事以諫俊時年已七十寓止朝房示無久居意數為帝言親大臣勤聖學辨異端節財用朝有大政必侃侃陳論中外想望其風釆中官葛景等奸利事覺為言官所糾詔下司禮監察訊俊言內臣犯法法司不得訊是宮府異體也乞下法司公訊以昭平明之治都督劉暉下獄俊當以交結朋黨律言與許泰同罪請斬以謝天下廖鵬廖鎧齊佐王瓛論死屢詔緩刑俊乞亟行誅又劾谷大用占民田萬餘頃皆不聽中官崔文家人李陽鳳索匠師宋鈺賄不獲嗾文杖之幾死下刑部治未決而中旨移鎮撫司俊留不遣力爭不納明日又奏帝怒責陳狀俊言祖宗以刑獄付法司以緝獲奸盜付鎮撫訊鞫既得猶必付法司擬罪未有奪取未定之囚反付推問者文先朝漏奸罪不容誅茲復干內降臣不忍朝廷百五十年紀綱為此輩壞亂帝憚其言直乃不問俊以耆德起田間持正不避嫌既屢見格遂乞致仕詔加太子太保給驛賜隸廩如制俊數爭大禮與楊廷和合嘗上言推尊所生有不容已之情有不可易之禮因輯堯舜至宋理宗事凡十條以上及大禮議定得罪者或杖死四年秋俊從病中上書言古者鞭撲之刑辱之而已非欲糜爛其體膚而致之死也又非所以加於士大夫也成化時臣及見廷杖二三臣率容厚棉底衣重梹疊裹然且沉臥久乃得痊正德朝逆瑾竊權始令去衣致末年多杖死臣又見成化弘治時惟叛逆妖言劫盜下詔獄始命打問他犯但言送問而已今一概打問亦非故事自去歲舊臣斥逐殆盡朝署為空乞聖明留念既去者禮致未去者慰留碩德重望如羅欽順王守仁呂柟魯鐸輩宜列置左右臣衰病待盡無復他望敢效古人遺表之意敬布犬馬之心帝但下所司而已又明年疾革復上書請懋學隆孝任賢納諫保躬導和且預辭身後卹典遂卒年七十六後一年明倫大典成追論俊附和廷和削其官其子達以士禮葬之俊歷事四朝抗辭敢諫以禮進退始終一節隆慶初復官贈少保諡貞肅達正德九年進士官至南京吏部郎中工篆籀能古文張黻吉水人成化八年進士歷知涪州宿州介特不避權貴弘治中俊蒙顯擢而黻老不用王恕為之請特予誥命金獻民字舜舉綿州人成化二十年進士除行人弘治初選授御史按雲南順天並著風裁出為天津副使歷湖廣按察使正德初劉瑾亂政追坐獻民勘天津地不實與巡撫柳應辰等械繫詔獄斥為民未幾又坐湖廣事再下獄罰贖歸踰年又以瀏陽民劉道隆獄讞不實罰米輸塞下瑾誅起貴州按察使擢僉都御史巡撫延綏歷南京刑部尚書世宗即位召為左都御史李鳳陽下刑部程貴下都察院皆改詔獄獻民力爭已遷刑部尚書執奏奸黨王欽王銓不宜貸死皆不納尋代彭澤為兵部尚書五星聚營室其占主兵獻民因請敕天下鎮巡官預守戰之備且請用賢納諫罷土木屏玩好帝頗采納獻民性伉直有執持帝或不能從卒無所徇帝初即位盡斥先朝傳奉官已太監丘福潘傑等死詔官其弟姪錦衣及司禮太監張欽死以家人李賢承廕賢死復欲官其子儒獻民先後執奏帝皆不從土魯番速檀滿速兒寇肅州命獻民兼右都御史總制陝西四鎮軍務比至蘭州巡撫陳九疇已破敵獻民再以捷聞還京仍理部事論功廕錦衣世百戶錦衣百戶俞賢中官泰養子也以中旨管事諫官爭之獻民言祖宗有舊制孝廟有禁例陛下登極有明詔賢無公家庸又非泰子姓猥以厮養竊名器紊斁典章不可之大者宜納諫官言弗聽錦衣副千戶李全王邦奇等以冒濫汰去至是奏辨不已下部覆議獻民言全等足不履行陣而坐論首功身不隸公家而躐躋顯秩陛下登極汰去者三百餘人人心稱快萬一倖端再啟則前詔皆虛將來奏擾有何紀極帝竟授全等試百戶獻民復奏曰令出惟行勿惟反今以小人奏辨一旦復官九十餘人徇左右私壞祖宗法竊為陛下惜之明旨不許夤緣管事而奔競已成風矣不許比例陳乞而奏擾已踵至矣誰生厲階至今為梗望仍斥全等以息人言消天變言官任洛等亦以為言不聽會寧夏總兵官种勛行賂京師偵事者獲其籍獻民名在焉給事蔡經御史高世魁等交章劾之獻民因引疾歸居二年邦奇訐前尚書彭澤詞連獻民逮下刑部獄法司劾獻民奉命專征未至其地掠功妄報失大臣體宜奪職閒住削其世廕詔可初大禮議起獻民數偕廷臣疏爭及左順門哭諫又與徐文華倡之帝由此不悅卒得罪隆慶初贈卹如制秦金字國聲無錫人弘治六年進士授戶部主事歷郎中正德初遷河南提學副使改右參政守開封破趙鐩於陳橋歷山東左右布政使承寇躪後與巡撫趙璜共拊循瘡痍始起九年擢右副都御史巡撫湖廣諸王府所據山場湖蕩皆奏還之官降盜賀璋羅大洪復叛討平之郴州桂陽瑤龔福全稱王金先後破砦八十餘斬首二千級擒福全及其黨劉福興等錄功增俸一級廕錦衣世百戶力辭得請入為戶部右侍郎世宗即位改吏部言官論金無人倫鑑復改戶部轉左署部事外戚邵喜乞莊田金述祖制請按治帝宥喜命都察院禁如制中旨各宮仍置皇莊遣官校分督金言西漢盛時以苑囿賦貧民今奈何剝民以益上乞勘正德間額外侵占者悉歸其主而盡撤管莊之人帝稱善即從其議嘉靖二年擢南京禮部尚書率諸臣上疏曰陛下繼統以來昭德塞違勵精圖治動無過舉宜召天和而災眚頻告者何也詩曰靡不有初鮮克有終陛下登極一詔百度咸貞天下拭目望至治比來多與詔違百司罔遵萬民失仰此詔令不能如初也即位之初逐庸回任耆舊比內閣擬旨輒中改至疏請徒答溫語此任賢不能如初也即位之初聽言如流朝請暮報比來事涉戚畹宦寺雖九卿執奏科道交章皆曰業經有旨此聽納不能如初也即位之初凡先朝傳陞乞陞等官一切釐革此來恩澤過濫封拜頻煩此慎名器不能如初也即位之初凡奸黨巨惡俱付三法司此來輒下鎮撫此謹國法不能如初也即位之初首命戶部減馬房糧芻之半且令科道官備覈馬數乃因太監閻洪等言遂寢前詔此恤民瘼不能如初也即位之初遣斥法王佛子國師禪師比來於禁地設齋醮此崇正道不能如初也即位之初精明充盛比來聖躬弗豫天顏未復此嗇精神不能如初也夫初政所以清明者政出公朝而左右不預也今政所以淆溷者政在左右而外廷不知也惟政不可一日不在朝廷惟權不可一日移於左右所謂政在朝廷者非必皆獨運也股肱有託耳目有寄即主威重於九鼎國勢安於泰山自古帝王制御天下操此術而已不則宮府之勢隔而信任有所偏婦寺之情親而聽受有所蔽名曰總攬而太阿之鐏實移於下矣章下禮部尚書汪俊力勸帝採納報聞尋就改兵部孫交去召為戶部尚書帝欲考興獻帝金偕廷臣伏闕爭又與何孟春等條張璁建議之非及上聖母冊金及趙璜等復不至帝頻詰讓金為人樂易及居官一以廉正自持在戶部尤孜孜為國永福長公主乞寶坻武清地以金言頗減撫寧山海莊地賜魏國公徐達者達卒仍歸之官定國公光祚請之金執不可給事中黃重御史張珩等先後爭金等復以為言始報許內府諸監局軍匠至數千人中官梁諫請下部採金玉珠石金皆執奏不聽奸人逯俊等乞兩淮鹽引三十萬帝許之金力爭不可積失帝旨六年春以考察自陳致仕馳驛給夫廩如制歸五年薦者不已乃起南京戶部疏陳利民六事尋召為工部尚書加太子少保帝與張孚敬李時評諸大臣以金為賢頗嫌其老居數月加太子太保改南京兵部踰歲致仕歸二十三年卒年七十八贈少保諡端敏孫柱以諸生授中書舍人大學士高拱得罪倉黃去京師門生皆避匿柱獨追送百里外吳中行疏論張居正奪情被杖下詔獄柱挾醫視湯藥遂忤居正遷魯府審理尋假考察罷之趙璜字廷實安福人少從父之官墜江中不死稍長行道上得遺金悉還其主登弘治三年進士授工部主事改兵部歷員外郎出為濟南知府猾吏舞文積歲為蠹璜擇愿民教之律令得通習者二十餘人逐吏而代之漢庶人牧場久籍於官募民佃德王府奏乞之璜勘還之民閱七年政績大著正德初擢順天府丞未上劉瑾惡璜坐巡撫朱欽事逮下詔獄除名瑾誅復職遷右僉都御史巡撫宣府尋調山東河灘地數百里賦流民墾而除其租番僧乞徵以充齋糧帝許之璜力爭得免曲阜為賊破闕里林廟在曠野璜請移縣就闕里從之擢工部右侍郎總理河道以邊警改理畿輔戎備事定命振順天諸府饑還佐部事世宗即位進左侍郎掌部事裁宦官賜葬費及御用監料價革內府酒醋麵局歲徵鐵甎價銀歲鉅萬嘉靖元年進尚書劉瑾創玄明宮糜財數十萬瑾死奸人獻為皇莊帝即位斥以予民既而中旨令仍舊璜言詔下數月而忽更示天下不信帝即報許會方修仁壽清寧宮費不繼璜因請與石景山諸房舍並斥賣以資用可無累民帝可之給事中徐景嵩等謂詔書許還民官不當自鬻劾璜璜疏辨幷發景嵩他事御史張鵬翰言璜摭言官無大臣誼帝責鵬翰黨庇景嵩竟斥其同官陳江亦以劾璜被責求去給事中章僑言璜一舉逐兩諫官甚損國體尚書彭澤復奏僑非是僑再辨帝兩解之詔營后父陳萬言第估工值六十萬璜持之萬言愬於帝下郎中員外二人詔獄璜言二臣無與乞罪臣帝不聽其後論救踵至萬言不自安再請貸二人獲釋工價亦大減三年顯陵司香內官言陵制狹小請改營視天壽山諸陵璜言陵制與山水相稱難概同帝納其言已帝欲遷顯陵璜不可乃寢詔建玉德殿景福安喜二宮璜請俟仁壽宮成徐議其事帝不許頃之以災異申前請帝始從之幷罷仁壽役江西建真人府陝西督織造皆遣中使璜皆疏爭營建世廟中官所派物料戶部多裁省帝以問璜璜言曩造乾清坤寧兩宮所積餘貲足移用帝遂報可璜為尚書六年值帝初政銳意釐剔中官不敢撓故得舉其職後論執不已諸權倖嫉者眾帝意亦寖疏璜素與秦金齊名考察自陳與金俱致仕廷臣乞留不許馳驛給夫廩如故事璜有幹局多智慮事棼錯他人相顧愕眙璜立辦既去人爭薦之十一年召復故官未上卒贈太子太保諡莊靖鄒文盛字時鳴公安人弘治六年進士除吏科給事中遼東巡撫韓重劾鎮守中官廖玘文盛偕郎中楊茂仁勘實其罪謫長陵司香𩽆顏三衞屢擾邊文盛還奏制馭六策尚書劉大夏深善之下之邊吏尋出覈兩廣糧儲思恩土官岑濬與田州岑猛搆兵文盛言田州廣西之藩蔽李蠻田州之干城參政武清受濬重賂以計殺蠻釀成禍亂制敕房供事參議岑業濬懿親為彌縫於中漏我機事請先誅二人而後行討業有內援帝不聽清尋以考察罷正德初歷戶科都給事中出為保定知府累遷福建左布政使十一年以右副都御史巡撫貴州清平苗阿旁阿階阿革稱王巡撫曹祥調永順保靖土兵討之尋被劾罷阿旁等據香爐山興隆偏橋平越新添龍里諸衞咸被其患文盛至檄川湖兵協剿以貴州兵擣礮木砦擒阿革川湖兵至抵山下山壁立惟小徑五賊皆樹柵仰攻不能克乃製戰樓與崖齊乘夜雨附崖登拔柵焚廬舍賊奔後山據絕頂官軍乘間梯籐木以上遂擒阿旁餘賊盡平移師討平龍頭都黎都蘭都蓬密西大支馬羅諸砦黑苗先後斬降無算錄功增俸一等廕子錦衣世百戶力辭免芒部陳聰等為亂討破之四川土舍重安馮綸與凱里楊弘有怨弘卒綸糾緒苗相讐殺侵軼貴州境文盛遣參議蔡潮詣播州督宣慰楊斌撫定之請復設安寧宣撫司以弘子襲而錄潮功尚書王瓊以專擅為潮罪不頃之改蒞南京都察院世宗即位召為戶部左右侍郎遷南京右都御史就改戶部尚書嘉靖六年戶部尚書秦金罷召文盛代之首疏鹽政錢法十一事文盛為人廉謹踆若無能與孫交秦金趙璜咸稱長者歲餘以年至再疏乞歸卒贈太子少保諡莊簡梁材字大用南京金吾右衞人弘治十二年進士授德清知縣勤敏有異政正德初遷刑部主事改御史出為嘉興知府調杭州田租例參差材為酌輕重立畫一之法遷浙江右參政進按察使鎮守中官畢真與宸濠通將舉城應之材與巡按張縉劫持真奪其兵衞尋以憂去嘉靖初起補雲南土官相讐殺累年材召其酋曰汝罪當死今貰汝以牛羊贖御史訝其輕材曰如是足矣急之變生諸酋衷甲待變聞無他廼止歷貴州廣東左右布政使吏民輸課令自操權衡吏不得預時天下布政使廉名最著者二人材與姚鏌也六年拜右副都御史巡撫江西甫兩月召為刑部左侍郎尋改戶部遂代鄒文盛為尚書自外僚登六卿不滿二載自以受恩深益盡職上言臣考去年所入止百三十萬兩而所出至二百四十萬加催徵不前邊費無節凶荒又多奏免國計安所辦詳求弊端一宗藩二武職三宂食四宂費五逋負乞集廷臣計畫條請於是宗藩武職各議上三事其他皆嚴為節帝悉報可惟武職閒住者議停半俸帝不納經費大省國用亦充中官麥福請盡徵牧馬草場租材不可侍郎王軏清勳戚莊田言宜量等級為限材奏成周班祿有土田祿由田出非常祿外復有土田今勳戚祿已踰分而陳乞動千萬請申禁之自特賜外量存三之一以供祀事帝命並清已賜者額外侵據悉還之民勢豪家乃不敢妄請乞畿輔屯田御史督理正統間易以僉事權輕屯政日弛材請仍用御史御史郭弘化言天下土田視國初減半宜通行清丈材恐紛擾請但敕所司清釐籍難稽者始履畝而丈帝悉可之母喪去服除起故官大同巡撫樊繼祖請益軍餉材言大同歲餉七十七萬有奇例外解發又累萬較昔已數倍日益月增太倉銀不足供一鎮無論九邊也繼祖數請不得議開事例下戶兵二部行之時修建兩宮七陵役京軍七萬郭勛請給月糧冬衣材言非故事如所請當歲費銀四十五萬且冬衣例取內庫非部事勛怒劾材悞公帝詰責材竟如勛奏勛復建言三事請開礦助工餘鹽盡輸邊漕卒得攜貨物材議不盡行勛益怒材初為戶部值帝勤政力祛宿弊多見從及是屢忤權倖不得志乃乞改南為給事中周珫所劾下吏部尚書許讚等請留之帝不悅令與材俱對狀材引罪得宥而讚等坐奪俸材由此失帝意考尚書六年滿遂令致仕初徽王守莊者與佃人訟材請革守莊者令有司納租於王報可王奏不便帝又從之材已去侍郎唐冑等執初詔帝大怒幷責材令以右侍郎閒住而奪冑俸下郎官詔獄明年戶部尚書李廷相罷帝念材廉勤大臣亦多薦者乃召復故官加太子少保三掌國計砥節守公如一日帝眷亦甚厚其秋考察京官特命監之有大獄不能決又命兼掌刑部事帝歎曰尚書得如材者十二人吾無憂天下矣大工頻興役外衞班軍四萬六千人郭勛籍其不至者責輸銀雇役廩食視班軍廷相嘗量給之材堅持不予勛劾材帝命補給勛又以軍不足籍逃亡軍布棉折餉銀募工材言今京班軍四萬餘已足用不宜藉口耗國儲帝從其奏勛益怒劾材變亂舊章先是醮壇須龍涎香材不以時進帝銜之遂責材沽名誤事落職閒住歸旋卒年七十一隆慶初贈太子太保諡端肅當嘉靖中歲大臣或阿上取寵材獨不撓以是終不容自材去邊儲國用大窘世宗乃歎曰材在當不至此劉麟字元瑞本安仁人世為南京廣洋衞副千戶因家焉績學能文與顧璘徐禎卿稱江東三才子弘治九年成進士言官龐泮等下獄麟偕同年生陸崑抗疏救除刑部主事進員外郎錄囚畿內平反三百九十餘人正德初進郎中出為紹興府知府劉瑾銜麟不謁謝甫五月摭前錄囚細故罷為民士民醵金贐不受為建小劉祠以配漢劉寵因寓湖州與吳琬施侃孫一元龍霓為湖南五隱瑾誅起補西安遭父憂樂吳興山水奉父柩葬焉遂居湖州起陝西左參政督糧儲都御史鄧璋督師議加賦充餉麟力爭會陝民詣闕愬得寢尋遷雲南按察使謝病歸嘉靖初召拜太僕卿進右副都御史巡撫保定六府中官耿忠守備紫荊多縱麟劾奏之請捐天津三衞屯田課及出庫儲給河間三衞軍月餉徵逋課以償皆報可帝因諭戶部中外軍餉未給者悉補給之再引疾歸起大理卿拜工部尚書侍衞軍不給衣履錦衣帥駱安援紅盔軍例以請麟執不可詔量給銀自製後五載一給為常四司財物悉貯後堂大庫司官出納多侵漁麟請特除一郎官主之帝稱善因賜名節慎庫已上節財十四事汰內府諸監局冒破錢中貴大恨及顯陵工竣執役者咸覬官麟止擬賚羣小愈怨會帝納諫官言停中外雜派工役麟牒停浙江蘇松織造而上供袍服在停中中官吳勳以為言遂勒麟致仕久之顯陵殿閣雨漏追論麟落職麟清修直節當官不撓居工部為朝廷惜財謹費僅踰年而罷居郊外南坦賦詩自娛守為築一臺令為搆堂始有息游之所家居三十餘年廷臣頻論薦晚好樓居力不能搆懸籃輿於梁曲臥其中名曰神樓文徵明繪圖遺之年八十七卒贈太子少保諡清惠蔣瑤字粹卿歸安人弘治十二年進士授行人正德時歷兩京御史陳時弊七事中言內府軍器局軍匠六千中官監督者二人今增至六十餘人人占軍匠三十他局稱是行伍安得不耗幷言傳奉官及濫收校尉勇士並宜釐革劉瑾雖誅權猶在宦豎有旨詰問且言自今如瑤議者毋覆奏尋出為荊州知府築黃潭隄調揚州武宗南巡至揚瑤供御取具而已無所贈遺諸嬖倖皆怒江彬欲奪富民居為威武副將軍府瑤執不可彬閉瑤空舍挫辱之脅以帝所賜銅瓜不為懾會帝漁獲一巨魚戲言直五百金彬即畀瑤責其直瑤懷其妻簪珥袿服以進曰庫無錢臣所有惟此帝笑而遣之府故有瓊花觀詔取瓊花瑤言自宋徽欽北狩此花已絕今無以獻又傳旨徵異物瑤具對非揚產帝曰苧白布亦非揚產耶瑤不得已為獻五百疋當是時權倖以揚繁華要求無所不至微瑤民且重困駕旋瑤扈至寶應中官丘得用鐵絙繫瑤數日始釋竟扈至臨清而返揚人見瑤無不感泣迨遷陝西參政爭出貲建祠祀之名自此大震嘉靖初歷湖廣江西左右布政使以右副都御史巡撫河南帝命桂萼等覈巡撫官去留令瑤歸候調已累遷工部尚書四郊工竣加太子少保西苑宮殿成帝置宴見瑤與王時中席在外命移殿內而移皇親於殿右以讓瑤曰親親不如尊賢其重瑤如此時土木繁興歲費數百萬計瑤規畫咸稱帝意數有賚予以憂去久之自南京工部尚書召改北部帝幸承天瑤扈從京師營建率役京軍多為豪家占匿至是大工頻仍歲募民充役費二百餘萬瑤以為言因請停不急者豪家所匿軍畢出募直大減以老致仕去瑤端亮清介既歸僻處陋巷與尚書劉麟顧應祥輩結文酒社徜徉峴山間卒年八十九贈太子太保諡恭靖王廷相字子衡儀封人幼有文名登弘治十五年進士選庶吉士授兵科給事中以憂去正德初服闋至京劉瑾中以罪謫亳州判官量移高淳知縣召為御史疏言大盜四起將帥未能平由將權輕不能禦敵兵機疏不能扼險也盜賊所至鄉民奉牛酒甚者為効力盜有生殺權而將帥反無之故兵不用命宜假便宜退却者必斬河南地平曠賊易奔山西地險阻亦縱深入將帥罪也若陳兵黃河之津使不得西分扼井陘天井使不得東而主將以大軍蹙之則賊進退皆窮可不戰擒矣帝切責總督諸臣悉從其議已出按陝西裁抑鎮守中官廖堂被誣時已改督京畿學校逮繫詔獄謫贛榆丞屢遷四川僉事山東副使皆提督學校嘉靖二年舉治行卓異再遷山東右布政使以右副都御史巡撫四川討平芒部賊沙保尋召理院事歷兵部左右侍郎遷南京兵部尚書參贊機務初有詔省進貢快船守備太監賴義復求增廷相請酌物輕重以定船數而大減宣德以後傳旨非祖制者龍江大勝新江浦子江淮五關守臣藉稽察榷利安慶九江藉春秋閱視索賂廷相皆請革之草場蘆課銀率為中官楊奇卜春及魏國公徐鵬舉所侵蝕以廷相請逮問奇春奪鵬舉祿三月入為左都御史疏言南京守備權太重不宜令魏國世官給事中曾忭亦言之遂解鵬舉兵柄居二年加兵部尚書兼前官提督團營仍理院事兩考滿加太子少保畿民盜天壽山陵樹巡按楊紹芳引盜大祀神御物律斬廷相言大祀神御物者指神御在內祭器帷帳之物而言律文盜陵木者止杖一百徒三年今舍本律非刑之平忤旨罰俸一月帝將幸承天廷相與諸大臣諫不納扈從還以九年滿加太子太保雷震奉先殿廷相言人事修而後天道順大臣法而後小臣廉今廉隅不立賄賂盛行先朝猶暮夜之私而今則白日之攫大臣污則小臣悉傚京官貪則外臣無畏臣職憲紀不能絕其弊乞先罷斥用以刺尚書嚴嵩張瓚輩帝但諭留而已初廷相請以六條考察差還御史帝令疏其所未盡編之憲綱乃取張孚敬汪鋐所奏列及新所定凡十五事以進悉允行之及九廟災下詔修省因敕廷相曰御史巡方職甚重卿總憲有年自定六條後不考黜一人今宜痛修省廷相惶恐謝廷相掌內臺最久有威重督團營與郭勛共事逡巡其間不能有所振飭給事中李鳳來等論權貴奪民利章下都察院廷相檄五城御史覈實遲四十餘日給事中章允賢遂劾廷相徇私慢上帝方詰責而廷相以御史所覈聞惟郭勛侵最多帝令勛自奏於是劾勛者羣起勛復以領敕稽留觸帝怒下獄責廷相朋比阿黨斥為民越三年卒廷相博學好議論以經術稱於星曆輿圖樂律河圖雒書及周邵程張之書皆有所論駁然其說頗乖僻隆慶初復官贈少保諡肅敏贊曰喬宇守南京從容鎮靜內嚴警備可謂能當大事者矣觀宇與孫交等砥節奉公懇懇廷諍意在杜塞倖門裨益國是雖得君行政未能媲美蹇夏要其清嚴不苟行無瑕尤於前人亦不多讓蔣瑤為尚書功名損於治郡王廷相掌內臺風力未著是殆其時為之歟
