body:
  text: 明史卷九十一志第六十七兵三邊防海防江防民壯土兵鄉兵元人北歸屢謀興復永樂遷都北平三面近塞正統以後敵患日多故終明之世邊防甚重東起鴨綠西抵嘉峪綿亙萬里分地守禦初設遼東宣府大同延綏四鎮繼設寧夏甘肅薊州三鎮而太原總兵治偏頭三邊制府駐固原亦稱二鎮是為九邊初洪武六年命大將軍徐達等備山西北平邊諭令各上方略從淮安侯華雲龍言自永平薊州密雲迤西二千餘里關隘百二十有九皆置戍守於紫荊關及蘆花嶺設千戶所守禦又詔山西都衞於雁門關太和嶺幷武朔諸山谷間凡七十三隘俱設戍兵九年敕燕山前後等十一衞分兵守古北口居庸關喜峰口松亭關烽堠百九十六處參用南北軍士十五年又於北平都司所轄關隘二百以各衞卒守戍詔諸王近塞者每歲秋勒兵巡邊十七年命徐達籍上北平將校士卒復命將覈遼東定遼等九衞官軍是後每遣諸公侯校沿邊士馬以籍上二十年置北平行都司於大寧其地在喜峰口外故遼西郡遼之中京大定府也西大同東遼陽南北平馮勝之破納哈出還師城之因置都司及營州五屯衞而封皇子權為寧王調各衞兵往守先是李文忠等取元上都設開平衞及興和等千戶所東西各四驛東接大寧西接獨石二十五年又築東勝城於河州東受降城之東設十六衞與大同相望自遼以西數千里聲勢聯絡建文元年文帝起兵襲陷大寧以寧王權及諸軍歸及即位封寧王於江西而改北平行都司為大寧都司徙之保定調營州五屯衞於順義薊州平谷香河三河以大寧地畀兀良哈自是遼東與宣大聲援阻絕又以東勝孤遠難守調左衞於永平右衞於遵化而墟其地先是興和亦廢開平徙於獨石宣府遂稱重鎮然帝於邊備甚謹自宣府迤西迄山西緣邊皆峻垣深濠烽堠相接隘口通車騎者百戶守之通樵牧者甲士十人守之武安侯鄭亨充總兵官其敕書云各處烟墩務增築高厚上貯五月糧及柴薪藥弩墩傍開井井外圍牆與墩平外望如一重門禦暴之意常也洪熙改元朔州軍士白榮請還東勝高山等十衞於故地興州軍士范濟亦言朔州大同開平宣府大寧皆藩籬要地其土可耕宜遣將率兵修城堡廣屯種皆不能用正統元年給事中朱純請修塞垣總兵官譚廣言自龍門至獨石及黑峪口五百五十餘里工作甚難不若益墩臺瞭守乃增赤城等堡烟墩二十二寧夏總兵官史昭言所轄屯堡俱在河外自河迤東至察罕腦兒抵綏德州沙漠曠遠並無守備請於花馬池築哨馬營大同總兵官方政繼以馬營請欲就半嶺紅寺兒廢營修築宣大巡撫都御史李儀以大同平衍巡哨宜謹請以副總兵主東路參將主西路而迤北則屬之總兵官都指揮並如議行後三年詔塞紫荊關諸隘口增守備軍時瓦剌漸強從成國公朱勇請也既而也先入塞英宗陷於土木景帝即位十餘年間邊患日多索來毛里孩阿羅出之屬相繼入犯無寧歲成化元年延綏總兵官張傑言延慶等境廣袤千里所轄二十五營堡每處僅一二百人難以應敵宜選精銳九千為六哨分屯府谷神木二縣龍州榆林二城高家安邊二堡庶緩急有備又請分布鄜慶防秋軍二千餘人於沿邊要害從之七年延綏巡撫都御史余子俊大築邊城先是東勝設衞守在河外榆林治綏德後東勝內遷失險捐米脂魚河地幾三百里正統間鎮守都督王禎始築榆林城建緣邊營堡二十四歲調延安綏德慶陽三衞軍分戍天順中阿羅出入河套駐牧每引諸部內犯至是子俊乃徙治榆林由黃甫川西至定邊營千二百餘里墩堡相望橫截套口內復塹山堙谷曰夾道東抵偏頭西終寧固風土勁悍將勇士力北人呼為駝城十二年兵部侍郎滕昭英國公張懋條上邊備言居庸關黃花鎮喜峰口古北口燕河營有團營馬步軍萬五千人戍守請益軍五千分駐永平密雲以策應遼東涼州鎮番莊浪賀蘭山迤西從雪山過河南通靖虜直至臨鞏俱敵入犯之路請調陝西官軍益以甘涼臨鞏秦平河洮兵戍安定會寧遇警截擊以涼州銳士五千扼要屯駐彼此策應詔可二十一年敕各邊軍士每歲九月至明年三月俱常操練仍以操過軍馬及風雪免日奏報邊備頗修飭弘治十四年設固原鎮先是固原為內地所備惟靖虜及火篩入據河套遂為敵衝乃改平涼之開成縣為固原州隸以四衞設總制府總陝西三邊軍務是時陝邊惟甘肅稍安而哈密屢為土魯番所擾乃敕修嘉峪關正德元年春總制三邊都御史楊一清請復守東勝因河為固東接大同西屬寧夏使河套千里沃壤歸我耕牧則陝右猶可息肩因上修築定邊營等六事帝可其奏旋以忤中官劉瑾罷所築塞垣僅四十餘里而已武宗好武邊將江彬等得幸遼東宣府大同延綏四鎮軍多內調又以京軍六千與宣府軍六千春秋番換十三年頒定宣大延綏三鎮應援節度敵不渡河則延綏聽調於宣大渡河則宣大聽調於延綏從兵部尚書王瓊議也初大寧之棄以其地畀𩽆顏福餘泰寧三衞蓋兀良哈歸附者也未幾遂不靖宣宗嘗因田獵親率師敗之自是畏服故喜峰密雲止設都指揮鎮守土木之變頗傳三衞助逆後因添設太監參將等官至是𩽆顏獨盛情叵測嘉靖初御史丘養浩請復小河等關於外地以扼其要又請多鑄火器給沿邊州縣募商糴粟實各邊衞所詔皆行之初太祖時以邊軍屯田不足召商輸邊粟而與之鹽富商大賈悉自出財力募民墾田塞下故邊儲不匱弘治時戶部尚書葉淇始變法令商納銀太倉分給各邊商皆撤業歸邊地荒蕪米粟踊貴邊軍遂日困十一年御史徐汝圭條上邊防兵食謂延綏宜漕石州保德之粟自黃河而上楚粟由鄖陽汴粟由陝洛沔粟由漢中以達陝右宣大產二麥宜多方收糴紫荊倒馬白羊等關宜招商賃車運又請以宣府遊兵駐右衞懷來以援大同選補遊兵於順聖西城為臨期應援永寧等處游兵衞宣府備調遣直隸八府召募勇敢團練赴邊關遠近警急榆林山陝遊兵於本處策應報可亦未能行也十八年移三邊制府鎮花馬池是時俺答諸部強橫屢深入大同太原之境晉陽南北烟火蕭然巡撫都御史陳講請以兵六千戍老營堡東界之長峪以山西兵守大同三關形勢寧武為中路莫要於神池偏頭為西路莫要於老營堡皆宜改設參將雁門為東路莫要於北樓諸口宜增設把總指揮而移神池守備於利民堡老營堡遊擊於八角所各增軍設備帝悉許之規畫雖密然兵將率怯弱其健者僅能自守而已二十二年詔宣府兵乘塞舊制總兵夏秋間分駐邊堡謂之暗伏至是有司建議入秋悉令赴邊分地拒守至九月中罷歸犒以帑金久之以勞費罷二十四年巡按山西御史陳豪言敵三犯山西傷殘百萬費餉銀六十億曾無尺寸功請定計決戰盡復套地明年敵犯延安總督三邊侍郎曾銑力主復套條上十八事帝嘉奬之大學士嚴嵩窺帝意憚兵且欲殺舊閣臣夏言因劾銑幷言誅死自是無敢言邊事者二十九年俺答攻古北口從間道黃榆溝入直薄東直門諸將不敢戰敵退大將軍仇鸞力主貢市之議明年開馬市於大同然寇掠如故又明年馬市罷先是翁萬達之總督宣大也籌邊事甚悉其言曰山西保德州河岸東盡老營堡凡二百五十四里西路丫角山迤北而東歷中北路抵東路之東陽河鎮口臺凡六百四十七里宣府西路西陽河迤東歷中北路抵東路之永寧四海冶凡一千二十三里皆逼臨巨寇險在外者所謂極邊也老營堡轉南而東歷寧武雁門北樓至平刑關盡境約八百里又轉南而東為保定界歷龍泉倒馬紫荊吳王口插箭嶺浮圖峪至沿河口約一千七十餘里又東北為順天界歷高崖白羊抵居庸關約一百八十餘里皆峻嶺層岡險在內者所謂次邊也敵犯山西必自大同入紫荊必自宣府未有不經外邊能入內邊者乃請修築宣大邊牆千餘里烽堠三百六十三所後以通市故不復防遂半為敵毀至是兵部請敕邊將修補科臣又言垣上宜築高臺建廬以栖火器從之時俺答益強𩽆顏三衞為之嚮道遼薊宣大連歲被兵三十四年總督軍務兵部尚書楊博既解大同右衞圍因築牛心諸堡修烽堠二千八百有奇宣大間稍寧息而薊鎮之患不已薊之稱鎮自二十七年始時鎮兵未練因詔各邊入衞兵往戍既而兵部言大同之三邊陝西之固原宣府之長安嶺延綏之夾牆皆據重險惟薊獨無渤海所南山陵東有蘇家口至寨籬村七十里地形平漫宜築牆建臺設兵守與京軍相夾制報可時兵力孱弱有警徵召四集而議者惟以據險為事無敢言戰者其後薊鎮入衞兵俱聽宣大督撫調遣防禦益疏𩽆顏遂乘虛歲入三十七年諸鎮建議各練本鎮戍卒可省徵發費十之六然戍卒選懦不任戰歲練亦費萬餘而臨事徵發如故隆慶間總兵官戚繼光總理薊遼任練兵事因請調浙兵三千人以倡勇敢及至待命於郊自朝至日中天雨軍士跬步不移邊將大駭自是薊兵以精整稱俺答已通貢封順義王其子孫襲封者累世迨萬曆之季西部遂不競而土蠻部落虎燉兔炒花宰賽煖兔輩東西煽動將士疲於奔命未嘗得安枕也初太祖沿邊設衞惟土著兵及有罪謫戍者遇有警調他衞軍往戍謂之客兵永樂闁始命內地軍番戍謂之邊班其後占役逃亡之數多乃有召募有改撥有修守民兵土兵而邊防日益壞洪武時宣府屯守官軍殆十萬正統景泰間已不及額弘治正德以後官軍實有者僅六萬六千九百有奇而召募與土兵居其半他鎮率視此正統初山西河南班軍守偏頭大同宣府塞不得代巡撫于謙言每歲九月至二月水冷草枯敵騎出沒乘障卒宜多若三月至八月邊守自足乞將兩班軍每歲一班如期放遣甘肅總兵官蔣貴又言沿邊墩臺守瞭軍更番有例惟坐事謫發者不許困苦甚乞如例踐更並從之五年山西總兵官李謙請偏頭關守備軍如大同例半歲更番部議每番皆十月而戍卒仍率以歲為期有久而後遣者弘治中三邊總制秦紘言備禦延綏官軍自十二月赴邊既周一歲至次年二月始得代在軍日多請歲一更上下俱在三月初邊軍便之嘉靖四十三年巡撫延綏胡志夔請免戍軍三年每軍徵銀五兩四錢為募兵用至萬曆初大同督撫方逢時等請修築費詔以河南應戍班軍自四年至六年概免盡扣班價發給謂之折班班軍遂耗久之所徵亦不得寧山南陽潁上三衞積逋延綏鎮折班銀至五萬餘兩是後諸邊財力俱盡敝極矣初邊政嚴明官軍皆有定職總兵官總鎮軍為正兵副總兵分領三千為奇兵遊擊分領三千往來防禦為遊兵參將分守各路東西策應為援兵營堡墩臺分極衝次衝為設軍多寡平時走陣哨探守瞭焚荒諸事無敢惰稍違制輒按軍法而其後皆廢壞云沿海之地自廣東樂會接安南界五千里抵閩又二千里抵浙又二千里抵南直隸又千八百里抵山東又千二百里踰寶坻盧龍抵遼東又千三百餘里抵鴨綠江島寇倭夷在在出沒故海防亦重吳元年用浙江行省平章李文忠言嘉興海鹽海寧皆設兵戍守洪武四年十二月命靖海侯吳禎籍方國珍所部溫台慶元三府軍士及蘭秀山無田糧之民凡十一萬餘人隸各衞為軍且禁沿海民私出海時國珍及張士誠餘衆多竄島嶼間勾倭為寇五年命浙江福建造海舟防倭明年從德慶侯廖永忠言命廣洋江陰橫海水軍四衞增置多櫓快船無事則巡徼遇寇以大船薄戰快船逐之詔禎充總兵官領四衞兵京衞及沿海諸衞軍悉聽節制每春以舟師出海分路防倭迄秋乃還十七年命信國公湯和巡視海上築山東江南北浙東西沿海諸城後三年命江夏侯周德興抽福建福興漳泉四府三丁之一為沿海戍兵得萬五千人移置衞所於要害處築城十六復置定海盤石金鄉海門四衞於浙金山衞於松江之小官場及青村南匯嘴城二千戶所又置臨山衞於紹興及三山瀝海等千戶所而寧波溫台並海地先已置八千戶所曰平陽三江龍山霩大松錢倉新河松門皆屯兵設守二十一年又命和行視閩粵築城增兵置福建沿海指揮使司五曰福寧鎮東平海永寧鎮海領千戶所十二曰大金定海梅花萬安莆禧崇武福全金門高浦六鰲銅山玄鍾二十三年從衞卒陳仁言造蘇州太倉衞海舟旋令濱海衞所每百戶及巡檢司皆置船二巡海上盜賊後從山東都司周彥言建五總寨於寧海衞與萊州衞八總寨共轄小寨四十八已復命重臣勳戚魏國公徐輝祖等分巡沿海帝素厭日本詭譎絕其貢使故終洪武建文世不為患永樂六年命豐城侯李彬等緣海捕倭復招島人蜑戶賈豎漁丁為兵防備益嚴十七年倭寇遼東總兵官劉江殲之於望海堝自是倭大懼百餘年間海上無大侵犯朝廷閱數歲一令大臣巡警而已至嘉靖中倭患漸起始設巡撫浙江兼管福建海道提督軍務都御史已改巡撫為巡視未幾倭寇益肆乃增設金山參將分守蘇松海防尋改為副總兵調募江南北徐邳官民兵充戰守而杭嘉湖亦增參將及兵備道三十三年調撥山東民兵及青州水陸槍手千人赴淮揚聽總督南直軍務都御史張經調用時倭縱掠杭嘉蘇松踞柘林城為窟穴大江南北皆被擾監司任環敗之經亦有王家涇之捷乃遁出海復犯蘇州於是南京御史屠仲律言五事其守海口云守平陽港黃花澳據海門之險使不得犯溫台守寧海關湖頭灣遏三江之口使不得窺寧紹守鱉子門乍浦峽使不得近杭嘉守吳淞劉家河七丫港使不得掩蘇松且宜修飭海舟大小相比或百或五十聯為一募慣習水工領之而充以原額水軍於諸海口量緩急置防部是其議未幾兵部亦言浙直通泰間最利水戰往時多用沙船破賊請厚賞招徠之防禦之法守海島為上宜以太倉崇明嘉定上海沙船及福倉東莞等船守普陀大衢陳錢山乃浙直分路之始狼福二山約束首尾交接江洋亦要害地宜督水師固守報可已復令直隸吳淞江劉家河福山港鎮江圌山五總添設遊兵聽金山副總兵調度時胡宗憲為總督誅海賊徐海汪直直部三千人復勾倭入寇閩廣益騷三十七年都御史王詢請分福建之福興為一路領以參將駐福寧水防自流江烽火門俞山小埕至南日山漳泉為一路領以參將駐詔安水防自南日山至浯嶼銅山玄鍾走馬溪安邊館水陸兵皆聽節制福建省城介在南北去海僅五十里宜更設參將選募精銳部領哨船與主客兵相應援部覆從之廣東惠潮亦增設參將駐揭陽福建巡撫都御史游震得言浙江溫處與福寧接壤倭所出沒宜進戚繼光為副總兵守之而增設福寧守備隸繼光漳州之月港亦增設守備隸總兵官俞大猷延建邵為八閩上游宜募兵以備緩急皆允行既而宗憲被逮罷總督官以浙江巡撫趙炳然兼任軍事炳然因請令定海總兵屬浙江金山總兵屬南直俱兼理水陸軍務互相策應其後莆田倭寇平乃復五水寨舊制五寨者福寧之烽火門福州之小埕澳興化之南日山泉州之浯嶼漳州之西門澳亦曰銅山景泰三年鎮守尚書薛希璉奏建者也後廢至是巡撫譚綸疏言五寨守扼外洋法甚周悉宜復舊以烽火門南日浯嶼三為正兵銅山小埕二為游兵寨設把總分汛地明斥堠嚴會哨改三路參將為守備分新募浙兵為二班各九千人春秋番上各縣民壯皆補用精悍每府領以武職一人兵備使者以時閱視帝皆是之狼山故設副總兵至是改為鎮守總兵官兼轄大江南北迨隆慶初倭漸不為患而諸小寇往往有之萬曆三年設廣東南澳總兵官以其據漳泉要害也久之倭寇朝鮮朝廷大發兵往援先後六年於是設巡撫官於天津防畿甸後十餘年從南直巡按御史顏思忠言分淮安大營兵六百守廖角嘴從福建巡撫丁繼嗣言設兵自浙入閩之三江及劉澳而易海澄團練營土著軍以浙兵天啟中築城於澎湖設遊擊一把總二統兵三千築礮臺以守先是萬曆中許孚遠撫閩奏築福州海壇山因及澎湖諸嶼且言浙東沿海陳錢金塘玉環南麂諸山俱宜經理遂設南麂副總兵而澎湖不暇及其地遙峙海中逶迤如修蛇多岐港零嶼其中空闊可藏巨艘初為紅毛所據至是因巡撫南居益言乃奪而守之自世宗世倭患以來沿海大都會各設總督巡撫兵備副使及總兵官參將遊擊等員而諸所防禦於廣東則分東中西三路設三參將於福建則有五水寨於浙則有六總一金鄉盤石二衞一松門海門二衞一昌國衞及錢倉爵溪等所一定海衞及霩大嵩等所一觀海臨山二衞一海寧衞分統以四參將於南直隸則乍浦以東金山衞設參將黃浦以北吳淞江口設總兵於淮揚則總兵駐通州遊擊駐廟灣又於揚州設陸兵遊擊待調遣於山東則登萊青三府設巡察海道之副使管理民兵之參將總督沿海兵馬備倭之都指揮於薊遼則大沽海口宿重兵領以副總兵而以密雲永平兩遊擊為應援山海關外則廣寧中前等五所兵守各汛以寧前參將為應援而金復海蓋諸軍皆任防海三岔以東九聯城外創鎮江城設遊擊統兵千七百哨海上北與寬奠參將陸營相接共計凡七鎮而守備把總分守巡徼會哨者不下數百員以三四五月為大汛九十月為小汛蓋遭倭甚毒故設防亦最密云日本地與閩相值而浙之招寶關其貢道在焉故浙閩為最衝南寇則廣東北寇則由江犯留都淮揚故防海外防江為重洪武初於都城南新江口置水兵八千已稍置萬二千造舟四百艘又設陸兵於北岸浦子口相掎角所轄沿江諸郡上自九江廣濟黃梅下抵蘇松通泰中包安慶池和太平凡盜賊及販私鹽者悉令巡捕兼以防倭永樂時特命勳臣為帥視江操其後兼用都御史成化四年從錦衣衞僉事馮瑤言令江兵依地設防於瓜儀太平置將領鎮守後六年守備定西侯蔣琬奏調建陽鎮江諸衞軍補江兵缺伍十三年命擇武大臣一人職江操毋攝營務又五年從南京都御史白昂言敕沿江守備官互相應援幷給關防著為令弘治中命新江口兩班軍如京營例首班歇即以次班操嘉靖八年江陰賊侯仲金等作亂給事中夏言請設鎮守江淮總兵官已而寇敕提督沿江上下後復裁罷三十二年倭患熾復設副總兵於金山衞轄沿海至鎮江與狼山副總兵水陸相應時江北俱被倭於是量調九江安慶官軍守京口圌山等地久之給事中范宗吳言故事操江都御史防江應鳳二巡撫防海後因倭警遂以鎮江而下通常狼福諸處隸之操江以故二撫臣得諉其責操江又以向非本屬兵難遙制亦漠然視之非委任責成意宜以圌山三江會口為操撫分界報可其後增上下兩江巡視御史得舉劾有司將領而以南京僉都御史兼理操江不另設先是增募水兵六千隆慶初以都御史吳時來請留四之一餘悉罷遣幷裁中軍把總等官已復令分汛設守而責以上下南北互相策應又從都御史宋儀望言諸軍皆分駐江上不得居城市萬曆二十年以倭警言者請復設京口總兵南京兵部尚書衷貞吉等謂既有吳淞總兵不宜兩設乃設兵備使者每春汛調備倭都督統衞所水陸軍赴鎮江後七年操江耿定力奏長江千餘里上江列營五兵備臣三下江列營五兵備臣二宜委以簡閱訓練即以精否為兵備殿最部議以為然故事南北總哨官五日一會哨於適中地將領官亦月兩至江上會哨其後多不行崇禎中復以勳臣任操江偷惰成習會哨巡徼皆虛名非有實矣衞所之外郡縣有民壯邊郡有土兵太祖定江東循元制立管領民兵萬戶府後從山西行都司言聽邊民自備軍械團結防邊閩浙苦倭指揮方謙請籍民丁多者為軍尋以為患鄉里詔閩浙互徙時已用民兵然非召募也正統二年始募所在軍餘民壯願自效者陝西得四千二百人人給布二匹月糧四斗景泰初遣使分募直隸山東山西河南民壯撥山西義勇守大同而紫荊倒馬二關亦用民兵防守事平免歸成化二年以邊警復二關民兵敕御史往延安慶陽選精壯編伍得五千餘人號曰土兵以延綏巡撫盧祥言邊民驍果可練為兵使護田里妻子故有是命弘治七年立僉民壯法州縣七八百里以上里僉二人五百里三三百里四百里以上五有司訓練遇警調發給以行糧而禁役占放買之弊富民不願則上直於官官自為募或稱機兵在巡檢司者稱弓兵後以越境防冬非計大同巡撫劉宇請免其班操徵銀糧輸大同而以威遠屯丁舍餘補役給事中熊偉亦請編應募民於附近衞所並從之十四年以西北諸邊所募土兵多不足五千遣使齎銀二十萬及太僕寺馬價銀四萬往募指揮千百戶以募兵多寡為差得遷級失官者得復職即令統所募兵既而兵部議覆侍郎李孟暘請實軍伍疏謂天下衞所官軍原額二百七十餘萬歲久逃故嘗選民壯三十餘萬又覈衞所舍人餘丁八十八萬西北諸邊召募土兵無慮數萬請如孟暘奏察有司不操練民壯私役雜差者如役占軍人罪報可正德中流賊擾山東巡撫張鳳選民兵令自買馬團操民不勝其擾兵部侍郎楊潭以為言都御史甯杲所募多無賴子為御史張璿所劾嘉靖二十二年增州縣民壯額大者千人次六七百小者五百二十九年京師新被寇議募民兵以二萬為率歲四月終赴近京防禦後五年兵部尚書楊博請汰老弱存精銳在外者發各道為民兵在京者隸之巡捕參將逃者不補帝以影占數多耗糧無用遣官覈宜罷宜還者以聞隆慶中張居正陳以勤復請籍畿甸民兵謂直隸八府人多健悍總按戶籍除單丁老弱者父子三人籍一子兄弟三人籍一弟州與大縣可得千六百人小縣可得千人中分之為正兵奇兵登名尺籍隸撫臣操練歲無過三月月無過三次練畢即令歸農復其身歲操外不得別遣命所司議行然自嘉靖後山東河南民兵戍薊門者率徵銀以充召募至萬曆初山東徵銀至五萬六千兩貧民大困治河之役給事中張貞觀請益募土兵捍淮揚徐邳畿南盜起給事中耿隨龍請復民壯舊制專捕賊盜播州之亂工部侍郎趙可懷請練土著兵部因言天下之無兵者不獨蜀也各省官軍民壯皆宜罷老稚易以健卒軍操屬印官操官民操屬正官捕官郡守監司不得牽制立營分伍以憑調發先後皆議行末年募兵措餉益急南京職方郎中鄒維璉陳調募之害山西參政徐九翰尤極言民兵不可調崇禎時中原盜急兵部尚書楊嗣昌議令責州縣訓練土著為兵工部侍郎張慎言言其不便者數事而御史米壽圖又言其害有十謂不若簡練民兵增民壯快手備禦地方為便後嗣昌死練兵亦不行鄉兵者隨其風土所長應募調佐軍旅緩急其隸軍籍者曰浙兵義烏為最處次之台寧又次之善狼筅間以叉槊戚繼光製鴛鴦陣以破倭及守薊門最有名曰川兵曰遼兵崇禎時多調之剿流賊其不隸軍籍者所在多有河南嵩縣曰毛葫蘆習短兵長於走山而嵩及盧氏靈寶永寧並多礦兵曰角腦又曰打手山東有長竿手徐州有箭手井陘有螞螂手善運石遠可及百步閩漳泉習鏢牌水戰為最泉州永春人善技擊正統間郭榮六者破沙尤賊有功商竈鹽丁以私販為業多勁果成化初河東鹽徒千百輩自備火礮強弩車仗雜官軍逐寇而松江曹涇鹽徒嘉靖中逐倭至島上焚其舟後倭見民家有鹺囊輒搖手相戒粵東雜蠻蜑習長牌斫刀而新會東莞之產強半延綏固原多邊外土著善騎射英宗命簡練以備秋防大籐峽之役韓雍用之以摧瑤僮之用牌刀者莊浪魯家軍舊隸隨駕中洪熙初令土指揮領之萬曆間部臣稱其驍健為敵所畏宜鼓舞以儲邊用西寧馬戶八百嘗自備騎械赴敵後以發貢裁之萬曆十九年經略鄭雒請復其故又僧兵有少林伏牛五臺倭亂少林僧應募者四十餘人戰亦多勝西南邊服有各土司兵湖南永順保靖二宣慰所部廣西東蘭那地南丹歸順諸狼兵四川酉陽石砫秦氏冉氏諸司宣力最多末年邊事急有司專以調三省土司為長策其利害亦相半云
