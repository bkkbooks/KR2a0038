body:
  text: 明史卷三十八志第十四曆八回回曆法二日五星中心行度立成造法原本總年零年月分日期及十二宮初日凡五立成每立成內首列本立成年月日宮各紀數次列七曜次列日中心行度及土木火金水各自行度日五星最高行度文多不錄錄其造立成之法於左日中心行度日期立成一日行五十九分八秒按日累加之小月二十九日得二十八度三十五分二秒大月三十日得二十九度三十四分一十秒月分立成單月大雙月小末置一閏日大月二十九度三十四分十秒小月二十八度三十五分二秒按月累加之十二月計十一宮十八度五十五分九秒閏日加五十九分八秒宮分初日立成於白羊宮初日起算至金牛宮初日凡三十一日得一宮一度三十三分十八秒五十九分八秒之積視宮分日數多少日數見前累加積之至雙魚宮初日得十一宮一度十一分三十一秒自白羊至此凡三百三十五日之積零年立成每年十一宮十八度五十五分九秒三十年閏十一日故二年五年七年十年十三年十六年十八年二十一年二十四年二十六年二十九年皆加閏日約法每一年減十一度四分五十一秒閏年減十度五分四十三秒三十年為一宮八度二十五分三十一秒每年三百五十四日計一萬六百二十日加閏十一日共一萬六百三十一日總年立成第一年為三宮二十六度五分八秒此隋己未測定根數一云即洪武甲子年數已算加次在內六百年五宮十四度二十五分十九秒每三十年加一宮八度二十五分三十一秒至一千四百四十年得五宮十五分三十三秒五星自行度立成造法土星日期立成一日五十七分按日遞加小月二十七度三十七分大月二十八度三十四分其五日十二日二十日二十八日增一分者乃秒數所積也月分立成大月加二十八度三十四分小月加二十七度三十七分按月累加十二月計十一宮七度四分閏日加五十七分宮分初日立成金牛宮初日為二十九度三十一分自行分三十一日之積餘四星準此視宮分日數累加之至雙魚宮初日為十宮十八度五十八分零年立成每年十一宮七度四分其閏日有無視日中行度零年有加本星一日行分下四星準此至三十年共一宮十二度一十六分總年立成第一年十一宮二十九度十八分此隋己未測定根數一云即洪武甲子年數加次在內下四星準此六百年四宮四度四十四分每三十年加一宮十二度二十七分至一千四百四十年計七宮十八度二十分木星日期立成一日五十四分按日遞加小月二十六度十分大月二十七度五分其四日十一日十七日二十四日三十日增一分者秒數所積也月分立成按大小月累加十二月計十宮十九度二十九分閏日加五十四分宮分初日立成金牛宮初日二十七度五十九分至雙魚宮初日為十宮二十九度二十六分零年立成每年十宮十九度二十九分至三十年計七宮二十四度三十九分總年立成第一年四宮二十五度十九分六百年五宮八度二十七分每三十年加七宮二四三九至千四百四十年計八宮八度五十分火星日期立成一日二十八分按日遞加小月十三度二十三分大月十三度五十一分其二日五日九日十二日十五日十八日二十二日二十五日二十八日各減一分月分立成按大小月累加十二月計五宮十三度二十四分閏日加二十八分宮分初日立成金牛宮初日十四度十九分至雙魚宮初日五宮十八度二十九分零年立成每年五宮十三度二十四分至三十年計七宮十七度一分總年立成第一年八宮二十四度六分六百年四宮四度三十三分每三十年加七宮十七度一分至一千四百四十年計一度一十一分金星日期立成一日三十七分按日遞加小月十七度五十三分大月十八度三十分月分立成按大小月累加十二月計七宮八度十五分閏日加三十七分宮分初日立成金牛宮初日十九度七分至雙魚宮初日七宮十五度二分零年立成每年七宮八度十五分至三十年計二宮十四度十五分總年立成第一年一宮十五度二十九分六百年三宮三十四分每三十年加二宮十四度十五分至一千四百四十年計九度五十一分水星日期立成一日三度六分按日遞加小月三宮初度六分大月三宮三度十二分其二日四日七日九日十二日十四日十七日十九日二十二日二十四日二十七日二十九日各增一分月分立成按大小月累加十二月計初宮十九度四十七分閏月加三度六分宮分初日立成金牛宮初日三宮六度十九分至雙魚宮初日十宮二十度四十五分零年立成每年初宮十九度四十七分至三十年計八宮二十七度四十四分總年立成第一年二宮二十五度三十四分六百年一宮十度九分每三十年加八宮二十七度四十四分至一千四百四十年計十一宮六度三十五分日五星最高行度立成造法日五星同用最高行日分立成一日一十微按日遞加其四日十一日十八日二十五日各減一微大月四秒五十六微小月四秒四十六微月分立成按大小月累加十二月計五十八秒一十微有閏日加十微宮分初日立成金牛宮初日五秒六微至雙魚宮初日五十五秒五微零年立成每年五十八秒去二十微按年遞加三年積六十微加一秒三十年計二十九分十秒總年立成一年初宮十度四十分二十八秒洪武甲子加次六百年五十八分十三秒每三十年加二十九分七秒一千四百四十年計十二度三十六分五十五秒太陰經度立成造法日期立成中心行度一日十三度十一分按日累加大月一宮五度十七分小月初宮二十二度七分內二日四日六日九日十一十四十六十八二十一二十三二十六二十八三十日各減一分共減十三分加倍相離度一日二十四度二十三分