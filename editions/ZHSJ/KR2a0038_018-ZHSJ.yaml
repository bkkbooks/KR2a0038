body:
  text: 明史卷十八本紀第十八世宗二二十二年春正月丙午朔日有食之三月庚戌復遣使採木湖廣是春俺答屢入塞秋八月犯延綏總兵官吳瑛等擊敗之冬十月𩽆顏入寇殺守備陳舜十二月乙酉免南畿被災稅糧是年占城土魯番撒馬兒罕天方烏斯藏入貢二十三年春正月丙寅俺答犯黃崖口二月戊寅犯大水谷三月癸丑犯龍門所丁巳賜秦鳴雷等進士及第出身有差秋七月俺答犯大同總兵官周尚文戰於黑山敗之八月甲午翟鑾罷九月癸卯免浙江被災稅糧丁未吏部尚書許讚兼文淵閣大學士禮部尚書張璧兼東閣大學士預機務壬子振湖廣災冬十月戊辰免河南被災稅糧甲戌小王子入萬全右衞戊寅掠蔚州至於完縣京師戒嚴乙酉逮總督宣大兵部尚書翟鵬巡撫薊鎮僉都御史朱方下獄鵬謫戍方杖死十一月庚子京師解嚴加方士陶仲文少師十二月丙子振江西災是年安南入貢日本以無表却之二十四年春二月戊申詔流民復業予牛種開墾閒田者給復十年三月壬午逮總督宣大兵部侍郎張漢下獄謫戍夏五月壬戌朔日有食之六月壬辰太廟成是夏免畿輔山西陝西被災稅糧秋七月壬戌有事於太廟赦徒罪以下八月丙午瘞暴骸己酉張璧卒庚戌俺答犯松子嶺殺守備張文瀚是月犯大同參將張鳳指揮劉欽等戰死九月丁丑召夏言入閣冬十一月辛巳許讚罷是年安南琉球烏斯藏入貢二十五年春三月戊辰四川白草番亂夏五月戊辰俺答發大同塞邊將殺其使六月甲辰犯宣府千戶汪洪戰死秋七月癸酉以醴泉出承華殿廷臣表賀停諸司封事二十日嗣後慶賀齋祀悉停封奏是月俺答犯延安慶陽八月壬子免山東被災稅糧九月俺答犯寧夏冬十月丁亥犯清平堡遊擊高極戰死癸巳代府奉國將軍充灼謀反伏誅甲午殺故建昌侯張延齡十二月丁未免河南被災稅糧是年土魯番入貢二十六年春三月庚午賜李春芳等進士及第出身有差夏四月乙巳巡撫四川都御史張時徹副總兵何卿討平白草叛番己酉俺答求貢拒之秋七月丙辰河決曹縣八月丙戌免陝西被災稅糧九月戊辰戶部尚書王杲以科臣劾其通賄下獄遣戍閏月丙午振成都饑冬十一月壬午大內火釋楊爵於獄乙未皇后崩十二月辛酉逮甘肅總兵官仇鸞乙亥海寇犯寧波台州是年琉球入貢二十七年春正月把都兒寇廣寧參將閻振戰死癸未以議復河套逮總督陝西三邊侍郎曾銑杖給事中御史於廷罷夏言三月癸巳殺曾銑逮夏言癸卯出仇鸞於獄夏五月丙戌葬孝烈皇后秋七月戊寅京師地震庚子西苑進嘉穀薦於太廟八月丁巳俺答犯大同指揮顧相等戰死周尚文追敗之於次野口九月壬午犯宣府深入永寧懷來隆慶守備魯承恩等戰死乙未免陝西被災稅糧冬十月癸卯殺夏言十一月乙未詔撫按官採生沙金是年日本入貢二十八年春二月乙巳振陝西饑辛亥南京吏部尚書張治為禮部尚書兼文淵閣大學士祭酒李本為少詹事兼翰林學士入閣預機務壬子俺答犯宣府指揮董暘等敗沒遂東犯永寧關南大震乙卯周尚文敗俺答於曹家莊丙辰宣府總兵官趙國忠又敗之於大滹沱三月辛未朔日有食之丁亥皇太子薨秋七月浙江海賊起九月𩽆顏三衞犯遼東冬十月辛丑免畿內被災稅糧是年日本琉球入貢二十九年春三月壬午賜唐汝楫等進士及第出身有差是月瓊州黎賊平夏六月丁巳俺答犯大同總兵官張達副總兵林椿戰死是夏免陝西河南江北被災夏稅秋八月丙寅封方士陶仲文為恭誠伯丁丑俺答大舉入寇攻古北口薊鎮兵潰戊寅掠通州駐白河分掠畿甸州縣京師戒嚴召大同總兵官仇鸞及河南山東兵入援壬午薄都城仇鸞為平虜大將軍節制諸路兵馬巡撫保定都御史楊守謙提督軍務左諭德趙貞吉宣諭諸軍癸未始御奉天殿戒敕羣臣甲申寇退逮守通州都御史王儀丙戌京師解嚴杖趙貞吉謫外任丁亥仇鸞敗績於白羊口兵部尚書丁汝夔巡撫侍郎楊守謙有罪棄市杖左都御史屠僑刑部侍郎彭黯九月辛卯振畿內被寇者乙未罷團營復三大營舊制設戎政府以仇鸞總督之丁酉罷領營中官戊申免畿內被災稅糧壬子廢鄭王厚烷為庶人冬十月甲戌張治卒十一月癸巳分遣御史選邊軍入衞壬寅祧仁宗祔孝烈皇后於太廟是年琉球入貢三十年春三月壬辰開馬市於宣府大同兵部侍郎史道經理之夏四月壬午下經略京城副都御史商大節於獄秋九月乙未京師地震詔修省冬十一月俺答犯大同是年免兩畿河南江西遼東貴州山東山西被災稅糧三十一年春正月壬辰俺答犯大同甲午入弘賜堡二月癸丑振宣大饑辛酉俺答犯懷仁川指揮僉事王恭戰死己巳建內府營操練內侍三月戊子大將軍仇鸞帥師赴大同辛卯禮部尚書徐階兼東閣大學士預機務夏四月丙寅把都兒辛愛犯新興堡指揮王相等戰死丙子倭寇浙江五月甲申召仇鸞還戊申倭陷黃巖秋七月丙申免陝西被災夏稅壬寅以倭警命山東巡撫都御史王巡視浙江八月己未收仇鸞大將軍印尋病死乙亥戮仇鸞屍傳首九邊己卯俺答犯大同分掠朔應山陰馬邑九月乙酉犯山西三關壬辰犯寧夏丁酉河決徐州庚子兵部侍郎蔣應奎左通政唐國卿以冒邊功杖於廷癸卯罷各邊馬市冬十月己未兵部尚書趙錦坐仇鸞黨戍邊壬戌免江西被災稅糧十二月丁巳光祿少卿馬從謙坐誹謗杖死三十二年春正月戊寅朔日食陰雲不見己卯侍郎吳鵬振淮徐水災二月甲子倭犯溫州壬申俺答犯宣府參將史略戰死三月丁丑振陝西饑辛巳吉能犯延綏殺副總兵李梅壬午兵部侍郎楊博巡邊甲申振山東饑甲午賜陳謹等進士及第出身有差甲辰俺答犯宣府副總兵郭都戰死閏三月海賊汪直糾倭寇瀕海諸郡至六月始去秋七月戊午俺答大舉入寇犯靈丘廣昌乙丑河套諸部犯延綏己巳俺答犯浮圖峪遊擊陳鳳朱玉禦之庚午河南賊師尚詔陷歸德及柘城鹿邑八月丙子小王子犯赤城丙申師尚詔攻太康官軍與戰於鄢陵敗績戊戌振山東災免稅糧九月丙午俺答犯廣武巡撫都御史趙時春敗績總兵官李淶參將馮恩等力戰死辛酉以敵退告謝郊廟冬十月甲戌振河南山東饑庚子師尚詔伏誅賊平辛丑京師外城成是年琉球入貢三十三年春正月壬寅朔以賀疏違制杖六科給事中於廷戊辰官軍圍倭於南沙五閱月不克倭潰圍出轉掠蘇松二月庚辰官軍敗績於松江三月乙丑倭犯通泰餘衆入青徐界夏四月甲戌振畿內饑乙亥倭犯嘉興都司周應楨等戰死乙酉陷崇明知縣唐一岑死之五月壬寅倭掠蘇州丁巳南京兵部尚書張經總督軍務討倭六月癸酉俺答犯大同總兵官岳懋戰死己丑侍郎陳儒振大同軍士秋八月癸未倭犯嘉定官軍敗之庚寅復戰敗績九月丁卯俺答犯古北口總督楊博禦却之是年暹羅土魯番天方撒馬兒罕烏斯藏入貢三十四年春正月丁酉朔倭陷崇德攻德清二月丙戌工部侍郎趙文華祭海兼區處防倭是月俺答犯薊鎮參將趙傾葵等戰死三月甲寅蘇松兵備副使任環敗倭於南沙夏四月戊子俺答犯宣府參將李光啟被執不屈死五月甲午總督侍郎張經副總兵俞大猷擊倭於王江涇大破之乙巳倭分道掠蘇州屬縣己酉逮張經下獄六月壬午兵部侍郎楊宜總督軍務討倭秋七月乙巳倭陷南陵流劫蕪湖太平丙辰犯南京八月壬辰蘇松巡撫都御史曹邦輔敗倭於滸墅九月乙未趙文華及巡按御史胡宗憲擊倭於陶宅敗績丙午俺答犯大同宣府戊午犯懷來京師戒嚴辛酉參將馬芳敗寇於保安是秋免江北山東被災秋糧冬十月庚寅殺張經及巡撫浙江副都御史李天寵兵部員外郎楊繼盛辛卯倭掠寧波台州犯會稽十一月壬辰朔日有食之庚申倭犯興化泉州閏月丁丑免畿內水災稅糧十二月甲午開山東四川銀礦壬寅山西陝西河南地大震河渭溢死者八十三萬有奇是年琉球入貢三十五年春正月壬午官軍擊倭於松江敗績二月甲午振平陽延安災己亥楊宜罷戊午吏部尚書李默坐誹謗下錦衣衞獄論死巡撫侍郎胡宗憲總督軍務討倭三月丁丑賜諸大綬等進士及第出身有差夏四月丙申振陝西災甲辰倭寇無為州同知齊恩戰死辛亥遊擊宗禮擊倭於崇德敗沒五月乙丑趙文華提督江南浙江軍務丁亥左通政王槐採礦銀於玉旺峪六月丙申總兵官俞大猷敗倭於黃浦辛丑俺答犯宣府殺遊擊張紘秋七月辛巳胡宗憲破倭於乍浦八月壬寅詔採芝辛亥胡宗憲襲破海賊徐海於梁莊九月乙丑徽王載土侖有罪廢為庶人免南畿被災稅糧壬午以平浙江倭祭告郊廟社稷冬十月丙戌朔日有食之十一月戊午打來孫犯廣寧總兵官殷尚質等戰死十二月丁未犯環慶三十六年春二月俺答犯大同三月壬午把都兒寇遷安副總兵蔣承勛力戰死是月吉能寇延綏殺副總兵陳鳳夏四月丙申奉天華蓋謹身三殿災壬寅下詔引咎修齋五日止諸司封事停刑五月癸丑倭犯揚徐入山東界癸亥採木於四川湖廣辛未倭犯天長盱眙遂攻泗州丙子犯淮安六月乙酉兵備副使于德昌參將劉顯敗倭於安東甲午罷陝西礦秋七月庚午詔廣東採珠九月俺答子辛愛寇應朔毀七十餘堡冬十一月丁丑辛愛圍右衞城是冬免山東浙江被災稅糧是年琉球入貢三十七年春正月癸亥罷河南礦三月辛未始免三大營聽征官軍營造工役夏四月癸未振遼東饑辛巳倭分犯浙江福建秋八月己未吉能犯永昌涼州圍甘州冬十月癸丑禮部進瑞芝一千八百六十本詔廣求徑尺以上者十一月丁亥諭法司恤刑是年琉球暹羅入貢三十八年春二月庚午把都兒犯潘家口渡灤河逼三屯營三月己卯掠遷安薊州玉田庚寅賜丁士美等進士及第出身有差癸巳倭犯浙東海道副使譚綸敗之甲午逮浙江總兵官俞大猷夏四月丁未倭犯通州甲寅倭攻福州庚申倭攻淮安巡撫鳳陽都御史李遂敗之於姚家蕩倭退據廟灣丙寅副使劉景韶大破倭於印莊五月辛巳逮總督薊遼右都御史王下獄甲午劉景韶破倭於廟灣江北倭平六月乙巳辛愛犯大同秋八月己未李遂胡宗憲破倭於劉家莊甲子振遼東饑給牛種是月俺答犯土木遊擊董國忠等戰死九月犯宣府是年土魯番天方撒馬兒罕魯迷哈密暹羅入貢三十九年春正月丙戌俺答犯宣府二月丁巳南京振武營兵變殺總督糧儲侍郎黃懋官戊午振順天永平饑倭犯潮州三月癸未大同總兵官劉漢襲敗兀慎於灰河丁亥打來孫犯廣寧陷中前所殺守備武守爵黃廷勛夏五月壬午振山西三關饑壬辰盜入廣東博羅縣殺知縣舒顓秋七月乙丑朔把都兒犯薊西遊擊胡鎮禦却之庚午劉漢襲俺答於豐州破之九月己巳俺答犯朔州廣武冬十二月土蠻犯海州東勝堡是月閩廣賊犯江西是年免畿內山西山東湖廣陝西被災稅糧暹羅入貢四十年春二月辛卯朔日當食不見振山東饑丁未景王之國三月壬戌振京師饑夏四月丁未振山西饑五月乙亥李本以憂去閏月丙辰賊犯泰和殺副使汪一中指揮王應鵬秋七月己丑朔日有食之庚戌俺答犯宣府副總兵馬芳禦却之九月庚子犯居庸關參將胡鎮禦却之辛丑振南畿災冬十一月甲午禮部尚書袁煒為戶部尚書兼武英殿大學士預機務庚戌吉能犯寧夏進逼固原辛亥萬壽宮災十二月丙寅把都兒犯遼東蓋州是年烏斯藏入貢四十一年春三月辛卯白兔生子禮部請告廟許之羣臣表賀壬寅賜申時行等進士及第出身有差己酉重作萬壽宮成夏五月壬寅嚴嵩罷壬子土蠻攻湯站堡副總兵黑春力戰死秋九月壬午三殿成改奉天曰皇極華蓋曰中極謹身曰建極冬十月免南畿江西被災稅糧十一月乙酉分遣御史訪求方士法書丁亥逮胡宗憲尋釋之辛丑吉能犯寧夏副總兵王勳戰死己酉倭陷興化是月延綏總兵官趙岢分部出塞襲寇敗之免陝西湖廣被災及福建被寇者稅糧是年琉球入貢四十二年春正月戊申俺答犯宣府南掠隆慶夏四月庚申倭犯福清總兵官劉顯俞大猷合兵殲之丁卯副總兵戚繼光破倭於平海衞秋八月乙亥總兵官楊照襲寇於廣寧塞外力戰死冬十月丁卯辛愛把都兒破牆子嶺入寇京師戒嚴詔諸鎮兵入援戊辰掠順義三河總兵官孫臏敗死乙亥大同總兵官姜應熊禦寇密雲敗之十一月丁丑京師解嚴是年琉球入貢四十三年春正月壬辰土蠻黑石炭寇薊鎮總兵官胡鎮參將白文智禦却之二月己酉伊王典楧有罪廢為庶人戊午倭犯仙遊總兵官戚繼光大敗之福建倭平閏月丙申盜據漳平知縣魏文瑞死之三月己未官軍擊潮州倭破之夏四月乙亥免畿內被災稅糧五月壬寅朔日有食之乙卯獲桃於御幄羣臣表賀六月辛卯倭犯海豐俞大猷破之冬十二月南韶賊起守備賀鐸指揮蔡胤元被執死之俺答犯山西遊擊梁平守備祁謀戰死是年西番哈密安南入貢魯迷國貢獅子四十四年春三月丁巳賜范應期等進士及第出身有差己未袁煒致仕辛酉嚴世蕃伏誅是月土蠻犯遼東都指揮線補袞楊維藩戰死夏四月庚辰吏部尚書嚴訥禮部尚書李春芳並兼武英殿大學士預機務壬午俺答犯肅州總兵官劉承業禦却之六月甲戌芝生睿宗原廟柱告廟受賀遂建玉芝宮秋八月壬午獲仙藥於御座告廟冬十一月癸卯嚴訥致仕戊申奉安獻皇帝后神主於玉芝宮是年琉球入貢四十五年春二月癸亥戶部主事海瑞上疏下錦衣衞獄是月俞大猷討廣東山賊大破之浙江江西礦賊陷婺源三月己未吏部尚書郭朴兼武英殿大學士禮部尚書高拱兼文淵閣大學士預機務夏四月壬戌朔日有食之丙戌俺答犯遼東六月丙子旱親禱雨於凝道雷軒越三日雨羣臣表賀秋七月乙未俺答犯萬全右衞冬十月丁卯犯固原總兵官郭江敗死癸酉犯偏頭關閏月甲辰犯大同參將崔世榮力戰死十一月己未帝不豫十二月庚子大漸自西苑還乾清宮是日崩年六十遺詔裕王嗣位隆慶元年正月上尊諡廟號世宗葬永陵贊曰世宗御極之初力除一切弊政天下翕然稱治顧迭議大禮輿論沸騰倖臣假托尋興大獄夫天性至情君親大義追尊立廟禮亦宜之然升祔太廟而躋於武宗之上不已過乎若其時紛紜多故將疲於邊賊訌於內而崇尚道教享祀弗經營建繁興府藏告匱百餘年富庶治平之業因以漸替雖剪剔權奸威柄在御要亦中材之主也矣
