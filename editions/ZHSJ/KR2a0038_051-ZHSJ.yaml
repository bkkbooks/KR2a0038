body:
  text: 明史卷五十一志第二十七禮五吉禮五廟制禘祫時享薦新加上諡號廟諱宗廟之制明初作四親廟於宮城東南各為一廟皇高祖居中皇曾祖東第一皇祖西第一皇考東第二皆南向每廟中室奉神主東西兩夾室旁兩廡三門門設二十四戟外為都宮正門之南齋次其西饌次俱五間北向門之東神廚五間西向其南宰牲池一南向洪武元年命中書省集儒臣議祀典李善長等言周制天子七廟而商書曰七世之廟可以觀德則知天子七廟自古有之太祖百世不遷三昭三穆以世次比至親盡而遷此有天下之常禮若周文王武王雖親盡宜祧以其有功當宗故皆別立一廟謂之文世室武世室亦百世不遷漢每帝輒立一廟不序昭穆又有郡國廟及寢園廟光武中興於洛陽立高廟祀高祖及文武宣元五帝又於長安故高廟中祀成哀平三帝別立四親廟於南陽舂陵祀父南頓君以上四世至明帝遺詔藏主於光烈皇后更衣別室後帝相承皆藏於世祖之廟由是同堂異室之制至於元莫之改唐高祖尊高曾祖考立四廟於長安太宗議立七廟虛太祖之室玄宗創制立九室祀八世文宗時禮官以景帝受封於唐高祖太宗創業受命百代不遷親盡之主禮合祧遷至禘祫則合食如常其後以敬文武三宗為一代故終唐之世常為九世十一室宋自太祖追尊僖順翼宣四祖每遇禘則以昭穆相對而虛東向之位神宗奉僖祖為太廟始祖至徽宗時增太廟為十室而不祧者五宗崇寧中取王肅說謂二祧在七世之外乃建九廟高宗南渡祀九世至於寧宗始別建四祖殿而正太祖東向之位元世祖建宗廟於燕京以太祖居中為不遷之祖至泰定中為七世十室今請追尊高曾祖考四代各為一廟於是上皇高祖考諡曰玄皇帝廟號德祖皇高祖妣曰玄皇后皇曾祖考諡曰皇帝廟號懿祖皇曾祖妣曰皇后皇祖考諡曰裕皇帝廟號熙祖皇祖妣曰裕皇后皇考諡曰淳皇帝廟號仁祖皇妣陳氏曰淳皇后詔製太廟祭器太祖曰禮順人情可以義起所貴斟酌得宜隨時損益近世泥古好用古籩豆之屬以祭其先生既不用死而用之甚無謂也孔子曰事死如事生事亡如事存其製宗廟器用服御皆如事生之儀於是造銀器以金塗之酒壺盂皆八朱漆盤盌二百四十及楎椸枕簟篋笥幃幔浴室皆具後又詔器皿以金塗銀者俱易以金二年詔太廟祝文止稱孝子皇帝不稱臣凡遣皇太子行禮止稱命長子某勿稱皇太子後稱孝玄孫皇帝又改稱孝曾孫嗣皇帝初太廟每室用幣一二年從禮部議用二白繒又從尚書崔亮奏作圭瓚八年改建太廟前正殿後寢殿殿翼皆有兩廡寢殿九間間一室奉藏神主為同堂異室之制九年十月新太廟成中室奉德祖東一室奉懿祖西一室奉熙祖東二室奉仁祖皆南向十五年以孝慈皇后神主祔享太廟其後皇后祔廟倣此建文即位奉太祖主祔廟正殿神座次熙祖東向寢殿神主居西二室南向成祖遷都建廟如南京制宣德元年七月禮部進太宗神主祔廟儀先期一日遣官詣太廟行祭告禮午後於几筵殿行大祥祭翼日昧爽設酒果於几筵殿設御輦二冊寶亭四於殿前丹陛上皇帝服淺淡服行祭告禮畢司禮監官跪請神主陞輦詣太廟奉安內使二員捧神主內使四員捧冊寶由殿中門出安奉於御輦冊寶亭皇帝隨行至思善門易祭服升輅至午門外儀衞傘扇前導至廟街門內皇帝降輅監官導詣御輦前奏跪請神主奉安太廟俯伏興內使捧神主冊寶皇帝從由中門入至寢廟東第三室南向奉安皇帝叩頭畢祭祀如時祭儀文武官具祭服行禮其正殿神座居仁祖之次西向二年五月仁宗神主祔廟如前儀寢殿西第三室南向正殿居高祖之次東向其後大行祔廟倣此正統七年十二月奉昭皇后神主祔廟神主詣列祖神位前謁廟禮畢太常寺官唱賜座內侍捧衣冠與仁宗同神位唱請宣宗皇帝朝見內侍捧宣宗衣冠置褥位上行四拜禮訖安奉於座上孝宗即位憲宗將升祔時九廟已備議者咸謂德懿熙仁四廟宜以次奉祧禮臣謂國家自德祖以上莫推世次則德祖視周后稷不可祧憲宗升祔當祧懿祖宜於太廟寢殿後別建祧殿如古夾室之制歲暮則奉祧主合享如古祫祭之禮吏部侍郎楊守陳言禮天子七廟祖功而宗德德祖可比商報乙周亞圉非契稷比議者習見宋儒嘗取王安石說遂使七廟既有始祖又有太祖太祖既配天又不得正位南向非禮之正今請幷祧德懿熙三祖自仁祖下為七廟異時祧盡則太祖擬契稷而祧主藏於後寢祫禮行於前殿時享尊太祖祫祭尊德祖則功德並崇恩義亦備帝從禮官議建祧廟於寢殿後遣官祭告宗廟帝具素服告憲宗几筵祭畢奉遷懿祖神主衣冠於後殿牀幔御座儀物則貯於神庫其後奉祧倣此嘉靖九年春世宗行特享禮令於殿內設帷幄如九廟列聖皆南向各奠獻讀祝三餘如舊十年正月帝以廟祀更定告於太廟世廟幷祧廟三主遷德祖神主於祧廟奉安太祖神主於寢殿正中遂以序進遷七宗神位丁酉帝詣太廟行特享禮九月諭大學士李時等以宗廟之制父子兄弟同處一堂於禮非宜太宗以下宜皆立專廟南向尚書夏言奏太廟兩傍隙地無幾宗廟重事始謀宜慎未報中允廖道南言太宗以下宜各建特廟於兩廡之地有都宮以統廟不必各為門垣有夾室以藏主不必更為寢廟第使列聖各得全其尊皇上躬行禮於太祖之廟餘遣親臣代獻如古諸侯助祭之禮帝悅命會議言等言太廟地勢有限恐不能容若小其規模又不合古禮且使各廟既成陛下徧歷羣廟非獨筋力不逮而日力亦有不給古者宗伯代后獻之文謂在一廟中而代后之亞獻未聞以人臣而代主一廟之祭者也且古諸侯多同姓之臣今陪祀執事者可擬古諸侯之助祭者乎先臣丘濬謂宜間日祭一廟歷十四日而遍此蓋無所處而強為之說耳若以九廟一堂嫌於混同請以木為黃屋如廟廷之制依廟數設之又設帷幄於其中庶得以展專奠之敬矣議上不報十三年南京太廟災禮部尚書湛若水請權將南京太廟香火幷於南京奉先殿重建太廟補造列聖神主帝召尚書言與羣臣集議言會大學士張孚敬等言國有二廟自漢惠始神有二主自齊桓始周之三都廟乃遷國立廟去國載主非二廟二主也子孫之身乃祖宗所依聖子神孫既親奉祀事於此則祖宗神靈自當陟降於此今日正當專定廟議一以此地為根本南京原有奉先殿其朝夕香火當合併供奉如常太廟遺址當倣古壇墠遺意高築牆垣謹司啟閉以致尊嚴之意從之時帝欲改建九廟夏言因言京師宗廟將復古制而南京太廟遽災殆皇天列祖佑啟默相不可不靈承者帝悅詔春和興工諸臣議於太廟南左為三昭廟與文祖世室而四右為三穆廟羣廟各深十六丈有奇而世室殿寢稍崇縱橫深廣與羣廟等列廟總門與太廟戟門相並列廟後垣與太廟祧廟後牆相並具圖進帝以世室尚當隆異令再議言等請增拓世室前殿視羣廟崇四尺有奇深廣半之寢殿視羣廟崇二尺有奇深廣如之報可十四年正月諭閣臣今擬建文祖廟為世室則皇考世廟字當避張孚敬言世廟著明倫大典頒詔四方不可改文世室宜稱太宗廟其餘羣廟不用宗字用本廟號他日遞遷更牌額可也從之二月盡撤故廟改建之諸廟各為都宮廟各有殿有寢太祖廟寢後有祧廟奉祧主藏焉太廟門殿皆南向羣廟門東西向內門殿寢皆南向十五年十二月新廟成更創皇考廟曰睿宗獻皇帝廟帝乃奉安德懿熙仁四祖神主於祧廟太祖神主於太廟百官陪祭如儀翌日奉安太宗以下神主列於羣廟命九卿正官及武爵重臣俱詣太宗廟陪祭文三品以上武四品以上分詣羣廟行禮又擇日親捧太祖神主文武大臣捧七宗神主奉安於景神殿二十年四月太廟災成祖仁宗主燬奉安列聖主於景神殿遣大臣詣長陵獻陵告題帝后主亦奉安景神殿二十二年十月以舊廟基隘命相度規制議三上不報久之乃命復同堂異室之舊廟制始定二十四年六月禮部尚書費寀等以太廟安神請定位次帝曰既無昭穆亦無世次只序倫理太祖居中左四序成宣憲睿右四序仁英孝武皆南向七月以廟建禮成百官表賀詔天下新廟仍在闕左正殿九間前兩廡南戟門門左神庫右神廚又南為廟門門外東南宰牲亭南神宮監西廟街門正殿後為寢殿奉安列聖神主又後為祧廟藏祧主皆南向二十七年帝欲祔孝烈皇后方氏於太廟而祧仁宗大學士嚴嵩禮部尚書徐階等初皆持不可既而不能堅其議二十九年十一月祧仁宗遂祔孝烈於西第四室隆慶六年八月穆宗將祔廟敕禮臣議當祧廟室禮科陸樹德言宣宗於穆宗僅五世請仍祔睿宗於世廟而宣宗勿祧疏下禮部部議宣宗世次尚近祧之未安因言古者以一世為一廟非以一君為一世故晉之廟十一室而六世唐之廟十一室而九世宋自太祖上追四祖至徽宗始定為九世十一室之制以太祖太宗同為一世故也其後徽宗祔以與哲宗同一世高宗祔以與欽宗同一世皆無所祧及光宗升祔增為九世十二室今自宣宗至穆宗凡六世上合二祖僅八世準以宋制可以無祧但於寢殿左右各增一室則尊祖敬宗並行不悖矣帝命如舊敕行遂祧宣宗天啟元年七月光宗將祔廟太常卿洪文衡請無祧憲宗而祧睿宗不聽禘祫洪武元年祫饗太廟德祖皇考妣居中南向懿祖皇考妣東第一位西向熙祖皇考妣西第一位東向仁祖皇考妣東第二位西向七年御史答祿與權言皇上受命七年而禘祭未舉宜參酌古今成一代之典詔下禮部太常司翰林院議以為虞夏商周世系明白故禘禮可行漢唐以來莫能明其始祖所自出當時所謂禘祭不過祫已祧之祖而祭之乃古之大祫非禘也宋神宗嘗曰禘者所以審諦祖之所自出是則莫知祖之所自出禘禮不可行也今國家追尊四廟而始祖所自出者未有所考則禘難遽行太祖是其議弘治元年定每歲暮奉祧廟懿祖神座於正殿左居熙祖上行祫祭之禮嘉靖十年世宗以禘祫義詢大學士張璁令與夏言議言撰禘義一篇獻之大意謂自漢以下譜牒難考欲如虞夏之禘黃帝商周之禘帝嚳不能盡合謹推明古典采酌先儒精微之論宜為虛位以祀帝深然之會中允廖道南謂朱氏為顓頊裔請以太祖實錄為據禘顓頊遂詔禮部以言道南二疏會官詳議諸臣咸謂稱虛位者茫昧無據尊顓頊者世遠難稽廟制既定高皇帝始祖之位當禘德祖為正帝意主虛位令再議而言復疏論禘德祖有四可疑且言今所定太祖為太廟中之始祖非王者立始祖廟之始祖帝併下其章諸臣乃請設虛位以禘皇初祖南向奉太祖配西向禮臣因言大祫既歲舉大禘請三歲一行庶疏數適宜帝自為文告皇祖定丙辛歲一行敕禮部具儀擇日四月禮部上大禘儀注前期告廟致齋三日備香帛牲醴如時享儀錦衣衞設儀衞太常卿奉皇初祖神牌太祖神位於太廟正殿安設如圖儀至日行禮如大祀圜丘儀及議祧德祖罷歲除祭以冬季中旬行大祫禮太常寺設德祖神位於太廟正中南向懿祖而下以次東西向十五年復定廟饗制立春犆享各出主於殿立夏立秋立冬出太祖成祖七宗主饗太祖殿為時祫季冬中旬卜日出四祖及太祖成祖七宗主饗太祖殿為大祫祭畢各歸主於其寢十七年定大祫祝文九廟帝后諡號俱全書時祫止書某祖某宗某皇帝更定季冬大祫日奉德懿熙仁及太祖異室皆南向成祖西向北上仁宗以下七宗東西相向禮三獻樂六奏舞八佾皇帝獻德祖帝后大臣十二人分獻諸帝內臣十二人分獻諸后二十年十一月禮官議歲暮大祫當陳祧主而景神殿隘請暫祭四祖於後寢用連几陳籩豆以便周旋詔可二十二年定時享大祫罷出主上香奠獻等儀臨期捧衣冠出納太常及神宮監官奉行二十四年罷季冬中旬大祫幷罷告祭仍以歲除日行大祫禮同時享二十八年復告祭儀穆宗即位禮部以大行皇帝服制未除請遵弘治十八年例歲暮大祫孟春時享兩祭皆遣官攝事樂設而不作帝即喪次致齋陪祀官亦在二十七日之內宜令暫免從之時享洪武元年定宗廟之祭每歲四孟及歲除凡五享學士陶安等言古者四時之祭三祭皆合享於祖廟惟春祭於各廟自漢而下廟皆同堂異室則四時皆合祭今宜倣近制合祭於第一廟庶適禮之中無煩瀆也太祖命孟春特祭於各廟三時及歲除則祫祭於德祖廟二年定時享之制春以清明夏以端午秋以中元冬以冬至歲除如舊三年禮部尚書崔亮言孟月者四時之首因時變致孝思故備三牲黍稷品物以祭至仲季之月不過薦新而已既行郊祀則廟享難舉宜改從舊制其清明等節各備時物以薦從之九年新建太廟凡時享正殿中設德祖帝后神座南向左懿祖右熙祖東西向仁祖次懿祖凡神座俱不奉神主止設衣冠禮畢藏之孟春擇上旬日三孟用朔日及歲除皆合享自是五享皆罷特祭而行合配之禮二十一年定時享儀更前制迎神四拜飲福四拜禮畢四拜二十五年定時享若國有喪事樂備而不作正統三年正月享太廟禮部言故事先三日太常寺奏祭祀御正殿受奏是日宣宗皇帝忌辰例不鳴鐘鼓第視事西角門帝以祭祀重事仍宜升殿餘悉遵永樂間例行之天順六年閣臣以皇太后喪請改孟冬時享於除服後從之成化四年禮部以慈懿太后喪請改孟秋享廟於初七日不從嘉靖十一年大學士張孚敬等言太廟祭祀但設衣冠皇上改行出主誠合古禮但徧詣羣廟躬自啟納不免過勞今請太祖神主躬自安設羣廟帝后神主則以命內外捧主諸臣帝從其請十七年定享祫禮凡立春特享親祭太祖遣大臣八人分獻諸帝內臣八人分獻諸后立夏時祫各出主於太廟太祖南向成祖西向序七宗之上仁宣英憲孝睿武宗東西相向秋冬時祫如夏禮二十四年新廟成復定享祫止設衣冠不出主隆慶元年孟夏時享以世宗几筵未撤遵正德元年例先一日帝常服祭告几筵祇請諸廟享祀其後時享祫祭在大祥內者皆如之薦新洪武元年定太廟月朔薦新儀物正月韭薺生菜雞子鴨子二月水芹蔞蒿臺菜子鵝三月茶笋鯉魚鮆魚四月櫻桃梅杏鰣魚雉五月新麥王瓜桃李來禽嫩雞六月西瓜甜瓜蓮子冬瓜七月菱梨紅棗蒲萄八月芡新米藕茭白薑鱖魚九月小紅豆栗柿橙蟹鯿魚十月木瓜柑橘蘆菔兔雁十一月蕎麥甘蔗天鵝鶿鹿十二月芥菜菠菜白魚鯽魚其禮皆天子躬行未幾以屬太常二年詔凡時物太常先薦宗廟然後進御三年定朔日薦新各廟共羊一豕一籩豆八簠簋登鉶各二酒尊三及常饌鵝羹飯太常卿及與祭官法服行禮望祭止常饌鵝羹飯常服行禮又有獻新之儀凡四方別進新物在月薦外者太常卿與內使監官常服獻於太廟不行禮其後朔望祭祀及薦新獻新俱於奉先殿加上諡號洪武元年追尊四廟諡號冊寶皆用玉冊簡長尺二寸廣一寸二分厚五分簡數從文之多寡聯以金繩藉以錦褥覆以紅羅泥金夾帕冊匣朱漆鏤金龍鳳文其寶篆文廣四寸九分厚一寸二分金盤龍紐繫以錦綬裹以紅錦加帕納於盝盝裝以金德祖冊文曰孝玄孫嗣皇帝臣某再拜稽首上言臣聞尊敬先世人之至情祖父有天下傳之子孫子孫有天下追尊祖父此古今通義也臣遇天下兵起躬披甲冑調度師旅戡定四方以安人民土地日廣皆承祖宗之庇臣庶推臣為皇帝而先世考妣未有稱號謹上皇高祖考府君尊號曰玄皇帝廟號德祖伏惟英爽鑒此孝思其寶文曰德祖玄皇帝之寶玄皇后懿祖以下帝后冊寶並同建文時追尊諡冊之典以革除無考永樂元年五月進高皇帝高皇后諡議前一日於奉天殿中設諡議案是日早帝袞冕陞殿如常儀文武官朝服四拜禮部官奏進尊諡議序班二員引班首升丹陛捧諡議官以諡議文授班首由中門入至殿中贊進尊諡議駕興詣諡議文案班首進置於案跪百官皆跪帝覽畢復坐班首與百官俯伏興復位再行四拜禮畢帝親舉諡議付翰林院臣撰冊文六月以上尊諡先期齋戒遣官祭告天地宗廟社稷鴻臚寺設香案於奉天殿是日早內侍以冊寶置於案太常寺於太廟門外丹陛上皇考皇妣神御前各設冊寶案鴻臚寺設冊寶輿於奉天門外鹵簿樂懸如常儀百官祭服詣太廟門外立俟執事官幷宣冊寶官先從太廟右門入序立殿右帝袞冕御華蓋殿捧冊寶官四員祭服於奉天殿東西序立鴻臚寺奏請行禮帝出奉天殿冊寶案前捧冊寶官各捧前行置綵輿內鹵簿大樂前導帝乘輿隨綵輿行至午門外降輿陞輅至太廟門百官跪俟綵輿過興帝降輅隨綵輿至太廟中門外捧冊寶官各捧前行帝隨行至丹陛上捧冊寶置於案典儀傳唱如常內贊奏就位典儀奏迎神奏樂樂止內贊奏帝四拜百官同典儀奏進冊寶捧冊寶官前行駕由左門入至廟中詣皇考神御前奏跪搢圭奏進冊捧冊官跪進於帝左帝受冊以授執事官置於案左奏出圭贊宣冊宣冊官跪宣於帝左冊文曰惟永樂元年歲次癸未六月丁未朔越十一日丁巳孝子嗣皇帝臣某謹拜手稽首言臣聞俊德贊堯重華美舜禹湯文武列聖相承功德並隆咸膺顯號欽惟皇考皇帝統天肇運奮自布衣戡定禍亂用夏變夷以孝治天下四十餘年民樂永熙禮樂文章垂憲萬世德合乾坤明同日月功超千古道冠百王謹奉冊寶上尊諡曰聖神文武欽明啟運俊德成功統天大孝高皇帝廟號太祖伏惟神靈陟降陰騭下民覆幬無極與天常存宣冊訖奏搢圭奏進寶捧寶官以寶跪進於帝左帝受寶以授執事官置於案右奏出圭贊宣寶宣寶官跪宣於帝右寶文如諡號宣寶訖奏俯伏興帝詣皇妣神御前進宣冊寶如前儀冊文曰臣聞自古后妃皆承世緒媯汭嬪虞發祥帝室周姜輔治肇基邦君欽惟皇妣孝慈皇后以聖輔聖同起側微弘濟艱難化家為國克勤克儉克敬克誠克孝克慈以奉神靈之統理萬物之宜正位中宮十有五年家邦承式天下歸仁謹奉冊寶上尊諡曰孝慈昭憲至仁文德承天順聖高皇后伏惟聖靈陟降膺慈顯名日月光華照臨永世寶文如諡號宣寶訖帝復位奏四拜百官同行祭禮如常儀翌日頒詔天下以上諡禮成賜陪祀執事官宴餘官人賜鈔一錠仁宗即位九月禮部同諸臣進大行皇帝仁孝皇后諡議仁宗立受之覽畢流涕不已以付翰林院撰諡冊禮部奏上諡儀前期齋戒遣祭如常內侍置冊寶輿於奉天門厥明捧冊寶置輿中帝衰服詣奉天門內侍舉冊寶輿帝隨輿後行降階陞輅百官立金水橋南北向跪俟輿過興隨至思善門外序立北向帝降輅冊寶輿由中門入至几筵殿丹陛上帝由左門入就丹陛上拜位捧冊寶官由殿左門入至几筵前導引官奏四拜皇太孫親王皇孫陪拜丹陛上百官陪拜思善門外帝由殿左門入詣大行皇帝位前跪進冊進寶宣冊寶官跪宣畢奏俯伏興帝詣仁孝皇后神位前禮並同奏復位四拜皇太孫以下同禮畢行祭禮是日改題仁孝皇后神主詔頒天下是後上皇帝及太皇太后皇太后尊諡皆倣此嘉靖十七年世宗用豐坊奏加獻皇帝廟號稱宗配帝乃改奉太宗為成祖命製二聖神位於南宮遂詣景神殿奉冊寶尊文皇帝曰成祖啟天弘道高明肇運聖武神功純仁至孝文皇帝尊獻皇帝曰睿宗知天守道洪德淵仁寬穆純聖恭儉敬文獻皇帝又上皇天上帝大號十一月朔帝詣南郊恭進冊表禮成還詣太廟奉冊寶加上高皇帝尊號曰太祖開天行道肇紀立極大聖至神仁文義武俊德成功高皇帝加上高皇后尊號曰孝慈貞化哲順仁徽成天育聖至德高皇后是日中宮捧高皇后主助行亞獻禮文武官命婦陪祀復擇日詣太廟行改題神主禮廟諱天啟元年正月從禮部奏凡從點水加各字者俱改為雒從木加交字者俱改為較惟督學稱較字未宜應改為學政各王府及文武職官有犯廟諱御名者悉改之
