body:
  text: 明史卷一百五十列傳第三十八郁新趙羾金忠李慶師逵古朴向寶陳壽馬京許思溫劉季箎劉辰楊砥虞謙呂升仰瞻嚴本湯宗郁新字敦本臨淮人洪武中以人才徵授戶部度支主事遷郎中踰年擢本部右侍郎嘗問天下戶口田賦地理險易應答無遺帝稱其才尋進尚書時親王歲祿米五萬石新定議減五之四並定郡王以下祿有差又以邊餉不繼定召商開中法令商輸粟塞下按引支鹽邊儲以足夏原吉為戶部主事新重之諸曹事悉委任焉建文二年引疾歸成祖即位召掌戶部事以古朴為侍郎佐之永樂元年河南蝗有司不以聞新劾治之初轉漕北京新言自淮抵河多淺灘跌坡運舟艱阻請別用淺船載三百石者自淮河沙河運至陳州潁溪口跌坡下復用淺船載二百石者運至跌坡上別用大船運入黃河至八柳樹諸處令河南車夫陸運入衞河轉輸北京從之又言湖廣屯田所產不一請皆得輸官粟穀穈黍大麥蕎穄二石准米一石稻穀蔑秫二石五斗穇稗三石各准米一石豆麥芝蔴與米等著為令二年議公侯伯駙馬儀賓祿二百石以上者請如文武官例米鈔兼給三年以士卒勞困議減屯田歲收不如額者十之四五又議改納米北京贖罪者於南京倉皆允行是年八月卒於官帝歎曰新理邦賦十三年量計出入今誰可代者輟朝一日賜葬祭而召夏原吉還理部事新長於綜理密而不繁其所規畫後不能易趙羾字雲翰夏人徙祥符洪武中由鄉舉入太學授兵部職方司主事圖天下要害阨塞並屯戍所宜以進帝以為才遷員外郎建文初遷浙江參政建策捕海寇有功永樂二年使交阯還奏稱旨擢刑部侍郎改工部再改禮部五年進尚書賜宴華蓋殿撤膳羞遺其母初羾每以事為言者所劾帝不問九年秋朝鮮使臣將歸例有賜賚羾不以奏帝怒曰是且使朕失遠人心遂下之獄尋得釋使督建隆慶保安永寧諸州縣撫綏新集民安其業十五年丁母艱起復改兵部尚書專理塞外兵事帝北征轉餉有方仁宗嗣位改南京刑部宣德五年御史張楷劾羾及侍郎俞士吉怠縱召至命致仕羾性精敏歷事五朝位列卿自奉如寒素正統元年卒年七十三金忠鄞人少讀書善易卜兄戍通州亡忠補戍貧不能行相者袁珙資之既至編卒伍賣卜北平市多中市人傳以為神僧道衍稱於成祖成祖將起兵託疾召忠卜得鑄印乘軒之卦曰此象貴不可言自是出入燕府中常以所占勸舉大事成祖深信之燕兵起自署官屬授忠王府紀善守通州南兵數攻城不克已召置左右有疑輒問術益驗且時進謀畫遂拜右長史贊戎務為謀臣矣成祖稱帝論佐命功擢工部右侍郎贊世子守北京尋召還進兵部尚書帝起兵時次子高煦從戰有功許以為太子至是淇國公丘福等黨高煦勸帝立之獨忠以為不可在帝前歷數古嫡孽事帝不能奪密以告解縉黃淮尹昌隆縉等皆以忠言為是於是立世子為皇太子而忠為東宮輔導官以兵部尚書兼詹事府詹事六年命兼輔皇太孫帝北征留忠與蹇義黃淮楊士奇輔太子監國是時高煦奪嫡謀愈急蜚語譖太子十二年北征還悉徵東宮官屬下獄以忠勳舊不問而密令審察太子事忠言無有帝怒忠免冠頓首流涕願連坐以保之以故太子得無廢而宮僚黃淮楊溥等亦以是獲全忠起卒伍至大位甚見親倚每承顧問知無不言然慎密不洩處僚友不持兩端退推讓之明年四月卒給驛歸葬命有司治祠墓復其家洪熙元年追贈榮祿大夫少師諡忠襄官子達翰林檢討達剛直敢言仕至長蘆都轉運使忠有兄華負志節忠守通州有功欲推恩官之辭不就嘗召賜金綺亦不受成祖目為迂叟放還一日讀宋史至王倫附秦檜事放聲長歎而逝里中稱為白雲先生李慶字德孚順義人洪武中以國子生署右僉都御史後授刑部員外郎遷紹興知府永樂元年召為刑部侍郎性剛果有幹局馭下甚嚴帝以為才數命治他事不得時至部然屬吏與罪人交通私饋餉慶輒知之繩以重法五年改左副都御史兩遭親喪並起復時勳貴武臣多令子弟家人行商中鹽為官民害慶言舊制四品以上官員家不得與民爭利今都督蔡福等既行罰公侯有犯亦乞按問帝命嚴禁如制忻成伯趙彝擅殺運夫盜賣軍餉都督譚青朱崇貪縱慶劾之皆下吏已劾都督費瓛欺罔梁銘貪暴鎮守德州都督曹得黷貨皆被責中外凜其風采十八年進工部尚書尋兼領兵部事仁宗立改兵部加太子少保弋謙以言事忤旨呂震等交口詆之惟慶與夏原吉無所言帝尋悟降敕自責並責震等震等甚愧此兩人山陵事多趣辦中官有求執不與人多嚴憚之號為生李奉命侍皇太子謁孝陵在途約束將士秋毫無所擾太子欲獵慶諫止及太子還北京遂留慶南京兵部宣德二年安遠侯柳升討黎利命慶參贊軍務許擇部曹賢能者自隨師至鎮夷關升意輕賊不為備郎中史安主事陳鏞言於慶時慶已病甚強起告升升不聽直前中伏敗死慶病遂篤明日亦死一軍盡沒師逵字九達東阿人少孤事母至孝年十三母疾思藤花菜逵出城南二十餘里求得之及歸夜二鼓遇虎逵驚呼天虎舍之去母疾尋愈洪武中以國子生從御史出按事為御史所劾逮至帝偉其貌釋之謫御史臺書案牘久之擢御史遷陝西按察使獄囚淹繫千人浹旬盡決遣悉當其罪母憂去官廬墓側不飲酒食肉者三年成祖即位召為兵部侍郎改吏部永樂四年建北京宮殿分遣大臣出採木逵往湖湘以十萬衆入山闢道路召商賈軍役得貿易事以辦然頗嚴刻民不堪多從李法良為亂左中允周幹劾之時仁宗監國以帝所特遣置不問八年帝北征命總督餽餉逵請量程置頓堡更遞轉輸從之逵佐蹇義在吏部二十年人不敢干以私仁宗嗣位與趙羾古朴皆改官南京而逵進戶部尚書兼掌吏部宣德二年正月卒官年六十二逵廉不殖生產祿賜皆分宗黨有子八人至無以自贍成祖在北京嘗語左右曰六部扈從臣不貪者惟逵而已古朴字文質陳州人洪武中以太學生清理郡縣田賦圖籍還隸五軍斷事理刑自陳家貧願得祿養母帝嘉之除工部主事母歿官給舟歸葬服闋改兵部累遷郎中建文三年擢兵部侍郎成祖即位改戶部永樂二年朴奏先奉詔令江西湖廣及蘇松諸府輸糧北京今聞並患水潦轉運艱難而北京諸郡歲幸豐宜發鈔命有司增價收糴減南方運從之營建北京命採木江西以恤民見褒七年帝北巡皇太子監國召還佐夏原吉理戶部仁宗即位改南京通政使明年就拜戶部尚書出督畿內田賦師逵病命朴代之宣德三年二月卒於官初戶部主事劉良不檢乞中貴人求上考朴不可良遂誣奏朴罪朴就逮成祖察其誣得釋他日吏部奏予良誥仁宗曰此人素無行且嘗誣大臣不可與良後果以贓敗朴在朝三十餘年自郎署至尚書確然有守不通干請與右都御史向寶俱以清介稱寶字克忠進賢人洪武中以進士授兵部員外郎九年無過擢通政使以不善奏對力辭改應天府尹建文時坐事謫廣西成祖即位召復職已復坐事下獄降兩浙鹽運判官仁宗在東宮知其廉及即位召為右都御史兼詹事並給兩俸尋應詔陳八事多可採者宣德初改南京三年入覲帝憫其老命致仕歸卒於途寶有文學寬厚愛民而持身廉直屢遭困阨不稍易平居言不及利歷仕四十餘年卒之日家具蕭然陳壽隨人洪武中由國子生授戶部主事永樂元年遷員外郎出為山東參政所至以愛民為務用夏原吉薦召為工部左侍郎皇太子監國南京壽日陳兵民困又乘間言左右干恩澤者多恐累明德太子深納之嘗目送之出顧侍臣曰侍郎中第一人也九年以漢王高煦譖下獄貧不能給朝夕官屬有饋之者拒不受竟死獄中踰年啟殯如生仁宗即位贈工部尚書諡敏肅官其子瑺中書舍人後亦至工部侍郎與壽同下獄死者有馬京許思溫京武功人洪武中以進士授翰林編修歷左通政大理卿永樂元年為行部左侍郎皇太子守北京命兼輔導盡誠翊贊太子甚重之數為高煦所譖謫戍廣西仍坐前事逮下獄思溫字叔雍吳人以國子生署刑部主事累官北平按察副使燕師起思溫佐城守有勞擢刑部侍郎改吏部兼贊善亦以讒下獄皆瘐死仁宗立贈京少傅諡文簡思溫吏部尚書官其子俊贊禮郎進學翰林劉季箎名韶以字行餘姚人洪武中進士除行人使朝鮮却其餽贐帝聞賜衣鈔擢陝西參政陝有逋賦有司峻刑督民不能輸季箎至與其僚分行郡縣悉縱械者緩為期民感其德悉完納陝不產碙砂而歲有課季箎言於朝罷之洪渠水溢為治堰蓄洩遂為永利建文中召為刑部侍郎民有為盜所引者逮至盜已死乃召盜妻子使識之聽其辭誣也釋之吏虧官錢誣千餘人悉為辨免河陽逆旅朱趙二人異室寢趙被殺有司疑朱殺之考掠誣服季箎獨曰是非夙讎且其裝無可利緩其獄竟得殺趙者揚州民家盜夜入殺人遺刀屍傍刀有記識其隣家也官捕鞫之隣曰失此刀久矣不勝掠誣服季箎使人懷刀就其里潛察之一童子識曰此吾家物盜乃得永樂初纂修大典命姚廣孝解縉及季箎總其事八年坐失出下獄謫外任逡巡未行復下獄久之始釋命以儒服隸翰林院編纂尋授工部主事卒於官劉辰字伯靜金華人國初以署典籤使方國珍國珍飾二姬以進叱却之李文忠駐師嚴州辟置幕下元帥葛俊守廣信盛冬發民浚城濠文忠止之不聽文忠怒欲臨以兵辰請往諭之俊悔謝事遂已以親老辭歸建文中用薦擢監察御史出知鎮江府勤於職事瀕江田八十餘頃久淪於水賦如故以辰言得除京口閘廢轉漕者道新河出江舟數敗辰修故閘公私皆便漕河易涸仰練湖益水三斗門久廢辰修築之運舟既通湖下田益稔永樂初李景隆言辰知國初事召至預修太祖實錄遷江西布政司參政奏蠲九郡荒田糧歲饑勸富民貸饑者蠲其徭役以為之息官為立券期年而償辰居官廉勤尚氣與都司按察使不相得數爭坐免官十四年起行部左侍郎復留南京者三年帝念其老賜敕及鈔幣令致仕卒於途年七十八楊砥字大用澤州人洪武末由進士授行人司右司副上疏言揚雄為莽大夫貽譏萬世董仲舒天人三策及正誼明道之言足以扶翼世教今孔廟從祀有雄無仲舒非是帝從之歷官湖廣布政司參議建文中言帝堯之德始於親九族今宜惇睦諸藩無自剪枝葉不報父喪歸成祖即位起鴻臚寺卿乞終制服闋擢禮部侍郎坐視河渠失職降工部主事改禮部永樂十年遷北京行太僕寺卿時吳橋至天津大水決堤傷稼砥請開德州東南黃河故道及土河以殺水勢帝命工部侍郎藺芳經理之定牧馬法請令民五丁養種馬一匹十馬立羣頭一人五十馬立羣長一人養馬家歲蠲租糧之半而薊州以東至山海諸衞土地寬廣水草豐美其屯軍人養種馬一匹租亦免半帝命軍租盡蠲之餘悉從其議於是馬大蕃息砥剛介有守尤篤孝行十六年母喪哀毀未至家卒虞謙字伯益金壇人洪武中由國子生擢刑部郎中出知杭州府建文中請限僧道田人無過十畝餘以均給貧民從之永樂初召為大理寺少卿時有詔建文中上言改舊制者悉面陳謙乃言前事請罪帝見謙怖笑曰此秀才闢老佛耳釋弗問而僧道限田制竟罷都察院論誆騙罪準洪武榜例梟首以徇謙奏比奉詔準律斷罪誆騙當杖流梟首非詔書意帝從之天津衞倉災焚糧數十萬石御史言主者盜用多縱火自蓋逮幾八百人應死者百謙白其濫得論減七年帝北巡皇太子奏謙為右副都御史明年偕給事中杜欽巡視淮鳳抵陳州災傷免田租贖民所鬻子女明年謙請振太子諭之曰軍民困極而卿等從容請啟彼汲黯何如人也尋命督兩浙蘇松諸府糧輸南北京及徐州淮安富民賂有司率得近地而貧民多遠運謙建議分四等丁多糧最少者運北京次少者運徐州丁糧等者運南京淮安丁少糧多者存留本土民利賴之又言徐州呂梁二洪行舟多阻請每洪增挽夫二百月給廩官牛一百暇時聽民耕大舟至用以挽人以為便嘗督運木役者大疫謙令散處之疫遂息未幾偕給事中許能巡撫浙江仁宗即位召還改大理寺卿時呂升為少卿仰瞻為丞而謙又薦嚴本為寺正帝方矜慎刑獄謙等亦悉心奏當凡法司及四方所上獄謙等再四參復必求其平嘗語人曰彼無憾斯我無憾矣嘗應詔上言七事皆切中時務有言其奏事不密巿恩於外者帝怒降少卿一日楊士奇奏事畢不退帝問欲何言得非為虞謙乎士奇因具白其誣且言謙歷事三朝得大臣體帝曰吾亦悔之遂命復職宣宗立謙言舊制犯死罪者罰役終身今所犯不等宜依輕重分年限報可宣德二年三月卒於官謙美儀觀風采凝重工詩畫自負才望工部侍郎蘇瓚以鄙猥班謙上怏怏人以是隘其量云呂升山陰人永樂初為溧陽教諭歷官江西福建按察僉事所至有清慎聲入為大理寺少卿宣德八年致仕卒仰瞻長洲人永樂中由虎賁衞經歷遷大理寺丞正統間宦官王振用事百官多奔走其門惟瞻與大理卿薛瑄不往會與瑄辨殺夫冤獄益忤振下獄謫戍大同景泰初召為右寺丞執法愈堅在位者多不悅移疾歸加大理少卿嚴本字志道江陰人少通羣籍習法律以傅霖刑統賦辭約義博註者非一乃著輯義四卷永樂十一年以薦徵試以疑律敷析明暢授刑部主事侍郎張本掌部事官吏少當意者獨重本疑獄輒俾訊之奉命使徽州時督辦後期例罰工本不忍迫民或以為言本曰吾辦矣蓋已寓書其子鬻田為工作償也仁宗立以刑部尚書金純及虞謙薦改大理寺正斷獄者多以知情故縱及大不敬論罪本爭之曰律自叛逆數條外無故縱之文即不敬情有重輕豈可概入重比謙韙之悉為駁正良鄉民失馬疑其隣告於丞拷死丞坐決罰不如法當徒而告者坐紋本曰丞罪當告者因疑而訴律以誣告致死是丞與告者各殺一人可乎駁正之莒縣屯卒奪民田民訟於官卒被笞夜盜民驢民搜得之卒反以為誣擒送千戶民被禁死法司坐千戶徒本曰千戶生則死者冤矣遂正其故勘罪蘇州衞卒十餘人夜劫客舟於河西務一卒死懼事覺誣隣舟解囚人為盜其侶往救見殺皆誣服本疑之曰解人與囚同舟為盜囚必知之按驗果得實遂抵卒罪本立身方嚴非禮弗履其使徽也知府饋酒肴亦不受年七十八卒湯宗字正傳浙江平陽人洪武末由太學生擢河南按察僉事改北平建文時上變言按察使陳瑛受燕邸金錢有異謀詔逮瑛安置廣西而遷宗山東按察使坐事左遷刑部郎中出知蘇州府蘇連歲水民流逋租百餘萬石宗諭富民出米代輸富民知其愛民不三月悉完納永樂元年有言其坐視水患者逮下獄謫判祿州以黃淮薦召為大理寺丞或言宗曾發潛邸事帝曰帝王惟才是使何論舊嫌時外國貢使病死從人謂醫殺之獄具宗閱牘歎曰醫與使者何讐而故殺之乎卒辨出之尋命振饑河南還署戶部事解縉下獄詞連宗坐繫十餘年仁宗立復官再遷南京大理卿宣宗初清軍山東會天久不雨極陳民間饑困狀帝為蠲租免役罷不急之務宣德二年卒贊曰永宣之際嚴飭吏治職事修舉若郁新之理賦楊砥之馬政劉季箎虞謙之治獄可謂能其官矣李慶師逵諸人清介有執皆列卿之良也陳壽馬京遭讒早廢惜乎未竟其用金忠奮身卒伍進自藝術末流而有士君子之行當其侃侃持論於文皇父子間忠直不撓卒以誠信悟主豈不偉哉
