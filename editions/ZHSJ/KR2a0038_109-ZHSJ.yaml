body:
  text: 明史卷一百九表第十宰輔年表一明太祖初壹海內仍元制設中書省綜理機務其官有丞相平章左右丞參政而吏戶禮兵刑工六尚書為曹官行之一紀革中書省歸其政於六部遂設四輔官又倣宋制置殿閣大學士而其官不備其人亦無所表見燮理無聞何關政本視前代宰執迥乎異矣成祖簡翰林官直文淵閣參預機務有歷升至大學士者其時章疏直達御前多出宸斷儒臣入直備顧問而已至仁宗而後諸大學士歷晉尚書保傅品位尊崇地居近密而綸言批答裁決機宜悉由票擬閣權之重偃然漢唐宰輔特不居丞相名耳諸輔之中尤以首揆為重夫治道得失人才用舍理亂興衰繄宰臣是繫其賢邪忠佞清正貪鄙判若白黑百世不可掩也行蹟雖見紀傳而除免歲月不能盡悉故備列於表傳曰欲知宰相賢否視天下治亂覽斯表者可以證矣
