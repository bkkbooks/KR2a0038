body:
  text: 明史卷一百十六列傳第四諸王明制皇子封親王授金冊金寶歲祿萬石府置官屬護衞甲士少者三千人多者至萬九千人隸籍兵部冕服車旗邸第下天子一等公侯大臣伏而拜謁無敢鈞禮親王嫡長子年及十歲則授金冊金寶立為王世子長孫立為世孫冠服視一品諸子年十歲則授塗金銀冊銀寶封為郡王嫡長子為郡王世子嫡長孫則授長孫冠服視二品諸子授鎮國將軍孫輔國將軍曾孫奉國將軍四世孫鎮國中尉五世孫輔國中尉六世以下皆奉國中尉其生也請名其長也請婚祿之終身喪葬予費親親之誼篤矣考二百餘年之間宗姓實繁賢愚雜出今據所紀載自太祖時追封祔廟十五王以及列朝所封者著於篇而郡王以下有行義事實可採者世系亦得附見焉諸王一宗室十五王太祖諸子一秦王樉洴陽王誠洌晉王棡慶成王濟炫西河王奇溯新堞周王橚鎮平王有爌博平王安南陵王睦楧鎮國中尉睦鎮國將軍安鎮國中尉勤熨楚王楨武岡王顯槐齊王榑潭王梓趙王嵵魯王檀歸善王當沍輔國將軍當濆奉國將軍健根安丘王當壽金林熙祖二子長仁祖次壽春王俱王太后生壽春王四子長霍丘王次下蔡王次安豐王次蒙城王霍丘王一子寶應王安豐王四子六安王來安王都梁王英山王下蔡蒙城及寶應六安諸王先卒皆無後洪武元年追封二年定從祀禮祔享祖廟東西廡壽春霍丘安豐蒙城四王皆以王妃配食蒙城王妃田氏早寡有節行太祖甚重之十王四妃墓在鳳陽白塔祠官歲祀焉仁祖四子長南昌王次盱眙王次臨淮王次太祖俱陳太后生南昌王二子長山陽王無後次文正盱眙王一子昭信王無後臨淮王無子太祖起兵時諸王皆前卒獨文正在洪武初諸王皆追封從祀文正以罪謫死子守謙封靖江王自有傳正德十一年御史徐文華言宋儒程頤曰成人而無後者祭終兄弟之孫之身蓋從祖而祔亦從祖而毀未有祖祧而祔食之孫獨存者今懿僖二祖既祧太廟祔享諸王亦宜罷祀廷議不可文華竟以妄言下獄嘉靖中建九廟東西廡如故九廟災復同堂異室之制祔十五王於兩序盱眙臨淮王二妃配食南昌王妃王氏後薨祔葬皇陵不配食太祖二十六子高皇后生太子標秦王樉晉王棡成祖周王橚胡充妃生楚王楨達定妃生齊王榑潭王梓郭寧妃生魯王檀郭惠妃生蜀王椿代王桂谷王橞胡順妃生湘王柏韓妃生遼王植余妃生慶王楊妃生寧王權周妃生岷王楩韓王松趙貴妃生瀋王模李賢妃生唐王桱劉惠妃生郢王棟葛麗妃生伊王而肅王楧母郜無名號趙王嵵安王楹皇子楠皆未詳所生母秦愍王樉太祖第二子洪武三年封十一年就藩西安其年五月賜璽書曰關內之民自元氏失政不勝其敝今吾定天下又有轉輸之勞民未休息爾之國若宮室已完其不急之務悉已之十五年八月高皇后崩與晉燕諸王奔喪京師十月還國十七年皇后大祥復來朝尋遣還二十二年改大宗正院為宗人府以樉為宗人令二十四年以樉多過失召還京師令皇太子巡視關陝太子還為之解明年命歸藩二十八年正月命帥平羌將軍甯正征叛番於洮州番懼而降帝悅賚予甚厚其年三月薨賜諡冊曰哀痛者父子之情追諡者天下之公朕封建諸子以爾年長首封於秦期永綏祿位以藩屏帝室夫何不良於德竟殞厥身其諡曰愍樉妃元河南王王保保女弟次妃寧河王鄧愈女樉薨王妃殉子隱王尚炳嗣沔人高福興等為亂尚炳巡邊境上捕盜永樂九年使者至西安尚炳稱疾不出迎見使者又傲慢帝逮治王府官吏賜尚炳書曰齊王拜胙遂以國霸晉侯惰玉見譏無後王勉之尚炳懼來朝謝罪明年三月薨子僖王志嗣二十二年薨無子庶兄懷王志均由渭南王嗣宣德元年薨妃張氏未婚入宮守服弟康王志嗣好古嗜學四年護衞軍張嵩等訐其府中事志不安辭三護衞宣宗答書奬諭予一護衞志顧數聽細人正統十年誣奏鎮守都御史陳鎰按問皆虛而審理正秦弘等又交章奏王凌辱府僚箠死軍役帝再以書戒飭之景泰六年薨子惠王公錫嗣以賢聞成化二十二年薨子簡王誠泳嗣性孝友恭謹嘗銘冠服以自警秦川多賜地軍民佃以為業供租稅歲歉輒蠲之長安有魯齋書院久廢故址半為民居誠泳別易地建正學書院又旁建小學擇軍校子弟秀慧者延儒生教之親臨課試王府護衞得入學自誠泳始所著有經進小鳴集弘治十一年薨無子從弟臨潼王誠澯子昭王秉嗣十四年薨子定王惟焯嗣有賢行有司以聞嘉靖十九年敕表以綽楔獻金助太廟工益歲祿二百石賜玉帶襲衣惟焯嘗奏請潼關以西鳳翔以東河堧地曰皇祖所賜先臣樉也戶部尚書梁材執奏陝西外供三鎮內給四王民困已極豈得復奪堧地濫給宗藩詔如材言二十三年薨無子再從子宣王懷埢由中尉嗣奏以本祿千石贍諸宗賜敕奬諭四十五年薨子靖王敬鎔嗣萬曆四年薨子敬王誼嗣十四年薨無子弟誼漶由紫陽王嗣薨子存樞嗣李自成破西安存樞降於賊偽授權將軍妃劉氏死之汧陽王誠洌康王諸孫也事父及繼母以孝聞父疾經月不解帶及薨醯醬鹽酪不入口明年墓生嘉禾一本雙穗嘉瓜二實並蒂慈烏異鳥環集以母馬妃早卒不逮養追服衰食蔬者三年雪中萱草生華咸謂孝感所致弘治十五年賜敕嘉獎時有輔國將軍秉樺亦好學篤行父病禱於神乞以身代疾竟愈母喪廬墓有雙鶴集庭中定王以聞世宗表其門晉恭王棡太祖第三子也學文於宋濂學書於杜環洪武三年封十一年就藩太原中道笞膳夫帝馳諭曰吾帥羣英平禍亂不為姑息獨膳夫徐興祖事吾二十三年未嘗折辱怨不在大小子識之棡修目美髯顧盼有威多智數然性驕在國多不法或告棡有異謀帝大怒欲罪之太子力救得免二十四年太子巡陝西歸棡隨來朝敕歸藩自是折節待官屬皆有禮更以恭慎聞是時帝念邊防甚且欲諸子習兵事諸王封並塞居者皆預軍務而晉燕二王尤被重寄數命將兵出塞及築城屯田大將如宋國公馮勝潁國公傅友德皆受節制又詔二王軍中事大者方以聞三十一年三月薨子定王濟熺嗣永樂初帝以濟熺縱下黜其長史龍潭濟熺懼欲上護衞不許弟平陽王濟熿幼狠戾失愛於父及長太祖召秦晉燕周四世子及庶子之長者教於京師濟熿與燕王子高煦周王子有邪詭相比不為太祖所愛濟熺既嗣王成祖封濟熿平陽王濟熿追憾父幷憾濟熺不為解嗾其弟慶成王濟炫等日訴濟熺過於朝又誘府中官校文致其罪歷年不已十二年帝奪濟熺爵及世子美圭皆為庶人俾守恭王園而立濟熿為晉王濟熿既立益橫暴至進毒弒嫡母謝氏逼烝恭王侍兒吉祥幽濟熺父子蔬食不給父兄故侍從宮人多為所害莫敢言恭王宮中老媼走訴成祖乃即獄中召晉府故承奉左微問之盡得濟熿搆濟熺狀立命微馳召濟熺父子濟熺幽空室已十年矣左微者故因濟熺牽連繫獄或傳微死已久及至一府大驚微入空室釋濟熺父子相抱持大慟時帝北征駐驆沙城濟熺父子謁行在所帝見濟熺病惻然封美圭平陽王使奉父居平陽予以恭王故連伯灘田會帝崩濟熿遂不與美圭田仁宗連以書諭卒不聽又聞朝廷賜濟熺王者冠服及他賚予益怨望成祖仁宗之崩不為服使寺人代臨幕中廣致妖巫為詛咒不輟宣宗即位濟熿密遣人結高煦謀不軌寧化王濟煥告變比擒高煦又得濟熿交通書帝未之問也而濟熿所遣使高煦人懼罪及走京師首實內使劉信等數十人告濟熿擅取屯糧十萬餘石欲應高煦幷發其宮中詛咒事濟煥亦至是始知嫡母被弒馳奏遣人察實召至京示以諸所發奸逆狀廢為庶人幽鳳陽同謀官屬及諸巫悉論死時宣德二年四月也晉國絕封凡八年至英宗即位之二月乃進封美圭為晉王還居太原正統六年薨子莊王鍾鉉嗣弘治十五年薨世子奇源及其子表榮皆前卒表榮子端王知烊嗣知烊七歲而孤能盡哀居母喪嘔血芝生寢宮嘉靖十二年薨無子再從子簡王新嗣新化王表槏滎澤王表者端王諸父也表槏先卒子知嗣為新化王亦前卒二子新新墧端王請新嗣新化王未封而端王薨表謀攝府事端王妃王氏曰王無後次及新化王新化父子卒有孫新在即召入府拜几筵為喪主表忿曰我尊行顧不得王上疏言新故新化王長子不得為人後新宜嗣新化王新墧宜嗣晉王禮部議新宜嗣是為簡王新母太妃尚氏嚴教子以禮太妃疾新叩頭露禱長史有敷陳輒拜受教其老也以弟鎮國將軍新墧子慎鏡攝藩事萬曆三年薨慎鏡亦卒弟惠王慎鋷嗣七年薨子穆王敏淳嗣三十八年薨子求桂嗣李自成陷山西求桂與秦王存樞並為賊所執入北京不知所終慶成王濟炫晉恭王子其生也太祖方御慶成宴因以為封永樂元年徙居潞州坐擅發驛馬縱軍人為盜被責召還太原十年徙汾州薨諡莊惠曾孫端順王奇湞正德中以賢孝聞賜敕褒獎生子七十人嘉靖初尚書王瓊聞於朝嗣王表欒樸茂寡言孝友好文學嘉靖三十年壽八十詔書嘉獎賚以金幣輔國將軍奇添端順王弟也早卒夫人王氏守節奉姑六十餘年世宗時以節孝旌又溫穆王曾孫中尉知病篤淑人賀氏欲先死以殉取澒一勺咽之左右救奪遂絕飲食與知同時卒表欒以聞禮官言會典無旌命婦例世宗特命旌之諡曰貞烈西河王奇溯定王曾孫三歲而孤問父所在即慟哭長刻栴檀為父順簡王像祀之母病渴中夜稽顙禱天俄有甘泉自地湧出母飲泉病良已及卒哀毀骨立子表相嗣亦以仁孝聞與寧河王表楠河東嗣王奇淮並為人所稱新堞恭王七世孫家汾州崇禎十四年由宗貢生為中部知縣有事他邑土寇乘間陷其城坐免官已而復任署事者聞賊且至亟欲解印去新堞毅然曰此我致命之秋也即受之得賊所傳偽檄怒而碎之議拒守邑新遭寇無應者乃屬父老速去而己必死妻盧氏妾薛氏馮氏請先死許之有女數歲拊其背而勉之縊左右皆泣下乃書表封印使人馳送京師冠帶望闕拜又望拜其母遂自經士民葬之社壇側以妻女祔先是土寇薄城縣丞光先與戰不勝自焚死新堞哭之慟為之誄曰殺身成仁雖死猶生至是新堞亦死難周定王橚太祖第五子洪武三年封吳王七年有司請置護衞於杭州帝曰錢塘財賦地不可十一年改封周王命與燕楚齊三王駐鳳陽十四年就藩開封即宋故宮地為府二十二年橚棄其國來鳳陽帝怒將徙之雲南尋止使居京師世子有燉理藩事二十四年十二月敕歸藩建文初以橚燕王母弟頗疑憚之橚亦時有異謀長史王翰數諫不納佯狂去橚次子汝南王有告變帝使李景隆備邊道出汴猝圍王宮執橚竄蒙化諸子並別徙已復召還京錮之成祖入南京復爵加祿五千石永樂元年正月詔歸其舊封獻頌九章及佾舞明年來朝獻騶虞帝悅宴賜甚厚以汴梁有河患將改封洛陽橚言汴堤固無重勞民力乃止十四年疏辭所賜在城稅課十八年十月有告橚反者帝察之有驗明年二月召至京示以所告詞橚頓首謝死罪帝憐之不復問橚歸國獻還三護衞仁宗即位加歲祿至二萬石橚好學能詞賦嘗作元宮詞百章以國土夷曠庶草蕃廡考核其可佐饑饉者四百餘種繪圖疏之名救荒本草闢東書堂以教世子長史劉淳為之師洪熙元年薨子憲王有燉嗣博學善書弟有數訐有燉宣宗書諭之有與弟有熺詐為祥符王有爝與趙王書繫箭上置彰德城外詞甚悖都指揮王友得書以聞宣宗逮友訊無跡召有爝至曰必有所為訊之具服並得有熺掠食生人肝腦諸不法事於是並免為庶人有燉正統四年薨無子帝賜書有爝曰周王在日嘗奏身後務從儉約以省民力妃夫人以下不必從死年少有父母者遣歸既而妃鞏氏夫人施氏歐氏陳氏張氏韓氏李氏皆殉死詔諡妃貞烈六夫人貞順弟簡王有爝嗣景泰三年薨子靖王子垕嗣七年薨弟懿王子嗣成化二十一年薨子惠王同鑣嗣弘治十一年薨世子安未襲封而卒孫恭王睦嗣諡安悼王初安為世子與弟平樂王安泛義寧王安涘爭漁利置囹圄刑具集亡賴為私人惠王戒安不從王怒安泛因而傾之安亦持安泛不法事惠王薨羣小交搆安奏安泛私壞社稷壇營私第安泛亦誣奏安諸陰事下鎮巡官按驗頃之安死其子睦立而幼安泛侵陵世子妃安涘亦訐妃出不正其子不可嗣十三年帝命太監魏忠刑部侍郎何鑑按治安泛懼益誣世子毒殺惠王並世子妃淫亂所連逮千人鑑等奏其妄廢安泛為庶人幽鳳陽安涘亦革爵嘉靖十七年睦薨子勤熄先卒孫莊王朝堈嗣三十年薨子敬王在鋌嗣萬曆十年薨子端王肅溱嗣薨子恭枵嗣崇禎十四年冬李自成攻開封恭枵出庫金五十萬餉守陴者懸賞格殪一賊予五十金賊穴城守者投以火賊被爇死不可勝計乃解圍去明年正月帝下詔褒獎且加勞曰此高皇帝神靈憫宗室子孫維城莫固啟王心而降之福也其年四月自成再圍汴築長圍城中樵採路絕九月賊決河灌城城圮恭枵從後山登城樓率宮妃及寧鄉安鄉永壽仁和諸王露棲雨中數日援軍駐河北以舟來迎始獲免事聞賜書慰勞並賜帑金文綺命寄居彰德汴城之陷也死者數十萬諸宗皆沒府中分器寶藏盡淪於巨浸踰年乃從水中得所奉高帝高后金容迎至彰德奉焉久之王薨贈諡未行國亡其孫南走死於廣州鎮平王有爌定王第八子嗜學工詩作道統論數萬言又採歷代公族賢者自夏五子迄元太子真金百餘人作賢王傳若干卷博平王安惠王第十三子惠王有子二十五人而安獨賢嘗輯貽後錄養正錄諸書勤於治生田園僮奴車馬甚具賓客造門傾己納之其時稱名德者必曰博平南陵王睦楧悼王第九子敏達有識嘉靖四十一年御史林潤言天下財賦歲供京師米四百萬石而各藩祿歲至八百五十三萬石山西河南存留米二百三十六萬三千石而宗室祿米五百四萬石即無災傷蠲免歲輸亦不足供祿米之半年復一年愈加蕃衍勢窮弊極將何以支事下諸王議明年睦楧條上七議請立宗學以崇德教設科選以勵人才嚴保勘以杜冒濫革冗職以除素餐戒奔競以息饕貪制拜掃以廣孝思立憂制以省祿費詔下廷臣參酌之其後諸藩遂稍稍陳說利弊尚書李春芳集而上焉及頒宗藩條例多採睦楧議云鎮國中尉睦字灌甫鎮平王諸孫父奉國將軍安河以孝行聞於朝璽書旌賚既沒周王及宗室數百人請建祠詔賜祠額曰崇孝睦幼端穎郡人李夢陽奇之及長被服儒素覃精經學從河洛間宿儒游年二十通五經尤邃於易春秋謂本朝經學一禀宋儒古人經解殘闕放失乃訪求海內通儒繕寫藏歨若李鼎祚易解張洽春秋傳皆而傳之呂柟嘗與論易歎服而去益訪購古書圖籍得江都葛氏章丘李氏書萬卷丹鉛歷然論者以方漢之劉向築室東坡延招學者通懷好士而內行修潔事親晨昏不離側喪三年居外舍有弟五人親為教督盡推遺產與之萬曆五年舉文行卓異為周藩宗正領宗學約宗生以三六九日午前講易詩書午後講春秋禮記雖盛寒暑不輟所撰有五經稽疑六卷授經圖傳四卷韻譜五卷又作明帝世表周國世系表建文遜國褒忠錄河南通志開封郡志諸書巡撫御史褚鈇議稍減郡王以下歲祿均給貧宗帝遣給事中萬象春就周王議新會王睦樒號於衆曰裁祿之謀起於睦聚宗室千餘人擊之裂其衣冠上書抗詔帝怒廢睦樒為庶人睦屢疏引疾乞休詔勉起之又三年卒年七十宗人頌功德者五百人詔賜輔國將軍禮葬之異數也學者稱為西亭先生時有將軍安者一歲喪母事其父以孝聞父病革刲臂為湯飲父父良已年七十追念母不逮養服衰廬墓三年詔旌其門素精名理聲譽大著人稱睦為大山安為小山云又勤熨者鎮國中尉也嘉靖中上書曰陛下躬上聖之資不法古帝王兢業萬幾擇政任人乃溺意長生屢修齋醮興作頻仍數年來朝儀久曠委任非人遂至賄賂公行刑罰倒置奔競成風公私殫竭脫有意外變臣不知所終帝覽疏怒坐誹謗降庶人幽鳳陽子朝已賜名以罪人子無敢為請封者上書請釋父罪且陳中興四事詔並禁錮穆宗登極釋歸命有司存恤楚昭王楨太祖第六子始生時平武昌報適至太祖喜曰子長以楚封之洪武三年封楚王十四年就藩武昌嘗錄御註洪範及大寶箴置座右十八年四月銅鼓思州諸蠻亂命楨與信國公湯和江夏侯周德興帥師往討和等分屯諸洞立柵與蠻人雜耕作久之擒其渠魁餘黨悉潰三十年古州蠻叛帝命楨帥師湘王柏為副往征楨請餉三十萬又不親蒞軍帝詰責之命城銅鼓衞而還是年熒惑入太微詔諭楨戒慎楨書十事以自警未幾楨子巴陵王卒帝復與敕曰舊歲熒惑入太微太微天庭居翼軫楚分也五星無故入災必甚焉爾子疾逝恐災不止此尚省慎以回天意至冬王妃薨時初設宗人府以楨為右宗人永樂初進宗正二十二年薨子莊王孟烷嗣敬慎好學宣德中平江伯陳瑄密奏湖廣東南大藩襟帶湖湘控引蠻越人民蕃庶商賈輻聚楚設三護衞自始封至今生齒日繁兵強國富小人行險或生邪心請選其精銳以轉漕為名俟至京師因而留之可無後患帝曰楚無過不可孟烷聞之懼五年上書請納兩護衞自留其一帝勞而聽之正統四年薨子憲王季堄嗣事母鄧妃至孝英宗賜書獎諭著東平河間圖贊為士林所誦八年薨弟康王季埱嗣天順六年薨再從子靖王均鈋嗣正德五年薨子端王榮嗣以仁孝著稱武宗表曰彰孝之坊嘉靖十三年薨子愍王顯榕嗣居喪哀痛遇慶禮却賀端王壻儀賓沈寶與顯榕有隙使人誣奏顯榕左右呼顯榕萬歲且誘顯榕設水戲以習水軍世宗下其章撫臣具言顯榕居喪能守禮寶坐誣削為民顯榕妃吳氏生世子英燿性淫惡嘗烝顯榕宮人顯榕知之杖殺其所使陶元兒英燿又使卒劉金納妓宋么兒於別館顯榕欲罪金金遂誘英燿謀為逆嘉靖二十四年正月十八日張燈置酒饗顯榕別宴顯榕弟武岡王顯槐於西室酒半金等從座後出以銅瓜擊顯榕腦立斃顯槐驚救被傷奔免英燿徙顯榕屍宮中命長史孫立以中風報王從者朱貴抉門出告變撫按官以聞英燿懼具疏奏辨且逼崇陽王顯休為保奏通山王英炊不從直奏英燿弒逆狀詔遣中官及駙馬都尉鄔景和侍郎喻茂堅往訊英燿辭服詔逮入京是年九月告太廟伏誅焚屍揚灰悉誅其黨革顯休祿十之三顯槐英炊皆賚金幣而以顯榕次子恭王英嗣隆慶五年薨子華奎幼萬曆八年始嗣爵衞官王守仁上告曰遠祖定遠侯弼楚王楨妃父也遺瓌寶數十萬寄楚帑為嗣王侵匿詔遣中官清核華奎奏辨且請避宮搜掘皆不報久之繫鞫王府承奉等無所得時諸璫方以搜括希上意不欲暴守仁罪帝頗悟罷其事華奎乃奏上二萬金助三殿工三十一年楚宗人華等言華奎與弟宣化王華壁皆非恭王子華奎乃恭王妃兄王如言子抱養宮中華壁則王如綍家人王玉子也華妻即如言女知之悉禮部侍郎郭正域請行勘大學士沈一貫右華奎委撫按訊皆言偽王事無左驗而華妻持其說甚堅不能決廷議令覆勘中旨以楚王襲封已二十餘年宜治華等誣罔御史錢夢皐為一貫劾正域正域發華奎行賄一貫事華奎遂訟言正域主使正域罷去東安王英燧武岡王華增江夏王華塇等皆言偽跡昭著行賄有據諸宗人赴都投揭奉旨切責罰祿削爵有差華坐誣告降庶人錮鳳陽未幾華奎輸賄入都宗人遮奪之巡撫趙可懷屬有司捕治宗人蘊鉁等方恨可懷治楚獄不平遂大閧毆可懷死巡按吳楷以楚叛告一貫擬發兵會剿命未下諸宗人悉就縛於是斬二人勒四人自盡錮高出方攵及禁閒宅者復四十五人三十三年四月也自是無敢言楚事者久之禁錮諸人以恩詔得釋而華奎之真偽竟不白其後張獻忠掠湖廣華奎募卒自衞以張其在為帥獻忠兵至武昌其在為內應執華奎沉之江諸宗無得免者武岡王顯槐端王第三子也嘉靖四十三年上書條藩政請設宗學擇立宗正宗表督課親郡王以下子弟十歲入學月餼米一石三載督學使者考績陟其中程式者全祿之五試不中課則黜之給以本祿三之二其庶人暨妻女月餼六石庶女勿加恩其後廷臣集議多采其意齊王榑太祖第七子洪武三年封十五年就藩青州二十三年命王帥護衞及山東徐邳諸軍從燕王北征二十四年復帥護衞騎士出開平時已令潁國公傅友德調發山東都司各衞軍出塞諭王遇敵當自為隊奏凱之時勿與諸將爭功榑數歷塞上以武略自喜然性凶暴多行不法建文初有告變者召至京廢為庶人與周王同禁錮燕兵入金川門急遣兵護二王二王卒不知所以大怖伏地哭已知之乃大喜成祖令王齊如故榑益驕縱帝與書召來朝面諭王無忘患難時榑不悛陰畜刺客招異人術士為咒詛輒用護衞兵守青州城並城築苑牆斷往來守吏不得登城夜巡李拱曾名深等上急變榑拘匿以滅口永樂三年詔索拱諭榑改過是時周王橚亦中浮言上書謝罪帝封其書示榑明年五月來朝廷臣劾榑罪榑厲聲曰奸臣喋喋又欲效建文時耶會盡斬此輩帝聞之不懌留之京邸削官屬護衞誅指揮柴直等盡出榑繫囚及所造不法器械羣臣請罪教授葉垣等帝曰王性凶悖朕溫詔開諭至六七猶不悟教授輩如王何垣等先自歸發其事可勿問榑既被留益有怨言是年八月召其子至京師並廢為庶人宣德三年福建妄男子樓濂詭稱七府小齊王謀不軌事覺械至京誅其黨數百人榑及三子皆暴卒幼子賢爀安置廬州景泰五年徙齊庶人谷庶人置南京敕守臣慎防後谷庶人絕齊庶人請得谷庶人第嘉靖十三年釋高出方攵庶人長鑋榑曾孫也萬曆中有承綵者亦榑裔齊宗人多凶狡獨承綵頗好學云潭王梓太祖第八子洪武三年封十八年就藩長沙梓英敏好學善屬文嘗召府中儒臣設醴賦詩親品其高下賚以金幣妃於氏都督顯女也顯子初為寧夏指揮二十三年坐胡惟庸黨顯與琥俱坐誅梓不自安帝遣使慰諭且召入見梓大懼與妃俱焚死無子除其封趙王嵵太祖第九子洪武二年生次年受封明年殤魯荒王檀太祖第十子洪武三年生生兩月而封十八年就藩兗州好文禮士善詩歌餌金石藥毒發傷目帝惡之二十二年薨諡曰荒子靖王肇煇甫彌月母妃湯信國公和女撫育教誨有度永樂元年三月始得嗣成祖愛重之車駕北巡過兗錫以詩幣宣德初上言國長史鄭昭紀善王貞奉職三十年矣宜以禮致其事帝謂蹇義曰皇祖稱王禮賢敬士不虛也許之成化二年薨子惠王泰堪嗣九年薨子莊王陽鑄嗣嘉靖二年薨莊王在位久世子當漎當漎子健杙皆前卒健杙子端王觀嗣狎典膳秦信等游戲無度挾娼樂裸男女雜坐左右有忤者錐斧立斃或加以炮烙信等乘勢殘殺人館陶王當淴亦淫暴與觀交惡相訐奏帝念觀尚幼革其祿三之二逮誅信等亦革當淴祿三之一二十八年觀薨子恭王頤坦嗣有孝行捐邸中田湖贍貧民辭常祿給貧宗前後七賜璽書嘉勞萬曆二十二年薨世子壽先卒弟敬王壽鏳嗣二十八年薨弟憲王壽鋐嗣崇禎九年薨弟肅王壽鏞嗣薨子以派嗣十五年大清兵克兗州被執死弟以海轉徙台州張國維等迎居於紹興號魯監國順治三年六月大兵克紹興以海遁入海久之居金門鄭成功禮待頗恭既而懈以海不能平將往南澳成功使人沉之海中歸善王當沍莊王幼子也正德中賊攻兗州帥家衆乘城取護衞弓弩射却賊降敕獎諭遂以健武聞時有卒袁質與舍人趙巖俱家東平武斷為鄉人所惡吏部主事梁穀亦東平人少不檢倚惡少為助既貴頗厭苦之又與千戶高乾有怨正德九年穀邑人西鳳竹屈昂誑穀云質巖且為亂穀心動因並指乾等告變於尚書楊一清兵部議以大兵駐濟南伺變先是當沍數與質巖校射至是當沍父莊王聽長史馬魁譖言當沍結質巖欲反虞禍及奏於朝帝遣司禮太監溫祥大理少卿王純錦衣衞指揮韓端往按問祥等至圍當沍第執之祥等讞穀所指皆平人魁懼事敗乃諷所厚陳環及術士李秀佐證之復以書及賄抵鎮守太監畢真使逮二人詰問已而二人以實對書賄事亦為真所發於是御史李翰臣劾穀報怨邀功長史魁惑王罔奏宜即訊詔下翰臣獄謫廣德州判官免穀罪不問御史程啟充等疏言魁鼓煽流言死不蔽罪縱首禍而謫言者非國體不報廷臣議當沍罪卒無所坐以藏護衞兵器違祖制廢為庶人戍質等於肅州所連逮多瘐死魁坐誣奏斬鳳竹昂流口外中官送當沍之高牆當沍大慟曰冤乎觸牆死聞者傷之輔國將軍當濆鉅野王泰墱諸孫也慷慨有志節嘉靖三年上書請停郡縣主郡縣君卹典以蘇民困七年奏辭輔國將軍並子奉國將軍祿佐疏運河賜敕褒諭又上書言各藩郡縣主郡縣君先儀賓沒者故事儀賓得支半祿今四方災傷邊陲多事民窮財盡而各儀賓暴橫侈肆多不法請勿論品級減其月給明年又請以父子應得祿米佐振因勸帝法祖宗重國本裁不急之費息土木之工詞甚愷切帝嘉其意特敕褒之不聽辭祿時東甌王健楸無子上書言宗室所以蕃由詐以媵子為嫡糜費縣官今臣無嫡嗣請以所受府第屯廠盡歸魯府待給新封省民財萬一乞著為例報可奉國將軍健根鉅野王陽鎣諸孫博通經術年七十猶縱談名理亹亹不倦嘉靖中詔褒其賢孝子鎮國中尉觀熰字中立居母喪蔬食逾年哀毀骨立嘗繪太平圖上獻世宗嘉獎之賜承訓書院名額並五經諸書弟觀以詩畫著名同時鉅野中尉頤鱬安丘將軍頤墉聲詩清拔樂陵王頤亦喜稱詩安丘王當靖王曾孫少孤事祖父母以孝聞曾孫頤堀好學秉禮尤諳練典故藩邸中有大疑輒就決一意韜晦監司守令希見其面年七十餘猶手不廢書魯府宗室壽金林家兗州崇禎中為雲南通判有聲績永明王由榔在廣西以為右僉都御史使募兵值沙定州亂兵不能集孫可望兵至壽金林知不免張麾蓋往見之行三揖禮曰謝將軍不殺不掠之恩可望脅之降不從繫他所使人誘以官終不從從容題詩於壁或以詩報可望遂遇害
