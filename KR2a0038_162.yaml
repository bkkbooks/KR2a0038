body:
  text: 明史卷一百六十二列傳第五十尹昌隆耿通陳諤戴綸林長懋陳祚郭循劉球子鉞釪陳鑑何觀鍾同孟楊集章綸子玄應廖莊倪敬盛等楊瑄子源盛顒等尹昌隆字彥謙泰和人洪武中進士及第授修撰改監察御史惠帝初即位視朝晏昌隆疏諫曰高皇帝雞鳴而起昧爽而朝未日出而臨百官故能庶績咸熙天下乂安陛下嗣守大業宜追繩祖武兢兢業業憂勤萬幾今乃即於晏安日上數刻猶未臨朝羣臣宿衛疲於伺候曠職廢業上下懈弛播之天下傳之四裔非社稷福也帝曰昌隆言切直禮部其宣示天下使知朕過未幾以地震上言謫福寧知縣燕兵既逼昌隆以北來奏章動引周公輔成王為詞勸帝罷兵許王入朝設有蹉跌便舉位讓之若沈吟不斷進退失據將求為丹徒布衣且不可得成祖入京師昌隆名在姦臣中以前奏貸死命傅世子於北平永樂二年册世子為皇太子擢昌隆左春坊左中允隨事匡諫太子甚重之解縉之黜同日改昌隆禮部主事尚書呂震方用事性刻忮當其獨處精思以手指刮眉尾則必有密謀深計官屬相戒無敢白事者昌隆前白事震怒不應移時又白之震愈怒拂衣起昌隆退白太子取令旨行之震大怒奏昌隆假托宮僚陰欲樹結潛蓄無君心逮下獄尋遇赦復官父憂起復謁震震溫言接之入理前奏復下錦衣衛獄籍其家帝凡巡幸下詔獄者率輿以從謂之隨駕重囚昌隆與焉後數年谷王謀反事發以王前奏昌隆為長史坐以同謀詔公卿雜問昌隆辨不已震折之獄具置極刑死夷其族後震病且死號呼尹相言見昌隆守欲殺之云耿通齊東人洪武中舉於鄉授襄陽教授永樂初擢刑科給事中歷左右給事剛直敢言嘗劾都御史陳瑛御史袁綱覃珩朋比為蒙蔽搆陷無辜綱珩已下獄瑛長官不宜獨宥又言驍騎諸衛倉壞工部侍郎陳壽不預修糧至無所受多損耗病民工部尚書宋禮不恤下匠役滿不即遣歸多至失所瑛等皆被鐫責當是時給事中敢言者通與陳諤舉朝憚其風采久之擢大理寺右丞帝北巡太子監國漢王高煦謀奪嫡陰結帝左右為讒間宮僚多得罪者監國所行事率多更置通從容諫帝太子事無大過誤可無更也數言之帝不悅十年秋有言通受請托故出人罪者帝震怒命都察院會文武大臣鞫之午門曰必殺通無赦羣臣如旨當通罪斬帝曰失出細故耳通為東宮關説壞祖法離間我父子不可恕其置之極刑廷臣不敢爭竟論姦黨磔死陳諤字克忠番禺人永樂中以鄉舉入太學授刑科給事中遇事剛果彈劾無所避每奏事大聲如鐘帝令餓之數日奏對如故曰是天性也每見呼為大聲秀才嘗言事忤旨命坎瘞奉天門露其首七日不死赦出還職已復忤旨罰修象房貧不能雇役躬自操作適駕至問為誰諤匍匐前具道所以帝憐之命復官歷任順天府尹政尚嚴鷙執政忌之出為湖廣按察使改山西坐事落職仁宗即位遇赦當還故官帝以諤前在湖廣頗托楚王細故謫海鹽知縣遷荊王長史為王府所厭苦宣德三年遷鎮江同知致仕歸卒戴綸高密人永樂中自昌邑訓導擢禮科給事中與編修林長懋俱侍皇太孫説書歷中允諭德仁宗即位太孫為太子遷洗馬仍侍講讀始成祖命太孫習武事太孫亦雅好之時出騎射綸與長懋以太孫春秋方富不宜荒學問而事遊畋時時進諫綸又具疏為帝言之他日太孫侍帝問宮臣相得者誰也太孫以綸對因出綸奏付之太孫由此怨綸長懋者莆田人以鄉薦歷青州教授擢編修仁宗初進中允為人剛嚴纍進直言與綸善宣宗即位加恩宮僚擢綸兵部侍郎頃之復以諫獵忤旨命參贊交址軍務而長懋自南京來後至亦出為鬱林知州無何坐怨望並逮至京下錦衣衛獄帝臨鞫之綸抗辨觸帝怒立箠死籍其家諸父河南知府賢太僕寺卿希文皆被繫而長懋在獄十年英宗立乃得釋復其官還守鬱林有惠政其卒也州人立廟祀之陳祚字永錫吳人永樂中進士擢河南參議十五年與布政使周文褒王文振合疏言建都北京非便並謫均州太和山佃戶躬耕力作處之晏然仁宗立詔選用遷謫諸臣祚在選中會帝崩不果用宣德二年命憲臣即均州羣試之祚策第一試吏部復第一遂擢御史巡按福建方面大吏多被彈擊禁止和買閩人德之還奏白塔河上通邵伯湖下注大江蘇松舟楫多從往來淺狹湮塞請開濬從之轉漕果便尋出按江西時天下承平帝頗事遊獵玩好祚馳疏勸勤聖學其略曰帝王之學先明理明理在讀書陛下雖有聖德而經筵未甚興舉講學未有程度聖賢精微古今治亂豈能周知洞晰真德秀大學衍義一書聖賢格言無不畢載願於聽政之暇命儒臣講説非有大故無得間斷使知古今若何而治政事若何而得必能開廣聰明增光德業而邪佞之以奇巧蕩聖心者自見疏遠天下人民受福無窮矣帝見疏大怒曰豎儒謂朕未讀大學耶薄朕至此不可不誅學士陳循頓首曰俗士處遠不知上無書不讀也帝意稍解下祚獄逮其家人十餘口隔別禁繫者五年其父竟瘐死其時刑部主事郭循諫拓西內皇城修離宮逮入面詰之循抗辨不屈亦下獄英宗立祚與循皆得釋復官祚再按湖廣以奏遼王貴烚罪有所隱與巡撫侍郎吳政逮至京下獄尋赦出時王振用事法務嚴峻祚上言乃者法司論獄多違定律如侍郎吳璽誤舉主事吳軏宜坐貢舉非其人律乃坐以奏事有規避律斬及軏自經死獄官獄卒罪應遞減乃援不應為重罪概杖之一事如此餘可推矣天時不順災沴數見未必非此帝是之以其章示法司尋改南京遷福建按察使僉事有威惠神祠不載祀典者悉撤去久之以疾歸卒祚天資嚴毅雖子弟罕接其言笑獨重里人邢量量博學士隱於卜敝屋數椽或竟日不舉火祚數挾册就質疑往往至暮郭循字循初廬陵人居官有才譽既復職進郎中以尚書魏源薦擢廣東參政有剿寇功景泰初卒劉球字廷振安福人永樂十九年進士家居讀書十年從學者甚衆授禮部主事胡濙薦侍經筵與修宣宗實録改翰林侍講從弟玭知莆田遺一夏布球封還貽書戒之正統六年帝以王振言大舉征麓川球上疏曰帝王之馭四裔必宥其小而防其大所以適緩急之宜為天下久安計也周伐崇不克退修德教以待其降至於玁狁則命南仲城朔方以備之漢征南越不利即罷兵賜書通好至於胸奴雖已和親猶募民徙居塞下入粟實邊復命魏尚守雲中拒之今麓川殘寇思任發素本羈屬以邊將失馭致勤大兵雖渠魁未殲亦多戮羣醜為誅為舍無繫輕重璽書原其罪釁使得自新甚盛德也邊將不達聖意復議大舉欲屯十二萬衆於雲南以趣其降不降則攻之不慮王師不可輕出蠻性不可驟馴地險不可用衆客兵不可久淹況南方水旱相仍軍民交困若復動衆紛擾為憂臣竊謂宜緩天誅如周漢之於崇越也至於瓦剌終為邊患及其未即騷動正宜以時防禦乃欲移甘肅守將以事南征卒然有警何以為禦臣竊以為宜慎防遏如周漢之於玁狁胸奴也伏望陛下罷大舉之議推選智謀將帥輔以才識大臣量調官軍分屯金齒諸要害結木邦諸蠻以為援乘間進攻因便撫諭寇自可服至於西北障塞當敕邊臣巡視濬築溝垣增繕城堡勤訓練嚴守望以防不虞有備無患之道也章下兵部謂南征已有成命不用球言八年五月雷震奉天殿球應詔上言所宜先者十事其略曰古聖王不作無益故心正而天不違之臣願皇上勤御經筵數進儒臣講求至道務使學問功至理欲判然則聖心正而天心自順夫政由己出則權不下移太祖太宗日視三朝時召大臣於便殿裁決庶政權歸總於上皇上臨御九年事體日熟願守二聖成規復親決故事使權歸於一古之擇大臣者必詢諸左右大夫國人及其有犯雖至大辟亦不加刑第賜之死今用大臣未嘗皆出公論及有小失輒桎梏箠楚之然未幾時又復其職甚非所以待大臣也自今擇任大臣宜允愜衆論小犯則置之果不可容下法司定罪使自為計勿輒繫庶不乖共天職之意今之太常即古之秩宗必得清慎習禮之臣然後可交神明今卿二皆缺宜選擇儒臣使領其職古者省方巡狩所以察吏得失問民疾苦兩漢唐宋盛時數遣使巡行郡縣洪永間亦嘗行之今久不舉故吏多貪虐民不聊生而軍衛尤甚宜擇公明廉幹之臣分行天下古人君不親刑獄必付理官蓋恐徇喜怒而有所輕重也邇法司所上獄多奉敕增減輕重法司不能執奏及訊他囚又觀望以為輕重民用多冤宜使各舉其職至運磚輸米諸例均非古法尤宜罷之春秋營築悉書戒勞民也京師興作五六年矣曰不煩民而役軍軍獨非國家赤子乎況營作多完宜罷工以蘇其力各處水旱有司既不振救請減租稅或亦徒事虛文宜令戶部以時振濟量加減免使不致失業麓川連年用兵死者十七八軍資爵賞不可勝計今又遣蔣貴遠征緬甸責獻思任發果擒以歸不過梟諸通衢而已緬將挾以為功必求與木邦共分其地不與則致怒與之則兩蠻坐大是減一麓川生二麓川也設有蹉跎兵事無已臣見皇上每録重囚多宥令從軍仁心若此今欲生得一失地之竄寇而驅數萬無罪之衆以就死地豈不有乖於好生之仁哉況思機發已嘗遣人來貢非無悔過乞免之意若敕緬斬任發首來獻仍敕思機發盡削四境之地分於各寨新附之蠻則一方可寧矣迤北貢使日增包藏禍心誠為難測宜分遣給事御史閲視京邊官軍及時訓練勿使借工各廠服役私家公武舉之選以求良將定召募之法以來武勇廣屯田公鹽法以厚儲蓄庶武備無缺而外患有防疏入下廷議言球所奏惟擇太常官宜從令吏部推舉修撰董璘遂乞改官太常奉享祀事初球言麓川事振固已銜之欽天監正彭德清者球鄉人也素為振腹心凡天文有變皆匿不奏倚振勢為姦公卿多趨謁球絶不與通德清恨之遂摘疏中攬權語謂振曰此指公耳振益大怒會璘疏上振遂指球同謀並逮下詔獄屬指揮馬順殺球順深夜攜一小校持刀至球所球方臥起立大呼太祖太宗頸斷體猶植遂支解之瘞獄戶下璘從旁竊血裙遺球家後其子鉞求得一臂裹裙以殮順有子病久忽起捽順髮拳且蹴之曰老賊令爾他日禍逾我我劉球也順驚悸俄而子死小校亦死璘字德文高郵人有孝行獄解遂歸不復出球死數年瓦剌果入寇英宗北狩振被殺朝士立擊順斃之而德清自土木遁還下獄論斬尋瘐死詔戮其尸景帝憐球忠贈翰林學士諡忠愍立祠於鄉球二子長鉞次釪皆篤學躬耕養母球既得恤兄弟乃出應舉先後成進士鉞廣東參政釪雲南按察使陳鑑字貞明高安人宣德二年進士授行人正統中擢御史出按順天言京師風俗澆漓其故有五一事佛過甚二營喪破家三服食靡麗四優倡為蠹五博塞成風章下禮部格不行改按貴州時麓川酋思任發子思機發遁孟養屢上書求宥罪通貢不許復大舉遠征兵連不解雲貴軍民疲敝苗乘機煽動閩浙間盜賊大起舉朝皆知其不可懲劉球禍無敢諫者十四年正月鑑抗疏言賊酋遠遁不為邊患宜專責雲南守臣相機剿滅無遠勞禁旅王振怒欲困之改鑑雲南參議使赴騰衝招賊已復托鑑為巡按時嘗請改四川播州宣慰司隸貴州為鑑罪令兵部劾之論死繫獄景帝嗣位乃得赦尋授河南參議致仕歸卒自正統中劉球以忤王振冤死鑑繼下獄中外莫敢言事者數年至景帝時言路始開爭發憤上書有何觀者復以言得罪去觀以善書為中書舍人景泰二年劾尚書王直輩正統時阿附權姦不宜在左右中貴見權姦語以為侵己激帝怒下科道參議吏科毛玉主奏稿力詆觀林聰葉盛持之乃刪削奏上會御史疏亦上中有觀考滿不遷私憾吏部語帝怒下觀詔獄杖之謫九溪衛經歷鍾同字世京吉安永豐人父復宣德中進士及第歷官修撰與劉球善球上封事約與俱復妻勸止之球詣復邸邀偕行復已他往妻從屏間詈曰汝自上疏何纍他人為球出歎曰彼乃謀及婦人遂獨上奏竟死居無何復亦病死妻深悔之每哭輒曰早知爾曷若與劉君偕死同幼聞母言即感奮思成父志嘗入吉安忠節祠見所祀歐陽修楊邦乂諸人歎曰死不入此非夫也景泰二年舉進士明年授御史懷獻太子既薨中外望復沂王於東宮同與郎中章綸早朝語及沂王皆泣下因與約疏請復儲五年五月同因上疏論時政遂及復儲事其略曰近得賊諜言也先使偵京師及臨清虛實期初秋大舉深入直下河南臣聞之不勝寒心而廟堂大臣皆恬不介意昔秦伐趙諸侯自若孔子順獨憂之人皆以為狂臣今者之言何以異此臣草茅時聞寺人搆惡戕戮直臣劉球遂致廷臣箝口假使當時犯顏有人必能諫止上皇之行何至有蒙塵之禍陛下赫然中興鋤姦黨旌忠直命六師禦敵於郊不戰而三軍之氣自倍臣謂陛下方且鞭撻四裔坐致太平奈何邊氛甫息瘡痍未復而侈心遽生失天下望伏願取鑒前車厚自奮厲毋徇貨色毋甘嬉遊親庶政以總威權敦倫理以厚風俗辨邪正以專委任嚴賞罰以彰善惡崇風憲以正紀綱去浮費罷冗員禁僧道之蠹民擇賢將以訓士然後親率羣臣謝過郊廟如成湯之六事自責唐太宗之十漸即改庶幾天意可回國勢可振又言父有天下固當傳之於子乃者太子薨逝足知天命有在臣竊以為上皇之子即陛下之子沂王天資厚重足令宗社有託伏望擴天地之量敦友于之仁蠲吉具儀建復儲位實祖宗無疆之休又言陛下命將帥各陳方略經旬踰時互相委責及石亨柳溥有言又不過庸人孺子之計平時尚爾一旦有急將何策制之夫禦敵之方莫先用賢陛下求賢若渴而大臣之排抑尤甚所舉者率多親舊富厚之家即長材屈抑孰肯為言朝臣欺謾若此臣所以撫膺流涕為今日妨賢病國者醜也疏入帝不懌下廷臣集議寧陽侯陳懋吏部尚書王直等請帝納其言因引罪求罷帝慰留之越數日章綸亦疏言復儲事遂並下詔獄明年八月大理少卿廖莊亦以言沂王事豫杖左右言事由同倡帝乃封巨梃就獄中杖之同竟死時年三十二同之上疏也策馬出馬伏地不肯起同叱曰吾不畏死爾奚為者馬猶盤辟再四乃行同死馬長號數聲亦死英宗復位贈同大理左寺丞録其子啓為國子生尋授咸寧知縣啓請父遺骸歸葬詔給舟車路費成化中授次子越通政知事給同妻羅氏月廩尋賜同諡恭愍從祀忠節祠與球聯位竟如同初志方同下獄時有禮部郎孟者亦疏言復儲事帝不罪而進士楊集上書于謙曰姦人黃獻議易儲不過為逃死計耳公等遽成之公國家柱石獨不思所以善後乎今同等又下獄矣脫諸人死杖下而公等坐享崇高如清議何謙以書示王文文曰書生不知忌諱要為有膽當進一官處之乃以集知安州閩人集常熟人也章綸字大經樂清人正統四年進士授南京禮部主事景泰初召為儀制郎中綸見國家多故每慷慨論事嘗上太平十六策反覆萬餘言也先既議和請力圖修攘以待其變中官興安請帝建大隆福寺成將臨幸綸具疏諫河東鹽運判官濟南楊浩除官未行亦上章諫帝即罷幸浩後纍官副都御史巡撫延綏綸又因災異請求致變之由語頗切至五年五月鍾同上奏請復儲越二日綸亦抗疏陳修德弭災十四事其大者謂內官不可干外政佞臣不可假事權後宮不可盛聲色凡陰盛之屬請悉禁罷又言孝弟者百行之本願退朝後朝謁兩宮皇太后修問安視膳之儀上皇君臨天下十有四年是天下之父也陛下親受册封是上皇之臣也陛下與上皇雖殊形體實同一人伏讀奉迎還宮之詔曰禮惟加而無替義以卑而奉尊望陛下允蹈斯言或朔望或節旦率羣臣朝見延和門以展友于之情實天下之至願也更請復汪后於中宮正天下之母儀還沂王之儲位定天下之大本如此則和氣充溢災沴自弭疏入帝大怒時日已暝宮門閉乃傳旨自門隙中出立執綸及鍾同下詔獄榜掠慘酷逼引主使及交通南宮狀瀕死無一語會大風揚沙晝晦獄得稍緩令錮之明年杖廖莊闕下因封杖就獄中杖綸同各百同竟死綸長繫如故英宗復位郭登言綸與廖莊林聰左鼎倪敬等皆直言忤時宜加旌擢帝乃立釋綸命內侍檢前疏不得內侍從旁誦數語帝嗟歎再三擢禮部右侍郎綸既以大節為帝所重而性亢直不能諧俗石亨貴幸招公卿飲綸辭不往又數與尚書楊善論事不合亨善共短綸乃調南京禮部就改吏部憲宗即位有司以遺詔請大婚綸言山陵尚新元朔未改百日從吉必寧自安陛下踐阼之初當以孝治天下三綱五常實原於此乞俟來春舉行議雖不從天下咸重其言成化元年兩淮飢奏救荒四事皆報可四年秋子玄應以冒籍舉京闈給事中朱清御史楊智等因劾綸命侍郎葉盛勘之明年綸及僉都御史高明考察庶官兩人議不協疏既上綸復獨奏給事中王讓不赴考察且言明剛愎自用己言多不見從乞與明俱罷章並下盛等於是讓及下考諸臣連章劾綸綸亦屢疏求罷帝不聽既而盛等勘上玄應實冒籍帝宥綸而所奏他事亦悉不問未幾復轉禮部溫州知府范奎被論調官綸言溫州臣鄉郡奎大得民心解官之日士民三萬人哭泣攀轅留十八日乃得去請還之以慰民望章下所司竟報寢綸性戇好直言不為當事者所喜為侍郎二十年不得遷請老去久之卒居數年其妻張氏上其奏稿且乞恩帝嘉歎贈南京禮部尚書諡恭毅官一子鴻臚典簿玄應後舉進士為南京給事中偕同官論陳鉞罪忤旨停俸孝宗嗣位上治本五事仕終廣東布政使廖莊字安止吉水人宣德五年進士八年改庶吉士與知縣孔友諒等七人歷事六科英宗初授刑科給事中正統二年御史元亮請如詔書蠲邊軍侵沒糧餉不允按察使龔鐩亦請如詔書宥盜犯之未獲者法司亦寢不行莊以詔書當信上章爭之五年詔京官出修荒政兼徵民逋莊慮使者督趣困民請寬災傷州縣俟秋成從之振荒陝西全活甚衆還奏寬恤九事多議行楊士奇家人犯法偕同官論列或曰獨不為楊公地乎曰正所以為楊公也八年命與御史張驥同署大理寺事踰月授左寺丞十一年遷南京大理少卿踰二年姦人陳玞者與所親賈福爭襲指揮職南京刑部侍郎齊韶納玞賄欲奪福官與之為莊所駁韶捶福至死被逮玞亦誣莊俱徵下詔獄會韶他罪並發棄市莊乃得釋景泰五年七月上疏曰臣曩在朝見上皇遣使册封陛下每遇慶節必令羣臣朝謁東廡恩禮隆洽羣臣皆感歎謂上皇兄弟友愛如此今陛下奉天下以事上皇願時時朝見南宮或講明家法或商略治道歲時令節俾羣臣朝見以慰上皇之心則祖宗在天之神安天地之心亦安矣太子者天下之本上皇之子陛下之猶子也宜令親儒臣習書策以待皇嗣之生使天下臣民曉然知陛下有公天下之心豈不美歟蓋天下者太祖太宗之天下仁宗宣宗繼體守成者此天下也上皇北征亦為此天下也今陛下撫而有之宜念祖宗創業之艱難思所以係屬天下之人心即弭災召祥之道莫過於此疏入不報明年莊以母喪赴京關給勘合詣東角門朝見帝憶莊前疏命廷杖八十謫定羌驛丞天順初召還時母喪未終復遭父喪特豫祭葬命起復仍官南京天順五年就擢禮部右侍郎改刑部成化初召為刑部左侍郎逾年卒贈尚書諡恭敏莊性剛喜面折人過而實坦懷無芥蒂不屑細謹好存謝賓客為歡狎既官法司或勸稍屏謝往來遠嫌疑莊笑曰昔人有言臣門如市臣心如水吾無愧吾心而已卒之日無以為斂衆裒錢助其喪初景帝時英宗在南宮左右為離間及懷憲太子薨羣小恐沂王復立讒搆愈甚故鍾同章綸與莊相繼力言皆得罪然帝頗感悟六年七月辛巳刑科給事中徐正請間言事亟召入乃言上皇臨御歲久沂王嘗位儲副天下臣民仰戴宜遷置所封之地以絶人望別選親王子育之宮中帝驚愕大怒立叱出之欲正其罪慮駭衆乃命謫遠任而帝怒未解已復得其淫穢事謫戍鐵嶺衛蓋帝雖怒同等所言過激而小人之言亦未遽聽也逮英宗復辟于謙王文以謀立外藩誅死其事遂不白云倪敬字汝敬無錫人正統十三年進士擢御史景泰初畿輔飢命出視請蠲田租戶部持不可再疏爭竟得請巡按山西時有入粟補官令敬奏罷之戍將侵餉者悉按治豪猾斂迹再按福建時議將復銀冶敬未行抗疏論得寢既至奏罷諸司器物濫取於民者鎮守內臣戴細保貪橫敬列其罪以聞帝召細保還命敬捕治其黨吏民相慶代還留家四月逮治尋復職六年七月以時多災異偕同官吳江盛江陰杜宥蕪湖黃讓安福羅俊固始汪清上言府庫之財不宜無故而豫遊觀之事不宜非時而行曩以齋僧屢出帑金易米不知櫛風沐雨之邊卒趨事急公之貧民又何以濟之近聞造龍舟作燕室營繕日增嬉遊不少非所以養聖躬也章綸鍾同直言見忤幽錮踰年非所以昭聖德也願罷桑門之供輟宴佚之娛止興作之役寬直臣之囚帝得疏不懌下之禮部部臣稱其忠愛帝報聞然意終不釋未幾詔都御史蕭維禎考察其屬諭令去之御史罷黜者十六人而敬等預焉皆謫為典史敬得廣西宜山英宗復辟詔皆授知縣乃以敬知祥符安遠侯柳溥器敬西征請以自隨改都督府都事踰年師還卒士類惜之盛等五人皆進士雋爽負氣嘗按廣東劾巡撫侍郎揭稽不職稽坐左遷後為羅江知縣擢州知府並有禦寇功杜宥為英德知縣鄰境多寇創立縣城嘗被圍糧盡宥死守不下夜縋死士焚其營賊始驚潰移韶州通判謝病歸黃讓知安嶽遷中府都事以撻錦衣衛隸為門達所譖戍廣西赦還復冠帶貧甚課耕自給羅俊嘗巡按四川有廉聲仕終南雄知府楊瑄字廷獻豐城人景泰五年進士授御史剛直尚氣節景帝不豫廷臣請立東宮帝不允瑄與同官錢璡樊英等約疏爭會奪門事起乃已天順初印馬畿內至河間民訴曹吉祥石亨奪其田瑄以聞並列二人怙寵專權狀帝語大學士李賢徐有貞曰真御史也遂遣官按核而命吏部識瑄名將擢用吉祥聞之懼訴於帝請罪之不許未幾亨西征還適彗星見十三道掌道御史張鵬盛顒周斌費廣張寬王鑑趙文博彭烈張奎李人儀邵銅鄭冕陶復及御史劉泰魏翰康驥將劾亨吉祥諸違法事先一日給事中王鉉泄於亨亨與吉祥泣訴帝誣鵬等為已誅內官張永從子結黨排陷欲為永報讐明日疏入帝大怒收鵬及瑄御文華殿悉召諸御史擲彈章俾自讀斌且讀且對神色自若至冒功濫職帝詰之曰彼帥將士迎駕朝廷論功行賞何云冒濫斌曰當時迎駕止數百人光祿賜酒饌名數具在今超遷至數千人非冒濫而何帝默然竟下瑄鵬及諸御史於獄榜掠備至詰主使者瑄等無所引乃坐都御史耿九疇羅綺主謀亦下獄論瑄鵬死餘遣戍亨等復譖諸言官帝諭吏部給事御史年踰三十者留之餘悉調外尚書王翺列上給事中何等十三人御史吳禎等二十三人詔以等為州判官禎等為知縣會大風震雷拔木發屋須臾大雨雹亨吉祥家大木俱折二人亦懼掌欽天監禮部侍郎湯序本亨黨亦言上天示警宜恤刑獄於是帝感悟戍瑄鵬鐵嶺衛餘貶知縣泰翰驥三人復職而禎等亦得無調瑄鵬行半道適承天門災肆赦放還或謂當詣亨吉祥謝二人卒不往復謫戍南丹憲宗即位並還故官瑄尋遷浙江副使按行海道禁將校私縱戍卒修捍海塘築海鹽堤岸二千三百丈民得奠居為副使十餘年政績卓然進按察使西湖水舊可溉諸縣田四十六萬頃時堙塞過半瑄請浚之設防置閘以利灌溉功未就卒海鹽人祠祀之子源字本清幼習天文授五官監候正德元年劉瑾等亂政源上言自八月初大角及心宿中星動搖不止大角天王之坐心宿中星天王正位也俱宜安靜今乃動搖其占曰人主不安國有憂意者陛下輕舉逸遊弋獵無度以致然也又北斗第二第三第四星明不如常第二曰天璇后妃之象后妃不得其寵則不明廣營宮室妄鑿山陵則不明第三曰天機不愛百姓驟興征徭則不明第四曰天權號令不當則不明伏願陛下祗畏天戒安居深宮絶嬉戲禁遊畋罷騎射停工作申嚴號令毋輕出入抑遠寵幸裁節賜豫親元老大臣日事講習克修厥德以弭災變疏下禮部尚書張升等稱源忠愛報聞逮十月霾霧時作源言此衆邪之氣陰冒於陽臣欺其君小人擅權下將叛上引譬甚切瑾怒矯旨杖三十釋之又上言自正德二年來占得火星入太微垣帝座前或東或西往來不一乞收攬政柄思患預防蓋專指瑾也瑾大怒召而叱之曰若何官亦學為忠臣源厲聲曰官大小異忠一也又矯旨杖六十謫戍肅州行至河陽驛以創卒其妻斬蘆荻覆之葬驛後楊氏父子以忠諫名天下為士論重而源小臣抗節尤人所難天啓初賜諡忠懷盛顒字時望無錫人周斌字國用昌黎人王鑑太原人趙文博代州人彭烈峽江人李人儀隆昌人邵銅閩縣人鄭冕樂平人皆進士授御史顒降束鹿知縣斌江陰鑑膚施文博淳化烈江浦人儀襄陽銅博羅冕衡山並有善政束鹿徭役苦不均顒為立九則法繼者莫能易母憂去服除民相率詣闕乞還顒再任益不用鞭撲訟者諭之輒叩頭不復辨鄰邑訟不決亦皆赴訴片言折之各心厭去郊外有隙地爭來築室居之遂成市號為清官店斌在江陰有惠政民歌曰旱為災周公禱之甘露來水為患周公禱之陰雨散天順七年先以薦擢開封知府而顒等至憲宗嗣位所司以治行聞帝曰諸臣直諫為權幸所排又能稱職其悉豫郡於是擢顒知邵武鑑延安文博衛輝烈河南人儀荊州銅溫州冕衡州顒復以任治劇調延平巡按御史上顒政績陝西湖廣守臣亦上鑑人儀居縣時治行皆特賜封誥顒纍遷陝西左布政使時三邊多警歲復洊飢顒經畫餽餉無缺軍民悉安成化十七年召為刑部右侍郎居二年山東旱飢盜起改顒左副都御史往巡撫顒至露禱大雨霑溉稿禾復蘇舉救荒之政既振餘粟尚百餘萬石又推行九則法於諸府黜暴除苛民甚德之居三年以老致仕弘治中卒斌歷廣東右布政使初去江陰民立生祠及自開封遷去民亦涕泣追送焉鑑初為御史嘗於左順門面斥中官非禮中官怒甚因考察屬都御史蕭維禎去之維禎不可而止文博終巡撫河南右副都御史烈廣東左布政使費廣等無考贊曰直言敢諫之士激於事變奮不顧身獲罪固其所甘心耳然觀尹昌隆死於呂震耿通陷於高煦劉球之斃陳鑑之繫由於王振楊瑄之戍厄於石亨曹吉祥乃至戴綸諫遊獵陳祚請勤學鍾同章綸廖莊倡復儲倪敬等直言時事皆用賈禍忠臣之志抑而不伸亦可悲夫
