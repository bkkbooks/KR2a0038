body:
  text: 明史卷一百三十七列傳第二十五劉三吾汪睿朱善安然王本等吳伯宗鮑恂任亨泰吳沉桂彥良李希顏徐宗實陳南賓劉淳董子莊趙季通楊黼金實等宋訥許存仁張美和聶鉉貝瓊趙俶錢宰蕭執李叔正劉嵩羅復仁孫汝敬劉三吾茶陵人初名如孫以字行兄耕孫燾孫皆仕元耕孫寧國路推官死長槍賊難燾孫常寧州學正死僚寇三吾避兵廣西行省承制授靜江路儒學副提舉明兵下廣西乃歸茶陵洪武十八年以茹瑺薦召至年七十三矣奏對稱旨授左贊善纍遷翰林學士時天下初平典章闕略帝鋭意制作宿儒凋謝得三吾晚悅之一切禮制及三場取士法多所刊定三吾博學善屬文帝製大誥及洪範注成皆命為序敕修省躬録書傳會選寰宇通志禮制集要諸書皆總其事賜賚甚厚帝嘗曰朕觀奎壁間嘗有黑氣今消矣文運其興乎卿等宜有所述作以稱朕意帝製詩時令屬和嘗賜以朝鮮玳瑁筆朝參命列侍衛前燕享賜坐殿中與汪睿朱善稱三老既而三吾年日益老才力日益減往往忤意禮遇亦漸輕二十三年授晉世子經吏部侍郎侯庸劾其怠職降國子博士尋還職三吾為人慷慨不設城府自號坦坦翁至臨大節屹乎不可奪懿文太子薨帝御東閣門召對羣臣慟哭三吾進曰皇孫世嫡承統禮也太孫之立由此戶部尚書趙勉者三吾壻也坐贓死三吾引退許之未幾復為學士三十年偕紀善白信蹈等主考會試榜發泰和宋琮第一北士無預者於是諸生言三吾等南人私其鄉帝怒命侍講張信等覆閲不稱旨或言信等故以陋卷呈三吾等實屬之帝益怒信蹈等論死三吾以老戍邊琮亦遣戍帝親賜策問更擢六十一人皆北士時謂之南北榜又曰春夏榜云建文初三吾召還久之卒琮起刑部檢校鄉人楊士奇輩貴顯琮無所攀援宣德中猶以檢討掌助教事卒官汪睿字仲魯婺源人元末與弟同集衆保鄉邑助復饒州授浮梁州同知不就胡大海克休寧睿兄弟來附設星源翼分院於婺源以同為院判睿歸田里庚子秋同將兵爭鄱陽不克棄妻孥亡之浙西幕府疑之檄睿入應天為質已聞同為張士誠所殺乃授睿安慶稅令未幾徵參贊川蜀軍事以疾辭去洪武十七年復召見命講西伯戡黎篇授左春坊左司直常命續薰風自南來詩及他應制皆稱旨請春夏停決死罪體天地生物之仁從之踰年疾作請假歸睿敦實閒靜不妄言笑及進講遇事輒言帝嘗以善人呼之朱善字備萬豐城人九歲通經史大義能屬文元末兵亂隱山中事繼母以孝聞洪武初為南昌教授八年廷對第一授修撰踰年奏對失旨改典籍放還鄉復召為翰林待詔上疏論婚姻律曰民間姑舅及兩姨子女法不得為婚讐家詆訟或已聘見絶或既婚復離甚至兒女成行有司逼奪按舊律尊長卑幼相與為婚者有禁蓋謂母之姊妹與己之身是為姑舅兩姨不可以卑幼上匹尊屬若姑舅兩姨子女無尊卑之嫌成周時王朝相與為婚者不過齊宋陳嵵故稱異姓大國曰伯舅小國曰叔舅列國齊宋魯秦晉亦各自為甥舅之國後世晉王謝唐崔盧潘楊之睦朱陳之好皆世為婚媾溫嶠以舅子娶姑女呂滎公夫人張氏即其母申國夫人姊女古人如此甚多願下羣臣議弛其禁帝許之十八年擢文淵閣大學士嘗講家人卦心針帝大悅未幾請告歸卒年七十二著有詩經解頤史輯傳於世正德中諡文恪安然祥符人徙居潁州元季以左丞守萊州明兵下山東率衆歸附纍官山東參政撫綏流移俸餘悉給公用帝聞而嘉之洪武二年召為工部尚書出為河南參政歷浙江布政使入為御史臺右大夫十三年改左中丞坐事免未幾召為四輔官先是胡惟庸謀反伏誅帝以歷代丞相多擅權遂罷中書省分其職於六部既又念密勿論思不可無人乃建四輔官以四時為號詔天下舉賢才戶部尚書范敏薦耆儒王本杜佑龔斆杜斆趙民望吳源等召至告於太廟以本佑龔斆為春官杜斆民望源為夏官秋冬闕命本等攝之位都督次屢賜敕諭隆以坐論之禮命協贊政事均調四時會立冬朔風釀寒帝以為順冬令乃本等功賜敕嘉勉又月分三旬人各司之以雨暘時若驗其稱職與否刑官議獄四輔及諫院覆核奏行有疑讞四輔官封駁居無何斆等四人相繼致仕召然代之本後坐事誅諸人皆老儒起田家惇朴無他長獨然久歷中外練達庶務眷注特隆十四年八月卒帝念然來歸之誠親製文祭之繼然為四輔者李幹何顯周幹出為知府佑顯周俱罷去是官遂廢不復設本不詳其籍里佑安邑人嘗三主本布政司鄉試稱得人龔斆鉛山人以行誼重於鄉致仕後復起為國子司業歷祭酒坐放諸生假不奏聞免杜斆字致道壺關人舉元鄉試第一歷官臺州學正歸家教授通易詩書三經源莆田人亦再徵為國子司業卒於官民望藁城人幹絳州人顯周內黃人吳伯宗名祐以字行金溪人洪武四年廷試第一時開科之始帝親製策問得伯宗甚喜賜冠帶袍笏授禮部員外郎與修大明日曆胡惟庸用事欲人附己伯宗不為屈惟庸銜之坐事謫居鳳陽上書論時政因言惟庸專恣不法不宜獨任久之必為國患辭甚愷切帝得奏召還賜衣鈔奉使安南稱旨除國子助教命進講東宮首陳正心誠意之說改翰林典籍帝製十題命賦援筆立就詞旨雅潔賜織金錦衣除太常司丞辭改國子司業又辭忤旨貶金縣教諭未至召還為翰林檢討十五年進武英殿大學士明年冬坐弟仲實為三河知縣薦舉不實詞連伯宗降檢討伯宗為人溫厚然內剛不苟媕阿故屢躓踰年卒於官伯宗成進士考試官則宋濂鮑恂也恂字仲孚崇德人受易於臨川吳澄好古力行著大易傳義學者稱之元至正中以薦授溫州路學正尋召入翰林不就洪武四年初科舉取士召為同考官試已辭去十五年與安吉余詮高郵張長年登州張紳皆以明經老成為禮部主事劉庸所薦召至京恂年八十餘長年詮亦皆踰七十矣賜坐顧問翌日並命為文華殿大學士皆以老疾固辭遂放還紳後至以為鄠縣教諭尋召為右僉都御史終浙江左布政使其明年以耆儒徵者曰全思誠字希賢上海人亦授文華殿大學士又明年請老賜敕致仕伯宗之使安南也以名德為交人所重其後襄陽任亨泰亦舉洪武二十一年進士第一以禮部尚書使安南交人以為榮前後使安南者並稱吳任云亨泰為禮部尚書時日照民江伯兒以母病殺其三歲子祀岱嶽有司以聞帝怒其滅絶倫理杖百戍海南因命亨泰定旌表孝行事例亨泰議曰人子事親居則致其敬養則致其樂有疾則謹其醫藥臥氷割股事非經割股不已至於割肝割肝不已至於殺子違道傷生莫此為甚墮宗絶祀尤不孝之大者宜嚴行戒諭倘愚昧無知亦聽其所為不在旌表之例詔曰可明年議秦王喪禮因定凡世子襲爵之禮會討龍州趙宗壽命偕御史嚴震直使安南諭以謹邊方無納逋逃時帝以安南篡弒絶其貢使至是聞詔使至震恐亨泰為書述朝廷用兵之故以安慰之交人大悅使還以私市蠻人為僕降御史未幾思明土官與安南爭界詞復連亨泰坐免官吳沉字濬仲蘭溪人元國子博士師道子也以學行聞太祖下婺州召沉及同郡許元葉瓚玉胡翰汪仲山李公常金信徐孳童冀戴良吳履孫履張起敬會食省中日令二人進講經史已命沉為郡學訓導洪武初郡以儒士舉誤上其名曰信仲授翰林院待制沉謂修撰王釐曰名誤不更是欺罔也將白於朝釐言恐觸上怒沉不從牒請改正帝喜曰誠賣心人也遂眷遇之召侍左右以事降編修給事中鄭相同言故事啓事東宮惟東宮官屬稱臣朝臣則今一體稱臣於禮未安沉駁之曰東宮國之大本尊東宮所以尊主上也相同言非是帝從之尋以奏對失旨降翰林院典籍已擢東閣大學士初帝謂沉曰聖賢立教有三曰敬天曰忠君曰孝親散在經卷未易會其要領爾等以三事編輯至是書成賜名精誠録命沉撰序居一年降翰林侍書改國子博士以老歸沉嘗著辨言孔子封王為非禮後布政使夏寅祭酒丘濬皆沿其說至嘉靖九年更定祀典改稱至聖先師實自沉發之也桂彥良名德稱以字行慈溪人元鄉貢進士為平江路學教授罷歸張士誠方國珍交辟不就洪武六年徵詣公車授太子正字帝嘗出御製詩文彥良就御座前朗誦聲徹殿外左右驚愕帝嘉其朴直時選國子生蔣學等為給事中舉人張唯等為編修肄業文華堂命彥良及宋濂孔克表為之師嘗從容有所咨問彥良對必以正帝每稱善書其語揭便殿七年冬至詞臣撰南郊祝文用豫我字帝以為不敬彥良曰成湯祭上帝豫小子履武王祀文王之詩曰我將我享古有此言帝色霽曰正字言是也時御史臺具獄令詞臣覆讞彥良所論釋者數十人遷晉王府右傅帝親為文賜之彥良入謝帝曰江南大儒惟卿一人對曰臣不如宋濂劉基帝曰濂文人耳基峻隘不如卿也彥良至晉製格心圖獻王後更王府官制改左長史朝京師上太平十二策帝曰彥良所陳通達事體有裨治道世謂儒者泥古不通今若彥良可謂通儒矣十八年請告歸越二年卒明初特重師傅既命宋濂教太子而諸王傅亦慎其選彥良與陳南賓等皆宿儒老生而李希顏與駙馬都尉胡觀傅徐宗實尤以嚴見憚李希顏字愚菴郟人隱居不仕太祖手書徵之至京為諸王師規範嚴峻諸王有不率教者或擊其額帝撫而怒高皇后曰烏有以聖人之道訓吾子顧怒之耶太祖意解授左春坊右贊善諸王就藩希顏歸舊隱閭里宴集常著緋袍戴笠往客問故笑曰笠本質緋君賜也徐宗實名垕以字行黃巖人少穎悟篤於學洪武中被薦除銅陵簿請告迎養忤帝意謫戍淮陰驛會東川侯胡海子觀選尚主帝為觀擇師難其人以命宗實中使援他府例置駙馬位中堂南向而布師席於西階上東向宗實手引駙馬位使下然後為說書左右大驚相顧以目帝聞而嘉之召宗實慰勞數四洪武末授蘇州通判奏發官粟二十萬石以活饑民春水暴齧隄倡議修築吳人皆以為便請旌元節婦王氏禮部以前朝事不當允宗實言武王封比干墓獨非前朝事乎遂得旌建文二年超擢兵部右侍郎坐事貶官尋復職燕事急使兩浙招義勇成祖即位疏乞歸逾二年以事被逮道卒陳南賓名光裕以字行茶陵人元末為全州學正洪武三年聘至都除無棣丞歷膠州同知所至以經術為治召為國子助教嘗入見講洪範九疇帝大喜書姓名殿柱後御注洪範多採其說擢蜀府長史蜀獻王好學敬禮尤至造安車以賜為搆第名安老堂二十九年與方孝孺同為四川考試官詩文清徑有法卒年八十其後諸王府長史劉淳董子莊趙季通楊黼金實蕭用道宋子環之屬皆有名劉淳南陽人洪武末為原武訓導周王聘為世子師尋言於朝補右長史以正輔王端禮門槐盛夏而枯淳陳咎徵進戒王用其言修省枯枝復榮王旌其槐曰攄忠致仕十餘年而卒年九十有七董子莊名琰以字行江西樂安人有學行洪武中以學官遷知茂名縣永樂時由國子司業出為趙王府右長史隨事匡正王多過帝輒以責長史子莊以能諫得無過十八年春當陪祀國社夙起衣冠端坐而卒趙季通字師道天台人亦由教官歷知永豐龍溪與修太祖實録纍進司業出為趙王府左長史與子莊同心輔導藩府賢僚首稱趙董云楊黼吉水人官御史仁宗即位上疏言十事擢衛王府右長史盡心獻替未嘗苟取一錢宣德初卒金實開化人永樂初上書言治道帝嘉之復對策稱旨除翰林典籍與修太祖實録永樂大典選為東宮講官歷左春坊左司直仁宗立除衛府左長史正統初卒為人孝友敦行誼閲經史日有程限至老不輟蕭用道泰和人建文中舉懷才抱德詣闕試文章擢靖江王府長史召入翰林修類要燕師渡淮與周是修同上書指斥用事者永樂時預修太祖實録改右長史從王之藩桂林嘗為王陳八事曰慎起居寡嗜欲勤學問養德性簡鞭撲之刑無侵下人利常接府僚以通羣情簡擇謹厚人以備差遣又作端禮體仁遵義廣智四門針獻王久之以疾乞歸成祖怒貶宣府鷂兒嶺巡檢卒子烜由進士官湖廣左布政使天順四年舉治行卓異拜禮部尚書初兩京尚書缺多用布政使為之自烜後遂無拜尚書者烜重厚廉靜而不善奏對調南京卒宋子環廬陵人由庶吉士歷考功郎中從師逵採木湖廣以寬厚得衆心仁宗即位授梁府右長史改越府和易淡泊所至有賢聲宣德中卒官自是以後王府官不為清流遂無足紀者矣宋訥字仲敏滑人父壽卿元侍御史訥性持重學問該博至正中舉進士任鹽山尹棄官歸洪武二年徵儒士十八人編禮樂諸書訥與焉事竣不仕歸久之用四輔官杜斆薦授國子助教以說經為學者所宗十五年超遷翰林學士命撰宣聖廟碑稱旨賞賚甚厚改文淵閣大學士嘗寒附火燎脅下衣至膚始覺帝製文警之未幾遷祭酒時功臣子弟皆就學及歲貢士嘗數千人訥為嚴立學規終日端坐講解無虛晷夜止學舍十八年復開進士科取士四百七十有奇由太學者三之二再策士亦如之帝大悅製詞褒美助教金文徵等疾訥搆之吏部尚書余熂牒令致仕訥陛辭帝驚問大怒誅熂文徵等留訥如故訥嘗病帝曰訥有壽骨無憂也尋愈帝使畫工瞷訥圖其像危坐有怒色明日入對帝問昨何怒訥驚對曰諸生有趨踣者碎茶器臣愧失教故自訟耳且陛下何自知之帝出圖訥頓首謝長子麟舉進士擢御史出為望江主簿帝念訥老召還侍二十三年春訥病甚乃止學舍麟請歸私第叱曰時當丁祭敢不敬耶祭畢舁歸舍而卒年八十帝悼惜自為文祭之又遣官祭於家為治葬地文臣四品給祭葬者自訥始正德中諡文恪訥嘗應詔陳邊事言海內乂安惟沙漠尚煩聖慮若窮追遠擊未免勞費陛下為聖子神孫計不過謹邊備而已備邊在乎實兵實兵在乎屯田漢趙充國將四萬騎分屯緣邊九郡而單于引却陛下宜於諸將中選謀勇數人以東西五百里為制立法分屯布列要害遠近相應遇敵則戰寇去則耕此長策也帝頗採用其言訥既卒帝思之官其次子復祖為司業誡諸生守訥學規違者罪至死明開國時即重師儒官許存仁魏觀為祭酒老成端謹訥稍晚進最蒙遇與訥定學規者司業王嘉會龔斆三人年俱高鬚髮皓白終日危坐堂上肅然而張美和聶鉉貝瓊等皆名儒當洪武時先後為博士助教學録以故諸生多所成就魏觀事別載嘉會字原禮嘉興人以薦徵纍官國子監司業十六年亦以老請歸優詔留之年八十卒賻恤甚厚許存仁名元以字行金華許謙子也太祖素聞謙名克金華訪得存仁與語大悅命傅諸子擢國子博士嘗命講尚書洪範休咎徵之說又嘗問孟子何說為要存仁以行王道省刑薄賦對吳元年擢祭酒存仁出入左右垂十年自稽古禮文事至進退人才無不與論議既將議即大位而存仁告歸司業劉丞直曰主上方應天順人公宜稍待存仁不聽果忤旨僉事程孔昭劾其隱事遂逮死獄中張美和名九韶以字行清江人能詞賦元末纍舉不仕洪武三年以薦為縣學教諭後遷國子助教改翰林院編修致仕歸帝親為文賜之復與錢宰等並徵修書傳既成遣還聶鉉字器之美和同邑人洪武四年進士為廣宗丞疏免旱災稅秩滿入覲獻南都賦及洪武聖德詩授翰林院待制改國子助教遷典籍與美和同賜歸十八年復召典會試欲留用之乞便地自養令食廬陵教諭俸終其身貝瓊字廷琚崇德人性坦率篤志好學年四十八始領鄉薦張士誠屢辟不就洪武初聘修元史既成受賜歸六年以儒士舉除國子助教瓊嘗慨古樂不作為大韶賦以見志宋濂之為司業也建議立四學並祀舜禹湯文為先聖太祖既絀其說瓊復為釋奠解駁之識者多是瓊議與美和鉉齊名時稱成均三助九年改官中都國子監教勳臣子弟瓊學行素優將校武臣皆知禮重十一年致仕卒趙俶字本初山陰人元進士洪武六年徵授國子博士帝嘗御奉天殿召俶及錢宰貝瓊等曰汝等一以孔子所定經書為教慎勿雜蘇秦張儀縱橫之言諸臣頓首受命俶因請頒正定十三經於天下屏戰國策及陰陽讖卜諸書勿列學宮明年擇諸生穎異者三十五人命俶專領之教以古文尋擢李擴黃義等入文華武英二堂說書皆見用九年御史臺言博士俶以詩經教成均四年其弟子多為方嶽重臣及持節各部者今年逾懸車請賜骸骨於是以翰林院待制致仕賜內帑錢治裝宋濂率同官暨諸生千餘人送之卒年八十一子圭玉兵部侍郎出知萊州有聲錢宰字子豫會稽人吳越武肅王十四世孫至正間中甲科親老不仕洪武二年徵為國子助教作金陵形勝論歷代帝王廟樂章皆稱旨十年乞休進博士賜敕遣歸至二十七年帝觀蔡氏書傳象緯運行與朱子詩傳相悖其他注與鄱陽鄒季友所論有未安者徵天下宿儒訂正之兵部尚書唐鐸舉宰及致仕編修張美和助教靳權等行人馳傳徵至命劉三吾總其事江東諸門酒樓成賜百官鈔宴其上宰等賦詩謝帝大悅諭諸儒年老願歸者先遣之宰年最高請留帝喜書成賜名書傳會選頒行天下厚賜令馳驛歸卒年九十六又蕭執者字子所泰和人洪武四年鄉舉為國子學録明年夏至帝有事北郊召尚書吳琳主事宋濂率文學士以從執偕陶凱等十二人入見齊所令賦詩復令賦山梔花獨喜執作遍示諸臣寵眷傾一時時帝留意文學往往親試廷臣執與陳觀知遇尤異觀以訓導入覲試王猛捫蝨論立擢陝西參政尋召還侍左右應制作鍾山賦賜金幣在陝以廉謹稱或問陝産金何狀觀大驚曰吾備位藩寮何金之問其卒也妻子幾無以自存而執以親老乞歸親沒廬墓側申國公鄧鎮剿龍泉寇不戢下執往責之鎮為禁止邑人以安兩人皆篤行君子也李叔正字克正初名宗頤靖安人年十二能詩長益淹博時江西有十才子叔正其一也以薦授國子學正洪武初告歸未幾復以薦為學正遷渭南丞同州蒲城人爭地界纍年不決行省以委叔正單騎至剖數語立決渭南歲輸糧二萬豪右與猾吏為奸田無定額叔正履畝丈量立法精密諸弊盡剔遷興化知縣尋召為禮部員外郎以年老乞歸不許改國子助教於是叔正三至太學矣帝方鋭意文治於國學人材尤加意然諸生多貴胄不率教叔正嚴立規條旦夕端坐督課無倦色朝論賢之擢監察御史奉命巡嶺表瓊州府吏訐其守踞公座簽表文叔正鞫之守得白抵吏罪太祖嘉之曰人言老御史懦乃明斷如是耶纍官禮部侍郎十四年進尚書卒於官叔正妻夏氏陳友諒陷南昌時投井死叔正感其義終身不復娶劉嵩字子高泰和人舊名楚家貧力學寒無罏火手皸裂而鈔録不輟元末舉於鄉洪武三年舉經明行修改今名召見奉天殿授兵部職方司郎中奉命徵糧鎮江鎮江多勳臣田租賦為民纍嵩力請得少減遷北平按察司副使輕刑省事招集流亡民咸復業立文天祥祠於學宮之側勒石學門示府縣勿以徭役纍諸生嘗請減僻地驛馬以益宛平帝可其奏顧謂侍臣曰驛傳勞逸不均久矣嵩能言之牧民不當如是耶為胡惟庸所惡坐事謫輸作尋放歸十三年惟庸誅徵拜禮部侍郎未幾擢吏部尚書雷震謹身殿帝廷諭羣臣陳得失嵩頓首以修德行仁對尋致仕明年三月與前刑部尚書李敬並徵拜敬國子祭酒而嵩為司業賜鞍馬令朝夕見見輒燕語移時未旬日卒疾作猶強坐訓諸生及革敬問所欲言曰天子遣嵩教國子將責以成功而遽死乎無一語及家事帝命有司治殯殮親為文祭之嵩幼博學天性廉慎兄弟三人共居一茅屋有田五十畝及貴無所增益十年一布被鼠傷始易之仍葺以衣其子居官未嘗以家纍自隨之任北平攜一童往至則遣還晡時吏退孤燈讀書往往達旦善為詩豫章人宗之為西江派云羅復仁吉水人少嗜學陳友諒辟為編修已知其無成遁去謁太祖於九江留置左右從戰鄱陽齎蠟書諭降江西未下諸郡授中書咨議從圍武昌太祖欲招陳理降以復仁故友諒臣也遣入城諭且曰理若來不失富貴復仁頓首曰如陳氏遺孤得保首領俾臣不食言於異日臣死不憾太祖曰汝行吾不汝誤也復仁至城下號慟者竟日理縋之入見理大哭陳太祖意且曰大兵所向皆摧不降且屠城中民何罪理聽其言遂率官屬出降遷國子助教以老特賜乘小車出入每宴見賜坐飲食已復使擴廓前使多拘留復仁議論慷慨獨得還洪武元年擢編修復偕主事張福往諭安南還占城侵地安南奉詔遺復仁金貝土産甚厚悉却不受帝聞而賢之三年置弘文館以復仁為學士與劉基同位在帝前率意陳得失嘗操南音帝顧喜其質直呼為老實羅而不名間幸其舍負郭窮巷復仁方堊壁急呼其妻抱杌以坐帝帝曰賢士豈宜居此遂賜第城中天壽節製水龍吟一闋以獻帝悅厚賜之尋乞致仕陛辭賜大布衣題詩衣襟上褒美之已又召至京師奏減江西秋糧報可留三月賜玉帶鐵拄杖坐墩裘馬食具遣還以壽終孫汝敬名簡以字行永樂二年庶吉士就學文淵閣誦書不稱旨即日遣戍江南數日復之自此刻厲為學纍遷侍講仁宗時上言時政十五事忤旨下獄既與李時勉同改御史直聲震一時宣宗初上書大學士楊士奇曰太祖高皇帝奄有四海太宗文皇帝再造寰區然猶翼翼兢兢無敢豫怠先皇帝嗣統未及期月奄棄羣臣揆厥所由皆憸壬小夫獻金石之方以致疾也去冬簡以愚戇應詔上書言涉不敬罪當萬死先皇帝憐其孤直寬雷霆之誅俾居言路撫躬循省無可稱塞伏見今年六月車駕幸天壽山躬謁二陵京師之人瞻望咨嗟以為聖天子大孝既而道路喧傳禮畢即較獵講武扈從惟也先土干與其徒數百人風馳電掣馳逐先後某聞此言心悸膽落夫搜苗獮狩固有國之常經然以謁陵出而與降將較獵於山谷間垂堂之戒銜橛之虞不可不深慮也執事四朝舊臣二聖元輔於此不言則孰得而言之者惟特加採納以弘靖獻之思光弼直之義尋擢工部右侍郎兩使安南時黎利言其主陳皓已死而張筵設女樂汝敬叱之利懼謝還督兩浙漕運理陝西屯田多所建置坐受餽充為事官英宗立遇赦汝敬誤引詔復職復逮繫以在陝措置勞宥死戍邊尋復職蒞故任塞上有警汝敬往督餉遇敵紅城子中流矢墜馬得免以疾告歸卒贊曰明始建國首以人材為務徵辟四方宿儒羣集闕下隨其所長而用之自議禮定制外或參列法從或預直承明而成均胄子之任尤多稱職彬彬乎稱得人焉夫諸臣當元之季世窮經績學株守草野幾於沒齒無聞及乎泰運初平連茹利見乃各展所蘊以潤色鴻猷黼黻文治昔人謂天下不患無才惟視上之網羅何如耳顧不信哉
