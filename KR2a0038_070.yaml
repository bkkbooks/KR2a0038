body:
  text: 明史卷七十志第四十六選舉二科目者沿唐宋之舊而稍變其試士之法專取四子書及易書詩春秋禮記五經命題試士蓋太祖與劉基所定其文略仿宋經義然代古人語氣為之體用排偶謂之八股通謂之制義三年大比以諸生試之直省曰鄉試中式者為舉人次年以舉人試之京師曰會試中式者天子親策於廷曰廷試亦曰殿試分一二三甲以為名第之次一甲止三人曰狀元榜眼探花賜進士及第二甲若干人賜進士出身三甲若干人賜同進士出身狀元榜眼探花之名制所定也而士大夫又通以鄉試第一為解元會試第一為會元二三甲第一為傳臚云子午卯酉年鄉試辰戌丑未年會試鄉試以八月會試以二月皆初九日為第一場又三日為第二場又三日為第三場初設科舉時初場試經義二道四書義一道二場論一道三場策一道中式後十日復以騎射書算律五事試之後頒科舉定式初場試四書義三道經義四道四書主朱子集注易主程傳朱子本義書主蔡氏傳及古注疏詩主朱子集傳春秋主左氏公羊穀梁三傳及胡安國張洽傳禮記主古注疏永樂間頒四書五經大全廢注疏不用其後春秋亦不用張洽傳禮記止用陳澔集說二場試論一道判五道詔誥表內科一道三場試經史時務策五道廷試以三月朔鄉試直隸於京府各省於布政司會試於禮部主考鄉會試俱二人同考鄉試四人會試八人提調一人在內京官在外布政司官會試禮部官監試二人在內御史在外按察司官會試御史供給收掌試卷彌封謄録對讀受卷及巡綽監門搜檢懷挾俱有定員各執其事舉子則國子生及府州縣學生員之學成者儒士之未仕者官之未入流者皆由有司申舉性資敦厚文行可稱者應之其學校訓導專教生徒及罷間官吏倡優之家與居父母喪者俱不許入試試卷之首書三代姓名及其籍貫年甲所習本經所司印記試日入場講問代冒者有禁晚未納卷給燭三枝文字中回避御名廟號及不許自序門第彌封編號作三合字考試者用墨謂之墨卷謄録用硃謂之硃卷試士之所謂之貢院諸生席舍謂之號房人一軍守之謂之號軍試官入院輒封鑰內外門戶在外提調監試等謂之外簾官在內主考同考謂之內簾官廷試用翰林及朝臣文學之優者為讀卷官共閲對策擬定名次候臨軒或如所擬或有所更定傳制唱第狀元授修撰榜眼探花授編修二三甲考選庶吉士者皆為翰林官其他或授給事御史主事中書行人評事太常國子博士或授府推官知州知縣等官舉人貢生不第入監而選者或授小京職或授府佐及州縣正官或授教職此明一代取士之大略也終明之世右文左武然亦嘗設武科以收之可得而附列也初太祖起事首羅賢才吳元年設文武二科取士之令使有司勸諭民間秀士及智勇之人以時勉學俟開舉之歲充貢京師洪武三年詔曰漢唐及宋取士各有定制然但貴文學而不求德藝之全前元待士甚優而權豪勢要每納奔競之人夤緣阿附輒竊仕祿其懷材抱道者恥與並進甘隱山林而不出風俗之弊一至於此自今年八月始特設科舉務取經明行修博通古今名實相稱者朕將親策於廷第其高下而任之以官使中外文臣皆由科舉而進非科舉者毋得與官於是京師行省各舉鄉試直隸貢額百人河南山東山西陝西北平福建江西浙江湖廣皆四十人廣西廣東皆二十五人才多或不及者不拘額數高麗安南占城詔許其國士子於本國鄉試貢赴京師明年會試取中一百二十名帝親製策問試於奉天殿擢吳伯宗第一午門外張掛黃榜奉天殿宣諭賜宴中書省授伯宗為禮部員外郎餘以次授官有差時以天下初定令各行省連試三年且以官多缺員舉人俱免會試赴京聽選又擢其年少俊異者張唯王輝等為翰林院編修蕭韶為祕書監直長令入禁中文華堂肄業太子贊善大夫宋濂等為之師帝聽政之暇輒幸堂中評其文字優劣日給光祿酒饌每食皇太子親王迭為之主賜白金弓矢鞍馬及冬夏衣寵遇之甚厚既而謂所取多後生少年能以所學措諸行事者寡乃但令有司察舉賢才而罷科舉不用至十五年復設十七年始定科舉之式命禮部頒行各省後遂以為永制而薦舉漸輕久且廢不用矣十八年廷試擢一甲進士丁顯等為翰林院修撰二甲馬京等為編修吳文為檢討進士之入翰林自此始也使進士觀政於諸司其在翰林承敕監等衙門者曰庶吉士進士之為庶吉士亦自此始也其在六部都察院通政司大理寺等衙門者仍稱進士觀政進士之名亦自此始也其後試額有增減條例有變更考官有內外輕重闈事有是非得失其細者勿論其有關於國是者不可無述也鄉試之額洪武十七年詔不拘額數從實充貢洪熙元年始有定額其後漸增至正統間南北直隸定以百名江西六十五名他省又自五而殺至雲南二十名為最少嘉靖間增至四十而貴州亦二十名慶曆啓禎間兩直隸益增至一百三十餘名他省漸增無出百名者交址初開以十名為額逮棄其地乃止會試之額國初無定少至三十二人其多者若洪武乙丑永樂丙戌至四百七十二人其後或百名或二百名或二百五十名或三百五十名增損不一皆臨期奏請定奪至成化乙未而後率取三百名有因題請及恩詔而廣五十名或百名者非制也初制禮闈取士不分南北自洪武丁丑考官劉三吾白信蹈所取宋琮等五十二人皆南士三月廷試擢陳為第一帝怒所取之偏命侍讀張信等十二人覆閲亦與焉帝猶怒不已悉誅信蹈及信等戍三吾於邊親自閲卷取任伯安等六十一人六月復廷試以韓克忠為第一皆北士也然訖永樂間未嘗分地而取洪熙元年仁宗命楊士奇等定取士之額南人十六北人十四宣德正統間分為南北中卷以百人為率則南取五十五名北取三十五名中取十名景泰初詔書遵永樂間例二年辛未禮部方奉行而給事中李侃爭之言部臣欲專以文詞多取南人刑部侍郎羅綺亦助侃言事下禮部覆奏臣等奉詔書非私請也景帝命遵詔書不從侃議未幾給事中徐廷章復請依正統間例五年甲戌會試禮部奏請裁定於是復從廷章言分南北中卷南卷應天及蘇松諸府浙江江西福建湖廣廣東北卷順天山東山西河南陝西中卷四川廣西雲南貴州及鳳陽廬州二府滁徐和三州也成化二十二年萬安當國周洪謨為禮部尚書皆四川人乃因布政使潘稹之請南北各減二名以益於中弘治二年復從舊制嗣後相沿不改惟正德三年給事中趙鐸承劉瑾指請廣河南陝西山東西鄉試之額乃增陝西為百河南為九十五山東西俱九十而以會試分南北中卷為不均乃增四川額十名並入南卷其餘並入北卷南北均取一百五十名蓋瑾陝西人而閣臣焦芳河南人票旨相附和各徇其私瑾芳敗旋復其舊初制兩京鄉試主考皆用翰林而各省考官先期於儒官儒士內聘明經公正者為之故有不在朝列纍秉文衡者景泰三年令布按二司同巡按御史推舉見任教官年五十以下三十以上文學廉謹者聘充考官於是教官主試遂為定例其後有司徇私聘取或非其人監臨官又往往侵奪其職掌成化十五年御史許進請各省俱視兩京例特命翰林主考帝諭禮部嚴飭私弊而不從其請屢戒外簾官毋奪主考權考官不當則舉主連坐又令提學考定教官等第以備聘取然相沿既久積習難移弘治十四年掌國子監謝鐸言考官皆御史方面所辟召職分既卑聽其指使以外簾官預定去取名為防間實則關節而科舉之法壞矣乞敕兩京大臣各舉部屬等官素有文望者每省差二員主考庶幾前弊可革時未能從嘉靖七年用兵部侍郎張璁言各省主試皆遣京官或進士每省二人馳往初兩京房考亦皆取教職至是命各加科部官一員閲兩科兩京房考復罷科部勿遣而各省主考亦不遣京官至萬曆十一年詔定科場事宜部議復舉張璁之說言彼時因主考與監臨官禮節小嫌故行止二科而罷今宜仍遣廷臣由是浙江江西福建湖廣皆用編修檢討他省用科部官而同考亦多用甲科教職僅取一二而已蓋自嘉靖二十五年從給事中萬虞愷言各省鄉試精聘教官不足則聘外省推官知縣以益之四十三年又從南京御史奏兩京同考用京官進士易詩書各二人春秋禮記各一人其餘乃參用教官萬曆四年復議兩京同考教官衰老者遣回北京取足於觀政進士候補甲科南京於附近知縣推官取用至是教官益絀初制會試同考八人三人用翰林五人用教職景泰五年從禮部尚書胡濙請俱用翰林部曹其後房考漸增至正德六年命用十七人翰林十一人科部各三人分詩經房五易經書經各四春秋禮記各二嘉靖十一年禮部尚書夏言論科場三事其一言會試同考例用講讀十一人今講讀止十一人當盡入場方足供事乞於部科再簡三四人以補翰林不足之數世宗命如所請然偶一行之輒如其舊萬曆十一年以易卷多減書之一以增於易十四年書卷復多乃增翰林一人以補書之缺至四十四年用給事中余懋孳奏詩易各增一房共為二十房翰林十二人科部各四人至明末不變洪武初賜諸進士宴於中書省宣德五年賜宴於中軍都督府八年賜宴於禮部自是遂著為令庶吉士之選自洪武乙丑擇進士為之不專屬於翰林也永樂二年既授一甲三人曾棨周述周孟簡等官復命於第二甲擇文學優等楊相等五十人及善書者湯流等十人俱為翰林院庶吉士庶吉士遂專屬翰林矣復命學士解縉等選才資英敏者就學文淵閣縉等選修撰棨編修述孟簡庶吉士相等共二十八人以應二十八宿之數庶吉士周忱自陳少年願學帝喜而俞之增忱為二十九人司禮監月給筆墨紙光祿給朝暮饌禮部月給膏燭鈔人三錠工部擇近第宅居之帝時至館召試五日一休沐必使內臣隨行且給校尉騶從是年所選王英王直段民周忱陳敬宗李時勉等名傳後世者不下十餘人其後每科所選多寡無定額永樂十三年乙未選六十二人而宣德二年丁未止邢恭一人以其在翰林院習四夷譯書久他人俱不得與也弘治四年給事中涂旦以纍科不選庶吉士請循祖制行之大學士徐溥言自永樂二年以來或間科一選或連科屢選或數科不選或合三科同選初無定限或內閣自選或禮部選送或會禮部同選或限年歲或拘地方或採譽望或就廷試卷中查取或別出題考試亦無定制自古帝王儲才館閣以教養之本朝所以儲養之者自及第進士之外止有庶吉士一途而或選或否且有才者未必皆選所選者未必皆才若更拘地方年歲則是已成之才又多棄而不用也請自今以後立為定制一次開科一次選用令新進士録平日所作論策詩賦序記等文字限十五篇以上呈之禮部送翰林考訂少年有新作五篇亦許投試翰林院擇其詞藻文理可取者按號行取禮部以糊名試卷偕閣臣出題考試於東閣試卷與所投之文相稱即收預選每科所選不過二十人每選所留不過三五輩將來成就必有足賴者孝宗從其請命內閣同吏禮二部考選以為常自嘉靖癸未至萬曆庚辰中間有九科不選神宗常命間科一選禮部侍郎吳道南持不可崇禎甲戌丁丑復不選餘悉遵例其與選者謂之館選以翰詹官高資深者一人課之謂之教習三年學成優者留翰林為編修檢討次者出為給事御史謂之散館與常調官待選者體格殊異成祖初年內閣七人非翰林者居其半翰林纂修亦諸色參用自天順二年李賢奏定纂修專選進士由是非進士不入翰林非翰林不入內閣南北禮部尚書侍郎及吏部右侍郎非翰林不任而庶吉士始進之時已羣目為儲相通計明一代宰輔一百七十餘人由翰林者十九蓋科舉視前代為盛翰林之盛則前代所絶無也輔臣子弟國初少登第者景泰七年陳循王文以其子北闈下第力攻主考劉儼臺省譁然論其失帝勉徇二人意命其子一體會試而心薄之正德三年焦芳子黃中會試中式芳引嫌不讀卷而黃中居二甲之首芳意猶不慊至降調諸翰林以泄其忿六年楊廷和子慎廷試第一廷和時亦引嫌不讀卷慎以高才及第人無訾之者嘉靖二十三年廷試翟鑾子汝儉汝孝俱在試中世宗疑二人濫首甲抑第一為第三以第三置三甲及拆卷而所擬第三者果汝孝也帝大疑之給事中王交王堯日因劾會試考官少詹事江汝璧及諸房考朋私通賄且追論順天鄉試考官秦鳴夏浦應麒阿附鑾罪乃下汝璧等鎮撫司獄獄具詔杖汝璧鳴夏應麒並革職間住而勒鑾父子為民神宗初張居正當國二年甲戌其子禮闈下第居正不悅遂不選庶吉士至五年其子嗣修遂以一甲第二人及第至八年其子懋修以一甲第一人及第而次輔呂調陽張四維申時行之子亦皆先後成進士御史魏允貞疏陳時弊言輔臣子不宜中式帝為謫允貞十六年右庶子黃洪憲主順天試王錫爵子衡為榜首禮部郎中高桂論劾舉人李鴻等並及衡言自故相子一時並進而大臣之子遂無見信於天下者今輔臣錫爵子衡素號多才青雲不難自致而人猶疑信相半宜一體覆試以明大臣之心跡錫爵怒甚具奏申辨語過激刑部主事饒伸復抗疏論之帝為謫桂於外下伸獄削其官覆試所劾舉人仍以衡第一且無一人黜者二十年會試李鴻中式鴻大學士申時行壻也榜將發房考給事中某持之以為宰相之壻不當中主考官張位使十八房考公閲皆言文字可取而給事猶持不可位怒曰考試不憑文字將何取衷我請職其咎鴻乃獲收王衡既被論當錫爵在位不復試禮闈二十九年乃以一甲第二人及第自後輔臣當國其子亦無登第者矣科場弊竇既多議論頻數自太祖重罪劉三吾等永宣間大抵帖服陳循王文之齮劉儼也高穀持之儼亦無恙弘治十二年會試大學士李東陽少詹事程敏政為考官給事中華劾敏政鬻題與舉人唐寅徐泰乃命東陽獨閲文字給事中林廷玉復攻敏政可疑者六事敏政謫官寅泰皆斥譴寅江左才士戊午南闈第一論者多惜之嘉靖十六年禮部尚書嚴嵩連摘應天廣東試録語激世宗怒應天主考及廣東巡按御史俱逮問二十二年帝手批山東試録譏訕逮御史葉經杖死闕下布政以下皆遠謫亦嵩所中傷也四十年應天主考中允無錫吳情取同邑十三人被劾與副考胡杰俱謫外南畿翰林遂不得典應天試矣萬曆四年順天主考高汝愚中張居正子嗣修懋修及居正黨吏部侍郎王篆子之衡之鼎居正既死御史丁此呂追論其弊且言汝愚以舜亦以命禹為試題殆以禪受阿居正當國者惡此呂謫於外而議者多不直汝愚三十八年會試庶子湯賓尹為同考官與各房互換闈卷共十八人明年御史孫居相劾賓尹私韓敬其互換皆以敬故時吏部方考察尚書孫丕揚因置賓尹敬於察典敬頗有文名衆亦惜敬而以其宣黨謂其宜斥也四十四年會試吳江沈同和第一同里趙鳴陽第六同和素不能文文多出鳴陽手事發覺兩人並謫戍天啓四年山東江西湖廣福建考官皆以策問譏刺降諭切責初命貶調既而褫革江西主考丁乾學至下獄擬罪蓋觸魏忠賢怒也先是二年辛酉中允錢謙益典試浙江所取舉人錢千秋卷七篇大結跡涉關節榜後為人所訐謙益自檢舉千秋謫戍未幾赦還崇禎二年會推閣臣謙益以禮部侍郎與焉而尚書溫體仁不與體仁摘千秋事出疏攻謙益謙益由此罷遂終明世不復起其他指摘科場事者前後非一往往北闈為甚他省次之其賄買鑽營懷挾倩代割卷傳遞頂名冒籍弊端百出不可窮究而關節為甚事屬曖昧或快恩讐報復蓋亦有之其他小小得失無足道也歷科事跡稍異者永樂初兵革倉猝元年癸未始令各省鄉試二年甲申會試以事變不循午未之舊七年己丑會試中陳燧等九十五人成祖方北征皇太子令送國子監進學俟車駕還京廷試九年辛卯始擢蕭時中第一宣德五年庚戌帝臨軒發策畢退御武英殿謂翰林儒臣曰取士不尚虛文有若劉蕡蘇轍輩直言抗論朕當顯庸之乃賦策士歌以示讀卷官顧所擢第一人林震亦無所表見也八年癸丑廷試第一人曹鼐由江西泰和典史會試中式正統七年壬戌刑部吏南昱公陵驛丞鄭溫亦皆中式十年乙丑會試廷試第一皆商輅輅淳安人宣宗末年乙卯浙榜第一人三試皆第一士子豔稱為三元明代惟輅一人而已廷試讀卷盡用甲科而是年兵部尚書徐晞十三年戶部侍郎奈亨乃吏員天順元年丁丑讀卷左都御史楊善乃譯字生時猶未甚拘流品也逮後無雜流會試及為讀卷官者矣七年癸未試日場屋火死者九十餘人俱贈進士出身改期八月會試明年甲申三月始廷試時英宗已崩憲宗以大喪未踰歲御西角門策之正德三年戊辰太監劉瑾録五十人姓名以示主司因廣五十名之額十五年庚辰武宗南巡未及廷試次年世宗即位五月御西角門策之擢楊維聰第一而張璁即是榜進士也六七年間當國用事權侔人主矣嘉靖八年己丑帝親閲廷試卷手批一甲羅洪先楊名歐陽德二甲唐順之陳束任瀚六人對策各加評奬大學士楊一清等遂選順之束瀚及胡經等共二十人為庶吉士疏其名上請命官教習忽降諭云吉士之選祖宗舊制誠善邇來大臣徇私選取市恩立黨於國無益自今不必選留唐順之等一切除授吏禮二部及翰林院會議以聞尚書方獻夫等遂阿旨謂順之等不必留並限翰林之額侍讀侍講修撰各三員編修檢討各六員著為令蓋順之等出張璁霍韜門而心以大禮之議為非不肯趨附璁心惡之璁又方欲中一清故以立黨之說進而故事由此廢逮十一年壬辰已罷館選至九月復舉行之十四年乙未帝親製策問手自批閲擢韓應龍第一降諭論一甲三人及二甲第一名次前後之由禮部因以聖諭列登科録之首而十二人對策俱以次刊刻二十年辛丑考選庶吉士題文曰原政詩曰讀大明律皆欽降也四十四年乙丑廷試帝始不御殿神宗時御殿益稀矣天啓二年壬戌會試命大學士何宗彥朱國祚為主考故事閣臣典試翰詹一人副之時已推禮部尚書顧秉謙特旨命國祚國祚疏辭帝曰今歲朕首科特用二輔臣以光重典卿不必辭嗣後二輔臣典試以為常是年開宗科朱慎成進士從宗彥國祚請即授中書舍人崇禎四年朱統鉓成進士初選庶吉士吏部以統鉓宗室不宜官禁近請改中書舍人統鉓疏爭命仍授庶吉士七年甲戌知貢舉禮部侍郎林釬言舉人顏茂猷文兼五經作二十三義帝念其該洽許送內簾茂猷中副榜特賜進士以其名另為一行刻於試録第一名之前五經中式者自此接跡矣武科自吳元年定洪武二十年俞禮部請立武學用武舉武臣子弟於各直省應試天順八年令天下文武官舉通曉兵法謀勇出衆者各省撫按三司直隸巡按御史考試中式者兵部同總兵官於帥府試策略教場試弓馬答策二道騎中四矢步中二矢以上者為中式騎步所中半焉者次之成化十四年從太監汪直請設武科鄉會試悉視文科例弘治六年定武舉六歲一行先策略後弓馬策不中者不許騎射十七年改定三年一試出榜賜宴正德十四年定初場試馬上箭以三十五步為則二場試步下箭以八十步為則三場試策一道子午卯酉年鄉試嘉靖初定制各省應武舉者巡按御史於十月考試兩京武學於兵部選取俱送兵部次年四月會試翰林二員為考試官給事中部曹四員為同考鄉會場期俱於月之初九十二十五起送考驗監試張榜大率仿文闈而減殺之其後倏罷倏復又倣文闈南北卷例分邊方腹𩹉每十名邊六腹四以為常萬曆三十八年定會試之額取中進士以百名為率其後有奉詔增三十名者非常制也穆神二宗時議者嘗言武科當以技勇為重萬曆之末科臣又請特設將材武科初場試馬步箭及鎗刀劍戟拳搏擊刺等法二場試營陳地雷火藥戰車等項三場各就其兵法天文地理所熟知者言之報可而未行也崇禎四年武會試榜發論者大譁帝命中允方逢年倪元璐再試取翁英等百二十人逢年元璐以時方需才奏請殿試傳臚悉如文例乃賜王來聘等及第出身有差武舉殿試自此始也十四年諭各部臣特開奇謀異勇科詔下無應者
