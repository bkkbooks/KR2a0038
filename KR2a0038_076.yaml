body:
  text: 明史卷七十六志第五十二職官五公侯伯駙馬都尉附儀賓五軍都督府京營京衞錦衣衞附旗手等衞南京守備南京五軍都督府南京衞王府護衞附儀衞司總兵官留守司都司附行都司各衞各所宣慰司宣撫司安撫司招討司長官司附蠻夷長官司軍民府附土州土縣公侯伯凡三等以封功臣及外戚皆有流有世功臣則給鐵券封號四等佐太祖定天下者曰開國輔運推誠從成祖起兵曰奉天靖難推誠餘曰奉天翊運推誠曰奉天翊衞推誠武臣曰宣力武臣文臣曰守正文臣歲祿以功為差已封而又有功仍爵或進爵增祿其才而賢者充京營總督五軍都督府掌僉書南京守備或出充鎮守總兵官否則食祿奉朝請而已年幼而嗣爵者咸入國子監讀書嘉靖八年定外戚封爵毋許世襲其有世襲一二代者出特恩駙馬都尉位在伯上凡尚大長公主長公主公主並曰駙馬都尉其尚郡主縣主郡君縣君鄉君者並曰儀賓歲祿各有差皆不得與政事明初駙馬都尉有典兵出鎮及掌府部事者建文時梅殷為鎮守淮安總兵官李堅為左副將軍成祖時李讓掌北京行部事仁宗時沐昕宣宗時宋琥並守備南京英宗時趙輝掌南京左府事其餘惟奉祀孝陵攝行廟祭署宗人府事往往受命一充其任若恩親侯李貞永春侯王寧京山侯崔元以恩澤封侯非制也中軍左軍右軍前軍後軍五都督府每府左右都督正一品都督同知從一品都督僉事正二品恩功寄祿無定員其屬經歷司經歷從五品都事從七品各一人都督府掌軍旅之事各領其都司衞所詳見兵志衞所中以達於兵部凡武職世官流官土官襲替優養優給所屬上之府移兵部請選既選移府以下之都司衞所首領官聽吏部選授給由亦如之凡武官誥敕俸糧水陸步騎操練官舍旗役併試軍情聲息軍伍勾補邊腹地圖文冊屯種器械舟車薪葦之事並移所司而綜理之凡各省各鎮鎮守總兵官副總兵並以三等真署都督及公侯伯充之有大征討則掛諸號將軍或大將軍前將軍副將軍印總兵出既事納之其各府之掌印及僉書率皆公侯伯間有屬老將之實為都督者不能十一也初太祖下集慶即置行樞密院自領之又置諸翼統軍元帥府尋罷樞密院改置大都督府以朱文正為大都督節制中外諸軍事設司馬參軍經歷都事等官又增設左右都督同知副使僉事照磨各一人幷設斷事官定制大都督從一品左右都督正二品同知都督從二品副都督正三品僉都督從三品經歷從五品都事從七品統軍元帥府元帥正三品同知元帥從三品副使正四品經歷正七品知事從八品照磨正九品又以都鎮撫司隸大都督府先是屬中書省秩從四品尋罷統軍元帥府吳元年更定官制罷大都督不設以左右都督為長官正一品同知都督從一品副都督正二品僉都督從二品俱陞品秩其屬設參議正四品經歷斷事官從五品都事正七品照磨從七品洪武九年罷副都督改參議為掌判官十二年陞都督僉事為正二品掌判官為正三品十三年始改都督府為五軍都督府分領在京各衞所惟錦衣等親軍上直衞不隸五府及在外各都司衞所以中軍都督府斷事官為五軍斷事官十五年置五軍十衞參軍府設左右參軍十七年五軍各設左右斷事二人提控案牘一人並從九品二十三年陞五軍斷事官為正五品總治五軍刑獄分為五司司設稽仁稽義稽禮稽智稽信五人俱正七品各理其軍之刑獄二十九年置五軍照磨所專掌文牘建文中革斷事及五司官永樂元年設北京留守行後軍都督府置左右都督都督同知都督僉事無定員經歷都事各一人後又分五府稱行在五軍都督府十八年除行在字在應天者加南京字洪熙元年復稱行在仍設行後府宣德三年又革正統六年復除行在字京營永樂二十二年置三大營曰五軍營曰神機營曰三千營五軍神機各設中軍左右哨左右掖五軍三千各設五司每營俱選勳臣二人提督之其諸營管哨掖官曰坐營曰坐司各哨掖官亦率以勳臣為之又設把總把司把牌等官又有圍子手幼官舍人殫忠效義諸營俱附五軍營中景泰元年選三營精銳立十團營涖以總兵統以總督監以內臣其舊設者號為老營三老營凡六提督內選其二領團營成化三年分團營為十二每營又各分五軍三千統騎兵神機統火器其各營統領俱擇都督都指揮或列爵充之以總督統轄之正德中又選團營精銳置東西兩官廳另設總兵參將統領嘉靖二十九年革團營官廳仍併三大營改三千曰神樞設副參遊佐坐營號頭中軍千把總等官五軍營戰兵一營左副將一戰兵二營練勇參將一車兵三營參將一車兵四營遊擊將軍一城守五營佐擊將軍一戰兵六營右副將一戰兵七營練勇參將一車兵八營參將一車兵九營遊擊將軍一城守十營佐擊將軍一備兵坐營官一大號頭官一已上部推監鎗號頭官一中軍官十一隨征千總四隨營千總二十選鋒把總八把總一百三十八已上俱營推神樞營戰兵一營左副將一戰兵二營練勇參將一車兵三營參將一車兵四營遊擊將軍一城守五營佐擊將軍一戰兵六營右副將一車兵七營練勇參將一執事八營參將一城守九營佐擊將軍一城守十營佐擊將軍一備兵坐營官一大號頭官一已上部推監鎗號頭官一中軍官十一千總二十選鋒把總六把總一百五十七已上俱營推神機營戰兵一營左副將一戰兵二營練勇參將一車兵三營遊擊將軍一車兵四營佐擊將軍一城守五營佐擊將軍一戰兵六營右副將一車兵七營練勇參將一城守八營佐擊將軍一城守九營佐擊將軍一城守十營佐擊將軍一備兵坐營官一大號頭官一已上部推監鎗號頭官一中軍官十一千總二十選鋒把總六把總一百二十八已上俱營推通計三大營共五百八十六員統以提督總兵官一員已改提督曰總督鑄總督京營戎政印俾仇鸞佩之更設侍郎一人協理京營戎政定巡視科道官歲一代更悉革內侍官增設巡視主事尋亦革隆慶初仍以總督為提督改協理為閱視尋併改閱視為提督四年二月更京營制三營各設提督又各設右都御史一員提督之九月罷六提督仍復總督戎政一人天啟初增設協理一人已仍革一人崇禎初復增一人京衞指揮使司指揮使一人正三品指揮同知二人從三品指揮僉事四人正四品鎮撫司鎮撫二人從五品其屬經歷司經歷從七品知事正八品吏目從九品倉大使副使各一人所轄千戶所多寡各不等京衞有上直衞有南北京衞品秩並同各有掌印有僉書其以恩廕寄祿無定員凡上直衞親軍指揮使司二十有六曰錦衣衞曰旗手衞曰金吾前衞曰金吾後衞曰羽林左衞曰羽林右衞曰府軍衞曰府軍左衞曰府軍右衞曰府軍前衞曰府軍後衞曰虎賁左衞是為上十二衞洪武中置曰金吾左衞曰金吾右衞曰羽林前衞曰燕山左衞曰燕山右衞曰燕山前衞曰大興左衞曰濟陽衞曰濟州衞曰通州衞是為上十衞永樂中置曰騰驤左衞曰騰驤右衞曰武驤左衞曰武驤右衞宣德八年置番上宿衞名親軍以護宮禁不隸五都督府其京衞隸都督府者三十有三曰留守左衞曰鎮南衞曰驍騎右衞曰龍虎衞曰瀋陽左衞曰瀋陽右衞隸左軍都督府曰留守右衞曰虎賁右衞曰武德衞隸右軍都督府曰留守中衞曰神策衞曰應天衞曰和陽衞及牧馬千戶所蕃牧千戶所俱隸中軍都督府曰留守前衞曰龍驤衞曰豹韜衞隸前軍都督府曰留守後衞曰鷹揚衞曰興武衞曰大寧中衞曰大寧前衞曰會州衞曰富峪衞曰寬河衞曰神武左衞曰忠義右衞曰忠義前衞曰忠義後衞曰義勇右衞曰義勇前衞曰義勇後衞曰武成中衞曰蔚州左衞隸後軍都督府又京衞非親軍而不隸都督府者十有五曰武功中衞曰武功左衞曰武功右衞已上三衞以匠故隸工部曰永清左衞曰永清右衞曰彭城衞曰長陵衞曰獻陵衞曰景陵衞曰裕陵衞曰茂陵衞曰泰陵衞曰康陵衞曰永陵衞曰昭陵衞明初置帳前總制親軍都指揮使司以馮國用為都指揮使後改置金吾侍衞親軍都護府設都護從二品經歷正六品知事從七品照磨從八品又置各衞親軍指揮使司設指揮使正三品同知指揮使從三品副使正四品經歷正七品知事從八品照磨正九品千戶所正千戶正五品副千戶從五品鎮撫百戶正六品因置武德龍驤豹韜飛熊威武廣武興武英武鷹揚驍騎神武雄武鳳翔天策振武宣武羽林十七衞親軍指揮使司此設親軍衞之始尋罷金吾侍衞親軍都護府洪武永樂間增設親軍諸衞名為上二十二衞分掌宿衞而錦衣衞主巡察緝捕理詔獄以都督都指揮領之蓋特異於諸衞焉留守五衞舊為都鎮撫司總領禁衞先屬中書省改隸大都督府設都鎮撫從四品副鎮撫從五品知事從八品尋改宿衞鎮撫司設宿衞鎮撫宿衞知事洪武三年改為留守衞指揮使司專領軍馬守禦各城門及巡警皇城與城垣造作之事後陞為留守都衞統轄天策豹韜飛熊鷹揚江陰廣洋橫海龍江水軍左右十衞八年復為留守衞與天策等八衞俱為親軍指揮使司惟水軍左右二衞為指揮使司並隸大都督府十一年改為留守中衞增置留守左右前後四衞仍為親軍十三年始分隸五都督府錦衣衞掌侍衞緝捕刑獄之事以勳戚都督領之恩廕寄祿無常員凡朝會巡幸則具鹵簿儀仗率大漢將軍共一千五百七員等侍從扈行宿衞則分番入直朝日夕月耕耤視牲則服飛魚服佩繡春刀侍左右盜賊奸宄街塗溝洫密緝而時省之凡承制鞫獄錄囚勘事偕三法司五軍官舍比試併鎗同兵部涖視統所凡十有七中左右前後五所領軍士五所分鑾輿擎蓋扇手旌節旛幢班劍斧鉞戈戟弓矢馴馬十司各領將軍校尉以備法駕上中上左上右上前上後中後六親軍所分領將軍力士軍匠馴象所領象奴養象以供朝會陳列駕輦馱寶之事明初置拱衞司秩正七品管領校尉屬都督府後改拱衞指揮使司秩正三品尋又改為都尉司洪武三年改為親軍都尉府管左右中前後五衞軍士而設儀鸞司隸焉四年定儀鸞司為正五品設大使一人副使二人十五年罷儀鸞司改置錦衣衞秩從三品其屬有御椅等七員皆正六品設經歷司掌文移出入鎮撫司掌本衞刑名兼理軍匠十七年改錦衣衞指揮使為正三品二十年以治錦衣衞者多非法凌虐乃焚刑具出繫囚送刑部審錄詔內外獄咸歸三法司罷錦衣獄成祖時復置尋增北鎮撫司專治詔獄成化間刻印畀之獄成得專達不關白錦衣錦衣官亦不得干預而以舊所設為南鎮撫司專理軍匠旗手衞本旗手千戶所洪武十八年改置掌大駕金鼓旗纛帥力士隨駕宿衞校尉力士僉民間壯丁為之校尉專職擎執鹵簿儀杖及駕前宣召官員差遣幹辦隸錦衣衞力士專領金鼓旗幟隨駕出入及守衞四門隸旗手衞凡歲祭旗頭六纛之神八月於壇十二月於承天門外皆衞官涖事統所五府軍前衞掌統領幼軍輪番帶刀侍衞明初有帶刀舍人洪武時府軍等衞皆有習技幼軍永樂十三年為皇太孫特選幼軍置府軍前衞設官屬指揮使五人指揮同知十人指揮僉事二十人衞鎮撫十人經歷五人統所二十有五金吾羽林等十九衞掌守衞巡警統所凡一百有二騰驤等四衞掌帥力士直駕隨駕統所三十有二南京守備一人協同守備一人南京以守備及參贊機務為要職守備以公侯伯充之兼領中軍都督府事協同守備以侯伯都督充之領五府事參贊機務以南京兵部尚書領之其治所在中府掌南都一切留守防護之事永樂十九年遷都北京命中府掌府事官守備南京節制南京諸衞所洪熙元年始以內臣同守備景泰三年增設協