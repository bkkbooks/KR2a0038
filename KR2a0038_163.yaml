body:
  text: 明史卷一百六十三列傳第五十一李時勉陳敬宗劉鉉薩琦邢讓李紹林瀚子庭庭機孫烴謝鐸魯鐸趙永李時勉名懋以字行安福人成童時冬寒以衾裹足納桶中誦讀不已中永樂二年進士選庶吉士進學文淵閣與修太祖實錄授刑部主事復與重修實錄書成改翰林侍讀性剛鯁慨然以天下為己任十九年三殿災詔求直言條上時務十五事成祖決計都北京時方招徠遠人而時勉言營建之非及遠國入貢人不宜使羣居輦下忤帝意已觀其他說多中時病抵之地復取視者再卒多施行尋被讒下獄歲餘得釋楊榮薦復職洪熙元年復上疏言事仁宗怒甚召至便殿對不屈命武士撲以金瓜脅折者三曳出幾死明日改交阯道御史命日慮一囚言一事章三上乃下錦衣衞獄時勉於錦衣千戶某有恩千戶適涖獄密召醫療以海外血竭得不死仁宗大漸謂夏原吉曰時勉廷辱我言已勃然怒原吉慰解之其夕帝崩宣宗即位已踰年或言時勉得罪先帝狀帝震怒命使者縛以來朕親鞫必殺之已又令王指揮即縛斬西市毋入見王指揮出端西旁門而前使者已縛時勉從端東旁門入不相值帝遙見罵曰爾小臣敢觸先帝疏何語趣言之時勉叩頭曰臣言諒闇中不宜近妃嬪皇太子不宜遠左右帝聞言色稍霽徐數至六事止帝令盡陳之對曰臣惶懼不能悉記帝意益解曰是第難言耳草安在對曰焚之矣帝乃太息稱時勉忠立赦之復官侍讀比王指揮詣獄還則時勉已襲冠帶立階前矣宣德五年修成祖實錄成遷侍讀學士帝幸史館撒金錢賜諸學士皆俛取時勉獨正立帝乃出餘錢賜之正統三年以宣宗實錄成進學士掌院事兼經筵官六年代貝泰為祭酒八年乞致仕不允初時勉請改建國學帝命王振往視時勉待振無加禮振銜之廉其短無所得時勉嘗芟彝倫堂樹旁枝振遂言時勉擅伐官樹入家取中旨與司業趙琬掌饌金鑑並枷國子監前官校至時勉方坐東堂閱課士卷徐呼諸生品第高下顧僚屬定甲乙揭榜乃行方盛暑枷三日不解監生李貴等千餘人詣闕乞貸有石大用者上章願以身代諸生圜集朝門呼聲徹殿庭振聞諸生不平恐激變及通政司奏大用章振內慚助教李繼請解於會昌侯孫忠忠皇太后父也忠生日太后使人賜忠家忠附奏太后太后為言之帝帝初不知也立釋之繼不拘檢柙時勉嘗規切之繼不能盡用然心感時勉言至是竟得其助大用豐潤人樸魯初不為六館所知及是名動京師明年中鄉試官至戶部主事九年帝視學時勉進講尚書辭旨清朗帝悅賜予有加連疏乞致仕不允十二年春乃得請朝臣及國子生餞都門外者幾三千人或遠送至登舟候舟發乃去英宗北狩時勉日夜悲慟遣其孫驥詣闕上書請選將練兵親君子遠小人褒表忠節迎還車駕復讐雪恥景泰元年得旨褒答而時勉卒矣年七十七諡文毅成化五年以其孫顒請改諡忠文贈禮部侍郎時勉為祭酒六年列格致誠正四號訓勵甚切崇廉恥抑奔競別賢否示勸懲諸生貧不能婚葬者節省餐錢為贍給督令讀書燈火達旦吟誦聲不絕人才盛於昔時始太祖以宋訥為祭酒最有名其後寧化張顯宗申明學規人比之訥而胡儼當成祖之世尤稱人師然以直節重望為士類所依歸者莫如時勉英國公張輔暨諸侯伯奏願偕詣國子監聽講帝命以三月三日往時勉升師席諸生以次立講五經各一章畢事設酒饌諸侯伯讓曰受教之地當就諸生列坐惟輔與抗禮諸生歌鹿鳴之詩賓主雍雍盡暮散去人稱為太平盛事陳敬宗字光世慈谿人永樂二年進士選庶吉士進學文淵閣與修永樂大典書成授刑部主事又與修五經四書大全再修太祖實錄授翰林侍講內艱歸宣德元年起修兩朝實錄明年轉南京國子監司業帝諭之曰侍講清華之選司業師儒之席位雖不崇任則重矣九年秩滿遷祭酒正統三年上書言舊制諸生以在監久近送諸司歷事比來有因事予告者遷延累歲至撥送之期始赴實長奸惰請以肄業多寡為次第又近有願就雜職之例士風卑陋誠非細故請加禁止從之敬宗美鬚髯容儀端整步履有定則力以師道自任立教條革陋習六館士千餘人每升堂聽講設饌會食整肅如朝廷稍失容即令待罪堂下僚屬憚其嚴誣以他事訟之法司周忱與敬宗善曰盍具疏自理為屬草辭稍遷就敬宗驚曰得無誑君耶不果上事亦竟白滿考入京師王振欲見之令忱道意敬宗曰吾為諸生師表而私謁中貴何以對諸生振知不可屈乃貽之文錦羊酒求書程子四箴冀其來謝敬宗書訖署名而已返其幣終不往見王直為吏部尚書從容謂曰先生官司成久將薦公為司寇敬宗曰公知我者今與天下英才終日論議顧不樂耶性善飲酒至數斗不亂襄城伯李隆守備南京每留飲聲伎滿左右竟日舉杯未嘗一盼其嚴重如此十二年冬乞休不允景泰元年九月與尚書魏驥同引年致仕家居不輕出有被其容接者莫不興起天順三年五月卒年八十三後贈禮部侍郎諡文定初敬宗與李時勉同在翰林袁忠徹嘗相之曳二人並列曰二公他日功名相埒敬宗儀觀魁梧時勉貌稍寢後二人同時為兩京祭酒時勉平恕得士敬宗方嚴終明世稱賢祭酒者曰南陳北李劉鉉字宗器長洲人生彌月而孤及長刲股療母疾母卒哀毀以孝聞永樂中用善書徵入翰林舉順天鄉試授中書舍人宣德時預修成祖仁宗實錄遷兵部主事仍供事內廷正統中再修宣宗實錄進侍講以學士曹鼐等薦與修撰王振教習庶吉士景帝立進侍講學士直經筵三年以高穀薦遷國子祭酒時以國計不足放遣諸生不願歸者停其月廩鉉言養才國家急務今倉廩尚盈奈何靳此遂得復給又令甄別六館生年老貌寢學藝疎淺者斥為民鉉言諸生荷教澤久豈無片長況離親戚棄墳墓艱苦備至一旦被斥非朝廷育才意乞揀年貌衰而有學者量授之官帝可其奏尋以母喪歸服闋赴都陳詢已為祭酒帝重鉉命與詢並任天順初改少詹事侍東宮講讀明年十月卒帝及太子皆賜祭賻贈有加憲宗立贈禮部侍郎諡文恭鉉性介特言行不苟教庶吉士及課國子生規條嚴整讀書至老彌篤仲子瀚以進士使南方瀕行閱其衣篋比還篋如故乃喜曰無玷吾門矣瀚官終副使能守父訓薩琦字廷珪其先西域人後著籍閩縣舉宣德五年進士歷官禮部侍郎兼少詹事天順元年卒琦有文德狷潔不苟合名行與鉉相頡頏云邢讓字遜之襄陵人年十八舉於鄉入國子監為李時勉所器與劉珝齊名登正統十三年進士改庶吉士授檢討景泰元年李實自瓦剌還請再遣使迎上皇景帝不許讓疏曰上皇於陛下有君之義有兄之恩安得而不迎且令寇假大義以問我其何辭以應若從羣臣請仍命實齎敕以往且述迎復之指雖上皇還否未可必而陛下恩義之篤昭然於天下萬一迎而不許則我得責直於彼以興問罪之師不亦善乎疏入帝委曲諭解之天順末父憂歸未終喪起修英宗實錄進修撰成化二年超遷國子祭酒慈懿太后崩議祔廟禮讓率僚屬疏諫兩京國學教官例不得遷擢讓等以為言由科目者滿考得銓讓在太學亦力以師道自任修辟雍通志督諸生誦小學及諸經痛懲謁告之弊時以此見稱而謗者亦眾為人負才狹中意所輕重輒形於詞色名位相軋者多忌之五年擢禮部右侍郎越二年以在國子監用會饌錢事與後祭酒陳鑑司業張業典籍王允等俱得罪坐死諸生訴闕下請代復詔廷臣雜治卒坐死贖為民鑑既得罪吏部尚書姚夔請起致仕禮部侍郎李紹為祭酒馳召之而紹已卒紹字克述安福人宣德八年進士改庶吉士授檢討大學士楊士奇臥病英宗遣使詢人才士奇舉紹等五人以對土木之敗京師戒嚴朝士多遣家南徙紹曰主辱臣死奚以家為卒不遣累遷翰林學士以李賢王翱薦擢禮部侍郎成化二年以疾求解職紹好學問居官剛正有器局能獎掖後進其卒也帝深惜之林瀚字亨大閩人父元美永樂末進士撫州知府瀚舉成化二年進士改庶吉士授編修再遷諭德請急歸弘治初召修憲宗實錄充經筵講官稍遷國子監祭酒進禮部右侍郎掌監事如故典國學垂十年饌銀歲以百數計悉貯之官以次營立署舍師儒免僦居由瀚始歷吏部左右侍郎十三年拜南京吏部尚書以災異率羣僚陳十二事御史王獻臣自遼東逮下詔獄儒士孫伯堅等夤緣為中書舍人瀚疏爭忤旨乞罷不許已奏請重根本曰保固南京曰佑啟皇儲曰撫綏百姓曰增進賢才正德元年四月吏部尚書馬文升去位言官丘俊石介等薦瀚帝用侍郎焦芳乃改瀚南京兵部參贊機務命未至瀚引疾乞休因陳養正心崇正道務正學親正人四事優詔慰留時災異數見瀚及南京諸臣條時政十二事語涉近倖多格不行瀚素剛方與守備中官不合他內臣進貢道其地者瀚每裁抑之遂交譖於劉瑾會劉健謝遷罷政瀚聞太息言官戴銑等以留健遷被徵瀚獨贐送瑾聞益恨明年二月假銑等獄詞謫瀚浙江參政致仕旋指為奸黨瑾誅復官致仕予月廩歲隸如故事尋命有司歲時存問瀚為人謙厚而自守介然卒年八十六贈太子太保諡文安子九人庭庭機最顯庭字利瞻瀚次子也弘治十二年進士授兵部主事歷職方郎中吏部尚書張綵欲改為御史固謝之乃以為蘇州知府頻歲大水疏請停織造罷繁征割關課備振再上始報可遷雲南左參政正德九年以父老乞侍養時子炫已成進士官禮部主事亦謁假歸三世一堂鄉人稱盛事嘉靖初父憂服闋起官江西歷湖廣左右布政使舉治行卓異擢右副都御史巡撫保定諸府歷工部右侍郎應詔言郊壇大工南城西苑相繼興作請以儉約先天下又因災傷乞撤還採木燒造諸使進左拜尚書加太子太保時帝方大興土木功庭所規畫多稱意會詔建沙河行宮庭議加天下田賦為御史桑喬給事中管見所劾乞罷歸卒贈少保諡康懿炫終通政司參議庭機字利仁瀚季子也嘉靖十四年進士改庶吉士授檢討遷司業擢南京祭酒累遷至工部尚書穆宗立調禮部俱官陪京時子已為祭酒遂致仕歸萬曆九年卒年七十有六贈太子太保諡文僖子烴字貞庭機長子嘉靖二十六年進士改庶吉士授檢討景恭王就邸命侍講讀三遷國子祭酒自祖瀚父庭機三世為祭酒前此未有也隆慶改元擢禮部右侍郎充日講官寇犯邊條上備邊七事改吏部調南京吏部署禮部事魏國公徐鵬舉廢長立幼持不可萬曆元年進工部尚書改禮部仍居南京名位一與父庭機等母喪去官服闋以庭機篤老侍養家居七年先父庭機卒贈太子少保諡文恪明代三世為尚書並得諡文林氏一家而已子世勤性篤孝芝生者三枯篁復青御史上其事被旌烴字貞燿庭機次子也嘉靖四十一年進士授戶部主事歷廣西副使兄卒請急歸養久之歷太僕少卿因災異極陳礦稅之害請釋逮繫諸臣不報終南京工部尚書致仕林氏三世五尚書皆內行修潔為時所稱謝鐸字鳴治浙江太平人天順末進士改庶吉士授編修預修英宗實錄性介特力學慕古講求經世務成化九年校勘通鑑綱目上言綱目一書帝王龜鑑陛下命重加考定必將進講經筵為致治資也今天下有太平之形無太平之實因仍積習廢實徇名曰振綱紀而小人無畏忌曰勵風俗而縉紳棄廉恥飭官司而汙暴益甚恤軍民而罷敝益極減省有制而興作每疲於奔命蠲免有詔而徵斂每困於追呼考察非不舉而倖門日開簡練非不行而私撓日衆賞竭府庫之財而有功者不勸罰窮讞覆之案而有罪者不懲以至修省祈禱之命屢頒水旱災傷之來不絕禁垣被震城門示災不思竦動旋轉以大答天人之望是則誠可憂也願陛下以古證今兢兢業業然後可長治久安而載籍不為無用矣帝不能從時塞上有警條上備邊事宜請養兵積粟收復東勝河套故疆又言今之邊將無異晚唐債帥敗則士卒受其殃捷則權豪蒙其賞且剋侵軍餉辦納月錢三軍方怨憤填膺孰肯為國效命者語皆切時弊秩滿進侍講直經筵遭兩喪服除以親不逮養遂不起弘治初言者交薦以原官召修憲宗實錄三年擢南京國子祭酒上言六事曰擇師儒慎科貢正祀典廣載籍復會饌均撥歷其正祀典請進宋儒楊時而罷吳澄禮部尚書傅瀚持之乃進時而澄祀如故明年謝病去家居將十年薦者益衆會國子缺祭酒部議起之帝素重鐸擢禮部右侍郎管祭酒事屢辭不許時章懋為南祭酒兩人皆人師諸生交相慶居五年引疾歸鐸經術湛深為文章有體要兩為國子師嚴課程杜請謁增號舍修堂室擴廟門置公廨三十餘居其屬諸生貧者周恤之死者請官定制為之殮家居好周恤族黨自奉則布衣蔬食正德五年卒贈禮部尚書諡文肅魯鐸字振之景陵人弘治十五年會試第一歷編修閉門自守不妄交人武宗立使安南却其餽正德二年遷國子監司業累擢南祭酒尋改北鐸屢典成均教士切實為學不專章句士有假歸廢學者訓飭之悔過乃已久之謝病歸嘉靖初以刑部尚書林俊薦用孝宗朝謝鐸故事起南祭酒踰年復請致仕累徵不起卒諡文恪鐸以德望重於時居鄉有盜掠牛馬或紿云魯祭酒物也舍之去大學士李東陽生日鐸為司業與祭酒趙永皆其門生也相約以二帕為壽比檢笥亡有徐曰鄉有饋乾魚者盍以此往詢諸庖食過半矣以其餘詣東陽東陽喜為烹魚置酒留二人飲極歡乃去永字爾錫臨淮人與鐸同年進士亦官編修復與鐸相繼為祭酒尋遷南京禮部侍郎大學士楊一清重其才欲引以自助乃為他語挑之永正色曰可以纓冠污吾道乎遂請致仕去人服其廉介贊曰明太祖時國學師儒體貌優重魏觀宋訥為祭酒造就人才克舉其職諸生銜命奉使往往擢為大官不專以科目進也中葉以還流品稍雜撥歷亦為具文成均師席不過為儒臣序遷之地而已李時勉陳敬宗諸人方廉清鯁表範卓然類而傳之庶觀者有所法焉
