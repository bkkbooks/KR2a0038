body:
  text: 明史卷一百四十八列傳第三十六楊士奇楊榮曾孫旦楊溥馬愈楊士奇名寓以字行泰和人早孤隨母適羅氏已而復宗貧甚力學授徒自給多游湖湘間館江夏最久建文初集諸儒修太祖實録士奇已用薦徵授教授當行王叔英復以史才薦遂召入翰林充編纂官尋命吏部考第史館諸儒尚書張紞得士奇策曰此非經生言也奏第一授吳王府審理副仍供館職成祖即位改編修已簡入內閣典機務數月進侍講永樂二年選宮僚以士奇為左中允五年進左諭德士奇奉職甚謹私居不言公事雖至親厚不得聞在帝前舉止恭慎善應對言事輒中人有小過嘗為掩覆之廣東布政使徐奇載嶺南土物饋廷臣或得其目籍以進帝閲無士奇名召問對曰奇赴廣時羣臣作詩文贈行臣適病弗預以故獨不及今受否未可知且物微當無他意帝遽命燬籍六年帝北巡命與蹇義黃淮留輔太子太子喜文辭贊善王汝玉以詩法進士奇曰殿下當留意六經暇則觀兩漢詔令諸小技不足為也太子稱善初帝起兵時漢王數力戰有功帝許以事成立為太子既而不得立怨望帝又憐趙王年少寵異之由是兩王合而間太子帝頗心動九年還南京召士奇問監國狀士奇以孝敬對且曰殿下天資高即有過必知知必改存心愛人決不負陛下託帝悅十一年正旦日食禮部尚書呂震請勿罷朝賀侍郎儀智持不可士奇亦引宋仁宗事力言之遂罷賀明年帝北征士奇仍輔太子居守漢王譖太子益急帝還以迎駕緩盡徵東宮官黃淮等下獄士奇後至宥之召問太子事士奇頓首言太子孝敬如初凡所稽遲皆臣等罪帝意解行在諸臣交章劾士奇不當獨宥遂下錦衣衛獄尋釋之十四年帝還京師微聞漢王奪嫡謀及諸不軌狀以問蹇義義不對乃問士奇對曰臣與義俱侍東宮外人無敢為臣兩人言漢王事者然漢王兩遣就藩皆不肯行今知陛下將徙都輒請留守南京惟陛下熟察其意帝默然起還宮居數日帝盡得漢王事削兩護衛處之樂安明年進士奇翰林學士兼故官十九年改左春坊大學士仍兼學士明年復坐輔導有闕下錦衣衛獄旬日而釋仁宗即位擢禮部侍郎兼華蓋殿大學士帝御便殿蹇義夏原吉奏事未退帝望見士奇謂二人曰新華蓋學士來必有讜言試共聽之士奇入言恩詔減歲供甫下二日惜薪司傳旨徵棗八十萬斤與前詔戾帝立命減其半服制二十七日期滿呂震請即吉士奇不可震厲聲叱之蹇義兼取二說進明日帝素冠麻衣絰而視朝廷臣惟士奇及英國公張輔服如之朝罷帝謂左右曰梓宮在殯易服豈臣子所忍言士奇執是也進少保與同官楊榮金幼孜並賜繩愆糾繆銀章得密封言事尋進少傅時藩司守令來朝尚書李慶建議發軍伍餘馬給有司歲課其駒士奇曰朝廷選賢授官乃使牧馬是貴畜而賤士也何以示天下後世帝許中旨罷之已而寂然士奇復力言又不報有頃帝御思善門召士奇謂曰朕向者豈真忘之聞呂震李慶輩皆不喜卿朕念卿孤立恐為所傷不欲因卿言罷耳今有辭矣手出陝西按察使陳智言養馬不便疏使草敕行之士奇頓首謝羣臣習朝正旦儀呂震請用樂士奇與黃淮疏止未報士奇復奏待庭中至夜漏十刻報可越日帝召謂曰震每事誤朕非卿等言悔無及命兼兵部尚書並食三祿士奇辭尚書祿帝監國時憾御史舒仲成至是欲罪之士奇曰陛下即位詔向忤旨者皆得宥若治仲成則詔書不信懼者衆矣如漢景帝之待衛綰不亦可乎帝即罷弗治或有言大理卿虞謙言事不密帝怒降一官士奇為白其罔得復秩又大理少卿弋謙以言事得罪士奇曰謙應詔陳言若加之罪則羣臣自此結舌矣帝立進謙副都御史而下敕引過時有上書頌太平者帝以示諸大臣皆以為然士奇獨曰陛下雖澤被天下然流徙尚未歸瘡痍尚未復民尚艱食更休息數年庶幾太平可期帝曰然因顧蹇義等曰朕待卿等以至誠望匡弼惟士奇曾五上章卿等皆無一言豈果朝無闕政天下太平耶諸臣慚謝是年四月帝賜士奇璽書曰往者朕膺監國之命卿侍左右同心合德徇國忘身屢歷艱虞曾不易志及朕嗣位以來嘉謨入告期豫於治正固不二簡在朕心茲創制楊貞一印賜卿尚克交修以成明良之譽尋修太宗實録與黃淮金幼孜楊溥俱充總裁官未幾帝不豫召士奇與蹇義黃淮楊榮至思善門命士奇書敕召太子於南京宣宗即位修仁宗實録仍充總裁宣德元年漢王高煦反帝親征平之師還次獻縣之單家橋侍郎陳山迎謁言漢趙二王實同心請乘勢襲彰德執趙王榮力贊決士奇曰事當有實天地鬼神可欺乎榮厲聲曰汝欲撓大計耶今逆黨言趙實與謀何謂無辭士奇曰太宗皇帝三子今上惟兩叔父有罪者不可赦其無罪者宜厚待之疑則防之使無虞而已何遽加兵傷皇祖在天意乎時惟楊溥與士奇合將入諫榮先入士奇繼之閽者不納尋召義原吉入二人以士奇言白帝帝初無罪趙意移兵事得寢比還京帝思士奇言謂曰今議者多言趙王事奈何士奇曰趙最親陛下當保全之毋惑羣言帝曰吾欲封羣臣章示王令自處何如士奇曰善更得一璽書幸甚於是發使奉書至趙趙王得書大喜泣曰吾生矣即上表謝且獻護衛言者始息帝待趙王日益親而薄陳山謂士奇曰趙王所以全卿力也賜金幣時交址數叛屢發大軍征討皆敗沒交址黎利遣人僞請立陳氏後帝亦厭兵欲許之英國公張輔尚書蹇義以下皆言與之無名徒示弱天下帝召士奇榮謀二人力言陛下恤民命以綏荒服不為無名漢棄珠崖前史以為美談不為示弱許之便尋命擇使交址者蹇義薦伏伯安口辨士奇曰言不忠信雖蠻貊之邦不可行伯安小人往且辱國帝是之別遣使於是棄交址罷兵歲省軍興巨萬五年春帝奉皇太后謁陵召英國公張輔尚書蹇義及士奇榮幼孜溥朝太后於行殿太后慰勞之帝又語士奇曰太后為朕言先帝在青宮惟卿不憚觸忤先帝能從以不敗事又誨朕當受直言士奇對曰此皇太后盛德之言願陛下念之尋敕鴻臚寺士奇老有疾趨朝或後毋論奏帝嘗微行夜幸士奇宅士奇倉皇出迎頓首曰陛下奈何以社稷宗廟之身自輕帝曰朕欲與卿一言故來耳後數日獲二盜有異謀帝召士奇告之故且曰今而後知卿之愛朕也帝以四方屢水旱召士奇議下詔寬恤免災傷租稅及官馬虧額者士奇因請並蠲逋賦薪芻錢減官田額理冤滯汰工役以廣德意民大悅踰二年帝謂士奇曰恤民詔下已久今更有可恤者乎士奇曰前詔減官田租戶部徵如故帝怫然曰今首行之廢格者論如法士奇復請撫逃民察墨吏舉文學武勇之士令極刑家子孫皆得仕進又請廷臣三品以上及二司官各舉所知備方面郡守選皆報可當是時帝勵精圖治士奇等同心輔佐海內號為治平帝乃倣古君臣豫遊事每歲首賜百官旬休車駕亦時幸西苑萬歲山諸學士皆從賦詩賡和從容問民間疾苦有所論奏帝皆虛懷聽納帝之初即位也內閣臣七人陳山張瑛以東宮舊恩入不稱出為他官黃淮以疾致仕金幼孜卒閣中惟士奇榮溥三人榮疏闓果毅遇事敢為數從成祖北征能知邊將賢否厄塞險易遠近敵情順逆然頗通饋遺邊將歲時致良馬帝頗知之以問士奇士奇力言榮曉暢邊務臣等不及不宜以小眚介意帝笑曰榮嘗短卿及原吉卿乃為之地耶士奇曰願陛下以曲容臣者容榮帝意乃解其後語稍稍聞榮以此愧士奇相得甚歡帝亦益親厚之先後所賜珍果牢醴金綺衣幣書器無算宣宗崩英宗即位方九齡軍國大政關白太皇太后太后推心任士奇榮溥三人有事遣中使詣閣咨議然後裁決三人者亦自信侃侃行意士奇首請練士卒嚴邊防設南京參贊機務大臣分遣文武鎮撫江西湖廣河南山東罷偵事校尉又請以次蠲租稅慎刑獄嚴核百司皆允行正統之初朝政清明士奇等之力也三年宣宗實録成進少師四年乞致仕不允敕歸省墓未幾還是時中官王振有寵於帝漸預外庭事導帝以嚴御下大臣往往下獄靖江王佐敬私饋榮金榮先省墓歸不之知振欲借以傾榮士奇力解之得已榮尋卒士奇溥益孤其明年遂大興師征麓川帑藏耗費士馬物故者數萬又明年太皇太后崩振勢益盛大作威福百官小有抵牾輒執而繫之廷臣人人惴恐士奇亦弗能制也士奇既耄子稷傲很嘗侵暴殺人言官交章劾稷朝議不即加法封其狀示士奇復有人發稷橫虐數十事遂下之理士奇以老疾在告天子恐傷士奇意降詔慰勉士奇感泣憂不能起九年三月卒年八十贈太師諡文貞有司乃論殺稷初正統初士奇言瓦剌漸強將為邊患而邊軍缺馬恐不能禦請於附近太僕寺關領西番貢馬亦悉給之士奇歿未幾也先果入寇有土木之難識者思其言又雅善知人好推轂寒士所薦達有初未識面者而于謙周忱況鍾之屬皆用士奇薦居官至一二十年廉能冠天下為世名臣云次子以廕補尚寶丞成化中進太常少卿掌司事楊榮字勉仁建安人初名子榮建文二年進士授編修成祖初入京榮迎謁馬首曰殿下先謁陵乎先即位乎成祖遽趣駕謁陵自是遂受知既即位簡入文淵閣為更名榮同值七人榮最少警敏一日晚寧夏報被圍召七人皆已出獨榮在帝示以奏榮曰寧夏城堅人皆習戰奏上已十餘日圍解矣夜半果奏圍解帝謂榮曰何料之審也江西盜起遣使撫諭而令都督韓觀將兵繼其後賊就撫奏至帝欲賜敕勞觀榮曰計發奏時觀尚未至不得論功帝益重之再遷至侍講太子立進右諭德仍兼前職與在直諸臣同賜二品服評議諸司事宜稱旨復賜衣幣帝威嚴與諸大臣議事未決或至發怒榮至輒為霽顏事亦遂決五年命往甘肅經畫軍務所過覽山川形勢察軍民閲城堡還奏武英殿帝大悅值盛暑親剖瓜噉之尋進右庶子兼職如故明年以父喪給傳歸既葬起復視事又明年母喪乞歸帝以北行期迫不許命同胡廣金幼孜扈從甘肅總兵官何福言脫脫不花等請降需命於亦集乃命榮往甘肅偕福受降持節即軍中封福寧遠侯因至寧夏與寧陽侯陳樊心規畫邊務還陳便宜十事帝嘉納之八年從出塞次臚朐河選勇士三百人為衛不以隸諸將令榮領之師旋餉不繼榮請盡以供御之餘給軍而令軍中有餘者得相貸入塞官為倍償軍賴以濟明年乞奔喪命中官護行還詢閩中民情及歲豐歉榮具以對尋命侍諸皇孫讀書文華殿十年甘肅守臣宋琥言叛寇老的罕逃赤斤蒙古且為邊患乃復遣榮至陝西會豐城侯李彬議進兵方略榮還奏言隆冬非用兵時且有罪不過數人兵未可出帝從其言叛者亦降明年復與廣幼孜從北巡又明年征瓦剌太孫侍行帝命榮以間陳說經史兼領尚寶事凡宣詔出令及旗志符驗必得榮奏乃發帝嘗晚坐行幄召榮計兵食榮對曰擇將屯田訓練有方耕耨有時即兵食足矣十四年與金幼孜俱進翰林學士仍兼庶子從還京師明年復從北征十六年胡廣卒命榮掌翰林院事益見親任諸大臣多忌榮欲疏之共舉為祭酒帝曰吾固知其可第求代榮者諸大臣乃不敢言十八年進文淵閣大學士兼學士如故明年定都北京會三殿災榮麾衛士出圖籍制誥舁東華門外帝褒之榮與幼孜陳便宜十事報可二十年復從出塞軍事悉令參決賚豫優渥師還勞將士分四等賜宴榮幼孜皆列前席受上賞已復下詔征阿魯台或請調建文時江西所集民兵帝問榮榮曰陛下許民復業且二十年一旦復徵之非示天下信從之明年從出塞軍務悉委榮晝夜見無時帝時稱楊學士不名也又明年復從北征當是時帝凡五出塞士卒饑凍饋運不繼死亡十二三大軍抵答蘭納木兒河不見敵帝問羣臣當復進否羣臣唯唯惟榮幼孜從容言宜班師帝許之還次榆木川帝崩中官馬雲等莫知所措密與榮幼孜入御幄議二人議六師在外去京師尚遠祕不發喪以禮斂鎔錫為椑載輿中所至朝夕進膳如常儀益嚴軍令人莫測或請因他事為敕馳報皇太子二人曰誰敢爾先帝在則稱敕賓天而稱敕詐也罪不小衆曰然乃具大行月日及遺命傳位意啓太子榮與少監海壽先馳訃既至太子命與蹇義楊士奇議諸所宜行者仁宗即位進太常卿餘官如故尋進太子少傅謹身殿大學士既而有言榮當大行時所行喪禮及處分軍事狀帝賜敕褒勞賚豫甚厚進工部尚書食三祿時士奇淮皆辭尚書祿榮幼孜亦固辭不允宣德元年漢王高煦反帝召榮等定計榮首請帝親征曰彼謂陛下新立必不自行今出不意以天威臨之事無不濟帝從其計至樂安高煦出降師還以決策功受上賞賜銀章五褒豫甚至三年從帝巡邊至遵化聞兀良哈將寇邊帝留扈行諸文臣於大營獨命榮從自將輕騎出喜峰口破敵而還五年進少傅辭大學士祿九年復從巡邊至洗馬林而還英宗即位委寄如故正統三年與士奇俱進少師五年乞歸展墓命中官護行還至武林驛而卒年七十贈太師諡文敏授世襲都指揮使榮歷事四朝謀而能斷永樂末浙閩山賊起議發兵帝時在塞外奏至以示榮榮曰愚民苦有司不得已相聚自保兵出將益聚不可解遣使招撫當不煩兵從之盜果息安南之棄諸大臣多謂不可獨榮與士奇力言不宜以荒服疲中國其老成持重類如此論事激發不能容人過然遇人觸帝怒致不測往往以微言導帝意輒得解夏原吉李時勉之不死都御史劉觀之免戍邊皆賴其力嘗語人曰事君有體進諫有方以悻直取禍吾不為也故其恩遇亦始終無間重修太祖實録及太宗仁宣三朝實録皆為總裁官先後賜賚不可勝計性喜賓客雖貴盛無稍崖岸士多歸心焉或謂榮處國家大事不愧唐姚崇而不拘小節亦頗類之家富曾孫曄為建寧指揮以資敗詳宦官傳曄從弟旦字晉叔弘治中進士歷官太常卿以忤劉瑾左遷知溫州府治最稍遷浙江提學副使瑾誅纍擢至戶部侍郎督京通倉出理餉甘肅還進右都御史總督兩廣軍務討平番禺清遠河源諸瑤嘉靖初遷至南京吏部尚書張璁桂萼驟進旦率九卿極言不可會吏部尚書喬宇罷召旦代之未至為給事中陳洸所劾勒致仕年七十餘卒楊溥字弘濟石首人與楊榮同舉進士授編修永樂初侍皇太子為洗馬太子嘗讀漢書稱張釋之賢溥曰釋之誠賢非文帝寬仁未得行其志也採文帝事編類以獻太子大悅久之以喪歸時太子監國命起視事十二年東宮遣使迎帝遲帝怒黃淮逮至北京繫獄及金問至帝益怒曰問何人得侍太子下法司鞫連溥逮繫錦衣衛獄家人供食數絶而帝意不可測旦夕且死溥益奮讀書不輟繫十年讀經史諸子數周仁宗即位釋出獄擢翰林學士嘗密疏言事帝褒答之賜鈔幣已念溥由己故久困尤憐之明年建弘文閣於思善門左選諸臣有學行者侍值士奇薦侍講王進儒士陳繼蹇義薦學録楊敬訓導何澄詔官繼博士敬編修澄給事中日值閣中命溥掌閣事親授閣印曰朕用卿左右非止學問欲廣知民事為治道輔有所建白封識以進尋進太常卿兼職如故宣宗即位弘文閣罷召溥入內閣與楊士奇等共典機務居四年以母喪去起復九年遷禮部尚書學士值內閣如故英宗初立與士奇榮請開經筵豫擇講官必得學識平正言行端謹老成達大體者數人供職且請慎選宮中朝夕侍從內臣太后大喜一日太后坐便殿帝西向立召英國公張輔及士奇榮溥尚書胡濙入諭曰卿等老臣嗣君幼幸同心共安社稷又召溥前曰仁宗皇帝念卿忠屢加歎息不意今尚見卿溥感泣太后亦泣左右皆悲愴始仁宗為太子被讒官僚多死詔獄溥及黃淮一繫十年瀕死者數矣仁宗時時於宮中念諸臣太后亦久憐之故為溥言之如此太后復顧帝曰此五臣三朝簡任俾輔後人皇帝萬幾宜與五臣共計正統三年宣宗實録成進少保武英殿大學士溥後士奇榮二十餘年入閣至是乃與士奇榮並六年歸省墓尋還是時王振尚未橫天下清平朝無失政中外臣民翕然稱三楊以居第目士奇曰西楊榮曰東楊而溥嘗自署郡望曰南郡因號為南楊溥質直廉靜無城府性恭謹每入朝循牆而走諸大臣論事爭可否或至違言溥平心處之諸大臣皆歎服時謂士奇有學行榮有才識溥有雅操皆人所不及云比榮士奇相繼卒在閣者馬愈高穀曹鼐皆後進望輕溥孤立王振益用事十一年七月溥卒年七十五贈太師諡文定官其孫壽尚寶司丞後三年振遂導英宗北征陷土木幾至大亂時人追思此三人者在當不至此而後起者爭暴其短以為依違中旨釀成賊奄之禍亦過刻之端也馬愈字性和臨朐人宣德二年進士第一授翰林修撰九年秋特簡史官及庶吉士三十七人進學文淵閣以愈為首正統元年充經筵講官再遷至侍讀學士時王振用事一日語楊士奇榮曰朝廷事久勞公等公等皆高年倦矣士奇曰老臣盡瘁報國死而後已榮曰吾輩衰殘無以效力當擇後生可任者報聖恩耳振喜而退士奇咎榮失言榮曰彼厭吾輩矣一旦內中出片紙令某人入閣且奈何及此時進一二賢者同心協力尚可為也士奇以為然翼日遂列侍讀學士苗衷侍講曹鼐及愈名以進由是愈被擢用五年詔以本官入內閣參預機務尋進禮部右侍郎十二年卒贈尚書兼學士贈官兼職自愈始愈端重簡默門無私謁論事務寬厚嘗奏天下獄久者多瘐死宜簡使者分道決遣帝納焉邊警方命將而別部使至衆議執之愈言賞善罰惡為治之本波及於善非法乘人之來執之不武帝然之厚遣其使贊曰成祖時士奇榮與解縉等同直內閣溥亦同為仁宗宮僚而三人逮事四朝為時耆碩溥入閣雖後德望相亞是以明稱賢相必首三楊均能原本儒術通達事幾協力相資靖共匪懈史稱房杜持衆美效之君輔贊彌縫而藏諸用又稱姚崇善應變以成天下之務宋璟善守文以持天下之正三楊其庶幾乎
