body:
  text: 明史卷四十四志第二十地理五湖廣浙江湖廣禹貢荊揚梁豫四州之域元置湖廣等處行中書省治武昌路又分置湖南道宣慰司治天臨路屬焉又以襄陽等三路屬河南江北等處行中書省又分置荊湖北道宣慰司治中興路並屬焉太祖甲辰年二月平陳理置湖廣等處行中書省洪武三年十二月置武昌都衛與行中書省同治八年十月改都衛為湖廣都指揮使司九年六月改行中書省為承宣布政使司領府十五直隸州二屬州十七縣一百有八宣慰司二宣撫司四安撫司五長官司二十一蠻夷長官司五為里三千四百八十有奇北至均州與河南陝西界南至九疑與廣東廣西界東至蘄州與江南江西界西至施州與四川貴州界距南京一千七百一十五里京師五千一百七十里洪武二十六年編戶七十七萬五千八百五十一口四百七十萬二千六百六十弘治四年戶五十萬四千八百七十口三百七十八萬一千七百一十四萬曆六年戶五十四萬一千三百一十口四百三十九萬八千七百八十五武昌府元武昌路屬湖廣行省太祖甲辰年二月為府領州一縣九江夏倚洪武三年四月建楚王府於城內黃龍山東有黃鵠山下為黃鵠磯臨大江又南有金水一名塗水西流至金口入江有金口鎮巡檢司又北有滸黃洲西南有鮎魚口鎮二巡檢司武昌府東西有樊山一名西山産銀銅鐵及紫石英南有神人山其下為白鹿磯西有西塞山與大冶縣界北濱江中有蘆洲亦曰羅洲又西南有樊港一名樊溪又名袁溪匯縣南湖澤凡九十九北入大江曰樊口又東有南湖一名五丈湖通大江東有金子磯鎮又有赤土磯鎮西南有白湖鎮三巡檢司南有金牛鎮西有三江口鎮二巡檢司後廢嘉魚府西南西有赤壁山與江夏縣界北岸對烏林西北濱大江有陸水流入焉曰陸口亦曰蒲圻口東北有簰洲鎮西南有石頭口鎮二巡檢司蒲圻府西南西有蒲首山南有蒲圻河即陸水也又西有蒲圻湖西南有新店等湖下流至嘉魚縣之石頭口注於大江西南有羊樓巡檢司咸寧府東南陳友諒時徙治河北洪武中復還故城即今治也西有淦水即金水之別名崇陽府南西有岩頭山西南有龍泉山東北有壺頭山下有壺頭港亦曰崇陽港匯羣川西合陸水又名雋水通城府西南南有錫山舊産銀錫北有陸水自巴陵縣流入興國州元興國路屬湖廣行省太祖甲辰年二月為府洪武九年四月降為州以州治永興縣省入來屬北有銀山西有黃姑山舊俱産銀南有太平山與九宮山接東有大坡山産茶東北有大江東有富池湖亦曰富水北流注於江有富池鎮巡檢司又東北有黃顙口鎮巡檢司西北距府三百八十里領縣二大冶州西北北有鐵山又有白雉山出銅礦又東有圍爐山出鐵又西南有銅緑山舊産銅大江在北有道士洑巡檢司通山州西少南東南有九宮山寶石河出焉下流合於富水東有黃泥壠巡檢司漢陽府元屬湖廣行省洪武九年四月降為州屬武昌府十三年五月復為府屬湖廣布政司尋屬河南二十四年六月還湖廣領縣二西北距布政司隔江僅七里漢陽倚洪武九年四月省十三年五月復置大別山在城東北一名翼際山又名魯山漢水自漢川縣流入舊徑山南襄河口入江成化初於縣西郭師口之上决而東從山北注於大江即今之漢口也有漢口巡檢司大江自巴陵縣西北接洞庭之水流入府境至此與漢水會又西南有沔水即漢水支流也仍合漢入江又有沌水大江支流也自沔陽州流入仍入大江謂之沌口有沌口巡檢司又有弇水在大江南岸至弇口入江又北有灄水亦漢水支流也有淪水流合焉下流注於大江又西有太白湖江北諸水多匯焉西有蔡店鎮西南有新灘鎮二巡檢司又西南有百人磯鎮巡檢司後遷於東江腦漢川府西少北元屬漢陽路洪武九年四月改屬武昌府十三年五月還屬南有小別山一名甑山又有陽臺山西南有漢水東有溳水自雲夢縣來南入漢謂之溳口北有劉家塥巡檢司黃州府元黃州路屬河南江北行省太祖甲辰年為府屬湖廣行省九年屬湖廣布政司尋改屬河南二十四年六月還屬湖廣領州一縣八西南距布政司百八十里黃岡倚南有故城洪武初徙於今治南濱大江西北岸有赤鼻磯非嘉魚之赤壁西有三江口其上流水分三派至此合流中有新生洲又有崢嶸洲東有巴河西有舉水俱入於江江濱西有陽邏鎮北有團風鎮又西北有中和鎮三巡檢司又有鹿城關有大活關又東北有陰山關麻城府北東有龜峰山舉水出焉流入黃岡縣東南有長河又南有縣前河流入焉下流注於江西有雙城鎮鵝籠鎮東北有虎頭關三巡檢司又西北有木陵關在木陵山上東北有陰山關在陰山上又北有黃土關與木陵虎頭白沙大城為五關又西有岐亭鎮嘉靖五年築城黃陂府西東南濱大江有武湖自西來入於江曰武口又曰沙武口亦曰沙洑口又西有灄水自漢陽流入江曰灄口北有大城潭鎮巡檢司又北有白沙關即麻城五關之一也黃安府西北嘉靖四十二年以麻城縣之姜家畈置析黃岡黃陂二縣地益之東有三角山接蘄水羅田蘄州界又有東流河下流出團風口入江西有西河又有雙河合流出灄口入漢又北有雙山關巡檢司西北有金扃關亦曰金山關與河南羅山縣界蘄水府東少南元屬蘄州路洪武九年四月屬蘄州十一年十月改屬府西南濱大江南有浠水源出英山縣流經縣境西南入江又東有蘭溪東南流入浠水又北有巴水源出縣之板石山流入黃岡縣界有蘭溪鎮巴河鎮二巡檢司羅田府東北元屬蘄州路洪武九年四月屬蘄州十一年十月改屬府東南有浠水西北有平湖水南有官渡河亦名縣前河平湖水流入焉下流合黃岡縣之巴河入大江東北有多雲鎮巡檢司又有栗子關又有上岐嶺中岐嶺下岐嶺等關西北又有平湖關蘄州元蘄州路屬河南江北行省太祖甲辰年為府九年四月降為州以州治蘄春縣省入來屬正統十年荊王府自江西建昌遷此東北有百家冶山産蘄竹南濱江東北有蘄水出大浮山經州北匯為赤東湖西南流接蘄水縣界注於大江西有茅山鎮北有大同鎮二巡檢司西距府二百十里領縣二廣濟州東北南濱江江中有中洲崇禎末遷治於此尋復故又有武山湖馬口湖皆流通大江南有武家穴鎮西南有馬口鎮二巡檢司黃梅州東北東南有礦山舊産鐵大江在南江濱有太子洑又南有縣前河由小池口入江西南有新開口鎮巡檢司屢圮於江內徙又南有靖江觜鎮巡檢司承天府元安陸府屬荊湖北道宣慰司太祖乙巳年屬湖廣行省洪武九年四月降為州直隸湖廣布政司二十四年六月改屬河南未幾還屬弘治四年興王府自德安府遷此嘉靖十年升州為承天府十八年建興都留守司於此領州二縣五東南距布政司五百七十里鍾祥倚洪武二十四年建郢王府永樂十二年除二十二年建梁王府正統六年除元曰長壽縣元末廢洪武三年復置九年四月省入州嘉靖十年八月復置更名東有樠木山一名青泥山北有松林山興獻王陵寢在焉嘉靖十年賜名純德山置顯陵縣於此明末縣廢西濱漢水北有直河自隨州流入有滶水流合焉又有豐樂水又東有臼水俱注於漢水京山府東南有縣河下流至景陵縣入漢江又東北有撞河自隨州流入至漢川縣入漢江或謂之富水潛江府東南元屬中興路洪武十年八月來屬北有漢水西北有潛水即漢水分流經縣東南入於漢又東南有深江又南有恩江皆漢水支分也西南有沱水為江水之分流經縣南有重湖環繞又東匯於漢水荊門州元治長林縣屬荊湖北道宣慰司洪武九年四月改為縣省長林縣入焉屬荊州府十三年五月復為州仍屬荊州府嘉靖十年八月來屬東南有章山即內方山也漢水徑其東亦曰沔水又西有權水東南有直江一名直河又有陽水一名建水皆流入焉南有荊門守禦千戶所北有宜陽守禦千戶所東南有建陽鎮新城鎮西北有仙居口北有樂仙橋四巡檢司東北距府九十里領縣一當陽州西元屬荊門州洪武九年改屬荊州府十年五月省入荊門縣十三年五月復置仍屬州東南有方城洪武初移治於此十三年復故南有玉泉山玉泉水出焉北有沮水源出房縣徑縣東南合榕渡與漳水會下流至枝江縣入於大江北有漳河口巡檢司沔陽州元沔陽府屬荊湖北道宣慰司洪武九年四月降為州以州治玉沙縣省入直隸湖廣布政司尋直隸河南二十四年六月還直隸湖廣嘉靖十年十二月來屬東南有黃蓬山其下為黃蓬湖南有大江北有漢水東有太白湖州西十四湖之水悉匯焉由漢陽縣之沌口入於大江又南有長夏河江水支流也亦曰夏水西北有襄水漢水支流也至州東北瀦口合流東入於沔水東有沙鎮西南有茅鎮二巡檢司西北距府三百二十五里領縣一景陵州西北南有沔水西南有楊水北注沔謂之楊口亦曰中夏口又曰楊林口又有中水流合楊水曰中口東有乾鎮巡檢司德安府元屬荊湖北道宣慰司洪武元年十月屬湖廣行省九年四月降為州屬黃州府十一月屬武昌府十三年五月復為府屬湖廣布政司二十四年六月改屬河南未幾還屬領州一縣五東南距布政司四百里安陸倚成化二十三年建興王府弘治四年遷於安陸州八年建岐王府十四年除正德元年壽王府自四川保寧府遷此嘉靖二十四年除四十年建景王府四十四年除洪武初縣省十三年五月復置東有章山即豫章山溳水在城西俗稱府河亦曰石潼河又西有漳水入焉謂之漳口南有高核鎮巡檢司後移於隨州之合河店雲夢府東南西南有溳水東有興安鎮巡檢司後廢應城府西南洪武九年四月屬黃州府十年五月省入雲夢縣十三年五月復置西北有西河下流入漢水又峙山鎮巡檢司亦在西北孝感府東南洪武九年四月屬黃州府十年五月省入德安州十三年五月復置北有澴水下流入於漢水南有淪河自溳河分流至漢陽合灄水入江北有小河溪東南有馬溪河二巡檢司隨州洪武二年正月以州治隨縣省入九年四月降為縣屬黃州府十年五月省入應山縣十三年五月復升為州西有大溪山溳水出焉下流至漢川縣入漢水又西有大洪山漳水所出西北有溠水源出栲栳山又有水流入焉又南有浪水源出大猿山下流俱注於溳水又西北有合河店東北有出山鎮二巡檢司東南距府百八十里領縣一應山州東洪武初省十三年五月復置西有雞頭山澴水出焉西南有溳水東有白泉河與澴水合入孝感縣界西北有杏遮關巡檢司即平靖關義陽三關之一又西南有平里市巡檢司又東北有武陽關一名武勝關又名禮山關亦義陽三關之一嶽州府元嶽州路屬湖廣行省太祖甲辰年為府洪武九年四月降為州直隸布政司十四年正月復為府領州一縣七東北距布政司五百里巴陵倚洪武九年四月省十四年復置西南有巴丘山又有君山在洞庭湖中大江在西北洞庭湖上納湘澧二水自西南來合謂之三江口湖之南有青草湖又西曰赤沙湖謂之三湖沅漸元辰酉澧澬湘九水皆匯於此故亦名九江東南有湖亦名翁湖南有鹿角巡檢司臨湘府東北東南有龍窖山跨臨湘通城當陽蒲圻四縣界西南有城陵磯又有道人磯皆濱大江有城陵磯巡檢司又南有土門鎮東北有鴨欄磯二巡檢司華容府西北東有東山又有石門山大江在北又有華容河自大江分流南達洞庭湖南有澧水東流入洞庭湖西南有赤沙湖與洞庭湖接南有明山古樓巡檢司又東北有黃家穴巡檢司後移於塔市北有北河渡巡檢司後廢平江府東南元平江州洪武三年降為縣北有永寧山東北有幕